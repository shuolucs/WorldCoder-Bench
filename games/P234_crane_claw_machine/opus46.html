<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Crane Claw Machine</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
canvas { display: block; }

#ui-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
}

#score-display {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #FFD700;
    font-size: 32px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,215,0,0.8), 2px 2px 4px rgba(0,0,0,0.8);
}

#coins-display {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    color: #FF6B6B;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,107,107,0.8), 2px 2px 4px rgba(0,0,0,0.8);
}

#claw-pos {
    position: absolute;
    top: 95px;
    left: 50%;
    transform: translateX(-50%);
    color: #88CCFF;
    font-size: 16px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

#game-over {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #FF0000;
    font-size: 64px;
    font-weight: bold;
    text-shadow: 0 0 20px rgba(255,0,0,0.8), 4px 4px 8px rgba(0,0,0,0.8);
    display: none;
    animation: pulse 1s ease-in-out infinite alternate;
}

@keyframes pulse {
    from { transform: translate(-50%, -50%) scale(1); }
    to { transform: translate(-50%, -50%) scale(1.1); }
}

#controls {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 15px;
    pointer-events: all;
}

#controls button {
    padding: 15px 30px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
}

#start-btn {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #333;
    box-shadow: 0 4px 15px rgba(255,215,0,0.5);
}

#start-btn:hover:not(:disabled) {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(255,215,0,0.7);
}

#start-btn:disabled {
    background: linear-gradient(135deg, #666, #888);
    color: #aaa;
    cursor: not-allowed;
}

#drop-btn {
    background: linear-gradient(135deg, #FF4444, #CC0000);
    color: white;
    box-shadow: 0 4px 15px rgba(255,0,0,0.5);
}

#drop-btn:hover:not(:disabled) {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(255,0,0,0.7);
}

#drop-btn:disabled {
    background: linear-gradient(135deg, #666, #444);
    color: #888;
    cursor: not-allowed;
}

#instructions {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    color: #aaa;
    font-size: 14px;
    text-align: center;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
}
</style>
</head>
<body>

<div id="ui-overlay">
    <div id="score-display">Score: 0</div>
    <div id="coins-display">Coins: 3</div>
    <div id="claw-pos">X: 0.00 Z: 0.00</div>
    <div id="game-over">GAME OVER</div>
    <div id="instructions">Arrow Keys: Move Claw | SPACE: Drop | R: Reset</div>
    <div id="controls">
        <button id="start-btn">INSERT COIN</button>
        <button id="drop-btn" disabled>DROP</button>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ GLOBAL STATE ============
const state = {
    gameStarted: false,
    clawX: 0,
    clawZ: 0,
    clawY: 9.0,
    clawState: 'idle',
    clawOpen: true,
    score: 0,
    coins: 3,
    gameOver: false,
    lanternsRemaining: 5,
    grabbedLantern: false,
    dropSequenceActive: false,
    totalDrops: 0,
    lanternPositions: []
};

window.__3D_STATE__ = state;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 14);
camera.lookAt(0, 4, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

// Extra lights for atmosphere
const pointLight1 = new THREE.PointLight(0xFF6B6B, 0.5, 20);
pointLight1.position.set(-4, 8, -4);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x6B6BFF, 0.5, 20);
pointLight2.position.set(4, 8, 4);
scene.add(pointLight2);

// ============ MACHINE CABINET ============
// Glass panels
function createGlassPanel(width, height, depth, position, rotation) {
    const geo = new THREE.BoxGeometry(width, height, depth);
    const mat = new THREE.MeshPhysicalMaterial({
        color: 0x88ccff,
        transparent: true,
        opacity: 0.15,
        roughness: 0.05,
        metalness: 0.1,
        transmission: 0.8,
        thickness: 0.1,
        side: THREE.DoubleSide
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(position);
    if (rotation) mesh.rotation.copy(rotation);
    return mesh;
}

// Front panel
scene.add(createGlassPanel(10, 10, 0.1, new THREE.Vector3(0, 5, 5)));
// Back panel
scene.add(createGlassPanel(10, 10, 0.1, new THREE.Vector3(0, 5, -5)));
// Left panel
scene.add(createGlassPanel(0.1, 10, 10, new THREE.Vector3(-5, 5, 0)));
// Right panel
scene.add(createGlassPanel(0.1, 10, 10, new THREE.Vector3(5, 5, 0)));
// Top panel
scene.add(createGlassPanel(10, 0.1, 10, new THREE.Vector3(0, 10, 0)));

// Wireframe edges
const edgeMat = new THREE.LineBasicMaterial({ color: 0x4488cc, linewidth: 2 });
const boxGeo = new THREE.BoxGeometry(10, 10, 10);
const edges = new THREE.EdgesGeometry(boxGeo);
const wireframe = new THREE.LineSegments(edges, edgeMat);
wireframe.position.set(0, 5, 0);
scene.add(wireframe);

// Floor inside machine
const floorGeo = new THREE.BoxGeometry(10, 0.3, 10);
const floorMat = new THREE.MeshStandardMaterial({
    color: 0x2a2a5a,
    roughness: 0.8,
    metalness: 0.2
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.position.set(0, 0.35, 0);
floor.receiveShadow = true;
scene.add(floor);

// Ground plane outside
const groundGeo = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x111133, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Chute on the right side
const chuteMat = new THREE.MeshStandardMaterial({ color: 0x444488, roughness: 0.5, metalness: 0.3 });
const chuteBottom = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 3), chuteMat);
chuteBottom.position.set(7, 2, 0);
scene.add(chuteBottom);
const chuteBack = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 0.1), chuteMat);
chuteBack.position.set(7, 3.5, -1.5);
scene.add(chuteBack);
const chuteSide1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 3, 3), chuteMat);
chuteSide1.position.set(5.5, 3.5, 0);
scene.add(chuteSide1);
const chuteSide2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 3, 3), chuteMat);
chuteSide2.position.set(8.5, 3.5, 0);
scene.add(chuteSide2);

// ============ CLAW MECHANISM ============
const clawGroup = new THREE.Group();
scene.add(clawGroup);

// Rail X (horizontal rail along x-axis)
const railXMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.3 });
const railX = new THREE.Mesh(new THREE.BoxGeometry(9, 0.2, 0.2), railXMat);
railX.position.set(0, 9.5, 0);
clawGroup.add(railX);

// Rail Z (horizontal rail along z-axis, moves with trolley on x)
const railZGroup = new THREE.Group();
railZGroup.position.set(0, 9.5, 0);
clawGroup.add(railZGroup);

const railZ = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 9), railXMat);
railZGroup.add(railZ);

// Trolley (moves along both rails)
const trolleyGroup = new THREE.Group();
trolleyGroup.position.set(0, 0, 0);
railZGroup.add(trolleyGroup);

const trolley = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.3, 0.6), new THREE.MeshStandardMaterial({ color: 0xcc4444, metalness: 0.6, roughness: 0.3 }));
trolley.position.set(0, 0, 0);
trolleyGroup.add(trolley);

// Cable
const cableGeo = new THREE.CylinderGeometry(0.03, 0.03, 1, 8);
const cableMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.9 });
const cable = new THREE.Mesh(cableGeo, cableMat);
cable.position.set(0, -0.5, 0);
trolleyGroup.add(cable);

// Claw base
const clawBase = new THREE.Group();
clawBase.position.set(0, -1, 0);
trolleyGroup.add(clawBase);

const clawHub = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.15, 0.3, 8),
    new THREE.MeshStandardMaterial({ color: 0xcc4444, metalness: 0.7, roughness: 0.3 })
);
clawBase.add(clawHub);

// Claw fingers (3 fingers)
const fingerMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.8, roughness: 0.2 });
const fingers = [];
const fingerPivots = [];

for (let i = 0; i < 3; i++) {
    const angle = (i / 3) * Math.PI * 2;
    const pivot = new THREE.Group();
    pivot.position.set(Math.cos(angle) * 0.12, -0.1, Math.sin(angle) * 0.12);
    pivot.rotation.y = -angle;

    const finger = new THREE.Mesh(
        new THREE.BoxGeometry(0.08, 0.6, 0.08),
        fingerMat
    );
    finger.position.set(0, -0.3, 0);

    // Finger tip
    const tip = new THREE.Mesh(
        new THREE.BoxGeometry(0.1, 0.15, 0.1),
        new THREE.MeshStandardMaterial({ color: 0xff6644, metalness: 0.6, roughness: 0.3 })
    );
    tip.position.set(0, -0.35, 0);
    finger.add(tip);

    pivot.add(finger);
    clawBase.add(pivot);
    fingers.push(finger);
    fingerPivots.push(pivot);
}

// Set claw open state
function setClawOpen(open) {
    const targetAngle = open ? 0.4 : 0.0;
    fingerPivots.forEach((pivot, i) => {
        const angle = (i / 3) * Math.PI * 2;
        if (open) {
            pivot.rotation.x = Math.cos(angle + Math.PI / 2) * targetAngle;
            pivot.rotation.z = Math.sin(angle + Math.PI / 2) * targetAngle;
        } else {
            pivot.rotation.x = 0;
            pivot.rotation.z = 0;
        }
    });
    state.clawOpen = open;
}

setClawOpen(true);

// ============ LANTERNS (PRIZES) ============
const lanterns = [];
const lanternData = [];
let lanternTemplate = null;

function randomFloorPos() {
    return {
        x: (Math.random() - 0.5) * 7,
        z: (Math.random() - 0.5) * 7
    };
}

function createFallbackLantern() {
    const group = new THREE.Group();

    // Lantern body
    const bodyGeo = new THREE.CylinderGeometry(0.3, 0.35, 0.6, 8);
    const bodyMat = new THREE.MeshStandardMaterial({
        color: 0xff3300,
        emissive: 0xff2200,
        emissiveIntensity: 0.3,
        roughness: 0.4,
        metalness: 0.1
    });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.4;
    group.add(body);

    // Top cap
    const topGeo = new THREE.CylinderGeometry(0.15, 0.3, 0.15, 8);
    const capMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, metalness: 0.6, roughness: 0.3 });
    const top = new THREE.Mesh(topGeo, capMat);
    top.position.y = 0.75;
    group.add(top);

    // Bottom cap
    const botGeo = new THREE.CylinderGeometry(0.35, 0.2, 0.15, 8);
    const bot = new THREE.Mesh(botGeo, capMat);
    bot.position.y = 0.05;
    group.add(bot);

    // Handle
    const handleGeo = new THREE.TorusGeometry(0.12, 0.02, 8, 16, Math.PI);
    const handleMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, metalness: 0.8 });
    const handle = new THREE.Mesh(handleGeo, handleMat);
    handle.position.y = 0.85;
    handle.rotation.x = Math.PI;
    group.add(handle);

    // Inner glow
    const glowGeo = new THREE.SphereGeometry(0.2, 8, 8);
    const glowMat = new THREE.MeshStandardMaterial({
        color: 0xffaa00,
        emissive: 0xffaa00,
        emissiveIntensity: 0.8,
        transparent: true,
        opacity: 0.6
    });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    glow.position.y = 0.4;
    group.add(glow);

    // Point light inside
    const light = new THREE.PointLight(0xff6600, 0.3, 3);
    light.position.y = 0.4;
    group.add(light);

    return group;
}

// Try loading GLTF, fall back to procedural lanterns
const loader = new GLTFLoader();

function initLanterns() {
    for (let i = 0; i < 5; i++) {
        const lantern = createFallbackLantern();
        lantern.scale.set(0.5, 0.5, 0.5);
        const pos = randomFloorPos();
        lantern.position.set(pos.x, 0.5, pos.z);
        lantern.rotation.y = Math.random() * Math.PI * 2;
        scene.add(lantern);
        lanterns.push(lantern);
        lanternData.push({
            mesh: lantern,
            inMachine: true,
            grabbed: false,
            scored: false
        });
    }
    updateLanternPositions();
}

// Try to load the GLB model
let useGLTF = false;
loader.load(
    'Lantern.glb',
    (gltf) => {
        lanternTemplate = gltf.scene;
        useGLTF = true;
        // Replace fallback lanterns with GLTF ones
        lanternData.forEach((data, i) => {
            const oldMesh = data.mesh;
            const pos = oldMesh.position.clone();
            const rot = oldMesh.rotation.clone();
            scene.remove(oldMesh);

            const newLantern = lanternTemplate.clone();
            newLantern.scale.set(0.5, 0.5, 0.5);
            newLantern.position.copy(pos);
            newLantern.rotation.copy(rot);
            newLantern.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(newLantern);
            lanterns[i] = newLantern;
            data.mesh = newLantern;
        });
        updateLanternPositions();
    },
    undefined,
    (error) => {
        console.log('GLB not found, using procedural lanterns');
    }
);

initLanterns();

function updateLanternPositions() {
    state.lanternPositions = lanternData
        .filter(d => d.inMachine && !d.grabbed)
        .map(d => ({
            x: parseFloat(d.mesh.position.x.toFixed(2)),
            y: parseFloat(d.mesh.position.y.toFixed(2)),
            z: parseFloat(d.mesh.position.z.toFixed(2))
        }));
    state.lanternsRemaining = lanternData.filter(d => d.inMachine && !d.scored).length;
}

// ============ INPUT ============
const keys = {};
window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Space') {
        e.preventDefault();
        initiateDropSequence();
    }
    if (e.code === 'KeyR') {
        resetGame();
    }
});
window.addEventListener('keyup', (e) => { keys[e.code] = false; });

// ============ UI ELEMENTS ============
const scoreDisplay = document.getElementById('score-display');
const coinsDisplay = document.getElementById('coins-display');
const clawPosDisplay = document.getElementById('claw-pos');
const gameOverDisplay = document.getElementById('game-over');
const startBtn = document.getElementById('start-btn');
const dropBtn = document.getElementById('drop-btn');

startBtn.addEventListener('click', () => {
    if (!state.gameStarted) {
        state.gameStarted = true;
        startBtn.textContent = 'PLAYING';
        startBtn.disabled = true;
        dropBtn.disabled = false;
    }
});

dropBtn.addEventListener('click', () => {
    initiateDropSequence();
});

// ============ GAME LOGIC ============
let clawTargetX = 0;
let clawTargetZ = 0;
let dropPhase = 0; // 0=idle, 1=descending, 2=grabbing, 3=ascending, 4=delivering, 5=releasing
let dropTimer = 0;
let grabbedLanternRef = null;
let grabOffsetY = 0;

function initiateDropSequence() {
    if (!state.gameStarted || state.dropSequenceActive || state.gameOver) return;
    if (state.coins <= 0) return;

    state.coins--;
    state.totalDrops++;
    state.dropSequenceActive = true;
    dropPhase = 1;
    state.clawState = 'descending';
    dropBtn.disabled = true;
}

function clamp(val, min, max) {
    return Math.max(min, Math.min(max, val));
}

function safeNum(val) {
    return isNaN(val) ? 0 : val;
}

// ============ UPDATE ============
const clock = new THREE.Clock();

function update() {
    const dt = Math.min(clock.getDelta(), 0.05);

    if (state.gameStarted && !state.gameOver) {
        // Claw movement (only when idle)
        if (!state.dropSequenceActive) {
            let moved = false;
            if (keys['ArrowLeft']) { state.clawX -= 3 * dt; moved = true; }
            if (keys['ArrowRight']) { state.clawX += 3 * dt; moved = true; }
            if (keys['ArrowUp']) { state.clawZ -= 3 * dt; moved = true; }
            if (keys['ArrowDown']) { state.clawZ += 3 * dt; moved = true; }

            state.clawX = clamp(safeNum(state.clawX), -4, 4);
            state.clawZ = clamp(safeNum(state.clawZ), -4, 4);
            state.clawState = moved ? 'moving' : 'idle';
        }

        // Drop sequence
        if (state.dropSequenceActive) {
            switch (dropPhase) {
                case 1: // Descending
                    state.clawY -= 4 * dt;
                    if (state.clawY <= 1.5) {
                        state.clawY = 1.5;
                        dropPhase = 2;
                        dropTimer = 0;
                        state.clawState = 'grabbing';
                    }
                    break;

                case 2: // Grabbing (close claw)
                    dropTimer += dt;
                    setClawOpen(false);
                    if (dropTimer > 0.5) {
                        // Check for grab
                        checkGrab();
                        dropPhase = 3;
                        state.clawState = 'ascending';
                    }
                    break;

                case 3: // Ascending
                    state.clawY += 4 * dt;
                    if (grabbedLanternRef) {
                        updateGrabbedLanternPosition();
                    }
                    if (state.clawY >= 9.0) {
                        state.clawY = 9.0;
                        dropPhase = 4;
                        state.clawState = 'delivering';
                    }
                    break;

                case 4: // Delivering (move to drop zone)
                    state.clawX += 3 * dt;
                    if (grabbedLanternRef) {
                        updateGrabbedLanternPosition();
                    }
                    if (state.clawX >= 5.5) {
                        state.clawX = 5.5;
                        dropPhase = 5;
                        dropTimer = 0;
                        state.clawState = 'releasing';
                    }
                    break;

                case 5: // Releasing
                    dropTimer += dt;
                    setClawOpen(true);
                    if (dropTimer > 0.3) {
                        if (grabbedLanternRef) {
                            // Score!
                            state.score++;
                            grabbedLanternRef.scored = true;
                            grabbedLanternRef.inMachine = false;
                            // Move lantern to chute area
                            grabbedLanternRef.mesh.position.set(7, 2.5, 0);
                            grabbedLanternRef.grabbed = false;
                            grabbedLanternRef = null;
                            state.grabbedLantern = false;
                        }
                        // Return claw to center
                        dropPhase = 6;
                        state.clawState = 'idle';
                    }
                    break;

                case 6: // Return to play area
                    // Move back to 0,0
                    const returnSpeed = 4;
                    if (Math.abs(state.clawX) > 0.05) {
                        state.clawX -= Math.sign(state.clawX) * returnSpeed * dt;
                        if (Math.abs(state.clawX) < 0.05) state.clawX = 0;
                    } else {
                        state.clawX = 0;
                        state.dropSequenceActive = false;
                        dropPhase = 0;
                        state.clawState = 'idle';

                        // Check game over
                        if (state.coins <= 0) {
                            state.gameOver = true;
                            gameOverDisplay.style.display = 'block';
                            dropBtn.disabled = true;
                        } else {
                            dropBtn.disabled = false;
                        }
                    }
                    break;
            }
        }
    }

    // Clamp all values
    state.clawX = clamp(safeNum(state.clawX), -5.5, 5.5);
    state.clawZ = clamp(safeNum(state.clawZ), -4, 4);
    state.clawY = clamp(safeNum(state.clawY), 1.5, 9.0);

    // Update visual positions
    railZGroup.position.x = state.clawX <= 4 ? state.clawX : 4;
    trolleyGroup.position.z = state.clawZ;
    railZGroup.position.z = 0;

    // If delivering beyond machine, move the whole group
    if (state.clawX > 4) {
        railZGroup.position.x = state.clawX;
    }

    // Cable length
    const cableLength = 9.5 - state.clawY;
    cable.scale.y = cableLength;
    cable.position.y = -cableLength / 2;

    // Claw base position
    clawBase.position.y = -cableLength - 0.15;

    // Update state display values
    state.clawX = parseFloat(safeNum(state.clawX).toFixed(2));
    state.clawZ = parseFloat(safeNum(state.clawZ).toFixed(2));
    state.clawY = parseFloat(safeNum(state.clawY).toFixed(2));

    updateLanternPositions();

    // Animate lanterns (gentle bob)
    const time = clock.elapsedTime;
    lanternData.forEach((data, i) => {
        if (data.inMachine && !data.grabbed) {
            data.mesh.rotation.y += dt * 0.3;
        }
    });

    // Update UI
    scoreDisplay.textContent = `Score: ${state.score}`;
    coinsDisplay.textContent = `Coins: ${state.coins}`;
    clawPosDisplay.textContent = `X: ${state.clawX.toFixed(2)} Z: ${state.clawZ.toFixed(2)}`;
}

function checkGrab() {
    const clawWorldX = state.clawX;
    const clawWorldZ = state.clawZ;

    for (let i = 0; i < lanternData.length; i++) {
        const data = lanternData[i];
        if (!data.inMachine || data.grabbed || data.scored) continue;

        const dx = data.mesh.position.x - clawWorldX;
        const dz = data.mesh.position.z - clawWorldZ;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist < 1.2) {
            data.grabbed = true;
            grabbedLanternRef = data;
            state.grabbedLantern = true;
            grabOffsetY = data.mesh.position.y - state.clawY;
            updateGrabbedLanternPosition();
            break;
        }
    }
}

function updateGrabbedLanternPosition() {
    if (grabbedLanternRef) {
        grabbedLanternRef.mesh.position.x = state.clawX;
        grabbedLanternRef.mesh.position.z = state.clawZ;
        grabbedLanternRef.mesh.position.y = state.clawY - 0.5;
    }
}

function resetGame() {
    state.gameStarted = false;
    state.clawX = 0;
    state.clawZ = 0;
    state.clawY = 9.0;
    state.clawState = 'idle';
    state.clawOpen = true;
    state.score = 0;
    state.coins = 3;
    state.gameOver = false;
    state.dropSequenceActive = false;
    state.totalDrops = 0;
    state.grabbedLantern = false;
    dropPhase = 0;
    grabbedLanternRef = null;

    setClawOpen(true);

    // Reset lanterns
    lanternData.forEach((data, i) => {
        data.inMachine = true;
        data.grabbed = false;
        data.scored = false;
        const pos = randomFloorPos();
        data.mesh.position.set(pos.x, 0.5, pos.z);
        data.mesh.rotation.y = Math.random() * Math.PI * 2;
    });

    updateLanternPositions();

    gameOverDisplay.style.display = 'none';
    startBtn.textContent = 'INSERT COIN';
    startBtn.disabled = false;
    dropBtn.disabled = true;
}

// ============ DECORATIONS ============
// Machine base/stand
const standGeo = new THREE.BoxGeometry(11, 0.5, 11);
const standMat = new THREE.MeshStandardMaterial({ color: 0x333366, metalness: 0.5, roughness: 0.5 });
const stand = new THREE.Mesh(standGeo, standMat);
stand.position.set(0, -0.25, 0);
stand.receiveShadow = true;
scene.add(stand);

// Neon trim at top
const neonGeo = new THREE.BoxGeometry(10.2, 0.15, 10.2);
const neonMat = new THREE.MeshStandardMaterial({
    color: 0xff00ff,
    emissive: 0xff00ff,
    emissiveIntensity: 0.5
});
const neonTrim = new THREE.Mesh(neonGeo, neonMat);
neonTrim.position.set(0, 10.1, 0);
scene.add(neonTrim);

// Bottom neon
const neonTrim2 = new THREE.Mesh(neonGeo, new THREE.MeshStandardMaterial({
    color: 0x00ffff,
    emissive: 0x00ffff,
    emissiveIntensity: 0.3
}));
neonTrim2.position.set(0, 0.05, 0);
scene.add(neonTrim2);

// Corner posts
for (let x of [-5, 5]) {
    for (let z of [-5, 5]) {
        const postGeo = new THREE.CylinderGeometry(0.12, 0.12, 10, 8);
        const postMat = new THREE.MeshStandardMaterial({ color: 0x666699, metalness: 0.8, roughness: 0.2 });
        const post = new THREE.Mesh(postGeo, postMat);
        post.position.set(x, 5, z);
        scene.add(post);
    }
}

// ============ ORBIT CONTROLS (limited) ============
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minDistance = 8;
controls.maxDistance = 25;
controls.target.set(0, 4, 0);

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============
function animate() {
    requestAnimationFrame(animate);
    update();
    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>
