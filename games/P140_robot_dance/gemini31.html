<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Dance Choreographer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 10;
            pointer-events: none;
            border: 1px solid #333;
        }
        #hud div { margin-bottom: 5px; font-size: 14px; }
        #hud span { font-weight: bold; color: #4CAF50; }
        
        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid #333;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .control-group label { font-size: 12px; color: #aaa; }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #45a049; }
        input[type="range"] { width: 150px; }

        #timeline-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: rgba(20, 20, 20, 0.9);
            border-top: 1px solid #444;
            z-index: 10;
            display: flex;
            flex-direction: column;
            padding: 10px 20px;
            box-sizing: border-box;
        }
        .timeline-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
        }
        #timeline {
            position: relative;
            width: 100%;
            height: 40px;
            background: #333;
            border-radius: 4px;
            cursor: pointer;
            overflow: hidden;
        }
        #playhead {
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background: #ff3b30;
            z-index: 5;
            pointer-events: none;
        }
        .keyframe-marker {
            position: absolute;
            top: 0;
            width: 10px;
            height: 10px;
            background: #ffcc00;
            border-radius: 50%;
            transform: translateX(-50%);
            z-index: 4;
            pointer-events: none;
            border: 2px solid #222;
        }
        .keyframe-label {
            position: absolute;
            top: 15px;
            font-size: 10px;
            color: #ffcc00;
            transform: translateX(-50%);
            white-space: nowrap;
            pointer-events: none;
        }

        #popup-menu {
            position: absolute;
            background: #2a2a2a;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 5px 0;
            display: none;
            z-index: 20;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            min-width: 120px;
        }
        #popup-menu div {
            padding: 8px 15px;
            cursor: pointer;
            font-size: 13px;
        }
        #popup-menu div:hover { background: #4CAF50; }

        #beat-indicator-container {
            position: absolute;
            bottom: 120px;
            right: 30px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #beat-indicator {
            width: 20px;
            height: 20px;
            background: #00bcd4;
            border-radius: 50%;
            opacity: 0.3;
            transition: transform 0.1s ease-out, opacity 0.1s ease-out;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud">
        <div>Time: <span id="currentTime">0.00</span> s</div>
        <div>State: <span id="playState">Paused</span></div>
        <div>Keyframes: <span id="keyframeCount">0</span></div>
        <div>BPM: <span id="bpmValue">120</span></div>
        <div>Current Anim: <span id="currentAnimDisplay">None</span></div>
    </div>

    <div id="controls">
        <button id="playBtn">Play</button>
        <div class="control-group">
            <label>Speed: <span id="speedVal">1.0</span>x</label>
            <input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label>BPM: <span id="bpmValLabel">120</span></label>
            <input type="range" id="bpmSlider" min="60" max="180" step="1" value="120">
        </div>
    </div>

    <div id="beat-indicator-container">
        <div id="beat-indicator"></div>
    </div>

    <div id="timeline-container">
        <div class="timeline-header">
            <span>0s</span>
            <span>Timeline (10s) - Click to add keyframe</span>
            <span>10s</span>
        </div>
        <div id="timeline">
            <div id="playhead"></div>
        </div>
    </div>

    <div id="popup-menu"></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            currentTime: 0,
            isPlaying: false,
            keyframeCount: 0,
            bpm: 120,
            currentAnim: '',
            speed: 1.0
        };

        const DURATION = 10;
        let keyframes = [];
        let availableAnimations = [];
        let gltfAnimations = [];
        let mixer = null;
        let currentAction = null;
        let pendingKeyframeTime = 0;
        let beatTimer = 0;

        // --- DOM Elements ---
        const ui = {
            currentTime: document.getElementById('currentTime'),
            playState: document.getElementById('playState'),
            keyframeCount: document.getElementById('keyframeCount'),
            bpmValue: document.getElementById('bpmValue'),
            currentAnimDisplay: document.getElementById('currentAnimDisplay'),
            playBtn: document.getElementById('playBtn'),
            speedSlider: document.getElementById('speedSlider'),
            speedVal: document.getElementById('speedVal'),
            bpmSlider: document.getElementById('bpmSlider'),
            bpmValLabel: document.getElementById('bpmValLabel'),
            timeline: document.getElementById('timeline'),
            playhead: document.getElementById('playhead'),
            popupMenu: document.getElementById('popup-menu'),
            beatIndicator: document.getElementById('beat-indicator')
        };

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.Fog(0x1a1a1a, 10, 50);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        scene.add(dirLight);

        // Grid
        const grid = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
        scene.add(grid);

        // --- Load Model ---
        const loader = new GLTFLoader();
        loader.load('assets/robot.glb', (gltf) => {
            const model = gltf.scene;
            
            // Center model
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            model.position.x = -center.x;
            model.position.y = -box.min.y; // Place on ground
            model.position.z = -center.z;
            
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(model);
            window.__3D_STATE__.modelLoaded = true;

            // Animations
            gltfAnimations = gltf.animations;
            if (gltfAnimations && gltfAnimations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                availableAnimations = gltfAnimations.map(a => a.name);
                
                // Play first animation by default if no keyframes
                playAnimation(availableAnimations[0]);
            } else {
                console.warn("No animations found in model.");
            }
        }, undefined, (error) => {
            console.error("Error loading model:", error);
            // Fallback: Create a dummy box if model fails to load so UI still works
            const geo = new THREE.BoxGeometry(1, 2, 1);
            const mat = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = 1;
            scene.add(mesh);
            window.__3D_STATE__.modelLoaded = true;
        });

        // --- Animation Logic ---
        function playAnimation(animName) {
            if (!mixer || !gltfAnimations.length) return;
            if (window.__3D_STATE__.currentAnim === animName) return;

            const clip = gltfAnimations.find(a => a.name === animName);
            if (!clip) return;

            const nextAction = mixer.clipAction(clip);
            nextAction.reset();
            nextAction.setEffectiveTimeScale(1);
            nextAction.setEffectiveWeight(1);
            nextAction.play();

            if (currentAction) {
                currentAction.crossFadeTo(nextAction, 0.3, true);
            }

            currentAction = nextAction;
            window.__3D_STATE__.currentAnim = animName;
            ui.currentAnimDisplay.innerText = animName;
        }

        // --- Timeline & Keyframes ---
        ui.timeline.addEventListener('click', (e) => {
            if (e.target !== ui.timeline && e.target.id !== 'playhead') return;
            
            const rect = ui.timeline.getBoundingClientRect();
            const x = e.clientX - rect.left;
            pendingKeyframeTime = (x / rect.width) * DURATION;
            
            showPopupMenu(e.clientX, e.clientY);
        });

        function showPopupMenu(x, y) {
            if (availableAnimations.length === 0) {
                alert("No animations available in this model.");
                return;
            }
            
            ui.popupMenu.innerHTML = '';
            availableAnimations.forEach(anim => {
                const div = document.createElement('div');
                div.innerText = anim;
                div.onclick = () => addKeyframe(pendingKeyframeTime, anim);
                ui.popupMenu.appendChild(div);
            });
            
            ui.popupMenu.style.display = 'block';
            ui.popupMenu.style.left = `${x}px`;
            
            // Adjust Y to not go off screen
            const menuHeight = availableAnimations.length * 30;
            if (y + menuHeight > window.innerHeight) {
                ui.popupMenu.style.top = `${y - menuHeight}px`;
            } else {
                ui.popupMenu.style.top = `${y}px`;
            }
        }

        document.addEventListener('click', (e) => {
            if (!ui.popupMenu.contains(e.target) && e.target !== ui.timeline) {
                ui.popupMenu.style.display = 'none';
            }
        });

        function addKeyframe(time, animName) {
            ui.popupMenu.style.display = 'none';
            
            // Check if keyframe exists near this time, replace it
            const existingIdx = keyframes.findIndex(kf => Math.abs(kf.time - time) < 0.1);
            if (existingIdx > -1) {
                keyframes[existingIdx].marker.remove();
                keyframes[existingIdx].label.remove();
                keyframes.splice(existingIdx, 1);
            }

            const marker = document.createElement('div');
            marker.className = 'keyframe-marker';
            marker.style.left = `${(time / DURATION) * 100}%`;
            
            const label = document.createElement('div');
            label.className = 'keyframe-label';
            label.style.left = `${(time / DURATION) * 100}%`;
            label.innerText = animName;

            ui.timeline.appendChild(marker);
            ui.timeline.appendChild(label);

            keyframes.push({ time, animName, marker, label });
            keyframes.sort((a, b) => a.time - b.time);
            
            window.__3D_STATE__.keyframeCount = keyframes.length;
            
            // If paused and we add a keyframe, jump to it and play it
            if (!window.__3D_STATE__.isPlaying) {
                window.__3D_STATE__.currentTime = time;
                playAnimation(animName);
            }
        }

        // --- Controls ---
        ui.playBtn.addEventListener('click', () => {
            window.__3D_STATE__.isPlaying = !window.__3D_STATE__.isPlaying;
            ui.playBtn.innerText = window.__3D_STATE__.isPlaying ? 'Pause' : 'Play';
            ui.playBtn.style.background = window.__3D_STATE__.isPlaying ? '#ff9800' : '#4CAF50';
        });

        ui.speedSlider.addEventListener('input', (e) => {
            const speed = parseFloat(e.target.value);
            window.__3D_STATE__.speed = speed;
            ui.speedVal.innerText = speed.toFixed(1);
            if (mixer) mixer.timeScale = speed;
        });

        ui.bpmSlider.addEventListener('input', (e) => {
            const bpm = parseInt(e.target.value);
            window.__3D_STATE__.bpm = bpm;
            ui.bpmValLabel.innerText = bpm;
        });

        // --- Main Loop ---
        const clock = new THREE.Clock();
        let prevTime = 0;

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const state = window.__3D_STATE__;

            if (state.isPlaying) {
                prevTime = state.currentTime;
                // Time advances based on real time, speed affects mixer but let's make it affect timeline too
                state.currentTime += delta * state.speed;

                let looped = false;
                if (state.currentTime >= DURATION) {
                    state.currentTime %= DURATION;
                    looped = true;
                }

                // Check Keyframes
                keyframes.forEach(kf => {
                    let triggered = false;
                    if (!looped) {
                        if (prevTime <= kf.time && state.currentTime > kf.time) triggered = true;
                    } else {
                        if (prevTime <= kf.time && kf.time <= DURATION) triggered = true;
                        if (0 <= kf.time && kf.time < state.currentTime) triggered = true;
                    }

                    if (triggered) {
                        playAnimation(kf.animName);
                    }
                });

                // Beat Indicator
                const beatInterval = 60 / state.bpm;
                beatTimer += delta * state.speed;
                if (beatTimer >= beatInterval) {
                    beatTimer %= beatInterval;
                    triggerBeat();
                }
            }

            // Update Mixer
            if (mixer) {
                mixer.update(delta * (state.isPlaying ? 1 : 0)); // Only update mixer if playing, or handle speed internally
            }

            // Update UI
            ui.playhead.style.left = `${(state.currentTime / DURATION) * 100}%`;
            ui.currentTime.innerText = state.currentTime.toFixed(2);
            ui.playState.innerText = state.isPlaying ? 'Playing' : 'Paused';
            ui.keyframeCount.innerText = state.keyframeCount;
            ui.bpmValue.innerText = state.bpm;

            controls.update();
            renderer.render(scene, camera);
        }

        function triggerBeat() {
            ui.beatIndicator.style.transform = 'scale(1.8)';
            ui.beatIndicator.style.opacity = '1';
            ui.beatIndicator.style.background = '#fff';
            
            setTimeout(() => {
                ui.beatIndicator.style.transform = 'scale(1)';
                ui.beatIndicator.style.opacity = '0.3';
                ui.beatIndicator.style.background = '#00bcd4';
            }, 100);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
