<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 机器人舞蹈编排器</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0f1115;
      color: #e8ecf1;
      font-family: Arial, Helvetica, sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 12px;
      border-radius: 10px;
      line-height: 1.7;
      font-size: 14px;
      min-width: 220px;
      backdrop-filter: blur(4px);
    }

    #controls {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 260px;
      backdrop-filter: blur(4px);
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .row label {
      min-width: 70px;
      font-size: 13px;
      color: #cfd7e3;
    }

    button, select, input[type="range"] {
      cursor: pointer;
    }

    button {
      background: #2e7df6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
    }

    button:hover {
      background: #4e92f7;
    }

    #beatWrap {
      position: absolute;
      right: 24px;
      bottom: 120px;
      z-index: 15;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #beatPulse {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #ff4d6d;
      box-shadow: 0 0 0 rgba(255, 77, 109, 0.65);
      transform: scale(1);
    }

    #beatPulse.pulse {
      animation: pulseAnim var(--pulse-duration, 0.5s) ease-out;
    }

    @keyframes pulseAnim {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.8);
      }
      70% {
        transform: scale(1.5);
        box-shadow: 0 0 0 22px rgba(255, 77, 109, 0);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 77, 109, 0);
      }
    }

    #timelineWrap {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: min(92vw, 1100px);
      z-index: 20;
    }

    #timelineLabel {
      font-size: 13px;
      margin-bottom: 8px;
      color: #cfd7e3;
    }

    #timeline {
      position: relative;
      width: 100%;
      height: 72px;
      border-radius: 12px;
      background:
        linear-gradient(to right, rgba(255,255,255,0.08) 1px, transparent 1px) 0 0 / 10% 100%,
        linear-gradient(to top, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.12);
      overflow: hidden;
      user-select: none;
    }

    #playhead {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #00e5ff;
      pointer-events: none;
      box-shadow: 0 0 8px rgba(0, 229, 255, 0.75);
    }

    .tick-label {
      position: absolute;
      top: 4px;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      transform: translateX(-50%);
      pointer-events: none;
    }

    .keyframe {
      position: absolute;
      bottom: 12px;
      width: 14px;
      height: 14px;
      background: #ffd166;
      border: 2px solid #222;
      transform: translateX(-50%) rotate(45deg);
      border-radius: 2px;
      cursor: pointer;
    }

    .keyframe.active {
      background: #06d6a0;
    }

    .keyframe::after {
      content: attr(data-name);
      position: absolute;
      transform: rotate(-45deg);
      left: 14px;
      top: -2px;
      white-space: nowrap;
      font-size: 11px;
      color: #fff;
      background: rgba(0,0,0,0.65);
      padding: 2px 6px;
      border-radius: 4px;
    }

    #keyframeMenu {
      position: absolute;
      z-index: 50;
      display: none;
      background: rgba(16, 18, 24, 0.95);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px;
      min-width: 220px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    #keyframeMenu .menu-title {
      font-size: 13px;
      margin-bottom: 8px;
      color: #cfd7e3;
    }

    #keyframeMenu select {
      width: 100%;
      padding: 6px;
      border-radius: 6px;
      border: none;
      margin-bottom: 8px;
    }

    #keyframeMenu .menu-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    #clipList {
      margin-top: 6px;
      font-size: 12px;
      color: #b5c0d0;
      max-width: 280px;
      word-break: break-word;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <div>当前时间：<span id="currentTime">0.00</span>s</div>
    <div>播放状态：<span id="playState">Paused</span></div>
    <div>关键帧数量：<span id="keyframeCount">0</span></div>
    <div>BPM：<span id="bpmValue">120</span></div>
  </div>

  <div id="controls">
    <div class="row">
      <button id="playBtn">Play</button>
    </div>
    <div class="row">
      <label for="speedSlider">速度</label>
      <input id="speedSlider" type="range" min="0.5" max="2" step="0.01" value="1" />
      <span id="speedValue">1.00x</span>
    </div>
    <div class="row">
      <label for="bpmSlider">BPM</label>
      <input id="bpmSlider" type="range" min="60" max="180" step="1" value="120" />
    </div>
    <div id="clipList">动画剪辑：加载中...</div>
  </div>

  <div id="beatWrap">
    <div id="beatPulse"></div>
  </div>

  <div id="timelineWrap">
    <div id="timelineLabel">时间线（10 秒，点击添加关键帧）</div>
    <div id="timeline"></div>
  </div>

  <div id="keyframeMenu">
    <div class="menu-title">选择动画剪辑</div>
    <select id="clipSelect"></select>
    <div class="menu-actions">
      <button id="deleteKeyframeBtn" style="background:#d64545;">删除</button>
      <button id="saveKeyframeBtn">保存</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const DURATION = 10;

    const app = document.getElementById('app');
    const timeline = document.getElementById('timeline');
    const playhead = document.createElement('div');
    playhead.id = 'playhead';
    timeline.appendChild(playhead);

    const playBtn = document.getElementById('playBtn');
    const speedSlider = document.getElementById('speedSlider');
    const bpmSlider = document.getElementById('bpmSlider');
    const currentTimeEl = document.getElementById('currentTime');
    const playStateEl = document.getElementById('playState');
    const keyframeCountEl = document.getElementById('keyframeCount');
    const bpmValueEl = document.getElementById('bpmValue');
    const speedValueEl = document.getElementById('speedValue');
    const clipListEl = document.getElementById('clipList');

    const keyframeMenu = document.getElementById('keyframeMenu');
    const clipSelect = document.getElementById('clipSelect');
    const saveKeyframeBtn = document.getElementById('saveKeyframeBtn');
    const deleteKeyframeBtn = document.getElementById('deleteKeyframeBtn');
    const beatPulse = document.getElementById('beatPulse');

    let scene, camera, renderer, controls, clock;
    let mixer = null;
    let robot = null;
    let animations = [];
    let actions = new Map();
    let currentAction = null;
    let currentAnim = '';
    let modelLoaded = false;

    let currentTime = 0;
    let isPlaying = false;
    let speed = parseFloat(speedSlider.value);
    let bpm = parseInt(bpmSlider.value, 10);

    let keyframes = [];
    let selectedKeyframeId = null;
    let keyframeIdCounter = 0;
    let lastTriggeredKeyframeId = null;

    let beatAccumulator = 0;
    let lastBeatIndex = -1;

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x101820);

      camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 1.7, 4.5);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      app.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 1, 0);
      controls.enableDamping = true;

      clock = new THREE.Clock();

      const hemi = new THREE.HemisphereLight(0xffffff, 0x223344, 1.2);
      scene.add(hemi);

      const dir = new THREE.DirectionalLight(0xffffff, 1.8);
      dir.position.set(5, 10, 7);
      scene.add(dir);

      const grid = new THREE.GridHelper(20, 20, 0x3a4a5a, 0x24303c);
      scene.add(grid);

      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 20),
        new THREE.MeshStandardMaterial({ color: 0x161b22, roughness: 1 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = -0.001;
      scene.add(floor);

      createTimelineTicks();
      setupEvents();
      updatePulseDuration();

      loadModel();
      updateHUD();
      updateState();
    }

    function loadModel() {
      const loader = new GLTFLoader();
      loader.load(
        'assets/robot.glb',
        (gltf) => {
          robot = gltf.scene;
          animations = gltf.animations || [];

          const box = new THREE.Box3().setFromObject(robot);
          const center = new THREE.Vector3();
          box.getCenter(center);
          robot.position.sub(center);

          box.setFromObject(robot);
          robot.position.y -= box.min.y;

          scene.add(robot);

          mixer = new THREE.AnimationMixer(robot);

          animations.forEach((clip) => {
            const action = mixer.clipAction(clip);
            action.loop = THREE.LoopRepeat;
            action.clampWhenFinished = false;
            actions.set(clip.name, action);
          });

          console.log('可用动画剪辑名称:');
          animations.forEach((clip) => console.log('-', clip.name));

          clipListEl.textContent = animations.length
            ? `动画剪辑：${animations.map(c => c.name).join('，')}`
            : '动画剪辑：无';

          refreshClipSelect();

          if (animations.length > 0) {
            playAnimationByName(animations[0].name, 0);
          }

          modelLoaded = true;
          updateState();
        },
        undefined,
        (err) => {
          console.error('模型加载失败:', err);
          clipListEl.textContent = '动画剪辑：模型加载失败，请检查 assets/robot.glb';
        }
      );
    }

    function createTimelineTicks() {
      for (let i = 0; i <= DURATION; i++) {
        const label = document.createElement('div');
        label.className = 'tick-label';
        label.style.left = `${(i / DURATION) * 100}%`;
        label.textContent = `${i}s`;
        timeline.appendChild(label);
      }
    }

    function setupEvents() {
      window.addEventListener('resize', onResize);

      playBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        updateHUD();
      });

      speedSlider.addEventListener('input', () => {
        speed = parseFloat(speedSlider.value);
        speedValueEl.textContent = `${speed.toFixed(2)}x`;
      });

      bpmSlider.addEventListener('input', () => {
        bpm = parseInt(bpmSlider.value, 10);
        bpmValueEl.textContent = String(bpm);
        updatePulseDuration();
      });

      timeline.addEventListener('click', (e) => {
        if (e.target.classList.contains('keyframe')) return;

        const rect = timeline.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const time = THREE.MathUtils.clamp((x / rect.width) * DURATION, 0, DURATION);
        openKeyframeMenu(e.clientX, e.clientY, null, time);
      });

      saveKeyframeBtn.addEventListener('click', () => {
        const clipName = clipSelect.value;
        if (!clipName) return;

        if (selectedKeyframeId === null) {
          const time = parseFloat(keyframeMenu.dataset.time);
          keyframes.push({
            id: ++keyframeIdCounter,
            time,
            clipName
          });
        } else {
          const kf = keyframes.find(k => k.id === selectedKeyframeId);
          if (kf) kf.clipName = clipName;
        }

        keyframes.sort((a, b) => a.time - b.time);
        renderKeyframes();
        closeKeyframeMenu();
        updateHUD();
      });

      deleteKeyframeBtn.addEventListener('click', () => {
        if (selectedKeyframeId !== null) {
          keyframes = keyframes.filter(k => k.id !== selectedKeyframeId);
          renderKeyframes();
          updateHUD();
        }
        closeKeyframeMenu();
      });

      document.addEventListener('click', (e) => {
        if (!keyframeMenu.contains(e.target) && e.target !== timeline && !e.target.classList.contains('keyframe')) {
          closeKeyframeMenu();
        }
      });
    }

    function openKeyframeMenu(x, y, keyframe = null, time = 0) {
      selectedKeyframeId = keyframe ? keyframe.id : null;
      keyframeMenu.style.display = 'block';
      keyframeMenu.style.left = `${Math.min(x, window.innerWidth - 240)}px`;
      keyframeMenu.style.top = `${Math.min(y, window.innerHeight - 180)}px`;
      keyframeMenu.dataset.time = time.toFixed(3);

      refreshClipSelect();

      if (keyframe) {
        clipSelect.value = keyframe.clipName;
        deleteKeyframeBtn.style.display = 'inline-block';
      } else {
        if (animations.length > 0) clipSelect.value = animations[0].name;
        deleteKeyframeBtn.style.display = 'none';
      }
    }

    function closeKeyframeMenu() {
      keyframeMenu.style.display = 'none';
      selectedKeyframeId = null;
    }

    function refreshClipSelect() {
      clipSelect.innerHTML = '';
      animations.forEach((clip) => {
        const option = document.createElement('option');
        option.value = clip.name;
        option.textContent = clip.name;
        clipSelect.appendChild(option);
      });
    }

    function renderKeyframes() {
      timeline.querySelectorAll('.keyframe').forEach(el => el.remove());

      keyframes.forEach((kf) => {
        const el = document.createElement('div');
        el.className = 'keyframe';
        el.style.left = `${(kf.time / DURATION) * 100}%`;
        el.dataset.name = kf.clipName;
        el.title = `${kf.time.toFixed(2)}s - ${kf.clipName}`;

        if (lastTriggeredKeyframeId === kf.id) {
          el.classList.add('active');
        }

        el.addEventListener('click', (e) => {
          e.stopPropagation();
          openKeyframeMenu(e.clientX, e.clientY, kf, kf.time);
        });

        timeline.appendChild(el);
      });

      keyframeCountEl.textContent = String(keyframes.length);
    }

    function playAnimationByName(name, fadeDuration = 0.25) {
      if (!mixer || !actions.has(name)) return;

      const nextAction = actions.get(name);
      if (currentAction === nextAction) return;

      nextAction.reset();
      nextAction.enabled = true;
      nextAction.setEffectiveTimeScale(1);
      nextAction.setEffectiveWeight(1);
      nextAction.play();

      if (currentAction) {
        currentAction.crossFadeTo(nextAction, fadeDuration, false);
      } else {
        nextAction.fadeIn(fadeDuration);
      }

      currentAction = nextAction;
      currentAnim = name;
    }

    function triggerKeyframesBetween(prevTime, nextTime, looped = false) {
      if (!keyframes.length) return;

      let candidates = [];

      if (!looped) {
        candidates = keyframes.filter(kf => kf.time > prevTime && kf.time <= nextTime);
      } else {
        candidates = [
          ...keyframes.filter(kf => kf.time > prevTime && kf.time <= DURATION),
          ...keyframes.filter(kf => kf.time >= 0 && kf.time <= nextTime)
        ];
      }

      candidates.sort((a, b) => a.time - b.time);

      for (const kf of candidates) {
        playAnimationByName(kf.clipName, 0.3);
        lastTriggeredKeyframeId = kf.id;
      }

      renderKeyframes();
    }

    function updatePlayhead() {
      playhead.style.left = `${(currentTime / DURATION) * 100}%`;
    }

    function updateHUD() {
      currentTimeEl.textContent = currentTime.toFixed(2);
      playStateEl.textContent = isPlaying ? 'Playing' : 'Paused';
      keyframeCountEl.textContent = String(keyframes.length);
      bpmValueEl.textContent = String(bpm);
      playBtn.textContent = isPlaying ? 'Pause' : 'Play';
    }

    function updatePulseDuration() {
      beatPulse.style.setProperty('--pulse-duration', `${60 / bpm}s`);
    }

    function pulseBeat() {
      beatPulse.classList.remove('pulse');
      void beatPulse.offsetWidth;
      beatPulse.classList.add('pulse');
    }

    function updateBeat(delta) {
      if (!isPlaying) return;

      beatAccumulator += delta * speed;
      const beatDuration = 60 / bpm;
      const beatIndex = Math.floor(beatAccumulator / beatDuration);

      if (beatIndex !== lastBeatIndex) {
        lastBeatIndex = beatIndex;
        pulseBeat();
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (isPlaying) {
        const prevTime = currentTime;
        currentTime += delta * speed;

        let looped = false;
        if (currentTime >= DURATION) {
          currentTime = currentTime % DURATION;
          looped = true;
          lastTriggeredKeyframeId = null;
        }

        triggerKeyframesBetween(prevTime, currentTime, looped);
        updateBeat(delta);
      }

      if (mixer) {
        mixer.update(delta * speed);
      }

      controls.update();
      updatePlayhead();
      updateHUD();
      updateState();
      renderer.render(scene, camera);
    }

    function updateState() {
      window.__3D_STATE__ = {
        modelLoaded,
        currentTime: Number(currentTime.toFixed(3)),
        isPlaying,
        keyframeCount: keyframes.length,
        bpm,
        currentAnim: currentAnim || '',
        speed
      };
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
  </script>
</body>
</html>
