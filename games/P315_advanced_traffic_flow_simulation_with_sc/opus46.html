<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Traffic Flow Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.8);
    color: #fff;
    padding: 20px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 220px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    z-index: 10;
  }
  #hud h2 {
    margin-bottom: 10px;
    font-size: 18px;
    color: #ffcc00;
    border-bottom: 1px solid rgba(255, 204, 0, 0.3);
    padding-bottom: 8px;
  }
  #hud .stat {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
  }
  #hud .stat .label { color: #aaa; }
  #hud .stat .value { color: #fff; font-weight: bold; }
  #score-display { color: #ffcc00 !important; font-size: 16px !important; }
  #speed-toggle {
    position: absolute;
    top: 15px;
    right: 15px;
    padding: 12px 24px;
    font-size: 16px;
    background: rgba(0, 0, 0, 0.8);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 8px;
    cursor: pointer;
    z-index: 10;
    transition: all 0.2s;
  }
  #speed-toggle:hover { background: rgba(50, 50, 50, 0.9); border-color: #ffcc00; }
  #controls-help {
    position: absolute;
    bottom: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.7);
    color: #aaa;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.6;
    z-index: 10;
  }
  #controls-help kbd {
    background: rgba(255, 255, 255, 0.15);
    padding: 1px 6px;
    border-radius: 3px;
    color: #fff;
  }
</style>
</head>
<body>

<div id="hud">
  <h2>🚦 Traffic Simulation</h2>
  <div class="stat"><span class="label">Score:</span><span class="value" id="score-display">0</span></div>
  <div class="stat"><span class="label">Spawned:</span><span class="value" id="spawned-display">0</span></div>
  <div class="stat"><span class="label">Completed:</span><span class="value" id="completed-display">0</span></div>
  <div class="stat"><span class="label">Collisions:</span><span class="value" id="collision-display">0</span></div>
  <div class="stat"><span class="label">Phase:</span><span class="value" id="phase-display">A (N/S Green)</span></div>
  <div class="stat"><span class="label">Sim Speed:</span><span class="value" id="speed-display">1x</span></div>
  <div class="stat"><span class="label">Status:</span><span class="value" id="pause-display">Running</span></div>
</div>

<button id="speed-toggle">Speed: 1x</button>

<div id="controls-help">
  <kbd>Space</kbd> Toggle lights &nbsp;
  <kbd>S</kbd> Spawn vehicle &nbsp;
  <kbd>P</kbd> Pause/Resume &nbsp;
  <kbd>R</kbd> Reset
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.157.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
window.__3D_STATE__ = {
  score: 0,
  vehiclesSpawned: 0,
  vehiclesCompleted: 0,
  collisions: 0,
  trafficPhase: 'A',
  paused: false,
  simSpeed: 1,
  vehicleCount: 0,
  monumentLoaded: false,
  monument: null,
  elapsedTime: 0,
  lightCycleTimer: 8
};

const state = window.__3D_STATE__;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 60, 120);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 40, 50);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.1;

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(20, 40, 20);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 100;
dirLight.shadow.camera.left = -50;
dirLight.shadow.camera.right = 50;
dirLight.shadow.camera.top = 50;
dirLight.shadow.camera.bottom = -50;
scene.add(dirLight);

// --- Ground ---
const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// --- Roads ---
// North-South road
const nsRoadGeo = new THREE.PlaneGeometry(10, 100);
const roadMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.8 });
const nsRoad = new THREE.Mesh(nsRoadGeo, roadMat);
nsRoad.rotation.x = -Math.PI / 2;
nsRoad.position.y = 0.01;
nsRoad.receiveShadow = true;
scene.add(nsRoad);

// East-West road
const ewRoadGeo = new THREE.PlaneGeometry(100, 10);
const ewRoad = new THREE.Mesh(ewRoadGeo, roadMat);
ewRoad.rotation.x = -Math.PI / 2;
ewRoad.position.y = 0.01;
ewRoad.receiveShadow = true;
scene.add(ewRoad);

// --- Lane Dividers ---
function createLaneDivider(x1, z1, x2, z2) {
  const points = [new THREE.Vector3(x1, 0.05, z1), new THREE.Vector3(x2, 0.05, z2)];
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color: 0xffcc00 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
}

// NS lane divider (dashed effect with segments)
for (let z = -50; z < 50; z += 4) {
  if (Math.abs(z) > 6 || Math.abs(z) < 1) {
    createLaneDivider(0, z, 0, z + 2);
  }
}
// EW lane divider
for (let x = -50; x < 50; x += 4) {
  if (Math.abs(x) > 6 || Math.abs(x) < 1) {
    createLaneDivider(x, 0, x + 2, 0);
  }
}

// --- Road edge markings (white) ---
function createEdgeLine(x1, z1, x2, z2) {
  const points = [new THREE.Vector3(x1, 0.04, z1), new THREE.Vector3(x2, 0.04, z2)];
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
}
createEdgeLine(-5, -50, -5, 50);
createEdgeLine(5, -50, 5, 50);
createEdgeLine(-50, -5, 50, -5);
createEdgeLine(-50, 5, 50, 5);

// --- Sidewalk / curb decoration ---
function createCurbBlock(x, z, w, d) {
  const geo = new THREE.BoxGeometry(w, 0.3, d);
  const mat = new THREE.MeshStandardMaterial({ color: 0x444444 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, 0.15, z);
  mesh.receiveShadow = true;
  mesh.castShadow = true;
  scene.add(mesh);
}

// Corner blocks
for (let sx of [-1, 1]) {
  for (let sz of [-1, 1]) {
    // Small decorative blocks at corners
    for (let i = 0; i < 3; i++) {
      const treeGeo = new THREE.CylinderGeometry(0.2, 0.3, 1.5, 8);
      const treeMat = new THREE.MeshStandardMaterial({ color: 0x4a3728 });
      const trunk = new THREE.Mesh(treeGeo, treeMat);
      trunk.position.set(sx * (12 + i * 5), 0.75, sz * (12 + i * 5));
      trunk.castShadow = true;
      scene.add(trunk);

      const foliageGeo = new THREE.SphereGeometry(1.5, 8, 8);
      const foliageMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });
      const foliage = new THREE.Mesh(foliageGeo, foliageMat);
      foliage.position.set(sx * (12 + i * 5), 2.5, sz * (12 + i * 5));
      foliage.castShadow = true;
      scene.add(foliage);
    }
  }
}

// --- Traffic Lights ---
const trafficLights = [];
const lightPositions = [
  { x: -7, z: -7, dir: 'NS' },
  { x: 7, z: -7, dir: 'EW' },
  { x: 7, z: 7, dir: 'NS' },
  { x: -7, z: 7, dir: 'EW' }
];

lightPositions.forEach(pos => {
  // Post
  const postGeo = new THREE.CylinderGeometry(0.15, 0.15, 5, 8);
  const postMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.5 });
  const post = new THREE.Mesh(postGeo, postMat);
  post.position.set(pos.x, 2.5, pos.z);
  post.castShadow = true;
  scene.add(post);

  // Housing
  const housingGeo = new THREE.BoxGeometry(0.6, 1.2, 0.6);
  const housingMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
  const housing = new THREE.Mesh(housingGeo, housingMat);
  housing.position.set(pos.x, 5.3, pos.z);
  housing.castShadow = true;
  scene.add(housing);

  // Light sphere
  const sphereGeo = new THREE.SphereGeometry(0.3, 16, 16);
  const sphereMat = new THREE.MeshStandardMaterial({
    color: pos.dir === 'NS' ? 0x00ff00 : 0xff0000,
    emissive: pos.dir === 'NS' ? 0x00ff00 : 0xff0000,
    emissiveIntensity: 1
  });
  const sphere = new THREE.Mesh(sphereGeo, sphereMat);
  sphere.position.set(pos.x, 5.7, pos.z);
  scene.add(sphere);

  trafficLights.push({ mesh: sphere, material: sphereMat, dir: pos.dir });
});

function updateTrafficLights() {
  trafficLights.forEach(tl => {
    const isGreen = (state.trafficPhase === 'A' && tl.dir === 'NS') ||
                    (state.trafficPhase === 'B' && tl.dir === 'EW');
    const color = isGreen ? 0x00ff00 : 0xff0000;
    tl.material.color.setHex(color);
    tl.material.emissive.setHex(color);
  });
}

// --- Monument (DamagedHelmet) ---
const gltfLoader = new GLTFLoader();
gltfLoader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
  (gltf) => {
    const monument = gltf.scene;
    monument.scale.set(2, 2, 2);
    monument.position.set(20, 2, 20);
    monument.castShadow = true;
    monument.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(monument);
    state.monument = monument;
    state.monumentLoaded = true;

    // Pedestal
    const pedGeo = new THREE.CylinderGeometry(1.5, 1.8, 1.5, 8);
    const pedMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.3, metalness: 0.5 });
    const pedestal = new THREE.Mesh(pedGeo, pedMat);
    pedestal.position.set(20, 0.75, 20);
    pedestal.castShadow = true;
    scene.add(pedestal);
  },
  undefined,
  (error) => {
    console.warn('Could not load DamagedHelmet.glb:', error);
    // Fallback monument
    const fallbackGeo = new THREE.DodecahedronGeometry(2);
    const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xcc8833, metalness: 0.7, roughness: 0.2 });
    const fallback = new THREE.Mesh(fallbackGeo, fallbackMat);
    fallback.position.set(20, 3, 20);
    fallback.castShadow = true;
    scene.add(fallback);
    state.monument = fallback;
    state.monumentLoaded = true;
  }
);

// --- Vehicle System ---
const vehicles = [];
let vehicleIdCounter = 0;

const directionColors = {
  'north': 0x3366ff,
  'south': 0xff3333,
  'east': 0x33cc33,
  'west': 0xff9933
};

const directionConfigs = {
  'north': { startX: -2.5, startZ: -50, vx: 0, vz: 1, rotY: 0, axis: 'z', laneOffset: -2.5 },
  'south': { startX: 2.5, startZ: 50, vx: 0, vz: -1, rotY: Math.PI, axis: 'z', laneOffset: 2.5 },
  'east': { startX: 50, startZ: -2.5, vx: -1, vz: 0, rotY: Math.PI / 2, axis: 'x', laneOffset: -2.5 },
  'west': { startX: -50, startZ: 2.5, vx: 1, vz: 0, rotY: -Math.PI / 2, axis: 'x', laneOffset: 2.5 }
};

function spawnVehicle(direction) {
  if (!direction) {
    const dirs = ['north', 'south', 'east', 'west'];
    direction = dirs[Math.floor(Math.random() * dirs.length)];
  }

  const config = directionConfigs[direction];
  const color = directionColors[direction];
  const speed = 0.05 + Math.random() * 0.15;

  // Vehicle body
  const bodyGeo = new THREE.BoxGeometry(2, 1, 3);
  const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4, metalness: 0.3 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.castShadow = true;

  // Roof
  const roofGeo = new THREE.BoxGeometry(1.6, 0.6, 1.8);
  const roofMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5 });
  const roof = new THREE.Mesh(roofGeo, roofMat);
  roof.position.y = 0.8;
  roof.position.z = -0.2;
  body.add(roof);

  // Headlights
  const hlGeo = new THREE.SphereGeometry(0.15, 8, 8);
  const hlMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0xffffcc, emissiveIntensity: 0.5 });
  const hl1 = new THREE.Mesh(hlGeo, hlMat);
  hl1.position.set(-0.7, 0, 1.5);
  body.add(hl1);
  const hl2 = new THREE.Mesh(hlGeo, hlMat);
  hl2.position.set(0.7, 0, 1.5);
  body.add(hl2);

  // Tail lights
  const tlGeo = new THREE.SphereGeometry(0.12, 8, 8);
  const tlMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.3 });
  const tl1 = new THREE.Mesh(tlGeo, tlMat);
  tl1.position.set(-0.7, 0, -1.5);
  body.add(tl1);
  const tl2 = new THREE.Mesh(tlGeo, tlMat);
  tl2.position.set(0.7, 0, -1.5);
  body.add(tl2);

  body.position.set(config.startX, 0.5, config.startZ);
  body.rotation.y = config.rotY;
  scene.add(body);

  const vehicle = {
    id: vehicleIdCounter++,
    mesh: body,
    speed: speed,
    direction: direction,
    color: color,
    stopped: false,
    vx: config.vx,
    vz: config.vz,
    axis: config.axis,
    scored: false,
    collided: false
  };

  vehicles.push(vehicle);
  state.vehiclesSpawned++;
  state.vehicleCount = vehicles.length;

  return vehicle;
}

// --- Collision tracking ---
const collidedPairs = new Set();

function checkCollisions() {
  // Check vehicles from perpendicular directions near the intersection
  for (let i = 0; i < vehicles.length; i++) {
    for (let j = i + 1; j < vehicles.length; j++) {
      const a = vehicles[i];
      const b = vehicles[j];

      // Only perpendicular collisions
      if (a.axis === b.axis) continue;

      const ax = a.mesh.position.x;
      const az = a.mesh.position.z;
      const bx = b.mesh.position.x;
      const bz = b.mesh.position.z;

      // Both within 3 units of origin
      const aDist = Math.sqrt(ax * ax + az * az);
      const bDist = Math.sqrt(bx * bx + bz * bz);

      if (aDist < 3 && bDist < 3) {
        const pairKey = Math.min(a.id, b.id) + '_' + Math.max(a.id, b.id);
        if (!collidedPairs.has(pairKey)) {
          collidedPairs.add(pairKey);
          state.collisions++;
          state.score -= 25;

          // Visual flash
          a.mesh.children[0] && (a.mesh.material.emissive = new THREE.Color(0xff0000));
          b.mesh.children[0] && (b.mesh.material.emissive = new THREE.Color(0xff0000));
          setTimeout(() => {
            if (a.mesh.material) a.mesh.material.emissive = new THREE.Color(0x000000);
            if (b.mesh.material) b.mesh.material.emissive = new THREE.Color(0x000000);
          }, 500);
        }
      }
    }
  }
}

// --- Spawn Timer ---
let spawnTimer = 0;
const baseSpawnInterval = 2;

// --- Light Cycle Timer ---
let lightTimer = 0;
const baseLightCycle = 8;

// --- Clock ---
const clock = new THREE.Clock();

// --- Update HUD ---
function updateHUD() {
  document.getElementById('score-display').textContent = state.score;
  document.getElementById('spawned-display').textContent = state.vehiclesSpawned;
  document.getElementById('completed-display').textContent = state.vehiclesCompleted;
  document.getElementById('collision-display').textContent = state.collisions;
  document.getElementById('phase-display').textContent = state.trafficPhase === 'A' ? 'A (N/S Green)' : 'B (E/W Green)';
  document.getElementById('speed-display').textContent = state.simSpeed + 'x';
  document.getElementById('pause-display').textContent = state.paused ? '⏸ Paused' : '▶ Running';
  document.getElementById('pause-display').style.color = state.paused ? '#ff6666' : '#66ff66';
}

// --- Toggle Phase ---
function togglePhase() {
  state.trafficPhase = state.trafficPhase === 'A' ? 'B' : 'A';
  lightTimer = 0;
  state.lightCycleTimer = baseLightCycle;
  updateTrafficLights();
}

// --- Reset ---
function resetSimulation() {
  vehicles.forEach(v => scene.remove(v.mesh));
  vehicles.length = 0;
  collidedPairs.clear();
  vehicleIdCounter = 0;
  spawnTimer = 0;
  lightTimer = 0;

  state.score = 0;
  state.vehiclesSpawned = 0;
  state.vehiclesCompleted = 0;
  state.collisions = 0;
  state.trafficPhase = 'A';
  state.paused = false;
  state.vehicleCount = 0;
  state.elapsedTime = 0;
  state.lightCycleTimer = baseLightCycle;

  updateTrafficLights();
  updateHUD();
}

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
  const key = e.code;
  if (key === 'Space') {
    e.preventDefault();
    togglePhase();
  } else if (key === 'KeyS') {
    spawnVehicle();
    updateHUD();
  } else if (key === 'KeyP') {
    state.paused = !state.paused;
    updateHUD();
  } else if (key === 'KeyR') {
    resetSimulation();
  }
});

// --- Speed Toggle Button ---
const speedBtn = document.getElementById('speed-toggle');
speedBtn.addEventListener('click', () => {
  if (state.simSpeed === 1) state.simSpeed = 2;
  else if (state.simSpeed === 2) state.simSpeed = 3;
  else state.simSpeed = 1;
  speedBtn.textContent = 'Speed: ' + state.simSpeed + 'x';
  updateHUD();
});

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation Loop ---
function animate() {
  requestAnimationFrame(animate);

  const rawDelta = clock.getDelta();
  const delta = Math.min(rawDelta, 0.1); // cap delta

  controls.update();

  // Rotate monument
  if (state.monument) {
    state.monument.rotation.y += delta * 0.5;
  }

  if (!state.paused) {
    const simDelta = delta * state.simSpeed;
    state.elapsedTime += simDelta;

    // Light cycle
    lightTimer += simDelta;
    state.lightCycleTimer = Math.max(0, baseLightCycle - lightTimer);
    if (lightTimer >= baseLightCycle) {
      togglePhase();
    }

    // Spawn timer
    spawnTimer += simDelta;
    if (spawnTimer >= baseSpawnInterval) {
      spawnTimer -= baseSpawnInterval;
      spawnVehicle();
    }

    // Update vehicles
    for (let i = vehicles.length - 1; i >= 0; i--) {
      const v = vehicles[i];
      const pos = v.mesh.position;

      // Check if should stop at red light
      let shouldStop = false;

      if (v.direction === 'north' || v.direction === 'south') {
        // NS vehicle
        const isGreen = state.trafficPhase === 'A';
        if (!isGreen) {
          // Check if approaching intersection (within 8 units on z axis but not yet in intersection)
          if (v.direction === 'north' && pos.z > -8 && pos.z < -3) {
            shouldStop = true;
          } else if (v.direction === 'south' && pos.z < 8 && pos.z > 3) {
            shouldStop = true;
          }
        }
      } else {
        // EW vehicle
        const isGreen = state.trafficPhase === 'B';
        if (!isGreen) {
          if (v.direction === 'west' && pos.x > -8 && pos.x < -3) {
            shouldStop = true;
          } else if (v.direction === 'east' && pos.x < 8 && pos.x > 3) {
            shouldStop = true;
          }
        }
      }

      // Check for vehicle ahead (same direction, close proximity)
      for (let j = 0; j < vehicles.length; j++) {
        if (i === j) continue;
        const other = vehicles[j];
        if (other.direction !== v.direction) continue;

        const dx = other.mesh.position.x - pos.x;
        const dz = other.mesh.position.z - pos.z;

        if (v.direction === 'north' && dz > 0 && dz < 4 && Math.abs(dx) < 2) shouldStop = true;
        if (v.direction === 'south' && dz < 0 && dz > -4 && Math.abs(dx) < 2) shouldStop = true;
        if (v.direction === 'west' && dx > 0 && dx < 4 && Math.abs(dz) < 2) shouldStop = true;
        if (v.direction === 'east' && dx < 0 && dx > -4 && Math.abs(dz) < 2) shouldStop = true;
      }

      v.stopped = shouldStop;

      if (!v.stopped) {
        pos.x += v.vx * v.speed * state.simSpeed;
        pos.z += v.vz * v.speed * state.simSpeed;
      }

      // Check completion (passed through to other side)
      const outOfBounds = Math.abs(pos.x) > 52 || Math.abs(pos.z) > 52;
      // Check if passed through intersection
      const passedThrough =
        (v.direction === 'north' && pos.z > 10) ||
        (v.direction === 'south' && pos.z < -10) ||
        (v.direction === 'east' && pos.x < -10) ||
        (v.direction === 'west' && pos.x > 10);

      if (passedThrough && !v.scored) {
        v.scored = true;
        state.vehiclesCompleted++;
        state.score += 10;
      }

      if (outOfBounds) {
        scene.remove(v.mesh);
        // Dispose geometry and materials
        v.mesh.geometry.dispose();
        v.mesh.material.dispose();
        vehicles.splice(i, 1);
      }
    }

    state.vehicleCount = vehicles.length;

    // Check collisions
    checkCollisions();
  }

  updateHUD();
  renderer.render(scene, camera);
}

// Initialize
updateTrafficLights();
updateHUD();
animate();

</script>
</body>
