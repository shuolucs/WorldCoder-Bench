<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Traffic Flow Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.65);
      padding: 12px 14px;
      border-radius: 8px;
      z-index: 10;
      min-width: 220px;
      line-height: 1.5;
      font-size: 14px;
      box-shadow: 0 0 12px rgba(0,0,0,0.35);
    }

    #controls-help {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px 12px;
      border-radius: 8px;
      z-index: 10;
      font-size: 13px;
      line-height: 1.5;
    }

    #speed-toggle {
      margin-top: 8px;
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      background: #ffcc00;
      color: #111;
      font-weight: bold;
      cursor: pointer;
    }

    #speed-toggle:hover {
      filter: brightness(1.05);
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Score: <span id="score-display">0</span></div>
    <div>Vehicles Spawned: <span id="spawned-display">0</span></div>
    <div>Vehicles Completed: <span id="completed-display">0</span></div>
    <div>Collisions: <span id="collision-display">0</span></div>
    <div>Current Phase: <span id="phase-display">A</span></div>
    <div>Sim Speed: <span id="speed-display">1x</span></div>
    <div>Paused: <span id="pause-display">No</span></div>
    <button id="speed-toggle">Speed: 1x</button>
  </div>

  <div id="controls-help">
    <div><b>Controls</b></div>
    <div>Space: Toggle traffic phase</div>
    <div>S: Spawn vehicle</div>
    <div>P: Pause / Resume</div>
    <div>R: Reset simulation</div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.157.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.157.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      500
    );
    camera.position.set(0, 40, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(20, 40, 20);
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(100, 100),
      new THREE.MeshStandardMaterial({ color: 0x333333 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const roadMaterial = new THREE.MeshStandardMaterial({ color: 0x555555 });
    const nsRoad = new THREE.Mesh(new THREE.PlaneGeometry(10, 100), roadMaterial);
    nsRoad.rotation.x = -Math.PI / 2;
    nsRoad.position.y = 0.01;
    scene.add(nsRoad);

    const ewRoad = new THREE.Mesh(new THREE.PlaneGeometry(100, 10), roadMaterial);
    ewRoad.rotation.x = -Math.PI / 2;
    ewRoad.position.y = 0.01;
    scene.add(ewRoad);

    const laneMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
    const nsLane = new THREE.Mesh(new THREE.PlaneGeometry(0.25, 100), laneMat);
    nsLane.rotation.x = -Math.PI / 2;
    nsLane.position.y = 0.02;
    scene.add(nsLane);

    const ewLane = new THREE.Mesh(new THREE.PlaneGeometry(100, 0.25), laneMat);
    ewLane.rotation.x = -Math.PI / 2;
    ewLane.position.y = 0.02;
    scene.add(ewLane);

    window.__3D_STATE__ = {
      score: 0,
      vehiclesSpawned: 0,
      vehiclesCompleted: 0,
      collisions: 0,
      trafficPhase: 'A',
      paused: false,
      simSpeed: 1,
      vehicleCount: 0,
      monumentLoaded: false,
      monument: null,
      elapsedTime: 0,
      lightCycleTimer: 8
    };

    const hud = {
      score: document.getElementById('score-display'),
      spawned: document.getElementById('spawned-display'),
      completed: document.getElementById('completed-display'),
      collisions: document.getElementById('collision-display'),
      phase: document.getElementById('phase-display'),
      speed: document.getElementById('speed-display'),
      pause: document.getElementById('pause-display'),
      speedButton: document.getElementById('speed-toggle')
    };

    function updateHUD() {
      hud.score.textContent = window.__3D_STATE__.score;
      hud.spawned.textContent = window.__3D_STATE__.vehiclesSpawned;
      hud.completed.textContent = window.__3D_STATE__.vehiclesCompleted;
      hud.collisions.textContent = window.__3D_STATE__.collisions;
      hud.phase.textContent = `${window.__3D_STATE__.trafficPhase} (${window.__3D_STATE__.lightCycleTimer.toFixed(1)}s)`;
      hud.speed.textContent = `${window.__3D_STATE__.simSpeed}x`;
      hud.pause.textContent = window.__3D_STATE__.paused ? 'Yes' : 'No';
      hud.speedButton.textContent = `Speed: ${window.__3D_STATE__.simSpeed}x`;
    }

    const loader = new GLTFLoader();
    loader.load(
      'https://threejs.org/examples/models/gltf/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
      (gltf) => {
        const monument = gltf.scene;
        monument.scale.set(2, 2, 2);
        monument.position.set(20, 2, 20);
        scene.add(monument);
        window.__3D_STATE__.monumentLoaded = true;
        window.__3D_STATE__.monument = monument;
      },
      undefined,
      (err) => {
        console.warn('Failed to load monument:', err);
      }
    );

    const trafficLights = [];
    const postMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const redMat = new THREE.MeshStandardMaterial({ color: 0xff2222, emissive: 0x550000 });
    const greenMat = new THREE.MeshStandardMaterial({ color: 0x22ff22, emissive: 0x005500 });

    const lightPositions = [
      new THREE.Vector3(7, 0, 7),
      new THREE.Vector3(-7, 0, 7),
      new THREE.Vector3(7, 0, -7),
      new THREE.Vector3(-7, 0, -7)
    ];

    for (const pos of lightPositions) {
      const group = new THREE.Group();

      const post = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.15, 4, 12),
        postMat
      );
      post.position.y = 2;

      const bulb = new THREE.Mesh(
        new THREE.SphereGeometry(0.35, 16, 16),
        redMat.clone()
      );
      bulb.position.y = 4.4;

      group.add(post);
      group.add(bulb);
      group.position.copy(pos);
      scene.add(group);

      trafficLights.push({ group, bulb, position: pos.clone() });
    }

    function updateTrafficLights() {
      const phase = window.__3D_STATE__.trafficPhase;
      for (const tl of trafficLights) {
        const isNS = Math.abs(tl.position.x) === 7;
        const green = (phase === 'A' && isNS) || (phase === 'B' && !isNS);
        tl.bulb.material = green ? greenMat : redMat;
      }
    }

    function togglePhase() {
      window.__3D_STATE__.trafficPhase = window.__3D_STATE__.trafficPhase === 'A' ? 'B' : 'A';
      window.__3D_STATE__.lightCycleTimer = 8;
      updateTrafficLights();
      updateHUD();
    }

    updateTrafficLights();

    const vehicles = [];
    let vehicleIdCounter = 1;

    const directionConfigs = {
      North: {
        start: new THREE.Vector3(0, 0.5, -50),
        velocity: new THREE.Vector3(0, 0, 1),
        color: 0x3366ff,
        rotationY: 0
      },
      South: {
        start: new THREE.Vector3(0, 0.5, 50),
        velocity: new THREE.Vector3(0, 0, -1),
        color: 0xff3333,
        rotationY: Math.PI
      },
      East: {
        start: new THREE.Vector3(50, 0.5, 0),
        velocity: new THREE.Vector3(-1, 0, 0),
        color: 0x33cc33,
        rotationY: -Math.PI / 2
      },
      West: {
        start: new THREE.Vector3(-50, 0.5, 0),
        velocity: new THREE.Vector3(1, 0, 0),
        color: 0xff9933,
        rotationY: Math.PI / 2
      }
    };

    function spawnVehicle(direction = null) {
      const dirs = Object.keys(directionConfigs);
      const chosen = direction || dirs[Math.floor(Math.random() * dirs.length)];
      const cfg = directionConfigs[chosen];

      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(2, 1, 3),
        new THREE.MeshStandardMaterial({ color: cfg.color })
      );

      mesh.position.copy(cfg.start);
      mesh.rotation.y = cfg.rotationY;
      scene.add(mesh);

      const vehicle = {
        id: vehicleIdCounter++,
        mesh,
        speed: THREE.MathUtils.randFloat(0.05, 0.2),
        direction: chosen,
        color: cfg.color,
        stopped: false,
        collisionRegistered: false
      };

      vehicles.push(vehicle);
      window.__3D_STATE__.vehiclesSpawned++;
      window.__3D_STATE__.vehicleCount = vehicles.length;
      updateHUD();
    }

    function canVehicleGo(direction) {
      const phase = window.__3D_STATE__.trafficPhase;
      return (phase === 'A' && (direction === 'North' || direction === 'South')) ||
             (phase === 'B' && (direction === 'East' || direction === 'West'));
    }

    function shouldStopAtRed(vehicle) {
      if (canVehicleGo(vehicle.direction)) return false;

      const pos = vehicle.mesh.position;

      if (vehicle.direction === 'North') return pos.z >= -8 && pos.z < 0;
      if (vehicle.direction === 'South') return pos.z <= 8 && pos.z > 0;
      if (vehicle.direction === 'East')  return pos.x <= 8 && pos.x > 0;
      if (vehicle.direction === 'West')  return pos.x >= -8 && pos.x < 0;

      return false;
    }

    function isPastBounds(vehicle) {
      const p = vehicle.mesh.position;
      return Math.abs(p.x) > 55 || Math.abs(p.z) > 55;
    }

    function isNearOrigin(vehicle) {
      const p = vehicle.mesh.position;
      return Math.abs(p.x) <= 3 && Math.abs(p.z) <= 3;
    }

    function arePerpendicular(a, b) {
      const nsA = a.direction === 'North' || a.direction === 'South';
      const nsB = b.direction === 'North' || b.direction === 'South';
      return nsA !== nsB;
    }

    function removeVehicle(index) {
      const vehicle = vehicles[index];
      scene.remove(vehicle.mesh);
      vehicle.mesh.geometry.dispose();
      vehicle.mesh.material.dispose();
      vehicles.splice(index, 1);
      window.__3D_STATE__.vehicleCount = vehicles.length;
    }

    function resetSimulation() {
      for (let i = vehicles.length - 1; i >= 0; i--) {
        removeVehicle(i);
      }

      window.__3D_STATE__.score = 0;
      window.__3D_STATE__.vehiclesSpawned = 0;
      window.__3D_STATE__.vehiclesCompleted = 0;
      window.__3D_STATE__.collisions = 0;
      window.__3D_STATE__.trafficPhase = 'A';
      window.__3D_STATE__.paused = false;
      window.__3D_STATE__.simSpeed = 1;
      window.__3D_STATE__.vehicleCount = 0;
      window.__3D_STATE__.elapsedTime = 0;
      window.__3D_STATE__.lightCycleTimer = 8;

      spawnAccumulator = 0;
      vehicleIdCounter = 1;

      updateTrafficLights();
      updateHUD();
    }

    hud.speedButton.addEventListener('click', () => {
      window.__3D_STATE__.simSpeed = window.__3D_STATE__.simSpeed === 3 ? 1 : window.__3D_STATE__.simSpeed + 1;
      updateHUD();
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        togglePhase();
      } else if (e.key === 's' || e.key === 'S') {
        spawnVehicle();
      } else if (e.key === 'p' || e.key === 'P') {
        window.__3D_STATE__.paused = !window.__3D_STATE__.paused;
        updateHUD();
      } else if (e.key === 'r' || e.key === 'R') {
        resetSimulation();
      }
    });

    let lastTime = performance.now();
    let spawnAccumulator = 0;
    let collisionCooldown = 0;

    function animate(now) {
      requestAnimationFrame(animate);

      const rawDelta = Math.min((now - lastTime) / 1000, 0.1);
      lastTime = now;

      controls.update();

      if (!window.__3D_STATE__.paused) {
        const simDelta = rawDelta * window.__3D_STATE__.simSpeed;
        window.__3D_STATE__.elapsedTime += simDelta;

        window.__3D_STATE__.lightCycleTimer -= simDelta;
        if (window.__3D_STATE__.lightCycleTimer <= 0) {
          togglePhase();
        }

        spawnAccumulator += simDelta;
        const spawnInterval = 2;
        while (spawnAccumulator >= spawnInterval) {
          spawnVehicle();
          spawnAccumulator -= spawnInterval;
        }

        for (let i = vehicles.length - 1; i >= 0; i--) {
          const vehicle = vehicles[i];
          vehicle.stopped = shouldStopAtRed(vehicle);

          if (!vehicle.stopped) {
            const dir = directionConfigs[vehicle.direction].velocity;
            vehicle.mesh.position.addScaledVector(dir, vehicle.speed * simDelta * 10);
          }

          if (isPastBounds(vehicle)) {
            window.__3D_STATE__.vehiclesCompleted++;
            window.__3D_STATE__.score += 10;
            removeVehicle(i);
          }
        }

        collisionCooldown -= simDelta;
        if (collisionCooldown <= 0) {
          let collisionFound = false;
          for (let i = 0; i < vehicles.length; i++) {
            for (let j = i + 1; j < vehicles.length; j++) {
              const a = vehicles[i];
              const b = vehicles[j];
              if (arePerpendicular(a, b) && isNearOrigin(a) && isNearOrigin(b)) {
                window.__3D_STATE__.collisions++;
                window.__3D_STATE__.score -= 25;
                collisionFound = true;
                break;
              }
            }
            if (collisionFound) break;
          }
          if (collisionFound) collisionCooldown = 1.0;
        }

        window.__3D_STATE__.vehicleCount = vehicles.length;
        updateHUD();
      }

      renderer.render(scene, camera);
    }

    updateHUD();
    animate(performance.now());

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
