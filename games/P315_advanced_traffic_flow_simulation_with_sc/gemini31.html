<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Traffic Flow Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid #555;
            min-width: 200px;
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #ffcc00;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .hud-label {
            color: #aaa;
        }
        .hud-value {
            font-weight: bold;
        }
        #controls-help {
            margin-top: 10px;
            font-size: 11px;
            color: #888;
            border-top: 1px solid #444;
            padding-top: 5px;
        }
        #speed-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #3366ff;
            color: white;
            border: none;
            padding: 10px 15px;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        #speed-toggle:hover {
            background: #4d7aff;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.157.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <h2>TRAFFIC SIMULATION</h2>
        <div class="hud-row"><span class="hud-label">Score:</span> <span class="hud-value" id="score-display">0</span></div>
        <div class="hud-row"><span class="hud-label">Spawned:</span> <span class="hud-value" id="spawned-display">0</span></div>
        <div class="hud-row"><span class="hud-label">Completed:</span> <span class="hud-value" id="completed-display">0</span></div>
        <div class="hud-row"><span class="hud-label">Collisions:</span> <span class="hud-value" id="collision-display">0</span></div>
        <div class="hud-row"><span class="hud-label">Phase:</span> <span class="hud-value" id="phase-display">A</span></div>
        <div class="hud-row"><span class="hud-label">Speed:</span> <span class="hud-value" id="speed-display">1x</span></div>
        <div class="hud-row"><span class="hud-label">Paused:</span> <span class="hud-value" id="pause-display">false</span></div>
        
        <div id="controls-help">
            [Space] Toggle Phase<br>
            [S] Spawn Vehicle<br>
            [P] Pause/Resume<br>
            [R] Reset Sim
        </div>
    </div>
    
    <button id="speed-toggle">Speed: 1x</button>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            score: 0,
            vehiclesSpawned: 0,
            vehiclesCompleted: 0,
            collisions: 0,
            trafficPhase: 'A',
            paused: false,
            simSpeed: 1,
            vehicleCount: 0,
            monumentLoaded: false,
            monument: null,
            elapsedTime: 0,
            lightCycleTimer: 8
        };

        // Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 50);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        scene.add(dirLight);

        // Environment
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const roadMat = new THREE.MeshLambertMaterial({ color: 0x555555 });
        const roadNS = new THREE.Mesh(new THREE.PlaneGeometry(10, 100), roadMat);
        roadNS.rotation.x = -Math.PI / 2;
        roadNS.position.y = 0.01;
        scene.add(roadNS);

        const roadEW = new THREE.Mesh(new THREE.PlaneGeometry(100, 10), roadMat);
        roadEW.rotation.x = -Math.PI / 2;
        roadEW.position.y = 0.01;
        scene.add(roadEW);

        const lineMat = new THREE.LineBasicMaterial({ color: 0xffcc00 });
        const lineGeoNS = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0.02, -50), new THREE.Vector3(0, 0.02, 50)]);
        const lineNS = new THREE.Line(lineGeoNS, lineMat);
        scene.add(lineNS);

        const lineGeoEW = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-50, 0.02, 0), new THREE.Vector3(50, 0.02, 0)]);
        const lineEW = new THREE.Line(lineGeoEW, lineMat);
        scene.add(lineEW);

        // Traffic Lights
        const nsLights = [];
        const ewLights = [];
        const postGeo = new THREE.CylinderGeometry(0.2, 0.2, 8);
        const postMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
        const lightGeo = new THREE.SphereGeometry(0.6);

        const lightPositions = [
            { x: -7, z: -7, type: 'NS' },
            { x: 7, z: 7, type: 'NS' },
            { x: -7, z: 7, type: 'EW' },
            { x: 7, z: -7, type: 'EW' }
        ];

        lightPositions.forEach(pos => {
            const post = new THREE.Mesh(postGeo, postMat);
            post.position.set(pos.x, 4, pos.z);
            scene.add(post);

            const lightMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const light = new THREE.Mesh(lightGeo, lightMat);
            light.position.set(pos.x, 8.5, pos.z);
            scene.add(light);

            if (pos.type === 'NS') nsLights.push(light);
            else ewLights.push(light);
        });

        function updateTrafficLights() {
            const phase = window.__3D_STATE__.trafficPhase;
            const colorNS = phase === 'A' ? 0x00ff00 : 0xff0000;
            const colorEW = phase === 'B' ? 0x00ff00 : 0xff0000;
            
            nsLights.forEach(l => l.material.color.setHex(colorNS));
            ewLights.forEach(l => l.material.color.setHex(colorEW));
        }
        updateTrafficLights();

        // Monument
        const loader = new GLTFLoader();
        loader.load(
            'https://unpkg.com/three@0.157.0/examples/models/gltf/DamagedHelmet/glTF/DamagedHelmet.gltf',
            function (gltf) {
                const monument = gltf.scene;
                monument.scale.set(2, 2, 2);
                monument.position.set(20, 2, 20);
                
                // Fix rotation to look decent
                monument.rotation.x = Math.PI / 2;
                
                scene.add(monument);
                window.__3D_STATE__.monument = monument;
                window.__3D_STATE__.monumentLoaded = true;
            }
        );

        // Vehicle System
        const vehicles = [];
        let spawnTimer = 0;

        function spawnVehicle() {
            const dirs = ['N', 'S', 'E', 'W'];
            const dir = dirs[Math.floor(Math.random() * dirs.length)];
            
            let pos, moveDir, color, size;
            const speed = 5 + Math.random() * 10; // Base speed units per second

            switch(dir) {
                case 'N': pos = [-2.5, 0.5, -50]; moveDir = [0, 0, 1]; color = 0x3366ff; size = [2, 1, 3]; break;
                case 'S': pos = [2.5, 0.5, 50]; moveDir = [0, 0, -1]; color = 0xff3333; size = [2, 1, 3]; break;
                case 'E': pos = [50, 0.5, 2.5]; moveDir = [-1, 0, 0]; color = 0x33cc33; size = [3, 1, 2]; break;
                case 'W': pos = [-50, 0.5, -2.5]; moveDir = [1, 0, 0]; color = 0xff9933; size = [3, 1, 2]; break;
            }

            const geo = new THREE.BoxGeometry(size[0], size[1], size[2]);
            const mat = new THREE.MeshLambertMaterial({ color: color });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(pos[0], pos[1], pos[2]);
            scene.add(mesh);

            vehicles.push({
                id: Math.random().toString(36).substr(2, 9),
                mesh: mesh,
                dir: dir,
                moveDir: moveDir,
                speed: speed,
                stopped: false,
                collided: false
            });

            window.__3D_STATE__.vehiclesSpawned++;
            updateHUD();
        }

        function resetSimulation() {
            vehicles.forEach(v => scene.remove(v.mesh));
            vehicles.length = 0;
            window.__3D_STATE__.score = 0;
            window.__3D_STATE__.vehiclesSpawned = 0;
            window.__3D_STATE__.vehiclesCompleted = 0;
            window.__3D_STATE__.collisions = 0;
            window.__3D_STATE__.trafficPhase = 'A';
            window.__3D_STATE__.lightCycleTimer = 8;
            window.__3D_STATE__.elapsedTime = 0;
            spawnTimer = 0;
            updateTrafficLights();
            updateHUD();
        }

        // Input Handling
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'Space':
                    window.__3D_STATE__.trafficPhase = window.__3D_STATE__.trafficPhase === 'A' ? 'B' : 'A';
                    window.__3D_STATE__.lightCycleTimer = 8;
                    updateTrafficLights();
                    updateHUD();
                    break;
                case 'KeyS':
                    spawnVehicle();
                    break;
                case 'KeyP':
                    window.__3D_STATE__.paused = !window.__3D_STATE__.paused;
                    updateHUD();
                    break;
                case 'KeyR':
                    resetSimulation();
                    break;
            }
        });

        document.getElementById('speed-toggle').addEventListener('click', () => {
            let speed = window.__3D_STATE__.simSpeed;
            speed = speed >= 3 ? 1 : speed + 1;
            window.__3D_STATE__.simSpeed = speed;
            document.getElementById('speed-toggle').innerText = `Speed: ${speed}x`;
            updateHUD();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // HUD Update
        function updateHUD() {
            const state = window.__3D_STATE__;
            document.getElementById('score-display').innerText = state.score;
            document.getElementById('spawned-display').innerText = state.vehiclesSpawned;
            document.getElementById('completed-display').innerText = state.vehiclesCompleted;
            document.getElementById('collision-display').innerText = state.collisions;
            document.getElementById('phase-display').innerText = state.trafficPhase;
            document.getElementById('speed-display').innerText = state.simSpeed + 'x';
            document.getElementById('pause-display').innerText = state.paused;
            
            // Visual feedback for score
            const scoreEl = document.getElementById('score-display');
            scoreEl.style.color = state.score < 0 ? '#ff3333' : (state.score > 0 ? '#33cc33' : 'white');
        }

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            const delta = clock.getDelta();
            const state = window.__3D_STATE__;

            if (!state.paused) {
                const effDelta = delta * state.simSpeed;
                state.elapsedTime += effDelta;

                // Traffic Light Logic
                state.lightCycleTimer -= effDelta;
                if (state.lightCycleTimer <= 0) {
                    state.trafficPhase = state.trafficPhase === 'A' ? 'B' : 'A';
                    state.lightCycleTimer = 8;
                    updateTrafficLights();
                    updateHUD();
                }

                // Spawning Logic
                spawnTimer -= effDelta;
                if (spawnTimer <= 0) {
                    spawnVehicle();
                    spawnTimer = 2; // Spawn every 2 seconds (scaled by simSpeed)
                }

                // Vehicle Logic
                for (let i = vehicles.length - 1; i >= 0; i--) {
                    let v = vehicles[i];
                    let p = v.mesh.position;
                    let shouldStop = false;

                    // 1. Traffic Light Stop Logic
                    const phase = state.trafficPhase;
                    const stopLine = 8;
                    const brakeZone = 18;

                    if (v.dir === 'N' && phase === 'B' && p.z < -stopLine && p.z > -brakeZone) shouldStop = true;
                    if (v.dir === 'S' && phase === 'B' && p.z > stopLine && p.z < brakeZone) shouldStop = true;
                    if (v.dir === 'E' && phase === 'A' && p.x > stopLine && p.x < brakeZone) shouldStop = true;
                    if (v.dir === 'W' && phase === 'A' && p.x < -stopLine && p.x > -brakeZone) shouldStop = true;

                    // 2. Collision Avoidance (Car in front)
                    for (let j = 0; j < vehicles.length; j++) {
                        if (i === j) continue;
                        let v2 = vehicles[j];
                        if (v.dir === v2.dir) {
                            let p2 = v2.mesh.position;
                            const safeDist = 4.5;
                            if (v.dir === 'N' && p2.z > p.z && p2.z - p.z < safeDist) shouldStop = true;
                            if (v.dir === 'S' && p2.z < p.z && p.z - p2.z < safeDist) shouldStop = true;
                            if (v.dir === 'E' && p2.x < p.x && p.x - p2.x < safeDist) shouldStop = true;
                            if (v.dir === 'W' && p2.x > p.x && p2.x - p.x < safeDist) shouldStop = true;
                        }
                    }

                    v.stopped = shouldStop;

                    // Movement
                    if (!v.stopped && !v.collided) {
                        p.x += v.moveDir[0] * v.speed * effDelta;
                        p.z += v.moveDir[2] * v.speed * effDelta;
                    }

                    // Completion
                    if (Math.abs(p.x) > 55 || Math.abs(p.z) > 55) {
                        scene.remove(v.mesh);
                        vehicles.splice(i, 1);
                        if (!v.collided) {
                            state.vehiclesCompleted++;
                            state.score += 10;
                        }
                        updateHUD();
                    }
                }

                // Collision Detection (Intersection)
                for (let i = 0; i < vehicles.length; i++) {
                    for (let j = i + 1; j < vehicles.length; j++) {
                        let v1 = vehicles[i];
                        let v2 = vehicles[j];
                        
                        let isPerp = (['N','S'].includes(v1.dir) && ['E','W'].includes(v2.dir)) ||
                                     (['E','W'].includes(v1.dir) && ['N','S'].includes(v2.dir));

                        if (isPerp && !v1.collided && !v2.collided) {
                            let p1 = v1.mesh.position;
                            let p2 = v2.mesh.position;
                            
                            if (Math.abs(p1.x) < 3 && Math.abs(p1.z) < 3 && 
                                Math.abs(p2.x) < 3 && Math.abs(p2.z) < 3) {
                                
                                v1.collided = true;
                                v2.collided = true;
                                
                                // Visual feedback
                                v1.mesh.material.color.setHex(0x222222);
                                v2.mesh.material.color.setHex(0x222222);
                                
                                state.collisions++;
                                state.score -= 25;
                                updateHUD();
                            }
                        }
                    }
                }

                state.vehicleCount = vehicles.length;
                
                // Rotate monument slightly
                if (state.monument) {
                    state.monument.rotation.y += 0.5 * effDelta;
                }
            }

            renderer.render(scene, camera);
        }

        // Start
        updateHUD();
        animate();
    </script>
</body>
</html>
