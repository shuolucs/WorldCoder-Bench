<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Histogram with Dragon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: Arial, sans-serif; }
  canvas { display: block; }

  #toolbar {
    position: absolute;
    top: 10px;
    left: 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    z-index: 10;
  }

  #toolbar button {
    padding: 8px 16px;
    border-radius: 4px;
    background: #4A90D9;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 13px;
    transition: opacity 0.2s;
  }

  #toolbar button:hover { opacity: 0.85; }
  #toolbar button:disabled { opacity: 0.4; cursor: not-allowed; }

  #info-panel {
    position: absolute;
    top: 60px;
    left: 10px;
    background: rgba(0,0,0,0.75);
    color: #eee;
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.6;
    z-index: 10;
    min-width: 200px;
  }

  #selection-panel {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: #eee;
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 14px;
    z-index: 10;
    display: none;
    align-items: center;
    gap: 10px;
  }

  #selection-panel label { font-weight: bold; }

  #value-input {
    width: 60px;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid #666;
    background: #222;
    color: white;
    font-size: 14px;
    text-align: center;
  }

  #btn-set-value {
    padding: 6px 14px;
    border-radius: 4px;
    background: #4A90D9;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 13px;
  }
</style>
</head>
<body>

<div id="toolbar">
  <button id="btn-add">Add Category</button>
  <button id="btn-remove">Remove Last</button>
  <button id="btn-undo" disabled>Undo</button>
  <button id="btn-redo" disabled>Redo</button>
  <button id="btn-randomize">Randomize</button>
  <button id="btn-sort-asc">Sort Asc</button>
  <button id="btn-sort-desc">Sort Desc</button>
</div>

<div id="info-panel">
  <div>Categories: <span id="info-count">5</span></div>
  <div>Sum: <span id="info-sum">28</span></div>
  <div>Average: <span id="info-avg">5.60</span></div>
  <div>History: <span id="info-history">1</span></div>
</div>

<div id="selection-panel">
  <label id="selection-label">Selected: Alpha</label>
  <input type="number" id="value-input" min="1" max="10" value="5">
  <button id="btn-set-value">Set Value</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ─── State ───
const BAR_COLORS = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7',
  '#DDA0DD', '#98FB98', '#F0E68C', '#87CEEB', '#FFA07A',
  '#B0C4DE', '#FFB6C1', '#20B2AA', '#778899', '#FF6347',
  '#7B68EE', '#3CB371', '#CD853F', '#6495ED', '#DC143C'];

let categories = ['Alpha', 'Beta', 'Gamma', 'Delta', 'Epsilon'];
let values = [4, 7, 3, 9, 5];
let selectedBarIndex = -1;
let sortOrder = 'none';
let lastAction = 'init';
let addCounter = 6;

// History
let history = [];
let historyIndex = -1;
const MAX_HISTORY = 20;

// Animation
const barAnimations = new Map(); // index -> { startHeight, targetHeight, startTime, duration }
const ANIM_DURATION = 500;

// 3D objects
let barMeshes = [];
let barLabels = [];
let valueLabels = [];
let dragonModel = null;
let dragonLoaded = false;

// ─── Three.js Setup ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(8, 6, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Pedestal for dragon
const pedestalGeo = new THREE.CylinderGeometry(1, 1, 0.3, 32);
const pedestalMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
const pedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
pedestal.position.set(6, 0.15, -3);
pedestal.castShadow = true;
pedestal.receiveShadow = true;
scene.add(pedestal);

// Dragon group for rotation
const dragonGroup = new THREE.Group();
dragonGroup.position.set(6, 0.3, -3);
scene.add(dragonGroup);

// Load Dragon
const loader = new GLTFLoader();
loader.load(
  'https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/DragonAttenuation/glTF-Binary/DragonAttenuation.glb',
  (gltf) => {
    dragonModel = gltf.scene;
    // Compute bounding box to scale
    const box = new THREE.Box3().setFromObject(dragonModel);
    const size = new THREE.Vector3();
    box.getSize(size);
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 2 / maxDim;
    dragonModel.scale.setScalar(scale);

    // Recompute box after scaling
    const box2 = new THREE.Box3().setFromObject(dragonModel);
    const center = new THREE.Vector3();
    box2.getCenter(center);
    dragonModel.position.sub(center);
    dragonModel.position.y += (box2.max.y - box2.min.y) / 2;

    dragonModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    dragonGroup.add(dragonModel);
    dragonLoaded = true;
    updateGlobalState();
  },
  undefined,
  (err) => {
    console.warn('Dragon load error:', err);
    // Create placeholder
    const placeholder = new THREE.Mesh(
      new THREE.ConeGeometry(0.5, 2, 8),
      new THREE.MeshStandardMaterial({ color: 0x88aaff })
    );
    placeholder.position.y = 1;
    dragonGroup.add(placeholder);
    dragonLoaded = true;
    updateGlobalState();
  }
);

// ─── Bar Group ───
const barsGroup = new THREE.Group();
scene.add(barsGroup);

// ─── Text Sprite Helper ───
function createTextSprite(text, fontSize = 48, color = '#ffffff', bgColor = null) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  ctx.font = `bold ${fontSize}px Arial`;
  const metrics = ctx.measureText(text);
  const width = metrics.width + 20;
  const height = fontSize + 16;
  canvas.width = Math.ceil(width);
  canvas.height = Math.ceil(height);

  if (bgColor) {
    ctx.fillStyle = bgColor;
    ctx.roundRect(0, 0, canvas.width, canvas.height, 6);
    ctx.fill();
  }

  ctx.font = `bold ${fontSize}px Arial`;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, canvas.width / 2, canvas.height / 2);

  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(canvas.width / canvas.height * 0.5, 0.5, 1);
  return sprite;
}

// ─── Build Bars ───
function getBarX(index, total) {
  const totalWidth = (total - 1) * 1.5;
  return -totalWidth / 2 + index * 1.5;
}

function getBarHeight(value) {
  return value * 0.5;
}

function clearBars() {
  while (barsGroup.children.length > 0) {
    const child = barsGroup.children[0];
    barsGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
    if (child.material) {
      if (child.material.map) child.material.map.dispose();
      child.material.dispose();
    }
  }
  barMeshes = [];
  barLabels = [];
  valueLabels = [];
  barAnimations.clear();
}

function buildBars(animate = false, oldValues = null) {
  clearBars();

  for (let i = 0; i < categories.length; i++) {
    const targetH = getBarHeight(values[i]);
    const startH = (animate && oldValues && i < oldValues.length) ? getBarHeight(oldValues[i]) : targetH;
    const currentH = animate ? startH : targetH;

    const colorHex = BAR_COLORS[i % BAR_COLORS.length];

    // Bar mesh
    const geo = new THREE.BoxGeometry(0.8, 1, 0.8);
    const mat = new THREE.MeshStandardMaterial({ color: new THREE.Color(colorHex) });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;

    const x = getBarX(i, categories.length);
    mesh.position.set(x, currentH / 2, 0);
    mesh.scale.y = currentH || 0.01;
    mesh.userData.barIndex = i;

    barsGroup.add(mesh);
    barMeshes.push(mesh);

    // Category label
    const catSprite = createTextSprite(categories[i], 36, '#ffffff');
    catSprite.position.set(x, -0.4, 0);
    barsGroup.add(catSprite);
    barLabels.push(catSprite);

    // Value label
    const valSprite = createTextSprite(String(values[i]), 40, '#ffff00');
    valSprite.position.set(x, currentH + 0.35, 0);
    barsGroup.add(valSprite);
    valueLabels.push(valSprite);

    // Animation
    if (animate && startH !== targetH) {
      barAnimations.set(i, {
        startHeight: startH,
        targetHeight: targetH,
        startTime: performance.now(),
        duration: ANIM_DURATION
      });
    }
  }

  // Highlight selected
  if (selectedBarIndex >= 0 && selectedBarIndex < barMeshes.length) {
    barMeshes[selectedBarIndex].material.emissive.set(0xFFFF00);
    barMeshes[selectedBarIndex].material.emissiveIntensity = 0.3;
  }
}

function updateBarHeight(index, height) {
  if (index >= barMeshes.length) return;
  const mesh = barMeshes[index];
  const h = Math.max(height, 0.01);
  mesh.scale.y = h;
  mesh.position.y = h / 2;

  if (valueLabels[index]) {
    valueLabels[index].position.y = h + 0.35;
  }
}

// ─── History ───
function pushState() {
  // Discard future
  history = history.slice(0, historyIndex + 1);

  const state = {
    categories: [...categories],
    values: [...values]
  };
  history.push(state);

  // Limit
  if (history.length > MAX_HISTORY) {
    history.shift();
  }
  historyIndex = history.length - 1;

  updateButtons();
  updateGlobalState();
}

function undo() {
  if (historyIndex <= 0) return;
  historyIndex--;
  restoreState(history[historyIndex]);
  lastAction = 'undo';
  sortOrder = 'none';
  updateButtons();
  updateGlobalState();
  updateInfoPanel();
}

function redo() {
  if (historyIndex >= history.length - 1) return;
  historyIndex++;
  restoreState(history[historyIndex]);
  lastAction = 'redo';
  sortOrder = 'none';
  updateButtons();
  updateGlobalState();
  updateInfoPanel();
}

function restoreState(state) {
  const oldValues = [...values];
  categories = [...state.categories];
  values = [...state.values];

  if (selectedBarIndex >= categories.length) {
    selectedBarIndex = -1;
    updateSelectionPanel();
  }

  buildBars(true, oldValues);
}

function updateButtons() {
  document.getElementById('btn-undo').disabled = historyIndex <= 0;
  document.getElementById('btn-redo').disabled = historyIndex >= history.length - 1;
}

// ─── Info Panel ───
function updateInfoPanel() {
  const sum = values.reduce((a, b) => a + b, 0);
  const avg = values.length > 0 ? (sum / values.length) : 0;
  document.getElementById('info-count').textContent = categories.length;
  document.getElementById('info-sum').textContent = sum;
  document.getElementById('info-avg').textContent = avg.toFixed(2);
  document.getElementById('info-history').textContent = history.length;
}

// ─── Selection Panel ───
function updateSelectionPanel() {
  const panel = document.getElementById('selection-panel');
  if (selectedBarIndex >= 0 && selectedBarIndex < categories.length) {
    panel.style.display = 'flex';
    document.getElementById('selection-label').textContent = `Selected: ${categories[selectedBarIndex]}`;
    document.getElementById('value-input').value = values[selectedBarIndex];
  } else {
    panel.style.display = 'none';
  }
}

// ─── Global State ───
function updateGlobalState() {
  const sum = values.reduce((a, b) => a + b, 0);
  const avg = values.length > 0 ? parseFloat((sum / values.length).toFixed(2)) : 0;

  window.__3D_STATE__ = {
    categories: [...categories],
    values: [...values],
    barCount: categories.length,
    selectedBarIndex: selectedBarIndex,
    historyIndex: historyIndex,
    historyLength: history.length,
    canUndo: historyIndex > 0,
    canRedo: historyIndex < history.length - 1,
    sumValues: sum,
    avgValue: avg,
    dragonLoaded: dragonLoaded,
    sortOrder: sortOrder,
    lastAction: lastAction
  };
}

// ─── Actions ───
function addCategory() {
  const name = 'Cat_' + addCounter++;
  const val = Math.floor(Math.random() * 10) + 1;
  categories.push(name);
  values.push(val);
  lastAction = 'add';
  sortOrder = 'none';
  selectedBarIndex = -1;
  updateSelectionPanel();
  pushState();
  buildBars(true);
  updateInfoPanel();
}

function removeLast() {
  if (categories.length === 0) return;
  const oldValues = [...values];
  categories.pop();
  values.pop();
  lastAction = 'remove';
  sortOrder = 'none';
  if (selectedBarIndex >= categories.length) {
    selectedBarIndex = -1;
    updateSelectionPanel();
  }
  pushState();
  buildBars(true, oldValues);
  updateInfoPanel();
}

function randomize() {
  const oldValues = [...values];
  for (let i = 0; i < values.length; i++) {
    values[i] = Math.floor(Math.random() * 10) + 1;
  }
  lastAction = 'randomize';
  sortOrder = 'none';
  pushState();
  buildBars(true, oldValues);
  updateInfoPanel();
  updateSelectionPanel();
}

function sortAsc() {
  const oldValues = [...values];
  const pairs = categories.map((c, i) => ({ cat: c, val: values[i] }));
  pairs.sort((a, b) => a.val - b.val);
  categories = pairs.map(p => p.cat);
  values = pairs.map(p => p.val);
  lastAction = 'sort_asc';
  sortOrder = 'asc';
  selectedBarIndex = -1;
  updateSelectionPanel();
  pushState();
  buildBars(true, oldValues);
  updateInfoPanel();
}

function sortDesc() {
  const oldValues = [...values];
  const pairs = categories.map((c, i) => ({ cat: c, val: values[i] }));
  pairs.sort((a, b) => b.val - a.val);
  categories = pairs.map(p => p.cat);
  values = pairs.map(p => p.val);
  lastAction = 'sort_desc';
  sortOrder = 'desc';
  selectedBarIndex = -1;
  updateSelectionPanel();
  pushState();
  buildBars(true, oldValues);
  updateInfoPanel();
}

function setValue() {
  if (selectedBarIndex < 0 || selectedBarIndex >= values.length) return;
  let val = parseInt(document.getElementById('value-input').value);
  if (isNaN(val)) return;
  val = Math.max(1, Math.min(10, val));
  const oldValues = [...values];
  values[selectedBarIndex] = val;
  lastAction = 'set_value';
  sortOrder = 'none';
  pushState();
  buildBars(true, oldValues);
  updateInfoPanel();
  updateSelectionPanel();
}

function deleteSelected() {
  if (selectedBarIndex < 0 || selectedBarIndex >= categories.length) return;
  const oldValues = [...values];
  categories.splice(selectedBarIndex, 1);
  values.splice(selectedBarIndex, 1);
  lastAction = 'delete';
  sortOrder = 'none';
  selectedBarIndex = -1;
  updateSelectionPanel();
  pushState();
  buildBars(true, oldValues);
  updateInfoPanel();
}

// ─── Event Listeners ───
document.getElementById('btn-add').addEventListener('click', addCategory);
document.getElementById('btn-remove').addEventListener('click', removeLast);
document.getElementById('btn-undo').addEventListener('click', () => { undo(); });
document.getElementById('btn-redo').addEventListener('click', () => { redo(); });
document.getElementById('btn-randomize').addEventListener('click', randomize);
document.getElementById('btn-sort-asc').addEventListener('click', sortAsc);
document.getElementById('btn-sort-desc').addEventListener('click', sortDesc);
document.getElementById('btn-set-value').addEventListener('click', setValue);

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'z') {
    e.preventDefault();
    undo();
  } else if (e.ctrlKey && e.key === 'y') {
    e.preventDefault();
    redo();
  } else if (e.key === 'Delete') {
    deleteSelected();
  }
});

// Raycasting
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(barMeshes);

  // Deselect previous
  if (selectedBarIndex >= 0 && selectedBarIndex < barMeshes.length) {
    barMeshes[selectedBarIndex].material.emissive.set(0x000000);
    barMeshes[selectedBarIndex].material.emissiveIntensity = 0;
  }

  if (intersects.length > 0) {
    const idx = intersects[0].object.userData.barIndex;
    if (idx !== undefined) {
      selectedBarIndex = idx;
      barMeshes[idx].material.emissive.set(0xFFFF00);
      barMeshes[idx].material.emissiveIntensity = 0.3;
    }
  } else {
    selectedBarIndex = -1;
  }

  updateSelectionPanel();
  updateGlobalState();
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Initialize ───
pushState();
buildBars(false);
updateInfoPanel();
updateGlobalState();

// ─── Animation Loop ───
function animate(time) {
  requestAnimationFrame(animate);

  // Animate bars
  for (const [index, anim] of barAnimations.entries()) {
    const elapsed = time - anim.startTime;
    const t = Math.min(elapsed / anim.duration, 1);
    // Ease out
    const eased = 1 - Math.pow(1 - t, 3);
    const currentH = anim.startHeight + (anim.targetHeight - anim.startHeight) * eased;
    updateBarHeight(index, currentH);

    if (t >= 1) {
      barAnimations.delete(index);
    }
  }

  // Rotate dragon
  dragonGroup.rotation.y += 0.5 * (1 / 60);

  controls.update();
  renderer.render(scene, camera);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
