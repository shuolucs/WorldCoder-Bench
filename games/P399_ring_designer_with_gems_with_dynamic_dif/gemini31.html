<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ring Designer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #0a0a12 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 2;
            background: rgba(15, 15, 25, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #e0e0e0;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-label {
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: #aaa;
            display: block;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            flex: 1;
            text-align: center;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        button.active {
            background: #4488ff;
            border-color: #66aaff;
            box-shadow: 0 0 10px rgba(68, 136, 255, 0.4);
        }
        .color-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .color-swatch {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        input[type=range] {
            width: 100%;
            accent-color: #4488ff;
        }
        #price-display {
            margin-top: 20px;
            font-size: 2rem;
            color: #ffd700;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 2;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h2>Ring Designer</h2>
        
        <div class="control-group">
            <span class="control-label">Ring Metal</span>
            <div class="btn-group" id="metal-btns">
                <button class="metal-btn active" data-val="gold"><span class="color-swatch" style="background:#ffd700"></span>Gold</button>
                <button class="metal-btn" data-val="silver"><span class="color-swatch" style="background:#c0c0c0"></span>Silver</button>
                <button class="metal-btn" data-val="rosegold"><span class="color-swatch" style="background:#b76e79"></span>Rose</button>
                <button class="metal-btn" data-val="platinum"><span class="color-swatch" style="background:#e5e4e2"></span>Plat</button>
            </div>
        </div>

        <div class="control-group">
            <span class="control-label">Gem Color</span>
            <div class="btn-group" id="gem-color-btns">
                <button class="gem-btn active" data-val="diamond"><span class="color-swatch" style="background:#ffffff"></span>Dia</button>
                <button class="gem-btn" data-val="ruby"><span class="color-swatch" style="background:#ff0044"></span>Ruby</button>
                <button class="gem-btn" data-val="emerald"><span class="color-swatch" style="background:#00cc44"></span>Eme</button>
                <button class="gem-btn" data-val="sapphire"><span class="color-swatch" style="background:#0044ff"></span>Sap</button>
                <button class="gem-btn" data-val="amethyst"><span class="color-swatch" style="background:#9900ff"></span>Ame</button>
            </div>
        </div>

        <div class="control-group">
            <span class="control-label">Gem Count</span>
            <div class="btn-group" id="gem-count-btns">
                <button class="count-btn" data-val="1">1 Gem</button>
                <button class="count-btn" data-val="3">3 Gems</button>
                <button class="count-btn active" data-val="5">5 Gems</button>
            </div>
        </div>

        <div class="control-group">
            <span class="control-label">Gem Size</span>
            <input type="range" id="size-slider" min="0.05" max="0.2" step="0.01" value="0.1">
        </div>

        <div class="control-group">
            <button id="rotate-btn" style="width: 100%">Auto Rotate Ring</button>
        </div>

        <div id="price-display">$1500</div>
    </div>

    <div class="instructions">
        Left Click: Rotate | Right Click: Pan | Scroll: Zoom<br>
        Keyboard: [1, 2, 3] Gem Count | [Space] Toggle Rotation | [R] Reset
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        // --- STATE MANAGEMENT ---
        const defaultState = {
            ringMetal: 'gold',
            gemColor: 'diamond',
            gemCount: 5,
            gemSize: 0.1,
            isRotating: false,
            price: 1500,
            ringRotationY: 0,
            bottleLoaded: false,
            bottleRotationY: 0,
            gemsVisible: [true, true, true, true, true]
        };

        window.__3D_STATE__ = JSON.parse(JSON.stringify(defaultState));

        const METALS = {
            gold: 0xffd700,
            silver: 0xc0c0c0,
            rosegold: 0xb76e79,
            platinum: 0xe5e4e2
        };

        const GEMS = {
            diamond: 0xffffff,
            ruby: 0xff0044,
            emerald: 0x00cc44,
            sapphire: 0x0044ff,
            amethyst: 0x9900ff
        };

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // Environment & Lighting
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const warmLight = new THREE.DirectionalLight(0xffd700, 1.0);
        warmLight.position.set(5, 5, 5);
        scene.add(warmLight);

        const coolLight = new THREE.DirectionalLight(0x4488ff, 0.6);
        coolLight.position.set(-3, 3, -2);
        scene.add(coolLight);

        // --- RING MODEL ---
        const ringGroup = new THREE.Group();
        scene.add(ringGroup);

        const ringGeo = new THREE.TorusGeometry(1.2, 0.15, 32, 64);
        const ringMat = new THREE.MeshStandardMaterial({ 
            color: METALS.gold, 
            metalness: 0.9, 
            roughness: 0.1,
            envMapIntensity: 1.5
        });
        const ringMesh = new THREE.Mesh(ringGeo, ringMat);
        ringGroup.add(ringMesh);

        // Gems
        const gemMeshes = [];
        const gemGeo = new THREE.OctahedronGeometry(0.1, 2);
        const gemMat = new THREE.MeshStandardMaterial({ 
            color: GEMS.diamond, 
            transparent: true, 
            opacity: 0.8, 
            metalness: 0.1, 
            roughness: 0.05,
            envMapIntensity: 2.0
        });

        const angles = [-60, -30, 0, 30, 60].map(deg => deg * Math.PI / 180);
        const torusRadius = 1.2;
        const tubeRadius = 0.15;
        const outerRadius = torusRadius + tubeRadius;

        angles.forEach((angle) => {
            const gem = new THREE.Mesh(gemGeo, gemMat);
            gem.position.set(Math.sin(angle) * outerRadius, Math.cos(angle) * outerRadius, 0);
            gem.rotation.z = -angle;
            ringGroup.add(gem);
            gemMeshes.push(gem);
        });

        // --- WATER BOTTLE ASSET ---
        let bottleModel = null;
        const loader = new GLTFLoader();
        loader.load(
            'WaterBottle.glb',
            (gltf) => {
                bottleModel = gltf.scene;
                bottleModel.scale.setScalar(3);
                bottleModel.position.set(3, 0, -1);
                scene.add(bottleModel);
                window.__3D_STATE__.bottleLoaded = true;
            },
            undefined,
            (error) => {
                console.log('WaterBottle.glb not found or failed to load. Skipping decorative asset.');
            }
        );

        // --- UI LOGIC & UPDATES ---
        function updateSceneFromState() {
            const state = window.__3D_STATE__;

            // Update Materials
            ringMat.color.setHex(METALS[state.ringMetal]);
            gemMat.color.setHex(GEMS[state.gemColor]);

            // Update Gems (Visibility & Scale)
            const scaleFactor = state.gemSize / 0.1;
            gemMeshes.forEach((gem, index) => {
                gem.scale.setScalar(scaleFactor);
                
                let isVisible = false;
                if (state.gemCount === 1 && index === 2) isVisible = true;
                if (state.gemCount === 3 && index >= 1 && index <= 3) isVisible = true;
                if (state.gemCount === 5) isVisible = true;
                
                gem.visible = isVisible;
                state.gemsVisible[index] = isVisible;
            });

            // Calculate Price
            state.price = 500 + (state.gemCount * 200 * (state.gemSize / 0.1));
            document.getElementById('price-display').innerText = `$${state.price.toFixed(0)}`;

            // Update UI DOM
            document.querySelectorAll('.metal-btn').forEach(b => b.classList.toggle('active', b.dataset.val === state.ringMetal));
            document.querySelectorAll('.gem-btn').forEach(b => b.classList.toggle('active', b.dataset.val === state.gemColor));
            document.querySelectorAll('.count-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.val) === state.gemCount));
            document.getElementById('size-slider').value = state.gemSize;
            document.getElementById('rotate-btn').classList.toggle('active', state.isRotating);
        }

        // Event Listeners
        document.querySelectorAll('.metal-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                window.__3D_STATE__.ringMetal = e.currentTarget.dataset.val;
                updateSceneFromState();
            });
        });

        document.querySelectorAll('.gem-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                window.__3D_STATE__.gemColor = e.currentTarget.dataset.val;
                updateSceneFromState();
            });
        });

        document.querySelectorAll('.count-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                window.__3D_STATE__.gemCount = parseInt(e.currentTarget.dataset.val);
                updateSceneFromState();
            });
        });

        document.getElementById('size-slider').addEventListener('input', (e) => {
            window.__3D_STATE__.gemSize = parseFloat(e.target.value);
            updateSceneFromState();
        });

        document.getElementById('rotate-btn').addEventListener('click', () => {
            window.__3D_STATE__.isRotating = !window.__3D_STATE__.isRotating;
            updateSceneFromState();
        });

        // Keyboard Interactions
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'r') {
                window.__3D_STATE__ = JSON.parse(JSON.stringify(defaultState));
                ringGroup.rotation.y = 0;
                updateSceneFromState();
            } else if (key === ' ') {
                e.preventDefault(); // Prevent page scroll
                window.__3D_STATE__.isRotating = !window.__3D_STATE__.isRotating;
                updateSceneFromState();
            } else if (key === '1') {
                window.__3D_STATE__.gemCount = 1;
                updateSceneFromState();
            } else if (key === '2') {
                window.__3D_STATE__.gemCount = 3;
                updateSceneFromState();
            } else if (key === '3') {
                window.__3D_STATE__.gemCount = 5;
                updateSceneFromState();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize
        updateSceneFromState();

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            const state = window.__3D_STATE__;

            if (state.isRotating) {
                ringGroup.rotation.y += 0.01;
            }
            state.ringRotationY = ringGroup.rotation.y;

            if (bottleModel) {
                bottleModel.rotation.y += 0.005;
                state.bottleRotationY = bottleModel.rotation.y;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
