<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Ring Designer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #controls {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 30, 0.85);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 16px;
    color: #fff;
    width: 280px;
    border: 1px solid rgba(255, 215, 0, 0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    max-height: calc(100vh - 40px);
    overflow-y: auto;
  }

  #controls h2 {
    text-align: center;
    margin-bottom: 16px;
    font-size: 18px;
    color: #ffd700;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .control-group {
    margin-bottom: 16px;
  }

  .control-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #aaa;
  }

  .btn-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 8px 12px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: #ccc;
    border-radius: 8px;
    cursor: pointer;
    font-size: 11px;
    transition: all 0.2s ease;
    flex: 1;
    min-width: 50px;
    text-align: center;
  }

  .btn:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border-color: rgba(255,255,255,0.4);
    transform: translateY(-1px);
  }

  .btn.active {
    background: rgba(255, 215, 0, 0.25);
    border-color: #ffd700;
    color: #ffd700;
    box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
  }

  .btn-toggle {
    width: 100%;
    padding: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: #ccc;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s ease;
  }

  .btn-toggle:hover {
    background: rgba(255,255,255,0.15);
  }

  .btn-toggle.active {
    background: rgba(0, 200, 100, 0.25);
    border-color: #00c864;
    color: #00c864;
  }

  .slider-container {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .slider-container input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    outline: none;
  }

  .slider-container input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    background: #ffd700;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(255, 215, 0, 0.4);
  }

  .slider-value {
    font-size: 12px;
    color: #ffd700;
    min-width: 35px;
    text-align: right;
  }

  #price-display {
    text-align: center;
    margin-top: 16px;
    padding: 16px;
    background: rgba(255, 215, 0, 0.08);
    border-radius: 12px;
    border: 1px solid rgba(255, 215, 0, 0.3);
  }

  #price-display .price-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #aaa;
    margin-bottom: 4px;
  }

  #price-display .price-value {
    font-size: 32px;
    font-weight: bold;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
  }

  .color-swatch {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
    border: 1px solid rgba(255,255,255,0.3);
  }

  #keyboard-hint {
    margin-top: 12px;
    padding: 10px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    font-size: 10px;
    color: #666;
    line-height: 1.6;
  }

  #keyboard-hint kbd {
    background: rgba(255,255,255,0.1);
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.15);
    font-family: monospace;
    color: #999;
  }

  #loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s ease;
  }

  #loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loader {
    text-align: center;
    color: #ffd700;
  }

  .loader-ring {
    width: 60px;
    height: 60px;
    border: 3px solid rgba(255, 215, 0, 0.2);
    border-top-color: #ffd700;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="loader">
    <div class="loader-ring"></div>
    <div>Loading Ring Designer...</div>
  </div>
</div>

<div id="controls">
  <h2>💍 Ring Designer</h2>

  <div class="control-group">
    <label>Ring Metal</label>
    <div class="btn-row" id="metal-btns">
      <div class="btn active" data-metal="gold"><span class="color-swatch" style="background:#ffd700"></span>Gold</div>
      <div class="btn" data-metal="silver"><span class="color-swatch" style="background:#c0c0c0"></span>Silver</div>
      <div class="btn" data-metal="rosegold"><span class="color-swatch" style="background:#b76e79"></span>Rose</div>
      <div class="btn" data-metal="platinum"><span class="color-swatch" style="background:#e5e4e2"></span>Plat</div>
    </div>
  </div>

  <div class="control-group">
    <label>Gem Color</label>
    <div class="btn-row" id="gem-color-btns">
      <div class="btn active" data-gem="diamond"><span class="color-swatch" style="background:#ffffff"></span>Diamond</div>
      <div class="btn" data-gem="ruby"><span class="color-swatch" style="background:#ff0044"></span>Ruby</div>
      <div class="btn" data-gem="emerald"><span class="color-swatch" style="background:#00cc44"></span>Emerald</div>
      <div class="btn" data-gem="sapphire"><span class="color-swatch" style="background:#0044ff"></span>Sapphire</div>
      <div class="btn" data-gem="amethyst"><span class="color-swatch" style="background:#9900ff"></span>Amethyst</div>
    </div>
  </div>

  <div class="control-group">
    <label>Gem Count</label>
    <div class="btn-row" id="gem-count-btns">
      <div class="btn" data-count="1">1</div>
      <div class="btn" data-count="3">3</div>
      <div class="btn active" data-count="5">5</div>
    </div>
  </div>

  <div class="control-group">
    <label>Gem Size</label>
    <div class="slider-container">
      <input type="range" id="gem-size-slider" min="0.05" max="0.2" step="0.01" value="0.1">
      <span class="slider-value" id="gem-size-value">0.10</span>
    </div>
  </div>

  <div class="control-group">
    <button class="btn-toggle" id="rotate-toggle">⟳ Auto Rotate: OFF</button>
  </div>

  <div id="price-display">
    <div class="price-label">Estimated Price</div>
    <div class="price-value" id="price-value">$1,500</div>
  </div>

  <div id="keyboard-hint">
    <kbd>R</kbd> Reset &nbsp; <kbd>Space</kbd> Toggle Rotate<br>
    <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> Set gem count (1/3/5)
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ─── Constants ───
const METALS = {
  gold: 0xffd700,
  silver: 0xc0c0c0,
  rosegold: 0xb76e79,
  platinum: 0xe5e4e2
};

const GEM_COLORS = {
  diamond: 0xffffff,
  ruby: 0xff0044,
  emerald: 0x00cc44,
  sapphire: 0x0044ff,
  amethyst: 0x9900ff
};

const GEM_ANGLES_DEG = [-60, -30, 0, 30, 60];
const GEM_COUNT_MAP = {
  1: [false, false, true, false, false],
  3: [false, true, true, true, false],
  5: [true, true, true, true, true]
};

// ─── State ───
const state = {
  ringMetal: 'gold',
  gemColor: 'diamond',
  gemCount: 5,
  gemSize: 0.1,
  isRotating: false,
  price: 1500,
  ringRotationY: 0,
  bottleLoaded: false,
  bottleRotationY: 0,
  gemsVisible: [true, true, true, true, true]
};
window.__3D_STATE__ = state;

// ─── Scene Setup ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

// Add fog for depth
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.05);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ─── Controls ───
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);
controls.minDistance = 2;
controls.maxDistance = 15;

// ─── Lights ───
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const warmLight = new THREE.DirectionalLight(0xffd700, 1.0);
warmLight.position.set(5, 5, 5);
warmLight.castShadow = true;
scene.add(warmLight);

const coolLight = new THREE.DirectionalLight(0x4488ff, 0.6);
coolLight.position.set(-3, 3, -2);
scene.add(coolLight);

// Additional fill light
const fillLight = new THREE.PointLight(0xffffff, 0.3, 20);
fillLight.position.set(0, 3, 0);
scene.add(fillLight);

// ─── Environment Map (procedural) ───
const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(256);
const cubeCamera = new THREE.CubeCamera(0.1, 100, cubeRenderTarget);

// Create a simple environment with colored planes
const envScene = new THREE.Scene();
const envGeo = new THREE.SphereGeometry(30, 32, 32);
const envMat = new THREE.MeshBasicMaterial({
  color: 0x2a2a4e,
  side: THREE.BackSide
});
const envMesh = new THREE.Mesh(envGeo, envMat);
envScene.add(envMesh);

// Add bright spots for reflections
const spotGeo = new THREE.PlaneGeometry(8, 8);
const spotMat1 = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
const spot1 = new THREE.Mesh(spotGeo, spotMat1);
spot1.position.set(0, 10, 0);
spot1.rotation.x = Math.PI / 2;
envScene.add(spot1);

const spotMat2 = new THREE.MeshBasicMaterial({ color: 0xffd700, side: THREE.DoubleSide });
const spot2 = new THREE.Mesh(spotGeo.clone(), spotMat2);
spot2.position.set(10, 5, 5);
spot2.lookAt(0, 0, 0);
envScene.add(spot2);

const spotMat3 = new THREE.MeshBasicMaterial({ color: 0x4488ff, side: THREE.DoubleSide });
const spot3 = new THREE.Mesh(spotGeo.clone(), spotMat3);
spot3.position.set(-8, 3, -5);
spot3.lookAt(0, 0, 0);
envScene.add(spot3);

cubeCamera.position.set(0, 0, 0);
cubeCamera.update(renderer, envScene);

// ─── Ground plane ───
const groundGeo = new THREE.CircleGeometry(8, 64);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x111122,
  metalness: 0.8,
  roughness: 0.4,
  envMap: cubeRenderTarget.texture
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1.2;
scene.add(ground);

// ─── Ring ───
const ringGroup = new THREE.Group();
scene.add(ringGroup);

const torusR = 1.2;
const tubeR = 0.15;

const ringGeo = new THREE.TorusGeometry(torusR, tubeR, 32, 64);
const ringMat = new THREE.MeshStandardMaterial({
  color: METALS.gold,
  metalness: 0.9,
  roughness: 0.1,
  envMap: cubeRenderTarget.texture,
  envMapIntensity: 1.5
});
const ringMesh = new THREE.Mesh(ringGeo, ringMat);
ringGroup.add(ringMesh);

// ─── Gems ───
const gems = [];
const gemMaterials = [];

for (let i = 0; i < 5; i++) {
  const angleDeg = GEM_ANGLES_DEG[i];
  const angleRad = THREE.MathUtils.degToRad(angleDeg);

  // Position on the outer surface of the torus
  // Torus parametric: the gem sits on top of the torus (at the outer edge)
  const x = (torusR + tubeR) * Math.cos(angleRad);
  const y = (torusR + tubeR) * Math.sin(angleRad);
  const z = 0;

  // Actually, for a torus lying in XZ plane (default Three.js torus is in XY),
  // we need to think about this differently.
  // Three.js TorusGeometry: the torus is in the XY plane, with the hole along Z.
  // Actually, default TorusGeometry lies in the XZ plane with the tube going around Y.
  // Let me reconsider: Three.js TorusGeometry creates a torus in the XZ plane.
  // The main circle is in XZ, and the tube circles around that.

  // For gems on the "top half" of the ring (visible from above):
  // The torus center circle is at y=0 in the XZ plane.
  // We want gems spaced along the ring from -60° to +60° (around the Y axis).
  // Each gem should be on the outer-top surface of the tube.

  // Position along the main ring circle
  const cx = torusR * Math.cos(angleRad);
  const cz = torusR * Math.sin(angleRad);

  // The gem sits on top of the tube (pointing outward and up)
  // Outward direction from center
  const outX = Math.cos(angleRad);
  const outZ = Math.sin(angleRad);

  // Place gem on the outer surface (radially outward from the torus center)
  const gemX = cx + outX * tubeR;
  const gemY = tubeR * 0.3; // slightly above center for visibility
  const gemZ = cz + outZ * tubeR;

  const gemGeo = new THREE.OctahedronGeometry(0.1, 2);
  const gemMat = new THREE.MeshStandardMaterial({
    color: GEM_COLORS.diamond,
    transparent: true,
    opacity: 0.8,
    metalness: 0.1,
    roughness: 0.05,
    envMap: cubeRenderTarget.texture,
    envMapIntensity: 2.0
  });

  const gemMesh = new THREE.Mesh(gemGeo, gemMat);
  gemMesh.position.set(gemX, gemY, gemZ);

  // Orient gem to point outward
  gemMesh.lookAt(gemX + outX, gemY + 0.5, gemZ + outZ);

  ringGroup.add(gemMesh);
  gems.push(gemMesh);
  gemMaterials.push(gemMat);
}

// ─── Water Bottle ───
let bottleModel = null;
const loader = new GLTFLoader();

// Try to load the WaterBottle model
loader.load(
  'WaterBottle.glb',
  (gltf) => {
    bottleModel = gltf.scene;
    bottleModel.scale.set(3, 3, 3);
    bottleModel.position.set(3, 0, -1);
    scene.add(bottleModel);
    state.bottleLoaded = true;
    console.log('WaterBottle.glb loaded successfully');
  },
  undefined,
  (error) => {
    console.warn('Could not load WaterBottle.glb, creating placeholder:', error.message || error);
    createPlaceholderBottle();
  }
);

function createPlaceholderBottle() {
  const bottleGroup = new THREE.Group();

  // Bottle body
  const bodyGeo = new THREE.CylinderGeometry(0.3, 0.35, 1.5, 32);
  const bodyMat = new THREE.MeshStandardMaterial({
    color: 0x2288cc,
    transparent: true,
    opacity: 0.6,
    metalness: 0.1,
    roughness: 0.05,
    envMap: cubeRenderTarget.texture
  });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.75;
  bottleGroup.add(body);

  // Bottle neck
  const neckGeo = new THREE.CylinderGeometry(0.12, 0.2, 0.4, 32);
  const neckMat = new THREE.MeshStandardMaterial({
    color: 0x2288cc,
    transparent: true,
    opacity: 0.6,
    metalness: 0.1,
    roughness: 0.05,
    envMap: cubeRenderTarget.texture
  });
  const neck = new THREE.Mesh(neckGeo, neckMat);
  neck.position.y = 1.7;
  bottleGroup.add(neck);

  // Cap
  const capGeo = new THREE.CylinderGeometry(0.14, 0.14, 0.15, 32);
  const capMat = new THREE.MeshStandardMaterial({
    color: 0xcccccc,
    metalness: 0.8,
    roughness: 0.2,
    envMap: cubeRenderTarget.texture
  });
  const cap = new THREE.Mesh(capGeo, capMat);
  cap.position.y = 1.97;
  bottleGroup.add(cap);

  // Water inside
  const waterGeo = new THREE.CylinderGeometry(0.27, 0.32, 1.2, 32);
  const waterMat = new THREE.MeshStandardMaterial({
    color: 0x44aaff,
    transparent: true,
    opacity: 0.4,
    metalness: 0.0,
    roughness: 0.0
  });
  const water = new THREE.Mesh(waterGeo, waterMat);
  water.position.y = 0.65;
  bottleGroup.add(water);

  // Label
  const labelGeo = new THREE.CylinderGeometry(0.32, 0.37, 0.5, 32, 1, true);
  const labelMat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    metalness: 0.0,
    roughness: 0.8,
    side: THREE.DoubleSide
  });
  const label = new THREE.Mesh(labelGeo, labelMat);
  label.position.y = 0.75;
  bottleGroup.add(label);

  bottleGroup.scale.set(3, 3, 3);
  bottleGroup.position.set(3, 0, -1);

  bottleModel = bottleGroup;
  scene.add(bottleGroup);
  state.bottleLoaded = true;
}

// ─── Particles (decorative) ───
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  positions[i * 3] = (Math.random() - 0.5) * 20;
  positions[i * 3 + 1] = Math.random() * 10 - 2;
  positions[i * 3 + 2] = (Math.random() - 0.5) * 20;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0xffd700,
  size: 0.02,
  transparent: true,
  opacity: 0.4
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ─── UI Logic ───
function updatePrice() {
  state.price = Math.round(500 + (state.gemCount * 200 * (state.gemSize / 0.1)));
  document.getElementById('price-value').textContent = '$' + state.price.toLocaleString();
}

function updateGemVisibility() {
  const visMap = GEM_COUNT_MAP[state.gemCount];
  state.gemsVisible = [...visMap];
  for (let i = 0; i < 5; i++) {
    gems[i].visible = visMap[i];
  }
}

function updateGemSize() {
  const scale = state.gemSize / 0.1;
  for (let i = 0; i < 5; i++) {
    gems[i].scale.set(scale, scale, scale);
  }
}

function updateRingMetal(metal) {
  state.ringMetal = metal;
  ringMat.color.setHex(METALS[metal]);

  document.querySelectorAll('#metal-btns .btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.metal === metal);
  });
  updatePrice();
}

function updateGemColor(color) {
  state.gemColor = color;
  const hex = GEM_COLORS[color];
  gemMaterials.forEach(mat => mat.color.setHex(hex));

  document.querySelectorAll('#gem-color-btns .btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.gem === color);
  });
  updatePrice();
}

function updateGemCount(count) {
  state.gemCount = count;
  updateGemVisibility();

  document.querySelectorAll('#gem-count-btns .btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.count) === count);
  });
  updatePrice();
}

function toggleRotation() {
  state.isRotating = !state.isRotating;
  const btn = document.getElementById('rotate-toggle');
  btn.textContent = `⟳ Auto Rotate: ${state.isRotating ? 'ON' : 'OFF'}`;
  btn.classList.toggle('active', state.isRotating);
}

function resetAll() {
  updateRingMetal('gold');
  updateGemColor('diamond');
  updateGemCount(5);
  state.gemSize = 0.1;
  document.getElementById('gem-size-slider').value = 0.1;
  document.getElementById('gem-size-value').textContent = '0.10';
  updateGemSize();
  state.isRotating = false;
  const btn = document.getElementById('rotate-toggle');
  btn.textContent = '⟳ Auto Rotate: OFF';
  btn.classList.remove('active');
  state.ringRotationY = 0;
  ringGroup.rotation.y = 0;
  updatePrice();
}

// ─── Event Listeners ───
document.querySelectorAll('#metal-btns .btn').forEach(btn => {
  btn.addEventListener('click', () => updateRingMetal(btn.dataset.metal));
});

document.querySelectorAll('#gem-color-btns .btn').forEach(btn => {
  btn.addEventListener('click', () => updateGemColor(btn.dataset.gem));
});

document.querySelectorAll('#gem-count-btns .btn').forEach(btn => {
  btn.addEventListener('click', () => updateGemCount(parseInt(btn.dataset.count)));
});

document.getElementById('gem-size-slider').addEventListener('input', (e) => {
  state.gemSize = parseFloat(e.target.value);
  document.getElementById('gem-size-value').textContent = state.gemSize.toFixed(2);
  updateGemSize();
  updatePrice();
});

document.getElementById('rotate-toggle').addEventListener('click', toggleRotation);

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;

  switch (e.key.toLowerCase()) {
    case 'r':
      resetAll();
      break;
    case ' ':
      e.preventDefault();
      toggleRotation();
      break;
    case '1':
      updateGemCount(1);
      break;
    case '2':
      updateGemCount(3);
      break;
    case '3':
      updateGemCount(5);
      break;
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Initialize ───
updateGemVisibility();
updateGemSize();
updatePrice();

// Hide loading overlay
setTimeout(() => {
  document.getElementById('loading-overlay').classList.add('hidden');
}, 500);

// ─── Animation Loop ───
function animate() {
  requestAnimationFrame(animate);

  // Ring rotation
  if (state.isRotating) {
    ringGroup.rotation.y += 0.01;
  }
  state.ringRotationY = ringGroup.rotation.y;

  // Bottle rotation
  if (bottleModel) {
    bottleModel.rotation.y += 0.005;
    state.bottleRotationY = bottleModel.rotation.y;
  }

  // Subtle gem sparkle
  const time = Date.now() * 0.001;
  for (let i = 0; i < 5; i++) {
    if (gems[i].visible) {
      const sparkle = 0.7 + 0.3 * Math.sin(time * 3 + i * 1.5);
      gemMaterials[i].opacity = sparkle * 0.8;
    }
  }

  // Particle drift
  const posArr = particleGeo.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    posArr[i * 3 + 1] += 0.002;
    if (posArr[i * 3 + 1] > 8) posArr[i * 3 + 1] = -2;
  }
  particleGeo.attributes.position.needsUpdate = true;

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
