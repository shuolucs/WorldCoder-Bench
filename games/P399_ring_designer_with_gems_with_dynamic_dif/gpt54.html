<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Ring Designer</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      height: 100%;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #24243e 0%, #1a1a2e 60%, #0f0f1a 100%);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    .panel {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 300px;
      background: rgba(10, 10, 20, 0.78);
      color: #fff;
      padding: 16px;
      border-radius: 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.08);
      z-index: 10;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .control-group {
      margin-bottom: 14px;
    }

    .control-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: #d9d9e8;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 13px;
    }

    button:hover {
      background: rgba(255,255,255,0.16);
      transform: translateY(-1px);
    }

    button.active {
      background: linear-gradient(135deg, rgba(255,215,0,0.28), rgba(255,255,255,0.14));
      border-color: rgba(255,215,0,0.7);
      box-shadow: 0 0 0 1px rgba(255,215,0,0.15), 0 6px 18px rgba(255,215,0,0.12);
    }

    input[type="range"] {
      width: 100%;
      accent-color: #ffd700;
    }

    .value {
      font-size: 13px;
      color: #cfcfe7;
      margin-top: 4px;
    }

    .price {
      margin-top: 10px;
      font-size: 28px;
      font-weight: bold;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255,215,0,0.2);
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #b5b5c8;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="panel">
      <h2>Ring Designer</h2>

      <div class="control-group">
        <label>Ring Metal</label>
        <div class="btn-row" id="metalButtons"></div>
      </div>

      <div class="control-group">
        <label>Gem Color</label>
        <div class="btn-row" id="gemColorButtons"></div>
      </div>

      <div class="control-group">
        <label>Gem Count</label>
        <div class="btn-row" id="gemCountButtons"></div>
      </div>

      <div class="control-group">
        <label for="gemSize">Gem Size</label>
        <input id="gemSize" type="range" min="0.05" max="0.2" step="0.01" value="0.1" />
        <div class="value" id="gemSizeValue">0.10</div>
      </div>

      <div class="control-group">
        <label>Rotate Ring</label>
        <div class="btn-row">
          <button id="rotateToggle">OFF</button>
        </div>
      </div>

      <div class="price" id="priceLabel">$1500</div>
      <div class="hint">
        Keyboard: R = Reset, Space = Toggle Rotation, 1/2/3 = Gem Count 1/3/5
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 8, 16);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    // Lighting
    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const warmLight = new THREE.DirectionalLight(0xffd700, 1.0);
    warmLight.position.set(5, 5, 5);
    scene.add(warmLight);

    const coolLight = new THREE.DirectionalLight(0x4488ff, 0.6);
    coolLight.position.set(-3, 3, -2);
    scene.add(coolLight);

    // Reflective setup
    const pmrem = new THREE.PMREMGenerator(renderer);
    const envScene = new THREE.Scene();
    envScene.background = new THREE.Color(0x1a1a2e);

    const envLight1 = new THREE.PointLight(0xfff1cc, 14, 30);
    envLight1.position.set(5, 6, 5);
    envScene.add(envLight1);

    const envLight2 = new THREE.PointLight(0x99bbff, 10, 30);
    envLight2.position.set(-5, 3, -4);
    envScene.add(envLight2);

    const envLight3 = new THREE.PointLight(0xffffff, 8, 30);
    envLight3.position.set(0, -4, 2);
    envScene.add(envLight3);

    const envMap = pmrem.fromScene(envScene, 0.04).texture;
    scene.environment = envMap;

    // Ground pedestal glow
    const pedestal = new THREE.Mesh(
      new THREE.CylinderGeometry(1.8, 2.2, 0.25, 64),
      new THREE.MeshStandardMaterial({
        color: 0x202030,
        metalness: 0.6,
        roughness: 0.35,
        envMapIntensity: 1
      })
    );
    pedestal.position.y = -1.2;
    scene.add(pedestal);

    // Ring group
    const ringGroup = new THREE.Group();
    scene.add(ringGroup);

    const metalOptions = {
      gold: 0xffd700,
      silver: 0xc0c0c0,
      rosegold: 0xb76e79,
      platinum: 0xe5e4e2
    };

    const gemOptions = {
      diamond: 0xffffff,
      ruby: 0xff0044,
      emerald: 0x00cc44,
      sapphire: 0x0044ff,
      amethyst: 0x9900ff
    };

    const defaultState = {
      ringMetal: 'gold',
      gemColor: 'diamond',
      gemCount: 5,
      gemSize: 0.1,
      isRotating: false
    };

    const state = {
      ...defaultState,
      price: 0,
      bottleLoaded: false
    };

    const ringMaterial = new THREE.MeshStandardMaterial({
      color: metalOptions.gold,
      metalness: 0.9,
      roughness: 0.1,
      envMapIntensity: 1.8
    });

    const ringMesh = new THREE.Mesh(
      new THREE.TorusGeometry(1.2, 0.15, 32, 64),
      ringMaterial
    );
    ringMesh.castShadow = false;
    ringMesh.receiveShadow = false;
    ringGroup.add(ringMesh);

    const gemMaterial = new THREE.MeshStandardMaterial({
      color: gemOptions.diamond,
      transparent: true,
      opacity: 0.8,
      metalness: 0.1,
      roughness: 0.05,
      envMapIntensity: 1.6
    });

    const gemAnglesDeg = [-60, -30, 0, 30, 60];
    const gems = [];
    const gemRadius = 1.2;
    const tubeRadius = 0.15;
    const gemOffset = 0.12;

    function createGemAtAngle(deg) {
      const rad = THREE.MathUtils.degToRad(deg);

      const x = Math.cos(rad) * (gemRadius + tubeRadius + gemOffset);
      const y = Math.sin(rad) * (gemRadius + tubeRadius + gemOffset);
      const z = 0;

      const gem = new THREE.Mesh(
        new THREE.OctahedronGeometry(0.1, 2),
        gemMaterial.clone()
      );

      gem.position.set(x, y, z);

      const normal = new THREE.Vector3(Math.cos(rad), Math.sin(rad), 0).normalize();
      gem.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), normal);

      ringGroup.add(gem);
      return gem;
    }

    gemAnglesDeg.forEach(deg => gems.push(createGemAtAngle(deg)));

    // Decorative sparkles
    const sparkleGeo = new THREE.BufferGeometry();
    const sparkleCount = 120;
    const sparklePositions = [];
    for (let i = 0; i < sparkleCount; i++) {
      const r = 2 + Math.random() * 2;
      const a = Math.random() * Math.PI * 2;
      const h = (Math.random() - 0.5) * 3;
      sparklePositions.push(Math.cos(a) * r, h, Math.sin(a) * r);
    }
    sparkleGeo.setAttribute('position', new THREE.Float32BufferAttribute(sparklePositions, 3));
    const sparkles = new THREE.Points(
      sparkleGeo,
      new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.02,
        transparent: true,
        opacity: 0.6
      })
    );
    scene.add(sparkles);

    // Bottle
    let bottle = null;
    const loader = new GLTFLoader();
    loader.load(
      'WaterBottle.glb',
      (gltf) => {
        bottle = gltf.scene;
        bottle.scale.setScalar(3);
        bottle.position.set(3, 0, -1);
        bottle.traverse((obj) => {
          if (obj.isMesh && obj.material) {
            obj.material.envMapIntensity = 1.4;
            obj.material.needsUpdate = true;
          }
        });
        scene.add(bottle);
        state.bottleLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load WaterBottle.glb', err);
      }
    );

    // UI
    const metalButtonsWrap = document.getElementById('metalButtons');
    const gemColorButtonsWrap = document.getElementById('gemColorButtons');
    const gemCountButtonsWrap = document.getElementById('gemCountButtons');
    const gemSizeInput = document.getElementById('gemSize');
    const gemSizeValue = document.getElementById('gemSizeValue');
    const rotateToggle = document.getElementById('rotateToggle');
    const priceLabel = document.getElementById('priceLabel');

    const metalLabels = {
      gold: 'Gold',
      silver: 'Silver',
      rosegold: 'RoseGold',
      platinum: 'Platinum'
    };

    const gemLabels = {
      diamond: 'Diamond',
      ruby: 'Ruby',
      emerald: 'Emerald',
      sapphire: 'Sapphire',
      amethyst: 'Amethyst'
    };

    const metalButtons = {};
    const gemButtons = {};
    const countButtons = {};

    Object.keys(metalOptions).forEach(key => {
      const btn = document.createElement('button');
      btn.textContent = metalLabels[key];
      btn.addEventListener('click', () => {
        state.ringMetal = key;
        applyState();
      });
      metalButtonsWrap.appendChild(btn);
      metalButtons[key] = btn;
    });

    Object.keys(gemOptions).forEach(key => {
      const btn = document.createElement('button');
      btn.textContent = gemLabels[key];
      btn.addEventListener('click', () => {
        state.gemColor = key;
        applyState();
      });
      gemColorButtonsWrap.appendChild(btn);
      gemButtons[key] = btn;
    });

    [1, 3, 5].forEach(count => {
      const btn = document.createElement('button');
      btn.textContent = String(count);
      btn.addEventListener('click', () => {
        state.gemCount = count;
        applyState();
      });
      gemCountButtonsWrap.appendChild(btn);
      countButtons[count] = btn;
    });

    gemSizeInput.addEventListener('input', () => {
      state.gemSize = parseFloat(gemSizeInput.value);
      applyState();
    });

    rotateToggle.addEventListener('click', () => {
      state.isRotating = !state.isRotating;
      applyState();
    });

    function getVisibleGemIndices(count) {
      if (count === 1) return [2];
      if (count === 3) return [1, 2, 3];
      return [0, 1, 2, 3, 4];
    }

    function updatePrice() {
      state.price = Math.round(500 + (state.gemCount * 200 * (state.gemSize / 0.1)));
      priceLabel.textContent = `$${state.price}`;
    }

    function applyState() {
      ringMaterial.color.setHex(metalOptions[state.ringMetal]);

      gems.forEach(gem => {
        gem.material.color.setHex(gemOptions[state.gemColor]);
        gem.scale.setScalar(state.gemSize / 0.1);
      });

      const visible = getVisibleGemIndices(state.gemCount);
      gems.forEach((gem, i) => {
        gem.visible = visible.includes(i);
      });

      gemSizeInput.value = state.gemSize.toFixed(2);
      gemSizeValue.textContent = state.gemSize.toFixed(2);

      Object.entries(metalButtons).forEach(([key, btn]) => {
        btn.classList.toggle('active', state.ringMetal === key);
      });

      Object.entries(gemButtons).forEach(([key, btn]) => {
        btn.classList.toggle('active', state.gemColor === key);
      });

      Object.entries(countButtons).forEach(([key, btn]) => {
        btn.classList.toggle('active', state.gemCount === Number(key));
      });

      rotateToggle.classList.toggle('active', state.isRotating);
      rotateToggle.textContent = state.isRotating ? 'ON' : 'OFF';

      updatePrice();
    }

    function resetState() {
      state.ringMetal = defaultState.ringMetal;
      state.gemColor = defaultState.gemColor;
      state.gemCount = defaultState.gemCount;
      state.gemSize = defaultState.gemSize;
      state.isRotating = defaultState.isRotating;
      ringGroup.rotation.set(0, 0, 0);
      applyState();
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyR') {
        resetState();
      } else if (e.code === 'Space') {
        e.preventDefault();
        state.isRotating = !state.isRotating;
        applyState();
      } else if (e.key === '1') {
        state.gemCount = 1;
        applyState();
      } else if (e.key === '2') {
        state.gemCount = 3;
        applyState();
      } else if (e.key === '3') {
        state.gemCount = 5;
        applyState();
      }
    });

    applyState();

    window.__3D_STATE__ = {
      ringMetal: state.ringMetal,
      gemColor: state.gemColor,
      gemCount: state.gemCount,
      gemSize: state.gemSize,
      isRotating: state.isRotating,
      price: state.price,
      ringRotationY: ringGroup.rotation.y,
      bottleLoaded: state.bottleLoaded,
      bottleRotationY: 0,
      gemsVisible: gems.map(g => g.visible)
    };

    function updateExportState() {
      window.__3D_STATE__.ringMetal = state.ringMetal;
      window.__3D_STATE__.gemColor = state.gemColor;
      window.__3D_STATE__.gemCount = state.gemCount;
      window.__3D_STATE__.gemSize = state.gemSize;
      window.__3D_STATE__.isRotating = state.isRotating;
      window.__3D_STATE__.price = state.price;
      window.__3D_STATE__.ringRotationY = ringGroup.rotation.y;
      window.__3D_STATE__.bottleLoaded = state.bottleLoaded;
      window.__3D_STATE__.bottleRotationY = bottle ? bottle.rotation.y : 0;
      window.__3D_STATE__.gemsVisible = gems.map(g => g.visible);
    }

    function animate() {
      requestAnimationFrame(animate);

      if (state.isRotating) {
        ringGroup.rotation.y += 0.01;
      }

      if (bottle) {
        bottle.rotation.y += 0.005;
      }

      sparkles.rotation.y += 0.0015;
      controls.update();
      updateExportState();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
