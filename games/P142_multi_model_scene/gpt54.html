<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 多模型 3D 场景搭建器</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #111;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #palette {
      position: absolute;
      top: 70px;
      left: 12px;
      width: 150px;
      background: rgba(20, 20, 20, 0.9);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 8px;
      backdrop-filter: blur(8px);
    }

    .palette-title {
      font-size: 14px;
      font-weight: bold;
      color: #ddd;
      margin-bottom: 4px;
    }

    .model-btn {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.15);
      background: #222;
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s ease;
    }

    .model-btn:hover {
      background: #2e2e2e;
      border-color: rgba(255,255,255,0.3);
    }

    .model-btn.active {
      background: #0d5bd7;
      border-color: #6ea8ff;
    }

    .thumb {
      width: 42px;
      height: 42px;
      border-radius: 6px;
      background: linear-gradient(135deg, #555, #222);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #eee;
      flex-shrink: 0;
      text-align: center;
      line-height: 1.1;
      padding: 4px;
    }

    .btn-label {
      text-align: left;
      font-size: 13px;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(20, 20, 20, 0.88);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 12px;
      z-index: 20;
      min-width: 220px;
      line-height: 1.7;
      backdrop-filter: blur(8px);
    }

    #toolbar {
      position: absolute;
      right: 12px;
      top: 12px;
      background: rgba(20, 20, 20, 0.88);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px;
      z-index: 20;
      min-width: 220px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      backdrop-filter: blur(8px);
    }

    #toolbar label {
      font-size: 13px;
      color: #ddd;
      display: block;
      margin-bottom: 4px;
    }

    #scaleSlider {
      width: 100%;
    }

    button {
      border: none;
      border-radius: 8px;
      background: #2b2b2b;
      color: #fff;
      padding: 10px 12px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #3a3a3a;
    }

    #alignBtn {
      background: #185adb;
    }

    #alignBtn:hover {
      background: #2c6df0;
    }

    #hint {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 20;
      background: rgba(20,20,20,0.88);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 12px;
      color: #ddd;
      max-width: 420px;
      font-size: 13px;
      line-height: 1.6;
      backdrop-filter: blur(8px);
    }

    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div><strong>HUD</strong></div>
      <div>场景对象总数：<span id="objectCount">0</span></div>
      <div>选中数量：<span id="selectedCount">0</span></div>
      <div>网格对齐：<span id="gridSnap">off</span></div>
    </div>

    <div id="palette">
      <div class="palette-title">模型库</div>
      <div id="paletteContent">模型加载中...</div>
    </div>

    <div id="toolbar">
      <div>
        <label for="scaleSlider">缩放（选中对象）</label>
        <input id="scaleSlider" type="range" min="0.5" max="3" step="0.1" value="1" />
      </div>
      <button id="alignBtn">对齐到网格（2单位）</button>
      <button id="toggleSnapBtn">切换网格对齐</button>
      <button id="cancelPlaceBtn">取消放置模式</button>
    </div>

    <div id="hint">
      操作说明：点击左侧模型进入放置模式；移动鼠标查看预览；点击地面放置。<br>
      点击模型选中；Shift+点击多选；拖拽移动；滚轮旋转 15°；Delete 删除；多选后可对齐到网格。
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const palette = document.getElementById('paletteContent');
    const objectCountEl = document.getElementById('objectCount');
    const selectedCountEl = document.getElementById('selectedCount');
    const gridSnapEl = document.getElementById('gridSnap');
    const scaleSlider = document.getElementById('scaleSlider');
    const alignBtn = document.getElementById('alignBtn');
    const toggleSnapBtn = document.getElementById('toggleSnapBtn');
    const cancelPlaceBtn = document.getElementById('cancelPlaceBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x20252f);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(12, 12, 16);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.getElementById('app').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 1.4));

    const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
    dirLight.position.set(10, 18, 8);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    scene.add(dirLight);

    const groundGeo = new THREE.PlaneGeometry(200, 200);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x444444,
      roughness: 1,
      metalness: 0
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    ground.name = 'ground';
    scene.add(ground);

    const gridHelper = new THREE.GridHelper(200, 100, 0x888888, 0x555555);
    scene.add(gridHelper);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const loader = new GLTFLoader();

    const MODEL_CONFIGS = [
      { key: 'ferrari', name: '汽车', path: 'assets/ferrari.glb', thumb: '汽车', scale: 1.2 },
      { key: 'robot', name: '机器人', path: 'assets/robot.glb', thumb: '机器人', scale: 1.4 },
      { key: 'duck', name: '鸭子', path: 'assets/Duck.glb', thumb: '鸭子', scale: 1.6 },
      { key: 'lantern', name: '灯笼', path: 'assets/Lantern.glb', thumb: '灯笼', scale: 1.8 }
    ];

    const loadedModels = {};
    let modelsLoaded = false;

    const placedObjects = [];
    const selectedObjects = new Set();

    let placementMode = '';
    let previewObject = null;

    let hoverPoint = new THREE.Vector3();
    let isDragging = false;
    let dragObject = null;
    let dragOffset = new THREE.Vector3();
    let dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    let dragIntersect = new THREE.Vector3();
    let pointerDownMoved = false;

    let gridSnap = false;

    function setPointerFromEvent(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function getGroundPoint(event) {
      setPointerFromEvent(event);
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(ground, false);
      return hits.length ? hits[0].point.clone() : null;
    }

    function snapVectorXZ(v, step = 2) {
      v.x = Math.round(v.x / step) * step;
      v.z = Math.round(v.z / step) * step;
      return v;
    }

    function computeModelBounds(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);
      return { box, size, center };
    }

    function normalizeModel(root, desiredScale = 1) {
      const wrapper = new THREE.Group();
      const clone = root.clone(true);

      clone.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          if (child.material) {
            child.material = child.material.clone();
          }
        }
      });

      wrapper.add(clone);
      const bounds = computeModelBounds(wrapper);
      const maxDim = Math.max(bounds.size.x, bounds.size.y, bounds.size.z) || 1;
      const fitScale = desiredScale / maxDim * 2.5;
      wrapper.scale.setScalar(fitScale);

      const updatedBounds = computeModelBounds(wrapper);
      wrapper.position.y -= updatedBounds.box.min.y;

      return wrapper;
    }

    function cloneTemplateModel(key) {
      const source = loadedModels[key];
      if (!source) return null;

      const instance = normalizeModel(source.scene, source.scale || 1);
      instance.userData.isPlacedRoot = true;
      instance.userData.modelKey = key;
      instance.userData.modelName = source.name;

      instance.traverse((child) => {
        if (child.isMesh) {
          child.userData.placedRoot = instance;
          child.userData.baseEmissive = child.material && child.material.emissive
            ? child.material.emissive.clone()
            : null;
          child.userData.baseEmissiveIntensity = child.material && typeof child.material.emissiveIntensity === 'number'
            ? child.material.emissiveIntensity
            : 1;
        }
      });

      return instance;
    }

    function clearPreview() {
      if (previewObject) {
        scene.remove(previewObject);
        previewObject = null;
      }
    }

    function createPreview(key) {
      clearPreview();
      const obj = cloneTemplateModel(key);
      if (!obj) return;
      obj.traverse((child) => {
        if (child.isMesh) {
          child.material = child.material.clone();
          child.material.transparent = true;
          child.material.opacity = 0.45;
          child.material.depthWrite = false;
        }
      });
      previewObject = obj;
      previewObject.userData.isPreview = true;
      scene.add(previewObject);
    }

    function setPlacementMode(key) {
      placementMode = key || '';
      document.querySelectorAll('.model-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.key === placementMode);
      });

      if (placementMode) createPreview(placementMode);
      else clearPreview();
    }

    function updatePreviewPosition(point) {
      if (!previewObject || !point) return;
      const pos = point.clone();
      if (gridSnap) snapVectorXZ(pos, 2);
      previewObject.position.set(pos.x, 0, pos.z);
    }

    function addPlacedObject(key, point) {
      const obj = cloneTemplateModel(key);
      if (!obj) return;

      const pos = point.clone();
      if (gridSnap) snapVectorXZ(pos, 2);
      obj.position.set(pos.x, 0, pos.z);

      scene.add(obj);
      placedObjects.push(obj);
      updateHud();
    }

    function clearSelection() {
      selectedObjects.forEach(obj => applyHighlight(obj, false));
      selectedObjects.clear();
      updateHud();
    }

    function applyHighlight(root, selected) {
      root.traverse((child) => {
        if (!child.isMesh || !child.material) return;
        const materials = Array.isArray(child.material) ? child.material : [child.material];
        materials.forEach(mat => {
          if ('emissive' in mat) {
            if (selected) {
              mat.emissive.set(0xffcc00);
              mat.emissiveIntensity = 0.7;
            } else {
              if (child.userData.baseEmissive) mat.emissive.copy(child.userData.baseEmissive);
              else mat.emissive.set(0x000000);
              mat.emissiveIntensity = child.userData.baseEmissiveIntensity ?? 1;
            }
          }
        });
      });
    }

    function selectObject(obj, additive = false) {
      if (!additive) clearSelection();

      if (selectedObjects.has(obj) && additive) {
        applyHighlight(obj, false);
        selectedObjects.delete(obj);
      } else {
        selectedObjects.add(obj);
        applyHighlight(obj, true);
      }

      if (selectedObjects.size === 1) {
        const only = [...selectedObjects][0];
        scaleSlider.value = String(only.scale.x.toFixed(1));
      }

      updateHud();
    }

    function deleteSelected() {
      [...selectedObjects].forEach(obj => {
        scene.remove(obj);
        const idx = placedObjects.indexOf(obj);
        if (idx >= 0) placedObjects.splice(idx, 1);
        selectedObjects.delete(obj);
      });
      updateHud();
    }

    function updateHud() {
      objectCountEl.textContent = String(placedObjects.length);
      selectedCountEl.textContent = String(selectedObjects.size);
      gridSnapEl.textContent = gridSnap ? 'on' : 'off';
    }

    function buildPalette() {
      palette.innerHTML = '';
      MODEL_CONFIGS.forEach(cfg => {
        const btn = document.createElement('button');
        btn.className = 'model-btn';
        btn.dataset.key = cfg.key;
        btn.innerHTML = `
          <div class="thumb">${cfg.thumb}</div>
          <div class="btn-label">${cfg.name}</div>
        `;
        btn.addEventListener('click', () => setPlacementMode(cfg.key));
        palette.appendChild(btn);
      });
    }

    function loadOneModel(cfg) {
      return new Promise((resolve, reject) => {
        loader.load(
          cfg.path,
          (gltf) => {
            loadedModels[cfg.key] = {
              ...cfg,
              scene: gltf.scene
            };
            resolve();
          },
          undefined,
          reject
        );
      });
    }

    async function preloadModels() {
      try {
        await Promise.all(MODEL_CONFIGS.map(loadOneModel));
        modelsLoaded = true;
        buildPalette();
      } catch (err) {
        console.error('模型加载失败:', err);
        palette.innerHTML = '<div style="color:#ff8080;">模型加载失败，请检查 assets 路径</div>';
      }
    }

    function getPlacedRootFromIntersections(intersections) {
      for (const hit of intersections) {
        let obj = hit.object;
        if (obj.userData && obj.userData.placedRoot) return obj.userData.placedRoot;
        while (obj) {
          if (obj.userData && obj.userData.isPlacedRoot) return obj;
          obj = obj.parent;
        }
      }
      return null;
    }

    renderer.domElement.addEventListener('pointermove', (event) => {
      const point = getGroundPoint(event);
      if (placementMode && point) {
        updatePreviewPosition(point);
      }

      if (isDragging && dragObject) {
        setPointerFromEvent(event);
        raycaster.setFromCamera(mouse, camera);
        if (raycaster.ray.intersectPlane(dragPlane, dragIntersect)) {
          const pos = dragIntersect.clone().sub(dragOffset);
          pos.y = 0;
          if (gridSnap) snapVectorXZ(pos, 2);
          dragObject.position.set(pos.x, 0, pos.z);
          pointerDownMoved = true;
        }
      }
    });

    renderer.domElement.addEventListener('pointerdown', (event) => {
      pointerDownMoved = false;

      if (placementMode) return;

      setPointerFromEvent(event);
      raycaster.setFromCamera(mouse, camera);

      const intersections = raycaster.intersectObjects(placedObjects, true);
      const root = getPlacedRootFromIntersections(intersections);

      if (root) {
        const additive = event.shiftKey;
        if (!selectedObjects.has(root) || additive) {
          selectObject(root, additive);
        }

        dragObject = root;
        isDragging = true;
        controls.enabled = false;

        const point = intersections[0].point.clone();
        dragOffset.copy(point).sub(root.position);
        dragOffset.y = 0;
      } else {
        if (!event.shiftKey) clearSelection();
      }
    });

    renderer.domElement.addEventListener('pointerup', (event) => {
      if (placementMode) {
        const point = getGroundPoint(event);
        if (point) {
          addPlacedObject(placementMode, point);
        }
        return;
      }

      if (isDragging) {
        isDragging = false;
        dragObject = null;
        controls.enabled = true;
      } else {
        controls.enabled = true;
      }

      if (!pointerDownMoved && !placementMode) {
        setPointerFromEvent(event);
        raycaster.setFromCamera(mouse, camera);
        const intersections = raycaster.intersectObjects(placedObjects, true);
        const root = getPlacedRootFromIntersections(intersections);
        if (root) {
          selectObject(root, event.shiftKey);
        } else if (!event.shiftKey) {
          clearSelection();
        }
      }
    });

    renderer.domElement.addEventListener('wheel', (event) => {
      if (selectedObjects.size > 0) {
        event.preventDefault();
        const delta = event.deltaY > 0 ? 1 : -1;
        const angle = THREE.MathUtils.degToRad(15) * delta;
        selectedObjects.forEach(obj => {
          obj.rotation.y += angle;
        });
      }
    }, { passive: false });

    scaleSlider.addEventListener('input', () => {
      if (selectedObjects.size === 0) return;
      const s = parseFloat(scaleSlider.value);
      selectedObjects.forEach(obj => obj.scale.setScalar(s));
    });

    alignBtn.addEventListener('click', () => {
      if (selectedObjects.size <= 1) return;
      selectedObjects.forEach(obj => {
        const pos = obj.position.clone();
        snapVectorXZ(pos, 2);
        obj.position.set(pos.x, 0, pos.z);
      });
    });

    toggleSnapBtn.addEventListener('click', () => {
      gridSnap = !gridSnap;
      updateHud();
    });

    cancelPlaceBtn.addEventListener('click', () => {
      setPlacementMode('');
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Delete') {
        deleteSelected();
      }
      if (event.key === 'Escape') {
        setPlacementMode('');
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      window.__3D_STATE__ = {
        modelsLoaded,
        objectCount: placedObjects.length,
        selectedCount: selectedObjects.size,
        gridSnap,
        placementMode
      };

      renderer.render(scene, camera);
    }

    updateHud();
    preloadModels();
    animate();
  </script>
</body>
</html>
