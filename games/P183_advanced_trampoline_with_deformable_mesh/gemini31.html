<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 3D Trampoline Physics Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-text {
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8), -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            font-weight: bold;
            position: absolute;
        }
        #score {
            top: 20px;
            left: 20px;
            font-size: 24px;
        }
        #combo {
            top: 20px;
            right: 20px;
            font-size: 24px;
            transition: color 0.3s;
        }
        #bounceMsg {
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            opacity: 0;
            color: #FF8C00;
        }
        #maxHeight {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
        }
        #controls-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #resetBtn {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        #resetBtn:hover {
            background: #c0392b;
        }
        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .slider-container label {
            font-size: 14px;
        }
        input[type=range] {
            width: 150px;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="score" class="hud-text">Score: 0</div>
        <div id="combo" class="hud-text">Combo: x1</div>
        <div id="bounceMsg" class="hud-text">Bounce #1</div>
        <div id="maxHeight" class="hud-text">Max Height: 12.0m</div>
        
        <div id="instructions">
            Controls:<br>
            Arrows: Move laterally<br>
            Space: Launch upward
        </div>

        <div id="controls-panel">
            <button id="resetBtn">Reset Simulation</button>
            <div class="slider-container">
                <label>Gravity: <span id="gravVal">9.81</span> m/s²</label>
                <input type="range" id="gravitySlider" min="1" max="20" step="0.1" value="9.81">
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            ferrariPosition: { x: 0, y: 12, z: 0 },
            ferrariVelocity: { x: 0, y: 0, z: 0 },
            trampolineDeformation: 0,
            score: 0,
            combo: 1,
            bounceCount: 0,
            maxHeight: 12,
            gravity: 9.81,
            isOnTrampoline: false,
            lastBounceTime: 0,
            trickBonusActive: false,
            modelLoaded: false,
            simRunning: true,
            meshVertexCount: 0,
            totalEnergy: 0
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.1;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Trampoline Construction ---
        const trampolineGroup = new THREE.Group();
        scene.add(trampolineGroup);

        // Frame
        const frameGeo = new THREE.TorusGeometry(4, 0.3, 16, 64);
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.7, roughness: 0.3 });
        const frame = new THREE.Mesh(frameGeo, frameMat);
        frame.rotation.x = -Math.PI / 2;
        frame.position.y = 2;
        frame.castShadow = true;
        frame.receiveShadow = true;
        trampolineGroup.add(frame);

        // Legs
        const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 2, 8);
        const legMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.5 });
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const leg = new THREE.Mesh(legGeo, legMat);
            leg.position.set(Math.cos(angle) * 3.9, 1, Math.sin(angle) * 3.9);
            leg.castShadow = true;
            trampolineGroup.add(leg);
        }

        // Deformable Surface
        // Generate circular alpha map to clip the PlaneGeometry
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'black'; ctx.fillRect(0, 0, 512, 512);
        ctx.beginPath(); ctx.arc(256, 256, 256, 0, Math.PI * 2);
        ctx.fillStyle = 'white'; ctx.fill();
        const alphaTex = new THREE.CanvasTexture(canvas);

        const surfaceGeo = new THREE.PlaneGeometry(7.6, 7.6, 32, 32);
        state.meshVertexCount = surfaceGeo.attributes.position.count;
        
        const surfaceMat = new THREE.MeshStandardMaterial({ 
            color: 0x1a5276, 
            side: THREE.DoubleSide,
            alphaMap: alphaTex,
            alphaTest: 0.5,
            roughness: 0.6
        });
        const surface = new THREE.Mesh(surfaceGeo, surfaceMat);
        surface.rotation.x = -Math.PI / 2;
        surface.position.y = 2;
        surface.receiveShadow = true;
        trampolineGroup.add(surface);

        // Store original vertices for deformation logic
        const posAttribute = surfaceGeo.attributes.position;
        const originalPositions = new Float32Array(posAttribute.array);
        const vertexVelocities = new Float32Array(posAttribute.count).fill(0);

        // --- Ferrari Model ---
        const ferrariGroup = new THREE.Group();
        scene.add(ferrariGroup);
        
        let ferrariBoundingHeight = 0.8; // Default fallback height
        
        // Fallback box while loading or if load fails
        const fallbackGeo = new THREE.BoxGeometry(1.5, ferrariBoundingHeight, 3);
        const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xcc0000 });
        const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
        fallbackMesh.position.y = ferrariBoundingHeight / 2;
        fallbackMesh.castShadow = true;
        ferrariGroup.add(fallbackMesh);

        const loader = new GLTFLoader();
        loader.load('._ferrari.glb', (gltf) => {
            ferrariGroup.remove(fallbackMesh);
            const model = gltf.scene;
            
            // Scale and center
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const scale = 1.5 / size.x;
            model.scale.set(scale, scale, scale);
            
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center.multiplyScalar(scale));
            
            // Recalculate bounding box after scaling
            const newBox = new THREE.Box3().setFromObject(model);
            ferrariBoundingHeight = newBox.getSize(new THREE.Vector3()).y;
            model.position.y += ferrariBoundingHeight / 2; // Align bottom to group origin
            
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            ferrariGroup.add(model);
            state.modelLoaded = true;
        }, undefined, (error) => {
            console.warn("Could not load '._ferrari.glb', using fallback box.", error);
            state.modelLoaded = true; // Proceed with simulation using fallback
        });

        // --- Input Handling ---
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        
        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = true;
            if (e.code === 'Space') {
                // Launch if near trampoline
                if (state.ferrariPosition.y < 5) {
                    state.ferrariVelocity.y += 8;
                }
            }
        });
        
        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
        });

        // --- UI Controls ---
        document.getElementById('resetBtn').addEventListener('click', () => {
            state.ferrariPosition = { x: 0, y: 12, z: 0 };
            state.ferrariVelocity = { x: 0, y: 0, z: 0 };
            state.score = 0;
            state.combo = 1;
            state.bounceCount = 0;
            state.maxHeight = 12;
            currentMaxHeightSinceBounce = 12;
            
            document.getElementById('score').innerText = `Score: 0`;
            document.getElementById('combo').innerText = `Combo: x1`;
            document.getElementById('combo').style.color = 'white';
            document.getElementById('maxHeight').innerText = `Max Height: 12.0m`;

            // Reset trampoline mesh
            const positions = surfaceGeo.attributes.position.array;
            for (let i = 0; i < positions.length; i++) {
                positions[i] = originalPositions[i];
            }
            vertexVelocities.fill(0);
            surfaceGeo.attributes.position.needsUpdate = true;
            surfaceGeo.computeVertexNormals();
        });

        document.getElementById('gravitySlider').addEventListener('input', (e) => {
            state.gravity = parseFloat(e.target.value);
            document.getElementById('gravVal').innerText = state.gravity.toFixed(2);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Physics & Simulation Logic ---
        const dt = 1 / 60;
        const trampolineSurfaceY = 2;
        const restitution = 0.85;
        let currentMaxHeightSinceBounce = 12;
        let impactData = { x: 0, z: 0, force: 0 };

        function handleBounce() {
            const now = Date.now();
            if (now - state.lastBounceTime <= 3000 && state.bounceCount > 0) {
                state.combo = Math.min(10, state.combo + 1);
            } else {
                state.combo = 1;
            }
            state.lastBounceTime = now;
            state.bounceCount++;

            let points = Math.round(currentMaxHeightSinceBounce * 10);
            state.trickBonusActive = false;

            // Trick bonus
            if (Math.abs(state.ferrariVelocity.x) > 1 || Math.abs(state.ferrariVelocity.z) > 1) {
                points += 50 * state.combo;
                state.trickBonusActive = true;
            }

            state.score += points * state.combo;
            currentMaxHeightSinceBounce = state.ferrariPosition.y;

            // Update UI
            document.getElementById('score').innerText = `Score: ${state.score}`;
            const comboEl = document.getElementById('combo');
            comboEl.innerText = `Combo: x${state.combo}`;
            comboEl.style.color = state.combo >= 5 ? '#FFD700' : 'white';

            const msgEl = document.getElementById('bounceMsg');
            msgEl.innerText = state.trickBonusActive ? `Trick! Bounce #${state.bounceCount}` : `Bounce #${state.bounceCount}`;
            msgEl.style.transition = 'none';
            msgEl.style.opacity = 1;
            
            // Force reflow to restart transition
            void msgEl.offsetWidth; 
            
            msgEl.style.transition = 'opacity 1s ease-in-out';
            msgEl.style.opacity = 0;
        }

        function updateDeformation() {
            const positions = surfaceGeo.attributes.position.array;
            let maxDef = 0;

            for (let i = 0; i < posAttribute.count; i++) {
                const lx = originalPositions[i * 3];
                const ly = originalPositions[i * 3 + 1];
                const lz = originalPositions[i * 3 + 2]; // 0

                // Map local Plane coords to World coords (due to rotation.x = -PI/2)
                const wx = lx;
                const wz = -ly;

                // Apply impact force
                if (impactData.force > 0) {
                    const dx = wx - impactData.x;
                    const dz = wz - impactData.z;
                    const distSq = dx * dx + dz * dz;
                    const falloff = Math.exp(-distSq / 1.5); // Gaussian falloff
                    vertexVelocities[i] -= impactData.force * falloff * 0.03;
                }

                // Spring physics
                const currentZ = positions[i * 3 + 2];
                const displacement = currentZ - lz;
                vertexVelocities[i] -= displacement * 0.1; // Spring stiffness
                vertexVelocities[i] *= 0.92; // Damping factor

                positions[i * 3 + 2] += vertexVelocities[i];

                const def = Math.abs(positions[i * 3 + 2] - lz);
                if (def > maxDef) maxDef = def;
            }
            
            impactData.force = 0; // Reset after applying
            surfaceGeo.attributes.position.needsUpdate = true;
            surfaceGeo.computeVertexNormals();
            state.trampolineDeformation = maxDef;
        }

        function animate() {
            requestAnimationFrame(animate);

            if (state.simRunning && state.modelLoaded) {
                // Lateral Controls
                if (keys.ArrowLeft) state.ferrariVelocity.x -= 0.15;
                if (keys.ArrowRight) state.ferrariVelocity.x += 0.15;
                if (keys.ArrowUp) state.ferrariVelocity.z -= 0.15;
                if (keys.ArrowDown) state.ferrariVelocity.z += 0.15;

                // Air resistance
                state.ferrariVelocity.x *= 0.998;
                state.ferrariVelocity.y *= 0.998;
                state.ferrariVelocity.z *= 0.998;

                // Gravity
                state.ferrariVelocity.y -= state.gravity * dt;

                // Integration
                state.ferrariPosition.x += state.ferrariVelocity.x * dt;
                state.ferrariPosition.y += state.ferrariVelocity.y * dt;
                state.ferrariPosition.z += state.ferrariVelocity.z * dt;

                // Clamp X/Z
                state.ferrariPosition.x = Math.max(-5, Math.min(5, state.ferrariPosition.x));
                state.ferrariPosition.z = Math.max(-5, Math.min(5, state.ferrariPosition.z));

                // Track max height
                if (state.ferrariPosition.y > currentMaxHeightSinceBounce) {
                    currentMaxHeightSinceBounce = state.ferrariPosition.y;
                }
                if (state.ferrariPosition.y > state.maxHeight) {
                    state.maxHeight = state.ferrariPosition.y;
                    document.getElementById('maxHeight').innerText = `Max Height: ${state.maxHeight.toFixed(1)}m`;
                }

                // Collision Detection
                const halfHeight = ferrariBoundingHeight / 2;
                const distFromCenter = Math.sqrt(state.ferrariPosition.x ** 2 + state.ferrariPosition.z ** 2);
                
                state.isOnTrampoline = false;

                // Check trampoline bounce
                if (state.ferrariPosition.y - halfHeight <= trampolineSurfaceY && state.ferrariVelocity.y < 0 && distFromCenter <= 3.8) {
                    state.ferrariPosition.y = trampolineSurfaceY + halfHeight;
                    
                    // Store impact force before modifying velocity
                    const impactForce = Math.abs(state.ferrariVelocity.y);
                    
                    // Apply bounce
                    state.ferrariVelocity.y = impactForce * restitution;
                    
                    // Add small upward impulse from trampoline recovery if it was already deformed
                    state.ferrariVelocity.y += state.trampolineDeformation * 2;
                    
                    state.isOnTrampoline = true;

                    // Trigger deformation
                    impactData.x = state.ferrariPosition.x;
                    impactData.z = state.ferrariPosition.z;
                    impactData.force = impactForce;

                    handleBounce();
                } 
                // Ground collision (if falls off edge)
                else if (state.ferrariPosition.y - halfHeight <= 0) {
                    state.ferrariPosition.y = halfHeight;
                    state.ferrariVelocity.y = Math.abs(state.ferrariVelocity.y) * 0.4; // Less bouncy on ground
                    state.ferrariVelocity.x *= 0.8; // Ground friction
                    state.ferrariVelocity.z *= 0.8;
                }

                // Update Mesh Position
                ferrariGroup.position.set(state.ferrariPosition.x, state.ferrariPosition.y, state.ferrariPosition.z);

                // Update Trampoline Deformation
                updateDeformation();

                // Calculate Energy (Mass = 1)
                const speedSq = state.ferrariVelocity.x**2 + state.ferrariVelocity.y**2 + state.ferrariVelocity.z**2;
                state.totalEnergy = 0.5 * 1 * speedSq + 1 * state.gravity * state.ferrariPosition.y;
                
                // Prevent NaNs
                if (isNaN(state.ferrariPosition.y)) {
                    document.getElementById('resetBtn').click();
                }
            }

            renderer.render(scene, camera);
        }

        // Start loop
        animate();
    </script>
</body>
</html>
