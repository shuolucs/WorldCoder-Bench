<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Trampoline Physics - Ferrari Bounce</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
}

#score {
    position: absolute;
    top: 20px; left: 20px;
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}

#combo {
    position: absolute;
    top: 20px; right: 20px;
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    transition: color 0.3s;
}

#bounceNotify {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
    opacity: 0;
    transition: opacity 0.3s;
}

#maxHeight {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}

#trickBonus {
    position: absolute;
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    color: #FFD700;
    font-size: 22px;
    font-weight: bold;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
    opacity: 0;
}

#controls {
    position: absolute;
    bottom: 20px;
    right: 20px;
    pointer-events: all;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
}

#resetBtn {
    padding: 10px 24px;
    font-size: 16px;
    font-weight: bold;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    transition: transform 0.1s, box-shadow 0.1s;
}
#resetBtn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 12px rgba(0,0,0,0.4);
}
#resetBtn:active {
    transform: scale(0.95);
}

.slider-container {
    display: flex;
    align-items: center;
    gap: 8px;
    color: white;
    font-size: 14px;
    font-weight: bold;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
    background: rgba(0,0,0,0.4);
    padding: 8px 12px;
    border-radius: 8px;
}

#gravitySlider {
    width: 120px;
    cursor: pointer;
}

#gravityValue {
    min-width: 40px;
    text-align: right;
}

#instructions {
    position: absolute;
    bottom: 80px;
    left: 20px;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
    line-height: 1.6;
}

#energy {
    position: absolute;
    top: 50px;
    left: 20px;
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}

#loadingOverlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    font-size: 24px;
    z-index: 1000;
}

.spinner {
    width: 50px; height: 50px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top: 4px solid white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 20px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div id="hud">
    <div id="score">Score: 0</div>
    <div id="energy">Energy: 0 J</div>
    <div id="combo">Combo: x1</div>
    <div id="bounceNotify"></div>
    <div id="trickBonus"></div>
    <div id="maxHeight">Max Height: 0.0m</div>
    <div id="instructions">
        SPACE - Launch upward<br>
        ← → - Move left/right<br>
        ↑ ↓ - Move forward/back
    </div>
    <div id="controls">
        <div class="slider-container">
            <label for="gravitySlider">Gravity:</label>
            <input type="range" id="gravitySlider" min="1" max="20" step="0.1" value="9.81">
            <span id="gravityValue">9.81</span>
        </div>
        <button id="resetBtn">Reset</button>
    </div>
</div>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div>Loading Ferrari Model...</div>
    <div style="font-size:14px; margin-top:10px; opacity:0.7;">Preparing trampoline simulation</div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// Add fog for depth
scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 8, 15);
camera.lookAt(0, 2, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

// Orbit controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 3, 0);
controls.maxPolarAngle = Math.PI / 2.1;

// ============ LIGHTING ============
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

// Hemisphere light for sky/ground color
const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x2d5a27, 0.3);
scene.add(hemiLight);

// ============ GROUND ============
const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x2d5a27,
    roughness: 0.9,
    metalness: 0.0
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.1;
ground.receiveShadow = true;
scene.add(ground);

// ============ TRAMPOLINE ============
const trampolineY = 2;
const trampolineRadius = 4;
const surfaceRadius = 3.8;

// Frame (torus)
const frameGeo = new THREE.TorusGeometry(trampolineRadius, 0.3, 16, 64);
const frameMat = new THREE.MeshStandardMaterial({
    color: 0x333333,
    metalness: 0.8,
    roughness: 0.3
});
const frame = new THREE.Mesh(frameGeo, frameMat);
frame.rotation.x = -Math.PI / 2;
frame.position.y = trampolineY;
frame.castShadow = true;
frame.receiveShadow = true;
scene.add(frame);

// Legs
const legCount = 8;
const legGeo = new THREE.CylinderGeometry(0.12, 0.15, trampolineY, 12);
const legMat = new THREE.MeshStandardMaterial({
    color: 0x444444,
    metalness: 0.7,
    roughness: 0.4
});

for (let i = 0; i < legCount; i++) {
    const angle = (i / legCount) * Math.PI * 2;
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(
        Math.cos(angle) * (trampolineRadius - 0.1),
        trampolineY / 2,
        Math.sin(angle) * (trampolineRadius - 0.1)
    );
    leg.castShadow = true;
    leg.receiveShadow = true;
    scene.add(leg);
}

// Springs (visual)
const springMat = new THREE.MeshStandardMaterial({
    color: 0x888888,
    metalness: 0.9,
    roughness: 0.2
});
for (let i = 0; i < 24; i++) {
    const angle = (i / 24) * Math.PI * 2;
    const springGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.4, 6);
    const spring = new THREE.Mesh(springGeo, springMat);
    spring.position.set(
        Math.cos(angle) * (surfaceRadius + 0.1),
        trampolineY,
        Math.sin(angle) * (surfaceRadius + 0.1)
    );
    spring.rotation.z = Math.PI / 2;
    spring.rotation.y = angle;
    scene.add(spring);
}

// Deformable surface
const surfaceSegments = 32;
const surfaceGeo = new THREE.PlaneGeometry(surfaceRadius * 2, surfaceRadius * 2, surfaceSegments, surfaceSegments);
const surfaceMat = new THREE.MeshStandardMaterial({
    color: 0x1a5276,
    side: THREE.DoubleSide,
    roughness: 0.6,
    metalness: 0.1,
    transparent: true,
    opacity: 0.95
});
const surfaceMesh = new THREE.Mesh(surfaceGeo, surfaceMat);
surfaceMesh.rotation.x = -Math.PI / 2;
surfaceMesh.position.y = trampolineY;
surfaceMesh.receiveShadow = true;
scene.add(surfaceMesh);

// Store original positions and clip to circle
const posAttr = surfaceGeo.getAttribute('position');
const originalPositions = new Float32Array(posAttr.count * 3);
const vertexDeformations = new Float32Array(posAttr.count); // current deformation per vertex

for (let i = 0; i < posAttr.count; i++) {
    const x = posAttr.getX(i);
    const y = posAttr.getY(i);
    const dist = Math.sqrt(x * x + y * y);

    // Clip to circle
    if (dist > surfaceRadius) {
        const scale = surfaceRadius / dist;
        posAttr.setX(i, x * scale);
        posAttr.setY(i, y * scale);
    }

    originalPositions[i * 3] = posAttr.getX(i);
    originalPositions[i * 3 + 1] = posAttr.getY(i);
    originalPositions[i * 3 + 2] = posAttr.getZ(i);
    vertexDeformations[i] = 0;
}
posAttr.needsUpdate = true;
surfaceGeo.computeVertexNormals();

const meshVertexCount = posAttr.count;

// ============ PHYSICS STATE ============
let ferrariModel = null;
let ferrariBBox = new THREE.Box3();
let ferrariHalfHeight = 0.5;
let modelLoaded = false;

const physics = {
    position: new THREE.Vector3(0, 12, 0),
    velocity: new THREE.Vector3(0, 0, 0),
    gravity: 9.81,
    restitution: 0.85,
    airResistance: 0.998,
    dt: 1 / 60
};

const gameState = {
    score: 0,
    combo: 1,
    bounceCount: 0,
    maxHeight: 12,
    lastBounceTime: 0,
    maxHeightSinceLastBounce: 12,
    trickBonusActive: false,
    isOnTrampoline: false,
    simRunning: false,
    bounceNotifyTimeout: null
};

// ============ INPUT ============
const keys = {};
window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Space') e.preventDefault();
    if (e.code.startsWith('Arrow')) e.preventDefault();
});
window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
});

// ============ UI ELEMENTS ============
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
const bounceNotifyEl = document.getElementById('bounceNotify');
const maxHeightEl = document.getElementById('maxHeight');
const trickBonusEl = document.getElementById('trickBonus');
const energyEl = document.getElementById('energy');
const resetBtn = document.getElementById('resetBtn');
const gravitySlider = document.getElementById('gravitySlider');
const gravityValue = document.getElementById('gravityValue');
const loadingOverlay = document.getElementById('loadingOverlay');

gravitySlider.addEventListener('input', () => {
    physics.gravity = parseFloat(gravitySlider.value);
    gravityValue.textContent = physics.gravity.toFixed(1);
});

resetBtn.style.pointerEvents = 'all';
resetBtn.addEventListener('click', resetSimulation);

function resetSimulation() {
    physics.position.set(0, 12, 0);
    physics.velocity.set(0, 0, 0);
    gameState.score = 0;
    gameState.combo = 1;
    gameState.bounceCount = 0;
    gameState.maxHeight = 12;
    gameState.maxHeightSinceLastBounce = 12;
    gameState.lastBounceTime = 0;
    gameState.trickBonusActive = false;
    gameState.isOnTrampoline = false;

    // Reset trampoline mesh
    for (let i = 0; i < posAttr.count; i++) {
        posAttr.setZ(i, originalPositions[i * 3 + 2]);
        vertexDeformations[i] = 0;
    }
    posAttr.needsUpdate = true;
    surfaceGeo.computeVertexNormals();

    updateUI();
}

function updateUI() {
    scoreEl.textContent = `Score: ${gameState.score}`;
    comboEl.textContent = `Combo: x${gameState.combo}`;
    comboEl.style.color = gameState.combo >= 5 ? '#FFD700' : 'white';
    maxHeightEl.textContent = `Max Height: ${gameState.maxHeight.toFixed(1)}m`;

    const v = physics.velocity;
    const h = Math.max(0, physics.position.y);
    const totalEnergy = 0.5 * (v.x * v.x + v.y * v.y + v.z * v.z) + physics.gravity * h;
    energyEl.textContent = `Energy: ${totalEnergy.toFixed(1)} J`;
}

function showBounceNotify() {
    bounceNotifyEl.textContent = `Bounce #${gameState.bounceCount}`;
    bounceNotifyEl.style.opacity = '1';
    if (gameState.bounceNotifyTimeout) clearTimeout(gameState.bounceNotifyTimeout);
    gameState.bounceNotifyTimeout = setTimeout(() => {
        bounceNotifyEl.style.opacity = '0';
    }, 1000);
}

function showTrickBonus(points) {
    trickBonusEl.textContent = `✨ TRICK BONUS! +${points} ✨`;
    trickBonusEl.style.opacity = '1';
    setTimeout(() => {
        trickBonusEl.style.opacity = '0';
    }, 1500);
}

// ============ LOAD FERRARI MODEL ============
const loader = new GLTFLoader();

function createFallbackFerrari() {
    const group = new THREE.Group();

    // Car body
    const bodyGeo = new THREE.BoxGeometry(1.5, 0.4, 3);
    const bodyMat = new THREE.MeshStandardMaterial({
        color: 0xff0000,
        metalness: 0.7,
        roughness: 0.3
    });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.3;
    body.castShadow = true;
    group.add(body);

    // Cabin
    const cabinGeo = new THREE.BoxGeometry(1.2, 0.35, 1.2);
    const cabinMat = new THREE.MeshStandardMaterial({
        color: 0x222222,
        metalness: 0.5,
        roughness: 0.2,
        transparent: true,
        opacity: 0.7
    });
    const cabin = new THREE.Mesh(cabinGeo, cabinMat);
    cabin.position.set(0, 0.65, -0.2);
    cabin.castShadow = true;
    group.add(cabin);

    // Hood slope
    const hoodGeo = new THREE.BoxGeometry(1.3, 0.15, 1.2);
    const hoodMat = new THREE.MeshStandardMaterial({ color: 0xff0000, metalness: 0.7, roughness: 0.3 });
    const hood = new THREE.Mesh(hoodGeo, hoodMat);
    hood.position.set(0, 0.55, 0.9);
    hood.rotation.x = -0.15;
    hood.castShadow = true;
    group.add(hood);

    // Wheels
    const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.15, 16);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.3, roughness: 0.8 });
    const wheelPositions = [
        [-0.7, 0.05, 0.8],
        [0.7, 0.05, 0.8],
        [-0.7, 0.05, -0.8],
        [0.7, 0.05, -0.8]
    ];
    wheelPositions.forEach(pos => {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.position.set(...pos);
        wheel.rotation.z = Math.PI / 2;
        wheel.castShadow = true;
        group.add(wheel);
    });

    // Headlights
    const lightGeo = new THREE.SphereGeometry(0.08, 8, 8);
    const lightMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0xffffcc, emissiveIntensity: 0.5 });
    [[-0.5, 0.35, 1.5], [0.5, 0.35, 1.5]].forEach(pos => {
        const hl = new THREE.Mesh(lightGeo, lightMat);
        hl.position.set(...pos);
        group.add(hl);
    });

    // Taillights
    const tailMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.3 });
    [[-0.5, 0.35, -1.5], [0.5, 0.35, -1.5]].forEach(pos => {
        const tl = new THREE.Mesh(lightGeo, tailMat);
        tl.position.set(...pos);
        group.add(tl);
    });

    // Ferrari logo placeholder (yellow shield on hood)
    const logoGeo = new THREE.PlaneGeometry(0.2, 0.2);
    const logoMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.8, roughness: 0.2 });
    const logo = new THREE.Mesh(logoGeo, logoMat);
    logo.position.set(0, 0.52, 1.3);
    logo.rotation.x = -Math.PI / 2 - 0.15;
    group.add(logo);

    return group;
}

function setupFerrari(model) {
    ferrariModel = model;
    scene.add(ferrariModel);

    // Compute bounding box
    ferrariBBox = new THREE.Box3().setFromObject(ferrariModel);
    const size = new THREE.Vector3();
    ferrariBBox.getSize(size);

    // Scale to ~1.5 units wide
    const targetWidth = 1.5;
    const scaleFactor = targetWidth / Math.max(size.x, 0.001);
    ferrariModel.scale.multiplyScalar(scaleFactor);

    // Recompute after scale
    ferrariBBox.setFromObject(ferrariModel);
    ferrariBBox.getSize(size);
    ferrariHalfHeight = size.y / 2;

    // Enable shadows
    ferrariModel.traverse((child) => {
        if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
        }
    });

    ferrariModel.position.copy(physics.position);
    modelLoaded = true;
    gameState.simRunning = true;

    loadingOverlay.style.display = 'none';
}

// Try loading the GLB file, fall back to procedural model
loader.load(
    '._ferrari.glb',
    (gltf) => {
        setupFerrari(gltf.scene);
    },
    undefined,
    (error) => {
        console.warn('Could not load ._ferrari.glb, using fallback model:', error);
        const fallback = createFallbackFerrari();
        setupFerrari(fallback);
    }
);

// If loading takes too long, use fallback
setTimeout(() => {
    if (!modelLoaded) {
        console.warn('Model load timeout, using fallback');
        const fallback = createFallbackFerrari();
        setupFerrari(fallback);
    }
}, 5000);

// ============ TRAMPOLINE DEFORMATION ============
function deformTrampoline(impactX, impactZ, strength) {
    const maxDeform = Math.min(strength * 0.5, 1.5);
    const impactRadius = 2.5;

    for (let i = 0; i < posAttr.count; i++) {
        const vx = originalPositions[i * 3];
        const vy = originalPositions[i * 3 + 1];
        const dx = vx - impactX;
        const dy = vy - impactZ;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < impactRadius) {
            // Gaussian falloff
            const falloff = Math.exp(-(dist * dist) / (impactRadius * 0.8));
            const deform = maxDeform * falloff;
            vertexDeformations[i] = Math.max(vertexDeformations[i], deform);
        }
    }
}

function updateTrampolineDeformation() {
    const dampingFactor = 0.92;
    let maxDeformation = 0;

    for (let i = 0; i < posAttr.count; i++) {
        vertexDeformations[i] *= dampingFactor;
        if (vertexDeformations[i] < 0.001) vertexDeformations[i] = 0;

        posAttr.setZ(i, originalPositions[i * 3 + 2] - vertexDeformations[i]);

        if (vertexDeformations[i] > maxDeformation) {
            maxDeformation = vertexDeformations[i];
        }
    }

    posAttr.needsUpdate = true;
    surfaceGeo.computeVertexNormals();

    return maxDeformation;
}

// ============ PARTICLE EFFECTS ============
const particles = [];

function createBounceParticles(x, y, z) {
    const count = 15;
    for (let i = 0; i < count; i++) {
        const geo = new THREE.SphereGeometry(0.05, 4, 4);
        const mat = new THREE.MeshBasicMaterial({
            color: new THREE.Color().setHSL(Math.random() * 0.1 + 0.55, 1, 0.6),
            transparent: true,
            opacity: 1
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, y, z);
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        mesh.userData.velocity = new THREE.Vector3(
            Math.cos(angle) * speed,
            2 + Math.random() * 4,
            Math.sin(angle) * speed
        );
        mesh.userData.life = 1;
        scene.add(mesh);
        particles.push(mesh);
    }
}

function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.userData.life -= dt * 1.5;
        if (p.userData.life <= 0) {
            scene.remove(p);
            p.geometry.dispose();
            p.material.dispose();
            particles.splice(i, 1);
            continue;
        }
        p.userData.velocity.y -= physics.gravity * dt;
        p.position.add(p.userData.velocity.clone().multiplyScalar(dt));
        p.material.opacity = p.userData.life;
        p.scale.setScalar(p.userData.life);
    }
}

// ============ SHADOW INDICATOR ============
const shadowGeo = new THREE.CircleGeometry(0.8, 32);
const shadowMat = new THREE.MeshBasicMaterial({
    color: 0x000000,
    transparent: true,
    opacity: 0.3,
    depthWrite: false
});
const shadowIndicator = new THREE.Mesh(shadowGeo, shadowMat);
shadowIndicator.rotation.x = -Math.PI / 2;
shadowIndicator.position.y = trampolineY + 0.01;
scene.add(shadowIndicator);

// ============ MAIN LOOP ============
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
    requestAnimationFrame(animate);

    const dt = physics.dt;
    const now = performance.now();

    controls.update();

    if (gameState.simRunning && modelLoaded && ferrariModel) {
        // Input handling
        if (keys['ArrowLeft']) {
            physics.velocity.x -= 0.15;
        }
        if (keys['ArrowRight']) {
            physics.velocity.x += 0.15;
        }
        if (keys['ArrowUp']) {
            physics.velocity.z -= 0.15;
        }
        if (keys['ArrowDown']) {
            physics.velocity.z += 0.15;
        }
        if (keys['Space']) {
            const nearTrampoline = physics.position.y <= trampolineY + ferrariHalfHeight + 0.5;
            if (nearTrampoline) {
                physics.velocity.y += 8;
                keys['Space'] = false; // Single press
            }
        }

        // Gravity
        physics.velocity.y -= physics.gravity * dt;

        // Air resistance
        physics.velocity.x *= physics.airResistance;
        physics.velocity.y *= physics.airResistance;
        physics.velocity.z *= physics.airResistance;

        // Euler integration
        physics.position.x += physics.velocity.x * dt;
        physics.position.y += physics.velocity.y * dt;
        physics.position.z += physics.velocity.z * dt;

        // Clamp horizontal position
        physics.position.x = Math.max(-5, Math.min(5, physics.position.x));
        physics.position.z = Math.max(-5, Math.min(5, physics.position.z));

        // Track max height
        if (physics.position.y > gameState.maxHeightSinceLastBounce) {
            gameState.maxHeightSinceLastBounce = physics.position.y;
        }
        if (physics.position.y > gameState.maxHeight) {
            gameState.maxHeight = physics.position.y;
        }

        // Check if on trampoline surface (within circular radius)
        const distFromCenter = Math.sqrt(
            physics.position.x * physics.position.x +
            physics.position.z * physics.position.z
        );
        const onTrampolineArea = distFromCenter <= surfaceRadius;

        // Bounce detection
        const bounceY = trampolineY + ferrariHalfHeight;
        const wasAbove = gameState.isOnTrampoline === false;

        if (physics.position.y <= bounceY && physics.velocity.y < 0 && onTrampolineArea) {
            // Bounce!
            physics.position.y = bounceY;

            // Deform trampoline
            const impactSpeed = Math.abs(physics.velocity.y);
            deformTrampoline(physics.position.x, physics.position.z, impactSpeed);

            // Create particles
            createBounceParticles(physics.position.x, trampolineY, physics.position.z);

            // Apply bounce with restitution
            physics.velocity.y = -physics.velocity.y * physics.restitution;

            // Small upward impulse from deformation recovery
            physics.velocity.y += 0.5;

            if (!gameState.isOnTrampoline) {
                gameState.isOnTrampoline = true;

                // Scoring
                gameState.bounceCount++;

                // Combo check
                const timeSinceLastBounce = now - gameState.lastBounceTime;
                if (timeSinceLastBounce < 3000 && gameState.lastBounceTime > 0) {
                    gameState.combo = Math.min(gameState.combo + 1, 10);
                } else {
                    gameState.combo = 1;
                }

                // Height score
                const heightScore = Math.round(Math.max(0, gameState.maxHeightSinceLastBounce - trampolineY) * 10);
                let bounceScore = heightScore * gameState.combo;

                // Trick bonus
                const horizontalSpeed = Math.sqrt(
                    physics.velocity.x * physics.velocity.x +
                    physics.velocity.z * physics.velocity.z
                );
                if (horizontalSpeed > 1) {
                    const trickPoints = 50 * gameState.combo;
                    bounceScore += trickPoints;
                    gameState.trickBonusActive = true;
                    showTrickBonus(trickPoints);
                } else {
                    gameState.trickBonusActive = false;
                }

                gameState.score += bounceScore;
                gameState.lastBounceTime = now;
                gameState.maxHeightSinceLastBounce = physics.position.y;

                showBounceNotify();
            }
        } else if (physics.position.y > bounceY + 0.1) {
            gameState.isOnTrampoline = false;
        }

        // Ground collision (below trampoline or outside)
        if (physics.position.y <= ferrariHalfHeight && !onTrampolineArea) {
            physics.position.y = ferrariHalfHeight;
            physics.velocity.y = Math.abs(physics.velocity.y) * 0.3;
            physics.velocity.x *= 0.9;
            physics.velocity.z *= 0.9;
        }

        // Prevent falling through everything
        if (physics.position.y < -1) {
            physics.position.y = ferrariHalfHeight;
            physics.velocity.y = 0;
        }

        // Combo timeout check
        if (now - gameState.lastBounceTime > 3000 && gameState.lastBounceTime > 0) {
            gameState.combo = 1;
        }

        // Update Ferrari model position
        ferrariModel.position.copy(physics.position);

        // Add slight rotation based on velocity
        ferrariModel.rotation.z = -physics.velocity.x * 0.05;
        ferrariModel.rotation.x = physics.velocity.z * 0.05;
        ferrariModel.rotation.y += physics.velocity.x * 0.01;

        // Update shadow indicator
        if (onTrampolineArea) {
            shadowIndicator.position.x = physics.position.x;
            shadowIndicator.position.z = physics.position.z;
            shadowIndicator.position.y = trampolineY + 0.01;
            const heightAbove = physics.position.y - trampolineY;
            const shadowScale = Math.max(0.3, 1 - heightAbove * 0.05);
            shadowIndicator.scale.setScalar(shadowScale);
            shadowIndicator.material.opacity = Math.max(0.05, 0.3 - heightAbove * 0.02);
            shadowIndicator.visible = true;
        } else {
            shadowIndicator.visible = false;
        }
    }

    // Update trampoline deformation
    const maxDeformation = updateTrampolineDeformation();

    // Update particles
    updateParticles(dt);

    // Sanitize values (prevent NaN)
    if (isNaN(physics.position.x)) physics.position.x = 0;
    if (isNaN(physics.position.y)) physics.position.y = 12;
    if (isNaN(physics.position.z)) physics.position.z = 0;
    if (isNaN(physics.velocity.x)) physics.velocity.x = 0;
    if (isNaN(physics.velocity.y)) physics.velocity.y = 0;
    if (isNaN(physics.velocity.z)) physics.velocity.z = 0;
    if (isNaN(gameState.score)) gameState.score = 0;
    if (isNaN(gameState.maxHeight)) gameState.maxHeight = 0;

    // Update UI
    updateUI();

    // Update global state
    const v = physics.velocity;
    const h = Math.max(0, physics.position.y);
    const totalEnergy = 0.5 * (v.x * v.x + v.y * v.y + v.z * v.z) + physics.gravity * h;

    window.__3D_STATE__ = {
        ferrariPosition: { x: physics.position.x, y: physics.position.y, z: physics.position.z },
        ferrariVelocity: { x: physics.velocity.x, y: physics.velocity.y, z: physics.velocity.z },
        trampolineDeformation: maxDeformation,
        score: gameState.score,
        combo: gameState.combo,
        bounceCount: gameState.bounceCount,
        maxHeight: gameState.maxHeight,
        gravity: physics.gravity,
        isOnTrampoline: gameState.isOnTrampoline,
        lastBounceTime: gameState.lastBounceTime,
        trickBonusActive: gameState.trickBonusActive,
        modelLoaded: modelLoaded,
        simRunning: gameState.simRunning,
        meshVertexCount: meshVertexCount,
        totalEnergy: isNaN(totalEnergy) ? 0 : totalEnergy
    };

    renderer.render(scene, camera);
}

animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize state
window.__3D_STATE__ = {
    ferrariPosition: { x: 0, y: 12, z: 0 },
    ferrariVelocity: { x: 0, y: 0, z: 0 },
    trampolineDeformation: 0,
    score: 0,
    combo: 1,
    bounceCount: 0,
    maxHeight: 12,
    gravity: 9.81,
    isOnTrampoline: false,
    lastBounceTime: 0,
    trickBonusActive: false,
    modelLoaded: false,
    simRunning: false,
    meshVertexCount: meshVertexCount,
    totalEnergy: 0
};
</script>
</body>
