<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Trampoline Ferrari Physics</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #87CEEB 0%, #ffffff 100%);
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      pointer-events: none;
      user-select: none;
      z-index: 10;
    }

    #score {
      top: 16px;
      left: 16px;
      font-size: 24px;
      font-weight: bold;
    }

    #combo {
      top: 16px;
      right: 16px;
      font-size: 24px;
      font-weight: bold;
      text-align: right;
    }

    #bounceNotice {
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 32px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.1s linear;
    }

    #maxHeight {
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      font-weight: bold;
    }

    #controls {
      position: absolute;
      right: 16px;
      bottom: 16px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
    }

    #resetBtn {
      pointer-events: auto;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      background: #ffffff;
      color: #222;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .sliderWrap {
      pointer-events: auto;
      background: rgba(255,255,255,0.9);
      color: #222;
      padding: 10px 12px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      min-width: 200px;
    }

    .sliderWrap label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .sliderRow {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sliderRow input {
      flex: 1;
    }
  </style>
</head>
<body>
  <div id="score" class="hud">Score: 0</div>
  <div id="combo" class="hud">Combo: x1</div>
  <div id="bounceNotice" class="hud">Bounce #0</div>
  <div id="maxHeight" class="hud">Max Height: 0.00m</div>

  <div id="controls">
    <div class="sliderWrap">
      <label for="gravitySlider">Gravity: <span id="gravityValue">9.81</span></label>
      <div class="sliderRow">
        <input id="gravitySlider" type="range" min="1" max="20" step="0.01" value="9.81" />
      </div>
    </div>
    <button id="resetBtn">Reset</button>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#87CEEB');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 15, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(60, 60),
      new THREE.MeshStandardMaterial({ color: '#2d5a27' })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.1;
    ground.receiveShadow = true;
    scene.add(ground);

    const trampolineGroup = new THREE.Group();
    scene.add(trampolineGroup);

    const frame = new THREE.Mesh(
      new THREE.TorusGeometry(4, 0.3, 24, 96),
      new THREE.MeshStandardMaterial({
        color: '#444444',
        metalness: 0.85,
        roughness: 0.3
      })
    );
    frame.rotation.x = Math.PI / 2;
    frame.position.y = 2;
    frame.castShadow = true;
    frame.receiveShadow = true;
    trampolineGroup.add(frame);

    const legGeo = new THREE.CylinderGeometry(0.15, 0.18, 2, 16);
    const legMat = new THREE.MeshStandardMaterial({
      color: '#555555',
      metalness: 0.75,
      roughness: 0.35
    });

    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const x = Math.cos(angle) * 3.7;
      const z = Math.sin(angle) * 3.7;
      const leg = new THREE.Mesh(legGeo, legMat);
      leg.position.set(x, 1, z);
      leg.castShadow = true;
      leg.receiveShadow = true;
      trampolineGroup.add(leg);
    }

    const planeSize = 7.6;
    const trampolineRadius = 3.8;
    const trampolineSegments = 32;

    const trampolineGeometry = new THREE.PlaneGeometry(planeSize, planeSize, trampolineSegments, trampolineSegments);
    trampolineGeometry.rotateX(-Math.PI / 2);

    const posAttr = trampolineGeometry.attributes.position;
    const originalPositions = new Float32Array(posAttr.array.length);
    const deformationVelocities = new Float32Array(posAttr.count);

    for (let i = 0; i < posAttr.array.length; i++) {
      originalPositions[i] = posAttr.array[i];
    }

    const colors = [];
    for (let i = 0; i < posAttr.count; i++) {
      const x = posAttr.getX(i);
      const z = posAttr.getZ(i);
      const dist = Math.sqrt(x * x + z * z);
      const inside = dist <= trampolineRadius;
      colors.push(inside ? 0x1a / 255 : 0, inside ? 0x52 / 255 : 0, inside ? 0x76 / 255 : 0);
    }
    trampolineGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

    const trampolineMaterial = new THREE.MeshStandardMaterial({
      color: '#1a5276',
      side: THREE.DoubleSide,
      vertexColors: true,
      transparent: true,
      opacity: 1.0
    });

    const trampolineMesh = new THREE.Mesh(trampolineGeometry, trampolineMaterial);
    trampolineMesh.position.y = 2;
    trampolineMesh.receiveShadow = true;
    trampolineMesh.castShadow = true;
    trampolineGroup.add(trampolineMesh);

    const scoreEl = document.getElementById('score');
    const comboEl = document.getElementById('combo');
    const bounceNoticeEl = document.getElementById('bounceNotice');
    const maxHeightEl = document.getElementById('maxHeight');
    const resetBtn = document.getElementById('resetBtn');
    const gravitySlider = document.getElementById('gravitySlider');
    const gravityValue = document.getElementById('gravityValue');

    const keys = {
      left: false,
      right: false,
      up: false,
      down: false,
      space: false
    };

    let ferrari = null;
    let modelLoaded = false;
    let simRunning = false;
    let isOnTrampoline = false;
    let halfHeight = 0.5;

    const dt = 1 / 60;
    let gravity = parseFloat(gravitySlider.value);
    const restitution = 0.85;
    const airResistance = 0.998;
    const mass = 1;

    const ferrariPos = new THREE.Vector3(0, 12, 0);
    const ferrariVel = new THREE.Vector3(0, 0, 0);

    let score = 0;
    let combo = 1;
    let bounceCount = 0;
    let maxHeight = 12;
    let maxHeightSinceLastBounce = 12;
    let lastBounceTime = 0;
    let trickBonusActive = false;
    let bounceNoticeStart = -9999;
    let lastSpaceLaunchTime = -9999;

    function safeNumber(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function updateHUD() {
      scoreEl.textContent = `Score: ${Math.round(score)}`;
      comboEl.textContent = `Combo: x${combo}`;
      comboEl.style.color = combo >= 5 ? '#FFD700' : '#FFFFFF';
      maxHeightEl.textContent = `Max Height: ${safeNumber(maxHeight, 0).toFixed(2)}m`;

      const elapsed = performance.now() - bounceNoticeStart;
      if (elapsed >= 0 && elapsed < 1000) {
        bounceNoticeEl.style.opacity = String(1 - elapsed / 1000);
      } else {
        bounceNoticeEl.style.opacity = '0';
      }
    }

    function getTrampolineSurfaceYAt(worldX, worldZ) {
      const localX = worldX;
      const localZ = worldZ;
      if (Math.sqrt(localX * localX + localZ * localZ) > trampolineRadius) return 2;

      const vertsX = trampolineSegments + 1;
      const vertsZ = trampolineSegments + 1;
      const cellSize = planeSize / trampolineSegments;

      let gx = (localX + planeSize / 2) / cellSize;
      let gz = (localZ + planeSize / 2) / cellSize;

      gx = THREE.MathUtils.clamp(gx, 0, trampolineSegments);
      gz = THREE.MathUtils.clamp(gz, 0, trampolineSegments);

      const ix = Math.floor(gx);
      const iz = Math.floor(gz);

      const ix1 = Math.min(ix + 1, trampolineSegments);
      const iz1 = Math.min(iz + 1, trampolineSegments);

      const fx = gx - ix;
      const fz = gz - iz;

      function idx(xi, zi) {
        return zi * vertsX + xi;
      }

      const y00 = posAttr.getY(idx(ix, iz));
      const y10 = posAttr.getY(idx(ix1, iz));
      const y01 = posAttr.getY(idx(ix, iz1));
      const y11 = posAttr.getY(idx(ix1, iz1));

      const y0 = THREE.MathUtils.lerp(y00, y10, fx);
      const y1 = THREE.MathUtils.lerp(y01, y11, fx);
      const localY = THREE.MathUtils.lerp(y0, y1, fz);

      return trampolineMesh.position.y + localY;
    }

    function deformTrampoline(impactX, impactZ, strength = 0.8, radius = 1.6) {
      for (let i = 0; i < posAttr.count; i++) {
        const ox = originalPositions[i * 3 + 0];
        const oy = originalPositions[i * 3 + 1];
        const oz = originalPositions[i * 3 + 2];

        const distCenter = Math.sqrt(ox * ox + oz * oz);
        if (distCenter > trampolineRadius) continue;

        const dx = ox - impactX;
        const dz = oz - impactZ;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist < radius) {
          const falloff = Math.exp(-(dist * dist) / (2 * (radius * 0.45) * (radius * 0.45)));
          const currentY = posAttr.getY(i);
          const targetPush = strength * falloff;
          const newY = Math.min(currentY, oy - targetPush);
          posAttr.setY(i, newY);
          deformationVelocities[i] -= targetPush * 0.08;
        }
      }

      posAttr.needsUpdate = true;
      trampolineGeometry.computeVertexNormals();
    }

    function restoreTrampoline() {
      const spring = 0.12;
      const damping = 0.92;

      for (let i = 0; i < posAttr.count; i++) {
        const ox = originalPositions[i * 3 + 0];
        const oy = originalPositions[i * 3 + 1];
        const oz = originalPositions[i * 3 + 2];

        const distCenter = Math.sqrt(ox * ox + oz * oz);
        if (distCenter > trampolineRadius) {
          posAttr.setY(i, oy);
          deformationVelocities[i] = 0;
          continue;
        }

        let y = posAttr.getY(i);
        let vy = deformationVelocities[i];

        const force = (oy - y) * spring;
        vy += force;
        vy *= damping;
        y += vy;

        if (!Number.isFinite(y)) y = oy;
        if (!Number.isFinite(vy)) vy = 0;

        posAttr.setY(i, y);
        deformationVelocities[i] = vy;
      }

      posAttr.needsUpdate = true;
      trampolineGeometry.computeVertexNormals();
    }

    function getMaxDeformation() {
      let maxDef = 0;
      for (let i = 0; i < posAttr.count; i++) {
        const oy = originalPositions[i * 3 + 1];
        const y = posAttr.getY(i);
        const def = Math.max(0, oy - y);
        if (def > maxDef) maxDef = def;
      }
      return safeNumber(maxDef, 0);
    }

    function resetSimulation() {
      ferrariPos.set(0, 12, 0);
      ferrariVel.set(0, 0, 0);
      isOnTrampoline = false;
      score = 0;
      combo = 1;
      bounceCount = 0;
      maxHeight = 12;
      maxHeightSinceLastBounce = 12;
      lastBounceTime = 0;
      trickBonusActive = false;
      bounceNoticeStart = -9999;
      lastSpaceLaunchTime = -9999;

      for (let i = 0; i < posAttr.count; i++) {
        posAttr.setXYZ(
          i,
          originalPositions[i * 3 + 0],
          originalPositions[i * 3 + 1],
          originalPositions[i * 3 + 2]
        );
        deformationVelocities[i] = 0;
      }
      posAttr.needsUpdate = true;
      trampolineGeometry.computeVertexNormals();

      if (ferrari) {
        ferrari.position.copy(ferrariPos);
        ferrari.rotation.set(0, Math.PI, 0);
      }

      updateHUD();
    }

    function handleBounce(now) {
      const timeSinceLast = lastBounceTime > 0 ? (now - lastBounceTime) : 0;

      if (lastBounceTime > 0 && timeSinceLast <= 3000) {
        combo = Math.min(combo + 1, 10);
      } else {
        combo = 1;
      }

      bounceCount++;

      const bounceHeight = Math.max(0, maxHeightSinceLastBounce - 2);
      let points = Math.round(bounceHeight * 10) * combo;

      trickBonusActive = Math.abs(ferrariVel.x) > 1 || Math.abs(ferrariVel.z) > 1;
      if (trickBonusActive) {
        points += 50 * combo;
      }

      score += points;
      lastBounceTime = now;
      bounceNoticeStart = now;
      bounceNoticeEl.textContent = `Bounce #${bounceCount}`;
      maxHeightSinceLastBounce = ferrariPos.y;
    }

    function clampFerrariBounds() {
      ferrariPos.x = THREE.MathUtils.clamp(safeNumber(ferrariPos.x), -5, 5);
      ferrariPos.z = THREE.MathUtils.clamp(safeNumber(ferrariPos.z), -5, 5);
    }

    function updatePhysics() {
      if (!modelLoaded || !simRunning || !ferrari) return;

      const now = performance.now();

      if (lastBounceTime > 0 && now - lastBounceTime > 3000) {
        combo = 1;
      }

      if (keys.left) ferrariVel.x -= 0.15;
      if (keys.right) ferrariVel.x += 0.15;
      if (keys.up) ferrariVel.z -= 0.15;
      if (keys.down) ferrariVel.z += 0.15;

      ferrariVel.y -= gravity * dt;

      ferrariVel.multiplyScalar(airResistance);

      ferrariPos.addScaledVector(ferrariVel, dt);
      clampFerrariBounds();

      if (ferrariPos.y > maxHeight) maxHeight = ferrariPos.y;
      if (ferrariPos.y > maxHeightSinceLastBounce) maxHeightSinceLastBounce = ferrariPos.y;

      const surfaceY = getTrampolineSurfaceYAt(ferrariPos.x, ferrariPos.z);
      const contactY = surfaceY + halfHeight;
      const withinTrampoline = Math.sqrt(ferrariPos.x * ferrariPos.x + ferrariPos.z * ferrariPos.z) <= trampolineRadius + 0.25;

      const wasOnTrampoline = isOnTrampoline;
      isOnTrampoline = withinTrampoline && ferrariPos.y <= contactY + 0.05;

      if (withinTrampoline && ferrariPos.y <= contactY && ferrariVel.y < 0) {
        ferrariPos.y = contactY;

        const impactSpeed = Math.abs(ferrariVel.y);
        const deformationStrength = THREE.MathUtils.clamp(impactSpeed * 0.12, 0.15, 1.25);
        deformTrampoline(ferrariPos.x, ferrariPos.z, deformationStrength, 1.6);

        const recoveryImpulse = getMaxDeformation() * 0.12;
        ferrariVel.y = Math.abs(ferrariVel.y) * restitution + recoveryImpulse;

        handleBounce(now);
      }

      if (keys.space && (isOnTrampoline || ferrariPos.y <= contactY + 0.3) && now - lastSpaceLaunchTime > 180) {
        ferrariVel.y += 8;
        lastSpaceLaunchTime = now;
      }

      if (ferrariPos.y < halfHeight) {
        ferrariPos.y = halfHeight;
        if (ferrariVel.y < 0) ferrariVel.y = 0;
      }

      ferrariVel.x = safeNumber(ferrariVel.x);
      ferrariVel.y = safeNumber(ferrariVel.y);
      ferrariVel.z = safeNumber(ferrariVel.z);
      ferrariPos.x = safeNumber(ferrariPos.x);
      ferrariPos.y = safeNumber(ferrariPos.y, 12);
      ferrariPos.z = safeNumber(ferrariPos.z);

      ferrari.position.copy(ferrariPos);

      const tiltX = THREE.MathUtils.clamp(-ferrariVel.z * 0.03, -0.35, 0.35);
      const tiltZ = THREE.MathUtils.clamp(ferrariVel.x * 0.03, -0.35, 0.35);
      ferrari.rotation.x = tiltX;
      ferrari.rotation.z = tiltZ;
      ferrari.rotation.y += ferrariVel.x * 0.003;

      restoreTrampoline();
      updateHUD();
      updateState();
    }

    function updateState() {
      const speedSq = ferrariVel.lengthSq();
      const energy = 0.5 * mass * safeNumber(speedSq) + mass * gravity * Math.max(0, safeNumber(ferrariPos.y));

      window.__3D_STATE__ = {
        ferrariPosition: {
          x: safeNumber(ferrariPos.x),
          y: safeNumber(ferrariPos.y),
          z: safeNumber(ferrariPos.z)
        },
        ferrariVelocity: {
          x: safeNumber(ferrariVel.x),
          y: safeNumber(ferrariVel.y),
          z: safeNumber(ferrariVel.z)
        },
        trampolineDeformation: safeNumber(getMaxDeformation()),
        score: safeNumber(Math.round(score)),
        combo: safeNumber(combo, 1),
        bounceCount: safeNumber(bounceCount),
        maxHeight: safeNumber(maxHeight),
        gravity: safeNumber(gravity, 9.81),
        isOnTrampoline: !!isOnTrampoline,
        lastBounceTime: safeNumber(lastBounceTime),
        trickBonusActive: !!trickBonusActive,
        modelLoaded: !!modelLoaded,
        simRunning: !!simRunning,
        meshVertexCount: safeNumber(posAttr.count),
        totalEnergy: safeNumber(energy)
      };
    }

    const loader = new GLTFLoader();
    loader.load(
      '._ferrari.glb',
      (gltf) => {
        ferrari = gltf.scene;

        ferrari.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
            if (obj.material) {
              obj.material.metalness = obj.material.metalness ?? 0.6;
              obj.material.roughness = obj.material.roughness ?? 0.4;
            }
          }
        });

        scene.add(ferrari);

        const box = new THREE.Box3().setFromObject(ferrari);
        const size = new THREE.Vector3();
        box.getSize(size);

        const targetWidth = 1.5;
        const currentWidth = Math.max(size.x, 0.0001);
        const scale = targetWidth / currentWidth;
        ferrari.scale.setScalar(scale);

        box.setFromObject(ferrari);
        box.getSize(size);
        halfHeight = Math.max(0.1, size.y / 2);

        const center = new THREE.Vector3();
        box.getCenter(center);
        ferrari.position.sub(center);

        ferrari.position.copy(ferrariPos);
        ferrari.rotation.set(0, Math.PI, 0);

        modelLoaded = true;
        simRunning = true;
        updateState();
      },
      undefined,
      (err) => {
        console.error('Failed to load Ferrari model:', err);

        const fallback = new THREE.Mesh(
          new THREE.BoxGeometry(1.5, 0.7, 3),
          new THREE.MeshStandardMaterial({ color: 0xcc0000, metalness: 0.7, roughness: 0.35 })
        );
        fallback.castShadow = true;
        fallback.receiveShadow = true;
        ferrari = fallback;
        halfHeight = 0.35;
        ferrari.position.copy(ferrariPos);
        scene.add(ferrari);

        modelLoaded = true;
        simRunning = true;
        updateState();
      }
    );

    function animate() {
      requestAnimationFrame(animate);
      updatePhysics();
      renderer.render(scene, camera);
    }
    animate();

    gravitySlider.addEventListener('input', () => {
      gravity = safeNumber(parseFloat(gravitySlider.value), 9.81);
      gravityValue.textContent = gravity.toFixed(2);
      updateState();
    });

    resetBtn.addEventListener('click', resetSimulation);

    window.addEventListener('keydown', (e) => {
      if (e.code === 'ArrowLeft') keys.left = true;
      if (e.code === 'ArrowRight') keys.right = true;
      if (e.code === 'ArrowUp') keys.up = true;
      if (e.code === 'ArrowDown') keys.down = true;
      if (e.code === 'Space') {
        keys.space = true;
        e.preventDefault();
      }
    });

    window.addEventListener('keyup', (e) => {
      if (e.code === 'ArrowLeft') keys.left = false;
      if (e.code === 'ArrowRight') keys.right = false;
      if (e.code === 'ArrowUp') keys.up = false;
      if (e.code === 'ArrowDown') keys.down = false;
      if (e.code === 'Space') keys.space = false;
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHUD();
    updateState();
  </script>
</body>
</html>
