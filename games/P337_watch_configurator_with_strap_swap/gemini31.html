<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Watch Configurator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-panel {
            position: absolute;
            right: 0;
            top: 0;
            width: 220px;
            height: 100vh;
            background: rgba(15, 15, 25, 0.85);
            backdrop-filter: blur(10px);
            padding: 25px 20px;
            box-sizing: border-box;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 25px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            overflow-y: auto;
        }
        h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a0a0b0;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
        .swatch-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .swatch:hover {
            transform: scale(1.1);
        }
        .swatch.active {
            border-color: #ffffff;
            transform: scale(1.1);
        }
        
        /* Strap Colors */
        #strap-leather { background: #8B4513; }
        #strap-rubber { background: #1a1a1a; }
        #strap-steel { background: linear-gradient(135deg, #e0e0e0, #888888); }
        #strap-nato { background: repeating-linear-gradient(45deg, #2d5a27, #2d5a27 5px, #1e3d1a 5px, #1e3d1a 10px); }
        
        /* Dial Colors */
        #dial-white { background: #f5f5f5; }
        #dial-black { background: #1a1a1a; }
        #dial-blue { background: #1a3a6a; }
        #dial-green { background: #1a4a2a; }
        
        /* Case Colors */
        #case-silver { background: linear-gradient(135deg, #f0f0f0, #a0a0a0); }
        #case-gold { background: linear-gradient(135deg, #ffe55c, #b39700); }
        #case-rosegold { background: linear-gradient(135deg, #d49a9e, #9a4d55); }

        .btn {
            background: #2a2a40;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            text-align: center;
            font-size: 14px;
        }
        .btn:hover {
            background: #3a3a55;
        }
        #price-display {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #333;
            color: #4ade80;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@tweenjs/tween.js": "https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.esm.js"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-panel">
        <div>
            <h2>Strap</h2>
            <div class="swatch-container">
                <div id="strap-leather" class="swatch strap-swatch active" title="Classic Leather"></div>
                <div id="strap-rubber" class="swatch strap-swatch" title="Black Rubber"></div>
                <div id="strap-steel" class="swatch strap-swatch" title="Steel Bracelet"></div>
                <div id="strap-nato" class="swatch strap-swatch" title="NATO Fabric"></div>
            </div>
        </div>

        <div>
            <h2>Dial</h2>
            <div class="swatch-container">
                <div id="dial-white" class="swatch dial-swatch active" title="White"></div>
                <div id="dial-black" class="swatch dial-swatch" title="Black"></div>
                <div id="dial-blue" class="swatch dial-swatch" title="Blue"></div>
                <div id="dial-green" class="swatch dial-swatch" title="Green"></div>
            </div>
        </div>

        <div>
            <h2>Case</h2>
            <div class="swatch-container">
                <div id="case-silver" class="swatch case-swatch active" title="Silver"></div>
                <div id="case-gold" class="swatch case-swatch" title="Gold"></div>
                <div id="case-rosegold" class="swatch case-swatch" title="Rose Gold"></div>
            </div>
        </div>

        <div id="auto-rotate-btn" class="btn">Auto-Rotate: OFF</div>
        <div id="reset-btn" class="btn">Reset Configuration</div>
        
        <div id="price-display">$299</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
        import * as TWEEN from '@tweenjs/tween.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            strapType: 'leather',
            dialColor: 'white',
            caseMaterial: 'silver',
            totalPrice: 299,
            autoRotate: false,
            cameraDistance: 5,
            watchRotationY: 0,
            animating: false,
            minuteHandAngle: 0,
            hourHandAngle: 0
        };

        // --- Configuration Data ---
        const config = {
            prices: {
                base: 299,
                strap: { leather: 0, rubber: 20, steel: 80, nato: 15 },
                dial: { white: 0, black: 10, blue: 25, green: 25 },
                case: { silver: 0, gold: 150, rosegold: 120 }
            },
            materials: {
                strap: {
                    leather: { color: 0x8B4513, roughness: 0.8, metalness: 0.0 },
                    rubber: { color: 0x1a1a1a, roughness: 0.4, metalness: 0.1 },
                    steel: { color: 0xa8a8a8, roughness: 0.15, metalness: 0.95 },
                    nato: { color: 0x2d5a27, roughness: 0.9, metalness: 0.0 }
                },
                dial: {
                    white: { color: 0xf5f5f5 },
                    black: { color: 0x1a1a1a },
                    blue: { color: 0x1a3a6a },
                    green: { color: 0x1a4a2a }
                },
                case: {
                    silver: { color: 0xc0c0c0, metalness: 0.9, roughness: 0.1 },
                    gold: { color: 0xffd700, metalness: 0.95, roughness: 0.08 },
                    rosegold: { color: 0xb76e79, metalness: 0.9, roughness: 0.12 }
                }
            }
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        // Environment for realistic reflections
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 3;
        controls.maxDistance = 8;
        controls.minPolarAngle = 0.3;
        controls.maxPolarAngle = 1.2;
        controls.target.set(0, 0, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 8, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 20;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xffffff, 0.6);
        pointLight.position.set(-3, 3, -3);
        scene.add(pointLight);

        // --- Watch Construction ---
        const watchGroup = new THREE.Group();
        scene.add(watchGroup);

        // Shared Materials
        const caseMat = new THREE.MeshStandardMaterial(config.materials.case.silver);
        const dialMat = new THREE.MeshStandardMaterial({ color: config.materials.dial.white.color, roughness: 0.4, metalness: 0.1 });
        const strapMat = new THREE.MeshStandardMaterial(config.materials.strap.leather);
        const markerMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.2, metalness: 0.8 });
        const handMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.2, metalness: 0.8 });

        // Case
        const caseGeo = new THREE.CylinderGeometry(1, 1, 0.3, 64);
        const watchCase = new THREE.Mesh(caseGeo, caseMat);
        watchCase.castShadow = true;
        watchCase.receiveShadow = true;
        watchGroup.add(watchCase);

        // Bezel
        const bezelGeo = new THREE.TorusGeometry(1.02, 0.03, 16, 64);
        const bezel = new THREE.Mesh(bezelGeo, caseMat);
        bezel.rotation.x = Math.PI / 2;
        bezel.position.y = 0.15;
        bezel.castShadow = true;
        bezel.receiveShadow = true;
        watchGroup.add(bezel);

        // Crown
        const crownGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.2, 16);
        const crown = new THREE.Mesh(crownGeo, caseMat);
        crown.rotation.z = Math.PI / 2;
        crown.position.set(1.1, 0, 0);
        crown.castShadow = true;
        watchGroup.add(crown);

        // Dial
        const dialGeo = new THREE.CircleGeometry(0.9, 64);
        const dial = new THREE.Mesh(dialGeo, dialMat);
        dial.rotation.x = -Math.PI / 2;
        dial.position.y = 0.151;
        dial.receiveShadow = true;
        watchGroup.add(dial);

        // Markers
        const markerGeo = new THREE.BoxGeometry(0.04, 0.02, 0.15);
        for (let i = 0; i < 12; i++) {
            const marker = new THREE.Mesh(markerGeo, markerMat);
            const angle = (i / 12) * Math.PI * 2;
            marker.position.set(Math.sin(angle) * 0.75, 0.16, Math.cos(angle) * 0.75);
            marker.rotation.y = angle;
            marker.castShadow = true;
            watchGroup.add(marker);
        }

        // Hands
        const minuteHandPivot = new THREE.Group();
        minuteHandPivot.position.y = 0.165;
        const minuteHand = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.01, 0.8), handMat);
        minuteHand.position.z = -0.35;
        minuteHand.castShadow = true;
        minuteHandPivot.add(minuteHand);
        watchGroup.add(minuteHandPivot);

        const hourHandPivot = new THREE.Group();
        hourHandPivot.position.y = 0.175;
        const hourHand = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.01, 0.5), handMat);
        hourHand.position.z = -0.2;
        hourHand.castShadow = true;
        hourHandPivot.add(hourHand);
        watchGroup.add(hourHandPivot);

        // Center Pin
        const pinGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.03, 16);
        const pin = new THREE.Mesh(pinGeo, caseMat);
        pin.position.y = 0.18;
        watchGroup.add(pin);

        // Straps
        const strapGroup = new THREE.Group();
        watchGroup.add(strapGroup);

        // Create a rounded box shape for straps using ExtrudeGeometry for better look
        const shape = new THREE.Shape();
        const w = 0.55, l = 2.5, r = 0.1;
        shape.moveTo(-w, 0);
        shape.lineTo(w, 0);
        shape.lineTo(w, l - r);
        shape.quadraticCurveTo(w, l, w - r, l);
        shape.lineTo(-w + r, l);
        shape.quadraticCurveTo(-w, l, -w, l - r);
        shape.lineTo(-w, 0);

        const extrudeSettings = { depth: 0.08, bevelEnabled: true, bevelSegments: 2, steps: 1, bevelSize: 0.02, bevelThickness: 0.02 };
        const strapGeo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
        strapGeo.center();

        const topStrap = new THREE.Mesh(strapGeo, strapMat);
        topStrap.rotation.x = Math.PI / 2;
        topStrap.position.set(0, 0, -1.8);
        topStrap.castShadow = true;
        topStrap.receiveShadow = true;
        strapGroup.add(topStrap);

        const bottomStrap = new THREE.Mesh(strapGeo, strapMat);
        bottomStrap.rotation.x = Math.PI / 2;
        bottomStrap.rotation.z = Math.PI;
        bottomStrap.position.set(0, 0, 1.8);
        bottomStrap.castShadow = true;
        bottomStrap.receiveShadow = true;
        strapGroup.add(bottomStrap);

        // Invisible floor for shadow catching
        const floorGeo = new THREE.PlaneGeometry(20, 20);
        const floorMat = new THREE.ShadowMaterial({ opacity: 0.3 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.5;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- Logic & Interactions ---

        function updatePrice() {
            const state = window.__3D_STATE__;
            const total = config.prices.base + 
                          config.prices.strap[state.strapType] + 
                          config.prices.dial[state.dialColor] + 
                          config.prices.case[state.caseMaterial];
            state.totalPrice = total;
            document.getElementById('price-display').innerText = `$${total}`;
        }

        function updateActiveSwatch(section, id) {
            document.querySelectorAll(`.${section}-swatch`).forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function changeStrap(type) {
            if (window.__3D_STATE__.animating || window.__3D_STATE__.strapType === type) return;
            
            window.__3D_STATE__.animating = true;
            window.__3D_STATE__.strapType = type;
            updateActiveSwatch('strap', `strap-${type}`);
            updatePrice();

            new TWEEN.Tween(strapGroup.scale)
                .to({ z: 0.01 }, 300)
                .easing(TWEEN.Easing.Quadratic.In)
                .onComplete(() => {
                    const props = config.materials.strap[type];
                    strapMat.color.setHex(props.color);
                    strapMat.roughness = props.roughness;
                    strapMat.metalness = props.metalness;
                    strapMat.needsUpdate = true;

                    new TWEEN.Tween(strapGroup.scale)
                        .to({ z: 1 }, 300)
                        .easing(TWEEN.Easing.Quadratic.Out)
                        .onComplete(() => {
                            window.__3D_STATE__.animating = false;
                        })
                        .start();
                })
                .start();
        }

        function changeDial(color) {
            window.__3D_STATE__.dialColor = color;
            updateActiveSwatch('dial', `dial-${color}`);
            updatePrice();
            dialMat.color.setHex(config.materials.dial[color].color);
        }

        function changeCase(material) {
            window.__3D_STATE__.caseMaterial = material;
            updateActiveSwatch('case', `case-${material}`);
            updatePrice();
            const props = config.materials.case[material];
            caseMat.color.setHex(props.color);
            caseMat.metalness = props.metalness;
            caseMat.roughness = props.roughness;
        }

        function toggleAutoRotate() {
            window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
            const btn = document.getElementById('auto-rotate-btn');
            btn.innerText = `Auto-Rotate: ${window.__3D_STATE__.autoRotate ? 'ON' : 'OFF'}`;
            btn.style.background = window.__3D_STATE__.autoRotate ? '#4ade80' : '#2a2a40';
            btn.style.color = window.__3D_STATE__.autoRotate ? '#000' : '#fff';
        }

        function resetConfig() {
            if (window.__3D_STATE__.animating) return;
            changeDial('white');
            changeCase('silver');
            if (window.__3D_STATE__.strapType !== 'leather') {
                changeStrap('leather');
            }
            if (window.__3D_STATE__.autoRotate) {
                toggleAutoRotate();
            }
            // Reset camera
            new TWEEN.Tween(camera.position)
                .to({ x: 0, y: 2, z: 5 }, 1000)
                .easing(TWEEN.Easing.Cubic.Out)
                .start();
            new TWEEN.Tween(watchGroup.rotation)
                .to({ y: 0 }, 1000)
                .easing(TWEEN.Easing.Cubic.Out)
                .start();
        }

        // Event Listeners
        document.getElementById('strap-leather').addEventListener('click', () => changeStrap('leather'));
        document.getElementById('strap-rubber').addEventListener('click', () => changeStrap('rubber'));
        document.getElementById('strap-steel').addEventListener('click', () => changeStrap('steel'));
        document.getElementById('strap-nato').addEventListener('click', () => changeStrap('nato'));

        document.getElementById('dial-white').addEventListener('click', () => changeDial('white'));
        document.getElementById('dial-black').addEventListener('click', () => changeDial('black'));
        document.getElementById('dial-blue').addEventListener('click', () => changeDial('blue'));
        document.getElementById('dial-green').addEventListener('click', () => changeDial('green'));

        document.getElementById('case-silver').addEventListener('click', () => changeCase('silver'));
        document.getElementById('case-gold').addEventListener('click', () => changeCase('gold'));
        document.getElementById('case-rosegold').addEventListener('click', () => changeCase('rosegold'));

        document.getElementById('auto-rotate-btn').addEventListener('click', toggleAutoRotate);
        document.getElementById('reset-btn').addEventListener('click', resetConfig);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate(time) {
            requestAnimationFrame(animate);

            TWEEN.update(time);
            controls.update();

            // Hands animation
            // Minute hand: 1 rev / 60s (60000ms)
            const minAngle = -(time / 60000) * Math.PI * 2;
            // Hour hand: 1 rev / 720s (720000ms)
            const hourAngle = -(time / 720000) * Math.PI * 2;

            minuteHandPivot.rotation.y = minAngle;
            hourHandPivot.rotation.y = hourAngle;

            // Auto rotate watch group
            if (window.__3D_STATE__.autoRotate) {
                watchGroup.rotation.y += 0.005;
            }

            // Update State Object
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);
            window.__3D_STATE__.watchRotationY = watchGroup.rotation.y;
            window.__3D_STATE__.minuteHandAngle = minAngle;
            window.__3D_STATE__.hourHandAngle = hourAngle;

            renderer.render(scene, camera);
        }

        // Initialize
        updatePrice();
        animate(performance.now());

    </script>
</body>
</html>
