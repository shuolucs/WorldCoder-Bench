<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Watch Configurator</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    #ui-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 220px;
      padding: 16px;
      border-radius: 14px;
      background: rgba(12, 16, 28, 0.72);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      z-index: 10;
    }

    .section {
      margin-bottom: 18px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 0.4px;
      color: #f2f2f2;
    }

    .swatches {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      outline: none;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.15) inset;
    }

    .swatch:hover {
      transform: scale(1.08);
    }

    .swatch.active {
      border-color: #ffffff;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.22);
    }

    .btn {
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      background: #ffffff;
      color: #111827;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn + .btn {
      margin-top: 10px;
    }

    #price-display {
      font-size: 24px;
      font-weight: 800;
      color: #ffffff;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      text-align: center;
      letter-spacing: 0.5px;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
      opacity: 0.85;
    }

    @media (max-width: 768px) {
      #ui-panel {
        width: calc(100% - 24px);
        left: 12px;
        right: 12px;
        top: auto;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui-panel">
      <div class="section">
        <div class="section-title">Strap</div>
        <div class="swatches">
          <button id="strap-leather" class="swatch active" style="background:#8B4513" title="Classic Leather"></button>
          <button id="strap-rubber" class="swatch" style="background:#1a1a1a" title="Black Rubber"></button>
          <button id="strap-steel" class="swatch" style="background:#a8a8a8" title="Steel Bracelet"></button>
          <button id="strap-nato" class="swatch" style="background:#2d5a27" title="NATO Fabric"></button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Dial</div>
        <div class="swatches">
          <button id="dial-white" class="swatch active" style="background:#f5f5f5" title="White"></button>
          <button id="dial-black" class="swatch" style="background:#1a1a1a" title="Black"></button>
          <button id="dial-blue" class="swatch" style="background:#1a3a6a" title="Blue"></button>
          <button id="dial-green" class="swatch" style="background:#1a4a2a" title="Green"></button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Case</div>
        <div class="swatches">
          <button id="case-silver" class="swatch active" style="background:#c0c0c0" title="Silver"></button>
          <button id="case-gold" class="swatch" style="background:#ffd700" title="Gold"></button>
          <button id="case-rosegold" class="swatch" style="background:#b76e79" title="Rose Gold"></button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Price</div>
        <div id="price-display">$299</div>
      </div>

      <div class="section">
        <button id="auto-rotate-btn" class="btn">Auto-Rotate: OFF</button>
        <button id="reset-btn" class="btn">Reset</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { RoomEnvironment } from 'https://unpkg.com/three@0.160.0/examples/jsm/environments/RoomEnvironment.js';

    const app = document.getElementById('app');

    const strapConfigs = {
      leather: { color: '#8B4513', roughness: 0.8, metalness: 0.0, premium: 0 },
      rubber:  { color: '#1a1a1a', roughness: 0.4, metalness: 0.1, premium: 20 },
      steel:   { color: '#a8a8a8', roughness: 0.15, metalness: 0.95, premium: 80 },
      nato:    { color: '#2d5a27', roughness: 0.9, metalness: 0.0, premium: 15 }
    };

    const dialConfigs = {
      white: { color: '#f5f5f5', premium: 0 },
      black: { color: '#1a1a1a', premium: 10 },
      blue:  { color: '#1a3a6a', premium: 25 },
      green: { color: '#1a4a2a', premium: 25 }
    };

    const caseConfigs = {
      silver:   { color: '#c0c0c0', metalness: 0.9, roughness: 0.1, premium: 0 },
      gold:     { color: '#ffd700', metalness: 0.95, roughness: 0.08, premium: 150 },
      rosegold: { color: '#b76e79', metalness: 0.9, roughness: 0.12, premium: 120 }
    };

    const BASE_PRICE = 299;

    window.__3D_STATE__ = {
      strapType: 'leather',
      dialColor: 'white',
      caseMaterial: 'silver',
      totalPrice: 299,
      autoRotate: false,
      cameraDistance: 5,
      watchRotationY: 0,
      animating: false,
      minuteHandAngle: 0,
      hourHandAngle: 0
    };

    const scene = new THREE.Scene();

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minPolarAngle = 0.3;
    controls.maxPolarAngle = 1.2;
    controls.minDistance = 3;
    controls.maxDistance = 8;
    controls.target.set(0, 0, 0);
    controls.autoRotate = false;
    controls.autoRotateSpeed = 1.5;

    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 8, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    dirLight.shadow.camera.left = -8;
    dirLight.shadow.camera.right = 8;
    dirLight.shadow.camera.top = 8;
    dirLight.shadow.camera.bottom = -8;
    scene.add(dirLight);

    const fillLight = new THREE.PointLight(0xffffff, 0.6, 20);
    fillLight.position.set(-3, 3, -3);
    scene.add(fillLight);

    const shadowGround = new THREE.Mesh(
      new THREE.CircleGeometry(6, 64),
      new THREE.ShadowMaterial({ opacity: 0.22 })
    );
    shadowGround.rotation.x = -Math.PI / 2;
    shadowGround.position.y = -1.3;
    shadowGround.receiveShadow = true;
    scene.add(shadowGround);

    const watchGroup = new THREE.Group();
    watchGroup.name = 'watchGroup';
    scene.add(watchGroup);

    function createRoundedRectShape(width, height, radius) {
      const x = -width / 2;
      const y = -height / 2;
      const shape = new THREE.Shape();
      shape.moveTo(x + radius, y);
      shape.lineTo(x + width - radius, y);
      shape.quadraticCurveTo(x + width, y, x + width, y + radius);
      shape.lineTo(x + width, y + height - radius);
      shape.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      shape.lineTo(x + radius, y + height);
      shape.quadraticCurveTo(x, y + height, x, y + height - radius);
      shape.lineTo(x, y + radius);
      shape.quadraticCurveTo(x, y, x + radius, y);
      return shape;
    }

    const caseMaterial = new THREE.MeshStandardMaterial({
      color: caseConfigs.silver.color,
      metalness: caseConfigs.silver.metalness,
      roughness: caseConfigs.silver.roughness
    });

    const bezelMaterial = caseMaterial.clone();

    const dialMaterial = new THREE.MeshStandardMaterial({
      color: dialConfigs.white.color,
      metalness: 0.15,
      roughness: 0.65
    });

    const markerMaterial = new THREE.MeshStandardMaterial({
      color: '#222222',
      metalness: 0.35,
      roughness: 0.4
    });

    const handMaterial = new THREE.MeshStandardMaterial({
      color: '#111111',
      metalness: 0.4,
      roughness: 0.3
    });

    const crownMaterial = caseMaterial.clone();

    const strapMaterial = new THREE.MeshStandardMaterial({
      color: strapConfigs.leather.color,
      roughness: strapConfigs.leather.roughness,
      metalness: strapConfigs.leather.metalness
    });

    const caseMesh = new THREE.Mesh(
      new THREE.CylinderGeometry(1, 1, 0.3, 64),
      caseMaterial
    );
    caseMesh.rotation.x = Math.PI / 2;
    caseMesh.castShadow = true;
    caseMesh.receiveShadow = true;
    watchGroup.add(caseMesh);

    const bezel = new THREE.Mesh(
      new THREE.TorusGeometry(1.02, 0.03, 16, 100),
      bezelMaterial
    );
    bezel.rotation.x = Math.PI / 2;
    bezel.position.z = 0.16;
    bezel.castShadow = true;
    watchGroup.add(bezel);

    const dial = new THREE.Mesh(
      new THREE.CircleGeometry(0.9, 64),
      dialMaterial
    );
    dial.position.z = 0.155;
    dial.castShadow = true;
    dial.receiveShadow = true;
    watchGroup.add(dial);

    const markersGroup = new THREE.Group();
    for (let i = 0; i < 12; i++) {
      const marker = new THREE.Mesh(
        new THREE.BoxGeometry(0.06, 0.16, 0.03),
        markerMaterial
      );
      const angle = (i / 12) * Math.PI * 2;
      const r = 0.75;
      marker.position.set(Math.sin(angle) * r, Math.cos(angle) * r, 0.175);
      marker.rotation.z = -angle;
      marker.castShadow = true;
      markersGroup.add(marker);
    }
    watchGroup.add(markersGroup);

    const handPivot = new THREE.Group();
    handPivot.position.z = 0.19;
    watchGroup.add(handPivot);

    const minuteHandPivot = new THREE.Group();
    const minuteHand = new THREE.Mesh(
      new THREE.BoxGeometry(0.04, 0.62, 0.025),
      handMaterial
    );
    minuteHand.position.y = 0.31;
    minuteHand.castShadow = true;
    minuteHandPivot.add(minuteHand);
    handPivot.add(minuteHandPivot);

    const hourHandPivot = new THREE.Group();
    const hourHand = new THREE.Mesh(
      new THREE.BoxGeometry(0.06, 0.42, 0.025),
      handMaterial
    );
    hourHand.position.y = 0.21;
    hourHand.castShadow = true;
    hourHandPivot.add(hourHand);
    handPivot.add(hourHandPivot);

    const centerCap = new THREE.Mesh(
      new THREE.CylinderGeometry(0.04, 0.04, 0.04, 24),
      handMaterial
    );
    centerCap.rotation.x = Math.PI / 2;
    centerCap.position.z = 0.005;
    handPivot.add(centerCap);

    const crown = new THREE.Mesh(
      new THREE.CylinderGeometry(0.1, 0.1, 0.2, 24),
      crownMaterial
    );
    crown.rotation.z = Math.PI / 2;
    crown.position.set(1.1, 0, 0);
    crown.castShadow = true;
    crown.receiveShadow = true;
    watchGroup.add(crown);

    const strapShape = createRoundedRectShape(0.62, 2.5, 0.18);
    const strapExtrudeSettings = {
      depth: 0.12,
      bevelEnabled: true,
      bevelSegments: 2,
      steps: 1,
      bevelSize: 0.04,
      bevelThickness: 0.02,
      curveSegments: 12
    };

    const strapGeometry = new THREE.ExtrudeGeometry(strapShape, strapExtrudeSettings);
    strapGeometry.center();

    const topStrap = new THREE.Mesh(strapGeometry, strapMaterial);
    topStrap.position.set(0, 1.95, -0.06);
    topStrap.castShadow = true;
    topStrap.receiveShadow = true;
    watchGroup.add(topStrap);

    const bottomStrap = new THREE.Mesh(strapGeometry, strapMaterial);
    bottomStrap.position.set(0, -1.95, -0.06);
    bottomStrap.rotation.z = Math.PI;
    bottomStrap.castShadow = true;
    bottomStrap.receiveShadow = true;
    watchGroup.add(bottomStrap);

    watchGroup.rotation.x = -0.45;
    watchGroup.position.y = 0.1;

    function setActive(groupPrefix, activeKey) {
      const ids = {
        strap: ['leather', 'rubber', 'steel', 'nato'],
        dial: ['white', 'black', 'blue', 'green'],
        case: ['silver', 'gold', 'rosegold']
      };
      ids[groupPrefix].forEach(key => {
        const el = document.getElementById(`${groupPrefix}-${key}`);
        if (el) el.classList.toggle('active', key === activeKey);
      });
    }

    function updatePrice() {
      const s = strapConfigs[window.__3D_STATE__.strapType].premium;
      const d = dialConfigs[window.__3D_STATE__.dialColor].premium;
      const c = caseConfigs[window.__3D_STATE__.caseMaterial].premium;
      const total = BASE_PRICE + s + d + c;
      window.__3D_STATE__.totalPrice = total;
      document.getElementById('price-display').textContent = `$${total}`;
    }

    function applyDialColor(type) {
      const cfg = dialConfigs[type];
      dialMaterial.color.set(cfg.color);
      const darkDial = (type === 'black' || type === 'blue' || type === 'green');
      markerMaterial.color.set(darkDial ? '#f0f0f0' : '#222222');
      handMaterial.color.set(darkDial ? '#f7f7f7' : '#111111');
      window.__3D_STATE__.dialColor = type;
      setActive('dial', type);
      updatePrice();
    }

    function applyCaseMaterial(type) {
      const cfg = caseConfigs[type];
      [caseMaterial, bezelMaterial, crownMaterial].forEach(mat => {
        mat.color.set(cfg.color);
        mat.metalness = cfg.metalness;
        mat.roughness = cfg.roughness;
        mat.needsUpdate = true;
      });
      window.__3D_STATE__.caseMaterial = type;
      setActive('case', type);
      updatePrice();
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function animateScale(meshes, from, to, duration) {
      return new Promise(resolve => {
        const start = performance.now();
        function tick(now) {
          const t = Math.min((now - start) / duration, 1);
          const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
          const value = lerp(from, to, eased);
          meshes.forEach(m => m.scale.set(1, value, 1));
          if (t < 1) requestAnimationFrame(tick);
          else resolve();
        }
        requestAnimationFrame(tick);
      });
    }

    async function applyStrapType(type) {
      if (window.__3D_STATE__.animating || window.__3D_STATE__.strapType === type) return;
      window.__3D_STATE__.animating = true;

      await animateScale([topStrap, bottomStrap], 1, 0.001, 300);

      const cfg = strapConfigs[type];
      strapMaterial.color.set(cfg.color);
      strapMaterial.roughness = cfg.roughness;
      strapMaterial.metalness = cfg.metalness;
      strapMaterial.needsUpdate = true;

      window.__3D_STATE__.strapType = type;
      setActive('strap', type);
      updatePrice();

      await animateScale([topStrap, bottomStrap], 0.001, 1, 300);

      window.__3D_STATE__.animating = false;
    }

    function resetConfigurator() {
      if (!window.__3D_STATE__.animating) {
        strapMaterial.color.set(strapConfigs.leather.color);
        strapMaterial.roughness = strapConfigs.leather.roughness;
        strapMaterial.metalness = strapConfigs.leather.metalness;
        strapMaterial.needsUpdate = true;
        topStrap.scale.set(1,1,1);
        bottomStrap.scale.set(1,1,1);
        window.__3D_STATE__.strapType = 'leather';
        setActive('strap', 'leather');
      }

      applyDialColor('white');
      applyCaseMaterial('silver');

      window.__3D_STATE__.strapType = 'leather';
      setActive('strap', 'leather');

      controls.autoRotate = false;
      document.getElementById('auto-rotate-btn').textContent = 'Auto-Rotate: OFF';
      updatePrice();
    }

    document.getElementById('strap-leather').addEventListener('click', () => applyStrapType('leather'));
    document.getElementById('strap-rubber').addEventListener('click', () => applyStrapType('rubber'));
    document.getElementById('strap-steel').addEventListener('click', () => applyStrapType('steel'));
    document.getElementById('strap-nato').addEventListener('click', () => applyStrapType('nato'));

    document.getElementById('dial-white').addEventListener('click', () => applyDialColor('white'));
    document.getElementById('dial-black').addEventListener('click', () => applyDialColor('black'));
    document.getElementById('dial-blue').addEventListener('click', () => applyDialColor('blue'));
    document.getElementById('dial-green').addEventListener('click', () => applyDialColor('green'));

    document.getElementById('case-silver').addEventListener('click', () => applyCaseMaterial('silver'));
    document.getElementById('case-gold').addEventListener('click', () => applyCaseMaterial('gold'));
    document.getElementById('case-rosegold').addEventListener('click', () => applyCaseMaterial('rosegold'));

    document.getElementById('reset-btn').addEventListener('click', resetConfigurator);

    document.getElementById('auto-rotate-btn').addEventListener('click', () => {
      controls.autoRotate = !controls.autoRotate;
      document.getElementById('auto-rotate-btn').textContent =
        `Auto-Rotate: ${controls.autoRotate ? 'ON' : 'OFF'}`;
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();

      minuteHandPivot.rotation.z = -elapsed * (Math.PI * 2 / 60);
      hourHandPivot.rotation.z = -elapsed * (Math.PI * 2 / 720);

      controls.update();
      renderer.render(scene, camera);

      window.__3D_STATE__.autoRotate = controls.autoRotate;
      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);
      window.__3D_STATE__.watchRotationY = watchGroup.rotation.y;
      window.__3D_STATE__.minuteHandAngle = minuteHandPivot.rotation.z;
      window.__3D_STATE__.hourHandAngle = hourHandPivot.rotation.z;
    }

    updatePrice();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
