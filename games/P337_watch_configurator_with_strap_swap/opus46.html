<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Watch Configurator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
  canvas { display: block; }

  #ui-panel {
    position: fixed;
    right: 0;
    top: 0;
    width: 220px;
    height: 100%;
    background: rgba(10, 10, 30, 0.85);
    backdrop-filter: blur(10px);
    padding: 20px 15px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    overflow-y: auto;
    z-index: 10;
    border-left: 1px solid rgba(255,255,255,0.08);
  }

  #ui-panel h2 {
    color: #fff;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 5px;
  }

  .section-label {
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }

  .swatch-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .swatch {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
  }

  .swatch:hover {
    transform: scale(1.15);
    border-color: rgba(255,255,255,0.5);
  }

  .swatch.active {
    border: 2px solid #ffffff;
    box-shadow: 0 0 10px rgba(255,255,255,0.3);
  }

  .swatch-label {
    position: absolute;
    bottom: -16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
  }

  #price-display {
    color: #fff;
    font-size: 28px;
    font-weight: 200;
    text-align: center;
    padding: 12px 0;
    border-top: 1px solid rgba(255,255,255,0.1);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    letter-spacing: 1px;
  }

  .btn {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.25s ease;
    text-align: center;
  }

  .btn:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.3);
  }

  .btn.active-toggle {
    background: rgba(100, 200, 100, 0.2);
    border-color: rgba(100, 200, 100, 0.5);
    color: #8f8;
  }

  .section { margin-bottom: 2px; }
</style>
</head>
<body>

<div id="ui-panel">
  <h2>Watch Studio</h2>

  <div id="price-display">$299</div>

  <div class="section">
    <div class="section-label">Strap</div>
    <div class="swatch-row">
      <div class="swatch active" id="strap-leather" style="background:#8B4513;" onclick="selectStrap('leather')"><span class="swatch-label">Leather</span></div>
      <div class="swatch" id="strap-rubber" style="background:#1a1a1a;" onclick="selectStrap('rubber')"><span class="swatch-label">Rubber</span></div>
      <div class="swatch" id="strap-steel" style="background:#a8a8a8;" onclick="selectStrap('steel')"><span class="swatch-label">Steel</span></div>
      <div class="swatch" id="strap-nato" style="background:#2d5a27;" onclick="selectStrap('nato')"><span class="swatch-label">NATO</span></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Dial</div>
    <div class="swatch-row">
      <div class="swatch active" id="dial-white" style="background:#f5f5f5;" onclick="selectDial('white')"><span class="swatch-label">White</span></div>
      <div class="swatch" id="dial-black" style="background:#1a1a1a;" onclick="selectDial('black')"><span class="swatch-label">Black</span></div>
      <div class="swatch" id="dial-blue" style="background:#1a3a6a;" onclick="selectDial('blue')"><span class="swatch-label">Blue</span></div>
      <div class="swatch" id="dial-green" style="background:#1a4a2a;" onclick="selectDial('green')"><span class="swatch-label">Green</span></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Case</div>
    <div class="swatch-row">
      <div class="swatch active" id="case-silver" style="background:#c0c0c0;" onclick="selectCase('silver')"><span class="swatch-label">Silver</span></div>
      <div class="swatch" id="case-gold" style="background:#ffd700;" onclick="selectCase('gold')"><span class="swatch-label">Gold</span></div>
      <div class="swatch" id="case-rosegold" style="background:#b76e79;" onclick="selectCase('rosegold')"><span class="swatch-label">Rose Gold</span></div>
    </div>
  </div>

  <button class="btn" id="auto-rotate-btn" onclick="toggleAutoRotate()">Auto-Rotate: OFF</button>
  <button class="btn" id="reset-btn" onclick="resetConfig()">Reset to Default</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// State
window.__3D_STATE__ = {
  strapType: 'leather',
  dialColor: 'white',
  caseMaterial: 'silver',
  totalPrice: 299,
  autoRotate: false,
  cameraDistance: 5,
  watchRotationY: 0,
  animating: false,
  minuteHandAngle: 0,
  hourHandAngle: 0
};

const strapConfigs = {
  leather: { color: 0x8B4513, roughness: 0.8, metalness: 0.0, premium: 0 },
  rubber: { color: 0x1a1a1a, roughness: 0.4, metalness: 0.1, premium: 20 },
  steel: { color: 0xa8a8a8, roughness: 0.15, metalness: 0.95, premium: 80 },
  nato: { color: 0x2d5a27, roughness: 0.9, metalness: 0.0, premium: 15 }
};

const dialConfigs = {
  white: { color: 0xf5f5f5, premium: 0 },
  black: { color: 0x1a1a1a, premium: 10 },
  blue: { color: 0x1a3a6a, premium: 25 },
  green: { color: 0x1a4a2a, premium: 25 }
};

const caseConfigs = {
  silver: { color: 0xc0c0c0, metalness: 0.9, roughness: 0.1, premium: 0 },
  gold: { color: 0xffd700, metalness: 0.95, roughness: 0.08, premium: 150 },
  rosegold: { color: 0xb76e79, metalness: 0.9, roughness: 0.12, premium: 120 }
};

// Scene setup
const scene = new THREE.Scene();

// Gradient background
const canvas2d = document.createElement('canvas');
canvas2d.width = 2;
canvas2d.height = 512;
const ctx = canvas2d.getContext('2d');
const gradient = ctx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#1a1a2e');
gradient.addColorStop(1, '#16213e');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(canvas2d);
scene.background = bgTexture;

const camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 220) / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth - 220, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minPolarAngle = 0.3;
controls.maxPolarAngle = 1.2;
controls.minDistance = 3;
controls.maxDistance = 8;
controls.autoRotateSpeed = 2;
controls.target.set(0, 0, 0);

// Lighting
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -5;
dirLight.shadow.camera.right = 5;
dirLight.shadow.camera.top = 5;
dirLight.shadow.camera.bottom = -5;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 0.6);
pointLight.position.set(-3, 3, -3);
scene.add(pointLight);

// Additional rim light for product look
const rimLight = new THREE.DirectionalLight(0x8888ff, 0.3);
rimLight.position.set(-5, 2, -5);
scene.add(rimLight);

// Watch Group
const watchGroup = new THREE.Group();
scene.add(watchGroup);

// Materials
let caseMaterial = new THREE.MeshStandardMaterial({
  color: 0xc0c0c0, metalness: 0.9, roughness: 0.1
});

let bezelMaterial = new THREE.MeshStandardMaterial({
  color: 0xd0d0d0, metalness: 0.95, roughness: 0.05
});

let dialMaterial = new THREE.MeshStandardMaterial({
  color: 0xf5f5f5, metalness: 0.1, roughness: 0.3
});

let strapMaterial = new THREE.MeshStandardMaterial({
  color: 0x8B4513, roughness: 0.8, metalness: 0.0
});

let handMaterial = new THREE.MeshStandardMaterial({
  color: 0x222222, metalness: 0.8, roughness: 0.2
});

// Watch Case
const caseGeom = new THREE.CylinderGeometry(1, 1, 0.3, 64);
const watchCase = new THREE.Mesh(caseGeom, caseMaterial);
watchCase.castShadow = true;
watchCase.receiveShadow = true;
watchGroup.add(watchCase);

// Bezel
const bezelGeom = new THREE.TorusGeometry(1.02, 0.03, 16, 64);
const bezel = new THREE.Mesh(bezelGeom, bezelMaterial);
bezel.rotation.x = Math.PI / 2;
bezel.position.y = 0.1;
watchGroup.add(bezel);

// Bottom bezel
const bezel2 = new THREE.Mesh(bezelGeom, bezelMaterial);
bezel2.rotation.x = Math.PI / 2;
bezel2.position.y = -0.1;
watchGroup.add(bezel2);

// Watch Dial
const dialGeom = new THREE.CircleGeometry(0.9, 64);
const dial = new THREE.Mesh(dialGeom, dialMaterial);
dial.rotation.x = -Math.PI / 2;
dial.position.y = 0.151;
watchGroup.add(dial);

// Hour markers
const markerMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.7, roughness: 0.3 });
for (let i = 0; i < 12; i++) {
  const angle = (i / 12) * Math.PI * 2;
  const isMainHour = i % 3 === 0;
  const markerLength = isMainHour ? 0.15 : 0.08;
  const markerWidth = isMainHour ? 0.04 : 0.02;
  const markerGeom = new THREE.BoxGeometry(markerWidth, 0.02, markerLength);
  const marker = new THREE.Mesh(markerGeom, markerMat);
  const radius = 0.78;
  marker.position.x = Math.sin(angle) * radius;
  marker.position.y = 0.162;
  marker.position.z = -Math.cos(angle) * radius;
  marker.rotation.y = angle;
  watchGroup.add(marker);
}

// Minute tick marks
const tickMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.5, roughness: 0.4 });
for (let i = 0; i < 60; i++) {
  if (i % 5 === 0) continue;
  const angle = (i / 60) * Math.PI * 2;
  const tickGeom = new THREE.BoxGeometry(0.01, 0.01, 0.04);
  const tick = new THREE.Mesh(tickGeom, tickMat);
  const radius = 0.82;
  tick.position.x = Math.sin(angle) * radius;
  tick.position.y = 0.158;
  tick.position.z = -Math.cos(angle) * radius;
  tick.rotation.y = angle;
  watchGroup.add(tick);
}

// Hand pivot
const handPivot = new THREE.Group();
handPivot.position.y = 0.17;
watchGroup.add(handPivot);

// Minute hand
const minuteHandGeom = new THREE.BoxGeometry(0.025, 0.015, 0.6);
const minuteHand = new THREE.Mesh(minuteHandGeom, handMaterial);
minuteHand.position.z = -0.25;
const minuteHandGroup = new THREE.Group();
minuteHandGroup.add(minuteHand);
handPivot.add(minuteHandGroup);

// Hour hand
const hourHandGeom = new THREE.BoxGeometry(0.035, 0.015, 0.42);
const hourHand = new THREE.Mesh(hourHandGeom, handMaterial);
hourHand.position.z = -0.17;
const hourHandGroup = new THREE.Group();
hourHandGroup.add(hourHand);
handPivot.add(hourHandGroup);

// Second hand
const secondHandMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, metalness: 0.6, roughness: 0.3 });
const secondHandGeom = new THREE.BoxGeometry(0.01, 0.01, 0.65);
const secondHand = new THREE.Mesh(secondHandGeom, secondHandMat);
secondHand.position.z = -0.2;
const secondHandGroup = new THREE.Group();
secondHandGroup.add(secondHand);
handPivot.add(secondHandGroup);

// Center pin
const pinGeom = new THREE.CylinderGeometry(0.03, 0.03, 0.04, 16);
const pinMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.9, roughness: 0.1 });
const pin = new THREE.Mesh(pinGeom, pinMat);
pin.position.y = 0.17;
watchGroup.add(pin);

// Watch Crown
const crownGeom = new THREE.CylinderGeometry(0.08, 0.08, 0.2, 16);
const crown = new THREE.Mesh(crownGeom, caseMaterial);
crown.rotation.z = Math.PI / 2;
crown.position.set(1.15, 0, 0);
watchGroup.add(crown);

// Crown grip lines
for (let i = 0; i < 8; i++) {
  const gripGeom = new THREE.BoxGeometry(0.005, 0.22, 0.005);
  const grip = new THREE.Mesh(gripGeom, new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9, roughness: 0.2 }));
  const angle = (i / 8) * Math.PI * 2;
  grip.position.set(1.15, 0, 0);
  grip.position.y += Math.cos(angle) * 0.08;
  grip.position.z += Math.sin(angle) * 0.08;
  grip.rotation.z = Math.PI / 2;
  watchGroup.add(grip);
}

// Glass dome
const glassGeom = new THREE.SphereGeometry(0.95, 64, 32, 0, Math.PI * 2, 0, Math.PI * 0.15);
const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  transparent: true,
  opacity: 0.15,
  roughness: 0.0,
  metalness: 0.0,
  clearcoat: 1.0,
  clearcoatRoughness: 0.0,
});
const glass = new THREE.Mesh(glassGeom, glassMat);
glass.position.y = 0.15;
watchGroup.add(glass);

// Create strap function
function createStrap(yDirection) {
  const group = new THREE.Group();

  // Main strap body
  const strapLength = 2.5;
  const strapWidth = 0.45;
  const strapThickness = 0.08;

  // Create strap with slight curve
  const curve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(0, yDirection * 0.6, 0),
    new THREE.Vector3(0, yDirection * 1.0, yDirection * 0.1),
    new THREE.Vector3(0, yDirection * 1.8, yDirection * 0.25),
    new THREE.Vector3(0, yDirection * 2.5, yDirection * 0.5),
    new THREE.Vector3(0, yDirection * 3.0, yDirection * 0.9),
  ]);

  const strapShape = new THREE.Shape();
  const hw = strapWidth / 2;
  const hh = strapThickness / 2;
  const r = 0.02;
  strapShape.moveTo(-hw + r, -hh);
  strapShape.lineTo(hw - r, -hh);
  strapShape.quadraticCurveTo(hw, -hh, hw, -hh + r);
  strapShape.lineTo(hw, hh - r);
  strapShape.quadraticCurveTo(hw, hh, hw - r, hh);
  strapShape.lineTo(-hw + r, hh);
  strapShape.quadraticCurveTo(-hw, hh, -hw, hh - r);
  strapShape.lineTo(-hw, -hh + r);
  strapShape.quadraticCurveTo(-hw, -hh, -hw + r, -hh);

  const extrudeSettings = {
    steps: 30,
    extrudePath: curve,
  };

  const strapGeom = new THREE.ExtrudeGeometry(strapShape, extrudeSettings);
  const strap = new THREE.Mesh(strapGeom, strapMaterial);
  strap.castShadow = true;
  strap.receiveShadow = true;
  group.add(strap);

  // Lug connectors
  const lugGeom = new THREE.BoxGeometry(0.08, 0.15, 0.5);
  const lugMat = caseMaterial;
  const lugLeft = new THREE.Mesh(lugGeom, lugMat);
  lugLeft.position.set(-0.4, yDirection * 0.55, 0);
  group.add(lugLeft);
  const lugRight = new THREE.Mesh(lugGeom, lugMat);
  lugRight.position.set(0.4, yDirection * 0.55, 0);
  group.add(lugRight);

  // Spring bar
  const barGeom = new THREE.CylinderGeometry(0.02, 0.02, 0.9, 8);
  const barMat = new THREE.MeshStandardMaterial({ color: 0x999999, metalness: 0.9, roughness: 0.1 });
  const bar = new THREE.Mesh(barGeom, barMat);
  bar.rotation.z = Math.PI / 2;
  bar.position.set(0, yDirection * 0.55, 0);
  group.add(bar);

  // Strap holes (for top strap)
  if (yDirection > 0) {
    for (let i = 0; i < 5; i++) {
      const t = 0.35 + i * 0.1;
      const point = curve.getPoint(t);
      const holeGeom = new THREE.TorusGeometry(0.03, 0.01, 8, 16);
      const holeMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.5, roughness: 0.5 });
      const hole = new THREE.Mesh(holeGeom, holeMat);
      hole.position.copy(point);
      hole.rotation.x = Math.PI / 2;
      group.add(hole);
    }
  }

  // Buckle (for bottom strap)
  if (yDirection < 0) {
    const t = 0.65;
    const point = curve.getPoint(t);
    const buckleGeom = new THREE.TorusGeometry(0.15, 0.02, 8, 4);
    const buckleMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.9, roughness: 0.1 });
    const buckle = new THREE.Mesh(buckleGeom, buckleMat);
    buckle.position.copy(point);
    buckle.rotation.x = Math.PI / 2;
    buckle.rotation.z = Math.PI / 4;
    group.add(buckle);
  }

  return group;
}

let topStrap = createStrap(1);
let bottomStrap = createStrap(-1);
watchGroup.add(topStrap);
watchGroup.add(bottomStrap);

// Floor/shadow plane
const floorGeom = new THREE.PlaneGeometry(20, 20);
const floorMat = new THREE.ShadowMaterial({ opacity: 0.3 });
const floor = new THREE.Mesh(floorGeom, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -3.5;
floor.receiveShadow = true;
scene.add(floor);

// Initial hand positions based on current time
const now = new Date();
const seconds = now.getSeconds() + now.getMilliseconds() / 1000;
const minutes = now.getMinutes() + seconds / 60;
const hours = (now.getHours() % 12) + minutes / 60;

let minuteAngle = (minutes / 60) * Math.PI * 2;
let hourAngle = (hours / 12) * Math.PI * 2;
let secondAngle = (seconds / 60) * Math.PI * 2;

minuteHandGroup.rotation.y = minuteAngle;
hourHandGroup.rotation.y = hourAngle;
secondHandGroup.rotation.y = secondAngle;

// Animation helpers
let animatingStraps = false;
const animDuration = 300;

function animateStrapSwap(newStrapType) {
  if (animatingStraps) return;
  if (window.__3D_STATE__.strapType === newStrapType) return;

  animatingStraps = true;
  window.__3D_STATE__.animating = true;

  const startTime = performance.now();

  function scaleDown(time) {
    const elapsed = time - startTime;
    const t = Math.min(elapsed / animDuration, 1);
    const scale = 1 - t;
    topStrap.scale.set(1, scale || 0.001, 1);
    bottomStrap.scale.set(1, scale || 0.001, 1);

    if (t < 1) {
      requestAnimationFrame(scaleDown);
    } else {
      // Swap material
      const config = strapConfigs[newStrapType];
      strapMaterial.color.setHex(config.color);
      strapMaterial.roughness = config.roughness;
      strapMaterial.metalness = config.metalness;
      strapMaterial.needsUpdate = true;

      window.__3D_STATE__.strapType = newStrapType;
      updatePrice();

      const scaleUpStart = performance.now();
      function scaleUp(time2) {
        const elapsed2 = time2 - scaleUpStart;
        const t2 = Math.min(elapsed2 / animDuration, 1);
        const scale2 = t2;
        topStrap.scale.set(1, scale2 || 0.001, 1);
        bottomStrap.scale.set(1, scale2 || 0.001, 1);

        if (t2 < 1) {
          requestAnimationFrame(scaleUp);
        } else {
          topStrap.scale.set(1, 1, 1);
          bottomStrap.scale.set(1, 1, 1);
          animatingStraps = false;
          window.__3D_STATE__.animating = false;
        }
      }
      requestAnimationFrame(scaleUp);
    }
  }
  requestAnimationFrame(scaleDown);
}

function updatePrice() {
  const state = window.__3D_STATE__;
  const base = 299;
  const strapPremium = strapConfigs[state.strapType].premium;
  const dialPremium = dialConfigs[state.dialColor].premium;
  const casePremium = caseConfigs[state.caseMaterial].premium;
  state.totalPrice = base + strapPremium + dialPremium + casePremium;
  document.getElementById('price-display').textContent = '$' + state.totalPrice;
}

function updateSwatchActive(section, value) {
  const swatches = document.querySelectorAll(`[id^="${section}-"]`);
  swatches.forEach(s => s.classList.remove('active'));
  const target = document.getElementById(`${section}-${value}`);
  if (target) target.classList.add('active');
}

// Selection functions
window.selectStrap = function(type) {
  animateStrapSwap(type);
  updateSwatchActive('strap', type);
};

window.selectDial = function(color) {
  const config = dialConfigs[color];
  dialMaterial.color.setHex(config.color);

  // Update marker colors based on dial
  const isDark = color === 'black' || color === 'blue' || color === 'green';
  markerMat.color.setHex(isDark ? 0xcccccc : 0x333333);
  handMaterial.color.setHex(isDark ? 0xdddddd : 0x222222);

  window.__3D_STATE__.dialColor = color;
  updateSwatchActive('dial', color);
  updatePrice();
};

window.selectCase = function(type) {
  const config = caseConfigs[type];
  caseMaterial.color.setHex(config.color);
  caseMaterial.metalness = config.metalness;
  caseMaterial.roughness = config.roughness;

  bezelMaterial.color.setHex(config.color);

  window.__3D_STATE__.caseMaterial = type;
  updateSwatchActive('case', type);
  updatePrice();
};

window.toggleAutoRotate = function() {
  controls.autoRotate = !controls.autoRotate;
  window.__3D_STATE__.autoRotate = controls.autoRotate;
  const btn = document.getElementById('auto-rotate-btn');
  btn.textContent = 'Auto-Rotate: ' + (controls.autoRotate ? 'ON' : 'OFF');
  if (controls.autoRotate) {
    btn.classList.add('active-toggle');
  } else {
    btn.classList.remove('active-toggle');
  }
};

window.resetConfig = function() {
  selectStrap('leather');
  selectDial('white');
  selectCase('silver');

  controls.autoRotate = false;
  window.__3D_STATE__.autoRotate = false;
  const btn = document.getElementById('auto-rotate-btn');
  btn.textContent = 'Auto-Rotate: OFF';
  btn.classList.remove('active-toggle');
};

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Update watch hands based on real time
  const currentTime = new Date();
  const sec = currentTime.getSeconds() + currentTime.getMilliseconds() / 1000;
  const min = currentTime.getMinutes() + sec / 60;
  const hr = (currentTime.getHours() % 12) + min / 60;

  minuteAngle = (min / 60) * Math.PI * 2;
  hourAngle = (hr / 12) * Math.PI * 2;
  secondAngle = (sec / 60) * Math.PI * 2;

  minuteHandGroup.rotation.y = minuteAngle;
  hourHandGroup.rotation.y = hourAngle;
  secondHandGroup.rotation.y = secondAngle;

  controls.update();

  // Update state
  const state = window.__3D_STATE__;
  state.cameraDistance = camera.position.length();
  state.watchRotationY = watchGroup.rotation.y;
  state.minuteHandAngle = minuteAngle;
  state.hourHandAngle = hourAngle;

  renderer.render(scene, camera);
}

animate();

// Resize handler
window.addEventListener('resize', () => {
  const width = window.innerWidth - 220;
  const height = window.innerHeight;
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
  renderer.setSize(width, height);
});
</script>
