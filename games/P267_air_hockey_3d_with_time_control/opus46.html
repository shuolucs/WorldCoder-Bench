<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Air Hockey with Time Control</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
canvas { display: block; }
#hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#player-score { position: absolute; top: 20px; left: 20px; color: #ff3333; font-size: 24px; font-weight: bold; }
#ai-score { position: absolute; top: 20px; right: 20px; color: #3333ff; font-size: 24px; font-weight: bold; }
#time-mode { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: yellow; font-size: 20px; font-weight: bold; }
#game-over-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 48px; font-weight: bold; display: none; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }
#controls-hint { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #888; font-size: 14px; }
</style>
</head>
<body>
<div id="hud">
    <div id="player-score">Player: 0</div>
    <div id="ai-score">AI: 0</div>
    <div id="time-mode">NORMAL</div>
    <div id="game-over-msg"></div>
    <div id="controls-hint">Arrow Keys=Move | Q=SlowMo W=Normal E=Fast SPACE=Pause</div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 12, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(0, 15, 5);
directionalLight.castShadow = true;
scene.add(directionalLight);

// Table
const tableGeometry = new THREE.BoxGeometry(10, 0.3, 16);
const tableMaterial = new THREE.MeshStandardMaterial({ color: 0x1a6b3a });
const table = new THREE.Mesh(tableGeometry, tableMaterial);
table.position.set(0, 0, 0);
table.receiveShadow = true;
scene.add(table);

const originalTableColor = 0x1a6b3a;

// Center line
const centerLineGeom = new THREE.PlaneGeometry(10, 0.05);
const centerLineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
const centerLine = new THREE.Mesh(centerLineGeom, centerLineMat);
centerLine.rotation.x = -Math.PI / 2;
centerLine.position.set(0, 0.16, 0);
scene.add(centerLine);

// Center circle
const centerCircleGeom = new THREE.RingGeometry(1.2, 1.25, 64);
const centerCircleMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
const centerCircle = new THREE.Mesh(centerCircleGeom, centerCircleMat);
centerCircle.rotation.x = -Math.PI / 2;
centerCircle.position.set(0, 0.16, 0);
scene.add(centerCircle);

// Walls
const wallMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
const wallHeight = 0.5;
const wallThickness = 0.2;

// Left wall (x = -5)
const leftWall = new THREE.Mesh(new THREE.BoxGeometry(wallThickness, wallHeight, 16), wallMaterial);
leftWall.position.set(-5 - wallThickness / 2 + wallThickness / 2, wallHeight / 2, 0);
leftWall.position.x = -5;
scene.add(leftWall);

// Right wall (x = +5)
const rightWall = new THREE.Mesh(new THREE.BoxGeometry(wallThickness, wallHeight, 16), wallMaterial);
rightWall.position.set(5, wallHeight / 2, 0);
scene.add(rightWall);

// Top wall (z = -8) - two segments with goal gap
const goalWidth = 3;
const topWallLeftWidth = (10 - goalWidth) / 2;
const topWallLeft = new THREE.Mesh(new THREE.BoxGeometry(topWallLeftWidth, wallHeight, wallThickness), wallMaterial);
topWallLeft.position.set(-5 + topWallLeftWidth / 2, wallHeight / 2, -8);
scene.add(topWallLeft);

const topWallRight = new THREE.Mesh(new THREE.BoxGeometry(topWallLeftWidth, wallHeight, wallThickness), wallMaterial);
topWallRight.position.set(5 - topWallLeftWidth / 2, wallHeight / 2, -8);
scene.add(topWallRight);

// Bottom wall (z = +8) - two segments with goal gap
const bottomWallLeft = new THREE.Mesh(new THREE.BoxGeometry(topWallLeftWidth, wallHeight, wallThickness), wallMaterial);
bottomWallLeft.position.set(-5 + topWallLeftWidth / 2, wallHeight / 2, 8);
scene.add(bottomWallLeft);

const bottomWallRight = new THREE.Mesh(new THREE.BoxGeometry(topWallLeftWidth, wallHeight, wallThickness), wallMaterial);
bottomWallRight.position.set(5 - topWallLeftWidth / 2, wallHeight / 2, 8);
scene.add(bottomWallRight);

// Goal indicators (red lines)
const goalIndicatorMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.5 });
const goalIndicator1 = new THREE.Mesh(new THREE.PlaneGeometry(goalWidth, 0.1), goalIndicatorMat);
goalIndicator1.rotation.x = -Math.PI / 2;
goalIndicator1.position.set(0, 0.16, -8);
scene.add(goalIndicator1);

const goalIndicator2 = new THREE.Mesh(new THREE.PlaneGeometry(goalWidth, 0.1), goalIndicatorMat);
goalIndicator2.rotation.x = -Math.PI / 2;
goalIndicator2.position.set(0, 0.16, 8);
scene.add(goalIndicator2);

// Puck
const puckGeometry = new THREE.CylinderGeometry(0.4, 0.4, 0.15, 32);
const puckMaterial = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8, roughness: 0.2 });
const puck = new THREE.Mesh(puckGeometry, puckMaterial);
puck.position.set(0, 0.3, 0);
puck.castShadow = true;
scene.add(puck);

// Player paddle
const paddleGeometry = new THREE.CylinderGeometry(0.6, 0.6, 0.2, 32);
const playerPaddleMaterial = new THREE.MeshStandardMaterial({ color: 0xff3333, metalness: 0.3, roughness: 0.5 });
const playerPaddle = new THREE.Mesh(paddleGeometry, playerPaddleMaterial);
playerPaddle.position.set(0, 0.3, 6);
playerPaddle.castShadow = true;
scene.add(playerPaddle);

// AI paddle
const aiPaddleMaterial = new THREE.MeshStandardMaterial({ color: 0x3333ff, metalness: 0.3, roughness: 0.5 });
const aiPaddle = new THREE.Mesh(paddleGeometry.clone(), aiPaddleMaterial);
aiPaddle.position.set(0, 0.3, -6);
aiPaddle.castShadow = true;
scene.add(aiPaddle);

// Horse model
let horseModel = null;
let horseLoaded = false;
let horseJumping = false;
let horseJumpTime = 0;
let horseBaseY = 0.3;

const loader = new GLTFLoader();
try {
    loader.load('._horse.glb', (gltf) => {
        horseModel = gltf.scene;
        horseModel.position.set(7, 0.3, 0);
        horseModel.scale.set(0.5, 0.5, 0.5);
        scene.add(horseModel);
        horseLoaded = true;
    }, undefined, (error) => {
        console.warn('Could not load horse model, creating placeholder:', error);
        createPlaceholderHorse();
    });
} catch (e) {
    console.warn('GLTF loader error, creating placeholder');
    createPlaceholderHorse();
}

// Fallback: create a simple placeholder horse if GLB fails to load
function createPlaceholderHorse() {
    const horseGroup = new THREE.Group();
    
    // Body
    const bodyGeom = new THREE.BoxGeometry(1.2, 0.6, 0.5);
    const horseMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const body = new THREE.Mesh(bodyGeom, horseMat);
    body.position.y = 0.6;
    horseGroup.add(body);
    
    // Head
    const headGeom = new THREE.BoxGeometry(0.3, 0.5, 0.3);
    const head = new THREE.Mesh(headGeom, horseMat);
    head.position.set(0.7, 1.0, 0);
    horseGroup.add(head);
    
    // Neck
    const neckGeom = new THREE.BoxGeometry(0.4, 0.4, 0.25);
    const neck = new THREE.Mesh(neckGeom, horseMat);
    neck.position.set(0.5, 0.9, 0);
    neck.rotation.z = 0.3;
    horseGroup.add(neck);
    
    // Legs
    const legGeom = new THREE.BoxGeometry(0.15, 0.5, 0.15);
    const positions = [[-0.4, 0.25, 0.15], [-0.4, 0.25, -0.15], [0.4, 0.25, 0.15], [0.4, 0.25, -0.15]];
    positions.forEach(pos => {
        const leg = new THREE.Mesh(legGeom, horseMat);
        leg.position.set(...pos);
        horseGroup.add(leg);
    });
    
    // Trophy base
    const baseGeom = new THREE.CylinderGeometry(0.5, 0.6, 0.3, 16);
    const baseMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.8, roughness: 0.2 });
    const base = new THREE.Mesh(baseGeom, baseMat);
    base.position.y = -0.05;
    horseGroup.add(base);
    
    horseGroup.position.set(7, 0.3, 0);
    horseGroup.scale.set(0.5, 0.5, 0.5);
    scene.add(horseGroup);
    horseModel = horseGroup;
    horseLoaded = true;
}

// Game state
let playerScore = 0;
let aiScore = 0;
let puckVX = 0;
let puckVZ = 0;
let timeScale = 1.0;
let timeMode = 'NORMAL';
let gameOver = false;
let winner = '';
let frameCount = 0;
let paused = false;

let tableFlashTimer = 0;

// Input
const keys = {};
window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    
    if (e.code === 'KeyQ') {
        timeScale = 0.25;
        timeMode = 'SLOW-MO';
        paused = false;
        document.getElementById('time-mode').textContent = 'SLOW-MO';
    } else if (e.code === 'KeyW') {
        timeScale = 1.0;
        timeMode = 'NORMAL';
        paused = false;
        document.getElementById('time-mode').textContent = 'NORMAL';
    } else if (e.code === 'KeyE') {
        timeScale = 2.0;
        timeMode = 'FAST';
        paused = false;
        document.getElementById('time-mode').textContent = 'FAST';
    } else if (e.code === 'Space') {
        e.preventDefault();
        if (paused) {
            paused = false;
            timeScale = timeMode === 'SLOW-MO' ? 0.25 : timeMode === 'FAST' ? 2.0 : 1.0;
        } else {
            paused = true;
            timeScale = 0;
        }
        document.getElementById('time-mode').textContent = paused ? 'PAUSED' : timeMode;
    }
});

window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
});

// State exposure
window.__3D_STATE__ = {
    playerScore: 0,
    aiScore: 0,
    puckX: 0,
    puckZ: 0,
    puckVX: 0,
    puckVZ: 0,
    puckSpeed: 0,
    playerPaddleX: 0,
    playerPaddleZ: 6,
    aiPaddleX: 0,
    aiPaddleZ: -6,
    timeScale: 1.0,
    timeMode: 'NORMAL',
    gameOver: false,
    winner: '',
    horseLoaded: false,
    horseRotationY: 0,
    frameCount: 0,
    paused: false
};

function resetPuck() {
    puck.position.set(0, 0.3, 0);
    puckVX = 0;
    puckVZ = 0;
}

function triggerHorseJump() {
    if (horseModel && !horseJumping) {
        horseJumping = true;
        horseJumpTime = 0;
    }
}

function scoreGoal(scorer) {
    if (gameOver) return;
    
    if (scorer === 'player') {
        playerScore++;
        document.getElementById('player-score').textContent = `Player: ${playerScore}`;
    } else {
        aiScore++;
        document.getElementById('ai-score').textContent = `AI: ${aiScore}`;
    }
    
    // Flash table
    tableFlashTimer = 0.3;
    tableMaterial.color.set(0xffffff);
    
    // Horse jump
    triggerHorseJump();
    
    // Check win
    if (playerScore >= 5) {
        gameOver = true;
        winner = 'PLAYER';
        document.getElementById('game-over-msg').textContent = 'PLAYER WINS!';
        document.getElementById('game-over-msg').style.display = 'block';
    } else if (aiScore >= 5) {
        gameOver = true;
        winner = 'AI';
        document.getElementById('game-over-msg').textContent = 'AI WINS!';
        document.getElementById('game-over-msg').style.display = 'block';
    }
    
    resetPuck();
    playerPaddle.position.set(0, 0.3, 6);
    aiPaddle.position.set(0, 0.3, -6);
}

function checkPaddleCollision(paddleMesh) {
    const dx = puck.position.x - paddleMesh.position.x;
    const dz = puck.position.z - paddleMesh.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    const minDist = 0.4 + 0.6; // puck radius + paddle radius
    
    if (dist < minDist && dist > 0) {
        const nx = dx / dist;
        const nz = dz / dist;
        
        // Separate
        puck.position.x = paddleMesh.position.x + nx * minDist;
        puck.position.z = paddleMesh.position.z + nz * minDist;
        
        const currentSpeed = Math.sqrt(puckVX * puckVX + puckVZ * puckVZ);
        let newSpeed = currentSpeed + 2;
        if (newSpeed < 3) newSpeed = 3;
        if (newSpeed > 20) newSpeed = 20;
        
        puckVX = nx * newSpeed;
        puckVZ = nz * newSpeed;
    }
}

const clock = new THREE.Clock();
let prevTime = 0;

function animate() {
    requestAnimationFrame(animate);
    
    const rawDt = clock.getDelta();
    const dt = Math.min(rawDt, 0.05); // cap raw dt
    const scaledDt = dt * timeScale;
    
    frameCount++;
    
    if (!gameOver) {
        // Player paddle movement
        const paddleSpeed = 12;
        if (keys['ArrowLeft']) {
            playerPaddle.position.x -= paddleSpeed * scaledDt;
        }
        if (keys['ArrowRight']) {
            playerPaddle.position.x += paddleSpeed * scaledDt;
        }
        if (keys['ArrowUp']) {
            playerPaddle.position.z -= paddleSpeed * scaledDt;
        }
        if (keys['ArrowDown']) {
            playerPaddle.position.z += paddleSpeed * scaledDt;
        }
        
        // Constrain player paddle
        playerPaddle.position.x = Math.max(-4.5, Math.min(4.5, playerPaddle.position.x));
        playerPaddle.position.z = Math.max(0.5, Math.min(7.5, playerPaddle.position.z));
        
        // AI movement
        if (timeScale > 0) {
            const aiLerp = 0.03 * timeScale;
            aiPaddle.position.x += (puck.position.x - aiPaddle.position.x) * aiLerp;
            
            // AI z: move closer when puck is on AI's side
            let targetZ;
            if (puck.position.z < 0) {
                // Puck on AI side, move toward it
                targetZ = Math.max(-7.5, Math.min(-0.5, puck.position.z + 1));
            } else {
                targetZ = -6;
            }
            aiPaddle.position.z += (targetZ - aiPaddle.position.z) * aiLerp;
            
            // Constrain AI paddle
            aiPaddle.position.x = Math.max(-4.5, Math.min(4.5, aiPaddle.position.x));
            aiPaddle.position.z = Math.max(-7.5, Math.min(-0.5, aiPaddle.position.z));
        }
        
        // Puck physics
        if (timeScale > 0) {
            // Apply friction
            const frictionPerFrame = Math.pow(0.998, timeScale);
            puckVX *= frictionPerFrame;
            puckVZ *= frictionPerFrame;
            
            // Move puck
            puck.position.x += puckVX * scaledDt;
            puck.position.z += puckVZ * scaledDt;
            
            // Wall collisions
            const puckRadius = 0.4;
            const wallInner = 5 - wallThickness / 2 - puckRadius;
            
            // Left/Right walls
            if (puck.position.x < -wallInner) {
                puck.position.x = -wallInner;
                puckVX = Math.abs(puckVX) * 0.9;
            }
            if (puck.position.x > wallInner) {
                puck.position.x = wallInner;
                puckVX = -Math.abs(puckVX) * 0.9;
            }
            
            // Top/Bottom walls (with goal gaps)
            const goalHalf = goalWidth / 2; // 1.5
            const wallZ = 8 - wallThickness / 2 - puckRadius;
            
            // Top wall (z = -8)
            if (puck.position.z < -wallZ) {
                if (Math.abs(puck.position.x) > goalHalf) {
                    // Hit wall
                    puck.position.z = -wallZ;
                    puckVZ = Math.abs(puckVZ) * 0.9;
                } else if (puck.position.z < -8) {
                    // Goal! Player scores (puck went into AI's goal)
                    scoreGoal('player');
                }
            }
            
            // Bottom wall (z = +8)
            if (puck.position.z > wallZ) {
                if (Math.abs(puck.position.x) > goalHalf) {
                    // Hit wall
                    puck.position.z = wallZ;
                    puckVZ = -Math.abs(puckVZ) * 0.9;
                } else if (puck.position.z > 8) {
                    // Goal! AI scores (puck went into player's goal)
                    scoreGoal('ai');
                }
            }
            
            // Paddle collisions
            checkPaddleCollision(playerPaddle);
            checkPaddleCollision(aiPaddle);
            
            // Clamp puck speed
            const speed = Math.sqrt(puckVX * puckVX + puckVZ * puckVZ);
            if (speed > 20) {
                puckVX = (puckVX / speed) * 20;
                puckVZ = (puckVZ / speed) * 20;
            }
        }
    }
    
    // Table flash
    if (tableFlashTimer > 0) {
        tableFlashTimer -= dt; // Use real dt for visual effects
        if (tableFlashTimer <= 0) {
            tableMaterial.color.set(originalTableColor);
        }
    }
    
    // Horse rotation and jump
    if (horseModel) {
        horseModel.rotation.y += 0.5 * dt; // Real time rotation
        
        if (horseJumping) {
            horseJumpTime += dt;
            if (horseJumpTime < 0.25) {
                // Going up
                horseModel.position.y = horseBaseY + (horseJumpTime / 0.25) * 2;
            } else if (horseJumpTime < 0.5) {
                // Coming down
                horseModel.position.y = horseBaseY + ((0.5 - horseJumpTime) / 0.25) * 2;
            } else {
                horseModel.position.y = horseBaseY;
                horseJumping = false;
            }
        }
    }
    
    // Update state
    const pSpeed = Math.sqrt(puckVX * puckVX + puckVZ * puckVZ);
    window.__3D_STATE__ = {
        playerScore,
        aiScore,
        puckX: puck.position.x,
        puckZ: puck.position.z,
        puckVX,
        puckVZ,
        puckSpeed: pSpeed,
        playerPaddleX: playerPaddle.position.x,
        playerPaddleZ: playerPaddle.position.z,
        aiPaddleX: aiPaddle.position.x,
        aiPaddleZ: aiPaddle.position.z,
        timeScale,
        timeMode: paused ? 'PAUSED' : timeMode,
        gameOver,
        winner,
        horseLoaded,
        horseRotationY: horseModel ? horseModel.rotation.y : 0,
        frameCount,
        paused
    };
    
    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Give puck an initial push after a short delay
setTimeout(() => {
    puckVX = (Math.random() - 0.5) * 4;
    puckVZ = -5;
}, 1000);

animate();
</script>
</body>
</html>
