<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Air Hockey with Time Control</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #player-score, #ai-score, #time-mode, #game-over-msg, #controls-hint {
      position: absolute;
      z-index: 10;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 2px 6px rgba(0,0,0,0.7);
    }

    #player-score {
      top: 16px;
      left: 16px;
      font-size: 24px;
      color: #ff3333;
    }

    #ai-score {
      top: 16px;
      right: 16px;
      font-size: 24px;
      color: #3333ff;
    }

    #time-mode {
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      color: yellow;
    }

    #game-over-msg {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      color: white;
      display: none;
      text-align: center;
    }

    #controls-hint {
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div id="player-score">Player: 0</div>
  <div id="ai-score">AI: 0</div>
  <div id="time-mode">NORMAL</div>
  <div id="game-over-msg"></div>
  <div id="controls-hint">Q=SlowMo W=Normal E=Fast SPACE=Pause</div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b0f14);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 12, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(0, 15, 5);
    scene.add(directionalLight);

    const tableGroup = new THREE.Group();
    scene.add(tableGroup);

    const tableMaterial = new THREE.MeshStandardMaterial({ color: 0x1a6b3a });
    const wallMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const puckMaterial = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const playerMaterial = new THREE.MeshStandardMaterial({ color: 0xff3333 });
    const aiMaterial = new THREE.MeshStandardMaterial({ color: 0x3333ff });

    const tableWidth = 10;
    const tableDepth = 16;
    const tableHeight = 0.3;
    const wallHeight = 0.5;
    const wallThickness = 0.2;
    const goalWidth = 3;

    const table = new THREE.Mesh(
      new THREE.BoxGeometry(tableWidth, tableHeight, tableDepth),
      tableMaterial
    );
    table.position.set(0, 0, 0);
    table.receiveShadow = true;
    tableGroup.add(table);

    function makeWall(w, h, d, x, y, z) {
      const wall = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        wallMaterial
      );
      wall.position.set(x, y, z);
      tableGroup.add(wall);
      return wall;
    }

    makeWall(wallThickness, wallHeight, tableDepth + wallThickness, -tableWidth / 2, 0.4, 0);
    makeWall(wallThickness, wallHeight, tableDepth + wallThickness,  tableWidth / 2, 0.4, 0);

    const sideSegmentWidth = (tableWidth - goalWidth) / 2;
    makeWall(sideSegmentWidth, wallHeight, wallThickness, -((goalWidth / 2) + (sideSegmentWidth / 2)), 0.4, -tableDepth / 2);
    makeWall(sideSegmentWidth, wallHeight, wallThickness,  ((goalWidth / 2) + (sideSegmentWidth / 2)), 0.4, -tableDepth / 2);
    makeWall(sideSegmentWidth, wallHeight, wallThickness, -((goalWidth / 2) + (sideSegmentWidth / 2)), 0.4,  tableDepth / 2);
    makeWall(sideSegmentWidth, wallHeight, wallThickness,  ((goalWidth / 2) + (sideSegmentWidth / 2)), 0.4,  tableDepth / 2);

    const puckRadius = 0.4;
    const paddleRadius = 0.6;

    const puck = new THREE.Mesh(
      new THREE.CylinderGeometry(puckRadius, puckRadius, 0.15, 32),
      puckMaterial
    );
    puck.position.set(0, 0.3, 0);
    scene.add(puck);

    const playerPaddle = new THREE.Mesh(
      new THREE.CylinderGeometry(paddleRadius, paddleRadius, 0.2, 32),
      playerMaterial
    );
    playerPaddle.position.set(0, 0.3, 6);
    scene.add(playerPaddle);

    const aiPaddle = new THREE.Mesh(
      new THREE.CylinderGeometry(paddleRadius, paddleRadius, 0.2, 32),
      aiMaterial
    );
    aiPaddle.position.set(0, 0.3, -6);
    scene.add(aiPaddle);

    let horse = null;
    let horseLoaded = false;
    let horseBaseY = 0.3;
    let horseJumpTime = 0;
    let horseJumpActive = false;

    const loader = new GLTFLoader();
    loader.load(
      '._horse.glb',
      (gltf) => {
        horse = gltf.scene;
        horse.position.set(7, 0.3, 0);
        horse.scale.set(0.5, 0.5, 0.5);
        scene.add(horse);
        horseLoaded = true;
      },
      undefined,
      () => {
        const fallback = new THREE.Mesh(
          new THREE.BoxGeometry(0.8, 0.8, 1.2),
          new THREE.MeshStandardMaterial({ color: 0xd4af37 })
        );
        fallback.position.set(7, 0.7, 0);
        scene.add(fallback);
        horse = fallback;
        horseBaseY = fallback.position.y;
        horseLoaded = true;
      }
    );

    const keys = {};
    let playerScore = 0;
    let aiScore = 0;
    let gameOver = false;
    let winner = '';

    let puckVX = 0;
    let puckVZ = 0;
    let timeScale = 1.0;
    let timeMode = 'NORMAL';
    let paused = false;
    let frameCount = 0;
    let flashTimer = 0;

    const playerScoreEl = document.getElementById('player-score');
    const aiScoreEl = document.getElementById('ai-score');
    const timeModeEl = document.getElementById('time-mode');
    const gameOverEl = document.getElementById('game-over-msg');

    function updateTimeModeLabel() {
      if (timeScale === 0) timeMode = 'PAUSED';
      else if (timeScale === 0.25) timeMode = 'SLOW-MO';
      else if (timeScale === 2.0) timeMode = 'FAST';
      else timeMode = 'NORMAL';
      paused = timeScale === 0;
      timeModeEl.textContent = timeMode;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function resetPuck() {
      puck.position.set(0, 0.3, 0);
      puckVX = 0;
      puckVZ = 0;
    }

    function triggerHorseJump() {
      horseJumpActive = true;
      horseJumpTime = 0;
    }

    function flashTable() {
      flashTimer = 0.3;
      table.material.color.set(0xffffff);
    }

    function scorePoint(scoringPlayer) {
      if (gameOver) return;

      if (scoringPlayer === 'PLAYER') {
        playerScore++;
        playerScoreEl.textContent = `Player: ${playerScore}`;
      } else {
        aiScore++;
        aiScoreEl.textContent = `AI: ${aiScore}`;
      }

      flashTable();
      triggerHorseJump();
      resetPuck();

      if (playerScore >= 5) {
        gameOver = true;
        winner = 'PLAYER';
        gameOverEl.textContent = 'PLAYER WINS!';
        gameOverEl.style.display = 'block';
      } else if (aiScore >= 5) {
        gameOver = true;
        winner = 'AI';
        gameOverEl.textContent = 'AI WINS!';
        gameOverEl.style.display = 'block';
      }
    }

    function handlePlayerInput(dtScaled) {
      if (gameOver || timeScale === 0) return;

      const moveSpeed = 12;
      let moveX = 0;
      let moveZ = 0;

      if (keys['ArrowLeft']) moveX -= 1;
      if (keys['ArrowRight']) moveX += 1;
      if (keys['ArrowUp']) moveZ -= 1;
      if (keys['ArrowDown']) moveZ += 1;

      const len = Math.hypot(moveX, moveZ);
      if (len > 0) {
        moveX /= len;
        moveZ /= len;
      }

      playerPaddle.position.x += moveX * moveSpeed * dtScaled;
      playerPaddle.position.z += moveZ * moveSpeed * dtScaled;

      playerPaddle.position.x = clamp(playerPaddle.position.x, -4.5, 4.5);
      playerPaddle.position.z = clamp(playerPaddle.position.z, 0.5, 7.5);
    }

    function updateAI() {
      if (gameOver || timeScale === 0) return;

      const lerpFactor = clamp(0.03 * timeScale, 0, 1);
      aiPaddle.position.x = THREE.MathUtils.lerp(aiPaddle.position.x, puck.position.x, lerpFactor);
      aiPaddle.position.x = clamp(aiPaddle.position.x, -4.5, 4.5);

      const proximity = clamp((8 - Math.abs(puck.position.z)) / 8, 0, 1);
      const targetZ = -6 + proximity * 4;
      aiPaddle.position.z = THREE.MathUtils.lerp(aiPaddle.position.z, targetZ, lerpFactor);
      aiPaddle.position.z = clamp(aiPaddle.position.z, -7.5, -0.5);
    }

    function resolvePaddleCollision(paddle) {
      const dx = puck.position.x - paddle.position.x;
      const dz = puck.position.z - paddle.position.z;
      const dist = Math.hypot(dx, dz);
      const minDist = puckRadius + paddleRadius;

      if (dist < minDist) {
        let nx = dx;
        let nz = dz;
        let nLen = Math.hypot(nx, nz);

        if (nLen < 0.0001) {
          nx = 0;
          nz = paddle === playerPaddle ? -1 : 1;
          nLen = 1;
        }

        nx /= nLen;
        nz /= nLen;

        const currentSpeed = Math.hypot(puckVX, puckVZ);
        let newSpeed = currentSpeed + 2;
        if (newSpeed < 3) newSpeed = 3;
        if (newSpeed > 20) newSpeed = 20;

        puckVX = nx * newSpeed;
        puckVZ = nz * newSpeed;

        const overlap = minDist - dist;
        puck.position.x += nx * overlap;
        puck.position.z += nz * overlap;
      }
    }

    function updatePuck(dtScaled) {
      if (gameOver || timeScale === 0) return;

      puck.position.x += puckVX * dtScaled;
      puck.position.z += puckVZ * dtScaled;

      const frictionPer60fpsFrame = 0.998;
      const friction = Math.pow(frictionPer60fpsFrame, dtScaled * 60);
      puckVX *= friction;
      puckVZ *= friction;

      let speed = Math.hypot(puckVX, puckVZ);
      if (speed > 20) {
        puckVX = (puckVX / speed) * 20;
        puckVZ = (puckVZ / speed) * 20;
      }

      const restitution = 0.9;
      const xLimit = 5 - wallThickness - puckRadius;

      if (puck.position.x < -xLimit) {
        puck.position.x = -xLimit;
        puckVX = Math.abs(puckVX) * restitution;
      } else if (puck.position.x > xLimit) {
        puck.position.x = xLimit;
        puckVX = -Math.abs(puckVX) * restitution;
      }

      const inGoalX = Math.abs(puck.position.x) < 1.5;

      if (puck.position.z < -8) {
        if (inGoalX) {
          scorePoint('AI');
          return;
        } else {
          const zLimit = -8 + puckRadius;
          puck.position.z = zLimit;
          puckVZ = Math.abs(puckVZ) * restitution;
        }
      } else if (puck.position.z > 8) {
        if (inGoalX) {
          scorePoint('PLAYER');
          return;
        } else {
          const zLimit = 8 - puckRadius;
          puck.position.z = zLimit;
          puckVZ = -Math.abs(puckVZ) * restitution;
        }
      }

      resolvePaddleCollision(playerPaddle);
      resolvePaddleCollision(aiPaddle);
    }

    function updateHorse(dtReal, dtScaled) {
      if (!horse) return;

      horse.rotation.y += 0.5 * dtReal;

      if (horseJumpActive) {
        horseJumpTime += dtScaled;
        const duration = 1.0;
        const half = 0.5;

        if (horseJumpTime <= half) {
          const t = horseJumpTime / half;
          horse.position.y = horseBaseY + 2 * t;
        } else if (horseJumpTime <= duration) {
          const t = (horseJumpTime - half) / half;
          horse.position.y = horseBaseY + 2 * (1 - t);
        } else {
          horse.position.y = horseBaseY;
          horseJumpActive = false;
        }
      }
    }

    function updateFlash(dtReal) {
      if (flashTimer > 0) {
        flashTimer -= dtReal;
        if (flashTimer <= 0) {
          table.material.color.set(0x1a6b3a);
        }
      }
    }

    window.__3D_STATE__ = {
      playerScore: 0,
      aiScore: 0,
      puckX: 0,
      puckZ: 0,
      puckVX: 0,
      puckVZ: 0,
      puckSpeed: 0,
      playerPaddleX: 0,
      playerPaddleZ: 0,
      aiPaddleX: 0,
      aiPaddleZ: 0,
      timeScale: 1.0,
      timeMode: 'NORMAL',
      gameOver: false,
      winner: '',
      horseLoaded: false,
      horseRotationY: 0,
      frameCount: 0,
      paused: false
    };

    function updateState() {
      const puckSpeed = Math.hypot(puckVX, puckVZ);
      window.__3D_STATE__.playerScore = playerScore;
      window.__3D_STATE__.aiScore = aiScore;
      window.__3D_STATE__.puckX = puck.position.x;
      window.__3D_STATE__.puckZ = puck.position.z;
      window.__3D_STATE__.puckVX = puckVX;
      window.__3D_STATE__.puckVZ = puckVZ;
      window.__3D_STATE__.puckSpeed = puckSpeed;
      window.__3D_STATE__.playerPaddleX = playerPaddle.position.x;
      window.__3D_STATE__.playerPaddleZ = playerPaddle.position.z;
      window.__3D_STATE__.aiPaddleX = aiPaddle.position.x;
      window.__3D_STATE__.aiPaddleZ = aiPaddle.position.z;
      window.__3D_STATE__.timeScale = timeScale;
      window.__3D_STATE__.timeMode = timeMode;
      window.__3D_STATE__.gameOver = gameOver;
      window.__3D_STATE__.winner = winner;
      window.__3D_STATE__.horseLoaded = horseLoaded;
      window.__3D_STATE__.horseRotationY = horse ? horse.rotation.y : 0;
      window.__3D_STATE__.frameCount = frameCount;
      window.__3D_STATE__.paused = paused;
    }

    document.addEventListener('keydown', (e) => {
      keys[e.key] = true;

      if (e.code === 'Space') {
        e.preventDefault();
        if (timeScale === 0) {
          timeScale = 1.0;
        } else {
          timeScale = 0;
        }
        updateTimeModeLabel();
      } else if (e.key === 'q' || e.key === 'Q') {
        timeScale = 0.25;
        updateTimeModeLabel();
      } else if (e.key === 'w' || e.key === 'W') {
        timeScale = 1.0;
        updateTimeModeLabel();
      } else if (e.key === 'e' || e.key === 'E') {
        timeScale = 2.0;
        updateTimeModeLabel();
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateTimeModeLabel();

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const dtReal = Math.min(clock.getDelta(), 0.05);
      const dtScaled = dtReal * timeScale;

      handlePlayerInput(dtScaled);
      updateAI();
      updatePuck(dtScaled);
      updateHorse(dtReal, dtScaled);
      updateFlash(dtReal);
      updateState();

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
