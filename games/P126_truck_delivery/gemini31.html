<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市配送卡车游戏</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #b0c4de;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            user-select: none;
            min-width: 200px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #4CAF50;
        }
        .hud-item {
            margin: 5px 0;
            font-size: 14px;
        }
        .hud-value {
            font-weight: bold;
            color: #FFD700;
        }
        #minimap-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 200px;
            border: 3px solid #fff;
            border-radius: 50%;
            overflow: hidden;
            background-color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #minimap {
            width: 100%;
            height: 100%;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            display: none;
            border: 2px solid #4CAF50;
        }
        #game-over h1 {
            color: #4CAF50;
            margin-top: 0;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="hud">
        <h2>配送任务</h2>
        <div class="hud-item">状态: <span id="loadStatus" class="hud-value" style="color:#ff6b6b">加载模型中...</span></div>
        <div class="hud-item">进度: <span id="deliveries" class="hud-value">0/5</span></div>
        <div class="hud-item">用时: <span id="timer" class="hud-value">0.0</span> s</div>
        <div class="hud-item">速度: <span id="speed" class="hud-value">0.0</span> u/s</div>
        <div class="hud-item">碰撞: <span id="collisionCount" class="hud-value" style="color:#ff6b6b">0</span></div>
        <div class="hud-item">位置: <span id="truckPos" class="hud-value">0, 0, 0</span></div>
        <div style="margin-top: 10px; font-size: 12px; color: #aaa;">WASD 控制移动</div>
    </div>

    <div id="minimap-container">
        <canvas id="minimap"></canvas>
    </div>

    <div id="game-over">
        <h1>任务完成!</h1>
        <p>总用时: <span id="final-time" style="color:#FFD700; font-weight:bold;"></span> 秒</p>
        <p>碰撞次数: <span id="final-collisions" style="color:#ff6b6b; font-weight:bold;"></span></p>
        <p id="evaluation" style="font-size: 1.2em; margin-top: 15px;"></p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- 全局状态 ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            deliveries: 0,
            truckPosition: { x: 0, y: 0, z: 0 },
            speed: 0,
            timer: 0,
            collisionCount: 0,
            gameStarted: false,
            gameFinished: false,
            deliveryPoints: []
        };

        // --- 场景设置 ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xb0c4de);
        scene.fog = new THREE.FogExp2(0xb0c4de, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- 小地图设置 ---
        const minimapCanvas = document.getElementById('minimap');
        const minimapRenderer = new THREE.WebGLRenderer({ canvas: minimapCanvas, antialias: true });
        minimapRenderer.setSize(200, 200);
        const minimapCamera = new THREE.OrthographicCamera(-40, 40, 40, -40, 1, 100);
        minimapCamera.position.set(0, 50, 0);
        minimapCamera.lookAt(0, 0, 0);

        // --- 光照 ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -60;
        dirLight.shadow.camera.right = 60;
        dirLight.shadow.camera.top = 60;
        dirLight.shadow.camera.bottom = -60;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- 城市构建 (5x5 街区) ---
        const blockSize = 10;
        const roadWidth = 4;
        const gridSize = blockSize + roadWidth;
        const gridCount = 5;
        const citySize = gridCount * gridSize;
        const offset = (citySize - gridSize) / 2;

        const buildings = [];
        const buildingBoxes = [];
        const intersections = [];

        // 地面 (基础底色)
        const groundGeo = new THREE.PlaneGeometry(citySize + 20, citySize + 20);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 道路和建筑
        const roadMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
        
        for (let i = 0; i < gridCount; i++) {
            for (let j = 0; j < gridCount; j++) {
                const cx = i * gridSize - offset;
                const cz = j * gridSize - offset;

                // 记录交叉口用于放置配送点
                intersections.push(new THREE.Vector3(cx + gridSize/2, 0, cz + gridSize/2));

                // 建筑
                const height = Math.random() * 6 + 2;
                const color = new THREE.Color().setHSL(Math.random(), 0.6, 0.5);
                const bGeo = new THREE.BoxGeometry(blockSize, height, blockSize);
                const bMat = new THREE.MeshLambertMaterial({ color: color });
                const building = new THREE.Mesh(bGeo, bMat);
                
                building.position.set(cx, height / 2, cz);
                building.castShadow = true;
                building.receiveShadow = true;
                
                building.userData = { originalColor: color.getHex(), isFlashing: false };
                scene.add(building);
                buildings.push(building);

                const box = new THREE.Box3().setFromObject(building);
                buildingBoxes.push(box);
            }
        }

        // 道路条带 (水平和垂直)
        for (let i = 0; i <= gridCount; i++) {
            const pos = i * gridSize - offset - gridSize/2;
            
            // 垂直道路
            const vRoad = new THREE.Mesh(new THREE.PlaneGeometry(roadWidth, citySize), roadMat);
            vRoad.rotation.x = -Math.PI / 2;
            vRoad.position.set(pos, 0.01, 0);
            vRoad.receiveShadow = true;
            scene.add(vRoad);

            // 水平道路
            const hRoad = new THREE.Mesh(new THREE.PlaneGeometry(citySize, roadWidth), roadMat);
            hRoad.rotation.x = -Math.PI / 2;
            hRoad.position.set(0, 0.01, pos);
            hRoad.receiveShadow = true;
            scene.add(hRoad);
        }

        // --- 配送点 ---
        const deliveryPoints = [];
        // 随机打乱交叉口并取前5个
        intersections.sort(() => Math.random() - 0.5);
        
        for (let i = 0; i < 5; i++) {
            const pos = intersections[i];
            
            const group = new THREE.Group();
            group.position.copy(pos);
            
            // 圆柱体
            const cylGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.5, 16);
            const cylMat = new THREE.MeshBasicMaterial({ 
                color: 0x00ff00, 
                transparent: true, 
                opacity: 0.6 
            });
            const cyl = new THREE.Mesh(cylGeo, cylMat);
            cyl.position.y = 0.25;
            group.add(cyl);

            // 旋转光环
            const ringGeo = new THREE.TorusGeometry(2, 0.2, 8, 24);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.y = 0.5;
            ring.rotation.x = Math.PI / 2;
            group.add(ring);

            scene.add(group);

            const dpData = {
                group: group,
                mesh: cyl,
                ring: ring,
                x: pos.x,
                z: pos.z,
                completed: false
            };
            deliveryPoints.push(dpData);
            window.__3D_STATE__.deliveryPoints.push({ x: pos.x, z: pos.z, completed: false });
        }

        // --- 卡车加载与设置 ---
        const truckGroup = new THREE.Group();
        // 放置在左下角起始位置 (第一个交叉口)
        truckGroup.position.set(-offset - gridSize/2, 0, offset + gridSize/2);
        scene.add(truckGroup);

        const truckBox = new THREE.Box3();
        let mixer;

        const loader = new GLTFLoader();
        loader.load('assets/CesiumMilkTruck.glb', (gltf) => {
            const model = gltf.scene;
            // 适当缩放模型
            model.scale.set(1.5, 1.5, 1.5);
            
            // 调整模型朝向，使其默认朝向 -Z
            model.rotation.y = Math.PI; 
            
            // 提升一点防止穿模
            model.position.y = 0.5;

            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            truckGroup.add(model);

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                gltf.animations.forEach((clip) => {
                    mixer.clipAction(clip).play();
                });
            }

            window.__3D_STATE__.modelLoaded = true;
            document.getElementById('loadStatus').innerText = '已加载';
            document.getElementById('loadStatus').style.color = '#4CAF50';
        }, undefined, (error) => {
            console.error('模型加载失败:', error);
            document.getElementById('loadStatus').innerText = '加载失败';
        });

        // --- 控制与物理 ---
        const keys = { w: false, a: false, s: false, d: false };
        let currentSpeed = 0;
        const maxSpeed = 15;
        const acceleration = 10;
        const friction = 0.96;
        const rotationSpeed = 2.5;

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) {
                keys[key] = true;
                if (!window.__3D_STATE__.gameStarted && window.__3D_STATE__.modelLoaded) {
                    window.__3D_STATE__.gameStarted = true;
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) {
                keys[key] = false;
            }
        });

        // --- 碰撞处理 ---
        function flashBuilding(building) {
            if (building.userData.isFlashing) return;
            building.userData.isFlashing = true;
            building.material.color.setHex(0xff0000);
            
            setTimeout(() => {
                building.material.color.setHex(building.userData.originalColor);
                building.userData.isFlashing = false;
            }, 300);
        }

        // --- 配送动画 ---
        function playDeliveryAnimation(dp) {
            let scale = 1;
            let opacity = 0.6;
            const animInterval = setInterval(() => {
                scale += 0.1;
                opacity -= 0.05;
                dp.mesh.scale.set(scale, 1, scale);
                dp.ring.scale.set(scale, scale, scale);
                dp.mesh.material.opacity = opacity;
                
                if (opacity <= 0) {
                    clearInterval(animInterval);
                    dp.group.visible = false;
                }
            }, 30);
        }

        // --- 游戏循环 ---
        const clock = new THREE.Clock();
        let gameTime = 0;

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            // 动画混合器更新
            if (mixer && Math.abs(currentSpeed) > 0.1) {
                // 根据速度调整动画播放速度
                mixer.update(delta * (currentSpeed / maxSpeed) * 5);
            }

            if (window.__3D_STATE__.modelLoaded && !window.__3D_STATE__.gameFinished) {
                // 计时器
                if (window.__3D_STATE__.gameStarted) {
                    gameTime += delta;
                    window.__3D_STATE__.timer = gameTime;
                }

                // 物理更新
                if (keys.w) currentSpeed += acceleration * delta;
                if (keys.s) currentSpeed -= acceleration * delta;
                
                currentSpeed *= friction;
                currentSpeed = THREE.MathUtils.clamp(currentSpeed, -maxSpeed * 0.5, maxSpeed);

                if (Math.abs(currentSpeed) > 0.1) {
                    const turnDir = currentSpeed > 0 ? 1 : -1;
                    if (keys.a) truckGroup.rotation.y += rotationSpeed * delta * turnDir;
                    if (keys.d) truckGroup.rotation.y -= rotationSpeed * delta * turnDir;
                } else {
                    currentSpeed = 0;
                }

                // 保存上一帧位置用于碰撞回退
                const prevPos = truckGroup.position.clone();

                // 移动 (假设模型朝向 -Z)
                truckGroup.translateZ(-currentSpeed * delta);

                // 边界限制 (防止开出地图)
                const limit = citySize / 2 + 5;
                truckGroup.position.x = THREE.MathUtils.clamp(truckGroup.position.x, -limit, limit);
                truckGroup.position.z = THREE.MathUtils.clamp(truckGroup.position.z, -limit, limit);

                // 碰撞检测
                // 使用一个稍小的包围盒以允许在狭窄街道通行
                truckBox.setFromObject(truckGroup);
                truckBox.expandByScalar(-0.5); 

                let collided = false;
                for (let i = 0; i < buildingBoxes.length; i++) {
                    if (truckBox.intersectsBox(buildingBoxes[i])) {
                        collided = true;
                        flashBuilding(buildings[i]);
                        break;
                    }
                }

                if (collided) {
                    truckGroup.position.copy(prevPos);
                    currentSpeed = -currentSpeed * 0.4; // 反弹
                    window.__3D_STATE__.collisionCount++;
                }

                // 配送检测
                deliveryPoints.forEach((dp, index) => {
                    if (!dp.completed) {
                        dp.ring.rotation.z += delta * 2; // 光环旋转
                        
                        const dist = truckGroup.position.distanceTo(dp.group.position);
                        if (dist < 3.0) {
                            dp.completed = true;
                            window.__3D_STATE__.deliveryPoints[index].completed = true;
                            window.__3D_STATE__.deliveries++;
                            
                            dp.mesh.material.color.setHex(0x0088ff);
                            dp.ring.material.color.setHex(0x0088ff);
                            
                            playDeliveryAnimation(dp);

                            // 检查胜利
                            if (window.__3D_STATE__.deliveries >= 5) {
                                window.__3D_STATE__.gameFinished = true;
                                showGameOver();
                            }
                        }
                    }
                });

                // 更新状态
                window.__3D_STATE__.speed = currentSpeed;
                window.__3D_STATE__.truckPosition.x = truckGroup.position.x;
                window.__3D_STATE__.truckPosition.y = truckGroup.position.y;
                window.__3D_STATE__.truckPosition.z = truckGroup.position.z;

                // 更新 HUD
                document.getElementById('deliveries').innerText = `${window.__3D_STATE__.deliveries}/5`;
                document.getElementById('timer').innerText = window.__3D_STATE__.timer.toFixed(1);
                document.getElementById('speed').innerText = Math.abs(currentSpeed).toFixed(1);
                document.getElementById('collisionCount').innerText = window.__3D_STATE__.collisionCount;
                document.getElementById('truckPos').innerText = 
                    `${Math.round(truckGroup.position.x)}, ${Math.round(truckGroup.position.z)}`;
            }

            // 摄像机跟随 (俯视 45 度)
            const camOffset = new THREE.Vector3(0, 25, 25);
            camOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), truckGroup.rotation.y);
            
            // 平滑插值摄像机位置
            camera.position.lerp(truckGroup.position.clone().add(camOffset), 0.1);
            camera.lookAt(truckGroup.position);

            // 渲染主场景
            renderer.render(scene, camera);

            // 渲染小地图
            minimapCamera.position.x = truckGroup.position.x;
            minimapCamera.position.z = truckGroup.position.z;
            minimapRenderer.render(scene, minimapCamera);
        }

        function showGameOver() {
            const goDiv = document.getElementById('game-over');
            goDiv.style.display = 'block';
            document.getElementById('final-time').innerText = window.__3D_STATE__.timer.toFixed(1);
            document.getElementById('final-collisions').innerText = window.__3D_STATE__.collisionCount;
            
            let evalText = "";
            const t = window.__3D_STATE__.timer;
            const c = window.__3D_STATE__.collisionCount;
            
            if (t < 30 && c === 0) evalText = "完美配送！王牌司机！";
            else if (t < 45 && c <= 3) evalText = "干得不错！";
            else if (c > 10) evalText = "你的驾照是买来的吗？";
            else evalText = "任务完成，下次努力！";
            
            document.getElementById('evaluation').innerText = evalText;
        }

        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 启动循环
        animate();
    </script>
</body>
</html>
