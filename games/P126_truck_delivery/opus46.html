<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Delivery Truck Game</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#hud {
  position: absolute;
  top: 15px;
  left: 15px;
  background: rgba(0, 0, 0, 0.75);
  color: #fff;
  padding: 15px 20px;
  border-radius: 10px;
  font-size: 14px;
  line-height: 1.8;
  min-width: 220px;
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  z-index: 10;
}
#hud .title {
  font-size: 18px;
  font-weight: bold;
  color: #4fc3f7;
  margin-bottom: 8px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  padding-bottom: 8px;
}
#hud .row { display: flex; justify-content: space-between; }
#hud .label { color: #aaa; }
#hud .value { color: #4fc3f7; font-weight: bold; }

#controls-hint {
  position: absolute;
  bottom: 15px;
  left: 15px;
  background: rgba(0,0,0,0.7);
  color: #ccc;
  padding: 10px 15px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.6;
  z-index: 10;
}
#controls-hint kbd {
  background: rgba(255,255,255,0.15);
  padding: 2px 6px;
  border-radius: 3px;
  font-family: monospace;
}

#minimap-container {
  position: absolute;
  bottom: 15px;
  right: 15px;
  width: 200px;
  height: 200px;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  overflow: hidden;
  z-index: 10;
}
#minimap {
  width: 100%;
  height: 100%;
}

#completion-screen {
  display: none;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  z-index: 100;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
#completion-screen.show { display: flex; }
#completion-screen .box {
  background: rgba(0,30,60,0.95);
  border: 2px solid #4fc3f7;
  border-radius: 15px;
  padding: 40px 50px;
  text-align: center;
  color: #fff;
}
#completion-screen .box h1 {
  color: #4fc3f7;
  font-size: 32px;
  margin-bottom: 20px;
}
#completion-screen .box p {
  font-size: 18px;
  margin: 8px 0;
}
#completion-screen .box .rating {
  font-size: 40px;
  margin-top: 15px;
}
</style>
</head>
<body>

<div id="hud">
  <div class="title">🚚 City Delivery</div>
  <div class="row"><span class="label">Deliveries:</span><span class="value" id="deliveries">0/5</span></div>
  <div class="row"><span class="label">Position:</span><span class="value" id="truckPos">0, 0</span></div>
  <div class="row"><span class="label">Speed:</span><span class="value" id="speed">0.0</span></div>
  <div class="row"><span class="label">Time:</span><span class="value" id="timer">0.0s</span></div>
  <div class="row"><span class="label">Collisions:</span><span class="value" id="collisionCount">0</span></div>
  <div class="row"><span class="label">Model:</span><span class="value" id="loadStatus">Loading...</span></div>
</div>

<div id="controls-hint">
  <kbd>W</kbd> Accelerate &nbsp; <kbd>S</kbd> Brake/Reverse<br>
  <kbd>A</kbd> Turn Left &nbsp; <kbd>D</kbd> Turn Right
</div>

<div id="minimap-container">
  <canvas id="minimap"></canvas>
</div>

<div id="completion-screen">
  <div class="box">
    <h1>🎉 All Deliveries Complete!</h1>
    <p id="final-time">Time: 0.0s</p>
    <p id="final-collisions">Collisions: 0</p>
    <div class="rating" id="final-rating">⭐⭐⭐</div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
window.__3D_STATE__ = {
  modelLoaded: false,
  deliveries: 0,
  truckPosition: { x: 0, y: 0, z: 0 },
  speed: 0,
  timer: 0,
  collisionCount: 0,
  gameStarted: false,
  gameFinished: false,
  deliveryPoints: []
};

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xb0c4de);
scene.fog = new THREE.Fog(0xb0c4de, 80, 200);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.autoClear = false;
document.body.appendChild(renderer.domElement);

// Main camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 25, 25);

// Minimap camera
const minimapCanvas = document.getElementById('minimap');
minimapCanvas.width = 200;
minimapCanvas.height = 200;
const minimapRenderer = new THREE.WebGLRenderer({ canvas: minimapCanvas, antialias: true });
minimapRenderer.setSize(200, 200);
const minimapCamera = new THREE.OrthographicCamera(-50, 50, 50, -50, 0.1, 200);
minimapCamera.position.set(0, 100, 0);
minimapCamera.lookAt(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0x6688aa, 0.7);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(30, 50, 30);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 150;
dirLight.shadow.camera.left = -60;
dirLight.shadow.camera.right = 60;
dirLight.shadow.camera.top = 60;
dirLight.shadow.camera.bottom = -60;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0xaaccff, 0x445522, 0.4);
scene.add(hemiLight);

// ============ CITY CONSTRUCTION ============
const GRID_SIZE = 6; // 6x6 grid = more than 5x5 blocks
const ROAD_WIDTH = 3;
const BLOCK_SIZE = 10;
const CELL_SIZE = ROAD_WIDTH + BLOCK_SIZE;
const CITY_OFFSET_X = -(GRID_SIZE * CELL_SIZE) / 2;
const CITY_OFFSET_Z = -(GRID_SIZE * CELL_SIZE) / 2;

const buildings = [];
const buildingBoxes = [];

// Ground plane
const groundGeo = new THREE.PlaneGeometry(GRID_SIZE * CELL_SIZE + ROAD_WIDTH + 20, GRID_SIZE * CELL_SIZE + ROAD_WIDTH + 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a5a2a });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.05;
ground.receiveShadow = true;
scene.add(ground);

// Road material
const roadMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.9 });
const roadLineMat = new THREE.MeshBasicMaterial({ color: 0xcccc00 });

function createRoads() {
  // Horizontal roads
  for (let i = 0; i <= GRID_SIZE; i++) {
    const z = CITY_OFFSET_Z + i * CELL_SIZE;
    const roadGeo = new THREE.PlaneGeometry(GRID_SIZE * CELL_SIZE + ROAD_WIDTH, ROAD_WIDTH);
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    road.position.set(CITY_OFFSET_X + (GRID_SIZE * CELL_SIZE + ROAD_WIDTH) / 2, 0.01, z + ROAD_WIDTH / 2);
    road.receiveShadow = true;
    scene.add(road);

    // Center line
    const lineGeo = new THREE.PlaneGeometry(GRID_SIZE * CELL_SIZE + ROAD_WIDTH, 0.1);
    const line = new THREE.Mesh(lineGeo, roadLineMat);
    line.rotation.x = -Math.PI / 2;
    line.position.set(road.position.x, 0.02, road.position.z);
    scene.add(line);
  }

  // Vertical roads
  for (let j = 0; j <= GRID_SIZE; j++) {
    const x = CITY_OFFSET_X + j * CELL_SIZE;
    const roadGeo = new THREE.PlaneGeometry(ROAD_WIDTH, GRID_SIZE * CELL_SIZE + ROAD_WIDTH);
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    road.position.set(x + ROAD_WIDTH / 2, 0.01, CITY_OFFSET_Z + (GRID_SIZE * CELL_SIZE + ROAD_WIDTH) / 2);
    road.receiveShadow = true;
    scene.add(road);

    // Center line
    const lineGeo = new THREE.PlaneGeometry(0.1, GRID_SIZE * CELL_SIZE + ROAD_WIDTH);
    const line = new THREE.Mesh(lineGeo, roadLineMat);
    line.rotation.x = -Math.PI / 2;
    line.position.set(road.position.x, 0.02, road.position.z);
    scene.add(line);
  }
}

function createBuildings() {
  const colors = [0x8899aa, 0x99887766, 0xaa9988, 0x778899, 0x667788, 0x998877, 0xbbaa99, 0x6688aa, 0xcc9966, 0x889977];

  for (let i = 0; i < GRID_SIZE; i++) {
    for (let j = 0; j < GRID_SIZE; j++) {
      const bx = CITY_OFFSET_X + j * CELL_SIZE + ROAD_WIDTH + BLOCK_SIZE / 2;
      const bz = CITY_OFFSET_Z + i * CELL_SIZE + ROAD_WIDTH + BLOCK_SIZE / 2;

      // 1-3 buildings per block
      const numBuildings = 1 + Math.floor(Math.random() * 2);
      for (let b = 0; b < numBuildings; b++) {
        const height = 2 + Math.random() * 6;
        const w = 2 + Math.random() * 3;
        const d = 2 + Math.random() * 3;
        const ox = (Math.random() - 0.5) * (BLOCK_SIZE - w - 1);
        const oz = (Math.random() - 0.5) * (BLOCK_SIZE - d - 1);

        const color = colors[Math.floor(Math.random() * colors.length)];
        const geo = new THREE.BoxGeometry(w, height, d);
        const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.7 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(bx + ox, height / 2, bz + oz);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.userData.originalColor = color;
        mesh.userData.flashTimer = 0;
        scene.add(mesh);
        buildings.push(mesh);

        // AABB
        const box = new THREE.Box3().setFromObject(mesh);
        // Expand slightly for collision margin
        box.expandByScalar(0.2);
        buildingBoxes.push({ box, mesh });
      }
    }
  }
}

createRoads();
createBuildings();

// ============ DELIVERY POINTS ============
const deliveryPointsData = [];
const deliveryMeshes = [];
const deliveryRings = [];
const deliveryParticles = [];

function getRoadPosition(gridI, gridJ) {
  // Position on road intersection or road segment
  const x = CITY_OFFSET_X + gridJ * CELL_SIZE + ROAD_WIDTH / 2;
  const z = CITY_OFFSET_Z + gridI * CELL_SIZE + ROAD_WIDTH / 2;
  return { x, z };
}

// Place delivery points at various road positions
const dpPositions = [
  getRoadPosition(1, 3),
  getRoadPosition(3, 1),
  getRoadPosition(5, 4),
  getRoadPosition(2, 5),
  getRoadPosition(4, 2),
];

// Offset some to be on road segments rather than intersections
dpPositions[0].z += CELL_SIZE / 2;
dpPositions[1].x += CELL_SIZE / 2;
dpPositions[2].x += CELL_SIZE / 3;
dpPositions[3].z += CELL_SIZE / 2;
dpPositions[4].z += CELL_SIZE / 3;

dpPositions.forEach((pos, idx) => {
  const dpData = { x: pos.x, z: pos.z, completed: false };
  deliveryPointsData.push(dpData);

  // Cylinder marker
  const cylGeo = new THREE.CylinderGeometry(1, 1, 2, 16);
  const cylMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.6 });
  const cyl = new THREE.Mesh(cylGeo, cylMat);
  cyl.position.set(pos.x, 1, pos.z);
  scene.add(cyl);
  deliveryMeshes.push(cyl);

  // Ring at bottom
  const ringGeo = new THREE.TorusGeometry(1.5, 0.1, 8, 32);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.8 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.set(pos.x, 0.1, pos.z);
  scene.add(ring);
  deliveryRings.push(ring);

  // Number label - using a small sprite
  const spriteMat = new THREE.SpriteMaterial({
    map: createTextTexture((idx + 1).toString()),
    transparent: true
  });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.set(pos.x, 3.5, pos.z);
  sprite.scale.set(1.5, 1.5, 1);
  scene.add(sprite);
});

window.__3D_STATE__.deliveryPoints = deliveryPointsData;

function createTextTexture(text) {
  const canvas = document.createElement('canvas');
  canvas.width = 64;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#00ff00';
  ctx.beginPath();
  ctx.arc(32, 32, 28, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 36px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 32, 32);
  const tex = new THREE.CanvasTexture(canvas);
  return tex;
}

// ============ TRUCK ============
let truck = null;
let truckMixer = null;
let truckBBox = new THREE.Box3();
const truckSize = new THREE.Vector3();

// Truck physics
let truckSpeed = 0;
let truckRotation = 0; // Y rotation
const MAX_SPEED = 5;
const ACCELERATION = 6;
const BRAKE_FORCE = 8;
const FRICTION = 2.5;
const TURN_SPEED = 2.0;

// Starting position - bottom-left of city, on a road
const startPos = getRoadPosition(0, 0);

const loader = new GLTFLoader();
document.getElementById('loadStatus').textContent = 'Loading...';

loader.load('assets/CesiumMilkTruck.glb', (gltf) => {
  truck = gltf.scene;
  truck.scale.set(0.7, 0.7, 0.7);
  truck.position.set(startPos.x, 0, startPos.z);
  truckRotation = 0;
  truck.rotation.y = truckRotation;

  truck.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  scene.add(truck);

  // Animation
  if (gltf.animations && gltf.animations.length > 0) {
    truckMixer = new THREE.AnimationMixer(truck);
    gltf.animations.forEach((clip) => {
      truckMixer.clipAction(clip).play();
    });
  }

  // Compute bounding box
  truckBBox.setFromObject(truck);
  truckBBox.getSize(truckSize);

  window.__3D_STATE__.modelLoaded = true;
  document.getElementById('loadStatus').textContent = 'Loaded ✓';

}, (progress) => {
  const pct = progress.total ? Math.round(progress.loaded / progress.total * 100) : '...';
  document.getElementById('loadStatus').textContent = `Loading ${pct}%`;
}, (error) => {
  console.error('Error loading truck model:', error);
  document.getElementById('loadStatus').textContent = 'Error!';
});

// ============ INPUT ============
const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;
});
window.addEventListener('keyup', (e) => {
  keys[e.key.toLowerCase()] = false;
});

// ============ COLLISION DETECTION ============
function getTruckAABB() {
  // Create AABB based on truck position and approximate size
  const halfW = 0.8;
  const halfD = 1.5;
  const pos = truck.position;

  // Rotate the corners
  const cos = Math.cos(truckRotation);
  const sin = Math.sin(truckRotation);

  const corners = [
    { x: -halfW, z: -halfD },
    { x: halfW, z: -halfD },
    { x: -halfW, z: halfD },
    { x: halfW, z: halfD },
  ];

  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  corners.forEach(c => {
    const rx = c.x * cos - c.z * sin + pos.x;
    const rz = c.x * sin + c.z * cos + pos.z;
    minX = Math.min(minX, rx);
    maxX = Math.max(maxX, rx);
    minZ = Math.min(minZ, rz);
    maxZ = Math.max(maxZ, rz);
  });

  return new THREE.Box3(
    new THREE.Vector3(minX, 0, minZ),
    new THREE.Vector3(maxX, 3, maxZ)
  );
}

function checkCollisions(newPos) {
  const halfW = 0.8;
  const halfD = 1.5;
  const cos = Math.cos(truckRotation);
  const sin = Math.sin(truckRotation);

  const corners = [
    { x: -halfW, z: -halfD },
    { x: halfW, z: -halfD },
    { x: -halfW, z: halfD },
    { x: halfW, z: halfD },
  ];

  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  corners.forEach(c => {
    const rx = c.x * cos - c.z * sin + newPos.x;
    const rz = c.x * sin + c.z * cos + newPos.z;
    minX = Math.min(minX, rx);
    maxX = Math.max(maxX, rx);
    minZ = Math.min(minZ, rz);
    maxZ = Math.max(maxZ, rz);
  });

  const truckBox = new THREE.Box3(
    new THREE.Vector3(minX, 0, minZ),
    new THREE.Vector3(maxX, 3, maxZ)
  );

  for (const { box, mesh } of buildingBoxes) {
    if (truckBox.intersectsBox(box)) {
      return { collided: true, building: mesh };
    }
  }
  return { collided: false, building: null };
}

// ============ PARTICLES ============
const particleSystems = [];

function createDeliveryParticles(position) {
  const count = 30;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const velocities = [];

  for (let i = 0; i < count; i++) {
    positions[i * 3] = position.x;
    positions[i * 3 + 1] = 1;
    positions[i * 3 + 2] = position.z;
    velocities.push({
      x: (Math.random() - 0.5) * 6,
      y: 2 + Math.random() * 4,
      z: (Math.random() - 0.5) * 6
    });
  }

  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({ color: 0x00ff88, size: 0.3, transparent: true, opacity: 1 });
  const points = new THREE.Points(geo, mat);
  scene.add(points);

  particleSystems.push({ points, velocities, life: 1.5, age: 0 });
}

function updateParticles(dt) {
  for (let i = particleSystems.length - 1; i >= 0; i--) {
    const ps = particleSystems[i];
    ps.age += dt;
    if (ps.age >= ps.life) {
      scene.remove(ps.points);
      ps.points.geometry.dispose();
      ps.points.material.dispose();
      particleSystems.splice(i, 1);
      continue;
    }

    const positions = ps.points.geometry.attributes.position.array;
    for (let j = 0; j < ps.velocities.length; j++) {
      positions[j * 3] += ps.velocities[j].x * dt;
      positions[j * 3 + 1] += ps.velocities[j].y * dt;
      positions[j * 3 + 2] += ps.velocities[j].z * dt;
      ps.velocities[j].y -= 5 * dt; // gravity
    }
    ps.points.geometry.attributes.position.needsUpdate = true;
    ps.points.material.opacity = 1 - ps.age / ps.life;
  }
}

// ============ GAME TIMER ============
let gameTimer = 0;
let timerRunning = false;

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  // Update truck mixer
  if (truckMixer) truckMixer.update(dt);

  // Truck controls
  if (truck && !window.__3D_STATE__.gameFinished) {
    let accelerating = false;

    if (keys['w']) {
      truckSpeed += ACCELERATION * dt;
      accelerating = true;
      if (!window.__3D_STATE__.gameStarted) {
        window.__3D_STATE__.gameStarted = true;
        timerRunning = true;
      }
    }
    if (keys['s']) {
      truckSpeed -= BRAKE_FORCE * dt;
      accelerating = true;
      if (!window.__3D_STATE__.gameStarted) {
        window.__3D_STATE__.gameStarted = true;
        timerRunning = true;
      }
    }

    // Clamp speed
    truckSpeed = Math.max(-MAX_SPEED * 0.4, Math.min(MAX_SPEED, truckSpeed));

    // Friction
    if (!accelerating) {
      if (truckSpeed > 0) {
        truckSpeed = Math.max(0, truckSpeed - FRICTION * dt);
      } else if (truckSpeed < 0) {
        truckSpeed = Math.min(0, truckSpeed + FRICTION * dt);
      }
    }

    // Turning
    if (Math.abs(truckSpeed) > 0.1) {
      const turnFactor = Math.min(1, Math.abs(truckSpeed) / 2);
      if (keys['a']) {
        truckRotation += TURN_SPEED * turnFactor * dt * Math.sign(truckSpeed);
      }
      if (keys['d']) {
        truckRotation -= TURN_SPEED * turnFactor * dt * Math.sign(truckSpeed);
      }
    }

    // Calculate new position
    const dx = -Math.sin(truckRotation) * truckSpeed * dt;
    const dz = -Math.cos(truckRotation) * truckSpeed * dt;
    const newPos = {
      x: truck.position.x + dx,
      z: truck.position.z + dz
    };

    // Collision check
    const collision = checkCollisions(newPos);
    if (collision.collided) {
      // Bounce back
      truckSpeed *= -0.3;
      window.__3D_STATE__.collisionCount++;

      // Flash building red
      if (collision.building) {
        collision.building.material.color.set(0xff0000);
        collision.building.userData.flashTimer = 0.3;
      }
    } else {
      truck.position.x = newPos.x;
      truck.position.z = newPos.z;
    }

    truck.rotation.y = truckRotation;

    // Update state
    window.__3D_STATE__.truckPosition = {
      x: Math.round(truck.position.x * 10) / 10,
      y: 0,
      z: Math.round(truck.position.z * 10) / 10
    };
    window.__3D_STATE__.speed = Math.round(Math.abs(truckSpeed) * 10) / 10;
  }

  // Timer
  if (timerRunning && !window.__3D_STATE__.gameFinished) {
    gameTimer += dt;
    window.__3D_STATE__.timer = Math.round(gameTimer * 10) / 10;
  }

  // Building flash timers
  buildings.forEach(b => {
    if (b.userData.flashTimer > 0) {
      b.userData.flashTimer -= dt;
      if (b.userData.flashTimer <= 0) {
        b.material.color.set(b.userData.originalColor);
      }
    }
  });

  // Delivery point animations & checks
  const time = clock.elapsedTime;
  deliveryRings.forEach((ring, idx) => {
    ring.rotation.z = time * 2;
    if (!deliveryPointsData[idx].completed) {
      deliveryMeshes[idx].position.y = 1 + Math.sin(time * 3 + idx) * 0.3;
    }
  });

  // Check delivery proximity
  if (truck && !window.__3D_STATE__.gameFinished) {
    deliveryPointsData.forEach((dp, idx) => {
      if (dp.completed) return;
      const dist = Math.sqrt(
        (truck.position.x - dp.x) ** 2 +
        (truck.position.z - dp.z) ** 2
      );
      if (dist < 2) {
        dp.completed = true;
        window.__3D_STATE__.deliveries++;

        // Change to blue
        deliveryMeshes[idx].material.color.set(0x0088ff);
        deliveryRings[idx].material.color.set(0x0088ff);

        // Scale animation
        const mesh = deliveryMeshes[idx];
        const origScale = { x: 1, y: 1, z: 1 };
        let animTime = 0;
        const scaleAnim = () => {
          animTime += 0.016;
          const s = 1 + Math.sin(animTime * 10) * 0.3 * Math.max(0, 1 - animTime);
          mesh.scale.set(s, s, s);
          if (animTime < 1) requestAnimationFrame(scaleAnim);
          else mesh.scale.set(1, 1, 1);
        };
        scaleAnim();

        // Particles
        createDeliveryParticles({ x: dp.x, z: dp.z });

        // Check completion
        if (window.__3D_STATE__.deliveries >= 5) {
          window.__3D_STATE__.gameFinished = true;
          timerRunning = false;
          showCompletion();
        }
      }
    });
  }

  // Update particles
  updateParticles(dt);

  // Camera follow
  if (truck) {
    const camOffset = new THREE.Vector3(
      Math.sin(truckRotation) * 15,
      20,
      Math.cos(truckRotation) * 15
    );
    const targetCamPos = truck.position.clone().add(camOffset);
    camera.position.lerp(targetCamPos, 3 * dt);
    const lookTarget = truck.position.clone();
    lookTarget.y = 0;
    camera.lookAt(lookTarget);
  }

  // HUD updates
  document.getElementById('deliveries').textContent = `${window.__3D_STATE__.deliveries}/5`;
  document.getElementById('truckPos').textContent = truck ?
    `${window.__3D_STATE__.truckPosition.x}, ${window.__3D_STATE__.truckPosition.z}` : '—';
  document.getElementById('speed').textContent = window.__3D_STATE__.speed.toFixed(1);
  document.getElementById('timer').textContent = window.__3D_STATE__.timer.toFixed(1) + 's';
  document.getElementById('collisionCount').textContent = window.__3D_STATE__.collisionCount;

  // Render main view
  renderer.clear();
  renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
  renderer.render(scene, camera);

  // Render minimap
  if (truck) {
    minimapCamera.position.set(truck.position.x, 100, truck.position.z);
    minimapCamera.lookAt(truck.position.x, 0, truck.position.z);
  }
  minimapRenderer.render(scene, minimapCamera);
}

function showCompletion() {
  const totalTime = window.__3D_STATE__.timer;
  const collisions = window.__3D_STATE__.collisionCount;

  document.getElementById('final-time').textContent = `Time: ${totalTime.toFixed(1)}s`;
  document.getElementById('final-collisions').textContent = `Collisions: ${collisions}`;

  let rating = '⭐⭐⭐⭐⭐';
  if (totalTime > 120 || collisions > 10) rating = '⭐⭐';
  else if (totalTime > 90 || collisions > 5) rating = '⭐⭐⭐';
  else if (totalTime > 60 || collisions > 2) rating = '⭐⭐⭐⭐';

  document.getElementById('final-rating').textContent = rating;
  document.getElementById('completion-screen').classList.add('show');
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
