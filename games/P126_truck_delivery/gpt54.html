<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 城市配送卡车游戏</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #b0c4de;
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }
    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
    }
    #hud {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 10;
      padding: 12px 14px;
      min-width: 240px;
      color: #fff;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      backdrop-filter: blur(6px);
      font-size: 14px;
      line-height: 1.7;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }
    #hud b {
      color: #9fe7ff;
    }
    #message {
      position: absolute;
      left: 50%;
      top: 18px;
      transform: translateX(-50%);
      z-index: 11;
      color: #fff;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 15px;
      pointer-events: none;
      text-align: center;
      white-space: pre-line;
    }
    #result {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      color: #fff;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 24px 28px;
      border-radius: 14px;
      min-width: 280px;
      text-align: center;
      display: none;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }
    #result h2 {
      margin: 0 0 12px;
      color: #8af7a1;
    }
    #result p {
      margin: 8px 0;
      font-size: 16px;
    }
    #minimap {
      position: absolute;
      right: 12px;
      bottom: 12px;
      width: 220px;
      height: 220px;
      z-index: 12;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 10px;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }
    #minimapLabel {
      position: absolute;
      right: 18px;
      bottom: 238px;
      z-index: 13;
      color: #fff;
      background: rgba(0,0,0,0.4);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 12px;
    }
    #hint {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      z-index: 11;
      color: #fff;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.18);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      pointer-events: none;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div>配送进度: <b id="deliveries">0/5</b></div>
      <div>卡车位置: <b id="truckPos">(0.0, 0.0)</b></div>
      <div>当前速度: <b id="speed">0.00</b></div>
      <div>用时: <b id="timer">0.0s</b></div>
      <div>碰撞次数: <b id="collisionCount">0</b></div>
      <div>模型加载状态: <b id="loadStatus">加载中...</b></div>
    </div>
    <div id="message">WASD 驾驶牛奶卡车前往绿色配送点完成 5 次配送</div>
    <div id="result"></div>
    <div id="minimapLabel">小地图</div>
    <canvas id="minimap"></canvas>
    <div id="hint">W 加速　S 倒车/刹车　A/D 转向</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const hudDeliveries = document.getElementById('deliveries');
    const hudTruckPos = document.getElementById('truckPos');
    const hudSpeed = document.getElementById('speed');
    const hudTimer = document.getElementById('timer');
    const hudCollisionCount = document.getElementById('collisionCount');
    const hudLoadStatus = document.getElementById('loadStatus');
    const resultPanel = document.getElementById('result');
    const messageEl = document.getElementById('message');
    const minimapCanvas = document.getElementById('minimap');

    window.__3D_STATE__ = {
      modelLoaded: false,
      deliveries: 0,
      truckPosition: { x: 0, y: 0, z: 0 },
      speed: 0,
      timer: 0,
      collisionCount: 0,
      gameStarted: false,
      gameFinished: false,
      deliveryPoints: []
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xb0c4de);
    scene.fog = new THREE.Fog(0xb0c4de, 60, 180);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(-15, 18, 15);

    const minimapRenderer = new THREE.WebGLRenderer({ canvas: minimapCanvas, antialias: true, alpha: true });
    minimapRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    minimapRenderer.setSize(220, 220, false);
    minimapRenderer.autoClear = true;

    const citySize = 5;
    const blockSize = 12;
    const roadWidth = 3;
    const cityWorldSize = citySize * blockSize;
    const halfCity = cityWorldSize / 2;

    const minimapCamera = new THREE.OrthographicCamera(
      -halfCity - 6, halfCity + 6,
      halfCity + 6, -halfCity - 6,
      1, 200
    );
    minimapCamera.position.set(0, 100, 0);
    minimapCamera.lookAt(0, 0, 0);
    minimapCamera.up.set(0, 0, -1);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enabled = false;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
    dirLight.position.set(30, 50, 20);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -80;
    dirLight.shadow.camera.right = 80;
    dirLight.shadow.camera.top = 80;
    dirLight.shadow.camera.bottom = -80;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 150;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(cityWorldSize + 40, cityWorldSize + 40),
      new THREE.MeshStandardMaterial({ color: 0x95b39c })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const roadMaterial = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.95, metalness: 0.02 });
    const roadGroup = new THREE.Group();
    scene.add(roadGroup);

    const roadCenters = [];
    for (let i = 0; i <= citySize; i++) {
      roadCenters.push(-halfCity + i * blockSize);
    }

    for (const x of roadCenters) {
      const road = new THREE.Mesh(
        new THREE.PlaneGeometry(roadWidth, cityWorldSize),
        roadMaterial
      );
      road.rotation.x = -Math.PI / 2;
      road.position.set(x, 0.01, 0);
      road.receiveShadow = true;
      roadGroup.add(road);
    }

    for (const z of roadCenters) {
      const road = new THREE.Mesh(
        new THREE.PlaneGeometry(cityWorldSize, roadWidth),
        roadMaterial
      );
      road.rotation.x = -Math.PI / 2;
      road.position.set(0, 0.011, z);
      road.receiveShadow = true;
      roadGroup.add(road);
    }

    const laneMarkGroup = new THREE.Group();
    scene.add(laneMarkGroup);
    const markMaterial = new THREE.MeshBasicMaterial({ color: 0xf7f1a4 });
    for (const x of roadCenters) {
      for (let z = -halfCity + 1.5; z < halfCity - 1; z += 4) {
        const dash = new THREE.Mesh(new THREE.PlaneGeometry(0.15, 2), markMaterial);
        dash.rotation.x = -Math.PI / 2;
        dash.position.set(x, 0.02, z);
        laneMarkGroup.add(dash);
      }
    }
    for (const z of roadCenters) {
      for (let x = -halfCity + 1.5; x < halfCity - 1; x += 4) {
        const dash = new THREE.Mesh(new THREE.PlaneGeometry(2, 0.15), markMaterial);
        dash.rotation.x = -Math.PI / 2;
        dash.position.set(x, 0.02, z);
        laneMarkGroup.add(dash);
      }
    }

    const buildings = [];
    const buildingGroup = new THREE.Group();
    scene.add(buildingGroup);

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createBuildings() {
      for (let i = 0; i < citySize; i++) {
        for (let j = 0; j < citySize; j++) {
          const centerX = -halfCity + blockSize * (i + 0.5);
          const centerZ = -halfCity + blockSize * (j + 0.5);

          const h = rand(2, 8);
          const w = rand(4.2, 6.5);
          const d = rand(4.2, 6.5);
          const color = new THREE.Color().setHSL(rand(0.0, 1.0), 0.35, rand(0.35, 0.65));

          const geom = new THREE.BoxGeometry(w, h, d);
          const mat = new THREE.MeshStandardMaterial({ color });
          const mesh = new THREE.Mesh(geom, mat);
          mesh.position.set(centerX, h / 2, centerZ);
          mesh.castShadow = true;
          mesh.receiveShadow = true;

          mesh.userData.baseColor = color.clone();
          mesh.userData.hitUntil = 0;

          buildingGroup.add(mesh);
          buildings.push({
            mesh,
            minX: centerX - w / 2,
            maxX: centerX + w / 2,
            minZ: centerZ - d / 2,
            maxZ: centerZ + d / 2
          });
        }
      }
    }
    createBuildings();

    const deliveryGroup = new THREE.Group();
    scene.add(deliveryGroup);
    const deliveryPoints = [];
    const deliveryLocations = [
      { x: roadCenters[1], z: roadCenters[4] - blockSize * 0.5 },
      { x: roadCenters[4] - blockSize * 0.5, z: roadCenters[1] },
      { x: roadCenters[2], z: roadCenters[3] },
      { x: roadCenters[5], z: roadCenters[2] - blockSize * 0.5 },
      { x: roadCenters[3] - blockSize * 0.5, z: roadCenters[5] }
    ];

    function createDeliveryPoint(pos, index) {
      const group = new THREE.Group();
      group.position.set(pos.x, 0, pos.z);

      const pillar = new THREE.Mesh(
        new THREE.CylinderGeometry(0.8, 0.8, 2.3, 24),
        new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.6 })
      );
      pillar.position.y = 1.15;
      group.add(pillar);

      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(1.5, 0.12, 12, 32),
        new THREE.MeshBasicMaterial({ color: 0x00ff66, transparent: true, opacity: 0.9 })
      );
      ring.rotation.x = Math.PI / 2;
      ring.position.y = 0.08;
      group.add(ring);

      const glow = new THREE.Mesh(
        new THREE.CircleGeometry(1.35, 32),
        new THREE.MeshBasicMaterial({ color: 0x66ff99, transparent: true, opacity: 0.28, side: THREE.DoubleSide })
      );
      glow.rotation.x = -Math.PI / 2;
      glow.position.y = 0.03;
      group.add(glow);

      const confirm = new THREE.Mesh(
        new THREE.SphereGeometry(0.25, 12, 12),
        new THREE.MeshBasicMaterial({ color: 0xaaffff, transparent: true, opacity: 0 })
      );
      confirm.visible = false;
      group.add(confirm);

      deliveryGroup.add(group);

      const data = {
        id: index,
        group,
        pillar,
        ring,
        glow,
        confirm,
        x: pos.x,
        z: pos.z,
        completed: false,
        animTime: 0
      };
      deliveryPoints.push(data);
      return data;
    }

    deliveryLocations.forEach((p, i) => createDeliveryPoint(p, i));
    window.__3D_STATE__.deliveryPoints = deliveryPoints.map(d => ({ x: d.x, z: d.z, completed: d.completed }));

    const startPos = new THREE.Vector3(roadCenters[0], 0, roadCenters[0]);

    let truck = null;
    let truckRoot = new THREE.Group();
    scene.add(truckRoot);

    let mixer = null;
    const clock = new THREE.Clock();

    const keys = { w: false, a: false, s: false, d: false };
    let speed = 0;
    const maxSpeed = 5;
    const accel = 5.2;
    const brakeAccel = 6.5;
    const friction = 2.5;
    const turnSpeed = 2.2;
    const reverseMax = -2.4;

    let gameStarted = false;
    let gameFinished = false;
    let startTime = 0;
    let finalTime = 0;
    let collisionCount = 0;

    const truckBoxHalf = { x: 1.0, z: 1.8 };
    const tmpVec = new THREE.Vector3();

    function createFallbackTruck() {
      const g = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(1.8, 1.2, 3.2),
        new THREE.MeshStandardMaterial({ color: 0xe8f3ff })
      );
      body.position.y = 1.0;
      body.castShadow = true;
      body.receiveShadow = true;
      g.add(body);

      const cabin = new THREE.Mesh(
        new THREE.BoxGeometry(1.6, 1.0, 1.2),
        new THREE.MeshStandardMaterial({ color: 0x87cefa })
      );
      cabin.position.set(0, 1.6, -0.6);
      cabin.castShadow = true;
      cabin.receiveShadow = true;
      g.add(cabin);

      const milk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.55, 0.55, 2.2, 20),
        new THREE.MeshStandardMaterial({ color: 0xffffff })
      );
      milk.rotation.z = Math.PI / 2;
      milk.position.set(0, 1.45, 0.4);
      milk.castShadow = true;
      milk.receiveShadow = true;
      g.add(milk);

      const wheelGeom = new THREE.CylinderGeometry(0.35, 0.35, 0.3, 18);
      const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
      const wheelPos = [
        [-0.95, 0.35, -1.05],
        [ 0.95, 0.35, -1.05],
        [-0.95, 0.35,  1.05],
        [ 0.95, 0.35,  1.05],
      ];
      const wheels = [];
      for (const [x, y, z] of wheelPos) {
        const w = new THREE.Mesh(wheelGeom, wheelMat);
        w.rotation.z = Math.PI / 2;
        w.position.set(x, y, z);
        w.castShadow = true;
        wheels.push(w);
        g.add(w);
      }
      g.userData.wheels = wheels;
      return g;
    }

    function setTruckObject(object, loaded = false) {
      if (truck) truckRoot.remove(truck);
      truck = object;
      truckRoot.add(truck);
      truckRoot.position.copy(startPos);
      truckRoot.position.y = 0;
      truckRoot.rotation.y = 0;
      truckRoot.scale.setScalar(loaded ? 1.2 : 1.0);

      truck.traverse?.((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
    }

    function loadTruckModel() {
      const loader = new GLTFLoader();
      loader.load(
        'assets/CesiumMilkTruck.glb',
        (gltf) => {
          const model = gltf.scene;
          const box = new THREE.Box3().setFromObject(model);
          const size = new THREE.Vector3();
          box.getSize(size);
          const maxDim = Math.max(size.x || 1, size.y || 1, size.z || 1);
          const target = 3.8;
          const scale = target / maxDim;
          model.scale.setScalar(scale);

          box.setFromObject(model);
          const center = new THREE.Vector3();
          box.getCenter(center);
          model.position.sub(center);
          model.position.y += (box.getSize(new THREE.Vector3()).y * scale * 0.5) + 0.05;

          setTruckObject(model, true);

          if (gltf.animations && gltf.animations.length > 0) {
            mixer = new THREE.AnimationMixer(model);
            gltf.animations.forEach((clip) => {
              const action = mixer.clipAction(clip);
              action.play();
            });
          }

          window.__3D_STATE__.modelLoaded = true;
          hudLoadStatus.textContent = '已加载';
        },
        undefined,
        () => {
          const fallback = createFallbackTruck();
          setTruckObject(fallback, false);
          window.__3D_STATE__.modelLoaded = true;
          hudLoadStatus.textContent = '已加载(备用)';
          messageEl.textContent = '模型加载失败，已使用备用卡车。WASD 驾驶前往绿色配送点完成任务';
        }
      );
    }
    loadTruckModel();

    function isMovingInput() {
      return keys.w || keys.s || keys.a || keys.d;
    }

    function formatTime(t) {
      return `${t.toFixed(1)}s`;
    }

    function getTruckAABBAt(position) {
      return {
        minX: position.x - truckBoxHalf.x,
        maxX: position.x + truckBoxHalf.x,
        minZ: position.z - truckBoxHalf.z,
        maxZ: position.z + truckBoxHalf.z
      };
    }

    function intersectsAABB(a, b) {
      return a.minX <= b.maxX && a.maxX >= b.minX && a.minZ <= b.maxZ && a.maxZ >= b.minZ;
    }

    function flashBuilding(building) {
      building.mesh.material.color.set(0xff3333);
      building.mesh.userData.hitUntil = performance.now() + 300;
    }

    function updateBuildingFlash(now) {
      for (const b of buildings) {
        if (b.mesh.userData.hitUntil && now > b.mesh.userData.hitUntil) {
          b.mesh.material.color.copy(b.mesh.userData.baseColor);
          b.mesh.userData.hitUntil = 0;
        }
      }
    }

    function handleCollision(nextPos) {
      const truckAABB = getTruckAABBAt(nextPos);
      for (const b of buildings) {
        if (intersectsAABB(truckAABB, b)) {
          collisionCount++;
          flashBuilding(b);
          speed *= -0.25;
          return true;
        }
      }
      return false;
    }

    function clampTruckToBounds() {
      const margin = 1.0;
      truckRoot.position.x = THREE.MathUtils.clamp(truckRoot.position.x, -halfCity - margin, halfCity + margin);
      truckRoot.position.z = THREE.MathUtils.clamp(truckRoot.position.z, -halfCity - margin, halfCity + margin);
    }

    function completeDelivery(point) {
      if (point.completed) return;
      point.completed = true;
      point.pillar.material.color.set(0x3399ff);
      point.ring.material.color.set(0x66ccff);
      point.glow.material.color.set(0x66aaff);
      point.confirm.visible = true;
      point.confirm.material.opacity = 0.95;
      point.confirm.position.set(0, 1.2, 0);
      point.confirm.scale.setScalar(0.2);
      point.animTime = 0.001;

      window.__3D_STATE__.deliveries++;
      hudDeliveries.textContent = `${window.__3D_STATE__.deliveries}/5`;

      if (window.__3D_STATE__.deliveries >= 5 && !gameFinished) {
        gameFinished = true;
        window.__3D_STATE__.gameFinished = true;
        finalTime = window.__3D_STATE__.timer;

        let rating = 'S';
        if (finalTime > 70 || collisionCount > 8) rating = 'C';
        else if (finalTime > 50 || collisionCount > 5) rating = 'B';
        else if (finalTime > 35 || collisionCount > 2) rating = 'A';

        resultPanel.style.display = 'block';
        resultPanel.innerHTML = `
          <h2>配送完成！</h2>
          <p>总时间：<b>${finalTime.toFixed(1)} 秒</b></p>
          <p>碰撞次数：<b>${collisionCount}</b></p>
          <p>评价：<b>${rating}</b></p>
        `;
        messageEl.textContent = '全部 5 个配送点已完成，任务成功！';
        speed = 0;
      }
    }

    function updateDeliveries(delta) {
      for (const p of deliveryPoints) {
        p.ring.rotation.z += delta * 2.5;
        p.glow.rotation.z -= delta * 0.8;
        p.pillar.position.y = 1.15 + Math.sin(performance.now() * 0.003 + p.id) * 0.08;

        if (!p.completed && truckRoot) {
          const dx = truckRoot.position.x - p.x;
          const dz = truckRoot.position.z - p.z;
          const dist = Math.sqrt(dx * dx + dz * dz);
          if (dist < 2) {
            completeDelivery(p);
          }
        }

        if (p.animTime > 0) {
          p.animTime += delta * 3.2;
          const t = p.animTime;
          p.confirm.visible = true;
          p.confirm.material.opacity = Math.max(0, 1 - t);
          p.confirm.scale.setScalar(0.2 + t * 1.6);
          p.confirm.position.y = 1.2 + t * 1.2;
          if (t >= 1) {
            p.animTime = 0;
            p.confirm.visible = false;
          }
        }
      }
    }

    function updateTruck(delta) {
      if (!truck) return;

      if (!gameFinished) {
        if (keys.w) speed += accel * delta;
        if (keys.s) speed -= brakeAccel * delta;

        if (!keys.w && !keys.s) {
          if (speed > 0) speed = Math.max(0, speed - friction * delta);
          else if (speed < 0) speed = Math.min(0, speed + friction * delta);
        }

        speed = THREE.MathUtils.clamp(speed, reverseMax, maxSpeed);

        const turnFactor = THREE.MathUtils.clamp(Math.abs(speed) / maxSpeed, 0.2, 1.0);
        if (keys.a) truckRoot.rotation.y += turnSpeed * turnFactor * delta;
        if (keys.d) truckRoot.rotation.y -= turnSpeed * turnFactor * delta;

        const forward = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), truckRoot.rotation.y);
        const nextPos = truckRoot.position.clone().add(forward.multiplyScalar(speed * delta));

        const collided = handleCollision(nextPos);
        if (!collided) {
          truckRoot.position.copy(nextPos);
          clampTruckToBounds();
        }

        if (!gameStarted && Math.abs(speed) > 0.05) {
          gameStarted = true;
          startTime = performance.now();
          window.__3D_STATE__.gameStarted = true;
          messageEl.textContent = '开始配送！前往所有绿色配送点';
        }
      }

      if (truck.userData && truck.userData.wheels) {
        for (const wheel of truck.userData.wheels) {
          wheel.rotation.x -= speed * delta * 3.5;
        }
      }

      if (mixer) {
        mixer.timeScale = Math.max(0.2, Math.abs(speed) * 1.3);
      }
    }

    function updateCamera(delta) {
      const targetPos = truckRoot.position.clone();
      const camOffset = new THREE.Vector3(-12, 16, 12);
      const desired = targetPos.clone().add(camOffset);
      camera.position.lerp(desired, 1 - Math.pow(0.001, delta));
      camera.lookAt(targetPos.x, 0, targetPos.z);
    }

    function updateHUD() {
      hudDeliveries.textContent = `${window.__3D_STATE__.deliveries}/5`;
      hudTruckPos.textContent = `(${truckRoot.position.x.toFixed(1)}, ${truckRoot.position.z.toFixed(1)})`;
      hudSpeed.textContent = `${Math.abs(speed).toFixed(2)} u/s`;
      hudTimer.textContent = formatTime(window.__3D_STATE__.timer);
      hudCollisionCount.textContent = `${collisionCount}`;
      hudLoadStatus.textContent = window.__3D_STATE__.modelLoaded ? hudLoadStatus.textContent.includes('备用') ? '已加载(备用)' : '已加载' : '加载中...';
    }

    function updateState() {
      window.__3D_STATE__.truckPosition = {
        x: truckRoot.position.x,
        y: truckRoot.position.y,
        z: truckRoot.position.z
      };
      window.__3D_STATE__.speed = speed;
      window.__3D_STATE__.collisionCount = collisionCount;
      window.__3D_STATE__.deliveryPoints = deliveryPoints.map(d => ({
        x: d.x,
        z: d.z,
        completed: d.completed
      }));
    }

    window.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (k === 'w') keys.w = true;
      if (k === 'a') keys.a = true;
      if (k === 's') keys.s = true;
      if (k === 'd') keys.d = true;
    });

    window.addEventListener('keyup', (e) => {
      const k = e.key.toLowerCase();
      if (k === 'w') keys.w = false;
      if (k === 'a') keys.a = false;
      if (k === 's') keys.s = false;
      if (k === 'd') keys.d = false;
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      minimapRenderer.setSize(220, 220, false);
    });

    renderer.domElement.addEventListener('click', () => {
      renderer.domElement.focus?.();
    });

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.05);
      const now = performance.now();

      if (mixer) mixer.update(delta);

      updateTruck(delta);
      updateDeliveries(delta);
      updateBuildingFlash(now);
      updateCamera(delta);

      if (gameStarted && !gameFinished) {
        window.__3D_STATE__.timer = (now - startTime) / 1000;
      } else if (gameFinished) {
        window.__3D_STATE__.timer = finalTime;
      }

      updateState();
      updateHUD();

      renderer.render(scene, camera);
      minimapRenderer.render(scene, minimapCamera);
    }

    animate();
  </script>
</body>
</html>
