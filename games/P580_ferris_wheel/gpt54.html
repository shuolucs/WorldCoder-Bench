<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Ferris Wheel</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: system-ui, sans-serif;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.45);
      color: white;
      padding: 12px;
      border-radius: 8px;
      min-width: 220px;
      backdrop-filter: blur(4px);
    }

    #ui label, #ui button {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    #ui input[type="range"] {
      width: 100%;
    }

    #ui button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #3949ab;
      color: white;
      cursor: pointer;
    }

    #ui button:hover {
      background: #5c6bc0;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      padding: 12px;
      font: 14px monospace;
      border-radius: 8px;
      line-height: 1.5;
      min-width: 220px;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="hud">
    <div id="hud-speed">Speed: 2.0 rpm</div>
    <div id="hud-angle">Angle: 0.0°</div>
    <div id="hud-passengers">Passengers: 4</div>
    <div id="hud-mode">Mode: NIGHT</div>
    <div id="hud-bottom">Bottom Cabin: 0</div>
  </div>

  <div id="ui">
    <label for="slider-speed">Speed (rpm)</label>
    <input id="slider-speed" type="range" min="0" max="10" step="0.1" value="2" />
    <button id="btn-night">Toggle Night Mode</button>
    <button id="btn-load">Load/Unload Passenger</button>
    <button id="btn-reset">Reset</button>
    <div style="margin-top:8px;font-size:12px;opacity:0.85;">Keyboard: press <b>p</b> to pause</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 8, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 8, 0);
    controls.enableDamping = true;

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 15, 10);
    scene.add(dirLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.1);
    scene.add(ambientLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(50, 50),
      new THREE.MeshStandardMaterial({ color: 0x2d5016 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const starGeom = new THREE.SphereGeometry(0.05, 6, 6);
    const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    for (let i = 0; i < 200; i++) {
      const star = new THREE.Mesh(starGeom, starMat);
      const r = 20 + Math.random() * 20;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      star.position.set(
        r * Math.sin(phi) * Math.cos(theta),
        8 + r * Math.cos(phi),
        r * Math.sin(phi) * Math.sin(theta)
      );
      scene.add(star);
    }

    const wheelRadius = 7;
    const wheelCenter = new THREE.Vector3(0, 8, 0);
    const cabinColors = [
      0xff0000, 0x0000ff, 0x00ff00, 0xffff00,
      0xffa500, 0x800080, 0x00ffff, 0xff00ff
    ];

    const metalMat = new THREE.MeshStandardMaterial({
      color: 0x8B0000,
      metalness: 0.7,
      roughness: 0.3
    });

    const wheelMat = new THREE.MeshStandardMaterial({
      color: 0xb22222,
      metalness: 0.7,
      roughness: 0.3
    });

    const ferrisGroup = new THREE.Group();
    scene.add(ferrisGroup);

    function createBeam(start, end, radius = 0.12, material = metalMat) {
      const dir = new THREE.Vector3().subVectors(end, start);
      const len = dir.length();
      const geom = new THREE.CylinderGeometry(radius, radius, len, 12);
      const mesh = new THREE.Mesh(geom, material);
      const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      mesh.position.copy(mid);
      mesh.quaternion.setFromUnitVectors(
        new THREE.Vector3(0, 1, 0),
        dir.clone().normalize()
      );
      return mesh;
    }

    const supportGroup = new THREE.Group();
    ferrisGroup.add(supportGroup);

    const zOffsets = [-1.5, 1.5];
    for (const z of zOffsets) {
      const top = new THREE.Vector3(0, wheelCenter.y, z);
      const leftBase = new THREE.Vector3(-3, 0, z);
      const rightBase = new THREE.Vector3(3, 0, z);

      supportGroup.add(createBeam(leftBase, top, 0.14));
      supportGroup.add(createBeam(rightBase, top, 0.14));
      supportGroup.add(createBeam(leftBase, rightBase, 0.12));
    }

    supportGroup.add(createBeam(
      new THREE.Vector3(0, wheelCenter.y, -1.5),
      new THREE.Vector3(0, wheelCenter.y, 1.5),
      0.16
    ));

    const wheelGroup = new THREE.Group();
    wheelGroup.position.copy(wheelCenter);
    ferrisGroup.add(wheelGroup);

    const rimGeom = new THREE.TorusGeometry(wheelRadius, 0.1, 16, 100);
    const rim = new THREE.Mesh(rimGeom, wheelMat);
    wheelGroup.add(rim);

    const hub = new THREE.Mesh(
      new THREE.CylinderGeometry(0.35, 0.35, 0.8, 20),
      wheelMat
    );
    hub.rotation.x = Math.PI / 2;
    wheelGroup.add(hub);

    const axle = new THREE.Mesh(
      new THREE.CylinderGeometry(0.2, 0.2, 3.8, 16),
      wheelMat
    );
    axle.rotation.x = Math.PI / 2;
    axle.position.set(0, 0, 0);
    ferrisGroup.add(axle);

    function createSpoke(angle) {
      const end = new THREE.Vector3(
        wheelRadius * Math.cos(angle),
        wheelRadius * Math.sin(angle),
        0
      );
      return createBeam(new THREE.Vector3(0, 0, 0), end, 0.06, wheelMat);
    }

    for (let i = 0; i < 8; i++) {
      wheelGroup.add(createSpoke(i * Math.PI / 4));
    }

    const cabins = [];
    const cabinGroup = new THREE.Group();
    scene.add(cabinGroup);

    function makeCabin(color) {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 1.0, 0.8),
        new THREE.MeshStandardMaterial({
          color,
          metalness: 0.2,
          roughness: 0.6
        })
      );
      body.position.y = -0.5;
      group.add(body);

      const topCut = new THREE.Mesh(
        new THREE.BoxGeometry(0.78, 0.25, 0.78),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 })
      );
      topCut.position.y = 0.0;
      group.add(topCut);

      return group;
    }

    const armMaterial = new THREE.MeshStandardMaterial({
      color: 0xcccccc,
      metalness: 0.7,
      roughness: 0.3
    });

    for (let i = 0; i < 8; i++) {
      const pivot = new THREE.Group();
      const arm = new THREE.Mesh(
        new THREE.CylinderGeometry(0.04, 0.04, 0.5, 8),
        armMaterial
      );
      arm.position.y = -0.25;
      pivot.add(arm);

      const cabin = makeCabin(cabinColors[i]);
      cabin.position.y = -0.75;
      pivot.add(cabin);

      cabinGroup.add(pivot);

      cabins.push({
        index: i,
        pivot,
        cabin,
        angleOffset: i * Math.PI / 4,
        hasPassenger: [0, 2, 4, 6].includes(i),
        passenger: null
      });
    }

    const spokeLights = [];
    const hubLight = new THREE.PointLight(0xffffff, 0.7, 12);
    hubLight.position.copy(wheelCenter);

    for (let i = 0; i < 8; i++) {
      const pl = new THREE.PointLight(cabinColors[i], 0.5, 8);
      scene.add(pl);
      spokeLights.push(pl);
    }

    let nightMode = true;
    function applyNightMode() {
      ambientLight.intensity = nightMode ? 0.1 : 0.3;

      if (nightMode) {
        if (!scene.children.includes(hubLight)) scene.add(hubLight);
      } else {
        if (scene.children.includes(hubLight)) scene.remove(hubLight);
      }

      spokeLights.forEach((light, i) => {
        if (nightMode) {
          if (!scene.children.includes(light)) scene.add(light);
        } else {
          if (scene.children.includes(light)) scene.remove(light);
        }
      });

      document.getElementById('hud-mode').textContent = `Mode: ${nightMode ? 'NIGHT' : 'DAY'}`;
    }
    applyNightMode();

    const loader = new GLTFLoader();
    let michelleTemplate = null;

    loader.load(
      './Michelle.glb',
      (gltf) => {
        michelleTemplate = gltf.scene;
        michelleTemplate.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        syncPassengers();
      },
      undefined,
      (err) => {
        console.warn('Failed to load Michelle.glb:', err);
      }
    );

    function createPassengerClone() {
      if (!michelleTemplate) return null;
      const clone = michelleTemplate.clone(true);
      clone.scale.setScalar(0.4);
      clone.position.set(0, -0.92, 0);
      clone.rotation.y = Math.PI;
      return clone;
    }

    function syncPassengers() {
      cabins.forEach((c) => {
        if (c.hasPassenger && !c.passenger && michelleTemplate) {
          c.passenger = createPassengerClone();
          c.cabin.add(c.passenger);
        } else if (!c.hasPassenger && c.passenger) {
          c.cabin.remove(c.passenger);
          c.passenger = null;
        }
      });
    }

    let wheelAngle = 0;
    let rotationSpeed = 2.0;
    let isPaused = false;
    let frameCount = 0;

    const sliderSpeed = document.getElementById('slider-speed');
    const btnNight = document.getElementById('btn-night');
    const btnLoad = document.getElementById('btn-load');
    const btnReset = document.getElementById('btn-reset');

    sliderSpeed.addEventListener('input', () => {
      rotationSpeed = parseFloat(sliderSpeed.value);
    });

    btnNight.addEventListener('click', () => {
      nightMode = !nightMode;
      applyNightMode();
    });

    function normalizeAngle(a) {
      let x = a % (Math.PI * 2);
      if (x < 0) x += Math.PI * 2;
      return x;
    }

    function getCabinAngle(index) {
      return normalizeAngle(wheelAngle + cabins[index].angleOffset);
    }

    function getBottomCabinIndex() {
      let bestIndex = 0;
      let bestDiff = Infinity;
      const bottomAngle = 1.5 * Math.PI;
      for (let i = 0; i < cabins.length; i++) {
        const a = getCabinAngle(i);
        let diff = Math.abs(a - bottomAngle);
        diff = Math.min(diff, Math.PI * 2 - diff);
        if (diff < bestDiff) {
          bestDiff = diff;
          bestIndex = i;
        }
      }
      return bestIndex;
    }

    btnLoad.addEventListener('click', () => {
      const idx = getBottomCabinIndex();
      cabins[idx].hasPassenger = !cabins[idx].hasPassenger;
      syncPassengers();
    });

    btnReset.addEventListener('click', () => {
      wheelAngle = 0;
      rotationSpeed = 2.0;
      sliderSpeed.value = '2';
    });

    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'p') {
        isPaused = !isPaused;
      }
    });

    const clock = new THREE.Clock();

    function updateCabins() {
      cabins.forEach((c, i) => {
        const angle = wheelAngle + c.angleOffset;
        const x = wheelCenter.x + wheelRadius * Math.cos(angle);
        const y = wheelCenter.y + wheelRadius * Math.sin(angle);
        const z = wheelCenter.z;

        c.pivot.position.set(x, y, z);

        c.pivot.rotation.set(0, 0, 0);

        if (nightMode) {
          spokeLights[i].position.set(x, y, z);
        }
      });
      hubLight.position.copy(wheelCenter);
    }

    function updateHUD() {
      const passengerCount = cabins.filter(c => c.hasPassenger).length;
      const bottomCabinIndex = getBottomCabinIndex();
      const angleDeg = THREE.MathUtils.radToDeg(normalizeAngle(wheelAngle));

      document.getElementById('hud-speed').textContent = `Speed: ${rotationSpeed.toFixed(1)} rpm`;
      document.getElementById('hud-angle').textContent = `Angle: ${angleDeg.toFixed(1)}°`;
      document.getElementById('hud-passengers').textContent = `Passengers: ${passengerCount}`;
      document.getElementById('hud-mode').textContent = `Mode: ${nightMode ? 'NIGHT' : 'DAY'}`;
      document.getElementById('hud-bottom').textContent = `Bottom Cabin: ${bottomCabinIndex}`;
    }

    function updateState() {
      const passengerCount = cabins.filter(c => c.hasPassenger).length;
      const bottomCabinIndex = getBottomCabinIndex();

      const cabinsState = cabins.map((c, i) => {
        const a = getCabinAngle(i);
        return {
          angle: a,
          hasPassenger: c.hasPassenger,
          worldY: c.pivot.position.y
        };
      });

      const wheelValid =
        cabinsState.every(c => Number.isFinite(c.angle) && Number.isFinite(c.worldY)) &&
        passengerCount >= 0 && passengerCount <= 8;

      window.__3D_STATE__ = {
        frameCount,
        wheelAngle,
        rotationSpeed,
        passengerCount,
        cabins: cabinsState,
        nightMode,
        bottomCabinIndex,
        wheelValid,
        isPaused
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const delta = clock.getDelta();

      if (!isPaused) {
        const radPerSec = rotationSpeed * Math.PI * 2 / 60;
        wheelAngle += radPerSec * delta;
      }

      wheelGroup.rotation.z = wheelAngle;
      updateCabins();
      updateHUD();
      updateState();

      controls.update();
      renderer.render(scene, camera);
    }

    syncPassengers();
    updateCabins();
    updateHUD();
    updateState();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
