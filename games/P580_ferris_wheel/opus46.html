<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Ferris Wheel</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
body { margin: 0; overflow: hidden; font-family: monospace; }
canvas { display: block; }
#hud {
    position: absolute; top: 10px; left: 10px;
    background: rgba(0,0,0,0.7); color: white;
    padding: 12px; font-size: 14px; font-family: monospace;
    border-radius: 8px; line-height: 1.6;
    pointer-events: none;
}
#controls {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); color: white;
    padding: 12px 20px; font-size: 14px; font-family: monospace;
    border-radius: 8px; display: flex; gap: 15px; align-items: center;
}
#controls button {
    padding: 6px 14px; font-size: 13px; cursor: pointer;
    border: 1px solid #555; border-radius: 4px;
    background: #333; color: white; font-family: monospace;
}
#controls button:hover { background: #555; }
#controls label { display: flex; align-items: center; gap: 6px; }
</style>
</head>
<body>

<div id="hud">
    <div>Speed: <span id="hud-speed">2.0</span> rpm</div>
    <div>Angle: <span id="hud-angle">0.0</span>°</div>
    <div>Passengers: <span id="hud-passengers">4</span></div>
    <div>Mode: <span id="hud-mode">NIGHT</span></div>
    <div>Bottom Cabin: <span id="hud-bottom">0</span></div>
</div>

<div id="controls">
    <label>Speed (rpm): <input type="range" id="slider-speed" min="0" max="10" step="0.1" value="2"></label>
    <button id="btn-night">Toggle Night</button>
    <button id="btn-load">Load/Unload</button>
    <button id="btn-reset">Reset</button>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 8, 20);
camera.lookAt(0, 8, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 8, 0);
controls.update();

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 15, 10);
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

// Stars
const starGeom = new THREE.SphereGeometry(0.05, 4, 4);
const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
for (let i = 0; i < 200; i++) {
    const star = new THREE.Mesh(starGeom, starMat);
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 40 + Math.random() * 30;
    star.position.set(
        r * Math.sin(phi) * Math.cos(theta),
        Math.abs(r * Math.cos(phi)) + 5,
        r * Math.sin(phi) * Math.sin(theta)
    );
    scene.add(star);
}

// Ground
const groundGeom = new THREE.PlaneGeometry(50, 50);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d5016 });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
scene.add(ground);

// Materials
const metalMat = new THREE.MeshStandardMaterial({ color: 0x8B0000, metalness: 0.7, roughness: 0.3 });

// Ferris wheel parameters
const wheelRadius = 7;
const wheelCenterY = 8;
const numCabins = 8;
const cabinColors = [0xff0000, 0x0000ff, 0x00ff00, 0xffff00, 0xff8800, 0x8800ff, 0x00ffff, 0xff00ff];
const cabinColorNames = ['red', 'blue', 'green', 'yellow', 'orange', 'purple', 'cyan', 'magenta'];

// Support A-frames (two sides, along z-axis)
function createAFrame(zOffset) {
    const group = new THREE.Group();
    const legLength = 10;
    const baseSpread = 4;
    const topY = wheelCenterY;

    // Left leg
    const leftLeg = new THREE.CylinderGeometry(0.1, 0.1, legLength, 8);
    const leftMesh = new THREE.Mesh(leftLeg, metalMat);
    const angle1 = Math.atan2(topY, baseSpread / 2);
    leftMesh.position.set(-baseSpread / 4, topY / 2, zOffset);
    leftMesh.rotation.z = Math.atan2(baseSpread / 2, topY);
    const actualLen1 = Math.sqrt((baseSpread / 2) ** 2 + topY ** 2);
    leftMesh.scale.y = actualLen1 / legLength;
    group.add(leftMesh);

    // Right leg
    const rightMesh = new THREE.Mesh(leftLeg, metalMat);
    rightMesh.position.set(baseSpread / 4, topY / 2, zOffset);
    rightMesh.rotation.z = -Math.atan2(baseSpread / 2, topY);
    rightMesh.scale.y = actualLen1 / legLength;
    group.add(rightMesh);

    // Cross beam
    const crossGeom = new THREE.CylinderGeometry(0.08, 0.08, baseSpread * 0.6, 8);
    const crossMesh = new THREE.Mesh(crossGeom, metalMat);
    crossMesh.rotation.z = Math.PI / 2;
    crossMesh.position.set(0, topY * 0.4, zOffset);
    group.add(crossMesh);

    return group;
}

scene.add(createAFrame(1.2));
scene.add(createAFrame(-1.2));

// Axle connecting the two supports
const axleGeom = new THREE.CylinderGeometry(0.2, 0.2, 3, 16);
const axleMesh = new THREE.Mesh(axleGeom, metalMat);
axleMesh.rotation.x = Math.PI / 2;
axleMesh.position.set(0, wheelCenterY, 0);
scene.add(axleMesh);

// Wheel group - rotates around z-axis
const wheelGroup = new THREE.Group();
wheelGroup.position.set(0, wheelCenterY, 0);
scene.add(wheelGroup);

// Outer rim (torus)
const rimGeom = new THREE.TorusGeometry(wheelRadius, 0.1, 16, 64);
const rimMesh = new THREE.Mesh(rimGeom, metalMat);
wheelGroup.add(rimMesh);

// Inner rim for aesthetics
const innerRimGeom = new THREE.TorusGeometry(wheelRadius * 0.5, 0.06, 12, 48);
const innerRimMesh = new THREE.Mesh(innerRimGeom, metalMat);
wheelGroup.add(innerRimMesh);

// Hub
const hubGeom = new THREE.CylinderGeometry(0.4, 0.4, 0.5, 16);
const hubMesh = new THREE.Mesh(hubGeom, metalMat);
hubMesh.rotation.x = Math.PI / 2;
wheelGroup.add(hubMesh);

// Spokes
for (let i = 0; i < numCabins; i++) {
    const angle = (i / numCabins) * Math.PI * 2;
    const spokeLen = wheelRadius;
    const spokeGeom = new THREE.CylinderGeometry(0.04, 0.04, spokeLen, 8);
    const spoke = new THREE.Mesh(spokeGeom, metalMat);
    spoke.position.set(
        Math.cos(angle) * spokeLen / 2,
        Math.sin(angle) * spokeLen / 2,
        0
    );
    spoke.rotation.z = angle - Math.PI / 2;
    wheelGroup.add(spoke);
}

// Additional cross spokes for visual richness
for (let i = 0; i < numCabins; i++) {
    const angle = (i / numCabins) * Math.PI * 2 + Math.PI / numCabins;
    const spokeLen = wheelRadius;
    const spokeGeom = new THREE.CylinderGeometry(0.03, 0.03, spokeLen, 6);
    const spoke = new THREE.Mesh(spokeGeom, metalMat.clone());
    spoke.material.color.setHex(0x660000);
    spoke.position.set(
        Math.cos(angle) * spokeLen / 2,
        Math.sin(angle) * spokeLen / 2,
        0
    );
    spoke.rotation.z = angle - Math.PI / 2;
    wheelGroup.add(spoke);
}

// Cabin data
const cabinData = [];
const cabinMeshes = [];
const cabinArms = [];
const passengerSlots = [true, false, true, false, true, false, true, false]; // cabins 0,2,4,6 have passengers
const passengerMeshes = new Array(numCabins).fill(null);

// Create cabins
for (let i = 0; i < numCabins; i++) {
    const cabinGroup = new THREE.Group();
    scene.add(cabinGroup);

    // Cabin body - box with open top effect
    const cabinMat = new THREE.MeshStandardMaterial({
        color: cabinColors[i],
        metalness: 0.3,
        roughness: 0.5
    });

    // Main body
    const bodyGeom = new THREE.BoxGeometry(0.8, 1.0, 0.8);
    const body = new THREE.Mesh(bodyGeom, cabinMat);
    body.position.y = -0.5;
    cabinGroup.add(body);

    // Roof
    const roofGeom = new THREE.BoxGeometry(0.9, 0.08, 0.9);
    const roofMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.5, roughness: 0.4 });
    const roof = new THREE.Mesh(roofGeom, roofMat);
    roof.position.y = 0.04;
    cabinGroup.add(roof);

    // Arm (connecting to rim)
    const armGeom = new THREE.CylinderGeometry(0.03, 0.03, 0.5, 8);
    const arm = new THREE.Mesh(armGeom, metalMat);
    arm.position.y = 0.29;
    cabinGroup.add(arm);

    cabinMeshes.push(cabinGroup);
    cabinData.push({
        angle: (i / numCabins) * Math.PI * 2,
        hasPassenger: passengerSlots[i],
        worldY: 0
    });
}

// Try to load Michelle.glb for passengers
let passengerTemplate = null;
const loader = new GLTFLoader();

function createFallbackPassenger() {
    const group = new THREE.Group();
    // Simple stick figure
    const headGeom = new THREE.SphereGeometry(0.08, 8, 8);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xffcc99 });
    const head = new THREE.Mesh(headGeom, headMat);
    head.position.y = 0.35;
    group.add(head);

    const bodyGeom = new THREE.CylinderGeometry(0.06, 0.08, 0.3, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4444ff });
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    body.position.y = 0.15;
    group.add(body);

    // Legs
    const legGeom = new THREE.CylinderGeometry(0.03, 0.03, 0.2, 6);
    const legMat = new THREE.MeshStandardMaterial({ color: 0x333366 });
    const legL = new THREE.Mesh(legGeom, legMat);
    legL.position.set(-0.04, -0.05, 0);
    group.add(legL);
    const legR = new THREE.Mesh(legGeom, legMat);
    legR.position.set(0.04, -0.05, 0);
    group.add(legR);

    return group;
}

function addPassengerToCabin(cabinIndex) {
    if (passengerMeshes[cabinIndex]) return;
    let passenger;
    if (passengerTemplate) {
        passenger = passengerTemplate.clone();
        passenger.scale.set(0.4, 0.4, 0.4);
    } else {
        passenger = createFallbackPassenger();
    }
    passenger.position.y = -0.7;
    cabinMeshes[cabinIndex].add(passenger);
    passengerMeshes[cabinIndex] = passenger;
    cabinData[cabinIndex].hasPassenger = true;
}

function removePassengerFromCabin(cabinIndex) {
    if (!passengerMeshes[cabinIndex]) return;
    cabinMeshes[cabinIndex].remove(passengerMeshes[cabinIndex]);
    passengerMeshes[cabinIndex] = null;
    cabinData[cabinIndex].hasPassenger = false;
}

// Try loading Michelle.glb
loader.load('./Michelle.glb', (gltf) => {
    passengerTemplate = gltf.scene;
    passengerTemplate.scale.set(0.4, 0.4, 0.4);
    // Re-add passengers with loaded model
    for (let i = 0; i < numCabins; i++) {
        if (cabinData[i].hasPassenger) {
            removePassengerFromCabin(i);
            addPassengerToCabin(i);
        }
    }
}, undefined, () => {
    // Failed to load, use fallback
    passengerTemplate = null;
    // Add fallback passengers for initial cabins
    for (let i = 0; i < numCabins; i++) {
        if (cabinData[i].hasPassenger) {
            addPassengerToCabin(i);
        }
    }
});

// Initialize passengers with fallback immediately
for (let i = 0; i < numCabins; i++) {
    if (cabinData[i].hasPassenger) {
        addPassengerToCabin(i);
    }
}

// Night mode lights
let nightMode = true;
const rimLights = [];
let hubLight = null;

function createNightLights() {
    for (let i = 0; i < numCabins; i++) {
        const light = new THREE.PointLight(cabinColors[i], 0.5, 8);
        scene.add(light);
        rimLights.push(light);
    }
    hubLight = new THREE.PointLight(0xffffff, 0.8, 15);
    hubLight.position.set(0, wheelCenterY, 0);
    scene.add(hubLight);
}

function updateNightLights(visible) {
    rimLights.forEach(l => l.visible = visible);
    if (hubLight) hubLight.visible = visible;
    ambientLight.intensity = visible ? 0.1 : 0.3;
    dirLight.intensity = visible ? 0.4 : 0.8;
}

createNightLights();
updateNightLights(true);

// State
let wheelAngle = 0;
let rotationSpeed = 2; // rpm
let isPaused = false;
let frameCount = 0;

// State object
window.__3D_STATE__ = {
    frameCount: 0,
    wheelAngle: 0,
    rotationSpeed: 2,
    passengerCount: 4,
    cabins: [],
    nightMode: true,
    bottomCabinIndex: 0,
    wheelValid: true,
    isPaused: false
};

// Get bottom cabin index
function getBottomCabinIndex() {
    let minY = Infinity;
    let idx = 0;
    for (let i = 0; i < numCabins; i++) {
        const baseAngle = (i / numCabins) * Math.PI * 2;
        const currentAngle = baseAngle + wheelAngle;
        const y = wheelCenterY + Math.sin(currentAngle) * wheelRadius;
        if (y < minY) {
            minY = y;
            idx = i;
        }
    }
    return idx;
}

// Controls
const speedSlider = document.getElementById('slider-speed');
speedSlider.addEventListener('input', (e) => {
    rotationSpeed = parseFloat(e.target.value);
});

document.getElementById('btn-night').addEventListener('click', () => {
    nightMode = !nightMode;
    updateNightLights(nightMode);
});

document.getElementById('btn-load').addEventListener('click', () => {
    const idx = getBottomCabinIndex();
    if (cabinData[idx].hasPassenger) {
        removePassengerFromCabin(idx);
    } else {
        addPassengerToCabin(idx);
    }
});

document.getElementById('btn-reset').addEventListener('click', () => {
    wheelAngle = 0;
    rotationSpeed = 2;
    speedSlider.value = 2;
    isPaused = false;
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'p' || e.key === 'P') {
        isPaused = !isPaused;
    }
});

// HUD elements
const hudSpeed = document.getElementById('hud-speed');
const hudAngle = document.getElementById('hud-angle');
const hudPassengers = document.getElementById('hud-passengers');
const hudMode = document.getElementById('hud-mode');
const hudBottom = document.getElementById('hud-bottom');

// Animation
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    // Update rotation
    if (!isPaused) {
        const rps = rotationSpeed / 60; // revolutions per second
        wheelAngle += rps * Math.PI * 2 * delta;
    }

    // Keep angle in [0, 2PI)
    while (wheelAngle >= Math.PI * 2) wheelAngle -= Math.PI * 2;
    while (wheelAngle < 0) wheelAngle += Math.PI * 2;

    // Rotate wheel group
    wheelGroup.rotation.z = wheelAngle;

    // Update cabins - they stay upright
    for (let i = 0; i < numCabins; i++) {
        const baseAngle = (i / numCabins) * Math.PI * 2;
        const currentAngle = baseAngle + wheelAngle;

        const x = Math.cos(currentAngle) * wheelRadius;
        const y = wheelCenterY + Math.sin(currentAngle) * wheelRadius;

        cabinMeshes[i].position.set(x, y - 0.54, 0);
        // Keep cabin upright - identity rotation
        cabinMeshes[i].rotation.set(0, 0, 0);

        cabinData[i].angle = currentAngle % (Math.PI * 2);
        cabinData[i].worldY = y;

        // Update rim lights position
        if (rimLights[i]) {
            rimLights[i].position.set(x, y, 1);
        }
    }

    // Count passengers
    const passengerCount = cabinData.filter(c => c.hasPassenger).length;
    const bottomIdx = getBottomCabinIndex();

    // Update HUD
    hudSpeed.textContent = rotationSpeed.toFixed(1);
    hudAngle.textContent = ((wheelAngle * 180 / Math.PI) % 360).toFixed(1);
    hudPassengers.textContent = passengerCount;
    hudMode.textContent = nightMode ? 'NIGHT' : 'DAY';
    hudBottom.textContent = bottomIdx;

    // Update state
    frameCount++;
    const allFinite = cabinData.every(c => isFinite(c.angle));
    window.__3D_STATE__ = {
        frameCount,
        wheelAngle,
        rotationSpeed,
        passengerCount,
        cabins: cabinData.map(c => ({
            angle: c.angle,
            hasPassenger: c.hasPassenger,
            worldY: c.worldY
        })),
        nightMode,
        bottomCabinIndex: bottomIdx,
        wheelValid: allFinite && passengerCount >= 0 && passengerCount <= 8,
        isPaused
    };

    controls.update();
    renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
