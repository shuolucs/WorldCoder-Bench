<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ferris Wheel</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px;
            color: white;
            font-family: monospace;
            font-size: 14px;
            border-radius: 5px;
            pointer-events: none;
            line-height: 1.5;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: center;
            color: white;
        }
        button {
            background: #444;
            color: white;
            border: 1px solid #666;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }
        button:hover {
            background: #666;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div>Speed: <span id="hud-speed">2.0</span> rpm</div>
        <div>Angle: <span id="hud-angle">0</span>°</div>
        <div>Passengers: <span id="hud-passengers">4</span></div>
        <div>Mode: <span id="hud-mode">NIGHT</span></div>
        <div>Bottom Cabin: <span id="hud-bottom">0</span></div>
    </div>

    <div id="controls">
        <div class="slider-container">
            <label for="slider-speed">Speed (rpm)</label>
            <input type="range" id="slider-speed" min="0" max="10" step="0.1" value="2">
        </div>
        <button id="btn-night">Toggle Night Mode</button>
        <button id="btn-load">Load/Unload Bottom</button>
        <button id="btn-reset">Reset</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            frameCount: 0,
            wheelAngle: 0,
            rotationSpeed: 2,
            passengerCount: 4,
            cabins: [],
            nightMode: true,
            bottomCabinIndex: 0,
            wheelValid: true,
            isPaused: false
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);
        camera.lookAt(0, 8, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 8, 0);
        controls.update();

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.1); // Start in night mode
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 15, 10);
        scene.add(dirLight);

        // --- Environment ---
        // Stars
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = [];
        for (let i = 0; i < 200; i++) {
            const r = 50 + Math.random() * 50;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);
            if (y > 0) { // Mostly above ground
                starsPos.push(x, y, z);
            }
        }
        starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsPos, 3));
        const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.8 });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d5016, roughness: 0.8, metalness: 0.1 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- Ferris Wheel Construction ---
        const wheelCenterY = 8;
        const wheelRadius = 7;
        const structuralMat = new THREE.MeshStandardMaterial({ color: 0x8B0000, metalness: 0.7, roughness: 0.3 });

        // Supports (A-Frames)
        const supportGroup = new THREE.Group();
        const legHeight = 8;
        const legSpread = 4;
        const legLength = Math.sqrt(legHeight * legHeight + legSpread * legSpread);
        const legAngle = Math.atan2(legSpread, legHeight);
        const legGeo = new THREE.CylinderGeometry(0.15, 0.15, legLength, 16);

        const zOffsets = [2, -2];
        zOffsets.forEach(z => {
            const leg1 = new THREE.Mesh(legGeo, structuralMat);
            leg1.position.set(-legSpread / 2, legHeight / 2, z);
            leg1.rotation.z = -legAngle;
            supportGroup.add(leg1);

            const leg2 = new THREE.Mesh(legGeo, structuralMat);
            leg2.position.set(legSpread / 2, legHeight / 2, z);
            leg2.rotation.z = legAngle;
            supportGroup.add(leg2);
            
            // Horizontal brace
            const braceGeo = new THREE.CylinderGeometry(0.1, 0.1, legSpread, 8);
            const brace = new THREE.Mesh(braceGeo, structuralMat);
            brace.position.set(0, legHeight / 2, z);
            brace.rotation.z = Math.PI / 2;
            supportGroup.add(brace);
        });
        scene.add(supportGroup);

        // Rotating Wheel Group
        const wheelGroup = new THREE.Group();
        wheelGroup.position.set(0, wheelCenterY, 0);
        scene.add(wheelGroup);

        // Axle
        const axleGeo = new THREE.CylinderGeometry(0.2, 0.2, 5, 16);
        const axle = new THREE.Mesh(axleGeo, structuralMat);
        axle.rotation.x = Math.PI / 2;
        wheelGroup.add(axle);

        // Rim
        const rimGeo = new THREE.TorusGeometry(wheelRadius, 0.1, 16, 64);
        const rim = new THREE.Mesh(rimGeo, structuralMat);
        wheelGroup.add(rim);

        // Spokes
        const spokeGeo = new THREE.CylinderGeometry(0.05, 0.05, wheelRadius * 2, 8);
        for (let i = 0; i < 4; i++) {
            const spoke = new THREE.Mesh(spokeGeo, structuralMat);
            spoke.rotation.z = (i * Math.PI) / 4;
            wheelGroup.add(spoke);
        }

        // --- Cabins ---
        const cabinColors = [0xff0000, 0x0000ff, 0x00ff00, 0xffff00, 0xffa500, 0x800080, 0x00ffff, 0xff00ff];
        const cabins = [];
        const nightLights = [];

        // Hub light
        const hubLight = new THREE.PointLight(0xffffff, 1, 15);
        wheelGroup.add(hubLight);
        nightLights.push(hubLight);

        for (let i = 0; i < 8; i++) {
            const angle = (i * Math.PI) / 4;
            const cabinWrapper = new THREE.Group();
            
            // Position on the rim
            cabinWrapper.position.set(Math.cos(angle) * wheelRadius, Math.sin(angle) * wheelRadius, 0);
            
            // The actual cabin that stays upright
            const cabin = new THREE.Group();
            cabinWrapper.add(cabin);

            // Cabin Geometry (Basket shape)
            const cabinMat = new THREE.MeshStandardMaterial({ color: cabinColors[i], metalness: 0.3, roughness: 0.7 });
            
            // Bottom
            const bottom = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.05, 0.8), cabinMat);
            bottom.position.y = -0.475;
            cabin.add(bottom);
            // Sides
            const side1 = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 0.05), cabinMat);
            side1.position.set(0, -0.25, 0.375);
            cabin.add(side1);
            const side2 = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 0.05), cabinMat);
            side2.position.set(0, -0.25, -0.375);
            cabin.add(side2);
            const side3 = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.5, 0.8), cabinMat);
            side3.position.set(0.375, -0.25, 0);
            cabin.add(side3);
            const side4 = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.5, 0.8), cabinMat);
            side4.position.set(-0.375, -0.25, 0);
            cabin.add(side4);

            // Attachment arm
            const armGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.5, 8);
            const arm = new THREE.Mesh(armGeo, structuralMat);
            arm.position.y = 0.25;
            cabin.add(arm);

            // Night Light
            const pLight = new THREE.PointLight(cabinColors[i], 0.5, 10);
            pLight.position.set(0, 0.5, 0);
            cabin.add(pLight);
            nightLights.push(pLight);

            wheelGroup.add(cabinWrapper);

            cabins.push({
                wrapper: cabinWrapper,
                cabinGroup: cabin,
                baseAngle: angle,
                hasPassenger: i % 2 === 0, // 0, 2, 4, 6 initially
                passengerMesh: null
            });
        }

        // --- Passengers ---
        // Fallback dummy passenger
        let passengerBaseModel = new THREE.Group();
        const dummyBody = new THREE.Mesh(new THREE.CapsuleGeometry(0.15, 0.3, 4, 8), new THREE.MeshStandardMaterial({color: 0xffb6c1}));
        dummyBody.position.y = -0.15;
        passengerBaseModel.add(dummyBody);

        const loader = new GLTFLoader();
        loader.load('./Michelle.glb', (gltf) => {
            passengerBaseModel = gltf.scene;
            passengerBaseModel.scale.set(0.4, 0.4, 0.4);
            passengerBaseModel.position.set(0, -0.45, 0); // Sit on floor
            
            // Replace dummies
            cabins.forEach(c => {
                if (c.hasPassenger) {
                    if (c.passengerMesh) c.cabinGroup.remove(c.passengerMesh);
                    c.passengerMesh = passengerBaseModel.clone();
                    c.cabinGroup.add(c.passengerMesh);
                }
            });
        }, undefined, (error) => {
            console.warn("Could not load Michelle.glb, using fallback dummy.", error);
            // Initialize with dummies
            cabins.forEach(c => {
                if (c.hasPassenger) {
                    c.passengerMesh = passengerBaseModel.clone();
                    c.cabinGroup.add(c.passengerMesh);
                }
            });
        });

        // Initial setup for dummies (in case load takes time or fails)
        cabins.forEach(c => {
            if (c.hasPassenger && !c.passengerMesh) {
                c.passengerMesh = passengerBaseModel.clone();
                c.cabinGroup.add(c.passengerMesh);
            }
        });

        // --- Logic Functions ---
        function updateNightMode() {
            const isNight = window.__3D_STATE__.nightMode;
            ambientLight.intensity = isNight ? 0.1 : 0.3;
            nightLights.forEach(l => l.visible = isNight);
            document.getElementById('hud-mode').innerText = isNight ? 'NIGHT' : 'DAY';
        }
        updateNightMode(); // Apply initial state

        function togglePassenger() {
            const idx = window.__3D_STATE__.bottomCabinIndex;
            const cabin = cabins[idx];
            cabin.hasPassenger = !cabin.hasPassenger;
            
            if (cabin.hasPassenger) {
                cabin.passengerMesh = passengerBaseModel.clone();
                cabin.cabinGroup.add(cabin.passengerMesh);
            } else {
                if (cabin.passengerMesh) {
                    cabin.cabinGroup.remove(cabin.passengerMesh);
                    cabin.passengerMesh = null;
                }
            }
        }

        // --- Event Listeners ---
        document.getElementById('slider-speed').addEventListener('input', (e) => {
            window.__3D_STATE__.rotationSpeed = parseFloat(e.target.value);
        });

        document.getElementById('btn-night').addEventListener('click', () => {
            window.__3D_STATE__.nightMode = !window.__3D_STATE__.nightMode;
            updateNightMode();
        });

        document.getElementById('btn-load').addEventListener('click', () => {
            togglePassenger();
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            window.__3D_STATE__.wheelAngle = 0;
            window.__3D_STATE__.rotationSpeed = 2;
            document.getElementById('slider-speed').value = 2;
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'p') {
                window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            const state = window.__3D_STATE__;
            state.frameCount++;

            if (!state.isPaused) {
                // RPM to radians per second: rpm * (2PI / 60)
                const radPerSec = state.rotationSpeed * (Math.PI / 30);
                state.wheelAngle += radPerSec * delta;
                
                // Keep angle manageable (optional, but good for precision)
                if (state.wheelAngle > Math.PI * 2) state.wheelAngle -= Math.PI * 2;
                if (state.wheelAngle < 0) state.wheelAngle += Math.PI * 2;
            }

            // Apply rotation to wheel
            wheelGroup.rotation.z = state.wheelAngle;

            // Update cabins
            let minY = Infinity;
            let bottomIdx = 0;
            let pCount = 0;
            let allValid = true;

            state.cabins = [];

            cabins.forEach((c, i) => {
                // Counter-rotate cabin to keep it upright
                c.cabinGroup.rotation.z = -state.wheelAngle;

                // Calculate world position to find bottom cabin
                const worldPos = new THREE.Vector3();
                c.cabinGroup.getWorldPosition(worldPos);

                if (worldPos.y < minY) {
                    minY = worldPos.y;
                    bottomIdx = i;
                }

                if (c.hasPassenger) pCount++;

                const currentAngle = (c.baseAngle + state.wheelAngle) % (Math.PI * 2);
                if (!isFinite(currentAngle)) allValid = false;

                state.cabins.push({
                    angle: currentAngle,
                    hasPassenger: c.hasPassenger,
                    worldY: worldPos.y
                });
            });

            state.bottomCabinIndex = bottomIdx;
            state.passengerCount = pCount;
            state.wheelValid = allValid && (pCount >= 0 && pCount <= 8);

            // Update HUD
            document.getElementById('hud-speed').innerText = state.rotationSpeed.toFixed(1);
            document.getElementById('hud-angle').innerText = (state.wheelAngle * (180 / Math.PI)).toFixed(0);
            document.getElementById('hud-passengers').innerText = state.passengerCount;
            document.getElementById('hud-bottom').innerText = state.bottomCabinIndex;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
