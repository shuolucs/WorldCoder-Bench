<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Drone Assembly Workbench</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        
        /* UI Styles */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .panel {
            pointer-events: auto;
            background: rgba(26, 26, 46, 0.85);
            border: 1px solid #3a3a5e;
            border-radius: 8px;
            padding: 15px;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }

        /* Left Panel */
        #left-panel {
            position: absolute;
            left: 20px;
            top: 60px;
            width: 220px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            background: #2a2a4e;
            color: white;
            border: 1px solid #4a4a7e;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            text-align: left;
        }

        button:hover:not(:disabled) {
            background: #3a3a6e;
            border-color: #6a6a9e;
        }

        button:disabled {
            background: #1a1a2e;
            color: #555;
            border-color: #333;
            cursor: not-allowed;
        }

        button.action-btn {
            background: #4a2a2a;
            border-color: #7a4a4a;
            text-align: center;
            margin-top: 5px;
        }
        button.action-btn:hover:not(:disabled) { background: #6a3a3a; }
        
        button.active-toggle {
            background: #2a4a2a;
            border-color: #4a7a4a;
        }

        /* Top Progress Bar */
        #progress-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #3a3a5e;
            border-radius: 10px;
            overflow: hidden;
            pointer-events: auto;
        }

        #progress_bar {
            width: 0%;
            height: 100%;
            background: #22aa44;
            transition: width 0.5s ease-out;
        }

        #progress-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            text-align: center;
            line-height: 20px;
            color: white;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }

        /* Bottom Right Counter */
        #parts_counter {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 16px;
            font-weight: bold;
        }

        /* Instructions */
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            color: #aaa;
            pointer-events: auto;
        }
        kbd {
            background: #333;
            padding: 2px 5px;
            border-radius: 3px;
            border: 1px solid #555;
        }
    </style>
    <!-- Three.js and Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="progress-container">
            <div id="progress_bar"></div>
            <div id="progress-text">Assembly Progress: 0%</div>
        </div>

        <div id="left-panel" class="panel">
            <button id="btn_step1">Step 1: Mount Fuselage</button>
            <button id="btn_step2" disabled>Step 2: Attach Arms</button>
            <button id="btn_step3" disabled>Step 3: Install Motors</button>
            <button id="btn_step4" disabled>Step 4: Attach Propellers</button>
            <button id="btn_step5" disabled>Step 5: Insert Battery</button>
            <button id="btn_step6" disabled>Step 6: Mount Camera</button>
            <hr style="border-color: #3a3a5e; margin: 5px 0;">
            <button id="btn_test_spin" class="action-btn" disabled>Test Spin</button>
            <button id="btn_explode" class="action-btn">Explode View</button>
            <button id="btn_reset" class="action-btn" style="background: #5a2a2a;">Reset</button>
        </div>

        <div id="parts_counter" class="panel">Parts: 0/15 assembled</div>

        <div id="instructions" class="panel">
            Left Click: Select Part<br>
            <kbd>R</kbd>: Rotate Selected<br>
            <kbd>Del</kbd>: Reset Selected
        </div>
    </div>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            selectedPart: null,
            assemblyStep: 0,
            fuselageAssembled: false,
            armsAssembled: false,
            motorsAssembled: false,
            propellersAssembled: false,
            batteryAssembled: false,
            cameraAssembled: false,
            propellersSpinning: false,
            explodeView: false,
            progressPercent: 0,
            partPositions: {},
            referenceModelLoaded: false,
            totalPartsCount: 15,
            assembledPartsCount: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xffddaa, 0.8, 20);
        pointLight.position.set(-3, 6, -3);
        scene.add(pointLight);

        // --- Ground Plane ---
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x888888, 
            roughness: 0.4, 
            metalness: 0.6 
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grid helper for workbench feel
        const grid = new THREE.GridHelper(20, 20, 0x000000, 0x000000);
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        scene.add(grid);

        // --- Load Reference Model ---
        const gltfLoader = new THREE.GLTFLoader();
        gltfLoader.load('ferrari.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.3, 0.3, 0.3);
            model.position.set(6, 0.5, -4);
            model.name = 'referenceModel';
            
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            scene.add(model);
            window.__3D_STATE__.referenceModelLoaded = true;
        }, undefined, (error) => {
            console.warn('Reference model ferrari.glb could not be loaded. Proceeding without it.', error);
        });

        // --- Drone Parts Definition ---
        const partsConfig = {
            fuselage: { 
                geo: new THREE.BoxGeometry(1.2, 0.3, 1.2), 
                color: 0x333333, 
                initPos: [-5, 0.15, 3], 
                targetPos: [0, 2, 0], 
                targetRot: [0, 0, 0],
                step: 1
            },
            arm_0: { 
                geo: new THREE.CylinderGeometry(0.08, 0.08, 1.5, 16), 
                color: 0x555555, 
                initPos: [-5, 0.15, -3], 
                targetPos: [0.5, 2, 0.5], 
                targetRot: [Math.PI/2, -Math.PI/4, 0],
                step: 2
            },
            arm_1: { 
                geo: new THREE.CylinderGeometry(0.08, 0.08, 1.5, 16), 
                color: 0x555555, 
                initPos: [-3, 0.15, -3], 
                targetPos: [-0.5, 2, 0.5], 
                targetRot: [Math.PI/2, Math.PI/4, 0],
                step: 2
            },
            arm_2: { 
                geo: new THREE.CylinderGeometry(0.08, 0.08, 1.5, 16), 
                color: 0x555555, 
                initPos: [-1, 0.15, -3], 
                targetPos: [-0.5, 2, -0.5], 
                targetRot: [Math.PI/2, 3*Math.PI/4, 0],
                step: 2
            },
            arm_3: { 
                geo: new THREE.CylinderGeometry(0.08, 0.08, 1.5, 16), 
                color: 0x555555, 
                initPos: [1, 0.15, -3], 
                targetPos: [0.5, 2, -0.5], 
                targetRot: [Math.PI/2, -3*Math.PI/4, 0],
                step: 2
            },
            motor_0: { 
                geo: new THREE.CylinderGeometry(0.15, 0.15, 0.2, 16), 
                color: 0xcc3333, 
                initPos: [-5, 0.15, 5], 
                targetPos: [1.0, 2.15, 1.0], 
                targetRot: [0, 0, 0],
                step: 3
            },
            motor_1: { 
                geo: new THREE.CylinderGeometry(0.15, 0.15, 0.2, 16), 
                color: 0xcc3333, 
                initPos: [-3, 0.15, 5], 
                targetPos: [-1.0, 2.15, 1.0], 
                targetRot: [0, 0, 0],
                step: 3
            },
            motor_2: { 
                geo: new THREE.CylinderGeometry(0.15, 0.15, 0.2, 16), 
                color: 0xcc3333, 
                initPos: [-1, 0.15, 5], 
                targetPos: [-1.0, 2.15, -1.0], 
                targetRot: [0, 0, 0],
                step: 3
            },
            motor_3: { 
                geo: new THREE.CylinderGeometry(0.15, 0.15, 0.2, 16), 
                color: 0xcc3333, 
                initPos: [1, 0.15, 5], 
                targetPos: [1.0, 2.15, -1.0], 
                targetRot: [0, 0, 0],
                step: 3
            },
            prop_0: { 
                geo: new THREE.BoxGeometry(0.8, 0.02, 0.12), 
                color: 0x22aa44, 
                initPos: [3, 0.15, -3], 
                targetPos: [1.0, 2.3, 1.0], 
                targetRot: [0, 0, 0],
                step: 4
            },
            prop_1: { 
                geo: new THREE.BoxGeometry(0.8, 0.02, 0.12), 
                color: 0x22aa44, 
                initPos: [3, 0.15, -1], 
                targetPos: [-1.0, 2.3, 1.0], 
                targetRot: [0, 0, 0],
                step: 4
            },
            prop_2: { 
                geo: new THREE.BoxGeometry(0.8, 0.02, 0.12), 
                color: 0x22aa44, 
                initPos: [3, 0.15, 1], 
                targetPos: [-1.0, 2.3, -1.0], 
                targetRot: [0, 0, 0],
                step: 4
            },
            prop_3: { 
                geo: new THREE.BoxGeometry(0.8, 0.02, 0.12), 
                color: 0x22aa44, 
                initPos: [3, 0.15, 3], 
                targetPos: [1.0, 2.3, -1.0], 
                targetRot: [0, 0, 0],
                step: 4
            },
            battery: { 
                geo: new THREE.BoxGeometry(0.4, 0.15, 0.8), 
                color: 0x2255cc, 
                initPos: [5, 0.15, 3], 
                targetPos: [0, 1.85, 0], 
                targetRot: [0, 0, 0],
                step: 5
            },
            camera_module: { 
                geo: new THREE.SphereGeometry(0.15, 32, 32), 
                color: 0xffaa00, 
                initPos: [5, 0.15, 0], 
                targetPos: [0, 1.7, 0.4], 
                targetRot: [0, 0, 0],
                step: 6
            }
        };

        const parts = {};
        const interactableMeshes = [];

        // Create parts
        for (const [name, config] of Object.entries(partsConfig)) {
            const mat = new THREE.MeshStandardMaterial({ 
                color: config.color,
                roughness: 0.5,
                metalness: 0.2
            });
            const mesh = new THREE.Mesh(config.geo, mat);
            mesh.position.fromArray(config.initPos);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.name = name;
            
            // Store custom data
            mesh.userData = {
                initPos: new THREE.Vector3(...config.initPos),
                initRot: new THREE.Euler(0, 0, 0),
                targetPos: new THREE.Vector3(...config.targetPos),
                targetRot: new THREE.Euler(...config.targetRot),
                step: config.step,
                isAssembled: false
            };

            scene.add(mesh);
            parts[name] = mesh;
            interactableMeshes.push(mesh);
        }

        // --- Interaction & Raycasting ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedMesh = null;

        window.addEventListener('pointerdown', (event) => {
            // Ignore clicks on UI
            if (event.target.tagName === 'BUTTON' || event.target.closest('#ui-layer') && event.target.id !== 'ui-layer') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactableMeshes);

            if (intersects.length > 0) {
                selectPart(intersects[0].object);
            } else {
                deselectPart();
            }
        });

        function selectPart(mesh) {
            if (selectedMesh) {
                selectedMesh.material.emissive.setHex(0x000000);
            }
            selectedMesh = mesh;
            selectedMesh.material.emissive.setHex(0xffff00);
            selectedMesh.material.emissiveIntensity = 0.5;
            window.__3D_STATE__.selectedPart = mesh.name;
        }

        function deselectPart() {
            if (selectedMesh) {
                selectedMesh.material.emissive.setHex(0x000000);
                selectedMesh = null;
                window.__3D_STATE__.selectedPart = null;
            }
        }

        // --- Keyboard Controls ---
        window.addEventListener('keydown', (event) => {
            if (!selectedMesh) return;

            if (event.key === 'r' || event.key === 'R') {
                selectedMesh.rotation.y += Math.PI / 4;
            } else if (event.key === 'Delete') {
                // Reset selected part
                animateTransform(selectedMesh, selectedMesh.userData.initPos, selectedMesh.userData.initRot, 0.5);
                // If it was assembled, state will auto-correct in render loop
            }
        });

        // --- Animation Helper ---
        function animateTransform(mesh, targetPos, targetRot, duration, onComplete) {
            new TWEEN.Tween(mesh.position)
                .to({ x: targetPos.x, y: targetPos.y, z: targetPos.z }, duration * 1000)
                .easing(TWEEN.Easing.Quadratic.Out)
                .start();

            new TWEEN.Tween(mesh.rotation)
                .to({ x: targetRot.x, y: targetRot.y, z: targetRot.z }, duration * 1000)
                .easing(TWEEN.Easing.Quadratic.Out)
                .onComplete(() => {
                    if (onComplete) onComplete();
                })
                .start();
        }

        // --- Assembly Logic ---
        const btnStep1 = document.getElementById('btn_step1');
        const btnStep2 = document.getElementById('btn_step2');
        const btnStep3 = document.getElementById('btn_step3');
        const btnStep4 = document.getElementById('btn_step4');
        const btnStep5 = document.getElementById('btn_step5');
        const btnStep6 = document.getElementById('btn_step6');
        const btnTestSpin = document.getElementById('btn_test_spin');
        const btnExplode = document.getElementById('btn_explode');
        const btnReset = document.getElementById('btn_reset');
        const progressBar = document.getElementById('progress_bar');
        const progressText = document.getElementById('progress-text');
        const partsCounter = document.getElementById('parts_counter');

        function getExplodedPos(targetPos) {
            const center = new THREE.Vector3(0, 2, 0);
            const offset = new THREE.Vector3().subVectors(targetPos, center);
            return new THREE.Vector3().addVectors(center, offset.multiplyScalar(3)); // 2x outward = 3x from center
        }

        function assembleParts(partNames, duration, stepNum, stateKey) {
            if (window.__3D_STATE__.explodeView) {
                toggleExplodeView(); // Turn off explode view before assembling
            }

            let completed = 0;
            partNames.forEach(name => {
                const mesh = parts[name];
                animateTransform(mesh, mesh.userData.targetPos, mesh.userData.targetRot, duration, () => {
                    completed++;
                    if (completed === partNames.length) {
                        window.__3D_STATE__[stateKey] = true;
                        window.__3D_STATE__.assemblyStep = stepNum;
                        updateUI();
                    }
                });
            });
        }

        btnStep1.addEventListener('click', () => assembleParts(['fuselage'], 0.5, 1, 'fuselageAssembled'));
        btnStep2.addEventListener('click', () => assembleParts(['arm_0', 'arm_1', 'arm_2', 'arm_3'], 0.8, 2, 'armsAssembled'));
        btnStep3.addEventListener('click', () => assembleParts(['motor_0', 'motor_1', 'motor_2', 'motor_3'], 0.6, 3, 'motorsAssembled'));
        btnStep4.addEventListener('click', () => assembleParts(['prop_0', 'prop_1', 'prop_2', 'prop_3'], 0.6, 4, 'propellersAssembled'));
        btnStep5.addEventListener('click', () => assembleParts(['battery'], 0.4, 5, 'batteryAssembled'));
        btnStep6.addEventListener('click', () => assembleParts(['camera_module'], 0.4, 6, 'cameraAssembled'));

        btnTestSpin.addEventListener('click', () => {
            window.__3D_STATE__.propellersSpinning = !window.__3D_STATE__.propellersSpinning;
            btnTestSpin.classList.toggle('active-toggle');
        });

        function toggleExplodeView() {
            window.__3D_STATE__.explodeView = !window.__3D_STATE__.explodeView;
            btnExplode.classList.toggle('active-toggle');

            for (const name in parts) {
                const mesh = parts[name];
                // Only explode parts that are currently near their target position
                if (mesh.position.distanceTo(mesh.userData.targetPos) < 0.1 || mesh.userData.isAssembled) {
                    if (window.__3D_STATE__.explodeView) {
                        const expPos = getExplodedPos(mesh.userData.targetPos);
                        animateTransform(mesh, expPos, mesh.userData.targetRot, 0.5);
                    } else {
                        animateTransform(mesh, mesh.userData.targetPos, mesh.userData.targetRot, 0.5);
                    }
                }
            }
        }
        btnExplode.addEventListener('click', toggleExplodeView);

        btnReset.addEventListener('click', () => {
            window.__3D_STATE__.explodeView = false;
            btnExplode.classList.remove('active-toggle');
            window.__3D_STATE__.propellersSpinning = false;
            btnTestSpin.classList.remove('active-toggle');
            
            for (const name in parts) {
                const mesh = parts[name];
                animateTransform(mesh, mesh.userData.initPos, mesh.userData.initRot, 0.8);
            }

            // Reset state logically
            window.__3D_STATE__.assemblyStep = 0;
            window.__3D_STATE__.fuselageAssembled = false;
            window.__3D_STATE__.armsAssembled = false;
            window.__3D_STATE__.motorsAssembled = false;
            window.__3D_STATE__.propellersAssembled = false;
            window.__3D_STATE__.batteryAssembled = false;
            window.__3D_STATE__.cameraAssembled = false;
            
            updateUI();
        });

        function updateUI() {
            const step = window.__3D_STATE__.assemblyStep;
            
            btnStep2.disabled = step < 1;
            btnStep3.disabled = step < 2;
            btnStep4.disabled = step < 3;
            btnStep5.disabled = step < 4;
            btnStep6.disabled = step < 5;
            
            btnTestSpin.disabled = step < 6;

            // Progress bar (6 steps total)
            const percent = Math.round((step / 6) * 100);
            window.__3D_STATE__.progressPercent = percent;
            progressBar.style.width = `${percent}%`;
            progressText.innerText = `Assembly Progress: ${percent}%`;
        }

        // --- Render Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            TWEEN.update();
            controls.update();

            // Handle Propeller Spin
            if (window.__3D_STATE__.propellersSpinning) {
                const speed = 15 * delta;
                parts['prop_0'].rotation.y += speed;
                parts['prop_1'].rotation.y -= speed; // Counter-rotating
                parts['prop_2'].rotation.y += speed;
                parts['prop_3'].rotation.y -= speed;
            }

            // Dynamic State Update (Counters & Positions)
            let assembledCount = 0;
            for (const name in parts) {
                const mesh = parts[name];
                
                // Update exposed positions
                window.__3D_STATE__.partPositions[name] = {
                    x: mesh.position.x,
                    y: mesh.position.y,
                    z: mesh.position.z
                };

                // Check if assembled (distance to target or exploded target)
                let isAtTarget = mesh.position.distanceTo(mesh.userData.targetPos) < 0.1;
                if (window.__3D_STATE__.explodeView) {
                    const expPos = getExplodedPos(mesh.userData.targetPos);
                    if (mesh.position.distanceTo(expPos) < 0.1) isAtTarget = true;
                }

                mesh.userData.isAssembled = isAtTarget;
                if (isAtTarget) assembledCount++;
            }

            if (window.__3D_STATE__.assembledPartsCount !== assembledCount) {
                window.__3D_STATE__.assembledPartsCount = assembledCount;
                partsCounter.innerText = `Parts: ${assembledCount}/15 assembled`;
                
                // Auto-downgrade steps if parts are manually moved away (e.g. via Delete)
                // This is a simple heuristic to keep UI somewhat in sync if user messes with parts
                if (assembledCount === 0 && window.__3D_STATE__.assemblyStep > 0) {
                    window.__3D_STATE__.assemblyStep = 0;
                    updateUI();
                }
            }

            renderer.render(scene, camera);
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        updateUI();
        animate();

    </script>
</body>
</html>
