<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Drone Assembly Workbench</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #leftPanel {
      position: absolute;
      top: 70px;
      left: 16px;
      width: 230px;
      padding: 14px;
      background: rgba(10, 10, 20, 0.72);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      backdrop-filter: blur(6px);
      z-index: 10;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    #leftPanel h3 {
      margin: 0 0 12px 0;
      font-size: 16px;
      color: #dfe8ff;
      letter-spacing: 0.4px;
    }

    #leftPanel button {
      width: 100%;
      margin: 6px 0;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      background: #2c3e66;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
      text-align: left;
    }

    #leftPanel button:hover:not(:disabled) {
      background: #3c5287;
      transform: translateY(-1px);
    }

    #leftPanel button:disabled {
      background: #555;
      color: #aaa;
      cursor: not-allowed;
      opacity: 0.75;
    }

    #leftPanel button.active-toggle {
      background: #7a4fd8;
    }

    #progressContainer {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      height: 28px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      overflow: hidden;
      z-index: 10;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }

    #progress_bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #27ae60, #4cd964);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: bold;
      font-size: 13px;
      transition: width 0.25s ease;
      white-space: nowrap;
    }

    #parts_counter {
      position: absolute;
      right: 16px;
      bottom: 14px;
      z-index: 10;
      padding: 8px 12px;
      font-size: 13px;
      background: rgba(0,0,0,0.45);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      color: #e8f0ff;
    }

    #hint {
      position: absolute;
      left: 16px;
      bottom: 14px;
      z-index: 10;
      padding: 8px 12px;
      font-size: 12px;
      background: rgba(0,0,0,0.45);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      color: #cbd5ff;
      max-width: 360px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="progressContainer">
      <div id="progress_bar">0%</div>
    </div>

    <div id="leftPanel">
      <h3>Drone Assembly</h3>
      <button id="btn_step1">Step 1: Mount Fuselage</button>
      <button id="btn_step2" disabled>Step 2: Attach Arms</button>
      <button id="btn_step3" disabled>Step 3: Install Motors</button>
      <button id="btn_step4" disabled>Step 4: Attach Propellers</button>
      <button id="btn_step5" disabled>Step 5: Insert Battery</button>
      <button id="btn_step6" disabled>Step 6: Mount Camera</button>
      <button id="btn_test_spin" disabled>Test Spin</button>
      <button id="btn_explode">Explode View</button>
      <button id="btn_reset">Reset</button>
    </div>

    <div id="parts_counter">Parts: 0/15 assembled</div>
    <div id="hint">
      Click parts to select. Press <b>R</b> to rotate selected part by 45° on Y.
      Press <b>Delete</b> to return selected part to its original scattered position.
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.getElementById('app').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 2, 0);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffcc88, 0.8, 50);
    pointLight.position.set(-3, 6, -3);
    scene.add(pointLight);

    const workbench = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({
        color: '#7a7a7a',
        metalness: 0.8,
        roughness: 0.35
      })
    );
    workbench.rotation.x = -Math.PI / 2;
    workbench.receiveShadow = true;
    scene.add(workbench);

    const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x2c2c2c);
    gridHelper.position.y = 0.001;
    scene.add(gridHelper);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const parts = {};
    const selectableParts = [];
    const originalTransforms = {};
    const targetTransforms = {};
    const animations = [];

    let selectedPart = null;
    let referenceModelLoaded = false;
    let propellersSpinning = false;
    let explodeView = false;

    const explodeOffsets = {};
    const propellerNames = ['prop_0', 'prop_1', 'prop_2', 'prop_3'];
    const allPartNames = [
      'fuselage',
      'arm_0', 'arm_1', 'arm_2', 'arm_3',
      'motor_0', 'motor_1', 'motor_2', 'motor_3',
      'prop_0', 'prop_1', 'prop_2', 'prop_3',
      'battery',
      'camera_module'
    ];

    const state = {
      selectedPart: null,
      assemblyStep: 0,
      fuselageAssembled: false,
      armsAssembled: false,
      motorsAssembled: false,
      propellersAssembled: false,
      batteryAssembled: false,
      cameraAssembled: false,
      propellersSpinning: false,
      explodeView: false,
      progressPercent: 0,
      partPositions: {},
      referenceModelLoaded: false,
      totalPartsCount: 15,
      assembledPartsCount: 0
    };
    window.__3D_STATE__ = state;

    function createMaterial(color) {
      return new THREE.MeshStandardMaterial({
        color,
        metalness: 0.55,
        roughness: 0.4,
        emissive: 0x000000
      });
    }

    function addPart(mesh, name, position) {
      mesh.name = name;
      mesh.position.copy(position);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      parts[name] = mesh;
      selectableParts.push(mesh);

      originalTransforms[name] = {
        position: position.clone(),
        rotation: mesh.rotation.clone()
      };
    }

    // Drone parts
    addPart(
      new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 0.3, 1.2),
        createMaterial('#333333')
      ),
      'fuselage',
      new THREE.Vector3(-5, 0.15, 3)
    );

    for (let i = 0; i < 4; i++) {
      const arm = new THREE.Mesh(
        new THREE.CylinderGeometry(0.08, 0.08, 1.5, 24),
        createMaterial('#555555')
      );
      arm.rotation.z = Math.PI / 2;
      addPart(arm, `arm_${i}`, new THREE.Vector3(-5 + i * 2, 0.15, -3));
    }

    for (let i = 0; i < 4; i++) {
      const motor = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.15, 0.2, 24),
        createMaterial('#cc3333')
      );
      addPart(motor, `motor_${i}`, new THREE.Vector3(-5 + i * 2, 0.15, 5));
    }

    for (let i = 0; i < 4; i++) {
      const prop = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 0.02, 0.12),
        createMaterial('#22aa44')
      );
      addPart(prop, `prop_${i}`, new THREE.Vector3(3, 0.15, -3 + i * 2));
    }

    addPart(
      new THREE.Mesh(
        new THREE.BoxGeometry(0.4, 0.15, 0.8),
        createMaterial('#2255cc')
      ),
      'battery',
      new THREE.Vector3(5, 0.15, 3)
    );

    addPart(
      new THREE.Mesh(
        new THREE.SphereGeometry(0.15, 24, 24),
        createMaterial('#ffaa00')
      ),
      'camera_module',
      new THREE.Vector3(5, 0.15, 0)
    );

    // Target transforms
    targetTransforms['fuselage'] = {
      position: new THREE.Vector3(0, 2, 0),
      rotation: new THREE.Euler(0, 0, 0)
    };

    const armAngles = [45, 135, 225, 315];
    const armTips = [
      new THREE.Vector3(1.0, 2, 1.0),
      new THREE.Vector3(-1.0, 2, 1.0),
      new THREE.Vector3(-1.0, 2, -1.0),
      new THREE.Vector3(1.0, 2, -1.0)
    ];

    for (let i = 0; i < 4; i++) {
      const angleRad = THREE.MathUtils.degToRad(armAngles[i]);
      const dir = new THREE.Vector3(Math.cos(angleRad), 0, Math.sin(angleRad));
      const centerPos = armTips[i].clone().addScaledVector(dir, -0.75); // half arm length inward
      targetTransforms[`arm_${i}`] = {
        position: centerPos,
        rotation: new THREE.Euler(0, angleRad, Math.PI / 2)
      };
    }

    targetTransforms['motor_0'] = { position: new THREE.Vector3(1.0, 2.15, 1.0), rotation: new THREE.Euler(0, 0, 0) };
    targetTransforms['motor_1'] = { position: new THREE.Vector3(-1.0, 2.15, 1.0), rotation: new THREE.Euler(0, 0, 0) };
    targetTransforms['motor_2'] = { position: new THREE.Vector3(-1.0, 2.15, -1.0), rotation: new THREE.Euler(0, 0, 0) };
    targetTransforms['motor_3'] = { position: new THREE.Vector3(1.0, 2.15, -1.0), rotation: new THREE.Euler(0, 0, 0) };

    targetTransforms['prop_0'] = { position: new THREE.Vector3(1.0, 2.3, 1.0), rotation: new THREE.Euler(0, 0, 0) };
    targetTransforms['prop_1'] = { position: new THREE.Vector3(-1.0, 2.3, 1.0), rotation: new THREE.Euler(0, 0, 0) };
    targetTransforms['prop_2'] = { position: new THREE.Vector3(-1.0, 2.3, -1.0), rotation: new THREE.Euler(0, 0, 0) };
    targetTransforms['prop_3'] = { position: new THREE.Vector3(1.0, 2.3, -1.0), rotation: new THREE.Euler(0, 0, 0) };

    targetTransforms['battery'] = {
      position: new THREE.Vector3(0, 1.85, 0),
      rotation: new THREE.Euler(0, 0, 0)
    };

    targetTransforms['camera_module'] = {
      position: new THREE.Vector3(0, 1.7, 0.4),
      rotation: new THREE.Euler(0, 0, 0)
    };

    for (const name of allPartNames) {
      explodeOffsets[name] = targetTransforms[name].position.clone().sub(targetTransforms['fuselage'].position);
    }

    // GLTF reference model
    const loader = new GLTFLoader();
    loader.load(
      'ferrari.glb',
      (gltf) => {
        const model = gltf.scene;
        model.name = 'referenceModel';
        model.scale.setScalar(0.3);
        model.position.set(6, 0.5, -4);
        model.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        scene.add(model);
        referenceModelLoaded = true;
        state.referenceModelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load ferrari.glb:', err);
        referenceModelLoaded = false;
        state.referenceModelLoaded = false;
      }
    );

    function easeInOutCubic(t) {
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function animatePartTo(name, targetPos, targetRot, duration, onComplete) {
      const mesh = parts[name];
      if (!mesh) return;

      animations.push({
        mesh,
        name,
        startPos: mesh.position.clone(),
        endPos: targetPos.clone(),
        startRot: new THREE.Euler(mesh.rotation.x, mesh.rotation.y, mesh.rotation.z),
        endRot: new THREE.Euler(targetRot.x, targetRot.y, targetRot.z),
        duration,
        elapsed: 0,
        onComplete
      });
    }

    function animateGroup(names, duration, completeStepCallback) {
      let remaining = names.length;
      names.forEach((name) => {
        animatePartTo(
          name,
          targetTransforms[name].position,
          targetTransforms[name].rotation,
          duration,
          () => {
            remaining--;
            if (remaining === 0 && completeStepCallback) completeStepCallback();
          }
        );
      });
    }

    function clearHighlight(mesh) {
      if (!mesh || !mesh.material) return;
      if (Array.isArray(mesh.material)) {
        mesh.material.forEach(m => m.emissive && m.emissive.setHex(0x000000));
      } else if (mesh.material.emissive) {
        mesh.material.emissive.setHex(0x000000);
      }
    }

    function setHighlight(mesh) {
      if (!mesh || !mesh.material) return;
      if (Array.isArray(mesh.material)) {
        mesh.material.forEach(m => m.emissive && m.emissive.setHex(0xffff00));
      } else if (mesh.material.emissive) {
        mesh.material.emissive.setHex(0xffff00);
      }
    }

    function selectPart(mesh) {
      if (selectedPart) clearHighlight(selectedPart);
      selectedPart = mesh;
      if (selectedPart) setHighlight(selectedPart);
      state.selectedPart = selectedPart ? selectedPart.name : null;
    }

    function updateProgress() {
      const percent = Math.round((state.assemblyStep / 6) * 100);
      state.progressPercent = percent;
      const bar = document.getElementById('progress_bar');
      bar.style.width = `${percent}%`;
      bar.textContent = `${percent}%`;
    }

    function approximatelyAtTarget(name) {
      const mesh = parts[name];
      const target = targetTransforms[name];
      if (!mesh || !target) return false;
      return mesh.position.distanceTo(target.position) < 0.06;
    }

    function updateAssembledPartsCount() {
      let count = 0;
      for (const name of allPartNames) {
        if (approximatelyAtTarget(name)) count++;
      }
      state.assembledPartsCount = count;
      document.getElementById('parts_counter').textContent = `Parts: ${count}/15 assembled`;
    }

    function updatePartPositionsState() {
      for (const name of allPartNames) {
        const p = parts[name].position;
        state.partPositions[name] = { x: p.x, y: p.y, z: p.z };
      }
    }

    function updateButtons() {
      document.getElementById('btn_step1').disabled = state.assemblyStep !== 0;
      document.getElementById('btn_step2').disabled = state.assemblyStep !== 1;
      document.getElementById('btn_step3').disabled = state.assemblyStep !== 2;
      document.getElementById('btn_step4').disabled = state.assemblyStep !== 3;
      document.getElementById('btn_step5').disabled = state.assemblyStep !== 4;
      document.getElementById('btn_step6').disabled = state.assemblyStep !== 5;
      document.getElementById('btn_test_spin').disabled = state.assemblyStep !== 6;
      const explodeBtn = document.getElementById('btn_explode');
      explodeBtn.classList.toggle('active-toggle', explodeView);
      explodeBtn.textContent = explodeView ? 'Explode View: ON' : 'Explode View';
    }

    function completeStep(stepNumber) {
      state.assemblyStep = stepNumber;
      state.fuselageAssembled = stepNumber >= 1;
      state.armsAssembled = stepNumber >= 2;
      state.motorsAssembled = stepNumber >= 3;
      state.propellersAssembled = stepNumber >= 4;
      state.batteryAssembled = stepNumber >= 5;
      state.cameraAssembled = stepNumber >= 6;
      updateProgress();
      updateButtons();
      updateAssembledPartsCount();
      updatePartPositionsState();
    }

    function setPartToOriginal(name) {
      const mesh = parts[name];
      const original = originalTransforms[name];
      if (!mesh || !original) return;
      mesh.position.copy(original.position);
      mesh.rotation.copy(original.rotation);
    }

    function resetAll() {
      animations.length = 0;
      explodeView = false;
      propellersSpinning = false;

      for (const name of allPartNames) {
        setPartToOriginal(name);
      }

      state.assemblyStep = 0;
      state.fuselageAssembled = false;
      state.armsAssembled = false;
      state.motorsAssembled = false;
      state.propellersAssembled = false;
      state.batteryAssembled = false;
      state.cameraAssembled = false;
      state.propellersSpinning = false;
      state.explodeView = false;

      if (selectedPart) clearHighlight(selectedPart);
      selectedPart = null;
      state.selectedPart = null;

      updateProgress();
      updateButtons();
      updateAssembledPartsCount();
      updatePartPositionsState();
    }

    function toggleExplodeView() {
      explodeView = !explodeView;
      state.explodeView = explodeView;

      for (const name of allPartNames) {
        if (!approximatelyAtTarget(name)) continue;
        const base = targetTransforms[name].position.clone();
        const offset = explodeOffsets[name].clone();
        const destination = explodeView
          ? base.clone().add(offset)
          : base.clone();

        animatePartTo(
          name,
          destination,
          targetTransforms[name].rotation,
          0.45
        );
      }

      updateButtons();
    }

    document.getElementById('btn_step1').addEventListener('click', () => {
      if (state.assemblyStep !== 0) return;
      animatePartTo('fuselage', targetTransforms['fuselage'].position, targetTransforms['fuselage'].rotation, 0.5, () => completeStep(1));
    });

    document.getElementById('btn_step2').addEventListener('click', () => {
      if (state.assemblyStep !== 1) return;
      animateGroup(['arm_0', 'arm_1', 'arm_2', 'arm_3'], 0.8, () => completeStep(2));
    });

    document.getElementById('btn_step3').addEventListener('click', () => {
      if (state.assemblyStep !== 2) return;
      animateGroup(['motor_0', 'motor_1', 'motor_2', 'motor_3'], 0.6, () => completeStep(3));
    });

    document.getElementById('btn_step4').addEventListener('click', () => {
      if (state.assemblyStep !== 3) return;
      animateGroup(['prop_0', 'prop_1', 'prop_2', 'prop_3'], 0.6, () => completeStep(4));
    });

    document.getElementById('btn_step5').addEventListener('click', () => {
      if (state.assemblyStep !== 4) return;
      animatePartTo('battery', targetTransforms['battery'].position, targetTransforms['battery'].rotation, 0.4, () => completeStep(5));
    });

    document.getElementById('btn_step6').addEventListener('click', () => {
      if (state.assemblyStep !== 5) return;
      animatePartTo('camera_module', targetTransforms['camera_module'].position, targetTransforms['camera_module'].rotation, 0.4, () => completeStep(6));
    });

    document.getElementById('btn_test_spin').addEventListener('click', () => {
      if (state.assemblyStep !== 6) return;
      propellersSpinning = !propellersSpinning;
      state.propellersSpinning = propellersSpinning;
      document.getElementById('btn_test_spin').textContent = propellersSpinning ? 'Test Spin: ON' : 'Test Spin';
    });

    document.getElementById('btn_explode').addEventListener('click', toggleExplodeView);
    document.getElementById('btn_reset').addEventListener('click', resetAll);

    renderer.domElement.addEventListener('pointerdown', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(selectableParts, false);

      if (intersects.length > 0) {
        selectPart(intersects[0].object);
      } else {
        selectPart(null);
      }
    });

    window.addEventListener('keydown', (e) => {
      if (!selectedPart) return;

      if (e.key.toLowerCase() === 'r') {
        selectedPart.rotation.y += THREE.MathUtils.degToRad(45);
        updatePartPositionsState();
      }

      if (e.key === 'Delete') {
        setPartToOriginal(selectedPart.name);
        updateAssembledPartsCount();
        updatePartPositionsState();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function updateAnimations(delta) {
      for (let i = animations.length - 1; i >= 0; i--) {
        const anim = animations[i];
        anim.elapsed += delta;
        const t = Math.min(anim.elapsed / anim.duration, 1);
        const k = easeInOutCubic(t);

        anim.mesh.position.lerpVectors(anim.startPos, anim.endPos, k);
        anim.mesh.rotation.x = THREE.MathUtils.lerp(anim.startRot.x, anim.endRot.x, k);
        anim.mesh.rotation.y = THREE.MathUtils.lerp(anim.startRot.y, anim.endRot.y, k);
        anim.mesh.rotation.z = THREE.MathUtils.lerp(anim.startRot.z, anim.endRot.z, k);

        if (t >= 1) {
          anim.mesh.position.copy(anim.endPos);
          anim.mesh.rotation.copy(anim.endRot);
          const done = anim.onComplete;
          animations.splice(i, 1);
          if (done) done();
        }
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      updateAnimations(delta);

      if (propellersSpinning && state.assemblyStep === 6) {
        for (const name of propellerNames) {
          parts[name].rotation.y += 15 * delta;
        }
      }

      controls.update();
      updateAssembledPartsCount();
      updatePartPositionsState();
      state.propellersSpinning = propellersSpinning;
      state.explodeView = explodeView;
      state.referenceModelLoaded = referenceModelLoaded;

      renderer.render(scene, camera);
    }

    updateProgress();
    updateButtons();
    updateAssembledPartsCount();
    updatePartPositionsState();
    animate();
  </script>
</body>
</html>
