<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Drone Assembly Workbench</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
canvas { display: block; }

#progress_bar_container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 30px;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: flex;
    align-items: center;
    padding: 0 10px;
}
#progress_bar {
    flex: 1;
    height: 16px;
    background: #333;
    border-radius: 8px;
    overflow: hidden;
    margin-right: 10px;
}
#progress_fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #22aa44, #44dd66);
    border-radius: 8px;
    transition: width 0.5s ease;
}
#progress_text {
    color: #fff;
    font-size: 13px;
    min-width: 40px;
    text-align: right;
}

#left_panel {
    position: fixed;
    top: 40px;
    left: 10px;
    width: 220px;
    background: rgba(0,0,0,0.75);
    border-radius: 10px;
    padding: 15px;
    z-index: 100;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.1);
}
#left_panel h3 {
    color: #fff;
    margin-bottom: 12px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 8px;
}
.step-btn {
    display: block;
    width: 100%;
    padding: 8px 10px;
    margin-bottom: 6px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    text-align: left;
    transition: all 0.2s;
    color: #fff;
}
.step-btn:hover:not(:disabled) {
    transform: translateX(3px);
    filter: brightness(1.2);
}
.step-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    filter: grayscale(0.8);
}
.step-btn.completed {
    opacity: 0.6;
    border-left: 3px solid #22aa44;
}
#btn_step1 { background: #444; }
#btn_step2 { background: #555; }
#btn_step3 { background: #cc3333; }
#btn_step4 { background: #22aa44; }
#btn_step5 { background: #2255cc; }
#btn_step6 { background: #cc8800; }
#btn_test_spin { background: #8833cc; margin-top: 10px; }
#btn_explode { background: #cc6600; }
#btn_reset { background: #882222; margin-top: 10px; }

#parts_counter {
    position: fixed;
    bottom: 10px;
    right: 10px;
    color: #aaa;
    font-size: 13px;
    background: rgba(0,0,0,0.6);
    padding: 6px 12px;
    border-radius: 6px;
    z-index: 100;
}

#selection_info {
    position: fixed;
    bottom: 10px;
    left: 10px;
    color: #ffaa00;
    font-size: 12px;
    background: rgba(0,0,0,0.6);
    padding: 6px 12px;
    border-radius: 6px;
    z-index: 100;
}

#controls_hint {
    position: fixed;
    bottom: 40px;
    right: 10px;
    color: #666;
    font-size: 11px;
    z-index: 100;
}
</style>
</head>
<body>

<div id="progress_bar_container">
    <div id="progress_bar">
        <div id="progress_fill"></div>
    </div>
    <span id="progress_text">0%</span>
</div>

<div id="left_panel">
    <h3>🔧 Assembly Steps</h3>
    <button class="step-btn" id="btn_step1">Step 1: Mount Fuselage</button>
    <button class="step-btn" id="btn_step2" disabled>Step 2: Attach Arms</button>
    <button class="step-btn" id="btn_step3" disabled>Step 3: Install Motors</button>
    <button class="step-btn" id="btn_step4" disabled>Step 4: Attach Propellers</button>
    <button class="step-btn" id="btn_step5" disabled>Step 5: Insert Battery</button>
    <button class="step-btn" id="btn_step6" disabled>Step 6: Mount Camera</button>
    <button class="step-btn" id="btn_test_spin" disabled>▶ Test Spin</button>
    <button class="step-btn" id="btn_explode" disabled>💥 Explode View</button>
    <button class="step-btn" id="btn_reset">🔄 Reset All</button>
</div>

<div id="parts_counter">Parts: 0/15 assembled</div>
<div id="selection_info">Click a part to select it</div>
<div id="controls_hint">R: Rotate | Del: Reset part</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
window.__3D_STATE__ = {
    selectedPart: null,
    assemblyStep: 0,
    fuselageAssembled: false,
    armsAssembled: false,
    motorsAssembled: false,
    propellersAssembled: false,
    batteryAssembled: false,
    cameraAssembled: false,
    propellersSpinning: false,
    explodeView: false,
    progressPercent: 0,
    partPositions: {},
    referenceModelLoaded: false,
    totalPartsCount: 15,
    assembledPartsCount: 0
};

const state = window.__3D_STATE__;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 1, 0);

// ============ LIGHTS ============
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambLight);

const pointLight = new THREE.PointLight(0xffcc66, 0.8, 20);
pointLight.position.set(-3, 6, -3);
pointLight.castShadow = true;
scene.add(pointLight);

// ============ GROUND PLANE ============
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x555566,
    metalness: 0.6,
    roughness: 0.4
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const grid = new THREE.GridHelper(20, 40, 0x333344, 0x222233);
grid.position.y = 0.01;
scene.add(grid);

// ============ REFERENCE MODEL ============
const gltfLoader = new GLTFLoader();
gltfLoader.load(
    'ferrari.glb',
    (gltf) => {
        const model = gltf.scene;
        model.scale.set(0.3, 0.3, 0.3);
        model.position.set(6, 0.5, -4);
        model.name = 'referenceModel';
        model.traverse(child => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        scene.add(model);
        state.referenceModelLoaded = true;
    },
    undefined,
    (err) => {
        console.warn('Could not load ferrari.glb:', err.message);
        // Create a placeholder
        const placeholderGeo = new THREE.BoxGeometry(2, 0.8, 1);
        const placeholderMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, metalness: 0.7, roughness: 0.3 });
        const placeholder = new THREE.Mesh(placeholderGeo, placeholderMat);
        placeholder.position.set(6, 0.5, -4);
        placeholder.name = 'referenceModel';
        placeholder.castShadow = true;
        scene.add(placeholder);
        state.referenceModelLoaded = true;
    }
);

// ============ DRONE PARTS ============
const parts = {};
const originalPositions = {};
const originalRotations = {};
const selectableParts = [];

const targetPositions = {
    fuselage: new THREE.Vector3(0, 2, 0),
    arm_0: new THREE.Vector3(1.0, 2, 1.0),
    arm_1: new THREE.Vector3(-1.0, 2, 1.0),
    arm_2: new THREE.Vector3(-1.0, 2, -1.0),
    arm_3: new THREE.Vector3(1.0, 2, -1.0),
    motor_0: new THREE.Vector3(1.0, 2.15, 1.0),
    motor_1: new THREE.Vector3(-1.0, 2.15, 1.0),
    motor_2: new THREE.Vector3(-1.0, 2.15, -1.0),
    motor_3: new THREE.Vector3(1.0, 2.15, -1.0),
    prop_0: new THREE.Vector3(1.0, 2.3, 1.0),
    prop_1: new THREE.Vector3(-1.0, 2.3, 1.0),
    prop_2: new THREE.Vector3(-1.0, 2.3, -1.0),
    prop_3: new THREE.Vector3(1.0, 2.3, -1.0),
    battery: new THREE.Vector3(0, 1.85, 0),
    camera_module: new THREE.Vector3(0, 1.7, 0.4)
};

const targetRotations = {
    fuselage: new THREE.Euler(0, 0, 0),
    arm_0: new THREE.Euler(0, Math.PI / 4, Math.PI / 2),
    arm_1: new THREE.Euler(0, Math.PI * 3 / 4, Math.PI / 2),
    arm_2: new THREE.Euler(0, Math.PI * 5 / 4, Math.PI / 2),
    arm_3: new THREE.Euler(0, Math.PI * 7 / 4, Math.PI / 2),
    motor_0: new THREE.Euler(0, 0, 0),
    motor_1: new THREE.Euler(0, 0, 0),
    motor_2: new THREE.Euler(0, 0, 0),
    motor_3: new THREE.Euler(0, 0, 0),
    prop_0: new THREE.Euler(0, 0, 0),
    prop_1: new THREE.Euler(0, 0, 0),
    prop_2: new THREE.Euler(0, 0, 0),
    prop_3: new THREE.Euler(0, 0, 0),
    battery: new THREE.Euler(0, 0, 0),
    camera_module: new THREE.Euler(0, 0, 0)
};

function createPart(name, geometry, color, position) {
    const mat = new THREE.MeshStandardMaterial({
        color: color,
        metalness: 0.5,
        roughness: 0.4,
        emissive: 0x000000
    });
    const mesh = new THREE.Mesh(geometry, mat);
    mesh.position.copy(position);
    mesh.name = name;
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
    parts[name] = mesh;
    originalPositions[name] = position.clone();
    originalRotations[name] = new THREE.Euler(0, 0, 0);
    selectableParts.push(mesh);
    state.partPositions[name] = { x: position.x, y: position.y, z: position.z };
    return mesh;
}

// Fuselage
createPart('fuselage', new THREE.BoxGeometry(1.2, 0.3, 1.2), 0x333333, new THREE.Vector3(-5, 0.15, 3));

// Arms
createPart('arm_0', new THREE.CylinderGeometry(0.08, 0.08, 1.5, 12), 0x555555, new THREE.Vector3(-5, 0.15, -3));
createPart('arm_1', new THREE.CylinderGeometry(0.08, 0.08, 1.5, 12), 0x555555, new THREE.Vector3(-3, 0.15, -3));
createPart('arm_2', new THREE.CylinderGeometry(0.08, 0.08, 1.5, 12), 0x555555, new THREE.Vector3(-1, 0.15, -3));
createPart('arm_3', new THREE.CylinderGeometry(0.08, 0.08, 1.5, 12), 0x555555, new THREE.Vector3(1, 0.15, -3));

// Motors
createPart('motor_0', new THREE.CylinderGeometry(0.15, 0.15, 0.2, 16), 0xcc3333, new THREE.Vector3(-5, 0.15, 5));
createPart('motor_1', new THREE.CylinderGeometry(0.15, 0.15, 0.2, 16), 0xcc3333, new THREE.Vector3(-3, 0.15, 5));
createPart('motor_2', new THREE.CylinderGeometry(0.15, 0.15, 0.2, 16), 0xcc3333, new THREE.Vector3(-1, 0.15, 5));
createPart('motor_3', new THREE.CylinderGeometry(0.15, 0.15, 0.2, 16), 0xcc3333, new THREE.Vector3(1, 0.15, 5));

// Propellers
createPart('prop_0', new THREE.BoxGeometry(0.8, 0.02, 0.12), 0x22aa44, new THREE.Vector3(3, 0.15, -3));
createPart('prop_1', new THREE.BoxGeometry(0.8, 0.02, 0.12), 0x22aa44, new THREE.Vector3(3, 0.15, -1));
createPart('prop_2', new THREE.BoxGeometry(0.8, 0.02, 0.12), 0x22aa44, new THREE.Vector3(3, 0.15, 1));
createPart('prop_3', new THREE.BoxGeometry(0.8, 0.02, 0.12), 0x22aa44, new THREE.Vector3(3, 0.15, 3));

// Battery
createPart('battery', new THREE.BoxGeometry(0.4, 0.15, 0.8), 0x2255cc, new THREE.Vector3(5, 0.15, 3));

// Camera Module
createPart('camera_module', new THREE.SphereGeometry(0.15, 16, 16), 0xffaa00, new THREE.Vector3(5, 0.15, 0));

// ============ ANIMATION SYSTEM ============
const animations = [];

function animatePart(partName, targetPos, targetRot, duration, callback) {
    const mesh = parts[partName];
    if (!mesh) return;
    const startPos = mesh.position.clone();
    const startRot = new THREE.Euler(mesh.rotation.x, mesh.rotation.y, mesh.rotation.z);
    const startQuat = new THREE.Quaternion().setFromEuler(startRot);
    const endQuat = new THREE.Quaternion().setFromEuler(targetRot);
    const startTime = performance.now();

    animations.push({
        partName,
        startPos,
        targetPos: targetPos.clone(),
        startQuat,
        endQuat,
        startTime,
        duration: duration * 1000,
        callback,
        done: false
    });
}

function updateAnimations() {
    const now = performance.now();
    for (let i = animations.length - 1; i >= 0; i--) {
        const anim = animations[i];
        if (anim.done) continue;
        const elapsed = now - anim.startTime;
        let t = Math.min(elapsed / anim.duration, 1);
        // Ease out cubic
        t = 1 - Math.pow(1 - t, 3);

        const mesh = parts[anim.partName];
        if (!mesh) { anim.done = true; continue; }

        mesh.position.lerpVectors(anim.startPos, anim.targetPos, t);

        const q = new THREE.Quaternion();
        q.slerpQuaternions(anim.startQuat, anim.endQuat, t);
        mesh.quaternion.copy(q);

        state.partPositions[anim.partName] = {
            x: mesh.position.x,
            y: mesh.position.y,
            z: mesh.position.z
        };

        if (t >= 1) {
            anim.done = true;
            if (anim.callback) anim.callback();
        }
    }
    // Clean up done animations
    for (let i = animations.length - 1; i >= 0; i--) {
        if (animations[i].done) animations.splice(i, 1);
    }
}

// ============ SELECTION ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedMesh = null;

function selectPart(mesh) {
    deselectPart();
    if (mesh && mesh.material) {
        selectedMesh = mesh;
        mesh.material.emissive.setHex(0xffff00);
        mesh.material.emissiveIntensity = 0.3;
        state.selectedPart = mesh.name;
        document.getElementById('selection_info').textContent = `Selected: ${mesh.name}`;
    }
}

function deselectPart() {
    if (selectedMesh && selectedMesh.material) {
        selectedMesh.material.emissive.setHex(0x000000);
        selectedMesh.material.emissiveIntensity = 0;
    }
    selectedMesh = null;
    state.selectedPart = null;
    document.getElementById('selection_info').textContent = 'Click a part to select it';
}

renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(selectableParts);
    if (intersects.length > 0) {
        selectPart(intersects[0].object);
    } else {
        deselectPart();
    }
});

// ============ KEYBOARD ============
document.addEventListener('keydown', (e) => {
    if (e.key === 'r' || e.key === 'R') {
        if (selectedMesh) {
            selectedMesh.rotation.y += Math.PI / 4;
        }
    }
    if (e.key === 'Delete') {
        if (selectedMesh) {
            const name = selectedMesh.name;
            const origPos = originalPositions[name];
            const origRot = originalRotations[name];
            if (origPos) {
                animatePart(name, origPos, origRot, 0.4);
            }
        }
    }
});

// ============ UI UPDATE ============
function updateUI() {
    const step = state.assemblyStep;
    const btn1 = document.getElementById('btn_step1');
    const btn2 = document.getElementById('btn_step2');
    const btn3 = document.getElementById('btn_step3');
    const btn4 = document.getElementById('btn_step4');
    const btn5 = document.getElementById('btn_step5');
    const btn6 = document.getElementById('btn_step6');
    const btnSpin = document.getElementById('btn_test_spin');
    const btnExplode = document.getElementById('btn_explode');

    btn1.disabled = step >= 1;
    btn2.disabled = step < 1 || step >= 2;
    btn3.disabled = step < 2 || step >= 3;
    btn4.disabled = step < 3 || step >= 4;
    btn5.disabled = step < 4 || step >= 5;
    btn6.disabled = step < 5 || step >= 6;
    btnSpin.disabled = step < 6;
    btnExplode.disabled = step < 1;

    if (step >= 1) btn1.classList.add('completed');
    if (step >= 2) btn2.classList.add('completed');
    if (step >= 3) btn3.classList.add('completed');
    if (step >= 4) btn4.classList.add('completed');
    if (step >= 5) btn5.classList.add('completed');
    if (step >= 6) btn6.classList.add('completed');

    state.progressPercent = Math.round((step / 6) * 100);
    document.getElementById('progress_fill').style.width = state.progressPercent + '%';
    document.getElementById('progress_text').textContent = state.progressPercent + '%';

    // Count assembled parts
    let assembled = 0;
    if (state.fuselageAssembled) assembled += 1;
    if (state.armsAssembled) assembled += 4;
    if (state.motorsAssembled) assembled += 4;
    if (state.propellersAssembled) assembled += 4;
    if (state.batteryAssembled) assembled += 1;
    if (state.cameraAssembled) assembled += 1;
    state.assembledPartsCount = assembled;
    document.getElementById('parts_counter').textContent = `Parts: ${assembled}/15 assembled`;
}

// ============ STEP HANDLERS ============
document.getElementById('btn_step1').addEventListener('click', () => {
    if (state.assemblyStep >= 1) return;
    animatePart('fuselage', targetPositions.fuselage, targetRotations.fuselage, 0.5, () => {
        state.fuselageAssembled = true;
        state.assemblyStep = 1;
        updateUI();
    });
});

document.getElementById('btn_step2').addEventListener('click', () => {
    if (state.assemblyStep < 1 || state.assemblyStep >= 2) return;
    let completed = 0;
    for (let i = 0; i < 4; i++) {
        const name = `arm_${i}`;
        animatePart(name, targetPositions[name], targetRotations[name], 0.8, () => {
            completed++;
            if (completed === 4) {
                state.armsAssembled = true;
                state.assemblyStep = 2;
                updateUI();
            }
        });
    }
});

document.getElementById('btn_step3').addEventListener('click', () => {
    if (state.assemblyStep < 2 || state.assemblyStep >= 3) return;
    let completed = 0;
    for (let i = 0; i < 4; i++) {
        const name = `motor_${i}`;
        animatePart(name, targetPositions[name], targetRotations[name], 0.6, () => {
            completed++;
            if (completed === 4) {
                state.motorsAssembled = true;
                state.assemblyStep = 3;
                updateUI();
            }
        });
    }
});

document.getElementById('btn_step4').addEventListener('click', () => {
    if (state.assemblyStep < 3 || state.assemblyStep >= 4) return;
    let completed = 0;
    for (let i = 0; i < 4; i++) {
        const name = `prop_${i}`;
        animatePart(name, targetPositions[name], targetRotations[name], 0.6, () => {
            completed++;
            if (completed === 4) {
                state.propellersAssembled = true;
                state.assemblyStep = 4;
                updateUI();
            }
        });
    }
});

document.getElementById('btn_step5').addEventListener('click', () => {
    if (state.assemblyStep < 4 || state.assemblyStep >= 5) return;
    animatePart('battery', targetPositions.battery, targetRotations.battery, 0.4, () => {
        state.batteryAssembled = true;
        state.assemblyStep = 5;
        updateUI();
    });
});

document.getElementById('btn_step6').addEventListener('click', () => {
    if (state.assemblyStep < 5 || state.assemblyStep >= 6) return;
    animatePart('camera_module', targetPositions.camera_module, targetRotations.camera_module, 0.4, () => {
        state.cameraAssembled = true;
        state.assemblyStep = 6;
        updateUI();
    });
});

// Test Spin
document.getElementById('btn_test_spin').addEventListener('click', () => {
    if (state.assemblyStep < 6) return;
    state.propellersSpinning = !state.propellersSpinning;
    const btn = document.getElementById('btn_test_spin');
    btn.textContent = state.propellersSpinning ? '⏹ Stop Spin' : '▶ Test Spin';
    btn.style.background = state.propellersSpinning ? '#44aa44' : '#8833cc';
});

// Explode View
let explodePositions = {};
document.getElementById('btn_explode').addEventListener('click', () => {
    if (state.assemblyStep < 1) return;
    state.explodeView = !state.explodeView;
    const btn = document.getElementById('btn_explode');
    btn.textContent = state.explodeView ? '🔧 Collapse View' : '💥 Explode View';
    btn.style.background = state.explodeView ? '#44aa44' : '#cc6600';

    const center = targetPositions.fuselage.clone();

    for (const name in parts) {
        if (!targetPositions[name]) continue;
        const target = targetPositions[name];
        if (state.explodeView) {
            const offset = target.clone().sub(center);
            const explodedPos = center.clone().add(offset.multiplyScalar(2.5));
            // Keep fuselage at center
            if (name === 'fuselage') {
                explodedPos.copy(center);
            }
            explodePositions[name] = explodedPos;
            const currentStep = getStepForPart(name);
            if (currentStep <= state.assemblyStep) {
                animatePart(name, explodedPos, targetRotations[name], 0.5);
            }
        } else {
            const currentStep = getStepForPart(name);
            if (currentStep <= state.assemblyStep) {
                animatePart(name, target, targetRotations[name], 0.5);
            }
        }
    }
});

function getStepForPart(name) {
    if (name === 'fuselage') return 1;
    if (name.startsWith('arm_')) return 2;
    if (name.startsWith('motor_')) return 3;
    if (name.startsWith('prop_')) return 4;
    if (name === 'battery') return 5;
    if (name === 'camera_module') return 6;
    return 99;
}

// Reset
document.getElementById('btn_reset').addEventListener('click', () => {
    state.assemblyStep = 0;
    state.fuselageAssembled = false;
    state.armsAssembled = false;
    state.motorsAssembled = false;
    state.propellersAssembled = false;
    state.batteryAssembled = false;
    state.cameraAssembled = false;
    state.propellersSpinning = false;
    state.explodeView = false;

    document.getElementById('btn_test_spin').textContent = '▶ Test Spin';
    document.getElementById('btn_test_spin').style.background = '#8833cc';
    document.getElementById('btn_explode').textContent = '💥 Explode View';
    document.getElementById('btn_explode').style.background = '#cc6600';

    // Remove completed class
    for (let i = 1; i <= 6; i++) {
        document.getElementById(`btn_step${i}`).classList.remove('completed');
    }

    // Animate all parts back
    for (const name in parts) {
        const origPos = originalPositions[name];
        const origRot = originalRotations[name];
        if (origPos) {
            animatePart(name, origPos, origRot, 0.6);
        }
    }

    deselectPart();
    updateUI();
});

// ============ RENDER LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    controls.update();
    updateAnimations();

    // Propeller spinning
    if (state.propellersSpinning && !state.explodeView) {
        for (let i = 0; i < 4; i++) {
            const prop = parts[`prop_${i}`];
            if (prop) {
                prop.rotation.y += 15 * delta;
            }
        }
    }

    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

updateUI();
animate();
</script>
