<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procedural City Builder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0d0d1a; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  
  #stats-panel {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(13, 13, 26, 0.9);
    border: 1px solid #333366;
    border-radius: 8px;
    padding: 15px;
    color: #aaaacc;
    font-size: 13px;
    min-width: 220px;
    z-index: 100;
    pointer-events: none;
  }
  
  #stats-panel h3 {
    color: #4a9eff;
    margin-bottom: 10px;
    font-size: 14px;
    border-bottom: 1px solid #333366;
    padding-bottom: 5px;
  }
  
  #stats-panel .stat-row {
    display: flex;
    justify-content: space-between;
    margin: 4px 0;
  }
  
  #stats-panel .stat-label { color: #7777aa; }
  #stats-panel .stat-value { color: #ffffff; font-weight: bold; }
  #stats-panel .tool-residential { color: #4a9eff; }
  #stats-panel .tool-commercial { color: #ff9f43; }
  #stats-panel .tool-park { color: #2ecc71; }
  #stats-panel .tool-demolish { color: #ff4444; }
  #stats-panel .tool-none { color: #777777; }
  
  #debug-panel {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(40, 0, 0, 0.9);
    border: 1px solid #ff0000;
    border-radius: 8px;
    padding: 15px;
    color: #ff6666;
    font-size: 13px;
    min-width: 220px;
    z-index: 100;
    display: none;
    pointer-events: none;
  }
  
  #debug-panel h3 {
    color: #ff0000;
    margin-bottom: 10px;
    font-size: 14px;
    border-bottom: 1px solid #ff3333;
    padding-bottom: 5px;
  }
  
  #debug-panel .stat-row {
    display: flex;
    justify-content: space-between;
    margin: 4px 0;
  }
  
  #debug-panel .stat-label { color: #aa4444; }
  #debug-panel .stat-value { color: #ff8888; font-weight: bold; }
  
  #toolbar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 100;
    pointer-events: none;
  }
  
  .tool-btn {
    padding: 10px 18px;
    border: 2px solid #333366;
    border-radius: 6px;
    background: rgba(13, 13, 26, 0.9);
    color: #aaaacc;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    text-align: center;
  }
  
  .tool-btn.active { border-color: #ffffff; color: #ffffff; }
  .tool-btn .key { font-size: 10px; color: #555577; display: block; margin-top: 2px; }
</style>
</head>
<body>

<div id="stats-panel">
  <h3>🏙️ CITY STATS</h3>
  <div class="stat-row">
    <span class="stat-label">Tool:</span>
    <span class="stat-value tool-none" id="stat-tool">None</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Buildings:</span>
    <span class="stat-value" id="stat-count">0</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Total Mass:</span>
    <span class="stat-value" id="stat-mass">0</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Residential:</span>
    <span class="stat-value" style="color:#4a9eff" id="stat-res">0</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Commercial:</span>
    <span class="stat-value" style="color:#ff9f43" id="stat-com">0</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Parks:</span>
    <span class="stat-value" style="color:#2ecc71" id="stat-park">0</span>
  </div>
</div>

<div id="debug-panel">
  <h3>⚙️ PHYSICS DEBUG</h3>
  <div class="stat-row">
    <span class="stat-label">Buildings:</span>
    <span class="stat-value" id="dbg-count">0</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Total Mass:</span>
    <span class="stat-value" id="dbg-mass">0</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Avg Height:</span>
    <span class="stat-value" id="dbg-avgheight">0</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Physics Steps:</span>
    <span class="stat-value" id="dbg-steps">0</span>
  </div>
</div>

<div id="toolbar">
  <div class="tool-btn" id="tb-res">🏠 Residential<span class="key">[1]</span></div>
  <div class="tool-btn" id="tb-com">🏢 Commercial<span class="key">[2]</span></div>
  <div class="tool-btn" id="tb-park">🌳 Park<span class="key">[3]</span></div>
  <div class="tool-btn" id="tb-demo">💥 Demolish<span class="key">[X]</span></div>
  <div class="tool-btn" id="tb-debug">🔧 Debug<span class="key">[D]</span></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  // ============ STATE ============
  const state = {
    buildingCount: 0,
    selectedTool: 'none',
    totalMass: 0,
    debugOverlayActive: false,
    demolishMode: false,
    grid: [],
    physicsStepCount: 0,
    buildings: [],
    averageHeight: 0,
    lastPlacedId: 0,
    lastDemolishedId: 0
  };
  
  // Initialize grid
  for (let r = 0; r < 10; r++) {
    state.grid[r] = [];
    for (let c = 0; c < 10; c++) {
      state.grid[r][c] = null;
    }
  }
  
  window.__3D_STATE__ = state;
  
  // ============ THREE.JS SETUP ============
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d0d1a);
  
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(30, 40, 30);
  camera.lookAt(0, 0, 0);
  
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);
  
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  
  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
  scene.add(ambientLight);
  
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(10, 30, 10);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 100;
  dirLight.shadow.camera.left = -50;
  dirLight.shadow.camera.right = 50;
  dirLight.shadow.camera.top = 50;
  dirLight.shadow.camera.bottom = -50;
  scene.add(dirLight);
  
  // Ground plane
  const groundGeo = new THREE.PlaneGeometry(80, 80);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = 0;
  ground.receiveShadow = true;
  scene.add(ground);
  
  // Grid lines
  const gridGroup = new THREE.Group();
  const gridLineMat = new THREE.LineBasicMaterial({ color: 0x333366 });
  
  for (let i = 0; i <= 10; i++) {
    const x = -40 + i * 8;
    const points1 = [new THREE.Vector3(x, 0.01, -40), new THREE.Vector3(x, 0.01, 40)];
    const geo1 = new THREE.BufferGeometry().setFromPoints(points1);
    gridGroup.add(new THREE.Line(geo1, gridLineMat));
    
    const points2 = [new THREE.Vector3(-40, 0.01, x), new THREE.Vector3(40, 0.01, x)];
    const geo2 = new THREE.BufferGeometry().setFromPoints(points2);
    gridGroup.add(new THREE.Line(geo2, gridLineMat));
  }
  scene.add(gridGroup);
  
  // ============ BUILDING MANAGEMENT ============
  let nextBuildingId = 1;
  const buildingMeshes = []; // { id, mesh, type, row, col, height, mass, velocity, grounded, width, depth }
  const debugObjects = []; // wireframes and arrows
  let ghostMesh = null;
  let currentGhostType = null;
  
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  
  function randRange(min, max) {
    return min + Math.random() * (max - min);
  }
  
  function getCellCenter(row, col) {
    const x = -40 + col * 8 + 4;
    const z = -40 + row * 8 + 4;
    return { x, z };
  }
  
  function getGridCell(worldX, worldZ) {
    const col = Math.floor((worldX + 40) / 8);
    const row = Math.floor((worldZ + 40) / 8);
    if (row >= 0 && row < 10 && col >= 0 && col < 10) {
      return { row, col };
    }
    return null;
  }
  
  function createBuildingMesh(type, forGhost) {
    let geometry, material, height, width, depth, mass;
    
    if (type === 'residential') {
      width = randRange(4, 6);
      height = randRange(8, 20);
      depth = randRange(4, 6);
      geometry = new THREE.BoxGeometry(width, height, depth);
      material = new THREE.MeshStandardMaterial({
        color: 0x4a9eff,
        transparent: forGhost,
        opacity: forGhost ? 0.3 : 1.0
      });
      mass = height * 2;
    } else if (type === 'commercial') {
      width = randRange(5, 7);
      height = randRange(12, 30);
      depth = randRange(5, 7);
      geometry = new THREE.BoxGeometry(width, height, depth);
      material = new THREE.MeshStandardMaterial({
        color: 0xff9f43,
        transparent: forGhost,
        opacity: forGhost ? 0.3 : 1.0
      });
      mass = height * 3;
    } else if (type === 'park') {
      width = 6;
      height = 0.5;
      depth = 6;
      geometry = new THREE.CylinderGeometry(3, 3, 0.5, 32);
      material = new THREE.MeshStandardMaterial({
        color: 0x2ecc71,
        transparent: forGhost,
        opacity: forGhost ? 0.3 : 1.0
      });
      mass = 0;
    }
    
    const mesh = new THREE.Mesh(geometry, material);
    mesh.castShadow = !forGhost;
    mesh.receiveShadow = !forGhost;
    
    return { mesh, height, width, depth, mass };
  }
  
  function updateGhost(type) {
    if (ghostMesh) {
      scene.remove(ghostMesh);
      ghostMesh = null;
    }
    if (type && type !== 'none' && type !== 'demolish') {
      const result = createBuildingMesh(type, true);
      ghostMesh = result.mesh;
      ghostMesh.userData.height = result.height;
      ghostMesh.visible = false;
      scene.add(ghostMesh);
      currentGhostType = type;
    } else {
      currentGhostType = null;
    }
  }
  
  function placeBuilding(type, row, col) {
    if (state.grid[row][col] !== null) return;
    
    const result = createBuildingMesh(type, false);
    const center = getCellCenter(row, col);
    const id = nextBuildingId++;
    
    const restY = type === 'park' ? 0.25 : result.height / 2;
    
    result.mesh.position.set(center.x, 50, center.z);
    result.mesh.castShadow = true;
    result.mesh.receiveShadow = true;
    result.mesh.userData = { buildingId: id };
    scene.add(result.mesh);
    
    const buildingData = {
      id,
      mesh: result.mesh,
      type,
      row,
      col,
      height: result.height,
      width: result.width,
      depth: result.depth,
      mass: result.mass,
      velocity: 0,
      grounded: false,
      restY,
      demolishing: false,
      demolishTime: 0
    };
    
    buildingMeshes.push(buildingData);
    
    state.grid[row][col] = { id, type, height: result.height, mass: result.mass };
    state.lastPlacedId = id;
    
    // Recreate ghost with new random dimensions
    updateGhost(currentGhostType);
    
    updateState();
  }
  
  function demolishBuilding(id) {
    const idx = buildingMeshes.findIndex(b => b.id === id);
    if (idx === -1) return;
    
    const building = buildingMeshes[idx];
    if (building.demolishing) return;
    
    building.demolishing = true;
    building.demolishTime = 0;
    state.lastDemolishedId = id;
  }
  
  function finishDemolish(building) {
    scene.remove(building.mesh);
    if (building.mesh.geometry) building.mesh.geometry.dispose();
    if (building.mesh.material) building.mesh.material.dispose();
    
    state.grid[building.row][building.col] = null;
    
    const idx = buildingMeshes.indexOf(building);
    if (idx !== -1) buildingMeshes.splice(idx, 1);
    
    updateState();
  }
  
  // ============ DEBUG OVERLAY ============
  function clearDebugObjects() {
    for (const obj of debugObjects) {
      scene.remove(obj);
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) obj.material.dispose();
    }
    debugObjects.length = 0;
  }
  
  function updateDebugOverlay() {
    clearDebugObjects();
    
    if (!state.debugOverlayActive) return;
    
    for (const b of buildingMeshes) {
      if (b.demolishing) continue;
      
      // Wireframe bounding box
      let wireGeo;
      if (b.type === 'park') {
        wireGeo = new THREE.CylinderGeometry(3, 3, 0.5, 16);
      } else {
        wireGeo = new THREE.BoxGeometry(b.width, b.height, b.depth);
      }
      const wireMat = new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true });
      const wireMesh = new THREE.Mesh(wireGeo, wireMat);
      wireMesh.position.copy(b.mesh.position);
      scene.add(wireMesh);
      debugObjects.push(wireMesh);
      
      // Velocity arrow
      if (Math.abs(b.velocity) > 0.01) {
        const dir = new THREE.Vector3(0, b.velocity > 0 ? 1 : -1, 0);
        const length = Math.abs(b.velocity) * 0.2;
        const arrow = new THREE.ArrowHelper(dir, b.mesh.position.clone(), Math.max(length, 0.5), 0x00ff00, 0.5, 0.3);
        scene.add(arrow);
        debugObjects.push(arrow);
      }
    }
  }
  
  // ============ STATE UPDATE ============
  function updateState() {
    const active = buildingMeshes.filter(b => !b.demolishing);
    state.buildingCount = active.length;
    state.totalMass = active.reduce((s, b) => s + b.mass, 0);
    state.averageHeight = active.length > 0 ? active.reduce((s, b) => s + b.height, 0) / active.length : 0;
    
    state.buildings = active.map(b => ({
      id: b.id,
      type: b.type,
      x: b.mesh.position.x,
      z: b.mesh.position.z,
      height: b.height,
      mass: b.mass,
      velocity: b.velocity,
      grounded: b.grounded
    }));
    
    // Update HUD
    const toolEl = document.getElementById('stat-tool');
    toolEl.textContent = state.selectedTool.charAt(0).toUpperCase() + state.selectedTool.slice(1);
    toolEl.className = 'stat-value tool-' + state.selectedTool;
    
    document.getElementById('stat-count').textContent = state.buildingCount;
    document.getElementById('stat-mass').textContent = Math.round(state.totalMass);
    document.getElementById('stat-res').textContent = active.filter(b => b.type === 'residential').length;
    document.getElementById('stat-com').textContent = active.filter(b => b.type === 'commercial').length;
    document.getElementById('stat-park').textContent = active.filter(b => b.type === 'park').length;
    
    // Debug panel
    document.getElementById('dbg-count').textContent = state.buildingCount;
    document.getElementById('dbg-mass').textContent = Math.round(state.totalMass);
    document.getElementById('dbg-avgheight').textContent = state.averageHeight.toFixed(1);
    document.getElementById('dbg-steps').textContent = state.physicsStepCount;
  }
  
  function updateToolbar() {
    document.getElementById('tb-res').className = 'tool-btn' + (state.selectedTool === 'residential' ? ' active' : '');
    document.getElementById('tb-com').className = 'tool-btn' + (state.selectedTool === 'commercial' ? ' active' : '');
    document.getElementById('tb-park').className = 'tool-btn' + (state.selectedTool === 'park' ? ' active' : '');
    document.getElementById('tb-demo').className = 'tool-btn' + (state.demolishMode ? ' active' : '');
    document.getElementById('tb-debug').className = 'tool-btn' + (state.debugOverlayActive ? ' active' : '');
  }
  
  // ============ INPUT ============
  window.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    
    if (key === '1') {
      state.demolishMode = false;
      state.selectedTool = 'residential';
      updateGhost('residential');
    } else if (key === '2') {
      state.demolishMode = false;
      state.selectedTool = 'commercial';
      updateGhost('commercial');
    } else if (key === '3') {
      state.demolishMode = false;
      state.selectedTool = 'park';
      updateGhost('park');
    } else if (key === 'x') {
      state.demolishMode = !state.demolishMode;
      if (state.demolishMode) {
        state.selectedTool = 'demolish';
        updateGhost(null);
      } else {
        state.selectedTool = 'none';
      }
    } else if (key === 'd') {
      state.debugOverlayActive = !state.debugOverlayActive;
      document.getElementById('debug-panel').style.display = state.debugOverlayActive ? 'block' : 'none';
      if (!state.debugOverlayActive) clearDebugObjects();
    }
    
    updateToolbar();
    updateState();
  });
  
  window.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    
    if (ghostMesh && currentGhostType) {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(ground);
      
      if (intersects.length > 0) {
        const point = intersects[0].point;
        const cell = getGridCell(point.x, point.z);
        
        if (cell) {
          const center = getCellCenter(cell.row, cell.col);
          const h = ghostMesh.userData.height || 0.5;
          const restY = currentGhostType === 'park' ? 0.25 : h / 2;
          ghostMesh.position.set(center.x, restY, center.z);
          ghostMesh.visible = true;
        } else {
          ghostMesh.visible = false;
        }
      } else {
        ghostMesh.visible = false;
      }
    }
  });
  
  window.addEventListener('click', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    
    if (state.demolishMode) {
      // Raycast against building meshes
      raycaster.setFromCamera(mouse, camera);
      const meshes = buildingMeshes.filter(b => !b.demolishing).map(b => b.mesh);
      const intersects = raycaster.intersectObjects(meshes);
      
      if (intersects.length > 0) {
        const hitMesh = intersects[0].object;
        const building = buildingMeshes.find(b => b.mesh === hitMesh);
        if (building) {
          demolishBuilding(building.id);
        }
      }
      return;
    }
    
    if (currentGhostType && ghostMesh && ghostMesh.visible) {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(ground);
      
      if (intersects.length > 0) {
        const point = intersects[0].point;
        const cell = getGridCell(point.x, point.z);
        
        if (cell && state.grid[cell.row][cell.col] === null) {
          placeBuilding(currentGhostType, cell.row, cell.col);
        }
      }
    }
  });
  
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  
  // ============ ANIMATION LOOP ============
  let lastTime = performance.now();
  const GRAVITY = -20;
  
  function animate() {
    requestAnimationFrame(animate);
    
    const now = performance.now();
    let dt = (now - lastTime) / 1000;
    lastTime = now;
    dt = Math.min(dt, 0.05); // clamp
    
    // Physics
    let physicsRan = false;
    
    for (const b of buildingMeshes) {
      // Demolish animation
      if (b.demolishing) {
        b.demolishTime += dt;
        const t = Math.min(b.demolishTime / 0.5, 1);
        const scale = 1 - t;
        b.mesh.scale.set(scale, scale, scale);
        
        if (t >= 1) {
          finishDemolish(b);
        }
        continue;
      }
      
      if (!b.grounded) {
        physicsRan = true;
        b.velocity += GRAVITY * dt;
        b.mesh.position.y += b.velocity * dt;
        
        if (b.mesh.position.y <= b.restY) {
          b.mesh.position.y = b.restY;
          b.velocity = -b.velocity * 0.3;
          
          if (Math.abs(b.velocity) < 0.5) {
            b.velocity = 0;
            b.grounded = true;
          }
        }
      }
    }
    
    state.physicsStepCount++;
    
    // Update debug overlay
    if (state.debugOverlayActive) {
      updateDebugOverlay();
    }
    
    updateState();
    controls.update();
    renderer.render(scene, camera);
  }
  
  updateToolbar();
  updateState();
  animate();
})();
</script>
</body>
</html>
