<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depth Buffer Point Cloud Reconstruction</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
  #canvas-container { width: 100vw; height: 100vh; position: relative; }
  canvas { display: block; }

  #controls {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(10, 10, 20, 0.88);
    border: 1px solid rgba(100, 140, 255, 0.3);
    border-radius: 12px;
    padding: 18px 22px;
    min-width: 300px;
    backdrop-filter: blur(12px);
    z-index: 10;
  }
  #controls h2 {
    font-size: 14px;
    font-weight: 600;
    color: #8ab4ff;
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .control-row label {
    font-size: 13px;
    color: #aac;
    min-width: 90px;
  }
  .control-row input[type="range"] {
    flex: 1;
    margin: 0 10px;
    accent-color: #5588ff;
  }
  .control-row .val {
    font-size: 12px;
    color: #7af;
    min-width: 42px;
    text-align: right;
    font-family: monospace;
  }
  .control-row select {
    flex: 1;
    margin-left: 10px;
    background: #1a1a2e;
    color: #aac;
    border: 1px solid #335;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 13px;
  }

  #info-panel {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: rgba(10, 10, 20, 0.85);
    border: 1px solid rgba(100, 140, 255, 0.2);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 12px;
    font-family: monospace;
    color: #8ab4ff;
    line-height: 1.7;
    backdrop-filter: blur(10px);
    z-index: 10;
  }

  #depth-preview {
    position: absolute;
    top: 16px;
    right: 16px;
    border: 1px solid rgba(100, 140, 255, 0.3);
    border-radius: 8px;
    overflow: hidden;
    z-index: 10;
  }
  #depth-preview canvas {
    display: block;
    width: 180px;
    height: 180px;
    image-rendering: pixelated;
  }
  #depth-preview .label {
    background: rgba(10, 10, 20, 0.9);
    text-align: center;
    font-size: 11px;
    color: #7af;
    padding: 4px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div id="canvas-container">
  <div id="controls">
    <h2>Depth → Point Cloud</h2>
    <div class="control-row">
      <label>FOV</label>
      <input type="range" id="fov" min="30" max="90" value="60" step="1">
      <span class="val" id="fov-val">60°</span>
    </div>
    <div class="control-row">
      <label>Aspect</label>
      <input type="range" id="aspect" min="0.5" max="2.0" value="1.0" step="0.01">
      <span class="val" id="aspect-val">1.00</span>
    </div>
    <div class="control-row">
      <label>Point Size</label>
      <input type="range" id="pointSize" min="0.5" max="8.0" value="2.0" step="0.1">
      <span class="val" id="pointSize-val">2.0</span>
    </div>
    <div class="control-row">
      <label>Render Mode</label>
      <select id="renderMode">
        <option value="pointcloud">Point Cloud</option>
        <option value="depth">Depth Map</option>
        <option value="rgb">RGB Scene</option>
      </select>
    </div>
  </div>

  <div id="depth-preview">
    <canvas id="depthCanvas" width="256" height="256"></canvas>
    <div class="label">DEPTH BUFFER 256×256</div>
  </div>

  <div id="info-panel">
    <div id="info-text">Loading...</div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Constants ───
const DEPTH_W = 256;
const DEPTH_H = 256;
const NEAR = 0.5;
const FAR = 50;

// ─── State ───
window.__3D_STATE__ = {
  pointCount: 0,
  depthRange: { near: NEAR, far: FAR },
  fov: 60,
  aspect: 1.0,
  pointSize: 2.0,
  renderMode: 'pointcloud',
  cameraPos: { x: 0, y: 0, z: 0 }
};

// ─── Main Renderer ───
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x0a0a14);
document.getElementById('canvas-container').appendChild(renderer.domElement);

// ─── Main Camera (viewer) ───
const mainCamera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
mainCamera.position.set(12, 10, 15);

// ─── Orbit Controls ───
const controls = new OrbitControls(mainCamera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// ─── Scene with objects (the "source" scene) ───
const sourceScene = new THREE.Scene();
sourceScene.background = new THREE.Color(0x111122);

// Lights for source scene
const ambLight = new THREE.AmbientLight(0x404060, 0.6);
sourceScene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 10, 7);
sourceScene.add(dirLight);
const pointLight = new THREE.PointLight(0xff6644, 0.8, 30);
pointLight.position.set(-3, 4, -2);
sourceScene.add(pointLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x334455, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1.5;
sourceScene.add(ground);

// Create objects
const objects = [];
function addBox(x, y, z, w, h, d, color) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.5, metalness: 0.2 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  sourceScene.add(mesh);
  objects.push(mesh);
  return mesh;
}
function addSphere(x, y, z, r, color) {
  const geo = new THREE.SphereGeometry(r, 24, 24);
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.3, metalness: 0.4 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  sourceScene.add(mesh);
  objects.push(mesh);
  return mesh;
}
function addCylinder(x, y, z, rTop, rBot, h, color) {
  const geo = new THREE.CylinderGeometry(rTop, rBot, h, 24);
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.3 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  sourceScene.add(mesh);
  objects.push(mesh);
  return mesh;
}

addBox(0, 0, 0, 2, 2, 2, 0xff4444);
addBox(-3, 0.5, 2, 1.5, 3, 1.5, 0x44ff44);
addBox(3, -0.5, -1, 1, 1, 3, 0x4488ff);
addSphere(2, 1, 3, 1.2, 0xffaa22);
addSphere(-2, 0, -3, 0.8, 0xff44ff);
addSphere(0, 2, -2, 0.6, 0x44ffff);
addCylinder(4, 0, 1, 0.5, 0.5, 3, 0xaaff44);
addCylinder(-4, -0.5, -1, 0.8, 0.3, 2, 0xff8844);
addBox(1, -1, 5, 3, 0.5, 1, 0x8844ff);
addSphere(-1, 1.5, 4, 1.0, 0xffff44);

// ─── Depth Camera (the one that produces the depth buffer) ───
let depthFov = 60;
let depthAspect = 1.0;
const depthCamera = new THREE.PerspectiveCamera(depthFov, depthAspect, NEAR, FAR);
depthCamera.position.set(0, 3, 10);
depthCamera.lookAt(0, 0, 0);

// ─── Depth Render Target ───
const depthTarget = new THREE.WebGLRenderTarget(DEPTH_W, DEPTH_H, {
  minFilter: THREE.NearestFilter,
  magFilter: THREE.NearestFilter,
  type: THREE.FloatType
});
depthTarget.depthTexture = new THREE.DepthTexture(DEPTH_W, DEPTH_H);
depthTarget.depthTexture.format = THREE.DepthFormat;
depthTarget.depthTexture.type = THREE.FloatType;

// ─── Depth read buffer ───
const depthReadBuffer = new Float32Array(DEPTH_W * DEPTH_H);
const colorReadBuffer = new Float32Array(DEPTH_W * DEPTH_H * 4);

// ─── Depth visualization material (for reading depth via a shader pass) ───
const depthReadMaterial = new THREE.ShaderMaterial({
  uniforms: {
    tDepth: { value: null },
    cameraNear: { value: NEAR },
    cameraFar: { value: FAR }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDepth;
    uniform float cameraNear;
    uniform float cameraFar;
    varying vec2 vUv;

    float linearizeDepth(float d) {
      return cameraNear * cameraFar / (cameraFar - d * (cameraFar - cameraNear));
    }

    void main() {
      float depth = texture2D(tDepth, vUv).r;
      float linear = linearizeDepth(depth);
      float normalized = (linear - cameraNear) / (cameraFar - cameraNear);
      gl_FragColor = vec4(normalized, linear, depth, 1.0);
    }
  `
});

// Render target for linearized depth
const linearDepthTarget = new THREE.WebGLRenderTarget(DEPTH_W, DEPTH_H, {
  minFilter: THREE.NearestFilter,
  magFilter: THREE.NearestFilter,
  type: THREE.FloatType,
  format: THREE.RGBAFormat
});

const quadScene = new THREE.Scene();
const quadCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const quadGeo = new THREE.PlaneGeometry(2, 2);
const quadMesh = new THREE.Mesh(quadGeo, depthReadMaterial);
quadScene.add(quadMesh);

// ─── Point Cloud ───
const maxPoints = DEPTH_W * DEPTH_H;
const pcPositions = new Float32Array(maxPoints * 3);
const pcColors = new Float32Array(maxPoints * 3);

const pcGeometry = new THREE.BufferGeometry();
pcGeometry.setAttribute('position', new THREE.BufferAttribute(pcPositions, 3));
pcGeometry.setAttribute('color', new THREE.BufferAttribute(pcColors, 3));

const pcMaterial = new THREE.PointsMaterial({
  size: 2.0,
  vertexColors: true,
  sizeAttenuation: true
});

const pointCloud = new THREE.Points(pcGeometry, pcMaterial);

// ─── Display Scene ───
const displayScene = new THREE.Scene();
displayScene.background = new THREE.Color(0x0a0a14);
displayScene.add(pointCloud);

// Grid helper
const gridHelper = new THREE.GridHelper(20, 20, 0x222244, 0x181830);
displayScene.add(gridHelper);

// Axes
const axesHelper = new THREE.AxesHelper(3);
displayScene.add(axesHelper);

// Frustum visualization
const frustumGroup = new THREE.Group();
displayScene.add(frustumGroup);

// Also add source scene objects as wireframes for reference
const wireframeGroup = new THREE.Group();
displayScene.add(wireframeGroup);

function updateWireframes() {
  while (wireframeGroup.children.length > 0) wireframeGroup.remove(wireframeGroup.children[0]);
  objects.forEach(obj => {
    const wireGeo = new THREE.WireframeGeometry(obj.geometry);
    const wireMat = new THREE.LineBasicMaterial({ color: 0x334466, opacity: 0.3, transparent: true });
    const wire = new THREE.LineSegments(wireGeo, wireMat);
    wire.position.copy(obj.position);
    wire.rotation.copy(obj.rotation);
    wire.scale.copy(obj.scale);
    wireframeGroup.add(wire);
  });
  // Ground wireframe
  const gWire = new THREE.WireframeGeometry(groundGeo);
  const gMat = new THREE.LineBasicMaterial({ color: 0x223344, opacity: 0.15, transparent: true });
  const gLine = new THREE.LineSegments(gWire, gMat);
  gLine.rotation.x = -Math.PI / 2;
  gLine.position.y = -1.5;
  wireframeGroup.add(gLine);
}
updateWireframes();

// Camera frustum lines
function updateFrustumVis() {
  while (frustumGroup.children.length > 0) frustumGroup.remove(frustumGroup.children[0]);

  const halfFovRad = THREE.MathUtils.degToRad(depthFov / 2);
  const nearH = Math.tan(halfFovRad) * NEAR;
  const nearW = nearH * depthAspect;
  const farH = Math.tan(halfFovRad) * FAR;
  const farW = farH * depthAspect;

  const corners = [
    // near plane
    new THREE.Vector3(-nearW, -nearH, -NEAR),
    new THREE.Vector3(nearW, -nearH, -NEAR),
    new THREE.Vector3(nearW, nearH, -NEAR),
    new THREE.Vector3(-nearW, nearH, -NEAR),
    // far plane
    new THREE.Vector3(-farW, -farH, -FAR),
    new THREE.Vector3(farW, -farH, -FAR),
    new THREE.Vector3(farW, farH, -FAR),
    new THREE.Vector3(-farW, farH, -FAR),
  ];

  // Transform to world
  const camMatrix = depthCamera.matrixWorld;
  corners.forEach(c => c.applyMatrix4(camMatrix));

  const linePoints = [];
  // Near rect
  for (let i = 0; i < 4; i++) {
    linePoints.push(corners[i], corners[(i + 1) % 4]);
  }
  // Far rect
  for (let i = 0; i < 4; i++) {
    linePoints.push(corners[4 + i], corners[4 + (i + 1) % 4]);
  }
  // Edges
  for (let i = 0; i < 4; i++) {
    linePoints.push(corners[i], corners[i + 4]);
  }

  const frustGeo = new THREE.BufferGeometry().setFromPoints(linePoints);
  const frustMat = new THREE.LineBasicMaterial({ color: 0x5588ff, opacity: 0.5, transparent: true });
  const frustLines = new THREE.LineSegments(frustGeo, frustMat);
  frustumGroup.add(frustLines);

  // Camera position marker
  const camMarkerGeo = new THREE.SphereGeometry(0.15, 8, 8);
  const camMarkerMat = new THREE.MeshBasicMaterial({ color: 0xff4444 });
  const camMarker = new THREE.Mesh(camMarkerGeo, camMarkerMat);
  camMarker.position.copy(depthCamera.position);
  frustumGroup.add(camMarker);
}

// ─── Depth-to-color mapping ───
function depthToColor(normalizedDepth, outColor, offset) {
  // Warm (near) to cool (far): red/orange → blue/purple
  const t = Math.max(0, Math.min(1, normalizedDepth));

  let r, g, b;
  if (t < 0.25) {
    const s = t / 0.25;
    r = 1.0; g = s * 0.6; b = 0.0;
  } else if (t < 0.5) {
    const s = (t - 0.25) / 0.25;
    r = 1.0 - s * 0.5; g = 0.6 + s * 0.4; b = s * 0.2;
  } else if (t < 0.75) {
    const s = (t - 0.5) / 0.25;
    r = 0.5 - s * 0.4; g = 1.0 - s * 0.5; b = 0.2 + s * 0.6;
  } else {
    const s = (t - 0.75) / 0.25;
    r = 0.1 + s * 0.2; g = 0.5 - s * 0.3; b = 0.8 + s * 0.2;
  }

  outColor[offset] = r;
  outColor[offset + 1] = g;
  outColor[offset + 2] = b;
}

// ─── Depth Canvas (preview) ───
const depthCanvas = document.getElementById('depthCanvas');
const depthCtx = depthCanvas.getContext('2d');
const depthImageData = depthCtx.createImageData(DEPTH_W, DEPTH_H);

// ─── Full-screen quad for depth/rgb display ───
const fullscreenScene = new THREE.Scene();
const fullscreenCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

// Depth display material
const depthDisplayMat = new THREE.ShaderMaterial({
  uniforms: {
    tDepth: { value: null },
    cameraNear: { value: NEAR },
    cameraFar: { value: FAR }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = vec4(position.xy, 0.0, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDepth;
    uniform float cameraNear;
    uniform float cameraFar;
    varying vec2 vUv;

    float linearizeDepth(float d) {
      return cameraNear * cameraFar / (cameraFar - d * (cameraFar - cameraNear));
    }

    vec3 depthColor(float t) {
      if (t < 0.25) {
        float s = t / 0.25;
        return vec3(1.0, s * 0.6, 0.0);
      } else if (t < 0.5) {
        float s = (t - 0.25) / 0.25;
        return vec3(1.0 - s * 0.5, 0.6 + s * 0.4, s * 0.2);
      } else if (t < 0.75) {
        float s = (t - 0.5) / 0.25;
        return vec3(0.5 - s * 0.4, 1.0 - s * 0.5, 0.2 + s * 0.6);
      } else {
        float s = (t - 0.75) / 0.25;
        return vec3(0.1 + s * 0.2, 0.5 - s * 0.3, 0.8 + s * 0.2);
      }
    }

    void main() {
      float depth = texture2D(tDepth, vUv).r;
      float linear = linearizeDepth(depth);
      float t = clamp((linear - cameraNear) / (cameraFar - cameraNear), 0.0, 1.0);
      vec3 col = depthColor(t);
      gl_FragColor = vec4(col, 1.0);
    }
  `
});

// RGB display: render color target
const colorTarget = new THREE.WebGLRenderTarget(DEPTH_W, DEPTH_H);
const rgbDisplayMat = new THREE.ShaderMaterial({
  uniforms: {
    tColor: { value: null }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = vec4(position.xy, 0.0, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tColor;
    varying vec2 vUv;
    void main() {
      gl_FragColor = texture2D(tColor, vUv);
    }
  `
});

const fullscreenQuadGeo = new THREE.PlaneGeometry(2, 2);
const fullscreenQuad = new THREE.Mesh(fullscreenQuadGeo, depthDisplayMat);
fullscreenScene.add(fullscreenQuad);

// ─── UI Elements ───
const fovSlider = document.getElementById('fov');
const aspectSlider = document.getElementById('aspect');
const pointSizeSlider = document.getElementById('pointSize');
const renderModeSelect = document.getElementById('renderMode');
const fovVal = document.getElementById('fov-val');
const aspectVal = document.getElementById('aspect-val');
const pointSizeVal = document.getElementById('pointSize-val');
const infoText = document.getElementById('info-text');

let currentRenderMode = 'pointcloud';
let currentPointSize = 2.0;
let lastPointCount = 0;

fovSlider.addEventListener('input', () => {
  depthFov = parseFloat(fovSlider.value);
  fovVal.textContent = depthFov + '°';
});

aspectSlider.addEventListener('input', () => {
  depthAspect = parseFloat(aspectSlider.value);
  aspectVal.textContent = depthAspect.toFixed(2);
});

pointSizeSlider.addEventListener('input', () => {
  currentPointSize = parseFloat(pointSizeSlider.value);
  pointSizeVal.textContent = currentPointSize.toFixed(1);
  pcMaterial.size = currentPointSize;
});

renderModeSelect.addEventListener('change', () => {
  currentRenderMode = renderModeSelect.value;
});

// ─── Rebuild point cloud from depth ───
function rebuildPointCloud(linearDepthData) {
  const halfFovRad = THREE.MathUtils.degToRad(depthFov / 2);
  const fy = DEPTH_H / (2.0 * Math.tan(halfFovRad));
  const fx = fy * depthAspect;
  const cx = DEPTH_W / 2;
  const cy = DEPTH_H / 2;

  const camMatrixWorld = depthCamera.matrixWorld;

  let count = 0;
  let minDepth = Infinity;
  let maxDepth = -Infinity;

  for (let y = 0; y < DEPTH_H; y++) {
    for (let x = 0; x < DEPTH_W; x++) {
      const idx = y * DEPTH_W + x;
      const normalized = linearDepthData[idx * 4]; // normalized depth
      const linearZ = linearDepthData[idx * 4 + 1]; // linear depth
      const rawDepth = linearDepthData[idx * 4 + 2]; // raw depth

      // Skip background (depth ~= 1.0 means far plane)
      if (rawDepth >= 0.9999) continue;
      if (linearZ <= NEAR || linearZ >= FAR * 0.99) continue;

      // Pinhole back-projection: camera coords
      // Note: in camera space, z is negative (looking down -Z)
      const z_cam = -linearZ;
      // Flip y because texture is bottom-up but we iterate top-down
      const x_cam = ((x - cx) / fx) * linearZ;
      const y_cam = -((y - cy) / fy) * linearZ; // flip y

      // Transform to world space
      const worldPos = new THREE.Vector3(x_cam, y_cam, z_cam);
      worldPos.applyMatrix4(camMatrixWorld);

      const i3 = count * 3;
      pcPositions[i3] = worldPos.x;
      pcPositions[i3 + 1] = worldPos.y;
      pcPositions[i3 + 2] = worldPos.z;

      depthToColor(normalized, pcColors, i3);

      if (linearZ < minDepth) minDepth = linearZ;
      if (linearZ > maxDepth) maxDepth = linearZ;

      count++;
    }
  }

  // Zero out remaining
  for (let i = count * 3; i < maxPoints * 3; i++) {
    pcPositions[i] = 0;
    pcColors[i] = 0;
  }

  pcGeometry.attributes.position.needsUpdate = true;
  pcGeometry.attributes.color.needsUpdate = true;
  pcGeometry.setDrawRange(0, count);

  lastPointCount = count;
  return { count, minDepth, maxDepth };
}

// ─── Update depth preview canvas ───
function updateDepthPreview(linearDepthData) {
  const pixels = depthImageData.data;
  for (let i = 0; i < DEPTH_W * DEPTH_H; i++) {
    const normalized = linearDepthData[i * 4];
    const t = Math.max(0, Math.min(1, normalized));

    let r, g, b;
    if (t < 0.25) {
      const s = t / 0.25;
      r = 255; g = Math.floor(s * 153); b = 0;
    } else if (t < 0.5) {
      const s = (t - 0.25) / 0.25;
      r = Math.floor(255 - s * 127); g = Math.floor(153 + s * 102); b = Math.floor(s * 51);
    } else if (t < 0.75) {
      const s = (t - 0.5) / 0.25;
      r = Math.floor(128 - s * 102); g = Math.floor(255 - s * 127); b = Math.floor(51 + s * 153);
    } else {
      const s = (t - 0.75) / 0.25;
      r = Math.floor(26 + s * 51); g = Math.floor(128 - s * 77); b = Math.floor(204 + s * 51);
    }

    pixels[i * 4] = r;
    pixels[i * 4 + 1] = g;
    pixels[i * 4 + 2] = b;
    pixels[i * 4 + 3] = 255;
  }
  depthCtx.putImageData(depthImageData, 0, 0);
}

// ─── Animation ───
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime();

  // Animate some objects slightly
  objects[0].rotation.y = t * 0.3;
  objects[3].position.y = 1 + Math.sin(t * 1.2) * 0.5;
  objects[5].position.y = 2 + Math.cos(t * 0.8) * 0.3;

  // Update depth camera
  depthCamera.fov = depthFov;
  depthCamera.aspect = depthAspect;
  depthCamera.updateProjectionMatrix();
  depthCamera.updateMatrixWorld();

  // ─── Render depth pass ───
  renderer.setRenderTarget(depthTarget);
  renderer.render(sourceScene, depthCamera);

  // ─── Linearize depth ───
  depthReadMaterial.uniforms.tDepth.value = depthTarget.depthTexture;
  depthReadMaterial.uniforms.cameraNear.value = NEAR;
  depthReadMaterial.uniforms.cameraFar.value = FAR;

  renderer.setRenderTarget(linearDepthTarget);
  renderer.render(quadScene, quadCamera);

  // Read linearized depth
  renderer.readRenderTargetPixels(linearDepthTarget, 0, 0, DEPTH_W, DEPTH_H, colorReadBuffer);

  // Rebuild point cloud
  const pcInfo = rebuildPointCloud(colorReadBuffer);

  // Update depth preview
  updateDepthPreview(colorReadBuffer);

  // Update frustum visualization
  updateFrustumVis();

  // ─── Main render ───
  renderer.setRenderTarget(null);
  renderer.setSize(window.innerWidth, window.innerHeight);

  controls.update();

  if (currentRenderMode === 'pointcloud') {
    pointCloud.visible = true;
    wireframeGroup.visible = true;
    frustumGroup.visible = true;
    renderer.render(displayScene, mainCamera);
  } else if (currentRenderMode === 'depth') {
    depthDisplayMat.uniforms.tDepth.value = depthTarget.depthTexture;
    depthDisplayMat.uniforms.cameraNear.value = NEAR;
    depthDisplayMat.uniforms.cameraFar.value = FAR;
    fullscreenQuad.material = depthDisplayMat;
    renderer.render(fullscreenScene, fullscreenCamera);
  } else if (currentRenderMode === 'rgb') {
    // Render color
    renderer.setRenderTarget(colorTarget);
    renderer.render(sourceScene, depthCamera);
    renderer.setRenderTarget(null);
    rgbDisplayMat.uniforms.tColor.value = colorTarget.texture;
    fullscreenQuad.material = rgbDisplayMat;
    renderer.render(fullscreenScene, fullscreenCamera);
  }

  // ─── Update state ───
  const camPos = mainCamera.position;
  window.__3D_STATE__ = {
    pointCount: currentRenderMode === 'pointcloud' ? lastPointCount : lastPointCount,
    depthRange: {
      near: pcInfo.minDepth === Infinity ? NEAR : parseFloat(pcInfo.minDepth.toFixed(3)),
      far: pcInfo.maxDepth === -Infinity ? FAR : parseFloat(pcInfo.maxDepth.toFixed(3))
    },
    fov: depthFov,
    aspect: depthAspect,
    pointSize: currentPointSize,
    renderMode: currentRenderMode,
    cameraPos: {
      x: parseFloat(camPos.x.toFixed(2)),
      y: parseFloat(camPos.y.toFixed(2)),
      z: parseFloat(camPos.z.toFixed(2))
    }
  };

  // ─── Update info panel ───
  infoText.innerHTML = `
Points: <span style="color:#ff8">${lastPointCount.toLocaleString()}</span> / ${maxPoints.toLocaleString()}<br>
Depth Range: <span style="color:#8ff">${window.__3D_STATE__.depthRange.near.toFixed(2)}</span> → <span style="color:#88f">${window.__3D_STATE__.depthRange.far.toFixed(2)}</span><br>
FOV: <span style="color:#f88">${depthFov}°</span> | Aspect: <span style="color:#8f8">${depthAspect.toFixed(2)}</span><br>
Mode: <span style="color:#fa8">${currentRenderMode}</span> | PtSize: <span style="color:#aaf">${currentPointSize.toFixed(1)}</span><br>
Camera: (${camPos.x.toFixed(1)}, ${camPos.y.toFixed(1)}, ${camPos.z.toFixed(1)})
  `.trim();
}

// ─── Resize ───
window.addEventListener('resize', () => {
  mainCamera.aspect = window.innerWidth / window.innerHeight;
  mainCamera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
