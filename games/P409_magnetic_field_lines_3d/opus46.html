<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Magnetic Field Visualization</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a2e; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(10, 10, 46, 0.85);
  border: 1px solid rgba(100, 150, 255, 0.3);
  border-radius: 10px;
  padding: 15px;
  color: #e0e0ff;
  font-size: 13px;
  max-width: 320px;
  max-height: 90vh;
  overflow-y: auto;
  backdrop-filter: blur(5px);
  z-index: 100;
}

#hud h2 {
  text-align: center;
  color: #88aaff;
  margin-bottom: 10px;
  font-size: 15px;
  border-bottom: 1px solid rgba(100, 150, 255, 0.3);
  padding-bottom: 8px;
}

.control-group {
  margin-bottom: 8px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(100, 150, 255, 0.1);
}

.control-group label {
  display: block;
  margin-bottom: 4px;
  color: #aabbee;
  font-size: 12px;
}

input[type="range"] {
  width: 100%;
  accent-color: #6688ff;
}

button {
  background: rgba(60, 80, 180, 0.6);
  color: #e0e0ff;
  border: 1px solid rgba(100, 150, 255, 0.4);
  padding: 6px 12px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  margin: 3px 2px;
  transition: background 0.2s;
}

button:hover { background: rgba(80, 100, 200, 0.8); }
button.active { background: rgba(100, 200, 100, 0.5); border-color: rgba(100, 255, 100, 0.5); }

select {
  background: rgba(30, 40, 80, 0.8);
  color: #e0e0ff;
  border: 1px solid rgba(100, 150, 255, 0.4);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 12px;
}

.status-line {
  font-size: 11px;
  padding: 2px 0;
  color: #99aadd;
}

.status-line span {
  color: #bbddff;
  font-weight: bold;
}

.checkbox-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.checkbox-group input { accent-color: #6688ff; }

#instructions {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10, 10, 46, 0.8);
  color: #8899cc;
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 12px;
  text-align: center;
  z-index: 100;
}
</style>
</head>
<body>

<div id="hud">
  <h2>🧲 Magnetic Field Explorer</h2>
  
  <div class="control-group">
    <label>Magnet Rotation</label>
    <input type="range" id="magnet-rotation-slider" min="0" max="360" value="0" step="1">
    <div class="status-line" id="angle-display">Magnet Angle: 0°</div>
  </div>

  <div class="control-group">
    <button id="toggle-field-lines">Toggle Field Lines</button>
    <button id="toggle-grid-arrows">Toggle Grid Arrows</button>
  </div>

  <div class="control-group">
    <button id="add-second-magnet">Add Second Magnet</button>
  </div>

  <div class="control-group">
    <label>Field Plane</label>
    <select id="field-plane-select">
      <option value="XZ">XZ (y=0)</option>
      <option value="XY">XY (z=0)</option>
      <option value="YZ">YZ (x=0)</option>
    </select>
  </div>

  <div class="control-group">
    <div class="checkbox-group">
      <input type="checkbox" id="animate-particles">
      <label for="animate-particles">Animate Particles</label>
    </div>
  </div>

  <div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(100,150,255,0.3);">
    <div class="status-line" id="probe-position">Probe Position: (8.0, 0.0, 0.0)</div>
    <div class="status-line" id="field-strength-display">Field Strength at Probe: 0.000 T</div>
    <div class="status-line" id="lines-status">Field Lines Visible: <span>true</span></div>
    <div class="status-line" id="grid-status">Grid Arrows Visible: <span>true</span></div>
    <div class="status-line" id="second-magnet-status">Second Magnet: <span>inactive</span></div>
    <div class="status-line" id="plane-status">Active Plane: <span>XZ</span></div>
    <div class="status-line" id="particles-status">Particles Animating: <span>false</span></div>
  </div>
</div>

<div id="instructions">
  WASD to move probe truck | Mouse drag to orbit | Scroll to zoom
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
  sceneReady: false,
  magnetAngle: 0,
  truckPosition: { x: 8, y: 0, z: 0 },
  fieldStrengthAtProbe: 0,
  fieldLinesVisible: true,
  gridArrowsVisible: true,
  secondMagnetActive: false,
  activePlane: 'XZ',
  particlesAnimating: false,
  particleCount: 0,
  fieldLineCount: 16,
  gridArrowCount: 100,
  truckLoaded: false,
  magnetPosition: { x: 0, y: 0, z: 0 },
  secondMagnetPosition: null
};

const state = window.__3D_STATE__;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(10, 10, 10);
scene.add(dirLight);

// Ground grid for reference
const gridHelper = new THREE.GridHelper(20, 20, 0x222255, 0x111133);
scene.add(gridHelper);

// ============ BAR MAGNET ============
const magnetGroup = new THREE.Group();
scene.add(magnetGroup);

function createBarMagnet() {
  const group = new THREE.Group();
  
  // North pole (red)
  const northGeo = new THREE.BoxGeometry(1, 0.8, 0.5);
  const northMat = new THREE.MeshPhongMaterial({ color: 0xff0000, emissive: 0x330000 });
  const northMesh = new THREE.Mesh(northGeo, northMat);
  northMesh.position.x = 0.5;
  group.add(northMesh);
  
  // South pole (blue)
  const southGeo = new THREE.BoxGeometry(1, 0.8, 0.5);
  const southMat = new THREE.MeshPhongMaterial({ color: 0x0000ff, emissive: 0x000033 });
  const southMesh = new THREE.Mesh(southGeo, southMat);
  southMesh.position.x = -0.5;
  group.add(southMesh);
  
  // Labels
  const nSprite = makeTextSprite('N', { fontsize: 64, color: '#ffffff' });
  nSprite.position.set(0.5, 0.6, 0.3);
  nSprite.scale.set(0.5, 0.5, 0.5);
  group.add(nSprite);
  
  const sSprite = makeTextSprite('S', { fontsize: 64, color: '#ffffff' });
  sSprite.position.set(-0.5, 0.6, 0.3);
  sSprite.scale.set(0.5, 0.5, 0.5);
  group.add(sSprite);
  
  return group;
}

function makeTextSprite(text, params) {
  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = params.color || '#ffffff';
  ctx.font = `Bold ${params.fontsize || 48}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 64, 64);
  
  const texture = new THREE.CanvasTexture(canvas);
  const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
  return new THREE.Sprite(material);
}

const magnet1 = createBarMagnet();
magnetGroup.add(magnet1);

let magnet2 = null;
let magnet2Group = null;

// ============ DIPOLE FIELD CALCULATION ============
function dipoleField(pos, magnetCenter, magnetAngle) {
  // Magnetic moment direction based on angle (points from S to N, i.e., +x in local frame)
  const angleRad = magnetAngle * Math.PI / 180;
  const mx = Math.cos(angleRad);
  const mz = -Math.sin(angleRad);
  const my = 0;
  
  const dx = pos.x - magnetCenter.x;
  const dy = pos.y - magnetCenter.y;
  const dz = pos.z - magnetCenter.z;
  
  const r = Math.sqrt(dx * dx + dy * dy + dz * dz);
  if (r < 0.3) return new THREE.Vector3(mx, 0, mz).multiplyScalar(5); // Inside magnet
  
  const r3 = r * r * r;
  const r5 = r3 * r * r;
  
  // B = (mu0/4pi) * (3(m·r̂)r̂ - m) / r³
  const mDotR = mx * dx + my * dy + mz * dz;
  
  const bx = (3 * mDotR * dx / (r5) - mx / r3);
  const by = (3 * mDotR * dy / (r5) - my / r3);
  const bz = (3 * mDotR * dz / (r5) - mz / r3);
  
  return new THREE.Vector3(bx, by, bz);
}

function totalField(pos) {
  const b1 = dipoleField(pos, new THREE.Vector3(0, 0, 0), state.magnetAngle);
  if (state.secondMagnetActive) {
    const b2 = dipoleField(pos, new THREE.Vector3(5, 0, 0), state.magnetAngle);
    b1.add(b2);
  }
  return b1;
}

function fieldStrength(pos) {
  const b = totalField(pos);
  return b.length();
}

// ============ FIELD LINES ============
const fieldLinesGroup = new THREE.Group();
scene.add(fieldLinesGroup);

function generateFieldLinePoints(startPoint, steps, stepSize) {
  const points = [];
  const pos = startPoint.clone();
  points.push(pos.clone());
  
  for (let i = 0; i < steps; i++) {
    const field = totalField(pos);
    const mag = field.length();
    if (mag < 0.0001) break;
    
    field.normalize().multiplyScalar(stepSize);
    pos.add(field);
    points.push(pos.clone());
    
    // Stop if too far
    if (pos.length() > 12) break;
    
    // Stop if returned near south pole
    const magnetCenter = new THREE.Vector3(0, 0, 0);
    const angleRad = state.magnetAngle * Math.PI / 180;
    const southPole = new THREE.Vector3(
      -Math.cos(angleRad) * 0.5 + magnetCenter.x,
      0,
      Math.sin(angleRad) * 0.5 + magnetCenter.z
    );
    if (pos.distanceTo(southPole) < 0.4 && i > 10) break;
    
    if (state.secondMagnetActive) {
      const southPole2 = new THREE.Vector3(
        -Math.cos(angleRad) * 0.5 + 5,
        0,
        Math.sin(angleRad) * 0.5
      );
      if (pos.distanceTo(southPole2) < 0.4 && i > 10) break;
    }
  }
  
  return points;
}

function createFieldLines() {
  // Clear existing
  while (fieldLinesGroup.children.length > 0) {
    const child = fieldLinesGroup.children[0];
    fieldLinesGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
    if (child.material) {
      if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
      else child.material.dispose();
    }
  }
  
  const angleRad = state.magnetAngle * Math.PI / 180;
  const northDir = new THREE.Vector3(Math.cos(angleRad), 0, -Math.sin(angleRad));
  const magnetCenters = [new THREE.Vector3(0, 0, 0)];
  if (state.secondMagnetActive) magnetCenters.push(new THREE.Vector3(5, 0, 0));
  
  let lineCount = 0;
  
  for (const center of magnetCenters) {
    const northPole = center.clone().add(northDir.clone().multiplyScalar(0.5));
    
    // Generate start points around north pole
    const startAngles = [];
    const linesPerMagnet = state.secondMagnetActive ? 8 : 16;
    
    for (let i = 0; i < linesPerMagnet; i++) {
      const theta = (i / linesPerMagnet) * Math.PI * 2;
      startAngles.push(theta);
    }
    
    for (const theta of startAngles) {
      // Create start point on surface of north pole
      const perpX = -Math.sin(angleRad);
      const perpZ = -Math.cos(angleRad);
      
      const offsetY = Math.sin(theta) * 0.3;
      const offsetPerp = Math.cos(theta) * 0.3;
      
      const startPoint = new THREE.Vector3(
        northPole.x + perpX * offsetPerp + northDir.x * 0.2,
        northPole.y + offsetY,
        northPole.z + perpZ * offsetPerp + northDir.z * 0.2
      );
      
      const points = generateFieldLinePoints(startPoint, 300, 0.15);
      
      if (points.length < 3) continue;
      
      // Create tube
      const curve = new THREE.CatmullRomCurve3(points);
      const tubeGeo = new THREE.TubeGeometry(curve, Math.min(points.length * 2, 200), 0.03, 6, false);
      
      // Vertex colors: red near N, blue near S
      const colors = [];
      const posAttr = tubeGeo.attributes.position;
      for (let i = 0; i < posAttr.count; i++) {
        const t = i / posAttr.count;
        const r = 1.0 - t;
        const g = 0.2;
        const b = t;
        colors.push(r, g, b);
      }
      tubeGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
      
      const tubeMat = new THREE.MeshBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.8 });
      const tubeMesh = new THREE.Mesh(tubeGeo, tubeMat);
      fieldLinesGroup.add(tubeMesh);
      
      // Add direction arrows along the line
      const arrowCount = Math.min(Math.floor(points.length / 20), 5);
      for (let a = 1; a <= arrowCount; a++) {
        const t = a / (arrowCount + 1);
        const pt = curve.getPointAt(t);
        const tangent = curve.getTangentAt(t);
        
        const coneGeo = new THREE.ConeGeometry(0.06, 0.18, 6);
        const tColor = new THREE.Color().setRGB(1 - t, 0.3, t);
        const coneMat = new THREE.MeshBasicMaterial({ color: tColor });
        const cone = new THREE.Mesh(coneGeo, coneMat);
        cone.position.copy(pt);
        
        // Orient cone along tangent
        const up = new THREE.Vector3(0, 1, 0);
        const quat = new THREE.Quaternion().setFromUnitVectors(up, tangent.normalize());
        cone.quaternion.copy(quat);
        
        fieldLinesGroup.add(cone);
      }
      
      lineCount++;
    }
  }
  
  state.fieldLineCount = lineCount;
  fieldLinesGroup.visible = state.fieldLinesVisible;
}

// ============ GRID ARROWS ============
const gridArrowsGroup = new THREE.Group();
scene.add(gridArrowsGroup);

function createGridArrows() {
  // Clear existing
  while (gridArrowsGroup.children.length > 0) {
    const child = gridArrowsGroup.children[0];
    gridArrowsGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
    if (child.material) {
      if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
      else child.material.dispose();
    }
  }
  
  const gridSize = 10;
  const spacing = 1.5;
  const offset = (gridSize - 1) * spacing / 2;
  let arrowCount = 0;
  
  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      let pos;
      const a = i * spacing - offset;
      const b = j * spacing - offset;
      
      switch (state.activePlane) {
        case 'XZ': pos = new THREE.Vector3(a, 0, b); break;
        case 'XY': pos = new THREE.Vector3(a, b, 0); break;
        case 'YZ': pos = new THREE.Vector3(0, a, b); break;
        default: pos = new THREE.Vector3(a, 0, b);
      }
      
      // Skip if too close to magnet
      const distToMag1 = pos.distanceTo(new THREE.Vector3(0, 0, 0));
      const distToMag2 = state.secondMagnetActive ? pos.distanceTo(new THREE.Vector3(5, 0, 0)) : 999;
      if (distToMag1 < 1.2 || distToMag2 < 1.2) continue;
      
      const field = totalField(pos);
      const mag = field.length();
      
      if (mag < 0.001 || !isFinite(mag)) continue;
      
      // Scale arrow length
      const maxLen = 1.0;
      const arrowLen = Math.min(mag * 2, maxLen);
      
      // Color by strength
      let color;
      if (mag > 0.5) color = new THREE.Color(0xffff00); // strong = yellow
      else if (mag > 0.1) color = new THREE.Color(0x00ff00); // medium = green
      else color = new THREE.Color(0x00ffff); // weak = cyan
      
      // Lerp colors
      const t = Math.min(mag / 0.5, 1);
      if (t > 0.5) {
        color.lerpColors(new THREE.Color(0x00ff00), new THREE.Color(0xffff00), (t - 0.5) * 2);
      } else {
        color.lerpColors(new THREE.Color(0x00ffff), new THREE.Color(0x00ff00), t * 2);
      }
      
      // Arrow shaft
      const dir = field.clone().normalize();
      const shaftGeo = new THREE.CylinderGeometry(0.02, 0.02, arrowLen * 0.7, 4);
      const shaftMat = new THREE.MeshBasicMaterial({ color: color });
      const shaft = new THREE.Mesh(shaftGeo, shaftMat);
      
      // Arrow head
      const headGeo = new THREE.ConeGeometry(0.06, arrowLen * 0.3, 6);
      const headMat = new THREE.MeshBasicMaterial({ color: color });
      const head = new THREE.Mesh(headGeo, headMat);
      head.position.y = arrowLen * 0.5;
      
      const arrowGroup = new THREE.Group();
      arrowGroup.add(shaft);
      arrowGroup.add(head);
      
      arrowGroup.position.copy(pos);
      
      // Orient along field direction
      const up = new THREE.Vector3(0, 1, 0);
      if (Math.abs(dir.dot(up)) < 0.999) {
        const quat = new THREE.Quaternion().setFromUnitVectors(up, dir);
        arrowGroup.quaternion.copy(quat);
      }
      
      gridArrowsGroup.add(arrowGroup);
      arrowCount++;
    }
  }
  
  state.gridArrowCount = arrowCount;
  gridArrowsGroup.visible = state.gridArrowsVisible;
}

// ============ TRUCK (PROBE) ============
let truckMesh = null;
let truckFallback = null;

// Create a fallback probe vehicle
function createFallbackProbe() {
  const group = new THREE.Group();
  
  // Body
  const bodyGeo = new THREE.BoxGeometry(1.2, 0.5, 0.6);
  const bodyMat = new THREE.MeshPhongMaterial({ color: 0xff8800, emissive: 0x331100 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.4;
  group.add(body);
  
  // Cabin
  const cabGeo = new THREE.BoxGeometry(0.5, 0.4, 0.55);
  const cabMat = new THREE.MeshPhongMaterial({ color: 0xffaa33, emissive: 0x221100 });
  const cab = new THREE.Mesh(cabGeo, cabMat);
  cab.position.set(-0.2, 0.7, 0);
  group.add(cab);
  
  // Wheels
  const wheelGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.1, 8);
  const wheelMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
  const positions = [
    [0.35, 0.15, 0.35], [0.35, 0.15, -0.35],
    [-0.35, 0.15, 0.35], [-0.35, 0.15, -0.35]
  ];
  for (const p of positions) {
    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
    wheel.position.set(p[0], p[1], p[2]);
    wheel.rotation.x = Math.PI / 2;
    group.add(wheel);
  }
  
  // Antenna (probe sensor)
  const antennaGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.8, 6);
  const antennaMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
  const antenna = new THREE.Mesh(antennaGeo, antennaMat);
  antenna.position.set(0.3, 1.0, 0);
  group.add(antenna);
  
  // Sensor ball
  const sensorGeo = new THREE.SphereGeometry(0.08, 8, 8);
  const sensorMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, emissive: 0x00ffff });
  const sensor = new THREE.Mesh(sensorGeo, sensorMat);
  sensor.position.set(0.3, 1.45, 0);
  group.add(sensor);
  
  // Label
  const label = makeTextSprite('PROBE', { fontsize: 40, color: '#00ffff' });
  label.position.set(0, 1.3, 0);
  label.scale.set(0.8, 0.4, 1);
  group.add(label);
  
  return group;
}

// Try loading GLTF truck
const loader = new GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/CesiumMilkTruck/glTF-Binary/CesiumMilkTruck.glb',
  (gltf) => {
    truckMesh = gltf.scene;
    truckMesh.scale.set(0.3, 0.3, 0.3);
    truckMesh.position.set(state.truckPosition.x, state.truckPosition.y, state.truckPosition.z);
    scene.add(truckMesh);
    if (truckFallback) {
      scene.remove(truckFallback);
      truckFallback = null;
    }
    state.truckLoaded = true;
  },
  undefined,
  (error) => {
    console.log('GLTF load failed, using fallback probe vehicle');
    truckFallback = createFallbackProbe();
    truckFallback.position.set(state.truckPosition.x, state.truckPosition.y, state.truckPosition.z);
    scene.add(truckFallback);
    truckMesh = truckFallback;
    state.truckLoaded = true;
  }
);

// If truck hasn't loaded after 3 seconds, use fallback
setTimeout(() => {
  if (!state.truckLoaded) {
    truckFallback = createFallbackProbe();
    truckFallback.position.set(state.truckPosition.x, state.truckPosition.y, state.truckPosition.z);
    scene.add(truckFallback);
    truckMesh = truckFallback;
    state.truckLoaded = true;
  }
}, 3000);

// ============ PARTICLES ============
const particlesGroup = new THREE.Group();
scene.add(particlesGroup);
let particleCurves = [];
let particleData = [];

function createParticles() {
  // Clear
  while (particlesGroup.children.length > 0) {
    const child = particlesGroup.children[0];
    particlesGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
    if (child.material) child.material.dispose();
  }
  particleData = [];
  
  if (!state.particlesAnimating) {
    state.particleCount = 0;
    return;
  }
  
  // Generate curves for particles to follow
  const angleRad = state.magnetAngle * Math.PI / 180;
  const northDir = new THREE.Vector3(Math.cos(angleRad), 0, -Math.sin(angleRad));
  const magnetCenters = [new THREE.Vector3(0, 0, 0)];
  if (state.secondMagnetActive) magnetCenters.push(new THREE.Vector3(5, 0, 0));
  
  particleCurves = [];
  
  for (const center of magnetCenters) {
    const northPole = center.clone().add(northDir.clone().multiplyScalar(0.5));
    const perpX = -Math.sin(angleRad);
    const perpZ = -Math.cos(angleRad);
    
    const numCurves = state.secondMagnetActive ? 12 : 25;
    
    for (let i = 0; i < numCurves; i++) {
      const theta = (i / numCurves) * Math.PI * 2;
      const offsetY = Math.sin(theta) * 0.3;
      const offsetPerp = Math.cos(theta) * 0.3;
      
      const startPoint = new THREE.Vector3(
        northPole.x + perpX * offsetPerp + northDir.x * 0.2,
        northPole.y + offsetY,
        northPole.z + perpZ * offsetPerp + northDir.z * 0.2
      );
      
      const points = generateFieldLinePoints(startPoint, 300, 0.15);
      if (points.length > 5) {
        particleCurves.push(new THREE.CatmullRomCurve3(points));
      }
    }
  }
  
  // Create 50 particles
  const particleCount = 50;
  const particleGeo = new THREE.SphereGeometry(0.06, 6, 6);
  
  for (let i = 0; i < particleCount; i++) {
    const curveIdx = i % particleCurves.length;
    const particleMat = new THREE.MeshBasicMaterial({ 
      color: 0xffff88, 
      transparent: true, 
      opacity: 0.9 
    });
    const particle = new THREE.Mesh(particleGeo, particleMat);
    
    // Glow
    const glowGeo = new THREE.SphereGeometry(0.12, 6, 6);
    const glowMat = new THREE.MeshBasicMaterial({ 
      color: 0xffff44, 
      transparent: true, 
      opacity: 0.3 
    });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    particle.add(glow);
    
    const t = Math.random();
    const pt = particleCurves[curveIdx].getPointAt(t);
    particle.position.copy(pt);
    
    particlesGroup.add(particle);
    particleData.push({
      mesh: particle,
      curveIdx: curveIdx,
      t: t,
      speed: 0.002 + Math.random() * 0.003
    });
  }
  
  state.particleCount = particleCount;
}

// ============ REBUILD ALL ============
function rebuildAll() {
  createFieldLines();
  createGridArrows();
  if (state.particlesAnimating) createParticles();
}

// Initial build
rebuildAll();

// ============ EVENT HANDLERS ============
const rotationSlider = document.getElementById('magnet-rotation-slider');
rotationSlider.addEventListener('input', (e) => {
  state.magnetAngle = parseFloat(e.target.value);
  magnetGroup.rotation.y = state.magnetAngle * Math.PI / 180;
  if (magnet2Group) magnet2Group.rotation.y = state.magnetAngle * Math.PI / 180;
  document.getElementById('angle-display').textContent = `Magnet Angle: ${state.magnetAngle}°`;
  rebuildAll();
});

document.getElementById('toggle-field-lines').addEventListener('click', () => {
  state.fieldLinesVisible = !state.fieldLinesVisible;
  fieldLinesGroup.visible = state.fieldLinesVisible;
  document.getElementById('lines-status').innerHTML = `Field Lines Visible: <span>${state.fieldLinesVisible}</span>`;
});

document.getElementById('toggle-grid-arrows').addEventListener('click', () => {
  state.gridArrowsVisible = !state.gridArrowsVisible;
  gridArrowsGroup.visible = state.gridArrowsVisible;
  document.getElementById('grid-status').innerHTML = `Grid Arrows Visible: <span>${state.gridArrowsVisible}</span>`;
});

document.getElementById('add-second-magnet').addEventListener('click', (e) => {
  state.secondMagnetActive = !state.secondMagnetActive;
  
  if (state.secondMagnetActive) {
    magnet2Group = new THREE.Group();
    const m2 = createBarMagnet();
    magnet2Group.add(m2);
    magnet2Group.position.set(5, 0, 0);
    magnet2Group.rotation.y = state.magnetAngle * Math.PI / 180;
    scene.add(magnet2Group);
    state.secondMagnetPosition = { x: 5, y: 0, z: 0 };
    e.target.classList.add('active');
    e.target.textContent = 'Remove Second Magnet';
  } else {
    if (magnet2Group) {
      scene.remove(magnet2Group);
      magnet2Group = null;
    }
    state.secondMagnetPosition = null;
    e.target.classList.remove('active');
    e.target.textContent = 'Add Second Magnet';
  }
  
  document.getElementById('second-magnet-status').innerHTML = `Second Magnet: <span>${state.secondMagnetActive ? 'active' : 'inactive'}</span>`;
  rebuildAll();
});

document.getElementById('field-plane-select').addEventListener('change', (e) => {
  state.activePlane = e.target.value;
  document.getElementById('plane-status').innerHTML = `Active Plane: <span>${state.activePlane}</span>`;
  createGridArrows();
});

document.getElementById('animate-particles').addEventListener('change', (e) => {
  state.particlesAnimating = e.target.checked;
  document.getElementById('particles-status').innerHTML = `Particles Animating: <span>${state.particlesAnimating}</span>`;
  createParticles();
});

// WASD controls for truck
const keysPressed = {};
document.addEventListener('keydown', (e) => {
  keysPressed[e.key.toLowerCase()] = true;
});
document.addEventListener('keyup', (e) => {
  keysPressed[e.key.toLowerCase()] = false;
});

function updateTruckMovement() {
  const step = 0.5;
  let moved = false;
  
  if (keysPressed['w']) { state.truckPosition.z -= step * 0.05; moved = true; }
  if (keysPressed['s']) { state.truckPosition.z += step * 0.05; moved = true; }
  if (keysPressed['a']) { state.truckPosition.x -= step * 0.05; moved = true; }
  if (keysPressed['d']) { state.truckPosition.x += step * 0.05; moved = true; }
  
  if (moved && truckMesh) {
    truckMesh.position.set(state.truckPosition.x, state.truckPosition.y, state.truckPosition.z);
  }
}

// ============ ANIMATION LOOP ============
function animate() {
  requestAnimationFrame(animate);
  
  controls.update();
  updateTruckMovement();
  
  // Update probe field strength
  const probePos = new THREE.Vector3(state.truckPosition.x, state.truckPosition.y, state.truckPosition.z);
  const fs = fieldStrength(probePos);
  state.fieldStrengthAtProbe = isFinite(fs) ? fs : 0;
  
  // Update HUD
  document.getElementById('probe-position').textContent = 
    `Probe Position: (${state.truckPosition.x.toFixed(1)}, ${state.truckPosition.y.toFixed(1)}, ${state.truckPosition.z.toFixed(1)})`;
  document.getElementById('field-strength-display').textContent = 
    `Field Strength at Probe: ${state.fieldStrengthAtProbe.toFixed(4)} T`;
  
  // Animate particles
  if (state.particlesAnimating && particleCurves.length > 0) {
    for (const pd of particleData) {
      pd.t += pd.speed;
      if (pd.t >= 1.0) pd.t = 0;
      
      const curve = particleCurves[pd.curveIdx];
      if (curve) {
        const pt = curve.getPointAt(pd.t);
        pd.mesh.position.copy(pt);
        
        // Color based on position along curve
        const r = 1.0 - pd.t;
        const b = pd.t;
        pd.mesh.material.color.setRGB(r + 0.5, r * 0.8 + 0.2, b + 0.2);
      }
    }
  }
  
  // Ensure state is NaN-free
  if (isNaN(state.fieldStrengthAtProbe)) state.fieldStrengthAtProbe = 0;
  if (isNaN(state.magnetAngle)) state.magnetAngle = 0;
  
  state.sceneReady = true;
  
  renderer.render(scene, camera);
}

animate();

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
