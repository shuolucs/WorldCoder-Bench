<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Magnetic Field Lines Explorer</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, sans-serif;
      color: white;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: block;
      position: relative;
    }

    #ui-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(10, 10, 30, 0.82);
      padding: 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      min-width: 280px;
      backdrop-filter: blur(4px);
    }

    #ui-panel h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    #ui-panel label,
    #ui-panel button,
    #ui-panel select,
    #ui-panel input {
      display: block;
      margin-top: 8px;
      font-size: 13px;
    }

    #ui-panel input[type="range"] {
      width: 100%;
    }

    #ui-panel button,
    #ui-panel select {
      width: 100%;
      padding: 6px;
      background: #1a1a44;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      cursor: pointer;
    }

    #ui-panel button:hover,
    #ui-panel select:hover {
      background: #25255c;
    }

    .status {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.35;
      color: #d7e8ff;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui-panel">
      <h3>Magnetic Field Explorer</h3>

      <label for="magnet-rotation-slider">Rotate Magnet</label>
      <input id="magnet-rotation-slider" type="range" min="0" max="360" value="0" step="1" />
      <div class="status" id="angle-display">Magnet Angle: 0°</div>

      <button id="toggle-field-lines">Toggle Field Lines</button>
      <button id="toggle-grid-arrows">Toggle Grid Arrows</button>
      <button id="add-second-magnet">Add Second Magnet</button>

      <label for="field-plane-select">Field Plane</label>
      <select id="field-plane-select">
        <option value="XZ">XZ</option>
        <option value="XY">XY</option>
        <option value="YZ">YZ</option>
      </select>

      <label>
        <input id="animate-particles" type="checkbox" />
        Animate field particles
      </label>

      <div class="status" id="probe-position">Probe Position: (0.00, 0.00, 0.00)</div>
      <div class="status" id="field-strength-display">Field Strength at Probe: 0.0000 T</div>
      <div class="status" id="lines-status">Field Lines Visible: true</div>
      <div class="status" id="grid-status">Grid Arrows Visible: true</div>
      <div class="status" id="second-magnet-status">Second Magnet: inactive</div>
      <div class="status" id="plane-status">Active Plane: XZ</div>
      <div class="status" id="particles-status">Particles Animating: false</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');

    const angleDisplay = document.getElementById('angle-display');
    const probePositionDisplay = document.getElementById('probe-position');
    const fieldStrengthDisplay = document.getElementById('field-strength-display');
    const linesStatus = document.getElementById('lines-status');
    const gridStatus = document.getElementById('grid-status');
    const secondMagnetStatus = document.getElementById('second-magnet-status');
    const planeStatus = document.getElementById('plane-status');
    const particlesStatus = document.getElementById('particles-status');

    const rotationSlider = document.getElementById('magnet-rotation-slider');
    const toggleFieldLinesBtn = document.getElementById('toggle-field-lines');
    const toggleGridBtn = document.getElementById('toggle-grid-arrows');
    const addSecondMagnetBtn = document.getElementById('add-second-magnet');
    const planeSelect = document.getElementById('field-plane-select');
    const animateParticlesCheckbox = document.getElementById('animate-particles');

    window.__3D_STATE__ = {
      sceneReady: false,
      magnetAngle: 0,
      truckPosition: { x: 8, y: 0, z: 0 },
      fieldStrengthAtProbe: 0,
      fieldLinesVisible: true,
      gridArrowsVisible: true,
      secondMagnetActive: false,
      activePlane: 'XZ',
      particlesAnimating: false,
      particleCount: 0,
      fieldLineCount: 16,
      gridArrowCount: 100,
      truckLoaded: false,
      magnetPosition: { x: 0, y: 0, z: 0 },
      secondMagnetPosition: null
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 8, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    scene.add(new THREE.AmbientLight(0x404040, 0.5));

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(10, 10, 10);
    scene.add(dirLight);

    const magnetGroup = new THREE.Group();
    scene.add(magnetGroup);

    const fieldLinesGroup = new THREE.Group();
    scene.add(fieldLinesGroup);

    const gridArrowsGroup = new THREE.Group();
    scene.add(gridArrowsGroup);

    const particlesGroup = new THREE.Group();
    scene.add(particlesGroup);

    const secondMagnetGroup = new THREE.Group();
    scene.add(secondMagnetGroup);
    secondMagnetGroup.visible = false;

    let truckRoot = null;
    let truckMeshRef = null;

    const clock = new THREE.Clock();

    function safeNumber(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function createTextSprite(text, color = '#ffffff') {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(0,0,0,0)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.font = 'bold 150px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = color;
      ctx.fillText(text, 128, 128);

      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(0.8, 0.8, 0.8);
      return sprite;
    }

    function buildMagnet(group, includeLabels = true) {
      group.clear();

      const geom = new THREE.BoxGeometry(1, 0.8, 0.5);

      const north = new THREE.Mesh(
        geom,
        new THREE.MeshPhongMaterial({ color: 0xff0000 })
      );
      north.position.x = 0.5;

      const south = new THREE.Mesh(
        geom,
        new THREE.MeshPhongMaterial({ color: 0x0000ff })
      );
      south.position.x = -0.5;

      group.add(north, south);

      if (includeLabels) {
        const nLabel = createTextSprite('N', '#ffffff');
        nLabel.position.set(0.5, 0.65, 0.3);
        const sLabel = createTextSprite('S', '#ffffff');
        sLabel.position.set(-0.5, 0.65, 0.3);
        group.add(nLabel, sLabel);
      }
    }

    buildMagnet(magnetGroup, true);
    buildMagnet(secondMagnetGroup, true);
    secondMagnetGroup.position.set(5, 0, 0);

    function getMagnetMoment(group) {
      const m = new THREE.Vector3(1, 0, 0);
      m.applyQuaternion(group.quaternion);
      return m.normalize();
    }

    function dipoleFieldAtPoint(point, magnetPos, magnetMoment) {
      const rVec = new THREE.Vector3().subVectors(point, magnetPos);
      let r = rVec.length();
      r = Math.max(r, 0.35);

      const rHat = rVec.clone().normalize();
      const mDotR = magnetMoment.dot(rHat);

      const term1 = rHat.clone().multiplyScalar(3 * mDotR);
      const B = term1.sub(magnetMoment).multiplyScalar(1 / (r * r * r));

      if (!Number.isFinite(B.x) || !Number.isFinite(B.y) || !Number.isFinite(B.z)) {
        return new THREE.Vector3(0, 0, 0);
      }
      return B;
    }

    function totalFieldAtPoint(point) {
      const total = new THREE.Vector3();

      const m1 = getMagnetMoment(magnetGroup);
      total.add(dipoleFieldAtPoint(point, magnetGroup.position, m1));

      if (window.__3D_STATE__.secondMagnetActive) {
        const m2 = getMagnetMoment(secondMagnetGroup);
        total.add(dipoleFieldAtPoint(point, secondMagnetGroup.position, m2));
      }

      if (!Number.isFinite(total.x) || !Number.isFinite(total.y) || !Number.isFinite(total.z)) {
        return new THREE.Vector3(0, 0, 0);
      }
      return total;
    }

    function createColoredTubeFromPoints(points, radius = 0.05, tubularSegments = 120, radialSegments = 8) {
      const curve = new THREE.CatmullRomCurve3(points);
      const geometry = new THREE.TubeGeometry(curve, tubularSegments, radius, radialSegments, false);

      const pos = geometry.attributes.position;
      const colors = [];
      const minX = -6;
      const maxX = 6;

      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        let t = (x - minX) / (maxX - minX);
        t = THREE.MathUtils.clamp(t, 0, 1);

        const color = new THREE.Color();
        color.setRGB(1 - t, 0, t);
        colors.push(color.r, color.g, color.b);
      }

      geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

      const material = new THREE.MeshPhongMaterial({
        vertexColors: true,
        side: THREE.DoubleSide,
        shininess: 60
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.userData.curve = curve;
      mesh.userData.samplePoints = points;
      return mesh;
    }

    function createArrowOnCurve(curve, t) {
      const point = curve.getPointAt(t);
      const tangent = curve.getTangentAt(t).normalize();

      const cone = new THREE.Mesh(
        new THREE.ConeGeometry(0.12, 0.35, 10),
        new THREE.MeshPhongMaterial({ color: 0xffffff })
      );

      cone.position.copy(point);
      cone.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), tangent);
      return cone;
    }

    function generateSeedDirections(count) {
      const dirs = [];
      for (let i = 0; i < count; i++) {
        const a = (i / count) * Math.PI * 2;
        const y = Math.cos(a) * 0.55;
        const z = Math.sin(a) * 0.55;
        dirs.push(new THREE.Vector3(0.15, y, z).normalize());
      }
      return dirs;
    }

    function integrateFieldLine(seedPoint, stepSize = 0.12, maxSteps = 180) {
      const points = [seedPoint.clone()];
      let p = seedPoint.clone();

      for (let i = 0; i < maxSteps; i++) {
        const B = totalFieldAtPoint(p);
        const mag = B.length();

        if (mag < 1e-5) break;

        const dir = B.clone().normalize();
        p = p.clone().add(dir.multiplyScalar(stepSize));

        if (!Number.isFinite(p.x) || !Number.isFinite(p.y) || !Number.isFinite(p.z)) break;

        points.push(p.clone());

        const southCenter = magnetGroup.localToWorld(new THREE.Vector3(-0.9, 0, 0));
        const dSouth = p.distanceTo(southCenter);

        let nearSecondSouth = false;
        if (window.__3D_STATE__.secondMagnetActive) {
          const secondSouth = secondMagnetGroup.localToWorld(new THREE.Vector3(-0.9, 0, 0));
          nearSecondSouth = p.distanceTo(secondSouth) < 0.5;
        }

        if (dSouth < 0.5 || nearSecondSouth) break;
        if (p.length() > 25) break;
      }

      return points;
    }

    function rebuildFieldLines() {
      fieldLinesGroup.clear();

      const seeds = generateSeedDirections(16);
      const northPoleWorld = magnetGroup.localToWorld(new THREE.Vector3(0.95, 0, 0));

      seeds.forEach((dir) => {
        const seed = northPoleWorld.clone().add(dir.multiplyScalar(0.18));
        const points = integrateFieldLine(seed);

        if (points.length >= 8) {
          const tube = createColoredTubeFromPoints(points, 0.045, 140, 8);
          fieldLinesGroup.add(tube);

          const curve = tube.userData.curve;
          fieldLinesGroup.add(createArrowOnCurve(curve, 0.25));
          fieldLinesGroup.add(createArrowOnCurve(curve, 0.50));
          fieldLinesGroup.add(createArrowOnCurve(curve, 0.75));
        }
      });

      fieldLinesGroup.visible = window.__3D_STATE__.fieldLinesVisible;
    }

    function fieldColorFromStrength(s) {
      if (s > 0.18) return 0xffff00;
      if (s > 0.07) return 0x00ff66;
      return 0x00ffff;
    }

    function createVectorArrow(position, vector) {
      const group = new THREE.Group();

      const mag = safeNumber(vector.length(), 0);
      const dir = mag > 1e-8 ? vector.clone().normalize() : new THREE.Vector3(0, 1, 0);
      const length = THREE.MathUtils.clamp(mag * 3.2, 0.12, 1.2);
      const color = fieldColorFromStrength(mag);

      const shaft = new THREE.Mesh(
        new THREE.CylinderGeometry(0.02, 0.02, length * 0.75, 6),
        new THREE.MeshBasicMaterial({ color })
      );

      const head = new THREE.Mesh(
        new THREE.ConeGeometry(0.07, length * 0.25, 8),
        new THREE.MeshBasicMaterial({ color })
      );

      shaft.position.y = length * 0.375;
      head.position.y = length * 0.75 + (length * 0.25) / 2;

      group.add(shaft, head);
      group.position.copy(position);
      group.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);

      return group;
    }

    function rebuildGridArrows() {
      gridArrowsGroup.clear();

      const size = 10;
      const spacing = 1.2;
      const half = (size - 1) * spacing * 0.5;
      const plane = window.__3D_STATE__.activePlane;

      for (let i = 0; i < size; i++) {
        for (let j = 0; j < size; j++) {
          const a = -half + i * spacing;
          const b = -half + j * spacing;

          let pos;
          if (plane === 'XZ') pos = new THREE.Vector3(a, 0, b);
          else if (plane === 'XY') pos = new THREE.Vector3(a, b, 0);
          else pos = new THREE.Vector3(0, a, b);

          const field = totalFieldAtPoint(pos);

          const projected = field.clone();
          if (plane === 'XZ') projected.y = 0;
          if (plane === 'XY') projected.z = 0;
          if (plane === 'YZ') projected.x = 0;

          if (projected.length() < 1e-6) {
            projected.set(0, 0.001, 0);
          }

          const arrow = createVectorArrow(pos, projected);
          gridArrowsGroup.add(arrow);
        }
      }

      gridArrowsGroup.visible = window.__3D_STATE__.gridArrowsVisible;
      window.__3D_STATE__.gridArrowCount = gridArrowsGroup.children.length;
    }

    const particleData = [];

    function rebuildParticles() {
      particlesGroup.clear();
      particleData.length = 0;

      if (!window.__3D_STATE__.particlesAnimating) {
        window.__3D_STATE__.particleCount = 0;
        return;
      }

      const curves = fieldLinesGroup.children
        .filter(obj => obj.userData && obj.userData.curve)
        .map(obj => obj.userData.curve);

      const targetCount = 50;

      for (let i = 0; i < targetCount; i++) {
        if (curves.length === 0) break;

        const curve = curves[i % curves.length];
        const t = (i / targetCount) % 1;

        const particle = new THREE.Mesh(
          new THREE.SphereGeometry(0.05, 10, 10),
          new THREE.MeshBasicMaterial({ color: 0xffffaa })
        );

        const p = curve.getPointAt(t);
        particle.position.copy(p);
        particlesGroup.add(particle);

        particleData.push({
          mesh: particle,
          curve,
          t,
          speed: 0.06
        });
      }

      window.__3D_STATE__.particleCount = particleData.length;
    }

    function updateParticles(dt) {
      if (!window.__3D_STATE__.particlesAnimating) return;

      particleData.forEach(pd => {
        pd.t += pd.speed * dt;
        while (pd.t > 1) pd.t -= 1;
        const p = pd.curve.getPointAt(pd.t);
        pd.mesh.position.copy(p);
      });
    }

    function updateHUD() {
      const st = window.__3D_STATE__;
      angleDisplay.textContent = `Magnet Angle: ${Math.round(st.magnetAngle)}°`;
      probePositionDisplay.textContent =
        `Probe Position: (${st.truckPosition.x.toFixed(2)}, ${st.truckPosition.y.toFixed(2)}, ${st.truckPosition.z.toFixed(2)})`;
      fieldStrengthDisplay.textContent =
        `Field Strength at Probe: ${safeNumber(st.fieldStrengthAtProbe, 0).toFixed(4)} T`;
      linesStatus.textContent = `Field Lines Visible: ${st.fieldLinesVisible}`;
      gridStatus.textContent = `Grid Arrows Visible: ${st.gridArrowsVisible}`;
      secondMagnetStatus.textContent = `Second Magnet: ${st.secondMagnetActive ? 'active' : 'inactive'}`;
      planeStatus.textContent = `Active Plane: ${st.activePlane}`;
      particlesStatus.textContent = `Particles Animating: ${st.particlesAnimating}`;
    }

    function updateState() {
      window.__3D_STATE__.magnetAngle = safeNumber(THREE.MathUtils.radToDeg(magnetGroup.rotation.y) % 360, 0);

      const truckPos = truckRoot ? truckRoot.position : new THREE.Vector3(8, 0, 0);
      window.__3D_STATE__.truckPosition = {
        x: safeNumber(truckPos.x, 0),
        y: safeNumber(truckPos.y, 0),
        z: safeNumber(truckPos.z, 0)
      };

      const B = totalFieldAtPoint(truckPos);
      window.__3D_STATE__.fieldStrengthAtProbe = safeNumber(B.length(), 0);

      window.__3D_STATE__.fieldLineCount =
        fieldLinesGroup.children.filter(c => c.userData && c.userData.curve).length;
      window.__3D_STATE__.magnetPosition = { x: 0, y: 0, z: 0 };
      window.__3D_STATE__.secondMagnetPosition = window.__3D_STATE__.secondMagnetActive
        ? { x: 5, y: 0, z: 0 }
        : null;
    }

    function rebuildFieldVisuals() {
      rebuildFieldLines();
      rebuildGridArrows();
      rebuildParticles();
      updateState();
      updateHUD();
    }

    const keys = {};
    window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

    function updateTruckMovement() {
      if (!truckRoot) return;

      const step = 0.5;
      let moved = false;

      if (keys['w']) {
        truckRoot.position.z += step;
        moved = true;
      }
      if (keys['s']) {
        truckRoot.position.z -= step;
        moved = true;
      }
      if (keys['a']) {
        truckRoot.position.x -= step;
        moved = true;
      }
      if (keys['d']) {
        truckRoot.position.x += step;
        moved = true;
      }

      if (moved) {
        const x = truckRoot.position.x;
        const z = truckRoot.position.z;
        truckRoot.rotation.y = Math.atan2(
          (keys['d'] ? 1 : 0) - (keys['a'] ? 1 : 0),
          (keys['w'] ? 1 : 0) - (keys['s'] ? 1 : 0)
        ) || truckRoot.rotation.y;

        window.__3D_STATE__.truckPosition = {
          x: safeNumber(x, 0),
          y: safeNumber(truckRoot.position.y, 0),
          z: safeNumber(z, 0)
        };
      }
    }

    rotationSlider.addEventListener('input', () => {
      const angleDeg = safeNumber(parseFloat(rotationSlider.value), 0);
      const angleRad = THREE.MathUtils.degToRad(angleDeg);
      magnetGroup.rotation.y = angleRad;
      rebuildFieldVisuals();
    });

    toggleFieldLinesBtn.addEventListener('click', () => {
      window.__3D_STATE__.fieldLinesVisible = !window.__3D_STATE__.fieldLinesVisible;
      fieldLinesGroup.visible = window.__3D_STATE__.fieldLinesVisible;
      updateHUD();
    });

    toggleGridBtn.addEventListener('click', () => {
      window.__3D_STATE__.gridArrowsVisible = !window.__3D_STATE__.gridArrowsVisible;
      gridArrowsGroup.visible = window.__3D_STATE__.gridArrowsVisible;
      updateHUD();
    });

    addSecondMagnetBtn.addEventListener('click', () => {
      window.__3D_STATE__.secondMagnetActive = !window.__3D_STATE__.secondMagnetActive;
      secondMagnetGroup.visible = window.__3D_STATE__.secondMagnetActive;
      rebuildFieldVisuals();
    });

    planeSelect.addEventListener('change', () => {
      window.__3D_STATE__.activePlane = planeSelect.value;
      rebuildGridArrows();
      updateState();
      updateHUD();
    });

    animateParticlesCheckbox.addEventListener('change', () => {
      window.__3D_STATE__.particlesAnimating = animateParticlesCheckbox.checked;
      rebuildParticles();
      updateHUD();
    });

    const loader = new GLTFLoader();
    loader.load(
      'CesiumMilkTruck.glb',
      (gltf) => {
        truckRoot = gltf.scene;
        truckRoot.scale.setScalar(0.3);
        truckRoot.position.set(8, 0, 0);

        truckRoot.traverse((child) => {
          if (child.isMesh && !truckMeshRef) {
            truckMeshRef = child;
          }
          if (child.isMesh) {
            child.castShadow = true;
            child.frustumCulled = false;
          }
        });

        scene.add(truckRoot);
        window.__3D_STATE__.truckLoaded = true;
        updateState();
        updateHUD();
      },
      undefined,
      (err) => {
        console.warn('Failed to load CesiumMilkTruck.glb:', err);
        const fallback = new THREE.Mesh(
          new THREE.BoxGeometry(1.2, 0.6, 0.7),
          new THREE.MeshPhongMaterial({ color: 0xcccccc })
        );
        fallback.position.set(8, 0, 0);
        truckRoot = fallback;
        truckMeshRef = fallback;
        scene.add(truckRoot);
        window.__3D_STATE__.truckLoaded = false;
        updateState();
        updateHUD();
      }
    );

    rebuildFieldVisuals();
    window.__3D_STATE__.sceneReady = true;

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.max(0.001, clock.getDelta());

      updateTruckMovement();
      updateParticles(dt);
      updateState();
      updateHUD();

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
