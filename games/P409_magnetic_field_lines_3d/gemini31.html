<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Field Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: monospace;
            color: #ffffff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(10, 10, 46, 0.8);
            border: 1px solid #444;
            padding: 15px;
            border-radius: 8px;
            width: 320px;
            z-index: 100;
            pointer-events: auto;
        }
        .control-group {
            margin-bottom: 10px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #aaa;
        }
        input[type="range"] {
            width: 100%;
        }
        button, select {
            width: 100%;
            padding: 5px;
            background: #2a2a5a;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 5px;
        }
        button:hover, select:hover {
            background: #3a3a7a;
        }
        .status-display {
            font-size: 11px;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #444;
        }
        .status-item {
            margin-bottom: 3px;
        }
        .value-highlight {
            color: #00ffcc;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-panel">
        <div class="control-group">
            <label>Magnet Rotation (Y-Axis)</label>
            <input type="range" id="magnet-rotation-slider" min="0" max="360" value="0">
        </div>
        <div class="control-group">
            <button id="toggle-field-lines">Toggle Field Lines</button>
            <button id="toggle-grid-arrows">Toggle Grid Arrows</button>
            <button id="add-second-magnet">Toggle Second Magnet</button>
        </div>
        <div class="control-group">
            <label>Grid Plane</label>
            <select id="field-plane-select">
                <option value="XZ">XZ Plane (y=0)</option>
                <option value="XY">XY Plane (z=0)</option>
                <option value="YZ">YZ Plane (x=0)</option>
            </select>
        </div>
        <div class="control-group">
            <label>
                <input type="checkbox" id="animate-particles"> Animate Particles
            </label>
        </div>
        <div class="control-group" style="font-size: 10px; color: #888; margin-top: 10px;">
            Controls: WASD to move probe truck (Step: 0.5)
        </div>

        <div class="status-display">
            <div class="status-item" id="angle-display">Magnet Angle: <span class="value-highlight">0°</span></div>
            <div class="status-item" id="probe-position">Probe Position: <span class="value-highlight">(8.0, 0.0, 0.0)</span></div>
            <div class="status-item" id="field-strength-display">Field Strength at Probe: <span class="value-highlight">0.000 T</span></div>
            <div class="status-item" id="lines-status">Field Lines Visible: <span class="value-highlight">true</span></div>
            <div class="status-item" id="grid-status">Grid Arrows Visible: <span class="value-highlight">true</span></div>
            <div class="status-item" id="second-magnet-status">Second Magnet: <span class="value-highlight">inactive</span></div>
            <div class="status-item" id="plane-status">Active Plane: <span class="value-highlight">XZ</span></div>
            <div class="status-item" id="particles-status">Particles Animating: <span class="value-highlight">false</span></div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            sceneReady: false,
            magnetAngle: 0,
            truckPosition: { x: 8, y: 0, z: 0 },
            fieldStrengthAtProbe: 0,
            fieldLinesVisible: true,
            gridArrowsVisible: true,
            secondMagnetActive: false,
            activePlane: 'XZ',
            particlesAnimating: false,
            particleCount: 50,
            fieldLineCount: 16,
            gridArrowCount: 100,
            truckLoaded: false,
            magnetPosition: { x: 0, y: 0, z: 0 },
            secondMagnetPosition: null
        };

        const state = window.__3D_STATE__;

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 10, 10);
        scene.add(dirLight);

        // --- OBJECTS ---
        let truckMesh = null;
        let primaryMagnet = null;
        let secondaryMagnet = null;
        const fieldLinesGroup = new THREE.Group();
        const gridArrowsGroup = new THREE.Group();
        let particleSystem = null;
        let fieldCurves = []; // Store CatmullRomCurve3 for particles

        scene.add(fieldLinesGroup);
        scene.add(gridArrowsGroup);

        // --- HELPERS ---
        function createTextCanvas(text, color) {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color;
            ctx.fillRect(0, 0, 64, 64);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 32, 32);
            return new THREE.CanvasTexture(canvas);
        }

        function createMagnet() {
            const group = new THREE.Group();
            const geo = new THREE.BoxGeometry(0.5, 0.8, 0.5);
            
            const texN = createTextCanvas('N', '#ff0000');
            const matN = new THREE.MeshPhongMaterial({ color: 0xff0000, map: texN });
            const meshN = new THREE.Mesh(geo, matN);
            meshN.position.x = 0.25;
            
            const texS = createTextCanvas('S', '#0000ff');
            const matS = new THREE.MeshPhongMaterial({ color: 0x0000ff, map: texS });
            const meshS = new THREE.Mesh(geo, matS);
            meshS.position.x = -0.25;

            group.add(meshN);
            group.add(meshS);
            return group;
        }

        function getGradientTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 1;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 256, 0);
            gradient.addColorStop(0, '#ff0000');
            gradient.addColorStop(0.5, '#aa00aa');
            gradient.addColorStop(1, '#0000ff');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 256, 1);
            return new THREE.CanvasTexture(canvas);
        }
        const gradientTexture = getGradientTexture();

        // --- PHYSICS / MATH ---
        function getActiveMagnets() {
            const magnets = [];
            if (primaryMagnet) {
                const moment = new THREE.Vector3(1, 0, 0).applyEuler(primaryMagnet.rotation);
                magnets.push({ pos: primaryMagnet.position.clone(), moment: moment });
            }
            if (state.secondMagnetActive && secondaryMagnet) {
                const moment = new THREE.Vector3(1, 0, 0).applyEuler(secondaryMagnet.rotation);
                magnets.push({ pos: secondaryMagnet.position.clone(), moment: moment });
            }
            return magnets;
        }

        function calculateBField(position, magnets) {
            const B = new THREE.Vector3(0, 0, 0);
            const mu0_4pi = 1; // Simplified constant for visualization

            for (const mag of magnets) {
                const rVec = new THREE.Vector3().subVectors(position, mag.pos);
                const r = rVec.length();
                if (r < 0.1) continue; // Avoid singularity inside magnet

                const rHat = rVec.clone().normalize();
                const m = mag.moment;
                const mDotRhat = m.dot(rHat);
                
                // B = (mu0/4pi) * (3(m·r̂)r̂ - m) / r³
                const term1 = rHat.clone().multiplyScalar(3 * mDotRhat);
                const bContrib = term1.sub(m).multiplyScalar(mu0_4pi / Math.pow(r, 3));
                B.add(bContrib);
            }
            
            // Ensure no NaNs
            if (isNaN(B.x) || isNaN(B.y) || isNaN(B.z)) return new THREE.Vector3(0,0,0);
            return B;
        }

        // --- GENERATION ---
        function generateFieldLines() {
            // Clear existing
            while(fieldLinesGroup.children.length > 0){ 
                const child = fieldLinesGroup.children[0];
                if(child.geometry) child.geometry.dispose();
                if(child.material) child.material.dispose();
                fieldLinesGroup.remove(child); 
            }
            fieldCurves = [];

            if (!state.fieldLinesVisible) return;

            const magnets = getActiveMagnets();
            if (magnets.length === 0) return;

            const numLines = state.fieldLineCount;
            const stepSize = 0.1;
            const maxSteps = 300;
            const tubeMat = new THREE.MeshBasicMaterial({ map: gradientTexture });

            // Seed points around primary magnet's North pole
            const seedRadius = 0.3;
            const pMag = magnets[0];
            
            for (let i = 0; i < numLines; i++) {
                const angle = (i / numLines) * Math.PI * 2;
                // Local seed position on YZ plane relative to N pole
                const localSeed = new THREE.Vector3(0.55, Math.cos(angle) * seedRadius, Math.sin(angle) * seedRadius);
                // Transform to world space based on magnet rotation
                localSeed.applyEuler(primaryMagnet.rotation).add(pMag.pos);

                const points = [localSeed.clone()];
                let currentPos = localSeed.clone();
                let hitSouth = false;

                for (let step = 0; step < maxSteps; step++) {
                    const B = calculateBField(currentPos, magnets);
                    const bMag = B.length();
                    if (bMag < 0.0001) break;

                    const dir = B.clone().normalize();
                    currentPos.add(dir.multiplyScalar(stepSize));
                    points.push(currentPos.clone());

                    // Check if close to any South pole
                    for (const mag of magnets) {
                        const sPoleLocal = new THREE.Vector3(-0.5, 0, 0).applyEuler(primaryMagnet.rotation).add(mag.pos);
                        if (currentPos.distanceTo(sPoleLocal) < 0.4) {
                            hitSouth = true;
                            break;
                        }
                    }
                    if (hitSouth) break;
                    // Break if it goes too far
                    if (currentPos.length() > 20) break;
                }

                if (points.length > 5) {
                    const curve = new THREE.CatmullRomCurve3(points);
                    fieldCurves.push(curve);
                    const geometry = new THREE.TubeGeometry(curve, Math.min(points.length, 64), 0.03, 8, false);
                    
                    // Adjust UVs for gradient mapping along length
                    const uvs = geometry.attributes.uv;
                    for (let j = 0; j < uvs.count; j++) {
                        const u = uvs.getX(j);
                        uvs.setXY(j, u, 0.5);
                    }

                    const tube = new THREE.Mesh(geometry, tubeMat);
                    fieldLinesGroup.add(tube);

                    // Add direction arrow in the middle
                    const midT = 0.5;
                    const midPt = curve.getPointAt(midT);
                    const tangent = curve.getTangentAt(midT);
                    const arrowGeo = new THREE.ConeGeometry(0.1, 0.3, 8);
                    const arrowMat = new THREE.MeshBasicMaterial({ color: 0xaa00aa });
                    const arrow = new THREE.Mesh(arrowGeo, arrowMat);
                    arrow.position.copy(midPt);
                    
                    // Align cone with tangent
                    const axis = new THREE.Vector3(0, 1, 0);
                    const quaternion = new THREE.Quaternion().setFromUnitVectors(axis, tangent);
                    arrow.quaternion.copy(quaternion);
                    fieldLinesGroup.add(arrow);
                }
            }
        }

        function updateGridArrows() {
            while(gridArrowsGroup.children.length > 0){ 
                const child = gridArrowsGroup.children[0];
                if(child.line) child.line.geometry.dispose();
                if(child.cone) child.cone.geometry.dispose();
                gridArrowsGroup.remove(child); 
            }

            if (!state.gridArrowsVisible) return;

            const magnets = getActiveMagnets();
            const gridSize = 10;
            const spacing = 1.5;
            const offset = (gridSize * spacing) / 2 - (spacing / 2);

            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    let pos = new THREE.Vector3();
                    const u = i * spacing - offset;
                    const v = j * spacing - offset;

                    if (state.activePlane === 'XZ') pos.set(u, 0, v);
                    else if (state.activePlane === 'XY') pos.set(u, v, 0);
                    else if (state.activePlane === 'YZ') pos.set(0, u, v);

                    const B = calculateBField(pos, magnets);
                    const strength = B.length();
                    if (strength < 0.00001) continue;

                    const dir = B.clone().normalize();
                    
                    // Color based on strength
                    let color = 0x00ffff; // Weak: Cyan
                    if (strength > 0.05) color = 0xffff00; // Strong: Yellow
                    else if (strength > 0.005) color = 0x00ff00; // Medium: Green

                    // Length proportional to strength, clamped
                    const length = Math.min(Math.max(strength * 50, 0.2), 1.2);

                    const arrowHelper = new THREE.ArrowHelper(dir, pos, length, color, 0.2, 0.1);
                    gridArrowsGroup.add(arrowHelper);
                }
            }
        }

        function initParticles() {
            if (particleSystem) {
                scene.remove(particleSystem);
                particleSystem.geometry.dispose();
                particleSystem.material.dispose();
                particleSystem = null;
            }

            if (!state.particlesAnimating || fieldCurves.length === 0) return;

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(state.particleCount * 3);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.15,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            particleSystem = new THREE.Points(geometry, material);
            
            // Custom data for animation
            particleSystem.userData = [];
            for (let i = 0; i < state.particleCount; i++) {
                particleSystem.userData.push({
                    curveIndex: Math.floor(Math.random() * fieldCurves.length),
                    t: Math.random(),
                    speed: 0.002 + Math.random() * 0.003
                });
            }

            scene.add(particleSystem);
        }

        function updateParticles() {
            if (!state.particlesAnimating || !particleSystem || fieldCurves.length === 0) return;

            const positions = particleSystem.geometry.attributes.position.array;
            const data = particleSystem.userData;

            for (let i = 0; i < state.particleCount; i++) {
                let pData = data[i];
                pData.t += pData.speed;
                if (pData.t > 1) {
                    pData.t = 0;
                    pData.curveIndex = Math.floor(Math.random() * fieldCurves.length);
                }

                const curve = fieldCurves[pData.curveIndex];
                if (curve) {
                    const pt = curve.getPointAt(pData.t);
                    positions[i * 3] = pt.x;
                    positions[i * 3 + 1] = pt.y;
                    positions[i * 3 + 2] = pt.z;
                }
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;
        }

        function updateProbeFieldStrength() {
            if (!truckMesh) return;
            const magnets = getActiveMagnets();
            const B = calculateBField(truckMesh.position, magnets);
            state.fieldStrengthAtProbe = B.length();
            
            // Update HUD
            document.getElementById('probe-position').innerHTML = `Probe Position: <span class="value-highlight">(${truckMesh.position.x.toFixed(1)}, ${truckMesh.position.y.toFixed(1)}, ${truckMesh.position.z.toFixed(1)})</span>`;
            document.getElementById('field-strength-display').innerHTML = `Field Strength at Probe: <span class="value-highlight">${state.fieldStrengthAtProbe.toFixed(5)} T</span>`;
        }

        // --- INITIALIZATION ---
        primaryMagnet = createMagnet();
        scene.add(primaryMagnet);

        // Load Truck
        const loader = new GLTFLoader();
        // Using a reliable CDN for the sample model
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/CesiumMilkTruck/glTF-Binary/CesiumMilkTruck.glb', function (gltf) {
            truckMesh = gltf.scene;
            truckMesh.scale.set(0.3, 0.3, 0.3);
            truckMesh.position.set(state.truckPosition.x, state.truckPosition.y, state.truckPosition.z);
            
            // Add a small point light to the truck to make it visible
            const truckLight = new THREE.PointLight(0xffffff, 0.5, 5);
            truckLight.position.set(0, 2, 0);
            truckMesh.add(truckLight);

            scene.add(truckMesh);
            state.truckLoaded = true;
            updateProbeFieldStrength();
        }, undefined, function (error) {
            console.error('Error loading truck model:', error);
            // Fallback to a box if model fails
            const geo = new THREE.BoxGeometry(1, 1, 2);
            const mat = new THREE.MeshPhongMaterial({color: 0xaaaaaa});
            truckMesh = new THREE.Mesh(geo, mat);
            truckMesh.position.set(state.truckPosition.x, state.truckPosition.y, state.truckPosition.z);
            scene.add(truckMesh);
            state.truckLoaded = true;
        });

        // Initial generation
        generateFieldLines();
        updateGridArrows();
        state.sceneReady = true;

        // --- EVENT LISTENERS ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('magnet-rotation-slider').addEventListener('input', (e) => {
            const angleDeg = parseFloat(e.target.value);
            state.magnetAngle = angleDeg;
            primaryMagnet.rotation.y = THREE.MathUtils.degToRad(angleDeg);
            
            document.getElementById('angle-display').innerHTML = `Magnet Angle: <span class="value-highlight">${angleDeg}°</span>`;
            
            generateFieldLines();
            updateGridArrows();
            updateProbeFieldStrength();
            if(state.particlesAnimating) initParticles();
        });

        document.getElementById('toggle-field-lines').addEventListener('click', () => {
            state.fieldLinesVisible = !state.fieldLinesVisible;
            fieldLinesGroup.visible = state.fieldLinesVisible;
            document.getElementById('lines-status').innerHTML = `Field Lines Visible: <span class="value-highlight">${state.fieldLinesVisible}</span>`;
            if(state.fieldLinesVisible) generateFieldLines();
        });

        document.getElementById('toggle-grid-arrows').addEventListener('click', () => {
            state.gridArrowsVisible = !state.gridArrowsVisible;
            gridArrowsGroup.visible = state.gridArrowsVisible;
            document.getElementById('grid-status').innerHTML = `Grid Arrows Visible: <span class="value-highlight">${state.gridArrowsVisible}</span>`;
            if(state.gridArrowsVisible) updateGridArrows();
        });

        document.getElementById('add-second-magnet').addEventListener('click', () => {
            state.secondMagnetActive = !state.secondMagnetActive;
            
            if (state.secondMagnetActive) {
                if (!secondaryMagnet) {
                    secondaryMagnet = createMagnet();
                    secondaryMagnet.position.set(5, 0, 0);
                    state.secondMagnetPosition = {x: 5, y: 0, z: 0};
                }
                scene.add(secondaryMagnet);
            } else {
                if (secondaryMagnet) scene.remove(secondaryMagnet);
                state.secondMagnetPosition = null;
            }

            document.getElementById('second-magnet-status').innerHTML = `Second Magnet: <span class="value-highlight">${state.secondMagnetActive ? 'active' : 'inactive'}</span>`;
            
            generateFieldLines();
            updateGridArrows();
            updateProbeFieldStrength();
            if(state.particlesAnimating) initParticles();
        });

        document.getElementById('field-plane-select').addEventListener('change', (e) => {
            state.activePlane = e.target.value;
            document.getElementById('plane-status').innerHTML = `Active Plane: <span class="value-highlight">${state.activePlane}</span>`;
            updateGridArrows();
        });

        document.getElementById('animate-particles').addEventListener('change', (e) => {
            state.particlesAnimating = e.target.checked;
            document.getElementById('particles-status').innerHTML = `Particles Animating: <span class="value-highlight">${state.particlesAnimating}</span>`;
            if (state.particlesAnimating) {
                initParticles();
            } else if (particleSystem) {
                scene.remove(particleSystem);
                particleSystem = null;
            }
        });

        // WASD Controls for Truck
        window.addEventListener('keydown', (e) => {
            if (!truckMesh) return;
            const step = 0.5;
            let moved = false;
            switch(e.key.toLowerCase()) {
                case 'w': truckMesh.position.z += step; moved = true; break;
                case 's': truckMesh.position.z -= step; moved = true; break;
                case 'a': truckMesh.position.x -= step; moved = true; break;
                case 'd': truckMesh.position.x += step; moved = true; break;
            }
            if (moved) {
                state.truckPosition = { x: truckMesh.position.x, y: truckMesh.position.y, z: truckMesh.position.z };
                updateProbeFieldStrength();
            }
        });

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            if (state.particlesAnimating) {
                updateParticles();
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
