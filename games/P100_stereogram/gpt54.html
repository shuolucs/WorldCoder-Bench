<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 多深度立体显示示例</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      backdrop-filter: blur(6px);
      min-width: 280px;
    }

    #ui .row {
      display: grid;
      grid-template-columns: 92px 1fr 58px;
      gap: 8px;
      align-items: center;
      margin: 8px 0;
    }

    #ui label {
      font-size: 13px;
      opacity: 0.95;
    }

    #ui input[type="range"],
    #ui select {
      width: 100%;
    }

    #ui .value {
      text-align: right;
      font-size: 12px;
      color: #9fe8ff;
      font-variant-numeric: tabular-nums;
    }

    #info {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.5;
      color: #ddd;
    }

    #hint {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      padding: 8px 10px;
      font-size: 12px;
      background: rgba(0,0,0,0.45);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      color: #ddd;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <div class="row">
        <label for="eyeSep">eyeSep</label>
        <input id="eyeSep" type="range" min="0.01" max="0.2" step="0.001" value="0.064" />
        <div class="value" id="eyeSepVal">0.064</div>
      </div>

      <div class="row">
        <label for="focalLength">focalLength</label>
        <input id="focalLength" type="range" min="10" max="50" step="0.1" value="25" />
        <div class="value" id="focalLengthVal">25.0</div>
      </div>

      <div class="row">
        <label for="stereoMode">stereoMode</label>
        <select id="stereoMode">
          <option value="side-by-side">side-by-side</option>
          <option value="anaglyph">anaglyph</option>
          <option value="cross-eye">cross-eye</option>
        </select>
        <div class="value" id="fpsVal">0 fps</div>
      </div>

      <div id="info">
        拖动滑块调整眼距与焦距；切换模式查看不同立体效果。<br />
        场景包含多个不同深度的物体，并持续旋转。
      </div>
    </div>

    <div id="hint">模式说明：side-by-side / anaglyph(红青眼镜) / cross-eye(斗鸡眼)</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { StereoEffect } from 'three/addons/effects/StereoEffect.js';
    import { AnaglyphEffect } from 'three/addons/effects/AnaglyphEffect.js';

    const container = document.getElementById('app');

    const eyeSepInput = document.getElementById('eyeSep');
    const focalInput = document.getElementById('focalLength');
    const stereoModeInput = document.getElementById('stereoMode');

    const eyeSepVal = document.getElementById('eyeSepVal');
    const focalVal = document.getElementById('focalLengthVal');
    const fpsVal = document.getElementById('fpsVal');

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05070d);
    scene.fog = new THREE.Fog(0x05070d, 8, 36);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.6, 9);
    camera.focus = parseFloat(focalInput.value);

    const ambient = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambient);

    const dir1 = new THREE.DirectionalLight(0xffffff, 1.8);
    dir1.position.set(4, 6, 8);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0x88aaff, 0.8);
    dir2.position.set(-5, 3, -4);
    scene.add(dir2);

    const grid = new THREE.GridHelper(24, 24, 0x4488ff, 0x224466);
    grid.position.y = -2.2;
    scene.add(grid);

    const objects = [];

    function addMesh(geometry, material, x, y, z) {
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.set(x, y, z);
      scene.add(mesh);
      objects.push(mesh);
      return mesh;
    }

    addMesh(
      new THREE.BoxGeometry(1.2, 1.2, 1.2),
      new THREE.MeshStandardMaterial({ color: 0xff5555, metalness: 0.15, roughness: 0.5 }),
      -3.2, 0.8, -8
    );

    addMesh(
      new THREE.SphereGeometry(0.95, 32, 24),
      new THREE.MeshStandardMaterial({ color: 0x55aaff, metalness: 0.2, roughness: 0.35 }),
      -1.2, -0.4, -4
    );

    addMesh(
      new THREE.TorusKnotGeometry(0.72, 0.24, 120, 18),
      new THREE.MeshStandardMaterial({ color: 0xffcc33, metalness: 0.55, roughness: 0.3 }),
      1.2, 0.9, 0
    );

    addMesh(
      new THREE.ConeGeometry(0.9, 1.8, 32),
      new THREE.MeshStandardMaterial({ color: 0x66dd88, metalness: 0.1, roughness: 0.55 }),
      3.2, -0.3, 4
    );

    addMesh(
      new THREE.OctahedronGeometry(1.0, 0),
      new THREE.MeshStandardMaterial({ color: 0xcc66ff, metalness: 0.35, roughness: 0.4 }),
      0.0, 1.4, 8
    );

    addMesh(
      new THREE.IcosahedronGeometry(0.82, 0),
      new THREE.MeshStandardMaterial({ color: 0x00e5c3, metalness: 0.25, roughness: 0.45 }),
      -2.4, 1.7, 12
    );

    const starGeo = new THREE.BufferGeometry();
    const starCount = 500;
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      starPositions[i * 3 + 0] = (Math.random() - 0.5) * 60;
      starPositions[i * 3 + 1] = Math.random() * 20 - 5;
      starPositions[i * 3 + 2] = (Math.random() - 0.5) * 80;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const stars = new THREE.Points(
      starGeo,
      new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, sizeAttenuation: true })
    );
    scene.add(stars);

    const stereoEffect = new StereoEffect(renderer);
    const anaglyphEffect = new AnaglyphEffect(renderer);

    let currentMode = stereoModeInput.value;

    function syncState() {
      eyeSepVal.textContent = Number(eyeSepInput.value).toFixed(3);
      focalVal.textContent = Number(focalInput.value).toFixed(1);

      const eyeSep = parseFloat(eyeSepInput.value);
      const focalLength = parseFloat(focalInput.value);
      const stereoMode = stereoModeInput.value;

      camera.focus = focalLength;

      // StereoEffect 使用 StereoCamera，支持 eyeSep
      stereoEffect.stereo.cameraL.focus = focalLength;
      stereoEffect.stereo.cameraR.focus = focalLength;
      stereoEffect.stereo.eyeSep = eyeSep;

      // AnaglyphEffect 内部也基于 StereoCamera
      anaglyphEffect.stereo.cameraL.focus = focalLength;
      anaglyphEffect.stereo.cameraR.focus = focalLength;
      anaglyphEffect.stereo.eyeSep = eyeSep;

      currentMode = stereoMode;

      if (!window.__3D_STATE__) window.__3D_STATE__ = {};
      window.__3D_STATE__.eyeSep = eyeSep;
      window.__3D_STATE__.focalLength = focalLength;
      window.__3D_STATE__.stereoMode = stereoMode;
      window.__3D_STATE__.objectCount = objects.length;
      window.__3D_STATE__.fps = window.__3D_STATE__.fps || 0;
    }

    eyeSepInput.addEventListener('input', syncState);
    focalInput.addEventListener('input', syncState);
    stereoModeInput.addEventListener('change', syncState);

    function resize() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
      stereoEffect.setSize(w, h);
      anaglyphEffect.setSize(w, h);
    }

    window.addEventListener('resize', resize);

    // 初始化状态
    window.__3D_STATE__ = {
      eyeSep: parseFloat(eyeSepInput.value),
      focalLength: parseFloat(focalInput.value),
      stereoMode: stereoModeInput.value,
      objectCount: objects.length,
      fps: 0
    };

    syncState();
    resize();

    let lastTime = performance.now();
    let fpsTime = lastTime;
    let frames = 0;

    function renderCrossEye(scene, camera) {
      const size = renderer.getSize(new THREE.Vector2());
      const width = size.x;
      const height = size.y;

      stereoEffect.stereo.update(camera);

      renderer.setScissorTest(true);
      renderer.clear();

      // cross-eye: 左眼图像画在右边，右眼图像画在左边
      renderer.setViewport(0, 0, width / 2, height);
      renderer.setScissor(0, 0, width / 2, height);
      renderer.render(scene, stereoEffect.stereo.cameraR);

      renderer.setViewport(width / 2, 0, width / 2, height);
      renderer.setScissor(width / 2, 0, width / 2, height);
      renderer.render(scene, stereoEffect.stereo.cameraL);

      renderer.setScissorTest(false);
    }

    function animate(now) {
      requestAnimationFrame(animate);

      const dt = (now - lastTime) * 0.001;
      lastTime = now;

      objects.forEach((obj, i) => {
        obj.rotation.x += dt * (0.25 + i * 0.03);
        obj.rotation.y += dt * (0.5 + i * 0.05);
      });

      stars.rotation.y += dt * 0.02;

      camera.position.x = Math.sin(now * 0.00025) * 0.8;
      camera.lookAt(0, 0.5, 2);

      if (currentMode === 'anaglyph') {
        anaglyphEffect.render(scene, camera);
      } else if (currentMode === 'cross-eye') {
        renderCrossEye(scene, camera);
      } else {
        stereoEffect.render(scene, camera);
      }

      frames++;
      if (now - fpsTime >= 1000) {
        const fps = Math.round((frames * 1000) / (now - fpsTime));
        fpsVal.textContent = `${fps} fps`;
        window.__3D_STATE__.fps = fps;
        fpsTime = now;
        frames = 0;
      }
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
