<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Stereo Depth Scene</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            color: #eee;
            font-family: monospace;
        }
        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(20, 20, 20, 0.85);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .control-row {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        .control-row:last-child {
            margin-bottom: 0;
        }
        label {
            width: 120px;
            display: inline-block;
            font-size: 13px;
        }
        input[type="range"] {
            width: 130px;
            margin: 0 10px;
        }
        select {
            width: 140px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 3px;
            border-radius: 4px;
        }
        .val-display {
            width: 30px;
            text-align: right;
            font-size: 12px;
            color: #aaa;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>

    <div id="ui-container">
        <div class="control-row">
            <label for="eyeSep">Eye Separation</label>
            <input type="range" id="eyeSep" min="0.01" max="0.2" step="0.001" value="0.064">
            <span class="val-display" id="eyeSepVal">0.064</span>
        </div>
        <div class="control-row">
            <label for="focalLength">Focal Length</label>
            <input type="range" id="focalLength" min="10" max="50" step="0.5" value="20">
            <span class="val-display" id="focalLengthVal">20.0</span>
        </div>
        <div class="control-row">
            <label for="stereoMode">Stereo Mode</label>
            <select id="stereoMode">
                <option value="side-by-side">Side-by-Side</option>
                <option value="cross-eye">Cross-Eye</option>
                <option value="anaglyph">Anaglyph (Red-Cyan)</option>
            </select>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { StereoEffect } from 'three/addons/effects/StereoEffect.js';
        import { AnaglyphEffect } from 'three/addons/effects/AnaglyphEffect.js';

        // 1. State Initialization
        window.__3D_STATE__ = {
            eyeSep: 0.064,
            focalLength: 20,
            stereoMode: 'side-by-side',
            objectCount: 0,
            fps: 0
        };

        // 2. Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.FogExp2(0x050505, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 0, 5);
        camera.focus = window.__3D_STATE__.focalLength;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 3. Effects Setup
        const stereoEffect = new StereoEffect(renderer);
        stereoEffect.setSize(window.innerWidth, window.innerHeight);

        const anaglyphEffect = new AnaglyphEffect(renderer);
        anaglyphEffect.setSize(window.innerWidth, window.innerHeight);

        // 4. Objects Creation (Depth arrangement)
        const meshes = [];
        const geometries = [
            new THREE.TorusKnotGeometry(0.8, 0.25, 100, 16),
            new THREE.IcosahedronGeometry(1, 1),
            new THREE.OctahedronGeometry(1, 0),
            new THREE.BoxGeometry(1.5, 1.5, 1.5),
            new THREE.SphereGeometry(1, 32, 16),
            new THREE.TetrahedronGeometry(1.2, 0)
        ];
        
        const colors = [0xff3333, 0x33ff33, 0x3333ff, 0xffff33, 0xff33ff, 0x33ffff];

        for (let i = 0; i < 6; i++) {
            const material = new THREE.MeshStandardMaterial({
                color: colors[i],
                roughness: 0.4,
                metalness: 0.6,
                wireframe: i % 2 === 0
            });
            
            const mesh = new THREE.Mesh(geometries[i], material);
            
            // Arrange along Z axis (depth)
            mesh.position.z = -i * 8;
            
            // Slight offsets for better visibility
            mesh.position.x = (Math.random() - 0.5) * 4;
            mesh.position.y = (Math.random() - 0.5) * 4;
            
            // Varying scales
            mesh.scale.setScalar(1 + i * 0.15);
            
            scene.add(mesh);
            meshes.push(mesh);
        }
        window.__3D_STATE__.objectCount = meshes.length;

        // Add a grid helper for depth reference
        const gridHelper = new THREE.GridHelper(100, 50, 0x444444, 0x222222);
        gridHelper.position.y = -3;
        scene.add(gridHelper);

        // 5. Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xffaa00, 2, 50);
        pointLight.position.set(0, 0, -10);
        scene.add(pointLight);

        // 6. UI Controls & Event Listeners
        const eyeSepInput = document.getElementById('eyeSep');
        const focalLengthInput = document.getElementById('focalLength');
        const stereoModeSelect = document.getElementById('stereoMode');
        const eyeSepVal = document.getElementById('eyeSepVal');
        const focalLengthVal = document.getElementById('focalLengthVal');

        eyeSepInput.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            window.__3D_STATE__.eyeSep = val;
            eyeSepVal.textContent = val.toFixed(3);
        });

        focalLengthInput.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            window.__3D_STATE__.focalLength = val;
            focalLengthVal.textContent = val.toFixed(1);
            camera.focus = val;
            camera.updateProjectionMatrix();
        });

        stereoModeSelect.addEventListener('change', (e) => {
            window.__3D_STATE__.stereoMode = e.target.value;
            // Reset renderer viewport/scissor when switching away from StereoEffect
            renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
            renderer.setScissorTest(false);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            stereoEffect.setSize(window.innerWidth, window.innerHeight);
            anaglyphEffect.setSize(window.innerWidth, window.innerHeight);
        });

        // 7. Animation & Render Loop
        let lastTime = performance.now();
        let frameCount = 0;

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - lastTime) / 1000;

            // FPS Calculation
            frameCount++;
            if (time >= lastTime + 1000) {
                window.__3D_STATE__.fps = Math.round((frameCount * 1000) / (time - lastTime));
                frameCount = 0;
                lastTime = time;
            }

            // Animate objects
            meshes.forEach((mesh, index) => {
                mesh.rotation.x += 0.5 * delta * (index % 2 === 0 ? 1 : -1);
                mesh.rotation.y += 0.7 * delta;
            });

            // Render based on selected mode
            const state = window.__3D_STATE__;
            
            if (state.stereoMode === 'side-by-side') {
                stereoEffect.setEyeSeparation(state.eyeSep);
                stereoEffect.render(scene, camera);
            } 
            else if (state.stereoMode === 'cross-eye') {
                // Negative eye separation swaps left/right cameras for cross-eye viewing
                stereoEffect.setEyeSeparation(-state.eyeSep);
                stereoEffect.render(scene, camera);
            } 
            else if (state.stereoMode === 'anaglyph') {
                // AnaglyphEffect uses StereoCamera internally which respects camera.focus
                // Note: AnaglyphEffect in r170 doesn't expose setEyeSeparation directly, 
                // it relies on the internal StereoCamera defaults and camera.focus.
                anaglyphEffect.render(scene, camera);
            }
        }

        animate();
    </script>
</body>
</html>
