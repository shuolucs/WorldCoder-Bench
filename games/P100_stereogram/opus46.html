<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Depth Stereo 3D Viewer</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; color: #fff; }
  #canvas-container { width: 100vw; height: 100vh; }
  canvas { display: block; }

  #controls {
    position: fixed;
    top: 16px;
    left: 16px;
    background: rgba(10, 10, 30, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    padding: 20px;
    min-width: 280px;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  #controls h2 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
    color: #8af;
    letter-spacing: 0.5px;
  }

  .control-group {
    margin-bottom: 14px;
  }

  .control-group label {
    display: block;
    font-size: 12px;
    color: #aab;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .control-group .value-display {
    float: right;
    color: #8df;
    font-weight: 600;
    font-size: 12px;
  }

  input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #6af;
    border: 2px solid #fff;
    cursor: pointer;
  }

  select {
    width: 100%;
    padding: 8px 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: #fff;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }

  select option {
    background: #1a1a2e;
    color: #fff;
  }

  #stats {
    position: fixed;
    bottom: 16px;
    left: 16px;
    background: rgba(10, 10, 30, 0.8);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
    color: #8ab;
    z-index: 100;
  }

  #stats span { color: #8df; font-weight: 600; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="controls">
  <h2>🔭 Stereo 3D Controls</h2>

  <div class="control-group">
    <label>Eye Separation <span class="value-display" id="eyeSepVal">0.064</span></label>
    <input type="range" id="eyeSep" min="0.01" max="0.2" step="0.001" value="0.064">
  </div>

  <div class="control-group">
    <label>Focal Length <span class="value-display" id="focalLengthVal">30</span></label>
    <input type="range" id="focalLength" min="10" max="50" step="0.5" value="30">
  </div>

  <div class="control-group">
    <label>Stereo Mode</label>
    <select id="stereoMode">
      <option value="side-by-side">Side-by-Side</option>
      <option value="anaglyph">Anaglyph (Red-Cyan)</option>
      <option value="cross-eye">Cross-Eye</option>
    </select>
  </div>
</div>

<div id="stats">
  FPS: <span id="fpsDisplay">0</span> | Objects: <span id="objDisplay">0</span> | Mode: <span id="modeDisplay">side-by-side</span>
</div>

<script type="module">
import * as THREE from 'three';
import { StereoEffect } from 'three/addons/effects/StereoEffect.js';
import { AnaglyphEffect } from 'three/addons/effects/AnaglyphEffect.js';

// ─── State ───
window.__3D_STATE__ = {
  eyeSep: 0.064,
  focalLength: 30,
  stereoMode: 'side-by-side',
  objectCount: 0,
  fps: 0
};

// ─── Scene Setup ───
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.FogExp2(0x050510, 0.012);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 12);
camera.lookAt(0, 0, -10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

// ─── Effects ───
let stereoEffect = new StereoEffect(renderer);
stereoEffect.setSize(window.innerWidth, window.innerHeight);

let anaglyphEffect = new AnaglyphEffect(renderer);
anaglyphEffect.setSize(window.innerWidth, window.innerHeight);

let currentEffect = stereoEffect;
let currentMode = 'side-by-side';

// ─── Lighting ───
const ambientLight = new THREE.AmbientLight(0x334466, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5);
dirLight.position.set(5, 10, 8);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

const pointLight1 = new THREE.PointLight(0x4488ff, 2, 40);
pointLight1.position.set(-5, 4, 0);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0xff4488, 2, 40);
pointLight2.position.set(5, 3, -8);
scene.add(pointLight2);

const pointLight3 = new THREE.PointLight(0x44ff88, 1.5, 30);
pointLight3.position.set(0, 5, -20);
scene.add(pointLight3);

// ─── Objects at different depths ───
const meshes = [];

// Helper to create materials
function createMaterial(color, metalness = 0.3, roughness = 0.4) {
  return new THREE.MeshStandardMaterial({
    color,
    metalness,
    roughness,
    envMapIntensity: 0.5
  });
}

// Object 1: Large torus knot - near (z = 4)
const torusKnotGeo = new THREE.TorusKnotGeometry(1.2, 0.35, 128, 32);
const torusKnotMat = createMaterial(0xff4466, 0.6, 0.2);
const torusKnot = new THREE.Mesh(torusKnotGeo, torusKnotMat);
torusKnot.position.set(-3, 1.5, 4);
torusKnot.castShadow = true;
torusKnot.receiveShadow = true;
scene.add(torusKnot);
meshes.push(torusKnot);

// Object 2: Icosahedron - slightly behind (z = 0)
const icoGeo = new THREE.IcosahedronGeometry(1.0, 1);
const icoMat = createMaterial(0x44aaff, 0.7, 0.15);
const ico = new THREE.Mesh(icoGeo, icoMat);
ico.position.set(2.5, 2, 0);
ico.castShadow = true;
ico.receiveShadow = true;
scene.add(ico);
meshes.push(ico);

// Object 3: Cylinder - mid depth (z = -5)
const cylGeo = new THREE.CylinderGeometry(0.6, 0.8, 3, 32);
const cylMat = createMaterial(0xffaa22, 0.4, 0.5);
const cyl = new THREE.Mesh(cylGeo, cylMat);
cyl.position.set(-1, 1.5, -5);
cyl.castShadow = true;
cyl.receiveShadow = true;
scene.add(cyl);
meshes.push(cyl);

// Object 4: Dodecahedron - far (z = -12)
const dodGeo = new THREE.DodecahedronGeometry(1.5, 0);
const dodMat = createMaterial(0x22ff88, 0.5, 0.3);
const dod = new THREE.Mesh(dodGeo, dodMat);
dod.position.set(3, 1, -12);
dod.castShadow = true;
dod.receiveShadow = true;
scene.add(dod);
meshes.push(dod);

// Object 5: Octahedron - very far (z = -20)
const octGeo = new THREE.OctahedronGeometry(2.0, 0);
const octMat = createMaterial(0xaa44ff, 0.6, 0.2);
const oct = new THREE.Mesh(octGeo, octMat);
oct.position.set(-2, 2.5, -20);
oct.castShadow = true;
oct.receiveShadow = true;
scene.add(oct);
meshes.push(oct);

// Object 6: Sphere - medium far (z = -8)
const sphereGeo = new THREE.SphereGeometry(0.9, 32, 32);
const sphereMat = createMaterial(0xff88cc, 0.8, 0.1);
const sphere = new THREE.Mesh(sphereGeo, sphereMat);
sphere.position.set(0, 3.5, -8);
sphere.castShadow = true;
sphere.receiveShadow = true;
scene.add(sphere);
meshes.push(sphere);

// Object 7: Box - near (z = 2)
const boxGeo = new THREE.BoxGeometry(1.4, 1.4, 1.4);
const boxMat = createMaterial(0xffff44, 0.3, 0.6);
const box = new THREE.Mesh(boxGeo, boxMat);
box.position.set(4, 0.7, 2);
box.castShadow = true;
box.receiveShadow = true;
scene.add(box);
meshes.push(box);

// Object 8: Cone - far back (z = -16)
const coneGeo = new THREE.ConeGeometry(1.0, 2.5, 6);
const coneMat = createMaterial(0x44ffff, 0.5, 0.35);
const cone = new THREE.Mesh(coneGeo, coneMat);
cone.position.set(-4, 1.25, -16);
cone.castShadow = true;
cone.receiveShadow = true;
scene.add(cone);
meshes.push(cone);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(80, 80);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x111122,
  metalness: 0.1,
  roughness: 0.9
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.5;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper for depth reference
const gridHelper = new THREE.GridHelper(60, 60, 0x222244, 0x111133);
gridHelper.position.y = -0.49;
scene.add(gridHelper);

// Floating particles for depth cues
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const particleColors = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  positions[i * 3] = (Math.random() - 0.5) * 30;
  positions[i * 3 + 1] = Math.random() * 10;
  positions[i * 3 + 2] = (Math.random() - 0.5) * 50 - 5;
  const c = new THREE.Color().setHSL(Math.random() * 0.3 + 0.5, 0.8, 0.6);
  particleColors[i * 3] = c.r;
  particleColors[i * 3 + 1] = c.g;
  particleColors[i * 3 + 2] = c.b;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
const particleMat = new THREE.PointsMaterial({
  size: 0.08,
  vertexColors: true,
  transparent: true,
  opacity: 0.7,
  sizeAttenuation: true
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ─── Update object count ───
window.__3D_STATE__.objectCount = meshes.length;
document.getElementById('objDisplay').textContent = meshes.length;

// ─── Controls ───
const eyeSepInput = document.getElementById('eyeSep');
const focalLengthInput = document.getElementById('focalLength');
const stereoModeSelect = document.getElementById('stereoMode');
const eyeSepVal = document.getElementById('eyeSepVal');
const focalLengthVal = document.getElementById('focalLengthVal');

function updateEyeSeparation(value) {
  window.__3D_STATE__.eyeSep = value;
  eyeSepVal.textContent = value.toFixed(3);

  // StereoEffect uses camera's stereo property
  // The StereoEffect internally uses camera.stereo which has eyeSep
  // We set it on the stereo camera
  if (stereoEffect) {
    stereoEffect.setEyeSeparation(value);
  }
  if (anaglyphEffect) {
    anaglyphEffect.setEyeSeparation(value);
  }
}

function updateFocalLength(value) {
  window.__3D_STATE__.focalLength = value;
  focalLengthVal.textContent = value.toFixed(1);
  camera.focus = value;
  camera.updateProjectionMatrix();
}

function switchMode(mode) {
  currentMode = mode;
  window.__3D_STATE__.stereoMode = mode;
  document.getElementById('modeDisplay').textContent = mode;

  // Remove old canvas if AnaglyphEffect created a new one
  // Re-append renderer's canvas
  const existingCanvases = container.querySelectorAll('canvas');
  existingCanvases.forEach(c => c.remove());

  // Recreate effects with fresh renderer to avoid conflicts
  renderer.setSize(window.innerWidth, window.innerHeight);
  container.appendChild(renderer.domElement);

  if (mode === 'anaglyph') {
    anaglyphEffect = new AnaglyphEffect(renderer);
    anaglyphEffect.setSize(window.innerWidth, window.innerHeight);
    anaglyphEffect.setEyeSeparation(parseFloat(eyeSepInput.value));
    currentEffect = anaglyphEffect;
  } else {
    // side-by-side and cross-eye both use StereoEffect
    stereoEffect = new StereoEffect(renderer);
    stereoEffect.setSize(window.innerWidth, window.innerHeight);
    stereoEffect.setEyeSeparation(parseFloat(eyeSepInput.value));
    currentEffect = stereoEffect;
  }
}

eyeSepInput.addEventListener('input', (e) => {
  updateEyeSeparation(parseFloat(e.target.value));
});

focalLengthInput.addEventListener('input', (e) => {
  updateFocalLength(parseFloat(e.target.value));
});

stereoModeSelect.addEventListener('change', (e) => {
  switchMode(e.target.value);
});

// Initialize
updateEyeSeparation(parseFloat(eyeSepInput.value));
updateFocalLength(parseFloat(focalLengthInput.value));

// ─── Cross-eye custom rendering ───
// For cross-eye mode, we swap left/right views by rendering manually
// We'll use a custom approach: render with StereoEffect but swap the viewports

function renderCrossEye() {
  // Cross-eye: swap left and right eye images
  // We render each eye to a render target, then draw them swapped
  const width = window.innerWidth;
  const height = window.innerHeight;
  const halfWidth = width / 2;

  const stereo = new THREE.StereoCamera();
  stereo.eyeSep = parseFloat(eyeSepInput.value);
  stereo.update(camera);

  renderer.setScissorTest(true);

  // Left half of screen gets RIGHT eye (for cross-eye viewing)
  renderer.setViewport(0, 0, halfWidth, height);
  renderer.setScissor(0, 0, halfWidth, height);
  renderer.render(scene, stereo.cameraR);

  // Right half of screen gets LEFT eye
  renderer.setViewport(halfWidth, 0, halfWidth, height);
  renderer.setScissor(halfWidth, 0, halfWidth, height);
  renderer.render(scene, stereo.cameraL);

  renderer.setScissorTest(false);
}

// ─── FPS Counter ───
let frameCount = 0;
let lastFpsTime = performance.now();

function updateFPS() {
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    const fps = Math.round(frameCount * 1000 / (now - lastFpsTime));
    window.__3D_STATE__.fps = fps;
    document.getElementById('fpsDisplay').textContent = fps;
    frameCount = 0;
    lastFpsTime = now;
  }
}

// ─── Mouse interaction for subtle camera movement ───
let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', (e) => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

// ─── Animation Loop ───
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime();
  const dt = clock.getDelta();

  // Animate objects
  torusKnot.rotation.x = t * 0.5;
  torusKnot.rotation.y = t * 0.3;
  torusKnot.position.y = 1.5 + Math.sin(t * 0.8) * 0.5;

  ico.rotation.x = t * 0.4;
  ico.rotation.z = t * 0.6;
  ico.position.y = 2 + Math.sin(t * 1.2 + 1) * 0.4;

  cyl.rotation.y = t * 0.3;
  cyl.rotation.z = Math.sin(t * 0.5) * 0.2;
  cyl.position.y = 1.5 + Math.sin(t * 0.6 + 2) * 0.3;

  dod.rotation.x = t * 0.25;
  dod.rotation.y = t * 0.35;
  dod.position.y = 1 + Math.sin(t * 0.7 + 3) * 0.6;

  oct.rotation.x = t * 0.2;
  oct.rotation.y = t * 0.4;
  oct.position.y = 2.5 + Math.sin(t * 0.5 + 4) * 0.8;

  sphere.position.y = 3.5 + Math.sin(t * 1.0) * 0.5;
  sphere.position.x = Math.sin(t * 0.3) * 1.5;

  box.rotation.x = t * 0.6;
  box.rotation.y = t * 0.4;
  box.position.y = 0.7 + Math.sin(t * 0.9 + 1.5) * 0.3;

  cone.rotation.y = t * 0.5;
  cone.position.y = 1.25 + Math.sin(t * 0.4 + 2.5) * 0.4;

  // Animate particles
  const posArr = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    posArr[i * 3 + 1] += Math.sin(t + i * 0.1) * 0.002;
  }
  particles.geometry.attributes.position.needsUpdate = true;
  particles.rotation.y = t * 0.02;

  // Subtle camera sway based on mouse
  camera.position.x = THREE.MathUtils.lerp(camera.position.x, mouseX * 3, 0.02);
  camera.position.y = THREE.MathUtils.lerp(camera.position.y, 2 - mouseY * 1.5, 0.02);
  camera.lookAt(0, 1, -8);

  // Animate lights
  pointLight1.position.x = Math.sin(t * 0.5) * 6;
  pointLight1.position.z = Math.cos(t * 0.5) * 6;
  pointLight2.position.x = Math.cos(t * 0.3) * 7;
  pointLight2.position.z = Math.sin(t * 0.3) * 7 - 5;

  // Render based on mode
  if (currentMode === 'cross-eye') {
    renderCrossEye();
  } else if (currentMode === 'anaglyph') {
    currentEffect.render(scene, camera);
  } else {
    // side-by-side
    currentEffect.render(scene, camera);
  }

  updateFPS();
}

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);

  if (currentEffect && currentEffect.setSize) {
    currentEffect.setSize(window.innerWidth, window.innerHeight);
  }
});

// Start
animate();
</script>
</body>
</html>
