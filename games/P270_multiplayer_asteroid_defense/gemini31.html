<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Asteroid Defense</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            box-sizing: border-box;
            padding: 20px;
            text-shadow: 1px 1px 2px #000;
        }
        .hud-element {
            position: absolute;
            font-weight: bold;
            font-size: 18px;
        }
        #p1-hud {
            top: 20px;
            left: 20px;
            color: #00ff00;
        }
        #p2-hud {
            top: 20px;
            right: 20px;
            color: #0088ff;
            text-align: right;
        }
        #center-hud {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
            width: 300px;
        }
        #hp-bar-container {
            width: 100%;
            height: 20px;
            background-color: #333;
            border: 2px solid #fff;
            margin-top: 5px;
            position: relative;
        }
        #hp-bar {
            height: 100%;
            width: 100%;
            background-color: #00ff00;
            transition: width 0.2s, background-color 0.2s;
        }
        #wave-hud {
            margin-top: 10px;
            font-size: 20px;
            color: #ffff00;
        }
        #bottom-hud {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
        }
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 10;
        }
        #game-over h1 {
            font-size: 64px;
            color: #ff0000;
            margin-bottom: 10px;
        }
        #game-over p {
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div id="p1-hud" class="hud-element">P1 Score: 0 | Kills: 0</div>
        <div id="p2-hud" class="hud-element">P2 Score: 0 | Kills: 0</div>
        <div id="center-hud" class="hud-element">
            <div id="hp-text">Station HP: 100/100</div>
            <div id="hp-bar-container"><div id="hp-bar"></div></div>
            <div id="wave-hud">Wave: 1</div>
        </div>
        <div id="bottom-hud" class="hud-element">Asteroids: 0/20</div>
    </div>
    <div id="game-over">
        <h1>GAME OVER</h1>
        <p id="final-scores"></p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
    <script>
        // State Management
        window.__3D_STATE__ = {
            p1Score: 0, p2Score: 0,
            p1Kills: 0, p2Kills: 0,
            p1Position: { x: 15, z: 0 }, p2Position: { x: -15, z: 0 },
            stationHP: 100,
            asteroidCount: 0,
            bulletCount: 0,
            wave: 1,
            gameOver: false,
            powerupActive: false,
            totalAsteroidsSpawned: 0,
            p1LastShotTime: 0, p2LastShotTime: 0
        };

        const state = window.__3D_STATE__;

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 50, 0);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Starfield
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = new Float32Array(500 * 3);
        for (let i = 0; i < 500; i++) {
            const r = 200 * Math.cbrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            const phi = Math.acos(2 * Math.random() - 1);
            starsPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            starsPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            starsPos[i * 3 + 2] = r * Math.cos(phi);
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1 });
        const starField = new THREE.Points(starsGeo, starsMat);
        scene.add(starField);

        // Station
        const stationGeo = new THREE.DodecahedronGeometry(3);
        const stationMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true });
        const station = new THREE.Mesh(stationGeo, stationMat);
        scene.add(station);

        // Players
        const shipGeo = new THREE.ConeGeometry(0.5, 1.5, 8);
        shipGeo.rotateX(-Math.PI / 2); // Point towards -Z

        const p1Mat = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
        const p1 = new THREE.Mesh(shipGeo, p1Mat);
        p1.position.set(15, 0, 0);
        scene.add(p1);

        const p2Mat = new THREE.MeshStandardMaterial({ color: 0x0088ff });
        const p2 = new THREE.Mesh(shipGeo, p2Mat);
        p2.position.set(-15, 0, 0);
        scene.add(p2);

        // Input
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Game Entities
        const bullets = [];
        const asteroids = [];
        let powerup = null;

        // Timers
        let lastAsteroidSpawn = 0;
        let asteroidSpawnInterval = 2000;
        let lastPowerupSpawn = Date.now();
        const gameStartTime = Date.now();

        // Functions
        function shoot(playerMesh, isP1) {
            const now = Date.now();
            const lastShot = isP1 ? state.p1LastShotTime : state.p2LastShotTime;
            if (now - lastShot < 500) return;

            if (isP1) state.p1LastShotTime = now;
            else state.p2LastShotTime = now;

            const bGeo = new THREE.SphereGeometry(0.2);
            const bMat = new THREE.MeshBasicMaterial({ color: isP1 ? 0x00ff00 : 0x0088ff });
            const bullet = new THREE.Mesh(bGeo, bMat);
            bullet.position.copy(playerMesh.position);

            const vx = -Math.sin(playerMesh.rotation.y) * 0.8;
            const vz = -Math.cos(playerMesh.rotation.y) * 0.8;

            bullets.push({ mesh: bullet, vx, vz, owner: isP1 ? 1 : 2, spawnTime: now });
            scene.add(bullet);
        }

        function spawnAsteroid(now) {
            if (now - lastAsteroidSpawn > asteroidSpawnInterval && asteroids.length < 20) {
                lastAsteroidSpawn = now;
                const r = 0.5 + Math.random();
                const aGeo = new THREE.IcosahedronGeometry(r);
                const aMat = new THREE.MeshStandardMaterial({ color: 0x8b0000 });
                const ast = new THREE.Mesh(aGeo, aMat);

                const angle = Math.random() * Math.PI * 2;
                ast.position.set(Math.cos(angle) * 40, 0, Math.sin(angle) * 40);

                const speed = 0.08 + Math.random() * 0.07;
                const len = Math.sqrt(ast.position.x ** 2 + ast.position.z ** 2);
                const vx = -(ast.position.x / len) * speed;
                const vz = -(ast.position.z / len) * speed;

                const maxHp = Math.ceil(r * 2);
                asteroids.push({ mesh: ast, vx, vz, hp: maxHp, maxHp, radius: r });
                scene.add(ast);
                state.totalAsteroidsSpawned++;
            }
        }

        function spawnPowerup(now) {
            if (!powerup && now - lastPowerupSpawn > 15000) {
                const puGeo = new THREE.TorusGeometry(1, 0.3, 8, 16);
                const puMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
                const puMesh = new THREE.Mesh(puGeo, puMat);
                
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 25;
                puMesh.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
                puMesh.rotation.x = Math.PI / 2;
                
                scene.add(puMesh);
                powerup = { mesh: puMesh };
                state.powerupActive = true;
            }
        }

        function collectPowerup(playerNum) {
            scene.remove(powerup.mesh);
            powerup = null;
            lastPowerupSpawn = Date.now();
            state.powerupActive = false;
            state.stationHP = Math.min(100, state.stationHP + 10);
            if (playerNum === 1) state.p1Score += 25;
            else state.p2Score += 25;
        }

        function updateHUD() {
            document.getElementById('p1-hud').innerText = `P1 Score: ${state.p1Score} | Kills: ${state.p1Kills}`;
            document.getElementById('p2-hud').innerText = `P2 Score: ${state.p2Score} | Kills: ${state.p2Kills}`;
            
            const hpBar = document.getElementById('hp-bar');
            const hp = Math.max(0, state.stationHP);
            hpBar.style.width = hp + '%';
            if (hp > 60) hpBar.style.backgroundColor = '#00ff00';
            else if (hp > 30) hpBar.style.backgroundColor = '#ffff00';
            else hpBar.style.backgroundColor = '#ff0000';
            
            document.getElementById('hp-text').innerText = `Station HP: ${hp}/100`;
            document.getElementById('wave-hud').innerText = `Wave: ${state.wave}`;
            document.getElementById('bottom-hud').innerText = `Asteroids: ${state.asteroidCount}/20`;
        }

        // Main Loop
        function animate() {
            if (state.gameOver) return;
            requestAnimationFrame(animate);

            const now = Date.now();

            // Wave Logic
            const elapsed = now - gameStartTime;
            const currentWave = Math.floor(elapsed / 20000) + 1;
            if (currentWave > state.wave) {
                state.wave = currentWave;
                asteroidSpawnInterval = Math.max(500, 2000 - (currentWave - 1) * 200);
            }

            // P1 Movement
            let p1dx = 0, p1dz = 0;
            if (keys['KeyW']) p1dz -= 1;
            if (keys['KeyS']) p1dz += 1;
            if (keys['KeyA']) p1dx -= 1;
            if (keys['KeyD']) p1dx += 1;
            if (p1dx !== 0 || p1dz !== 0) {
                const len = Math.sqrt(p1dx * p1dx + p1dz * p1dz);
                p1.position.x += (p1dx / len) * 0.3;
                p1.position.z += (p1dz / len) * 0.3;
                p1.rotation.y = Math.atan2(p1dx, p1dz) + Math.PI;
            }

            // P2 Movement
            let p2dx = 0, p2dz = 0;
            if (keys['ArrowUp']) p2dz -= 1;
            if (keys['ArrowDown']) p2dz += 1;
            if (keys['ArrowLeft']) p2dx -= 1;
            if (keys['ArrowRight']) p2dx += 1;
            if (p2dx !== 0 || p2dz !== 0) {
                const len = Math.sqrt(p2dx * p2dx + p2dz * p2dz);
                p2.position.x += (p2dx / len) * 0.3;
                p2.position.z += (p2dz / len) * 0.3;
                p2.rotation.y = Math.atan2(p2dx, p2dz) + Math.PI;
            }

            // Shooting Input
            if (keys['Space']) shoot(p1, true);
            if (keys['Enter']) shoot(p2, false);

            // Update Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.mesh.position.x += b.vx;
                b.mesh.position.z += b.vz;
                
                if (now - b.spawnTime > 3000) {
                    scene.remove(b.mesh);
                    bullets.splice(i, 1);
                    continue;
                }

                let hit = false;
                for (let j = asteroids.length - 1; j >= 0; j--) {
                    const a = asteroids[j];
                    if (b.mesh.position.distanceTo(a.mesh.position) < a.radius + 0.3) {
                        a.hp--;
                        hit = true;
                        if (b.owner === 1) state.p1Score += 10;
                        else state.p2Score += 10;

                        if (a.hp <= 0) {
                            scene.remove(a.mesh);
                            asteroids.splice(j, 1);
                            if (b.owner === 1) {
                                state.p1Score += 50;
                                state.p1Kills++;
                            } else {
                                state.p2Score += 50;
                                state.p2Kills++;
                            }
                        }
                        break;
                    }
                }
                if (hit) {
                    scene.remove(b.mesh);
                    bullets.splice(i, 1);
                }
            }

            // Spawning
            spawnAsteroid(now);
            spawnPowerup(now);

            // Update Asteroids
            for (let i = asteroids.length - 1; i >= 0; i--) {
                const a = asteroids[i];
                a.mesh.position.x += a.vx;
                a.mesh.position.z += a.vz;
                a.mesh.rotation.x += 0.01;
                a.mesh.rotation.y += 0.02;

                if (a.mesh.position.distanceTo(station.position) < 4) {
                    state.stationHP -= 10 * a.maxHp;
                    scene.remove(a.mesh);
                    asteroids.splice(i, 1);
                    if (state.stationHP <= 0) {
                        state.gameOver = true;
                    }
                }
            }

            // Update Powerup
            if (powerup) {
                powerup.mesh.rotation.z += 0.05;
                if (p1.position.distanceTo(powerup.mesh.position) < 2) collectPowerup(1);
                else if (p2.position.distanceTo(powerup.mesh.position) < 2) collectPowerup(2);
            }

            // Station Animation
            station.rotation.y += 0.005;
            station.rotation.x += 0.002;

            // Sync State
            state.p1Position.x = p1.position.x;
            state.p1Position.z = p1.position.z;
            state.p2Position.x = p2.position.x;
            state.p2Position.z = p2.position.z;
            state.asteroidCount = asteroids.length;
            state.bulletCount = bullets.length;

            updateHUD();

            if (state.gameOver) {
                document.getElementById('game-over').style.display = 'flex';
                document.getElementById('final-scores').innerText = `P1: ${state.p1Score}  |  P2: ${state.p2Score}`;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
