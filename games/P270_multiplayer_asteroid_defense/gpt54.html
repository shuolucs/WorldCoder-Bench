<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Multiplayer Asteroid Defense</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    #p1Hud, #p2Hud, #stationHud, #bottomHud {
      position: absolute;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 0 6px rgba(0,0,0,0.8);
    }

    #p1Hud {
      top: 12px;
      left: 12px;
      color: #33ff66;
    }

    #p2Hud {
      top: 12px;
      right: 12px;
      color: #33aaff;
    }

    #stationHud {
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: white;
      min-width: 260px;
    }

    #hpText {
      margin-bottom: 4px;
    }

    #hpBarContainer {
      width: 260px;
      height: 16px;
      border: 2px solid #fff;
      background: rgba(255,255,255,0.1);
      margin: 0 auto 6px auto;
    }

    #hpBar {
      height: 100%;
      width: 100%;
      background: #33ff66;
      transition: width 0.1s linear, background 0.1s linear;
    }

    #waveText {
      font-size: 16px;
      color: #ddd;
    }

    #bottomHud {
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
    }

    #gameOverOverlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      z-index: 20;
      pointer-events: none;
    }

    #gameOverText {
      text-align: center;
      color: white;
      font-size: 42px;
      font-weight: bold;
      text-shadow: 0 0 12px rgba(255,255,255,0.4);
    }

    #finalScores {
      margin-top: 18px;
      font-size: 24px;
      line-height: 1.5;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="p1Hud">P1 Score: 0 | Kills: 0</div>
    <div id="p2Hud">P2 Score: 0 | Kills: 0</div>

    <div id="stationHud">
      <div id="hpText">Station HP: 100/100</div>
      <div id="hpBarContainer">
        <div id="hpBar"></div>
      </div>
      <div id="waveText">Wave: 1</div>
    </div>

    <div id="bottomHud">Asteroids: 0/20</div>
  </div>

  <div id="gameOverOverlay">
    <div id="gameOverText">
      GAME OVER
      <div id="finalScores"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
  <script>
    (() => {
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 50, 0);
      camera.up.set(0, 0, -1);
      camera.lookAt(0, 0, 0);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(10, 20, 10);
      scene.add(directionalLight);

      // Starfield
      const starGeometry = new THREE.BufferGeometry();
      const starPositions = [];
      for (let i = 0; i < 500; i++) {
        let x, y, z;
        do {
          x = (Math.random() * 2 - 1) * 200;
          y = (Math.random() * 2 - 1) * 200;
          z = (Math.random() * 2 - 1) * 200;
        } while (Math.sqrt(x*x + y*y + z*z) > 200);
        starPositions.push(x, y, z);
      }
      starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
      const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.6 });
      const stars = new THREE.Points(starGeometry, starMaterial);
      scene.add(stars);

      // Station
      const stationGeometry = new THREE.DodecahedronGeometry(3);
      const stationMaterial = new THREE.MeshBasicMaterial({
        color: 0x00ffff,
        wireframe: true
      });
      const station = new THREE.Mesh(stationGeometry, stationMaterial);
      scene.add(station);

      // Players
      function createShip(color) {
        const geo = new THREE.ConeGeometry(0.5, 1.5, 12);
        const mat = new THREE.MeshPhongMaterial({ color });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.rotation.x = Math.PI;
        scene.add(mesh);
        return mesh;
      }

      const p1 = createShip(0x33ff66);
      p1.position.set(15, 0, 0);

      const p2 = createShip(0x3399ff);
      p2.position.set(-15, 0, 0);

      const players = {
        p1: {
          mesh: p1,
          color: 0x33ff66,
          score: 0,
          kills: 0,
          cooldown: 500,
          lastShotTime: -Infinity,
          lastMoveDir: new THREE.Vector3(0, 0, -1),
          controls: { up: 'KeyW', down: 'KeyS', left: 'KeyA', right: 'KeyD', shoot: 'Space' }
        },
        p2: {
          mesh: p2,
          color: 0x3399ff,
          score: 0,
          kills: 0,
          cooldown: 500,
          lastShotTime: -Infinity,
          lastMoveDir: new THREE.Vector3(0, 0, -1),
          controls: { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight', shoot: 'Enter' }
        }
      };

      const keys = {};
      window.addEventListener('keydown', (e) => {
        keys[e.code] = true;
        if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
          e.preventDefault();
        }
      });
      window.addEventListener('keyup', (e) => {
        keys[e.code] = false;
      });

      const bullets = [];
      const asteroids = [];
      let powerup = null;

      let stationHP = 100;
      let gameOver = false;
      let wave = 1;
      let totalAsteroidsSpawned = 0;

      const baseSpawnInterval = 2000;
      let currentSpawnInterval = 2000;
      let lastAsteroidSpawn = 0;
      let lastWaveTime = 0;
      let lastPowerupSpawn = 0;

      const p1Hud = document.getElementById('p1Hud');
      const p2Hud = document.getElementById('p2Hud');
      const hpText = document.getElementById('hpText');
      const hpBar = document.getElementById('hpBar');
      const waveText = document.getElementById('waveText');
      const bottomHud = document.getElementById('bottomHud');
      const gameOverOverlay = document.getElementById('gameOverOverlay');
      const finalScores = document.getElementById('finalScores');

      window.__3D_STATE__ = {
        p1Score: 0,
        p2Score: 0,
        p1Kills: 0,
        p2Kills: 0,
        p1Position: { x: 15, z: 0 },
        p2Position: { x: -15, z: 0 },
        stationHP: 100,
        asteroidCount: 0,
        bulletCount: 0,
        wave: 1,
        gameOver: false,
        powerupActive: false,
        totalAsteroidsSpawned: 0,
        p1LastShotTime: players.p1.lastShotTime,
        p2LastShotTime: players.p2.lastShotTime
      };

      function clamp(val, min, max) {
        return Math.max(min, Math.min(max, val));
      }

      function updateShipMovement(player) {
        const move = new THREE.Vector3();
        const c = player.controls;

        if (keys[c.up]) move.z -= 1;
        if (keys[c.down]) move.z += 1;
        if (keys[c.left]) move.x -= 1;
        if (keys[c.right]) move.x += 1;

        if (move.lengthSq() > 0) {
          move.normalize().multiplyScalar(0.3);
          player.mesh.position.x += move.x;
          player.mesh.position.z += move.z;
          player.lastMoveDir.set(move.x, 0, move.z).normalize();
          player.mesh.rotation.set(Math.PI, 0, 0);
          player.mesh.rotation.y = Math.atan2(player.lastMoveDir.x, player.lastMoveDir.z);
        }

        // Keep ships in a playable area
        const maxRadius = 35;
        const posXZ = new THREE.Vector2(player.mesh.position.x, player.mesh.position.z);
        if (posXZ.length() > maxRadius) {
          posXZ.normalize().multiplyScalar(maxRadius);
          player.mesh.position.x = posXZ.x;
          player.mesh.position.z = posXZ.y;
        }
      }

      function shoot(playerKey, now) {
        const player = players[playerKey];
        if (gameOver) return;
        if (now - player.lastShotTime < player.cooldown) return;

        player.lastShotTime = now;

        const bulletGeo = new THREE.SphereGeometry(0.2, 8, 8);
        const bulletMat = new THREE.MeshBasicMaterial({ color: player.color });
        const bullet = new THREE.Mesh(bulletGeo, bulletMat);

        bullet.position.copy(player.mesh.position);
        bullet.position.y = 0;

        let dir = player.lastMoveDir.clone();
        if (dir.lengthSq() === 0) dir.set(0, 0, -1);

        scene.add(bullet);
        bullets.push({
          mesh: bullet,
          velocity: dir.clone().normalize().multiplyScalar(0.8),
          born: now,
          owner: playerKey
        });
      }

      function tryShoot(now) {
        if (keys[players.p1.controls.shoot]) shoot('p1', now);
        if (keys[players.p2.controls.shoot]) shoot('p2', now);
      }

      function spawnAsteroid() {
        if (asteroids.length >= 20 || gameOver) return;

        const angle = Math.random() * Math.PI * 2;
        const x = Math.cos(angle) * 40;
        const z = Math.sin(angle) * 40;
        const radius = 0.5 + Math.random();
        const speed = 0.08 + Math.random() * 0.07;
        const hp = Math.ceil(radius * 2);

        const geo = new THREE.IcosahedronGeometry(radius, 0);
        const mat = new THREE.MeshPhongMaterial({ color: 0x6b2d1a, flatShading: true });
        const asteroid = new THREE.Mesh(geo, mat);
        asteroid.position.set(x, 0, z);

        scene.add(asteroid);

        const dir = new THREE.Vector3(-x, 0, -z).normalize();

        asteroids.push({
          mesh: asteroid,
          radius,
          speed,
          hp,
          maxHP: hp,
          dir
        });

        totalAsteroidsSpawned++;
      }

      function spawnPowerup() {
        if (powerup || gameOver) return;

        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 25;
        const x = Math.cos(angle) * dist;
        const z = Math.sin(angle) * dist;

        const geo = new THREE.TorusGeometry(1, 0.3, 12, 20);
        const mat = new THREE.MeshPhongMaterial({ color: 0xffff00, emissive: 0x665500 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, 0.5, z);

        scene.add(mesh);
        powerup = { mesh };
      }

      function removeBullet(index) {
        scene.remove(bullets[index].mesh);
        bullets[index].mesh.geometry.dispose();
        bullets[index].mesh.material.dispose();
        bullets.splice(index, 1);
      }

      function removeAsteroid(index) {
        scene.remove(asteroids[index].mesh);
        asteroids[index].mesh.geometry.dispose();
        asteroids[index].mesh.material.dispose();
        asteroids.splice(index, 1);
      }

      function removePowerup() {
        if (!powerup) return;
        scene.remove(powerup.mesh);
        powerup.mesh.geometry.dispose();
        powerup.mesh.material.dispose();
        powerup = null;
      }

      function updateBullets(now) {
        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];
          b.mesh.position.add(b.velocity);

          if (now - b.born > 3000) {
            removeBullet(i);
            continue;
          }

          for (let j = asteroids.length - 1; j >= 0; j--) {
            const a = asteroids[j];
            const dist = b.mesh.position.distanceTo(a.mesh.position);
            if (dist < a.radius + 0.3) {
              a.hp -= 1;
              players[b.owner].score += 10;
              removeBullet(i);

              if (a.hp <= 0) {
                players[b.owner].score += 50;
                players[b.owner].kills += 1;
                removeAsteroid(j);
              }
              break;
            }
          }
        }
      }

      function updateAsteroids() {
        for (let i = asteroids.length - 1; i >= 0; i--) {
          const a = asteroids[i];
          a.mesh.position.add(a.dir.clone().multiplyScalar(a.speed));
          a.mesh.rotation.x += 0.01;
          a.mesh.rotation.y += 0.015;

          if (a.mesh.position.length() <= 4) {
            stationHP -= 10 * a.maxHP;
            stationHP = Math.max(0, stationHP);
            removeAsteroid(i);

            if (stationHP <= 0) {
              gameOver = true;
              showGameOver();
            }
          }
        }
      }

      function updatePowerup() {
        if (!powerup) return;

        powerup.mesh.rotation.x += 0.03;
        powerup.mesh.rotation.y += 0.05;

        for (const key of ['p1', 'p2']) {
          const player = players[key];
          const dist = player.mesh.position.distanceTo(powerup.mesh.position);
          if (dist < 2) {
            stationHP = Math.min(100, stationHP + 10);
            player.score += 25;
            removePowerup();
            break;
          }
        }
      }

      function updateHUD() {
        p1Hud.textContent = `P1 Score: ${players.p1.score} | Kills: ${players.p1.kills}`;
        p2Hud.textContent = `P2 Score: ${players.p2.score} | Kills: ${players.p2.kills}`;
        hpText.textContent = `Station HP: ${stationHP}/100`;
        hpBar.style.width = `${stationHP}%`;

        if (stationHP > 60) hpBar.style.background = '#33ff66';
        else if (stationHP > 30) hpBar.style.background = '#ffd633';
        else hpBar.style.background = '#ff3333';

        waveText.textContent = `Wave: ${wave}`;
        bottomHud.textContent = `Asteroids: ${asteroids.length}/20`;
      }

      function showGameOver() {
        gameOverOverlay.style.display = 'flex';
        finalScores.innerHTML = `
          <div style="color:#33ff66;">P1 Score: ${players.p1.score} | Kills: ${players.p1.kills}</div>
          <div style="color:#3399ff;">P2 Score: ${players.p2.score} | Kills: ${players.p2.kills}</div>
        `;
      }

      function updateState() {
        window.__3D_STATE__ = {
          p1Score: players.p1.score,
          p2Score: players.p2.score,
          p1Kills: players.p1.kills,
          p2Kills: players.p2.kills,
          p1Position: {
            x: Number(players.p1.mesh.position.x.toFixed(2)),
            z: Number(players.p1.mesh.position.z.toFixed(2))
          },
          p2Position: {
            x: Number(players.p2.mesh.position.x.toFixed(2)),
            z: Number(players.p2.mesh.position.z.toFixed(2))
          },
          stationHP,
          asteroidCount: asteroids.length,
          bulletCount: bullets.length,
          wave,
          gameOver,
          powerupActive: !!powerup,
          totalAsteroidsSpawned,
          p1LastShotTime: players.p1.lastShotTime,
          p2LastShotTime: players.p2.lastShotTime
        };
      }

      function updateWave(now) {
        const newWave = Math.floor(now / 20000) + 1;
        if (newWave !== wave) {
          wave = newWave;
          currentSpawnInterval = Math.max(500, baseSpawnInterval - (wave - 1) * 200);
        }
      }

      function animate(now) {
        requestAnimationFrame(animate);

        station.rotation.y += 0.01;
        stars.rotation.y += 0.0005;

        if (!gameOver) {
          updateWave(now);

          updateShipMovement(players.p1);
          updateShipMovement(players.p2);

          tryShoot(now);

          if (now - lastAsteroidSpawn >= currentSpawnInterval) {
            spawnAsteroid();
            lastAsteroidSpawn = now;
          }

          if (now - lastPowerupSpawn >= 15000) {
            if (!powerup) spawnPowerup();
            lastPowerupSpawn = now;
          }

          updateBullets(now);
          updateAsteroids();
          updatePowerup();
        }

        updateHUD();
        updateState();
        renderer.render(scene, camera);
      }

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      updateHUD();
      updateState();
      requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
