<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asteroid Defense</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    z-index: 10;
}
#p1-info {
    position: absolute;
    top: 10px; left: 10px;
    color: #00ff00;
    font-size: 16px;
    text-shadow: 0 0 5px #00ff00;
}
#p2-info {
    position: absolute;
    top: 10px; right: 10px;
    color: #4488ff;
    font-size: 16px;
    text-shadow: 0 0 5px #4488ff;
    text-align: right;
}
#station-info {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: #fff;
    font-size: 16px;
}
#hp-bar-container {
    width: 200px;
    height: 20px;
    border: 2px solid #fff;
    margin: 5px auto;
    background: #333;
}
#hp-bar {
    height: 100%;
    width: 100%;
    background: #00ff00;
    transition: width 0.3s, background 0.3s;
}
#wave-info {
    margin-top: 5px;
    color: #ffaa00;
    font-size: 14px;
    text-shadow: 0 0 5px #ffaa00;
}
#asteroid-count {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #ff8866;
    font-size: 14px;
    text-shadow: 0 0 5px #ff8866;
}
#game-over {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    z-index: 20;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #ff0000;
    font-size: 48px;
    text-shadow: 0 0 20px #ff0000;
}
#game-over.hidden { display: none; }
#game-over .scores {
    font-size: 24px;
    margin-top: 20px;
    color: #fff;
    text-shadow: 0 0 10px #fff;
    text-align: center;
    line-height: 1.8;
}
#game-over .restart-hint {
    font-size: 16px;
    margin-top: 30px;
    color: #aaa;
}
</style>
</head>
<body>

<div id="hud">
    <div id="p1-info">P1 Score: 0 | Kills: 0</div>
    <div id="p2-info">P2 Score: 0 | Kills: 0</div>
    <div id="station-info">
        Station HP: 100/100
        <div id="hp-bar-container"><div id="hp-bar"></div></div>
        <div id="wave-info">Wave: 1</div>
    </div>
    <div id="asteroid-count">Asteroids: 0/20</div>
</div>

<div id="game-over" class="hidden">
    GAME OVER
    <div class="scores"></div>
    <div class="restart-hint">Press R to restart</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script>
(function() {

// ---- STATE ----
window.__3D_STATE__ = {
    p1Score: 0, p2Score: 0,
    p1Kills: 0, p2Kills: 0,
    p1Position: { x: 15, z: 0 },
    p2Position: { x: -15, z: 0 },
    stationHP: 100,
    asteroidCount: 0,
    bulletCount: 0,
    wave: 1,
    gameOver: false,
    powerupActive: false,
    totalAsteroidsSpawned: 0,
    p1LastShotTime: 0,
    p2LastShotTime: 0
};

const STATE = window.__3D_STATE__;

// ---- THREE.JS SETUP ----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 50, 0);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---- LIGHTS ----
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

// ---- STARFIELD ----
const starGeometry = new THREE.BufferGeometry();
const starPositions = new Float32Array(500 * 3);
for (let i = 0; i < 500; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = Math.random() * 200;
    starPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    starPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    starPositions[i * 3 + 2] = r * Math.cos(phi);
}
starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// ---- STATION ----
const stationGeom = new THREE.DodecahedronGeometry(3);
const stationMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true });
const station = new THREE.Mesh(stationGeom, stationMat);
station.position.set(0, 0, 0);
scene.add(station);

// ---- PLAYER SHIPS ----
function createShip(color, x, z) {
    const geom = new THREE.ConeGeometry(0.5, 1.5, 8);
    const mat = new THREE.MeshPhongMaterial({ color: color });
    const mesh = new THREE.Mesh(geom, mat);
    // Cone points up by default (Y+). We want it to point in -Z direction for "forward".
    // Rotate so the tip points along -Z initially
    geom.rotateX(Math.PI / 2);
    mesh.position.set(x, 0, z);
    scene.add(mesh);
    return mesh;
}

const p1Ship = createShip(0x00ff00, 15, 0);
const p2Ship = createShip(0x4488ff, -15, 0);

let p1Direction = new THREE.Vector3(0, 0, -1);
let p2Direction = new THREE.Vector3(0, 0, -1);

// ---- INPUT ----
const keys = {};
window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Space' || e.code === 'Enter' || e.code === 'ArrowUp' || e.code === 'ArrowDown' || e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
        e.preventDefault();
    }
    if (e.code === 'KeyR' && STATE.gameOver) {
        restartGame();
    }
});
window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
});

// ---- GAME ARRAYS ----
let asteroids = [];
let bullets = [];
let powerup = null;

// ---- TIMING ----
let lastAsteroidSpawn = 0;
let lastPowerupSpawn = 0;
let waveStartTime = Date.now();
let gameStartTime = Date.now();

// ---- FUNCTIONS ----

function getSpawnInterval() {
    const base = 2.0;
    const reduction = (STATE.wave - 1) * 0.2;
    return Math.max(0.5, base - reduction);
}

function spawnAsteroid() {
    if (asteroids.length >= 20) return;
    
    const angle = Math.random() * Math.PI * 2;
    const x = Math.cos(angle) * 40;
    const z = Math.sin(angle) * 40;
    const radius = 0.5 + Math.random() * 1.0;
    const speed = 0.08 + Math.random() * 0.07;
    const hp = Math.ceil(radius * 2);
    
    const geom = new THREE.IcosahedronGeometry(radius, 0);
    const mat = new THREE.MeshPhongMaterial({ color: 0x8b2500, flatShading: true });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.set(x, 0, z);
    scene.add(mesh);
    
    const dir = new THREE.Vector3(-x, 0, -z).normalize();
    
    const asteroid = {
        mesh: mesh,
        radius: radius,
        speed: speed,
        hp: hp,
        maxHP: hp,
        direction: dir
    };
    
    asteroids.push(asteroid);
    STATE.totalAsteroidsSpawned++;
}

function shootBullet(player) {
    const now = Date.now();
    let ship, direction, color, lastShotKey;
    
    if (player === 1) {
        if (now - STATE.p1LastShotTime < 500) return;
        ship = p1Ship;
        direction = p1Direction.clone();
        color = 0x00ff00;
        STATE.p1LastShotTime = now;
    } else {
        if (now - STATE.p2LastShotTime < 500) return;
        ship = p2Ship;
        direction = p2Direction.clone();
        color = 0x4488ff;
        STATE.p2LastShotTime = now;
    }
    
    const geom = new THREE.SphereGeometry(0.2, 8, 8);
    const mat = new THREE.MeshBasicMaterial({ color: color });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.copy(ship.position);
    scene.add(mesh);
    
    bullets.push({
        mesh: mesh,
        direction: direction.normalize(),
        speed: 0.8,
        player: player,
        spawnTime: now
    });
}

function spawnPowerup() {
    if (powerup) return;
    
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * 25;
    const x = Math.cos(angle) * r;
    const z = Math.sin(angle) * r;
    
    const geom = new THREE.TorusGeometry(1, 0.3, 8, 16);
    const mat = new THREE.MeshPhongMaterial({ color: 0xffff00, emissive: 0x444400 });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.set(x, 0, z);
    mesh.rotation.x = Math.PI / 2;
    scene.add(mesh);
    
    powerup = { mesh: mesh };
    STATE.powerupActive = true;
}

function removePowerup() {
    if (powerup) {
        scene.remove(powerup.mesh);
        powerup.mesh.geometry.dispose();
        powerup.mesh.material.dispose();
        powerup = null;
        STATE.powerupActive = false;
    }
}

function removeAsteroid(index) {
    const a = asteroids[index];
    scene.remove(a.mesh);
    a.mesh.geometry.dispose();
    a.mesh.material.dispose();
    asteroids.splice(index, 1);
}

function removeBullet(index) {
    const b = bullets[index];
    scene.remove(b.mesh);
    b.mesh.geometry.dispose();
    b.mesh.material.dispose();
    bullets.splice(index, 1);
}

function updateHUD() {
    document.getElementById('p1-info').textContent = `P1 Score: ${STATE.p1Score} | Kills: ${STATE.p1Kills}`;
    document.getElementById('p2-info').textContent = `P2 Score: ${STATE.p2Score} | Kills: ${STATE.p2Kills}`;
    
    const hpText = `Station HP: ${STATE.stationHP}/100`;
    const hpPercent = STATE.stationHP / 100 * 100;
    let hpColor;
    if (STATE.stationHP > 60) hpColor = '#00ff00';
    else if (STATE.stationHP > 30) hpColor = '#ffff00';
    else hpColor = '#ff0000';
    
    document.getElementById('station-info').innerHTML = `
        ${hpText}
        <div id="hp-bar-container"><div id="hp-bar" style="width:${hpPercent}%;background:${hpColor}"></div></div>
        <div id="wave-info">Wave: ${STATE.wave}</div>
    `;
    
    document.getElementById('asteroid-count').textContent = `Asteroids: ${asteroids.length}/20`;
}

function showGameOver() {
    const overlay = document.getElementById('game-over');
    overlay.classList.remove('hidden');
    overlay.querySelector('.scores').innerHTML = `
        <span style="color:#00ff00">P1 Score: ${STATE.p1Score} | Kills: ${STATE.p1Kills}</span><br>
        <span style="color:#4488ff">P2 Score: ${STATE.p2Score} | Kills: ${STATE.p2Kills}</span>
    `;
}

function restartGame() {
    // Clear asteroids
    while (asteroids.length > 0) removeAsteroid(0);
    while (bullets.length > 0) removeBullet(0);
    removePowerup();
    
    STATE.p1Score = 0; STATE.p2Score = 0;
    STATE.p1Kills = 0; STATE.p2Kills = 0;
    STATE.stationHP = 100;
    STATE.wave = 1;
    STATE.gameOver = false;
    STATE.totalAsteroidsSpawned = 0;
    STATE.p1LastShotTime = 0;
    STATE.p2LastShotTime = 0;
    
    p1Ship.position.set(15, 0, 0);
    p2Ship.position.set(-15, 0, 0);
    p1Direction.set(0, 0, -1);
    p2Direction.set(0, 0, -1);
    p1Ship.rotation.set(0, 0, 0);
    p2Ship.rotation.set(0, 0, 0);
    
    gameStartTime = Date.now();
    waveStartTime = Date.now();
    lastAsteroidSpawn = 0;
    lastPowerupSpawn = 0;
    
    document.getElementById('game-over').classList.add('hidden');
}

// ---- GAME LOOP ----
function gameLoop() {
    requestAnimationFrame(gameLoop);
    
    if (STATE.gameOver) {
        renderer.render(scene, camera);
        return;
    }
    
    const now = Date.now();
    
    // ---- WAVE ----
    const elapsed = (now - waveStartTime) / 1000;
    if (elapsed >= 20) {
        STATE.wave++;
        waveStartTime = now;
    }
    
    // ---- PLAYER MOVEMENT ----
    const speed = 0.3;
    let p1Moving = false;
    let p1Dir = new THREE.Vector3(0, 0, 0);
    
    if (keys['KeyW']) { p1Dir.z -= 1; p1Moving = true; }
    if (keys['KeyS']) { p1Dir.z += 1; p1Moving = true; }
    if (keys['KeyA']) { p1Dir.x -= 1; p1Moving = true; }
    if (keys['KeyD']) { p1Dir.x += 1; p1Moving = true; }
    
    if (p1Moving && p1Dir.length() > 0) {
        p1Dir.normalize();
        p1Ship.position.x += p1Dir.x * speed;
        p1Ship.position.z += p1Dir.z * speed;
        p1Direction.copy(p1Dir);
        p1Ship.rotation.y = Math.atan2(p1Dir.x, p1Dir.z) + Math.PI;
    }
    
    let p2Moving = false;
    let p2Dir = new THREE.Vector3(0, 0, 0);
    
    if (keys['ArrowUp']) { p2Dir.z -= 1; p2Moving = true; }
    if (keys['ArrowDown']) { p2Dir.z += 1; p2Moving = true; }
    if (keys['ArrowLeft']) { p2Dir.x -= 1; p2Moving = true; }
    if (keys['ArrowRight']) { p2Dir.x += 1; p2Moving = true; }
    
    if (p2Moving && p2Dir.length() > 0) {
        p2Dir.normalize();
        p2Ship.position.x += p2Dir.x * speed;
        p2Ship.position.z += p2Dir.z * speed;
        p2Direction.copy(p2Dir);
        p2Ship.rotation.y = Math.atan2(p2Dir.x, p2Dir.z) + Math.PI;
    }
    
    STATE.p1Position.x = p1Ship.position.x;
    STATE.p1Position.z = p1Ship.position.z;
    STATE.p2Position.x = p2Ship.position.x;
    STATE.p2Position.z = p2Ship.position.z;
    
    // ---- SHOOTING ----
    if (keys['Space']) {
        shootBullet(1);
    }
    if (keys['Enter']) {
        shootBullet(2);
    }
    
    // ---- SPAWN ASTEROIDS ----
    const spawnInterval = getSpawnInterval();
    if ((now - lastAsteroidSpawn) / 1000 >= spawnInterval) {
        spawnAsteroid();
        lastAsteroidSpawn = now;
    }
    
    // ---- SPAWN POWERUP ----
    if ((now - lastPowerupSpawn) / 1000 >= 15) {
        spawnPowerup();
        lastPowerupSpawn = now;
    }
    
    // ---- UPDATE ASTEROIDS ----
    for (let i = asteroids.length - 1; i >= 0; i--) {
        const a = asteroids[i];
        a.mesh.position.add(a.direction.clone().multiplyScalar(a.speed));
        a.mesh.rotation.x += 0.02;
        a.mesh.rotation.y += 0.01;
        
        // Check station collision
        const distToStation = a.mesh.position.length();
        if (distToStation < 4) {
            STATE.stationHP -= 10 * a.maxHP;
            STATE.stationHP = Math.max(0, STATE.stationHP);
            removeAsteroid(i);
            
            if (STATE.stationHP <= 0) {
                STATE.gameOver = true;
                showGameOver();
            }
            continue;
        }
    }
    
    // ---- UPDATE BULLETS ----
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.mesh.position.add(b.direction.clone().multiplyScalar(b.speed));
        
        // Lifetime check
        if ((now - b.spawnTime) / 1000 >= 3) {
            removeBullet(i);
            continue;
        }
        
        // Check asteroid collision
        let hit = false;
        for (let j = asteroids.length - 1; j >= 0; j--) {
            const a = asteroids[j];
            const dist = b.mesh.position.distanceTo(a.mesh.position);
            if (dist < a.radius + 0.3) {
                a.hp--;
                
                if (b.player === 1) {
                    STATE.p1Score += 10;
                } else {
                    STATE.p2Score += 10;
                }
                
                if (a.hp <= 0) {
                    if (b.player === 1) {
                        STATE.p1Score += 50;
                        STATE.p1Kills++;
                    } else {
                        STATE.p2Score += 50;
                        STATE.p2Kills++;
                    }
                    removeAsteroid(j);
                }
                
                removeBullet(i);
                hit = true;
                break;
            }
        }
        if (hit) continue;
    }
    
    // ---- POWERUP ----
    if (powerup) {
        powerup.mesh.rotation.z += 0.03;
        powerup.mesh.rotation.y += 0.02;
        
        const d1 = p1Ship.position.distanceTo(powerup.mesh.position);
        const d2 = p2Ship.position.distanceTo(powerup.mesh.position);
        
        if (d1 < 2) {
            STATE.stationHP = Math.min(100, STATE.stationHP + 10);
            STATE.p1Score += 25;
            removePowerup();
        } else if (d2 < 2) {
            STATE.stationHP = Math.min(100, STATE.stationHP + 10);
            STATE.p2Score += 25;
            removePowerup();
        }
    }
    
    // ---- STATION ROTATION ----
    station.rotation.y += 0.005;
    station.rotation.x += 0.003;
    
    // ---- UPDATE STATE ----
    STATE.asteroidCount = asteroids.length;
    STATE.bulletCount = bullets.length;
    
    // ---- HUD ----
    updateHUD();
    
    // ---- RENDER ----
    renderer.render(scene, camera);
}

// ---- START ----
lastAsteroidSpawn = Date.now();
lastPowerupSpawn = Date.now();
gameLoop();

})();
</script>
</body>
</html>
