<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Kaleidoscope</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 0;
    left: 0;
    padding: 15px;
    font-family: monospace;
    color: white;
    background: rgba(0, 0, 0, 0.6);
    border-bottom-right-radius: 10px;
    z-index: 10;
    min-width: 220px;
  }
  #hud div { margin: 4px 0; font-size: 14px; }
  #reset-btn {
    margin-top: 10px;
    padding: 6px 16px;
    font-family: monospace;
    font-size: 14px;
    background: #333;
    color: white;
    border: 1px solid #666;
    border-radius: 4px;
    cursor: pointer;
  }
  #reset-btn:hover { background: #555; }
</style>
</head>
<body>

<div id="hud">
  <div>Score: <span id="hud-score">0</span></div>
  <div>Combo: <span id="hud-combo">1</span></div>
  <div>Color Mode: <span id="hud-color-mode">rainbow</span></div>
  <div>Segments: <span id="hud-segments">6</span></div>
  <div>Speed: <span id="hud-speed">0.50</span></div>
  <div>Paused: <span id="hud-paused">No</span></div>
  <button id="reset-btn">Reset (R)</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 12);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  const pointLight = new THREE.PointLight(0xffffff, 1.0);
  pointLight.position.set(5, 5, 5);
  scene.add(pointLight);

  // State
  let score = 0;
  let combo = 1;
  let colorMode = 'rainbow';
  const colorModes = ['rainbow', 'monochrome', 'complementary'];
  let segmentCount = 6;
  const segmentCounts = [6, 8, 10, 12];
  let rotationSpeed = 0.5;
  let isPaused = false;
  let lastActionTime = 0;
  let particleBurstCount = 0;
  let lastScoreThreshold = 0;
  let frameCount = 0;

  // Kaleidoscope group
  const kaleidoscopeGroup = new THREE.Group();
  scene.add(kaleidoscopeGroup);

  // Source shapes
  const sourceShapes = [];
  const sourceOrbitSpeeds = [0.3, 0.5, 0.7];
  const sourceOrbitRadius = 1.5;
  const sourceOrbitAngles = [0, Math.PI * 2 / 3, Math.PI * 4 / 3];

  // Create source geometries
  const geometries = [
    new THREE.TorusKnotGeometry(0.3, 0.1, 64, 16),
    new THREE.IcosahedronGeometry(0.25),
    new THREE.OctahedronGeometry(0.2)
  ];

  const sourceScales = [0.3, 0.25, 0.2]; // not used for geometry since already in geometry params

  function createMaterial() {
    return new THREE.MeshStandardMaterial({
      metalness: 0.7,
      roughness: 0.3,
      color: 0xffffff
    });
  }

  // Create source shapes in first segment
  for (let i = 0; i < 3; i++) {
    const mesh = new THREE.Mesh(geometries[i], createMaterial());
    sourceShapes.push({
      mesh: mesh,
      orbitSpeed: sourceOrbitSpeeds[i],
      orbitAngle: sourceOrbitAngles[i],
      orbitRadius: sourceOrbitRadius
    });
    kaleidoscopeGroup.add(mesh);
  }

  // Mirror segments
  let mirrorGroups = []; // array of arrays of meshes

  function buildMirrors() {
    // Remove old mirrors
    for (const group of mirrorGroups) {
      for (const mesh of group) {
        kaleidoscopeGroup.remove(mesh);
        mesh.geometry.dispose();
        mesh.material.dispose();
      }
    }
    mirrorGroups = [];

    // Create mirrors for segments 1 to segmentCount-1
    for (let seg = 1; seg < segmentCount; seg++) {
      const segMeshes = [];
      for (let i = 0; i < 3; i++) {
        const mesh = new THREE.Mesh(geometries[i].clone(), createMaterial());
        kaleidoscopeGroup.add(mesh);
        segMeshes.push(mesh);
      }
      mirrorGroups.push(segMeshes);
    }

    applyColors();
  }

  function applyColors() {
    for (let seg = 0; seg < segmentCount; seg++) {
      const meshes = seg === 0 ? sourceShapes.map(s => s.mesh) : mirrorGroups[seg - 1];
      if (!meshes) continue;

      for (let i = 0; i < meshes.length; i++) {
        const mesh = seg === 0 ? meshes[i] : meshes[i];
        const color = new THREE.Color();

        if (colorMode === 'rainbow') {
          const hue = (seg * (360 / segmentCount)) / 360;
          color.setHSL(hue, 0.8, 0.5 + i * 0.1);
        } else if (colorMode === 'monochrome') {
          const lightness = 0.3 + (seg / (segmentCount - 1)) * 0.5;
          color.setHSL(0.6, 0.7, lightness);
        } else if (colorMode === 'complementary') {
          const hue = seg % 2 === 0 ? 0.0 : 0.5;
          color.setHSL(hue, 0.8, 0.5 + i * 0.1);
        }

        mesh.material.color.copy(color);
      }
    }
  }

  buildMirrors();

  // Particles
  const particles = [];

  function triggerParticleBurst() {
    particleBurstCount++;
    const particleGeom = new THREE.SphereGeometry(0.05, 8, 8);
    for (let i = 0; i < 50; i++) {
      const mat = new THREE.MeshBasicMaterial({
        color: new THREE.Color().setHSL(Math.random(), 1, 0.6),
        transparent: true,
        opacity: 1
      });
      const mesh = new THREE.Mesh(particleGeom, mat);
      mesh.position.set(0, 0, 0);
      const velocity = new THREE.Vector3(
        (Math.random() - 0.5) * 10,
        (Math.random() - 0.5) * 10,
        (Math.random() - 0.5) * 10
      );
      scene.add(mesh);
      particles.push({
        mesh: mesh,
        velocity: velocity,
        life: 1.5,
        maxLife: 1.5
      });
    }
  }

  function updateParticles(delta) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= delta;
      if (p.life <= 0) {
        scene.remove(p.mesh);
        p.mesh.material.dispose();
        p.mesh.geometry.dispose();
        particles.splice(i, 1);
        continue;
      }
      p.mesh.position.add(p.velocity.clone().multiplyScalar(delta));
      p.mesh.material.opacity = p.life / p.maxLife;
    }
  }

  // Scoring
  function addScore(points) {
    const oldScore = score;
    score += points;
    lastActionTime = performance.now();

    // Check threshold crossing
    const newThreshold = Math.floor(score / 100) * 100;
    if (newThreshold > lastScoreThreshold && newThreshold > 0) {
      lastScoreThreshold = newThreshold;
      triggerParticleBurst();
    }
  }

  function resetAll() {
    score = 0;
    combo = 1;
    rotationSpeed = 0.5;
    colorMode = 'rainbow';
    isPaused = false;
    lastScoreThreshold = 0;

    if (segmentCount !== 6) {
      segmentCount = 6;
      buildMirrors();
    } else {
      applyColors();
    }

    updateHUD();
  }

  // HUD
  function updateHUD() {
    document.getElementById('hud-score').textContent = score;
    document.getElementById('hud-combo').textContent = combo;
    document.getElementById('hud-color-mode').textContent = colorMode;
    document.getElementById('hud-segments').textContent = segmentCount;
    document.getElementById('hud-speed').textContent = rotationSpeed.toFixed(2);
    document.getElementById('hud-paused').textContent = isPaused ? 'Yes' : 'No';
  }

  // Input
  document.addEventListener('keydown', (e) => {
    if (e.code === 'KeyC') {
      const idx = colorModes.indexOf(colorMode);
      colorMode = colorModes[(idx + 1) % colorModes.length];
      addScore(10 * combo);
      combo++;
      applyColors();
      updateHUD();
    } else if (e.code === 'KeyS') {
      const idx = segmentCounts.indexOf(segmentCount);
      segmentCount = segmentCounts[(idx + 1) % segmentCounts.length];
      addScore(25 * combo);
      combo++;
      buildMirrors();
      updateHUD();
    } else if (e.code === 'ArrowUp') {
      e.preventDefault();
      if (rotationSpeed < 3.0) {
        rotationSpeed = Math.min(3.0, rotationSpeed + 0.25);
        addScore(5 * combo);
        updateHUD();
      }
    } else if (e.code === 'ArrowDown') {
      e.preventDefault();
      if (rotationSpeed > 0.0) {
        rotationSpeed = Math.max(0.0, rotationSpeed - 0.25);
        addScore(5 * combo);
        updateHUD();
      }
    } else if (e.code === 'Space') {
      e.preventDefault();
      isPaused = !isPaused;
      updateHUD();
    } else if (e.code === 'KeyR') {
      resetAll();
    }
  });

  document.getElementById('reset-btn').addEventListener('click', resetAll);

  // Window resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // State exposure
  window.__3D_STATE__ = {};

  function updateState() {
    const sourcePositions = sourceShapes.map(s => ({
      x: s.mesh.position.x,
      y: s.mesh.position.y,
      z: s.mesh.position.z
    }));

    const totalShapes = 3 + mirrorGroups.reduce((acc, g) => acc + g.length, 0);

    const comboTimerActive = combo > 1 && (performance.now() - lastActionTime) < 5000;

    window.__3D_STATE__ = {
      score: score,
      combo: combo,
      colorMode: colorMode,
      segmentCount: segmentCount,
      rotationSpeed: rotationSpeed,
      isPaused: isPaused,
      shapeCount: totalShapes,
      particleBurstCount: particleBurstCount,
      kaleidoscopeRotationZ: kaleidoscopeGroup.rotation.z,
      sourceShapePositions: sourcePositions,
      lastScoreThreshold: lastScoreThreshold,
      frameCount: frameCount,
      comboTimerActive: comboTimerActive
    };
  }

  // Animation
  let lastTime = performance.now();
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    frameCount++;

    const now = performance.now();
    const delta = Math.min((now - lastTime) / 1000, 0.1);
    lastTime = now;

    // Combo timer check
    if (combo > 1 && (now - lastActionTime) >= 5000) {
      combo = 1;
      updateHUD();
    }

    if (!isPaused) {
      // Rotate kaleidoscope group
      kaleidoscopeGroup.rotation.z += rotationSpeed * delta;

      // Update source shape orbits
      for (let i = 0; i < sourceShapes.length; i++) {
        const s = sourceShapes[i];
        s.orbitAngle += s.orbitSpeed * delta;
        s.mesh.position.x = Math.cos(s.orbitAngle) * s.orbitRadius;
        s.mesh.position.y = Math.sin(s.orbitAngle) * s.orbitRadius;
        s.mesh.position.z = 0;

        // Self rotation for visual interest
        s.mesh.rotation.x += delta * 0.5;
        s.mesh.rotation.y += delta * 0.7;
      }

      // Update mirror copies
      for (let seg = 1; seg < segmentCount; seg++) {
        const angle = seg * (2 * Math.PI / segmentCount);
        const cosA = Math.cos(angle);
        const sinA = Math.sin(angle);
        const mirrorIdx = seg - 1;
        if (mirrorIdx >= mirrorGroups.length) continue;

        for (let i = 0; i < 3; i++) {
          const source = sourceShapes[i].mesh;
          const mirror = mirrorGroups[mirrorIdx][i];

          // Rotate position around Z
          mirror.position.x = source.position.x * cosA - source.position.y * sinA;
          mirror.position.y = source.position.x * sinA + source.position.y * cosA;
          mirror.position.z = source.position.z;

          // Copy rotation and add segment rotation
          mirror.rotation.copy(source.rotation);
          mirror.rotation.z += angle;
        }
      }
    }

    // Always update particles (even when paused for visual continuity, but let's follow spec: "nothing moves")
    if (!isPaused) {
      updateParticles(delta);
    } else {
      // Still update particles so they can fade out
      updateParticles(delta);
    }

    updateState();
    updateHUD();

    renderer.render(scene, camera);
  }

  animate();
})();
</script>
</body>
</html>
