<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Kaleidoscope</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
            font-family: monospace;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            padding: 15px;
            color: white;
            background-color: rgba(0, 0, 0, 0.7);
            pointer-events: none;
            z-index: 10;
            line-height: 1.5;
        }
        #reset-btn {
            margin-top: 10px;
            padding: 5px 10px;
            background-color: #444;
            color: white;
            border: 1px solid #888;
            cursor: pointer;
            font-family: monospace;
            pointer-events: auto;
        }
        #reset-btn:hover {
            background-color: #666;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div>Score: <span id="hud-score">0</span></div>
        <div>Combo: x<span id="hud-combo">1</span></div>
        <div>Mode: <span id="hud-color-mode">rainbow</span></div>
        <div>Segments: <span id="hud-segments">6</span></div>
        <div>Speed: <span id="hud-speed">0.50</span> rad/s</div>
        <div>Status: <span id="hud-paused">Playing</span></div>
        <button id="reset-btn">Reset (R)</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // State Management
        window.__3D_STATE__ = {
            score: 0,
            combo: 1,
            colorMode: 'rainbow',
            segmentCount: 6,
            rotationSpeed: 0.5,
            isPaused: false,
            shapeCount: 0,
            particleBurstCount: 0,
            kaleidoscopeRotationZ: 0,
            sourceShapePositions: [],
            lastScoreThreshold: 0,
            frameCount: 0,
            comboTimerActive: false
        };

        let lastActionTime = performance.now();
        let time = 0;

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.0);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // Geometries
        const geometries = [
            new THREE.TorusKnotGeometry(1, 0.3, 64, 8).scale(0.3, 0.3, 0.3),
            new THREE.IcosahedronGeometry(1, 0).scale(0.25, 0.25, 0.25),
            new THREE.OctahedronGeometry(1, 0).scale(0.2, 0.2, 0.2)
        ];
        const orbitSpeeds = [0.3, 0.5, 0.7];
        const orbitPhases = [0, Math.PI * 2 / 3, Math.PI * 4 / 3];

        // Kaleidoscope Group
        const mainGroup = new THREE.Group();
        scene.add(mainGroup);

        let segments = [];
        let sourceShapes = [];

        function updateMaterialColor(material, index) {
            if (window.__3D_STATE__.colorMode === 'rainbow') {
                material.color.setHSL(index / window.__3D_STATE__.segmentCount, 1.0, 0.5);
            } else if (window.__3D_STATE__.colorMode === 'monochrome') {
                const lightness = 0.3 + 0.5 * (index / Math.max(1, window.__3D_STATE__.segmentCount - 1));
                material.color.setHSL(0.6, 1.0, lightness);
            } else if (window.__3D_STATE__.colorMode === 'complementary') {
                material.color.setHSL(index % 2 === 0 ? 0.0 : 0.5, 1.0, 0.5);
            }
        }

        function buildKaleidoscope() {
            while (mainGroup.children.length > 0) {
                const child = mainGroup.children[0];
                mainGroup.remove(child);
            }
            segments = [];
            sourceShapes = [];
            window.__3D_STATE__.shapeCount = window.__3D_STATE__.segmentCount * 3;

            for (let i = 0; i < window.__3D_STATE__.segmentCount; i++) {
                const segmentGroup = new THREE.Group();
                segmentGroup.rotation.z = i * (Math.PI * 2 / window.__3D_STATE__.segmentCount);
                mainGroup.add(segmentGroup);
                segments.push(segmentGroup);

                const material = new THREE.MeshStandardMaterial({ metalness: 0.7, roughness: 0.3 });
                updateMaterialColor(material, i);

                for (let j = 0; j < 3; j++) {
                    const mesh = new THREE.Mesh(geometries[j], material);
                    segmentGroup.add(mesh);
                    if (i === 0) {
                        sourceShapes.push(mesh);
                    }
                }
            }
        }

        function updateColors() {
            for (let i = 0; i < window.__3D_STATE__.segmentCount; i++) {
                const material = segments[i].children[0].material;
                updateMaterialColor(material, i);
            }
        }

        buildKaleidoscope();

        // Particles
        const particles = [];
        const particleGeo = new THREE.SphereGeometry(0.1, 8, 8);

        function triggerBurst() {
            window.__3D_STATE__.particleBurstCount++;
            for (let i = 0; i < 50; i++) {
                const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true });
                const p = new THREE.Mesh(particleGeo, mat);
                scene.add(p);
                
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const speed = 5 + Math.random() * 5;
                
                particles.push({
                    mesh: p,
                    vx: Math.sin(phi) * Math.cos(theta) * speed,
                    vy: Math.sin(phi) * Math.sin(theta) * speed,
                    vz: Math.cos(phi) * speed,
                    life: 1.5,
                    maxLife: 1.5
                });
            }
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life -= dt;
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    p.mesh.material.dispose();
                    particles.splice(i, 1);
                } else {
                    p.mesh.position.x += p.vx * dt;
                    p.mesh.position.y += p.vy * dt;
                    p.mesh.position.z += p.vz * dt;
                    p.mesh.material.opacity = p.life / p.maxLife;
                }
            }
        }

        // Scoring & Logic
        function actionTaken() {
            lastActionTime = performance.now();
        }

        function addScore(points, incrementCombo) {
            window.__3D_STATE__.score += points * window.__3D_STATE__.combo;
            if (incrementCombo) window.__3D_STATE__.combo++;
            actionTaken();
            
            const currentThreshold = Math.floor(window.__3D_STATE__.score / 100);
            if (currentThreshold > window.__3D_STATE__.lastScoreThreshold && window.__3D_STATE__.score > 0) {
                window.__3D_STATE__.lastScoreThreshold = currentThreshold;
                triggerBurst();
            }
        }

        function reset() {
            window.__3D_STATE__.score = 0;
            window.__3D_STATE__.combo = 1;
            window.__3D_STATE__.rotationSpeed = 0.5;
            window.__3D_STATE__.segmentCount = 6;
            window.__3D_STATE__.colorMode = 'rainbow';
            window.__3D_STATE__.isPaused = false;
            window.__3D_STATE__.lastScoreThreshold = 0;
            actionTaken();
            buildKaleidoscope();
        }

        // Input Handling
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'c') {
                const modes = ['rainbow', 'monochrome', 'complementary'];
                window.__3D_STATE__.colorMode = modes[(modes.indexOf(window.__3D_STATE__.colorMode) + 1) % 3];
                updateColors();
                addScore(10, true);
            } else if (key === 's') {
                const counts = [6, 8, 10, 12];
                window.__3D_STATE__.segmentCount = counts[(counts.indexOf(window.__3D_STATE__.segmentCount) + 1) % 4];
                buildKaleidoscope();
                addScore(25, true);
            } else if (e.key === 'ArrowUp') {
                window.__3D_STATE__.rotationSpeed = Math.min(3.0, window.__3D_STATE__.rotationSpeed + 0.25);
                addScore(5, false);
            } else if (e.key === 'ArrowDown') {
                window.__3D_STATE__.rotationSpeed = Math.max(0.0, window.__3D_STATE__.rotationSpeed - 0.25);
                addScore(5, false);
            } else if (e.key === ' ') {
                window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
            } else if (key === 'r') {
                reset();
            }
        });

        document.getElementById('reset-btn').addEventListener('click', reset);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            window.__3D_STATE__.frameCount++;

            const now = performance.now();
            if (window.__3D_STATE__.combo > 1 && (now - lastActionTime) > 5000) {
                window.__3D_STATE__.combo = 1;
            }
            window.__3D_STATE__.comboTimerActive = (window.__3D_STATE__.combo > 1 && (now - lastActionTime) <= 5000);

            if (!window.__3D_STATE__.isPaused) {
                time += dt;

                // Update source shapes
                for (let j = 0; j < 3; j++) {
                    const mesh = sourceShapes[j];
                    const angle = time * orbitSpeeds[j] + orbitPhases[j];
                    mesh.position.set(Math.cos(angle) * 1.5, Math.sin(angle) * 1.5, 0);
                    mesh.rotation.x += dt;
                    mesh.rotation.y += dt;
                }

                // Update mirrors
                for (let i = 1; i < window.__3D_STATE__.segmentCount; i++) {
                    for (let j = 0; j < 3; j++) {
                        const source = sourceShapes[j];
                        const mirror = segments[i].children[j];
                        mirror.position.copy(source.position);
                        mirror.rotation.copy(source.rotation);
                    }
                }

                mainGroup.rotation.z += window.__3D_STATE__.rotationSpeed * dt;
                window.__3D_STATE__.kaleidoscopeRotationZ = mainGroup.rotation.z;

                updateParticles(dt);
            }

            window.__3D_STATE__.sourceShapePositions = sourceShapes.map(s => ({ x: s.position.x, y: s.position.y, z: s.position.z }));

            // Update HUD
            document.getElementById('hud-score').innerText = window.__3D_STATE__.score;
            document.getElementById('hud-combo').innerText = window.__3D_STATE__.combo;
            document.getElementById('hud-color-mode').innerText = window.__3D_STATE__.colorMode;
            document.getElementById('hud-segments').innerText = window.__3D_STATE__.segmentCount;
            document.getElementById('hud-speed').innerText = window.__3D_STATE__.rotationSpeed.toFixed(2);
            document.getElementById('hud-paused').innerText = window.__3D_STATE__.isPaused ? 'Paused' : 'Playing';
            document.getElementById('hud-paused').style.color = window.__3D_STATE__.isPaused ? '#ff5555' : '#55ff55';

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
