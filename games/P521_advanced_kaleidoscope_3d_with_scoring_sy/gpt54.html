<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D Kaleidoscope with Scoring</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: monospace;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 0;
      left: 0;
      color: white;
      font-family: monospace;
      padding: 15px;
      background: rgba(20, 20, 20, 0.65);
      z-index: 10;
      line-height: 1.5;
      user-select: none;
    }

    #hud button {
      margin-top: 10px;
      padding: 6px 10px;
      font-family: monospace;
      cursor: pointer;
      border: 1px solid #888;
      background: #111;
      color: white;
    }

    #hud button:hover {
      background: #222;
    }

    #help {
      margin-top: 10px;
      opacity: 0.85;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Score: <span id="hud-score">0</span></div>
    <div>Combo: <span id="hud-combo">1</span></div>
    <div>Color Mode: <span id="hud-color-mode">rainbow</span></div>
    <div>Segments: <span id="hud-segments">6</span></div>
    <div>Speed: <span id="hud-speed">0.50</span></div>
    <div>Paused: <span id="hud-paused">No</span></div>
    <button id="reset-btn">Reset</button>
    <div id="help">
      C: Color Mode<br/>
      S: Segment Count<br/>
      ↑/↓: Speed<br/>
      Space: Pause<br/>
      R: Reset
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000);
    document.body.appendChild(renderer.domElement);

    // Scene & Camera
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 12);
    camera.lookAt(0, 0, 0);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 1.0);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    // Main group
    const kaleidoscopeGroup = new THREE.Group();
    scene.add(kaleidoscopeGroup);

    // HUD refs
    const hudScore = document.getElementById("hud-score");
    const hudCombo = document.getElementById("hud-combo");
    const hudColorMode = document.getElementById("hud-color-mode");
    const hudSegments = document.getElementById("hud-segments");
    const hudSpeed = document.getElementById("hud-speed");
    const hudPaused = document.getElementById("hud-paused");
    const resetBtn = document.getElementById("reset-btn");

    // State
    const colorModes = ["rainbow", "monochrome", "complementary"];
    const segmentOptions = [6, 8, 10, 12];

    let colorMode = "rainbow";
    let segmentCount = 6;
    let rotationSpeed = 0.5;
    let isPaused = false;

    let score = 0;
    let combo = 1;
    let lastActionTime = performance.now() / 1000;
    let lastScoreThreshold = 0;
    let particleBurstCount = 0;
    let frameCount = 0;

    const orbitRadius = 1.5;

    const sourceShapes = [];
    let mirrorSegments = [];
    let particles = [];

    const sourceDefinitions = [
      {
        key: "torusKnot",
        geometry: new THREE.TorusKnotGeometry(0.35, 0.12, 100, 16),
        scale: 0.3,
        orbitSpeed: 0.3,
        phase: 0.0,
        z: -0.4
      },
      {
        key: "icosahedron",
        geometry: new THREE.IcosahedronGeometry(0.6, 0),
        scale: 0.25,
        orbitSpeed: 0.5,
        phase: Math.PI * 2 / 3,
        z: 0.0
      },
      {
        key: "octahedron",
        geometry: new THREE.OctahedronGeometry(0.7, 0),
        scale: 0.2,
        orbitSpeed: 0.7,
        phase: Math.PI * 4 / 3,
        z: 0.4
      }
    ];

    // Initialize exposed state
    window.__3D_STATE__ = {
      score: 0,
      combo: 1,
      colorMode: "rainbow",
      segmentCount: 6,
      rotationSpeed: 0.5,
      isPaused: false,
      shapeCount: 0,
      particleBurstCount: 0,
      kaleidoscopeRotationZ: 0,
      sourceShapePositions: [
        { x: 0, y: 0, z: 0 },
        { x: 0, y: 0, z: 0 },
        { x: 0, y: 0, z: 0 }
      ],
      lastScoreThreshold: 0,
      frameCount: 0,
      comboTimerActive: false
    };

    function createMaterial() {
      return new THREE.MeshStandardMaterial({
        color: 0xffffff,
        metalness: 0.7,
        roughness: 0.3
      });
    }

    function buildSourceShapes() {
      for (const def of sourceDefinitions) {
        const mesh = new THREE.Mesh(def.geometry, createMaterial());
        mesh.scale.setScalar(def.scale);
        mesh.userData = {
          key: def.key,
          orbitSpeed: def.orbitSpeed,
          phase: def.phase,
          z: def.z,
          index: sourceShapes.length
        };
        sourceShapes.push(mesh);
        kaleidoscopeGroup.add(mesh);
      }
    }

    function clearMirrorSegments() {
      for (const seg of mirrorSegments) {
        for (const mesh of seg.shapes) {
          kaleidoscopeGroup.remove(mesh);
          if (mesh.material) mesh.material.dispose();
        }
      }
      mirrorSegments = [];
    }

    function buildMirrorSegments() {
      clearMirrorSegments();

      for (let segIndex = 1; segIndex < segmentCount; segIndex++) {
        const seg = {
          index: segIndex,
          angle: segIndex * (Math.PI * 2 / segmentCount),
          shapes: []
        };

        for (let i = 0; i < sourceShapes.length; i++) {
          const source = sourceShapes[i];
          const mesh = new THREE.Mesh(source.geometry, createMaterial());
          mesh.scale.copy(source.scale);
          mesh.userData = {
            sourceIndex: i,
            segmentIndex: segIndex
          };
          seg.shapes.push(mesh);
          kaleidoscopeGroup.add(mesh);
        }

        mirrorSegments.push(seg);
      }

      applyColors();
      updateShapeCount();
    }

    function getSegmentColor(segIndex) {
      if (colorMode === "rainbow") {
        const hue = (segIndex * (360 / segmentCount)) / 360;
        return new THREE.Color().setHSL(hue, 1.0, 0.5);
      }

      if (colorMode === "monochrome") {
        const t = segmentCount <= 1 ? 0 : segIndex / (segmentCount - 1);
        const lightness = 0.3 + t * 0.5;
        return new THREE.Color().setHSL(0.6, 0.8, lightness);
      }

      // complementary
      const hue = segIndex % 2 === 0 ? 0.0 : 0.5;
      return new THREE.Color().setHSL(hue, 0.9, 0.5);
    }

    function applyColors() {
      // Segment 0 = source shapes
      const sourceColor = getSegmentColor(0);
      for (const mesh of sourceShapes) {
        mesh.material.color.copy(sourceColor);
      }

      for (const seg of mirrorSegments) {
        const c = getSegmentColor(seg.index);
        for (const mesh of seg.shapes) {
          mesh.material.color.copy(c);
        }
      }
    }

    function updateSourceShapes(elapsed) {
      for (let i = 0; i < sourceShapes.length; i++) {
        const mesh = sourceShapes[i];
        const angle = elapsed * mesh.userData.orbitSpeed + mesh.userData.phase;
        mesh.position.set(
          Math.cos(angle) * orbitRadius,
          Math.sin(angle) * orbitRadius,
          mesh.userData.z
        );
        mesh.rotation.x += 0.01 + i * 0.003;
        mesh.rotation.y += 0.015 + i * 0.004;
      }
    }

    function updateMirrorShapes() {
      for (const seg of mirrorSegments) {
        const angle = seg.angle;
        const cosA = Math.cos(angle);
        const sinA = Math.sin(angle);

        for (let i = 0; i < seg.shapes.length; i++) {
          const source = sourceShapes[i];
          const mirror = seg.shapes[i];
          const x = source.position.x;
          const y = source.position.y;

          mirror.position.set(
            x * cosA - y * sinA,
            x * sinA + y * cosA,
            source.position.z
          );

          mirror.rotation.copy(source.rotation);
          mirror.rotation.z += angle;
        }
      }
    }

    function updateShapeCount() {
      window.__3D_STATE__.shapeCount = sourceShapes.length + mirrorSegments.reduce((sum, seg) => sum + seg.shapes.length, 0);
    }

    function scoringAction(points, increaseCombo = false) {
      const previousScore = score;
      score += points;
      if (increaseCombo) combo += 1;
      lastActionTime = performance.now() / 1000;

      const newThreshold = Math.floor(score / 100) * 100;
      if (newThreshold > lastScoreThreshold) {
        for (let threshold = lastScoreThreshold + 100; threshold <= newThreshold; threshold += 100) {
          triggerParticleBurst();
        }
        lastScoreThreshold = newThreshold;
      }

      updateHUD();
    }

    function triggerParticleBurst() {
      particleBurstCount++;

      const particleGroup = [];
      const geometry = new THREE.SphereGeometry(0.05, 8, 8);

      for (let i = 0; i < 50; i++) {
        const color = new THREE.Color().setHSL(Math.random(), 1.0, 0.6);
        const material = new THREE.MeshStandardMaterial({
          color,
          transparent: true,
          opacity: 1,
          metalness: 0.2,
          roughness: 0.7
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(0, 0, 0);

        const dir = new THREE.Vector3(
          Math.random() * 2 - 1,
          Math.random() * 2 - 1,
          Math.random() * 2 - 1
        ).normalize();

        const speed = 1.5 + Math.random() * 3.0;
        const velocity = dir.multiplyScalar(speed);

        scene.add(mesh);
        particleGroup.push({
          mesh,
          velocity,
          life: 1.5,
          age: 0
        });
      }

      particles.push(...particleGroup);
    }

    function updateParticles(delta) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.age += delta;
        p.life = Math.max(0, 1.5 - p.age);

        p.mesh.position.addScaledVector(p.velocity, delta);
        p.velocity.multiplyScalar(0.985);
        p.mesh.material.opacity = p.life / 1.5;
        p.mesh.scale.setScalar(1 + p.age * 0.5);

        if (p.age >= 1.5) {
          scene.remove(p.mesh);
          p.mesh.material.dispose();
          particles.splice(i, 1);
        }
      }
    }

    function cycleColorMode() {
      const idx = colorModes.indexOf(colorMode);
      colorMode = colorModes[(idx + 1) % colorModes.length];
      applyColors();
      scoringAction(10 * combo, true);
    }

    function cycleSegmentCount() {
      const idx = segmentOptions.indexOf(segmentCount);
      segmentCount = segmentOptions[(idx + 1) % segmentOptions.length];
      buildMirrorSegments();
      applyColors();
      scoringAction(25 * combo, true);
    }

    function changeSpeed(deltaAmount) {
      const newSpeed = THREE.MathUtils.clamp(rotationSpeed + deltaAmount, 0.0, 3.0);
      if (newSpeed !== rotationSpeed) {
        rotationSpeed = newSpeed;
        scoringAction(5 * combo, false);
      }
      updateHUD();
    }

    function resetAll() {
      score = 0;
      combo = 1;
      rotationSpeed = 0.5;
      segmentCount = 6;
      colorMode = "rainbow";
      isPaused = false;
      lastActionTime = performance.now() / 1000;
      lastScoreThreshold = 0;

      clearMirrorSegments();
      buildMirrorSegments();
      applyColors();
      updateHUD();
    }

    function updateHUD() {
      hudScore.textContent = score;
      hudCombo.textContent = combo;
      hudColorMode.textContent = colorMode;
      hudSegments.textContent = segmentCount;
      hudSpeed.textContent = rotationSpeed.toFixed(2);
      hudPaused.textContent = isPaused ? "Yes" : "No";
    }

    function updateExposedState() {
      window.__3D_STATE__.score = score;
      window.__3D_STATE__.combo = combo;
      window.__3D_STATE__.colorMode = colorMode;
      window.__3D_STATE__.segmentCount = segmentCount;
      window.__3D_STATE__.rotationSpeed = rotationSpeed;
      window.__3D_STATE__.isPaused = isPaused;
      window.__3D_STATE__.particleBurstCount = particleBurstCount;
      window.__3D_STATE__.kaleidoscopeRotationZ = kaleidoscopeGroup.rotation.z;
      window.__3D_STATE__.sourceShapePositions = sourceShapes.map(s => ({
        x: s.position.x,
        y: s.position.y,
        z: s.position.z
      }));
      window.__3D_STATE__.lastScoreThreshold = lastScoreThreshold;
      window.__3D_STATE__.frameCount = frameCount;
      window.__3D_STATE__.comboTimerActive = combo > 1 && ((performance.now() / 1000) - lastActionTime < 5);
    }

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        isPaused = !isPaused;
        updateHUD();
        return;
      }

      if (e.code === "KeyC") {
        cycleColorMode();
        return;
      }

      if (e.code === "KeyS") {
        cycleSegmentCount();
        return;
      }

      if (e.code === "ArrowUp") {
        e.preventDefault();
        changeSpeed(0.25);
        return;
      }

      if (e.code === "ArrowDown") {
        e.preventDefault();
        changeSpeed(-0.25);
        return;
      }

      if (e.code === "KeyR") {
        resetAll();
        return;
      }
    });

    resetBtn.addEventListener("click", resetAll);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Build scene
    buildSourceShapes();
    buildMirrorSegments();
    applyColors();
    updateHUD();

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const elapsed = clock.getElapsedTime();
      frameCount++;

      const now = performance.now() / 1000;
      if (combo > 1 && now - lastActionTime >= 5) {
        combo = 1;
        updateHUD();
      }

      if (!isPaused) {
        kaleidoscopeGroup.rotation.z += rotationSpeed * delta;
        updateSourceShapes(elapsed);
        updateMirrorShapes();
        updateParticles(delta);
      }

      updateShapeCount();
      updateExposedState();

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
