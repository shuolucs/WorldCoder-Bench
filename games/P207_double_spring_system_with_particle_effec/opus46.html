<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double Spring System with Particles</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #111122;
    font-family: 'Courier New', monospace;
  }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #aaccff;
    background: rgba(0, 0, 20, 0.75);
    padding: 15px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
    border: 1px solid #334466;
    pointer-events: none;
    min-width: 280px;
  }
  #hud .label { color: #6688aa; }
  #hud .value { color: #aaeeff; font-weight: bold; }
  #hud .on { color: #44ff88; }
  #hud .off { color: #ff6644; }
  #resetBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    padding: 10px 24px;
    font-size: 14px;
    font-family: 'Courier New', monospace;
    background: rgba(40, 40, 80, 0.8);
    color: #aaccff;
    border: 1px solid #556688;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  #resetBtn:hover {
    background: rgba(60, 60, 120, 0.9);
    border-color: #88aacc;
    color: #ffffff;
  }
  #controls-hint {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: #556688;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="hud"></div>
<button id="resetBtn">Reset</button>
<div id="controls-hint">
  [R] Reset | [G] Toggle Gravity | [P] Pause | [1/3] k1 ±10 | [2/4] k2 ±10 | Drag masses with mouse
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  // ============ SCENE SETUP ============
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111122);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 2, 12);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(5, 10, 5);
  scene.add(dirLight);

  // Grid
  const gridHelper = new THREE.GridHelper(20, 20, 0x333355, 0x333355);
  scene.add(gridHelper);

  // ============ PHYSICS CONSTANTS ============
  const G = 9.81;
  const DT = 1 / 60;
  const MAX_VEL = 20;

  // Spring parameters
  let k1 = 40.0;
  let k2 = 30.0;
  const damping1 = 0.5;
  const damping2 = 0.4;
  const restLength1 = 2.0;
  const restLength2 = 2.0;

  const massA_mass = 2.0;
  const massB_mass = 1.5;

  // State
  let gravityOn = true;
  let paused = false;
  let simTime = 0;
  let frameCount = 0;
  let dragging = null; // null, 'A', or 'B'

  // ============ CREATE OBJECTS ============
  // Anchor
  const anchorGeo = new THREE.SphereGeometry(0.2, 16, 16);
  const anchorMat = new THREE.MeshPhongMaterial({ color: 0xff3333, emissive: 0x441111 });
  const anchorMesh = new THREE.Mesh(anchorGeo, anchorMat);
  anchorMesh.position.set(0, 6, 0);
  scene.add(anchorMesh);

  // Mass A
  const massAGeo = new THREE.SphereGeometry(0.4, 24, 24);
  const massAMat = new THREE.MeshPhongMaterial({ color: 0x3388ff, emissive: 0x112244 });
  const massAMesh = new THREE.Mesh(massAGeo, massAMat);
  scene.add(massAMesh);

  // Mass B
  const massBGeo = new THREE.SphereGeometry(0.4, 24, 24);
  const massBMat = new THREE.MeshPhongMaterial({ color: 0x33ff88, emissive: 0x114422 });
  const massBMesh = new THREE.Mesh(massBGeo, massBMat);
  scene.add(massBMesh);

  // Physics state
  let posA = new THREE.Vector3(0, 3, 0);
  let velA = new THREE.Vector3(0, 0, 0);
  let posB = new THREE.Vector3(0, 0, 0);
  let velB = new THREE.Vector3(0, 0, 0);

  const anchorPos = new THREE.Vector3(0, 6, 0);

  // Spring lines
  const spring1Geo = new THREE.BufferGeometry().setFromPoints([anchorPos.clone(), posA.clone()]);
  const spring1Mat = new THREE.LineBasicMaterial({ color: 0xffffff });
  const spring1Line = new THREE.Line(spring1Geo, spring1Mat);
  scene.add(spring1Line);

  const spring2Geo = new THREE.BufferGeometry().setFromPoints([posA.clone(), posB.clone()]);
  const spring2Mat = new THREE.LineBasicMaterial({ color: 0xffffff });
  const spring2Line = new THREE.Line(spring2Geo, spring2Mat);
  scene.add(spring2Line);

  // ============ PARTICLE SYSTEM ============
  const MAX_PARTICLES = 200;
  const PARTICLE_GRAVITY = 2.0;

  const particlePool = [];
  const particleGeoTemplate = new THREE.SphereGeometry(0.05, 6, 6);

  for (let i = 0; i < MAX_PARTICLES; i++) {
    const mat = new THREE.MeshBasicMaterial({ color: 0x3388ff, transparent: true, opacity: 1.0 });
    const mesh = new THREE.Mesh(particleGeoTemplate, mat);
    mesh.visible = false;
    scene.add(mesh);
    particlePool.push({
      mesh: mesh,
      vel: new THREE.Vector3(),
      life: 0,
      maxLife: 1.0,
      active: false,
      source: 'A'
    });
  }

  let nextParticleIndex = 0;

  function emitParticle(position, color, source) {
    // Find an inactive particle or reuse oldest
    let p = null;
    let startIdx = nextParticleIndex;
    for (let i = 0; i < MAX_PARTICLES; i++) {
      const idx = (startIdx + i) % MAX_PARTICLES;
      if (!particlePool[idx].active) {
        p = particlePool[idx];
        nextParticleIndex = (idx + 1) % MAX_PARTICLES;
        break;
      }
    }
    if (!p) {
      // Reuse the next one in round-robin
      p = particlePool[nextParticleIndex];
      nextParticleIndex = (nextParticleIndex + 1) % MAX_PARTICLES;
    }

    p.active = true;
    p.life = 0;
    p.maxLife = 1.0;
    p.source = source;
    p.mesh.position.copy(position);
    p.mesh.material.color.setHex(color);
    p.mesh.material.opacity = 1.0;
    p.mesh.visible = true;

    // Random velocity with magnitude 0.5-1.5
    const mag = 0.5 + Math.random() * 1.0;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI;
    p.vel.set(
      mag * Math.sin(phi) * Math.cos(theta),
      mag * Math.sin(phi) * Math.sin(theta),
      mag * Math.cos(phi)
    );
  }

  function updateParticles(dt) {
    for (let i = 0; i < MAX_PARTICLES; i++) {
      const p = particlePool[i];
      if (!p.active) continue;

      p.life += dt;
      if (p.life >= p.maxLife) {
        p.active = false;
        p.mesh.visible = false;
        continue;
      }

      // Apply slight gravity
      p.vel.y -= PARTICLE_GRAVITY * dt;

      p.mesh.position.x += p.vel.x * dt;
      p.mesh.position.y += p.vel.y * dt;
      p.mesh.position.z += p.vel.z * dt;

      // Fade out
      const t = p.life / p.maxLife;
      p.mesh.material.opacity = 1.0 - t;
    }
  }

  function getActiveParticleCount() {
    let count = 0;
    for (let i = 0; i < MAX_PARTICLES; i++) {
      if (particlePool[i].active) count++;
    }
    return count;
  }

  // ============ SPRING FORCE CALCULATION ============
  function springForce(posFrom, posTo, restLen, k, damp, velFrom, velTo) {
    const delta = new THREE.Vector3().subVectors(posTo, posFrom);
    const dist = delta.length();
    if (dist < 0.0001) return new THREE.Vector3();

    const dir = delta.clone().normalize();
    const stretch = dist - restLen;

    // Spring force: F = k * stretch * dir
    const force = dir.clone().multiplyScalar(k * stretch);

    // Damping: F_damp = damp * (relative velocity along spring direction)
    const relVel = new THREE.Vector3().subVectors(velTo, velFrom);
    const dampForce = dir.clone().multiplyScalar(damp * relVel.dot(dir));

    // For the "from" mass, force is towards "to" (positive stretch pulls towards to)
    // Damping opposes relative motion
    // Actually let's think about this more carefully:
    // Force on "from" = k * stretch * dir - damp * (velFrom - velTo) . dir * dir
    // But we computed it as force pulling from towards to, so:
    force.sub(dampForce.clone().multiplyScalar(-1));
    // Actually let me redo this cleanly:

    // Force on posFrom due to spring connecting posFrom to posTo:
    // direction from posFrom to posTo
    const F = new THREE.Vector3();
    F.copy(dir).multiplyScalar(k * stretch);

    // Damping force on posFrom: opposes relative velocity of posFrom w.r.t. posTo along spring
    const relVelFromTo = new THREE.Vector3().subVectors(velFrom, velTo);
    const dampComponent = relVelFromTo.dot(dir);
    F.add(dir.clone().multiplyScalar(-damp * dampComponent));

    return F;
  }

  function clampVelocity(vel) {
    vel.x = Math.max(-MAX_VEL, Math.min(MAX_VEL, vel.x));
    vel.y = Math.max(-MAX_VEL, Math.min(MAX_VEL, vel.y));
    vel.z = Math.max(-MAX_VEL, Math.min(MAX_VEL, vel.z));
  }

  // ============ PHYSICS UPDATE (Semi-implicit Euler) ============
  function updatePhysics() {
    if (paused) return;

    const g = gravityOn ? G : 0;

    // Forces on Mass A
    if (dragging !== 'A') {
      const forceA = new THREE.Vector3(0, -g * massA_mass, 0);

      // Spring 1: Anchor to A (force on A from spring connecting anchor to A)
      const f1 = springForce(posA, anchorPos, restLength1, k1, damping1, velA, new THREE.Vector3(0,0,0));
      forceA.add(f1);

      // Spring 2: A to B (force on A from spring connecting A to B)
      const f2 = springForce(posA, posB, restLength2, k2, damping2, velA, velB);
      forceA.add(f2);

      // Semi-implicit Euler: update velocity first, then position
      const accA = forceA.divideScalar(massA_mass);
      velA.add(accA.multiplyScalar(DT));
      clampVelocity(velA);
      posA.add(velA.clone().multiplyScalar(DT));
    } else {
      velA.set(0, 0, 0);
    }

    // Forces on Mass B
    if (dragging !== 'B') {
      const forceB = new THREE.Vector3(0, -g * massB_mass, 0);

      // Spring 2: B to A (force on B from spring connecting B to A)
      const f2b = springForce(posB, posA, restLength2, k2, damping2, velB, velA);
      forceB.add(f2b);

      const accB = forceB.divideScalar(massB_mass);
      velB.add(accB.multiplyScalar(DT));
      clampVelocity(velB);
      posB.add(velB.clone().multiplyScalar(DT));
    } else {
      velB.set(0, 0, 0);
    }

    simTime += DT;
  }

  // ============ ENERGY CALCULATION ============
  function calculateEnergy() {
    const g = gravityOn ? G : 0;

    // KE
    const keA = 0.5 * massA_mass * velA.lengthSq();
    const keB = 0.5 * massB_mass * velB.lengthSq();

    // Gravitational PE (reference y=0)
    const peGravA = massA_mass * g * posA.y;
    const peGravB = massB_mass * g * posB.y;

    // Spring PE
    const len1 = posA.distanceTo(anchorPos);
    const stretch1 = len1 - restLength1;
    const peSpring1 = 0.5 * k1 * stretch1 * stretch1;

    const len2 = posB.distanceTo(posA);
    const stretch2 = len2 - restLength2;
    const peSpring2 = 0.5 * k2 * stretch2 * stretch2;

    return keA + keB + peGravA + peGravB + peSpring1 + peSpring2;
  }

  // ============ RESET ============
  function resetSimulation() {
    posA.set(0, 3, 0);
    velA.set(0, 0, 0);
    posB.set(0, 0, 0);
    velB.set(0, 0, 0);
    simTime = 0;
    frameCount = 0;
    dragging = null;

    // Reset particles
    for (let i = 0; i < MAX_PARTICLES; i++) {
      particlePool[i].active = false;
      particlePool[i].mesh.visible = false;
    }
    nextParticleIndex = 0;
  }

  // ============ MOUSE DRAG ============
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  const dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
  let isDragging = false;

  function getMouseIntersection(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersection = new THREE.Vector3();
    raycaster.ray.intersectPlane(dragPlane, intersection);
    return intersection;
  }

  renderer.domElement.addEventListener('mousedown', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    // Check intersection with masses
    const intersectsA = raycaster.intersectObject(massAMesh);
    const intersectsB = raycaster.intersectObject(massBMesh);

    if (intersectsA.length > 0 && intersectsB.length > 0) {
      // Pick the closer one
      if (intersectsA[0].distance < intersectsB[0].distance) {
        dragging = 'A';
      } else {
        dragging = 'B';
      }
    } else if (intersectsA.length > 0) {
      dragging = 'A';
    } else if (intersectsB.length > 0) {
      dragging = 'B';
    }

    if (dragging) {
      isDragging = true;
    }
  });

  renderer.domElement.addEventListener('mousemove', (event) => {
    if (!isDragging || !dragging) return;

    const intersection = getMouseIntersection(event);
    if (!intersection) return;

    if (dragging === 'A') {
      posA.copy(intersection);
      velA.set(0, 0, 0);
    } else if (dragging === 'B') {
      posB.copy(intersection);
      velB.set(0, 0, 0);
    }
  });

  renderer.domElement.addEventListener('mouseup', () => {
    isDragging = false;
    dragging = null;
  });

  renderer.domElement.addEventListener('mouseleave', () => {
    isDragging = false;
    dragging = null;
  });

  // ============ KEYBOARD ============
  document.addEventListener('keydown', (event) => {
    const key = event.key.toLowerCase();
    switch (key) {
      case 'r':
        resetSimulation();
        break;
      case 'g':
        gravityOn = !gravityOn;
        break;
      case 'p':
        paused = !paused;
        break;
      case '1':
        k1 = Math.min(200, k1 + 10);
        break;
      case '2':
        k2 = Math.min(200, k2 + 10);
        break;
      case '3':
        k1 = Math.max(10, k1 - 10);
        break;
      case '4':
        k2 = Math.max(10, k2 - 10);
        break;
    }
  });

  // Reset button
  document.getElementById('resetBtn').addEventListener('click', resetSimulation);

  // ============ HUD ============
  const hudEl = document.getElementById('hud');

  function updateHUD() {
    const energy = calculateEnergy();
    const particleCount = getActiveParticleCount();
    const spring1Len = posA.distanceTo(anchorPos);
    const spring2Len = posB.distanceTo(posA);

    hudEl.innerHTML = `
      <div><span class="label">Spring 1 (k1):</span> <span class="value">${k1.toFixed(0)} N/m</span></div>
      <div><span class="label">Spring 2 (k2):</span> <span class="value">${k2.toFixed(0)} N/m</span></div>
      <div><span class="label">Mass A (y):</span> <span class="value">${posA.y.toFixed(2)}</span></div>
      <div><span class="label">Mass B (y):</span> <span class="value">${posB.y.toFixed(2)}</span></div>
      <div><span class="label">Gravity:</span> <span class="${gravityOn ? 'on' : 'off'}">${gravityOn ? 'ON' : 'OFF'}</span></div>
      <div><span class="label">Simulation:</span> <span class="${!paused ? 'on' : 'off'}">${!paused ? 'RUNNING' : 'PAUSED'}</span></div>
      <div><span class="label">Particles:</span> <span class="value">${particleCount}</span></div>
      <div><span class="label">Total Energy:</span> <span class="value">${energy.toFixed(2)} J</span></div>
    `;
  }

  // ============ STATE MANAGEMENT ============
  window.__3D_STATE__ = {};

  function updateState() {
    const energy = calculateEnergy();
    const particleCount = getActiveParticleCount();

    window.__3D_STATE__ = {
      massA_pos: { x: posA.x, y: posA.y, z: posA.z },
      massB_pos: { x: posB.x, y: posB.y, z: posB.z },
      massA_vel: { x: velA.x, y: velA.y, z: velA.z },
      massB_vel: { x: velB.x, y: velB.y, z: velB.z },
      k1: k1,
      k2: k2,
      gravityOn: gravityOn,
      paused: paused,
      particleCount: particleCount,
      totalEnergy: energy,
      spring1_length: posA.distanceTo(anchorPos),
      spring2_length: posB.distanceTo(posA),
      dragging: dragging,
      simTime: simTime,
      massA_mass: massA_mass,
      massB_mass: massB_mass,
      frameCount: frameCount
    };
  }

  // ============ UPDATE VISUALS ============
  function updateVisuals() {
    massAMesh.position.copy(posA);
    massBMesh.position.copy(posB);

    // Update spring lines
    const positions1 = spring1Line.geometry.attributes.position.array;
    positions1[0] = anchorPos.x; positions1[1] = anchorPos.y; positions1[2] = anchorPos.z;
    positions1[3] = posA.x; positions1[4] = posA.y; positions1[5] = posA.z;
    spring1Line.geometry.attributes.position.needsUpdate = true;

    const positions2 = spring2Line.geometry.attributes.position.array;
    positions2[0] = posA.x; positions2[1] = posA.y; positions2[2] = posA.z;
    positions2[3] = posB.x; positions2[4] = posB.y; positions2[5] = posB.z;
    spring2Line.geometry.attributes.position.needsUpdate = true;
  }

  // ============ ANIMATION LOOP ============
  function animate() {
    requestAnimationFrame(animate);

    // Physics
    updatePhysics();

    // Emit particles
    if (!paused) {
      for (let i = 0; i < 2; i++) {
        emitParticle(posA.clone(), 0x3388ff, 'A');
        emitParticle(posB.clone(), 0x33ff88, 'B');
      }
      updateParticles(DT);
    }

    // Update visuals
    updateVisuals();

    // HUD
    updateHUD();

    // State
    frameCount++;
    updateState();

    // Render
    renderer.render(scene, camera);
  }

  // ============ WINDOW RESIZE ============
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ============ START ============
  animate();

})();
</script>
</body>
</html>
