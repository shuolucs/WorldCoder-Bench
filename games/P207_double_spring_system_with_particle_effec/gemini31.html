<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Spring System Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111122;
            color: #ffffff;
            font-family: monospace;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(17, 17, 34, 0.8);
            padding: 15px;
            border: 1px solid #333355;
            border-radius: 8px;
            pointer-events: none;
            min-width: 250px;
        }
        .hud-line {
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
        }
        .hud-label {
            color: #aaaacc;
        }
        .hud-value {
            font-weight: bold;
        }
        #controls {
            margin-top: 15px;
            border-top: 1px solid #333355;
            padding-top: 10px;
            font-size: 0.9em;
            color: #8888aa;
        }
        #resetBtn {
            pointer-events: auto;
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            background: #333355;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
        }
        #resetBtn:hover {
            background: #444466;
        }
        #resetBtn:active {
            background: #222244;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="hud">
        <div class="hud-line"><span class="hud-label">Status:</span> <span class="hud-value" id="hud-status">RUNNING</span></div>
        <div class="hud-line"><span class="hud-label">Gravity:</span> <span class="hud-value" id="hud-grav">ON</span></div>
        <div class="hud-line"><span class="hud-label">k1 (Spring 1):</span> <span class="hud-value" id="hud-k1">40</span></div>
        <div class="hud-line"><span class="hud-label">k2 (Spring 2):</span> <span class="hud-value" id="hud-k2">30</span></div>
        <div class="hud-line"><span class="hud-label">Mass A (y):</span> <span class="hud-value" id="hud-yA">3.00</span></div>
        <div class="hud-line"><span class="hud-label">Mass B (y):</span> <span class="hud-value" id="hud-yB">0.00</span></div>
        <div class="hud-line"><span class="hud-label">Particles:</span> <span class="hud-value" id="hud-particles">0</span></div>
        <div class="hud-line"><span class="hud-label">Total Energy:</span> <span class="hud-value" id="hud-energy">0.00</span></div>
        
        <div id="controls">
            Drag masses to move<br>
            [R] Reset | [G] Gravity | [P] Pause<br>
            [1/3] k1 +/- 10 | [2/4] k2 +/- 10
        </div>
        <button id="resetBtn">Reset</button>
    </div>
    <div id="canvas-container"></div>

    <script>
        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        const gridHelper = new THREE.GridHelper(20, 20, 0x333355, 0x333355);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        // --- Physics Objects ---
        const anchorPos = new THREE.Vector3(0, 6, 0);
        const anchorGeo = new THREE.SphereGeometry(0.2, 16, 16);
        const anchorMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
        const anchorMesh = new THREE.Mesh(anchorGeo, anchorMat);
        anchorMesh.position.copy(anchorPos);
        scene.add(anchorMesh);

        const massA = {
            pos: new THREE.Vector3(0, 3, 0),
            vel: new THREE.Vector3(0, 0, 0),
            mass: 2.0,
            mesh: new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), new THREE.MeshPhongMaterial({ color: 0x0066ff }))
        };
        massA.mesh.position.copy(massA.pos);
        scene.add(massA.mesh);

        const massB = {
            pos: new THREE.Vector3(0, 0, 0),
            vel: new THREE.Vector3(0, 0, 0),
            mass: 1.5,
            mesh: new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), new THREE.MeshPhongMaterial({ color: 0x00ff66 }))
        };
        massB.mesh.position.copy(massB.pos);
        scene.add(massB.mesh);

        // Springs
        let k1 = 40.0, rest1 = 2.0, damp1 = 0.5;
        let k2 = 30.0, rest2 = 2.0, damp2 = 0.4;

        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff });
        
        const geo1 = new THREE.BufferGeometry().setFromPoints([anchorPos, massA.pos]);
        const spring1Line = new THREE.Line(geo1, lineMat);
        scene.add(spring1Line);

        const geo2 = new THREE.BufferGeometry().setFromPoints([massA.pos, massB.pos]);
        const spring2Line = new THREE.Line(geo2, lineMat);
        scene.add(spring2Line);

        // --- Particle System ---
        const MAX_PARTICLES = 200;
        const particles = [];
        const particleGeo = new THREE.SphereGeometry(0.05, 8, 8);
        
        for (let i = 0; i < MAX_PARTICLES; i++) {
            const mat = new THREE.MeshBasicMaterial({ transparent: true, opacity: 1 });
            const mesh = new THREE.Mesh(particleGeo, mat);
            mesh.visible = false;
            scene.add(mesh);
            particles.push({
                mesh: mesh,
                active: false,
                vel: new THREE.Vector3(),
                life: 0
            });
        }

        function emitParticle(pos, colorHex) {
            const p = particles.find(p => !p.active);
            if (!p) return;

            p.active = true;
            p.mesh.visible = true;
            p.mesh.position.copy(pos);
            p.mesh.material.color.setHex(colorHex);
            p.mesh.material.opacity = 1.0;
            
            const dir = new THREE.Vector3(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5).normalize();
            const mag = 0.5 + Math.random(); // 0.5 to 1.5
            p.vel.copy(dir).multiplyScalar(mag);
            p.life = 1.0;
        }

        // --- State & Controls ---
        let gravityOn = true;
        let paused = false;
        let draggedMass = null; // null, 'A', or 'B'
        let simTime = 0;
        let frameCount = 0;
        const dt = 1 / 60;

        window.__3D_STATE__ = {};

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

        window.addEventListener('pointerdown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects([massA.mesh, massB.mesh]);
            if (intersects.length > 0) {
                if (intersects[0].object === massA.mesh) draggedMass = 'A';
                else if (intersects[0].object === massB.mesh) draggedMass = 'B';
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!draggedMass) return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const target = new THREE.Vector3();
            raycaster.ray.intersectPlane(dragPlane, target);
            
            if (target) {
                if (draggedMass === 'A') {
                    massA.pos.copy(target);
                    massA.vel.set(0, 0, 0);
                } else if (draggedMass === 'B') {
                    massB.pos.copy(target);
                    massB.vel.set(0, 0, 0);
                }
            }
        });

        window.addEventListener('pointerup', () => {
            draggedMass = null;
        });

        function resetSim() {
            massA.pos.set(0, 3, 0);
            massA.vel.set(0, 0, 0);
            massB.pos.set(0, 0, 0);
            massB.vel.set(0, 0, 0);
            particles.forEach(p => {
                p.active = false;
                p.mesh.visible = false;
            });
            simTime = 0;
            frameCount = 0;
        }

        document.getElementById('resetBtn').addEventListener('click', resetSim);

        window.addEventListener('keydown', (e) => {
            switch (e.key.toLowerCase()) {
                case 'r': resetSim(); break;
                case 'g': gravityOn = !gravityOn; break;
                case 'p': paused = !paused; break;
                case '1': k1 = Math.min(200, k1 + 10); break;
                case '2': k2 = Math.min(200, k2 + 10); break;
                case '3': k1 = Math.max(10, k1 - 10); break;
                case '4': k2 = Math.max(10, k2 - 10); break;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Main Loop ---
        function updatePhysics() {
            if (paused) return;

            const fA = new THREE.Vector3();
            const fB = new THREE.Vector3();

            if (gravityOn) {
                fA.y -= massA.mass * 9.81;
                fB.y -= massB.mass * 9.81;
            }

            // Spring 1 (Anchor to A)
            const L1 = new THREE.Vector3().subVectors(massA.pos, anchorPos);
            const len1 = L1.length();
            if (len1 > 0.0001) {
                const dir1 = L1.clone().normalize();
                const vRel1 = massA.vel.clone(); // anchor vel is 0
                const fSpring1 = k1 * (len1 - rest1);
                const fDamp1 = damp1 * vRel1.dot(dir1);
                const fTotal1 = -(fSpring1 + fDamp1);
                fA.add(dir1.multiplyScalar(fTotal1));
            }

            // Spring 2 (A to B)
            const L2 = new THREE.Vector3().subVectors(massB.pos, massA.pos);
            const len2 = L2.length();
            if (len2 > 0.0001) {
                const dir2 = L2.clone().normalize();
                const vRel2 = new THREE.Vector3().subVectors(massB.vel, massA.vel);
                const fSpring2 = k2 * (len2 - rest2);
                const fDamp2 = damp2 * vRel2.dot(dir2);
                const fTotal2 = -(fSpring2 + fDamp2);
                const forceOnB = dir2.clone().multiplyScalar(fTotal2);
                fB.add(forceOnB);
                fA.sub(forceOnB);
            }

            // Integration & Clamping
            if (draggedMass !== 'A') {
                massA.vel.add(fA.multiplyScalar(dt / massA.mass));
                massA.vel.x = THREE.MathUtils.clamp(massA.vel.x, -20, 20);
                massA.vel.y = THREE.MathUtils.clamp(massA.vel.y, -20, 20);
                massA.vel.z = THREE.MathUtils.clamp(massA.vel.z, -20, 20);
                massA.pos.add(massA.vel.clone().multiplyScalar(dt));
            }

            if (draggedMass !== 'B') {
                massB.vel.add(fB.multiplyScalar(dt / massB.mass));
                massB.vel.x = THREE.MathUtils.clamp(massB.vel.x, -20, 20);
                massB.vel.y = THREE.MathUtils.clamp(massB.vel.y, -20, 20);
                massB.vel.z = THREE.MathUtils.clamp(massB.vel.z, -20, 20);
                massB.pos.add(massB.vel.clone().multiplyScalar(dt));
            }

            simTime += dt;
        }

        function updateParticles() {
            let activeCount = 0;
            
            if (!paused) {
                for (let i = 0; i < 2; i++) emitParticle(massA.pos, 0x0066ff);
                for (let i = 0; i < 2; i++) emitParticle(massB.pos, 0x00ff66);
            }

            for (let p of particles) {
                if (p.active) {
                    if (!paused) {
                        p.vel.y -= 2.0 * dt; // Particle gravity
                        p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
                        p.life -= dt;
                    }
                    
                    if (p.life <= 0) {
                        p.active = false;
                        p.mesh.visible = false;
                    } else {
                        p.mesh.material.opacity = p.life;
                        activeCount++;
                    }
                }
            }
            return activeCount;
        }

        function updateVisualsAndState(activeParticleCount) {
            massA.mesh.position.copy(massA.pos);
            massB.mesh.position.copy(massB.pos);

            const pos1 = spring1Line.geometry.attributes.position.array;
            pos1[0] = anchorPos.x; pos1[1] = anchorPos.y; pos1[2] = anchorPos.z;
            pos1[3] = massA.pos.x; pos1[4] = massA.pos.y; pos1[5] = massA.pos.z;
            spring1Line.geometry.attributes.position.needsUpdate = true;

            const pos2 = spring2Line.geometry.attributes.position.array;
            pos2[0] = massA.pos.x; pos2[1] = massA.pos.y; pos2[2] = massA.pos.z;
            pos2[3] = massB.pos.x; pos2[4] = massB.pos.y; pos2[5] = massB.pos.z;
            spring2Line.geometry.attributes.position.needsUpdate = true;

            // Energy Calculation
            const ke = 0.5 * massA.mass * massA.vel.lengthSq() + 0.5 * massB.mass * massB.vel.lengthSq();
            const pe_g = gravityOn ? (massA.mass * 9.81 * massA.pos.y + massB.mass * 9.81 * massB.pos.y) : 0;
            const len1 = anchorPos.distanceTo(massA.pos);
            const len2 = massA.pos.distanceTo(massB.pos);
            const pe_s = 0.5 * k1 * Math.pow(len1 - rest1, 2) + 0.5 * k2 * Math.pow(len2 - rest2, 2);
            const totalEnergy = ke + pe_g + pe_s;

            // Update State Object
            window.__3D_STATE__ = {
                massA_pos: { x: massA.pos.x, y: massA.pos.y, z: massA.pos.z },
                massB_pos: { x: massB.pos.x, y: massB.pos.y, z: massB.pos.z },
                massA_vel: { x: massA.vel.x, y: massA.vel.y, z: massA.vel.z },
                massB_vel: { x: massB.vel.x, y: massB.vel.y, z: massB.vel.z },
                k1: k1,
                k2: k2,
                gravityOn: gravityOn,
                paused: paused,
                particleCount: activeParticleCount,
                totalEnergy: totalEnergy,
                spring1_length: len1,
                spring2_length: len2,
                dragging: draggedMass,
                simTime: simTime,
                massA_mass: massA.mass,
                massB_mass: massB.mass,
                frameCount: frameCount
            };

            // Update HUD
            document.getElementById('hud-status').innerText = paused ? 'PAUSED' : 'RUNNING';
            document.getElementById('hud-status').style.color = paused ? '#ffaa00' : '#00ff00';
            document.getElementById('hud-grav').innerText = gravityOn ? 'ON' : 'OFF';
            document.getElementById('hud-k1').innerText = k1;
            document.getElementById('hud-k2').innerText = k2;
            document.getElementById('hud-yA').innerText = massA.pos.y.toFixed(2);
            document.getElementById('hud-yB').innerText = massB.pos.y.toFixed(2);
            document.getElementById('hud-particles').innerText = activeParticleCount;
            document.getElementById('hud-energy').innerText = totalEnergy.toFixed(2);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            updatePhysics();
            const activeParticleCount = updateParticles();
            updateVisualsAndState(activeParticleCount);
            
            renderer.render(scene, camera);
            if (!paused) frameCount++;
        }

        animate();
    </script>
</body>
</html>
