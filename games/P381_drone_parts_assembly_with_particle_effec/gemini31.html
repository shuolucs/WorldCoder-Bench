<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Drone Assembly</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 26, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #4466aa;
            color: white;
            pointer-events: none;
            min-width: 200px;
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #00ccff;
        }
        .hud-line {
            margin: 5px 0;
            font-size: 14px;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(10, 10, 26, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #4466aa;
        }
        button {
            background: rgba(68, 102, 170, 0.3);
            color: white;
            border: 1px solid #4466aa;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        button:hover:not(:disabled) {
            background: rgba(68, 102, 170, 0.6);
            box-shadow: 0 0 10px #4466aa;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #555;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <h2>Assembly Status</h2>
        <div id="hud-attached" class="hud-line">Parts Attached: 0/4</div>
        <div id="hud-selected" class="hud-line">Selected: None</div>
        <div id="hud-status" class="hud-line">Status: Idle</div>
    </div>

    <div id="controls">
        <button id="attachBtn" disabled>Attach Selected Part</button>
        <button id="resetBtn">Reset Assembly</button>
        <button id="spinBtn" disabled>Test Spin</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            partsAttached: 0,
            selectedPart: null,
            status: 'idle',
            coreLoaded: false,
            propellerStates: {
                FL: { attached: false, position: {x:0,y:0,z:0}, spinning: false },
                FR: { attached: false, position: {x:0,y:0,z:0}, spinning: false },
                BL: { attached: false, position: {x:0,y:0,z:0}, spinning: false },
                BR: { attached: false, position: {x:0,y:0,z:0}, spinning: false }
            },
            particleCount: 0,
            spinTestAvailable: false,
            assemblyComplete: false,
            spinActive: false
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 15;

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0x4466aa, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 8, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 20;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0x00ccff, 0.6, 10);
        pointLight.position.set(0, 2, 0);
        scene.add(pointLight);

        // --- Environment ---
        const gridHelper = new THREE.GridHelper(10, 20, 0x222244, 0x222244);
        scene.add(gridHelper);

        const planeGeo = new THREE.PlaneGeometry(20, 20);
        const planeMat = new THREE.ShadowMaterial({ opacity: 0.4 });
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = -Math.PI / 2;
        plane.receiveShadow = true;
        scene.add(plane);

        // --- Assets & Parts ---
        const propellers = [];
        
        // Load Core
        const loader = new GLTFLoader();
        loader.load('PrimaryIonDrive.glb', (gltf) => {
            const core = gltf.scene;
            const box = new THREE.Box3().setFromObject(core);
            const size = box.getSize(new THREE.Vector3()).length();
            core.scale.setScalar(1 / size);
            box.setFromObject(core);
            const center = box.getCenter(new THREE.Vector3());
            core.position.sub(center);
            
            core.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            const wrapper = new THREE.Group();
            wrapper.add(core);
            scene.add(wrapper);
            window.__3D_STATE__.coreLoaded = true;
        }, undefined, (error) => {
            // Fallback if GLB is missing
            const geo = new THREE.CylinderGeometry(0.3, 0.3, 0.6, 32);
            const mat = new THREE.MeshStandardMaterial({ color: 0x333344, metalness: 0.8, roughness: 0.2 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = 0.3;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            window.__3D_STATE__.coreLoaded = true;
        });

        // Create Propellers
        function createPropeller(name, colorHex, startPos, targetPos) {
            const group = new THREE.Group();
            group.name = name;
            group.userData = { startPos, targetPos, attached: false, color: colorHex };

            const mat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.3, metalness: 0.7 });

            const hubGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.05, 16);
            const hub = new THREE.Mesh(hubGeo, mat);
            hub.castShadow = true;
            hub.receiveShadow = true;
            group.add(hub);

            const bladeGeo = new THREE.BoxGeometry(0.4, 0.02, 0.06);
            
            const blade1 = new THREE.Mesh(bladeGeo, mat);
            blade1.position.x = 0.2;
            blade1.castShadow = true;
            blade1.receiveShadow = true;
            
            const blade2 = new THREE.Mesh(bladeGeo, mat);
            blade2.position.x = -0.2;
            blade2.castShadow = true;
            blade2.receiveShadow = true;

            group.add(blade1, blade2);
            group.position.copy(startPos);
            
            scene.add(group);
            propellers.push(group);
        }

        createPropeller('PropellerFL', 0x44aaff, new THREE.Vector3(-3, 2, -1), new THREE.Vector3(-0.5, 0.4, -0.5));
        createPropeller('PropellerFR', 0x44aaff, new THREE.Vector3(3, 2, -1), new THREE.Vector3(0.5, 0.4, -0.5));
        createPropeller('PropellerBL', 0xff6644, new THREE.Vector3(-3, 2, 1), new THREE.Vector3(-0.5, 0.4, 0.5));
        createPropeller('PropellerBR', 0xff6644, new THREE.Vector3(3, 2, 1), new THREE.Vector3(0.5, 0.4, 0.5));

        // --- Particle System ---
        const particles = [];
        const particleGeo = new THREE.SphereGeometry(0.02, 8, 8);

        function createSnapParticles(pos, colorHex) {
            const mat = new THREE.MeshBasicMaterial({ color: colorHex, transparent: true });
            for (let i = 0; i < 50; i++) {
                const mesh = new THREE.Mesh(particleGeo, mat.clone());
                mesh.position.copy(pos);
                const vel = new THREE.Vector3(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2
                ).normalize().multiplyScalar(Math.random() * 3);
                scene.add(mesh);
                particles.push({ mesh, vel, life: 1.0, maxLife: 1.0 });
            }
        }

        function createTrailParticles(prop) {
            const mat = new THREE.MeshBasicMaterial({ color: 0x00ccff, transparent: true });
            const tip1 = new THREE.Vector3(0.4, 0, 0).applyMatrix4(prop.matrixWorld);
            const tip2 = new THREE.Vector3(-0.4, 0, 0).applyMatrix4(prop.matrixWorld);

            const tips = [tip1, tip2];
            tips.forEach(tip => {
                for (let i = 0; i < 2; i++) { // 2 per tip = 4 per prop per frame
                    const mesh = new THREE.Mesh(particleGeo, mat.clone());
                    mesh.position.copy(tip);
                    mesh.position.x += (Math.random() - 0.5) * 0.05;
                    mesh.position.y += (Math.random() - 0.5) * 0.05;
                    mesh.position.z += (Math.random() - 0.5) * 0.05;
                    scene.add(mesh);
                    particles.push({ mesh, vel: new THREE.Vector3(), life: 0.5, maxLife: 0.5 });
                }
            });
        }

        function updateParticles(delta) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life -= delta;
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    p.mesh.material.dispose();
                    particles.splice(i, 1);
                } else {
                    p.mesh.position.addScaledVector(p.vel, delta);
                    const ratio = p.life / p.maxLife;
                    p.mesh.material.opacity = ratio;
                    p.mesh.scale.setScalar(ratio);
                }
            }
        }

        // --- Interaction Logic ---
        let selectedPart = null;
        let animatingPart = null;
        let animProgress = 0;
        let isSpinning = false;
        let spinTimer = 0;

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function setEmissive(group, colorHex, intensity) {
            group.children.forEach(child => {
                if (child.material) {
                    child.material.emissive.setHex(colorHex);
                    child.material.emissiveIntensity = intensity;
                }
            });
        }

        function selectPart(part) {
            if (selectedPart) setEmissive(selectedPart, 0x000000, 0);
            selectedPart = part;
            setEmissive(selectedPart, 0x00ffaa, 0.5);
            window.__3D_STATE__.selectedPart = part.name;
            updateUI();
        }

        function deselectPart() {
            if (selectedPart) {
                setEmissive(selectedPart, 0x000000, 0);
                selectedPart = null;
                window.__3D_STATE__.selectedPart = null;
                updateUI();
            }
        }

        window.addEventListener('pointerdown', (event) => {
            if (event.target.tagName === 'BUTTON') return;
            if (animatingPart || isSpinning) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            
            const meshes = [];
            propellers.forEach(p => meshes.push(...p.children));

            const intersects = raycaster.intersectObjects(meshes);
            if (intersects.length > 0) {
                const group = intersects[0].object.parent;
                if (!group.userData.attached) {
                    selectPart(group);
                }
            } else {
                deselectPart();
            }
        });

        // --- UI Controls ---
        const attachBtn = document.getElementById('attachBtn');
        const resetBtn = document.getElementById('resetBtn');
        const spinBtn = document.getElementById('spinBtn');

        attachBtn.addEventListener('click', () => {
            if (selectedPart && !selectedPart.userData.attached && !animatingPart && !isSpinning) {
                animatingPart = selectedPart;
                animProgress = 0;
                animatingPart.userData.startAnimPos = animatingPart.position.clone();
                window.__3D_STATE__.status = 'attaching';
                deselectPart();
                updateUI();
            }
        });

        resetBtn.addEventListener('click', () => {
            if (animatingPart) return;
            propellers.forEach(p => {
                p.position.copy(p.userData.startPos);
                p.rotation.set(0, 0, 0);
                p.userData.attached = false;
                setEmissive(p, 0x000000, 0);
            });
            deselectPart();
            isSpinning = false;
            spinTimer = 0;
            window.__3D_STATE__.status = 'idle';
            updateUI();
        });

        spinBtn.addEventListener('click', () => {
            if (window.__3D_STATE__.partsAttached === 4 && !isSpinning) {
                isSpinning = true;
                spinTimer = 3.0;
                window.__3D_STATE__.status = 'spinning';
                deselectPart();
                updateUI();
            }
        });

        function updateUI() {
            const attachedCount = propellers.filter(p => p.userData.attached).length;
            window.__3D_STATE__.partsAttached = attachedCount;
            window.__3D_STATE__.spinTestAvailable = (attachedCount === 4);
            window.__3D_STATE__.assemblyComplete = (attachedCount === 4);

            document.getElementById('hud-attached').innerText = `Parts Attached: ${attachedCount}/4`;
            document.getElementById('hud-selected').innerText = `Selected: ${window.__3D_STATE__.selectedPart || 'None'}`;
            document.getElementById('hud-status').innerText = `Status: ${window.__3D_STATE__.status.charAt(0).toUpperCase() + window.__3D_STATE__.status.slice(1)}`;

            attachBtn.disabled = !selectedPart || animatingPart || isSpinning;
            spinBtn.disabled = attachedCount < 4 || isSpinning || animatingPart;
            resetBtn.disabled = animatingPart !== null;
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            controls.update();

            // Handle Attachment Animation
            if (animatingPart) {
                animProgress += delta; // 1 second duration
                if (animProgress >= 1) {
                    animatingPart.position.copy(animatingPart.userData.targetPos);
                    animatingPart.userData.attached = true;
                    createSnapParticles(animatingPart.position, animatingPart.userData.color);
                    animatingPart = null;
                    
                    const attachedCount = propellers.filter(p => p.userData.attached).length;
                    window.__3D_STATE__.status = attachedCount === 4 ? 'complete' : 'idle';
                    updateUI();
                } else {
                    animatingPart.position.lerpVectors(
                        animatingPart.userData.startAnimPos, 
                        animatingPart.userData.targetPos, 
                        animProgress
                    );
                }
            }

            // Handle Spin Test
            if (isSpinning) {
                spinTimer -= delta;
                if (spinTimer <= 0) {
                    isSpinning = false;
                    window.__3D_STATE__.status = 'complete';
                    updateUI();
                } else {
                    propellers.forEach(p => {
                        if (p.userData.attached) {
                            p.rotation.y += 10 * delta;
                            createTrailParticles(p);
                        }
                    });
                }
            }

            updateParticles(delta);

            // Sync State
            window.__3D_STATE__.particleCount = particles.length;
            window.__3D_STATE__.spinActive = isSpinning;
            propellers.forEach(p => {
                const key = p.name.replace('Propeller', '');
                window.__3D_STATE__.propellerStates[key] = {
                    attached: p.userData.attached,
                    position: { x: p.position.x, y: p.position.y, z: p.position.z },
                    spinning: isSpinning && p.userData.attached
                };
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateUI();
        animate();
    </script>
</body>
</html>
