<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Drone Assembly</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #ccddff;
    font-size: 14px;
    background: rgba(10, 10, 30, 0.8);
    padding: 15px 20px;
    border-radius: 10px;
    border: 1px solid rgba(68, 102, 255, 0.3);
    line-height: 1.8;
    min-width: 220px;
    backdrop-filter: blur(10px);
}
#hud .label { color: #6688aa; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
#hud .value { color: #aaccff; font-weight: bold; }
#hud .status-idle { color: #88aacc; }
#hud .status-attaching { color: #ffaa44; }
#hud .status-spinning { color: #44ffaa; }
#hud .status-complete { color: #44ff88; }
#controls {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
}
#controls button {
    padding: 12px 24px;
    border: 1px solid rgba(68, 170, 255, 0.4);
    background: rgba(10, 10, 40, 0.85);
    color: #ffffff;
    font-size: 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    font-weight: 500;
    letter-spacing: 0.5px;
}
#controls button:hover:not(:disabled) {
    background: rgba(30, 50, 100, 0.9);
    border-color: rgba(68, 170, 255, 0.8);
    box-shadow: 0 0 15px rgba(0, 170, 255, 0.3);
}
#controls button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
}
#controls button:active:not(:disabled) {
    transform: scale(0.97);
}
#loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #4488cc;
    font-size: 18px;
    display: none;
}
</style>
</head>
<body>
<div id="hud">
    <div><span class="label">Parts Attached: </span><span class="value" id="hudParts">0/4</span></div>
    <div><span class="label">Selected: </span><span class="value" id="hudSelected">None</span></div>
    <div><span class="label">Status: </span><span class="value status-idle" id="hudStatus">Idle</span></div>
</div>
<div id="controls">
    <button id="attachBtn">Attach Selected Part</button>
    <button id="resetBtn">Reset Assembly</button>
    <button id="spinBtn" disabled>Test Spin</button>
</div>
<div id="loading">Loading Core Drive...</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    partsAttached: 0,
    selectedPart: null,
    status: 'idle',
    coreLoaded: false,
    propellerStates: {
        FL: { attached: false, position: { x: -3, y: 2, z: -1 }, spinning: false },
        FR: { attached: false, position: { x: 3, y: 2, z: -1 }, spinning: false },
        BL: { attached: false, position: { x: -3, y: 2, z: 1 }, spinning: false },
        BR: { attached: false, position: { x: 3, y: 2, z: 1 }, spinning: false }
    },
    particleCount: 0,
    spinTestAvailable: false,
    assemblyComplete: false,
    spinActive: false
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.08);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 6);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 2;
controls.maxDistance = 15;
controls.target.set(0, 0.5, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0x4466aa, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -5;
dirLight.shadow.camera.right = 5;
dirLight.shadow.camera.top = 5;
dirLight.shadow.camera.bottom = -5;
dirLight.shadow.radius = 4;
scene.add(dirLight);

const pointLight = new THREE.PointLight(0x00ccff, 0.6, 10);
pointLight.position.set(0, 2, 0);
scene.add(pointLight);

// Grid
const gridHelper = new THREE.GridHelper(10, 20, 0x222244, 0x222244);
gridHelper.material.opacity = 0.5;
gridHelper.material.transparent = true;
scene.add(gridHelper);

// Ground plane for shadows
const groundGeo = new THREE.PlaneGeometry(12, 12);
const groundMat = new THREE.ShadowMaterial({ opacity: 0.3 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// Core drive
let coreModel = null;

function createCorePlaceholder() {
    const group = new THREE.Group();
    
    // Main body
    const bodyGeo = new THREE.CylinderGeometry(0.35, 0.4, 0.3, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ 
        color: 0x334455, metalness: 0.8, roughness: 0.2,
        emissive: 0x001122, emissiveIntensity: 0.3
    });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.castShadow = true;
    group.add(body);

    // Top dome
    const domeGeo = new THREE.SphereGeometry(0.3, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
    const domeMat = new THREE.MeshStandardMaterial({ 
        color: 0x2244aa, metalness: 0.9, roughness: 0.1,
        emissive: 0x0033aa, emissiveIntensity: 0.2
    });
    const dome = new THREE.Mesh(domeGeo, domeMat);
    dome.position.y = 0.15;
    dome.castShadow = true;
    group.add(dome);

    // Arms
    const armPositions = [
        { x: -0.5, z: -0.5 }, { x: 0.5, z: -0.5 },
        { x: -0.5, z: 0.5 }, { x: 0.5, z: 0.5 }
    ];
    armPositions.forEach(pos => {
        const armGeo = new THREE.BoxGeometry(0.08, 0.04, 0.08);
        const armMat = new THREE.MeshStandardMaterial({ color: 0x445566, metalness: 0.7, roughness: 0.3 });
        
        const dir = new THREE.Vector2(pos.x, pos.z).normalize();
        const length = Math.sqrt(pos.x * pos.x + pos.z * pos.z);
        
        // Create arm beam
        const beamGeo = new THREE.BoxGeometry(length, 0.04, 0.06);
        const beam = new THREE.Mesh(beamGeo, armMat);
        beam.position.set(pos.x / 2, 0.2, pos.z / 2);
        beam.lookAt(pos.x, 0.2, pos.z);
        beam.castShadow = true;
        group.add(beam);

        // Motor mount
        const mountGeo = new THREE.CylinderGeometry(0.06, 0.08, 0.08, 8);
        const mountMat = new THREE.MeshStandardMaterial({ 
            color: 0x556677, metalness: 0.8, roughness: 0.2 
        });
        const mount = new THREE.Mesh(mountGeo, mountMat);
        mount.position.set(pos.x, 0.3, pos.z);
        mount.castShadow = true;
        group.add(mount);
    });

    // Bottom detail
    const bottomGeo = new THREE.CylinderGeometry(0.2, 0.15, 0.1, 6);
    const bottomMat = new THREE.MeshStandardMaterial({ 
        color: 0x223344, metalness: 0.7, roughness: 0.3,
        emissive: 0x003366, emissiveIntensity: 0.2
    });
    const bottom = new THREE.Mesh(bottomGeo, bottomMat);
    bottom.position.y = -0.2;
    group.add(bottom);

    // Glow ring
    const ringGeo = new THREE.TorusGeometry(0.38, 0.015, 8, 32);
    const ringMat = new THREE.MeshStandardMaterial({ 
        color: 0x00aaff, emissive: 0x0066ff, emissiveIntensity: 0.8,
        metalness: 0.5, roughness: 0.3
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    ring.position.y = 0.05;
    group.add(ring);

    return group;
}

// Try loading GLB, fallback to placeholder
const loader = new GLTFLoader();
const loadingEl = document.getElementById('loading');
loadingEl.style.display = 'block';

loader.load('PrimaryIonDrive.glb', 
    (gltf) => {
        coreModel = gltf.scene;
        const box = new THREE.Box3().setFromObject(coreModel);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 1 / maxDim;
        coreModel.scale.setScalar(scale);
        coreModel.traverse(child => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        scene.add(coreModel);
        window.__3D_STATE__.coreLoaded = true;
        loadingEl.style.display = 'none';
    },
    undefined,
    (error) => {
        console.log('GLB not found, using placeholder core model');
        coreModel = createCorePlaceholder();
        scene.add(coreModel);
        window.__3D_STATE__.coreLoaded = true;
        loadingEl.style.display = 'none';
    }
);

// Create propeller
function createPropeller(color) {
    const group = new THREE.Group();
    
    // Hub
    const hubGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.05, 16);
    const hubMat = new THREE.MeshStandardMaterial({ 
        color: color, metalness: 0.7, roughness: 0.3,
        emissive: 0x000000, emissiveIntensity: 0
    });
    const hub = new THREE.Mesh(hubGeo, hubMat);
    hub.castShadow = true;
    group.add(hub);

    // Blades
    const bladeGeo = new THREE.BoxGeometry(0.4, 0.02, 0.06);
    const bladeMat = new THREE.MeshStandardMaterial({ 
        color: color, metalness: 0.5, roughness: 0.4,
        emissive: 0x000000, emissiveIntensity: 0
    });
    
    const blade1 = new THREE.Mesh(bladeGeo, bladeMat);
    blade1.position.x = 0.2;
    blade1.castShadow = true;
    group.add(blade1);

    const blade2 = new THREE.Mesh(bladeGeo, bladeMat);
    blade2.position.x = -0.2;
    blade2.castShadow = true;
    group.add(blade2);

    // Store reference to materials for glow
    group.userData.materials = [hubMat, bladeMat];
    group.userData.baseColor = new THREE.Color(color);

    return group;
}

// Propeller definitions
const propellerDefs = {
    FL: { color: 0x44aaff, startPos: new THREE.Vector3(-3, 2, -1), targetPos: new THREE.Vector3(-0.5, 0.4, -0.5), name: 'PropellerFL' },
    FR: { color: 0x44aaff, startPos: new THREE.Vector3(3, 2, -1), targetPos: new THREE.Vector3(0.5, 0.4, -0.5), name: 'PropellerFR' },
    BL: { color: 0xff6644, startPos: new THREE.Vector3(-3, 2, 1), targetPos: new THREE.Vector3(-0.5, 0.4, 0.5), name: 'PropellerBL' },
    BR: { color: 0xff6644, startPos: new THREE.Vector3(3, 2, 1), targetPos: new THREE.Vector3(0.5, 0.4, 0.5), name: 'PropellerBR' }
};

const propellers = {};
const propellerMeshes = []; // for raycasting

Object.entries(propellerDefs).forEach(([key, def]) => {
    const prop = createPropeller(def.color);
    prop.position.copy(def.startPos);
    prop.userData.key = key;
    prop.userData.name = def.name;
    prop.userData.attached = false;
    prop.userData.startPos = def.startPos.clone();
    prop.userData.targetPos = def.targetPos.clone();
    prop.userData.color = new THREE.Color(def.color);
    prop.userData.spinning = false;
    scene.add(prop);
    propellers[key] = prop;
    
    // Add all meshes to raycasting array
    prop.traverse(child => {
        if (child.isMesh) {
            child.userData.propKey = key;
            propellerMeshes.push(child);
        }
    });
});

// Selection
let selectedKey = null;

function selectPropeller(key) {
    // Deselect previous
    if (selectedKey && propellers[selectedKey]) {
        const prev = propellers[selectedKey];
        prev.userData.materials.forEach(mat => {
            mat.emissive.set(0x000000);
            mat.emissiveIntensity = 0;
        });
    }

    if (key && propellers[key] && !propellers[key].userData.attached) {
        selectedKey = key;
        const prop = propellers[key];
        prop.userData.materials.forEach(mat => {
            mat.emissive.set(0x00ffaa);
            mat.emissiveIntensity = 0.5;
        });
        window.__3D_STATE__.selectedPart = prop.userData.name;
    } else {
        selectedKey = null;
        window.__3D_STATE__.selectedPart = null;
    }
}

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
    if (window.__3D_STATE__.status === 'attaching' || window.__3D_STATE__.status === 'spinning') return;
    
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(propellerMeshes);
    
    if (intersects.length > 0) {
        const key = intersects[0].object.userData.propKey;
        if (key && !propellers[key].userData.attached) {
            selectPropeller(key === selectedKey ? null : key);
        }
    } else {
        selectPropeller(null);
    }
});

// Particles
const particles = [];

function createParticleBurst(position, color, count = 50) {
    for (let i = 0; i < count; i++) {
        const geo = new THREE.SphereGeometry(0.02, 6, 6);
        const mat = new THREE.MeshBasicMaterial({ 
            color: color, transparent: true, opacity: 1 
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(position);
        
        const velocity = new THREE.Vector3(
            (Math.random() - 0.5) * 3,
            Math.random() * 2 + 0.5,
            (Math.random() - 0.5) * 3
        );
        
        scene.add(mesh);
        particles.push({
            mesh,
            velocity,
            life: 1.0,
            decay: 1.0 // 1 second lifetime
        });
    }
}

function createTrailParticle(position, color) {
    const geo = new THREE.SphereGeometry(0.015, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ 
        color: 0x00ccff, transparent: true, opacity: 0.8 
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(position);
    mesh.position.x += (Math.random() - 0.5) * 0.05;
    mesh.position.y += (Math.random() - 0.5) * 0.05;
    mesh.position.z += (Math.random() - 0.5) * 0.05;
    
    const velocity = new THREE.Vector3(
        (Math.random() - 0.5) * 0.3,
        Math.random() * 0.2 - 0.1,
        (Math.random() - 0.5) * 0.3
    );
    
    scene.add(mesh);
    particles.push({
        mesh,
        velocity,
        life: 1.0,
        decay: 2.0 // 0.5 second lifetime
    });
}

function updateParticles(delta) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= delta * p.decay;
        p.mesh.position.add(p.velocity.clone().multiplyScalar(delta));
        p.velocity.y -= delta * 2; // gravity
        p.mesh.material.opacity = Math.max(0, p.life);
        p.mesh.scale.setScalar(Math.max(0.01, p.life));
        
        if (p.life <= 0) {
            scene.remove(p.mesh);
            p.mesh.geometry.dispose();
            p.mesh.material.dispose();
            particles.splice(i, 1);
        }
    }
}

// Animation system
const animations = [];

function animatePartToTarget(key) {
    const prop = propellers[key];
    if (!prop || prop.userData.attached) return;
    
    window.__3D_STATE__.status = 'attaching';
    
    const startPos = prop.position.clone();
    const targetPos = prop.userData.targetPos.clone();
    const duration = 1.0;
    let elapsed = 0;
    
    // Deselect
    selectPropeller(null);
    
    animations.push({
        update(delta) {
            elapsed += delta;
            const t = Math.min(elapsed / duration, 1);
            // Smooth easing
            const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
            
            prop.position.lerpVectors(startPos, targetPos, ease);
            
            // Arc upward in the middle
            const arc = Math.sin(t * Math.PI) * 0.5;
            prop.position.y += arc;
            
            if (t >= 1) {
                prop.position.copy(targetPos);
                prop.userData.attached = true;
                window.__3D_STATE__.partsAttached++;
                
                // Particle burst
                createParticleBurst(targetPos, prop.userData.color, 50);
                
                // Check completion
                const allAttached = Object.values(propellers).every(p => p.userData.attached);
                if (allAttached) {
                    window.__3D_STATE__.status = 'complete';
                    window.__3D_STATE__.assemblyComplete = true;
                    window.__3D_STATE__.spinTestAvailable = true;
                    document.getElementById('spinBtn').disabled = false;
                } else {
                    window.__3D_STATE__.status = 'idle';
                }
                
                return true; // remove animation
            }
            return false;
        }
    });
}

// Spin test
let spinTimer = 0;
let spinActive = false;

function startSpinTest() {
    if (!window.__3D_STATE__.assemblyComplete || spinActive) return;
    
    spinActive = true;
    spinTimer = 3.0;
    window.__3D_STATE__.status = 'spinning';
    window.__3D_STATE__.spinActive = true;
    
    Object.values(propellers).forEach(p => {
        p.userData.spinning = true;
    });
}

function updateSpin(delta) {
    if (!spinActive) return;
    
    spinTimer -= delta;
    
    Object.values(propellers).forEach(prop => {
        if (prop.userData.spinning) {
            prop.rotation.y += 10 * delta;
            
            // Trail particles from blade tips
            for (let i = 0; i < 4; i++) {
                const angle = prop.rotation.y + (i * Math.PI / 2);
                const tipOffset = new THREE.Vector3(
                    Math.cos(angle) * 0.4,
                    0,
                    Math.sin(angle) * 0.4
                );
                const worldPos = prop.position.clone().add(tipOffset);
                createTrailParticle(worldPos, 0x00ccff);
            }
        }
    });
    
    if (spinTimer <= 0) {
        spinActive = false;
        window.__3D_STATE__.spinActive = false;
        window.__3D_STATE__.status = window.__3D_STATE__.assemblyComplete ? 'complete' : 'idle';
        
        Object.values(propellers).forEach(p => {
            p.userData.spinning = false;
        });
    }
}

// Reset
function resetAssembly() {
    // Stop spin
    spinActive = false;
    spinTimer = 0;
    window.__3D_STATE__.spinActive = false;
    
    // Clear animations
    animations.length = 0;
    
    // Clear selection
    selectPropeller(null);
    
    // Reset propellers
    Object.entries(propellers).forEach(([key, prop]) => {
        prop.position.copy(prop.userData.startPos);
        prop.rotation.set(0, 0, 0);
        prop.userData.attached = false;
        prop.userData.spinning = false;
        prop.userData.materials.forEach(mat => {
            mat.emissive.set(0x000000);
            mat.emissiveIntensity = 0;
        });
    });
    
    // Clear particles
    particles.forEach(p => {
        scene.remove(p.mesh);
        p.mesh.geometry.dispose();
        p.mesh.material.dispose();
    });
    particles.length = 0;
    
    // Reset state
    window.__3D_STATE__.partsAttached = 0;
    window.__3D_STATE__.selectedPart = null;
    window.__3D_STATE__.status = 'idle';
    window.__3D_STATE__.assemblyComplete = false;
    window.__3D_STATE__.spinTestAvailable = false;
    document.getElementById('spinBtn').disabled = true;
}

// Button handlers
document.getElementById('attachBtn').addEventListener('click', () => {
    if (selectedKey && window.__3D_STATE__.status === 'idle') {
        animatePartToTarget(selectedKey);
    }
});

document.getElementById('resetBtn').addEventListener('click', resetAssembly);
document.getElementById('spinBtn').addEventListener('click', startSpinTest);

// HUD update
function updateHUD() {
    document.getElementById('hudParts').textContent = `${window.__3D_STATE__.partsAttached}/4`;
    document.getElementById('hudSelected').textContent = window.__3D_STATE__.selectedPart || 'None';
    
    const statusEl = document.getElementById('hudStatus');
    const status = window.__3D_STATE__.status;
    statusEl.textContent = status.charAt(0).toUpperCase() + status.slice(1);
    statusEl.className = `value status-${status}`;
}

// Floating animation for unattached parts
function updateFloating(time) {
    Object.values(propellers).forEach((prop, i) => {
        if (!prop.userData.attached && window.__3D_STATE__.status !== 'attaching') {
            const baseY = prop.userData.startPos.y;
            prop.position.y = baseY + Math.sin(time * 2 + i * 1.5) * 0.1;
            prop.rotation.y = Math.sin(time * 0.5 + i) * 0.3;
        }
    });
}

// Update state
function updateState() {
    Object.entries(propellers).forEach(([key, prop]) => {
        window.__3D_STATE__.propellerStates[key] = {
            attached: prop.userData.attached,
            position: { x: prop.position.x, y: prop.position.y, z: prop.position.z },
            spinning: prop.userData.spinning
        };
    });
    window.__3D_STATE__.particleCount = particles.length;
}

// Core glow pulse
function updateCoreGlow(time) {
    if (coreModel) {
        const pulse = 0.3 + Math.sin(time * 3) * 0.15;
        pointLight.intensity = 0.6 + Math.sin(time * 2) * 0.2;
    }
}

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    
    const delta = Math.min(clock.getDelta(), 0.05);
    const time = clock.getElapsedTime();
    
    controls.update();
    
    // Update animations
    for (let i = animations.length - 1; i >= 0; i--) {
        if (animations[i].update(delta)) {
            animations.splice(i, 1);
        }
    }
    
    updateFloating(time);
    updateSpin(delta);
    updateParticles(delta);
    updateCoreGlow(time);
    updateState();
    updateHUD();
    
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
