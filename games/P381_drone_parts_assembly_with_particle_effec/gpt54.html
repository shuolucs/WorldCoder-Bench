<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Drone Parts Assembly</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 12px 14px;
      background: rgba(10, 16, 32, 0.72);
      border: 1px solid rgba(100, 180, 255, 0.25);
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
      min-width: 190px;
      backdrop-filter: blur(6px);
      box-shadow: 0 0 24px rgba(0, 120, 255, 0.12);
    }

    #controls {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
      padding: 10px 14px;
      background: rgba(10, 16, 32, 0.55);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      backdrop-filter: blur(8px);
    }

    button {
      background: rgba(30, 40, 70, 0.9);
      color: white;
      border: 1px solid rgba(140, 180, 255, 0.25);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover:not(:disabled) {
      background: rgba(50, 80, 130, 0.95);
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div id="hudAttached">Parts Attached: 0/4</div>
      <div id="hudSelected">Selected: None</div>
      <div id="hudStatus">Status: Idle</div>
    </div>

    <div id="controls">
      <button id="attachBtn">Attach Selected Part</button>
      <button id="resetBtn">Reset Assembly</button>
      <button id="spinBtn" disabled>Test Spin</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const attachBtn = document.getElementById('attachBtn');
    const resetBtn = document.getElementById('resetBtn');
    const spinBtn = document.getElementById('spinBtn');

    const hudAttached = document.getElementById('hudAttached');
    const hudSelected = document.getElementById('hudSelected');
    const hudStatus = document.getElementById('hudStatus');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#0a0a1a');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 6);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.6, 0);

    const ambientLight = new THREE.AmbientLight('#4466aa', 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 8, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(1024, 1024);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    dirLight.shadow.camera.left = -8;
    dirLight.shadow.camera.right = 8;
    dirLight.shadow.camera.top = 8;
    dirLight.shadow.camera.bottom = -8;
    scene.add(dirLight);

    const pointLight = new THREE.PointLight('#00ccff', 0.6, 12);
    pointLight.position.set(0, 2, 0);
    scene.add(pointLight);

    const grid = new THREE.GridHelper(10, 20, new THREE.Color('#222244'), new THREE.Color('#222244'));
    grid.position.y = -0.001;
    grid.material.transparent = true;
    grid.material.opacity = 0.35;
    scene.add(grid);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.ShadowMaterial({ opacity: 0.15 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock = new THREE.Clock();

    let core = null;

    const state = {
      partsAttached: 0,
      selectedPart: null,
      status: 'idle',
      coreLoaded: false,
      spinTestAvailable: false,
      assemblyComplete: false,
      spinActive: false
    };

    const propellers = [];
    const propellerMap = {};

    const attachAnimations = [];
    const activeParticles = [];

    let spinEndTime = 0;

    const propConfig = {
      FL: {
        name: 'PropellerFL',
        color: '#44aaff',
        start: new THREE.Vector3(-3, 2, -1),
        target: new THREE.Vector3(-0.5, 0.4, -0.5)
      },
      FR: {
        name: 'PropellerFR',
        color: '#44aaff',
        start: new THREE.Vector3(3, 2, -1),
        target: new THREE.Vector3(0.5, 0.4, -0.5)
      },
      BL: {
        name: 'PropellerBL',
        color: '#ff6644',
        start: new THREE.Vector3(-3, 2, 1),
        target: new THREE.Vector3(-0.5, 0.4, 0.5)
      },
      BR: {
        name: 'PropellerBR',
        color: '#ff6644',
        start: new THREE.Vector3(3, 2, 1),
        target: new THREE.Vector3(0.5, 0.4, 0.5)
      }
    };

    function createCoreFallback() {
      const group = new THREE.Group();
      group.name = 'PrimaryIonDriveFallback';

      const bodyMat = new THREE.MeshStandardMaterial({
        color: '#5d6f8f',
        metalness: 0.7,
        roughness: 0.3,
        emissive: '#113355',
        emissiveIntensity: 0.25
      });

      const glowMat = new THREE.MeshStandardMaterial({
        color: '#88ddff',
        emissive: '#00ccff',
        emissiveIntensity: 1.2,
        metalness: 0.2,
        roughness: 0.15
      });

      const body = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.55, 0.9, 24), bodyMat);
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);

      const ring = new THREE.Mesh(new THREE.TorusGeometry(0.52, 0.05, 12, 40), glowMat);
      ring.rotation.x = Math.PI / 2;
      ring.position.y = 0.12;
      ring.castShadow = true;
      group.add(ring);

      const top = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.24, 0.25, 18), bodyMat);
      top.position.y = 0.55;
      top.castShadow = true;
      top.receiveShadow = true;
      group.add(top);

      return group;
    }

    function fitObjectToUnit(object, targetSize = 1) {
      const box = new THREE.Box3().setFromObject(object);
      const size = new THREE.Vector3();
      box.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      const scale = targetSize / maxDim;
      object.scale.multiplyScalar(scale);

      const newBox = new THREE.Box3().setFromObject(object);
      const center = new THREE.Vector3();
      newBox.getCenter(center);
      object.position.sub(center);
      object.position.y -= newBox.min.y;
    }

    function loadCore() {
      const loader = new GLTFLoader();
      loader.load(
        'PrimaryIonDrive.glb',
        (gltf) => {
          core = gltf.scene;
          fitObjectToUnit(core, 1);
          core.position.set(0, 0, 0);
          core.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
              if (child.material) {
                child.material = child.material.clone();
              }
            }
          });
          scene.add(core);
          state.coreLoaded = true;
        },
        undefined,
        () => {
          core = createCoreFallback();
          core.position.set(0, 0, 0);
          scene.add(core);
          state.coreLoaded = true;
        }
      );
    }

    function makeSelectableMaterial(color) {
      return new THREE.MeshStandardMaterial({
        color: new THREE.Color(color),
        metalness: 0.55,
        roughness: 0.35,
        emissive: new THREE.Color(0x000000),
        emissiveIntensity: 0
      });
    }

    function createPropeller(name, colorHex, startPosition, targetPosition, key) {
      const group = new THREE.Group();
      group.name = name;

      const hubMat = makeSelectableMaterial(colorHex);
      const bladeMat = makeSelectableMaterial(colorHex);

      const hub = new THREE.Mesh(
        new THREE.CylinderGeometry(0.08, 0.08, 0.05, 20),
        hubMat
      );
      hub.rotation.x = Math.PI / 2;
      hub.castShadow = true;
      hub.receiveShadow = true;
      group.add(hub);

      const bladeGeo = new THREE.BoxGeometry(0.4, 0.02, 0.06);

      const blade1 = new THREE.Mesh(bladeGeo, bladeMat);
      blade1.castShadow = true;
      blade1.receiveShadow = true;
      group.add(blade1);

      const blade2 = new THREE.Mesh(bladeGeo, bladeMat.clone());
      blade2.rotation.y = Math.PI / 2;
      blade2.castShadow = true;
      blade2.receiveShadow = true;
      group.add(blade2);

      group.position.copy(startPosition);
      group.userData = {
        key,
        partName: name,
        color: colorHex,
        startPosition: startPosition.clone(),
        targetPosition: targetPosition.clone(),
        attached: false,
        attaching: false,
        spinning: false,
        selected: false
      };

      group.traverse((child) => {
        if (child.isMesh) {
          child.userData.parentPropeller = group;
        }
      });

      scene.add(group);
      propellers.push(group);
      propellerMap[key] = group;
    }

    function setSelectedPropeller(propeller) {
      if (state.selectedPart && (!propeller || state.selectedPart !== propeller.name)) {
        const prev = propellers.find(p => p.name === state.selectedPart);
        if (prev) setGlow(prev, false);
      }

      if (!propeller) {
        state.selectedPart = null;
        return;
      }

      if (propeller.userData.attached || propeller.userData.attaching) return;

      propellers.forEach(p => {
        if (p !== propeller) setGlow(p, false);
      });

      setGlow(propeller, true);
      state.selectedPart = propeller.name;
    }

    function setGlow(propeller, active) {
      propeller.userData.selected = active;
      propeller.traverse((child) => {
        if (child.isMesh && child.material) {
          child.material.emissive = new THREE.Color(active ? '#00ffaa' : '#000000');
          child.material.emissiveIntensity = active ? 0.5 : 0;
        }
      });
    }

    function clearSelection() {
      propellers.forEach(p => setGlow(p, false));
      state.selectedPart = null;
    }

    function countAttached() {
      return propellers.filter(p => p.userData.attached).length;
    }

    function updateAssemblyFlags() {
      state.partsAttached = countAttached();
      state.spinTestAvailable = state.partsAttached === 4;
      state.assemblyComplete = state.partsAttached === 4;
      if (state.assemblyComplete && state.status !== 'spinning' && attachAnimations.length === 0) {
        state.status = 'complete';
      } else if (attachAnimations.length === 0 && !state.spinActive && !state.assemblyComplete) {
        state.status = 'idle';
      }
      spinBtn.disabled = !state.spinTestAvailable || state.spinActive;
    }

    function attachSelectedPart() {
      if (!state.selectedPart) return;
      const propeller = propellers.find(p => p.name === state.selectedPart);
      if (!propeller || propeller.userData.attached || propeller.userData.attaching) return;

      propeller.userData.attaching = true;
      state.status = 'attaching';

      attachAnimations.push({
        propeller,
        from: propeller.position.clone(),
        to: propeller.userData.targetPosition.clone(),
        duration: 1,
        elapsed: 0
      });
    }

    function resetAssembly() {
      attachAnimations.length = 0;

      propellers.forEach((p) => {
        p.position.copy(p.userData.startPosition);
        p.rotation.set(0, 0, 0);
        p.userData.attached = false;
        p.userData.attaching = false;
        p.userData.spinning = false;
        setGlow(p, false);
      });

      clearSelection();

      state.partsAttached = 0;
      state.selectedPart = null;
      state.status = 'idle';
      state.spinTestAvailable = false;
      state.assemblyComplete = false;
      state.spinActive = false;
      spinEndTime = 0;
      spinBtn.disabled = true;

      while (activeParticles.length) {
        const p = activeParticles.pop();
        scene.remove(p.mesh);
        if (p.mesh.geometry) p.mesh.geometry.dispose();
        if (p.mesh.material) p.mesh.material.dispose();
      }
    }

    function emitSnapBurst(position, colorHex) {
      const color = new THREE.Color(colorHex);
      for (let i = 0; i < 50; i++) {
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.02, 8, 8),
          new THREE.MeshStandardMaterial({
            color,
            emissive: color,
            emissiveIntensity: 0.8,
            transparent: true,
            opacity: 1,
            metalness: 0.1,
            roughness: 0.4
          })
        );

        mesh.position.copy(position);
        mesh.castShadow = false;
        mesh.receiveShadow = false;
        scene.add(mesh);

        const dir = new THREE.Vector3(
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.1) * 2,
          (Math.random() - 0.5) * 2
        ).normalize();

        const speed = 0.6 + Math.random() * 1.4;
        const velocity = dir.multiplyScalar(speed);

        activeParticles.push({
          mesh,
          velocity,
          lifetime: 1,
          age: 0,
          gravity: new THREE.Vector3(0, -0.5, 0)
        });
      }
    }

    function emitSpinTrail(propeller) {
      const tipOffsets = [
        new THREE.Vector3(0.2, 0, 0),
        new THREE.Vector3(-0.2, 0, 0),
        new THREE.Vector3(0, 0, 0.2),
        new THREE.Vector3(0, 0, -0.2)
      ];
      const color = new THREE.Color('#00ccff');

      for (let i = 0; i < 4; i++) {
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.015, 6, 6),
          new THREE.MeshStandardMaterial({
            color,
            emissive: color,
            emissiveIntensity: 1.2,
            transparent: true,
            opacity: 0.95
          })
        );

        const localOffset = tipOffsets[i % tipOffsets.length].clone();
        const worldPos = propeller.localToWorld(localOffset);
        mesh.position.copy(worldPos);
        scene.add(mesh);

        const velocity = new THREE.Vector3(
          (Math.random() - 0.5) * 0.4,
          (Math.random() - 0.5) * 0.15,
          (Math.random() - 0.5) * 0.4
        );

        activeParticles.push({
          mesh,
          velocity,
          lifetime: 0.5,
          age: 0,
          gravity: new THREE.Vector3(0, 0, 0)
        });
      }
    }

    function updateParticles(delta) {
      for (let i = activeParticles.length - 1; i >= 0; i--) {
        const p = activeParticles[i];
        p.age += delta;
        p.velocity.addScaledVector(p.gravity, delta);
        p.mesh.position.addScaledVector(p.velocity, delta);

        const t = 1 - (p.age / p.lifetime);
        if (p.mesh.material) {
          p.mesh.material.opacity = Math.max(0, t);
        }
        p.mesh.scale.setScalar(0.7 + t * 0.3);

        if (p.age >= p.lifetime) {
          scene.remove(p.mesh);
          if (p.mesh.geometry) p.mesh.geometry.dispose();
          if (p.mesh.material) p.mesh.material.dispose();
          activeParticles.splice(i, 1);
        }
      }
    }

    function startSpinTest() {
      if (!state.spinTestAvailable || state.spinActive) return;

      state.spinActive = true;
      state.status = 'spinning';
      spinBtn.disabled = true;
      spinEndTime = clock.getElapsedTime() + 3;

      propellers.forEach((p) => {
        if (p.userData.attached) {
          p.userData.spinning = true;
        }
      });
    }

    function updateSpin(delta) {
      if (!state.spinActive) return;

      const now = clock.getElapsedTime();
      const spinSpeed = 10;

      propellers.forEach((p) => {
        if (p.userData.spinning) {
          p.rotation.y += spinSpeed * delta;
          emitSpinTrail(p);
        }
      });

      if (now >= spinEndTime) {
        state.spinActive = false;
        propellers.forEach((p) => p.userData.spinning = false);
        updateAssemblyFlags();
      }
    }

    function updateAttachAnimations(delta) {
      for (let i = attachAnimations.length - 1; i >= 0; i--) {
        const anim = attachAnimations[i];
        anim.elapsed += delta;
        const t = Math.min(anim.elapsed / anim.duration, 1);
        const eased = t * t * (3 - 2 * t);

        anim.propeller.position.lerpVectors(anim.from, anim.to, eased);

        if (t >= 1) {
          anim.propeller.position.copy(anim.to);
          anim.propeller.userData.attached = true;
          anim.propeller.userData.attaching = false;
          emitSnapBurst(anim.to.clone(), anim.propeller.userData.color);
          setGlow(anim.propeller, false);

          if (state.selectedPart === anim.propeller.name) {
            state.selectedPart = null;
          }

          attachAnimations.splice(i, 1);
          updateAssemblyFlags();
        }
      }
    }

    function updateHUD() {
      const statusMap = {
        idle: 'Idle',
        attaching: 'Attaching',
        spinning: 'Spinning',
        complete: 'Complete'
      };
      hudAttached.textContent = `Parts Attached: ${state.partsAttached}/4`;
      hudSelected.textContent = `Selected: ${state.selectedPart || 'None'}`;
      hudStatus.textContent = `Status: ${statusMap[state.status] || state.status}`;
    }

    function updateGlobalState() {
      const propellerStates = {
        FL: makePropState('FL'),
        FR: makePropState('FR'),
        BL: makePropState('BL'),
        BR: makePropState('BR')
      };

      window.__3D_STATE__ = {
        partsAttached: state.partsAttached,
        selectedPart: state.selectedPart,
        status: state.status,
        coreLoaded: state.coreLoaded,
        propellerStates,
        particleCount: activeParticles.length,
        spinTestAvailable: state.spinTestAvailable,
        assemblyComplete: state.assemblyComplete,
        spinActive: state.spinActive
      };
    }

    function makePropState(key) {
      const p = propellerMap[key];
      if (!p) {
        return {
          attached: false,
          position: { x: 0, y: 0, z: 0 },
          spinning: false
        };
      }
      return {
        attached: !!p.userData.attached,
        position: {
          x: p.position.x,
          y: p.position.y,
          z: p.position.z
        },
        spinning: !!p.userData.spinning
      };
    }

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(propellers, true);

      if (intersects.length > 0) {
        let obj = intersects[0].object;
        const propeller = obj.userData.parentPropeller || obj.parent;
        if (propeller && propellers.includes(propeller)) {
          setSelectedPropeller(propeller);
          return;
        }
      }

      clearSelection();
    }

    renderer.domElement.addEventListener('pointerdown', onPointerDown);
    attachBtn.addEventListener('click', attachSelectedPart);
    resetBtn.addEventListener('click', resetAssembly);
    spinBtn.addEventListener('click', startSpinTest);

    createPropeller(
      propConfig.FL.name,
      propConfig.FL.color,
      propConfig.FL.start,
      propConfig.FL.target,
      'FL'
    );
    createPropeller(
      propConfig.FR.name,
      propConfig.FR.color,
      propConfig.FR.start,
      propConfig.FR.target,
      'FR'
    );
    createPropeller(
      propConfig.BL.name,
      propConfig.BL.color,
      propConfig.BL.start,
      propConfig.BL.target,
      'BL'
    );
    createPropeller(
      propConfig.BR.name,
      propConfig.BR.color,
      propConfig.BR.start,
      propConfig.BR.target,
      'BR'
    );

    loadCore();
    updateAssemblyFlags();

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.033);

      controls.update();
      updateAttachAnimations(delta);
      updateSpin(delta);
      updateParticles(delta);

      if (attachAnimations.length === 0 && !state.spinActive) {
        updateAssemblyFlags();
      }

      updateHUD();
      updateGlobalState();

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.__3D_STATE__ = {
      partsAttached: 0,
      selectedPart: null,
      status: 'idle',
      coreLoaded: false,
      propellerStates: {
        FL: { attached: false, position: { x: -3, y: 2, z: -1 }, spinning: false },
        FR: { attached: false, position: { x: 3, y: 2, z: -1 }, spinning: false },
        BL: { attached: false, position: { x: -3, y: 2, z: 1 }, spinning: false },
        BR: { attached: false, position: { x: 3, y: 2, z: 1 }, spinning: false }
      },
      particleCount: 0,
      spinTestAvailable: false,
      assemblyComplete: false,
      spinActive: false
    };
  </script>
</body>
</html>
