<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Audio Spectrum Visualizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: monospace;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            pointer-events: none;
            z-index: 10;
            min-width: 200px;
        }
        .hud-line {
            margin: 5px 0;
            font-size: 14px;
        }
        .hud-label {
            color: #aaa;
            display: inline-block;
            width: 100px;
        }
        .hud-value {
            font-weight: bold;
            color: #fff;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        button {
            background: #222;
            color: white;
            border: 1px solid #555;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            transition: background 0.2s;
            pointer-events: auto;
        }
        button:hover {
            background: #444;
        }
        button:active {
            background: #666;
        }
        #instructions {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            pointer-events: none;
            text-align: right;
            font-size: 12px;
            color: #aaa;
        }
        .key {
            color: #fff;
            font-weight: bold;
            background: #333;
            padding: 2px 5px;
            border-radius: 3px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div class="hud-line"><span class="hud-label">Mode:</span> <span id="hud-mode" class="hud-value"></span></div>
        <div class="hud-line"><span class="hud-label">Color:</span> <span id="hud-color" class="hud-value"></span></div>
        <div class="hud-line"><span class="hud-label">History:</span> <span id="hud-history" class="hud-value"></span></div>
        <div class="hud-line"><span class="hud-label">Status:</span> <span id="hud-playing" class="hud-value"></span></div>
        <div class="hud-line"><span class="hud-label">Bars:</span> <span id="hud-bars" class="hud-value">64</span></div>
        <div class="hud-line"><span class="hud-label">FPS:</span> <span id="hud-fps" class="hud-value">0</span></div>
    </div>

    <div id="instructions">
        <div><span class="key">M</span> Cycle Mode</div>
        <div style="margin-top:5px"><span class="key">C</span> Cycle Color</div>
        <div style="margin-top:5px"><span class="key">Space</span> Play/Pause</div>
        <div style="margin-top:5px"><span class="key">Z</span> Undo</div>
        <div style="margin-top:5px"><span class="key">Y</span> Redo</div>
        <div style="margin-top:5px">Drag to Rotate</div>
    </div>

    <div id="controls">
        <button id="btn-undo">Undo</button>
        <button id="btn-redo">Redo</button>
        <button id="btn-reset">Reset</button>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            mode: 'bars',
            colorScheme: 'rainbow',
            playing: true,
            barCount: 64,
            historyIndex: 0,
            historyLength: 1,
            fps: 0,
            modelLoaded: false,
            barHeights: new Array(64).fill(1),
            cameraPosition: { x: 0, y: 5, z: 15 },
            undoCount: 0,
            redoCount: 0,
            modeChangeCount: 0,
            elapsedTime: 0
        };

        let currentState = {
            mode: 'bars',
            colorScheme: 'rainbow',
            playing: true,
            cameraPosition: { x: 0, y: 5, z: 15 }
        };

        let history = [];
        let historyIndex = -1;
        const MAX_HISTORY = 20;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#0a0a1a');

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // Model Loading
        const loader = new GLTFLoader();
        loader.load(
            'https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/models/gltf/LittlestTokyo.glb',
            (gltf) => {
                const model = gltf.scene;
                model.position.set(0, -2, 0);
                model.scale.set(0.01, 0.01, 0.01);
                scene.add(model);
                window.__3D_STATE__.modelLoaded = true;
            },
            undefined,
            (error) => console.error('Error loading model:', error)
        );

        // Bars Setup
        const bars = [];
        const barGeometry = new THREE.BoxGeometry(0.4, 0.1, 0.4);
        const barMaterials = [];

        for (let i = 0; i < 64; i++) {
            const material = new THREE.MeshStandardMaterial({ color: 0xffffff });
            barMaterials.push(material);
            const bar = new THREE.Mesh(barGeometry, material);
            scene.add(bar);
            bars.push(bar);
        }

        // --- Logic Functions ---

        function updateLayout() {
            const mode = currentState.mode;
            for (let i = 0; i < 64; i++) {
                const bar = bars[i];
                if (mode === 'bars') {
                    const col = i % 8;
                    const row = Math.floor(i / 8);
                    bar.position.x = (col - 3.5) * 0.6;
                    bar.position.z = (row - 3.5) * 0.6;
                } else if (mode === 'wave') {
                    bar.position.x = (i - 31.5) * 0.6;
                    bar.position.z = 0;
                } else if (mode === 'ring') {
                    const angle = (i / 64) * Math.PI * 2;
                    bar.position.x = Math.cos(angle) * 5;
                    bar.position.z = Math.sin(angle) * 5;
                }
            }
        }

        function updateColors() {
            const scheme = currentState.colorScheme;
            for (let i = 0; i < 64; i++) {
                const mat = barMaterials[i];
                const t = i / 64;
                if (scheme === 'rainbow') {
                    mat.color.setHSL(t, 1, 0.5);
                } else if (scheme === 'thermal') {
                    mat.color.setHSL(t * 0.16, 1, 0.5); // Red to Yellow
                } else if (scheme === 'cool') {
                    mat.color.setHSL(0.66 - t * 0.16, 1, 0.5); // Blue to Cyan
                }
            }
        }

        function getCameraPos() {
            return {
                x: Number(camera.position.x.toFixed(2)),
                y: Number(camera.position.y.toFixed(2)),
                z: Number(camera.position.z.toFixed(2))
            };
        }

        function saveState() {
            history = history.slice(0, historyIndex + 1);
            const snapshot = {
                mode: currentState.mode,
                colorScheme: currentState.colorScheme,
                playing: currentState.playing,
                cameraPosition: getCameraPos()
            };
            history.push(snapshot);
            if (history.length > MAX_HISTORY) {
                history.shift();
            } else {
                historyIndex++;
            }
            updateStateObject();
        }

        function applyState(snapshot) {
            currentState.mode = snapshot.mode;
            currentState.colorScheme = snapshot.colorScheme;
            currentState.playing = snapshot.playing;
            camera.position.set(snapshot.cameraPosition.x, snapshot.cameraPosition.y, snapshot.cameraPosition.z);
            controls.update();
            updateLayout();
            updateColors();
            updateStateObject();
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                applyState(history[historyIndex]);
                window.__3D_STATE__.undoCount++;
            }
        }

        function redo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                applyState(history[historyIndex]);
                window.__3D_STATE__.redoCount++;
            }
        }

        function reset() {
            currentState = {
                mode: 'bars',
                colorScheme: 'rainbow',
                playing: true,
                cameraPosition: { x: 0, y: 5, z: 15 }
            };
            history = [];
            historyIndex = -1;
            window.__3D_STATE__.elapsedTime = 0;
            window.__3D_STATE__.undoCount = 0;
            window.__3D_STATE__.redoCount = 0;
            window.__3D_STATE__.modeChangeCount = 0;
            applyState(currentState);
            saveState();
        }

        function updateStateObject() {
            window.__3D_STATE__.mode = currentState.mode;
            window.__3D_STATE__.colorScheme = currentState.colorScheme;
            window.__3D_STATE__.playing = currentState.playing;
            window.__3D_STATE__.historyIndex = historyIndex;
            window.__3D_STATE__.historyLength = history.length;
            window.__3D_STATE__.cameraPosition = getCameraPos();
        }

        function updateHUD() {
            document.getElementById('hud-mode').innerText = currentState.mode;
            document.getElementById('hud-color').innerText = currentState.colorScheme;
            document.getElementById('hud-history').innerText = `${historyIndex + 1} / ${history.length}`;
            document.getElementById('hud-playing').innerText = currentState.playing ? 'Playing' : 'Paused';
            document.getElementById('hud-fps').innerText = Math.round(window.__3D_STATE__.fps);
        }

        // --- Event Listeners ---

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            let stateChanged = false;

            if (key === 'm') {
                const modes = ['bars', 'wave', 'ring'];
                currentState.mode = modes[(modes.indexOf(currentState.mode) + 1) % 3];
                window.__3D_STATE__.modeChangeCount++;
                updateLayout();
                stateChanged = true;
            } else if (key === 'c') {
                const schemes = ['rainbow', 'thermal', 'cool'];
                currentState.colorScheme = schemes[(schemes.indexOf(currentState.colorScheme) + 1) % 3];
                updateColors();
                stateChanged = true;
            } else if (key === ' ') {
                currentState.playing = !currentState.playing;
                stateChanged = true;
            } else if (key === 'z') {
                undo();
            } else if (key === 'y') {
                redo();
            }

            if (stateChanged) {
                currentState.cameraPosition = getCameraPos();
                saveState();
            }
        });

        document.getElementById('btn-undo').addEventListener('click', undo);
        document.getElementById('btn-redo').addEventListener('click', redo);
        document.getElementById('btn-reset').addEventListener('click', reset);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---

        let lastTime = performance.now();
        let frames = 0;
        let lastFpsTime = lastTime;

        // Initialize
        reset();

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const delta = now - lastTime;
            lastTime = now;

            // FPS Calculation
            frames++;
            if (now - lastFpsTime >= 1000) {
                window.__3D_STATE__.fps = (frames * 1000) / (now - lastFpsTime);
                frames = 0;
                lastFpsTime = now;
            }

            if (currentState.playing) {
                window.__3D_STATE__.elapsedTime += delta;
            }

            const t = window.__3D_STATE__.elapsedTime;

            // Update Bars
            for (let i = 0; i < 64; i++) {
                const amp = 0.5 + 0.5 * Math.sin(t * 0.002 * (i + 1) + i * 0.3);
                let scaleY = amp * 5;
                if (!isFinite(scaleY) || scaleY <= 0) scaleY = 0.001;
                
                bars[i].scale.y = scaleY;
                // Base height is 0.1. Scaled height is 0.1 * scaleY.
                // To keep base at Y=0, position Y is half of scaled height.
                bars[i].position.y = (0.1 * scaleY) / 2;
                
                window.__3D_STATE__.barHeights[i] = scaleY;
            }

            controls.update();
            
            // Update camera position in state continuously for accurate reading, 
            // but don't save to history unless an action occurs
            window.__3D_STATE__.cameraPosition = getCameraPos();

            updateHUD();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
