<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D Audio Spectrum Visualizer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.45;
      min-width: 240px;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 18px rgba(0,0,0,0.25);
      user-select: none;
    }

    #hud .title {
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 14px;
    }

    #hud .buttons {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #hud button {
      background: #1e2445;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    #hud button:hover {
      background: #2a3362;
    }

    #help {
      margin-top: 10px;
      font-size: 11px;
      opacity: 0.85;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div class="title">3D Spectrum Visualizer</div>
      <div id="hud-content"></div>
      <div class="buttons">
        <button id="btn-undo">Undo</button>
        <button id="btn-redo">Redo</button>
        <button id="btn-reset">Reset</button>
      </div>
      <div id="help">
        Keys: <b>M</b> mode, <b>C</b> color, <b>Space</b> play/pause, <b>Z</b> undo, <b>Y</b> redo
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const hudContent = document.getElementById('hud-content');
    const btnUndo = document.getElementById('btn-undo');
    const btnRedo = document.getElementById('btn-redo');
    const btnReset = document.getElementById('btn-reset');

    const BAR_COUNT = 64;
    const GRID_SIZE = 8;
    const SPACING = 0.6;
    const INITIAL_CAMERA = new THREE.Vector3(0, 5, 15);
    const MAX_HISTORY = 20;
    const MODES = ['bars', 'wave', 'ring'];
    const COLOR_SCHEMES = ['rainbow', 'thermal', 'cool'];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#0a0a1a');

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.copy(INITIAL_CAMERA);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const bars = [];
    const barGroup = new THREE.Group();
    scene.add(barGroup);

    const barGeometry = new THREE.BoxGeometry(0.4, 1, 0.4);

    function getColor(index, scheme) {
      const t = index / (BAR_COUNT - 1);

      if (scheme === 'rainbow') {
        const color = new THREE.Color();
        color.setHSL(index / BAR_COUNT, 1.0, 0.5);
        return color;
      }

      if (scheme === 'thermal') {
        const color = new THREE.Color();
        color.setRGB(1, 0.1 + 0.9 * t, 0.0);
        return color;
      }

      if (scheme === 'cool') {
        const color = new THREE.Color();
        color.setRGB(0.0, 0.4 + 0.6 * t, 1.0);
        return color;
      }

      return new THREE.Color(0xffffff);
    }

    for (let i = 0; i < BAR_COUNT; i++) {
      const material = new THREE.MeshStandardMaterial({
        color: getColor(i, 'rainbow'),
        emissive: getColor(i, 'rainbow').clone().multiplyScalar(0.15),
        roughness: 0.35,
        metalness: 0.2
      });

      const bar = new THREE.Mesh(barGeometry, material);
      bar.castShadow = false;
      bar.receiveShadow = false;
      bar.scale.set(1, 0.1, 1);
      bar.position.y = 0.05;
      bars.push(bar);
      barGroup.add(bar);
    }

    let modelLoaded = false;
    const loader = new GLTFLoader();
    loader.load(
      'LittlestTokyo.glb',
      (gltf) => {
        const model = gltf.scene;
        model.position.set(0, -2, 0);
        model.scale.set(0.01, 0.01, 0.01);
        scene.add(model);
        modelLoaded = true;
      },
      undefined,
      () => {
        modelLoaded = false;
      }
    );

    const appState = {
      mode: 'bars',
      colorScheme: 'rainbow',
      playing: true,
      barCount: BAR_COUNT,
      historyIndex: 0,
      historyLength: 1,
      fps: 60,
      modelLoaded: false,
      barHeights: new Array(BAR_COUNT).fill(0.1),
      cameraPosition: { x: 0, y: 5, z: 15 },
      undoCount: 0,
      redoCount: 0,
      modeChangeCount: 0,
      elapsedTime: 0
    };

    window.__3D_STATE__ = appState;

    function roundedCameraPosition() {
      return {
        x: Number(camera.position.x.toFixed(2)),
        y: Number(camera.position.y.toFixed(2)),
        z: Number(camera.position.z.toFixed(2))
      };
    }

    function createSnapshot() {
      return {
        mode: appState.mode,
        colorScheme: appState.colorScheme,
        cameraPosition: roundedCameraPosition(),
        playing: appState.playing
      };
    }

    let history = [createSnapshot()];
    let historyIndex = 0;

    function syncHistoryState() {
      appState.historyIndex = historyIndex;
      appState.historyLength = history.length;
    }

    function applyColorScheme() {
      for (let i = 0; i < BAR_COUNT; i++) {
        const color = getColor(i, appState.colorScheme);
        bars[i].material.color.copy(color);
        bars[i].material.emissive.copy(color).multiplyScalar(0.15);
      }
    }

    function pushHistory() {
      if (historyIndex < history.length - 1) {
        history = history.slice(0, historyIndex + 1);
      }

      history.push(createSnapshot());

      if (history.length > MAX_HISTORY) {
        history.shift();
      } else {
        historyIndex++;
      }

      if (history.length === MAX_HISTORY && historyIndex >= history.length) {
        historyIndex = history.length - 1;
      }

      syncHistoryState();
    }

    function applySnapshot(snapshot) {
      appState.mode = snapshot.mode;
      appState.colorScheme = snapshot.colorScheme;
      appState.playing = snapshot.playing;
      camera.position.set(
        snapshot.cameraPosition.x,
        snapshot.cameraPosition.y,
        snapshot.cameraPosition.z
      );
      controls.update();
      applyColorScheme();
    }

    function undo() {
      if (historyIndex > 0) {
        historyIndex--;
        applySnapshot(history[historyIndex]);
        appState.undoCount++;
        syncHistoryState();
      }
    }

    function redo() {
      if (historyIndex < history.length - 1) {
        historyIndex++;
        applySnapshot(history[historyIndex]);
        appState.redoCount++;
        syncHistoryState();
      }
    }

    function resetState() {
      appState.mode = 'bars';
      appState.colorScheme = 'rainbow';
      appState.playing = true;
      appState.elapsedTime = 0;

      camera.position.copy(INITIAL_CAMERA);
      controls.target.set(0, 0, 0);
      controls.update();

      applyColorScheme();

      history = [{
        mode: 'bars',
        colorScheme: 'rainbow',
        cameraPosition: {
          x: Number(INITIAL_CAMERA.x.toFixed(2)),
          y: Number(INITIAL_CAMERA.y.toFixed(2)),
          z: Number(INITIAL_CAMERA.z.toFixed(2))
        },
        playing: true
      }];
      historyIndex = 0;
      syncHistoryState();
    }

    function cycleMode() {
      const currentIndex = MODES.indexOf(appState.mode);
      appState.mode = MODES[(currentIndex + 1) % MODES.length];
      appState.modeChangeCount++;
      pushHistory();
    }

    function cycleColorScheme() {
      const currentIndex = COLOR_SCHEMES.indexOf(appState.colorScheme);
      appState.colorScheme = COLOR_SCHEMES[(currentIndex + 1) % COLOR_SCHEMES.length];
      applyColorScheme();
      pushHistory();
    }

    function togglePlayPause() {
      appState.playing = !appState.playing;
      pushHistory();
    }

    function clampFinitePositive(v, min = 0.0001) {
      if (!Number.isFinite(v) || Number.isNaN(v)) return min;
      return Math.max(min, v);
    }

    function getAmplitude(i, t) {
      return 0.5 + 0.5 * Math.sin(t * 0.002 * (i + 1) + i * 0.3);
    }

    function updateBars() {
      for (let i = 0; i < BAR_COUNT; i++) {
        let height = bars[i].scale.y;

        if (appState.playing) {
          const amp = getAmplitude(i, appState.elapsedTime);
          height = clampFinitePositive(amp * 5, 0.1);
          bars[i].scale.y = height;
        } else {
          height = clampFinitePositive(bars[i].scale.y, 0.1);
          bars[i].scale.y = height;
        }

        appState.barHeights[i] = height;

        if (appState.mode === 'bars') {
          const row = Math.floor(i / GRID_SIZE);
          const col = i % GRID_SIZE;
          const x = (col - (GRID_SIZE - 1) / 2) * SPACING;
          const z = (row - (GRID_SIZE - 1) / 2) * SPACING;
          bars[i].position.set(x, height / 2, z);
          bars[i].rotation.set(0, 0, 0);
        } else if (appState.mode === 'wave') {
          const x = (i - (BAR_COUNT - 1) / 2) * 0.25;
          const amp = clampFinitePositive(appState.barHeights[i], 0.1);
          const yOffset = amp * 0.35;
          bars[i].position.set(x, amp / 2 + yOffset, 0);
          bars[i].rotation.set(0, 0, 0);
        } else if (appState.mode === 'ring') {
          const angle = (i / BAR_COUNT) * Math.PI * 2;
          const radius = 5;
          const x = Math.cos(angle) * radius;
          const z = Math.sin(angle) * radius;
          bars[i].position.set(x, height / 2, z);
          bars[i].rotation.set(0, -angle, 0);
        }
      }
    }

    function updateHUD() {
      hudContent.innerHTML = `
        <div>Mode: <b>${appState.mode}</b></div>
        <div>Color Scheme: <b>${appState.colorScheme}</b></div>
        <div>History: <b>${appState.historyIndex}</b> / <b>${appState.historyLength - 1}</b></div>
        <div>Playing: <b>${appState.playing ? 'Yes' : 'No'}</b></div>
        <div>Bars: <b>${appState.barCount}</b></div>
        <div>FPS: <b>${appState.fps.toFixed(1)}</b></div>
        <div>Model Loaded: <b>${appState.modelLoaded ? 'Yes' : 'No'}</b></div>
      `;
    }

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === 'm') {
        cycleMode();
      } else if (key === 'c') {
        cycleColorScheme();
      } else if (key === 'z') {
        undo();
      } else if (key === 'y') {
        redo();
      } else if (e.code === 'Space') {
        e.preventDefault();
        togglePlayPause();
      }
    });

    btnUndo.addEventListener('click', undo);
    btnRedo.addEventListener('click', redo);
    btnReset.addEventListener('click', resetState);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    let lastFrameTime = performance.now();
    let fpsSmoothing = 60;

    resetState();

    function animate(now) {
      requestAnimationFrame(animate);

      const delta = now - lastFrameTime;
      lastFrameTime = now;

      if (appState.playing) {
        appState.elapsedTime += delta;
      }

      const currentFPS = delta > 0 ? 1000 / delta : 60;
      fpsSmoothing = fpsSmoothing * 0.9 + currentFPS * 0.1;
      appState.fps = clampFinitePositive(fpsSmoothing, 0);

      controls.update();
      updateBars();

      appState.modelLoaded = modelLoaded;
      appState.cameraPosition = roundedCameraPosition();
      appState.mode = appState.mode;
      appState.colorScheme = appState.colorScheme;
      appState.playing = appState.playing;
      appState.barCount = BAR_COUNT;
      syncHistoryState();

      window.__3D_STATE__ = {
        mode: appState.mode,
        colorScheme: appState.colorScheme,
        playing: appState.playing,
        barCount: appState.barCount,
        historyIndex: appState.historyIndex,
        historyLength: appState.historyLength,
        fps: appState.fps,
        modelLoaded: appState.modelLoaded,
        barHeights: [...appState.barHeights].map(v => clampFinitePositive(v, 0.1)),
        cameraPosition: appState.cameraPosition,
        undoCount: appState.undoCount,
        redoCount: appState.redoCount,
        modeChangeCount: appState.modeChangeCount,
        elapsedTime: appState.elapsedTime
      };

      updateHUD();
      renderer.render(scene, camera);
    }

    applyColorScheme();
    updateBars();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
