<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Audio Spectrum Visualizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #e0e0ff;
    background: rgba(10, 10, 26, 0.85);
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.8;
    border: 1px solid rgba(100, 100, 255, 0.3);
    backdrop-filter: blur(10px);
    min-width: 220px;
    z-index: 10;
  }
  #hud h3 {
    margin-bottom: 8px;
    color: #8888ff;
    font-size: 15px;
    border-bottom: 1px solid rgba(100, 100, 255, 0.3);
    padding-bottom: 5px;
  }
  #hud .label { color: #8888cc; }
  #hud .value { color: #ffffff; font-weight: bold; }
  .btn-container {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  .btn-container button {
    padding: 10px 24px;
    border: 1px solid rgba(100, 100, 255, 0.5);
    background: rgba(20, 20, 50, 0.9);
    color: #c0c0ff;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: all 0.2s;
    backdrop-filter: blur(5px);
  }
  .btn-container button:hover {
    background: rgba(60, 60, 120, 0.9);
    border-color: rgba(150, 150, 255, 0.8);
    color: #ffffff;
  }
  .btn-container button:active {
    transform: scale(0.95);
  }
  #controls-hint {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(150, 150, 200, 0.6);
    font-size: 12px;
    text-align: center;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="hud">
  <h3>🎵 Spectrum Visualizer</h3>
  <div><span class="label">Mode: </span><span class="value" id="hud-mode">bars</span></div>
  <div><span class="label">Colors: </span><span class="value" id="hud-color">rainbow</span></div>
  <div><span class="label">Status: </span><span class="value" id="hud-playing">▶ Playing</span></div>
  <div><span class="label">Bars: </span><span class="value" id="hud-bars">64</span></div>
  <div><span class="label">History: </span><span class="value" id="hud-history">1/1</span></div>
  <div><span class="label">FPS: </span><span class="value" id="hud-fps">0</span></div>
</div>

<div class="btn-container">
  <button id="btn-undo">⟲ Undo (Z)</button>
  <button id="btn-redo">⟳ Redo (Y)</button>
  <button id="btn-reset">↺ Reset</button>
</div>

<div id="controls-hint">
  M: Mode | C: Color | Space: Play/Pause | Z: Undo | Y: Redo | Mouse: Orbit
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
scene.add(directionalLight);

// Ground plane for visual reference
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x111122, transparent: true, opacity: 0.5 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// --- Load LittlestTokyo.glb ---
let modelLoaded = false;
const loader = new GLTFLoader();
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/libs/draco/');
loader.setDRACOLoader(dracoLoader);

loader.load(
  'LittlestTokyo.glb',
  (gltf) => {
    const model = gltf.scene;
    model.position.set(0, -2, 0);
    model.scale.set(0.01, 0.01, 0.01);
    scene.add(model);
    modelLoaded = true;
    console.log('LittlestTokyo.glb loaded successfully');
  },
  (progress) => {
    // Loading progress
  },
  (error) => {
    console.warn('Could not load LittlestTokyo.glb:', error.message || error);
    // Continue without model
  }
);

// --- Create Bars ---
const BAR_COUNT = 64;
const GRID_SIZE = 8;
const BAR_WIDTH = 0.4;
const BAR_DEPTH = 0.4;
const BAR_SPACING = 0.6;
const bars = [];
const barMaterials = [];

for (let i = 0; i < BAR_COUNT; i++) {
  const geometry = new THREE.BoxGeometry(BAR_WIDTH, 1, BAR_DEPTH);
  geometry.translate(0, 0.5, 0); // pivot at bottom
  const hue = i / BAR_COUNT;
  const material = new THREE.MeshStandardMaterial({
    color: new THREE.Color().setHSL(hue, 0.8, 0.5),
    metalness: 0.3,
    roughness: 0.4,
    emissive: new THREE.Color().setHSL(hue, 0.8, 0.15),
  });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  bars.push(mesh);
  barMaterials.push(material);
}

// --- State ---
const MODES = ['bars', 'wave', 'ring'];
const COLOR_SCHEMES = ['rainbow', 'thermal', 'cool'];

let currentMode = 'bars';
let currentColorScheme = 'rainbow';
let playing = true;
let elapsedTime = 0;
let lastTimestamp = performance.now();
let undoCount = 0;
let redoCount = 0;
let modeChangeCount = 0;
const barHeights = new Array(BAR_COUNT).fill(0.1);

const INITIAL_CAMERA = { x: 0, y: 5, z: 15 };

// --- History ---
const MAX_HISTORY = 20;
let history = [];
let historyIndex = -1;

function roundTo2(v) {
  return Math.round(v * 100) / 100;
}

function createSnapshot() {
  return {
    mode: currentMode,
    colorScheme: currentColorScheme,
    cameraPosition: {
      x: roundTo2(camera.position.x),
      y: roundTo2(camera.position.y),
      z: roundTo2(camera.position.z)
    },
    playing: playing
  };
}

function pushState() {
  const snapshot = createSnapshot();
  // Remove any redo states
  history = history.slice(0, historyIndex + 1);
  history.push(snapshot);
  if (history.length > MAX_HISTORY) {
    history.shift();
  }
  historyIndex = history.length - 1;
}

function restoreSnapshot(snapshot) {
  currentMode = snapshot.mode;
  currentColorScheme = snapshot.colorScheme;
  playing = snapshot.playing;
  camera.position.set(snapshot.cameraPosition.x, snapshot.cameraPosition.y, snapshot.cameraPosition.z);
  applyColorScheme();
  updateBarPositions();
}

// Initialize history
pushState();

// --- Functions ---
function applyColorScheme() {
  for (let i = 0; i < BAR_COUNT; i++) {
    const t = i / BAR_COUNT;
    let color, emissive;
    switch (currentColorScheme) {
      case 'rainbow':
        color = new THREE.Color().setHSL(t, 0.8, 0.5);
        emissive = new THREE.Color().setHSL(t, 0.8, 0.15);
        break;
      case 'thermal':
        // Red to yellow gradient
        color = new THREE.Color().setHSL(t * 0.12, 0.9, 0.4 + t * 0.2);
        emissive = new THREE.Color().setHSL(t * 0.12, 0.9, 0.1 + t * 0.1);
        break;
      case 'cool':
        // Blue to cyan gradient
        color = new THREE.Color().setHSL(0.5 + t * 0.15, 0.8, 0.4 + t * 0.15);
        emissive = new THREE.Color().setHSL(0.5 + t * 0.15, 0.8, 0.1 + t * 0.05);
        break;
    }
    barMaterials[i].color.copy(color);
    barMaterials[i].emissive.copy(emissive);
  }
}

function updateBarPositions() {
  const offset = (GRID_SIZE - 1) * BAR_SPACING / 2;
  for (let i = 0; i < BAR_COUNT; i++) {
    const bar = bars[i];
    switch (currentMode) {
      case 'bars': {
        const row = Math.floor(i / GRID_SIZE);
        const col = i % GRID_SIZE;
        bar.position.x = col * BAR_SPACING - offset;
        bar.position.z = row * BAR_SPACING - offset;
        bar.position.y = 0;
        bar.rotation.set(0, 0, 0);
        break;
      }
      case 'wave': {
        const totalWidth = (BAR_COUNT - 1) * BAR_SPACING;
        bar.position.x = i * BAR_SPACING - totalWidth / 2;
        bar.position.z = 0;
        bar.position.y = 0;
        bar.rotation.set(0, 0, 0);
        break;
      }
      case 'ring': {
        const angle = (i / BAR_COUNT) * Math.PI * 2;
        const radius = 5;
        bar.position.x = Math.cos(angle) * radius;
        bar.position.z = Math.sin(angle) * radius;
        bar.position.y = 0;
        bar.rotation.set(0, -angle, 0);
        break;
      }
    }
  }
}

function undo() {
  if (historyIndex > 0) {
    historyIndex--;
    restoreSnapshot(history[historyIndex]);
    undoCount++;
  }
}

function redo() {
  if (historyIndex < history.length - 1) {
    historyIndex++;
    restoreSnapshot(history[historyIndex]);
    redoCount++;
  }
}

function reset() {
  currentMode = 'bars';
  currentColorScheme = 'rainbow';
  playing = true;
  elapsedTime = 0;
  camera.position.set(INITIAL_CAMERA.x, INITIAL_CAMERA.y, INITIAL_CAMERA.z);
  controls.target.set(0, 0, 0);
  applyColorScheme();
  updateBarPositions();
  history = [];
  historyIndex = -1;
  pushState();
}

function cycleMode() {
  const idx = MODES.indexOf(currentMode);
  currentMode = MODES[(idx + 1) % MODES.length];
  modeChangeCount++;
  updateBarPositions();
  pushState();
}

function cycleColor() {
  const idx = COLOR_SCHEMES.indexOf(currentColorScheme);
  currentColorScheme = COLOR_SCHEMES[(idx + 1) % COLOR_SCHEMES.length];
  applyColorScheme();
  pushState();
}

function togglePlay() {
  playing = !playing;
  pushState();
}

// --- Event Listeners ---
document.addEventListener('keydown', (e) => {
  switch (e.code) {
    case 'KeyM':
      cycleMode();
      break;
    case 'KeyC':
      cycleColor();
      break;
    case 'KeyZ':
      undo();
      break;
    case 'KeyY':
      redo();
      break;
    case 'Space':
      e.preventDefault();
      togglePlay();
      break;
  }
});

document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-redo').addEventListener('click', redo);
document.getElementById('btn-reset').addEventListener('click', reset);

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Initialize ---
applyColorScheme();
updateBarPositions();

// --- FPS tracking ---
let frameCount = 0;
let fpsTime = 0;
let currentFPS = 0;

// --- Global State ---
window.__3D_STATE__ = {
  mode: currentMode,
  colorScheme: currentColorScheme,
  playing: playing,
  barCount: BAR_COUNT,
  historyIndex: 0,
  historyLength: 1,
  fps: 0,
  modelLoaded: false,
  barHeights: [...barHeights],
  cameraPosition: { x: INITIAL_CAMERA.x, y: INITIAL_CAMERA.y, z: INITIAL_CAMERA.z },
  undoCount: 0,
  redoCount: 0,
  modeChangeCount: 0,
  elapsedTime: 0
};

// --- HUD elements ---
const hudMode = document.getElementById('hud-mode');
const hudColor = document.getElementById('hud-color');
const hudPlaying = document.getElementById('hud-playing');
const hudBars = document.getElementById('hud-bars');
const hudHistory = document.getElementById('hud-history');
const hudFps = document.getElementById('hud-fps');

// --- Animation Loop ---
function animate(timestamp) {
  requestAnimationFrame(animate);

  const delta = timestamp - lastTimestamp;
  lastTimestamp = timestamp;

  // FPS calculation
  frameCount++;
  fpsTime += delta;
  if (fpsTime >= 1000) {
    currentFPS = Math.round(frameCount * 1000 / fpsTime);
    frameCount = 0;
    fpsTime = 0;
  }

  // Update elapsed time
  if (playing) {
    elapsedTime += delta;
  }

  // Update bar heights
  for (let i = 0; i < BAR_COUNT; i++) {
    if (playing) {
      const amplitude = 0.5 + 0.5 * Math.sin(elapsedTime * 0.002 * (i + 1) + i * 0.3);
      const height = amplitude * 5;
      const safeHeight = Math.max(0.01, isFinite(height) ? height : 0.1);
      barHeights[i] = safeHeight;
    }
    bars[i].scale.y = barHeights[i];

    // Update emissive intensity based on height
    const intensity = barHeights[i] / 5;
    const t = i / BAR_COUNT;
    switch (currentColorScheme) {
      case 'rainbow':
        barMaterials[i].emissive.setHSL(t, 0.8, 0.05 + intensity * 0.25);
        break;
      case 'thermal':
        barMaterials[i].emissive.setHSL(t * 0.12, 0.9, 0.05 + intensity * 0.2);
        break;
      case 'cool':
        barMaterials[i].emissive.setHSL(0.5 + t * 0.15, 0.8, 0.05 + intensity * 0.2);
        break;
    }
  }

  controls.update();

  // Update HUD
  hudMode.textContent = currentMode;
  hudColor.textContent = currentColorScheme;
  hudPlaying.textContent = playing ? '▶ Playing' : '⏸ Paused';
  hudBars.textContent = BAR_COUNT;
  hudHistory.textContent = `${historyIndex + 1}/${history.length}`;
  hudFps.textContent = currentFPS;

  // Update global state
  const state = window.__3D_STATE__;
  state.mode = currentMode;
  state.colorScheme = currentColorScheme;
  state.playing = playing;
  state.barCount = BAR_COUNT;
  state.historyIndex = historyIndex;
  state.historyLength = history.length;
  state.fps = currentFPS;
  state.modelLoaded = modelLoaded;
  state.barHeights = [...barHeights];
  state.cameraPosition = {
    x: roundTo2(camera.position.x),
    y: roundTo2(camera.position.y),
    z: roundTo2(camera.position.z)
  };
  state.undoCount = undoCount;
  state.redoCount = redoCount;
  state.modeChangeCount = modeChangeCount;
  state.elapsedTime = elapsedTime;

  renderer.render(scene, camera);
}

animate(performance.now());
</script>
</body>
</html>
