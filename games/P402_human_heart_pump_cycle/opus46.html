<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Heart Pump Cycle Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a2e; }
canvas { display: block; }

#phasePanel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 12px;
    padding: 15px 20px;
    color: #fff;
    min-width: 250px;
    backdrop-filter: blur(10px);
}
#phasePanel h2 { font-size: 14px; color: #8888ff; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 2px; }
#phasePanel .phase-name { font-size: 20px; font-weight: bold; color: #fff; }
#phasePanel .phase-number { font-size: 13px; color: #aaa; margin-top: 4px; }
#phasePanel .phase-desc { font-size: 12px; color: #88aaff; margin-top: 8px; line-height: 1.4; }

#pressurePanel {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 12px;
    padding: 15px 20px;
    color: #fff;
    min-width: 200px;
    backdrop-filter: blur(10px);
}
#pressurePanel h2 { font-size: 14px; color: #8888ff; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
.pressure-row { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; }
.pressure-label { font-size: 13px; color: #aaa; }
.pressure-value { font-size: 16px; font-weight: bold; }
.pressure-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 2px; }
.pressure-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

#infoPanel {
    position: absolute;
    right: 20px;
    top: 220px;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 12px;
    padding: 15px 20px;
    color: #fff;
    min-width: 220px;
    max-width: 250px;
    backdrop-filter: blur(10px);
    display: none;
}
#infoPanel h2 { font-size: 14px; color: #8888ff; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 2px; }
#infoPanel .info-content { font-size: 13px; line-height: 1.6; color: #ccc; }

#controlBar {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 46, 0.9);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 25px;
    padding: 12px 25px;
    display: flex;
    align-items: center;
    gap: 15px;
    backdrop-filter: blur(10px);
}
.ctrl-btn {
    background: rgba(100, 100, 255, 0.2);
    border: 1px solid rgba(100, 100, 255, 0.4);
    color: #fff;
    padding: 8px 18px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.3s;
}
.ctrl-btn:hover { background: rgba(100, 100, 255, 0.4); }
.ctrl-btn:active { transform: scale(0.95); }
.ctrl-btn.playing { background: rgba(255, 100, 100, 0.3); border-color: rgba(255, 100, 100, 0.5); }

.speed-control { display: flex; align-items: center; gap: 8px; color: #aaa; font-size: 12px; }
#speedSlider { width: 80px; accent-color: #6666ff; }

#cycleCounter {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 12px;
    padding: 10px 15px;
    color: #fff;
    font-size: 13px;
    backdrop-filter: blur(10px);
}
#cycleCounter span { color: #8888ff; font-weight: bold; font-size: 18px; }

.valve-legend {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    font-size: 11px;
    color: #aaa;
}
.valve-legend div { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

#keyHints {
    position: absolute;
    bottom: 80px;
    right: 20px;
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    line-height: 1.8;
    text-align: right;
}
#keyHints kbd {
    background: rgba(255,255,255,0.1);
    padding: 1px 6px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>
<body>

<div id="phasePanel">
    <h2>Heart Cycle Phase</h2>
    <div class="phase-name" id="phaseName">Atrial Diastole</div>
    <div class="phase-number" id="phaseNumber">Phase 1 of 4</div>
    <div class="phase-desc" id="phaseDesc">Both atria fill with blood from veins.</div>
</div>

<div id="pressurePanel">
    <h2>Chamber Pressures</h2>
    <div id="pressureRows"></div>
    <div style="margin-top:10px; font-size:11px; color:#666;">
        <div style="display:flex; gap:8px; margin-top:4px;">
            <span>Valve States:</span>
        </div>
        <div id="valveStatesDisplay" style="margin-top:4px; font-size:11px; color:#aaa;"></div>
    </div>
</div>

<div id="infoPanel">
    <h2>Chamber Info</h2>
    <div class="info-content" id="infoContent"></div>
</div>

<div id="controlBar">
    <button class="ctrl-btn" id="prevPhaseBtn">⏮ Prev</button>
    <button class="ctrl-btn" id="playPauseBtn">▶ Play</button>
    <button class="ctrl-btn" id="nextPhaseBtn">Next ⏭</button>
    <div class="speed-control">
        <span>Speed:</span>
        <input type="range" id="speedSlider" min="0.5" max="3.0" step="0.1" value="1.0">
        <span id="speedValue">1.0x</span>
    </div>
</div>

<div id="cycleCounter">
    Cycles: <span id="cycleCount">0</span>
</div>

<div id="keyHints">
    <kbd>H</kbd> Toggle transparency<br>
    <kbd>L</kbd> Toggle labels<br>
    <kbd>F</kbd> Toggle fish<br>
    <kbd>1-4</kbd> Jump to phase
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// State Management
window.__3D_STATE__ = {
    currentPhase: 0,
    isPlaying: false,
    cycleCount: 0,
    speed: 1.0,
    heartTransparent: true,
    labelsVisible: true,
    fishVisible: true,
    selectedChamber: null,
    pressures: { RA: 4, RV: 4, LA: 8, LV: 8 },
    valveStates: { tricuspid: 'open', pulmonary: 'closed', mitral: 'open', aortic: 'closed' },
    chamberScales: { RA: 1.0, RV: 1.0, LA: 1.0, LV: 1.0 },
    bloodParticleCount: 200,
    fishModelLoaded: false,
    phaseElapsedTime: 0,
    totalElapsedTime: 0
};

const state = window.__3D_STATE__;

// Phase definitions
const phaseData = [
    {
        name: 'Atrial Diastole',
        desc: 'Both atria fill with blood. Tricuspid and Mitral valves open to allow passive filling.',
        pressures: { RA: 4, RV: 4, LA: 8, LV: 8 },
        valves: { tricuspid: 'open', pulmonary: 'closed', mitral: 'open', aortic: 'closed' },
        chamberScales: { RA: 1.3, RV: 1.0, LA: 1.3, LV: 1.0 }
    },
    {
        name: 'Atrial Systole',
        desc: 'Atria contract, pushing remaining blood into ventricles. AV valves remain open.',
        pressures: { RA: 6, RV: 8, LA: 12, LV: 12 },
        valves: { tricuspid: 'open', pulmonary: 'closed', mitral: 'open', aortic: 'closed' },
        chamberScales: { RA: 0.8, RV: 1.3, LA: 0.8, LV: 1.3 }
    },
    {
        name: 'Isovolumetric Contraction',
        desc: 'All valves closed. Ventricles contract, building pressure without volume change.',
        pressures: { RA: 2, RV: 20, LA: 4, LV: 80 },
        valves: { tricuspid: 'closed', pulmonary: 'closed', mitral: 'closed', aortic: 'closed' },
        chamberScales: { RA: 1.0, RV: 1.1, LA: 1.0, LV: 1.1 }
    },
    {
        name: 'Ventricular Ejection',
        desc: 'Semilunar valves open. Blood ejected into pulmonary artery and aorta.',
        pressures: { RA: 2, RV: 25, LA: 4, LV: 120 },
        valves: { tricuspid: 'closed', pulmonary: 'open', mitral: 'closed', aortic: 'open' },
        chamberScales: { RA: 1.0, RV: 0.7, LA: 1.0, LV: 0.7 }
    }
];

const chamberInfo = {
    RA: {
        name: 'Right Atrium',
        desc: 'Receives deoxygenated blood from the body via the superior and inferior vena cava. Blood flows passively into the right ventricle through the tricuspid valve.',
        color: '#4444AA'
    },
    RV: {
        name: 'Right Ventricle',
        desc: 'Pumps deoxygenated blood to the lungs through the pulmonary artery via the pulmonary valve. Has thinner walls than the left ventricle.',
        color: '#3333AA'
    },
    LA: {
        name: 'Left Atrium',
        desc: 'Receives oxygenated blood from the lungs via the pulmonary veins. Blood flows into the left ventricle through the mitral (bicuspid) valve.',
        color: '#AA4444'
    },
    LV: {
        name: 'Left Ventricle',
        desc: 'The strongest chamber. Pumps oxygenated blood to the entire body through the aorta via the aortic valve. Has the thickest walls.',
        color: '#AA3333'
    }
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);
scene.fog = new THREE.FogExp2(0x0a0a2e, 0.03);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

const pointLight = new THREE.PointLight(0x4444ff, 0.3, 20);
pointLight.position.set(-3, 3, 3);
scene.add(pointLight);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxDistance = 20;
controls.minDistance = 3;

// Heart group
const heartGroup = new THREE.Group();
scene.add(heartGroup);

// Outer heart shell
const heartGeo = new THREE.SphereGeometry(1.5, 32, 32);
const heartMat = new THREE.MeshPhongMaterial({
    color: 0x8B0000,
    transparent: true,
    opacity: 0.7,
    side: THREE.DoubleSide,
    shininess: 30,
    specular: 0x331111
});
const heartMesh = new THREE.Mesh(heartGeo, heartMat);
heartMesh.scale.set(1.1, 1.3, 1.0);
heartGroup.add(heartMesh);

// Heart bottom point
const coneGeo = new THREE.ConeGeometry(0.8, 1.0, 32);
const coneMat = new THREE.MeshPhongMaterial({
    color: 0x8B0000,
    transparent: true,
    opacity: 0.7,
    side: THREE.DoubleSide,
    shininess: 30
});
const coneMesh = new THREE.Mesh(coneGeo, coneMat);
coneMesh.position.set(0, -1.5, 0);
heartGroup.add(coneMesh);

// Septum (dividing wall)
const septumGeo = new THREE.PlaneGeometry(0.05, 1.8, 1, 1);
const septumMat = new THREE.MeshPhongMaterial({
    color: 0x660000,
    transparent: true,
    opacity: 0.5,
    side: THREE.DoubleSide
});
const septum = new THREE.Mesh(septumGeo, septumMat);
septum.position.set(0, 0, 0);
heartGroup.add(septum);

// Chambers
const chambers = {};
const chamberMeshes = {};

function createChamber(name, pos, radius, color) {
    const geo = new THREE.SphereGeometry(radius, 24, 24);
    const mat = new THREE.MeshPhongMaterial({
        color: color,
        transparent: true,
        opacity: 0.85,
        shininess: 50,
        emissive: 0x000000,
        emissiveIntensity: 0
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(pos.x, pos.y, pos.z);
    mesh.userData = { name: name, baseScale: 1.0 };
    heartGroup.add(mesh);
    chambers[name] = mesh;
    chamberMeshes[name] = mesh;
    return mesh;
}

createChamber('RA', { x: 0.5, y: 0.5, z: 0 }, 0.35, 0x4444AA);
createChamber('RV', { x: 0.5, y: -0.4, z: 0 }, 0.4, 0x3333AA);
createChamber('LA', { x: -0.5, y: 0.5, z: 0 }, 0.35, 0xAA4444);
createChamber('LV', { x: -0.5, y: -0.4, z: 0 }, 0.45, 0xAA3333);

// Valves
const valves = {};

function createValve(name, pos, rotation) {
    const geo = new THREE.TorusGeometry(0.15, 0.03, 8, 16);
    const mat = new THREE.MeshPhongMaterial({
        color: 0x00ff00,
        emissive: 0x004400,
        emissiveIntensity: 0.5,
        shininess: 80
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(pos.x, pos.y, pos.z);
    if (rotation) {
        mesh.rotation.set(rotation.x || 0, rotation.y || 0, rotation.z || 0);
    } else {
        mesh.rotation.x = Math.PI / 2;
    }
    mesh.userData = { name: name };
    heartGroup.add(mesh);
    valves[name] = mesh;
    return mesh;
}

createValve('tricuspid', { x: 0.5, y: 0.05, z: 0 }, { x: Math.PI / 2 });
createValve('pulmonary', { x: 0.8, y: -0.7, z: 0 }, { x: 0, y: 0, z: Math.PI / 4 });
createValve('mitral', { x: -0.5, y: 0.05, z: 0 }, { x: Math.PI / 2 });
createValve('aortic', { x: -0.8, y: -0.7, z: 0 }, { x: 0, y: 0, z: -Math.PI / 4 });

// Blood vessels
function createVessel(startPos, endPos, color, radius) {
    const dir = new THREE.Vector3().subVectors(
        new THREE.Vector3(endPos.x, endPos.y, endPos.z),
        new THREE.Vector3(startPos.x, startPos.y, startPos.z)
    );
    const length = dir.length();
    const geo = new THREE.CylinderGeometry(radius, radius, length, 8);
    const mat = new THREE.MeshPhongMaterial({
        color: color,
        transparent: true,
        opacity: 0.6,
        shininess: 30
    });
    const mesh = new THREE.Mesh(geo, mat);
    const midPoint = new THREE.Vector3(
        (startPos.x + endPos.x) / 2,
        (startPos.y + endPos.y) / 2,
        (startPos.z + endPos.z) / 2
    );
    mesh.position.copy(midPoint);
    mesh.lookAt(new THREE.Vector3(endPos.x, endPos.y, endPos.z));
    mesh.rotateX(Math.PI / 2);
    heartGroup.add(mesh);
    return mesh;
}

// Superior Vena Cava (to RA)
createVessel({ x: 0.5, y: 1.5, z: 0 }, { x: 0.5, y: 0.9, z: 0 }, 0x4444AA, 0.12);
// Inferior Vena Cava (to RA)
createVessel({ x: 0.7, y: -1.8, z: 0 }, { x: 0.5, y: -0.8, z: 0 }, 0x4444AA, 0.12);
// Pulmonary Artery (from RV)
createVessel({ x: 0.8, y: -0.7, z: 0 }, { x: 1.2, y: -1.5, z: 0.3 }, 0x3333CC, 0.1);
// Pulmonary Veins (to LA)
createVessel({ x: -0.5, y: 1.5, z: 0 }, { x: -0.5, y: 0.9, z: 0 }, 0xAA4444, 0.1);
// Aorta (from LV)
createVessel({ x: -0.8, y: -0.7, z: 0 }, { x: -1.3, y: -1.6, z: 0.3 }, 0xCC3333, 0.13);

// Aortic arch
const archCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(-0.8, -0.7, 0),
    new THREE.Vector3(-1.0, 0.5, 0),
    new THREE.Vector3(-0.5, 1.5, 0),
    new THREE.Vector3(0.0, 1.8, 0),
    new THREE.Vector3(0.3, 1.5, 0)
]);
const archGeo = new THREE.TubeGeometry(archCurve, 20, 0.08, 8, false);
const archMat = new THREE.MeshPhongMaterial({ color: 0xCC3333, transparent: true, opacity: 0.5 });
const archMesh = new THREE.Mesh(archGeo, archMat);
heartGroup.add(archMesh);

// Labels
const labelSprites = [];

function createLabel(text, position, color) {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(0,0,0,0)';
    ctx.fillRect(0, 0, 256, 64);
    ctx.font = 'bold 24px Arial';
    ctx.fillStyle = color || '#ffffff';
    ctx.textAlign = 'center';
    ctx.fillText(text, 128, 40);

    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.set(position.x, position.y, position.z);
    sprite.scale.set(1.2, 0.3, 1);
    heartGroup.add(sprite);
    labelSprites.push(sprite);
    return sprite;
}

createLabel('Right Atrium', { x: 0.5, y: 0.95, z: 0.3 }, '#6666CC');
createLabel('Right Ventricle', { x: 0.5, y: -0.85, z: 0.3 }, '#5555CC');
createLabel('Left Atrium', { x: -0.5, y: 0.95, z: 0.3 }, '#CC6666');
createLabel('Left Ventricle', { x: -0.5, y: -0.95, z: 0.3 }, '#CC5555');
createLabel('Tricuspid', { x: 0.5, y: 0.05, z: 0.35 }, '#88ff88');
createLabel('Pulmonary', { x: 1.1, y: -0.7, z: 0.3 }, '#88ff88');
createLabel('Mitral', { x: -0.5, y: 0.05, z: 0.35 }, '#88ff88');
createLabel('Aortic', { x: -1.1, y: -0.7, z: 0.3 }, '#88ff88');

// Blood particles
const bloodParticles = [];
const PARTICLE_COUNT = 200;

function createBloodParticle(isOxygenated) {
    const geo = new THREE.SphereGeometry(0.03, 6, 6);
    const mat = new THREE.MeshPhongMaterial({
        color: isOxygenated ? 0xFF2222 : 0x4444FF,
        emissive: isOxygenated ? 0x440000 : 0x000044,
        emissiveIntensity: 0.5
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData = {
        isOxygenated: isOxygenated,
        pathProgress: Math.random(),
        speed: 0.3 + Math.random() * 0.4,
        pathType: Math.floor(Math.random() * 4),
        offset: new THREE.Vector3(
            (Math.random() - 0.5) * 0.15,
            (Math.random() - 0.5) * 0.15,
            (Math.random() - 0.5) * 0.15
        )
    };
    heartGroup.add(mesh);
    bloodParticles.push(mesh);
    return mesh;
}

// Create particles - half oxygenated, half deoxygenated
for (let i = 0; i < PARTICLE_COUNT; i++) {
    createBloodParticle(i >= PARTICLE_COUNT / 2);
}

// Blood flow paths
function getParticlePosition(particle, phase, phaseProgress) {
    const p = particle.userData;
    const t = (p.pathProgress + phaseProgress * p.speed * 0.5) % 1.0;
    let pos = new THREE.Vector3();

    if (!p.isOxygenated) {
        // Deoxygenated blood path: Vena Cava -> RA -> RV -> Pulmonary
        if (phase === 0) {
            // Flowing into RA
            pos.lerpVectors(
                new THREE.Vector3(0.5, 1.5, 0),
                new THREE.Vector3(0.5, 0.5, 0),
                t
            );
        } else if (phase === 1) {
            // RA to RV
            pos.lerpVectors(
                new THREE.Vector3(0.5, 0.5, 0),
                new THREE.Vector3(0.5, -0.4, 0),
                t
            );
        } else if (phase === 2) {
            // Sitting in RV
            pos.set(0.5, -0.4, 0);
            pos.add(new THREE.Vector3(
                Math.sin(t * Math.PI * 2) * 0.1,
                Math.cos(t * Math.PI * 2) * 0.1,
                Math.sin(t * Math.PI * 3) * 0.05
            ));
        } else {
            // Ejecting through pulmonary
            pos.lerpVectors(
                new THREE.Vector3(0.5, -0.4, 0),
                new THREE.Vector3(1.2, -1.5, 0.3),
                t
            );
        }
    } else {
        // Oxygenated blood path: Pulmonary Veins -> LA -> LV -> Aorta
        if (phase === 0) {
            // Flowing into LA
            pos.lerpVectors(
                new THREE.Vector3(-0.5, 1.5, 0),
                new THREE.Vector3(-0.5, 0.5, 0),
                t
            );
        } else if (phase === 1) {
            // LA to LV
            pos.lerpVectors(
                new THREE.Vector3(-0.5, 0.5, 0),
                new THREE.Vector3(-0.5, -0.4, 0),
                t
            );
        } else if (phase === 2) {
            // Sitting in LV
            pos.set(-0.5, -0.4, 0);
            pos.add(new THREE.Vector3(
                Math.sin(t * Math.PI * 2) * 0.1,
                Math.cos(t * Math.PI * 2) * 0.1,
                Math.sin(t * Math.PI * 3) * 0.05
            ));
        } else {
            // Ejecting through aorta
            pos.lerpVectors(
                new THREE.Vector3(-0.5, -0.4, 0),
                new THREE.Vector3(-1.3, -1.6, 0.3),
                t
            );
        }
    }

    pos.add(p.offset);
    return pos;
}

// Fish model placeholder (since we can't load the actual file)
const fishGroup = new THREE.Group();
fishGroup.position.set(4, -1, 0);
fishGroup.scale.set(3, 3, 3);

// Create a simple fish shape
const fishBodyGeo = new THREE.SphereGeometry(0.3, 16, 12);
fishBodyGeo.scale(1.5, 0.6, 0.4);
const fishMat = new THREE.MeshPhongMaterial({ color: 0x88aacc, shininess: 60 });
const fishBody = new THREE.Mesh(fishBodyGeo, fishMat);
fishGroup.add(fishBody);

// Fish tail
const tailGeo = new THREE.ConeGeometry(0.2, 0.4, 4);
const tailMesh = new THREE.Mesh(tailGeo, fishMat);
tailMesh.position.set(-0.45, 0, 0);
tailMesh.rotation.z = Math.PI / 2;
fishGroup.add(tailMesh);

// Fish eye
const eyeGeo = new THREE.SphereGeometry(0.04, 8, 8);
const eyeMat = new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0x444444 });
const eye = new THREE.Mesh(eyeGeo, eyeMat);
eye.position.set(0.3, 0.08, 0.15);
fishGroup.add(eye);

// Fish fins
const finGeo = new THREE.PlaneGeometry(0.2, 0.1);
const finMat = new THREE.MeshPhongMaterial({ color: 0x6688aa, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
const topFin = new THREE.Mesh(finGeo, finMat);
topFin.position.set(0, 0.2, 0);
topFin.rotation.x = Math.PI / 6;
fishGroup.add(topFin);

// Fish heart indicator (2 chambers)
const fishHeartGeo = new THREE.SphereGeometry(0.06, 8, 8);
const fishHeartMat = new THREE.MeshPhongMaterial({ color: 0xff4444, emissive: 0x440000 });
const fishHeart = new THREE.Mesh(fishHeartGeo, fishHeartMat);
fishHeart.position.set(0.15, -0.1, 0.15);
fishGroup.add(fishHeart);

scene.add(fishGroup);

// Fish label
const fishLabel = createFishLabel('Fish Heart: 2 Chambers', { x: 4, y: 0.5, z: 0 });

function createFishLabel(text, position) {
    const canvas = document.createElement('canvas');
    canvas.width = 512;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.font = 'bold 28px Arial';
    ctx.fillStyle = '#88ccff';
    ctx.textAlign = 'center';
    ctx.fillText(text, 256, 40);

    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.set(position.x, position.y, position.z);
    sprite.scale.set(2.5, 0.3, 1);
    scene.add(sprite);
    return sprite;
}

// Try to load the actual fish model
const gltfLoader = new THREE.GLTFLoader();
try {
    gltfLoader.load('._BarramundiFish.glb', function(gltf) {
        const fishModel = gltf.scene;
        fishModel.scale.set(3, 3, 3);
        fishModel.position.set(4, -1, 0);
        scene.remove(fishGroup);
        scene.add(fishModel);
        fishGroup.copy(fishModel);
        state.fishModelLoaded = true;
    }, undefined, function(error) {
        console.log('Fish model not found, using placeholder');
        state.fishModelLoaded = false;
    });
} catch(e) {
    state.fishModelLoaded = false;
}

// Grid helper
const gridHelper = new THREE.GridHelper(20, 20, 0x111133, 0x111133);
gridHelper.position.y = -3;
scene.add(gridHelper);

// Background particles (ambient)
const bgParticles = [];
for (let i = 0; i < 50; i++) {
    const geo = new THREE.SphereGeometry(0.02, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color: 0x333366, transparent: true, opacity: 0.3 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(
        (Math.random() - 0.5) * 15,
        (Math.random() - 0.5) * 10,
        (Math.random() - 0.5) * 10
    );
    mesh.userData.speed = Math.random() * 0.5 + 0.1;
    scene.add(mesh);
    bgParticles.push(mesh);
}

// Raycaster for clicking
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// UI Setup
function initPressurePanel() {
    const container = document.getElementById('pressureRows');
    const chamberNames = { RA: 'Right Atrium', RV: 'Right Ventricle', LA: 'Left Atrium', LV: 'Left Ventricle' };
    const maxPressures = { RA: 10, RV: 30, LA: 15, LV: 130 };
    const colors = { RA: '#4444AA', RV: '#3333AA', LA: '#AA4444', LV: '#AA3333' };

    for (const key of ['RA', 'RV', 'LA', 'LV']) {
        const row = document.createElement('div');
        row.style.marginBottom = '8px';
        row.innerHTML = `
            <div class="pressure-row">
                <span class="pressure-label">${key}</span>
                <span class="pressure-value" id="pressure-${key}" style="color:${colors[key]}">${state.pressures[key]} mmHg</span>
            </div>
            <div class="pressure-bar">
                <div class="pressure-bar-fill" id="pressure-bar-${key}" style="width:${(state.pressures[key]/maxPressures[key])*100}%; background:${colors[key]}"></div>
            </div>
        `;
        container.appendChild(row);
    }
}
initPressurePanel();

function updateUI() {
    const pd = phaseData[state.currentPhase];

    // Phase panel
    document.getElementById('phaseName').textContent = pd.name;
    document.getElementById('phaseNumber').textContent = `Phase ${state.currentPhase + 1} of 4`;
    document.getElementById('phaseDesc').textContent = pd.desc;

    // Pressure panel
    const maxPressures = { RA: 10, RV: 30, LA: 15, LV: 130 };
    for (const key of ['RA', 'RV', 'LA', 'LV']) {
        const el = document.getElementById(`pressure-${key}`);
        const bar = document.getElementById(`pressure-bar-${key}`);
        if (el) el.textContent = `${Math.round(state.pressures[key])} mmHg`;
        if (bar) bar.style.width = `${(state.pressures[key] / maxPressures[key]) * 100}%`;
    }

    // Valve states display
    const valveDisplay = document.getElementById('valveStatesDisplay');
    if (valveDisplay) {
        let html = '';
        for (const [name, st] of Object.entries(state.valveStates)) {
            const color = st === 'open' ? '#44ff44' : '#ff4444';
            const icon = st === 'open' ? '●' : '○';
            html += `<span style="color:${color}; margin-right:8px;">${icon} ${name}</span>`;
        }
        valveDisplay.innerHTML = html;
    }

    // Cycle counter
    document.getElementById('cycleCount').textContent = state.cycleCount;

    // Play/Pause button
    const ppBtn = document.getElementById('playPauseBtn');
    ppBtn.textContent = state.isPlaying ? '⏸ Pause' : '▶ Play';
    ppBtn.className = state.isPlaying ? 'ctrl-btn playing' : 'ctrl-btn';

    // Speed
    document.getElementById('speedValue').textContent = state.speed.toFixed(1) + 'x';
}

function updateInfoPanel() {
    const panel = document.getElementById('infoPanel');
    const content = document.getElementById('infoContent');

    if (state.selectedChamber && chamberInfo[state.selectedChamber]) {
        const info = chamberInfo[state.selectedChamber];
        panel.style.display = 'block';
        content.innerHTML = `
            <div style="font-size:16px; font-weight:bold; color:${info.color}; margin-bottom:8px;">${info.name}</div>
            <div style="margin-bottom:8px;">${info.desc}</div>
            <div style="color:#8888ff;">Current Pressure: <strong>${Math.round(state.pressures[state.selectedChamber])} mmHg</strong></div>
            <div style="color:#8888ff;">Scale: <strong>${state.chamberScales[state.selectedChamber].toFixed(2)}x</strong></div>
        `;
    } else {
        panel.style.display = 'none';
    }
}

// Phase transition
let phaseTimer = 0;
const PHASE_DURATION = 2.0; // seconds per phase at 1x speed

function setPhase(phaseIndex) {
    state.currentPhase = phaseIndex;
    state.phaseElapsedTime = 0;
    phaseTimer = 0;

    const pd = phaseData[phaseIndex];
    state.valveStates = { ...pd.valves };

    updateUI();
}

function advancePhase() {
    const nextPhase = (state.currentPhase + 1) % 4;
    if (nextPhase === 0 && state.currentPhase === 3) {
        state.cycleCount++;
    }
    setPhase(nextPhase);
}

function prevPhase() {
    const prev = (state.currentPhase - 1 + 4) % 4;
    setPhase(prev);
}

// Smooth interpolation helpers
function lerp(a, b, t) {
    const result = a + (b - a) * t;
    return isNaN(result) ? a : result;
}

function smoothstep(t) {
    t = Math.max(0, Math.min(1, t));
    return t * t * (3 - 2 * t);
}

// Animation
const clock = new THREE.Clock();
let startTime = Date.now();

function animate() {
    requestAnimationFrame(animate);

    const delta = Math.min(clock.getDelta(), 0.1); // cap delta
    const time = clock.getElapsedTime();

    state.totalElapsedTime = (Date.now() - startTime) / 1000;
    if (isNaN(state.totalElapsedTime)) state.totalElapsedTime = 0;

    // Phase timing
    if (state.isPlaying) {
        phaseTimer += delta * state.speed;
        state.phaseElapsedTime = phaseTimer;
        if (isNaN(state.phaseElapsedTime)) state.phaseElapsedTime = 0;

        if (phaseTimer >= PHASE_DURATION) {
            advancePhase();
        }
    }

    const phaseProgress = smoothstep(Math.min(phaseTimer / PHASE_DURATION, 1.0));
    const pd = phaseData[state.currentPhase];

    // Interpolate pressures
    for (const key of ['RA', 'RV', 'LA', 'LV']) {
        const target = pd.pressures[key];
        state.pressures[key] = lerp(state.pressures[key], target, delta * 3);
        if (isNaN(state.pressures[key])) state.pressures[key] = target;
    }

    // Interpolate chamber scales
    for (const key of ['RA', 'RV', 'LA', 'LV']) {
        const target = pd.chamberScales[key];
        state.chamberScales[key] = lerp(state.chamberScales[key], target, delta * 4);
        if (isNaN(state.chamberScales[key])) state.chamberScales[key] = target;

        if (chambers[key]) {
            const s = state.chamberScales[key];
            chambers[key].scale.set(s, s, s);
        }
    }

    // Update valve colors
    for (const [name, mesh] of Object.entries(valves)) {
        const isOpen = state.valveStates[name] === 'open';
        mesh.material.color.setHex(isOpen ? 0x00ff00 : 0xff0000);
        mesh.material.emissive.setHex(isOpen ? 0x004400 : 0x440000);

        // Animate valve scale
        const targetScale = isOpen ? 1.2 : 0.7;
        const currentScale = mesh.scale.x;
        const newScale = lerp(currentScale, targetScale, delta * 5);
        mesh.scale.set(newScale, newScale, newScale);
    }

    // Update blood particles
    for (const particle of bloodParticles) {
        const pos = getParticlePosition(particle, state.currentPhase, phaseProgress);
        particle.position.lerp(pos, delta * 3);

        // Add slight wobble
        particle.position.x += Math.sin(time * 3 + particle.userData.pathProgress * 10) * 0.002;
        particle.position.y += Math.cos(time * 2 + particle.userData.pathProgress * 8) * 0.002;
    }

    // Heart beat pulse
    const heartBeat = 1.0 + Math.sin(time * 2 * state.speed) * 0.02;
    heartGroup.scale.set(heartBeat, heartBeat, heartBeat);

    // Gentle heart rotation
    heartGroup.rotation.y = Math.sin(time * 0.3) * 0.1;

    // Fish bobbing animation
    if (state.fishVisible) {
        fishGroup.position.y = -1 + Math.sin(time * Math.PI * 0.5) * 0.2;
        fishGroup.visible = true;
        fishLabel.visible = true;

        // Fish heart beat
        if (fishHeart) {
            const fishBeat = 1.0 + Math.sin(time * 4) * 0.3;
            fishHeart.scale.set(fishBeat, fishBeat, fishBeat);
        }
    } else {
        fishGroup.visible = false;
        fishLabel.visible = false;
    }

    // Selected chamber glow
    for (const [key, mesh] of Object.entries(chambers)) {
        if (state.selectedChamber === key) {
            mesh.material.emissiveIntensity = 0.3 + Math.sin(time * 4) * 0.2;
            mesh.material.emissive.setHex(0xffffff);
        } else {
            mesh.material.emissiveIntensity = 0;
            mesh.material.emissive.setHex(0x000000);
        }
    }

    // Labels visibility
    for (const sprite of labelSprites) {
        sprite.visible = state.labelsVisible;
    }

    // Heart transparency
    heartMat.opacity = state.heartTransparent ? 0.25 : 0.85;
    coneMat.opacity = state.heartTransparent ? 0.25 : 0.85;

    // Background particles
    for (const p of bgParticles) {
        p.position.y += Math.sin(time * p.userData.speed) * 0.001;
        p.position.x += Math.cos(time * p.userData.speed * 0.5) * 0.001;
    }

    // Update UI periodically
    if (Math.floor(time * 10) % 3 === 0) {
        updateUI();
        updateInfoPanel();
    }

    // Ensure no NaN in state
    for (const key of ['RA', 'RV', 'LA', 'LV']) {
        if (isNaN(state.pressures[key])) state.pressures[key] = 0;
        if (isNaN(state.chamberScales[key])) state.chamberScales[key] = 1;
    }
    if (isNaN(state.phaseElapsedTime)) state.phaseElapsedTime = 0;
    if (isNaN(state.totalElapsedTime)) state.totalElapsedTime = 0;
    if (isNaN(state.speed)) state.speed = 1;
    if (isNaN(state.cycleCount)) state.cycleCount = 0;

    controls.update();
    renderer.render(scene, camera);
}

// Event Listeners
document.getElementById('playPauseBtn').addEventListener('click', () => {
    state.isPlaying = !state.isPlaying;
    if (state.isPlaying) {
        phaseTimer = state.phaseElapsedTime || 0;
    }
    updateUI();
});

document.getElementById('nextPhaseBtn').addEventListener('click', () => {
    if (!state.isPlaying) {
        advancePhase();
    }
});

document.getElementById('prevPhaseBtn').addEventListener('click', () => {
    if (!state.isPlaying) {
        prevPhase();
    }
});

document.getElementById('speedSlider').addEventListener('input', (e) => {
    state.speed = parseFloat(e.target.value) || 1.0;
    updateUI();
});

// Keyboard events
document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();

    if (key === 'h') {
        state.heartTransparent = !state.heartTransparent;
    } else if (key === 'l') {
        state.labelsVisible = !state.labelsVisible;
    } else if (key === 'f') {
        state.fishVisible = !state.fishVisible;
    } else if (key === '1' && !state.isPlaying) {
        setPhase(0);
    } else if (key === '2' && !state.isPlaying) {
        setPhase(1);
    } else if (key === '3' && !state.isPlaying) {
        setPhase(2);
    } else if (key === '4' && !state.isPlaying) {
        setPhase(3);
    }
});

// Mouse click for chamber selection
renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    const chamberArray = Object.values(chambers);
    const intersects = raycaster.intersectObjects(chamberArray);

    if (intersects.length > 0) {
        const clicked = intersects[0].object;
        const name = clicked.userData.name;
        if (state.selectedChamber === name) {
            state.selectedChamber = null;
        } else {
            state.selectedChamber = name;
        }
        updateInfoPanel();
    } else {
        state.selectedChamber = null;
        updateInfoPanel();
    }
});

// Window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize
setPhase(0);
updateUI();
animate();
</script>
</body>
</html>
