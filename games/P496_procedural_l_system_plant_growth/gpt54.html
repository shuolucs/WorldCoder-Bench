<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D L-System Plant in Helmet Planter</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(10, 10, 18, 0.72);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 260px;
      z-index: 10;
      backdrop-filter: blur(4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      font-size: 14px;
      line-height: 1.45;
    }

    #hud .title {
      font-weight: bold;
      margin-bottom: 8px;
      color: #cfd8ff;
      font-size: 15px;
    }

    #hud .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 3px 0;
    }

    #hud .label {
      opacity: 0.8;
    }

    #controls {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    button:hover {
      background: rgba(255,255,255,0.16);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    #hint {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 10;
      background: rgba(10, 10, 18, 0.55);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      opacity: 0.95;
    }

    code {
      background: rgba(255,255,255,0.08);
      padding: 1px 5px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div class="title">L-System Plant HUD</div>
      <div class="row"><span class="label">Generation</span><span id="hudGeneration">0</span></div>
      <div class="row"><span class="label">Branches</span><span id="hudBranches">0</span></div>
      <div class="row"><span class="label">Flowers/Buds</span><span id="hudFlowers">0</span></div>
      <div class="row"><span class="label">Theme</span><span id="hudTheme">forest</span></div>
      <div class="row"><span class="label">Wind</span><span id="hudWind">off (0.3)</span></div>
      <div class="row"><span class="label">Helmet</span><span id="hudHelmet">loading...</span></div>
    </div>

    <div id="hint">
      Keys: <code>G</code> Grow, <code>R</code> Reset, <code>C</code> Color, <code>W</code> Wind,
      <code>↑</code>/<code>↓</code> Strength
    </div>

    <div id="controls">
      <button id="growBtn">Grow (G)</button>
      <button id="resetBtn">Reset (R)</button>
      <button id="colorBtn">Cycle Color (C)</button>
      <button id="windBtn">Toggle Wind (W)</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.5, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 40;
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    scene.add(dirLight);

    const groundGeo = new THREE.PlaneGeometry(20, 20);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d4a2d });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    const themes = [
      { name: 'forest', branch: 0x2d8a4e, flower: 0xff6b9d },
      { name: 'autumn', branch: 0x8B4513, flower: 0xFF8C00 },
      { name: 'ice', branch: 0x4169E1, flower: 0x00CED1 },
      { name: 'neon', branch: 0x39FF14, flower: 0xFF1493 },
    ];

    const PLANT_BASE = new THREE.Vector3(0, 1.5, 0);
    const MAX_GENERATION = 4;
    const ANGLE = THREE.MathUtils.degToRad(25);

    const plantGroup = new THREE.Group();
    scene.add(plantGroup);

    const plantObjects = [];
    let generation = 0;
    let colorThemeIndex = 0;
    let windEnabled = false;
    let windStrength = 0.3;
    let helmetLoaded = false;
    let isGrowing = false;

    let branchCount = 0;
    let flowerCount = 0;

    let helmetRoot = null;

    const branchGeometry = new THREE.CylinderGeometry(1, 1, 1, 8);
    const flowerGeometry = new THREE.SphereGeometry(1, 12, 12);

    let branchMaterial = new THREE.MeshStandardMaterial({
      color: themes[colorThemeIndex].branch,
      roughness: 0.8,
      metalness: 0.1
    });

    let flowerMaterial = new THREE.MeshStandardMaterial({
      color: themes[colorThemeIndex].flower,
      emissive: themes[colorThemeIndex].flower,
      emissiveIntensity: 0.15,
      roughness: 0.5,
      metalness: 0.0
    });

    function applyTheme() {
      const theme = themes[colorThemeIndex];
      branchMaterial.color.setHex(theme.branch);
      flowerMaterial.color.setHex(theme.flower);
      flowerMaterial.emissive.setHex(theme.flower);

      for (const obj of plantObjects) {
        if (obj.userData.type === 'branch') obj.material = branchMaterial;
        if (obj.userData.type === 'flower') obj.material = flowerMaterial;
      }
    }

    function generateLSystem(iterations) {
      let current = 'F';
      const rule = { 'F': 'FF+[+F-F-F]-[-F+F+F]' };
      for (let i = 0; i < iterations; i++) {
        let next = '';
        for (const ch of current) {
          next += rule[ch] || ch;
        }
        current = next;
      }
      return current;
    }

    function clearPlant() {
      while (plantGroup.children.length > 0) {
        const child = plantGroup.children.pop();
        if (child) plantGroup.remove(child);
      }
      plantObjects.length = 0;
      branchCount = 0;
      flowerCount = 0;
    }

    function createBranchSegment(start, end, radius, depthIndex) {
      const dir = new THREE.Vector3().subVectors(end, start);
      const length = dir.length();
      const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);

      const mesh = new THREE.Mesh(branchGeometry, branchMaterial);
      mesh.castShadow = true;
      mesh.receiveShadow = true;

      mesh.position.copy(midpoint);
      mesh.scale.set(radius, length, radius);

      const up = new THREE.Vector3(0, 1, 0);
      mesh.quaternion.setFromUnitVectors(up, dir.clone().normalize());

      mesh.userData.type = 'branch';
      mesh.userData.depth = depthIndex;
      mesh.userData.baseQuaternion = mesh.quaternion.clone();
      mesh.userData.appear = 0;
      mesh.userData.birthTime = performance.now() / 1000;
      mesh.userData.basePosition = mesh.position.clone();

      plantGroup.add(mesh);
      plantObjects.push(mesh);
      branchCount++;
    }

    function createFlower(pos, depthIndex) {
      const mesh = new THREE.Mesh(flowerGeometry, flowerMaterial);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.position.copy(pos);
      mesh.scale.setScalar(0.06);
      mesh.userData.type = 'flower';
      mesh.userData.depth = depthIndex;
      mesh.userData.appear = 0;
      mesh.userData.birthTime = performance.now() / 1000;
      mesh.userData.basePosition = mesh.position.clone();

      plantGroup.add(mesh);
      plantObjects.push(mesh);
      flowerCount++;
    }

    function buildPlant(gen, animate = true) {
      clearPlant();

      const system = generateLSystem(gen);
      const stack = [];

      let pos = PLANT_BASE.clone();
      let quat = new THREE.Quaternion();
      let branchDepth = 0;
      const stepLengthBase = 0.8 * Math.pow(0.75, gen);

      const terminalPositions = [];

      for (let i = 0; i < system.length; i++) {
        const ch = system[i];

        if (ch === 'F') {
          const radius = 0.08 * Math.pow(0.8, branchDepth);
          const dir = new THREE.Vector3(0, 1, 0).applyQuaternion(quat).normalize();
          const nextPos = pos.clone().add(dir.multiplyScalar(stepLengthBase));

          createBranchSegment(pos, nextPos, Math.max(radius, 0.01), branchDepth);
          pos = nextPos;

          const nextChar = system[i + 1];
          if (nextChar !== 'F' && nextChar !== '+' && nextChar !== '-') {
            terminalPositions.push({ pos: pos.clone(), depth: branchDepth });
          }
        } else if (ch === '+') {
          const rot = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), -ANGLE);
          quat.multiply(rot);
        } else if (ch === '-') {
          const rot = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), ANGLE);
          quat.multiply(rot);
        } else if (ch === '[') {
          stack.push({
            pos: pos.clone(),
            quat: quat.clone(),
            depth: branchDepth
          });
          branchDepth++;
        } else if (ch === ']') {
          const state = stack.pop();
          if (state) {
            pos = state.pos;
            quat = state.quat;
            branchDepth = state.depth;
          }
        }
      }

      for (const t of terminalPositions) {
        createFlower(t.pos, t.depth);
      }

      if (!animate) {
        for (const obj of plantObjects) {
          if (obj.userData.type === 'branch') {
            const radius = obj.scale.x;
            const len = obj.scale.y;
            obj.userData.targetScale = new THREE.Vector3(radius, len, radius);
            obj.scale.copy(obj.userData.targetScale);
          } else {
            obj.userData.targetScale = new THREE.Vector3(0.06, 0.06, 0.06);
            obj.scale.copy(obj.userData.targetScale);
          }
          obj.userData.appear = 1;
        }
        isGrowing = false;
      } else {
        for (const obj of plantObjects) {
          if (obj.userData.type === 'branch') {
            obj.userData.targetScale = obj.scale.clone();
            obj.scale.set(obj.userData.targetScale.x, 0.0001, obj.userData.targetScale.z);
          } else {
            obj.userData.targetScale = new THREE.Vector3(0.06, 0.06, 0.06);
            obj.scale.setScalar(0.0001);
          }
          obj.userData.appear = 0;
        }
        isGrowing = true;
      }

      applyTheme();
    }

    const loader = new GLTFLoader();
    loader.load(
      'https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
      (gltf) => {
        helmetRoot = gltf.scene;
        helmetRoot.scale.set(1.5, 1.5, 1.5);
        helmetRoot.position.set(0, 0.75, 0);

        helmetRoot.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });

        scene.add(helmetRoot);
        helmetLoaded = true;
      },
      undefined,
      (err) => {
        console.error('Helmet failed to load:', err);
        helmetLoaded = false;

        const fallback = new THREE.Mesh(
          new THREE.CylinderGeometry(1.2, 1.5, 1.2, 24, 1, true),
          new THREE.MeshStandardMaterial({
            color: 0x666666,
            roughness: 0.9,
            metalness: 0.3,
            side: THREE.DoubleSide
          })
        );
        fallback.position.set(0, 0.75, 0);
        fallback.castShadow = true;
        fallback.receiveShadow = true;
        scene.add(fallback);
      }
    );

    function growPlant() {
      if (isGrowing) return;
      if (generation < MAX_GENERATION) {
        generation++;
        buildPlant(generation, true);
      }
    }

    function resetPlant() {
      if (isGrowing) return;
      generation = 0;
      buildPlant(generation, true);
    }

    function cycleColor() {
      colorThemeIndex = (colorThemeIndex + 1) % themes.length;
      applyTheme();
    }

    function toggleWind() {
      windEnabled = !windEnabled;
    }

    document.getElementById('growBtn').addEventListener('click', growPlant);
    document.getElementById('resetBtn').addEventListener('click', resetPlant);
    document.getElementById('colorBtn').addEventListener('click', cycleColor);
    document.getElementById('windBtn').addEventListener('click', toggleWind);

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === 'g') growPlant();
      else if (key === 'r') resetPlant();
      else if (key === 'c') cycleColor();
      else if (key === 'w') toggleWind();
      else if (e.key === 'ArrowUp') {
        windStrength = Math.min(1.0, +(windStrength + 0.1).toFixed(1));
      } else if (e.key === 'ArrowDown') {
        windStrength = Math.max(0.0, +(windStrength - 0.1).toFixed(1));
      }
    });

    window.__3D_STATE__ = {
      helmetLoaded: false,
      generation: 0,
      maxGeneration: 4,
      branchCount: 0,
      flowerCount: 0,
      colorThemeIndex: 0,
      colorThemeName: 'forest',
      windEnabled: false,
      windStrength: 0.3,
      isGrowing: false,
      plantPosition: { x: PLANT_BASE.x, y: PLANT_BASE.y, z: PLANT_BASE.z },
      cameraDistance: camera.position.length(),
      branchColor: themes[0].branch,
      flowerColor: themes[0].flower
    };

    function updateHUD() {
      document.getElementById('hudGeneration').textContent = generation;
      document.getElementById('hudBranches').textContent = branchCount;
      document.getElementById('hudFlowers').textContent = flowerCount;
      document.getElementById('hudTheme').textContent = themes[colorThemeIndex].name;
      document.getElementById('hudWind').textContent = `${windEnabled ? 'on' : 'off'} (${windStrength.toFixed(1)})`;
      document.getElementById('hudHelmet').textContent = helmetLoaded ? 'loaded' : 'loading...';
    }

    function updateState() {
      window.__3D_STATE__.helmetLoaded = helmetLoaded;
      window.__3D_STATE__.generation = generation;
      window.__3D_STATE__.maxGeneration = MAX_GENERATION;
      window.__3D_STATE__.branchCount = branchCount;
      window.__3D_STATE__.flowerCount = flowerCount;
      window.__3D_STATE__.colorThemeIndex = colorThemeIndex;
      window.__3D_STATE__.colorThemeName = themes[colorThemeIndex].name;
      window.__3D_STATE__.windEnabled = windEnabled;
      window.__3D_STATE__.windStrength = windStrength;
      window.__3D_STATE__.isGrowing = isGrowing;
      window.__3D_STATE__.plantPosition = { x: PLANT_BASE.x, y: PLANT_BASE.y, z: PLANT_BASE.z };
      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
      window.__3D_STATE__.branchColor = themes[colorThemeIndex].branch;
      window.__3D_STATE__.flowerColor = themes[colorThemeIndex].flower;
    }

    buildPlant(0, false);

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();
      const now = performance.now() / 1000;

      controls.update();

      let allDone = true;

      for (const obj of plantObjects) {
        if (obj.userData.appear < 1) {
          const t = Math.min(1, (now - obj.userData.birthTime) / 2.0);
          obj.userData.appear = t;
          const eased = t * t * (3 - 2 * t);

          if (obj.userData.type === 'branch') {
            const target = obj.userData.targetScale;
            obj.scale.set(target.x, Math.max(0.0001, target.y * eased), target.z);
          } else if (obj.userData.type === 'flower') {
            const target = obj.userData.targetScale;
            obj.scale.set(
              target.x * eased,
              target.y * eased,
              target.z * eased
            );
          }

          if (t < 1) allDone = false;
        }

        if (windEnabled && obj.userData.type === 'branch') {
          const depthFactor = 1 + obj.userData.depth * 0.12;
          const sway = Math.sin(elapsed * (1.5 + obj.userData.depth * 0.15) + obj.position.y * 0.8) *
            0.05 * windStrength * depthFactor;
          const windQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), sway);
          obj.quaternion.copy(obj.userData.baseQuaternion).multiply(windQuat);
        } else if (obj.userData.type === 'branch') {
          obj.quaternion.copy(obj.userData.baseQuaternion);
        }

        if (windEnabled && obj.userData.type === 'flower') {
          obj.position.x = obj.userData.basePosition.x + Math.sin(elapsed * 1.8 + obj.userData.depth) * 0.03 * windStrength;
          obj.position.z = obj.userData.basePosition.z + Math.cos(elapsed * 1.5 + obj.userData.depth) * 0.02 * windStrength;
        } else if (obj.userData.type === 'flower') {
          obj.position.copy(obj.userData.basePosition);
        }
      }

      if (isGrowing && allDone) {
        isGrowing = false;
      }

      updateHUD();
      updateState();

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
