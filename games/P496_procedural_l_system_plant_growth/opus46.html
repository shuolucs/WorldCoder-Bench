<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L-System Plant Growth Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.7);
    color: #e0e0e0;
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    min-width: 240px;
    z-index: 10;
  }

  #hud h3 {
    color: #4ecdc4;
    margin-bottom: 8px;
    font-size: 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    padding-bottom: 6px;
  }

  #hud .label {
    color: #888;
    font-size: 12px;
  }

  #hud .value {
    color: #fff;
    font-weight: bold;
  }

  #hud .status-on { color: #4ecdc4; }
  #hud .status-off { color: #ff6b6b; }

  #buttons {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
  }

  #buttons button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.15);
  }

  #buttons button:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
  }

  #btn-grow {
    background: rgba(45, 138, 78, 0.8);
    color: white;
  }

  #btn-reset {
    background: rgba(255, 107, 107, 0.8);
    color: white;
  }

  #btn-color {
    background: rgba(78, 205, 196, 0.8);
    color: white;
  }

  #btn-wind {
    background: rgba(65, 105, 225, 0.8);
    color: white;
  }

  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #4ecdc4;
    font-size: 18px;
    font-family: 'Segoe UI', sans-serif;
    z-index: 20;
  }
</style>
</head>
<body>

<div id="hud">
  <h3>🌿 L-System Plant</h3>
  <div><span class="label">Generation:</span> <span class="value" id="hud-gen">0</span> <span class="label">/ 4</span></div>
  <div><span class="label">Branches:</span> <span class="value" id="hud-branches">0</span></div>
  <div><span class="label">Flowers:</span> <span class="value" id="hud-flowers">0</span></div>
  <div><span class="label">Color Theme:</span> <span class="value" id="hud-theme">forest</span></div>
  <div><span class="label">Wind:</span> <span id="hud-wind" class="status-off">OFF</span> <span class="label">Strength:</span> <span class="value" id="hud-wind-str">0.3</span></div>
  <div><span class="label">Helmet:</span> <span id="hud-helmet" class="status-off">Loading...</span></div>
</div>

<div id="buttons">
  <button id="btn-grow">🌱 Grow (G)</button>
  <button id="btn-reset">🔄 Reset (R)</button>
  <button id="btn-color">🎨 Color (C)</button>
  <button id="btn-wind">💨 Wind (W)</button>
</div>

<div id="loading">Loading scene...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
const colorThemes = [
  { name: 'forest', branch: 0x2d8a4e, flower: 0xff6b9d },
  { name: 'autumn', branch: 0x8B4513, flower: 0xFF8C00 },
  { name: 'ice',    branch: 0x4169E1, flower: 0x00CED1 },
  { name: 'neon',   branch: 0x39FF14, flower: 0xFF1493 },
];

const state = {
  helmetLoaded: false,
  generation: 0,
  maxGeneration: 4,
  branchCount: 0,
  flowerCount: 0,
  colorThemeIndex: 0,
  colorThemeName: 'forest',
  windEnabled: false,
  windStrength: 0.3,
  isGrowing: false,
  plantPosition: { x: 0, y: 1.5, z: 0 },
  cameraDistance: 0,
  branchColor: 0x2d8a4e,
  flowerColor: 0xff6b9d,
};

window.__3D_STATE__ = state;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 2, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

// Subtle fill light
const fillLight = new THREE.DirectionalLight(0x4466aa, 0.3);
fillLight.position.set(-5, 3, -5);
scene.add(fillLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d4a2d, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// ============ LOAD HELMET ============
const loader = new GLTFLoader();
let helmetModel = null;

loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
  (gltf) => {
    helmetModel = gltf.scene;
    helmetModel.scale.set(1.5, 1.5, 1.5);
    helmetModel.position.set(0, 0.75, 0);
    helmetModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(helmetModel);
    state.helmetLoaded = true;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('hud-helmet').textContent = 'Loaded ✓';
    document.getElementById('hud-helmet').className = 'status-on';
  },
  (progress) => {
    const pct = progress.total ? Math.round(progress.loaded / progress.total * 100) : '...';
    document.getElementById('loading').textContent = `Loading helmet... ${pct}%`;
  },
  (error) => {
    console.warn('Could not load DamagedHelmet.glb:', error);
    // Create a fallback pot
    const potGeo = new THREE.CylinderGeometry(0.8, 1.0, 1.5, 16);
    const potMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8 });
    const pot = new THREE.Mesh(potGeo, potMat);
    pot.position.set(0, 0.75, 0);
    pot.castShadow = true;
    pot.receiveShadow = true;
    scene.add(pot);
    state.helmetLoaded = true;
    document.getElementById('loading').textContent = '';
    document.getElementById('hud-helmet').textContent = 'Fallback pot';
    document.getElementById('hud-helmet').className = 'status-on';
  }
);

// ============ L-SYSTEM ============
const lSystemRules = {
  axiom: 'F',
  rules: { 'F': 'FF+[+F-F-F]-[-F+F+F]' },
  angle: 25 * (Math.PI / 180),
};

function generateLString(axiom, rules, generations) {
  let current = axiom;
  for (let i = 0; i < generations; i++) {
    let next = '';
    for (const ch of current) {
      next += rules[ch] || ch;
    }
    current = next;
  }
  return current;
}

// Plant container
const plantGroup = new THREE.Group();
plantGroup.position.set(0, 1.5, 0);
scene.add(plantGroup);

// Shared geometries and materials
const branchGeometry = new THREE.CylinderGeometry(1, 1, 1, 6);
branchGeometry.translate(0, 0.5, 0); // pivot at bottom

const flowerGeometry = new THREE.SphereGeometry(1, 8, 6);

let branchMaterial = new THREE.MeshStandardMaterial({ color: colorThemes[0].branch, roughness: 0.6 });
let flowerMaterial = new THREE.MeshStandardMaterial({ color: colorThemes[0].flower, roughness: 0.4, emissive: colorThemes[0].flower, emissiveIntensity: 0.2 });

// Track all branches and flowers for wind animation
let allBranches = [];
let allFlowers = [];
let growAnimations = [];

function clearPlant() {
  while (plantGroup.children.length > 0) {
    const child = plantGroup.children[0];
    plantGroup.remove(child);
    // Dispose if needed
  }
  allBranches = [];
  allFlowers = [];
  growAnimations = [];
  state.branchCount = 0;
  state.flowerCount = 0;
}

function buildPlant(generation, animate = false) {
  clearPlant();

  if (generation === 0) {
    // Just show a small stem
    updateHUD();
    return;
  }

  const lString = generateLString(lSystemRules.axiom, lSystemRules.rules, generation);

  const baseLength = 0.8;
  const baseRadius = 0.08;
  const lengthDecay = 0.75;
  const radiusDecay = 0.80;

  // Turtle state
  const stack = [];
  let pos = new THREE.Vector3(0, 0, 0);
  let dir = new THREE.Vector3(0, 1, 0);
  let right = new THREE.Vector3(1, 0, 0);
  let depth = 0;

  const branchData = [];
  const flowerPositions = [];

  for (let i = 0; i < lString.length; i++) {
    const ch = lString[i];

    if (ch === 'F') {
      const len = baseLength * Math.pow(lengthDecay, depth);
      const rad = baseRadius * Math.pow(radiusDecay, depth);

      const startPos = pos.clone();
      const endPos = pos.clone().add(dir.clone().multiplyScalar(len));

      branchData.push({ start: startPos, end: endPos, radius: rad, length: len, depth: depth, direction: dir.clone() });

      pos = endPos;

      // Check if next meaningful char is ] or end — terminal branch
      let isTerminal = true;
      for (let j = i + 1; j < lString.length; j++) {
        if (lString[j] === 'F') { isTerminal = false; break; }
        if (lString[j] === ']') { break; }
        if (lString[j] === '[') { isTerminal = false; break; }
      }
      if (i === lString.length - 1) isTerminal = true;

    } else if (ch === '+') {
      // Turn right around a random-ish axis (use forward cross right for variation)
      const axis = new THREE.Vector3(0, 0, 1).applyAxisAngle(dir, Math.random() * 0.5);
      const angle = lSystemRules.angle + (Math.random() - 0.5) * 0.1;
      dir.applyAxisAngle(right.clone().cross(dir).normalize().length() > 0.01 ?
        new THREE.Vector3(0, 0, 1) : new THREE.Vector3(1, 0, 0), angle);
      // Simpler: rotate around Z-ish axis
      const rotAxis = new THREE.Vector3(
        Math.sin(depth * 1.3 + i * 0.1),
        0,
        Math.cos(depth * 1.3 + i * 0.1)
      ).normalize();
      dir.applyAxisAngle(rotAxis, lSystemRules.angle);

    } else if (ch === '-') {
      const rotAxis = new THREE.Vector3(
        Math.sin(depth * 1.3 + i * 0.1),
        0,
        Math.cos(depth * 1.3 + i * 0.1)
      ).normalize();
      dir.applyAxisAngle(rotAxis, -lSystemRules.angle);

    } else if (ch === '[') {
      stack.push({ pos: pos.clone(), dir: dir.clone(), right: right.clone(), depth: depth });
      depth++;

    } else if (ch === ']') {
      // Before popping, add flower at current position if this is a terminal
      flowerPositions.push(pos.clone());

      if (stack.length > 0) {
        const s = stack.pop();
        pos = s.pos;
        dir = s.dir;
        right = s.right;
        depth = s.depth;
      }
    }
  }

  // Create branch meshes
  const theme = colorThemes[state.colorThemeIndex];
  branchMaterial = new THREE.MeshStandardMaterial({ color: theme.branch, roughness: 0.6 });
  flowerMaterial = new THREE.MeshStandardMaterial({
    color: theme.flower, roughness: 0.4,
    emissive: theme.flower, emissiveIntensity: 0.15
  });

  for (const bd of branchData) {
    const mesh = new THREE.Mesh(branchGeometry, branchMaterial);

    // Position and orient
    mesh.position.copy(bd.start);

    // Scale: radius for x/z, length for y
    mesh.scale.set(bd.radius, bd.length, bd.radius);

    // Orient to direction
    const up = new THREE.Vector3(0, 1, 0);
    const quat = new THREE.Quaternion().setFromUnitVectors(up, bd.direction.clone().normalize());
    mesh.quaternion.copy(quat);

    mesh.castShadow = true;
    mesh.receiveShadow = true;

    // Store original rotation for wind
    mesh.userData.originalQuaternion = quat.clone();
    mesh.userData.depth = bd.depth;
    mesh.userData.windOffset = Math.random() * Math.PI * 2;

    if (animate) {
      const targetScale = mesh.scale.clone();
      mesh.scale.set(0, 0, 0);
      growAnimations.push({
        mesh: mesh,
        targetScale: targetScale,
        startTime: performance.now() + bd.depth * 200,
        duration: 2000,
      });
    }

    plantGroup.add(mesh);
    allBranches.push(mesh);
  }

  // Create flower meshes (only at terminal positions, deduplicate close ones)
  const usedPositions = new Set();
  for (const fp of flowerPositions) {
    const key = `${Math.round(fp.x*10)},${Math.round(fp.y*10)},${Math.round(fp.z*10)}`;
    if (usedPositions.has(key)) continue;
    usedPositions.add(key);

    const mesh = new THREE.Mesh(flowerGeometry, flowerMaterial);
    mesh.position.copy(fp);
    mesh.scale.set(0.06, 0.06, 0.06);

    mesh.userData.windOffset = Math.random() * Math.PI * 2;
    mesh.userData.originalPosition = fp.clone();

    if (animate) {
      const targetScale = mesh.scale.clone();
      mesh.scale.set(0, 0, 0);
      growAnimations.push({
        mesh: mesh,
        targetScale: targetScale,
        startTime: performance.now() + 1500,
        duration: 1000,
      });
    }

    plantGroup.add(mesh);
    allFlowers.push(mesh);
  }

  state.branchCount = allBranches.length;
  state.flowerCount = allFlowers.length;
  updateHUD();
}

// ============ BETTER L-SYSTEM INTERPRETATION ============
// Let me redo the turtle interpretation more carefully with proper 3D rotations

function buildPlantV2(generation, animate = false) {
  clearPlant();

  if (generation === 0) {
    updateHUD();
    return;
  }

  const lString = generateLString(lSystemRules.axiom, lSystemRules.rules, generation);

  const baseLength = 0.8;
  const baseRadius = 0.08;
  const lengthDecay = 0.75;
  const radiusDecay = 0.80;
  const angle = lSystemRules.angle;

  // Turtle state using quaternion for orientation
  class TurtleState {
    constructor() {
      this.pos = new THREE.Vector3(0, 0, 0);
      this.quat = new THREE.Quaternion();
      this.depth = 0;
    }
    clone() {
      const s = new TurtleState();
      s.pos = this.pos.clone();
      s.quat = this.quat.clone();
      s.depth = this.depth;
      return s;
    }
    heading() {
      return new THREE.Vector3(0, 1, 0).applyQuaternion(this.quat).normalize();
    }
    turnRight(a) {
      const rot = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), -a);
      this.quat.multiply(rot);
    }
    turnLeft(a) {
      const rot = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), a);
      this.quat.multiply(rot);
    }
    rollRight(a) {
      const rot = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), -a);
      this.quat.multiply(rot);
    }
  }

  const stack = [];
  let turtle = new TurtleState();

  const branchData = [];
  const flowerPositions = [];

  // Add slight random roll at each branch for 3D spread
  let charIndex = 0;

  for (const ch of lString) {
    if (ch === 'F') {
      const len = baseLength * Math.pow(lengthDecay, turtle.depth);
      const rad = baseRadius * Math.pow(radiusDecay, turtle.depth);

      const startPos = turtle.pos.clone();
      const heading = turtle.heading();
      const endPos = startPos.clone().add(heading.clone().multiplyScalar(len));

      branchData.push({
        start: startPos,
        end: endPos,
        radius: rad,
        length: len,
        depth: turtle.depth,
        quaternion: turtle.quat.clone()
      });

      turtle.pos = endPos;

    } else if (ch === '+') {
      turtle.turnRight(angle + (Math.random() - 0.5) * 0.08);

    } else if (ch === '-') {
      turtle.turnLeft(angle + (Math.random() - 0.5) * 0.08);

    } else if (ch === '[') {
      stack.push(turtle.clone());
      turtle.depth++;
      // Add random roll for 3D variety
      turtle.rollRight((Math.random() - 0.5) * Math.PI * 0.5);

    } else if (ch === ']') {
      flowerPositions.push({ pos: turtle.pos.clone(), depth: turtle.depth });
      if (stack.length > 0) {
        turtle = stack.pop();
      }
    }
    charIndex++;
  }

  // Create meshes
  const theme = colorThemes[state.colorThemeIndex];
  branchMaterial = new THREE.MeshStandardMaterial({ color: theme.branch, roughness: 0.6 });
  flowerMaterial = new THREE.MeshStandardMaterial({
    color: theme.flower, roughness: 0.3,
    emissive: theme.flower, emissiveIntensity: 0.15
  });

  state.branchColor = theme.branch;
  state.flowerColor = theme.flower;

  const animStartTime = performance.now();

  for (let i = 0; i < branchData.length; i++) {
    const bd = branchData[i];
    const mesh = new THREE.Mesh(branchGeometry, branchMaterial);

    mesh.position.copy(bd.start);
    mesh.scale.set(bd.radius, bd.length, bd.radius);
    mesh.quaternion.copy(bd.quaternion);

    mesh.castShadow = true;
    mesh.receiveShadow = true;

    mesh.userData.originalQuaternion = bd.quaternion.clone();
    mesh.userData.originalPosition = bd.start.clone();
    mesh.userData.depth = bd.depth;
    mesh.userData.windOffset = Math.random() * Math.PI * 2;
    mesh.userData.branchIndex = i;

    if (animate) {
      const targetScale = mesh.scale.clone();
      mesh.scale.set(0.001, 0.001, 0.001);
      growAnimations.push({
        mesh: mesh,
        targetScale: targetScale,
        startTime: animStartTime + (i / branchData.length) * 1500,
        duration: 800,
      });
    }

    plantGroup.add(mesh);
    allBranches.push(mesh);
  }

  // Flowers - deduplicate
  const usedKeys = new Set();
  for (const fp of flowerPositions) {
    const key = `${Math.round(fp.pos.x*20)},${Math.round(fp.pos.y*20)},${Math.round(fp.pos.z*20)}`;
    if (usedKeys.has(key)) continue;
    usedKeys.add(key);

    const mesh = new THREE.Mesh(flowerGeometry, flowerMaterial);
    mesh.position.copy(fp.pos);
    const flowerSize = 0.06;
    mesh.scale.set(flowerSize, flowerSize, flowerSize);

    mesh.userData.windOffset = Math.random() * Math.PI * 2;
    mesh.userData.originalPosition = fp.pos.clone();
    mesh.userData.depth = fp.depth;

    if (animate) {
      const targetScale = mesh.scale.clone();
      mesh.scale.set(0.001, 0.001, 0.001);
      growAnimations.push({
        mesh: mesh,
        targetScale: targetScale,
        startTime: animStartTime + 1500 + Math.random() * 500,
        duration: 600,
      });
    }

    plantGroup.add(mesh);
    allFlowers.push(mesh);
  }

  state.branchCount = allBranches.length;
  state.flowerCount = allFlowers.length;
  updateHUD();
}

// ============ ACTIONS ============
function grow() {
  if (state.isGrowing) return;
  if (state.generation >= state.maxGeneration) return;

  state.generation++;
  state.isGrowing = true;
  buildPlantV2(state.generation, true);
  updateHUD();
}

function resetPlant() {
  if (state.isGrowing) {
    // Force finish animations
    growAnimations = [];
  }
  state.generation = 0;
  state.isGrowing = false;
  clearPlant();
  updateHUD();
}

function cycleColor() {
  state.colorThemeIndex = (state.colorThemeIndex + 1) % colorThemes.length;
  const theme = colorThemes[state.colorThemeIndex];
  state.colorThemeName = theme.name;
  state.branchColor = theme.branch;
  state.flowerColor = theme.flower;

  // Update materials
  branchMaterial = new THREE.MeshStandardMaterial({ color: theme.branch, roughness: 0.6 });
  flowerMaterial = new THREE.MeshStandardMaterial({
    color: theme.flower, roughness: 0.3,
    emissive: theme.flower, emissiveIntensity: 0.15
  });

  for (const b of allBranches) {
    b.material = branchMaterial;
  }
  for (const f of allFlowers) {
    f.material = flowerMaterial;
  }

  updateHUD();
}

function toggleWind() {
  state.windEnabled = !state.windEnabled;
  if (!state.windEnabled) {
    // Reset rotations
    for (const b of allBranches) {
      if (b.userData.originalQuaternion) {
        b.quaternion.copy(b.userData.originalQuaternion);
      }
    }
  }
  updateHUD();
}

// ============ HUD UPDATE ============
function updateHUD() {
  document.getElementById('hud-gen').textContent = state.generation;
  document.getElementById('hud-branches').textContent = state.branchCount;
  document.getElementById('hud-flowers').textContent = state.flowerCount;
  document.getElementById('hud-theme').textContent = colorThemes[state.colorThemeIndex].name;

  const windEl = document.getElementById('hud-wind');
  windEl.textContent = state.windEnabled ? 'ON' : 'OFF';
  windEl.className = state.windEnabled ? 'status-on' : 'status-off';

  document.getElementById('hud-wind-str').textContent = state.windStrength.toFixed(1);
}

// ============ EVENT LISTENERS ============
document.getElementById('btn-grow').addEventListener('click', grow);
document.getElementById('btn-reset').addEventListener('click', resetPlant);
document.getElementById('btn-color').addEventListener('click', cycleColor);
document.getElementById('btn-wind').addEventListener('click', toggleWind);

document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === 'g') grow();
  else if (key === 'r') resetPlant();
  else if (key === 'c') cycleColor();
  else if (key === 'w') toggleWind();
  else if (e.key === 'ArrowUp') {
    state.windStrength = Math.min(1.0, state.windStrength + 0.1);
    updateHUD();
  } else if (e.key === 'ArrowDown') {
    state.windStrength = Math.max(0.0, state.windStrength - 0.1);
    updateHUD();
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();
const tempQuat = new THREE.Quaternion();
const windAxis = new THREE.Vector3(1, 0, 0.3).normalize();

function animate() {
  requestAnimationFrame(animate);

  const time = clock.getElapsedTime();
  const now = performance.now();

  controls.update();

  // Update camera distance
  state.cameraDistance = camera.position.length();

  // Process grow animations
  if (growAnimations.length > 0) {
    let allDone = true;
    for (const anim of growAnimations) {
      const elapsed = now - anim.startTime;
      if (elapsed < 0) {
        allDone = false;
        continue;
      }
      const t = Math.min(elapsed / anim.duration, 1.0);
      // Ease out cubic
      const ease = 1 - Math.pow(1 - t, 3);

      anim.mesh.scale.lerpVectors(
        new THREE.Vector3(0.001, 0.001, 0.001),
        anim.targetScale,
        ease
      );

      if (t < 1.0) allDone = false;
    }

    if (allDone) {
      growAnimations = [];
      state.isGrowing = false;
      updateHUD();
    }
  }

  // Wind simulation
  if (state.windEnabled) {
    const windStr = state.windStrength;

    for (const branch of allBranches) {
      const offset = branch.userData.windOffset;
      const depth = branch.userData.depth || 0;

      // More sway for deeper (higher) branches
      const depthFactor = 1 + depth * 0.5;
      const swayAngle = Math.sin(time * 2.0 + offset) * 0.05 * windStr * depthFactor;
      const swayAngle2 = Math.cos(time * 1.3 + offset * 1.7) * 0.03 * windStr * depthFactor;

      tempQuat.setFromAxisAngle(windAxis, swayAngle);
      const tempQuat2 = new THREE.Quaternion().setFromAxisAngle(
        new THREE.Vector3(0, 0, 1), swayAngle2
      );

      branch.quaternion.copy(branch.userData.originalQuaternion)
        .multiply(tempQuat)
        .multiply(tempQuat2);
    }

    for (const flower of allFlowers) {
      const offset = flower.userData.windOffset;
      const depth = flower.userData.depth || 0;
      const depthFactor = 1 + depth * 0.3;

      const dx = Math.sin(time * 2.0 + offset) * 0.02 * windStr * depthFactor;
      const dz = Math.cos(time * 1.5 + offset * 1.3) * 0.02 * windStr * depthFactor;

      flower.position.x = flower.userData.originalPosition.x + dx;
      flower.position.z = flower.userData.originalPosition.z + dz;
    }
  }

  // Gentle helmet bob
  if (helmetModel) {
    helmetModel.rotation.y = Math.sin(time * 0.3) * 0.02;
  }

  renderer.render(scene, camera);
}

animate();
updateHUD();
</script>
