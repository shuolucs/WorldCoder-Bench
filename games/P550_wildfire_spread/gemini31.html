<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Wildfire Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #001122, #334466);
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: none;
            min-width: 200px;
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #ffaa66;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .color-box {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-right: 5px;
            vertical-align: middle;
        }
        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .control-group label {
            width: 120px;
            font-size: 14px;
        }
        input[type=range] {
            width: 150px;
        }
        .instructions {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            font-size: 14px;
            pointer-events: none;
        }
        .instructions ul {
            margin: 5px 0 0 0;
            padding-left: 20px;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud">
        <h2>Simulation Status</h2>
        <div class="hud-row">
            <span><span class="color-box" style="background:#338833;"></span>Vegetation:</span>
            <span id="hud-veg">0</span>
        </div>
        <div class="hud-row">
            <span><span class="color-box" style="background:#ff6600;"></span>Burning:</span>
            <span id="hud-burning">0</span>
        </div>
        <div class="hud-row">
            <span><span class="color-box" style="background:#222222;"></span>Burnt:</span>
            <span id="hud-burnt">0</span>
        </div>
        <div class="hud-row">
            <span>Burn Percentage:</span>
            <span id="hud-percent">0.0%</span>
        </div>
        <div class="hud-row" style="margin-top: 10px;">
            <span>Wind Direction:</span>
            <span id="hud-wind">N</span>
        </div>
        <div class="hud-row">
            <span>Status:</span>
            <span id="hud-paused" style="color: #ffaa66; font-weight: bold;">Playing</span>
        </div>
    </div>

    <div id="controls">
        <div class="control-group">
            <label for="slider-speed">Sim Speed (steps/s):</label>
            <input type="range" id="slider-speed" min="1" max="20" step="1" value="4">
            <span id="val-speed">4</span>
        </div>
        <div class="control-group">
            <label for="slider-wind-strength">Wind Strength:</label>
            <input type="range" id="slider-wind-strength" min="0" max="1" step="0.05" value="0.2">
            <span id="val-wind-strength">0.2</span>
        </div>
    </div>

    <div class="instructions">
        <strong>Controls:</strong>
        <ul>
            <li><strong>Click Terrain:</strong> Ignite cell</li>
            <li><strong>Space:</strong> Pause / Play</li>
            <li><strong>R:</strong> Reset Simulation</li>
            <li><strong>W:</strong> Cycle Wind Direction</li>
            <li><strong>Drag:</strong> Rotate Camera</li>
            <li><strong>Scroll:</strong> Zoom</li>
        </ul>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            vegetationCount: 0,
            burningCount: 0,
            burntCount: 0,
            burnPercent: 0,
            windDirection: 'N',
            windStrength: 0.2,
            simSpeed: 4,
            stepCount: 0,
            isPaused: false,
            frameCount: 0,
            gridValid: true
        };

        // --- Simple Noise Implementation ---
        function hash(x, y) {
            let h = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453123;
            return h - Math.floor(h);
        }
        function noise(x, y) {
            let ix = Math.floor(x), iy = Math.floor(y);
            let fx = x - ix, fy = y - iy;
            let a = hash(ix, iy), b = hash(ix + 1, iy);
            let c = hash(ix, iy + 1), d = hash(ix + 1, iy + 1);
            let ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy);
            return a + (b - a) * ux + (c - a) * uy + (a - b - c + d) * ux * uy;
        }
        function fbm(x, y, octaves) {
            let v = 0, a = 0.5, shift = 100;
            for (let i = 0; i < octaves; i++) {
                v += a * noise(x, y);
                x = x * 2.0 + shift; y = y * 2.0 + shift;
                a *= 0.5;
            }
            return v;
        }

        // --- Constants & Config ---
        const GRID_SIZE = 80;
        const TERRAIN_SIZE = 40;
        const TOTAL_CELLS = GRID_SIZE * GRID_SIZE;
        
        const STATE_VEG = 0;
        const STATE_BURNING = 1;
        const STATE_BURNT = 2;
        const STATE_FIREBREAK = 3;

        const COLOR_VEG = new THREE.Color(0x338833);
        const COLOR_BURNING_1 = new THREE.Color(0xff6600);
        const COLOR_BURNING_2 = new THREE.Color(0xff0000);
        const COLOR_BURNT = new THREE.Color(0x222222);
        const COLOR_FIREBREAK = new THREE.Color(0x665533);

        const WIND_DIRS = [
            { name: 'N', dx: 0, dz: -1 },
            { name: 'NE', dx: 1, dz: -1 },
            { name: 'E', dx: 1, dz: 0 },
            { name: 'SE', dx: 1, dz: 1 },
            { name: 'S', dx: 0, dz: 1 },
            { name: 'SW', dx: -1, dz: 1 },
            { name: 'W', dx: -1, dz: 0 },
            { name: 'NW', dx: -1, dz: -1 }
        ];
        let currentWindIdx = 0;

        // --- Data Arrays ---
        let cellStates = new Uint8Array(TOTAL_CELLS);
        let nextCellStates = new Uint8Array(TOTAL_CELLS);
        let burnTimers = new Uint8Array(TOTAL_CELLS);
        let heights = new Float32Array(TOTAL_CELLS);
        let moistures = new Float32Array(TOTAL_CELLS);

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(25, 20, 25);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // Lights
        const ambientLight = new THREE.AmbientLight(0x556644, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffaa66, 0.8);
        dirLight.position.set(10, 15, 10);
        scene.add(dirLight);

        // --- Textures ---
        const textureLoader = new THREE.TextureLoader();
        const groundTex = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/brick_diffuse.jpg');
        groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping;
        groundTex.repeat.set(4, 4);
        groundTex.colorSpace = THREE.SRGBColorSpace;

        const fireTex = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/sprites/cloud10.png');

        // --- Terrain Generation ---
        const geometry = new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE, GRID_SIZE - 1, GRID_SIZE - 1);
        geometry.rotateX(-Math.PI / 2);

        const positionAttr = geometry.attributes.position;
        const colorAttr = new THREE.BufferAttribute(new Float32Array(TOTAL_CELLS * 3), 3);
        geometry.setAttribute('color', colorAttr);

        // Generate Height, Moisture, and Initial States
        for (let i = 0; i < TOTAL_CELLS; i++) {
            let x = i % GRID_SIZE;
            let y = Math.floor(i / GRID_SIZE);
            
            // Map grid to world coords for noise
            let wx = (x / GRID_SIZE) * 5;
            let wy = (y / GRID_SIZE) * 5;

            // Height: 2 octaves, amp 0..5
            let h = fbm(wx, wy, 2) * 5;
            heights[i] = h;
            positionAttr.setY(i, h);

            // Moisture: different noise offset
            moistures[i] = fbm(wx + 10, wy + 10, 2);

            // Initial State: Vegetation, with random firebreaks
            if (Math.random() < 0.02) {
                // Create a small patch of firebreak
                cellStates[i] = STATE_FIREBREAK;
            } else {
                cellStates[i] = STATE_VEG;
            }
        }

        // Expand firebreaks slightly to make patches
        for (let i = 0; i < TOTAL_CELLS; i++) {
            if (cellStates[i] === STATE_FIREBREAK) {
                let x = i % GRID_SIZE;
                let y = Math.floor(i / GRID_SIZE);
                for(let dy=-1; dy<=1; dy++) {
                    for(let dx=-1; dx<=1; dx++) {
                        let nx = x + dx, ny = y + dy;
                        if(nx>=0 && nx<GRID_SIZE && ny>=0 && ny<GRID_SIZE && Math.random() < 0.5) {
                            cellStates[ny * GRID_SIZE + nx] = STATE_FIREBREAK;
                        }
                    }
                }
            }
        }

        geometry.computeVertexNormals();

        const material = new THREE.MeshStandardMaterial({
            map: groundTex,
            vertexColors: true,
            roughness: 0.8,
            metalness: 0.1
        });

        const terrainMesh = new THREE.Mesh(geometry, material);
        scene.add(terrainMesh);

        // --- Particles (Fire) ---
        const particleGeo = new THREE.BufferGeometry();
        const particlePos = new Float32Array(TOTAL_CELLS * 3);
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
        
        const particleMat = new THREE.PointsMaterial({
            size: 1.5,
            map: fireTex,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            color: 0xffaa00
        });
        
        const particleSystem = new THREE.Points(particleGeo, particleMat);
        particleSystem.position.y = 0.5; // slightly above ground
        scene.add(particleSystem);

        // --- Wind Indicator ---
        const arrowDir = new THREE.Vector3(0, 0, -1);
        const arrowOrigin = new THREE.Vector3(0, 10, 0);
        const arrowLength = 5;
        const arrowColor = 0x00ffff;
        const windArrow = new THREE.ArrowHelper(arrowDir, arrowOrigin, arrowLength, arrowColor, 1.5, 1);
        scene.add(windArrow);

        function updateWindArrow() {
            const w = WIND_DIRS[currentWindIdx];
            const dir = new THREE.Vector3(w.dx, 0, w.dz).normalize();
            windArrow.setDirection(dir);
            window.__3D_STATE__.windDirection = w.name;
            document.getElementById('hud-wind').innerText = w.name;
        }
        updateWindArrow();

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if(event.button !== 0) return; // Only left click
            
            // Don't ignite if clicking on UI
            if(event.target.tagName === 'INPUT' || event.target.closest('#hud') || event.target.closest('#controls')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(terrainMesh);

            if (intersects.length > 0) {
                // Get nearest vertex
                const face = intersects[0].face;
                const point = intersects[0].point;
                
                // Find which vertex of the face is closest to the intersection point
                let closestIdx = face.a;
                let minDist = point.distanceTo(new THREE.Vector3().fromBufferAttribute(positionAttr, face.a));
                
                let distB = point.distanceTo(new THREE.Vector3().fromBufferAttribute(positionAttr, face.b));
                if(distB < minDist) { minDist = distB; closestIdx = face.b; }
                
                let distC = point.distanceTo(new THREE.Vector3().fromBufferAttribute(positionAttr, face.c));
                if(distC < minDist) { closestIdx = face.c; }

                if (cellStates[closestIdx] === STATE_VEG) {
                    cellStates[closestIdx] = STATE_BURNING;
                    burnTimers[closestIdx] = 3 + Math.floor(Math.random() * 3); // 3-5
                    updateVisuals();
                }
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
                document.getElementById('hud-paused').innerText = window.__3D_STATE__.isPaused ? 'Paused' : 'Playing';
                document.getElementById('hud-paused').style.color = window.__3D_STATE__.isPaused ? '#ff4444' : '#ffaa66';
            } else if (e.code === 'KeyR') {
                resetSimulation();
            } else if (e.code === 'KeyW') {
                currentWindIdx = (currentWindIdx + 1) % WIND_DIRS.length;
                updateWindArrow();
            }
        });

        // Sliders
        const speedSlider = document.getElementById('slider-speed');
        const speedVal = document.getElementById('val-speed');
        speedSlider.addEventListener('input', (e) => {
            window.__3D_STATE__.simSpeed = parseFloat(e.target.value);
            speedVal.innerText = e.target.value;
        });

        const windSlider = document.getElementById('slider-wind-strength');
        const windVal = document.getElementById('val-wind-strength');
        windSlider.addEventListener('input', (e) => {
            window.__3D_STATE__.windStrength = parseFloat(e.target.value);
            windVal.innerText = e.target.value;
        });

        function resetSimulation() {
            for (let i = 0; i < TOTAL_CELLS; i++) {
                if (cellStates[i] !== STATE_FIREBREAK) {
                    cellStates[i] = STATE_VEG;
                }
                burnTimers[i] = 0;
            }
            window.__3D_STATE__.stepCount = 0;
            updateVisuals();
        }

        // --- Cellular Automata Logic ---
        function stepSimulation() {
            if (window.__3D_STATE__.isPaused) return;

            nextCellStates.set(cellStates);
            const wind = WIND_DIRS[currentWindIdx];
            const windStrength = window.__3D_STATE__.windStrength;

            // Normalize wind vector
            let wx = wind.dx, wy = wind.dz;
            let lenW = Math.sqrt(wx*wx + wy*wy) || 1;
            wx /= lenW; wy /= lenW;

            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    let i = y * GRID_SIZE + x;
                    let state = cellStates[i];

                    if (state === STATE_BURNING) {
                        burnTimers[i]--;
                        if (burnTimers[i] <= 0) {
                            nextCellStates[i] = STATE_BURNT;
                        }
                    } else if (state === STATE_VEG) {
                        let catchFire = false;
                        
                        // Check 8 neighbors
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                if (dx === 0 && dy === 0) continue;
                                
                                let nx = x + dx, ny = y + dy;
                                if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE) {
                                    let ni = ny * GRID_SIZE + nx;
                                    
                                    if (cellStates[ni] === STATE_BURNING) {
                                        let prob = 0.3; // Base prob

                                        // Wind effect
                                        // Vector from neighbor to cell is (dx, dy) in grid space
                                        // Wait, if neighbor is at nx, cell is at x. Vector is (x-nx, y-ny) = (-dx, -dy)
                                        let vx = -dx, vy = -dy;
                                        let lenV = Math.sqrt(vx*vx + vy*vy);
                                        vx /= lenV; vy /= lenV;
                                        
                                        let dot = wx * vx + wy * vy;
                                        if (dot > 0) {
                                            prob += windStrength * dot; // Wind blowing towards cell
                                        } else {
                                            prob += (windStrength / 2) * dot; // Wind blowing away (dot is negative)
                                        }

                                        // Slope effect
                                        let hDiff = heights[i] - heights[ni];
                                        if (hDiff > 0) prob += 0.15; // Uphill
                                        else if (hDiff < 0) prob -= 0.1; // Downhill

                                        // Moisture effect
                                        prob -= moistures[i] * 0.3;

                                        if (Math.random() < prob) {
                                            catchFire = true;
                                            break;
                                        }
                                    }
                                }
                            }
                            if (catchFire) break;
                        }

                        if (catchFire) {
                            nextCellStates[i] = STATE_BURNING;
                            burnTimers[i] = 3 + Math.floor(Math.random() * 3);
                        }
                    }
                }
            }

            // Swap buffers
            let temp = cellStates;
            cellStates = nextCellStates;
            nextCellStates = temp;

            window.__3D_STATE__.stepCount++;
        }

        // --- Visual Updates ---
        const tempColor = new THREE.Color();
        
        function updateVisuals(time = 0) {
            let vegCount = 0, burnCount = 0, burntCount = 0;
            let pIdx = 0;

            // Animate burning color between orange and red based on time and position
            const burnOscillation = (Math.sin(time * 5) + 1) / 2;

            for (let i = 0; i < TOTAL_CELLS; i++) {
                let state = cellStates[i];
                
                if (state === STATE_VEG) {
                    tempColor.copy(COLOR_VEG);
                    vegCount++;
                } else if (state === STATE_BURNING) {
                    // Mix colors for animation
                    let localOsc = (Math.sin(time * 10 + i) + 1) / 2;
                    tempColor.copy(COLOR_BURNING_1).lerp(COLOR_BURNING_2, localOsc);
                    burnCount++;
                    
                    // Add particle
                    particlePos[pIdx * 3] = positionAttr.getX(i);
                    particlePos[pIdx * 3 + 1] = positionAttr.getY(i) + Math.random() * 0.5;
                    particlePos[pIdx * 3 + 2] = positionAttr.getZ(i);
                    pIdx++;
                } else if (state === STATE_BURNT) {
                    tempColor.copy(COLOR_BURNT);
                    burntCount++;
                } else if (state === STATE_FIREBREAK) {
                    tempColor.copy(COLOR_FIREBREAK);
                }

                colorAttr.setXYZ(i, tempColor.r, tempColor.g, tempColor.b);
            }

            colorAttr.needsUpdate = true;

            // Update particles
            particleGeo.setDrawRange(0, pIdx);
            particleGeo.attributes.position.needsUpdate = true;

            // Update State & HUD
            let totalBurnable = vegCount + burnCount + burntCount;
            let percent = totalBurnable > 0 ? (burntCount / totalBurnable) * 100 : 0;

            window.__3D_STATE__.vegetationCount = vegCount;
            window.__3D_STATE__.burningCount = burnCount;
            window.__3D_STATE__.burntCount = burntCount;
            window.__3D_STATE__.burnPercent = Math.round(percent * 10) / 10;

            document.getElementById('hud-veg').innerText = vegCount;
            document.getElementById('hud-burning').innerText = burnCount;
            document.getElementById('hud-burnt').innerText = burntCount;
            document.getElementById('hud-percent').innerText = window.__3D_STATE__.burnPercent.toFixed(1) + '%';
        }

        // --- Main Loop ---
        const clock = new THREE.Clock();
        let timeSinceLastStep = 0;

        // Initial visual update
        updateVisuals(0);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            
            controls.update();

            if (!window.__3D_STATE__.isPaused) {
                timeSinceLastStep += delta;
                const stepInterval = 1.0 / window.__3D_STATE__.simSpeed;
                
                if (timeSinceLastStep >= stepInterval) {
                    stepSimulation();
                    timeSinceLastStep = timeSinceLastStep % stepInterval;
                }
            }

            // Always update visuals for burning animation
            updateVisuals(time);

            // Update global state frame count
            window.__3D_STATE__.frameCount++;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
