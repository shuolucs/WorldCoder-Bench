<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Phylogenetic Tree</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    .hud {
      position: fixed;
      z-index: 10;
      pointer-events: none;
      user-select: none;
    }

    #infoPanel {
      top: 12px;
      left: 12px;
      background: rgba(10, 10, 26, 0.75);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 10px 12px;
      min-width: 230px;
      line-height: 1.5;
      backdrop-filter: blur(4px);
    }

    #controls {
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .btn {
      background: rgba(20,20,40,0.85);
      color: #fff;
      border: 2px solid;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(40,40,70,0.95);
    }

    .btn.active {
      box-shadow: 0 0 14px rgba(255,255,255,0.25);
      transform: scale(1.03);
    }

    .easy { border-color: #44ff44; }
    .medium { border-color: #ffaa33; }
    .hard { border-color: #ff4444; }

    #legend {
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      background: rgba(10, 10, 26, 0.8);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 90vw;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(255,255,255,0.25);
    }

    #tooltip {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      background: rgba(0,0,0,0.82);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      line-height: 1.35;
      display: none;
      white-space: nowrap;
      transform: translate(12px, 12px);
    }

    .hint {
      opacity: 0.8;
      margin-top: 6px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="infoPanel" class="hud">
    <div><strong>Difficulty:</strong> <span id="difficultyText">Easy (Level 1)</span></div>
    <div><strong>Total Nodes:</strong> <span id="nodeCountText">0</span></div>
    <div><strong>Selected Node:</strong> <span id="selectedText">None</span></div>
    <div class="hint">Keys: <strong>R</strong> reset camera, <strong>T</strong> labels, <strong>A</strong> auto-rotate</div>
  </div>

  <div id="controls" class="hud">
    <button id="btnEasy" class="btn easy active">Easy</button>
    <button id="btnMedium" class="btn medium">Medium</button>
    <button id="btnHard" class="btn hard">Hard</button>
  </div>

  <div id="legend" class="hud">
    <div class="legend-item"><span class="swatch" style="background:#ff4444"></span> Mammals</div>
    <div class="legend-item"><span class="swatch" style="background:#44ff44"></span> Birds</div>
    <div class="legend-item"><span class="swatch" style="background:#4444ff"></span> Reptiles</div>
    <div class="legend-item"><span class="swatch" style="background:#ffff44"></span> Fish</div>
    <div class="legend-item"><span class="swatch" style="background:#ff44ff"></span> Insects</div>
  </div>

  <div id="tooltip"></div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const BG_COLOR = 0x0a0a1a;
    const GROUP_COLORS = {
      mammals: 0xff4444,
      birds: 0x44ff44,
      reptiles: 0x4444ff,
      fish: 0xffff44,
      insects: 0xff44ff,
      ancestor: 0x888888
    };

    const SPECIES_NAMES = {
      mammals: ['Wolf', 'Tiger', 'Whale', 'Bat', 'Elephant', 'Otter', 'Lemur', 'Fox', 'Deer', 'Panda'],
      birds: ['Eagle', 'Sparrow', 'Penguin', 'Owl', 'Falcon', 'Parrot', 'Heron', 'Robin', 'Swan', 'Kiwi'],
      reptiles: ['Iguana', 'Python', 'Crocodile', 'Gecko', 'Turtle', 'Viper', 'Komodo', 'Anole', 'Skink', 'Boa'],
      fish: ['Salmon', 'Trout', 'Shark', 'Tuna', 'Seahorse', 'Guppy', 'Marlin', 'Cod', 'Ray', 'Pike'],
      insects: ['Beetle', 'Moth', 'Dragonfly', 'Ant', 'Bee', 'Wasp', 'Cricket', 'Weevil', 'Locust', 'Termite']
    };

    const infoDifficulty = document.getElementById('difficultyText');
    const infoNodeCount = document.getElementById('nodeCountText');
    const infoSelected = document.getElementById('selectedText');
    const tooltip = document.getElementById('tooltip');

    const btnEasy = document.getElementById('btnEasy');
    const btnMedium = document.getElementById('btnMedium');
    const btnHard = document.getElementById('btnHard');

    const app = document.getElementById('app');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(BG_COLOR);
    scene.fog = new THREE.Fog(BG_COLOR, 18, 55);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 5, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0x404060, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 15, 10);
    scene.add(dirLight);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 4, 0);

    const rootGroup = new THREE.Group();
    scene.add(rootGroup);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    let hoveredNode = null;
    let selectedNode = null;
    let currentTree = null;
    let labelsVisible = true;
    let autoRotate = false;

    let fadeTransition = null;
    let cameraTween = null;

    const clock = new THREE.Clock();

    const initialCameraPosition = new THREE.Vector3(0, 5, 20);
    const initialTarget = new THREE.Vector3(0, 4, 0);

    window.__3D_STATE__ = {
      difficultyLevel: 1,
      totalNodes: 0,
      totalLeaves: 0,
      selectedNodeName: null,
      hoveredNodeName: null,
      labelsVisible: true,
      autoRotate: false,
      cameraPosition: { x: 0, y: 5, z: 20 },
      treeDepth: 3,
      speciesGroups: 5
    };

    function seededRandom(seed) {
      let s = seed >>> 0;
      return function() {
        s = (s * 1664525 + 1013904223) >>> 0;
        return s / 4294967296;
      };
    }

    function makeLabelSprite(text) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const fontSize = 44;
      const padX = 18;
      const padY = 12;
      ctx.font = `bold ${fontSize}px Arial`;

      const metrics = ctx.measureText(text);
      canvas.width = Math.ceil(metrics.width + padX * 2);
      canvas.height = Math.ceil(fontSize + padY * 2);

      const ctx2 = canvas.getContext('2d');
      ctx2.font = `bold ${fontSize}px Arial`;
      ctx2.fillStyle = 'rgba(10,10,26,0.8)';
      ctx2.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx2.lineWidth = 4;
      roundRect(ctx2, 2, 2, canvas.width - 4, canvas.height - 4, 12);
      ctx2.fill();
      ctx2.stroke();

      ctx2.fillStyle = '#ffffff';
      ctx2.textBaseline = 'middle';
      ctx2.fillText(text, padX, canvas.height / 2 + 1);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthWrite: false
      });

      const sprite = new THREE.Sprite(material);
      const aspect = canvas.width / canvas.height;
      sprite.scale.set(2.8 * aspect, 2.8, 1);
      return sprite;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function createCylinderBetween(a, b, radius = 0.09, color = 0x667799) {
      const dir = new THREE.Vector3().subVectors(b, a);
      const length = dir.length();
      const safeLength = Number.isFinite(length) && length > 0.0001 ? length : 0.0001;

      const geom = new THREE.CylinderGeometry(radius, radius, safeLength, 8, 1, false);
      const mat = new THREE.MeshPhongMaterial({
        color,
        transparent: true,
        opacity: 1
      });
      const mesh = new THREE.Mesh(geom, mat);

      const midpoint = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
      mesh.position.copy(midpoint);

      const up = new THREE.Vector3(0, 1, 0);
      const quat = new THREE.Quaternion().setFromUnitVectors(up, dir.clone().normalize());
      mesh.quaternion.copy(quat);
      return mesh;
    }

    function createNodeMesh(nodeData) {
      const geometry = new THREE.SphereGeometry(0.3, 24, 24);
      const color = nodeData.isLeaf ? GROUP_COLORS[nodeData.group] : GROUP_COLORS.ancestor;
      const material = new THREE.MeshPhongMaterial({
        color,
        emissive: 0x000000,
        transparent: true,
        opacity: 1
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(nodeData.position);
      mesh.userData.nodeData = nodeData;
      mesh.userData.baseColor = color;
      mesh.userData.baseScale = 1;
      return mesh;
    }

    function chooseGroup(index) {
      const groups = ['mammals', 'birds', 'reptiles', 'fish', 'insects'];
      return groups[index % groups.length];
    }

    function nextSpeciesName(group, counters) {
      const arr = SPECIES_NAMES[group];
      const idx = counters[group] % arr.length;
      counters[group]++;
      return arr[idx];
    }

    function difficultyConfig(level) {
      if (level === 1) {
        return {
          depth: 3,
          branchMin: 2,
          branchMax: 2,
          uniformLength: true,
          crossing: false,
          seed: 1337
        };
      }
      if (level === 2) {
        return {
          depth: 4,
          branchMin: 2,
          branchMax: 3,
          uniformLength: false,
          crossing: false,
          seed: 4242
        };
      }
      return {
        depth: 5,
        branchMin: 2,
        branchMax: 4,
        uniformLength: false,
        crossing: true,
        seed: 9001
      };
    }

    function generateTreeData(level) {
      const config = difficultyConfig(level);
      const rand = seededRandom(config.seed + level * 999);
      const nodes = [];
      const links = [];
      const leaves = [];
      const counters = {
        mammals: 0,
        birds: 0,
        reptiles: 0,
        fish: 0,
        insects: 0
      };

      let idCounter = 0;

      const root = {
        id: idCounter++,
        name: 'Root Ancestor',
        depth: 0,
        group: 'ancestor',
        isLeaf: false,
        position: new THREE.Vector3(0, 0, 0),
        parentId: null,
        children: []
      };

      nodes.push(root);

      function makeChildren(parent, angleStart, angleSpan, radialBias) {
        if (parent.depth >= config.depth - 1) return;

        let branchCount;
        if (level === 1) {
          branchCount = 2;
        } else {
          branchCount = config.branchMin + Math.floor(rand() * (config.branchMax - config.branchMin + 1));
        }

        const childDepth = parent.depth + 1;

        for (let i = 0; i < branchCount; i++) {
          const t = branchCount === 1 ? 0.5 : i / (branchCount - 1);
          let angle = angleStart + angleSpan * t;
          angle += (rand() - 0.5) * (level === 1 ? 0.08 : 0.45);

          if (config.crossing && childDepth >= 3 && rand() < 0.22) {
            angle += (rand() < 0.5 ? -1 : 1) * (0.8 + rand() * 0.8);
          }

          const yStep = config.uniformLength ? 2.2 : (1.7 + rand() * 1.8);
          const radialStep = config.uniformLength ? 1.8 : (1.2 + rand() * 2.0);
          const twist = config.crossing ? (rand() - 0.5) * 1.5 : (rand() - 0.5) * 0.55;

          const radius = radialBias + radialStep + childDepth * 0.35;
          const x = parent.position.x + Math.cos(angle) * radius * 0.55 + Math.sin(twist) * 0.5;
          const y = parent.position.y + yStep;
          const z = parent.position.z + Math.sin(angle) * radius * 0.55 + Math.cos(twist) * 0.5;

          const pos = new THREE.Vector3(
            Number.isFinite(x) ? x : 0,
            Number.isFinite(y) ? y : parent.position.y + 2,
            Number.isFinite(z) ? z : 0
          );

          const willBeLeaf = childDepth === config.depth - 1;
          let group = 'ancestor';
          let name = `Ancestor ${idCounter}`;

          if (willBeLeaf) {
            group = chooseGroup(leaves.length);
            name = nextSpeciesName(group, counters);
          }

          const child = {
            id: idCounter++,
            name,
            depth: childDepth,
            group,
            isLeaf: willBeLeaf,
            position: pos,
            parentId: parent.id,
            children: []
          };

          nodes.push(child);
          links.push({ from: parent.id, to: child.id });
          parent.children.push(child.id);

          if (willBeLeaf) {
            leaves.push(child);
          } else {
            makeChildren(child, angle - Math.PI / 3, Math.PI * (0.66 + rand() * 0.4), radius * 0.22);
          }
        }
      }

      makeChildren(root, -Math.PI / 2, Math.PI, 0.3);

      nodes.forEach(n => {
        if (!n.isLeaf && n.id !== root.id) {
          n.name = `Ancestor ${n.id}`;
        }
      });

      centerTree(nodes, level);

      return {
        level,
        depth: config.depth,
        nodes,
        links,
        leaves
      };
    }

    function centerTree(nodes, level) {
      const box = new THREE.Box3();
      for (const n of nodes) box.expandByPoint(n.position);

      const center = new THREE.Vector3();
      box.getCenter(center);

      const minY = box.min.y;
      const xShift = center.x;
      const zShift = center.z;

      for (const n of nodes) {
        n.position.x -= xShift;
        n.position.z -= zShift;
        n.position.y -= minY;
        if (!Number.isFinite(n.position.x)) n.position.x = 0;
        if (!Number.isFinite(n.position.y)) n.position.y = 0;
        if (!Number.isFinite(n.position.z)) n.position.z = 0;
      }

      const newBox = new THREE.Box3();
      nodes.forEach(n => newBox.expandByPoint(n.position));
      const size = new THREE.Vector3();
      newBox.getSize(size);
      const center2 = new THREE.Vector3();
      newBox.getCenter(center2);

      controls.target.lerp(new THREE.Vector3(0, size.y * 0.35, 0), 1);

      const maxDim = Math.max(size.x, size.y, size.z);
      let z = 20;
      if (level === 2) z = Math.max(24, maxDim * 1.55);
      if (level === 3) z = Math.max(30, maxDim * 1.65);

      if (!cameraTween) {
        camera.position.set(0, Math.max(5, size.y * 0.45), z);
      }
    }

    function buildTreeObject(treeData) {
      const group = new THREE.Group();
      const nodeMeshes = [];
      const labelSprites = [];
      const branchMeshes = [];
      const nodeMap = new Map();

      for (const node of treeData.nodes) {
        const mesh = createNodeMesh(node);
        group.add(mesh);
        nodeMeshes.push(mesh);
        nodeMap.set(node.id, mesh);

        const label = makeLabelSprite(node.name);
        label.position.copy(node.position.clone().add(new THREE.Vector3(0, 0.7, 0)));
        label.visible = labelsVisible;
        label.material.transparent = true;
        label.material.opacity = 1;
        group.add(label);
        labelSprites.push(label);
      }

      for (const link of treeData.links) {
        const from = treeData.nodes.find(n => n.id === link.from);
        const to = treeData.nodes.find(n => n.id === link.to);
        const branch = createCylinderBetween(from.position, to.position, 0.08, 0x667799);
        group.add(branch);
        branchMeshes.push(branch);
      }

      group.userData = {
        treeData,
        nodeMeshes,
        labelSprites,
        branchMeshes,
        opacity: 1
      };

      return group;
    }

    function setGroupOpacity(group, opacity) {
      group.userData.opacity = opacity;
      group.userData.nodeMeshes.forEach(m => {
        m.material.opacity = opacity;
      });
      group.userData.branchMeshes.forEach(m => {
        m.material.opacity = opacity;
      });
      group.userData.labelSprites.forEach(s => {
        s.material.opacity = labelsVisible ? opacity : 0;
      });
    }

    function applyNodeVisuals(mesh) {
      const data = mesh.userData.nodeData;
      const isHovered = hoveredNode === mesh;
      const isSelected = selectedNode === mesh;

      mesh.scale.setScalar(isHovered ? 1.5 : 1.0);

      if (isSelected) {
        mesh.material.color.setHex(0xffff00);
        mesh.material.emissive.setHex(0x554400);
      } else {
        mesh.material.color.setHex(mesh.userData.baseColor);
        mesh.material.emissive.setHex(isHovered ? 0x333333 : 0x000000);
      }

      if (!data.isLeaf && !isSelected) {
        mesh.material.emissive.setHex(isHovered ? 0x222222 : 0x000000);
      }
    }

    function clearCurrentSelectionIfInvalid() {
      if (selectedNode && (!currentTree || !currentTree.userData.nodeMeshes.includes(selectedNode))) {
        selectedNode = null;
      }
      if (hoveredNode && (!currentTree || !currentTree.userData.nodeMeshes.includes(hoveredNode))) {
        hoveredNode = null;
      }
    }

    function updateHUD() {
      const level = window.__3D_STATE__.difficultyLevel;
      infoDifficulty.textContent = level === 1 ? 'Easy (Level 1)' : level === 2 ? 'Medium (Level 2)' : 'Hard (Level 3)';
      infoNodeCount.textContent = window.__3D_STATE__.totalNodes;
      infoSelected.textContent = window.__3D_STATE__.selectedNodeName || 'None';

      btnEasy.classList.toggle('active', level === 1);
      btnMedium.classList.toggle('active', level === 2);
      btnHard.classList.toggle('active', level === 3);
    }

    function setDifficulty(level) {
      if (window.__3D_STATE__.difficultyLevel === level && currentTree) return;

      const newData = generateTreeData(level);
      const newTree = buildTreeObject(newData);
      setGroupOpacity(newTree, 0);
      rootGroup.add(newTree);

      const oldTree = currentTree;
      currentTree = newTree;
      hoveredNode = null;
      selectedNode = null;
      tooltip.style.display = 'none';

      fadeTransition = {
        start: performance.now(),
        duration: 1000,
        oldTree,
        newTree
      };

      fitCameraToTree(newData, level);

      window.__3D_STATE__.difficultyLevel = level;
      window.__3D_STATE__.treeDepth = newData.depth;
      window.__3D_STATE__.totalNodes = newData.nodes.length;
      window.__3D_STATE__.totalLeaves = newData.leaves.length;
      window.__3D_STATE__.selectedNodeName = null;
      window.__3D_STATE__.hoveredNodeName = null;

      updateHUD();
    }

    function fitCameraToTree(treeData, level) {
      const box = new THREE.Box3();
      treeData.nodes.forEach(n => box.expandByPoint(n.position));
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const maxDim = Math.max(size.x, size.y, size.z);
      const targetPos = new THREE.Vector3(
        0,
        Math.max(5, size.y * 0.45 + 1.5),
        level === 1 ? 20 : level === 2 ? Math.max(24, maxDim * 1.55) : Math.max(30, maxDim * 1.65)
      );
      const targetLook = new THREE.Vector3(0, size.y * 0.35, 0);

      cameraTween = {
        start: performance.now(),
        duration: 1000,
        fromPos: camera.position.clone(),
        toPos: targetPos,
        fromTarget: controls.target.clone(),
        toTarget: targetLook
      };
    }

    function resetCamera() {
      cameraTween = {
        start: performance.now(),
        duration: 1000,
        fromPos: camera.position.clone(),
        toPos: initialCameraPosition.clone(),
        fromTarget: controls.target.clone(),
        toTarget: initialTarget.clone()
      };
    }

    function onPointerMove(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      tooltip.style.left = `${event.clientX}px`;
      tooltip.style.top = `${event.clientY}px`;
    }

    function updateHover() {
      if (!currentTree) return;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(currentTree.userData.nodeMeshes, false);
      const hit = intersects.length ? intersects[0].object : null;

      if (hoveredNode !== hit) {
        hoveredNode = hit;
      }

      if (hoveredNode) {
        const d = hoveredNode.userData.nodeData;
        tooltip.style.display = 'block';
        tooltip.innerHTML = `<strong>${d.name}</strong><br>Depth: ${d.depth}<br>Group: ${d.isLeaf ? d.group : 'ancestor'}`;
      } else {
        tooltip.style.display = 'none';
      }
    }

    function onClick() {
      if (!currentTree) return;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(currentTree.userData.nodeMeshes, false);
      const hit = intersects.length ? intersects[0].object : null;

      if (hit && selectedNode === hit) {
        selectedNode = null;
      } else {
        selectedNode = hit || null;
      }
    }

    function updateVisuals() {
      if (!currentTree) return;
      for (const mesh of currentTree.userData.nodeMeshes) {
        applyNodeVisuals(mesh);
      }
      currentTree.userData.labelSprites.forEach(sprite => {
        sprite.visible = labelsVisible;
      });
    }

    function animateTransitions(now) {
      if (fadeTransition) {
        const t = Math.min(1, (now - fadeTransition.start) / fadeTransition.duration);
        const ease = t * t * (3 - 2 * t);

        if (fadeTransition.oldTree) setGroupOpacity(fadeTransition.oldTree, 1 - ease);
        if (fadeTransition.newTree) setGroupOpacity(fadeTransition.newTree, ease);

        if (t >= 1) {
          if (fadeTransition.oldTree) {
            rootGroup.remove(fadeTransition.oldTree);
            disposeTree(fadeTransition.oldTree);
          }
          fadeTransition = null;
        }
      }

      if (cameraTween) {
        const t = Math.min(1, (now - cameraTween.start) / cameraTween.duration);
        const ease = t * t * (3 - 2 * t);
        camera.position.lerpVectors(cameraTween.fromPos, cameraTween.toPos, ease);
        controls.target.lerpVectors(cameraTween.fromTarget, cameraTween.toTarget, ease);
        if (t >= 1) cameraTween = null;
      }
    }

    function disposeTree(tree) {
      tree.traverse(obj => {
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
          if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
          else obj.material.dispose();
        }
        if (obj.material && obj.material.map) obj.material.map.dispose();
      });
    }

    function updateState() {
      const treeData = currentTree?.userData?.treeData;
      window.__3D_STATE__.difficultyLevel = window.__3D_STATE__.difficultyLevel || 1;
      window.__3D_STATE__.totalNodes = treeData ? treeData.nodes.length : 0;
      window.__3D_STATE__.totalLeaves = treeData ? treeData.leaves.length : 0;
      window.__3D_STATE__.selectedNodeName = selectedNode ? selectedNode.userData.nodeData.name : null;
      window.__3D_STATE__.hoveredNodeName = hoveredNode ? hoveredNode.userData.nodeData.name : null;
      window.__3D_STATE__.labelsVisible = labelsVisible;
      window.__3D_STATE__.autoRotate = autoRotate;
      window.__3D_STATE__.cameraPosition = {
        x: camera.position.x,
        y: camera.position.y,
        z: camera.position.z
      };
      window.__3D_STATE__.treeDepth = treeData ? treeData.depth : 3;
      window.__3D_STATE__.speciesGroups = 5;
    }

    btnEasy.addEventListener('click', () => setDifficulty(1));
    btnMedium.addEventListener('click', () => setDifficulty(2));
    btnHard.addEventListener('click', () => setDifficulty(3));

    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('click', onClick);

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'r') resetCamera();
      if (key === 't') labelsVisible = !labelsVisible;
      if (key === 'a') autoRotate = !autoRotate;
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);

      const now = performance.now();
      const dt = clock.getDelta();

      if (autoRotate && currentTree) {
        rootGroup.rotation.y += 0.5 * dt;
      }

      animateTransitions(now);
      controls.update();
      updateHover();
      clearCurrentSelectionIfInvalid();
      updateVisuals();
      updateState();
      updateHUD();

      renderer.render(scene, camera);
    }

    setDifficulty(1);
    animate();
  </script>
</body>
</html>
