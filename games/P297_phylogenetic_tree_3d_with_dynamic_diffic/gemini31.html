<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Phylogenetic Tree</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        .panel {
            background: rgba(10, 10, 26, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            backdrop-filter: blur(4px);
            pointer-events: auto;
        }
        #top-left {
            position: absolute;
            top: 20px;
            left: 20px;
        }
        #top-left h2 { margin: 0 0 10px 0; font-size: 18px; }
        #top-left p { margin: 5px 0; font-size: 14px; color: #ccc; }
        #top-left span { font-weight: bold; color: #fff; }
        
        #top-right {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        .btn {
            background: rgba(20, 20, 40, 0.8);
            color: white;
            border: 2px solid;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn:hover { background: rgba(40, 40, 60, 0.9); }
        .btn.active { background: rgba(60, 60, 80, 1); }
        #btn-easy { border-color: #44ff44; }
        #btn-medium { border-color: #ffaa00; }
        #btn-hard { border-color: #ff4444; }

        #bottom-center {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }
        .color-box {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #555;
            padding: 10px;
            border-radius: 4px;
            display: none;
            pointer-events: none;
            font-size: 12px;
            transform: translate(15px, 15px);
            z-index: 20;
        }
        #tooltip h3 { margin: 0 0 5px 0; font-size: 14px; color: #fff; }
        #tooltip p { margin: 2px 0; color: #aaa; }

        #controls-help {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@tweenjs/tween.js": "https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.esm.js"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="top-left" class="panel">
            <h2>Phylogenetic Tree</h2>
            <p>Difficulty: <span id="ui-diff">Easy</span></p>
            <p>Total Nodes: <span id="ui-nodes">0</span></p>
            <p>Selected: <span id="ui-selected">None</span></p>
        </div>

        <div id="top-right">
            <button id="btn-easy" class="btn active" data-level="1">Easy</button>
            <button id="btn-medium" class="btn" data-level="2">Medium</button>
            <button id="btn-hard" class="btn" data-level="3">Hard</button>
        </div>

        <div id="bottom-center" class="panel">
            <div class="legend-item"><div class="color-box" style="background: #ff4444;"></div>Mammals</div>
            <div class="legend-item"><div class="color-box" style="background: #44ff44;"></div>Birds</div>
            <div class="legend-item"><div class="color-box" style="background: #4444ff;"></div>Reptiles</div>
            <div class="legend-item"><div class="color-box" style="background: #ffff44;"></div>Fish</div>
            <div class="legend-item"><div class="color-box" style="background: #ff44ff;"></div>Insects</div>
            <div class="legend-item"><div class="color-box" style="background: #888888;"></div>Ancestor</div>
        </div>

        <div id="controls-help">
            [R] Reset Camera | [T] Toggle Labels | [A] Toggle Auto-Rotate
        </div>
    </div>

    <div id="tooltip">
        <h3 id="tt-name">Node Name</h3>
        <p>Group: <span id="tt-group">Group</span></p>
        <p>Depth: <span id="tt-depth">0</span></p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import * as TWEEN from '@tweenjs/tween.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            difficultyLevel: 1,
            totalNodes: 0,
            totalLeaves: 0,
            selectedNodeName: null,
            hoveredNodeName: null,
            labelsVisible: true,
            autoRotate: false,
            cameraPosition: { x: 0, y: 5, z: 20 },
            treeDepth: 3,
            speciesGroups: 5
        };

        // --- Constants & Config ---
        const GROUPS = [
            { name: 'Mammals', color: 0xff4444 },
            { name: 'Birds', color: 0x44ff44 },
            { name: 'Reptiles', color: 0x4444ff },
            { name: 'Fish', color: 0xffff44 },
            { name: 'Insects', color: 0xff44ff }
        ];
        const ANCESTOR_COLOR = 0x888888;
        const SELECTED_COLOR = 0xffff00;
        const NODE_RADIUS = 0.3;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 5, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 15, 10);
        scene.add(dirLight);

        // --- Tree Generation ---
        let currentTreeGroup = new THREE.Group();
        scene.add(currentTreeGroup);
        let interactableNodes = [];
        let labels = [];
        let selectedNodeMesh = null;

        const sphereGeo = new THREE.SphereGeometry(NODE_RADIUS, 32, 16);
        const cylinderGeo = new THREE.CylinderGeometry(0.05, 0.05, 1, 8);
        cylinderGeo.translate(0, 0.5, 0); // Pivot at base

        function generateName(depth, group) {
            if (depth === 0) return "LUCA";
            if (group) return `${group.name.slice(0,3)}-${Math.floor(Math.random()*1000)}`;
            return `Ancestor-${Math.floor(Math.random()*1000)}`;
        }

        function createTextSprite(message, color) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 64;
            
            context.font = "Bold 24px Arial";
            context.fillStyle = "rgba(0,0,0,0.5)";
            context.roundRect(0, 0, canvas.width, canvas.height, 10);
            context.fill();
            
            context.fillStyle = "#ffffff";
            context.textAlign = "center";
            context.textBaseline = "middle";
            context.fillText(message, canvas.width / 2, canvas.height / 2);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(2, 0.5, 1);
            return sprite;
        }

        function buildTreeData(level) {
            let maxDepth, minBranches, maxBranches, uniformLength;
            
            if (level === 1) {
                maxDepth = 3; minBranches = 2; maxBranches = 2; uniformLength = true;
            } else if (level === 2) {
                maxDepth = 4; minBranches = 2; maxBranches = 3; uniformLength = false;
            } else {
                maxDepth = 5; minBranches = 2; maxBranches = 4; uniformLength = false;
            }

            window.__3D_STATE__.treeDepth = maxDepth;
            let nodeCount = 0;
            let leafCount = 0;

            function createNode(depth, parentPos, baseAngle, spreadAngle) {
                nodeCount++;
                const isLeaf = depth === maxDepth;
                if (isLeaf) leafCount++;

                const group = isLeaf ? GROUPS[Math.floor(Math.random() * GROUPS.length)] : null;
                const name = generateName(depth, group);
                
                let pos = new THREE.Vector3();
                if (depth === 0) {
                    pos.set(0, 0, 0);
                } else {
                    const yStep = uniformLength ? 3 : 2 + Math.random() * 2;
                    const radius = uniformLength ? (maxDepth - depth + 1) * 1.5 : (maxDepth - depth + 1) * (1 + Math.random());
                    
                    // Allow crossing in hard mode by adding randomness to angle
                    const angleJitter = (level === 3) ? (Math.random() - 0.5) * spreadAngle * 0.5 : 0;
                    const finalAngle = baseAngle + angleJitter;

                    pos.set(
                        parentPos.x + Math.cos(finalAngle) * radius,
                        parentPos.y + yStep,
                        parentPos.z + Math.sin(finalAngle) * radius
                    );
                }

                const node = { id: nodeCount, name, depth, group, pos, children: [] };

                if (!isLeaf) {
                    const numChildren = Math.floor(Math.random() * (maxBranches - minBranches + 1)) + minBranches;
                    const childSpread = spreadAngle / numChildren;
                    const startAngle = baseAngle - spreadAngle / 2 + childSpread / 2;

                    for (let i = 0; i < numChildren; i++) {
                        const childAngle = startAngle + i * childSpread;
                        // Root spreads 360, others spread less
                        const nextSpread = depth === 0 ? Math.PI * 2 : spreadAngle * 0.8; 
                        node.children.push(createNode(depth + 1, pos, childAngle, nextSpread));
                    }
                }
                return node;
            }

            const root = createNode(0, new THREE.Vector3(), 0, Math.PI * 2);
            window.__3D_STATE__.totalNodes = nodeCount;
            window.__3D_STATE__.totalLeaves = leafCount;
            return root;
        }

        function renderTree(nodeData, group, parentMesh = null) {
            const color = nodeData.group ? nodeData.group.color : ANCESTOR_COLOR;
            
            // Node Mesh
            const mat = new THREE.MeshStandardMaterial({ 
                color: color, 
                roughness: 0.4, 
                metalness: 0.1,
                transparent: true,
                opacity: 0
            });
            const mesh = new THREE.Mesh(sphereGeo, mat);
            mesh.position.copy(nodeData.pos);
            
            mesh.userData = {
                name: nodeData.name,
                depth: nodeData.depth,
                groupName: nodeData.group ? nodeData.group.name : 'Ancestor',
                baseColor: color,
                isNode: true
            };
            
            group.add(mesh);
            interactableNodes.push(mesh);

            // Label
            const label = createTextSprite(nodeData.name, color);
            label.position.copy(nodeData.pos);
            label.position.y += 0.6;
            label.material.opacity = 0;
            label.visible = window.__3D_STATE__.labelsVisible;
            group.add(label);
            labels.push(label);

            // Branch
            if (parentMesh) {
                const distance = parentMesh.position.distanceTo(mesh.position);
                const branchMat = new THREE.MeshStandardMaterial({ 
                    color: 0x555555, 
                    transparent: true, 
                    opacity: 0 
                });
                const branch = new THREE.Mesh(cylinderGeo, branchMat);
                
                branch.position.copy(parentMesh.position);
                branch.scale.y = distance;
                
                const dir = new THREE.Vector3().subVectors(mesh.position, parentMesh.position).normalize();
                branch.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
                
                group.add(branch);
            }

            nodeData.children.forEach(child => renderTree(child, group, mesh));
        }

        function setTreeOpacity(group, opacity) {
            group.traverse((child) => {
                if (child.material) {
                    child.material.opacity = opacity;
                }
            });
        }

        function generateTree(level) {
            const oldGroup = currentTreeGroup;
            const newGroup = new THREE.Group();
            
            interactableNodes = [];
            labels = [];
            selectedNodeMesh = null;
            window.__3D_STATE__.selectedNodeName = null;
            updateUI();

            const treeData = buildTreeData(level);
            renderTree(treeData, newGroup);
            
            scene.add(newGroup);
            currentTreeGroup = newGroup;

            // Fade transition
            new TWEEN.Tween({ opacity: 1 })
                .to({ opacity: 0 }, 1000)
                .onUpdate((obj) => setTreeOpacity(oldGroup, obj.opacity))
                .onComplete(() => scene.remove(oldGroup))
                .start();

            new TWEEN.Tween({ opacity: 0 })
                .to({ opacity: 1 }, 1000)
                .onUpdate((obj) => setTreeOpacity(newGroup, obj.opacity))
                .start();
        }

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredMesh = null;

        const tooltip = document.getElementById('tooltip');
        const ttName = document.getElementById('tt-name');
        const ttGroup = document.getElementById('tt-group');
        const ttDepth = document.getElementById('tt-depth');

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            tooltip.style.left = event.clientX + 'px';
            tooltip.style.top = event.clientY + 'px';
        }

        function onClick(event) {
            if (hoveredMesh) {
                if (selectedNodeMesh === hoveredMesh) {
                    // Deselect
                    selectedNodeMesh.material.color.setHex(selectedNodeMesh.userData.baseColor);
                    selectedNodeMesh = null;
                    window.__3D_STATE__.selectedNodeName = null;
                } else {
                    // Select new
                    if (selectedNodeMesh) {
                        selectedNodeMesh.material.color.setHex(selectedNodeMesh.userData.baseColor);
                    }
                    selectedNodeMesh = hoveredMesh;
                    selectedNodeMesh.material.color.setHex(SELECTED_COLOR);
                    window.__3D_STATE__.selectedNodeName = selectedNodeMesh.userData.name;
                }
                updateUI();
            }
        }

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('click', onClick);

        // --- Keyboard Controls ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'r') {
                new TWEEN.Tween(camera.position)
                    .to({ x: 0, y: 5, z: 20 }, 1000)
                    .easing(TWEEN.Easing.Cubic.Out)
                    .start();
                new TWEEN.Tween(controls.target)
                    .to({ x: 0, y: 5, z: 0 }, 1000)
                    .easing(TWEEN.Easing.Cubic.Out)
                    .start();
            } else if (key === 't') {
                window.__3D_STATE__.labelsVisible = !window.__3D_STATE__.labelsVisible;
                labels.forEach(l => l.visible = window.__3D_STATE__.labelsVisible);
            } else if (key === 'a') {
                window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
            }
        });

        // --- UI Logic ---
        const btns = document.querySelectorAll('.btn');
        btns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                btns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                const level = parseInt(e.target.dataset.level);
                window.__3D_STATE__.difficultyLevel = level;
                document.getElementById('ui-diff').innerText = e.target.innerText;
                generateTree(level);
            });
        });

        function updateUI() {
            document.getElementById('ui-nodes').innerText = window.__3D_STATE__.totalNodes;
            document.getElementById('ui-selected').innerText = window.__3D_STATE__.selectedNodeName || 'None';
        }

        // --- Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            TWEEN.update();
            controls.update();

            if (window.__3D_STATE__.autoRotate) {
                currentTreeGroup.rotation.y += 0.5 * delta;
            }

            // Raycasting
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactableNodes);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                if (hoveredMesh !== object) {
                    if (hoveredMesh && hoveredMesh !== selectedNodeMesh) {
                        hoveredMesh.scale.set(1, 1, 1);
                        hoveredMesh.material.emissive.setHex(0x000000);
                    }
                    hoveredMesh = object;
                    if (hoveredMesh !== selectedNodeMesh) {
                        hoveredMesh.scale.set(1.5, 1.5, 1.5);
                        hoveredMesh.material.emissive.setHex(0x333333);
                    }
                    
                    // Tooltip
                    ttName.innerText = hoveredMesh.userData.name;
                    ttGroup.innerText = hoveredMesh.userData.groupName;
                    ttDepth.innerText = hoveredMesh.userData.depth;
                    tooltip.style.display = 'block';
                    
                    window.__3D_STATE__.hoveredNodeName = hoveredMesh.userData.name;
                }
            } else {
                if (hoveredMesh) {
                    if (hoveredMesh !== selectedNodeMesh) {
                        hoveredMesh.scale.set(1, 1, 1);
                        hoveredMesh.material.emissive.setHex(0x000000);
                    }
                    hoveredMesh = null;
                    tooltip.style.display = 'none';
                    window.__3D_STATE__.hoveredNodeName = null;
                }
            }

            // Update State
            window.__3D_STATE__.cameraPosition = { x: camera.position.x, y: camera.position.y, z: camera.position.z };

            renderer.render(scene, camera);
        }

        // Init
        generateTree(1);
        animate();

    </script>
</body>
</html>
