<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Phylogenetic Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #hud-top-left {
    position: absolute; top: 15px; left: 15px;
    color: #ccc; font-size: 14px; line-height: 1.8;
    background: rgba(10,10,26,0.85); padding: 12px 18px;
    border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
    pointer-events: none; min-width: 220px;
  }
  #hud-top-left span { color: #fff; font-weight: bold; }

  #hud-top-right {
    position: absolute; top: 15px; right: 15px;
    display: flex; gap: 10px;
  }
  .diff-btn {
    padding: 10px 22px; font-size: 14px; font-weight: bold;
    background: rgba(10,10,26,0.9); color: #fff;
    border: 2px solid; border-radius: 8px; cursor: pointer;
    transition: all 0.3s ease;
  }
  .diff-btn:hover { transform: scale(1.05); }
  .diff-btn.active { background: rgba(255,255,255,0.15); }
  #btn-easy { border-color: #44ff44; }
  #btn-easy:hover, #btn-easy.active { box-shadow: 0 0 15px rgba(68,255,68,0.4); }
  #btn-medium { border-color: #ff8844; }
  #btn-medium:hover, #btn-medium.active { box-shadow: 0 0 15px rgba(255,136,68,0.4); }
  #btn-hard { border-color: #ff4444; }
  #btn-hard:hover, #btn-hard.active { box-shadow: 0 0 15px rgba(255,68,68,0.4); }

  #legend {
    position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 18px; background: rgba(10,10,26,0.85);
    padding: 10px 24px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; color: #ccc; font-size: 13px; }
  .legend-color { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); }

  #tooltip {
    position: absolute; display: none; pointer-events: none;
    background: rgba(10,10,26,0.95); color: #fff; padding: 10px 14px;
    border-radius: 8px; font-size: 13px; line-height: 1.6;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #tooltip .tt-name { font-weight: bold; font-size: 14px; margin-bottom: 2px; }
  #tooltip .tt-group { opacity: 0.8; }
</style>
</head>
<body>

<div id="hud-top-left">
  Difficulty: <span id="info-difficulty">Easy (Level 1)</span><br>
  Total Nodes: <span id="info-nodes">0</span><br>
  Selected: <span id="info-selected">None</span>
</div>

<div id="hud-top-right">
  <button class="diff-btn active" id="btn-easy" onclick="setDifficulty(1)">Easy</button>
  <button class="diff-btn" id="btn-medium" onclick="setDifficulty(2)">Medium</button>
  <button class="diff-btn" id="btn-hard" onclick="setDifficulty(3)">Hard</button>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-color" style="background:#ff4444"></div>Mammals</div>
  <div class="legend-item"><div class="legend-color" style="background:#44ff44"></div>Birds</div>
  <div class="legend-item"><div class="legend-color" style="background:#4444ff"></div>Reptiles</div>
  <div class="legend-item"><div class="legend-color" style="background:#ffff44"></div>Fish</div>
  <div class="legend-item"><div class="legend-color" style="background:#ff44ff"></div>Insects</div>
</div>

<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-group" id="tt-group"></div>
  <div class="tt-depth" id="tt-depth"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {

// --- Global State ---
window.__3D_STATE__ = {
  difficultyLevel: 1,
  totalNodes: 0,
  totalLeaves: 0,
  selectedNodeName: null,
  hoveredNodeName: null,
  labelsVisible: true,
  autoRotate: false,
  cameraPosition: { x: 0, y: 5, z: 20 },
  treeDepth: 3,
  speciesGroups: 5
};

// --- Species Data ---
const speciesGroups = [
  { name: 'Mammals', color: 0xff4444, species: ['Lion', 'Whale', 'Bat', 'Elephant', 'Wolf', 'Bear', 'Dolphin', 'Tiger', 'Panda', 'Fox', 'Deer', 'Otter', 'Seal', 'Moose', 'Rabbit'] },
  { name: 'Birds', color: 0x44ff44, species: ['Eagle', 'Parrot', 'Penguin', 'Owl', 'Hawk', 'Sparrow', 'Crow', 'Flamingo', 'Heron', 'Robin', 'Dove', 'Falcon', 'Swan', 'Finch', 'Pelican'] },
  { name: 'Reptiles', color: 0x4444ff, species: ['Cobra', 'Turtle', 'Gecko', 'Iguana', 'Croc', 'Python', 'Lizard', 'Viper', 'Chameleon', 'Tortoise', 'Skink', 'Anole', 'Monitor', 'Boa', 'Rattler'] },
  { name: 'Fish', color: 0xffff44, species: ['Shark', 'Salmon', 'Tuna', 'Clown', 'Swordfish', 'Bass', 'Trout', 'Cod', 'Marlin', 'Pike', 'Perch', 'Catfish', 'Eel', 'Carp', 'Mahi'] },
  { name: 'Insects', color: 0xff44ff, species: ['Beetle', 'Butterfly', 'Ant', 'Moth', 'Dragonfly', 'Wasp', 'Cricket', 'Mantis', 'Firefly', 'Ladybug', 'Cicada', 'Hornet', 'Flea', 'Aphid', 'Weevil'] }
];

const ancestorNames = ['Ancestor', 'Proto', 'Archaea', 'Paleo', 'Ancient', 'Primordial', 'Basal', 'Stem', 'Root', 'Origin',
  'Ur-form', 'Precursor', 'Progenitor', 'Founder', 'Pioneer', 'Elder', 'Prime', 'Genesis', 'Dawn', 'Core'];

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
const initialCameraPos = new THREE.Vector3(0, 5, 20);
camera.position.copy(initialCameraPos);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 15, 10);
scene.add(dirLight);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// --- Raycaster ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// --- Tree Data ---
let treeGroup = new THREE.Group();
scene.add(treeGroup);
let nodeMeshes = [];
let labelSprites = [];
let selectedNode = null;
let hoveredNode = null;
let currentDifficulty = 1;
let autoRotate = false;
let labelsVisible = true;
let transitioning = false;

// Camera animation
let cameraAnimating = false;
let cameraAnimStart = null;
let cameraAnimDuration = 1000;
let cameraStartPos = new THREE.Vector3();
let cameraEndPos = new THREE.Vector3();
let cameraStartTarget = new THREE.Vector3();
let cameraEndTarget = new THREE.Vector3();

// --- Utility ---
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

function createTextSprite(text, color) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 256;
  canvas.height = 64;
  ctx.font = 'bold 24px Arial';
  ctx.fillStyle = '#' + new THREE.Color(color || 0xffffff).getHexString();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 32);

  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  const material = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(material);
  sprite.scale.set(2.5, 0.625, 1);
  return sprite;
}

function createBranch(start, end, color) {
  const dir = new THREE.Vector3().subVectors(end, start);
  const length = dir.length();
  if (length < 0.001) return null;

  const geometry = new THREE.CylinderGeometry(0.05, 0.08, length, 8);
  const material = new THREE.MeshPhongMaterial({
    color: color || 0x666688,
    transparent: true,
    opacity: 1.0
  });
  const mesh = new THREE.Mesh(geometry, material);

  const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
  mesh.position.copy(mid);

  const axis = new THREE.Vector3(0, 1, 0);
  const normalized = dir.clone().normalize();
  const quaternion = new THREE.Quaternion().setFromUnitVectors(axis, normalized);
  mesh.quaternion.copy(quaternion);

  return mesh;
}

// --- Tree Generation ---
function generateTree(difficulty) {
  const rng = seededRandom(42 + difficulty * 137);
  let maxDepth, minBranches, maxBranches;

  if (difficulty === 1) {
    maxDepth = 3; minBranches = 2; maxBranches = 2;
  } else if (difficulty === 2) {
    maxDepth = 4; minBranches = 2; maxBranches = 3;
  } else {
    maxDepth = 5; minBranches = 2; maxBranches = 4;
  }

  let nodeId = 0;
  let usedSpecies = {};
  speciesGroups.forEach((g, i) => usedSpecies[i] = 0);

  function getSpeciesName(groupIdx) {
    const group = speciesGroups[groupIdx];
    const idx = usedSpecies[groupIdx] % group.species.length;
    usedSpecies[groupIdx]++;
    return group.species[idx];
  }

  function getAncestorName(depth) {
    return ancestorNames[nodeId % ancestorNames.length] + '-' + (nodeId + 1);
  }

  const nodes = [];

  function buildNode(depth, parentPos, angleOffset, spreadAngle) {
    const id = nodeId++;
    const isLeaf = depth >= maxDepth;

    let pos;
    if (depth === 0) {
      pos = new THREE.Vector3(0, 0, 0);
    } else {
      let yStep = difficulty === 1 ? 3.0 : (2.0 + rng() * 1.5);
      let spread = difficulty === 1 ? 2.5 : (1.5 + rng() * 2.0);
      if (difficulty === 3) spread *= 1.2;

      const angle = angleOffset;
      const x = parentPos.x + Math.sin(angle) * spread;
      const z = parentPos.z + Math.cos(angle) * spread;
      const y = parentPos.y + yStep;
      pos = new THREE.Vector3(x, y, z);
    }

    // Ensure finite
    if (!isFinite(pos.x)) pos.x = 0;
    if (!isFinite(pos.y)) pos.y = 0;
    if (!isFinite(pos.z)) pos.z = 0;

    let groupIdx = -1;
    let name;
    let color;

    if (isLeaf) {
      groupIdx = Math.floor(rng() * 5);
      name = getSpeciesName(groupIdx);
      color = speciesGroups[groupIdx].color;
    } else {
      name = getAncestorName(depth);
      color = 0x888888;
    }

    const node = {
      id, name, depth, isLeaf, groupIdx,
      groupName: isLeaf ? speciesGroups[groupIdx].name : 'Ancestor',
      color, position: pos, children: []
    };
    nodes.push(node);

    if (!isLeaf) {
      const numChildren = minBranches + Math.floor(rng() * (maxBranches - minBranches + 1));
      const baseAngle = rng() * Math.PI * 2;
      const childSpread = (Math.PI * 2) / numChildren;

      for (let i = 0; i < numChildren; i++) {
        const childAngle = baseAngle + i * childSpread + (rng() - 0.5) * 0.5;
        const child = buildNode(depth + 1, pos, childAngle, childSpread);
        node.children.push(child);
      }
    }

    return node;
  }

  const root = buildNode(0, new THREE.Vector3(0, 0, 0), 0, Math.PI * 2);

  return { root, nodes, maxDepth };
}

function buildTreeMeshes(treeData) {
  const group = new THREE.Group();
  const meshes = [];
  const sprites = [];

  const { nodes } = treeData;

  // Center tree
  let minY = Infinity, maxY = -Infinity;
  let centerX = 0, centerZ = 0;
  nodes.forEach(n => {
    if (n.position.y < minY) minY = n.position.y;
    if (n.position.y > maxY) maxY = n.position.y;
    centerX += n.position.x;
    centerZ += n.position.z;
  });
  centerX /= nodes.length;
  centerZ /= nodes.length;
  const offsetY = -(minY + maxY) / 2;

  nodes.forEach(n => {
    n.position.x -= centerX;
    n.position.z -= centerZ;
    n.position.y += offsetY;
  });

  // Create node spheres
  nodes.forEach(n => {
    const geometry = new THREE.SphereGeometry(0.3, 16, 16);
    const material = new THREE.MeshPhongMaterial({
      color: n.color,
      emissive: 0x000000,
      transparent: true,
      opacity: 0.0
    });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.copy(n.position);
    mesh.userData = {
      nodeData: n,
      originalColor: n.color,
      originalScale: 1.0
    };
    group.add(mesh);
    meshes.push(mesh);

    // Label
    const labelColor = n.isLeaf ? n.color : 0xaaaaaa;
    const sprite = createTextSprite(n.name, labelColor);
    sprite.position.copy(n.position);
    sprite.position.y += 0.6;
    sprite.material.opacity = 0.0;
    sprite.userData.targetOpacity = 1.0;
    group.add(sprite);
    sprites.push(sprite);
  });

  // Create branches
  function addBranches(node) {
    node.children.forEach(child => {
      const branch = createBranch(node.position, child.position, 0x556677);
      if (branch) {
        branch.material.opacity = 0.0;
        branch.userData.isBranch = true;
        group.add(branch);
      }
      addBranches(child);
    });
  }
  addBranches(treeData.root);

  return { group, meshes, sprites };
}

// --- Transition ---
function transitionToTree(difficulty) {
  if (transitioning) return;
  transitioning = true;
  currentDifficulty = difficulty;

  // Deselect
  if (selectedNode) {
    selectedNode.material.emissive.setHex(0x000000);
    selectedNode.material.color.setHex(selectedNode.userData.originalColor);
    selectedNode = null;
  }
  hoveredNode = null;
  window.__3D_STATE__.selectedNodeName = null;
  window.__3D_STATE__.hoveredNodeName = null;

  const oldGroup = treeGroup;
  const oldMeshes = nodeMeshes;
  const oldSprites = labelSprites;

  // Generate new tree
  const treeData = generateTree(difficulty);
  const { group: newGroup, meshes: newMeshes, sprites: newSprites } = buildTreeMeshes(treeData);
  scene.add(newGroup);

  // Update state
  const totalNodes = treeData.nodes.length;
  const totalLeaves = treeData.nodes.filter(n => n.isLeaf).length;

  window.__3D_STATE__.difficultyLevel = difficulty;
  window.__3D_STATE__.totalNodes = totalNodes;
  window.__3D_STATE__.totalLeaves = totalLeaves;
  window.__3D_STATE__.treeDepth = treeData.maxDepth;

  // Update HUD
  const diffNames = ['', 'Easy (Level 1)', 'Medium (Level 2)', 'Hard (Level 3)'];
  document.getElementById('info-difficulty').textContent = diffNames[difficulty];
  document.getElementById('info-nodes').textContent = totalNodes;

  // Buttons
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(['', 'btn-easy', 'btn-medium', 'btn-hard'][difficulty]).classList.add('active');

  // Animate transition
  const startTime = performance.now();
  const duration = 1000;

  function animateTransition(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1.0);
    const eased = t * t * (3 - 2 * t); // smoothstep

    // Fade out old
    oldGroup.traverse(child => {
      if (child.material && child.material.transparent) {
        child.material.opacity = 1.0 - eased;
      }
    });

    // Fade in new
    newGroup.traverse(child => {
      if (child.material && child.material.transparent) {
        if (child.isSprite) {
          child.material.opacity = labelsVisible ? eased : 0;
        } else {
          child.material.opacity = eased;
        }
      }
    });

    if (t < 1.0) {
      requestAnimationFrame(animateTransition);
    } else {
      // Remove old
      scene.remove(oldGroup);
      oldGroup.traverse(child => {
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
          if (child.material.map) child.material.map.dispose();
          child.material.dispose();
        }
      });

      treeGroup = newGroup;
      nodeMeshes = newMeshes;
      labelSprites = newSprites;
      transitioning = false;
    }
  }

  requestAnimationFrame(animateTransition);
}

window.setDifficulty = function(level) {
  if (level === currentDifficulty && !transitioning) return;
  transitionToTree(level);
};

// --- Mouse Events ---
const tooltip = document.getElementById('tooltip');

renderer.domElement.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodeMeshes);

  // Unhover previous
  if (hoveredNode && (!intersects.length || intersects[0].object !== hoveredNode)) {
    if (hoveredNode !== selectedNode) {
      hoveredNode.material.emissive.setHex(0x000000);
      hoveredNode.scale.set(1, 1, 1);
    }
    hoveredNode = null;
    window.__3D_STATE__.hoveredNodeName = null;
    tooltip.style.display = 'none';
  }

  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (obj.userData.nodeData) {
      hoveredNode = obj;
      window.__3D_STATE__.hoveredNodeName = obj.userData.nodeData.name;

      if (obj !== selectedNode) {
        obj.material.emissive.setHex(0x333333);
        obj.scale.set(1.5, 1.5, 1.5);
      }

      // Tooltip
      const nd = obj.userData.nodeData;
      document.getElementById('tt-name').textContent = nd.name;
      document.getElementById('tt-group').textContent = 'Group: ' + nd.groupName;
      document.getElementById('tt-depth').textContent = 'Depth: ' + nd.depth;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 15) + 'px';
      tooltip.style.top = (e.clientY + 15) + 'px';
    }
  }
});

renderer.domElement.addEventListener('click', (e) => {
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodeMeshes);

  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (obj.userData.nodeData) {
      // Deselect previous
      if (selectedNode) {
        selectedNode.material.color.setHex(selectedNode.userData.originalColor);
        selectedNode.material.emissive.setHex(0x000000);
        selectedNode.scale.set(1, 1, 1);

        if (selectedNode === obj) {
          selectedNode = null;
          window.__3D_STATE__.selectedNodeName = null;
          document.getElementById('info-selected').textContent = 'None';
          return;
        }
      }

      // Select new
      selectedNode = obj;
      obj.material.color.setHex(0xffff00);
      obj.material.emissive.setHex(0x444400);
      obj.scale.set(1.5, 1.5, 1.5);
      window.__3D_STATE__.selectedNodeName = obj.userData.nodeData.name;
      document.getElementById('info-selected').textContent = obj.userData.nodeData.name;
    }
  }
});

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();

  if (key === 'r') {
    // Reset camera
    cameraAnimating = true;
    cameraAnimStart = performance.now();
    cameraStartPos.copy(camera.position);
    cameraEndPos.copy(initialCameraPos);
    cameraStartTarget.copy(controls.target);
    cameraEndTarget.set(0, 0, 0);
  }

  if (key === 't') {
    labelsVisible = !labelsVisible;
    window.__3D_STATE__.labelsVisible = labelsVisible;
    labelSprites.forEach(s => {
      s.material.opacity = labelsVisible ? 1.0 : 0.0;
    });
  }

  if (key === 'a') {
    autoRotate = !autoRotate;
    window.__3D_STATE__.autoRotate = autoRotate;
  }
});

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  // Camera animation
  if (cameraAnimating) {
    const elapsed = performance.now() - cameraAnimStart;
    const t = Math.min(elapsed / cameraAnimDuration, 1.0);
    const eased = t * t * (3 - 2 * t);

    camera.position.lerpVectors(cameraStartPos, cameraEndPos, eased);
    controls.target.lerpVectors(cameraStartTarget, cameraEndTarget, eased);

    if (t >= 1.0) {
      cameraAnimating = false;
    }
  }

  // Auto rotate
  if (autoRotate && treeGroup) {
    treeGroup.rotation.y += 0.5 * delta;
  }

  controls.update();

  // Update state
  window.__3D_STATE__.cameraPosition = {
    x: parseFloat(camera.position.x.toFixed(3)),
    y: parseFloat(camera.position.y.toFixed(3)),
    z: parseFloat(camera.position.z.toFixed(3))
  };

  renderer.render(scene, camera);
}

// --- Init ---
transitionToTree(1);
animate();

})();
</script>
</body>
</html>
