<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Headphone Materials Demo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #hud h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #FFD700;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        .hud-label {
            color: #aaa;
        }
        .hud-value {
            font-weight: bold;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }
        .mat-btn {
            background: #333;
            color: white;
            border: 3px solid transparent;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .mat-btn:hover {
            background: #444;
        }
        .mat-btn.active {
            border-color: #FFD700;
            background: #555;
        }
        #instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #ccc;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
            text-align: right;
        }
        kbd {
            background: #444;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
            font-family: monospace;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <h3>Status</h3>
        <div class="hud-row"><span class="hud-label">Material:</span> <span class="hud-value" id="hud-mat">Leather</span></div>
        <div class="hud-row"><span class="hud-label">Lighting:</span> <span class="hud-value" id="hud-light">Warm Studio</span></div>
        <div class="hud-row"><span class="hud-label">Auto-Rotate:</span> <span class="hud-value" id="hud-rot">ON</span></div>
        <div class="hud-row"><span class="hud-label">Explode View:</span> <span class="hud-value" id="hud-exp">OFF</span></div>
    </div>

    <div id="instructions">
        <div><kbd>R</kbd> Toggle Rotation</div>
        <div style="margin-top:5px"><kbd>E</kbd> Toggle Explode View</div>
        <div style="margin-top:5px"><kbd>L</kbd> Cycle Lighting</div>
        <div style="margin-top:5px">Click swatches to apply</div>
    </div>

    <div id="controls"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            activeMaterialIndex: 0,
            activeMaterialName: 'Leather',
            autoRotate: true,
            rotationAngle: 0,
            explodeMode: false,
            lightingPreset: 'Warm Studio',
            lightingPresetIndex: 0,
            swatchCount: 5,
            platformVisible: true,
            spotLightIntensity: 1.5,
            cameraDistance: 0
        };

        const state = window.__3D_STATE__;

        // --- Data Definitions ---
        const materialsData = [
            { name: 'Leather', color: 0x3e2723, roughness: 0.7, metalness: 0.0 },
            { name: 'Brushed Aluminum', color: 0xaaaaaa, roughness: 0.3, metalness: 0.95 },
            { name: 'Matte Plastic', color: 0x111111, roughness: 0.9, metalness: 0.0 },
            { name: 'Carbon Fiber', color: 0x333333, roughness: 0.4, metalness: 0.3 },
            { name: 'Rose Gold', color: 0xB76E79, roughness: 0.2, metalness: 0.9 }
        ];

        const lightingPresets = [
            { name: 'Warm Studio', dir1: {c: 0xFFE4C4, i: 1.2}, dir2: {c: 0xB0C4DE, i: 0.6}, amb: 0.5, spot: 1.5 },
            { name: 'Cool Showroom', dir1: {c: 0xB0C4DE, i: 1.2}, dir2: {c: 0xFFE4C4, i: 0.6}, amb: 0.6, spot: 1.0 },
            { name: 'Dramatic', dir1: {c: 0xFFFFFF, i: 0.0}, dir2: {c: 0xFFFFFF, i: 0.0}, amb: 0.0, spot: 3.0 }
        ];

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.03);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 4, 7);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 2, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1; // Don't go too far below ground
        controls.minDistance = 3;
        controls.maxDistance = 15;

        // --- Lighting ---
        const dirLightWarm = new THREE.DirectionalLight(0xFFE4C4, 1.2);
        dirLightWarm.position.set(5, 8, 5);
        dirLightWarm.castShadow = true;
        dirLightWarm.shadow.mapSize.width = 2048;
        dirLightWarm.shadow.mapSize.height = 2048;
        scene.add(dirLightWarm);

        const dirLightCool = new THREE.DirectionalLight(0xB0C4DE, 0.6);
        dirLightCool.position.set(-5, 3, -3);
        scene.add(dirLightCool);

        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xFFFFFF, 1.5);
        spotLight.position.set(0, 10, 0);
        spotLight.angle = Math.PI / 6;
        spotLight.penumbra = 0.5;
        spotLight.castShadow = true;
        scene.add(spotLight);

        // --- Objects ---
        const turntable = new THREE.Group();
        scene.add(turntable);

        // Platform
        const platformGeo = new THREE.CylinderGeometry(3, 3, 0.3, 64);
        const platformMat = new THREE.MeshStandardMaterial({
            color: 0x3d2314, // Dark brown
            roughness: 0.8,
            metalness: 0.1
        });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = 0.15; // Half height so top is at 0.3
        platform.receiveShadow = true;
        turntable.add(platform);

        // Model
        let loadedModel = null;
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/facecap.glb',
            (gltf) => {
                loadedModel = gltf.scene;
                loadedModel.scale.setScalar(2.0);
                loadedModel.position.y = 0.3; // On top of platform
                
                loadedModel.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                turntable.add(loadedModel);
                state.modelLoaded = true;
                applyMaterial(state.activeMaterialIndex); // Apply initial material
            },
            undefined,
            (error) => console.error('Error loading model:', error)
        );

        // Swatches
        const swatches = [];
        const swatchBasePositions = [];
        const swatchGeo = new THREE.SphereGeometry(0.3, 32, 32);

        materialsData.forEach((matData, i) => {
            const mat = new THREE.MeshStandardMaterial({
                color: matData.color,
                roughness: matData.roughness,
                metalness: matData.metalness
            });
            const mesh = new THREE.Mesh(swatchGeo, mat);
            mesh.castShadow = true;
            
            // Calculate arc position
            // x from -3 to 3
            const x = -3 + (i * 1.5);
            // slight curve in y and z to make an arc
            const y = 4 - Math.abs(x) * 0.1;
            const z = -1.5 - Math.abs(x) * 0.2;
            
            const pos = new THREE.Vector3(x, y, z);
            mesh.position.copy(pos);
            
            swatchBasePositions.push(pos.clone());
            mesh.userData = { 
                index: i, 
                basePos: pos.clone(),
                currentLerpPos: pos.clone(),
                phaseOffset: i * 0.8
            };
            
            scene.add(mesh);
            swatches.push(mesh);
        });

        // --- UI & Interaction ---
        const controlsDiv = document.getElementById('controls');
        const buttons = [];

        materialsData.forEach((mat, i) => {
            const btn = document.createElement('button');
            btn.className = 'mat-btn' + (i === 0 ? ' active' : '');
            btn.textContent = mat.name;
            btn.onclick = () => applyMaterial(i);
            controlsDiv.appendChild(btn);
            buttons.push(btn);
        });

        function applyMaterial(index) {
            state.activeMaterialIndex = index;
            state.activeMaterialName = materialsData[index].name;
            
            buttons.forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });

            if (loadedModel) {
                const matData = materialsData[index];
                const newMat = new THREE.MeshStandardMaterial({
                    color: matData.color,
                    roughness: matData.roughness,
                    metalness: matData.metalness
                });
                
                loadedModel.traverse((child) => {
                    if (child.isMesh) {
                        child.material = newMat;
                    }
                });
            }
            updateHUD();
        }

        function updateLighting() {
            const p = lightingPresets[state.lightingPresetIndex];
            state.lightingPreset = p.name;
            
            dirLightWarm.color.setHex(p.dir1.c);
            dirLightWarm.intensity = p.dir1.i;
            
            dirLightCool.color.setHex(p.dir2.c);
            dirLightCool.intensity = p.dir2.i;
            
            ambientLight.intensity = p.amb;
            spotLight.intensity = p.spot;
            state.spotLightIntensity = p.spot;
            
            updateHUD();
        }

        function updateHUD() {
            document.getElementById('hud-mat').textContent = state.activeMaterialName;
            document.getElementById('hud-light').textContent = state.lightingPreset;
            document.getElementById('hud-rot').textContent = state.autoRotate ? 'ON' : 'OFF';
            document.getElementById('hud-exp').textContent = state.explodeMode ? 'ON' : 'OFF';
        }

        // Raycaster for clicking swatches
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(swatches);

            if (intersects.length > 0) {
                applyMaterial(intersects[0].object.userData.index);
            }
        });

        // Keyboard controls
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'r') {
                state.autoRotate = !state.autoRotate;
                updateHUD();
            } else if (key === 'e') {
                state.explodeMode = !state.explodeMode;
                updateHUD();
            } else if (key === 'l') {
                state.lightingPresetIndex = (state.lightingPresetIndex + 1) % lightingPresets.length;
                updateLighting();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let currentModelScale = 2.0;

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Turntable rotation
            if (state.autoRotate) {
                turntable.rotation.y += 0.3 * delta;
            }
            state.rotationAngle = turntable.rotation.y;

            // Explode logic
            const targetScale = state.explodeMode ? 2.6 : 2.0;
            currentModelScale += (targetScale - currentModelScale) * 0.1;
            if (loadedModel) {
                loadedModel.scale.setScalar(currentModelScale);
            }

            // Swatch animation (explode + bobbing)
            swatches.forEach((swatch) => {
                const data = swatch.userData;
                const targetPos = state.explodeMode ? 
                    data.basePos.clone().multiplyScalar(1.5) : 
                    data.basePos.clone();
                
                // Lerp towards target position
                data.currentLerpPos.lerp(targetPos, 0.1);
                
                // Apply base position
                swatch.position.copy(data.currentLerpPos);
                
                // Add bobbing on Y axis
                swatch.position.y += Math.sin(time * 2 + data.phaseOffset) * 0.15;
            });

            // Update state
            state.cameraDistance = camera.position.distanceTo(controls.target);

            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize
        updateLighting();
        updateHUD();
        animate();

    </script>
</body>
</html>
