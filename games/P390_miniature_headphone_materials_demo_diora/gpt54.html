<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Headphone Materials Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
      min-width: 220px;
      backdrop-filter: blur(4px);
    }

    #controls {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      z-index: 10;
      padding: 8px 12px;
      background: rgba(0,0,0,0.35);
      border-radius: 14px;
      backdrop-filter: blur(4px);
    }

    .mat-btn {
      background: #1e1e1e;
      color: #f1f1f1;
      border: 2px solid #555;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .mat-btn:hover {
      transform: translateY(-2px);
      background: #2a2a2a;
      border-color: #aaa;
    }

    .mat-btn.active {
      border: 3px solid #FFD700;
      background: #2f2410;
    }

    #help {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.5;
      color: #ddd;
      max-width: 220px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div><strong>Material:</strong> <span id="hud-material">Leather</span></div>
      <div><strong>Lighting:</strong> <span id="hud-lighting">Warm Studio</span></div>
      <div><strong>Rotation:</strong> <span id="hud-rotation">ON</span></div>
      <div><strong>Explode:</strong> <span id="hud-explode">OFF</span></div>
    </div>

    <div id="help">
      <div><strong>Keys</strong></div>
      <div>R — Toggle rotation</div>
      <div>E — Toggle explode</div>
      <div>L — Cycle lighting</div>
      <div>Click swatches or buttons to apply materials</div>
    </div>

    <div id="controls"></div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const controlsBar = document.getElementById('controls');

    const hudMaterial = document.getElementById('hud-material');
    const hudLighting = document.getElementById('hud-lighting');
    const hudRotation = document.getElementById('hud-rotation');
    const hudExplode = document.getElementById('hud-explode');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101214);
    scene.fog = new THREE.Fog(0x101214, 10, 22);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 4, 7);
    camera.lookAt(0, 2, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const orbit = new OrbitControls(camera, renderer.domElement);
    orbit.target.set(0, 2, 0);
    orbit.enableDamping = true;
    orbit.minDistance = 4;
    orbit.maxDistance = 15;

    const turntableGroup = new THREE.Group();
    scene.add(turntableGroup);

    const platformGeo = new THREE.CylinderGeometry(3, 3, 0.3, 64);
    const platformMat = new THREE.MeshStandardMaterial({
      color: 0x3a2416,
      roughness: 0.8,
      metalness: 0.05
    });
    const platform = new THREE.Mesh(platformGeo, platformMat);
    platform.position.y = 0.15;
    platform.receiveShadow = true;
    platform.castShadow = true;
    turntableGroup.add(platform);

    const baseRing = new THREE.Mesh(
      new THREE.TorusGeometry(3.02, 0.06, 16, 100),
      new THREE.MeshStandardMaterial({ color: 0x1b120c, roughness: 0.85, metalness: 0.1 })
    );
    baseRing.rotation.x = Math.PI / 2;
    baseRing.position.y = 0.31;
    turntableGroup.add(baseRing);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(12, 80),
      new THREE.MeshStandardMaterial({ color: 0x181818, roughness: 0.95, metalness: 0.0 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const warmDirLight = new THREE.DirectionalLight(0xFFE4C4, 1.2);
    warmDirLight.position.set(5, 8, 5);
    warmDirLight.castShadow = true;
    warmDirLight.shadow.mapSize.set(1024, 1024);
    warmDirLight.shadow.camera.near = 0.5;
    warmDirLight.shadow.camera.far = 30;
    scene.add(warmDirLight);

    const coolFillLight = new THREE.DirectionalLight(0xB0C4DE, 0.6);
    coolFillLight.position.set(-5, 3, -3);
    scene.add(coolFillLight);

    const spotLight = new THREE.SpotLight(0xFFFFFF, 1.5, 30, Math.PI / 6, 0.25, 1.5);
    spotLight.position.set(0, 10, 0);
    spotLight.castShadow = true;
    spotLight.shadow.mapSize.set(1024, 1024);
    scene.add(spotLight);

    const spotTarget = new THREE.Object3D();
    spotTarget.position.set(0, 1.5, 0);
    scene.add(spotTarget);
    spotLight.target = spotTarget;

    const materialDefs = [
      { name: 'Leather', color: 0x4a2c1f, roughness: 0.7, metalness: 0.0 },
      { name: 'Brushed Aluminum', color: 0xb8bcc2, roughness: 0.3, metalness: 0.95 },
      { name: 'Matte Plastic', color: 0x111111, roughness: 0.9, metalness: 0.0 },
      { name: 'Carbon Fiber', color: 0x2f3133, roughness: 0.4, metalness: 0.3 },
      { name: 'Rose Gold', color: 0xB76E79, roughness: 0.2, metalness: 0.9 }
    ];

    const createdMaterials = materialDefs.map(def =>
      new THREE.MeshStandardMaterial({
        color: def.color,
        roughness: def.roughness,
        metalness: def.metalness
      })
    );

    let modelRoot = null;
    let modelLoaded = false;
    let autoRotate = true;
    let explodeMode = false;
    let lightingPresetIndex = 0;
    let activeMaterialIndex = 0;
    let baseModelScale = 2.0;

    const swatches = [];
    const swatchClickable = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock = new THREE.Clock();

    const swatchGroup = new THREE.Group();
    scene.add(swatchGroup);

    const swatchXs = [-3, -1.5, 0, 1.5, 3];
    const swatchZs = [-1.8, -2.2, -2.5, -2.2, -1.8];

    materialDefs.forEach((def, i) => {
      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 32, 32),
        new THREE.MeshStandardMaterial({
          color: def.color,
          roughness: def.roughness,
          metalness: def.metalness,
          emissive: new THREE.Color(def.color).multiplyScalar(0.03)
        })
      );
      sphere.castShadow = true;
      sphere.receiveShadow = true;
      sphere.position.set(swatchXs[i], 4, swatchZs[i]);
      sphere.userData = {
        swatchIndex: i,
        basePos: sphere.position.clone(),
        phase: i * 0.8
      };
      swatchGroup.add(sphere);
      swatches.push(sphere);
      swatchClickable.push(sphere);
    });

    function applyMaterialToModel(index) {
      activeMaterialIndex = index;
      const source = materialDefs[index];

      if (modelRoot) {
        modelRoot.traverse((child) => {
          if (child.isMesh) {
            child.material = new THREE.MeshStandardMaterial({
              color: source.color,
              roughness: source.roughness,
              metalness: source.metalness
            });
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
      }

      updateButtons();
      updateHUD();
    }

    function updateButtons() {
      const buttons = document.querySelectorAll('.mat-btn');
      buttons.forEach((btn, i) => {
        btn.classList.toggle('active', i === activeMaterialIndex);
      });
    }

    function updateHUD() {
      hudMaterial.textContent = materialDefs[activeMaterialIndex].name;
      hudLighting.textContent = getLightingPresetName();
      hudRotation.textContent = autoRotate ? 'ON' : 'OFF';
      hudExplode.textContent = explodeMode ? 'ON' : 'OFF';
    }

    materialDefs.forEach((def, i) => {
      const btn = document.createElement('button');
      btn.className = 'mat-btn' + (i === 0 ? ' active' : '');
      btn.textContent = def.name;
      btn.addEventListener('click', () => applyMaterialToModel(i));
      controlsBar.appendChild(btn);
    });

    function getLightingPresetName() {
      return ['Warm Studio', 'Cool Showroom', 'Dramatic'][lightingPresetIndex];
    }

    function applyLightingPreset(index) {
      lightingPresetIndex = index % 3;

      if (lightingPresetIndex === 0) {
        ambientLight.color.setHex(0x404040);
        ambientLight.intensity = 0.5;

        warmDirLight.color.setHex(0xFFE4C4);
        warmDirLight.intensity = 1.2;
        warmDirLight.position.set(5, 8, 5);

        coolFillLight.color.setHex(0xB0C4DE);
        coolFillLight.intensity = 0.6;
        coolFillLight.position.set(-5, 3, -3);

        spotLight.color.setHex(0xFFFFFF);
        spotLight.intensity = 1.5;
      } else if (lightingPresetIndex === 1) {
        ambientLight.color.setHex(0x3a4658);
        ambientLight.intensity = 0.45;

        warmDirLight.color.setHex(0xC7D8FF);
        warmDirLight.intensity = 0.7;
        warmDirLight.position.set(5, 8, 5);

        coolFillLight.color.setHex(0x9CCBFF);
        coolFillLight.intensity = 1.1;
        coolFillLight.position.set(-5, 3, -3);

        spotLight.color.setHex(0xDDEBFF);
        spotLight.intensity = 1.4;
      } else {
        ambientLight.intensity = 0.0;
        warmDirLight.color.setHex(0xFFE0C0);
        warmDirLight.intensity = 0.5;
        coolFillLight.intensity = 0.0;
        spotLight.color.setHex(0xFFFFFF);
        spotLight.intensity = 3.0;
      }

      updateHUD();
    }

    const loader = new GLTFLoader();
    loader.load(
      'facecap.glb',
      (gltf) => {
        modelRoot = gltf.scene;
        modelRoot.position.set(0, 0.3, 0);
        modelRoot.scale.setScalar(baseModelScale);

        modelRoot.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });

        turntableGroup.add(modelRoot);
        modelLoaded = true;
        applyMaterialToModel(activeMaterialIndex);
      },
      undefined,
      (err) => {
        console.error('Failed to load facecap.glb:', err);
      }
    );

    function toggleExplode() {
      explodeMode = !explodeMode;
      updateHUD();
    }

    function toggleRotation() {
      autoRotate = !autoRotate;
      updateHUD();
    }

    function cycleLighting() {
      applyLightingPreset((lightingPresetIndex + 1) % 3);
    }

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(swatchClickable, false);
      if (hits.length > 0) {
        const idx = hits[0].object.userData.swatchIndex;
        applyMaterialToModel(idx);
      }
    }

    renderer.domElement.addEventListener('pointerdown', onPointerDown);

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'r') toggleRotation();
      if (key === 'e') toggleExplode();
      if (key === 'l') cycleLighting();
    });

    window.__3D_STATE__ = {
      modelLoaded: false,
      activeMaterialIndex: 0,
      activeMaterialName: 'Leather',
      autoRotate: true,
      rotationAngle: 0,
      explodeMode: false,
      lightingPreset: 'Warm Studio',
      lightingPresetIndex: 0,
      swatchCount: 5,
      platformVisible: true,
      spotLightIntensity: 1.5,
      cameraDistance: camera.position.length()
    };

    applyLightingPreset(0);
    updateHUD();

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();
      const delta = clock.getDelta();

      orbit.update();

      if (autoRotate) {
        turntableGroup.rotation.y += 0.3 * delta;
      }

      swatches.forEach((swatch) => {
        const base = swatch.userData.basePos;
        const phase = swatch.userData.phase;
        const bob = Math.sin(elapsed * 1.8 + phase) * 0.15;
        const explodeFactor = explodeMode ? 1.5 : 1.0;

        swatch.position.x = THREE.MathUtils.lerp(swatch.position.x, base.x * explodeFactor, 0.08);
        swatch.position.z = THREE.MathUtils.lerp(swatch.position.z, base.z * explodeFactor, 0.08);
        swatch.position.y = THREE.MathUtils.lerp(swatch.position.y, 4 + bob, 0.08);

        const isActive = swatch.userData.swatchIndex === activeMaterialIndex;
        swatch.scale.setScalar(THREE.MathUtils.lerp(swatch.scale.x, isActive ? 1.18 : 1.0, 0.1));
      });

      if (modelRoot) {
        const targetScale = explodeMode ? baseModelScale * 1.3 : baseModelScale;
        const current = modelRoot.scale.x;
        const next = THREE.MathUtils.lerp(current, targetScale, 0.08);
        modelRoot.scale.setScalar(next);
      }

      window.__3D_STATE__.modelLoaded = modelLoaded;
      window.__3D_STATE__.activeMaterialIndex = activeMaterialIndex;
      window.__3D_STATE__.activeMaterialName = materialDefs[activeMaterialIndex].name;
      window.__3D_STATE__.autoRotate = autoRotate;
      window.__3D_STATE__.rotationAngle = turntableGroup.rotation.y;
      window.__3D_STATE__.explodeMode = explodeMode;
      window.__3D_STATE__.lightingPreset = getLightingPresetName();
      window.__3D_STATE__.lightingPresetIndex = lightingPresetIndex;
      window.__3D_STATE__.swatchCount = swatches.length;
      window.__3D_STATE__.platformVisible = platform.visible;
      window.__3D_STATE__.spotLightIntensity = spotLight.intensity;
      window.__3D_STATE__.cameraDistance = camera.position.length();

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
