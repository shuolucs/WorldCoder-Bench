<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Headphone Materials Demo Diorama</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.75);
    color: #e0e0e0;
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    min-width: 220px;
    z-index: 10;
  }
  #hud .label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  #hud .value { color: #FFD700; font-weight: 600; }
  #hud .status-on { color: #4CAF50; }
  #hud .status-off { color: #f44336; }

  #buttons-container {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
  }

  .mat-btn {
    padding: 10px 20px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 25px;
    background: rgba(0, 0, 0, 0.7);
    color: #e0e0e0;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    letter-spacing: 0.5px;
  }
  .mat-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    border-color: rgba(255, 215, 0, 0.5);
  }
  .mat-btn.active {
    border: 3px solid #FFD700;
    color: #FFD700;
    background: rgba(255, 215, 0, 0.1);
  }

  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #FFD700;
    font-size: 18px;
    font-family: 'Segoe UI', sans-serif;
    z-index: 100;
  }
  #loading.hidden { display: none; }

  #controls-hint {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(0, 0, 0, 0.75);
    color: #aaa;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 11px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    z-index: 10;
  }
  #controls-hint kbd {
    background: rgba(255, 255, 255, 0.15);
    padding: 1px 6px;
    border-radius: 3px;
    font-family: monospace;
    color: #ddd;
  }
</style>
</head>
<body>

<div id="loading">Loading model...</div>

<div id="hud">
  <div><span class="label">Material: </span><span class="value" id="hud-material">Leather</span></div>
  <div><span class="label">Lighting: </span><span class="value" id="hud-lighting">Warm Studio</span></div>
  <div><span class="label">Rotation: </span><span id="hud-rotation" class="status-on">ON</span></div>
  <div><span class="label">Explode: </span><span id="hud-explode" class="status-off">OFF</span></div>
</div>

<div id="controls-hint">
  <kbd>R</kbd> Toggle Rotation<br>
  <kbd>E</kbd> Toggle Explode<br>
  <kbd>L</kbd> Cycle Lighting
</div>

<div id="buttons-container">
  <button class="mat-btn active" data-index="0">Leather</button>
  <button class="mat-btn" data-index="1">Brushed Aluminum</button>
  <button class="mat-btn" data-index="2">Matte Plastic</button>
  <button class="mat-btn" data-index="3">Carbon Fiber</button>
  <button class="mat-btn" data-index="4">Rose Gold</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const state = {
  modelLoaded: false,
  activeMaterialIndex: 0,
  activeMaterialName: 'Leather',
  autoRotate: true,
  rotationAngle: 0,
  explodeMode: false,
  lightingPreset: 'Warm Studio',
  lightingPresetIndex: 0,
  swatchCount: 5,
  platformVisible: true,
  spotLightIntensity: 1.5,
  cameraDistance: 0
};
window.__3D_STATE__ = state;

// --- Material definitions ---
const materialDefs = [
  { name: 'Leather', color: 0x3B2314, roughness: 0.7, metalness: 0.0 },
  { name: 'Brushed Aluminum', color: 0xC0C0C0, roughness: 0.3, metalness: 0.95 },
  { name: 'Matte Plastic', color: 0x1a1a1a, roughness: 0.9, metalness: 0.0 },
  { name: 'Carbon Fiber', color: 0x3a3a3a, roughness: 0.4, metalness: 0.3 },
  { name: 'Rose Gold', color: 0xB76E79, roughness: 0.2, metalness: 0.9 }
];

const materials = materialDefs.map(d => new THREE.MeshStandardMaterial({
  color: d.color,
  roughness: d.roughness,
  metalness: d.metalness,
  side: THREE.DoubleSide
}));

// --- Scene setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.03);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 4, 7);
camera.lookAt(0, 2, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 3;
controls.maxDistance = 15;
controls.update();

// --- Turntable group ---
const turntable = new THREE.Group();
scene.add(turntable);

// --- Platform ---
const platformGeom = new THREE.CylinderGeometry(3, 3, 0.3, 64);
const platformMat = new THREE.MeshStandardMaterial({
  color: 0x2a1810,
  roughness: 0.8,
  metalness: 0.05
});
const platform = new THREE.Mesh(platformGeom, platformMat);
platform.position.y = 0.15;
platform.receiveShadow = true;
turntable.add(platform);

// Platform edge ring
const ringGeom = new THREE.TorusGeometry(3, 0.03, 16, 64);
const ringMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, roughness: 0.3, metalness: 0.9 });
const ring = new THREE.Mesh(ringGeom, ringMat);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.3;
turntable.add(ring);

// Ground plane
const groundGeom = new THREE.PlaneGeometry(50, 50);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x0d0d1a, roughness: 1.0 });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// --- Lighting ---
const warmLight = new THREE.DirectionalLight(0xFFE4C4, 1.2);
warmLight.position.set(5, 8, 5);
warmLight.castShadow = true;
warmLight.shadow.mapSize.set(2048, 2048);
warmLight.shadow.camera.near = 0.5;
warmLight.shadow.camera.far = 30;
warmLight.shadow.camera.left = -5;
warmLight.shadow.camera.right = 5;
warmLight.shadow.camera.top = 5;
warmLight.shadow.camera.bottom = -5;
scene.add(warmLight);

const coolLight = new THREE.DirectionalLight(0xB0C4DE, 0.6);
coolLight.position.set(-5, 3, -3);
scene.add(coolLight);

const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
scene.add(ambientLight);

const spotLight = new THREE.SpotLight(0xFFFFFF, 1.5);
spotLight.position.set(0, 10, 0);
spotLight.target.position.set(0, 0, 0);
spotLight.angle = Math.PI / 6;
spotLight.penumbra = 0.5;
spotLight.castShadow = true;
spotLight.shadow.mapSize.set(2048, 2048);
scene.add(spotLight);
scene.add(spotLight.target);

// Lighting presets
const lightingPresets = [
  {
    name: 'Warm Studio',
    warm: { color: 0xFFE4C4, intensity: 1.2 },
    cool: { color: 0xB0C4DE, intensity: 0.6 },
    ambient: { color: 0x404040, intensity: 0.5 },
    spot: { color: 0xFFFFFF, intensity: 1.5 }
  },
  {
    name: 'Cool Showroom',
    warm: { color: 0xB0C4DE, intensity: 0.6 },
    cool: { color: 0x6699CC, intensity: 1.2 },
    ambient: { color: 0x334466, intensity: 0.6 },
    spot: { color: 0xCCDDFF, intensity: 1.5 }
  },
  {
    name: 'Dramatic',
    warm: { color: 0xFFE4C4, intensity: 0.3 },
    cool: { color: 0xB0C4DE, intensity: 0.0 },
    ambient: { color: 0x000000, intensity: 0.0 },
    spot: { color: 0xFFFFFF, intensity: 3.0 }
  }
];

function applyLightingPreset(index) {
  const preset = lightingPresets[index];
  warmLight.color.setHex(preset.warm.color);
  warmLight.intensity = preset.warm.intensity;
  coolLight.color.setHex(preset.cool.color);
  coolLight.intensity = preset.cool.intensity;
  ambientLight.color.setHex(preset.ambient.color);
  ambientLight.intensity = preset.ambient.intensity;
  spotLight.color.setHex(preset.spot.color);
  spotLight.intensity = preset.spot.intensity;
  state.lightingPreset = preset.name;
  state.lightingPresetIndex = index;
  state.spotLightIntensity = spotLight.intensity;
  document.getElementById('hud-lighting').textContent = preset.name;
}

// --- Swatch spheres ---
const swatchSpheres = [];
const swatchBasePositions = [];
const swatchGeom = new THREE.SphereGeometry(0.3, 32, 32);

for (let i = 0; i < 5; i++) {
  const t = i / 4;
  const x = -3 + t * 6;
  const z = -1.5;
  const y = 4;
  const mesh = new THREE.Mesh(swatchGeom, materials[i].clone());
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.userData.swatchIndex = i;
  scene.add(mesh);
  swatchSpheres.push(mesh);
  swatchBasePositions.push(new THREE.Vector3(x, y, z));
}

// --- Load model ---
let loadedModel = null;
let modelMeshes = [];

const loader = new GLTFLoader();
loader.load('facecap.glb',
  (gltf) => {
    loadedModel = gltf.scene;
    loadedModel.scale.set(2.0, 2.0, 2.0);
    loadedModel.position.y = 0.3;
    loadedModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
        modelMeshes.push(child);
      }
    });
    turntable.add(loadedModel);
    state.modelLoaded = true;
    document.getElementById('loading').classList.add('hidden');
    applyMaterialToModel(0);
  },
  (progress) => {
    if (progress.total > 0) {
      const pct = Math.round((progress.loaded / progress.total) * 100);
      document.getElementById('loading').textContent = `Loading model... ${pct}%`;
    }
  },
  (error) => {
    console.error('Error loading model:', error);
    document.getElementById('loading').textContent = 'Model load failed. Showing placeholder.';
    // Create placeholder head
    const headGeom = new THREE.SphereGeometry(1, 32, 32);
    const headMesh = new THREE.Mesh(headGeom, materials[0].clone());
    headMesh.position.y = 2.3;
    headMesh.scale.set(1, 1.3, 1);
    headMesh.castShadow = true;
    modelMeshes.push(headMesh);

    const neckGeom = new THREE.CylinderGeometry(0.4, 0.5, 1, 16);
    const neckMesh = new THREE.Mesh(neckGeom, materials[0].clone());
    neckMesh.position.y = 0.8;
    neckMesh.castShadow = true;
    modelMeshes.push(neckMesh);

    const placeholderGroup = new THREE.Group();
    placeholderGroup.add(headMesh);
    placeholderGroup.add(neckMesh);
    placeholderGroup.position.y = 0.3;
    turntable.add(placeholderGroup);
    loadedModel = placeholderGroup;
    state.modelLoaded = true;
    applyMaterialToModel(0);
  }
);

// --- Apply material ---
function applyMaterialToModel(index) {
  state.activeMaterialIndex = index;
  state.activeMaterialName = materialDefs[index].name;

  const def = materialDefs[index];
  modelMeshes.forEach(mesh => {
    mesh.material = new THREE.MeshStandardMaterial({
      color: def.color,
      roughness: def.roughness,
      metalness: def.metalness,
      side: THREE.DoubleSide
    });
  });

  // Update swatch highlights
  swatchSpheres.forEach((s, i) => {
    s.scale.setScalar(i === index ? 1.3 : 1.0);
  });

  // Update buttons
  document.querySelectorAll('.mat-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.index) === index);
  });

  document.getElementById('hud-material').textContent = def.name;
}

// --- Raycaster for swatch clicking ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(swatchSpheres);
  if (intersects.length > 0) {
    const idx = intersects[0].object.userData.swatchIndex;
    if (idx !== undefined) {
      applyMaterialToModel(idx);
    }
  }
});

// --- Button clicks ---
document.querySelectorAll('.mat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    applyMaterialToModel(parseInt(btn.dataset.index));
  });
});

// --- Keyboard controls ---
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === 'r') {
    state.autoRotate = !state.autoRotate;
    const el = document.getElementById('hud-rotation');
    el.textContent = state.autoRotate ? 'ON' : 'OFF';
    el.className = state.autoRotate ? 'status-on' : 'status-off';
  } else if (key === 'e') {
    state.explodeMode = !state.explodeMode;
    const el = document.getElementById('hud-explode');
    el.textContent = state.explodeMode ? 'ON' : 'OFF';
    el.className = state.explodeMode ? 'status-on' : 'status-off';
  } else if (key === 'l') {
    const nextIndex = (state.lightingPresetIndex + 1) % 3;
    applyLightingPreset(nextIndex);
  }
});

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation loop ---
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Auto-rotation
  if (state.autoRotate) {
    state.rotationAngle += 0.3 * dt;
    turntable.rotation.y = state.rotationAngle;
  }

  // Swatch bobbing and explode
  const explodeFactor = state.explodeMode ? 1.5 : 1.0;
  for (let i = 0; i < swatchSpheres.length; i++) {
    const base = swatchBasePositions[i];
    const bob = Math.sin(elapsed * 1.5 + i * 1.2) * 0.15;
    swatchSpheres[i].position.x = base.x * explodeFactor;
    swatchSpheres[i].position.y = base.y + bob;
    swatchSpheres[i].position.z = base.z * explodeFactor;
  }

  // Model explode scale
  if (loadedModel) {
    const targetScale = state.explodeMode ? 2.0 * 1.3 : 2.0;
    const currentScale = loadedModel.scale.x;
    const newScale = THREE.MathUtils.lerp(currentScale, targetScale, 0.05);
    loadedModel.scale.setScalar(newScale);
  }

  // Update state
  state.rotationAngle = turntable.rotation.y;
  state.platformVisible = platform.visible;
  state.spotLightIntensity = spotLight.intensity;
  state.cameraDistance = camera.position.length();

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
