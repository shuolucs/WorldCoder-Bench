<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPH Fluid-Rigid Body Coupling Simulation</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute; top: 15px; left: 15px;
    background: rgba(0,0,0,0.75); color: #e0e0e0;
    padding: 15px 20px; border-radius: 10px;
    font-size: 14px; line-height: 1.8;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    min-width: 240px;
  }
  #hud h3 { color: #64b5f6; margin-bottom: 8px; font-size: 16px; }
  #hud .label { color: #90a4ae; }
  #hud .value { color: #fff; font-weight: bold; }
  #hud .heavy { color: #D32F2F; }
  #hud .light { color: #FBC02D; }
  #resetBtn {
    margin-top: 12px; padding: 8px 20px;
    background: linear-gradient(135deg, #1565c0, #1976d2);

    cursor: pointer; font-size: 14px; width: 100%;
    transition: all 0.3s;
  }
  #resetBtn:hover { background: linear-gradient(135deg, #1976d2, #2196f3); transform: scale(1.02); }
</style>
</head>
<body>
<div id="hud">
  <h3>⚗️ SPH Fluid Simulation</h3>
  <div><span class="label">Sim Time: </span><span class="value" id="simTime">0.000</span>s</div>
  <div><span class="label">Particles: </span><span class="value" id="particleCount">200</span></div>
  <div><span class="label heavy">Heavy Box Y: </span><span class="value" id="heavyY">2.500</span></div>
  <div><span class="label light">Light Box Y: </span><span class="value" id="lightY">2.500</span></div>
  <button id="resetBtn">🔄 Reset Simulation</button>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Constants
const N = 200;
const PARTICLE_MASS = 0.05;
const H = 0.5;
const H2 = H * H;
const H6 = Math.pow(H, 6);
const H9 = Math.pow(H, 9);
const K_PRESSURE = 15.0;
const RHO0 = 1000;
const MU = 0.15;
const GRAVITY = -9.81;
const DT = 0.002;
const SUB_STEPS = 3;
const WALL_RESTITUTION = 0.3;
const RIGID_RESTITUTION = 0.2;
const K_REPEL = 500;
const REPEL_DIST = 0.15;

const POLY6_COEFF = 315.0 / (64.0 * Math.PI * H9);
const SPIKY_COEFF = -45.0 / (Math.PI * H6);
const VISC_LAP_COEFF = 45.0 / (Math.PI * H6);

const TANK_MIN = new THREE.Vector3(0, 0, 0);
const TANK_MAX = new THREE.Vector3(4, 3, 4);

const BOX_SIZE = 0.4;
const BOX_HALF = BOX_SIZE / 2;
const BOX_VOLUME = BOX_SIZE * BOX_SIZE * BOX_SIZE;

// Particle data
let positions, velocities, densities, pressures, forces;

// Rigid bodies
let rigidBodies;

let simTime = 0;

function initParticles() {
  positions = new Float64Array(N * 3);
  velocities = new Float64Array(N * 3);
  densities = new Float64Array(N);
  pressures = new Float64Array(N);
  forces = new Float64Array(N * 3);

  // Distribute particles in a grid in [0,2] x [0,2] x [0,2]
  // We need 200 particles. Cube root of 200 ~ 5.85, so let's do roughly 6x6x6=216, take first 200
  const nx = 6, ny = 6, nz = 6;
  const spacingX = 2.0 / nx;
  const spacingY = 2.0 / ny;
  const spacingZ = 2.0 / nz;
  let idx = 0;
  for (let ix = 0; ix < nx && idx < N; ix++) {
    for (let iy = 0; iy < ny && idx < N; iy++) {
      for (let iz = 0; iz < nz && idx < N; iz++) {
        positions[idx * 3] = spacingX * (ix + 0.5);
        positions[idx * 3 + 1] = spacingY * (iy + 0.5);
        positions[idx * 3 + 2] = spacingZ * (iz + 0.5);
        velocities[idx * 3] = 0;
        velocities[idx * 3 + 1] = 0;
        velocities[idx * 3 + 2] = 0;
        idx++;
      }
    }
  }
}

function initRigidBodies() {
  rigidBodies = [
    {
      name: 'heavy', density: 2000, color: 0xD32F2F,
      mass: 2000 * BOX_VOLUME,
      pos: new THREE.Vector3(1, 2.5, 1),
      vel: new THREE.Vector3(0, 0, 0),
      submergedRatio: 0
    },
    {
      name: 'neutral', density: 1000, color: 0x388E3C,
      mass: 1000 * BOX_VOLUME,
      pos: new THREE.Vector3(2, 2.5, 1),
      vel: new THREE.Vector3(0, 0, 0),
      submergedRatio: 0
    },
    {
      name: 'light', density: 500, color: 0xFBC02D,
      mass: 500 * BOX_VOLUME,
      pos: new THREE.Vector3(3, 2.5, 1),
      vel: new THREE.Vector3(0, 0, 0),
      submergedRatio: 0
    }
  ];
}

function poly6(r2) {
  if (r2 >= H2) return 0;
  const diff = H2 - r2;
  return POLY6_COEFF * diff * diff * diff;
}

function spikyGrad(r, rx, ry, rz) {
  if (r >= H || r < 1e-8) return [0, 0, 0];
  const diff = H - r;
  const coeff = SPIKY_COEFF * diff * diff / r;
  return [coeff * rx, coeff * ry, coeff * rz];
}

function viscLaplacian(r) {
  if (r >= H) return 0;
  return VISC_LAP_COEFF * (H - r);
}

// Spatial hash grid for neighbor search
const CELL_SIZE = H;
let grid = {};

function hashKey(cx, cy, cz) {
  return `${cx},${cy},${cz}`;
}

function buildGrid() {
  grid = {};
  for (let i = 0; i < N; i++) {
    const cx = Math.floor(positions[i * 3] / CELL_SIZE);
    const cy = Math.floor(positions[i * 3 + 1] / CELL_SIZE);
    const cz = Math.floor(positions[i * 3 + 2] / CELL_SIZE);
    const key = hashKey(cx, cy, cz);
    if (!grid[key]) grid[key] = [];
    grid[key].push(i);
  }
}

function getNeighbors(i) {
  const cx = Math.floor(positions[i * 3] / CELL_SIZE);
  const cy = Math.floor(positions[i * 3 + 1] / CELL_SIZE);
  const cz = Math.floor(positions[i * 3 + 2] / CELL_SIZE);
  const neighbors = [];
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      for (let dz = -1; dz <= 1; dz++) {
        const key = hashKey(cx + dx, cy + dy, cz + dz);
        const cell = grid[key];
        if (cell) {
          for (let k = 0; k < cell.length; k++) {
            neighbors.push(cell[k]);
          }
        }
      }
    }
  }
  return neighbors;
}

function computeDensityPressure() {
  for (let i = 0; i < N; i++) {
    let rho = 0;
    const ix = positions[i * 3], iy = positions[i * 3 + 1], iz = positions[i * 3 + 2];
    const neighbors = getNeighbors(i);
    for (let k = 0; k < neighbors.length; k++) {
      const j = neighbors[k];
      const dx = ix - positions[j * 3];
      const dy = iy - positions[j * 3 + 1];
      const dz = iz - positions[j * 3 + 2];
      const r2 = dx * dx + dy * dy + dz * dz;
      rho += PARTICLE_MASS * poly6(r2);
    }
    densities[i] = Math.max(rho, 1e-6);
    const ratio = densities[i] / RHO0;
    pressures[i] = K_PRESSURE * (Math.pow(ratio, 7) - 1);
  }
}

function computeForces() {
  for (let i = 0; i < N; i++) {
    let fx = 0, fy = GRAVITY * densities[i], fz = 0;
    const ix = positions[i * 3], iy = positions[i * 3 + 1], iz = positions[i * 3 + 2];
    const ivx = velocities[i * 3], ivy = velocities[i * 3 + 1], ivz = velocities[i * 3 + 2];
    const neighbors = getNeighbors(i);

    for (let k = 0; k < neighbors.length; k++) {
      const j = neighbors[k];
      if (i === j) continue;
      const dx = ix - positions[j * 3];
      const dy = iy - positions[j * 3 + 1];
      const dz = iz - positions[j * 3 + 2];
      const r2 = dx * dx + dy * dy + dz * dz;
      const r = Math.sqrt(r2);
      if (r >= H || r < 1e-8) continue;

      // Pressure force
      const [gx, gy, gz] = spikyGrad(r, dx, dy, dz);
      const pCoeff = -PARTICLE_MASS * (pressures[i] + pressures[j]) / (2 * densities[j]);
      fx += pCoeff * gx;
      fy += pCoeff * gy;
      fz += pCoeff * gz;

      // Viscosity force
      const lap = viscLaplacian(r);
      const vCoeff = MU * PARTICLE_MASS / densities[j] * lap;
      fx += vCoeff * (velocities[j * 3] - ivx);
      fy += vCoeff * (velocities[j * 3 + 1] - ivy);
      fz += vCoeff * (velocities[j * 3 + 2] - ivz);
    }

    forces[i * 3] = fx;
    forces[i * 3 + 1] = fy;
    forces[i * 3 + 2] = fz;
  }
}

function particleRigidInteraction() {
  // For each rigid body, compute forces from nearby particles and apply repulsion
  for (let b = 0; b < rigidBodies.length; b++) {
    const body = rigidBodies[b];
    let bfx = 0, bfy = 0, bfz = 0;

    for (let i = 0; i < N; i++) {
      const px = positions[i * 3], py = positions[i * 3 + 1], pz = positions[i * 3 + 2];

      // Closest point on box to particle
      const cx = Math.max(body.pos.x - BOX_HALF, Math.min(px, body.pos.x + BOX_HALF));
      const cy = Math.max(body.pos.y - BOX_HALF, Math.min(py, body.pos.y + BOX_HALF));
      const cz = Math.max(body.pos.z - BOX_HALF, Math.min(pz, body.pos.z + BOX_HALF));

      const dx = px - cx;
      const dy = py - cy;
      const dz = pz - cz;
      const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

      // Repulsion: rigid -> fluid
      if (dist < REPEL_DIST && dist > 1e-8) {
        const overlap = REPEL_DIST - dist;
        const nx = dx / dist, ny = dy / dist, nz = dz / dist;
        const repelForce = K_REPEL * overlap;
        forces[i * 3] += repelForce * nx;
        forces[i * 3 + 1] += repelForce * ny;
        forces[i * 3 + 2] += repelForce * nz;

        // Fluid -> rigid (reaction)
        bfx -= repelForce * nx;
        bfy -= repelForce * ny;
        bfz -= repelForce * nz;
      }

      // Pressure force from fluid to rigid (within H)
      if (dist < H && dist > 1e-8) {
        const pressureContrib = PARTICLE_MASS * pressures[i] / Math.max(densities[i], 1e-6);
        const nx = dx / dist, ny = dy / dist, nz = dz / dist;
        // Kernel weight
        const w = poly6(dist * dist);
        bfx -= pressureContrib * w * nx * 50; // scaled
        bfy -= pressureContrib * w * ny * 50;
        bfz -= pressureContrib * w * nz * 50;
      }
    }

    body._fluidForce = new THREE.Vector3(bfx, bfy, bfz);
  }
}

function estimateFluidSurface() {
  // Estimate fluid surface Y by averaging top 20% of particles
  let ys = [];
  for (let i = 0; i < N; i++) {
    ys.push(positions[i * 3 + 1]);
  }
  ys.sort((a, b) => b - a);
  const topCount = Math.max(1, Math.floor(N * 0.2));
  let sum = 0;
  for (let i = 0; i < topCount; i++) sum += ys[i];
  return sum / topCount;
}

function updateRigidBodies(dt) {
  const fluidSurfaceY = estimateFluidSurface();

  for (let b = 0; b < rigidBodies.length; b++) {
    const body = rigidBodies[b];

    // Gravity
    const fg = new THREE.Vector3(0, GRAVITY * body.mass, 0);

    // Buoyancy based on submersion
    const bodyBottom = body.pos.y - BOX_HALF;
    const bodyTop = body.pos.y + BOX_HALF;
    let submergedRatio = 0;
    if (bodyBottom >= fluidSurfaceY) {
      submergedRatio = 0;
    } else if (bodyTop <= fluidSurfaceY) {
      submergedRatio = 1;
    } else {
      submergedRatio = (fluidSurfaceY - bodyBottom) / BOX_SIZE;
    }
    submergedRatio = Math.max(0, Math.min(1, submergedRatio));
    body.submergedRatio = submergedRatio;

    // Also count nearby particles for better buoyancy estimate
    let nearbyCount = 0;
    const searchR = H * 1.5;
    for (let i = 0; i < N; i++) {
      const dx = positions[i * 3] - body.pos.x;
      const dy = positions[i * 3 + 1] - body.pos.y;
      const dz = positions[i * 3 + 2] - body.pos.z;
      if (Math.abs(dx) < searchR && Math.abs(dy) < searchR && Math.abs(dz) < searchR) {
        nearbyCount++;
      }
    }
    const particleBuoyancyFactor = Math.min(1, nearbyCount / 20);
    const effectiveSubmerged = Math.max(submergedRatio, particleBuoyancyFactor * 0.5) * Math.max(submergedRatio, 0.01);

    const buoyancyForce = new THREE.Vector3(0, -GRAVITY * RHO0 * BOX_VOLUME * submergedRatio, 0);

    // Damping
    const damping = new THREE.Vector3().copy(body.vel).multiplyScalar(-2.0 * body.mass);

    // Total force
    const totalForce = new THREE.Vector3()
      .add(fg)
      .add(buoyancyForce)
      .add(body._fluidForce || new THREE.Vector3())
      .add(damping);

    // Semi-implicit Euler
    body.vel.add(totalForce.clone().divideScalar(body.mass).multiplyScalar(dt));

    // Clamp velocity
    const maxVel = 5;
    if (body.vel.length() > maxVel) body.vel.setLength(maxVel);

    body.pos.add(body.vel.clone().multiplyScalar(dt));

    // Wall collision
    if (body.pos.x - BOX_HALF < TANK_MIN.x) {
      body.pos.x = TANK_MIN.x + BOX_HALF;
      body.vel.x *= -RIGID_RESTITUTION;
    }
    if (body.pos.x + BOX_HALF > TANK_MAX.x) {
      body.pos.x = TANK_MAX.x - BOX_HALF;
      body.vel.x *= -RIGID_RESTITUTION;
    }
    if (body.pos.y - BOX_HALF < TANK_MIN.y) {
      body.pos.y = TANK_MIN.y + BOX_HALF;
      body.vel.y *= -RIGID_RESTITUTION;
    }
    if (body.pos.y + BOX_HALF > TANK_MAX.y) {
      body.pos.y = TANK_MAX.y - BOX_HALF;
      body.vel.y *= -RIGID_RESTITUTION;
    }
    if (body.pos.z - BOX_HALF < TANK_MIN.z) {
      body.pos.z = TANK_MIN.z + BOX_HALF;
      body.vel.z *= -RIGID_RESTITUTION;
    }
    if (body.pos.z + BOX_HALF > TANK_MAX.z) {
      body.pos.z = TANK_MAX.z - BOX_HALF;
      body.vel.z *= -RIGID_RESTITUTION;
    }
  }
}

function integrate(dt) {
  for (let i = 0; i < N; i++) {
    const rho = Math.max(densities[i], 1e-6);
    // Semi-implicit Euler
    velocities[i * 3] += (forces[i * 3] / rho) * dt;
    velocities[i * 3 + 1] += (forces[i * 3 + 1] / rho) * dt;
    velocities[i * 3 + 2] += (forces[i * 3 + 2] / rho) * dt;

    // Clamp velocity
    const vx = velocities[i * 3], vy = velocities[i * 3 + 1], vz = velocities[i * 3 + 2];
    const speed = Math.sqrt(vx * vx + vy * vy + vz * vz);
    const maxSpeed = 8;
    if (speed > maxSpeed) {
      const scale = maxSpeed / speed;
      velocities[i * 3] *= scale;
      velocities[i * 3 + 1] *= scale;
      velocities[i * 3 + 2] *= scale;
    }

    positions[i * 3] += velocities[i * 3] * dt;
    positions[i * 3 + 1] += velocities[i * 3 + 1] * dt;
    positions[i * 3 + 2] += velocities[i * 3 + 2] * dt;

    // Wall collisions
    const r = 0.06;
    if (positions[i * 3] < TANK_MIN.x + r) {
      positions[i * 3] = TANK_MIN.x + r;
      velocities[i * 3] *= -WALL_RESTITUTION;
    }
    if (positions[i * 3] > TANK_MAX.x - r) {
      positions[i * 3] = TANK_MAX.x - r;
      velocities[i * 3] *= -WALL_RESTITUTION;
    }
    if (positions[i * 3 + 1] < TANK_MIN.y + r) {
      positions[i * 3 + 1] = TANK_MIN.y + r;
      velocities[i * 3 + 1] *= -WALL_RESTITUTION;
    }
    if (positions[i * 3 + 1] > TANK_MAX.y - r) {
      positions[i * 3 + 1] = TANK_MAX.y - r;
      velocities[i * 3 + 1] *= -WALL_RESTITUTION;
    }
    if (positions[i * 3 + 2] < TANK_MIN.z + r) {
      positions[i * 3 + 2] = TANK_MIN.z + r;
      velocities[i * 3 + 2] *= -WALL_RESTITUTION;
    }
    if (positions[i * 3 + 2] > TANK_MAX.z - r) {
      positions[i * 3 + 2] = TANK_MAX.z - r;
      velocities[i * 3 + 2] *= -WALL_RESTITUTION;
    }
  }
}

function simulateStep() {
  for (let s = 0; s < SUB_STEPS; s++) {
    buildGrid();
    computeDensityPressure();
    computeForces();
    particleRigidInteraction();
    integrate(DT);
    updateRigidBodies(DT);
    simTime += DT;
  }
}

function computeTotalEnergy() {
  let ke = 0, pe = 0;
  for (let i = 0; i < N; i++) {
    const vx = velocities[i * 3], vy = velocities[i * 3 + 1], vz = velocities[i * 3 + 2];
    ke += 0.5 * PARTICLE_MASS * (vx * vx + vy * vy + vz * vz);
    pe += PARTICLE_MASS * (-GRAVITY) * positions[i * 3 + 1];
  }
  for (const body of rigidBodies) {
    ke += 0.5 * body.mass * body.vel.lengthSq();
    pe += body.mass * (-GRAVITY) * body.pos.y;
  }
  return ke + pe;
}

// ============ THREE.JS RENDERING ============

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.03);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(6, 4, 8);
camera.lookAt(2, 1.5, 2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(2, 1.5, 2);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.8);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 20;
dirLight.shadow.camera.left = -5;
dirLight.shadow.camera.right = 5;
dirLight.shadow.camera.top = 5;
dirLight.shadow.camera.bottom = -5;
scene.add(dirLight);

const pointLight = new THREE.PointLight(0x4488ff, 0.5, 15);
pointLight.position.set(2, 4, 2);
scene.add(pointLight);

// Tank
const tankGroup = new THREE.Group();

// Wireframe edges
const tankGeo = new THREE.BoxGeometry(4, 3, 4);
const tankEdges = new THREE.EdgesGeometry(tankGeo);
const tankLine = new THREE.LineSegments(tankEdges, new THREE.LineBasicMaterial({ color: 0x4488aa, linewidth: 1, transparent: true, opacity: 0.6 }));
tankLine.position.set(2, 1.5, 2);
tankGroup.add(tankLine);

// Bottom face
const bottomGeo = new THREE.PlaneGeometry(4, 4);
const bottomMat = new THREE.MeshStandardMaterial({
  color: 0x1a3a5c, transparent: true, opacity: 0.5,
  metalness: 0.3, roughness: 0.7, side: THREE.DoubleSide
});
const bottomMesh = new THREE.Mesh(bottomGeo, bottomMat);
bottomMesh.rotation.x = -Math.PI / 2;
bottomMesh.position.set(2, 0.001, 2);
bottomMesh.receiveShadow = true;
tankGroup.add(bottomMesh);

// Semi-transparent walls
const wallMat = new THREE.MeshPhysicalMaterial({
  color: 0x88ccff, transparent: true, opacity: 0.08,
  metalness: 0, roughness: 0.1, side: THREE.DoubleSide,
  transmission: 0.9
});

// Front wall
const wallFront = new THREE.Mesh(new THREE.PlaneGeometry(4, 3), wallMat);
wallFront.position.set(2, 1.5, 0);
tankGroup.add(wallFront);

// Back wall
const wallBack = new THREE.Mesh(new THREE.PlaneGeometry(4, 3), wallMat);
wallBack.position.set(2, 1.5, 4);
wallBack.rotation.y = Math.PI;
tankGroup.add(wallBack);

// Left wall
const wallLeft = new THREE.Mesh(new THREE.PlaneGeometry(4, 3), wallMat);
wallLeft.position.set(0, 1.5, 2);
wallLeft.rotation.y = Math.PI / 2;
tankGroup.add(wallLeft);

// Right wall
const wallRight = new THREE.Mesh(new THREE.PlaneGeometry(4, 3), wallMat);
wallRight.position.set(4, 1.5, 2);
wallRight.rotation.y = -Math.PI / 2;
tankGroup.add(wallRight);

scene.add(tankGroup);

// Particle InstancedMesh
const particleGeo = new THREE.SphereGeometry(0.06, 8, 6);
const particleMat = new THREE.MeshStandardMaterial({
  color: 0x2196f3, metalness: 0.3, roughness: 0.4
});
const particleMesh = new THREE.InstancedMesh(particleGeo, particleMat, N);
particleMesh.castShadow = true;
particleMesh.receiveShadow = true;
scene.add(particleMesh);

const dummy = new THREE.Object3D();
const colorObj = new THREE.Color();

// Rigid body meshes
const rigidMeshes = [];
function createRigidMeshes() {
  // Remove old
  for (const m of rigidMeshes) scene.remove(m);
  rigidMeshes.length = 0;

  for (const body of rigidBodies) {
    const geo = new THREE.BoxGeometry(BOX_SIZE, BOX_SIZE, BOX_SIZE);
    const mat = new THREE.MeshStandardMaterial({
      color: body.color,
      transparent: true,
      opacity: 0.85,
      metalness: 0.2,
      roughness: 0.5
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.position.copy(body.pos);
    scene.add(mesh);
    rigidMeshes.push(mesh);
  }
}

// Grid floor
const gridHelper = new THREE.GridHelper(10, 20, 0x222244, 0x111133);
gridHelper.position.set(2, -0.01, 2);
scene.add(gridHelper);

// Init simulation
function resetSimulation() {
  simTime = 0;
  initParticles();
  initRigidBodies();
  createRigidMeshes();
}

resetSimulation();

document.getElementById('resetBtn').addEventListener('click', resetSimulation);

// HUD elements
const simTimeEl = document.getElementById('simTime');
const particleCountEl = document.getElementById('particleCount');
const heavyYEl = document.getElementById('heavyY');
const lightYEl = document.getElementById('lightY');

// State
window.__3D_STATE__ = {};

function updateHUD() {
  simTimeEl.textContent = simTime.toFixed(3);
  particleCountEl.textContent = N;
  const heavy = rigidBodies.find(b => b.name === 'heavy');
  const light = rigidBodies.find(b => b.name === 'light');
  heavyYEl.textContent = heavy ? heavy.pos.y.toFixed(3) : '—';
  lightYEl.textContent = light ? light.pos.y.toFixed(3) : '—';

  window.__3D_STATE__ = {
    particleCount: N,
    rigidBodies: rigidBodies.map(b => ({
      name: b.name,
      x: b.pos.x,
      y: b.pos.y,
      z: b.pos.z,
      density: b.density,
      submergedRatio: b.submergedRatio
    })),
    simTime: simTime,
    totalEnergy: computeTotalEnergy()
  };
}

function updateVisuals() {
  // Update particle instances
  for (let i = 0; i < N; i++) {
    dummy.position.set(positions[i * 3], positions[i * 3 + 1], positions[i * 3 + 2]);
    dummy.updateMatrix();
    particleMesh.setMatrixAt(i, dummy.matrix);

    // Color by speed
    const vx = velocities[i * 3], vy = velocities[i * 3 + 1], vz = velocities[i * 3 + 2];
    const speed = Math.sqrt(vx * vx + vy * vy + vz * vz);
    const t = Math.min(speed / 3.0, 1.0);
    // Deep blue to light cyan
    colorObj.setRGB(
      0.05 + t * 0.4,
      0.15 + t * 0.6,
      0.6 + t * 0.4
    );
    particleMesh.setColorAt(i, colorObj);
  }
  particleMesh.instanceMatrix.needsUpdate = true;
  if (particleMesh.instanceColor) particleMesh.instanceColor.needsUpdate = true;

  // Update rigid body meshes
  for (let b = 0; b < rigidBodies.length; b++) {
    if (rigidMeshes[b]) {
      rigidMeshes[b].position.copy(rigidBodies[b].pos);
    }
  }
}

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  simulateStep();
  updateVisuals();
  updateHUD();

  controls.update();
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
