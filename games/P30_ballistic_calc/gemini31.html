<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ballistic Trajectory Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            color: #fff;
            font-family: monospace;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border: 1px solid #444;
            border-radius: 5px;
            width: 280px;
            z-index: 10;
        }
        #hud-panel {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border: 1px solid #444;
            border-radius: 5px;
            z-index: 10;
            font-size: 14px;
            line-height: 1.5;
        }
        .control-group {
            margin-bottom: 10px;
        }
        label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }
        input[type="range"] {
            width: 120px;
        }
        .val-display {
            width: 40px;
            text-align: right;
            display: inline-block;
        }
        button {
            width: 48%;
            padding: 8px;
            margin-top: 10px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            cursor: pointer;
            border-radius: 3px;
        }
        button:hover {
            background: #555;
        }
        .hud-value {
            color: #0f0;
            font-weight: bold;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="ui-panel">
        <div class="control-group">
            <label>Angle (deg): 
                <input type="range" id="angle" min="0" max="90" value="30">
                <span class="val-display" id="angleVal">30</span>
            </label>
        </div>
        <div class="control-group">
            <label>Speed (m/s): 
                <input type="range" id="speed" min="10" max="100" value="95">
                <span class="val-display" id="speedVal">95</span>
            </label>
        </div>
        <div class="control-group">
            <label>Mass (kg): 
                <input type="range" id="mass" min="0.1" max="10" step="0.1" value="1.0">
                <span class="val-display" id="massVal">1.0</span>
            </label>
        </div>
        <div class="control-group" style="margin-top: 15px;">
            <label style="justify-content: flex-start;">
                <input type="checkbox" id="coriolisToggle" style="margin-right: 10px;">
                Enable Coriolis Effect
            </label>
        </div>
        <div style="display: flex; justify-content: space-between;">
            <button id="fireBtn">Fire</button>
            <button id="clearBtn">Clear</button>
        </div>
    </div>

    <div id="hud-panel">
        <div>Range: <span id="range" class="hud-value">0.00</span> m</div>
        <div>Max Height: <span id="maxHeight" class="hud-value">0.00</span> m</div>
        <div>Flight Time: <span id="flightTime" class="hud-value">0.00</span> s</div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Initialization ---
        window.__3D_STATE__ = {
            trajectoryCount: 0,
            angle: 30,
            speed: 95,
            mass: 1.0,
            lastRange: 0,
            lastMaxHeight: 0,
            lastFlightTime: 0,
            coriolisEnabled: false
        };

        // --- DOM Elements ---
        const elAngle = document.getElementById('angle');
        const elSpeed = document.getElementById('speed');
        const elMass = document.getElementById('mass');
        const elCoriolis = document.getElementById('coriolisToggle');
        const elFireBtn = document.getElementById('fireBtn');
        const elClearBtn = document.getElementById('clearBtn');
        
        const valAngle = document.getElementById('angleVal');
        const valSpeed = document.getElementById('speedVal');
        const valMass = document.getElementById('massVal');
        
        const hudRange = document.getElementById('range');
        const hudMaxHeight = document.getElementById('maxHeight');
        const hudFlightTime = document.getElementById('flightTime');

        // --- Update UI Values ---
        function updateInputValues() {
            valAngle.textContent = elAngle.value;
            valSpeed.textContent = elSpeed.value;
            valMass.textContent = parseFloat(elMass.value).toFixed(1);
            
            window.__3D_STATE__.angle = parseFloat(elAngle.value);
            window.__3D_STATE__.speed = parseFloat(elSpeed.value);
            window.__3D_STATE__.mass = parseFloat(elMass.value);
            window.__3D_STATE__.coriolisEnabled = elCoriolis.checked;
        }

        elAngle.addEventListener('input', updateInputValues);
        elSpeed.addEventListener('input', updateInputValues);
        elMass.addEventListener('input', updateInputValues);
        elCoriolis.addEventListener('change', updateInputValues);

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.0005);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.set(200, 150, 400);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(200, 0, 0);

        // Ground Grid
        const gridHelper = new THREE.GridHelper(2000, 100, 0x444444, 0x222222);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        // Axes Helper (X: Red/East, Y: Green/Up, Z: Blue/South)
        const axesHelper = new THREE.AxesHelper(50);
        scene.add(axesHelper);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(100, 200, 50);
        scene.add(dirLight);

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Physics & Trajectory Logic ---
        const trajectories = [];
        let colorIndex = 0;

        function calculateAndDrawTrajectory() {
            const angle = parseFloat(elAngle.value);
            const speed = parseFloat(elSpeed.value);
            const mass = parseFloat(elMass.value);
            const useCoriolis = elCoriolis.checked;

            // Physics Constants
            const g = 9.81;
            const rho_air = 1.225;
            const Cd = 0.47;
            const rho_body = 1000;
            
            // Calculate Radius and Area
            const r = Math.pow((3 * mass) / (4 * Math.PI * rho_body), 1/3);
            const A = Math.PI * r * r;

            // Coriolis Constants (Approx for 45 deg North)
            const omega_earth = 7.2921e-5;
            const lat = 45 * Math.PI / 180;
            // Assuming +X is East, +Y is Up, +Z is South. North is -Z.
            const omegaVec = new THREE.Vector3(0, omega_earth * Math.sin(lat), -omega_earth * Math.cos(lat));

            // Initial Conditions
            const angleRad = angle * Math.PI / 180;
            let pos = new THREE.Vector3(0, 0, 0);
            let vel = new THREE.Vector3(
                speed * Math.cos(angleRad),
                speed * Math.sin(angleRad),
                0
            );

            const points = [pos.clone()];
            let t = 0;
            const dt = 0.01; // Fixed small step for numerical integration
            let maxH = 0;

            // Integration Loop
            while (pos.y >= 0 && t < 300) { // 300s timeout safety
                const v_mag = vel.length();

                // Drag Force
                const f_drag_mag = 0.5 * Cd * rho_air * A * v_mag * v_mag;
                const a_drag = vel.clone().normalize().multiplyScalar(-f_drag_mag / mass);

                // Gravity
                const a_g = new THREE.Vector3(0, -g, 0);

                // Coriolis Acceleration: a = -2 * (omega x v)
                const a_coriolis = new THREE.Vector3(0, 0, 0);
                if (useCoriolis) {
                    a_coriolis.crossVectors(omegaVec, vel).multiplyScalar(-2);
                }

                // Total Acceleration
                const a_total = new THREE.Vector3().addVectors(a_g, a_drag).add(a_coriolis);

                // Euler Integration
                vel.add(a_total.multiplyScalar(dt));
                pos.add(vel.clone().multiplyScalar(dt));
                t += dt;

                if (pos.y > maxH) maxH = pos.y;

                if (pos.y >= 0) {
                    points.push(pos.clone());
                } else {
                    // Interpolate exact landing point at y=0
                    const prevPos = points[points.length - 1];
                    const dy = pos.y - prevPos.y;
                    if (dy !== 0) {
                        const fraction = (0 - prevPos.y) / dy;
                        const finalPos = new THREE.Vector3().lerpVectors(prevPos, pos, fraction);
                        points.push(finalPos);
                        t = t - dt + fraction * dt;
                        pos = finalPos;
                    }
                    break;
                }
            }

            const range = Math.sqrt(pos.x * pos.x + pos.z * pos.z);

            // Visualization
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const color = new THREE.Color().setHSL((colorIndex * 137.5) % 360 / 360, 1, 0.6);
            colorIndex++;
            
            const material = new THREE.LineBasicMaterial({ color: color, linewidth: 2 });
            const line = new THREE.Line(geometry, material);
            scene.add(line);
            trajectories.push(line);

            // Update HUD
            hudRange.textContent = range.toFixed(2);
            hudMaxHeight.textContent = maxH.toFixed(2);
            hudFlightTime.textContent = t.toFixed(2);

            // Update State
            window.__3D_STATE__.trajectoryCount = trajectories.length;
            window.__3D_STATE__.lastRange = range;
            window.__3D_STATE__.lastMaxHeight = maxH;
            window.__3D_STATE__.lastFlightTime = t;
        }

        function clearTrajectories() {
            trajectories.forEach(line => {
                scene.remove(line);
                line.geometry.dispose();
                line.material.dispose();
            });
            trajectories.length = 0;
            colorIndex = 0;
            
            hudRange.textContent = "0.00";
            hudMaxHeight.textContent = "0.00";
            hudFlightTime.textContent = "0.00";

            window.__3D_STATE__.trajectoryCount = 0;
            window.__3D_STATE__.lastRange = 0;
            window.__3D_STATE__.lastMaxHeight = 0;
            window.__3D_STATE__.lastFlightTime = 0;
        }

        // --- Event Listeners ---
        elFireBtn.addEventListener('click', calculateAndDrawTrajectory);
        elClearBtn.addEventListener('click', clearTrajectories);

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            
            // Ensure state is continuously synced with inputs
            window.__3D_STATE__.angle = parseFloat(elAngle.value);
            window.__3D_STATE__.speed = parseFloat(elSpeed.value);
            window.__3D_STATE__.mass = parseFloat(elMass.value);
            window.__3D_STATE__.coriolisEnabled = elCoriolis.checked;
        }

        // Initialize
        updateInputValues();
        animate();

    </script>
</body>
</html>
