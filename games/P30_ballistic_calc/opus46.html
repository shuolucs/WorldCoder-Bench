<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Ballistic Trajectory Visualization</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #e0e0e0; }
canvas { display: block; }

#controls {
  position: absolute;
  top: 16px;
  left: 16px;
  background: rgba(10, 10, 30, 0.92);
  border: 1px solid rgba(100, 140, 255, 0.3);
  border-radius: 12px;
  padding: 20px;
  width: 300px;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
}

#controls h2 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  color: #8ab4ff;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  border-bottom: 1px solid rgba(100, 140, 255, 0.2);
  padding-bottom: 10px;
}

.control-group {
  margin-bottom: 14px;
}

.control-group label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  color: #a0b0d0;
  margin-bottom: 6px;
}

.control-group label span.val {
  color: #6af;
  font-weight: 600;
  font-size: 14px;
  min-width: 50px;
  text-align: right;
}

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 6px;
  border-radius: 3px;
  background: linear-gradient(90deg, rgba(100,140,255,0.3), rgba(100,140,255,0.15));
  outline: none;
  cursor: pointer;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #8ab4ff, #4070cc);
  box-shadow: 0 0 8px rgba(100,140,255,0.5);
  cursor: pointer;
  transition: transform 0.15s;
}

input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.2);
}

.toggle-group {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  padding: 8px 0;
}

.toggle-group label {
  font-size: 13px;
  color: #a0b0d0;
}

.toggle-switch {
  position: relative;
  width: 48px;
  height: 24px;
}

.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.toggle-slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(60,60,80,0.8);
  border-radius: 24px;
  transition: 0.3s;
  border: 1px solid rgba(100,140,255,0.2);
}

.toggle-slider:before {
  content: "";
  position: absolute;
  height: 18px;
  width: 18px;
  left: 2px;
  bottom: 2px;
  background: #667;
  border-radius: 50%;
  transition: 0.3s;
}

.toggle-switch input:checked + .toggle-slider {
  background: rgba(80,130,255,0.4);
  border-color: rgba(100,160,255,0.5);
}

.toggle-switch input:checked + .toggle-slider:before {
  transform: translateX(24px);
  background: #6af;
  box-shadow: 0 0 8px rgba(100,170,255,0.6);
}

.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}

.btn-row button {
  flex: 1;
  padding: 10px 0;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.2s;
}

#fireBtn {
  background: linear-gradient(135deg, #ff6b35, #ff4444);
  color: white;
  box-shadow: 0 4px 15px rgba(255,80,50,0.3);
}

#fireBtn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255,80,50,0.5);
}

#fireBtn:active {
  transform: translateY(0);
}

#clearBtn {
  background: rgba(60,60,80,0.8);
  color: #a0b0d0;
  border: 1px solid rgba(100,140,255,0.2);
}

#clearBtn:hover {
  background: rgba(80,80,100,0.8);
  color: #cde;
}

#hud {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(10, 10, 30, 0.92);
  border: 1px solid rgba(100, 140, 255, 0.3);
  border-radius: 12px;
  padding: 20px;
  min-width: 220px;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
}

#hud h2 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  color: #8ab4ff;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  border-bottom: 1px solid rgba(100, 140, 255, 0.2);
  padding-bottom: 10px;
}

.hud-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(100,140,255,0.08);
}

.hud-item:last-child { border-bottom: none; }

.hud-label {
  font-size: 12px;
  color: #8090a8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.hud-value {
  font-size: 18px;
  font-weight: 700;
  color: #6af;
  font-variant-numeric: tabular-nums;
}

.hud-unit {
  font-size: 11px;
  color: #607080;
  margin-left: 4px;
  font-weight: 400;
}

#info-bar {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10, 10, 30, 0.85);
  border: 1px solid rgba(100, 140, 255, 0.2);
  border-radius: 8px;
  padding: 8px 20px;
  font-size: 12px;
  color: #607080;
  backdrop-filter: blur(8px);
}
</style>
</head>
<body>

<div id="controls">
  <h2>🎯 Launch Parameters</h2>
  
  <div class="control-group">
    <label>Launch Angle <span class="val" id="angleVal">30°</span></label>
    <input type="range" id="angle" min="0" max="90" value="30" step="1">
  </div>
  
  <div class="control-group">
    <label>Initial Speed <span class="val" id="speedVal">95 m/s</span></label>
    <input type="range" id="speed" min="10" max="100" value="95" step="1">
  </div>
  
  <div class="control-group">
    <label>Mass <span class="val" id="massVal">1.0 kg</span></label>
    <input type="range" id="mass" min="0.1" max="10" value="1.0" step="0.1">
  </div>
  
  <div class="toggle-group">
    <label>Coriolis Effect (45°N)</label>
    <label class="toggle-switch">
      <input type="checkbox" id="coriolisToggle">
      <span class="toggle-slider"></span>
    </label>
  </div>
  
  <div class="btn-row">
    <button id="fireBtn">🚀 Fire</button>
    <button id="clearBtn">🗑 Clear</button>
  </div>
</div>

<div id="hud">
  <h2>📊 Flight Data</h2>
  <div class="hud-item">
    <span class="hud-label">Range</span>
    <span class="hud-value"><span id="range">—</span><span class="hud-unit">m</span></span>
  </div>
  <div class="hud-item">
    <span class="hud-label">Max Height</span>
    <span class="hud-value"><span id="maxHeight">—</span><span class="hud-unit">m</span></span>
  </div>
  <div class="hud-item">
    <span class="hud-label">Flight Time</span>
    <span class="hud-value"><span id="flightTime">—</span><span class="hud-unit">s</span></span>
  </div>
</div>

<div id="info-bar">
  Drag to orbit • Scroll to zoom • Right-click to pan
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── State ───
window.__3D_STATE__ = {
  trajectoryCount: 0,
  angle: 30,
  speed: 95,
  mass: 1.0,
  lastRange: 0,
  lastMaxHeight: 0,
  lastFlightTime: 0,
  coriolisEnabled: false
};

const trajectories = [];
const trajectoryColors = [
  0xff6b35, 0x00e5ff, 0xffeb3b, 0x76ff03, 0xff4081,
  0x7c4dff, 0x00e676, 0xff9100, 0x40c4ff, 0xf50057,
  0x69f0ae, 0xffd740, 0x448aff, 0xff6e40, 0xb388ff
];
let colorIndex = 0;

// ─── Three.js Setup ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.0008);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 5000);
camera.position.set(150, 120, 250);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 30, 0);
controls.maxDistance = 2000;

// ─── Lighting ───
const ambientLight = new THREE.AmbientLight(0x334466, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(100, 200, 100);
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x4488cc, 0x223344, 0.4);
scene.add(hemiLight);

// ─── Ground ───
const groundSize = 2000;
const groundGeo = new THREE.PlaneGeometry(groundSize, groundSize);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a2e,
  roughness: 0.9,
  metalness: 0.1
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid
const gridHelper = new THREE.GridHelper(groundSize, 100, 0x2a2a4a, 0x1a1a3a);
gridHelper.position.y = 0.05;
scene.add(gridHelper);

// Finer grid
const gridHelper2 = new THREE.GridHelper(400, 40, 0x3a3a5a, 0x2a2a4a);
gridHelper2.position.y = 0.1;
scene.add(gridHelper2);

// ─── Axes markers ───
function createAxisLabel(text, position, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = color;
  ctx.font = 'bold 40px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 64, 32);
  const texture = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.copy(position);
  sprite.scale.set(16, 8, 1);
  scene.add(sprite);
}

// Axis lines
const axisLen = 50;
const axisPoints = [
  { pts: [new THREE.Vector3(0,0,0), new THREE.Vector3(axisLen,0,0)], color: 0xff4444, label: 'X' },
  { pts: [new THREE.Vector3(0,0,0), new THREE.Vector3(0,axisLen,0)], color: 0x44ff44, label: 'Y' },
  { pts: [new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,axisLen)], color: 0x4444ff, label: 'Z' },
];
axisPoints.forEach(a => {
  const geo = new THREE.BufferGeometry().setFromPoints(a.pts);
  const mat = new THREE.LineBasicMaterial({ color: a.color, linewidth: 2 });
  scene.add(new THREE.Line(geo, mat));
  createAxisLabel(a.label, a.pts[1].clone().multiplyScalar(1.15), '#' + a.color.toString(16).padStart(6, '0'));
});

// Launch origin marker
const originGeo = new THREE.SphereGeometry(1.5, 16, 16);
const originMat = new THREE.MeshStandardMaterial({ color: 0xff6b35, emissive: 0xff4400, emissiveIntensity: 0.5 });
const originMarker = new THREE.Mesh(originGeo, originMat);
originMarker.position.set(0, 0.5, 0);
scene.add(originMarker);

// ─── Physics Constants ───
const g = 9.81;
const Cd = 0.47;
const rho_air = 1.225;
const rho_body = 1000;
const OMEGA = 7.2921e-5; // Earth's angular velocity rad/s
const LATITUDE = 45 * Math.PI / 180;

// ─── Simulation ───
function simulateTrajectory(angleDeg, speed, mass, coriolisEnabled) {
  const angleRad = angleDeg * Math.PI / 180;
  
  // Compute radius from mass and body density
  const r = Math.pow((3 * mass) / (4 * Math.PI * rho_body), 1/3);
  const A = Math.PI * r * r;
  
  // Initial velocity: launch in XZ plane along X, upward Y
  let vx = speed * Math.cos(angleRad);
  let vy = speed * Math.sin(angleRad);
  let vz = 0;
  
  let x = 0, y = 0, z = 0;
  
  const points = [new THREE.Vector3(x, y, z)];
  let maxHeight = 0;
  let t = 0;
  const dt = 0.001; // 1ms timestep for accuracy
  const maxTime = 300; // safety limit
  
  // Earth rotation vector components at given latitude
  // Omega = (0, Omega*sin(lat), Omega*cos(lat)) in local ENU-like frame
  // We use: x=East, y=Up, z=South (or North, let's define properly)
  // Standard: x=East, y=Up(radial), z=North (for Coriolis)
  // Actually let's keep it simple: launch along +x, y=up, z=lateral
  // Omega in local frame at latitude phi: Omega_x=0, Omega_y=Omega*sin(phi), Omega_z=Omega*cos(phi)
  // But our z might be different. Let's say x=horizontal launch dir, y=up, z=lateral(east-west deviation)
  // For a standard Coriolis: a_cor = -2 * Omega × v
  // Omega = (0, Omega*sin(lat), Omega*cos(lat)) if x=South, y=Up, z=East
  // Let's use: x=North(launch dir), y=Up, z=East
  // Then Omega_local = (Omega*cos(lat), Omega*sin(lat), 0) ... 
  // Actually let me just define it cleanly:
  // Local frame: x=launch direction (horizontal), y=up, z=right (perpendicular horizontal)
  // Assume launching northward: then x=North, z=East
  // Omega in local coords: Omega_x = Omega*cos(lat), Omega_y = Omega*sin(lat), Omega_z = 0
  
  const Ox = OMEGA * Math.cos(LATITUDE);
  const Oy = OMEGA * Math.sin(LATITUDE);
  const Oz = 0;
  
  let step = 0;
  const recordEvery = 50; // record point every 50 steps (every 0.05s)
  
  while (t < maxTime) {
    const v_mag = Math.sqrt(vx*vx + vy*vy + vz*vz);
    
    // Drag acceleration (opposing velocity)
    const dragFactor = 0.5 * Cd * rho_air * A * v_mag / mass;
    let ax = -dragFactor * vx;
    let ay = -g - dragFactor * vy;
    let az = -dragFactor * vz;
    
    // Coriolis: a_cor = -2 * (Omega × v)
    if (coriolisEnabled) {
      // Omega × v = |i  j  k |
      //             |Ox Oy Oz|
      //             |vx vy vz|
      // = (Oy*vz - Oz*vy, Oz*vx - Ox*vz, Ox*vy - Oy*vx)
      const cx = Oy * vz - Oz * vy;
      const cy = Oz * vx - Ox * vz;
      const cz = Ox * vy - Oy * vx;
      ax -= 2 * cx;
      ay -= 2 * cy;
      az -= 2 * cz;
    }
    
    // RK4 would be better but with small dt, Euler is fine
    // Actually let's use Velocity Verlet for better energy conservation
    // Simple symplectic Euler: update velocity then position
    vx += ax * dt;
    vy += ay * dt;
    vz += az * dt;
    
    x += vx * dt;
    y += vy * dt;
    z += vz * dt;
    
    t += dt;
    step++;
    
    if (y > maxHeight) maxHeight = y;
    
    if (step % recordEvery === 0) {
      points.push(new THREE.Vector3(x, y, z));
    }
    
    // Check ground hit
    if (y <= 0 && t > dt * 2) {
      // Interpolate to find exact ground hit
      const prevY = y - vy * dt;
      if (prevY > 0) {
        const frac = prevY / (prevY - y);
        const hitX = (x - vx * dt) + vx * dt * frac;
        const hitZ = (z - vz * dt) + vz * dt * frac;
        points.push(new THREE.Vector3(hitX, 0, hitZ));
        x = hitX;
        z = hitZ;
        y = 0;
        t -= dt * (1 - frac);
      } else {
        points.push(new THREE.Vector3(x, 0, z));
      }
      break;
    }
  }
  
  const range = Math.sqrt(x * x + z * z);
  
  return {
    points,
    range,
    maxHeight,
    flightTime: t
  };
}

// ─── Create trajectory visual ───
function createTrajectoryVisual(points, color) {
  const group = new THREE.Group();
  
  // Main trajectory line
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const material = new THREE.LineBasicMaterial({ 
    color: color,
    linewidth: 2
  });
  const line = new THREE.Line(geometry, material);
  group.add(line);
  
  // Glowing tube for better visibility
  if (points.length > 2) {
    const curve = new THREE.CatmullRomCurve3(points, false, 'catmullrom', 0.1);
    const tubeGeo = new THREE.TubeGeometry(curve, Math.min(points.length * 2, 500), 0.4, 6, false);
    const tubeMat = new THREE.MeshStandardMaterial({
      color: color,
      emissive: color,
      emissiveIntensity: 0.4,
      transparent: true,
      opacity: 0.7,
      roughness: 0.3,
      metalness: 0.5
    });
    const tube = new THREE.Mesh(tubeGeo, tubeMat);
    group.add(tube);
  }
  
  // Impact marker
  const lastPoint = points[points.length - 1];
  const impactGeo = new THREE.SphereGeometry(1.2, 12, 12);
  const impactMat = new THREE.MeshStandardMaterial({
    color: color,
    emissive: color,
    emissiveIntensity: 0.8
  });
  const impactMarker = new THREE.Mesh(impactGeo, impactMat);
  impactMarker.position.copy(lastPoint);
  impactMarker.position.y = Math.max(impactMarker.position.y, 0.6);
  group.add(impactMarker);
  
  // Impact ring on ground
  const ringGeo = new THREE.RingGeometry(2, 3, 32);
  const ringMat = new THREE.MeshBasicMaterial({ 
    color: color, 
    transparent: true, 
    opacity: 0.5,
    side: THREE.DoubleSide
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.set(lastPoint.x, 0.1, lastPoint.z);
  group.add(ring);
  
  // Apex marker
  let apexPoint = points[0];
  for (const p of points) {
    if (p.y > apexPoint.y) apexPoint = p;
  }
  const apexGeo = new THREE.OctahedronGeometry(0.8);
  const apexMat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    emissive: color,
    emissiveIntensity: 0.3,
    transparent: true,
    opacity: 0.6
  });
  const apexMarker = new THREE.Mesh(apexGeo, apexMat);
  apexMarker.position.copy(apexPoint);
  group.add(apexMarker);
  
  // Shadow projection on ground
  const shadowPoints = points.map(p => new THREE.Vector3(p.x, 0.05, p.z));
  const shadowGeo = new THREE.BufferGeometry().setFromPoints(shadowPoints);
  const shadowMat = new THREE.LineBasicMaterial({
    color: color,
    transparent: true,
    opacity: 0.15
  });
  const shadowLine = new THREE.Line(shadowGeo, shadowMat);
  group.add(shadowLine);
  
  scene.add(group);
  return group;
}

// ─── UI Bindings ───
const angleInput = document.getElementById('angle');
const speedInput = document.getElementById('speed');
const massInput = document.getElementById('mass');
const coriolisToggle = document.getElementById('coriolisToggle');
const fireBtn = document.getElementById('fireBtn');
const clearBtn = document.getElementById('clearBtn');
const rangeEl = document.getElementById('range');
const maxHeightEl = document.getElementById('maxHeight');
const flightTimeEl = document.getElementById('flightTime');

function updateLabels() {
  document.getElementById('angleVal').textContent = angleInput.value + '°';
  document.getElementById('speedVal').textContent = speedInput.value + ' m/s';
  document.getElementById('massVal').textContent = parseFloat(massInput.value).toFixed(1) + ' kg';
  
  window.__3D_STATE__.angle = parseFloat(angleInput.value);
  window.__3D_STATE__.speed = parseFloat(speedInput.value);
  window.__3D_STATE__.mass = parseFloat(massInput.value);
  window.__3D_STATE__.coriolisEnabled = coriolisToggle.checked;
}

angleInput.addEventListener('input', updateLabels);
speedInput.addEventListener('input', updateLabels);
massInput.addEventListener('input', updateLabels);
coriolisToggle.addEventListener('change', updateLabels);

fireBtn.addEventListener('click', () => {
  const angle = parseFloat(angleInput.value);
  const speed = parseFloat(speedInput.value);
  const mass = parseFloat(massInput.value);
  const coriolis = coriolisToggle.checked;
  
  const result = simulateTrajectory(angle, speed, mass, coriolis);
  
  const color = trajectoryColors[colorIndex % trajectoryColors.length];
  colorIndex++;
  
  const visual = createTrajectoryVisual(result.points, color);
  trajectories.push(visual);
  
  // Update HUD
  rangeEl.textContent = result.range.toFixed(2);
  maxHeightEl.textContent = result.maxHeight.toFixed(2);
  flightTimeEl.textContent = result.flightTime.toFixed(3);
  
  // Update state
  window.__3D_STATE__.trajectoryCount = trajectories.length;
  window.__3D_STATE__.lastRange = parseFloat(result.range.toFixed(2));
  window.__3D_STATE__.lastMaxHeight = parseFloat(result.maxHeight.toFixed(2));
  window.__3D_STATE__.lastFlightTime = parseFloat(result.flightTime.toFixed(3));
  window.__3D_STATE__.angle = angle;
  window.__3D_STATE__.speed = speed;
  window.__3D_STATE__.mass = mass;
  window.__3D_STATE__.coriolisEnabled = coriolis;
  
  // Auto-adjust camera to see the trajectory
  const maxPt = result.points.reduce((a, b) => (b.y > a.y ? b : a), result.points[0]);
  const endPt = result.points[result.points.length - 1];
  const targetX = endPt.x / 2;
  const targetY = maxPt.y / 2;
  controls.target.set(targetX, targetY, 0);
});

clearBtn.addEventListener('click', () => {
  trajectories.forEach(t => {
    scene.remove(t);
    t.traverse(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) {
        if (child.material.map) child.material.map.dispose();
        child.material.dispose();
      }
    });
  });
  trajectories.length = 0;
  colorIndex = 0;
  
  rangeEl.textContent = '—';
  maxHeightEl.textContent = '—';
  flightTimeEl.textContent = '—';
  
  window.__3D_STATE__.trajectoryCount = 0;
  window.__3D_STATE__.lastRange = 0;
  window.__3D_STATE__.lastMaxHeight = 0;
  window.__3D_STATE__.lastFlightTime = 0;
});

// ─── Starfield ───
const starCount = 2000;
const starGeo = new THREE.BufferGeometry();
const starPositions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 1500 + Math.random() * 500;
  starPositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
  starPositions[i*3+1] = Math.abs(r * Math.cos(phi)); // only upper hemisphere
  starPositions[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, transparent: true, opacity: 0.6 });
scene.add(new THREE.Points(starGeo, starMat));

// ─── Animation ───
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  
  // Rotate origin marker glow
  originMarker.rotation.y += 0.02;
  
  renderer.render(scene, camera);
}

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Init
updateLabels();
animate();
</script>
</body>
