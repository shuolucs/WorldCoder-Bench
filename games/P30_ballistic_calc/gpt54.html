<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 弹道轨迹可视化</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #eee;
    }
    #app {
      display: flex;
      width: 100%;
      height: 100%;
    }
    #ui {
      width: 320px;
      padding: 16px;
      background: rgba(20, 20, 24, 0.96);
      border-right: 1px solid rgba(255,255,255,0.08);
      overflow-y: auto;
    }
    #ui h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }
    .group {
      margin-bottom: 14px;
      padding: 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
    }
    .row {
      margin-bottom: 10px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }
    input[type="range"] {
      width: 100%;
    }
    .value {
      font-size: 13px;
      opacity: 0.9;
    }
    button {
      width: 48%;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: white;
    }
    #fireBtn { background: #1e88e5; }
    #clearBtn { background: #e53935; }
    .btns {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    #hud div {
      margin: 8px 0;
      font-size: 14px;
    }
    #sceneWrap {
      flex: 1;
      position: relative;
    }
    #hint {
      position: absolute;
      left: 12px;
      bottom: 12px;
      padding: 8px 10px;
      background: rgba(0,0,0,0.45);
      border-radius: 8px;
      font-size: 12px;
      color: #ddd;
      pointer-events: none;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h2>3D 弹道轨迹</h2>

      <div class="group">
        <div class="row">
          <label for="angle">发射仰角（度）</label>
          <input id="angle" type="range" min="0" max="90" step="1" value="30" />
          <div class="value"><span id="angleVal">30</span>°</div>
        </div>

        <div class="row">
          <label for="speed">初速度（m/s）</label>
          <input id="speed" type="range" min="10" max="100" step="1" value="95" />
          <div class="value"><span id="speedVal">95</span> m/s</div>
        </div>

        <div class="row">
          <label for="mass">质量（kg）</label>
          <input id="mass" type="range" min="0.1" max="10" step="0.1" value="1.0" />
          <div class="value"><span id="massVal">1.0</span> kg</div>
        </div>

        <div class="row">
          <label>
            <input id="coriolisToggle" type="checkbox" />
            计入科里奥利效应（纬度 45°）
          </label>
        </div>

        <div class="btns">
          <button id="fireBtn">发射</button>
          <button id="clearBtn">清除</button>
        </div>
      </div>

      <div id="hud" class="group">
        <div>水平射程：<span id="range">0.00</span> m</div>
        <div>最大高度：<span id="maxHeight">0.00</span> m</div>
        <div>飞行时间：<span id="flightTime">0.00</span> s</div>
      </div>

      <div class="group">
        <div style="font-size:13px; line-height:1.6; opacity:0.9;">
          模型：
          <br>• 重力 g = 9.81 m/s²
          <br>• 阻力 Cd = 0.47，空气密度 ρ = 1.225
          <br>• 球体密度 ρ_body = 1000 kg/m³
          <br>• 数值积分：固定小步长欧拉更新
        </div>
      </div>
    </div>

    <div id="sceneWrap">
      <div id="hint">鼠标拖拽旋转，滚轮缩放，右键平移</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const angleEl = document.getElementById('angle');
    const speedEl = document.getElementById('speed');
    const massEl = document.getElementById('mass');
    const coriolisToggleEl = document.getElementById('coriolisToggle');
    const fireBtn = document.getElementById('fireBtn');
    const clearBtn = document.getElementById('clearBtn');

    const angleValEl = document.getElementById('angleVal');
    const speedValEl = document.getElementById('speedVal');
    const massValEl = document.getElementById('massVal');

    const rangeEl = document.getElementById('range');
    const maxHeightEl = document.getElementById('maxHeight');
    const flightTimeEl = document.getElementById('flightTime');

    const sceneWrap = document.getElementById('sceneWrap');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101318);

    const camera = new THREE.PerspectiveCamera(
      60,
      sceneWrap.clientWidth / sceneWrap.clientHeight,
      0.1,
      5000
    );
    camera.position.set(80, 45, 80);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(sceneWrap.clientWidth, sceneWrap.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    sceneWrap.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(30, 10, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0xffffff, 1.0);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(40, 80, 30);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(400, 40, 0x55aaff, 0x444444);
    scene.add(grid);

    const planeGeo = new THREE.PlaneGeometry(400, 400);
    const planeMat = new THREE.MeshStandardMaterial({
      color: 0x1f2a1f,
      transparent: true,
      opacity: 0.18,
      side: THREE.DoubleSide
    });
    const plane = new THREE.Mesh(planeGeo, planeMat);
    plane.rotation.x = -Math.PI / 2;
    plane.position.y = 0;
    scene.add(plane);

    const axes = new THREE.AxesHelper(20);
    scene.add(axes);

    const launchMarker = new THREE.Mesh(
      new THREE.SphereGeometry(0.8, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0xffff00 })
    );
    launchMarker.position.set(0, 0, 0);
    scene.add(launchMarker);

    const trajectories = [];
    const colorPalette = [
      0xff5252, 0xff9800, 0xffeb3b, 0x4caf50, 0x00bcd4,
      0x2196f3, 0x3f51b5, 0x9c27b0, 0xe91e63, 0xffffff
    ];
    let colorIndex = 0;

    const G = 9.81;
    const CD = 0.47;
    const RHO_AIR = 1.225;
    const RHO_BODY = 1000;
    const OMEGA = 7.2921159e-5;
    const LATITUDE = THREE.MathUtils.degToRad(45);

    function parsedControls() {
      return {
        angle: Number(angleEl.value),
        speed: Number(speedEl.value),
        mass: Number(massEl.value),
        coriolisEnabled: !!coriolisToggleEl.checked
      };
    }

    function updateLabels() {
      angleValEl.textContent = angleEl.value;
      speedValEl.textContent = speedEl.value;
      massValEl.textContent = Number(massEl.value).toFixed(1);
    }

    function updateHUD(range, maxHeight, flightTime) {
      rangeEl.textContent = range.toFixed(2);
      maxHeightEl.textContent = maxHeight.toFixed(2);
      flightTimeEl.textContent = flightTime.toFixed(2);
    }

    function ensureState() {
      const c = parsedControls();
      if (!window.__3D_STATE__) {
        window.__3D_STATE__ = {};
      }
      window.__3D_STATE__.trajectoryCount = trajectories.length;
      window.__3D_STATE__.angle = c.angle;
      window.__3D_STATE__.speed = c.speed;
      window.__3D_STATE__.mass = c.mass;
      window.__3D_STATE__.coriolisEnabled = c.coriolisEnabled;
      window.__3D_STATE__.lastRange = window.__3D_STATE__.lastRange ?? 0;
      window.__3D_STATE__.lastMaxHeight = window.__3D_STATE__.lastMaxHeight ?? 0;
      window.__3D_STATE__.lastFlightTime = window.__3D_STATE__.lastFlightTime ?? 0;
    }

    function setLastState(range, maxHeight, flightTime) {
      ensureState();
      window.__3D_STATE__.lastRange = range;
      window.__3D_STATE__.lastMaxHeight = maxHeight;
      window.__3D_STATE__.lastFlightTime = flightTime;
    }

    function massToRadius(mass) {
      return Math.cbrt((3 * mass) / (4 * Math.PI * RHO_BODY));
    }

    function simulateTrajectory(params) {
      const angleRad = THREE.MathUtils.degToRad(params.angle);
      const m = params.mass;
      const v0 = params.speed;

      const radius = massToRadius(m);
      const area = Math.PI * radius * radius;

      const p = new THREE.Vector3(0, 0, 0);
      const v = new THREE.Vector3(
        v0 * Math.cos(angleRad),
        v0 * Math.sin(angleRad),
        0
      );

      const points = [p.clone()];
      const dt = 0.005;
      const maxTime = 60;

      let t = 0;
      let maxHeight = 0;

      const omegaVec = new THREE.Vector3(
        0,
        OMEGA * Math.cos(LATITUDE),
        OMEGA * Math.sin(LATITUDE)
      );

      let prevP = p.clone();
      let prevT = 0;

      while (t < maxTime) {
        prevP.copy(p);
        prevT = t;

        const speed = v.length();

        const gravityAcc = new THREE.Vector3(0, -G, 0);

        const dragAcc = new THREE.Vector3(0, 0, 0);
        if (speed > 1e-8) {
          const dragMag = (0.5 * CD * RHO_AIR * area * speed * speed) / m;
          dragAcc.copy(v).normalize().multiplyScalar(-dragMag);
        }

        const coriolisAcc = new THREE.Vector3(0, 0, 0);
        if (params.coriolisEnabled) {
          coriolisAcc.copy(omegaVec).cross(v).multiplyScalar(-2);
        }

        const totalAcc = new THREE.Vector3()
          .add(gravityAcc)
          .add(dragAcc)
          .add(coriolisAcc);

        v.addScaledVector(totalAcc, dt);
        p.addScaledVector(v, dt);
        t += dt;

        if (p.y > maxHeight) maxHeight = p.y;
        points.push(p.clone());

        if (p.y <= 0 && t > 0.001) {
          const dy = p.y - prevP.y;
          let alpha = 0;
          if (Math.abs(dy) > 1e-12) {
            alpha = (0 - prevP.y) / dy;
          }

          const hit = prevP.clone().lerp(p, alpha);
          points[points.length - 1] = hit;

          const hitTime = prevT + alpha * dt;
          const range = Math.sqrt(hit.x * hit.x + hit.z * hit.z);

          return {
            points,
            range,
            maxHeight,
            flightTime: hitTime
          };
        }
      }

      const last = points[points.length - 1];
      return {
        points,
        range: Math.sqrt(last.x * last.x + last.z * last.z),
        maxHeight,
        flightTime: t
      };
    }

    function addTrajectoryLine(points) {
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({
        color: colorPalette[colorIndex % colorPalette.length]
      });
      colorIndex++;

      const line = new THREE.Line(geometry, material);
      scene.add(line);
      trajectories.push(line);
    }

    function fire() {
      const params = parsedControls();
      const result = simulateTrajectory(params);
      addTrajectoryLine(result.points);
      updateHUD(result.range, result.maxHeight, result.flightTime);
      ensureState();
      setLastState(result.range, result.maxHeight, result.flightTime);
      window.__3D_STATE__.trajectoryCount = trajectories.length;
    }

    function clearTrajectories() {
      for (const line of trajectories) {
        scene.remove(line);
        line.geometry.dispose();
        line.material.dispose();
      }
      trajectories.length = 0;
      updateHUD(0, 0, 0);
      ensureState();
      setLastState(0, 0, 0);
      window.__3D_STATE__.trajectoryCount = 0;
    }

    [angleEl, speedEl, massEl, coriolisToggleEl].forEach(el => {
      el.addEventListener('input', () => {
        updateLabels();
        ensureState();
      });
      el.addEventListener('change', () => {
        updateLabels();
        ensureState();
      });
    });

    fireBtn.addEventListener('click', fire);
    clearBtn.addEventListener('click', clearTrajectories);

    window.addEventListener('resize', () => {
      camera.aspect = sceneWrap.clientWidth / sceneWrap.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(sceneWrap.clientWidth, sceneWrap.clientHeight);
    });

    updateLabels();
    updateHUD(0, 0, 0);
    ensureState();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      ensureState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
