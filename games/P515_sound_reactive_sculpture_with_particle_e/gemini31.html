<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sound-Reactive Sculpture</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
            font-family: monospace;
            color: #ffffff;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 1px solid #333;
            border-radius: 5px;
            pointer-events: none;
            z-index: 10;
            min-width: 200px;
        }
        #hud div {
            margin-bottom: 5px;
        }
        .label {
            color: #888;
        }
        .value {
            font-weight: bold;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border: 1px solid #333;
            border-radius: 5px;
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 10;
        }
        button, select {
            background: #222;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 15px;
            font-family: monospace;
            cursor: pointer;
            border-radius: 3px;
        }
        button:hover, select:hover {
            background: #333;
        }
        #instructions {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 1px solid #333;
            border-radius: 5px;
            pointer-events: none;
            z-index: 10;
            text-align: right;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div><span class="label">Mode:</span> <span id="hud-mode" class="value">Ambient</span></div>
        <div><span class="label">Audio:</span> <span id="hud-audio" class="value">OFF</span></div>
        <div><span class="label">Bass:</span> <span id="hud-bass" class="value">0.00</span></div>
        <div><span class="label">Mid:</span> <span id="hud-mid" class="value">0.00</span></div>
        <div><span class="label">Treble:</span> <span id="hud-treble" class="value">0.00</span></div>
        <div><span class="label">Particles:</span> <span id="hud-particles" class="value">2000</span></div>
        <div><span class="label">Color:</span> <span id="hud-color" class="value">default</span></div>
        <div><span class="label">FPS:</span> <span id="hud-fps" class="value">0</span></div>
    </div>

    <div id="instructions">
        <div>[Space] Toggle Audio</div>
        <div>[P] Toggle Particles</div>
        <div>[R] Reset Camera</div>
        <div>[C] Cycle Colors</div>
        <div>[F] Fullscreen</div>
    </div>

    <div id="controls">
        <button id="btn-audio">Start Audio</button>
        <select id="select-mode">
            <option value="Ambient">Ambient</option>
            <option value="Explosive">Explosive</option>
            <option value="Zen">Zen</option>
        </select>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            audioActive: false,
            mode: 'Ambient',
            bass: 0,
            mid: 0,
            treble: 0,
            particlesVisible: true,
            particleCount: 2000,
            colorScheme: 'default',
            sculptureScale: 1,
            sculptureRotationY: 0,
            warmLightIntensity: 2,
            coolLightIntensity: 2,
            cameraPosition: { x: 0, y: 5, z: 15 },
            frameCount: 0,
            particleExpansionRadius: 0,
            animationMixerActive: false
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const warmLight = new THREE.PointLight(0xff6633, 2, 50);
        warmLight.position.set(10, 10, 5);
        scene.add(warmLight);

        const coolLight = new THREE.PointLight(0x3366ff, 2, 50);
        coolLight.position.set(-10, 8, -5);
        scene.add(coolLight);

        // --- Model Loading ---
        let sculptureGroup = new THREE.Group();
        scene.add(sculptureGroup);
        let baseScale = 1;
        let mixer = null;

        const loader = new GLTFLoader();
        // Using unpkg as a reliable CDN for the three.js examples models
        loader.load('https://unpkg.com/three@0.163.0/examples/models/gltf/LittlestTokyo.glb', (gltf) => {
            const model = gltf.scene;
            
            // Center and scale
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            const maxDim = Math.max(size.x, size.y, size.z);
            baseScale = 6 / maxDim;
            
            model.scale.setScalar(baseScale);
            model.position.sub(center.multiplyScalar(baseScale));
            
            sculptureGroup.add(model);
            state.modelLoaded = true;

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                const action = mixer.clipAction(gltf.animations[0]);
                action.play();
            }
        });

        // --- Particle System ---
        const particleCount = 2000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const originalPositions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const phases = new Float32Array(particleCount);

        for (let i = 0; i < particleCount; i++) {
            // Random point in sphere radius 4
            const u = Math.random();
            const v = Math.random();
            const theta = u * 2.0 * Math.PI;
            const phi = Math.acos(2.0 * v - 1.0);
            const r = Math.cbrt(Math.random()) * 4;

            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);

            positions[i * 3] = x;
            positions[i * 3 + 1] = y;
            positions[i * 3 + 2] = z;

            originalPositions[i * 3] = x;
            originalPositions[i * 3 + 1] = y;
            originalPositions[i * 3 + 2] = z;

            colors[i * 3] = 1;
            colors[i * 3 + 1] = 1;
            colors[i * 3 + 2] = 1;

            phases[i] = Math.random() * Math.PI * 2;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.05,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            depthWrite: false
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // --- Color Schemes ---
        const colorSchemes = {
            default: { base: new THREE.Color(0xffffff), treble: new THREE.Color(0xff00ff), bass: new THREE.Color(0xff0000) },
            ocean: { base: new THREE.Color(0x00ffff), treble: new THREE.Color(0x0000ff), bass: new THREE.Color(0x0000ff) },
            fire: { base: new THREE.Color(0xff8800), treble: new THREE.Color(0xffff00), bass: new THREE.Color(0xffff00) }
        };
        const schemeKeys = Object.keys(colorSchemes);

        // --- Audio System (Simulated) ---
        let audioTime = 0;
        const clock = new THREE.Clock();

        function updateAudio(delta) {
            if (!state.audioActive) {
                state.bass = Math.max(0, state.bass - delta * 2);
                state.mid = Math.max(0, state.mid - delta * 2);
                state.treble = Math.max(0, state.treble - delta * 2);
                return;
            }
            audioTime += delta;
            state.bass = Math.abs(Math.sin(audioTime * 0.5 * Math.PI * 2));
            state.mid = Math.abs(Math.sin(audioTime * 1.2 * Math.PI * 2));
            state.treble = Math.abs(Math.sin(audioTime * 2.8 * Math.PI * 2));
        }

        // --- Interaction & UI ---
        const btnAudio = document.getElementById('btn-audio');
        const selectMode = document.getElementById('select-mode');

        function toggleAudio() {
            state.audioActive = !state.audioActive;
            btnAudio.textContent = state.audioActive ? 'Stop Audio' : 'Start Audio';
            document.getElementById('hud-audio').textContent = state.audioActive ? 'ON' : 'OFF';
        }

        btnAudio.addEventListener('click', toggleAudio);

        selectMode.addEventListener('change', (e) => {
            state.mode = e.target.value;
            document.getElementById('hud-mode').textContent = state.mode;
        });

        window.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case 'p':
                    state.particlesVisible = !state.particlesVisible;
                    particles.visible = state.particlesVisible;
                    break;
                case 'r':
                    camera.position.set(0, 5, 15);
                    controls.target.set(0, 0, 0);
                    break;
                case 'c':
                    let idx = schemeKeys.indexOf(state.colorScheme);
                    state.colorScheme = schemeKeys[(idx + 1) % schemeKeys.length];
                    break;
                case ' ':
                    toggleAudio();
                    break;
                case 'f':
                    if (!document.fullscreenElement) {
                        document.body.requestFullscreen().catch(err => {});
                    } else {
                        document.exitFullscreen();
                    }
                    break;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- HUD Update ---
        let lastTime = performance.now();
        let frames = 0;

        function updateHUD() {
            document.getElementById('hud-bass').textContent = state.bass.toFixed(2);
            document.getElementById('hud-mid').textContent = state.mid.toFixed(2);
            document.getElementById('hud-treble').textContent = state.treble.toFixed(2);
            document.getElementById('hud-particles').textContent = state.particlesVisible ? '2000' : '0 (hidden)';
            document.getElementById('hud-color').textContent = state.colorScheme;

            frames++;
            const now = performance.now();
            if (now >= lastTime + 1000) {
                document.getElementById('hud-fps').textContent = Math.round((frames * 1000) / (now - lastTime));
                frames = 0;
                lastTime = now;
            }
        }

        // --- Animation Loop ---
        const tempColor = new THREE.Color();
        const posVector = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            state.frameCount++;

            updateAudio(delta);
            controls.update();

            // Mode multipliers
            let expMult = 3;
            let scaleMult = 0.15;
            let rotSpeed = 0.005;
            let zenFactor = 1;

            if (state.mode === 'Explosive') {
                expMult = 6;
                scaleMult = 0.3;
            } else if (state.mode === 'Zen') {
                expMult = 1.5;
                scaleMult = 0.075;
                rotSpeed = 0.0025;
                zenFactor = 0.5;
            }

            // Sculpture Reactivity
            if (state.modelLoaded) {
                const targetScale = baseScale * (1 + state.bass * scaleMult);
                sculptureGroup.scale.setScalar(targetScale);
                state.sculptureScale = targetScale;

                if (state.audioActive) {
                    sculptureGroup.rotation.y += rotSpeed;
                }
                state.sculptureRotationY = sculptureGroup.rotation.y;

                if (mixer && state.audioActive) {
                    mixer.update(delta * zenFactor);
                    state.animationMixerActive = true;
                } else {
                    state.animationMixerActive = false;
                }
            }

            // Light Reactivity
            warmLight.intensity = 1 + state.bass * 3;
            coolLight.intensity = 1 + state.mid * 3;
            state.warmLightIntensity = warmLight.intensity;
            state.coolLightIntensity = coolLight.intensity;

            // Particle Reactivity
            if (state.particlesVisible) {
                const posAttr = geometry.attributes.position;
                const colAttr = geometry.attributes.color;
                const scheme = colorSchemes[state.colorScheme];
                
                state.particleExpansionRadius = state.bass * expMult;

                for (let i = 0; i < particleCount; i++) {
                    const ix = i * 3;
                    const iy = i * 3 + 1;
                    const iz = i * 3 + 2;

                    posVector.set(originalPositions[ix], originalPositions[iy], originalPositions[iz]);
                    const dist = posVector.length() || 1;
                    const dirX = posVector.x / dist;
                    const dirY = posVector.y / dist;
                    const dirZ = posVector.z / dist;

                    // Position update
                    posAttr.array[ix] = originalPositions[ix] + dirX * state.particleExpansionRadius;
                    posAttr.array[iy] = originalPositions[iy] + dirY * state.particleExpansionRadius + Math.sin(audioTime * 5 + phases[i]) * (state.mid * 2 * zenFactor);
                    posAttr.array[iz] = originalPositions[iz] + dirZ * state.particleExpansionRadius;

                    // Color update
                    tempColor.copy(scheme.base);
                    
                    if (state.treble > 0.5) {
                        tempColor.lerp(scheme.treble, (state.treble - 0.5) * 2);
                    }
                    if (state.bass > 0.7) {
                        tempColor.lerp(scheme.bass, (state.bass - 0.7) * 3);
                    }

                    colAttr.array[ix] = tempColor.r;
                    colAttr.array[iy] = tempColor.g;
                    colAttr.array[iz] = tempColor.b;
                }
                posAttr.needsUpdate = true;
                colAttr.needsUpdate = true;
            }

            // Update State Object Camera Pos
            state.cameraPosition.x = camera.position.x;
            state.cameraPosition.y = camera.position.y;
            state.cameraPosition.z = camera.position.z;

            updateHUD();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
