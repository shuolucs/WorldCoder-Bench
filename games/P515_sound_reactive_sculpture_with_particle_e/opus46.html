<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sound-Reactive Sculpture</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
canvas { display: block; }

#controls {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

#btn-audio {
    padding: 10px 20px;
    background: rgba(255, 102, 51, 0.8);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    transition: background 0.3s;
}
#btn-audio:hover { background: rgba(255, 102, 51, 1); }

#select-mode {
    padding: 10px;
    background: rgba(51, 102, 255, 0.8);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 14px;
}
#select-mode option { background: #222; color: white; }

#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 100;
    color: #0f0;
    font-size: 13px;
    line-height: 1.6;
    background: rgba(0, 0, 0, 0.6);
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid rgba(0, 255, 0, 0.2);
    pointer-events: none;
    min-width: 220px;
}
#hud .label { color: #888; }
#hud .value { color: #0f0; font-weight: bold; }

#loading {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 18px;
    z-index: 200;
    text-align: center;
}
#loading .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #ff6633;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 10px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    Loading Sculpture...
</div>

<div id="controls">
    <button id="btn-audio">Start Audio</button>
    <select id="select-mode">
        <option value="Ambient">Ambient</option>
        <option value="Explosive">Explosive</option>
        <option value="Zen">Zen</option>
    </select>
</div>

<div id="hud">
    <div><span class="label">Mode: </span><span class="value" id="hud-mode">Ambient</span></div>
    <div><span class="label">Audio: </span><span class="value" id="hud-audio">OFF</span></div>
    <div><span class="label">Bass: </span><span class="value" id="hud-bass">0.00</span></div>
    <div><span class="label">Mid: </span><span class="value" id="hud-mid">0.00</span></div>
    <div><span class="label">Treble: </span><span class="value" id="hud-treble">0.00</span></div>
    <div><span class="label">Particles: </span><span class="value" id="hud-particles">2000</span></div>
    <div><span class="label">Color: </span><span class="value" id="hud-color">default</span></div>
    <div><span class="label">FPS: </span><span class="value" id="hud-fps">0</span></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- State ---
const state = {
    modelLoaded: false,
    audioActive: false,
    mode: 'Ambient',
    bass: 0,
    mid: 0,
    treble: 0,
    particlesVisible: true,
    particleCount: 2000,
    colorScheme: 'default',
    sculptureScale: 1,
    sculptureRotationY: 0,
    warmLightIntensity: 2,
    coolLightIntensity: 2,
    cameraPosition: { x: 0, y: 5, z: 15 },
    frameCount: 0,
    particleExpansionRadius: 0,
    animationMixerActive: false
};
window.__3D_STATE__ = state;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

const warmLight = new THREE.PointLight(0xff6633, 2, 50);
warmLight.position.set(10, 10, 5);
scene.add(warmLight);

const coolLight = new THREE.PointLight(0x3366ff, 2, 50);
coolLight.position.set(-10, 8, -5);
scene.add(coolLight);

// --- OrbitControls ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// --- GLTF Model ---
let sculpture = null;
let mixer = null;
let baseScale = 1;
const clock = new THREE.Clock();

const loader = new GLTFLoader();
loader.load(
    'https://threejs.org/examples/models/gltf/LittlestTokyo.glb',
    (gltf) => {
        sculpture = gltf.scene;

        // Compute bounding box and scale to fit within 6-unit cube
        const box = new THREE.Box3().setFromObject(sculpture);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        baseScale = 6 / maxDim;
        sculpture.scale.setScalar(baseScale);

        // Center at origin
        const boxAfter = new THREE.Box3().setFromObject(sculpture);
        const center = new THREE.Vector3();
        boxAfter.getCenter(center);
        sculpture.position.sub(center);

        scene.add(sculpture);

        // Animation
        if (gltf.animations && gltf.animations.length > 0) {
            mixer = new THREE.AnimationMixer(sculpture);
            gltf.animations.forEach((clip) => {
                const action = mixer.clipAction(clip);
                action.play();
                action.paused = true;
            });
        }

        state.modelLoaded = true;
        state.sculptureScale = baseScale;
        document.getElementById('loading').style.display = 'none';
    },
    (progress) => {
        if (progress.total > 0) {
            const pct = Math.round((progress.loaded / progress.total) * 100);
            document.getElementById('loading').innerHTML = `<div class="spinner"></div>Loading... ${pct}%`;
        }
    },
    (error) => {
        console.error('Error loading model:', error);
        document.getElementById('loading').innerHTML = 'Failed to load model.<br>Scene will continue without it.';
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
        }, 3000);
        state.modelLoaded = false;
    }
);

// --- Particle System ---
const PARTICLE_COUNT = 2000;
const particleGeometry = new THREE.BufferGeometry();
const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
const particleColors = new Float32Array(PARTICLE_COUNT * 3);
const particleBasePositions = new Float32Array(PARTICLE_COUNT * 3);
const particlePhases = new Float32Array(PARTICLE_COUNT);

for (let i = 0; i < PARTICLE_COUNT; i++) {
    // Spherical distribution, radius 4
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = Math.random() * 4;

    const x = r * Math.sin(phi) * Math.cos(theta);
    const y = r * Math.sin(phi) * Math.sin(theta);
    const z = r * Math.cos(phi);

    particlePositions[i * 3] = x;
    particlePositions[i * 3 + 1] = y;
    particlePositions[i * 3 + 2] = z;

    particleBasePositions[i * 3] = x;
    particleBasePositions[i * 3 + 1] = y;
    particleBasePositions[i * 3 + 2] = z;

    particleColors[i * 3] = 1;
    particleColors[i * 3 + 1] = 1;
    particleColors[i * 3 + 2] = 1;

    particlePhases[i] = Math.random() * Math.PI * 2;
}

particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

const particleMaterial = new THREE.PointsMaterial({
    size: 0.08,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    transparent: true,
    opacity: 0.8,
    depthWrite: false,
    sizeAttenuation: true
});

const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

// --- Audio Beat Engine ---
let audioActive = false;
let audioTime = 0;

function getBeatValues(time) {
    const bass = Math.abs(Math.sin(time * 0.5));
    const mid = Math.abs(Math.sin(time * 1.2));
    const treble = Math.abs(Math.sin(time * 2.8));
    return { bass, mid, treble };
}

// --- Color Schemes ---
const colorSchemes = ['default', 'ocean', 'fire'];
let colorSchemeIndex = 0;

function getColorSchemeColors(scheme, bass, treble) {
    let baseR, baseG, baseB;
    let shiftR, shiftG, shiftB;

    switch (scheme) {
        case 'ocean':
            baseR = 0; baseG = 1; baseB = 1; // cyan
            shiftR = 0; shiftG = 0; shiftB = 1; // blue
            break;
        case 'fire':
            baseR = 1; baseG = 0.533; baseB = 0; // orange
            shiftR = 1; shiftG = 1; shiftB = 0; // yellow
            break;
        default: // default
            baseR = 1; baseG = 1; baseB = 1; // white
            shiftR = 1; shiftG = 0; shiftB = 1; // magenta (treble) or red (bass)
            break;
    }

    return { baseR, baseG, baseB, shiftR, shiftG, shiftB };
}

// --- Mode Multipliers ---
function getModeMultipliers(mode) {
    switch (mode) {
        case 'Explosive':
            return { particleExpansion: 6, scalePulse: 0.3, rotSpeed: 0.005, yOscMult: 1 };
        case 'Zen':
            return { particleExpansion: 1.5, scalePulse: 0.075, rotSpeed: 0.0025, yOscMult: 0.5 };
        default: // Ambient
            return { particleExpansion: 3, scalePulse: 0.15, rotSpeed: 0.005, yOscMult: 1 };
    }
}

// --- UI ---
const btnAudio = document.getElementById('btn-audio');
const selectMode = document.getElementById('select-mode');

btnAudio.addEventListener('click', () => {
    toggleAudio();
});

selectMode.addEventListener('change', (e) => {
    state.mode = e.target.value;
});

function toggleAudio() {
    audioActive = !audioActive;
    state.audioActive = audioActive;
    btnAudio.textContent = audioActive ? 'Stop Audio' : 'Start Audio';
}

// --- Keyboard Controls ---
document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();

    if (key === 'p') {
        state.particlesVisible = !state.particlesVisible;
        particles.visible = state.particlesVisible;
    } else if (key === 'r') {
        camera.position.set(0, 5, 15);
        controls.target.set(0, 0, 0);
        controls.update();
    } else if (key === 'c') {
        colorSchemeIndex = (colorSchemeIndex + 1) % colorSchemes.length;
        state.colorScheme = colorSchemes[colorSchemeIndex];
    } else if (key === ' ') {
        e.preventDefault();
        toggleAudio();
    } else if (key === 'f') {
        if (!document.fullscreenElement) {
            renderer.domElement.requestFullscreen().catch(() => {});
        } else {
            document.exitFullscreen().catch(() => {});
        }
    }
});

// --- FPS Counter ---
let fpsFrames = 0;
let fpsTime = 0;
let currentFPS = 0;

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation Loop ---
function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    // FPS
    fpsFrames++;
    fpsTime += delta;
    if (fpsTime >= 1) {
        currentFPS = Math.round(fpsFrames / fpsTime);
        fpsTime = 0;
        fpsFrames = 0;
    }

    // Beat engine
    let bass = 0, mid = 0, treble = 0;
    if (audioActive) {
        audioTime += delta;
        const beats = getBeatValues(audioTime);
        bass = beats.bass;
        mid = beats.mid;
        treble = beats.treble;
    }

    state.bass = bass;
    state.mid = mid;
    state.treble = treble;

    const mult = getModeMultipliers(state.mode);

    // --- Sculpture Reactivity ---
    if (sculpture) {
        if (audioActive) {
            const newScale = baseScale * (1 + bass * mult.scalePulse);
            sculpture.scale.setScalar(newScale);
            state.sculptureScale = newScale;

            sculpture.rotation.y += mult.rotSpeed;
            state.sculptureRotationY = sculpture.rotation.y;
        }
        state.sculptureScale = sculpture.scale.x;
        state.sculptureRotationY = sculpture.rotation.y;
    }

    // --- Light Reactivity ---
    if (audioActive) {
        warmLight.intensity = 1 + bass * 3;
        coolLight.intensity = 1 + mid * 3;
    } else {
        warmLight.intensity = 2;
        coolLight.intensity = 2;
    }
    state.warmLightIntensity = warmLight.intensity;
    state.coolLightIntensity = coolLight.intensity;

    // --- Particle Update ---
    const positions = particleGeometry.attributes.position.array;
    const colors = particleGeometry.attributes.color.array;
    const scheme = getColorSchemeColors(state.colorScheme, bass, treble);

    let expansionRadius = 0;

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;
        const bx = particleBasePositions[i3];
        const by = particleBasePositions[i3 + 1];
        const bz = particleBasePositions[i3 + 2];

        // Direction from origin
        const dist = Math.sqrt(bx * bx + by * by + bz * bz) || 0.001;
        const nx = bx / dist;
        const ny = by / dist;
        const nz = bz / dist;

        let expansion = 0;
        let yOsc = 0;

        if (audioActive) {
            expansion = bass * mult.particleExpansion;
            yOsc = mid * 2 * mult.yOscMult * Math.sin(elapsed * 3 + particlePhases[i]);
        }

        positions[i3] = bx + nx * expansion;
        positions[i3 + 1] = by + yOsc;
        positions[i3 + 2] = bz + nz * expansion;

        // Color
        let r = scheme.baseR;
        let g = scheme.baseG;
        let b = scheme.baseB;

        if (state.colorScheme === 'default') {
            if (treble > 0.5) {
                const t = (treble - 0.5) * 2; // 0-1
                r = THREE.MathUtils.lerp(1, 1, t);
                g = THREE.MathUtils.lerp(1, 0, t);
                b = THREE.MathUtils.lerp(1, 1, t);
            }
            if (bass > 0.7) {
                const t = (bass - 0.7) / 0.3;
                r = THREE.MathUtils.lerp(r, 1, t);
                g = THREE.MathUtils.lerp(g, 0, t);
                b = THREE.MathUtils.lerp(b, 0, t);
            }
        } else if (state.colorScheme === 'ocean') {
            if (treble > 0.5) {
                const t = (treble - 0.5) * 2;
                r = THREE.MathUtils.lerp(0, 0, t);
                g = THREE.MathUtils.lerp(1, 0, t);
                b = THREE.MathUtils.lerp(1, 1, t);
            } else {
                r = 0; g = 1; b = 1;
            }
        } else if (state.colorScheme === 'fire') {
            if (treble > 0.5) {
                const t = (treble - 0.5) * 2;
                r = THREE.MathUtils.lerp(1, 1, t);
                g = THREE.MathUtils.lerp(0.533, 1, t);
                b = THREE.MathUtils.lerp(0, 0, t);
            } else {
                r = 1; g = 0.533; b = 0;
            }
        }

        colors[i3] = r;
        colors[i3 + 1] = g;
        colors[i3 + 2] = b;

        expansionRadius = bass * mult.particleExpansion;
    }

    particleGeometry.attributes.position.needsUpdate = true;
    particleGeometry.attributes.color.needsUpdate = true;

    state.particleExpansionRadius = expansionRadius;

    // --- Animation Mixer ---
    if (mixer) {
        if (audioActive) {
            mixer.update(delta);
            state.animationMixerActive = true;
        } else {
            state.animationMixerActive = false;
        }
    }

    // --- Controls ---
    controls.update();

    // --- State Update ---
    state.cameraPosition = {
        x: camera.position.x,
        y: camera.position.y,
        z: camera.position.z
    };
    state.frameCount++;

    // --- HUD Update ---
    document.getElementById('hud-mode').textContent = state.mode;
    document.getElementById('hud-audio').textContent = audioActive ? 'ON' : 'OFF';
    document.getElementById('hud-bass').textContent = bass.toFixed(2);
    document.getElementById('hud-mid').textContent = mid.toFixed(2);
    document.getElementById('hud-treble').textContent = treble.toFixed(2);
    document.getElementById('hud-particles').textContent = state.particlesVisible ? '2000' : '0 (hidden)';
    document.getElementById('hud-color').textContent = state.colorScheme;
    document.getElementById('hud-fps').textContent = currentFPS;

    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
