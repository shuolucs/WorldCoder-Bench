<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Sound-Reactive Sculpture</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #ui {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 20;
      display: flex;
      gap: 8px;
      align-items: center;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 10px 12px;
      border-radius: 10px;
      backdrop-filter: blur(6px);
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 220px;
      line-height: 1.45;
      font-size: 14px;
      backdrop-filter: blur(6px);
    }

    #hud strong {
      color: #9cf;
    }

    button, select {
      background: #111;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover, select:hover {
      border-color: rgba(255,255,255,0.4);
    }

    canvas {
      display: block;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 10;
      color: #fff;
      background: radial-gradient(circle at center, rgba(20,20,20,0.6), rgba(0,0,0,0.95));
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    #loading.hidden {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="ui">
    <button id="btn-audio">Start Audio</button>
    <select id="select-mode">
      <option selected>Ambient</option>
      <option>Explosive</option>
      <option>Zen</option>
    </select>
  </div>

  <div id="hud">
    <div>Mode: <strong id="hud-mode">Ambient</strong></div>
    <div>Audio: <strong id="hud-audio">OFF</strong></div>
    <div>Bass: <strong id="hud-bass">0.00</strong></div>
    <div>Mid: <strong id="hud-mid">0.00</strong></div>
    <div>Treble: <strong id="hud-treble">0.00</strong></div>
    <div>Particles: <strong id="hud-particles">2000</strong></div>
    <div>Color: <strong id="hud-color">default</strong></div>
    <div>FPS: <strong id="hud-fps">0</strong></div>
  </div>

  <div id="loading">Loading LittlestTokyo.glb...</div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const btnAudio = document.getElementById('btn-audio');
    const selectMode = document.getElementById('select-mode');
    const loadingEl = document.getElementById('loading');

    const hudMode = document.getElementById('hud-mode');
    const hudAudio = document.getElementById('hud-audio');
    const hudBass = document.getElementById('hud-bass');
    const hudMid = document.getElementById('hud-mid');
    const hudTreble = document.getElementById('hud-treble');
    const hudParticles = document.getElementById('hud-particles');
    const hudColor = document.getElementById('hud-color');
    const hudFps = document.getElementById('hud-fps');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const warmLight = new THREE.PointLight(0xff6633, 2, 100);
    warmLight.position.set(10, 10, 5);
    scene.add(warmLight);

    const coolLight = new THREE.PointLight(0x3366ff, 2, 100);
    coolLight.position.set(-10, 8, -5);
    scene.add(coolLight);

    let sculpture = null;
    let baseScale = 1;
    let mixer = null;
    let animationsExist = false;
    let animationMixerActive = false;

    const loader = new GLTFLoader();
    loader.load(
      'LittlestTokyo.glb',
      (gltf) => {
        sculpture = gltf.scene;

        const box = new THREE.Box3().setFromObject(sculpture);
        const center = new THREE.Vector3();
        const size = new THREE.Vector3();
        box.getCenter(center);
        box.getSize(size);

        sculpture.position.sub(center);

        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        baseScale = 6 / maxDim;
        sculpture.scale.setScalar(baseScale);

        scene.add(sculpture);

        if (gltf.animations && gltf.animations.length > 0) {
          animationsExist = true;
          mixer = new THREE.AnimationMixer(sculpture);
          gltf.animations.forEach((clip) => {
            const action = mixer.clipAction(clip);
            action.play();
            action.paused = true;
          });
          animationMixerActive = false;
        }

        loadingEl.classList.add('hidden');
      },
      undefined,
      (err) => {
        console.error('Failed to load GLB:', err);
        loadingEl.textContent = 'Failed to load LittlestTokyo.glb';
      }
    );

    const PARTICLE_COUNT = 2000;
    const particleGeometry = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
    const particleColors = new Float32Array(PARTICLE_COUNT * 3);

    const baseParticleData = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const u = Math.random();
      const v = Math.random();
      const theta = 2 * Math.PI * u;
      const phi = Math.acos(2 * v - 1);
      const r = 4 * Math.cbrt(Math.random());

      const x = r * Math.sin(phi) * Math.cos(theta);
      const y = r * Math.cos(phi);
      const z = r * Math.sin(phi) * Math.sin(theta);

      baseParticleData.push({
        x, y, z,
        nx: x / (Math.sqrt(x*x + y*y + z*z) || 1),
        ny: y / (Math.sqrt(x*x + y*y + z*z) || 1),
        nz: z / (Math.sqrt(x*x + y*y + z*z) || 1),
        offset: Math.random() * Math.PI * 2
      });

      particlePositions[i * 3 + 0] = x;
      particlePositions[i * 3 + 1] = y;
      particlePositions[i * 3 + 2] = z;

      particleColors[i * 3 + 0] = 1;
      particleColors[i * 3 + 1] = 1;
      particleColors[i * 3 + 2] = 1;
    }

    particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

    const particleMaterial = new THREE.PointsMaterial({
      size: 0.09,
      vertexColors: true,
      transparent: true,
      opacity: 0.9,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    const colorSchemes = {
      default: {
        base: new THREE.Color(0xffffff),
        shift: new THREE.Color(0xff00ff),
        bass: new THREE.Color(0xff0000)
      },
      ocean: {
        base: new THREE.Color(0x00ffff),
        shift: new THREE.Color(0x0000ff),
        bass: new THREE.Color(0x0044ff)
      },
      fire: {
        base: new THREE.Color(0xff8800),
        shift: new THREE.Color(0xffff00),
        bass: new THREE.Color(0xff3300)
      }
    };

    const colorOrder = ['default', 'ocean', 'fire'];
    let colorScheme = 'default';

    const state = {
      audioActive: false,
      mode: 'Ambient',
      bass: 0,
      mid: 0,
      treble: 0,
      particlesVisible: true,
      frameCount: 0,
      particleExpansionRadius: 0
    };

    window.__3D_STATE__ = {
      modelLoaded: false,
      audioActive: false,
      mode: 'Ambient',
      bass: 0,
      mid: 0,
      treble: 0,
      particlesVisible: true,
      particleCount: PARTICLE_COUNT,
      colorScheme: 'default',
      sculptureScale: baseScale,
      sculptureRotationY: 0,
      warmLightIntensity: warmLight.intensity,
      coolLightIntensity: coolLight.intensity,
      cameraPosition: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
      frameCount: 0,
      particleExpansionRadius: 0,
      animationMixerActive: false
    };

    function toggleAudio() {
      state.audioActive = !state.audioActive;
      btnAudio.textContent = state.audioActive ? 'Stop Audio' : 'Start Audio';
      hudAudio.textContent = state.audioActive ? 'ON' : 'OFF';

      if (animationsExist && mixer) {
        mixer._actions.forEach(action => {
          action.paused = !state.audioActive;
        });
        animationMixerActive = state.audioActive;
      }
    }

    function cycleColorScheme() {
      const idx = colorOrder.indexOf(colorScheme);
      colorScheme = colorOrder[(idx + 1) % colorOrder.length];
    }

    btnAudio.addEventListener('click', toggleAudio);

    selectMode.addEventListener('change', () => {
      state.mode = selectMode.value;
      hudMode.textContent = state.mode;
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyP') {
        state.particlesVisible = !state.particlesVisible;
        particles.visible = state.particlesVisible;
      } else if (e.code === 'KeyR') {
        camera.position.set(0, 5, 15);
        controls.target.set(0, 0, 0);
        controls.update();
      } else if (e.code === 'KeyC') {
        cycleColorScheme();
      } else if (e.code === 'Space') {
        e.preventDefault();
        toggleAudio();
      } else if (e.code === 'KeyF') {
        const elem = renderer.domElement;
        if (!document.fullscreenElement) {
          elem.requestFullscreen?.();
        } else {
          document.exitFullscreen?.();
        }
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();
    let fpsTime = 0;
    let fpsFrames = 0;
    let currentFps = 0;

    function getModeParams() {
      switch (state.mode) {
        case 'Explosive':
          return {
            expansionMultiplier: 6,
            pulseMultiplier: 0.3,
            rotationSpeed: 0.005,
            movementFactor: 1
          };
        case 'Zen':
          return {
            expansionMultiplier: 1.5,
            pulseMultiplier: 0.075,
            rotationSpeed: 0.0025,
            movementFactor: 0.5
          };
        case 'Ambient':
        default:
          return {
            expansionMultiplier: 3,
            pulseMultiplier: 0.15,
            rotationSpeed: 0.005,
            movementFactor: 1
          };
      }
    }

    function updateBeatEngine(time) {
      if (!state.audioActive) {
        state.bass = 0;
        state.mid = 0;
        state.treble = 0;
        return;
      }
      state.bass = Math.abs(Math.sin(time * 0.5));
      state.mid = Math.abs(Math.sin(time * 1.2));
      state.treble = Math.abs(Math.sin(time * 2.8));
    }

    function updateParticles(time, params) {
      const pos = particleGeometry.attributes.position.array;
      const col = particleGeometry.attributes.color.array;

      const expansion = state.audioActive ? state.bass * params.expansionMultiplier : 0;
      const yAmp = state.audioActive ? state.mid * 2 * params.movementFactor : 0;
      state.particleExpansionRadius = expansion;

      const scheme = colorSchemes[colorScheme];
      const trebleColorAmount = state.treble > 0.5 ? state.treble : 0;
      const bassColorAmount = state.bass > 0.7 ? state.bass : 0;
      const colorSpeed = state.audioActive ? (0.5 + state.treble * 4.0) : 0.25;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const p = baseParticleData[i];
        const i3 = i * 3;

        pos[i3 + 0] = p.x + p.nx * expansion;
        pos[i3 + 1] = p.y + p.ny * expansion + Math.sin(time * 3 * colorSpeed + p.offset) * yAmp;
        pos[i3 + 2] = p.z + p.nz * expansion;

        const c = scheme.base.clone();
        if (trebleColorAmount > 0) {
          c.lerp(scheme.shift, Math.min(1, trebleColorAmount));
        }
        if (bassColorAmount > 0) {
          c.lerp(scheme.bass, Math.min(1, bassColorAmount));
        }

        col[i3 + 0] = c.r;
        col[i3 + 1] = c.g;
        col[i3 + 2] = c.b;
      }

      particleGeometry.attributes.position.needsUpdate = true;
      particleGeometry.attributes.color.needsUpdate = true;
    }

    function updateSculpture(params, delta) {
      if (!sculpture) return;

      const scaleValue = state.audioActive
        ? baseScale * (1 + state.bass * params.pulseMultiplier)
        : baseScale;

      sculpture.scale.setScalar(scaleValue);

      if (state.audioActive) {
        sculpture.rotation.y += params.rotationSpeed;
      }

      if (mixer && animationMixerActive) {
        mixer.update(delta);
      }
    }

    function updateLights() {
      warmLight.intensity = state.audioActive ? 1 + state.bass * 3 : 2;
      coolLight.intensity = state.audioActive ? 1 + state.mid * 3 : 2;
    }

    function updateHUD() {
      hudMode.textContent = state.mode;
      hudAudio.textContent = state.audioActive ? 'ON' : 'OFF';
      hudBass.textContent = state.bass.toFixed(2);
      hudMid.textContent = state.mid.toFixed(2);
      hudTreble.textContent = state.treble.toFixed(2);
      hudParticles.textContent = state.particlesVisible ? '2000' : '0 (hidden)';
      hudColor.textContent = colorScheme;
      hudFps.textContent = String(currentFps);
    }

    function updateExposedState() {
      window.__3D_STATE__.modelLoaded = !!sculpture;
      window.__3D_STATE__.audioActive = state.audioActive;
      window.__3D_STATE__.mode = state.mode;
      window.__3D_STATE__.bass = state.bass;
      window.__3D_STATE__.mid = state.mid;
      window.__3D_STATE__.treble = state.treble;
      window.__3D_STATE__.particlesVisible = state.particlesVisible;
      window.__3D_STATE__.particleCount = PARTICLE_COUNT;
      window.__3D_STATE__.colorScheme = colorScheme;
      window.__3D_STATE__.sculptureScale = sculpture ? sculpture.scale.x : baseScale;
      window.__3D_STATE__.sculptureRotationY = sculpture ? sculpture.rotation.y : 0;
      window.__3D_STATE__.warmLightIntensity = warmLight.intensity;
      window.__3D_STATE__.coolLightIntensity = coolLight.intensity;
      window.__3D_STATE__.cameraPosition = {
        x: camera.position.x,
        y: camera.position.y,
        z: camera.position.z
      };
      window.__3D_STATE__.frameCount = state.frameCount;
      window.__3D_STATE__.particleExpansionRadius = state.particleExpansionRadius;
      window.__3D_STATE__.animationMixerActive = animationMixerActive;
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const elapsed = clock.elapsedTime;
      state.frameCount++;

      fpsTime += delta;
      fpsFrames++;
      if (fpsTime >= 0.5) {
        currentFps = Math.round(fpsFrames / fpsTime);
        fpsTime = 0;
        fpsFrames = 0;
      }

      const params = getModeParams();

      updateBeatEngine(elapsed);
      updateParticles(elapsed, params);
      updateSculpture(params, delta);
      updateLights();

      particles.visible = state.particlesVisible;

      controls.update();
      updateHUD();
      updateExposedState();

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
