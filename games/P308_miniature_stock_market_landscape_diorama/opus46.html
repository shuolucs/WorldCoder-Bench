<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Market Landscape Diorama</title>
<style>
  body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 15px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
    min-width: 220px;
    pointer-events: none;
    z-index: 10;
  }
  #controls {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    align-items: center;
    background: rgba(0,0,0,0.7);
    padding: 10px 20px;
    border-radius: 8px;
    z-index: 10;
  }
  #controls button {
    background: #444;
    color: #fff;
    border: 1px solid #666;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 13px;
  }
  #controls button:hover { background: #666; }
  #controls label { color: #fff; font-size: 12px; }
  #speedSlider { width: 100px; }
  #instructions {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: #aaa;
    padding: 8px 15px;
    border-radius: 6px;
    font-size: 11px;
    z-index: 10;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="hud"></div>

<div id="instructions">
  Keys: 1-4 Camera Presets | F Fox Chase | E Market Crash | G Toggle Grid | Click bars to select stock
</div>

<div id="controls">
  <button id="playPauseBtn">Play</button>
  <button id="stepBtn">Step</button>
  <label>Speed: <input type="range" id="speedSlider" min="0.5" max="5" step="0.5" value="1"></label>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 30, 50);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 12, 18);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 8;
controls.maxDistance = 35;
controls.target.set(0, 0, 0);

// Base platform
const baseGeom = new THREE.CylinderGeometry(12, 12, 0.3, 64);
const baseMat = new THREE.MeshStandardMaterial({ color: 0x2a5a2a, roughness: 0.8 });
const baseMesh = new THREE.Mesh(baseGeom, baseMat);
baseMesh.position.y = 0;
baseMesh.receiveShadow = true;
scene.add(baseMesh);

// Grid helper
const gridHelper = new THREE.GridHelper(24, 24, 0x444444, 0x333333);
gridHelper.position.y = 0.16;
gridHelper.visible = false;
scene.add(gridHelper);

// Stock data
const stockDefs = [
  { name: 'TECH', color: 0x00aaff, basePrice: 150 },
  { name: 'BANK', color: 0xffaa00, basePrice: 85 },
  { name: 'ENERGY', color: 0xff4444, basePrice: 60 },
  { name: 'HEALTH', color: 0x44ff44, basePrice: 120 },
  { name: 'RETAIL', color: 0xff44ff, basePrice: 45 }
];

const stocks = stockDefs.map(def => {
  const history = [def.basePrice];
  for (let i = 1; i < 20; i++) {
    let p = history[i - 1] * (1 + (Math.random() - 0.48) * 0.06);
    p = Math.max(5, Math.min(500, p));
    history.push(p);
  }
  return { ...def, history };
});

// Create bar meshes
const barGroups = [];
const allBarMeshes = []; // flat array for raycasting
const barMaterials = [];
const targetHeights = []; // target heights for lerp

const NUM_BARS = 20;
const BAR_SPACING = 0.5;
const ROW_SPACING = 3.5;
const startZ = -((stockDefs.length - 1) * ROW_SPACING) / 2;
const startX = -((NUM_BARS - 1) * BAR_SPACING) / 2;

for (let si = 0; si < stocks.length; si++) {
  const stock = stocks[si];
  const group = new THREE.Group();
  const rowZ = startZ + si * ROW_SPACING;
  const bars = [];
  const mat = new THREE.MeshStandardMaterial({
    color: stock.color,
    roughness: 0.4,
    metalness: 0.3,
    emissive: 0x000000,
    emissiveIntensity: 0
  });
  barMaterials.push(mat);
  const heights = [];

  for (let bi = 0; bi < NUM_BARS; bi++) {
    const h = stock.history[bi] / 20;
    heights.push(h);
    const geom = new THREE.BoxGeometry(0.3, 1, 0.3);
    const mesh = new THREE.Mesh(geom, mat);
    const x = startX + bi * BAR_SPACING;
    mesh.position.set(x, 0.15 + h / 2, rowZ);
    mesh.scale.y = h;
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.userData = { stockIndex: si, barIndex: bi };
    scene.add(mesh);
    bars.push(mesh);
    allBarMeshes.push(mesh);
  }

  targetHeights.push(heights);
  barGroups.push(bars);

  // Text label
  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, 128, 64);
  ctx.fillStyle = '#' + stock.color.toString(16).padStart(6, '0');
  ctx.font = 'bold 28px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(stock.name, 64, 40);

  const tex = new THREE.CanvasTexture(canvas);
  const labelGeom = new THREE.PlaneGeometry(2, 1);
  const labelMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide });
  const label = new THREE.Mesh(labelGeom, labelMat);
  label.position.set(startX - 2, 1, rowZ);
  label.rotation.y = Math.PI / 6;
  scene.add(label);
}

// State
let tickCount = 0;
let simState = 'PAUSED';
let selectedStock = -1;
let cameraPreset = 4;
let gridVisible = false;
let crashPending = false;
let speedMultiplier = 1;
let foxLoaded = false;

// Camera animation
let cameraAnimating = false;
let cameraAnimFrame = 0;
const cameraAnimDuration = 60;
let cameraStartPos = new THREE.Vector3();
let cameraTargetPos = new THREE.Vector3();

// Fox
let foxModel = null;
let foxMixer = null;
let foxTargetPos = new THREE.Vector3(0, 0.15, -8);
let foxCurrentPos = new THREE.Vector3(0, 0.15, -8);
let foxAnimating = false;
let foxAnimTime = 0;
let foxAnimDuration = 2;
let foxStartPos = new THREE.Vector3(0, 0.15, -8);

const loader = new GLTFLoader();
loader.load(
  'https://threejs.org/examples/models/gltf/Fox.glb',
  (gltf) => {
    foxModel = gltf.scene;
    foxModel.scale.set(0.03, 0.03, 0.03);
    foxModel.position.set(0, 0.15, -8);
    foxModel.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true;
      }
    });
    scene.add(foxModel);
    foxLoaded = true;

    if (gltf.animations && gltf.animations.length > 0) {
      foxMixer = new THREE.AnimationMixer(foxModel);
      const action = foxMixer.clipAction(gltf.animations[0]);
      action.play();
    }
  },
  undefined,
  (err) => {
    console.warn('Fox model failed to load:', err);
  }
);

// Bar height lerp tracking
const currentBarHeights = stocks.map((stock, si) =>
  stock.history.map(p => p / 20)
);

// Simulation tick
function simulationTick() {
  tickCount++;

  for (let si = 0; si < stocks.length; si++) {
    const stock = stocks[si];
    let lastPrice = stock.history[stock.history.length - 1];

    if (crashPending) {
      lastPrice *= 0.7;
    }

    let newPrice = lastPrice * (1 + (Math.random() - 0.48) * 0.06);
    newPrice = Math.max(5, Math.min(500, newPrice));
    stock.history.push(newPrice);
    if (stock.history.length > 20) stock.history.shift();

    for (let bi = 0; bi < NUM_BARS; bi++) {
      targetHeights[si][bi] = stock.history[bi] / 20;
    }
  }

  crashPending = false;
}

// Auto tick timer
let tickTimer = 0;
const baseTick = 2; // seconds

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(allBarMeshes);

  if (intersects.length > 0) {
    const hit = intersects[0].object;
    const si = hit.userData.stockIndex;
    if (selectedStock === si) {
      selectedStock = -1;
    } else {
      selectedStock = si;
    }
    // Update emissive
    for (let i = 0; i < barMaterials.length; i++) {
      if (i === selectedStock) {
        barMaterials[i].emissive.setHex(barMaterials[i].color.getHex());
        barMaterials[i].emissiveIntensity = 0.3;
      } else {
        barMaterials[i].emissive.setHex(0x000000);
        barMaterials[i].emissiveIntensity = 0;
      }
    }
  } else {
    selectedStock = -1;
    for (let i = 0; i < barMaterials.length; i++) {
      barMaterials[i].emissive.setHex(0x000000);
      barMaterials[i].emissiveIntensity = 0;
    }
  }
});

// Buttons
const playPauseBtn = document.getElementById('playPauseBtn');
const stepBtn = document.getElementById('stepBtn');
const speedSlider = document.getElementById('speedSlider');

playPauseBtn.addEventListener('click', () => {
  if (simState === 'PAUSED') {
    simState = 'PLAYING';
    playPauseBtn.textContent = 'Pause';
  } else {
    simState = 'PAUSED';
    playPauseBtn.textContent = 'Play';
  }
});

stepBtn.addEventListener('click', () => {
  if (simState === 'PAUSED') {
    simulationTick();
  }
});

speedSlider.addEventListener('input', () => {
  speedMultiplier = parseFloat(speedSlider.value);
});

// Keyboard
const cameraPresets = {
  1: new THREE.Vector3(0, 25, 0.1),
  2: new THREE.Vector3(0, 8, 20),
  3: new THREE.Vector3(20, 8, 0),
  4: new THREE.Vector3(0, 12, 18)
};

document.addEventListener('keydown', (e) => {
  const key = e.key;

  if (key >= '1' && key <= '4') {
    const preset = parseInt(key);
    cameraPreset = preset;
    cameraStartPos.copy(camera.position);
    cameraTargetPos.copy(cameraPresets[preset]);
    cameraAnimating = true;
    cameraAnimFrame = 0;
  }

  if (key === 'f' || key === 'F') {
    if (foxModel) {
      foxStartPos.copy(foxModel.position);
      if (selectedStock >= 0) {
        const rowZ = startZ + selectedStock * ROW_SPACING;
        foxTargetPos.set(-5, 0.15, rowZ);
      } else {
        foxTargetPos.set(0, 0.15, -8);
      }
      foxAnimating = true;
      foxAnimTime = 0;
    }
  }

  if (key === 'e' || key === 'E') {
    crashPending = true;
  }

  if (key === 'g' || key === 'G') {
    gridVisible = !gridVisible;
    gridHelper.visible = gridVisible;
  }
});

// HUD
const hudEl = document.getElementById('hud');

function updateHUD() {
  let html = `<b>📊 Market Diorama</b><br>`;
  html += `State: <span style="color:${simState === 'PLAYING' ? '#4f4' : '#f84'}">${simState}</span><br>`;
  html += `Tick: ${tickCount}<br>`;
  html += `Speed: ${speedMultiplier}x<br>`;
  html += `Selected: <span style="color:${selectedStock >= 0 ? '#' + stocks[selectedStock].color.toString(16).padStart(6, '0') : '#888'}">${selectedStock >= 0 ? stocks[selectedStock].name : 'None'}</span><br>`;
  if (crashPending) html += `<span style="color:#f44">⚠ CRASH PENDING</span><br>`;
  html += `<br>`;
  for (let i = 0; i < stocks.length; i++) {
    const s = stocks[i];
    const price = s.history[s.history.length - 1];
    const colorHex = '#' + s.color.toString(16).padStart(6, '0');
    const marker = i === selectedStock ? '►' : ' ';
    html += `<span style="color:${colorHex}">${marker}${s.name.padEnd(7)}: $${price.toFixed(2)}</span><br>`;
  }
  hudEl.innerHTML = html;
}

// Window state
window.__3D_STATE__ = {
  tickCount: 0,
  simState: 'PAUSED',
  stockPrices: stocks.map(s => s.history[s.history.length - 1]),
  selectedStock: -1,
  cameraPreset: 4,
  foxPosition: { x: 0, y: 0.15, z: -8 },
  foxLoaded: false,
  gridVisible: false,
  crashPending: false,
  speedMultiplier: 1,
  barHeights: currentBarHeights.map(row => [...row])
};

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  // Auto tick
  if (simState === 'PLAYING') {
    tickTimer += delta * speedMultiplier;
    if (tickTimer >= baseTick) {
      tickTimer -= baseTick;
      simulationTick();
    }
  }

  // Lerp bar heights
  for (let si = 0; si < stocks.length; si++) {
    for (let bi = 0; bi < NUM_BARS; bi++) {
      const target = targetHeights[si][bi];
      const current = currentBarHeights[si][bi];
      const newH = THREE.MathUtils.lerp(current, target, 0.08);
      currentBarHeights[si][bi] = newH;

      const mesh = barGroups[si][bi];
      mesh.scale.y = Math.max(0.01, newH);
      const rowZ = startZ + si * ROW_SPACING;
      mesh.position.y = 0.15 + newH / 2;
    }
  }

  // Camera animation
  if (cameraAnimating) {
    cameraAnimFrame++;
    const t = Math.min(cameraAnimFrame / cameraAnimDuration, 1);
    const eased = 1 - Math.pow(1 - t, 3); // ease out cubic
    camera.position.lerpVectors(cameraStartPos, cameraTargetPos, eased);
    camera.lookAt(0, 0, 0);
    if (t >= 1) cameraAnimating = false;
  }

  // Fox rotation and animation
  if (foxModel) {
    foxModel.rotation.y += 0.5 * delta;

    if (foxAnimating) {
      foxAnimTime += delta;
      const t = Math.min(foxAnimTime / foxAnimDuration, 1);
      const eased = 1 - Math.pow(1 - t, 2);
      foxModel.position.lerpVectors(foxStartPos, foxTargetPos, eased);
      if (t >= 1) foxAnimating = false;
    }
  }

  if (foxMixer) foxMixer.update(delta);

  controls.update();

  // Update state
  window.__3D_STATE__.tickCount = tickCount;
  window.__3D_STATE__.simState = simState;
  window.__3D_STATE__.stockPrices = stocks.map(s => s.history[s.history.length - 1]);
  window.__3D_STATE__.selectedStock = selectedStock;
  window.__3D_STATE__.cameraPreset = cameraPreset;
  window.__3D_STATE__.foxPosition = foxModel
    ? { x: foxModel.position.x, y: foxModel.position.y, z: foxModel.position.z }
    : { x: 0, y: 0.15, z: -8 };
  window.__3D_STATE__.foxLoaded = foxLoaded;
  window.__3D_STATE__.gridVisible = gridVisible;
  window.__3D_STATE__.crashPending = crashPending;
  window.__3D_STATE__.speedMultiplier = speedMultiplier;
  window.__3D_STATE__.barHeights = currentBarHeights.map(row => [...row]);

  updateHUD();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
