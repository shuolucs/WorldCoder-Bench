<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Stock Market Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0f1110;
      font-family: monospace;
    }

    canvas {
      display: block;
    }

    #ui {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 20;
      display: flex;
      gap: 8px;
      align-items: center;
      background: rgba(20, 20, 20, 0.7);
      color: white;
      padding: 10px 12px;
      border-radius: 8px;
      backdrop-filter: blur(4px);
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      color: white;
      background: rgba(0,0,0,0.55);
      padding: 12px;
      border-radius: 8px;
      line-height: 1.5;
      min-width: 220px;
      white-space: pre-line;
      pointer-events: none;
    }

    button, input {
      font-family: monospace;
    }

    button {
      background: #1f3a2a;
      color: white;
      border: 1px solid #4e8a5a;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #29523a;
    }

    label {
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>
  <div id="hud"></div>

  <div id="ui">
    <button id="playPauseBtn">Play</button>
    <button id="stepBtn">Step</button>
    <label>
      Speed
      <input id="speedSlider" type="range" min="0.5" max="5" step="0.5" value="1" />
      <span id="speedValue">1x</span>
    </label>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101814);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 12, 18);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 8;
    controls.maxDistance = 35;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 15, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -25;
    dirLight.shadow.camera.right = 25;
    dirLight.shadow.camera.top = 25;
    dirLight.shadow.camera.bottom = -25;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 60;
    scene.add(dirLight);

    const baseGeometry = new THREE.CylinderGeometry(12, 12, 1, 64);
    const baseMaterial = new THREE.MeshStandardMaterial({ color: 0x2a5a2a });
    const base = new THREE.Mesh(baseGeometry, baseMaterial);
    base.position.y = -0.5;
    base.receiveShadow = true;
    scene.add(base);

    const gridHelper = new THREE.GridHelper(24, 24, 0x88aa88, 0x446644);
    gridHelper.visible = false;
    gridHelper.position.y = 0.02;
    scene.add(gridHelper);

    const stocks = [
      { name: 'TECH', color: 0x00aaff, basePrice: 150 },
      { name: 'BANK', color: 0xffaa00, basePrice: 85 },
      { name: 'ENERGY', color: 0xff4444, basePrice: 60 },
      { name: 'HEALTH', color: 0x44ff44, basePrice: 120 },
      { name: 'RETAIL', color: 0xff44ff, basePrice: 45 }
    ];

    const rowSpacing = 3.5;
    const barSpacing = 0.5;
    const barCount = 20;
    const barsByStock = [];
    const stockGroups = [];
    const stockLabels = [];
    const rowZPositions = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    let selectedStock = -1;
    let tickCount = 0;
    let simState = 'PAUSED';
    let speedMultiplier = 1;
    let crashPending = false;

    let tickTimer = 0;
    const baseTickInterval = 2.0;

    let cameraPreset = 4;
    let cameraAnimFrames = 0;
    let cameraAnimStart = new THREE.Vector3();
    let cameraAnimEnd = new THREE.Vector3();
    let targetAnimStart = new THREE.Vector3();
    let targetAnimEnd = new THREE.Vector3();

    let fox = null;
    let foxMixer = null;
    let foxLoaded = false;
    const foxDefaultPosition = new THREE.Vector3(0, 0, -8);
    let foxMoveStart = null;
    let foxMoveEnd = null;
    let foxMoveElapsed = 0;
    let foxMoveDuration = 2.0;

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function generateHistory(basePrice) {
      const history = [basePrice];
      for (let i = 1; i < barCount; i++) {
        const prev = history[i - 1];
        let next = prev * (1 + (Math.random() - 0.48) * 0.06);
        next = clamp(next, 5, 500);
        history.push(next);
      }
      return history;
    }

    stocks.forEach(stock => {
      stock.history = generateHistory(stock.basePrice);
    });

    function createLabelTexture(text, colorHex) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);

      const color = new THREE.Color(colorHex);
      ctx.fillStyle = `#${color.getHexString()}`;
      ctx.font = 'bold 28px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    function buildStockRows() {
      const zStart = -((stocks.length - 1) * rowSpacing) / 2;

      stocks.forEach((stock, stockIndex) => {
        const group = new THREE.Group();
        group.userData.stockIndex = stockIndex;

        const bars = [];
        const z = zStart + stockIndex * rowSpacing;
        rowZPositions[stockIndex] = z;

        for (let i = 0; i < barCount; i++) {
          const height = stock.history[i] / 20;
          const geom = new THREE.BoxGeometry(0.3, 1, 0.3);
          const mat = new THREE.MeshStandardMaterial({
            color: stock.color,
            emissive: 0x000000,
            emissiveIntensity: 0
          });
          const bar = new THREE.Mesh(geom, mat);
          const x = (i - (barCount - 1) / 2) * barSpacing;
          bar.position.set(x, height / 2, z);
          bar.scale.y = height;
          bar.castShadow = true;
          bar.receiveShadow = true;
          bar.userData = {
            stockIndex,
            barIndex: i,
            targetHeight: height
          };
          bars.push(bar);
          group.add(bar);
        }

        const labelTexture = createLabelTexture(stock.name, stock.color);
        const labelMat = new THREE.MeshBasicMaterial({
          map: labelTexture,
          transparent: true,
          side: THREE.DoubleSide
        });
        const label = new THREE.Mesh(new THREE.PlaneGeometry(2.2, 0.55), labelMat);
        label.position.set(-5.8, 0.7, z);
        label.rotation.y = Math.PI / 6;
        stockLabels.push(label);
        scene.add(label);

        barsByStock.push(bars);
        stockGroups.push(group);
        scene.add(group);
      });
    }

    buildStockRows();

    function setSelection(index) {
      selectedStock = index;

      barsByStock.forEach((bars, sIdx) => {
        bars.forEach(bar => {
          bar.material.emissive.setHex(bar.material.color.getHex());
          bar.material.emissiveIntensity = (sIdx === selectedStock) ? 0.3 : 0.0;
        });
      });
    }

    function tickSimulation() {
      tickCount++;

      stocks.forEach((stock, i) => {
        let latest = stock.history[stock.history.length - 1];
        let next = latest * (1 + (Math.random() - 0.48) * 0.06);

        if (crashPending) {
          next *= 0.7;
        }

        next = clamp(next, 5, 500);
        stock.history.push(next);
        if (stock.history.length > barCount) stock.history.shift();

        barsByStock[i].forEach((bar, j) => {
          const h = stock.history[j] / 20;
          bar.userData.targetHeight = h;
        });
      });

      crashPending = false;
    }

    const loader = new GLTFLoader();
    loader.load(
      'Fox.glb',
      gltf => {
        fox = gltf.scene;
        fox.scale.set(0.03, 0.03, 0.03);
        fox.position.copy(foxDefaultPosition);
        fox.traverse(obj => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        scene.add(fox);

        if (gltf.animations && gltf.animations.length > 0) {
          foxMixer = new THREE.AnimationMixer(fox);
          const action = foxMixer.clipAction(gltf.animations[0]);
          action.play();
        }

        foxLoaded = true;
      },
      undefined,
      err => {
        console.warn('Failed to load Fox.glb', err);
      }
    );

    function moveFoxToSelection() {
      const target = new THREE.Vector3(-5, 0, selectedStock >= 0 ? rowZPositions[selectedStock] : foxDefaultPosition.z);
      if (selectedStock < 0) target.set(foxDefaultPosition.x, foxDefaultPosition.y, foxDefaultPosition.z);
      if (!fox) return;
      foxMoveStart = fox.position.clone();
      foxMoveEnd = target;
      foxMoveElapsed = 0;
    }

    function setCameraPreset(preset) {
      const positions = {
        1: new THREE.Vector3(0, 25, 0.1),
        2: new THREE.Vector3(0, 8, 20),
        3: new THREE.Vector3(20, 8, 0),
        4: new THREE.Vector3(0, 12, 18)
      };
      cameraPreset = preset;
      cameraAnimFrames = 60;
      cameraAnimStart.copy(camera.position);
      cameraAnimEnd.copy(positions[preset]);
      targetAnimStart.copy(controls.target);
      targetAnimEnd.set(0, 0, 0);
    }

    function updateBars(dt) {
      barsByStock.forEach(bars => {
        bars.forEach(bar => {
          const currentHeight = bar.scale.y;
          const targetHeight = bar.userData.targetHeight ?? currentHeight;
          const newHeight = THREE.MathUtils.lerp(currentHeight, targetHeight, Math.min(1, dt * 4));
          bar.scale.y = newHeight;
          bar.position.y = newHeight / 2;
        });
      });
    }

    const hud = document.getElementById('hud');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const stepBtn = document.getElementById('stepBtn');
    const speedSlider = document.getElementById('speedSlider');
    const speedValue = document.getElementById('speedValue');

    playPauseBtn.addEventListener('click', () => {
      simState = simState === 'PLAYING' ? 'PAUSED' : 'PLAYING';
      playPauseBtn.textContent = simState === 'PLAYING' ? 'Pause' : 'Play';
    });

    stepBtn.addEventListener('click', () => {
      if (simState === 'PAUSED') tickSimulation();
    });

    speedSlider.addEventListener('input', () => {
      speedMultiplier = parseFloat(speedSlider.value);
      speedValue.textContent = `${speedMultiplier}x`;
    });

    renderer.domElement.addEventListener('pointerdown', event => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const allBars = barsByStock.flat();
      const intersects = raycaster.intersectObjects(allBars, false);

      if (intersects.length > 0) {
        const stockIndex = intersects[0].object.userData.stockIndex;
        setSelection(stockIndex);
      } else {
        setSelection(-1);
      }
    });

    window.addEventListener('keydown', e => {
      if (e.key === '1') setCameraPreset(1);
      if (e.key === '2') setCameraPreset(2);
      if (e.key === '3') setCameraPreset(3);
      if (e.key === '4') setCameraPreset(4);
      if (e.key === 'f' || e.key === 'F') moveFoxToSelection();
      if (e.key === 'e' || e.key === 'E') crashPending = true;
      if (e.key === 'g' || e.key === 'G') gridHelper.visible = !gridHelper.visible;
    });

    const clock = new THREE.Clock();

    window.__3D_STATE__ = {
      tickCount: 0,
      simState: 'PAUSED',
      stockPrices: [],
      selectedStock: -1,
      cameraPreset: 4,
      foxPosition: { x: 0, y: 0, z: -8 },
      foxLoaded: false,
      gridVisible: false,
      crashPending: false,
      speedMultiplier: 1,
      barHeights: []
    };

    function updateHUD() {
      const lines = [];
      lines.push(`Tick: ${tickCount}`);
      lines.push(`State: ${simState}`);
      lines.push('');
      stocks.forEach(stock => {
        const latest = stock.history[stock.history.length - 1];
        lines.push(`${stock.name}: ${latest.toFixed(2)}`);
      });
      lines.push('');
      lines.push(`Selected: ${selectedStock >= 0 ? stocks[selectedStock].name : 'None'}`);
      hud.textContent = lines.join('\n');
    }

    function updateState() {
      window.__3D_STATE__ = {
        tickCount,
        simState,
        stockPrices: stocks.map(s => s.history[s.history.length - 1]),
        selectedStock,
        cameraPreset,
        foxPosition: fox ? { x: fox.position.x, y: fox.position.y, z: fox.position.z } : { x: 0, y: 0, z: -8 },
        foxLoaded,
        gridVisible: gridHelper.visible,
        crashPending,
        speedMultiplier,
        barHeights: barsByStock.map(bars => bars.map(bar => bar.scale.y))
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();

      controls.update();

      if (simState === 'PLAYING') {
        tickTimer += dt * speedMultiplier;
        const interval = baseTickInterval;
        if (tickTimer >= interval) {
          while (tickTimer >= interval) {
            tickSimulation();
            tickTimer -= interval;
          }
        }
      }

      updateBars(dt);

      if (foxMixer) foxMixer.update(dt);
      if (fox) {
        fox.rotation.y += 0.5 * dt;

        if (foxMoveStart && foxMoveEnd) {
          foxMoveElapsed += dt;
          const t = Math.min(foxMoveElapsed / foxMoveDuration, 1);
          fox.position.lerpVectors(foxMoveStart, foxMoveEnd, t);
          if (t >= 1) {
            foxMoveStart = null;
            foxMoveEnd = null;
          }
        }
      }

      if (cameraAnimFrames > 0) {
        const totalFrames = 60;
        const t = (totalFrames - cameraAnimFrames + 1) / totalFrames;
        camera.position.lerpVectors(cameraAnimStart, cameraAnimEnd, t);
        controls.target.lerpVectors(targetAnimStart, targetAnimEnd, t);
        cameraAnimFrames--;
      }

      updateHUD();
      updateState();

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHUD();
    updateState();
    animate();
  </script>
</body>
</html>
