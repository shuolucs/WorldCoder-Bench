<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Stock Market Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: monospace;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            pointer-events: none;
            min-width: 200px;
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #aaa;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .stock-name { font-weight: bold; }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: center;
            border: 1px solid #333;
        }
        button {
            background: #444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
        }
        button:hover { background: #666; }
        button:disabled { background: #222; color: #555; cursor: not-allowed; }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type=range] { cursor: pointer; }
        #instructions {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            text-align: right;
            pointer-events: none;
        }
        .key { color: #ffaa00; font-weight: bold; }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <h2>MARKET STATUS</h2>
        <div class="hud-row"><span>Tick:</span> <span id="hud-tick">0</span></div>
        <div class="hud-row"><span>State:</span> <span id="hud-state" style="color:#ffaa00">PAUSED</span></div>
        <div class="hud-row"><span>Selected:</span> <span id="hud-selected">None</span></div>
        <hr style="border-color:#333; margin:10px 0;">
        <div id="hud-prices"></div>
    </div>

    <div id="instructions">
        <div><span class="key">Click</span> Stock to Select</div>
        <div><span class="key">1-4</span> Camera Presets</div>
        <div><span class="key">F</span> Fox Chase Selected</div>
        <div><span class="key">E</span> Market Crash Event</div>
        <div><span class="key">G</span> Toggle Grid</div>
    </div>

    <div id="controls">
        <button id="playPauseBtn">Play</button>
        <button id="stepBtn">Step</button>
        <div class="slider-container">
            <label for="speedSlider">Speed:</label>
            <input type="range" id="speedSlider" min="0.5" max="5" step="0.5" value="1">
            <span id="speedVal">1.0x</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State ---
        window.__3D_STATE__ = {
            tickCount: 0,
            simState: 'PAUSED',
            stockPrices: [0, 0, 0, 0, 0],
            selectedStock: -1,
            cameraPreset: 4,
            foxPosition: { x: 0, y: 0, z: -8 },
            foxLoaded: false,
            gridVisible: false,
            crashPending: false,
            speedMultiplier: 1,
            barHeights: [[], [], [], [], []]
        };

        const stocksData = [
            { name: 'TECH', color: 0x00aaff, basePrice: 150 },
            { name: 'BANK', color: 0xffaa00, basePrice: 85 },
            { name: 'ENERGY', color: 0xff4444, basePrice: 60 },
            { name: 'HEALTH', color: 0x44ff44, basePrice: 120 },
            { name: 'RETAIL', color: 0xff44ff, basePrice: 45 }
        ];

        const POINTS_PER_STOCK = 20;
        const ROW_SPACING = 3.5;
        const BAR_SPACING = 0.5;
        
        // Initialize history
        stocksData.forEach(stock => {
            stock.history = [];
            stock.meshes = [];
            stock.targets = [];
            let currentPrice = stock.basePrice;
            for (let i = 0; i < POINTS_PER_STOCK; i++) {
                stock.history.push(currentPrice);
                stock.targets.push(currentPrice / 20);
                currentPrice = Math.max(5, Math.min(500, currentPrice * (1 + (Math.random() - 0.48) * 0.06)));
            }
        });

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        scene.fog = new THREE.FogExp2(0x111111, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 18);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 8;
        controls.maxDistance = 35;
        controls.target.set(0, 0, 0);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        scene.add(dirLight);

        // --- Environment ---
        const baseGeo = new THREE.CylinderGeometry(12, 12, 0.5, 64);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x2a5a2a, roughness: 0.8 });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.position.y = -0.25;
        base.receiveShadow = true;
        scene.add(base);

        const gridHelper = new THREE.GridHelper(24, 24, 0x444444, 0x222222);
        gridHelper.position.y = 0.01;
        gridHelper.visible = false;
        scene.add(gridHelper);

        // --- Landscape Generation ---
        const barGeo = new THREE.BoxGeometry(0.3, 1, 0.3);
        barGeo.translate(0, 0.5, 0); // Pivot at bottom

        const createLabel = (text, colorHex) => {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#' + colorHex.toString(16).padStart(6, '0');
            ctx.font = 'bold 40px monospace';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 10, 32);
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, depthTest: false });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(3, 0.75, 1);
            return sprite;
        };

        const startZ = -((stocksData.length - 1) * ROW_SPACING) / 2;
        const startX = -((POINTS_PER_STOCK - 1) * BAR_SPACING) / 2;

        const raycastObjects = [];

        stocksData.forEach((stock, sIdx) => {
            const rowZ = startZ + sIdx * ROW_SPACING;
            
            // Label
            const label = createLabel(stock.name, stock.color);
            label.position.set(startX - 2, 0.5, rowZ);
            scene.add(label);

            // Bars
            const mat = new THREE.MeshStandardMaterial({ 
                color: stock.color, 
                roughness: 0.4,
                metalness: 0.1
            });

            for (let i = 0; i < POINTS_PER_STOCK; i++) {
                const mesh = new THREE.Mesh(barGeo, mat.clone());
                mesh.position.set(startX + i * BAR_SPACING, 0, rowZ);
                mesh.scale.y = stock.targets[i];
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.userData = { stockIndex: sIdx };
                scene.add(mesh);
                stock.meshes.push(mesh);
                raycastObjects.push(mesh);
            }
        });

        // --- Fox Mascot ---
        let foxMixer, foxAction;
        const foxGroup = new THREE.Group();
        foxGroup.position.set(0, 0, -8);
        scene.add(foxGroup);
        let foxTargetPos = new THREE.Vector3(0, 0, -8);

        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Fox/glTF/Fox.gltf', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.03, 0.03, 0.03);
            
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            foxGroup.add(model);
            window.__3D_STATE__.foxLoaded = true;

            if (gltf.animations && gltf.animations.length > 0) {
                foxMixer = new THREE.AnimationMixer(model);
                foxAction = foxMixer.clipAction(gltf.animations[0]);
                foxAction.play();
            }
        });

        // --- Simulation Logic ---
        const doTick = () => {
            window.__3D_STATE__.tickCount++;
            
            stocksData.forEach((stock, sIdx) => {
                let lastPrice = stock.history[stock.history.length - 1];
                let multiplier = 1 + (Math.random() - 0.48) * 0.06;
                
                if (window.__3D_STATE__.crashPending) {
                    multiplier *= 0.7;
                }
                
                let newPrice = Math.max(5, Math.min(500, lastPrice * multiplier));
                
                stock.history.shift();
                stock.history.push(newPrice);
                
                for (let i = 0; i < POINTS_PER_STOCK; i++) {
                    stock.targets[i] = stock.history[i] / 20;
                }
                
                window.__3D_STATE__.stockPrices[sIdx] = newPrice;
            });
            
            window.__3D_STATE__.crashPending = false;
            updateHUD();
        };

        // Initial HUD update
        stocksData.forEach((s, i) => window.__3D_STATE__.stockPrices[i] = s.history[POINTS_PER_STOCK-1]);

        // --- Interaction & UI ---
        const playPauseBtn = document.getElementById('playPauseBtn');
        const stepBtn = document.getElementById('stepBtn');
        const speedSlider = document.getElementById('speedSlider');
        const speedVal = document.getElementById('speedVal');
        
        const hudTick = document.getElementById('hud-tick');
        const hudState = document.getElementById('hud-state');
        const hudSelected = document.getElementById('hud-selected');
        const hudPrices = document.getElementById('hud-prices');

        const initHUDPrices = () => {
            hudPrices.innerHTML = '';
            stocksData.forEach((stock, i) => {
                const div = document.createElement('div');
                div.className = 'hud-row';
                div.innerHTML = `<span class="stock-name" style="color:#${stock.color.toString(16).padStart(6,'0')}">${stock.name}</span> <span id="price-${i}">0.00</span>`;
                hudPrices.appendChild(div);
            });
        };
        initHUDPrices();

        const updateHUD = () => {
            hudTick.innerText = window.__3D_STATE__.tickCount;
            hudState.innerText = window.__3D_STATE__.simState;
            hudState.style.color = window.__3D_STATE__.simState === 'PLAYING' ? '#44ff44' : '#ffaa00';
            
            const selIdx = window.__3D_STATE__.selectedStock;
            hudSelected.innerText = selIdx !== -1 ? stocksData[selIdx].name : 'None';
            hudSelected.style.color = selIdx !== -1 ? '#' + stocksData[selIdx].color.toString(16).padStart(6,'0') : 'white';

            stocksData.forEach((stock, i) => {
                document.getElementById(`price-${i}`).innerText = window.__3D_STATE__.stockPrices[i].toFixed(2);
            });
        };

        playPauseBtn.addEventListener('click', () => {
            if (window.__3D_STATE__.simState === 'PAUSED') {
                window.__3D_STATE__.simState = 'PLAYING';
                playPauseBtn.innerText = 'Pause';
                stepBtn.disabled = true;
            } else {
                window.__3D_STATE__.simState = 'PAUSED';
                playPauseBtn.innerText = 'Play';
                stepBtn.disabled = false;
            }
            updateHUD();
        });

        stepBtn.addEventListener('click', () => {
            if (window.__3D_STATE__.simState === 'PAUSED') doTick();
        });

        speedSlider.addEventListener('input', (e) => {
            window.__3D_STATE__.speedMultiplier = parseFloat(e.target.value);
            speedVal.innerText = window.__3D_STATE__.speedMultiplier.toFixed(1) + 'x';
        });

        // Raycasting
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            if (event.target.tagName !== 'CANVAS') return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(raycastObjects);
            
            let newSelected = -1;
            if (intersects.length > 0) {
                newSelected = intersects[0].object.userData.stockIndex;
            }

            if (newSelected !== window.__3D_STATE__.selectedStock) {
                // Reset old
                if (window.__3D_STATE__.selectedStock !== -1) {
                    stocksData[window.__3D_STATE__.selectedStock].meshes.forEach(m => m.material.emissive.setHex(0x000000));
                }
                // Set new
                window.__3D_STATE__.selectedStock = newSelected;
                if (newSelected !== -1) {
                    const color = stocksData[newSelected].color;
                    stocksData[newSelected].meshes.forEach(m => m.material.emissive.setHex(color).multiplyScalar(0.3));
                }
                updateHUD();
            }
        });

        // Keyboard
        let targetCameraPos = new THREE.Vector3().copy(camera.position);
        
        window.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case '1': 
                    targetCameraPos.set(0, 25, 0.1); 
                    window.__3D_STATE__.cameraPreset = 1;
                    break;
                case '2': 
                    targetCameraPos.set(0, 8, 20); 
                    window.__3D_STATE__.cameraPreset = 2;
                    break;
                case '3': 
                    targetCameraPos.set(20, 8, 0); 
                    window.__3D_STATE__.cameraPreset = 3;
                    break;
                case '4': 
                    targetCameraPos.set(0, 12, 18); 
                    window.__3D_STATE__.cameraPreset = 4;
                    break;
                case 'f':
                    const sel = window.__3D_STATE__.selectedStock;
                    if (sel !== -1) {
                        foxTargetPos.set(-5, 0, startZ + sel * ROW_SPACING);
                    } else {
                        foxTargetPos.set(0, 0, -8);
                    }
                    break;
                case 'e':
                    window.__3D_STATE__.crashPending = true;
                    break;
                case 'g':
                    window.__3D_STATE__.gridVisible = !window.__3D_STATE__.gridVisible;
                    gridHelper.visible = window.__3D_STATE__.gridVisible;
                    break;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let lastTickTime = 0;

        updateHUD();

        function animate(time) {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Auto Tick
            if (window.__3D_STATE__.simState === 'PLAYING') {
                const tickInterval = 2000 / window.__3D_STATE__.speedMultiplier;
                if (time - lastTickTime > tickInterval) {
                    doTick();
                    lastTickTime = time;
                }
            }

            // Lerp Bar Heights
            stocksData.forEach((stock, sIdx) => {
                for (let i = 0; i < POINTS_PER_STOCK; i++) {
                    const mesh = stock.meshes[i];
                    const target = stock.targets[i];
                    mesh.scale.y += (target - mesh.scale.y) * 0.1;
                    window.__3D_STATE__.barHeights[sIdx][i] = mesh.scale.y;
                }
            });

            // Lerp Camera
            if (camera.position.distanceTo(targetCameraPos) > 0.01) {
                camera.position.lerp(targetCameraPos, 0.05);
                controls.target.lerp(new THREE.Vector3(0,0,0), 0.05);
            }
            controls.update();

            // Fox Logic
            if (window.__3D_STATE__.foxLoaded) {
                if (foxMixer) foxMixer.update(delta);
                
                // Move
                foxGroup.position.lerp(foxTargetPos, 0.03);
                
                // Rotate
                foxGroup.rotation.y += 0.5 * delta;

                window.__3D_STATE__.foxPosition.x = foxGroup.position.x;
                window.__3D_STATE__.foxPosition.y = foxGroup.position.y;
                window.__3D_STATE__.foxPosition.z = foxGroup.position.z;
            }

            renderer.render(scene, camera);
        }

        animate(0);
    </script>
</body>
</html>
