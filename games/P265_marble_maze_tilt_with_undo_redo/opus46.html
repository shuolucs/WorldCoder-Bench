<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Marble Maze</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #e94560;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
    border: 1px solid #e94560;
    min-width: 280px;
    pointer-events: none;
    z-index: 10;
  }
  #hud .label { color: #aaa; }
  #hud .value { color: #e94560; font-weight: bold; }
  #hud .section { margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid rgba(233,69,96,0.3); }
  #controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  #controls button {
    padding: 10px 24px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    border: 2px solid #e94560;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  #btn-undo {
    background: rgba(233, 69, 96, 0.2);
    color: #e94560;
  }
  #btn-redo {
    background: rgba(233, 69, 96, 0.2);
    color: #e94560;
  }
  #btn-reset {
    background: rgba(233, 69, 96, 0.8);
    color: #fff;
  }
  #controls button:hover {
    background: #e94560;
    color: #fff;
  }
  #controls button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  #instructions {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: #aaa;
    font-size: 12px;
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="hud">
  <div class="section">
    <span class="label">Tilt X:</span> <span class="value" id="hud-tiltx">0.000</span><br>
    <span class="label">Tilt Z:</span> <span class="value" id="hud-tiltz">0.000</span>
  </div>
  <div class="section">
    <span class="label">Marble Pos:</span> <span class="value" id="hud-pos">(0.00, 2.00, 0.00)</span><br>
    <span class="label">Speed:</span> <span class="value" id="hud-speed">0.00</span>
  </div>
  <div class="section">
    <span class="label">Falls:</span> <span class="value" id="hud-falls">0</span>
  </div>
  <div class="section">
    <span class="label">Snapshots:</span> <span class="value" id="hud-snapshots">0</span> | <span class="label">Index:</span> <span class="value" id="hud-index">-1</span><br>
    <span class="label">Undo (U):</span> <span class="value" id="hud-undo">No</span><br>
    <span class="label">Redo (R):</span> <span class="value" id="hud-redo">No</span>
  </div>
</div>

<div id="instructions">Arrow Keys: Tilt Platform | U: Undo | R: Redo</div>

<div id="controls">
  <button id="btn-undo">Undo (U)</button>
  <button id="btn-redo">Redo (R)</button>
  <button id="btn-reset">Reset</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 15, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -20;
scene.add(dirLight);

// OrbitControls (disabled)
const controls = new OrbitControls(camera, renderer.domElement);
controls.enabled = false;

// --- Marble ---
const marbleRadius = 0.4;
const marbleGeometry = new THREE.SphereGeometry(marbleRadius, 32, 32);
const marbleMaterial = new THREE.MeshStandardMaterial({
  color: 0xe94560,
  metalness: 0.8,
  roughness: 0.2
});
const marble = new THREE.Mesh(marbleGeometry, marbleMaterial);
marble.position.set(0, 2, 0);
marble.castShadow = true;
scene.add(marble);

// --- State Variables ---
let velocity = { x: 0, y: 0, z: 0 };
let tiltX = 0;
let tiltZ = 0;
let fallCount = 0;
let modelLoaded = false;
let collisionModel = null;
let startTime = performance.now();

// Snapshot system
let snapshots = [];
let undoIndex = -1;
const MAX_SNAPSHOTS = 60;
let lastSnapshotTime = 0;

// Keys
const keys = {};

// --- Fallback platform (used when GLB not loaded) ---
const fallbackPlatform = new THREE.Mesh(
  new THREE.BoxGeometry(20, 0.5, 20),
  new THREE.MeshStandardMaterial({ color: 0x333355 })
);
fallbackPlatform.position.y = -0.25;
fallbackPlatform.receiveShadow = true;

// Grid helper on the platform
const gridHelper = new THREE.GridHelper(20, 20, 0x444466, 0x333355);
gridHelper.position.y = 0.01;

// Platform group that gets tilted
const platformGroup = new THREE.Group();
scene.add(platformGroup);

// Add fallback immediately
platformGroup.add(fallbackPlatform);
platformGroup.add(gridHelper);

// --- Load GLB ---
const loader = new GLTFLoader();
loader.load(
  'collision-world.glb',
  (gltf) => {
    const model = gltf.scene;

    // Compute bounding box to center and scale
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());

    // Center the model
    model.position.sub(center);

    // Scale to fit within ~20 units
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 20 / maxDim;
    model.scale.setScalar(scale);

    // Enable receiveShadow on all meshes
    model.traverse((child) => {
      if (child.isMesh) {
        child.receiveShadow = true;
        child.castShadow = true;
      }
    });

    // Remove fallback, add model
    platformGroup.remove(fallbackPlatform);
    platformGroup.remove(gridHelper);
    platformGroup.add(model);

    collisionModel = model;
    modelLoaded = true;
    console.log('collision-world.glb loaded successfully');
  },
  (progress) => {
    // Loading progress
  },
  (error) => {
    console.warn('Could not load collision-world.glb, using fallback platform:', error.message);
    modelLoaded = false;
  }
);

// --- Add some visual walls to the fallback platform for maze feel ---
function addWall(x, z, w, d) {
  const wall = new THREE.Mesh(
    new THREE.BoxGeometry(w, 0.8, d),
    new THREE.MeshStandardMaterial({ color: 0x555588 })
  );
  wall.position.set(x, 0.4, z);
  wall.receiveShadow = true;
  wall.castShadow = true;
  platformGroup.add(wall);
}

// Create a simple maze pattern on the fallback
addWall(0, -8, 16, 0.3);
addWall(0, 8, 16, 0.3);
addWall(-8, 0, 0.3, 16);
addWall(8, 0, 0.3, 16);
addWall(-4, -4, 8, 0.3);
addWall(4, 4, 8, 0.3);
addWall(-4, 2, 0.3, 4);
addWall(4, -2, 0.3, 4);
addWall(0, -2, 4, 0.3);
addWall(0, 2, 4, 0.3);
addWall(-6, -6, 0.3, 4);
addWall(6, 6, 0.3, 4);
addWall(-2, -6, 4, 0.3);
addWall(2, 6, 4, 0.3);

// --- Input ---
window.addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === 'u' || e.key === 'U') performUndo();
  if (e.key === 'r' || e.key === 'R') performRedo();
});
window.addEventListener('keyup', (e) => {
  keys[e.key.toLowerCase()] = false;
});

document.getElementById('btn-undo').addEventListener('click', performUndo);
document.getElementById('btn-redo').addEventListener('click', performRedo);
document.getElementById('btn-reset').addEventListener('click', performReset);

// --- Snapshot Functions ---
function createSnapshot() {
  return {
    position: { x: marble.position.x, y: marble.position.y, z: marble.position.z },
    velocity: { x: velocity.x, y: velocity.y, z: velocity.z },
    tiltX: tiltX,
    tiltZ: tiltZ
  };
}

function restoreSnapshot(snap) {
  marble.position.set(snap.position.x, snap.position.y, snap.position.z);
  velocity.x = snap.velocity.x;
  velocity.y = snap.velocity.y;
  velocity.z = snap.velocity.z;
  tiltX = snap.tiltX;
  tiltZ = snap.tiltZ;
}

function saveSnapshot() {
  // Discard snapshots after current index (standard undo/redo)
  if (undoIndex < snapshots.length - 1) {
    snapshots = snapshots.slice(0, undoIndex + 1);
  }

  snapshots.push(createSnapshot());

  // FIFO: keep max 60
  if (snapshots.length > MAX_SNAPSHOTS) {
    snapshots.shift();
  }

  undoIndex = snapshots.length - 1;
}

function performUndo() {
  if (undoIndex > 0) {
    undoIndex--;
    restoreSnapshot(snapshots[undoIndex]);
  }
}

function performRedo() {
  if (undoIndex < snapshots.length - 1) {
    undoIndex++;
    restoreSnapshot(snapshots[undoIndex]);
  }
}

function performReset() {
  marble.position.set(0, 2, 0);
  velocity = { x: 0, y: 0, z: 0 };
  tiltX = 0;
  tiltZ = 0;
  fallCount = 0;
  snapshots = [];
  undoIndex = -1;
  lastSnapshotTime = 0;
}

// --- HUD Update ---
function updateHUD() {
  const speed = Math.sqrt(velocity.x * velocity.x + velocity.y * velocity.y + velocity.z * velocity.z);
  const canUndo = undoIndex > 0;
  const canRedo = undoIndex < snapshots.length - 1;

  document.getElementById('hud-tiltx').textContent = tiltX.toFixed(3);
  document.getElementById('hud-tiltz').textContent = tiltZ.toFixed(3);
  document.getElementById('hud-pos').textContent = `(${marble.position.x.toFixed(2)}, ${marble.position.y.toFixed(2)}, ${marble.position.z.toFixed(2)})`;
  document.getElementById('hud-speed').textContent = speed.toFixed(2);
  document.getElementById('hud-falls').textContent = fallCount;
  document.getElementById('hud-snapshots').textContent = snapshots.length;
  document.getElementById('hud-index').textContent = undoIndex;
  document.getElementById('hud-undo').textContent = canUndo ? 'Yes' : 'No';
  document.getElementById('hud-redo').textContent = canRedo ? 'Yes' : 'No';

  document.getElementById('btn-undo').disabled = !canUndo;
  document.getElementById('btn-redo').disabled = !canRedo;
}

// --- Expose State ---
window.__3D_STATE__ = {};

function updateGlobalState() {
  const speed = Math.sqrt(velocity.x * velocity.x + velocity.y * velocity.y + velocity.z * velocity.z);
  const canUndo = undoIndex > 0;
  const canRedo = undoIndex < snapshots.length - 1;
  const timeElapsed = (performance.now() - startTime) / 1000;

  window.__3D_STATE__ = {
    marblePos: { x: marble.position.x, y: marble.position.y, z: marble.position.z },
    marbleVel: { x: velocity.x, y: velocity.y, z: velocity.z },
    speed: speed,
    tiltX: tiltX,
    tiltZ: tiltZ,
    fallCount: fallCount,
    snapshotCount: snapshots.length,
    undoIndex: undoIndex,
    canUndo: canUndo,
    canRedo: canRedo,
    modelLoaded: modelLoaded,
    timeElapsed: timeElapsed
  };
}

// --- Raycaster for collision with loaded model ---
const raycaster = new THREE.Raycaster();
const downDir = new THREE.Vector3(0, -1, 0);

// --- Animation Loop ---
let lastTime = performance.now();
let elapsedSinceSnapshot = 0;

function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  let dt = (now - lastTime) / 1000;
  lastTime = now;

  // Cap dt
  if (dt > 1 / 30) dt = 1 / 30;

  // --- Input: Tilt ---
  if (keys['arrowup']) {
    tiltX -= 0.005;
  }
  if (keys['arrowdown']) {
    tiltX += 0.005;
  }
  if (keys['arrowleft']) {
    tiltZ += 0.005;
  }
  if (keys['arrowright']) {
    tiltZ -= 0.005;
  }

  // Clamp tilt
  tiltX = Math.max(-0.15, Math.min(0.15, tiltX));
  tiltZ = Math.max(-0.15, Math.min(0.15, tiltZ));

  // Apply tilt to platform
  platformGroup.rotation.x = tiltX;
  platformGroup.rotation.z = tiltZ;

  // --- Physics ---
  // Gravity
  velocity.y -= 9.8 * dt;

  // Tilt-based acceleration
  velocity.z += Math.sin(tiltX) * 8.0 * dt;
  velocity.x -= Math.sin(tiltZ) * 8.0 * dt;

  // Friction
  velocity.x *= 0.98;
  velocity.z *= 0.98;

  // Update position
  marble.position.x += velocity.x * dt;
  marble.position.y += velocity.y * dt;
  marble.position.z += velocity.z * dt;

  // --- Collision Detection ---
  // Raycast down from marble to find ground
  const rayOrigin = new THREE.Vector3(marble.position.x, marble.position.y + 2, marble.position.z);
  raycaster.set(rayOrigin, downDir);
  raycaster.far = 10;

  const intersects = raycaster.intersectObject(platformGroup, true);

  if (intersects.length > 0) {
    const groundY = intersects[0].point.y;
    const targetY = groundY + marbleRadius;

    if (marble.position.y <= targetY) {
      marble.position.y = targetY;
      if (velocity.y < 0) {
        velocity.y = 0;
      }
    }
  } else {
    // Simple ground collision fallback
    if (marble.position.y < marbleRadius) {
      marble.position.y = marbleRadius;
      if (velocity.y < 0) velocity.y = 0;
    }
  }

  // --- Fall detection ---
  if (marble.position.y < -10) {
    marble.position.set(0, 2, 0);
    velocity = { x: 0, y: 0, z: 0 };
    fallCount++;
  }

  // --- Marble rotation (visual) ---
  const speed = Math.sqrt(velocity.x * velocity.x + velocity.z * velocity.z);
  if (speed > 0.01) {
    const axis = new THREE.Vector3(-velocity.z, 0, velocity.x).normalize();
    const angle = speed * dt / marbleRadius;
    marble.rotateOnWorldAxis(axis, angle);
  }

  // --- Snapshot system ---
  elapsedSinceSnapshot += dt;
  if (elapsedSinceSnapshot >= 1.0) {
    elapsedSinceSnapshot = 0;
    saveSnapshot();
  }

  // --- Update HUD and State ---
  updateHUD();
  updateGlobalState();

  // --- Render ---
  renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Prevent arrow keys from scrolling
window.addEventListener('keydown', (e) => {
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
    e.preventDefault();
  }
});

// Start
animate();
</script>
</body>
</html>
