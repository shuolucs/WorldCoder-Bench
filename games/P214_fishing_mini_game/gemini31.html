<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fishing Mini-Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .hud-text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: auto;
        }
        #top-hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        #center-hud {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        #status-text {
            font-size: 36px;
            color: #FFD700;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
            transition: all 0.2s;
        }
        #bottom-hud {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 15px;
        }
        #reel-bar-container {
            width: 300px;
            height: 30px;
            background-color: rgba(0, 0, 0, 0.6);
            border: 3px solid #fff;
            border-radius: 15px;
            overflow: hidden;
            display: none;
        }
        #reel-bar-fill {
            width: 0%;
            height: 100%;
            background-color: #32CD32;
            transition: width 0.1s linear;
        }
        #reset-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #ff4500;
            border: 2px solid white;
            border-radius: 8px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        #reset-btn:hover {
            background-color: #ff6347;
        }
        .instruction {
            font-size: 16px;
            color: #ddd;
            margin-top: 5px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div id="top-hud">
            <div id="score-display" class="hud-text">Score: 0</div>
            <div id="fish-count" class="hud-text">Fish Remaining: 5</div>
        </div>
        <div id="center-hud">
            <div id="status-text" class="hud-text">Press SPACE to cast</div>
            <div id="instruction-text" class="instruction"></div>
        </div>
        <div id="bottom-hud">
            <div id="reel-bar-container">
                <div id="reel-bar-fill"></div>
            </div>
        </div>
        <button id="reset-btn">Reset Game</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            gameState: 'idle', // 'idle'|'casting'|'waiting'|'bite'|'reeling'|'caught'|'missed'
            score: 0,
            fishCount: 5,
            bobberPosition: { x: 0, y: 0, z: 0 },
            reelProgress: 0,
            castCount: 0,
            horseRotation: 0,
            rodAngle: 45,
            lineLength: 0,
            fishPositions: [],
            waterAnimating: true,
            timeInState: 0,
            totalCatches: 0,
            missCount: 0
        };

        // --- DOM Elements ---
        const scoreEl = document.getElementById('score-display');
        const fishCountEl = document.getElementById('fish-count');
        const statusEl = document.getElementById('status-text');
        const instructionEl = document.getElementById('instruction-text');
        const reelBarContainer = document.getElementById('reel-bar-container');
        const reelBarFill = document.getElementById('reel-bar-fill');
        const resetBtn = document.getElementById('reset-btn');

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#87CEEB');
        scene.fog = new THREE.FogExp2('#87CEEB', 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 1.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        scene.add(dirLight);

        // --- Objects ---

        // Water
        const waterGeo = new THREE.PlaneGeometry(100, 100, 50, 50);
        waterGeo.rotateX(-Math.PI / 2);
        const waterMat = new THREE.MeshPhongMaterial({
            color: 0x1ca3ec,
            transparent: true,
            opacity: 0.7,
            flatShading: true,
            shininess: 80
        });
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.receiveShadow = true;
        scene.add(water);

        // Store original water vertices for animation
        const waterPosAttr = waterGeo.attributes.position;
        const waterOriginalY = new Float32Array(waterPosAttr.count);
        for (let i = 0; i < waterPosAttr.count; i++) {
            waterOriginalY[i] = waterPosAttr.getY(i);
        }

        // Dock
        const dockGroup = new THREE.Group();
        scene.add(dockGroup);

        const woodMat = new THREE.MeshPhongMaterial({ color: 0x8b5a2b });
        const platformGeo = new THREE.BoxGeometry(10, 0.3, 4);
        const platform = new THREE.Mesh(platformGeo, woodMat);
        platform.position.set(0, 1.5, 0);
        platform.castShadow = true;
        platform.receiveShadow = true;
        dockGroup.add(platform);

        const legGeo = new THREE.CylinderGeometry(0.2, 0.2, 3);
        const legPositions = [
            [4.5, 0, 1.5], [-4.5, 0, 1.5], [4.5, 0, -1.5], [-4.5, 0, -1.5]
        ];
        legPositions.forEach(pos => {
            const leg = new THREE.Mesh(legGeo, woodMat);
            leg.position.set(...pos);
            leg.castShadow = true;
            dockGroup.add(leg);
        });

        // Horse
        let horseModel = new THREE.Group(); // Fallback group
        scene.add(horseModel);
        horseModel.position.set(3, 1.8, 0);
        
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Horse/glTF-Binary/Horse.glb',
            (gltf) => {
                const loadedHorse = gltf.scene;
                // The Khronos horse is large, scale it down
                loadedHorse.scale.set(0.01, 0.01, 0.01);
                
                // Replace fallback with loaded model
                scene.remove(horseModel);
                horseModel = loadedHorse;
                horseModel.position.set(3, 1.65, 0); // Adjust Y slightly for this specific model
                horseModel.rotation.y = -Math.PI / 2; // Face water
                
                // Enable shadows
                horseModel.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                scene.add(horseModel);
                window.__3D_STATE__.horseRotation = horseModel.rotation.y;
            },
            undefined,
            (error) => {
                console.warn('Failed to load horse model, using fallback box.', error);
                // Fallback box if loading fails
                const fallbackGeo = new THREE.BoxGeometry(1, 1.5, 2);
                const fallbackMat = new THREE.MeshPhongMaterial({ color: 0x8b4513 });
                const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
                fallbackMesh.position.y = 0.75;
                fallbackMesh.castShadow = true;
                horseModel.add(fallbackMesh);
                horseModel.rotation.y = -Math.PI / 2;
                window.__3D_STATE__.horseRotation = horseModel.rotation.y;
            }
        );

        // Fishing Rod
        const rodGroup = new THREE.Group();
        rodGroup.position.set(-2, 2.5, 0);
        // Angle 45 degrees toward water (-z direction)
        rodGroup.rotation.x = -Math.PI / 4;
        scene.add(rodGroup);

        const rodGeo = new THREE.CylinderGeometry(0.05, 0.05, 3);
        // Shift cylinder so base is at origin of rodGroup
        rodGeo.translate(0, 1.5, 0); 
        const rodMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
        const rod = new THREE.Mesh(rodGeo, rodMat);
        rod.castShadow = true;
        rodGroup.add(rod);

        const rodTipLocal = new THREE.Vector3(0, 3, 0);
        const rodTipWorld = new THREE.Vector3();

        // Bobber
        const bobberGeo = new THREE.SphereGeometry(0.1, 16, 16);
        const bobberMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
        const bobber = new THREE.Mesh(bobberGeo, bobberMat);
        bobber.castShadow = true;
        scene.add(bobber);

        // Fishing Line
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
        const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const line = new THREE.Line(lineGeo, lineMat);
        scene.add(line);

        // Fish
        const fishes = [];
        const fishGeo = new THREE.SphereGeometry(0.3, 16, 16);
        fishGeo.scale(1, 0.5, 0.33); // Make it ellipsoid
        const fishMat = new THREE.MeshPhongMaterial({ color: 0xff8c00 });

        function createFish() {
            const mesh = new THREE.Mesh(fishGeo, fishMat);
            mesh.position.set(
                (Math.random() - 0.5) * 40,
                -0.5,
                -(Math.random() * 20 + 5)
            );
            scene.add(mesh);
            return {
                mesh: mesh,
                cx: mesh.position.x,
                cz: mesh.position.z,
                speed: 0.5 + Math.random() * 1.5,
                radius: 2 + Math.random() * 3,
                angle: Math.random() * Math.PI * 2,
                isTarget: false
            };
        }

        function spawnInitialFish() {
            for (let i = 0; i < 5; i++) {
                fishes.push(createFish());
            }
            window.__3D_STATE__.fishCount = fishes.length;
        }
        spawnInitialFish();

        // --- Game Logic Variables ---
        let castTarget = new THREE.Vector3();
        let castStart = new THREE.Vector3();
        let targetFish = null;
        let respawnTimer = null;
        const clock = new THREE.Clock();

        // --- Functions ---

        function changeState(newState) {
            window.__3D_STATE__.gameState = newState;
            window.__3D_STATE__.timeInState = 0;
            updateUI();
        }

        function updateUI() {
            const state = window.__3D_STATE__.gameState;
            scoreEl.innerText = `Score: ${window.__3D_STATE__.score}`;
            fishCountEl.innerText = `Fish Remaining: ${window.__3D_STATE__.fishCount}`;
            
            reelBarContainer.style.display = 'none';
            instructionEl.innerText = '';

            switch (state) {
                case 'idle':
                    statusEl.innerText = 'Press SPACE to cast';
                    statusEl.style.color = '#FFD700';
                    break;
                case 'casting':
                    statusEl.innerText = 'Casting...';
                    statusEl.style.color = '#fff';
                    break;
                case 'waiting':
                    statusEl.innerText = 'Waiting for a bite...';
                    statusEl.style.color = '#fff';
                    break;
                case 'bite':
                    statusEl.innerText = 'FISH ON!';
                    statusEl.style.color = '#ff0000';
                    instructionEl.innerText = 'Press R to reel!';
                    break;
                case 'reeling':
                    statusEl.innerText = 'Reeling...';
                    statusEl.style.color = '#ff8c00';
                    instructionEl.innerText = 'Mash R!';
                    reelBarContainer.style.display = 'block';
                    reelBarFill.style.width = `${window.__3D_STATE__.reelProgress}%`;
                    break;
                case 'caught':
                    statusEl.innerText = 'CAUGHT!';
                    statusEl.style.color = '#32CD32';
                    break;
                case 'missed':
                    statusEl.innerText = 'Got away...';
                    statusEl.style.color = '#aaaaaa';
                    break;
            }
        }

        function resetGame() {
            window.__3D_STATE__.score = 0;
            window.__3D_STATE__.totalCatches = 0;
            window.__3D_STATE__.missCount = 0;
            window.__3D_STATE__.castCount = 0;
            
            fishes.forEach(f => scene.remove(f.mesh));
            fishes.length = 0;
            spawnInitialFish();
            
            if (respawnTimer) clearTimeout(respawnTimer);
            
            targetFish = null;
            horseModel.rotation.y = -Math.PI / 2;
            
            changeState('idle');
        }

        function checkRespawn() {
            if (fishes.length < 3 && !respawnTimer) {
                respawnTimer = setTimeout(() => {
                    const needed = 5 - fishes.length;
                    for (let i = 0; i < needed; i++) {
                        fishes.push(createFish());
                    }
                    window.__3D_STATE__.fishCount = fishes.length;
                    updateUI();
                    respawnTimer = null;
                }, 5000);
            }
        }

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            const state = window.__3D_STATE__.gameState;

            if (e.code === 'Space' && state === 'idle') {
                changeState('casting');
                window.__3D_STATE__.castCount++;
                
                rodGroup.localToWorld(rodTipWorld.copy(rodTipLocal));
                castStart.copy(rodTipWorld);
                
                // Random target on water
                castTarget.set(
                    (Math.random() - 0.5) * 40,
                    0,
                    -(Math.random() * 15 + 5)
                );
            }

            if ((e.key === 'r' || e.key === 'R')) {
                if (state === 'bite') {
                    changeState('reeling');
                    window.__3D_STATE__.reelProgress = 0;
                    updateUI();
                } else if (state === 'reeling') {
                    // 20% chance to snap per press
                    if (Math.random() < 0.2) {
                        changeState('missed');
                        window.__3D_STATE__.missCount++;
                        if (targetFish) targetFish.isTarget = false;
                        targetFish = null;
                    } else {
                        window.__3D_STATE__.reelProgress += 10;
                        updateUI();
                        
                        if (window.__3D_STATE__.reelProgress >= 100) {
                            changeState('caught');
                            window.__3D_STATE__.score++;
                            window.__3D_STATE__.totalCatches++;
                            
                            // Remove caught fish
                            if (targetFish) {
                                scene.remove(targetFish.mesh);
                                const idx = fishes.indexOf(targetFish);
                                if (idx > -1) fishes.splice(idx, 1);
                                window.__3D_STATE__.fishCount = fishes.length;
                                targetFish = null;
                                checkRespawn();
                            }
                        }
                    }
                }
            }
        });

        resetBtn.addEventListener('click', resetGame);

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1); // Cap dt to prevent huge jumps
            const time = clock.getElapsedTime();
            const state = window.__3D_STATE__.gameState;

            window.__3D_STATE__.timeInState += dt;
            const timeInState = window.__3D_STATE__.timeInState;

            // 1. Water Animation
            if (window.__3D_STATE__.waterAnimating) {
                for (let i = 0; i < waterPosAttr.count; i++) {
                    const x = waterPosAttr.getX(i);
                    const z = waterPosAttr.getZ(i);
                    const yOffset = Math.sin(x * 0.5 + time) * 0.15 + Math.cos(z * 0.5 + time) * 0.15;
                    waterPosAttr.setY(i, waterOriginalY[i] + yOffset);
                }
                waterPosAttr.needsUpdate = true;
            }

            // 2. Update Rod Tip Position
            rodGroup.localToWorld(rodTipWorld.copy(rodTipLocal));

            // 3. State Machine Logic & Bobber Physics
            if (state === 'idle') {
                // Bobber hangs from rod
                bobber.position.copy(rodTipWorld);
                bobber.position.y -= 0.5;
            } 
            else if (state === 'casting') {
                // Parabolic arc
                const duration = 1.0;
                let t = timeInState / duration;
                if (t >= 1.0) {
                    t = 1.0;
                    changeState('waiting');
                }
                
                bobber.position.lerpVectors(castStart, castTarget, t);
                // Add arc height
                bobber.position.y += Math.sin(t * Math.PI) * 4;
            }
            else if (state === 'waiting') {
                // Bobber floats
                bobber.position.y = Math.sin(time * 2) * 0.05;

                // Check for bites
                let biteOccurred = false;
                for (let i = 0; i < fishes.length; i++) {
                    const f = fishes[i];
                    const dist = f.mesh.position.distanceTo(bobber.position);
                    if (dist < 2.0) {
                        // 60% chance per second
                        if (Math.random() < 0.6 * dt) {
                            changeState('bite');
                            targetFish = f;
                            f.isTarget = true;
                            biteOccurred = true;
                            break;
                        }
                    }
                }
            }
            else if (state === 'bite') {
                // Bobber dips and bobs frantically
                bobber.position.y = -0.3 + Math.sin(time * 20) * 0.1;
                
                if (timeInState > 3.0) {
                    changeState('missed');
                    window.__3D_STATE__.missCount++;
                    if (targetFish) targetFish.isTarget = false;
                    targetFish = null;
                }
            }
            else if (state === 'reeling') {
                // Bobber moves towards rod tip based on progress
                const t = window.__3D_STATE__.reelProgress / 100;
                bobber.position.lerpVectors(castTarget, rodTipWorld, t);
                // Add some struggle movement
                bobber.position.x += (Math.random() - 0.5) * 0.2;
                bobber.position.z += (Math.random() - 0.5) * 0.2;
                
                // Target fish follows bobber
                if (targetFish) {
                    targetFish.mesh.position.copy(bobber.position);
                    targetFish.mesh.position.y -= 0.5;
                }
            }
            else if (state === 'caught') {
                // Bobber back at rod
                bobber.position.copy(rodTipWorld);
                bobber.position.y -= 0.5;

                // Horse celebration rotation
                if (horseModel) {
                    const baseRot = -Math.PI / 2;
                    // Rotate 360 degrees over 1 second
                    const rotProgress = Math.min(timeInState, 1.0);
                    horseModel.rotation.y = baseRot + (rotProgress * Math.PI * 2);
                    window.__3D_STATE__.horseRotation = horseModel.rotation.y;
                }

                if (timeInState > 2.0) {
                    if (horseModel) horseModel.rotation.y = -Math.PI / 2;
                    changeState('idle');
                }
            }
            else if (state === 'missed') {
                // Bobber floats idle
                bobber.position.y = Math.sin(time * 2) * 0.05;
                
                if (timeInState > 2.0) {
                    changeState('idle');
                }
            }

            // 4. Update Fishing Line
            const positions = lineGeo.attributes.position.array;
            positions[0] = rodTipWorld.x;
            positions[1] = rodTipWorld.y;
            positions[2] = rodTipWorld.z;
            positions[3] = bobber.position.x;
            positions[4] = bobber.position.y;
            positions[5] = bobber.position.z;
            lineGeo.attributes.position.needsUpdate = true;

            // 5. Fish Movement
            window.__3D_STATE__.fishPositions = [];
            fishes.forEach(f => {
                if (!f.isTarget) {
                    // Normal swimming
                    f.angle += f.speed * dt * 0.5;
                    
                    let targetX = f.cx + Math.cos(f.angle) * f.radius;
                    let targetZ = f.cz + Math.sin(f.angle * 0.5) * f.radius; // Figure 8ish

                    // If waiting, drift towards bobber
                    if (state === 'waiting') {
                        const dirToBobber = new THREE.Vector3(bobber.position.x - f.mesh.position.x, 0, bobber.position.z - f.mesh.position.z);
                        if (dirToBobber.lengthSq() > 0.1) {
                            dirToBobber.normalize();
                            targetX += dirToBobber.x * 0.5;
                            targetZ += dirToBobber.z * 0.5;
                        }
                    }

                    // Move mesh
                    const currentPos = f.mesh.position.clone();
                    const nextPos = new THREE.Vector3(targetX, -0.5 + Math.sin(time * 3 + f.angle) * 0.2, targetZ);
                    
                    f.mesh.position.lerp(nextPos, dt * 2);

                    // Look at direction of movement
                    const moveDir = new THREE.Vector3().subVectors(f.mesh.position, currentPos);
                    if (moveDir.lengthSq() > 0.001) {
                        const lookTarget = f.mesh.position.clone().add(moveDir);
                        f.mesh.lookAt(lookTarget);
                    }
                }
                
                // Record position for state
                window.__3D_STATE__.fishPositions.push({
                    x: f.mesh.position.x,
                    y: f.mesh.position.y,
                    z: f.mesh.position.z
                });
            });

            // 6. Update State Object
            window.__3D_STATE__.bobberPosition = { x: bobber.position.x, y: bobber.position.y, z: bobber.position.z };
            window.__3D_STATE__.lineLength = rodTipWorld.distanceTo(bobber.position) || 0;
            if (horseModel) window.__3D_STATE__.horseRotation = horseModel.rotation.y;

            renderer.render(scene, camera);
        }

        // Start
        updateUI();
        animate();

    </script>
</body>
</html>
