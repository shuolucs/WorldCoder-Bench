<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Fishing Mini-Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#score-display {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #fff;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    background: rgba(0,0,0,0.4);
    padding: 10px 20px;
    border-radius: 10px;
}

#fish-count {
    position: absolute;
    top: 20px;
    right: 20px;
    color: #fff;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    background: rgba(0,0,0,0.4);
    padding: 10px 20px;
    border-radius: 10px;
}

#status-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 36px;
    font-weight: bold;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
    pointer-events: none;
    text-align: center;
    transition: opacity 0.3s;
}

#reel-bar-container {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 30px;
    background: rgba(0,0,0,0.6);
    border-radius: 15px;
    border: 2px solid #fff;
    overflow: hidden;
    display: none;
}

#reel-bar-fill {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #00cc00, #00ff00);
    border-radius: 13px;
    transition: width 0.1s;
}

#reset-btn {
    position: absolute;
    bottom: 20px;
    right: 20px;
    padding: 12px 24px;
    font-size: 16px;
    font-weight: bold;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

#reset-btn:hover {
    background: linear-gradient(135deg, #c0392b, #a93226);
}

#instructions {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: #fff;
    font-size: 14px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
    background: rgba(0,0,0,0.4);
    padding: 10px 15px;
    border-radius: 8px;
    line-height: 1.6;
}

.fish-on {
    animation: pulse 0.5s ease-in-out infinite alternate;
    color: #ff4444 !important;
}

@keyframes pulse {
    from { transform: translate(-50%, -50%) scale(1); }
    to { transform: translate(-50%, -50%) scale(1.2); }
}
</style>
</head>
<body>

<div id="score-display">Score: 0</div>
<div id="fish-count">Fish Remaining: 5</div>
<div id="status-text">Press SPACE to cast!</div>
<div id="reel-bar-container">
    <div id="reel-bar-fill"></div>
</div>
<button id="reset-btn">Reset Game</button>
<div id="instructions">
    SPACE - Cast line<br>
    R - Reel in fish<br>
    Mouse - Look around
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 50, 150);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 10);
camera.lookAt(0, 1.5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.1;
controls.minDistance = 5;
controls.maxDistance = 30;

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -20;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x8B7355, 0.3);
scene.add(hemiLight);

// ============ WATER ============
const waterGeometry = new THREE.PlaneGeometry(100, 100, 128, 128);
const waterMaterial = new THREE.MeshPhongMaterial({
    color: 0x1a6b8a,
    transparent: true,
    opacity: 0.75,
    shininess: 100,
    specular: 0x4488aa,
    side: THREE.DoubleSide,
    flatShading: false
});
const water = new THREE.Mesh(waterGeometry, waterMaterial);
water.rotation.x = -Math.PI / 2;
water.position.y = 0;
water.receiveShadow = true;
scene.add(water);

const waterVerticesOriginal = [];
const posAttr = waterGeometry.attributes.position;
for (let i = 0; i < posAttr.count; i++) {
    waterVerticesOriginal.push(posAttr.getZ(i));
}

// ============ DOCK ============
const dockGroup = new THREE.Group();

// Platform
const platformGeo = new THREE.BoxGeometry(10, 0.3, 4);
const woodMat = new THREE.MeshPhongMaterial({ color: 0x8B6914, specular: 0x222222, shininess: 10 });
const platform = new THREE.Mesh(platformGeo, woodMat);
platform.position.set(0, 1.5, 0);
platform.castShadow = true;
platform.receiveShadow = true;
dockGroup.add(platform);

// Planks on top for detail
for (let i = -4; i <= 4; i++) {
    const plankGeo = new THREE.BoxGeometry(0.9, 0.05, 4);
    const plankMat = new THREE.MeshPhongMaterial({
        color: new THREE.Color(0.45 + Math.random() * 0.1, 0.3 + Math.random() * 0.05, 0.05),
        specular: 0x111111, shininess: 5
    });
    const plank = new THREE.Mesh(plankGeo, plankMat);
    plank.position.set(i * 1.05, 1.67, 0);
    plank.castShadow = true;
    dockGroup.add(plank);
}

// Legs
const legGeo = new THREE.CylinderGeometry(0.15, 0.15, 2.5, 8);
const legMat = new THREE.MeshPhongMaterial({ color: 0x6B4226 });
const legPositions = [
    [-4, 0.5, -1.5], [-4, 0.5, 1.5],
    [4, 0.5, -1.5], [4, 0.5, 1.5]
];
legPositions.forEach(pos => {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(pos[0], pos[1], pos[2]);
    leg.castShadow = true;
    dockGroup.add(leg);
});

// Cross beams
const beamGeo = new THREE.BoxGeometry(8, 0.15, 0.15);
const beam1 = new THREE.Mesh(beamGeo, legMat);
beam1.position.set(0, 0.8, -1.5);
dockGroup.add(beam1);
const beam2 = new THREE.Mesh(beamGeo, legMat);
beam2.position.set(0, 0.8, 1.5);
dockGroup.add(beam2);

// Railing posts
for (let x = -4; x <= 4; x += 2) {
    const postGeo = new THREE.CylinderGeometry(0.05, 0.05, 1, 6);
    const post = new THREE.Mesh(postGeo, legMat);
    post.position.set(x, 2.15, 1.85);
    dockGroup.add(post);
}
// Railing bar
const railGeo = new THREE.BoxGeometry(10, 0.08, 0.08);
const rail = new THREE.Mesh(railGeo, legMat);
rail.position.set(0, 2.6, 1.85);
dockGroup.add(rail);

scene.add(dockGroup);

// ============ FISHING ROD ============
const rodGroup = new THREE.Group();
const rodGeo = new THREE.CylinderGeometry(0.04, 0.06, 3, 8);
const rodMat = new THREE.MeshPhongMaterial({ color: 0x4a3728, specular: 0x333333, shininess: 30 });
const rod = new THREE.Mesh(rodGeo, rodMat);
rod.castShadow = true;
rodGroup.add(rod);

// Rod handle
const handleGeo = new THREE.CylinderGeometry(0.07, 0.07, 0.5, 8);
const handleMat = new THREE.MeshPhongMaterial({ color: 0x2a1a0a });
const handle = new THREE.Mesh(handleGeo, handleMat);
handle.position.y = -1.3;
rodGroup.add(handle);

// Rod tip ring
const ringGeo = new THREE.TorusGeometry(0.06, 0.015, 6, 12);
const ringMat = new THREE.MeshPhongMaterial({ color: 0x888888, metalness: 0.8 });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.position.y = 1.5;
ring.rotation.x = Math.PI / 2;
rodGroup.add(ring);

rodGroup.position.set(-2, 2.5, 0);
rodGroup.rotation.z = Math.PI / 4; // 45 degrees
scene.add(rodGroup);

// Rod tip world position
const rodTipLocal = new THREE.Vector3(0, 1.5, 0);
function getRodTipWorldPos() {
    const worldPos = new THREE.Vector3();
    rod.localToWorld(worldPos.copy(rodTipLocal));
    return worldPos;
}

// ============ BOBBER ============
const bobberGroup = new THREE.Group();
const bobberGeo = new THREE.SphereGeometry(0.1, 16, 16);
const bobberMat = new THREE.MeshPhongMaterial({ color: 0xff0000, specular: 0xffffff, shininess: 80 });
const bobber = new THREE.Mesh(bobberGeo, bobberMat);
bobber.castShadow = true;
bobberGroup.add(bobber);

// White bottom half
const bobberBottomGeo = new THREE.SphereGeometry(0.09, 16, 8, 0, Math.PI * 2, Math.PI / 2, Math.PI / 2);
const bobberBottomMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
const bobberBottom = new THREE.Mesh(bobberBottomGeo, bobberBottomMat);
bobberGroup.add(bobberBottom);

bobberGroup.position.set(-2, 0, -3);
scene.add(bobberGroup);

// ============ FISHING LINE ============
const lineGeometry = new THREE.BufferGeometry();
const lineMaterial = new THREE.LineBasicMaterial({ color: 0xcccccc, linewidth: 1 });
const linePoints = [new THREE.Vector3(), new THREE.Vector3()];
lineGeometry.setFromPoints(linePoints);
const fishingLine = new THREE.Line(lineGeometry, lineMaterial);
scene.add(fishingLine);

// ============ FISH ============
let fishes = [];
function createFish() {
    const fishGroup = new THREE.Group();

    // Body
    const bodyGeo = new THREE.SphereGeometry(1, 16, 12);
    bodyGeo.scale(0.3, 0.15, 0.1);
    const bodyMat = new THREE.MeshPhongMaterial({
        color: new THREE.Color(1, 0.4 + Math.random() * 0.3, 0),
        specular: 0x444444,
        shininess: 40
    });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.castShadow = true;
    fishGroup.add(body);

    // Tail
    const tailGeo = new THREE.ConeGeometry(0.08, 0.15, 4);
    const tailMat = new THREE.MeshPhongMaterial({ color: 0xff6600 });
    const tail = new THREE.Mesh(tailGeo, tailMat);
    tail.position.set(-0.3, 0, 0);
    tail.rotation.z = Math.PI / 2;
    fishGroup.add(tail);

    // Eye
    const eyeGeo = new THREE.SphereGeometry(0.02, 8, 8);
    const eyeMat = new THREE.MeshPhongMaterial({ color: 0x000000 });
    const eye = new THREE.Mesh(eyeGeo, eyeMat);
    eye.position.set(0.2, 0.04, 0.08);
    fishGroup.add(eye);
    const eye2 = eye.clone();
    eye2.position.z = -0.08;
    fishGroup.add(eye2);

    // Dorsal fin
    const finGeo = new THREE.ConeGeometry(0.05, 0.1, 3);
    const finMat = new THREE.MeshPhongMaterial({ color: 0xff8800 });
    const fin = new THREE.Mesh(finGeo, finMat);
    fin.position.set(0, 0.12, 0);
    fishGroup.add(fin);

    const x = (Math.random() - 0.5) * 30;
    const z = -5 - Math.random() * 15;
    fishGroup.position.set(x, -0.5, z);

    fishGroup.userData = {
        baseX: x,
        baseZ: z,
        speed: 0.3 + Math.random() * 0.5,
        radius: 2 + Math.random() * 3,
        phase: Math.random() * Math.PI * 2,
        pattern: Math.random() > 0.5 ? 'circle' : 'figure8',
        attracted: false,
        alive: true,
        tailMesh: tail
    };

    scene.add(fishGroup);
    fishes.push(fishGroup);
}

for (let i = 0; i < 5; i++) createFish();

// ============ HORSE ============
let horseModel = null;
let horseMixer = null;
let horseAnimations = [];
let horseCelebrating = false;
let horseCelebrationAngle = 0;

const loader = new GLTFLoader();
loader.load(
    'horse.glb',
    (gltf) => {
        horseModel = gltf.scene;
        horseModel.scale.set(0.5, 0.5, 0.5);
        horseModel.position.set(3, 1.65, 0);
        horseModel.rotation.y = -Math.PI / 2;
        horseModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        scene.add(horseModel);

        if (gltf.animations && gltf.animations.length > 0) {
            horseMixer = new THREE.AnimationMixer(horseModel);
            horseAnimations = gltf.animations;
        }
    },
    undefined,
    (error) => {
        console.log('Horse model not found, creating placeholder');
        createPlaceholderHorse();
    }
);

function createPlaceholderHorse() {
    horseModel = new THREE.Group();

    // Body
    const bodyGeo = new THREE.BoxGeometry(1.5, 0.8, 0.6);
    const horseMat = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
    const body = new THREE.Mesh(bodyGeo, horseMat);
    body.position.y = 0.8;
    body.castShadow = true;
    horseModel.add(body);

    // Head
    const headGeo = new THREE.BoxGeometry(0.4, 0.6, 0.4);
    const head = new THREE.Mesh(headGeo, horseMat);
    head.position.set(0.8, 1.4, 0);
    head.rotation.z = 0.3;
    head.castShadow = true;
    horseModel.add(head);

    // Snout
    const snoutGeo = new THREE.BoxGeometry(0.3, 0.25, 0.3);
    const snout = new THREE.Mesh(snoutGeo, horseMat);
    snout.position.set(1.1, 1.2, 0);
    horseModel.add(snout);

    // Ears
    const earGeo = new THREE.ConeGeometry(0.06, 0.2, 4);
    const ear1 = new THREE.Mesh(earGeo, horseMat);
    ear1.position.set(0.7, 1.8, 0.12);
    horseModel.add(ear1);
    const ear2 = ear1.clone();
    ear2.position.z = -0.12;
    horseModel.add(ear2);

    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.05, 8, 8);
    const eyeMat = new THREE.MeshPhongMaterial({ color: 0x000000 });
    const eye1 = new THREE.Mesh(eyeGeo, eyeMat);
    eye1.position.set(0.95, 1.5, 0.2);
    horseModel.add(eye1);
    const eye2 = eye1.clone();
    eye2.position.z = -0.2;
    horseModel.add(eye2);

    // Legs
    const legGeoH = new THREE.CylinderGeometry(0.08, 0.08, 0.8, 6);
    const legPositionsH = [
        [0.5, 0.3, 0.2], [0.5, 0.3, -0.2],
        [-0.5, 0.3, 0.2], [-0.5, 0.3, -0.2]
    ];
    legPositionsH.forEach(pos => {
        const leg = new THREE.Mesh(legGeoH, horseMat);
        leg.position.set(pos[0], pos[1], pos[2]);
        leg.castShadow = true;
        horseModel.add(leg);
    });

    // Tail
    const tailGeo = new THREE.CylinderGeometry(0.03, 0.06, 0.6, 6);
    const tailMat = new THREE.MeshPhongMaterial({ color: 0x2a1a0a });
    const tail = new THREE.Mesh(tailGeo, tailMat);
    tail.position.set(-0.9, 0.9, 0);
    tail.rotation.z = -0.5;
    horseModel.add(tail);

    // Mane
    const maneGeo = new THREE.BoxGeometry(0.5, 0.15, 0.08);
    const maneMat = new THREE.MeshPhongMaterial({ color: 0x1a0a00 });
    for (let i = 0; i < 4; i++) {
        const mane = new THREE.Mesh(maneGeo, maneMat);
        mane.position.set(0.2 + i * 0.15, 1.25, 0);
        horseModel.add(mane);
    }

    horseModel.position.set(3, 1.65, 0);
    horseModel.rotation.y = -Math.PI / 2;
    scene.add(horseModel);
}

// ============ ENVIRONMENT ============
// Some distant trees/bushes for atmosphere
for (let i = 0; i < 15; i++) {
    const treeGroup = new THREE.Group();
    const trunkGeo = new THREE.CylinderGeometry(0.2, 0.3, 2, 6);
    const trunkMat = new THREE.MeshPhongMaterial({ color: 0x5c3a1e });
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.castShadow = true;
    treeGroup.add(trunk);

    const leavesGeo = new THREE.SphereGeometry(1.2, 8, 8);
    const leavesMat = new THREE.MeshPhongMaterial({ color: new THREE.Color(0.1, 0.4 + Math.random() * 0.2, 0.1) });
    const leaves = new THREE.Mesh(leavesGeo, leavesMat);
    leaves.position.y = 1.8;
    leaves.castShadow = true;
    treeGroup.add(leaves);

    const angle = Math.random() * Math.PI * 2;
    const dist = 25 + Math.random() * 20;
    treeGroup.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
    treeGroup.scale.setScalar(0.8 + Math.random() * 0.8);
    scene.add(treeGroup);
}

// Ground plane (land around dock)
const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshPhongMaterial({ color: 0x4a7a3a });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.set(0, -0.05, 30);
ground.receiveShadow = true;
scene.add(ground);

// ============ GAME STATE ============
const state = {
    gameState: 'idle',
    score: 0,
    fishCount: 5,
    bobberPosition: { x: -2, y: 0, z: -3 },
    reelProgress: 0,
    castCount: 0,
    horseRotation: horseModel ? horseModel.rotation.y : -Math.PI / 2,
    rodAngle: 45,
    lineLength: 0,
    fishPositions: [],
    waterAnimating: true,
    timeInState: 0,
    totalCatches: 0,
    missCount: 0
};

window.__3D_STATE__ = state;

let stateStartTime = performance.now() / 1000;
let biteTimer = 0;
let biteTimeout = null;
let biteFishIndex = -1;
let respawnTimer = 0;
let bobberTargetPos = new THREE.Vector3(-2, 0, -3);
let castAnimProgress = 0;
let castStartPos = new THREE.Vector3();
let caughtAnimTimer = 0;
let missedAnimTimer = 0;

// DOM elements
const scoreDisplay = document.getElementById('score-display');
const fishCountDisplay = document.getElementById('fish-count');
const statusText = document.getElementById('status-text');
const reelBarContainer = document.getElementById('reel-bar-container');
const reelBarFill = document.getElementById('reel-bar-fill');
const resetBtn = document.getElementById('reset-btn');

function updateUI() {
    scoreDisplay.textContent = `Score: ${state.score}`;
    fishCountDisplay.textContent = `Fish Remaining: ${state.fishCount}`;
    reelBarFill.style.width = `${state.reelProgress}%`;
}

function setStatus(text, className = '') {
    statusText.textContent = text;
    statusText.className = className;
}

function changeState(newState) {
    state.gameState = newState;
    stateStartTime = performance.now() / 1000;
    state.timeInState = 0;

    switch (newState) {
        case 'idle':
            setStatus('Press SPACE to cast!');
            reelBarContainer.style.display = 'none';
            state.reelProgress = 0;
            biteFishIndex = -1;
            break;
        case 'casting':
            setStatus('Casting...');
            break;
        case 'waiting':
            setStatus('Waiting for a bite...');
            biteTimer = 0;
            break;
        case 'bite':
            setStatus('🐟 FISH ON! Press R! 🐟', 'fish-on');
            biteTimer = 0;
            break;
        case 'reeling':
            setStatus('Reel it in! Mash R!');
            reelBarContainer.style.display = 'block';
            break;
        case 'caught':
            setStatus('🎉 CAUGHT A FISH! 🎉');
            reelBarContainer.style.display = 'none';
            caughtAnimTimer = 0;
            horseCelebrating = true;
            horseCelebrationAngle = 0;
            break;
        case 'missed':
            setStatus('The fish got away...');
            reelBarContainer.style.display = 'none';
            missedAnimTimer = 0;
            break;
    }
}

// ============ INPUT ============
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        if (state.gameState === 'idle') {
            castLine();
        }
    }
    if (e.code === 'KeyR') {
        e.preventDefault();
        if (state.gameState === 'bite') {
            changeState('reeling');
            state.reelProgress = 10;
            updateUI();
        } else if (state.gameState === 'reeling') {
            reelIn();
        }
    }
});

resetBtn.addEventListener('click', resetGame);

function castLine() {
    state.castCount++;
    changeState('casting');

    const targetX = (Math.random() - 0.5) * 40; // -20 to 20
    const targetZ = -5 - Math.random() * 15; // -5 to -20
    bobberTargetPos.set(targetX, 0, targetZ);

    castStartPos.copy(bobberGroup.position);
    castAnimProgress = 0;
}

function reelIn() {
    // 20% chance line snaps
    if (Math.random() < 0.20) {
        setStatus('💔 Line snapped!');
        state.missCount++;

        // Fish swims away
        if (biteFishIndex >= 0 && biteFishIndex < fishes.length) {
            fishes[biteFishIndex].userData.attracted = false;
        }

        setTimeout(() => changeState('missed'), 500);
        return;
    }

    state.reelProgress = Math.min(100, state.reelProgress + 10);
    updateUI();

    // Bobber moves toward dock
    const rodTip = getRodTipWorldPos();
    bobberGroup.position.lerp(rodTip, 0.1);

    if (state.reelProgress >= 100) {
        catchFish();
    }
}

function catchFish() {
    state.score++;
    state.totalCatches = state.score;

    // Remove the caught fish
    if (biteFishIndex >= 0 && biteFishIndex < fishes.length) {
        const fish = fishes[biteFishIndex];
        scene.remove(fish);
        fishes.splice(biteFishIndex, 1);
        state.fishCount = fishes.length;
    }

    changeState('caught');
    updateUI();
}

function resetGame() {
    // Remove all fish
    fishes.forEach(f => scene.remove(f));
    fishes = [];

    // Respawn 5 fish
    for (let i = 0; i < 5; i++) createFish();

    state.score = 0;
    state.totalCatches = 0;
    state.castCount = 0;
    state.missCount = 0;
    state.fishCount = 5;
    state.reelProgress = 0;

    bobberGroup.position.set(-2, 0, -3);
    bobberTargetPos.set(-2, 0, -3);

    horseCelebrating = false;
    if (horseModel) {
        horseModel.rotation.y = -Math.PI / 2;
    }

    changeState('idle');
    updateUI();
}

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    const time = clock.getElapsedTime();

    state.timeInState = performance.now() / 1000 - stateStartTime;

    // Water animation
    if (state.waterAnimating) {
        const posAttr = waterGeometry.attributes.position;
        for (let i = 0; i < posAttr.count; i++) {
            const x = posAttr.getX(i);
            const y = posAttr.getY(i);
            const z = waterVerticesOriginal[i] +
                Math.sin(x * 0.3 + time * 1.5) * 0.15 +
                Math.cos(y * 0.2 + time * 1.2) * 0.1 +
                Math.sin((x + y) * 0.15 + time * 0.8) * 0.08;
            posAttr.setZ(i, z);
        }
        posAttr.needsUpdate = true;
        waterGeometry.computeVertexNormals();
    }

    // Fish movement
    fishes.forEach((fish, idx) => {
        if (!fish.userData.alive) return;

        const ud = fish.userData;
        const t = time * ud.speed + ud.phase;

        if (ud.attracted && state.gameState === 'waiting') {
            // Swim toward bobber
            const dir = new THREE.Vector3(
                bobberGroup.position.x - fish.position.x,
                0,
                bobberGroup.position.z - fish.position.z
            );
            const dist = dir.length();
            if (dist > 0.5) {
                dir.normalize().multiplyScalar(delta * 2);
                fish.position.x += dir.x;
                fish.position.z += dir.z;
            }
        } else if (!ud.attracted) {
            if (ud.pattern === 'circle') {
                fish.position.x = ud.baseX + Math.cos(t) * ud.radius;
                fish.position.z = ud.baseZ + Math.sin(t) * ud.radius;
            } else {
                fish.position.x = ud.baseX + Math.sin(t) * ud.radius;
                fish.position.z = ud.baseZ + Math.sin(t * 2) * ud.radius * 0.5;
            }
        }

        // Vertical oscillation
        fish.position.y = -0.5 + Math.sin(time * 2 + ud.phase) * 0.2;

        // Face movement direction
        const vx = ud.pattern === 'circle' ?
            -Math.sin(t) * ud.speed * ud.radius :
            Math.cos(t) * ud.speed * ud.radius;
        const vz = ud.pattern === 'circle' ?
            Math.cos(t) * ud.speed * ud.radius :
            Math.cos(t * 2) * ud.speed * ud.radius * 0.5;
        if (!ud.attracted) {
            fish.rotation.y = Math.atan2(vx, vz);
        } else {
            const dx = bobberGroup.position.x - fish.position.x;
            const dz = bobberGroup.position.z - fish.position.z;
            fish.rotation.y = Math.atan2(dx, dz);
        }

        // Tail wag
        if (ud.tailMesh) {
            ud.tailMesh.rotation.y = Math.sin(time * 8 + ud.phase) * 0.3;
        }
    });

    // Casting animation
    if (state.gameState === 'casting') {
        castAnimProgress += delta * 2;
        if (castAnimProgress >= 1) {
            castAnimProgress = 1;
            changeState('waiting');
        }

        // Arc trajectory
        const t = castAnimProgress;
        const arcHeight = 3;
        bobberGroup.position.lerpVectors(castStartPos, bobberTargetPos, t);
        bobberGroup.position.y = arcHeight * Math.sin(t * Math.PI) * (1 - t * 0.5);

        // Rod animation during cast
        rodGroup.rotation.z = Math.PI / 4 + Math.sin(t * Math.PI) * 0.5;
    }

    // Waiting state - check for fish proximity
    if (state.gameState === 'waiting') {
        biteTimer += delta;

        // Attract random fish
        if (biteTimer > 1) {
            fishes.forEach((fish, idx) => {
                if (!fish.userData.attracted && Math.random() < 0.01) {
                    fish.userData.attracted = true;
                }
            });
        }

        // Check for bite
        fishes.forEach((fish, idx) => {
            const dist = fish.position.distanceTo(bobberGroup.position);
            if (dist < 2.0 && Math.random() < 0.6 * delta) {
                biteFishIndex = idx;
                changeState('bite');
            }
        });

        // Bobber floating
        bobberGroup.position.y = Math.sin(time * 3) * 0.03;
    }

    // Bite state
    if (state.gameState === 'bite') {
        biteTimer += delta;

        // Bobber dipping
        bobberGroup.position.y = -0.3 + Math.sin(time * 8) * 0.1;

        // 3 second timeout
        if (biteTimer > 3) {
            state.missCount++;
            if (biteFishIndex >= 0 && biteFishIndex < fishes.length) {
                fishes[biteFishIndex].userData.attracted = false;
            }
            changeState('missed');
        }
    }

    // Reeling state
    if (state.gameState === 'reeling') {
        // Bobber struggles
        bobberGroup.position.y = -0.1 + Math.sin(time * 6) * 0.15;
        bobberGroup.position.x += Math.sin(time * 4) * 0.02;
        bobberGroup.position.z += Math.cos(time * 3) * 0.02;

        // Rod bends
        rodGroup.rotation.z = Math.PI / 4 + Math.sin(time * 5) * 0.1 - 0.2;
    }

    // Caught animation
    if (state.gameState === 'caught') {
        caughtAnimTimer += delta;
        if (caughtAnimTimer > 2) {
            changeState('idle');
            bobberGroup.position.set(-2, 0, -3);
            bobberTargetPos.set(-2, 0, -3);
            rodGroup.rotation.z = Math.PI / 4;
        }
    }

    // Missed animation
    if (state.gameState === 'missed') {
        missedAnimTimer += delta;
        if (missedAnimTimer > 2) {
            changeState('idle');
            bobberGroup.position.set(-2, 0, -3);
            bobberTargetPos.set(-2, 0, -3);
            rodGroup.rotation.z = Math.PI / 4;
        }
    }

    // Horse celebration
    if (horseCelebrating && horseModel) {
        horseCelebrationAngle += delta * 4;
        horseModel.rotation.y = -Math.PI / 2 + horseCelebrationAngle;
        horseModel.position.y = 1.65 + Math.abs(Math.sin(horseCelebrationAngle * 2)) * 0.3;

        if (horseCelebrationAngle >= Math.PI * 2) {
            horseCelebrating = false;
            horseModel.rotation.y = -Math.PI / 2;
            horseModel.position.y = 1.65;
        }
    }

    // Horse idle animation (subtle head bob)
    if (horseModel && !horseCelebrating) {
        // Subtle breathing/idle motion
        horseModel.position.y = 1.65 + Math.sin(time * 1.5) * 0.02;
    }

    // Horse mixer
    if (horseMixer) {
        horseMixer.update(delta);
    }

    // Update fishing line
    const rodTip = getRodTipWorldPos();
    const linePositions = fishingLine.geometry.attributes.position;
    if (linePositions) {
        // Create a slight curve with multiple points
        fishingLine.geometry.dispose();
        const points = [];
        const segments = 20;
        for (let i = 0; i <= segments; i++) {
            const t = i / segments;
            const x = rodTip.x + (bobberGroup.position.x - rodTip.x) * t;
            const z = rodTip.z + (bobberGroup.position.z - rodTip.z) * t;
            // Catenary curve
            const sag = Math.sin(t * Math.PI) * 0.3 * (1 - t);
            const y = rodTip.y + (bobberGroup.position.y - rodTip.y) * t - sag;
            points.push(new THREE.Vector3(x, y, z));
        }
        fishingLine.geometry = new THREE.BufferGeometry().setFromPoints(points);
    }

    // Fish respawn
    if (fishes.length < 3) {
        respawnTimer += delta;
        if (respawnTimer > 5) {
            while (fishes.length < 5) {
                createFish();
            }
            respawnTimer = 0;
        }
    } else {
        respawnTimer = 0;
    }

    // Update state object
    state.fishCount = fishes.length;
    state.bobberPosition = {
        x: bobberGroup.position.x,
        y: bobberGroup.position.y,
        z: bobberGroup.position.z
    };
    state.horseRotation = horseModel ? horseModel.rotation.y : 0;
    state.rodAngle = THREE.MathUtils.radToDeg(rodGroup.rotation.z);
    state.lineLength = rodTip.distanceTo(bobberGroup.position);
    state.fishPositions = fishes.map(f => ({
        x: f.position.x,
        y: f.position.y,
        z: f.position.z
    }));

    // Ensure NaN-free
    if (isNaN(bobberGroup.position.x)) bobberGroup.position.x = 0;
    if (isNaN(bobberGroup.position.y)) bobberGroup.position.y = 0;
    if (isNaN(bobberGroup.position.z)) bobberGroup.position.z = 0;

    controls.update();
    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start
changeState('idle');
updateUI();
animate();

</script>
</body>
</html>
