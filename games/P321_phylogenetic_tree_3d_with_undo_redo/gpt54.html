<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phylogenetic Tree 3D</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      color: white;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #ui-top-left {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      gap: 8px;
    }

    #ui-top-center {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 24px;
      font-weight: bold;
      color: white;
      pointer-events: none;
    }

    #info-panel {
      position: absolute;
      top: 60px;
      right: 12px;
      width: 260px;
      min-height: 180px;
      background: rgba(20, 20, 40, 0.92);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 14px;
      z-index: 10;
      display: none;
      box-sizing: border-box;
    }

    #info-panel h3 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    #info-panel .row {
      margin-bottom: 8px;
      font-size: 14px;
      line-height: 1.4;
    }

    #info-panel input[type="color"] {
      width: 100%;
      height: 36px;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }

    #info-panel button {
      margin-top: 10px;
      width: 100%;
    }

    #status-text {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      font-size: 15px;
      background: rgba(0,0,0,0.3);
      padding: 6px 10px;
      border-radius: 6px;
    }

    #node-count {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      font-size: 15px;
      background: rgba(0,0,0,0.3);
      padding: 6px 10px;
      border-radius: 6px;
    }

    button {
      background: #1f2a44;
      color: white;
      border: 1px solid #506080;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover:not(:disabled) {
      background: #2c3c63;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .label {
      position: absolute;
      color: white;
      font-size: 13px;
      pointer-events: none;
      white-space: nowrap;
      text-shadow: 0 0 6px rgba(0,0,0,0.9);
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="ui-top-left">
    <button id="btn-undo" disabled>Undo (0)</button>
    <button id="btn-redo" disabled>Redo (0)</button>
  </div>

  <div id="ui-top-center">Phylogenetic Tree 3D</div>

  <div id="info-panel">
    <h3>Node Info</h3>
    <div class="row"><strong>Name:</strong> <span id="info-name">-</span></div>
    <div class="row"><strong>Type:</strong> <span id="info-type">-</span></div>
    <div class="row"><strong>Position:</strong> <span id="info-position">-</span></div>
    <div class="row">
      <strong>Color:</strong>
      <input type="color" id="color-picker" />
    </div>
    <button id="btn-collapse" style="display:none;">Toggle Collapse</button>
    <div class="row" style="margin-top:12px; opacity:0.85;">
      Select a node, press <strong>M</strong> to move it.
    </div>
  </div>

  <div id="status-text">Mode: Select</div>
  <div id="node-count">Visible: 0 / Total: 9</div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const infoPanel = document.getElementById('info-panel');
    const infoName = document.getElementById('info-name');
    const infoType = document.getElementById('info-type');
    const infoPosition = document.getElementById('info-position');
    const colorPicker = document.getElementById('color-picker');
    const btnCollapse = document.getElementById('btn-collapse');
    const btnUndo = document.getElementById('btn-undo');
    const btnRedo = document.getElementById('btn-redo');
    const statusText = document.getElementById('status-text');
    const nodeCount = document.getElementById('node-count');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#0a0a1a');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 2, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 15, 10);
    scene.add(dirLight);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const sphereGeo = new THREE.SphereGeometry(0.3, 24, 24);
    const branchGeo = new THREE.CylinderGeometry(0.05, 0.05, 1, 12);
    const coneGeo = new THREE.ConeGeometry(0.35, 0.8, 12);

    const NODE_TYPES = {
      ROOT: 'root',
      INTERNAL: 'internal',
      LEAF: 'leaf'
    };

    const DEFAULT_COLORS = {
      leaf: '#00cc66',
      internal: '#ff8833',
      root: '#ff3333'
    };

    const nodeDefs = [
      { name: 'Root', type: NODE_TYPES.ROOT, position: [0, 6, 0], parent: null },
      { name: 'Ancestor_AB', type: NODE_TYPES.INTERNAL, position: [-4, 4, 0], parent: 'Root' },
      { name: 'Ancestor_CDE', type: NODE_TYPES.INTERNAL, position: [4, 4, 0], parent: 'Root' },
      { name: 'Species_A', type: NODE_TYPES.LEAF, position: [-6, 0, 0], parent: 'Ancestor_AB' },
      { name: 'Species_B', type: NODE_TYPES.LEAF, position: [-2, 0, 0], parent: 'Ancestor_AB' },
      { name: 'Ancestor_DE', type: NODE_TYPES.INTERNAL, position: [5, 2, 0], parent: 'Ancestor_CDE' },
      { name: 'Species_C', type: NODE_TYPES.LEAF, position: [2, 0, 0], parent: 'Ancestor_CDE' },
      { name: 'Species_D', type: NODE_TYPES.LEAF, position: [4, 0, -2], parent: 'Ancestor_DE' },
      { name: 'Species_E', type: NODE_TYPES.LEAF, position: [6, 0, 2], parent: 'Ancestor_DE' },
    ];

    const nodes = {};
    const branches = [];
    const labels = {};
    const collapseMarkers = {};
    const childrenMap = {};
    const parentMap = {};
    const selectableMeshes = [];

    nodeDefs.forEach(def => {
      childrenMap[def.name] = [];
      if (def.parent) parentMap[def.name] = def.parent;
    });
    nodeDefs.forEach(def => {
      if (def.parent) childrenMap[def.parent].push(def.name);
    });

    function createLabel(text) {
      const div = document.createElement('div');
      div.className = 'label';
      div.textContent = text;
      document.body.appendChild(div);
      return div;
    }

    function createNode(def) {
      const mat = new THREE.MeshStandardMaterial({
        color: DEFAULT_COLORS[def.type],
        emissive: 0x000000
      });
      const mesh = new THREE.Mesh(sphereGeo, mat);
      mesh.position.set(...def.position);
      mesh.userData.nodeName = def.name;
      mesh.userData.nodeType = def.type;
      scene.add(mesh);

      const markerMat = new THREE.MeshStandardMaterial({ color: 0xffff66, emissive: 0x222200 });
      const marker = new THREE.Mesh(coneGeo, markerMat);
      marker.visible = false;
      marker.position.copy(mesh.position);
      marker.rotation.x = Math.PI;
      scene.add(marker);

      const label = createLabel(def.name);

      nodes[def.name] = {
        name: def.name,
        type: def.type,
        parent: def.parent,
        children: [...childrenMap[def.name]],
        mesh,
        color: DEFAULT_COLORS[def.type],
        collapsed: false
      };

      collapseMarkers[def.name] = marker;
      labels[def.name] = label;
      selectableMeshes.push(mesh);
    }

    nodeDefs.forEach(createNode);

    function createBranch(parentName, childName) {
      const mat = new THREE.MeshStandardMaterial({ color: 0xffffff });
      const mesh = new THREE.Mesh(branchGeo, mat);
      scene.add(mesh);

      const branch = {
        parent: parentName,
        child: childName,
        mesh
      };
      branches.push(branch);
      updateBranch(branch);
    }

    nodeDefs.forEach(def => {
      if (def.parent) createBranch(def.parent, def.name);
    });

    function updateBranch(branch) {
      const p1 = nodes[branch.parent].mesh.position;
      const p2 = nodes[branch.child].mesh.position;
      const dir = new THREE.Vector3().subVectors(p2, p1);
      const len = dir.length();

      branch.mesh.position.copy(new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5));
      branch.mesh.scale.set(1, len, 1);
      branch.mesh.quaternion.setFromUnitVectors(
        new THREE.Vector3(0, 1, 0),
        dir.clone().normalize()
      );
    }

    function updateAllBranches() {
      branches.forEach(updateBranch);
    }

    function getDescendants(name) {
      const result = [];
      function walk(n) {
        for (const c of childrenMap[n]) {
          result.push(c);
          walk(c);
        }
      }
      walk(name);
      return result;
    }

    function hasCollapsedAncestor(name) {
      let current = parentMap[name];
      while (current) {
        if (nodes[current].collapsed) return true;
        current = parentMap[current];
      }
      return false;
    }

    function updateVisibility() {
      Object.values(nodes).forEach(node => {
        const hiddenByAncestor = hasCollapsedAncestor(node.name);
        node.mesh.visible = !hiddenByAncestor;
        labels[node.name].style.display = node.mesh.visible ? 'block' : 'none';
        collapseMarkers[node.name].visible = false;
      });

      Object.values(nodes).forEach(node => {
        if (node.collapsed) {
          collapseMarkers[node.name].visible = node.mesh.visible && node.children.length > 0;
          collapseMarkers[node.name].position.copy(node.mesh.position);
        }
      });

      branches.forEach(branch => {
        const parentNode = nodes[branch.parent];
        const childNode = nodes[branch.child];
        const childHiddenByCollapse = hasCollapsedAncestor(branch.child) || parentNode.collapsed;
        branch.mesh.visible = parentNode.mesh.visible && childNode.mesh.visible && !childHiddenByCollapse;
      });

      updateNodeCount();
    }

    function updateNodeCount() {
      const visible = Object.values(nodes).filter(n => n.mesh.visible).length;
      nodeCount.textContent = `Visible: ${visible} / Total: 9`;
    }

    let selectedNodeName = null;
    let mode = 'select';
    let moveState = null;
    let suppressColorEvent = false;
    let lastAction = null;

    const undoStack = [];
    const redoStack = [];

    function setSelectedNode(name) {
      if (selectedNodeName && nodes[selectedNodeName]) {
        nodes[selectedNodeName].mesh.material.emissive.setHex(0x000000);
      }
      selectedNodeName = name;
      if (selectedNodeName && nodes[selectedNodeName]) {
        nodes[selectedNodeName].mesh.material.emissive.setHex(0x444400);
      }
      updateInfoPanel();
    }

    function updateInfoPanel() {
      if (!selectedNodeName) {
        infoPanel.style.display = 'none';
        return;
      }
      const node = nodes[selectedNodeName];
      infoPanel.style.display = 'block';
      infoName.textContent = node.name;
      infoType.textContent = node.type;
      const p = node.mesh.position;
      infoPosition.textContent = `(${p.x.toFixed(2)}, ${p.y.toFixed(2)}, ${p.z.toFixed(2)})`;
      suppressColorEvent = true;
      colorPicker.value = node.color;
      suppressColorEvent = false;

      const isInternal = node.type !== NODE_TYPES.LEAF;
      btnCollapse.style.display = isInternal ? 'block' : 'none';
      if (isInternal) {
        btnCollapse.textContent = node.collapsed ? 'Expand' : 'Toggle Collapse';
      }
    }

    function pushAction(action) {
      undoStack.push(action);
      redoStack.length = 0;
      lastAction = action.type;
      updateUndoRedoButtons();
    }

    function updateUndoRedoButtons() {
      btnUndo.disabled = undoStack.length === 0;
      btnRedo.disabled = redoStack.length === 0;
      btnUndo.textContent = `Undo (${undoStack.length})`;
      btnRedo.textContent = `Redo (${redoStack.length})`;
    }

    function applyColor(nodeName, color, record = false, oldColor = null) {
      const node = nodes[nodeName];
      node.color = color;
      node.mesh.material.color.set(color);
      if (record) {
        pushAction({
          type: 'color_change',
          nodeName,
          oldColor,
          newColor: color
        });
      }
      updateInfoPanel();
    }

    function setCollapsed(nodeName, collapsed, record = false) {
      const node = nodes[nodeName];
      const prev = node.collapsed;
      node.collapsed = collapsed;
      updateVisibility();
      updateInfoPanel();
      if (record) {
        pushAction({
          type: collapsed ? 'collapse' : 'expand',
          nodeName,
          oldCollapsed: prev,
          newCollapsed: collapsed
        });
      }
    }

    function applyMove(nodeName, position, record = false, oldPosition = null) {
      const node = nodes[nodeName];
      node.mesh.position.copy(position);
      collapseMarkers[nodeName].position.copy(position);
      updateAllBranches();
      updateInfoPanel();
      if (record) {
        pushAction({
          type: 'move',
          nodeName,
          oldPosition: oldPosition.clone(),
          newPosition: position.clone()
        });
      }
    }

    function undoAction() {
      if (!undoStack.length) return;
      const action = undoStack.pop();

      if (action.type === 'color_change') {
        applyColor(action.nodeName, action.oldColor, false);
      } else if (action.type === 'collapse' || action.type === 'expand') {
        setCollapsed(action.nodeName, action.oldCollapsed, false);
      } else if (action.type === 'move') {
        applyMove(action.nodeName, action.oldPosition, false);
      }

      redoStack.push(action);
      lastAction = action.type;
      updateUndoRedoButtons();
    }

    function redoAction() {
      if (!redoStack.length) return;
      const action = redoStack.pop();

      if (action.type === 'color_change') {
        applyColor(action.nodeName, action.newColor, false);
      } else if (action.type === 'collapse' || action.type === 'expand') {
        setCollapsed(action.nodeName, action.newCollapsed, false);
      } else if (action.type === 'move') {
        applyMove(action.nodeName, action.newPosition, false);
      }

      undoStack.push(action);
      lastAction = action.type;
      updateUndoRedoButtons();
    }

    colorPicker.addEventListener('input', (e) => {
      if (suppressColorEvent || !selectedNodeName) return;
      const node = nodes[selectedNodeName];
      const newColor = e.target.value;
      const oldColor = node.color;
      if (newColor.toLowerCase() === oldColor.toLowerCase()) return;
      applyColor(selectedNodeName, newColor, true, oldColor);
    });

    btnCollapse.addEventListener('click', () => {
      if (!selectedNodeName) return;
      const node = nodes[selectedNodeName];
      if (node.type === NODE_TYPES.LEAF) return;
      setCollapsed(selectedNodeName, !node.collapsed, true);
    });

    btnUndo.addEventListener('click', undoAction);
    btnRedo.addEventListener('click', redoAction);

    const movePlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

    function screenToPlane(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const point = new THREE.Vector3();
      raycaster.ray.intersectPlane(movePlane, point);
      return point;
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      if (mode === 'move' && selectedNodeName && moveState) {
        const node = nodes[selectedNodeName];
        const finalPos = node.mesh.position.clone();
        const oldPos = moveState.startPosition.clone();

        if (!finalPos.equals(oldPos)) {
          applyMove(selectedNodeName, finalPos, true, oldPos);
        }
        moveState = null;
        mode = 'select';
        controls.enabled = true;
        updateStatus();
        return;
      }

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(selectableMeshes.filter(m => m.visible), false);

      if (intersects.length > 0) {
        const nodeName = intersects[0].object.userData.nodeName;
        setSelectedNode(nodeName);
      } else {
        setSelectedNode(null);
      }
    });

    renderer.domElement.addEventListener('pointermove', (event) => {
      if (mode !== 'move' || !selectedNodeName || !moveState) return;
      const point = screenToPlane(event);
      if (!point) return;
      const node = nodes[selectedNodeName];
      node.mesh.position.set(point.x, point.y, moveState.startPosition.z);
      collapseMarkers[selectedNodeName].position.copy(node.mesh.position);
      updateAllBranches();
      updateInfoPanel();
    });

    function updateStatus() {
      statusText.textContent = `Mode: ${mode === 'move' ? 'Move' : 'Select'}`;
    }

    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();

      if ((event.ctrlKey || event.metaKey) && key === 'z') {
        event.preventDefault();
        undoAction();
        return;
      }
      if ((event.ctrlKey || event.metaKey) && key === 'y') {
        event.preventDefault();
        redoAction();
        return;
      }

      if (key === 'm' && selectedNodeName && mode === 'select') {
        mode = 'move';
        controls.enabled = false;
        moveState = {
          startPosition: nodes[selectedNodeName].mesh.position.clone()
        };
        updateStatus();
      }
    });

    function updateLabels() {
      for (const name in nodes) {
        const node = nodes[name];
        const label = labels[name];
        if (!node.mesh.visible) {
          label.style.display = 'none';
          continue;
        }

        const pos = node.mesh.position.clone();
        pos.y -= 0.6;
        pos.project(camera);

        const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;

        if (pos.z < 1) {
          label.style.display = 'block';
          label.style.left = `${x}px`;
          label.style.top = `${y}px`;
        } else {
          label.style.display = 'none';
        }
      }
    }

    function roundedPos(v) {
      return {
        x: Math.round(v.x * 10) / 10,
        y: Math.round(v.y * 10) / 10,
        z: Math.round(v.z * 10) / 10
      };
    }

    function updateStateExposure() {
      const visibleNodes = Object.values(nodes).filter(n => n.mesh.visible).length;
      const branchCount = branches.filter(b => b.mesh.visible).length;
      const collapsedNodes = Object.values(nodes)
        .filter(n => n.collapsed)
        .map(n => n.name);

      const nodePositions = {};
      const nodeColors = {};

      Object.values(nodes).forEach(n => {
        nodePositions[n.name] = roundedPos(n.mesh.position);
        nodeColors[n.name] = n.color;
      });

      window.__3D_STATE__ = {
        totalNodes: 9,
        visibleNodes,
        selectedNode: selectedNodeName,
        undoStackSize: undoStack.length,
        redoStackSize: redoStack.length,
        mode,
        collapsedNodes,
        nodePositions,
        nodeColors,
        branchCount,
        cameraDistance: Math.round(camera.position.length() * 10) / 10,
        lastAction
      };
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', onResize);

    updateAllBranches();
    updateVisibility();
    updateUndoRedoButtons();
    updateStatus();
    updateStateExposure();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      updateLabels();
      updateStateExposure();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
