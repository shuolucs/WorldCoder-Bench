<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phylogenetic Tree 3D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a1a; }
canvas { display: block; }

#title {
  position: fixed;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  color: #ffffff;
  font-size: 24px;
  font-weight: bold;
  text-shadow: 0 0 10px rgba(100, 150, 255, 0.5);
  z-index: 100;
  pointer-events: none;
}

#undo-redo-panel {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 100;
  display: flex;
  gap: 8px;
}

#undo-redo-panel button {
  padding: 8px 16px;
  border: 1px solid #555;
  border-radius: 6px;
  background: #1a1a2e;
  color: #ccc;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}

#undo-redo-panel button:hover:not(:disabled) {
  background: #2a2a4e;
  border-color: #88f;
}

#undo-redo-panel button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

#info-panel {
  position: fixed;
  top: 60px;
  right: 15px;
  width: 260px;
  background: rgba(20, 20, 40, 0.95);
  border: 1px solid #444;
  border-radius: 10px;
  padding: 18px;
  color: #ddd;
  z-index: 100;
  display: none;
  backdrop-filter: blur(10px);
}

#info-panel h3 {
  margin-bottom: 12px;
  color: #88aaff;
  font-size: 16px;
  border-bottom: 1px solid #333;
  padding-bottom: 8px;
}

#info-panel .info-row {
  margin-bottom: 8px;
  font-size: 13px;
}

#info-panel .info-row label {
  color: #888;
  display: inline-block;
  width: 70px;
}

#info-panel .info-row span {
  color: #eee;
}

#color-picker {
  width: 100%;
  height: 35px;
  border: 1px solid #555;
  border-radius: 4px;
  background: #1a1a2e;
  cursor: pointer;
  margin-top: 5px;
}

#btn-collapse {
  width: 100%;
  padding: 8px;
  margin-top: 12px;
  border: 1px solid #ff8833;
  border-radius: 6px;
  background: rgba(255, 136, 51, 0.15);
  color: #ff8833;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}

#btn-collapse:hover {
  background: rgba(255, 136, 51, 0.3);
}

#status-text {
  position: fixed;
  bottom: 15px;
  left: 15px;
  color: #88aaff;
  font-size: 14px;
  z-index: 100;
  background: rgba(20, 20, 40, 0.8);
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid #333;
}

#node-count {
  position: fixed;
  bottom: 15px;
  right: 15px;
  color: #88aaff;
  font-size: 14px;
  z-index: 100;
  background: rgba(20, 20, 40, 0.8);
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid #333;
}

.node-label {
  position: absolute;
  color: #ccc;
  font-size: 11px;
  pointer-events: none;
  text-shadow: 0 0 4px #000, 0 0 8px #000;
  white-space: nowrap;
  z-index: 50;
  transform: translate(-50%, 0);
}
</style>
</head>
<body>

<div id="title">Phylogenetic Tree 3D</div>

<div id="undo-redo-panel">
  <button id="btn-undo" disabled>Undo (0)</button>
  <button id="btn-redo" disabled>Redo (0)</button>
</div>

<div id="info-panel">
  <h3 id="info-name">Node</h3>
  <div class="info-row"><label>Type:</label><span id="info-type"></span></div>
  <div class="info-row"><label>Position:</label><span id="info-pos"></span></div>
  <div class="info-row">
    <label>Color:</label>
    <input type="color" id="color-picker" value="#00cc66">
  </div>
  <button id="btn-collapse" style="display:none;">Toggle Collapse</button>
</div>

<div id="status-text">Mode: Select</div>
<div id="node-count">Visible: 9 / Total: 9</div>

<div id="labels-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 5, 20);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(10, 15, 10);
  scene.add(dirLight);

  // OrbitControls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;

  // Tree data
  const treeData = {
    Root: { parent: null, children: ['Ancestor_AB', 'Ancestor_CDE'], pos: [0, 6, 0], color: '#ff3333', type: 'root' },
    Ancestor_AB: { parent: 'Root', children: ['Species_A', 'Species_B'], pos: [-4, 4, 0], color: '#ff8833', type: 'internal' },
    Ancestor_CDE: { parent: 'Root', children: ['Species_C', 'Ancestor_DE'], pos: [4, 4, 0], color: '#ff8833', type: 'internal' },
    Ancestor_DE: { parent: 'Ancestor_CDE', children: ['Species_D', 'Species_E'], pos: [5, 2, 0], color: '#ff8833', type: 'internal' },
    Species_A: { parent: 'Ancestor_AB', children: [], pos: [-6, 0, 0], color: '#00cc66', type: 'leaf' },
    Species_B: { parent: 'Ancestor_AB', children: [], pos: [-2, 0, 0], color: '#00cc66', type: 'leaf' },
    Species_C: { parent: 'Ancestor_CDE', children: [], pos: [2, 0, 0], color: '#00cc66', type: 'leaf' },
    Species_D: { parent: 'Ancestor_DE', children: [], pos: [4, 0, -2], color: '#00cc66', type: 'leaf' },
    Species_E: { parent: 'Ancestor_DE', children: [], pos: [6, 0, 2], color: '#00cc66', type: 'leaf' },
  };

  // State
  const nodes = {};       // name -> { sphere, label, data }
  const branches = {};    // "parent-child" -> { mesh }
  const collapsedNodes = new Set();
  const collapseCones = {}; // name -> cone mesh
  let selectedNode = null;
  let mode = 'select';    // 'select' | 'move'
  let moveStartPos = null;

  // Undo/Redo
  const undoStack = [];
  const redoStack = [];
  let lastAction = null;

  // Create node spheres
  const sphereGeo = new THREE.SphereGeometry(0.3, 24, 24);

  function createNodeMaterial(colorHex) {
    return new THREE.MeshPhongMaterial({ color: new THREE.Color(colorHex), shininess: 80 });
  }

  const labelsContainer = document.getElementById('labels-container');

  for (const [name, data] of Object.entries(treeData)) {
    const mat = createNodeMaterial(data.color);
    const sphere = new THREE.Mesh(sphereGeo, mat);
    sphere.position.set(...data.pos);
    sphere.userData.nodeName = name;
    scene.add(sphere);

    // Label
    const labelDiv = document.createElement('div');
    labelDiv.className = 'node-label';
    labelDiv.textContent = name;
    labelsContainer.appendChild(labelDiv);

    nodes[name] = { sphere, label: labelDiv, data: { ...data } };
  }

  // Create branches
  function createBranch(parentName, childName) {
    const key = parentName + '-' + childName;
    const pPos = nodes[parentName].sphere.position;
    const cPos = nodes[childName].sphere.position;

    const dir = new THREE.Vector3().subVectors(cPos, pPos);
    const length = dir.length();
    const mid = new THREE.Vector3().addVectors(pPos, cPos).multiplyScalar(0.5);

    const geo = new THREE.CylinderGeometry(0.05, 0.05, length, 8);
    const mat = new THREE.MeshPhongMaterial({ color: 0xffffff });
    const mesh = new THREE.Mesh(geo, mat);

    mesh.position.copy(mid);

    // Align cylinder
    const axis = new THREE.Vector3(0, 1, 0);
    const dirNorm = dir.clone().normalize();
    const quat = new THREE.Quaternion().setFromUnitVectors(axis, dirNorm);
    mesh.quaternion.copy(quat);

    scene.add(mesh);
    branches[key] = { mesh, parent: parentName, child: childName };
  }

  function updateBranch(key) {
    const b = branches[key];
    if (!b) return;
    const pPos = nodes[b.parent].sphere.position;
    const cPos = nodes[b.child].sphere.position;

    const dir = new THREE.Vector3().subVectors(cPos, pPos);
    const length = dir.length();
    const mid = new THREE.Vector3().addVectors(pPos, cPos).multiplyScalar(0.5);

    b.mesh.geometry.dispose();
    b.mesh.geometry = new THREE.CylinderGeometry(0.05, 0.05, length, 8);
    b.mesh.position.copy(mid);

    const axis = new THREE.Vector3(0, 1, 0);
    const dirNorm = dir.clone().normalize();
    const quat = new THREE.Quaternion().setFromUnitVectors(axis, dirNorm);
    b.mesh.quaternion.copy(quat);
  }

  // Build all branches
  for (const [name, data] of Object.entries(treeData)) {
    for (const child of data.children) {
      createBranch(name, child);
    }
  }

  // Get all descendants of a node
  function getDescendants(nodeName) {
    const result = [];
    const stack = [...(treeData[nodeName].children || [])];
    while (stack.length > 0) {
      const n = stack.pop();
      result.push(n);
      if (treeData[n].children) {
        stack.push(...treeData[n].children);
      }
    }
    return result;
  }

  // Get all branches involving descendants
  function getDescendantBranches(nodeName) {
    const descs = getDescendants(nodeName);
    const branchKeys = [];
    // Branches from nodeName to its children
    for (const child of treeData[nodeName].children) {
      branchKeys.push(nodeName + '-' + child);
    }
    // Branches among descendants
    for (const d of descs) {
      for (const child of (treeData[d].children || [])) {
        branchKeys.push(d + '-' + child);
      }
    }
    return branchKeys;
  }

  // Collapse/Expand
  function collapseNode(nodeName) {
    if (collapsedNodes.has(nodeName)) return;
    collapsedNodes.add(nodeName);

    const descs = getDescendants(nodeName);
    const branchKeys = getDescendantBranches(nodeName);

    // Hide descendants
    for (const d of descs) {
      nodes[d].sphere.visible = false;
      nodes[d].label.style.display = 'none';
      // If this descendant is also collapsed, hide its cone
      if (collapseCones[d]) {
        collapseCones[d].visible = false;
      }
    }

    // Hide branches
    for (const key of branchKeys) {
      if (branches[key]) branches[key].mesh.visible = false;
    }

    // Create cone
    if (!collapseCones[nodeName]) {
      const coneGeo = new THREE.ConeGeometry(0.6, 1.2, 4);
      const coneMat = new THREE.MeshPhongMaterial({ color: 0xffaa00, transparent: true, opacity: 0.7 });
      const cone = new THREE.Mesh(coneGeo, coneMat);
      cone.rotation.x = Math.PI; // point downward
      scene.add(cone);
      collapseCones[nodeName] = cone;
    }
    const pos = nodes[nodeName].sphere.position;
    collapseCones[nodeName].position.set(pos.x, pos.y - 1, pos.z);
    collapseCones[nodeName].visible = true;
  }

  function expandNode(nodeName) {
    if (!collapsedNodes.has(nodeName)) return;
    collapsedNodes.delete(nodeName);

    // Remove cone
    if (collapseCones[nodeName]) {
      collapseCones[nodeName].visible = false;
    }

    // Show descendants (unless they are hidden by another collapsed ancestor)
    const descs = getDescendants(nodeName);
    const branchKeys = getDescendantBranches(nodeName);

    for (const d of descs) {
      // Check if any ancestor between nodeName and d is collapsed
      if (!isHiddenByCollapse(d, nodeName)) {
        nodes[d].sphere.visible = true;
        nodes[d].label.style.display = '';
        if (collapsedNodes.has(d) && collapseCones[d]) {
          collapseCones[d].visible = true;
        }
      }
    }

    for (const key of branchKeys) {
      if (branches[key]) {
        const parent = branches[key].parent;
        const child = branches[key].child;
        // Show branch only if both endpoints are visible
        if (!isHiddenByCollapse(parent, nodeName) && !isHiddenByCollapse(child, nodeName)) {
          // But if parent is collapsed and child is descendant of parent, keep hidden
          if (collapsedNodes.has(parent) && getDescendants(parent).includes(child)) {
            branches[key].mesh.visible = false;
          } else {
            branches[key].mesh.visible = true;
          }
        }
      }
    }
  }

  function isHiddenByCollapse(nodeName, excludeAncestor) {
    // Check if any ancestor of nodeName (up to but not including excludeAncestor) is collapsed
    let current = treeData[nodeName].parent;
    while (current && current !== excludeAncestor) {
      if (collapsedNodes.has(current)) return true;
      current = treeData[current].parent;
    }
    return false;
  }

  // Raycasting
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  function getClickedNode(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    const spheres = Object.values(nodes).filter(n => n.sphere.visible).map(n => n.sphere);
    const intersects = raycaster.intersectObjects(spheres);
    if (intersects.length > 0) {
      return intersects[0].object.userData.nodeName;
    }
    return null;
  }

  // Selection
  function selectNode(name) {
    // Deselect previous
    if (selectedNode && nodes[selectedNode]) {
      nodes[selectedNode].sphere.material.emissive.setHex(0x000000);
    }

    selectedNode = name;

    if (name && nodes[name]) {
      nodes[name].sphere.material.emissive.setHex(0x444400);
      showInfoPanel(name);
    } else {
      hideInfoPanel();
    }
  }

  // Info panel
  const infoPanel = document.getElementById('info-panel');
  const infoName = document.getElementById('info-name');
  const infoType = document.getElementById('info-type');
  const infoPos = document.getElementById('info-pos');
  const colorPicker = document.getElementById('color-picker');
  const btnCollapse = document.getElementById('btn-collapse');

  function showInfoPanel(name) {
    const node = nodes[name];
    infoPanel.style.display = 'block';
    infoName.textContent = name;
    infoType.textContent = node.data.type;
    const p = node.sphere.position;
    infoPos.textContent = `(${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)})`;

    const currentColor = '#' + node.sphere.material.color.getHexString();
    colorPicker.value = currentColor;

    if (node.data.type !== 'leaf' && treeData[name].children.length > 0) {
      btnCollapse.style.display = 'block';
      btnCollapse.textContent = collapsedNodes.has(name) ? 'Expand' : 'Collapse';
    } else {
      btnCollapse.style.display = 'none';
    }
  }

  function hideInfoPanel() {
    infoPanel.style.display = 'none';
  }

  function updateInfoPanel() {
    if (selectedNode && nodes[selectedNode]) {
      showInfoPanel(selectedNode);
    }
  }

  // Color picker
  colorPicker.addEventListener('input', function(e) {
    if (!selectedNode) return;
    const node = nodes[selectedNode];
    const oldColor = '#' + node.sphere.material.color.getHexString();
    const newColor = e.target.value;

    if (oldColor.toLowerCase() === newColor.toLowerCase()) return;

    node.sphere.material.color.set(newColor);
    node.data.color = newColor;

    pushAction({
      type: 'color_change',
      node: selectedNode,
      oldColor: oldColor,
      newColor: newColor
    });
  });

  // Collapse button
  btnCollapse.addEventListener('click', function() {
    if (!selectedNode) return;
    const name = selectedNode;
    if (treeData[name].children.length === 0) return;

    if (collapsedNodes.has(name)) {
      expandNode(name);
      pushAction({ type: 'expand', node: name });
    } else {
      collapseNode(name);
      pushAction({ type: 'collapse', node: name });
    }
    updateInfoPanel();
  });

  // Undo/Redo
  function pushAction(action) {
    undoStack.push(action);
    redoStack.length = 0;
    lastAction = action.type === 'expand' ? 'expand' : action.type === 'collapse' ? 'collapse' : action.type;
    updateUndoRedoButtons();
  }

  function undo() {
    if (undoStack.length === 0) return;
    const action = undoStack.pop();
    redoStack.push(action);

    applyAction(action, true);
    lastAction = action.type === 'expand' ? 'expand' : action.type === 'collapse' ? 'collapse' : action.type;
    updateUndoRedoButtons();
    updateInfoPanel();
  }

  function redo() {
    if (redoStack.length === 0) return;
    const action = redoStack.pop();
    undoStack.push(action);

    applyAction(action, false);
    lastAction = action.type === 'expand' ? 'expand' : action.type === 'collapse' ? 'collapse' : action.type;
    updateUndoRedoButtons();
    updateInfoPanel();
  }

  function applyAction(action, isUndo) {
    switch (action.type) {
      case 'color_change': {
        const color = isUndo ? action.oldColor : action.newColor;
        nodes[action.node].sphere.material.color.set(color);
        nodes[action.node].data.color = color;
        if (selectedNode === action.node) {
          colorPicker.value = color;
        }
        break;
      }
      case 'collapse': {
        if (isUndo) {
          expandNode(action.node);
        } else {
          collapseNode(action.node);
        }
        break;
      }
      case 'expand': {
        if (isUndo) {
          collapseNode(action.node);
        } else {
          expandNode(action.node);
        }
        break;
      }
      case 'move': {
        const pos = isUndo ? action.oldPos : action.newPos;
        nodes[action.node].sphere.position.set(pos.x, pos.y, pos.z);
        // Update cone position if collapsed
        if (collapseCones[action.node] && collapseCones[action.node].visible) {
          collapseCones[action.node].position.set(pos.x, pos.y - 1, pos.z);
        }
        updateConnectedBranches(action.node);
        break;
      }
    }
  }

  function updateConnectedBranches(nodeName) {
    for (const key of Object.keys(branches)) {
      const b = branches[key];
      if (b.parent === nodeName || b.child === nodeName) {
        updateBranch(key);
      }
    }
  }

  const btnUndo = document.getElementById('btn-undo');
  const btnRedo = document.getElementById('btn-redo');

  function updateUndoRedoButtons() {
    btnUndo.textContent = `Undo (${undoStack.length})`;
    btnRedo.textContent = `Redo (${redoStack.length})`;
    btnUndo.disabled = undoStack.length === 0;
    btnRedo.disabled = redoStack.length === 0;
  }

  btnUndo.addEventListener('click', undo);
  btnRedo.addEventListener('click', redo);

  // Keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'z') {
      e.preventDefault();
      undo();
    }
    if (e.ctrlKey && e.key === 'y') {
      e.preventDefault();
      redo();
    }
    if (e.key === 'm' || e.key === 'M') {
      if (selectedNode && mode === 'select') {
        enterMoveMode();
      }
    }
    if (e.key === 'Escape') {
      if (mode === 'move') {
        cancelMoveMode();
      }
    }
  });

  // Move mode
  const movePlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
  let moveNodeName = null;

  function enterMoveMode() {
    if (!selectedNode) return;
    mode = 'move';
    moveNodeName = selectedNode;
    const pos = nodes[moveNodeName].sphere.position;
    moveStartPos = { x: pos.x, y: pos.y, z: pos.z };
    controls.enabled = false;
    updateStatusText();
  }

  function cancelMoveMode() {
    if (moveNodeName && moveStartPos) {
      nodes[moveNodeName].sphere.position.set(moveStartPos.x, moveStartPos.y, moveStartPos.z);
      if (collapseCones[moveNodeName] && collapseCones[moveNodeName].visible) {
        collapseCones[moveNodeName].position.set(moveStartPos.x, moveStartPos.y - 1, moveStartPos.z);
      }
      updateConnectedBranches(moveNodeName);
    }
    mode = 'select';
    moveNodeName = null;
    moveStartPos = null;
    controls.enabled = true;
    updateStatusText();
    updateInfoPanel();
  }

  function confirmMove() {
    if (!moveNodeName) return;
    const pos = nodes[moveNodeName].sphere.position;
    const newPos = { x: pos.x, y: pos.y, z: pos.z };

    pushAction({
      type: 'move',
      node: moveNodeName,
      oldPos: { ...moveStartPos },
      newPos: newPos
    });

    mode = 'select';
    moveNodeName = null;
    moveStartPos = null;
    controls.enabled = true;
    updateStatusText();
    updateInfoPanel();
  }

  // Mouse events
  renderer.domElement.addEventListener('click', function(e) {
    if (mode === 'move') {
      confirmMove();
      return;
    }

    const clicked = getClickedNode(e);
    selectNode(clicked);
    updateStatusText();
  });

  renderer.domElement.addEventListener('mousemove', function(e) {
    if (mode !== 'move' || !moveNodeName) return;

    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    // Create a plane facing the camera through the node's current z
    const camDir = camera.getWorldDirection(new THREE.Vector3());
    const nodePos = nodes[moveNodeName].sphere.position;
    const plane = new THREE.Plane().setFromNormalAndCoplanarPoint(camDir, nodePos);

    const intersection = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, intersection);

    if (intersection) {
      nodes[moveNodeName].sphere.position.copy(intersection);
      if (collapseCones[moveNodeName] && collapseCones[moveNodeName].visible) {
        collapseCones[moveNodeName].position.set(intersection.x, intersection.y - 1, intersection.z);
      }
      updateConnectedBranches(moveNodeName);
    }
  });

  // Status text
  const statusText = document.getElementById('status-text');
  function updateStatusText() {
    const modeStr = mode.charAt(0).toUpperCase() + mode.slice(1);
    statusText.textContent = `Mode: ${modeStr}`;
  }

  // Node count
  const nodeCountEl = document.getElementById('node-count');
  function updateNodeCount() {
    let visible = 0;
    for (const n of Object.values(nodes)) {
      if (n.sphere.visible) visible++;
    }
    nodeCountEl.textContent = `Visible: ${visible} / Total: 9`;
    return visible;
  }

  // Update labels
  function updateLabels() {
    for (const [name, node] of Object.entries(nodes)) {
      if (!node.sphere.visible) {
        node.label.style.display = 'none';
        continue;
      }
      node.label.style.display = '';

      const pos = node.sphere.position.clone();
      pos.y -= 0.5;
      const screenPos = pos.project(camera);

      const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;

      // Check if behind camera
      if (screenPos.z > 1) {
        node.label.style.display = 'none';
        continue;
      }

      node.label.style.left = x + 'px';
      node.label.style.top = y + 'px';
    }
  }

  // Window resize
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // State exposure
  window.__3D_STATE__ = {};

  function updateState() {
    const visibleCount = updateNodeCount();

    const nodePositions = {};
    const nodeColors = {};
    for (const [name, node] of Object.entries(nodes)) {
      const p = node.sphere.position;
      nodePositions[name] = {
        x: Math.round(p.x * 10) / 10,
        y: Math.round(p.y * 10) / 10,
        z: Math.round(p.z * 10) / 10
      };
      nodeColors[name] = '#' + node.sphere.material.color.getHexString();
    }

    let visibleBranches = 0;
    for (const b of Object.values(branches)) {
      if (b.mesh.visible) visibleBranches++;
    }

    const camDist = camera.position.length();

    window.__3D_STATE__ = {
      totalNodes: 9,
      visibleNodes: visibleCount,
      selectedNode: selectedNode || null,
      undoStackSize: undoStack.length,
      redoStackSize: redoStack.length,
      mode: mode,
      collapsedNodes: Array.from(collapsedNodes),
      nodePositions: nodePositions,
      nodeColors: nodeColors,
      branchCount: visibleBranches,
      cameraDistance: Math.round(camDist * 10) / 10,
      lastAction: lastAction
    };
  }

  // Animation loop
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    updateLabels();
    updateState();
    renderer.render(scene, camera);
  }

  animate();
})();
</script>
