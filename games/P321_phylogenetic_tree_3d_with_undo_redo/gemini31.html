<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phylogenetic Tree 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* UI Overlays */
        .ui-layer {
            position: absolute;
            z-index: 10;
            pointer-events: none;
        }
        .interactive {
            pointer-events: auto;
        }
        /* Top Left: Undo/Redo */
        #top-left {
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) { background: #555; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Top Center: Title */
        #top-center {
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        
        /* Bottom Left: Status */
        #bottom-left {
            bottom: 20px;
            left: 20px;
            font-size: 16px;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 4px;
        }
        
        /* Bottom Right: Node Count */
        #bottom-right {
            bottom: 20px;
            right: 20px;
            font-size: 16px;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 4px;
        }
        
        /* Right Panel: Info Panel */
        #info-panel {
            top: 20px;
            right: 20px;
            width: 250px;
            background: rgba(20, 20, 40, 0.9);
            border: 1px solid #446;
            border-radius: 8px;
            padding: 15px;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #info-panel h3 { margin: 0 0 10px 0; font-size: 18px; border-bottom: 1px solid #557; padding-bottom: 5px; }
        .info-row { margin-bottom: 10px; font-size: 14px; display: flex; justify-content: space-between; align-items: center;}
        .info-label { color: #aaa; }
        input[type="color"] {
            background: none;
            border: none;
            width: 30px;
            height: 30px;
            cursor: pointer;
            padding: 0;
        }
        #btn-collapse { width: 100%; margin-top: 10px; }

        /* Node Labels (CSS2D) */
        .node-label {
            color: white;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 3px;
            margin-top: 15px;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
    <!-- Three.js and Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- UI Elements -->
    <div id="top-left" class="ui-layer interactive">
        <button id="btn-undo" disabled>Undo (0)</button>
        <button id="btn-redo" disabled>Redo (0)</button>
    </div>

    <div id="top-center" class="ui-layer">Phylogenetic Tree 3D</div>

    <div id="bottom-left" class="ui-layer">
        <span id="status-text">Mode: Select</span>
    </div>

    <div id="bottom-right" class="ui-layer">
        <span id="node-count">Visible: 9 / Total: 9</span>
    </div>

    <div id="info-panel" class="ui-layer interactive">
        <h3 id="info-name">Node Name</h3>
        <div class="info-row"><span class="info-label">Type:</span> <span id="info-type">Leaf</span></div>
        <div class="info-row"><span class="info-label">Pos:</span> <span id="info-pos">0, 0, 0</span></div>
        <div class="info-row">
            <span class="info-label">Color:</span> 
            <input type="color" id="color-picker" value="#ffffff">
        </div>
        <button id="btn-collapse" style="display: none;">Toggle Collapse</button>
        <div style="margin-top: 10px; font-size: 11px; color: #888; text-align: center;">Press 'M' to move node</div>
    </div>

    <script>
        // --- Global State & Data ---
        const treeData = {
            'Root': { type: 'root', pos: [0,6,0], color: '#ff3333', children: ['Ancestor_AB', 'Ancestor_CDE'], parent: null },
            'Ancestor_AB': { type: 'internal', pos: [-4,4,0], color: '#ff8833', children: ['Species_A', 'Species_B'], parent: 'Root' },
            'Ancestor_CDE': { type: 'internal', pos: [4,4,0], color: '#ff8833', children: ['Ancestor_DE', 'Species_C'], parent: 'Root' },
            'Ancestor_DE': { type: 'internal', pos: [5,2,0], color: '#ff8833', children: ['Species_D', 'Species_E'], parent: 'Ancestor_CDE' },
            'Species_A': { type: 'leaf', pos: [-6,0,0], color: '#00cc66', children: [], parent: 'Ancestor_AB' },
            'Species_B': { type: 'leaf', pos: [-2,0,0], color: '#00cc66', children: [], parent: 'Ancestor_AB' },
            'Species_C': { type: 'leaf', pos: [2,0,0], color: '#00cc66', children: [], parent: 'Ancestor_CDE' },
            'Species_D': { type: 'leaf', pos: [4,0,-2], color: '#00cc66', children: [], parent: 'Ancestor_DE' },
            'Species_E': { type: 'leaf', pos: [6,0,2], color: '#00cc66', children: [], parent: 'Ancestor_DE' }
        };

        const nodes = {}; // Stores node objects with meshes, data, state
        const branches = []; // Stores branch meshes
        
        let scene, camera, renderer, labelRenderer, controls;
        let raycaster, mouse;
        
        let selectedNode = null;
        let mode = 'select'; // 'select' or 'move'
        let movePlane = new THREE.Plane();
        let moveOffset = new THREE.Vector3();
        let originalMovePos = new THREE.Vector3();

        // Undo/Redo Stacks
        const undoStack = [];
        const redoStack = [];
        let lastActionStr = null;

        // Exposed State
        window.__3D_STATE__ = {
            totalNodes: 9,
            visibleNodes: 9,
            selectedNode: null,
            undoStackSize: 0,
            redoStackSize: 0,
            mode: 'select',
            collapsedNodes: [],
            nodePositions: {},
            nodeColors: {},
            branchCount: 0,
            cameraDistance: 0,
            lastAction: null
        };

        // --- Initialization ---
        function init() {
            const container = document.getElementById('canvas-container');

            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#0a0a1a');

            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 20);
            camera.lookAt(0, 0, 0);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 15, 10);
            scene.add(dirLight);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // CSS2D Renderer for Labels
            labelRenderer = new THREE.CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            container.appendChild(labelRenderer.domElement);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Raycaster
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            buildTree();

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('pointerdown', onPointerDown);
            renderer.domElement.addEventListener('pointermove', onPointerMove);
            window.addEventListener('keydown', onKeyDown);

            // UI Listeners
            document.getElementById('color-picker').addEventListener('change', onColorChange);
            document.getElementById('btn-collapse').addEventListener('click', onToggleCollapse);
            document.getElementById('btn-undo').addEventListener('click', undo);
            document.getElementById('btn-redo').addEventListener('click', redo);

            animate();
        }

        // --- Tree Construction ---
        function buildTree() {
            const sphereGeo = new THREE.SphereGeometry(0.3, 32, 32);
            const branchGeo = new THREE.CylinderGeometry(0.05, 0.05, 1, 8);
            branchGeo.translate(0, 0.5, 0); // Pivot at bottom
            branchGeo.rotateX(Math.PI / 2); // Align along Z for lookAt

            const branchMat = new THREE.MeshLambertMaterial({ color: 0xffffff });

            // Create Nodes
            for (const [name, data] of Object.entries(treeData)) {
                const mat = new THREE.MeshLambertMaterial({ color: data.color });
                const mesh = new THREE.Mesh(sphereGeo, mat);
                mesh.position.set(...data.pos);
                mesh.userData = { name: name, isNode: true };
                scene.add(mesh);

                // Label
                const div = document.createElement('div');
                div.className = 'node-label';
                div.textContent = name;
                const label = new THREE.CSS2DObject(div);
                label.position.set(0, -0.4, 0);
                mesh.add(label);

                // Collapse Cone (hidden initially)
                const coneGeo = new THREE.ConeGeometry(0.4, 0.8, 16);
                const coneMat = new THREE.MeshLambertMaterial({ color: data.color });
                const cone = new THREE.Mesh(coneGeo, coneMat);
                cone.rotation.x = Math.PI; // Point down
                cone.position.y = -0.5;
                cone.visible = false;
                mesh.add(cone);

                nodes[name] = {
                    name: name,
                    data: data,
                    mesh: mesh,
                    label: label,
                    cone: cone,
                    isCollapsed: false,
                    branchToParent: null,
                    branchesToChildren: []
                };
            }

            // Create Branches
            for (const [name, node] of Object.entries(nodes)) {
                if (node.data.parent) {
                    const parentNode = nodes[node.data.parent];
                    const branch = new THREE.Mesh(branchGeo, branchMat);
                    scene.add(branch);
                    branches.push(branch);

                    node.branchToParent = branch;
                    parentNode.branchesToChildren.push({ child: node, mesh: branch });

                    updateBranchTransform(branch, parentNode.mesh.position, node.mesh.position);
                }
            }
        }

        function updateBranchTransform(branchMesh, posA, posB) {
            const distance = posA.distanceTo(posB);
            branchMesh.position.copy(posA);
            branchMesh.lookAt(posB);
            branchMesh.scale.set(1, 1, distance);
        }

        function updateConnectedBranches(nodeName) {
            const node = nodes[nodeName];
            if (node.branchToParent) {
                const parentNode = nodes[node.data.parent];
                updateBranchTransform(node.branchToParent, parentNode.mesh.position, node.mesh.position);
            }
            for (const b of node.branchesToChildren) {
                updateBranchTransform(b.mesh, node.mesh.position, b.child.mesh.position);
            }
        }

        // --- Interaction ---
        function onPointerDown(event) {
            if (event.button !== 0) return; // Left click only

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            if (mode === 'move' && selectedNode) {
                // Confirm move
                const node = nodes[selectedNode];
                const newPos = node.mesh.position.clone();
                
                if (!newPos.equals(originalMovePos)) {
                    addAction({
                        type: 'move',
                        node: selectedNode,
                        oldPos: originalMovePos.clone(),
                        newPos: newPos.clone()
                    });
                }
                
                setMode('select');
                return;
            }

            // Selection logic
            const interactableMeshes = Object.values(nodes)
                .filter(n => n.mesh.visible)
                .map(n => n.mesh);
            
            const intersects = raycaster.intersectObjects(interactableMeshes);

            if (intersects.length > 0) {
                const clickedNodeName = intersects[0].object.userData.name;
                selectNode(clickedNodeName);
            } else {
                selectNode(null);
            }
        }

        function onPointerMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            if (mode === 'move' && selectedNode) {
                raycaster.setFromCamera(mouse, camera);
                const intersect = new THREE.Vector3();
                raycaster.ray.intersectPlane(movePlane, intersect);
                
                if (intersect) {
                    const node = nodes[selectedNode];
                    node.mesh.position.copy(intersect.sub(moveOffset));
                    updateConnectedBranches(selectedNode);
                }
            }
        }

        function onKeyDown(event) {
            // Undo/Redo Shortcuts
            if (event.ctrlKey || event.metaKey) {
                if (event.key.toLowerCase() === 'z') {
                    event.preventDefault();
                    undo();
                } else if (event.key.toLowerCase() === 'y') {
                    event.preventDefault();
                    redo();
                }
            }

            // Move Mode Toggle
            if (event.key.toLowerCase() === 'm' && selectedNode && mode === 'select') {
                setMode('move');
                const node = nodes[selectedNode];
                originalMovePos.copy(node.mesh.position);
                
                // Create plane parallel to XY at node's Z
                movePlane.setComponents(0, 0, 1, -node.mesh.position.z);
                
                raycaster.setFromCamera(mouse, camera);
                const intersect = new THREE.Vector3();
                raycaster.ray.intersectPlane(movePlane, intersect);
                if(intersect) {
                    moveOffset.copy(intersect).sub(node.mesh.position);
                } else {
                    moveOffset.set(0,0,0);
                }
            } else if (event.key === 'Escape' && mode === 'move') {
                // Cancel move
                const node = nodes[selectedNode];
                node.mesh.position.copy(originalMovePos);
                updateConnectedBranches(selectedNode);
                setMode('select');
            }
        }

        function selectNode(name) {
            // Reset previous selection
            if (selectedNode && nodes[selectedNode]) {
                nodes[selectedNode].mesh.material.emissive.setHex(0x000000);
            }

            selectedNode = name;

            const panel = document.getElementById('info-panel');
            if (name) {
                const node = nodes[name];
                node.mesh.material.emissive.setHex(0x444400);
                
                document.getElementById('info-name').textContent = name;
                document.getElementById('info-type').textContent = node.data.type.charAt(0).toUpperCase() + node.data.type.slice(1);
                
                // Update color picker without triggering event
                const picker = document.getElementById('color-picker');
                picker.value = '#' + node.mesh.material.color.getHexString();
                
                const btnCollapse = document.getElementById('btn-collapse');
                if (node.data.type !== 'leaf') {
                    btnCollapse.style.display = 'block';
                    btnCollapse.textContent = node.isCollapsed ? 'Expand' : 'Collapse';
                } else {
                    btnCollapse.style.display = 'none';
                }
                
                panel.style.display = 'block';
            } else {
                panel.style.display = 'none';
                if (mode === 'move') setMode('select');
            }
            updatePanelPos();
        }

        function updatePanelPos() {
            if (!selectedNode) return;
            const pos = nodes[selectedNode].mesh.position;
            document.getElementById('info-pos').textContent = `${pos.x.toFixed(1)}, ${pos.y.toFixed(1)}, ${pos.z.toFixed(1)}`;
        }

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('status-text').textContent = `Mode: ${mode.charAt(0).toUpperCase() + mode.slice(1)}`;
            controls.enabled = (mode === 'select');
        }

        // --- Actions & Undo/Redo ---
        function onColorChange(e) {
            if (!selectedNode) return;
            const newColor = e.target.value;
            const node = nodes[selectedNode];
            const oldColor = '#' + node.mesh.material.color.getHexString();
            
            if (newColor !== oldColor) {
                addAction({
                    type: 'color',
                    node: selectedNode,
                    oldColor: oldColor,
                    newColor: newColor
                });
                applyColor(selectedNode, newColor);
            }
        }

        function applyColor(nodeName, colorHex) {
            const node = nodes[nodeName];
            node.mesh.material.color.set(colorHex);
            node.cone.material.color.set(colorHex);
            if (selectedNode === nodeName) {
                document.getElementById('color-picker').value = colorHex;
            }
        }

        function onToggleCollapse() {
            if (!selectedNode) return;
            const node = nodes[selectedNode];
            const newState = !node.isCollapsed;
            
            addAction({
                type: 'collapse',
                node: selectedNode,
                oldState: node.isCollapsed,
                newState: newState
            });
            
            applyCollapse(selectedNode, newState);
        }

        function applyCollapse(nodeName, isCollapsed) {
            const node = nodes[nodeName];
            node.isCollapsed = isCollapsed;
            node.cone.visible = isCollapsed;
            
            if (selectedNode === nodeName) {
                document.getElementById('btn-collapse').textContent = isCollapsed ? 'Expand' : 'Collapse';
            }

            // Recursively hide/show descendants
            function traverse(currentName, visible) {
                const currNode = nodes[currentName];
                for (const childName of currNode.data.children) {
                    const childNode = nodes[childName];
                    childNode.mesh.visible = visible;
                    childNode.label.visible = visible;
                    if (childNode.branchToParent) {
                        childNode.branchToParent.visible = visible;
                    }
                    
                    // If making visible, respect child's own collapse state
                    if (visible && childNode.isCollapsed) {
                        childNode.cone.visible = true;
                        // Do not traverse further down
                    } else {
                        if (!visible) childNode.cone.visible = false;
                        traverse(childName, visible);
                    }
                }
            }
            
            traverse(nodeName, !isCollapsed);
        }

        function applyMove(nodeName, pos) {
            const node = nodes[nodeName];
            node.mesh.position.copy(pos);
            updateConnectedBranches(nodeName);
            if (selectedNode === nodeName) updatePanelPos();
        }

        function addAction(action) {
            undoStack.push(action);
            redoStack.length = 0; // Clear redo stack
            lastActionStr = action.type;
            updateUndoRedoUI();
        }

        function undo() {
            if (undoStack.length === 0) return;
            const action = undoStack.pop();
            redoStack.push(action);
            lastActionStr = `undo_${action.type}`;
            
            switch (action.type) {
                case 'color': applyColor(action.node, action.oldColor); break;
                case 'collapse': applyCollapse(action.node, action.oldState); break;
                case 'move': applyMove(action.node, action.oldPos); break;
            }
            updateUndoRedoUI();
        }

        function redo() {
            if (redoStack.length === 0) return;
            const action = redoStack.pop();
            undoStack.push(action);
            lastActionStr = `redo_${action.type}`;
            
            switch (action.type) {
                case 'color': applyColor(action.node, action.newColor); break;
                case 'collapse': applyCollapse(action.node, action.newState); break;
                case 'move': applyMove(action.node, action.newPos); break;
            }
            updateUndoRedoUI();
        }

        function updateUndoRedoUI() {
            const btnUndo = document.getElementById('btn-undo');
            const btnRedo = document.getElementById('btn-redo');
            btnUndo.textContent = `Undo (${undoStack.length})`;
            btnUndo.disabled = undoStack.length === 0;
            btnRedo.textContent = `Redo (${redoStack.length})`;
            btnRedo.disabled = redoStack.length === 0;
        }

        // --- Main Loop & State ---
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateState() {
            let visibleCount = 0;
            let visibleBranches = 0;
            const collapsed = [];
            const posObj = {};
            const colObj = {};

            for (const [name, node] of Object.entries(nodes)) {
                if (node.mesh.visible) visibleCount++;
                if (node.isCollapsed) collapsed.push(name);
                
                posObj[name] = {
                    x: Math.round(node.mesh.position.x * 10) / 10,
                    y: Math.round(node.mesh.position.y * 10) / 10,
                    z: Math.round(node.mesh.position.z * 10) / 10
                };
                colObj[name] = '#' + node.mesh.material.color.getHexString();
            }

            for (const b of branches) {
                if (b.visible) visibleBranches++;
            }

            document.getElementById('node-count').textContent = `Visible: ${visibleCount} / Total: 9`;
            if (selectedNode && mode !== 'move') updatePanelPos();

            window.__3D_STATE__ = {
                totalNodes: 9,
                visibleNodes: visibleCount,
                selectedNode: selectedNode,
                undoStackSize: undoStack.length,
                redoStackSize: redoStack.length,
                mode: mode,
                collapsedNodes: collapsed,
                nodePositions: posObj,
                nodeColors: colObj,
                branchCount: visibleBranches,
                cameraDistance: Math.round(camera.position.distanceTo(new THREE.Vector3(0,0,0)) * 10) / 10,
                lastAction: lastActionStr
            };
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            updateState();
        }

        // Start
        init();

    </script>
</body>
</html>
