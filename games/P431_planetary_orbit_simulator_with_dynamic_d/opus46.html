<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Planetary Orbit Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000510; font-family: 'Segoe UI', Arial, sans-serif; color: #fff; }
canvas { display: block; }

#info-panel {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 5, 20, 0.85);
    border: 1px solid rgba(100, 150, 255, 0.3);
    border-radius: 10px;
    padding: 15px 20px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 220px;
    backdrop-filter: blur(10px);
    z-index: 10;
}
#info-panel h3 {
    color: #88bbff;
    margin-bottom: 5px;
    font-size: 16px;
    border-bottom: 1px solid rgba(100, 150, 255, 0.2);
    padding-bottom: 5px;
}
#info-panel .label { color: #8899bb; }
#info-panel .value { color: #ffffff; font-weight: bold; }

#difficulty-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background: linear-gradient(135deg, #2244aa, #4466cc);
    color: #fff;
    border: 1px solid rgba(100, 150, 255, 0.4);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
    z-index: 10;
    transition: all 0.3s;
}
#difficulty-btn:hover { background: linear-gradient(135deg, #3355bb, #5577dd); transform: scale(1.05); }

#bottom-panel {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 5, 20, 0.85);
    border: 1px solid rgba(100, 150, 255, 0.3);
    border-radius: 10px;
    padding: 12px 25px;
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 10;
    backdrop-filter: blur(10px);
}
#bottom-panel label { font-size: 13px; color: #8899bb; }
#speed-slider {
    -webkit-appearance: none;
    width: 180px;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(90deg, #223366, #4488ff);
    outline: none;
}
#speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #88bbff;
    cursor: pointer;
    border: 2px solid #fff;
}
#speed-value { color: #88bbff; font-weight: bold; min-width: 30px; }

#quiz-btn {
    position: absolute;
    bottom: 15px;
    right: 15px;
    background: linear-gradient(135deg, #aa4422, #cc6644);
    color: #fff;
    border: 1px solid rgba(255, 150, 100, 0.4);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
    z-index: 10;
    transition: all 0.3s;
}
#quiz-btn:hover { background: linear-gradient(135deg, #bb5533, #dd7755); transform: scale(1.05); }

#quiz-panel {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 5, 30, 0.95);
    border: 2px solid rgba(255, 200, 100, 0.5);
    border-radius: 15px;
    padding: 25px 30px;
    text-align: center;
    z-index: 20;
    backdrop-filter: blur(15px);
    min-width: 350px;
}
#quiz-panel h3 { color: #ffcc66; margin-bottom: 15px; font-size: 18px; }
#quiz-panel p { margin-bottom: 20px; font-size: 15px; color: #ccddff; }
#quiz-panel .quiz-buttons { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
#quiz-panel .quiz-buttons button {
    background: rgba(50, 80, 150, 0.6);
    color: #fff;
    border: 1px solid rgba(100, 150, 255, 0.3);
    border-radius: 6px;
    padding: 8px 18px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
}
#quiz-panel .quiz-buttons button:hover { background: rgba(80, 120, 200, 0.8); transform: scale(1.05); }
#quiz-panel .quiz-buttons button.correct { background: rgba(50, 180, 80, 0.8); }
#quiz-panel .quiz-buttons button.wrong { background: rgba(200, 50, 50, 0.8); }
#quiz-result { margin-top: 15px; font-size: 16px; font-weight: bold; min-height: 24px; }
#quiz-close {
    margin-top: 15px;
    background: rgba(100, 50, 50, 0.6);
    color: #fff;
    border: 1px solid rgba(255, 100, 100, 0.3);
    border-radius: 6px;
    padding: 6px 16px;
    cursor: pointer;
    font-size: 13px;
}

#score-display {
    position: absolute;
    top: 15px;
    right: 180px;
    background: rgba(0, 5, 20, 0.85);
    border: 1px solid rgba(255, 200, 100, 0.3);
    border-radius: 8px;
    padding: 8px 15px;
    font-size: 14px;
    z-index: 10;
}
#score-display .label { color: #ccaa66; }
#score-display .value { color: #ffdd88; font-weight: bold; }

.planet-label {
    position: absolute;
    color: #aaccff;
    font-size: 12px;
    pointer-events: none;
    text-shadow: 0 0 5px rgba(100, 150, 255, 0.8);
    transform: translate(-50%, -100%);
    white-space: nowrap;
    z-index: 5;
}

#controls-help {
    position: absolute;
    bottom: 70px;
    left: 15px;
    font-size: 11px;
    color: rgba(150, 170, 200, 0.6);
    line-height: 1.6;
    z-index: 10;
}

#pause-indicator {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    color: rgba(255, 255, 255, 0.5);
    text-shadow: 0 0 20px rgba(100, 150, 255, 0.5);
    pointer-events: none;
    z-index: 15;
}
</style>
</head>
<body>

<div id="info-panel">
    <h3>🪐 Orbit Simulator</h3>
    <div><span class="label">Difficulty: </span><span class="value" id="info-difficulty">Easy</span></div>
    <div><span class="label">Time: </span><span class="value" id="info-time">0.0s</span></div>
    <div><span class="label">Selected: </span><span class="value" id="info-selected">None</span></div>
    <div id="info-distance-row"><span class="label">Distance: </span><span class="value" id="info-distance">-</span></div>
</div>

<div id="score-display">
    <span class="label">Score: </span><span class="value" id="score-value">0</span>
</div>

<button id="difficulty-btn">Difficulty: Easy</button>

<div id="bottom-panel">
    <label for="speed-slider">⚡ Speed:</label>
    <input type="range" id="speed-slider" min="0.1" max="5.0" step="0.1" value="1.0">
    <span id="speed-value">1.0x</span>
</div>

<button id="quiz-btn">🧠 Quiz</button>

<div id="quiz-panel">
    <h3>🌟 Planet Quiz</h3>
    <p id="quiz-question">Which planet is currently closest to the Sun?</p>
    <div class="quiz-buttons" id="quiz-buttons"></div>
    <div id="quiz-result"></div>
    <button id="quiz-close" onclick="closeQuiz()">Close</button>
</div>

<div id="pause-indicator">⏸ PAUSED</div>

<div id="controls-help">
    Click planet to select | P: Pause | R: Reset | F: Follow mode | Scroll: Zoom
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// ============ STATE ============
window.__3D_STATE__ = {
    simulationTime: 0,
    isPaused: false,
    difficulty: 'easy',
    timeScale: 1.0,
    speedMultiplier: 1.0,
    selectedPlanet: null,
    followMode: false,
    planetPositions: {
        mercury: { x: 0, y: 0, z: 0 },
        venus: { x: 0, y: 0, z: 0 },
        earth: { x: 0, y: 0, z: 0 },
        mars: { x: 0, y: 0, z: 0 },
        jupiter: { x: 0, y: 0, z: 0 }
    },
    planetDistances: {
        mercury: 0, venus: 0, earth: 0, mars: 0, jupiter: 0
    },
    closestPlanet: 'mercury',
    score: 0,
    quizActive: false,
    soldierLoaded: false,
    orbitLinesVisible: true,
    labelsVisible: true,
    cameraDistance: 0,
    earthAngle: 0,
    planetCount: 5
};

const state = window.__3D_STATE__;

// ============ THREE.JS SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000510);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 80, 120);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// ============ LIGHTING ============
const ambientLight = new THREE.AmbientLight(0x333366, 0.4);
scene.add(ambientLight);

const sunLight = new THREE.PointLight(0xffdd44, 2.0, 500);
sunLight.position.set(0, 0, 0);
scene.add(sunLight);

// ============ STAR FIELD ============
for (let i = 0; i < 200; i++) {
    const starGeo = new THREE.SphereGeometry(0.3 + Math.random() * 0.5, 4, 4);
    const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const star = new THREE.Mesh(starGeo, starMat);
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 300 + Math.random() * 200;
    star.position.set(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
    );
    scene.add(star);
}

// ============ SUN ============
const sunGeo = new THREE.SphereGeometry(5, 32, 32);
const sunMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, emissive: 0xffaa00 });
const sunMesh = new THREE.Mesh(sunGeo, sunMat);
scene.add(sunMesh);

// Sun glow
const sunGlowGeo = new THREE.SphereGeometry(6.5, 32, 32);
const sunGlowMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.2 });
const sunGlow = new THREE.Mesh(sunGlowGeo, sunGlowMat);
scene.add(sunGlow);

// ============ PLANET DATA ============
const planetData = [
    { name: 'Mercury', key: 'mercury', radius: 0.8, color: 0x888888, semiMajor: 15, eccentricity: 0.2, period: 3 },
    { name: 'Venus', key: 'venus', radius: 1.2, color: 0xddaa44, semiMajor: 22, eccentricity: 0.1, period: 5 },
    { name: 'Earth', key: 'earth', radius: 1.3, color: 0x4488ff, semiMajor: 30, eccentricity: 0.05, period: 8 },
    { name: 'Mars', key: 'mars', radius: 1.0, color: 0xcc4422, semiMajor: 40, eccentricity: 0.15, period: 12 },
    { name: 'Jupiter', key: 'jupiter', radius: 3.0, color: 0xddbb88, semiMajor: 60, eccentricity: 0.08, period: 20 }
];

const planets = [];
const orbitLines = [];
const planetLabels = [];

planetData.forEach((data, index) => {
    // Planet mesh
    const geo = new THREE.SphereGeometry(data.radius, 24, 24);
    const mat = new THREE.MeshStandardMaterial({
        color: data.color,
        roughness: 0.7,
        metalness: 0.2
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData = { planetIndex: index, name: data.name, key: data.key };
    scene.add(mesh);

    // Orbit line
    const orbitPoints = [];
    const segments = 128;
    for (let i = 0; i <= segments; i++) {
        const angle = (i / segments) * Math.PI * 2;
        const E = angle;
        const x = data.semiMajor * (Math.cos(E) - data.eccentricity);
        const z = data.semiMajor * Math.sqrt(1 - data.eccentricity * data.eccentricity) * Math.sin(E);
        orbitPoints.push(new THREE.Vector3(x, 0, z));
    }
    const orbitGeo = new THREE.BufferGeometry().setFromPoints(orbitPoints);
    const orbitMat = new THREE.LineDashedMaterial({
        color: data.color,
        transparent: true,
        opacity: 0.3,
        dashSize: 2,
        gapSize: 1
    });
    const orbitLine = new THREE.Line(orbitGeo, orbitMat);
    orbitLine.computeLineDistances();
    scene.add(orbitLine);
    orbitLines.push(orbitLine);

    // HTML label
    const labelDiv = document.createElement('div');
    labelDiv.className = 'planet-label';
    labelDiv.textContent = data.name;
    document.body.appendChild(labelDiv);
    planetLabels.push(labelDiv);

    planets.push({
        mesh: mesh,
        data: data,
        angle: 0
    });
});

// ============ SELECTION RING ============
const selectionRingGeo = new THREE.TorusGeometry(2, 0.15, 8, 32);
const selectionRingMat = new THREE.MeshBasicMaterial({ color: 0x00ffaa, transparent: true, opacity: 0.7 });
const selectionRing = new THREE.Mesh(selectionRingGeo, selectionRingMat);
selectionRing.rotation.x = Math.PI / 2;
selectionRing.visible = false;
scene.add(selectionRing);

// ============ SOLDIER (ASTRONAUT) ============
let soldierMixer = null;
let soldierModel = null;

const loader = new THREE.GLTFLoader();
loader.load(
    'https://threejs.org/examples/models/gltf/Soldier.glb',
    function (gltf) {
        soldierModel = gltf.scene;
        soldierModel.scale.set(0.02, 0.02, 0.02);
        scene.add(soldierModel);

        if (gltf.animations && gltf.animations.length > 0) {
            soldierMixer = new THREE.AnimationMixer(soldierModel);
            const action = soldierMixer.clipAction(gltf.animations[0]);
            action.play();
        }

        state.soldierLoaded = true;
        console.log('Soldier model loaded');
    },
    undefined,
    function (error) {
        console.warn('Could not load soldier model:', error);
        // Create a simple astronaut placeholder
        const astroGeo = new THREE.CylinderGeometry(0.3, 0.3, 1, 8);
        const astroMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        soldierModel = new THREE.Mesh(astroGeo, astroMat);
        const headGeo = new THREE.SphereGeometry(0.25, 8, 8);
        const head = new THREE.Mesh(headGeo, astroMat);
        head.position.y = 0.75;
        soldierModel.add(head);
        scene.add(soldierModel);
        state.soldierLoaded = true;
    }
);

// ============ KEPLER SOLVER ============
function solveKepler(M, e) {
    let E = M;
    for (let i = 0; i < 10; i++) {
        E = E - (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
    }
    return E;
}

function getPlanetPosition(data, time) {
    const M = (2 * Math.PI / data.period) * time;
    const E = solveKepler(M, data.eccentricity);
    const x = data.semiMajor * (Math.cos(E) - data.eccentricity);
    const z = data.semiMajor * Math.sqrt(1 - data.eccentricity * data.eccentricity) * Math.sin(E);
    return { x, y: 0, z, E, M };
}

// ============ CAMERA CONTROL ============
let cameraTargetDistance = 144; // distance from origin
let cameraTarget = new THREE.Vector3(0, 0, 0);

renderer.domElement.addEventListener('wheel', (e) => {
    cameraTargetDistance += e.deltaY * 0.1;
    cameraTargetDistance = Math.max(30, Math.min(300, cameraTargetDistance));
    e.preventDefault();
}, { passive: false });

// ============ RAYCASTING ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const planetMeshes = planets.map(p => p.mesh);
    const intersects = raycaster.intersectObjects(planetMeshes);

    if (intersects.length > 0) {
        const hit = intersects[0].object;
        state.selectedPlanet = hit.userData.key;
        selectionRing.visible = true;

        // Resize ring based on planet
        const pData = planetData.find(p => p.key === hit.userData.key);
        selectionRing.geometry.dispose();
        selectionRing.geometry = new THREE.TorusGeometry(pData.radius + 1.2, 0.15, 8, 32);
    } else {
        state.selectedPlanet = null;
        selectionRing.visible = false;
    }
});

// ============ KEYBOARD ============
document.addEventListener('keydown', (e) => {
    const key = e.key.toUpperCase();
    if (key === 'P') {
        state.isPaused = !state.isPaused;
        document.getElementById('pause-indicator').style.display = state.isPaused ? 'block' : 'none';
    } else if (key === 'R') {
        state.simulationTime = 0;
        state.isPaused = false;
        document.getElementById('pause-indicator').style.display = 'none';
    } else if (key === 'F') {
        if (state.selectedPlanet) {
            state.followMode = !state.followMode;
        }
    }
});

// ============ DIFFICULTY ============
const difficulties = ['easy', 'medium', 'hard'];
let difficultyIndex = 0;

document.getElementById('difficulty-btn').addEventListener('click', () => {
    difficultyIndex = (difficultyIndex + 1) % 3;
    state.difficulty = difficulties[difficultyIndex];

    switch (state.difficulty) {
        case 'easy':
            state.timeScale = 1.0;
            state.orbitLinesVisible = true;
            state.labelsVisible = true;
            break;
        case 'medium':
            state.timeScale = 2.0;
            state.orbitLinesVisible = false;
            state.labelsVisible = true;
            break;
        case 'hard':
            state.timeScale = 3.0;
            state.orbitLinesVisible = false;
            state.labelsVisible = false;
            break;
    }

    const label = state.difficulty.charAt(0).toUpperCase() + state.difficulty.slice(1);
    document.getElementById('difficulty-btn').textContent = 'Difficulty: ' + label;
});

// ============ SPEED SLIDER ============
const speedSlider = document.getElementById('speed-slider');
const speedValue = document.getElementById('speed-value');
speedSlider.addEventListener('input', () => {
    state.speedMultiplier = parseFloat(speedSlider.value);
    speedValue.textContent = state.speedMultiplier.toFixed(1) + 'x';
});

// ============ QUIZ ============
let quizCorrectAnswer = '';

document.getElementById('quiz-btn').addEventListener('click', () => {
    state.quizActive = true;
    quizCorrectAnswer = state.closestPlanet;

    document.getElementById('quiz-panel').style.display = 'block';
    document.getElementById('quiz-result').textContent = '';

    const buttonsDiv = document.getElementById('quiz-buttons');
    buttonsDiv.innerHTML = '';

    planetData.forEach(p => {
        const btn = document.createElement('button');
        btn.textContent = p.name;
        btn.addEventListener('click', () => {
            const allBtns = buttonsDiv.querySelectorAll('button');
            allBtns.forEach(b => b.disabled = true);

            if (p.key === quizCorrectAnswer) {
                btn.classList.add('correct');
                state.score++;
                document.getElementById('score-value').textContent = state.score;
                document.getElementById('quiz-result').textContent = '✅ Correct! +1 point';
                document.getElementById('quiz-result').style.color = '#44ff88';
            } else {
                btn.classList.add('wrong');
                const correctName = planetData.find(pd => pd.key === quizCorrectAnswer).name;
                document.getElementById('quiz-result').textContent = '❌ Wrong! It was ' + correctName;
                document.getElementById('quiz-result').style.color = '#ff6644';
                // Highlight correct
                allBtns.forEach(b => {
                    if (b.textContent === correctName) b.classList.add('correct');
                });
            }
        });
        buttonsDiv.appendChild(btn);
    });
});

function closeQuiz() {
    document.getElementById('quiz-panel').style.display = 'none';
    state.quizActive = false;
}

// ============ WINDOW RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();
let lastTime = 0;

function updateLabelPosition(labelDiv, worldPos) {
    const vector = worldPos.clone().project(camera);
    const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;

    if (vector.z < 1) {
        labelDiv.style.left = x + 'px';
        labelDiv.style.top = (y - 20) + 'px';
        labelDiv.style.display = state.labelsVisible ? 'block' : 'none';
    } else {
        labelDiv.style.display = 'none';
    }
}

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    if (!state.isPaused) {
        state.simulationTime += delta * state.timeScale * state.speedMultiplier;
    }

    const simTime = state.simulationTime;

    // Update planets
    let minDist = Infinity;
    let closestKey = 'mercury';

    planets.forEach((planet, i) => {
        const data = planet.data;
        const pos = getPlanetPosition(data, simTime);

        let px = pos.x;
        let py = 0;
        let pz = pos.z;

        // Hard mode perturbation
        if (state.difficulty === 'hard') {
            px += (Math.random() - 0.5) * 1.0;
            pz += (Math.random() - 0.5) * 1.0;
        }

        planet.mesh.position.set(px, py, pz);

        // Store angle for Earth
        if (data.key === 'earth') {
            state.earthAngle = pos.E;
        }

        // Update state
        state.planetPositions[data.key] = { x: px, y: py, z: pz };
        const dist = Math.sqrt(px * px + py * py + pz * pz);
        state.planetDistances[data.key] = dist;

        if (dist < minDist) {
            minDist = dist;
            closestKey = data.key;
        }

        // Update label
        updateLabelPosition(planetLabels[i], planet.mesh.position);

        // Orbit line visibility
        orbitLines[i].visible = state.orbitLinesVisible;
    });

    state.closestPlanet = closestKey;

    // Selection ring
    if (state.selectedPlanet && selectionRing.visible) {
        const selPlanet = planets.find(p => p.data.key === state.selectedPlanet);
        if (selPlanet) {
            selectionRing.position.copy(selPlanet.mesh.position);
            selectionRing.rotation.x = Math.PI / 2;
            // Animate ring
            selectionRing.rotation.z += delta * 2;
        }
    }

    // Soldier on Earth
    const earth = planets[2]; // Earth is index 2
    if (soldierModel) {
        const earthPos = earth.mesh.position;
        soldierModel.position.set(
            earthPos.x,
            earthPos.y + earth.data.radius,
            earthPos.z
        );
        // Face the sun
        soldierModel.lookAt(0, earthPos.y + earth.data.radius, 0);
    }

    if (soldierMixer) {
        soldierMixer.update(delta);
    }

    // Camera
    if (state.followMode && state.selectedPlanet) {
        const selPlanet = planets.find(p => p.data.key === state.selectedPlanet);
        if (selPlanet) {
            const pPos = selPlanet.mesh.position;
            // Direction from sun to planet
            const dir = pPos.clone().normalize();
            const camPos = pPos.clone().add(new THREE.Vector3(dir.x * 20, 10, dir.z * 20));
            camera.position.lerp(camPos, 0.05);
            cameraTarget.lerp(pPos, 0.05);
            camera.lookAt(cameraTarget);
        }
    } else {
        // Default orbit camera
        const currentDist = camera.position.length();
        const targetDist = cameraTargetDistance;
        const factor = targetDist / (currentDist || 1);

        const targetCamPos = camera.position.clone().multiplyScalar(factor);
        // Maintain a reasonable Y
        if (targetCamPos.y < 20) targetCamPos.y = 20;

        camera.position.lerp(targetCamPos, 0.05);
        cameraTarget.lerp(new THREE.Vector3(0, 0, 0), 0.1);
        camera.lookAt(cameraTarget);
    }

    state.cameraDistance = camera.position.distanceTo(cameraTarget);

    // Sun glow animation
    sunGlow.scale.setScalar(1 + Math.sin(simTime * 3) * 0.05);

    // Update HUD
    const diffLabel = state.difficulty.charAt(0).toUpperCase() + state.difficulty.slice(1);
    document.getElementById('info-difficulty').textContent = diffLabel;
    document.getElementById('info-time').textContent = state.simulationTime.toFixed(1) + 's';
    document.getElementById('info-selected').textContent = state.selectedPlanet
        ? state.selectedPlanet.charAt(0).toUpperCase() + state.selectedPlanet.slice(1)
        : 'None';

    const distRow = document.getElementById('info-distance-row');
    if (state.difficulty === 'easy' && state.selectedPlanet) {
        distRow.style.display = 'block';
        document.getElementById('info-distance').textContent =
            state.planetDistances[state.selectedPlanet].toFixed(1) + ' AU';
    } else {
        distRow.style.display = 'none';
    }

    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
