<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Planetary Orbit Simulator</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000510;
      font-family: Arial, sans-serif;
      color: white;
    }

    #ui-root {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    #info-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(10, 20, 40, 0.75);
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      min-width: 220px;
      pointer-events: auto;
    }

    #difficulty-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      pointer-events: auto;
      background: #1f3b6b;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
    }

    #quiz-btn {
      position: absolute;
      top: 60px;
      right: 12px;
      pointer-events: auto;
      background: #5b3b1f;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
    }

    #bottom-bar {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 20, 40, 0.75);
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      pointer-events: auto;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #speed-slider {
      width: 220px;
    }

    #quiz-panel {
      position: absolute;
      right: 12px;
      top: 110px;
      width: 260px;
      background: rgba(20, 15, 35, 0.9);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      pointer-events: auto;
      display: none;
    }

    #quiz-panel button {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: #2a3555;
      color: white;
      cursor: pointer;
    }

    .planet-label {
      position: absolute;
      color: white;
      font-size: 12px;
      text-shadow: 0 0 6px black;
      pointer-events: none;
      transform: translate(-50%, -50%);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="ui-root">
    <div id="info-panel"></div>
    <button id="difficulty-btn">Difficulty: easy</button>
    <button id="quiz-btn">Quiz</button>

    <div id="quiz-panel">
      <div id="quiz-question">Which planet is closest to the sun right now?</div>
      <div id="quiz-answers"></div>
    </div>

    <div id="bottom-bar">
      <label for="speed-slider">Speed</label>
      <input id="speed-slider" type="range" min="0.1" max="5.0" step="0.1" value="1.0" />
      <span id="speed-value">1.0x</span>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000510);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 80, 120);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0x333366, 0.4);
    scene.add(ambientLight);

    const sunLight = new THREE.PointLight(0xffdd44, 2.0, 0, 2);
    sunLight.position.set(0, 0, 0);
    scene.add(sunLight);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock = new THREE.Clock();

    const infoPanel = document.getElementById('info-panel');
    const difficultyBtn = document.getElementById('difficulty-btn');
    const speedSlider = document.getElementById('speed-slider');
    const speedValue = document.getElementById('speed-value');
    const quizBtn = document.getElementById('quiz-btn');
    const quizPanel = document.getElementById('quiz-panel');
    const quizAnswers = document.getElementById('quiz-answers');

    const difficulties = ['easy', 'medium', 'hard'];
    const difficultyConfig = {
      easy: {
        timeScale: 1.0,
        orbitLinesVisible: true,
        labelsVisible: true,
        showDistance: true,
        perturbation: false
      },
      medium: {
        timeScale: 2.0,
        orbitLinesVisible: false,
        labelsVisible: true,
        showDistance: false,
        perturbation: false
      },
      hard: {
        timeScale: 3.0,
        orbitLinesVisible: false,
        labelsVisible: false,
        showDistance: false,
        perturbation: true
      }
    };

    const state = {
      simulationTime: 0,
      isPaused: false,
      difficulty: 'easy',
      timeScale: 1.0,
      speedMultiplier: 1.0,
      selectedPlanet: null,
      followMode: false,
      planetPositions: {
        mercury: { x: 0, y: 0, z: 0 },
        venus: { x: 0, y: 0, z: 0 },
        earth: { x: 0, y: 0, z: 0 },
        mars: { x: 0, y: 0, z: 0 },
        jupiter: { x: 0, y: 0, z: 0 }
      },
      planetDistances: {
        mercury: 0,
        venus: 0,
        earth: 0,
        mars: 0,
        jupiter: 0
      },
      closestPlanet: 'mercury',
      score: 0,
      quizActive: false,
      soldierLoaded: false,
      orbitLinesVisible: true,
      labelsVisible: true,
      cameraDistance: camera.position.length(),
      earthAngle: 0,
      planetCount: 5,
      currentQuizAnswer: null
    };

    window.__3D_STATE__ = state;

    const starGroup = new THREE.Group();
    const starGeo = new THREE.SphereGeometry(0.4, 6, 6);
    const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

    for (let i = 0; i < 200; i++) {
      const star = new THREE.Mesh(starGeo, starMat);
      const dir = new THREE.Vector3(
        Math.random() * 2 - 1,
        Math.random() * 2 - 1,
        Math.random() * 2 - 1
      ).normalize();
      const radius = Math.random() * 500;
      star.position.copy(dir.multiplyScalar(radius));
      starGroup.add(star);
    }
    scene.add(starGroup);

    const sun = new THREE.Mesh(
      new THREE.SphereGeometry(5, 32, 32),
      new THREE.MeshStandardMaterial({
        color: 0xffaa00,
        emissive: 0xffaa00,
        emissiveIntensity: 1.4
      })
    );
    scene.add(sun);

    const planetsData = [
      { name: 'Mercury', key: 'mercury', radius: 0.8, color: 0x888888, a: 15, e: 0.2, period: 3 },
      { name: 'Venus', key: 'venus', radius: 1.2, color: 0xddaa44, a: 22, e: 0.1, period: 5 },
      { name: 'Earth', key: 'earth', radius: 1.3, color: 0x4488ff, a: 30, e: 0.05, period: 8 },
      { name: 'Mars', key: 'mars', radius: 1.0, color: 0xcc4422, a: 40, e: 0.15, period: 12 },
      { name: 'Jupiter', key: 'jupiter', radius: 3.0, color: 0xddbb88, a: 60, e: 0.08, period: 20 }
    ];

    const planets = [];
    const planetMeshes = [];
    const labels = {};

    function createLabel(text) {
      const div = document.createElement('div');
      div.className = 'planet-label';
      div.textContent = text;
      document.getElementById('ui-root').appendChild(div);
      return div;
    }

    function solveKepler(M, e) {
      let E = M;
      for (let i = 0; i < 10; i++) {
        const f = E - e * Math.sin(E) - M;
        const fp = 1 - e * Math.cos(E);
        E = E - f / fp;
      }
      return E;
    }

    function getOrbitPosition(a, e, period, time) {
      const M = (2 * Math.PI / period) * time;
      const E = solveKepler(M, e);
      const x = a * (Math.cos(E) - e);
      const z = a * Math.sqrt(1 - e * e) * Math.sin(E);
      return { x, y: 0, z, E };
    }

    function createOrbitLine(a, e) {
      const points = [];
      for (let i = 0; i <= 256; i++) {
        const M = (i / 256) * Math.PI * 2;
        const E = solveKepler(M, e);
        const x = a * (Math.cos(E) - e);
        const z = a * Math.sqrt(1 - e * e) * Math.sin(E);
        points.push(new THREE.Vector3(x, 0, z));
      }

      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineDashedMaterial({
        color: 0x88aaff,
        dashSize: 1,
        gapSize: 0.6,
        transparent: true,
        opacity: 0.6
      });
      const line = new THREE.LineLoop(geometry, material);
      line.computeLineDistances();
      return line;
    }

    planetsData.forEach(data => {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(data.radius, 24, 24),
        new THREE.MeshStandardMaterial({ color: data.color })
      );
      mesh.userData.planetKey = data.key;
      mesh.userData.planetName = data.name;
      scene.add(mesh);

      const orbitLine = createOrbitLine(data.a, data.e);
      scene.add(orbitLine);

      const label = createLabel(data.name);

      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(data.radius + 0.5, 0.12, 12, 48),
        new THREE.MeshBasicMaterial({ color: 0xffff66 })
      );
      ring.rotation.x = Math.PI / 2;
      ring.visible = false;
      scene.add(ring);

      const planet = { ...data, mesh, orbitLine, label, ring };
      planets.push(planet);
      planetMeshes.push(mesh);
      labels[data.key] = label;
    });

    let soldier = null;
    let soldierMixer = null;
    const loader = new GLTFLoader();
    loader.load(
      'soldier.glb',
      gltf => {
        soldier = gltf.scene;
        soldier.scale.set(0.02, 0.02, 0.02);
        scene.add(soldier);

        if (gltf.animations && gltf.animations.length > 0) {
          soldierMixer = new THREE.AnimationMixer(soldier);
          const action = soldierMixer.clipAction(gltf.animations[0]);
          action.play();
        }

        state.soldierLoaded = true;
      },
      undefined,
      err => {
        console.warn('Could not load soldier.glb', err);
      }
    );

    function applyDifficulty() {
      const cfg = difficultyConfig[state.difficulty];
      state.timeScale = cfg.timeScale;
      state.orbitLinesVisible = cfg.orbitLinesVisible;
      state.labelsVisible = cfg.labelsVisible;

      planets.forEach(p => {
        p.orbitLine.visible = cfg.orbitLinesVisible;
        p.label.style.display = cfg.labelsVisible ? 'block' : 'none';
      });

      difficultyBtn.textContent = `Difficulty: ${state.difficulty}`;
    }

    difficultyBtn.addEventListener('click', () => {
      const idx = difficulties.indexOf(state.difficulty);
      state.difficulty = difficulties[(idx + 1) % difficulties.length];
      applyDifficulty();
    });

    speedSlider.addEventListener('input', () => {
      state.speedMultiplier = parseFloat(speedSlider.value);
      speedValue.textContent = `${state.speedMultiplier.toFixed(1)}x`;
    });

    quizBtn.addEventListener('click', () => {
      state.quizActive = !state.quizActive;
      quizPanel.style.display = state.quizActive ? 'block' : 'none';
      if (state.quizActive) {
        state.currentQuizAnswer = state.closestPlanet;
        buildQuizAnswers();
      }
    });

    function buildQuizAnswers() {
      quizAnswers.innerHTML = '';
      planetsData.forEach(p => {
        const btn = document.createElement('button');
        btn.textContent = p.name;
        btn.addEventListener('click', () => {
          if (p.key === state.currentQuizAnswer) {
            state.score += 1;
          }
          state.quizActive = false;
          quizPanel.style.display = 'none';
        });
        quizAnswers.appendChild(btn);
      });
    }

    function selectPlanet(key) {
      state.selectedPlanet = key;
      planets.forEach(p => {
        p.ring.visible = p.key === key;
      });
    }

    window.addEventListener('click', event => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(planetMeshes);
      if (hits.length > 0) {
        selectPlanet(hits[0].object.userData.planetKey);
      }
    });

    let manualCameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));

    window.addEventListener('wheel', event => {
      manualCameraDistance += event.deltaY * 0.05;
      manualCameraDistance = THREE.MathUtils.clamp(manualCameraDistance, 30, 300);
      state.cameraDistance = manualCameraDistance;
    }, { passive: true });

    window.addEventListener('keydown', e => {
      const key = e.key.toLowerCase();
      if (key === 'p') {
        state.isPaused = !state.isPaused;
      } else if (key === 'r') {
        state.simulationTime = 0;
      } else if (key === 'f') {
        state.followMode = !state.followMode;
      }
    });

    function updateHUD() {
      const selected = state.selectedPlanet ? capitalize(state.selectedPlanet) : 'None';
      const distanceText = state.selectedPlanet && difficultyConfig[state.difficulty].showDistance
        ? `<div>Distance: ${state.planetDistances[state.selectedPlanet].toFixed(2)}</div>`
        : '';

      infoPanel.innerHTML = `
        <div><strong>Difficulty:</strong> ${state.difficulty}</div>
        <div><strong>Time:</strong> ${state.simulationTime.toFixed(1)} s</div>
        <div><strong>Selected:</strong> ${selected}</div>
        ${distanceText}
        <div><strong>Closest:</strong> ${capitalize(state.closestPlanet)}</div>
        <div><strong>Score:</strong> ${state.score}</div>
        <div><strong>Paused:</strong> ${state.isPaused ? 'Yes' : 'No'}</div>
        <div style="margin-top:6px;font-size:12px;opacity:0.85;">
          Keys: P pause, R reset, F follow
        </div>
      `;
    }

    function capitalize(s) {
      return s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
    }

    function updateLabels() {
      planets.forEach(p => {
        if (!state.labelsVisible) return;
        const pos = p.mesh.position.clone();
        pos.y += p.radius + 2;
        pos.project(camera);
        const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;
        p.label.style.left = `${x}px`;
        p.label.style.top = `${y}px`;
      });
    }

    function updatePlanets() {
      let minDist = Infinity;
      let closest = 'mercury';

      planets.forEach(p => {
        const pos = getOrbitPosition(p.a, p.e, p.period, state.simulationTime);
        let x = pos.x;
        let y = 0;
        let z = pos.z;

        if (state.difficulty === 'hard') {
          x += (Math.random() - 0.5) * 1.0;
          y += (Math.random() - 0.5) * 1.0;
          z += (Math.random() - 0.5) * 1.0;
        }

        p.mesh.position.set(x, y, z);
        p.ring.position.copy(p.mesh.position);

        state.planetPositions[p.key] = { x, y, z };
        const dist = Math.sqrt(x * x + y * y + z * z);
        state.planetDistances[p.key] = dist;

        if (dist < minDist) {
          minDist = dist;
          closest = p.key;
        }

        if (p.key === 'earth') {
          state.earthAngle = Math.atan2(z, x);
        }
      });

      state.closestPlanet = closest;
    }

    function updateSoldier() {
      if (!soldier) return;
      const earth = planets.find(p => p.key === 'earth');
      if (!earth) return;

      const earthPos = earth.mesh.position.clone();
      const sunDir = new THREE.Vector3().subVectors(new THREE.Vector3(0, 0, 0), earthPos).normalize();
      const surfacePos = earthPos.clone().add(sunDir.clone().negate().multiplyScalar(earth.radius + 0.3));
      soldier.position.copy(surfacePos);

      soldier.lookAt(0, 0, 0);
    }

    function updateCamera() {
      const target = new THREE.Vector3(0, 0, 0);

      if (state.followMode && state.selectedPlanet) {
        const selected = planets.find(p => p.key === state.selectedPlanet);
        if (selected) {
          target.copy(selected.mesh.position);
          camera.position.copy(selected.mesh.position.clone().add(new THREE.Vector3(0, 10, 20)));
          const dir = camera.position.clone().sub(target).normalize();
          camera.position.copy(target.clone().add(dir.multiplyScalar(manualCameraDistance * 0.2)));
          camera.lookAt(target);
          state.cameraDistance = camera.position.distanceTo(target);
          return;
        }
      }

      const spherical = new THREE.Spherical(manualCameraDistance, 1.0, 0.0);
      const basePos = new THREE.Vector3().setFromSpherical(spherical);
      camera.position.set(basePos.x, Math.max(40, basePos.y + 30), basePos.z + 80);
      camera.lookAt(target);
      state.cameraDistance = camera.position.distanceTo(target);
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (!state.isPaused) {
        state.simulationTime += delta * state.timeScale * state.speedMultiplier;
      }

      if (soldierMixer) soldierMixer.update(delta);

      updatePlanets();
      updateSoldier();
      updateCamera();
      updateLabels();
      updateHUD();

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    applyDifficulty();
    updateHUD();
    animate();
  </script>
</body>
</html>
