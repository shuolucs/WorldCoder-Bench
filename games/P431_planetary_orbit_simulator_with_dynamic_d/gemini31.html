<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Planetary Orbit Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000510;
            color: white;
            font-family: sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .ui-panel {
            position: absolute;
            background: rgba(0, 10, 30, 0.7);
            border: 1px solid #4466aa;
            padding: 15px;
            border-radius: 8px;
            pointer-events: auto;
        }
        #info-panel {
            top: 20px;
            left: 20px;
            min-width: 200px;
        }
        #controls-top-right {
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #controls-bottom {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        button {
            background: #224488;
            color: white;
            border: 1px solid #5588ff;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #3366cc;
        }
        .planet-label {
            position: absolute;
            color: white;
            font-size: 12px;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
            transform: translate(-50%, -50%);
            display: none;
        }
        #quiz-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 20, 50, 0.9);
            border: 2px solid #ffaa00;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 100;
        }
        .quiz-btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }
        .instructions {
            position: absolute;
            bottom: 60px;
            left: 20px;
            font-size: 12px;
            color: #aaa;
            pointer-events: none;
        }
    </style>
    <!-- Import map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="info-panel" class="ui-panel">
        <h3 style="margin-top:0; color:#ffdd44;">Orbit Simulator</h3>
        <div>Difficulty: <span id="ui-diff">Easy</span></div>
        <div>Time: <span id="ui-time">0.0</span>s</div>
        <div>Selected: <span id="ui-selected">None</span></div>
        <div id="ui-dist-container">Distance: <span id="ui-dist">-</span></div>
        <div>Score: <span id="ui-score">0</span></div>
    </div>

    <div id="controls-top-right" class="ui-panel">
        <button id="difficulty-btn">Difficulty: Easy</button>
        <button id="quiz-btn">Take Quiz</button>
    </div>

    <div id="controls-bottom" class="ui-panel">
        <label for="speed-slider">Speed Multiplier:</label>
        <input type="range" id="speed-slider" min="0.1" max="5.0" step="0.1" value="1.0">
        <span id="speed-val">1.0x</span>
    </div>

    <div class="instructions">
        Click planet to select | Scroll to zoom<br>
        [P] Pause/Resume | [R] Reset | [F] Toggle Follow Mode
    </div>

    <div id="quiz-panel">
        <h3>Which planet is closest to the Sun right now?</h3>
        <div class="quiz-btn-group" id="quiz-buttons"></div>
    </div>

    <div id="labels-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            simulationTime: 0,
            isPaused: false,
            difficulty: 'easy',
            timeScale: 1.0,
            speedMultiplier: 1.0,
            selectedPlanet: null,
            followMode: false,
            planetPositions: {},
            planetDistances: {},
            closestPlanet: '',
            score: 0,
            quizActive: false,
            soldierLoaded: false,
            orbitLinesVisible: true,
            labelsVisible: true,
            cameraDistance: 144.22, // length of (0, 80, 120)
            earthAngle: 0,
            planetCount: 5
        };

        const state = window.__3D_STATE__;
        let correctAnswer = '';

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000510);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const initialCamDir = new THREE.Vector3(0, 80, 120).normalize();
        camera.position.copy(initialCamDir).multiplyScalar(state.cameraDistance);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x333366, 0.4);
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xffdd44, 2.0, 0, 0);
        scene.add(sunLight);

        // Star field
        const starsGeometry = new THREE.BufferGeometry();
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, sizeAttenuation: false });
        const starsVertices = [];
        for (let i = 0; i < 200; i++) {
            const r = 500 * Math.cbrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            const phi = Math.acos(2 * Math.random() - 1);
            starsVertices.push(
                r * Math.sin(phi) * Math.cos(theta),
                r * Math.sin(phi) * Math.sin(theta),
                r * Math.cos(phi)
            );
        }
        starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);

        // --- Planets & Orbits ---
        const planetData = [
            { id: 'mercury', name: 'Mercury', r: 0.8, color: 0x888888, a: 15, e: 0.2, T: 3 },
            { id: 'venus', name: 'Venus', r: 1.2, color: 0xddaa44, a: 22, e: 0.1, T: 5 },
            { id: 'earth', name: 'Earth', r: 1.3, color: 0x4488ff, a: 30, e: 0.05, T: 8 },
            { id: 'mars', name: 'Mars', r: 1.0, color: 0xcc4422, a: 40, e: 0.15, T: 12 },
            { id: 'jupiter', name: 'Jupiter', r: 3.0, color: 0xddbb88, a: 60, e: 0.08, T: 20 }
        ];

        const planets = {};
        const meshes = [];
        const labelsContainer = document.getElementById('labels-container');

        // Sun
        const sunGeo = new THREE.SphereGeometry(5, 32, 32);
        const sunMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xffaa00 });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        scene.add(sun);

        // Selection Ring
        const ringGeo = new THREE.TorusGeometry(1.5, 0.1, 8, 32);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
        const selectionRing = new THREE.Mesh(ringGeo, ringMat);
        selectionRing.rotation.x = Math.PI / 2;
        selectionRing.visible = false;
        scene.add(selectionRing);

        // Kepler Solver
        function solveKepler(a, e, T, t) {
            const M = (2 * Math.PI / T) * t;
            let E = M;
            for (let i = 0; i < 10; i++) {
                E = E - (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
            }
            const x = a * (Math.cos(E) - e);
            const z = a * Math.sqrt(1 - e * e) * Math.sin(E);
            return new THREE.Vector3(x, 0, z);
        }

        // Create Planets and Orbits
        planetData.forEach(data => {
            // Mesh
            const geo = new THREE.SphereGeometry(data.r, 32, 32);
            const mat = new THREE.MeshStandardMaterial({ color: data.color });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.userData = { id: data.id, name: data.name };
            scene.add(mesh);
            meshes.push(mesh);

            // Orbit Line
            const points = [];
            const segments = 100;
            for (let i = 0; i <= segments; i++) {
                const t = (i / segments) * data.T;
                points.push(solveKepler(data.a, data.e, data.T, t));
            }
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineDashedMaterial({ color: data.color, dashSize: 1, gapSize: 0.5, transparent: true, opacity: 0.5 });
            const orbitLine = new THREE.Line(lineGeo, lineMat);
            orbitLine.computeLineDistances();
            scene.add(orbitLine);

            // Label
            const label = document.createElement('div');
            label.className = 'planet-label';
            label.textContent = data.name;
            labelsContainer.appendChild(label);

            planets[data.id] = { ...data, mesh, orbitLine, label };
        });

        // --- Soldier Model ---
        let soldier, mixer;
        const loader = new GLTFLoader();
        loader.load('https://threejs.org/examples/models/gltf/Soldier.glb', (gltf) => {
            soldier = gltf.scene;
            soldier.scale.set(0.02, 0.02, 0.02);
            scene.add(soldier);
            
            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(soldier);
                mixer.clipAction(gltf.animations[0]).play();
            }
            state.soldierLoaded = true;
        });

        // --- Difficulty System ---
        const difficulties = ['easy', 'medium', 'hard'];
        const diffSettings = {
            easy: { scale: 1.0, orbits: true, labels: true, dist: true },
            medium: { scale: 2.0, orbits: false, labels: true, dist: false },
            hard: { scale: 3.0, orbits: false, labels: false, dist: false }
        };

        const diffBtn = document.getElementById('difficulty-btn');
        diffBtn.addEventListener('click', () => {
            let idx = difficulties.indexOf(state.difficulty);
            idx = (idx + 1) % difficulties.length;
            setDifficulty(difficulties[idx]);
        });

        function setDifficulty(level) {
            state.difficulty = level;
            const settings = diffSettings[level];
            state.timeScale = settings.scale;
            state.orbitLinesVisible = settings.orbits;
            state.labelsVisible = settings.labels;
            
            diffBtn.textContent = `Difficulty: ${level.charAt(0).toUpperCase() + level.slice(1)}`;
            document.getElementById('ui-diff').textContent = level.charAt(0).toUpperCase() + level.slice(1);
            document.getElementById('ui-dist-container').style.display = settings.dist ? 'block' : 'none';

            Object.values(planets).forEach(p => {
                p.orbitLine.visible = state.orbitLinesVisible;
                p.label.style.display = state.labelsVisible ? 'block' : 'none';
            });
        }

        // --- Interactions ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (e) => {
            if (e.target.tagName !== 'CANVAS') return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(meshes);
            
            if (intersects.length > 0) {
                state.selectedPlanet = intersects[0].object.userData.id;
            } else {
                state.selectedPlanet = null;
                state.followMode = false;
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'p') state.isPaused = !state.isPaused;
            if (e.key.toLowerCase() === 'r') {
                state.simulationTime = 0;
                state.isPaused = false;
            }
            if (e.key.toLowerCase() === 'f' && state.selectedPlanet) {
                state.followMode = !state.followMode;
            }
        });

        window.addEventListener('wheel', (e) => {
            state.cameraDistance += e.deltaY * 0.1;
            state.cameraDistance = Math.max(30, Math.min(300, state.cameraDistance));
        });

        const speedSlider = document.getElementById('speed-slider');
        const speedVal = document.getElementById('speed-val');
        speedSlider.addEventListener('input', (e) => {
            state.speedMultiplier = parseFloat(e.target.value);
            speedVal.textContent = state.speedMultiplier.toFixed(1) + 'x';
        });

        // --- Quiz System ---
        const quizBtn = document.getElementById('quiz-btn');
        const quizPanel = document.getElementById('quiz-panel');
        const quizButtonsContainer = document.getElementById('quiz-buttons');

        planetData.forEach(data => {
            const btn = document.createElement('button');
            btn.textContent = data.name;
            btn.addEventListener('click', () => handleQuizAnswer(data.id));
            quizButtonsContainer.appendChild(btn);
        });

        quizBtn.addEventListener('click', () => {
            state.quizActive = true;
            state.isPaused = true;
            quizPanel.style.display = 'block';
            
            let minD = Infinity;
            Object.entries(state.planetDistances).forEach(([id, dist]) => {
                if (dist < minD) {
                    minD = dist;
                    correctAnswer = id;
                }
            });
        });

        function handleQuizAnswer(id) {
            if (id === correctAnswer) {
                state.score++;
                document.getElementById('ui-score').textContent = state.score;
                alert('Correct!');
            } else {
                alert(`Wrong! The closest planet was ${planets[correctAnswer].name}.`);
            }
            state.quizActive = false;
            state.isPaused = false;
            quizPanel.style.display = 'none';
        }

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            if (!state.isPaused) {
                state.simulationTime += dt * state.timeScale * state.speedMultiplier;
            }

            let minDistance = Infinity;
            let closest = '';

            // Update Planets
            Object.values(planets).forEach(p => {
                let pos = solveKepler(p.a, p.e, p.T, state.simulationTime);
                
                if (state.difficulty === 'hard' && !state.isPaused) {
                    pos.x += (Math.random() - 0.5);
                    pos.y += (Math.random() - 0.5);
                    pos.z += (Math.random() - 0.5);
                }

                p.mesh.position.copy(pos);
                
                const dist = pos.length();
                state.planetPositions[p.id] = { x: pos.x, y: pos.y, z: pos.z };
                state.planetDistances[p.id] = dist;

                if (dist < minDistance) {
                    minDistance = dist;
                    closest = p.id;
                }

                if (p.id === 'earth') {
                    state.earthAngle = Math.atan2(pos.z, pos.x);
                }

                // Update Labels
                if (state.labelsVisible) {
                    const screenPos = pos.clone().project(camera);
                    if (screenPos.z < 1) {
                        p.label.style.display = 'block';
                        p.label.style.left = (screenPos.x * 0.5 + 0.5) * window.innerWidth + 'px';
                        p.label.style.top = (-(screenPos.y * 0.5) + 0.5) * window.innerHeight + 'px';
                    } else {
                        p.label.style.display = 'none';
                    }
                }
            });

            state.closestPlanet = closest;

            // Update Soldier
            if (soldier && state.soldierLoaded) {
                const earthPos = planets['earth'].mesh.position;
                soldier.position.set(earthPos.x, earthPos.y + planets['earth'].r, earthPos.z);
                soldier.lookAt(0, soldier.position.y, 0);
                if (mixer && !state.isPaused) mixer.update(dt);
            }

            // Update Selection Ring
            if (state.selectedPlanet) {
                selectionRing.visible = true;
                const p = planets[state.selectedPlanet];
                selectionRing.position.copy(p.mesh.position);
                selectionRing.scale.setScalar(p.r);
            } else {
                selectionRing.visible = false;
            }

            // Update Camera
            if (state.followMode && state.selectedPlanet) {
                const target = planets[state.selectedPlanet].mesh.position;
                const offset = new THREE.Vector3(0, 10, 20).normalize().multiplyScalar(state.cameraDistance * 0.3);
                camera.position.copy(target).add(offset);
                camera.lookAt(target);
            } else {
                camera.position.copy(initialCamDir).multiplyScalar(state.cameraDistance);
                camera.lookAt(0, 0, 0);
            }

            // Update UI
            document.getElementById('ui-time').textContent = state.simulationTime.toFixed(1);
            document.getElementById('ui-selected').textContent = state.selectedPlanet ? planets[state.selectedPlanet].name : 'None';
            if (state.selectedPlanet && state.difficulty === 'easy') {
                document.getElementById('ui-dist').textContent = state.planetDistances[state.selectedPlanet].toFixed(2);
            } else {
                document.getElementById('ui-dist').textContent = '-';
            }

            renderer.render(scene, camera);
        }

        // Initialize
        setDifficulty('easy');
        animate();

    </script>
</body>
</html>
