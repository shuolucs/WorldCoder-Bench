<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caffeine Molecule - CSS3DRenderer</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  overflow: hidden; 
  background: #0a0a1a; 
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: #fff;
}
#container { width: 100vw; height: 100vh; position: relative; }

#controls {
  position: absolute;
  top: 15px;
  left: 15px;
  background: rgba(10, 10, 30, 0.85);
  border: 1px solid rgba(100, 180, 255, 0.3);
  border-radius: 12px;
  padding: 15px 20px;
  z-index: 100;
  backdrop-filter: blur(10px);
}
#controls h2 {
  font-size: 18px;
  margin-bottom: 8px;
  color: #7ec8ff;
  text-shadow: 0 0 10px rgba(126, 200, 255, 0.5);
}
#controls .formula {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 12px;
}
#controls label {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-size: 14px;
}
#controls input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: #7ec8ff;
}

#infoPanel {
  position: absolute;
  top: 15px;
  right: 15px;
  background: rgba(10, 10, 30, 0.9);
  border: 1px solid rgba(100, 180, 255, 0.3);
  border-radius: 12px;
  padding: 20px;
  z-index: 100;
  min-width: 220px;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}
#infoPanel.hidden { opacity: 0.5; }
#infoPanel h3 {
  font-size: 16px;
  color: #7ec8ff;
  margin-bottom: 10px;
  text-shadow: 0 0 10px rgba(126, 200, 255, 0.5);
}
#infoPanel .info-row {
  display: flex;
  justify-content: space-between;
  padding: 5px 0;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  font-size: 13px;
}
#infoPanel .info-row .label { color: #888; }
#infoPanel .info-row .value { color: #ddd; font-weight: bold; }

.atom-sprite {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 14px;
  cursor: pointer;
  transition: box-shadow 0.3s, transform 0.3s;
  user-select: none;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  border: 2px solid rgba(255,255,255,0.2);
}
.atom-sprite:hover {
  transform: scale(1.15);
  z-index: 10;
}
.atom-sprite.selected {
  box-shadow: 0 0 20px 8px rgba(255, 255, 100, 0.8) !important;
  border-color: #ffff66 !important;
  transform: scale(1.2);
}

.atom-C {
  background: radial-gradient(circle at 35% 35%, #666, #333);
  color: #fff;
  box-shadow: 0 0 10px rgba(100,100,100,0.5);
}
.atom-N {
  background: radial-gradient(circle at 35% 35%, #5577ff, #2244aa);
  color: #fff;
  box-shadow: 0 0 10px rgba(50,80,255,0.5);
}
.atom-O {
  background: radial-gradient(circle at 35% 35%, #ff4444, #aa1111);
  color: #fff;
  box-shadow: 0 0 10px rgba(255,50,50,0.5);
}
.atom-H {
  background: radial-gradient(circle at 35% 35%, #eee, #aaa);
  color: #333;
  width: 36px;
  height: 36px;
  font-size: 12px;
  box-shadow: 0 0 8px rgba(200,200,200,0.4);
}

.bond-object {
  background: linear-gradient(to right, rgba(150,150,150,0.6), rgba(200,200,200,0.8), rgba(150,150,150,0.6));
  border-radius: 2px;
}
.bond-double {
  background: repeating-linear-gradient(
    to bottom,
    rgba(180,180,180,0.8) 0px,
    rgba(180,180,180,0.8) 3px,
    transparent 3px,
    transparent 5px,
    rgba(180,180,180,0.8) 5px,
    rgba(180,180,180,0.8) 8px
  );
}
</style>
</head>
<body>
<div id="container"></div>

<div id="controls">
  <h2>☕ Caffeine Molecule</h2>
  <div class="formula">C₈H₁₀N₄O₂ — 24 atoms</div>
  <label>
    <input type="checkbox" id="autoRotate" checked>
    Auto Rotate
  </label>
</div>

<div id="infoPanel" class="hidden">
  <h3>Atom Info</h3>
  <div class="info-row"><span class="label">Label:</span><span class="value" id="infoLabel">—</span></div>
  <div class="info-row"><span class="label">Element:</span><span class="value" id="infoElement">—</span></div>
  <div class="info-row"><span class="label">Atomic #:</span><span class="value" id="infoAtomicNum">—</span></div>
  <div class="info-row"><span class="label">Mass:</span><span class="value" id="infoMass">—</span></div>
  <div class="info-row"><span class="label">Role:</span><span class="value" id="infoRole">—</span></div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS3DRenderer, CSS3DObject, CSS3DSprite } from 'three/addons/renderers/CSS3DRenderer.js';

// ============================================================
// Caffeine (C8H10N4O2) atom data
// Using approximate 3D coordinates based on caffeine's molecular geometry
// Caffeine is a mostly planar purine derivative
// ============================================================

const SCALE = 80; // scale factor for coordinates

// Element info
const elementInfo = {
  C: { name: 'Carbon', atomicNum: 6, mass: '12.011 u', color: '#555' },
  N: { name: 'Nitrogen', atomicNum: 7, mass: '14.007 u', color: '#3355cc' },
  O: { name: 'Oxygen', atomicNum: 8, mass: '15.999 u', color: '#cc2222' },
  H: { name: 'Hydrogen', atomicNum: 1, mass: '1.008 u', color: '#cccccc' }
};

// Caffeine structure: purine ring system with methyl groups
// Atom positions (approximate 3D, mostly planar with slight z offsets for 3D effect)
// Numbering: C1-C8, N1-N4, O1-O2, H1-H10
const atoms = [
  // Pyrimidine ring atoms
  { label: 'N1', element: 'N', x: -1.2, y: 0.7, z: 0.0, role: 'Imidazole ring nitrogen' },
  { label: 'C2', element: 'C', x: -1.2, y: 2.1, z: 0.05, role: 'Carbonyl carbon (C=O)' },
  { label: 'N3', element: 'N', x: 0.0, y: 2.9, z: 0.0, role: 'Pyrimidine ring nitrogen (N-CH3)' },
  { label: 'C4', element: 'C', x: 1.2, y: 2.1, z: -0.05, role: 'Bridge carbon (ring junction)' },
  { label: 'C5', element: 'C', x: 1.2, y: 0.7, z: -0.05, role: 'Bridge carbon (ring junction)' },
  { label: 'C6', element: 'C', x: 0.0, y: -0.1, z: 0.0, role: 'Carbonyl carbon (C=O)' },

  // Imidazole ring atoms (fused)
  { label: 'N7', element: 'N', x: 2.3, y: 0.2, z: -0.1, role: 'Imidazole nitrogen (N-CH3)' },
  { label: 'C8', element: 'C', x: 2.8, y: 1.4, z: -0.15, role: 'Imidazole C-H carbon' },
  { label: 'N9', element: 'N', x: 2.1, y: 2.5, z: -0.1, role: 'Imidazole ring nitrogen' },

  // Oxygen atoms (double bonded)
  { label: 'O1', element: 'O', x: -2.3, y: 2.7, z: 0.1, role: 'Carbonyl oxygen (C2=O)' },
  { label: 'O2', element: 'O', x: 0.0, y: -1.4, z: 0.05, role: 'Carbonyl oxygen (C6=O)' },

  // Methyl group on N1 (CH3)
  { label: 'C1m', element: 'C', x: -2.5, y: 0.0, z: 0.1, role: 'Methyl carbon on N1' },
  { label: 'H1', element: 'H', x: -3.3, y: 0.6, z: 0.5, role: 'Methyl hydrogen on N1' },
  { label: 'H2', element: 'H', x: -2.4, y: -1.0, z: 0.5, role: 'Methyl hydrogen on N1' },
  { label: 'H3', element: 'H', x: -2.9, y: -0.2, z: -0.7, role: 'Methyl hydrogen on N1' },

  // Methyl group on N3 (CH3)
  { label: 'C3m', element: 'C', x: 0.0, y: 4.3, z: 0.05, role: 'Methyl carbon on N3' },
  { label: 'H4', element: 'H', x: -0.9, y: 4.8, z: 0.4, role: 'Methyl hydrogen on N3' },
  { label: 'H5', element: 'H', x: 0.9, y: 4.8, z: 0.4, role: 'Methyl hydrogen on N3' },
  { label: 'H6', element: 'H', x: 0.0, y: 4.6, z: -0.8, role: 'Methyl hydrogen on N3' },

  // Methyl group on N7 (CH3)
  { label: 'C7m', element: 'C', x: 3.0, y: -0.9, z: -0.15, role: 'Methyl carbon on N7' },
  { label: 'H7', element: 'H', x: 3.9, y: -0.6, z: 0.3, role: 'Methyl hydrogen on N7' },
  { label: 'H8', element: 'H', x: 2.6, y: -1.7, z: 0.4, role: 'Methyl hydrogen on N7' },
  { label: 'H9', element: 'H', x: 3.2, y: -1.2, z: -1.0, role: 'Methyl hydrogen on N7' },

  // H on C8
  { label: 'H10', element: 'H', x: 3.8, y: 1.5, z: -0.2, role: 'Hydrogen on imidazole C8' }
];

// Bonds: [atomIndex1, atomIndex2, order]
// order: 1 = single, 2 = double
// Expected bond count: 25 bonds
const bonds = [
  // Pyrimidine ring
  [0, 1, 1],   // N1-C2
  [1, 2, 1],   // C2-N3
  [2, 3, 1],   // N3-C4
  [3, 4, 2],   // C4-C5 (double)
  [4, 5, 1],   // C5-C6
  [5, 0, 1],   // C6-N1

  // Imidazole ring (fused with pyrimidine via C4-C5)
  [4, 6, 1],   // C5-N7
  [6, 7, 1],   // N7-C8
  [7, 8, 2],   // C8-N9 (double)
  [8, 3, 1],   // N9-C4

  // Carbonyl oxygens
  [1, 9, 2],   // C2=O1
  [5, 10, 2],  // C6=O2

  // Methyl on N1
  [0, 11, 1],  // N1-C1m
  [11, 12, 1], // C1m-H1
  [11, 13, 1], // C1m-H2
  [11, 14, 1], // C1m-H3

  // Methyl on N3
  [2, 15, 1],  // N3-C3m
  [15, 16, 1], // C3m-H4
  [15, 17, 1], // C3m-H5
  [15, 18, 1], // C3m-H6

  // Methyl on N7
  [6, 19, 1],  // N7-C7m
  [19, 20, 1], // C7m-H7
  [19, 21, 1], // C7m-H8
  [19, 22, 1], // C7m-H9

  // H on C8
  [7, 23, 1]   // C8-H10
];

// bondCount = 25

// ============================================================
// State
// ============================================================
window.__3D_STATE__ = {
  atomCount: 24,
  bondCount: bonds.length, // 25
  selectedAtom: null,
  autoRotate: true,
  moleculeName: 'caffeine'
};

// ============================================================
// Scene setup
// ============================================================
const container = document.getElementById('container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 5000);
camera.position.set(0, 100, 500);

const renderer = new CSS3DRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.5;
controls.minDistance = 200;
controls.maxDistance = 1200;

// ============================================================
// Molecule group
// ============================================================
const moleculeGroup = new THREE.Group();
scene.add(moleculeGroup);

// Store sprite references
const atomSprites = [];
const atomElements = [];
let selectedSpriteIndex = -1;

// ============================================================
// Create atoms as CSS3DSprite
// ============================================================
atoms.forEach((atom, i) => {
  const div = document.createElement('div');
  div.className = `atom-sprite atom-${atom.element}`;
  div.textContent = atom.label;
  div.dataset.index = i;
  div.dataset.label = atom.label;

  const sprite = new CSS3DSprite(div);
  sprite.position.set(atom.x * SCALE, atom.y * SCALE, atom.z * SCALE);

  // Scale down sprites
  const s = atom.element === 'H' ? 0.5 : 0.6;
  sprite.scale.set(s, s, s);

  moleculeGroup.add(sprite);
  atomSprites.push(sprite);
  atomElements.push(div);

  // Click handler
  div.addEventListener('click', (e) => {
    e.stopPropagation();
    selectAtom(atom.label);
  });
});

// ============================================================
// Create bonds as CSS3DObject (thin rectangular divs)
// ============================================================
const bondObjects = [];

bonds.forEach(([i1, i2, order]) => {
  const a1 = atoms[i1];
  const a2 = atoms[i2];

  const p1 = new THREE.Vector3(a1.x * SCALE, a1.y * SCALE, a1.z * SCALE);
  const p2 = new THREE.Vector3(a2.x * SCALE, a2.y * SCALE, a2.z * SCALE);

  const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
  const dir = new THREE.Vector3().subVectors(p2, p1);
  const length = dir.length();

  // Create bond div
  const bondDiv = document.createElement('div');
  bondDiv.className = order === 2 ? 'bond-object bond-double' : 'bond-object';
  bondDiv.style.width = length + 'px';
  bondDiv.style.height = (order === 2 ? '6px' : '4px');
  bondDiv.style.pointerEvents = 'none';

  const bondObj = new CSS3DObject(bondDiv);
  bondObj.position.copy(mid);

  // Orient the bond to point from p1 to p2
  // We need to rotate the bond div so it aligns with the direction vector
  // The bond div extends along its local X axis by default (width direction)
  // We need to make the local X axis point along dir

  dir.normalize();

  // Create a quaternion that rotates (1,0,0) to dir
  const quaternion = new THREE.Quaternion();
  const defaultDir = new THREE.Vector3(1, 0, 0);
  quaternion.setFromUnitVectors(defaultDir, dir);
  bondObj.quaternion.copy(quaternion);

  moleculeGroup.add(bondObj);
  bondObjects.push(bondObj);
});

// ============================================================
// Center the molecule
// ============================================================
{
  const box = new THREE.Box3();
  atoms.forEach(a => {
    box.expandByPoint(new THREE.Vector3(a.x * SCALE, a.y * SCALE, a.z * SCALE));
  });
  const center = new THREE.Vector3();
  box.getCenter(center);
  moleculeGroup.position.sub(center);
  controls.target.set(0, 0, 0);
}

// ============================================================
// Selection logic
// ============================================================
function selectAtom(label) {
  // Clear previous selection
  if (selectedSpriteIndex >= 0) {
    atomElements[selectedSpriteIndex].classList.remove('selected');
  }

  if (!label || label === '') {
    selectedSpriteIndex = -1;
    window.__3D_STATE__.selectedAtom = null;
    document.getElementById('infoPanel').classList.add('hidden');
    document.getElementById('infoLabel').textContent = '—';
    document.getElementById('infoElement').textContent = '—';
    document.getElementById('infoAtomicNum').textContent = '—';
    document.getElementById('infoMass').textContent = '—';
    document.getElementById('infoRole').textContent = '—';
    return;
  }

  const idx = atoms.findIndex(a => a.label === label);
  if (idx < 0) return;

  selectedSpriteIndex = idx;
  atomElements[idx].classList.add('selected');

  const atom = atoms[idx];
  const info = elementInfo[atom.element];

  window.__3D_STATE__.selectedAtom = label;

  document.getElementById('infoPanel').classList.remove('hidden');
  document.getElementById('infoLabel').textContent = atom.label;
  document.getElementById('infoElement').textContent = info.name + ' (' + atom.element + ')';
  document.getElementById('infoAtomicNum').textContent = info.atomicNum;
  document.getElementById('infoMass').textContent = info.mass;
  document.getElementById('infoRole').textContent = atom.role;
}

// ============================================================
// ICG helper
// ============================================================
window.__ICG_selectAtom__ = function(label) {
  if (!label || label === '') {
    selectAtom(null);
  } else {
    selectAtom(label);
  }
};

// ============================================================
// Auto-rotate checkbox
// ============================================================
const autoRotateCheckbox = document.getElementById('autoRotate');
autoRotateCheckbox.addEventListener('change', () => {
  controls.autoRotate = autoRotateCheckbox.checked;
  window.__3D_STATE__.autoRotate = autoRotateCheckbox.checked;
});

// ============================================================
// Click on background to deselect
// ============================================================
renderer.domElement.addEventListener('click', (e) => {
  // Only deselect if clicking on the background (not on an atom)
  if (e.target === renderer.domElement || e.target.tagName === 'DIV' && !e.target.classList.contains('atom-sprite')) {
    // Check if the click target is not an atom
    let target = e.target;
    let isAtom = false;
    while (target && target !== renderer.domElement) {
      if (target.classList && target.classList.contains('atom-sprite')) {
        isAtom = true;
        break;
      }
      target = target.parentElement;
    }
    if (!isAtom) {
      selectAtom(null);
    }
  }
});

// ============================================================
// Animation loop
// ============================================================
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ============================================================
// Resize handler
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
