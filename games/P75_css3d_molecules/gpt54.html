<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js CSS3DRenderer - 咖啡因分子</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, #1d2636 0%, #101722 45%, #0a0f18 100%);
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #scene {
      width: 100%;
      height: 100%;
    }

    .atom {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      color: #fff;
      box-sizing: border-box;
      border: 2px solid rgba(255,255,255,0.85);
      box-shadow:
        0 0 14px rgba(255,255,255,0.18),
        inset 0 0 10px rgba(255,255,255,0.18);
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      backdrop-filter: blur(2px);
    }

    .atom:hover {
      transform: scale(1.08);
      filter: brightness(1.08);
    }

    .atom.selected {
      box-shadow:
        0 0 22px rgba(255, 225, 95, 0.95),
        0 0 40px rgba(255, 225, 95, 0.45),
        inset 0 0 14px rgba(255,255,255,0.30);
      border-color: #ffe15f;
      transform: scale(1.12);
      z-index: 10;
    }

    .atom.C { background: radial-gradient(circle at 30% 30%, #7b8798, #313844); }
    .atom.H { background: radial-gradient(circle at 30% 30%, #ffffff, #cfd6df); color: #1b2230; }
    .atom.N { background: radial-gradient(circle at 30% 30%, #5c8cff, #2346a0); }
    .atom.O { background: radial-gradient(circle at 30% 30%, #ff8f8f, #b32e2e); }

    .bond {
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, #c8ced8, #eef3fa, #c8ced8);
      box-shadow: 0 0 10px rgba(255,255,255,0.18);
      transform-origin: 0 50%;
      pointer-events: none;
      opacity: 0.95;
    }

    .bond.double {
      height: 12px;
      background:
        linear-gradient(180deg,
          #d8dee7 0px, #d8dee7 3px,
          transparent 3px, transparent 5px,
          #d8dee7 5px, #d8dee7 8px,
          transparent 8px, transparent 12px);
      border-radius: 0;
      box-shadow: none;
    }

    .bond.triple {
      height: 14px;
      background:
        linear-gradient(180deg,
          #d8dee7 0px, #d8dee7 2px,
          transparent 2px, transparent 4px,
          #d8dee7 4px, #d8dee7 6px,
          transparent 6px, transparent 8px,
          #d8dee7 8px, #d8dee7 10px,
          transparent 10px, transparent 14px);
      border-radius: 0;
      box-shadow: none;
    }

    #panel {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 290px;
      padding: 14px 16px;
      box-sizing: border-box;
      border-radius: 14px;
      background: rgba(10, 16, 28, 0.72);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
      backdrop-filter: blur(10px);
      z-index: 20;
    }

    #panel h2 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
    }

    #panel .sub {
      font-size: 13px;
      color: #bfd0eb;
      margin-bottom: 12px;
    }

    #info {
      font-size: 14px;
      line-height: 1.7;
      color: #edf3ff;
      min-height: 110px;
    }

    #controlsUI {
      position: absolute;
      left: 16px;
      top: 16px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(10, 16, 28, 0.72);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(10px);
      z-index: 20;
      font-size: 14px;
    }

    #controlsUI label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    #legend {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(2, auto);
      gap: 6px 12px;
      font-size: 12px;
      color: #d7e2f2;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
      border: 1px solid rgba(255,255,255,0.65);
    }

    .hint {
      position: absolute;
      left: 16px;
      bottom: 16px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(10, 16, 28, 0.62);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 12px;
      color: #d2ddef;
      z-index: 20;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="scene"></div>

    <div id="controlsUI">
      <label>
        <input type="checkbox" id="autoRotate" checked />
        自动旋转
      </label>
      <div id="legend">
        <div><span class="dot" style="background:#4a5563"></span>C 碳</div>
        <div><span class="dot" style="background:#ffffff"></span>H 氢</div>
        <div><span class="dot" style="background:#355fd2"></span>N 氮</div>
        <div><span class="dot" style="background:#cc4343"></span>O 氧</div>
      </div>
    </div>

    <div id="panel">
      <h2>咖啡因 C<sub>8</sub>H<sub>10</sub>N<sub>4</sub>O<sub>2</sub></h2>
      <div class="sub">CSS3DSprite 原子 / CSS3DObject 化学键</div>
      <div id="info">点击任一原子查看信息。</div>
    </div>

    <div class="hint">拖拽旋转，滚轮缩放，点击原子高亮。</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS3DRenderer, CSS3DObject, CSS3DSprite } from 'three/addons/renderers/CSS3DRenderer.js';

    const container = document.getElementById('scene');
    const info = document.getElementById('info');
    const autoRotateCheckbox = document.getElementById('autoRotate');

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      1,
      5000
    );
    camera.position.set(0, 0, 700);

    const renderer = new CSS3DRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.2;
    controls.minDistance = 250;
    controls.maxDistance = 1400;

    const molecule = new THREE.Group();
    scene.add(molecule);

    const atomData = [
      { label: 'N1', element: 'N', name: '氮', index: 1, x: -110, y: 30, z: 0 },
      { label: 'C1', element: 'C', name: '碳', index: 1, x: -40, y: 95, z: 0 },
      { label: 'N2', element: 'N', name: '氮', index: 2, x: 55, y: 90, z: 0 },
      { label: 'C2', element: 'C', name: '碳', index: 2, x: 120, y: 20, z: 0 },
      { label: 'N3', element: 'N', name: '氮', index: 3, x: 80, y: -70, z: 0 },
      { label: 'C3', element: 'C', name: '碳', index: 3, x: -10, y: -95, z: 0 },
      { label: 'N4', element: 'N', name: '氮', index: 4, x: -95, y: -50, z: 0 },
      { label: 'C4', element: 'C', name: '碳', index: 4, x: -10, y: 15, z: 0 },
      { label: 'C5', element: 'C', name: '碳', index: 5, x: 10, y: 180, z: 0 },
      { label: 'O1', element: 'O', name: '氧', index: 1, x: 175, y: 25, z: 0 },
      { label: 'O2', element: 'O', name: '氧', index: 2, x: -25, y: -175, z: 0 },
      { label: 'C6', element: 'C', name: '碳', index: 6, x: 165, y: -130, z: 0 },
      { label: 'C7', element: 'C', name: '碳', index: 7, x: -190, y: 115, z: 0 },
      { label: 'C8', element: 'C', name: '碳', index: 8, x: -190, y: -125, z: 0 },

      { label: 'H1', element: 'H', name: '氢', index: 1, x: -10, y: 250, z: 0 },
      { label: 'H2', element: 'H', name: '氢', index: 2, x: 75, y: 195, z: 0 },
      { label: 'H3', element: 'H', name: '氢', index: 3, x: -65, y: 195, z: 0 },

      { label: 'H4', element: 'H', name: '氢', index: 4, x: 235, y: -130, z: 0 },
      { label: 'H5', element: 'H', name: '氢', index: 5, x: 145, y: -200, z: 0 },
      { label: 'H6', element: 'H', name: '氢', index: 6, x: 145, y: -60, z: 0 },

      { label: 'H7', element: 'H', name: '氢', index: 7, x: -255, y: 65, z: 0 },
      { label: 'H8', element: 'H', name: '氢', index: 8, x: -145, y: 55, z: 0 },
      { label: 'H9', element: 'H', name: '氢', index: 9, x: -245, y: 175, z: 0 },

      { label: 'H10', element: 'H', name: '氢', index: 10, x: -255, y: -175, z: 0 }
    ];

    // 期望键对象数量 bondCount = 25
    // 含部分双键，以接近咖啡因的共轭杂环与羰基结构
    const bondData = [
      ['N1', 'C1', 1],
      ['C1', 'N2', 1],
      ['N2', 'C2', 1],
      ['C2', 'N3', 1],
      ['N3', 'C3', 1],
      ['C3', 'N4', 1],
      ['N4', 'N1', 1],

      ['N1', 'C4', 1],
      ['C4', 'C1', 1],
      ['C4', 'C3', 1],
      ['C4', 'C2', 1],

      ['C1', 'C5', 1],
      ['C2', 'O1', 2],
      ['C3', 'O2', 2],
      ['N3', 'C6', 1],
      ['N1', 'C7', 1],
      ['N4', 'C8', 1],

      ['C5', 'H1', 1],
      ['C5', 'H2', 1],
      ['C5', 'H3', 1],

      ['C6', 'H4', 1],
      ['C6', 'H5', 1],
      ['C6', 'H6', 1],

      ['C7', 'H7', 1],
      ['C7', 'H8', 1],
      ['C7', 'H9', 1],

      ['C8', 'H10', 1]
    ];

    const atomMap = new Map();
    const atomObjects = new Map();
    const bondObjects = [];

    function createAtom(atom) {
      const el = document.createElement('div');
      el.className = `atom ${atom.element}`;
      el.textContent = atom.label;
      el.dataset.label = atom.label;
      el.title = `${atom.label} (${atom.element})`;

      const sprite = new CSS3DSprite(el);
      sprite.position.set(atom.x, atom.y, atom.z);
      sprite.userData = { ...atom, type: 'atom' };

      el.addEventListener('click', (e) => {
        e.stopPropagation();
        selectAtom(atom.label);
      });

      atomMap.set(atom.label, atom);
      atomObjects.set(atom.label, sprite);
      molecule.add(sprite);
    }

    function createBond(aLabel, bLabel, order = 1) {
      const a = atomMap.get(aLabel);
      const b = atomMap.get(bLabel);
      if (!a || !b) return;

      const el = document.createElement('div');
      el.className = 'bond' + (order === 2 ? ' double' : order === 3 ? ' triple' : '');

      const bond = new CSS3DObject(el);
      bond.userData = {
        type: 'bond',
        from: aLabel,
        to: bLabel,
        order
      };

      const aVec = new THREE.Vector3(a.x, a.y, a.z);
      const bVec = new THREE.Vector3(b.x, b.y, b.z);
      const mid = new THREE.Vector3().addVectors(aVec, bVec).multiplyScalar(0.5);
      const delta = new THREE.Vector3().subVectors(bVec, aVec);
      const length = delta.length();
      const angle = Math.atan2(delta.y, delta.x);

      el.style.width = `${length}px`;
      bond.position.copy(mid);
      bond.rotation.z = angle;

      molecule.add(bond);
      bondObjects.push(bond);
    }

    atomData.forEach(createAtom);
    bondData.forEach(([a, b, order]) => createBond(a, b, order));

    function elementFullName(symbol) {
      return {
        C: '碳 Carbon',
        H: '氢 Hydrogen',
        N: '氮 Nitrogen',
        O: '氧 Oxygen'
      }[symbol] || symbol;
    }

    function atomRole(label, element) {
      if (element === 'O') return '羰基氧原子';
      if (label === 'N1' || label === 'N3' || label === 'N4') return '甲基取代相关氮原子';
      if (label === 'N2') return '杂环氮原子';
      if (label === 'C5' || label === 'C6' || label === 'C7') return '甲基碳原子';
      if (label === 'C2' || label === 'C3') return '羰基邻近环碳原子';
      if (element === 'H') return '氢原子';
      return '杂环骨架原子';
    }

    function clearSelectionStyles() {
      for (const obj of atomObjects.values()) {
        obj.element.classList.remove('selected');
      }
    }

    function updateInfoPanel(atom) {
      if (!atom) {
        info.innerHTML = `
          <div><strong>当前选择：</strong>无</div>
          <div><strong>分子名称：</strong>咖啡因 / caffeine</div>
          <div><strong>原子总数：</strong>24</div>
          <div><strong>说明：</strong>点击任一原子可查看其标签、元素与结构角色。</div>
        `;
        return;
      }

      info.innerHTML = `
        <div><strong>当前选择：</strong>${atom.label}</div>
        <div><strong>元素：</strong>${elementFullName(atom.element)}</div>
        <div><strong>序号：</strong>${atom.index}</div>
        <div><strong>标签：</strong>${atom.label}</div>
        <div><strong>结构角色：</strong>${atomRole(atom.label, atom.element)}</div>
        <div><strong>坐标：</strong>${atom.x}, ${atom.y}, ${atom.z}</div>
      `;
    }

    function selectAtom(label) {
      if (!label) {
        clearSelectionStyles();
        window.__3D_STATE__.selectedAtom = null;
        updateInfoPanel(null);
        return;
      }

      const atom = atomMap.get(label);
      if (!atom) {
        clearSelectionStyles();
        window.__3D_STATE__.selectedAtom = null;
        updateInfoPanel(null);
        return;
      }

      clearSelectionStyles();
      const obj = atomObjects.get(label);
      if (obj) obj.element.classList.add('selected');

      window.__3D_STATE__.selectedAtom = label;
      updateInfoPanel(atom);
    }

    document.addEventListener('click', (e) => {
      const atomEl = e.target.closest('.atom');
      if (!atomEl) {
        selectAtom(null);
      }
    });

    autoRotateCheckbox.addEventListener('change', () => {
      controls.autoRotate = autoRotateCheckbox.checked;
      window.__3D_STATE__.autoRotate = autoRotateCheckbox.checked;
    });

    window.__3D_STATE__ = {
      atomCount: 24,
      bondCount: bondObjects.length,
      selectedAtom: null,
      autoRotate: true,
      moleculeName: 'caffeine'
    };

    window.__ICG_selectAtom__ = function(label) {
      if (label === null || label === '') {
        selectAtom(null);
      } else {
        selectAtom(label);
      }
    };

    updateInfoPanel(null);

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
