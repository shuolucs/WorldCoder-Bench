<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caffeine Molecule - CSS3DRenderer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        /* Atom Styles */
        .atom {
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            font-weight: bold;
            box-shadow: inset -3px -3px 10px rgba(0,0,0,0.5), 0 2px 5px rgba(0,0,0,0.5);
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
        }
        .atom:hover {
            transform: scale(1.1);
        }
        .atom.selected {
            border-color: #fff;
            box-shadow: 0 0 15px 5px rgba(255, 255, 0, 0.8), inset -3px -3px 10px rgba(0,0,0,0.5);
        }
        
        /* Element Specific Styles */
        .atom.C { width: 40px; height: 40px; background-color: #555; color: #ddd; font-size: 16px; }
        .atom.H { width: 24px; height: 24px; background-color: #eee; color: #333; font-size: 12px; }
        .atom.N { width: 38px; height: 38px; background-color: #2196F3; color: #fff; font-size: 15px; }
        .atom.O { width: 40px; height: 40px; background-color: #F44336; color: #fff; font-size: 16px; }

        /* Bond Styles */
        .bond {
            width: 6px;
            background: linear-gradient(90deg, #777, #aaa, #777);
            transform-style: preserve-3d;
            border-radius: 3px;
        }
        /* Cross plane to make bond visible from all angles */
        .bond::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, #777, #aaa, #777);
            transform: rotateY(90deg);
            border-radius: 3px;
        }

        /* UI Panels */
        #info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(30, 30, 30, 0.85);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #444;
            min-width: 200px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            display: none;
        }
        #info-panel.visible {
            display: block;
        }
        #info-panel h2 {
            margin: 0 0 10px 0;
            font-size: 20px;
            color: #4CAF50;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        .info-row {
            margin: 8px 0;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
        .info-label { color: #aaa; }
        .info-value { font-weight: bold; }

        #controls-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(30, 30, 30, 0.85);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #444;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(5px);
        }
        #controls-panel label {
            cursor: pointer;
            font-size: 14px;
        }
        
        #title {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }
    </style>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="container"></div>
    
    <div id="title">Caffeine (C₈H₁₀N₄O₂)</div>

    <div id="info-panel">
        <h2 id="info-title">Atom Info</h2>
        <div class="info-row">
            <span class="info-label">Label:</span>
            <span class="info-value" id="info-label-val">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Element:</span>
            <span class="info-value" id="info-element-val">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Type:</span>
            <span class="info-value" id="info-type-val">-</span>
        </div>
    </div>

    <div id="controls-panel">
        <input type="checkbox" id="autoRotate" checked>
        <label for="autoRotate">Auto Rotate</label>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS3DRenderer, CSS3DObject, CSS3DSprite } from 'three/addons/renderers/CSS3DRenderer.js';

        // --- State Initialization ---
        window.__3D_STATE__ = {
            atomCount: 24,
            bondCount: 25,
            selectedAtom: null,
            autoRotate: true,
            moleculeName: "caffeine"
        };

        // --- Molecule Data ---
        const atomsData = [
            { label: 'N1', el: 'N', pos: [-99, 36, 0], name: 'Nitrogen' },
            { label: 'C2', el: 'C', pos: [-99, -42, 0], name: 'Carbon' },
            { label: 'N3', el: 'N', pos: [-27, -84, 0], name: 'Nitrogen' },
            { label: 'C4', el: 'C', pos: [45, -42, 0], name: 'Carbon' },
            { label: 'C5', el: 'C', pos: [45, 42, 0], name: 'Carbon' },
            { label: 'C6', el: 'C', pos: [-27, 84, 0], name: 'Carbon' },
            { label: 'N7', el: 'N', pos: [117, 66, 0], name: 'Nitrogen' },
            { label: 'C8', el: 'C', pos: [159, 0, 0], name: 'Carbon' },
            { label: 'N9', el: 'N', pos: [117, -60, 0], name: 'Nitrogen' },
            { label: 'O11', el: 'O', pos: [-165, -78, 0], name: 'Oxygen' },
            { label: 'O12', el: 'O', pos: [-27, 156, 0], name: 'Oxygen' },
            { label: 'C10', el: 'C', pos: [-171, 84, 0], name: 'Carbon (Methyl)' },
            { label: 'C13', el: 'C', pos: [-33, -168, 0], name: 'Carbon (Methyl)' },
            { label: 'C14', el: 'C', pos: [153, 144, 0], name: 'Carbon (Methyl)' },
            { label: 'H8', el: 'H', pos: [225, -6, 0], name: 'Hydrogen' },
            { label: 'H10a', el: 'H', pos: [-225, 48, 0], name: 'Hydrogen' },
            { label: 'H10b', el: 'H', pos: [-171, 120, 48], name: 'Hydrogen' },
            { label: 'H10c', el: 'H', pos: [-171, 120, -48], name: 'Hydrogen' },
            { label: 'H13a', el: 'H', pos: [21, -192, 0], name: 'Hydrogen' },
            { label: 'H13b', el: 'H', pos: [-63, -192, 48], name: 'Hydrogen' },
            { label: 'H13c', el: 'H', pos: [-63, -192, -48], name: 'Hydrogen' },
            { label: 'H14a', el: 'H', pos: [117, 192, 0], name: 'Hydrogen' },
            { label: 'H14b', el: 'H', pos: [189, 144, 48], name: 'Hydrogen' },
            { label: 'H14c', el: 'H', pos: [189, 144, -48], name: 'Hydrogen' }
        ];

        const bondsData = [
            ['N1', 'C2'], ['C2', 'N3'], ['N3', 'C4'], ['C4', 'C5'], ['C5', 'C6'], ['C6', 'N1'], // Ring 1
            ['C4', 'N9'], ['N9', 'C8'], ['C8', 'N7'], ['N7', 'C5'], // Ring 2
            ['C2', 'O11'], ['C6', 'O12'], // Oxygens
            ['N1', 'C10'], ['N3', 'C13'], ['N7', 'C14'], // Methyls
            ['C8', 'H8'], // H on C8
            ['C10', 'H10a'], ['C10', 'H10b'], ['C10', 'H10c'], // H on C10
            ['C13', 'H13a'], ['C13', 'H13b'], ['C13', 'H13c'], // H on C13
            ['C14', 'H14a'], ['C14', 'H14b'], ['C14', 'H14c']  // H on C14
        ];

        // --- Scene Setup ---
        const container = document.getElementById('container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
        camera.position.set(0, 0, 600);

        const renderer = new CSS3DRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = window.__3D_STATE__.autoRotate;
        controls.autoRotateSpeed = 2.0;

        const atomObjects = {};
        const moleculeGroup = new THREE.Group();
        scene.add(moleculeGroup);

        // --- Build Molecule ---
        // 1. Atoms
        atomsData.forEach(data => {
            const element = document.createElement('div');
            element.className = `atom ${data.el}`;
            element.textContent = data.el; // Display element symbol
            
            element.addEventListener('click', () => {
                window.__ICG_selectAtom__(data.label);
            });

            const object = new CSS3DSprite(element);
            object.position.set(data.pos[0], data.pos[1], data.pos[2]);
            
            moleculeGroup.add(object);
            
            atomObjects[data.label] = {
                object: object,
                element: element,
                data: data
            };
        });

        // 2. Bonds
        bondsData.forEach(pair => {
            const atomA = atomObjects[pair[0]].object;
            const atomB = atomObjects[pair[1]].object;

            const start = atomA.position;
            const end = atomB.position;
            const distance = start.distanceTo(end);
            const mid = start.clone().lerp(end, 0.5);

            const bondDiv = document.createElement('div');
            bondDiv.className = 'bond';
            bondDiv.style.height = `${distance}px`;

            const bondObj = new CSS3DObject(bondDiv);
            bondObj.position.copy(mid);

            // Align bond with the direction between atoms
            const dir = end.clone().sub(start).normalize();
            const axis = new THREE.Vector3(0, 1, 0);
            bondObj.quaternion.setFromUnitVectors(axis, dir);

            moleculeGroup.add(bondObj);
        });

        // --- Interaction Logic ---
        const infoPanel = document.getElementById('info-panel');
        const infoLabelVal = document.getElementById('info-label-val');
        const infoElementVal = document.getElementById('info-element-val');
        const infoTypeVal = document.getElementById('info-type-val');

        window.__ICG_selectAtom__ = function(label) {
            // Clear previous selection
            const prevLabel = window.__3D_STATE__.selectedAtom;
            if (prevLabel && atomObjects[prevLabel]) {
                atomObjects[prevLabel].element.classList.remove('selected');
            }

            if (label && atomObjects[label]) {
                // Set new selection
                window.__3D_STATE__.selectedAtom = label;
                const atomData = atomObjects[label];
                atomData.element.classList.add('selected');
                
                // Update UI
                infoLabelVal.textContent = atomData.data.label;
                infoElementVal.textContent = atomData.data.el;
                infoTypeVal.textContent = atomData.data.name;
                infoPanel.classList.add('visible');
            } else {
                // Clear selection
                window.__3D_STATE__.selectedAtom = null;
                infoPanel.classList.remove('visible');
            }
        };

        // --- UI Controls ---
        const autoRotateCheckbox = document.getElementById('autoRotate');
        autoRotateCheckbox.addEventListener('change', (e) => {
            window.__3D_STATE__.autoRotate = e.target.checked;
            controls.autoRotate = e.target.checked;
        });

        // --- Window Resize ---
        window.addEventListener('resize', onWindowResize);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
