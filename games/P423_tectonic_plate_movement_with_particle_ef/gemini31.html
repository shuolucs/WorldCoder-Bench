<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Tectonic Plate Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            box-sizing: border-box;
        }
        .controls-row {
            display: flex;
            gap: 10px;
            pointer-events: auto;
            background: rgba(10, 10, 46, 0.7);
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button {
            background-color: #2c3e50;
            color: white;
            border: 1px solid #34495e;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #34495e;
        }
        button:active {
            transform: scale(0.95);
        }
        button.active {
            background-color: #e67e22;
            border-color: #d35400;
        }
        #btn-reset {
            background-color: #c0392b;
            border-color: #a93226;
        }
        #btn-reset:hover {
            background-color: #e74c3c;
        }
        .slider-container {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            pointer-events: auto;
            background: rgba(10, 10, 46, 0.7);
            padding: 5px 15px;
            border-radius: 8px;
        }
        input[type=range] {
            cursor: pointer;
        }
        #info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #00ffcc;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            pointer-events: none;
            border: 1px solid #00ffcc;
            min-width: 250px;
        }
        .info-line {
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
        }
        .instructions {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            text-align: right;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-container">
        <div class="controls-row">
            <button id="btn-convergent">Convergent</button>
            <button id="btn-divergent">Divergent</button>
            <button id="btn-transform">Transform</button>
            <button id="btn-reset">Reset</button>
        </div>
        <div class="slider-container">
            <label for="speed-slider">Plate Speed:</label>
            <input type="range" id="speed-slider" min="0.01" max="0.2" step="0.01" value="0.05">
            <span id="speed-value">0.05</span>
        </div>
    </div>

    <div id="info-panel">
        <div class="info-line"><span>Mode:</span> <span id="info-mode">None</span></div>
        <div class="info-line"><span>Status:</span> <span id="info-status">Stopped</span></div>
        <div class="info-line"><span>Plate Gap:</span> <span id="info-gap">2.00</span></div>
        <div class="info-line"><span>Particles:</span> <span id="info-particles">0</span></div>
        <div class="info-line"><span>Time:</span> <span id="info-time">0.0s</span></div>
    </div>

    <div class="instructions">
        Mouse: Rotate/Zoom/Pan<br>
        Space: Pause/Resume<br>
        P: Toggle Particles<br>
        L: Toggle Lamp
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            mode: 'none',
            running: false,
            paused: false,
            plateA_x: -16,
            plateB_x: 16,
            plateA_z: 0,
            plateB_z: 0,
            plateA_rotZ: 0,
            plateGap: 2,
            particlesActive: false,
            activeParticleCount: 0,
            lampVisible: true,
            lampLoaded: false,
            pointLightIntensity: 0.8,
            speed: 0.05,
            simulationTime: 0,
            collisionDetected: false
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#0a0a2e');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 50);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(10, 30, 10);
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xFF6600, 0.8, 100);
        pointLight.position.set(0, 5, 0);
        scene.add(pointLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f, roughness: 1, metalness: 0 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        scene.add(ground);

        // --- Tectonic Plates ---
        const plateGeo = new THREE.BoxGeometry(30, 2, 40);
        
        // Plate A (Left)
        const matA = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8 });
        const plateA = new THREE.Mesh(plateGeo, matA);
        plateA.position.set(-16, 1, 0);
        scene.add(plateA);

        // Plate B (Right)
        const matB = new THREE.MeshStandardMaterial({ color: 0xA0522D, roughness: 0.8 });
        const plateB = new THREE.Mesh(plateGeo, matB);
        plateB.position.set(16, 1, 0);
        scene.add(plateB);

        // Add Grid lines to plates
        const edgesGeo = new THREE.EdgesGeometry(plateGeo);
        const lineMat = new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 });
        
        const gridA = new THREE.LineSegments(edgesGeo, lineMat);
        plateA.add(gridA);
        
        const gridB = new THREE.LineSegments(edgesGeo, lineMat);
        plateB.add(gridB);

        // --- 3D Model (Lamp) ---
        window.__lamp_model__ = null;
        const loader = new GLTFLoader();
        loader.load(
            'IridescenceLamp.glb',
            function (gltf) {
                const model = gltf.scene;
                model.position.set(0, 0, -30);
                model.scale.set(3, 3, 3);
                scene.add(model);
                window.__lamp_model__ = model;
                state.lampLoaded = true;
            },
            undefined,
            function (error) {
                console.warn('Could not load IridescenceLamp.glb. Simulation will continue without it.', error);
            }
        );

        // --- Particle System ---
        const particleCount = 2000;
        const particlesGeo = new THREE.BufferGeometry();
        
        const pPositions = new Float32Array(particleCount * 3);
        const pColors = new Float32Array(particleCount * 3);
        const pVelocities = new Float32Array(particleCount * 3);
        const pLifetimes = new Float32Array(particleCount);

        // Initialize hidden
        for(let i = 0; i < particleCount; i++) {
            pPositions[i*3] = 0;
            pPositions[i*3+1] = -100; // Hide below ground
            pPositions[i*3+2] = 0;
            pLifetimes[i] = -1;
        }

        particlesGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
        particlesGeo.setAttribute('color', new THREE.BufferAttribute(pColors, 3));

        const particlesMat = new THREE.PointsMaterial({
            size: 0.8,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particleSystem = new THREE.Points(particlesGeo, particlesMat);
        scene.add(particleSystem);

        // --- UI Elements ---
        const btnConv = document.getElementById('btn-convergent');
        const btnDiv = document.getElementById('btn-divergent');
        const btnTrans = document.getElementById('btn-transform');
        const btnReset = document.getElementById('btn-reset');
        const speedSlider = document.getElementById('speed-slider');
        const speedValue = document.getElementById('speed-value');
        
        const infoMode = document.getElementById('info-mode');
        const infoStatus = document.getElementById('info-status');
        const infoGap = document.getElementById('info-gap');
        const infoParticles = document.getElementById('info-particles');
        const infoTime = document.getElementById('info-time');

        // --- Logic Functions ---
        function resetSimulation() {
            state.mode = 'none';
            state.running = false;
            state.paused = false;
            state.plateA_x = -16;
            state.plateB_x = 16;
            state.plateA_z = 0;
            state.plateB_z = 0;
            state.plateA_rotZ = 0;
            state.plateGap = 2;
            state.particlesActive = false;
            state.activeParticleCount = 0;
            state.pointLightIntensity = 0.8;
            state.simulationTime = 0;
            state.collisionDetected = false;

            plateA.position.set(state.plateA_x, 1, state.plateA_z);
            plateA.rotation.set(0, 0, 0);
            plateB.position.set(state.plateB_x, 1, state.plateB_z);
            
            pointLight.intensity = state.pointLightIntensity;

            // Reset particles
            for(let i = 0; i < particleCount; i++) {
                pPositions[i*3+1] = -100;
                pLifetimes[i] = -1;
            }
            particlesGeo.attributes.position.needsUpdate = true;

            updateButtons();
        }

        function setMode(mode) {
            resetSimulation();
            state.mode = mode;
            state.running = true;
            state.particlesActive = true;
            updateButtons();
        }

        function updateButtons() {
            btnConv.classList.toggle('active', state.mode === 'convergent');
            btnDiv.classList.toggle('active', state.mode === 'divergent');
            btnTrans.classList.toggle('active', state.mode === 'transform');
        }

        // --- Event Listeners ---
        btnConv.addEventListener('click', () => setMode('convergent'));
        btnDiv.addEventListener('click', () => setMode('divergent'));
        btnTrans.addEventListener('click', () => setMode('transform'));
        btnReset.addEventListener('click', resetSimulation);

        speedSlider.addEventListener('input', (e) => {
            state.speed = parseFloat(e.target.value);
            speedValue.textContent = state.speed.toFixed(2);
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (state.running) {
                    state.paused = !state.paused;
                }
            } else if (e.code === 'KeyP') {
                particleSystem.visible = !particleSystem.visible;
            } else if (e.code === 'KeyL') {
                state.lampVisible = !state.lampVisible;
                if (window.__lamp_model__) {
                    window.__lamp_model__.visible = state.lampVisible;
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function spawnParticle(i, mode, gap, center_x) {
            pLifetimes[i] = Math.random() * 2.0; // Max 2 seconds
            
            let x, y, z, vx, vy, vz, r, g, b;
            z = (Math.random() - 0.5) * 40; // Spread along boundary

            if (mode === 'convergent') {
                x = center_x + (Math.random() - 0.5) * 2;
                y = 2;
                vx = (Math.random() - 0.5) * 2;
                vy = 5 + Math.random() * 5;
                vz = (Math.random() - 0.5) * 2;
                r = 1.0; g = 0.2 + Math.random() * 0.3; b = 0.0; // Red-orange
            } else if (mode === 'divergent') {
                x = center_x + (Math.random() - 0.5) * gap;
                y = 0;
                vx = (Math.random() - 0.5) * 1;
                vy = 2 + Math.random() * 3;
                vz = (Math.random() - 0.5) * 1;
                r = 1.0; g = 0.5 + Math.random() * 0.4; b = 0.0; // Yellow-red
            } else if (mode === 'transform') {
                x = center_x + (Math.random() - 0.5) * 4;
                y = 1 + Math.random() * 2;
                vx = (Math.random() - 0.5) * 5;
                vy = Math.random() * 2;
                vz = (Math.random() - 0.5) * 5;
                r = 1.0; g = 0.4 + Math.random() * 0.2; b = 0.0; // Orange
            }

            pPositions[i*3] = x;
            pPositions[i*3+1] = y;
            pPositions[i*3+2] = z;
            
            pVelocities[i*3] = vx;
            pVelocities[i*3+1] = vy;
            pVelocities[i*3+2] = vz;

            pColors[i*3] = r;
            pColors[i*3+1] = g;
            pColors[i*3+2] = b;
        }

        function updateSimulation(dt) {
            if (!state.running || state.paused) return;

            state.simulationTime += dt;
            const s = state.speed;

            // Plate Movement
            if (state.mode === 'convergent') {
                if (state.plateGap > 0) {
                    plateA.position.x += s;
                    plateB.position.x -= s;
                } else {
                    state.collisionDetected = true;
                    // Subduction: rotate plate A
                    const targetRot = -15 * Math.PI / 180;
                    if (plateA.rotation.z > targetRot) {
                        plateA.rotation.z -= 0.005;
                    }
                    // Lamp glow
                    state.pointLightIntensity = THREE.MathUtils.lerp(state.pointLightIntensity, 3.0, 0.05);
                }
            } else if (state.mode === 'divergent') {
                if (plateB.position.x < 35) {
                    plateA.position.x -= s;
                    plateB.position.x += s;
                }
                state.pointLightIntensity = THREE.MathUtils.lerp(state.pointLightIntensity, 0.3, 0.05);
            } else if (state.mode === 'transform') {
                if (plateA.position.z < 15) {
                    plateA.position.z += s * 0.6; // 0.03 equivalent
                    plateB.position.z -= s * 0.6;
                }
                state.pointLightIntensity = THREE.MathUtils.lerp(state.pointLightIntensity, 0.8, 0.05);
            }

            // Clamp positions to avoid NaN or extreme values
            plateA.position.x = THREE.MathUtils.clamp(plateA.position.x, -50, 50);
            plateB.position.x = THREE.MathUtils.clamp(plateB.position.x, -50, 50);
            plateA.position.z = THREE.MathUtils.clamp(plateA.position.z, -50, 50);
            plateB.position.z = THREE.MathUtils.clamp(plateB.position.z, -50, 50);

            // Calculate Gap (Width is 30, so half-width is 15)
            const innerEdgeA = plateA.position.x + 15;
            const innerEdgeB = plateB.position.x - 15;
            state.plateGap = Math.max(0, innerEdgeB - innerEdgeA);
            const center_x = (innerEdgeA + innerEdgeB) / 2;

            // Update State Object
            state.plateA_x = plateA.position.x;
            state.plateB_x = plateB.position.x;
            state.plateA_z = plateA.position.z;
            state.plateB_z = plateB.position.z;
            state.plateA_rotZ = plateA.rotation.z * (180 / Math.PI);
            pointLight.intensity = state.pointLightIntensity;

            // Particles
            let activeCount = 0;
            const spawnRate = 10; // particles per frame
            let spawned = 0;

            const shouldSpawn = state.particlesActive && (
                (state.mode === 'convergent' && state.collisionDetected) ||
                (state.mode === 'divergent' && state.plateGap > 0) ||
                (state.mode === 'transform')
            );

            for (let i = 0; i < particleCount; i++) {
                if (pLifetimes[i] > 0) {
                    // Update active particle
                    pLifetimes[i] -= dt;
                    pPositions[i*3] += pVelocities[i*3] * dt;
                    pPositions[i*3+1] += pVelocities[i*3+1] * dt;
                    pPositions[i*3+2] += pVelocities[i*3+2] * dt;
                    
                    // Gravity effect for convergent
                    if(state.mode === 'convergent') {
                        pVelocities[i*3+1] -= 9.8 * dt;
                    }

                    activeCount++;
                } else {
                    // Hide dead particle
                    pPositions[i*3+1] = -100;
                    
                    // Respawn
                    if (shouldSpawn && spawned < spawnRate) {
                        spawnParticle(i, state.mode, state.plateGap, center_x);
                        spawned++;
                        activeCount++;
                    }
                }
            }

            state.activeParticleCount = activeCount;
            particlesGeo.attributes.position.needsUpdate = true;
            particlesGeo.attributes.color.needsUpdate = true;
        }

        function updateUI() {
            infoMode.textContent = state.mode.charAt(0).toUpperCase() + state.mode.slice(1);
            
            let statusTxt = "Stopped";
            if (state.running) {
                statusTxt = state.paused ? "Paused" : "Running";
            }
            infoStatus.textContent = statusTxt;
            infoStatus.style.color = state.paused ? "#ffcc00" : (state.running ? "#00ffcc" : "#ff3333");

            infoGap.textContent = state.plateGap.toFixed(2);
            infoParticles.textContent = state.activeParticleCount;
            infoTime.textContent = state.simulationTime.toFixed(1) + "s";
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const dt = clock.getDelta();
            
            controls.update();
            updateSimulation(dt);
            updateUI();
            
            renderer.render(scene, camera);
        }

        // Start loop
        animate();

    </script>
</body>
</html>
