<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Tectonic Plate Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a2e; }
  canvas { display: block; }

  #ui-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 10;
    pointer-events: none;
  }

  #button-row {
    display: flex;
    flex-direction: row;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 12px;
    pointer-events: auto;
    flex-wrap: wrap;
  }

  .btn {
    background: rgba(20, 20, 50, 0.85);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 10px 20px;
    cursor: pointer;
    font-size: 14px;
    border-radius: 6px;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .btn:hover { background: rgba(60, 60, 120, 0.9); border-color: rgba(255,255,255,0.5); }
  .btn.active { background: rgba(100, 50, 20, 0.9); border-color: #FF6600; box-shadow: 0 0 10px rgba(255,102,0,0.3); }
  .btn-reset { background: rgba(80, 20, 20, 0.85); }
  .btn-reset:hover { background: rgba(120, 30, 30, 0.9); }

  #slider-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    pointer-events: auto;
  }

  #slider-row label {
    color: #ccc;
    font-size: 13px;
  }

  #speed-slider {
    width: 200px;
    accent-color: #FF6600;
  }

  #speed-value {
    color: #FF6600;
    font-size: 13px;
    min-width: 40px;
  }

  #info-panel {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 16px 20px;
    color: #ddd;
    font-size: 13px;
    line-height: 1.8;
    pointer-events: auto;
    min-width: 280px;
    backdrop-filter: blur(5px);
  }

  #info-panel .label { color: #888; }
  #info-panel .value { color: #FF6600; font-weight: bold; }
  #info-panel .title {
    font-size: 15px;
    color: #fff;
    margin-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 6px;
  }

  #instructions {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: rgba(10, 10, 46, 0.75);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 12px 16px;
    color: #999;
    font-size: 11px;
    line-height: 1.8;
  }
  #instructions kbd {
    background: rgba(255,255,255,0.1);
    padding: 2px 6px;
    border-radius: 3px;
    color: #ccc;
  }
</style>
</head>
<body>

<div id="ui-container">
  <div id="button-row">
    <button class="btn" id="btn-convergent">Convergent</button>
    <button class="btn" id="btn-divergent">Divergent</button>
    <button class="btn" id="btn-transform">Transform</button>
    <button class="btn btn-reset" id="btn-reset">Reset</button>
  </div>
  <div id="slider-row">
    <label for="speed-slider">Plate Speed:</label>
    <input type="range" id="speed-slider" min="0.01" max="0.2" step="0.01" value="0.05">
    <span id="speed-value">0.05</span>
  </div>
</div>

<div id="info-panel">
  <div class="title">📊 Simulation Data</div>
  <div><span class="label">Mode: </span><span class="value" id="info-mode">None</span></div>
  <div><span class="label">Status: </span><span class="value" id="info-status">Stopped</span></div>
  <div><span class="label">Plate Gap: </span><span class="value" id="info-gap">2.00</span> <span class="label">units</span></div>
  <div><span class="label">Active Particles: </span><span class="value" id="info-particles">0</span></div>
  <div><span class="label">Sim Time: </span><span class="value" id="info-time">0.00</span> <span class="label">s</span></div>
  <div><span class="label">Collision: </span><span class="value" id="info-collision">No</span></div>
</div>

<div id="instructions">
  <kbd>Space</kbd> Pause / Resume<br>
  <kbd>P</kbd> Toggle Particles<br>
  <kbd>L</kbd> Toggle Lamp
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
  mode: 'none',
  running: false,
  paused: false,
  plateA_x: -16,
  plateB_x: 16,
  plateA_z: 0,
  plateB_z: 0,
  plateA_rotZ: 0,
  plateGap: 2,
  particlesActive: false,
  activeParticleCount: 0,
  lampVisible: true,
  lampLoaded: false,
  pointLightIntensity: 0.8,
  speed: 0.05,
  simulationTime: 0,
  collisionDetected: false
};

window.__lamp_model__ = null;

const state = window.__3D_STATE__;

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 30, 50);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 2, 0);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(10, 30, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 100;
dirLight.shadow.camera.left = -50;
dirLight.shadow.camera.right = 50;
dirLight.shadow.camera.top = 50;
dirLight.shadow.camera.bottom = -50;
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambLight);

const pointLight = new THREE.PointLight(0xFF6600, 0.8, 100);
pointLight.position.set(0, 5, 0);
scene.add(pointLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(200, 200);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x3d2b1f,
  roughness: 0.9,
  metalness: 0.1
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper for ground
const gridHelper = new THREE.GridHelper(200, 40, 0x2a1a0f, 0x2a1a0f);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// Create plate grid overlay
function createPlateGridLines(width, height, depth, color) {
  const group = new THREE.Group();
  const lineMat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.3 });

  // Top face grid
  const divisions = 8;
  for (let i = 0; i <= divisions; i++) {
    const t = i / divisions;
    // Lines along X
    const geoX = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-width/2 + t * width, height/2 + 0.01, -depth/2),
      new THREE.Vector3(-width/2 + t * width, height/2 + 0.01, depth/2)
    ]);
    group.add(new THREE.Line(geoX, lineMat));

    // Lines along Z
    const geoZ = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-width/2, height/2 + 0.01, -depth/2 + t * depth),
      new THREE.Vector3(width/2, height/2 + 0.01, -depth/2 + t * depth)
    ]);
    group.add(new THREE.Line(geoZ, lineMat));
  }

  // Side face lines
  for (let i = 0; i <= 4; i++) {
    const t = i / 4;
    // Front face
    const geoFront = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-width/2 + t * width, -height/2, depth/2 + 0.01),
      new THREE.Vector3(-width/2 + t * width, height/2, depth/2 + 0.01)
    ]);
    group.add(new THREE.Line(geoFront, lineMat));
  }

  return group;
}

// Tectonic Plates
const plateWidth = 30;
const plateHeight = 2;
const plateDepth = 40;

const plateGeoA = new THREE.BoxGeometry(plateWidth, plateHeight, plateDepth, 8, 1, 8);
const plateMatA = new THREE.MeshStandardMaterial({
  color: 0x8B4513,
  roughness: 0.8,
  metalness: 0.1,
  flatShading: false
});
const plateA = new THREE.Mesh(plateGeoA, plateMatA);
plateA.position.set(-16, 1, 0);
plateA.castShadow = true;
plateA.receiveShadow = true;
scene.add(plateA);

const gridA = createPlateGridLines(plateWidth, plateHeight, plateDepth, 0xBB7733);
plateA.add(gridA);

const plateGeoB = new THREE.BoxGeometry(plateWidth, plateHeight, plateDepth, 8, 1, 8);
const plateMatB = new THREE.MeshStandardMaterial({
  color: 0xA0522D,
  roughness: 0.8,
  metalness: 0.1,
  flatShading: false
});
const plateB = new THREE.Mesh(plateGeoB, plateMatB);
plateB.position.set(16, 1, 0);
plateB.castShadow = true;
plateB.receiveShadow = true;
scene.add(plateB);

const gridB = createPlateGridLines(plateWidth, plateHeight, plateDepth, 0xCC8844);
plateB.add(gridB);

// Plate edge highlights
function addEdgeHighlight(plate, color) {
  const edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(plateWidth, plateHeight, plateDepth));
  const edgeMat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.4 });
  const edgeLine = new THREE.LineSegments(edges, edgeMat);
  plate.add(edgeLine);
}
addEdgeHighlight(plateA, 0xBB7733);
addEdgeHighlight(plateB, 0xCC8844);

// Particle System
const PARTICLE_COUNT = 2000;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);
const sizes = new Float32Array(PARTICLE_COUNT);
const lifetimes = new Float32Array(PARTICLE_COUNT);
const velocities = new Float32Array(PARTICLE_COUNT * 3);
const particleAlphas = new Float32Array(PARTICLE_COUNT);

for (let i = 0; i < PARTICLE_COUNT; i++) {
  positions[i * 3] = 0;
  positions[i * 3 + 1] = -100; // hidden below
  positions[i * 3 + 2] = 0;
  colors[i * 3] = 1;
  colors[i * 3 + 1] = 0.4;
  colors[i * 3 + 2] = 0;
  sizes[i] = 0.3;
  lifetimes[i] = -1;
  velocities[i * 3] = 0;
  velocities[i * 3 + 1] = 0;
  velocities[i * 3 + 2] = 0;
  particleAlphas[i] = 0;
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
particleGeo.setAttribute('alpha', new THREE.BufferAttribute(particleAlphas, 1));

const particleVertexShader = `
  attribute float size;
  attribute float alpha;
  varying vec3 vColor;
  varying float vAlpha;
  void main() {
    vColor = color;
    vAlpha = alpha;
    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
    gl_PointSize = size * (200.0 / -mvPosition.z);
    gl_PointSize = clamp(gl_PointSize, 1.0, 20.0);
    gl_Position = projectionMatrix * mvPosition;
  }
`;

const particleFragmentShader = `
  varying vec3 vColor;
  varying float vAlpha;
  void main() {
    float dist = length(gl_PointCoord - vec2(0.5));
    if (dist > 0.5) discard;
    float fade = 1.0 - smoothstep(0.2, 0.5, dist);
    gl_FragColor = vec4(vColor, vAlpha * fade);
  }
`;

const particleMat = new THREE.ShaderMaterial({
  vertexShader: particleVertexShader,
  fragmentShader: particleFragmentShader,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexColors: true
});

const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

let particlesVisible = true;

// Load GLTF Model
const loader = new GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/IridescenceLamp/glTF-Binary/IridescenceLamp.glb',
  (gltf) => {
    const model = gltf.scene;
    model.position.set(0, 0, -30);
    model.scale.set(3, 3, 3);
    scene.add(model);
    window.__lamp_model__ = model;
    state.lampLoaded = true;
    state.lampVisible = true;
  },
  undefined,
  (error) => {
    console.warn('Could not load lamp model:', error);
    // Create a fallback lamp
    const fallbackGeo = new THREE.CylinderGeometry(1, 2, 8, 16);
    const fallbackMat = new THREE.MeshStandardMaterial({
      color: 0xFF6600,
      emissive: 0xFF3300,
      emissiveIntensity: 0.5,
      roughness: 0.3,
      metalness: 0.7
    });
    const fallback = new THREE.Mesh(fallbackGeo, fallbackMat);
    fallback.position.set(0, 4, -30);
    fallback.scale.set(3, 3, 3);
    scene.add(fallback);
    window.__lamp_model__ = fallback;
    state.lampLoaded = true;
    state.lampVisible = true;
  }
);

// Add some ambient scene elements
// Fog
scene.fog = new THREE.FogExp2(0x0a0a2e, 0.005);

// Boundary marker line
const boundaryGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(0, 0.1, -25),
  new THREE.Vector3(0, 0.1, 25)
]);
const boundaryMat = new THREE.LineDashedMaterial({
  color: 0xFF4400,
  dashSize: 2,
  gapSize: 1,
  transparent: true,
  opacity: 0.5
});
const boundaryLine = new THREE.Line(boundaryGeo, boundaryMat);
boundaryLine.computeLineDistances();
scene.add(boundaryLine);

// Particle management
const PARTICLE_LIFETIME = 2.0;
let nextParticleIndex = 0;

function emitParticle(px, py, pz, vx, vy, vz, r, g, b, size) {
  const i = nextParticleIndex;
  nextParticleIndex = (nextParticleIndex + 1) % PARTICLE_COUNT;

  positions[i * 3] = px;
  positions[i * 3 + 1] = py;
  positions[i * 3 + 2] = pz;
  velocities[i * 3] = vx;
  velocities[i * 3 + 1] = vy;
  velocities[i * 3 + 2] = vz;
  colors[i * 3] = r;
  colors[i * 3 + 1] = g;
  colors[i * 3 + 2] = b;
  sizes[i] = size || (0.2 + Math.random() * 0.4);
  lifetimes[i] = PARTICLE_LIFETIME;
  particleAlphas[i] = 1.0;
}

function updateParticles(dt) {
  let activeCount = 0;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    if (lifetimes[i] > 0) {
      lifetimes[i] -= dt;
      if (lifetimes[i] <= 0) {
        lifetimes[i] = -1;
        positions[i * 3 + 1] = -100;
        particleAlphas[i] = 0;
        continue;
      }

      // Update position
      positions[i * 3] += velocities[i * 3] * dt;
      positions[i * 3 + 1] += velocities[i * 3 + 1] * dt;
      positions[i * 3 + 2] += velocities[i * 3 + 2] * dt;

      // Gravity for convergent particles
      velocities[i * 3 + 1] -= 2.0 * dt;

      // Fade out
      const lifeRatio = lifetimes[i] / PARTICLE_LIFETIME;
      particleAlphas[i] = lifeRatio;
      sizes[i] = (0.2 + 0.4 * lifeRatio);

      activeCount++;
    }
  }

  particleGeo.attributes.position.needsUpdate = true;
  particleGeo.attributes.color.needsUpdate = true;
  particleGeo.attributes.size.needsUpdate = true;
  particleGeo.attributes.alpha.needsUpdate = true;

  state.activeParticleCount = activeCount;
}

function emitConvergentParticles(boundaryX) {
  for (let j = 0; j < 5; j++) {
    const pz = (Math.random() - 0.5) * 30;
    const py = 2 + Math.random() * 2;
    const vx = (Math.random() - 0.5) * 3;
    const vy = 5 + Math.random() * 10;
    const vz = (Math.random() - 0.5) * 3;
    const r = 1.0;
    const g = 0.2 + Math.random() * 0.4;
    const b = 0.0;
    emitParticle(boundaryX, py, pz, vx, vy, vz, r, g, b);
  }
}

function emitDivergentParticles(leftEdge, rightEdge) {
  for (let j = 0; j < 4; j++) {
    const px = leftEdge + Math.random() * (rightEdge - leftEdge);
    const pz = (Math.random() - 0.5) * 30;
    const py = 0.5 + Math.random() * 1;
    const vx = (Math.random() - 0.5) * 4;
    const vy = 2 + Math.random() * 4;
    const vz = (Math.random() - 0.5) * 2;
    const r = 1.0;
    const g = 0.5 + Math.random() * 0.5;
    const b = 0.0 + Math.random() * 0.1;
    emitParticle(px, py, pz, vx, vy, vz, r, g, b);
  }
}

function emitTransformParticles(boundaryX) {
  for (let j = 0; j < 3; j++) {
    const pz = (Math.random() - 0.5) * 35;
    const py = 1 + Math.random() * 2;
    const vx = (Math.random() - 0.5) * 6;
    const vy = 1 + Math.random() * 3;
    const vz = (Math.random() - 0.5) * 8;
    const r = 1.0;
    const g = 0.5 + Math.random() * 0.2;
    const b = 0.0;
    emitParticle(boundaryX, py, pz, vx, vy, vz, r, g, b);
  }
}

// Initial positions
const INITIAL = {
  plateA_x: -16,
  plateB_x: 16,
  plateA_z: 0,
  plateB_z: 0,
  plateA_rotZ: 0
};

function clampVal(v, min, max) {
  if (isNaN(v)) return 0;
  return Math.max(min, Math.min(max, v));
}

function resetSimulation() {
  state.mode = 'none';
  state.running = false;
  state.paused = false;
  state.plateA_x = INITIAL.plateA_x;
  state.plateB_x = INITIAL.plateB_x;
  state.plateA_z = INITIAL.plateA_z;
  state.plateB_z = INITIAL.plateB_z;
  state.plateA_rotZ = INITIAL.plateA_rotZ;
  state.particlesActive = false;
  state.collisionDetected = false;
  state.pointLightIntensity = 0.8;
  state.simulationTime = 0;

  plateA.position.set(INITIAL.plateA_x, 1, INITIAL.plateA_z);
  plateA.rotation.z = 0;
  plateB.position.set(INITIAL.plateB_x, 1, INITIAL.plateB_z);
  plateB.rotation.z = 0;

  pointLight.intensity = 0.8;

  // Kill all particles
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    lifetimes[i] = -1;
    positions[i * 3 + 1] = -100;
    particleAlphas[i] = 0;
  }
  particleGeo.attributes.position.needsUpdate = true;
  particleGeo.attributes.alpha.needsUpdate = true;

  updateButtons();
}

function setMode(mode) {
  // Reset positions first
  state.plateA_x = INITIAL.plateA_x;
  state.plateB_x = INITIAL.plateB_x;
  state.plateA_z = INITIAL.plateA_z;
  state.plateB_z = INITIAL.plateB_z;
  state.plateA_rotZ = 0;
  state.collisionDetected = false;
  state.simulationTime = 0;

  plateA.position.set(INITIAL.plateA_x, 1, INITIAL.plateA_z);
  plateA.rotation.z = 0;
  plateB.position.set(INITIAL.plateB_x, 1, INITIAL.plateB_z);
  plateB.rotation.z = 0;

  state.mode = mode;
  state.running = true;
  state.paused = false;
  state.particlesActive = true;

  // Kill existing particles
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    lifetimes[i] = -1;
    positions[i * 3 + 1] = -100;
    particleAlphas[i] = 0;
  }

  updateButtons();
}

function updateButtons() {
  document.getElementById('btn-convergent').classList.toggle('active', state.mode === 'convergent');
  document.getElementById('btn-divergent').classList.toggle('active', state.mode === 'divergent');
  document.getElementById('btn-transform').classList.toggle('active', state.mode === 'transform');
}

// Button events
document.getElementById('btn-convergent').addEventListener('click', () => setMode('convergent'));
document.getElementById('btn-divergent').addEventListener('click', () => setMode('divergent'));
document.getElementById('btn-transform').addEventListener('click', () => setMode('transform'));
document.getElementById('btn-reset').addEventListener('click', resetSimulation);

// Slider
const slider = document.getElementById('speed-slider');
const speedValue = document.getElementById('speed-value');
slider.addEventListener('input', () => {
  state.speed = parseFloat(slider.value);
  speedValue.textContent = state.speed.toFixed(2);
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (state.running) {
      state.paused = !state.paused;
    }
  }
  if (e.code === 'KeyP') {
    particlesVisible = !particlesVisible;
    particles.visible = particlesVisible;
  }
  if (e.code === 'KeyL') {
    state.lampVisible = !state.lampVisible;
    if (window.__lamp_model__) {
      window.__lamp_model__.visible = state.lampVisible;
    }
  }
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Info panel update
function updateInfoPanel() {
  const modeNames = {
    'none': 'None',
    'convergent': '🔴 Convergent',
    'divergent': '🟢 Divergent',
    'transform': '🟡 Transform'
  };
  document.getElementById('info-mode').textContent = modeNames[state.mode] || 'None';

  let statusText = 'Stopped';
  if (state.running && state.paused) statusText = '⏸ Paused';
  else if (state.running) statusText = '▶ Running';
  document.getElementById('info-status').textContent = statusText;

  document.getElementById('info-gap').textContent = state.plateGap.toFixed(2);
  document.getElementById('info-particles').textContent = state.activeParticleCount;
  document.getElementById('info-time').textContent = state.simulationTime.toFixed(2);
  document.getElementById('info-collision').textContent = state.collisionDetected ? '⚠ YES' : 'No';
}

// Animation
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
  requestAnimationFrame(animate);

  const dt = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  controls.update();

  if (state.running && !state.paused) {
    state.simulationTime += dt;
    const speed = state.speed;

    if (state.mode === 'convergent') {
      // Move plates toward each other
      const innerEdgeA = state.plateA_x + plateWidth / 2;
      const innerEdgeB = state.plateB_x - plateWidth / 2;
      const gap = innerEdgeB - innerEdgeA;

      if (gap > 2) {
        state.plateA_x += speed;
        state.plateB_x -= speed;
        state.collisionDetected = false;
      } else {
        // Collision - subduction
        state.collisionDetected = true;
        const targetRot = -15 * (Math.PI / 180);
        const currentRot = plateA.rotation.z;
        if (currentRot > targetRot) {
          plateA.rotation.z -= 0.005;
        }
        state.plateA_rotZ = THREE.MathUtils.radToDeg(plateA.rotation.z);

        // Still push slightly
        if (gap > 0.5) {
          state.plateA_x += speed * 0.2;
          state.plateB_x -= speed * 0.2;
        }
      }

      state.plateA_x = clampVal(state.plateA_x, -50, 50);
      state.plateB_x = clampVal(state.plateB_x, -50, 50);

      plateA.position.x = state.plateA_x;
      plateB.position.x = state.plateB_x;

      // Update gap
      state.plateGap = clampVal((state.plateB_x - plateWidth / 2) - (state.plateA_x + plateWidth / 2), 0, 100);

      // Particles
      if (state.particlesActive && gap <= 5) {
        const bx = (state.plateA_x + plateWidth / 2 + state.plateB_x - plateWidth / 2) / 2;
        emitConvergentParticles(bx);
      }

      // Lamp glow
      const targetIntensity = state.collisionDetected ? 3.0 : 0.8;
      pointLight.intensity += (targetIntensity - pointLight.intensity) * 0.05;
      state.pointLightIntensity = pointLight.intensity;

    } else if (state.mode === 'divergent') {
      // Move plates apart
      if (state.plateA_x > -35) state.plateA_x -= speed;
      if (state.plateB_x < 35) state.plateB_x += speed;

      state.plateA_x = clampVal(state.plateA_x, -50, 50);
      state.plateB_x = clampVal(state.plateB_x, -50, 50);

      plateA.position.x = state.plateA_x;
      plateB.position.x = state.plateB_x;

      state.plateGap = clampVal((state.plateB_x - plateWidth / 2) - (state.plateA_x + plateWidth / 2), 0, 100);
      state.collisionDetected = false;

      // Particles in the gap
      if (state.particlesActive) {
        const leftEdge = state.plateA_x + plateWidth / 2;
        const rightEdge = state.plateB_x - plateWidth / 2;
        emitDivergentParticles(leftEdge, rightEdge);
      }

      // Dim lamp
      const targetIntensity = 0.3;
      pointLight.intensity += (targetIntensity - pointLight.intensity) * 0.05;
      state.pointLightIntensity = pointLight.intensity;

    } else if (state.mode === 'transform') {
      // Slide laterally
      if (Math.abs(state.plateA_z) < 15) {
        state.plateA_z += speed * 0.6;
      }
      if (Math.abs(state.plateB_z) < 15) {
        state.plateB_z -= speed * 0.6;
      }

      state.plateA_z = clampVal(state.plateA_z, -50, 50);
      state.plateB_z = clampVal(state.plateB_z, -50, 50);

      plateA.position.z = state.plateA_z;
      plateB.position.z = state.plateB_z;

      state.plateGap = clampVal((state.plateB_x - plateWidth / 2) - (state.plateA_x + plateWidth / 2), 0, 100);
      state.collisionDetected = false;

      // Particles along boundary
      if (state.particlesActive) {
        const bx = (state.plateA_x + plateWidth / 2 + state.plateB_x - plateWidth / 2) / 2;
        emitTransformParticles(bx);
      }

      // Medium lamp
      const targetIntensity = 1.2;
      pointLight.intensity += (targetIntensity - pointLight.intensity) * 0.05;
      state.pointLightIntensity = pointLight.intensity;
    }
  }

  // Update particles
  updateParticles(dt);

  // Boundary line pulse
  const pulseOpacity = 0.3 + 0.2 * Math.sin(elapsed * 3);
  boundaryMat.opacity = state.running ? pulseOpacity : 0.2;

  // Lamp model subtle animation
  if (window.__lamp_model__ && state.lampLoaded) {
    window.__lamp_model__.rotation.y += 0.005;
  }

  // Point light position follows boundary
  if (state.running) {
    const bx = (state.plateA_x + plateWidth / 2 + state.plateB_x - plateWidth / 2) / 2;
    pointLight.position.x = clampVal(bx, -50, 50);
  }

  // Ensure state values are clean
  state.plateA_x = clampVal(state.plateA_x, -50, 50);
  state.plateB_x = clampVal(state.plateB_x, -50, 50);
  state.plateA_z = clampVal(state.plateA_z, -50, 50);
  state.plateB_z = clampVal(state.plateB_z, -50, 50);
  state.plateA_rotZ = clampVal(state.plateA_rotZ || 0, -90, 90);
  state.plateGap = clampVal(state.plateGap || 0, 0, 200);
  state.pointLightIntensity = clampVal(state.pointLightIntensity || 0.8, 0, 10);
  state.simulationTime = clampVal(state.simulationTime || 0, 0, 999999);
  state.activeParticleCount = state.activeParticleCount || 0;

  updateInfoPanel();

  renderer.render(scene, camera);
}

animate();
</script>
