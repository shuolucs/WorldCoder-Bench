<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Tectonic Plate Movement Simulator</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, sans-serif;
      color: white;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      background: #1b1b2f;
      color: white;
      border: 1px solid #555;
      padding: 10px 14px;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
    }

    button:hover {
      background: #2d2d4d;
    }

    #slider-wrap {
      background: rgba(20, 20, 40, 0.8);
      padding: 10px;
      border-radius: 8px;
      width: 240px;
    }

    #slider-wrap label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    #speed-slider {
      width: 100%;
    }

    #info-panel {
      position: absolute;
      left: 10px;
      bottom: 10px;
      z-index: 10;
      background: rgba(10, 10, 30, 0.75);
      padding: 12px;
      border-radius: 8px;
      min-width: 260px;
      font-size: 14px;
      line-height: 1.5;
      border: 1px solid rgba(255,255,255,0.15);
      white-space: pre-line;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="button-row">
      <button id="btn-convergent">Convergent</button>
      <button id="btn-divergent">Divergent</button>
      <button id="btn-transform">Transform</button>
      <button id="btn-reset">Reset</button>
    </div>
    <div id="slider-wrap">
      <label for="speed-slider">Plate Speed: <span id="speed-value">0.05</span></label>
      <input id="speed-slider" type="range" min="0.01" max="0.2" step="0.01" value="0.05" />
    </div>
  </div>

  <div id="info-panel">Loading...</div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#0a0a2e');

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 30, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 5, 0);
    controls.enableDamping = true;

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(10, 30, 10);
    scene.add(dirLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight('#FF6600', 0.8, 100, 2);
    pointLight.position.set(0, 5, 0);
    scene.add(pointLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(200, 200),
      new THREE.MeshStandardMaterial({
        color: '#3d2b1f',
        roughness: 0.95,
        metalness: 0.05
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    function createPlate(color) {
      const group = new THREE.Group();

      const plateMesh = new THREE.Mesh(
        new THREE.BoxGeometry(30, 2, 40),
        new THREE.MeshStandardMaterial({
          color,
          roughness: 0.8,
          metalness: 0.05
        })
      );
      group.add(plateMesh);

      const edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.BoxGeometry(30.02, 2.02, 40.02)),
        new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.35 })
      );
      group.add(edges);

      const gridGroup = new THREE.Group();
      const gridMat = new THREE.LineBasicMaterial({
        color: 0x2a1a12,
        transparent: true,
        opacity: 0.35
      });

      for (let x = -14; x <= 14; x += 4) {
        const geo = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(x, 1.01, -20),
          new THREE.Vector3(x, 1.01, 20)
        ]);
        gridGroup.add(new THREE.Line(geo, gridMat));
      }

      for (let z = -18; z <= 18; z += 4) {
        const geo = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(-15, 1.01, z),
          new THREE.Vector3(15, 1.01, z)
        ]);
        gridGroup.add(new THREE.Line(geo, gridMat));
      }

      group.add(gridGroup);
      return group;
    }

    const plateA = createPlate('#8B4513');
    plateA.position.set(-16, 1, 0);
    scene.add(plateA);

    const plateB = createPlate('#A0522D');
    plateB.position.set(16, 1, 0);
    scene.add(plateB);

    const loader = new GLTFLoader();
    window.__lamp_model__ = null;

    loader.load(
      'IridescenceLamp.glb',
      (gltf) => {
        const model = gltf.scene;
        model.position.set(0, 0, -30);
        model.scale.set(3, 3, 3);
        scene.add(model);
        window.__lamp_model__ = model;
        window.__3D_STATE__.lampLoaded = true;
      },
      undefined,
      () => {
        window.__3D_STATE__.lampLoaded = false;
      }
    );

    const PARTICLE_COUNT = 2000;
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);
    const sizes = new Float32Array(PARTICLE_COUNT);
    const velocities = new Float32Array(PARTICLE_COUNT * 3);
    const life = new Float32Array(PARTICLE_COUNT);
    const age = new Float32Array(PARTICLE_COUNT);
    const active = new Float32Array(PARTICLE_COUNT);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      positions[i * 3 + 0] = 0;
      positions[i * 3 + 1] = -1000;
      positions[i * 3 + 2] = 0;

      colors[i * 3 + 0] = 1;
      colors[i * 3 + 1] = 0.3;
      colors[i * 3 + 2] = 0.1;

      sizes[i] = 2;
      velocities[i * 3 + 0] = 0;
      velocities[i * 3 + 1] = 0;
      velocities[i * 3 + 2] = 0;
      life[i] = 2;
      age[i] = 999;
      active[i] = 0;
    }

    const particleGeometry = new THREE.BufferGeometry();
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const particleMaterial = new THREE.PointsMaterial({
      size: 0.7,
      vertexColors: true,
      transparent: true,
      opacity: 0,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    const infoPanel = document.getElementById('info-panel');
    const speedSlider = document.getElementById('speed-slider');
    const speedValue = document.getElementById('speed-value');

    function clampNumber(v, min, max, fallback = 0) {
      if (!Number.isFinite(v)) return fallback;
      return Math.min(max, Math.max(min, v));
    }

    function deg(rad) {
      return rad * 180 / Math.PI;
    }

    function computePlateGap() {
      const aInner = plateA.position.x + 15;
      const bInner = plateB.position.x - 15;
      return clampNumber(bInner - aInner, -100, 100, 2);
    }

    window.__3D_STATE__ = {
      mode: 'none',
      running: false,
      paused: false,
      plateA_x: -16,
      plateB_x: 16,
      plateA_z: 0,
      plateB_z: 0,
      plateA_rotZ: 0,
      plateGap: 2,
      particlesActive: false,
      activeParticleCount: 0,
      lampVisible: true,
      lampLoaded: false,
      pointLightIntensity: 0.8,
      speed: 0.05,
      simulationTime: 0,
      collisionDetected: false
    };

    let particlesVisible = true;

    function resetParticles() {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        positions[i * 3 + 1] = -1000;
        velocities[i * 3 + 0] = 0;
        velocities[i * 3 + 1] = 0;
        velocities[i * 3 + 2] = 0;
        age[i] = 999;
        active[i] = 0;
      }
      particleGeometry.attributes.position.needsUpdate = true;
      particleMaterial.opacity = 0;
      window.__3D_STATE__.particlesActive = false;
      window.__3D_STATE__.activeParticleCount = 0;
    }

    function respawnParticle(i, mode) {
      const baseX = (Math.random() - 0.5) * 2.5;
      const baseZ = (Math.random() - 0.5) * 10.0;

      if (mode === 'convergent') {
        positions[i * 3 + 0] = baseX;
        positions[i * 3 + 1] = 2 + Math.random() * 1.5;
        positions[i * 3 + 2] = baseZ * 0.4 - 12;

        velocities[i * 3 + 0] = (Math.random() - 0.5) * 0.03;
        velocities[i * 3 + 1] = 0.15 + Math.random() * 0.18;
        velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.03;

        colors[i * 3 + 0] = 1.0;
        colors[i * 3 + 1] = 0.2 + Math.random() * 0.4;
        colors[i * 3 + 2] = 0.0;
      } else if (mode === 'divergent') {
        positions[i * 3 + 0] = (Math.random() - 0.5) * 4;
        positions[i * 3 + 1] = 0.5 + Math.random() * 0.8;
        positions[i * 3 + 2] = baseZ * 0.5;

        velocities[i * 3 + 0] = (Math.random() - 0.5) * 0.18;
        velocities[i * 3 + 1] = 0.04 + Math.random() * 0.06;
        velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.04;

        colors[i * 3 + 0] = 1.0;
        colors[i * 3 + 1] = 0.7 + Math.random() * 0.3;
        colors[i * 3 + 2] = 0.05;
      } else if (mode === 'transform') {
        positions[i * 3 + 0] = (Math.random() - 0.5) * 1.5;
        positions[i * 3 + 1] = 1.2 + Math.random() * 1.2;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 12;

        velocities[i * 3 + 0] = (Math.random() - 0.5) * 0.12;
        velocities[i * 3 + 1] = 0.01 + Math.random() * 0.03;
        velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.22;

        colors[i * 3 + 0] = 1.0;
        colors[i * 3 + 1] = 0.45 + Math.random() * 0.25;
        colors[i * 3 + 2] = 0.05;
      }

      age[i] = 0;
      life[i] = 2.0;
      active[i] = 1;
    }

    function updateParticles(dt) {
      const mode = window.__3D_STATE__.mode;
      let shouldEmit = false;

      if (mode === 'convergent' && window.__3D_STATE__.collisionDetected) shouldEmit = true;
      if (mode === 'divergent' && window.__3D_STATE__.running) shouldEmit = true;
      if (mode === 'transform' && window.__3D_STATE__.running) shouldEmit = true;

      if (!particlesVisible) {
        particleMaterial.opacity = 0;
      } else {
        particleMaterial.opacity = shouldEmit ? 0.95 : 0;
      }

      let activeCount = 0;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        if (shouldEmit && age[i] >= life[i]) {
          respawnParticle(i, mode);
        }

        if (age[i] < life[i]) {
          age[i] += dt;
          positions[i * 3 + 0] += velocities[i * 3 + 0] * dt * 60;
          positions[i * 3 + 1] += velocities[i * 3 + 1] * dt * 60;
          positions[i * 3 + 2] += velocities[i * 3 + 2] * dt * 60;

          if (mode === 'convergent') {
            velocities[i * 3 + 1] -= 0.002 * dt * 60;
          } else if (mode === 'divergent') {
            velocities[i * 3 + 1] += 0.0005 * dt * 60;
          }

          activeCount++;
        } else {
          active[i] = 0;
          positions[i * 3 + 1] = -1000;
        }
      }

      particleGeometry.attributes.position.needsUpdate = true;
      particleGeometry.attributes.color.needsUpdate = true;

      window.__3D_STATE__.particlesActive = shouldEmit && particlesVisible;
      window.__3D_STATE__.activeParticleCount = activeCount;
    }

    function resetSimulation() {
      plateA.position.set(-16, 1, 0);
      plateB.position.set(16, 1, 0);
      plateA.rotation.z = 0;
      plateB.rotation.z = 0;

      pointLight.intensity = 0.8;

      window.__3D_STATE__.mode = 'none';
      window.__3D_STATE__.running = false;
      window.__3D_STATE__.paused = false;
      window.__3D_STATE__.simulationTime = 0;
      window.__3D_STATE__.collisionDetected = false;

      resetParticles();

      if (window.__lamp_model__) {
        window.__lamp_model__.visible = window.__3D_STATE__.lampVisible;
      }
    }

    function setMode(mode) {
      resetSimulation();
      window.__3D_STATE__.mode = mode;
      window.__3D_STATE__.running = true;
    }

    document.getElementById('btn-convergent').addEventListener('click', () => setMode('convergent'));
    document.getElementById('btn-divergent').addEventListener('click', () => setMode('divergent'));
    document.getElementById('btn-transform').addEventListener('click', () => setMode('transform'));
    document.getElementById('btn-reset').addEventListener('click', resetSimulation);

    speedSlider.addEventListener('input', (e) => {
      const v = clampNumber(parseFloat(e.target.value), 0.01, 0.2, 0.05);
      window.__3D_STATE__.speed = v;
      speedValue.textContent = v.toFixed(2);
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (window.__3D_STATE__.running) {
          window.__3D_STATE__.paused = !window.__3D_STATE__.paused;
        }
      }

      if (e.key === 'p' || e.key === 'P') {
        particlesVisible = !particlesVisible;
        if (!particlesVisible) particleMaterial.opacity = 0;
      }

      if (e.key === 'l' || e.key === 'L') {
        window.__3D_STATE__.lampVisible = !window.__3D_STATE__.lampVisible;
        if (window.__lamp_model__) {
          window.__lamp_model__.visible = window.__3D_STATE__.lampVisible;
        }
      }
    });

    const clock = new THREE.Clock();

    function updateState() {
      window.__3D_STATE__.plateA_x = clampNumber(plateA.position.x, -50, 50, -16);
      window.__3D_STATE__.plateB_x = clampNumber(plateB.position.x, -50, 50, 16);
      window.__3D_STATE__.plateA_z = clampNumber(plateA.position.z, -50, 50, 0);
      window.__3D_STATE__.plateB_z = clampNumber(plateB.position.z, -50, 50, 0);
      window.__3D_STATE__.plateA_rotZ = clampNumber(deg(plateA.rotation.z), -360, 360, 0);
      window.__3D_STATE__.plateGap = clampNumber(computePlateGap(), -100, 100, 2);
      window.__3D_STATE__.pointLightIntensity = clampNumber(pointLight.intensity, 0, 10, 0.8);
      window.__3D_STATE__.speed = clampNumber(window.__3D_STATE__.speed, 0.01, 0.2, 0.05);
      window.__3D_STATE__.lampVisible = window.__lamp_model__ ? !!window.__lamp_model__.visible : window.__3D_STATE__.lampVisible;
    }

    function updateInfoPanel() {
      const s = window.__3D_STATE__;
      infoPanel.textContent =
`Mode: ${s.mode}
Plate Gap: ${s.plateGap.toFixed(2)}
Particle Count Active: ${s.activeParticleCount}
Status: ${s.running ? (s.paused ? 'paused' : 'running') : 'stopped'}
Plate A X: ${s.plateA_x.toFixed(2)}
Plate B X: ${s.plateB_x.toFixed(2)}
Plate A Z: ${s.plateA_z.toFixed(2)}
Plate B Z: ${s.plateB_z.toFixed(2)}
Plate A RotZ: ${s.plateA_rotZ.toFixed(2)}°
Lamp Loaded: ${s.lampLoaded}
Lamp Visible: ${s.lampVisible}
Point Light: ${s.pointLightIntensity.toFixed(2)}
Time: ${s.simulationTime.toFixed(2)}s`;
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = clampNumber(clock.getDelta(), 0, 0.1, 0.016);
      const s = window.__3D_STATE__;
      const speed = clampNumber(s.speed, 0.01, 0.2, 0.05);

      if (s.running && !s.paused) {
        s.simulationTime = clampNumber(s.simulationTime + dt, 0, 1e9, 0);

        if (s.mode === 'convergent') {
          if (plateA.position.x < -1) plateA.position.x += speed;
          if (plateB.position.x > 1) plateB.position.x -= speed;

          const gap = computePlateGap();
          s.collisionDetected = gap < 2;

          if (s.collisionDetected) {
            plateA.rotation.z = THREE.MathUtils.lerp(
              plateA.rotation.z,
              THREE.MathUtils.degToRad(-15),
              0.04
            );
            pointLight.intensity = THREE.MathUtils.lerp(pointLight.intensity, 3.0, 0.08);
          } else {
            plateA.rotation.z = THREE.MathUtils.lerp(plateA.rotation.z, 0, 0.05);
            pointLight.intensity = THREE.MathUtils.lerp(pointLight.intensity, 0.8, 0.05);
          }
        }

        if (s.mode === 'divergent') {
          plateA.rotation.z = THREE.MathUtils.lerp(plateA.rotation.z, 0, 0.08);
          s.collisionDetected = false;

          if (plateA.position.x > -35) plateA.position.x -= speed;
          if (plateB.position.x < 35) plateB.position.x += speed;

          pointLight.intensity = THREE.MathUtils.lerp(pointLight.intensity, 0.3, 0.08);
        }

        if (s.mode === 'transform') {
          plateA.rotation.z = THREE.MathUtils.lerp(plateA.rotation.z, 0, 0.08);
          s.collisionDetected = false;

          if (plateA.position.z < 15) plateA.position.z += speed * 0.6;
          if (plateB.position.z > -15) plateB.position.z -= speed * 0.6;

          pointLight.intensity = THREE.MathUtils.lerp(pointLight.intensity, 0.8, 0.05);
        }
      }

      plateA.position.x = clampNumber(plateA.position.x, -50, 50, -16);
      plateB.position.x = clampNumber(plateB.position.x, -50, 50, 16);
      plateA.position.z = clampNumber(plateA.position.z, -50, 50, 0);
      plateB.position.z = clampNumber(plateB.position.z, -50, 50, 0);
      plateA.rotation.z = clampNumber(plateA.rotation.z, THREE.MathUtils.degToRad(-15), THREE.MathUtils.degToRad(15), 0);

      updateParticles(dt);
      updateState();
      updateInfoPanel();

      if (window.__lamp_model__) {
        window.__lamp_model__.visible = s.lampVisible;
        if (s.mode === 'convergent' && s.collisionDetected) {
          const pulse = 1 + Math.sin(performance.now() * 0.01) * 0.06;
          window.__lamp_model__.scale.set(3 * pulse, 3 * pulse, 3 * pulse);
        } else {
          window.__lamp_model__.scale.lerp(new THREE.Vector3(3, 3, 3), 0.08);
        }
      }

      controls.update();
      renderer.render(scene, camera);
    }

    resetSimulation();
    updateState();
    updateInfoPanel();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
