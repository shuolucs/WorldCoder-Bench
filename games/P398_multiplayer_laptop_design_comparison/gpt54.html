<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laptop Design Comparison</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    #title {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }

    #statusText {
      position: absolute;
      top: 52px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 16px;
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }

    #compareResult {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffd966;
      font-size: 17px;
      text-align: center;
      z-index: 10;
      min-width: 260px;
      pointer-events: none;
    }

    button {
      position: absolute;
      bottom: 20px;
      padding: 12px 18px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.12);
      color: white;
      cursor: pointer;
      z-index: 20;
      backdrop-filter: blur(4px);
    }

    button:hover {
      background: rgba(255,255,255,0.2);
    }

    #btnCycleA {
      left: 20px;
    }

    #btnCompare {
      left: 50%;
      transform: translateX(-50%);
    }

    #btnCycleB {
      right: 20px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="title">Laptop Design Comparison</div>
    <div id="statusText">A: Slim | B: Pro</div>
    <div id="compareResult"></div>

    <button id="btnCycleA">Cycle Design A</button>
    <button id="btnCompare">Compare</button>
    <button id="btnCycleB">Cycle Design B</button>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const statusText = document.getElementById('statusText');
    const compareResult = document.getElementById('compareResult');
    const btnCycleA = document.getElementById('btnCycleA');
    const btnCycleB = document.getElementById('btnCycleB');
    const btnCompare = document.getElementById('btnCompare');

    const designs = [
      { name: 'Slim', color: '#1a1aff' },
      { name: 'Pro', color: '#ff4444' },
      { name: 'Ultra', color: '#00cc66' }
    ];

    window.__3D_STATE__ = {
      designIndexA: 0,
      designIndexB: 1,
      designNameA: designs[0].name,
      designNameB: designs[1].name,
      comparisonDone: false,
      comparisonResult: '',
      avocadoLoaded: false,
      pedestalCount: 2,
      resetCount: 0,
      sceneReady: false
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x151515);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: '#2a2a2a' })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    function createLaptopGroup(x) {
      const group = new THREE.Group();

      const pedestal = new THREE.Mesh(
        new THREE.BoxGeometry(1.5, 0.5, 1.5),
        new THREE.MeshStandardMaterial({ color: '#444444' })
      );
      pedestal.position.set(x, 0.25, 0);
      group.add(pedestal);

      const base = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 0.05, 0.8),
        new THREE.MeshStandardMaterial({ color: '#111111' })
      );
      base.position.set(x, 0.525, 0);
      group.add(base);

      const screen = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 0.8, 0.02),
        new THREE.MeshStandardMaterial({ color: '#1a1aff' })
      );
      screen.position.set(x, 0.89, -0.34);
      screen.rotation.x = THREE.MathUtils.degToRad(-70);
      group.add(screen);

      scene.add(group);

      return { group, pedestal, base, screen };
    }

    const laptopA = createLaptopGroup(-2.5);
    const laptopB = createLaptopGroup(2.5);

    function updateLaptopVisuals() {
      laptopA.screen.material.color.set(designs[window.__3D_STATE__.designIndexA].color);
      laptopB.screen.material.color.set(designs[window.__3D_STATE__.designIndexB].color);
    }

    function updateStatusText() {
      window.__3D_STATE__.designNameA = designs[window.__3D_STATE__.designIndexA].name;
      window.__3D_STATE__.designNameB = designs[window.__3D_STATE__.designIndexB].name;
      statusText.textContent = `A: ${window.__3D_STATE__.designNameA} | B: ${window.__3D_STATE__.designNameB}`;
    }

    function setComparisonResult(text, done) {
      compareResult.textContent = text;
      window.__3D_STATE__.comparisonResult = text;
      window.__3D_STATE__.comparisonDone = done;
    }

    function cycleDesignA() {
      window.__3D_STATE__.designIndexA = (window.__3D_STATE__.designIndexA + 1) % designs.length;
      updateStatusText();
      updateLaptopVisuals();
    }

    function cycleDesignB() {
      window.__3D_STATE__.designIndexB = (window.__3D_STATE__.designIndexB + 1) % designs.length;
      updateStatusText();
      updateLaptopVisuals();
    }

    function compareDesigns() {
      const designA = designs[window.__3D_STATE__.designIndexA].name;
      const designB = designs[window.__3D_STATE__.designIndexB].name;
      const result = designA === designB
        ? 'Same design selected!'
        : `Comparing: ${designA} vs ${designB}`;
      setComparisonResult(result, true);
    }

    function resetState() {
      window.__3D_STATE__.designIndexA = 0;
      window.__3D_STATE__.designIndexB = 1;
      window.__3D_STATE__.resetCount += 1;
      updateStatusText();
      updateLaptopVisuals();
      setComparisonResult('', false);
    }

    btnCycleA.addEventListener('click', cycleDesignA);
    btnCycleB.addEventListener('click', cycleDesignB);
    btnCompare.addEventListener('click', compareDesigns);

    window.addEventListener('keydown', (event) => {
      if (event.key === 'r' || event.key === 'R') {
        resetState();
      }
    });

    const loader = new GLTFLoader();
    loader.load(
      'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Avocado/glTF-Binary/Avocado.glb',
      (gltf) => {
        const avocado = gltf.scene;
        avocado.scale.set(8, 8, 8);
        avocado.position.set(0, 0.5, -3);
        scene.add(avocado);
        window.__3D_STATE__.avocadoLoaded = true;
      },
      undefined,
      (error) => {
        console.warn('Failed to load Avocado.glb:', error);
      }
    );

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    window.addEventListener('resize', onResize);

    updateStatusText();
    updateLaptopVisuals();
    window.__3D_STATE__.sceneReady = true;

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
