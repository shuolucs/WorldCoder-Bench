<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laptop Design Comparison</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #000;
  }
  canvas { display: block; }
  #title {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    pointer-events: none;
    z-index: 10;
  }
  #statusText {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    color: #cccccc;
    font-size: 16px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    pointer-events: none;
    z-index: 10;
  }
  #compareResult {
    position: absolute;
    top: 90px;
    left: 50%;
    transform: translateX(-50%);
    color: #ffdd44;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    pointer-events: none;
    z-index: 10;
  }
  .btn {
    position: absolute;
    bottom: 30px;
    padding: 12px 24px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    z-index: 10;
    transition: background 0.2s, transform 0.1s;
  }
  .btn:hover {
    transform: scale(1.05);
  }
  .btn:active {
    transform: scale(0.95);
  }
  #btnCycleA {
    left: 30px;
    background: #3366ff;
    color: white;
  }
  #btnCycleA:hover { background: #4477ff; }
  #btnCycleB {
    right: 30px;
    background: #3366ff;
    color: white;
  }
  #btnCycleB:hover { background: #4477ff; }
  #btnCompare {
    left: 50%;
    transform: translateX(-50%);
    background: #ff8800;
    color: white;
  }
  #btnCompare:hover { background: #ff9922; }
</style>
</head>
<body>

<div id="title">Laptop Design Comparison</div>
<div id="statusText">A: Slim | B: Pro</div>
<div id="compareResult"></div>
<button class="btn" id="btnCycleA">Cycle Design A</button>
<button class="btn" id="btnCompare">Compare</button>
<button class="btn" id="btnCycleB">Cycle Design B</button>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Design definitions
const designs = [
  { name: 'Slim', color: 0x1a1aff },
  { name: 'Pro', color: 0xff4444 },
  { name: 'Ultra', color: 0x00cc66 }
];

// State
window.__3D_STATE__ = {
  designIndexA: 0,
  designIndexB: 1,
  designNameA: 'Slim',
  designNameB: 'Pro',
  comparisonDone: false,
  comparisonResult: '',
  avocadoLoaded: false,
  pedestalCount: 2,
  resetCount: 0,
  sceneReady: false
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
scene.add(directionalLight);

// Ground plane
const groundGeom = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Pedestal creation
function createPedestal(x) {
  const geom = new THREE.BoxGeometry(1.5, 0.5, 1.5);
  const mat = new THREE.MeshStandardMaterial({ color: 0x444444 });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.position.set(x, 0.25, 0);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  return mesh;
}

const pedestalA = createPedestal(-2.5);
const pedestalB = createPedestal(2.5);

// Laptop creation
function createLaptop(pedestalX, designIndex) {
  const group = new THREE.Group();

  // Base
  const baseGeom = new THREE.BoxGeometry(1.2, 0.05, 0.8);
  const baseMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
  const base = new THREE.Mesh(baseGeom, baseMat);
  base.position.set(0, 0, 0);
  base.castShadow = true;
  group.add(base);

  // Screen
  const screenGeom = new THREE.BoxGeometry(1.2, 0.8, 0.02);
  const screenMat = new THREE.MeshStandardMaterial({
    color: designs[designIndex].color,
    emissive: designs[designIndex].color,
    emissiveIntensity: 0.3
  });
  const screen = new THREE.Mesh(screenGeom, screenMat);
  // Position screen at the back edge of the base (hinge), then rotate
  screen.rotation.x = -70 * (Math.PI / 180);
  // The hinge is at the back of the base: z = -0.4 (half of 0.8)
  // After rotation, we need to position the screen so it hinges from the back edge
  const hingeY = 0.025; // top of base
  const hingeZ = -0.4; // back edge of base
  // The screen pivot is at its bottom edge, so offset by half height
  screen.position.set(0, hingeY + Math.cos(70 * Math.PI / 180) * 0.4, hingeZ - Math.sin(70 * Math.PI / 180) * 0.4);
  screen.castShadow = true;
  group.add(screen);

  group.position.set(pedestalX, 0.525, 0);
  scene.add(group);

  return { group, base, screen, screenMat };
}

let laptopA = createLaptop(-2.5, 0);
let laptopB = createLaptop(2.5, 1);

// Labels above pedestals
function createLabel(text, x) {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'transparent';
  ctx.fillRect(0, 0, 256, 64);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 32px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(text, 128, 42);

  const texture = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.set(x, 2.0, 0);
  sprite.scale.set(2, 0.5, 1);
  scene.add(sprite);
  return sprite;
}

createLabel('Reviewer A', -2.5);
createLabel('Reviewer B', 2.5);

// Load Avocado model
const loader = new GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Avocado/glTF-Binary/Avocado.glb',
  (gltf) => {
    const model = gltf.scene;
    model.scale.set(8, 8, 8);
    model.position.set(0, 0.5, -3);
    model.castShadow = true;
    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
      }
    });
    scene.add(model);
    window.__3D_STATE__.avocadoLoaded = true;
  },
  undefined,
  (error) => {
    console.warn('Could not load Avocado.glb:', error);
    // Create a placeholder sphere
    const placeholder = new THREE.Mesh(
      new THREE.SphereGeometry(0.5, 32, 32),
      new THREE.MeshStandardMaterial({ color: 0x567d46 })
    );
    placeholder.position.set(0, 0.5, -3);
    scene.add(placeholder);
    window.__3D_STATE__.avocadoLoaded = true;
  }
);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1, 0);
controls.update();

// UI references
const statusText = document.getElementById('statusText');
const compareResult = document.getElementById('compareResult');
const btnCycleA = document.getElementById('btnCycleA');
const btnCycleB = document.getElementById('btnCycleB');
const btnCompare = document.getElementById('btnCompare');

function updateStatus() {
  const state = window.__3D_STATE__;
  statusText.textContent = `A: ${state.designNameA} | B: ${state.designNameB}`;
}

function updateLaptopDesign(laptop, designIndex) {
  const design = designs[designIndex];
  laptop.screenMat.color.set(design.color);
  laptop.screenMat.emissive.set(design.color);
  laptop.screenMat.needsUpdate = true;
}

// Cycle Design A
btnCycleA.addEventListener('click', () => {
  const state = window.__3D_STATE__;
  state.designIndexA = (state.designIndexA + 1) % designs.length;
  state.designNameA = designs[state.designIndexA].name;
  updateLaptopDesign(laptopA, state.designIndexA);
  updateStatus();
});

// Cycle Design B
btnCycleB.addEventListener('click', () => {
  const state = window.__3D_STATE__;
  state.designIndexB = (state.designIndexB + 1) % designs.length;
  state.designNameB = designs[state.designIndexB].name;
  updateLaptopDesign(laptopB, state.designIndexB);
  updateStatus();
});

// Compare
btnCompare.addEventListener('click', () => {
  const state = window.__3D_STATE__;
  state.comparisonDone = true;
  if (state.designIndexA === state.designIndexB) {
    state.comparisonResult = 'Same design selected!';
  } else {
    state.comparisonResult = `Comparing: ${state.designNameA} vs ${state.designNameB}`;
  }
  compareResult.textContent = state.comparisonResult;
});

// Reset with R key
document.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') {
    const state = window.__3D_STATE__;
    state.designIndexA = 0;
    state.designIndexB = 1;
    state.designNameA = 'Slim';
    state.designNameB = 'Pro';
    state.comparisonDone = false;
    state.comparisonResult = '';
    state.resetCount++;

    updateLaptopDesign(laptopA, 0);
    updateLaptopDesign(laptopB, 1);
    updateStatus();
    compareResult.textContent = '';
  }
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // Gentle floating animation for laptops
  const time = Date.now() * 0.001;
  laptopA.group.position.y = 0.525 + Math.sin(time * 1.5) * 0.03;
  laptopB.group.position.y = 0.525 + Math.sin(time * 1.5 + Math.PI) * 0.03;

  renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Mark scene as ready
window.__3D_STATE__.sceneReady = true;

animate();
</script>
</body>
</html>
