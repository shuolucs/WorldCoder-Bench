<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Design Comparison</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
        }
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }
        #title {
            margin-top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #statusText {
            margin-top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 18px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        #compareResult {
            margin-top: 15px;
            width: 100%;
            text-align: center;
            color: #ffdd00;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            min-height: 24px;
        }
        .controls-bottom {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            pointer-events: none;
        }
        button {
            pointer-events: auto;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: #333;
            color: white;
            border: 2px solid #555;
            border-radius: 8px;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:hover {
            background: #4a4a4a;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 3px rgba(0,0,0,0.3);
        }
        #btnCompare {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: auto;
            background: #0066cc;
            border-color: #0088ff;
        }
        #btnCompare:hover {
            background: #0077ee;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <div id="title">Laptop Design Comparison</div>
        <div id="statusText">A: Slim | B: Pro</div>
        <div id="compareResult"></div>
        
        <div class="controls-bottom">
            <button id="btnCycleA">Cycle Design A</button>
            <button id="btnCycleB">Cycle Design B</button>
        </div>
        <button id="btnCompare">Compare</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            designIndexA: 0,
            designIndexB: 1,
            designNameA: 'Slim',
            designNameB: 'Pro',
            comparisonDone: false,
            comparisonResult: '',
            avocadoLoaded: false,
            pedestalCount: 2,
            resetCount: 0,
            sceneReady: false
        };

        const designs = [
            { name: 'Slim', color: 0x1a1aff },
            { name: 'Pro', color: 0xff4444 },
            { name: 'Ultra', color: 0x00cc66 }
        ];

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Materials
        const pedestalMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.7 });
        const laptopBaseMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });
        
        let screenMatA, screenMatB;

        function createLaptopSetup(x, z, initialDesignIndex, isA) {
            const group = new THREE.Group();

            // Pedestal
            const pedestalGeo = new THREE.BoxGeometry(1.5, 0.5, 1.5);
            const pedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
            pedestal.position.set(x, 0.25, z);
            pedestal.castShadow = true;
            pedestal.receiveShadow = true;
            group.add(pedestal);

            // Laptop Base
            const baseGeo = new THREE.BoxGeometry(1.2, 0.05, 0.8);
            const base = new THREE.Mesh(baseGeo, laptopBaseMat);
            base.position.set(x, 0.525, z);
            base.castShadow = true;
            group.add(base);

            // Laptop Screen
            const screenMat = new THREE.MeshStandardMaterial({ 
                color: designs[initialDesignIndex].color,
                roughness: 0.2,
                metalness: 0.1
            });
            
            if (isA) screenMatA = screenMat;
            else screenMatB = screenMat;

            const screenGeo = new THREE.BoxGeometry(1.2, 0.8, 0.02);
            const screen = new THREE.Mesh(screenGeo, screenMat);
            screen.castShadow = true;

            // Hinge mechanism
            const hinge = new THREE.Group();
            hinge.position.set(x, 0.55, z - 0.4); // Back edge of the base
            
            screen.position.set(0, 0.4, 0); // Move screen up so bottom is at hinge
            hinge.add(screen);
            
            hinge.rotation.x = -70 * (Math.PI / 180);
            group.add(hinge);

            scene.add(group);
        }

        // Create Pedestals and Laptops
        createLaptopSetup(-2.5, 0, window.__3D_STATE__.designIndexA, true);
        createLaptopSetup(2.5, 0, window.__3D_STATE__.designIndexB, false);

        // Load Avocado Model
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Avocado/glTF-Binary/Avocado.glb',
            function (gltf) {
                const avocado = gltf.scene;
                avocado.scale.set(8, 8, 8);
                avocado.position.set(0, 0.5, -3);
                
                avocado.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                scene.add(avocado);
                window.__3D_STATE__.avocadoLoaded = true;
            },
            undefined,
            function (error) {
                console.error('Error loading Avocado model:', error);
            }
        );

        // UI Elements
        const statusText = document.getElementById('statusText');
        const compareResult = document.getElementById('compareResult');
        const btnCycleA = document.getElementById('btnCycleA');
        const btnCycleB = document.getElementById('btnCycleB');
        const btnCompare = document.getElementById('btnCompare');

        function updateUI() {
            const state = window.__3D_STATE__;
            statusText.innerText = `A: ${state.designNameA} | B: ${state.designNameB}`;
            compareResult.innerText = state.comparisonResult;
            
            screenMatA.color.setHex(designs[state.designIndexA].color);
            screenMatB.color.setHex(designs[state.designIndexB].color);
        }

        // Interactions
        btnCycleA.addEventListener('click', () => {
            const state = window.__3D_STATE__;
            state.designIndexA = (state.designIndexA + 1) % 3;
            state.designNameA = designs[state.designIndexA].name;
            updateUI();
        });

        btnCycleB.addEventListener('click', () => {
            const state = window.__3D_STATE__;
            state.designIndexB = (state.designIndexB + 1) % 3;
            state.designNameB = designs[state.designIndexB].name;
            updateUI();
        });

        btnCompare.addEventListener('click', () => {
            const state = window.__3D_STATE__;
            state.comparisonDone = true;
            if (state.designIndexA === state.designIndexB) {
                state.comparisonResult = 'Same design selected!';
            } else {
                state.comparisonResult = `Comparing: ${state.designNameA} vs ${state.designNameB}`;
            }
            updateUI();
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                const state = window.__3D_STATE__;
                state.designIndexA = 0;
                state.designNameA = designs[0].name;
                state.designIndexB = 1;
                state.designNameB = designs[1].name;
                state.comparisonDone = false;
                state.comparisonResult = '';
                state.resetCount++;
                updateUI();
            }
        });

        window.addEventListener('resize', onWindowResize, false);

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.__3D_STATE__.sceneReady = true;

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
