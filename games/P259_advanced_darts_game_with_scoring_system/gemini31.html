<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 3D Darts - 501</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a3d1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-panel {
            position: absolute;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: auto;
        }
        #top-left { top: 20px; left: 20px; }
        #top-right { top: 20px; right: 20px; text-align: right; }
        #bottom-center {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 1.2em;
        }
        #power-meter-container {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            width: 30px;
            height: 200px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #fff;
            border-radius: 15px;
            overflow: hidden;
        }
        #power-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, #ff0000, #ffff00, #00ff00, #ffff00, #ff0000);
            transition: height 0.05s linear;
        }
        #power-marker {
            position: absolute;
            top: 50%;
            left: -5px;
            width: 40px;
            height: 4px;
            background: white;
            z-index: 2;
        }
        #wind-indicator {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .arrow { font-size: 1.5em; }
        #crosshair {
            position: absolute;
            width: 30px;
            height: 30px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before { top: 14px; left: 0; width: 30px; height: 2px; }
        #crosshair::after { top: 0; left: 14px; width: 2px; height: 30px; }
        
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            margin-top: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            pointer-events: auto;
        }
        button:hover { background: #45a049; }
        #checkoutHint { color: #ffeb3b; font-weight: bold; margin-top: 5px; }
        .stat-value { font-size: 1.5em; font-weight: bold; color: #fff; }
        .bust-text { color: #f44336; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="crosshair" style="left: 50%; top: 50%;"></div>
        
        <div id="top-left" class="hud-panel">
            <div>Score: <span id="ui-score" class="stat-value">501</span></div>
            <div>Round: <span id="ui-round">1</span></div>
            <div>Darts Left: <span id="ui-darts-left">3</span></div>
            <div id="checkoutHint"></div>
            <button id="newGameBtn">New Game</button>
        </div>

        <div id="top-right" class="hud-panel">
            <div>Last Throw: <span id="ui-last-throw" class="stat-value">--</span></div>
            <div>Round Score: <span id="ui-round-score">0</span></div>
            <div id="ui-bust-msg" class="bust-text" style="display:none;">BUST!</div>
            <button id="clearBoardBtn">Clear Board</button>
        </div>

        <div id="wind-indicator">
            Wind: <span id="ui-wind-dir" class="arrow">→</span> <span id="ui-wind-str">0</span>
        </div>

        <div id="power-meter-container">
            <div id="power-fill"></div>
            <div id="power-marker"></div>
        </div>

        <div id="bottom-center" class="hud-panel">
            <span id="ui-instruction">Press SPACE to lock power, then CLICK to throw</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            score: 501,
            round: 1,
            dartsLeft: 3,
            dartsThrown: 0,
            lastThrowScore: 0,
            lastThrowZone: '--',
            roundScore: 0,
            isBust: false,
            powerLocked: false,
            powerValue: 50,
            windDirection: 'right',
            windStrength: 0,
            foxCelebrating: false,
            foxShaking: false,
            gameOver: false,
            dartsOnBoard: 0,
            throwInProgress: false,
            aimX: 0,
            aimY: 0,
            lastLandX: 0,
            lastLandY: 0,
            checkoutSuggestion: ''
        };

        let startOfRoundScore = 501;
        const SECTORS = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a3d1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 6);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        scene.add(dirLight);

        // --- Dartboard Generation ---
        function createDartboardTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            const cx = 512, cy = 512;
            const scale = 512 / 1.5; // 1.5 units = 512px

            // Radii in pixels
            const rDoubleOut = 1.5 * scale;
            const rDoubleIn = 1.3 * scale;
            const rOuterSingleIn = 0.95 * scale;
            const rTripleIn = 0.8 * scale;
            const rInnerSingleIn = 0.35 * scale;
            const rOuterBull = 0.15 * scale; // Wait, spec says Bullseye <= 0.15, Inner Bull <= 0.35.
            // Let's adjust to standard visual proportions while keeping spec logic for scoring.
            // Spec: Bullseye <= 0.15 (50), Inner Bull <= 0.35 (25).
            const rBullseye = 0.15 * scale;
            const rInnerBull = 0.35 * scale;

            ctx.fillStyle = '#222';
            ctx.fillRect(0, 0, 1024, 1024);

            const drawRing = (outerR, innerR, isDoubleTriple) => {
                for (let i = 0; i < 20; i++) {
                    const angleStart = (i - 0.5) * (Math.PI * 2 / 20) - Math.PI / 2;
                    const angleEnd = (i + 0.5) * (Math.PI * 2 / 20) - Math.PI / 2;
                    
                    ctx.beginPath();
                    ctx.arc(cx, cy, outerR, angleStart, angleEnd);
                    ctx.arc(cx, cy, innerR, angleEnd, angleStart, true);
                    ctx.closePath();

                    if (isDoubleTriple) {
                        ctx.fillStyle = i % 2 === 0 ? '#e53935' : '#43a047'; // Red/Green
                    } else {
                        ctx.fillStyle = i % 2 === 0 ? '#111' : '#eee'; // Black/White
                    }
                    ctx.fill();
                    ctx.strokeStyle = '#ccc';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            };

            // Draw from outside in
            drawRing(rDoubleOut, rDoubleIn, true); // Double
            drawRing(rDoubleIn, rOuterSingleIn, false); // Outer Single
            drawRing(rOuterSingleIn, rTripleIn, true); // Triple
            drawRing(rTripleIn, rInnerBull, false); // Inner Single

            // Inner Bull (25) - Green visually
            ctx.beginPath();
            ctx.arc(cx, cy, rInnerBull, 0, Math.PI * 2);
            ctx.fillStyle = '#43a047';
            ctx.fill();
            ctx.stroke();

            // Bullseye (50) - Red visually
            ctx.beginPath();
            ctx.arc(cx, cy, rBullseye, 0, Math.PI * 2);
            ctx.fillStyle = '#e53935';
            ctx.fill();
            ctx.stroke();

            // Numbers
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let i = 0; i < 20; i++) {
                const angle = i * (Math.PI * 2 / 20) - Math.PI / 2;
                const rText = rDoubleOut + 30;
                const tx = cx + Math.cos(angle) * rText;
                const ty = cy + Math.sin(angle) * rText;
                ctx.fillText(SECTORS[i].toString(), tx, ty);
            }

            return new THREE.CanvasTexture(canvas);
        }

        const boardGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.1, 64);
        boardGeo.rotateX(Math.PI / 2);
        const boardMat = new THREE.MeshStandardMaterial({ 
            map: createDartboardTexture(),
            roughness: 0.8
        });
        const boardSideMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        const dartboard = new THREE.Mesh(boardGeo, [boardSideMat, boardMat, boardSideMat]);
        dartboard.position.set(0, 2, -5);
        dartboard.receiveShadow = true;
        dartboard.castShadow = true;
        scene.add(dartboard);

        // Wall behind board
        const wallGeo = new THREE.PlaneGeometry(20, 15);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x3e2723, roughness: 0.9 });
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(0, 2, -5.1);
        wall.receiveShadow = true;
        scene.add(wall);

        // --- Fox Mascot ---
        let foxMixer, foxActionIdle;
        let foxModel;
        let foxAnimState = { type: 'idle', time: 0, startY: 0, startRotY: 0 };

        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Fox/glTF-Binary/Fox.glb', (gltf) => {
            foxModel = gltf.scene;
            foxModel.position.set(3, 0, -3);
            foxModel.scale.set(0.02, 0.02, 0.02);
            foxModel.traverse(child => { if (child.isMesh) child.castShadow = true; });
            scene.add(foxModel);

            foxMixer = new THREE.AnimationMixer(foxModel);
            if (gltf.animations.length > 0) {
                foxActionIdle = foxMixer.clipAction(gltf.animations[0]);
                foxActionIdle.play();
            }
        });

        function triggerFoxCelebrate() {
            if (!foxModel) return;
            window.__3D_STATE__.foxCelebrating = true;
            foxAnimState = { 
                type: 'celebrate', 
                time: 0, 
                startY: foxModel.position.y, 
                startRotY: foxModel.rotation.y 
            };
        }

        function triggerFoxShake() {
            if (!foxModel) return;
            window.__3D_STATE__.foxShaking = true;
            foxAnimState = { 
                type: 'shake', 
                time: 0, 
                startY: foxModel.position.y, 
                startRotY: foxModel.rotation.y 
            };
        }

        function updateFox(dt) {
            if (foxMixer) foxMixer.update(dt);
            if (!foxModel) return;

            if (foxAnimState.type === 'celebrate') {
                foxAnimState.time += dt;
                const t = foxAnimState.time / 1.0; // 1 second duration
                if (t >= 1) {
                    foxModel.position.y = foxAnimState.startY;
                    foxModel.rotation.y = foxAnimState.startRotY;
                    foxAnimState.type = 'idle';
                    window.__3D_STATE__.foxCelebrating = false;
                } else {
                    // Jump up 1 unit and spin 360
                    foxModel.position.y = foxAnimState.startY + Math.sin(t * Math.PI) * 1.0;
                    foxModel.rotation.y = foxAnimState.startRotY + t * Math.PI * 2;
                }
            } else if (foxAnimState.type === 'shake') {
                foxAnimState.time += dt;
                const t = foxAnimState.time / 0.5; // 0.5s duration
                if (t >= 1) {
                    foxModel.rotation.y = foxAnimState.startRotY;
                    foxAnimState.type = 'idle';
                    window.__3D_STATE__.foxShaking = false;
                } else {
                    // Shake Y ±15 deg (0.26 rad)
                    foxModel.rotation.y = foxAnimState.startRotY + Math.sin(t * Math.PI * 6) * 0.26;
                }
            }
        }

        // --- Darts ---
        const darts = [];
        let activeDart = null;
        let throwAnim = null;

        function createDart() {
            const group = new THREE.Group();
            
            // Shaft
            const shaftGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.4, 8);
            shaftGeo.rotateX(Math.PI / 2);
            const shaftMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
            const shaft = new THREE.Mesh(shaftGeo, shaftMat);
            shaft.position.z = 0.2;
            group.add(shaft);

            // Tip
            const tipGeo = new THREE.ConeGeometry(0.02, 0.1, 8);
            tipGeo.rotateX(-Math.PI / 2);
            const tipMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, metalness: 0.8, roughness: 0.2 });
            const tip = new THREE.Mesh(tipGeo, tipMat);
            tip.position.z = -0.05;
            group.add(tip);

            // Fins
            const finGeo = new THREE.PlaneGeometry(0.1, 0.15);
            const finMat = new THREE.MeshStandardMaterial({ color: 0xff0000, side: THREE.DoubleSide });
            const fin1 = new THREE.Mesh(finGeo, finMat);
            fin1.position.z = 0.35;
            fin1.rotation.y = Math.PI / 2;
            const fin2 = new THREE.Mesh(finGeo, finMat);
            fin2.position.z = 0.35;
            fin2.rotation.x = Math.PI / 2;
            group.add(fin1);
            group.add(fin2);

            group.castShadow = true;
            return group;
        }

        function prepareDart() {
            if (window.__3D_STATE__.dartsLeft > 0 && !window.__3D_STATE__.gameOver) {
                activeDart = createDart();
                activeDart.position.set(0, 2, 5);
                scene.add(activeDart);
            } else {
                activeDart = null;
            }
        }

        // --- Input & Aiming ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const aimPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 5); // z = -5
        const crosshairEl = document.getElementById('crosshair');

        window.addEventListener('mousemove', (e) => {
            if (window.__3D_STATE__.throwInProgress || window.__3D_STATE__.gameOver) return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const target = new THREE.Vector3();
            raycaster.ray.intersectPlane(aimPlane, target);

            if (target) {
                window.__3D_STATE__.aimX = target.x;
                window.__3D_STATE__.aimY = target.y;
                
                // Project back to screen for crosshair
                const screenPos = target.clone().project(camera);
                const x = (screenPos.x * .5 + .5) * window.innerWidth;
                const y = (screenPos.y * -.5 + .5) * window.innerHeight;
                crosshairEl.style.left = `${x}px`;
                crosshairEl.style.top = `${y}px`;
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !window.__3D_STATE__.throwInProgress && !window.__3D_STATE__.gameOver) {
                window.__3D_STATE__.powerLocked = !window.__3D_STATE__.powerLocked;
            }
        });

        window.addEventListener('mousedown', (e) => {
            if (e.button === 0 && activeDart && !window.__3D_STATE__.throwInProgress && window.__3D_STATE__.powerLocked) {
                throwDart();
            }
        });

        // --- Game Logic ---
        function calculateScore(x, y) {
            const dx = x;
            const dy = y - 2; // Board center is at y=2
            const radius = Math.sqrt(dx * dx + dy * dy);
            
            if (radius > 1.5) return { score: 0, zone: 'MISS', multiplier: 0 };

            if (radius <= 0.15) return { score: 50, zone: 'BULL', multiplier: 2 }; // Bullseye counts as double for checkout
            if (radius <= 0.35) return { score: 25, zone: 'INNER_BULL', multiplier: 1 };

            let angle = Math.atan2(dy, dx);
            // Adjust angle so top center (PI/2) aligns with sector 20
            angle = (Math.PI / 2 - angle + Math.PI * 2) % (Math.PI * 2);
            const sectorIndex = Math.floor((angle + Math.PI / 20) / (Math.PI * 2 / 20)) % 20;
            const sectorValue = SECTORS[sectorIndex];

            if (radius > 1.3 && radius <= 1.5) return { score: sectorValue * 2, zone: `D${sectorValue}`, multiplier: 2 };
            if (radius > 0.8 && radius <= 0.95) return { score: sectorValue * 3, zone: `T${sectorValue}`, multiplier: 3 };
            if (radius > 0.95 && radius <= 1.3) return { score: sectorValue, zone: `S${sectorValue}`, multiplier: 1 };
            if (radius > 0.35 && radius <= 0.8) return { score: sectorValue, zone: `S${sectorValue}`, multiplier: 1 };

            return { score: 0, zone: 'MISS', multiplier: 0 };
        }

        function getCheckoutSuggestion(score) {
            if (score > 170 || score < 2) return '';
            if (score === 50) return 'BULL';
            if (score <= 40 && score % 2 === 0) return `D${score / 2}`;
            
            // Simple greedy for 2 darts
            for (let i = 0; i < 20; i++) {
                const s = SECTORS[i];
                // Try single
                let rem = score - s;
                if (rem <= 40 && rem % 2 === 0 && rem > 0) return `S${s} -> D${rem/2}`;
                if (rem === 50) return `S${s} -> BULL`;
                // Try triple
                rem = score - (s * 3);
                if (rem <= 40 && rem % 2 === 0 && rem > 0) return `T${s} -> D${rem/2}`;
                if (rem === 50) return `T${s} -> BULL`;
            }
            return '...';
        }

        function setWind() {
            window.__3D_STATE__.windStrength = Math.floor(Math.random() * 6);
            window.__3D_STATE__.windDirection = Math.random() > 0.5 ? 'left' : 'right';
        }

        function throwDart() {
            window.__3D_STATE__.throwInProgress = true;
            window.__3D_STATE__.dartsThrown++;
            
            let tx = window.__3D_STATE__.aimX;
            let ty = window.__3D_STATE__.aimY;

            // Base accuracy offset
            tx += (Math.random() - 0.5) * 0.2;
            ty += (Math.random() - 0.5) * 0.2;

            // Power offset
            const p = window.__3D_STATE__.powerValue;
            if (p < 30) {
                tx += (Math.random() - 0.5) * 0.4;
                ty += (Math.random() - 0.5) * 0.4;
            } else if (p > 80) {
                tx += (Math.random() - 0.5) * 0.3;
                ty += (Math.random() - 0.5) * 0.3;
            }

            // Wind offset
            const windDirMult = window.__3D_STATE__.windDirection === 'left' ? -1 : 1;
            tx += windDirMult * window.__3D_STATE__.windStrength * 0.05;

            const startPos = activeDart.position.clone();
            const endPos = new THREE.Vector3(tx, ty, -5);

            throwAnim = {
                dart: activeDart,
                start: startPos,
                end: endPos,
                time: 0,
                duration: 0.3
            };
        }

        function handleDartLanded(dart, x, y) {
            window.__3D_STATE__.throwInProgress = false;
            window.__3D_STATE__.lastLandX = x;
            window.__3D_STATE__.lastLandY = y;
            window.__3D_STATE__.dartsLeft--;
            darts.push(dart);
            window.__3D_STATE__.dartsOnBoard = darts.length;

            const hit = calculateScore(x, y);
            window.__3D_STATE__.lastThrowScore = hit.score;
            window.__3D_STATE__.lastThrowZone = hit.zone;

            if (hit.score === 50) triggerFoxCelebrate();
            else if (hit.score === 0) triggerFoxShake();

            const newScore = window.__3D_STATE__.score - hit.score;
            let bust = false;

            if (newScore < 0 || newScore === 1) {
                bust = true;
            } else if (newScore === 0) {
                if (hit.multiplier === 2) {
                    // Win
                    window.__3D_STATE__.score = 0;
                    window.__3D_STATE__.gameOver = true;
                    window.__3D_STATE__.roundScore += hit.score;
                } else {
                    bust = true;
                }
            }

            if (bust) {
                window.__3D_STATE__.isBust = true;
                window.__3D_STATE__.score = startOfRoundScore;
                window.__3D_STATE__.dartsLeft = 0; // End round
            } else if (!window.__3D_STATE__.gameOver) {
                window.__3D_STATE__.score = newScore;
                window.__3D_STATE__.roundScore += hit.score;
            }

            window.__3D_STATE__.checkoutSuggestion = getCheckoutSuggestion(window.__3D_STATE__.score);

            if (window.__3D_STATE__.dartsLeft === 0 && !window.__3D_STATE__.gameOver) {
                // Round over handled by clear board button
                document.getElementById('ui-instruction').innerText = "Round over. Click 'Clear Board'";
            } else if (!window.__3D_STATE__.gameOver) {
                window.__3D_STATE__.powerLocked = false;
                prepareDart();
            } else {
                document.getElementById('ui-instruction').innerText = "GAME OVER! You Win!";
            }
        }

        // --- UI Actions ---
        document.getElementById('newGameBtn').addEventListener('click', () => {
            window.__3D_STATE__.score = 501;
            window.__3D_STATE__.round = 1;
            window.__3D_STATE__.dartsLeft = 3;
            window.__3D_STATE__.dartsThrown = 0;
            window.__3D_STATE__.lastThrowScore = 0;
            window.__3D_STATE__.lastThrowZone = '--';
            window.__3D_STATE__.roundScore = 0;
            window.__3D_STATE__.isBust = false;
            window.__3D_STATE__.powerLocked = false;
            window.__3D_STATE__.gameOver = false;
            window.__3D_STATE__.checkoutSuggestion = '';
            startOfRoundScore = 501;
            setWind();
            clearBoard();
        });

        document.getElementById('clearBoardBtn').addEventListener('click', clearBoard);

        function clearBoard() {
            if (window.__3D_STATE__.throwInProgress) return;
            
            darts.forEach(d => scene.remove(d));
            darts.length = 0;
            window.__3D_STATE__.dartsOnBoard = 0;

            if (window.__3D_STATE__.dartsLeft === 0 && !window.__3D_STATE__.gameOver) {
                window.__3D_STATE__.round++;
                window.__3D_STATE__.dartsLeft = 3;
                window.__3D_STATE__.roundScore = 0;
                window.__3D_STATE__.isBust = false;
                startOfRoundScore = window.__3D_STATE__.score;
                setWind();
            }
            
            window.__3D_STATE__.powerLocked = false;
            if (activeDart) scene.remove(activeDart);
            prepareDart();
        }

        // --- Main Loop ---
        const clock = new THREE.Clock();
        setWind();
        prepareDart();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            // Update Fox
            updateFox(dt);

            // Update Power Meter
            if (!window.__3D_STATE__.powerLocked && !window.__3D_STATE__.gameOver) {
                window.__3D_STATE__.powerValue = Math.sin(Date.now() / 500) * 50 + 50;
            }

            // Update Dart Throw Animation
            if (throwAnim) {
                throwAnim.time += dt;
                let t = throwAnim.time / throwAnim.duration;
                if (t >= 1) {
                    t = 1;
                    throwAnim.dart.position.copy(throwAnim.end);
                    handleDartLanded(throwAnim.dart, throwAnim.end.x, throwAnim.end.y);
                    throwAnim = null;
                } else {
                    const currentPos = new THREE.Vector3().lerpVectors(throwAnim.start, throwAnim.end, t);
                    // Parabolic arc
                    currentPos.y += Math.sin(t * Math.PI) * 0.3;
                    
                    // Look at next position for rotation
                    const nextT = Math.min(1, t + 0.01);
                    const nextPos = new THREE.Vector3().lerpVectors(throwAnim.start, throwAnim.end, nextT);
                    nextPos.y += Math.sin(nextT * Math.PI) * 0.3;
                    
                    throwAnim.dart.position.copy(currentPos);
                    throwAnim.dart.lookAt(nextPos);
                }
            }

            // Render
            renderer.render(scene, camera);

            // Update DOM UI
            const state = window.__3D_STATE__;
            document.getElementById('ui-score').innerText = isNaN(state.score) ? '0' : state.score;
            document.getElementById('ui-round').innerText = isNaN(state.round) ? '1' : state.round;
            document.getElementById('ui-darts-left').innerText = isNaN(state.dartsLeft) ? '0' : state.dartsLeft;
            document.getElementById('ui-last-throw').innerText = state.lastThrowZone || '--';
            document.getElementById('ui-round-score').innerText = isNaN(state.roundScore) ? '0' : state.roundScore;
            document.getElementById('checkoutHint').innerText = state.checkoutSuggestion ? `Checkout: ${state.checkoutSuggestion}` : '';
            
            document.getElementById('ui-bust-msg').style.display = state.isBust ? 'block' : 'none';
            
            document.getElementById('power-fill').style.height = `${isNaN(state.powerValue) ? 50 : state.powerValue}%`;
            document.getElementById('power-marker').style.top = `${100 - (isNaN(state.powerValue) ? 50 : state.powerValue)}%`;
            
            document.getElementById('ui-wind-dir').innerText = state.windDirection === 'left' ? '←' : '→';
            document.getElementById('ui-wind-str').innerText = isNaN(state.windStrength) ? '0' : state.windStrength;

            if (!state.gameOver && state.dartsLeft > 0 && !state.throwInProgress) {
                document.getElementById('ui-instruction').innerText = state.powerLocked ? "CLICK to throw!" : "Press SPACE to lock power";
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
