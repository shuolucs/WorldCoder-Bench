// ============ DARTBOARD CREATION ============
function createDartboard() {
  const boardGroup = new THREE.Group();
  boardGroup.position.copy(BOARD_POS);

  // Back cylinder
  const backGeo = new THREE.CylinderGeometry(1.6, 1.6, 0.1, 64);
  const backMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
  const backMesh = new THREE.Mesh(backGeo, backMat);
  backMesh.rotation.x = Math.PI / 2;
  backMesh.receiveShadow = true;
  boardGroup.add(backMesh);

  // Create board face using canvas texture
  const canvas = document.createElement('canvas');
  canvas.width = 1024;
  canvas.height = 1024;
  const ctx = canvas.getContext('2d');
  const cx = 512, cy = 512;
  const scale = 512 / 1.6; // pixels per unit

  // Radii in board units
  const radii = {
    doubleOuter: 1.5,
    doubleInner: 1.3,
    tripleOuter: 0.95,
    tripleInner: 0.8,
    innerBull: 0.35,
    bullseye: 0.15,
    boardEdge: 1.6
  };

  // Fill background black
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(cx, cy, radii.boardEdge * scale, 0, Math.PI * 2);
  ctx.fill();

  // Draw sectors
  const sectorAngle = Math.PI * 2 / 20;
  // Sector 20 is at top, each sector spans sectorAngle
  // The first sector (20) starts at -PI/2 - sectorAngle/2

  for (let i = 0; i < 20; i++) {
    const startAngle = -Math.PI / 2 - sectorAngle / 2 + i * sectorAngle;
    const endAngle = startAngle + sectorAngle;
    const isEven = i % 2 === 0;

    // Double ring
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radii.doubleOuter * scale, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = isEven ? '#e74c3c' : '#27ae60';
    ctx.fill();

    // Outer single
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radii.doubleInner * scale, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = isEven ? '#111' : '#f5f5dc';
    ctx.fill();

    // Triple ring
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radii.tripleOuter * scale, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = isEven ? '#e74c3c' : '#27ae60';
    ctx.fill();

    // Inner single
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radii.tripleInner * scale, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = isEven ? '#111' : '#f5f5dc';
    ctx.fill();
  }

  // Inner bull
  ctx.beginPath();
  ctx.arc(cx, cy, radii.innerBull * scale, 0, Math.PI * 2);
  ctx.fillStyle = '#27ae60';
  ctx.fill();

  // Bullseye
  ctx.beginPath();
  ctx.arc(cx, cy, radii.bullseye * scale, 0, Math.PI * 2);
  ctx.fillStyle = '#e74c3c';
  ctx.fill();

  // Wire lines
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 20; i++) {
    const angle = -Math.PI / 2 - sectorAngle / 2 + i * sectorAngle;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle) * radii.innerBull * scale, cy + Math.sin(angle) * radii.innerBull * scale);
    ctx.lineTo(cx + Math.cos(angle) * radii.doubleOuter * scale, cy + Math.sin(angle) * radii.doubleOuter * scale);
    ctx.stroke();
  }

  // Ring wires
  [radii.bullseye, radii.innerBull, radii.tripleInner, radii.tripleOuter, radii.doubleInner, radii.doubleOuter].forEach(r => {
    ctx.beginPath();
    ctx.arc(cx, cy, r * scale, 0, Math.PI * 2);
    ctx.stroke();
  });

  // Number labels
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 36px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < 20; i++) {
    const angle = -Math.PI / 2 + i * sectorAngle;
    const r = (radii.doubleOuter + 0.07) * scale;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    ctx.fillText(SECTOR_ORDER[i].toString(), x, y);
  }

  const texture = new THREE.CanvasTexture(canvas);
  texture.colorSpace = THREE.SRGBColorSpace;

  const faceGeo = new THREE.CircleGeometry(1.6, 64);
  const faceMat = new THREE.MeshStandardMaterial({ map: texture });
  const faceMesh = new THREE.Mesh(faceGeo, faceMat);
  faceMesh.position.z = 0.051;
  faceMesh.receiveShadow = true;
  boardGroup.add(faceMesh);

  // Surround ring
  const surroundGeo = new THREE.TorusGeometry(1.6, 0.08, 16, 64);
  const surroundMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
  const surroundMesh = new THREE.Mesh(surroundGeo, surroundMat);
  surroundMesh.position.z = 0.05;
  boardGroup.add(surroundMesh);

  scene.add(boardGroup);
  return boardGroup;
}

// ============ DART CREATION ============
function createDart() {
  const dartGroup = new THREE.Group();

  // Shaft
  const shaftGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.3, 8);
  const shaftMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
  const shaft = new THREE.Mesh(shaftGeo, shaftMat);
  shaft.rotation.x = Math.PI / 2;
  shaft.position.z = 0.05;
  shaft.castShadow = true;
  dartGroup.add(shaft);

  // Tip (cone)
  const tipGeo = new THREE.ConeGeometry(0.012, 0.12, 8);
  const tipMat = new THREE.MeshStandardMaterial({ color: 0xC0C0C0, metalness: 0.8, roughness: 0.2 });
  const tip = new THREE.Mesh(tipGeo, tipMat);
  tip.rotation.x = Math.PI / 2;
  tip.position.z = -0.15;
  tip.castShadow = true;
  dartGroup.add(tip);

  // Fins
  const finGeo = new THREE.BoxGeometry(0.06, 0.04, 0.001);
  const finMat = new THREE.MeshStandardMaterial({ color: 0xe74c3c });
  for (let i = 0; i < 3; i++) {
    const fin = new THREE.Mesh(finGeo, finMat);
    fin.position.z = 0.2;
    fin.position.y = 0.02;
    fin.rotation.z = (i * Math.PI * 2) / 3;
    fin.castShadow = true;
    dartGroup.add(fin);
  }

  // Barrel
  const barrelGeo = new THREE.CylinderGeometry(0.02, 0.018, 0.08, 8);
  const barrelMat = new THREE.MeshStandardMaterial({ color: 0xDAA520, metalness: 0.6, roughness: 0.3 });
  const barrel = new THREE.Mesh(barrelGeo, barrelMat);
  barrel.rotation.x = Math.PI / 2;
  barrel.position.z = -0.05;
  dartGroup.add(barrel);

  return dartGroup;
}

    foxModel.position.copy(foxBasePos);
    foxModel.traverse(child => {
      if (child.isMesh) { child.castShadow = true; }
    });
    scene.add(foxModel);
  }
);

// Fox celebration animation
let foxAnimState = { type: null, startTime: 0, duration: 0 };

function triggerFoxCelebration() {
  foxAnimState = { type: 'celebrate', startTime: performance.now() / 1000, duration: 1.0 };
  state.foxCelebrating = true;
}

function triggerFoxShake() {
  foxAnimState = { type: 'shake', startTime: performance.now() / 1000, duration: 0.8 };
  state.foxShaking = true;
}

function updateFoxAnimation(time) {
  if (!foxModel || !foxAnimState.type) return;

  const elapsed = time - foxAnimState.startTime;
  const t = Math.min(elapsed / foxAnimState.duration, 1);

  if (foxAnimState.type === 'celebrate') {
    // Jump up and spin
    const jumpT = Math.sin(t * Math.PI);
    foxModel.position.y = foxBasePos.y + jumpT * 1.0;
    foxModel.rotation.y = -Math.PI / 4 + t * Math.PI * 2;

    if (t >= 1) {
      foxModel.position.y = foxBasePos.y;
      foxModel.rotation.y = -Math.PI / 4;
      foxAnimState.type = null;
      state.foxCelebrating = false;
    }
  } else if (foxAnimState.type === 'shake') {
    // Shake head
    const shakeAngle = Math.sin(elapsed * 20) * (15 * Math.PI / 180) * (1 - t);
    foxModel.rotation.y = -Math.PI / 4 + shakeAngle;

    if (t >= 1) {
      foxModel.rotation.y = -Math.PI / 4;
      foxAnimState.type = null;
      state.foxShaking = false;
    }
  }
}

// ============ SCORING ============
function calculateScore(x, y) {
  const dist = Math.sqrt(x * x + y * y);

  if (dist > 1.5) return { score: 0, zone: 'MISS', isDouble: false, isTriple: false };
  if (dist <= 0.15) return { score: 50, zone: 'BULL', isDouble: true, isTriple: false };
  if (dist <= 0.35) return { score: 25, zone: 'INNER_BULL', isDouble: false, isTriple: false };

  // Determine sector
  let angle = Math.atan2(x, y); // Note: x,y on board face
  if (angle < 0) angle += Math.PI * 2;

  const sectorAngle = Math.PI * 2 / 20;
  let sectorIndex = Math.floor((angle + sectorAngle / 2) / sectorAngle) % 20;
  const sectorValue = SECTOR_ORDER[sectorIndex];

  let multiplier = 1;
  let prefix = 'S';
  let isDouble = false;
  let isTriple = false;

  if (dist > 1.3 && dist <= 1.5) {
    multiplier = 2;
    prefix = 'D';
    isDouble = true;
  } else if (dist > 0.8 && dist <= 0.95) {
    multiplier = 3;
    prefix = 'T';
    isTriple = true;
  }

  return {
    score: sectorValue * multiplier,
    zone: prefix + sectorValue,
    isDouble,
    isTriple
  };
}

// ============ POWER METER ============
const powerMeterFill = document.getElementById('powerMeterFill');
const powerMeterOptimal = document.getElementById('powerMeterOptimal');
// Set optimal zone indicator (40-60%)
powerMeterOptimal.style.bottom = '40%';
powerMeterOptimal.style.height = '20%';

// ============ WIND ============
function randomizeWind() {
  state.windDirection = Math.random() < 0.5 ? 'left' : 'right';
  state.windStrength = Math.round(Math.random() * 5 * 10) / 10;
  updateWindDisplay();
}

function updateWindDisplay() {
  const arrow = state.windDirection === 'left' ? '←' : '→';
  document.getElementById('windIndicator').textContent = `Wind: ${arrow} ${state.windStrength.toFixed(1)}`;
}

randomizeWind();

// ============ AIM / CROSSHAIR ============
const crosshair = document.getElementById('crosshair');
let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;

document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  crosshair.style.left = mouseX + 'px';
  crosshair.style.top = mouseY + 'px';

  // Map mouse to board coordinates
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2(
    (e.clientX / window.innerWidth) * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(mouse, camera);

  // Intersect with board plane (z = -5 + 0.051)
  const boardPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 5 - 0.051);
  const intersection = new THREE.Vector3();
  raycaster.ray.intersectPlane(boardPlane, intersection);

  if (intersection) {
    state.aimX = intersection.x - BOARD_POS.x;
    state.aimY = intersection.y - BOARD_POS.y;
  }
});

// ============ THROWING ============
let activeDart = null;
let throwAnim = null;

function throwDart() {
  if (state.throwInProgress || state.dartsLeft <= 0 || state.gameOver || !state.powerLocked) return;

  state.throwInProgress = true;

  const dart = createDart();
  dart.position.copy(DART_START);
  scene.add(dart);
  activeDart = dart;

  // Calculate target with offsets
  let targetX = state.aimX;
  let targetY = state.aimY;

  // Random accuracy offset
  const baseOffset = 0.1;
  targetX += (Math.random() - 0.5) * 2 * baseOffset;
  targetY += (Math.random() - 0.5) * 2 * baseOffset;

  // Power offset
  const power = state.powerValue;
  if (power < 30) {
    targetX += (Math.random() - 0.5) * 2 * 0.2;
    targetY += (Math.random() - 0.5) * 2 * 0.2;
  } else if (power > 80) {
    targetX += (Math.random() - 0.5) * 2 * 0.15;
    targetY += (Math.random() - 0.5) * 2 * 0.15;
  }
  // 40-60 optimal: no extra offset

  // Wind offset
  const windOffset = state.windStrength * 0.05 * (state.windDirection === 'left' ? -1 : 1);
  targetX += windOffset;

  const startPos = DART_START.clone();
  const endPos = new THREE.Vector3(
    BOARD_POS.x + targetX,
    BOARD_POS.y + targetY,
    BOARD_POS.z + 0.06
  );

  const startTime = performance.now() / 1000;

  throwAnim = {
    dart,
    startPos,
    endPos,
    startTime,
    duration: THROW_DURATION,
    targetX,
    targetY
  };

  // Unlock power for next throw
  state.powerLocked = false;
}

function updateThrowAnimation(time) {
  if (!throwAnim) return;

  const elapsed = time - throwAnim.startTime;
  const t = Math.min(elapsed / throwAnim.duration, 1);

  // Lerp position with parabolic arc
  const dart = throwAnim.dart;
  dart.position.lerpVectors(throwAnim.startPos, throwAnim.endPos, t);

  // Parabolic arc on Y
  const arcHeight = 0.3;
  const arc = 4 * arcHeight * t * (1 - t);
  dart.position.y += arc;

  // Point dart toward target
  const dir = new THREE.Vector3().subVectors(throwAnim.endPos, throwAnim.startPos).normalize();
  dart.lookAt(dart.position.clone().add(dir));

  if (t >= 1) {
    // Dart landed
    dart.position.copy(throwAnim.endPos);

    const landX = throwAnim.targetX;
    const landY = throwAnim.targetY;
    state.lastLandX = landX;
    state.lastLandY = landY;

    const result = calculateScore(landX, landY);
    state.lastThrowScore = result.score;
    state.lastThrowZone = result.zone;

    // Check for bust
    const newScore = state.score - result.score;

    let busted = false;
    if (newScore < 0 || newScore === 1) {
      busted = true;
    } else if (newScore === 0 && !result.isDouble) {
      busted = true;
    }

    if (busted) {
      // This round is bust
      state.isBust = true;
      state.score = scoreAtRoundStart;
      roundScoreAccum = 0;
      state.roundScore = 0;

      // Show bust overlay
      const bustEl = document.getElementById('bustOverlay');
      bustEl.style.display = 'block';
      bustEl.style.animation = 'none';
      bustEl.offsetHeight; // reflow
      bustEl.style.animation = 'bustAnim 1.5s forwards';
      setTimeout(() => { bustEl.style.display = 'none'; }, 1500);

      // Fox shake on miss
      if (result.score === 0) triggerFoxShake();

      // Remove all darts from this round
      // Actually keep them visible but mark round as bust
      state.dartsLeft = 0;
    } else {
      state.score = newScore;
      roundScoreAccum += result.score;
      state.roundScore = roundScoreAccum;
      state.isBust = false;

      // Fox reactions
      if (result.score === 50) {
        triggerFoxCelebration();
      } else if (result.score === 0) {
        triggerFoxShake();
      }

      // Check game over
      if (state.score === 0) {
        state.gameOver = true;
        showGameOver();
      }
    }

    dartsOnBoardObjects.push(dart);
    state.dartsOnBoard = dartsOnBoardObjects.length;
    state.dartsThrown++;
    state.dartsLeft--;
    roundThrows.push(result);

    // End of round
    if (state.dartsLeft <= 0 && !state.gameOver) {
      setTimeout(() => {
        startNewRound();
      }, 1000);
    }

    throwAnim = null;
    activeDart = null;
    state.throwInProgress = false;

    updateHUD();
  }
}

// ============ ROUND MANAGEMENT ============
function startNewRound() {
  state.round++;
  state.dartsLeft = 3;
  state.roundScore = 0;
  state.isBust = false;
  roundScoreAccum = 0;
  scoreAtRoundStart = state.score;
  roundThrows = [];
  randomizeWind();
  updateHUD();
}

// ============ CLEAR BOARD ============
function clearBoard() {
  dartsOnBoardObjects.forEach(dart => {
    scene.remove(dart);
  });
  dartsOnBoardObjects = [];
  state.dartsOnBoard = 0;

  if (state.dartsLeft <= 0 && !state.gameOver) {
    startNewRound();
  }
}

// ============ NEW GAME ============
function newGame() {
  clearBoard();
  state.score = 501;
  state.round = 1;
  state.dartsLeft = 3;
  state.dartsThrown = 0;
  state.lastThrowScore = 0;
  state.lastThrowZone = '';
  state.roundScore = 0;
  state.isBust = false;
  state.powerLocked = false;
  state.gameOver = false;
  state.foxCelebrating = false;
  state.foxShaking = false;
  state.throwInProgress = false;
  state.checkoutSuggestion = '';
  scoreAtRoundStart = 501;
  roundScoreAccum = 0;
  roundThrows = [];
  randomizeWind();

  document.getElementById('gameOverOverlay').style.display = 'none';
  updateHUD();
}
window.newGame = newGame;

// ============ GAME OVER ============
function showGameOver() {
  const overlay = document.getElementById('gameOverOverlay');
  overlay.style.display = 'flex';
  document.getElementById('gameOverStats').textContent =
    `Rounds: ${state.round} | Darts Thrown: ${state.dartsThrown}`;
  triggerFoxCelebration();
}

// ============ HUD UPDATE ============
function updateHUD() {
  document.getElementById('scoreDisplay').textContent = `Score: ${state.score}`;
  document.getElementById('roundDisplay').textContent = `Round: ${state.round}`;
  document.getElementById('dartsLeftDisplay').textContent = `Darts Left: ${state.dartsLeft}`;
  document.getElementById('lastThrowDisplay').textContent = `Last Throw: ${state.lastThrowZone || '--'} (${state.lastThrowScore})`;
  document.getElementById('roundScoreDisplay').textContent = `Round Score: ${state.roundScore}`;

  // Checkout hint
  const hintEl = document.getElementById('checkoutHint');
  if (state.score <= 170 && state.score >= 2) {
    const suggestion = getCheckoutSuggestion(state.score);
    state.checkoutSuggestion = suggestion;
    if (suggestion) {
      hintEl.textContent = `Checkout: ${suggestion}`;
      hintEl.style.display = 'block';
    } else {
      hintEl.style.display = 'none';
      state.checkoutSuggestion = '';
    }
  } else {
    hintEl.style.display = 'none';
    state.checkoutSuggestion = '';
  }

  // Update bottom hint
  const bottomHud = document.getElementById('hud-bottom');
  if (state.gameOver) {
    bottomHud.textContent = 'Game Over! Click New Game to play again.';
  } else if (state.dartsLeft <= 0) {
    bottomHud.textContent = 'Round over. Click Clear Board or wait...';
  } else if (!state.powerLocked) {
    bottomHud.textContent = 'Press SPACE to lock power, then CLICK to throw';
  } else {
    bottomHud.textContent = 'Power locked! CLICK to throw';
  }
}

// ============ EVENT LISTENERS ============
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (!state.powerLocked && !state.throwInProgress && state.dartsLeft > 0 && !state.gameOver) {
      state.powerLocked = true;
      updateHUD();
    }
  }
});

document.addEventListener('click', (e) => {
  if (e.target.tagName === 'BUTTON') return;
  throwDart();
});

document.getElementById('newGameBtn').addEventListener('click', newGame);
document.getElementById('clearBoardBtn').addEventListener('click', clearBoard);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============
function animate() {
  requestAnimationFrame(animate);

  const time = performance.now() / 1000;
  const delta = clock.getDelta();

  // Update fox mixer
  if (foxMixer) foxMixer.update(delta);

  // Update fox custom animations
  updateFoxAnimation(time);

  // Update power meter
  if (!state.powerLocked) {
    state.powerValue = (Math.sin(time * Math.PI) + 1) / 2 * 100; // period ~2s
  }
  powerMeterFill.style.height = state.powerValue + '%';

  // Color the power meter based on value
  if (state.powerLocked) {
    powerMeterFill.style.opacity = '0.7';
  } else {
    powerMeterFill.style.opacity = '1';
  }

  // Update throw animation
  updateThrowAnimation(time);

  // Ensure no NaN in state
  for (const key in state) {
    if (typeof state[key] === 'number' && isNaN(state[key])) {
      state[key] = 0;
    }
  }

  renderer.render(scene, camera);
}

// Initialize
updateHUD();
animate();
