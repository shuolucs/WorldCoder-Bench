<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Darts Game - Three.js</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #102810;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .panel {
      position: absolute;
      background: rgba(0,0,0,0.35);
      padding: 10px 12px;
      border-radius: 8px;
      line-height: 1.5;
      font-size: 16px;
      backdrop-filter: blur(2px);
    }

    #hudLeft { top: 12px; left: 12px; }
    #hudRight { top: 12px; right: 12px; text-align: right; }

    #bottomHint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.45);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 16px;
      white-space: nowrap;
    }

    #checkoutHint {
      margin-top: 6px;
      color: #ffd966;
      font-weight: bold;
    }

    #crosshair {
      position: absolute;
      width: 30px;
      height: 30px;
      margin-left: -15px;
      margin-top: -15px;
      pointer-events: none;
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.9);
    }

    #crosshair::before {
      width: 30px;
      height: 1px;
      left: 0;
      top: 14px;
    }

    #crosshair::after {
      width: 1px;
      height: 30px;
      left: 14px;
      top: 0;
    }

    #powerWrap {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 30px;
      height: 200px;
      border: 2px solid #fff;
      border-radius: 6px;
      background: rgba(0,0,0,0.35);
      overflow: hidden;
    }

    #powerFill {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: linear-gradient(to top, #2ecc71, #f1c40f, #e74c3c);
    }

    #powerLabel {
      position: absolute;
      left: 56px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      background: rgba(0,0,0,0.35);
      padding: 6px 8px;
      border-radius: 6px;
    }

    #windIndicator {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.4);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 16px;
      text-align: center;
    }

    #buttons {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 20;
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      cursor: pointer;
      background: #f0f0f0;
      color: #111;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }

    button:hover { background: #ffffff; }
  </style>
</head>
<body>
  <div id="ui">
    <div id="hudLeft" class="panel">
      <div id="scoreText">Score: 501</div>
      <div id="roundText">Round: 1</div>
      <div id="dartsLeftText">Darts Left: 3</div>
      <div id="checkoutHint"></div>
    </div>

    <div id="hudRight" class="panel">
      <div id="lastThrowText">Last Throw: --</div>
      <div id="roundScoreText">Round Score: 0</div>
    </div>

    <div id="windIndicator">Wind: RIGHT 0</div>

    <div id="powerWrap">
      <div id="powerFill"></div>
    </div>
    <div id="powerLabel">Power</div>

    <div id="crosshair"></div>

    <div id="bottomHint">Press SPACE to lock power, then CLICK to throw</div>
  </div>

  <div id="buttons">
    <button id="newGameBtn">New Game</button>
    <button id="clearBoardBtn">Clear Board</button>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a3d1a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2, 6);
    camera.lookAt(0, 2, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    scene.add(dirLight);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshStandardMaterial({ color: 0x355e35 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    floor.receiveShadow = true;
    scene.add(floor);

    const boardGroup = new THREE.Group();
    boardGroup.position.set(0, 2, -5);
    scene.add(boardGroup);

    const boardBacking = new THREE.Mesh(
      new THREE.CylinderGeometry(1.55, 1.55, 0.12, 64),
      new THREE.MeshStandardMaterial({ color: 0x8b5a2b })
    );
    boardBacking.rotation.x = Math.PI / 2;
    boardBacking.castShadow = true;
    boardBacking.receiveShadow = true;
    boardGroup.add(boardBacking);

    const boardFace = new THREE.Group();
    boardGroup.add(boardFace);

    const sectorOrder = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
    const anglePerSector = (Math.PI * 2) / 20;

    function createRingSegment(innerR, outerR, a0, a1, color) {
      const shape = new THREE.Shape();
      shape.moveTo(Math.cos(a0) * outerR, Math.sin(a0) * outerR);
      shape.absarc(0, 0, outerR, a0, a1, false);

      const hole = new THREE.Path();
      hole.moveTo(Math.cos(a1) * innerR, Math.sin(a1) * innerR);
      hole.absarc(0, 0, innerR, a1, a0, true);
      shape.holes.push(hole);

      const geo = new THREE.ShapeGeometry(shape);
      const mat = new THREE.MeshStandardMaterial({
        color,
        side: THREE.DoubleSide
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.z = 0.056;
      return mesh;
    }

    function buildBoardVisual() {
      while (boardFace.children.length) boardFace.remove(boardFace.children[0]);

      for (let i = 0; i < 20; i++) {
        const centerFromTopClockwise = i * anglePerSector;
        const centerAngle = Math.PI / 2 - centerFromTopClockwise;
        const a0 = centerAngle - anglePerSector / 2;
        const a1 = centerAngle + anglePerSector / 2;

        const singleColor = (i % 2 === 0) ? 0xf5f5f5 : 0x111111;
        const ringColor = (i % 2 === 0) ? 0xc62828 : 0x2e7d32;

        boardFace.add(createRingSegment(0.35, 0.8, a0, a1, singleColor));
        boardFace.add(createRingSegment(0.8, 0.95, a0, a1, ringColor));
        boardFace.add(createRingSegment(0.95, 1.3, a0, a1, singleColor));
        boardFace.add(createRingSegment(1.3, 1.5, a0, a1, ringColor));
      }

      const innerBull = new THREE.Mesh(
        new THREE.CircleGeometry(0.35, 48),
        new THREE.MeshStandardMaterial({ color: 0x2e7d32, side: THREE.DoubleSide })
      );
      innerBull.position.z = 0.057;
      boardFace.add(innerBull);

      const bull = new THREE.Mesh(
        new THREE.CircleGeometry(0.15, 48),
        new THREE.MeshStandardMaterial({ color: 0xc62828, side: THREE.DoubleSide })
      );
      bull.position.z = 0.058;
      boardFace.add(bull);

      const wire = new THREE.Mesh(
        new THREE.RingGeometry(0.15, 0.152, 64),
        new THREE.MeshBasicMaterial({ color: 0xd4af37, side: THREE.DoubleSide })
      );
      wire.position.z = 0.059;
      boardFace.add(wire);
    }
    buildBoardVisual();

    const boardPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 5);

    function createDart() {
      const group = new THREE.Group();

      const shaft = new THREE.Mesh(
        new THREE.CylinderGeometry(0.03, 0.03, 0.9, 12),
        new THREE.MeshStandardMaterial({ color: 0x8b5a2b })
      );
      shaft.rotation.z = Math.PI / 2;
      shaft.castShadow = true;
      group.add(shaft);

      const tip = new THREE.Mesh(
        new THREE.ConeGeometry(0.04, 0.18, 12),
        new THREE.MeshStandardMaterial({ color: 0xc0c0c0 })
      );
      tip.rotation.z = -Math.PI / 2;
      tip.position.x = -0.54;
      tip.castShadow = true;
      group.add(tip);

      for (let i = 0; i < 3; i++) {
        const fin = new THREE.Mesh(
          new THREE.BoxGeometry(0.12, 0.08, 0.01),
          new THREE.MeshStandardMaterial({ color: 0xcc2222, side: THREE.DoubleSide })
        );
        fin.position.x = 0.44;
        fin.rotation.x = (Math.PI * 2 / 3) * i;
        group.add(fin);
      }

      group.castShadow = true;
      group.position.set(0, 2, 5);
      return group;
    }

    let currentDart = null;
    const stuckDarts = [];

    function prepareNextDart() {
      if (currentDart) scene.remove(currentDart);
      currentDart = createDart();
      scene.add(currentDart);
      currentDart.position.set(0, 2, 5);
      currentDart.rotation.set(0, 0, 0);
    }

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const crosshair = document.getElementById('crosshair');
    const scoreText = document.getElementById('scoreText');
    const roundText = document.getElementById('roundText');
    const dartsLeftText = document.getElementById('dartsLeftText');
    const lastThrowText = document.getElementById('lastThrowText');
    const roundScoreText = document.getElementById('roundScoreText');
    const checkoutHintEl = document.getElementById('checkoutHint');
    const powerFill = document.getElementById('powerFill');
    const windIndicator = document.getElementById('windIndicator');
    const newGameBtn = document.getElementById('newGameBtn');
    const clearBoardBtn = document.getElementById('clearBoardBtn');

    const game = {
      score: 501,
      round: 1,
      dartsLeft: 3,
      dartsThrown: 0,
      lastThrowScore: 0,
      lastThrowZone: '--',
      roundScore: 0,
      isBust: false,
      powerLocked: false,
      powerValue: 50,
      windDirection: 'right',
      windStrength: 0,
      foxCelebrating: false,
      foxShaking: false,
      gameOver: false,
      dartsOnBoard: 0,
      throwInProgress: false,
      aimX: 0,
      aimY: 2,
      lastLandX: 0,
      lastLandY: 2,
      checkoutSuggestion: '',
      roundStartScore: 501,
      throwAnim: null
    };

    function sanitizeNumber(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    window.__3D_STATE__ = {};

    let fox = null;
    let foxMixer = null;
    let foxRoot = null;
    let foxBasePos = new THREE.Vector3(3, 0, -3);
    let foxCelebrationTimer = 0;
    let foxShakeTimer = 0;

    const loader = new GLTFLoader();
    loader.load(
      'Fox.glb',
      (gltf) => {
        fox = gltf.scene;
        foxRoot = new THREE.Group();
        foxRoot.position.copy(foxBasePos);
        foxRoot.scale.set(0.02, 0.02, 0.02);
        fox.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        foxRoot.add(fox);
        scene.add(foxRoot);

        if (gltf.animations && gltf.animations.length > 0) {
          foxMixer = new THREE.AnimationMixer(fox);
          const action = foxMixer.clipAction(gltf.animations[0]);
          action.play();
        }
      },
      undefined,
      (err) => {
        console.warn('Fox.glb failed to load:', err);
      }
    );

    function triggerFoxCelebration() {
      if (!foxRoot) return;
      game.foxCelebrating = true;
      foxCelebrationTimer = 1.0;
    }

    function triggerFoxShake() {
      if (!foxRoot) return;
      game.foxShaking = true;
      foxShakeTimer = 0.6;
    }

    function updateFox(dt) {
      if (foxMixer) foxMixer.update(dt);

      if (foxRoot) {
        foxRoot.position.copy(foxBasePos);
        foxRoot.rotation.set(0, 0, 0);

        if (game.foxCelebrating) {
          foxCelebrationTimer -= dt;
          const t = Math.max(0, 1 - foxCelebrationTimer / 1.0);
          const jump = Math.sin(Math.PI * t) * 1.0;
          foxRoot.position.y = foxBasePos.y + jump;
          foxRoot.rotation.y = Math.PI * 2 * t;
          if (foxCelebrationTimer <= 0) {
            game.foxCelebrating = false;
            foxRoot.position.copy(foxBasePos);
            foxRoot.rotation.set(0, 0, 0);
          }
        } else if (game.foxShaking) {
          foxShakeTimer -= dt;
          const phase = Math.sin((0.6 - Math.max(foxShakeTimer, 0)) * 25);
          foxRoot.rotation.y = THREE.MathUtils.degToRad(15) * phase;
          if (foxShakeTimer <= 0) {
            game.foxShaking = false;
            foxRoot.rotation.set(0, 0, 0);
          }
        }
      }
    }

    function getAimIntersection(clientX, clientY) {
      mouse.x = (clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const point = new THREE.Vector3();
      const ok = raycaster.ray.intersectPlane(boardPlane, point);
      if (!ok || !point) return new THREE.Vector3(0, 2, -5);
      return point;
    }

    function clampAimToBoardVisual(localX, localY) {
      const r = Math.sqrt(localX * localX + localY * localY);
      if (r > 1.5) {
        const scale = 1.5 / r;
        return { x: localX * scale, y: localY * scale };
      }
      return { x: localX, y: localY };
    }

    function updateCrosshairFromAim() {
      const worldPos = new THREE.Vector3(game.aimX, game.aimY, -5);
      const screen = worldPos.clone().project(camera);
      const x = (screen.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-screen.y * 0.5 + 0.5) * window.innerHeight;
      crosshair.style.left = `${sanitizeNumber(x, window.innerWidth / 2)}px`;
      crosshair.style.top = `${sanitizeNumber(y, window.innerHeight / 2)}px`;
    }

    function sectorFromAngle(x, y) {
      let angle = Math.atan2(y, x);
      let fromTopClockwise = Math.PI / 2 - angle;
      while (fromTopClockwise < 0) fromTopClockwise += Math.PI * 2;
      while (fromTopClockwise >= Math.PI * 2) fromTopClockwise -= Math.PI * 2;
      const index = Math.floor((fromTopClockwise + anglePerSector / 2) / anglePerSector) % 20;
      return sectorOrder[index];
    }

    function scoreThrow(localX, localY) {
      const r = Math.sqrt(localX * localX + localY * localY);
      if (r > 1.5) return { score: 0, zone: 'MISS', isDouble: false, isBull: false };
      if (r <= 0.15) return { score: 50, zone: 'BULL', isDouble: true, isBull: true };
      if (r <= 0.35) return { score: 25, zone: 'INNER_BULL', isDouble: false, isBull: false };

      const sector = sectorFromAngle(localX, localY);
      if (r > 0.8 && r <= 0.95) return { score: sector * 3, zone: `T${sector}`, isDouble: false, isBull: false };
      if (r > 1.3 && r <= 1.5) return { score: sector * 2, zone: `D${sector}`, isDouble: true, isBull: false };
      if (r > 0.35 && r <= 0.8) return { score: sector, zone: `S${sector}`, isDouble: false, isBull: false };
      if (r > 0.95 && r <= 1.3) return { score: sector, zone: `S${sector}`, isDouble: false, isBull: false };
      return { score: 0, zone: 'MISS', isDouble: false, isBull: false };
    }

    function randomWind() {
      game.windDirection = Math.random() < 0.5 ? 'left' : 'right';
      game.windStrength = Math.floor(Math.random() * 6);
    }

    function getExtraPowerError() {
      const p = game.powerValue;
      if (p < 30) return 0.2;
      if (p >= 40 && p <= 60) return 0;
      if (p > 80) return 0.15;
      return 0;
    }

    function updateHUD() {
      scoreText.textContent = `Score: ${game.score}`;
      roundText.textContent = `Round: ${game.round}`;
      dartsLeftText.textContent = `Darts Left: ${game.dartsLeft}`;
      lastThrowText.textContent = `Last Throw: ${game.lastThrowZone === '--' ? '--' : `${game.lastThrowZone} (${game.lastThrowScore})`}`;
      roundScoreText.textContent = `Round Score: ${game.roundScore}`;
      checkoutHintEl.textContent = game.checkoutSuggestion ? `Checkout: ${game.checkoutSuggestion}` : '';
      powerFill.style.height = `${sanitizeNumber(game.powerValue, 0)}%`;
      windIndicator.textContent = `Wind: ${game.windDirection.toUpperCase()} ${game.windStrength}`;
    }

    function syncState() {
      window.__3D_STATE__.score = sanitizeNumber(game.score, 501);
      window.__3D_STATE__.round = sanitizeNumber(game.round, 1);
      window.__3D_STATE__.dartsLeft = sanitizeNumber(game.dartsLeft, 3);
      window.__3D_STATE__.dartsThrown = sanitizeNumber(game.dartsThrown, 0);
      window.__3D_STATE__.lastThrowScore = sanitizeNumber(game.lastThrowScore, 0);
      window.__3D_STATE__.lastThrowZone = game.lastThrowZone || 'MISS';
      window.__3D_STATE__.roundScore = sanitizeNumber(game.roundScore, 0);
      window.__3D_STATE__.isBust = !!game.isBust;
      window.__3D_STATE__.powerLocked = !!game.powerLocked;
      window.__3D_STATE__.powerValue = sanitizeNumber(game.powerValue, 0);
      window.__3D_STATE__.windDirection = game.windDirection === 'left' ? 'left' : 'right';
      window.__3D_STATE__.windStrength = sanitizeNumber(game.windStrength, 0);
      window.__3D_STATE__.foxCelebrating = !!game.foxCelebrating;
      window.__3D_STATE__.foxShaking = !!game.foxShaking;
      window.__3D_STATE__.gameOver = !!game.gameOver;
      window.__3D_STATE__.dartsOnBoard = sanitizeNumber(game.dartsOnBoard, 0);
      window.__3D_STATE__.throwInProgress = !!game.throwInProgress;
      window.__3D_STATE__.aimX = sanitizeNumber(game.aimX, 0);
      window.__3D_STATE__.aimY = sanitizeNumber(game.aimY, 2);
      window.__3D_STATE__.lastLandX = sanitizeNumber(game.lastLandX, 0);
      window.__3D_STATE__.lastLandY = sanitizeNumber(game.lastLandY, 2);
      window.__3D_STATE__.checkoutSuggestion = game.checkoutSuggestion || '';
    }

    function startRound() {
      game.roundStartScore = game.score;
      game.roundScore = 0;
      game.isBust = false;
      game.dartsLeft = 3;
      game.powerLocked = false;
      randomWind();
      prepareNextDart();
    }

    function nextRound() {
      game.round += 1;
      startRound();
    }

    function clearBoard() {
      stuckDarts.forEach(d => scene.remove(d));
      stuckDarts.length = 0;
      game.dartsOnBoard = 0;
    }

    function resetGame() {
      game.score = 501;
      game.round = 1;
      game.dartsLeft = 3;
      game.dartsThrown = 0;
      game.lastThrowScore = 0;
      game.lastThrowZone = '--';
      game.roundScore = 0;
      game.isBust = false;
      game.powerLocked = false;
      game.powerValue = 50;
      game.windDirection = 'right';
      game.windStrength = 0;
      game.foxCelebrating = false;
      game.foxShaking = false;
      game.gameOver = false;
      game.dartsOnBoard = 0;
      game.throwInProgress = false;
      game.aimX = 0;
      game.aimY = 2;
      game.lastLandX = 0;
      game.lastLandY = 2;
      game.checkoutSuggestion = '';
      game.roundStartScore = 501;
      game.throwAnim = null;
      clearBoard();
      startRound();
      updateCrosshairFromAim();
      updateHUD();
      syncState();
    }

    function completeThrow(hitX, hitY) {
      const result = scoreThrow(hitX, hitY);

      game.lastThrowScore = result.score;
      game.lastThrowZone = result.zone;
      game.lastLandX = hitX;
      game.lastLandY = hitY;
      game.dartsThrown += 1;
      game.dartsLeft -= 1;

      const projectedScore = game.score - result.score;
      let bust = false;

      if (projectedScore < 0 || projectedScore === 1) {
        bust = true;
      } else if (projectedScore === 0 && !(result.isDouble || result.isBull)) {
        bust = true;
      }

      if (bust) {
        game.isBust = true;
        game.score = game.roundStartScore;
        game.roundScore = 0;
      } else {
        game.score = projectedScore;
        game.roundScore += result.score;
      }

      if (result.score === 50) triggerFoxCelebration();
      if (result.score === 0) triggerFoxShake();

      if (!bust && game.score === 0) {
        game.gameOver = true;
      }

      game.checkoutSuggestion = getCheckoutSuggestion(game.score);

      if (game.gameOver) {
        game.dartsLeft = 0;
      } else if (bust || game.dartsLeft <= 0) {
        nextRound();
      } else {
        game.powerLocked = false;
        prepareNextDart();
      }

      updateHUD();
    }

    function throwDart() {
      if (game.throwInProgress || game.gameOver || !currentDart) return;
      if (!game.powerLocked) return;
      if (game.dartsLeft <= 0) return;

      const baseLocalX = game.aimX;
      const baseLocalY = game.aimY - 2;

      let errRange = 0.1 + getExtraPowerError();
      const randX = (Math.random() * 2 - 1) * errRange;
      const randY = (Math.random() * 2 - 1) * errRange;
      const windOffset = (game.windDirection === 'left' ? -1 : 1) * game.windStrength * 0.05;

      let localX = baseLocalX + randX + windOffset;
      let localY = baseLocalY + randY;

      const start = new THREE.Vector3(0, 2, 5);
      const end = new THREE.Vector3(localX, 2 + localY, -4.94);

      game.throwInProgress = true;
      game.throwAnim = {
        time: 0,
        duration: 0.3,
        start: start.clone(),
        end: end.clone(),
        landLocalX: localX,
        landLocalY: localY
      };
    }

    window.addEventListener('mousemove', (e) => {
      const point = getAimIntersection(e.clientX, e.clientY);
      const localX = sanitizeNumber(point.x, 0);
      const localY = sanitizeNumber(point.y - 2, 0);
      const clamped = clampAimToBoardVisual(localX, localY);
      game.aimX = clamped.x;
      game.aimY = clamped.y + 2;
      updateCrosshairFromAim();
    });

    window.addEventListener('click', (e) => {
      if (e.target.tagName === 'BUTTON') return;
      throwDart();
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (!game.throwInProgress && !game.gameOver) {
          game.powerLocked = true;
        }
      }
    });

    newGameBtn.addEventListener('click', resetGame);
    clearBoardBtn.addEventListener('click', () => {
      clearBoard();
      if (!game.gameOver) nextRound();
      updateHUD();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      updateCrosshairFromAim();
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = sanitizeNumber(clock.getDelta(), 0.016);
      const elapsed = sanitizeNumber(clock.elapsedTime, 0);

      if (!game.powerLocked && !game.throwInProgress && !game.gameOver) {
        game.powerValue = 50 + 50 * Math.sin((elapsed / 2) * Math.PI * 2);
      }
      game.powerValue = Math.min(100, Math.max(0, sanitizeNumber(game.powerValue, 50)));

      updateFox(dt);

      if (game.throwAnim && currentDart) {
        const a = game.throwAnim;
        a.time += dt;
        const t = Math.min(1, a.time / a.duration);
        const pos = new THREE.Vector3().lerpVectors(a.start, a.end, t);
        pos.y += Math.sin(Math.PI * t) * 0.3;
        currentDart.position.copy(pos);

        const tangent = new THREE.Vector3().subVectors(a.end, a.start);
        tangent.y += Math.cos(Math.PI * t) * 0.3;
        const yaw = Math.atan2(-(a.end.z - a.start.z), (a.end.x - a.start.x));
        const pitch = Math.atan2(tangent.y, Math.sqrt(tangent.x * tangent.x + tangent.z * tangent.z));
        currentDart.rotation.set(0, yaw, pitch);

        if (t >= 1) {
          currentDart.position.copy(a.end);
          currentDart.rotation.set(0, 0, 0);
          currentDart.lookAt(a.end.x - 1, a.end.y, a.end.z);
          stuckDarts.push(currentDart);
          game.dartsOnBoard = stuckDarts.length;
          game.throwInProgress = false;
          game.throwAnim = null;
          completeThrow(a.landLocalX, a.landLocalY);
        }
      }

      game.checkoutSuggestion = getCheckoutSuggestion(game.score);

      updateHUD();
      syncState();
      renderer.render(scene, camera);
    }

    resetGame();
    animate();
  </script>
</body>
