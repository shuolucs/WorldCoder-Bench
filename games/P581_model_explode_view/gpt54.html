<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Product Exploded View - Antique Camera</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 20;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 10px;
      padding: 12px 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      min-width: 280px;
    }

    #ui .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
    }

    #ui label {
      width: 120px;
      font-size: 14px;
      color: #222;
    }

    #ui input[type="range"] {
      flex: 1;
    }

    #ui button {
      border: 0;
      background: #222;
      color: white;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    #ui button:hover {
      background: #444;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 25;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      padding: 12px;
      font: 14px monospace;
      border-radius: 8px;
      line-height: 1.5;
      min-width: 250px;
    }

    .part-label {
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      pointer-events: none;
      white-space: nowrap;
      transform: translate(-50%, -100%);
    }

    #loading {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(240,240,240,0.9);
      color: #222;
      font-size: 18px;
      letter-spacing: 0.5px;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div id="hud-parts">Parts: 0</div>
      <div id="hud-explode">Explode: 0.00</div>
      <div id="hud-selected">Selected: 0</div>
      <div id="hud-hovered">Hovered: none</div>
      <div id="hud-opacity">Opacity: 1.00</div>
    </div>

    <div id="ui">
      <div class="row">
        <label for="slider-explode">Explode Distance</label>
        <input id="slider-explode" type="range" min="0" max="3" step="0.01" value="0" />
      </div>
      <div class="row">
        <label for="slider-opacity">Part Opacity</label>
        <input id="slider-opacity" type="range" min="0.1" max="1" step="0.05" value="1" />
      </div>
      <div class="row" style="justify-content: space-between;">
        <button id="btn-reset">Reset</button>
        <button id="btn-explode-full">Explode Full</button>
        <button id="btn-assemble">Assemble</button>
      </div>
    </div>

    <div id="loading">Loading AntiqueCamera.glb...</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    const app = document.getElementById('app');
    const loadingEl = document.getElementById('loading');

    const sliderExplode = document.getElementById('slider-explode');
    const sliderOpacity = document.getElementById('slider-opacity');
    const btnReset = document.getElementById('btn-reset');
    const btnExplodeFull = document.getElementById('btn-explode-full');
    const btnAssemble = document.getElementById('btn-assemble');

    const hudParts = document.getElementById('hud-parts');
    const hudExplode = document.getElementById('hud-explode');
    const hudSelected = document.getElementById('hud-selected');
    const hudHovered = document.getElementById('hud-hovered');
    const hudOpacity = document.getElementById('hud-opacity');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf0f0f0);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(3, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    labelRenderer.domElement.style.zIndex = '10';
    app.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, labelRenderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);

    const dir1 = new THREE.DirectionalLight(0xffffff, 1.2);
    dir1.position.set(5, 8, 5);
    dir1.castShadow = true;
    dir1.shadow.mapSize.set(1024, 1024);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0xffffff, 0.6);
    dir2.position.set(-3, 5, -5);
    scene.add(dir2);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(3, 64),
      new THREE.MeshStandardMaterial({
        color: 0xdddddd,
        transparent: true,
        opacity: 0.6,
        roughness: 1,
        metalness: 0
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1;
    ground.receiveShadow = true;
    scene.add(ground);

    const rootGroup = new THREE.Group();
    scene.add(rootGroup);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const loader = new GLTFLoader();

    const parts = [];
    const selectedParts = new Set();
    let hoveredPart = null;

    let modelCenter = new THREE.Vector3();
    let frameCount = 0;
    let isPaused = false;
    let isAnimating = false;

    let animationData = null;

    window.__3D_STATE__ = {
      frameCount: 0,
      partCount: 0,
      explodeDistance: 0,
      selectedCount: 0,
      hoveredPart: -1,
      opacity: 1,
      partsPositions: [],
      explodeValid: false,
      isPaused: false,
      isAnimating: false
    };

    function ensureStandardMaterial(mesh) {
      const oldMat = mesh.material;
      if (Array.isArray(oldMat)) {
        mesh.material = oldMat.map(m => {
          const mat = (m && m.isMeshStandardMaterial) ? m.clone() : new THREE.MeshStandardMaterial({
            color: m?.color ? m.color.clone() : new THREE.Color(0xcccccc),
            map: m?.map || null,
            roughnessMap: m?.roughnessMap || null,
            metalnessMap: m?.metalnessMap || null,
            normalMap: m?.normalMap || null,
            emissiveMap: m?.emissiveMap || null,
            transparent: !!m?.transparent,
            opacity: m?.opacity ?? 1,
            roughness: m?.roughness ?? 0.8,
            metalness: m?.metalness ?? 0.1
          });
          mat.emissive = new THREE.Color(0x000000);
          mat.emissiveIntensity = 0;
          return mat;
        });
      } else {
        mesh.material = (oldMat && oldMat.isMeshStandardMaterial) ? oldMat.clone() : new THREE.MeshStandardMaterial({
          color: oldMat?.color ? oldMat.color.clone() : new THREE.Color(0xcccccc),
          map: oldMat?.map || null,
          roughnessMap: oldMat?.roughnessMap || null,
          metalnessMap: oldMat?.metalnessMap || null,
          normalMap: oldMat?.normalMap || null,
          emissiveMap: oldMat?.emissiveMap || null,
          transparent: !!oldMat?.transparent,
          opacity: oldMat?.opacity ?? 1,
          roughness: oldMat?.roughness ?? 0.8,
          metalness: oldMat?.metalness ?? 0.1
        });
        mesh.material.emissive = new THREE.Color(0x000000);
        mesh.material.emissiveIntensity = 0;
      }
    }

    function setMaterialProps(mesh, callback) {
      if (Array.isArray(mesh.material)) {
        mesh.material.forEach(callback);
      } else {
        callback(mesh.material);
      }
    }

    function createPartLabel(index, mesh) {
      const div = document.createElement('div');
      div.className = 'part-label';
      div.style.display = 'none';
      div.textContent = `Part ${index}${mesh.name ? ` - ${mesh.name}` : ''}`;
      const label = new CSS2DObject(div);
      label.position.set(0, 0.2, 0);
      mesh.add(label);
      return { div, object: label };
    }

    function updatePartVisualState(mesh) {
      const selected = selectedParts.has(mesh);
      const hovered = hoveredPart === mesh;

      setMaterialProps(mesh, (mat) => {
        if (selected) {
          mat.emissive.setHex(0xff8800);
          mat.emissiveIntensity = 0.4;
        } else if (hovered) {
          mat.emissive.setHex(0x4444ff);
          mat.emissiveIntensity = 0.3;
        } else {
          mat.emissive.setHex(0x000000);
          mat.emissiveIntensity = 0.0;
        }

        const opacityValue = selected ? 1.0 : parseFloat(sliderOpacity.value);
        mat.transparent = opacityValue < 1.0;
        mat.opacity = opacityValue;
        mat.needsUpdate = true;
      });

      if (mesh.userData.labelDiv) {
        mesh.userData.labelDiv.style.display = (selected || hovered) ? '' : 'none';
      }
    }

    function updateAllPartVisuals() {
      for (const mesh of parts) {
        updatePartVisualState(mesh);
      }
    }

    function updateHUD() {
      hudParts.textContent = `Parts: ${parts.length}`;
      hudExplode.textContent = `Explode: ${parseFloat(sliderExplode.value).toFixed(2)}`;
      hudSelected.textContent = `Selected: ${selectedParts.size}`;
      if (hoveredPart) {
        const idx = hoveredPart.userData.partIndex ?? -1;
        const nm = hoveredPart.name ? `${idx} (${hoveredPart.name})` : `${idx}`;
        hudHovered.textContent = `Hovered: ${nm}`;
      } else {
        hudHovered.textContent = `Hovered: none`;
      }
      hudOpacity.textContent = `Opacity: ${parseFloat(sliderOpacity.value).toFixed(2)}`;
    }

    function resetSelectionAndHover() {
      hoveredPart = null;
      selectedParts.clear();
      updateAllPartVisuals();
      updateHUD();
    }

    function animateSliderTo(target, duration = 1000) {
      const start = performance.now();
      const from = parseFloat(sliderExplode.value);
      const to = target;
      animationData = { start, duration, from, to };
      isAnimating = true;
    }

    function applyExplodeTargets() {
      const d = parseFloat(sliderExplode.value);

      for (const mesh of parts) {
        const originalPos = mesh.userData.originalPosition;
        const explodeDir = mesh.userData.explodeDirection;
        const distFactor = mesh.userData.partDistanceFromCenter;
        const targetPos = mesh.userData.targetPosition;

        targetPos.copy(originalPos).addScaledVector(explodeDir, d * distFactor);
        mesh.position.lerp(targetPos, 0.15);

        const baseQuat = mesh.userData.originalQuaternion;
        const axis = explodeDir.lengthSq() > 0.000001 ? explodeDir : new THREE.Vector3(0, 1, 0);
        const rotQuat = new THREE.Quaternion().setFromAxisAngle(axis, d * 0.1);
        mesh.quaternion.copy(baseQuat).multiply(rotQuat);
      }
    }

    function onPointerMove(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(parts, false);

      const newHovered = intersects.length > 0 ? intersects[0].object : null;
      if (newHovered !== hoveredPart) {
        const oldHovered = hoveredPart;
        hoveredPart = newHovered;
        if (oldHovered) updatePartVisualState(oldHovered);
        if (hoveredPart) updatePartVisualState(hoveredPart);
        updateHUD();
      }
    }

    function onPointerLeave() {
      if (hoveredPart) {
        const old = hoveredPart;
        hoveredPart = null;
        updatePartVisualState(old);
        updateHUD();
      }
    }

    function onClick() {
      if (!hoveredPart) return;
      if (selectedParts.has(hoveredPart)) {
        selectedParts.delete(hoveredPart);
      } else {
        selectedParts.add(hoveredPart);
      }
      updatePartVisualState(hoveredPart);
      updateHUD();
    }

    function resetView() {
      controls.target.set(0, 0, 0);
      camera.position.set(3, 2, 5);
      camera.lookAt(0, 0, 0);
      controls.update();
    }

    btnReset.addEventListener('click', () => {
      sliderExplode.value = '0';
      sliderOpacity.value = '1';
      animationData = null;
      isAnimating = false;
      resetSelectionAndHover();
      updateAllPartVisuals();
      updateHUD();
    });

    btnExplodeFull.addEventListener('click', () => {
      animateSliderTo(2.0, 1000);
    });

    btnAssemble.addEventListener('click', () => {
      animateSliderTo(0.0, 1000);
    });

    sliderOpacity.addEventListener('input', () => {
      updateAllPartVisuals();
      updateHUD();
    });

    sliderExplode.addEventListener('input', () => {
      updateHUD();
    });

    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('mouseleave', onPointerLeave);
    window.addEventListener('click', onClick);

    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'p') {
        isPaused = !isPaused;
      } else if (e.key.toLowerCase() === 'r') {
        sliderExplode.value = '0';
        sliderOpacity.value = '1';
        animationData = null;
        isAnimating = false;
        resetSelectionAndHover();
        updateAllPartVisuals();
        resetView();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    loader.load(
      './AntiqueCamera.glb',
      (gltf) => {
        const model = gltf.scene;
        rootGroup.add(model);

        const assembledBox = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        assembledBox.getSize(size);
        assembledBox.getCenter(center);

        model.position.sub(center);

        const normalizedBox = new THREE.Box3().setFromObject(model);
        const normalizedSize = new THREE.Vector3();
        const normalizedCenter = new THREE.Vector3();
        normalizedBox.getSize(normalizedSize);
        normalizedBox.getCenter(normalizedCenter);

        const longest = Math.max(normalizedSize.x, normalizedSize.y, normalizedSize.z) || 1;
        const scale = 2 / longest;
        model.scale.setScalar(scale);

        const finalBox = new THREE.Box3().setFromObject(model);
        finalBox.getCenter(modelCenter);

        let partIndex = 0;
        const tempBox = new THREE.Box3();
        const partCenter = new THREE.Vector3();

        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
            ensureStandardMaterial(child);

            child.updateWorldMatrix(true, false);

            tempBox.setFromObject(child);
            tempBox.getCenter(partCenter);

            const worldDir = partCenter.clone().sub(modelCenter);
            const partDistanceFromCenter = Math.max(worldDir.length(), 0.08);
            const explodeDirection = worldDir.lengthSq() > 1e-8
              ? worldDir.clone().normalize()
              : new THREE.Vector3(0, 1, 0);

            child.userData.partIndex = partIndex;
            child.userData.originalPosition = child.position.clone();
            child.userData.originalQuaternion = child.quaternion.clone();
            child.userData.explodeDirection = explodeDirection.clone();
            child.userData.partDistanceFromCenter = partDistanceFromCenter;
            child.userData.targetPosition = child.position.clone();

            const label = createPartLabel(partIndex, child);
            child.userData.label = label.object;
            child.userData.labelDiv = label.div;

            parts.push(child);
            partIndex++;
          }
        });

        updateAllPartVisuals();
        updateHUD();
        loadingEl.style.display = 'none';
      },
      undefined,
      (err) => {
        console.error('Failed to load AntiqueCamera.glb', err);
        loadingEl.textContent = 'Failed to load AntiqueCamera.glb';
      }
    );

    function updateAnimation(now) {
      if (!animationData) return;

      const { start, duration, from, to } = animationData;
      const t = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      const value = from + (to - from) * eased;
      sliderExplode.value = value.toFixed(2);

      if (t >= 1) {
        sliderExplode.value = String(to);
        animationData = null;
        isAnimating = false;
      }
    }

    function update3DState() {
      const positions = [];
      let explodeValid = parts.length > 0;

      for (const mesh of parts) {
        const wp = new THREE.Vector3();
        mesh.getWorldPosition(wp);
        positions.push({ x: wp.x, y: wp.y, z: wp.z });
        if (!Number.isFinite(wp.x) || !Number.isFinite(wp.y) || !Number.isFinite(wp.z)) {
          explodeValid = false;
        }
      }

      window.__3D_STATE__ = {
        frameCount,
        partCount: parts.length,
        explodeDistance: parseFloat(sliderExplode.value),
        selectedCount: selectedParts.size,
        hoveredPart: hoveredPart ? hoveredPart.userData.partIndex : -1,
        opacity: parseFloat(sliderOpacity.value),
        partsPositions: positions,
        explodeValid,
        isPaused,
        isAnimating
      };
    }

    function animate(now = performance.now()) {
      requestAnimationFrame(animate);

      if (!isPaused) {
        frameCount++;
        updateAnimation(now);
        applyExplodeTargets();
        controls.update();
      }

      updateHUD();
      update3DState();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
