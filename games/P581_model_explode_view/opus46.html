<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Product Exploded View</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: Arial, sans-serif; background: #f0f0f0; }
#canvas-container { width: 100vw; height: 100vh; position: relative; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 12px;
    font-family: monospace;
    font-size: 14px;
    border-radius: 8px;
    z-index: 100;
    line-height: 1.6;
    pointer-events: none;
}

#controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 16px 24px;
    border-radius: 12px;
    z-index: 100;
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
}

#controls label {
    font-size: 13px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
}

#controls input[type="range"] {
    width: 140px;
    cursor: pointer;
}

#controls button {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    background: #4488ff;
    color: white;
    transition: background 0.2s;
}

#controls button:hover {
    background: #2266dd;
}

#controls button#btn-reset {
    background: #ff6644;
}
#controls button#btn-reset:hover {
    background: #dd4422;
}

.part-label {
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    pointer-events: none;
    white-space: nowrap;
    display: none;
    font-family: monospace;
}

.part-label.visible {
    display: block;
}
</style>
</head>
<body>
<div id="canvas-container">
    <div id="hud">
        <div>Parts: <span id="hud-parts">0</span></div>
        <div>Explode: <span id="hud-explode">0.00</span></div>
        <div>Selected: <span id="hud-selected">0</span></div>
        <div>Hovered: <span id="hud-hovered">none</span></div>
        <div>Opacity: <span id="hud-opacity">1.00</span></div>
    </div>
    <div id="controls">
        <label>
            Explode Distance
            <input type="range" id="slider-explode" min="0" max="3" step="0.01" value="0">
        </label>
        <label>
            Part Opacity
            <input type="range" id="slider-opacity" min="0.1" max="1" step="0.05" value="1">
        </label>
        <button id="btn-explode-full">Explode</button>
        <button id="btn-assemble">Assemble</button>
        <button id="btn-reset">Reset</button>
    </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// State
window.__3D_STATE__ = {
    frameCount: 0,
    partCount: 0,
    explodeDistance: 0,
    selectedCount: 0,
    hoveredPart: -1,
    opacity: 1,
    partsPositions: [],
    explodeValid: false,
    isPaused: false,
    isAnimating: false
};

const container = document.getElementById('canvas-container');

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

// Camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(3, 2, 5);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

// CSS2D Renderer
const css2dRenderer = new CSS2DRenderer();
css2dRenderer.setSize(window.innerWidth, window.innerHeight);
css2dRenderer.domElement.style.position = 'absolute';
css2dRenderer.domElement.style.top = '0';
css2dRenderer.domElement.style.left = '0';
css2dRenderer.domElement.style.pointerEvents = 'none';
container.appendChild(css2dRenderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// Lights
const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight1.position.set(5, 8, 5);
dirLight1.castShadow = true;
dirLight1.shadow.mapSize.set(2048, 2048);
dirLight1.shadow.camera.near = 0.1;
dirLight1.shadow.camera.far = 30;
dirLight1.shadow.camera.left = -5;
dirLight1.shadow.camera.right = 5;
dirLight1.shadow.camera.top = 5;
dirLight1.shadow.camera.bottom = -5;
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight2.position.set(-3, 5, -5);
scene.add(dirLight2);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

// Ground plane
const groundGeom = new THREE.CircleGeometry(3, 64);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0xdddddd,
    transparent: true,
    opacity: 0.8,
    roughness: 0.9
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1;
ground.receiveShadow = true;
scene.add(ground);

// Parts data
let parts = [];
let partData = []; // { mesh, originalPos, explodeDir, distFromCenter, selected, label, css2dObj, originalEmissive, originalEmissiveIntensity }
let hoveredIndex = -1;
let previousHoveredIndex = -1;
let modelLoaded = false;

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(-999, -999);

// Animation state
let animationTarget = null;
let animationStart = null;
let animationStartValue = null;
let animationDuration = 1000;
let currentExplodeSmooth = 0;

// UI elements
const sliderExplode = document.getElementById('slider-explode');
const sliderOpacity = document.getElementById('slider-opacity');
const btnReset = document.getElementById('btn-reset');
const btnExplodeFull = document.getElementById('btn-explode-full');
const btnAssemble = document.getElementById('btn-assemble');
const hudParts = document.getElementById('hud-parts');
const hudExplode = document.getElementById('hud-explode');
const hudSelected = document.getElementById('hud-selected');
const hudHovered = document.getElementById('hud-hovered');
const hudOpacity = document.getElementById('hud-opacity');

// Create fallback product model if GLB fails to load
function createFallbackModel() {
    const group = new THREE.Group();

    // Main body (cylinder)
    const bodyGeom = new THREE.CylinderGeometry(0.4, 0.5, 1.0, 32);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.7, roughness: 0.3 });
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    body.name = 'Body';
    body.position.set(0, 0, 0);
    group.add(body);

    // Lens barrel
    const lensBarrelGeom = new THREE.CylinderGeometry(0.25, 0.3, 0.6, 32);
    const lensBarrelMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 });
    const lensBarrel = new THREE.Mesh(lensBarrelGeom, lensBarrelMat);
    lensBarrel.name = 'LensBarrel';
    lensBarrel.position.set(0, 0.8, 0);
    group.add(lensBarrel);

    // Lens glass
    const lensGeom = new THREE.SphereGeometry(0.22, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
    const lensMat = new THREE.MeshStandardMaterial({ color: 0x4488cc, metalness: 0.1, roughness: 0.05, transparent: true, opacity: 0.7 });
    const lens = new THREE.Mesh(lensGeom, lensMat);
    lens.name = 'Lens';
    lens.position.set(0, 1.1, 0);
    group.add(lens);

    // Viewfinder
    const vfGeom = new THREE.BoxGeometry(0.15, 0.12, 0.15);
    const vfMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.6, roughness: 0.4 });
    const viewfinder = new THREE.Mesh(vfGeom, vfMat);
    viewfinder.name = 'Viewfinder';
    viewfinder.position.set(0.2, 0.15, -0.3);
    group.add(viewfinder);

    // Film door
    const doorGeom = new THREE.BoxGeometry(0.6, 0.8, 0.05);
    const doorMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.5, roughness: 0.5 });
    const door = new THREE.Mesh(doorGeom, doorMat);
    door.name = 'FilmDoor';
    door.position.set(0, 0, -0.5);
    group.add(door);

    // Shutter button
    const shutterGeom = new THREE.CylinderGeometry(0.06, 0.06, 0.08, 16);
    const shutterMat = new THREE.MeshStandardMaterial({ color: 0xcc3333, metalness: 0.3, roughness: 0.4 });
    const shutter = new THREE.Mesh(shutterGeom, shutterMat);
    shutter.name = 'ShutterButton';
    shutter.position.set(0.3, 0.55, 0);
    group.add(shutter);

    // Film advance knob
    const knobGeom = new THREE.CylinderGeometry(0.08, 0.08, 0.15, 16);
    const knobMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.7, roughness: 0.3 });
    const knob = new THREE.Mesh(knobGeom, knobMat);
    knob.name = 'FilmAdvanceKnob';
    knob.position.set(-0.35, 0.55, 0);
    group.add(knob);

    // Tripod mount
    const mountGeom = new THREE.CylinderGeometry(0.1, 0.1, 0.05, 16);
    const mountMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.2 });
    const mount = new THREE.Mesh(mountGeom, mountMat);
    mount.name = 'TripodMount';
    mount.position.set(0, -0.52, 0);
    group.add(mount);

    // Flash shoe
    const shoeGeom = new THREE.BoxGeometry(0.2, 0.04, 0.15);
    const shoeMat = new THREE.MeshStandardMaterial({ color: 0x999999, metalness: 0.7, roughness: 0.3 });
    const shoe = new THREE.Mesh(shoeGeom, shoeMat);
    shoe.name = 'FlashShoe';
    shoe.position.set(0, 0.52, 0.1);
    group.add(shoe);

    // Strap lug left
    const lugGeom = new THREE.TorusGeometry(0.04, 0.015, 8, 16);
    const lugMat = new THREE.MeshStandardMaterial({ color: 0x777777, metalness: 0.8, roughness: 0.3 });
    const lugL = new THREE.Mesh(lugGeom, lugMat);
    lugL.name = 'StrapLugLeft';
    lugL.position.set(-0.52, 0.3, 0);
    lugL.rotation.y = Math.PI / 2;
    group.add(lugL);

    // Strap lug right
    const lugR = new THREE.Mesh(lugGeom.clone(), lugMat.clone());
    lugR.name = 'StrapLugRight';
    lugR.position.set(0.52, 0.3, 0);
    lugR.rotation.y = Math.PI / 2;
    group.add(lugR);

    // Focus ring
    const ringGeom = new THREE.TorusGeometry(0.28, 0.03, 16, 32);
    const ringMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.6, roughness: 0.4 });
    const ring = new THREE.Mesh(ringGeom, ringMat);
    ring.name = 'FocusRing';
    ring.position.set(0, 0.65, 0);
    ring.rotation.x = Math.PI / 2;
    group.add(ring);

    return group;
}

function processModel(modelGroup) {
    // Collect all meshes
    parts = [];
    modelGroup.traverse((child) => {
        if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
            // Ensure material is cloneable for emissive changes
            if (child.material) {
                child.material = child.material.clone();
                if (!child.material.emissive) {
                    child.material.emissive = new THREE.Color(0x000000);
                }
            }
            parts.push(child);
        }
    });

    // Compute bounding box and normalize
    const bbox = new THREE.Box3().setFromObject(modelGroup);
    const center = new THREE.Vector3();
    bbox.getCenter(center);
    const size = new THREE.Vector3();
    bbox.getSize(size);
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 2.0 / maxDim;

    modelGroup.scale.multiplyScalar(scale);
    modelGroup.position.sub(center.multiplyScalar(scale));

    scene.add(modelGroup);

    // After adding to scene, compute world positions
    modelGroup.updateMatrixWorld(true);

    // Compute model center in world space
    const worldBBox = new THREE.Box3().setFromObject(modelGroup);
    const worldCenter = new THREE.Vector3();
    worldBBox.getCenter(worldCenter);

    // Setup part data
    partData = [];
    for (let i = 0; i < parts.length; i++) {
        const mesh = parts[i];
        const partBBox = new THREE.Box3().setFromObject(mesh);
        const partCenter = new THREE.Vector3();
        partBBox.getCenter(partCenter);

        const dir = new THREE.Vector3().subVectors(partCenter, worldCenter);
        const dist = dir.length();
        if (dist > 0.001) {
            dir.normalize();
        } else {
            // Give a random direction for parts at center
            dir.set(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5).normalize();
        }

        const originalPos = mesh.position.clone();

        // Create CSS2D label
        const labelDiv = document.createElement('div');
        labelDiv.className = 'part-label';
        const partName = mesh.name || `Mesh_${i}`;
        labelDiv.textContent = `Part ${i}: ${partName}`;
        const css2dObj = new CSS2DObject(labelDiv);
        css2dObj.position.set(0, 0.15, 0);
        mesh.add(css2dObj);

        partData.push({
            mesh,
            originalPos,
            explodeDir: dir.clone(),
            distFromCenter: Math.max(dist, 0.1),
            selected: false,
            label: labelDiv,
            css2dObj,
            originalEmissive: mesh.material.emissive ? mesh.material.emissive.clone() : new THREE.Color(0),
            originalEmissiveIntensity: mesh.material.emissiveIntensity || 0,
            originalRotation: mesh.rotation.clone(),
            currentPos: originalPos.clone(),
            targetPos: originalPos.clone()
        });
    }

    modelLoaded = true;
    hudParts.textContent = parts.length;
    window.__3D_STATE__.partCount = parts.length;
}

// Try loading GLB, fallback to procedural model
const loader = new GLTFLoader();
loader.load(
    './AntiqueCamera.glb',
    (gltf) => {
        processModel(gltf.scene);
    },
    undefined,
    (error) => {
        console.warn('Failed to load AntiqueCamera.glb, using fallback model:', error);
        const fallback = createFallbackModel();
        processModel(fallback);
    }
);

// Mouse events
function onMouseMove(event) {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
}

function onClick(event) {
    if (!modelLoaded) return;
    if (hoveredIndex >= 0 && hoveredIndex < partData.length) {
        const pd = partData[hoveredIndex];
        pd.selected = !pd.selected;
        if (pd.selected) {
            pd.label.classList.add('visible');
        } else {
            pd.label.classList.remove('visible');
        }
    }
}

renderer.domElement.addEventListener('mousemove', onMouseMove);
renderer.domElement.addEventListener('click', onClick);

// Keyboard
document.addEventListener('keydown', (e) => {
    if (e.key === 'p' || e.key === 'P') {
        window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
    }
    if (e.key === 'r' || e.key === 'R') {
        camera.position.set(3, 2, 5);
        controls.target.set(0, 0, 0);
        controls.update();
    }
});

// Button handlers
btnReset.addEventListener('click', () => {
    sliderExplode.value = 0;
    sliderOpacity.value = 1;
    animationTarget = null;
    window.__3D_STATE__.isAnimating = false;
    partData.forEach(pd => {
        pd.selected = false;
        pd.label.classList.remove('visible');
    });
});

btnExplodeFull.addEventListener('click', () => {
    animationStart = performance.now();
    animationStartValue = parseFloat(sliderExplode.value);
    animationTarget = 2.0;
    animationDuration = 1000;
    window.__3D_STATE__.isAnimating = true;
});

btnAssemble.addEventListener('click', () => {
    animationStart = performance.now();
    animationStartValue = parseFloat(sliderExplode.value);
    animationTarget = 0;
    animationDuration = 1000;
    window.__3D_STATE__.isAnimating = true;
});

// Animation loop
function animate(time) {
    requestAnimationFrame(animate);

    if (window.__3D_STATE__.isPaused) {
        return;
    }

    window.__3D_STATE__.frameCount++;

    // Handle button animations
    if (animationTarget !== null && animationStart !== null) {
        const elapsed = time - animationStart;
        const t = Math.min(elapsed / animationDuration, 1);
        // Ease in-out
        const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        const val = animationStartValue + (animationTarget - animationStartValue) * eased;
        sliderExplode.value = val;
        if (t >= 1) {
            animationTarget = null;
            animationStart = null;
            window.__3D_STATE__.isAnimating = false;
        }
    }

    const explodeDist = parseFloat(sliderExplode.value);
    const opacity = parseFloat(sliderOpacity.value);

    // Update parts
    if (modelLoaded) {
        // Raycasting
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(parts, false);

        previousHoveredIndex = hoveredIndex;
        hoveredIndex = -1;

        if (intersects.length > 0) {
            const hitMesh = intersects[0].object;
            const idx = partData.findIndex(pd => pd.mesh === hitMesh);
            if (idx >= 0) {
                hoveredIndex = idx;
            }
        }

        // Update highlights
        if (previousHoveredIndex >= 0 && previousHoveredIndex !== hoveredIndex) {
            const pd = partData[previousHoveredIndex];
            if (!pd.selected) {
                pd.mesh.material.emissive.copy(pd.originalEmissive);
                pd.mesh.material.emissiveIntensity = pd.originalEmissiveIntensity;
                pd.label.classList.remove('visible');
            }
        }

        // Update all parts
        let selectedCount = 0;
        const positions = [];

        for (let i = 0; i < partData.length; i++) {
            const pd = partData[i];

            // Compute target position
            const targetPos = new THREE.Vector3().copy(pd.originalPos).addScaledVector(
                pd.explodeDir,
                explodeDist * pd.distFromCenter
            );
            pd.targetPos.copy(targetPos);

            // Lerp current position
            pd.currentPos.lerp(pd.targetPos, 0.15);
            pd.mesh.position.copy(pd.currentPos);

            // Rotation based on explode
            const currentExplode = pd.currentPos.distanceTo(pd.originalPos) / Math.max(pd.distFromCenter, 0.01);
            // Apply slight rotation
            pd.mesh.rotation.copy(pd.originalRotation);
            const axis = pd.explodeDir;
            const angle = currentExplode * 0.1;
            const q = new THREE.Quaternion().setFromAxisAngle(axis, angle);
            pd.mesh.quaternion.premultiply(q);

            // Highlight
            if (pd.selected) {
                pd.mesh.material.emissive.setHex(0xff8800);
                pd.mesh.material.emissiveIntensity = 0.4;
                pd.label.classList.add('visible');
                pd.mesh.material.opacity = 1;
                pd.mesh.material.transparent = opacity < 1;
                selectedCount++;
            } else if (i === hoveredIndex) {
                pd.mesh.material.emissive.setHex(0x4444ff);
                pd.mesh.material.emissiveIntensity = 0.3;
                pd.label.classList.add('visible');
                pd.mesh.material.opacity = opacity;
                pd.mesh.material.transparent = opacity < 1;
            } else {
                pd.mesh.material.emissive.copy(pd.originalEmissive);
                pd.mesh.material.emissiveIntensity = pd.originalEmissiveIntensity;
                pd.mesh.material.opacity = opacity;
                pd.mesh.material.transparent = opacity < 1;
            }

            // Get world position
            const wp = new THREE.Vector3();
            pd.mesh.getWorldPosition(wp);
            positions.push({ x: wp.x, y: wp.y, z: wp.z });
        }

        // Update HUD
        hudExplode.textContent = explodeDist.toFixed(2);
        hudSelected.textContent = selectedCount;
        hudOpacity.textContent = opacity.toFixed(2);

        if (hoveredIndex >= 0) {
            const name = partData[hoveredIndex].mesh.name || `Mesh_${hoveredIndex}`;
            hudHovered.textContent = `Part ${hoveredIndex}: ${name}`;
        } else {
            hudHovered.textContent = 'none';
        }

        // Validate positions
        let allFinite = true;
        for (const p of positions) {
            if (!isFinite(p.x) || !isFinite(p.y) || !isFinite(p.z)) {
                allFinite = false;
                break;
            }
        }

        // Update state
        window.__3D_STATE__.explodeDistance = explodeDist;
        window.__3D_STATE__.selectedCount = selectedCount;
        window.__3D_STATE__.hoveredPart = hoveredIndex;
        window.__3D_STATE__.opacity = opacity;
        window.__3D_STATE__.partsPositions = positions;
        window.__3D_STATE__.explodeValid = allFinite && partData.length > 0;
    }

    controls.update();
    renderer.render(scene, camera);
    css2dRenderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    css2dRenderer.setSize(window.innerWidth, window.innerHeight);
});

animate(performance.now());
</script>
</body>
</html>
