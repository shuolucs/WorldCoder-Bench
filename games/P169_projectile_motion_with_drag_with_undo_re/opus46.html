<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fox Projectile Motion Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #controlPanel {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(20, 20, 30, 0.88);
    color: #e0e0e0;
    padding: 18px 22px;
    border-radius: 12px;
    min-width: 240px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    z-index: 10;
  }

  #controlPanel h3 {
    margin-bottom: 14px;
    font-size: 16px;
    color: #fff;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding-bottom: 8px;
    letter-spacing: 0.5px;
  }

  .slider-group {
    margin-bottom: 12px;
  }

  .slider-group label {
    display: block;
    margin-bottom: 4px;
    font-size: 13px;
    color: #bbb;
  }

  .slider-group input[type="range"] {
    width: 100%;
    cursor: pointer;
    accent-color: #ff6b35;
  }

  .btn-row {
    display: flex;
    gap: 6px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .btn-row button {
    flex: 1;
    min-width: 50px;
    padding: 8px 6px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  #fireBtn {
    background: linear-gradient(135deg, #ff6b35, #e04520);
    color: white;
  }
  #fireBtn:hover { background: linear-gradient(135deg, #ff8555, #ff5530); transform: scale(1.03); }

  #resetBtn {
    background: linear-gradient(135deg, #555, #444);
    color: white;
  }
  #resetBtn:hover { background: linear-gradient(135deg, #666, #555); }

  #undoBtn {
    background: linear-gradient(135deg, #3a7bd5, #2c5faa);
    color: white;
  }
  #undoBtn:hover { background: linear-gradient(135deg, #4a8be5, #3c6fba); }

  #redoBtn {
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    color: white;
  }
  #redoBtn:hover { background: linear-gradient(135deg, #3edc81, #37be70); }

  button:active { transform: scale(0.96) !important; }

  .shortcut-hint {
    margin-top: 10px;
    font-size: 10px;
    color: #777;
    line-height: 1.6;
  }

  #hud {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(20, 20, 30, 0.88);
    color: #e0e0e0;
    padding: 16px 20px;
    border-radius: 12px;
    min-width: 200px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    z-index: 10;
  }

  #hud h3 {
    margin-bottom: 10px;
    font-size: 16px;
    color: #fff;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding-bottom: 8px;
  }

  #hud div {
    font-size: 13px;
    margin-bottom: 5px;
    font-family: 'Consolas', 'Courier New', monospace;
    color: #ccc;
  }

  #hud div span {
    color: #FFD700;
  }

  #loadingOverlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10,10,20,0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    color: white;
    font-size: 20px;
    flex-direction: column;
    gap: 15px;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: #ff6b35;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div>Loading Fox Model...</div>
</div>

<div id="controlPanel">
  <h3>🦊 Launch Controls</h3>
  <div class="slider-group">
    <label>Launch Speed: <span id="speedLabel">30</span> m/s</label>
    <input type="range" id="speedSlider" min="10" max="60" step="1" value="30">
  </div>
  <div class="slider-group">
    <label>Launch Angle: <span id="angleLabel">45</span>°</label>
    <input type="range" id="angleSlider" min="5" max="85" step="1" value="45">
  </div>
  <div class="btn-row">
    <button id="fireBtn">🔥 Fire</button>
    <button id="resetBtn">↺ Reset</button>
  </div>
  <div class="btn-row">
    <button id="undoBtn">↶ Undo</button>
    <button id="redoBtn">↷ Redo</button>
  </div>
  <div class="shortcut-hint">
    F = Fire | R = Reset<br>
    Ctrl+Z = Undo | Ctrl+Y = Redo
  </div>
</div>

<div id="hud">
  <h3>📊 Flight Data</h3>
  <div id="posDisplay">Pos: <span>(0.00, 0.00, 0.00)</span></div>
  <div id="velDisplay">Vel: <span>0.00 m/s</span></div>
  <div id="maxHeightDisplay">Max H: <span>0.00 m</span></div>
  <div id="rangeDisplay">Range: <span>0.00 m</span></div>
  <div id="shotCountDisplay">Shots: <span>0</span></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ CONSTANTS ============
const GRAVITY = 9.81;
const CD = 0.47;
const RHO = 1.225;
const AREA = 0.1;
const MASS = 2.0;
const DT = 1 / 60;
const LAUNCH_POS = new THREE.Vector3(-30, 1, 0);
const LAUNCH_PAD_POS = new THREE.Vector3(-30, 0.25, 0);

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 80, 200);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 15, 40);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(-10, 3, 0);

// Lighting
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -50;
dirLight.shadow.camera.right = 50;
dirLight.shadow.camera.top = 50;
dirLight.shadow.camera.bottom = -50;
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(200, 200);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x4a7c3f });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid
const gridHelper = new THREE.GridHelper(200, 40, 0x3a6c2f, 0x3a6c2f);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// Launch pad
const padGeo = new THREE.CylinderGeometry(1, 1, 0.5, 32);
const padMat = new THREE.MeshLambertMaterial({ color: 0xcc2222 });
const launchPad = new THREE.Mesh(padGeo, padMat);
launchPad.position.copy(LAUNCH_PAD_POS);
launchPad.castShadow = true;
scene.add(launchPad);

// Arrow indicator for launch direction
const arrowGroup = new THREE.Group();
arrowGroup.position.copy(LAUNCH_POS);
scene.add(arrowGroup);

function updateArrow() {
  while (arrowGroup.children.length > 0) arrowGroup.remove(arrowGroup.children[0]);
  const angle = (parseFloat(document.getElementById('angleSlider').value)) * Math.PI / 180;
  const speed = parseFloat(document.getElementById('speedSlider').value);
  const len = speed / 10;
  const dir = new THREE.Vector3(Math.cos(angle), Math.sin(angle), 0).normalize();
  const arrow = new THREE.ArrowHelper(dir, new THREE.Vector3(0, 0, 0), len, 0xff6b35, 0.6, 0.3);
  arrowGroup.add(arrow);
}

// ============ FOX MODEL ============
let foxModel = null;
let foxMixer = null;
let foxRunAction = null;
let foxLoaded = false;

// Create a fallback fox (simple mesh) in case GLB fails to load
function createFallbackFox() {
  const group = new THREE.Group();
  // Body
  const bodyGeo = new THREE.CapsuleGeometry(0.4, 0.8, 8, 16);
  const bodyMat = new THREE.MeshLambertMaterial({ color: 0xff6b35 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.rotation.z = Math.PI / 2;
  body.position.y = 0.4;
  group.add(body);
  // Head
  const headGeo = new THREE.SphereGeometry(0.35, 16, 16);
  const head = new THREE.Mesh(headGeo, bodyMat);
  head.position.set(0.6, 0.6, 0);
  group.add(head);
  // Ears
  const earGeo = new THREE.ConeGeometry(0.12, 0.3, 8);
  const ear1 = new THREE.Mesh(earGeo, bodyMat);
  ear1.position.set(0.6, 0.95, 0.15);
  group.add(ear1);
  const ear2 = new THREE.Mesh(earGeo, bodyMat);
  ear2.position.set(0.6, 0.95, -0.15);
  group.add(ear2);
  // Tail
  const tailGeo = new THREE.CapsuleGeometry(0.15, 0.5, 8, 8);
  const tailMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const tail = new THREE.Mesh(tailGeo, tailMat);
  tail.rotation.z = Math.PI / 3;
  tail.position.set(-0.7, 0.5, 0);
  group.add(tail);
  // Nose
  const noseGeo = new THREE.SphereGeometry(0.08, 8, 8);
  const noseMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
  const nose = new THREE.Mesh(noseGeo, noseMat);
  nose.position.set(0.92, 0.55, 0);
  group.add(nose);
  // Eyes
  const eyeGeo = new THREE.SphereGeometry(0.05, 8, 8);
  const eyeMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
  const eye1 = new THREE.Mesh(eyeGeo, eyeMat);
  eye1.position.set(0.82, 0.7, 0.18);
  group.add(eye1);
  const eye2 = new THREE.Mesh(eyeGeo, eyeMat);
  eye2.position.set(0.82, 0.7, -0.18);
  group.add(eye2);

  group.traverse(c => { if (c.isMesh) c.castShadow = true; });
  return group;
}

const loader = new GLTFLoader();

function loadFox() {
  return new Promise((resolve) => {
    loader.load(
      'Fox.glb',
      (gltf) => {
        foxModel = gltf.scene;
        foxModel.scale.set(0.02, 0.02, 0.02);
        foxModel.traverse(c => { if (c.isMesh) c.castShadow = true; });

        if (gltf.animations && gltf.animations.length > 0) {
          foxMixer = new THREE.AnimationMixer(foxModel);
          // Try to find a run animation
          const runAnim = gltf.animations.find(a => a.name.toLowerCase().includes('run')) || gltf.animations[0];
          foxRunAction = foxMixer.clipAction(runAnim);
          foxRunAction.play();
        }

        foxLoaded = true;
        resolve();
      },
      undefined,
      (err) => {
        console.warn('Failed to load Fox.glb, using fallback model:', err);
        foxModel = createFallbackFox();
        foxLoaded = true;
        resolve();
      }
    );
  });
}

// ============ STATE ============
let velocity = new THREE.Vector3(0, 0, 0);
let isFlying = false;
let landed = false;
let maxHeight = 0;
let range = 0;
let shotCount = 0;
let timeOfFlight = 0;
let flightTimer = 0;

// Trajectory
let activeTrailPoints = [];
let activeTrailLine = null;
const TRAIL_MAT_ACTIVE = new THREE.LineBasicMaterial({ color: 0xFFD700, linewidth: 2 });
const TRAIL_MAT_GRAY = new THREE.LineBasicMaterial({ color: 0x888888, linewidth: 1 });

// History stacks
let historyStack = []; // completed shots
let redoStack = [];

// ============ DOM ELEMENTS ============
const speedSlider = document.getElementById('speedSlider');
const angleSlider = document.getElementById('angleSlider');
const speedLabel = document.getElementById('speedLabel');
const angleLabel = document.getElementById('angleLabel');
const fireBtn = document.getElementById('fireBtn');
const resetBtn = document.getElementById('resetBtn');
const undoBtn = document.getElementById('undoBtn');
const redoBtn = document.getElementById('redoBtn');

speedSlider.addEventListener('input', () => {
  speedLabel.textContent = speedSlider.value;
  updateArrow();
});
angleSlider.addEventListener('input', () => {
  angleLabel.textContent = angleSlider.value;
  updateArrow();
});

// ============ GLOBAL STATE ============
window.__3D_STATE__ = {
  foxPosition: { x: LAUNCH_POS.x, y: LAUNCH_POS.y, z: LAUNCH_POS.z },
  foxVelocity: { x: 0, y: 0, z: 0 },
  launchSpeed: 30,
  launchAngle: 45,
  isFlying: false,
  maxHeight: 0,
  range: 0,
  shotCount: 0,
  undoStackSize: 0,
  redoStackSize: 0,
  dragEnabled: true,
  landed: false,
  trajectoryCount: 0,
  mass: MASS,
  dragCoefficient: CD,
  timeOfFlight: 0
};

function updateGlobalState() {
  const pos = foxModel ? foxModel.position : LAUNCH_POS;
  window.__3D_STATE__.foxPosition = { x: pos.x, y: pos.y, z: pos.z };
  window.__3D_STATE__.foxVelocity = { x: velocity.x, y: velocity.y, z: velocity.z };
  window.__3D_STATE__.launchSpeed = parseFloat(speedSlider.value);
  window.__3D_STATE__.launchAngle = parseFloat(angleSlider.value);
  window.__3D_STATE__.isFlying = isFlying;
  window.__3D_STATE__.maxHeight = maxHeight;
  window.__3D_STATE__.range = range;
  window.__3D_STATE__.shotCount = shotCount;
  window.__3D_STATE__.undoStackSize = historyStack.length;
  window.__3D_STATE__.redoStackSize = redoStack.length;
  window.__3D_STATE__.landed = landed;
  window.__3D_STATE__.trajectoryCount = countTrajectories();
  window.__3D_STATE__.timeOfFlight = timeOfFlight;
}

function countTrajectories() {
  let count = historyStack.length;
  if (activeTrailLine) count++;
  return count;
}

// ============ HUD UPDATE ============
function updateHUD() {
  const pos = foxModel ? foxModel.position : LAUNCH_POS;
  document.getElementById('posDisplay').innerHTML = `Pos: <span>(${pos.x.toFixed(2)}, ${pos.y.toFixed(2)}, ${pos.z.toFixed(2)})</span>`;
  const velMag = velocity.length();
  document.getElementById('velDisplay').innerHTML = `Vel: <span>${velMag.toFixed(2)} m/s</span>`;
  document.getElementById('maxHeightDisplay').innerHTML = `Max H: <span>${maxHeight.toFixed(2)} m</span>`;
  document.getElementById('rangeDisplay').innerHTML = `Range: <span>${range.toFixed(2)} m</span>`;
  document.getElementById('shotCountDisplay').innerHTML = `Shots: <span>${shotCount}</span>`;
}

// ============ TRAJECTORY ============
function createTrailLine(points, material) {
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const line = new THREE.Line(geo, material);
  scene.add(line);
  return line;
}

function updateActiveTrail() {
  if (activeTrailLine) {
    scene.remove(activeTrailLine);
    activeTrailLine.geometry.dispose();
  }
  if (activeTrailPoints.length >= 2) {
    activeTrailLine = createTrailLine(activeTrailPoints, TRAIL_MAT_ACTIVE);
  }
}

// ============ FIRE ============
function fire() {
  if (isFlying) return;

  const speed = parseFloat(speedSlider.value);
  const angleDeg = parseFloat(angleSlider.value);
  const angleRad = angleDeg * Math.PI / 180;

  // Reset fox position
  foxModel.position.copy(LAUNCH_POS);

  // Set velocity
  velocity.set(
    speed * Math.cos(angleRad),
    speed * Math.sin(angleRad),
    0
  );

  // Reset flight data
  isFlying = true;
  landed = false;
  maxHeight = LAUNCH_POS.y;
  range = 0;
  flightTimer = 0;
  timeOfFlight = 0;

  // Start new trail
  activeTrailPoints = [LAUNCH_POS.clone()];
  if (activeTrailLine) {
    scene.remove(activeTrailLine);
    activeTrailLine.geometry.dispose();
    activeTrailLine = null;
  }

  // Clear redo stack on new fire
  redoStack.forEach(entry => {
    if (entry.trajectoryLine) {
      scene.remove(entry.trajectoryLine);
      entry.trajectoryLine.geometry.dispose();
    }
  });
  redoStack = [];

  shotCount++;
}

// ============ PHYSICS ============
function computeDragForce(vel) {
  const speed = vel.length();
  if (speed < 1e-8) return new THREE.Vector3(0, 0, 0);
  const dragMag = 0.5 * CD * RHO * AREA * speed * speed;
  const dragForce = vel.clone().normalize().multiplyScalar(-dragMag);
  return dragForce;
}

function physicsStep() {
  if (!isFlying || !foxModel) return;

  // Gravity
  const gravityForce = new THREE.Vector3(0, -GRAVITY * MASS, 0);

  // Drag
  const dragForce = computeDragForce(velocity);

  // Total acceleration
  const totalForce = gravityForce.clone().add(dragForce);
  const acceleration = totalForce.divideScalar(MASS);

  // Semi-implicit Euler
  velocity.add(acceleration.clone().multiplyScalar(DT));

  // Clamp velocity to prevent NaN
  if (isNaN(velocity.x)) velocity.x = 0;
  if (isNaN(velocity.y)) velocity.y = 0;
  if (isNaN(velocity.z)) velocity.z = 0;

  const velMag = velocity.length();
  if (velMag > 200) {
    velocity.normalize().multiplyScalar(200);
  }

  foxModel.position.add(velocity.clone().multiplyScalar(DT));

  // Update flight timer
  flightTimer += DT;

  // Track max height
  if (foxModel.position.y > maxHeight) {
    maxHeight = foxModel.position.y;
  }

  // Range (horizontal distance along x from launch)
  range = Math.abs(foxModel.position.x - LAUNCH_POS.x);

  // Trail
  activeTrailPoints.push(foxModel.position.clone());
  if (activeTrailPoints.length % 3 === 0) {
    updateActiveTrail();
  }

  // Orient fox to face velocity direction
  if (velMag > 0.1) {
    const lookTarget = foxModel.position.clone().add(velocity.clone().normalize());
    const tempObj = new THREE.Object3D();
    tempObj.position.copy(foxModel.position);
    tempObj.lookAt(lookTarget);
    foxModel.quaternion.slerp(tempObj.quaternion, 0.15);
  }

  // Landing detection
  if (foxModel.position.y <= 0) {
    foxModel.position.y = 0;
    isFlying = false;
    landed = true;
    timeOfFlight = flightTimer;
    range = Math.abs(foxModel.position.x - LAUNCH_POS.x);
    velocity.set(0, 0, 0);

    // Finalize trail
    updateActiveTrail();

    // Save to history
    const shotData = {
      trajectoryPoints: activeTrailPoints.map(p => p.clone()),
      trajectoryLine: activeTrailLine,
      range: range,
      maxHeight: maxHeight,
      timeOfFlight: timeOfFlight,
      landingPosition: foxModel.position.clone()
    };

    // Change active trail to gray (it's now historical)
    if (activeTrailLine) {
      activeTrailLine.material = TRAIL_MAT_GRAY;
    }

    historyStack.push(shotData);
    activeTrailLine = null;
    activeTrailPoints = [];
  }
}

// ============ RESET ============
function resetCurrent() {
  if (!foxModel) return;

  isFlying = false;
  landed = false;
  velocity.set(0, 0, 0);
  foxModel.position.copy(LAUNCH_POS);
  foxModel.rotation.set(0, 0, 0);
  foxModel.quaternion.identity();
  maxHeight = 0;
  range = 0;
  timeOfFlight = 0;
  flightTimer = 0;

  // Remove active trail
  if (activeTrailLine) {
    scene.remove(activeTrailLine);
    activeTrailLine.geometry.dispose();
    activeTrailLine = null;
  }
  activeTrailPoints = [];
}

resetBtn.addEventListener('click', resetCurrent);

// ============ UNDO ============
function undo() {
  if (isFlying) return; // Can't undo while flying
  if (historyStack.length === 0) return;

  const lastShot = historyStack.pop();

  // Remove trajectory from scene
  if (lastShot.trajectoryLine) {
    scene.remove(lastShot.trajectoryLine);
  }

  redoStack.push(lastShot);
  shotCount--;

  // Restore fox to launch pad
  if (foxModel) {
    foxModel.position.copy(LAUNCH_POS);
    foxModel.rotation.set(0, 0, 0);
    foxModel.quaternion.identity();
  }
  velocity.set(0, 0, 0);
  isFlying = false;
  landed = false;
  maxHeight = 0;
  range = 0;
  timeOfFlight = 0;
}

// ============ REDO ============
function redo() {
  if (isFlying) return;
  if (redoStack.length === 0) return;

  const shotData = redoStack.pop();

  // Re-add trajectory to scene
  if (shotData.trajectoryLine) {
    scene.add(shotData.trajectoryLine);
  } else if (shotData.trajectoryPoints && shotData.trajectoryPoints.length >= 2) {
    shotData.trajectoryLine = createTrailLine(shotData.trajectoryPoints, TRAIL_MAT_GRAY);
  }

  historyStack.push(shotData);
  shotCount++;

  // Set fox to landing position
  if (foxModel && shotData.landingPosition) {
    foxModel.position.copy(shotData.landingPosition);
  }

  maxHeight = shotData.maxHeight || 0;
  range = shotData.range || 0;
  timeOfFlight = shotData.timeOfFlight || 0;
  landed = true;
}

// ============ EVENT LISTENERS ============
fireBtn.addEventListener('click', fire);
undoBtn.addEventListener('click', undo);
redoBtn.addEventListener('click', redo);

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;

  if (e.key === 'f' || e.key === 'F') {
    e.preventDefault();
    fire();
  }
  if (e.key === 'r' || e.key === 'R') {
    if (!e.ctrlKey && !e.metaKey) {
      e.preventDefault();
      resetCurrent();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'y') {
    e.preventDefault();
    redo();
  }
});

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();

  controls.update();

  if (foxMixer) {
    foxMixer.update(delta);
  }

  physicsStep();
  updateHUD();
  updateGlobalState();

  // Update arrow when not flying
  if (!isFlying) {
    arrowGroup.visible = true;
  } else {
    arrowGroup.visible = false;
  }

  renderer.render(scene, camera);
}

// ============ INIT ============
async function init() {
  await loadFox();

  if (foxModel) {
    foxModel.position.copy(LAUNCH_POS);
    scene.add(foxModel);
  }

  updateArrow();

  document.getElementById('loadingOverlay').style.display = 'none';

  animate();
}

init();
</script>
