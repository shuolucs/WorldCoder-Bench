<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Three.js Projectile Motion with Quadratic Drag, Fox, Undo/Redo</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #87CEEB;
    }

    #controlPanel {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 260px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      z-index: 10;
    }

    #controlPanel h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .control-group {
      margin-bottom: 10px;
    }

    .control-group label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      font-weight: bold;
    }

    .control-group input[type="range"] {
      width: 100%;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      background: #2d6cdf;
      color: white;
      font-weight: bold;
    }

    button:hover {
      filter: brightness(1.05);
    }

    #resetBtn { background: #777; }
    #undoBtn { background: #d97706; }
    #redoBtn { background: #059669; }

    #hud {
      position: absolute;
      top: 12px;
      right: 12px;
      min-width: 230px;
      background: rgba(0, 0, 0, 0.55);
      color: white;
      border-radius: 10px;
      padding: 12px;
      z-index: 10;
      font-size: 14px;
      line-height: 1.5;
    }

    #hud div {
      margin-bottom: 4px;
    }

    #info {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(255,255,255,0.9);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="controlPanel">
    <h3>Projectile Controls</h3>

    <div class="control-group">
      <label for="speedSlider">Launch Speed: <span id="speedLabel">30</span> m/s</label>
      <input id="speedSlider" type="range" min="10" max="60" step="1" value="30" />
    </div>

    <div class="control-group">
      <label for="angleSlider">Launch Angle: <span id="angleLabel">45</span>°</label>
      <input id="angleSlider" type="range" min="5" max="85" step="1" value="45" />
    </div>

    <div class="button-row">
      <button id="fireBtn">Fire</button>
      <button id="resetBtn">Reset</button>
      <button id="undoBtn">Undo</button>
      <button id="redoBtn">Redo</button>
    </div>
  </div>

  <div id="hud">
    <div id="posDisplay">Pos: (0.00, 0.00, 0.00)</div>
    <div id="velDisplay">Vel: 0.00 m/s</div>
    <div id="maxHeightDisplay">Max H: 0.00 m</div>
    <div id="rangeDisplay">Range: 0.00 m</div>
    <div id="shotCountDisplay">Shots: 0</div>
  </div>

  <div id="info">
    Keys: <b>F</b> Fire, <b>R</b> Reset, <b>Ctrl+Z</b> Undo, <b>Ctrl+Y</b> Redo
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    // ----------------------------
    // Basic Setup
    // ----------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#87CEEB');

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 15, 40);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 3, 0);
    controls.enableDamping = true;

    // ----------------------------
    // Lights
    // ----------------------------
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    // ----------------------------
    // Ground + Grid
    // ----------------------------
    const groundGeo = new THREE.PlaneGeometry(200, 200);
    const groundMat = new THREE.MeshLambertMaterial({ color: '#4a7c3f' });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const grid = new THREE.GridHelper(200, 40, 0x333333, 0x666666);
    grid.position.y = 0.01;
    scene.add(grid);

    // ----------------------------
    // Launch Pad
    // ----------------------------
    const launchPadGeo = new THREE.CylinderGeometry(1, 1, 0.5, 32);
    const launchPadMat = new THREE.MeshLambertMaterial({ color: 0xff3333 });
    const launchPad = new THREE.Mesh(launchPadGeo, launchPadMat);
    launchPad.position.set(-30, 0.25, 0);
    scene.add(launchPad);

    // ----------------------------
    // Physics constants
    // ----------------------------
    const g = 9.81;
    const Cd = 0.47;
    const rho = 1.225;
    const A = 0.1;
    const mass = 2.0;
    const fixedDt = 1 / 60;
    const launchPosition = new THREE.Vector3(-30, 1, 0);

    // ----------------------------
    // UI refs
    // ----------------------------
    const speedSlider = document.getElementById('speedSlider');
    const angleSlider = document.getElementById('angleSlider');
    const speedLabel = document.getElementById('speedLabel');
    const angleLabel = document.getElementById('angleLabel');
    const fireBtn = document.getElementById('fireBtn');
    const resetBtn = document.getElementById('resetBtn');
    const undoBtn = document.getElementById('undoBtn');
    const redoBtn = document.getElementById('redoBtn');

    const posDisplay = document.getElementById('posDisplay');
    const velDisplay = document.getElementById('velDisplay');
    const maxHeightDisplay = document.getElementById('maxHeightDisplay');
    const rangeDisplay = document.getElementById('rangeDisplay');
    const shotCountDisplay = document.getElementById('shotCountDisplay');

    // ----------------------------
    // Fox model
    // ----------------------------
    let fox = null;
    let foxRoot = new THREE.Group();
    scene.add(foxRoot);
    foxRoot.position.copy(launchPosition);

    // fallback projectile while model loads/fails
    const fallbackFox = new THREE.Mesh(
      new THREE.SphereGeometry(0.5, 24, 24),
      new THREE.MeshStandardMaterial({ color: 0xffaa00 })
    );
    fallbackFox.visible = true;
    foxRoot.add(fallbackFox);

    const loader = new GLTFLoader();
    loader.load(
      'Fox.glb',
      (gltf) => {
        fox = gltf.scene;
        fox.scale.setScalar(0.02);
        fox.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = false;
            obj.receiveShadow = false;
          }
        });

        fallbackFox.visible = false;
        foxRoot.add(fox);

        // Rough base orientation tweak for common Fox.glb assets
        fox.rotation.y = -Math.PI / 2;
      },
      undefined,
      (err) => {
        console.warn('Failed to load Fox.glb, using fallback sphere.', err);
      }
    );

    // ----------------------------
    // Simulation state
    // ----------------------------
    let position = launchPosition.clone();
    let velocity = new THREE.Vector3(0, 0, 0);
    let isFlying = false;
    let landed = false;
    let maxHeight = launchPosition.y;
    let range = 0;
    let timeOfFlight = 0;
    let currentFlightTime = 0;

    let currentTrailPoints = [];
    let activeTrajectoryLine = null;

    const historyStack = [];
    const redoStack = [];
    const visibleTrajectories = [];

    let accumulator = 0;
    let prevTimestamp = performance.now() / 1000;

    // ----------------------------
    // Utility
    // ----------------------------
    function clampFinite(n, fallback = 0) {
      return Number.isFinite(n) ? n : fallback;
    }

    function round2(n) {
      return (clampFinite(n)).toFixed(2);
    }

    function currentLaunchSpeed() {
      return clampFinite(parseFloat(speedSlider.value), 30);
    }

    function currentLaunchAngleDeg() {
      return clampFinite(parseFloat(angleSlider.value), 45);
    }

    function updateSliderLabels() {
      speedLabel.textContent = String(currentLaunchSpeed());
      angleLabel.textContent = String(currentLaunchAngleDeg());
      update3DState();
    }

    function createTrajectoryLine(points, color = 0xFFD700) {
      const positions = new Float32Array(points.length * 3);
      for (let i = 0; i < points.length; i++) {
        positions[i * 3 + 0] = clampFinite(points[i].x);
        positions[i * 3 + 1] = clampFinite(points[i].y);
        positions[i * 3 + 2] = clampFinite(points[i].z);
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const material = new THREE.LineBasicMaterial({ color });
      return new THREE.Line(geometry, material);
    }

    function disposeLine(line) {
      if (!line) return;
      if (line.geometry) line.geometry.dispose();
      if (line.material) line.material.dispose();
      scene.remove(line);
    }

    function setFoxPosition(pos) {
      position.copy(pos);
      foxRoot.position.copy(position);
    }

    function orientFoxToVelocity() {
      const speedSq = velocity.lengthSq();
      if (speedSq < 1e-8) return;

      const dir = velocity.clone().normalize();
      const yaw = Math.atan2(dir.z, dir.x);
      const pitch = Math.asin(THREE.MathUtils.clamp(dir.y, -1, 1));

      foxRoot.rotation.set(0, 0, 0);
      foxRoot.rotation.y = -yaw;

      if (fox) {
        fox.rotation.set(0, -Math.PI / 2, -pitch);
      } else {
        fallbackFox.rotation.set(0, 0, 0);
      }
    }

    function updateHUD() {
      posDisplay.textContent = `Pos: (${round2(position.x)}, ${round2(position.y)}, ${round2(position.z)})`;
      velDisplay.textContent = `Vel: ${round2(velocity.length())} m/s`;
      maxHeightDisplay.textContent = `Max H: ${round2(maxHeight)} m`;
      rangeDisplay.textContent = `Range: ${round2(range)} m`;
      shotCountDisplay.textContent = `Shots: ${historyStack.length}`;
    }

    function update3DState() {
      window.__3D_STATE__ = {
        foxPosition: {
          x: clampFinite(position.x),
          y: clampFinite(position.y),
          z: clampFinite(position.z)
        },
        foxVelocity: {
          x: clampFinite(velocity.x),
          y: clampFinite(velocity.y),
          z: clampFinite(velocity.z)
        },
        launchSpeed: currentLaunchSpeed(),
        launchAngle: currentLaunchAngleDeg(),
        isFlying,
        maxHeight: clampFinite(maxHeight),
        range: clampFinite(range),
        shotCount: historyStack.length,
        undoStackSize: historyStack.length,
        redoStackSize: redoStack.length,
        dragEnabled: true,
        landed,
        trajectoryCount: visibleTrajectories.length + (activeTrajectoryLine ? 1 : 0),
        mass: 2.0,
        dragCoefficient: 0.47,
        timeOfFlight: clampFinite(timeOfFlight)
      };
    }

    function resetCurrentFlightOnly() {
      isFlying = false;
      landed = false;
      velocity.set(0, 0, 0);
      currentFlightTime = 0;
      maxHeight = launchPosition.y;
      range = 0;
      timeOfFlight = 0;
      setFoxPosition(launchPosition);
      orientFoxToVelocity();

      currentTrailPoints = [];

      if (activeTrajectoryLine) {
        disposeLine(activeTrajectoryLine);
        activeTrajectoryLine = null;
      }
    }

    function resetAll() {
      resetCurrentFlightOnly();

      while (visibleTrajectories.length > 0) {
        disposeLine(visibleTrajectories.pop());
      }

      historyStack.length = 0;
      redoStack.length = 0;

      updateHUD();
      update3DState();
    }

    function grayOutPreviousTrajectories() {
      for (const line of visibleTrajectories) {
        if (line.material) line.material.color.set(0x888888);
      }
    }

    function fireProjectile() {
      if (isFlying) return;

      // firing new shot clears redo stack
      redoStack.length = 0;

      // if there is an active unfinished trajectory, remove it
      if (activeTrajectoryLine) {
        disposeLine(activeTrajectoryLine);
        activeTrajectoryLine = null;
      }

      grayOutPreviousTrajectories();

      setFoxPosition(launchPosition);
      landed = false;
      isFlying = true;
      range = 0;
      timeOfFlight = 0;
      currentFlightTime = 0;
      maxHeight = launchPosition.y;

      const speed = currentLaunchSpeed();
      const angleRad = THREE.MathUtils.degToRad(currentLaunchAngleDeg());

      const vx = speed * Math.cos(angleRad);
      const vy = speed * Math.sin(angleRad);
      velocity.set(clampFinite(vx), clampFinite(vy), 0);

      currentTrailPoints = [position.clone()];
      activeTrajectoryLine = createTrajectoryLine(currentTrailPoints, 0xFFD700);
      scene.add(activeTrajectoryLine);

      orientFoxToVelocity();
      updateHUD();
      update3DState();
    }

    function completeLanding() {
      isFlying = false;
      landed = true;
      position.y = 0;
      foxRoot.position.copy(position);

      range = clampFinite(position.x - launchPosition.x);
      timeOfFlight = clampFinite(currentFlightTime);

      if (activeTrajectoryLine) {
        const finalPoint = position.clone();
        currentTrailPoints.push(finalPoint);

        disposeLine(activeTrajectoryLine);
        activeTrajectoryLine = createTrajectoryLine(currentTrailPoints, 0xFFD700);
        scene.add(activeTrajectoryLine);

        visibleTrajectories.push(activeTrajectoryLine);

        historyStack.push({
          trajectory: activeTrajectoryLine,
          points: currentTrailPoints.map(p => p.clone()),
          range: clampFinite(range),
          maxHeight: clampFinite(maxHeight),
          timeOfFlight: clampFinite(timeOfFlight),
          landingPosition: position.clone()
        });

        activeTrajectoryLine = null;
      }

      velocity.set(0, 0, 0);
      updateHUD();
      update3DState();
    }

    function undoLastShot() {
      if (isFlying) return;
      if (historyStack.length === 0) return;

      const shot = historyStack.pop();
      redoStack.push(shot);

      const idx = visibleTrajectories.indexOf(shot.trajectory);
      if (idx !== -1) visibleTrajectories.splice(idx, 1);

      scene.remove(shot.trajectory);

      resetCurrentFlightOnly();

      if (historyStack.length > 0) {
        const prev = historyStack[historyStack.length - 1];
        range = prev.range;
        maxHeight = prev.maxHeight;
        timeOfFlight = prev.timeOfFlight;
        landed = true;
      }

      updateHUD();
      update3DState();
    }

    function redoLastShot() {
      if (isFlying) return;
      if (redoStack.length === 0) return;

      const shot = redoStack.pop();
      historyStack.push(shot);
      visibleTrajectories.push(shot.trajectory);
      scene.add(shot.trajectory);

      resetCurrentFlightOnly();
      range = shot.range;
      maxHeight = shot.maxHeight;
      timeOfFlight = shot.timeOfFlight;
      landed = true;

      updateHUD();
      update3DState();
    }

    function updateActiveTrajectory() {
      if (!activeTrajectoryLine) return;

      const positions = new Float32Array(currentTrailPoints.length * 3);
      for (let i = 0; i < currentTrailPoints.length; i++) {
        const p = currentTrailPoints[i];
        positions[i * 3] = clampFinite(p.x);
        positions[i * 3 + 1] = clampFinite(p.y);
        positions[i * 3 + 2] = clampFinite(p.z);
      }

      activeTrajectoryLine.geometry.dispose();
      activeTrajectoryLine.geometry = new THREE.BufferGeometry();
      activeTrajectoryLine.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    }

    function simulateStep(dt) {
      if (!isFlying) return;

      dt = clampFinite(dt, fixedDt);
      if (dt <= 0) return;

      const speed = velocity.length();
      const safeSpeed = clampFinite(speed, 0);

      let ax = 0, ay = -g, az = 0;

      if (safeSpeed > 1e-8) {
        const dragFactor = 0.5 * Cd * rho * A / mass;
        const dragAccel = velocity.clone().multiplyScalar(-dragFactor * safeSpeed);
        ax += clampFinite(dragAccel.x);
        ay += clampFinite(dragAccel.y);
        az += clampFinite(dragAccel.z);
      }

      // Semi-implicit Euler
      velocity.x = clampFinite(velocity.x + ax * dt);
      velocity.y = clampFinite(velocity.y + ay * dt);
      velocity.z = clampFinite(velocity.z + az * dt);

      position.x = clampFinite(position.x + velocity.x * dt);
      position.y = clampFinite(position.y + velocity.y * dt);
      position.z = clampFinite(position.z + velocity.z * dt);

      currentFlightTime = clampFinite(currentFlightTime + dt);

      if (position.y > maxHeight) {
        maxHeight = clampFinite(position.y);
      }

      foxRoot.position.copy(position);
      orientFoxToVelocity();

      if (
        currentTrailPoints.length === 0 ||
        currentTrailPoints[currentTrailPoints.length - 1].distanceToSquared(position) > 0.01
      ) {
        currentTrailPoints.push(position.clone());
        updateActiveTrajectory();
      }

      if (position.y <= 0) {
        position.y = 0;
        completeLanding();
      }
    }

    // ----------------------------
    // UI Events
    // ----------------------------
    speedSlider.addEventListener('input', updateSliderLabels);
    angleSlider.addEventListener('input', updateSliderLabels);

    fireBtn.addEventListener('click', fireProjectile);
    resetBtn.addEventListener('click', resetAll);
    undoBtn.addEventListener('click', undoLastShot);
    redoBtn.addEventListener('click', redoLastShot);

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (e.ctrlKey && key === 'z') {
        e.preventDefault();
        undoLastShot();
        return;
      }

      if (e.ctrlKey && key === 'y') {
        e.preventDefault();
        redoLastShot();
        return;
      }

      if (key === 'f') {
        e.preventDefault();
        fireProjectile();
      } else if (key === 'r') {
        e.preventDefault();
        resetAll();
      }
    });

    // ----------------------------
    // Resize
    // ----------------------------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ----------------------------
    // Init
    // ----------------------------
    updateSliderLabels();
    updateHUD();
    update3DState();
    setFoxPosition(launchPosition);

    // ----------------------------
    // Animation loop
    // ----------------------------
    function animate() {
      requestAnimationFrame(animate);

      const now = performance.now() / 1000;
      let frameTime = now - prevTimestamp;
      prevTimestamp = now;

      frameTime = Math.min(Math.max(frameTime, 0), 0.1);
      accumulator += frameTime;

      while (accumulator >= fixedDt) {
        simulateStep(fixedDt);
        accumulator -= fixedDt;
      }

      controls.update();
      updateHUD();
      update3DState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
