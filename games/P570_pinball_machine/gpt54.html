<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D Pinball</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111122;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    #overlay-title {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 2px;
      color: #ffe066;
      text-shadow: 0 0 8px #ff00aa, 0 0 18px #00aaff;
      pointer-events: none;
      z-index: 10;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(20, 20, 35, 0.72);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px 14px;
      min-width: 220px;
      z-index: 10;
      box-shadow: 0 0 18px rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
    }

    #hud div {
      margin: 4px 0;
      font-size: 14px;
    }

    #controls {
      position: absolute;
      right: 16px;
      top: 16px;
      width: 280px;
      background: rgba(20, 20, 35, 0.72);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px 14px;
      z-index: 10;
      font-size: 13px;
      line-height: 1.4;
    }

    #power-wrap {
      margin-top: 10px;
    }

    #power-track {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.14);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }

    #power-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00ff88, #ffee00, #ff3344);
      transform-origin: left center;
      transition: width 0.02s linear;
    }

    #tilt-row {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #slider-tilt {
      width: 140px;
    }

    #game-over {
      position: absolute;
      left: 50%;
      top: 55%;
      transform: translate(-50%, -50%);
      font-size: 46px;
      font-weight: 900;
      color: #ff5577;
      text-shadow: 0 0 14px #ff2255, 0 0 24px #ff2255;
      display: none;
      z-index: 20;
      pointer-events: none;
    }

    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="overlay-title">3D PINBALL</div>

  <div id="hud">
    <div id="hud-score">Score: 0</div>
    <div id="hud-lives">Lives: 3</div>
    <div id="hud-balls">Balls: 0</div>
    <div id="hud-combo">Combo: x1</div>
    <div id="hud-high-score">High Score: 0</div>
    <div id="hud-tilt">Tilt: 6°</div>
  </div>

  <div id="controls">
    <strong>Controls</strong><br>
    Left Shift: Left flipper<br>
    Right Shift: Right flipper<br>
    Hold Space: Charge launcher<br>
    Release Space: Launch<br>
    M: Add multiball<br>
    N: New game
    <div id="power-wrap">
      <div>Launch Power</div>
      <div id="power-track"><div id="power-bar"></div></div>
    </div>
    <div id="tilt-row">
      <label for="slider-tilt">Tilt</label>
      <input id="slider-tilt" type="range" min="3" max="12" step="0.5" value="6">
      <span id="tilt-value">6°</span>
    </div>
  </div>

  <div id="game-over">GAME OVER<br><span style="font-size:18px;color:#fff;">Press N for New Game</span></div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#111122');

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 25, 15);
    camera.lookAt(0, 5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 5, 0);
    controls.minPolarAngle = 0.35;
    controls.maxPolarAngle = 1.38;
    controls.maxDistance = 45;
    controls.minDistance = 10;

    const ambient = new THREE.AmbientLight(0xffffff, 0.55);
    scene.add(ambient);

    const lights = [
      new THREE.PointLight(0xff33cc, 18, 25, 2),
      new THREE.PointLight(0x33aaff, 18, 25, 2),
      new THREE.PointLight(0x33ff99, 18, 25, 2)
    ];
    lights[0].position.set(-3, 4, -3);
    lights[1].position.set(3, 4, 1);
    lights[2].position.set(0, 5, -7);
    lights.forEach(l => scene.add(l));

    const tableGroup = new THREE.Group();
    scene.add(tableGroup);

    const tableWidth = 10;
    const tableLength = 20;
    const halfW = 5;
    const halfL = 10;
    let tiltDeg = 6;
    let tiltRad = THREE.MathUtils.degToRad(tiltDeg);
    tableGroup.rotation.x = -tiltRad;

    const textureLoader = new THREE.TextureLoader();
    const tableTexture = textureLoader.load('lavatile.jpg');
    tableTexture.wrapS = tableTexture.wrapT = THREE.RepeatWrapping;
    tableTexture.repeat.set(2.5, 5);
    tableTexture.colorSpace = THREE.SRGBColorSpace;

    const boardMat = new THREE.MeshStandardMaterial({
      map: tableTexture,
      roughness: 0.75,
      metalness: 0.12
    });

    const board = new THREE.Mesh(
      new THREE.BoxGeometry(tableWidth, 0.4, tableLength),
      boardMat
    );
    board.position.set(0, 0, 0);
    board.receiveShadow = true;
    tableGroup.add(board);

    const metalMat = new THREE.MeshStandardMaterial({
      color: 0x9999aa,
      metalness: 0.9,
      roughness: 0.2
    });

    const wallThickness = 0.4;
    const wallHeight = 0.5;

    const leftWall = new THREE.Mesh(
      new THREE.BoxGeometry(wallThickness, wallHeight, tableLength),
      metalMat
    );
    leftWall.position.set(-halfW - wallThickness / 2, 0.45, 0);
    tableGroup.add(leftWall);

    const rightWall = new THREE.Mesh(
      new THREE.BoxGeometry(wallThickness, wallHeight, tableLength),
      metalMat
    );
    rightWall.position.set(halfW + wallThickness / 2, 0.45, 0);
    tableGroup.add(rightWall);

    const topWall = new THREE.Mesh(
      new THREE.BoxGeometry(tableWidth + wallThickness * 2, wallHeight, wallThickness),
      metalMat
    );
    topWall.position.set(0, 0.45, -halfL - wallThickness / 2);
    tableGroup.add(topWall);

    const launcherWallInner = new THREE.Mesh(
      new THREE.BoxGeometry(0.18, wallHeight, 2.1),
      new THREE.MeshStandardMaterial({ color: 0x666677, metalness: 0.85, roughness: 0.28 })
    );
    launcherWallInner.position.set(4.0, 0.45, 9.0);
    tableGroup.add(launcherWallInner);

    const launcherGuide = new THREE.Mesh(
      new THREE.BoxGeometry(0.75, 0.02, 2.0),
      new THREE.MeshStandardMaterial({ color: 0x224433, emissive: 0x113322, roughness: 0.9 })
    );
    launcherGuide.position.set(4.5, 0.22, 9.0);
    tableGroup.add(launcherGuide);

    const bumperData = [
      { pos: new THREE.Vector3(-2, 0.3, -5), flash: 0 },
      { pos: new THREE.Vector3( 2, 0.3, -5), flash: 0 },
      { pos: new THREE.Vector3( 0, 0.3, -3), flash: 0 },
      { pos: new THREE.Vector3(-3, 0.3, -7), flash: 0 },
      { pos: new THREE.Vector3( 3, 0.3, -7), flash: 0 },
    ];

    const bumpers = [];
    for (let i = 0; i < bumperData.length; i++) {
      const color = new THREE.Color().setHSL(i / bumperData.length, 0.9, 0.55);
      const mat = new THREE.MeshStandardMaterial({
        color,
        emissive: color.clone(),
        emissiveIntensity: 1.6,
        metalness: 0.45,
        roughness: 0.2
      });
      const mesh = new THREE.Mesh(
        new THREE.CylinderGeometry(0.6, 0.6, 0.6, 32),
        mat
      );
      mesh.position.copy(bumperData[i].pos);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      tableGroup.add(mesh);
      bumpers.push({
        mesh,
        x: bumperData[i].pos.x,
        z: bumperData[i].pos.z,
        radius: 0.6,
        flash: 0,
        baseIntensity: 1.6
      });
    }

    function createFlipperMesh(color) {
      const g = new THREE.BoxGeometry(2.5, 0.3, 0.4);
      g.translate(1.25, 0, 0);
      const m = new THREE.MeshStandardMaterial({
        color,
        metalness: 0.55,
        roughness: 0.28
      });
      const mesh = new THREE.Mesh(g, m);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    const leftFlipperPivot = new THREE.Group();
    leftFlipperPivot.position.set(-2, 0.2, 8);
    leftFlipperPivot.add(createFlipperMesh(0xff7755));
    tableGroup.add(leftFlipperPivot);

    const rightFlipperPivot = new THREE.Group();
    rightFlipperPivot.position.set(2, 0.2, 8);
    const rightMesh = createFlipperMesh(0x55aaff);
    rightMesh.scale.x = -1;
    rightFlipperPivot.add(rightMesh);
    tableGroup.add(rightFlipperPivot);

    const leftFlipper = {
      pivot: leftFlipperPivot,
      pivotX: -2,
      pivotZ: 8,
      length: 2.5,
      rest: THREE.MathUtils.degToRad(-30),
      active: THREE.MathUtils.degToRad(30),
      angle: THREE.MathUtils.degToRad(-30),
      prevAngle: THREE.MathUtils.degToRad(-30),
      target: THREE.MathUtils.degToRad(-30),
      pressed: false
    };

    const rightFlipper = {
      pivot: rightFlipperPivot,
      pivotX: 2,
      pivotZ: 8,
      length: 2.5,
      rest: THREE.MathUtils.degToRad(30),
      active: THREE.MathUtils.degToRad(-30),
      angle: THREE.MathUtils.degToRad(30),
      prevAngle: THREE.MathUtils.degToRad(30),
      target: THREE.MathUtils.degToRad(30),
      pressed: false
    };

    const ballRadius = 0.3;
    const ballGeo = new THREE.SphereGeometry(ballRadius, 28, 28);
    const ballMat = new THREE.MeshStandardMaterial({
      color: 0xdde6ff,
      metalness: 1.0,
      roughness: 0.08,
      envMapIntensity: 1.0
    });

    const balls = [];
    let ballIdCounter = 1;

    function planeYFromZ(z) {
      return ballRadius + 0.22;
    }

    function createBall(x = 4.5, z = 9.2) {
      const mesh = new THREE.Mesh(ballGeo, ballMat.clone());
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      tableGroup.add(mesh);

      const ball = {
        id: ballIdCounter++,
        mesh,
        x,
        z,
        vx: 0,
        vz: 0,
        launched: false
      };
      balls.push(ball);
      syncBallMesh(ball);
      return ball;
    }

    function removeBall(ball) {
      tableGroup.remove(ball.mesh);
      ball.mesh.geometry.dispose?.();
      balls.splice(balls.indexOf(ball), 1);
    }

    function syncBallMesh(ball) {
      ball.mesh.position.set(ball.x, planeYFromZ(ball.z), ball.z);
    }

    const hudScore = document.getElementById('hud-score');
    const hudLives = document.getElementById('hud-lives');
    const hudBalls = document.getElementById('hud-balls');
    const hudCombo = document.getElementById('hud-combo');
    const hudHighScore = document.getElementById('hud-high-score');
    const hudTilt = document.getElementById('hud-tilt');
    const tiltSlider = document.getElementById('slider-tilt');
    const tiltValue = document.getElementById('tilt-value');
    const powerBar = document.getElementById('power-bar');
    const gameOverEl = document.getElementById('game-over');

    const state = {
      frameCount: 0,
      score: 0,
      lives: 3,
      comboMultiplier: 1,
      highScore: 0,
      gameOver: false,
      isPaused: false,
      simTime: 0,
      launchPower: 0,
      charging: false,
      chargeTime: 0,
      comboTimer: 0
    };

    function updateHUD() {
      hudScore.textContent = `Score: ${state.score}`;
      hudLives.textContent = `Lives: ${state.lives}`;
      hudBalls.textContent = `Balls: ${balls.length}`;
      hudCombo.textContent = `Combo: x${state.comboMultiplier}`;
      hudHighScore.textContent = `High Score: ${state.highScore}`;
      hudTilt.textContent = `Tilt: ${tiltDeg}°`;
      tiltValue.textContent = `${tiltDeg}°`;
      powerBar.style.width = `${Math.round(state.launchPower * 100)}%`;
      gameOverEl.style.display = state.gameOver ? 'block' : 'none';
    }

    function addScore(base) {
      const pts = base * state.comboMultiplier;
      state.score += pts;
      if (state.score > state.highScore) state.highScore = state.score;
    }

    function bumperHit() {
      state.comboTimer = 2.0;
      state.comboMultiplier = Math.min(5, state.comboMultiplier + 1);
    }

    function registerBumperScore() {
      addScore(100);
      bumperHit();
    }

    function resetComboIfNeeded(dt) {
      if (state.comboTimer > 0) {
        state.comboTimer -= dt;
        if (state.comboTimer <= 0) {
          state.comboTimer = 0;
          state.comboMultiplier = 1;
        }
      }
    }

    function applyTilt(deg) {
      tiltDeg = deg;
      tiltRad = THREE.MathUtils.degToRad(tiltDeg);
      tableGroup.rotation.x = -tiltRad;
    }

    tiltSlider.addEventListener('input', () => {
      applyTilt(parseFloat(tiltSlider.value));
      updateHUD();
    });

    function launchBall(ball, power01) {
      const p = THREE.MathUtils.clamp(power01, 0, 1);
      const speed = 5 + 15 * p;
      ball.x = 4.5;
      ball.z = 9.3;
      ball.vx = 0;
      ball.vz = -speed;
      ball.launched = true;
      syncBallMesh(ball);
    }

    function launchAnyReadyBall(power01) {
      const ready = balls.find(b => !b.launched && Math.abs(b.x - 4.5) < 0.6 && b.z > 8.0);
      if (ready) {
        launchBall(ready, power01);
        return true;
      }
      if (balls.length < 3) {
        const b = createBall(4.5, 9.3);
        launchBall(b, power01);
        return true;
      }
      return false;
    }

    function spawnInitialBall() {
      if (balls.length === 0 && !state.gameOver) createBall(4.5, 9.3);
    }

    function newGame() {
      while (balls.length) {
        const b = balls[0];
        tableGroup.remove(b.mesh);
        balls.shift();
      }
      state.score = 0;
      state.lives = 3;
      state.comboMultiplier = 1;
      state.comboTimer = 0;
      state.gameOver = false;
      state.isPaused = false;
      state.launchPower = 0;
      state.chargeTime = 0;
      state.charging = false;
      leftFlipper.angle = leftFlipper.rest;
      leftFlipper.prevAngle = leftFlipper.rest;
      rightFlipper.angle = rightFlipper.rest;
      rightFlipper.prevAngle = rightFlipper.rest;
      spawnInitialBall();
      updateHUD();
    }

    function distancePointToSegment(px, pz, ax, az, bx, bz) {
      const abx = bx - ax;
      const abz = bz - az;
      const apx = px - ax;
      const apz = pz - az;
      const abLenSq = abx * abx + abz * abz || 1e-6;
      let t = (apx * abx + apz * abz) / abLenSq;
      t = THREE.MathUtils.clamp(t, 0, 1);
      const cx = ax + abx * t;
      const cz = az + abz * t;
      const dx = px - cx;
      const dz = pz - cz;
      return { dist: Math.hypot(dx, dz), t, cx, cz, dx, dz };
    }

    function flipperSegment(fl) {
      const a = fl.angle;
      const dirX = Math.cos(a);
      const dirZ = Math.sin(a);
      const ax = fl.pivotX;
      const az = fl.pivotZ;
      const bx = ax + dirX * fl.length * (fl === rightFlipper ? -1 : 1);
      const bz = az + dirZ * fl.length * (fl === rightFlipper ? -1 : 1);
      return { ax, az, bx, bz };
    }

    function handleFlipperCollision(ball, fl, dt) {
      const seg = flipperSegment(fl);
      const info = distancePointToSegment(ball.x, ball.z, seg.ax, seg.az, seg.bx, seg.bz);
      const flipperRadius = 0.28;
      const hitDist = ballRadius + flipperRadius;

      if (info.dist < hitDist) {
        let nx = info.dx;
        let nz = info.dz;
        const nLen = Math.hypot(nx, nz) || 1;
        nx /= nLen;
        nz /= nLen;

        const push = hitDist - info.dist + 0.001;
        ball.x += nx * push;
        ball.z += nz * push;

        const vn = ball.vx * nx + ball.vz * nz;
        if (vn < 0) {
          ball.vx -= 1.8 * vn * nx;
          ball.vz -= 1.8 * vn * nz;
        }

        const angularVel = (fl.angle - fl.prevAngle) / Math.max(dt, 1e-5);
        const rx = info.cx - fl.pivotX;
        const rz = info.cz - fl.pivotZ;
        const tangentialX = -angularVel * rz;
        const tangentialZ = angularVel * rx;

        ball.vx += tangentialX * 0.95;
        ball.vz += tangentialZ * 0.95;

        if (ball.vz > 0.5) {
          addScore(10);
        }
      }
    }

    function physicsStep(dt) {
      const gEff = 9.81 * Math.sin(tiltRad);

      leftFlipper.prevAngle = leftFlipper.angle;
      rightFlipper.prevAngle = rightFlipper.angle;

      const riseSpeed = 15;
      const fallSpeed = 22;

      [leftFlipper, rightFlipper].forEach(fl => {
        fl.target = fl.pressed ? fl.active : fl.rest;
        const speed = fl.pressed ? riseSpeed : fallSpeed;
        const maxStep = speed * dt;
        const diff = fl.target - fl.angle;
        if (Math.abs(diff) <= maxStep) fl.angle = fl.target;
        else fl.angle += Math.sign(diff) * maxStep;
        fl.pivot.rotation.y = fl.angle;
      });

      for (const bumper of bumpers) {
        bumper.flash = Math.max(0, bumper.flash - dt);
        bumper.mesh.material.emissiveIntensity = bumper.baseIntensity + (bumper.flash > 0 ? 4.0 : 0.0);
      }

      const toDrain = [];

      for (const ball of balls) {
        ball.vz += gEff * dt;
        ball.vx *= 0.998;
        ball.vz *= 0.998;

        ball.x += ball.vx * dt;
        ball.z += ball.vz * dt;

        if (ball.x - ballRadius < -halfW) {
          ball.x = -halfW + ballRadius;
          ball.vx = Math.abs(ball.vx) * 0.8;
        }
        if (ball.x + ballRadius > halfW) {
          ball.x = halfW - ballRadius;
          ball.vx = -Math.abs(ball.vx) * 0.8;
        }
        if (ball.z - ballRadius < -halfL) {
          ball.z = -halfL + ballRadius;
          ball.vz = Math.abs(ball.vz) * 0.8;
        }

        if (ball.z > 10.0) {
          toDrain.push(ball);
          continue;
        }

        if (ball.x > 4.0 - ballRadius && ball.x < 5.0 + ballRadius && ball.z > 8.0 && ball.z < 10.0) {
          if (ball.x - ballRadius < 4.1) {
            ball.x = 4.1 + ballRadius;
            ball.vx = Math.abs(ball.vx) * 0.8;
          }
        }

        for (const bumper of bumpers) {
          const dx = ball.x - bumper.x;
          const dz = ball.z - bumper.z;
          const minDist = ballRadius + bumper.radius;
          const dist = Math.hypot(dx, dz);
          if (dist < minDist) {
            const nx = dx / (dist || 1);
            const nz = dz / (dist || 1);

            ball.x = bumper.x + nx * (minDist + 0.001);
            ball.z = bumper.z + nz * (minDist + 0.001);

            const speedIn = Math.hypot(ball.vx, ball.vz);
            const dot = ball.vx * nx + ball.vz * nz;

            ball.vx = ball.vx - 2 * dot * nx;
            ball.vz = ball.vz - 2 * dot * nz;

            const newSpeed = Math.max(2.5, speedIn * 1.5);
            const cur = Math.hypot(ball.vx, ball.vz) || 1;
            ball.vx = (ball.vx / cur) * newSpeed;
            ball.vz = (ball.vz / cur) * newSpeed;

            bumper.flash = 0.2;
            registerBumperScore();
          }
        }

        handleFlipperCollision(ball, leftFlipper, dt);
        handleFlipperCollision(ball, rightFlipper, dt);

        syncBallMesh(ball);
      }

      for (const b of toDrain) removeBall(b);

      if (balls.length === 0 && !state.gameOver) {
        state.lives -= 1;
        if (state.lives <= 0) {
          state.lives = 0;
          state.gameOver = true;
        } else {
          createBall(4.5, 9.3);
        }
      }
    }

    const keys = {};
    window.addEventListener('keydown', (e) => {
      if (e.repeat) return;
      keys[e.code] = true;

      if (e.code === 'ShiftLeft') leftFlipper.pressed = true;
      if (e.code === 'ShiftRight') rightFlipper.pressed = true;

      if (e.code === 'Space') {
        e.preventDefault();
        if (!state.gameOver) state.charging = true;
      }

      if (e.code === 'KeyM') {
        if (!state.gameOver && balls.length < 3) {
          const b = createBall(4.5, 9.3);
          launchBall(b, Math.random());
        }
      }

      if (e.code === 'KeyN') {
        newGame();
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.code] = false;

      if (e.code === 'ShiftLeft') leftFlipper.pressed = false;
      if (e.code === 'ShiftRight') rightFlipper.pressed = false;

      if (e.code === 'Space') {
        e.preventDefault();
        if (!state.gameOver && state.charging) {
          launchAnyReadyBall(state.launchPower);
        }
        state.charging = false;
        state.chargeTime = 0;
        state.launchPower = 0;
      }
    });

    window.addEventListener('blur', () => {
      leftFlipper.pressed = false;
      rightFlipper.pressed = false;
      state.charging = false;
      state.chargeTime = 0;
      state.launchPower = 0;
    });

    let lastTime = performance.now();

    function updateStateMirror() {
      window.__3D_STATE__ = {
        frameCount: state.frameCount,
        score: state.score,
        lives: state.lives,
        activeBalls: balls.length,
        comboMultiplier: state.comboMultiplier,
        highScore: state.highScore,
        tiltAngle: tiltDeg,
        ballPositions: balls.map(b => ({ x: b.x, z: b.z })),
        leftFlipperAngle: THREE.MathUtils.radToDeg(leftFlipper.angle),
        rightFlipperAngle: THREE.MathUtils.radToDeg(rightFlipper.angle),
        launchPower: state.launchPower,
        gameOver: state.gameOver,
        isPaused: state.isPaused,
        simTime: state.simTime
      };
    }

    function animate(now) {
      requestAnimationFrame(animate);

      let frameDt = Math.min(0.05, (now - lastTime) / 1000);
      lastTime = now;

      controls.update();

      if (!state.isPaused) {
        if (state.charging && !state.gameOver) {
          state.chargeTime = Math.min(1, state.chargeTime + frameDt);
          state.launchPower = state.chargeTime / 1.0;
        }

        let accumulator = frameDt;
        const fixedDt = 0.016;
        while (accumulator > 0) {
          const step = Math.min(fixedDt, accumulator);
          physicsStep(step);
          resetComboIfNeeded(step);
          state.simTime += step;
          accumulator -= step;
        }
      }

      updateHUD();
      state.frameCount++;
      updateStateMirror();

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    applyTilt(6);
    newGame();
    animate(performance.now());
  </script>
</body>
</html>
