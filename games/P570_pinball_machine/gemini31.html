<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pinball Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111122;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            border: 2px solid #444;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }
        .hud-line {
            margin: 5px 0;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .hud-value {
            font-weight: bold;
            color: #00ffcc;
            float: right;
            margin-left: 20px;
        }
        #hud-score-val { color: #ff00ff; font-size: 24px; }
        #hud-combo-val { color: #ffff00; }
        
        #controls-help {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
            color: #aaa;
        }
        #controls-help span { color: #fff; font-weight: bold; }

        #power-bar-container {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 30px;
            height: 200px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #555;
            border-radius: 15px;
            overflow: hidden;
            transform: rotate(180deg);
        }
        #power-bar {
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #00ff00, #ffff00, #ff0000);
            transition: height 0.05s linear;
        }

        #settings {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #444;
        }
        #settings label { font-size: 14px; }
        #slider-tilt { width: 100px; vertical-align: middle; }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000;
            display: none;
            text-align: center;
            pointer-events: none;
        }
        #game-over span { font-size: 24px; color: white; display: block; margin-top: 10px; text-shadow: none; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div class="hud-line">Score: <span class="hud-value" id="hud-score-val">0</span></div>
        <div class="hud-line">High Score: <span class="hud-value" id="hud-high-score-val">0</span></div>
        <div class="hud-line">Lives: <span class="hud-value" id="hud-lives-val">3</span></div>
        <div class="hud-line">Balls: <span class="hud-value" id="hud-balls-val">1</span></div>
        <div class="hud-line">Combo: <span class="hud-value" id="hud-combo-val">x1</span></div>
    </div>

    <div id="settings">
        <label for="slider-tilt">Tilt (<span id="tilt-val">6</span>°): </label>
        <input type="range" id="slider-tilt" min="3" max="12" step="0.5" value="6">
    </div>

    <div id="power-bar-container">
        <div id="power-bar"></div>
    </div>

    <div id="controls-help">
        <span>L/R Shift</span>: Flippers<br>
        <span>Hold Space</span>: Launch Ball<br>
        <span>M</span>: Multi-ball<br>
        <span>N</span>: New Game
    </div>

    <div id="game-over">GAME OVER<br><span>Press 'N' to restart</span></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            frameCount: 0,
            score: 0,
            lives: 3,
            activeBalls: 0,
            comboMultiplier: 1,
            highScore: 0,
            tiltAngle: 6,
            ballPositions: [],
            leftFlipperAngle: -30,
            rightFlipperAngle: 30,
            launchPower: 0,
            gameOver: false,
            isPaused: false,
            simTime: 0
        };
        const state = window.__3D_STATE__;

        // --- DOM Elements ---
        const elScore = document.getElementById('hud-score-val');
        const elHighScore = document.getElementById('hud-high-score-val');
        const elLives = document.getElementById('hud-lives-val');
        const elBalls = document.getElementById('hud-balls-val');
        const elCombo = document.getElementById('hud-combo-val');
        const elPowerBar = document.getElementById('power-bar');
        const elTiltSlider = document.getElementById('slider-tilt');
        const elTiltVal = document.getElementById('tilt-val');
        const elGameOver = document.getElementById('game-over');

        // --- Three.js Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        scene.fog = new THREE.FogExp2(0x111122, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 25, 15);
        camera.lookAt(0, 5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.1; // Prevent looking under table
        controls.minDistance = 10;
        controls.maxDistance = 40;
        controls.target.set(0, 0, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404050, 1.5);
        scene.add(ambientLight);

        const createNeonLight = (color, x, z) => {
            const light = new THREE.PointLight(color, 50, 15);
            light.position.set(x, 2, z);
            scene.add(light);
            return light;
        };
        createNeonLight(0xff00ff, -3, -5); // Pink
        createNeonLight(0x00ffff, 3, -5);  // Blue
        createNeonLight(0x00ff00, 0, 0);   // Green

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        scene.add(dirLight);

        // --- Texture Generation (Procedural Lava) ---
        function createLavaTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Base dark red
            ctx.fillStyle = '#2a0000';
            ctx.fillRect(0, 0, 512, 512);
            
            // Draw blobs
            for(let i=0; i<100; i++) {
                ctx.beginPath();
                const x = Math.random() * 512;
                const y = Math.random() * 512;
                const r = Math.random() * 40 + 10;
                ctx.arc(x, y, r, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, r);
                gradient.addColorStop(0, Math.random() > 0.5 ? '#ff4400' : '#ff8800');
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fill();
            }
            
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(2, 4);
            return tex;
        }

        // --- Scene Construction ---
        const tableGroup = new THREE.Group();
        scene.add(tableGroup);

        // Materials
        const matTable = new THREE.MeshStandardMaterial({ 
            map: createLavaTexture(),
            roughness: 0.8,
            metalness: 0.2
        });
        const matWall = new THREE.MeshStandardMaterial({
            color: 0x888899,
            roughness: 0.4,
            metalness: 0.8
        });
        const matBumper = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            emissive: 0x00ffff,
            emissiveIntensity: 0.5,
            roughness: 0.2,
            metalness: 0.5
        });
        const matFlipper = new THREE.MeshStandardMaterial({
            color: 0xffaa00,
            roughness: 0.3,
            metalness: 0.1
        });
        const matBall = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            roughness: 0.1,
            metalness: 1.0
        });

        // Playfield Plane
        const planeGeom = new THREE.PlaneGeometry(10, 20);
        const plane = new THREE.Mesh(planeGeom, matTable);
        plane.rotation.x = -Math.PI / 2;
        plane.receiveShadow = true;
        tableGroup.add(plane);

        // Walls
        const createWall = (w, h, d, x, y, z) => {
            const geom = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geom, matWall);
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            tableGroup.add(mesh);
            return mesh;
        };
        createWall(0.5, 1, 20, -5.25, 0.5, 0); // Left
        createWall(0.5, 1, 20, 5.25, 0.5, 0);  // Right
        createWall(11, 1, 0.5, 0, 0.5, -10.25); // Top
        
        // Launcher inner wall (x=4.1, z from -5 to 10)
        createWall(0.2, 0.8, 15, 4.1, 0.4, 2.5); 

        // Bumpers
        const bumpers = [];
        const bumperPositions = [
            {x: -2, z: -5}, {x: 2, z: -5}, {x: 0, z: -3}, 
            {x: -3, z: -7}, {x: 3, z: -7}
        ];
        const bumperRadius = 0.6;
        const bumperGeom = new THREE.CylinderGeometry(bumperRadius, bumperRadius, 0.6, 32);
        bumperPositions.forEach(pos => {
            const mesh = new THREE.Mesh(bumperGeom, matBumper.clone());
            mesh.position.set(pos.x, 0.3, pos.z);
            mesh.castShadow = true;
            tableGroup.add(mesh);
            bumpers.push({ x: pos.x, z: pos.z, radius: bumperRadius, mesh: mesh, flashTimer: 0 });
        });

        // Flippers
        const flipperLength = 2.5;
        const flipperWidth = 0.4;
        const flipperGeomL = new THREE.BoxGeometry(flipperLength, 0.3, flipperWidth);
        flipperGeomL.translate(flipperLength/2, 0, 0); // Pivot at origin
        const flipperGeomR = new THREE.BoxGeometry(flipperLength, 0.3, flipperWidth);
        flipperGeomR.translate(-flipperLength/2, 0, 0); // Pivot at origin

        const flipperLGroup = new THREE.Group();
        flipperLGroup.position.set(-2, 0.2, 8);
        const flipperLMesh = new THREE.Mesh(flipperGeomL, matFlipper);
        flipperLMesh.castShadow = true;
        flipperLGroup.add(flipperLMesh);
        tableGroup.add(flipperLGroup);

        const flipperRGroup = new THREE.Group();
        flipperRGroup.position.set(2, 0.2, 8);
        const flipperRMesh = new THREE.Mesh(flipperGeomR, matFlipper);
        flipperRMesh.castShadow = true;
        flipperRGroup.add(flipperRMesh);
        tableGroup.add(flipperRGroup);

        const flippers = {
            left: {
                pivotX: -2, pivotZ: 8, length: flipperLength, halfWidth: flipperWidth/2,
                angle: -30, targetAngle: -30, restAngle: -30, activeAngle: 30,
                omega: 0, meshGroup: flipperLGroup, isLeft: true
            },
            right: {
                pivotX: 2, pivotZ: 8, length: flipperLength, halfWidth: flipperWidth/2,
                angle: 30, targetAngle: 30, restAngle: 30, activeAngle: -30,
                omega: 0, meshGroup: flipperRGroup, isLeft: false
            }
        };

        // Balls Array
        const balls = [];
        const ballRadius = 0.3;
        const ballGeom = new THREE.SphereGeometry(ballRadius, 32, 32);

        // --- Physics & Game Logic ---
        let comboTimer = 0;
        let keys = {};

        function updateTilt() {
            state.tiltAngle = parseFloat(elTiltSlider.value);
            elTiltVal.innerText = state.tiltAngle;
            tableGroup.rotation.x = state.tiltAngle * Math.PI / 180;
        }
        elTiltSlider.addEventListener('input', updateTilt);
        updateTilt();

        function spawnBall() {
            if (balls.length >= 3) return;
            const mesh = new THREE.Mesh(ballGeom, matBall);
            mesh.castShadow = true;
            tableGroup.add(mesh);
            balls.push({
                mesh: mesh,
                x: 4.6, // Launcher lane
                z: 9.5,
                vx: 0,
                vz: 0,
                radius: ballRadius
            });
            state.activeBalls = balls.length;
            updateHUD();
        }

        function removeBall(index) {
            tableGroup.remove(balls[index].mesh);
            balls.splice(index, 1);
            state.activeBalls = balls.length;
            
            if (balls.length === 0) {
                state.lives--;
                if (state.lives > 0) {
                    setTimeout(spawnBall, 1000);
                } else {
                    state.gameOver = true;
                    elGameOver.style.display = 'block';
                }
            }
            updateHUD();
        }

        function addScore(points) {
            state.score += points * state.comboMultiplier;
            if (state.score > state.highScore) state.highScore = state.score;
            updateHUD();
        }

        function triggerBumper(bumper) {
            bumper.flashTimer = 0.2;
            comboTimer = 2.0;
            state.comboMultiplier = Math.min(5, state.comboMultiplier + 1);
            addScore(100);
        }

        function resetGame() {
            state.score = 0;
            state.lives = 3;
            state.comboMultiplier = 1;
            state.gameOver = false;
            comboTimer = 0;
            elGameOver.style.display = 'none';
            
            // Remove all balls
            [...balls].forEach((_, i) => removeBall(0));
            
            // Reset lives manually since removeBall decrements it
            state.lives = 3; 
            spawnBall();
            updateHUD();
        }

        function updateHUD() {
            elScore.innerText = state.score;
            elHighScore.innerText = state.highScore;
            elLives.innerText = state.lives;
            elBalls.innerText = state.activeBalls;
            elCombo.innerText = 'x' + state.comboMultiplier;
        }

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            keys[e.code] = true;
            
            if (e.code === 'ShiftLeft') flippers.left.targetAngle = flippers.left.activeAngle;
            if (e.code === 'ShiftRight') flippers.right.targetAngle = flippers.right.activeAngle;
            if (e.code === 'KeyM' && !state.gameOver) {
                if(balls.length < 3) {
                    spawnBall();
                    // Give it a random kick if spawned via M
                    const newBall = balls[balls.length-1];
                    newBall.vz = -(10 + Math.random() * 10);
                }
            }
            if (e.code === 'KeyN') resetGame();
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
            
            if (e.code === 'ShiftLeft') flippers.left.targetAngle = flippers.left.restAngle;
            if (e.code === 'ShiftRight') flippers.right.targetAngle = flippers.right.restAngle;
            
            if (e.code === 'Space' && !state.gameOver) {
                // Launch ball
                balls.forEach(ball => {
                    if (ball.x > 4.2 && ball.z > 8) { // In launcher zone
                        ball.vz = -(5 + 20 * state.launchPower);
                    }
                });
                state.launchPower = 0;
                elPowerBar.style.height = '0%';
            }
        });

        // --- Physics Engine ---
        function stepPhysics(dt) {
            const g_eff = 9.81 * Math.sin(state.tiltAngle * Math.PI / 180) * 2; // Scaled up for fun

            // Update Flippers
            ['left', 'right'].forEach(side => {
                const f = flippers[side];
                const oldAngle = f.angle;
                // Lerp angle
                const speed = keys[side === 'left' ? 'ShiftLeft' : 'ShiftRight'] ? 25 : 15; // Faster up, slower down
                f.angle += (f.targetAngle - f.angle) * speed * dt;
                
                // Calculate angular velocity (rad/s)
                f.omega = ((f.angle - oldAngle) * Math.PI / 180) / dt;
                
                // Update mesh
                f.meshGroup.rotation.y = f.angle * Math.PI / 180;
            });

            // Update Balls
            for (let i = balls.length - 1; i >= 0; i--) {
                const ball = balls[i];

                // Gravity & Friction
                ball.vz += g_eff * dt;
                ball.vx *= 0.998;
                ball.vz *= 0.998;

                // Move
                ball.x += ball.vx * dt;
                ball.z += ball.vz * dt;

                // --- Collisions ---

                // 1. Outer Walls
                if (ball.x < -5 + ball.radius) { ball.x = -5 + ball.radius; ball.vx *= -0.8; }
                if (ball.x > 5 - ball.radius) { ball.x = 5 - ball.radius; ball.vx *= -0.8; }
                if (ball.z < -10 + ball.radius) { ball.z = -10 + ball.radius; ball.vz *= -0.8; }

                // 2. Launcher Inner Wall (x=4.1, z > -5)
                if (ball.z > -5) {
                    if (ball.x < 4.1 && ball.x + ball.radius > 4.0) {
                        ball.x = 4.0 - ball.radius; ball.vx *= -0.8;
                    } else if (ball.x > 4.1 && ball.x - ball.radius < 4.2) {
                        ball.x = 4.2 + ball.radius; ball.vx *= -0.8;
                    }
                }

                // 3. Bumpers
                bumpers.forEach(bumper => {
                    const dx = ball.x - bumper.x;
                    const dz = ball.z - bumper.z;
                    const distSq = dx*dx + dz*dz;
                    const minDist = ball.radius + bumper.radius;
                    
                    if (distSq < minDist * minDist) {
                        const dist = Math.sqrt(distSq);
                        const nx = dx / dist;
                        const nz = dz / dist;
                        
                        // Resolve penetration
                        const pen = minDist - dist;
                        ball.x += nx * pen;
                        ball.z += nz * pen;
                        
                        // Reflect velocity if moving towards
                        const dot = ball.vx * nx + ball.vz * nz;
                        if (dot < 0) {
                            ball.vx = (ball.vx - 2 * dot * nx) * 1.5;
                            ball.vz = (ball.vz - 2 * dot * nz) * 1.5;
                            triggerBumper(bumper);
                        }
                    }
                });

                // 4. Flippers (Capsule collision)
                ['left', 'right'].forEach(side => {
                    const f = flippers[side];
                    const rad = f.angle * Math.PI / 180;
                    
                    // Flipper vector AB
                    let dirX, dirZ;
                    if (f.isLeft) {
                        dirX = Math.cos(rad);
                        dirZ = -Math.sin(rad);
                    } else {
                        dirX = -Math.cos(rad);
                        dirZ = Math.sin(rad);
                    }
                    
                    const ax = f.pivotX;
                    const az = f.pivotZ;
                    const bx = ax + dirX * f.length;
                    const bz = az + dirZ * f.length;

                    // Vector AC (A to Ball)
                    const cx = ball.x - ax;
                    const cz = ball.z - az;

                    // Project C onto AB
                    const abLenSq = f.length * f.length;
                    let t = (cx * (bx - ax) + cz * (bz - az)) / abLenSq;
                    t = Math.max(0, Math.min(1, t));

                    // Closest point P on segment
                    const px = ax + t * (bx - ax);
                    const pz = az + t * (bz - az);

                    // Distance from ball to P
                    const dx = ball.x - px;
                    const dz = ball.z - pz;
                    const distSq = dx*dx + dz*dz;
                    const minDist = ball.radius + f.halfWidth;

                    if (distSq < minDist * minDist) {
                        const dist = Math.sqrt(distSq);
                        const nx = dx / dist;
                        const nz = dz / dist;

                        // Resolve penetration
                        const pen = minDist - dist;
                        ball.x += nx * pen;
                        ball.z += nz * pen;

                        // Calculate velocity of point P on flipper
                        const r = t * f.length;
                        let vpx, vpz;
                        if (f.isLeft) {
                            vpx = -r * Math.sin(rad) * f.omega;
                            vpz = -r * Math.cos(rad) * f.omega;
                        } else {
                            vpx = r * Math.sin(rad) * f.omega;
                            vpz = r * Math.cos(rad) * f.omega;
                        }

                        // Relative velocity
                        const vrx = ball.vx - vpx;
                        const vrz = ball.vz - vpz;

                        const dot = vrx * nx + vrz * nz;
                        if (dot < 0) {
                            // Bounce
                            const restitution = 0.5;
                            const impulseX = -(1 + restitution) * dot * nx;
                            const impulseZ = -(1 + restitution) * dot * nz;
                            
                            ball.vx += impulseX;
                            ball.vz += impulseZ;

                            // Flipper save score
                            if (ball.vz < 0 && f.omega !== 0) {
                                addScore(10);
                            }
                        }
                    }
                });

                // 5. Drain
                if (ball.z > 10.5) {
                    removeBall(i);
                }
            }
        }

        // --- Main Loop ---
        const clock = new THREE.Clock();

        // Initial setup
        spawnBall();
        updateHUD();

        function animate() {
            requestAnimationFrame(animate);
            
            const dt = Math.min(clock.getDelta(), 0.1);
            state.simTime += dt;
            state.frameCount++;

            if (!state.isPaused && !state.gameOver) {
                // Launcher Charge
                if (keys['Space']) {
                    state.launchPower = Math.min(1.0, state.launchPower + dt);
                    elPowerBar.style.height = (state.launchPower * 100) + '%';
                }

                // Combo Timer
                if (comboTimer > 0) {
                    comboTimer -= dt;
                    if (comboTimer <= 0) {
                        state.comboMultiplier = 1;
                        updateHUD();
                    }
                }

                // Physics Substepping
                const substeps = 4;
                const sdt = dt / substeps;
                for (let i = 0; i < substeps; i++) {
                    stepPhysics(sdt);
                }

                // Update Visuals
                balls.forEach(ball => {
                    ball.mesh.position.set(ball.x, ball.radius, ball.z);
                    // Simple rolling animation
                    ball.mesh.rotation.x += ball.vz * dt * 2;
                    ball.mesh.rotation.z -= ball.vx * dt * 2;
                });

                bumpers.forEach(bumper => {
                    if (bumper.flashTimer > 0) {
                        bumper.flashTimer -= dt;
                        bumper.mesh.material.emissiveIntensity = 2.0;
                    } else {
                        bumper.mesh.material.emissiveIntensity = 0.5;
                    }
                });
            }

            controls.update();
            renderer.render(scene, camera);

            // Update Global State Object
            state.ballPositions = balls.map(b => ({ x: b.x, z: b.z }));
            state.leftFlipperAngle = flippers.left.angle;
            state.rightFlipperAngle = flippers.right.angle;
        }

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
