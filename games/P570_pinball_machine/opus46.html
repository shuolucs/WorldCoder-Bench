<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Pinball Machine</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #111122; font-family: 'Courier New', monospace; }
canvas { display: block; }

#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(0, 0, 30, 0.75);
  border: 1px solid rgba(0, 200, 255, 0.5);
  border-radius: 8px;
  padding: 15px;
  color: #00ffcc;
  font-size: 14px;
  min-width: 220px;
  text-shadow: 0 0 5px rgba(0, 255, 200, 0.5);
}
#hud div { margin: 4px 0; }
#hud .label { color: #88aacc; }
#hud .value { color: #00ffcc; font-weight: bold; }

#score-display {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 48px;
  color: #ff00ff;
  text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
  font-weight: bold;
}

#power-bar-container {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 30px;
  height: 200px;
  background: rgba(0, 0, 0, 0.7);
  border: 2px solid #444;
  border-radius: 4px;
  overflow: hidden;
}
#power-bar {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 0%;
  background: linear-gradient(to top, #00ff00, #ffff00, #ff0000);
  transition: none;
}

#controls-info {
  position: absolute;
  bottom: 10px;
  left: 10px;
  color: #556688;
  font-size: 11px;
  line-height: 1.6;
}

#tilt-control {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0, 0, 30, 0.75);
  border: 1px solid rgba(0, 200, 255, 0.5);
  border-radius: 8px;
  padding: 10px 15px;
  color: #88aacc;
  font-size: 13px;
}
#slider-tilt {
  width: 120px;
  margin-top: 5px;
  accent-color: #00ffcc;
}

#game-over-overlay {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 60px;
  color: #ff0044;
  text-shadow: 0 0 30px #ff0044;
  text-align: center;
}
#game-over-overlay .sub {
  font-size: 20px;
  color: #aaa;
  margin-top: 10px;
}

#combo-display {
  position: absolute;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 28px;
  color: #ffff00;
  text-shadow: 0 0 15px #ffff00;
  opacity: 0;
  transition: opacity 0.3s;
}
</style>
</head>
<body>

<div id="score-display">0</div>
<div id="combo-display">COMBO x1</div>

<div id="hud">
  <div><span class="label">Score: </span><span class="value" id="hud-score">0</span></div>
  <div><span class="label">Lives: </span><span class="value" id="hud-lives">3</span></div>
  <div><span class="label">Balls: </span><span class="value" id="hud-balls">0</span></div>
  <div><span class="label">Combo: </span><span class="value" id="hud-combo">x1</span></div>
  <div><span class="label">High Score: </span><span class="value" id="hud-high-score">0</span></div>
  <div><span class="label">Tilt: </span><span class="value" id="hud-tilt">6°</span></div>
</div>

<div id="power-bar-container">
  <div id="power-bar"></div>
</div>

<div id="tilt-control">
  <label for="slider-tilt">Table Tilt</label><br>
  <input type="range" id="slider-tilt" min="3" max="12" step="0.5" value="6">
  <span id="tilt-value">6°</span>
</div>

<div id="controls-info">
  L-Shift: Left Flipper | R-Shift: Right Flipper<br>
  Space: Launch | M: Multi-ball | N: New Game
</div>

<div id="game-over-overlay">
  GAME OVER
  <div class="sub">Press 'N' for New Game</div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111122);
scene.fog = new THREE.FogExp2(0x111122, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 25, 15);
camera.lookAt(0, 5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minPolarAngle = 0.2;
controls.target.set(0, 5, 0);

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0x222244, 0.5);
scene.add(ambientLight);

const pinkLight = new THREE.PointLight(0xff00aa, 2, 30);
pinkLight.position.set(-3, 3, -5);
scene.add(pinkLight);

const blueLight = new THREE.PointLight(0x0066ff, 2, 30);
blueLight.position.set(3, 3, -5);
scene.add(blueLight);

const greenLight = new THREE.PointLight(0x00ff66, 1.5, 30);
greenLight.position.set(0, 3, 0);
scene.add(greenLight);

const topLight = new THREE.DirectionalLight(0xffffff, 0.6);
topLight.position.set(0, 20, 0);
topLight.castShadow = true;
scene.add(topLight);

const warmLight = new THREE.PointLight(0xff8844, 1, 25);
warmLight.position.set(0, 5, 8);
scene.add(warmLight);

// ============ GAME STATE ============
let tiltAngleDeg = 6;
let tiltAngle = THREE.MathUtils.degToRad(tiltAngleDeg);
let score = 0;
let lives = 3;
let highScore = 0;
let comboMultiplier = 1;
let lastBumperHitTime = 0;
let consecutiveBumperHits = 0;
let gameOver = false;
let isPaused = false;
let simTime = 0;
let frameCount = 0;

let launchCharging = false;
let launchPower = 0;
let launchStartTime = 0;

const balls = [];
const MAX_BALLS = 3;

// ============ TABLE GROUP ============
const tableGroup = new THREE.Group();
scene.add(tableGroup);

function updateTableTilt() {
  tableGroup.rotation.x = -tiltAngle;
}
updateTableTilt();

// ============ TABLE SURFACE ============
const tableWidth = 10;
const tableLength = 20;

// Create a procedural texture for the table
const tableCanvas = document.createElement('canvas');
tableCanvas.width = 512;
tableCanvas.height = 1024;
const tCtx = tableCanvas.getContext('2d');

// Dark green felt-like background with patterns
const gradient = tCtx.createLinearGradient(0, 0, 0, 1024);
gradient.addColorStop(0, '#0a1a2a');
gradient.addColorStop(0.5, '#0a2020');
gradient.addColorStop(1, '#1a0a2a');
tCtx.fillStyle = gradient;
tCtx.fillRect(0, 0, 512, 1024);

// Add some decorative lines
tCtx.strokeStyle = 'rgba(0, 255, 200, 0.15)';
tCtx.lineWidth = 2;
for (let i = 0; i < 20; i++) {
  tCtx.beginPath();
  tCtx.arc(256, 400, 50 + i * 20, 0, Math.PI * 2);
  tCtx.stroke();
}

// Add grid pattern
tCtx.strokeStyle = 'rgba(100, 100, 200, 0.08)';
tCtx.lineWidth = 1;
for (let x = 0; x < 512; x += 32) {
  tCtx.beginPath();
  tCtx.moveTo(x, 0);
  tCtx.lineTo(x, 1024);
  tCtx.stroke();
}
for (let y = 0; y < 1024; y += 32) {
  tCtx.beginPath();
  tCtx.moveTo(0, y);
  tCtx.lineTo(512, y);
  tCtx.stroke();
}

const tableTexture = new THREE.CanvasTexture(tableCanvas);
tableTexture.wrapS = THREE.RepeatWrapping;
tableTexture.wrapT = THREE.RepeatWrapping;

const tableMaterial = new THREE.MeshStandardMaterial({
  map: tableTexture,
  roughness: 0.7,
  metalness: 0.1,
});

const tableGeom = new THREE.BoxGeometry(tableWidth, 0.2, tableLength);
const tableMesh = new THREE.Mesh(tableGeom, tableMaterial);
tableMesh.position.set(0, 0, 0);
tableMesh.receiveShadow = true;
tableGroup.add(tableMesh);

// ============ WALLS ============
const wallMaterial = new THREE.MeshStandardMaterial({
  color: 0x888899,
  metalness: 0.8,
  roughness: 0.2,
});

const wallHeight = 0.5;
const wallThickness = 0.2;

// Left wall
const leftWall = new THREE.Mesh(
  new THREE.BoxGeometry(wallThickness, wallHeight, tableLength),
  wallMaterial
);
leftWall.position.set(-tableWidth / 2 - wallThickness / 2, wallHeight / 2, 0);
tableGroup.add(leftWall);

// Right wall (with gap for launcher channel)
const rightWallTop = new THREE.Mesh(
  new THREE.BoxGeometry(wallThickness, wallHeight, tableLength - 3),
  wallMaterial
);
rightWallTop.position.set(tableWidth / 2 + wallThickness / 2, wallHeight / 2, -1.5);
tableGroup.add(rightWallTop);

// Launcher channel right wall
const launcherRightWall = new THREE.Mesh(
  new THREE.BoxGeometry(wallThickness, wallHeight, 3),
  wallMaterial
);
launcherRightWall.position.set(tableWidth / 2 + wallThickness / 2, wallHeight / 2, 8.5);
tableGroup.add(launcherRightWall);

// Top wall
const topWall = new THREE.Mesh(
  new THREE.BoxGeometry(tableWidth + wallThickness * 2, wallHeight, wallThickness),
  wallMaterial
);
topWall.position.set(0, wallHeight / 2, -tableLength / 2 - wallThickness / 2);
tableGroup.add(topWall);

// Launcher channel inner wall
const launcherInnerWall = new THREE.Mesh(
  new THREE.BoxGeometry(wallThickness, wallHeight, 4),
  wallMaterial
);
launcherInnerWall.position.set(3.8, wallHeight / 2, 8);
tableGroup.add(launcherInnerWall);

// Launcher channel top wall (small piece connecting inner wall to right wall at top of channel)
const launcherTopWall = new THREE.Mesh(
  new THREE.BoxGeometry(1.3, wallHeight, wallThickness),
  wallMaterial
);
launcherTopWall.position.set(4.15, wallHeight / 2, 6);
tableGroup.add(launcherTopWall);

// Bottom guide walls (angled toward center, leaving drain gap)
const bottomLeftGuide = new THREE.Mesh(
  new THREE.BoxGeometry(2.5, wallHeight, wallThickness),
  wallMaterial
);
bottomLeftGuide.position.set(-3.8, wallHeight / 2, 9.5);
bottomLeftGuide.rotation.y = 0.3;
tableGroup.add(bottomLeftGuide);

const bottomRightGuide = new THREE.Mesh(
  new THREE.BoxGeometry(1.5, wallHeight, wallThickness),
  wallMaterial
);
bottomRightGuide.position.set(3.0, wallHeight / 2, 9.5);
bottomRightGuide.rotation.y = -0.3;
tableGroup.add(bottomRightGuide);

// ============ BUMPERS ============
const bumperPositions = [
  { x: -2, y: 0.3, z: -5 },
  { x: 2, y: 0.3, z: -5 },
  { x: 0, y: 0.3, z: -3 },
  { x: -3, y: 0.3, z: -7 },
  { x: 3, y: 0.3, z: -7 },
];

const bumperRadius = 0.6;
const bumperColors = [0xff0066, 0x00aaff, 0xffaa00, 0x00ff88, 0xff44ff];

const bumpers = bumperPositions.map((pos, i) => {
  const geom = new THREE.CylinderGeometry(bumperRadius, bumperRadius, 0.6, 24);
  const mat = new THREE.MeshStandardMaterial({
    color: bumperColors[i],
    emissive: bumperColors[i],
    emissiveIntensity: 0.3,
    metalness: 0.5,
    roughness: 0.3,
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.position.set(pos.x, pos.y, pos.z);
  mesh.castShadow = true;
  tableGroup.add(mesh);

  // Add ring decoration
  const ringGeom = new THREE.TorusGeometry(bumperRadius + 0.05, 0.05, 8, 24);
  const ringMat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    emissive: bumperColors[i],
    emissiveIntensity: 0.5,
  });
  const ring = new THREE.Mesh(ringGeom, ringMat);
  ring.rotation.x = Math.PI / 2;
  ring.position.set(pos.x, pos.y + 0.3, pos.z);
  tableGroup.add(ring);

  return {
    mesh,
    ring,
    material: mat,
    position: pos,
    baseEmissive: 0.3,
    flashTime: 0,
    color: bumperColors[i],
  };
});

// ============ FLIPPERS ============
const flipperLength = 2.5;
const flipperWidth = 0.4;
const flipperHeight = 0.3;

const flipperMaterial = new THREE.MeshStandardMaterial({
  color: 0xddddee,
  metalness: 0.9,
  roughness: 0.1,
  emissive: 0x222244,
  emissiveIntensity: 0.2,
});

// Left flipper
const leftFlipperPivot = new THREE.Group();
leftFlipperPivot.position.set(-2, 0.2, 8);
tableGroup.add(leftFlipperPivot);

const leftFlipperMesh = new THREE.Mesh(
  new THREE.BoxGeometry(flipperLength, flipperHeight, flipperWidth),
  flipperMaterial.clone()
);
leftFlipperMesh.position.set(flipperLength / 2, 0, 0);
leftFlipperMesh.castShadow = true;
leftFlipperPivot.add(leftFlipperMesh);

// Right flipper
const rightFlipperPivot = new THREE.Group();
rightFlipperPivot.position.set(2, 0.2, 8);
tableGroup.add(rightFlipperPivot);

const rightFlipperMesh = new THREE.Mesh(
  new THREE.BoxGeometry(flipperLength, flipperHeight, flipperWidth),
  flipperMaterial.clone()
);
rightFlipperMesh.position.set(-flipperLength / 2, 0, 0);
rightFlipperMesh.castShadow = true;
rightFlipperPivot.add(rightFlipperMesh);

const leftFlipperRestAngle = THREE.MathUtils.degToRad(-30);
const leftFlipperActiveAngle = THREE.MathUtils.degToRad(30);
const rightFlipperRestAngle = THREE.MathUtils.degToRad(30);
const rightFlipperActiveAngle = THREE.MathUtils.degToRad(-30);

let leftFlipperAngle = leftFlipperRestAngle;
let rightFlipperAngle = rightFlipperRestAngle;
let leftFlipperActive = false;
let rightFlipperActive = false;
let leftFlipperAngularVel = 0;
let rightFlipperAngularVel = 0;

leftFlipperPivot.rotation.y = leftFlipperAngle;
rightFlipperPivot.rotation.y = rightFlipperAngle;

// Flipper pivot indicators
const pivotGeom = new THREE.CylinderGeometry(0.15, 0.15, 0.5, 12);
const pivotMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, emissive: 0xffcc00, emissiveIntensity: 0.5 });
const leftPivotMesh = new THREE.Mesh(pivotGeom, pivotMat);
leftPivotMesh.position.set(-2, 0.3, 8);
tableGroup.add(leftPivotMesh);
const rightPivotMesh = new THREE.Mesh(pivotGeom, pivotMat);
rightPivotMesh.position.set(2, 0.3, 8);
tableGroup.add(rightPivotMesh);

// ============ LAUNCHER ============
const launcherGeom = new THREE.CylinderGeometry(0.2, 0.25, 0.8, 12);
const launcherMat = new THREE.MeshStandardMaterial({
  color: 0xff4400,
  metalness: 0.8,
  roughness: 0.2,
  emissive: 0xff2200,
  emissiveIntensity: 0.3,
});
const launcherMesh = new THREE.Mesh(launcherGeom, launcherMat);
launcherMesh.position.set(4.5, 0.4, 9.5);
tableGroup.add(launcherMesh);

// ============ DECORATIVE ELEMENTS ============
// Add some lane guides
const laneGuideMat = new THREE.MeshStandardMaterial({
  color: 0x444466,
  metalness: 0.7,
  roughness: 0.3,
});

// Upper arch
const archGeom = new THREE.TorusGeometry(2, 0.1, 8, 32, Math.PI);
const archMesh = new THREE.Mesh(archGeom, new THREE.MeshStandardMaterial({
  color: 0xff00ff,
  emissive: 0xff00ff,
  emissiveIntensity: 0.4,
}));
archMesh.position.set(0, 0.3, -8);
archMesh.rotation.x = Math.PI / 2;
tableGroup.add(archMesh);

// ============ BALL CREATION ============
const ballRadius = 0.3;

function createBall() {
  const geom = new THREE.SphereGeometry(ballRadius, 24, 24);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xcccccc,
    metalness: 1.0,
    roughness: 0.05,
    envMapIntensity: 1.0,
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.castShadow = true;
  mesh.position.set(4.5, ballRadius + 0.1, 9);
  tableGroup.add(mesh);

  return {
    mesh,
    x: 4.5,
    z: 9,
    vx: 0,
    vz: 0,
    active: true,
    launched: false,
  };
}

function launchBall(ball, power) {
  const speed = 5 + power * 15; // 5 to 20
  ball.vz = -speed;
  ball.vx = -0.5; // slight left to exit launcher channel
  ball.launched = true;
}

// ============ INPUT ============
const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.code] = true;

  if (e.code === 'ShiftLeft') leftFlipperActive = true;
  if (e.code === 'ShiftRight') rightFlipperActive = true;

  if (e.code === 'Space' && !launchCharging && !gameOver) {
    e.preventDefault();
    launchCharging = true;
    launchStartTime = performance.now();
    launchPower = 0;
  }

  if (e.code === 'KeyM' && !gameOver) {
    addMultiBall();
  }

  if (e.code === 'KeyN') {
    newGame();
  }
});

window.addEventListener('keyup', (e) => {
  keys[e.code] = false;

  if (e.code === 'ShiftLeft') leftFlipperActive = false;
  if (e.code === 'ShiftRight') rightFlipperActive = false;

  if (e.code === 'Space' && launchCharging) {
    e.preventDefault();
    launchCharging = false;
    // Find an unlaunched ball or create one
    let ball = balls.find(b => b.active && !b.launched);
    if (!ball && balls.filter(b => b.active).length < MAX_BALLS && !gameOver) {
      ball = createBall();
      balls.push(ball);
    }
    if (ball && !ball.launched) {
      launchBall(ball, launchPower);
    }
    launchPower = 0;
    document.getElementById('power-bar').style.height = '0%';
  }
});

function addMultiBall() {
  const activeBalls = balls.filter(b => b.active);
  if (activeBalls.length >= MAX_BALLS) return;

  const ball = createBall();
  balls.push(ball);
  const randomPower = 0.3 + Math.random() * 0.7;
  launchBall(ball, randomPower);
}

function newGame() {
  // Remove all balls
  balls.forEach(b => {
    if (b.mesh) tableGroup.remove(b.mesh);
  });
  balls.length = 0;

  score = 0;
  lives = 3;
  comboMultiplier = 1;
  consecutiveBumperHits = 0;
  gameOver = false;
  launchPower = 0;
  launchCharging = false;

  document.getElementById('game-over-overlay').style.display = 'none';

  // Create initial ball
  const ball = createBall();
  balls.push(ball);
}

// ============ TILT SLIDER ============
const tiltSlider = document.getElementById('slider-tilt');
tiltSlider.addEventListener('input', () => {
  tiltAngleDeg = parseFloat(tiltSlider.value);
  tiltAngle = THREE.MathUtils.degToRad(tiltAngleDeg);
  updateTableTilt();
  document.getElementById('tilt-value').textContent = tiltAngleDeg + '°';
});

// ============ PHYSICS ============
const GRAVITY = 9.81;
const RESTITUTION = 0.8;
const FRICTION = 0.998;
const FLIPPER_SPEED = 15;

function getFlipperSegment(pivotX, pivotZ, angle, length, isRight) {
  const dir = isRight ? -1 : 1;
  const endX = pivotX + dir * length * Math.cos(angle);
  const endZ = pivotZ + dir * length * (-Math.sin(angle));
  return {
    x1: pivotX, z1: pivotZ,
    x2: endX, z2: endZ,
  };
}

function pointToSegmentDistance(px, pz, x1, z1, x2, z2) {
  const dx = x2 - x1;
  const dz = z2 - z1;
  const lenSq = dx * dx + dz * dz;
  if (lenSq === 0) return { dist: Math.sqrt((px - x1) ** 2 + (pz - z1) ** 2), t: 0 };

  let t = ((px - x1) * dx + (pz - z1) * dz) / lenSq;
  t = Math.max(0, Math.min(1, t));

  const closestX = x1 + t * dx;
  const closestZ = z1 + t * dz;
  const dist = Math.sqrt((px - closestX) ** 2 + (pz - closestZ) ** 2);

  return { dist, t, closestX, closestZ };
}

function updatePhysics(dt) {
  if (gameOver || isPaused) return;

  const gEff = GRAVITY * Math.sin(tiltAngle);
  const substeps = 3;
  const subDt = dt / substeps;

  for (let step = 0; step < substeps; step++) {
    // Update flippers
    const prevLeftAngle = leftFlipperAngle;
    const prevRightAngle = rightFlipperAngle;

    if (leftFlipperActive) {
      leftFlipperAngle = Math.min(leftFlipperAngle + FLIPPER_SPEED * subDt, leftFlipperActiveAngle);
    } else {
      leftFlipperAngle = Math.max(leftFlipperAngle - FLIPPER_SPEED * 1.5 * subDt, leftFlipperRestAngle);
    }

    if (rightFlipperActive) {
      rightFlipperAngle = Math.max(rightFlipperAngle - FLIPPER_SPEED * subDt, rightFlipperActiveAngle);
    } else {
      rightFlipperAngle = Math.min(rightFlipperAngle + FLIPPER_SPEED * 1.5 * subDt, rightFlipperRestAngle);
    }

    leftFlipperAngularVel = (leftFlipperAngle - prevLeftAngle) / subDt;
    rightFlipperAngularVel = (rightFlipperAngle - prevRightAngle) / subDt;

    for (let bi = balls.length - 1; bi >= 0; bi--) {
      const ball = balls[bi];
      if (!ball.active || !ball.launched) continue;

      // Apply gravity along tilt
      ball.vz += gEff * subDt;

      // Apply friction
      ball.vx *= FRICTION;
      ball.vz *= FRICTION;

      // Update position
      ball.x += ball.vx * subDt;
      ball.z += ball.vz * subDt;

      // Wall collisions
      const halfW = tableWidth / 2;
      const halfL = tableLength / 2;

      // Left wall
      if (ball.x - ballRadius < -halfW) {
        ball.x = -halfW + ballRadius;
        ball.vx = Math.abs(ball.vx) * RESTITUTION;
      }

      // Right wall (with launcher channel consideration)
      if (ball.z < 6) {
        // Normal right wall
        if (ball.x + ballRadius > halfW) {
          ball.x = halfW - ballRadius;
          ball.vx = -Math.abs(ball.vx) * RESTITUTION;
        }
      } else {
        // Launcher channel area
        if (ball.x < 3.8 && ball.x + ballRadius > 3.8 && ball.z > 6) {
          // Inner launcher wall
          ball.x = 3.8 - ballRadius;
          ball.vx = -Math.abs(ball.vx) * RESTITUTION;
        }
        if (ball.x > 3.8) {
          // Inside launcher channel
          if (ball.x + ballRadius > halfW) {
            ball.x = halfW - ballRadius;
            ball.vx = -Math.abs(ball.vx) * RESTITUTION;
          }
          if (ball.x - ballRadius < 3.8) {
            ball.x = 3.8 + ballRadius;
            ball.vx = Math.abs(ball.vx) * RESTITUTION;
          }
        }
        // Launcher top wall at z=6
        if (ball.x > 3.8 && ball.z - ballRadius < 6 && ball.z > 5.5) {
          ball.z = 6 + ballRadius;
          ball.vz = Math.abs(ball.vz) * RESTITUTION;
          // Redirect ball left out of channel
          if (Math.abs(ball.vx) < 1) ball.vx = -3;
        }
      }

      // Top wall
      if (ball.z - ballRadius < -halfL) {
        ball.z = -halfL + ballRadius;
        ball.vz = Math.abs(ball.vz) * RESTITUTION;
      }

      // Bottom drain
      if (ball.z > halfL + 1) {
        ball.active = false;
        tableGroup.remove(ball.mesh);
        continue;
      }

      // Bumper collisions
      for (const bumper of bumpers) {
        const dx = ball.x - bumper.position.x;
        const dz = ball.z - bumper.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        const minDist = ballRadius + bumperRadius;

        if (dist < minDist && dist > 0) {
          // Push ball out
          const nx = dx / dist;
          const nz = dz / dist;
          ball.x = bumper.position.x + nx * minDist;
          ball.z = bumper.position.z + nz * minDist;

          // Reflect velocity
          const dotVN = ball.vx * nx + ball.vz * nz;
          ball.vx -= 2 * dotVN * nx;
          ball.vz -= 2 * dotVN * nz;

          // Amplify speed
          ball.vx *= 1.5;
          ball.vz *= 1.5;

          // Scoring
          const now = performance.now() / 1000;
          if (now - lastBumperHitTime < 2) {
            consecutiveBumperHits++;
            comboMultiplier = Math.min(5, 1 + consecutiveBumperHits);
          } else {
            consecutiveBumperHits = 1;
            comboMultiplier = 1;
          }
          lastBumperHitTime = now;

          score += 100 * comboMultiplier;

          // Flash bumper
          bumper.flashTime = now;

          // Show combo
          if (comboMultiplier > 1) {
            const comboEl = document.getElementById('combo-display');
            comboEl.textContent = `COMBO x${comboMultiplier}`;
            comboEl.style.opacity = '1';
            setTimeout(() => { comboEl.style.opacity = '0'; }, 1000);
          }
        }
      }

      // Flipper collisions
      const leftSeg = getFlipperSegment(-2, 8, leftFlipperAngle, flipperLength, false);
      const rightSeg = getFlipperSegment(2, 8, rightFlipperAngle, flipperLength, true);

      const flipperHalfWidth = flipperWidth / 2 + ballRadius;

      // Left flipper collision
      {
        const result = pointToSegmentDistance(ball.x, ball.z, leftSeg.x1, leftSeg.z1, leftSeg.x2, leftSeg.z2);
        if (result.dist < flipperHalfWidth) {
          const nx = (ball.x - result.closestX) / result.dist;
          const nz = (ball.z - result.closestZ) / result.dist;

          // Push out
          ball.x = result.closestX + nx * flipperHalfWidth;
          ball.z = result.closestZ + nz * flipperHalfWidth;

          // Reflect
          const dotVN = ball.vx * nx + ball.vz * nz;
          if (dotVN < 0) {
            ball.vx -= 2 * dotVN * nx;
            ball.vz -= 2 * dotVN * nz;

            // Add flipper velocity contribution
            const armLength = result.t * flipperLength;
            const tipSpeed = leftFlipperAngularVel * armLength;
            // Perpendicular to flipper direction
            const perpX = -Math.sin(leftFlipperAngle);
            const perpZ = -Math.cos(leftFlipperAngle);
            ball.vx += tipSpeed * perpX * 0.8;
            ball.vz += tipSpeed * perpZ * 0.8;

            // Flipper save points
            if (ball.vz > 0) {
              score += 10;
            }
          }
        }
      }

      // Right flipper collision
      {
        const result = pointToSegmentDistance(ball.x, ball.z, rightSeg.x1, rightSeg.z1, rightSeg.x2, rightSeg.z2);
        if (result.dist < flipperHalfWidth) {
          const nx = (ball.x - result.closestX) / result.dist;
          const nz = (ball.z - result.closestZ) / result.dist;

          ball.x = result.closestX + nx * flipperHalfWidth;
          ball.z = result.closestZ + nz * flipperHalfWidth;

          const dotVN = ball.vx * nx + ball.vz * nz;
          if (dotVN < 0) {
            ball.vx -= 2 * dotVN * nx;
            ball.vz -= 2 * dotVN * nz;

            const armLength = result.t * flipperLength;
            const tipSpeed = rightFlipperAngularVel * armLength;
            const perpX = Math.sin(rightFlipperAngle);
            const perpZ = Math.cos(rightFlipperAngle);
            ball.vx += tipSpeed * perpX * 0.8;
            ball.vz += tipSpeed * perpZ * 0.8;

            if (ball.vz > 0) {
              score += 10;
            }
          }
        }
      }

      // Bottom guide wall collisions (simplified as angled lines)
      // Left guide: roughly from (-5, 9.5) angled
      {
        const wx1 = -5, wz1 = 9.2, wx2 = -2.6, wz2 = 9.8;
        const result = pointToSegmentDistance(ball.x, ball.z, wx1, wz1, wx2, wz2);
        if (result.dist < ballRadius + wallThickness / 2) {
          const dx = wx2 - wx1, dz = wz2 - wz1;
          const len = Math.sqrt(dx * dx + dz * dz);
          let nx = -dz / len, nz = dx / len;
          if (nx * (ball.x - result.closestX) + nz * (ball.z - result.closestZ) < 0) {
            nx = -nx; nz = -nz;
          }
          ball.x = result.closestX + nx * (ballRadius + wallThickness / 2);
          ball.z = result.closestZ + nz * (ballRadius + wallThickness / 2);
          const dotVN = ball.vx * nx + ball.vz * nz;
          if (dotVN < 0) {
            ball.vx -= 2 * dotVN * nx * RESTITUTION;
            ball.vz -= 2 * dotVN * nz * RESTITUTION;
          }
        }
      }

      // Right guide
      {
        const wx1 = 3.6, wz1 = 9.8, wx2 = 2.4, wz2 = 9.2;
        const result = pointToSegmentDistance(ball.x, ball.z, wx1, wz1, wx2, wz2);
        if (result.dist < ballRadius + wallThickness / 2) {
          const dx = wx2 - wx1, dz = wz2 - wz1;
          const len = Math.sqrt(dx * dx + dz * dz);
          let nx = -dz / len, nz = dx / len;
          if (nx * (ball.x - result.closestX) + nz * (ball.z - result.closestZ) < 0) {
            nx = -nx; nz = -nz;
          }
          ball.x = result.closestX + nx * (ballRadius + wallThickness / 2);
          ball.z = result.closestZ + nz * (ballRadius + wallThickness / 2);
          const dotVN = ball.vx * nx + ball.vz * nz;
          if (dotVN < 0) {
            ball.vx -= 2 * dotVN * nx * RESTITUTION;
            ball.vz -= 2 * dotVN * nz * RESTITUTION;
          }
        }
      }

      // Speed cap
      const speed = Math.sqrt(ball.vx * ball.vx + ball.vz * ball.vz);
      if (speed > 30) {
        ball.vx = (ball.vx / speed) * 30;
        ball.vz = (ball.vz / speed) * 30;
      }

      // Update mesh position
      ball.mesh.position.set(ball.x, ballRadius + 0.1, ball.z);
    }
  }

  // Check for drained balls
  const activeBalls = balls.filter(b => b.active);
  if (activeBalls.length === 0 && !gameOver) {
    lives--;
    if (lives <= 0) {
      lives = 0;
      gameOver = true;
      if (score > highScore) highScore = score;
      document.getElementById('game-over-overlay').style.display = 'block';
    } else {
      // Auto-launch new ball
      const ball = createBall();
      balls.push(ball);
    }
  }

  // Update flipper visuals
  leftFlipperPivot.rotation.y = leftFlipperAngle;
  rightFlipperPivot.rotation.y = rightFlipperAngle;

  simTime += dt;
}

// ============ UPDATE HUD ============
function updateHUD() {
  const activeBalls = balls.filter(b => b.active);

  document.getElementById('score-display').textContent = score.toLocaleString();
  document.getElementById('hud-score').textContent = score.toLocaleString();
  document.getElementById('hud-lives').textContent = lives;
  document.getElementById('hud-balls').textContent = activeBalls.length;
  document.getElementById('hud-combo').textContent = 'x' + comboMultiplier;
  document.getElementById('hud-high-score').textContent = highScore.toLocaleString();
  document.getElementById('hud-tilt').textContent = tiltAngleDeg + '°';

  // Update bumper flash effects
  const now = performance.now() / 1000;
  for (const bumper of bumpers) {
    const elapsed = now - bumper.flashTime;
    if (elapsed < 0.2) {
      bumper.material.emissiveIntensity = 2.0;
    } else {
      bumper.material.emissiveIntensity = bumper.baseEmissive + Math.sin(now * 3) * 0.1;
    }
  }

  // Launch power
  if (launchCharging) {
    const elapsed = (performance.now() - launchStartTime) / 1000;
    launchPower = Math.min(1, elapsed);
    document.getElementById('power-bar').style.height = (launchPower * 100) + '%';
    launcherMesh.position.y = 0.4 + launchPower * 0.3;
  } else {
    launcherMesh.position.y = 0.4;
  }

  // Combo decay
  if (now - lastBumperHitTime > 2) {
    comboMultiplier = 1;
    consecutiveBumperHits = 0;
  }

  // High score tracking
  if (score > highScore) highScore = score;
}

// ============ STATE ============
function updateState() {
  const activeBalls = balls.filter(b => b.active);
  window.__3D_STATE__ = {
    frameCount,
    score,
    lives,
    activeBalls: activeBalls.length,
    comboMultiplier,
    highScore,
    tiltAngle: tiltAngleDeg,
    ballPositions: activeBalls.map(b => ({ x: b.x, z: b.z })),
    leftFlipperAngle: THREE.MathUtils.radToDeg(leftFlipperAngle),
    rightFlipperAngle: THREE.MathUtils.radToDeg(rightFlipperAngle),
    launchPower,
    gameOver,
    isPaused,
    simTime,
  };
}

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.05);
  frameCount++;

  updatePhysics(0.016);
  updateHUD();
  updateState();

  // Animate lights
  const t = performance.now() / 1000;
  pinkLight.intensity = 2 + Math.sin(t * 2) * 0.5;
  blueLight.intensity = 2 + Math.sin(t * 2.5 + 1) * 0.5;
  greenLight.intensity = 1.5 + Math.sin(t * 3 + 2) * 0.3;

  controls.update();
  renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ INIT ============
newGame();
animate();

</script>
