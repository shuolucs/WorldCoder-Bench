<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Traffic Intersection Simulator</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #88aacc;
    }
    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
    }
    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0,0,0,0.45);
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 260px;
      backdrop-filter: blur(4px);
    }
    #ui h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }
    #hud div, .control-row {
      margin: 6px 0;
      font-size: 13px;
    }
    .label {
      display: inline-block;
      width: 110px;
      color: #cfe8ff;
    }
    input[type="range"] {
      width: 150px;
      vertical-align: middle;
    }
    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #ddd;
      line-height: 1.4;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h3>Traffic Intersection HUD</h3>
      <div class="control-row">
        <span class="label">Spawn rate</span>
        <input id="slider-spawn-rate" type="range" min="1" max="8" step="0.5" value="3" />
        <span id="spawn-rate-value">3.0</span>s
      </div>
      <div class="control-row">
        <span class="label">Base speed</span>
        <input id="slider-speed" type="range" min="2" max="15" step="1" value="5" />
        <span id="speed-value">5</span>
      </div>

      <div id="hud">
        <div><span class="label">Vehicles</span><span id="hud-vehicles">0</span></div>
        <div><span class="label">Collisions</span><span id="hud-collisions">0</span></div>
        <div><span class="label">NS light</span><span id="hud-ns-light">Green</span></div>
        <div><span class="label">EW light</span><span id="hud-ew-light">Red</span></div>
        <div><span class="label">Cycle time</span><span id="hud-cycle">0.0</span></div>
        <div><span class="label">Model loaded</span><span id="hud-model">No</span></div>
      </div>

      <div class="hint">
        Space: Pause/Play<br>
        R: Reset<br>
        F: Emergency all-red for 5s
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const app = document.getElementById('app');

    const hudVehicles = document.getElementById('hud-vehicles');
    const hudCollisions = document.getElementById('hud-collisions');
    const hudNsLight = document.getElementById('hud-ns-light');
    const hudEwLight = document.getElementById('hud-ew-light');
    const hudCycle = document.getElementById('hud-cycle');
    const hudModel = document.getElementById('hud-model');
    const sliderSpawnRate = document.getElementById('slider-spawn-rate');
    const sliderSpeed = document.getElementById('slider-speed');
    const spawnRateValue = document.getElementById('spawn-rate-value');
    const speedValue = document.getElementById('speed-value');

    // --------------------------------------------------
    // Scene setup
    // --------------------------------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x88aacc);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 30, 30);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0x667788, 0.5);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -40;
    dirLight.shadow.camera.right = 40;
    dirLight.shadow.camera.top = 40;
    dirLight.shadow.camera.bottom = -40;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 80;
    scene.add(dirLight);

    // --------------------------------------------------
    // Ground and roads
    // --------------------------------------------------
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(60, 60),
      new THREE.MeshStandardMaterial({ color: 0x445544 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff });

    const roadNS = new THREE.Mesh(new THREE.BoxGeometry(6, 0.02, 60), roadMat);
    roadNS.position.y = 0.01;
    roadNS.receiveShadow = true;
    scene.add(roadNS);

    const roadEW = new THREE.Mesh(new THREE.BoxGeometry(60, 0.02, 6), roadMat);
    roadEW.position.y = 0.011;
    roadEW.receiveShadow = true;
    scene.add(roadEW);

    function addDashedLineNS() {
      for (let z = -28; z <= 28; z += 3) {
        if (Math.abs(z) < 4) continue;
        const dash = new THREE.Mesh(
          new THREE.BoxGeometry(0.15, 0.02, 1.4),
          lineMat
        );
        dash.position.set(0, 0.02, z);
        scene.add(dash);
      }
    }

    function addDashedLineEW() {
      for (let x = -28; x <= 28; x += 3) {
        if (Math.abs(x) < 4) continue;
        const dash = new THREE.Mesh(
          new THREE.BoxGeometry(1.4, 0.02, 0.15),
          lineMat
        );
        dash.position.set(x, 0.021, 0);
        scene.add(dash);
      }
    }

    addDashedLineNS();
    addDashedLineEW();

    // --------------------------------------------------
    // Traffic lights
    // --------------------------------------------------
    const trafficLights = [];
    const lightPoleMat = new THREE.MeshStandardMaterial({ color: 0x222222 });

    function createSignalSphere(colorHex, yOffset, xOffset = 0) {
      const mat = new THREE.MeshStandardMaterial({
        color: colorHex,
        emissive: colorHex,
        emissiveIntensity: 0.1
      });
      const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.15, 20, 20), mat);
      mesh.position.set(xOffset, yOffset, 0);
      mesh.castShadow = true;
      return mesh;
    }

    function createTrafficLight(x, z, orientation) {
      const group = new THREE.Group();
      group.position.set(x, 0, z);

      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.1, 0.1, 3, 12),
        lightPoleMat
      );
      pole.position.y = 1.5;
      pole.castShadow = true;
      group.add(pole);

      const head = new THREE.Group();
      head.position.set(0, 2.6, 0);
      if (orientation === 'x') head.rotation.y = Math.PI / 2;

      const red = createSignalSphere(0xff0000, 0.4);
      const yellow = createSignalSphere(0xffff00, 0.0);
      const green = createSignalSphere(0x00ff00, -0.4);

      head.add(red, yellow, green);
      group.add(head);

      scene.add(group);

      return {
        group,
        orientation,
        red,
        yellow,
        green
      };
    }

    trafficLights.push(createTrafficLight(-4.5, -4.5, 'z'));
    trafficLights.push(createTrafficLight(4.5, -4.5, 'x'));
    trafficLights.push(createTrafficLight(-4.5, 4.5, 'x'));
    trafficLights.push(createTrafficLight(4.5, 4.5, 'z'));

    // --------------------------------------------------
    // Traffic light state machine
    // --------------------------------------------------
    const lightPhases = [
      { ns: 'Green',  ew: 'Red',    duration: 8 },
      { ns: 'Yellow', ew: 'Red',    duration: 2 },
      { ns: 'Red',    ew: 'Green',  duration: 8 },
      { ns: 'Red',    ew: 'Yellow', duration: 2 }
    ];

    let currentPhaseIndex = 0;
    let phaseTime = 0;
    let emergencyStop = false;
    let emergencyTimer = 0;

    function currentPhase() {
      if (emergencyStop) return { ns: 'Red', ew: 'Red', duration: 5 };
      return lightPhases[currentPhaseIndex];
    }

    function setLamp(mesh, active) {
      mesh.material.emissiveIntensity = active ? 2.0 : 0.1;
    }

    function updateTrafficLightVisuals() {
      const phase = currentPhase();

      for (const tl of trafficLights) {
        const state = tl.orientation === 'z' ? phase.ns : phase.ew;
        setLamp(tl.red, state === 'Red');
        setLamp(tl.yellow, state === 'Yellow');
        setLamp(tl.green, state === 'Green');
      }

      hudNsLight.textContent = phase.ns;
      hudEwLight.textContent = phase.ew;
      hudCycle.textContent = phaseTime.toFixed(1);
    }

    function resetTrafficLights() {
      currentPhaseIndex = 0;
      phaseTime = 0;
      emergencyStop = false;
      emergencyTimer = 0;
      updateTrafficLightVisuals();
    }

    function updateTrafficLights(dt) {
      if (emergencyStop) {
        emergencyTimer -= dt;
        phaseTime += dt;
        if (emergencyTimer <= 0) {
          emergencyStop = false;
          phaseTime = 0;
        }
        updateTrafficLightVisuals();
        return;
      }

      phaseTime += dt;
      const phase = lightPhases[currentPhaseIndex];
      if (phaseTime >= phase.duration) {
        phaseTime = 0;
        currentPhaseIndex = (currentPhaseIndex + 1) % lightPhases.length;
      }
      updateTrafficLightVisuals();
    }

    // --------------------------------------------------
    // Vehicle model loading
    // --------------------------------------------------
    const loader = new GLTFLoader();
    let vehicleTemplate = null;
    let modelLoaded = false;

    loader.load(
      'ToyCar.glb',
      (gltf) => {
        vehicleTemplate = gltf.scene;
        vehicleTemplate.traverse(obj => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
            if (obj.material) obj.material = obj.material.clone();
          }
        });
        modelLoaded = true;
        hudModel.textContent = 'Yes';
      },
      undefined,
      () => {
        // Fallback if GLB fails
        const fallback = new THREE.Group();
        const body = new THREE.Mesh(
          new THREE.BoxGeometry(1.6, 0.8, 3.4),
          new THREE.MeshStandardMaterial({ color: 0x3399ff })
        );
        body.position.y = 0.8;
        body.castShadow = true;
        fallback.add(body);

        const top = new THREE.Mesh(
          new THREE.BoxGeometry(1.2, 0.6, 1.8),
          new THREE.MeshStandardMaterial({ color: 0xaaccff })
        );
        top.position.y = 1.3;
        top.castShadow = true;
        fallback.add(top);

        vehicleTemplate = fallback;
        modelLoaded = false;
        hudModel.textContent = 'No';
      }
    );

    // --------------------------------------------------
    // Vehicles
    // --------------------------------------------------
    const vehicles = [];
    let totalCollisions = 0;
    let spawnTimer = 0;
    let frameCount = 0;
    let isPaused = false;

    const directions = {
      north: {
        spawn: new THREE.Vector3(1.5, 0, -25),
        dir: new THREE.Vector3(0, 0, 1),
        rotationY: 0,
        axis: 'z',
        sign: 1,
        stopLine: -2
      },
      south: {
        spawn: new THREE.Vector3(-1.5, 0, 25),
        dir: new THREE.Vector3(0, 0, -1),
        rotationY: Math.PI,
        axis: 'z',
        sign: -1,
        stopLine: 2
      },
      east: {
        spawn: new THREE.Vector3(25, 0, 1.5),
        dir: new THREE.Vector3(-1, 0, 0),
        rotationY: Math.PI / 2,
        axis: 'x',
        sign: -1,
        stopLine: 2
      },
      west: {
        spawn: new THREE.Vector3(-25, 0, -1.5),
        dir: new THREE.Vector3(1, 0, 0),
        rotationY: -Math.PI / 2,
        axis: 'x',
        sign: 1,
        stopLine: -2
      }
    };

    const vehicleColors = [0xff4444, 0x44aaff, 0xffcc33, 0x66dd66, 0xcc66ff, 0xffffff, 0xff8844];

    function cloneVehicleModel(color) {
      const root = vehicleTemplate ? vehicleTemplate.clone(true) : new THREE.Group();

      let recolored = false;
      root.traverse(obj => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
          if (obj.material) {
            obj.material = obj.material.clone();
            if ('color' in obj.material && !recolored) {
              obj.material.color.setHex(color);
              recolored = true;
            }
          }
        }
      });

      if (!recolored) {
        const body = new THREE.Mesh(
          new THREE.BoxGeometry(1.6, 0.8, 3.4),
          new THREE.MeshStandardMaterial({ color })
        );
        body.position.y = 0.8;
        body.castShadow = true;
        root.add(body);
      }

      root.scale.setScalar(1.0);
      return root;
    }

    function createVehicle(directionName) {
      if (!vehicleTemplate || vehicles.length >= 12) return;

      const d = directions[directionName];
      const color = vehicleColors[Math.floor(Math.random() * vehicleColors.length)];
      const mesh = cloneVehicleModel(color);

      mesh.position.copy(d.spawn);
      mesh.rotation.y = d.rotationY;
      mesh.position.y = 0.02;
      scene.add(mesh);

      const vehicle = {
        id: Math.random().toString(36).slice(2),
        directionName,
        axis: d.axis,
        sign: d.sign,
        dir: d.dir.clone(),
        mesh,
        speed: Number(sliderSpeed.value),
        desiredSpeed: Number(sliderSpeed.value),
        length: 4,
        width: 2,
        height: 1,
        color,
        stopped: false,
        collided: false,
        collisionTimer: 0,
        flashTimer: 0,
        originalVisibleState: true,
        aabb: new THREE.Box3(),
        minSpeed: 0
      };

      updateVehicleAABB(vehicle);
      vehicles.push(vehicle);
    }

    function removeVehicle(vehicle) {
      scene.remove(vehicle.mesh);
      const idx = vehicles.indexOf(vehicle);
      if (idx >= 0) vehicles.splice(idx, 1);
    }

    function clearVehicles() {
      while (vehicles.length) {
        scene.remove(vehicles[0].mesh);
        vehicles.shift();
      }
    }

    function updateVehicleAABB(vehicle) {
      const pos = vehicle.mesh.position;
      vehicle.aabb.min.set(pos.x - vehicle.width / 2, pos.y, pos.z - vehicle.length / 2);
      vehicle.aabb.max.set(pos.x + vehicle.width / 2, pos.y + vehicle.height, pos.z + vehicle.length / 2);
    }

    function getLightForVehicle(vehicle) {
      const phase = currentPhase();
      return vehicle.axis === 'z' ? phase.ns : phase.ew;
    }

    function approachingStopLine(vehicle) {
      const p = vehicle.mesh.position;
      if (vehicle.axis === 'z') {
        if (vehicle.sign > 0) return p.z < -2 && (-2 - p.z) <= 5;
        return p.z > 2 && (p.z - 2) <= 5;
      } else {
        if (vehicle.sign > 0) return p.x < -2 && (-2 - p.x) <= 5;
        return p.x > 2 && (p.x - 2) <= 5;
      }
    }

    function distanceAlongForward(a, b) {
      const delta = b.mesh.position.clone().sub(a.mesh.position);
      return delta.dot(a.dir);
    }

    function lateralDistance(a, b) {
      const dx = Math.abs(a.mesh.position.x - b.mesh.position.x);
      const dz = Math.abs(a.mesh.position.z - b.mesh.position.z);
      return a.axis === 'z' ? dx : dz;
    }

    function detectObstacleAhead(vehicle) {
      let nearestDist = Infinity;
      let blocked = false;

      for (const other of vehicles) {
        if (other === vehicle || other.collided) continue;
        const forward = distanceAlongForward(vehicle, other);
        const lateral = lateralDistance(vehicle, other);

        if (forward > 0 && forward <= 5 && lateral < 2.2) {
          blocked = true;
          nearestDist = Math.min(nearestDist, forward);
        }
      }

      const lightState = getLightForVehicle(vehicle);
      if ((lightState === 'Red' || lightState === 'Yellow') && approachingStopLine(vehicle)) {
        blocked = true;
      }

      return { blocked, nearestDist };
    }

    function flashVehicleRed(vehicle, active) {
      vehicle.mesh.traverse(obj => {
        if (obj.isMesh && obj.material) {
          if (!obj.userData._origEmissive) {
            obj.userData._origEmissive = obj.material.emissive ? obj.material.emissive.clone() : new THREE.Color(0x000000);
          }
          if ('emissive' in obj.material) {
            obj.material.emissive.set(active ? 0xff0000 : obj.userData._origEmissive);
            obj.material.emissiveIntensity = active ? 1.5 : 0.0;
          }
        }
      });
    }

    function markCollision(a, b) {
      if (a.collided || b.collided) return;
      a.collided = true;
      b.collided = true;
      a.speed = 0;
      b.speed = 0;
      a.collisionTimer = 2;
      b.collisionTimer = 2;
      totalCollisions++;
    }

    function spawnRandomVehicle() {
      if (!vehicleTemplate) return;
      if (vehicles.length >= 12) return;

      const keys = Object.keys(directions);
      const dirName = keys[Math.floor(Math.random() * keys.length)];
      createVehicle(dirName);
    }

    function updateSpawning(dt) {
      spawnTimer += dt;
      const rate = Number(sliderSpawnRate.value);
      if (spawnTimer >= rate) {
        spawnTimer = 0;
        spawnRandomVehicle();
      }
    }

    function updateVehicles(dt) {
      const baseSpeed = Number(sliderSpeed.value);

      for (const v of vehicles) {
        v.desiredSpeed = baseSpeed;

        if (v.collided) {
          v.collisionTimer -= dt;
          v.flashTimer += dt * 10;
          const flashOn = Math.floor(v.flashTimer) % 2 === 0;
          flashVehicleRed(v, flashOn);
          continue;
        }

        const obstacle = detectObstacleAhead(v);
        if (obstacle.blocked || emergencyStop) {
          v.speed += (-8) * dt;
        } else {
          v.speed += (6) * dt;
        }

        v.speed = THREE.MathUtils.clamp(v.speed, 0, v.desiredSpeed);

        const move = v.dir.clone().multiplyScalar(v.speed * dt);
        v.mesh.position.add(move);
        updateVehicleAABB(v);
      }

      // Collision detection
      for (let i = 0; i < vehicles.length; i++) {
        for (let j = i + 1; j < vehicles.length; j++) {
          const a = vehicles[i];
          const b = vehicles[j];
          if (a.collided || b.collided) continue;
          if (a.aabb.intersectsBox(b.aabb)) {
            markCollision(a, b);
          }
        }
      }

      // Cleanup
      for (let i = vehicles.length - 1; i >= 0; i--) {
        const v = vehicles[i];
        const p = v.mesh.position;

        if (v.collided && v.collisionTimer <= 0) {
          flashVehicleRed(v, false);
          removeVehicle(v);
          continue;
        }

        if (Math.abs(p.x) > 28 || Math.abs(p.z) > 28) {
          removeVehicle(v);
        }
      }
    }

    // --------------------------------------------------
    // Reset / controls
    // --------------------------------------------------
    function resetSimulation() {
      clearVehicles();
      totalCollisions = 0;
      spawnTimer = 0;
      resetTrafficLights();
    }

    sliderSpawnRate.addEventListener('input', () => {
      spawnRateValue.textContent = Number(sliderSpawnRate.value).toFixed(1);
    });
    sliderSpeed.addEventListener('input', () => {
      speedValue.textContent = sliderSpeed.value;
    });
    spawnRateValue.textContent = Number(sliderSpawnRate.value).toFixed(1);
    speedValue.textContent = sliderSpeed.value;

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
      } else if (e.key === 'r' || e.key === 'R') {
        resetSimulation();
      } else if (e.key === 'f' || e.key === 'F') {
        emergencyStop = true;
        emergencyTimer = 5;
        phaseTime = 0;
        updateTrafficLightVisuals();
      }
    });

    window.addEventListener('resize', onResize);
    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // --------------------------------------------------
    // State management
    // --------------------------------------------------
    window.__3D_STATE__ = {
      vehicleCount: 0,
      totalCollisions: 0,
      nsLight: 'Green',
      ewLight: 'Red',
      cycleTime: 0,
      modelLoaded: false,
      isPaused: false,
      spawnRate: Number(sliderSpawnRate.value),
      baseSpeed: Number(sliderSpeed.value),
      frameCount: 0,
      vehiclesValid: true,
      emergencyStop: false
    };

    function computeVehiclesValid() {
      for (const v of vehicles) {
        const p = v.mesh.position;
        if (
          Number.isNaN(p.x) || Number.isNaN(p.y) || Number.isNaN(p.z) ||
          !Number.isFinite(p.x) || !Number.isFinite(p.y) || !Number.isFinite(p.z)
        ) return false;
      }
      return true;
    }

    function updateHUDAndState() {
      const phase = currentPhase();
      const cycleTimeRounded = Math.round(phaseTime * 10) / 10;

      hudVehicles.textContent = String(vehicles.length);
      hudCollisions.textContent = String(totalCollisions);
      hudNsLight.textContent = phase.ns;
      hudEwLight.textContent = phase.ew;
      hudCycle.textContent = cycleTimeRounded.toFixed(1);
      hudModel.textContent = modelLoaded ? 'Yes' : 'No';

      window.__3D_STATE__ = {
        vehicleCount: vehicles.length,
        totalCollisions,
        nsLight: phase.ns,
        ewLight: phase.ew,
        cycleTime: cycleTimeRounded,
        modelLoaded,
        isPaused,
        spawnRate: Number(sliderSpawnRate.value),
        baseSpeed: Number(sliderSpeed.value),
        frameCount,
        vehiclesValid: computeVehiclesValid(),
        emergencyStop
      };
    }

    // --------------------------------------------------
    // Initial spawn
    // --------------------------------------------------
    resetTrafficLights();

    // --------------------------------------------------
    // Animation loop
    // --------------------------------------------------
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const dtRaw = clock.getDelta();
      const dt = Math.min(dtRaw, 0.05);

      controls.update();

      if (!isPaused) {
        updateTrafficLights(dt);
        updateSpawning(dt);
        updateVehicles(dt);
      }

      updateHUDAndState(); // required before rendering
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
