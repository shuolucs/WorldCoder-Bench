<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headphone Materials & Physics Demo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud-top-left {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
        #hud-top-right {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #ff4444;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            pointer-events: none;
        }
        #controls-bottom {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        button {
            background-color: #222;
            color: #fff;
            border: 1px solid #555;
            height: 40px;
            padding: 0 20px;
            cursor: pointer;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #444;
        }
        button.active {
            background-color: #555;
            border-color: #fff;
        }
        #instructions {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 5px;
            pointer-events: none;
            text-align: center;
            font-size: 12px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud-top-left">
        <div>Material: <span id="mat-name">Plastic</span></div>
        <div>FPS: <span id="fps-counter">0</span></div>
        <div>Spheres on Ground: <span id="sphere-count">0</span></div>
    </div>
    
    <div id="hud-top-right" style="display: none;">DEBUG ON</div>
    
    <div id="instructions">
        [R] Auto-Rotate | [E] Explode View | [D] Debug Physics | [Space] Reset Drop | Scroll to Zoom
    </div>

    <div id="controls-bottom">
        <button data-mat="plastic" class="active">Plastic</button>
        <button data-mat="aluminum">Aluminum</button>
        <button data-mat="wood">Wood</button>
        <button data-mat="carbon">Carbon Fiber</button>
        <button data-mat="gold">Gold</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            currentMaterial: 'plastic',
            materialRoughness: 0.6,
            materialMetalness: 0.1,
            isRotating: false,
            rotationAngle: 0,
            debugOverlay: false,
            spherePositions: Array(5).fill({x:0, y:0, z:0}),
            spheresOnGround: 0,
            explodedView: false,
            cameraDistance: 5.385,
            lanternLoaded: false,
            fps: 0,
            frameCount: 0,
            physicsActive: false,
            totalKineticEnergy: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(3, 5, 2);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 15;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xffffff, 0.5);
        pointLight.position.set(-2, 3, 1);
        scene.add(pointLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(10, 10);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Materials Dictionary ---
        const materials = {
            plastic: new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.6, metalness: 0.1 }),
            aluminum: new THREE.MeshStandardMaterial({ color: 0xc0c0c0, roughness: 0.2, metalness: 0.95 }),
            wood: new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8, metalness: 0.0 }),
            carbon: new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.3, metalness: 0.5 }),
            gold: new THREE.MeshStandardMaterial({ color: 0xFFD700, roughness: 0.1, metalness: 1.0 })
        };

        // --- Procedural Headphones ---
        const headphoneGroup = new THREE.Group();
        scene.add(headphoneGroup);

        const currentMat = materials.plastic;

        // Ear Cups
        const cupGeo = new THREE.TorusGeometry(0.5, 0.15, 32, 64);
        
        const leftCup = new THREE.Mesh(cupGeo, currentMat);
        leftCup.position.set(-0.6, 2.5, 0);
        leftCup.rotation.y = Math.PI / 2;
        leftCup.castShadow = true;
        leftCup.receiveShadow = true;
        headphoneGroup.add(leftCup);

        const rightCup = new THREE.Mesh(cupGeo, currentMat);
        rightCup.position.set(0.6, 2.5, 0);
        rightCup.rotation.y = Math.PI / 2;
        rightCup.castShadow = true;
        rightCup.receiveShadow = true;
        headphoneGroup.add(rightCup);

        // Headband
        const curve = new THREE.CatmullRomCurve3([
            new THREE.Vector3(-0.6, 2.5, 0),
            new THREE.Vector3(-0.8, 3.2, 0),
            new THREE.Vector3(0, 3.6, 0),
            new THREE.Vector3(0.8, 3.2, 0),
            new THREE.Vector3(0.6, 2.5, 0)
        ]);
        const bandGeo = new THREE.TubeGeometry(curve, 64, 0.1, 16, false);
        const headband = new THREE.Mesh(bandGeo, currentMat);
        headband.castShadow = true;
        headband.receiveShadow = true;
        headphoneGroup.add(headband);

        // --- Lantern Model ---
        const loader = new GLTFLoader();
        // Using a reliable CDN for the standard glTF sample model
        loader.load('https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/Lantern/glTF-Binary/Lantern.glb', (gltf) => {
            const lantern = gltf.scene;
            lantern.position.set(2.5, 0, -1);
            lantern.scale.set(1.5, 1.5, 1.5);
            lantern.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(lantern);
            window.__3D_STATE__.lanternLoaded = true;
        });

        // --- Physics System & Debug ---
        const physicsObjects = [];
        const debugHelpers = [];
        const sphereGeo = new THREE.SphereGeometry(0.1, 16, 16);
        const sphereMat = new THREE.MeshStandardMaterial({ color: 0x44aa44, roughness: 0.4 });
        const startX = [-1, -0.5, 0, 0.5, 1];

        for (let i = 0; i < 5; i++) {
            const mesh = new THREE.Mesh(sphereGeo, sphereMat);
            mesh.position.set(startX[i], 4, 1);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);

            const helper = new THREE.BoxHelper(mesh, 0xff0000);
            helper.visible = false;
            scene.add(helper);
            debugHelpers.push(helper);

            physicsObjects.push({
                mesh: mesh,
                velocity: new THREE.Vector3(0, 0, 0),
                mass: 1
            });
        }

        // Ground debug helper
        const groundHelper = new THREE.BoxHelper(ground, 0xff0000);
        groundHelper.visible = false;
        scene.add(groundHelper);
        debugHelpers.push(groundHelper);

        // --- Interactions ---
        
        // Material Buttons
        const buttons = document.querySelectorAll('#controls-bottom button');
        buttons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const matName = e.target.dataset.mat;
                const mat = materials[matName];
                
                leftCup.material = mat;
                rightCup.material = mat;
                headband.material = mat;

                buttons.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');

                window.__3D_STATE__.currentMaterial = matName;
                window.__3D_STATE__.materialRoughness = mat.roughness;
                window.__3D_STATE__.materialMetalness = mat.metalness;
                
                document.getElementById('mat-name').innerText = e.target.innerText;
            });
        });

        // Keyboard
        window.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case 'r':
                    window.__3D_STATE__.isRotating = !window.__3D_STATE__.isRotating;
                    break;
                case 'd':
                    window.__3D_STATE__.debugOverlay = !window.__3D_STATE__.debugOverlay;
                    const isDebug = window.__3D_STATE__.debugOverlay;
                    debugHelpers.forEach(h => h.visible = isDebug);
                    document.getElementById('hud-top-right').style.display = isDebug ? 'block' : 'none';
                    break;
                case 'e':
                    window.__3D_STATE__.explodedView = !window.__3D_STATE__.explodedView;
                    break;
                case ' ':
                    // Reset physics
                    physicsObjects.forEach((obj, i) => {
                        obj.mesh.position.set(startX[i], 4, 1);
                        obj.velocity.set(0, 0, 0);
                    });
                    break;
            }
        });

        // Mouse Wheel Zoom
        window.addEventListener('wheel', (e) => {
            const zoomSpeed = 0.005;
            const dir = new THREE.Vector3().copy(camera.position).normalize();
            const dist = camera.position.length();
            
            let newDist = dist + e.deltaY * zoomSpeed;
            newDist = Math.max(2, Math.min(10, newDist));
            
            camera.position.copy(dir).multiplyScalar(newDist);
            window.__3D_STATE__.cameraDistance = newDist;
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let frames = 0;
        let lastTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1); // Cap dt to prevent physics explosion
            const time = performance.now();
            
            // FPS Calculation
            frames++;
            if (time >= lastTime + 1000) {
                window.__3D_STATE__.fps = Math.round((frames * 1000) / (time - lastTime));
                document.getElementById('fps-counter').innerText = window.__3D_STATE__.fps;
                frames = 0;
                lastTime = time;
            }
            window.__3D_STATE__.frameCount++;

            // Rotation
            if (window.__3D_STATE__.isRotating) {
                headphoneGroup.rotation.y += 0.5 * dt;
                window.__3D_STATE__.rotationAngle = headphoneGroup.rotation.y;
            }

            // Exploded View Lerp
            const targetLX = window.__3D_STATE__.explodedView ? -1.4 : -0.6;
            const targetRX = window.__3D_STATE__.explodedView ? 1.4 : 0.6;
            const targetBandY = window.__3D_STATE__.explodedView ? 0.5 : 0;

            leftCup.position.x += (targetLX - leftCup.position.x) * 10 * dt;
            rightCup.position.x += (targetRX - rightCup.position.x) * 10 * dt;
            headband.position.y += (targetBandY - headband.position.y) * 10 * dt;

            // Physics Simulation
            let active = false;
            let onGroundCount = 0;
            let totalKE = 0;
            const g = -9.81;
            const restitution = 0.7;
            const damping = 0.98;
            const radius = 0.1;

            physicsObjects.forEach((obj, i) => {
                // Euler integration
                obj.velocity.y += g * dt;
                obj.mesh.position.addScaledVector(obj.velocity, dt);

                // Ground collision
                if (obj.mesh.position.y <= radius) {
                    obj.mesh.position.y = radius;
                    obj.velocity.y *= -restitution;
                    obj.velocity.x *= damping;
                    obj.velocity.z *= damping;
                    
                    // Prevent micro-bounces
                    if (Math.abs(obj.velocity.y) < 0.1) obj.velocity.y = 0;
                }

                // State updates
                if (obj.mesh.position.y > 0.15) active = true;
                if (obj.mesh.position.y < 0.15) onGroundCount++;
                
                const speedSq = obj.velocity.lengthSq();
                totalKE += 0.5 * obj.mass * speedSq;

                window.__3D_STATE__.spherePositions[i] = {
                    x: obj.mesh.position.x || 0,
                    y: obj.mesh.position.y || 0,
                    z: obj.mesh.position.z || 0
                };

                if (window.__3D_STATE__.debugOverlay) {
                    debugHelpers[i].update();
                }
            });

            if (window.__3D_STATE__.debugOverlay) {
                groundHelper.update();
            }

            window.__3D_STATE__.physicsActive = active;
            window.__3D_STATE__.spheresOnGround = onGroundCount;
            window.__3D_STATE__.totalKineticEnergy = totalKE || 0;
            
            document.getElementById('sphere-count').innerText = onGroundCount;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
