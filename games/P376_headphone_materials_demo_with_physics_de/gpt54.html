<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Headphone Materials Demo</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #hud-left, #hud-right {
      position: fixed;
      top: 12px;
      z-index: 20;
      background: rgba(0,0,0,0.45);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      user-select: none;
      pointer-events: none;
    }

    #hud-left { left: 12px; }
    #hud-right { right: 12px; }

    #button-bar {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 30;
      flex-wrap: wrap;
      justify-content: center;
      width: min(95vw, 900px);
    }

    .mat-btn {
      height: 40px;
      min-width: 120px;
      padding: 0 16px;
      border: 1px solid #666;
      border-radius: 8px;
      background: #1e1e1e;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }

    .mat-btn:hover {
      background: #2a2a2a;
      border-color: #999;
    }

    .mat-btn.active {
      background: #3a3a3a;
      border-color: #fff;
    }

    .hint {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 20;
      background: rgba(0,0,0,0.4);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.4;
      color: #ddd;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="hud-left">
    <div id="hud-material">Material: plastic</div>
    <div id="hud-fps">FPS: 0</div>
    <div id="hud-ground">Spheres on ground: 0</div>
  </div>

  <div id="hud-right">
    <div id="hud-debug">DEBUG OFF</div>
  </div>

  <div id="button-bar">
    <button class="mat-btn active" data-mat="plastic">Plastic</button>
    <button class="mat-btn" data-mat="aluminum">Aluminum</button>
    <button class="mat-btn" data-mat="wood">Wood</button>
    <button class="mat-btn" data-mat="carbon">Carbon Fiber</button>
    <button class="mat-btn" data-mat="gold">Gold</button>
  </div>

  <div class="hint">
    Keys: R = rotate, D = debug, Space = reset drops, E = explode view<br />
    Mouse wheel = zoom
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
    const safeNum = (v, fallback = 0) => Number.isFinite(v) ? v : fallback;

    // Initial state exposed before first frame
    window.__3D_STATE__ = {
      currentMaterial: 'plastic',
      materialRoughness: 0.6,
      materialMetalness: 0.1,
      isRotating: false,
      rotationAngle: 0,
      debugOverlay: false,
      spherePositions: [
        { x: -1, y: 4, z: 1 },
        { x: -0.5, y: 4, z: 1 },
        { x: 0, y: 4, z: 1 },
        { x: 0.5, y: 4, z: 1 },
        { x: 1, y: 4, z: 1 }
      ],
      spheresOnGround: 0,
      explodedView: false,
      cameraDistance: 5,
      lanternLoaded: false,
      fps: 0,
      frameCount: 0,
      physicsActive: true,
      totalKineticEnergy: 0
    };

    const app = document.getElementById('app');
    const hudMaterial = document.getElementById('hud-material');
    const hudFPS = document.getElementById('hud-fps');
    const hudGround = document.getElementById('hud-ground');
    const hudDebug = document.getElementById('hud-debug');
    const buttons = [...document.querySelectorAll('.mat-btn')];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    // Ground
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 10),
      new THREE.MeshStandardMaterial({ color: '#222222' })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(3, 5, 2);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(1024, 1024);
    dirLight.shadow.camera.near = 0.1;
    dirLight.shadow.camera.far = 20;
    dirLight.shadow.camera.left = -6;
    dirLight.shadow.camera.right = 6;
    dirLight.shadow.camera.top = 6;
    dirLight.shadow.camera.bottom = -6;
    scene.add(dirLight);

    const pointLight = new THREE.PointLight(0xffffff, 0.5, 20);
    pointLight.position.set(-2, 3, 1);
    scene.add(pointLight);

    // Lantern.glb
    const loader = new GLTFLoader();
    loader.load(
      'Lantern.glb',
      (gltf) => {
        const lantern = gltf.scene;
        lantern.position.set(2.5, 0, -1);
        lantern.scale.set(1.5, 1.5, 1.5);
        lantern.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        scene.add(lantern);
        window.__3D_STATE__.lanternLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load Lantern.glb:', err);
        window.__3D_STATE__.lanternLoaded = false;
      }
    );

    // Headphones
    const headphoneGroup = new THREE.Group();
    scene.add(headphoneGroup);

    const earCupGeometry = new THREE.TorusGeometry(0.5, 0.15, 24, 48);
    const curvePoints = [
      new THREE.Vector3(-0.6, 2.5, 0),
      new THREE.Vector3(-0.35, 3.25, 0),
      new THREE.Vector3(0.35, 3.25, 0),
      new THREE.Vector3(0.6, 2.5, 0)
    ];
    const headbandCurve = new THREE.CatmullRomCurve3(curvePoints);
    const headbandGeometry = new THREE.TubeGeometry(headbandCurve, 48, 0.08, 16, false);

    const materialPresets = {
      plastic: { color: '#1a1a1a', roughness: 0.6, metalness: 0.1 },
      aluminum: { color: '#c0c0c0', roughness: 0.2, metalness: 0.95 },
      wood: { color: '#8B4513', roughness: 0.8, metalness: 0.0 },
      carbon: { color: '#333333', roughness: 0.3, metalness: 0.5 },
      gold: { color: '#FFD700', roughness: 0.1, metalness: 1.0 }
    };

    function buildMaterial(name) {
      const preset = materialPresets[name] || materialPresets.plastic;
      return new THREE.MeshStandardMaterial({
        color: preset.color,
        roughness: safeNum(preset.roughness, 0.5),
        metalness: safeNum(preset.metalness, 0.5)
      });
    }

    let currentMaterialName = 'plastic';
    let headphoneMaterial = buildMaterial(currentMaterialName);

    const leftCup = new THREE.Mesh(earCupGeometry, headphoneMaterial);
    leftCup.position.set(-0.6, 2.5, 0);
    leftCup.castShadow = true;
    leftCup.receiveShadow = true;

    const rightCup = new THREE.Mesh(earCupGeometry, headphoneMaterial);
    rightCup.position.set(0.6, 2.5, 0);
    rightCup.castShadow = true;
    rightCup.receiveShadow = true;

    const headband = new THREE.Mesh(headbandGeometry, headphoneMaterial);
    headband.castShadow = true;
    headband.receiveShadow = true;

    headphoneGroup.add(leftCup, rightCup, headband);

    const basePositions = {
      leftX: -0.6,
      rightX: 0.6,
      headbandY: 0
    };

    let explodedView = false;
    let isRotating = false;
    let rotationAngle = 0;

    function setHeadphoneMaterial(name) {
      currentMaterialName = materialPresets[name] ? name : 'plastic';
      const newMat = buildMaterial(currentMaterialName);

      leftCup.material.dispose();
      headband.material.dispose();
      rightCup.material.dispose();

      leftCup.material = newMat;
      rightCup.material = newMat;
      headband.material = newMat;

      headphoneMaterial = newMat;

      buttons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mat === currentMaterialName);
      });
    }

    function updateExplodedView() {
      const offset = explodedView ? 0.8 : 0.0;
      const headbandOffsetY = explodedView ? 0.5 : 0.0;
      leftCup.position.x = basePositions.leftX - offset;
      rightCup.position.x = basePositions.rightX + offset;
      headband.position.y = basePositions.headbandY + headbandOffsetY;
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => setHeadphoneMaterial(btn.dataset.mat));
    });

    // Physics spheres
    const physicsGroup = new THREE.Group();
    scene.add(physicsGroup);

    const debugGroup = new THREE.Group();
    scene.add(debugGroup);

    const sphereRadius = 0.1;
    const gravity = -9.81;
    const restitution = 0.7;
    const damping = 0.98;
    const sphereStartXs = [-1, -0.5, 0, 0.5, 1];
    const sphereGeometry = new THREE.SphereGeometry(sphereRadius, 16, 16);

    let debugOverlay = false;

    const physicsObjects = sphereStartXs.map((x, i) => {
      const mat = new THREE.MeshStandardMaterial({
        color: new THREE.Color().setHSL(0.1 + i * 0.14, 0.7, 0.6),
        roughness: 0.5,
        metalness: 0.2
      });

      const mesh = new THREE.Mesh(sphereGeometry, mat);
      mesh.position.set(x, 4, 1);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      physicsGroup.add(mesh);

      const box = new THREE.Box3Helper(
        new THREE.Box3(
          new THREE.Vector3(x - sphereRadius, 4 - sphereRadius, 1 - sphereRadius),
          new THREE.Vector3(x + sphereRadius, 4 + sphereRadius, 1 + sphereRadius)
        ),
        0x00ff88
      );
      box.visible = false;
      debugGroup.add(box);

      return {
        mesh,
        velocity: new THREE.Vector3(0, 0, 0),
        helper: box
      };
    });

    function resetSpheres() {
      physicsObjects.forEach((obj, i) => {
        obj.mesh.position.set(sphereStartXs[i], 4, 1);
        obj.velocity.set(0, 0, 0);
      });
    }

    function updateDebugHelpers() {
      physicsObjects.forEach((obj) => {
        const p = obj.mesh.position;
        obj.helper.box.min.set(p.x - sphereRadius, p.y - sphereRadius, p.z - sphereRadius);
        obj.helper.box.max.set(p.x + sphereRadius, p.y + sphereRadius, p.z + sphereRadius);
        obj.helper.visible = debugOverlay;
        obj.helper.updateMatrixWorld(true);
      });
    }

    function updateCameraDistanceState() {
      const dist = camera.position.length();
      window.__3D_STATE__.cameraDistance = safeNum(dist, 5);
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyR') {
        isRotating = !isRotating;
      } else if (e.code === 'KeyD') {
        debugOverlay = !debugOverlay;
      } else if (e.code === 'Space') {
        e.preventDefault();
        resetSpheres();
      } else if (e.code === 'KeyE') {
        explodedView = !explodedView;
        updateExplodedView();
      }
    });

    window.addEventListener('wheel', (e) => {
      e.preventDefault();

      const currentDistance = camera.position.length();
      const targetDistance = clamp(currentDistance + e.deltaY * 0.005, 2, 10);
      const dir = camera.position.clone().normalize();
      camera.position.copy(dir.multiplyScalar(targetDistance));
      camera.lookAt(0, 0, 0);
      updateCameraDistanceState();
    }, { passive: false });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateExplodedView();
    updateDebugHelpers();
    updateCameraDistanceState();

    const clock = new THREE.Clock();
    let fpsAccum = 0;
    let fpsFrames = 0;
    let fpsValue = 0;

    function updateState(dt) {
      const preset = materialPresets[currentMaterialName] || materialPresets.plastic;

      let spheresOnGround = 0;
      let physicsActive = false;
      let totalKineticEnergy = 0;

      const spherePositions = physicsObjects.map((obj) => {
        const p = obj.mesh.position;
        const v = obj.velocity;
        const speedSq = safeNum(v.lengthSq(), 0);
        totalKineticEnergy += 0.5 * speedSq;

        if (safeNum(p.y, 0) < 0.15) spheresOnGround++;
        if (safeNum(p.y, 0) > 0.15) physicsActive = true;

        return {
          x: safeNum(p.x, 0),
          y: safeNum(p.y, 0),
          z: safeNum(p.z, 0)
        };
      });

      window.__3D_STATE__.currentMaterial = currentMaterialName;
      window.__3D_STATE__.materialRoughness = safeNum(preset.roughness, 0);
      window.__3D_STATE__.materialMetalness = safeNum(preset.metalness, 0);
      window.__3D_STATE__.isRotating = !!isRotating;
      window.__3D_STATE__.rotationAngle = safeNum(rotationAngle, 0);
      window.__3D_STATE__.debugOverlay = !!debugOverlay;
      window.__3D_STATE__.spherePositions = spherePositions;
      window.__3D_STATE__.spheresOnGround = safeNum(spheresOnGround, 0);
      window.__3D_STATE__.explodedView = !!explodedView;
      window.__3D_STATE__.cameraDistance = safeNum(camera.position.length(), 5);
      window.__3D_STATE__.fps = safeNum(fpsValue, 0);
      window.__3D_STATE__.frameCount = safeNum(window.__3D_STATE__.frameCount + 1, 0);
      window.__3D_STATE__.physicsActive = !!physicsActive;
      window.__3D_STATE__.totalKineticEnergy = safeNum(totalKineticEnergy, 0);

      hudMaterial.textContent = `Material: ${currentMaterialName}`;
      hudFPS.textContent = `FPS: ${fpsValue.toFixed(1)}`;
      hudGround.textContent = `Spheres on ground: ${spheresOnGround}`;
      hudDebug.textContent = debugOverlay ? 'DEBUG ON' : 'DEBUG OFF';
      hudDebug.style.color = debugOverlay ? '#7CFF7C' : '#FFFFFF';
    }

    function animate() {
      requestAnimationFrame(animate);

      let dt = safeNum(clock.getDelta(), 0.016);
      dt = clamp(dt, 0, 0.05);

      fpsAccum += dt;
      fpsFrames++;
      if (fpsAccum >= 0.5) {
        fpsValue = safeNum(fpsFrames / fpsAccum, 0);
        fpsAccum = 0;
        fpsFrames = 0;
      }

      if (isRotating) {
        rotationAngle += 0.5 * dt;
        rotationAngle = safeNum(rotationAngle, 0);
        headphoneGroup.rotation.y = rotationAngle;
      }

      for (const obj of physicsObjects) {
        obj.velocity.y += gravity * dt;
        obj.velocity.multiplyScalar(damping);

        obj.mesh.position.x += obj.velocity.x * dt;
        obj.mesh.position.y += obj.velocity.y * dt;
        obj.mesh.position.z += obj.velocity.z * dt;

        if (obj.mesh.position.y - sphereRadius < 0) {
          obj.mesh.position.y = sphereRadius;
          if (obj.velocity.y < 0) {
            obj.velocity.y = -obj.velocity.y * restitution;
            if (Math.abs(obj.velocity.y) < 0.05) {
              obj.velocity.y = 0;
            }
          }
        }

        obj.mesh.position.x = safeNum(obj.mesh.position.x, 0);
        obj.mesh.position.y = safeNum(obj.mesh.position.y, sphereRadius);
        obj.mesh.position.z = safeNum(obj.mesh.position.z, 1);

        obj.velocity.x = safeNum(obj.velocity.x, 0);
        obj.velocity.y = safeNum(obj.velocity.y, 0);
        obj.velocity.z = safeNum(obj.velocity.z, 0);
      }

      updateDebugHelpers();
      updateState(dt);
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
