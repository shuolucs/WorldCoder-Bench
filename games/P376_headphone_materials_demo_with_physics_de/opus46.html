<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Headphone Materials Demo with Physics Debug</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#hud-top-left {
    position: fixed;
    top: 10px;
    left: 10px;
    color: #fff;
    font-size: 14px;
    background: rgba(0,0,0,0.7);
    padding: 10px 15px;
    border-radius: 8px;
    line-height: 1.6;
    z-index: 100;
    pointer-events: none;
}

#hud-top-right {
    position: fixed;
    top: 10px;
    right: 10px;
    color: #fff;
    font-size: 14px;
    background: rgba(0,0,0,0.7);
    padding: 10px 15px;
    border-radius: 8px;
    z-index: 100;
    pointer-events: none;
}

#button-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 100;
}

#button-bar button {
    height: 40px;
    padding: 0 20px;
    background: #1a1a1a;
    color: #fff;
    border: 1px solid #555;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
}

#button-bar button:hover {
    background: #333;
    border-color: #888;
}

#button-bar button.active {
    background: #444;
    border-color: #aaa;
    box-shadow: 0 0 8px rgba(255,255,255,0.2);
}

#controls-hint {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    z-index: 100;
    pointer-events: none;
    text-align: center;
}
</style>
</head>
<body>

<div id="hud-top-left">
    <div id="material-display">Material: Plastic</div>
    <div id="fps-display">FPS: 0</div>
    <div id="ground-count">Spheres on ground: 0</div>
</div>

<div id="hud-top-right">
    <div id="debug-display">DEBUG OFF</div>
</div>

<div id="controls-hint">
    R: Rotate | D: Debug | E: Explode | Space: Reset Spheres | Scroll: Zoom
</div>

<div id="button-bar">
    <button class="active" data-material="plastic">Plastic</button>
    <button data-material="aluminum">Aluminum</button>
    <button data-material="wood">Wood</button>
    <button data-material="carbon">Carbon Fiber</button>
    <button data-material="gold">Gold</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Initialize state before first frame
window.__3D_STATE__ = {
    currentMaterial: 'plastic',
    materialRoughness: 0.6,
    materialMetalness: 0.1,
    isRotating: false,
    rotationAngle: 0,
    debugOverlay: false,
    spherePositions: [
        { x: -1, y: 4, z: 1 },
        { x: -0.5, y: 4, z: 1 },
        { x: 0, y: 4, z: 1 },
        { x: 0.5, y: 4, z: 1 },
        { x: 1, y: 4, z: 1 }
    ],
    spheresOnGround: 0,
    explodedView: false,
    cameraDistance: 5,
    lanternLoaded: false,
    fps: 0,
    frameCount: 0,
    physicsActive: true,
    totalKineticEnergy: 0
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Ground plane
const groundGeom = new THREE.PlaneGeometry(10, 10);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9, metalness: 0.0 });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(3, 5, 2);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.1;
dirLight.shadow.camera.far = 20;
dirLight.shadow.camera.left = -5;
dirLight.shadow.camera.right = 5;
dirLight.shadow.camera.top = 5;
dirLight.shadow.camera.bottom = -5;
scene.add(dirLight);

const pointLight = new THREE.PointLight(0xffffff, 0.5, 20);
pointLight.position.set(-2, 3, 1);
scene.add(pointLight);

// Material presets
const materialPresets = {
    plastic: { color: 0x1a1a1a, roughness: 0.6, metalness: 0.1 },
    aluminum: { color: 0xc0c0c0, roughness: 0.2, metalness: 0.95 },
    wood: { color: 0x8B4513, roughness: 0.8, metalness: 0.0 },
    carbon: { color: 0x333333, roughness: 0.3, metalness: 0.5 },
    gold: { color: 0xFFD700, roughness: 0.1, metalness: 1.0 }
};

let currentMaterialKey = 'plastic';
let headphoneMaterial = new THREE.MeshStandardMaterial({
    color: materialPresets.plastic.color,
    roughness: materialPresets.plastic.roughness,
    metalness: materialPresets.plastic.metalness
});

// Headphone group
const headphoneGroup = new THREE.Group();
scene.add(headphoneGroup);

// Ear cups
const earCupGeom = new THREE.TorusGeometry(0.5, 0.15, 16, 32);

const leftEarCup = new THREE.Mesh(earCupGeom, headphoneMaterial);
leftEarCup.position.set(-0.6, 2.5, 0);
leftEarCup.castShadow = true;
leftEarCup.receiveShadow = true;
headphoneGroup.add(leftEarCup);

const rightEarCup = new THREE.Mesh(earCupGeom, headphoneMaterial);
rightEarCup.position.set(0.6, 2.5, 0);
rightEarCup.castShadow = true;
rightEarCup.receiveShadow = true;
headphoneGroup.add(rightEarCup);

// Inner ear cup pads
const padGeom = new THREE.CylinderGeometry(0.45, 0.45, 0.12, 32);
const leftPad = new THREE.Mesh(padGeom, headphoneMaterial);
leftPad.position.set(-0.6, 2.5, 0);
leftPad.rotation.z = Math.PI / 2;
leftPad.castShadow = true;
headphoneGroup.add(leftPad);

const rightPad = new THREE.Mesh(padGeom, headphoneMaterial);
rightPad.position.set(0.6, 2.5, 0);
rightPad.rotation.z = Math.PI / 2;
rightPad.castShadow = true;
headphoneGroup.add(rightPad);

// Headband using CatmullRomCurve3
const headbandPoints = [];
const numPoints = 20;
for (let i = 0; i <= numPoints; i++) {
    const t = i / numPoints;
    const x = THREE.MathUtils.lerp(-0.6, 0.6, t);
    const y = 2.5 + 0.6 * Math.sin(t * Math.PI);
    const z = 0;
    headbandPoints.push(new THREE.Vector3(x, y, z));
}

const headbandCurve = new THREE.CatmullRomCurve3(headbandPoints);
const headbandGeom = new THREE.TubeGeometry(headbandCurve, 32, 0.06, 12, false);
const headband = new THREE.Mesh(headbandGeom, headphoneMaterial);
headband.castShadow = true;
headband.receiveShadow = true;
headphoneGroup.add(headband);

// Store original positions for explode view
const originalPositions = {
    leftEarCup: leftEarCup.position.clone(),
    rightEarCup: rightEarCup.position.clone(),
    leftPad: leftPad.position.clone(),
    rightPad: rightPad.position.clone(),
    headband: headband.position.clone()
};

// Load Lantern.glb
const loader = new GLTFLoader();
loader.load(
    'Lantern.glb',
    (gltf) => {
        const lantern = gltf.scene;
        lantern.position.set(2.5, 0, -1);
        lantern.scale.set(1.5, 1.5, 1.5);
        lantern.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        scene.add(lantern);
        window.__3D_STATE__.lanternLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('Could not load Lantern.glb:', error);
        // Create a placeholder lantern
        const placeholderGroup = new THREE.Group();
        const baseGeom = new THREE.CylinderGeometry(0.3, 0.4, 0.8, 8);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.7, metalness: 0.3 });
        const base = new THREE.Mesh(baseGeom, baseMat);
        base.position.y = 0.4;
        base.castShadow = true;
        placeholderGroup.add(base);

        const glassGeom = new THREE.CylinderGeometry(0.25, 0.25, 0.6, 8);
        const glassMat = new THREE.MeshStandardMaterial({ color: 0xffaa33, roughness: 0.1, metalness: 0.0, transparent: true, opacity: 0.6 });
        const glass = new THREE.Mesh(glassGeom, glassMat);
        glass.position.y = 1.1;
        glass.castShadow = true;
        placeholderGroup.add(glass);

        const topGeom = new THREE.ConeGeometry(0.3, 0.3, 8);
        const top = new THREE.Mesh(topGeom, baseMat);
        top.position.y = 1.6;
        top.castShadow = true;
        placeholderGroup.add(top);

        // Add a warm point light inside
        const lanternLight = new THREE.PointLight(0xffaa33, 0.5, 5);
        lanternLight.position.y = 1.1;
        placeholderGroup.add(lanternLight);

        placeholderGroup.position.set(2.5, 0, -1);
        placeholderGroup.scale.set(1.5, 1.5, 1.5);
        scene.add(placeholderGroup);
        window.__3D_STATE__.lanternLoaded = true;
    }
);

// Physics spheres
const GRAVITY = -9.81;
const RESTITUTION = 0.7;
const DAMPING = 0.98;
const SPHERE_RADIUS = 0.1;

const sphereGeom = new THREE.SphereGeometry(SPHERE_RADIUS, 16, 16);
const sphereMat = new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.4, metalness: 0.3 });

const physicsSpheres = [];
const sphereStartX = [-1, -0.5, 0, 0.5, 1];

for (let i = 0; i < 5; i++) {
    const sphere = new THREE.Mesh(sphereGeom, sphereMat);
    sphere.position.set(sphereStartX[i], 4, 1);
    sphere.castShadow = true;
    sphere.receiveShadow = true;
    scene.add(sphere);

    physicsSpheres.push({
        mesh: sphere,
        velocity: new THREE.Vector3(0, 0, 0),
        debugBox: null
    });
}

// Debug wireframe boxes
const debugGroup = new THREE.Group();
debugGroup.visible = false;
scene.add(debugGroup);

const wireframeMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });

// Create debug boxes for spheres
physicsSpheres.forEach((s) => {
    const boxGeom = new THREE.BoxGeometry(SPHERE_RADIUS * 2, SPHERE_RADIUS * 2, SPHERE_RADIUS * 2);
    const box = new THREE.Mesh(boxGeom, wireframeMat);
    s.debugBox = box;
    debugGroup.add(box);
});

// Debug boxes for ear cups and headband
const earCupDebugGeom = new THREE.BoxGeometry(1.3, 1.3, 0.4);
const leftEarDebug = new THREE.Mesh(earCupDebugGeom, wireframeMat);
debugGroup.add(leftEarDebug);
const rightEarDebug = new THREE.Mesh(earCupDebugGeom, wireframeMat);
debugGroup.add(rightEarDebug);

const headbandDebugGeom = new THREE.BoxGeometry(1.6, 0.3, 0.2);
const headbandDebug = new THREE.Mesh(headbandDebugGeom, wireframeMat);
debugGroup.add(headbandDebug);

// Ground debug
const groundDebugGeom = new THREE.BoxGeometry(10, 0.02, 10);
const groundDebug = new THREE.Mesh(groundDebugGeom, wireframeMat);
groundDebug.position.y = 0;
debugGroup.add(groundDebug);

// State variables
let isRotating = false;
let rotationAngle = 0;
let debugOverlay = false;
let explodedView = false;
let cameraDistance = 5;

// FPS tracking
let fpsFrames = 0;
let fpsTime = performance.now();
let currentFps = 0;

// Material switching
function setMaterial(key) {
    const preset = materialPresets[key];
    if (!preset) return;

    currentMaterialKey = key;
    headphoneMaterial.color.setHex(preset.color);
    headphoneMaterial.roughness = preset.roughness;
    headphoneMaterial.metalness = preset.metalness;
    headphoneMaterial.needsUpdate = true;

    window.__3D_STATE__.currentMaterial = key;
    window.__3D_STATE__.materialRoughness = preset.roughness;
    window.__3D_STATE__.materialMetalness = preset.metalness;

    // Update button states
    document.querySelectorAll('#button-bar button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.material === key);
    });

    const names = { plastic: 'Plastic', aluminum: 'Aluminum', wood: 'Wood', carbon: 'Carbon Fiber', gold: 'Gold' };
    document.getElementById('material-display').textContent = `Material: ${names[key]}`;
}

// Button event listeners
document.querySelectorAll('#button-bar button').forEach(btn => {
    btn.addEventListener('click', () => setMaterial(btn.dataset.material));
});

// Keyboard events
document.addEventListener('keydown', (e) => {
    switch (e.key.toLowerCase()) {
        case 'r':
            isRotating = !isRotating;
            break;
        case 'd':
            debugOverlay = !debugOverlay;
            debugGroup.visible = debugOverlay;
            document.getElementById('debug-display').textContent = debugOverlay ? 'DEBUG ON' : 'DEBUG OFF';
            document.getElementById('debug-display').style.color = debugOverlay ? '#00ff00' : '#fff';
            break;
        case 'e':
            explodedView = !explodedView;
            break;
        case ' ':
            e.preventDefault();
            resetSpheres();
            break;
    }
});

// Mouse wheel zoom
renderer.domElement.addEventListener('wheel', (e) => {
    e.preventDefault();
    cameraDistance += e.deltaY * 0.005;
    cameraDistance = Math.max(2, Math.min(10, cameraDistance));

    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    dir.negate();
    camera.position.copy(dir.multiplyScalar(cameraDistance).add(new THREE.Vector3(0, 2, 0)));
}, { passive: false });

function resetSpheres() {
    for (let i = 0; i < physicsSpheres.length; i++) {
        physicsSpheres[i].mesh.position.set(sphereStartX[i], 4, 1);
        physicsSpheres[i].velocity.set(0, 0, 0);
    }
}

// Physics update
function updatePhysics(dt) {
    dt = Math.min(dt, 0.05); // Cap delta time

    for (let i = 0; i < physicsSpheres.length; i++) {
        const s = physicsSpheres[i];

        // Apply gravity
        s.velocity.y += GRAVITY * dt;

        // Apply damping
        s.velocity.multiplyScalar(DAMPING);

        // Update position
        s.mesh.position.x += s.velocity.x * dt;
        s.mesh.position.y += s.velocity.y * dt;
        s.mesh.position.z += s.velocity.z * dt;

        // Ground collision
        if (s.mesh.position.y < SPHERE_RADIUS) {
            s.mesh.position.y = SPHERE_RADIUS;
            s.velocity.y = -s.velocity.y * RESTITUTION;

            // Stop tiny bounces
            if (Math.abs(s.velocity.y) < 0.05) {
                s.velocity.y = 0;
            }
        }

        // Update debug box position
        if (s.debugBox) {
            s.debugBox.position.copy(s.mesh.position);
        }
    }
}

// Update debug overlays for headphone parts
function updateDebugOverlays() {
    if (!debugOverlay) return;

    // Get world positions of ear cups
    const leftWorldPos = new THREE.Vector3();
    leftEarCup.getWorldPosition(leftWorldPos);
    leftEarDebug.position.copy(leftWorldPos);
    leftEarDebug.quaternion.copy(headphoneGroup.quaternion);

    const rightWorldPos = new THREE.Vector3();
    rightEarCup.getWorldPosition(rightWorldPos);
    rightEarDebug.position.copy(rightWorldPos);
    rightEarDebug.quaternion.copy(headphoneGroup.quaternion);

    const headbandWorldPos = new THREE.Vector3();
    headband.getWorldPosition(headbandWorldPos);
    headbandDebug.position.set(headbandWorldPos.x, headbandWorldPos.y + 0.6, headbandWorldPos.z);
    headbandDebug.quaternion.copy(headphoneGroup.quaternion);
}

// Explode view animation
function updateExplodeView() {
    const targetOffset = explodedView ? 0.8 : 0;
    const targetHeadbandOffset = explodedView ? 0.5 : 0;

    const lerpFactor = 0.1;

    // Left ear cup
    const leftTarget = originalPositions.leftEarCup.x - targetOffset;
    leftEarCup.position.x += (leftTarget - leftEarCup.position.x) * lerpFactor;
    leftPad.position.x += (leftTarget - leftPad.position.x) * lerpFactor;

    // Right ear cup
    const rightTarget = originalPositions.rightEarCup.x + targetOffset;
    rightEarCup.position.x += (rightTarget - rightEarCup.position.x) * lerpFactor;
    rightPad.position.x += (rightTarget - rightPad.position.x) * lerpFactor;

    // Headband
    const headbandTarget = originalPositions.headband.y + targetHeadbandOffset;
    headband.position.y += (headbandTarget - headband.position.y) * lerpFactor;
}

// Animation loop
const clock = new THREE.Clock();
let frameCount = 0;

function animate() {
    requestAnimationFrame(animate);

    const dt = clock.getDelta();
    frameCount++;

    // FPS calculation
    fpsFrames++;
    const now = performance.now();
    if (now - fpsTime >= 1000) {
        currentFps = fpsFrames;
        fpsFrames = 0;
        fpsTime = now;
        document.getElementById('fps-display').textContent = `FPS: ${currentFps}`;
    }

    // Rotation
    if (isRotating) {
        rotationAngle += 0.5 * dt;
        headphoneGroup.rotation.y = rotationAngle;
    }

    // Physics
    updatePhysics(dt);

    // Explode view
    updateExplodeView();

    // Debug overlays
    updateDebugOverlays();

    // Count spheres on ground
    let spheresOnGround = 0;
    let totalKE = 0;
    let physicsActive = false;
    const spherePositions = [];

    for (let i = 0; i < physicsSpheres.length; i++) {
        const s = physicsSpheres[i];
        const pos = s.mesh.position;
        spherePositions.push({ x: pos.x, y: pos.y, z: pos.z });

        if (pos.y < 0.15) {
            spheresOnGround++;
        }
        if (pos.y > 0.15) {
            physicsActive = true;
        }

        const v = s.velocity;
        const speed2 = v.x * v.x + v.y * v.y + v.z * v.z;
        totalKE += 0.5 * 1.0 * speed2;
    }

    document.getElementById('ground-count').textContent = `Spheres on ground: ${spheresOnGround}`;

    // Update camera position based on distance
    const camDir = camera.position.clone().sub(new THREE.Vector3(0, 2, 0)).normalize();
    camera.position.copy(camDir.multiplyScalar(cameraDistance).add(new THREE.Vector3(0, 2, 0)));
    camera.lookAt(0, 1.5, 0);

    // Update state
    const state = window.__3D_STATE__;
    state.currentMaterial = currentMaterialKey;
    state.materialRoughness = materialPresets[currentMaterialKey].roughness;
    state.materialMetalness = materialPresets[currentMaterialKey].metalness;
    state.isRotating = isRotating;
    state.rotationAngle = isNaN(rotationAngle) ? 0 : rotationAngle;
    state.debugOverlay = debugOverlay;
    state.spherePositions = spherePositions;
    state.spheresOnGround = spheresOnGround;
    state.explodedView = explodedView;
    state.cameraDistance = isNaN(cameraDistance) ? 5 : cameraDistance;
    state.fps = currentFps;
    state.frameCount = frameCount;
    state.physicsActive = physicsActive;
    state.totalKineticEnergy = isNaN(totalKE) ? 0 : totalKE;

    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
