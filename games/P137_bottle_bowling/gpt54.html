<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 水瓶保龄球游戏</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0f172a;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 180px;
      backdrop-filter: blur(6px);
      line-height: 1.8;
      font-size: 14px;
    }

    #controlsTip {
      position: fixed;
      right: 12px;
      top: 12px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.6;
      max-width: 280px;
    }

    #resetBtn {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 20;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    #resetBtn:hover {
      background: #1d4ed8;
    }

    #powerWrap {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      width: 280px;
      height: 20px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      overflow: hidden;
      z-index: 20;
    }

    #powerBar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #eab308, #ef4444);
      transition: width 0.08s linear;
    }

    #centerHint {
      position: fixed;
      left: 50%;
      bottom: 60px;
      transform: translateX(-50%);
      z-index: 20;
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      background: rgba(0,0,0,0.35);
      padding: 6px 10px;
      border-radius: 999px;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <div>倒下瓶数：<span id="pinsDown">0</span></div>
    <div>当前帧：<span id="frame">1</span></div>
    <div>总分：<span id="totalScore">0</span></div>
    <div>球速：<span id="ballSpeed">0.00</span></div>
  </div>

  <div id="controlsTip">
    <div>操作说明：</div>
    <div>• 鼠标左右拖拽：调整发射角度</div>
    <div>• 鼠标上下拖拽：调整力度（5-20 m/s）</div>
    <div>• 松开鼠标：发射保龄球</div>
  </div>

  <div id="centerHint">拖拽设置方向与力度，松开发射</div>

  <div id="powerWrap">
    <div id="powerBar"></div>
  </div>

  <button id="resetBtn">重置</button>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const pinsDownEl = document.getElementById('pinsDown');
    const frameEl = document.getElementById('frame');
    const totalScoreEl = document.getElementById('totalScore');
    const ballSpeedEl = document.getElementById('ballSpeed');
    const resetBtn = document.getElementById('resetBtn');
    const powerBar = document.getElementById('powerBar');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f172a);
    scene.fog = new THREE.Fog(0x0f172a, 18, 40);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 6, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.5, -2);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.minDistance = 8;
    controls.maxDistance = 20;
    controls.maxPolarAngle = Math.PI * 0.48;

    const hemiLight = new THREE.HemisphereLight(0xbfdcff, 0x1f2937, 1.2);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.6);
    dirLight.position.set(6, 12, 8);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -12;
    dirLight.shadow.camera.right = 12;
    dirLight.shadow.camera.top = 12;
    dirLight.shadow.camera.bottom = -12;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 40;
    scene.add(dirLight);

    const laneGeo = new THREE.BoxGeometry(6, 0.2, 24);
    const laneMat = new THREE.MeshStandardMaterial({
      color: 0xcaa472,
      roughness: 0.5,
      metalness: 0.05
    });
    const lane = new THREE.Mesh(laneGeo, laneMat);
    lane.position.set(0, -0.1, -2);
    lane.receiveShadow = true;
    scene.add(lane);

    const laneEdgeMat = new THREE.MeshStandardMaterial({ color: 0x5b3b1f });
    const railGeo = new THREE.BoxGeometry(0.2, 0.4, 24);
    const railL = new THREE.Mesh(railGeo, laneEdgeMat);
    railL.position.set(-3.1, 0.1, -2);
    railL.receiveShadow = true;
    scene.add(railL);

    const railR = railL.clone();
    railR.position.x = 3.1;
    scene.add(railR);

    const aimLineMat = new THREE.LineDashedMaterial({
      color: 0xffffff,
      dashSize: 0.25,
      gapSize: 0.15,
      transparent: true,
      opacity: 0.7
    });
    const aimLineGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(),
      new THREE.Vector3()
    ]);
    const aimLine = new THREE.Line(aimLineGeo, aimLineMat);
    scene.add(aimLine);

    const ballRadius = 0.3;
    const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
    const ballMat = new THREE.MeshStandardMaterial({
      color: 0x163c8c,
      roughness: 0.35,
      metalness: 0.15
    });
    const ball = new THREE.Mesh(ballGeo, ballMat);
    ball.castShadow = true;
    scene.add(ball);

    const ballState = {
      startPos: new THREE.Vector3(0, ballRadius, 6),
      velocity: new THREE.Vector3(),
      moving: false,
      launched: false
    };
    ball.position.copy(ballState.startPos);

    let bottleTemplate = null;
    const pins = [];
    const pinSpacing = 0.8;
    const pinBaseZ = -8;
    const pinHeightApprox = 1.2;
    const pinRadiusApprox = 0.22;

    const gameState = {
      modelLoaded: false,
      pinsDown: 0,
      frame: 1,
      totalScore: 0,
      ballSpeed: 0,
      throwInFrame: 0,
      knockedThisThrow: 0,
      turnEnded: false
    };

    window.__3D_STATE__ = {
      modelLoaded: false,
      pinsDown: 0,
      frame: 1,
      totalScore: 0,
      ballSpeed: 0,
      ballPos: { x: ball.position.x, y: ball.position.y, z: ball.position.z }
    };

    function updateExternalState() {
      window.__3D_STATE__ = {
        modelLoaded: gameState.modelLoaded,
        pinsDown: gameState.pinsDown,
        frame: gameState.frame,
        totalScore: gameState.totalScore,
        ballSpeed: gameState.ballSpeed,
        ballPos: {
          x: ball.position.x,
          y: ball.position.y,
          z: ball.position.z
        }
      };
    }

    function updateHUD() {
      pinsDownEl.textContent = String(gameState.pinsDown);
      frameEl.textContent = String(gameState.frame);
      totalScoreEl.textContent = String(gameState.totalScore);
      ballSpeedEl.textContent = gameState.ballSpeed.toFixed(2);
      updateExternalState();
    }

    function setPowerBar(power) {
      const t = (power - 5) / 15;
      powerBar.style.width = `${THREE.MathUtils.clamp(t, 0, 1) * 100}%`;
    }

    function createFallbackBottle() {
      const g = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.24, 0.9, 24),
        new THREE.MeshStandardMaterial({ color: 0x9bd7ff, transparent: true, opacity: 0.75 })
      );
      body.position.y = 0.45;
      body.castShadow = true;
      g.add(body);

      const neck = new THREE.Mesh(
        new THREE.CylinderGeometry(0.08, 0.11, 0.18, 20),
        new THREE.MeshStandardMaterial({ color: 0x9bd7ff, transparent: true, opacity: 0.75 })
      );
      neck.position.y = 0.99;
      neck.castShadow = true;
      g.add(neck);

      const cap = new THREE.Mesh(
        new THREE.CylinderGeometry(0.09, 0.09, 0.08, 20),
        new THREE.MeshStandardMaterial({ color: 0x2563eb })
      );
      cap.position.y = 1.12;
      cap.castShadow = true;
      g.add(cap);

      return g;
    }

    function prepareModel(model) {
      model.traverse((obj) => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
          if (obj.material) {
            obj.material = obj.material.clone();
          }
        }
      });

      const box = new THREE.Box3().setFromObject(model);
      const size = new THREE.Vector3();
      box.getSize(size);

      const targetHeight = pinHeightApprox;
      const scale = size.y > 0 ? targetHeight / size.y : 1;
      model.scale.setScalar(scale);

      const box2 = new THREE.Box3().setFromObject(model);
      const minY = box2.min.y;
      model.position.y -= minY;

      return model;
    }

    function createPin(position) {
      let pinModel;
      if (bottleTemplate) {
        pinModel = bottleTemplate.clone(true);
      } else {
        pinModel = createFallbackBottle();
      }

      const wrapper = new THREE.Group();
      wrapper.position.copy(position);
      wrapper.add(pinModel);
      wrapper.userData = {
        standingQuat: wrapper.quaternion.clone(),
        isFalling: false,
        isDown: false,
        fallAxis: new THREE.Vector3(1, 0, 0),
        angularVelocity: 0,
        tiltAngle: 0
      };

      scene.add(wrapper);
      pins.push(wrapper);
    }

    function spawnPins() {
      for (const p of pins) scene.remove(p);
      pins.length = 0;

      let index = 0;
      for (let row = 0; row < 4; row++) {
        const count = 4 - row;
        const z = pinBaseZ - row * pinSpacing * 0.92;
        const startX = -((count - 1) * pinSpacing) / 2;
        for (let i = 0; i < count; i++) {
          const x = startX + i * pinSpacing;
          createPin(new THREE.Vector3(x, 0, z));
          index++;
        }
      }

      refreshPinsDown();
    }

    function resetBall() {
      ball.position.copy(ballState.startPos);
      ballState.velocity.set(0, 0, 0);
      ballState.moving = false;
      ballState.launched = false;
      gameState.ballSpeed = 0;
      updateHUD();
    }

    function standAllPins() {
      for (const pin of pins) {
        pin.rotation.set(0, 0, 0);
        pin.quaternion.copy(pin.userData.standingQuat);
        pin.userData.isFalling = false;
        pin.userData.isDown = false;
        pin.userData.angularVelocity = 0;
        pin.userData.tiltAngle = 0;
      }
      refreshPinsDown();
      resetBall();
    }

    function resetFullGame() {
      gameState.frame = 1;
      gameState.totalScore = 0;
      gameState.throwInFrame = 0;
      gameState.knockedThisThrow = 0;
      gameState.turnEnded = false;
      standAllPins();
      updateHUD();
    }

    function refreshPinsDown() {
      let down = 0;
      for (const pin of pins) {
        if (pin.userData.isDown) down++;
      }
      gameState.pinsDown = down;
      updateHUD();
    }

    function countNewDownPins() {
      let down = 0;
      for (const pin of pins) {
        const euler = new THREE.Euler().setFromQuaternion(pin.quaternion, 'XYZ');
        const tilt = Math.max(Math.abs(euler.x), Math.abs(euler.z));
        if (tilt > Math.PI / 4) {
          pin.userData.isDown = true;
        }
        if (pin.userData.isDown) down++;
      }
      gameState.pinsDown = down;
      return down;
    }

    function endThrowAndScore() {
      if (gameState.turnEnded) return;
      gameState.turnEnded = true;

      const downNow = countNewDownPins();
      gameState.totalScore += downNow - gameState.knockedThisThrow;
      gameState.knockedThisThrow = downNow;
      gameState.throwInFrame += 1;

      if (downNow === 10 && gameState.throwInFrame === 1) {
        // Strike
        gameState.frame += 1;
        gameState.throwInFrame = 0;
        gameState.knockedThisThrow = 0;
        if (gameState.frame <= 10) {
          setTimeout(() => {
            standAllPins();
          }, 700);
        }
      } else if (gameState.throwInFrame >= 2) {
        gameState.frame += 1;
        gameState.throwInFrame = 0;
        gameState.knockedThisThrow = 0;
        if (gameState.frame <= 10) {
          setTimeout(() => {
            standAllPins();
          }, 700);
        }
      } else {
        setTimeout(() => {
          resetBall();
          gameState.turnEnded = false;
          updateHUD();
        }, 700);
        updateHUD();
        return;
      }

      if (gameState.frame > 10) {
        gameState.frame = 10;
      }

      setTimeout(() => {
        resetBall();
        gameState.turnEnded = false;
        updateHUD();
      }, 750);

      updateHUD();
    }

    const dragState = {
      active: false,
      startX: 0,
      startY: 0,
      angle: 0,
      power: 12
    };
    setPowerBar(dragState.power);

    function updateAimLine() {
      const dir = new THREE.Vector3(
        Math.sin(dragState.angle),
        0,
        -Math.cos(dragState.angle)
      ).normalize();

      const start = ball.position.clone();
      const end = start.clone().add(dir.multiplyScalar(6));

      aimLine.geometry.setFromPoints([start, end]);
      aimLine.computeLineDistances();
    }
    updateAimLine();

    renderer.domElement.addEventListener('pointerdown', (e) => {
      if (ballState.moving || gameState.turnEnded || gameState.frame > 10) return;
      dragState.active = true;
      dragState.startX = e.clientX;
      dragState.startY = e.clientY;
    });

    window.addEventListener('pointermove', (e) => {
      if (!dragState.active || ballState.moving || gameState.frame > 10) return;

      const dx = e.clientX - dragState.startX;
      const dy = e.clientY - dragState.startY;

      dragState.angle = THREE.MathUtils.clamp(dx * 0.005, -0.65, 0.65);
      dragState.power = THREE.MathUtils.clamp(12 + (-dy) * 0.05, 5, 20);

      setPowerBar(dragState.power);
      updateAimLine();
    });

    window.addEventListener('pointerup', () => {
      if (!dragState.active || ballState.moving || gameState.frame > 10) return;
      dragState.active = false;

      const dir = new THREE.Vector3(
        Math.sin(dragState.angle),
        0,
        -Math.cos(dragState.angle)
      ).normalize();

      ballState.velocity.copy(dir.multiplyScalar(dragState.power));
      ballState.moving = true;
      ballState.launched = true;
      gameState.turnEnded = false;
    });

    resetBtn.addEventListener('click', () => {
      resetFullGame();
    });

    function handleBallPinCollisions() {
      for (const pin of pins) {
        const pinPos = pin.position.clone();
        const dx = ball.position.x - pinPos.x;
        const dz = ball.position.z - pinPos.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        const hitDist = ballRadius + pinRadiusApprox;

        if (dist < hitDist) {
          const normal = new THREE.Vector3(dx, 0, dz).normalize();
          const speed = ballState.velocity.length();
          const impact = THREE.MathUtils.clamp(speed / 20, 0.15, 1.0);

          if (!pin.userData.isDown) {
            pin.userData.isFalling = true;
            pin.userData.angularVelocity += impact * 0.14;
            pin.userData.fallAxis = new THREE.Vector3(normal.z, 0, -normal.x).normalize();
          }

          ball.position.add(normal.multiplyScalar((hitDist - dist) * 0.6));
          ballState.velocity.multiplyScalar(0.82);
        }
      }
    }

    function updatePins(dt) {
      for (const pin of pins) {
        if (pin.userData.isFalling && !pin.userData.isDown) {
          pin.userData.tiltAngle += pin.userData.angularVelocity;
          pin.userData.angularVelocity *= 0.985;

          const maxTilt = Math.PI / 2;
          const t = Math.min(pin.userData.tiltAngle, maxTilt);

          const q = new THREE.Quaternion().setFromAxisAngle(pin.userData.fallAxis, t);
          pin.quaternion.copy(pin.userData.standingQuat).multiply(q);

          if (t > Math.PI / 4) {
            pin.userData.isDown = true;
          }
        }
      }
    }

    function updateBall(dt) {
      if (!ballState.moving) return;

      ball.position.add(ballState.velocity.clone().multiplyScalar(dt));

      const frictionPer60 = 0.95;
      const friction = Math.pow(frictionPer60, dt * 60);
      ballState.velocity.multiplyScalar(friction);

      ball.rotation.x += ballState.velocity.length() * dt * 3.0;

      if (ball.position.x < -2.8 || ball.position.x > 2.8) {
        ballState.velocity.x *= -0.6;
        ball.position.x = THREE.MathUtils.clamp(ball.position.x, -2.8, 2.8);
      }

      handleBallPinCollisions();

      gameState.ballSpeed = ballState.velocity.length();
      countNewDownPins();

      const stopped = ballState.velocity.length() < 0.15;
      const outOfLane = ball.position.z < -13 || ball.position.z > 10;

      if (stopped || outOfLane) {
        ballState.moving = false;
        gameState.ballSpeed = 0;
        endThrowAndScore();
      }
    }

    const loader = new GLTFLoader();
    loader.load(
      'assets/WaterBottle.glb',
      (gltf) => {
        bottleTemplate = prepareModel(gltf.scene);
        gameState.modelLoaded = true;
        spawnPins();
        updateHUD();
      },
      undefined,
      () => {
        bottleTemplate = prepareModel(createFallbackBottle());
        gameState.modelLoaded = false;
        spawnPins();
        updateHUD();
      }
    );

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.033);

      controls.update();
      updateBall(dt);
      updatePins(dt);
      updateAimLine();

      renderer.render(scene, camera);
      updateHUD();
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHUD();
  </script>
</body>
</html>
