<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Bottle Bowling</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
  canvas { display: block; }
  
  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #fff;
    background: rgba(0,0,0,0.7);
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 200px;
    border: 1px solid rgba(255,255,255,0.2);
  }
  #hud h3 { margin-bottom: 8px; color: #4fc3f7; font-size: 16px; }
  #hud .label { color: #aaa; }
  #hud .value { color: #fff; font-weight: bold; }
  
  #resetBtn {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 30px;
    font-size: 16px;
    background: #e53935;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  #resetBtn:hover { background: #f44336; transform: translateX(-50%) scale(1.05); }
  
  #powerBar {
    position: absolute;
    right: 30px;
    top: 50%;
    transform: translateY(-50%);
    width: 30px;
    height: 300px;
    background: rgba(0,0,0,0.6);
    border-radius: 15px;
    border: 2px solid rgba(255,255,255,0.3);
    overflow: hidden;
  }
  #powerFill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 50%;
    background: linear-gradient(to top, #4caf50, #ffeb3b, #f44336);
    border-radius: 0 0 13px 13px;
    transition: height 0.1s;
  }
  #powerLabel {
    position: absolute;
    right: 30px;
    top: calc(50% + 170px);
    color: #fff;
    font-size: 12px;
    text-align: center;
    width: 30px;
    transform: translateY(-50%);
  }
  
  #instructions {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    text-align: center;
    pointer-events: none;
  }
  
  #strikeText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 80px;
    font-weight: bold;
    color: #ffd700;
    text-shadow: 0 0 30px rgba(255,215,0,0.8), 0 0 60px rgba(255,215,0,0.4);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
  }
  
  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 20px;
  }
</style>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>

<div id="hud">
  <h3>🎳 Bowling Score</h3>
  <div><span class="label">Pins Down: </span><span class="value" id="pinsDown">0</span><span class="label"> / 10</span></div>
  <div><span class="label">Frame: </span><span class="value" id="frame">1</span><span class="label"> / 10</span></div>
  <div><span class="label">Total Score: </span><span class="value" id="totalScore">0</span></div>
  <div><span class="label">Ball Speed: </span><span class="value" id="ballSpeed">0.0</span><span class="label"> m/s</span></div>
</div>

<div id="powerBar"><div id="powerFill"></div></div>
<div id="powerLabel">Power</div>

<button id="resetBtn">RESET</button>

<div id="instructions">🖱️ Drag Left/Right to aim • Drag Up/Down to adjust power • Release to launch</div>

<div id="strikeText">STRIKE!</div>
<div id="loading">Loading model...</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Global state
window.__3D_STATE__ = {
  modelLoaded: false,
  pinsDown: 0,
  frame: 1,
  totalScore: 0,
  ballSpeed: 0,
  ballPos: { x: 0, y: 0, z: 0 }
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 20, 40);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 4, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.8);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 10, 8);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

const spotLight = new THREE.SpotLight(0xffd700, 2, 30, Math.PI / 6, 0.5);
spotLight.position.set(0, 8, -2);
spotLight.target.position.set(0, 0, -2);
spotLight.castShadow = true;
scene.add(spotLight);
scene.add(spotLight.target);

const pointLight1 = new THREE.PointLight(0x4fc3f7, 1, 15);
pointLight1.position.set(-3, 3, 5);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0xff7043, 1, 15);
pointLight2.position.set(3, 3, 5);
scene.add(pointLight2);

// Lane
const laneGeom = new THREE.BoxGeometry(4, 0.1, 25);
const laneMat = new THREE.MeshStandardMaterial({ 
  color: 0xd4a574, 
  roughness: 0.3, 
  metalness: 0.1 
});
const lane = new THREE.Mesh(laneGeom, laneMat);
lane.position.set(0, -0.05, 0);
lane.receiveShadow = true;
scene.add(lane);

// Lane lines
const lineGeom = new THREE.BoxGeometry(0.02, 0.11, 25);
const lineMat = new THREE.MeshStandardMaterial({ color: 0x8b6914 });
for (let i = -3; i <= 3; i++) {
  if (i === 0) continue;
  const line = new THREE.Mesh(lineGeom, lineMat);
  line.position.set(i * 0.5, 0, 0);
  scene.add(line);
}

// Gutters
const gutterGeom = new THREE.BoxGeometry(0.5, 0.05, 25);
const gutterMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
const gutterL = new THREE.Mesh(gutterGeom, gutterMat);
gutterL.position.set(-2.25, -0.05, 0);
gutterL.receiveShadow = true;
scene.add(gutterL);
const gutterR = new THREE.Mesh(gutterGeom, gutterMat);
gutterR.position.set(2.25, -0.05, 0);
gutterR.receiveShadow = true;
scene.add(gutterR);

// Side walls
const wallGeom = new THREE.BoxGeometry(0.1, 0.5, 25);
const wallMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
const wallL = new THREE.Mesh(wallGeom, wallMat);
wallL.position.set(-2.55, 0.2, 0);
scene.add(wallL);
const wallR = new THREE.Mesh(wallGeom, wallMat);
wallR.position.set(2.55, 0.2, 0);
scene.add(wallR);

// Back wall
const backWallGeom = new THREE.BoxGeometry(6, 2, 0.2);
const backWallMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
const backWall = new THREE.Mesh(backWallGeom, backWallMat);
backWall.position.set(0, 1, -12);
scene.add(backWall);

// Arrow indicators on lane
const arrowShape = new THREE.Shape();
arrowShape.moveTo(0, 0);
arrowShape.lineTo(-0.08, 0.15);
arrowShape.lineTo(0, 0.1);
arrowShape.lineTo(0.08, 0.15);
arrowShape.closePath();
const arrowGeom = new THREE.ShapeGeometry(arrowShape);
const arrowMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, side: THREE.DoubleSide });
for (let i = -2; i <= 2; i++) {
  const arrow = new THREE.Mesh(arrowGeom, arrowMat);
  arrow.rotation.x = -Math.PI / 2;
  arrow.position.set(i * 0.4, 0.06, 3);
  scene.add(arrow);
}

// Bowling ball
const ballRadius = 0.3;
const ballGeom = new THREE.SphereGeometry(ballRadius, 32, 32);
const ballMat = new THREE.MeshStandardMaterial({ 
  color: 0x0d47a1, 
  roughness: 0.15, 
  metalness: 0.3 
});
const ball = new THREE.Mesh(ballGeom, ballMat);
ball.castShadow = true;

// Ball finger holes
const holeGeom = new THREE.CylinderGeometry(0.04, 0.04, 0.1, 16);
const holeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
const hole1 = new THREE.Mesh(holeGeom, holeMat);
hole1.position.set(0, 0.25, 0);
ball.add(hole1);
const hole2 = new THREE.Mesh(holeGeom, holeMat);
hole2.position.set(-0.08, 0.22, 0.06);
ball.add(hole2);
const hole3 = new THREE.Mesh(holeGeom, holeMat);
hole3.position.set(0.08, 0.22, 0.06);
ball.add(hole3);

const ballStartZ = 8;
ball.position.set(0, ballRadius, ballStartZ);
scene.add(ball);

// Aim line
const aimLineGeom = new THREE.BufferGeometry();
const aimLineMat = new THREE.LineBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.6 });
const aimLine = new THREE.Line(aimLineGeom, aimLineMat);
scene.add(aimLine);

// Pin setup
const PIN_SPACING = 0.8;
const PIN_Z_START = -4;
const pinPositions = [];

// Triangle arrangement: row 0 (back) has 4, row 1 has 3, row 2 has 2, row 3 (front) has 1
const rows = [4, 3, 2, 1];
for (let row = 0; row < rows.length; row++) {
  const count = rows[row];
  const z = PIN_Z_START - row * PIN_SPACING;
  const startX = -(count - 1) * PIN_SPACING / 2;
  for (let i = 0; i < count; i++) {
    pinPositions.push({
      x: startX + i * PIN_SPACING,
      z: z
    });
  }
}

// Pin physics state
const pins = [];
const pinBodies = [];

let modelTemplate = null;

// Create fallback pin (water bottle shape)
function createFallbackPin() {
  const group = new THREE.Group();
  
  // Bottle body
  const bodyGeom = new THREE.CylinderGeometry(0.12, 0.14, 0.6, 16);
  const bodyMat = new THREE.MeshStandardMaterial({ 
    color: 0x88ccff, 
    transparent: true, 
    opacity: 0.7,
    roughness: 0.1,
    metalness: 0.2
  });
  const body = new THREE.Mesh(bodyGeom, bodyMat);
  body.position.y = 0.3;
  body.castShadow = true;
  group.add(body);
  
  // Bottle neck
  const neckGeom = new THREE.CylinderGeometry(0.06, 0.1, 0.2, 16);
  const neck = new THREE.Mesh(neckGeom, bodyMat);
  neck.position.y = 0.7;
  neck.castShadow = true;
  group.add(neck);
  
  // Cap
  const capGeom = new THREE.CylinderGeometry(0.07, 0.07, 0.06, 16);
  const capMat = new THREE.MeshStandardMaterial({ color: 0x2196f3, roughness: 0.3 });
  const cap = new THREE.Mesh(capGeom, capMat);
  cap.position.y = 0.83;
  cap.castShadow = true;
  group.add(cap);
  
  // Label
  const labelGeom = new THREE.CylinderGeometry(0.145, 0.155, 0.2, 16);
  const labelMat = new THREE.MeshStandardMaterial({ color: 0x1565c0, roughness: 0.5 });
  const label = new THREE.Mesh(labelGeom, labelMat);
  label.position.y = 0.3;
  group.add(label);
  
  // Water inside
  const waterGeom = new THREE.CylinderGeometry(0.11, 0.13, 0.4, 16);
  const waterMat = new THREE.MeshStandardMaterial({ 
    color: 0x29b6f6, 
    transparent: true, 
    opacity: 0.5 
  });
  const water = new THREE.Mesh(waterGeom, waterMat);
  water.position.y = 0.2;
  group.add(water);
  
  return group;
}

function setupPins(template) {
  // Clear existing pins
  pins.forEach(p => scene.remove(p));
  pins.length = 0;
  pinBodies.length = 0;
  
  for (let i = 0; i < pinPositions.length; i++) {
    let pin;
    if (template) {
      pin = template.clone();
      // Scale to reasonable size
      pin.scale.set(3, 3, 3);
    } else {
      pin = createFallbackPin();
    }
    
    pin.position.set(pinPositions[i].x, 0, pinPositions[i].z);
    pin.castShadow = true;
    pin.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(pin);
    pins.push(pin);
    
    pinBodies.push({
      velocity: new THREE.Vector3(0, 0, 0),
      angularVelocity: new THREE.Vector3(0, 0, 0),
      fallen: false,
      originalPos: new THREE.Vector3(pinPositions[i].x, 0, pinPositions[i].z),
      originalRot: new THREE.Euler(0, 0, 0),
      radius: 0.15,
      height: 0.85,
      mass: 1.5,
      grounded: true
    });
  }
}

// Load model
const loader = new GLTFLoader();
const loadingEl = document.getElementById('loading');

loader.load(
  'assets/WaterBottle.glb',
  (gltf) => {
    modelTemplate = gltf.scene;
    // Adjust model orientation - make it stand upright
    modelTemplate.rotation.set(0, 0, 0);
    
    // Find bounding box to normalize
    const box = new THREE.Box3().setFromObject(modelTemplate);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    
    // Center the model
    modelTemplate.position.sub(center);
    modelTemplate.position.y += size.y / 2;
    
    setupPins(modelTemplate);
    window.__3D_STATE__.modelLoaded = true;
    loadingEl.style.display = 'none';
    console.log('WaterBottle.glb loaded successfully');
  },
  undefined,
  (error) => {
    console.warn('Could not load WaterBottle.glb, using fallback pins:', error);
    setupPins(null);
    window.__3D_STATE__.modelLoaded = true;
    loadingEl.style.display = 'none';
  }
);

// Game state
let gameState = {
  frame: 1,
  throwInFrame: 1,
  totalScore: 0,
  pinsDownThisFrame: 0,
  pinsDownFirstThrow: 0,
  ballLaunched: false,
  ballSettled: false,
  canThrow: true,
  aimAngle: 0,
  power: 12,
  isDragging: false,
  dragStartX: 0,
  dragStartY: 0,
  ballVelocity: new THREE.Vector3(0, 0, 0),
  ballAngularVel: 0
};

const FRICTION = 0.95;
const GRAVITY = -9.8;
const PIN_COLLISION_RADIUS = 0.15;
const BALL_COLLISION_RADIUS = ballRadius;

// Mouse interaction
let mouseDown = false;
let lastMouseX = 0;
let lastMouseY = 0;

renderer.domElement.addEventListener('mousedown', (e) => {
  if (!gameState.canThrow || gameState.ballLaunched) return;
  mouseDown = true;
  gameState.isDragging = true;
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
  gameState.dragStartX = e.clientX;
  gameState.dragStartY = e.clientY;
});

renderer.domElement.addEventListener('mousemove', (e) => {
  if (!mouseDown || !gameState.isDragging) return;
  
  const dx = e.clientX - lastMouseX;
  const dy = e.clientY - lastMouseY;
  
  // Left/right adjusts aim angle
  gameState.aimAngle -= dx * 0.003;
  gameState.aimAngle = Math.max(-0.5, Math.min(0.5, gameState.aimAngle));
  
  // Up/down adjusts power
  gameState.power -= dy * 0.05;
  gameState.power = Math.max(5, Math.min(20, gameState.power));
  
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
  
  updateAimLine();
  updatePowerBar();
});

renderer.domElement.addEventListener('mouseup', (e) => {
  if (!mouseDown) return;
  mouseDown = false;
  gameState.isDragging = false;
  
  if (gameState.canThrow && !gameState.ballLaunched) {
    launchBall();
  }
});

// Touch support
renderer.domElement.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (!gameState.canThrow || gameState.ballLaunched) return;
  const touch = e.touches[0];
  mouseDown = true;
  gameState.isDragging = true;
  lastMouseX = touch.clientX;
  lastMouseY = touch.clientY;
}, { passive: false });

renderer.domElement.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!mouseDown || !gameState.isDragging) return;
  const touch = e.touches[0];
  const dx = touch.clientX - lastMouseX;
  const dy = touch.clientY - lastMouseY;
  gameState.aimAngle -= dx * 0.003;
  gameState.aimAngle = Math.max(-0.5, Math.min(0.5, gameState.aimAngle));
  gameState.power -= dy * 0.05;
  gameState.power = Math.max(5, Math.min(20, gameState.power));
  lastMouseX = touch.clientX;
  lastMouseY = touch.clientY;
  updateAimLine();
  updatePowerBar();
}, { passive: false });

renderer.domElement.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (!mouseDown) return;
  mouseDown = false;
  gameState.isDragging = false;
  if (gameState.canThrow && !gameState.ballLaunched) {
    launchBall();
  }
}, { passive: false });

function updateAimLine() {
  const start = ball.position.clone();
  const dir = new THREE.Vector3(Math.sin(gameState.aimAngle), 0, -1).normalize();
  const end = start.clone().add(dir.multiplyScalar(15));
  
  const positions = new Float32Array([
    start.x, 0.05, start.z,
    end.x, 0.05, end.z
  ]);
  aimLine.geometry.dispose();
  aimLine.geometry = new THREE.BufferGeometry();
  aimLine.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  aimLine.visible = true;
}

function updatePowerBar() {
  const pct = ((gameState.power - 5) / 15) * 100;
  document.getElementById('powerFill').style.height = pct + '%';
}

function launchBall() {
  gameState.ballLaunched = true;
  gameState.canThrow = false;
  aimLine.visible = false;
  
  const dir = new THREE.Vector3(Math.sin(gameState.aimAngle), 0, -1).normalize();
  gameState.ballVelocity = dir.multiplyScalar(gameState.power);
  gameState.ballAngularVel = gameState.power * 2;
}

function resetBall() {
  ball.position.set(0, ballRadius, ballStartZ);
  ball.rotation.set(0, 0, 0);
  gameState.ballVelocity.set(0, 0, 0);
  gameState.ballLaunched = false;
  gameState.ballSettled = false;
  gameState.ballAngularVel = 0;
  gameState.aimAngle = 0;
  gameState.power = 12;
  updatePowerBar();
  updateAimLine();
}

function resetPins() {
  for (let i = 0; i < pins.length; i++) {
    pins[i].position.copy(pinBodies[i].originalPos);
    pins[i].rotation.set(0, 0, 0);
    pinBodies[i].velocity.set(0, 0, 0);
    pinBodies[i].angularVelocity.set(0, 0, 0);
    pinBodies[i].fallen = false;
    pinBodies[i].grounded = true;
  }
}

function countFallenPins() {
  let count = 0;
  for (let i = 0; i < pinBodies.length; i++) {
    const pin = pins[i];
    // Check if rotation exceeds 45 degrees on any axis
    const euler = pin.rotation;
    const tiltX = Math.abs(euler.x);
    const tiltZ = Math.abs(euler.z);
    const maxTilt = Math.PI / 4; // 45 degrees
    
    if (tiltX > maxTilt || tiltZ > maxTilt) {
      pinBodies[i].fallen = true;
      count++;
    }
  }
  return count;
}

function showStrike() {
  const el = document.getElementById('strikeText');
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

function handleThrowComplete() {
  const fallen = countFallenPins();
  gameState.pinsDownThisFrame = fallen;
  
  if (gameState.throwInFrame === 1) {
    gameState.pinsDownFirstThrow = fallen;
    
    if (fallen === 10) {
      // Strike!
      showStrike();
      gameState.totalScore += 10;
      advanceFrame();
    } else {
      // Second throw
      gameState.throwInFrame = 2;
      gameState.canThrow = true;
      resetBall();
    }
  } else {
    // Second throw
    const newFallen = fallen - gameState.pinsDownFirstThrow;
    gameState.totalScore += fallen;
    
    if (fallen === 10) {
      // Spare
      document.getElementById('strikeText').textContent = 'SPARE!';
      document.getElementById('strikeText').style.opacity = '1';
      setTimeout(() => { 
        document.getElementById('strikeText').style.opacity = '0';
        document.getElementById('strikeText').textContent = 'STRIKE!';
      }, 2000);
    }
    
    advanceFrame();
  }
  
  updateHUD();
}

function advanceFrame() {
  if (gameState.frame < 10) {
    gameState.frame++;
  } else {
    gameState.frame = 1;
    gameState.totalScore = 0;
  }
  
  gameState.throwInFrame = 1;
  gameState.pinsDownThisFrame = 0;
  gameState.pinsDownFirstThrow = 0;
  
  resetBall();
  resetPins();
  gameState.canThrow = true;
}

function updateHUD() {
  const fallen = countFallenPins();
  document.getElementById('pinsDown').textContent = fallen;
  document.getElementById('frame').textContent = gameState.frame;
  document.getElementById('totalScore').textContent = gameState.totalScore;
  
  const speed = gameState.ballVelocity.length();
  document.getElementById('ballSpeed').textContent = speed.toFixed(1);
  
  window.__3D_STATE__.pinsDown = fallen;
  window.__3D_STATE__.frame = gameState.frame;
  window.__3D_STATE__.totalScore = gameState.totalScore;
  window.__3D_STATE__.ballSpeed = parseFloat(speed.toFixed(1));
  window.__3D_STATE__.ballPos = {
    x: ball.position.x,
    y: ball.position.y,
    z: ball.position.z
  };
}

// Reset button
document.getElementById('resetBtn').addEventListener('click', () => {
  gameState.frame = 1;
  gameState.throwInFrame = 1;
  gameState.totalScore = 0;
  gameState.pinsDownThisFrame = 0;
  gameState.pinsDownFirstThrow = 0;
  
  resetBall();
  resetPins();
  gameState.canThrow = true;
  updateHUD();
});

// Physics update
const clock = new THREE.Clock();
let settleTimer = 0;

function updatePhysics(dt) {
  if (!gameState.ballLaunched) return;
  
  dt = Math.min(dt, 0.033); // Cap delta time
  
  // Update ball
  const vel = gameState.ballVelocity;
  const speed = vel.length();
  
  if (speed > 0.01) {
    // Apply friction
    vel.multiplyScalar(FRICTION);
    
    // Move ball
    ball.position.add(vel.clone().multiplyScalar(dt));
    
    // Keep ball on ground
    ball.position.y = ballRadius;
    
    // Ball rotation (rolling)
    const rollAxis = new THREE.Vector3(-vel.z, 0, vel.x).normalize();
    const rollAngle = speed * dt / ballRadius;
    ball.rotateOnWorldAxis(rollAxis, rollAngle);
    
    // Ball-pin collisions
    for (let i = 0; i < pins.length; i++) {
      if (pinBodies[i].fallen) continue;
      
      const pinPos = pins[i].position;
      const dx = ball.position.x - pinPos.x;
      const dz = ball.position.z - pinPos.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      const minDist = BALL_COLLISION_RADIUS + PIN_COLLISION_RADIUS;
      
      if (dist < minDist && dist > 0) {
        // Collision!
        const nx = dx / dist;
        const nz = dz / dist;
        
        // Push pin
        const impactForce = speed * 2;
        pinBodies[i].velocity.x = -nx * impactForce * 0.6;
        pinBodies[i].velocity.z = -nz * impactForce * 0.6;
        pinBodies[i].velocity.y = impactForce * 0.15;
        
        // Angular velocity for toppling
        pinBodies[i].angularVelocity.x = -nz * impactForce * 1.5;
        pinBodies[i].angularVelocity.z = nx * impactForce * 1.5;
        
        // Deflect ball slightly
        vel.x += nx * speed * 0.1;
        vel.z += nz * speed * 0.1;
        vel.multiplyScalar(0.85);
        
        // Separate
        const overlap = minDist - dist;
        ball.position.x += nx * overlap * 0.5;
        ball.position.z += nz * overlap * 0.5;
      }
    }
    
    // Pin-pin collisions
    for (let i = 0; i < pins.length; i++) {
      for (let j = i + 1; j < pins.length; j++) {
        const pi = pins[i].position;
        const pj = pins[j].position;
        const dx = pi.x - pj.x;
        const dz = pi.z - pj.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        const minDist = PIN_COLLISION_RADIUS * 2 + 0.05;
        
        if (dist < minDist && dist > 0) {
          const nx = dx / dist;
          const nz = dz / dist;
          
          const vi = pinBodies[i].velocity;
          const vj = pinBodies[j].velocity;
          
          const relVel = vi.clone().sub(vj);
          const relSpeed = relVel.x * nx + relVel.z * nz;
          
          if (relSpeed < 0) continue;
          
          const impulse = relSpeed * 0.5;
          vi.x -= nx * impulse;
          vi.z -= nz * impulse;
          vj.x += nx * impulse;
          vj.z += nz * impulse;
          
          // Transfer angular velocity
          const angTransfer = 0.3;
          if (pinBodies[i].angularVelocity.length() > 0.1) {
            pinBodies[j].angularVelocity.add(pinBodies[i].angularVelocity.clone().multiplyScalar(angTransfer));
          }
          if (pinBodies[j].angularVelocity.length() > 0.1) {
            pinBodies[i].angularVelocity.add(pinBodies[j].angularVelocity.clone().multiplyScalar(angTransfer));
          }
          
          // Separate
          const overlap = minDist - dist;
          pi.x += nx * overlap * 0.5;
          pi.z += nz * overlap * 0.5;
          pj.x -= nx * overlap * 0.5;
          pj.z -= nz * overlap * 0.5;
        }
      }
    }
    
    settleTimer = 0;
  } else {
    settleTimer += dt;
  }
  
  // Update pins
  for (let i = 0; i < pins.length; i++) {
    const body = pinBodies[i];
    const pin = pins[i];
    
    if (body.velocity.length() < 0.001 && body.angularVelocity.length() < 0.001 && body.fallen) continue;
    
    // Apply gravity to velocity
    body.velocity.y += GRAVITY * dt * 0.3;
    
    // Move pin
    pin.position.add(body.velocity.clone().multiplyScalar(dt));
    
    // Ground constraint
    if (pin.position.y < 0) {
      pin.position.y = 0;
      body.velocity.y = Math.abs(body.velocity.y) * 0.2;
      if (Math.abs(body.velocity.y) < 0.1) body.velocity.y = 0;
    }
    
    // Apply angular velocity
    pin.rotation.x += body.angularVelocity.x * dt;
    pin.rotation.z += body.angularVelocity.z * dt;
    
    // Damping
    body.velocity.multiplyScalar(0.96);
    body.angularVelocity.multiplyScalar(0.95);
    
    // Check if fallen
    const tiltX = Math.abs(pin.rotation.x);
    const tiltZ = Math.abs(pin.rotation.z);
    if (tiltX > Math.PI / 4 || tiltZ > Math.PI / 4) {
      body.fallen = true;
      // Let it fall more naturally
      if (tiltX > Math.PI / 2.5 || tiltZ > Math.PI / 2.5) {
        body.angularVelocity.multiplyScalar(0.9);
      }
      // Clamp rotation
      if (tiltX > Math.PI / 2) {
        pin.rotation.x = Math.sign(pin.rotation.x) * Math.PI / 2;
        body.angularVelocity.x *= 0.5;
      }
      if (tiltZ > Math.PI / 2) {
        pin.rotation.z = Math.sign(pin.rotation.z) * Math.PI / 2;
        body.angularVelocity.z *= 0.5;
      }
    }
  }
  
  // Check if ball is out of bounds or settled
  if (ball.position.z < -13 || ball.position.x > 5 || ball.position.x < -5 || settleTimer > 2) {
    if (!gameState.ballSettled) {
      gameState.ballSettled = true;
      setTimeout(() => {
        handleThrowComplete();
      }, 1000);
    }
  }
}

// Initial setup
updatePowerBar();
updateAimLine();

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  
  const dt = clock.getDelta();
  
  updatePhysics(dt);
  updateHUD();
  
  // Subtle camera movement
  if (!gameState.ballLaunched) {
    camera.position.set(0, 4, 12);
    camera.lookAt(0, 0.5, 0);
  } else {
    // Follow ball slightly
    const targetX = ball.position.x * 0.3;
    const targetZ = Math.max(ball.position.z * 0.3 + 10, 8);
    camera.position.x += (targetX - camera.position.x) * 0.05;
    camera.position.z += (targetZ - camera.position.z) * 0.05;
    camera.lookAt(ball.position.x * 0.5, 0.5, ball.position.z * 0.5);
  }
  
  renderer.render(scene, camera);
}

animate();

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
