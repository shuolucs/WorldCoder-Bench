<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Lava Lamp Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0008;
            font-family: sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #ffcc88;
            padding: 12px;
            font-family: monospace;
            font-size: 13px;
            border-radius: 8px;
            z-index: 1000;
            pointer-events: none;
            line-height: 1.5;
        }
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            display: flex;
            gap: 20px;
            z-index: 1000;
            align-items: center;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .control-group label {
            font-size: 12px;
            color: #ffcc88;
        }
        input[type=range] {
            width: 120px;
        }
        #instructions {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #aaa;
            padding: 10px;
            font-size: 12px;
            border-radius: 8px;
            z-index: 1000;
            text-align: right;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud">
        <div>Blobs: <span id="hud-blobs">8</span></div>
        <div>Heat: <span id="hud-heat">0.8</span></div>
        <div>Viscosity: <span id="hud-viscosity">2.0</span></div>
        <div>Avg Temp: <span id="hud-avg-temp">0.50</span></div>
        <div>Rising: <span id="hud-rising">0</span></div>
        <div>Falling: <span id="hud-falling">0</span></div>
        <div>Palette: <span id="hud-palette">Warm</span></div>
        <div>Status: <span id="hud-paused">Playing</span></div>
    </div>

    <div id="controls">
        <div class="control-group">
            <label for="slider-heat">Heat (Buoyancy)</label>
            <input type="range" id="slider-heat" min="0.2" max="2.0" step="0.1" value="0.8">
        </div>
        <div class="control-group">
            <label for="slider-blobs">Blob Count</label>
            <input type="range" id="slider-blobs" min="3" max="15" step="1" value="8">
        </div>
        <div class="control-group">
            <label for="slider-viscosity">Viscosity</label>
            <input type="range" id="slider-viscosity" min="0.5" max="5.0" step="0.1" value="2.0">
        </div>
    </div>

    <div id="instructions">
        Space: Pause/Play<br>
        R: Reset Blobs<br>
        H: Toggle Palette
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { MarchingCubes } from 'three/addons/objects/MarchingCubes.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            blobCount: 8,
            heatStrength: 0.8,
            viscosity: 2.0,
            avgTemperature: 0.5,
            risingCount: 0,
            fallingCount: 0,
            palette: 'Warm',
            isPaused: false,
            frameCount: 0,
            simValid: true,
            currentHue: 0.0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 4, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 3, 0);
        controls.update();

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x331122, 0.3);
        scene.add(ambientLight);

        const bottomLight = new THREE.PointLight(0xff6622, 1.2, 10);
        bottomLight.position.set(0, 0.5, 0);
        scene.add(bottomLight);

        const topLight = new THREE.PointLight(0x4411ff, 0.4, 10);
        topLight.position.set(0, 7, 0);
        scene.add(topLight);

        const spotLight = new THREE.SpotLight(0xffffff, 0.5);
        spotLight.position.set(3, 6, 3);
        spotLight.target.position.set(0, 3, 0);
        scene.add(spotLight);
        scene.add(spotLight.target);

        // --- Lamp Body ---
        const lampGroup = new THREE.Group();
        scene.add(lampGroup);

        // Base
        const baseGeo = new THREE.CylinderGeometry(1.0, 1.3, 1.0, 32);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.7, roughness: 0.3 });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.position.set(0, 0.5, 0);
        lampGroup.add(base);

        // Glass
        const glassGeo = new THREE.CylinderGeometry(0.9, 1.0, 5.0, 32);
        const glassMat = new THREE.MeshPhysicalMaterial({
            color: 0xffeedd,
            transparent: true,
            opacity: 0.15,
            side: THREE.DoubleSide,
            roughness: 0.1,
            transmission: 0.9,
            thickness: 0.1
        });
        const glass = new THREE.Mesh(glassGeo, glassMat);
        glass.position.set(0, 3.5, 0);
        lampGroup.add(glass);

        // Cap
        const capGeo = new THREE.CylinderGeometry(0.6, 0.9, 0.8, 32);
        const capMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.7, roughness: 0.3 });
        const cap = new THREE.Mesh(capGeo, capMat);
        cap.position.set(0, 6.4, 0);
        lampGroup.add(cap);

        // --- Background Plane ---
        const bgGeo = new THREE.PlaneGeometry(10, 10);
        const textureLoader = new THREE.TextureLoader();
        let bgTexture;
        const bgMat = new THREE.MeshBasicMaterial({ color: 0x220022 }); // Fallback color
        
        textureLoader.load('lavatile.jpg', (texture) => {
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            bgMat.map = texture;
            bgMat.color.setHex(0xffffff);
            bgMat.needsUpdate = true;
            bgTexture = texture;
        }, undefined, () => {
            console.warn("lavatile.jpg not found, using fallback color.");
        });

        const bgPlane = new THREE.Mesh(bgGeo, bgMat);
        bgPlane.position.set(0, 3, -3);
        scene.add(bgPlane);

        // --- Marching Cubes (Lava) ---
        const lavaMat = new THREE.MeshPhongMaterial({
            color: 0xff0000,
            emissive: 0x880000,
            emissiveIntensity: 0.4,
            shininess: 100
        });
        
        const effect = new MarchingCubes(40, lavaMat, false, false, 100000);
        effect.position.set(0, 3.5, 0);
        // MarchingCubes base size is [-1, 1] (width 2). 
        // To fit inside glass (radius 0.9, height 5.0), we scale it.
        // Requested scale: 1.8 x 4.5 x 1.8. 
        // Since base is 2, scale of 0.9 gives size 1.8. Scale of 2.25 gives size 4.5.
        effect.scale.set(0.9, 2.25, 0.9); 
        scene.add(effect);

        // --- Physics & Blobs ---
        let blobs = [];
        const dt = 1 / 60;
        const gravity = -0.3;

        function initBlobs() {
            blobs = [];
            for (let i = 0; i < window.__3D_STATE__.blobCount; i++) {
                blobs.push({
                    x: (Math.random() - 0.5) * 1.4, // [-0.7, 0.7]
                    y: (Math.random() - 0.5) * 1.8, // [-0.9, 0.9]
                    z: (Math.random() - 0.5) * 1.4, // [-0.7, 0.7]
                    vx: 0,
                    vy: 0,
                    vz: 0,
                    size: 0.6 + Math.random() * 0.6, // [0.6, 1.2]
                    temp: 0.5
                });
            }
        }
        initBlobs();

        // --- UI Controls ---
        document.getElementById('slider-heat').addEventListener('input', (e) => {
            window.__3D_STATE__.heatStrength = parseFloat(e.target.value);
        });
        document.getElementById('slider-blobs').addEventListener('input', (e) => {
            window.__3D_STATE__.blobCount = parseInt(e.target.value);
            initBlobs();
        });
        document.getElementById('slider-viscosity').addEventListener('input', (e) => {
            window.__3D_STATE__.viscosity = parseFloat(e.target.value);
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
            } else if (e.code === 'KeyR') {
                initBlobs();
            } else if (e.code === 'KeyH') {
                window.__3D_STATE__.palette = window.__3D_STATE__.palette === 'Warm' ? 'Cool' : 'Warm';
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function updateHUD() {
            const s = window.__3D_STATE__;
            document.getElementById('hud-blobs').innerText = s.blobCount;
            document.getElementById('hud-heat').innerText = s.heatStrength.toFixed(1);
            document.getElementById('hud-viscosity').innerText = s.viscosity.toFixed(1);
            document.getElementById('hud-avg-temp').innerText = s.avgTemperature.toFixed(2);
            document.getElementById('hud-rising').innerText = s.risingCount;
            document.getElementById('hud-falling').innerText = s.fallingCount;
            document.getElementById('hud-palette').innerText = s.palette;
            document.getElementById('hud-paused').innerText = s.isPaused ? 'Paused' : 'Playing';
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();
            window.__3D_STATE__.frameCount++;

            // Background scroll
            if (bgTexture && !window.__3D_STATE__.isPaused) {
                bgTexture.offset.y -= 0.001;
                bgTexture.offset.x += 0.0005;
            }

            // Color Cycling
            let hue;
            if (window.__3D_STATE__.palette === 'Warm') {
                hue = 0.05 + Math.sin(time * Math.PI * 2 / 10) * 0.05; // 0.0 to 0.10
            } else {
                hue = 0.65 + Math.sin(time * Math.PI * 2 / 10) * 0.10; // 0.55 to 0.75
            }
            lavaMat.color.setHSL(hue, 1.0, 0.5);
            lavaMat.emissive.setHSL(hue, 1.0, 0.2);
            window.__3D_STATE__.currentHue = parseFloat(hue.toFixed(3));

            if (!window.__3D_STATE__.isPaused) {
                let rising = 0;
                let falling = 0;
                let totalTemp = 0;
                let valid = true;

                effect.reset();

                const heatStrength = window.__3D_STATE__.heatStrength;
                const viscosity = window.__3D_STATE__.viscosity;

                for (let i = 0; i < blobs.length; i++) {
                    let b = blobs[i];

                    // Temperature update
                    if (b.y < -0.5) {
                        b.temp = Math.min(1.0, b.temp + 0.5 * dt);
                    } else if (b.y > 0.5) {
                        b.temp = Math.max(0.0, b.temp - 0.5 * dt);
                    } else {
                        b.temp += (0.5 - b.temp) * 0.1 * dt;
                    }

                    // Forces
                    let buoyancy = (b.temp - 0.5) * heatStrength;
                    let fy = buoyancy + gravity;
                    
                    b.vy += fy * dt;
                    b.vx += (Math.random() - 0.5) * 0.02;
                    b.vz += (Math.random() - 0.5) * 0.02;

                    // Viscosity (Drag)
                    b.vx -= b.vx * viscosity * dt;
                    b.vy -= b.vy * viscosity * dt;
                    b.vz -= b.vz * viscosity * dt;

                    // Integration
                    b.x += b.vx * dt;
                    b.y += b.vy * dt;
                    b.z += b.vz * dt;

                    // Boundaries
                    if (b.y < -0.9) { b.y = -0.9; b.vy *= -0.3; }
                    if (b.y > 0.9) { b.y = 0.9; b.vy *= -0.3; }
                    if (b.x < -0.7) { b.x = -0.7; b.vx *= -0.3; }
                    if (b.x > 0.7) { b.x = 0.7; b.vx *= -0.3; }
                    if (b.z < -0.7) { b.z = -0.7; b.vz *= -0.3; }
                    if (b.z > 0.7) { b.z = 0.7; b.vz *= -0.3; }

                    // Stats
                    if (b.vy > 0.01) rising++;
                    if (b.vy < -0.01) falling++;
                    totalTemp += b.temp;

                    if (isNaN(b.x) || isNaN(b.y) || isNaN(b.z)) valid = false;

                    // Add to MarchingCubes (map [-1, 1] to [0, 1])
                    let strength = b.size * 0.5;
                    effect.addBall(b.x * 0.5 + 0.5, b.y * 0.5 + 0.5, b.z * 0.5 + 0.5, strength, 0);
                }

                window.__3D_STATE__.avgTemperature = parseFloat((totalTemp / blobs.length).toFixed(3));
                window.__3D_STATE__.risingCount = rising;
                window.__3D_STATE__.fallingCount = falling;
                window.__3D_STATE__.simValid = valid;
            } else {
                // If paused, just re-render current state to MC
                effect.reset();
                for (let i = 0; i < blobs.length; i++) {
                    let b = blobs[i];
                    let strength = b.size * 0.5;
                    effect.addBall(b.x * 0.5 + 0.5, b.y * 0.5 + 0.5, b.z * 0.5 + 0.5, strength, 0);
                }
            }

            updateHUD();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
