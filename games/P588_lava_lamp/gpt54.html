<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Lava Lamp Metaballs</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0008;
      font-family: monospace;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.6);
      color: #ffcc88;
      padding: 12px;
      font: 13px monospace;
      border-radius: 8px;
      z-index: 1000;
      line-height: 1.45;
      min-width: 210px;
      user-select: none;
    }

    #hud .row {
      margin: 2px 0;
    }

    #controls {
      position: fixed;
      right: 12px;
      top: 12px;
      z-index: 1000;
      background: rgba(0,0,0,0.6);
      color: #ffcc88;
      padding: 12px;
      border-radius: 8px;
      font: 13px monospace;
      min-width: 250px;
    }

    #controls label {
      display: block;
      margin: 10px 0 4px;
    }

    #controls input[type="range"] {
      width: 100%;
    }

    #controls .hint {
      margin-top: 10px;
      color: #e5b36d;
      font-size: 12px;
      opacity: 0.9;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="hud">
    <div class="row">Blobs: <span id="hud-blobs">8</span></div>
    <div class="row">Heat: <span id="hud-heat">0.8</span></div>
    <div class="row">Viscosity: <span id="hud-viscosity">2.0</span></div>
    <div class="row">Avg temp: <span id="hud-avg-temp">0.50</span></div>
    <div class="row">Rising: <span id="hud-rising">0</span></div>
    <div class="row">Falling: <span id="hud-falling">0</span></div>
    <div class="row">Palette: <span id="hud-palette">Warm</span></div>
    <div class="row">Paused: <span id="hud-paused">Playing</span></div>
  </div>

  <div id="controls">
    <label for="slider-heat">Heat / Buoyancy</label>
    <input id="slider-heat" type="range" min="0.2" max="2.0" step="0.1" value="0.8" />

    <label for="slider-blobs">Blob Count</label>
    <input id="slider-blobs" type="range" min="3" max="15" step="1" value="8" />

    <label for="slider-viscosity">Viscosity</label>
    <input id="slider-viscosity" type="range" min="0.5" max="5.0" step="0.1" value="2.0" />

    <div class="hint">
      Space: Pause/Play<br />
      R: Reset blobs<br />
      H: Toggle Warm/Cool palette
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { MarchingCubes } from 'three/addons/objects/MarchingCubes.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0008);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 4, 6);
    camera.lookAt(0, 3, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 3, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0x331122, 0.3);
    scene.add(ambient);

    const bottomLight = new THREE.PointLight(0xff6622, 1.2, 20);
    bottomLight.position.set(0, 0.5, 0);
    scene.add(bottomLight);

    const topLight = new THREE.PointLight(0x4411ff, 0.4, 20);
    topLight.position.set(0, 7, 0);
    scene.add(topLight);

    const spot = new THREE.SpotLight(0xffffff, 0.5, 30, Math.PI / 6, 0.3, 1);
    spot.position.set(3, 6, 3);
    spot.target.position.set(0, 3, 0);
    scene.add(spot);
    scene.add(spot.target);

    const textureLoader = new THREE.TextureLoader();
    const bgTexture = textureLoader.load('lavatile.jpg');
    bgTexture.wrapS = THREE.RepeatWrapping;
    bgTexture.wrapT = THREE.RepeatWrapping;
    bgTexture.colorSpace = THREE.SRGBColorSpace;

    const bgPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 10),
      new THREE.MeshBasicMaterial({
        map: bgTexture,
        transparent: true,
        opacity: 0.9
      })
    );
    bgPlane.position.set(0, 3.5, -3);
    scene.add(bgPlane);

    const base = new THREE.Mesh(
      new THREE.CylinderGeometry(1.0, 1.3, 1.0, 32),
      new THREE.MeshStandardMaterial({
        color: 0x333333,
        metalness: 0.7,
        roughness: 0.3
      })
    );
    base.position.set(0, 0.5, 0);
    scene.add(base);

    const glass = new THREE.Mesh(
      new THREE.CylinderGeometry(0.9, 1.0, 5.0, 32),
      new THREE.MeshPhysicalMaterial({
        color: 0xffeedd,
        transparent: true,
        opacity: 0.15,
        side: THREE.DoubleSide,
        transmission: 0.35,
        roughness: 0.08,
        metalness: 0.0,
        clearcoat: 1.0,
        clearcoatRoughness: 0.1
      })
    );
    glass.position.set(0, 3.5, 0);
    scene.add(glass);

    const cap = new THREE.Mesh(
      new THREE.CylinderGeometry(0.6, 0.9, 0.8, 32),
      new THREE.MeshStandardMaterial({
        color: 0x333333,
        metalness: 0.7,
        roughness: 0.3
      })
    );
    cap.position.set(0, 6.4, 0);
    scene.add(cap);

    const glowDisk = new THREE.Mesh(
      new THREE.CylinderGeometry(0.72, 0.9, 0.08, 32),
      new THREE.MeshBasicMaterial({
        color: 0xff6622,
        transparent: true,
        opacity: 0.4
      })
    );
    glowDisk.position.set(0, 1.02, 0);
    scene.add(glowDisk);

    const lavaMaterial = new THREE.MeshPhongMaterial({
      color: 0xff4400,
      emissive: 0x661100,
      emissiveIntensity: 0.4,
      shininess: 80,
      specular: 0xffaa66
    });

    const effect = new MarchingCubes(40, lavaMaterial, true, true, 100000);
    effect.position.set(0, 3.5, 0);
    effect.scale.set(1.8, 4.5, 1.8);
    effect.isolation = 50;
    scene.add(effect);

    const sliderHeat = document.getElementById('slider-heat');
    const sliderBlobs = document.getElementById('slider-blobs');
    const sliderViscosity = document.getElementById('slider-viscosity');

    const hudBlobs = document.getElementById('hud-blobs');
    const hudHeat = document.getElementById('hud-heat');
    const hudViscosity = document.getElementById('hud-viscosity');
    const hudAvgTemp = document.getElementById('hud-avg-temp');
    const hudRising = document.getElementById('hud-rising');
    const hudFalling = document.getElementById('hud-falling');
    const hudPalette = document.getElementById('hud-palette');
    const hudPaused = document.getElementById('hud-paused');

    let buoyancyStrength = parseFloat(sliderHeat.value);
    let viscosity = parseFloat(sliderViscosity.value);
    let blobCount = parseInt(sliderBlobs.value, 10);

    let isPaused = false;
    let paletteMode = 'Warm';
    let frameCount = 0;

    const dt = 1 / 60;
    const gravity = -0.3;
    const heatRate = 0.8;
    const coolRate = 0.65;
    const midDriftRate = 0.2;
    const horizontalDriftMag = 0.02;

    const blobs = [];

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function createBlob() {
      return {
        x: rand(-0.45, 0.45),
        y: rand(-0.75, 0.75),
        z: rand(-0.45, 0.45),
        vx: rand(-0.03, 0.03),
        vy: rand(-0.03, 0.03),
        vz: rand(-0.03, 0.03),
        size: rand(0.6, 1.2),
        temperature: rand(0.25, 0.75)
      };
    }

    function initBlobs(count) {
      blobs.length = 0;
      for (let i = 0; i < count; i++) blobs.push(createBlob());
    }

    function resetBlobs() {
      for (let i = 0; i < blobs.length; i++) {
        const b = createBlob();
        blobs[i] = b;
      }
    }

    initBlobs(blobCount);

    sliderHeat.addEventListener('input', () => {
      buoyancyStrength = parseFloat(sliderHeat.value);
    });

    sliderViscosity.addEventListener('input', () => {
      viscosity = parseFloat(sliderViscosity.value);
    });

    sliderBlobs.addEventListener('input', () => {
      blobCount = parseInt(sliderBlobs.value, 10);
      initBlobs(blobCount);
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
      } else if (e.key === 'r' || e.key === 'R') {
        resetBlobs();
      } else if (e.key === 'h' || e.key === 'H') {
        paletteMode = paletteMode === 'Warm' ? 'Cool' : 'Warm';
      }
    });

    const color = new THREE.Color();
    const emissiveColor = new THREE.Color();

    function currentHueAtTime(seconds) {
      const t = (seconds % 10) / 10;
      if (paletteMode === 'Warm') {
        return 0.05 + 0.05 * Math.sin(t * Math.PI * 2);
      } else {
        return 0.7 + 0.08 * Math.sin(t * Math.PI * 2);
      }
    }

    function updateSimulation() {
      for (let i = 0; i < blobs.length; i++) {
        const b = blobs[i];

        if (b.y < -0.5) {
          b.temperature = clamp(b.temperature + heatRate * dt, 0, 1);
        } else if (b.y > 0.5) {
          b.temperature = clamp(b.temperature - coolRate * dt, 0, 1);
        } else {
          b.temperature += (0.5 - b.temperature) * midDriftRate * dt;
          b.temperature = clamp(b.temperature, 0, 1);
        }

        const fy = (b.temperature - 0.5) * buoyancyStrength + gravity - viscosity * b.vy;
        const fx = -viscosity * b.vx + rand(-horizontalDriftMag, horizontalDriftMag);
        const fz = -viscosity * b.vz + rand(-horizontalDriftMag, horizontalDriftMag);

        b.vx += fx * dt;
        b.vy += fy * dt;
        b.vz += fz * dt;

        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.z += b.vz * dt;

        if (b.y < -0.9) {
          b.y = -0.9;
          b.vy *= -0.3;
        } else if (b.y > 0.9) {
          b.y = 0.9;
          b.vy *= -0.3;
        }

        if (b.x < -0.7) {
          b.x = -0.7;
          b.vx *= -0.3;
        } else if (b.x > 0.7) {
          b.x = 0.7;
          b.vx *= -0.3;
        }

        if (b.z < -0.7) {
          b.z = -0.7;
          b.vz *= -0.3;
        } else if (b.z > 0.7) {
          b.z = 0.7;
          b.vz *= -0.3;
        }
      }
    }

    function renderMetaballs(hue) {
      color.setHSL(hue, 1.0, 0.5);
      emissiveColor.setHSL(hue, 1.0, 0.22);

      lavaMaterial.color.copy(color);
      lavaMaterial.emissive.copy(emissiveColor);
      lavaMaterial.needsUpdate = true;

      effect.reset();

      const r = color.r;
      const g = color.g;
      const b = color.b;

      for (let i = 0; i < blobs.length; i++) {
        const blob = blobs[i];
        const strength = blob.size * 0.5;

        const mx = (blob.x + 1) * 0.5;
        const my = (blob.y + 1) * 0.5;
        const mz = (blob.z + 1) * 0.5;

        effect.addBall(mx, my, mz, strength, 12, r, g, b);
      }
    }

    function updateHUDAndState(hue) {
      let avgTemperature = 0;
      let risingCount = 0;
      let fallingCount = 0;
      let simValid = true;

      for (let i = 0; i < blobs.length; i++) {
        const b = blobs[i];
        avgTemperature += b.temperature;
        if (b.vy > 0.01) risingCount++;
        if (b.vy < -0.01) fallingCount++;

        if (
          Number.isNaN(b.x) || Number.isNaN(b.y) || Number.isNaN(b.z) ||
          Number.isNaN(b.vx) || Number.isNaN(b.vy) || Number.isNaN(b.vz) ||
          Number.isNaN(b.temperature)
        ) {
          simValid = false;
        }
      }

      avgTemperature = blobs.length ? avgTemperature / blobs.length : 0;

      hudBlobs.textContent = String(blobs.length);
      hudHeat.textContent = buoyancyStrength.toFixed(1);
      hudViscosity.textContent = viscosity.toFixed(1);
      hudAvgTemp.textContent = avgTemperature.toFixed(2);
      hudRising.textContent = String(risingCount);
      hudFalling.textContent = String(fallingCount);
      hudPalette.textContent = paletteMode;
      hudPaused.textContent = isPaused ? 'Paused' : 'Playing';

      window.__3D_STATE__ = {
        blobCount: blobs.length,
        heatStrength: Number(buoyancyStrength.toFixed(1)),
        viscosity: Number(viscosity.toFixed(1)),
        avgTemperature: Number(avgTemperature.toFixed(3)),
        risingCount,
        fallingCount,
        palette: paletteMode,
        isPaused,
        frameCount,
        simValid,
        currentHue: Number(hue.toFixed(3))
      };
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const elapsed = clock.getElapsedTime();

      if (!isPaused) {
        updateSimulation();
      }

      bgTexture.offset.y = (elapsed * 0.02) % 1;
      bgTexture.offset.x = (elapsed * 0.01) % 1;

      const hue = currentHueAtTime(elapsed);
      renderMetaballs(hue);
      updateHUDAndState(hue);

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
