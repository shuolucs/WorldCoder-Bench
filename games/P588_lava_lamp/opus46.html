<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Lava Lamp Simulation</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: #0a0008;
    font-family: monospace;
}
canvas { display: block; }

#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.6);
    color: #ffcc88;
    padding: 12px;
    font-size: 13px;
    font-family: monospace;
    border-radius: 8px;
    z-index: 1000;
    line-height: 1.6;
    pointer-events: none;
}

#controls {
    position: fixed;
    bottom: 10px;
    left: 10px;
    background: rgba(0,0,0,0.6);
    color: #ffcc88;
    padding: 12px;
    font-size: 13px;
    font-family: monospace;
    border-radius: 8px;
    z-index: 1000;
    line-height: 2.0;
}

#controls label {
    display: block;
    margin-bottom: 4px;
}

#controls input[type="range"] {
    width: 160px;
    vertical-align: middle;
}

#keys-help {
    position: fixed;
    bottom: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    color: #ffcc88;
    padding: 12px;
    font-size: 12px;
    font-family: monospace;
    border-radius: 8px;
    z-index: 1000;
    line-height: 1.6;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="hud">
    <div>Blobs: <span id="hud-blobs">8</span></div>
    <div>Heat: <span id="hud-heat">0.8</span></div>
    <div>Viscosity: <span id="hud-viscosity">2.0</span></div>
    <div>Avg Temp: <span id="hud-avg-temp">0.50</span></div>
    <div>Rising: <span id="hud-rising">0</span></div>
    <div>Falling: <span id="hud-falling">0</span></div>
    <div>Palette: <span id="hud-palette">Warm</span></div>
    <div>Status: <span id="hud-paused">Playing</span></div>
</div>

<div id="controls">
    <label>Heat: <input type="range" id="slider-heat" min="0.2" max="2.0" step="0.1" value="0.8"> <span id="val-heat">0.8</span></label>
    <label>Blobs: <input type="range" id="slider-blobs" min="3" max="15" step="1" value="8"> <span id="val-blobs">8</span></label>
    <label>Viscosity: <input type="range" id="slider-viscosity" min="0.5" max="5.0" step="0.1" value="2.0"> <span id="val-viscosity">2.0</span></label>
</div>

<div id="keys-help">
    [Space] Pause/Play<br>
    [R] Reset Blobs<br>
    [H] Toggle Palette
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { MarchingCubes } from 'three/addons/objects/MarchingCubes.js';

// --- State ---
let isPaused = false;
let palette = 'Warm';
let buoyancyStrength = 0.8;
let viscosity = 2.0;
let blobCount = 8;
let frameCount = 0;
let blobs = [];

window.__3D_STATE__ = {
    blobCount: 8,
    heatStrength: 0.8,
    viscosity: 2.0,
    avgTemperature: 0.5,
    risingCount: 0,
    fallingCount: 0,
    palette: 'Warm',
    isPaused: false,
    frameCount: 0,
    simValid: true,
    currentHue: 0.05
};

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0008);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 4, 6);
camera.lookAt(0, 3, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 3, 0);
controls.update();

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0x331122, 0.3);
scene.add(ambientLight);

const bottomLight = new THREE.PointLight(0xff6622, 1.2, 20);
bottomLight.position.set(0, 0.5, 0);
scene.add(bottomLight);

const topLight = new THREE.PointLight(0x4411ff, 0.4, 20);
topLight.position.set(0, 7, 0);
scene.add(topLight);

const spotlight = new THREE.SpotLight(0xffffff, 0.5, 30, Math.PI / 6);
spotlight.position.set(3, 6, 3);
spotlight.target.position.set(0, 3, 0);
scene.add(spotlight);
scene.add(spotlight.target);

// --- Lamp Body ---
// Base
const baseMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.7, roughness: 0.3 });
const baseGeo = new THREE.CylinderGeometry(1.0, 1.3, 1.0, 32);
const baseMesh = new THREE.Mesh(baseGeo, baseMat);
baseMesh.position.set(0, 0.5, 0);
scene.add(baseMesh);

// Glass cylinder
const glassMat = new THREE.MeshPhysicalMaterial({
    color: 0xffeedd,
    transparent: true,
    opacity: 0.15,
    side: THREE.DoubleSide,
    roughness: 0.1,
    metalness: 0.0,
    depthWrite: false
});
const glassGeo = new THREE.CylinderGeometry(0.9, 1.0, 5.0, 32, 1, true);
const glassMesh = new THREE.Mesh(glassGeo, glassMat);
glassMesh.position.set(0, 3.5, 0);
glassMesh.renderOrder = 1;
scene.add(glassMesh);

// Cap
const capGeo = new THREE.CylinderGeometry(0.6, 0.9, 0.8, 32);
const capMesh = new THREE.Mesh(capGeo, baseMat);
capMesh.position.set(0, 6.4, 0);
scene.add(capMesh);

// --- Background Plane with lavatile texture ---
const textureLoader = new THREE.TextureLoader();
let bgTexture = null;
const bgPlaneGeo = new THREE.PlaneGeometry(10, 10);
const bgPlaneMat = new THREE.MeshBasicMaterial({ color: 0x221111, side: THREE.FrontSide });
const bgPlane = new THREE.Mesh(bgPlaneGeo, bgPlaneMat);
bgPlane.position.set(0, 3, -3);
scene.add(bgPlane);

textureLoader.load('lavatile.jpg',
    (texture) => {
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.repeat.set(2, 2);
        bgTexture = texture;
        bgPlaneMat.map = texture;
        bgPlaneMat.color.set(0x664444);
        bgPlaneMat.needsUpdate = true;
    },
    undefined,
    () => {
        // Texture failed to load - create a procedural fallback
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 256;
        const ctx = canvas.getContext('2d');
        for (let y = 0; y < 256; y++) {
            for (let x = 0; x < 256; x++) {
                const v = Math.sin(x * 0.05) * Math.cos(y * 0.05) * 0.5 + 0.5;
                const r = Math.floor(v * 80 + 30);
                const g = Math.floor(v * 20 + 5);
                const b = Math.floor(v * 10 + 5);
                ctx.fillStyle = `rgb(${r},${g},${b})`;
                ctx.fillRect(x, y, 1, 1);
            }
        }
        const fallbackTex = new THREE.CanvasTexture(canvas);
        fallbackTex.wrapS = THREE.RepeatWrapping;
        fallbackTex.wrapT = THREE.RepeatWrapping;
        fallbackTex.repeat.set(2, 2);
        bgTexture = fallbackTex;
        bgPlaneMat.map = fallbackTex;
        bgPlaneMat.color.set(0x664444);
        bgPlaneMat.needsUpdate = true;
    }
);

// --- Marching Cubes ---
const mcResolution = 40;
const mcMaterial = new THREE.MeshPhongMaterial({
    color: 0xff4400,
    specular: 0xffffff,
    shininess: 40,
    emissive: 0x441100,
    emissiveIntensity: 0.4
});

const effect = new MarchingCubes(mcResolution, mcMaterial, true, true, 100000);
effect.position.set(0, 3.5, 0);
effect.scale.set(1.8, 4.5, 1.8);
effect.enableUvs = false;
effect.enableColors = false;
effect.isolation = 80;
scene.add(effect);

// --- Blob Initialization ---
function createBlob() {
    return {
        x: (Math.random() - 0.5) * 1.0,
        y: (Math.random() - 0.5) * 1.4,
        z: (Math.random() - 0.5) * 1.0,
        vx: 0,
        vy: 0,
        vz: 0,
        size: 0.6 + Math.random() * 0.6,
        temperature: Math.random()
    };
}

function initBlobs(count) {
    blobs = [];
    for (let i = 0; i < count; i++) {
        blobs.push(createBlob());
    }
}

initBlobs(blobCount);

// --- Physics ---
const dt = 1 / 60;
const heatRate = 0.5;
const coolRate = 0.5;
const gravity = -0.3;

function updatePhysics() {
    for (let i = 0; i < blobs.length; i++) {
        const b = blobs[i];

        // Temperature update based on y position
        if (b.y < -0.5) {
            b.temperature += heatRate * dt;
            if (b.temperature > 1.0) b.temperature = 1.0;
        } else if (b.y > 0.5) {
            b.temperature -= coolRate * dt;
            if (b.temperature < 0.0) b.temperature = 0.0;
        } else {
            // Drift toward 0.5
            b.temperature += (0.5 - b.temperature) * 0.1 * dt;
        }

        // Forces
        const buoyancy = (b.temperature - 0.5) * buoyancyStrength;
        const dragX = -viscosity * b.vx;
        const dragY = -viscosity * b.vy;
        const dragZ = -viscosity * b.vz;

        const randX = (Math.random() - 0.5) * 0.04;
        const randZ = (Math.random() - 0.5) * 0.04;

        // Acceleration
        const ax = dragX + randX;
        const ay = buoyancy + gravity + dragY;
        const az = dragZ + randZ;

        // Euler integration
        b.vx += ax * dt;
        b.vy += ay * dt;
        b.vz += az * dt;

        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.z += b.vz * dt;

        // Boundary clamping
        if (b.y > 0.9) { b.y = 0.9; b.vy = -Math.abs(b.vy) * 0.3; }
        if (b.y < -0.9) { b.y = -0.9; b.vy = Math.abs(b.vy) * 0.3; }
        if (b.x > 0.7) { b.x = 0.7; b.vx = -Math.abs(b.vx) * 0.3; }
        if (b.x < -0.7) { b.x = -0.7; b.vx = Math.abs(b.vx) * 0.3; }
        if (b.z > 0.7) { b.z = 0.7; b.vz = -Math.abs(b.vz) * 0.3; }
        if (b.z < -0.7) { b.z = -0.7; b.vz = Math.abs(b.vz) * 0.3; }
    }
}

// --- Color cycling ---
function getHue(time) {
    if (palette === 'Warm') {
        // Oscillate between 0.0 and 0.10 over 10 seconds
        return 0.05 + 0.05 * Math.sin(time * Math.PI * 2 / 10);
    } else {
        // Cool palette: oscillate between 0.6 (blue) and 0.8 (purple)
        return 0.7 + 0.1 * Math.sin(time * Math.PI * 2 / 10);
    }
}

// --- Controls ---
const sliderHeat = document.getElementById('slider-heat');
const sliderBlobs = document.getElementById('slider-blobs');
const sliderViscosity = document.getElementById('slider-viscosity');

sliderHeat.addEventListener('input', () => {
    buoyancyStrength = parseFloat(sliderHeat.value);
    document.getElementById('val-heat').textContent = buoyancyStrength.toFixed(1);
});

sliderBlobs.addEventListener('input', () => {
    blobCount = parseInt(sliderBlobs.value);
    document.getElementById('val-blobs').textContent = blobCount;
    initBlobs(blobCount);
});

sliderViscosity.addEventListener('input', () => {
    viscosity = parseFloat(sliderViscosity.value);
    document.getElementById('val-viscosity').textContent = viscosity.toFixed(1);
});

document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
    } else if (e.code === 'KeyR') {
        initBlobs(blobCount);
    } else if (e.code === 'KeyH') {
        palette = palette === 'Warm' ? 'Cool' : 'Warm';
    }
});

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- HUD Elements ---
const hudBlobs = document.getElementById('hud-blobs');
const hudHeat = document.getElementById('hud-heat');
const hudViscosity = document.getElementById('hud-viscosity');
const hudAvgTemp = document.getElementById('hud-avg-temp');
const hudRising = document.getElementById('hud-rising');
const hudFalling = document.getElementById('hud-falling');
const hudPalette = document.getElementById('hud-palette');
const hudPaused = document.getElementById('hud-paused');

// --- Animation Loop ---
const clock = new THREE.Clock();
const tempColor = new THREE.Color();

function animate() {
    requestAnimationFrame(animate);

    const elapsed = clock.getElapsedTime();

    // Update background texture UV offset
    if (bgTexture) {
        bgTexture.offset.x = elapsed * 0.01;
        bgTexture.offset.y = elapsed * 0.008;
    }

    if (!isPaused) {
        updatePhysics();
    }

    // Color cycling
    const currentHue = getHue(elapsed);
    tempColor.setHSL(currentHue, 1.0, 0.5);
    mcMaterial.color.copy(tempColor);

    const emissiveColor = new THREE.Color();
    emissiveColor.setHSL(currentHue, 1.0, 0.2);
    mcMaterial.emissive.copy(emissiveColor);

    // Update bottom light color based on palette
    if (palette === 'Warm') {
        bottomLight.color.set(0xff6622);
    } else {
        bottomLight.color.set(0x2244ff);
    }

    // Update marching cubes
    effect.reset();
    for (let i = 0; i < blobs.length; i++) {
        const b = blobs[i];
        // Convert from [-1,1] range to [0,1] for MarchingCubes
        const nx = (b.x + 1) * 0.5;
        const ny = (b.y + 1) * 0.5;
        const nz = (b.z + 1) * 0.5;
        const strength = b.size * 0.5;
        const subtract = 12;
        effect.addBall(nx, ny, nz, strength, subtract);
    }

    // Compute stats
    let avgTemp = 0;
    let risingCount = 0;
    let fallingCount = 0;
    let simValid = true;

    for (let i = 0; i < blobs.length; i++) {
        const b = blobs[i];
        avgTemp += b.temperature;
        if (b.vy > 0.01) risingCount++;
        if (b.vy < -0.01) fallingCount++;
        if (isNaN(b.x) || isNaN(b.y) || isNaN(b.z)) simValid = false;
    }
    avgTemp = blobs.length > 0 ? avgTemp / blobs.length : 0;

    // Update HUD
    hudBlobs.textContent = blobs.length;
    hudHeat.textContent = buoyancyStrength.toFixed(1);
    hudViscosity.textContent = viscosity.toFixed(1);
    hudAvgTemp.textContent = avgTemp.toFixed(2);
    hudRising.textContent = risingCount;
    hudFalling.textContent = fallingCount;
    hudPalette.textContent = palette;
    hudPaused.textContent = isPaused ? 'Paused' : 'Playing';

    // Update state
    frameCount++;
    window.__3D_STATE__ = {
        blobCount: blobs.length,
        heatStrength: Math.round(buoyancyStrength * 10) / 10,
        viscosity: Math.round(viscosity * 10) / 10,
        avgTemperature: Math.round(avgTemp * 1000) / 1000,
        risingCount: risingCount,
        fallingCount: fallingCount,
        palette: palette,
        isPaused: isPaused,
        frameCount: frameCount,
        simValid: simValid,
        currentHue: Math.round(currentHue * 1000) / 1000
    };

    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
