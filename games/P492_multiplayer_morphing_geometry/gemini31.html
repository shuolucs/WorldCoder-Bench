<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Morphing Geometry Arena</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 26, 0.8);
            padding: 15px 20px;
            border: 1px solid #444488;
            border-radius: 8px;
            pointer-events: none;
            text-shadow: 1px 1px 2px #000;
            min-width: 200px;
        }
        #hud div {
            margin-bottom: 5px;
        }
        .controls-hint {
            margin-top: 15px !important;
            font-size: 0.85em;
            color: #aaaaff;
            border-top: 1px solid #444488;
            padding-top: 10px;
        }
        #resetAllBtn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: #222244;
            color: #fff;
            border: 1px solid #444488;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s, transform 0.1s;
        }
        #resetAllBtn:hover {
            background: #333366;
        }
        #resetAllBtn:active {
            transform: translateX(-50%) scale(0.95);
        }
        .player-label {
            color: #ffffff;
            font-weight: bold;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            pointer-events: none;
            user-select: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="hud"></div>
    <button id="resetAllBtn">Reset All</button>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            activePlayer: 1,
            players: [
                { shapeIndex: 0, morphProgress: 0, position: {x:0, y:0, z:0}, color: 0 },
                { shapeIndex: 0, morphProgress: 0, position: {x:0, y:0, z:0}, color: 0 },
                { shapeIndex: 0, morphProgress: 0, position: {x:0, y:0, z:0}, color: 0 },
                { shapeIndex: 0, morphProgress: 0, position: {x:0, y:0, z:0}, color: 0 }
            ],
            shapeName: 'sphere',
            groupOrbit: false,
            orbitAngle: 0,
            colorTheme: 'warm',
            syncPulseActive: false,
            totalMorphCount: 0,
            frameCount: 0
        };

        const shapeNames = ['sphere', 'box', 'cone', 'torusknot'];
        const themes = {
            warm: [0xff4444, 0x44ff44, 0x4444ff, 0xffff44],
            cool: [0x44ccff, 0x4488cc, 0x2244aa, 0x88ccff],
            neon: [0xff00ff, 0x00ff00, 0x00ffff, 0xffff00]
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        container.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lights & Environment ---
        const gridHelper = new THREE.GridHelper(50, 50, 0x222244, 0x222244);
        scene.add(gridHelper);

        const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
        scene.add(ambientLight);

        const warmLight = new THREE.PointLight(0xff8844, 1.0, 100);
        warmLight.position.set(10, 10, 10);
        scene.add(warmLight);

        const coolLight = new THREE.PointLight(0x4488ff, 1.0, 100);
        coolLight.position.set(-10, 10, -10);
        scene.add(coolLight);

        // --- Geometry & Morph Targets ---
        const baseGeometry = new THREE.SphereGeometry(1, 32, 32);
        const positions = baseGeometry.attributes.position.array;
        
        const boxPositions = new Float32Array(positions.length);
        const conePositions = new Float32Array(positions.length);
        const torusPositions = new Float32Array(positions.length);

        for (let i = 0; i < positions.length; i += 3) {
            let x = positions[i], y = positions[i+1], z = positions[i+2];
            
            // Box projection
            let max = Math.max(Math.abs(x), Math.abs(y), Math.abs(z));
            boxPositions[i] = x / max;
            boxPositions[i+1] = y / max;
            boxPositions[i+2] = z / max;

            // Cone projection
            let r = (1 - y) / 2;
            let lenXZ = Math.sqrt(x*x + z*z) || 1;
            conePositions[i] = (x / lenXZ) * r;
            conePositions[i+1] = y;
            conePositions[i+2] = (z / lenXZ) * r;

            // Pseudo-TorusKnot projection
            let u = Math.atan2(z, x);
            let v = Math.asin(y);
            let R = 0.6;
            let tubeR = 0.4 + 0.1 * Math.sin(3 * u);
            let v2 = v * 2 + u * 2;
            torusPositions[i] = (R + tubeR * Math.cos(v2)) * Math.cos(u);
            torusPositions[i+1] = tubeR * Math.sin(v2);
            torusPositions[i+2] = (R + tubeR * Math.cos(v2)) * Math.sin(u);
        }

        baseGeometry.morphAttributes.position = [];
        baseGeometry.morphAttributes.position[0] = new THREE.BufferAttribute(boxPositions, 3);
        baseGeometry.morphAttributes.position[1] = new THREE.BufferAttribute(conePositions, 3);
        baseGeometry.morphAttributes.position[2] = new THREE.BufferAttribute(torusPositions, 3);

        // --- Players Setup ---
        const players = [];
        const baseAngles = [Math.PI/2, 0, -Math.PI/2, Math.PI]; // P1(0,1,4), P2(4,1,0), P3(0,1,-4), P4(-4,1,0)

        for (let i = 0; i < 4; i++) {
            const material = new THREE.MeshStandardMaterial({
                color: themes.warm[i],
                roughness: 0.3,
                metalness: 0.2
            });
            
            const mesh = new THREE.Mesh(baseGeometry, material);
            mesh.position.set(4 * Math.cos(baseAngles[i]), 1, 4 * Math.sin(baseAngles[i]));
            scene.add(mesh);

            const div = document.createElement('div');
            div.className = 'player-label';
            div.textContent = `P${i + 1}`;
            const label = new CSS2DObject(div);
            label.position.set(0, 1.6, 0);
            mesh.add(label);

            players.push({
                mesh: mesh,
                baseAngle: baseAngles[i],
                currentShapeIndex: 0,
                targetShapeIndex: 0,
                morphProgress: 0,
                isMorphing: false
            });

            window.__3D_STATE__.players[i].color = themes.warm[i];
        }

        // --- Logic Functions ---
        function easeInOutCubic(x) {
            return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
        }

        function updateMorphInfluences(player, progress) {
            const t = easeInOutCubic(progress);
            player.mesh.morphTargetInfluences.fill(0);

            const from = player.currentShapeIndex;
            const to = player.targetShapeIndex;

            if (from === to) {
                if (from > 0) player.mesh.morphTargetInfluences[from - 1] = 1;
                return;
            }

            if (from > 0) player.mesh.morphTargetInfluences[from - 1] = 1 - t;
            if (to > 0) player.mesh.morphTargetInfluences[to - 1] = t;
        }

        function updateHighlights() {
            const theme = themes[window.__3D_STATE__.colorTheme];
            players.forEach((p, i) => {
                if (i === window.__3D_STATE__.activePlayer - 1) {
                    p.mesh.material.emissive.setHex(theme[i]);
                    p.mesh.material.emissiveIntensity = 0.3;
                } else {
                    p.mesh.material.emissive.setHex(0x000000);
                }
            });
        }

        function applyTheme() {
            const theme = themes[window.__3D_STATE__.colorTheme];
            players.forEach((p, i) => {
                p.mesh.material.color.setHex(theme[i]);
                window.__3D_STATE__.players[i].color = theme[i];
            });
            updateHighlights();
        }

        function updateHUD() {
            const state = window.__3D_STATE__;
            const activeP = state.players[state.activePlayer - 1];
            const hud = document.getElementById('hud');
            hud.innerHTML = `
                <div><strong>Active Player:</strong> P${state.activePlayer}</div>
                <div><strong>Shape:</strong> <span style="text-transform:capitalize">${state.shapeName}</span></div>
                <div><strong>Morph Progress:</strong> ${(activeP.morphProgress * 100).toFixed(0)}%</div>
                <div><strong>Group Orbit:</strong> ${state.groupOrbit ? '<span style="color:#44ff44">ON</span>' : '<span style="color:#ff4444">OFF</span>'}</div>
                <div><strong>Theme:</strong> <span style="text-transform:capitalize">${state.colorTheme}</span></div>
                <div class="controls-hint">
                    <strong>1-4:</strong> Select Player<br>
                    <strong>M:</strong> Next Shape<br>
                    <strong>R:</strong> Reset Shape<br>
                    <strong>Space:</strong> Sync Pulse<br>
                    <strong>G:</strong> Toggle Orbit<br>
                    <strong>C:</strong> Cycle Theme
                </div>
            `;
        }

        // --- Event Listeners ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            const state = window.__3D_STATE__;
            const activeIdx = state.activePlayer - 1;

            if (['1', '2', '3', '4'].includes(key)) {
                state.activePlayer = parseInt(key);
                updateHighlights();
            } else if (key === 'm') {
                const p = players[activeIdx];
                p.targetShapeIndex = (p.targetShapeIndex + 1) % 4;
                p.isMorphing = true;
                p.morphProgress = 0;
            } else if (key === 'r') {
                const p = players[activeIdx];
                p.targetShapeIndex = 0;
                p.isMorphing = true;
                p.morphProgress = 0;
            } else if (key === ' ') {
                const target = players[activeIdx].targetShapeIndex;
                players.forEach(p => {
                    if (p.currentShapeIndex !== target || p.isMorphing) {
                        p.targetShapeIndex = target;
                        p.isMorphing = true;
                        p.morphProgress = 0;
                    }
                });
                state.syncPulseActive = true;
            } else if (key === 'g') {
                state.groupOrbit = !state.groupOrbit;
            } else if (key === 'c') {
                const themeKeys = Object.keys(themes);
                const nextIdx = (themeKeys.indexOf(state.colorTheme) + 1) % themeKeys.length;
                state.colorTheme = themeKeys[nextIdx];
                applyTheme();
            }
        });

        document.getElementById('resetAllBtn').addEventListener('click', () => {
            const state = window.__3D_STATE__;
            state.groupOrbit = false;
            state.orbitAngle = 0;
            players.forEach(p => {
                p.targetShapeIndex = 0;
                p.isMorphing = true;
                p.morphProgress = 0;
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Initialization ---
        updateHighlights();

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const state = window.__3D_STATE__;
            state.frameCount++;

            if (state.groupOrbit) {
                state.orbitAngle += 1.0 * delta;
            }

            let anyMorphing = false;

            players.forEach((p, i) => {
                // Morphing Logic
                if (p.isMorphing) {
                    anyMorphing = true;
                    p.morphProgress += delta; // 1 second duration
                    
                    if (p.morphProgress >= 1.0) {
                        p.morphProgress = 1.0;
                        updateMorphInfluences(p, 1.0);
                        p.currentShapeIndex = p.targetShapeIndex;
                        p.isMorphing = false;
                        p.morphProgress = 0;
                        state.totalMorphCount++;
                    } else {
                        updateMorphInfluences(p, p.morphProgress);
                    }
                }

                // Positioning (Orbit + Bobbing)
                const currentAngle = p.baseAngle + state.orbitAngle;
                p.mesh.position.x = 4 * Math.cos(currentAngle);
                p.mesh.position.z = 4 * Math.sin(currentAngle);
                p.mesh.position.y = 1 + Math.sin(state.frameCount * 0.05 + i * Math.PI/2) * 0.2;

                // Update State Object
                state.players[i].shapeIndex = p.currentShapeIndex;
                state.players[i].morphProgress = p.isMorphing ? p.morphProgress : 0;
                state.players[i].position.x = p.mesh.position.x;
                state.players[i].position.y = p.mesh.position.y;
                state.players[i].position.z = p.mesh.position.z;
            });

            state.syncPulseActive = anyMorphing && state.syncPulseActive;
            state.shapeName = shapeNames[players[state.activePlayer - 1].targetShapeIndex];

            updateHUD();
            controls.update();
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
