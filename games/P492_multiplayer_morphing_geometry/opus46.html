<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Morphing Geometry Arena</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Courier New', monospace; }
canvas { display: block; }
#hud {
    position: fixed;
    top: 15px;
    left: 15px;
    color: #aaccff;
    background: rgba(10, 10, 30, 0.85);
    padding: 15px 20px;
    border-radius: 8px;
    border: 1px solid rgba(68, 136, 255, 0.3);
    font-size: 13px;
    line-height: 1.8;
    z-index: 100;
    min-width: 260px;
    backdrop-filter: blur(5px);
}
#hud .title {
    font-size: 16px;
    color: #ffffff;
    margin-bottom: 8px;
    border-bottom: 1px solid rgba(68, 136, 255, 0.3);
    padding-bottom: 6px;
}
#hud .label { color: #6688aa; }
#hud .value { color: #ffffff; font-weight: bold; }
#hud .active-indicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
#resetAllBtn {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 30px;
    background: rgba(255, 68, 68, 0.2);
    color: #ff6666;
    border: 1px solid rgba(255, 68, 68, 0.5);
    border-radius: 6px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    cursor: pointer;
    z-index: 100;
    transition: all 0.3s;
}
#resetAllBtn:hover {
    background: rgba(255, 68, 68, 0.4);
    color: #ffffff;
}
.player-label {
    position: fixed;
    color: #ffffff;
    font-size: 12px;
    font-family: 'Courier New', monospace;
    text-align: center;
    pointer-events: none;
    z-index: 50;
    text-shadow: 0 0 8px rgba(0,0,0,0.8);
    background: rgba(0,0,0,0.4);
    padding: 2px 8px;
    border-radius: 4px;
}
#controls-help {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: #556688;
    font-size: 11px;
    text-align: center;
    z-index: 100;
}
</style>
</head>
<body>

<div id="hud">
    <div class="title">⬡ MORPH ARENA</div>
    <div><span class="label">Active Player: </span><span class="active-indicator" id="hud-color"></span><span class="value" id="hud-player">P1</span></div>
    <div><span class="label">Shape: </span><span class="value" id="hud-shape">sphere</span></div>
    <div><span class="label">Morph Progress: </span><span class="value" id="hud-progress">100%</span></div>
    <div><span class="label">Group Orbit: </span><span class="value" id="hud-orbit">OFF</span></div>
    <div><span class="label">Color Theme: </span><span class="value" id="hud-theme">warm</span></div>
    <div><span class="label">Total Morphs: </span><span class="value" id="hud-morphs">0</span></div>
</div>

<button id="resetAllBtn">⟲ Reset All</button>

<div id="controls-help">
    [1-4] Select Player &nbsp;|&nbsp; [M] Morph &nbsp;|&nbsp; [R] Reset &nbsp;|&nbsp; [Space] Sync Pulse &nbsp;|&nbsp; [G] Group Orbit &nbsp;|&nbsp; [C] Color Theme
</div>

<div id="player-labels">
    <div class="player-label" id="label-0">P1</div>
    <div class="player-label" id="label-1">P2</div>
    <div class="player-label" id="label-2">P3</div>
    <div class="player-label" id="label-3">P4</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {

const shapeNames = ['sphere', 'box', 'cone', 'torusknot'];

const colorThemes = {
    warm: [0xff4444, 0x44ff44, 0x4444ff, 0xffff44],
    cool: [0x44ccff, 0x4488cc, 0x2244aa, 0x88ccff],
    neon: [0xff00ff, 0x00ff00, 0x00ffff, 0xffff00]
};

const initialPositions = [
    { x: 0, y: 1, z: 4 },
    { x: 4, y: 1, z: 0 },
    { x: 0, y: 1, z: -4 },
    { x: -4, y: 1, z: 0 }
];

// Easing function
function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
scene.add(ambientLight);

const warmLight = new THREE.PointLight(0xff8844, 1.0, 50);
warmLight.position.set(10, 10, 10);
scene.add(warmLight);

const coolLight = new THREE.PointLight(0x4488ff, 1.0, 50);
coolLight.position.set(-10, 10, -10);
scene.add(coolLight);

// Grid floor
const gridHelper = new THREE.GridHelper(50, 50, 0x222244, 0x222244);
scene.add(gridHelper);

// Floor plane for subtle reflection
const floorGeo = new THREE.PlaneGeometry(50, 50);
const floorMat = new THREE.MeshStandardMaterial({ 
    color: 0x0a0a1a, 
    roughness: 0.8, 
    metalness: 0.2,
    transparent: true,
    opacity: 0.5
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.01;
scene.add(floor);

// Generate shape vertex positions for a sphere geometry
// We use a base sphere geometry and compute target positions for each shape
const segments = 32;
const baseGeometry = new THREE.SphereGeometry(1, segments, segments);
const vertexCount = baseGeometry.attributes.position.count;

function generateShapePositions(shapeIndex) {
    const positions = new Float32Array(vertexCount * 3);
    const basePos = baseGeometry.attributes.position.array;
    
    for (let i = 0; i < vertexCount; i++) {
        const bx = basePos[i * 3];
        const by = basePos[i * 3 + 1];
        const bz = basePos[i * 3 + 2];
        
        // Spherical coordinates of the base vertex
        const r = Math.sqrt(bx * bx + by * by + bz * bz);
        const theta = Math.atan2(Math.sqrt(bx * bx + bz * bz), by); // polar
        const phi = Math.atan2(bz, bx); // azimuthal
        
        let nx, ny, nz;
        
        if (shapeIndex === 0) {
            // Sphere
            nx = bx;
            ny = by;
            nz = bz;
        } else if (shapeIndex === 1) {
            // Box-like: push vertices toward cube surface
            const absX = Math.abs(bx);
            const absY = Math.abs(by);
            const absZ = Math.abs(bz);
            const maxCoord = Math.max(absX, absY, absZ);
            if (maxCoord > 0.001) {
                const scale = 1.0 / maxCoord;
                nx = bx * scale * 0.85;
                ny = by * scale * 0.85;
                nz = bz * scale * 0.85;
            } else {
                nx = bx;
                ny = by;
                nz = bz;
            }
        } else if (shapeIndex === 2) {
            // Cone-like
            const t = (by + 1) / 2; // 0 at bottom, 1 at top
            const coneRadius = (1 - t) * 1.0;
            const horizDist = Math.sqrt(bx * bx + bz * bz);
            if (horizDist > 0.001) {
                nx = (bx / horizDist) * coneRadius;
                nz = (bz / horizDist) * coneRadius;
            } else {
                nx = 0;
                nz = 0;
            }
            ny = by * 1.2;
        } else if (shapeIndex === 3) {
            // Torus-knot-like: warp vertices into a twisted shape
            const p = 2, q = 3;
            const u = phi; // use azimuthal angle
            const v = theta; // use polar angle
            
            const R = 0.7; // major radius
            const rr = 0.3; // minor radius
            
            const cu = Math.cos(u * p);
            const su = Math.sin(u * p);
            const cv = Math.cos(v * q + u * p);
            const sv = Math.sin(v * q + u * p);
            
            const tubeR = R + rr * Math.cos(v * 3 + u * 2);
            
            nx = bx * 0.4 + Math.cos(phi) * Math.sin(theta) * 0.3 * Math.cos(theta * 3 + phi * 2);
            ny = by * 0.6 + 0.4 * Math.sin(phi * 2 + theta * 3);
            nz = bz * 0.4 + Math.sin(phi) * Math.sin(theta) * 0.3 * Math.sin(theta * 3 + phi * 2);
            
            // More dramatic torus knot shape
            const angle1 = phi;
            const angle2 = theta;
            const majorR = 0.6;
            const minorR = 0.25;
            const twist = 3;
            
            const cx = majorR * Math.cos(angle1);
            const cz = majorR * Math.sin(angle1);
            const dx = Math.cos(angle1) * minorR * Math.cos(angle2 * twist + angle1 * 2);
            const dy = minorR * Math.sin(angle2 * twist + angle1 * 2);
            const dz = Math.sin(angle1) * minorR * Math.cos(angle2 * twist + angle1 * 2);
            
            nx = cx + dx;
            ny = dy + by * 0.15;
            nz = cz + dz;
            
            // Scale up a bit
            nx *= 1.3;
            ny *= 1.3;
            nz *= 1.3;
        }
        
        positions[i * 3] = nx;
        positions[i * 3 + 1] = ny;
        positions[i * 3 + 2] = nz;
    }
    
    return positions;
}

// Pre-compute all shape target positions
const shapeTargets = [
    generateShapePositions(0),
    generateShapePositions(1),
    generateShapePositions(2),
    generateShapePositions(3)
];

// Create players
const players = [];

for (let i = 0; i < 4; i++) {
    const geometry = new THREE.BufferGeometry();
    geometry.copy(baseGeometry);
    
    // Store current positions as a separate array for morphing
    const currentPositions = new Float32Array(vertexCount * 3);
    currentPositions.set(shapeTargets[0]); // Start as sphere
    geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
    
    const material = new THREE.MeshStandardMaterial({
        color: colorThemes.warm[i],
        roughness: 0.3,
        metalness: 0.6,
        emissive: 0x000000,
        emissiveIntensity: 0
    });
    
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(initialPositions[i].x, initialPositions[i].y, initialPositions[i].z);
    scene.add(mesh);
    
    players.push({
        mesh: mesh,
        geometry: geometry,
        material: material,
        shapeIndex: 0,
        targetShapeIndex: 0,
        fromShapeIndex: 0,
        morphProgress: 1.0,
        isMorphing: false,
        morphFrame: 0,
        baseY: initialPositions[i].y,
        orbitAngle: (i / 4) * Math.PI * 2
    });
}

// State
const state = {
    activePlayer: 1,
    players: players.map((p, i) => ({
        shapeIndex: 0,
        morphProgress: 1.0,
        position: { ...initialPositions[i] },
        color: colorThemes.warm[i]
    })),
    shapeName: 'sphere',
    groupOrbit: false,
    orbitAngle: 0,
    colorTheme: 'warm',
    syncPulseActive: false,
    totalMorphCount: 0,
    frameCount: 0
};

window.__3D_STATE__ = state;

let activePlayerIndex = 0;

function startMorph(playerIndex, targetShape) {
    const p = players[playerIndex];
    if (p.isMorphing && p.targetShapeIndex === targetShape) return;
    if (p.shapeIndex === targetShape && !p.isMorphing) return;
    
    p.fromShapeIndex = p.shapeIndex;
    p.targetShapeIndex = targetShape;
    p.isMorphing = true;
    p.morphFrame = 0;
    p.morphProgress = 0;
    
    // Capture current positions as "from" state
    const currentPos = p.geometry.attributes.position.array;
    if (!p.fromPositions) {
        p.fromPositions = new Float32Array(vertexCount * 3);
    }
    p.fromPositions.set(currentPos);
}

function updateMorph(playerIndex) {
    const p = players[playerIndex];
    if (!p.isMorphing) return;
    
    p.morphFrame++;
    const totalFrames = 60;
    const rawProgress = Math.min(p.morphFrame / totalFrames, 1.0);
    const easedProgress = easeInOutCubic(rawProgress);
    p.morphProgress = rawProgress;
    
    const positions = p.geometry.attributes.position.array;
    const fromPos = p.fromPositions;
    const toPos = shapeTargets[p.targetShapeIndex];
    
    for (let i = 0; i < vertexCount * 3; i++) {
        positions[i] = fromPos[i] + (toPos[i] - fromPos[i]) * easedProgress;
    }
    
    p.geometry.attributes.position.needsUpdate = true;
    p.geometry.computeVertexNormals();
    
    if (rawProgress >= 1.0) {
        p.isMorphing = false;
        p.shapeIndex = p.targetShapeIndex;
        p.morphProgress = 1.0;
        state.totalMorphCount++;
    }
    
    // Update state
    state.players[playerIndex].shapeIndex = p.isMorphing ? p.fromShapeIndex : p.shapeIndex;
    state.players[playerIndex].morphProgress = p.morphProgress;
}

function selectPlayer(index) {
    activePlayerIndex = index;
    state.activePlayer = index + 1;
    
    players.forEach((p, i) => {
        if (i === index) {
            p.material.emissive.setHex(p.material.color.getHex());
            p.material.emissiveIntensity = 0.3;
        } else {
            p.material.emissive.setHex(0x000000);
            p.material.emissiveIntensity = 0;
        }
    });
}

function applyColorTheme(themeName) {
    state.colorTheme = themeName;
    const colors = colorThemes[themeName];
    players.forEach((p, i) => {
        p.material.color.setHex(colors[i]);
        state.players[i].color = colors[i];
    });
    // Re-apply emissive for active player
    selectPlayer(activePlayerIndex);
}

function resetAll() {
    players.forEach((p, i) => {
        // Reset position
        p.mesh.position.set(initialPositions[i].x, initialPositions[i].y, initialPositions[i].z);
        p.baseY = initialPositions[i].y;
        p.orbitAngle = (i / 4) * Math.PI * 2;
        
        // Reset to sphere
        if (p.shapeIndex !== 0 || p.isMorphing) {
            startMorph(i, 0);
            // Instant reset
            const positions = p.geometry.attributes.position.array;
            positions.set(shapeTargets[0]);
            p.geometry.attributes.position.needsUpdate = true;
            p.geometry.computeVertexNormals();
            p.isMorphing = false;
            p.shapeIndex = 0;
            p.targetShapeIndex = 0;
            p.morphProgress = 1.0;
        }
        
        state.players[i].shapeIndex = 0;
        state.players[i].morphProgress = 1.0;
        state.players[i].position = { ...initialPositions[i] };
    });
    
    state.groupOrbit = false;
    state.orbitAngle = 0;
    state.syncPulseActive = false;
}

// Keyboard input
document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    
    if (key === '1') selectPlayer(0);
    else if (key === '2') selectPlayer(1);
    else if (key === '3') selectPlayer(2);
    else if (key === '4') selectPlayer(3);
    else if (key === 'm') {
        const p = players[activePlayerIndex];
        const currentShape = p.isMorphing ? p.targetShapeIndex : p.shapeIndex;
        const nextShape = (currentShape + 1) % 4;
        startMorph(activePlayerIndex, nextShape);
    }
    else if (key === 'r') {
        startMorph(activePlayerIndex, 0);
    }
    else if (key === ' ') {
        e.preventDefault();
        const activeShape = players[activePlayerIndex].isMorphing ? 
            players[activePlayerIndex].targetShapeIndex : 
            players[activePlayerIndex].shapeIndex;
        state.syncPulseActive = true;
        players.forEach((p, i) => {
            startMorph(i, activeShape);
        });
    }
    else if (key === 'g') {
        state.groupOrbit = !state.groupOrbit;
    }
    else if (key === 'c') {
        const themes = ['warm', 'cool', 'neon'];
        const currentIdx = themes.indexOf(state.colorTheme);
        const nextTheme = themes[(currentIdx + 1) % themes.length];
        applyColorTheme(nextTheme);
    }
});

// Reset button
document.getElementById('resetAllBtn').addEventListener('click', resetAll);

// Select first player initially
selectPlayer(0);

// HUD elements
const hudPlayer = document.getElementById('hud-player');
const hudShape = document.getElementById('hud-shape');
const hudProgress = document.getElementById('hud-progress');
const hudOrbit = document.getElementById('hud-orbit');
const hudTheme = document.getElementById('hud-theme');
const hudMorphs = document.getElementById('hud-morphs');
const hudColor = document.getElementById('hud-color');

const labelElements = [
    document.getElementById('label-0'),
    document.getElementById('label-1'),
    document.getElementById('label-2'),
    document.getElementById('label-3')
];

function updateHUD() {
    const ap = players[activePlayerIndex];
    const currentShape = ap.isMorphing ? ap.targetShapeIndex : ap.shapeIndex;
    
    hudPlayer.textContent = `P${activePlayerIndex + 1}`;
    hudShape.textContent = shapeNames[currentShape];
    
    const progress = ap.isMorphing ? Math.round(ap.morphProgress * 100) : 100;
    hudProgress.textContent = `${progress}%`;
    hudOrbit.textContent = state.groupOrbit ? 'ON' : 'OFF';
    hudOrbit.style.color = state.groupOrbit ? '#44ff44' : '#ff4444';
    hudTheme.textContent = state.colorTheme;
    hudMorphs.textContent = state.totalMorphCount;
    
    const color = ap.material.color;
    hudColor.style.backgroundColor = `#${color.getHexString()}`;
    
    state.shapeName = shapeNames[currentShape];
}

function updateLabels() {
    players.forEach((p, i) => {
        const pos = p.mesh.position.clone();
        pos.y += 1.8;
        
        const vector = pos.project(camera);
        
        const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;
        
        const label = labelElements[i];
        const shapeName = shapeNames[p.isMorphing ? p.targetShapeIndex : p.shapeIndex];
        label.textContent = `P${i + 1} [${shapeName}]`;
        label.style.left = `${x}px`;
        label.style.top = `${y}px`;
        label.style.transform = 'translate(-50%, -50%)';
        
        if (i === activePlayerIndex) {
            label.style.color = '#ffffff';
            label.style.fontWeight = 'bold';
            label.style.border = `1px solid #${p.material.color.getHexString()}`;
        } else {
            label.style.color = '#aaaaaa';
            label.style.fontWeight = 'normal';
            label.style.border = '1px solid transparent';
        }
        
        // Hide if behind camera
        if (vector.z > 1) {
            label.style.display = 'none';
        } else {
            label.style.display = 'block';
        }
    });
}

// Check sync pulse completion
function checkSyncPulse() {
    if (state.syncPulseActive) {
        const allDone = players.every(p => !p.isMorphing);
        if (allDone) {
            state.syncPulseActive = false;
        }
    }
}

// Animation loop
function animate() {
    requestAnimationFrame(animate);
    
    state.frameCount++;
    
    // Update morphing
    players.forEach((p, i) => {
        updateMorph(i);
    });
    
    checkSyncPulse();
    
    // Group orbit
    if (state.groupOrbit) {
        state.orbitAngle += 1.0 / 60.0; // 1 rad/s at 60fps
        
        players.forEach((p, i) => {
            const baseAngle = (i / 4) * Math.PI * 2;
            const angle = baseAngle + state.orbitAngle;
            const radius = 4;
            
            p.mesh.position.x = Math.sin(angle) * radius;
            p.mesh.position.z = Math.cos(angle) * radius;
        });
    }
    
    // Bobbing animation
    players.forEach((p, i) => {
        const bobOffset = Math.sin(state.frameCount / 60 * Math.PI * 2 + i * Math.PI * 0.5) * 0.2;
        const baseY = state.groupOrbit ? 1 : initialPositions[i].y;
        p.mesh.position.y = baseY + bobOffset;
        
        // Update state positions
        state.players[i].position.x = p.mesh.position.x;
        state.players[i].position.y = p.mesh.position.y;
        state.players[i].position.z = p.mesh.position.z;
    });
    
    // Slight rotation on meshes for visual interest
    players.forEach((p, i) => {
        p.mesh.rotation.y += 0.005;
    });
    
    controls.update();
    updateHUD();
    updateLabels();
    
    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();

})();
</script>
</body>
</html>
