<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 第一人称 3D 密室逃脱</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
    }

    #game {
      width: 100%;
      height: 100%;
      display: block;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: #fff;
      z-index: 10;
    }

    #crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 0 8px #000;
    }

    #hint {
      position: absolute;
      left: 50%;
      bottom: 80px;
      transform: translateX(-50%);
      min-width: 220px;
      text-align: center;
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 14px;
    }

    #inventory, #timer {
      position: absolute;
      top: 16px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-line;
    }

    #inventory { left: 16px; width: 240px; }
    #timer { right: 16px; min-width: 130px; text-align: right; }

    #message {
      position: absolute;
      left: 50%;
      top: 18%;
      transform: translateX(-50%);
      width: min(520px, 86vw);
      padding: 16px;
      border-radius: 10px;
      background: rgba(0,0,0,0.68);
      border: 1px solid rgba(255,255,255,0.18);
      font-size: 15px;
      line-height: 1.7;
      display: none;
      pointer-events: auto;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.04), rgba(0,0,0,0.8)),
        rgba(0,0,0,0.6);
      z-index: 20;
      pointer-events: auto;
    }

    #overlay .panel {
      text-align: center;
      color: #fff;
      background: rgba(20,20,20,0.85);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 14px;
      padding: 24px 28px;
      width: min(560px, 90vw);
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    }

    #overlay button, #message button {
      margin-top: 14px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #4b8cff;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    #comboModal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
      background: rgba(0,0,0,0.55);
      pointer-events: auto;
    }

    #comboModal .box {
      width: min(360px, 92vw);
      background: #1d1d1d;
      color: #fff;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 20px;
      box-sizing: border-box;
    }

    #comboModal input {
      width: 100%;
      margin-top: 10px;
      margin-bottom: 12px;
      box-sizing: border-box;
      padding: 10px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #555;
      background: #111;
      color: #fff;
      letter-spacing: 8px;
      text-align: center;
    }

    #comboModal .actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    #comboModal button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #winBanner {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 40;
      background: rgba(0,0,0,0.62);
      color: #fff;
      pointer-events: auto;
    }

    #winBanner .panel {
      text-align: center;
      padding: 28px;
      border-radius: 12px;
      background: rgba(20,20,20,0.92);
      border: 1px solid rgba(255,255,255,0.18);
      width: min(500px, 90vw);
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="ui">
    <div id="crosshair">+</div>
    <div id="inventory">背包：空</div>
    <div id="timer">时间：00:00</div>
    <div id="hint">点击屏幕开始，WASD 移动，鼠标查看，E/点击互动</div>
    <div id="message"></div>
  </div>

  <div id="overlay">
    <div class="panel">
      <h2>第一人称 3D 密室逃脱</h2>
      <p>
        目标：找到线索，解开密码，拿到钥匙并打开房门逃出。<br>
        操作：WASD 移动，鼠标视角，E 或点击互动。<br>
        提示：手电筒可帮助你看清暗处，便签和镜子都可能藏有线索。
      </p>
      <button id="startBtn">开始游戏</button>
    </div>
  </div>

  <div id="comboModal">
    <div class="box">
      <h3 style="margin-top:0;">输入 3 位密码</h3>
      <div style="opacity:0.85;font-size:14px;">正确密码将解锁保险箱。</div>
      <input id="comboInput" maxlength="3" inputmode="numeric" placeholder="___" />
      <div class="actions">
        <button id="comboCancel">取消</button>
        <button id="comboSubmit" style="background:#4b8cff;color:#fff;">确认</button>
      </div>
    </div>
  </div>

  <div id="winBanner">
    <div class="panel">
      <h2>你成功逃脱了！</h2>
      <p id="winText"></p>
      <button onclick="location.reload()">重新开始</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    const canvas = document.getElementById('game');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x20242a);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(3, 1.65, 5.2);

    const controls = new PointerLockControls(camera, document.body);
    scene.add(controls.getObject());

    const clock = new THREE.Clock();

    const raycaster = new THREE.Raycaster();
    const center = new THREE.Vector2(0, 0);

    const hintEl = document.getElementById('hint');
    const inventoryEl = document.getElementById('inventory');
    const timerEl = document.getElementById('timer');
    const messageEl = document.getElementById('message');
    const overlayEl = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const comboModal = document.getElementById('comboModal');
    const comboInput = document.getElementById('comboInput');
    const comboSubmit = document.getElementById('comboSubmit');
    const comboCancel = document.getElementById('comboCancel');
    const winBanner = document.getElementById('winBanner');
    const winText = document.getElementById('winText');

    const ROOM = {
      width: 6,
      height: 3,
      depth: 6
    };

    const gameState = {
      objectStates: {
        door: 'locked',
        drawer: 'closed',
        safe: 'hidden',
        painting: 'normal',
        mirror: 'normal',
        flashlight: 'onGround',
        key: 'inSafe',
        note: 'unread'
      },
      inventory: [],
      puzzlesSolved: 0,
      gameWon: false,
      timer: 0,
      safeUnlockedByCode: false,
      backupClueRead: false,
      comboSolved: false,
      doorUnlockRegistered: false,
      safeOpenRegistered: false,
      noteRegistered: false,
      flashlightRegistered: false
    };

    const itemDisplayNames = {
      flashlight: '手电筒',
      key: '钥匙'
    };

    const interactables = [];
    let currentTarget = null;
    let movementEnabled = false;
    let timerRunning = true;
    const gameStartTime = performance.now();

    const move = { forward: false, backward: false, left: false, right: false };
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();

    const animationMix = [];

    function addAnim(updateFn) {
      animationMix.push(updateFn);
    }

    function showMessage(html, buttonText = '关闭') {
      messageEl.innerHTML = `
        <div>${html}</div>
        <button id="msgCloseBtn">${buttonText}</button>
      `;
      messageEl.style.display = 'block';
      movementEnabled = false;
      if (controls.isLocked) controls.unlock();
      document.getElementById('msgCloseBtn').onclick = () => {
        messageEl.style.display = 'none';
        overlayEl.style.display = 'none';
      };
    }

    function setHint(text) {
      hintEl.textContent = text;
    }

    function updateInventoryUI() {
      if (gameState.inventory.length === 0) {
        inventoryEl.textContent = '背包：空';
        return;
      }
      inventoryEl.textContent = '背包：\n' + gameState.inventory.map((id, i) => `${i + 1}. ${itemDisplayNames[id] || id}`).join('\n');
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60).toString().padStart(2, '0');
      const s = Math.floor(sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function updateTimerUI() {
      timerEl.textContent = `时间：${formatTime(gameState.timer)}`;
    }

    function hasItem(id) {
      return gameState.inventory.includes(id);
    }

    function addItem(id) {
      if (hasItem(id)) return false;
      if (gameState.inventory.length >= 5) {
        setHint('背包已满');
        return false;
      }
      gameState.inventory.push(id);
      updateInventoryUI();
      return true;
    }

    function removeItem(id) {
      const idx = gameState.inventory.indexOf(id);
      if (idx >= 0) {
        gameState.inventory.splice(idx, 1);
        updateInventoryUI();
      }
    }

    function distanceToObject(obj) {
      const pos = new THREE.Vector3();
      obj.getWorldPosition(pos);
      return camera.position.distanceTo(pos);
    }

    function registerPuzzleOnce(flagName) {
      if (!gameState[flagName]) {
        gameState[flagName] = true;
        gameState.puzzlesSolved++;
      }
    }

    const ambient = new THREE.AmbientLight(0xffffff, 0.45);
    scene.add(ambient);

    const ceilingLight = new THREE.PointLight(0xfff2cc, 1.3, 12, 2);
    ceilingLight.position.set(3, 2.7, 3);
    ceilingLight.castShadow = true;
    ceilingLight.shadow.mapSize.set(1024, 1024);
    scene.add(ceilingLight);

    const ceilingLightMesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0xfff7dd, emissive: 0xffe6aa, emissiveIntensity: 1.2 })
    );
    ceilingLightMesh.position.copy(ceilingLight.position);
    scene.add(ceilingLightMesh);

    const woodMat = new THREE.MeshStandardMaterial({ color: 0x4a3326, roughness: 0.85 });
    const wallMat = new THREE.MeshStandardMaterial({ color: 0xd9d2c3, roughness: 0.95 });
    const wallMat2 = new THREE.MeshStandardMaterial({ color: 0xc7c7c7, roughness: 0.95 });
    const ceilingMat = new THREE.MeshStandardMaterial({ color: 0xf5f5f5, roughness: 0.95 });

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(ROOM.width, ROOM.depth), woodMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.set(3, 0, 3);
    floor.receiveShadow = true;
    scene.add(floor);

    const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(ROOM.width, ROOM.depth), ceilingMat);
    ceiling.rotation.x = Math.PI / 2;
    ceiling.position.set(3, ROOM.height, 3);
    scene.add(ceiling);

    function makeWall(w, h, x, y, z, ry = 0, material = wallMat) {
      const wall = new THREE.Mesh(new THREE.PlaneGeometry(w, h), material);
      wall.position.set(x, y, z);
      wall.rotation.y = ry;
      scene.add(wall);
      return wall;
    }

    makeWall(6, 3, 3, 1.5, 0, 0, wallMat);
    makeWall(6, 3, 3, 1.5, 6, Math.PI, wallMat);
    makeWall(6, 3, 0, 1.5, 3, Math.PI / 2, wallMat2);
    makeWall(6, 3, 6, 1.5, 3, -Math.PI / 2, wallMat2);

    const roomBounds = { minX: 0.25, maxX: 5.75, minZ: 0.25, maxZ: 5.75 };

    const colliders = [];

    function addCollider(mesh, pad = 0.05) {
      mesh.updateWorldMatrix(true, true);
      const box = new THREE.Box3().setFromObject(mesh);
      box.min.x -= pad; box.min.z -= pad;
      box.max.x += pad; box.max.z += pad;
      colliders.push({ mesh, box });
    }

    function refreshCollider(mesh, pad = 0.05) {
      const c = colliders.find(c => c.mesh === mesh);
      if (!c) return;
      mesh.updateWorldMatrix(true, true);
      c.box.setFromObject(mesh);
      c.box.min.x -= pad; c.box.min.z -= pad;
      c.box.max.x += pad; c.box.max.z += pad;
    }

    const tableGroup = new THREE.Group();
    scene.add(tableGroup);
    tableGroup.position.set(1.5, 0, 1.2);

    const tableTop = new THREE.Mesh(
      new THREE.BoxGeometry(1.5, 0.12, 0.8),
      new THREE.MeshStandardMaterial({ color: 0x7b5a45, roughness: 0.8 })
    );
    tableTop.position.set(0, 0.8, 0);
    tableTop.castShadow = true;
    tableTop.receiveShadow = true;
    tableGroup.add(tableTop);

    for (const sx of [-0.62, 0.62]) {
      for (const sz of [-0.27, 0.27]) {
        const leg = new THREE.Mesh(
          new THREE.BoxGeometry(0.08, 0.8, 0.08),
          new THREE.MeshStandardMaterial({ color: 0x5e4535, roughness: 0.85 })
        );
        leg.position.set(sx, 0.4, sz);
        leg.castShadow = true;
        tableGroup.add(leg);
      }
    }

    const drawerBody = new THREE.Mesh(
      new THREE.BoxGeometry(0.7, 0.22, 0.45),
      new THREE.MeshStandardMaterial({ color: 0x6a4d3d, roughness: 0.8 })
    );
    drawerBody.position.set(0, 0.58, 0);
    drawerBody.castShadow = true;
    tableGroup.add(drawerBody);

    const drawerFront = new THREE.Mesh(
      new THREE.BoxGeometry(0.68, 0.2, 0.04),
      new THREE.MeshStandardMaterial({ color: 0x8a654b, roughness: 0.7 })
    );
    drawerFront.position.set(0, 0.58, 0.225);
    drawerFront.castShadow = true;
    tableGroup.add(drawerFront);

    const drawerHandle = new THREE.Mesh(
      new THREE.BoxGeometry(0.1, 0.04, 0.04),
      new THREE.MeshStandardMaterial({ color: 0xc9b37c, metalness: 0.4, roughness: 0.5 })
    );
    drawerHandle.position.set(0, 0.58, 0.255);
    drawerFront.add(drawerHandle);

    drawerFront.userData.type = 'drawer';
    drawerFront.userData.hint = '按 E 或点击：打开抽屉';
    interactables.push(drawerFront);

    addCollider(tableTop);
    addCollider(drawerBody);

    const note = new THREE.Mesh(
      new THREE.PlaneGeometry(0.22, 0.16),
      new THREE.MeshStandardMaterial({ color: 0xfff2a8, side: THREE.DoubleSide })
    );
    note.rotation.x = -Math.PI / 2;
    note.position.set(1.35, 0.865, 1.15);
    note.userData.type = 'note';
    note.userData.hint = '按 E 或点击：查看便签';
    interactables.push(note);
    scene.add(note);

    const flashlight = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.05, 0.28, 16),
      new THREE.MeshStandardMaterial({ color: 0x2b2b2b, metalness: 0.45, roughness: 0.4 })
    );
    flashlight.rotation.z = Math.PI / 2;
    flashlight.position.set(5.35, 0.08, 5.35);
    flashlight.castShadow = true;
    flashlight.userData.type = 'flashlight';
    flashlight.userData.hint = '按 E 或点击：拾取手电筒';
    interactables.push(flashlight);
    scene.add(flashlight);

    const flashlightSpot = new THREE.SpotLight(0xffffff, 0, 12, Math.PI / 7, 0.28, 1);
    flashlightSpot.castShadow = true;
    flashlightSpot.shadow.mapSize.set(1024, 1024);
    const flashlightTarget = new THREE.Object3D();
    scene.add(flashlightTarget);
    scene.add(flashlightSpot);
    scene.add(flashlightSpot.target);

    const doorPivot = new THREE.Group();
    doorPivot.position.set(4.35, 0, 0.05);
    scene.add(doorPivot);

    const door = new THREE.Mesh(
      new THREE.BoxGeometry(0.9, 2.1, 0.12),
      new THREE.MeshStandardMaterial({ color: 0x6a3f23, roughness: 0.8 })
    );
    door.position.set(0.45, 1.05, 0);
    door.castShadow = true;
    door.receiveShadow = true;
    doorPivot.add(door);

    const knob = new THREE.Mesh(
      new THREE.SphereGeometry(0.04, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0xd4b26a, metalness: 0.6, roughness: 0.35 })
    );
    knob.position.set(0.82, 1.05, 0.07);
    doorPivot.add(knob);

    door.userData.type = 'door';
    door.userData.hint = '按 E 或点击：检查房门';
    interactables.push(door);

    addCollider(door);

    const lockPanel = new THREE.Mesh(
      new THREE.BoxGeometry(0.22, 0.3, 0.05),
      new THREE.MeshStandardMaterial({ color: 0x444b52, metalness: 0.5, roughness: 0.35 })
    );
    lockPanel.position.set(3.7, 1.45, 0.08);
    lockPanel.userData.type = 'comboLock';
    lockPanel.userData.hint = '按 E 或点击：输入密码';
    interactables.push(lockPanel);
    scene.add(lockPanel);

    for (let i = 0; i < 3; i++) {
      const d = new THREE.Mesh(
        new THREE.BoxGeometry(0.04, 0.06, 0.01),
        new THREE.MeshStandardMaterial({ color: 0x88ddff, emissive: 0x224455, emissiveIntensity: 0.9 })
      );
      d.position.set(-0.06 + i * 0.06, 0.04, 0.03);
      lockPanel.add(d);
    }

    const paintingFrame = new THREE.Group();
    paintingFrame.position.set(5.92, 1.7, 2.1);
    paintingFrame.rotation.y = -Math.PI / 2;
    scene.add(paintingFrame);

    const paintingOuter = new THREE.Mesh(
      new THREE.BoxGeometry(1.25, 0.9, 0.06),
      new THREE.MeshStandardMaterial({ color: 0x654321, roughness: 0.8 })
    );
    paintingFrame.add(paintingOuter);

    const paintingInner = new THREE.Mesh(
      new THREE.PlaneGeometry(1.05, 0.7),
      new THREE.MeshStandardMaterial({ color: 0x335577, emissive: 0x112233, emissiveIntensity: 0.2 })
    );
    paintingInner.position.z = 0.035;
    paintingFrame.add(paintingInner);

    paintingOuter.userData.type = 'painting';
    paintingOuter.userData.hint = '按 E 或点击：移动油画';
    interactables.push(paintingOuter);

    const safeGroup = new THREE.Group();
    safeGroup.position.set(5.72, 1.45, 2.1);
    safeGroup.rotation.y = -Math.PI / 2;
    scene.add(safeGroup);

    const safeBody = new THREE.Mesh(
      new THREE.BoxGeometry(0.72, 0.55, 0.42),
      new THREE.MeshStandardMaterial({ color: 0x4a4f55, metalness: 0.55, roughness: 0.5 })
    );
    safeBody.castShadow = true;
    safeGroup.add(safeBody);

    const safeDoorPivot = new THREE.Group();
    safeDoorPivot.position.set(0.34, 0, 0.18);
    safeGroup.add(safeDoorPivot);

    const safeDoor = new THREE.Mesh(
      new THREE.BoxGeometry(0.04, 0.48, 0.36),
      new THREE.MeshStandardMaterial({ color: 0x61676e, metalness: 0.5, roughness: 0.45 })
    );
    safeDoor.position.set(-0.02, 0, 0);
    safeDoor.castShadow = true;
    safeDoorPivot.add(safeDoor);

    const safeWheel = new THREE.Mesh(
      new THREE.TorusGeometry(0.06, 0.012, 8, 18),
      new THREE.MeshStandardMaterial({ color: 0xd8d8d8, metalness: 0.7, roughness: 0.3 })
    );
    safeWheel.rotation.y = Math.PI / 2;
    safeWheel.position.set(0.03, 0, 0);
    safeDoor.add(safeWheel);

    safeBody.visible = false;
    safeDoor.visible = false;

    safeBody.userData.type = 'safe';
    safeBody.userData.hint = '按 E 或点击：打开保险箱';
    interactables.push(safeBody);

    const key = new THREE.Group();
    const keyRing = new THREE.Mesh(
      new THREE.TorusGeometry(0.035, 0.008, 8, 16),
      new THREE.MeshStandardMaterial({ color: 0xd4b26a, metalness: 0.8, roughness: 0.25 })
    );
    const keyStem = new THREE.Mesh(
      new THREE.BoxGeometry(0.08, 0.012, 0.012),
      new THREE.MeshStandardMaterial({ color: 0xd4b26a, metalness: 0.8, roughness: 0.25 })
    );
    keyStem.position.x = 0.065;
    const keyTooth = new THREE.Mesh(
      new THREE.BoxGeometry(0.02, 0.025, 0.012),
      new THREE.MeshStandardMaterial({ color: 0xd4b26a, metalness: 0.8, roughness: 0.25 })
    );
    keyTooth.position.set(0.1, -0.018, 0);
    key.add(keyRing, keyStem, keyTooth);
    key.position.set(5.74, 1.34, 2.1);
    key.rotation.y = -Math.PI / 2;
    key.visible = false;
    key.userData.type = 'key';
    key.userData.hint = '按 E 或点击：拾取钥匙';
    interactables.push(key);
    scene.add(key);

    const mirror = new THREE.Mesh(
      new THREE.PlaneGeometry(1.1, 0.8),
      new THREE.MeshStandardMaterial({
        color: 0xbfd6e6,
        metalness: 0.9,
        roughness: 0.08,
        envMapIntensity: 1
      })
    );
    mirror.position.set(0.08, 1.65, 4.4);
    mirror.rotation.y = Math.PI / 2;
    mirror.userData.type = 'mirror';
    mirror.userData.hint = '按 E 或点击：查看镜子';
    interactables.push(mirror);
    scene.add(mirror);

    const mirrorFrame = new THREE.Mesh(
      new THREE.BoxGeometry(1.22, 0.92, 0.05),
      new THREE.MeshStandardMaterial({ color: 0x7b6342, roughness: 0.8 })
    );
    mirrorFrame.position.copy(mirror.position);
    mirrorFrame.rotation.copy(mirror.rotation);
    scene.add(mirrorFrame);

    const hiddenText = document.createElement('canvas');
    hiddenText.width = 512;
    hiddenText.height = 128;
    const hctx = hiddenText.getContext('2d');
    hctx.fillStyle = '#d7ecff';
    hctx.fillRect(0, 0, 512, 128);
    hctx.fillStyle = '#204060';
    hctx.font = 'bold 44px sans-serif';
    hctx.textAlign = 'center';
    hctx.fillText('镜中线索：1 + 2 = 3', 256, 76);
    const hiddenTex = new THREE.CanvasTexture(hiddenText);

    const mirrorHintPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(0.85, 0.22),
      new THREE.MeshBasicMaterial({ map: hiddenTex, transparent: true, opacity: 0 })
    );
    mirrorHintPlane.position.set(0.13, 1.2, 4.4);
    mirrorHintPlane.rotation.y = Math.PI / 2;
    scene.add(mirrorHintPlane);

    function animateValue(getter, setter, target, speed = 2.2, onDone) {
      addAnim((dt) => {
        const current = getter();
        const next = THREE.MathUtils.lerp(current, target, Math.min(1, dt * speed));
        setter(next);
        if (Math.abs(next - target) < 0.002) {
          setter(target);
          if (onDone) onDone();
          return true;
        }
        return false;
      });
    }

    function interactWith(obj) {
      if (!obj) return;
      const type = obj.userData.type;
      if (distanceToObject(obj) > 2.0 && type !== 'comboLock') {
        setHint('距离太远，需在 2 米内互动');
        return;
      }

      if (type === 'note') {
        gameState.objectStates.note = 'read';
        registerPuzzleOnce('noteRegistered');
        showMessage(`
          <b>便签内容：</b><br>
          “密码是一个三位数。<br>
          第一位是 1。<br>
          第二位是第一位的两倍。<br>
          第三位是第一位 + 第二位。”<br><br>
          也就是：1、2、3 → 密码为 <b>123</b>。
        `);
        return;
      }

      if (type === 'drawer') {
        if (gameState.objectStates.drawer === 'closed') {
          gameState.objectStates.drawer = 'open';
          setHint('抽屉打开了，里面有一张备用提示');
          animateValue(
            () => drawerFront.position.z,
            (v) => { drawerFront.position.z = v; },
            0.45,
            3
          );
          setTimeout(() => {
            if (!gameState.backupClueRead) {
              gameState.backupClueRead = true;
              showMessage(`
                <b>抽屉里的备用提示：</b><br>
                “三位密码从小到大排列，且满足：第三位 = 前两位之和。”<br>
                也许能和桌上的便签互相印证。
              `);
            }
          }, 350);
        } else {
          gameState.objectStates.drawer = 'closed';
          animateValue(
            () => drawerFront.position.z,
            (v) => { drawerFront.position.z = v; },
            0.225,
            3
          );
          setHint('抽屉已关闭');
        }
        return;
      }

      if (type === 'flashlight') {
        if (gameState.objectStates.flashlight === 'onGround') {
          if (addItem('flashlight')) {
            flashlight.visible = false;
            gameState.objectStates.flashlight = 'inInventory';
            flashlightSpot.intensity = 3.2;
            registerPuzzleOnce('flashlightRegistered');
            showMessage('你拾取了 <b>手电筒</b>。现在会有一束跟随视角的灯光，暗处更容易发现线索。');
          }
        }
        return;
      }

      if (type === 'painting') {
        if (gameState.objectStates.painting === 'normal') {
          gameState.objectStates.painting = 'moved';
          gameState.objectStates.safe = 'revealed';
          safeBody.visible = true;
          safeDoor.visible = true;
          animateValue(
            () => paintingFrame.position.y,
            (v) => { paintingFrame.position.y = v; },
            2.4,
            2.6
          );
          showMessage('油画被移开了，后面露出了一个 <b>保险箱</b>。');
        } else {
          setHint('油画已经移开，保险箱露出来了');
        }
        return;
      }

      if (type === 'comboLock') {
        comboModal.style.display = 'flex';
        movementEnabled = false;
        if (controls.isLocked) controls.unlock();
        comboInput.value = '';
        comboInput.focus();
        return;
      }

      if (type === 'safe') {
        if (gameState.objectStates.safe === 'hidden') {
          setHint('你还没找到保险箱');
          return;
        }
        if (!gameState.safeUnlockedByCode) {
          showMessage('保险箱被锁住了，需要先在旁边的 <b>密码锁</b> 输入正确密码。');
          return;
        }
        if (gameState.objectStates.safe !== 'open') {
          gameState.objectStates.safe = 'open';
          registerPuzzleOnce('safeOpenRegistered');
          animateValue(
            () => safeDoorPivot.rotation.y,
            (v) => { safeDoorPivot.rotation.y = v; },
            -Math.PI / 1.8,
            2.6,
            () => {
              key.visible = true;
              gameState.objectStates.key = 'inSafe';
            }
          );
          showMessage('保险箱打开了，里面有一把 <b>钥匙</b>！');
        } else {
          setHint('保险箱已经打开');
        }
        return;
      }

      if (type === 'key') {
        if (gameState.objectStates.key === 'inSafe') {
          if (addItem('key')) {
            key.visible = false;
            gameState.objectStates.key = 'inInventory';
            showMessage('你拾取了 <b>钥匙</b>。也许可以用来打开房门。');
          }
        }
        return;
      }

      if (type === 'door') {
        if (gameState.objectStates.door === 'locked') {
          if (hasItem('key')) {
            removeItem('key');
            gameState.objectStates.key = 'used';
            gameState.objectStates.door = 'unlocked';
            registerPuzzleOnce('doorUnlockRegistered');
            showMessage('你使用钥匙解锁了房门。再互动一次即可打开。');
          } else {
            showMessage('房门被锁住了，需要一把 <b>钥匙</b>。');
          }
          return;
        }
        if (gameState.objectStates.door === 'unlocked') {
          gameState.objectStates.door = 'open';
          animateValue(
            () => doorPivot.rotation.y,
            (v) => { doorPivot.rotation.y = v; refreshCollider(door); },
            -Math.PI / 2.2,
            1.8,
            () => {
              setHint('门开了，向前走即可逃出');
            }
          );
          return;
        }
        if (gameState.objectStates.door === 'open') {
          if (!gameState.gameWon) {
            gameState.gameWon = true;
            timerRunning = false;
            if (controls.isLocked) controls.unlock();
            winText.textContent = `逃脱用时：${formatTime(gameState.timer)}，已解开谜题：${gameState.puzzlesSolved}`;
            winBanner.style.display = 'flex';
          }
        }
        return;
      }

      if (type === 'mirror') {
        const lookingAtMirror = currentTarget === mirror;
        const hasFlashlight = hasItem('flashlight');
        if (hasFlashlight && lookingAtMirror) {
          showMessage(`
            <b>镜子里浮现出隐约反字：</b><br>
            “1 + 2 = 3”<br><br>
            这与便签的计算规则相互印证。
          `);
        } else {
          showMessage('镜面很亮。如果有更强的光照，也许能看出隐藏痕迹。');
        }
      }
    }

    comboSubmit.onclick = () => {
      const code = comboInput.value.trim();
      if (code === '123') {
        gameState.safeUnlockedByCode = true;
        gameState.comboSolved = true;
        if (gameState.objectStates.safe === 'revealed') {
          gameState.objectStates.safe = 'locked';
        }
        registerPuzzleOnce('comboSolved');
        comboModal.style.display = 'none';
        showMessage('密码正确。你听到保险箱发出一声清脆的 <b>解锁声</b>。');
      } else {
        comboModal.style.display = 'none';
        showMessage('密码错误。看来还需要更多线索。');
      }
    };

    comboCancel.onclick = () => {
      comboModal.style.display = 'none';
      overlayEl.style.display = 'none';
    };

    startBtn.onclick = () => {
      overlayEl.style.display = 'none';
      controls.lock();
    };

    controls.addEventListener('lock', () => {
      movementEnabled = true;
      if (messageEl.style.display === 'block') messageEl.style.display = 'none';
      if (comboModal.style.display === 'flex') comboModal.style.display = 'none';
    });

    controls.addEventListener('unlock', () => {
      movementEnabled = false;
    });

    document.addEventListener('keydown', (e) => {
      switch (e.code) {
        case 'KeyW': move.forward = true; break;
        case 'KeyS': move.backward = true; break;
        case 'KeyA': move.left = true; break;
        case 'KeyD': move.right = true; break;
        case 'KeyE':
          if (currentTarget) interactWith(currentTarget);
          break;
      }
    });

    document.addEventListener('keyup', (e) => {
      switch (e.code) {
        case 'KeyW': move.forward = false; break;
        case 'KeyS': move.backward = false; break;
        case 'KeyA': move.left = false; break;
        case 'KeyD': move.right = false; break;
      }
    });

    document.addEventListener('click', () => {
      if (!controls.isLocked && overlayEl.style.display === 'none' && comboModal.style.display === 'none' && !gameState.gameWon) {
        controls.lock();
        return;
      }
      if (controls.isLocked && currentTarget) {
        interactWith(currentTarget);
      }
    });

    function tryMove(delta) {
      if (!movementEnabled || gameState.gameWon) return;

      velocity.x -= velocity.x * 10 * delta;
      velocity.z -= velocity.z * 10 * delta;

      direction.z = Number(move.forward) - Number(move.backward);
      direction.x = Number(move.right) - Number(move.left);
      direction.normalize();

      const speed = 2.8;
      if (move.forward || move.backward) velocity.z -= direction.z * speed * delta;
      if (move.left || move.right) velocity.x -= direction.x * speed * delta;

      const prev = controls.getObject().position.clone();
      controls.moveRight(-velocity.x);
      controls.moveForward(-velocity.z);

      const p = controls.getObject().position;
      p.y = 1.65;
      p.x = THREE.MathUtils.clamp(p.x, roomBounds.minX, roomBounds.maxX);
      p.z = THREE.MathUtils.clamp(p.z, roomBounds.minZ, roomBounds.maxZ);

      const playerBox = new THREE.Box3(
        new THREE.Vector3(p.x - 0.18, 0, p.z - 0.18),
        new THREE.Vector3(p.x + 0.18, 1.8, p.z + 0.18)
      );

      for (const c of colliders) {
        if (gameState.objectStates.door === 'open' && c.mesh === door) continue;
        if (playerBox.intersectsBox(c.box)) {
          controls.getObject().position.copy(prev);
          break;
        }
      }

      if (gameState.objectStates.door === 'open' && p.z < -0.2 && !gameState.gameWon) {
        gameState.gameWon = true;
        timerRunning = false;
        if (controls.isLocked) controls.unlock();
        winText.textContent = `逃脱用时：${formatTime(gameState.timer)}，已解开谜题：${gameState.puzzlesSolved}`;
        winBanner.style.display = 'flex';
      }
    }

    function updateRaycast() {
      raycaster.setFromCamera(center, camera);
      const hits = raycaster.intersectObjects(interactables, true);

      currentTarget = null;
      for (const hit of hits) {
        let obj = hit.object;
        while (obj && !obj.userData.type) obj = obj.parent;
        if (!obj) continue;

        const type = obj.userData.type;
        const dist = distanceToObject(obj);

        if (type === 'comboLock' || dist <= 2) {
          currentTarget = obj;
          break;
        }
      }

      if (!currentTarget) {
        setHint('WASD 移动，E/点击互动');
        return;
      }

      const type = currentTarget.userData.type;
      if (type === 'door') {
        if (gameState.objectStates.door === 'locked') {
          setHint(hasItem('key') ? '按 E 或点击：使用钥匙解锁房门' : '按 E 或点击：房门已锁');
        } else if (gameState.objectStates.door === 'unlocked') {
          setHint('按 E 或点击：打开房门');
        } else {
          setHint('房门已开，向前走可逃出');
        }
        return;
      }

      if (type === 'safe') {
        if (!gameState.safeUnlockedByCode) setHint('按 E 或点击：保险箱已锁');
        else if (gameState.objectStates.safe !== 'open') setHint('按 E 或点击：打开保险箱');
        else setHint('保险箱已经打开');
        return;
      }

      if (type === 'mirror') {
        setHint(hasItem('flashlight') ? '按 E 或点击：查看镜中隐藏线索' : '按 E 或点击：查看镜子');
        return;
      }

      setHint(currentTarget.userData.hint || '按 E 交互');
    }

    function updateFlashlight() {
      if (!hasItem('flashlight')) return;
      const camPos = new THREE.Vector3();
      const camDir = new THREE.Vector3();
      camera.getWorldPosition(camPos);
      camera.getWorldDirection(camDir);

      flashlightSpot.position.copy(camPos).add(new THREE.Vector3(0, -0.05, 0));
      flashlightTarget.position.copy(camPos).add(camDir.multiplyScalar(3));
      flashlightSpot.target = flashlightTarget;

      const toMirror = new THREE.Vector3().subVectors(mirror.position, camPos).normalize();
      const facing = camera.getWorldDirection(new THREE.Vector3()).dot(toMirror);
      const dist = camPos.distanceTo(mirror.position);
      const reveal = facing > 0.92 && dist < 2.5 ? 1 : 0;
      mirrorHintPlane.material.opacity = THREE.MathUtils.lerp(mirrorHintPlane.material.opacity, reveal * 0.88, 0.08);
    }

    function updateStateExpose() {
      window.__3D_STATE__ = {
        inventory: [...gameState.inventory].map(id => itemDisplayNames[id] || id),
        puzzlesSolved: gameState.puzzlesSolved,
        objectStates: { ...gameState.objectStates },
        timer: gameState.timer,
        gameWon: gameState.gameWon
      };
    }

    function resize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', resize);

    updateInventoryUI();
    updateTimerUI();
    updateStateExpose();

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.05);

      if (timerRunning) {
        gameState.timer = Math.floor((performance.now() - gameStartTime) / 1000);
        updateTimerUI();
      }

      tryMove(delta);
      updateRaycast();
      updateFlashlight();

      for (let i = animationMix.length - 1; i >= 0; i--) {
        const done = animationMix[i](delta);
        if (done) animationMix.splice(i, 1);
      }

      updateStateExpose();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
