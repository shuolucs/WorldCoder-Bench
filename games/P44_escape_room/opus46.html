<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密室逃脱 - Escape Room</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#blocker {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); display: flex; align-items: center;
  justify-content: center; z-index: 100; flex-direction: column;
}
#blocker h1 { color: #e0c080; font-size: 48px; margin-bottom: 20px; text-shadow: 0 0 20px rgba(224,192,128,0.5); }
#blocker p { color: #ccc; font-size: 18px; margin-bottom: 10px; }
#blocker .start-btn {
  margin-top: 30px; padding: 15px 40px; font-size: 20px;
  background: #8b6914; color: #fff; border: 2px solid #c9a84c;
  cursor: pointer; border-radius: 5px; transition: all 0.3s;
}
#blocker .start-btn:hover { background: #c9a84c; color: #000; }

#crosshair {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 20px; height: 20px; z-index: 10; pointer-events: none;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute; background: rgba(255,255,255,0.7);
}
#crosshair::before { width: 2px; height: 20px; left: 9px; top: 0; }
#crosshair::after { width: 20px; height: 2px; top: 9px; left: 0; }

#hud {
  position: fixed; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 10;
}

#timer {
  position: fixed; top: 15px; right: 20px;
  color: #e0c080; font-size: 28px; font-weight: bold;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
  background: rgba(0,0,0,0.5); padding: 8px 18px; border-radius: 8px;
  border: 1px solid rgba(224,192,128,0.3);
}

#inventory {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; pointer-events: none;
}
.inv-slot {
  width: 64px; height: 64px; background: rgba(0,0,0,0.6);
  border: 2px solid rgba(224,192,128,0.4); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; color: #e0c080; font-size: 10px;
  text-align: center; padding: 4px;
}
.inv-slot.filled { border-color: #e0c080; background: rgba(139,105,20,0.3); }
.inv-slot .icon { font-size: 24px; margin-bottom: 2px; }

#hint {
  position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
  color: #fff; font-size: 18px; background: rgba(0,0,0,0.7);
  padding: 10px 24px; border-radius: 8px; display: none;
  border: 1px solid rgba(255,255,255,0.2);
  text-shadow: 0 0 5px rgba(0,0,0,0.5);
}

#message {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  color: #fff; font-size: 22px; background: rgba(0,0,0,0.85);
  padding: 25px 35px; border-radius: 12px; display: none; z-index: 50;
  border: 1px solid rgba(224,192,128,0.5); max-width: 500px; text-align: center;
  line-height: 1.6;
}
#message .close-btn {
  margin-top: 15px; padding: 8px 25px; background: #8b6914;
  color: #fff; border: 1px solid #c9a84c; cursor: pointer;
  border-radius: 4px; font-size: 16px; pointer-events: all;
}

#comboModal {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(20,20,20,0.95); padding: 30px; border-radius: 12px;
  display: none; z-index: 60; border: 2px solid #c9a84c;
  text-align: center; pointer-events: all;
}
#comboModal h3 { color: #e0c080; margin-bottom: 20px; font-size: 22px; }
#comboModal .digits { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
#comboModal .digit-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
#comboModal .digit-btn {
  width: 50px; height: 30px; background: #333; color: #e0c080;
  border: 1px solid #666; cursor: pointer; font-size: 18px; border-radius: 4px;
}
#comboModal .digit-btn:hover { background: #555; }
#comboModal .digit-display {
  width: 50px; height: 60px; background: #111; color: #0f0;
  font-size: 36px; display: flex; align-items: center; justify-content: center;
  border: 2px solid #444; border-radius: 4px; font-family: monospace;
}
#comboModal .action-btn {
  padding: 10px 30px; margin: 5px; font-size: 16px; cursor: pointer;
  border-radius: 4px; border: 1px solid #666;
}
#comboModal .submit-btn { background: #2a7a2a; color: #fff; }
#comboModal .cancel-btn { background: #7a2a2a; color: #fff; }

#winScreen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.9); display: none; z-index: 200;
  flex-direction: column; align-items: center; justify-content: center;
}
#winScreen h1 { color: #ffd700; font-size: 64px; margin-bottom: 20px; text-shadow: 0 0 30px rgba(255,215,0,0.5); }
#winScreen p { color: #ccc; font-size: 24px; }
#winScreen .time { color: #e0c080; font-size: 36px; margin-top: 15px; }

#controls-info {
  position: fixed; top: 15px; left: 20px; color: rgba(255,255,255,0.5);
  font-size: 12px; line-height: 1.8; pointer-events: none;
}
</style>
</head>
<body>

<div id="blocker">
  <h1>🔒 密室逃脱</h1>
  <p>你被困在一间密室中，找到线索、解开谜题、逃出生天！</p>
  <p style="color:#999; font-size:14px;">WASD 移动 | 鼠标控制视角 | E 键/点击 交互</p>
  <button class="start-btn" id="startBtn">开始游戏</button>
</div>

<div id="crosshair"></div>

<div id="hud">
  <div id="timer">00:00</div>
  <div id="controls-info">
    WASD - 移动<br>
    鼠标 - 视角<br>
    E / 左键 - 交互<br>
    ESC - 暂停
  </div>
</div>

<div id="inventory"></div>
<div id="hint"></div>

<div id="message">
  <div id="messageText"></div>
  <button class="close-btn" id="closeMsg">关闭</button>
</div>

<div id="comboModal">
  <h3>🔐 密码锁</h3>
  <div class="digits">
    <div class="digit-group">
      <button class="digit-btn" data-digit="0" data-dir="up">▲</button>
      <div class="digit-display" id="d0">0</div>
      <button class="digit-btn" data-digit="0" data-dir="down">▼</button>
    </div>
    <div class="digit-group">
      <button class="digit-btn" data-digit="1" data-dir="up">▲</button>
      <div class="digit-display" id="d1">0</div>
      <button class="digit-btn" data-digit="1" data-dir="down">▼</button>
    </div>
    <div class="digit-group">
      <button class="digit-btn" data-digit="2" data-dir="up">▲</button>
      <div class="digit-display" id="d2">0</div>
      <button class="digit-btn" data-digit="2" data-dir="down">▼</button>
    </div>
  </div>
  <button class="action-btn submit-btn" id="comboSubmit">确认</button>
  <button class="action-btn cancel-btn" id="comboCancel">取消</button>
</div>

<div id="winScreen">
  <h1>🎉 逃脱成功！</h1>
  <p>恭喜你成功逃出密室！</p>
  <div class="time" id="winTime"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// ============ GAME STATE ============
const CORRECT_CODE = [3, 7, 9];
const comboDigits = [0, 0, 0];

const objectStates = {
  door: 'locked',
  drawer: 'closed',
  safe: 'hidden',
  painting: 'normal',
  flashlight: 'onGround',
  key: 'inSafe',
  note: 'unread',
  mirror: 'normal',
  comboLock: 'locked'
};

const inventory = [];
let puzzlesSolved = 0;
let gameWon = false;
let timerStart = 0;
let timerElapsed = 0;
let gameStarted = false;

// Animation queues
const animations = [];

// ============ THREE.JS SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);
scene.fog = new THREE.Fog(0x111111, 8, 15);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 50);
camera.position.set(3, 1.6, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new PointerLockControls(camera, document.body);

// Raycaster
const raycaster = new THREE.Raycaster();
raycaster.far = 2.5;
const interactables = [];

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0x404040, 0.4);
scene.add(ambientLight);

const ceilingLight = new THREE.PointLight(0xffe4b5, 1.5, 12, 1);
ceilingLight.position.set(3, 2.85, 3);
ceilingLight.castShadow = true;
ceilingLight.shadow.mapSize.set(1024, 1024);
scene.add(ceilingLight);

// Light bulb visual
const bulbGeo = new THREE.SphereGeometry(0.08, 16, 16);
const bulbMat = new THREE.MeshBasicMaterial({ color: 0xffffcc });
const bulb = new THREE.Mesh(bulbGeo, bulbMat);
bulb.position.copy(ceilingLight.position);
scene.add(bulb);

// Light fixture
const fixtureGeo = new THREE.CylinderGeometry(0.15, 0.08, 0.05, 16);
const fixtureMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8 });
const fixture = new THREE.Mesh(fixtureGeo, fixtureMat);
fixture.position.set(3, 2.95, 3);
scene.add(fixture);

let flashlightSpot = null;

// ============ MATERIALS ============
const floorMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f, roughness: 0.8 });
const wallMat = new THREE.MeshStandardMaterial({ color: 0xd2c6a5, roughness: 0.9 });
const ceilingMat = new THREE.MeshStandardMaterial({ color: 0xf5f5f0, roughness: 0.95 });
const doorMat = new THREE.MeshStandardMaterial({ color: 0x5c3a1e, roughness: 0.7 });
const woodMat = new THREE.MeshStandardMaterial({ color: 0x6b4226, roughness: 0.7 });
const metalMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9, roughness: 0.3 });
const goldMat = new THREE.MeshStandardMaterial({ color: 0xdaa520, metalness: 0.8, roughness: 0.3 });

// ============ ROOM CONSTRUCTION ============
// Floor
const floor = new THREE.Mesh(new THREE.PlaneGeometry(6, 6), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.set(3, 0, 3);
floor.receiveShadow = true;
scene.add(floor);

// Add floor planks pattern
for (let i = 0; i < 6; i++) {
  const plankLine = new THREE.Mesh(
    new THREE.PlaneGeometry(6, 0.02),
    new THREE.MeshStandardMaterial({ color: 0x2a1f14 })
  );
  plankLine.rotation.x = -Math.PI / 2;
  plankLine.position.set(3, 0.001, i + 0.5);
  scene.add(plankLine);
}

// Ceiling
const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(6, 6), ceilingMat);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.set(3, 3, 3);
scene.add(ceiling);

// Walls
function createWall(w, h, pos, rotY = 0) {
  const wall = new THREE.Mesh(new THREE.PlaneGeometry(w, h), wallMat);
  wall.position.copy(pos);
  wall.rotation.y = rotY;
  wall.receiveShadow = true;
  scene.add(wall);
  return wall;
}

// Back wall (z=0)
createWall(6, 3, new THREE.Vector3(3, 1.5, 0), 0);
// Front wall (z=6)
createWall(6, 3, new THREE.Vector3(3, 1.5, 6), Math.PI);
// Left wall (x=0)
createWall(6, 3, new THREE.Vector3(0, 1.5, 3), Math.PI / 2);
// Right wall (x=6)
createWall(6, 3, new THREE.Vector3(6, 1.5, 3), -Math.PI / 2);

// Baseboard trim
function createBaseboard(length, pos, rotY) {
  const bb = new THREE.Mesh(
    new THREE.BoxGeometry(length, 0.1, 0.02),
    new THREE.MeshStandardMaterial({ color: 0x4a3520 })
  );
  bb.position.copy(pos);
  bb.rotation.y = rotY;
  scene.add(bb);
}
createBaseboard(6, new THREE.Vector3(3, 0.05, 0.01), 0);
createBaseboard(6, new THREE.Vector3(3, 0.05, 5.99), 0);
createBaseboard(6, new THREE.Vector3(0.01, 0.05, 3), Math.PI / 2);
createBaseboard(6, new THREE.Vector3(5.99, 0.05, 3), Math.PI / 2);

// ============ DOOR (on back wall z=0, centered at x=4) ============
const doorGroup = new THREE.Group();
doorGroup.position.set(4.5, 0, 0.05);

// Door frame
const frameMat = new THREE.MeshStandardMaterial({ color: 0x4a3520, roughness: 0.6 });
const frameTop = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.08, 0.1), frameMat);
frameTop.position.set(0, 2.14, 0);
doorGroup.add(frameTop);
const frameL = new THREE.Mesh(new THREE.BoxGeometry(0.08, 2.1, 0.1), frameMat);
frameL.position.set(-0.51, 1.05, 0);
doorGroup.add(frameL);
const frameR = new THREE.Mesh(new THREE.BoxGeometry(0.08, 2.1, 0.1), frameMat);
frameR.position.set(0.51, 1.05, 0);
doorGroup.add(frameR);

// Door pivot
const doorPivot = new THREE.Group();
doorPivot.position.set(-0.45, 0, 0);

const doorMesh = new THREE.Mesh(new THREE.BoxGeometry(0.9, 2.1, 0.06), doorMat);
doorMesh.position.set(0.45, 1.05, 0);
doorMesh.castShadow = true;
doorMesh.userData = { type: 'door' };
interactables.push(doorMesh);

// Door handle
const handleGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.12, 8);
const handle = new THREE.Mesh(handleGeo, metalMat);
handle.rotation.x = Math.PI / 2;
handle.position.set(0.75, 1.0, 0.05);
doorPivot.add(handle);

// Door lock indicator
const lockIndicator = new THREE.Mesh(
  new THREE.BoxGeometry(0.06, 0.06, 0.02),
  new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.5 })
);
lockIndicator.position.set(0.75, 1.1, 0.05);
doorPivot.add(lockIndicator);

// Keyhole
const keyholeGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.07, 8);
const keyhole = new THREE.Mesh(keyholeGeo, new THREE.MeshStandardMaterial({ color: 0x222222 }));
keyhole.rotation.x = Math.PI / 2;
keyhole.position.set(0.75, 0.95, 0.04);
doorPivot.add(keyhole);

doorPivot.add(doorMesh);
doorGroup.add(doorPivot);
scene.add(doorGroup);

// ============ COMBO LOCK (on wall near door) ============
const comboLockGroup = new THREE.Group();
comboLockGroup.position.set(3.5, 1.4, 0.03);

const comboPanel = new THREE.Mesh(
  new THREE.BoxGeometry(0.3, 0.25, 0.04),
  new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.7, roughness: 0.4 })
);
comboPanel.userData = { type: 'comboLock' };
interactables.push(comboPanel);
comboLockGroup.add(comboPanel);

// Combo display slots
for (let i = 0; i < 3; i++) {
  const slot = new THREE.Mesh(
    new THREE.BoxGeometry(0.06, 0.08, 0.01),
    new THREE.MeshStandardMaterial({ color: 0x111111 })
  );
  slot.position.set(-0.08 + i * 0.08, 0.02, 0.025);
  comboLockGroup.add(slot);
}

// Small indicator light on combo lock
const comboLight = new THREE.Mesh(
  new THREE.SphereGeometry(0.015, 8, 8),
  new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.5 })
);
comboLight.position.set(0, -0.08, 0.025);
comboLockGroup.add(comboLight);

scene.add(comboLockGroup);

// ============ DRAWER CABINET (right side of room) ============
const drawerGroup = new THREE.Group();
drawerGroup.position.set(5.2, 0, 4);

// Table top
const tableTop = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.04, 0.5), woodMat);
tableTop.position.set(0, 0.8, 0);
tableTop.castShadow = true;
drawerGroup.add(tableTop);

// Legs
for (let dx of [-0.35, 0.35]) {
  for (let dz of [-0.2, 0.2]) {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.78, 0.05), woodMat);
    leg.position.set(dx, 0.39, dz);
    leg.castShadow = true;
    drawerGroup.add(leg);
  }
}

// Drawer body
const drawerBody = new THREE.Mesh(
  new THREE.BoxGeometry(0.7, 0.2, 0.4),
  new THREE.MeshStandardMaterial({ color: 0x5a3a1a, roughness: 0.8 })
);
drawerBody.position.set(0, 0.68, 0);
drawerGroup.add(drawerBody);

// Drawer front (interactive, slides out)
const drawerFront = new THREE.Mesh(
  new THREE.BoxGeometry(0.72, 0.18, 0.05),
  new THREE.MeshStandardMaterial({ color: 0x6b4226, roughness: 0.6 })
);
drawerFront.position.set(0, 0.68, 0.22);
drawerFront.castShadow = true;
drawerFront.userData = { type: 'drawer', originalZ: 0.22 };
interactables.push(drawerFront);

// Drawer handle
const drawerHandle = new THREE.Mesh(
  new THREE.BoxGeometry(0.15, 0.03, 0.03),
  metalMat
);
drawerHandle.position.set(0, 0.68, 0.26);
drawerGroup.add(drawerHandle);

drawerGroup.add(drawerFront);
scene.add(drawerGroup);

// ============ NOTE (on the table) ============
const noteGeo = new THREE.PlaneGeometry(0.15, 0.1);
const noteMat = new THREE.MeshStandardMaterial({
  color: 0xfffff0, side: THREE.DoubleSide, roughness: 1
});
const noteMesh = new THREE.Mesh(noteGeo, noteMat);
noteMesh.position.set(5.1, 0.83, 3.9);
noteMesh.rotation.x = -Math.PI / 2;
noteMesh.rotation.z = 0.2;
noteMesh.userData = { type: 'note' };
noteMesh.castShadow = true;
interactables.push(noteMesh);
scene.add(noteMesh);

// Note text hint (small marks on note)
const noteLines = new THREE.Group();
for (let i = 0; i < 3; i++) {
  const line = new THREE.Mesh(
    new THREE.PlaneGeometry(0.1, 0.008),
    new THREE.MeshStandardMaterial({ color: 0x333366, side: THREE.DoubleSide })
  );
  line.position.set(5.1, 0.832, 3.92 - i * 0.02);
  line.rotation.x = -Math.PI / 2;
  line.rotation.z = 0.2;
  noteLines.add(line);
}
scene.add(noteLines);

// ============ PAINTING (left wall) ============
const paintingGroup = new THREE.Group();
paintingGroup.position.set(0.05, 1.6, 2);

// Frame
const frameGeo = new THREE.BoxGeometry(0.06, 0.9, 0.7);
const paintFrame = new THREE.Mesh(frameGeo, new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.5 }));
paintingGroup.add(paintFrame);

// Canvas
const canvasGeo = new THREE.PlaneGeometry(0.8, 0.6);
const canvasMat = new THREE.MeshStandardMaterial({
  color: 0x2a4a3a, roughness: 0.9, side: THREE.DoubleSide
});
const canvasMesh = new THREE.Mesh(canvasGeo, canvasMat);
canvasMesh.rotation.y = Math.PI / 2;
canvasMesh.position.set(0.035, 0, 0);
paintingGroup.add(canvasMesh);

// Painting decorations (abstract art)
const artColors = [0x8B0000, 0xDAA520, 0x2F4F4F, 0x4682B4];
for (let i = 0; i < 6; i++) {
  const artPiece = new THREE.Mesh(
    new THREE.PlaneGeometry(0.1 + Math.random() * 0.15, 0.08 + Math.random() * 0.12),
    new THREE.MeshStandardMaterial({
      color: artColors[i % artColors.length],
      side: THREE.DoubleSide, roughness: 0.9
    })
  );
  artPiece.rotation.y = Math.PI / 2;
  artPiece.position.set(0.04, -0.15 + Math.random() * 0.3, -0.2 + Math.random() * 0.4);
  paintingGroup.add(artPiece);
}

paintingGroup.userData = { type: 'painting', originalX: 0.05 };
interactables.push(paintFrame);
paintFrame.userData = { type: 'painting' };

scene.add(paintingGroup);

// ============ SAFE (behind painting) ============
const safeGroup = new THREE.Group();
safeGroup.position.set(0.04, 1.6, 2);

const safeBody = new THREE.Mesh(
  new THREE.BoxGeometry(0.04, 0.5, 0.5),
  new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.8, roughness: 0.4 })
);
safeGroup.add(safeBody);

// Safe door
const safeDoor = new THREE.Mesh(
  new THREE.BoxGeometry(0.02, 0.45, 0.45),
  new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.9, roughness: 0.3 })
);
safeDoor.position.set(0.03, 0, 0);
safeDoor.userData = { type: 'safe' };
interactables.push(safeDoor);
safeGroup.add(safeDoor);

// Safe handle
const safeHandle = new THREE.Mesh(
  new THREE.TorusGeometry(0.06, 0.01, 8, 16),
  goldMat
);
safeHandle.rotation.y = Math.PI / 2;
safeHandle.position.set(0.05, 0, 0);
safeGroup.add(safeHandle);

scene.add(safeGroup);

// ============ KEY (inside safe, initially invisible) ============
const keyGroup = new THREE.Group();
const keyHead = new THREE.Mesh(
  new THREE.TorusGeometry(0.03, 0.008, 8, 16),
  goldMat
);
const keyShaft = new THREE.Mesh(
  new THREE.BoxGeometry(0.06, 0.01, 0.008),
  goldMat
);
keyShaft.position.set(0.04, 0, 0);
const keyTooth1 = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.015, 0.008), goldMat);
keyTooth1.position.set(0.06, -0.008, 0);
const keyTooth2 = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.012, 0.008), goldMat);
keyTooth2.position.set(0.05, -0.006, 0);
keyGroup.add(keyHead, keyShaft, keyTooth1, keyTooth2);
keyGroup.position.set(0.06, 1.6, 2);
keyGroup.visible = false;
keyGroup.userData = { type: 'key' };

// Make key interactable via its head
keyHead.userData = { type: 'key' };
interactables.push(keyHead);

scene.add(keyGroup);

// ============ FLASHLIGHT (corner of room) ============
const flashlightGroup = new THREE.Group();
flashlightGroup.position.set(0.5, 0.08, 5.3);
flashlightGroup.rotation.z = Math.PI / 2;

// ============ MOVEMENT ============
const moveSpeed = 3;
const keys = { w: false, a: false, s: false, d: false };
const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();

document.addEventListener('keydown', (e) => {
  switch (e.code) {
    case 'KeyW': keys.w = true; break;
    case 'KeyA': keys.a = true; break;
    case 'KeyS': keys.s = true; break;
    case 'KeyD': keys.d = true; break;
    case 'KeyE': tryInteract(); break;
  }
});

document.addEventListener('keyup', (e) => {
  switch (e.code) {
    case 'KeyW': keys.w = false; break;
    case 'KeyA': keys.a = false; break;
    case 'KeyS': keys.s = false; break;
    case 'KeyD': keys.d = false; break;
  }
});

// ============ POINTER LOCK ============
const blocker = document.getElementById('blocker');
const startBtn = document.getElementById('startBtn');

startBtn.addEventListener('click', () => {
  controls.lock();
});

controls.addEventListener('lock', () => {
  blocker.style.display = 'none';
  if (!gameStarted) {
    gameStarted = true;
    timerStart = performance.now();
  }
});

controls.addEventListener('unlock', () => {
  if (!gameWon && !document.getElementById('comboModal').style.display.includes('block') &&
      !document.getElementById('message').style.display.includes('block')) {
    blocker.style.display = 'flex';
  }
});

// ============ CLICK INTERACTION ============
document.addEventListener('mousedown', (e) => {
  if (e.button === 0 && controls.isLocked) {
    tryInteract();
  }
});

// ============ COMBO LOCK UI ============
document.querySelectorAll('.digit-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const idx = parseInt(btn.dataset.digit);
    const dir = btn.dataset.dir;
    if (dir === 'up') {
      comboDigits[idx] = (comboDigits[idx] + 1) % 10;
    } else {
      comboDigits[idx] = (comboDigits[idx] + 9) % 10;
    }
    document.getElementById('d' + idx).textContent = comboDigits[idx];
  });
});

document.getElementById('comboSubmit').addEventListener('click', () => {
  checkCombo();
});

document.getElementById('comboCancel').addEventListener('click', () => {
  closeComboModal();
});

document.getElementById('closeMsg').addEventListener('click', () => {
  closeMessage();
});

function openComboModal() {
  document.getElementById('comboModal').style.display = 'block';
  controls.unlock();
}

function closeComboModal() {
  document.getElementById('comboModal').style.display = 'none';
  setTimeout(() => controls.lock(), 100);
}

function showMessage(text) {
  document.getElementById('messageText').innerHTML = text;
  document.getElementById('message').style.display = 'block';
  controls.unlock();
}

function closeMessage() {
  document.getElementById('message').style.display = 'none';
  setTimeout(() => controls.lock(), 100);
}

function checkCombo() {
  if (comboDigits[0] === CORRECT_CODE[0] &&
      comboDigits[1] === CORRECT_CODE[1] &&
      comboDigits[2] === CORRECT_CODE[2]) {
    objectStates.comboLock = 'unlocked';
    puzzlesSolved++;
    closeComboModal();

    if (objectStates.safe === 'revealed' || objectStates.safe === 'hidden') {
      objectStates.safe = 'revealed';
    }
    if (objectStates.safe === 'revealed') {
      objectStates.safe = 'open';
      puzzlesSolved++;
      // Show key
      keyGroup.visible = true;
      objectStates.key = 'inSafe';
      // Animate safe door
      animations.push({
        target: safeDoor.position,
        prop: 'x',
        from: safeDoor.position.x,
        to: safeDoor.position.x + 0.3,
        duration: 500,
        startTime: performance.now()
      });
      setTimeout(() => {
        showMessage('🔓 保险箱打开了！里面有一把金色的钥匙！');
      }, 200);
    } else {
      setTimeout(() => {
        showMessage('🔓 密码正确！保险箱已解锁。<br>找到保险箱就能打开它。');
      }, 200);
    }
  } else {
    // Wrong code - flash red
    const displays = document.querySelectorAll('.digit-display');
    displays.forEach(d => d.style.color = '#f00');
    setTimeout(() => displays.forEach(d => d.style.color = '#0f0'), 500);
  }
}

// ============ INTERACTION LOGIC ============
function tryInteract() {
  if (gameWon) return;

  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  const intersects = raycaster.intersectObjects(interactables, true);

  if (intersects.length === 0) return;

  const hit = intersects[0];
  if (hit.distance > 2.5) return;

  let obj = hit.object;
  // Walk up to find userData.type
  while (obj && !obj.userData.type) {
    obj = obj.parent;
  }
  if (!obj || !obj.userData.type) return;

  const type = obj.userData.type;

  switch (type) {
    case 'door':
      interactDoor();
      break;
    case 'drawer':
      interactDrawer();
      break;
    case 'comboLock':
      interactComboLock();
      break;
    case 'note':
      interactNote();
      break;
    case 'painting':
      interactPainting();
      break;
    case 'safe':
      interactSafe();
      break;
    case 'flashlight':
      interactFlashlight();
      break;
    case 'key':
      interactKey();
      break;
    case 'mirror':
      interactMirror();
      break;
  }
}

function interactDoor() {
  if (objectStates.door === 'locked') {
    if (inventory.includes('key')) {
      // Use key
      inventory.splice(inventory.indexOf('key'), 1);
      objectStates.key = 'used';
      objectStates.door = 'unlocked';
      puzzlesSolved++;
      lockIndicator.material.color.setHex(0x00ff00);
      lockIndicator.material.emissive.setHex(0x00ff00);
      showMessage('🔑 钥匙插入锁孔，门已解锁！再次点击门即可打开。');
      updateInventoryUI();
    } else {
      showMessage('🔒 门被锁住了。需要找到钥匙才能打开。');
    }
  } else if (objectStates.door === 'unlocked') {
    objectStates.door = 'open';
    puzzlesSolved++;
    // Animate door opening
    animations.push({
      target: doorPivot.rotation,
      prop: 'y',
      from: 0,
      to: -Math.PI / 2,
      duration: 1500,
      startTime: performance.now()
    });

    // Bright light from outside
    const escapeLight = new THREE.PointLight(0xffffff, 3, 8);
    escapeLight.position.set(4.5, 1.5, -1);
    scene.add(escapeLight);

    setTimeout(() => {
      gameWon = true;
      document.getElementById('winScreen').style.display = 'flex';
      const mins = Math.floor(timerElapsed / 60);
      const secs = Math.floor(timerElapsed % 60);
      document.getElementById('winTime').textContent =
        `用时: ${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      controls.unlock();
    }, 2000);
  } else if (objectStates.door === 'open') {
    // Already open
  }
}

  if (objectStates.drawer === 'closed') {
    objectStates.drawer = 'open';
    puzzlesSolved++;

    animations.push({

// ============ INVENTORY UI ============

// Initialize inventory UI
updateInventoryUI();

// ============ HINT SYSTEM ============
const hintEl = document.getElementById('hint');

function updateHint() {
  if (!controls.isLocked || gameWon) {
    hintEl.style.display = 'none';
    return;
  }

  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  const intersects = raycaster.intersectObjects(interactables, true);

  if (intersects.length > 0 && intersects[0].distance <= 2.5) {
    let obj = intersects[0].object;
    while (obj && !obj.userData.type) obj = obj.parent;
    if (obj && obj.userData.type) {
      const type = obj.userData.type;
      const hints = {
        door: objectStates.door === 'locked' ? '🚪 门 [E 交互] - 已锁定' :
              objectStates.door === 'unlocked' ? '🚪 门 [E 交互] - 已解锁' : '🚪 门 - 已打开',
        drawer: objectStates.drawer === 'closed' ? '🗄️ 抽屉 [E 交互]' : '🗄️ 抽屉 - 已打开',
        comboLock: objectStates.comboLock === 'locked' ? '🔐 密码锁 [E 交互]' : '🔐 密码锁 - 已解锁',
        note: objectStates.note === 'unread' ? '📝 便签纸 [E 交互]' : '📝 便签纸 [E 再次查看]',
        painting: objectStates.painting === 'normal' ? '🖼️ 油画 [E 交互]' : '🖼️ 油画 - 已移开',
        safe: objectStates.safe === 'hidden' ? '🖼️ 墙壁' :
              objectStates.safe === 'revealed' ? '🔒 保险箱 [E 交互]' :
              '📦 保险箱 - 已打开',
        flashlight: objectStates.flashlight === 'onGround' ? '🔦 手电筒 [E 拾取]' : '',
        key: objectStates.key === 'inSafe' ? '🔑 钥匙 [E 拾取]' : '',
        mirror: '🪞 镜子 [E 交互]'
      };

      const hint = hints[type];
      if (hint) {
        hintEl.textContent = hint;
        hintEl.style.display = 'block';
        return;
      }
    }
  }

  hintEl.style.display = 'none';
}

// ============ TIMER ============
function updateTimer() {
  if (!gameStarted || gameWon) return;
  timerElapsed = (performance.now() - timerStart) / 1000;
  const mins = Math.floor(timerElapsed / 60);
  const secs = Math.floor(timerElapsed % 60);
  document.getElementById('timer').textContent =
    `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
}

// ============ ANIMATION SYSTEM ============
function updateAnimations() {
  const now = performance.now();
  for (let i = animations.length - 1; i >= 0; i--) {
    const anim = animations[i];
    const elapsed = now - anim.startTime;
    const t = Math.min(elapsed / anim.duration, 1);
    // Ease out cubic
    const ease = 1 - Math.pow(1 - t, 3);
    anim.target[anim.prop] = anim.from + (anim.to - anim.from) * ease;
    if (t >= 1) {
      anim.target[anim.prop] = anim.to;
      animations.splice(i, 1);
    }
  }
}

// ============ MOVEMENT & COLLISION ============
const clock = new THREE.Clock();

function updateMovement(delta) {
  if (!controls.isLocked) return;

  velocity.x -= velocity.x * 10 * delta;
  velocity.z -= velocity.z * 10 * delta;

  direction.z = Number(keys.w) - Number(keys.s);
  direction.x = Number(keys.d) - Number(keys.a);
  direction.normalize();

  if (keys.w || keys.s) velocity.z -= direction.z * moveSpeed * delta;
  if (keys.a || keys.d) velocity.x -= direction.x * moveSpeed * delta;

  controls.moveRight(-velocity.x * delta);
  controls.moveForward(-velocity.z * delta);

  // Clamp position to room bounds
  const pos = camera.position;
  const margin = 0.3;
  pos.x = Math.max(margin, Math.min(6 - margin, pos.x));
  pos.z = Math.max(margin, Math.min(6 - margin, pos.z));
  pos.y = 1.6; // Fixed height

  // Allow walking through door if open
  if (objectStates.door === 'open' && pos.x > 3.8 && pos.x < 5.2 && pos.z < 0.3) {
    // Let them walk through
    pos.z = Math.max(-2, pos.z);
  }
}

// ============ KEY FLOATING ANIMATION ============
let keyFloatTime = 0;

function updateKeyFloat(delta) {
  if (keyGroup.visible) {
    keyFloatTime += delta;
    keyGroup.position.y = 1.6 + Math.sin(keyFloatTime * 3) * 0.03;
    keyGroup.rotation.y += delta * 2;
  }
}

// ============ STATE EXPOSURE ============
function updateState() {
  window.__3D_STATE__ = {
    inventory: [...inventory],
    puzzlesSolved: puzzlesSolved,
    objectStates: { ...objectStates },
    timer: Math.floor(timerElapsed),
    gameWon: gameWon
  };
}

// ============ MAIN LOOP ============
function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();

  updateMovement(delta);
  updateAnimations();
  updateHint();
  updateTimer();
  updateKeyFloat(delta);
  updateState();

  // Update flashlight direction
  if (flashlightSpot) {
    flashlightSpot.target.position.set(0, 0, -1);
  }

  renderer.render(scene, camera);
}

animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ INITIAL STATE ============
window.__3D_STATE__ = {
  inventory: [],
  puzzlesSolved: 0,
  objectStates: { ...objectStates },
  timer: 0,
  gameWon: false
};
</script>
