<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 密室逃脱</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        #hint {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 18px;
            text-shadow: 1px 1px 3px #000;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 20px;
            display: none;
        }
        #hud-top {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 20px;
        }
        .hud-box {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 10px 20px;
            border: 1px solid #555;
            border-radius: 5px;
            font-size: 18px;
        }
        #inventory-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 15px;
            border: 1px solid #555;
            border-radius: 5px;
            min-width: 200px;
        }
        #inventory-container h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        #inventory {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #inventory li {
            padding: 5px 0;
            color: #aaa;
        }
        #inventory li.active {
            color: #fff;
        }
        #blocker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            pointer-events: auto;
            cursor: pointer;
            z-index: 10;
        }
        #blocker h1 { font-size: 40px; margin-bottom: 10px; }
        #blocker p { font-size: 20px; color: #ccc; }
        
        .overlay-ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #e0e0e0;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            pointer-events: auto;
            display: none;
            color: #333;
            text-align: center;
            z-index: 5;
        }
        .overlay-ui h2 { margin-top: 0; }
        .overlay-ui button {
            margin-top: 20px;
            padding: 8px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #333;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .overlay-ui button:hover { background: #555; }
        
        #combo-inputs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        #combo-inputs input {
            width: 50px;
            height: 60px;
            font-size: 30px;
            text-align: center;
            border: 2px solid #333;
            border-radius: 5px;
        }
        
        #note-text {
            font-family: 'Courier New', Courier, monospace;
            font-size: 20px;
            background: #fff9c4;
            padding: 20px;
            border: 1px solid #ccc;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            text-align: left;
        }

        #win-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(20, 50, 20, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #4caf50;
            pointer-events: auto;
            z-index: 20;
        }
        #win-screen h1 { font-size: 60px; margin-bottom: 10px; text-shadow: 0 0 10px #4caf50; }
        #win-screen p { font-size: 24px; color: #fff; }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="ui-layer">
        <div id="crosshair"></div>
        <div id="hint">按 E 交互</div>
        
        <div id="hud-top">
            <div class="hud-box">时间: <span id="timer">0</span>s</div>
        </div>
        
        <div id="inventory-container">
            <h3>背包 (最多5个)</h3>
            <ul id="inventory">
                <li>空</li>
            </ul>
        </div>
    </div>

    <div id="blocker">
        <h1>密室逃脱</h1>
        <p>点击屏幕开始</p>
        <p style="font-size: 16px; margin-top: 20px;">WASD 移动 | 鼠标 视角 | 左键/E 互动</p>
    </div>

    <div id="combo-ui" class="overlay-ui">
        <h2>密码锁</h2>
        <div id="combo-inputs">
            <input type="number" id="digit1" min="0" max="9" value="0">
            <input type="number" id="digit2" min="0" max="9" value="0">
            <input type="number" id="digit3" min="0" max="9" value="0">
        </div>
        <button id="combo-submit">确认</button>
        <button id="combo-close">取消</button>
    </div>

    <div id="note-ui" class="overlay-ui">
        <h2>便签</h2>
        <div id="note-text">
            画作背后隐藏着秘密...<br><br>
            密码: 4 - 2 - 7
        </div>
        <button id="note-close">放下</button>
    </div>

    <div id="win-screen">
        <h1>逃脱成功！</h1>
        <p>用时: <span id="win-time">0</span> 秒</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 状态机 ---
        const state = {
            inventory: [],
            puzzlesSolved: 0,
            objectStates: {
                door: 'locked',      // locked, unlocked, open
                drawer: 'closed',    // closed, open
                safe: 'hidden',      // hidden, revealed, locked, unlocked, open
                painting: 'normal',  // normal, moved
                mirror: 'normal',    // normal
                flashlight: 'onGround', // onGround, inInventory
                key: 'inSafe',       // inSafe, inInventory, used
                note: 'unread',      // unread, read
                comboLock: 'locked'  // locked, solved
            },
            timer: 0,
            gameWon: false
        };
        window.__3D_STATE__ = state;

        let startTime = 0;
        let timerInterval;

        // --- 场景初始化 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.15);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(3, 1.6, 3); // 房间中心偏上

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('game-container').appendChild(renderer.domElement);

        // --- 控制器 ---
        const controls = new PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');

        blocker.addEventListener('click', () => {
            if (!state.gameWon) controls.lock();
        });

        controls.addEventListener('lock', () => {
            blocker.style.display = 'none';
            if (startTime === 0) {
                startTime = Date.now();
                timerInterval = setInterval(() => {
                    if (!state.gameWon) {
                        state.timer = Math.floor((Date.now() - startTime) / 1000);
                        document.getElementById('timer').innerText = state.timer;
                    }
                }, 1000);
            }
        });

        controls.addEventListener('unlock', () => {
            if (!state.gameWon && document.getElementById('combo-ui').style.display === 'none' && document.getElementById('note-ui').style.display === 'none') {
                blocker.style.display = 'flex';
            }
        });

        // --- 移动逻辑 ---
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let prevTime = performance.now();

        document.addEventListener('keydown', (event) => {
            switch (event.code) {
                case 'ArrowUp': case 'KeyW': moveForward = true; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = true; break;
                case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                case 'ArrowRight': case 'KeyD': moveRight = true; break;
                case 'KeyE': interact(); break;
            }
        });

        document.addEventListener('keyup', (event) => {
            switch (event.code) {
                case 'ArrowUp': case 'KeyW': moveForward = false; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = false; break;
                case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                case 'ArrowRight': case 'KeyD': moveRight = false; break;
            }
        });

        document.addEventListener('mousedown', (event) => {
            if (event.button === 0 && controls.isLocked) interact();
        });

        // --- 光照 ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.1); // 基础暗光
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffeedd, 0.8, 10);
        pointLight.position.set(3, 2.9, 3);
        pointLight.castShadow = true;
        scene.add(pointLight);

        // 手电筒聚光灯 (初始不添加到场景)
        const flashLightSpot = new THREE.SpotLight(0xffffff, 2, 15, Math.PI / 6, 0.5, 1);
        flashLightSpot.position.set(0, 0, 0);
        flashLightSpot.target.position.set(0, 0, -1);
        
        // --- 材质 ---
        const texLoader = new THREE.TextureLoader();
        // 使用基础颜色模拟材质，避免外部依赖
        const matFloor = new THREE.MeshStandardMaterial({ color: 0x2c1e16, roughness: 0.8 });
        const matWall = new THREE.MeshStandardMaterial({ color: 0xdcdcdc, roughness: 0.9 });
        const matCeil = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1 });
        const matWood = new THREE.MeshStandardMaterial({ color: 0x5c3a21, roughness: 0.7 });
        const matMetal = new THREE.MeshStandardMaterial({ color: 0x777777, metalness: 0.8, roughness: 0.2 });
        const matGold = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 1, roughness: 0.3 });
        const matPaper = new THREE.MeshStandardMaterial({ color: 0xfff9c4, roughness: 1 });
        const matMirror = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 1, roughness: 0 });
        const matPainting = new THREE.MeshStandardMaterial({ color: 0x8b4513 });

        // --- 房间构造 (0-6) ---
        const roomGroup = new THREE.Group();
        scene.add(roomGroup);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(6, 6), matFloor);
        floor.rotation.x = -Math.PI / 2;
        floor.position.set(3, 0, 3);
        floor.receiveShadow = true;
        roomGroup.add(floor);

        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(6, 6), matCeil);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.set(3, 3, 3);
        roomGroup.add(ceiling);

        const wallGeo = new THREE.PlaneGeometry(6, 3);
        const wallN = new THREE.Mesh(wallGeo, matWall); // z=0
        wallN.position.set(3, 1.5, 0);
        wallN.receiveShadow = true;
        roomGroup.add(wallN);

        const wallS = new THREE.Mesh(wallGeo, matWall); // z=6
        wallS.rotation.y = Math.PI;
        wallS.position.set(3, 1.5, 6);
        wallS.receiveShadow = true;
        roomGroup.add(wallS);

        const wallW = new THREE.Mesh(wallGeo, matWall); // x=0
        wallW.rotation.y = Math.PI / 2;
        wallW.position.set(0, 1.5, 3);
        wallW.receiveShadow = true;
        roomGroup.add(wallW);

        const wallE = new THREE.Mesh(wallGeo, matWall); // x=6
        wallE.rotation.y = -Math.PI / 2;
        wallE.position.set(6, 1.5, 3);
        wallE.receiveShadow = true;
        roomGroup.add(wallE);

        // --- 互动物体 ---
        const interactables = [];

        // 1. 门 (Door) - 在 z=0 墙上
        const doorGroup = new THREE.Group();
        doorGroup.position.set(2.4, 0, 0); // 旋转轴心
        scene.add(doorGroup);
        const doorMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.5, 0.1), matWood);
        doorMesh.position.set(0.6, 1.25, 0.05); // 相对于轴心偏移
        doorMesh.castShadow = true;
        doorMesh.receiveShadow = true;
        doorMesh.userData = { name: 'door', desc: '大门' };
        doorGroup.add(doorMesh);
        interactables.push(doorMesh);

        // 2. 抽屉柜 (Drawer)
        const tableGroup = new THREE.Group();
        tableGroup.position.set(1, 0, 1);
        scene.add(tableGroup);
        const tableTop = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.1, 0.8), matWood);
        tableTop.position.set(0, 0.8, 0);
        tableTop.castShadow = true;
        tableGroup.add(tableTop);
        const legGeo = new THREE.BoxGeometry(0.1, 0.8, 0.1);
        const leg1 = new THREE.Mesh(legGeo, matWood); leg1.position.set(-0.5, 0.4, -0.3); tableGroup.add(leg1);
        const leg2 = new THREE.Mesh(legGeo, matWood); leg2.position.set(0.5, 0.4, -0.3); tableGroup.add(leg2);
        const leg3 = new THREE.Mesh(legGeo, matWood); leg3.position.set(-0.5, 0.4, 0.3); tableGroup.add(leg3);
        const leg4 = new THREE.Mesh(legGeo, matWood); leg4.position.set(0.5, 0.4, 0.3); tableGroup.add(leg4);
        
        const drawerMesh = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.2, 0.7), new THREE.MeshStandardMaterial({color: 0x4a2f1d}));
        drawerMesh.position.set(0, 0.6, 0);
        drawerMesh.userData = { name: 'drawer', desc: '抽屉' };
        tableGroup.add(drawerMesh);
        interactables.push(drawerMesh);

        // 3. 便签纸 (Note)
        const noteMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 0.2), matPaper);
        noteMesh.rotation.x = -Math.PI / 2;
        noteMesh.rotation.z = 0.2;
        noteMesh.position.set(1, 0.86, 1);
        noteMesh.userData = { name: 'note', desc: '便签' };
        scene.add(noteMesh);
        interactables.push(noteMesh);

        // 4. 密码锁 (ComboLock)
        const lockMesh = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.3, 0.05), matMetal);
        lockMesh.position.set(1.5, 1.5, 0.05);
        lockMesh.userData = { name: 'comboLock', desc: '密码面板' };
        scene.add(lockMesh);
        interactables.push(lockMesh);

        // 5. 油画 (Painting)
        const paintingMesh = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.2, 1.5), matPainting);
        paintingMesh.position.set(5.95, 1.6, 3);
        paintingMesh.userData = { name: 'painting', desc: '油画' };
        scene.add(paintingMesh);
        interactables.push(paintingMesh);

        // 6. 保险箱 (Safe)
        const safeGroup = new THREE.Group();
        safeGroup.position.set(6.0, 1.6, 3);
        scene.add(safeGroup);
        const safeBody = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.8), matMetal);
        safeBody.position.set(-0.1, 0, 0);
        safeGroup.add(safeBody);
        
        const safeDoorGroup = new THREE.Group();
        safeDoorGroup.position.set(-0.2, 0, -0.4); // 轴心
        safeGroup.add(safeDoorGroup);
        const safeDoorMesh = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.58, 0.78), new THREE.MeshStandardMaterial({color: 0x666666, metalness: 0.9}));
        safeDoorMesh.position.set(0, 0, 0.39);
        safeDoorMesh.userData = { name: 'safe', desc: '保险箱' };
        safeDoorGroup.add(safeDoorMesh);
        interactables.push(safeDoorMesh);

        // 7. 钥匙 (Key) - 在保险箱内
        const keyGroup = new THREE.Group();
        keyGroup.position.set(5.9, 1.5, 3);
        const keyRing = new THREE.Mesh(new THREE.TorusGeometry(0.03, 0.01, 8, 16), matGold);
        const keyShaft = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.1), matGold);
        keyShaft.position.set(0.05, 0, 0);
        keyShaft.rotation.z = Math.PI / 2;
        keyGroup.add(keyRing);
        keyGroup.add(keyShaft);
        keyGroup.visible = false; // 初始不可见
        // 碰撞体
        const keyHitbox = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshBasicMaterial({visible: false}));
        keyHitbox.userData = { name: 'key', desc: '金钥匙' };
        keyGroup.add(keyHitbox);
        scene.add(keyGroup);
        interactables.push(keyHitbox);

        // 8. 手电筒 (Flashlight)
        const flashlightGroup = new THREE.Group();
        flashlightGroup.position.set(0.5, 0.05, 5.5);
        flashlightGroup.rotation.x = Math.PI / 2;
        const flBody = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.2), new THREE.MeshStandardMaterial({color: 0x222222}));
        const flHead = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.05), new THREE.MeshStandardMaterial({color: 0x111111}));
        flHead.position.y = 0.125;
        flashlightGroup.add(flBody);
        flashlightGroup.add(flHead);
        const flHitbox = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.3, 0.15), new THREE.MeshBasicMaterial({visible: false}));
        flHitbox.userData = { name: 'flashlight', desc: '手电筒' };
        flashlightGroup.add(flHitbox);
        scene.add(flashlightGroup);
        interactables.push(flHitbox);

        // 9. 镜子 (Mirror)
        const mirrorMesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1.5), matMirror);
        mirrorMesh.rotation.y = Math.PI / 2;
        mirrorMesh.position.set(0.01, 1.6, 1.5);
        mirrorMesh.userData = { name: 'mirror', desc: '镜子' };
        scene.add(mirrorMesh);
        interactables.push(mirrorMesh);


        // --- 交互逻辑 ---
        const raycaster = new THREE.Raycaster();
        const center = new THREE.Vector2(0, 0);
        const hintEl = document.getElementById('hint');

        function updateInventoryUI() {
            const ul = document.getElementById('inventory');
            ul.innerHTML = '';
            if (state.inventory.length === 0) {
                ul.innerHTML = '<li>空</li>';
            } else {
                state.inventory.forEach(item => {
                    const li = document.createElement('li');
                    li.innerText = item;
                    li.className = 'active';
                    ul.appendChild(li);
                });
            }
        }

        function addToInventory(item, id) {
            if (state.inventory.length < 5 && !state.inventory.includes(item)) {
                state.inventory.push(item);
                updateInventoryUI();
                return true;
            }
            return false;
        }

        function interact() {
            raycaster.setFromCamera(center, camera);
            const intersects = raycaster.intersectObjects(interactables, false);
            
            if (intersects.length > 0 && intersects[0].distance <= 2.5) {
                const obj = intersects[0].object;
                const name = obj.userData.name;

                switch (name) {
                    case 'flashlight':
                        if (state.objectStates.flashlight === 'onGround') {
                            if (addToInventory('手电筒', 'flashlight')) {
                                state.objectStates.flashlight = 'inInventory';
                                flashlightGroup.visible = false;
                                camera.add(flashLightSpot);
                                camera.add(flashLightSpot.target);
                                scene.fog.density = 0.05; // 拿到手电筒后雾气变淡
                            }
                        }
                        break;
                    
                    case 'note':
                        state.objectStates.note = 'read';
                        controls.unlock();
                        document.getElementById('note-ui').style.display = 'block';
                        break;

                    case 'drawer':
                        state.objectStates.drawer = state.objectStates.drawer === 'closed' ? 'open' : 'closed';
                        break;

                    case 'painting':
                        if (state.objectStates.painting === 'normal') {
                            state.objectStates.painting = 'moved';
                            state.objectStates.safe = 'revealed';
                        }
                        break;

                    case 'comboLock':
                        if (state.objectStates.comboLock === 'locked') {
                            controls.unlock();
                            document.getElementById('combo-ui').style.display = 'block';
                        }
                        break;

                    case 'safe':
                        if (state.objectStates.safe === 'unlocked') {
                            state.objectStates.safe = 'open';
                            keyGroup.visible = true;
                        } else if (state.objectStates.safe === 'revealed' || state.objectStates.safe === 'locked') {
                            hintEl.innerText = "需要密码解锁";
                            hintEl.style.display = 'block';
                            setTimeout(() => hintEl.style.display = 'none', 2000);
                        }
                        break;

                    case 'key':
                        if (state.objectStates.safe === 'open' && state.objectStates.key === 'inSafe') {
                            if (addToInventory('金钥匙', 'key')) {
                                state.objectStates.key = 'inInventory';
                                keyGroup.visible = false;
                            }
                        }
                        break;

                    case 'door':
                        if (state.inventory.includes('金钥匙')) {
                            state.objectStates.door = 'open';
                            state.objectStates.key = 'used';
                            state.gameWon = true;
                            
                            // 移除钥匙
                            state.inventory = state.inventory.filter(i => i !== '金钥匙');
                            updateInventoryUI();

                            setTimeout(() => {
                                controls.unlock();
                                document.getElementById('win-screen').style.display = 'flex';
                                document.getElementById('win-time').innerText = state.timer;
                            }, 1500);
                        } else {
                            hintEl.innerText = "门锁着，需要钥匙";
                            hintEl.style.display = 'block';
                            setTimeout(() => hintEl.style.display = 'none', 2000);
                        }
                        break;
                    
                    case 'mirror':
                        hintEl.innerText = "镜子里的你看起来很疲惫。";
                        hintEl.style.display = 'block';
                        setTimeout(() => hintEl.style.display = 'none', 2000);
                        break;
                }
            }
        }

        // --- UI 事件 ---
        document.getElementById('note-close').addEventListener('click', () => {
            document.getElementById('note-ui').style.display = 'none';
            controls.lock();
        });

        document.getElementById('combo-close').addEventListener('click', () => {
            document.getElementById('combo-ui').style.display = 'none';
            controls.lock();
        });

        document.getElementById('combo-submit').addEventListener('click', () => {
            const d1 = document.getElementById('digit1').value;
            const d2 = document.getElementById('digit2').value;
            const d3 = document.getElementById('digit3').value;
            
            if (d1 === '4' && d2 === '2' && d3 === '7') {
                state.objectStates.comboLock = 'solved';
                state.objectStates.safe = 'unlocked';
                state.puzzlesSolved++;
                document.getElementById('combo-ui').style.display = 'none';
                controls.lock();
                
                // 视觉反馈
                lockMesh.material.color.setHex(0x00ff00);
            } else {
                const btn = document.getElementById('combo-submit');
                btn.innerText = "密码错误";
                btn.style.background = "red";
                setTimeout(() => {
                    btn.innerText = "确认";
                    btn.style.background = "#333";
                }, 1000);
            }
        });

        // --- 动画与渲染循环 ---
        function lerp(start, end, amt) {
            return (1 - amt) * start + amt * end;
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();

            if (controls.isLocked) {
                // 移动逻辑
                const delta = (time - prevTime) / 1000;
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                const speed = 20.0;
                if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // 碰撞检测 (简单边界)
                const pos = controls.getObject().position;
                if (pos.x < 0.5) pos.x = 0.5;
                if (pos.x > 5.5) pos.x = 5.5;
                if (pos.z < 0.5) pos.z = 0.5;
                if (pos.z > 5.5) pos.z = 5.5;

                // 射线检测更新提示
                raycaster.setFromCamera(center, camera);
                const intersects = raycaster.intersectObjects(interactables, false);
                if (intersects.length > 0 && intersects[0].distance <= 2.5) {
                    const obj = intersects[0].object;
                    let actionText = "点击互动";
                    
                    if (obj.userData.name === 'door' && state.inventory.includes('金钥匙')) actionText = "使用钥匙开门";
                    else if (obj.userData.name === 'door') actionText = "检查门";
                    else if (obj.userData.name === 'flashlight') actionText = "拾取手电筒";
                    else if (obj.userData.name === 'key') actionText = "拾取钥匙";
                    else if (obj.userData.name === 'safe' && state.objectStates.safe === 'unlocked') actionText = "打开保险箱";
                    
                    hintEl.innerText = `[ ${obj.userData.desc} ] - ${actionText}`;
                    hintEl.style.display = 'block';
                } else {
                    hintEl.style.display = 'none';
                }
            }
            prevTime = time;

            // 状态动画更新
            // 门
            const targetDoorRot = state.objectStates.door === 'open' ? Math.PI / 2 : 0;
            doorGroup.rotation.y = lerp(doorGroup.rotation.y, targetDoorRot, 0.05);

            // 抽屉
            const targetDrawerZ = state.objectStates.drawer === 'open' ? 0.4 : 0;
            drawerMesh.position.z = lerp(drawerMesh.position.z, targetDrawerZ, 0.1);

            // 油画
            const targetPaintingZ = state.objectStates.painting === 'moved' ? 4.2 : 3;
            paintingMesh.position.z = lerp(paintingMesh.position.z, targetPaintingZ, 0.05);

            // 保险箱门
            const targetSafeDoorRot = state.objectStates.safe === 'open' ? -Math.PI / 2 : 0;
            safeDoorGroup.rotation.y = lerp(safeDoorGroup.rotation.y, targetSafeDoorRot, 0.1);

            // 钥匙浮动动画
            if (state.objectStates.safe === 'open' && state.objectStates.key === 'inSafe') {
                keyGroup.rotation.y += 0.02;
                keyGroup.position.y = 1.5 + Math.sin(time * 0.003) * 0.02;
            }

            renderer.render(scene, camera);
        }

        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
