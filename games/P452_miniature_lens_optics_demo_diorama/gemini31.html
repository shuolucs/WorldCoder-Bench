<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Miniature Lens Optics Demo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(20, 20, 20, 0.85);
            color: #eee;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #444;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            min-width: 250px;
            pointer-events: auto;
            user-select: none;
        }
        .info-row {
            margin-bottom: 8px;
            font-size: 14px;
        }
        .info-value {
            font-weight: bold;
            color: #4da6ff;
            float: right;
        }
        hr {
            border: 0;
            height: 1px;
            background: #555;
            margin: 15px 0;
        }
        label {
            font-size: 13px;
            color: #aaa;
            display: block;
            margin-bottom: 5px;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 8px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #444;
        }
        .instructions {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
            text-align: center;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info-panel">
        <div class="info-row">Focal Length (f): <span id="val-f" class="info-value">3.00</span></div>
        <div class="info-row">Object Dist (u): <span id="val-u" class="info-value">7.00</span></div>
        <div class="info-row">Image Dist (v): <span id="val-v" class="info-value">5.25</span></div>
        <div class="info-row">Magnification (m): <span id="val-m" class="info-value">-0.75</span></div>
        
        <hr>
        
        <label for="focal-slider">Adjust Focal Length</label>
        <input type="range" id="focal-slider" min="1.5" max="6" step="0.5" value="3">
        
        <div class="btn-group">
            <button id="reset-btn">Reset</button>
            <button id="toggle-rays-btn">Toggle Rays</button>
        </div>
        
        <div class="instructions">
            Use <b>ArrowLeft / ArrowRight</b><br>to move the light source.
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            focalLength: 3,
            objectDistance: 7,
            imageDistance: 5.25,
            magnification: 0.75,
            lightSourceX: -7,
            screenX: 5.25,
            raysVisible: true,
            modelLoaded: false,
            animationPlaying: false
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.Fog(0x1a1a1a, 10, 40);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 2, 0);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 - 0.05;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        scene.add(dirLight);

        // --- Diorama Base ---
        const platformGeo = new THREE.BoxGeometry(20, 0.3, 10);
        const platformMat = new THREE.MeshStandardMaterial({ 
            color: 0x8B7355,
            roughness: 0.8,
            metalness: 0.1
        });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = -0.15; // Top surface at y=0
        platform.receiveShadow = true;
        scene.add(platform);

        // Grid helper on platform
        const grid = new THREE.GridHelper(20, 20, 0x000000, 0x000000);
        grid.position.y = 0.01;
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        scene.add(grid);

        // --- GLTF Model ---
        let mixer;
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BoxAnimated/glTF-Binary/BoxAnimated.glb', (gltf) => {
            const model = gltf.scene;
            model.position.set(-8, 0.15, -3);
            model.scale.set(0.5, 0.5, 0.5);
            
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(model);
            window.__3D_STATE__.modelLoaded = true;

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                const action = mixer.clipAction(gltf.animations[0]);
                action.play();
                window.__3D_STATE__.animationPlaying = true;
            }
        });

        // --- Optics Elements ---
        
        // 1. Light Source
        const sourceGeo = new THREE.SphereGeometry(0.3, 32, 32);
        const sourceMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        const sourceMesh = new THREE.Mesh(sourceGeo, sourceMat);
        sourceMesh.position.set(-7, 2, 0);
        scene.add(sourceMesh);

        const sourceLight = new THREE.PointLight(0xffff00, 1, 10);
        sourceLight.position.copy(sourceMesh.position);
        scene.add(sourceLight);

        // Glow effect
        const glowGeo = new THREE.SphereGeometry(0.4, 32, 32);
        const glowMat = new THREE.MeshBasicMaterial({ 
            color: 0xffff00, 
            transparent: true, 
            opacity: 0.3,
            blending: THREE.AdditiveBlending
        });
        const glowMesh = new THREE.Mesh(glowGeo, glowMat);
        sourceMesh.add(glowMesh);

        // 2. Converging Lens
        const lensGeo = new THREE.CylinderGeometry(2, 2, 0.15, 64);
        const lensMat = new THREE.MeshPhysicalMaterial({
            color: 0xadd8e6,
            transparent: true,
            opacity: 0.4,
            transmission: 0.9,
            ior: 1.5,
            roughness: 0.1,
            metalness: 0.1,
            side: THREE.DoubleSide
        });
        const lensMesh = new THREE.Mesh(lensGeo, lensMat);
        lensMesh.rotation.z = Math.PI / 2; // Make it a vertical disc facing X
        lensMesh.position.set(0, 2, 0);
        lensMesh.castShadow = true;
        scene.add(lensMesh);

        // Lens Label
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(0,0,0,0)';
        ctx.fillRect(0, 0, 256, 128);
        ctx.font = 'bold 48px sans-serif';
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Lens', 128, 64);
        const tex = new THREE.CanvasTexture(canvas);
        const spriteMat = new THREE.SpriteMaterial({ map: tex });
        const lensLabel = new THREE.Sprite(spriteMat);
        lensLabel.position.set(0, 4.5, 0);
        lensLabel.scale.set(2, 1, 1);
        scene.add(lensLabel);

        // 3. Image Screen
        const screenGeo = new THREE.PlaneGeometry(3, 3);
        const screenMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff, 
            side: THREE.DoubleSide,
            roughness: 0.5
        });
        const screenMesh = new THREE.Mesh(screenGeo, screenMat);
        screenMesh.rotation.y = Math.PI / 2;
        screenMesh.position.set(5.25, 2, 0);
        screenMesh.castShadow = true;
        screenMesh.receiveShadow = true;
        scene.add(screenMesh);

        // Screen Stand
        const standGeo = new THREE.CylinderGeometry(0.05, 0.05, 2);
        const standMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const screenStand = new THREE.Mesh(standGeo, standMat);
        screenStand.position.set(0, -1.5, 0);
        screenMesh.add(screenStand);

        // 4. Optical Axis
        const axisGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(-9, 2, 0),
            new THREE.Vector3(9, 2, 0)
        ]);
        const axisMat = new THREE.LineDashedMaterial({ 
            color: 0xffffff, 
            dashSize: 0.2, 
            gapSize: 0.1 
        });
        const axisLine = new THREE.Line(axisGeo, axisMat);
        axisLine.computeLineDistances();
        scene.add(axisLine);

        // 5. Light Rays
        const rayMat = new THREE.LineBasicMaterial({ color: 0xffff00, linewidth: 2 });
        const rays = [];
        for (let i = 0; i < 3; i++) {
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(9); // 3 points * 3 coords
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const line = new THREE.Line(geo, rayMat);
            scene.add(line);
            rays.push(line);
        }

        // --- Logic & Updates ---
        
        function updateOptics() {
            const state = window.__3D_STATE__;
            let f = state.focalLength;
            let x_s = state.lightSourceX;
            let u = Math.abs(x_s);
            let v;
            
            // Thin lens equation: 1/f = 1/v + 1/u => v = (f*u)/(u-f)
            if (Math.abs(u - f) < 0.01) {
                v = 1000; // Approximate infinity
            } else {
                v = (f * u) / (u - f);
            }
            
            let m = v / u;

            // Update State
            state.objectDistance = u;
            state.imageDistance = v;
            state.magnification = m;
            state.screenX = v;

            // Update UI
            document.getElementById('val-f').innerText = f.toFixed(2);
            document.getElementById('val-u').innerText = u.toFixed(2);
            document.getElementById('val-v').innerText = v > 500 ? 'Infinity' : v.toFixed(2);
            document.getElementById('val-m').innerText = v > 500 ? 'Infinity' : (-m).toFixed(2); // Convention: real image inverted

            // Update Meshes
            sourceMesh.position.x = x_s;
            sourceLight.position.x = x_s;
            
            // Clamp screen visual position if it goes too far
            let visualV = v;
            if (v > 9) visualV = 9;
            if (v < -9) visualV = -9;
            screenMesh.position.x = visualV;

            // Update Rays
            const lensYOffsets = [1.8, 0, -1.8]; // Top, Center, Bottom of lens
            
            rays.forEach((ray, index) => {
                const pos = ray.geometry.attributes.position.array;
                
                // Point 1: Source
                pos[0] = x_s; pos[1] = 2; pos[2] = 0;
                
                // Point 2: Lens
                pos[3] = 0; pos[4] = 2 + lensYOffsets[index]; pos[5] = 0;
                
                // Point 3: Image (converging point)
                // If virtual image (v < 0), rays mathematically go backwards to form image.
                // Visually, we draw them to the calculated v position.
                pos[6] = visualV; pos[7] = 2; pos[8] = 0;
                
                ray.geometry.attributes.position.needsUpdate = true;
                ray.visible = state.raysVisible;
            });
        }

        // Initial update
        updateOptics();

        // --- Event Listeners ---
        
        document.getElementById('focal-slider').addEventListener('input', (e) => {
            window.__3D_STATE__.focalLength = parseFloat(e.target.value);
            updateOptics();
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            window.__3D_STATE__.focalLength = 3;
            window.__3D_STATE__.lightSourceX = -7;
            document.getElementById('focal-slider').value = 3;
            updateOptics();
        });

        document.getElementById('toggle-rays-btn').addEventListener('click', () => {
            window.__3D_STATE__.raysVisible = !window.__3D_STATE__.raysVisible;
            updateOptics();
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                window.__3D_STATE__.lightSourceX = Math.max(-9, window.__3D_STATE__.lightSourceX - 0.5);
                updateOptics();
            } else if (e.key === 'ArrowRight') {
                window.__3D_STATE__.lightSourceX = Math.min(-1, window.__3D_STATE__.lightSourceX + 0.5);
                updateOptics();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
