<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Lens Optics Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #info-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.7);
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 240px;
      line-height: 1.5;
      z-index: 10;
      font-size: 14px;
    }

    #controls-panel {
      position: absolute;
      top: 155px;
      left: 12px;
      background: rgba(0, 0, 0, 0.7);
      padding: 12px 14px;
      border-radius: 10px;
      z-index: 10;
      min-width: 240px;
    }

    #controls-panel label,
    #controls-panel button,
    #controls-panel input {
      display: block;
      width: 100%;
      margin-top: 8px;
    }

    #controls-panel button {
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #2d6cdf;
      color: white;
      cursor: pointer;
    }

    #controls-panel button:hover {
      background: #1f56b5;
    }

    #label-container {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      width: 100%;
      height: 100%;
      z-index: 5;
    }

    .scene-label {
      position: absolute;
      color: #dff6ff;
      font-size: 14px;
      font-weight: bold;
      text-shadow: 0 0 6px rgba(0,0,0,0.9);
      transform: translate(-50%, -50%);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="info-panel">
    <div id="focal-readout">Focal Length: 3.0 units</div>
    <div id="u-readout">Object Distance (u): 7.0 units</div>
    <div id="v-readout">Image Distance (v): 5.25 units</div>
    <div id="m-readout">Magnification: 0.75</div>
  </div>

  <div id="controls-panel">
    <label for="focal-slider">Adjust Focal Length</label>
    <input id="focal-slider" type="range" min="1.5" max="6" step="0.5" value="3" />
    <button id="toggle-rays-btn">Toggle Rays</button>
    <button id="reset-btn">Reset</button>
  </div>

  <div id="label-container">
    <div id="lens-label" class="scene-label">Lens</div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1b1b22);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 2, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const base = new THREE.Mesh(
      new THREE.BoxGeometry(20, 0.3, 10),
      new THREE.MeshStandardMaterial({ color: 0x8B7355 })
    );
    base.position.set(0, 0, 0);
    scene.add(base);

    const grid = new THREE.GridHelper(20, 20, 0x666666, 0x333333);
    grid.position.y = 0.16;
    scene.add(grid);

    let modelLoaded = false;
    let animationPlaying = false;
    let mixer = null;

    const loader = new GLTFLoader();
    loader.load(
      "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BoxAnimated/glTF-Binary/BoxAnimated.glb",
      (gltf) => {
        const model = gltf.scene;
        model.position.set(-8, 0.15, -3);
        model.scale.setScalar(0.5);
        scene.add(model);
        modelLoaded = true;

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(model);
          const action = mixer.clipAction(gltf.animations[0]);
          action.play();
          animationPlaying = true;
        }
      },
      undefined,
      (err) => {
        console.error("GLB load error:", err);
      }
    );

    const lightSource = new THREE.Mesh(
      new THREE.SphereGeometry(0.3, 24, 24),
      new THREE.MeshStandardMaterial({
        color: 0xffff00,
        emissive: 0xffdd33,
        emissiveIntensity: 1.5
      })
    );
    lightSource.position.set(-7, 2, 0);
    scene.add(lightSource);

    const pointGlow = new THREE.PointLight(0xffff00, 1, 10);
    pointGlow.position.copy(lightSource.position);
    scene.add(pointGlow);

    const lens = new THREE.Mesh(
      new THREE.CylinderGeometry(2, 2, 0.15, 64),
      new THREE.MeshStandardMaterial({
        color: 0x88ccff,
        transparent: true,
        opacity: 0.4,
        side: THREE.DoubleSide
      })
    );
    lens.rotation.z = Math.PI / 2;
    lens.position.set(0, 2, 0);
    scene.add(lens);

    const screen = new THREE.Mesh(
      new THREE.PlaneGeometry(3, 3),
      new THREE.MeshStandardMaterial({
        color: 0xffffff,
        side: THREE.DoubleSide
      })
    );
    screen.position.set(5, 2, 0);
    scene.add(screen);

    const axisMaterial = new THREE.LineDashedMaterial({
      color: 0xffffff,
      dashSize: 0.4,
      gapSize: 0.2
    });
    const axisPoints = [
      new THREE.Vector3(-9, 2, 0),
      new THREE.Vector3(9, 2, 0)
    ];
    const axisGeometry = new THREE.BufferGeometry().setFromPoints(axisPoints);
    const opticalAxis = new THREE.Line(axisGeometry, axisMaterial);
    opticalAxis.computeLineDistances();
    scene.add(opticalAxis);

    const raysGroup = new THREE.Group();
    scene.add(raysGroup);

    function createRayLine(points) {
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({ color: 0xffee44 });
      return new THREE.Line(geometry, material);
    }

    let focalLength = 3;
    let raysVisible = true;
    const defaultLightX = -7;

    const infoF = document.getElementById("focal-readout");
    const infoU = document.getElementById("u-readout");
    const infoV = document.getElementById("v-readout");
    const infoM = document.getElementById("m-readout");
    const focalSlider = document.getElementById("focal-slider");
    const resetBtn = document.getElementById("reset-btn");
    const toggleRaysBtn = document.getElementById("toggle-rays-btn");
    const lensLabel = document.getElementById("lens-label");

    function calculateU() {
      return Math.abs(lightSource.position.x);
    }

    function calculateV(f, u) {
      if (Math.abs(u - f) < 1e-6) return Infinity;
      return (f * u) / (u - f);
    }

    function updateRaysAndScreen() {
      const u = calculateU();
      const v = calculateV(focalLength, u);
      const m = v / u;

      let screenX = v;
      if (!Number.isFinite(screenX)) screenX = 9;
      screenX = THREE.MathUtils.clamp(screenX, -9, 9);

      screen.position.x = screenX;

      while (raysGroup.children.length) {
        const child = raysGroup.children.pop();
        child.geometry.dispose();
        child.material.dispose();
      }

      const source = lightSource.position.clone();

      const lensTop = new THREE.Vector3(0, 3.4, 0);
      const lensCenter = new THREE.Vector3(0, 2, 0);
      const lensBottom = new THREE.Vector3(0, 0.6, 0);

      const imagePoint = new THREE.Vector3(screen.position.x, 2, 0);

      const rays = [
        [source, lensTop, imagePoint],
        [source, lensCenter, imagePoint],
        [source, lensBottom, imagePoint]
      ];

      rays.forEach((pts) => {
        const line = createRayLine(pts);
        line.visible = raysVisible;
        raysGroup.add(line);
      });

      infoF.textContent = `Focal Length: ${focalLength.toFixed(1)} units`;
      infoU.textContent = `Object Distance (u): ${u.toFixed(1)} units`;
      infoV.textContent = `Image Distance (v): ${Number.isFinite(v) ? v.toFixed(2) : "∞"} units`;
      infoM.textContent = `Magnification: ${Number.isFinite(m) ? m.toFixed(2) : "∞"}`;

      window.__3D_STATE__.focalLength = focalLength;
      window.__3D_STATE__.objectDistance = u;
      window.__3D_STATE__.imageDistance = v;
      window.__3D_STATE__.magnification = m;
      window.__3D_STATE__.lightSourceX = lightSource.position.x;
      window.__3D_STATE__.screenX = screen.position.x;
      window.__3D_STATE__.raysVisible = raysVisible;
      window.__3D_STATE__.modelLoaded = modelLoaded;
      window.__3D_STATE__.animationPlaying = animationPlaying;
    }

    focalSlider.addEventListener("input", () => {
      focalLength = parseFloat(focalSlider.value);
      updateRaysAndScreen();
    });

    toggleRaysBtn.addEventListener("click", () => {
      raysVisible = !raysVisible;
      raysGroup.children.forEach(ray => ray.visible = raysVisible);
      updateRaysAndScreen();
    });

    resetBtn.addEventListener("click", () => {
      focalLength = 3;
      focalSlider.value = "3";
      lightSource.position.set(defaultLightX, 2, 0);
      pointGlow.position.copy(lightSource.position);
      updateRaysAndScreen();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") {
        lightSource.position.x = Math.max(-9, lightSource.position.x - 0.5);
      } else if (e.key === "ArrowRight") {
        lightSource.position.x = Math.min(-1, lightSource.position.x + 0.5);
      } else {
        return;
      }
      pointGlow.position.copy(lightSource.position);
      updateRaysAndScreen();
    });

    function updateLensLabel() {
      const pos = lens.position.clone();
      pos.y += 2.6;
      pos.project(camera);

      const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;

      lensLabel.style.left = `${x}px`;
      lensLabel.style.top = `${y}px`;
    }

    window.__3D_STATE__ = {
      focalLength: focalLength,
      objectDistance: calculateU(),
      imageDistance: calculateV(focalLength, calculateU()),
      magnification: calculateV(focalLength, calculateU()) / calculateU(),
      lightSourceX: lightSource.position.x,
      screenX: screen.position.x,
      raysVisible: raysVisible,
      modelLoaded: modelLoaded,
      animationPlaying: animationPlaying
    };

    updateRaysAndScreen();

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      if (mixer) mixer.update(delta);

      pointGlow.position.copy(lightSource.position);

      window.__3D_STATE__.modelLoaded = modelLoaded;
      window.__3D_STATE__.animationPlaying = animationPlaying;

      updateLensLabel();
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
