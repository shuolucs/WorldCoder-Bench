<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Miniature Lens Optics Diorama</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #info-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(100, 180, 255, 0.3);
    border-radius: 12px;
    padding: 20px;
    color: #e0e8ff;
    font-size: 14px;
    line-height: 1.8;
    min-width: 280px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
  }

  #info-panel h2 {
    margin-bottom: 10px;
    color: #7eb8ff;
    font-size: 16px;
    border-bottom: 1px solid rgba(100, 180, 255, 0.2);
    padding-bottom: 8px;
  }

  #info-panel .param {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
  }

  #info-panel .param .label { color: #a0b4d0; }
  #info-panel .param .value { color: #ffda6b; font-weight: bold; }

  .slider-container {
    margin-top: 15px;
    padding-top: 12px;
    border-top: 1px solid rgba(100, 180, 255, 0.2);
  }

  .slider-container label {
    display: block;
    margin-bottom: 8px;
    color: #a0b4d0;
    font-size: 13px;
  }

  #focal-slider {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(90deg, #2a4a7f, #7eb8ff);
    outline: none;
    cursor: pointer;
  }

  #focal-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #ffda6b;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(255, 218, 107, 0.5);
  }

  .btn-container {
    margin-top: 12px;
    display: flex;
    gap: 8px;
  }

  .btn-container button {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid rgba(100, 180, 255, 0.3);
    border-radius: 6px;
    background: rgba(40, 60, 100, 0.6);
    color: #c0d8ff;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-container button:hover {
    background: rgba(60, 90, 140, 0.8);
    border-color: rgba(100, 180, 255, 0.6);
  }

  #instructions {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 30, 0.7);
    border-radius: 8px;
    padding: 10px 20px;
    color: #8899bb;
    font-size: 12px;
    text-align: center;
    backdrop-filter: blur(5px);
  }
</style>
</head>
<body>

<div id="info-panel">
  <h2>🔬 Lens Optics Demo</h2>
  <div class="param"><span class="label">Focal Length (f):</span><span class="value" id="hud-focal">3.0 units</span></div>
  <div class="param"><span class="label">Object Distance (u):</span><span class="value" id="hud-u">7.0 units</span></div>
  <div class="param"><span class="label">Image Distance (v):</span><span class="value" id="hud-v">5.25 units</span></div>
  <div class="param"><span class="label">Magnification (m):</span><span class="value" id="hud-m">0.75</span></div>
  <div class="slider-container">
    <label>Adjust Focal Length: <span id="slider-val">3.0</span></label>
    <input type="range" id="focal-slider" min="1.5" max="6" step="0.5" value="3">
  </div>
  <div class="btn-container">
    <button id="reset-btn">🔄 Reset</button>
    <button id="toggle-rays-btn">💡 Toggle Rays</button>
  </div>
</div>

<div id="instructions">
  ← → Arrow Keys: Move light source &nbsp;|&nbsp; Mouse: Orbit camera &nbsp;|&nbsp; Scroll: Zoom
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ---- State ----
const state = {
  focalLength: 3,
  objectDistance: 7,
  imageDistance: 0,
  magnification: 0,
  lightSourceX: -7,
  screenX: 0,
  raysVisible: true,
  modelLoaded: false,
  animationPlaying: false
};
window.__3D_STATE__ = state;

const DEFAULT_FOCAL = 3;
const DEFAULT_LIGHT_X = -7;

// ---- Scene Setup ----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 1.5, 0);
controls.update();

// ---- Lights ----
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);

// ---- Diorama Base ----
const platformGeo = new THREE.BoxGeometry(20, 0.3, 10);
const platformMat = new THREE.MeshStandardMaterial({
  color: 0x8B7355,
  roughness: 0.7,
  metalness: 0.1
});
const platform = new THREE.Mesh(platformGeo, platformMat);
platform.position.y = 0;
platform.receiveShadow = true;
scene.add(platform);

// Add subtle grid on platform
const gridHelper = new THREE.GridHelper(18, 18, 0x5a4a3a, 0x5a4a3a);
gridHelper.position.y = 0.16;
scene.add(gridHelper);

// ---- Light Source (yellow sphere) ----
const lightSourceGeo = new THREE.SphereGeometry(0.3, 32, 32);
const lightSourceMat = new THREE.MeshStandardMaterial({
  color: 0xffdd44,
  emissive: 0xffdd44,
  emissiveIntensity: 2
});
const lightSourceMesh = new THREE.Mesh(lightSourceGeo, lightSourceMat);
lightSourceMesh.position.set(-7, 2, 0);
scene.add(lightSourceMesh);

// Glow effect for light source
const glowGeo = new THREE.SphereGeometry(0.5, 32, 32);
const glowMat = new THREE.MeshBasicMaterial({
  color: 0xffee88,
  transparent: true,
  opacity: 0.2
});
const glowMesh = new THREE.Mesh(glowGeo, glowMat);
lightSourceMesh.add(glowMesh);

const sourcePointLight = new THREE.PointLight(0xffdd44, 1, 10);
sourcePointLight.position.copy(lightSourceMesh.position);
scene.add(sourcePointLight);

// ---- Converging Lens ----
const lensGeo = new THREE.CylinderGeometry(2, 2, 0.15, 64);
const lensMat = new THREE.MeshPhysicalMaterial({
  color: 0x88ccff,
  transparent: true,
  opacity: 0.4,
  roughness: 0.05,
  metalness: 0.0,
  transmission: 0.6,
  thickness: 0.1,
  side: THREE.DoubleSide
});
const lensMesh = new THREE.Mesh(lensGeo, lensMat);
lensMesh.position.set(0, 2, 0);
lensMesh.rotation.x = Math.PI / 2;
scene.add(lensMesh);

// Lens edge ring
const lensEdgeGeo = new THREE.TorusGeometry(2, 0.05, 16, 64);
const lensEdgeMat = new THREE.MeshStandardMaterial({ color: 0x4488cc, metalness: 0.5 });
const lensEdge = new THREE.Mesh(lensEdgeGeo, lensEdgeMat);
lensEdge.position.set(0, 2, 0);
scene.add(lensEdge);

// Lens label
function createTextSprite(text, position) {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, 256, 64);
  ctx.font = 'bold 36px Arial';
  ctx.fillStyle = '#88ccff';
  ctx.textAlign = 'center';
  ctx.fillText(text, 128, 42);
  const texture = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.copy(position);
  sprite.scale.set(2, 0.5, 1);
  return sprite;
}

const lensLabel = createTextSprite('Lens', new THREE.Vector3(0, 4.3, 0));
scene.add(lensLabel);

const sourceLabel = createTextSprite('Source', new THREE.Vector3(-7, 3.2, 0));
scene.add(sourceLabel);

// ---- Image Screen ----
const screenGeo = new THREE.PlaneGeometry(3, 3);
const screenMat = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  side: THREE.DoubleSide,
  roughness: 0.9
});
const screenMesh = new THREE.Mesh(screenGeo, screenMat);
screenMesh.position.set(5, 2, 0);
screenMesh.rotation.y = Math.PI / 2;
scene.add(screenMesh);

// Screen frame
const frameGeo = new THREE.EdgesGeometry(screenGeo);
const frameMat = new THREE.LineBasicMaterial({ color: 0x888888 });
const screenFrame = new THREE.LineSegments(frameGeo, frameMat);
screenMesh.add(screenFrame);

const screenLabel = createTextSprite('Screen', new THREE.Vector3(5, 3.8, 0));
scene.add(screenLabel);

// ---- Optical Axis (dashed line) ----
const axisMat = new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 0.3, gapSize: 0.15, opacity: 0.5, transparent: true });
const axisGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(-9, 2, 0),
  new THREE.Vector3(9, 2, 0)
]);
const axisLine = new THREE.Line(axisGeo, axisMat);
axisLine.computeLineDistances();
scene.add(axisLine);

// Focal point markers
function createFocalMarker(x) {
  const markerGeo = new THREE.SphereGeometry(0.08, 16, 16);
  const markerMat = new THREE.MeshBasicMaterial({ color: 0xff6644 });
  const marker = new THREE.Mesh(markerGeo, markerMat);
  marker.position.set(x, 2, 0);
  return marker;
}

let focalMarkerLeft = createFocalMarker(-3);
let focalMarkerRight = createFocalMarker(3);
scene.add(focalMarkerLeft);
scene.add(focalMarkerRight);

// ---- Light Rays ----
const rayGroup = new THREE.Group();
scene.add(rayGroup);

const rayMaterial = new THREE.LineBasicMaterial({ color: 0xffdd44, linewidth: 2, transparent: true, opacity: 0.8 });

let rayLines = [];

function createRays() {
  // Clear existing
  rayLines.forEach(r => rayGroup.remove(r));
  rayLines = [];

  const srcX = state.lightSourceX;
  const srcY = 2;
  const lensX = 0;
  const lensY = 2;
  const scrX = state.screenX;

  const u = Math.abs(srcX);
  const v = state.imageDistance;
  const m = state.magnification;

  // Ray offsets on lens: top, center, bottom
  const offsets = [1.5, 0, -1.5];

  offsets.forEach(offset => {
    const points = [];
    // From source to lens at offset
    points.push(new THREE.Vector3(srcX, srcY, 0));
    points.push(new THREE.Vector3(lensX, lensY + offset, 0));

    // From lens to convergence point on screen
    // Image point: the image forms at scrX, and the y-position is determined by magnification
    // For a converging lens, the image is inverted
    // The image point y = lensY - offset * (v / u) ... but for a point source on axis, all rays converge to one point
    // Since source is on the optical axis, image is also on axis
    const imageY = lensY; // on-axis source -> on-axis image
    points.push(new THREE.Vector3(scrX, imageY, 0));

    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const line = new THREE.Line(geo, rayMaterial.clone());
    rayLines.push(line);
    rayGroup.add(line);
  });

  // Also add some spread rays for visual effect
  const spreadOffsets = [0.75, -0.75];
  spreadOffsets.forEach(offset => {
    const points = [
      new THREE.Vector3(srcX, srcY, 0),
      new THREE.Vector3(lensX, lensY + offset, 0),
      new THREE.Vector3(scrX, lensY, 0)
    ];
    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const mat = rayMaterial.clone();
    mat.opacity = 0.4;
    const line = new THREE.Line(geo, mat);
    rayLines.push(line);
    rayGroup.add(line);
  });
}

// ---- Thin Lens Calculation ----
function recalculate() {
  const f = state.focalLength;
  const u = Math.abs(state.lightSourceX); // object distance (positive)
  state.objectDistance = u;

  // 1/f = 1/v + 1/u  =>  v = (f * u) / (u - f)
  if (u <= f) {
    // Virtual image case - place screen far
    state.imageDistance = 20;
  } else {
    state.imageDistance = (f * u) / (u - f);
  }

  state.magnification = state.imageDistance / u;
  state.screenX = state.imageDistance; // v is distance from lens (at x=0) to image

  // Clamp screen position
  if (state.screenX > 9) state.screenX = 9;
  if (state.screenX < 0.5) state.screenX = 0.5;

  // Update 3D objects
  lightSourceMesh.position.x = state.lightSourceX;
  sourcePointLight.position.x = state.lightSourceX;
  sourceLabel.position.x = state.lightSourceX;

  screenMesh.position.x = state.screenX;
  screenLabel.position.x = state.screenX;

  // Update focal markers
  focalMarkerLeft.position.x = -f;
  focalMarkerRight.position.x = f;

  // Recreate rays
  createRays();
  rayGroup.visible = state.raysVisible;

  // Update HUD
  updateHUD();
}

function updateHUD() {
  document.getElementById('hud-focal').textContent = state.focalLength.toFixed(1) + ' units';
  document.getElementById('hud-u').textContent = state.objectDistance.toFixed(2) + ' units';
  document.getElementById('hud-v').textContent = state.imageDistance.toFixed(2) + ' units';
  document.getElementById('hud-m').textContent = state.magnification.toFixed(3);
  document.getElementById('slider-val').textContent = state.focalLength.toFixed(1);
}

// ---- Load GLTF Model ----
let mixer = null;
const clock = new THREE.Clock();

const loader = new GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BoxAnimated/glTF-Binary/BoxAnimated.glb',
  (gltf) => {
    const model = gltf.scene;
    model.position.set(-8, 0.15, -3);
    model.scale.set(0.5, 0.5, 0.5);
    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(model);
    state.modelLoaded = true;

    if (gltf.animations && gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(model);
      const action = mixer.clipAction(gltf.animations[0]);
      action.play();
      state.animationPlaying = true;
    }
  },
  undefined,
  (error) => {
    console.error('Error loading GLTF model:', error);
  }
);

// ---- Add some decorative elements ----
// Small stands/posts for the optical elements
function createPost(x, height) {
  const postGeo = new THREE.CylinderGeometry(0.06, 0.06, height, 8);
  const postMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.8, roughness: 0.3 });
  const post = new THREE.Mesh(postGeo, postMat);
  post.position.set(x, height / 2 + 0.15, 0);
  return post;
}

scene.add(createPost(-7, 1.7));
scene.add(createPost(0, 1.7));
scene.add(createPost(state.screenX, 1.7));

// Base plates
function createBasePlate(x) {
  const geo = new THREE.CylinderGeometry(0.4, 0.5, 0.1, 16);
  const mat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.6 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, 0.2, 0);
  return mesh;
}
scene.add(createBasePlate(-7));
scene.add(createBasePlate(0));
scene.add(createBasePlate(state.screenX));

// ---- Event Handlers ----
const focalSlider = document.getElementById('focal-slider');
focalSlider.addEventListener('input', (e) => {
  state.focalLength = parseFloat(e.target.value);
  recalculate();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  state.focalLength = DEFAULT_FOCAL;
  state.lightSourceX = DEFAULT_LIGHT_X;
  focalSlider.value = DEFAULT_FOCAL;
  recalculate();
});

document.getElementById('toggle-rays-btn').addEventListener('click', () => {
  state.raysVisible = !state.raysVisible;
  rayGroup.visible = state.raysVisible;
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') {
    state.lightSourceX = Math.max(-9, state.lightSourceX - 0.5);
    recalculate();
  } else if (e.key === 'ArrowRight') {
    state.lightSourceX = Math.min(-1, state.lightSourceX + 0.5);
    recalculate();
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---- Initial Calculation ----
recalculate();

// ---- Animation Loop ----
function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  if (mixer) mixer.update(delta);

  // Animate glow
  const time = clock.getElapsedTime();
  glowMesh.scale.setScalar(1 + 0.15 * Math.sin(time * 3));
  glowMat.opacity = 0.15 + 0.08 * Math.sin(time * 3);

  // Pulse the light source slightly
  lightSourceMat.emissiveIntensity = 1.5 + 0.5 * Math.sin(time * 2);

  controls.update();

  // Update state every frame
  window.__3D_STATE__ = { ...state };

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
