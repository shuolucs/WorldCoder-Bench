<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laptop Comparison Tool</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
  canvas { display: block; }

  #comparison-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10, 10, 30, 0.92);
    backdrop-filter: blur(10px);
    border-top: 2px solid rgba(255,255,255,0.15);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px;
    z-index: 100;
    color: #fff;
  }

  .player-info {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    border-radius: 8px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .player-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    display: inline-block;
    box-shadow: 0 0 8px currentColor;
  }

  .player-dot.p1 { background: #ff4444; color: #ff4444; }
  .player-dot.p2 { background: #4488ff; color: #4488ff; }

  .player-label { font-weight: 600; font-size: 13px; }
  .player-selection { font-size: 14px; color: #ccc; }

  #compare-btn, #reset-btn {
    padding: 10px 24px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #compare-btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
  }
  #compare-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6); }

  #reset-btn {
    background: rgba(255,255,255,0.1);
    color: #ccc;
    border: 1px solid rgba(255,255,255,0.2);
  }
  #reset-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

  #match-indicator {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #ffd700;
    font-size: 36px;
    font-weight: 900;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.7), 0 0 40px rgba(255, 215, 0, 0.4);
    z-index: 100;
    display: none;
    animation: matchPulse 1s ease-in-out infinite;
    letter-spacing: 4px;
  }

  @keyframes matchPulse {
    0%, 100% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.1); }
  }

  #spec-tooltip {
    position: fixed;
    display: none;
    background: rgba(10, 10, 35, 0.95);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 16px 20px;
    color: #fff;
    z-index: 200;
    min-width: 220px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    pointer-events: none;
  }

  #spec-tooltip h3 {
    margin-bottom: 10px;
    font-size: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding-bottom: 8px;
  }

  #spec-tooltip .spec-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 13px;
  }

  #spec-tooltip .spec-label { color: #999; }
  #spec-tooltip .spec-value { color: #eee; font-weight: 600; }

  .laptop-label-3d {
    position: fixed;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    pointer-events: none;
    z-index: 50;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    letter-spacing: 1px;
  }

  #instructions {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    z-index: 100;
    line-height: 1.8;
    background: rgba(0,0,0,0.4);
    padding: 12px 16px;
    border-radius: 8px;
  }

  #instructions kbd {
    background: rgba(255,255,255,0.15);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: monospace;
    font-size: 12px;
  }
</style>
</head>
<body>

<div id="match-indicator">⭐ MATCH! ⭐</div>

<div id="spec-tooltip">
  <h3 id="spec-title">Laptop</h3>
  <div class="spec-row"><span class="spec-label">CPU</span><span class="spec-value" id="spec-cpu"></span></div>
  <div class="spec-row"><span class="spec-label">RAM</span><span class="spec-value" id="spec-ram"></span></div>
  <div class="spec-row"><span class="spec-label">Storage</span><span class="spec-value" id="spec-storage"></span></div>
  <div class="spec-row"><span class="spec-label">Display</span><span class="spec-value" id="spec-display"></span></div>
  <div class="spec-row"><span class="spec-label">Price</span><span class="spec-value" id="spec-price"></span></div>
</div>

<div id="instructions">
  <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> Select laptop (Player 1)<br>
  Click laptop card for specs<br>
  Click truck to toggle spin
</div>

<div id="comparison-panel">
  <div class="player-info">
    <span class="player-dot p1"></span>
    <div>
      <div class="player-label">Player 1</div>
      <div class="player-selection" id="p1-selection">ProBook 15</div>
    </div>
  </div>

  <button id="compare-btn">Compare</button>
  <button id="reset-btn">Reset</button>

  <div class="player-info">
    <span class="player-dot p2"></span>
    <div>
      <div class="player-label">Player 2</div>
      <div class="player-selection" id="p2-selection">UltraSlim 14</div>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
  modelLoaded: false,
  player1Selection: 0,
  player2Selection: 1,
  isComparing: false,
  truckSpinning: false,
  matchDetected: false,
  selectedSpecLaptop: -1,
  player2AutoSelectCount: 0,
  laptopPositions: [
    { x: -3, y: 3, z: 0 },
    { x: 0, y: 3, z: 0 },
    { x: 3, y: 3, z: 0 }
  ],
  frameCount: 0
};

const laptopNames = ['ProBook 15', 'UltraSlim 14', 'GameMaster 17'];
const laptopColors = [0x2196F3, 0x4CAF50, 0xFF9800];
const laptopSpecs = [
  { cpu: 'Intel i7-13700H', ram: '32GB DDR5', storage: '1TB NVMe SSD', display: '15.6" 2K IPS', price: '$1,299' },
  { cpu: 'AMD Ryzen 7 7840U', ram: '16GB LPDDR5', storage: '512GB NVMe SSD', display: '14" OLED 2.8K', price: '$1,099' },
  { cpu: 'Intel i9-13900HX', ram: '64GB DDR5', storage: '2TB NVMe SSD', display: '17.3" 4K 144Hz', price: '$2,499' }
];

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 30, 80);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(5, 5, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1.5, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
directionalLight.shadow.camera.near = 0.5;
directionalLight.shadow.camera.far = 50;
directionalLight.shadow.camera.left = -15;
directionalLight.shadow.camera.right = 15;
directionalLight.shadow.camera.top = 15;
directionalLight.shadow.camera.bottom = -15;
scene.add(directionalLight);

// Extra fill light
const fillLight = new THREE.PointLight(0x6666ff, 0.3, 30);
fillLight.position.set(-5, 8, -5);
scene.add(fillLight);

// Ground plane
const groundGeom = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8, metalness: 0.2 });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const grid = new THREE.GridHelper(100, 100, 0x555555, 0x333333);
grid.position.y = 0.01;
scene.add(grid);

// Truck model
let truckModel = null;
let truckGroup = new THREE.Group();
scene.add(truckGroup);

const loader = new GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/CesiumMilkTruck/glTF-Binary/CesiumMilkTruck.glb',
  (gltf) => {
    truckModel = gltf.scene;
    truckModel.position.set(0, 0, 0);
    truckModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    truckGroup.add(truckModel);
    window.__3D_STATE__.modelLoaded = true;
  },
  undefined,
  (error) => {
    console.error('Error loading truck model:', error);
    // Create a placeholder truck
    const placeholderGeom = new THREE.BoxGeometry(3, 1.5, 1.5);
    const placeholderMat = new THREE.MeshStandardMaterial({ color: 0xcc3333 });
    const placeholder = new THREE.Mesh(placeholderGeom, placeholderMat);
    placeholder.position.y = 0.75;
    placeholder.castShadow = true;
    truckGroup.add(placeholder);
    truckModel = placeholder;
    window.__3D_STATE__.modelLoaded = true;
  }
);

// Laptop cards
const laptopCards = [];
const laptopBasePositions = [
  new THREE.Vector3(-3, 3, 0),
  new THREE.Vector3(0, 3, 0),
  new THREE.Vector3(3, 3, 0)
];

for (let i = 0; i < 3; i++) {
  const group = new THREE.Group();

  // Main card
  const cardGeom = new THREE.BoxGeometry(2, 0.1, 1.5);
  const cardMat = new THREE.MeshStandardMaterial({
    color: laptopColors[i],
    roughness: 0.3,
    metalness: 0.6,
    emissive: new THREE.Color(laptopColors[i]),
    emissiveIntensity: 0.1
  });
  const card = new THREE.Mesh(cardGeom, cardMat);
  card.castShadow = true;
  group.add(card);

  // Screen part (slightly angled)
  const screenGeom = new THREE.BoxGeometry(1.8, 0.05, 1.2);
  const screenMat = new THREE.MeshStandardMaterial({
    color: 0x111122,
    roughness: 0.1,
    metalness: 0.8,
    emissive: new THREE.Color(laptopColors[i]),
    emissiveIntensity: 0.05
  });
  const screen = new THREE.Mesh(screenGeom, screenMat);
  screen.position.set(0, 0.08, -0.1);
  screen.rotation.x = -0.3;
  group.add(screen);

  // Glow ring beneath
  const ringGeom = new THREE.RingGeometry(0.8, 1.0, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: laptopColors[i],
    transparent: true,
    opacity: 0.3,
    side: THREE.DoubleSide
  });
  const ring = new THREE.Mesh(ringGeom, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = -0.5;
  group.add(ring);

  // Connection line to ground
  const lineGeom = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, -0.5, 0),
    new THREE.Vector3(0, -3, 0)
  ]);
  const lineMat = new THREE.LineBasicMaterial({
    color: laptopColors[i],
    transparent: true,
    opacity: 0.3
  });
  const line = new THREE.Line(lineGeom, lineMat);
  group.add(line);

  group.position.copy(laptopBasePositions[i]);
  group.userData = { index: i, isLaptop: true };
  scene.add(group);
  laptopCards.push(group);
}

// Player selection rings on ground
const playerRings = [];
const playerColors = [0xff4444, 0x4488ff];

for (let p = 0; p < 2; p++) {
  const ringGeom = new THREE.RingGeometry(1.1 + p * 0.15, 1.3 + p * 0.15, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: playerColors[p],
    transparent: true,
    opacity: 0.6,
    side: THREE.DoubleSide
  });
  const ring = new THREE.Mesh(ringGeom, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.02 + p * 0.01;
  scene.add(ring);
  playerRings.push(ring);
}

// Create floating labels
const labelElements = [];
for (let i = 0; i < 3; i++) {
  const label = document.createElement('div');
  label.className = 'laptop-label-3d';
  label.textContent = laptopNames[i];
  label.style.color = '#' + laptopColors[i].toString(16).padStart(6, '0');
  document.body.appendChild(label);
  labelElements.push(label);
}

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function updateSelectionUI() {
  const state = window.__3D_STATE__;
  document.getElementById('p1-selection').textContent = laptopNames[state.player1Selection];
  document.getElementById('p2-selection').textContent = laptopNames[state.player2Selection];

  // Update player rings positions
  playerRings[0].position.x = laptopBasePositions[state.player1Selection].x;
  playerRings[0].position.z = laptopBasePositions[state.player1Selection].z;
  playerRings[1].position.x = laptopBasePositions[state.player2Selection].x;
  playerRings[1].position.z = laptopBasePositions[state.player2Selection].z;

  // Match detection
  state.matchDetected = state.player1Selection === state.player2Selection;
  document.getElementById('match-indicator').style.display = state.matchDetected ? 'block' : 'none';
}

function applyCompareHighlight() {
  const state = window.__3D_STATE__;
  laptopCards.forEach((group, i) => {
    const cardMesh = group.children[0];
    const screenMesh = group.children[1];
    if (state.isComparing) {
      const isSelected = (i === state.player1Selection || i === state.player2Selection);
      if (isSelected) {
        cardMesh.material.emissiveIntensity = 0.6;
        screenMesh.material.emissiveIntensity = 0.4;
        group.scale.setScalar(1.1);
      } else {
        cardMesh.material.emissiveIntensity = 0.02;
        cardMesh.material.opacity = 0.4;
        cardMesh.material.transparent = true;
        screenMesh.material.emissiveIntensity = 0.0;
        group.scale.setScalar(0.85);
      }
    } else {
      cardMesh.material.emissiveIntensity = 0.1;
      cardMesh.material.transparent = false;
      cardMesh.material.opacity = 1.0;
      screenMesh.material.emissiveIntensity = 0.05;
      group.scale.setScalar(1.0);
    }
  });
}

function resetAll() {
  const state = window.__3D_STATE__;
  state.player1Selection = 0;
  state.player2Selection = 1;
  state.isComparing = false;
  state.selectedSpecLaptop = -1;
  document.getElementById('spec-tooltip').style.display = 'none';
  applyCompareHighlight();
  updateSelectionUI();
}

function showSpecTooltip(index, screenX, screenY) {
  const tooltip = document.getElementById('spec-tooltip');
  const spec = laptopSpecs[index];
  document.getElementById('spec-title').textContent = laptopNames[index];
  document.getElementById('spec-title').style.color = '#' + laptopColors[index].toString(16).padStart(6, '0');
  document.getElementById('spec-cpu').textContent = spec.cpu;
  document.getElementById('spec-ram').textContent = spec.ram;
  document.getElementById('spec-storage').textContent = spec.storage;
  document.getElementById('spec-display').textContent = spec.display;
  document.getElementById('spec-price').textContent = spec.price;

  tooltip.style.display = 'block';
  tooltip.style.left = Math.min(screenX + 15, window.innerWidth - 250) + 'px';
  tooltip.style.top = Math.max(screenY - 100, 10) + 'px';
  tooltip.style.borderColor = '#' + laptopColors[index].toString(16).padStart(6, '0');

  window.__3D_STATE__.selectedSpecLaptop = index;
}

// Event listeners
document.addEventListener('keydown', (e) => {
  if (e.key === '1') {
    window.__3D_STATE__.player1Selection = 0;
    updateSelectionUI();
    if (window.__3D_STATE__.isComparing) applyCompareHighlight();
  } else if (e.key === '2') {
    window.__3D_STATE__.player1Selection = 1;
    updateSelectionUI();
    if (window.__3D_STATE__.isComparing) applyCompareHighlight();
  } else if (e.key === '3') {
    window.__3D_STATE__.player1Selection = 2;
    updateSelectionUI();
    if (window.__3D_STATE__.isComparing) applyCompareHighlight();
  }
});

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Check laptop cards
  const laptopMeshes = [];
  laptopCards.forEach(group => {
    group.traverse(child => {
      if (child.isMesh) laptopMeshes.push(child);
    });
  });

  const laptopIntersects = raycaster.intersectObjects(laptopMeshes, false);
  if (laptopIntersects.length > 0) {
    let clickedGroup = laptopIntersects[0].object.parent;
    if (clickedGroup.userData.isLaptop) {
      showSpecTooltip(clickedGroup.userData.index, event.clientX, event.clientY);
      return;
    }
  }

  // Check truck
  if (truckModel) {
    const truckMeshes = [];
    truckGroup.traverse(child => {
      if (child.isMesh) truckMeshes.push(child);
    });
    const truckIntersects = raycaster.intersectObjects(truckMeshes, false);
    if (truckIntersects.length > 0) {
      window.__3D_STATE__.truckSpinning = !window.__3D_STATE__.truckSpinning;
      return;
    }
  }

  // Clicked elsewhere - hide tooltip
  document.getElementById('spec-tooltip').style.display = 'none';
  window.__3D_STATE__.selectedSpecLaptop = -1;
});

document.getElementById('compare-btn').addEventListener('click', () => {
  window.__3D_STATE__.isComparing = true;
  applyCompareHighlight();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  resetAll();
});

// Player 2 auto-select
setInterval(() => {
  const state = window.__3D_STATE__;
  const newSelection = Math.floor(Math.random() * 3);
  state.player2Selection = newSelection;
  state.player2AutoSelectCount++;
  updateSelectionUI();
  if (state.isComparing) applyCompareHighlight();
}, 5000);

// Window resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize UI
updateSelectionUI();

// Helper to project 3D to screen
function toScreenPosition(obj, cam) {
  const vector = new THREE.Vector3();
  obj.getWorldPosition(vector);
  vector.y += 0.5;
  vector.project(cam);
  return {
    x: (vector.x * 0.5 + 0.5) * window.innerWidth,
    y: (-vector.y * 0.5 + 0.5) * window.innerHeight
  };
}

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const elapsed = clock.getElapsedTime();
  const delta = clock.getDelta();
  const state = window.__3D_STATE__;

  state.frameCount++;

  // Laptop bobbing
  for (let i = 0; i < laptopCards.length; i++) {
    const baseY = laptopBasePositions[i].y;
    const phase = i * (Math.PI * 2 / 3);
    laptopCards[i].position.y = baseY + Math.sin(elapsed * 1.5 + phase) * 0.2;

    // Slight rotation
    laptopCards[i].rotation.y = Math.sin(elapsed * 0.5 + phase) * 0.1;

    // Update state positions
    const worldPos = new THREE.Vector3();
    laptopCards[i].getWorldPosition(worldPos);
    state.laptopPositions[i] = { x: worldPos.x, y: worldPos.y, z: worldPos.z };
  }

  // Truck spinning
  if (state.truckSpinning) {
    truckGroup.rotation.y += 0.5 * (1 / 60);
  }

  // Player ring animation
  playerRings.forEach((ring, p) => {
    ring.material.opacity = 0.4 + Math.sin(elapsed * 3 + p * Math.PI) * 0.2;
    const s = 1.0 + Math.sin(elapsed * 2 + p * Math.PI) * 0.05;
    ring.scale.set(s, s, s);
  });

  // Update floating labels
  for (let i = 0; i < laptopCards.length; i++) {
    const pos = toScreenPosition(laptopCards[i], camera);
    labelElements[i].style.left = pos.x + 'px';
    labelElements[i].style.top = (pos.y - 40) + 'px';
    labelElements[i].style.transform = 'translate(-50%, -50%)';
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
