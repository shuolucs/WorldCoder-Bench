<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Laptop Comparison</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #comparison-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.85);
            padding: 15px 30px;
            border-radius: 10px;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            min-width: 300px;
        }
        .players-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 20px;
        }
        .player-stat {
            text-align: center;
        }
        .p1-color { color: #ff4444; font-weight: bold; }
        .p2-color { color: #4444ff; font-weight: bold; }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }
        button {
            background: #333;
            color: white;
            border: 1px solid #666;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #555; }
        #compare-btn { background: #2196F3; border-color: #1976D2; }
        #compare-btn:hover { background: #1976D2; }
        #match-indicator {
            position: absolute;
            top: -40px;
            color: gold;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            display: none;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        #spec-tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #666;
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -100%);
            margin-top: -20px;
            z-index: 10;
            min-width: 150px;
        }
        #spec-tooltip h3 { margin: 0 0 5px 0; font-size: 16px; border-bottom: 1px solid #444; padding-bottom: 5px;}
        #spec-tooltip p { margin: 3px 0; font-size: 14px; color: #ccc; }
        .instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            color: #aaa;
            pointer-events: none;
        }
    </style>
    <!-- Load Three.js and dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="instructions">
        Controls:<br>
        - Left Click + Drag: Rotate Camera<br>
        - Keys 1, 2, 3: Player 1 Select Laptop<br>
        - Click Truck: Toggle Rotation<br>
        - Click Laptop: View Specs
    </div>

    <div id="comparison-panel">
        <div id="match-indicator">MATCH!</div>
        <div class="players-info">
            <div class="player-stat">
                <div class="p1-color">Player 1 (You)</div>
                <div id="p1-selection-text">ProBook 15</div>
            </div>
            <div class="player-stat">
                <div class="p2-color">Player 2 (Auto)</div>
                <div id="p2-selection-text">UltraSlim 14</div>
            </div>
        </div>
        <div class="controls">
            <button id="compare-btn">Compare</button>
            <button id="reset-btn">Reset</button>
        </div>
    </div>

    <div id="spec-tooltip">
        <h3 id="spec-title">Laptop Name</h3>
        <p id="spec-cpu">CPU: ...</p>
        <p id="spec-ram">RAM: ...</p>
        <p id="spec-price">Price: ...</p>
    </div>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            player1Selection: 0,
            player2Selection: 1,
            isComparing: false,
            truckSpinning: false,
            matchDetected: false,
            selectedSpecLaptop: -1,
            player2AutoSelectCount: 0,
            laptopPositions: [
                {x: 0, y: 0, z: 0},
                {x: 0, y: 0, z: 0},
                {x: 0, y: 0, z: 0}
            ],
            frameCount: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        scene.add(ground);

        // --- Truck Model ---
        let truckGroup = new THREE.Group();
        scene.add(truckGroup);
        
        const loader = new THREE.GLTFLoader();
        const truckUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/CesiumMilkTruck/glTF-Binary/CesiumMilkTruck.glb';
        
        loader.load(truckUrl, (gltf) => {
            const model = gltf.scene;
            // Center and scale slightly if needed, but prompt says place at 0,0,0
            model.position.set(0, 0, 0);
            truckGroup.add(model);
            window.__3D_STATE__.modelLoaded = true;
        }, undefined, (error) => {
            console.error('Error loading truck model:', error);
        });

        // --- Laptop System ---
        const laptopData = [
            { id: 0, name: 'ProBook 15', color: 0x2196F3, pos: new THREE.Vector3(-3, 3, 0), specs: { cpu: 'Intel i7', ram: '16GB', price: '$1,299' } },
            { id: 1, name: 'UltraSlim 14', color: 0x4CAF50, pos: new THREE.Vector3(0, 3, 0), specs: { cpu: 'AMD Ryzen 7', ram: '16GB', price: '$1,099' } },
            { id: 2, name: 'GameMaster 17', color: 0xFF9800, pos: new THREE.Vector3(3, 3, 0), specs: { cpu: 'Intel i9', ram: '32GB', price: '$2,499' } }
        ];

        const laptops = [];
        const laptopMeshes = []; // For raycasting

        function createLabelTexture(text, bgColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 30px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        laptopData.forEach((data, index) => {
            const geo = new THREE.BoxGeometry(2, 0.1, 1.5);
            
            const labelTexture = createLabelTexture(data.name, '#' + data.color.toString(16).padStart(6, '0'));
            
            const materials = [
                new THREE.MeshStandardMaterial({ color: data.color }), // right
                new THREE.MeshStandardMaterial({ color: data.color }), // left
                new THREE.MeshStandardMaterial({ map: labelTexture }), // top
                new THREE.MeshStandardMaterial({ color: data.color }), // bottom
                new THREE.MeshStandardMaterial({ color: data.color }), // front
                new THREE.MeshStandardMaterial({ color: data.color })  // back
            ];

            const mesh = new THREE.Mesh(geo, materials);
            mesh.position.copy(data.pos);
            mesh.userData = { isLaptop: true, id: index, baseColor: data.color, specs: data.specs, name: data.name };
            
            scene.add(mesh);
            laptops.push({ mesh: mesh, phase: Math.random() * Math.PI * 2, data: data });
            laptopMeshes.push(mesh);
        });

        // --- Player Rings ---
        function createRing(color, radius) {
            const geo = new THREE.RingGeometry(radius, radius + 0.1, 32);
            const mat = new THREE.MeshBasicMaterial({ color: color, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.position.y = 0.02; // Slightly above ground
            scene.add(mesh);
            return mesh;
        }

        const p1Ring = createRing(0xff4444, 1.2);
        const p2Ring = createRing(0x4444ff, 1.4);

        // --- Interaction & DOM Elements ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        const p1Text = document.getElementById('p1-selection-text');
        const p2Text = document.getElementById('p2-selection-text');
        const matchIndicator = document.getElementById('match-indicator');
        const compareBtn = document.getElementById('compare-btn');
        const resetBtn = document.getElementById('reset-btn');
        const tooltip = document.getElementById('spec-tooltip');

        // Keyboard controls for Player 1
        window.addEventListener('keydown', (e) => {
            if (e.key === '1') window.__3D_STATE__.player1Selection = 0;
            if (e.key === '2') window.__3D_STATE__.player1Selection = 1;
            if (e.key === '3') window.__3D_STATE__.player1Selection = 2;
            updateComparisonVisuals();
        });

        // Raycasting for Clicks
        window.addEventListener('pointerdown', (e) => {
            // Don't raycast if clicking UI
            if (e.target.tagName === 'BUTTON' || e.target.closest('#comparison-panel')) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Check laptops
            const laptopIntersects = raycaster.intersectObjects(laptopMeshes);
            if (laptopIntersects.length > 0) {
                const laptop = laptopIntersects[0].object;
                window.__3D_STATE__.selectedSpecLaptop = laptop.userData.id;
                showTooltip(laptop.userData);
                return;
            } else {
                window.__3D_STATE__.selectedSpecLaptop = -1;
                tooltip.style.display = 'none';
            }

            // Check truck
            if (window.__3D_STATE__.modelLoaded) {
                // Intersect against children of the truck group
                const truckIntersects = raycaster.intersectObjects(truckGroup.children, true);
                if (truckIntersects.length > 0) {
                    window.__3D_STATE__.truckSpinning = !window.__3D_STATE__.truckSpinning;
                }
            }
        });

        function showTooltip(data) {
            document.getElementById('spec-title').innerText = data.name;
            document.getElementById('spec-cpu').innerText = 'CPU: ' + data.specs.cpu;
            document.getElementById('spec-ram').innerText = 'RAM: ' + data.specs.ram;
            document.getElementById('spec-price').innerText = 'Price: ' + data.specs.price;
            tooltip.style.display = 'block';
        }

        // Buttons
        compareBtn.addEventListener('click', () => {
            window.__3D_STATE__.isComparing = true;
            updateComparisonVisuals();
        });

        resetBtn.addEventListener('click', () => {
            window.__3D_STATE__.isComparing = false;
            window.__3D_STATE__.player1Selection = 0;
            window.__3D_STATE__.player2Selection = 1;
            updateComparisonVisuals();
        });

        function updateComparisonVisuals() {
            const state = window.__3D_STATE__;
            
            laptops.forEach((l, index) => {
                const isSelected = (index === state.player1Selection || index === state.player2Selection);
                const mesh = l.mesh;
                
                mesh.material.forEach((mat, matIndex) => {
                    if (state.isComparing) {
                        if (isSelected) {
                            // Highlight
                            mat.color.setHex(mesh.userData.baseColor);
                            mat.emissive.setHex(mesh.userData.baseColor);
                            mat.emissiveIntensity = 0.4;
                        } else {
                            // Dim
                            mat.color.setHex(0x333333);
                            mat.emissive.setHex(0x000000);
                        }
                    } else {
                        // Reset
                        mat.color.setHex(mesh.userData.baseColor);
                        mat.emissive.setHex(0x000000);
                    }
                });
            });
        }

        // --- Simulation Logic ---
        let lastP2Time = 0;
        const clock = new THREE.Clock();

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            const state = window.__3D_STATE__;
            const time = clock.getElapsedTime();
            const delta = clock.getDelta(); // Note: getDelta() resets, so use time for continuous functions

            state.frameCount++;

            // Player 2 Auto-select
            if (time - lastP2Time > 5) {
                state.player2Selection = Math.floor(Math.random() * 3);
                state.player2AutoSelectCount++;
                lastP2Time = time;
                if(state.isComparing) updateComparisonVisuals();
            }

            // Bobbing Laptops
            laptops.forEach((l, i) => {
                const baseY = l.data.pos.y;
                l.mesh.position.y = baseY + Math.sin(time * 2 + l.phase) * 0.2;
                
                // Update state positions
                state.laptopPositions[i].x = l.mesh.position.x;
                state.laptopPositions[i].y = l.mesh.position.y;
                state.laptopPositions[i].z = l.mesh.position.z;
            });

            // Truck Spin
            if (state.truckSpinning) {
                truckGroup.rotation.y += 0.5 * (1/60); // Approx 0.5 rad/s assuming 60fps
            }

            // Update Rings
            const p1Target = laptops[state.player1Selection].mesh.position;
            const p2Target = laptops[state.player2Selection].mesh.position;
            
            // Smooth follow for rings
            p1Ring.position.x += (p1Target.x - p1Ring.position.x) * 0.1;
            p1Ring.position.z += (p1Target.z - p1Ring.position.z) * 0.1;
            
            p2Ring.position.x += (p2Target.x - p2Ring.position.x) * 0.1;
            p2Ring.position.z += (p2Target.z - p2Ring.position.z) * 0.1;

            // Update HUD
            p1Text.innerText = laptopData[state.player1Selection].name;
            p2Text.innerText = laptopData[state.player2Selection].name;

            state.matchDetected = (state.player1Selection === state.player2Selection);
            matchIndicator.style.display = state.matchDetected ? 'block' : 'none';

            // Update Tooltip Position
            if (state.selectedSpecLaptop !== -1) {
                const targetMesh = laptops[state.selectedSpecLaptop].mesh;
                const pos = targetMesh.position.clone();
                pos.y += 0.5; // Offset above laptop
                pos.project(camera);
                
                const x = (pos.x * .5 + .5) * window.innerWidth;
                const y = (pos.y * -.5 + .5) * window.innerHeight;
                
                tooltip.style.left = `${x}px`;
                tooltip.style.top = `${y}px`;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        updateComparisonVisuals();
        animate();

    </script>
</body>
</html>
