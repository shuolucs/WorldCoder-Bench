<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Multiplayer Laptop Comparison Tool</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #comparison-panel {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      width: min(720px, 90vw);
      background: rgba(20, 20, 20, 0.88);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    #comparison-panel .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    #comparison-panel .info {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      font-size: 14px;
    }

    #comparison-panel button {
      background: #2d2d2d;
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    #comparison-panel button:hover {
      background: #3b3b3b;
    }

    #match-indicator {
      display: none;
      margin-top: 10px;
      font-size: 20px;
      font-weight: 700;
      color: gold;
      text-align: center;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
    }

    #spec-tooltip {
      position: fixed;
      display: none;
      min-width: 180px;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 10px 12px;
      z-index: 11;
      pointer-events: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.45);
      font-size: 13px;
      line-height: 1.4;
    }

    #hint {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      padding: 10px 12px;
      background: rgba(0,0,0,0.6);
      border-radius: 8px;
      font-size: 13px;
      color: #ddd;
      line-height: 1.5;
      max-width: 340px;
    }
  </style>
</head>
<body>
  <div id="hint">
    <strong>Controls</strong><br>
    Keys: <b>1</b>, <b>2</b>, <b>3</b> = Player 1 select laptop<br>
    Click truck = toggle spin<br>
    Click laptop card = show specs<br>
    Click elsewhere = hide specs
  </div>

  <div id="comparison-panel">
    <div class="row">
      <div class="info">
        <div id="p1-selection">Player 1: ProBook 15</div>
        <div id="p2-selection">Player 2: UltraSlim 14</div>
      </div>
      <div class="actions">
        <button id="compare-btn">Compare</button>
        <button id="reset-btn">Reset</button>
      </div>
    </div>
    <div id="match-indicator">MATCH!</div>
  </div>

  <div id="spec-tooltip"></div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(5, 5, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.5, 0);

    // Ground
    const groundGeo = new THREE.PlaneGeometry(100, 100);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    // Truck
    const loader = new GLTFLoader();
    let truckModel = null;
    let truckSpinning = false;

    loader.load(
      'CesiumMilkTruck.glb',
      (gltf) => {
        truckModel = gltf.scene;
        truckModel.position.set(0, 0, 0);
        truckModel.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = false;
            child.receiveShadow = false;
          }
        });
        scene.add(truckModel);
        window.__3D_STATE__.modelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load CesiumMilkTruck.glb', err);
      }
    );

    // Laptop cards
    const laptopData = [
      {
        name: 'ProBook 15',
        color: '#2196F3',
        position: new THREE.Vector3(-3, 3, 0),
        phase: 0,
        specs: { CPU: 'Intel i7', RAM: '16GB', Price: '$1299' }
      },
      {
        name: 'UltraSlim 14',
        color: '#4CAF50',
        position: new THREE.Vector3(0, 3, 0),
        phase: 2,
        specs: { CPU: 'Intel i5', RAM: '8GB', Price: '$999' }
      },
      {
        name: 'GameMaster 17',
        color: '#FF9800',
        position: new THREE.Vector3(3, 3, 0),
        phase: 4,
        specs: { CPU: 'AMD Ryzen 9', RAM: '32GB', Price: '$1899' }
      }
    ];

    const laptops = [];
    const labelSprites = [];

    function createTextSprite(text) {
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, 20, canvas.width, 88);
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 4;
      ctx.strokeRect(4, 24, canvas.width - 8, 80);
      ctx.font = 'bold 42px Arial';
      ctx.fillStyle = 'white';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 3);

      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(2.4, 0.6, 1);
      return sprite;
    }

    laptopData.forEach((data, index) => {
      const geo = new THREE.BoxGeometry(2, 0.1, 1.5);
      const mat = new THREE.MeshStandardMaterial({
        color: data.color,
        emissive: 0x000000,
        emissiveIntensity: 0
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(data.position);
      mesh.userData = { type: 'laptop', index };
      scene.add(mesh);
      laptops.push(mesh);

      const label = createTextSprite(data.name);
      label.position.set(data.position.x, data.position.y + 0.6, data.position.z);
      scene.add(label);
      labelSprites.push(label);
    });

    // Player selection rings
    function createRing(colorHex) {
      const ringGeo = new THREE.RingGeometry(0.45, 0.62, 48);
      const ringMat = new THREE.MeshBasicMaterial({
        color: colorHex,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.95
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 0.02;
      scene.add(ring);
      return ring;
    }

    const player1Ring = createRing(0xff0000);
    const player2Ring = createRing(0x0000ff);

    // DOM
    const p1SelectionEl = document.getElementById('p1-selection');
    const p2SelectionEl = document.getElementById('p2-selection');
    const compareBtn = document.getElementById('compare-btn');
    const resetBtn = document.getElementById('reset-btn');
    const matchIndicator = document.getElementById('match-indicator');
    const specTooltip = document.getElementById('spec-tooltip');

    // State
    let player1Selection = 0;
    let player2Selection = 1;
    let isComparing = false;
    let selectedSpecLaptop = -1;
    let player2AutoSelectCount = 0;
    let frameCount = 0;

    window.__3D_STATE__ = {
      modelLoaded: false,
      player1Selection,
      player2Selection,
      isComparing,
      truckSpinning,
      matchDetected: false,
      selectedSpecLaptop,
      player2AutoSelectCount,
      laptopPositions: laptopData.map(d => ({ x: d.position.x, y: d.position.y, z: d.position.z })),
      frameCount
    };

    function updateMatchIndicator() {
      const match = player1Selection === player2Selection;
      matchIndicator.style.display = match ? 'block' : 'none';
      return match;
    }

    function updateSelectionUI() {
      p1SelectionEl.textContent = `Player 1: ${laptopData[player1Selection].name}`;
      p2SelectionEl.textContent = `Player 2: ${laptopData[player2Selection].name}`;
      updateMatchIndicator();
    }

    function updateRings() {
      const p1Pos = laptops[player1Selection].position;
      const p2Pos = laptops[player2Selection].position;
      player1Ring.position.x = p1Pos.x;
      player1Ring.position.z = p1Pos.z;
      player2Ring.position.x = p2Pos.x;
      player2Ring.position.z = p2Pos.z;
    }

    function applyComparisonVisuals() {
      laptops.forEach((mesh, i) => {
        const mat = mesh.material;
        const selected = i === player1Selection || i === player2Selection;
        if (isComparing) {
          if (selected) {
            mat.emissive.setHex(0xffff66);
            mat.emissiveIntensity = 0.9;
            mat.opacity = 1.0;
            mat.transparent = false;
          } else {
            mat.emissive.setHex(0x000000);
            mat.emissiveIntensity = 0;
            mat.opacity = 0.25;
            mat.transparent = true;
          }
        } else {
          mat.emissive.setHex(0x000000);
          mat.emissiveIntensity = 0;
          mat.opacity = 1.0;
          mat.transparent = false;
        }
      });
    }

    function resetAll() {
      player1Selection = 0;
      player2Selection = 1;
      isComparing = false;
      selectedSpecLaptop = -1;
      specTooltip.style.display = 'none';
      applyComparisonVisuals();
      updateSelectionUI();
      updateRings();
    }

    compareBtn.addEventListener('click', () => {
      isComparing = true;
      applyComparisonVisuals();
      updateSelectionUI();
    });

    resetBtn.addEventListener('click', () => {
      resetAll();
    });

    updateSelectionUI();
    updateRings();

    // Keyboard control for Player 1
    window.addEventListener('keydown', (e) => {
      if (e.key === '1') player1Selection = 0;
      if (e.key === '2') player1Selection = 1;
      if (e.key === '3') player1Selection = 2;
      updateSelectionUI();
      updateRings();
      if (isComparing) applyComparisonVisuals();
    });

    // Simulated Player 2
    setInterval(() => {
      player2Selection = Math.floor(Math.random() * 3);
      player2AutoSelectCount++;
      updateSelectionUI();
      updateRings();
      if (isComparing) applyComparisonVisuals();
    }, 5000);

    // Raycasting
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function showSpecTooltip(index) {
      const data = laptopData[index];
      selectedSpecLaptop = index;
      specTooltip.innerHTML = `
        <strong>${data.name}</strong><br>
        CPU: ${data.specs.CPU}<br>
        RAM: ${data.specs.RAM}<br>
        Price: ${data.specs.Price}
      `;
      specTooltip.style.display = 'block';
    }

    function hideSpecTooltip() {
      selectedSpecLaptop = -1;
      specTooltip.style.display = 'none';
    }

    function updateTooltipPosition() {
      if (selectedSpecLaptop < 0) return;
      const target = laptops[selectedSpecLaptop];
      const pos = target.getWorldPosition(new THREE.Vector3()).clone();
      pos.y += 0.8;
      pos.project(camera);

      const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;

      specTooltip.style.left = `${x + 12}px`;
      specTooltip.style.top = `${y - 10}px`;
    }

    renderer.domElement.addEventListener('click', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const laptopHits = raycaster.intersectObjects(laptops, false);
      if (laptopHits.length > 0) {
        const idx = laptopHits[0].object.userData.index;
        showSpecTooltip(idx);
        return;
      }

      if (truckModel) {
        const truckHits = raycaster.intersectObject(truckModel, true);
        if (truckHits.length > 0) {
          truckSpinning = !truckSpinning;
          hideSpecTooltip();
          return;
        }
      }

      hideSpecTooltip();
    });

    // Animation
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();
      frameCount++;

      laptops.forEach((mesh, i) => {
        const base = laptopData[i].position;
        mesh.position.x = base.x;
        mesh.position.z = base.z;
        mesh.position.y = base.y + Math.sin(elapsed * 1.5 + laptopData[i].phase) * 0.2;

        labelSprites[i].position.set(mesh.position.x, mesh.position.y + 0.6, mesh.position.z);
      });

      if (truckModel && truckSpinning) {
        truckModel.rotation.y += 0.5 * clock.getDelta();
      } else {
        clock.getDelta();
      }

      controls.update();
      updateTooltipPosition();

      // Update state
      const matchDetected = player1Selection === player2Selection;
      window.__3D_STATE__.modelLoaded = !!truckModel;
      window.__3D_STATE__.player1Selection = player1Selection;
      window.__3D_STATE__.player2Selection = player2Selection;
      window.__3D_STATE__.isComparing = isComparing;
      window.__3D_STATE__.truckSpinning = truckSpinning;
      window.__3D_STATE__.matchDetected = matchDetected;
      window.__3D_STATE__.selectedSpecLaptop = selectedSpecLaptop;
      window.__3D_STATE__.player2AutoSelectCount = player2AutoSelectCount;
      window.__3D_STATE__.laptopPositions = laptops.map(mesh => {
        const wp = mesh.getWorldPosition(new THREE.Vector3());
        return { x: wp.x, y: wp.y, z: wp.z };
      });
      window.__3D_STATE__.frameCount = frameCount;

      renderer.render(scene, camera);
    }

    animate();

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
