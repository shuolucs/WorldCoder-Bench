<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Basketball Free Throw</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Sky blue fallback */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #scoreboard {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 28px;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-weight: bold;
        }
        #powerBar {
            position: absolute;
            left: 30px;
            bottom: 50px;
            width: 40px;
            height: 300px;
            border: 3px solid #ffffff;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        #powerFill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #00ff00, #ffff00, #ff0000);
            transition: height 0.05s linear;
        }
        #aimDisplay {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 24px;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            font-weight: bold;
        }
        #statusText {
            position: absolute;
            top: 30%;
            width: 100%;
            text-align: center;
            font-size: 64px;
            color: #ffd700;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.2s;
        }
        #resetBtn {
            position: absolute;
            top: 20px;
            right: 30px;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            background-color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        #resetBtn:hover {
            background-color: #ddd;
        }
        .instructions {
            position: absolute;
            bottom: 60px;
            width: 100%;
            text-align: center;
            color: #ffffff;
            font-size: 16px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div id="scoreboard">Score: 0 / Shots: 0</div>
        <div id="powerBar"><div id="powerFill"></div></div>
        <div id="aimDisplay">Aim: 0&deg;</div>
        <div id="statusText">Ready</div>
        <button id="resetBtn">Reset Ball</button>
        <div class="instructions">Left/Right Arrows to Aim | Hold Space to Power | Release Space to Shoot</div>
    </div>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            ballPosition: { x: 0, y: 3, z: 8 },
            ballVelocity: { x: 0, y: 0, z: 0 },
            power: 0,
            aimAngle: 0,
            score: 0,
            shots: 0,
            gameStatus: 'ready', // 'ready', 'charging', 'flying', 'scored', 'missed'
            ballLaunched: false,
            gravity: -9.8,
            sceneReady: false
        };

        const state = window.__3D_STATE__;

        // --- DOM Elements ---
        const scoreboardEl = document.getElementById('scoreboard');
        const powerFillEl = document.getElementById('powerFill');
        const aimDisplayEl = document.getElementById('aimDisplay');
        const statusTextEl = document.getElementById('statusText');
        const resetBtnEl = document.getElementById('resetBtn');

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 7, -10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // --- Materials ---
        const courtMat = new THREE.MeshStandardMaterial({ color: 0x2E8B57, roughness: 0.8 });
        const poleMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.5, roughness: 0.5 });
        const boardMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 });
        const rimMat = new THREE.MeshStandardMaterial({ color: 0xff4500, roughness: 0.3, metalness: 0.2 });
        const ballMat = new THREE.MeshStandardMaterial({ color: 0xd2691e, roughness: 0.9, bumpScale: 0.02 });

        // --- Objects ---
        // Ground
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const ground = new THREE.Mesh(groundGeo, courtMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Hoop Pole (height 7, base at y=0 -> center at y=3.5)
        const poleGeo = new THREE.CylinderGeometry(0.15, 0.15, 7, 16);
        const pole = new THREE.Mesh(poleGeo, poleMat);
        pole.position.set(0, 3.5, -10);
        pole.castShadow = true;
        pole.receiveShadow = true;
        scene.add(pole);

        // Backboard (3x2x0.2 at 0, 8, -10)
        const boardGeo = new THREE.BoxGeometry(3, 2, 0.2);
        const backboard = new THREE.Mesh(boardGeo, boardMat);
        backboard.position.set(0, 8, -10);
        backboard.castShadow = true;
        backboard.receiveShadow = true;
        scene.add(backboard);

        // Rim (Torus major 0.75, minor 0.05 at 0, 7, -9.5)
        const rimGeo = new THREE.TorusGeometry(0.75, 0.05, 16, 32);
        const rim = new THREE.Mesh(rimGeo, rimMat);
        rim.position.set(0, 7, -9.5);
        rim.rotation.x = Math.PI / 2;
        rim.castShadow = true;
        scene.add(rim);

        // Basketball (Radius 0.4)
        const ballRadius = 0.4;
        const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.castShadow = true;
        ball.receiveShadow = true;
        scene.add(ball);

        // --- Game Logic Variables ---
        let powerDirection = 1;
        let resetTimeout = null;
        const rimCenter = new THREE.Vector3(0, 7, -9.5);

        // Initialize Ball
        function resetBall() {
            clearTimeout(resetTimeout);
            state.gameStatus = 'ready';
            state.ballLaunched = false;
            state.power = 0;
            state.ballVelocity = { x: 0, y: 0, z: 0 };
            
            ball.position.set(0, 3, 8);
            state.ballPosition = { x: 0, y: 3, z: 8 };
            
            powerFillEl.style.height = '0%';
            setStatus('Ready');
        }

        function updateScoreboard() {
            scoreboardEl.innerText = `Score: ${state.score} / Shots: ${state.shots}`;
        }

        function setStatus(text) {
            statusTextEl.innerText = text;
            statusTextEl.style.opacity = 1;
            if (text === 'Ready') {
                setTimeout(() => { if(state.gameStatus === 'ready') statusTextEl.style.opacity = 0; }, 1000);
            }
        }

        function handleScore() {
            if (state.gameStatus === 'scored' || state.gameStatus === 'missed') return;
            state.gameStatus = 'scored';
            state.score++;
            updateScoreboard();
            setStatus('Score!');
            resetTimeout = setTimeout(resetBall, 1500);
        }

        function handleMiss() {
            if (state.gameStatus === 'scored' || state.gameStatus === 'missed') return;
            state.gameStatus = 'missed';
            setStatus('Miss');
            resetTimeout = setTimeout(resetBall, 1500);
        }

        function shootBall() {
            state.gameStatus = 'flying';
            state.ballLaunched = true;
            state.shots++;
            updateScoreboard();
            setStatus('Flying');

            // Calculate velocity
            // Power 0-100 maps to speed 8-18
            const speed = 8 + (state.power / 100) * 10;
            const elevationAngle = 55 * (Math.PI / 180); // Fixed 55 degree launch angle
            const headingAngle = state.aimAngle * (Math.PI / 180);

            const vY = speed * Math.sin(elevationAngle);
            const hSpeed = speed * Math.cos(elevationAngle);
            const vX = hSpeed * Math.sin(headingAngle);
            const vZ = -hSpeed * Math.cos(headingAngle); // Negative Z is towards hoop

            state.ballVelocity = { x: vX, y: vY, z: vZ };
        }

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            if (state.gameStatus === 'ready' || state.gameStatus === 'charging') {
                if (e.key === 'ArrowLeft') {
                    state.aimAngle = Math.max(-30, state.aimAngle - 2);
                    aimDisplayEl.innerHTML = `Aim: ${state.aimAngle}&deg;`;
                } else if (e.key === 'ArrowRight') {
                    state.aimAngle = Math.min(30, state.aimAngle + 2);
                    aimDisplayEl.innerHTML = `Aim: ${state.aimAngle}&deg;`;
                }
            }

            if (e.code === 'Space' && state.gameStatus === 'ready') {
                state.gameStatus = 'charging';
                state.power = 0;
                powerDirection = 1;
                statusTextEl.style.opacity = 0;
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && state.gameStatus === 'charging') {
                shootBall();
            }
        });

        resetBtnEl.addEventListener('click', resetBall);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Main Loop ---
        let lastTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            let dt = (now - lastTime) / 1000;
            lastTime = now;
            if (dt > 0.1) dt = 0.1; // Clamp delta time

            // Power Charging Logic
            if (state.gameStatus === 'charging') {
                // Oscillate 0 to 100 and back, ~2 seconds per cycle (100 units per second)
                state.power += powerDirection * 100 * dt;
                if (state.power >= 100) {
                    state.power = 100;
                    powerDirection = -1;
                } else if (state.power <= 0) {
                    state.power = 0;
                    powerDirection = 1;
                }
                powerFillEl.style.height = `${state.power}%`;
            }

            // Physics Logic
            if (state.gameStatus === 'flying') {
                const prevY = ball.position.y;

                // Apply gravity
                state.ballVelocity.y += state.gravity * dt;

                // Update position
                ball.position.x += state.ballVelocity.x * dt;
                ball.position.y += state.ballVelocity.y * dt;
                ball.position.z += state.ballVelocity.z * dt;

                // Add some rotation for visual effect
                ball.rotation.x += state.ballVelocity.z * dt * 0.5;
                ball.rotation.z -= state.ballVelocity.x * dt * 0.5;

                const p = ball.position;
                const v = state.ballVelocity;

                // 1. Ground Collision
                if (p.y <= ballRadius) {
                    p.y = ballRadius;
                    v.y *= -0.6; // Bounce
                    v.x *= 0.8; // Friction
                    v.z *= 0.8;
                    handleMiss();
                }

                // 2. Out of Bounds
                if (Math.abs(p.x) > 20 || p.z < -25 || p.z > 15) {
                    handleMiss();
                }

                // 3. Backboard Collision (Front face is at z = -9.9)
                // Box is 3x2x0.2 at (0, 8, -10). X: [-1.5, 1.5], Y: [7, 9], Z: [-10.1, -9.9]
                if (p.z - ballRadius < -9.9 && p.z + ballRadius > -10.1 && 
                    Math.abs(p.x) < 1.5 + ballRadius && 
                    p.y > 7 - ballRadius && p.y < 9 + ballRadius) {
                    
                    if (v.z < 0) { // Hitting from the front
                        v.z *= -0.5; // Reflect and lose energy
                        p.z = -9.9 + ballRadius; // Push out
                    }
                }

                // 4. Rim Collision (Torus at 0, 7, -9.5, major 0.75, minor 0.05)
                const toBallXZ = new THREE.Vector2(p.x - rimCenter.x, p.z - rimCenter.z);
                const distXZ = toBallXZ.length();
                
                if (distXZ > 0) {
                    // Find closest point on the rim's major circle
                    const closestRimPoint = new THREE.Vector3(
                        rimCenter.x + (toBallXZ.x / distXZ) * 0.75,
                        rimCenter.y,
                        rimCenter.z + (toBallXZ.y / distXZ) * 0.75
                    );

                    const distToRim = p.distanceTo(closestRimPoint);
                    const collisionDist = ballRadius + 0.05; // ball radius + tube radius

                    if (distToRim < collisionDist) {
                        // Calculate bounce normal
                        const normal = new THREE.Vector3().subVectors(p, closestRimPoint).normalize();
                        const dot = v.x * normal.x + v.y * normal.y + v.z * normal.z;
                        
                        if (dot < 0) { // Moving towards the rim
                            const restitution = 0.6;
                            v.x -= (1 + restitution) * dot * normal.x;
                            v.y -= (1 + restitution) * dot * normal.y;
                            v.z -= (1 + restitution) * dot * normal.z;
                            
                            // Push out to prevent sticking
                            const overlap = collisionDist - distToRim;
                            p.add(normal.multiplyScalar(overlap));
                        }
                    }
                }

                // 5. Scoring Detection
                // Must pass through the rim downwards
                if (prevY > 7.0 && p.y <= 7.0) {
                    // Check if within rim radius
                    const distToCenter = Math.sqrt(Math.pow(p.x - rimCenter.x, 2) + Math.pow(p.z - rimCenter.z, 2));
                    if (distToCenter < 0.6) { // 0.75 is rim radius, 0.6 gives some leeway
                        handleScore();
                    }
                }

                // Update state position
                state.ballPosition = { x: p.x, y: p.y, z: p.z };
            }

            renderer.render(scene, camera);
        }

        // Initialize
        resetBall();
        state.sceneReady = true;
        animate();

    </script>
</body>
</html>
