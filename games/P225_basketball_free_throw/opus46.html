<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Basketball Free Throw</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
canvas { display: block; }

#scoreboard {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 12px 30px;
    border-radius: 10px;
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 1px;
    border: 2px solid rgba(255,165,0,0.6);
    text-shadow: 0 0 10px rgba(255,165,0,0.5);
}

#powerBarContainer {
    position: absolute;
    left: 30px;
    top: 50%;
    transform: translateY(-50%);
    width: 40px;
    height: 300px;
    background: rgba(0,0,0,0.7);
    border: 2px solid #555;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
}

#powerBar {
    width: 100%;
    height: 300px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
}

#powerFill {
    width: 100%;
    height: 0%;
    background: linear-gradient(to top, #00ff00, #ffff00, #ff0000);
    transition: height 0.05s linear;
    border-radius: 0 0 6px 6px;
}

#powerLabel {
    position: absolute;
    left: 30px;
    top: 50%;
    transform: translateY(-50%) translateY(170px);
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    text-align: center;
    width: 40px;
}

#aimDisplay {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: #fff;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 16px;
    border: 1px solid #666;
}

#resetBtn {
    position: absolute;
    bottom: 30px;
    right: 30px;
    padding: 12px 24px;
    background: linear-gradient(135deg, #ff6600, #ff3300);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(255,100,0,0.4);
}
#resetBtn:hover {
    background: linear-gradient(135deg, #ff8800, #ff5500);
    transform: scale(1.05);
}

#statusText {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 32px;
    font-weight: bold;
    text-shadow: 0 0 20px rgba(255,165,0,0.8);
    transition: opacity 0.3s;
}

#instructions {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    text-align: center;
    line-height: 1.6;
}
</style>
</head>
<body>

<div id="scoreboard">Score: 0 / Shots: 0</div>

<div id="powerBarContainer">
    <div id="powerBar">
        <div id="powerFill"></div>
    </div>
</div>
<div id="powerLabel">POWER</div>

<div id="aimDisplay">Aim: 0°</div>
<button id="resetBtn">Reset Ball</button>
<div id="statusText">Ready</div>
<div id="instructions">← → Arrow Keys: Aim &nbsp;|&nbsp; Hold SPACE: Charge Power &nbsp;|&nbsp; Release SPACE: Shoot</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script>
(function() {
    // ============ STATE ============
    const state = {
        ballPosition: { x: 0, y: 3, z: 8 },
        ballVelocity: { x: 0, y: 0, z: 0 },
        power: 0,
        aimAngle: 0,
        score: 0,
        shots: 0,
        gameStatus: 'ready',
        ballLaunched: false,
        gravity: -9.8,
        sceneReady: false
    };
    window.__3D_STATE__ = state;

    // ============ THREE.JS SETUP ============
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 30, 60);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 7, -10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Lighting
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 15, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    scene.add(dirLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    // Add a subtle point light near the hoop
    const hoopLight = new THREE.PointLight(0xffaa44, 0.5, 15);
    hoopLight.position.set(0, 10, -10);
    scene.add(hoopLight);

    // ============ GROUND / COURT ============
    const groundGeo = new THREE.PlaneGeometry(50, 50);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.8 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Court markings - free throw area
    const courtGeo = new THREE.PlaneGeometry(12, 20);
    const courtMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.6 });
    const court = new THREE.Mesh(courtGeo, courtMat);
    court.rotation.x = -Math.PI / 2;
    court.position.set(0, 0.01, -1);
    scene.add(court);

    // Free throw line
    const ftLineGeo = new THREE.PlaneGeometry(12, 0.1);
    const ftLineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
    const ftLine = new THREE.Mesh(ftLineGeo, ftLineMat);
    ftLine.rotation.x = -Math.PI / 2;
    ftLine.position.set(0, 0.02, 5);
    scene.add(ftLine);

    // Court lines
    const lineGeo = new THREE.PlaneGeometry(0.08, 20);
    const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const leftLine = new THREE.Mesh(lineGeo, lineMat);
    leftLine.rotation.x = -Math.PI / 2;
    leftLine.position.set(-6, 0.02, -1);
    scene.add(leftLine);
    const rightLine = new THREE.Mesh(lineGeo.clone(), lineMat);
    rightLine.rotation.x = -Math.PI / 2;
    rightLine.position.set(6, 0.02, -1);
    scene.add(rightLine);

    // ============ BASKETBALL HOOP ============
    // Pole
    const poleGeo = new THREE.CylinderGeometry(0.12, 0.15, 7, 16);
    const poleMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.6, roughness: 0.3 });
    const pole = new THREE.Mesh(poleGeo, poleMat);
    pole.position.set(0, 3.5, -10.5);
    pole.castShadow = true;
    scene.add(pole);

    // Backboard
    const bbGeo = new THREE.BoxGeometry(3, 2, 0.15);
    const bbMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3, metalness: 0.1 });
    const backboard = new THREE.Mesh(bbGeo, bbMat);
    backboard.position.set(0, 8, -10.3);
    backboard.castShadow = true;
    scene.add(backboard);

    // Backboard border
    const bbBorderGeo = new THREE.BoxGeometry(3.1, 2.1, 0.12);
    const bbBorderMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.5 });
    const bbBorder = new THREE.Mesh(bbBorderGeo, bbBorderMat);
    bbBorder.position.set(0, 8, -10.35);
    scene.add(bbBorder);

    // Backboard square (target square)
    const sqGeo = new THREE.BoxGeometry(1.2, 0.9, 0.16);
    const sqMat = new THREE.MeshStandardMaterial({ color: 0xff4444, transparent: true, opacity: 0.3 });
    const square = new THREE.Mesh(sqGeo, sqMat);
    square.position.set(0, 7.8, -10.22);
    scene.add(square);

    // Rim (torus)
    const rimGeo = new THREE.TorusGeometry(0.75, 0.05, 16, 32);
    const rimMat = new THREE.MeshStandardMaterial({ color: 0xff6600, metalness: 0.7, roughness: 0.2 });
    const rim = new THREE.Mesh(rimGeo, rimMat);
    rim.position.set(0, 7, -9.5);
    rim.rotation.x = Math.PI / 2;
    rim.castShadow = true;
    scene.add(rim);

    // Rim bracket (connects rim to backboard)
    const bracketGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.8, 8);
    const bracketMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.6 });
    const bracket = new THREE.Mesh(bracketGeo, bracketMat);
    bracket.position.set(0, 7, -9.9);
    bracket.rotation.x = Math.PI / 2;
    scene.add(bracket);

    // Net (simplified with lines)
    const netGroup = new THREE.Group();
    const netMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
    const netSegments = 12;
    const netDepth = 1.0;
    for (let i = 0; i < netSegments; i++) {
        const angle = (i / netSegments) * Math.PI * 2;
        const topX = Math.cos(angle) * 0.7;
        const topZ = Math.sin(angle) * 0.7;
        const bottomX = Math.cos(angle) * 0.3;
        const bottomZ = Math.sin(angle) * 0.3;
        const points = [
            new THREE.Vector3(topX, 0, topZ),
            new THREE.Vector3((topX + bottomX) / 2, -netDepth * 0.5, (topZ + bottomZ) / 2),
            new THREE.Vector3(bottomX, -netDepth, bottomZ)
        ];
        const netLineGeo = new THREE.BufferGeometry().setFromPoints(points);
        const netLine = new THREE.Line(netLineGeo, netMaterial);
        netLine.position.set(0, 7, -9.5);
        netGroup.add(netLine);
    }
    // Horizontal net rings
    for (let r = 0; r < 3; r++) {
        const ringY = -r * netDepth / 2.5;
        const ringRadius = 0.7 - r * 0.13;
        const ringPoints = [];
        for (let i = 0; i <= 32; i++) {
            const angle = (i / 32) * Math.PI * 2;
            ringPoints.push(new THREE.Vector3(
                Math.cos(angle) * ringRadius,
                ringY,
                Math.sin(angle) * ringRadius
            ));
        }
        const ringGeo = new THREE.BufferGeometry().setFromPoints(ringPoints);
        const ringLine = new THREE.Line(ringGeo, netMaterial);
        ringLine.position.set(0, 7, -9.5);
        netGroup.add(ringLine);
    }
    scene.add(netGroup);

    // ============ BASKETBALL ============
    const ballRadius = 0.4;
    const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);

    // Create basketball texture with lines
    const canvas2d = document.createElement('canvas');
    canvas2d.width = 256;
    canvas2d.height = 256;
    const ctx = canvas2d.getContext('2d');

    // Base orange
    ctx.fillStyle = '#e87020';
    ctx.fillRect(0, 0, 256, 256);

    // Add some noise/texture
    for (let i = 0; i < 3000; i++) {
        const x = Math.random() * 256;
        const y = Math.random() * 256;
        ctx.fillStyle = `rgba(${150 + Math.random()*50}, ${60 + Math.random()*30}, ${10 + Math.random()*20}, 0.15)`;
        ctx.fillRect(x, y, 2, 2);
    }

    // Black lines
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 3;

    // Horizontal line
    ctx.beginPath();
    ctx.moveTo(0, 128);
    ctx.lineTo(256, 128);
    ctx.stroke();

    // Vertical line
    ctx.beginPath();
    ctx.moveTo(128, 0);
    ctx.lineTo(128, 256);
    ctx.stroke();

    // Curved lines
    ctx.beginPath();
    ctx.arc(128, 128, 60, 0, Math.PI * 2);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(0, 128, 90, -0.5, 0.5);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(256, 128, 90, Math.PI - 0.5, Math.PI + 0.5);
    ctx.stroke();

    const ballTexture = new THREE.CanvasTexture(canvas2d);
    const ballMat = new THREE.MeshStandardMaterial({
        map: ballTexture,
        roughness: 0.7,
        metalness: 0.1,
        bumpMap: ballTexture,
        bumpScale: 0.02
    });

    const ball = new THREE.Mesh(ballGeo, ballMat);
    ball.position.set(0, 3, 8);
    ball.castShadow = true;
    scene.add(ball);

    // Ball shadow on ground
    const shadowGeo = new THREE.CircleGeometry(0.5, 16);
    const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 });
    const ballShadow = new THREE.Mesh(shadowGeo, shadowMat);
    ballShadow.rotation.x = -Math.PI / 2;
    ballShadow.position.set(0, 0.02, 8);
    scene.add(ballShadow);

    // Aim arrow indicator
    const arrowGroup = new THREE.Group();
    const arrowGeo = new THREE.ConeGeometry(0.15, 0.6, 8);
    const arrowMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff3300, emissiveIntensity: 0.3 });
    const arrow = new THREE.Mesh(arrowGeo, arrowMat);
    arrow.rotation.x = -Math.PI / 2;
    arrow.position.set(0, 3, 7);
    arrowGroup.add(arrow);

    const arrowLineGeo = new THREE.CylinderGeometry(0.03, 0.03, 1.5, 8);
    const arrowLine = new THREE.Mesh(arrowLineGeo, arrowMat);
    arrowLine.rotation.x = -Math.PI / 2;
    arrowLine.position.set(0, 3, 7.6);
    arrowGroup.add(arrowLine);
    scene.add(arrowGroup);

    // ============ GAME VARIABLES ============
    let power = 0;
    let powerDirection = 1;
    let aimAngle = 0;
    let isCharging = false;
    let ballVelocity = new THREE.Vector3(0, 0, 0);
    let ballLaunched = false;
    let score = 0;
    let shots = 0;
    let gameStatus = 'ready';
    let resetTimeout = null;
    let hasScored = false;
    let prevBallY = 3;
    const clock = new THREE.Clock();

    const BALL_START = new THREE.Vector3(0, 3, 8);
    const RIM_CENTER = new THREE.Vector3(0, 7, -9.5);
    const BACKBOARD_Z = -10.22;
    const GRAVITY = -9.8;

    // DOM elements
    const scoreboardEl = document.getElementById('scoreboard');
    const powerFillEl = document.getElementById('powerFill');
    const aimDisplayEl = document.getElementById('aimDisplay');
    const resetBtnEl = document.getElementById('resetBtn');
    const statusTextEl = document.getElementById('statusText');

    // ============ INPUT HANDLING ============
    const keys = {};

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            if (!isCharging && !ballLaunched && gameStatus === 'ready') {
                isCharging = true;
                gameStatus = 'charging';
                updateStatus('Charging...');
            }
        }
        if (e.code === 'ArrowLeft') {
            e.preventDefault();
            if (!ballLaunched) {
                aimAngle = Math.max(-30, aimAngle - 2);
            }
        }
        if (e.code === 'ArrowRight') {
            e.preventDefault();
            if (!ballLaunched) {
                aimAngle = Math.min(30, aimAngle + 2);
            }
        }
        keys[e.code] = true;
    });

    document.addEventListener('keyup', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            if (isCharging && !ballLaunched) {
                shootBall();
            }
        }
        keys[e.code] = false;
    });

    resetBtnEl.addEventListener('click', () => {
        resetBall();
    });

    // ============ GAME FUNCTIONS ============
    function shootBall() {
        isCharging = false;
        ballLaunched = true;
        hasScored = false;
        shots++;
        gameStatus = 'flying';
        updateStatus('Flying...');

        // Calculate launch velocity
        const speed = 8 + (power / 100) * 10; // 8 to 18
        const aimRad = (aimAngle * Math.PI) / 180;

        // Direction toward hoop with aim offset
        const dx = RIM_CENTER.x - ball.position.x;
        const dy = RIM_CENTER.y - ball.position.y;
        const dz = RIM_CENTER.z - ball.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        // Calculate launch angle for arc
        const launchAngleVert = Math.atan2(dy + 4.5, dist); // Add extra height for arc

        const horizontalSpeed = speed * Math.cos(launchAngleVert);
        const verticalSpeed = speed * Math.sin(launchAngleVert);

        // Apply horizontal aim offset
        const baseAngle = Math.atan2(dz, dx);
        const finalAngle = baseAngle + aimRad * 0.3; // Scale aim effect

        ballVelocity.set(
            horizontalSpeed * Math.cos(finalAngle) + Math.sin(aimRad) * 3,
            verticalSpeed,
            horizontalSpeed * Math.sin(finalAngle)
        );

        // Normalize direction toward hoop and apply speed
        const dirToHoop = new THREE.Vector3(dx, 0, dz).normalize();
        ballVelocity.x = dirToHoop.x * horizontalSpeed + Math.sin(aimRad) * speed * 0.3;
        ballVelocity.y = verticalSpeed;
        ballVelocity.z = dirToHoop.z * horizontalSpeed;

        prevBallY = ball.position.y;

        updateScoreboard();
    }

    function resetBall() {
        if (resetTimeout) {
            clearTimeout(resetTimeout);
            resetTimeout = null;
        }
        ball.position.copy(BALL_START);
        ballVelocity.set(0, 0, 0);
        ballLaunched = false;
        isCharging = false;
        hasScored = false;
        power = 0;
        gameStatus = 'ready';
        updateStatus('Ready');
        updatePowerBar();
    }

    function updateStatus(text) {
        statusTextEl.textContent = text;
        if (text === 'Score! 🏀') {
            statusTextEl.style.color = '#00ff44';
            statusTextEl.style.textShadow = '0 0 30px rgba(0,255,68,0.8)';
        } else if (text === 'Miss!') {
            statusTextEl.style.color = '#ff4444';
            statusTextEl.style.textShadow = '0 0 30px rgba(255,68,68,0.8)';
        } else {
            statusTextEl.style.color = '#ffffff';
            statusTextEl.style.textShadow = '0 0 20px rgba(255,165,0,0.8)';
        }
    }

    function updateScoreboard() {
        scoreboardEl.textContent = `Score: ${score} / Shots: ${shots}`;
    }

    function updatePowerBar() {
        powerFillEl.style.height = power + '%';
    }

    function checkScoring() {
        const bx = ball.position.x;
        const by = ball.position.y;
        const bz = ball.position.z;

        // Check if ball passes through rim going downward
        if (!hasScored && ballVelocity.y < 0) {
            const rimX = 0;
            const rimY = 7.0;
            const rimZ = -9.5;

            const dx = bx - rimX;
            const dz = bz - rimZ;
            const horizontalDist = Math.sqrt(dx * dx + dz * dz);

            // Ball center is within rim radius and crossing rim height
            if (horizontalDist < 0.6 && prevBallY >= rimY && by < rimY) {
                hasScored = true;
                score++;
                gameStatus = 'scored';
                updateStatus('Score! 🏀');
                updateScoreboard();

                resetTimeout = setTimeout(() => {
                    resetBall();
                }, 1500);
                return true;
            }
        }
        return false;
    }

    function checkMiss() {
        const bx = ball.position.x;
        const by = ball.position.y;
        const bz = ball.position.z;

        if (by <= ballRadius || Math.abs(bx) > 20 || bz < -25 || bz > 15) {
            if (!hasScored) {
                gameStatus = 'missed';
                updateStatus('Miss!');
                ballLaunched = false;

                // Bounce on ground
                if (by <= ballRadius) {
                    ball.position.y = ballRadius;
                    ballVelocity.y = Math.abs(ballVelocity.y) * 0.4;
                    ballVelocity.x *= 0.7;
                    ballVelocity.z *= 0.7;

                    if (Math.abs(ballVelocity.y) < 0.5) {
                        ballVelocity.set(0, 0, 0);
                    }
                }

                resetTimeout = setTimeout(() => {
                    resetBall();
                }, 1500);
                return true;
            }
        }
        return false;
    }

    function checkCollisions() {
        const bx = ball.position.x;
        const by = ball.position.y;
        const bz = ball.position.z;

        // Backboard collision
        if (bz < BACKBOARD_Z + ballRadius && bz > BACKBOARD_Z - 0.3 &&
            by > 7 && by < 9.1 &&
            Math.abs(bx) < 1.6) {
            ball.position.z = BACKBOARD_Z + ballRadius;
            ballVelocity.z *= -0.5;
            ballVelocity.y *= 0.8;
        }

        // Rim collision (simplified - check distance to rim torus)
        const rimRadius = 0.75;
        const rimCenter = new THREE.Vector3(0, 7, -9.5);

        // Distance from ball center to rim center in XZ plane
        const dxRim = bx - rimCenter.x;
        const dzRim = bz - rimCenter.z;
        const distXZ = Math.sqrt(dxRim * dxRim + dzRim * dzRim);

        // Distance from ball center to the torus tube
        const distToTube = Math.abs(distXZ - rimRadius);
        const dyRim = by - rimCenter.y;
        const distToRim = Math.sqrt(distToTube * distToTube + dyRim * dyRim);

        if (distToRim < ballRadius + 0.08) {
            // Bounce off rim
            const normal = new THREE.Vector3(dxRim, dyRim, dzRim).normalize();

            // If hitting from outside, push outward
            if (distXZ > rimRadius) {
                normal.set(dxRim, dyRim * 0.5, dzRim).normalize();
            } else {
                // Hitting from inside, push inward/down
                normal.set(-dxRim * 0.3, -1, -dzRim * 0.3).normalize();
            }

            const dot = ballVelocity.dot(normal);
            if (dot < 0) {
                ballVelocity.sub(normal.multiplyScalar(1.5 * dot));
                ballVelocity.multiplyScalar(0.6);

                // Push ball out of collision
                const pushDir = new THREE.Vector3(dxRim, dyRim, dzRim).normalize();
                ball.position.add(pushDir.multiplyScalar(0.05));
            }
        }

        // Pole collision
        const poleDist = Math.sqrt(bx * bx + (bz + 10.5) * (bz + 10.5));
        if (poleDist < ballRadius + 0.15 && by < 7) {
            const poleNormal = new THREE.Vector3(bx, 0, bz + 10.5).normalize();
            const dot = ballVelocity.dot(poleNormal);
            if (dot < 0) {
                ballVelocity.sub(poleNormal.multiplyScalar(2 * dot));
                ballVelocity.multiplyScalar(0.5);
            }
        }
    }

    // ============ UPDATE STATE ============
    function updateState() {
        state.ballPosition = { x: ball.position.x, y: ball.position.y, z: ball.position.z };
        state.ballVelocity = { x: ballVelocity.x, y: ballVelocity.y, z: ballVelocity.z };
        state.power = power;
        state.aimAngle = aimAngle;
        state.score = score;
        state.shots = shots;
        state.gameStatus = gameStatus;
        state.ballLaunched = ballLaunched;
        state.gravity = GRAVITY;
    }

    // ============ ANIMATION LOOP ============
    function animate() {
        requestAnimationFrame(animate);

        const delta = Math.min(clock.getDelta(), 0.05);

        // Power charging
        if (isCharging) {
            power += powerDirection * 80 * delta; // ~2.5 seconds per cycle
            if (power >= 100) {
                power = 100;
                powerDirection = -1;
            } else if (power <= 0) {
                power = 0;
                powerDirection = 1;
            }
            updatePowerBar();
        }

        // Ball physics
        if (ballLaunched || (gameStatus === 'missed' && Math.abs(ballVelocity.y) > 0.1)) {
            prevBallY = ball.position.y;

            // Apply gravity
            ballVelocity.y += GRAVITY * delta;

            // Update position
            ball.position.x += ballVelocity.x * delta;
            ball.position.y += ballVelocity.y * delta;
            ball.position.z += ballVelocity.z * delta;

            // Rotate ball for visual effect
            const speed = ballVelocity.length();
            ball.rotation.x += speed * delta * 2;
            ball.rotation.z += ballVelocity.x * delta;

            // Check collisions
            checkCollisions();

            // Check scoring
            if (ballLaunched) {
                checkScoring();
            }

            // Check miss
            if (ballLaunched) {
                checkMiss();
            }

            // Ground bounce for after miss
            if (!ballLaunched && ball.position.y <= ballRadius) {
                ball.position.y = ballRadius;
                ballVelocity.y = Math.abs(ballVelocity.y) * 0.3;
                ballVelocity.x *= 0.6;
                ballVelocity.z *= 0.6;
                if (ballVelocity.length() < 0.3) {
                    ballVelocity.set(0, 0, 0);
                }
            }
        }

        // Update ball shadow
        ballShadow.position.x = ball.position.x;
        ballShadow.position.z = ball.position.z;
        const shadowScale = Math.max(0.1, 1 - ball.position.y / 15);
        ballShadow.scale.set(shadowScale, shadowScale, shadowScale);
        shadowMat.opacity = 0.3 * shadowScale;

        // Update aim display
        aimDisplayEl.textContent = `Aim: ${aimAngle}°`;

        // Update aim arrow
        if (!ballLaunched) {
            const aimRad = (aimAngle * Math.PI) / 180;
            arrowGroup.position.set(
                ball.position.x + Math.sin(aimRad) * 1.5,
                ball.position.y,
                ball.position.z - 1.5
            );
            arrowGroup.rotation.y = -aimRad * 0.5;
            arrowGroup.visible = true;
        } else {
            arrowGroup.visible = false;
        }

        // Gentle camera follow
        if (ballLaunched) {
            const targetX = ball.position.x * 0.15;
            const targetY = 5 + (ball.position.y - 3) * 0.1;
            camera.position.x += (targetX - camera.position.x) * 0.03;
            camera.position.y += (targetY - camera.position.y) * 0.03;
            camera.lookAt(
                ball.position.x * 0.3,
                Math.max(5, ball.position.y * 0.5 + 3),
                (ball.position.z - 10) * 0.3
            );
        } else {
            camera.position.x += (0 - camera.position.x) * 0.05;
            camera.position.y += (5 - camera.position.y) * 0.05;
            camera.lookAt(0, 6, -5);
        }

        // Update state
        updateState();

        renderer.render(scene, camera);
    }

    // ============ WINDOW RESIZE ============
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ============ START ============
    state.sceneReady = true;
    updateScoreboard();
    animate();

})();
</script>
</body>
</html>
