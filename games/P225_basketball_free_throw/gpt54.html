<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Basketball Free Throw Game</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #scoreboard {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: bold;
      background: rgba(0,0,0,0.45);
      padding: 10px 18px;
      border-radius: 10px;
      z-index: 10;
    }

    #powerBar {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 30px;
      height: 220px;
      border: 2px solid #fff;
      background: rgba(255,255,255,0.12);
      border-radius: 8px;
      overflow: hidden;
      z-index: 10;
    }

    #powerFill {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0%;
      background: linear-gradient(to top, #2ecc71, #f1c40f, #e74c3c);
    }

    #aimDisplay {
      position: absolute;
      top: 90px;
      left: 20px;
      font-size: 20px;
      background: rgba(0,0,0,0.45);
      padding: 8px 12px;
      border-radius: 8px;
      z-index: 10;
    }

    #statusText {
      position: absolute;
      top: 130px;
      left: 20px;
      font-size: 20px;
      background: rgba(0,0,0,0.45);
      padding: 8px 12px;
      border-radius: 8px;
      z-index: 10;
      min-width: 100px;
    }

    #resetBtn {
      position: absolute;
      top: 180px;
      left: 20px;
      font-size: 16px;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #3498db;
      color: white;
      cursor: pointer;
      z-index: 10;
    }

    #resetBtn:hover {
      background: #2980b9;
    }

    #help {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(0,0,0,0.45);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="scoreboard">Score: 0 / Shots: 0</div>
  <div id="powerBar"><div id="powerFill"></div></div>
  <div id="aimDisplay">Aim: 0°</div>
  <div id="statusText">Ready</div>
  <button id="resetBtn">Reset Ball</button>
  <div id="help">
    ← / → Aim<br>
    Hold Space: Charge power<br>
    Release Space: Shoot
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
  <script>
    let scene, camera, renderer, clock;
    let ball, hoop, rim, backboard, pole, ground;
    let rimCenter = new THREE.Vector3(0, 7, -9.5);
    let startPos = new THREE.Vector3(0, 3, 8);
    let velocity = new THREE.Vector3(0, 0, 0);
    let prevBallPos = new THREE.Vector3();
    let gravity = -9.8;

    let score = 0;
    let shots = 0;
    let aimAngle = 0;
    let power = 0;
    let charging = false;
    let chargeDirection = 1;
    let ballLaunched = false;
    let scoredThisShot = false;
    let resetTimeout = null;

    const scoreboard = document.getElementById('scoreboard');
    const powerFill = document.getElementById('powerFill');
    const aimDisplay = document.getElementById('aimDisplay');
    const statusText = document.getElementById('statusText');
    const resetBtn = document.getElementById('resetBtn');

    window.__3D_STATE__ = {
      ballPosition: { x: 0, y: 0, z: 0 },
      ballVelocity: { x: 0, y: 0, z: 0 },
      power: 0,
      aimAngle: 0,
      score: 0,
      shots: 0,
      gameStatus: 'ready',
      ballLaunched: false,
      gravity: -9.8,
      sceneReady: false
    };

    function updateState() {
      window.__3D_STATE__.ballPosition = {
        x: ball.position.x,
        y: ball.position.y,
        z: ball.position.z
      };
      window.__3D_STATE__.ballVelocity = {
        x: velocity.x,
        y: velocity.y,
        z: velocity.z
      };
      window.__3D_STATE__.power = power;
      window.__3D_STATE__.aimAngle = aimAngle;
      window.__3D_STATE__.score = score;
      window.__3D_STATE__.shots = shots;
      window.__3D_STATE__.ballLaunched = ballLaunched;
      window.__3D_STATE__.gravity = gravity;
    }

    function setGameStatus(status) {
      window.__3D_STATE__.gameStatus = status;
      const map = {
        ready: 'Ready',
        charging: 'Charging',
        flying: 'Flying',
        scored: 'Score!',
        missed: 'Miss'
      };
      statusText.textContent = map[status] || status;
    }

    function updateHUD() {
      scoreboard.textContent = `Score: ${score} / Shots: ${shots}`;
      powerFill.style.height = `${power}%`;
      aimDisplay.textContent = `Aim: ${aimAngle}°`;
    }

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87ceeb);

      camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 5, 12);
      camera.lookAt(0, 7, -10);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      clock = new THREE.Clock();

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
      dirLight.position.set(5, 15, 10);
      dirLight.castShadow = true;
      scene.add(dirLight);

      const groundGeo = new THREE.PlaneGeometry(50, 50);
      const groundMat = new THREE.MeshPhongMaterial({ color: 0x2e8b57 });
      ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = 0;
      ground.receiveShadow = true;
      scene.add(ground);

      createHoop();
      createBall();

      updateHUD();
      setGameStatus('ready');
      window.__3D_STATE__.sceneReady = true;

      window.addEventListener('resize', onWindowResize);
      window.addEventListener('keydown', onKeyDown);
      window.addEventListener('keyup', onKeyUp);
      resetBtn.addEventListener('click', resetBall);

      animate();
    }

    function createHoop() {
      hoop = new THREE.Group();

      const poleGeo = new THREE.CylinderGeometry(0.15, 0.15, 7, 16);
      const poleMat = new THREE.MeshPhongMaterial({ color: 0x888888 });
      pole = new THREE.Mesh(poleGeo, poleMat);
      pole.position.set(0, 3.5, -10);
      pole.castShadow = true;
      hoop.add(pole);

      const boardGeo = new THREE.BoxGeometry(3, 2, 0.2);
      const boardMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
      backboard = new THREE.Mesh(boardGeo, boardMat);
      backboard.position.set(0, 8, -10);
      backboard.castShadow = true;
      hoop.add(backboard);

      const rimGeo = new THREE.TorusGeometry(0.75, 0.05, 16, 64);
      const rimMat = new THREE.MeshPhongMaterial({ color: 0xff6600 });
      rim = new THREE.Mesh(rimGeo, rimMat);
      rim.position.copy(rimCenter);
      rim.rotation.x = Math.PI / 2;
      rim.castShadow = true;
      hoop.add(rim);

      scene.add(hoop);
    }

    function createBall() {
      const ballGeo = new THREE.SphereGeometry(0.4, 32, 32);
      const ballMat = new THREE.MeshPhongMaterial({ color: 0xd2691e });
      ball = new THREE.Mesh(ballGeo, ballMat);
      ball.position.copy(startPos);
      ball.castShadow = true;
      scene.add(ball);

      const lineMat = new THREE.LineBasicMaterial({ color: 0x111111 });

      const ring1 = new THREE.TorusGeometry(0.405, 0.01, 8, 64);
      const ringMesh1 = new THREE.Mesh(ring1, new THREE.MeshBasicMaterial({ color: 0x111111 }));
      ball.add(ringMesh1);

      const ring2 = new THREE.TorusGeometry(0.405, 0.01, 8, 64);
      const ringMesh2 = new THREE.Mesh(ring2, new THREE.MeshBasicMaterial({ color: 0x111111 }));
      ringMesh2.rotation.x = Math.PI / 2;
      ball.add(ringMesh2);

      const ring3 = new THREE.TorusGeometry(0.405, 0.01, 8, 64);
      const ringMesh3 = new THREE.Mesh(ring3, new THREE.MeshBasicMaterial({ color: 0x111111 }));
      ringMesh3.rotation.y = Math.PI / 2;
      ball.add(ringMesh3);
    }

    function resetBall() {
      if (resetTimeout) {
        clearTimeout(resetTimeout);
        resetTimeout = null;
      }

      ball.position.copy(startPos);
      velocity.set(0, 0, 0);
      prevBallPos.copy(ball.position);
      power = 0;
      charging = false;
      chargeDirection = 1;
      ballLaunched = false;
      scoredThisShot = false;
      updateHUD();
      setGameStatus('ready');
      updateState();
    }

    function scheduleReset() {
      if (resetTimeout) clearTimeout(resetTimeout);
      resetTimeout = setTimeout(() => {
        resetBall();
      }, 1500);
    }

    function launchBall() {
      if (ballLaunched) return;

      shots++;
      scoredThisShot = false;

      const speed = 8 + (power / 100) * 10;
      const angleRad = THREE.MathUtils.degToRad(aimAngle);

      const target = rimCenter.clone();
      const dx = target.x - startPos.x;
      const dz = target.z - startPos.z;
      const horizontalDist = Math.sqrt(dx * dx + dz * dz);

      const basePitch = 0.95;
      const extraPitch = (power / 100) * 0.35;
      const pitch = basePitch + extraPitch;

      const vzBase = -Math.cos(angleRad) * speed;
      const vxBase = Math.sin(angleRad) * speed;
      const vyBase = speed * Math.sin(pitch);

      velocity.set(vxBase, vyBase, vzBase);

      ballLaunched = true;
      charging = false;
      setGameStatus('flying');
      updateHUD();
    }

    function onKeyDown(e) {
      if (e.code === 'ArrowLeft') {
        aimAngle = Math.max(-30, aimAngle - 2);
        updateHUD();
      } else if (e.code === 'ArrowRight') {
        aimAngle = Math.min(30, aimAngle + 2);
        updateHUD();
      } else if (e.code === 'Space') {
        e.preventDefault();
        if (!ballLaunched && !charging) {
          charging = true;
          setGameStatus('charging');
        }
      }
    }

    function onKeyUp(e) {
      if (e.code === 'Space') {
        e.preventDefault();
        if (charging && !ballLaunched) {
          launchBall();
        }
      }
    }

    function handleCharging(delta) {
      if (!charging || ballLaunched) return;

      const rate = 100; // full in 1 second, full cycle in ~2 seconds
      power += chargeDirection * rate * delta;

      if (power >= 100) {
        power = 100;
        chargeDirection = -1;
      } else if (power <= 0) {
        power = 0;
        chargeDirection = 1;
      }

      updateHUD();
    }

    function handleBackboardCollision() {
      const halfW = 1.5;
      const halfH = 1.0;
      const halfD = 0.1;
      const bp = backboard.position;

      const r = 0.4;
      const x = ball.position.x;
      const y = ball.position.y;
      const z = ball.position.z;

      const withinY = y + r > bp.y - halfH && y - r < bp.y + halfH;
      const withinX = x + r > bp.x - halfW && x - r < bp.x + halfW;
      const hitFrontFace = prevBallPos.z - r > bp.z + halfD && z - r <= bp.z + halfD;

      if (withinX && withinY && hitFrontFace && velocity.z < 0) {
        ball.position.z = bp.z + halfD + r + 0.01;
        velocity.z *= -0.5;
        velocity.x *= 0.95;
      }
    }

    function handleRimCollision() {
      const dx = ball.position.x - rimCenter.x;
      const dz = ball.position.z - rimCenter.z;
      const horizontalDist = Math.sqrt(dx * dx + dz * dz);
      const dy = ball.position.y - rimCenter.y;

      const ballRadius = 0.4;
      const rimRadius = 0.75;
      const collisionBand = rimRadius + ballRadius;

      if (Math.abs(dy) < 0.18 && Math.abs(horizontalDist - rimRadius) < 0.18) {
        const normal = new THREE.Vector3(dx, 0, dz);
        if (normal.lengthSq() > 0.0001) {
          normal.normalize();
          const vDot = velocity.dot(normal);
          if (vDot < 0) {
            velocity.addScaledVector(normal, -1.5 * vDot);
          } else {
            velocity.addScaledVector(normal, 1.2);
          }
          velocity.multiplyScalar(0.85);
          ball.position.x += normal.x * 0.08;
          ball.position.z += normal.z * 0.08;
        }
      }
    }

    function checkScore() {
      if (scoredThisShot) return;

      const wasAbove = prevBallPos.y > 7.0;
      const isBelowOrAt = ball.position.y <= 7.0;
      const goingDown = velocity.y < 0;
      const withinX = Math.abs(ball.position.x - rimCenter.x) <= 0.6;
      const withinZ = Math.abs(ball.position.z - rimCenter.z) <= 0.6;

      if (wasAbove && isBelowOrAt && goingDown && withinX && withinZ) {
        scoredThisShot = true;
        score++;
        setGameStatus('scored');
        updateHUD();
        scheduleReset();
      }
    }

    function checkMiss() {
      if (!ballLaunched || scoredThisShot) return false;

      if (ball.position.y <= 0.4) {
        setGameStatus('missed');
        scheduleReset();
        ballLaunched = false;
        return true;
      }

      if (Math.abs(ball.position.x) > 20 || ball.position.z < -25 || ball.position.z > 15) {
        setGameStatus('missed');
        scheduleReset();
        ballLaunched = false;
        return true;
      }

      return false;
    }

    function updateBall(delta) {
      if (!ballLaunched) return;

      prevBallPos.copy(ball.position);

      velocity.y += gravity * delta;
      ball.position.x += velocity.x * delta;
      ball.position.y += velocity.y * delta;
      ball.position.z += velocity.z * delta;

      ball.rotation.x += velocity.z * delta * 0.8;
      ball.rotation.z -= velocity.x * delta * 0.8;

      handleBackboardCollision();
      handleRimCollision();
      checkScore();
      checkMiss();
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.033);

      handleCharging(delta);
      updateBall(delta);
      updateState();

      renderer.render(scene, camera);
    }

    init();
  </script>
</body>
</html>
