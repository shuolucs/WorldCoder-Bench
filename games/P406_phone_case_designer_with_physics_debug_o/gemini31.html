<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Phone Case Designer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: sans-serif;
        }
        #controls-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            color: white;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
        }
        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: inline-block;
            margin: 0 5px 10px 0;
            cursor: pointer;
            border: 2px solid white;
            box-sizing: border-box;
            transition: transform 0.1s;
        }
        .color-btn:hover {
            transform: scale(1.1);
        }
        button {
            display: block;
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            background: #444;
            color: white;
            border: 1px solid #666;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #555;
        }
        .instructions {
            font-size: 12px;
            color: #aaa;
            margin-top: 10px;
            margin-bottom: 0;
        }
        #debug-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 8px;
            color: #00ff00;
            font-family: monospace;
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 10;
            white-space: pre;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="controls-panel">
        <h3>Phone Case Designer</h3>
        <div id="color-picker">
            <div class="color-btn" data-color="#3498db" style="background-color: #3498db;"></div>
            <div class="color-btn" data-color="#e74c3c" style="background-color: #e74c3c;"></div>
            <div class="color-btn" data-color="#2ecc71" style="background-color: #2ecc71;"></div>
            <div class="color-btn" data-color="#f39c12" style="background-color: #f39c12;"></div>
            <div class="color-btn" data-color="#9b59b6" style="background-color: #9b59b6;"></div>
        </div>
        <button id="pattern-toggle">Toggle Pattern</button>
        <button id="debug-toggle">Toggle Debug</button>
        <p class="instructions">Space: Spin | R: Reset</p>
    </div>

    <div id="debug-overlay"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            caseColor: '#3498db',
            debugMode: false,
            pattern: 'solid',
            spinning: false,
            caseRotationY: 0,
            bottleLoaded: false,
            frameCount: 0,
            wireframe: false
        };

        const patterns = ['solid', 'stripes', 'dots'];
        let currentPatternIndex = 0;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // --- Grid Helper ---
        const gridHelper = new THREE.GridHelper(10, 10);
        scene.add(gridHelper);

        // --- Phone Case Model ---
        const caseGeometry = new THREE.BoxGeometry(0.8, 1.6, 0.1);
        const caseMaterial = new THREE.MeshStandardMaterial({
            color: new THREE.Color(window.__3D_STATE__.caseColor),
            metalness: 0.3,
            roughness: 0.7
        });
        const phoneCase = new THREE.Mesh(caseGeometry, caseMaterial);
        phoneCase.position.set(0, 1.5, 0);
        scene.add(phoneCase);

        // --- Texture Generators ---
        function createStripesTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 256, 256);
            ctx.fillStyle = '#000000';
            for (let i = 0; i < 256; i += 32) {
                ctx.fillRect(0, i, 256, 16);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        function createDotsTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 256, 256);
            ctx.fillStyle = '#000000';
            for (let x = 16; x < 256; x += 32) {
                for (let y = 16; y < 256; y += 32) {
                    ctx.beginPath();
                    ctx.arc(x, y, 8, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        const textures = {
            solid: null,
            stripes: createStripesTexture(),
            dots: createDotsTexture()
        };

        // --- Load WaterBottle.glb ---
        const loader = new GLTFLoader();
        // Using a reliable public URL for the WaterBottle model to ensure it runs standalone
        const bottleUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/WaterBottle/glTF-Binary/WaterBottle.glb';
        
        loader.load(
            bottleUrl,
            (gltf) => {
                const bottle = gltf.scene;
                bottle.position.set(2, 0, 0);
                bottle.scale.set(5, 5, 5);
                scene.add(bottle);
                window.__3D_STATE__.bottleLoaded = true;
            },
            undefined,
            (error) => {
                console.warn('Could not load WaterBottle.glb from public URL. Trying local...', error);
                // Fallback attempt to local file as requested by exact prompt wording
                loader.load('WaterBottle.glb', (gltf) => {
                    const bottle = gltf.scene;
                    bottle.position.set(2, 0, 0);
                    bottle.scale.set(5, 5, 5);
                    scene.add(bottle);
                    window.__3D_STATE__.bottleLoaded = true;
                }, undefined, (err) => console.error('Failed to load local WaterBottle.glb', err));
            }
        );

        // --- UI Interactions ---
        
        // Color Picker
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const colorHex = e.target.getAttribute('data-color');
                phoneCase.material.color.set(colorHex);
                window.__3D_STATE__.caseColor = colorHex;
            });
        });

        // Pattern Toggle
        document.getElementById('pattern-toggle').addEventListener('click', () => {
            currentPatternIndex = (currentPatternIndex + 1) % patterns.length;
            const newPattern = patterns[currentPatternIndex];
            window.__3D_STATE__.pattern = newPattern;
            
            phoneCase.material.map = textures[newPattern];
            phoneCase.material.needsUpdate = true;
        });

        // Debug Toggle
        const debugOverlay = document.getElementById('debug-overlay');
        document.getElementById('debug-toggle').addEventListener('click', () => {
            window.__3D_STATE__.debugMode = !window.__3D_STATE__.debugMode;
            window.__3D_STATE__.wireframe = window.__3D_STATE__.debugMode;
            
            phoneCase.material.wireframe = window.__3D_STATE__.wireframe;
            
            if (window.__3D_STATE__.debugMode) {
                debugOverlay.style.display = 'block';
            } else {
                debugOverlay.style.display = 'none';
            }
        });

        // --- Keyboard Interaction ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // Prevent page scroll
                window.__3D_STATE__.spinning = !window.__3D_STATE__.spinning;
            } else if (e.key === 'r' || e.key === 'R') {
                phoneCase.rotation.set(0, 0, 0);
                window.__3D_STATE__.spinning = false;
                window.__3D_STATE__.caseRotationY = 0;
            }
        });

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            window.__3D_STATE__.frameCount++;

            if (window.__3D_STATE__.spinning) {
                phoneCase.rotation.y += 0.02;
            }
            window.__3D_STATE__.caseRotationY = phoneCase.rotation.y;

            if (window.__3D_STATE__.debugMode) {
                const cp = camera.position;
                const pp = phoneCase.position;
                debugOverlay.innerHTML = `
Camera Pos:  x:${cp.x.toFixed(2)} y:${cp.y.toFixed(2)} z:${cp.z.toFixed(2)}
Case Pos:    x:${pp.x.toFixed(2)} y:${pp.y.toFixed(2)} z:${pp.z.toFixed(2)}
Case Color:  ${window.__3D_STATE__.caseColor}
Frame Count: ${window.__3D_STATE__.frameCount}
Wireframe:   ${window.__3D_STATE__.wireframe}
                `.trim();
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
