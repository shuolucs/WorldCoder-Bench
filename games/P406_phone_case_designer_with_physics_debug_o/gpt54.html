<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Phone Case Designer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #1a1a2e;
    }

    canvas {
      display: block;
    }

    #controls-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      border-radius: 8px;
      z-index: 10;
      color: white;
      min-width: 180px;
    }

    #controls-panel h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .color-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .color-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid white;
      cursor: pointer;
      outline: none;
      padding: 0;
    }

    #debug-toggle,
    #pattern-toggle {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #34495e;
      color: white;
      font-size: 14px;
    }

    #debug-overlay {
      position: absolute;
      top: 10px;
      right: 10px;
      min-width: 260px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      z-index: 10;
      font-family: monospace;
      white-space: pre-line;
      display: none;
    }
  </style>
</head>
<body>
  <div id="controls-panel">
    <h3>Phone Case Designer</h3>
    <div class="color-row">
      <button class="color-btn" data-color="#3498db" title="Blue" style="background:#3498db;"></button>
      <button class="color-btn" data-color="#e74c3c" title="Red" style="background:#e74c3c;"></button>
      <button class="color-btn" data-color="#2ecc71" title="Green" style="background:#2ecc71;"></button>
      <button class="color-btn" data-color="#f39c12" title="Orange" style="background:#f39c12;"></button>
      <button class="color-btn" data-color="#9b59b6" title="Purple" style="background:#9b59b6;"></button>
    </div>
    <button id="debug-toggle">Toggle Debug</button>
    <button id="pattern-toggle">Toggle Pattern</button>
  </div>

  <div id="debug-overlay"></div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1, 0);
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const gridHelper = new THREE.GridHelper(10, 10);
    scene.add(gridHelper);

    const caseMaterial = new THREE.MeshStandardMaterial({
      color: '#3498db',
      metalness: 0.3,
      roughness: 0.7
    });

    const caseGeometry = new THREE.BoxGeometry(0.8, 1.6, 0.1);
    const phoneCase = new THREE.Mesh(caseGeometry, caseMaterial);
    phoneCase.position.set(0, 1.5, 0);
    scene.add(phoneCase);

    const loader = new GLTFLoader();
    loader.load(
      'WaterBottle.glb',
      (gltf) => {
        const bottle = gltf.scene;
        bottle.position.set(2, 0, 0);
        bottle.scale.set(5, 5, 5);
        scene.add(bottle);
        window.__3D_STATE__.bottleLoaded = true;
      },
      undefined,
      (error) => {
        console.error('Error loading WaterBottle.glb:', error);
      }
    );

    const debugOverlay = document.getElementById('debug-overlay');
    const debugToggle = document.getElementById('debug-toggle');
    const patternToggle = document.getElementById('pattern-toggle');
    const colorButtons = document.querySelectorAll('.color-btn');

    window.__3D_STATE__ = {
      caseColor: '#3498db',
      debugMode: false,
      pattern: 'solid',
      spinning: false,
      caseRotationY: 0,
      bottleLoaded: false,
      frameCount: 0,
      wireframe: false
    };

    function createStripesTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = window.__3D_STATE__.caseColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      for (let y = 0; y < canvas.height; y += 32) {
        ctx.fillRect(0, y, canvas.width, 16);
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.needsUpdate = true;
      return texture;
    }

    function createDotsTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = window.__3D_STATE__.caseColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      for (let y = 24; y < canvas.height; y += 48) {
        for (let x = 24; x < canvas.width; x += 48) {
          ctx.beginPath();
          ctx.arc(x, y, 10, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.needsUpdate = true;
      return texture;
    }

    function applyPattern() {
      if (caseMaterial.map) {
        caseMaterial.map.dispose();
        caseMaterial.map = null;
      }

      if (window.__3D_STATE__.pattern === 'solid') {
        caseMaterial.map = null;
      } else if (window.__3D_STATE__.pattern === 'stripes') {
        caseMaterial.map = createStripesTexture();
      } else if (window.__3D_STATE__.pattern === 'dots') {
        caseMaterial.map = createDotsTexture();
      }

      caseMaterial.needsUpdate = true;
    }

    colorButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        const color = btn.dataset.color;
        caseMaterial.color.set(color);
        window.__3D_STATE__.caseColor = color;
        if (window.__3D_STATE__.pattern !== 'solid') {
          applyPattern();
        }
      });
    });

    debugToggle.addEventListener('click', () => {
      window.__3D_STATE__.debugMode = !window.__3D_STATE__.debugMode;
      debugOverlay.style.display = window.__3D_STATE__.debugMode ? 'block' : 'none';
      caseMaterial.wireframe = window.__3D_STATE__.debugMode;
      window.__3D_STATE__.wireframe = caseMaterial.wireframe;
    });

    patternToggle.addEventListener('click', () => {
      const current = window.__3D_STATE__.pattern;
      if (current === 'solid') {
        window.__3D_STATE__.pattern = 'stripes';
      } else if (current === 'stripes') {
        window.__3D_STATE__.pattern = 'dots';
      } else {
        window.__3D_STATE__.pattern = 'solid';
      }
      applyPattern();
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyR') {
        phoneCase.rotation.set(0, 0, 0);
        window.__3D_STATE__.caseRotationY = 0;
      }

      if (e.code === 'Space') {
        e.preventDefault();
        window.__3D_STATE__.spinning = !window.__3D_STATE__.spinning;
      }
    });

    const tempVec = new THREE.Vector3();

    function updateDebugOverlay() {
      phoneCase.getWorldPosition(tempVec);
      debugOverlay.textContent =
        `Camera Position: (${camera.position.x.toFixed(2)}, ${camera.position.y.toFixed(2)}, ${camera.position.z.toFixed(2)})
Phone Case Position: (${tempVec.x.toFixed(2)}, ${tempVec.y.toFixed(2)}, ${tempVec.z.toFixed(2)})
Current Case Color: ${window.__3D_STATE__.caseColor}
Frame Count: ${window.__3D_STATE__.frameCount}`;
    }

    function animate() {
      requestAnimationFrame(animate);

      window.__3D_STATE__.frameCount += 1;

      if (window.__3D_STATE__.spinning) {
        phoneCase.rotation.y += 0.02;
      }

      window.__3D_STATE__.caseRotationY = phoneCase.rotation.y;
      window.__3D_STATE__.wireframe = caseMaterial.wireframe;

      if (window.__3D_STATE__.debugMode) {
        updateDebugOverlay();
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
