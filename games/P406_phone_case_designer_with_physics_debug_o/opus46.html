<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Case Designer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: Arial, sans-serif; }
  canvas { display: block; }

  #controls-panel {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.8);
    padding: 15px;
    border-radius: 10px;
    color: white;
    z-index: 10;
    min-width: 200px;
  }

  #controls-panel h3 {
    margin-bottom: 10px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .color-buttons {
    display: flex;
    gap: 8px;
    margin-bottom: 15px;
    flex-wrap: wrap;
  }

  .color-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
  }

  .color-btn:hover {
    transform: scale(1.15);
    border-color: white;
  }

  .color-btn.active {
    border-color: white;
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
  }

  #debug-toggle, #pattern-toggle {
    display: block;
    width: 100%;
    padding: 8px 12px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
  }

  #debug-toggle:hover, #pattern-toggle:hover {
    background: rgba(255,255,255,0.25);
  }

  #debug-overlay {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0, 0, 0, 0.75);
    color: #0f0;
    padding: 15px;
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.8;
    z-index: 10;
    display: none;
    min-width: 280px;
    border: 1px solid rgba(0, 255, 0, 0.3);
  }

  .instructions {
    margin-top: 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="controls-panel">
  <h3>🎨 Case Designer</h3>
  <div class="color-buttons">
    <button class="color-btn active" data-color="#3498db" style="background:#3498db" title="Blue"></button>
    <button class="color-btn" data-color="#e74c3c" style="background:#e74c3c" title="Red"></button>
    <button class="color-btn" data-color="#2ecc71" style="background:#2ecc71" title="Green"></button>
    <button class="color-btn" data-color="#f39c12" style="background:#f39c12" title="Orange"></button>
    <button class="color-btn" data-color="#9b59b6" style="background:#9b59b6" title="Purple"></button>
  </div>
  <button id="debug-toggle">Toggle Debug</button>
  <button id="pattern-toggle">Toggle Pattern</button>
  <div class="instructions">
    [R] Reset rotation<br>
    [Space] Toggle spin
  </div>
</div>

<div id="debug-overlay">
  <div id="debug-content"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

// State
window.__3D_STATE__ = {
  caseColor: '#3498db',
  debugMode: false,
  pattern: 'solid',
  spinning: false,
  caseRotationY: 0,
  bottleLoaded: false,
  frameCount: 0,
  wireframe: false
};

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
scene.add(directionalLight);

// Grid
const gridHelper = new THREE.GridHelper(10, 10);
scene.add(gridHelper);

// Phone Case
let phoneCaseGeometry;
try {
  phoneCaseGeometry = new RoundedBoxGeometry(0.8, 1.6, 0.1, 4, 0.02);
} catch (e) {
  phoneCaseGeometry = new THREE.BoxGeometry(0.8, 1.6, 0.1);
}

const phoneCaseMaterial = new THREE.MeshStandardMaterial({
  color: new THREE.Color('#3498db'),
  metalness: 0.3,
  roughness: 0.7
});

const phoneCase = new THREE.Mesh(phoneCaseGeometry, phoneCaseMaterial);
phoneCase.position.set(0, 1.5, 0);
scene.add(phoneCase);

// Load WaterBottle.glb
const loader = new GLTFLoader();
loader.load(
  'WaterBottle.glb',
  (gltf) => {
    const bottle = gltf.scene;
    bottle.position.set(2, 0, 0);
    bottle.scale.set(5, 5, 5);
    scene.add(bottle);
    window.__3D_STATE__.bottleLoaded = true;
    console.log('WaterBottle.glb loaded successfully');
  },
  (progress) => {
    console.log('Loading WaterBottle.glb:', (progress.loaded / progress.total * 100).toFixed(1) + '%');
  },
  (error) => {
    console.warn('Could not load WaterBottle.glb:', error.message);
    // Create a placeholder bottle
    const bottleGroup = new THREE.Group();
    const bodyGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.3, 16);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, metalness: 0.8, roughness: 0.2, transparent: true, opacity: 0.7 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.15;
    bottleGroup.add(body);
    const capGeo = new THREE.CylinderGeometry(0.04, 0.05, 0.06, 16);
    const capMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.5, roughness: 0.5 });
    const cap = new THREE.Mesh(capGeo, capMat);
    cap.position.y = 0.33;
    bottleGroup.add(cap);
    bottleGroup.position.set(2, 0, 0);
    bottleGroup.scale.set(5, 5, 5);
    scene.add(bottleGroup);
    window.__3D_STATE__.bottleLoaded = true;
  }
);

// Texture generation
function createStripesTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 256;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, 256, 256);
  ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
  for (let y = 0; y < 256; y += 32) {
    ctx.fillRect(0, y, 256, 16);
  }
  const texture = new THREE.CanvasTexture(canvas);
  texture.wrapS = THREE.RepeatWrapping;
  texture.wrapT = THREE.RepeatWrapping;
  return texture;
}

function createDotsTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 256;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, 256, 256);
  ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
  for (let y = 20; y < 256; y += 40) {
    for (let x = 20; x < 256; x += 40) {
      ctx.beginPath();
      ctx.arc(x, y, 10, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  const texture = new THREE.CanvasTexture(canvas);
  texture.wrapS = THREE.RepeatWrapping;
  texture.wrapT = THREE.RepeatWrapping;
  return texture;
}

const patterns = ['solid', 'stripes', 'dots'];
let patternIndex = 0;

// Color buttons
const colorButtons = document.querySelectorAll('.color-btn');
colorButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    const color = btn.getAttribute('data-color');
    phoneCaseMaterial.color.set(color);
    window.__3D_STATE__.caseColor = color;
    colorButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// Debug toggle
const debugToggle = document.getElementById('debug-toggle');
const debugOverlay = document.getElementById('debug-overlay');
debugToggle.addEventListener('click', () => {
  window.__3D_STATE__.debugMode = !window.__3D_STATE__.debugMode;
  if (window.__3D_STATE__.debugMode) {
    debugOverlay.style.display = 'block';
    phoneCaseMaterial.wireframe = true;
    window.__3D_STATE__.wireframe = true;
  } else {
    debugOverlay.style.display = 'none';
    phoneCaseMaterial.wireframe = false;
    window.__3D_STATE__.wireframe = false;
  }
});

// Pattern toggle
const patternToggle = document.getElementById('pattern-toggle');
patternToggle.addEventListener('click', () => {
  patternIndex = (patternIndex + 1) % patterns.length;
  const pat = patterns[patternIndex];
  window.__3D_STATE__.pattern = pat;

  if (pat === 'solid') {
    phoneCaseMaterial.map = null;
  } else if (pat === 'stripes') {
    phoneCaseMaterial.map = createStripesTexture();
  } else if (pat === 'dots') {
    phoneCaseMaterial.map = createDotsTexture();
  }
  phoneCaseMaterial.needsUpdate = true;
  patternToggle.textContent = `Toggle Pattern (${pat})`;
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.code === 'KeyR') {
    phoneCase.rotation.set(0, 0, 0);
    window.__3D_STATE__.caseRotationY = 0;
  }
  if (e.code === 'Space') {
    e.preventDefault();
    window.__3D_STATE__.spinning = !window.__3D_STATE__.spinning;
  }
});

// Debug content element
const debugContent = document.getElementById('debug-content');

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  window.__3D_STATE__.frameCount++;

  if (window.__3D_STATE__.spinning) {
    phoneCase.rotation.y += 0.02;
  }

  window.__3D_STATE__.caseRotationY = phoneCase.rotation.y;

  if (window.__3D_STATE__.debugMode) {
    const cp = camera.position;
    const pp = phoneCase.position;
    debugContent.innerHTML =
      `<strong>── DEBUG INFO ──</strong><br>` +
      `Camera Pos: (${cp.x.toFixed(2)}, ${cp.y.toFixed(2)}, ${cp.z.toFixed(2)})<br>` +
      `Case Pos: (${pp.x.toFixed(2)}, ${pp.y.toFixed(2)}, ${pp.z.toFixed(2)})<br>` +
      `Case Color: ${window.__3D_STATE__.caseColor}<br>` +
      `Frame Count: ${window.__3D_STATE__.frameCount}<br>` +
      `Pattern: ${window.__3D_STATE__.pattern}<br>` +
      `Spinning: ${window.__3D_STATE__.spinning}<br>` +
      `Wireframe: ${window.__3D_STATE__.wireframe}<br>` +
      `Rotation Y: ${phoneCase.rotation.y.toFixed(4)} rad`;
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
