<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Billiard Table</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            z-index: 10;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #444;
            color: white;
            border: 1px solid #666;
            border-radius: 4px;
        }
        button:hover {
            background-color: #666;
        }
        button:active {
            background-color: #888;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        Shots Fired: <span id="shots">0</span><br>
        Collisions: <span id="collisions">0</span>
    </div>
    <div id="controls">
        <button id="shootBtn">Shoot</button>
        <button id="resetBtn">Reset</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Initialize State
        window.__3D_STATE__ = {
            balls: [],
            shotsFired: 0,
            collisionCount: 0,
            allStopped: true,
            michelleLoaded: false,
            michelle: null,
            tableWidth: 12,
            tableDepth: 6,
            initialized: false
        };

        // Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 10, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.update();

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.0);
        pointLight.position.set(0, 8, 0);
        scene.add(pointLight);

        // Table Construction
        const tableGroup = new THREE.Group();
        scene.add(tableGroup);

        // Playing Surface
        const bedGeo = new THREE.BoxGeometry(12, 0.5, 6);
        const bedMat = new THREE.MeshPhongMaterial({ color: 0x2d7d46 });
        const bed = new THREE.Mesh(bedGeo, bedMat);
        tableGroup.add(bed);

        // Cushion Rails
        const railMat = new THREE.MeshPhongMaterial({ color: 0x5c3a1a });
        
        const topRailGeo = new THREE.BoxGeometry(12.6, 0.3, 0.3);
        const topRail = new THREE.Mesh(topRailGeo, railMat);
        topRail.position.set(0, 0.4, -3.15);
        tableGroup.add(topRail);

        const bottomRail = new THREE.Mesh(topRailGeo, railMat);
        bottomRail.position.set(0, 0.4, 3.15);
        tableGroup.add(bottomRail);

        const sideRailGeo = new THREE.BoxGeometry(0.3, 0.3, 6);
        const leftRail = new THREE.Mesh(sideRailGeo, railMat);
        leftRail.position.set(-6.15, 0.4, 0);
        tableGroup.add(leftRail);

        const rightRail = new THREE.Mesh(sideRailGeo, railMat);
        rightRail.position.set(6.15, 0.4, 0);
        tableGroup.add(rightRail);

        // Billiard Balls
        const ballRadius = 0.3;
        const ballY = 0.55;
        const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);

        const initialBallData = [
            { color: 0xffffff, x: -3, z: 0 },    // Cue ball
            { color: 0xff0000, x: 2, z: 0.5 },   // Red ball
            { color: 0x0000ff, x: 2, z: -0.5 }   // Blue ball
        ];

        const physicsBalls = [];

        initialBallData.forEach((data, index) => {
            const mat = new THREE.MeshPhongMaterial({ color: data.color });
            const mesh = new THREE.Mesh(ballGeo, mat);
            mesh.position.set(data.x, ballY, data.z);
            scene.add(mesh);

            physicsBalls.push({
                id: index,
                mesh: mesh,
                x: data.x,
                z: data.z,
                vx: 0,
                vz: 0,
                mass: 1.0,
                radius: ballRadius
            });
        });

        // Load Spectator Model
        const loader = new GLTFLoader();
        loader.load(
            'Michelle.glb',
            (gltf) => {
                const model = gltf.scene;
                model.scale.set(0.01, 0.01, 0.01);
                model.position.set(8, 0, 0);
                scene.add(model);
                window.__3D_STATE__.michelle = model;
                window.__3D_STATE__.michelleLoaded = true;
            },
            undefined,
            (error) => {
                console.warn('Could not load Michelle.glb. Proceeding without spectator.', error);
            }
        );

        window.__3D_STATE__.initialized = true;

        // UI Interactions
        document.getElementById('shootBtn').addEventListener('click', () => {
            if (window.__3D_STATE__.allStopped) {
                physicsBalls[0].vx = 5.0;
                physicsBalls[0].vz = 0.2;
                window.__3D_STATE__.shotsFired += 1;
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            physicsBalls.forEach((b, i) => {
                b.x = initialBallData[i].x;
                b.z = initialBallData[i].z;
                b.vx = 0;
                b.vz = 0;
            });
            window.__3D_STATE__.shotsFired = 0;
            window.__3D_STATE__.collisionCount = 0;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Physics & Animation Loop
        const dt = 1 / 60;
        const friction = 0.995;
        const boundX = 5.7;
        const boundZ = 2.7;

        function updatePhysics() {
            let allStopped = true;

            // Update positions and apply friction
            for (let b of physicsBalls) {
                if (Math.abs(b.vx) + Math.abs(b.vz) < 0.01) {
                    b.vx = 0;
                    b.vz = 0;
                } else {
                    allStopped = false;
                    b.vx *= friction;
                    b.vz *= friction;
                    b.x += b.vx * dt;
                    b.z += b.vz * dt;
                }
            }

            window.__3D_STATE__.allStopped = allStopped;

            // Wall Collisions
            for (let b of physicsBalls) {
                if (b.x > boundX) {
                    b.x = boundX;
                    b.vx *= -1;
                } else if (b.x < -boundX) {
                    b.x = -boundX;
                    b.vx *= -1;
                }

                if (b.z > boundZ) {
                    b.z = boundZ;
                    b.vz *= -1;
                } else if (b.z < -boundZ) {
                    b.z = -boundZ;
                    b.vz *= -1;
                }
            }

            // Ball-Ball Collisions
            for (let i = 0; i < physicsBalls.length; i++) {
                for (let j = i + 1; j < physicsBalls.length; j++) {
                    let b1 = physicsBalls[i];
                    let b2 = physicsBalls[j];

                    let dx = b2.x - b1.x;
                    let dz = b2.z - b1.z;
                    let distSq = dx * dx + dz * dz;
                    let minDist = b1.radius + b2.radius;

                    if (distSq < minDist * minDist && distSq > 0) {
                        let dist = Math.sqrt(distSq);
                        let nx = dx / dist;
                        let nz = dz / dist;

                        // Positional correction to prevent sticking
                        let overlap = minDist - dist;
                        b1.x -= nx * (overlap / 2);
                        b1.z -= nz * (overlap / 2);
                        b2.x += nx * (overlap / 2);
                        b2.z += nz * (overlap / 2);

                        // Velocity exchange
                        let vn = (b1.vx - b2.vx) * nx + (b1.vz - b2.vz) * nz;
                        
                        // Only resolve if moving towards each other
                        if (vn > 0) {
                            b1.vx -= vn * nx;
                            b1.vz -= vn * nz;
                            b2.vx += vn * nx;
                            b2.vz += vn * nz;
                            
                            window.__3D_STATE__.collisionCount += 1;
                        }
                    }
                }
            }

            // Sync Meshes and State
            window.__3D_STATE__.balls = [];
            for (let b of physicsBalls) {
                b.mesh.position.x = b.x;
                b.mesh.position.z = b.z;
                window.__3D_STATE__.balls.push({ x: b.x, z: b.z, vx: b.vx, vz: b.vz });
            }
        }

        function updateHUD() {
            document.getElementById('shots').innerText = window.__3D_STATE__.shotsFired;
            document.getElementById('collisions').innerText = window.__3D_STATE__.collisionCount;
        }

        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            updateHUD();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
