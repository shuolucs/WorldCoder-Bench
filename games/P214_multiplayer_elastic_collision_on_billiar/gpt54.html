<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Billiard Table - Three.js</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #ui {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 20;
      display: flex;
      gap: 8px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      background: #f0f0f0;
    }

    button:hover {
      background: #ddd;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 20;
      color: white;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px;
      border-radius: 6px;
      white-space: pre-line;
      font-size: 14px;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="hud">Loading...</div>

  <div id="ui">
    <button id="shootBtn">Shoot</button>
    <button id="resetBtn">Reset</button>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x20252b);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 10, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.5, 0);
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 1.0);
    pointLight.position.set(0, 8, 0);
    scene.add(pointLight);

    window.__3D_STATE__ = {
      balls: [],
      shotsFired: 0,
      collisionCount: 0,
      allStopped: true,
      michelleLoaded: false,
      tableWidth: 12,
      tableDepth: 6,
      initialized: false,
      michelle: null
    };

    const TABLE_WIDTH = 12;
    const TABLE_DEPTH = 6;
    const TABLE_HEIGHT = 0.5;
    const BALL_RADIUS = 0.3;
    const BALL_Y = 0.55;
    const FIXED_DT = 1 / 60;
    const FRICTION = 0.995;
    const STOP_EPS = 0.01;
    const X_BOUND = 5.7;
    const Z_BOUND = 2.7;

    const hud = document.getElementById('hud');
    const shootBtn = document.getElementById('shootBtn');
    const resetBtn = document.getElementById('resetBtn');

    const tableGroup = new THREE.Group();
    scene.add(tableGroup);

    // Table surface
    const tableGeom = new THREE.BoxGeometry(TABLE_WIDTH, TABLE_HEIGHT, TABLE_DEPTH);
    const tableMat = new THREE.MeshPhongMaterial({ color: 0x2d7d46 });
    const tableMesh = new THREE.Mesh(tableGeom, tableMat);
    tableMesh.position.set(0, 0, 0);
    tableGroup.add(tableMesh);

    // Rails
    const railMat = new THREE.MeshPhongMaterial({ color: 0x5c3a1a });
    const railThickness = 0.3;
    const railHeight = 0.3;

    const longRailGeom = new THREE.BoxGeometry(TABLE_WIDTH, railHeight, railThickness);
    const shortRailGeom = new THREE.BoxGeometry(railThickness, railHeight, TABLE_DEPTH);

    const railTop = new THREE.Mesh(longRailGeom, railMat);
    railTop.position.set(0, TABLE_HEIGHT / 2 + railHeight / 2, TABLE_DEPTH / 2);
    tableGroup.add(railTop);

    const railBottom = new THREE.Mesh(longRailGeom, railMat);
    railBottom.position.set(0, TABLE_HEIGHT / 2 + railHeight / 2, -TABLE_DEPTH / 2);
    tableGroup.add(railBottom);

    const railLeft = new THREE.Mesh(shortRailGeom, railMat);
    railLeft.position.set(-TABLE_WIDTH / 2, TABLE_HEIGHT / 2 + railHeight / 2, 0);
    tableGroup.add(railLeft);

    const railRight = new THREE.Mesh(shortRailGeom, railMat);
    railRight.position.set(TABLE_WIDTH / 2, TABLE_HEIGHT / 2 + railHeight / 2, 0);
    tableGroup.add(railRight);

    // Ground for context
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 40),
      new THREE.MeshPhongMaterial({ color: 0x444444, side: THREE.DoubleSide })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.26;
    scene.add(ground);

    const initialBallData = [
      { color: 0xffffff, position: new THREE.Vector3(-3, BALL_Y, 0) },
      { color: 0xff0000, position: new THREE.Vector3(2, BALL_Y, 0.5) },
      { color: 0x0000ff, position: new THREE.Vector3(2, BALL_Y, -0.5) }
    ];

    const balls = [];

    function createBall(data, index) {
      const geom = new THREE.SphereGeometry(BALL_RADIUS, 32, 32);
      const mat = new THREE.MeshPhongMaterial({ color: data.color });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.position.copy(data.position);
      scene.add(mesh);

      return {
        index,
        mesh,
        radius: BALL_RADIUS,
        mass: 1.0,
        velocity: { x: 0, z: 0 },
        initialPosition: data.position.clone()
      };
    }

    initialBallData.forEach((data, i) => {
      balls.push(createBall(data, i));
    });

    // Aim line
    const aimMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });
    const aimGeometry = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(),
      new THREE.Vector3()
    ]);
    const aimLine = new THREE.Line(aimGeometry, aimMaterial);
    aimLine.visible = false;
    scene.add(aimLine);

    let aiming = false;

    function isBallStopped(ball) {
      return Math.abs(ball.velocity.x) + Math.abs(ball.velocity.z) < STOP_EPS;
    }

    function resetBalls() {
      balls.forEach(ball => {
        ball.mesh.position.copy(ball.initialPosition);
        ball.velocity.x = 0;
        ball.velocity.z = 0;
      });
      window.__3D_STATE__.shotsFired = 0;
      window.__3D_STATE__.collisionCount = 0;
      aiming = false;
      aimLine.visible = false;
      update3DState();
      updateHUD();
    }

    function updateAimLine() {
      if (!aiming) {
        aimLine.visible = false;
        return;
      }

      const cueBall = balls[0];
      const forward = new THREE.Vector3();
      camera.getWorldDirection(forward);
      forward.y = 0;
      if (forward.lengthSq() < 0.0001) {
        forward.set(1, 0, 0);
      }
      forward.normalize();

      const start = cueBall.mesh.position.clone();
      const end = start.clone().add(forward.multiplyScalar(2.5));

      aimLine.geometry.setFromPoints([start, end]);
      aimLine.visible = true;
    }

    function shootCueBallWithAim() {
      const cueBall = balls[0];
      if (!aiming || !isBallStopped(cueBall)) return;

      const dir = new THREE.Vector3();
      camera.getWorldDirection(dir);
      dir.y = 0;
      if (dir.lengthSq() < 0.0001) return;
      dir.normalize();

      cueBall.velocity.x = dir.x * 5.0;
      cueBall.velocity.z = dir.z * 5.0;

      window.__3D_STATE__.shotsFired += 1;
      aiming = false;
      aimLine.visible = false;
    }

    function shootCueBallSimple() {
      const cueBall = balls[0];
      if (!isBallStopped(cueBall)) return;

      cueBall.velocity.x = 5.0;
      cueBall.velocity.z = 0.2;
      window.__3D_STATE__.shotsFired += 1;
      aiming = false;
      aimLine.visible = false;
    }

    function resolveBallCollision(ballA, ballB) {
      const dx = ballB.mesh.position.x - ballA.mesh.position.x;
      const dz = ballB.mesh.position.z - ballA.mesh.position.z;
      const distSq = dx * dx + dz * dz;
      const minDist = ballA.radius + ballB.radius;

      if (distSq === 0) return;
      if (distSq >= minDist * minDist) return;

      const dist = Math.sqrt(distSq);
      const nx = dx / dist;
      const nz = dz / dist;

      // Separate overlap
      const overlap = minDist - dist;
      const separation = overlap / 2;
      ballA.mesh.position.x -= nx * separation;
      ballA.mesh.position.z -= nz * separation;
      ballB.mesh.position.x += nx * separation;
      ballB.mesh.position.z += nz * separation;

      // Velocity components along normal
      const vA_n = ballA.velocity.x * nx + ballA.velocity.z * nz;
      const vB_n = ballB.velocity.x * nx + ballB.velocity.z * nz;

      // Tangential components remain unchanged
      const vA_t_x = ballA.velocity.x - vA_n * nx;
      const vA_t_z = ballA.velocity.z - vA_n * nz;
      const vB_t_x = ballB.velocity.x - vB_n * nx;
      const vB_t_z = ballB.velocity.z - vB_n * nz;

      // Equal mass elastic collision: swap normal components
      ballA.velocity.x = vA_t_x + vB_n * nx;
      ballA.velocity.z = vA_t_z + vB_n * nz;
      ballB.velocity.x = vB_t_x + vA_n * nx;
      ballB.velocity.z = vB_t_z + vA_n * nz;

      window.__3D_STATE__.collisionCount += 1;
    }

    function resolveCushionCollision(ball) {
      if (ball.mesh.position.x > X_BOUND) {
        ball.mesh.position.x = X_BOUND;
        ball.velocity.x *= -1;
      } else if (ball.mesh.position.x < -X_BOUND) {
        ball.mesh.position.x = -X_BOUND;
        ball.velocity.x *= -1;
      }

      if (ball.mesh.position.z > Z_BOUND) {
        ball.mesh.position.z = Z_BOUND;
        ball.velocity.z *= -1;
      } else if (ball.mesh.position.z < -Z_BOUND) {
        ball.mesh.position.z = -Z_BOUND;
        ball.velocity.z *= -1;
      }
    }

    function updatePhysics() {
      for (const ball of balls) {
        ball.mesh.position.x += ball.velocity.x * FIXED_DT;
        ball.mesh.position.z += ball.velocity.z * FIXED_DT;

        ball.velocity.x *= FRICTION;
        ball.velocity.z *= FRICTION;

        if (Math.abs(ball.velocity.x) + Math.abs(ball.velocity.z) < STOP_EPS) {
          ball.velocity.x = 0;
          ball.velocity.z = 0;
        }

        resolveCushionCollision(ball);
      }

      for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
          resolveBallCollision(balls[i], balls[j]);
        }
      }
    }

    function update3DState() {
      window.__3D_STATE__.balls = balls.map(ball => ({
        x: ball.mesh.position.x,
        z: ball.mesh.position.z,
        vx: ball.velocity.x,
        vz: ball.velocity.z
      }));

      window.__3D_STATE__.allStopped = balls.every(isBallStopped);
    }

    function updateHUD() {
      hud.textContent =
        `Shots Fired: ${window.__3D_STATE__.shotsFired}\n` +
        `Collision Count: ${window.__3D_STATE__.collisionCount}\n` +
        `All Stopped: ${window.__3D_STATE__.allStopped}`;
    }

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function onCanvasClick(event) {
      const cueBall = balls[0];
      if (!isBallStopped(cueBall)) return;

      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObject(cueBall.mesh, false);

      if (hits.length > 0) {
        aiming = true;
        updateAimLine();
      } else {
        aiming = false;
        aimLine.visible = false;
      }
    }

    renderer.domElement.addEventListener('click', onCanvasClick);

    window.addEventListener('keydown', (event) => {
      if (event.code === 'Space') {
        event.preventDefault();
        shootCueBallWithAim();
      }
    });

    shootBtn.addEventListener('click', shootCueBallSimple);
    resetBtn.addEventListener('click', resetBalls);

    // Load Michelle.glb
    const loader = new GLTFLoader();
    loader.load(
      'Michelle.glb',
      (gltf) => {
        const model = gltf.scene;
        model.scale.setScalar(0.01);
        model.position.set(8, 0, 0);
        scene.add(model);
        window.__3D_STATE__.michelle = model;
        window.__3D_STATE__.michelleLoaded = true;
      },
      undefined,
      (error) => {
        console.warn('Michelle.glb failed to load:', error);
      }
    );

    function animate() {
      requestAnimationFrame(animate);

      updatePhysics();
      updateAimLine();
      update3DState();
      updateHUD();

      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    update3DState();
    updateHUD();
    window.__3D_STATE__.initialized = true;
    animate();
  </script>
</body>
</html>
