<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Billiard Table</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a1a; font-family: Arial, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    background: rgba(0, 0, 0, 0.7);
    padding: 10px;
    border-radius: 5px;
    font-size: 14px;
    line-height: 1.6;
    z-index: 10;
  }
  #controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  #controls button {
    padding: 10px 24px;
    font-size: 16px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
  }
  #shootBtn {
    background: #4CAF50;
    color: white;
  }
  #shootBtn:hover { background: #45a049; }
  #shootBtn:disabled { background: #666; cursor: not-allowed; }
  #resetBtn {
    background: #f44336;
    color: white;
  }
  #resetBtn:hover { background: #da190b; }
  #aimInfo {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: #ffeb3b;
    background: rgba(0,0,0,0.7);
    padding: 8px 16px;
    border-radius: 5px;
    font-size: 13px;
    z-index: 10;
    display: none;
  }
</style>
</head>
<body>

<div id="hud">
  <div>Shots Fired: <span id="shotsDisplay">0</span></div>
  <div>Collisions: <span id="collisionsDisplay">0</span></div>
  <div>Status: <span id="statusDisplay">Ready</span></div>
</div>

<div id="aimInfo">🎯 Aiming Mode — Click on table to set direction, press SPACE to shoot</div>

<div id="controls">
  <button id="shootBtn">🎱 Shoot</button>
  <button id="resetBtn">🔄 Reset</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 10, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.2;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 1.0, 50);
pointLight.position.set(0, 8, 0);
pointLight.castShadow = true;
pointLight.shadow.mapSize.width = 2048;
pointLight.shadow.mapSize.height = 2048;
scene.add(pointLight);

// Additional fill light
const fillLight = new THREE.DirectionalLight(0xfff5e6, 0.3);
fillLight.position.set(5, 5, 5);
scene.add(fillLight);

// ============ TABLE ============
// Table legs
const legGeometry = new THREE.CylinderGeometry(0.2, 0.2, 1.5, 8);
const legMaterial = new THREE.MeshStandardMaterial({ color: 0x3d2010, roughness: 0.8 });
const legPositions = [
  [-5.5, -0.75, -2.5],
  [5.5, -0.75, -2.5],
  [-5.5, -0.75, 2.5],
  [5.5, -0.75, 2.5]
];
legPositions.forEach(pos => {
  const leg = new THREE.Mesh(legGeometry, legMaterial);
  leg.position.set(...pos);
  leg.castShadow = true;
  scene.add(leg);
});

// Playing surface
const surfaceGeometry = new THREE.BoxGeometry(12, 0.5, 6);
const surfaceMaterial = new THREE.MeshStandardMaterial({ color: 0x2d7d46, roughness: 0.9 });
const surface = new THREE.Mesh(surfaceGeometry, surfaceMaterial);
surface.position.set(0, 0, 0);
surface.receiveShadow = true;
scene.add(surface);

// Cushion rails
const railMaterial = new THREE.MeshStandardMaterial({ color: 0x5c3a1a, roughness: 0.7 });

// Long rails (along X axis)
const longRailGeometry = new THREE.BoxGeometry(12.6, 0.3, 0.3);
const railTop = new THREE.Mesh(longRailGeometry, railMaterial);
railTop.position.set(0, 0.4, 3.15);
railTop.castShadow = true;
scene.add(railTop);

const railBottom = new THREE.Mesh(longRailGeometry, railMaterial);
railBottom.position.set(0, 0.4, -3.15);
railBottom.castShadow = true;
scene.add(railBottom);

// Short rails (along Z axis)
const shortRailGeometry = new THREE.BoxGeometry(0.3, 0.3, 6.6);
const railLeft = new THREE.Mesh(shortRailGeometry, railMaterial);
railLeft.position.set(-6.15, 0.4, 0);
railLeft.castShadow = true;
scene.add(railLeft);

const railRight = new THREE.Mesh(shortRailGeometry, railMaterial);
railRight.position.set(6.15, 0.4, 0);
railRight.castShadow = true;
scene.add(railRight);

// Floor
const floorGeometry = new THREE.PlaneGeometry(30, 30);
const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 1.0 });
const floor = new THREE.Mesh(floorGeometry, floorMaterial);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -1.5;
floor.receiveShadow = true;
scene.add(floor);

// ============ BILLIARD BALLS ============
const ballRadius = 0.3;
const ballY = 0.55;

const initialPositions = [
  { x: -3, z: 0 },
  { x: 2, z: 0.5 },
  { x: 2, z: -0.5 }
];

const ballColors = [0xffffff, 0xff0000, 0x0000ff];
const ballNames = ['Cue', 'Red', 'Blue'];

const ballMeshes = [];
const ballData = [];

for (let i = 0; i < 3; i++) {
  const geometry = new THREE.SphereGeometry(ballRadius, 32, 32);
  const material = new THREE.MeshStandardMaterial({
    color: ballColors[i],
    roughness: 0.2,
    metalness: 0.1
  });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.set(initialPositions[i].x, ballY, initialPositions[i].z);
  mesh.castShadow = true;
  scene.add(mesh);
  ballMeshes.push(mesh);

  ballData.push({
    x: initialPositions[i].x,
    z: initialPositions[i].z,
    vx: 0,
    vz: 0,
    mass: 1.0,
    radius: ballRadius
  });
}

// Add number/stripe to cue ball
const cueBallRing = new THREE.Mesh(
  new THREE.TorusGeometry(0.15, 0.02, 8, 16),
  new THREE.MeshStandardMaterial({ color: 0xcccccc })
);
cueBallRing.rotation.x = Math.PI / 2;
cueBallRing.position.y = 0.01;
ballMeshes[0].add(cueBallRing);

// ============ AIM LINE ============
const aimLineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
const aimLineGeometry = new THREE.BufferGeometry();
aimLineGeometry.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0, 0,0,0], 3));
const aimLine = new THREE.Line(aimLineGeometry, aimLineMaterial);
aimLine.visible = false;
scene.add(aimLine);

// ============ STATE ============
let aiming = false;
let aimDirection = { x: 1, z: 0 };

window.__3D_STATE__ = {
  balls: ballData.map(b => ({ x: b.x, z: b.z, vx: b.vx, vz: b.vz })),
  shotsFired: 0,
  collisionCount: 0,
  allStopped: true,
  michelleLoaded: false,
  michelle: null,
  tableWidth: 12,
  tableDepth: 6,
  initialized: true
};

// ============ LOAD MICHELLE ============
const loader = new GLTFLoader();
loader.load(
  'Michelle.glb',
  (gltf) => {
    const model = gltf.scene;
    model.scale.set(0.01, 0.01, 0.01);
    model.position.set(8, 0, 0);
    model.rotation.y = -Math.PI / 2;
    scene.add(model);
    window.__3D_STATE__.michelle = model;
    window.__3D_STATE__.michelleLoaded = true;
    console.log('Michelle.glb loaded successfully');
  },
  undefined,
  (error) => {
    console.warn('Could not load Michelle.glb:', error.message || error);
    // Create placeholder
    const placeholder = new THREE.Group();
    // Body
    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(0.3, 0.3, 1.5, 8),
      new THREE.MeshStandardMaterial({ color: 0xffaa88 })
    );
    body.position.y = 0.75;
    placeholder.add(body);
    // Head
    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.25, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0xffcc99 })
    );
    head.position.y = 1.75;
    placeholder.add(head);
    placeholder.position.set(8, -1.5, 0);
    scene.add(placeholder);
    window.__3D_STATE__.michelle = placeholder;
    window.__3D_STATE__.michelleLoaded = true;
  }
);

// ============ PHYSICS ============
const dt = 1 / 60;
const friction = 0.995;
const cushionX = 5.7;
const cushionZ = 2.7;
const shootSpeed = 5.0;

function isBallStopped(ball) {
  return Math.abs(ball.vx) + Math.abs(ball.vz) < 0.01;
}

function allBallsStopped() {
  return ballData.every(b => isBallStopped(b));
}

function updatePhysics() {
  // Update positions
  for (let i = 0; i < ballData.length; i++) {
    const b = ballData[i];
    b.x += b.vx * dt;
    b.z += b.vz * dt;

    // Friction
    b.vx *= friction;
    b.vz *= friction;

    // Stop very slow balls
    if (isBallStopped(b)) {
      b.vx = 0;
      b.vz = 0;
    }

    // Cushion collisions
    if (b.x > cushionX) {
      b.x = cushionX;
      b.vx = -Math.abs(b.vx);
    }
    if (b.x < -cushionX) {
      b.x = -cushionX;
      b.vx = Math.abs(b.vx);
    }
    if (b.z > cushionZ) {
      b.z = cushionZ;
      b.vz = -Math.abs(b.vz);
    }
    if (b.z < -cushionZ) {
      b.z = -cushionZ;
      b.vz = Math.abs(b.vz);
    }
  }

  // Ball-ball collisions
  for (let i = 0; i < ballData.length; i++) {
    for (let j = i + 1; j < ballData.length; j++) {
      const a = ballData[i];
      const b = ballData[j];
      const dx = b.x - a.x;
      const dz = b.z - a.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      const minDist = a.radius + b.radius;

      if (dist < minDist && dist > 0.001) {
        // Collision normal
        const nx = dx / dist;
        const nz = dz / dist;

        // Relative velocity along normal
        const dvx = a.vx - b.vx;
        const dvz = a.vz - b.vz;
        const dvn = dvx * nx + dvz * nz;

        // Only resolve if balls are approaching
        if (dvn > 0) {
          // Equal mass elastic collision: swap normal components
          const impulse = dvn; // For equal mass: impulse = dvn

          a.vx -= impulse * nx;
          a.vz -= impulse * nz;
          b.vx += impulse * nx;
          b.vz += impulse * nz;

          window.__3D_STATE__.collisionCount++;
        }

        // Separate overlapping balls
        const overlap = minDist - dist;
        const sepX = (overlap / 2) * nx;
        const sepZ = (overlap / 2) * nz;
        a.x -= sepX;
        a.z -= sepZ;
        b.x += sepX;
        b.z += sepZ;
      }
    }
  }

  // Update meshes
  for (let i = 0; i < ballData.length; i++) {
    ballMeshes[i].position.x = ballData[i].x;
    ballMeshes[i].position.z = ballData[i].z;

    // Rotate ball based on velocity for visual effect
    const speed = Math.sqrt(ballData[i].vx ** 2 + ballData[i].vz ** 2);
    if (speed > 0.01) {
      ballMeshes[i].rotation.z -= ballData[i].vx * dt * 3;
      ballMeshes[i].rotation.x += ballData[i].vz * dt * 3;
    }
  }

  // Update state
  const state = window.__3D_STATE__;
  state.allStopped = allBallsStopped();
  for (let i = 0; i < ballData.length; i++) {
    state.balls[i].x = ballData[i].x;
    state.balls[i].z = ballData[i].z;
    state.balls[i].vx = ballData[i].vx;
    state.balls[i].vz = ballData[i].vz;
  }
}

// ============ AIMING ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const aimPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -ballY);

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  if (!aiming && allBallsStopped()) {
    // Check if cue ball is clicked
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(ballMeshes[0]);
    if (intersects.length > 0) {
      aiming = true;
      aimLine.visible = true;
      document.getElementById('aimInfo').style.display = 'block';
      return;
    }
  }

  if (aiming) {
    // Set aim direction based on click position on table plane
    raycaster.setFromCamera(mouse, camera);
    const intersectPoint = new THREE.Vector3();
    if (raycaster.ray.intersectPlane(aimPlane, intersectPoint)) {
      const dx = intersectPoint.x - ballData[0].x;
      const dz = intersectPoint.z - ballData[0].z;
      const len = Math.sqrt(dx * dx + dz * dz);
      if (len > 0.01) {
        aimDirection.x = dx / len;
        aimDirection.z = dz / len;
      }
    }
  }
});

renderer.domElement.addEventListener('mousemove', (event) => {
  if (!aiming) return;
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersectPoint = new THREE.Vector3();
  if (raycaster.ray.intersectPlane(aimPlane, intersectPoint)) {
    const dx = intersectPoint.x - ballData[0].x;
    const dz = intersectPoint.z - ballData[0].z;
    const len = Math.sqrt(dx * dx + dz * dz);
    if (len > 0.01) {
      aimDirection.x = dx / len;
      aimDirection.z = dz / len;
    }
  }
});

document.addEventListener('keydown', (event) => {
  if (event.code === 'Space' && aiming) {
    event.preventDefault();
    shoot(aimDirection.x * shootSpeed, aimDirection.z * shootSpeed);
    aiming = false;
    aimLine.visible = false;
    document.getElementById('aimInfo').style.display = 'none';
  }
  if (event.code === 'Escape' && aiming) {
    aiming = false;
    aimLine.visible = false;
    document.getElementById('aimInfo').style.display = 'none';
  }
});

function shoot(vx, vz) {
  if (!allBallsStopped()) return;
  ballData[0].vx = vx;
  ballData[0].vz = vz;
  window.__3D_STATE__.shotsFired++;
}

function updateAimLine() {
  if (!aiming) return;
  const positions = aimLine.geometry.attributes.position.array;
  const bx = ballData[0].x;
  const bz = ballData[0].z;
  positions[0] = bx;
  positions[1] = ballY;
  positions[2] = bz;
  positions[3] = bx + aimDirection.x * 4;
  positions[4] = ballY;
  positions[5] = bz + aimDirection.z * 4;
  aimLine.geometry.attributes.position.needsUpdate = true;
}

// ============ BUTTONS ============
document.getElementById('shootBtn').addEventListener('click', () => {
  if (allBallsStopped()) {
    if (aiming) {
      shoot(aimDirection.x * shootSpeed, aimDirection.z * shootSpeed);
      aiming = false;
      aimLine.visible = false;
      document.getElementById('aimInfo').style.display = 'none';
    } else {
      shoot(5.0, 0.2);
    }
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  for (let i = 0; i < ballData.length; i++) {
    ballData[i].x = initialPositions[i].x;
    ballData[i].z = initialPositions[i].z;
    ballData[i].vx = 0;
    ballData[i].vz = 0;
    ballMeshes[i].position.x = initialPositions[i].x;
    ballMeshes[i].position.z = initialPositions[i].z;
    ballMeshes[i].rotation.set(0, 0, 0);
  }
  window.__3D_STATE__.shotsFired = 0;
  window.__3D_STATE__.collisionCount = 0;
  aiming = false;
  aimLine.visible = false;
  document.getElementById('aimInfo').style.display = 'none';
});

// ============ HUD ============
function updateHUD() {
  const state = window.__3D_STATE__;
  document.getElementById('shotsDisplay').textContent = state.shotsFired;
  document.getElementById('collisionsDisplay').textContent = state.collisionCount;

  const stopped = state.allStopped;
  const statusEl = document.getElementById('statusDisplay');
  if (aiming) {
    statusEl.textContent = '🎯 Aiming';
    statusEl.style.color = '#ffeb3b';
  } else if (stopped) {
    statusEl.textContent = '✅ Ready';
    statusEl.style.color = '#4CAF50';
  } else {
    statusEl.textContent = '🎱 In Motion';
    statusEl.style.color = '#ff9800';
  }

  document.getElementById('shootBtn').disabled = !stopped && !aiming;
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============
function animate() {
  requestAnimationFrame(animate);

  updatePhysics();
  updateAimLine();
  updateHUD();
  controls.update();

  renderer.render(scene, camera);
}

animate();

console.log('Billiard table initialized. Click on the cue ball to aim, then press SPACE to shoot!');
</script>
</body>
</html>
