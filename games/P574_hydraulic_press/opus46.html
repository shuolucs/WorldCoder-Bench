<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pascal's Principle - Hydraulic Press Simulation</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
  body { margin: 0; overflow: hidden; font-family: monospace; }
  canvas { display: block; }

  #hud {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.6);
    color: #0f0;
    font-family: monospace;
    font-size: 13px;
    padding: 10px;
    border-radius: 6px;
    z-index: 100;
    pointer-events: none;
    line-height: 1.6;
    min-width: 280px;
  }

  #controls {
    position: fixed;
    bottom: 10px;
    right: 10px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-family: monospace;
    font-size: 12px;
    padding: 14px;
    border-radius: 8px;
    z-index: 100;
    min-width: 240px;
  }
  #controls label {
    display: block;
    margin-bottom: 8px;
  }
  #controls input[type="range"] {
    width: 100%;
  }
  #controls .slider-val {
    color: #0ff;
    float: right;
  }
  #controls .section-title {
    color: #ff0;
    margin-top: 6px;
    margin-bottom: 4px;
    font-weight: bold;
  }
  .key-hint {
    color: #aaa;
    font-size: 10px;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div id="hud">
  <div><b>═══ PASCAL'S PRINCIPLE ═══</b></div>
  <div>Input Force: <span id="hud-inputforce">0</span> N</div>
  <div>Output Force: <span id="hud-outputforce">0</span> N</div>
  <div>Multiplication: <span id="hud-multiply">0</span>x</div>
  <div>Pressure: <span id="hud-pressure">0</span> Pa</div>
  <div>Small Piston Δ: <span id="hud-disp1">0</span> units</div>
  <div>Large Piston Δ: <span id="hud-disp2">0</span> units</div>
  <div>Frame: <span id="hud-framecount">0</span></div>
  <div>Paused: <span id="hud-paused">No</span></div>
</div>

<div id="controls">
  <div class="section-title">⚙ HYDRAULIC PRESS CONTROLS</div>

  <label>Input Force: <span class="slider-val" id="val-inputforce">100 N</span>
    <input type="range" id="slider-inputforce" min="0" max="500" value="100" step="5">
  </label>

  <label>Small Radius (r₁): <span class="slider-val" id="val-smallradius">1.0</span>
    <input type="range" id="slider-smallradius" min="0.5" max="2.0" value="1.0" step="0.1">
  </label>

  <label>Large Radius (r₂): <span class="slider-val" id="val-largeradius">3.0</span>
    <input type="range" id="slider-largeradius" min="2.0" max="6.0" value="3.0" step="0.1">
  </label>

  <label>Press/Release: <span class="slider-val" id="val-press">Released</span>
    <input type="range" id="slider-press" min="0" max="1" value="0" step="1">
  </label>

  <div class="key-hint">Space: Toggle Press | R: Reset | P: Pause</div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ─── State ───
window.__3D_STATE__ = {
  frameCount: 0,
  isPaused: false,
  inputForce: 100,
  outputForce: 0,
  pressure: 0,
  smallRadius: 1.0,
  largeRadius: 3.0,
  multiplicationFactor: 9,
  smallPistonDisp: 0,
  largePistonDisp: 0,
  isPressed: false,
  avocadoScaleY: 1.0,
  isValid: true
};

let isPaused = false;
let frameCount = 0;

// ─── Renderer ───
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ─── Scene ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xe8e8e8);

// ─── Camera ───
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(12, 8, 12);
camera.lookAt(0, 0, 0);

// ─── Controls ───
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// ─── Lights ───
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(8, 12, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -20;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.5);
scene.add(hemiLight);

// ─── Ground ───
const groundGeo = new THREE.PlaneGeometry(60, 60);
const groundMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -3;
ground.receiveShadow = true;
scene.add(ground);

// ─── Simulation Parameters ───
let r1 = 1.0;
let r2 = 3.0;
let inputForce = 100;
let isPressed = false;

const CYLINDER_HEIGHT = 6;
const BASE_Y = -2.5;
const PISTON_THICKNESS = 0.3;
const MAX_PISTON_TRAVEL = 3.0;
const SPACING = 2.0;

// Current animated positions
let currentSmallPistonDisp = 0;
let currentLargePistonDisp = 0;
let targetSmallPistonDisp = 0;
let targetLargePistonDisp = 0;

// ─── Groups for rebuild ───
let hydraulicGroup = new THREE.Group();
scene.add(hydraulicGroup);

let avocadoModel = null;
let avocadoBaseScale = 0.08;

// Materials
const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0xaaddff,
  transparent: true,
  opacity: 0.3,
  roughness: 0.1,
  metalness: 0.0,
  side: THREE.DoubleSide,
  depthWrite: false
});

const fluidMat = new THREE.MeshStandardMaterial({
  color: 0x2196f3,
  transparent: true,
  opacity: 0.6,
  roughness: 0.3,
  metalness: 0.1,
});

const pistonMat = new THREE.MeshStandardMaterial({
  color: 0x888888,
  metalness: 0.8,
  roughness: 0.2
});

const baseMat = new THREE.MeshStandardMaterial({
  color: 0x333333,
  metalness: 0.5,
  roughness: 0.4
});

const pipeMat = new THREE.MeshStandardMaterial({
  color: 0x666666,
  metalness: 0.6,
  roughness: 0.3
});

// ─── Hydraulic components references ───
let smallCylinder, largeCylinder;
let smallPiston, largePiston;
let smallFluid, largeFluid, pipeFluid;
let connectingPipe;
let basePlatform;
let smallArrow, largeArrow;
let smallCylinderX, largeCylinderX;

function getSmallX() { return -(r1 + r2 + SPACING) / 2; }
function getLargeX() { return (r1 + r2 + SPACING) / 2; }

function buildHydraulics() {
  // Clear old
  while (hydraulicGroup.children.length > 0) {
    const child = hydraulicGroup.children[0];
    hydraulicGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
  }

  smallCylinderX = getSmallX();
  largeCylinderX = getLargeX();

  const totalWidth = Math.abs(largeCylinderX - smallCylinderX) + r2 * 2 + 2;

  // Base platform
  basePlatform = new THREE.Mesh(
    new THREE.BoxGeometry(totalWidth, 0.5, Math.max(r2 * 2 + 2, 8)),
    baseMat
  );
  basePlatform.position.set((smallCylinderX + largeCylinderX) / 2, BASE_Y - 0.25, 0);
  basePlatform.castShadow = true;
  basePlatform.receiveShadow = true;
  hydraulicGroup.add(basePlatform);

  // Small cylinder (glass)
  const smallCylGeo = new THREE.CylinderGeometry(r1 + 0.1, r1 + 0.1, CYLINDER_HEIGHT, 32, 1, true);
  smallCylinder = new THREE.Mesh(smallCylGeo, glassMat.clone());
  smallCylinder.position.set(smallCylinderX, BASE_Y + CYLINDER_HEIGHT / 2, 0);
  smallCylinder.castShadow = false;
  hydraulicGroup.add(smallCylinder);

  // Small cylinder bottom
  const smallBottomGeo = new THREE.CylinderGeometry(r1 + 0.1, r1 + 0.1, 0.1, 32);
  const smallBottom = new THREE.Mesh(smallBottomGeo, baseMat);
  smallBottom.position.set(smallCylinderX, BASE_Y, 0);
  hydraulicGroup.add(smallBottom);

  // Large cylinder (glass)
  const largeCylGeo = new THREE.CylinderGeometry(r2 + 0.1, r2 + 0.1, CYLINDER_HEIGHT, 32, 1, true);
  largeCylinder = new THREE.Mesh(largeCylGeo, glassMat.clone());
  largeCylinder.position.set(largeCylinderX, BASE_Y + CYLINDER_HEIGHT / 2, 0);
  largeCylinder.castShadow = false;
  hydraulicGroup.add(largeCylinder);

  // Large cylinder bottom
  const largeBottomGeo = new THREE.CylinderGeometry(r2 + 0.1, r2 + 0.1, 0.1, 32);
  const largeBottom = new THREE.Mesh(largeBottomGeo, baseMat);
  largeBottom.position.set(largeCylinderX, BASE_Y, 0);
  hydraulicGroup.add(largeBottom);

  // Small piston
  const smallPistonGeo = new THREE.CylinderGeometry(r1 - 0.05, r1 - 0.05, PISTON_THICKNESS, 32);
  smallPiston = new THREE.Mesh(smallPistonGeo, pistonMat);
  smallPiston.position.set(smallCylinderX, BASE_Y + CYLINDER_HEIGHT / 2, 0);
  smallPiston.castShadow = true;
  hydraulicGroup.add(smallPiston);

  // Piston rod (small)
  const smallRodGeo = new THREE.CylinderGeometry(0.1, 0.1, 3, 16);
  const smallRod = new THREE.Mesh(smallRodGeo, pistonMat);
  smallRod.position.set(0, 1.5, 0);
  smallPiston.add(smallRod);

  // Large piston
  const largePistonGeo = new THREE.CylinderGeometry(r2 - 0.05, r2 - 0.05, PISTON_THICKNESS, 32);
  largePiston = new THREE.Mesh(largePistonGeo, pistonMat);
  largePiston.position.set(largeCylinderX, BASE_Y + 1.0, 0);
  largePiston.castShadow = true;
  hydraulicGroup.add(largePiston);

  // Fluid in small cylinder
  const smallFluidHeight = CYLINDER_HEIGHT / 2;
  const smallFluidGeo = new THREE.CylinderGeometry(r1 - 0.06, r1 - 0.06, smallFluidHeight, 32);
  smallFluid = new THREE.Mesh(smallFluidGeo, fluidMat.clone());
  smallFluid.position.set(smallCylinderX, BASE_Y + smallFluidHeight / 2, 0);
  hydraulicGroup.add(smallFluid);

  // Fluid in large cylinder
  const largeFluidGeo = new THREE.CylinderGeometry(r2 - 0.06, r2 - 0.06, 1.0, 32);
  largeFluid = new THREE.Mesh(largeFluidGeo, fluidMat.clone());
  largeFluid.position.set(largeCylinderX, BASE_Y + 0.5, 0);
  hydraulicGroup.add(largeFluid);

  // Connecting pipe
  const pipeLength = Math.abs(largeCylinderX - smallCylinderX) - r1 - r2;
  const pipeRadius = Math.min(r1, 0.5);
  const pipeGeo = new THREE.CylinderGeometry(pipeRadius, pipeRadius, pipeLength + r1 + r2, 16);
  connectingPipe = new THREE.Mesh(pipeGeo, pipeMat);
  connectingPipe.rotation.z = Math.PI / 2;
  connectingPipe.position.set(
    (smallCylinderX + largeCylinderX) / 2,
    BASE_Y + 0.3,
    0
  );
  connectingPipe.castShadow = true;
  hydraulicGroup.add(connectingPipe);

  // Pipe fluid
  const pipeFluidGeo = new THREE.CylinderGeometry(pipeRadius - 0.05, pipeRadius - 0.05, pipeLength + r1 + r2 - 0.1, 16);
  pipeFluid = new THREE.Mesh(pipeFluidGeo, fluidMat.clone());
  pipeFluid.rotation.z = Math.PI / 2;
  pipeFluid.position.set(
    (smallCylinderX + largeCylinderX) / 2,
    BASE_Y + 0.3,
    0
  );
  hydraulicGroup.add(pipeFluid);

  // Force arrows
  if (smallArrow) { scene.remove(smallArrow); smallArrow.dispose(); }
  if (largeArrow) { scene.remove(largeArrow); largeArrow.dispose(); }

  smallArrow = new THREE.ArrowHelper(
    new THREE.Vector3(0, -1, 0), 
    new THREE.Vector3(smallCylinderX, BASE_Y + CYLINDER_HEIGHT + 2, 0),
    1, 0xff0000, 0.3, 0.2
  );
  scene.add(smallArrow);

  largeArrow = new THREE.ArrowHelper(
    new THREE.Vector3(0, 1, 0),
    new THREE.Vector3(largeCylinderX, BASE_Y + 1.5, 0),
    1, 0x00ff00, 0.3, 0.2
  );
  scene.add(largeArrow);

  // Reset displacements
  currentSmallPistonDisp = 0;
  currentLargePistonDisp = 0;
}

buildHydraulics();

// ─── Load Avocado ───
const loader = new GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/nicobailon/CodingWithVision/main/shared_assets/glb/Avocado.glb',
  (gltf) => {
    avocadoModel = gltf.scene;
    // Compute bounding box to scale properly
    const box = new THREE.Box3().setFromObject(avocadoModel);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    avocadoBaseScale = 2.0 / maxDim;
    avocadoModel.scale.setScalar(avocadoBaseScale);
    avocadoModel.traverse(c => {
      if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; }
    });
    scene.add(avocadoModel);
  },
  undefined,
  (err) => console.warn('Avocado load error:', err)
);

// ─── Slider references ───
const sliderForce = document.getElementById('slider-inputforce');
const sliderSmallR = document.getElementById('slider-smallradius');
const sliderLargeR = document.getElementById('slider-largeradius');
const sliderPress = document.getElementById('slider-press');

const valForce = document.getElementById('val-inputforce');
const valSmallR = document.getElementById('val-smallradius');
const valLargeR = document.getElementById('val-largeradius');
const valPress = document.getElementById('val-press');

sliderForce.addEventListener('input', () => {
  inputForce = parseFloat(sliderForce.value);
  valForce.textContent = inputForce + ' N';
});

sliderSmallR.addEventListener('input', () => {
  r1 = parseFloat(sliderSmallR.value);
  valSmallR.textContent = r1.toFixed(1);
  buildHydraulics();
});

sliderLargeR.addEventListener('input', () => {
  r2 = parseFloat(sliderLargeR.value);
  valLargeR.textContent = r2.toFixed(1);
  buildHydraulics();
});

sliderPress.addEventListener('input', () => {
  isPressed = parseInt(sliderPress.value) === 1;
  valPress.textContent = isPressed ? 'Pressing' : 'Released';
});

// ─── Keyboard ───
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    isPressed = !isPressed;
    sliderPress.value = isPressed ? 1 : 0;
    sliderPress.dispatchEvent(new Event('input'));
  } else if (e.code === 'KeyR') {
    // Reset
    inputForce = 100; r1 = 1.0; r2 = 3.0; isPressed = false;
    sliderForce.value = 100; sliderForce.dispatchEvent(new Event('input'));
    sliderSmallR.value = 1.0; sliderSmallR.dispatchEvent(new Event('input'));
    sliderLargeR.value = 3.0; sliderLargeR.dispatchEvent(new Event('input'));
    sliderPress.value = 0; sliderPress.dispatchEvent(new Event('input'));
  } else if (e.code === 'KeyP') {
    isPaused = !isPaused;
  }
});

// ─── HUD refs ───
const hudInputForce = document.getElementById('hud-inputforce');
const hudOutputForce = document.getElementById('hud-outputforce');
const hudMultiply = document.getElementById('hud-multiply');
const hudPressure = document.getElementById('hud-pressure');
const hudDisp1 = document.getElementById('hud-disp1');
const hudDisp2 = document.getElementById('hud-disp2');
const hudFrameCount = document.getElementById('hud-framecount');
const hudPaused = document.getElementById('hud-paused');

// ─── Animation Loop ───
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = clock.getDelta();
  const time = clock.getElapsedTime();

  if (!isPaused) {
    frameCount++;

    // Physics
    const A1 = Math.PI * r1 * r1;
    const A2 = Math.PI * r2 * r2;
    const ratio = A2 / A1;
    const effectiveForce = isPressed ? inputForce : 0;
    const pressure = A1 > 0 ? effectiveForce / A1 : 0;
    const outputForce = effectiveForce * ratio;

    // Piston displacement: map force to displacement
    // d1 proportional to force, max travel = MAX_PISTON_TRAVEL
    const maxForce = 500;
    const d1 = isPressed ? (inputForce / maxForce) * MAX_PISTON_TRAVEL : 0;
    const d2 = d1 * (r1 * r1) / (r2 * r2);

    targetSmallPistonDisp = d1;
    targetLargePistonDisp = d2;

    // Lerp
    const lerpSpeed = 3.0;
    currentSmallPistonDisp += (targetSmallPistonDisp - currentSmallPistonDisp) * Math.min(1, lerpSpeed * dt);
    currentLargePistonDisp += (targetLargePistonDisp - currentLargePistonDisp) * Math.min(1, lerpSpeed * dt);

    const smallPistonRestY = BASE_Y + CYLINDER_HEIGHT / 2;
    const largePistonRestY = BASE_Y + 1.0;

    // Update piston positions
    if (smallPiston) {
      smallPiston.position.y = smallPistonRestY - currentSmallPistonDisp;
    }
    if (largePiston) {
      largePiston.position.y = largePistonRestY + currentLargePistonDisp;
    }

    // Update fluid levels
    if (smallFluid) {
      const fluidTop = smallPiston.position.y - PISTON_THICKNESS / 2;
      const fluidBottom = BASE_Y;
      const fluidH = Math.max(0.01, fluidTop - fluidBottom);
      smallFluid.scale.y = fluidH / (CYLINDER_HEIGHT / 2);
      smallFluid.position.y = fluidBottom + fluidH / 2;

      // Pressure color
      const pressureNorm = Math.min(pressure / 200, 1);
      const fluidColor = new THREE.Color().lerpColors(
        new THREE.Color(0x2196f3),
        new THREE.Color(0x0d47a1),
        pressureNorm
      );
      smallFluid.material.color.copy(fluidColor);
      smallFluid.material.opacity = 0.5 + 0.3 * pressureNorm + 0.05 * Math.sin(time * 3);
    }

    if (largeFluid) {
      const fluidTop = largePiston.position.y - PISTON_THICKNESS / 2;
      const fluidBottom = BASE_Y;
      const fluidH = Math.max(0.01, fluidTop - fluidBottom);
      largeFluid.geometry.dispose();
      largeFluid.geometry = new THREE.CylinderGeometry(r2 - 0.06, r2 - 0.06, fluidH, 32);
      largeFluid.position.y = fluidBottom + fluidH / 2;

      const pressureNorm = Math.min(pressure / 200, 1);
      const fluidColor = new THREE.Color().lerpColors(
        new THREE.Color(0x2196f3),
        new THREE.Color(0x0d47a1),
        pressureNorm
      );
      largeFluid.material.color.copy(fluidColor);
      largeFluid.material.opacity = 0.5 + 0.3 * pressureNorm + 0.05 * Math.sin(time * 3 + 1);
    }

    if (pipeFluid) {
      const pressureNorm = Math.min(pressure / 200, 1);
      const fluidColor = new THREE.Color().lerpColors(
        new THREE.Color(0x2196f3),
        new THREE.Color(0x0d47a1),
        pressureNorm
      );
      pipeFluid.material.color.copy(fluidColor);
      pipeFluid.material.opacity = 0.5 + 0.3 * pressureNorm + 0.05 * Math.sin(time * 4);
    }

    // Force arrows
    if (smallArrow) {
      scene.remove(smallArrow);
      smallArrow.dispose();
      const arrowLen = Math.max(0.1, (effectiveForce / maxForce) * 3);
      smallArrow = new THREE.ArrowHelper(
        new THREE.Vector3(0, -1, 0),
        new THREE.Vector3(smallCylinderX, smallPiston.position.y + PISTON_THICKNESS / 2 + arrowLen + 0.5, 0),
        arrowLen, 0xff3333, 0.3, 0.2
      );
      smallArrow.visible = effectiveForce > 0;
      scene.add(smallArrow);
    }

    if (largeArrow) {
      scene.remove(largeArrow);
      largeArrow.dispose();
      const arrowLen = Math.max(0.1, Math.min((outputForce / maxForce) * 1.5, 4));
      largeArrow = new THREE.ArrowHelper(
        new THREE.Vector3(0, 1, 0),
        new THREE.Vector3(largeCylinderX, largePiston.position.y + PISTON_THICKNESS / 2 + 0.1, 0),
        arrowLen, 0x33ff33, 0.4, 0.25
      );
      largeArrow.visible = effectiveForce > 0;
      scene.add(largeArrow);
    }

    // Avocado
    let avocadoScaleY = 1.0;
    if (avocadoModel) {
      const avocadoBaseY = largePiston.position.y + PISTON_THICKNESS / 2;
      avocadoModel.position.set(largeCylinderX, avocadoBaseY, 0);

      // Compress based on output force
      const compressionFactor = Math.min(outputForce / 5000, 0.6);
      avocadoScaleY = 1.0 - compressionFactor;
      avocadoScaleY = Math.max(avocadoScaleY, 0.3);
      const spreadFactor = 1.0 + compressionFactor * 0.3;

      avocadoModel.scale.set(
        avocadoBaseScale * spreadFactor,
        avocadoBaseScale * avocadoScaleY,
        avocadoBaseScale * spreadFactor
      );
    }

    // HUD
    hudInputForce.textContent = effectiveForce.toFixed(1);
    hudOutputForce.textContent = outputForce.toFixed(1);
    hudMultiply.textContent = ratio.toFixed(2);
    hudPressure.textContent = pressure.toFixed(2);
    hudDisp1.textContent = currentSmallPistonDisp.toFixed(3);
    hudDisp2.textContent = currentLargePistonDisp.toFixed(3);
    hudFrameCount.textContent = frameCount;
    hudPaused.textContent = 'No';

    // State
    const isValidNum = (v) => typeof v === 'number' && isFinite(v) && !isNaN(v);
    const stateVals = {
      frameCount,
      isPaused: false,
      inputForce: effectiveForce,
      outputForce,
      pressure,
      smallRadius: r1,
      largeRadius: r2,
      multiplicationFactor: ratio,
      smallPistonDisp: currentSmallPistonDisp,
      largePistonDisp: currentLargePistonDisp,
      isPressed,
      avocadoScaleY,
    };
    const isValid = Object.entries(stateVals).every(([k, v]) => {
      if (typeof v === 'number') return isValidNum(v);
      return true;
    });
    window.__3D_STATE__ = { ...stateVals, isValid };

  } else {
    hudPaused.textContent = 'Yes';
    window.__3D_STATE__.isPaused = true;
    window.__3D_STATE__.frameCount = frameCount;
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
