<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pascal's Principle & Hydraulic Press Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #e8e8e8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.6);
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid rgba(0, 255, 0, 0.2);
        }
        #hud span {
            color: #ffffff;
            font-weight: bold;
        }
        #controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            z-index: 100;
            min-width: 260px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #ddd;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: #2196f3;
        }
        .instructions {
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 10px;
            line-height: 1.4;
        }
        .key {
            background: #444;
            padding: 2px 6px;
            border-radius: 4px;
            color: #fff;
            font-family: monospace;
        }
    </style>
    <!-- Three.js Import Map -->
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="hud">
        <div>Input Force: <span id="hud-inputforce">0.0</span> N</div>
        <div>Output Force: <span id="hud-outputforce">0.0</span> N</div>
        <div>Multiplication: <span id="hud-multiply">1.00</span>x</div>
        <div>Pressure: <span id="hud-pressure">0.0</span> Pa</div>
        <div>Small Piston Disp: <span id="hud-disp1">0.00</span> m</div>
        <div>Large Piston Disp: <span id="hud-disp2">0.00</span> m</div>
        <div>Frame: <span id="hud-framecount">0</span></div>
        <div>Paused: <span id="hud-paused">No</span></div>
    </div>

    <div id="controls">
        <div class="control-group">
            <label><span>Input Force (N)</span> <span id="val-inputforce">100</span></label>
            <input type="range" id="slider-inputforce" min="0" max="500" step="5" value="100">
        </div>
        <div class="control-group">
            <label><span>Small Radius (r1)</span> <span id="val-smallradius">1.0</span></label>
            <input type="range" id="slider-smallradius" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label><span>Large Radius (r2)</span> <span id="val-largeradius">3.0</span></label>
            <input type="range" id="slider-largeradius" min="2.0" max="6.0" step="0.1" value="3.0">
        </div>
        <div class="control-group">
            <label><span>Press / Release</span> <span id="val-press">Released</span></label>
            <input type="range" id="slider-press" min="0" max="1" step="1" value="0">
        </div>
        <div class="instructions">
            Shortcuts:<br>
            <span class="key">Space</span> Toggle Press<br>
            <span class="key">R</span> Reset Defaults<br>
            <span class="key">P</span> Pause/Unpause
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Global State ---
        const state = {
            inputForce: 100,
            smallRadius: 1.0,
            largeRadius: 3.0,
            isPressed: false,
            paused: false,
            frameCount: 0,
            // Internal animation state
            currentD1: 0,
            currentD2: 0,
            avocadoBaseScale: 1,
            avocadoHeight: 2
        };

        // Initialize window.__3D_STATE__
        window.__3D_STATE__ = {
            frameCount: 0, isPaused: false, inputForce: 0, outputForce: 0,
            pressure: 0, smallRadius: 1.0, largeRadius: 3.0, multiplicationFactor: 1.0,
            smallPistonDisp: 0, largePistonDisp: 0, isPressed: false, avocadoScaleY: 1.0, isValid: true
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xe8e8e8);
        scene.fog = new THREE.FogExp2(0xe8e8e8, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(12, 8, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 2, 0);
        controls.maxPolarAngle = Math.PI / 2 + 0.1; // Don't go too far below ground
        controls.minDistance = 5;
        controls.maxDistance = 40;

        // --- Lights ---
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.5);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(8, 12, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        const d = 15;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.bias = -0.0005;
        scene.add(dirLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.8, metalness: 0.2 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -3;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Materials ---
        const glassMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0.1,
            roughness: 0.1,
            transmission: 0.9, // glass-like
            ior: 1.5,
            thickness: 0.5,
            transparent: true,
            opacity: 0.3,
            side: THREE.DoubleSide,
            depthWrite: false
        });

        const pistonMat = new THREE.MeshStandardMaterial({
            color: 0x666666,
            metalness: 0.8,
            roughness: 0.3
        });

        const fluidBaseColor = new THREE.Color(0x2196f3);
        const fluidHighColor = new THREE.Color(0x88ccff);
        const fluidMat = new THREE.MeshStandardMaterial({
            color: fluidBaseColor,
            transparent: true,
            opacity: 0.7,
            roughness: 0.1,
            metalness: 0.1,
            emissive: 0x004488,
            emissiveIntensity: 0.2
        });

        const baseMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });

        // --- Geometry Setup ---
        // Base Platform
        const baseGeo = new THREE.BoxGeometry(16, 1, 8);
        const baseMesh = new THREE.Mesh(baseGeo, baseMat);
        baseMesh.position.set(0, -2.5, 0);
        baseMesh.receiveShadow = true;
        baseMesh.castShadow = true;
        scene.add(baseMesh);

        // Base parameters
        const leftX = -5;
        const rightX = 5;
        const cylinderBaseY = -2;
        const cylinderHeight = 10;
        const initialFluidHeight = 5;
        const pistonHeight = 0.5;

        // Reusable geometries (radius 1, scaled later)
        const cylGeo = new THREE.CylinderGeometry(1, 1, cylinderHeight, 32, 1, true);
        const pistonGeo = new THREE.CylinderGeometry(1, 1, pistonHeight, 32);
        const fluidGeo = new THREE.CylinderGeometry(1, 1, 1, 32); // Height 1, scaled dynamically

        // Left Side (Small)
        const leftGlass = new THREE.Mesh(cylGeo, glassMat);
        leftGlass.position.set(leftX, cylinderBaseY + cylinderHeight / 2, 0);
        scene.add(leftGlass);

        const leftPiston = new THREE.Mesh(pistonGeo, pistonMat);
        leftPiston.castShadow = true;
        leftPiston.receiveShadow = true;
        scene.add(leftPiston);

        const leftFluid = new THREE.Mesh(fluidGeo, fluidMat);
        scene.add(leftFluid);

        // Right Side (Large)
        const rightGlass = new THREE.Mesh(cylGeo, glassMat);
        rightGlass.position.set(rightX, cylinderBaseY + cylinderHeight / 2, 0);
        scene.add(rightGlass);

        const rightPiston = new THREE.Mesh(pistonGeo, pistonMat);
        rightPiston.castShadow = true;
        rightPiston.receiveShadow = true;
        scene.add(rightPiston);

        const rightFluid = new THREE.Mesh(fluidGeo, fluidMat);
        scene.add(rightFluid);

        // Connecting Pipe
        const pipeGeo = new THREE.CylinderGeometry(0.5, 0.5, rightX - leftX, 16);
        const pipeGlass = new THREE.Mesh(pipeGeo, glassMat);
        pipeGlass.rotation.z = Math.PI / 2;
        pipeGlass.position.set(0, cylinderBaseY + 0.5, 0);
        scene.add(pipeGlass);

        const pipeFluidGeo = new THREE.CylinderGeometry(0.48, 0.48, rightX - leftX + 0.1, 16);
        const pipeFluid = new THREE.Mesh(pipeFluidGeo, fluidMat);
        pipeFluid.rotation.z = Math.PI / 2;
        pipeFluid.position.set(0, cylinderBaseY + 0.5, 0);
        scene.add(pipeFluid);

        // --- Avocado ---
        const avocadoGroup = new THREE.Group();
        scene.add(avocadoGroup);
        let avocadoLoaded = false;

        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/nicobailon/CodingWithVision/main/shared_assets/glb/Avocado.glb', (gltf) => {
            const avocado = gltf.scene;
            
            // Enable shadows
            avocado.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            // Calculate bounding box to normalize size and set origin to bottom
            const box = new THREE.Box3().setFromObject(avocado);
            const size = box.getSize(new THREE.Vector3());
            
            // Target height is ~2 units
            state.avocadoBaseScale = 2.0 / size.y;
            avocado.scale.setScalar(state.avocadoBaseScale);
            
            // Recompute box after scaling
            const scaledBox = new THREE.Box3().setFromObject(avocado);
            
            // Shift avocado up so its bottom is at y=0 within the group
            avocado.position.y = -scaledBox.min.y;
            
            avocadoGroup.add(avocado);
            avocadoLoaded = true;
        });

        // --- Arrows ---
        const arrowDirDown = new THREE.Vector3(0, -1, 0);
        const arrowDirUp = new THREE.Vector3(0, 1, 0);
        
        const leftArrow = new THREE.ArrowHelper(arrowDirDown, new THREE.Vector3(leftX, 5, 0), 1, 0xff0000, 0.4, 0.3);
        scene.add(leftArrow);
        
        const rightArrow = new THREE.ArrowHelper(arrowDirUp, new THREE.Vector3(rightX, 5, 0), 1, 0x00ff00, 0.4, 0.3);
        scene.add(rightArrow);

        // --- UI Elements ---
        const uiInputForce = document.getElementById('slider-inputforce');
        const uiSmallRadius = document.getElementById('slider-smallradius');
        const uiLargeRadius = document.getElementById('slider-largeradius');
        const uiPress = document.getElementById('slider-press');
        
        const valInputForce = document.getElementById('val-inputforce');
        const valSmallRadius = document.getElementById('val-smallradius');
        const valLargeRadius = document.getElementById('val-largeradius');
        const valPress = document.getElementById('val-press');

        const hudInputForce = document.getElementById('hud-inputforce');
        const hudOutputForce = document.getElementById('hud-outputforce');
        const hudMultiply = document.getElementById('hud-multiply');
        const hudPressure = document.getElementById('hud-pressure');
        const hudDisp1 = document.getElementById('hud-disp1');
        const hudDisp2 = document.getElementById('hud-disp2');
        const hudFrameCount = document.getElementById('hud-framecount');
        const hudPaused = document.getElementById('hud-paused');

        // --- Event Listeners ---
        function updateStateFromUI() {
            state.inputForce = parseFloat(uiInputForce.value);
            state.smallRadius = parseFloat(uiSmallRadius.value);
            state.largeRadius = parseFloat(uiLargeRadius.value);
            state.isPressed = parseInt(uiPress.value) === 1;

            valInputForce.innerText = state.inputForce;
            valSmallRadius.innerText = state.smallRadius.toFixed(1);
            valLargeRadius.innerText = state.largeRadius.toFixed(1);
            valPress.innerText = state.isPressed ? "Pressing" : "Released";
            valPress.style.color = state.isPressed ? "#ff5252" : "#ddd";
        }

        uiInputForce.addEventListener('input', updateStateFromUI);
        uiSmallRadius.addEventListener('input', updateStateFromUI);
        uiLargeRadius.addEventListener('input', updateStateFromUI);
        uiPress.addEventListener('input', updateStateFromUI);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                uiPress.value = state.isPressed ? "0" : "1";
                uiPress.dispatchEvent(new Event('input'));
            } else if (e.code === 'KeyR') {
                uiInputForce.value = "100";
                uiSmallRadius.value = "1.0";
                uiLargeRadius.value = "3.0";
                uiPress.value = "0";
                uiInputForce.dispatchEvent(new Event('input'));
                uiSmallRadius.dispatchEvent(new Event('input'));
                uiLargeRadius.dispatchEvent(new Event('input'));
                uiPress.dispatchEvent(new Event('input'));
            } else if (e.code === 'KeyP') {
                state.paused = !state.paused;
                hudPaused.innerText = state.paused ? "Yes" : "No";
                hudPaused.style.color = state.paused ? "#ff0000" : "#ffffff";
            }
        });

        // --- Helper for State Validation ---
        function checkValid(obj) {
            for (let key in obj) {
                if (typeof obj[key] === 'number' && (!isFinite(obj[key]) || isNaN(obj[key]))) {
                    return false;
                }
            }
            return true;
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            if (!state.paused) {
                state.frameCount++;
                controls.update();

                // --- Physics Calculations ---
                const A1 = Math.PI * state.smallRadius * state.smallRadius;
                const A2 = Math.PI * state.largeRadius * state.largeRadius;
                const multiplicationFactor = A2 / A1;

                // Target force based on press state
                const targetForce = state.isPressed ? state.inputForce : 0;

                // Map max force (500N) to a max displacement (e.g., 4 units) for visual effect
                const maxVisualDisp = 4.0;
                const targetD1 = (targetForce / 500) * maxVisualDisp;
                
                // Volume conservation: A1 * d1 = A2 * d2 => d2 = d1 * (A1 / A2)
                const targetD2 = targetD1 / multiplicationFactor;

                // Smooth lerping
                const lerpSpeed = 5.0 * delta;
                state.currentD1 += (targetD1 - state.currentD1) * lerpSpeed;
                state.currentD2 += (targetD2 - state.currentD2) * lerpSpeed;

                // Calculate effective forces based on current visual displacement
                const effectiveForceIn = (state.currentD1 / maxVisualDisp) * 500;
                const effectivePressure = effectiveForceIn / A1;
                const effectiveForceOut = effectivePressure * A2;

                // --- Update Geometry Scales & Positions ---
                
                // Update Radii
                leftGlass.scale.set(state.smallRadius, 1, state.smallRadius);
                leftPiston.scale.set(state.smallRadius, 1, state.smallRadius);
                
                rightGlass.scale.set(state.largeRadius, 1, state.largeRadius);
                rightPiston.scale.set(state.largeRadius, 1, state.largeRadius);

                // Update Fluid Heights & Positions
                const currentLeftFluidHeight = initialFluidHeight - state.currentD1;
                const currentRightFluidHeight = initialFluidHeight + state.currentD2;

                leftFluid.scale.set(state.smallRadius, currentLeftFluidHeight, state.smallRadius);
                leftFluid.position.set(leftX, cylinderBaseY + currentLeftFluidHeight / 2, 0);

                rightFluid.scale.set(state.largeRadius, currentRightFluidHeight, state.largeRadius);
                rightFluid.position.set(rightX, cylinderBaseY + currentRightFluidHeight / 2, 0);

                // Update Piston Positions (resting on top of fluid)
                leftPiston.position.set(leftX, cylinderBaseY + currentLeftFluidHeight + pistonHeight / 2, 0);
                rightPiston.position.set(rightX, cylinderBaseY + currentRightFluidHeight + pistonHeight / 2, 0);

                // --- Fluid Visual Effects ---
                // Color based on pressure
                const pressureRatio = Math.min(effectivePressure / (500 / Math.PI), 1.0); // Normalize against max possible pressure (r=1, F=500)
                fluidMat.color.lerpColors(fluidBaseColor, fluidHighColor, pressureRatio);
                
                // Shimmer effect
                fluidMat.emissiveIntensity = 0.15 + 0.1 * Math.sin(time * 5);

                // --- Avocado Update ---
                let currentAvocadoScaleY = 1.0;
                if (avocadoLoaded) {
                    // Position avocado on top of right piston
                    avocadoGroup.position.set(rightX, rightPiston.position.y + pistonHeight / 2, 0);

                    // Squish logic based on output force
                    // Max effectiveForceOut can be large (e.g., 500 * 144 = 72000)
                    // Use exponential decay for squish factor to prevent inversion and look natural
                    const squishFactor = 0.3 + 0.7 * Math.exp(-effectiveForceOut / 15000);
                    
                    // Volume preservation (approximate)
                    const expandFactor = Math.sqrt(1.0 / squishFactor);

                    avocadoGroup.scale.set(expandFactor, squishFactor, expandFactor);
                    currentAvocadoScaleY = squishFactor;
                }

                // --- Arrows Update ---
                if (effectiveForceIn > 1) {
                    leftArrow.visible = true;
                    const arrowLen1 = 1 + (effectiveForceIn / 500) * 3;
                    leftArrow.setLength(arrowLen1, 0.4, 0.3);
                    // Position above piston
                    leftArrow.position.set(leftX, leftPiston.position.y + pistonHeight/2 + arrowLen1 + 0.2, 0);
                } else {
                    leftArrow.visible = false;
                }

                if (effectiveForceOut > 1) {
                    rightArrow.visible = true;
                    // Scale arrow length logarithmically to handle large force ranges visually
                    const arrowLen2 = 1 + Math.log10(1 + effectiveForceOut) * 0.8;
                    rightArrow.setLength(arrowLen2, 0.4, 0.3);
                    // Position above avocado
                    const avoTopY = avocadoGroup.position.y + (state.avocadoHeight * currentAvocadoScaleY);
                    rightArrow.position.set(rightX, avoTopY + 0.2, 0);
                } else {
                    rightArrow.visible = false;
                }

                // --- Update HUD ---
                hudInputForce.innerText = effectiveForceIn.toFixed(1);
                hudOutputForce.innerText = effectiveForceOut.toFixed(1);
                hudMultiply.innerText = multiplicationFactor.toFixed(2);
                hudPressure.innerText = effectivePressure.toFixed(1);
                hudDisp1.innerText = state.currentD1.toFixed(3);
                hudDisp2.innerText = state.currentD2.toFixed(3);
                hudFrameCount.innerText = state.frameCount;

                // --- Update Global State Object ---
                const newState = {
                    frameCount: state.frameCount,
                    isPaused: state.paused,
                    inputForce: effectiveForceIn,
                    outputForce: effectiveForceOut,
                    pressure: effectivePressure,
                    smallRadius: state.smallRadius,
                    largeRadius: state.largeRadius,
                    multiplicationFactor: multiplicationFactor,
                    smallPistonDisp: state.currentD1,
                    largePistonDisp: state.currentD2,
                    isPressed: state.isPressed,
                    avocadoScaleY: currentAvocadoScaleY,
                    isValid: true
                };
                newState.isValid = checkValid(newState);
                window.__3D_STATE__ = newState;
            }

            renderer.render(scene, camera);
        }

        // Start animation
        animate();

    </script>
</body>
</html>
