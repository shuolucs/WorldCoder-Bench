<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Levitation Simulation</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    background: #1a1a2e;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #fff;
}

canvas {
    display: block;
}

#hud {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(0, 102, 255, 0.3);
    border-radius: 12px;
    padding: 20px;
    font-size: 14px;
    line-height: 2;
    min-width: 220px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0, 102, 255, 0.1);
}

#hud h3 {
    margin-bottom: 10px;
    color: #00aaff;
    font-size: 16px;
    border-bottom: 1px solid rgba(0, 102, 255, 0.3);
    padding-bottom: 8px;
}

#hud .label {
    color: #8899aa;
    font-size: 12px;
}

#hud .value {
    color: #ffffff;
    font-weight: bold;
    float: right;
}

#hud .status-levitating {
    color: #00ff88;
}

#hud .status-falling {
    color: #ff4444;
}

#hud .status-resting {
    color: #ffaa00;
}

#controls {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(0, 102, 255, 0.3);
    border-radius: 12px;
    padding: 20px;
    min-width: 240px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0, 102, 255, 0.1);
}

#controls h3 {
    margin-bottom: 15px;
    color: #00aaff;
    font-size: 16px;
    border-bottom: 1px solid rgba(0, 102, 255, 0.3);
    padding-bottom: 8px;
}

#controls .control-group {
    margin-bottom: 15px;
}

#controls label {
    display: block;
    margin-bottom: 6px;
    color: #8899aa;
    font-size: 13px;
}

#controls input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(0, 102, 255, 0.2);
    border-radius: 3px;
    outline: none;
}

#controls input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #00aaff;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0, 170, 255, 0.5);
}

#controls button {
    width: 100%;
    padding: 10px;
    margin-bottom: 8px;
    border: 1px solid rgba(0, 102, 255, 0.4);
    border-radius: 8px;
    background: rgba(0, 102, 255, 0.15);
    color: #ffffff;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s ease;
}

#controls button:hover {
    background: rgba(0, 102, 255, 0.35);
    box-shadow: 0 0 15px rgba(0, 102, 255, 0.3);
}

#controls button#killMagnetBtn {
    border-color: rgba(255, 68, 68, 0.4);
    background: rgba(255, 68, 68, 0.15);
}

#controls button#killMagnetBtn:hover {
    background: rgba(255, 68, 68, 0.35);
    box-shadow: 0 0 15px rgba(255, 68, 68, 0.3);
}

#controls .checkbox-group {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
}

#controls .checkbox-group input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #00aaff;
    cursor: pointer;
}

#controls .checkbox-group label {
    margin: 0;
    color: #ccccdd;
    cursor: pointer;
}

.slider-value {
    color: #00aaff;
    font-weight: bold;
    float: right;
}

#loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #00aaff;
    font-size: 18px;
    text-align: center;
}

#loading .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(0, 170, 255, 0.2);
    border-top-color: #00aaff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.keyboard-hint {
    margin-top: 15px;
    padding-top: 10px;
    border-top: 1px solid rgba(0, 102, 255, 0.3);
    font-size: 11px;
    color: #667788;
    line-height: 1.8;
}

.keyboard-hint kbd {
    background: rgba(0, 102, 255, 0.2);
    border: 1px solid rgba(0, 102, 255, 0.3);
    border-radius: 4px;
    padding: 2px 6px;
    font-family: monospace;
    color: #aabbcc;
}
</style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    Loading Nefertiti Model...
</div>

<div id="hud">
    <h3>📊 Telemetry</h3>
    <div><span class="label">Height:</span> <span class="value" id="hudHeight">2.50 m</span></div>
    <div><span class="label">Velocity:</span> <span class="value" id="hudVelocity">0.00 m/s</span></div>
    <div><span class="label">Magnet Strength:</span> <span class="value" id="hudMagnet">60</span></div>
    <div><span class="label">Status:</span> <span class="value" id="hudStatus">Levitating</span></div>
</div>

<div id="controls">
    <h3>🎛️ Controls</h3>

    <div class="control-group">
        <label>Magnet Strength <span class="slider-value" id="sliderValue">60</span></label>
        <input type="range" id="magnetSlider" min="20" max="120" step="1" value="60">
    </div>

    <button id="dropBtn">⬇️ Drop from Height</button>
    <button id="killMagnetBtn">⚡ Kill Magnet</button>
    <button id="resetBtn">🔄 Reset</button>

    <div class="checkbox-group">
        <input type="checkbox" id="spinToggle" checked>
        <label for="spinToggle">Auto Spin</label>
    </div>

    <div class="keyboard-hint">
        <kbd>W</kbd> Impulse Up &nbsp; <kbd>S</kbd> Impulse Down
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
const state = {
    modelLoaded: false,
    bustY: 2.5,
    bustVelocity: 0,
    magnetStrength: 60,
    isSpinning: true,
    bustRotationY: 0,
    status: 'Levitating',
    frameCount: 0,
    equilibriumReached: false,
    dampingFactor: 0.95
};
window.__3D_STATE__ = state;

// Physics constants
const mass = 1.0;
const gravity = 9.81;
const dt = 1 / 60;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

// Fog for atmosphere
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.05);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 6);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1.5, 0);
controls.update();

// Lighting
const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
directionalLight.shadow.camera.near = 0.5;
directionalLight.shadow.camera.far = 50;
directionalLight.shadow.camera.left = -5;
directionalLight.shadow.camera.right = 5;
directionalLight.shadow.camera.top = 5;
directionalLight.shadow.camera.bottom = -5;
scene.add(directionalLight);

const magnetLight = new THREE.PointLight(0x00aaff, 1.0, 10);
magnetLight.position.set(0, -1, 0);
scene.add(magnetLight);

// Additional subtle lights for better aesthetics
const rimLight = new THREE.PointLight(0x4400ff, 0.3, 15);
rimLight.position.set(-3, 3, -3);
scene.add(rimLight);

// Base platform
const baseGeometry = new THREE.CylinderGeometry(1.5, 1.5, 0.3, 64);
const baseMaterial = new THREE.MeshStandardMaterial({
    color: 0x333344,
    metalness: 0.9,
    roughness: 0.2
});
const base = new THREE.Mesh(baseGeometry, baseMaterial);
base.position.y = 0.15;
base.receiveShadow = true;
scene.add(base);

// Base top detail ring
const ringGeometry = new THREE.TorusGeometry(1.2, 0.05, 16, 64);
const ringMaterial = new THREE.MeshStandardMaterial({
    color: 0x0066ff,
    emissive: 0x0066ff,
    emissiveIntensity: 2.0,
    metalness: 0.8,
    roughness: 0.2
});
const ring = new THREE.Mesh(ringGeometry, ringMaterial);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.3;
scene.add(ring);

// Inner ring
const innerRingGeometry = new THREE.TorusGeometry(0.8, 0.03, 16, 64);
const innerRingMaterial = new THREE.MeshStandardMaterial({
    color: 0x0044cc,
    emissive: 0x0044cc,
    emissiveIntensity: 1.5,
    metalness: 0.8,
    roughness: 0.2
});
const innerRing = new THREE.Mesh(innerRingGeometry, innerRingMaterial);
innerRing.rotation.x = -Math.PI / 2;
innerRing.position.y = 0.31;
scene.add(innerRing);

// Ground plane
const groundGeometry = new THREE.PlaneGeometry(20, 20);
const groundMaterial = new THREE.MeshStandardMaterial({
    color: 0x111122,
    metalness: 0.5,
    roughness: 0.8
});
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Particle system for magnetic field visualization
const particleCount = 200;
const particleGeometry = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleSpeeds = new Float32Array(particleCount);

for (let i = 0; i < particleCount; i++) {
    const angle = Math.random() * Math.PI * 2;
    const radius = 0.3 + Math.random() * 1.2;
    particlePositions[i * 3] = Math.cos(angle) * radius;
    particlePositions[i * 3 + 1] = 0.3 + Math.random() * 2.5;
    particlePositions[i * 3 + 2] = Math.sin(angle) * radius;
    particleSpeeds[i] = 0.5 + Math.random() * 1.5;
}

particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

const particleMaterial = new THREE.PointsMaterial({
    color: 0x00aaff,
    size: 0.03,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending,
    depthWrite: false
});

const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

// Bust placeholder (used before model loads)
let bustModel = null;
let bustGroup = new THREE.Group();
bustGroup.position.y = 2.5;
scene.add(bustGroup);

// Create a placeholder geometry
const placeholderGeometry = new THREE.ConeGeometry(0.4, 1.5, 8);
const placeholderMaterial = new THREE.MeshStandardMaterial({
    color: 0xddccaa,
    metalness: 0.3,
    roughness: 0.6,
    transparent: true,
    opacity: 0.5
});
const placeholder = new THREE.Mesh(placeholderGeometry, placeholderMaterial);
bustGroup.add(placeholder);

// Try to load the Nefertiti model
const loader = new GLTFLoader();
const modelUrls = [
    'Nefertiti.glb',
    './Nefertiti.glb',
    'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/Nefertiti/Nefertiti.glb'
];

function tryLoadModel(urls, index) {
    if (index >= urls.length) {
        console.warn('Could not load Nefertiti.glb - using placeholder geometry');
        // Create a more detailed placeholder
        bustGroup.remove(placeholder);

        const headGroup = new THREE.Group();

        // Head
        const headGeo = new THREE.SphereGeometry(0.35, 32, 32);
        headGeo.scale(1, 1.2, 1);
        const headMat = new THREE.MeshStandardMaterial({
            color: 0xd4a574,
            metalness: 0.1,
            roughness: 0.7
        });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 0.3;
        headGroup.add(head);

        // Crown
        const crownGeo = new THREE.CylinderGeometry(0.2, 0.35, 0.5, 32);
        const crownMat = new THREE.MeshStandardMaterial({
            color: 0x2244aa,
            metalness: 0.6,
            roughness: 0.3
        });
        const crown = new THREE.Mesh(crownGeo, crownMat);
        crown.position.y = 0.8;
        headGroup.add(crown);

        // Neck
        const neckGeo = new THREE.CylinderGeometry(0.2, 0.25, 0.4, 32);
        const neck = new THREE.Mesh(neckGeo, headMat);
        neck.position.y = -0.15;
        headGroup.add(neck);

        // Base/shoulders
        const shoulderGeo = new THREE.CylinderGeometry(0.25, 0.4, 0.3, 32);
        const shoulder = new THREE.Mesh(shoulderGeo, headMat);
        shoulder.position.y = -0.45;
        headGroup.add(shoulder);

        headGroup.castShadow = true;
        headGroup.traverse(child => {
            if (child.isMesh) {
                child.castShadow = true;
            }
        });

        bustGroup.add(headGroup);
        bustModel = headGroup;

        state.modelLoaded = true;
        document.getElementById('loading').style.display = 'none';
        return;
    }

    loader.load(
        urls[index],
        (gltf) => {
            bustGroup.remove(placeholder);

            const model = gltf.scene;

            // Calculate bounding box to scale and center
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 1.5 / maxDim;
            model.scale.setScalar(scale);

            // Re-center
            model.position.x = -center.x * scale;
            model.position.y = -center.y * scale;
            model.position.z = -center.z * scale;

            model.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            bustGroup.add(model);
            bustModel = model;

            state.modelLoaded = true;
            document.getElementById('loading').style.display = 'none';
            console.log('Nefertiti model loaded successfully');
        },
        undefined,
        (error) => {
            console.warn(`Failed to load from ${urls[index]}:`, error);
            tryLoadModel(urls, index + 1);
        }
    );
}

tryLoadModel(modelUrls, 0);

// UI Elements
const magnetSlider = document.getElementById('magnetSlider');
const sliderValue = document.getElementById('sliderValue');
const dropBtn = document.getElementById('dropBtn');
const killMagnetBtn = document.getElementById('killMagnetBtn');
const resetBtn = document.getElementById('resetBtn');
const spinToggle = document.getElementById('spinToggle');

const hudHeight = document.getElementById('hudHeight');
const hudVelocity = document.getElementById('hudVelocity');
const hudMagnet = document.getElementById('hudMagnet');
const hudStatus = document.getElementById('hudStatus');

// Event listeners
magnetSlider.addEventListener('input', (e) => {
    state.magnetStrength = parseFloat(e.target.value);
    sliderValue.textContent = e.target.value;
});

dropBtn.addEventListener('click', () => {
    state.bustY = 4.0;
    state.bustVelocity = 0;
    bustGroup.position.y = state.bustY;
});

killMagnetBtn.addEventListener('click', () => {
    state.magnetStrength = 0;
    magnetSlider.value = 20; // slider min is 20, but we set strength to 0
    sliderValue.textContent = '0';
});

resetBtn.addEventListener('click', () => {
    state.magnetStrength = 60;
    state.bustY = 2.5;
    state.bustVelocity = 0;
    magnetSlider.value = 60;
    sliderValue.textContent = '60';
    bustGroup.position.y = 2.5;
});

spinToggle.addEventListener('change', (e) => {
    state.isSpinning = e.target.checked;
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'w' || e.key === 'W') {
        state.bustVelocity += 2;
    } else if (e.key === 's' || e.key === 'S') {
        state.bustVelocity -= 2;
    }
});

// Animation
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    state.frameCount++;

    // Physics simulation
    const y = state.bustY;
    const fGravity = -mass * gravity;
    let fMagnetic = 0;
    if (state.magnetStrength > 0 && y > 0) {
        fMagnetic = state.magnetStrength / (y * y);
    }

    const netForce = fGravity + fMagnetic;
    const acceleration = netForce / mass;

    // Semi-implicit Euler
    state.bustVelocity += acceleration * dt;
    state.bustVelocity *= state.dampingFactor;
    state.bustY += state.bustVelocity * dt;

    // Clamp
    if (state.bustY < 0.4) {
        state.bustY = 0.4;
        state.bustVelocity = 0;
    }

    bustGroup.position.y = state.bustY;

    // Spin
    if (state.isSpinning) {
        state.bustRotationY += 1.0 * dt;
        bustGroup.rotation.y = state.bustRotationY;
    }

    // Status
    if (state.magnetStrength === 0 && state.bustY > 0.5) {
        state.status = 'Falling';
    } else if (state.bustY <= 0.5) {
        state.status = 'Resting';
    } else {
        state.status = 'Levitating';
    }

    // Equilibrium check
    state.equilibriumReached = Math.abs(state.bustVelocity) < 0.05 && state.status === 'Levitating';

    // Update HUD
    hudHeight.textContent = state.bustY.toFixed(2) + ' m';
    hudVelocity.textContent = state.bustVelocity.toFixed(2) + ' m/s';
    hudMagnet.textContent = state.magnetStrength.toFixed(0);

    hudStatus.textContent = state.status;
    hudStatus.className = 'value';
    if (state.status === 'Levitating') {
        hudStatus.classList.add('status-levitating');
    } else if (state.status === 'Falling') {
        hudStatus.classList.add('status-falling');
    } else {
        hudStatus.classList.add('status-resting');
    }

    // Animate magnetic glow ring
    const glowIntensity = state.magnetStrength / 60;
    ringMaterial.emissiveIntensity = 2.0 * glowIntensity * (0.9 + 0.1 * Math.sin(clock.getElapsedTime() * 3));
    innerRingMaterial.emissiveIntensity = 1.5 * glowIntensity * (0.9 + 0.1 * Math.cos(clock.getElapsedTime() * 4));
    magnetLight.intensity = 1.0 * glowIntensity;

    // Animate particles
    const positions = particles.geometry.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
        positions[i * 3 + 1] += particleSpeeds[i] * dt * glowIntensity;
        if (positions[i * 3 + 1] > state.bustY + 0.5) {
            positions[i * 3 + 1] = 0.3;
            const angle = Math.random() * Math.PI * 2;
            const radius = 0.3 + Math.random() * 1.2;
            positions[i * 3] = Math.cos(angle) * radius;
            positions[i * 3 + 2] = Math.sin(angle) * radius;
        }
    }
    particles.geometry.attributes.position.needsUpdate = true;
    particleMaterial.opacity = 0.6 * glowIntensity;

    // Rotate inner ring
    innerRing.rotation.z += 0.5 * dt;

    // Subtle bust bob when at equilibrium
    if (state.equilibriumReached && bustModel) {
        const bob = Math.sin(clock.getElapsedTime() * 2) * 0.005;
        bustGroup.position.y += bob;
    }

    controls.update();
    renderer.render(scene, camera);
}

animate();

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
