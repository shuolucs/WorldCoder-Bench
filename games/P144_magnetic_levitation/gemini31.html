<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Magnetic Levitation Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00aaff;
            background: rgba(10, 10, 25, 0.6);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #00aaff;
            pointer-events: none;
            text-shadow: 0 0 5px rgba(0, 170, 255, 0.5);
        }
        #hud div {
            margin-bottom: 5px;
            font-size: 14px;
            letter-spacing: 1px;
        }
        #hud span {
            color: #ffffff;
            font-weight: bold;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(20, 20, 35, 0.85);
            color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333344;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 250px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 13px;
            color: #aaa;
        }
        input[type=range] {
            width: 100%;
            accent-color: #00aaff;
        }
        button {
            background: #2a2a40;
            color: white;
            border: 1px solid #444466;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }
        button:hover {
            background: #3a3a55;
            border-color: #00aaff;
        }
        button:active {
            background: #00aaff;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            cursor: pointer;
        }
        .instructions {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
            text-align: center;
            border-top: 1px solid #333;
            padding-top: 10px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud">
        <div>Height: <span id="hud-height">2.50</span></div>
        <div>Velocity: <span id="hud-vel">0.00</span></div>
        <div>Magnet: <span id="hud-mag">60</span></div>
        <div>Status: <span id="hud-status">Levitating</span></div>
    </div>

    <div id="ui-panel">
        <div class="control-group">
            <label for="magnetSlider">Magnet Strength: <span id="mag-val">60</span></label>
            <input type="range" id="magnetSlider" min="20" max="120" step="1" value="60">
        </div>
        <button id="dropBtn">Drop from Height</button>
        <button id="killMagnetBtn">Kill Magnet</button>
        <button id="resetBtn">Reset</button>
        <label class="checkbox-group">
            <input type="checkbox" id="spinToggle" checked>
            Auto Spin
        </label>
        <div class="instructions">
            Keyboard: Press 'W' for upward impulse, 'S' for downward impulse.
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            bustY: 2.5,
            bustVelocity: 0,
            magnetStrength: 60.0,
            isSpinning: true,
            bustRotationY: 0,
            status: 'Levitating',
            frameCount: 0,
            equilibriumReached: false,
            dampingFactor: 0.95
        };

        // --- Physics Constants ---
        const MASS = 1.0;
        const GRAVITY = -9.81;
        const DT = 1 / 60;
        const MIN_Y = 0.4;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 1.5, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0x00aaff, 1.0, 10);
        pointLight.position.set(0, -1, 0);
        scene.add(pointLight);

        // --- Environment Objects ---
        // Base Platform
        const baseGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.3, 64);
        const baseMat = new THREE.MeshStandardMaterial({ 
            color: 0x333344, 
            metalness: 0.8, 
            roughness: 0.2 
        });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.position.y = 0;
        base.receiveShadow = true;
        scene.add(base);

        // Glowing Ring
        const ringGeo = new THREE.TorusGeometry(1.2, 0.05, 16, 100);
        const ringMat = new THREE.MeshStandardMaterial({ 
            color: 0x000000, 
            emissive: 0x0066ff, 
            emissiveIntensity: 2,
            toneMapped: false
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.y = 0.15;
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);

        // Floor for context
        const floorGeo = new THREE.PlaneGeometry(50, 50);
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0x11111a, 
            roughness: 0.8, 
            metalness: 0.2 
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.15;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- Model Loading ---
        const bustGroup = new THREE.Group();
        bustGroup.position.y = window.__3D_STATE__.bustY;
        scene.add(bustGroup);

        // Fallback geometry in case GLB fails to load
        const fallbackGeo = new THREE.CylinderGeometry(0.4, 0.6, 1.5, 32);
        fallbackGeo.translate(0, 0.75, 0); // Bottom at origin
        const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.3, roughness: 0.4 });
        const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
        fallbackMesh.castShadow = true;
        bustGroup.add(fallbackMesh);

        const loader = new GLTFLoader();
        loader.load('Nefertiti.glb', (gltf) => {
            // Remove fallback
            bustGroup.remove(fallbackMesh);
            
            const model = gltf.scene;
            
            // Calculate bounding box to scale and center
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            
            // Scale to roughly 1.5 units tall
            const scale = 1.5 / size.y;
            model.scale.setScalar(scale);
            
            // Recompute box after scaling
            const scaledBox = new THREE.Box3().setFromObject(model);
            
            // Center X and Z, set bottom to Y=0 relative to group
            model.position.x = -(scaledBox.max.x + scaledBox.min.x) / 2;
            model.position.z = -(scaledBox.max.z + scaledBox.min.z) / 2;
            model.position.y = -scaledBox.min.y;

            // Enable shadows
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    // Enhance material slightly for better look under lights
                    if (child.material) {
                        child.material.metalness = Math.max(child.material.metalness, 0.1);
                        child.material.roughness = Math.min(child.material.roughness, 0.8);
                    }
                }
            });

            bustGroup.add(model);
            window.__3D_STATE__.modelLoaded = true;
        }, undefined, (error) => {
            console.warn("Could not load 'Nefertiti.glb', using fallback mesh.", error);
            // Keep fallback mesh, state remains modelLoaded = false
        });

        // --- UI Elements & Event Listeners ---
        const magnetSlider = document.getElementById('magnetSlider');
        const magValDisplay = document.getElementById('mag-val');
        const dropBtn = document.getElementById('dropBtn');
        const killMagnetBtn = document.getElementById('killMagnetBtn');
        const resetBtn = document.getElementById('resetBtn');
        const spinToggle = document.getElementById('spinToggle');

        const hudHeight = document.getElementById('hud-height');
        const hudVel = document.getElementById('hud-vel');
        const hudMag = document.getElementById('hud-mag');
        const hudStatus = document.getElementById('hud-status');

        magnetSlider.addEventListener('input', (e) => {
            window.__3D_STATE__.magnetStrength = parseFloat(e.target.value);
            magValDisplay.textContent = window.__3D_STATE__.magnetStrength;
        });

        dropBtn.addEventListener('click', () => {
            window.__3D_STATE__.bustY = 4.0;
            window.__3D_STATE__.bustVelocity = 0;
        });

        killMagnetBtn.addEventListener('click', () => {
            window.__3D_STATE__.magnetStrength = 0;
            magnetSlider.value = 0;
            magValDisplay.textContent = "0";
        });

        resetBtn.addEventListener('click', () => {
            window.__3D_STATE__.magnetStrength = 60;
            magnetSlider.value = 60;
            magValDisplay.textContent = "60";
            window.__3D_STATE__.bustY = 2.5;
            window.__3D_STATE__.bustVelocity = 0;
        });

        spinToggle.addEventListener('change', (e) => {
            window.__3D_STATE__.isSpinning = e.target.checked;
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'w' || e.key === 'W') {
                window.__3D_STATE__.bustVelocity += 2;
            } else if (e.key === 's' || e.key === 'S') {
                window.__3D_STATE__.bustVelocity -= 2;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const state = window.__3D_STATE__;
            state.frameCount++;

            // Physics Simulation (Semi-implicit Euler)
            let F_gravity = MASS * GRAVITY;
            let F_magnetic = 0;

            // Avoid division by zero or negative heights for magnetic force
            if (state.bustY > 0) {
                F_magnetic = state.magnetStrength / (state.bustY * state.bustY);
            }

            let netForce = F_gravity + F_magnetic;

            // Update velocity
            state.bustVelocity += (netForce / MASS) * DT;
            
            // Apply damping
            state.bustVelocity *= state.dampingFactor;
            
            // Update position
            state.bustY += state.bustVelocity * DT;

            // Collision with base
            if (state.bustY <= MIN_Y) {
                state.bustY = MIN_Y;
                if (state.bustVelocity < 0) {
                    state.bustVelocity = 0;
                }
            }

            // Apply to 3D object
            bustGroup.position.y = state.bustY;

            // Auto Spin
            if (state.isSpinning) {
                state.bustRotationY += 1.0 * DT; // 1 rad/s
                bustGroup.rotation.y = state.bustRotationY;
            }

            // Determine Status
            if (state.bustY > 0.5 && state.magnetStrength > 0) {
                state.status = 'Levitating';
            } else if (state.magnetStrength === 0 && state.bustY > 0.5) {
                state.status = 'Falling';
            } else if (state.bustY <= 0.5) {
                state.status = 'Resting';
            }

            // Check Equilibrium
            state.equilibriumReached = (Math.abs(state.bustVelocity) < 0.05 && state.status === 'Levitating');

            // Update HUD
            hudHeight.textContent = state.bustY.toFixed(2);
            hudVel.textContent = state.bustVelocity.toFixed(2);
            hudMag.textContent = state.magnetStrength.toFixed(0);
            hudStatus.textContent = state.status;

            // Dynamic glow intensity based on magnet strength
            ringMat.emissiveIntensity = (state.magnetStrength / 60) * 2;
            pointLight.intensity = (state.magnetStrength / 60) * 1.0;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
