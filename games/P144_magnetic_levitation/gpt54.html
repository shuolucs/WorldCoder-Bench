<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Magnetic Levitation - Nefertiti</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    canvas {
      display: block;
    }

    #uiPanel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 280px;
      background: rgba(10, 12, 24, 0.78);
      border: 1px solid rgba(120, 160, 255, 0.25);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 0 20px rgba(0, 100, 255, 0.15);
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    #uiPanel h2 {
      margin: 0 0 14px 0;
      font-size: 18px;
      color: #9fd6ff;
    }

    .control-group {
      margin-bottom: 14px;
    }

    .control-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #d6e4ff;
    }

    #magnetSlider {
      width: 100%;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      background: #2c3f68;
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background: #3e5a93;
    }

    button:active {
      transform: scale(0.98);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .checkbox-row input {
      transform: scale(1.2);
    }

    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      min-width: 220px;
      background: rgba(10, 12, 24, 0.72);
      border: 1px solid rgba(120, 160, 255, 0.22);
      border-radius: 12px;
      padding: 14px 16px;
      z-index: 10;
      line-height: 1.6;
      font-size: 14px;
      box-shadow: 0 0 18px rgba(0, 100, 255, 0.12);
    }

    .value {
      color: #8fd3ff;
      font-weight: bold;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #b7c2de;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Height: <span id="hudHeight" class="value">0.00</span></div>
    <div>Velocity: <span id="hudVelocity" class="value">0.00</span></div>
    <div>Magnet Strength: <span id="hudMagnet" class="value">60</span></div>
    <div>Status: <span id="hudStatus" class="value">Levitating</span></div>
    <div class="hint">Keys: W = up impulse, S = down impulse</div>
  </div>

  <div id="uiPanel">
    <h2>Levitation Controls</h2>

    <div class="control-group">
      <label for="magnetSlider">Magnet Strength: <span id="magnetValue">60</span></label>
      <input id="magnetSlider" type="range" min="20" max="120" step="1" value="60" />
    </div>

    <div class="control-group button-row">
      <button id="dropBtn">Drop from Height</button>
      <button id="killMagnetBtn">Kill Magnet</button>
    </div>

    <div class="control-group" style="margin-top: 10px;">
      <button id="resetBtn">Reset</button>
    </div>

    <div class="control-group">
      <div class="checkbox-row">
        <input id="spinToggle" type="checkbox" checked />
        <label for="spinToggle" style="margin:0;">Auto Spin</label>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 3, 6);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.5, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.update();

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const pointLight = new THREE.PointLight(0x00aaff, 1.0, 10, 2);
    pointLight.position.set(0, -1, 0);
    scene.add(pointLight);

    // Base platform
    const baseGroup = new THREE.Group();
    scene.add(baseGroup);

    const baseGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.3, 64);
    const baseMat = new THREE.MeshStandardMaterial({
      color: 0x333344,
      metalness: 0.85,
      roughness: 0.25
    });
    const baseMesh = new THREE.Mesh(baseGeo, baseMat);
    baseMesh.position.y = 0;
    baseMesh.castShadow = false;
    baseMesh.receiveShadow = true;
    baseGroup.add(baseMesh);

    const ringGeo = new THREE.TorusGeometry(1.2, 0.05, 24, 100);
    const ringMat = new THREE.MeshStandardMaterial({
      color: 0x2288ff,
      emissive: 0x0066ff,
      emissiveIntensity: 2.2,
      metalness: 0.5,
      roughness: 0.2
    });
    const ringMesh = new THREE.Mesh(ringGeo, ringMat);
    ringMesh.rotation.x = Math.PI / 2;
    ringMesh.position.y = 0.15;
    baseGroup.add(ringMesh);

    // Soft ground glow
    const glowGeo = new THREE.CircleGeometry(1.35, 64);
    const glowMat = new THREE.MeshBasicMaterial({
      color: 0x0066ff,
      transparent: true,
      opacity: 0.14,
      side: THREE.DoubleSide
    });
    const glowMesh = new THREE.Mesh(glowGeo, glowMat);
    glowMesh.rotation.x = -Math.PI / 2;
    glowMesh.position.y = 0.151;
    baseGroup.add(glowMesh);

    // Bust holder
    const bustPivot = new THREE.Group();
    bustPivot.position.set(0, 2.5, 0);
    scene.add(bustPivot);

    let bustModel = null;
    let modelLoaded = false;

    // Fallback placeholder if model fails
    function createFallbackBust() {
      const group = new THREE.Group();

      const mat = new THREE.MeshStandardMaterial({
        color: 0xc7b08a,
        roughness: 0.55,
        metalness: 0.1
      });

      const torso = new THREE.Mesh(
        new THREE.CylinderGeometry(0.4, 0.55, 0.9, 24),
        mat
      );
      torso.position.y = 0.45;
      group.add(torso);

      const neck = new THREE.Mesh(
        new THREE.CylinderGeometry(0.12, 0.16, 0.18, 20),
        mat
      );
      neck.position.y = 0.98;
      group.add(neck);

      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.28, 28, 28),
        mat
      );
      head.scale.set(0.9, 1.05, 0.95);
      head.position.y = 1.23;
      group.add(head);

      const crown = new THREE.Mesh(
        new THREE.CylinderGeometry(0.17, 0.22, 0.55, 24),
        new THREE.MeshStandardMaterial({
          color: 0x2c5aa0,
          roughness: 0.35,
          metalness: 0.15
        })
      );
      crown.position.y = 1.6;
      group.add(crown);

      group.position.y = -0.1;
      return group;
    }

    function fitModelToHeight(object, targetHeight = 1.5) {
      const box = new THREE.Box3().setFromObject(object);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const currentHeight = Math.max(size.y, 0.0001);
      const scale = targetHeight / currentHeight;
      object.scale.multiplyScalar(scale);

      const box2 = new THREE.Box3().setFromObject(object);
      const center2 = new THREE.Vector3();
      const size2 = new THREE.Vector3();
      box2.getCenter(center2);
      box2.getSize(size2);

      object.position.sub(center2);
      object.position.y += size2.y / 2;
    }

    const loader = new GLTFLoader();
    loader.load(
      "Nefertiti.glb",
      (gltf) => {
        bustModel = gltf.scene;
        fitModelToHeight(bustModel, 1.5);
        bustPivot.add(bustModel);
        modelLoaded = true;
      },
      undefined,
      () => {
        bustModel = createFallbackBust();
        fitModelToHeight(bustModel, 1.5);
        bustPivot.add(bustModel);
        modelLoaded = true;
      }
    );

    // Physics
    const mass = 1.0;
    const gravity = -9.81;
    const dt = 1 / 60;
    const dampingFactor = 0.95;
    const minY = 0.4;

    let magnetStrength = 60.0;
    let velocityY = 0.0;
    let frameCount = 0;
    let isSpinning = true;

    // UI
    const magnetSlider = document.getElementById("magnetSlider");
    const magnetValue = document.getElementById("magnetValue");
    const dropBtn = document.getElementById("dropBtn");
    const killMagnetBtn = document.getElementById("killMagnetBtn");
    const resetBtn = document.getElementById("resetBtn");
    const spinToggle = document.getElementById("spinToggle");

    const hudHeight = document.getElementById("hudHeight");
    const hudVelocity = document.getElementById("hudVelocity");
    const hudMagnet = document.getElementById("hudMagnet");
    const hudStatus = document.getElementById("hudStatus");

    magnetSlider.addEventListener("input", (e) => {
      magnetStrength = parseFloat(e.target.value);
      magnetValue.textContent = magnetStrength.toFixed(0);
    });

    dropBtn.addEventListener("click", () => {
      bustPivot.position.y = 4.0;
      velocityY = 0.0;
    });

    killMagnetBtn.addEventListener("click", () => {
      magnetStrength = 0;
      magnetSlider.value = 20; // visual minimum remains slider min; HUD shows actual magnetStrength
      magnetValue.textContent = "0";
    });

    resetBtn.addEventListener("click", () => {
      magnetStrength = 60.0;
      magnetSlider.value = 60;
      magnetValue.textContent = "60";
      bustPivot.position.y = 2.5;
      velocityY = 0.0;
      if (bustModel) bustPivot.rotation.y = 0;
    });

    spinToggle.addEventListener("change", () => {
      isSpinning = spinToggle.checked;
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "w" || e.key === "W") {
        velocityY += 2.0;
      }
      if (e.key === "s" || e.key === "S") {
        velocityY -= 2.0;
      }
    });

    function getStatus() {
      const y = bustPivot.position.y;
      if (magnetStrength === 0 && y > 0.5) return "Falling";
      if (y <= 0.5) return "Resting";
      return "Levitating";
    }

    window.__3D_STATE__ = {
      modelLoaded: false,
      bustY: bustPivot.position.y,
      bustVelocity: velocityY,
      magnetStrength,
      isSpinning,
      bustRotationY: bustPivot.rotation.y,
      status: "Levitating",
      frameCount: 0,
      equilibriumReached: false,
      dampingFactor
    };

    const clock = new THREE.Clock();

    function updatePhysics() {
      const y = Math.max(bustPivot.position.y, 0.001);

      const F_gravity = mass * gravity;
      const F_magnetic = y > 0 ? magnetStrength / (y * y) : 0;
      const netForce = F_gravity + F_magnetic;
      const acceleration = netForce / mass;

      velocityY += acceleration * dt;
      velocityY *= dampingFactor;
      bustPivot.position.y += velocityY * dt;

      if (bustPivot.position.y < minY) {
        bustPivot.position.y = minY;
        if (velocityY < 0) velocityY = 0;
      }
    }

    function updateVisuals() {
      const elapsedDt = clock.getDelta();

      if (isSpinning && bustModel) {
        bustPivot.rotation.y += 1.0 * elapsedDt;
      }

      ringMat.emissiveIntensity = magnetStrength > 0
        ? 1.2 + (magnetStrength / 120) * 2.2
        : 0.15;

      glowMat.opacity = magnetStrength > 0
        ? 0.06 + (magnetStrength / 120) * 0.18
        : 0.02;

      pointLight.intensity = magnetStrength > 0
        ? 0.25 + (magnetStrength / 120) * 1.3
        : 0.05;
    }

    function updateHUDAndState() {
      const y = bustPivot.position.y;
      const status = getStatus();
      const equilibriumReached = Math.abs(velocityY) < 0.05 && status === "Levitating";

      hudHeight.textContent = y.toFixed(2);
      hudVelocity.textContent = velocityY.toFixed(2);
      hudMagnet.textContent = magnetStrength.toFixed(0);
      hudStatus.textContent = status;

      window.__3D_STATE__.modelLoaded = modelLoaded;
      window.__3D_STATE__.bustY = y;
      window.__3D_STATE__.bustVelocity = velocityY;
      window.__3D_STATE__.magnetStrength = magnetStrength;
      window.__3D_STATE__.isSpinning = isSpinning;
      window.__3D_STATE__.bustRotationY = bustPivot.rotation.y;
      window.__3D_STATE__.status = status;
      window.__3D_STATE__.frameCount = frameCount;
      window.__3D_STATE__.equilibriumReached = equilibriumReached;
      window.__3D_STATE__.dampingFactor = dampingFactor;
    }

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      updatePhysics();
      updateVisuals();
      updateHUDAndState();

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
