<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Globe Flight Network</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .panel {
            background: rgba(10, 20, 30, 0.8);
            border: 1px solid #0ff;
            border-radius: 8px;
            padding: 15px;
            color: #fff;
            pointer-events: auto;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(4px);
        }
        select {
            background: #000;
            color: #0ff;
            border: 1px solid #0ff;
            padding: 5px;
            border-radius: 4px;
            outline: none;
            width: 100%;
            margin-top: 5px;
        }
        #routeDetail {
            min-width: 200px;
            min-height: 40px;
            font-size: 14px;
            line-height: 1.4;
        }
        .title {
            font-size: 16px;
            font-weight: bold;
            color: #0ff;
            margin-bottom: 5px;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-container">
        <div class="panel">
            <div class="title">Filter Network</div>
            <select id="continentFilter">
                <option value="all">All Continents</option>
                <option value="Asia">Asia</option>
                <option value="Europe">Europe</option>
                <option value="Americas">Americas</option>
                <option value="Africa">Africa</option>
                <option value="Oceania">Oceania</option>
            </select>
        </div>
        <div class="panel">
            <div class="title">Route Details</div>
            <div id="routeDetail">Click a route to view details.</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Initialization ---
        window.__3D_STATE__ = {
            cityCount: 20,
            routeCount: 30,
            selectedRoute: null,
            activeFlights: 0,
            filterContinent: 'all'
        };

        // --- Data ---
        const cities = [
            { id: 0, name: 'Beijing', lat: 39.9042, lon: 116.4074, continent: 'Asia' },
            { id: 1, name: 'Tokyo', lat: 35.6762, lon: 139.6503, continent: 'Asia' },
            { id: 2, name: 'Singapore', lat: 1.3521, lon: 103.8198, continent: 'Asia' },
            { id: 3, name: 'Mumbai', lat: 19.0760, lon: 72.8777, continent: 'Asia' },
            { id: 4, name: 'Dubai', lat: 25.2048, lon: 55.2708, continent: 'Asia' },
            { id: 5, name: 'London', lat: 51.5074, lon: -0.1278, continent: 'Europe' },
            { id: 6, name: 'Paris', lat: 48.8566, lon: 2.3522, continent: 'Europe' },
            { id: 7, name: 'Frankfurt', lat: 50.1109, lon: 8.6821, continent: 'Europe' },
            { id: 8, name: 'Rome', lat: 41.9028, lon: 12.4964, continent: 'Europe' },
            { id: 9, name: 'Moscow', lat: 55.7558, lon: 37.6173, continent: 'Europe' },
            { id: 10, name: 'New York', lat: 40.7128, lon: -74.0060, continent: 'Americas' },
            { id: 11, name: 'Los Angeles', lat: 34.0522, lon: -118.2437, continent: 'Americas' },
            { id: 12, name: 'Sao Paulo', lat: -23.5505, lon: -46.6333, continent: 'Americas' },
            { id: 13, name: 'Toronto', lat: 43.6510, lon: -79.3470, continent: 'Americas' },
            { id: 14, name: 'Mexico City', lat: 19.4326, lon: -99.1332, continent: 'Americas' },
            { id: 15, name: 'Cairo', lat: 30.0444, lon: 31.2357, continent: 'Africa' },
            { id: 16, name: 'Johannesburg', lat: -26.2041, lon: 28.0473, continent: 'Africa' },
            { id: 17, name: 'Lagos', lat: 6.5244, lon: 3.3792, continent: 'Africa' },
            { id: 18, name: 'Sydney', lat: -33.8688, lon: 151.2093, continent: 'Oceania' },
            { id: 19, name: 'Auckland', lat: -36.8485, lon: 174.7633, continent: 'Oceania' }
        ];

        const routePairs = [
            [0,1], [0,2], [0,5], [0,10], [0,11],
            [1,11], [1,18],
            [2,3], [2,18],
            [3,4], [3,5],
            [4,5], [4,15],
            [5,6], [5,7], [5,10],
            [6,8], [6,15],
            [7,9],
            [9,15],
            [10,11], [10,13],
            [11,14], [11,18],
            [12,10], [12,16],
            [13,14],
            [15,17],
            [16,17],
            [18,19]
        ];

        const routes = routePairs.map((pair, index) => ({
            id: index,
            from: pair[0],
            to: pair[1]
        }));

        // --- Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 12;
        controls.maxDistance = 50;

        // Lighting
        scene.add(new THREE.AmbientLight(0x333344));
        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(5, 3, 5);
        scene.add(dirLight);
        const backLight = new THREE.DirectionalLight(0x4444ff, 1);
        backLight.position.set(-5, -3, -5);
        scene.add(backLight);

        // --- Math Helpers ---
        const GLOBE_RADIUS = 10;

        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            return new THREE.Vector3(
                -(radius * Math.sin(phi) * Math.cos(theta)),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

        // --- Build Scene ---
        // 1. Globe
        const globeGeo = new THREE.SphereGeometry(GLOBE_RADIUS, 64, 64);
        const globeMat = new THREE.MeshStandardMaterial({
            color: 0x0a1128,
            roughness: 0.8,
            metalness: 0.2
        });
        const globe = new THREE.Mesh(globeGeo, globeMat);
        scene.add(globe);

        // Wireframe overlay for aesthetics
        const wireGeo = new THREE.WireframeGeometry(new THREE.SphereGeometry(GLOBE_RADIUS + 0.01, 32, 32));
        const wireMat = new THREE.LineBasicMaterial({ color: 0x1c315e, transparent: true, opacity: 0.3 });
        const wireframe = new THREE.LineSegments(wireGeo, wireMat);
        scene.add(wireframe);

        // 2. Cities
        const cityMeshes = [];
        const cityGeo = new THREE.SphereGeometry(0.15, 16, 16);
        const cityMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

        cities.forEach(city => {
            const pos = latLonToVector3(city.lat, city.lon, GLOBE_RADIUS);
            const mesh = new THREE.Mesh(cityGeo, cityMat);
            mesh.position.copy(pos);
            mesh.userData = { type: 'city', data: city };
            scene.add(mesh);
            cityMeshes.push(mesh);
        });

        // 3. Routes
        const routeMeshes = [];
        const routeCurves = [];
        const defaultRouteMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.3 });
        const selectedRouteMat = new THREE.MeshBasicMaterial({ color: 0xff0055, transparent: true, opacity: 0.9 });

        routes.forEach(route => {
            const c1 = cities[route.from];
            const c2 = cities[route.to];
            const p1 = latLonToVector3(c1.lat, c1.lon, GLOBE_RADIUS);
            const p2 = latLonToVector3(c2.lat, c2.lon, GLOBE_RADIUS);

            const distance = p1.distanceTo(p2);
            const midPoint = p1.clone().lerp(p2, 0.5);
            const elevation = distance * 0.3;
            midPoint.normalize().multiplyScalar(GLOBE_RADIUS + elevation);

            const curve = new THREE.QuadraticBezierCurve3(p1, midPoint, p2);
            routeCurves.push(curve);

            const tubeGeo = new THREE.TubeGeometry(curve, 32, 0.05, 4, false);
            const mesh = new THREE.Mesh(tubeGeo, defaultRouteMat);
            
            mesh.userData = { 
                type: 'route', 
                id: route.id, 
                c1: c1, 
                c2: c2,
                desc: `${c1.name} (${c1.continent}) ✈ ${c2.name} (${c2.continent})`
            };
            
            scene.add(mesh);
            routeMeshes.push(mesh);
        });

        // 4. Flights
        const flights = [];
        const flightGeo = new THREE.SphereGeometry(0.1, 8, 8);
        const flightMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });

        // Create 40 flight instances to distribute among routes
        for (let i = 0; i < 40; i++) {
            const mesh = new THREE.Mesh(flightGeo, flightMat);
            scene.add(mesh);
            
            // Assign to a random route
            const routeIdx = Math.floor(Math.random() * routes.length);
            
            flights.push({
                mesh: mesh,
                routeIdx: routeIdx,
                progress: Math.random(),
                speed: 0.002 + Math.random() * 0.003
            });
        }

        // --- Interaction & Filtering ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const detailPanel = document.getElementById('routeDetail');
        const filterSelect = document.getElementById('continentFilter');

        // Filter Logic
        filterSelect.addEventListener('change', (e) => {
            const continent = e.target.value;
            window.__3D_STATE__.filterContinent = continent;

            // Filter Cities
            cityMeshes.forEach(mesh => {
                const city = mesh.userData.data;
                mesh.visible = (continent === 'all' || city.continent === continent);
            });

            // Filter Routes (visible if either connected city is in the continent)
            routeMeshes.forEach(mesh => {
                const c1 = mesh.userData.c1;
                const c2 = mesh.userData.c2;
                mesh.visible = (continent === 'all' || c1.continent === continent || c2.continent === continent);
            });

            // Clear selection if hidden
            if (window.__3D_STATE__.selectedRoute !== null) {
                const selectedMesh = routeMeshes.find(m => m.userData.id === window.__3D_STATE__.selectedRoute);
                if (selectedMesh && !selectedMesh.visible) {
                    selectedMesh.material = defaultRouteMat;
                    window.__3D_STATE__.selectedRoute = null;
                    detailPanel.innerHTML = 'Click a route to view details.';
                }
            }
        });

        // Click Logic
        window.addEventListener('pointerdown', (event) => {
            // Calculate mouse position in normalized device coordinates
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Intersect only visible routes
            const visibleRoutes = routeMeshes.filter(m => m.visible);
            const intersects = raycaster.intersectObjects(visibleRoutes);

            if (intersects.length > 0) {
                const hitMesh = intersects[0].object;
                
                // Reset previous selection
                if (window.__3D_STATE__.selectedRoute !== null) {
                    const prev = routeMeshes.find(m => m.userData.id === window.__3D_STATE__.selectedRoute);
                    if (prev) prev.material = defaultRouteMat;
                }

                // Set new selection
                hitMesh.material = selectedRouteMat;
                window.__3D_STATE__.selectedRoute = hitMesh.userData.id;
                detailPanel.innerHTML = `<strong>Route ID:</strong> ${hitMesh.userData.id}<br/><strong>Path:</strong> ${hitMesh.userData.desc}`;
            } else {
                // Clicked empty space, deselect
                if (window.__3D_STATE__.selectedRoute !== null) {
                    const prev = routeMeshes.find(m => m.userData.id === window.__3D_STATE__.selectedRoute);
                    if (prev) prev.material = defaultRouteMat;
                    window.__3D_STATE__.selectedRoute = null;
                    detailPanel.innerHTML = 'Click a route to view details.';
                }
            }
        });

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            let activeCount = 0;

            // Update flights
            flights.forEach(flight => {
                const routeMesh = routeMeshes[flight.routeIdx];
                
                if (!routeMesh.visible) {
                    flight.mesh.visible = false;
                    return;
                }

                flight.mesh.visible = true;
                activeCount++;
                
                flight.progress += flight.speed;
                if (flight.progress > 1) {
                    flight.progress = 0;
                    // Optionally reassign to a new visible route
                    const visibleIndices = routeMeshes.map((m, i) => m.visible ? i : -1).filter(i => i !== -1);
                    if (visibleIndices.length > 0) {
                        flight.routeIdx = visibleIndices[Math.floor(Math.random() * visibleIndices.length)];
                    }
                }

                const curve = routeCurves[flight.routeIdx];
                const pos = curve.getPoint(flight.progress);
                flight.mesh.position.copy(pos);
            });

            window.__3D_STATE__.activeFlights = activeCount;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
