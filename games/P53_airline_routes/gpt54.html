<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 地球城市与航线网络</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #06111f;
      color: #eaf2ff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #ui {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      width: 320px;
      max-height: calc(100% - 32px);
      overflow: auto;
      background: rgba(8, 18, 34, 0.82);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    #ui h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .row {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      opacity: 0.9;
    }

    select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff;
      outline: none;
    }

    #routeDetail {
      min-height: 88px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      line-height: 1.6;
      font-size: 14px;
    }

    #legend {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      max-height: 260px;
      overflow: auto;
      padding-right: 4px;
    }

    .legend-item {
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid transparent;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 13px;
    }

    .legend-item:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.15);
    }

    .legend-item.active {
      border-color: #ffd166;
      background: rgba(255, 209, 102, 0.12);
      color: #ffe8aa;
    }

    #hint {
      position: absolute;
      right: 16px;
      bottom: 16px;
      z-index: 10;
      background: rgba(8, 18, 34, 0.78);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      color: #dce8ff;
      backdrop-filter: blur(8px);
    }

    canvas {
      display: block;
    }

    .muted {
      opacity: 0.72;
      font-size: 12px;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h2>地球城市与航线网络</h2>

      <div class="row">
        <label for="continentFilter">按大洲筛选</label>
        <select id="continentFilter">
          <option value="all">全部</option>
          <option value="Asia">Asia</option>
          <option value="Europe">Europe</option>
          <option value="Americas">Americas</option>
          <option value="Africa">Africa</option>
          <option value="Oceania">Oceania</option>
        </select>
      </div>

      <div class="row">
        <label>航线详情</label>
        <div id="routeDetail">请选择一条航线。</div>
      </div>

      <div class="row">
        <label>航线图例（点击可选中）</label>
        <div id="legend"></div>
      </div>

      <div class="muted">
        数据固定：20 个城市，30 条航线。<br />
        可拖拽旋转、滚轮缩放、点击航线或图例查看详情。
      </div>
    </div>

    <div id="hint">
      鼠标左键拖拽旋转 · 滚轮缩放 · 点击航线/图例选中
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const cities = [
      { id: 0,  name: 'Beijing', continent: 'Asia',     lat: 39.9042, lon: 116.4074 },
      { id: 1,  name: 'Tokyo', continent: 'Asia',       lat: 35.6762, lon: 139.6503 },
      { id: 2,  name: 'Singapore', continent: 'Asia',   lat: 1.3521, lon: 103.8198 },
      { id: 3,  name: 'Dubai', continent: 'Asia',       lat: 25.2048, lon: 55.2708 },
      { id: 4,  name: 'Delhi', continent: 'Asia',       lat: 28.6139, lon: 77.2090 },

      { id: 5,  name: 'London', continent: 'Europe',    lat: 51.5074, lon: -0.1278 },
      { id: 6,  name: 'Paris', continent: 'Europe',     lat: 48.8566, lon: 2.3522 },
      { id: 7,  name: 'Frankfurt', continent: 'Europe', lat: 50.1109, lon: 8.6821 },
      { id: 8,  name: 'Istanbul', continent: 'Europe',  lat: 41.0082, lon: 28.9784 },

      { id: 9,  name: 'New York', continent: 'Americas',      lat: 40.7128, lon: -74.0060 },
      { id: 10, name: 'Los Angeles', continent: 'Americas',   lat: 34.0522, lon: -118.2437 },
      { id: 11, name: 'Mexico City', continent: 'Americas',   lat: 19.4326, lon: -99.1332 },
      { id: 12, name: 'Sao Paulo', continent: 'Americas',     lat: -23.5558, lon: -46.6396 },
      { id: 13, name: 'Toronto', continent: 'Americas',       lat: 43.6532, lon: -79.3832 },

      { id: 14, name: 'Cairo', continent: 'Africa',     lat: 30.0444, lon: 31.2357 },
      { id: 15, name: 'Johannesburg', continent: 'Africa', lat: -26.2041, lon: 28.0473 },
      { id: 16, name: 'Nairobi', continent: 'Africa',   lat: -1.2921, lon: 36.8219 },

      { id: 17, name: 'Sydney', continent: 'Oceania',   lat: -33.8688, lon: 151.2093 },
      { id: 18, name: 'Auckland', continent: 'Oceania', lat: -36.8509, lon: 174.7645 },
      { id: 19, name: 'Perth', continent: 'Oceania',    lat: -31.9505, lon: 115.8605 },
    ];

    const routes = [
      { id: 0,  from: 0,  to: 1 },
      { id: 1,  from: 0,  to: 4 },
      { id: 2,  from: 1,  to: 2 },
      { id: 3,  from: 2,  to: 3 },
      { id: 4,  from: 3,  to: 5 },
      { id: 5,  from: 5,  to: 6 },
      { id: 6,  from: 6,  to: 7 },
      { id: 7,  from: 7,  to: 8 },
      { id: 8,  from: 8,  to: 14 },
      { id: 9,  from: 14, to: 16 },
      { id: 10, from: 16, to: 15 },
      { id: 11, from: 15, to: 17 },
      { id: 12, from: 17, to: 18 },
      { id: 13, from: 17, to: 19 },
      { id: 14, from: 19, to: 2 },
      { id: 15, from: 5,  to: 9 },
      { id: 16, from: 9,  to: 10 },
      { id: 17, from: 9,  to: 13 },
      { id: 18, from: 13, to: 11 },
      { id: 19, from: 11, to: 12 },
      { id: 20, from: 12, to: 5 },
      { id: 21, from: 10, to: 1 },
      { id: 22, from: 6,  to: 14 },
      { id: 23, from: 3,  to: 16 },
      { id: 24, from: 4,  to: 3 },
      { id: 25, from: 2,  to: 17 },
      { id: 26, from: 8,  to: 3 },
      { id: 27, from: 7,  to: 9 },
      { id: 28, from: 0,  to: 5 },
      { id: 29, from: 18, to: 10 },
    ];

    const cityMap = new Map(cities.map(c => [c.id, c]));

    const container = document.getElementById('app');
    const continentFilterEl = document.getElementById('continentFilter');
    const routeDetailEl = document.getElementById('routeDetail');
    const legendEl = document.getElementById('legend');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x06111f);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 22);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 10;
    controls.maxDistance = 40;

    scene.add(new THREE.AmbientLight(0xffffff, 1.1));

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(10, 8, 12);
    scene.add(dirLight);

    const earthGroup = new THREE.Group();
    scene.add(earthGroup);

    const RADIUS = 6;

    const earth = new THREE.Mesh(
      new THREE.SphereGeometry(RADIUS, 64, 64),
      new THREE.MeshPhongMaterial({
        color: 0x133a63,
        emissive: 0x0a1d33,
        shininess: 18,
        specular: 0x335577
      })
    );
    earthGroup.add(earth);

    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(RADIUS * 1.03, 64, 64),
      new THREE.MeshBasicMaterial({
        color: 0x4da3ff,
        transparent: true,
        opacity: 0.08,
        side: THREE.BackSide
      })
    );
    earthGroup.add(atmosphere);

    const grid = new THREE.LineSegments(
      new THREE.WireframeGeometry(new THREE.SphereGeometry(RADIUS * 1.001, 18, 18)),
      new THREE.LineBasicMaterial({ color: 0x3c6fa5, transparent: true, opacity: 0.18 })
    );
    earthGroup.add(grid);

    const stars = new THREE.Points(
      new THREE.BufferGeometry(),
      new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.75 })
    );
    {
      const starCount = 1500;
      const positions = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i++) {
        const r = 80 + Math.random() * 70;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        positions[i * 3 + 0] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.cos(phi);
        positions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
      }
      stars.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    }
    scene.add(stars);

    function latLonToVector3(lat, lon, radius) {
      const phi = (90 - lat) * (Math.PI / 180);
      const theta = (lon + 180) * (Math.PI / 180);

      const x = -radius * Math.sin(phi) * Math.cos(theta);
      const y = radius * Math.cos(phi);
      const z = radius * Math.sin(phi) * Math.sin(theta);

      return new THREE.Vector3(x, y, z);
    }

    const continentColors = {
      Asia: 0xff7b72,
      Europe: 0x6ee7ff,
      Americas: 0x8bff7a,
      Africa: 0xffd166,
      Oceania: 0xc084fc
    };

    const citiesGroup = new THREE.Group();
    earthGroup.add(citiesGroup);

    const cityMeshes = [];

    cities.forEach(city => {
      const pos = latLonToVector3(city.lat, city.lon, RADIUS + 0.09);
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.11, 12, 12),
        new THREE.MeshStandardMaterial({
          color: continentColors[city.continent] || 0xffffff,
          emissive: continentColors[city.continent] || 0xffffff,
          emissiveIntensity: 0.35
        })
      );
      mesh.position.copy(pos);
      mesh.userData.city = city;
      citiesGroup.add(mesh);
      cityMeshes.push(mesh);
    });

    const routesGroup = new THREE.Group();
    earthGroup.add(routesGroup);

    const flightsGroup = new THREE.Group();
    earthGroup.add(flightsGroup);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    let selectedRouteId = null;
    let currentFilter = 'all';

    const routeObjects = [];
    const activeFlightObjects = [];

    function makeArcCurve(cityA, cityB) {
      const start = latLonToVector3(cityA.lat, cityA.lon, RADIUS + 0.05);
      const end = latLonToVector3(cityB.lat, cityB.lon, RADIUS + 0.05);

      const mid = start.clone().add(end).multiplyScalar(0.5);
      const chord = start.distanceTo(end);
      const lift = 1.2 + chord * 0.12;
      const control = mid.clone().normalize().multiplyScalar(RADIUS + lift);

      return {
        curve: new THREE.QuadraticBezierCurve3(start, control, end),
        start, end, control
      };
    }

    function routePassesFilter(route, filter) {
      if (filter === 'all') return true;
      const a = cityMap.get(route.from);
      const b = cityMap.get(route.to);
      return a.continent === filter || b.continent === filter;
    }

    function createRouteObject(route) {
      const cityA = cityMap.get(route.from);
      const cityB = cityMap.get(route.to);
      const { curve } = makeArcCurve(cityA, cityB);

      const points = curve.getPoints(120);
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({
        color: 0x67c1ff,
        transparent: true,
        opacity: 0.72
      });
      const line = new THREE.Line(geometry, material);
      line.userData.route = route;
      line.userData.curve = curve;
      routesGroup.add(line);

      const flight = new THREE.Mesh(
        new THREE.SphereGeometry(0.09, 10, 10),
        new THREE.MeshBasicMaterial({ color: 0xffffff })
      );
      flight.userData.route = route;
      flight.userData.curve = curve;
      flight.userData.t = Math.random();
      flight.userData.speed = 0.0015 + Math.random() * 0.0025;
      flightsGroup.add(flight);

      routeObjects.push(line);
      activeFlightObjects.push(flight);
    }

    routes.forEach(createRouteObject);

    function updateLegend() {
      legendEl.innerHTML = '';
      routes.forEach(route => {
        if (!routePassesFilter(route, currentFilter)) return;
        const a = cityMap.get(route.from);
        const b = cityMap.get(route.to);
        const item = document.createElement('div');
        item.className = 'legend-item' + (selectedRouteId === route.id ? ' active' : '');
        item.textContent = `${route.id}: ${a.name} → ${b.name}`;
        item.dataset.routeId = route.id;
        item.addEventListener('click', () => selectRoute(route.id));
        legendEl.appendChild(item);
      });
    }

    function selectRoute(routeId) {
      selectedRouteId = routeId;
      const route = routes.find(r => r.id === routeId) || null;

      routeObjects.forEach(obj => {
        const active = route && obj.userData.route.id === route.id;
        obj.material.color.set(active ? 0xffd166 : 0x67c1ff);
        obj.material.opacity = active ? 1.0 : (obj.visible ? 0.72 : 0);
      });

      if (!route) {
        routeDetailEl.innerHTML = '请选择一条航线。';
      } else {
        const a = cityMap.get(route.from);
        const b = cityMap.get(route.to);
        routeDetailEl.innerHTML = `
          <strong>航线 #${route.id}</strong><br>
          ${a.name} (${a.continent}) → ${b.name} (${b.continent})<br>
          坐标：(${a.lat.toFixed(2)}, ${a.lon.toFixed(2)}) → (${b.lat.toFixed(2)}, ${b.lon.toFixed(2)})
        `;
      }

      updateLegend();
      syncState();
    }

    function applyFilter(filter) {
      currentFilter = filter;

      cityMeshes.forEach(mesh => {
        const city = mesh.userData.city;
        mesh.visible = filter === 'all' || city.continent === filter;
      });

      routeObjects.forEach((obj, idx) => {
        const route = obj.userData.route;
        const visible = routePassesFilter(route, filter);
        obj.visible = visible;
        obj.material.opacity = selectedRouteId === route.id ? 1.0 : (visible ? 0.72 : 0);
        activeFlightObjects[idx].visible = visible;
      });

      if (selectedRouteId !== null) {
        const selected = routes.find(r => r.id === selectedRouteId);
        if (selected && !routePassesFilter(selected, filter)) {
          selectedRouteId = null;
          routeDetailEl.innerHTML = '当前筛选下未选中航线。';
        }
      }

      updateLegend();
      syncState();
    }

    function onPointerClick(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.params.Line.threshold = 0.18;
      raycaster.setFromCamera(mouse, camera);

      const intersects = raycaster.intersectObjects(routeObjects.filter(o => o.visible), false);
      if (intersects.length > 0) {
        const route = intersects[0].object.userData.route;
        selectRoute(route.id);
      }
    }

    renderer.domElement.addEventListener('click', onPointerClick);

    continentFilterEl.addEventListener('change', e => {
      applyFilter(e.target.value);
    });

    function syncState() {
      window.__3D_STATE__ = {
        cityCount: cities.length,
        routeCount: routes.length,
        selectedRoute: selectedRouteId,
        activeFlights: activeFlightObjects.filter(f => f.visible).length,
        filterContinent: currentFilter
      };
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();

      earthGroup.rotation.y += 0.0012;
      stars.rotation.y -= 0.00015;

      activeFlightObjects.forEach((flight) => {
        if (!flight.visible) return;
        const curve = flight.userData.curve;
        flight.userData.t = (flight.userData.t + flight.userData.speed) % 1;
        const pos = curve.getPointAt(flight.userData.t);
        flight.position.copy(pos);

        const pulse = 0.85 + 0.35 * Math.sin(elapsed * 6 + flight.userData.t * Math.PI * 2);
        flight.scale.setScalar(pulse);
      });

      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateLegend();
    applyFilter('all');
    selectRoute(null);
    syncState();
    animate();
  </script>
</body>
</html>
