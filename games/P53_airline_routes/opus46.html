<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global City & Airline Network</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #fff; }
canvas { display: block; }

#ui-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
}

#controls-panel {
  position: absolute; top: 20px; left: 20px;
  background: rgba(10, 15, 30, 0.85);
  border: 1px solid rgba(100, 180, 255, 0.3);
  border-radius: 12px; padding: 20px;
  pointer-events: all; min-width: 220px;
  backdrop-filter: blur(10px);
}

#controls-panel h2 {
  font-size: 16px; margin-bottom: 12px;
  color: #7ec8ff; letter-spacing: 1px;
}

#controls-panel label {
  font-size: 13px; color: #aac8e8; display: block; margin-bottom: 6px;
}

#continentFilter {
  width: 100%; padding: 8px 12px;
  background: rgba(20, 40, 80, 0.9);
  border: 1px solid rgba(100, 180, 255, 0.4);
  border-radius: 6px; color: #fff; font-size: 13px;
  cursor: pointer; outline: none;
}
#continentFilter:hover { border-color: rgba(100, 180, 255, 0.7); }

#stats-panel {
  margin-top: 16px; padding-top: 12px;
  border-top: 1px solid rgba(100, 180, 255, 0.2);
  font-size: 12px; color: #8ab4d8; line-height: 1.8;
}

#routeDetail {
  position: absolute; bottom: 20px; left: 20px;
  background: rgba(10, 15, 30, 0.9);
  border: 1px solid rgba(100, 180, 255, 0.3);
  border-radius: 12px; padding: 20px;
  pointer-events: all; min-width: 280px;
  backdrop-filter: blur(10px);
  transition: opacity 0.3s, transform 0.3s;
}
#routeDetail.hidden { opacity: 0; transform: translateY(20px); pointer-events: none; }
#routeDetail h3 { font-size: 14px; color: #7ec8ff; margin-bottom: 10px; }
#routeDetail .detail-row { font-size: 12px; color: #aac8e8; line-height: 2; }
#routeDetail .close-btn {
  position: absolute; top: 10px; right: 14px;
  background: none; border: none; color: #7ec8ff;
  font-size: 18px; cursor: pointer; pointer-events: all;
}

#legend {
  position: absolute; top: 20px; right: 20px;
  background: rgba(10, 15, 30, 0.85);
  border: 1px solid rgba(100, 180, 255, 0.3);
  border-radius: 12px; padding: 16px;
  pointer-events: all; backdrop-filter: blur(10px);
}
#legend h3 { font-size: 14px; color: #7ec8ff; margin-bottom: 10px; }
.legend-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: #aac8e8; padding: 4px 6px;
  cursor: pointer; border-radius: 4px; transition: background 0.2s;
}
.legend-item:hover { background: rgba(100, 180, 255, 0.1); }
.legend-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}

#tooltip {
  position: absolute; background: rgba(10, 20, 40, 0.95);
  border: 1px solid rgba(100, 180, 255, 0.5);
  border-radius: 6px; padding: 8px 12px;
  font-size: 12px; color: #fff; pointer-events: none;
  display: none; white-space: nowrap; z-index: 20;
}
</style>
</head>
<body>

<div id="ui-overlay">
  <div id="controls-panel">
    <h2>🌍 Flight Network</h2>
    <label for="continentFilter">Filter by Continent</label>
    <select id="continentFilter">
      <option value="all">All Continents</option>
      <option value="Asia">Asia</option>
      <option value="Europe">Europe</option>
      <option value="Americas">Americas</option>
      <option value="Africa">Africa</option>
      <option value="Oceania">Oceania</option>
    </select>
    <div id="stats-panel">
      Cities: <span id="cityCountDisplay">20</span><br>
      Routes: <span id="routeCountDisplay">30</span><br>
      Active Flights: <span id="flightCountDisplay">0</span>
    </div>
  </div>

  <div id="legend">
    <h3>Continents</h3>
  </div>

  <div id="routeDetail" class="hidden">
    <button class="close-btn" id="closeDetail">✕</button>
    <h3>✈ Route Details</h3>
    <div class="detail-row" id="detailContent"></div>
  </div>
</div>

<div id="tooltip"></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ DATA ============
const cities = [
  { id: 0, name: "Tokyo", lat: 35.6762, lon: 139.6503, continent: "Asia" },
  { id: 1, name: "London", lat: 51.5074, lon: -0.1278, continent: "Europe" },
  { id: 2, name: "New York", lat: 40.7128, lon: -74.0060, continent: "Americas" },
  { id: 3, name: "Sydney", lat: -33.8688, lon: 151.2093, continent: "Oceania" },
  { id: 4, name: "Dubai", lat: 25.2048, lon: 55.2708, continent: "Asia" },
  { id: 5, name: "Paris", lat: 48.8566, lon: 2.3522, continent: "Europe" },
  { id: 6, name: "São Paulo", lat: -23.5505, lon: -46.6333, continent: "Americas" },
  { id: 7, name: "Singapore", lat: 1.3521, lon: 103.8198, continent: "Asia" },
  { id: 8, name: "Cairo", lat: 30.0444, lon: 31.2357, continent: "Africa" },
  { id: 9, name: "Moscow", lat: 55.7558, lon: 37.6173, continent: "Europe" },
  { id: 10, name: "Beijing", lat: 39.9042, lon: 116.4074, continent: "Asia" },
  { id: 11, name: "Los Angeles", lat: 34.0522, lon: -118.2437, continent: "Americas" },
  { id: 12, name: "Mumbai", lat: 19.0760, lon: 72.8777, continent: "Asia" },
  { id: 13, name: "Nairobi", lat: -1.2921, lon: 36.8219, continent: "Africa" },
  { id: 14, name: "Berlin", lat: 52.5200, lon: 13.4050, continent: "Europe" },
  { id: 15, name: "Buenos Aires", lat: -34.6037, lon: -58.3816, continent: "Americas" },
  { id: 16, name: "Bangkok", lat: 13.7563, lon: 100.5018, continent: "Asia" },
  { id: 17, name: "Lagos", lat: 6.5244, lon: 3.3792, continent: "Africa" },
  { id: 18, name: "Melbourne", lat: -37.8136, lon: 144.9631, continent: "Oceania" },
  { id: 19, name: "Mexico City", lat: 19.4326, lon: -99.1332, continent: "Americas" }
];

const routes = [
  { id: 0, from: 0, to: 2 },   // Tokyo - New York
  { id: 1, from: 1, to: 2 },   // London - New York
  { id: 2, from: 1, to: 4 },   // London - Dubai
  { id: 3, from: 0, to: 7 },   // Tokyo - Singapore
  { id: 4, from: 2, to: 6 },   // New York - São Paulo
  { id: 5, from: 5, to: 8 },   // Paris - Cairo
  { id: 6, from: 4, to: 12 },  // Dubai - Mumbai
  { id: 7, from: 1, to: 9 },   // London - Moscow
  { id: 8, from: 10, to: 0 },  // Beijing - Tokyo
  { id: 9, from: 11, to: 0 },  // Los Angeles - Tokyo
  { id: 10, from: 7, to: 3 },  // Singapore - Sydney
  { id: 11, from: 8, to: 13 }, // Cairo - Nairobi
  { id: 12, from: 5, to: 14 }, // Paris - Berlin
  { id: 13, from: 6, to: 15 }, // São Paulo - Buenos Aires
  { id: 14, from: 16, to: 7 }, // Bangkok - Singapore
  { id: 15, from: 17, to: 1 }, // Lagos - London
  { id: 16, from: 3, to: 18 }, // Sydney - Melbourne
  { id: 17, from: 2, to: 19 }, // New York - Mexico City
  { id: 18, from: 4, to: 7 },  // Dubai - Singapore
  { id: 19, from: 10, to: 12 },// Beijing - Mumbai
  { id: 20, from: 14, to: 9 }, // Berlin - Moscow
  { id: 21, from: 11, to: 19 },// Los Angeles - Mexico City
  { id: 22, from: 13, to: 4 }, // Nairobi - Dubai
  { id: 23, from: 16, to: 0 }, // Bangkok - Tokyo
  { id: 24, from: 1, to: 5 },  // London - Paris
  { id: 25, from: 2, to: 11 }, // New York - Los Angeles
  { id: 26, from: 12, to: 16 },// Mumbai - Bangkok
  { id: 27, from: 17, to: 8 }, // Lagos - Cairo
  { id: 28, from: 15, to: 6 }, // Buenos Aires - São Paulo (duplicate direction check - it's fine)
  { id: 29, from: 18, to: 7 }  // Melbourne - Singapore
];

const continentColors = {
  "Asia": "#ff6b6b",
  "Europe": "#4ecdc4",
  "Americas": "#45b7d1",
  "Africa": "#f9ca24",
  "Oceania": "#a29bfe"
};

// ============ STATE ============
window.__3D_STATE__ = {
  cityCount: 20,
  routeCount: 30,
  selectedRoute: null,
  activeFlights: 0,
  filterContinent: "all"
};

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 4.5);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 2.2;
controls.maxDistance = 10;
controls.enablePan = false;

// ============ LIGHTING ============
const ambientLight = new THREE.AmbientLight(0x334466, 1.5);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffeedd, 2.0);
sunLight.position.set(5, 3, 5);
scene.add(sunLight);

const fillLight = new THREE.DirectionalLight(0x4488cc, 0.5);
fillLight.position.set(-3, -1, -3);
scene.add(fillLight);

// ============ STARFIELD ============
const starGeometry = new THREE.BufferGeometry();
const starCount = 3000;
const starPositions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i++) {
  starPositions[i] = (Math.random() - 0.5) * 200;
}
starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, sizeAttenuation: true });
scene.add(new THREE.Points(starGeometry, starMaterial));

// ============ EARTH ============
const EARTH_RADIUS = 1.5;

// Create earth with procedural texture
function createEarthTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 2048;
  canvas.height = 1024;
  const ctx = canvas.getContext('2d');

  // Ocean gradient
  const grad = ctx.createLinearGradient(0, 0, 0, 1024);
  grad.addColorStop(0, '#0a1628');
  grad.addColorStop(0.3, '#0d1f3c');
  grad.addColorStop(0.5, '#0f2444');
  grad.addColorStop(0.7, '#0d1f3c');
  grad.addColorStop(1, '#0a1628');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 2048, 1024);

  // Simple continent shapes (approximate)
  ctx.fillStyle = '#1a3a2a';
  ctx.strokeStyle = '#2a5a3a';
  ctx.lineWidth = 2;

  // Draw simplified continents
  const drawContinent = (points) => {
    ctx.beginPath();
    ctx.moveTo(points[0][0], points[0][1]);
    for (let i = 1; i < points.length; i++) {
      ctx.lineTo(points[i][0], points[i][1]);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  };

  // North America
  drawContinent([[300,200],[350,180],[450,170],[520,200],[530,250],[500,320],[480,380],[420,420],[350,400],[280,350],[260,280],[280,230]]);
  // South America
  drawContinent([[420,440],[460,450],[490,500],[500,560],[490,620],[470,680],[440,720],[400,700],[380,640],[370,560],[380,500],[400,460]]);
  // Europe
  drawContinent([[980,180],[1020,170],[1080,180],[1100,200],[1090,240],[1060,270],[1020,280],[990,260],[970,230],[975,200]]);
  // Africa
  drawContinent([[980,300],[1020,290],[1080,300],[1110,350],[1120,420],[1100,500],[1060,560],[1020,580],[980,560],[960,500],[950,420],[960,350]]);
  // Asia
  drawContinent([[1100,150],[1200,130],[1350,140],[1450,160],[1500,200],[1520,260],[1480,300],[1420,320],[1350,340],[1280,320],[1200,280],[1150,250],[1110,220],[1100,180]]);
  // India
  drawContinent([[1220,340],[1260,340],[1280,380],[1270,430],[1240,450],[1210,430],[1200,380]]);
  // Southeast Asia
  drawContinent([[1380,340],[1420,330],[1460,350],[1470,390],[1440,410],[1400,400],[1380,370]]);
  // Australia
  drawContinent([[1480,500],[1540,480],[1600,490],[1630,520],[1620,570],[1580,590],[1520,580],[1490,550],[1480,520]]);

  // Add grid lines (subtle)
  ctx.strokeStyle = 'rgba(50, 100, 150, 0.15)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < 2048; i += 128) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 1024); ctx.stroke();
  }
  for (let i = 0; i < 1024; i += 64) {
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(2048, i); ctx.stroke();
  }

  // Add some city glow dots
  cities.forEach(c => {
    const x = ((c.lon + 180) / 360) * 2048;
    const y = ((90 - c.lat) / 180) * 1024;
    const grd = ctx.createRadialGradient(x, y, 0, x, y, 15);
    grd.addColorStop(0, 'rgba(255, 200, 100, 0.6)');
    grd.addColorStop(1, 'rgba(255, 200, 100, 0)');
    ctx.fillStyle = grd;
    ctx.fillRect(x - 15, y - 15, 30, 30);
  });

  return new THREE.CanvasTexture(canvas);
}

const earthTexture = createEarthTexture();
const earthGeometry = new THREE.SphereGeometry(EARTH_RADIUS, 64, 64);
const earthMaterial = new THREE.MeshPhongMaterial({
  map: earthTexture,
  specular: new THREE.Color(0x222244),
  shininess: 15,
  bumpScale: 0.02
});
const earth = new THREE.Mesh(earthGeometry, earthMaterial);
scene.add(earth);

// Atmosphere glow
const atmosphereGeometry = new THREE.SphereGeometry(EARTH_RADIUS * 1.02, 64, 64);
const atmosphereMaterial = new THREE.ShaderMaterial({
  vertexShader: `
    varying vec3 vNormal;
    varying vec3 vPosition;
    void main() {
      vNormal = normalize(normalMatrix * normal);
      vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec3 vNormal;
    varying vec3 vPosition;
    void main() {
      vec3 viewDir = normalize(-vPosition);
      float rim = 1.0 - max(dot(viewDir, vNormal), 0.0);
      rim = pow(rim, 3.0);
      gl_FragColor = vec4(0.3, 0.6, 1.0, rim * 0.6);
    }
  `,
  transparent: true,
  side: THREE.FrontSide,
  depthWrite: false
});
const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
scene.add(atmosphere);

// ============ HELPERS ============
function latLonToVec3(lat, lon, radius) {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -radius * Math.sin(phi) * Math.cos(theta),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.sin(theta)
  );
}

function getGreatCircleMidpoint(p1, p2, altitude) {
  const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
  const dist = p1.distanceTo(p2);
  const liftFactor = 0.15 + dist * 0.12;
  mid.normalize().multiplyScalar(EARTH_RADIUS + liftFactor + altitude);
  return mid;
}

// ============ CITY MESHES ============
const cityGroup = new THREE.Group();
scene.add(cityGroup);

const cityMeshes = [];
const cityLabels = [];

cities.forEach((city, i) => {
  const pos = latLonToVec3(city.lat, city.lon, EARTH_RADIUS);

  // City dot
  const geo = new THREE.SphereGeometry(0.018, 12, 12);
  const mat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(continentColors[city.continent])
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  mesh.userData = { type: 'city', cityIndex: i };
  cityGroup.add(mesh);
  cityMeshes.push(mesh);

  // Glow ring
  const ringGeo = new THREE.RingGeometry(0.022, 0.035, 16);
  const ringMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(continentColors[city.continent]),
    transparent: true,
    opacity: 0.5,
    side: THREE.DoubleSide
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.copy(pos);
  ring.lookAt(new THREE.Vector3(0, 0, 0));
  cityGroup.add(ring);

  // Pulse ring
  const pulseGeo = new THREE.RingGeometry(0.02, 0.025, 16);
  const pulseMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(continentColors[city.continent]),
    transparent: true,
    opacity: 0.8,
    side: THREE.DoubleSide
  });
  const pulse = new THREE.Mesh(pulseGeo, pulseMat);
  pulse.position.copy(pos);
  pulse.lookAt(new THREE.Vector3(0, 0, 0));
  pulse.userData.pulsePhase = Math.random() * Math.PI * 2;
  cityGroup.add(pulse);
  city.pulseMesh = pulse;
});

// ============ ROUTE MESHES ============
const routeGroup = new THREE.Group();
scene.add(routeGroup);

const routeMeshes = [];
const routeCurves = [];

routes.forEach((route, i) => {
  const cityA = cities[route.from];
  const cityB = cities[route.to];
  const p1 = latLonToVec3(cityA.lat, cityA.lon, EARTH_RADIUS * 1.002);
  const p2 = latLonToVec3(cityB.lat, cityB.lon, EARTH_RADIUS * 1.002);
  const mid = getGreatCircleMidpoint(p1, p2, 0);

  const curve = new THREE.QuadraticBezierCurve3(p1, mid, p2);
  routeCurves.push(curve);

  const points = curve.getPoints(64);
  const geometry = new THREE.BufferGeometry().setFromPoints(points);

  // Determine route color based on continents
  const colorA = new THREE.Color(continentColors[cityA.continent]);
  const colorB = new THREE.Color(continentColors[cityB.continent]);
  const routeColor = new THREE.Color().lerpColors(colorA, colorB, 0.5);

  const material = new THREE.LineBasicMaterial({
    color: routeColor,
    transparent: true,
    opacity: 0.4,
    linewidth: 1
  });

  const line = new THREE.Line(geometry, material);
  line.userData = { type: 'route', routeIndex: i };
  routeGroup.add(line);
  routeMeshes.push(line);

  // Invisible tube for raycasting
  const tubeGeo = new THREE.TubeGeometry(curve, 32, 0.008, 6, false);
  const tubeMat = new THREE.MeshBasicMaterial({
    transparent: true,
    opacity: 0,
    depthWrite: false
  });
  const tube = new THREE.Mesh(tubeGeo, tubeMat);
  tube.userData = { type: 'route', routeIndex: i };
  routeGroup.add(tube);
  route.hitMesh = tube;
});

// ============ FLIGHT ANIMATIONS ============
const flightGroup = new THREE.Group();
scene.add(flightGroup);

const flights = [];

routes.forEach((route, i) => {
  const curve = routeCurves[i];

  // Flight dot (glowing sphere)
  const flightGeo = new THREE.SphereGeometry(0.012, 8, 8);
  const cityA = cities[route.from];
  const cityB = cities[route.to];
  const colorA = new THREE.Color(continentColors[cityA.continent]);
  const colorB = new THREE.Color(continentColors[cityB.continent]);
  const flightColor = new THREE.Color().lerpColors(colorA, colorB, 0.5);

  const flightMat = new THREE.MeshBasicMaterial({
    color: flightColor,
    transparent: true,
    opacity: 1.0
  });
  const flightMesh = new THREE.Mesh(flightGeo, flightMat);

  // Glow
  const glowGeo = new THREE.SphereGeometry(0.025, 8, 8);
  const glowMat = new THREE.MeshBasicMaterial({
    color: flightColor,
    transparent: true,
    opacity: 0.3
  });
  const glowMesh = new THREE.Mesh(glowGeo, glowMat);
  flightMesh.add(glowMesh);

  // Trail
  const trailPositions = [];
  const trailLength = 12;
  for (let t = 0; t < trailLength; t++) {
    trailPositions.push(0, 0, 0);
  }
  const trailGeo = new THREE.BufferGeometry();
  trailGeo.setAttribute('position', new THREE.Float32BufferAttribute(trailPositions, 3));
  const trailMat = new THREE.LineBasicMaterial({
    color: flightColor,
    transparent: true,
    opacity: 0.6
  });
  const trail = new THREE.Line(trailGeo, trailMat);

  flightGroup.add(flightMesh);
  flightGroup.add(trail);

  flights.push({
    mesh: flightMesh,
    trail: trail,
    trailGeo: trailGeo,
    curve: curve,
    t: Math.random(),
    speed: 0.0008 + Math.random() * 0.0006,
    routeIndex: i,
    trailPositions: new Array(trailLength).fill(null).map(() => new THREE.Vector3()),
    trailIdx: 0
  });
});

// ============ LEGEND ============
const legendDiv = document.getElementById('legend');
Object.entries(continentColors).forEach(([continent, color]) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${color}"></div><span>${continent}</span>`;
  item.addEventListener('click', () => {
    document.getElementById('continentFilter').value = continent;
    applyFilter(continent);
  });
  legendDiv.appendChild(item);
});

// ============ FILTERING ============
function applyFilter(continent) {
  window.__3D_STATE__.filterContinent = continent;

  cities.forEach((city, i) => {
    const visible = continent === 'all' || city.continent === continent;
    cityMeshes[i].visible = visible;
    if (city.pulseMesh) city.pulseMesh.visible = visible;
    // Also hide the ring (index offset)
    cityGroup.children.forEach(child => {
      if (child.userData.cityIndex === i) child.visible = visible;
    });
  });

  // For city group children that are rings/pulses, match by position
  cityGroup.children.forEach(child => {
    if (child.userData.cityIndex !== undefined) {
      const city = cities[child.userData.cityIndex];
      child.visible = continent === 'all' || city.continent === continent;
    }
  });

  // Show city meshes and their associated rings
  cityMeshes.forEach((mesh, i) => {
    const city = cities[i];
    const visible = continent === 'all' || city.continent === continent;
    mesh.visible = visible;
  });

  // Filter routes: show if either city matches the continent (or all)
  routes.forEach((route, i) => {
    const cityA = cities[route.from];
    const cityB = cities[route.to];
    const visible = continent === 'all' ||
      cityA.continent === continent || cityB.continent === continent;
    routeMeshes[i].visible = visible;
    if (route.hitMesh) route.hitMesh.visible = visible;
    flights[i].mesh.visible = visible;
    flights[i].trail.visible = visible;
  });

  // Make all city group children visible/hidden based on their city
  cityGroup.children.forEach(child => {
    const pos = child.position;
    // Find matching city
    for (let i = 0; i < cities.length; i++) {
      const cpos = latLonToVec3(cities[i].lat, cities[i].lon, EARTH_RADIUS);
      if (pos.distanceTo(cpos) < 0.05) {
        const visible = continent === 'all' || cities[i].continent === continent;
        child.visible = visible;
        break;
      }
    }
  });

  updateActiveFlightCount();
}

function updateActiveFlightCount() {
  let count = 0;
  flights.forEach(f => {
    if (f.mesh.visible) count++;
  });
  window.__3D_STATE__.activeFlights = count;
  document.getElementById('flightCountDisplay').textContent = count;
}

document.getElementById('continentFilter').addEventListener('change', (e) => {
  applyFilter(e.target.value);
});

// ============ ROUTE SELECTION ============
let selectedRouteIndex = null;

function selectRoute(index) {
  // Deselect previous
  if (selectedRouteIndex !== null) {
    routeMeshes[selectedRouteIndex].material.opacity = 0.4;
    routeMeshes[selectedRouteIndex].material.linewidth = 1;
  }

  if (index === null || index === selectedRouteIndex) {
    selectedRouteIndex = null;
    window.__3D_STATE__.selectedRoute = null;
    document.getElementById('routeDetail').classList.add('hidden');
    return;
  }

  selectedRouteIndex = index;
  window.__3D_STATE__.selectedRoute = index;

  // Highlight
  routeMeshes[index].material.opacity = 1.0;

  // Show detail
  const route = routes[index];
  const cityA = cities[route.from];
  const cityB = cities[route.to];
  const curve = routeCurves[index];
  const distance = Math.round(curve.getLength() * 4250); // approximate km

  const detailContent = document.getElementById('detailContent');
  detailContent.innerHTML = `
    <div>Route ID: <strong>#${route.id}</strong></div>
    <div>From: <strong style="color:${continentColors[cityA.continent]}">${cityA.name}</strong> (${cityA.continent})</div>
    <div>To: <strong style="color:${continentColors[cityB.continent]}">${cityB.name}</strong> (${cityB.continent})</div>
    <div>Est. Distance: <strong>${distance.toLocaleString()} km</strong></div>
    <div>Coordinates: ${cityA.lat.toFixed(1)}°, ${cityA.lon.toFixed(1)}° → ${cityB.lat.toFixed(1)}°, ${cityB.lon.toFixed(1)}°</div>
  `;
  document.getElementById('routeDetail').classList.remove('hidden');
}

document.getElementById('closeDetail').addEventListener('click', () => {
  selectRoute(null);
});

// ============ RAYCASTING ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');

function onMouseMove(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Check cities
  const cityIntersects = raycaster.intersectObjects(cityMeshes.filter(m => m.visible));
  if (cityIntersects.length > 0) {
    const cityIdx = cityIntersects[0].object.userData.cityIndex;
    if (cityIdx !== undefined) {
      const city = cities[cityIdx];
      tooltip.style.display = 'block';
      tooltip.style.left = event.clientX + 15 + 'px';
      tooltip.style.top = event.clientY - 10 + 'px';
      tooltip.innerHTML = `<strong>${city.name}</strong><br>${city.continent}<br>${city.lat.toFixed(2)}°, ${city.lon.toFixed(2)}°`;
      document.body.style.cursor = 'pointer';
      return;
    }
  }

  // Check route hit meshes
  const hitMeshes = routes.map(r => r.hitMesh).filter(m => m && m.visible);
  const routeIntersects = raycaster.intersectObjects(hitMeshes);
  if (routeIntersects.length > 0) {
    const routeIdx = routeIntersects[0].object.userData.routeIndex;
    if (routeIdx !== undefined) {
      const route = routes[routeIdx];
      tooltip.style.display = 'block';
      tooltip.style.left = event.clientX + 15 + 'px';
      tooltip.style.top = event.clientY - 10 + 'px';
      tooltip.innerHTML = `<strong>Route #${route.id}</strong><br>${cities[route.from].name} → ${cities[route.to].name}`;
      document.body.style.cursor = 'pointer';
      return;
    }
  }

  tooltip.style.display = 'none';
  document.body.style.cursor = 'default';
}

function onClick(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Check route hit meshes first
  const hitMeshes = routes.map(r => r.hitMesh).filter(m => m && m.visible);
  const routeIntersects = raycaster.intersectObjects(hitMeshes);
  if (routeIntersects.length > 0) {
    const routeIdx = routeIntersects[0].object.userData.routeIndex;
    if (routeIdx !== undefined) {
      selectRoute(routeIdx);
      return;
    }
  }

  // Check cities - show routes connected to this city
  const cityIntersects = raycaster.intersectObjects(cityMeshes.filter(m => m.visible));
  if (cityIntersects.length > 0) {
    const cityIdx = cityIntersects[0].object.userData.cityIndex;
    if (cityIdx !== undefined) {
      // Find first route connected to this city
      const connectedRoute = routes.find(r => r.from === cityIdx || r.to === cityIdx);
      if (connectedRoute) {
        selectRoute(connectedRoute.id);
        return;
      }
    }
  }
}

window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onClick);

// ============ ANIMATION ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const time = clock.getElapsedTime();
  const delta = clock.getDelta();

  // Slow earth rotation
  earth.rotation.y += 0.0003;
  atmosphere.rotation.y += 0.0003;

  // Pulse city rings
  cities.forEach(city => {
    if (city.pulseMesh && city.pulseMesh.visible) {
      const phase = city.pulseMesh.userData.pulsePhase;
      const scale = 1 + 0.5 * Math.sin(time * 2 + phase);
      city.pulseMesh.scale.setScalar(scale);
      city.pulseMesh.material.opacity = 0.6 * (1 - (scale - 1));
    }
  });

  // Animate flights
  flights.forEach(flight => {
    if (!flight.mesh.visible) return;

    flight.t += flight.speed;
    if (flight.t > 1) flight.t -= 1;

    const pos = flight.curve.getPointAt(flight.t);
    flight.mesh.position.copy(pos);

    // Update trail
    const trailAttr = flight.trailGeo.getAttribute('position');
    const trailCount = trailAttr.count;

    // Shift trail positions
    for (let i = trailCount - 1; i > 0; i--) {
      trailAttr.setXYZ(i,
        trailAttr.getX(i - 1),
        trailAttr.getY(i - 1),
        trailAttr.getZ(i - 1)
      );
    }
    trailAttr.setXYZ(0, pos.x, pos.y, pos.z);
    trailAttr.needsUpdate = true;
  });

  // Highlight selected route
  if (selectedRouteIndex !== null) {
    const pulse = 0.6 + 0.4 * Math.sin(time * 4);
    routeMeshes[selectedRouteIndex].material.opacity = pulse;
  }

  controls.update();
  renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ INIT ============
applyFilter('all');
animate();

</script>
