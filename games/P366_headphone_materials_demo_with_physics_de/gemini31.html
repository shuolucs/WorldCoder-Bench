<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headphone Materials Demo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            pointer-events: none;
        }
        #info-panel h1 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #4da6ff;
        }
        #info-panel p {
            margin: 5px 0;
            font-size: 12px;
            color: #ccc;
        }
        #material-selector {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
            border: 1px solid #333;
        }
        .mat-btn {
            background: #333;
            border: 2px solid transparent;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .mat-btn:hover {
            background: #444;
        }
        .mat-btn.active {
            border-color: #4da6ff;
            background: #222;
        }
        #material-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-right: 10px;
            color: #aaa;
        }
        #debug-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 20, 0, 0.8);
            color: #0f0;
            font-family: monospace;
            padding: 15px;
            border: 1px solid #0f0;
            border-radius: 5px;
            font-size: 12px;
            display: none;
            pointer-events: none;
        }
        .debug-row {
            margin: 3px 0;
        }
        .key-hint {
            display: inline-block;
            background: #555;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            margin-right: 5px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info-panel">
        <h1>Headphone Materials Demo</h1>
        <p><span class="key-hint">Space</span> Drop Headphone</p>
        <p><span class="key-hint">R</span> Reset Position</p>
        <p><span class="key-hint">D</span> Toggle Debug</p>
        <p><span class="key-hint">O</span> Toggle OrbitControls</p>
        <p>Click Mascot to Spin</p>
    </div>

    <div id="material-selector">
        <span id="material-label">MATTE</span>
        <button class="mat-btn active" id="btn-matte">Matte</button>
        <button class="mat-btn" id="btn-glossy">Glossy</button>
        <button class="mat-btn" id="btn-metallic">Metallic</button>
        <button class="mat-btn" id="btn-wood">Wood</button>
    </div>

    <div id="debug-overlay">
        <div class="debug-row">PHYSICS DEBUG</div>
        <div class="debug-row">-----------------</div>
        <div class="debug-row" id="dbg-state">State: idle</div>
        <div class="debug-row" id="dbg-pos">PosY: 0.000</div>
        <div class="debug-row" id="dbg-vel">VelY: 0.000</div>
        <div class="debug-row" id="dbg-acc">AccY: 0.000</div>
        <div class="debug-row" id="dbg-mat">Mat: matte</div>
        <div class="debug-row" id="dbg-frame">Frame: 0</div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            materialPreset: 'matte',
            headphoneY: 1.5,
            velocityY: 0,
            physicsState: 'idle', // 'idle'|'falling'|'bouncing'|'resting'
            debugOverlayVisible: false,
            orbitEnabled: true,
            horseLoaded: false,
            horseClickCount: 0,
            horseSpinning: false,
            frameCount: 0,
            headphoneOnPlatform: false,
            restitution: 0.3,
            gravity: 9.81
        };

        const state = window.__3D_STATE__;

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.Fog(0x1a1a1a, 5, 15);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 1, 0);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        // --- ENVIRONMENT ---
        // Ground
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Platform
        const platformGeo = new THREE.CylinderGeometry(2, 2, 0.1, 64);
        const platformMat = new THREE.MeshStandardMaterial({ 
            color: 0x333333, 
            roughness: 0.4, 
            metalness: 0.6 
        });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = 0.05; // Half height
        platform.receiveShadow = true;
        platform.castShadow = true;
        scene.add(platform);

        // --- MATERIALS SYSTEM ---
        const materials = {
            matte: new THREE.MeshStandardMaterial({ roughness: 0.9, metalness: 0.1, color: 0x2a2a2a }),
            glossy: new THREE.MeshStandardMaterial({ roughness: 0.1, metalness: 0.3, color: 0x1a1a1a }),
            metallic: new THREE.MeshStandardMaterial({ roughness: 0.3, metalness: 0.95, color: 0xc0c0c0 }),
            wood: new THREE.MeshStandardMaterial({ roughness: 0.7, metalness: 0.0, color: 0x8B4513 })
        };

        const cushionMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9, metalness: 0 });

        // --- HEADPHONE MODEL ---
        const headphoneGroup = new THREE.Group();
        const headphoneParts = []; // To update materials later

        // Ear Cups
        const cupGeo = new THREE.SphereGeometry(0.4, 32, 32);
        const leftCup = new THREE.Mesh(cupGeo, materials[state.materialPreset]);
        leftCup.scale.set(1, 1, 0.6);
        leftCup.position.set(-0.9, 0, 0);
        leftCup.castShadow = true;
        
        const rightCup = new THREE.Mesh(cupGeo, materials[state.materialPreset]);
        rightCup.scale.set(1, 1, 0.6);
        rightCup.position.set(0.9, 0, 0);
        rightCup.castShadow = true;

        // Cushions
        const cushionGeo = new THREE.TorusGeometry(0.35, 0.15, 16, 32);
        const leftCushion = new THREE.Mesh(cushionGeo, cushionMat);
        leftCushion.rotation.y = Math.PI / 2;
        leftCushion.position.set(-0.75, 0, 0);
        leftCushion.castShadow = true;

        const rightCushion = new THREE.Mesh(cushionGeo, cushionMat);
        rightCushion.rotation.y = Math.PI / 2;
        rightCushion.position.set(0.75, 0, 0);
        rightCushion.castShadow = true;

        // Headband
        const bandGeo = new THREE.TorusGeometry(0.9, 0.12, 16, 64, Math.PI);
        const headband = new THREE.Mesh(bandGeo, materials[state.materialPreset]);
        headband.castShadow = true;
        // Torus arc starts from X axis, goes counter-clockwise. 
        // We want it to be an arch over the Y axis.
        headband.rotation.z = 0; // Default is flat on XY plane, arc from x=1 to x=-1 over y>0. Perfect.

        headphoneGroup.add(leftCup, rightCup, leftCushion, rightCushion, headband);
        headphoneGroup.position.set(0, state.headphoneY, 0);
        scene.add(headphoneGroup);

        headphoneParts.push(leftCup, rightCup, headband);

        function updateHeadphoneMaterial(presetName) {
            state.materialPreset = presetName;
            const mat = materials[presetName];
            headphoneParts.forEach(part => part.material = mat);
            
            // Update UI
            document.getElementById('material-label').innerText = presetName.toUpperCase();
            document.querySelectorAll('.mat-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${presetName}`).classList.add('active');
        }

        // --- MASCOT (HORSE) ---
        const pedestalGeo = new THREE.BoxGeometry(0.5, 0.3, 0.5);
        const pedestalMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.7 });
        const pedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
        pedestal.position.set(-2, 0.15, -1);
        pedestal.castShadow = true;
        pedestal.receiveShadow = true;
        scene.add(pedestal);

        let horseModel = null;
        let horseBaseRotation = 0;
        let spinProgress = 0;

        const loader = new GLTFLoader();
        // Using a reliable CDN for the three.js example model
        loader.load('https://threejs.org/examples/models/gltf/Horse.glb', (gltf) => {
            horseModel = gltf.scene;
            
            // Scale to roughly 0.5 units tall
            const box = new THREE.Box3().setFromObject(horseModel);
            const size = box.getSize(new THREE.Vector3());
            const scaleFactor = 0.5 / size.y;
            horseModel.scale.setScalar(scaleFactor);
            
            // Position on pedestal
            horseModel.position.set(-2, 0.3, -1);
            
            // Adjust materials for shadows
            horseModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    if (child.material) {
                        child.material.roughness = 0.5;
                        child.material.metalness = 0.1;
                    }
                }
            });

            scene.add(horseModel);
            state.horseLoaded = true;
            horseBaseRotation = horseModel.rotation.y;
        });

        // --- INTERACTIONS ---
        
        // Material Buttons
        document.getElementById('btn-matte').addEventListener('click', () => updateHeadphoneMaterial('matte'));
        document.getElementById('btn-glossy').addEventListener('click', () => updateHeadphoneMaterial('glossy'));
        document.getElementById('btn-metallic').addEventListener('click', () => updateHeadphoneMaterial('metallic'));
        document.getElementById('btn-wood').addEventListener('click', () => updateHeadphoneMaterial('wood'));

        // Keyboard
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'Space':
                    state.headphoneY = 3.0;
                    state.velocityY = 0;
                    state.physicsState = 'falling';
                    state.headphoneOnPlatform = false;
                    break;
                case 'KeyR':
                    state.headphoneY = 1.5;
                    state.velocityY = 0;
                    state.physicsState = 'idle';
                    state.headphoneOnPlatform = false;
                    headphoneGroup.position.y = state.headphoneY;
                    break;
                case 'KeyD':
                    state.debugOverlayVisible = !state.debugOverlayVisible;
                    document.getElementById('debug-overlay').style.display = state.debugOverlayVisible ? 'block' : 'none';
                    break;
                case 'KeyO':
                    state.orbitEnabled = !state.orbitEnabled;
                    controls.enabled = state.orbitEnabled;
                    break;
            }
        });

        // Raycasting for Horse
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (e) => {
            // Don't trigger if clicking UI
            if (e.target.tagName === 'BUTTON' || e.target.closest('#info-panel')) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            if (horseModel) {
                const intersects = raycaster.intersectObject(horseModel, true);
                if (intersects.length > 0 && !state.horseSpinning) {
                    state.horseSpinning = true;
                    state.horseClickCount++;
                    spinProgress = 0;
                    horseBaseRotation = horseModel.rotation.y;
                }
            }
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();
        const floorY = 0.55; // Platform height (0.1) + half cup size roughly

        // DOM Elements for debug
        const dbgState = document.getElementById('dbg-state');
        const dbgPos = document.getElementById('dbg-pos');
        const dbgVel = document.getElementById('dbg-vel');
        const dbgAcc = document.getElementById('dbg-acc');
        const dbgMat = document.getElementById('dbg-mat');
        const dbgFrame = document.getElementById('dbg-frame');

        function animate() {
            requestAnimationFrame(animate);

            let dt = clock.getDelta();
            if (dt > 0.05) dt = 0.05; // Clamp delta time

            state.frameCount++;

            // Physics Simulation
            let currentAcc = 0;
            if (state.physicsState === 'falling' || state.physicsState === 'bouncing') {
                currentAcc = -state.gravity;
                state.velocityY += currentAcc * dt;
                state.headphoneY += state.velocityY * dt;

                if (state.headphoneY <= floorY) {
                    state.headphoneY = floorY;
                    
                    if (Math.abs(state.velocityY) > 0.5) {
                        state.velocityY = -state.velocityY * state.restitution;
                        state.physicsState = 'bouncing';
                    } else {
                        state.velocityY = 0;
                        state.physicsState = 'resting';
                        state.headphoneOnPlatform = true;
                    }
                }
                headphoneGroup.position.y = state.headphoneY;
            }

            // Horse Spin Animation
            if (state.horseSpinning && horseModel) {
                spinProgress += dt; // 1 second duration
                if (spinProgress >= 1.0) {
                    spinProgress = 1.0;
                    state.horseSpinning = false;
                }
                // Ease in out cubic
                const ease = spinProgress < 0.5 ? 4 * spinProgress * spinProgress * spinProgress : 1 - Math.pow(-2 * spinProgress + 2, 3) / 2;
                horseModel.rotation.y = horseBaseRotation + (ease * Math.PI * 2);
            }

            // Update Debug Overlay
            if (state.debugOverlayVisible) {
                dbgState.innerText = `State: ${state.physicsState}`;
                dbgPos.innerText = `PosY: ${state.headphoneY.toFixed(3)}`;
                dbgVel.innerText = `VelY: ${state.velocityY.toFixed(3)}`;
                dbgAcc.innerText = `AccY: ${currentAcc.toFixed(3)}`;
                dbgMat.innerText = `Mat: ${state.materialPreset}`;
                dbgFrame.innerText = `Frame: ${state.frameCount}`;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
