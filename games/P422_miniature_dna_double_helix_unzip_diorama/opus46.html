<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNA Double Helix Diorama</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #hud-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(20, 20, 40, 0.85);
    border: 1px solid rgba(100, 100, 200, 0.3);
    border-radius: 12px;
    padding: 20px;
    color: #ccc;
    font-size: 14px;
    z-index: 10;
    min-width: 220px;
    backdrop-filter: blur(10px);
  }

  #hud-panel h3 {
    color: #88aaff;
    margin-bottom: 12px;
    font-size: 16px;
    border-bottom: 1px solid rgba(100, 100, 200, 0.3);
    padding-bottom: 8px;
  }

  #hud-panel .status-text {
    margin-bottom: 15px;
    font-size: 14px;
    line-height: 1.6;
  }

  #hud-panel button {
    display: block;
    width: 100%;
    padding: 10px 16px;
    margin-bottom: 8px;
    border: 1px solid rgba(100, 100, 200, 0.4);
    border-radius: 8px;
    background: rgba(40, 40, 80, 0.8);
    color: #aaccff;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-weight: 500;
  }

  #hud-panel button:hover {
    background: rgba(60, 60, 120, 0.9);
    border-color: rgba(130, 130, 255, 0.6);
    color: #fff;
  }

  #hud-panel button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  #hud-panel .hint {
    margin-top: 12px;
    font-size: 11px;
    color: #777;
    border-top: 1px solid rgba(100, 100, 200, 0.2);
    padding-top: 10px;
    line-height: 1.5;
  }

  #labels-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 5;
  }

  .bp-label {
    position: absolute;
    color: #fff;
    font-size: 12px;
    font-weight: bold;
    background: rgba(0,0,0,0.6);
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    transform: translate(-50%, -50%);
  }
</style>
</head>
<body>

<div id="hud-panel">
  <h3>🧬 DNA Diorama</h3>
  <div class="status-text">
    <div id="status-unzip">Base Pairs Unzipped: 0 / 10</div>
  </div>
  <button id="btn-unzip">Unzip</button>
  <button id="btn-rezip">Rezip</button>
  <button id="btn-toggle-rotation">Pause Rotation</button>
  <div class="hint">
    Press <b>H</b> — Toggle highlight mode<br>
    Press <b>L</b> — Toggle base pair labels
  </div>
</div>

<div id="labels-overlay"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  // State
  const state = {
    basePairCount: 10,
    unzipProgress: 0,
    isUnzipping: false,
    isRezipping: false,
    isFullyUnzipped: false,
    rotationPaused: false,
    rotationAngle: 0,
    highlightMode: false,
    labelsVisible: false,
    strandAColor: '#4488ff',
    strandBColor: '#ff4444',
    sceneReady: false
  };
  window.__3D_STATE__ = state;

  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 5, 18);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(5, 10, 7);
  scene.add(dirLight);

  // Platform
  const platformGeo = new THREE.CylinderGeometry(6, 6, 0.3, 64);
  const platformMat = new THREE.MeshStandardMaterial({ color: 0x2d2d44 });
  const platform = new THREE.Mesh(platformGeo, platformMat);
  platform.position.y = -4;
  scene.add(platform);

  // DNA Group
  const dnaGroup = new THREE.Object3D();
  scene.add(dnaGroup);

  const NUM_PAIRS = 10;
  const HELIX_RADIUS = 2;
  const HELIX_HEIGHT = 12;
  const TOTAL_TWIST = Math.PI * 2; // 1 full twist

  // Data structures for base pairs
  const basePairs = []; // { sphereA, sphereB, rung, index, type, origAPos, origBPos, unzipped: 0..1 }

  // Materials
  const strandAMat = new THREE.MeshStandardMaterial({ color: 0x4488ff });
  const strandBMat = new THREE.MeshStandardMaterial({ color: 0xff4444 });

  const sphereGeo = new THREE.SphereGeometry(0.25, 16, 16);

  for (let i = 0; i < NUM_PAIRS; i++) {
    const t = i / (NUM_PAIRS - 1);
    const y = -HELIX_HEIGHT / 2 + t * HELIX_HEIGHT;
    const angle = t * TOTAL_TWIST;

    // Strand A position
    const ax = HELIX_RADIUS * Math.cos(angle);
    const az = HELIX_RADIUS * Math.sin(angle);

    // Strand B position (opposite side)
    const bx = HELIX_RADIUS * Math.cos(angle + Math.PI);
    const bz = HELIX_RADIUS * Math.sin(angle + Math.PI);

    // Sphere A
    const sphereA = new THREE.Mesh(sphereGeo, strandAMat.clone());
    sphereA.position.set(ax, y, az);
    dnaGroup.add(sphereA);

    // Sphere B
    const sphereB = new THREE.Mesh(sphereGeo, strandBMat.clone());
    sphereB.position.set(bx, y, bz);
    dnaGroup.add(sphereB);

    // Rung (cylinder connecting A and B)
    const type = (i % 2 === 0) ? 'A-T' : 'G-C';
    const rungColor = (type === 'A-T') ? 0x44cc44 : 0xcccc44;

    const midX = (ax + bx) / 2;
    const midZ = (az + bz) / 2;
    const dx = bx - ax;
    const dz = bz - az;
    const dist = Math.sqrt(dx * dx + dz * dz);

    const rungGeo = new THREE.CylinderGeometry(0.08, 0.08, dist, 8);
    const rungMat = new THREE.MeshStandardMaterial({
      color: rungColor,
      transparent: true,
      opacity: 1.0,
      emissive: rungColor,
      emissiveIntensity: 0.0
    });
    const rung = new THREE.Mesh(rungGeo, rungMat);

    // Position at midpoint
    rung.position.set(midX, y, midZ);

    // Rotate to align between A and B
    const direction = new THREE.Vector3(dx, 0, dz).normalize();
    const up = new THREE.Vector3(0, 1, 0);
    const quat = new THREE.Quaternion().setFromUnitVectors(up, direction);
    rung.quaternion.copy(quat);

    dnaGroup.add(rung);

    basePairs.push({
      sphereA,
      sphereB,
      rung,
      index: i,
      type,
      origAPos: new THREE.Vector3(ax, y, az),
      origBPos: new THREE.Vector3(bx, y, bz),
      unzipAmount: 0 // 0 = zipped, 1 = fully unzipped
    });
  }

  // Add connecting backbone strands (thin tubes between consecutive spheres on each strand)
  const backboneMatA = new THREE.MeshStandardMaterial({ color: 0x4488ff });
  const backboneMatB = new THREE.MeshStandardMaterial({ color: 0xff4444 });
  const backboneSegments = [];

  for (let i = 0; i < NUM_PAIRS - 1; i++) {
    const bpCurr = basePairs[i];
    const bpNext = basePairs[i + 1];

    // Strand A backbone segment
    const segA = createBackboneSegment(bpCurr.origAPos, bpNext.origAPos, backboneMatA.clone());
    dnaGroup.add(segA.mesh);

    // Strand B backbone segment
    const segB = createBackboneSegment(bpCurr.origBPos, bpNext.origBPos, backboneMatB.clone());
    dnaGroup.add(segB.mesh);

    backboneSegments.push({
      segA,
      segB,
      fromIndex: i,
      toIndex: i + 1
    });
  }

  function createBackboneSegment(posA, posB, material) {
    const dir = new THREE.Vector3().subVectors(posB, posA);
    const length = dir.length();
    const geo = new THREE.CylinderGeometry(0.06, 0.06, length, 8);
    const mesh = new THREE.Mesh(geo, material);

    const mid = new THREE.Vector3().addVectors(posA, posB).multiplyScalar(0.5);
    mesh.position.copy(mid);

    const up = new THREE.Vector3(0, 1, 0);
    const quat = new THREE.Quaternion().setFromUnitVectors(up, dir.normalize());
    mesh.quaternion.copy(quat);

    return { mesh, origFrom: posA.clone(), origTo: posB.clone() };
  }

  function updateBackboneSegment(seg, fromPos, toPos) {
    const dir = new THREE.Vector3().subVectors(toPos, fromPos);
    const length = dir.length();

    const mid = new THREE.Vector3().addVectors(fromPos, toPos).multiplyScalar(0.5);
    seg.mesh.position.copy(mid);

    seg.mesh.geometry.dispose();
    seg.mesh.geometry = new THREE.CylinderGeometry(0.06, 0.06, length, 8);

    const up = new THREE.Vector3(0, 1, 0);
    const dirNorm = dir.normalize();
    if (dirNorm.length() > 0.001) {
      const quat = new THREE.Quaternion().setFromUnitVectors(up, dirNorm);
      seg.mesh.quaternion.copy(quat);
    }
  }

  // Animation state
  let unzipQueue = [];
  let rezipQueue = [];
  let currentAnimation = null;
  const ANIM_DURATION = 500;
  const STAGGER = 200;

  function startUnzip() {
    if (state.isUnzipping || state.isRezipping || state.isFullyUnzipped) return;
    state.isUnzipping = true;

    // Build queue from top (index 9) to bottom (index 0), only unzipped pairs
    unzipQueue = [];
    for (let i = NUM_PAIRS - 1; i >= 0; i--) {
      if (basePairs[i].unzipAmount < 1) {
        unzipQueue.push(i);
      }
    }

    if (unzipQueue.length === 0) {
      state.isUnzipping = false;
      return;
    }

    animateUnzipSequence(0);
  }

  function animateUnzipSequence(queueIndex) {
    if (queueIndex >= unzipQueue.length) {
      state.isUnzipping = false;
      state.unzipProgress = countUnzipped();
      state.isFullyUnzipped = state.unzipProgress === 10;
      return;
    }

    const bpIndex = unzipQueue[queueIndex];
    animateBasePair(bpIndex, 0, 1, ANIM_DURATION, () => {
      state.unzipProgress = countUnzipped();
      state.isFullyUnzipped = state.unzipProgress === 10;
      updateStatusText();
    });

    setTimeout(() => {
      animateUnzipSequence(queueIndex + 1);
    }, STAGGER);
  }

  function startRezip() {
    if (state.isUnzipping || state.isRezipping) return;
    if (state.unzipProgress === 0) return;
    state.isRezipping = true;

    // Build queue from bottom (index 0) to top (index 9), only unzipped pairs
    rezipQueue = [];
    for (let i = 0; i < NUM_PAIRS; i++) {
      if (basePairs[i].unzipAmount > 0) {
        rezipQueue.push(i);
      }
    }

    if (rezipQueue.length === 0) {
      state.isRezipping = false;
      return;
    }

    animateRezipSequence(0);
  }

  function animateRezipSequence(queueIndex) {
    if (queueIndex >= rezipQueue.length) {
      state.isRezipping = false;
      state.unzipProgress = countUnzipped();
      state.isFullyUnzipped = false;
      return;
    }

    const bpIndex = rezipQueue[queueIndex];
    animateBasePair(bpIndex, 1, 0, ANIM_DURATION, () => {
      state.unzipProgress = countUnzipped();
      state.isFullyUnzipped = state.unzipProgress === 10;
      updateStatusText();
    });

    setTimeout(() => {
      animateRezipSequence(queueIndex + 1);
    }, STAGGER);
  }

  // Active animations
  const activeAnimations = [];

  function animateBasePair(bpIndex, fromAmount, toAmount, duration, onComplete) {
    const bp = basePairs[bpIndex];
    const startTime = performance.now();

    activeAnimations.push({
      bp,
      bpIndex,
      fromAmount,
      toAmount,
      startTime,
      duration,
      onComplete,
      completed: false
    });
  }

  function updateAnimations(now) {
    for (let i = activeAnimations.length - 1; i >= 0; i--) {
      const anim = activeAnimations[i];
      if (anim.completed) continue;

      let t = (now - anim.startTime) / anim.duration;
      if (t >= 1) {
        t = 1;
        anim.completed = true;
      }

      // Ease in-out
      t = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

      anim.bp.unzipAmount = anim.fromAmount + (anim.toAmount - anim.fromAmount) * t;

      if (anim.completed) {
        if (anim.onComplete) anim.onComplete();
        activeAnimations.splice(i, 1);
      }
    }
  }

  function countUnzipped() {
    let count = 0;
    for (const bp of basePairs) {
      if (bp.unzipAmount >= 1) count++;
    }
    return count;
  }

  function updateBasePairVisuals() {
    for (const bp of basePairs) {
      const amt = bp.unzipAmount;

      // Move spheres apart horizontally (in local X relative to their original position direction)
      const dirA = new THREE.Vector3(bp.origAPos.x, 0, bp.origAPos.z).normalize();
      const dirB = new THREE.Vector3(bp.origBPos.x, 0, bp.origBPos.z).normalize();

      bp.sphereA.position.set(
        bp.origAPos.x + dirA.x * amt * 2,
        bp.origAPos.y,
        bp.origAPos.z + dirA.z * amt * 2
      );

      bp.sphereB.position.set(
        bp.origBPos.x + dirB.x * amt * 2,
        bp.origBPos.y,
        bp.origBPos.z + dirB.z * amt * 2
      );

      // Fade rung
      bp.rung.material.opacity = 1 - amt;
      bp.rung.visible = amt < 1;
    }

    // Update backbone segments
    for (const seg of backboneSegments) {
      const fromBP = basePairs[seg.fromIndex];
      const toBP = basePairs[seg.toIndex];

      updateBackboneSegment(seg.segA, fromBP.sphereA.position, toBP.sphereA.position);
      updateBackboneSegment(seg.segB, fromBP.sphereB.position, toBP.sphereB.position);
    }
  }

  // Highlight mode
  let highlightTime = 0;

  function updateHighlight(delta) {
    if (state.highlightMode) {
      highlightTime += delta;
      const pulse = (Math.sin(highlightTime * 4) + 1) / 2;
      for (const bp of basePairs) {
        bp.rung.material.emissiveIntensity = pulse * 0.8;
      }
    } else {
      for (const bp of basePairs) {
        bp.rung.material.emissiveIntensity = 0;
      }
    }
  }

  // Labels
  const labelsOverlay = document.getElementById('labels-overlay');

  function updateLabels() {
    labelsOverlay.innerHTML = '';
    if (!state.labelsVisible) return;

    for (const bp of basePairs) {
      if (bp.unzipAmount >= 1) continue;

      // Get world position of rung
      const worldPos = new THREE.Vector3();
      bp.rung.getWorldPosition(worldPos);

      // Project to screen
      const screenPos = worldPos.clone().project(camera);
      const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;

      // Only show if in front of camera
      if (screenPos.z > 0 && screenPos.z < 1) {
        const label = document.createElement('div');
        label.className = 'bp-label';
        label.textContent = bp.type;
        label.style.left = x + 'px';
        label.style.top = y + 'px';
        label.style.color = bp.type === 'A-T' ? '#44cc44' : '#cccc44';
        labelsOverlay.appendChild(label);
      }
    }
  }

  // Status text
  function updateStatusText() {
    document.getElementById('status-unzip').textContent = `Base Pairs Unzipped: ${state.unzipProgress} / 10`;
  }

  // Button handlers
  document.getElementById('btn-unzip').addEventListener('click', startUnzip);
  document.getElementById('btn-rezip').addEventListener('click', startRezip);

  const btnToggleRotation = document.getElementById('btn-toggle-rotation');
  btnToggleRotation.addEventListener('click', () => {
    state.rotationPaused = !state.rotationPaused;
    btnToggleRotation.textContent = state.rotationPaused ? 'Resume Rotation' : 'Pause Rotation';
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'h' || e.key === 'H') {
      state.highlightMode = !state.highlightMode;
    }
    if (e.key === 'l' || e.key === 'L') {
      state.labelsVisible = !state.labelsVisible;
      if (!state.labelsVisible) {
        labelsOverlay.innerHTML = '';
      }
    }
  });

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Animation loop
  let lastTime = performance.now();

  function animate(now) {
    requestAnimationFrame(animate);

    const delta = (now - lastTime) / 1000;
    lastTime = now;

    // Update animations
    updateAnimations(now);

    // Update visuals
    updateBasePairVisuals();

    // Rotation
    if (!state.rotationPaused) {
      state.rotationAngle += 0.3 * delta;
      dnaGroup.rotation.y = state.rotationAngle;
    }

    // Highlight
    updateHighlight(delta);

    // Labels
    updateLabels();

    // Update state
    state.unzipProgress = countUnzipped();
    state.isFullyUnzipped = state.unzipProgress === 10;
    updateStatusText();

    // Update button states
    document.getElementById('btn-unzip').disabled = state.isUnzipping || state.isRezipping || state.isFullyUnzipped;
    document.getElementById('btn-rezip').disabled = state.isUnzipping || state.isRezipping || state.unzipProgress === 0;

    renderer.render(scene, camera);

    if (!state.sceneReady) {
      state.sceneReady = true;
    }
  }

  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
