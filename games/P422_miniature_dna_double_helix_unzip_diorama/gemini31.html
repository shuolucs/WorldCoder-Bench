<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D DNA Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(26, 26, 46, 0.8);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #444466;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            pointer-events: auto;
            z-index: 10;
        }
        #hud-panel h2 {
            margin: 0 0 15px 0;
            font-size: 18px;
            font-weight: 600;
            color: #e0e0e0;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(68, 136, 255, 0.2);
            color: #fff;
            border: 1px solid #4488ff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .btn:hover {
            background: rgba(68, 136, 255, 0.4);
        }
        .btn:last-child {
            margin-bottom: 0;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #labels-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 5;
        }
        .dna-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            display: none;
            transition: opacity 0.2s;
        }
        .instructions {
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
            line-height: 1.5;
        }
        kbd {
            background: #333;
            padding: 2px 5px;
            border-radius: 3px;
            border: 1px solid #555;
        }
    </style>
    <!-- Import Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="hud-panel">
        <h2 id="unzip-text">Base Pairs Unzipped: 0 / 10</h2>
        <button id="btn-unzip" class="btn">Unzip</button>
        <button id="btn-rezip" class="btn">Rezip</button>
        <button id="btn-toggle-rotation" class="btn">Pause Rotation</button>
        <div class="instructions">
            <kbd>H</kbd> Toggle Highlight<br>
            <kbd>L</kbd> Toggle Labels
        </div>
    </div>
    
    <div id="labels-overlay"></div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';

        // --- State Management ---
        window.__3D_STATE__ = {
            basePairCount: 10,
            unzipProgress: 0,
            isUnzipping: false,
            isRezipping: false,
            isFullyUnzipped: false,
            rotationPaused: false,
            rotationAngle: 0,
            highlightMode: false,
            labelsVisible: false,
            strandAColor: '#4488ff',
            strandBColor: '#ff4444',
            sceneReady: false
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 18);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        // Platform
        const platformGeo = new THREE.CylinderGeometry(6, 6, 0.3, 32);
        const platformMat = new THREE.MeshStandardMaterial({ color: 0x2d2d44, roughness: 0.8 });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = -4;
        scene.add(platform);

        // --- DNA Construction ---
        const dnaGroup = new THREE.Group();
        scene.add(dnaGroup);

        const numPairs = 10;
        const radius = 2;
        const height = 12;
        const twist = Math.PI * 2; // 1 full twist

        const sphereGeo = new THREE.SphereGeometry(0.25, 16, 16);
        const matA = new THREE.MeshStandardMaterial({ color: window.__3D_STATE__.strandAColor });
        const matB = new THREE.MeshStandardMaterial({ color: window.__3D_STATE__.strandBColor });
        const rungGeo = new THREE.CylinderGeometry(0.08, 0.08, radius * 2, 8);
        
        // Rotate rung geometry so it aligns along X axis by default for easier orientation
        rungGeo.rotateZ(Math.PI / 2);

        const basePairs = [];
        const labelsOverlay = document.getElementById('labels-overlay');

        for (let i = 0; i < numPairs; i++) {
            const y = (i / (numPairs - 1)) * height - (height / 2);
            const theta = (i / (numPairs - 1)) * twist;

            // Strand A (Left initially)
            const xA = -Math.cos(theta) * radius;
            const zA = -Math.sin(theta) * radius;
            const sphereA = new THREE.Mesh(sphereGeo, matA);
            sphereA.position.set(xA, y, zA);
            dnaGroup.add(sphereA);

            // Strand B (Right initially)
            const xB = Math.cos(theta) * radius;
            const zB = Math.sin(theta) * radius;
            const sphereB = new THREE.Mesh(sphereGeo, matB);
            sphereB.position.set(xB, y, zB);
            dnaGroup.add(sphereB);

            // Rung
            const isAT = i % 2 === 0;
            const rungColor = isAT ? 0x44cc44 : 0xcccc44;
            const rungMat = new THREE.MeshStandardMaterial({ 
                color: rungColor, 
                transparent: true, 
                opacity: 1 
            });
            const rung = new THREE.Mesh(rungGeo, rungMat);
            rung.position.set(0, y, 0);
            // Orient rung to point from A to B
            rung.rotation.y = -theta; 
            dnaGroup.add(rung);

            // Label DOM Element
            const labelDiv = document.createElement('div');
            labelDiv.className = 'dna-label';
            labelDiv.textContent = isAT ? 'A-T' : 'G-C';
            labelsOverlay.appendChild(labelDiv);

            basePairs.push({
                index: i,
                sphereA,
                sphereB,
                rung,
                origA: new THREE.Vector3(xA, y, zA),
                origB: new THREE.Vector3(xB, y, zB),
                progress: 0, // 0 = zipped, 1 = unzipped
                targetProgress: 0,
                delay: 0,
                labelDiv,
                color: rungColor
            });
        }

        // --- Animation & Interaction Logic ---
        const clock = new THREE.Clock();
        let animTimer = 0;
        const animDuration = 0.5; // 500ms per pair
        const animStagger = 0.2;  // 200ms stagger

        const btnUnzip = document.getElementById('btn-unzip');
        const btnRezip = document.getElementById('btn-rezip');
        const btnToggleRot = document.getElementById('btn-toggle-rotation');
        const unzipText = document.getElementById('unzip-text');

        function startUnzip() {
            if (window.__3D_STATE__.isFullyUnzipped) return;
            window.__3D_STATE__.isUnzipping = true;
            window.__3D_STATE__.isRezipping = false;
            animTimer = 0;
            
            basePairs.forEach(pair => {
                pair.targetProgress = 1;
                // Top to bottom: index 9 starts first (delay 0), index 0 starts last
                pair.delay = (numPairs - 1 - pair.index) * animStagger;
            });
        }

        function startRezip() {
            if (window.__3D_STATE__.unzipProgress === 0) return;
            window.__3D_STATE__.isRezipping = true;
            window.__3D_STATE__.isUnzipping = false;
            animTimer = 0;

            basePairs.forEach(pair => {
                pair.targetProgress = 0;
                // Bottom to top: index 0 starts first (delay 0), index 9 starts last
                pair.delay = pair.index * animStagger;
            });
        }

        btnUnzip.addEventListener('click', startUnzip);
        btnRezip.addEventListener('click', startRezip);

        btnToggleRot.addEventListener('click', () => {
            window.__3D_STATE__.rotationPaused = !window.__3D_STATE__.rotationPaused;
            btnToggleRot.textContent = window.__3D_STATE__.rotationPaused ? 'Resume Rotation' : 'Pause Rotation';
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'h') {
                window.__3D_STATE__.highlightMode = !window.__3D_STATE__.highlightMode;
            }
            if (e.key.toLowerCase() === 'l') {
                window.__3D_STATE__.labelsVisible = !window.__3D_STATE__.labelsVisible;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const tempV = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Auto Rotation
            if (!window.__3D_STATE__.rotationPaused) {
                window.__3D_STATE__.rotationAngle += 0.3 * delta;
                dnaGroup.rotation.y = window.__3D_STATE__.rotationAngle;
            }

            // Unzip/Rezip Animation
            if (window.__3D_STATE__.isUnzipping || window.__3D_STATE__.isRezipping) {
                animTimer += delta;
                let activeAnimations = 0;
                let unzippedCount = 0;

                basePairs.forEach(pair => {
                    if (animTimer > pair.delay) {
                        // Move progress towards target
                        const step = (1 / animDuration) * delta;
                        if (pair.progress < pair.targetProgress) {
                            pair.progress = Math.min(pair.progress + step, pair.targetProgress);
                        } else if (pair.progress > pair.targetProgress) {
                            pair.progress = Math.max(pair.progress - step, pair.targetProgress);
                        }
                    }

                    if (pair.progress !== pair.targetProgress) {
                        activeAnimations++;
                    }
                    if (pair.progress === 1) {
                        unzippedCount++;
                    }

                    // Apply visual updates
                    // Move apart horizontally (local X axis offset)
                    pair.sphereA.position.x = pair.origA.x - (2 * pair.progress);
                    pair.sphereB.position.x = pair.origB.x + (2 * pair.progress);
                    
                    pair.rung.material.opacity = 1 - pair.progress;
                    pair.rung.visible = pair.progress < 1;
                });

                window.__3D_STATE__.unzipProgress = unzippedCount;
                
                if (activeAnimations === 0) {
                    window.__3D_STATE__.isUnzipping = false;
                    window.__3D_STATE__.isRezipping = false;
                }
            }

            // Update State & UI
            window.__3D_STATE__.isFullyUnzipped = window.__3D_STATE__.unzipProgress === numPairs;
            unzipText.textContent = `Base Pairs Unzipped: ${window.__3D_STATE__.unzipProgress} / 10`;
            
            btnUnzip.disabled = window.__3D_STATE__.isFullyUnzipped || window.__3D_STATE__.isUnzipping;
            btnRezip.disabled = window.__3D_STATE__.unzipProgress === 0 || window.__3D_STATE__.isRezipping;

            // Highlight Mode
            const pulse = Math.sin(time * 5) * 0.5 + 0.5;
            basePairs.forEach(pair => {
                if (window.__3D_STATE__.highlightMode && pair.progress < 1) {
                    pair.rung.material.emissive.setHex(pair.color);
                    pair.rung.material.emissiveIntensity = pulse;
                } else {
                    pair.rung.material.emissiveIntensity = 0;
                }
            });

            // Labels Overlay
            basePairs.forEach(pair => {
                if (window.__3D_STATE__.labelsVisible && pair.progress < 0.5) {
                    pair.labelDiv.style.display = 'block';
                    
                    // Get world position of rung center
                    tempV.setFromMatrixPosition(pair.rung.matrixWorld);
                    tempV.project(camera);

                    // Check if behind camera
                    if (tempV.z > 1) {
                        pair.labelDiv.style.display = 'none';
                    } else {
                        const x = (tempV.x * 0.5 + 0.5) * window.innerWidth;
                        const y = -(tempV.y * 0.5 - 0.5) * window.innerHeight;
                        pair.labelDiv.style.left = `${x}px`;
                        pair.labelDiv.style.top = `${y}px`;
                    }
                } else {
                    pair.labelDiv.style.display = 'none';
                }
            });

            renderer.render(scene, camera);
            
            if (!window.__3D_STATE__.sceneReady) {
                window.__3D_STATE__.sceneReady = true;
            }
        }

        animate();
    </script>
</body>
</html>
