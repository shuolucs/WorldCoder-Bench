<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DNA Double Helix Diorama</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    #hud-panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 20;
      padding: 14px;
      border-radius: 12px;
      background: rgba(10, 10, 20, 0.7);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(4px);
      min-width: 220px;
    }

    #hud-panel .status {
      margin-bottom: 12px;
      font-size: 14px;
      line-height: 1.4;
    }

    #hud-panel .controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(50, 50, 80, 0.75);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background: rgba(70, 70, 110, 0.9);
    }

    button:active {
      transform: scale(0.98);
    }

    #labels-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 15;
    }

    .pair-label {
      position: absolute;
      transform: translate(-50%, -50%);
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.15);
      color: #ffffff;
      font-size: 12px;
      white-space: nowrap;
    }

    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud-panel">
      <div class="status" id="status-text">Base Pairs Unzipped: 0 / 10</div>
      <div class="controls">
        <button id="btn-unzip">Unzip</button>
        <button id="btn-rezip">Rezip</button>
        <button id="btn-toggle-rotation">Pause Rotation</button>
      </div>
      <div class="hint">Keys: H = highlight rungs, L = toggle labels</div>
    </div>
    <div id="labels-overlay"></div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

    const BASE_PAIR_COUNT = 10;
    const STRAND_A_COLOR = '#4488ff';
    const STRAND_B_COLOR = '#ff4444';
    const BG_COLOR = '#1a1a2e';

    const app = document.getElementById('app');
    const statusText = document.getElementById('status-text');
    const btnUnzip = document.getElementById('btn-unzip');
    const btnRezip = document.getElementById('btn-rezip');
    const btnToggleRotation = document.getElementById('btn-toggle-rotation');
    const labelsOverlay = document.getElementById('labels-overlay');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(BG_COLOR);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 18);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 7);
    scene.add(directionalLight);

    const platformGeo = new THREE.CylinderGeometry(6, 6, 0.3, 48);
    const platformMat = new THREE.MeshStandardMaterial({
      color: '#2d2d44',
      roughness: 0.9,
      metalness: 0.1
    });
    const platform = new THREE.Mesh(platformGeo, platformMat);
    platform.position.y = -4;
    scene.add(platform);

    const dnaGroup = new THREE.Object3D();
    dnaGroup.name = 'dnaGroup';
    scene.add(dnaGroup);

    const helixRadius = 2;
    const totalHeight = 12;
    const yStart = -totalHeight / 2;
    const stepY = totalHeight / (BASE_PAIR_COUNT - 1);
    const totalTwist = Math.PI * 2;

    const backboneGeometry = new THREE.SphereGeometry(0.25, 24, 24);
    const rungGeometry = new THREE.CylinderGeometry(0.09, 0.09, 1, 16);

    const strandAMaterial = new THREE.MeshStandardMaterial({
      color: STRAND_A_COLOR,
      roughness: 0.35,
      metalness: 0.15
    });

    const strandBMaterial = new THREE.MeshStandardMaterial({
      color: STRAND_B_COLOR,
      roughness: 0.35,
      metalness: 0.15
    });

    const basePairs = [];

    function createRungMaterial(color) {
      return new THREE.MeshStandardMaterial({
        color,
        emissive: new THREE.Color(color).multiplyScalar(0.08),
        transparent: true,
        opacity: 1,
        roughness: 0.4,
        metalness: 0.1
      });
    }

    function updateRungTransform(mesh, start, end) {
      const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      const dir = new THREE.Vector3().subVectors(end, start);
      const len = dir.length();

      mesh.position.copy(mid);
      mesh.scale.set(1, len, 1);

      const up = new THREE.Vector3(0, 1, 0);
      mesh.quaternion.setFromUnitVectors(up, dir.clone().normalize());
    }

    for (let i = 0; i < BASE_PAIR_COUNT; i++) {
      const t = i / (BASE_PAIR_COUNT - 1);
      const angle = t * totalTwist;
      const y = yStart + i * stepY;

      const aPos = new THREE.Vector3(
        -helixRadius * Math.cos(angle),
        y,
        helixRadius * Math.sin(angle)
      );

      const bPos = new THREE.Vector3(
        helixRadius * Math.cos(angle),
        y,
        -helixRadius * Math.sin(angle)
      );

      const sphereA = new THREE.Mesh(backboneGeometry, strandAMaterial.clone());
      sphereA.position.copy(aPos);

      const sphereB = new THREE.Mesh(backboneGeometry, strandBMaterial.clone());
      sphereB.position.copy(bPos);

      const isAT = i % 2 === 0;
      const pairType = isAT ? 'A-T' : 'G-C';
      const rungColor = isAT ? '#44cc44' : '#cccc44';
      const rungMat = createRungMaterial(rungColor);
      const rung = new THREE.Mesh(rungGeometry, rungMat);

      updateRungTransform(rung, aPos, bPos);

      dnaGroup.add(sphereA);
      dnaGroup.add(sphereB);
      dnaGroup.add(rung);

      const label = document.createElement('div');
      label.className = 'pair-label';
      label.textContent = pairType;
      label.style.display = 'none';
      labelsOverlay.appendChild(label);

      basePairs.push({
        index: i,
        pairType,
        sphereA,
        sphereB,
        rung,
        label,
        originalA: aPos.clone(),
        originalB: bPos.clone(),
        separationProgress: 0
      });
    }

    const clock = new THREE.Clock();

    let unzipProgress = 0;
    let isUnzipping = false;
    let isRezipping = false;
    let isFullyUnzipped = false;
    let rotationPaused = false;
    let rotationAngle = 0;
    let highlightMode = false;
    let labelsVisible = false;
    let sceneReady = false;

    let activeAnimation = null;

    function updateHUD() {
      statusText.textContent = `Base Pairs Unzipped: ${unzipProgress} / 10`;
      btnToggleRotation.textContent = rotationPaused ? 'Resume Rotation' : 'Pause Rotation';
    }

    function updateState() {
      window.__3D_STATE__ = {
        basePairCount: BASE_PAIR_COUNT,
        unzipProgress,
        isUnzipping,
        isRezipping,
        isFullyUnzipped,
        rotationPaused,
        rotationAngle,
        highlightMode,
        labelsVisible,
        strandAColor: STRAND_A_COLOR,
        strandBColor: STRAND_B_COLOR,
        sceneReady
      };
    }

    function setPairProgress(pair, p) {
      pair.separationProgress = THREE.MathUtils.clamp(p, 0, 1);

      pair.sphereA.position.set(
        pair.originalA.x - 2 * pair.separationProgress,
        pair.originalA.y,
        pair.originalA.z
      );

      pair.sphereB.position.set(
        pair.originalB.x + 2 * pair.separationProgress,
        pair.originalB.y,
        pair.originalB.z
      );

      pair.rung.material.opacity = 1 - pair.separationProgress;
      pair.rung.visible = pair.rung.material.opacity > 0.001;

      if (pair.rung.visible) {
        updateRungTransform(pair.rung, pair.sphereA.position, pair.sphereB.position);
      }
    }

    function computeUnzipProgress() {
      let count = 0;
      for (const pair of basePairs) {
        if (pair.separationProgress >= 0.999) count++;
      }
      return count;
    }

    function startUnzip() {
      activeAnimation = {
        mode: 'unzip',
        startTime: performance.now()
      };
      isUnzipping = true;
      isRezipping = false;
    }

    function startRezip() {
      activeAnimation = {
        mode: 'rezip',
        startTime: performance.now()
      };
      isUnzipping = false;
      isRezipping = true;
    }

    function updateAnimation(now) {
      if (!activeAnimation) return;

      const pairDuration = 500;
      const stagger = 200;
      let completedAll = true;

      if (activeAnimation.mode === 'unzip') {
        for (let i = 0; i < BASE_PAIR_COUNT; i++) {
          const pairIndex = BASE_PAIR_COUNT - 1 - i;
          const pair = basePairs[pairIndex];
          const start = activeAnimation.startTime + i * stagger;
          const p = THREE.MathUtils.clamp((now - start) / pairDuration, 0, 1);
          setPairProgress(pair, Math.max(pair.separationProgress, p));
          if (p < 1) completedAll = false;
        }

        unzipProgress = computeUnzipProgress();
        isFullyUnzipped = unzipProgress === BASE_PAIR_COUNT;

        if (completedAll) {
          isUnzipping = false;
          activeAnimation = null;
        }
      } else if (activeAnimation.mode === 'rezip') {
        for (let i = 0; i < BASE_PAIR_COUNT; i++) {
          const pairIndex = i;
          const pair = basePairs[pairIndex];
          const start = activeAnimation.startTime + i * stagger;
          const elapsed = THREE.MathUtils.clamp((now - start) / pairDuration, 0, 1);
          const p = 1 - elapsed;
          const newProgress = now < start ? pair.separationProgress : p;
          setPairProgress(pair, Math.min(pair.separationProgress, newProgress));

          if (elapsed < 1) completedAll = false;
        }

        unzipProgress = computeUnzipProgress();
        isFullyUnzipped = unzipProgress === BASE_PAIR_COUNT;

        if (completedAll) {
          isRezipping = false;
          activeAnimation = null;
        }
      }
    }

    function updateLabels() {
      for (const pair of basePairs) {
        const visible = labelsVisible && pair.separationProgress < 0.999 && pair.rung.visible;
        pair.label.style.display = visible ? 'block' : 'none';
        if (!visible) continue;

        const worldPos = pair.rung.position.clone();
        worldPos.y += 0.35;
        worldPos.applyMatrix4(dnaGroup.matrixWorld);

        const projected = worldPos.project(camera);
        const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;

        const inFront = projected.z < 1;
        pair.label.style.display = inFront ? 'block' : 'none';
        pair.label.style.left = `${x}px`;
        pair.label.style.top = `${y}px`;
      }
    }

    btnUnzip.addEventListener('click', () => {
      startUnzip();
    });

    btnRezip.addEventListener('click', () => {
      startRezip();
    });

    btnToggleRotation.addEventListener('click', () => {
      rotationPaused = !rotationPaused;
      updateHUD();
    });

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'h') {
        highlightMode = !highlightMode;
      } else if (key === 'l') {
        labelsVisible = !labelsVisible;
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHUD();
    updateState();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const now = performance.now();

      if (!rotationPaused) {
        dnaGroup.rotation.y += 0.3 * delta;
        rotationAngle += 0.3 * delta;
      }

      updateAnimation(now);

      const pulse = 0.35 + 0.25 * (0.5 + 0.5 * Math.sin(now * 0.006));
      for (const pair of basePairs) {
        if (highlightMode) {
          pair.rung.material.emissiveIntensity = 0.5 + pulse;
        } else {
          pair.rung.material.emissiveIntensity = 0.25;
        }
      }

      updateHUD();
      updateLabels();

      renderer.render(scene, camera);

      if (!sceneReady) sceneReady = true;
      updateState();
    }

    animate();
  </script>
</body>
</html>
