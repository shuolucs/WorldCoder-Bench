<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procedural Laptop Design Comparison Tool</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: white;
    }

    #top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    #bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 16px;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    button {
      background: #2f3b63;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
    }

    button:hover {
      background: #42538a;
    }

    #compare-info {
      margin-left: auto;
      color: #ffd166;
      font-weight: bold;
      display: none;
    }

    #selected-label, #angle-display {
      font-weight: bold;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="top-bar">
    <div>Selected: <span id="selected-label">None Selected</span></div>
    <button id="toggle-theme">Toggle Theme</button>
    <button id="compare-btn">Compare</button>
    <div id="compare-info">Comparison Active</div>
  </div>

  <div id="bottom-bar">
    <div>Screen Angle: <span id="angle-display">N/A</span></div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const selectedLabel = document.getElementById("selected-label");
    const angleDisplay = document.getElementById("angle-display");
    const toggleThemeBtn = document.getElementById("toggle-theme");
    const compareBtn = document.getElementById("compare-btn");
    const compareInfo = document.getElementById("compare-info");

    window.__3D_STATE__ = {
      selectedLaptop: null,
      laptopA_angle: 110,
      laptopB_angle: 110,
      laptopA_elevated: false,
      laptopB_elevated: false,
      laptopA_goldTheme: false,
      laptopB_goldTheme: false,
      comparisonActive: false,
      parrotLoaded: false,
      parrotY: 2.5
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#1a1a2e");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.8, 0);
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(10, 64),
      new THREE.MeshStandardMaterial({
        color: 0x222238,
        roughness: 0.9,
        metalness: 0.1
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.06;
    scene.add(floor);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const clock = new THREE.Clock();

    function degToRad(d) {
      return d * Math.PI / 180;
    }

    function createLaptop({
      name,
      x,
      baseSize,
      screenSize,
      color,
      initialAngle
    }) {
      const group = new THREE.Group();
      group.position.set(x, 0, 0);
      group.userData.name = name;
      group.userData.defaultX = x;
      group.userData.targetX = x;
      group.userData.currentY = 0;
      group.userData.targetY = 0;
      group.userData.currentRotY = 0;
      group.userData.targetRotY = 0;
      group.userData.defaultColor = new THREE.Color(color);
      group.userData.goldColor = new THREE.Color("#d4af37");

      const baseMaterial = new THREE.MeshStandardMaterial({
        color: color,
        emissive: new THREE.Color(color).multiplyScalar(0.08),
        emissiveIntensity: 0.15,
        roughness: 0.45,
        metalness: 0.55
      });

      const screenMaterial = new THREE.MeshStandardMaterial({
        color: color,
        emissive: new THREE.Color(color).multiplyScalar(0.35),
        emissiveIntensity: 0.2,
        roughness: 0.35,
        metalness: 0.4
      });

      const base = new THREE.Mesh(
        new THREE.BoxGeometry(baseSize.x, baseSize.y, baseSize.z),
        baseMaterial
      );
      base.position.y = baseSize.y / 2;
      base.userData.laptopName = name;
      base.userData.clickable = true;
      group.add(base);

      const hinge = new THREE.Group();
      hinge.position.set(0, baseSize.y / 2, -baseSize.z / 2);
      group.add(hinge);

      const screen = new THREE.Mesh(
        new THREE.BoxGeometry(screenSize.x, screenSize.y, screenSize.z),
        screenMaterial
      );
      screen.position.set(0, screenSize.y / 2, screenSize.z / 2);
      screen.userData.laptopName = name;
      screen.userData.clickable = true;
      hinge.add(screen);

      const keyboard = new THREE.Mesh(
        new THREE.BoxGeometry(baseSize.x * 0.82, 0.01, baseSize.z * 0.52),
        new THREE.MeshStandardMaterial({
          color: 0x111111,
          roughness: 0.8,
          metalness: 0.2
        })
      );
      keyboard.position.set(0, baseSize.y / 2 + 0.01, -0.05);
      group.add(keyboard);

      const trackpad = new THREE.Mesh(
        new THREE.BoxGeometry(baseSize.x * 0.25, 0.008, baseSize.z * 0.18),
        new THREE.MeshStandardMaterial({
          color: 0x666666,
          roughness: 0.6,
          metalness: 0.3
        })
      );
      trackpad.position.set(0, baseSize.y / 2 + 0.012, baseSize.z * 0.22);
      group.add(trackpad);

      group.userData.base = base;
      group.userData.screen = screen;
      group.userData.hinge = hinge;
      group.userData.baseMaterial = baseMaterial;
      group.userData.screenMaterial = screenMaterial;
      group.userData.baseSize = baseSize;
      group.userData.screenSize = screenSize;
      group.userData.angle = initialAngle;

      setLaptopAngle(group, initialAngle);

      scene.add(group);
      return group;
    }

    function setLaptopAngle(laptop, angleDeg) {
      laptop.userData.angle = angleDeg;
      laptop.userData.hinge.rotation.x = degToRad(angleDeg);
    }

    function applyLaptopTheme(laptop, useGold) {
      const color = useGold ? laptop.userData.goldColor : laptop.userData.defaultColor;
      laptop.userData.baseMaterial.color.copy(color);
      laptop.userData.baseMaterial.emissive.copy(color).multiplyScalar(0.08);
      laptop.userData.screenMaterial.color.copy(color);
      laptop.userData.screenMaterial.emissive.copy(color).multiplyScalar(0.35);
    }

    function setLaptopSelectedVisual(laptop, selected) {
      laptop.userData.baseMaterial.emissiveIntensity = selected ? 0.5 : 0.15;
      laptop.userData.screenMaterial.emissiveIntensity = selected ? 0.5 : 0.2;
      laptop.userData.targetY = selected ? 0.3 : 0.0;
    }

    const laptopA = createLaptop({
      name: "A",
      x: -2.5,
      baseSize: { x: 2.0, y: 0.1, z: 1.4 },
      screenSize: { x: 2.0, y: 1.3, z: 0.05 },
      color: "#4a90d9",
      initialAngle: 110
    });

    const laptopB = createLaptop({
      name: "B",
      x: 2.5,
      baseSize: { x: 1.8, y: 0.12, z: 1.2 },
      screenSize: { x: 1.8, y: 1.1, z: 0.04 },
      color: "#d94a4a",
      initialAngle: 110
    });

    const laptops = { A: laptopA, B: laptopB };

    function updateSelection(name) {
      if (window.__3D_STATE__.selectedLaptop === name) return;

      window.__3D_STATE__.selectedLaptop = name;

      const isA = name === "A";
      const isB = name === "B";

      window.__3D_STATE__.laptopA_elevated = isA;
      window.__3D_STATE__.laptopB_elevated = isB;

      setLaptopSelectedVisual(laptopA, isA);
      setLaptopSelectedVisual(laptopB, isB);

      selectedLabel.textContent = name ? `Laptop ${name}` : "None Selected";
      updateAngleDisplay();
    }

    function updateAngleDisplay() {
      const sel = window.__3D_STATE__.selectedLaptop;
      if (!sel) {
        angleDisplay.textContent = "N/A";
        return;
      }
      const angle = sel === "A"
        ? window.__3D_STATE__.laptopA_angle
        : window.__3D_STATE__.laptopB_angle;
      angleDisplay.textContent = `${angle}°`;
    }

    window.addEventListener("pointerdown", (event) => {
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);

      const clickable = [];
      laptopA.traverse(obj => { if (obj.isMesh && obj.userData.clickable) clickable.push(obj); });
      laptopB.traverse(obj => { if (obj.isMesh && obj.userData.clickable) clickable.push(obj); });

      const hits = raycaster.intersectObjects(clickable, false);
      if (hits.length > 0) {
        const name = hits[0].object.userData.laptopName;
        updateSelection(name);
      }
    });

    window.addEventListener("keydown", (event) => {
      const sel = window.__3D_STATE__.selectedLaptop;
      if (!sel) return;

      if (event.key === "ArrowUp") {
        if (sel === "A") {
          window.__3D_STATE__.laptopA_angle = Math.min(170, window.__3D_STATE__.laptopA_angle + 10);
        } else {
          window.__3D_STATE__.laptopB_angle = Math.min(170, window.__3D_STATE__.laptopB_angle + 10);
        }
        updateAngleDisplay();
      }

      if (event.key === "ArrowDown") {
        if (sel === "A") {
          window.__3D_STATE__.laptopA_angle = Math.max(20, window.__3D_STATE__.laptopA_angle - 10);
        } else {
          window.__3D_STATE__.laptopB_angle = Math.max(20, window.__3D_STATE__.laptopB_angle - 10);
        }
        updateAngleDisplay();
      }
    });

    toggleThemeBtn.addEventListener("click", () => {
      const sel = window.__3D_STATE__.selectedLaptop;
      if (!sel) return;

      if (sel === "A") {
        window.__3D_STATE__.laptopA_goldTheme = !window.__3D_STATE__.laptopA_goldTheme;
        applyLaptopTheme(laptopA, window.__3D_STATE__.laptopA_goldTheme);
      } else {
        window.__3D_STATE__.laptopB_goldTheme = !window.__3D_STATE__.laptopB_goldTheme;
        applyLaptopTheme(laptopB, window.__3D_STATE__.laptopB_goldTheme);
      }
    });

    compareBtn.addEventListener("click", () => {
      window.__3D_STATE__.comparisonActive = !window.__3D_STATE__.comparisonActive;

      if (window.__3D_STATE__.comparisonActive) {
        laptopA.userData.targetX = -1.5;
        laptopB.userData.targetX = 1.5;
        laptopA.userData.targetRotY = 0;
        laptopB.userData.targetRotY = 0;
        compareInfo.style.display = "block";
      } else {
        laptopA.userData.targetX = -2.5;
        laptopB.userData.targetX = 2.5;
        laptopA.userData.targetRotY = 0;
        laptopB.userData.targetRotY = 0;
        compareInfo.style.display = "none";
      }
    });

    let parrot = null;
    const gltfLoader = new GLTFLoader();
    gltfLoader.load(
      "Parrot.glb",
      (gltf) => {
        parrot = gltf.scene;
        parrot.position.set(0, 2.5, 0);
        parrot.scale.setScalar(0.01);
        scene.add(parrot);
        window.__3D_STATE__.parrotLoaded = true;
      },
      undefined,
      (err) => {
        console.warn("Failed to load Parrot.glb:", err);
      }
    );

    function smoothTo(current, target, delta, speed) {
      return THREE.MathUtils.damp(current, target, speed, delta);
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      const elapsed = clock.getElapsedTime();

      setLaptopAngle(laptopA, window.__3D_STATE__.laptopA_angle);
      setLaptopAngle(laptopB, window.__3D_STATE__.laptopB_angle);

      laptopA.position.x = smoothTo(laptopA.position.x, laptopA.userData.targetX, delta, 10);
      laptopB.position.x = smoothTo(laptopB.position.x, laptopB.userData.targetX, delta, 10);

      laptopA.position.y = smoothTo(laptopA.position.y, laptopA.userData.targetY, delta, 14);
      laptopB.position.y = smoothTo(laptopB.position.y, laptopB.userData.targetY, delta, 14);

      laptopA.rotation.y = smoothTo(laptopA.rotation.y, laptopA.userData.targetRotY, delta, 10);
      laptopB.rotation.y = smoothTo(laptopB.rotation.y, laptopB.userData.targetRotY, delta, 10);

      window.__3D_STATE__.laptopA_elevated = laptopA.position.y > 0.15;
      window.__3D_STATE__.laptopB_elevated = laptopB.position.y > 0.15;

      if (parrot) {
        const y = 2.5 + Math.sin(elapsed * Math.PI) * 0.2;
        parrot.position.y = y;
        window.__3D_STATE__.parrotY = y;
      } else {
        window.__3D_STATE__.parrotY = 2.5;
      }

      renderer.render(scene, camera);
    }

    updateSelection(null);
    applyLaptopTheme(laptopA, false);
    applyLaptopTheme(laptopB, false);
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
