<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Laptop Comparison</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .bar {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(5px);
            pointer-events: auto;
        }
        button {
            background: #4a90d9;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #5ca0e9;
        }
        #selected-label {
            font-size: 1.2rem;
            font-weight: bold;
            min-width: 180px;
            text-align: center;
        }
        #compare-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            pointer-events: none;
            display: none;
        }
        #angle-display {
            font-size: 1.1rem;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div class="bar" id="top-bar">
            <span id="selected-label">None Selected</span>
            <button id="toggle-theme">Toggle Theme</button>
            <button id="compare-btn">Compare Mode</button>
        </div>
        
        <div id="compare-info">Comparison Active</div>
        
        <div class="bar" id="bottom-bar">
            <span id="angle-display">Angle: --</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            selectedLaptop: null,
            laptopA_angle: 110,
            laptopB_angle: 110,
            laptopA_elevated: false,
            laptopB_elevated: false,
            laptopA_goldTheme: false,
            laptopB_goldTheme: false,
            comparisonActive: false,
            parrotLoaded: false,
            parrotY: 2.5
        };

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- PROCEDURAL LAPTOPS ---
        function createLaptop(id, baseSize, screenSize, colorHex, startX, startRotY) {
            const group = new THREE.Group();
            group.position.x = startX;
            group.rotation.y = startRotY;
            
            // Invisible hit box for easier raycasting
            const hitGeom = new THREE.BoxGeometry(baseSize[0] * 1.2, baseSize[1] * 10, baseSize[2] * 1.2);
            const hitMat = new THREE.MeshBasicMaterial({ visible: false });
            const hitMesh = new THREE.Mesh(hitGeom, hitMat);
            hitMesh.position.y = baseSize[1] * 5;
            hitMesh.userData = { id: id };
            group.add(hitMesh);

            const color = new THREE.Color(colorHex);
            const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.7 });
            const screenMat = new THREE.MeshStandardMaterial({ 
                color: color, 
                roughness: 0.1, 
                metalness: 0.8, 
                emissive: color, 
                emissiveIntensity: 0.1 
            });

            // Base
            const baseGeom = new THREE.BoxGeometry(baseSize[0], baseSize[1], baseSize[2]);
            const base = new THREE.Mesh(baseGeom, material);
            base.position.y = baseSize[1] / 2;
            group.add(base);

            // Keyboard detail (simple plane)
            const kbGeom = new THREE.PlaneGeometry(baseSize[0] * 0.8, baseSize[2] * 0.5);
            const kbMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
            const kb = new THREE.Mesh(kbGeom, kbMat);
            kb.rotation.x = -Math.PI / 2;
            kb.position.set(0, baseSize[1] + 0.001, -baseSize[2] * 0.1);
            group.add(kb);

            // Hinge
            const hinge = new THREE.Group();
            hinge.position.set(0, baseSize[1], -baseSize[2] / 2);
            group.add(hinge);

            // Screen
            const screenGeom = new THREE.BoxGeometry(screenSize[0], screenSize[1], screenSize[2]);
            screenGeom.translate(0, screenSize[1] / 2, 0); // Pivot at bottom edge
            const screen = new THREE.Mesh(screenGeom, screenMat);
            hinge.add(screen);

            // Inner screen (display area)
            const displayGeom = new THREE.PlaneGeometry(screenSize[0] * 0.9, screenSize[1] * 0.85);
            const displayMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.1, emissive: 0xffffff, emissiveIntensity: 0.05 });
            const display = new THREE.Mesh(displayGeom, displayMat);
            display.position.set(0, screenSize[1] / 2, screenSize[2] / 2 + 0.001);
            hinge.add(display);

            scene.add(group);

            return { 
                group, hinge, material, screenMat, displayMat,
                defaultColor: colorHex, startX, startRotY, id 
            };
        }

        // Laptop A: Left, Blue, slightly rotated
        const laptopA = createLaptop('A', [2.0, 0.1, 1.4], [2.0, 1.3, 0.05], 0x4a90d9, -2.5, 0.2);
        // Laptop B: Right, Red, slightly rotated
        const laptopB = createLaptop('B', [1.8, 0.12, 1.2], [1.8, 1.1, 0.04], 0xd94a4a, 2.5, -0.2);

        const laptops = [laptopA, laptopB];

        // --- PARROT MASCOT ---
        let parrotModel = null;
        let parrotMixer = null;
        const loader = new GLTFLoader();
        
        // Using a reliable public URL for the Three.js example model
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Parrot.glb', (gltf) => {
            parrotModel = gltf.scene;
            parrotModel.scale.set(0.01, 0.01, 0.01);
            parrotModel.position.set(0, 2.5, 0);
            
            // Adjust rotation to face forward
            parrotModel.rotation.y = Math.PI / 2;
            
            scene.add(parrotModel);
            
            parrotMixer = new THREE.AnimationMixer(parrotModel);
            if (gltf.animations.length > 0) {
                parrotMixer.clipAction(gltf.animations[0]).play();
            }
            
            window.__3D_STATE__.parrotLoaded = true;
        });

        // --- INTERACTION LOGIC ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            // Ignore clicks on UI
            if (event.target.tagName === 'BUTTON') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            
            // Intersect against invisible hitboxes
            const hitboxes = laptops.map(l => l.group.children[0]);
            const intersects = raycaster.intersectObjects(hitboxes);

            if (intersects.length > 0) {
                const clickedId = intersects[0].object.userData.id;
                window.__3D_STATE__.selectedLaptop = clickedId;
            } else {
                window.__3D_STATE__.selectedLaptop = null;
            }
            updateUI();
        });

        window.addEventListener('keydown', (event) => {
            const state = window.__3D_STATE__;
            if (!state.selectedLaptop) return;

            const prefix = state.selectedLaptop === 'A' ? 'laptopA' : 'laptopB';
            
            if (event.key === 'ArrowUp') {
                state[`${prefix}_angle`] = Math.min(170, state[`${prefix}_angle`] + 10);
                updateUI();
            } else if (event.key === 'ArrowDown') {
                state[`${prefix}_angle`] = Math.max(20, state[`${prefix}_angle`] - 10);
                updateUI();
            }
        });

        document.getElementById('toggle-theme').addEventListener('click', () => {
            const state = window.__3D_STATE__;
            if (!state.selectedLaptop) return;
            const prefix = state.selectedLaptop === 'A' ? 'laptopA' : 'laptopB';
            state[`${prefix}_goldTheme`] = !state[`${prefix}_goldTheme`];
        });

        document.getElementById('compare-btn').addEventListener('click', () => {
            const state = window.__3D_STATE__;
            state.comparisonActive = !state.comparisonActive;
            document.getElementById('compare-info').style.display = state.comparisonActive ? 'block' : 'none';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function updateUI() {
            const state = window.__3D_STATE__;
            const label = document.getElementById('selected-label');
            const angleDisplay = document.getElementById('angle-display');

            if (state.selectedLaptop) {
                label.innerText = `Laptop ${state.selectedLaptop} Selected`;
                const angle = state.selectedLaptop === 'A' ? state.laptopA_angle : state.laptopB_angle;
                angleDisplay.innerText = `Screen Angle: ${angle}°`;
            } else {
                label.innerText = 'None Selected';
                angleDisplay.innerText = 'Angle: --';
            }
        }

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function lerp(start, end, factor) {
            return start + (end - start) * factor;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const dt = clock.getDelta();
            const time = clock.getElapsedTime();
            const state = window.__3D_STATE__;
            
            // Lerp factor for ~300ms smooth transition
            const lerpFactor = Math.min(dt * 10, 1); 

            controls.update();

            // Update Parrot
            if (state.parrotLoaded && parrotModel) {
                if (parrotMixer) parrotMixer.update(dt);
                // Sinusoidal y offset: amplitude 0.2, period 2s (freq 0.5Hz -> angular freq PI)
                const yOffset = Math.sin(time * Math.PI) * 0.2;
                parrotModel.position.y = 2.5 + yOffset;
                state.parrotY = parrotModel.position.y;
            }

            // Update Laptops
            laptops.forEach(laptop => {
                const isSelected = state.selectedLaptop === laptop.id;
                const prefix = laptop.id === 'A' ? 'laptopA' : 'laptopB';

                // 1. Elevation
                const targetY = isSelected ? 0.3 : 0;
                laptop.group.position.y = lerp(laptop.group.position.y, targetY, lerpFactor);
                state[`${prefix}_elevated`] = laptop.group.position.y > 0.15;

                // 2. Glow (Emissive)
                const targetEmissive = isSelected ? 0.5 : 0.1;
                laptop.screenMat.emissiveIntensity = lerp(laptop.screenMat.emissiveIntensity, targetEmissive, lerpFactor);
                laptop.displayMat.emissiveIntensity = isSelected ? 0.2 : 0.05;

                // 3. Screen Angle
                // Map state angle (0=closed, 90=vertical, 180=flat) to rotation.x
                // Hinge at back, screen built upwards. 
                // rotation.x = -90deg (-PI/2) is closed. rotation.x = 0 is vertical.
                const targetAngleRad = THREE.MathUtils.degToRad(state[`${prefix}_angle`] - 90);
                laptop.hinge.rotation.x = lerp(laptop.hinge.rotation.x, targetAngleRad, lerpFactor);

                // 4. Comparison Mode (Position & Rotation)
                let targetX = laptop.startX;
                let targetRotY = laptop.startRotY;

                if (state.comparisonActive) {
                    targetX = laptop.id === 'A' ? -1.5 : 1.5;
                    targetRotY = 0;
                }

                laptop.group.position.x = lerp(laptop.group.position.x, targetX, lerpFactor);
                laptop.group.rotation.y = lerp(laptop.group.rotation.y, targetRotY, lerpFactor);

                // 5. Color Theme
                const isGold = state[`${prefix}_goldTheme`];
                const targetColorHex = isGold ? 0xd4af37 : laptop.defaultColor;
                
                // Smooth color transition
                const currentColor = laptop.material.color;
                const targetColor = new THREE.Color(targetColorHex);
                currentColor.lerp(targetColor, lerpFactor);
                
                laptop.screenMat.color.copy(currentColor);
                laptop.screenMat.emissive.copy(currentColor);
            });

            renderer.render(scene, camera);
        }

        // Initialize UI and start loop
        updateUI();
        animate();
    </script>
</body>
</html>
