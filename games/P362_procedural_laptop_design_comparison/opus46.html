<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laptop Comparison Tool</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: rgba(26, 26, 46, 0.9);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding: 0 20px;
}

#selected-label {
    color: #fff;
    font-size: 16px;
    min-width: 180px;
    text-align: center;
    padding: 8px 16px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
}

#toggle-theme {
    background: linear-gradient(135deg, #d4af37, #f0d060);
    color: #1a1a2e;
}
#toggle-theme:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 15px rgba(212,175,55,0.4);
}

#compare-btn {
    background: linear-gradient(135deg, #4a90d9, #6ab0ff);
    color: #fff;
}
#compare-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 15px rgba(74,144,217,0.4);
}

#bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 50px;
    background: rgba(26, 26, 46, 0.9);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px;
    z-index: 100;
    border-top: 1px solid rgba(255,255,255,0.1);
}

#angle-display {
    color: #aaa;
    font-size: 14px;
}

#compare-info {
    color: #4a90d9;
    font-size: 14px;
    font-weight: 600;
}

.instructions {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    text-align: center;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="top-bar">
    <div id="selected-label">None Selected</div>
    <button id="toggle-theme">🎨 Toggle Theme</button>
    <button id="compare-btn">📊 Compare</button>
</div>

<div id="bottom-bar">
    <div id="angle-display">Screen Angle: --</div>
    <div id="compare-info"></div>
</div>

<div class="instructions">Click a laptop to select • Arrow Up/Down to adjust screen angle</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State management
window.__3D_STATE__ = {
    selectedLaptop: null,
    laptopA_angle: 110,
    laptopB_angle: 110,
    laptopA_elevated: false,
    laptopB_elevated: false,
    laptopA_goldTheme: false,
    laptopB_goldTheme: false,
    comparisonActive: false,
    parrotLoaded: false,
    parrotY: 2.5
};

const state = window.__3D_STATE__;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
scene.add(directionalLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.05;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const gridHelper = new THREE.GridHelper(20, 40, 0x2a2a4e, 0x2a2a4e);
gridHelper.position.y = -0.04;
scene.add(gridHelper);

// Laptop creation function
function createLaptop(config) {
    const group = new THREE.Group();

    // Base
    const baseGeo = new THREE.BoxGeometry(config.baseW, config.baseH, config.baseD);
    const baseMat = new THREE.MeshStandardMaterial({
        color: config.color,
        metalness: 0.6,
        roughness: 0.3,
        emissive: config.color,
        emissiveIntensity: 0.05
    });
    const base = new THREE.Mesh(baseGeo, baseMat);
    base.position.y = config.baseH / 2;
    base.castShadow = true;
    base.receiveShadow = true;
    group.add(base);

    // Keyboard detail on base
    const kbGeo = new THREE.BoxGeometry(config.baseW * 0.85, 0.005, config.baseD * 0.55);
    const kbMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
    const keyboard = new THREE.Mesh(kbGeo, kbMat);
    keyboard.position.y = config.baseH + 0.003;
    keyboard.position.z = 0.05;
    group.add(keyboard);

    // Trackpad
    const tpGeo = new THREE.BoxGeometry(config.baseW * 0.3, 0.005, config.baseD * 0.25);
    const tpMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5 });
    const trackpad = new THREE.Mesh(tpGeo, tpMat);
    trackpad.position.y = config.baseH + 0.003;
    trackpad.position.z = config.baseD * 0.3;
    group.add(trackpad);

    // Screen pivot group - pivot at back edge of base
    const screenPivot = new THREE.Group();
    screenPivot.position.set(0, config.baseH, -config.baseD / 2);
    group.add(screenPivot);

    // Screen
    const screenGeo = new THREE.BoxGeometry(config.screenW, config.screenH, config.screenT);
    const screenMat = new THREE.MeshStandardMaterial({
        color: config.color,
        metalness: 0.6,
        roughness: 0.3,
        emissive: config.color,
        emissiveIntensity: 0.1
    });
    const screenMesh = new THREE.Mesh(screenGeo, screenMat);
    screenMesh.position.y = config.screenH / 2;
    screenMesh.position.z = -config.screenT / 2;
    screenMesh.castShadow = true;
    screenPivot.add(screenMesh);

    // Display surface (front of screen)
    const displayGeo = new THREE.PlaneGeometry(config.screenW * 0.9, config.screenH * 0.88);
    const displayMat = new THREE.MeshStandardMaterial({
        color: 0x111122,
        emissive: config.color,
        emissiveIntensity: 0.15,
        roughness: 0.1,
        metalness: 0.0
    });
    const display = new THREE.Mesh(displayGeo, displayMat);
    display.position.y = config.screenH / 2;
    display.position.z = 0.001;
    screenPivot.add(display);

    // Set initial angle
    const angleRad = THREE.MathUtils.degToRad(config.angle);
    screenPivot.rotation.x = -(Math.PI - angleRad);

    return {
        group,
        base,
        screenPivot,
        screenMesh,
        display,
        baseMat,
        screenMat,
        displayMat,
        config,
        currentY: 0,
        targetY: 0,
        defaultColor: config.color
    };
}

// Create laptops
const laptopAConfig = {
    baseW: 2.0, baseH: 0.1, baseD: 1.4,
    screenW: 2.0, screenH: 1.3, screenT: 0.05,
    color: 0x4a90d9,
    angle: 110
};

const laptopBConfig = {
    baseW: 1.8, baseH: 0.12, baseD: 1.2,
    screenW: 1.8, screenH: 1.1, screenT: 0.04,
    color: 0xd94a4a,
    angle: 110
};

const laptopA = createLaptop(laptopAConfig);
laptopA.group.position.set(-2.5, 0, 0);
scene.add(laptopA.group);

const laptopB = createLaptop(laptopBConfig);
laptopB.group.position.set(2.5, 0, 0);
scene.add(laptopB.group);

// Labels above laptops
function createLabel(text) {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(0,0,0,0)';
    ctx.fillRect(0, 0, 256, 64);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 28px Segoe UI';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 128, 32);

    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.scale.set(2, 0.5, 1);
    return sprite;
}

const labelA = createLabel('Laptop A');
labelA.position.set(0, 2.2, 0);
laptopA.group.add(labelA);

const labelB = createLabel('Laptop B');
labelB.position.set(0, 2.2, 0);
laptopB.group.add(labelB);

// Parrot mascot
let parrot = null;
const loader = new GLTFLoader();
loader.load('Parrot.glb', (gltf) => {
    parrot = gltf.scene;
    parrot.position.set(0, 2.5, 0);
    parrot.scale.set(0.01, 0.01, 0.01);
    scene.add(parrot);
    state.parrotLoaded = true;

    // Setup animation mixer if animations exist
    if (gltf.animations && gltf.animations.length > 0) {
        parrot.mixer = new THREE.AnimationMixer(parrot);
        const action = parrot.mixer.clipAction(gltf.animations[0]);
        action.play();
    }
}, undefined, (error) => {
    console.warn('Could not load Parrot.glb:', error);
    // Create a simple parrot placeholder
    const parrotGroup = new THREE.Group();

    // Body
    const bodyGeo = new THREE.SphereGeometry(0.3, 16, 16);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x22cc44, emissive: 0x22cc44, emissiveIntensity: 0.2 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    parrotGroup.add(body);

    // Head
    const headGeo = new THREE.SphereGeometry(0.2, 16, 16);
    const headMat = new THREE.MeshStandardMaterial({ color: 0x33dd55, emissive: 0x33dd55, emissiveIntensity: 0.2 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.set(0, 0.35, 0.1);
    parrotGroup.add(head);

    // Beak
    const beakGeo = new THREE.ConeGeometry(0.08, 0.2, 8);
    const beakMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
    const beak = new THREE.Mesh(beakGeo, beakMat);
    beak.position.set(0, 0.3, 0.3);
    beak.rotation.x = Math.PI / 2;
    parrotGroup.add(beak);

    // Wings
    const wingGeo = new THREE.BoxGeometry(0.6, 0.05, 0.3);
    const wingMat = new THREE.MeshStandardMaterial({ color: 0x1199dd });
    const wingL = new THREE.Mesh(wingGeo, wingMat);
    wingL.position.set(-0.35, 0.05, 0);
    wingL.rotation.z = 0.3;
    parrotGroup.add(wingL);
    const wingR = new THREE.Mesh(wingGeo, wingMat);
    wingR.position.set(0.35, 0.05, 0);
    wingR.rotation.z = -0.3;
    parrotGroup.add(wingR);

    // Tail
    const tailGeo = new THREE.BoxGeometry(0.1, 0.05, 0.4);
    const tailMat = new THREE.MeshStandardMaterial({ color: 0xdd3333 });
    const tail = new THREE.Mesh(tailGeo, tailMat);
    tail.position.set(0, -0.1, -0.35);
    parrotGroup.add(tail);

    parrotGroup.position.set(0, 2.5, 0);
    scene.add(parrotGroup);
    parrot = parrotGroup;
    state.parrotLoaded = true;
});

// Raycasting
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getAllMeshes(group) {
    const meshes = [];
    group.traverse((child) => {
        if (child.isMesh) meshes.push(child);
    });
    return meshes;
}

function selectLaptop(which) {
    const prev = state.selectedLaptop;

    // Deselect previous
    if (prev === 'A') {
        state.laptopA_elevated = false;
        laptopA.baseMat.emissiveIntensity = 0.05;
        laptopA.screenMat.emissiveIntensity = 0.1;
        laptopA.displayMat.emissiveIntensity = 0.15;
    }
    if (prev === 'B') {
        state.laptopB_elevated = false;
        laptopB.baseMat.emissiveIntensity = 0.05;
        laptopB.screenMat.emissiveIntensity = 0.1;
        laptopB.displayMat.emissiveIntensity = 0.15;
    }

    if (which === prev) {
        // Deselect
        state.selectedLaptop = null;
        document.getElementById('selected-label').textContent = 'None Selected';
        return;
    }

    state.selectedLaptop = which;

    if (which === 'A') {
        state.laptopA_elevated = true;
        laptopA.baseMat.emissiveIntensity = 0.5;
        laptopA.screenMat.emissiveIntensity = 0.5;
        laptopA.displayMat.emissiveIntensity = 0.5;
        document.getElementById('selected-label').textContent = 'Laptop A Selected';
    } else if (which === 'B') {
        state.laptopB_elevated = true;
        laptopB.baseMat.emissiveIntensity = 0.5;
        laptopB.screenMat.emissiveIntensity = 0.5;
        laptopB.displayMat.emissiveIntensity = 0.5;
        document.getElementById('selected-label').textContent = 'Laptop B Selected';
    }
}

renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    const meshesA = getAllMeshes(laptopA.group);
    const meshesB = getAllMeshes(laptopB.group);

    const intersectsA = raycaster.intersectObjects(meshesA, true);
    const intersectsB = raycaster.intersectObjects(meshesB, true);

    if (intersectsA.length > 0 && (intersectsB.length === 0 || intersectsA[0].distance < intersectsB[0].distance)) {
        selectLaptop('A');
    } else if (intersectsB.length > 0) {
        selectLaptop('B');
    }
});

// Keyboard controls
document.addEventListener('keydown', (event) => {
    if (!state.selectedLaptop) return;

    const isA = state.selectedLaptop === 'A';
    const laptop = isA ? laptopA : laptopB;
    const angleKey = isA ? 'laptopA_angle' : 'laptopB_angle';

    if (event.key === 'ArrowUp') {
        event.preventDefault();
        state[angleKey] = Math.min(170, state[angleKey] + 10);
    } else if (event.key === 'ArrowDown') {
        event.preventDefault();
        state[angleKey] = Math.max(20, state[angleKey] - 10);
    }
});

// Toggle theme button
document.getElementById('toggle-theme').addEventListener('click', () => {
    if (!state.selectedLaptop) return;

    const isA = state.selectedLaptop === 'A';
    const laptop = isA ? laptopA : laptopB;
    const goldKey = isA ? 'laptopA_goldTheme' : 'laptopB_goldTheme';

    state[goldKey] = !state[goldKey];

    const color = state[goldKey] ? 0xd4af37 : laptop.defaultColor;
    laptop.baseMat.color.setHex(color);
    laptop.baseMat.emissive.setHex(color);
    laptop.screenMat.color.setHex(color);
    laptop.screenMat.emissive.setHex(color);
    laptop.displayMat.emissive.setHex(color);
});

// Compare button
const originalPositions = {
    A: { x: -2.5, rotY: 0 },
    B: { x: 2.5, rotY: 0 }
};

document.getElementById('compare-btn').addEventListener('click', () => {
    state.comparisonActive = !state.comparisonActive;

    if (state.comparisonActive) {
        document.getElementById('compare-info').textContent = 'Comparison Active';
    } else {
        document.getElementById('compare-info').textContent = '';
    }
});

// Animation
const clock = new THREE.Clock();

function updateScreenAngle(laptop, targetAngleDeg) {
    const targetRad = -(Math.PI - THREE.MathUtils.degToRad(targetAngleDeg));
    const current = laptop.screenPivot.rotation.x;
    laptop.screenPivot.rotation.x += (targetRad - current) * 0.1;
}

function smoothMove(current, target, speed) {
    return current + (target - current) * speed;
}

function animate() {
    requestAnimationFrame(animate);

    const elapsed = clock.getElapsedTime();
    const delta = clock.getDelta();

    // Parrot bobbing
    if (parrot) {
        const bobY = 2.5 + Math.sin(elapsed * Math.PI) * 0.2;
        parrot.position.y = bobY;
        state.parrotY = bobY;
        parrot.rotation.y = elapsed * 0.5;

        if (parrot.mixer) {
            parrot.mixer.update(0.016);
        }
    }

    // Update screen angles
    updateScreenAngle(laptopA, state.laptopA_angle);
    updateScreenAngle(laptopB, state.laptopB_angle);

    // Elevation animation
    const targetYA = state.laptopA_elevated ? 0.3 : 0;
    const targetYB = state.laptopB_elevated ? 0.3 : 0;
    laptopA.currentY = smoothMove(laptopA.group.position.y, targetYA, 0.1);
    laptopB.currentY = smoothMove(laptopB.group.position.y, targetYB, 0.1);
    laptopA.group.position.y = laptopA.currentY;
    laptopB.group.position.y = laptopB.currentY;

    // Comparison mode positions
    const targetAX = state.comparisonActive ? -1.5 : -2.5;
    const targetBX = state.comparisonActive ? 1.5 : 2.5;
    laptopA.group.position.x = smoothMove(laptopA.group.position.x, targetAX, 0.08);
    laptopB.group.position.x = smoothMove(laptopB.group.position.x, targetBX, 0.08);

    // Rotate to face camera in comparison mode
    const targetRotY = state.comparisonActive ? 0 : 0;
    laptopA.group.rotation.y = smoothMove(laptopA.group.rotation.y, targetRotY, 0.08);
    laptopB.group.rotation.y = smoothMove(laptopB.group.rotation.y, targetRotY, 0.08);

    // Update angle display
    if (state.selectedLaptop === 'A') {
        document.getElementById('angle-display').textContent = `Screen Angle: ${state.laptopA_angle}°`;
    } else if (state.selectedLaptop === 'B') {
        document.getElementById('angle-display').textContent = `Screen Angle: ${state.laptopB_angle}°`;
    } else {
        document.getElementById('angle-display').textContent = 'Screen Angle: --';
    }

    controls.update();
    renderer.render(scene, camera);
}

animate();

// Resize handler
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
