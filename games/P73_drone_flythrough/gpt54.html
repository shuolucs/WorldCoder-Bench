<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 无人机式相机巡览 - CatmullRomCurve3 + POI</title>
  <style>
    :root {
      --panel-bg: rgba(18, 22, 28, 0.82);
      --panel-border: rgba(255,255,255,0.12);
      --text: #eaf2ff;
      --muted: #b7c5dc;
      --accent: #4fc3f7;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #87b7e3;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      width: min(360px, calc(100vw - 24px));
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.24);
    }

    #ui h1 {
      margin: 0 0 10px;
      font-size: 16px;
      line-height: 1.3;
    }

    .row {
      margin: 10px 0;
    }

    .row label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .inline {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button, input[type="range"] {
      width: 100%;
    }

    button {
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      background: #1c2736;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
    }

    button:hover {
      background: #233246;
    }

    input[type="checkbox"] {
      transform: translateY(1px);
    }

    .value {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    #poiInfo {
      position: fixed;
      right: 12px;
      top: 12px;
      z-index: 20;
      width: min(320px, calc(100vw - 24px));
      min-height: 88px;
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.24);
      color: var(--text);
    }

    #poiInfo .title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    #poiInfo .desc {
      font-size: 13px;
      line-height: 1.55;
      color: var(--muted);
    }

    #hint {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 20;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(18,22,28,0.7);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
      font-size: 12px;
      max-width: min(460px, calc(100vw - 24px));
    }

    .poi-label {
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.18);
      white-space: nowrap;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app"></div>

  <div id="ui">
    <h1>无人机式相机巡览</h1>

    <div class="row">
      <button id="playBtn" aria-pressed="true">暂停</button>
    </div>

    <div class="row">
      <label for="speedSlider">速度</label>
      <input id="speedSlider" type="range" min="0.2" max="3.0" step="0.1" value="1.0" />
      <div class="value" id="speedValue">1.0x</div>
    </div>

    <div class="row">
      <label for="pathProgress">路径进度</label>
      <input id="pathProgress" type="range" min="0" max="1" step="0.001" value="0" />
      <div class="value" id="pathValue">0.000</div>
    </div>

    <div class="row inline">
      <label style="margin:0;">
        <input id="manualOverrideToggle" type="checkbox" />
        手动控制相机（OrbitControls）
      </label>
    </div>
  </div>

  <div id="poiInfo">
    <div class="title">POI 信息</div>
    <div class="desc">点击场景中的 POI 球体查看名称与描述。</div>
  </div>

  <div id="hint">
    提示：自动模式下相机会沿 CatmullRomCurve3 巡览；勾选“手动控制相机”后可鼠标旋转/缩放/平移，并暂停自动巡航。
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    const app = document.getElementById('app');
    const playBtn = document.getElementById('playBtn');
    const speedSlider = document.getElementById('speedSlider');
    const speedValue = document.getElementById('speedValue');
    const pathProgress = document.getElementById('pathProgress');
    const pathValue = document.getElementById('pathValue');
    const manualOverrideToggle = document.getElementById('manualOverrideToggle');
    const poiInfo = document.getElementById('poiInfo');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x9fd0ff);
    scene.fog = new THREE.Fog(0x9fd0ff, 120, 350);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 18, 35);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'fixed';
    labelRenderer.domElement.style.inset = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    labelRenderer.domElement.style.zIndex = '10';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enabled = false;
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.target.set(0, 6, 0);

    const hemi = new THREE.HemisphereLight(0xffffff, 0x6b8e5a, 1.2);
    scene.add(hemi);

    const dir = new THREE.DirectionalLight(0xffffff, 1.2);
    dir.position.set(60, 80, 20);
    dir.castShadow = true;
    dir.shadow.mapSize.set(2048, 2048);
    dir.shadow.camera.left = -160;
    dir.shadow.camera.right = 160;
    dir.shadow.camera.top = 160;
    dir.shadow.camera.bottom = -160;
    scene.add(dir);

    const ambient = new THREE.AmbientLight(0xffffff, 0.25);
    scene.add(ambient);

    // Ground
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(500, 500),
      new THREE.MeshStandardMaterial({ color: 0x7db36f })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Road
    const road = new THREE.Mesh(
      new THREE.PlaneGeometry(220, 18),
      new THREE.MeshStandardMaterial({ color: 0x2f3136, roughness: 0.95, metalness: 0.02 })
    );
    road.rotation.x = -Math.PI / 2;
    road.position.set(0, 0.02, 0);
    road.receiveShadow = true;
    scene.add(road);

    // Lane marks
    for (let i = -10; i <= 10; i++) {
      const mark = new THREE.Mesh(
        new THREE.PlaneGeometry(6, 0.5),
        new THREE.MeshStandardMaterial({ color: 0xf4f0c8 })
      );
      mark.rotation.x = -Math.PI / 2;
      mark.position.set(i * 10, 0.03, 0);
      scene.add(mark);
    }

    // Trees
    function createTree(x, z, scale = 1) {
      const group = new THREE.Group();

      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.55 * scale, 0.7 * scale, 4 * scale, 10),
        new THREE.MeshStandardMaterial({ color: 0x7a4d2a })
      );
      trunk.position.y = 2 * scale;
      trunk.castShadow = true;
      trunk.receiveShadow = true;

      const crown = new THREE.Mesh(
        new THREE.ConeGeometry(2.6 * scale, 6 * scale, 12),
        new THREE.MeshStandardMaterial({ color: 0x2f8f46 })
      );
      crown.position.y = 6 * scale;
      crown.castShadow = true;
      crown.receiveShadow = true;

      group.add(trunk, crown);
      group.position.set(x, 0, z);
      scene.add(group);
    }

    const treePositions = [
      [-70, -28], [-52, 24], [-35, -32], [-15, 30], [8, -26],
      [28, 28], [52, -30], [70, 26], [90, -20], [-92, 20]
    ];
    treePositions.forEach((p, i) => createTree(p[0], p[1], 0.9 + (i % 3) * 0.15));

    // Buildings
    function createBuilding(x, z, w, h, d, color) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshStandardMaterial({ color, roughness: 0.75, metalness: 0.05 })
      );
      mesh.position.set(x, h / 2, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
    }

    createBuilding(-55, 55, 14, 18, 12, 0xc9b28c);
    createBuilding(-5, 52, 18, 26, 16, 0xa8b7c9);
    createBuilding(38, 50, 16, 22, 14, 0xd1a4a4);
    createBuilding(78, 58, 20, 30, 18, 0xb7c7a1);
    createBuilding(58, -58, 24, 16, 20, 0xa5a1c7);

    // Curve path: at least 10 control points
    const controlPoints = [
      new THREE.Vector3(-95, 20, -50),
      new THREE.Vector3(-70, 24, -10),
      new THREE.Vector3(-30, 18, 25),
      new THREE.Vector3(5, 22, 45),
      new THREE.Vector3(40, 20, 25),
      new THREE.Vector3(82, 26, 5),
      new THREE.Vector3(95, 21, -35),
      new THREE.Vector3(60, 18, -72),
      new THREE.Vector3(15, 24, -88),
      new THREE.Vector3(-35, 19, -76),
      new THREE.Vector3(-78, 23, -72),
      new THREE.Vector3(-102, 21, -30)
    ];

    const curve = new THREE.CatmullRomCurve3(controlPoints, true, 'catmullrom', 0.12);

    const curvePoints = curve.getPoints(500);
    const curveLine = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(curvePoints),
      new THREE.LineBasicMaterial({ color: 0x00d0ff })
    );
    scene.add(curveLine);

    // POIs
    const poiData = [
      {
        name: '观景草坡',
        desc: '适合俯瞰道路与树阵的开阔草地。',
        position: new THREE.Vector3(-82, 3, 42),
        color: 0xff6b6b
      },
      {
        name: '中央道路口',
        desc: '场景中心区域，可观察无人机巡航主干路线。',
        position: new THREE.Vector3(0, 3, 0),
        color: 0xffc857
      },
      {
        name: '北侧楼群',
        desc: '五栋简化建筑集中分布的区域。',
        position: new THREE.Vector3(35, 3, 60),
        color: 0x4dd599
      },
      {
        name: '南侧仓储点',
        desc: '靠近低矮建筑与道路尾部的观察点。',
        position: new THREE.Vector3(58, 3, -58),
        color: 0x5aa9e6
      },
      {
        name: '林地边缘',
        desc: '树木分布较密，适合低空缓速巡览。',
        position: new THREE.Vector3(-38, 3, -42),
        color: 0xc77dff
      }
    ];

    const poiGroup = new THREE.Group();
    scene.add(poiGroup);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const poiMeshes = [];

    poiData.forEach((poi) => {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(2.2, 24, 24),
        new THREE.MeshStandardMaterial({
          color: poi.color,
          emissive: poi.color,
          emissiveIntensity: 0.25
        })
      );
      mesh.position.copy(poi.position);
      mesh.castShadow = true;
      mesh.userData.poi = poi;
      poiGroup.add(mesh);
      poiMeshes.push(mesh);

      const labelEl = document.createElement('div');
      labelEl.className = 'poi-label';
      labelEl.textContent = poi.name;

      const labelObj = new CSS2DObject(labelEl);
      labelObj.position.set(0, 3.4, 0);
      mesh.add(labelObj);
    });

    // State
    let t = 0;
    let speed = parseFloat(speedSlider.value);
    let isPaused = false;
    let currentPOI = null;
    let isDraggingPath = false;

    function updatePOIInfo(poi) {
      if (!poi) {
        currentPOI = null;
        poiInfo.innerHTML = `
          <div class="title">POI 信息</div>
          <div class="desc">点击场景中的 POI 球体查看名称与描述。</div>
        `;
      } else {
        currentPOI = poi.name;
        poiInfo.innerHTML = `
          <div class="title">${poi.name}</div>
          <div class="desc">${poi.desc}</div>
        `;
      }
      syncState();
    }

    function setPaused(v) {
      isPaused = v;
      playBtn.textContent = isPaused ? '播放' : '暂停';
      playBtn.setAttribute('aria-pressed', String(!isPaused));
      syncState();
    }

    function setSpeed(v) {
      speed = v;
      speedSlider.value = String(v);
      speedValue.textContent = `${v.toFixed(1)}x`;
      syncState();
    }

    function setProgress(v) {
      t = ((v % 1) + 1) % 1;
      pathProgress.value = String(t);
      pathValue.textContent = t.toFixed(3);
      updateCameraOnPath();
      syncState();
    }

    function updateCameraOnPath() {
      const pos = curve.getPointAt(t);
      const lookAhead = curve.getPointAt((t + 0.01) % 1);

      camera.position.copy(pos);

      if (!manualOverrideToggle.checked) {
        controls.target.lerp(lookAhead, 1);
        camera.lookAt(lookAhead);
      }
    }

    function syncState() {
      window.__3D_STATE__ = {
        pathProgress: t,
        speed: speed,
        isPaused: isPaused,
        currentPOI: currentPOI,
        cameraPos: {
          x: camera.position.x,
          y: camera.position.y,
          z: camera.position.z
        },
        poiCount: poiData.length
      };
    }

    playBtn.addEventListener('click', () => {
      if (manualOverrideToggle.checked) return;
      setPaused(!isPaused);
    });

    speedSlider.addEventListener('input', (e) => {
      setSpeed(parseFloat(e.target.value));
    });

    pathProgress.addEventListener('pointerdown', () => {
      isDraggingPath = true;
    });

    pathProgress.addEventListener('pointerup', () => {
      isDraggingPath = false;
    });

    pathProgress.addEventListener('input', (e) => {
      setProgress(parseFloat(e.target.value));
    });

    manualOverrideToggle.addEventListener('change', (e) => {
      const manual = e.target.checked;
      controls.enabled = manual;
      if (manual) {
        setPaused(true);
      } else {
        updateCameraOnPath();
      }
      syncState();
    });

    renderer.domElement.addEventListener('pointerdown', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(poiMeshes, false);
      if (intersects.length > 0) {
        const poi = intersects[0].object.userData.poi;
        updatePOIInfo(poi);
      }
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();

      if (!isPaused && !manualOverrideToggle.checked && !isDraggingPath) {
        t = (t + dt * 0.03 * speed) % 1;
        pathProgress.value = String(t);
        pathValue.textContent = t.toFixed(3);
        updateCameraOnPath();
      }

      if (manualOverrideToggle.checked) {
        controls.update();
      }

      poiMeshes.forEach((mesh, i) => {
        mesh.position.y = poiData[i].position.y + Math.sin(performance.now() * 0.002 + i) * 0.35;
      });

      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
      syncState();
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
      syncState();
    });

    setSpeed(speed);
    setPaused(false);
    setProgress(0);
    updatePOIInfo(null);
    animate();
  </script>
</body>
</html>
