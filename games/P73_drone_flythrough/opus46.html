<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drone Camera Tour</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #000; }
canvas { display: block; }

#controls {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 100;
  background: rgba(10, 10, 30, 0.85);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 18px 22px;
  color: #e0e0e0;
  min-width: 280px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

#controls h3 {
  margin-bottom: 14px;
  font-size: 15px;
  color: #8ecfff;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding-bottom: 8px;
}

.ctrl-row {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
  gap: 10px;
}

.ctrl-row label {
  font-size: 13px;
  min-width: 90px;
  color: #aaa;
}

#playBtn {
  background: linear-gradient(135deg, #2196F3, #1565C0);
  color: white;
  border: none;
  padding: 8px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  transition: all 0.2s;
  width: 100%;
}
#playBtn:hover { background: linear-gradient(135deg, #42A5F5, #1976D2); transform: translateY(-1px); }

input[type="range"] {
  flex: 1;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #42A5F5;
  cursor: pointer;
  box-shadow: 0 0 6px rgba(66,165,245,0.5);
}

.ctrl-row .val {
  font-size: 12px;
  color: #8ecfff;
  min-width: 36px;
  text-align: right;
  font-family: monospace;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}
.checkbox-row input[type="checkbox"] {
  accent-color: #42A5F5;
  width: 16px; height: 16px;
}
.checkbox-row label {
  font-size: 13px;
  color: #ccc;
  cursor: pointer;
}

#poiInfo {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  background: rgba(10, 10, 30, 0.9);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(66,165,245,0.3);
  border-radius: 12px;
  padding: 16px 28px;
  color: #e0e0e0;
  text-align: center;
  min-width: 300px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
}
#poiInfo.hidden { opacity: 0; transform: translateX(-50%) translateY(10px); }
#poiInfo .poi-name { font-size: 16px; font-weight: 700; color: #8ecfff; margin-bottom: 4px; }
#poiInfo .poi-desc { font-size: 13px; color: #aaa; }

.poi-label {
  position: absolute;
  color: white;
  font-size: 12px;
  font-weight: 600;
  background: rgba(33, 150, 243, 0.8);
  padding: 3px 10px;
  border-radius: 10px;
  pointer-events: none;
  white-space: nowrap;
  transform: translate(-50%, -100%);
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<div id="controls">
  <h3>🚁 Drone Tour</h3>
  <div class="ctrl-row">
    <button id="playBtn">⏸ Pause</button>
  </div>
  <div class="ctrl-row">
    <label>Speed</label>
    <input type="range" id="speedSlider" min="0.2" max="3.0" step="0.1" value="1.0">
    <span class="val" id="speedVal">1.0x</span>
  </div>
  <div class="ctrl-row">
    <label>Progress</label>
    <input type="range" id="pathProgress" min="0" max="100" step="0.1" value="0">
    <span class="val" id="progressVal">0%</span>
  </div>
  <div class="ctrl-row checkbox-row">
    <input type="checkbox" id="manualOverrideToggle">
    <label for="manualOverrideToggle">Manual Camera (Orbit)</label>
  </div>
</div>

<div id="poiInfo" class="hidden">
  <div class="poi-name"></div>
  <div class="poi-desc"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── State ───
window.__3D_STATE__ = {
  pathProgress: 0,
  speed: 1.0,
  isPaused: false,
  currentPOI: null,
  cameraPos: { x: 0, y: 0, z: 0 },
  poiCount: 5
};

// ─── Scene Setup ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.FogExp2(0x87CEEB, 0.003);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.5, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Orbit Controls
const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.05;
orbitControls.enabled = false;

// ─── Lights ───
const ambientLight = new THREE.AmbientLight(0x6688cc, 0.6);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xfff5e0, 1.8);
sunLight.position.set(80, 120, 60);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.left = -150;
sunLight.shadow.camera.right = 150;
sunLight.shadow.camera.top = 150;
sunLight.shadow.camera.bottom = -150;
sunLight.shadow.camera.far = 400;
sunLight.shadow.bias = -0.001;
scene.add(sunLight);

const hemiLight = new THREE.HemisphereLight(0x88bbff, 0x445522, 0.4);
scene.add(hemiLight);

// ─── Ground ───
const groundGeo = new THREE.PlaneGeometry(500, 500);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x4a7c3f, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ─── Road ───
const roadShape = new THREE.Shape();
roadShape.moveTo(-200, -4);
roadShape.lineTo(200, -4);
roadShape.lineTo(200, 4);
roadShape.lineTo(-200, 4);
roadShape.closePath();

const roadGeo = new THREE.PlaneGeometry(400, 8);
const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
const road = new THREE.Mesh(roadGeo, roadMat);
road.rotation.x = -Math.PI / 2;
road.position.y = 0.05;
scene.add(road);

// Road markings
const markGeo = new THREE.PlaneGeometry(6, 0.3);
const markMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
for (let i = -190; i < 200; i += 12) {
  const mark = new THREE.Mesh(markGeo, markMat);
  mark.rotation.x = -Math.PI / 2;
  mark.position.set(i, 0.06, 0);
  scene.add(mark);
}

// Second road (perpendicular)
const road2 = new THREE.Mesh(new THREE.PlaneGeometry(8, 300), roadMat);
road2.rotation.x = -Math.PI / 2;
road2.position.set(30, 0.05, 0);
scene.add(road2);

// ─── Trees ───
function createTree(x, z, scale = 1) {
  const group = new THREE.Group();
  
  const trunkGeo = new THREE.CylinderGeometry(0.3 * scale, 0.5 * scale, 4 * scale, 8);
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = 2 * scale;
  trunk.castShadow = true;
  group.add(trunk);
  
  const crownGeo = new THREE.ConeGeometry(3 * scale, 6 * scale, 8);
  const crownMat = new THREE.MeshStandardMaterial({ color: 0x2d6b2d + Math.floor(Math.random() * 0x1a3a1a), roughness: 0.8 });
  const crown = new THREE.Mesh(crownGeo, crownMat);
  crown.position.y = 6 * scale;
  crown.castShadow = true;
  group.add(crown);
  
  group.position.set(x, 0, z);
  scene.add(group);
  return group;
}

const treePositions = [
  [-20, -25], [-45, 15], [60, -30], [15, 40], [-70, -10],
  [80, 25], [-30, 50], [50, -55], [-60, 35], [100, -15]
];
treePositions.forEach(([x, z]) => {
  createTree(x, z, 0.8 + Math.random() * 0.8);
});

// ─── Buildings ───
function createBuilding(x, z, w, d, h, color) {
  const group = new THREE.Group();
  
  const bodyGeo = new THREE.BoxGeometry(w, h, d);
  const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.1 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = h / 2;
  body.castShadow = true;
  body.receiveShadow = true;
  group.add(body);
  
  // Windows
  const winMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, emissive: 0x224466, emissiveIntensity: 0.3, metalness: 0.5, roughness: 0.2 });
  const winGeo = new THREE.PlaneGeometry(1.2, 1.5);
  for (let floor = 0; floor < Math.floor(h / 4); floor++) {
    for (let wx = -w/2 + 2; wx < w/2 - 1; wx += 2.5) {
      // Front
      const win1 = new THREE.Mesh(winGeo, winMat);
      win1.position.set(wx, 2 + floor * 4, d/2 + 0.01);
      group.add(win1);
      // Back
      const win2 = new THREE.Mesh(winGeo, winMat);
      win2.position.set(wx, 2 + floor * 4, -d/2 - 0.01);
      win2.rotation.y = Math.PI;
      group.add(win2);
    }
  }
  
  group.position.set(x, 0, z);
  scene.add(group);
  return group;
}

const buildings = [
  createBuilding(-40, -50, 12, 10, 20, 0x8899aa),
  createBuilding(50, 20, 8, 8, 30, 0x99887a),
  createBuilding(-15, 60, 15, 12, 15, 0x7a8899),
  createBuilding(80, -45, 10, 10, 25, 0xaa9988),
  createBuilding(-80, 20, 14, 8, 18, 0x889977),
];

// ─── Camera Path ───
const pathPoints = [
  new THREE.Vector3(-100, 30, -60),
  new THREE.Vector3(-60, 25, -40),
  new THREE.Vector3(-30, 35, -55),
  new THREE.Vector3(10, 20, -30),
  new THREE.Vector3(50, 40, -50),
  new THREE.Vector3(90, 30, -20),
  new THREE.Vector3(80, 25, 30),
  new THREE.Vector3(40, 35, 55),
  new THREE.Vector3(-10, 20, 65),
  new THREE.Vector3(-50, 30, 45),
  new THREE.Vector3(-85, 35, 15),
  new THREE.Vector3(-100, 30, -20),
];

const curve = new THREE.CatmullRomCurve3(pathPoints, true, 'catmullrom', 0.5);

// Visualize path
const pathGeo = new THREE.TubeGeometry(curve, 200, 0.3, 8, true);
const pathMat = new THREE.MeshStandardMaterial({ color: 0xff4444, transparent: true, opacity: 0.3 });
const pathMesh = new THREE.Mesh(pathGeo, pathMat);
scene.add(pathMesh);

// ─── POI ───
const poiData = [
  { name: "City Hall", desc: "The main administrative building of the district, featuring modern architecture.", pos: new THREE.Vector3(-40, 22, -50), color: 0xff4444 },
  { name: "Tech Tower", desc: "A 30-story innovation hub housing over 50 tech startups.", pos: new THREE.Vector3(50, 32, 20), color: 0x44ff44 },
  { name: "Central Park", desc: "A beautiful green space with walking trails and a small lake.", pos: new THREE.Vector3(15, 5, 40), color: 0x44aaff },
  { name: "Observatory", desc: "Hilltop observatory offering panoramic views of the entire city.", pos: new THREE.Vector3(80, 27, -45), color: 0xffaa44 },
  { name: "Art Museum", desc: "Home to over 10,000 contemporary and classical artworks.", pos: new THREE.Vector3(-80, 20, 20), color: 0xff44ff },
];

const poiMeshes = [];
const poiLabels = [];
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

poiData.forEach((poi, i) => {
  // Sphere
  const sphereGeo = new THREE.SphereGeometry(1.5, 16, 16);
  const sphereMat = new THREE.MeshStandardMaterial({ 
    color: poi.color, 
    emissive: poi.color, 
    emissiveIntensity: 0.5,
    metalness: 0.3,
    roughness: 0.4
  });
  const sphere = new THREE.Mesh(sphereGeo, sphereMat);
  sphere.position.copy(poi.pos);
  sphere.userData = { poiIndex: i };
  scene.add(sphere);
  poiMeshes.push(sphere);
  
  // Ring around sphere
  const ringGeo = new THREE.TorusGeometry(2.5, 0.15, 8, 32);
  const ringMat = new THREE.MeshStandardMaterial({ color: poi.color, emissive: poi.color, emissiveIntensity: 0.8 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.copy(poi.pos);
  ring.rotation.x = Math.PI / 2;
  ring.userData.ring = true;
  scene.add(ring);
  
  // HTML label
  const label = document.createElement('div');
  label.className = 'poi-label';
  label.textContent = poi.name;
  document.body.appendChild(label);
  poiLabels.push(label);
});

// ─── POI Click ───
const poiInfoDiv = document.getElementById('poiInfo');
const poiNameEl = poiInfoDiv.querySelector('.poi-name');
const poiDescEl = poiInfoDiv.querySelector('.poi-desc');

renderer.domElement.addEventListener('click', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(poiMeshes);
  if (intersects.length > 0) {
    const idx = intersects[0].object.userData.poiIndex;
    const poi = poiData[idx];
    poiNameEl.textContent = `📍 ${poi.name}`;
    poiDescEl.textContent = poi.desc;
    poiInfoDiv.classList.remove('hidden');
    window.__3D_STATE__.currentPOI = poi.name;
    
    clearTimeout(poiInfoDiv._hideTimer);
    poiInfoDiv._hideTimer = setTimeout(() => {
      poiInfoDiv.classList.add('hidden');
      window.__3D_STATE__.currentPOI = null;
    }, 5000);
  }
});

// ─── Controls ───
const playBtn = document.getElementById('playBtn');
const speedSlider = document.getElementById('speedSlider');
const speedVal = document.getElementById('speedVal');
const pathProgressSlider = document.getElementById('pathProgress');
const progressVal = document.getElementById('progressVal');
const manualToggle = document.getElementById('manualOverrideToggle');

let isPaused = false;
let speed = 1.0;
let t = 0;
let manualOverride = false;
let isDraggingProgress = false;

playBtn.addEventListener('click', () => {
  isPaused = !isPaused;
  playBtn.textContent = isPaused ? '▶ Play' : '⏸ Pause';
  playBtn.setAttribute('aria-pressed', isPaused);
  window.__3D_STATE__.isPaused = isPaused;
});

speedSlider.addEventListener('input', () => {
  speed = parseFloat(speedSlider.value);
  speedVal.textContent = speed.toFixed(1) + 'x';
  window.__3D_STATE__.speed = speed;
});

pathProgressSlider.addEventListener('mousedown', () => { isDraggingProgress = true; });
pathProgressSlider.addEventListener('touchstart', () => { isDraggingProgress = true; });
pathProgressSlider.addEventListener('input', () => {
  t = parseFloat(pathProgressSlider.value) / 100;
  progressVal.textContent = Math.round(t * 100) + '%';
  window.__3D_STATE__.pathProgress = t;
});
window.addEventListener('mouseup', () => { isDraggingProgress = false; });
window.addEventListener('touchend', () => { isDraggingProgress = false; });

manualToggle.addEventListener('change', () => {
  manualOverride = manualToggle.checked;
  orbitControls.enabled = manualOverride;
  if (manualOverride) {
    const pos = curve.getPoint(t);
    orbitControls.target.set(pos.x, 0, pos.z);
  }
});

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Update POI Labels ───
function updatePOILabels() {
  poiData.forEach((poi, i) => {
    const pos = poi.pos.clone();
    pos.y += 3.5;
    const projected = pos.clone().project(camera);
    
    if (projected.z > 1) {
      poiLabels[i].style.display = 'none';
      return;
    }
    
    const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;
    
    poiLabels[i].style.display = 'block';
    poiLabels[i].style.left = x + 'px';
    poiLabels[i].style.top = y + 'px';
  });
}

// ─── Animate ───
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  
  // Animate POI rings
  const time = clock.elapsedTime;
  poiMeshes.forEach((mesh, i) => {
    mesh.position.y = poiData[i].pos.y + Math.sin(time * 2 + i) * 0.5;
  });
  
  if (!manualOverride) {
    if (!isPaused && !isDraggingProgress) {
      t += delta * speed * 0.015;
      if (t > 1) t -= 1;
      if (t < 0) t = 0;
    }
    
    const pos = curve.getPoint(t);
    const lookAhead = curve.getPoint((t + 0.01) % 1);
    
    camera.position.copy(pos);
    camera.lookAt(lookAhead);
    
    // Slight banking effect
    const tangent = curve.getTangent(t);
    const nextTangent = curve.getTangent((t + 0.01) % 1);
    const cross = new THREE.Vector3().crossVectors(tangent, nextTangent);
    camera.rotation.z += cross.y * 0.5;
  } else {
    orbitControls.update();
  }
  
  // Update progress slider
  if (!isDraggingProgress) {
    pathProgressSlider.value = (t * 100).toFixed(1);
    progressVal.textContent = Math.round(t * 100) + '%';
  }
  
  // Update state
  window.__3D_STATE__.pathProgress = t;
  window.__3D_STATE__.cameraPos.x = camera.position.x;
  window.__3D_STATE__.cameraPos.y = camera.position.y;
  window.__3D_STATE__.cameraPos.z = camera.position.z;
  
  updatePOILabels();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
