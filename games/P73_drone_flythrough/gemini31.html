<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Drone Tour</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            background-color: #87CEEB;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 300px;
            z-index: 10;
            backdrop-filter: blur(5px);
        }
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        button {
            cursor: pointer;
            padding: 5px 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }
        button:hover { background: #45a049; }
        input[type="range"] { flex-grow: 1; }
        #poiInfo {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 15px;
            border-radius: 8px;
            max-width: 250px;
            display: none;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-left: 5px solid #2196F3;
        }
        #poiInfo h3 { margin: 0 0 5px 0; font-size: 16px; }
        #poiInfo p { margin: 0; font-size: 14px; }
        .poi-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            transform: translate(-50%, -100%);
            margin-top: -10px;
            white-space: nowrap;
            z-index: 5;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-panel">
        <div class="control-row">
            <button id="playBtn">Pause</button>
            <label><input type="checkbox" id="manualOverrideToggle"> Manual Override</label>
        </div>
        <div class="control-row">
            <span>Speed:</span>
            <input type="range" id="speedSlider" min="0.2" max="3.0" step="0.1" value="1.0">
        </div>
        <div class="control-row">
            <span>Progress:</span>
            <input type="range" id="pathProgress" min="0" max="1" step="0.001" value="0">
        </div>
    </div>

    <div id="poiInfo">
        <h3 id="poiTitle"></h3>
        <p id="poiDesc"></p>
    </div>

    <div id="labels-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State ---
        window.__3D_STATE__ = {
            pathProgress: 0,
            speed: 1.0,
            isPaused: false,
            currentPOI: null,
            cameraPos: { x: 0, y: 0, z: 0 },
            poiCount: 5
        };

        let t = 0;
        let manualOverride = false;
        const baseSpeed = 0.03; 
        const clock = new THREE.Clock();

        // --- Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.005);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enabled = false;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 100;
        dirLight.shadow.camera.bottom = -100;
        dirLight.shadow.camera.left = -100;
        dirLight.shadow.camera.right = 100;
        scene.add(dirLight);

        // --- Scene Objects ---
        // Ground
        const groundGeo = new THREE.PlaneGeometry(300, 300);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x4CAF50 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Road
        const roadGeo = new THREE.PlaneGeometry(12, 300);
        const roadMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        road.position.y = 0.1;
        road.receiveShadow = true;
        scene.add(road);

        // Trees (10)
        const treeTrunkGeo = new THREE.CylinderGeometry(0.5, 0.8, 3);
        const treeTrunkMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
        const treeCrownGeo = new THREE.ConeGeometry(3, 6, 8);
        const treeCrownMat = new THREE.MeshLambertMaterial({ color: 0x228B22 });

        for (let i = 0; i < 10; i++) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(treeTrunkGeo, treeTrunkMat);
            trunk.position.y = 1.5;
            trunk.castShadow = true;
            const crown = new THREE.Mesh(treeCrownGeo, treeCrownMat);
            crown.position.y = 6;
            crown.castShadow = true;
            tree.add(trunk);
            tree.add(crown);

            let x = (Math.random() - 0.5) * 200;
            let z = (Math.random() - 0.5) * 200;
            if (Math.abs(x) < 15) x += (x > 0 ? 15 : -15); 
            tree.position.set(x, 0, z);
            scene.add(tree);
        }

        // Buildings (5)
        const buildingMat = new THREE.MeshLambertMaterial({ color: 0xcccccc });
        const buildingPositions = [
            { x: 30, z: 40 }, { x: -40, z: 20 }, { x: 25, z: -30 }, { x: -35, z: -40 }, { x: 50, z: 0 }
        ];
        
        buildingPositions.forEach(pos => {
            const height = 10 + Math.random() * 20;
            const width = 10 + Math.random() * 10;
            const depth = 10 + Math.random() * 10;
            const bGeo = new THREE.BoxGeometry(width, height, depth);
            const building = new THREE.Mesh(bGeo, buildingMat);
            building.position.set(pos.x, height / 2, pos.z);
            building.castShadow = true;
            building.receiveShadow = true;
            scene.add(building);
        });

        // --- Path (CatmullRomCurve3) ---
        const curvePoints = [
            new THREE.Vector3(0, 15, 80),
            new THREE.Vector3(40, 20, 50),
            new THREE.Vector3(60, 25, 0),
            new THREE.Vector3(40, 18, -50),
            new THREE.Vector3(0, 15, -70),
            new THREE.Vector3(-40, 22, -50),
            new THREE.Vector3(-60, 15, 0),
            new THREE.Vector3(-40, 20, 50),
            new THREE.Vector3(-20, 12, 70),
            new THREE.Vector3(0, 15, 80)
        ];
        const curve = new THREE.CatmullRomCurve3(curvePoints, true);

        // Optional: Visualize path
        const pathGeo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(100));
        const pathMat = new THREE.LineBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.3 });
        const pathLine = new THREE.Line(pathGeo, pathMat);
        scene.add(pathLine);

        // --- POIs ---
        const poiData = [
            { pos: new THREE.Vector3(30, 5, 40), name: "East Tower", desc: "A tall residential building on the east side." },
            { pos: new THREE.Vector3(-40, 5, 20), name: "West Complex", desc: "Commercial complex with modern architecture." },
            { pos: new THREE.Vector3(0, 2, 0), name: "Central Plaza", desc: "The main intersection of the area." },
            { pos: new THREE.Vector3(25, 5, -30), name: "North Office", desc: "Corporate headquarters." },
            { pos: new THREE.Vector3(-35, 5, -40), name: "Park View", desc: "Building overlooking the green spaces." }
        ];

        const poiMeshes = [];
        const poiLabels = [];
        const labelsContainer = document.getElementById('labels-container');
        const sphereGeo = new THREE.SphereGeometry(2, 16, 16);
        const sphereMat = new THREE.MeshBasicMaterial({ color: 0xff3333 });

        poiData.forEach((data, index) => {
            const sphere = new THREE.Mesh(sphereGeo, sphereMat);
            sphere.position.copy(data.pos);
            sphere.userData = { id: index, name: data.name, desc: data.desc };
            scene.add(sphere);
            poiMeshes.push(sphere);

            const label = document.createElement('div');
            label.className = 'poi-label';
            label.textContent = data.name;
            labelsContainer.appendChild(label);
            poiLabels.push({ element: label, pos: data.pos });
        });

        // --- UI & Controls ---
        const playBtn = document.getElementById('playBtn');
        const speedSlider = document.getElementById('speedSlider');
        const pathProgress = document.getElementById('pathProgress');
        const manualOverrideToggle = document.getElementById('manualOverrideToggle');
        const poiInfoPanel = document.getElementById('poiInfo');
        const poiTitle = document.getElementById('poiTitle');
        const poiDesc = document.getElementById('poiDesc');

        playBtn.addEventListener('click', () => {
            window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
            playBtn.textContent = window.__3D_STATE__.isPaused ? "Play" : "Pause";
        });

        speedSlider.addEventListener('input', (e) => {
            window.__3D_STATE__.speed = parseFloat(e.target.value);
        });

        pathProgress.addEventListener('input', (e) => {
            t = parseFloat(e.target.value);
            window.__3D_STATE__.pathProgress = t;
            updateCameraFromPath();
        });

        manualOverrideToggle.addEventListener('change', (e) => {
            manualOverride = e.target.checked;
            controls.enabled = manualOverride;
            if (manualOverride) {
                const lookAtPos = curve.getPoint((t + 0.05) % 1.0);
                controls.target.copy(lookAtPos);
            }
        });

        // --- Raycaster (Click POI) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            if (event.target.tagName === 'BUTTON' || event.target.tagName === 'INPUT') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(poiMeshes);

            if (intersects.length > 0) {
                const data = intersects[0].object.userData;
                window.__3D_STATE__.currentPOI = data.name;
                poiTitle.textContent = data.name;
                poiDesc.textContent = data.desc;
                poiInfoPanel.style.display = 'block';
            } else {
                window.__3D_STATE__.currentPOI = null;
                poiInfoPanel.style.display = 'none';
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function updateCameraFromPath() {
            const pos = curve.getPoint(t);
            const lookAtPos = curve.getPoint((t + 0.01) % 1.0);
            camera.position.copy(pos);
            camera.lookAt(lookAtPos);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (!manualOverride) {
                if (!window.__3D_STATE__.isPaused) {
                    t += delta * baseSpeed * window.__3D_STATE__.speed;
                    t = t % 1.0;
                    window.__3D_STATE__.pathProgress = t;
                    pathProgress.value = t;
                }
                updateCameraFromPath();
            } else {
                controls.update();
            }

            // Update POI Labels
            poiLabels.forEach(item => {
                const vector = item.pos.clone();
                vector.project(camera);
                
                if (vector.z > 1) {
                    item.element.style.display = 'none';
                } else {
                    item.element.style.display = 'block';
                    const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                    const y = (vector.y * -0.5 + 0.5) * window.innerHeight;
                    item.element.style.left = `${x}px`;
                    item.element.style.top = `${y}px`;
                }
            });

            // Update State
            window.__3D_STATE__.cameraPos.x = camera.position.x;
            window.__3D_STATE__.cameraPos.y = camera.position.y;
            window.__3D_STATE__.cameraPos.z = camera.position.z;

            renderer.render(scene, camera);
        }

        // Init camera position
        updateCameraFromPath();
        animate();
    </script>
</body>
</html>
