<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Population Density Globe</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .panel {
            background: rgba(10, 10, 26, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            backdrop-filter: blur(4px);
            pointer-events: auto;
        }
        #title {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        #mode-label {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 4px;
        }
        #info-panel {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            min-width: 250px;
            text-align: center;
            display: none;
            transition: opacity 0.3s;
        }
        #info-panel h2 {
            margin: 0 0 10px 0;
            color: #ffff00;
            font-size: 22px;
        }
        #info-panel p {
            margin: 5px 0;
            font-size: 16px;
        }
        #legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 200px;
        }
        .legend-title {
            font-size: 14px;
            margin-bottom: 8px;
            text-align: center;
        }
        .gradient-bar {
            width: 100%;
            height: 15px;
            background: linear-gradient(to right, #00ff00, #ff0000);
            border-radius: 3px;
            margin-bottom: 5px;
        }
        .legend-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #aaa;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            pointer-events: auto;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        #instructions {
            position: absolute;
            top: 60px;
            left: 20px;
            font-size: 12px;
            color: #888;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="title">Population Density Globe</div>
        <div id="instructions">
            Space: Toggle Rotation | R: Reset View<br>
            1: Density Mode | 2: Total Pop Mode<br>
            +/-: Scale Bars | Click: Select Country
        </div>
        <div id="mode-label">Mode: Total Population</div>
        
        <div id="info-panel" class="panel">
            <h2 id="info-country">Country Name</h2>
            <p>Population: <span id="info-pop">0</span> Billion</p>
            <p>Density: <span id="info-density">0</span> / km²</p>
        </div>

        <div id="legend" class="panel">
            <div class="legend-title" id="legend-title">Total Population</div>
            <div class="gradient-bar"></div>
            <div class="legend-labels">
                <span id="legend-min">Low</span>
                <span id="legend-max">High</span>
            </div>
        </div>

        <div id="controls">
            <button id="btn-toggle-rotation">Toggle Rotation</button>
            <button id="btn-reset">Reset View</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            globeRotationY: 0,
            autoRotate: true,
            currentMode: 'total', // 'total' or 'density'
            selectedCountry: null,
            barScale: 1.0,
            cameraDistance: 3.5,
            hotspotCount: 8,
            ferrariLoaded: false,
            ferrarModel: null,
            frameCount: 0,
            barsVisible: true
        };

        // Data
        const countriesData = [
            { name: 'China', lat: 35, lon: 105, pop: 1.4, area: 9.6 },
            { name: 'India', lat: 20, lon: 78, pop: 1.4, area: 3.3 },
            { name: 'USA', lat: 38, lon: -97, pop: 0.33, area: 9.8 },
            { name: 'Indonesia', lat: -5, lon: 120, pop: 0.27, area: 1.9 },
            { name: 'Brazil', lat: -10, lon: -55, pop: 0.21, area: 8.5 },
            { name: 'Nigeria', lat: 10, lon: 8, pop: 0.22, area: 0.9 },
            { name: 'Bangladesh', lat: 24, lon: 90, pop: 0.17, area: 0.14 },
            { name: 'Russia', lat: 60, lon: 100, pop: 0.14, area: 17.1 }
        ];

        // Calculate density (Pop in Billions, Area in Millions km2 -> Density = Pop/Area * 1000)
        countriesData.forEach(c => {
            c.density = (c.pop / c.area) * 1000;
        });

        // Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 3.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(5, 3, 5);
        scene.add(directionalLight);

        // Globe Group (holds earth and bars for easy rotation)
        const globeGroup = new THREE.Group();
        scene.add(globeGroup);

        // Earth Sphere
        const earthGeometry = new THREE.SphereGeometry(1, 64, 64);
        const earthMaterial = new THREE.MeshPhongMaterial({ 
            color: 0x1a3a5c,
            shininess: 15,
            flatShading: false
        });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        globeGroup.add(earth);

        // Helper: Lat/Lon to Vector3
        function latLongToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 90) * (Math.PI / 180);
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.cos(phi);
            const z = radius * Math.sin(phi) * Math.sin(theta);
            return new THREE.Vector3(x, y, z);
        }

        // Hotspot Bars
        const bars = [];
        const barGeometry = new THREE.CylinderGeometry(0.015, 0.015, 1, 16);
        barGeometry.translate(0, 0.5, 0); // Pivot at bottom

        const colorLow = new THREE.Color(0x00ff00);
        const colorHigh = new THREE.Color(0xff0000);

        countriesData.forEach(data => {
            const material = new THREE.MeshPhongMaterial({ 
                color: 0xffffff,
                shininess: 30
            });
            const bar = new THREE.Mesh(barGeometry, material);
            
            const pos = latLongToVector3(data.lat, data.lon, 1);
            bar.position.copy(pos);
            
            // Orient outwards
            bar.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), pos.clone().normalize());
            
            // Calculate base height (China 1.4B = 0.5 height)
            const baseHeight = (data.pop / 1.4) * 0.5;
            bar.scale.set(1, baseHeight, 1);
            
            bar.userData = { ...data, baseHeight };
            
            globeGroup.add(bar);
            bars.push(bar);
        });

        // Update Colors based on mode
        function updateBarColors() {
            const isTotal = window.__3D_STATE__.currentMode === 'total';
            const values = countriesData.map(c => isTotal ? c.pop : c.density);
            const maxVal = Math.max(...values);
            const minVal = Math.min(...values);

            bars.forEach(bar => {
                const val = isTotal ? bar.userData.pop : bar.userData.density;
                const t = (val - minVal) / (maxVal - minVal || 1);
                bar.material.color.lerpColors(colorLow, colorHigh, t);
                
                // Maintain emissive state if selected
                if (window.__3D_STATE__.selectedCountry === bar.userData.name) {
                    bar.material.emissive.setHex(0xffff00);
                } else {
                    bar.material.emissive.setHex(0x000000);
                }
            });

            // Update UI Labels
            document.getElementById('mode-label').innerText = `Mode: ${isTotal ? 'Total Population' : 'Density'}`;
            document.getElementById('legend-title').innerText = isTotal ? 'Total Population' : 'Population Density';
            document.getElementById('legend-min').innerText = isTotal ? `${minVal.toFixed(2)}B` : `${Math.round(minVal)}/km²`;
            document.getElementById('legend-max').innerText = isTotal ? `${maxVal.toFixed(2)}B` : `${Math.round(maxVal)}/km²`;
        }

        // Initial color setup
        updateBarColors();

        // Update Scales
        function updateBarScales() {
            const scale = window.__3D_STATE__.barScale;
            bars.forEach(bar => {
                bar.scale.y = bar.userData.baseHeight * scale;
            });
        }

        // GLTF Loader (Easter Egg)
        const loader = new GLTFLoader();
        loader.load(
            '._ferrari.glb',
            function (gltf) {
                const model = gltf.scene;
                model.scale.set(0.002, 0.002, 0.002);
                model.position.set(0, -1.8, 0);
                scene.add(model);
                window.__3D_STATE__.ferrarModel = model;
                window.__3D_STATE__.ferrariLoaded = true;
            },
            undefined,
            function (error) {
                // Silently handle error if file doesn't exist in user's environment
                console.warn('Easter egg model not found or failed to load.');
            }
        );

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;
        controls.minDistance = 2;
        controls.maxDistance = 8;
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Raycaster for interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // UI Elements
        const infoPanel = document.getElementById('info-panel');
        const infoCountry = document.getElementById('info-country');
        const infoPop = document.getElementById('info-pop');
        const infoDensity = document.getElementById('info-density');

        function showInfo(data) {
            infoCountry.innerText = data.name;
            infoPop.innerText = data.pop.toFixed(2);
            infoDensity.innerText = Math.round(data.density);
            infoPanel.style.display = 'block';
            setTimeout(() => infoPanel.style.opacity = 1, 10);
        }

        function hideInfo() {
            infoPanel.style.opacity = 0;
            setTimeout(() => {
                if(window.__3D_STATE__.selectedCountry === null) {
                    infoPanel.style.display = 'none';
                }
            }, 300);
        }

        // Event Listeners
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('click', (event) => {
            // Ignore clicks on UI buttons
            if(event.target.tagName === 'BUTTON') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(bars);

            // Reset all emissive
            bars.forEach(b => b.material.emissive.setHex(0x000000));

            if (intersects.length > 0) {
                const selectedBar = intersects[0].object;
                selectedBar.material.emissive.setHex(0xffff00);
                window.__3D_STATE__.selectedCountry = selectedBar.userData.name;
                showInfo(selectedBar.userData);
            } else {
                window.__3D_STATE__.selectedCountry = null;
                hideInfo();
            }
        });

        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            switch(key) {
                case ' ':
                    window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
                    break;
                case 'r':
                    resetView();
                    break;
                case '1':
                    if(window.__3D_STATE__.currentMode !== 'density') {
                        window.__3D_STATE__.currentMode = 'density';
                        updateBarColors();
                    }
                    break;
                case '2':
                    if(window.__3D_STATE__.currentMode !== 'total') {
                        window.__3D_STATE__.currentMode = 'total';
                        updateBarColors();
                    }
                    break;
                case '+':
                case '=':
                    window.__3D_STATE__.barScale = Math.min(3.0, window.__3D_STATE__.barScale * 1.5);
                    updateBarScales();
                    break;
                case '-':
                case '_':
                    window.__3D_STATE__.barScale = Math.max(0.5, window.__3D_STATE__.barScale * 0.667);
                    updateBarScales();
                    break;
            }
        });

        // Button Actions
        function resetView() {
            camera.position.set(0, 0, 3.5);
            controls.target.set(0, 0, 0);
            globeGroup.rotation.set(0, 0, 0);
            window.__3D_STATE__.globeRotationY = 0;
        }

        document.getElementById('btn-toggle-rotation').addEventListener('click', () => {
            window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
        });

        document.getElementById('btn-reset').addEventListener('click', resetView);

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            // Update State
            window.__3D_STATE__.frameCount++;
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);

            if (window.__3D_STATE__.autoRotate) {
                globeGroup.rotation.y += 0.003;
                window.__3D_STATE__.globeRotationY = globeGroup.rotation.y;
            }

            if (window.__3D_STATE__.ferrariLoaded && window.__3D_STATE__.ferrarModel) {
                window.__3D_STATE__.ferrarModel.rotation.y -= 0.01;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
