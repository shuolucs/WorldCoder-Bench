<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Population Density Globe</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#title {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(100,150,255,0.5);
    pointer-events: none;
}

#mode-label {
    position: absolute;
    top: 20px;
    right: 20px;
    color: white;
    font-size: 16px;
    background: rgba(0,0,0,0.5);
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    pointer-events: none;
}

#info-panel {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 16px;
    background: rgba(0,0,0,0.75);
    padding: 16px 32px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,0,0.4);
    display: none;
    text-align: center;
    min-width: 250px;
    backdrop-filter: blur(10px);
}

#info-panel .country-name {
    font-size: 22px;
    font-weight: bold;
    color: #ffdd44;
    margin-bottom: 6px;
}

#info-panel .country-pop {
    font-size: 16px;
    color: #cccccc;
}

#info-panel .country-density {
    font-size: 14px;
    color: #aaaaaa;
    margin-top: 4px;
}

#legend {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: white;
    font-size: 12px;
    background: rgba(0,0,0,0.6);
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
}

#legend .legend-title {
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 13px;
}

#legend .legend-bar {
    width: 150px;
    height: 14px;
    border-radius: 3px;
    margin-bottom: 4px;
}

#legend .legend-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #aaa;
}

.controls {
    position: absolute;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.controls button {
    background: rgba(30,40,80,0.8);
    color: white;
    border: 1px solid rgba(100,150,255,0.3);
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    backdrop-filter: blur(5px);
}

.controls button:hover {
    background: rgba(50,70,140,0.9);
    border-color: rgba(100,150,255,0.6);
}

#keyboard-hints {
    position: absolute;
    top: 60px;
    left: 20px;
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    line-height: 1.8;
    pointer-events: none;
}

#keyboard-hints span {
    background: rgba(255,255,255,0.1);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: monospace;
}
</style>
</head>
<body>

<div id="title">Population Density Globe</div>
<div id="mode-label">Mode: Total Population</div>

<div id="info-panel">
    <div class="country-name"></div>
    <div class="country-pop"></div>
    <div class="country-density"></div>
</div>

<div id="legend">
    <div class="legend-title">Population Scale</div>
    <div class="legend-bar" id="legend-bar"></div>
    <div class="legend-labels">
        <span>Low</span>
        <span>High</span>
    </div>
</div>

<div class="controls">
    <button id="btn-toggle-rotation">⏸ Pause Rotation</button>
    <button id="btn-reset">🔄 Reset View</button>
</div>

<div id="keyboard-hints">
    <span>Space</span> Toggle rotation<br>
    <span>R</span> Reset view<br>
    <span>1</span> Density mode<br>
    <span>2</span> Population mode<br>
    <span>+</span> Scale up<br>
    <span>-</span> Scale down
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    globeRotationY: 0,
    autoRotate: true,
    currentMode: 'total',
    selectedCountry: null,
    barScale: 1.0,
    cameraDistance: 3.5,
    hotspotCount: 8,
    ferrariLoaded: false,
    ferrariModel: null,
    frameCount: 0,
    barsVisible: true
};

const state = window.__3D_STATE__;

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 3.5);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 3, 5);
scene.add(directionalLight);

// Add subtle point lights for atmosphere
const pointLight1 = new THREE.PointLight(0x3366ff, 0.3, 10);
pointLight1.position.set(-3, 2, -3);
scene.add(pointLight1);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enablePan = false;
controls.minDistance = 2;
controls.maxDistance = 8;
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Globe group
const globeGroup = new THREE.Group();
scene.add(globeGroup);

// Earth sphere
const earthGeometry = new THREE.SphereGeometry(1, 64, 64);
const earthMaterial = new THREE.MeshPhongMaterial({
    color: 0x1a3a5c,
    shininess: 25,
    specular: 0x222244
});
const earth = new THREE.Mesh(earthGeometry, earthMaterial);
globeGroup.add(earth);

// Add atmosphere glow
const atmosphereGeometry = new THREE.SphereGeometry(1.02, 64, 64);
const atmosphereMaterial = new THREE.MeshPhongMaterial({
    color: 0x4488ff,
    transparent: true,
    opacity: 0.08,
    side: THREE.FrontSide
});
const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
globeGroup.add(atmosphere);

// Add wireframe for land feel
const wireframeGeometry = new THREE.SphereGeometry(1.005, 32, 32);
const wireframeMaterial = new THREE.MeshBasicMaterial({
    color: 0x2a5a8c,
    wireframe: true,
    transparent: true,
    opacity: 0.15
});
const wireframe = new THREE.Mesh(wireframeGeometry, wireframeMaterial);
globeGroup.add(wireframe);

// Stars
const starsGeometry = new THREE.BufferGeometry();
const starsCount = 2000;
const starsPositions = new Float32Array(starsCount * 3);
for (let i = 0; i < starsCount * 3; i++) {
    starsPositions[i] = (Math.random() - 0.5) * 50;
}
starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, sizeAttenuation: true });
const stars = new THREE.Points(starsGeometry, starsMaterial);
scene.add(stars);

// Country data
const countries = [
    { name: 'China', lat: 35, lon: 105, population: 1.4, area: 9.597, code: 'CN' },
    { name: 'India', lat: 20, lon: 78, population: 1.4, area: 3.287, code: 'IN' },
    { name: 'USA', lat: 38, lon: -97, population: 0.33, area: 9.834, code: 'US' },
    { name: 'Indonesia', lat: -5, lon: 120, population: 0.27, area: 1.905, code: 'ID' },
    { name: 'Brazil', lat: -10, lon: -55, population: 0.21, area: 8.516, code: 'BR' },
    { name: 'Nigeria', lat: 10, lon: 8, population: 0.22, area: 0.924, code: 'NG' },
    { name: 'Bangladesh', lat: 24, lon: 90, population: 0.17, area: 0.147, code: 'BD' },
    { name: 'Russia', lat: 60, lon: 100, population: 0.14, area: 17.098, code: 'RU' }
];

const maxPopulation = 1.4;
const maxBarHeight = 0.5;

function latLonToVector3(lat, lon, radius) {
    const phi = (90 - lat) * (Math.PI / 180);
    const theta = (lon + 180) * (Math.PI / 180);
    const x = -radius * Math.sin(phi) * Math.cos(theta);
    const y = radius * Math.cos(phi);
    const z = radius * Math.sin(phi) * Math.sin(theta);
    return new THREE.Vector3(x, y, z);
}

function getColorByValue(value, maxValue) {
    const t = value / maxValue;
    const r = Math.min(1, t * 2);
    const g = Math.min(1, (1 - t) * 2);
    return new THREE.Color(r, g, 0.1);
}

function getDensityColor(population, area) {
    const density = population / area;
    const maxDensity = 0.17 / 0.147; // Bangladesh has highest density
    const t = Math.min(density / maxDensity, 1);
    const r = Math.min(1, t * 2);
    const g = Math.min(1, (1 - t) * 2);
    return new THREE.Color(r, g, 0.1);
}

// Create hotspot bars
const bars = [];
const barMeshes = [];

countries.forEach((country, index) => {
    const barHeight = (country.population / maxPopulation) * maxBarHeight;
    const barRadius = 0.025;

    const geometry = new THREE.CylinderGeometry(barRadius, barRadius, barHeight, 12);
    geometry.translate(0, barHeight / 2, 0);

    const color = getColorByValue(country.population, maxPopulation);
    const material = new THREE.MeshPhongMaterial({
        color: color,
        emissive: new THREE.Color(0x000000),
        shininess: 60,
        transparent: true,
        opacity: 0.9
    });

    const bar = new THREE.Mesh(geometry, material);

    // Position on globe surface
    const surfacePos = latLonToVector3(country.lat, country.lon, 1.0);
    bar.position.copy(surfacePos);

    // Orient bar to point outward from globe center
    bar.lookAt(0, 0, 0);
    bar.rotateX(Math.PI / 2);

    // Add glow ring at base
    const ringGeometry = new THREE.RingGeometry(barRadius * 1.5, barRadius * 3, 16);
    const ringMaterial = new THREE.MeshBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.4,
        side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
    bar.add(ring);

    bar.userData = {
        country: country,
        originalHeight: barHeight,
        index: index,
        originalColor: color.clone()
    };

    globeGroup.add(bar);
    bars.push(bar);
    barMeshes.push(bar);
});

state.hotspotCount = bars.length;

// Load Ferrari model
const gltfLoader = new GLTFLoader();
try {
    gltfLoader.load(
        '._ferrari.glb',
        (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.002, 0.002, 0.002);
            model.position.set(0, -1.8, 0);
            scene.add(model);
            state.ferrariModel = model;
            state.ferrariLoaded = true;
            window.__3D_STATE__.ferrariModel = model;
        },
        undefined,
        (error) => {
            console.log('Ferrari model not found, creating placeholder');
            // Create a small placeholder
            const placeholderGeom = new THREE.BoxGeometry(0.15, 0.05, 0.3);
            const placeholderMat = new THREE.MeshPhongMaterial({ color: 0xff0000, shininess: 100 });
            const placeholder = new THREE.Mesh(placeholderGeom, placeholderMat);
            placeholder.position.set(0, -1.8, 0);
            placeholder.scale.set(0.002 * 50, 0.002 * 50, 0.002 * 50);

            // Add wheels
            const wheelGeom = new THREE.CylinderGeometry(0.02, 0.02, 0.02, 8);
            const wheelMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
            const positions = [[-0.06, -0.025, 0.1], [0.06, -0.025, 0.1], [-0.06, -0.025, -0.1], [0.06, -0.025, -0.1]];
            positions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeom, wheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(...pos);
                placeholder.add(wheel);
            });

            scene.add(placeholder);
            state.ferrariModel = placeholder;
            state.ferrariLoaded = true;
            window.__3D_STATE__.ferrariModel = placeholder;
        }
    );
} catch (e) {
    console.log('GLTF loading error');
}

// Raycaster for clicking
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onMouseClick(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(barMeshes, false);

    // Reset all bars
    bars.forEach(bar => {
        bar.material.emissive.set(0x000000);
    });

    const infoPanel = document.getElementById('info-panel');

    if (intersects.length > 0) {
        const selectedBar = intersects[0].object;
        const country = selectedBar.userData.country;

        selectedBar.material.emissive.set(0xffff00);

        state.selectedCountry = country.name;

        const density = (country.population * 1000 / country.area).toFixed(1);
        infoPanel.querySelector('.country-name').textContent = `${country.name} (${country.code})`;
        infoPanel.querySelector('.country-pop').textContent = `Population: ${(country.population * 1000).toFixed(0)}M`;
        infoPanel.querySelector('.country-density').textContent = `Density: ${density} people/km² (millions)`;
        infoPanel.style.display = 'block';
    } else {
        state.selectedCountry = null;
        infoPanel.style.display = 'none';
    }
}

renderer.domElement.addEventListener('click', onMouseClick);

// Update bar colors based on mode
function updateBarColors() {
    const mode = state.currentMode;

    bars.forEach(bar => {
        const country = bar.userData.country;
        let color;

        if (mode === 'total') {
            color = getColorByValue(country.population, maxPopulation);
        } else {
            color = getDensityColor(country.population, country.area);
        }

        bar.material.color.copy(color);
        bar.userData.originalColor = color.clone();

        // Update ring color
        if (bar.children.length > 0) {
            bar.children[0].material.color.copy(color);
        }

        // Keep selection glow if selected
        if (state.selectedCountry === country.name) {
            bar.material.emissive.set(0xffff00);
        }
    });

    updateLegend();
}

function updateLegend() {
    const legendBar = document.getElementById('legend-bar');
    const legendTitle = document.querySelector('#legend .legend-title');
    const labels = document.querySelector('#legend .legend-labels');

    if (state.currentMode === 'total') {
        legendBar.style.background = 'linear-gradient(to right, #00ff22, #ffff00, #ff3300)';
        legendTitle.textContent = 'Total Population';
        labels.innerHTML = '<span>140M</span><span>700M</span><span>1.4B</span>';
    } else {
        legendBar.style.background = 'linear-gradient(to right, #00ff22, #ffff00, #ff3300)';
        legendTitle.textContent = 'Population Density';
        labels.innerHTML = '<span>Low</span><span>Medium</span><span>High</span>';
    }
}

updateLegend();

// Keyboard controls
document.addEventListener('keydown', (event) => {
    switch (event.key) {
        case ' ':
            event.preventDefault();
            state.autoRotate = !state.autoRotate;
            updateRotationButton();
            break;
        case 'r':
        case 'R':
            resetView();
            break;
        case '1':
            state.currentMode = 'density';
            document.getElementById('mode-label').textContent = 'Mode: Density';
            updateBarColors();
            break;
        case '2':
            state.currentMode = 'total';
            document.getElementById('mode-label').textContent = 'Mode: Total Population';
            updateBarColors();
            break;
        case '+':
        case '=':
            if (state.barScale < 3.0) {
                state.barScale = Math.min(3.0, state.barScale * 1.5);
                updateBarScales();
            }
            break;
        case '-':
        case '_':
            if (state.barScale > 0.5) {
                state.barScale = Math.max(0.5, state.barScale * 0.667);
                updateBarScales();
            }
            break;
    }
});

function updateBarScales() {
    bars.forEach(bar => {
        const s = state.barScale;
        bar.scale.set(1, s, 1);
    });
}

function resetView() {
    camera.position.set(0, 0, 3.5);
    controls.target.set(0, 0, 0);
    controls.update();
    globeGroup.rotation.y = 0;
    state.globeRotationY = 0;
    state.autoRotate = true;
    state.barScale = 1.0;
    updateBarScales();
    updateRotationButton();

    // Deselect
    bars.forEach(bar => {
        bar.material.emissive.set(0x000000);
    });
    state.selectedCountry = null;
    document.getElementById('info-panel').style.display = 'none';
}

function updateRotationButton() {
    const btn = document.getElementById('btn-toggle-rotation');
    btn.textContent = state.autoRotate ? '⏸ Pause Rotation' : '▶ Resume Rotation';
}

// Button handlers
document.getElementById('btn-toggle-rotation').addEventListener('click', () => {
    state.autoRotate = !state.autoRotate;
    updateRotationButton();
});

document.getElementById('btn-reset').addEventListener('click', resetView);

// Set initial legend gradient
document.getElementById('legend-bar').style.background = 'linear-gradient(to right, #00ff22, #ffff00, #ff3300)';

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    state.frameCount++;

    // Auto rotation
    if (state.autoRotate) {
        globeGroup.rotation.y += 0.003;
    }

    state.globeRotationY = globeGroup.rotation.y;

    // Update camera distance
    state.cameraDistance = camera.position.length();

    // Subtle bar animation - pulse effect
    bars.forEach((bar, i) => {
        if (state.selectedCountry === bar.userData.country.name) {
            const pulse = 1 + Math.sin(state.frameCount * 0.05) * 0.05;
            bar.material.emissive.set(0xffff00);
            bar.material.emissiveIntensity = 0.3 + Math.sin(state.frameCount * 0.08) * 0.2;
        }
    });

    // Rotate ferrari slowly if loaded
    if (state.ferrariModel) {
        state.ferrariModel.rotation.y += 0.01;
    }

    controls.update();
    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
