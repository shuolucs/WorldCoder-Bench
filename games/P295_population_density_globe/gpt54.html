<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Population Density Globe</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #title {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 20px;
      color: white;
      z-index: 10;
      user-select: none;
    }

    #mode-label {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 16px;
      color: white;
      z-index: 10;
      user-select: none;
      text-align: right;
    }

    #controls {
      position: absolute;
      top: 52px;
      right: 16px;
      z-index: 10;
      display: flex;
      gap: 8px;
    }

    button {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }

    button:hover {
      background: rgba(255,255,255,0.18);
    }

    #legend {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 12px;
      border-radius: 8px;
      min-width: 180px;
      user-select: none;
    }

    #legend .gradient {
      width: 160px;
      height: 14px;
      border-radius: 7px;
      margin: 6px 0 4px;
      background: linear-gradient(to right, #00ff66, #ffff00, #ff3300);
      border: 1px solid rgba(255,255,255,0.2);
    }

    #legend .labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      opacity: 0.9;
    }

    #info-panel {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 12px 16px;
      min-width: 220px;
      text-align: center;
      display: none;
      color: white;
      backdrop-filter: blur(6px);
    }

    #hint {
      position: absolute;
      bottom: 16px;
      right: 16px;
      z-index: 10;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(255,255,255,0.75);
      text-align: right;
      user-select: none;
      background: rgba(255,255,255,0.06);
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>
  <div id="title">Population Density Globe</div>

  <div id="mode-label">Mode: Total Population</div>

  <div id="controls">
    <button id="btn-toggle-rotation">Toggle Rotation</button>
    <button id="btn-reset">Reset View</button>
  </div>

  <div id="legend">
    <div><strong>Legend</strong></div>
    <div id="legend-mode-text">Color: Total Population</div>
    <div class="gradient"></div>
    <div class="labels">
      <span>Low</span>
      <span>High</span>
    </div>
  </div>

  <div id="info-panel"></div>

  <div id="hint">
    Space: Toggle rotation<br>
    R: Reset view<br>
    1: Density mode<br>
    2: Total population mode<br>
    + / - : Scale bars
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 0, 3.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 3, 5);
    scene.add(directionalLight);

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    const earthGeometry = new THREE.SphereGeometry(1, 64, 64);
    const earthMaterial = new THREE.MeshStandardMaterial({
      color: 0x1a3a5c,
      roughness: 0.85,
      metalness: 0.05
    });
    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    globeGroup.add(earth);

    // subtle atmosphere
    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(1.03, 64, 64),
      new THREE.MeshBasicMaterial({
        color: 0x4da6ff,
        transparent: true,
        opacity: 0.08,
        side: THREE.BackSide
      })
    );
    globeGroup.add(atmosphere);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enablePan = false;
    controls.minDistance = 2;
    controls.maxDistance = 8;
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    const infoPanel = document.getElementById("info-panel");
    const modeLabel = document.getElementById("mode-label");
    const legendModeText = document.getElementById("legend-mode-text");
    const btnToggleRotation = document.getElementById("btn-toggle-rotation");
    const btnReset = document.getElementById("btn-reset");

    window.__3D_STATE__ = {
      globeRotationY: 0,
      autoRotate: true,
      currentMode: "total",
      selectedCountry: null,
      barScale: 1.0,
      cameraDistance: camera.position.length(),
      hotspotCount: 8,
      ferrariLoaded: false,
      frameCount: 0,
      barsVisible: true,
      ferrarModel: null
    };

    const hotspotData = [
      { country: "China", lat: 35, lon: 105, population: 1.40, area: 9.597, baseHeight: 0.50 },
      { country: "India", lat: 20, lon: 78, population: 1.40, area: 3.287, baseHeight: 0.50 },
      { country: "USA", lat: 38, lon: -97, population: 0.33, area: 9.834, baseHeight: 0.50 * (0.33 / 1.4) },
      { country: "Indonesia", lat: -5, lon: 120, population: 0.27, area: 1.905, baseHeight: 0.50 * (0.27 / 1.4) },
      { country: "Brazil", lat: -10, lon: -55, population: 0.21, area: 8.516, baseHeight: 0.50 * (0.21 / 1.4) },
      { country: "Nigeria", lat: 10, lon: 8, population: 0.22, area: 0.924, baseHeight: 0.50 * (0.22 / 1.4) },
      { country: "Bangladesh", lat: 24, lon: 90, population: 0.17, area: 0.148, baseHeight: 0.50 * (0.17 / 1.4) },
      { country: "Russia", lat: 60, lon: 100, population: 0.14, area: 17.098, baseHeight: 0.50 * (0.14 / 1.4) }
    ];

    hotspotData.forEach(d => {
      d.density = d.population / d.area;
    });

    const maxPopulation = Math.max(...hotspotData.map(d => d.population));
    const minPopulation = Math.min(...hotspotData.map(d => d.population));
    const maxDensity = Math.max(...hotspotData.map(d => d.density));
    const minDensity = Math.min(...hotspotData.map(d => d.density));

    const hotspotBars = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let selectedBar = null;

    function latLonToVector3(lat, lon, radius) {
      const phi = (90 - lat) * (Math.PI / 180);
      const theta = (lon + 180) * (Math.PI / 180);

      const x = -radius * Math.sin(phi) * Math.cos(theta);
      const y = radius * Math.cos(phi);
      const z = radius * Math.sin(phi) * Math.sin(theta);
      return new THREE.Vector3(x, y, z);
    }

    function colorLerpGreenToRed(t) {
      const color = new THREE.Color();
      // green -> yellow -> red
      if (t < 0.5) {
        color.lerpColors(
          new THREE.Color(0x00ff66),
          new THREE.Color(0xffff00),
          t / 0.5
        );
      } else {
        color.lerpColors(
          new THREE.Color(0xffff00),
          new THREE.Color(0xff3300),
          (t - 0.5) / 0.5
        );
      }
      return color;
    }

    function getValueNormalized(data, mode) {
      if (mode === "density") {
        return (data.density - minDensity) / (maxDensity - minDensity || 1);
      }
      return (data.population - minPopulation) / (maxPopulation - minPopulation || 1);
    }

    function createHotspotBar(data) {
      const height = data.baseHeight;
      const radius = 0.035;
      const geometry = new THREE.CylinderGeometry(radius, radius, height, 12, 1, false);
      const normalized = getValueNormalized(data, window.__3D_STATE__.currentMode);
      const color = colorLerpGreenToRed(normalized);

      const material = new THREE.MeshStandardMaterial({
        color,
        emissive: 0x000000,
        emissiveIntensity: 0.8,
        roughness: 0.4,
        metalness: 0.15
      });

      const bar = new THREE.Mesh(geometry, material);

      const surfacePos = latLonToVector3(data.lat, data.lon, 1.0);
      const outward = surfacePos.clone().normalize();
      const centerPos = outward.clone().multiplyScalar(1.0 + height / 2);

      bar.position.copy(centerPos);
      bar.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), outward);

      bar.userData = {
        ...data,
        originalHeight: height,
        baseColor: color.clone()
      };

      globeGroup.add(bar);
      hotspotBars.push(bar);
    }

    hotspotData.forEach(createHotspotBar);

    function updateBarVisuals() {
      hotspotBars.forEach(bar => {
        const data = bar.userData;
        const normalized = getValueNormalized(data, window.__3D_STATE__.currentMode);
        const color = colorLerpGreenToRed(normalized);
        data.baseColor = color.clone();

        if (selectedBar === bar) {
          bar.material.color.copy(color);
          bar.material.emissive.setHex(0xffff00);
          bar.material.emissiveIntensity = 1.2;
        } else {
          bar.material.color.copy(color);
          bar.material.emissive.setHex(0x000000);
          bar.material.emissiveIntensity = 0.8;
        }

        const scaledHeight = data.originalHeight * window.__3D_STATE__.barScale;
        bar.scale.set(1, window.__3D_STATE__.barScale, 1);

        const outward = latLonToVector3(data.lat, data.lon, 1.0).normalize();
        const centerPos = outward.clone().multiplyScalar(1.0 + scaledHeight / 2);
        bar.position.copy(centerPos);
        bar.visible = window.__3D_STATE__.barsVisible;
      });

      modeLabel.textContent =
        window.__3D_STATE__.currentMode === "density"
          ? "Mode: Density"
          : "Mode: Total Population";

      legendModeText.textContent =
        window.__3D_STATE__.currentMode === "density"
          ? "Color: Population Density"
          : "Color: Total Population";
    }

    function selectBar(bar) {
      selectedBar = bar;
      if (bar) {
        window.__3D_STATE__.selectedCountry = bar.userData.country;
        infoPanel.style.display = "block";
        infoPanel.innerHTML = `
          <div style="font-size:18px;font-weight:bold;margin-bottom:4px;">${bar.userData.country}</div>
          <div>Population: ${(bar.userData.population).toFixed(2)}B</div>
          <div>Density Index: ${bar.userData.density.toFixed(2)}</div>
        `;
      } else {
        window.__3D_STATE__.selectedCountry = null;
        infoPanel.style.display = "none";
      }
      updateBarVisuals();
    }

    renderer.domElement.addEventListener("click", (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(hotspotBars, false);

      if (intersects.length > 0) {
        selectBar(intersects[0].object);
      } else {
        selectBar(null);
      }
    });

    function resetView() {
      camera.position.set(0, 0, 3.5);
      controls.target.set(0, 0, 0);
      controls.update();
      globeGroup.rotation.set(0, 0, 0);
      selectBar(null);
    }

    btnToggleRotation.addEventListener("click", () => {
      window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
    });

    btnReset.addEventListener("click", () => {
      resetView();
    });

    window.addEventListener("keydown", (e) => {
      const key = e.key;

      if (key === " ") {
        e.preventDefault();
        window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
      } else if (key.toLowerCase() === "r") {
        resetView();
      } else if (key === "1") {
        window.__3D_STATE__.currentMode = "density";
        updateBarVisuals();
      } else if (key === "2") {
        window.__3D_STATE__.currentMode = "total";
        updateBarVisuals();
      } else if (key === "+" || key === "=") {
        window.__3D_STATE__.barScale = Math.min(3.0, window.__3D_STATE__.barScale * 1.5);
        updateBarVisuals();
      } else if (key === "-") {
        window.__3D_STATE__.barScale = Math.max(0.5, window.__3D_STATE__.barScale * 0.667);
        updateBarVisuals();
      }
    });

    const loader = new GLTFLoader();
    loader.load(
      "._ferrari.glb",
      (gltf) => {
        const ferrari = gltf.scene;
        ferrari.scale.setScalar(0.002);
        ferrari.position.set(0, -1.8, 0);
        scene.add(ferrari);
        window.__3D_STATE__.ferrarModel = ferrari;
        window.__3D_STATE__.ferrariLoaded = true;
      },
      undefined,
      (err) => {
        console.warn("Failed to load ._ferrari.glb", err);
      }
    );

    updateBarVisuals();

    function animate() {
      requestAnimationFrame(animate);

      if (window.__3D_STATE__.autoRotate) {
        globeGroup.rotation.y += 0.003;
      }

      controls.update();

      window.__3D_STATE__.globeRotationY = globeGroup.rotation.y;
      window.__3D_STATE__.cameraDistance = camera.position.length();
      window.__3D_STATE__.hotspotCount = hotspotBars.length;
      window.__3D_STATE__.frameCount += 1;
      window.__3D_STATE__.barsVisible = hotspotBars.every(b => b.visible);

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
