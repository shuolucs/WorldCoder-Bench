<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projectile Motion with Air Drag</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: Arial, sans-serif; background: #000; }
canvas { display: block; }

#positionHUD {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #fff;
    background: rgba(0,0,0,0.7);
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.6;
}

#launchCountHUD {
    position: absolute;
    top: 10px;
    right: 10px;
    color: #fff;
    background: rgba(0,0,0,0.7);
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 14px;
}

#maxHeightHUD {
    position: absolute;
    top: 60px;
    right: 10px;
    color: #fff;
    background: rgba(0,0,0,0.7);
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 14px;
}

#controlPanel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.85);
    padding: 15px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

#controlPanel label {
    color: #ccc;
    font-size: 13px;
}

#controlPanel input[type="range"] {
    width: 120px;
    cursor: pointer;
}

#controlPanel button {
    padding: 8px 18px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    transition: all 0.2s;
}

#controlPanel button:hover:not(:disabled) {
    transform: scale(1.05);
}

#controlPanel button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

#launchBtn {
    background: #4CAF50;
    color: white;
}

#resetBtn {
    background: #f44336;
    color: white;
}

#undoBtn {
    background: #2196F3;
    color: white;
}

#redoBtn {
    background: #FF9800;
    color: white;
}

.control-group {
    display: flex;
    align-items: center;
    gap: 8px;
}

.slider-value {
    color: #fff;
    font-size: 13px;
    min-width: 30px;
    text-align: center;
}
</style>
</head>
<body>

<div id="positionHUD">Position: x=0.0, y=0.0</div>
<div id="launchCountHUD">Launches: 0</div>
<div id="maxHeightHUD">Max Height: 0.0</div>

<div id="controlPanel">
    <div class="control-group">
        <label for="angleSlider">Angle:</label>
        <input type="range" id="angleSlider" min="10" max="80" value="45">
        <span id="angleLabel" class="slider-value">45°</span>
    </div>
    <div class="control-group">
        <label for="speedSlider">Speed:</label>
        <input type="range" id="speedSlider" min="5" max="40" value="20">
        <span id="speedLabel" class="slider-value">20</span>
    </div>
    <button id="launchBtn">Launch</button>
    <button id="resetBtn">Reset</button>
    <button id="undoBtn" disabled>Undo</button>
    <button id="redoBtn" disabled>Redo</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 50, 150);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 10, 30);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(10, 20, 10);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
directionalLight.shadow.camera.near = 0.5;
directionalLight.shadow.camera.far = 100;
directionalLight.shadow.camera.left = -50;
directionalLight.shadow.camera.right = 50;
directionalLight.shadow.camera.top = 50;
directionalLight.shadow.camera.bottom = -50;
scene.add(directionalLight);

// Ground plane
const groundGeometry = new THREE.PlaneGeometry(100, 100);
const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x4CAF50, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const gridHelper = new THREE.GridHelper(100, 100, 0x333333, 0x555555);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// Target marker (red sphere)
const targetGeometry = new THREE.SphereGeometry(0.5, 32, 32);
const targetMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x440000 });
const targetMarker = new THREE.Mesh(targetGeometry, targetMaterial);
targetMarker.position.set(20, 0.5, 0);
targetMarker.castShadow = true;
scene.add(targetMarker);

// Start position
const START_POS = new THREE.Vector3(-30, 0.5, 0);

// Physics constants
const Cd = 0.47;
const rho = 1.225;
const A = 0.1;
const mass = 1.0;
const gravity = 9.81;
const dt = 1 / 60;

// State
let projectile = null;
let projectileLoaded = false;
let isFlying = false;
let hasLanded = false;
let velocity = new THREE.Vector3(0, 0, 0);
let maxHeight = 0;
let launchCount = 0;

// Trail
let trailPoints = [];
let trailLine = null;
const trailMaterial = new THREE.LineBasicMaterial({ color: 0xffff00 });

// Undo/Redo stacks
let undoStack = [];
let redoStack = [];

// State object
window.__3D_STATE__ = {
    projectileX: START_POS.x,
    projectileY: START_POS.y,
    projectileZ: START_POS.z,
    velocityX: 0,
    velocityY: 0,
    velocityZ: 0,
    isFlying: false,
    hasLanded: false,
    launchAngle: 45,
    launchSpeed: 20,
    launchCount: 0,
    undoStackSize: 0,
    redoStackSize: 0,
    trailPointCount: 0,
    distanceToTarget: 0,
    dragEnabled: true,
    maxHeight: 0
};

function updateState() {
    const s = window.__3D_STATE__;
    if (projectile) {
        s.projectileX = projectile.position.x;
        s.projectileY = projectile.position.y;
        s.projectileZ = projectile.position.z;
    }
    s.velocityX = velocity.x;
    s.velocityY = velocity.y;
    s.velocityZ = velocity.z;
    s.isFlying = isFlying;
    s.hasLanded = hasLanded;
    s.launchAngle = parseInt(document.getElementById('angleSlider').value);
    s.launchSpeed = parseInt(document.getElementById('speedSlider').value);
    s.launchCount = launchCount;
    s.undoStackSize = undoStack.length;
    s.redoStackSize = redoStack.length;
    s.trailPointCount = trailPoints.length;
    s.maxHeight = maxHeight;
    s.dragEnabled = true;

    if (projectile) {
        const dx = projectile.position.x - targetMarker.position.x;
        const dy = projectile.position.y - targetMarker.position.y;
        const dz = projectile.position.z - targetMarker.position.z;
        s.distanceToTarget = Math.sqrt(dx * dx + dy * dy + dz * dz);
    }
}

// Load GLB model
const loader = new GLTFLoader();

// Use a fallback: try loading Corset.glb, if it fails create a placeholder
let fallbackProjectile = null;

function createFallbackProjectile() {
    const group = new THREE.Group();
    const bodyGeo = new THREE.CylinderGeometry(0.3, 0.5, 1.2, 16);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.3, metalness: 0.6 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.6;
    group.add(body);

    const topGeo = new THREE.SphereGeometry(0.3, 16, 16);
    const topMat = new THREE.MeshStandardMaterial({ color: 0xDAA520, roughness: 0.2, metalness: 0.8 });
    const top = new THREE.Mesh(topGeo, topMat);
    top.position.y = 1.3;
    group.add(top);

    group.scale.set(3, 3, 3);
    return group;
}

function setupProjectile(obj) {
    projectile = obj;
    projectile.position.copy(START_POS);
    projectile.castShadow = true;
    projectile.traverse((child) => {
        if (child.isMesh) {
            child.castShadow = true;
        }
    });
    scene.add(projectile);
    projectileLoaded = true;
    updateState();
    updateHUD();
}

loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Corset/glTF-Binary/Corset.glb',
    (gltf) => {
        const model = gltf.scene;
        model.scale.set(3, 3, 3);
        setupProjectile(model);
    },
    undefined,
    (error) => {
        console.warn('Failed to load Corset.glb, trying alternative URL...', error);
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Corset/glTF-Binary/Corset.glb',
            (gltf) => {
                const model = gltf.scene;
                model.scale.set(3, 3, 3);
                setupProjectile(model);
            },
            undefined,
            (error2) => {
                console.warn('Failed to load from alternative URL, using fallback', error2);
                const fb = createFallbackProjectile();
                setupProjectile(fb);
            }
        );
    }
);

// Trail management
function clearTrail() {
    if (trailLine) {
        scene.remove(trailLine);
        if (trailLine.geometry) trailLine.geometry.dispose();
        trailLine = null;
    }
    trailPoints = [];
}

function updateTrail() {
    if (trailLine) {
        scene.remove(trailLine);
        if (trailLine.geometry) trailLine.geometry.dispose();
    }
    if (trailPoints.length >= 2) {
        const geometry = new THREE.BufferGeometry().setFromPoints(trailPoints);
        trailLine = new THREE.Line(geometry, trailMaterial);
        scene.add(trailLine);
    }
}

function drawTrailFromPoints(points) {
    clearTrail();
    trailPoints = points.map(p => p.clone());
    if (trailPoints.length >= 2) {
        const geometry = new THREE.BufferGeometry().setFromPoints(trailPoints);
        trailLine = new THREE.Line(geometry, trailMaterial);
        scene.add(trailLine);
    }
}

// Launch
function launch() {
    if (!projectileLoaded || isFlying) return;

    const angleDeg = parseInt(document.getElementById('angleSlider').value);
    const speed = parseInt(document.getElementById('speedSlider').value);
    const angleRad = angleDeg * Math.PI / 180;

    // Reset projectile to start
    projectile.position.copy(START_POS);

    // Clear trail
    clearTrail();

    // Set velocity (launch in +X direction, upward in Y)
    velocity.set(
        speed * Math.cos(angleRad),
        speed * Math.sin(angleRad),
        0
    );

    isFlying = true;
    hasLanded = false;
    maxHeight = projectile.position.y;

    // Clear redo stack on new launch
    redoStack = [];

    // Add starting point to trail
    trailPoints.push(projectile.position.clone());

    updateButtonStates();
    updateState();
}

// Physics step
function physicsStep() {
    if (!isFlying || !projectile) return;

    // Gravity
    const gravityForce = new THREE.Vector3(0, -gravity * mass, 0);

    // Air drag: F_drag = -0.5 * Cd * rho * A * |v| * v
    const speed = velocity.length();
    const dragMagnitude = 0.5 * Cd * rho * A * speed * speed;
    const dragForce = velocity.clone().normalize().multiplyScalar(-dragMagnitude);

    // Total force
    const totalForce = gravityForce.clone().add(dragForce);

    // Acceleration
    const acceleration = totalForce.divideScalar(mass);

    // Euler integration
    velocity.add(acceleration.clone().multiplyScalar(dt));
    projectile.position.add(velocity.clone().multiplyScalar(dt));

    // Rotate projectile slightly for visual effect
    projectile.rotation.x += 0.02;
    projectile.rotation.z += 0.01;

    // Track max height
    if (projectile.position.y > maxHeight) {
        maxHeight = projectile.position.y;
    }

    // Add trail point
    trailPoints.push(projectile.position.clone());
    updateTrail();

    // Check ground collision
    if (projectile.position.y <= 0) {
        projectile.position.y = 0.5;
        isFlying = false;
        hasLanded = true;
        velocity.set(0, 0, 0);
        launchCount++;

        // Push to undo stack
        const snapshot = {
            landingPosition: projectile.position.clone(),
            trailPoints: trailPoints.map(p => p.clone()),
            maxHeight: maxHeight,
            launchAngle: parseInt(document.getElementById('angleSlider').value),
            launchSpeed: parseInt(document.getElementById('speedSlider').value)
        };
        undoStack.push(snapshot);

        updateButtonStates();
    }

    updateState();
    updateHUD();
}

// Reset
function resetProjectile() {
    if (!projectile) return;
    isFlying = false;
    hasLanded = false;
    velocity.set(0, 0, 0);
    maxHeight = 0;
    projectile.position.copy(START_POS);
    projectile.rotation.set(0, 0, 0);
    clearTrail();
    updateState();
    updateHUD();
}

// Undo
function undo() {
    if (undoStack.length === 0 || isFlying) return;

    const snapshot = undoStack.pop();
    redoStack.push(snapshot);

    // Restore to start position, clear trail
    projectile.position.copy(START_POS);
    projectile.rotation.set(0, 0, 0);
    clearTrail();
    isFlying = false;
    hasLanded = false;
    velocity.set(0, 0, 0);
    maxHeight = 0;
    launchCount--;

    updateButtonStates();
    updateState();
    updateHUD();
}

// Redo
function redo() {
    if (redoStack.length === 0 || isFlying) return;

    const snapshot = redoStack.pop();
    undoStack.push(snapshot);

    // Restore the launch result
    projectile.position.copy(snapshot.landingPosition);
    drawTrailFromPoints(snapshot.trailPoints);
    maxHeight = snapshot.maxHeight;
    isFlying = false;
    hasLanded = true;
    velocity.set(0, 0, 0);
    launchCount++;

    updateButtonStates();
    updateState();
    updateHUD();
}

// UI
function updateButtonStates() {
    document.getElementById('undoBtn').disabled = undoStack.length === 0 || isFlying;
    document.getElementById('redoBtn').disabled = redoStack.length === 0 || isFlying;
    document.getElementById('launchBtn').disabled = isFlying;
}

function updateHUD() {
    if (projectile) {
        document.getElementById('positionHUD').textContent =
            `Position: x=${projectile.position.x.toFixed(1)}, y=${projectile.position.y.toFixed(1)}`;
    }
    document.getElementById('launchCountHUD').textContent = `Launches: ${launchCount}`;
    document.getElementById('maxHeightHUD').textContent = `Max Height: ${maxHeight.toFixed(1)}`;
}

// Event listeners
document.getElementById('launchBtn').addEventListener('click', launch);
document.getElementById('resetBtn').addEventListener('click', resetProjectile);
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('redoBtn').addEventListener('click', redo);

document.getElementById('angleSlider').addEventListener('input', (e) => {
    document.getElementById('angleLabel').textContent = e.target.value + '°';
    updateState();
});

document.getElementById('speedSlider').addEventListener('input', (e) => {
    document.getElementById('speedLabel').textContent = e.target.value;
    updateState();
});

document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        launch();
    }
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    physicsStep();
    controls.update();
    renderer.render(scene, camera);
}

animate();
updateHUD();
updateButtonStates();
</script>
</body>
</html>
