<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Snake Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: monospace;
            color: #fff;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
        }
        #score {
            font-size: 20px;
            font-weight: bold;
            color: #0f0;
        }
        #status {
            font-size: 16px;
            margin-top: 5px;
            color: #ff4444;
        }
        #controls-help {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 10;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            line-height: 1.5;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="ui">
        <div id="score">Score: 0</div>
        <div id="status">Playing</div>
    </div>
    <div id="controls-help">
        W/S: Move Z- / Z+<br>
        A/D: Move X- / X+<br>
        Space: Move Y+ (Up)<br>
        Shift: Move Y- (Down)<br>
        Drag: Rotate Camera
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Game Configuration & State ---
        // Grid coordinates are integers from 0 to 19.
        const GRID_SIZE = 20;
        const MOVE_INTERVAL = 0.25; // seconds per step

        let snake = [
            { x: 10, y: 10, z: 10 },
            { x: 9, y: 10, z: 10 },
            { x: 8, y: 10, z: 10 }
        ];
        let direction = { x: 1, y: 0, z: 0 };
        let inputQueue = [];
        let food = { x: 15, y: 10, z: 10 };
        let score = 0;
        let gameOver = false;
        let forceSelfCollision = false;

        // Initialize exposed state
        window.__3D_STATE__ = {
            snakeLength: snake.length,
            score: score,
            direction: { ...direction },
            headPos: { ...snake[0] },
            foodPos: { ...food },
            gameOver: gameOver
        };

        // --- Three.js Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 20, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.enableDamping = true;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Boundary Wireframe (20x20x20 centered at 0,0,0)
        const boundaryGeo = new THREE.BoxGeometry(GRID_SIZE, GRID_SIZE, GRID_SIZE);
        const boundaryMesh = new THREE.Mesh(boundaryGeo);
        const boundaryHelper = new THREE.BoxHelper(boundaryMesh, 0x444444);
        scene.add(boundaryHelper);

        // Materials & Geometries
        const boxGeo = new THREE.BoxGeometry(0.9, 0.9, 0.9);
        const headMat = new THREE.MeshLambertMaterial({ color: 0x00ff00 });
        const bodyMat = new THREE.MeshLambertMaterial({ color: 0x00aa00 });
        const foodGeo = new THREE.SphereGeometry(0.45, 16, 16);
        const foodMat = new THREE.MeshLambertMaterial({ color: 0xff0000 });

        const snakeMeshes = [];
        const foodMesh = new THREE.Mesh(foodGeo, foodMat);
        scene.add(foodMesh);

        // --- Helper Functions ---
        // Convert grid coordinate (0-19) to world coordinate (-9.5 to 9.5)
        function getPos(coord) {
            return coord - (GRID_SIZE / 2) + 0.5;
        }

        function spawnFood() {
            let valid = false;
            while (!valid) {
                food.x = Math.floor(Math.random() * GRID_SIZE);
                food.y = Math.floor(Math.random() * GRID_SIZE);
                food.z = Math.floor(Math.random() * GRID_SIZE);
                valid = true;
                for (let s of snake) {
                    if (s.x === food.x && s.y === food.y && s.z === food.z) {
                        valid = false;
                        break;
                    }
                }
            }
            foodMesh.material.color.setHex(Math.random() * 0xffffff);
        }

        function updateVisuals() {
            foodMesh.position.set(getPos(food.x), getPos(food.y), getPos(food.z));

            // Sync meshes array with snake array
            while (snakeMeshes.length < snake.length) {
                const mesh = new THREE.Mesh(boxGeo, bodyMat);
                scene.add(mesh);
                snakeMeshes.push(mesh);
            }
            while (snakeMeshes.length > snake.length) {
                const mesh = snakeMeshes.pop();
                scene.remove(mesh);
            }

            for (let i = 0; i < snake.length; i++) {
                snakeMeshes[i].position.set(getPos(snake[i].x), getPos(snake[i].y), getPos(snake[i].z));
                snakeMeshes[i].material = (i === 0) ? headMat : bodyMat;
            }
        }

        function updateState() {
            window.__3D_STATE__.snakeLength = snake.length;
            window.__3D_STATE__.score = score;
            window.__3D_STATE__.direction = { ...direction };
            window.__3D_STATE__.headPos = { ...snake[0] };
            window.__3D_STATE__.foodPos = { ...food };
            window.__3D_STATE__.gameOver = gameOver;

            document.getElementById('score').innerText = `Score: ${score}`;
            if (gameOver) {
                document.getElementById('status').innerText = 'Game Over!';
            }
        }

        // --- Game Logic ---
        function tick() {
            if (gameOver) return;

            if (inputQueue.length > 0) {
                direction = inputQueue.shift();
            }

            const head = snake[0];
            let newHead = {
                x: head.x + direction.x,
                y: head.y + direction.y,
                z: head.z + direction.z
            };

            // Wrap-around boundaries
            newHead.x = (newHead.x + GRID_SIZE) % GRID_SIZE;
            newHead.y = (newHead.y + GRID_SIZE) % GRID_SIZE;
            newHead.z = (newHead.z + GRID_SIZE) % GRID_SIZE;

            let ate = false;
            if (newHead.x === food.x && newHead.y === food.y && newHead.z === food.z) {
                ate = true;
                score += 10;
                spawnFood();
            }

            // Self-collision check
            let collision = false;
            // If we didn't eat, the tail will move, so we don't check against the very last segment
            const checkLength = snake.length - (ate ? 0 : 1);
            for (let i = 0; i < checkLength; i++) {
                if (snake[i].x === newHead.x && snake[i].y === newHead.y && snake[i].z === newHead.z) {
                    collision = true;
                    break;
                }
            }

            if (collision || forceSelfCollision) {
                gameOver = true;
                updateState();
                return;
            }

            snake.unshift(newHead);
            if (!ate) {
                snake.pop();
            }

            updateVisuals();
            updateState();
        }

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            if (gameOver) return;

            // Determine the last intended direction to prevent 180 reversals
            const lastDir = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : direction;
            let newDir = null;

            switch (e.code) {
                case 'KeyW': newDir = { x: 0, y: 0, z: -1 }; break;
                case 'KeyS': newDir = { x: 0, y: 0, z: 1 }; break;
                case 'KeyA': newDir = { x: -1, y: 0, z: 0 }; break;
                case 'KeyD': newDir = { x: 1, y: 0, z: 0 }; break;
                case 'Space': newDir = { x: 0, y: 1, z: 0 }; break;
                case 'ShiftLeft':
                case 'ShiftRight': newDir = { x: 0, y: -1, z: 0 }; break;
            }

            if (newDir) {
                // Prevent immediate reversal
                if (lastDir.x !== -newDir.x || lastDir.y !== -newDir.y || lastDir.z !== -newDir.z) {
                    // Prevent queuing the exact same direction consecutively
                    if (lastDir.x !== newDir.x || lastDir.y !== newDir.y || lastDir.z !== newDir.z) {
                        inputQueue.push(newDir);
                    }
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Testing Helpers ---
        window.__ICG_simulateEat__ = () => {
            if (gameOver) return;
            const head = snake[0];
            const nextDir = inputQueue.length > 0 ? inputQueue[0] : direction;
            food.x = (head.x + nextDir.x + GRID_SIZE) % GRID_SIZE;
            food.y = (head.y + nextDir.y + GRID_SIZE) % GRID_SIZE;
            food.z = (head.z + nextDir.z + GRID_SIZE) % GRID_SIZE;
            updateVisuals();
            updateState();
        };

        window.__ICG_triggerSelfCollision__ = () => {
            forceSelfCollision = true;
        };

        // --- Initialization & Loop ---
        spawnFood();
        updateVisuals();
        updateState();

        const clock = new THREE.Clock();
        let timeAccumulator = 0;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            const delta = clock.getDelta();
            if (!gameOver) {
                timeAccumulator += delta;
                if (timeAccumulator >= MOVE_INTERVAL) {
                    timeAccumulator -= MOVE_INTERVAL;
                    tick();
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
