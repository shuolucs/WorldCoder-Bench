<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Snake Game - 20×20×20</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }
  #ui {
    position: absolute; top: 0; left: 0; width: 100%; padding: 15px 20px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none; z-index: 10;
  }
  #score-panel {
    background: rgba(0,0,0,0.7); border: 1px solid rgba(0,255,136,0.4);
    border-radius: 10px; padding: 12px 20px; color: #0f8; font-size: 18px;
    text-shadow: 0 0 10px rgba(0,255,136,0.5);
  }
  #score-panel span { font-weight: bold; font-size: 24px; }
  #status {
    background: rgba(0,0,0,0.7); border: 1px solid rgba(0,170,255,0.4);
    border-radius: 10px; padding: 12px 20px; color: #0af; font-size: 14px;
    text-align: right; text-shadow: 0 0 10px rgba(0,170,255,0.3);
  }
  #game-over-overlay {
    display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.75); z-index: 20;
    justify-content: center; align-items: center; flex-direction: column;
  }
  #game-over-overlay.active { display: flex; }
  #game-over-overlay h1 {
    color: #f44; font-size: 60px; text-shadow: 0 0 30px rgba(255,68,68,0.8);
    margin-bottom: 10px;
  }
  #game-over-overlay p { color: #fff; font-size: 24px; margin-bottom: 20px; }
  #game-over-overlay button {
    pointer-events: all; cursor: pointer;
    background: rgba(0,255,136,0.2); border: 2px solid #0f8; color: #0f8;
    padding: 12px 30px; font-size: 18px; border-radius: 8px;
    transition: all 0.3s;
  }
  #game-over-overlay button:hover {
    background: rgba(0,255,136,0.4); box-shadow: 0 0 20px rgba(0,255,136,0.5);
  }
  #controls-hint {
    position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px; padding: 10px 20px; color: #aaa; font-size: 12px;
    pointer-events: none; text-align: center; z-index: 10;
  }
  #controls-hint kbd {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    border-radius: 3px; padding: 1px 6px; margin: 0 2px; color: #ddd;
  }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="ui">
  <div id="score-panel">Score: <span id="score">0</span><br><small>Length: <span id="length">3</span></small></div>
  <div id="status">Playing<br><small>Grid: 20×20×20 (wrap-around)</small></div>
</div>
<div id="game-over-overlay">
  <h1>GAME OVER</h1>
  <p>Final Score: <span id="final-score">0</span></p>
  <button id="restart-btn">Play Again</button>
</div>
<div id="controls-hint">
  <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move XZ &nbsp;|&nbsp;
  <kbd>Space</kbd> Up &nbsp;|&nbsp; <kbd>Shift</kbd> Down &nbsp;|&nbsp;
  <kbd>R</kbd> Restart &nbsp;|&nbsp; Mouse: Orbit Camera
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/*
 * Grid coordinate system: 0..19 for each axis (x, y, z).
 * World position for grid cell (gx, gy, gz) = (gx - 9.5, gy - 9.5, gz - 9.5)
 * This centers the 20×20×20 grid around the world origin.
 */

const GRID_SIZE = 20;
const TICK_INTERVAL = 0.20; // seconds per step
const GRID_OFFSET = -9.5; // world = grid + GRID_OFFSET

// ─── Scene Setup ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.FogExp2(0x050510, 0.012);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(28, 22, 28);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = false;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 10;
controls.maxDistance = 60;

// ─── Lighting ───
const ambientLight = new THREE.AmbientLight(0x334466, 1.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(15, 25, 20);
scene.add(dirLight);

const pointLight1 = new THREE.PointLight(0x00ff88, 0.8, 50);
pointLight1.position.set(10, 10, 10);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x0088ff, 0.6, 50);
pointLight2.position.set(-10, -5, -10);
scene.add(pointLight2);

// ─── Grid Boundary ───
function createBoundary() {
  const size = GRID_SIZE; // 20 units
  const halfSize = size / 2; // 10

  // Wireframe box
  const boxGeo = new THREE.BoxGeometry(size, size, size);
  const edgesGeo = new THREE.EdgesGeometry(boxGeo);
  const edgesMat = new THREE.LineBasicMaterial({ color: 0x1a3a5a, transparent: true, opacity: 0.6 });
  const wireframe = new THREE.LineSegments(edgesGeo, edgesMat);
  scene.add(wireframe);

  // Semi-transparent faces
  const faceMat = new THREE.MeshBasicMaterial({
    color: 0x0a1a2a, transparent: true, opacity: 0.05, side: THREE.DoubleSide, depthWrite: false
  });
  const faceMesh = new THREE.Mesh(boxGeo.clone(), faceMat);
  scene.add(faceMesh);

  // Grid lines on each face
  const gridMat = new THREE.LineBasicMaterial({ color: 0x112233, transparent: true, opacity: 0.15 });

  // Floor grid (y = -halfSize)
  for (let i = 0; i <= size; i++) {
    const pos = -halfSize + i;
    const pts1 = [new THREE.Vector3(pos, -halfSize, -halfSize), new THREE.Vector3(pos, -halfSize, halfSize)];
    const pts2 = [new THREE.Vector3(-halfSize, -halfSize, pos), new THREE.Vector3(halfSize, -halfSize, pos)];
    const g1 = new THREE.BufferGeometry().setFromPoints(pts1);
    const g2 = new THREE.BufferGeometry().setFromPoints(pts2);
    scene.add(new THREE.Line(g1, gridMat));
    scene.add(new THREE.Line(g2, gridMat));
  }

  // Axis indicators at corners
  const axLen = 3;
  const axMats = [
    new THREE.LineBasicMaterial({ color: 0xff4444 }), // X red
    new THREE.LineBasicMaterial({ color: 0x44ff44 }), // Y green
    new THREE.LineBasicMaterial({ color: 0x4444ff }), // Z blue
  ];
  const origin = new THREE.Vector3(-halfSize, -halfSize, -halfSize);
  const dirs = [new THREE.Vector3(axLen,0,0), new THREE.Vector3(0,axLen,0), new THREE.Vector3(0,0,axLen)];
  dirs.forEach((d, i) => {
    const g = new THREE.BufferGeometry().setFromPoints([origin, origin.clone().add(d)]);
    scene.add(new THREE.Line(g, axMats[i]));
  });
}
createBoundary();

// ─── Helper: grid to world ───
function gridToWorld(gx, gy, gz) {
  return new THREE.Vector3(gx + GRID_OFFSET, gy + GRID_OFFSET, gz + GRID_OFFSET);
}

function wrapCoord(v) {
  return ((v % GRID_SIZE) + GRID_SIZE) % GRID_SIZE;
}

// ─── Snake & Food State ───
let snake = []; // array of {x, y, z} grid coords, index 0 = head
let direction = { x: 0, y: 0, z: -1 }; // initial: moving -Z (toward camera with default view)
let nextDirection = { x: 0, y: 0, z: -1 };
let food = { x: 0, y: 0, z: 0 };
let foodColor = new THREE.Color();
let score = 0;
let gameOver = false;
let tickTimer = 0;
let growPending = 0;

// 3D objects
let snakeMeshes = [];
let foodMesh = null;
const snakeGroup = new THREE.Group();
scene.add(snakeGroup);

// ─── Materials ───
const headMat = new THREE.MeshPhongMaterial({ color: 0x00ff88, emissive: 0x004422, shininess: 80 });
const bodyMat = new THREE.MeshPhongMaterial({ color: 0x00cc66, emissive: 0x002211, shininess: 40 });
const bodyMat2 = new THREE.MeshPhongMaterial({ color: 0x00aa55, emissive: 0x001a0a, shininess: 40 });

const headGeo = new THREE.BoxGeometry(0.85, 0.85, 0.85);
const bodyGeo = new THREE.BoxGeometry(0.75, 0.75, 0.75);
const foodGeo = new THREE.SphereGeometry(0.4, 16, 12);

// ─── Trail particles ───
const trailParticles = [];
const trailGeo = new THREE.SphereGeometry(0.1, 6, 4);
const trailMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.6 });

function spawnTrailParticle(pos) {
  const mesh = new THREE.Mesh(trailGeo, trailMat.clone());
  mesh.position.copy(pos);
  mesh.userData.life = 0.5;
  scene.add(mesh);
  trailParticles.push(mesh);
}

function updateTrailParticles(dt) {
  for (let i = trailParticles.length - 1; i >= 0; i--) {
    const p = trailParticles[i];
    p.userData.life -= dt;
    if (p.userData.life <= 0) {
      scene.remove(p);
      p.geometry.dispose();
      p.material.dispose();
      trailParticles.splice(i, 1);
    } else {
      const t = p.userData.life / 0.5;
      p.material.opacity = t * 0.5;
      p.scale.setScalar(t);
    }
  }
}

// ─── Init Game ───
function initGame() {
  // Clear old meshes
  snakeMeshes.forEach(m => { snakeGroup.remove(m); m.geometry.dispose(); });
  snakeMeshes = [];
  if (foodMesh) { scene.remove(foodMesh); foodMesh.geometry.dispose(); foodMesh.material.dispose(); foodMesh = null; }
  trailParticles.forEach(p => { scene.remove(p); p.geometry.dispose(); p.material.dispose(); });
  trailParticles.length = 0;

  // Init snake at center, length 3
  snake = [
    { x: 10, y: 10, z: 10 },
    { x: 10, y: 10, z: 11 },
    { x: 10, y: 10, z: 12 },
  ];
  direction = { x: 0, y: 0, z: -1 };
  nextDirection = { x: 0, y: 0, z: -1 };
  score = 0;
  gameOver = false;
  tickTimer = 0;
  growPending = 0;

  // Create snake meshes
  snake.forEach((seg, i) => {
    const geo = i === 0 ? headGeo : bodyGeo;
    const mat = i === 0 ? headMat.clone() : (i % 2 === 0 ? bodyMat.clone() : bodyMat2.clone());
    const mesh = new THREE.Mesh(geo, mat);
    const wp = gridToWorld(seg.x, seg.y, seg.z);
    mesh.position.copy(wp);
    snakeGroup.add(mesh);
    snakeMeshes.push(mesh);
  });

  // Spawn food
  spawnFood();

  // Update UI
  updateUI();
  updateState();

  document.getElementById('game-over-overlay').classList.remove('active');
  document.getElementById('status').innerHTML = 'Playing<br><small>Grid: 20×20×20 (wrap-around)</small>';
}

// ─── Food ───
function getOccupiedSet() {
  const set = new Set();
  snake.forEach(s => set.add(`${s.x},${s.y},${s.z}`));
  return set;
}

function spawnFood() {
  const occupied = getOccupiedSet();
  let fx, fy, fz;
  let attempts = 0;
  do {
    fx = Math.floor(Math.random() * GRID_SIZE);
    fy = Math.floor(Math.random() * GRID_SIZE);
    fz = Math.floor(Math.random() * GRID_SIZE);
    attempts++;
  } while (occupied.has(`${fx},${fy},${fz}`) && attempts < 10000);

  food = { x: fx, y: fy, z: fz };

  // Random bright color
  foodColor = new THREE.Color().setHSL(Math.random(), 0.9, 0.6);

  if (foodMesh) {
    scene.remove(foodMesh);
    foodMesh.material.dispose();
    foodMesh.geometry.dispose();
  }

  const mat = new THREE.MeshPhongMaterial({
    color: foodColor, emissive: foodColor.clone().multiplyScalar(0.3),
    shininess: 100, transparent: true, opacity: 0.9
  });
  foodMesh = new THREE.Mesh(foodGeo.clone(), mat);
  const wp = gridToWorld(food.x, food.y, food.z);
  foodMesh.position.copy(wp);
  scene.add(foodMesh);
}

// ─── Game Tick ───
function gameTick() {
  if (gameOver) return;

  // Apply direction
  direction = { ...nextDirection };

  // Compute new head position with wrap-around
  const head = snake[0];
  const newHead = {
    x: wrapCoord(head.x + direction.x),
    y: wrapCoord(head.y + direction.y),
    z: wrapCoord(head.z + direction.z),
  };

  // Check self-collision (check against all body segments BEFORE moving)
  for (let i = 1; i < snake.length; i++) {
    if (snake[i].x === newHead.x && snake[i].y === newHead.y && snake[i].z === newHead.z) {
      gameOver = true;
      updateState();
      showGameOver();
      return;
    }
  }

  // Move snake
  snake.unshift(newHead);

  // Check food
  if (newHead.x === food.x && newHead.y === food.y && newHead.z === food.z) {
    score += 10;
    growPending++;
    // Eat effect
    for (let i = 0; i < 5; i++) {
      const wp = gridToWorld(food.x, food.y, food.z);
      wp.x += (Math.random() - 0.5) * 0.5;
      wp.y += (Math.random() - 0.5) * 0.5;
      wp.z += (Math.random() - 0.5) * 0.5;
      spawnTrailParticle(wp);
    }
    spawnFood();
  }

  if (growPending > 0) {
    growPending--;
    // Don't remove tail - snake grows
  } else {
    snake.pop();
  }

  // Trail particle at head
  const hwp = gridToWorld(newHead.x, newHead.y, newHead.z);
  spawnTrailParticle(hwp.clone());

  // Sync meshes
  syncSnakeMeshes();
  updateUI();
  updateState();
}

function syncSnakeMeshes() {
  // Add or remove meshes to match snake length
  while (snakeMeshes.length < snake.length) {
    const i = snakeMeshes.length;
    const mat = i % 2 === 0 ? bodyMat.clone() : bodyMat2.clone();
    const mesh = new THREE.Mesh(bodyGeo.clone(), mat);
    snakeGroup.add(mesh);
    snakeMeshes.push(mesh);
  }
  while (snakeMeshes.length > snake.length) {
    const mesh = snakeMeshes.pop();
    snakeGroup.remove(mesh);
    mesh.geometry.dispose();
    mesh.material.dispose();
  }

  // Update positions and materials
  snake.forEach((seg, i) => {
    const mesh = snakeMeshes[i];
    const wp = gridToWorld(seg.x, seg.y, seg.z);
    mesh.position.copy(wp);

    if (i === 0) {
      // Head
      if (mesh.geometry !== headGeo) {
        mesh.geometry.dispose();
        mesh.geometry = headGeo;
      }
      mesh.material.color.set(0x00ff88);
      mesh.material.emissive.set(0x004422);
    } else {
      if (mesh.geometry !== bodyGeo) {
        mesh.geometry.dispose();
        mesh.geometry = bodyGeo;
      }
      // Gradient color based on position in body
      const t = i / snake.length;
      mesh.material.color.setHSL(0.38 - t * 0.1, 0.8, 0.45 - t * 0.15);
      mesh.material.emissive.setHSL(0.38, 0.5, 0.05);
    }

    // Scale animation for head
    if (i === 0) {
      mesh.scale.setScalar(1.0);
    } else {
      const s = 1.0 - (i / snake.length) * 0.3;
      mesh.scale.setScalar(Math.max(s, 0.5));
    }
  });
}

// ─── UI ───
function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('length').textContent = snake.length;
}

function showGameOver() {
  document.getElementById('game-over-overlay').classList.add('active');
  document.getElementById('final-score').textContent = score;
  document.getElementById('status').innerHTML = 'Game Over<br><small>Self-collision!</small>';
}

// ─── State Exposure ───
function updateState() {
  const head = snake[0];
  window.__3D_STATE__ = {
    snakeLength: snake.length,
    score: score,
    direction: { x: direction.x, y: direction.y, z: direction.z },
    headPos: { x: head.x, y: head.y, z: head.z },
    foodPos: { x: food.x, y: food.y, z: food.z },
    gameOver: gameOver,
  };
}

// ─── Simulate helpers ───
window.__ICG_simulateEat__ = function() {
  if (gameOver) return;
  // Move food to where the head will be next step
  const head = snake[0];
  const nextHead = {
    x: wrapCoord(head.x + direction.x),
    y: wrapCoord(head.y + direction.y),
    z: wrapCoord(head.z + direction.z),
  };
  food = { ...nextHead };
  if (foodMesh) {
    const wp = gridToWorld(food.x, food.y, food.z);
    foodMesh.position.copy(wp);
  }
  updateState();
};

window.__ICG_triggerSelfCollision__ = function() {
  if (gameOver) return;
  if (snake.length < 2) return;
  // Set direction so head moves into the second segment
  // Actually, place second segment where head will go
  const head = snake[0];
  const nextHead = {
    x: wrapCoord(head.x + direction.x),
    y: wrapCoord(head.y + direction.y),
    z: wrapCoord(head.z + direction.z),
  };
  // Insert a fake segment at nextHead position
  snake.splice(1, 0, { ...nextHead });
  // Add mesh for it
  const mat = bodyMat.clone();
  const mesh = new THREE.Mesh(bodyGeo.clone(), mat);
  const wp = gridToWorld(nextHead.x, nextHead.y, nextHead.z);
  mesh.position.copy(wp);
  snakeGroup.add(mesh);
  snakeMeshes.splice(1, 0, mesh);
  updateState();
};

// ─── Input ───
const keysPressed = new Set();

document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  keysPressed.add(e.code);

  if (gameOver && e.code === 'KeyR') {
    initGame();
    return;
  }
  if (gameOver) return;

  let nd = null;

  switch (e.code) {
    // W: -Z direction (forward in default camera view)
    case 'KeyW': nd = { x: 0, y: 0, z: -1 }; break;
    // S: +Z direction (backward)
    case 'KeyS': nd = { x: 0, y: 0, z: 1 }; break;
    // A: -X direction (left)
    case 'KeyA': nd = { x: -1, y: 0, z: 0 }; break;
    // D: +X direction (right)
    case 'KeyD': nd = { x: 1, y: 0, z: 0 }; break;
    // Space: +Y (up)
    case 'Space': nd = { x: 0, y: 1, z: 0 }; e.preventDefault(); break;
    // Shift: -Y (down)
    case 'ShiftLeft':
    case 'ShiftRight': nd = { x: 0, y: -1, z: 0 }; e.preventDefault(); break;
    case 'KeyR': initGame(); return;
  }

  if (nd) {
    // Prevent immediate reversal
    if (nd.x + direction.x === 0 && nd.y + direction.y === 0 && nd.z + direction.z === 0) {
      // This would be a 180° reversal, ignore
      return;
    }
    nextDirection = nd;
  }
});

document.addEventListener('keyup', (e) => {
  keysPressed.delete(e.code);
});

document.getElementById('restart-btn').addEventListener('click', () => {
  initGame();
});

// ─── Animation ───
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  if (!gameOver) {
    tickTimer += dt;
    if (tickTimer >= TICK_INTERVAL) {
      tickTimer -= TICK_INTERVAL;
      gameTick();
    }
  }

  // Animate food (bobbing + rotation + pulsing glow)
  if (foodMesh) {
    const t = clock.getElapsedTime();
    const basePos = gridToWorld(food.x, food.y, food.z);
    foodMesh.position.y = basePos.y + Math.sin(t * 3) * 0.15;
    foodMesh.rotation.y = t * 2;
    foodMesh.rotation.x = t * 0.7;
    const pulse = 0.9 + Math.sin(t * 4) * 0.15;
    foodMesh.scale.setScalar(pulse);
  }

  // Animate head (subtle pulse)
  if (snakeMeshes.length > 0 && !gameOver) {
    const t = clock.getElapsedTime();
    const pulse = 1.0 + Math.sin(t * 6) * 0.05;
    snakeMeshes[0].scale.setScalar(pulse);
  }

  // Game over effect: flash head red
  if (gameOver && snakeMeshes.length > 0) {
    const t = clock.getElapsedTime();
    const flash = Math.sin(t * 8) > 0;
    snakeMeshes[0].material.color.set(flash ? 0xff0000 : 0x880000);
    snakeMeshes[0].material.emissive.set(flash ? 0x440000 : 0x220000);
  }

  updateTrailParticles(dt);
  controls.update();
  renderer.render(scene, camera);
}

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Start ───
initGame();
animate();
</script>
</body>
</html>
