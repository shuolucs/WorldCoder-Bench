<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Network Graph - Force Directed Layout</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #0f0;
    background: rgba(0,0,0,0.7);
    padding: 15px;
    border: 1px solid #0f0;
    border-radius: 5px;
    font-size: 13px;
    line-height: 1.6;
    z-index: 100;
    min-width: 220px;
  }
  #hud div { margin: 2px 0; }
  #controls {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #controls button, #controls select {
    padding: 8px 16px;
    background: rgba(0,0,0,0.7);
    color: #0f0;
    border: 1px solid #0f0;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 13px;
  }
  #controls button:hover { background: rgba(0,255,0,0.2); }
  #controls select { appearance: auto; }
  #controls select option { background: #111; color: #0f0; }
</style>
</head>
<body>

<div id="hud">
  <div id="hud-nodes">Nodes: 30</div>
  <div id="hud-edges">Edges: 0</div>
  <div id="hud-iteration">Iteration: 0</div>
  <div id="hud-energy">Kinetic Energy: 0.00</div>
  <div id="hud-debug">Debug: OFF</div>
  <div id="hud-simulation">Simulation: RUNNING</div>
</div>

<div id="controls">
  <button id="btn-pause">Pause/Resume</button>
  <button id="btn-reset">Reset</button>
  <select id="select-highlight">
    <option value="0">None</option>
    <option value="1">Cluster 1</option>
    <option value="2">Cluster 2</option>
    <option value="3">Cluster 3</option>
  </select>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 50);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const ambientLight = new THREE.AmbientLight(0x404040);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
directionalLight.position.set(10, 10, 10);
scene.add(directionalLight);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// ============ STATE ============
const NUM_NODES = 30;
const CLUSTER_SIZE = 10;
const clusterColors = [0xff4444, 0x44ff44, 0x4444ff];
const clusterBiases = [
  { x: -10, y: 10, z: 0 },
  { x: 10, y: -5, z: 5 },
  { x: 0, y: -10, z: -10 }
];

let simulationRunning = true;
let iterationCount = 0;
let kineticEnergy = 0;
let debugOverlayVisible = false;
let selectedNodeIndex = -1;
let highlightedCluster = 0;
let storkLoaded = false;

// Node data
const nodes = [];
const edges = [];
const velocities = [];
const nodeMeshes = [];
let edgeLines = [];
let storkModel = null;
let selectionIndicator = null;

const debugGroup = new THREE.Group();
debugGroup.name = 'debugGroup';
debugGroup.visible = false;
scene.add(debugGroup);

const graphGroup = new THREE.Group();
scene.add(graphGroup);

// ============ NODE INITIALIZATION ============
function getCluster(index) {
  return Math.floor(index / CLUSTER_SIZE);
}

function randomizePositions() {
  for (let i = 0; i < NUM_NODES; i++) {
    const cluster = getCluster(i);
    const bias = clusterBiases[cluster];
    nodes[i] = {
      x: bias.x + (Math.random() - 0.5) * 20,
      y: bias.y + (Math.random() - 0.5) * 20,
      z: bias.z + (Math.random() - 0.5) * 20,
      cluster: cluster
    };
    velocities[i] = { x: 0, y: 0, z: 0 };
  }
}

function generateEdges() {
  edges.length = 0;
  const edgeSet = new Set();

  function addEdge(a, b) {
    const key = Math.min(a, b) + '-' + Math.max(a, b);
    if (!edgeSet.has(key) && a !== b) {
      edgeSet.add(key);
      edges.push([a, b]);
    }
  }

  // Intra-cluster edges
  for (let c = 0; c < 3; c++) {
    const start = c * CLUSTER_SIZE;
    const end = start + CLUSTER_SIZE;
    for (let i = start; i < end; i++) {
      const numConnections = 3 + Math.floor(Math.random() * 2); // 3-4
      const candidates = [];
      for (let j = start; j < end; j++) {
        if (j !== i) candidates.push(j);
      }
      // Shuffle and pick
      for (let k = candidates.length - 1; k > 0; k--) {
        const r = Math.floor(Math.random() * (k + 1));
        [candidates[k], candidates[r]] = [candidates[r], candidates[k]];
      }
      for (let k = 0; k < Math.min(numConnections, candidates.length); k++) {
        addEdge(i, candidates[k]);
      }
    }
  }

  // Cross-cluster edges
  let crossCount = 0;
  while (crossCount < 5) {
    const a = Math.floor(Math.random() * NUM_NODES);
    const b = Math.floor(Math.random() * NUM_NODES);
    if (getCluster(a) !== getCluster(b)) {
      const key = Math.min(a, b) + '-' + Math.max(a, b);
      if (!edgeSet.has(key)) {
        addEdge(a, b);
        crossCount++;
      }
    }
  }
}

// ============ MESH CREATION ============
const sphereGeometry = new THREE.SphereGeometry(0.5, 16, 16);

function createNodeMeshes() {
  // Clear existing
  for (const mesh of nodeMeshes) {
    graphGroup.remove(mesh);
    if (mesh.geometry) mesh.geometry.dispose();
    if (mesh.material) mesh.material.dispose();
  }
  nodeMeshes.length = 0;

  for (let i = 0; i < NUM_NODES; i++) {
    const cluster = getCluster(i);
    const color = clusterColors[cluster];

    if (i === 0 && storkModel) {
      // Use stork for influencer node
      const storkClone = storkModel.clone();
      storkClone.userData.nodeIndex = i;
      storkClone.userData.isStork = true;
      nodeMeshes.push(storkClone);
      graphGroup.add(storkClone);
    } else {
      const material = new THREE.MeshPhongMaterial({
        color: color,
        emissive: 0x000000,
        transparent: true,
        opacity: 1.0
      });
      const mesh = new THREE.Mesh(sphereGeometry.clone(), material);
      mesh.userData.nodeIndex = i;
      nodeMeshes.push(mesh);
      graphGroup.add(mesh);
    }
  }
}

function createEdgeLines() {
  for (const line of edgeLines) {
    graphGroup.remove(line);
    if (line.geometry) line.geometry.dispose();
    if (line.material) line.material.dispose();
  }
  edgeLines.length = 0;

  const lineMaterial = new THREE.LineBasicMaterial({ color: 0x888888 });

  for (const [a, b] of edges) {
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(6);
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const line = new THREE.Line(geometry, lineMaterial.clone());
    line.userData.edge = [a, b];
    edgeLines.push(line);
    graphGroup.add(line);
  }
}

function updateEdgePositions() {
  for (let i = 0; i < edgeLines.length; i++) {
    const [a, b] = edges[i];
    const posAttr = edgeLines[i].geometry.getAttribute('position');
    posAttr.array[0] = nodes[a].x;
    posAttr.array[1] = nodes[a].y;
    posAttr.array[2] = nodes[a].z;
    posAttr.array[3] = nodes[b].x;
    posAttr.array[4] = nodes[b].y;
    posAttr.array[5] = nodes[b].z;
    posAttr.needsUpdate = true;
  }
}

function updateNodePositions() {
  for (let i = 0; i < NUM_NODES; i++) {
    if (nodeMeshes[i]) {
      nodeMeshes[i].position.set(nodes[i].x, nodes[i].y, nodes[i].z);
    }
  }
}

// ============ SELECTION INDICATOR ============
function createSelectionIndicator() {
  const geo = new THREE.SphereGeometry(0.8, 16, 16);
  const mat = new THREE.MeshBasicMaterial({
    color: 0xffff00,
    wireframe: true,
    transparent: true,
    opacity: 0.8
  });
  selectionIndicator = new THREE.Mesh(geo, mat);
  selectionIndicator.visible = false;
  scene.add(selectionIndicator);
}

function updateSelectionIndicator() {
  if (selectedNodeIndex >= 0 && selectedNodeIndex < NUM_NODES) {
    selectionIndicator.visible = true;
    selectionIndicator.position.set(nodes[selectedNodeIndex].x, nodes[selectedNodeIndex].y, nodes[selectedNodeIndex].z);
  } else {
    selectionIndicator.visible = false;
  }
}

// ============ PHYSICS ============
function simulationStep() {
  if (!simulationRunning) return;

  const forces = [];
  for (let i = 0; i < NUM_NODES; i++) {
    forces.push({ x: 0, y: 0, z: 0 });
  }

  // Repulsion between all pairs
  for (let i = 0; i < NUM_NODES; i++) {
    for (let j = i + 1; j < NUM_NODES; j++) {
      let dx = nodes[i].x - nodes[j].x;
      let dy = nodes[i].y - nodes[j].y;
      let dz = nodes[i].z - nodes[j].z;
      let distSq = dx * dx + dy * dy + dz * dz;
      if (distSq < 0.01) distSq = 0.01;
      const dist = Math.sqrt(distSq);
      const force = 50.0 / distSq;
      const fx = (dx / dist) * force;
      const fy = (dy / dist) * force;
      const fz = (dz / dist) * force;
      forces[i].x += fx;
      forces[i].y += fy;
      forces[i].z += fz;
      forces[j].x -= fx;
      forces[j].y -= fy;
      forces[j].z -= fz;
    }
  }

  // Attraction along edges (spring)
  const restLength = 5;
  const springK = 0.05;
  for (const [a, b] of edges) {
    let dx = nodes[b].x - nodes[a].x;
    let dy = nodes[b].y - nodes[a].y;
    let dz = nodes[b].z - nodes[a].z;
    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
    if (dist < 0.001) continue;
    const displacement = dist - restLength;
    const force = springK * displacement;
    const fx = (dx / dist) * force;
    const fy = (dy / dist) * force;
    const fz = (dz / dist) * force;
    forces[a].x += fx;
    forces[a].y += fy;
    forces[a].z += fz;
    forces[b].x -= fx;
    forces[b].y -= fy;
    forces[b].z -= fz;
  }

  // Cluster gravity
  const centroids = computeClusterCentroids();
  for (let i = 0; i < NUM_NODES; i++) {
    const c = getCluster(i);
    const centroid = centroids[c];
    forces[i].x += (centroid.x - nodes[i].x) * 0.01;
    forces[i].y += (centroid.y - nodes[i].y) * 0.01;
    forces[i].z += (centroid.z - nodes[i].z) * 0.01;
  }

  // Update velocities and positions
  kineticEnergy = 0;
  for (let i = 0; i < NUM_NODES; i++) {
    velocities[i].x = (velocities[i].x + forces[i].x) * 0.95;
    velocities[i].y = (velocities[i].y + forces[i].y) * 0.95;
    velocities[i].z = (velocities[i].z + forces[i].z) * 0.95;

    nodes[i].x += velocities[i].x;
    nodes[i].y += velocities[i].y;
    nodes[i].z += velocities[i].z;

    const vMag = velocities[i].x * velocities[i].x + velocities[i].y * velocities[i].y + velocities[i].z * velocities[i].z;
    kineticEnergy += vMag;
  }

  iterationCount++;
}

function computeClusterCentroids() {
  const centroids = [
    { x: 0, y: 0, z: 0 },
    { x: 0, y: 0, z: 0 },
    { x: 0, y: 0, z: 0 }
  ];
  for (let i = 0; i < NUM_NODES; i++) {
    const c = getCluster(i);
    centroids[c].x += nodes[i].x;
    centroids[c].y += nodes[i].y;
    centroids[c].z += nodes[i].z;
  }
  for (let c = 0; c < 3; c++) {
    centroids[c].x /= CLUSTER_SIZE;
    centroids[c].y /= CLUSTER_SIZE;
    centroids[c].z /= CLUSTER_SIZE;
  }
  return centroids;
}

// ============ DEBUG OVERLAY ============
let debugBoxHelpers = [];
let debugArrows = [];
let debugGrid = null;

function updateDebugOverlay() {
  // Clear previous debug objects
  while (debugGroup.children.length > 0) {
    const child = debugGroup.children[0];
    debugGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
    if (child.material) child.material.dispose();
  }

  if (!debugOverlayVisible) return;

  // Cluster bounding boxes
  for (let c = 0; c < 3; c++) {
    const start = c * CLUSTER_SIZE;
    const end = start + CLUSTER_SIZE;
    let minX = Infinity, minY = Infinity, minZ = Infinity;
    let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;
    for (let i = start; i < end; i++) {
      minX = Math.min(minX, nodes[i].x);
      minY = Math.min(minY, nodes[i].y);
      minZ = Math.min(minZ, nodes[i].z);
      maxX = Math.max(maxX, nodes[i].x);
      maxY = Math.max(maxY, nodes[i].y);
      maxZ = Math.max(maxZ, nodes[i].z);
    }
    const sizeX = maxX - minX || 1;
    const sizeY = maxY - minY || 1;
    const sizeZ = maxZ - minZ || 1;
    const centerX = (minX + maxX) / 2;
    const centerY = (minY + maxY) / 2;
    const centerZ = (minZ + maxZ) / 2;

    const boxGeo = new THREE.BoxGeometry(sizeX, sizeY, sizeZ);
    const boxMat = new THREE.MeshBasicMaterial({
      color: clusterColors[c],
      wireframe: true,
      transparent: true,
      opacity: 0.3
    });
    const boxMesh = new THREE.Mesh(boxGeo, boxMat);
    boxMesh.position.set(centerX, centerY, centerZ);
    debugGroup.add(boxMesh);
  }

  // Velocity arrows
  for (let i = 0; i < NUM_NODES; i++) {
    const vel = velocities[i];
    const mag = Math.sqrt(vel.x * vel.x + vel.y * vel.y + vel.z * vel.z);
    if (mag < 0.001) continue;
    const dir = new THREE.Vector3(vel.x, vel.y, vel.z).normalize();
    const origin = new THREE.Vector3(nodes[i].x, nodes[i].y, nodes[i].z);
    const length = Math.min(mag * 5, 3);
    const arrow = new THREE.ArrowHelper(dir, origin, length, 0xffff00, 0.3, 0.2);
    debugGroup.add(arrow);
  }

  // Debug grid plane at y=0
  const gridGeo = new THREE.PlaneGeometry(60, 60, 20, 20);
  const gridMat = new THREE.MeshBasicMaterial({
    color: 0x444444,
    wireframe: true,
    transparent: true,
    opacity: 0.2,
    side: THREE.DoubleSide
  });
  const gridMesh = new THREE.Mesh(gridGeo, gridMat);
  gridMesh.rotation.x = -Math.PI / 2;
  gridMesh.position.y = 0;
  debugGroup.add(gridMesh);
}

// ============ HIGHLIGHT ============
function applyHighlight() {
  for (let i = 0; i < NUM_NODES; i++) {
    const mesh = nodeMeshes[i];
    if (!mesh || !mesh.material) continue;
    if (mesh.userData.isStork) {
      // For stork, traverse children
      mesh.traverse((child) => {
        if (child.isMesh && child.material) {
          if (highlightedCluster === 0) {
            child.material.transparent = false;
            child.material.opacity = 1.0;
            if (child.material.emissive) child.material.emissive.setHex(0x000000);
          } else if (getCluster(i) + 1 === highlightedCluster) {
            child.material.transparent = false;
            child.material.opacity = 1.0;
            if (child.material.emissive) child.material.emissive.setHex(0x333333);
          } else {
            child.material.transparent = true;
            child.material.opacity = 0.5;
            if (child.material.emissive) child.material.emissive.setHex(0x000000);
          }
        }
      });
      continue;
    }
    const cluster = getCluster(i);
    if (highlightedCluster === 0) {
      mesh.material.opacity = 1.0;
      mesh.material.emissive.setHex(0x000000);
    } else if (cluster + 1 === highlightedCluster) {
      mesh.material.opacity = 1.0;
      mesh.material.emissive.setHex(clusterColors[cluster]);
      mesh.material.emissiveIntensity = 0.5;
    } else {
      mesh.material.opacity = 0.5;
      mesh.material.emissive.setHex(0x000000);
    }
  }
}

// ============ HUD UPDATE ============
function updateHUD() {
  document.getElementById('hud-nodes').textContent = `Nodes: ${NUM_NODES}`;
  document.getElementById('hud-edges').textContent = `Edges: ${edges.length}`;
  document.getElementById('hud-iteration').textContent = `Iteration: ${iterationCount}`;
  document.getElementById('hud-energy').textContent = `Kinetic Energy: ${kineticEnergy.toFixed(2)}`;
  document.getElementById('hud-debug').textContent = `Debug: ${debugOverlayVisible ? 'ON' : 'OFF'}`;
  document.getElementById('hud-simulation').textContent = `Simulation: ${simulationRunning ? 'RUNNING' : 'PAUSED'}`;
}

// ============ RAYCASTING ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onMouseClick(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Collect all clickable meshes
  const clickables = [];
  for (const mesh of nodeMeshes) {
    if (mesh.userData.isStork) {
      mesh.traverse((child) => {
        if (child.isMesh) {
          child.userData.nodeIndex = mesh.userData.nodeIndex;
          clickables.push(child);
        }
      });
    } else {
      clickables.push(mesh);
    }
  }

  const intersects = raycaster.intersectObjects(clickables, false);
  if (intersects.length > 0) {
    let idx = intersects[0].object.userData.nodeIndex;
    if (idx === undefined) {
      // Check parent
      let parent = intersects[0].object.parent;
      while (parent) {
        if (parent.userData && parent.userData.nodeIndex !== undefined) {
          idx = parent.userData.nodeIndex;
          break;
        }
        parent = parent.parent;
      }
    }
    if (idx !== undefined) {
      selectedNodeIndex = idx;
    }
  } else {
    selectedNodeIndex = -1;
  }
}

// ============ STATE MANAGEMENT ============
function updateState() {
  const centroids = computeClusterCentroids();
  let hasNaN = false;
  let totalVel = 0;
  for (let i = 0; i < NUM_NODES; i++) {
    if (isNaN(nodes[i].x) || isNaN(nodes[i].y) || isNaN(nodes[i].z)) {
      hasNaN = true;
    }
    const v = velocities[i];
    totalVel += Math.sqrt(v.x * v.x + v.y * v.y + v.z * v.z);
  }

  window.__3D_STATE__ = {
    nodeCount: NUM_NODES,
    edgeCount: edges.length,
    simulationRunning: simulationRunning,
    iterationCount: iterationCount,
    kineticEnergy: kineticEnergy,
    debugOverlayVisible: debugOverlayVisible,
    selectedNodeIndex: selectedNodeIndex,
    highlightedCluster: highlightedCluster,
    storkLoaded: storkLoaded,
    clusterCentroids: centroids,
    nodesHaveNaN: hasNaN,
    averageVelocity: totalVel / NUM_NODES
  };
}

// ============ LOAD STORK ============
function loadStork() {
  const loader = new GLTFLoader();
  loader.load(
    'stork.glb',
    (gltf) => {
      storkModel = gltf.scene;
      // Scale to roughly size 2
      const box = new THREE.Box3().setFromObject(storkModel);
      const size = new THREE.Vector3();
      box.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 2 / maxDim;
      storkModel.scale.set(scale, scale, scale);

      // Center the model
      const center = new THREE.Vector3();
      box.getCenter(center);
      storkModel.position.sub(center.multiplyScalar(scale));

      storkLoaded = true;
      // Rebuild node 0 with stork
      rebuildNode0();
    },
    undefined,
    (error) => {
      console.warn('Could not load stork.glb:', error);
      storkLoaded = false;
    }
  );
}

function rebuildNode0() {
  if (!storkModel || !nodeMeshes[0]) return;
  const oldMesh = nodeMeshes[0];
  graphGroup.remove(oldMesh);
  if (oldMesh.geometry) oldMesh.geometry.dispose();
  if (oldMesh.material) oldMesh.material.dispose();

  const storkClone = storkModel.clone();
  storkClone.userData.nodeIndex = 0;
  storkClone.userData.isStork = true;
  nodeMeshes[0] = storkClone;
  graphGroup.add(storkClone);
}

// ============ RESET ============
function resetSimulation() {
  randomizePositions();
  generateEdges();
  iterationCount = 0;
  kineticEnergy = 0;
  simulationRunning = true;
  selectedNodeIndex = -1;

  // Rebuild meshes
  createNodeMeshes();
  createEdgeLines();
  applyHighlight();
}

// ============ EVENT LISTENERS ============
document.getElementById('btn-pause').addEventListener('click', () => {
  simulationRunning = !simulationRunning;
});

document.getElementById('btn-reset').addEventListener('click', () => {
  resetSimulation();
});

document.getElementById('select-highlight').addEventListener('change', (e) => {
  highlightedCluster = parseInt(e.target.value);
  applyHighlight();
});

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    simulationRunning = !simulationRunning;
  } else if (e.code === 'KeyD') {
    debugOverlayVisible = !debugOverlayVisible;
    debugGroup.visible = debugOverlayVisible;
  } else if (e.code === 'KeyR') {
    resetSimulation();
  }
});

window.addEventListener('click', onMouseClick);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ INIT ============
randomizePositions();
generateEdges();
createNodeMeshes();
createEdgeLines();
createSelectionIndicator();
loadStork();

// ============ ANIMATION LOOP ============
let debugUpdateCounter = 0;

function animate() {
  requestAnimationFrame(animate);

  simulationStep();
  updateNodePositions();
  updateEdgePositions();
  updateSelectionIndicator();

  // Update debug overlay every 5 frames for performance
  debugUpdateCounter++;
  if (debugOverlayVisible && debugUpdateCounter % 5 === 0) {
    updateDebugOverlay();
  } else if (!debugOverlayVisible && debugGroup.children.length > 0) {
    while (debugGroup.children.length > 0) {
      const child = debugGroup.children[0];
      debugGroup.remove(child);
      if (child.geometry) child.geometry.dispose();
      if (child.material) child.material.dispose();
    }
  }

  updateHUD();
  updateState();
  controls.update();
  renderer.render(scene, camera);
}

animate();

</script>
</body>
