<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 散点图查看器</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #111;
      color: #eee;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 20;
      width: 320px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(20, 20, 24, 0.88);
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      font-size: 14px;
      line-height: 1.5;
    }

    #panel h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .row {
      margin-bottom: 10px;
    }

    .row label {
      display: inline-block;
      min-width: 78px;
    }

    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .slider-wrap input[type="range"] {
      flex: 1;
    }

    #stats, #info {
      margin-top: 8px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      white-space: pre-line;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
    }

    #brushOverlay {
      position: absolute;
      z-index: 15;
      border: 1px solid rgba(255,255,255,0.85);
      background: rgba(100, 180, 255, 0.2);
      pointer-events: none;
      display: none;
    }

    .label {
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      text-shadow: 0 0 4px rgba(0,0,0,0.9);
      white-space: nowrap;
      user-select: none;
      pointer-events: none;
    }

    canvas {
      display: block;
    }

    select, input[type="range"] {
      accent-color: #5fa8ff;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="panel">
      <h3>3D 散点图查看器</h3>

      <div class="row">
        <label for="colormap">Colormap</label>
        <select id="colormap">
          <option value="rainbow">rainbow</option>
          <option value="cooltowarm">cooltowarm</option>
          <option value="blackbody">blackbody</option>
        </select>
      </div>

      <div class="row">
        <label for="valueMin">valueMin</label>
        <div class="slider-wrap">
          <input id="valueMin" type="range" min="0" max="1" step="0.01" value="0" />
          <span id="valueMinText">0.00</span>
        </div>
      </div>

      <div class="row">
        <label for="valueMax">valueMax</label>
        <div class="slider-wrap">
          <input id="valueMax" type="range" min="0" max="1" step="0.01" value="1" />
          <span id="valueMaxText">1.00</span>
        </div>
      </div>

      <div id="info">
可见点数: <span id="visibleCount">0</span>
选中点数: <span id="selectedCount">0</span>
      </div>

      <div id="stats">mean: 0.0000
std: 0.0000
min: 0.0000
max: 0.0000</div>
    </div>

    <div id="brushOverlay"></div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { Lut } from 'three/addons/math/Lut.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    const app = document.getElementById('app');
    const brushOverlay = document.getElementById('brushOverlay');
    const colormapSelect = document.getElementById('colormap');
    const valueMinInput = document.getElementById('valueMin');
    const valueMaxInput = document.getElementById('valueMax');
    const valueMinText = document.getElementById('valueMinText');
    const valueMaxText = document.getElementById('valueMaxText');
    const visibleCountEl = document.getElementById('visibleCount');
    const selectedCountEl = document.getElementById('selectedCount');
    const statsEl = document.getElementById('stats');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101218);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(20, 15, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    labelRenderer.domElement.style.zIndex = '10';
    app.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 1.0));

    function makeLabel(text, position) {
      const div = document.createElement('div');
      div.className = 'label';
      div.textContent = text;
      const label = new CSS2DObject(div);
      label.position.copy(position);
      scene.add(label);
      return label;
    }

    function createAxes() {
      const axisMatX = new THREE.LineBasicMaterial({ color: 0xff5555 });
      const axisMatY = new THREE.LineBasicMaterial({ color: 0x55ff55 });
      const axisMatZ = new THREE.LineBasicMaterial({ color: 0x5599ff });

      const xGeom = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(-10, 0, 0),
        new THREE.Vector3(10, 0, 0)
      ]);
      const yGeom = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0, -10, 0),
        new THREE.Vector3(0, 10, 0)
      ]);
      const zGeom = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0, 0, -10),
        new THREE.Vector3(0, 0, 10)
      ]);

      scene.add(new THREE.Line(xGeom, axisMatX));
      scene.add(new THREE.Line(yGeom, axisMatY));
      scene.add(new THREE.Line(zGeom, axisMatZ));

      const tickValues = [-10, -5, 0, 5, 10];
      const tickMat = new THREE.LineBasicMaterial({ color: 0xcccccc });

      for (const t of tickValues) {
        const xTick = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(t, -0.2, 0),
          new THREE.Vector3(t, 0.2, 0)
        ]);
        scene.add(new THREE.Line(xTick, tickMat));
        makeLabel(String(t), new THREE.Vector3(t, -0.6, 0));

        const yTick = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(-0.2, t, 0),
          new THREE.Vector3(0.2, t, 0)
        ]);
        scene.add(new THREE.Line(yTick, tickMat));
        makeLabel(String(t), new THREE.Vector3(-0.7, t, 0));

        const zTick = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(0, -0.2, t),
          new THREE.Vector3(0, 0.2, t)
        ]);
        scene.add(new THREE.Line(zTick, tickMat));
        makeLabel(String(t), new THREE.Vector3(0, -0.6, t));
      }

      makeLabel('X', new THREE.Vector3(10.8, 0, 0));
      makeLabel('Y', new THREE.Vector3(0, 10.8, 0));
      makeLabel('Z', new THREE.Vector3(0, 0, 10.8));
    }

    createAxes();

    function createLCG(seed = 42) {
      let state = seed >>> 0;
      return function rand() {
        state = (Math.imul(state, 1664525) + 1013904223) >>> 0;
        return state / 0xFFFFFFFF;
      };
    }

    function labelByValue(v) {
      if (v < 0.2) return 'A';
      if (v < 0.4) return 'B';
      if (v < 0.6) return 'C';
      if (v < 0.8) return 'D';
      return 'E';
    }

    const rand = createLCG(42);
    const TOTAL_POINTS = 500;
    const data = [];

    let rawMin = Infinity;
    let rawMax = -Infinity;

    for (let i = 0; i < TOTAL_POINTS; i++) {
      const x = -10 + rand() * 20;
      const y = -10 + rand() * 20;
      const z = -10 + rand() * 20;
      const rawValue = Math.sin(x * 0.5) * Math.cos(z * 0.3) + 0.5 * (y / 10);
      rawMin = Math.min(rawMin, rawValue);
      rawMax = Math.max(rawMax, rawValue);
      data.push({ x, y, z, rawValue, value: 0, label: 'A', selected: false, visible: true });
    }

    for (const d of data) {
      d.value = (d.rawValue - rawMin) / (rawMax - rawMin || 1);
      d.label = labelByValue(d.value);
    }

    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(TOTAL_POINTS * 3);
    const colors = new Float32Array(TOTAL_POINTS * 3);
    const sizes = new Float32Array(TOTAL_POINTS);
    const baseSizes = new Float32Array(TOTAL_POINTS);
    const visibleMask = new Array(TOTAL_POINTS).fill(true);
    const selectedMask = new Array(TOTAL_POINTS).fill(false);

    for (let i = 0; i < TOTAL_POINTS; i++) {
      const d = data[i];
      positions[i * 3 + 0] = d.x;
      positions[i * 3 + 1] = d.y;
      positions[i * 3 + 2] = d.z;
      baseSizes[i] = 0.1 + d.value * 0.4;
      sizes[i] = baseSizes[i];
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    const pointsMaterial = new THREE.PointsMaterial({
      size: 10,
      sizeAttenuation: true,
      vertexColors: true,
      transparent: true,
      opacity: 0.95
    });

    pointsMaterial.onBeforeCompile = (shader) => {
      shader.vertexShader = shader.vertexShader
        .replace(
          '#include <common>',
          `#include <common>
           attribute float size;`
        )
        .replace(
          'gl_PointSize = size;',
          'gl_PointSize = size * 30.0 * (300.0 / -mvPosition.z);'
        );

      pointsMaterial.userData.shader = shader;
    };

    const points = new THREE.Points(geometry, pointsMaterial);
    scene.add(points);

    let lut = new Lut(colormapSelect.value, 512);

    function getVisibleValueExtent(vmin, vmax) {
      let min = Infinity;
      let max = -Infinity;
      let count = 0;
      for (let i = 0; i < TOTAL_POINTS; i++) {
        const v = data[i].value;
        const visible = v >= vmin && v <= vmax;
        if (visible) {
          count++;
          if (v < min) min = v;
          if (v > max) max = v;
        }
      }
      if (count === 0) return { min: 0, max: 1, count: 0 };
      if (min === max) max = min + 1e-6;
      return { min, max, count };
    }

    function updatePointAppearance() {
      const vmin = parseFloat(valueMinInput.value);
      const vmax = parseFloat(valueMaxInput.value);

      const extent = getVisibleValueExtent(vmin, vmax);
      lut = new Lut(colormapSelect.value, 512);
      lut.setMin(extent.min);
      lut.setMax(extent.max);

      let visibleCount = 0;
      let selectedCount = 0;
      let sum = 0;
      let min = Infinity;
      let max = -Infinity;

      for (let i = 0; i < TOTAL_POINTS; i++) {
        const d = data[i];
        const value = d.value;
        const isVisible = value >= vmin && value <= vmax;
        visibleMask[i] = isVisible;
        d.visible = isVisible;

        if (isVisible) {
          visibleCount++;
          sum += value;
          if (value < min) min = value;
          if (value > max) max = value;
        }

        const c = isVisible ? lut.getColor(value) : new THREE.Color(0x000000);
        let finalColor = c;

        if (selectedMask[i] && isVisible) {
          finalColor = new THREE.Color(0xffffff);
          selectedCount++;
        }

        colors[i * 3 + 0] = finalColor.r;
        colors[i * 3 + 1] = finalColor.g;
        colors[i * 3 + 2] = finalColor.b;

        if (!isVisible) {
          sizes[i] = 0;
        } else {
          sizes[i] = selectedMask[i] ? baseSizes[i] * 1.8 : baseSizes[i];
        }
      }

      let mean = 0;
      let std = 0;
      if (visibleCount > 0) {
        mean = sum / visibleCount;
        let varianceSum = 0;
        for (let i = 0; i < TOTAL_POINTS; i++) {
          if (visibleMask[i]) {
            const diff = data[i].value - mean;
            varianceSum += diff * diff;
          }
        }
        std = Math.sqrt(varianceSum / visibleCount);
      } else {
        min = 0;
        max = 0;
      }

      geometry.attributes.color.needsUpdate = true;
      geometry.attributes.size.needsUpdate = true;

      visibleCountEl.textContent = String(visibleCount);
      selectedCountEl.textContent = String(selectedCount);
      statsEl.textContent =
`mean: ${mean.toFixed(4)}
std: ${std.toFixed(4)}
min: ${min.toFixed(4)}
max: ${max.toFixed(4)}`;

      window.__3D_STATE__ = {
        totalPoints: TOTAL_POINTS,
        visiblePoints: visibleCount,
        selectedCount: selectedCount,
        colormap: colormapSelect.value,
        valueRange: { min: vmin, max: vmax },
        stats: {
          mean: Number(mean.toFixed(4)),
          std: Number(std.toFixed(4)),
          min: Number(min.toFixed(4)),
          max: Number(max.toFixed(4))
        }
      };
    }

    function clearSelection() {
      for (let i = 0; i < TOTAL_POINTS; i++) selectedMask[i] = false;
      updatePointAppearance();
    }

    colormapSelect.addEventListener('change', updatePointAppearance);

    function syncRangeInputs() {
      let min = parseFloat(valueMinInput.value);
      let max = parseFloat(valueMaxInput.value);

      if (min > max) {
        if (this === valueMinInput) {
          valueMaxInput.value = min.toFixed(2);
          max = min;
        } else {
          valueMinInput.value = max.toFixed(2);
          min = max;
        }
      }

      valueMinText.textContent = Number(valueMinInput.value).toFixed(2);
      valueMaxText.textContent = Number(valueMaxInput.value).toFixed(2);
      updatePointAppearance();
    }

    valueMinInput.addEventListener('input', syncRangeInputs);
    valueMaxInput.addEventListener('input', syncRangeInputs);

    valueMinText.textContent = Number(valueMinInput.value).toFixed(2);
    valueMaxText.textContent = Number(valueMaxInput.value).toFixed(2);

    let brushing = false;
    let movedDuringBrush = false;
    let brushStart = { x: 0, y: 0 };
    let brushEnd = { x: 0, y: 0 };

    function getLocalPointer(event) {
      const rect = app.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      if (event.button !== 0) return;
      brushing = true;
      movedDuringBrush = false;
      controls.enabled = false;
      const p = getLocalPointer(event);
      brushStart = { ...p };
      brushEnd = { ...p };
      brushOverlay.style.display = 'block';
      brushOverlay.style.left = `${p.x}px`;
      brushOverlay.style.top = `${p.y}px`;
      brushOverlay.style.width = `0px`;
      brushOverlay.style.height = `0px`;
    });

    window.addEventListener('pointermove', (event) => {
      if (!brushing) return;
      const p = getLocalPointer(event);
      brushEnd = { ...p };

      const dx = Math.abs(brushEnd.x - brushStart.x);
      const dy = Math.abs(brushEnd.y - brushStart.y);
      if (dx > 2 || dy > 2) movedDuringBrush = true;

      const left = Math.min(brushStart.x, brushEnd.x);
      const top = Math.min(brushStart.y, brushEnd.y);
      const width = Math.abs(brushEnd.x - brushStart.x);
      const height = Math.abs(brushEnd.y - brushStart.y);

      brushOverlay.style.left = `${left}px`;
      brushOverlay.style.top = `${top}px`;
      brushOverlay.style.width = `${width}px`;
      brushOverlay.style.height = `${height}px`;
    });

    window.addEventListener('pointerup', () => {
      if (!brushing) return;
      brushing = false;
      controls.enabled = true;
      brushOverlay.style.display = 'none';

      const left = Math.min(brushStart.x, brushEnd.x);
      const right = Math.max(brushStart.x, brushEnd.x);
      const top = Math.min(brushStart.y, brushEnd.y);
      const bottom = Math.max(brushStart.y, brushEnd.y);

      if (!movedDuringBrush || (right - left < 3 && bottom - top < 3)) {
        clearSelection();
        return;
      }

      for (let i = 0; i < TOTAL_POINTS; i++) {
        selectedMask[i] = false;
        if (!visibleMask[i]) continue;

        const v = new THREE.Vector3(
          positions[i * 3 + 0],
          positions[i * 3 + 1],
          positions[i * 3 + 2]
        );

        v.project(camera);

        if (v.z < -1 || v.z > 1) continue;

        const sx = (v.x * 0.5 + 0.5) * window.innerWidth;
        const sy = (-v.y * 0.5 + 0.5) * window.innerHeight;

        if (sx >= left && sx <= right && sy >= top && sy <= bottom) {
          selectedMask[i] = true;
        }
      }

      updatePointAppearance();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    updatePointAppearance();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);

      const state = window.__3D_STATE__ || {};
      window.__3D_STATE__ = {
        totalPoints: TOTAL_POINTS,
        visiblePoints: state.visiblePoints ?? 0,
        selectedCount: state.selectedCount ?? 0,
        colormap: colormapSelect.value,
        valueRange: {
          min: parseFloat(valueMinInput.value),
          max: parseFloat(valueMaxInput.value)
        },
        stats: state.stats || { mean: 0, std: 0, min: 0, max: 0 }
      };
    }

    animate();
  </script>
</body>
</html>
