<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Scatter Plot Viewer</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Arial, sans-serif; color: #e0e0e0; }
#container { width: 100vw; height: 100vh; }

#controls {
  position: absolute; top: 15px; left: 15px;
  background: rgba(20, 20, 40, 0.92);
  border: 1px solid rgba(100, 100, 200, 0.3);
  border-radius: 10px; padding: 18px; width: 280px;
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
#controls h3 { margin-bottom: 12px; color: #8888ff; font-size: 16px; border-bottom: 1px solid rgba(100,100,200,0.2); padding-bottom: 8px; }
#controls label { display: block; margin-top: 10px; font-size: 13px; color: #aaa; }
#controls select, #controls input[type=range] { width: 100%; margin-top: 4px; }
#controls select {
  background: #2a2a4a; color: #e0e0e0; border: 1px solid #444;
  border-radius: 5px; padding: 5px 8px; font-size: 13px; cursor: pointer;
}
#controls input[type=range] {
  -webkit-appearance: none; height: 6px; background: #333;
  border-radius: 3px; outline: none;
}
#controls input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px;
  background: #6666ff; border-radius: 50%; cursor: pointer;
}
.range-val { float: right; color: #8888ff; font-weight: bold; }

#stats {
  position: absolute; top: 15px; right: 15px;
  background: rgba(20, 20, 40, 0.92);
  border: 1px solid rgba(100, 100, 200, 0.3);
  border-radius: 10px; padding: 18px; width: 240px;
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
#stats h3 { margin-bottom: 12px; color: #8888ff; font-size: 16px; border-bottom: 1px solid rgba(100,100,200,0.2); padding-bottom: 8px; }
.stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
.stat-label { color: #aaa; }
.stat-value { color: #e0e0e0; font-weight: bold; font-family: 'Courier New', monospace; }
#selectedCount { color: #ffaa44; font-weight: bold; }

#brushOverlay {
  position: absolute; border: 2px solid rgba(100, 200, 255, 0.8);
  background: rgba(100, 200, 255, 0.15);
  pointer-events: none; display: none;
  border-radius: 2px;
}

#info {
  position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
  background: rgba(20, 20, 40, 0.85);
  border: 1px solid rgba(100, 100, 200, 0.2);
  border-radius: 8px; padding: 8px 16px; font-size: 12px; color: #888;
}
</style>
</head>
<body>
<div id="container"></div>

<div id="brushOverlay"></div>

<div id="controls">
  <h3>🎨 Controls</h3>
  <label>Colormap:
    <select id="colormap">
      <option value="rainbow" selected>Rainbow</option>
      <option value="cooltowarm">Cool to Warm</option>
      <option value="blackbody">Blackbody</option>
    </select>
  </label>
  <label>Value Min: <span class="range-val" id="valMinDisplay">0.00</span>
    <input type="range" id="valueMin" min="0" max="1" step="0.01" value="0">
  </label>
  <label>Value Max: <span class="range-val" id="valMaxDisplay">1.00</span>
    <input type="range" id="valueMax" min="0" max="1" step="0.01" value="1">
  </label>
  <div style="margin-top: 12px; padding-top: 8px; border-top: 1px solid rgba(100,100,200,0.2);">
    <div class="stat-row">
      <span class="stat-label">Visible Points:</span>
      <span class="stat-value" id="visibleCount">500</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Selected:</span>
      <span class="stat-value" id="selectedCount">0</span>
    </div>
  </div>
</div>

<div id="stats">
  <h3>📊 Statistics</h3>
  <div class="stat-row"><span class="stat-label">Mean:</span><span class="stat-value" id="statMean">0.0000</span></div>
  <div class="stat-row"><span class="stat-label">Std Dev:</span><span class="stat-value" id="statStd">0.0000</span></div>
  <div class="stat-row"><span class="stat-label">Min:</span><span class="stat-value" id="statMin">0.0000</span></div>
  <div class="stat-row"><span class="stat-label">Max:</span><span class="stat-value" id="statMax">0.0000</span></div>
</div>

<div id="info">Drag to brush select • Scroll to zoom • Right-click to pan • Click empty to deselect</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Lut } from 'three/addons/math/Lut.js';

// --- Deterministic PRNG (LCG, seed=42) ---
function createRNG(seed) {
  let state = seed >>> 0;
  return function() {
    state = (Math.imul(state, 1664525) + 1013904223) & 0xFFFFFFFF;
    return (state >>> 0) / 0xFFFFFFFF;
  };
}

const rng = createRNG(42);

// --- Generate 500 data points ---
const NUM_POINTS = 500;
const dataPoints = [];

const rawValues = [];
for (let i = 0; i < NUM_POINTS; i++) {
  const x = rng() * 20 - 10;
  const y = rng() * 20 - 10;
  const z = rng() * 20 - 10;
  const rawValue = Math.sin(x * 0.5) * Math.cos(z * 0.3) + 0.5 * (y / 10);
  rawValues.push({ x, y, z, rawValue });
}

// Normalize values to [0, 1]
let rawMin = Infinity, rawMax = -Infinity;
for (const p of rawValues) {
  if (p.rawValue < rawMin) rawMin = p.rawValue;
  if (p.rawValue > rawMax) rawMax = p.rawValue;
}

for (let i = 0; i < NUM_POINTS; i++) {
  const { x, y, z, rawValue } = rawValues[i];
  const value = rawMax === rawMin ? 0.5 : (rawValue - rawMin) / (rawMax - rawMin);
  let label;
  if (value < 0.2) label = 'A';
  else if (value < 0.4) label = 'B';
  else if (value < 0.6) label = 'C';
  else if (value < 0.8) label = 'D';
  else label = 'E';
  dataPoints.push({ x, y, z, value, label });
}

// --- Three.js Setup ---
const container = document.getElementById('container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.008);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(20, 15, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

// --- Lighting ---
scene.add(new THREE.AmbientLight(0x404060, 1));

// --- Lut ---
let currentColormap = 'rainbow';
let lut = new Lut(currentColormap, 512);

// --- Points Geometry ---
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(NUM_POINTS * 3);
const colors = new Float32Array(NUM_POINTS * 3);
const sizes = new Float32Array(NUM_POINTS);
const visible = new Float32Array(NUM_POINTS); // 1 = visible, 0 = hidden
const selected = new Uint8Array(NUM_POINTS); // 1 = selected

for (let i = 0; i < NUM_POINTS; i++) {
  positions[i * 3] = dataPoints[i].x;
  positions[i * 3 + 1] = dataPoints[i].y;
  positions[i * 3 + 2] = dataPoints[i].z;
  sizes[i] = 0.1 + dataPoints[i].value * 0.4;
  visible[i] = 1;
  selected[i] = 0;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

// Custom shader material for variable size points
const pointsMaterial = new THREE.ShaderMaterial({
  uniforms: {
    pointTexture: { value: createCircleTexture() }
  },
  vertexShader: `
    attribute float size;
    attribute vec3 color;
    varying vec3 vColor;
    void main() {
      vColor = color;
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (300.0 / -mvPosition.z);
      gl_PointSize = max(gl_PointSize, 0.0);
      gl_Position = projectionMatrix * mvPosition;
    }
  `,
  fragmentShader: `
    uniform sampler2D pointTexture;
    varying vec3 vColor;
    void main() {
      vec4 texColor = texture2D(pointTexture, gl_PointCoord);
      if (texColor.a < 0.1) discard;
      gl_FragColor = vec4(vColor * texColor.rgb, texColor.a);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});

function createCircleTexture() {
  const size = 128;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const center = size / 2;
  const gradient = ctx.createRadialGradient(center, center, 0, center, center, center);
  gradient.addColorStop(0, 'rgba(255,255,255,1)');
  gradient.addColorStop(0.3, 'rgba(255,255,255,0.8)');
  gradient.addColorStop(0.7, 'rgba(255,255,255,0.3)');
  gradient.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, size, size);
  const texture = new THREE.CanvasTexture(canvas);
  return texture;
}

const points = new THREE.Points(geometry, pointsMaterial);
scene.add(points);

// --- Update Colors ---
function updateColors() {
  const colAttr = geometry.getAttribute('color');
  const sizeAttr = geometry.getAttribute('size');
  const filterMin = parseFloat(document.getElementById('valueMin').value);
  const filterMax = parseFloat(document.getElementById('valueMax').value);

  // Find visible value range for Lut
  let vMin = Infinity, vMax = -Infinity;
  for (let i = 0; i < NUM_POINTS; i++) {
    const v = dataPoints[i].value;
    if (v >= filterMin && v <= filterMax) {
      if (v < vMin) vMin = v;
      if (v > vMax) vMax = v;
    }
  }
  if (vMin === Infinity) { vMin = 0; vMax = 1; }
  if (vMin === vMax) { vMin -= 0.001; vMax += 0.001; }

  lut = new Lut(currentColormap, 512);
  lut.setMin(vMin);
  lut.setMax(vMax);

  for (let i = 0; i < NUM_POINTS; i++) {
    const v = dataPoints[i].value;
    const isVisible = v >= filterMin && v <= filterMax;
    visible[i] = isVisible ? 1 : 0;

    if (!isVisible) {
      sizeAttr.array[i] = 0;
      colAttr.array[i * 3] = 0;
      colAttr.array[i * 3 + 1] = 0;
      colAttr.array[i * 3 + 2] = 0;
    } else if (selected[i]) {
      sizeAttr.array[i] = (0.1 + v * 0.4) * 2.5;
      colAttr.array[i * 3] = 1;
      colAttr.array[i * 3 + 1] = 1;
      colAttr.array[i * 3 + 2] = 1;
    } else {
      sizeAttr.array[i] = 0.1 + v * 0.4;
      const color = lut.getColor(v);
      colAttr.array[i * 3] = color.r;
      colAttr.array[i * 3 + 1] = color.g;
      colAttr.array[i * 3 + 2] = color.b;
    }
  }

  colAttr.needsUpdate = true;
  sizeAttr.needsUpdate = true;

  updateStats();
}

// --- Stats ---
function updateStats() {
  const filterMin = parseFloat(document.getElementById('valueMin').value);
  const filterMax = parseFloat(document.getElementById('valueMax').value);

  let count = 0, sum = 0, sMin = Infinity, sMax = -Infinity;
  const vals = [];
  let selCount = 0;

  for (let i = 0; i < NUM_POINTS; i++) {
    if (visible[i]) {
      const v = dataPoints[i].value;
      vals.push(v);
      sum += v;
      count++;
      if (v < sMin) sMin = v;
      if (v > sMax) sMax = v;
    }
    if (selected[i] && visible[i]) selCount++;
  }

  let mean = 0, std = 0;
  if (count > 0) {
    mean = sum / count;
    let variance = 0;
    for (const v of vals) variance += (v - mean) * (v - mean);
    std = Math.sqrt(variance / count);
  } else {
    sMin = 0; sMax = 0;
  }

  document.getElementById('statMean').textContent = mean.toFixed(4);
  document.getElementById('statStd').textContent = std.toFixed(4);
  document.getElementById('statMin').textContent = (count > 0 ? sMin : 0).toFixed(4);
  document.getElementById('statMax').textContent = (count > 0 ? sMax : 0).toFixed(4);
  document.getElementById('visibleCount').textContent = count;
  document.getElementById('selectedCount').textContent = selCount;

  // Update global state
  window.__3D_STATE__ = {
    totalPoints: NUM_POINTS,
    visiblePoints: count,
    selectedCount: selCount,
    colormap: currentColormap,
    valueRange: { min: filterMin, max: filterMax },
    stats: {
      mean: parseFloat(mean.toFixed(4)),
      std: parseFloat(std.toFixed(4)),
      min: parseFloat((count > 0 ? sMin : 0).toFixed(4)),
      max: parseFloat((count > 0 ? sMax : 0).toFixed(4))
    }
  };
}

// --- Axes ---
function createAxes() {
  const axisGroup = new THREE.Group();
  const axisColors = [0xff4444, 0x44ff44, 0x4488ff]; // X, Y, Z
  const axisLabels = ['X', 'Y', 'Z'];
  const directions = [
    new THREE.Vector3(1, 0, 0),
    new THREE.Vector3(0, 1, 0),
    new THREE.Vector3(0, 0, 1)
  ];

  for (let a = 0; a < 3; a++) {
    const color = axisColors[a];
    const dir = directions[a];

    // Main axis line
    const lineMat = new THREE.LineBasicMaterial({ color, linewidth: 2 });
    const lineGeo = new THREE.BufferGeometry().setFromPoints([
      dir.clone().multiplyScalar(-10),
      dir.clone().multiplyScalar(10)
    ]);
    axisGroup.add(new THREE.Line(lineGeo, lineMat));

    // Tick marks and labels
    const ticks = [-10, -5, 0, 5, 10];
    for (const t of ticks) {
      const tickPos = dir.clone().multiplyScalar(t);

      // Tick mark (small perpendicular line)
      const tickSize = 0.2;
      let perp1, perp2;
      if (a === 0) { perp1 = new THREE.Vector3(0, tickSize, 0); perp2 = new THREE.Vector3(0, -tickSize, 0); }
      else if (a === 1) { perp1 = new THREE.Vector3(tickSize, 0, 0); perp2 = new THREE.Vector3(-tickSize, 0, 0); }
      else { perp1 = new THREE.Vector3(0, tickSize, 0); perp2 = new THREE.Vector3(0, -tickSize, 0); }

      const tickGeo = new THREE.BufferGeometry().setFromPoints([
        tickPos.clone().add(perp1),
        tickPos.clone().add(perp2)
      ]);
      axisGroup.add(new THREE.Line(tickGeo, lineMat));

      // Number label
      const labelSprite = makeTextSprite(t.toString(), { color: '#' + color.toString(16).padStart(6, '0'), fontSize: 28 });
      const offset = a === 1 ? new THREE.Vector3(0.5, 0, 0) : new THREE.Vector3(0, -0.6, 0);
      labelSprite.position.copy(tickPos).add(offset);
      labelSprite.scale.set(1.2, 0.6, 1);
      axisGroup.add(labelSprite);
    }

    // Axis label
    const axisLabel = makeTextSprite(axisLabels[a], { color: '#' + color.toString(16).padStart(6, '0'), fontSize: 40, bold: true });
    axisLabel.position.copy(dir.clone().multiplyScalar(11.5));
    axisLabel.scale.set(1.5, 0.75, 1);
    axisGroup.add(axisLabel);
  }

  scene.add(axisGroup);
}

function makeTextSprite(text, opts = {}) {
  const fontSize = opts.fontSize || 32;
  const color = opts.color || '#ffffff';
  const bold = opts.bold ? 'bold ' : '';

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  ctx.font = `${bold}${fontSize}px Arial`;
  const metrics = ctx.measureText(text);
  const width = Math.ceil(metrics.width) + 10;
  const height = fontSize + 10;
  canvas.width = width;
  canvas.height = height;

  ctx.font = `${bold}${fontSize}px Arial`;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, width / 2, height / 2);

  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  const material = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(material);
  return sprite;
}

// --- Grid helper (subtle) ---
const gridHelper = new THREE.GridHelper(20, 20, 0x222244, 0x181830);
scene.add(gridHelper);

createAxes();

// --- Brush Selection ---
let isBrushing = false;
let brushStart = { x: 0, y: 0 };
let brushEnd = { x: 0, y: 0 };
const brushOverlay = document.getElementById('brushOverlay');
let mouseDownTime = 0;
let mouseDownPos = { x: 0, y: 0 };

renderer.domElement.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  mouseDownTime = Date.now();
  mouseDownPos = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('mousemove', (e) => {
  if (e.buttons !== 1) return;
  const dx = e.clientX - mouseDownPos.x;
  const dy = e.clientY - mouseDownPos.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (!isBrushing && dist > 5 && (Date.now() - mouseDownTime) < 300) {
    // Start brush - disable orbit controls
    isBrushing = true;
    controls.enabled = false;
    brushStart = { x: mouseDownPos.x, y: mouseDownPos.y };
    brushOverlay.style.display = 'block';
  }

  if (isBrushing) {
    brushEnd = { x: e.clientX, y: e.clientY };
    const left = Math.min(brushStart.x, brushEnd.x);
    const top = Math.min(brushStart.y, brushEnd.y);
    const width = Math.abs(brushEnd.x - brushStart.x);
    const height = Math.abs(brushEnd.y - brushStart.y);
    brushOverlay.style.left = left + 'px';
    brushOverlay.style.top = top + 'px';
    brushOverlay.style.width = width + 'px';
    brushOverlay.style.height = height + 'px';
  }
});

renderer.domElement.addEventListener('mouseup', (e) => {
  if (isBrushing) {
    isBrushing = false;
    controls.enabled = true;
    brushOverlay.style.display = 'none';

    // Perform selection
    const left = Math.min(brushStart.x, brushEnd.x);
    const right = Math.max(brushStart.x, brushEnd.x);
    const top = Math.min(brushStart.y, brushEnd.y);
    const bottom = Math.max(brushStart.y, brushEnd.y);

    if (right - left > 3 && bottom - top > 3) {
      // Clear previous selection
      selected.fill(0);

      const widthHalf = window.innerWidth / 2;
      const heightHalf = window.innerHeight / 2;

      for (let i = 0; i < NUM_POINTS; i++) {
        if (!visible[i]) continue;
        const pos = new THREE.Vector3(dataPoints[i].x, dataPoints[i].y, dataPoints[i].z);
        pos.project(camera);
        const screenX = (pos.x * widthHalf) + widthHalf;
        const screenY = -(pos.y * heightHalf) + heightHalf;

        if (screenX >= left && screenX <= right && screenY >= top && screenY <= bottom && pos.z < 1) {
          selected[i] = 1;
        }
      }
      updateColors();
    }
    return;
  }

  // Click to deselect
  const dx = e.clientX - mouseDownPos.x;
  const dy = e.clientY - mouseDownPos.y;
  if (Math.sqrt(dx * dx + dy * dy) < 3) {
    let anySelected = false;
    for (let i = 0; i < NUM_POINTS; i++) {
      if (selected[i]) { anySelected = true; break; }
    }
    if (anySelected) {
      selected.fill(0);
      updateColors();
    }
  }
});

// --- UI Event Listeners ---
document.getElementById('colormap').addEventListener('change', (e) => {
  currentColormap = e.target.value;
  updateColors();
});

document.getElementById('valueMin').addEventListener('input', (e) => {
  document.getElementById('valMinDisplay').textContent = parseFloat(e.target.value).toFixed(2);
  updateColors();
});

document.getElementById('valueMax').addEventListener('input', (e) => {
  document.getElementById('valMaxDisplay').textContent = parseFloat(e.target.value).toFixed(2);
  updateColors();
});

// --- Window Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Initial update ---
updateColors();

// --- Animation Loop ---
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
