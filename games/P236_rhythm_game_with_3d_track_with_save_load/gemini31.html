<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Rhythm Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            padding: 20px;
        }
        .stats {
            text-align: center;
            flex-grow: 1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .stats h1 { margin: 0; font-size: 36px; color: #ffcc00; }
        .stats h2 { margin: 5px 0; font-size: 24px; color: #00ffff; }
        .stats p { margin: 2px 0; font-size: 18px; }
        
        .controls {
            pointer-events: auto;
            display: flex;
            gap: 10px;
        }
        button {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.4);
        }
        .instructions {
            text-align: center;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            text-shadow: 1px 1px 2px black;
        }
        .key {
            display: inline-block;
            background: #333;
            border: 2px solid #666;
            border-radius: 4px;
            padding: 2px 8px;
            margin: 0 4px;
            font-weight: bold;
            color: #fff;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            pointer-events: none;
            z-index: 10;
        }
        #overlay h2 {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .hidden { display: none !important; }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div class="hud-top">
            <div style="width: 200px;"></div> <!-- Spacer -->
            <div class="stats">
                <h1 id="scoreDisplay">Score: 0</h1>
                <h2 id="comboDisplay">Combo: 0</h2>
                <p id="multiplierDisplay">Multiplier: x1</p>
                <p id="accuracyDisplay">Accuracy: 0%</p>
                <p id="statusDisplay">Status: idle</p>
            </div>
            <div class="controls">
                <button id="saveBtn">Save</button>
                <button id="loadBtn">Load</button>
                <button id="resetBtn">Reset</button>
            </div>
        </div>
        <div class="instructions">
            <p>Press <span class="key">Space</span> to Start | <span class="key">P</span> to Pause</p>
            <p>Hit Notes: <span class="key">A</span> (Left) | <span class="key">S</span> (Center) | <span class="key">D</span> (Right)</p>
        </div>
    </div>

    <div id="overlay">
        <h2 id="overlayText">PRESS SPACE TO START</h2>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Configuration & Constants ---
        const LANE_POSITIONS = [-2, 0, 2];
        const NOTE_SPEED = 10;
        const SPAWN_Z = -30;
        const MISS_Z = 12;
        const HIT_ZONE_MIN = 7;
        const HIT_ZONE_MAX = 9;
        const TRACK_LENGTH = 40;
        
        const PATTERN = [
            {time:1,lane:0}, {time:1.5,lane:1}, {time:2,lane:2}, {time:2.5,lane:0},
            {time:3,lane:1}, {time:3.5,lane:2}, {time:4,lane:0}, {time:4.5,lane:1},
            {time:5,lane:0}, {time:5.5,lane:2}, {time:6,lane:1}, {time:6.5,lane:0}
        ];

        // --- Game State ---
        let state = {
            score: 0,
            combo: 0,
            comboMultiplier: 1,
            gameStatus: 'idle', // 'idle', 'playing', 'paused', 'completed'
            totalHits: 0,
            totalMisses: 0,
            accuracy: 0,
            gameTime: 0,
            activeNotes: 0,
            notesSpawned: 0,
            noteSpeed: NOTE_SPEED,
            isPaused: false,
            hasSaveData: false,
            lastHitLane: -1,
            trackLength: TRACK_LENGTH,
            lanePositions: LANE_POSITIONS
        };

        let activeNoteObjects = [];
        let patternIndex = 0;
        let avocadoModel = null;
        let hitZoneMesh = null;
        let hitFlashTimer = 0;

        // Expose state globally
        window.__3D_STATE__ = state;

        // --- DOM Elements ---
        const scoreDisplay = document.getElementById('scoreDisplay');
        const comboDisplay = document.getElementById('comboDisplay');
        const multiplierDisplay = document.getElementById('multiplierDisplay');
        const accuracyDisplay = document.getElementById('accuracyDisplay');
        const statusDisplay = document.getElementById('statusDisplay');
        const overlay = document.getElementById('overlay');
        const overlayText = document.getElementById('overlayText');
        
        const saveBtn = document.getElementById('saveBtn');
        const loadBtn = document.getElementById('loadBtn');
        const resetBtn = document.getElementById('resetBtn');

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, -10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Track
        const trackGeometry = new THREE.PlaneGeometry(6, TRACK_LENGTH);
        const trackMaterial = new THREE.MeshStandardMaterial({ color: 0x1a0033, roughness: 0.8 });
        const track = new THREE.Mesh(trackGeometry, trackMaterial);
        track.rotation.x = -Math.PI / 2;
        track.position.z = -10; // Center track so it covers -30 to 10
        scene.add(track);

        // Lane Dividers
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2 });
        for (let x of [-1, 1]) {
            const points = [new THREE.Vector3(x, 0.01, -30), new THREE.Vector3(x, 0.01, 10)];
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(lineGeo, lineMat);
            scene.add(line);
        }

        // Hit Zone
        const hitZoneGeo = new THREE.BoxGeometry(6, 0.1, HIT_ZONE_MAX - HIT_ZONE_MIN);
        const hitZoneMat = new THREE.MeshBasicMaterial({ 
            color: 0x00ffff, 
            transparent: true, 
            opacity: 0.3,
            blending: THREE.AdditiveBlending
        });
        hitZoneMesh = new THREE.Mesh(hitZoneGeo, hitZoneMat);
        hitZoneMesh.position.set(0, 0.05, (HIT_ZONE_MIN + HIT_ZONE_MAX) / 2); // Center at z=8
        scene.add(hitZoneMesh);

        // Load Model
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Avocado/glTF-Binary/Avocado.glb',
            (gltf) => {
                avocadoModel = gltf.scene;
                avocadoModel.scale.set(8, 8, 8);
                // Center the model's origin slightly if needed, but default is usually fine
                checkSaveData();
            },
            undefined,
            (error) => console.error('Error loading model:', error)
        );

        // --- Game Logic Functions ---

        function updateUI() {
            scoreDisplay.innerText = `Score: ${state.score}`;
            comboDisplay.innerText = `Combo: ${state.combo}`;
            multiplierDisplay.innerText = `Multiplier: x${state.comboMultiplier}`;
            
            const total = state.totalHits + state.totalMisses;
            state.accuracy = total > 0 ? Math.round((state.totalHits / total) * 100) : 0;
            accuracyDisplay.innerText = `Accuracy: ${state.accuracy}%`;
            
            statusDisplay.innerText = `Status: ${state.gameStatus}`;

            if (state.gameStatus === 'idle') {
                overlay.classList.remove('hidden');
                overlayText.innerText = "PRESS SPACE TO START";
            } else if (state.gameStatus === 'paused') {
                overlay.classList.remove('hidden');
                overlayText.innerText = "PAUSED";
            } else if (state.gameStatus === 'completed') {
                overlay.classList.remove('hidden');
                overlayText.innerText = "TRACK COMPLETE!";
            } else {
                overlay.classList.add('hidden');
            }

            state.activeNotes = activeNoteObjects.length;
            state.isPaused = (state.gameStatus === 'paused');
        }

        function spawnNote(laneIndex, zPos = SPAWN_Z) {
            if (!avocadoModel) return;
            const note = avocadoModel.clone();
            note.position.set(LANE_POSITIONS[laneIndex], 0.5, zPos);
            note.userData = { lane: laneIndex };
            scene.add(note);
            activeNoteObjects.push(note);
            state.notesSpawned++;
        }

        function handleHit(laneIndex) {
            if (state.gameStatus !== 'playing') return;

            state.lastHitLane = laneIndex;
            let hitFound = false;
            let noteToRemoveIdx = -1;

            // Find the closest note in the lane within the hit zone
            for (let i = 0; i < activeNoteObjects.length; i++) {
                const note = activeNoteObjects[i];
                if (note.userData.lane === laneIndex) {
                    if (note.position.z >= HIT_ZONE_MIN && note.position.z <= HIT_ZONE_MAX) {
                        hitFound = true;
                        noteToRemoveIdx = i;
                        break; // Found the first one
                    }
                }
            }

            if (hitFound) {
                // Hit
                const note = activeNoteObjects[noteToRemoveIdx];
                scene.remove(note);
                activeNoteObjects.splice(noteToRemoveIdx, 1);
                
                state.combo++;
                state.comboMultiplier = 1 + Math.floor(state.combo / 5);
                state.score += 10 * state.comboMultiplier;
                state.totalHits++;
                
                // Visual feedback
                hitFlashTimer = 0.1;
                hitZoneMesh.material.color.setHex(0xffffff);
                hitZoneMesh.material.opacity = 0.8;
            } else {
                // False hit
                state.combo = 0;
                state.comboMultiplier = 1;
            }
            updateUI();
        }

        function handleMiss(noteIndex) {
            const note = activeNoteObjects[noteIndex];
            scene.remove(note);
            activeNoteObjects.splice(noteIndex, 1);
            
            state.combo = 0;
            state.comboMultiplier = 1;
            state.totalMisses++;
            updateUI();
        }

        function startGame() {
            if (state.gameStatus === 'idle' || state.gameStatus === 'completed') {
                resetGame();
                state.gameStatus = 'playing';
            } else if (state.gameStatus === 'paused') {
                state.gameStatus = 'playing';
            }
            updateUI();
        }

        function togglePause() {
            if (state.gameStatus === 'playing') {
                state.gameStatus = 'paused';
            } else if (state.gameStatus === 'paused') {
                state.gameStatus = 'playing';
            }
            updateUI();
        }

        function clearNotes() {
            activeNoteObjects.forEach(note => scene.remove(note));
            activeNoteObjects = [];
        }

        function resetGame() {
            clearNotes();
            state.score = 0;
            state.combo = 0;
            state.comboMultiplier = 1;
            state.gameStatus = 'idle';
            state.totalHits = 0;
            state.totalMisses = 0;
            state.accuracy = 0;
            state.gameTime = 0;
            state.notesSpawned = 0;
            state.lastHitLane = -1;
            patternIndex = 0;
            updateUI();
        }

        // --- Save / Load System ---
        function checkSaveData() {
            state.hasSaveData = localStorage.getItem('rhythmGameSave') !== null;
            loadBtn.disabled = !state.hasSaveData;
        }

        function saveGame() {
            const saveData = {
                score: state.score,
                combo: state.combo,
                comboMultiplier: state.comboMultiplier,
                gameStatus: state.gameStatus === 'completed' ? 'idle' : state.gameStatus,
                totalHits: state.totalHits,
                totalMisses: state.totalMisses,
                gameTime: state.gameTime,
                notesSpawned: state.notesSpawned,
                patternIndex: patternIndex,
                activeNotesData: activeNoteObjects.map(n => ({ lane: n.userData.lane, z: n.position.z }))
            };
            localStorage.setItem('rhythmGameSave', JSON.stringify(saveData));
            checkSaveData();
            alert('Game Saved!');
        }

        function loadGame() {
            if (!avocadoModel) {
                alert("Please wait for model to load.");
                return;
            }
            const dataStr = localStorage.getItem('rhythmGameSave');
            if (dataStr) {
                try {
                    const data = JSON.parse(dataStr);
                    clearNotes();
                    
                    state.score = data.score;
                    state.combo = data.combo;
                    state.comboMultiplier = data.comboMultiplier;
                    state.gameStatus = data.gameStatus === 'playing' ? 'paused' : data.gameStatus; // Load as paused if it was playing
                    state.totalHits = data.totalHits;
                    state.totalMisses = data.totalMisses;
                    state.gameTime = data.gameTime;
                    state.notesSpawned = data.notesSpawned;
                    patternIndex = data.patternIndex;

                    data.activeNotesData.forEach(nd => {
                        spawnNote(nd.lane, nd.z);
                    });

                    updateUI();
                } catch (e) {
                    console.error("Error loading save data", e);
                    alert("Failed to load save data.");
                }
            }
        }

        function hardReset() {
            localStorage.removeItem('rhythmGameSave');
            checkSaveData();
            resetGame();
        }

        // --- Event Listeners ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === ' ') {
                startGame();
            } else if (key === 'p') {
                togglePause();
            } else if (key === 'a') {
                handleHit(0);
            } else if (key === 's') {
                handleHit(1);
            } else if (key === 'd') {
                handleHit(2);
            }
        });

        saveBtn.addEventListener('click', saveGame);
        loadBtn.addEventListener('click', loadGame);
        resetBtn.addEventListener('click', hardReset);

        // --- Main Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (state.gameStatus === 'playing') {
                state.gameTime += delta;

                // Spawn notes
                while (patternIndex < PATTERN.length && state.gameTime >= PATTERN[patternIndex].time) {
                    spawnNote(PATTERN[patternIndex].lane);
                    patternIndex++;
                }

                // Update active notes
                for (let i = activeNoteObjects.length - 1; i >= 0; i--) {
                    const note = activeNoteObjects[i];
                    note.position.z += NOTE_SPEED * delta;
                    note.rotation.y += 1 * delta; // Rotate 1 rad/sec

                    // Check miss
                    if (note.position.z > MISS_Z) {
                        handleMiss(i);
                    }
                }

                // Check completion
                if (patternIndex >= PATTERN.length && activeNoteObjects.length === 0) {
                    state.gameStatus = 'completed';
                    updateUI();
                }
            }

            // Hit flash animation
            if (hitFlashTimer > 0) {
                hitFlashTimer -= delta;
                if (hitFlashTimer <= 0) {
                    hitZoneMesh.material.color.setHex(0x00ffff);
                    hitZoneMesh.material.opacity = 0.3;
                }
            }

            renderer.render(scene, camera);
        }

        // Initialize
        updateUI();
        checkSaveData();
        animate();

    </script>
</body>
</html>
