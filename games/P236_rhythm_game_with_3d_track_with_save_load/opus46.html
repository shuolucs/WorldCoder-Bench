<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Rhythm Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    pointer-events: none;
    z-index: 10;
}

#scoreDisplay {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #00ffff;
    font-size: 36px;
    font-weight: bold;
    text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
}

#comboDisplay {
    position: absolute;
    top: 65px;
    left: 50%;
    transform: translateX(-50%);
    color: #ff00ff;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 0 0 8px #ff00ff;
}

#multiplierDisplay {
    position: absolute;
    top: 95px;
    left: 50%;
    transform: translateX(-50%);
    color: #ffff00;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 0 0 8px #ffff00;
}

#statusDisplay {
    position: absolute;
    top: 130px;
    left: 50%;
    transform: translateX(-50%);
    color: #ffffff;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 3px;
}

#accuracyDisplay {
    position: absolute;
    top: 155px;
    left: 50%;
    transform: translateX(-50%);
    color: #00ff88;
    font-size: 16px;
}

#buttons {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
    pointer-events: all;
}

#buttons button {
    padding: 8px 16px;
    font-size: 14px;
    font-weight: bold;
    border: 2px solid #00ffff;
    background: rgba(0, 0, 0, 0.7);
    color: #00ffff;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
}

#buttons button:hover {
    background: rgba(0, 255, 255, 0.2);
    box-shadow: 0 0 10px #00ffff;
}

#startMessage {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ffffff;
    font-size: 28px;
    text-align: center;
    text-shadow: 0 0 15px #00ffff;
    animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
}

#laneIndicators {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 40px;
    pointer-events: none;
}

.lane-key {
    width: 50px;
    height: 50px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.5);
    font-size: 24px;
    font-weight: bold;
    transition: all 0.1s;
}

.lane-key.active {
    border-color: #00ffff;
    color: #00ffff;
    background: rgba(0, 255, 255, 0.2);
    box-shadow: 0 0 15px #00ffff;
}
</style>
</head>
<body>

<div id="hud">
    <div id="scoreDisplay">Score: 0</div>
    <div id="comboDisplay">Combo: 0</div>
    <div id="multiplierDisplay">Multiplier: x1</div>
    <div id="statusDisplay">IDLE</div>
    <div id="accuracyDisplay">Accuracy: 0%</div>
    <div id="buttons">
        <button id="saveBtn">Save</button>
        <button id="loadBtn">Load</button>
        <button id="resetBtn">Reset</button>
    </div>
    <div id="startMessage">Press SPACE to Start<br><small>A / S / D to hit notes</small></div>
    <div id="laneIndicators">
        <div class="lane-key" id="keyA">A</div>
        <div class="lane-key" id="keyS">S</div>
        <div class="lane-key" id="keyD">D</div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0015);
scene.fog = new THREE.Fog(0x0a0015, 20, 45);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 10);
camera.lookAt(0, 0, -10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
scene.add(directionalLight);

// Add some atmospheric point lights
const pointLight1 = new THREE.PointLight(0x00ffff, 0.5, 30);
pointLight1.position.set(-3, 3, 0);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0xff00ff, 0.5, 30);
pointLight2.position.set(3, 3, 0);
scene.add(pointLight2);

// ============ TRACK ============
const trackGeometry = new THREE.PlaneGeometry(6, 40);
const trackMaterial = new THREE.MeshStandardMaterial({
    color: 0x1a0033,
    side: THREE.DoubleSide,
    roughness: 0.8,
    metalness: 0.2
});
const track = new THREE.Mesh(trackGeometry, trackMaterial);
track.rotation.x = -Math.PI / 2;
track.position.set(0, 0, -10);
track.receiveShadow = true;
scene.add(track);

// Lane divider lines
const lineMaterial = new THREE.MeshBasicMaterial({ color: 0x330066, transparent: true, opacity: 0.5 });
for (let x = -1; x <= 1; x += 2) {
    const lineGeo = new THREE.PlaneGeometry(0.05, 40);
    const line = new THREE.Mesh(lineGeo, lineMaterial);
    line.rotation.x = -Math.PI / 2;
    line.position.set(x, 0.01, -10);
    scene.add(line);
}

// Outer lane lines
for (let x = -3; x <= 3; x += 6) {
    const lineGeo = new THREE.PlaneGeometry(0.08, 40);
    const line = new THREE.Mesh(lineGeo, lineMaterial.clone());
    line.material.opacity = 0.8;
    line.material.color.set(0x6600cc);
    line.rotation.x = -Math.PI / 2;
    line.position.set(x, 0.01, -10);
    scene.add(line);
}

// Hit zone
const hitZoneGeometry = new THREE.BoxGeometry(6, 0.05, 2);
const hitZoneMaterial = new THREE.MeshBasicMaterial({
    color: 0x00ffff,
    transparent: true,
    opacity: 0.25
});
const hitZone = new THREE.Mesh(hitZoneGeometry, hitZoneMaterial);
hitZone.position.set(0, 0.02, 8);
scene.add(hitZone);

// Hit zone line
const hitLineGeo = new THREE.BoxGeometry(6, 0.1, 0.08);
const hitLineMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 });
const hitLine = new THREE.Mesh(hitLineGeo, hitLineMat);
hitLine.position.set(0, 0.05, 8);
scene.add(hitLine);

// Hit zone glow effect
let hitZoneFlashTime = 0;

// Scrolling grid lines on track for visual effect
const gridLines = [];
for (let i = 0; i < 20; i++) {
    const gridGeo = new THREE.PlaneGeometry(6, 0.03);
    const gridMat = new THREE.MeshBasicMaterial({ color: 0x220044, transparent: true, opacity: 0.3 });
    const gridLine = new THREE.Mesh(gridGeo, gridMat);
    gridLine.rotation.x = -Math.PI / 2;
    gridLine.position.set(0, 0.01, -30 + i * 2);
    scene.add(gridLine);
    gridLines.push(gridLine);
}

// ============ GAME STATE ============
const NOTE_PATTERN = [
    { time: 1, lane: 0 },
    { time: 1.5, lane: 1 },
    { time: 2, lane: 2 },
    { time: 2.5, lane: 0 },
    { time: 3, lane: 1 },
    { time: 3.5, lane: 2 },
    { time: 4, lane: 0 },
    { time: 4.5, lane: 1 },
    { time: 5, lane: 0 },
    { time: 5.5, lane: 2 },
    { time: 6, lane: 1 },
    { time: 6.5, lane: 0 }
];

const LANE_POSITIONS = [-2, 0, 2];
const NOTE_SPEED = 10;
const SPAWN_Z = -30;
const HIT_ZONE_MIN = 7;
const HIT_ZONE_MAX = 9;
const MISS_Z = 12;

let gameState = {
    score: 0,
    combo: 0,
    comboMultiplier: 1,
    gameStatus: 'idle',
    totalHits: 0,
    totalMisses: 0,
    accuracy: 0,
    gameTime: 0,
    activeNotes: [],
    notesSpawned: 0,
    noteSpeed: NOTE_SPEED,
    isPaused: false,
    lastHitLane: -1,
    nextNoteIndex: 0
};

// Active note objects in scene
let activeNoteObjects = [];
let avocadoModel = null;
let modelLoaded = false;

// ============ LOAD AVOCADO MODEL ============
const loader = new GLTFLoader();
const AVOCADO_URL = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Avocado/glTF-Binary/Avocado.glb';

loader.load(
    AVOCADO_URL,
    (gltf) => {
        avocadoModel = gltf.scene;
        avocadoModel.scale.set(8, 8, 8);
        avocadoModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
            }
        });
        modelLoaded = true;
        console.log('Avocado model loaded successfully');
    },
    (progress) => {
        console.log('Loading model...', Math.round((progress.loaded / progress.total) * 100) + '%');
    },
    (error) => {
        console.warn('Failed to load Avocado model, using fallback geometry', error);
        // Create fallback geometry
        const fallbackGeo = new THREE.SphereGeometry(0.4, 16, 16);
        const fallbackMat = new THREE.MeshStandardMaterial({ color: 0x4a7c2e, roughness: 0.6 });
        avocadoModel = new THREE.Mesh(fallbackGeo, fallbackMat);
        avocadoModel.castShadow = true;
        modelLoaded = true;
    }
);

// ============ NOTE MANAGEMENT ============
function createNote(lane, zPos = SPAWN_Z) {
    if (!avocadoModel) return null;

    const note = avocadoModel.clone();
    note.position.set(LANE_POSITIONS[lane], 0.5, zPos);
    note.userData = { lane: lane, active: true };
    scene.add(note);

    // Add glow effect under note
    const glowGeo = new THREE.CircleGeometry(0.5, 16);
    const glowColors = [0xff0066, 0x00ff66, 0x6600ff];
    const glowMat = new THREE.MeshBasicMaterial({
        color: glowColors[lane],
        transparent: true,
        opacity: 0.4,
        side: THREE.DoubleSide
    });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    glow.rotation.x = -Math.PI / 2;
    glow.position.y = -0.45;
    note.add(glow);

    return note;
}

function spawnNote(lane) {
    const note = createNote(lane);
    if (note) {
        activeNoteObjects.push(note);
        gameState.notesSpawned++;
        gameState.activeNotes.push({ lane: lane, z: SPAWN_Z });
    }
}

function removeNote(index) {
    const note = activeNoteObjects[index];
    if (note) {
        scene.remove(note);
        // Dispose geometry/material
        note.traverse((child) => {
            if (child.isMesh) {
                if (child.geometry) child.geometry.dispose();
                if (child.material) {
                    if (Array.isArray(child.material)) {
                        child.material.forEach(m => m.dispose());
                    } else {
                        child.material.dispose();
                    }
                }
            }
        });
    }
    activeNoteObjects.splice(index, 1);
    gameState.activeNotes.splice(index, 1);
}

// ============ HIT DETECTION ============
function tryHitLane(lane) {
    if (gameState.gameStatus !== 'playing') return;

    let hitIndex = -1;
    let closestDist = Infinity;

    for (let i = 0; i < activeNoteObjects.length; i++) {
        const note = activeNoteObjects[i];
        if (note.userData.lane === lane) {
            const z = note.position.z;
            if (z >= HIT_ZONE_MIN && z <= HIT_ZONE_MAX) {
                const dist = Math.abs(z - 8);
                if (dist < closestDist) {
                    closestDist = dist;
                    hitIndex = i;
                }
            }
        }
    }

    if (hitIndex >= 0) {
        // Successful hit
        gameState.combo++;
        gameState.comboMultiplier = 1 + Math.floor(gameState.combo / 5);
        gameState.score += 10 * gameState.comboMultiplier;
        gameState.totalHits++;
        gameState.lastHitLane = lane;

        // Create hit particle effect
        createHitEffect(LANE_POSITIONS[lane], 8);

        // Flash hit zone
        hitZoneFlashTime = 0.3;

        removeNote(hitIndex);
    } else {
        // False hit
        gameState.combo = 0;
        gameState.comboMultiplier = 1;
    }

    updateAccuracy();
}

// ============ PARTICLE EFFECTS ============
const particles = [];

function createHitEffect(x, z) {
    const colors = [0x00ffff, 0xff00ff, 0xffff00, 0x00ff00];
    for (let i = 0; i < 12; i++) {
        const geo = new THREE.SphereGeometry(0.08, 8, 8);
        const mat = new THREE.MeshBasicMaterial({
            color: colors[Math.floor(Math.random() * colors.length)],
            transparent: true,
            opacity: 1
        });
        const particle = new THREE.Mesh(geo, mat);
        particle.position.set(x, 0.5, z);
        particle.userData = {
            velocity: new THREE.Vector3(
                (Math.random() - 0.5) * 6,
                Math.random() * 4 + 2,
                (Math.random() - 0.5) * 4
            ),
            life: 0.8
        };
        scene.add(particle);
        particles.push(particle);
    }
}

function updateParticles(delta) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.userData.life -= delta;
        if (p.userData.life <= 0) {
            scene.remove(p);
            p.geometry.dispose();
            p.material.dispose();
            particles.splice(i, 1);
            continue;
        }
        p.position.add(p.userData.velocity.clone().multiplyScalar(delta));
        p.userData.velocity.y -= 9.8 * delta;
        p.material.opacity = p.userData.life / 0.8;
        p.scale.setScalar(p.userData.life / 0.8);
    }
}

// ============ UI UPDATES ============
const scoreDisplay = document.getElementById('scoreDisplay');
const comboDisplay = document.getElementById('comboDisplay');
const multiplierDisplay = document.getElementById('multiplierDisplay');
const statusDisplay = document.getElementById('statusDisplay');
const accuracyDisplay = document.getElementById('accuracyDisplay');
const startMessage = document.getElementById('startMessage');

function updateUI() {
    scoreDisplay.textContent = `Score: ${gameState.score}`;
    comboDisplay.textContent = `Combo: ${gameState.combo}`;
    multiplierDisplay.textContent = `Multiplier: x${gameState.comboMultiplier}`;
    statusDisplay.textContent = gameState.gameStatus.toUpperCase();
    accuracyDisplay.textContent = `Accuracy: ${gameState.accuracy.toFixed(1)}%`;

    if (gameState.gameStatus === 'idle') {
        startMessage.style.display = 'block';
        startMessage.innerHTML = 'Press SPACE to Start<br><small>A / S / D to hit notes</small>';
    } else if (gameState.gameStatus === 'paused') {
        startMessage.style.display = 'block';
        startMessage.innerHTML = 'PAUSED<br><small>Press P to resume</small>';
    } else if (gameState.gameStatus === 'completed') {
        startMessage.style.display = 'block';
        startMessage.innerHTML = `COMPLETED!<br>Score: ${gameState.score}<br>Accuracy: ${gameState.accuracy.toFixed(1)}%<br><small>Press SPACE to restart</small>`;
    } else {
        startMessage.style.display = 'none';
    }
}

function updateAccuracy() {
    const total = gameState.totalHits + gameState.totalMisses;
    gameState.accuracy = total > 0 ? (gameState.totalHits / total) * 100 : 0;
}

// ============ GAME CONTROLS ============
function startGame() {
    // Clear existing notes
    for (let i = activeNoteObjects.length - 1; i >= 0; i--) {
        removeNote(i);
    }

    gameState = {
        score: 0,
        combo: 0,
        comboMultiplier: 1,
        gameStatus: 'playing',
        totalHits: 0,
        totalMisses: 0,
        accuracy: 0,
        gameTime: 0,
        activeNotes: [],
        notesSpawned: 0,
        noteSpeed: NOTE_SPEED,
        isPaused: false,
        lastHitLane: -1,
        nextNoteIndex: 0
    };

    updateUI();
    updateGlobalState();
}

function togglePause() {
    if (gameState.gameStatus === 'playing') {
        gameState.gameStatus = 'paused';
        gameState.isPaused = true;
    } else if (gameState.gameStatus === 'paused') {
        gameState.gameStatus = 'playing';
        gameState.isPaused = false;
    }
    updateUI();
    updateGlobalState();
}

// ============ SAVE/LOAD ============
function saveGame() {
    const saveData = {
        score: gameState.score,
        combo: gameState.combo,
        comboMultiplier: gameState.comboMultiplier,
        gameStatus: gameState.gameStatus,
        totalHits: gameState.totalHits,
        totalMisses: gameState.totalMisses,
        accuracy: gameState.accuracy,
        gameTime: gameState.gameTime,
        notesSpawned: gameState.notesSpawned,
        noteSpeed: gameState.noteSpeed,
        isPaused: gameState.isPaused,
        lastHitLane: gameState.lastHitLane,
        nextNoteIndex: gameState.nextNoteIndex,
        activeNotes: activeNoteObjects.map((note, i) => ({
            lane: note.userData.lane,
            z: note.position.z
        }))
    };
    localStorage.setItem('rhythmGameSave', JSON.stringify(saveData));
    updateGlobalState();
    console.log('Game saved');
}

function loadGame() {
    const data = localStorage.getItem('rhythmGameSave');
    if (!data) {
        console.log('No save data found');
        return;
    }

    const saveData = JSON.parse(data);

    // Clear existing notes
    for (let i = activeNoteObjects.length - 1; i >= 0; i--) {
        removeNote(i);
    }

    gameState.score = saveData.score;
    gameState.combo = saveData.combo;
    gameState.comboMultiplier = saveData.comboMultiplier;
    gameState.gameStatus = saveData.gameStatus;
    gameState.totalHits = saveData.totalHits;
    gameState.totalMisses = saveData.totalMisses;
    gameState.accuracy = saveData.accuracy;
    gameState.gameTime = saveData.gameTime;
    gameState.notesSpawned = saveData.notesSpawned;
    gameState.noteSpeed = saveData.noteSpeed;
    gameState.isPaused = saveData.isPaused;
    gameState.lastHitLane = saveData.lastHitLane;
    gameState.nextNoteIndex = saveData.nextNoteIndex;

    // Recreate notes
    if (saveData.activeNotes && modelLoaded) {
        for (const noteData of saveData.activeNotes) {
            const note = createNote(noteData.lane, noteData.z);
            if (note) {
                activeNoteObjects.push(note);
                gameState.activeNotes.push({ lane: noteData.lane, z: noteData.z });
            }
        }
    }

    // If was playing, pause it
    if (gameState.gameStatus === 'playing') {
        gameState.gameStatus = 'paused';
        gameState.isPaused = true;
    }

    updateUI();
    updateGlobalState();
    console.log('Game loaded');
}

function resetGame() {
    localStorage.removeItem('rhythmGameSave');

    for (let i = activeNoteObjects.length - 1; i >= 0; i--) {
        removeNote(i);
    }

    gameState = {
        score: 0,
        combo: 0,
        comboMultiplier: 1,
        gameStatus: 'idle',
        totalHits: 0,
        totalMisses: 0,
        accuracy: 0,
        gameTime: 0,
        activeNotes: [],
        notesSpawned: 0,
        noteSpeed: NOTE_SPEED,
        isPaused: false,
        lastHitLane: -1,
        nextNoteIndex: 0
    };

    updateUI();
    updateGlobalState();
    console.log('Game reset');
}

// ============ GLOBAL STATE ============
function updateGlobalState() {
    window.__3D_STATE__ = {
        score: gameState.score,
        combo: gameState.combo,
        comboMultiplier: gameState.comboMultiplier,
        gameStatus: gameState.gameStatus,
        totalHits: gameState.totalHits,
        totalMisses: gameState.totalMisses,
        accuracy: gameState.accuracy,
        gameTime: gameState.gameTime,
        activeNotes: activeNoteObjects.length,
        notesSpawned: gameState.notesSpawned,
        noteSpeed: gameState.noteSpeed,
        isPaused: gameState.isPaused,
        hasSaveData: localStorage.getItem('rhythmGameSave') !== null,
        lastHitLane: gameState.lastHitLane,
        trackLength: 40,
        lanePositions: [-2, 0, 2]
    };
}

// ============ INPUT ============
const keyStates = {};

document.addEventListener('keydown', (e) => {
    if (keyStates[e.key.toLowerCase()]) return;
    keyStates[e.key.toLowerCase()] = true;

    const key = e.key.toLowerCase();

    if (key === ' ' || e.code === 'Space') {
        e.preventDefault();
        if (gameState.gameStatus === 'idle' || gameState.gameStatus === 'completed') {
            startGame();
        }
    }

    if (key === 'p') {
        togglePause();
    }

    if (key === 'a') {
        document.getElementById('keyA').classList.add('active');
        tryHitLane(0);
    }
    if (key === 's') {
        e.preventDefault();
        document.getElementById('keyS').classList.add('active');
        tryHitLane(1);
    }
    if (key === 'd') {
        document.getElementById('keyD').classList.add('active');
        tryHitLane(2);
    }

    updateUI();
    updateGlobalState();
});

document.addEventListener('keyup', (e) => {
    keyStates[e.key.toLowerCase()] = false;

    const key = e.key.toLowerCase();
    if (key === 'a') document.getElementById('keyA').classList.remove('active');
    if (key === 's') document.getElementById('keyS').classList.remove('active');
    if (key === 'd') document.getElementById('keyD').classList.remove('active');
});

// Button events
document.getElementById('saveBtn').addEventListener('click', saveGame);
document.getElementById('loadBtn').addEventListener('click', loadGame);
document.getElementById('resetBtn').addEventListener('click', resetGame);

// ============ ANIMATION LOOP ============
let lastTime = performance.now();

function animate(currentTime) {
    requestAnimationFrame(animate);

    const delta = Math.min((currentTime - lastTime) / 1000, 0.1);
    lastTime = currentTime;

    // Update particles always
    updateParticles(delta);

    // Update hit zone flash
    if (hitZoneFlashTime > 0) {
        hitZoneFlashTime -= delta;
        const flashIntensity = hitZoneFlashTime / 0.3;
        hitZoneMaterial.opacity = 0.25 + flashIntensity * 0.5;
        hitLineMat.opacity = 0.8 + flashIntensity * 0.2;
        hitLineMat.color.setHex(flashIntensity > 0.5 ? 0xffffff : 0x00ffff);
    } else {
        hitZoneMaterial.opacity = 0.25;
        hitLineMat.opacity = 0.8;
        hitLineMat.color.setHex(0x00ffff);
    }

    // Animate grid lines
    gridLines.forEach((line) => {
        if (gameState.gameStatus === 'playing') {
            line.position.z += NOTE_SPEED * delta * 0.5;
            if (line.position.z > 12) {
                line.position.z -= 40;
            }
        }
    });

    // Animate point lights
    const t = currentTime / 1000;
    pointLight1.intensity = 0.3 + Math.sin(t * 2) * 0.2;
    pointLight2.intensity = 0.3 + Math.cos(t * 2) * 0.2;

    if (gameState.gameStatus === 'playing' && !gameState.isPaused) {
        gameState.gameTime += delta;

        // Spawn notes
        while (gameState.nextNoteIndex < NOTE_PATTERN.length) {
            const noteInfo = NOTE_PATTERN[gameState.nextNoteIndex];
            if (gameState.gameTime >= noteInfo.time) {
                spawnNote(noteInfo.lane);
                gameState.nextNoteIndex++;
            } else {
                break;
            }
        }

        // Move notes
        for (let i = activeNoteObjects.length - 1; i >= 0; i--) {
            const note = activeNoteObjects[i];
            note.position.z += NOTE_SPEED * delta;
            note.rotation.y += 1 * delta;

            // Update state tracking
            if (gameState.activeNotes[i]) {
                gameState.activeNotes[i].z = note.position.z;
            }

            // Check miss
            if (note.position.z > MISS_Z) {
                gameState.totalMisses++;
                gameState.combo = 0;
                gameState.comboMultiplier = 1;
                updateAccuracy();
                removeNote(i);
                updateUI();
            }
        }

        // Check completion
        if (gameState.nextNoteIndex >= NOTE_PATTERN.length && activeNoteObjects.length === 0) {
            gameState.gameStatus = 'completed';
            updateUI();
        }
    }

    // Rotate existing notes even when idle (visual flair)
    if (gameState.gameStatus !== 'playing') {
        activeNoteObjects.forEach(note => {
            note.rotation.y += 0.5 * delta;
        });
    }

    // Hit zone pulse animation
    const pulseScale = 1 + Math.sin(t * 4) * 0.02;
    hitZone.scale.x = pulseScale;

    updateGlobalState();
    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ INIT ============
updateUI();
updateGlobalState();
requestAnimationFrame(animate);

</script>
</body>
</html>
