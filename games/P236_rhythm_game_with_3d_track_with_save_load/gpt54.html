<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Avocado Rhythm Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #05000a;
      font-family: Arial, sans-serif;
      color: white;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
    }

    #ui div {
      margin: 4px 0;
      font-size: 20px;
      font-weight: bold;
    }

    #controls {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 20;
      display: flex;
      gap: 8px;
    }

    button {
      background: #220044;
      color: white;
      border: 1px solid #00ffff66;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #330066;
    }

    #hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: #cceeff;
      font-size: 14px;
      text-shadow: 0 0 6px rgba(0,0,0,0.9);
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="scoreDisplay">Score: 0</div>
    <div id="comboDisplay">Combo: 0</div>
    <div id="multiplierDisplay">Multiplier: x1</div>
    <div id="statusDisplay">Status: idle</div>
    <div id="accuracyDisplay">Accuracy: 0%</div>
  </div>

  <div id="controls">
    <button id="saveBtn">Save</button>
    <button id="loadBtn">Load</button>
    <button id="resetBtn">Reset</button>
  </div>

  <div id="hint">
    Space = Start &nbsp; | &nbsp; A/S/D = Hit Lanes &nbsp; | &nbsp; P = Pause
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const SAVE_KEY = "rhythmGameSave";
    const NOTE_SPEED = 10;
    const TRACK_LENGTH = 40;
    const LANE_POSITIONS = [-2, 0, 2];
    const SPAWN_Z = -30;
    const HIT_ZONE_MIN = 7;
    const HIT_ZONE_MAX = 9;
    const MISS_Z = 12;

    const NOTE_PATTERN = [
      { time: 1, lane: 0 },
      { time: 1.5, lane: 1 },
      { time: 2, lane: 2 },
      { time: 2.5, lane: 0 },
      { time: 3, lane: 1 },
      { time: 3.5, lane: 2 },
      { time: 4, lane: 0 },
      { time: 4.5, lane: 1 },
      { time: 5, lane: 0 },
      { time: 5.5, lane: 2 },
      { time: 6, lane: 1 },
      { time: 6.5, lane: 0 }
    ];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05000a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, -10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const trackGroup = new THREE.Group();
    scene.add(trackGroup);

    const trackGeo = new THREE.BoxGeometry(6, 0.2, TRACK_LENGTH);
    const trackMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color("#1a0033"),
      roughness: 0.7,
      metalness: 0.2
    });
    const track = new THREE.Mesh(trackGeo, trackMat);
    track.position.set(0, -0.1, -10);
    trackGroup.add(track);

    const dividerMat = new THREE.MeshBasicMaterial({
      color: 0xaa88ff,
      transparent: true,
      opacity: 0.25
    });

    const dividerGeo = new THREE.BoxGeometry(0.05, 0.03, TRACK_LENGTH);
    const divider1 = new THREE.Mesh(dividerGeo, dividerMat);
    divider1.position.set(-1, 0.02, -10);
    trackGroup.add(divider1);

    const divider2 = new THREE.Mesh(dividerGeo, dividerMat);
    divider2.position.set(1, 0.02, -10);
    trackGroup.add(divider2);

    const hitZoneMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color("#00ffff"),
      transparent: true,
      opacity: 0.55
    });
    const hitZoneGeo = new THREE.BoxGeometry(6.2, 0.06, 0.5);
    const hitZone = new THREE.Mesh(hitZoneGeo, hitZoneMat);
    hitZone.position.set(0, 0.05, 8);
    scene.add(hitZone);

    const hitZoneLightMat = hitZoneMat.clone();
    let hitFlashTimer = 0;

    let avocadoTemplate = null;
    const loader = new GLTFLoader();

    const scoreDisplay = document.getElementById("scoreDisplay");
    const comboDisplay = document.getElementById("comboDisplay");
    const multiplierDisplay = document.getElementById("multiplierDisplay");
    const statusDisplay = document.getElementById("statusDisplay");
    const accuracyDisplay = document.getElementById("accuracyDisplay");

    const saveBtn = document.getElementById("saveBtn");
    const loadBtn = document.getElementById("loadBtn");
    const resetBtn = document.getElementById("resetBtn");

    const state = {
      score: 0,
      combo: 0,
      comboMultiplier: 1,
      gameStatus: "idle",
      totalHits: 0,
      totalMisses: 0,
      accuracy: 0,
      gameTime: 0,
      activeNotes: [],
      notesSpawned: 0,
      noteSpeed: NOTE_SPEED,
      isPaused: false,
      hasSaveData: !!localStorage.getItem(SAVE_KEY),
      lastHitLane: -1,
      trackLength: TRACK_LENGTH,
      lanePositions: [...LANE_POSITIONS]
    };

    function updateExposedState() {
      window.__3D_STATE__ = {
        score: state.score,
        combo: state.combo,
        comboMultiplier: state.comboMultiplier,
        gameStatus: state.gameStatus,
        totalHits: state.totalHits,
        totalMisses: state.totalMisses,
        accuracy: state.accuracy,
        gameTime: state.gameTime,
        activeNotes: state.activeNotes.length,
        notesSpawned: state.notesSpawned,
        noteSpeed: state.noteSpeed,
        isPaused: state.isPaused,
        hasSaveData: state.hasSaveData,
        lastHitLane: state.lastHitLane,
        trackLength: state.trackLength,
        lanePositions: [...state.lanePositions]
      };
    }

    function updateAccuracy() {
      const total = state.totalHits + state.totalMisses;
      state.accuracy = total > 0 ? (state.totalHits / total) * 100 : 0;
    }

    function updateMultiplier() {
      state.comboMultiplier = 1 + Math.floor(state.combo / 5);
    }

    function updateHUD() {
      scoreDisplay.textContent = `Score: ${state.score}`;
      comboDisplay.textContent = `Combo: ${state.combo}`;
      multiplierDisplay.textContent = `Multiplier: x${state.comboMultiplier}`;
      statusDisplay.textContent = `Status: ${state.gameStatus}`;
      accuracyDisplay.textContent = `Accuracy: ${state.accuracy.toFixed(1)}%`;
      state.hasSaveData = !!localStorage.getItem(SAVE_KEY);
      updateExposedState();
    }

    function clearActiveNotes() {
      for (const note of state.activeNotes) {
        scene.remove(note.mesh);
      }
      state.activeNotes = [];
    }

    function resetGameState() {
      clearActiveNotes();
      state.score = 0;
      state.combo = 0;
      state.comboMultiplier = 1;
      state.gameStatus = "idle";
      state.totalHits = 0;
      state.totalMisses = 0;
      state.accuracy = 0;
      state.gameTime = 0;
      state.notesSpawned = 0;
      state.isPaused = false;
      state.lastHitLane = -1;
      updateHUD();
    }

    function createFallbackAvocado() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.SphereGeometry(0.35, 24, 24),
        new THREE.MeshStandardMaterial({ color: 0x6fbf4b })
      );
      body.scale.set(1, 1.25, 0.9);
      group.add(body);

      const pit = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0x8b4513 })
      );
      pit.position.set(0, -0.05, 0.28);
      group.add(pit);

      group.scale.set(8, 8, 8);
      return group;
    }

    function makeNoteMesh() {
      let mesh;
      if (avocadoTemplate) {
        mesh = avocadoTemplate.clone(true);
      } else {
        mesh = createFallbackAvocado();
      }
      mesh.scale.set(8, 8, 8);
      return mesh;
    }

    function spawnNote(patternIndex, lane, z = SPAWN_Z, rotationY = 0) {
      const mesh = makeNoteMesh();
      mesh.position.set(LANE_POSITIONS[lane], 0.8, z);
      mesh.rotation.y = rotationY;
      scene.add(mesh);

      state.activeNotes.push({
        id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
        patternIndex,
        lane,
        mesh
      });
    }

    function spawnPendingNotes() {
      while (
        state.notesSpawned < NOTE_PATTERN.length &&
        state.gameTime >= NOTE_PATTERN[state.notesSpawned].time
      ) {
        const entry = NOTE_PATTERN[state.notesSpawned];
        spawnNote(state.notesSpawned, entry.lane);
        state.notesSpawned++;
      }
    }

    function flashHitZone() {
      hitFlashTimer = 0.12;
      hitZone.material.color.set("#66ffff");
      hitZone.material.opacity = 0.95;
    }

    function handleLaneHit(lane) {
      if (state.gameStatus !== "playing" || state.isPaused) return;

      let bestIndex = -1;
      let bestDistance = Infinity;

      for (let i = 0; i < state.activeNotes.length; i++) {
        const note = state.activeNotes[i];
        const z = note.mesh.position.z;
        if (note.lane === lane && z >= HIT_ZONE_MIN && z <= HIT_ZONE_MAX) {
          const dist = Math.abs(z - 8);
          if (dist < bestDistance) {
            bestDistance = dist;
            bestIndex = i;
          }
        }
      }

      if (bestIndex !== -1) {
        const note = state.activeNotes[bestIndex];
        scene.remove(note.mesh);
        state.activeNotes.splice(bestIndex, 1);
        state.score += 10 * state.comboMultiplier;
        state.combo += 1;
        updateMultiplier();
        state.totalHits += 1;
        state.lastHitLane = lane;
        flashHitZone();
      } else {
        state.combo = 0;
        updateMultiplier();
        state.lastHitLane = -1;
      }

      updateAccuracy();
      updateHUD();
      checkCompletion();
    }

    function markMiss(noteIndex) {
      const note = state.activeNotes[noteIndex];
      scene.remove(note.mesh);
      state.activeNotes.splice(noteIndex, 1);
      state.combo = 0;
      updateMultiplier();
      state.totalMisses += 1;
      updateAccuracy();
      updateHUD();
    }

    function checkCompletion() {
      if (
        state.notesSpawned >= NOTE_PATTERN.length &&
        state.activeNotes.length === 0 &&
        state.gameStatus !== "idle"
      ) {
        state.gameStatus = "completed";
        state.isPaused = false;
        updateHUD();
      }
    }

    function startGame() {
      if (state.gameStatus === "idle" || state.gameStatus === "completed") {
        resetGameState();
        state.gameStatus = "playing";
        updateHUD();
      }
    }

    function togglePause() {
      if (state.gameStatus !== "playing" && state.gameStatus !== "paused") return;
      state.isPaused = !state.isPaused;
      state.gameStatus = state.isPaused ? "paused" : "playing";
      updateHUD();
    }

    function saveGame() {
      const saveData = {
        score: state.score,
        combo: state.combo,
        comboMultiplier: state.comboMultiplier,
        gameStatus: state.gameStatus,
        totalHits: state.totalHits,
        totalMisses: state.totalMisses,
        accuracy: state.accuracy,
        gameTime: state.gameTime,
        notesSpawned: state.notesSpawned,
        noteSpeed: state.noteSpeed,
        isPaused: state.isPaused,
        lastHitLane: state.lastHitLane,
        activeNotes: state.activeNotes.map(note => ({
          patternIndex: note.patternIndex,
          lane: note.lane,
          z: note.mesh.position.z,
          rotationY: note.mesh.rotation.y
        }))
      };

      localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
      state.hasSaveData = true;
      updateHUD();
    }

    function loadGame() {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return;

      const data = JSON.parse(raw);
      clearActiveNotes();

      state.score = data.score ?? 0;
      state.combo = data.combo ?? 0;
      state.comboMultiplier = data.comboMultiplier ?? 1;
      state.gameStatus = data.gameStatus ?? "idle";
      state.totalHits = data.totalHits ?? 0;
      state.totalMisses = data.totalMisses ?? 0;
      state.accuracy = data.accuracy ?? 0;
      state.gameTime = data.gameTime ?? 0;
      state.notesSpawned = data.notesSpawned ?? 0;
      state.isPaused = data.isPaused ?? false;
      state.lastHitLane = data.lastHitLane ?? -1;

      if (Array.isArray(data.activeNotes)) {
        for (const n of data.activeNotes) {
          spawnNote(n.patternIndex, n.lane, n.z, n.rotationY ?? 0);
        }
      }

      if (state.gameStatus === "paused") state.isPaused = true;
      updateMultiplier();
      updateAccuracy();
      updateHUD();
      checkCompletion();
    }

    function resetAll() {
      localStorage.removeItem(SAVE_KEY);
      resetGameState();
      state.hasSaveData = false;
      updateHUD();
    }

    saveBtn.addEventListener("click", saveGame);
    loadBtn.addEventListener("click", loadGame);
    resetBtn.addEventListener("click", resetAll);

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (e.code === "Space") {
        e.preventDefault();
        startGame();
        return;
      }

      if (key === "p") {
        togglePause();
        return;
      }

      if (key === "a") handleLaneHit(0);
      if (key === "s") handleLaneHit(1);
      if (key === "d") handleLaneHit(2);
    });

    loader.load(
      "Avocado.glb",
      (gltf) => {
        avocadoTemplate = gltf.scene;
        avocadoTemplate.traverse(obj => {
          if (obj.isMesh) {
            obj.castShadow = false;
            obj.receiveShadow = false;
          }
        });
      },
      undefined,
      () => {
        avocadoTemplate = null;
      }
    );

    let lastTime = performance.now();

    function animate(now) {
      requestAnimationFrame(animate);

      let delta = (now - lastTime) / 1000;
      lastTime = now;
      if (delta > 0.1) delta = 0.1;

      if (!state.isPaused && state.gameStatus === "playing") {
        state.gameTime += delta;
        spawnPendingNotes();

        for (let i = state.activeNotes.length - 1; i >= 0; i--) {
          const note = state.activeNotes[i];
          note.mesh.position.z += NOTE_SPEED * delta;
          note.mesh.rotation.y += 1 * delta;

          if (note.mesh.position.z > MISS_Z) {
            markMiss(i);
          }
        }

        checkCompletion();
      }

      if (hitFlashTimer > 0) {
        hitFlashTimer -= delta;
        if (hitFlashTimer <= 0) {
          hitZone.material.color.set("#00ffff");
          hitZone.material.opacity = 0.55;
        }
      }

      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHUD();
    updateExposedState();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
