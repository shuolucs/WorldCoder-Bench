<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Phone Case Designer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #1a1a2e;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #ui-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 260px;
      height: 100%;
      box-sizing: border-box;
      padding: 18px 16px;
      background: rgba(10, 10, 30, 0.85);
      color: white;
      overflow-y: auto;
      z-index: 10;
      backdrop-filter: blur(6px);
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    #ui-panel h2 {
      margin: 0 0 14px 0;
      font-size: 20px;
    }

    .section {
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .section h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: #d9e6ff;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .swatches {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .swatch {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.8);
      box-sizing: border-box;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .swatch:hover {
      transform: scale(1.08);
      box-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    button, input[type="text"], input[type="range"] {
      width: 100%;
      box-sizing: border-box;
    }

    .button-row {
      display: flex;
      gap: 8px;
    }

    button {
      padding: 10px 12px;
      background: #243b55;
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background: #2f4b6d;
    }

    button:active {
      transform: scale(0.98);
    }

    input[type="text"] {
      padding: 10px;
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      margin-bottom: 8px;
    }

    input[type="range"] {
      accent-color: #3498db;
    }

    #export_info {
      font-size: 12px;
      line-height: 1.5;
      color: #d0d8e8;
      background: rgba(255,255,255,0.04);
      padding: 10px;
      border-radius: 8px;
      white-space: pre-line;
    }

    .hint {
      font-size: 12px;
      color: #aebbd3;
      margin-top: 8px;
      line-height: 1.4;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      font-size: 11px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui-panel">
      <h2>Phone Case Designer</h2>

      <div class="section">
        <h3>Color Picker</h3>
        <div class="swatches">
          <div class="swatch" id="color_0" style="background:#3498db;"></div>
          <div class="swatch" id="color_1" style="background:#e74c3c;"></div>
          <div class="swatch" id="color_2" style="background:#2ecc71;"></div>
          <div class="swatch" id="color_3" style="background:#f39c12;"></div>
          <div class="swatch" id="color_4" style="background:#9b59b6;"></div>
          <div class="swatch" id="color_5" style="background:#1abc9c;"></div>
        </div>
      </div>

      <div class="section">
        <h3>Material Selector</h3>
        <div class="button-row">
          <button id="btn_matte">Matte</button>
          <button id="btn_glossy">Glossy</button>
        </div>
      </div>

      <div class="section">
        <h3>Pattern Toggle</h3>
        <button id="btn_pattern">Pattern: none</button>
      </div>

      <div class="section">
        <h3>Thickness</h3>
        <input id="slider_thickness" type="range" min="0.08" max="0.25" step="0.01" value="0.12" />
        <div class="badge" id="thickness_label">0.12</div>
      </div>

      <div class="section">
        <h3>Text Label</h3>
        <input id="input_text" type="text" maxlength="12" placeholder="Max 12 chars" />
        <button id="btn_apply_text">Apply Text</button>
      </div>

      <div class="section">
        <h3>Reset</h3>
        <button id="btn_reset">Reset All</button>
      </div>

      <div class="section">
        <h3>Export Info</h3>
        <div id="export_info"></div>
      </div>

      <div class="hint">
        Click the phone case to select it.<br>
        Press <b>R</b> to rotate 90°.<br>
        Press <b>F</b> to flip 180°.
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');

    const scene = new THREE.Scene();

    // Gradient background via canvas texture
    function createGradientBackground() {
      const c = document.createElement('canvas');
      c.width = 2;
      c.height = 512;
      const ctx = c.getContext('2d');
      const grad = ctx.createLinearGradient(0, 0, 0, c.height);
      grad.addColorStop(0, '#1a1a2e');
      grad.addColorStop(1, '#16213e');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, c.width, c.height);
      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }
    scene.background = createGradientBackground();

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = false;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1, 0);
    controls.enableDamping = true;
    controls.minDistance = 2.5;
    controls.maxDistance = 10;

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dirWarm = new THREE.DirectionalLight(new THREE.Color('#fff5e6'), 0.8);
    dirWarm.position.set(5, 8, 5);
    scene.add(dirWarm);

    const dirCool = new THREE.DirectionalLight(new THREE.Color('#e6f0ff'), 0.3);
    dirCool.position.set(-3, 4, -2);
    scene.add(dirCool);

    // Ground plane
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 10),
      new THREE.MeshStandardMaterial({
        color: '#222233',
        transparent: true,
        opacity: 0.5,
        roughness: 0.9,
        metalness: 0.0
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    // Phone case group
    const caseGroup = new THREE.Group();
    caseGroup.position.set(-1.2, 1.2, 0);
    scene.add(caseGroup);

    const defaultColor = '#3498db';

    // Rounded box substitute
    function createRoundedRectShape(w, h, r) {
      const x = -w / 2;
      const y = -h / 2;
      const shape = new THREE.Shape();
      shape.moveTo(x + r, y);
      shape.lineTo(x + w - r, y);
      shape.quadraticCurveTo(x + w, y, x + w, y + r);
      shape.lineTo(x + w, y + h - r);
      shape.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      shape.lineTo(x + r, y + h);
      shape.quadraticCurveTo(x, y + h, x, y + h - r);
      shape.lineTo(x, y + r);
      shape.quadraticCurveTo(x, y, x + r, y);
      return shape;
    }

    function createCaseGeometry(depth = 0.12) {
      const shape = createRoundedRectShape(0.8, 1.6, 0.1);
      const extrudeSettings = {
        depth,
        bevelEnabled: true,
        bevelSegments: 3,
        steps: 1,
        bevelSize: 0.03,
        bevelThickness: 0.015,
        curveSegments: 18
      };
      const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
      geometry.center();
      return geometry;
    }

    let caseGeometry = createCaseGeometry(0.12);
    const caseMaterial = new THREE.MeshStandardMaterial({
      color: defaultColor,
      metalness: 0.1,
      roughness: 0.6,
      emissive: '#000000'
    });
    const caseMesh = new THREE.Mesh(caseGeometry, caseMaterial);
    caseMesh.userData.isCase = true;
    caseGroup.add(caseMesh);

    // Transparent shell for bevel-ish look
    let shellGeometry = createCaseGeometry(0.13);
    const shellMaterial = new THREE.MeshStandardMaterial({
      color: '#ffffff',
      transparent: true,
      opacity: 0.08,
      metalness: 0.2,
      roughness: 0.2
    });
    const shellMesh = new THREE.Mesh(shellGeometry, shellMaterial);
    shellMesh.scale.set(1.02, 1.02, 1.04);
    caseGroup.add(shellMesh);

    // Camera cutout
    const cutout = new THREE.Mesh(
      new THREE.CylinderGeometry(0.08, 0.08, 0.01, 32),
      new THREE.MeshStandardMaterial({ color: '#000000', roughness: 1, metalness: 0 })
    );
    cutout.rotation.x = Math.PI / 2;
    cutout.position.set(0.22, 0.52, 0.065);
    caseGroup.add(cutout);

    // Matching product reference
    const bottleGroup = new THREE.Group();
    bottleGroup.position.set(1.5, 0.5, 0);
    bottleGroup.scale.set(4, 4, 4);
    scene.add(bottleGroup);

    const loader = new GLTFLoader();
    let bottleRoot = null;

    loader.load(
      'WaterBottle.glb',
      (gltf) => {
        bottleRoot = gltf.scene;
        bottleGroup.add(bottleRoot);
        window.__3D_STATE__.bottleLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load WaterBottle.glb:', err);
      }
    );

    // Canvas texture system for pattern + text overlay
    const textureCanvas = document.createElement('canvas');
    textureCanvas.width = 1024;
    textureCanvas.height = 2048;
    const textureCtx = textureCanvas.getContext('2d');
    const dynamicTexture = new THREE.CanvasTexture(textureCanvas);
    dynamicTexture.colorSpace = THREE.SRGBColorSpace;
    dynamicTexture.wrapS = THREE.ClampToEdgeWrapping;
    dynamicTexture.wrapT = THREE.ClampToEdgeWrapping;

    function drawCompositeTexture() {
      const w = textureCanvas.width;
      const h = textureCanvas.height;
      textureCtx.clearRect(0, 0, w, h);

      const state = window.__3D_STATE__;
      const base = state.caseColor;
      textureCtx.fillStyle = base;
      textureCtx.fillRect(0, 0, w, h);

      if (state.pattern === 'stripes') {
        textureCtx.fillStyle = 'rgba(255,255,255,0.18)';
        const stripeH = 90;
        for (let y = 0; y < h; y += stripeH * 2) {
          textureCtx.fillRect(0, y, w, stripeH);
        }
      } else if (state.pattern === 'dots') {
        textureCtx.fillStyle = 'rgba(255,255,255,0.22)';
        const spacing = 120;
        const radius = 26;
        for (let y = 60; y < h; y += spacing) {
          for (let x = 60; x < w; x += spacing) {
            textureCtx.beginPath();
            textureCtx.arc(x + ((y / spacing) % 2) * 30, y, radius, 0, Math.PI * 2);
            textureCtx.fill();
          }
        }
      }

      if (state.textLabel && state.textLabel.trim().length > 0) {
        textureCtx.save();
        textureCtx.font = 'bold 120px Arial';
        textureCtx.textAlign = 'center';
        textureCtx.textBaseline = 'middle';

        const text = state.textLabel.slice(0, 12);
        const x = w / 2;
        const y = h * 0.6;

        textureCtx.lineWidth = 12;
        textureCtx.strokeStyle = 'rgba(0,0,0,0.35)';
        textureCtx.strokeText(text, x, y);

        textureCtx.fillStyle = 'rgba(255,255,255,0.92)';
        textureCtx.fillText(text, x, y);
        textureCtx.restore();
      }

      dynamicTexture.needsUpdate = true;
      caseMaterial.map = dynamicTexture;
      caseMaterial.color.set('#ffffff');
      caseMaterial.needsUpdate = true;
    }

    function clearTextureIfNeeded() {
      const state = window.__3D_STATE__;
      const hasOverlay = state.pattern !== 'none' || (state.textLabel && state.textLabel.trim().length > 0);
      if (hasOverlay) {
        drawCompositeTexture();
      } else {
        caseMaterial.map = null;
        caseMaterial.color.set(state.caseColor);
        caseMaterial.needsUpdate = true;
      }
    }

    // State
    window.__3D_STATE__ = {
      caseColor: '#3498db',
      material: 'default',
      pattern: 'none',
      thickness: 0.12,
      caseRotationY: 0,
      isSelected: false,
      textLabel: '',
      bottleLoaded: false,
      bottleRotationY: 0,
      colorChangeCount: 0,
      patternCycleCount: 0,
      isAnimating: false
    };

    // UI refs
    const swatchColors = ['#3498db', '#e74c3c', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c'];
    const btnMatte = document.getElementById('btn_matte');
    const btnGlossy = document.getElementById('btn_glossy');
    const btnPattern = document.getElementById('btn_pattern');
    const sliderThickness = document.getElementById('slider_thickness');
    const thicknessLabel = document.getElementById('thickness_label');
    const inputText = document.getElementById('input_text');
    const btnApplyText = document.getElementById('btn_apply_text');
    const btnReset = document.getElementById('btn_reset');
    const exportInfo = document.getElementById('export_info');

    // Config updaters
    function setCaseColor(hex, countChange = true) {
      window.__3D_STATE__.caseColor = hex;
      if (countChange) window.__3D_STATE__.colorChangeCount += 1;
      clearTextureIfNeeded();
    }

    function setMaterialPreset(type) {
      if (type === 'matte') {
        caseMaterial.roughness = 0.8;
        caseMaterial.metalness = 0.05;
        window.__3D_STATE__.material = 'matte';
      } else if (type === 'glossy') {
        caseMaterial.roughness = 0.15;
        caseMaterial.metalness = 0.6;
        window.__3D_STATE__.material = 'glossy';
      }
    }

    const patterns = ['none', 'stripes', 'dots'];
    function cyclePattern() {
      const state = window.__3D_STATE__;
      const i = patterns.indexOf(state.pattern);
      state.pattern = patterns[(i + 1) % patterns.length];
      state.patternCycleCount += 1;
      btnPattern.textContent = `Pattern: ${state.pattern}`;
      clearTextureIfNeeded();
    }

    function updateThickness(value) {
      const t = parseFloat(value);
      window.__3D_STATE__.thickness = t;
      thicknessLabel.textContent = t.toFixed(2);

      caseMesh.scale.z = t / 0.12;
      shellMesh.scale.z = (t / 0.12) * 1.04;
      cutout.position.z = (t / 2) + 0.005;
    }

    function applyTextLabel() {
      const txt = inputText.value.slice(0, 12);
      window.__3D_STATE__.textLabel = txt;
      clearTextureIfNeeded();
    }

    function resetAll() {
      window.__3D_STATE__.caseColor = '#3498db';
      window.__3D_STATE__.material = 'default';
      window.__3D_STATE__.pattern = 'none';
      window.__3D_STATE__.thickness = 0.12;
      window.__3D_STATE__.textLabel = '';
      window.__3D_STATE__.isSelected = false;

      caseMaterial.roughness = 0.6;
      caseMaterial.metalness = 0.1;
      caseMaterial.emissive.set('#000000');

      caseGroup.rotation.y = 0;
      targetRotationY = 0;
      currentAnim = null;
      window.__3D_STATE__.isAnimating = false;

      sliderThickness.value = '0.12';
      inputText.value = '';
      btnPattern.textContent = 'Pattern: none';

      updateThickness(0.12);
      clearTextureIfNeeded();
      caseMaterial.color.set('#3498db');
    }

    // Color swatches
    swatchColors.forEach((color, i) => {
      const el = document.getElementById(`color_${i}`);
      el.addEventListener('click', () => setCaseColor(color, true));
    });

    btnMatte.addEventListener('click', () => setMaterialPreset('matte'));
    btnGlossy.addEventListener('click', () => setMaterialPreset('glossy'));
    btnPattern.addEventListener('click', cyclePattern);
    sliderThickness.addEventListener('input', (e) => updateThickness(e.target.value));
    btnApplyText.addEventListener('click', applyTextLabel);
    btnReset.addEventListener('click', resetAll);
    inputText.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') applyTextLabel();
    });

    // Raycasting selection
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects([caseMesh, shellMesh, cutout], false);

      if (intersects.length > 0) {
        window.__3D_STATE__.isSelected = !window.__3D_STATE__.isSelected;
        caseMaterial.emissive.set(window.__3D_STATE__.isSelected ? '#444400' : '#000000');
      }
    }

    renderer.domElement.addEventListener('pointerdown', onPointerDown);

    // Rotation animation
    let targetRotationY = 0;
    let currentAnim = null;

    function animateCaseRotation(deltaRadians) {
      const start = caseGroup.rotation.y;
      const end = start + deltaRadians;
      currentAnim = {
        start,
        end,
        duration: 0.5,
        elapsed: 0
      };
      targetRotationY = end;
      window.__3D_STATE__.isAnimating = true;
    }

    window.addEventListener('keydown', (e) => {
      if (e.repeat) return;
      if (e.key.toLowerCase() === 'r') {
        animateCaseRotation(Math.PI / 2);
      } else if (e.key.toLowerCase() === 'f') {
        animateCaseRotation(Math.PI);
      }
    });

    function easeInOutCubic(t) {
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function updateExportInfo() {
      const s = window.__3D_STATE__;
      exportInfo.textContent =
`Color: ${s.caseColor}
Material: ${s.material}
Pattern: ${s.pattern}
Thickness: ${s.thickness.toFixed(2)}
Text: ${s.textLabel || '(none)'}
Selected: ${s.isSelected}
Case Rotation Y: ${s.caseRotationY.toFixed(2)}
Bottle Loaded: ${s.bottleLoaded}
Bottle Rotation Y: ${s.bottleRotationY.toFixed(2)}
Color Changes: ${s.colorChangeCount}
Pattern Cycles: ${s.patternCycleCount}
Animating: ${s.isAnimating}`;
    }

    // Initialize
    updateThickness(0.12);
    clearTextureIfNeeded();

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);

      controls.update();

      // Bottle rotation
      if (bottleGroup) {
        bottleGroup.rotation.y += 0.3 * dt;
      }

      // Case animation
      if (currentAnim) {
        currentAnim.elapsed += dt;
        const t = Math.min(currentAnim.elapsed / currentAnim.duration, 1);
        const et = easeInOutCubic(t);
        caseGroup.rotation.y = THREE.MathUtils.lerp(currentAnim.start, currentAnim.end, et);

        if (t >= 1) {
          caseGroup.rotation.y = currentAnim.end;
          currentAnim = null;
          window.__3D_STATE__.isAnimating = false;
        }
      }

      // Update public state every frame
      window.__3D_STATE__.caseRotationY = caseGroup.rotation.y;
      window.__3D_STATE__.bottleRotationY = bottleGroup.rotation.y;

      updateExportInfo();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
