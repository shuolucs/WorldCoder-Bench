<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Phone Case Designer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
  canvas { display: block; }

  #ui-panel {
    position: fixed;
    left: 0;
    top: 0;
    width: 260px;
    height: 100vh;
    background: rgba(10, 10, 30, 0.85);
    color: #fff;
    padding: 20px;
    overflow-y: auto;
    z-index: 100;
    backdrop-filter: blur(10px);
    border-right: 1px solid rgba(255,255,255,0.1);
  }

  #ui-panel h2 {
    font-size: 18px;
    margin-bottom: 15px;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 2px solid #3498db;
    padding-bottom: 8px;
  }

  .section {
    margin-bottom: 18px;
  }

  .section-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #aaa;
    margin-bottom: 8px;
  }

  .color-swatches {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .color-swatch {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: all 0.2s ease;
  }

  .color-swatch:hover {
    transform: scale(1.15);
  }

  .color-swatch.active {
    border-color: #fff;
    box-shadow: 0 0 10px rgba(255,255,255,0.4);
  }

  .btn-group {
    display: flex;
    gap: 8px;
  }

  .btn {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s ease;
  }

  .btn:hover {
    background: rgba(255,255,255,0.15);
  }

  .btn.active {
    background: #3498db;
    border-color: #3498db;
  }

  .btn-full {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s ease;
  }

  .btn-full:hover {
    background: rgba(255,255,255,0.15);
  }

  input[type="range"] {
    width: 100%;
    margin: 5px 0;
    -webkit-appearance: none;
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    background: #3498db;
    border-radius: 50%;
    cursor: pointer;
  }

  input[type="text"] {
    width: 100%;
    padding: 8px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    margin-bottom: 6px;
  }

  input[type="text"]:focus {
    border-color: #3498db;
  }

  .slider-value {
    font-size: 11px;
    color: #888;
    text-align: right;
  }

  #export_info {
    background: rgba(0,0,0,0.3);
    border-radius: 6px;
    padding: 10px;
    font-size: 11px;
    line-height: 1.6;
    color: #aaa;
    word-break: break-all;
  }

  #export_info span {
    color: #3498db;
  }

  .hint {
    font-size: 10px;
    color: #666;
    margin-top: 10px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div id="ui-panel">
  <h2>Case Designer</h2>

  <div class="section">
    <div class="section-title">Color</div>
    <div class="color-swatches">
      <div class="color-swatch active" id="color_0" style="background:#3498db" data-color="#3498db"></div>
      <div class="color-swatch" id="color_1" style="background:#e74c3c" data-color="#e74c3c"></div>
      <div class="color-swatch" id="color_2" style="background:#2ecc71" data-color="#2ecc71"></div>
      <div class="color-swatch" id="color_3" style="background:#f39c12" data-color="#f39c12"></div>
      <div class="color-swatch" id="color_4" style="background:#9b59b6" data-color="#9b59b6"></div>
      <div class="color-swatch" id="color_5" style="background:#1abc9c" data-color="#1abc9c"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Material</div>
    <div class="btn-group">
      <button class="btn" id="btn_matte">Matte</button>
      <button class="btn" id="btn_glossy">Glossy</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Pattern</div>
    <button class="btn-full" id="btn_pattern">Pattern: None</button>
  </div>

  <div class="section">
    <div class="section-title">Thickness</div>
    <input type="range" id="slider_thickness" min="0.08" max="0.25" step="0.01" value="0.12">
    <div class="slider-value" id="thickness_value">0.12</div>
  </div>

  <div class="section">
    <div class="section-title">Text Label</div>
    <input type="text" id="input_text" placeholder="Max 12 characters" maxlength="12">
    <button class="btn-full" id="btn_apply_text">Apply Text</button>
  </div>

  <div class="section">
    <button class="btn-full" id="btn_reset" style="background:rgba(231,76,60,0.3);border-color:rgba(231,76,60,0.5);">Reset All</button>
  </div>

  <div class="section">
    <div class="section-title">Configuration</div>
    <div id="export_info"></div>
  </div>

  <div class="hint">
    Click case to select • R to rotate 90° • F to flip
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

// State
window.__3D_STATE__ = {
  caseColor: '#3498db',
  material: 'default',
  pattern: 'none',
  thickness: 0.12,
  caseRotationY: 0,
  isSelected: false,
  textLabel: '',
  bottleLoaded: false,
  bottleRotationY: 0,
  colorChangeCount: 0,
  patternCycleCount: 0,
  isAnimating: false
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color('#1a1a2e');

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xfff5e6, 0.8);
dirLight1.position.set(5, 8, 5);
dirLight1.castShadow = true;
dirLight1.shadow.mapSize.set(1024, 1024);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0xe6f0ff, 0.3);
dirLight2.position.set(-3, 4, -2);
scene.add(dirLight2);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(10, 10);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x222233,
  transparent: true,
  opacity: 0.5,
  roughness: 0.9,
  metalness: 0.1
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Phone case group
const caseGroup = new THREE.Group();
caseGroup.position.set(-1.2, 1.2, 0);
scene.add(caseGroup);

// Main case body
let caseMaterial = new THREE.MeshStandardMaterial({
  color: new THREE.Color('#3498db'),
  roughness: 0.6,
  metalness: 0.1,
  emissive: new THREE.Color(0x000000)
});

let caseGeometry;
try {
  caseGeometry = new RoundedBoxGeometry(0.8, 1.6, 0.12, 4, 0.03);
} catch(e) {
  caseGeometry = new THREE.BoxGeometry(0.8, 1.6, 0.12, 4, 8, 2);
}

const caseMesh = new THREE.Mesh(caseGeometry, caseMaterial);
caseMesh.castShadow = true;
caseGroup.add(caseMesh);

// Shell (slightly larger transparent)
let shellGeometry;
try {
  shellGeometry = new RoundedBoxGeometry(0.84, 1.64, 0.14, 4, 0.035);
} catch(e) {
  shellGeometry = new THREE.BoxGeometry(0.84, 1.64, 0.14, 4, 8, 2);
}
const shellMaterial = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  transparent: true,
  opacity: 0.08,
  roughness: 0.1,
  metalness: 0.3,
  side: THREE.FrontSide
});
const shellMesh = new THREE.Mesh(shellGeometry, shellMaterial);
caseGroup.add(shellMesh);

// Camera cutout on back
const cutoutGeo = new THREE.CircleGeometry(0.08, 32);
const cutoutMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9, metalness: 0.0 });
const cutout1 = new THREE.Mesh(cutoutGeo, cutoutMat);
cutout1.position.set(0.15, 0.5, -0.065);
cutout1.rotation.y = Math.PI;
caseGroup.add(cutout1);

const cutout2 = new THREE.Mesh(cutoutGeo.clone(), cutoutMat.clone());
cutout2.position.set(0.15, 0.35, -0.065);
cutout2.rotation.y = Math.PI;
caseGroup.add(cutout2);

// Camera lens ring
const ringGeo = new THREE.RingGeometry(0.085, 0.1, 32);
const ringMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.8, roughness: 0.2 });
const ring1 = new THREE.Mesh(ringGeo, ringMat);
ring1.position.set(0.15, 0.5, -0.066);
ring1.rotation.y = Math.PI;
caseGroup.add(ring1);

const ring2 = new THREE.Mesh(ringGeo.clone(), ringMat.clone());
ring2.position.set(0.15, 0.35, -0.066);
ring2.rotation.y = Math.PI;
caseGroup.add(ring2);

// Texture canvas for patterns and text
const texCanvas = document.createElement('canvas');
texCanvas.width = 512;
texCanvas.height = 1024;
const texCtx = texCanvas.getContext('2d');
const canvasTexture = new THREE.CanvasTexture(texCanvas);

function updateTexture() {
  const state = window.__3D_STATE__;
  texCtx.clearRect(0, 0, 512, 1024);

  // Pattern
  if (state.pattern === 'stripes') {
    const stripeCount = 20;
    const stripeHeight = 1024 / stripeCount;
    for (let i = 0; i < stripeCount; i++) {
      texCtx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.1)';
      texCtx.fillRect(0, i * stripeHeight, 512, stripeHeight);
    }
  } else if (state.pattern === 'dots') {
    texCtx.fillStyle = 'rgba(255,255,255,0.2)';
    const spacing = 50;
    for (let x = spacing / 2; x < 512; x += spacing) {
      for (let y = spacing / 2; y < 1024; y += spacing) {
        const offsetX = (Math.floor(y / spacing) % 2 === 0) ? 0 : spacing / 2;
        texCtx.beginPath();
        texCtx.arc(x + offsetX, y, 10, 0, Math.PI * 2);
        texCtx.fill();
      }
    }
  }

  // Text
  if (state.textLabel && state.textLabel.length > 0) {
    texCtx.save();
    texCtx.fillStyle = 'rgba(255,255,255,0.9)';
    texCtx.font = 'bold 48px Segoe UI, Arial, sans-serif';
    texCtx.textAlign = 'center';
    texCtx.textBaseline = 'middle';
    // Add shadow
    texCtx.shadowColor = 'rgba(0,0,0,0.5)';
    texCtx.shadowBlur = 4;
    texCtx.shadowOffsetX = 2;
    texCtx.shadowOffsetY = 2;
    texCtx.fillText(state.textLabel, 256, 700);
    texCtx.restore();
  }

  canvasTexture.needsUpdate = true;

  if (state.pattern !== 'none' || (state.textLabel && state.textLabel.length > 0)) {
    caseMaterial.map = canvasTexture;
  } else {
    caseMaterial.map = null;
  }
  caseMaterial.needsUpdate = true;
}

// Load water bottle
let bottleModel = null;
const loader = new GLTFLoader();

// Try loading from common paths
const bottlePaths = [
  'WaterBottle.glb',
  './WaterBottle.glb',
  'models/WaterBottle.glb',
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/WaterBottle/glTF-Binary/WaterBottle.glb'
];

function tryLoadBottle(index) {
  if (index >= bottlePaths.length) {
    console.warn('Could not load WaterBottle.glb, creating placeholder');
    createPlaceholderBottle();
    return;
  }
  loader.load(
    bottlePaths[index],
    (gltf) => {
      bottleModel = gltf.scene;
      bottleModel.position.set(1.5, 0.5, 0);
      bottleModel.scale.set(4, 4, 4);
      bottleModel.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
        }
      });
      scene.add(bottleModel);
      window.__3D_STATE__.bottleLoaded = true;
    },
    undefined,
    () => tryLoadBottle(index + 1)
  );
}

function createPlaceholderBottle() {
  const bottleGroup = new THREE.Group();

  // Body
  const bodyGeo = new THREE.CylinderGeometry(0.25, 0.3, 1.2, 32);
  const bodyMat = new THREE.MeshStandardMaterial({
    color: 0x88ccff,
    transparent: true,
    opacity: 0.6,
    roughness: 0.1,
    metalness: 0.3
  });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.6;
  bottleGroup.add(body);

  // Neck
  const neckGeo = new THREE.CylinderGeometry(0.1, 0.15, 0.3, 32);
  const neckMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.6, roughness: 0.1, metalness: 0.3 });
  const neck = new THREE.Mesh(neckGeo, neckMat);
  neck.position.y = 1.35;
  bottleGroup.add(neck);

  // Cap
  const capGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.1, 32);
  const capMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5, metalness: 0.7 });
  const cap = new THREE.Mesh(capGeo, capMat);
  cap.position.y = 1.55;
  bottleGroup.add(cap);

  // Label
  const labelGeo = new THREE.CylinderGeometry(0.26, 0.31, 0.4, 32, 1, true);
  const labelMat = new THREE.MeshStandardMaterial({ color: 0x2ecc71, roughness: 0.8, metalness: 0.0 });
  const label = new THREE.Mesh(labelGeo, labelMat);
  label.position.y = 0.5;
  bottleGroup.add(label);

  bottleGroup.position.set(1.5, 0.5, 0);
  bottleGroup.scale.set(1, 1, 1);
  bottleModel = bottleGroup;
  scene.add(bottleModel);
  window.__3D_STATE__.bottleLoaded = true;
}

tryLoadBottle(0);

// Raycaster for clicking
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(caseGroup, true);

  if (intersects.length > 0) {
    window.__3D_STATE__.isSelected = !window.__3D_STATE__.isSelected;
    caseMaterial.emissive.set(window.__3D_STATE__.isSelected ? 0x444400 : 0x000000);
  }
});

// Keyboard controls
let rotationAnimation = null;

function animateRotation(targetRotation, duration = 500) {
  if (window.__3D_STATE__.isAnimating) return;
  window.__3D_STATE__.isAnimating = true;

  const startRotation = caseGroup.rotation.y;
  const startTime = performance.now();

  function tick(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    // Ease in-out
    const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    caseGroup.rotation.y = startRotation + (targetRotation - startRotation) * ease;

    if (t < 1) {
      requestAnimationFrame(tick);
    } else {
      caseGroup.rotation.y = targetRotation;
      window.__3D_STATE__.isAnimating = false;
    }
  }
  requestAnimationFrame(tick);
}

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;

  if (e.key === 'r' || e.key === 'R') {
    const target = caseGroup.rotation.y + Math.PI / 2;
    animateRotation(target, 500);
  }
  if (e.key === 'f' || e.key === 'F') {
    const target = caseGroup.rotation.y + Math.PI;
    animateRotation(target, 500);
  }
});

// UI Event Handlers
const colors = ['#3498db', '#e74c3c', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c'];

for (let i = 0; i < 6; i++) {
  document.getElementById(`color_${i}`).addEventListener('click', () => {
    window.__3D_STATE__.caseColor = colors[i];
    window.__3D_STATE__.colorChangeCount++;
    caseMaterial.color.set(colors[i]);

    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    document.getElementById(`color_${i}`).classList.add('active');
  });
}

document.getElementById('btn_matte').addEventListener('click', () => {
  window.__3D_STATE__.material = 'matte';
  caseMaterial.roughness = 0.8;
  caseMaterial.metalness = 0.05;
  document.getElementById('btn_matte').classList.add('active');
  document.getElementById('btn_glossy').classList.remove('active');
});

document.getElementById('btn_glossy').addEventListener('click', () => {
  window.__3D_STATE__.material = 'glossy';
  caseMaterial.roughness = 0.15;
  caseMaterial.metalness = 0.6;
  document.getElementById('btn_glossy').classList.add('active');
  document.getElementById('btn_matte').classList.remove('active');
});

const patterns = ['none', 'stripes', 'dots'];
let patternIndex = 0;

document.getElementById('btn_pattern').addEventListener('click', () => {
  window.__3D_STATE__.patternCycleCount++;
  patternIndex = (patternIndex + 1) % patterns.length;
  window.__3D_STATE__.pattern = patterns[patternIndex];
  document.getElementById('btn_pattern').textContent = `Pattern: ${patterns[patternIndex].charAt(0).toUpperCase() + patterns[patternIndex].slice(1)}`;
  updateTexture();
});

document.getElementById('slider_thickness').addEventListener('input', (e) => {
  const val = parseFloat(e.target.value);
  window.__3D_STATE__.thickness = val;
  document.getElementById('thickness_value').textContent = val.toFixed(2);

  const scaleZ = val / 0.12;
  caseMesh.scale.z = scaleZ;
  shellMesh.scale.z = scaleZ;
});

document.getElementById('btn_apply_text').addEventListener('click', () => {
  const text = document.getElementById('input_text').value.substring(0, 12);
  window.__3D_STATE__.textLabel = text;
  updateTexture();
});

document.getElementById('input_text').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('btn_apply_text').click();
  }
});

document.getElementById('btn_reset').addEventListener('click', () => {
  // Reset color
  window.__3D_STATE__.caseColor = '#3498db';
  caseMaterial.color.set('#3498db');
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  document.getElementById('color_0').classList.add('active');

  // Reset material
  window.__3D_STATE__.material = 'default';
  caseMaterial.roughness = 0.6;
  caseMaterial.metalness = 0.1;
  document.getElementById('btn_matte').classList.remove('active');
  document.getElementById('btn_glossy').classList.remove('active');

  // Reset pattern
  patternIndex = 0;
  window.__3D_STATE__.pattern = 'none';
  document.getElementById('btn_pattern').textContent = 'Pattern: None';

  // Reset thickness
  window.__3D_STATE__.thickness = 0.12;
  document.getElementById('slider_thickness').value = 0.12;
  document.getElementById('thickness_value').textContent = '0.12';
  caseMesh.scale.z = 1;
  shellMesh.scale.z = 1;

  // Reset text
  window.__3D_STATE__.textLabel = '';
  document.getElementById('input_text').value = '';

  // Reset selection
  window.__3D_STATE__.isSelected = false;
  caseMaterial.emissive.set(0x000000);

  // Reset rotation
  caseGroup.rotation.y = 0;

  // Reset counters
  window.__3D_STATE__.colorChangeCount = 0;
  window.__3D_STATE__.patternCycleCount = 0;

  updateTexture();
});

// Update export info
function updateExportInfo() {
  const s = window.__3D_STATE__;
  const info = document.getElementById('export_info');
  info.innerHTML = `
    <span>Color:</span> ${s.caseColor}<br>
    <span>Material:</span> ${s.material}<br>
    <span>Pattern:</span> ${s.pattern}<br>
    <span>Thickness:</span> ${s.thickness.toFixed(2)}<br>
    <span>Text:</span> ${s.textLabel || '(none)'}<br>
    <span>Selected:</span> ${s.isSelected}<br>
    <span>Bottle:</span> ${s.bottleLoaded ? 'Loaded' : 'Loading...'}<br>
    <span>Colors Changed:</span> ${s.colorChangeCount}<br>
    <span>Pattern Cycles:</span> ${s.patternCycleCount}
  `;
}

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();

  // Rotate bottle
  if (bottleModel) {
    bottleModel.rotation.y += 0.3 * delta;
    window.__3D_STATE__.bottleRotationY = bottleModel.rotation.y;
  }

  // Update state
  window.__3D_STATE__.caseRotationY = caseGroup.rotation.y;

  controls.update();
  renderer.render(scene, camera);
  updateExportInfo();
}

animate();

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
