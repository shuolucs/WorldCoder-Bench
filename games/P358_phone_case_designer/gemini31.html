<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Phone Case Designer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: rgba(10, 10, 30, 0.85);
            z-index: 2;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            backdrop-filter: blur(5px);
        }
        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }
        .control-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #ccc;
        }
        .color-picker {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }
        .color-swatch:hover {
            transform: scale(1.1);
        }
        .color-swatch.active {
            border-color: white;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-right: 5px;
            margin-bottom: 5px;
            transition: background 0.2s;
        }
        button:hover {
            background: #2980b9;
        }
        input[type="range"] {
            width: 100%;
        }
        input[type="text"] {
            width: calc(100% - 70px);
            padding: 7px;
            border: 1px solid #555;
            background: #222;
            color: white;
            border-radius: 4px;
        }
        #btn_apply_text {
            width: 60px;
            padding: 8px 0;
        }
        #btn_reset {
            width: 100%;
            background: #e74c3c;
            margin-top: 10px;
        }
        #btn_reset:hover {
            background: #c0392b;
        }
        #export_info {
            margin-top: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 4px;
            font-size: 0.8rem;
            color: #aaa;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .instructions {
            font-size: 0.8rem;
            color: #888;
            margin-top: 20px;
            line-height: 1.4;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h2>Case Designer</h2>
        
        <div class="control-group">
            <label>Color</label>
            <div class="color-picker">
                <div class="color-swatch" id="color_0" style="background-color: #3498db;" data-color="#3498db"></div>
                <div class="color-swatch" id="color_1" style="background-color: #e74c3c;" data-color="#e74c3c"></div>
                <div class="color-swatch" id="color_2" style="background-color: #2ecc71;" data-color="#2ecc71"></div>
                <div class="color-swatch" id="color_3" style="background-color: #f39c12;" data-color="#f39c12"></div>
                <div class="color-swatch" id="color_4" style="background-color: #9b59b6;" data-color="#9b59b6"></div>
                <div class="color-swatch" id="color_5" style="background-color: #1abc9c;" data-color="#1abc9c"></div>
            </div>
        </div>

        <div class="control-group">
            <label>Material</label>
            <button id="btn_matte">Matte</button>
            <button id="btn_glossy">Glossy</button>
        </div>

        <div class="control-group">
            <label>Pattern</label>
            <button id="btn_pattern">Cycle Pattern</button>
        </div>

        <div class="control-group">
            <label>Thickness: <span id="thickness_val">0.12</span></label>
            <input type="range" id="slider_thickness" min="0.08" max="0.25" step="0.01" value="0.12">
        </div>

        <div class="control-group">
            <label>Custom Text</label>
            <input type="text" id="input_text" maxlength="12" placeholder="Max 12 chars">
            <button id="btn_apply_text">Apply</button>
        </div>

        <button id="btn_reset">Reset All</button>

        <div id="export_info"></div>

        <div class="instructions">
            Controls:<br>
            - Left Click + Drag: Rotate view<br>
            - Scroll: Zoom<br>
            - Click Case: Toggle highlight<br>
            - 'R' Key: Rotate case 90°<br>
            - 'F' Key: Flip case 180°
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            caseColor: '#3498db',
            material: 'default',
            pattern: 'none',
            thickness: 0.12,
            caseRotationY: 0,
            isSelected: false,
            textLabel: '',
            bottleLoaded: false,
            bottleRotationY: 0,
            colorChangeCount: 0,
            patternCycleCount: 0,
            isAnimating: false
        };

        const patterns = ['none', 'stripes', 'dots'];
        let currentPatternIndex = 0;
        let targetCaseRotationY = 0;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        // Background is handled by CSS, use alpha renderer
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xfff5e6, 0.8);
        dirLight1.position.set(5, 8, 5);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xe6f0ff, 0.3);
        dirLight2.position.set(-3, 4, -2);
        scene.add(dirLight2);

        // --- Ground Plane ---
        const groundGeo = new THREE.PlaneGeometry(10, 10);
        const groundMat = new THREE.MeshBasicMaterial({ 
            color: 0x222233, 
            transparent: true, 
            opacity: 0.5,
            side: THREE.DoubleSide
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- Dynamic Texture Generation ---
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 1024;
        const ctx = canvas.getContext('2d');
        const caseTexture = new THREE.CanvasTexture(canvas);
        caseTexture.colorSpace = THREE.SRGBColorSpace;

        function updateTexture() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#000000';
            
            if (window.__3D_STATE__.pattern === 'stripes') {
                for (let i = 0; i < canvas.height; i += 40) {
                    ctx.fillRect(0, i, canvas.width, 20);
                }
            } else if (window.__3D_STATE__.pattern === 'dots') {
                for (let x = 20; x < canvas.width; x += 60) {
                    for (let y = 20; y < canvas.height; y += 60) {
                        ctx.beginPath();
                        ctx.arc(x, y, 15, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            if (window.__3D_STATE__.textLabel) {
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(Math.PI / 2); // Rotate text to run along the case
                ctx.font = 'bold 60px Arial';
                ctx.fillStyle = '#000000';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(window.__3D_STATE__.textLabel, 0, 0);
                ctx.restore();
            }

            caseTexture.needsUpdate = true;
        }
        updateTexture();

        // --- Phone Case Model ---
        const caseGroup = new THREE.Group();
        caseGroup.position.set(-1.2, 1.2, 0);
        scene.add(caseGroup);

        // Main Body
        const bodyGeo = new THREE.BoxGeometry(0.8, 1.6, 0.12);
        const caseMaterial = new THREE.MeshStandardMaterial({
            color: new THREE.Color(window.__3D_STATE__.caseColor),
            metalness: 0.1,
            roughness: 0.6,
            map: caseTexture
        });
        const caseMesh = new THREE.Mesh(bodyGeo, caseMaterial);
        caseGroup.add(caseMesh);

        // Camera Cutout (Back is -Z)
        const cutoutGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.14, 32);
        const cutoutMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const cutoutMesh = new THREE.Mesh(cutoutGeo, cutoutMat);
        cutoutMesh.rotation.x = Math.PI / 2;
        cutoutMesh.position.set(-0.2, 0.6, -0.06);
        caseGroup.add(cutoutMesh);

        // --- Reference Product (GLB) ---
        let bottleMesh;
        const loader = new GLTFLoader();
        
        // Attempt to load, provide fallback if fails
        loader.load(
            'WaterBottle.glb',
            (gltf) => {
                bottleMesh = gltf.scene;
                setupBottle();
                window.__3D_STATE__.bottleLoaded = true;
            },
            undefined,
            (error) => {
                // Fallback dummy bottle
                const bGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.8, 32);
                const bMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8, roughness: 0.2 });
                bottleMesh = new THREE.Mesh(bGeo, bMat);
                setupBottle();
                window.__3D_STATE__.bottleLoaded = false; // Technically didn't load GLB
            }
        );

        function setupBottle() {
            bottleMesh.position.set(1.5, 0.5, 0);
            bottleMesh.scale.set(4, 4, 4);
            scene.add(bottleMesh);
        }

        // --- UI Interactions ---
        
        // Colors
        const swatches = document.querySelectorAll('.color-swatch');
        swatches.forEach(swatch => {
            swatch.addEventListener('click', (e) => {
                const color = e.target.getAttribute('data-color');
                caseMaterial.color.set(color);
                window.__3D_STATE__.caseColor = color;
                window.__3D_STATE__.colorChangeCount++;
                updateExportInfo();
            });
        });

        // Materials
        document.getElementById('btn_matte').addEventListener('click', () => {
            caseMaterial.roughness = 0.8;
            caseMaterial.metalness = 0.05;
            window.__3D_STATE__.material = 'matte';
            updateExportInfo();
        });

        document.getElementById('btn_glossy').addEventListener('click', () => {
            caseMaterial.roughness = 0.15;
            caseMaterial.metalness = 0.6;
            window.__3D_STATE__.material = 'glossy';
            updateExportInfo();
        });

        // Pattern
        document.getElementById('btn_pattern').addEventListener('click', () => {
            currentPatternIndex = (currentPatternIndex + 1) % patterns.length;
            window.__3D_STATE__.pattern = patterns[currentPatternIndex];
            window.__3D_STATE__.patternCycleCount++;
            updateTexture();
            updateExportInfo();
        });

        // Thickness
        const sliderThickness = document.getElementById('slider_thickness');
        const thicknessVal = document.getElementById('thickness_val');
        sliderThickness.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            thicknessVal.textContent = val.toFixed(2);
            window.__3D_STATE__.thickness = val;
            // Base thickness is 0.12, so scale Z relative to that
            caseGroup.scale.z = val / 0.12;
            updateExportInfo();
        });

        // Text
        document.getElementById('btn_apply_text').addEventListener('click', () => {
            const text = document.getElementById('input_text').value;
            window.__3D_STATE__.textLabel = text;
            updateTexture();
            updateExportInfo();
        });

        // Reset
        document.getElementById('btn_reset').addEventListener('click', () => {
            window.__3D_STATE__.caseColor = '#3498db';
            window.__3D_STATE__.material = 'default';
            window.__3D_STATE__.pattern = 'none';
            window.__3D_STATE__.thickness = 0.12;
            window.__3D_STATE__.textLabel = '';
            window.__3D_STATE__.isSelected = false;
            
            currentPatternIndex = 0;
            targetCaseRotationY = 0;
            
            caseMaterial.color.set('#3498db');
            caseMaterial.roughness = 0.6;
            caseMaterial.metalness = 0.1;
            caseMaterial.emissive.setHex(0x000000);
            
            sliderThickness.value = 0.12;
            thicknessVal.textContent = '0.12';
            caseGroup.scale.z = 1;
            
            document.getElementById('input_text').value = '';
            
            updateTexture();
            updateExportInfo();
        });

        // Export Info
        function updateExportInfo() {
            const info = document.getElementById('export_info');
            const stateCopy = { ...window.__3D_STATE__ };
            // Format numbers for cleaner display
            stateCopy.caseRotationY = parseFloat(stateCopy.caseRotationY.toFixed(2));
            stateCopy.bottleRotationY = parseFloat(stateCopy.bottleRotationY.toFixed(2));
            info.textContent = JSON.stringify(stateCopy, null, 2);
        }

        // --- Raycasting (Selection) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            // Ignore clicks on UI panel
            if (event.clientX < 260) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(caseMesh);

            if (intersects.length > 0) {
                window.__3D_STATE__.isSelected = !window.__3D_STATE__.isSelected;
                if (window.__3D_STATE__.isSelected) {
                    caseMaterial.emissive.setHex(0x444400);
                } else {
                    caseMaterial.emissive.setHex(0x000000);
                }
                updateExportInfo();
            }
        });

        // --- Keyboard Interactions ---
        window.addEventListener('keydown', (event) => {
            if (event.key.toLowerCase() === 'r') {
                targetCaseRotationY += Math.PI / 2;
            } else if (event.key.toLowerCase() === 'f') {
                targetCaseRotationY += Math.PI;
            }
        });

        // --- Window Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();

            // Bottle Rotation
            if (bottleMesh) {
                bottleMesh.rotation.y += 0.3 * delta;
                window.__3D_STATE__.bottleRotationY = bottleMesh.rotation.y;
            }

            // Case Rotation Animation (Smooth Lerp)
            const rotDiff = targetCaseRotationY - caseGroup.rotation.y;
            if (Math.abs(rotDiff) > 0.001) {
                caseGroup.rotation.y += rotDiff * 0.1;
                window.__3D_STATE__.isAnimating = true;
            } else {
                caseGroup.rotation.y = targetCaseRotationY;
                window.__3D_STATE__.isAnimating = false;
            }
            window.__3D_STATE__.caseRotationY = caseGroup.rotation.y;

            controls.update();
            
            // Update state object every frame (though UI export info is updated on events to save DOM writes)
            window.__3D_STATE__.caseRotationY = caseGroup.rotation.y;
            if(bottleMesh) window.__3D_STATE__.bottleRotationY = bottleMesh.rotation.y;

            renderer.render(scene, camera);
        }

        // Initial UI update
        updateExportInfo();
        animate();

    </script>
</body>
</html>
