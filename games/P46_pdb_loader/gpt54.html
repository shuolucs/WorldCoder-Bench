<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js PDB 咖啡因球棍分子查看器</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #101318;
      color: #e8eef7;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(18, 22, 30, 0.82);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px;
      width: 320px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
    }
    #ui h2 {
      margin: 0 0 8px;
      font-size: 16px;
    }
    #ui .row {
      margin: 8px 0;
      line-height: 1.5;
      font-size: 13px;
    }
    #ui button {
      margin-right: 8px;
      margin-top: 6px;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: #263042;
      color: #fff;
      cursor: pointer;
    }
    #ui button:hover {
      background: #31405a;
    }
    #atomInfo, #measureInfo, #stats {
      white-space: pre-line;
      font-size: 13px;
      color: #dbe6f7;
    }
    #hint {
      color: #aebbd1;
      font-size: 12px;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h2>咖啡因 PDB 分子查看器</h2>
      <div class="row" id="stats"></div>
      <div class="row">
        <button id="displayMode">displayMode: ball-and-stick</button>
        <button id="clearMeasure">清除测量</button>
      </div>
      <div class="row" id="atomInfo">点击原子查看信息</div>
      <div class="row" id="measureInfo">测量距离：0 Å</div>
      <div class="row" id="hint">
        操作：左键旋转，滚轮缩放，右键平移。<br>
        连续点击两个原子可测量距离。
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const atomInfoEl = document.getElementById('atomInfo');
    const measureInfoEl = document.getElementById('measureInfo');
    const statsEl = document.getElementById('stats');
    const displayModeBtn = document.getElementById('displayMode');
    const clearMeasureBtn = document.getElementById('clearMeasure');

    // 近似真实结构的咖啡因 PDB，24 个原子（C8H10N4O2）
    const caffeinePDB = `
HETATM    1  C1  CAF A   1      -0.090   1.380   0.000  1.00  0.00           C
HETATM    2  N2  CAF A   1       1.220   0.820   0.000  1.00  0.00           N
HETATM    3  C3  CAF A   1       1.300  -0.580   0.000  1.00  0.00           C
HETATM    4  N4  CAF A   1       0.050  -1.220   0.000  1.00  0.00           N
HETATM    5  C5  CAF A   1      -1.100  -0.420   0.000  1.00  0.00           C
HETATM    6  C6  CAF A   1      -1.300   0.960   0.000  1.00  0.00           C
HETATM    7  O6  CAF A   1      -2.420   1.430   0.000  1.00  0.00           O
HETATM    8  N7  CAF A   1      -2.180  -1.260   0.000  1.00  0.00           N
HETATM    9  C8  CAF A   1      -3.420  -0.660   0.000  1.00  0.00           C
HETATM   10  N9  CAF A   1      -3.220   0.720   0.000  1.00  0.00           N
HETATM   11  C10 CAF A   1       2.620   1.560   0.000  1.00  0.00           C
HETATM   12  O11 CAF A   1       2.320  -1.230   0.000  1.00  0.00           O
HETATM   13  C12 CAF A   1       0.050  -2.670   0.000  1.00  0.00           C
HETATM   14  C13 CAF A   1      -2.240  -2.720   0.000  1.00  0.00           C
HETATM   15  C14 CAF A   1      -4.760  -1.300   0.000  1.00  0.00           C
HETATM   16  H1  CAF A   1       3.060   1.310   0.980  1.00  0.00           H
HETATM   17  H2  CAF A   1       2.420   2.640   0.000  1.00  0.00           H
HETATM   18  H3  CAF A   1       3.060   1.310  -0.980  1.00  0.00           H
HETATM   19  H4  CAF A   1       0.970  -3.050   0.000  1.00  0.00           H
HETATM   20  H5  CAF A   1      -0.420  -3.020   0.890  1.00  0.00           H
HETATM   21  H6  CAF A   1      -0.420  -3.020  -0.890  1.00  0.00           H
HETATM   22  H7  CAF A   1      -1.340  -3.140   0.000  1.00  0.00           H
HETATM   23  H8  CAF A   1      -2.700  -3.040   0.890  1.00  0.00           H
HETATM   24  H9  CAF A   1      -2.700  -3.040  -0.890  1.00  0.00           H
`.trim();

    function inferElement(atomName) {
      const clean = atomName.replace(/[^A-Za-z]/g, '').toUpperCase();
      if (!clean) return 'C';
      const two = clean.slice(0, 2);
      const one = clean[0];
      const knownTwo = ['CL', 'BR', 'NA', 'MG', 'FE', 'ZN', 'CA'];
      if (knownTwo.includes(two)) return two[0] + two[1].toLowerCase();
      return one;
    }

    function parsePDB(pdbText) {
      const atoms = [];
      const lines = pdbText.split(/\r?\n/);
      for (const line of lines) {
        if (!/^(ATOM  |HETATM)/.test(line)) continue;
        const serial = parseInt(line.slice(6, 11).trim(), 10);
        const name = line.slice(12, 16).trim();
        const x = parseFloat(line.slice(30, 38).trim());
        const y = parseFloat(line.slice(38, 46).trim());
        const z = parseFloat(line.slice(46, 54).trim());
        let element = line.length >= 78 ? line.slice(76, 78).trim() : '';
        if (!element) element = inferElement(name);
        element = element.charAt(0).toUpperCase() + element.slice(1).toLowerCase();
        atoms.push({ serial, name, x, y, z, element });
      }
      return atoms;
    }

    const atoms = parsePDB(caffeinePDB);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101318);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 18);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambient);

    const dir1 = new THREE.DirectionalLight(0xffffff, 1.0);
    dir1.position.set(8, 10, 12);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0xffffff, 0.6);
    dir2.position.set(-8, -6, -10);
    scene.add(dir2);

    const moleculeGroup = new THREE.Group();
    scene.add(moleculeGroup);

    const atomGroup = new THREE.Group();
    const bondGroup = new THREE.Group();
    moleculeGroup.add(bondGroup);
    moleculeGroup.add(atomGroup);

    const elementColors = {
      H: 0xffffff,
      C: 0x8a8a8a,
      N: 0x2f6fff,
      O: 0xff3b30,
      S: 0xffd400
    };

    const atomRadii = {
      H: 0.22,
      C: 0.36,
      N: 0.34,
      O: 0.34,
      S: 0.45
    };

    const covalentRadii = {
      H: 0.31,
      C: 0.76,
      N: 0.71,
      O: 0.66,
      S: 1.05
    };

    function getColor(el) {
      return elementColors[el] ?? 0xcccccc;
    }

    function getAtomRadius(el) {
      return atomRadii[el] ?? 0.35;
    }

    function getSpaceFillRadius(el) {
      return getAtomRadius(el) * 1.9;
    }

    function distance(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const dz = a.z - b.z;
      return Math.sqrt(dx * dx + dy * dy + dz * dz);
    }

    function isBonded(a, b) {
      const d = distance(a, b);
      if (d > 1.6) return false;
      if (a.element === 'H' && b.element === 'H') return false;
      const ra = covalentRadii[a.element] ?? 0.77;
      const rb = covalentRadii[b.element] ?? 0.77;
      return d <= Math.min(1.6, ra + rb + 0.45);
    }

    function guessBondOrder(a, b, d) {
      const pair = [a.element, b.element].sort().join('-');
      if ((pair === 'C-O' || pair === 'C-N') && d < 1.30) return 2;
      if (pair === 'C-C' && d < 1.38) return 2;
      if (pair === 'N-C' && d < 1.30) return 2;
      return 1;
    }

    const bonds = [];
    for (let i = 0; i < atoms.length; i++) {
      for (let j = i + 1; j < atoms.length; j++) {
        if (isBonded(atoms[i], atoms[j])) {
          const d = distance(atoms[i], atoms[j]);
          bonds.push({
            a: i,
            b: j,
            distance: d,
            order: guessBondOrder(atoms[i], atoms[j], d)
          });
        }
      }
    }

    const sphereGeometry = new THREE.SphereGeometry(1, 32, 24);
    const cylinderGeometry = new THREE.CylinderGeometry(1, 1, 1, 20);

    const atomMeshes = [];
    const atomMaterialCache = new Map();

    function getAtomMaterial(el) {
      if (!atomMaterialCache.has(el)) {
        atomMaterialCache.set(el, new THREE.MeshPhongMaterial({
          color: getColor(el),
          shininess: 70
        }));
      }
      return atomMaterialCache.get(el);
    }

    atoms.forEach((atom, i) => {
      const mesh = new THREE.Mesh(sphereGeometry, getAtomMaterial(atom.element));
      mesh.position.set(atom.x, atom.y, atom.z);
      mesh.userData.atomIndex = i;
      mesh.userData.baseColor = getColor(atom.element);
      atomGroup.add(mesh);
      atomMeshes.push(mesh);
    });

    const bondMeshes = [];

    function createBondCylinder(start, end, radius, color = 0xd0d7df) {
      const mesh = new THREE.Mesh(
        cylinderGeometry,
        new THREE.MeshPhongMaterial({ color, shininess: 40 })
      );
      const startV = start.clone();
      const endV = end.clone();
      const dir = new THREE.Vector3().subVectors(endV, startV);
      const len = dir.length();

      mesh.position.copy(startV).add(endV).multiplyScalar(0.5);
      mesh.scale.set(radius, len, radius);
      mesh.quaternion.setFromUnitVectors(
        new THREE.Vector3(0, 1, 0),
        dir.clone().normalize()
      );
      return mesh;
    }

    function getBondOffsetVector(start, end, amount = 0.12) {
      const dir = new THREE.Vector3().subVectors(end, start).normalize();
      let ref = new THREE.Vector3(0, 0, 1);
      if (Math.abs(dir.dot(ref)) > 0.9) ref = new THREE.Vector3(0, 1, 0);
      const perp = new THREE.Vector3().crossVectors(dir, ref).normalize().multiplyScalar(amount);
      return perp;
    }

    bonds.forEach((bond) => {
      const a = atoms[bond.a];
      const b = atoms[bond.b];
      const start = new THREE.Vector3(a.x, a.y, a.z);
      const end = new THREE.Vector3(b.x, b.y, b.z);

      if (bond.order === 2) {
        const off = getBondOffsetVector(start, end, 0.12);
        const c1 = createBondCylinder(start.clone().add(off), end.clone().add(off), 0.08);
        const c2 = createBondCylinder(start.clone().sub(off), end.clone().sub(off), 0.08);
        bondGroup.add(c1, c2);
        bondMeshes.push(c1, c2);
      } else {
        const c = createBondCylinder(start, end, 0.11);
        bondGroup.add(c);
        bondMeshes.push(c);
      }
    });

    const bbox = new THREE.Box3().setFromObject(atomGroup);
    const center = bbox.getCenter(new THREE.Vector3());
    moleculeGroup.position.sub(center);
    controls.target.set(0, 0, 0);

    let selectedAtomIndex = null;
    let measureSelection = [];
    let measurementDistance = 0;
    let displayMode = 'ball-and-stick';

    const markerGroup = new THREE.Group();
    scene.add(markerGroup);

    function clearMarkers() {
      while (markerGroup.children.length) {
        const child = markerGroup.children.pop();
        child.geometry?.dispose?.();
        child.material?.dispose?.();
      }
    }

    function addSelectionMarker(atomIndex, color = 0xffff00) {
      const atom = atoms[atomIndex];
      const geom = new THREE.SphereGeometry(getAtomRadius(atom.element) + 0.14, 24, 18);
      const mat = new THREE.MeshBasicMaterial({ color, wireframe: true });
      const marker = new THREE.Mesh(geom, mat);
      marker.position.set(atom.x, atom.y, atom.z).sub(center);
      markerGroup.add(marker);
    }

    function updateMarkers() {
      clearMarkers();
      if (selectedAtomIndex !== null) addSelectionMarker(selectedAtomIndex, 0xffcc00);
      if (measureSelection[0] !== undefined) addSelectionMarker(measureSelection[0], 0x00ff99);
      if (measureSelection[1] !== undefined) addSelectionMarker(measureSelection[1], 0xff66cc);
    }

    function updateAtomInfo() {
      if (selectedAtomIndex === null) {
        atomInfoEl.textContent = '点击原子查看信息';
        return;
      }
      const a = atoms[selectedAtomIndex];
      atomInfoEl.textContent =
        `原子信息
serial: ${a.serial}
name: ${a.name}
element: ${a.element}
x: ${a.x.toFixed(3)}
y: ${a.y.toFixed(3)}
z: ${a.z.toFixed(3)}`;
    }

    function updateMeasureInfo() {
      measureInfoEl.textContent = `测量距离：${measurementDistance ? measurementDistance.toFixed(3) : 0} Å`;
    }

    function setDisplayMode(mode) {
      displayMode = mode;
      displayModeBtn.textContent = `displayMode: ${displayMode}`;

      if (mode === 'ball-and-stick') {
        atomMeshes.forEach((mesh, i) => {
          const atom = atoms[i];
          const r = getAtomRadius(atom.element);
          mesh.visible = true;
          mesh.material.wireframe = false;
          mesh.scale.setScalar(r);
        });
        bondGroup.visible = true;
        bondMeshes.forEach((m) => {
          m.visible = true;
          m.material.wireframe = false;
        });
      } else if (mode === 'space-filling') {
        atomMeshes.forEach((mesh, i) => {
          const atom = atoms[i];
          const r = getSpaceFillRadius(atom.element);
          mesh.visible = true;
          mesh.material.wireframe = false;
          mesh.scale.setScalar(r);
        });
        bondGroup.visible = false;
      } else if (mode === 'wireframe') {
        atomMeshes.forEach((mesh, i) => {
          const atom = atoms[i];
          const r = getAtomRadius(atom.element) * 0.9;
          mesh.visible = true;
          mesh.material.wireframe = true;
          mesh.scale.setScalar(r);
        });
        bondGroup.visible = true;
        bondMeshes.forEach((m) => {
          m.visible = true;
          m.material.wireframe = true;
        });
      }

      updateMarkers();
      update3DState();
    }

    displayModeBtn.addEventListener('click', () => {
      const modes = ['ball-and-stick', 'space-filling', 'wireframe'];
      const idx = modes.indexOf(displayMode);
      setDisplayMode(modes[(idx + 1) % modes.length]);
    });

    clearMeasureBtn.addEventListener('click', () => {
      measureSelection = [];
      measurementDistance = 0;
      updateMeasureInfo();
      updateMarkers();
      update3DState();
    });

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    let pointerDown = new THREE.Vector2();
    let movedDuringClick = false;

    renderer.domElement.addEventListener('pointerdown', (e) => {
      pointerDown.set(e.clientX, e.clientY);
      movedDuringClick = false;
    });

    renderer.domElement.addEventListener('pointermove', (e) => {
      if (Math.abs(e.clientX - pointerDown.x) > 4 || Math.abs(e.clientY - pointerDown.y) > 4) {
        movedDuringClick = true;
      }
    });

    renderer.domElement.addEventListener('click', (event) => {
      if (movedDuringClick) return;

      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(atomMeshes, false);

      if (intersects.length > 0) {
        const hit = intersects[0].object;
        const atomIndex = hit.userData.atomIndex;
        selectedAtomIndex = atomIndex;

        if (measureSelection.length === 0) {
          measureSelection.push(atomIndex);
          measurementDistance = 0;
        } else if (measureSelection.length === 1) {
          if (measureSelection[0] === atomIndex) {
            measurementDistance = 0;
          } else {
            measureSelection.push(atomIndex);
            measurementDistance = distance(atoms[measureSelection[0]], atoms[measureSelection[1]]);
          }
        } else {
          measureSelection = [atomIndex];
          measurementDistance = 0;
        }

        updateAtomInfo();
        updateMeasureInfo();
        updateMarkers();
        update3DState();
      }
    });

    function updateStats() {
      statsEl.textContent =
        `原子数: ${atoms.length}
键数: ${bonds.length}
模式: ${displayMode}`;
    }

    function update3DState() {
      window.__3D_STATE__ = {
        atomCount: atoms.length,
        bondCount: bonds.length,
        selectedAtom: selectedAtomIndex === null ? null : {
          serial: atoms[selectedAtomIndex].serial,
          element: atoms[selectedAtomIndex].element,
          name: atoms[selectedAtomIndex].name,
          x: atoms[selectedAtomIndex].x,
          y: atoms[selectedAtomIndex].y,
          z: atoms[selectedAtomIndex].z
        },
        measurementDistance: Number.isFinite(measurementDistance) ? measurementDistance : 0,
        displayMode,
        atoms: atoms.map(a => ({
          element: a.element,
          x: Number(a.x),
          y: Number(a.y),
          z: Number(a.z)
        }))
      };
      updateStats();
    }

    setDisplayMode('ball-and-stick');
    updateAtomInfo();
    updateMeasureInfo();
    update3DState();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      update3DState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
