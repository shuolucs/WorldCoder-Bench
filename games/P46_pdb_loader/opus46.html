<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caffeine PDB Molecule Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #eee; }
  canvas { display: block; }
  #ui {
    position: absolute; top: 10px; left: 10px; z-index: 10;
    display: flex; flex-direction: column; gap: 8px;
  }
  #ui button {
    padding: 8px 16px; border: none; border-radius: 6px;
    background: #16213e; color: #e0e0e0; font-size: 13px;
    cursor: pointer; transition: background 0.2s;
    border: 1px solid #0f3460;
  }
  #ui button:hover { background: #0f3460; }
  #atomInfo {
    position: absolute; bottom: 10px; left: 10px; z-index: 10;
    background: rgba(22, 33, 62, 0.92); padding: 12px 18px;
    border-radius: 8px; font-size: 13px; min-width: 220px;
    border: 1px solid #0f3460; line-height: 1.6;
  }
  #atomInfo h3 { margin-bottom: 4px; color: #53d8fb; font-size: 14px; }
  #measureInfo {
    position: absolute; bottom: 10px; right: 10px; z-index: 10;
    background: rgba(22, 33, 62, 0.92); padding: 12px 18px;
    border-radius: 8px; font-size: 13px; min-width: 180px;
    border: 1px solid #0f3460; line-height: 1.6;
  }
  #measureInfo h3 { margin-bottom: 4px; color: #f5a623; font-size: 14px; }
  #modeLabel {
    position: absolute; top: 10px; right: 10px; z-index: 10;
    background: rgba(22, 33, 62, 0.92); padding: 8px 16px;
    border-radius: 6px; font-size: 13px;
    border: 1px solid #0f3460;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="ui">
  <button id="displayMode">Display Mode: Ball-and-Stick</button>
  <button id="clearMeasure">Clear Measurement</button>
</div>
<div id="atomInfo"><h3>Atom Info</h3><span>Click an atom to see details</span></div>
<div id="measureInfo"><h3>Measurement</h3><span>Click two atoms to measure distance</span></div>
<div id="modeLabel">Mode: <strong>ball-and-stick</strong></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============================================================
// Caffeine PDB data (C8H10N4O2, 24 atoms)
// ============================================================
const PDB_DATA = `HEADER    CAFFEINE
COMPND    CAFFEINE
ATOM      1  N1  CAF A   1       1.320   1.030   0.000  1.00  0.00           N
ATOM      2  C2  CAF A   1       1.320  -0.370   0.000  1.00  0.00           C
ATOM      3  N3  CAF A   1       0.060  -0.980   0.000  1.00  0.00           N
ATOM      4  C4  CAF A   1      -1.120  -0.170   0.000  1.00  0.00           C
ATOM      5  C5  CAF A   1      -1.120   1.230   0.000  1.00  0.00           C
ATOM      6  C6  CAF A   1       0.120   1.830   0.000  1.00  0.00           C
ATOM      7  N7  CAF A   1      -2.340   1.740   0.000  1.00  0.00           N
ATOM      8  C8  CAF A   1      -3.160   0.640   0.000  1.00  0.00           C
ATOM      9  N9  CAF A   1      -2.380  -0.530   0.000  1.00  0.00           N
ATOM     10  O2  CAF A   1       2.340  -1.050   0.000  1.00  0.00           O
ATOM     11  O6  CAF A   1       0.120   3.060   0.000  1.00  0.00           O
ATOM     12  C10 CAF A   1       2.570   1.780   0.000  1.00  0.00           C
ATOM     13  C11 CAF A   1       0.060  -2.440   0.000  1.00  0.00           C
ATOM     14  C12 CAF A   1      -2.900  -1.890   0.000  1.00  0.00           C
ATOM     15  H81 CAF A   1      -4.240   0.680   0.000  1.00  0.00           H
ATOM     16 H101 CAF A   1       2.380   2.850   0.000  1.00  0.00           H
ATOM     17 H102 CAF A   1       3.160   1.530   0.890  1.00  0.00           H
ATOM     18 H103 CAF A   1       3.160   1.530  -0.890  1.00  0.00           H
ATOM     19 H111 CAF A   1      -0.460  -2.810   0.890  1.00  0.00           H
ATOM     20 H112 CAF A   1      -0.460  -2.810  -0.890  1.00  0.00           H
ATOM     21 H113 CAF A   1       1.080  -2.810   0.000  1.00  0.00           H
ATOM     22 H121 CAF A   1      -2.570  -2.430   0.890  1.00  0.00           H
ATOM     23 H122 CAF A   1      -2.570  -2.430  -0.890  1.00  0.00           H
ATOM     24 H123 CAF A   1      -3.990  -1.860   0.000  1.00  0.00           H
END`;

// ============================================================
// Parse PDB
// ============================================================
function parsePDB(pdbText) {
  const atoms = [];
  const lines = pdbText.split('\n');
  for (const line of lines) {
    if (line.startsWith('ATOM') || line.startsWith('HETATM')) {
      const serial = parseInt(line.substring(6, 11).trim());
      const name = line.substring(12, 16).trim();
      const x = parseFloat(line.substring(30, 38).trim());
      const y = parseFloat(line.substring(38, 46).trim());
      const z = parseFloat(line.substring(46, 54).trim());
      // Try element column (76-78) first, then infer from name
      let element = line.length >= 78 ? line.substring(76, 78).trim() : '';
      if (!element) {
        // Infer from atom name: strip digits, take first letter
        element = name.replace(/[0-9]/g, '').charAt(0);
      }
      element = element.charAt(0).toUpperCase() + element.slice(1).toLowerCase();
      // Normalize single-char elements
      if (element.length > 1 && !['He','Li','Be','Ne','Na','Mg','Al','Si','Cl','Ar','Ca','Fe','Cu','Zn','Br','Se'].includes(element)) {
        element = element.charAt(0);
      }
      atoms.push({ serial, name, x, y, z, element });
    }
  }
  return atoms;
}

// ============================================================
// Bond detection
// ============================================================
const COVALENT_RADII = { H: 0.31, C: 0.76, N: 0.71, O: 0.66, S: 1.05 };

function detectBonds(atoms) {
  const bonds = [];
  const tolerance = 0.45;
  for (let i = 0; i < atoms.length; i++) {
    for (let j = i + 1; j < atoms.length; j++) {
      const a = atoms[i], b = atoms[j];
      const dx = a.x - b.x, dy = a.y - b.y, dz = a.z - b.z;
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
      const r1 = COVALENT_RADII[a.element] || 0.76;
      const r2 = COVALENT_RADII[b.element] || 0.76;
      const maxDist = r1 + r2 + tolerance;
      if (dist <= 1.6 && dist > 0.4) {
        bonds.push({ i, j, dist });
      }
    }
  }
  return bonds;
}

// ============================================================
// Determine bond order (simple heuristic for caffeine)
// Double bonds: C=O, C=N in ring, C=C in ring
// ============================================================
function determineBondOrder(atoms, bonds) {
  // Build adjacency count
  const bondCounts = new Array(atoms.length).fill(0);
  for (const b of bonds) {
    bondCounts[b.i]++;
    bondCounts[b.j]++;
  }

  // Known double bond patterns in caffeine:
  // C=O bonds (carbonyl), some C=N and C=C in the purine ring
  // Heuristic: if both atoms are non-H and the bond is short enough
  for (const b of bonds) {
    const a1 = atoms[b.i], a2 = atoms[b.j];
    const elems = [a1.element, a2.element].sort().join('-');
    b.order = 1;

    // C=O: carbonyl, dist typically ~1.23 Å
    if (elems === 'C-O' && b.dist < 1.30) {
      b.order = 2;
    }
    // C=N: in ring, dist typically ~1.32-1.35 Å
    // Only for ring atoms (not methyl N)
    if (elems === 'C-N' && b.dist < 1.35) {
      // Check if both have multiple bonds (ring atoms)
      if (bondCounts[b.i] >= 3 && bondCounts[b.j] >= 3) {
        b.order = 2;
      }
    }
    // C=C: dist typically ~1.38 Å
    if (elems === 'C-C' && b.dist < 1.42) {
      if (bondCounts[b.i] >= 3 && bondCounts[b.j] >= 3) {
        b.order = 2;
      }
    }
  }
  return bonds;
}

// ============================================================
// Element colors and radii
// ============================================================
const ELEMENT_COLORS = {
  C: 0x808080, H: 0xffffff, O: 0xff3333, N: 0x3333ff, S: 0xffff33
};
const ELEMENT_RADII_VDW = {
  C: 1.7, H: 1.2, O: 1.52, N: 1.55, S: 1.8
};
const ELEMENT_RADII_BALL = {
  C: 0.3, H: 0.2, O: 0.28, N: 0.28, S: 0.35
};

function getColor(element) {
  return ELEMENT_COLORS[element] || 0xcccccc;
}

// ============================================================
// Three.js Setup
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
scene.add(ambientLight);
const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight1.position.set(5, 5, 5);
scene.add(dirLight1);
const dirLight2 = new THREE.DirectionalLight(0x8888ff, 0.5);
dirLight2.position.set(-5, -3, -5);
scene.add(dirLight2);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// ============================================================
// Parse and build molecule
// ============================================================
const atoms = parsePDB(PDB_DATA);
const rawBonds = detectBonds(atoms);
const bonds = determineBondOrder(atoms, rawBonds);

// Center molecule
const center = new THREE.Vector3();
for (const a of atoms) center.add(new THREE.Vector3(a.x, a.y, a.z));
center.divideScalar(atoms.length);
for (const a of atoms) { a.x -= center.x; a.y -= center.y; a.z -= center.z; }

// ============================================================
// Molecule group and meshes
// ============================================================
const moleculeGroup = new THREE.Group();
scene.add(moleculeGroup);

const atomMeshes = [];
const bondMeshes = [];
const atomDataMap = new Map(); // mesh -> atom data

// Shared geometries
const sphereGeoHigh = new THREE.SphereGeometry(1, 32, 24);
const cylinderGeo = new THREE.CylinderGeometry(1, 1, 1, 12);

// Materials cache
const materialCache = {};
function getMaterial(element) {
  if (!materialCache[element]) {
    materialCache[element] = new THREE.MeshPhongMaterial({
      color: getColor(element),
      shininess: 80,
      specular: 0x444444
    });
  }
  return materialCache[element];
}

const bondMaterial = new THREE.MeshPhongMaterial({ color: 0x888888, shininess: 40 });

// Create atom spheres
for (let i = 0; i < atoms.length; i++) {
  const a = atoms[i];
  const mesh = new THREE.Mesh(sphereGeoHigh, getMaterial(a.element));
  mesh.position.set(a.x, a.y, a.z);
  mesh.userData = { atomIndex: i };
  moleculeGroup.add(mesh);
  atomMeshes.push(mesh);
  atomDataMap.set(mesh, a);
}

// Create bond cylinders
function createCylinder(p1, p2, radius) {
  const dir = new THREE.Vector3().subVectors(p2, p1);
  const length = dir.length();
  const mesh = new THREE.Mesh(cylinderGeo, bondMaterial.clone());
  mesh.scale.set(radius, length, radius);
  mesh.position.copy(p1).add(dir.multiplyScalar(0.5));
  dir.normalize();
  const up = new THREE.Vector3(0, 1, 0);
  const quat = new THREE.Quaternion().setFromUnitVectors(up, dir.clone().normalize());
  // Recalculate direction
  const d = new THREE.Vector3().subVectors(p2, p1).normalize();
  mesh.quaternion.setFromUnitVectors(up, d);
  return mesh;
}

function buildBondMeshes() {
  // Clear existing
  for (const m of bondMeshes) {
    moleculeGroup.remove(m);
    if (m.geometry && m.geometry !== cylinderGeo) m.geometry.dispose();
  }
  bondMeshes.length = 0;

  for (const b of bonds) {
    const a1 = atoms[b.i], a2 = atoms[b.j];
    const p1 = new THREE.Vector3(a1.x, a1.y, a1.z);
    const p2 = new THREE.Vector3(a2.x, a2.y, a2.z);

    if (b.order === 2) {
      // Double bond: two parallel cylinders with offset
      const dir = new THREE.Vector3().subVectors(p2, p1).normalize();
      // Find perpendicular vector
      let perp = new THREE.Vector3(0, 1, 0);
      if (Math.abs(dir.dot(perp)) > 0.9) perp.set(1, 0, 0);
      perp.cross(dir).normalize().multiplyScalar(0.06);

      const m1 = createBondCylinder(
        p1.clone().add(perp), p2.clone().add(perp), 0.04
      );
      const m2 = createBondCylinder(
        p1.clone().sub(perp), p2.clone().sub(perp), 0.04
      );
      moleculeGroup.add(m1);
      moleculeGroup.add(m2);
      bondMeshes.push(m1, m2);
    } else {
      const m = createBondCylinder(p1, p2, 0.06);
      moleculeGroup.add(m);
      bondMeshes.push(m);
    }
  }
}

function createBondCylinder(p1, p2, radius) {
  const direction = new THREE.Vector3().subVectors(p2, p1);
  const length = direction.length();
  const mesh = new THREE.Mesh(cylinderGeo, bondMaterial.clone());
  mesh.scale.set(radius, length, radius);
  const midpoint = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
  mesh.position.copy(midpoint);
  const up = new THREE.Vector3(0, 1, 0);
  const d = direction.clone().normalize();
  mesh.quaternion.setFromUnitVectors(up, d);
  return mesh;
}

buildBondMeshes();

// ============================================================
// Display modes
// ============================================================
const MODES = ['ball-and-stick', 'space-filling', 'wireframe'];
let currentModeIndex = 0;

function applyDisplayMode() {
  const mode = MODES[currentModeIndex];

  for (let i = 0; i < atoms.length; i++) {
    const a = atoms[i];
    const mesh = atomMeshes[i];
    const rBall = ELEMENT_RADII_BALL[a.element] || 0.3;
    const rVDW = ELEMENT_RADII_VDW[a.element] || 1.7;

    switch (mode) {
      case 'ball-and-stick':
        mesh.scale.setScalar(rBall);
        mesh.visible = true;
        mesh.material.wireframe = false;
        break;
      case 'space-filling':
        mesh.scale.setScalar(rVDW * 0.5);
        mesh.visible = true;
        mesh.material.wireframe = false;
        break;
      case 'wireframe':
        mesh.scale.setScalar(rBall * 0.5);
        mesh.visible = true;
        mesh.material.wireframe = false;
        break;
    }
  }

  for (const m of bondMeshes) {
    switch (mode) {
      case 'ball-and-stick':
        m.visible = true;
        m.material.wireframe = false;
        break;
      case 'space-filling':
        m.visible = false;
        break;
      case 'wireframe':
        m.visible = true;
        m.material.wireframe = true;
        break;
    }
  }

  document.getElementById('displayMode').textContent = `Display Mode: ${mode}`;
  document.getElementById('modeLabel').innerHTML = `Mode: <strong>${mode}</strong>`;
  updateState();
}

applyDisplayMode();

document.getElementById('displayMode').addEventListener('click', () => {
  currentModeIndex = (currentModeIndex + 1) % MODES.length;
  applyDisplayMode();
});

// ============================================================
// Raycasting / Selection / Measurement
// ============================================================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedAtomData = null;
let measureAtoms = [];
let measureLine = null;
let measureLabel = null;
let highlightMeshes = [];

function clearHighlights() {
  for (const h of highlightMeshes) {
    moleculeGroup.remove(h);
    h.geometry.dispose();
    h.material.dispose();
  }
  highlightMeshes = [];
}

function highlightAtom(atomIndex, color = 0x53d8fb) {
  const a = atoms[atomIndex];
  const geo = new THREE.SphereGeometry(1, 24, 16);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.35, depthWrite: false });
  const mesh = new THREE.Mesh(geo, mat);
  const r = (ELEMENT_RADII_BALL[a.element] || 0.3) * 1.8;
  mesh.scale.setScalar(r);
  mesh.position.set(a.x, a.y, a.z);
  moleculeGroup.add(mesh);
  highlightMeshes.push(mesh);
}

function clearMeasurement() {
  if (measureLine) {
    moleculeGroup.remove(measureLine);
    measureLine.geometry.dispose();
    measureLine.material.dispose();
    measureLine = null;
  }
  measureAtoms = [];
  clearHighlights();
  document.getElementById('measureInfo').innerHTML = '<h3>Measurement</h3><span>Click two atoms to measure distance</span>';
  updateState();
}

document.getElementById('clearMeasure').addEventListener('click', clearMeasurement);

function showMeasureLine(a1, a2) {
  if (measureLine) {
    moleculeGroup.remove(measureLine);
    measureLine.geometry.dispose();
    measureLine.material.dispose();
  }
  const points = [
    new THREE.Vector3(a1.x, a1.y, a1.z),
    new THREE.Vector3(a2.x, a2.y, a2.z)
  ];
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineDashedMaterial({ color: 0xf5a623, dashSize: 0.15, gapSize: 0.08, linewidth: 2 });
  measureLine = new THREE.Line(geo, mat);
  measureLine.computeLineDistances();
  moleculeGroup.add(measureLine);
}

renderer.domElement.addEventListener('click', (event) => {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(atomMeshes);

  if (intersects.length > 0) {
    const mesh = intersects[0].object;
    const atomIndex = mesh.userData.atomIndex;
    const a = atoms[atomIndex];

    selectedAtomData = { ...a };

    // Update atom info panel
    document.getElementById('atomInfo').innerHTML = `
      <h3>Atom Info</h3>
      <div><b>Name:</b> ${a.name}</div>
      <div><b>Element:</b> ${a.element}</div>
      <div><b>Serial:</b> ${a.serial}</div>
      <div><b>Position:</b> (${a.x.toFixed(3)}, ${a.y.toFixed(3)}, ${a.z.toFixed(3)})</div>
    `;

    // Measurement logic
    if (measureAtoms.length === 0) {
      clearHighlights();
      if (measureLine) {
        moleculeGroup.remove(measureLine);
        measureLine.geometry.dispose();
        measureLine.material.dispose();
        measureLine = null;
      }
      measureAtoms.push(atomIndex);
      highlightAtom(atomIndex, 0x53d8fb);
      document.getElementById('measureInfo').innerHTML = `<h3>Measurement</h3><span>First atom: ${a.name} (${a.element})<br>Click another atom...</span>`;
    } else if (measureAtoms.length === 1) {
      if (measureAtoms[0] === atomIndex) return; // same atom
      measureAtoms.push(atomIndex);
      highlightAtom(atomIndex, 0xf5a623);

      const a1 = atoms[measureAtoms[0]];
      const a2 = atoms[measureAtoms[1]];
      const dx = a1.x - a2.x, dy = a1.y - a2.y, dz = a1.z - a2.z;
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

      showMeasureLine(a1, a2);

      document.getElementById('measureInfo').innerHTML = `
        <h3>Measurement</h3>
        <div><b>${a1.name}</b> ↔ <b>${a2.name}</b></div>
        <div style="font-size:18px; color:#f5a623; margin-top:4px;"><b>${dist.toFixed(3)} Å</b></div>
      `;
    } else {
      // Reset and start new measurement
      clearMeasurement();
      measureAtoms.push(atomIndex);
      highlightAtom(atomIndex, 0x53d8fb);
      document.getElementById('measureInfo').innerHTML = `<h3>Measurement</h3><span>First atom: ${a.name} (${a.element})<br>Click another atom...</span>`;
    }

    updateState();
  }
});

// ============================================================
// State
// ============================================================
function getMeasurementDistance() {
  if (measureAtoms.length === 2) {
    const a1 = atoms[measureAtoms[0]], a2 = atoms[measureAtoms[1]];
    const dx = a1.x - a2.x, dy = a1.y - a2.y, dz = a1.z - a2.z;
    return Math.sqrt(dx*dx + dy*dy + dz*dz);
  }
  return 0;
}

function updateState() {
  window.__3D_STATE__ = {
    atomCount: atoms.length,
    bondCount: bonds.length,
    selectedAtom: selectedAtomData ? {
      element: selectedAtomData.element,
      name: selectedAtomData.name,
      x: selectedAtomData.x,
      y: selectedAtomData.y,
      z: selectedAtomData.z,
      serial: selectedAtomData.serial
    } : null,
    measurementDistance: getMeasurementDistance(),
    displayMode: MODES[currentModeIndex],
    atoms: atoms.map(a => ({ element: a.element, x: a.x, y: a.y, z: a.z }))
  };
}

updateState();

// ============================================================
// Resize
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// Animation loop
// ============================================================
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

console.log(`Caffeine loaded: ${atoms.length} atoms, ${bonds.length} bonds`);
</script>
</body>
</html>
