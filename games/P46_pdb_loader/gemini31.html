<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caffeine PDB Viewer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
            color: white;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none; /* Let clicks pass through where there are no buttons */
            border: 1px solid #444;
        }
        #ui-panel > * {
            pointer-events: auto;
            margin-bottom: 10px;
        }
        #ui-panel > :last-child {
            margin-bottom: 0;
        }
        button {
            background: #333;
            color: white;
            border: 1px solid #666;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            width: 100%;
            text-align: left;
        }
        button:hover {
            background: #444;
        }
        .info-box {
            font-size: 14px;
            line-height: 1.4;
        }
        .highlight {
            color: #00ffcc;
            font-weight: bold;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-panel">
        <div id="atomInfo" class="info-box">Click an atom to view info</div>
        <div id="measureInfo" class="info-box">Measurement: <span class="highlight">0.00 Å</span></div>
        <button id="clearMeasure">Clear Measurement</button>
        <button id="displayMode">Mode: ball-and-stick</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- PDB Data (Caffeine) ---
        const caffeinePDB = `
ATOM      1  N1  MOL     1      -0.903  -1.313   0.000  1.00  0.00           N
ATOM      2  C2  MOL     1      -1.272   0.024   0.000  1.00  0.00           C
ATOM      3  O2  MOL     1      -2.441   0.364   0.000  1.00  0.00           O
ATOM      4  N3  MOL     1      -0.241   0.932   0.000  1.00  0.00           N
ATOM      5  C4  MOL     1       1.076   0.468   0.000  1.00  0.00           C
ATOM      6  C5  MOL     1       1.531  -0.865   0.000  1.00  0.00           C
ATOM      7  C6  MOL     1       0.466  -1.802   0.000  1.00  0.00           C
ATOM      8  O6  MOL     1       0.738  -2.994   0.000  1.00  0.00           O
ATOM      9  N7  MOL     1       2.894  -0.883   0.000  1.00  0.00           N
ATOM     10  C8  MOL     1       3.264   0.441   0.000  1.00  0.00           C
ATOM     11  N9  MOL     1       2.196   1.284   0.000  1.00  0.00           N
ATOM     12  C10 MOL     1      -1.936  -2.336   0.000  1.00  0.00           C
ATOM     13  C11 MOL     1      -0.596   2.348   0.000  1.00  0.00           C
ATOM     14  C12 MOL     1       3.856  -1.975   0.000  1.00  0.00           C
ATOM     15  H101MOL     1      -2.565  -2.196  -0.881  1.00  0.00           H
ATOM     16  H102MOL     1      -1.442  -3.308   0.000  1.00  0.00           H
ATOM     17  H103MOL     1      -2.565  -2.196   0.881  1.00  0.00           H
ATOM     18  H111MOL     1      -1.189   2.548   0.881  1.00  0.00           H
ATOM     19  H112MOL     1       0.315   2.943   0.000  1.00  0.00           H
ATOM     20  H113MOL     1      -1.189   2.548  -0.881  1.00  0.00           H
ATOM     21  H121MOL     1       3.314  -2.920   0.000  1.00  0.00           H
ATOM     22  H122MOL     1       4.485  -1.896   0.881  1.00  0.00           H
ATOM     23  H123MOL     1       4.485  -1.896  -0.881  1.00  0.00           H
ATOM     24  H8  MOL     1       4.298   0.754   0.000  1.00  0.00           H
        `;

        // --- Global State ---
        window.__3D_STATE__ = {
            atomCount: 0,
            bondCount: 0,
            selectedAtom: null,
            measurementDistance: 0,
            displayMode: 'ball-and-stick',
            atoms: []
        };

        const displayModes = ['ball-and-stick', 'space-filling', 'wireframe'];
        let currentModeIndex = 0;

        // --- Element Properties ---
        const elementData = {
            'C': { color: 0x808080, radius: 0.3, vdw: 1.7 * 0.8 },
            'H': { color: 0xffffff, radius: 0.2, vdw: 1.2 * 0.8 },
            'O': { color: 0xff0000, radius: 0.3, vdw: 1.52 * 0.8 },
            'N': { color: 0x0000ff, radius: 0.3, vdw: 1.55 * 0.8 },
            'S': { color: 0xffff00, radius: 0.3, vdw: 1.8 * 0.8 },
            'DEFAULT': { color: 0xff00ff, radius: 0.3, vdw: 1.5 * 0.8 }
        };

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);
        const dirLight1 = new THREE.DirectionalLight(0xffffff, 2);
        dirLight1.position.set(1, 1, 1);
        scene.add(dirLight1);
        const dirLight2 = new THREE.DirectionalLight(0xffffff, 1);
        dirLight2.position.set(-1, -1, -1);
        scene.add(dirLight2);

        const moleculeGroup = new THREE.Group();
        scene.add(moleculeGroup);

        // --- Data Structures ---
        let parsedAtoms = [];
        let parsedBonds = [];
        const atomMeshes = [];
        const bondMeshes = [];

        // --- Parsing ---
        function parsePDB(pdbStr) {
            const lines = pdbStr.split('\n');
            parsedAtoms = [];
            
            for (const line of lines) {
                if (line.startsWith('ATOM') || line.startsWith('HETATM')) {
                    const name = line.substring(12, 16).trim();
                    const x = parseFloat(line.substring(30, 38));
                    const y = parseFloat(line.substring(38, 46));
                    const z = parseFloat(line.substring(46, 54));
                    
                    let element = line.substring(76, 78).trim().toUpperCase();
                    if (!element) {
                        element = name.replace(/[0-9]/g, '').charAt(0).toUpperCase();
                    }

                    if (isFinite(x) && isFinite(y) && isFinite(z)) {
                        parsedAtoms.push({ id: parsedAtoms.length + 1, name, x, y, z, element });
                    }
                }
            }

            window.__3D_STATE__.atomCount = parsedAtoms.length;
            window.__3D_STATE__.atoms = parsedAtoms.map(a => ({ element: a.element, x: a.x, y: a.y, z: a.z }));
        }

        function calculateBonds() {
            parsedBonds = [];
            for (let i = 0; i < parsedAtoms.length; i++) {
                for (let j = i + 1; j < parsedAtoms.length; j++) {
                    const a = parsedAtoms[i];
                    const b = parsedAtoms[j];
                    const dx = a.x - b.x;
                    const dy = a.y - b.y;
                    const dz = a.z - b.z;
                    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

                    if (dist <= 1.6) {
                        let type = 'single';
                        const els = [a.element, b.element].sort().join('');
                        
                        // Heuristics for double bonds
                        if (els === 'CO' && dist < 1.32) type = 'double';
                        else if (els === 'CC' && dist < 1.42) type = 'double';
                        else if (els === 'CN' && dist < 1.37) type = 'double';

                        parsedBonds.push({ source: a, target: b, type, dist });
                    }
                }
            }
            window.__3D_STATE__.bondCount = parsedBonds.length;
        }

        // --- Building 3D Objects ---
        const sphereGeo = new THREE.SphereGeometry(1, 32, 32);
        const cylinderGeo = new THREE.CylinderGeometry(1, 1, 1, 16);
        cylinderGeo.rotateX(Math.PI / 2); // Align along Z for easier lookAt

        function buildMolecule() {
            // Clear existing
            while(moleculeGroup.children.length > 0){ 
                moleculeGroup.remove(moleculeGroup.children[0]); 
            }
            atomMeshes.length = 0;
            bondMeshes.length = 0;

            // Atoms
            parsedAtoms.forEach(atom => {
                const data = elementData[atom.element] || elementData['DEFAULT'];
                const material = new THREE.MeshPhongMaterial({ color: data.color });
                const mesh = new THREE.Mesh(sphereGeo, material);
                
                mesh.position.set(atom.x, atom.y, atom.z);
                mesh.scale.setScalar(data.radius);
                
                mesh.userData = { 
                    type: 'atom', 
                    atomData: atom, 
                    baseRadius: data.radius, 
                    vdwRadius: data.vdw 
                };
                
                moleculeGroup.add(mesh);
                atomMeshes.push(mesh);
            });

            // Bonds
            const bondMaterial = new THREE.MeshPhongMaterial({ color: 0xaaaaaa });
            const bondRadius = 0.05;

            parsedBonds.forEach(bond => {
                const p1 = new THREE.Vector3(bond.source.x, bond.source.y, bond.source.z);
                const p2 = new THREE.Vector3(bond.target.x, bond.target.y, bond.target.z);
                const dist = bond.dist;
                const mid = p1.clone().lerp(p2, 0.5);
                const dir = p2.clone().sub(p1).normalize();

                if (bond.type === 'single') {
                    const mesh = new THREE.Mesh(cylinderGeo, bondMaterial);
                    mesh.position.copy(mid);
                    mesh.scale.set(bondRadius, bondRadius, dist);
                    mesh.lookAt(p2);
                    mesh.userData = { type: 'bond' };
                    moleculeGroup.add(mesh);
                    bondMeshes.push(mesh);
                } else if (bond.type === 'double') {
                    let perp = new THREE.Vector3(0, 0, 1).cross(dir);
                    if (perp.lengthSq() < 0.01) perp = new THREE.Vector3(1, 0, 0).cross(dir);
                    perp.normalize().multiplyScalar(0.08); // Offset

                    const m1 = new THREE.Mesh(cylinderGeo, bondMaterial);
                    m1.position.copy(mid).add(perp);
                    m1.scale.set(bondRadius, bondRadius, dist);
                    m1.lookAt(p2.clone().add(perp));
                    m1.userData = { type: 'bond' };

                    const m2 = new THREE.Mesh(cylinderGeo, bondMaterial);
                    m2.position.copy(mid).sub(perp);
                    m2.scale.set(bondRadius, bondRadius, dist);
                    m2.lookAt(p2.clone().sub(perp));
                    m2.userData = { type: 'bond' };

                    moleculeGroup.add(m1, m2);
                    bondMeshes.push(m1, m2);
                }
            });

            // Center molecule
            const box = new THREE.Box3().setFromObject(moleculeGroup);
            const center = box.getCenter(new THREE.Vector3());
            moleculeGroup.position.sub(center);
        }

        // --- Interaction & Measurement ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        let selectedAtoms = []; // For measurement (max 2)
        
        // Highlight spheres
        const highlightGeo = new THREE.SphereGeometry(1, 16, 16);
        const highlightMat = new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.5, depthTest: false });
        const highlightMeshes = [
            new THREE.Mesh(highlightGeo, highlightMat),
            new THREE.Mesh(highlightGeo, highlightMat)
        ];
        highlightMeshes.forEach(m => { m.visible = false; scene.add(m); });

        // Measurement Line
        const measureLineMat = new THREE.LineDashedMaterial({ color: 0x00ffcc, dashSize: 0.2, gapSize: 0.1, depthTest: false });
        const measureLineGeo = new THREE.BufferGeometry();
        measureLineGeo.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0, 0,0,0], 3));
        const measureLine = new THREE.Line(measureLineGeo, measureLineMat);
        measureLine.computeLineDistances();
        measureLine.visible = false;
        scene.add(measureLine);

        function updateUI() {
            const infoDiv = document.getElementById('atomInfo');
            if (window.__3D_STATE__.selectedAtom) {
                const a = window.__3D_STATE__.selectedAtom;
                infoDiv.innerHTML = `Atom: <span class="highlight">${a.name}</span> (${a.element})<br>X: ${a.x.toFixed(3)}<br>Y: ${a.y.toFixed(3)}<br>Z: ${a.z.toFixed(3)}`;
            } else {
                infoDiv.innerHTML = 'Click an atom to view info';
            }

            const measureDiv = document.getElementById('measureInfo');
            if (window.__3D_STATE__.measurementDistance > 0) {
                measureDiv.innerHTML = `Distance: <span class="highlight">${window.__3D_STATE__.measurementDistance.toFixed(3)} Å</span>`;
            } else {
                measureDiv.innerHTML = `Measurement: <span class="highlight">0.00 Å</span>`;
            }
        }

        function onMouseClick(event) {
            // Convert mouse position to normalized device coordinates
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(atomMeshes);

            if (intersects.length > 0) {
                const mesh = intersects[0].object;
                const atomData = mesh.userData.atomData;

                window.__3D_STATE__.selectedAtom = atomData;

                // Measurement logic
                if (selectedAtoms.length === 2) {
                    selectedAtoms = []; // Reset if already 2
                }
                
                // Avoid selecting same atom twice
                if (selectedAtoms.length === 1 && selectedAtoms[0].mesh === mesh) {
                    return;
                }

                selectedAtoms.push({ mesh, data: atomData });

                // Update Highlights
                highlightMeshes.forEach(m => m.visible = false);
                selectedAtoms.forEach((item, index) => {
                    const worldPos = new THREE.Vector3();
                    item.mesh.getWorldPosition(worldPos);
                    highlightMeshes[index].position.copy(worldPos);
                    highlightMeshes[index].scale.setScalar(item.mesh.scale.x * 1.3);
                    highlightMeshes[index].visible = true;
                });

                // Update Measurement Line
                if (selectedAtoms.length === 2) {
                    const p1 = new THREE.Vector3();
                    const p2 = new THREE.Vector3();
                    selectedAtoms[0].mesh.getWorldPosition(p1);
                    selectedAtoms[1].mesh.getWorldPosition(p2);
                    
                    const positions = measureLine.geometry.attributes.position.array;
                    positions[0] = p1.x; positions[1] = p1.y; positions[2] = p1.z;
                    positions[3] = p2.x; positions[4] = p2.y; positions[5] = p2.z;
                    measureLine.geometry.attributes.position.needsUpdate = true;
                    measureLine.computeLineDistances();
                    measureLine.visible = true;

                    const dist = p1.distanceTo(p2);
                    window.__3D_STATE__.measurementDistance = dist;
                } else {
                    measureLine.visible = false;
                    window.__3D_STATE__.measurementDistance = 0;
                }

                updateUI();
            }
        }

        window.addEventListener('pointerdown', onMouseClick);

        // --- UI Buttons ---
        document.getElementById('clearMeasure').addEventListener('click', () => {
            selectedAtoms = [];
            highlightMeshes.forEach(m => m.visible = false);
            measureLine.visible = false;
            window.__3D_STATE__.selectedAtom = null;
            window.__3D_STATE__.measurementDistance = 0;
            updateUI();
        });

        document.getElementById('displayMode').addEventListener('click', (e) => {
            currentModeIndex = (currentModeIndex + 1) % displayModes.length;
            const mode = displayModes[currentModeIndex];
            window.__3D_STATE__.displayMode = mode;
            e.target.innerText = `Mode: ${mode}`;

            atomMeshes.forEach(mesh => {
                if (mode === 'ball-and-stick') {
                    mesh.scale.setScalar(mesh.userData.baseRadius);
                    mesh.material.wireframe = false;
                } else if (mode === 'space-filling') {
                    mesh.scale.setScalar(mesh.userData.vdwRadius);
                    mesh.material.wireframe = false;
                } else if (mode === 'wireframe') {
                    mesh.scale.setScalar(mesh.userData.baseRadius);
                    mesh.material.wireframe = true;
                }
            });

            bondMeshes.forEach(mesh => {
                if (mode === 'ball-and-stick') {
                    mesh.visible = true;
                    mesh.material.wireframe = false;
                } else if (mode === 'space-filling') {
                    mesh.visible = false;
                } else if (mode === 'wireframe') {
                    mesh.visible = true;
                    mesh.material.wireframe = true;
                }
            });

            // Update highlights scale if visible
            selectedAtoms.forEach((item, index) => {
                highlightMeshes[index].scale.setScalar(item.mesh.scale.x * 1.3);
            });
        });

        // --- Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Initialization ---
        parsePDB(caffeinePDB);
        calculateBonds();
        buildMolecule();
        updateUI();

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

    </script>
</body>
</html>
