<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Social Network Cluster Visualization</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #buttons-container {
    position: absolute;
    top: 16px;
    left: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 10;
  }

  .cluster-btn {
    background: rgba(20, 20, 40, 0.8);
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 8px 16px;
    margin: 4px;
    cursor: pointer;
    font-size: 14px;
    border-radius: 4px;
    transition: background 0.2s, border-color 0.2s;
  }

  .cluster-btn:hover {
    background: rgba(40, 40, 80, 0.9);
    border-color: rgba(255, 255, 255, 0.4);
  }

  .cluster-btn.inactive {
    opacity: 0.5;
    border-color: rgba(255, 255, 255, 0.1);
  }

  #hud {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(20, 20, 40, 0.8);
    color: #ffffff;
    padding: 16px 20px;
    border-radius: 6px;
    font-size: 14px;
    line-height: 1.8;
    border: 1px solid rgba(255, 255, 255, 0.15);
    z-index: 10;
    min-width: 200px;
  }

  #hud .label {
    color: rgba(255, 255, 255, 0.6);
  }

  #hud .value {
    color: #ffffff;
    font-weight: bold;
  }
</style>
</head>
<body>

<div id="buttons-container">
  <button class="cluster-btn" id="btn-cluster-a" onclick="toggleCluster('A')">Toggle Cluster A</button>
  <button class="cluster-btn" id="btn-cluster-b" onclick="toggleCluster('B')">Toggle Cluster B</button>
  <button class="cluster-btn" id="btn-cluster-c" onclick="toggleCluster('C')">Toggle Cluster C</button>
</div>

<div id="hud">
  <div><span class="label">Nodes: </span><span class="value" id="hud-nodes">0</span></div>
  <div><span class="label">Edges: </span><span class="value" id="hud-edges">0</span></div>
  <div><span class="label">Selected: </span><span class="value" id="hud-selected">None</span></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ============ STATE ============
window.__3D_STATE__ = {
  totalNodes: 21,
  totalEdges: 0,
  clusterAVisible: true,
  clusterBVisible: true,
  clusterCVisible: true,
  selectedNodeId: null,
  hoveredNodeId: null,
  visibleNodeCount: 21,
  cameraDistance: 50
};

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 50);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 0.8);
pointLight.position.set(20, 20, 20);
scene.add(pointLight);

// ============ DATA STRUCTURES ============
const clusters = {
  A: { color: 0xff4444, center: new THREE.Vector3(-12, 5, 0), count: 8, nodes: [], edges: [], visible: true },
  B: { color: 0x4488ff, center: new THREE.Vector3(12, 5, 0), count: 6, nodes: [], edges: [], visible: true },
  C: { color: 0x44ff88, center: new THREE.Vector3(0, -10, 0), count: 7, nodes: [], edges: [], visible: true }
};

const allNodes = [];
const allEdges = [];
const interClusterEdges = [];
const nodeMap = {}; // id -> node data
const adjacency = {}; // id -> [connected ids]

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredNode = null;
let selectedNode = null;
let selectedConnections = [];

// ============ CREATE NODES ============
function createNodes() {
  let nodeIndex = 0;

  for (const [clusterName, cluster] of Object.entries(clusters)) {
    for (let i = 0; i < cluster.count; i++) {
      const id = `${clusterName}_${i}`;
      const colorObj = new THREE.Color(cluster.color);

      // Random position within radius 6 of cluster center
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = Math.random() * 6;
      const x = cluster.center.x + r * Math.sin(phi) * Math.cos(theta);
      const y = cluster.center.y + r * Math.sin(phi) * Math.sin(theta);
      const z = cluster.center.z + r * Math.cos(phi);

      const geometry = new THREE.SphereGeometry(0.5, 16, 16);
      const material = new THREE.MeshStandardMaterial({
        color: cluster.color,
        emissive: cluster.color,
        emissiveIntensity: 0.3,
        roughness: 0.4,
        metalness: 0.3
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.set(x, y, z);
      scene.add(mesh);

      const nodeData = {
        id: id,
        mesh: mesh,
        cluster: clusterName,
        originalColor: cluster.color,
        originalEmissiveIntensity: 0.3,
        originalScale: 1,
        position: new THREE.Vector3(x, y, z)
      };

      mesh.userData = { nodeId: id };
      cluster.nodes.push(nodeData);
      allNodes.push(nodeData);
      nodeMap[id] = nodeData;
      adjacency[id] = [];
      nodeIndex++;
    }
  }
}

// ============ CREATE EDGES ============
function createEdges() {
  // Intra-cluster edges
  for (const [clusterName, cluster] of Object.entries(clusters)) {
    const nodes = cluster.nodes;
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dist = nodes[i].position.distanceTo(nodes[j].position);
        if (dist < 8) {
          const geometry = new THREE.BufferGeometry().setFromPoints([
            nodes[i].position,
            nodes[j].position
          ]);
          const material = new THREE.LineBasicMaterial({
            color: cluster.color,
            transparent: true,
            opacity: 0.3
          });
          const line = new THREE.Line(geometry, material);
          scene.add(line);

          const edgeData = {
            line: line,
            cluster: clusterName,
            from: nodes[i].id,
            to: nodes[j].id,
            isInterCluster: false
          };

          cluster.edges.push(edgeData);
          allEdges.push(edgeData);
          adjacency[nodes[i].id].push(nodes[j].id);
          adjacency[nodes[j].id].push(nodes[i].id);
        }
      }
    }
  }

  // Inter-cluster edges
  const clusterPairs = [['A', 'B'], ['B', 'C'], ['A', 'C']];
  for (const [c1, c2] of clusterPairs) {
    const node1 = clusters[c1].nodes[Math.floor(Math.random() * clusters[c1].nodes.length)];
    const node2 = clusters[c2].nodes[Math.floor(Math.random() * clusters[c2].nodes.length)];

    const geometry = new THREE.BufferGeometry().setFromPoints([
      node1.position,
      node2.position
    ]);
    const material = new THREE.LineBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.15
    });
    const line = new THREE.Line(geometry, material);
    scene.add(line);

    const edgeData = {
      line: line,
      clusters: [c1, c2],
      from: node1.id,
      to: node2.id,
      isInterCluster: true
    };

    interClusterEdges.push(edgeData);
    allEdges.push(edgeData);
    adjacency[node1.id].push(node2.id);
    adjacency[node2.id].push(node1.id);
  }

  window.__3D_STATE__.totalEdges = allEdges.length;
}

// ============ PARTICLE BACKGROUND ============
function createBackground() {
  const particleCount = 500;
  const positions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 120;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 120;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 120;
  }
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const material = new THREE.PointsMaterial({
    color: 0x334466,
    size: 0.15,
    transparent: true,
    opacity: 0.5
  });
  const points = new THREE.Points(geometry, material);
  scene.add(points);
}

// ============ INTERACTIONS ============
function onMouseMove(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
}

function onMouseClick(event) {
  if (!hoveredNode) {
    // Deselect
    clearSelection();
    return;
  }

  // Clear previous selection
  clearSelection();

  // Select the hovered node
  selectedNode = hoveredNode;
  window.__3D_STATE__.selectedNodeId = selectedNode.id;

  // Change selected node to yellow
  selectedNode.mesh.material.color.set(0xffff00);
  selectedNode.mesh.material.emissive.set(0xffff00);
  selectedNode.mesh.material.emissiveIntensity = 0.5;
  selectedNode.mesh.scale.setScalar(1.5);

  // Highlight connected nodes
  const connectedIds = adjacency[selectedNode.id] || [];
  for (const connId of connectedIds) {
    const connNode = nodeMap[connId];
    if (connNode && connNode.mesh.visible) {
      connNode.mesh.scale.setScalar(1.3);
      connNode.mesh.material.emissiveIntensity = 0.6;
      selectedConnections.push(connNode);
    }
  }
}

function clearSelection() {
  if (selectedNode) {
    selectedNode.mesh.material.color.set(selectedNode.originalColor);
    selectedNode.mesh.material.emissive.set(selectedNode.originalColor);
    selectedNode.mesh.material.emissiveIntensity = selectedNode.originalEmissiveIntensity;
    selectedNode.mesh.scale.setScalar(1);
    selectedNode = null;
  }

  for (const connNode of selectedConnections) {
    connNode.mesh.material.emissiveIntensity = connNode.originalEmissiveIntensity;
    connNode.mesh.scale.setScalar(1);
  }
  selectedConnections = [];
  window.__3D_STATE__.selectedNodeId = null;
}

function handleHover() {
  raycaster.setFromCamera(mouse, camera);
  const meshes = allNodes.filter(n => n.mesh.visible).map(n => n.mesh);
  const intersects = raycaster.intersectObjects(meshes);

  // Unhover previous
  if (hoveredNode && (!selectedNode || hoveredNode.id !== selectedNode.id)) {
    if (!selectedConnections.includes(hoveredNode)) {
      hoveredNode.mesh.scale.setScalar(1);
      hoveredNode.mesh.material.emissiveIntensity = hoveredNode.originalEmissiveIntensity;
    } else {
      hoveredNode.mesh.scale.setScalar(1.3);
      hoveredNode.mesh.material.emissiveIntensity = 0.6;
    }
  }

  if (intersects.length > 0) {
    const nodeId = intersects[0].object.userData.nodeId;
    const nodeData = nodeMap[nodeId];
    if (nodeData) {
      hoveredNode = nodeData;
      window.__3D_STATE__.hoveredNodeId = nodeId;

      // Don't override selected node appearance
      if (!selectedNode || nodeId !== selectedNode.id) {
        nodeData.mesh.scale.setScalar(1.5);
        nodeData.mesh.material.emissiveIntensity = 0.7;
      }

      renderer.domElement.style.cursor = 'pointer';
    }
  } else {
    hoveredNode = null;
    window.__3D_STATE__.hoveredNodeId = null;
    renderer.domElement.style.cursor = 'default';
  }
}

function onKeyDown(event) {
  if (event.key === 'r' || event.key === 'R') {
    resetAll();
  }
}

function resetAll() {
  clearSelection();
  hoveredNode = null;
  window.__3D_STATE__.hoveredNodeId = null;

  // Make all clusters visible
  for (const [clusterName, cluster] of Object.entries(clusters)) {
    cluster.visible = true;
    for (const node of cluster.nodes) {
      node.mesh.visible = true;
      node.mesh.scale.setScalar(1);
      node.mesh.material.color.set(node.originalColor);
      node.mesh.material.emissive.set(node.originalColor);
      node.mesh.material.emissiveIntensity = node.originalEmissiveIntensity;
    }
    for (const edge of cluster.edges) {
      edge.line.visible = true;
    }
  }

  // Show inter-cluster edges
  for (const edge of interClusterEdges) {
    edge.line.visible = true;
  }

  window.__3D_STATE__.clusterAVisible = true;
  window.__3D_STATE__.clusterBVisible = true;
  window.__3D_STATE__.clusterCVisible = true;

  // Reset button styles
  document.getElementById('btn-cluster-a').classList.remove('inactive');
  document.getElementById('btn-cluster-b').classList.remove('inactive');
  document.getElementById('btn-cluster-c').classList.remove('inactive');
}

// ============ TOGGLE CLUSTER ============
function toggleCluster(clusterName) {
  const cluster = clusters[clusterName];
  cluster.visible = !cluster.visible;

  // Toggle nodes
  for (const node of cluster.nodes) {
    node.mesh.visible = cluster.visible;
  }

  // Toggle intra-cluster edges
  for (const edge of cluster.edges) {
    edge.line.visible = cluster.visible;
  }

  // Toggle inter-cluster edges
  for (const edge of interClusterEdges) {
    if (edge.clusters.includes(clusterName)) {
      // Only show if both clusters are visible
      const otherCluster = edge.clusters[0] === clusterName ? edge.clusters[1] : edge.clusters[0];
      edge.line.visible = cluster.visible && clusters[otherCluster].visible;
    }
  }

  // Update state
  window.__3D_STATE__[`cluster${clusterName}Visible`] = cluster.visible;

  // Update button style
  const btnId = `btn-cluster-${clusterName.toLowerCase()}`;
  const btn = document.getElementById(btnId);
  if (cluster.visible) {
    btn.classList.remove('inactive');
  } else {
    btn.classList.add('inactive');
  }

  // If selected node is in toggled-off cluster, deselect
  if (selectedNode && selectedNode.cluster === clusterName && !cluster.visible) {
    clearSelection();
  }
}
window.toggleCluster = toggleCluster;

// ============ UPDATE HUD ============
function updateHUD() {
  document.getElementById('hud-nodes').textContent = window.__3D_STATE__.totalNodes;
  document.getElementById('hud-edges').textContent = window.__3D_STATE__.totalEdges;
  document.getElementById('hud-selected').textContent = window.__3D_STATE__.selectedNodeId || 'None';
}

// ============ UPDATE STATE ============
function updateState() {
  let visibleCount = 0;
  for (const node of allNodes) {
    if (node.mesh.visible) visibleCount++;
  }
  window.__3D_STATE__.visibleNodeCount = visibleCount;
  window.__3D_STATE__.cameraDistance = camera.position.length();
}

// ============ ANIMATION LOOP ============
function animate() {
  requestAnimationFrame(animate);

  controls.update();
  handleHover();
  updateState();
  updateHUD();

  // Gentle node floating animation
  const time = Date.now() * 0.001;
  for (const node of allNodes) {
    const offset = parseInt(node.id.split('_')[1]) * 0.5;
    node.mesh.position.y = node.position.y + Math.sin(time + offset) * 0.15;
    node.mesh.position.x = node.position.x + Math.cos(time * 0.7 + offset) * 0.1;
  }

  // Update edge positions to follow nodes
  for (const edge of allEdges) {
    const fromNode = nodeMap[edge.from];
    const toNode = nodeMap[edge.to];
    if (fromNode && toNode) {
      const positions = edge.line.geometry.attributes.position;
      positions.setXYZ(0, fromNode.mesh.position.x, fromNode.mesh.position.y, fromNode.mesh.position.z);
      positions.setXYZ(1, toNode.mesh.position.x, toNode.mesh.position.y, toNode.mesh.position.z);
      positions.needsUpdate = true;
    }
  }

  renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ EVENT LISTENERS ============
window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onMouseClick);
window.addEventListener('keydown', onKeyDown);

// ============ INIT ============
createBackground();
createNodes();
createEdges();
animate();
</script>
</body>
</html>
