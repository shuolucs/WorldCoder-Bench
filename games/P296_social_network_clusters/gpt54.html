<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Social Network Cluster Visualization</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
    }

    #ui button {
      background: rgba(20, 20, 40, 0.75);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 8px 16px;
      margin: 4px 0;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.2s ease;
    }

    #ui button:hover {
      background: rgba(50, 50, 90, 0.9);
    }

    #hud {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      color: white;
      background: rgba(20, 20, 40, 0.65);
      padding: 12px 16px;
      border-radius: 8px;
      line-height: 1.6;
      min-width: 180px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <button id="toggleA">Toggle Cluster A</button>
    <button id="toggleB">Toggle Cluster B</button>
    <button id="toggleC">Toggle Cluster C</button>
  </div>

  <div id="hud">
    <div id="nodesCount">Nodes: 0</div>
    <div id="edgesCount">Edges: 0</div>
    <div id="selectedNode">Selected: None</div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#0a0a1a");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 0, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 0.8);
    pointLight.position.set(20, 20, 20);
    scene.add(pointLight);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const nodeGeometry = new THREE.SphereGeometry(0.5, 16, 16);

    const clusters = {
      A: {
        name: "A",
        color: new THREE.Color("#ff4444"),
        center: new THREE.Vector3(-12, 5, 0),
        count: 8,
        nodes: [],
        edges: [],
        visible: true
      },
      B: {
        name: "B",
        color: new THREE.Color("#4488ff"),
        center: new THREE.Vector3(12, 5, 0),
        count: 6,
        nodes: [],
        edges: [],
        visible: true
      },
      C: {
        name: "C",
        color: new THREE.Color("#44ff88"),
        center: new THREE.Vector3(0, -10, 0),
        count: 7,
        nodes: [],
        edges: [],
        visible: true
      }
    };

    const allNodes = [];
    const allEdges = [];
    const adjacency = new Map();
    const interClusterEdges = [];

    const state = {
      hoveredNode: null,
      selectedNode: null
    };

    function randomPointInRadius(center, radius) {
      const dir = new THREE.Vector3(
        Math.random() * 2 - 1,
        Math.random() * 2 - 1,
        Math.random() * 2 - 1
      ).normalize();
      const dist = Math.random() * radius;
      return center.clone().add(dir.multiplyScalar(dist));
    }

    function createNode(clusterKey, index) {
      const cluster = clusters[clusterKey];
      const material = new THREE.MeshStandardMaterial({
        color: cluster.color.clone(),
        emissive: cluster.color.clone(),
        emissiveIntensity: 0.3,
        metalness: 0.2,
        roughness: 0.4
      });

      const mesh = new THREE.Mesh(nodeGeometry, material);
      mesh.position.copy(randomPointInRadius(cluster.center, 6));

      const id = `${clusterKey}${index + 1}`;
      mesh.userData = {
        id,
        cluster: clusterKey,
        baseColor: cluster.color.clone(),
        isNode: true
      };

      scene.add(mesh);
      cluster.nodes.push(mesh);
      allNodes.push(mesh);
      adjacency.set(id, new Set());
    }

    function connectNodes(node1, node2, color, opacity, type = "intra", clusterKey = null) {
      const geometry = new THREE.BufferGeometry().setFromPoints([
        node1.position.clone(),
        node2.position.clone()
      ]);

      const material = new THREE.LineBasicMaterial({
        color,
        transparent: true,
        opacity
      });

      const line = new THREE.Line(geometry, material);
      line.userData = {
        type,
        cluster: clusterKey,
        from: node1.userData.id,
        to: node2.userData.id
      };

      scene.add(line);
      allEdges.push(line);

      if (type === "intra" && clusterKey) {
        clusters[clusterKey].edges.push(line);
      } else if (type === "inter") {
        interClusterEdges.push(line);
      }

      adjacency.get(node1.userData.id).add(node2.userData.id);
      adjacency.get(node2.userData.id).add(node1.userData.id);
    }

    function generateCluster(clusterKey) {
      const cluster = clusters[clusterKey];
      for (let i = 0; i < cluster.count; i++) {
        createNode(clusterKey, i);
      }

      for (let i = 0; i < cluster.nodes.length; i++) {
        for (let j = i + 1; j < cluster.nodes.length; j++) {
          const a = cluster.nodes[i];
          const b = cluster.nodes[j];
          if (a.position.distanceTo(b.position) <= 8) {
            connectNodes(a, b, cluster.color, 0.3, "intra", clusterKey);
          }
        }
      }
    }

    generateCluster("A");
    generateCluster("B");
    generateCluster("C");

    function randomNode(clusterKey) {
      const arr = clusters[clusterKey].nodes;
      return arr[Math.floor(Math.random() * arr.length)];
    }

    connectNodes(randomNode("A"), randomNode("B"), 0xffffff, 0.15, "inter");
    connectNodes(randomNode("B"), randomNode("C"), 0xffffff, 0.15, "inter");
    connectNodes(randomNode("A"), randomNode("C"), 0xffffff, 0.15, "inter");

    function getConnectedNodeIds(nodeId) {
      return adjacency.get(nodeId) || new Set();
    }

    function resetNodeVisual(node) {
      const isSelected = state.selectedNode === node;
      node.scale.setScalar(1);

      if (isSelected) {
        node.material.color.set("#ffff00");
        node.material.emissive.set("#ffff00");
        node.material.emissiveIntensity = 0.8;
      } else {
        node.material.color.copy(node.userData.baseColor);
        node.material.emissive.copy(node.userData.baseColor);
        node.material.emissiveIntensity = 0.3;
      }
    }

    function applyVisualState() {
      for (const node of allNodes) {
        resetNodeVisual(node);
      }

      if (state.selectedNode) {
        const selectedId = state.selectedNode.userData.id;
        const connectedIds = getConnectedNodeIds(selectedId);

        for (const node of allNodes) {
          if (connectedIds.has(node.userData.id) && node !== state.selectedNode) {
            node.scale.setScalar(1.3);
            node.material.emissiveIntensity = 0.6;
          }
        }

        state.selectedNode.material.color.set("#ffff00");
        state.selectedNode.material.emissive.set("#ffff00");
        state.selectedNode.material.emissiveIntensity = 0.9;
        state.selectedNode.scale.setScalar(1.5);
      }

      if (state.hoveredNode && state.hoveredNode.visible) {
        if (state.hoveredNode !== state.selectedNode) {
          state.hoveredNode.scale.setScalar(1.5);
          state.hoveredNode.material.emissiveIntensity = 0.9;
        }
      }
    }

    function setHoveredNode(node) {
      state.hoveredNode = node;
      applyVisualState();
    }

    function setSelectedNode(node) {
      state.selectedNode = node;
      applyVisualState();
      updateHUD();
    }

    function clearSelectionAndHover() {
      state.hoveredNode = null;
      state.selectedNode = null;
      applyVisualState();
      updateHUD();
    }

    function updateHUD() {
      document.getElementById("nodesCount").textContent = `Nodes: ${allNodes.length}`;
      document.getElementById("edgesCount").textContent = `Edges: ${allEdges.length}`;
      document.getElementById("selectedNode").textContent = `Selected: ${state.selectedNode ? state.selectedNode.userData.id : "None"}`;
    }

    function updateClusterVisibility(clusterKey) {
      const cluster = clusters[clusterKey];
      cluster.visible = !cluster.visible;

      for (const node of cluster.nodes) node.visible = cluster.visible;
      for (const edge of cluster.edges) edge.visible = cluster.visible;

      for (const edge of interClusterEdges) {
        const fromCluster = edge.userData.from.charAt(0);
        const toCluster = edge.userData.to.charAt(0);
        edge.visible = clusters[fromCluster].visible && clusters[toCluster].visible;
      }

      if (state.hoveredNode && !state.hoveredNode.visible) state.hoveredNode = null;
      if (state.selectedNode && !state.selectedNode.visible) state.selectedNode = null;

      applyVisualState();
      updateHUD();
    }

    document.getElementById("toggleA").addEventListener("click", () => updateClusterVisibility("A"));
    document.getElementById("toggleB").addEventListener("click", () => updateClusterVisibility("B"));
    document.getElementById("toggleC").addEventListener("click", () => updateClusterVisibility("C"));

    window.addEventListener("mousemove", (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const visibleNodes = allNodes.filter(n => n.visible);
      const intersects = raycaster.intersectObjects(visibleNodes);

      if (intersects.length > 0) {
        setHoveredNode(intersects[0].object);
      } else {
        setHoveredNode(null);
      }
    });

    window.addEventListener("click", () => {
      if (state.hoveredNode) {
        setSelectedNode(state.hoveredNode);
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key.toLowerCase() === "r") {
        clusters.A.visible = true;
        clusters.B.visible = true;
        clusters.C.visible = true;

        for (const key of ["A", "B", "C"]) {
          for (const node of clusters[key].nodes) node.visible = true;
          for (const edge of clusters[key].edges) edge.visible = true;
        }
        for (const edge of interClusterEdges) edge.visible = true;

        clearSelectionAndHover();
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.__3D_STATE__ = {
      totalNodes: allNodes.length,
      totalEdges: allEdges.length,
      clusterAVisible: true,
      clusterBVisible: true,
      clusterCVisible: true,
      selectedNodeId: null,
      hoveredNodeId: null,
      visibleNodeCount: allNodes.length,
      cameraDistance: camera.position.length()
    };

    updateHUD();
    applyVisualState();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      window.__3D_STATE__.totalNodes = allNodes.length;
      window.__3D_STATE__.totalEdges = allEdges.length;
      window.__3D_STATE__.clusterAVisible = clusters.A.visible;
      window.__3D_STATE__.clusterBVisible = clusters.B.visible;
      window.__3D_STATE__.clusterCVisible = clusters.C.visible;
      window.__3D_STATE__.selectedNodeId = state.selectedNode ? state.selectedNode.userData.id : null;
      window.__3D_STATE__.hoveredNodeId = state.hoveredNode ? state.hoveredNode.userData.id : null;
      window.__3D_STATE__.visibleNodeCount = allNodes.filter(n => n.visible).length;
      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
