<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Social Network Cluster Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }
        button {
            background-color: rgba(30, 30, 50, 0.7);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            margin: 4px 0;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: rgba(50, 50, 80, 0.9);
        }
        button.disabled {
            opacity: 0.5;
            text-decoration: line-through;
        }
        #hud {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(20, 20, 30, 0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            z-index: 10;
            min-width: 150px;
        }
        #hud div {
            margin-bottom: 5px;
        }
        #hud div:last-child {
            margin-bottom: 0;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            pointer-events: none;
            font-size: 14px;
            text-align: center;
        }
    </style>
    <!-- Import Three.js and OrbitControls -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <button id="btn-A">Toggle Cluster A</button>
        <button id="btn-B">Toggle Cluster B</button>
        <button id="btn-C">Toggle Cluster C</button>
    </div>
    <div id="hud">
        <div id="hud-nodes">Nodes: 0</div>
        <div id="hud-edges">Edges: 0</div>
        <div id="hud-selected">Selected: None</div>
    </div>
    <div id="instructions">
        Left Click: Rotate | Scroll: Zoom | Hover: Highlight | Click Node: Select | 'R': Reset
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            totalNodes: 0,
            totalEdges: 0,
            clusterAVisible: true,
            clusterBVisible: true,
            clusterCVisible: true,
            selectedNodeId: null,
            hoveredNodeId: null,
            visibleNodeCount: 0,
            cameraDistance: 50
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 0.8);
        pointLight.position.set(20, 20, 20);
        scene.add(pointLight);

        // --- Network Data Generation ---
        const clustersConfig = {
            A: { color: 0xff4444, count: 8, center: new THREE.Vector3(-12, 5, 0) },
            B: { color: 0x4488ff, count: 6, center: new THREE.Vector3(12, 5, 0) },
            C: { color: 0x44ff88, count: 7, center: new THREE.Vector3(0, -10, 0) }
        };

        const nodes = [];
        const edges = [];
        const nodeMeshes = []; // For raycasting
        let nodeIdCounter = 0;

        const nodeGeometry = new THREE.SphereGeometry(0.5, 16, 16);

        // Helper to get random point in sphere
        function getRandomPointInSphere(radius) {
            const u = Math.random();
            const v = Math.random();
            const theta = u * 2.0 * Math.PI;
            const phi = Math.acos(2.0 * v - 1.0);
            const r = Math.cbrt(Math.random()) * radius;
            const sinPhi = Math.sin(phi);
            return new THREE.Vector3(
                r * sinPhi * Math.cos(theta),
                r * sinPhi * Math.sin(theta),
                r * Math.cos(phi)
            );
        }

        // Create Nodes
        for (const [clusterId, config] of Object.entries(clustersConfig)) {
            for (let i = 0; i < config.count; i++) {
                const material = new THREE.MeshStandardMaterial({
                    color: config.color,
                    emissive: config.color,
                    emissiveIntensity: 0.3,
                    roughness: 0.4,
                    metalness: 0.1
                });

                const mesh = new THREE.Mesh(nodeGeometry, material);
                
                const offset = getRandomPointInSphere(6);
                mesh.position.copy(config.center).add(offset);

                const id = `node_${nodeIdCounter++}`;
                mesh.userData = {
                    id: id,
                    cluster: clusterId,
                    originalColor: config.color,
                    connectedNodes: []
                };

                scene.add(mesh);
                nodes.push(mesh);
                nodeMeshes.push(mesh);
            }
        }

        state.totalNodes = nodes.length;

        // Create Intra-cluster Edges
        for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
                const node1 = nodes[i];
                const node2 = nodes[j];

                if (node1.userData.cluster === node2.userData.cluster) {
                    if (node1.position.distanceTo(node2.position) < 8) {
                        createEdge(node1, node2, clustersConfig[node1.userData.cluster].color, 0.3);
                    }
                }
            }
        }

        // Create Inter-cluster Edges
        function getRandomNode(clusterId) {
            const clusterNodes = nodes.filter(n => n.userData.cluster === clusterId);
            return clusterNodes[Math.floor(Math.random() * clusterNodes.length)];
        }

        createEdge(getRandomNode('A'), getRandomNode('B'), 0xffffff, 0.15);
        createEdge(getRandomNode('B'), getRandomNode('C'), 0xffffff, 0.15);
        createEdge(getRandomNode('A'), getRandomNode('C'), 0xffffff, 0.15);

        function createEdge(node1, node2, color, opacity) {
            const material = new THREE.LineBasicMaterial({
                color: color,
                transparent: true,
                opacity: opacity
            });

            const geometry = new THREE.BufferGeometry().setFromPoints([node1.position, node2.position]);
            const line = new THREE.Line(geometry, material);

            line.userData = {
                sourceNode: node1,
                targetNode: node2,
                sourceCluster: node1.userData.cluster,
                targetCluster: node2.userData.cluster
            };

            // Update connectivity graph
            node1.userData.connectedNodes.push(node2.userData.id);
            node2.userData.connectedNodes.push(node1.userData.id);

            scene.add(line);
            edges.push(line);
            state.totalEdges++;
        }

        // --- Interactions ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredMesh = null;

        function updateNodeAppearance() {
            nodes.forEach(node => {
                const isSelected = state.selectedNodeId === node.userData.id;
                const isHovered = state.hoveredNodeId === node.userData.id;
                
                let isConnectedToSelected = false;
                if (state.selectedNodeId) {
                    const selectedNode = nodes.find(n => n.userData.id === state.selectedNodeId);
                    if (selectedNode && selectedNode.userData.connectedNodes.includes(node.userData.id)) {
                        isConnectedToSelected = true;
                    }
                }

                // Reset to base
                node.scale.set(1, 1, 1);
                node.material.color.setHex(node.userData.originalColor);
                node.material.emissiveIntensity = 0.3;

                // Apply states (priority: Hover > Selected > Connected)
                if (isConnectedToSelected) {
                    node.scale.set(1.3, 1.3, 1.3);
                }
                
                if (isSelected) {
                    node.material.color.setHex(0xffff00); // Yellow
                    node.material.emissiveIntensity = 0.6;
                }

                if (isHovered) {
                    node.scale.set(1.5, 1.5, 1.5);
                    node.material.emissiveIntensity = 0.8;
                }
            });
        }

        function updateVisibility() {
            let visibleCount = 0;
            
            nodes.forEach(node => {
                const cluster = node.userData.cluster;
                const isVisible = state[`cluster${cluster}Visible`];
                node.visible = isVisible;
                if (isVisible) visibleCount++;
            });

            edges.forEach(edge => {
                const sourceVisible = state[`cluster${edge.userData.sourceCluster}Visible`];
                const targetVisible = state[`cluster${edge.userData.targetCluster}Visible`];
                // Edge is visible only if BOTH connected nodes are visible
                edge.visible = sourceVisible && targetVisible;
            });

            state.visibleNodeCount = visibleCount;
        }

        // Mouse Move (Hover)
        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            
            // Only intersect visible nodes
            const visibleNodeMeshes = nodeMeshes.filter(m => m.visible);
            const intersects = raycaster.intersectObjects(visibleNodeMeshes);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                if (hoveredMesh !== object) {
                    hoveredMesh = object;
                    state.hoveredNodeId = object.userData.id;
                    document.body.style.cursor = 'pointer';
                    updateNodeAppearance();
                }
            } else {
                if (hoveredMesh !== null) {
                    hoveredMesh = null;
                    state.hoveredNodeId = null;
                    document.body.style.cursor = 'default';
                    updateNodeAppearance();
                }
            }
        });

        // Click (Select)
        window.addEventListener('click', () => {
            if (state.hoveredNodeId) {
                state.selectedNodeId = state.hoveredNodeId;
                updateNodeAppearance();
            } else {
                // Clicked on empty space, deselect
                state.selectedNodeId = null;
                updateNodeAppearance();
            }
        });

        // Keyboard (Reset)
        window.addEventListener('keydown', (event) => {
            if (event.key.toLowerCase() === 'r') {
                state.selectedNodeId = null;
                state.clusterAVisible = true;
                state.clusterBVisible = true;
                state.clusterCVisible = true;
                
                document.getElementById('btn-A').classList.remove('disabled');
                document.getElementById('btn-B').classList.remove('disabled');
                document.getElementById('btn-C').classList.remove('disabled');

                updateVisibility();
                updateNodeAppearance();
            }
        });

        // Buttons (Toggle Clusters)
        ['A', 'B', 'C'].forEach(cluster => {
            const btn = document.getElementById(`btn-${cluster}`);
            btn.addEventListener('click', () => {
                const prop = `cluster${cluster}Visible`;
                state[prop] = !state[prop];
                
                if (state[prop]) {
                    btn.classList.remove('disabled');
                } else {
                    btn.classList.add('disabled');
                    // If selected node is in hidden cluster, deselect it
                    if (state.selectedNodeId) {
                        const selectedNode = nodes.find(n => n.userData.id === state.selectedNodeId);
                        if (selectedNode && selectedNode.userData.cluster === cluster) {
                            state.selectedNodeId = null;
                            updateNodeAppearance();
                        }
                    }
                }
                updateVisibility();
            });
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initial setup
        updateVisibility();
        updateNodeAppearance();

        // --- Animation Loop & HUD Update ---
        const hudNodes = document.getElementById('hud-nodes');
        const hudEdges = document.getElementById('hud-edges');
        const hudSelected = document.getElementById('hud-selected');

        function animate() {
            requestAnimationFrame(animate);

            controls.update();

            // Update state
            state.cameraDistance = camera.position.distanceTo(controls.target);

            // Update HUD
            hudNodes.textContent = `Nodes: ${state.visibleNodeCount} / ${state.totalNodes}`;
            
            // Calculate visible edges
            let visibleEdgesCount = 0;
            for(let i=0; i<edges.length; i++) {
                if(edges[i].visible) visibleEdgesCount++;
            }
            hudEdges.textContent = `Edges: ${visibleEdgesCount} / ${state.totalEdges}`;
            
            hudSelected.textContent = `Selected: ${state.selectedNodeId || 'None'}`;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
