<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive 3D Periodic Table</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #title {
    position: absolute;
    top: 15px;
    left: 20px;
    color: #ffffff;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
    pointer-events: none;
  }

  #info-panel {
    position: absolute;
    top: 15px;
    right: 20px;
    background: rgba(0,0,0,0.75);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 15px 20px;
    color: #ffffff;
    min-width: 220px;
    backdrop-filter: blur(10px);
  }
  #info-panel h3 { margin-bottom: 8px; font-size: 16px; color: #4ecdc4; }
  #info-panel .detail { margin: 4px 0; font-size: 14px; }
  #info-panel .symbol-large { font-size: 48px; font-weight: bold; text-align: center; margin: 5px 0; }
  #info-panel .default-text { color: #aaa; font-style: italic; }

  #filter-buttons {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 90vw;
  }
  #filter-buttons button {
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(5px);
  }
  #filter-buttons button:hover {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.6);
  }
  #filter-buttons button.active {
    background: rgba(78,205,196,0.5);
    border-color: #4ecdc4;
  }

  #element-count {
    position: absolute;
    bottom: 60px;
    left: 20px;
    color: #aaa;
    font-size: 14px;
    background: rgba(0,0,0,0.5);
    padding: 5px 12px;
    border-radius: 15px;
  }

  #controls-hint {
    position: absolute;
    bottom: 60px;
    right: 20px;
    color: #666;
    font-size: 11px;
    text-align: right;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="title">Interactive 3D Periodic Table</div>

<div id="info-panel">
  <h3>Element Info</h3>
  <div id="info-content"><span class="default-text">Click an element</span></div>
</div>

<div id="filter-buttons"></div>

<div id="element-count">Visible: 36/36</div>

<div id="controls-hint">
  R - Reset View | F - Toggle Flamingo | A - Toggle Animation
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
  totalElements: 36,
  selectedElement: null,
  selectedAtomicNumber: null,
  activeFilter: 'all',
  visibleCount: 36,
  flamingoVisible: true,
  flamingoLoaded: false,
  animationMode: false,
  cameraDistance: 0,
  elementsInitialized: false
};

const state = window.__3D_STATE__;

// Element data for first 36 elements
const categories = {
  alkali: { name: 'Alkali Metals', color: 0xff6b6b, key: 'alkali' },
  alkaline_earth: { name: 'Alkaline Earth Metals', color: 0xffa500, key: 'alkaline_earth' },
  transition: { name: 'Transition Metals', color: 0x4ecdc4, key: 'transition' },
  post_transition: { name: 'Post-transition Metals', color: 0x45b7d1, key: 'post_transition' },
  metalloid: { name: 'Metalloids', color: 0x96ceb4, key: 'metalloid' },
  nonmetal: { name: 'Nonmetals', color: 0xffeaa7, key: 'nonmetal' },
  halogen: { name: 'Halogens', color: 0xdda0dd, key: 'halogen' },
  noble_gas: { name: 'Noble Gases', color: 0xc39bd3, key: 'noble_gas' }
};

const elements = [
  { z: 1, sym: 'H', name: 'Hydrogen', cat: 'nonmetal', row: 0, col: 0 },
  { z: 2, sym: 'He', name: 'Helium', cat: 'noble_gas', row: 0, col: 17 },
  { z: 3, sym: 'Li', name: 'Lithium', cat: 'alkali', row: 1, col: 0 },
  { z: 4, sym: 'Be', name: 'Beryllium', cat: 'alkaline_earth', row: 1, col: 1 },
  { z: 5, sym: 'B', name: 'Boron', cat: 'metalloid', row: 1, col: 12 },
  { z: 6, sym: 'C', name: 'Carbon', cat: 'nonmetal', row: 1, col: 13 },
  { z: 7, sym: 'N', name: 'Nitrogen', cat: 'nonmetal', row: 1, col: 14 },
  { z: 8, sym: 'O', name: 'Oxygen', cat: 'nonmetal', row: 1, col: 15 },
  { z: 9, sym: 'F', name: 'Fluorine', cat: 'halogen', row: 1, col: 16 },
  { z: 10, sym: 'Ne', name: 'Neon', cat: 'noble_gas', row: 1, col: 17 },
  { z: 11, sym: 'Na', name: 'Sodium', cat: 'alkali', row: 2, col: 0 },
  { z: 12, sym: 'Mg', name: 'Magnesium', cat: 'alkaline_earth', row: 2, col: 1 },
  { z: 13, sym: 'Al', name: 'Aluminium', cat: 'post_transition', row: 2, col: 12 },
  { z: 14, sym: 'Si', name: 'Silicon', cat: 'metalloid', row: 2, col: 13 },
  { z: 15, sym: 'P', name: 'Phosphorus', cat: 'nonmetal', row: 2, col: 14 },
  { z: 16, sym: 'S', name: 'Sulfur', cat: 'nonmetal', row: 2, col: 15 },
  { z: 17, sym: 'Cl', name: 'Chlorine', cat: 'halogen', row: 2, col: 16 },
  { z: 18, sym: 'Ar', name: 'Argon', cat: 'noble_gas', row: 2, col: 17 },
  { z: 19, sym: 'K', name: 'Potassium', cat: 'alkali', row: 3, col: 0 },
  { z: 20, sym: 'Ca', name: 'Calcium', cat: 'alkaline_earth', row: 3, col: 1 },
  { z: 21, sym: 'Sc', name: 'Scandium', cat: 'transition', row: 3, col: 2 },
  { z: 22, sym: 'Ti', name: 'Titanium', cat: 'transition', row: 3, col: 3 },
  { z: 23, sym: 'V', name: 'Vanadium', cat: 'transition', row: 3, col: 4 },
  { z: 24, sym: 'Cr', name: 'Chromium', cat: 'transition', row: 3, col: 5 },
  { z: 25, sym: 'Mn', name: 'Manganese', cat: 'transition', row: 3, col: 6 },
  { z: 26, sym: 'Fe', name: 'Iron', cat: 'transition', row: 3, col: 7 },
  { z: 27, sym: 'Co', name: 'Cobalt', cat: 'transition', row: 3, col: 8 },
  { z: 28, sym: 'Ni', name: 'Nickel', cat: 'transition', row: 3, col: 9 },
  { z: 29, sym: 'Cu', name: 'Copper', cat: 'transition', row: 3, col: 10 },
  { z: 30, sym: 'Zn', name: 'Zinc', cat: 'transition', row: 3, col: 11 },
  { z: 31, sym: 'Ga', name: 'Gallium', cat: 'post_transition', row: 3, col: 12 },
  { z: 32, sym: 'Ge', name: 'Germanium', cat: 'metalloid', row: 3, col: 13 },
  { z: 33, sym: 'As', name: 'Arsenic', cat: 'metalloid', row: 3, col: 14 },
  { z: 34, sym: 'Se', name: 'Selenium', cat: 'nonmetal', row: 3, col: 15 },
  { z: 35, sym: 'Br', name: 'Bromine', cat: 'halogen', row: 3, col: 16 },
  { z: 36, sym: 'Kr', name: 'Krypton', cat: 'noble_gas', row: 3, col: 17 },
];

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 30, 80);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(50, 50, 50);
scene.add(dirLight);

// Add subtle fog
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.003);

// Grid helper (subtle)
const gridHelper = new THREE.GridHelper(100, 50, 0x333355, 0x222244);
gridHelper.position.y = -5;
scene.add(gridHelper);

// Element meshes
const elementMeshes = [];
const elementGroup = new THREE.Group();
scene.add(elementGroup);

const boxWidth = 2.5;
const boxHeight = 2.5;
const boxDepth = 0.5;
const spacing = 3.0;

// Center offset
const offsetX = -(17 * spacing) / 2;
const offsetY = (3 * spacing) / 2;

function createTextTexture(symbol, atomicNumber, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext('2d');

  // Background
  const r = (color >> 16) & 255;
  const g = (color >> 8) & 255;
  const b = color & 255;
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(0, 0, 128, 128);

  // Darker border
  ctx.strokeStyle = `rgba(0,0,0,0.3)`;
  ctx.lineWidth = 4;
  ctx.strokeRect(2, 2, 124, 124);

  // Atomic number
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'left';
  ctx.fillText(atomicNumber.toString(), 8, 22);

  // Symbol
  ctx.fillStyle = '#000000';
  ctx.font = 'bold 48px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(symbol, 64, 68);

  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  return texture;
}

function createBackTexture(color) {
  const canvas = document.createElement('canvas');
  canvas.width = 64;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  const r = (color >> 16) & 255;
  const g = (color >> 8) & 255;
  const b = color & 255;
  ctx.fillStyle = `rgb(${Math.max(0,r-40)},${Math.max(0,g-40)},${Math.max(0,b-40)})`;
  ctx.fillRect(0, 0, 64, 64);
  const texture = new THREE.CanvasTexture(canvas);
  return texture;
}

elements.forEach((el) => {
  const catColor = categories[el.cat].color;
  const frontTexture = createTextTexture(el.sym, el.z, catColor);
  const backTexture = createBackTexture(catColor);

  const materialFront = new THREE.MeshStandardMaterial({
    map: frontTexture,
    transparent: true,
    opacity: 1.0,
    roughness: 0.4,
    metalness: 0.1
  });

  const materialSide = new THREE.MeshStandardMaterial({
    color: catColor,
    transparent: true,
    opacity: 1.0,
    roughness: 0.4,
    metalness: 0.1
  });

  const materialBack = new THREE.MeshStandardMaterial({
    map: backTexture,
    transparent: true,
    opacity: 1.0,
    roughness: 0.4,
    metalness: 0.1
  });

  // Box geometry: order of faces: +x, -x, +y, -y, +z (front), -z (back)
  const materialArray = [
    materialSide, materialSide,
    materialSide, materialSide,
    materialFront, materialBack
  ];

  const geometry = new THREE.BoxGeometry(boxWidth, boxHeight, boxDepth);
  const mesh = new THREE.Mesh(geometry, materialArray);

  const x = offsetX + el.col * spacing;
  const y = offsetY - el.row * spacing;
  const z = 0;

  mesh.position.set(x, y, z);
  mesh.userData = {
    element: el,
    baseY: y,
    targetScale: 1.0,
    currentScale: 1.0,
    targetOpacity: 1.0,
    currentOpacity: 1.0,
    isSelected: false
  };

  elementGroup.add(mesh);
  elementMeshes.push(mesh);
});

state.elementsInitialized = true;

// Flamingo
let flamingo = null;
let mixer = null;
const clock = new THREE.Clock();

const loader = new GLTFLoader();
loader.load(
  'https://threejs.org/examples/models/gltf/Flamingo.glb',
  (gltf) => {
    flamingo = gltf.scene;
    flamingo.scale.set(0.05, 0.05, 0.05);
    flamingo.position.set(30, 25, 0);
    scene.add(flamingo);
    state.flamingoLoaded = true;

    if (gltf.animations && gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(flamingo);
      const action = mixer.clipAction(gltf.animations[0]);
      action.play();
    }
  },
  undefined,
  (error) => {
    console.warn('Could not load flamingo model:', error);
  }
);

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onMouseClick(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(elementMeshes);

  if (intersects.length > 0) {
    const mesh = intersects[0].object;
    selectElement(mesh);
  }
}

function selectElement(mesh) {
  // Deselect previous
  elementMeshes.forEach(m => {
    m.userData.isSelected = false;
    m.userData.targetScale = 1.0;
    if (Array.isArray(m.material)) {
      m.material.forEach(mat => {
        if (mat.emissive) mat.emissive.setHex(0x000000);
      });
    }
  });

  // Select new
  mesh.userData.isSelected = true;
  mesh.userData.targetScale = 1.5;
  if (Array.isArray(mesh.material)) {
    mesh.material.forEach(mat => {
      if (mat.emissive) mat.emissive.setHex(0x333333);
    });
  }

  const el = mesh.userData.element;
  state.selectedElement = el.sym;
  state.selectedAtomicNumber = el.z;

  updateInfoPanel(el);
}

function updateInfoPanel(el) {
  const infoContent = document.getElementById('info-content');
  if (!el) {
    infoContent.innerHTML = '<span class="default-text">Click an element</span>';
    return;
  }
  const catInfo = categories[el.cat];
  const colorHex = '#' + catInfo.color.toString(16).padStart(6, '0');
  infoContent.innerHTML = `
    <div class="symbol-large" style="color:${colorHex}">${el.sym}</div>
    <div class="detail"><strong>Name:</strong> ${el.name}</div>
    <div class="detail"><strong>Atomic Number:</strong> ${el.z}</div>
    <div class="detail"><strong>Category:</strong> <span style="color:${colorHex}">${catInfo.name}</span></div>
  `;
}

window.addEventListener('click', onMouseClick);

// Filter buttons
const filterContainer = document.getElementById('filter-buttons');
const filterDefs = [
  { key: 'all', label: 'Show All' },
  { key: 'alkali', label: 'Alkali Metals' },
  { key: 'alkaline_earth', label: 'Alkaline Earth' },
  { key: 'transition', label: 'Transition Metals' },
  { key: 'post_transition', label: 'Post-transition' },
  { key: 'metalloid', label: 'Metalloids' },
  { key: 'nonmetal', label: 'Nonmetals' },
  { key: 'halogen', label: 'Halogens' },
  { key: 'noble_gas', label: 'Noble Gases' },
];

filterDefs.forEach(f => {
  const btn = document.createElement('button');
  btn.textContent = f.label;
  btn.dataset.filter = f.key;
  if (f.key === 'all') btn.classList.add('active');

  if (f.key !== 'all' && categories[f.key]) {
    const c = categories[f.key].color;
    const hex = '#' + c.toString(16).padStart(6, '0');
    btn.style.borderColor = hex;
  }

  btn.addEventListener('click', () => {
    applyFilter(f.key);
    document.querySelectorAll('#filter-buttons button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
  filterContainer.appendChild(btn);
});

function applyFilter(filterKey) {
  state.activeFilter = filterKey;
  let visCount = 0;

  elementMeshes.forEach(mesh => {
    const el = mesh.userData.element;
    if (filterKey === 'all' || el.cat === filterKey) {
      mesh.userData.targetOpacity = 1.0;
      visCount++;
    } else {
      mesh.userData.targetOpacity = 0.15;
    }
  });

  state.visibleCount = visCount;
  document.getElementById('element-count').textContent = `Visible: ${visCount}/36`;
}

// Keyboard
const initialCameraPos = new THREE.Vector3(0, 30, 80);

window.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();

  if (key === 'r') {
    // Reset
    state.selectedElement = null;
    state.selectedAtomicNumber = null;
    state.activeFilter = 'all';
    state.visibleCount = 36;
    state.animationMode = false;

    elementMeshes.forEach(m => {
      m.userData.isSelected = false;
      m.userData.targetScale = 1.0;
      m.userData.targetOpacity = 1.0;
      if (Array.isArray(m.material)) {
        m.material.forEach(mat => {
          if (mat.emissive) mat.emissive.setHex(0x000000);
        });
      }
    });

    camera.position.copy(initialCameraPos);
    controls.target.set(0, 0, 0);
    controls.update();

    updateInfoPanel(null);
    document.getElementById('element-count').textContent = 'Visible: 36/36';
    document.querySelectorAll('#filter-buttons button').forEach(b => {
      b.classList.remove('active');
      if (b.dataset.filter === 'all') b.classList.add('active');
    });
  }

  if (key === 'f') {
    state.flamingoVisible = !state.flamingoVisible;
    if (flamingo) flamingo.visible = state.flamingoVisible;
  }

  if (key === 'a') {
    state.animationMode = !state.animationMode;
  }
});

// Particles background
const particlesGeometry = new THREE.BufferGeometry();
const particleCount = 500;
const positions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount * 3; i++) {
  positions[i] = (Math.random() - 0.5) * 200;
}
particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particlesMaterial = new THREE.PointsMaterial({
  color: 0x4444aa,
  size: 0.3,
  transparent: true,
  opacity: 0.5
});
const particles = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particles);

// Animation loop
let time = 0;

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  time += delta;

  // Update mixer
  if (mixer) mixer.update(delta);

  // Update controls
  controls.update();

  // Camera distance
  state.cameraDistance = camera.position.length();

  // Animate element meshes
  elementMeshes.forEach(mesh => {
    const ud = mesh.userData;

    // Scale lerp
    ud.currentScale = THREE.MathUtils.lerp(ud.currentScale, ud.targetScale, 0.1);
    mesh.scale.setScalar(ud.currentScale);

    // Opacity lerp
    ud.currentOpacity = THREE.MathUtils.lerp(ud.currentOpacity, ud.targetOpacity, 0.1);
    if (Array.isArray(mesh.material)) {
      mesh.material.forEach(mat => {
        mat.opacity = ud.currentOpacity;
      });
    }

    // Bob animation
    if (state.animationMode) {
      const phase = ud.element.z * 0.5;
      mesh.position.y = ud.baseY + Math.sin(time * 2 + phase) * 1.0;
    } else {
      mesh.position.y = THREE.MathUtils.lerp(mesh.position.y, ud.baseY, 0.1);
    }
  });

  // Rotate particles slowly
  particles.rotation.y += delta * 0.02;

  // Flamingo gentle bob
  if (flamingo && flamingo.visible) {
    flamingo.position.y = 25 + Math.sin(time * 1.5) * 0.5;
    flamingo.rotation.y = Math.sin(time * 0.3) * 0.3;
  }

  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
