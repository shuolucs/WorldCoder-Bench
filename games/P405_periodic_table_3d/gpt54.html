<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive 3D Periodic Table</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: white;
    }

    #container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #title {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 20px;
      color: white;
      z-index: 10;
      pointer-events: none;
    }

    #info-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 240px;
      min-height: 90px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px;
      z-index: 10;
      line-height: 1.5;
      font-size: 14px;
      backdrop-filter: blur(4px);
    }

    #filter-buttons {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      width: min(95vw, 1100px);
      z-index: 10;
    }

    #filter-buttons button {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s ease;
    }

    #filter-buttons button:hover,
    #filter-buttons button.active {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.45);
    }

    #element-count {
      position: absolute;
      bottom: 20px;
      left: 16px;
      z-index: 10;
      font-size: 14px;
      background: rgba(0,0,0,0.35);
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    #instructions {
      position: absolute;
      top: 86px;
      left: 16px;
      z-index: 10;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.25);
      padding: 8px 10px;
      border-radius: 8px;
      line-height: 1.5;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="title">Interactive 3D Periodic Table</div>
    <div id="instructions">
      Click element boxes<br>
      R = Reset view<br>
      F = Toggle flamingo<br>
      A = Toggle animation mode
    </div>
    <div id="info-panel">Click an element</div>
    <div id="element-count">Visible: 36/36</div>
    <div id="filter-buttons"></div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const container = document.getElementById('container');
    const infoPanel = document.getElementById('info-panel');
    const elementCount = document.getElementById('element-count');
    const filterButtonsContainer = document.getElementById('filter-buttons');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    const initialCameraPosition = new THREE.Vector3(0, 30, 80);
    camera.position.copy(initialCameraPosition);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(50, 50, 50);
    scene.add(dirLight);

    window.__3D_STATE__ = {
      totalElements: 36,
      selectedElement: null,
      selectedAtomicNumber: null,
      activeFilter: 'all',
      visibleCount: 36,
      flamingoVisible: true,
      flamingoLoaded: false,
      animationMode: false,
      cameraDistance: camera.position.distanceTo(new THREE.Vector3(0, 0, 0)),
      elementsInitialized: false
    };

    const categoryColors = {
      alkali: 0xff6b6b,
      alkaline_earth: 0xffa500,
      transition: 0x4ecdc4,
      post_transition: 0x45b7d1,
      metalloid: 0x96ceb4,
      nonmetal: 0xffeaa7,
      halogen: 0xdda0dd,
      noble_gas: 0xc39bd3
    };

    const categoryLabels = {
      alkali: 'Alkali',
      alkaline_earth: 'Alkaline Earth',
      transition: 'Transition',
      post_transition: 'Post-transition',
      metalloid: 'Metalloid',
      nonmetal: 'Nonmetal',
      halogen: 'Halogen',
      noble_gas: 'Noble Gas',
      all: 'Show All'
    };

    const elementsData = [
      { atomicNumber: 1, symbol: 'H',  name: 'Hydrogen',   category: 'nonmetal',        period: 1, group: 1 },
      { atomicNumber: 2, symbol: 'He', name: 'Helium',     category: 'noble_gas',       period: 1, group: 18 },

      { atomicNumber: 3, symbol: 'Li', name: 'Lithium',    category: 'alkali',          period: 2, group: 1 },
      { atomicNumber: 4, symbol: 'Be', name: 'Beryllium',  category: 'alkaline_earth',  period: 2, group: 2 },
      { atomicNumber: 5, symbol: 'B',  name: 'Boron',      category: 'metalloid',       period: 2, group: 13 },
      { atomicNumber: 6, symbol: 'C',  name: 'Carbon',     category: 'nonmetal',        period: 2, group: 14 },
      { atomicNumber: 7, symbol: 'N',  name: 'Nitrogen',   category: 'nonmetal',        period: 2, group: 15 },
      { atomicNumber: 8, symbol: 'O',  name: 'Oxygen',     category: 'nonmetal',        period: 2, group: 16 },
      { atomicNumber: 9, symbol: 'F',  name: 'Fluorine',   category: 'halogen',         period: 2, group: 17 },
      { atomicNumber: 10,symbol: 'Ne', name: 'Neon',       category: 'noble_gas',       period: 2, group: 18 },

      { atomicNumber: 11,symbol: 'Na', name: 'Sodium',     category: 'alkali',          period: 3, group: 1 },
      { atomicNumber: 12,symbol: 'Mg', name: 'Magnesium',  category: 'alkaline_earth',  period: 3, group: 2 },
      { atomicNumber: 13,symbol: 'Al', name: 'Aluminum',   category: 'post_transition', period: 3, group: 13 },
      { atomicNumber: 14,symbol: 'Si', name: 'Silicon',    category: 'metalloid',       period: 3, group: 14 },
      { atomicNumber: 15,symbol: 'P',  name: 'Phosphorus', category: 'nonmetal',        period: 3, group: 15 },
      { atomicNumber: 16,symbol: 'S',  name: 'Sulfur',     category: 'nonmetal',        period: 3, group: 16 },
      { atomicNumber: 17,symbol: 'Cl', name: 'Chlorine',   category: 'halogen',         period: 3, group: 17 },
      { atomicNumber: 18,symbol: 'Ar', name: 'Argon',      category: 'noble_gas',       period: 3, group: 18 },

      { atomicNumber: 19,symbol: 'K',  name: 'Potassium',  category: 'alkali',          period: 4, group: 1 },
      { atomicNumber: 20,symbol: 'Ca', name: 'Calcium',    category: 'alkaline_earth',  period: 4, group: 2 },
      { atomicNumber: 21,symbol: 'Sc', name: 'Scandium',   category: 'transition',      period: 4, group: 3 },
      { atomicNumber: 22,symbol: 'Ti', name: 'Titanium',   category: 'transition',      period: 4, group: 4 },
      { atomicNumber: 23,symbol: 'V',  name: 'Vanadium',   category: 'transition',      period: 4, group: 5 },
      { atomicNumber: 24,symbol: 'Cr', name: 'Chromium',   category: 'transition',      period: 4, group: 6 },
      { atomicNumber: 25,symbol: 'Mn', name: 'Manganese',  category: 'transition',      period: 4, group: 7 },
      { atomicNumber: 26,symbol: 'Fe', name: 'Iron',       category: 'transition',      period: 4, group: 8 },
      { atomicNumber: 27,symbol: 'Co', name: 'Cobalt',     category: 'transition',      period: 4, group: 9 },
      { atomicNumber: 28,symbol: 'Ni', name: 'Nickel',     category: 'transition',      period: 4, group: 10 },
      { atomicNumber: 29,symbol: 'Cu', name: 'Copper',     category: 'transition',      period: 4, group: 11 },
      { atomicNumber: 30,symbol: 'Zn', name: 'Zinc',       category: 'transition',      period: 4, group: 12 },
      { atomicNumber: 31,symbol: 'Ga', name: 'Gallium',    category: 'post_transition', period: 4, group: 13 },
      { atomicNumber: 32,symbol: 'Ge', name: 'Germanium',  category: 'metalloid',       period: 4, group: 14 },
      { atomicNumber: 33,symbol: 'As', name: 'Arsenic',    category: 'metalloid',       period: 4, group: 15 },
      { atomicNumber: 34,symbol: 'Se', name: 'Selenium',   category: 'nonmetal',        period: 4, group: 16 },
      { atomicNumber: 35,symbol: 'Br', name: 'Bromine',    category: 'halogen',         period: 4, group: 17 },
      { atomicNumber: 36,symbol: 'Kr', name: 'Krypton',    category: 'noble_gas',       period: 4, group: 18 }
    ];

    const elementsGroup = new THREE.Group();
    scene.add(elementsGroup);

    const boxGeometry = new THREE.BoxGeometry(2.5, 2.5, 0.5);
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const elementMeshes = [];
    let selectedMesh = null;

    function createTextSprite(text) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(255,255,255,0.98)';
      ctx.font = 'bold 60px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;

      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthWrite: false
      });

      const sprite = new THREE.Sprite(material);
      sprite.scale.set(2.2, 1.1, 1);
      return sprite;
    }

    function periodicPosition(group, period) {
      const xSpacing = 3.2;
      const ySpacing = 3.4;
      const totalWidth = 17 * xSpacing;
      const x = (group - 1) * xSpacing - totalWidth / 2;
      const y = (4 - period) * ySpacing + 5;
      return new THREE.Vector3(x, y, 0);
    }

    elementsData.forEach((el) => {
      const material = new THREE.MeshStandardMaterial({
        color: categoryColors[el.category],
        emissive: 0x000000,
        transparent: true,
        opacity: 1.0,
        roughness: 0.5,
        metalness: 0.15
      });

      const mesh = new THREE.Mesh(boxGeometry, material);
      const pos = periodicPosition(el.group, el.period);
      mesh.position.copy(pos);
      mesh.userData = {
        ...el,
        basePosition: pos.clone(),
        targetScale: 1,
        selected: false
      };

      const label = createTextSprite(el.symbol);
      label.position.set(0, 0, 0.35);
      mesh.add(label);

      elementsGroup.add(mesh);
      elementMeshes.push(mesh);
    });

    window.__3D_STATE__.elementsInitialized = true;

    function updateInfoPanel(el = null) {
      if (!el) {
        infoPanel.innerHTML = 'Click an element';
        return;
      }

      infoPanel.innerHTML = `
        <strong>${el.symbol} - ${el.name}</strong><br>
        Atomic Number: ${el.atomicNumber}<br>
        Category: ${categoryLabels[el.category]}
      `;
    }

    function selectElement(mesh) {
      if (selectedMesh && selectedMesh !== mesh) {
        selectedMesh.userData.selected = false;
        selectedMesh.userData.targetScale = 1;
        selectedMesh.material.emissive.setHex(0x000000);
      }

      selectedMesh = mesh;
      mesh.userData.selected = true;
      mesh.userData.targetScale = 1.5;
      mesh.material.emissive.setHex(0x333333);

      window.__3D_STATE__.selectedElement = mesh.userData.symbol;
      window.__3D_STATE__.selectedAtomicNumber = mesh.userData.atomicNumber;

      updateInfoPanel(mesh.userData);
    }

    function deselectElement() {
      if (selectedMesh) {
        selectedMesh.userData.selected = false;
        selectedMesh.userData.targetScale = 1;
        selectedMesh.material.emissive.setHex(0x000000);
      }
      selectedMesh = null;
      window.__3D_STATE__.selectedElement = null;
      window.__3D_STATE__.selectedAtomicNumber = null;
      updateInfoPanel(null);
    }

    function applyFilter(filter) {
      window.__3D_STATE__.activeFilter = filter;
      let visible = 0;

      elementMeshes.forEach(mesh => {
        const match = filter === 'all' || mesh.userData.category === filter;
        mesh.material.opacity = match ? 1.0 : 0.15;
        visible += match ? 1 : 0;
      });

      window.__3D_STATE__.visibleCount = visible;
      elementCount.textContent = `Visible: ${visible}/36`;

      [...filterButtonsContainer.querySelectorAll('button')].forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
      });
    }

    const buttonDefs = [
      { label: 'Alkali', filter: 'alkali' },
      { label: 'Alkaline Earth', filter: 'alkaline_earth' },
      { label: 'Transition', filter: 'transition' },
      { label: 'Post-transition', filter: 'post_transition' },
      { label: 'Metalloid', filter: 'metalloid' },
      { label: 'Nonmetal', filter: 'nonmetal' },
      { label: 'Halogen', filter: 'halogen' },
      { label: 'Noble Gas', filter: 'noble_gas' },
      { label: 'Show All', filter: 'all' }
    ];

    buttonDefs.forEach(def => {
      const btn = document.createElement('button');
      btn.textContent = def.label;
      btn.dataset.filter = def.filter;
      if (def.filter === 'all') btn.classList.add('active');
      btn.addEventListener('click', () => applyFilter(def.filter));
      filterButtonsContainer.appendChild(btn);
    });

    renderer.domElement.addEventListener('click', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(elementMeshes, false);

      if (intersects.length > 0) {
        selectElement(intersects[0].object);
      }
    });

    let flamingo = null;
    let mixer = null;
    const clock = new THREE.Clock();

    const loader = new GLTFLoader();
    loader.load(
      'https://threejs.org/examples/models/gltf/Flamingo.glb',
      (gltf) => {
        flamingo = gltf.scene;
        flamingo.scale.setScalar(0.05);
        flamingo.position.set(30, 25, 0);
        scene.add(flamingo);

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(flamingo);
          const action = mixer.clipAction(gltf.animations[0]);
          action.play();
        }

        window.__3D_STATE__.flamingoLoaded = true;
        window.__3D_STATE__.flamingoVisible = true;
      },
      undefined,
      (err) => {
        console.error('Failed to load flamingo:', err);
      }
    );

    function resetView() {
      deselectElement();
      applyFilter('all');
      camera.position.copy(initialCameraPosition);
      controls.target.set(0, 0, 0);
      controls.update();
    }

    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();

      if (key === 'r') {
        resetView();
      } else if (key === 'f') {
        if (flamingo) {
          flamingo.visible = !flamingo.visible;
          window.__3D_STATE__.flamingoVisible = flamingo.visible;
        }
      } else if (key === 'a') {
        window.__3D_STATE__.animationMode = !window.__3D_STATE__.animationMode;
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      const elapsed = clock.elapsedTime;

      if (mixer) mixer.update(delta);

      elementMeshes.forEach(mesh => {
        const target = mesh.userData.targetScale || 1;
        const current = mesh.scale.x;
        const next = THREE.MathUtils.lerp(current, target, 0.12);
        mesh.scale.set(next, next, next);

        if (window.__3D_STATE__.animationMode) {
          mesh.position.y = mesh.userData.basePosition.y + Math.sin(elapsed * 1.5 + mesh.userData.atomicNumber * 0.35) * 1.0;
        } else {
          mesh.position.y = THREE.MathUtils.lerp(mesh.position.y, mesh.userData.basePosition.y, 0.1);
        }
      });

      controls.update();

      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));

      renderer.render(scene, camera);
    }

    applyFilter('all');
    updateInfoPanel(null);
    animate();
  </script>
</body>
</html>
