<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Periodic Table</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        h1 {
            margin: 0;
            font-size: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #info-panel {
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 8px;
            min-width: 200px;
            text-align: right;
            backdrop-filter: blur(4px);
            pointer-events: auto;
        }
        #info-panel h2 { margin: 0 0 5px 0; font-size: 24px; color: #fff; }
        #info-panel p { margin: 2px 0; font-size: 14px; color: #ccc; }
        
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        #element-count {
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
        }
        #filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-width: 70%;
            pointer-events: auto;
        }
        button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }
        button:hover { background: rgba(255,255,255,0.2); }
        button.active { background: rgba(255,255,255,0.4); border-color: white; font-weight: bold; }
        
        #controls-help {
            position: absolute;
            bottom: 70px;
            left: 20px;
            font-size: 12px;
            color: #aaa;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 4px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div class="header">
            <h1>Interactive 3D Periodic Table</h1>
            <div id="info-panel">
                <h2 id="info-sym">-</h2>
                <p id="info-name">Click an element</p>
                <p id="info-num"></p>
                <p id="info-cat"></p>
            </div>
        </div>
        <div id="controls-help">
            Keys: [R] Reset View | [F] Toggle Mascot | [A] Toggle Animation
        </div>
        <div class="footer">
            <div id="element-count">Visible: 36/36</div>
            <div id="filter-buttons">
                <button data-filter="all" class="active">Show All</button>
                <button data-filter="alkali" style="border-bottom: 3px solid #ff6b6b;">Alkali</button>
                <button data-filter="alkaline_earth" style="border-bottom: 3px solid #ffa500;">Alkaline Earth</button>
                <button data-filter="transition" style="border-bottom: 3px solid #4ecdc4;">Transition</button>
                <button data-filter="post_transition" style="border-bottom: 3px solid #45b7d1;">Post-transition</button>
                <button data-filter="metalloid" style="border-bottom: 3px solid #96ceb4;">Metalloid</button>
                <button data-filter="nonmetal" style="border-bottom: 3px solid #ffeaa7;">Nonmetal</button>
                <button data-filter="halogen" style="border-bottom: 3px solid #dda0dd;">Halogen</button>
                <button data-filter="noble_gas" style="border-bottom: 3px solid #c39bd3;">Noble Gas</button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            totalElements: 36,
            selectedElement: null,
            selectedAtomicNumber: null,
            activeFilter: 'all',
            visibleCount: 36,
            flamingoVisible: true,
            flamingoLoaded: false,
            animationMode: false,
            cameraDistance: 0,
            elementsInitialized: false
        };

        // Data
        const elementsData = [
            { num: 1, sym: 'H', name: 'Hydrogen', cat: 'nonmetal', col: 1, row: 1 },
            { num: 2, sym: 'He', name: 'Helium', cat: 'noble_gas', col: 18, row: 1 },
            { num: 3, sym: 'Li', name: 'Lithium', cat: 'alkali', col: 1, row: 2 },
            { num: 4, sym: 'Be', name: 'Beryllium', cat: 'alkaline_earth', col: 2, row: 2 },
            { num: 5, sym: 'B', name: 'Boron', cat: 'metalloid', col: 13, row: 2 },
            { num: 6, sym: 'C', name: 'Carbon', cat: 'nonmetal', col: 14, row: 2 },
            { num: 7, sym: 'N', name: 'Nitrogen', cat: 'nonmetal', col: 15, row: 2 },
            { num: 8, sym: 'O', name: 'Oxygen', cat: 'nonmetal', col: 16, row: 2 },
            { num: 9, sym: 'F', name: 'Fluorine', cat: 'halogen', col: 17, row: 2 },
            { num: 10, sym: 'Ne', name: 'Neon', cat: 'noble_gas', col: 18, row: 2 },
            { num: 11, sym: 'Na', name: 'Sodium', cat: 'alkali', col: 1, row: 3 },
            { num: 12, sym: 'Mg', name: 'Magnesium', cat: 'alkaline_earth', col: 2, row: 3 },
            { num: 13, sym: 'Al', name: 'Aluminum', cat: 'post_transition', col: 13, row: 3 },
            { num: 14, sym: 'Si', name: 'Silicon', cat: 'metalloid', col: 14, row: 3 },
            { num: 15, sym: 'P', name: 'Phosphorus', cat: 'nonmetal', col: 15, row: 3 },
            { num: 16, sym: 'S', name: 'Sulfur', cat: 'nonmetal', col: 16, row: 3 },
            { num: 17, sym: 'Cl', name: 'Chlorine', cat: 'halogen', col: 17, row: 3 },
            { num: 18, sym: 'Ar', name: 'Argon', cat: 'noble_gas', col: 18, row: 3 },
            { num: 19, sym: 'K', name: 'Potassium', cat: 'alkali', col: 1, row: 4 },
            { num: 20, sym: 'Ca', name: 'Calcium', cat: 'alkaline_earth', col: 2, row: 4 },
            { num: 21, sym: 'Sc', name: 'Scandium', cat: 'transition', col: 3, row: 4 },
            { num: 22, sym: 'Ti', name: 'Titanium', cat: 'transition', col: 4, row: 4 },
            { num: 23, sym: 'V', name: 'Vanadium', cat: 'transition', col: 5, row: 4 },
            { num: 24, sym: 'Cr', name: 'Chromium', cat: 'transition', col: 6, row: 4 },
            { num: 25, sym: 'Mn', name: 'Manganese', cat: 'transition', col: 7, row: 4 },
            { num: 26, sym: 'Fe', name: 'Iron', cat: 'transition', col: 8, row: 4 },
            { num: 27, sym: 'Co', name: 'Cobalt', cat: 'transition', col: 9, row: 4 },
            { num: 28, sym: 'Ni', name: 'Nickel', cat: 'transition', col: 10, row: 4 },
            { num: 29, sym: 'Cu', name: 'Copper', cat: 'transition', col: 11, row: 4 },
            { num: 30, sym: 'Zn', name: 'Zinc', cat: 'transition', col: 12, row: 4 },
            { num: 31, sym: 'Ga', name: 'Gallium', cat: 'post_transition', col: 13, row: 4 },
            { num: 32, sym: 'Ge', name: 'Germanium', cat: 'metalloid', col: 14, row: 4 },
            { num: 33, sym: 'As', name: 'Arsenic', cat: 'metalloid', col: 15, row: 4 },
            { num: 34, sym: 'Se', name: 'Selenium', cat: 'nonmetal', col: 16, row: 4 },
            { num: 35, sym: 'Br', name: 'Bromine', cat: 'halogen', col: 17, row: 4 },
            { num: 36, sym: 'Kr', name: 'Krypton', cat: 'noble_gas', col: 18, row: 4 }
        ];

        const categoryColors = {
            alkali: 0xff6b6b,
            alkaline_earth: 0xffa500,
            transition: 0x4ecdc4,
            post_transition: 0x45b7d1,
            metalloid: 0x96ceb4,
            nonmetal: 0xffeaa7,
            halogen: 0xdda0dd,
            noble_gas: 0xc39bd3
        };

        const categoryNames = {
            alkali: 'Alkali Metal',
            alkaline_earth: 'Alkaline Earth Metal',
            transition: 'Transition Metal',
            post_transition: 'Post-transition Metal',
            metalloid: 'Metalloid',
            nonmetal: 'Nonmetal',
            halogen: 'Halogen',
            noble_gas: 'Noble Gas'
        };

        // Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 80);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(50, 50, 50);
        scene.add(dirLight);

        // Flamingo Mascot
        let mixer;
        let flamingoModel;
        const gltfLoader = new GLTFLoader();
        gltfLoader.load('https://threejs.org/examples/models/gltf/Flamingo.glb', (gltf) => {
            flamingoModel = gltf.scene;
            flamingoModel.scale.set(0.05, 0.05, 0.05);
            flamingoModel.position.set(30, 25, 0);
            scene.add(flamingoModel);

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(flamingoModel);
                mixer.clipAction(gltf.animations[0]).play();
            }
            window.__3D_STATE__.flamingoLoaded = true;
        });

        // Periodic Table Generation
        const elementMeshes = [];
        const boxGeo = new THREE.BoxGeometry(2.5, 2.5, 0.5);
        
        function createTextTexture(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0)';
            ctx.fillRect(0, 0, 128, 128);
            ctx.fillStyle = 'black';
            ctx.font = 'bold 64px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 64, 64);
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        const cellSpacing = 3.0;
        const centerColOffset = 9.5;
        const centerRowOffset = 2.5;

        elementsData.forEach(data => {
            const mat = new THREE.MeshStandardMaterial({
                color: categoryColors[data.cat],
                transparent: true,
                opacity: 1.0,
                roughness: 0.4,
                metalness: 0.1
            });

            const mesh = new THREE.Mesh(boxGeo, mat);
            
            // Position
            const x = (data.col - centerColOffset) * cellSpacing;
            const y = -(data.row - centerRowOffset) * cellSpacing;
            mesh.position.set(x, y, 0);
            
            // Text Label
            const textTex = createTextTexture(data.sym);
            const textMat = new THREE.MeshBasicMaterial({ 
                map: textTex, 
                transparent: true, 
                depthWrite: false 
            });
            const textPlane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), textMat);
            textPlane.position.z = 0.26;
            mesh.add(textPlane);

            // User Data for interaction
            mesh.userData = {
                ...data,
                baseY: y,
                targetScale: 1.0,
                textMesh: textPlane
            };

            scene.add(mesh);
            elementMeshes.push(mesh);
        });
        window.__3D_STATE__.elementsInitialized = true;

        // Interaction Logic
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function updateInfoPanel(data) {
            const symEl = document.getElementById('info-sym');
            const nameEl = document.getElementById('info-name');
            const numEl = document.getElementById('info-num');
            const catEl = document.getElementById('info-cat');

            if (data) {
                symEl.textContent = data.sym;
                nameEl.textContent = data.name;
                numEl.textContent = `Atomic Number: ${data.num}`;
                catEl.textContent = `Category: ${categoryNames[data.cat]}`;
                symEl.style.color = '#' + categoryColors[data.cat].toString(16).padStart(6, '0');
            } else {
                symEl.textContent = '-';
                nameEl.textContent = 'Click an element';
                numEl.textContent = '';
                catEl.textContent = '';
                symEl.style.color = '#fff';
            }
        }

        function selectElement(mesh) {
            // Deselect previous
            elementMeshes.forEach(m => {
                m.userData.targetScale = 1.0;
                m.material.emissive.setHex(0x000000);
            });

            if (mesh) {
                mesh.userData.targetScale = 1.5;
                mesh.material.emissive.setHex(0x444444);
                window.__3D_STATE__.selectedElement = mesh.userData.sym;
                window.__3D_STATE__.selectedAtomicNumber = mesh.userData.num;
                updateInfoPanel(mesh.userData);
            } else {
                window.__3D_STATE__.selectedElement = null;
                window.__3D_STATE__.selectedAtomicNumber = null;
                updateInfoPanel(null);
            }
        }

        window.addEventListener('pointerdown', (event) => {
            // Ignore clicks on UI
            if(event.target.tagName === 'BUTTON' || event.target.closest('#info-panel')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(elementMeshes);

            if (intersects.length > 0) {
                selectElement(intersects[0].object);
            } else {
                selectElement(null);
            }
        });

        // Filters
        const filterButtons = document.querySelectorAll('#filter-buttons button');
        filterButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const filter = e.target.dataset.filter;
                
                filterButtons.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');

                window.__3D_STATE__.activeFilter = filter;
                let visibleCount = 0;

                elementMeshes.forEach(mesh => {
                    const isVisible = filter === 'all' || mesh.userData.cat === filter;
                    const targetOpacity = isVisible ? 1.0 : 0.15;
                    
                    mesh.material.opacity = targetOpacity;
                    mesh.userData.textMesh.material.opacity = targetOpacity;
                    
                    if (isVisible) visibleCount++;
                });

                window.__3D_STATE__.visibleCount = visibleCount;
                document.getElementById('element-count').textContent = `Visible: ${visibleCount}/36`;
            });
        });

        // Keyboard Controls
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            if (key === 'r') {
                // Reset
                selectElement(null);
                document.querySelector('[data-filter="all"]').click();
                camera.position.set(0, 30, 80);
                controls.target.set(0, 0, 0);
            } else if (key === 'f') {
                // Toggle Flamingo
                if (flamingoModel) {
                    flamingoModel.visible = !flamingoModel.visible;
                    window.__3D_STATE__.flamingoVisible = flamingoModel.visible;
                }
            } else if (key === 'a') {
                // Toggle Animation
                window.__3D_STATE__.animationMode = !window.__3D_STATE__.animationMode;
            }
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            controls.update();

            if (mixer) mixer.update(delta);

            // Update Elements
            elementMeshes.forEach(mesh => {
                // Scale Lerp
                const ts = mesh.userData.targetScale;
                mesh.scale.lerp(new THREE.Vector3(ts, ts, ts), 0.1);

                // Position Animation
                if (window.__3D_STATE__.animationMode) {
                    const offset = mesh.userData.num;
                    mesh.position.y = mesh.userData.baseY + Math.sin(time * 2 + offset) * 1.0;
                } else {
                    mesh.position.y = THREE.MathUtils.lerp(mesh.position.y, mesh.userData.baseY, 0.1);
                }
            });

            // Update State
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
