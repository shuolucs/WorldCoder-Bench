<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Watch Configurator</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #1a1a2e;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 270px;
      padding: 16px;
      background: rgba(10, 10, 20, 0.72);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      backdrop-filter: blur(8px);
      color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      z-index: 10;
    }

    #ui h1 {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .section {
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .button-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: white;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s ease;
      font-size: 13px;
    }

    button:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-1px);
    }

    button.active {
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.18);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08) inset;
    }

    .swatch-button {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .swatch {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.35);
      flex: 0 0 16px;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .row button {
      text-align: center;
    }

    #price_display {
      margin-top: 8px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      font-weight: 700;
      font-size: 15px;
      color: #f4f4ff;
    }

    .hint {
      margin-top: 8px;
      font-size: 11px;
      opacity: 0.7;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="ui">
    <h1>Watch Configurator</h1>

    <div class="section">
      <div class="section-title">Strap Material</div>
      <div class="button-list" id="strap_buttons"></div>
    </div>

    <div class="section">
      <div class="section-title">Face Color</div>
      <div class="button-list" id="face_buttons"></div>
    </div>

    <div class="section">
      <div class="row">
        <button id="btn_rotate">Rotate Watch</button>
        <button id="btn_reset">Reset</button>
      </div>
    </div>

    <div id="price_display">$299</div>
    <div class="hint">Drag to orbit. Scroll to zoom.</div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

    // -----------------------------
    // Config Data
    // -----------------------------
    const STRAP_OPTIONS = {
      leather_brown: { color: '#8B4513', roughness: 0.8, metalness: 0.1, label: 'leather_brown', price: 0 },
      leather_black: { color: '#1a1a1a', roughness: 0.7, metalness: 0.1, label: 'leather_black', price: 20 },
      silicone_blue: { color: '#2244aa', roughness: 0.5, metalness: 0.0, label: 'silicone_blue', price: 15 },
      silicone_red: { color: '#aa2222', roughness: 0.5, metalness: 0.0, label: 'silicone_red', price: 15 },
      metal_silver: { color: '#c0c0c0', roughness: 0.2, metalness: 0.9, label: 'metal_silver', price: 80 }
    };

    const FACE_OPTIONS = {
      dark:  { color: '#111122', label: 'dark', price: 0 },
      white: { color: '#f0f0f0', label: 'white', price: 10 },
      blue:  { color: '#1a3a6a', label: 'blue', price: 25 }
    };

    const BASE_PRICE = 299;

    // -----------------------------
    // Global state
    // -----------------------------
    window.__3D_STATE__ = {
      currentStrap: 'leather_brown',
      currentFace: 'dark',
      autoRotate: false,
      totalPrice: BASE_PRICE,
      duckLoaded: false,
      duckSpinning: false,
      watchRotationY: 0,
      minuteHandAngle: 0,
      hourHandAngle: 0,
      strapSwapCount: 0,
      faceSwapCount: 0,
      frameCount: 0
    };

    // -----------------------------
    // Scene setup
    // -----------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = false;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minPolarAngle = 0.3;
    controls.maxPolarAngle = 1.5;
    controls.enableZoom = true;
    controls.minDistance = 2;
    controls.maxDistance = 10;
    controls.target.set(0, 0, 0);

    // Lights
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 0.5, 20);
    pointLight.position.set(-3, 2, -3);
    scene.add(pointLight);

    // Platform
    const platform = new THREE.Mesh(
      new THREE.CylinderGeometry(2, 2, 0.1, 64),
      new THREE.MeshStandardMaterial({
        color: '#333344',
        metalness: 0.8,
        roughness: 0.35
      })
    );
    platform.position.y = -0.5;
    scene.add(platform);

    // -----------------------------
    // Watch model
    // -----------------------------
    const watchGroup = new THREE.Group();
    scene.add(watchGroup);

    const caseMaterial = new THREE.MeshStandardMaterial({
      color: '#c0c0c0',
      metalness: 0.9,
      roughness: 0.2
    });

    const faceMaterial = new THREE.MeshStandardMaterial({
      color: FACE_OPTIONS.dark.color,
      metalness: 0.15,
      roughness: 0.5
    });

    const handMaterial = new THREE.MeshStandardMaterial({
      color: '#ffffff',
      metalness: 0.2,
      roughness: 0.4
    });

    const crownMaterial = new THREE.MeshStandardMaterial({
      color: '#c0c0c0',
      metalness: 0.9,
      roughness: 0.25
    });

    const initialStrap = STRAP_OPTIONS.leather_brown;
    const strapMaterial = new THREE.MeshStandardMaterial({
      color: initialStrap.color,
      roughness: initialStrap.roughness,
      metalness: initialStrap.metalness
    });

    // Case
    const watchCase = new THREE.Mesh(
      new THREE.CylinderGeometry(0.8, 0.8, 0.2, 64),
      caseMaterial
    );
    watchCase.rotation.x = Math.PI / 2;
    watchGroup.add(watchCase);

    // Face
    const watchFace = new THREE.Mesh(
      new THREE.CircleGeometry(0.75, 64),
      faceMaterial
    );
    watchFace.position.z = 0.101;
    watchGroup.add(watchFace);

    // Center cap
    const centerCap = new THREE.Mesh(
      new THREE.CircleGeometry(0.05, 24),
      new THREE.MeshStandardMaterial({
        color: '#dddddd',
        metalness: 0.6,
        roughness: 0.3
      })
    );
    centerCap.position.z = 0.103;
    watchGroup.add(centerCap);

    // Hand pivot groups
    const minutePivot = new THREE.Group();
    minutePivot.position.set(0, 0, 0.105);
    watchGroup.add(minutePivot);

    const hourPivot = new THREE.Group();
    hourPivot.position.set(0, 0, 0.106);
    watchGroup.add(hourPivot);

    // Minute hand
    const minuteHand = new THREE.Mesh(
      new THREE.BoxGeometry(0.03, 0.45, 0.02),
      handMaterial
    );
    minuteHand.position.y = 0.225;
    minutePivot.add(minuteHand);

    // Hour hand
    const hourHand = new THREE.Mesh(
      new THREE.BoxGeometry(0.04, 0.3, 0.02),
      handMaterial
    );
    hourHand.position.y = 0.15;
    hourPivot.add(hourHand);

    // Crown
    const crown = new THREE.Mesh(
      new THREE.CylinderGeometry(0.08, 0.08, 0.15, 16),
      crownMaterial
    );
    crown.rotation.z = Math.PI / 2;
    crown.position.set(0.85, 0, 0);
    watchGroup.add(crown);

    // Straps
    const topStrap = new THREE.Mesh(
      new THREE.BoxGeometry(0.5, 1.2, 0.08),
      strapMaterial
    );
    topStrap.position.set(0, 1.0, 0);
    watchGroup.add(topStrap);

    const bottomStrap = new THREE.Mesh(
      new THREE.BoxGeometry(0.5, 1.2, 0.08),
      strapMaterial
    );
    bottomStrap.position.set(0, -1.0, 0);
    watchGroup.add(bottomStrap);

    // Small lugs
    const lugMaterial = caseMaterial;
    const lugGeo = new THREE.BoxGeometry(0.55, 0.1, 0.12);

    const lugTop = new THREE.Mesh(lugGeo, lugMaterial);
    lugTop.position.set(0, 0.62, 0);
    watchGroup.add(lugTop);

    const lugBottom = new THREE.Mesh(lugGeo, lugMaterial);
    lugBottom.position.set(0, -0.62, 0);
    watchGroup.add(lugBottom);

    // -----------------------------
    // Duck mascot
    // -----------------------------
    const duckGroup = new THREE.Group();
    scene.add(duckGroup);

    let duckModel = null;
    let duckBaseY = -0.4;
    let duckSpinStartTime = -Infinity;
    const duckLoader = new GLTFLoader();

    duckLoader.load(
      'Duck.glb',
      (gltf) => {
        duckModel = gltf.scene;
        duckModel.position.set(2.5, duckBaseY, 0);
        duckModel.scale.set(0.015, 0.015, 0.015);
        duckGroup.add(duckModel);
        window.__3D_STATE__.duckLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load Duck.glb:', err);
      }
    );

    function triggerDuckSpin(timeNow) {
      if (!duckModel) return;
      duckSpinStartTime = timeNow;
      window.__3D_STATE__.duckSpinning = true;
    }

    // -----------------------------
    // UI creation
    // -----------------------------
    const strapButtonsContainer = document.getElementById('strap_buttons');
    const faceButtonsContainer = document.getElementById('face_buttons');
    const rotateButton = document.getElementById('btn_rotate');
    const resetButton = document.getElementById('btn_reset');
    const priceDisplay = document.getElementById('price_display');

    function formatLabel(name) {
      return name.replaceAll('_', ' ');
    }

    for (const [name, config] of Object.entries(STRAP_OPTIONS)) {
      const btn = document.createElement('button');
      btn.id = `strap_${name}`;
      btn.className = 'swatch-button';
      btn.innerHTML = `
        <span class="swatch" style="background:${config.color}"></span>
        <span>${formatLabel(config.label)}</span>
      `;
      btn.addEventListener('click', () => setStrap(name));
      strapButtonsContainer.appendChild(btn);
    }

    for (const [name, config] of Object.entries(FACE_OPTIONS)) {
      const btn = document.createElement('button');
      btn.id = `face_${name}`;
      btn.className = 'swatch-button';
      btn.innerHTML = `
        <span class="swatch" style="background:${config.color}"></span>
        <span>${formatLabel(config.label)}</span>
      `;
      btn.addEventListener('click', () => setFace(name));
      faceButtonsContainer.appendChild(btn);
    }

    rotateButton.addEventListener('click', () => {
      window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
      updateUIState();
    });

    resetButton.addEventListener('click', () => {
      window.__3D_STATE__.autoRotate = false;
      setStrap('leather_brown', false);
      setFace('dark', false);
      watchGroup.rotation.y = 0;
      updatePrice();
      updateUIState();
    });

    function updateUIState() {
      for (const name of Object.keys(STRAP_OPTIONS)) {
        const btn = document.getElementById(`strap_${name}`);
        btn.classList.toggle('active', window.__3D_STATE__.currentStrap === name);
      }

      for (const name of Object.keys(FACE_OPTIONS)) {
        const btn = document.getElementById(`face_${name}`);
        btn.classList.toggle('active', window.__3D_STATE__.currentFace === name);
      }

      rotateButton.classList.toggle('active', window.__3D_STATE__.autoRotate);
      rotateButton.textContent = window.__3D_STATE__.autoRotate ? 'Rotate Watch: ON' : 'Rotate Watch';
    }

    function updatePrice() {
      const strapPrice = STRAP_OPTIONS[window.__3D_STATE__.currentStrap].price;
      const facePrice = FACE_OPTIONS[window.__3D_STATE__.currentFace].price;
      const total = BASE_PRICE + strapPrice + facePrice;
      window.__3D_STATE__.totalPrice = total;
      priceDisplay.textContent = `Price: $${total}`;
    }

    function setStrap(name, countSwap = true) {
      if (!STRAP_OPTIONS[name]) return;
      const prev = window.__3D_STATE__.currentStrap;
      const cfg = STRAP_OPTIONS[name];

      strapMaterial.color.set(cfg.color);
      strapMaterial.roughness = cfg.roughness;
      strapMaterial.metalness = cfg.metalness ?? 0.0;
      strapMaterial.needsUpdate = false;

      window.__3D_STATE__.currentStrap = name;

      if (countSwap && prev !== name) {
        window.__3D_STATE__.strapSwapCount++;
        triggerDuckSpin(performance.now() * 0.001);
      }

      updatePrice();
      updateUIState();
    }

    function setFace(name, countSwap = true) {
      if (!FACE_OPTIONS[name]) return;
      const prev = window.__3D_STATE__.currentFace;
      const cfg = FACE_OPTIONS[name];

      faceMaterial.color.set(cfg.color);
      faceMaterial.needsUpdate = false;

      window.__3D_STATE__.currentFace = name;

      if (countSwap && prev !== name) {
        window.__3D_STATE__.faceSwapCount++;
      }

      updatePrice();
      updateUIState();
    }

    updatePrice();
    updateUIState();

    // -----------------------------
    // Animation
    // -----------------------------
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();
      const delta = clock.getDelta();
      const now = performance.now() * 0.001;

      // Watch auto-rotation
      if (window.__3D_STATE__.autoRotate) {
        watchGroup.rotation.y += 0.5 * delta;
      }

      // Watch hands
      const minuteAngle = -((elapsed / 60) * Math.PI * 2);
      const hourAngle = -((elapsed / 720) * Math.PI * 2);

      minutePivot.rotation.z = minuteAngle;
      hourPivot.rotation.z = hourAngle;

      // Duck bobbing and spin
      if (duckModel) {
        duckModel.position.y = duckBaseY + Math.sin(elapsed * Math.PI) * 0.1;

        const spinElapsed = now - duckSpinStartTime;
        if (spinElapsed >= 0 && spinElapsed <= 0.5) {
          const t = spinElapsed / 0.5;
          const eased = 1 - Math.pow(1 - t, 3);
          duckModel.rotation.y = eased * Math.PI * 2;
          window.__3D_STATE__.duckSpinning = true;
        } else {
          if (window.__3D_STATE__.duckSpinning) {
            duckModel.rotation.y = 0;
          }
          window.__3D_STATE__.duckSpinning = false;
        }
      }

      controls.update();

      // Update exposed state every frame
      window.__3D_STATE__.watchRotationY = watchGroup.rotation.y;
      window.__3D_STATE__.minuteHandAngle = minutePivot.rotation.z;
      window.__3D_STATE__.hourHandAngle = hourPivot.rotation.z;
      window.__3D_STATE__.frameCount += 1;

      renderer.render(scene, camera);
    }

    animate();

    // -----------------------------
    // Resize
    // -----------------------------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
