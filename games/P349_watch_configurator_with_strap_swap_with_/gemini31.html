<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Watch Configurator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(26, 26, 46, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 260px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
        }
        h1 {
            font-size: 18px;
            margin: 0 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            letter-spacing: 1px;
        }
        .section {
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 12px;
            color: #8888aa;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-option {
            display: flex;
            align-items: center;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ddd;
            padding: 8px 12px;
            margin-bottom: 6px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        .btn-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .btn-option.active {
            background: rgba(100, 150, 255, 0.2);
            border-color: #6496ff;
            color: #fff;
        }
        .swatch {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        #price_display {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            color: #4ade80;
            margin: 15px 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .controls-row {
            display: flex;
            gap: 10px;
        }
        .btn-action {
            flex: 1;
            background: #2a2a4a;
            border: 1px solid #444466;
            color: white;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-action:hover {
            background: #3a3a5a;
        }
        .btn-action.active {
            background: #6496ff;
            border-color: #88b0ff;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h1>Watch Configurator</h1>
        
        <div class="section">
            <div class="section-title">Strap Material</div>
            <button class="btn-option active" id="strap_leather_brown">
                <div class="swatch" style="background: #8B4513;"></div> Leather Brown
            </button>
            <button class="btn-option" id="strap_leather_black">
                <div class="swatch" style="background: #1a1a1a;"></div> Leather Black
            </button>
            <button class="btn-option" id="strap_silicone_blue">
                <div class="swatch" style="background: #2244aa;"></div> Silicone Blue
            </button>
            <button class="btn-option" id="strap_silicone_red">
                <div class="swatch" style="background: #aa2222;"></div> Silicone Red
            </button>
            <button class="btn-option" id="strap_metal_silver">
                <div class="swatch" style="background: #c0c0c0;"></div> Metal Silver
            </button>
        </div>

        <div class="section">
            <div class="section-title">Face Color</div>
            <button class="btn-option active" id="face_dark">
                <div class="swatch" style="background: #111122;"></div> Dark
            </button>
            <button class="btn-option" id="face_white">
                <div class="swatch" style="background: #f0f0f0;"></div> White
            </button>
            <button class="btn-option" id="face_blue">
                <div class="swatch" style="background: #1a3a6a;"></div> Blue
            </button>
        </div>

        <div id="price_display">$299</div>

        <div class="controls-row">
            <button class="btn-action" id="btn_rotate">Auto Rotate</button>
            <button class="btn-action" id="btn_reset">Reset</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.158.0/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'https://unpkg.com/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            currentStrap: 'leather_brown',
            currentFace: 'dark',
            autoRotate: false,
            totalPrice: 299,
            duckLoaded: false,
            duckSpinning: false,
            watchRotationY: 0,
            minuteHandAngle: 0,
            hourHandAngle: 0,
            strapSwapCount: 0,
            faceSwapCount: 0,
            frameCount: 0
        };

        const prices = {
            base: 299,
            strap: { leather_brown: 0, leather_black: 20, silicone_blue: 15, silicone_red: 15, metal_silver: 80 },
            face: { dark: 0, white: 10, blue: 25 }
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minPolarAngle = 0.3;
        controls.maxPolarAngle = 1.5;
        controls.minDistance = 2;
        controls.maxDistance = 10;

        // --- Lights ---
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 0.5);
        pointLight.position.set(-3, 2, -3);
        scene.add(pointLight);

        // --- Platform ---
        const platformGeo = new THREE.CylinderGeometry(2, 2, 0.1, 64);
        const platformMat = new THREE.MeshStandardMaterial({ 
            color: 0x333344, 
            metalness: 0.5, 
            roughness: 0.5 
        });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = -0.5;
        platform.receiveShadow = true;
        scene.add(platform);

        // --- Materials ---
        const strapMaterials = {
            leather_brown: new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8 }),
            leather_black: new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.7 }),
            silicone_blue: new THREE.MeshStandardMaterial({ color: 0x2244aa, roughness: 0.5 }),
            silicone_red: new THREE.MeshStandardMaterial({ color: 0xaa2222, roughness: 0.5 }),
            metal_silver: new THREE.MeshStandardMaterial({ color: 0xc0c0c0, roughness: 0.2, metalness: 0.9 })
        };

        const faceColors = {
            dark: 0x111122,
            white: 0xf0f0f0,
            blue: 0x1a3a6a
        };

        // --- Watch Construction ---
        const watchGroup = new THREE.Group();

        // Case
        const caseGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.2, 64);
        const caseMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, roughness: 0.2, metalness: 0.8 });
        const watchCase = new THREE.Mesh(caseGeo, caseMat);
        watchCase.rotation.x = Math.PI / 2;
        watchCase.castShadow = true;
        watchGroup.add(watchCase);

        // Face
        const faceGeo = new THREE.CircleGeometry(0.75, 64);
        const faceMat = new THREE.MeshStandardMaterial({ color: faceColors.dark, roughness: 0.6 });
        const watchFace = new THREE.Mesh(faceGeo, faceMat);
        watchFace.position.z = 0.101;
        watchGroup.add(watchFace);

        // Hands
        const handMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        
        const hourGeo = new THREE.BoxGeometry(0.04, 0.3, 0.02);
        hourGeo.translate(0, 0.15, 0);
        const hourHand = new THREE.Mesh(hourGeo, handMat);
        hourHand.position.z = 0.12;
        watchGroup.add(hourHand);

        const minuteGeo = new THREE.BoxGeometry(0.03, 0.45, 0.02);
        minuteGeo.translate(0, 0.225, 0);
        const minuteHand = new THREE.Mesh(minuteGeo, handMat);
        minuteHand.position.z = 0.14;
        watchGroup.add(minuteHand);

        // Crown
        const crownGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.15, 16);
        const crown = new THREE.Mesh(crownGeo, caseMat);
        crown.rotation.z = Math.PI / 2;
        crown.position.set(0.85, 0, 0);
        crown.castShadow = true;
        watchGroup.add(crown);

        // Straps
        const strapGeo = new THREE.BoxGeometry(0.5, 1.2, 0.08);
        
        const topStrap = new THREE.Mesh(strapGeo, strapMaterials.leather_brown);
        topStrap.position.set(0, 0.7, 0);
        topStrap.castShadow = true;
        watchGroup.add(topStrap);

        const bottomStrap = new THREE.Mesh(strapGeo, strapMaterials.leather_brown);
        bottomStrap.position.set(0, -0.7, 0);
        bottomStrap.castShadow = true;
        watchGroup.add(bottomStrap);

        scene.add(watchGroup);

        // --- Duck Mascot ---
        let duckModel = null;
        let duckSpinStartTime = 0;
        const loader = new GLTFLoader();
        
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb',
            (gltf) => {
                duckModel = gltf.scene;
                duckModel.position.set(2.5, -0.4, 0);
                duckModel.scale.set(0.015, 0.015, 0.015);
                
                duckModel.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                scene.add(duckModel);
                window.__3D_STATE__.duckLoaded = true;
            }
        );

        // --- UI Interactions ---
        function updatePrice() {
            const state = window.__3D_STATE__;
            const price = prices.base + prices.strap[state.currentStrap] + prices.face[state.currentFace];
            state.totalPrice = price;
            document.getElementById('price_display').innerText = `$${price}`;
        }

        function updateActiveButtons(prefix, current) {
            document.querySelectorAll(`[id^="${prefix}"]`).forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`${prefix}${current}`).classList.add('active');
        }

        // Strap Buttons
        Object.keys(strapMaterials).forEach(strapName => {
            document.getElementById(`strap_${strapName}`).addEventListener('click', () => {
                const state = window.__3D_STATE__;
                if (state.currentStrap === strapName) return;

                state.currentStrap = strapName;
                topStrap.material = strapMaterials[strapName];
                bottomStrap.material = strapMaterials[strapName];
                
                state.strapSwapCount++;
                updateActiveButtons('strap_', strapName);
                updatePrice();

                // Trigger Duck Spin
                if (state.duckLoaded) {
                    state.duckSpinning = true;
                    duckSpinStartTime = clock.getElapsedTime();
                }
            });
        });

        // Face Buttons
        Object.keys(faceColors).forEach(faceName => {
            document.getElementById(`face_${faceName}`).addEventListener('click', () => {
                const state = window.__3D_STATE__;
                if (state.currentFace === faceName) return;

                state.currentFace = faceName;
                watchFace.material.color.setHex(faceColors[faceName]);
                
                state.faceSwapCount++;
                updateActiveButtons('face_', faceName);
                updatePrice();
            });
        });

        // Rotate Toggle
        const btnRotate = document.getElementById('btn_rotate');
        btnRotate.addEventListener('click', () => {
            window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
            btnRotate.classList.toggle('active', window.__3D_STATE__.autoRotate);
        });

        // Reset Button
        document.getElementById('btn_reset').addEventListener('click', () => {
            const state = window.__3D_STATE__;
            
            state.currentStrap = 'leather_brown';
            topStrap.material = strapMaterials.leather_brown;
            bottomStrap.material = strapMaterials.leather_brown;
            updateActiveButtons('strap_', 'leather_brown');

            state.currentFace = 'dark';
            watchFace.material.color.setHex(faceColors.dark);
            updateActiveButtons('face_', 'dark');

            state.autoRotate = false;
            btnRotate.classList.remove('active');
            watchGroup.rotation.y = 0;

            updatePrice();
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            const state = window.__3D_STATE__;
            
            state.frameCount++;

            // Watch Hands Animation
            const minAngle = -(time % 60) / 60 * Math.PI * 2;
            const hourAngle = -(time % 720) / 720 * Math.PI * 2;
            
            minuteHand.rotation.z = minAngle;
            hourHand.rotation.z = hourAngle;
            
            state.minuteHandAngle = minAngle;
            state.hourHandAngle = hourAngle;

            // Auto Rotate
            if (state.autoRotate) {
                watchGroup.rotation.y += 0.5 * delta;
            }
            state.watchRotationY = watchGroup.rotation.y;

            // Duck Animation
            if (state.duckLoaded && duckModel) {
                // Bobbing
                duckModel.position.y = -0.4 + Math.sin(time * Math.PI) * 0.1;

                // Spinning
                if (state.duckSpinning) {
                    const elapsed = time - duckSpinStartTime;
                    if (elapsed < 0.5) {
                        duckModel.rotation.y = (elapsed / 0.5) * Math.PI * 2;
                    } else {
                        duckModel.rotation.y = 0;
                        state.duckSpinning = false;
                    }
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        updatePrice();
        animate();
    </script>
</body>
</html>
