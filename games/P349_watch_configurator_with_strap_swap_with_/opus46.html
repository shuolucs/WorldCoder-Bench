<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Watch Configurator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
canvas { display: block; }

#ui-panel {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(20, 20, 40, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 20px;
    width: 220px;
    backdrop-filter: blur(10px);
    z-index: 10;
}

#ui-panel h2 {
    color: #ffffff;
    font-size: 18px;
    margin-bottom: 16px;
    text-align: center;
    letter-spacing: 1px;
}

.section-title {
    color: #aaaacc;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 14px;
    margin-bottom: 8px;
}

.strap-btn, .face-btn, .action-btn {
    display: flex;
    align-items: center;
    width: 100%;
    padding: 8px 12px;
    margin-bottom: 5px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.05);
    color: #ddd;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.strap-btn:hover, .face-btn:hover, .action-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    border-color: rgba(255, 255, 255, 0.3);
}

.strap-btn.active, .face-btn.active {
    background: rgba(100, 100, 255, 0.2);
    border-color: rgba(100, 100, 255, 0.5);
}

.color-swatch {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    margin-right: 10px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    flex-shrink: 0;
}

.action-btn {
    justify-content: center;
    margin-top: 4px;
}

.action-btn.active-toggle {
    background: rgba(50, 200, 100, 0.3);
    border-color: rgba(50, 200, 100, 0.6);
}

#price_display {
    margin-top: 16px;
    padding: 12px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 8px;
    text-align: center;
}

#price_display .price-label {
    color: #888;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#price_display .price-value {
    color: #ffffff;
    font-size: 28px;
    font-weight: bold;
    margin-top: 4px;
}
</style>
</head>
<body>

<div id="ui-panel">
    <h2>Watch Configurator</h2>

    <div class="section-title">Strap Material</div>
    <button class="strap-btn active" id="strap_leather_brown" data-strap="leather_brown">
        <div class="color-swatch" style="background:#8B4513;"></div>Leather Brown
    </button>
    <button class="strap-btn" id="strap_leather_black" data-strap="leather_black">
        <div class="color-swatch" style="background:#1a1a1a;"></div>Leather Black
    </button>
    <button class="strap-btn" id="strap_silicone_blue" data-strap="silicone_blue">
        <div class="color-swatch" style="background:#2244aa;"></div>Silicone Blue
    </button>
    <button class="strap-btn" id="strap_silicone_red" data-strap="silicone_red">
        <div class="color-swatch" style="background:#aa2222;"></div>Silicone Red
    </button>
    <button class="strap-btn" id="strap_metal_silver" data-strap="metal_silver">
        <div class="color-swatch" style="background:#c0c0c0;"></div>Metal Silver
    </button>

    <div class="section-title">Face Color</div>
    <button class="face-btn active" id="face_dark" data-face="dark">
        <div class="color-swatch" style="background:#111122;"></div>Dark
    </button>
    <button class="face-btn" id="face_white" data-face="white">
        <div class="color-swatch" style="background:#f0f0f0;"></div>White
    </button>
    <button class="face-btn" id="face_blue" data-face="blue">
        <div class="color-swatch" style="background:#1a3a6a;"></div>Blue
    </button>

    <div class="section-title">Controls</div>
    <button class="action-btn" id="btn_rotate">🔄 Rotate Watch</button>
    <button class="action-btn" id="btn_reset">↩️ Reset</button>

    <div id="price_display">
        <div class="price-label">Total Price</div>
        <div class="price-value">$299</div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    currentStrap: 'leather_brown',
    currentFace: 'dark',
    autoRotate: false,
    totalPrice: 299,
    duckLoaded: false,
    duckSpinning: false,
    watchRotationY: 0,
    minuteHandAngle: 0,
    hourHandAngle: 0,
    strapSwapCount: 0,
    faceSwapCount: 0,
    frameCount: 0
};

// Strap definitions
const strapDefs = {
    leather_brown: { color: 0x8B4513, roughness: 0.8, metalness: 0.0, price: 0 },
    leather_black: { color: 0x1a1a1a, roughness: 0.7, metalness: 0.0, price: 20 },
    silicone_blue: { color: 0x2244aa, roughness: 0.5, metalness: 0.0, price: 15 },
    silicone_red: { color: 0xaa2222, roughness: 0.5, metalness: 0.0, price: 15 },
    metal_silver: { color: 0xc0c0c0, roughness: 0.2, metalness: 0.9, price: 80 }
};

const faceDefs = {
    dark: { color: 0x111122, price: 0 },
    white: { color: 0xf0f0f0, price: 10 },
    blue: { color: 0x1a3a6a, price: 25 }
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 10, 7);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambLight);

const pointLight = new THREE.PointLight(0xffffff, 0.5);
pointLight.position.set(-3, 2, -3);
scene.add(pointLight);

// Platform
const platformGeo = new THREE.CylinderGeometry(2, 2, 0.1, 64);
const platformMat = new THREE.MeshStandardMaterial({ color: 0x333344, metalness: 0.5, roughness: 0.4 });
const platform = new THREE.Mesh(platformGeo, platformMat);
platform.position.y = -0.5;
platform.receiveShadow = true;
scene.add(platform);

// Watch Group
const watchGroup = new THREE.Group();
scene.add(watchGroup);

// Watch case
const caseMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, roughness: 0.2, metalness: 0.8 });
const caseGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.2, 64);
const caseMesh = new THREE.Mesh(caseGeo, caseMat);
caseMesh.castShadow = true;
watchGroup.add(caseMesh);

// Bezel ring
const bezelGeo = new THREE.TorusGeometry(0.8, 0.03, 16, 64);
const bezelMat = new THREE.MeshStandardMaterial({ color: 0xd0d0d0, roughness: 0.15, metalness: 0.9 });
const bezelTop = new THREE.Mesh(bezelGeo, bezelMat);
bezelTop.position.y = 0.1;
bezelTop.rotation.x = Math.PI / 2;
watchGroup.add(bezelTop);

// Watch face
const faceMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.6, metalness: 0.1 });
const faceGeo = new THREE.CircleGeometry(0.75, 64);
const faceMesh = new THREE.Mesh(faceGeo, faceMat);
faceMesh.position.y = 0.101;
faceMesh.rotation.x = -Math.PI / 2;
watchGroup.add(faceMesh);

// Hour markers
for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    const markerGeo = new THREE.BoxGeometry(0.03, 0.001, 0.08);
    const markerMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.2 });
    const marker = new THREE.Mesh(markerGeo, markerMat);
    const radius = 0.65;
    marker.position.set(Math.sin(angle) * radius, 0.102, -Math.cos(angle) * radius);
    marker.rotation.y = angle;
    watchGroup.add(marker);
}

// Center dot
const centerDotGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.01, 16);
const centerDotMat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.5, roughness: 0.3 });
const centerDot = new THREE.Mesh(centerDotGeo, centerDotMat);
centerDot.position.y = 0.105;
watchGroup.add(centerDot);

// Hour hand pivot
const hourPivot = new THREE.Group();
hourPivot.position.y = 0.103;
watchGroup.add(hourPivot);

const hourHandGeo = new THREE.BoxGeometry(0.04, 0.02, 0.3);
const hourHandMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3, metalness: 0.5 });
const hourHand = new THREE.Mesh(hourHandGeo, hourHandMat);
hourHand.position.z = -0.15;
hourPivot.add(hourHand);

// Minute hand pivot
const minutePivot = new THREE.Group();
minutePivot.position.y = 0.106;
watchGroup.add(minutePivot);

const minuteHandGeo = new THREE.BoxGeometry(0.03, 0.02, 0.45);
const minuteHandMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3, metalness: 0.5 });
const minuteHand = new THREE.Mesh(minuteHandGeo, minuteHandMat);
minuteHand.position.z = -0.225;
minutePivot.add(minuteHand);

// Second hand
const secondPivot = new THREE.Group();
secondPivot.position.y = 0.109;
watchGroup.add(secondPivot);

const secondHandGeo = new THREE.BoxGeometry(0.015, 0.01, 0.5);
const secondHandMat = new THREE.MeshStandardMaterial({ color: 0xff3333, roughness: 0.3, metalness: 0.3 });
const secondHand = new THREE.Mesh(secondHandGeo, secondHandMat);
secondHand.position.z = -0.2;
secondPivot.add(secondHand);

// Watch crown
const crownGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.15, 16);
const crownMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, roughness: 0.2, metalness: 0.8 });
const crown = new THREE.Mesh(crownGeo, crownMat);
crown.position.set(0.85, 0, 0);
crown.rotation.z = Math.PI / 2;
crown.castShadow = true;
watchGroup.add(crown);

// Straps
const strapTopGeo = new THREE.BoxGeometry(0.5, 1.2, 0.08);
const strapMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8, metalness: 0.0 });
const strapTop = new THREE.Mesh(strapTopGeo, strapMat.clone());
strapTop.position.y = 0.7;
strapTop.castShadow = true;
watchGroup.add(strapTop);

const strapBottomGeo = new THREE.BoxGeometry(0.5, 1.2, 0.08);
const strapBottom = new THREE.Mesh(strapBottomGeo, strapMat.clone());
strapBottom.position.y = -0.7;
strapBottom.castShadow = true;
watchGroup.add(strapBottom);

// Strap end details (rounded ends)
const strapEndGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.08, 16, 1, false, 0, Math.PI);
const strapEndTop = new THREE.Mesh(strapEndGeo, strapTop.material);
strapEndTop.rotation.x = Math.PI / 2;
strapEndTop.rotation.z = Math.PI;
strapEndTop.position.set(0, 1.3, 0);
watchGroup.add(strapEndTop);

const strapEndBottom = new THREE.Mesh(strapEndGeo, strapBottom.material);
strapEndBottom.rotation.x = Math.PI / 2;
strapEndBottom.position.set(0, -1.3, 0);
watchGroup.add(strapEndBottom);

// Lug connectors
for (let side of [-1, 1]) {
    for (let lr of [-1, 1]) {
        const lugGeo = new THREE.BoxGeometry(0.06, 0.15, 0.1);
        const lug = new THREE.Mesh(lugGeo, caseMat);
        lug.position.set(lr * 0.22, side * 0.15, 0);
        watchGroup.add(lug);
    }
}

// Tilt watch slightly for better view
watchGroup.rotation.x = -0.3;

// Duck
let duckModel = null;
let duckSpinStart = -1;
let duckBaseY = -0.4;

const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Duck/glTF-Binary/Duck.glb',
    (gltf) => {
        duckModel = gltf.scene;
        duckModel.scale.set(0.015, 0.015, 0.015);
        duckModel.position.set(2.5, duckBaseY, 0);
        duckModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
            }
        });
        scene.add(duckModel);
        window.__3D_STATE__.duckLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('Duck.glb failed to load:', error);
        // Create a simple duck substitute
        const duckGroup = new THREE.Group();
        
        // Body
        const bodyGeo = new THREE.SphereGeometry(0.3, 16, 16);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xf5d442, roughness: 0.6 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        duckGroup.add(body);
        
        // Head
        const headGeo = new THREE.SphereGeometry(0.2, 16, 16);
        const head = new THREE.Mesh(headGeo, bodyMat);
        head.position.set(0.25, 0.25, 0);
        duckGroup.add(head);
        
        // Beak
        const beakGeo = new THREE.ConeGeometry(0.08, 0.15, 8);
        const beakMat = new THREE.MeshStandardMaterial({ color: 0xff8800, roughness: 0.5 });
        const beak = new THREE.Mesh(beakGeo, beakMat);
        beak.rotation.z = -Math.PI / 2;
        beak.position.set(0.42, 0.25, 0);
        duckGroup.add(beak);
        
        // Eyes
        const eyeGeo = new THREE.SphereGeometry(0.04, 8, 8);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
        eyeL.position.set(0.35, 0.35, 0.12);
        duckGroup.add(eyeL);
        const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
        eyeR.position.set(0.35, 0.35, -0.12);
        duckGroup.add(eyeR);
        
        duckGroup.position.set(2.5, duckBaseY, 0);
        scene.add(duckGroup);
        duckModel = duckGroup;
        window.__3D_STATE__.duckLoaded = true;
    }
);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minPolarAngle = 0.3;
controls.maxPolarAngle = 1.5;
controls.minDistance = 2;
controls.maxDistance = 10;
controls.target.set(0, 0, 0);

// Functions
function updateStrap(strapName) {
    if (strapName === window.__3D_STATE__.currentStrap) return;
    
    const def = strapDefs[strapName];
    const mat = new THREE.MeshStandardMaterial({
        color: def.color,
        roughness: def.roughness,
        metalness: def.metalness || 0
    });
    
    strapTop.material.dispose();
    strapTop.material = mat;
    strapBottom.material.dispose();
    strapBottom.material = mat.clone();
    strapEndTop.material = strapTop.material;
    strapEndBottom.material = strapBottom.material;
    
    window.__3D_STATE__.currentStrap = strapName;
    window.__3D_STATE__.strapSwapCount++;
    
    // Update button states
    document.querySelectorAll('.strap-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('strap_' + strapName).classList.add('active');
    
    // Duck spin
    triggerDuckSpin();
    
    updatePrice();
}

function updateFace(faceName) {
    if (faceName === window.__3D_STATE__.currentFace) return;
    
    const def = faceDefs[faceName];
    faceMesh.material.color.setHex(def.color);
    
    // Adjust hand colors based on face
    const handColor = faceName === 'white' ? 0x111111 : 0xffffff;
    hourHandMat.color.setHex(handColor);
    minuteHandMat.color.setHex(handColor);
    
    window.__3D_STATE__.currentFace = faceName;
    window.__3D_STATE__.faceSwapCount++;
    
    document.querySelectorAll('.face-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('face_' + faceName).classList.add('active');
    
    triggerDuckSpin();
    updatePrice();
}

function triggerDuckSpin() {
    if (duckModel) {
        duckSpinStart = performance.now();
        window.__3D_STATE__.duckSpinning = true;
    }
}

function updatePrice() {
    const strapPrice = strapDefs[window.__3D_STATE__.currentStrap].price;
    const facePrice = faceDefs[window.__3D_STATE__.currentFace].price;
    const total = 299 + strapPrice + facePrice;
    window.__3D_STATE__.totalPrice = total;
    document.querySelector('#price_display .price-value').textContent = '$' + total;
}

function resetAll() {
    updateStrap('leather_brown');
    // Force update even if same
    window.__3D_STATE__.currentStrap = '';
    updateStrap('leather_brown');
    
    window.__3D_STATE__.currentFace = '';
    updateFace('dark');
    
    window.__3D_STATE__.autoRotate = false;
    document.getElementById('btn_rotate').classList.remove('active-toggle');
    document.getElementById('btn_rotate').textContent = '🔄 Rotate Watch';
}

// Event listeners
document.querySelectorAll('.strap-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        updateStrap(btn.dataset.strap);
    });
});

document.querySelectorAll('.face-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        updateFace(btn.dataset.face);
    });
});

document.getElementById('btn_rotate').addEventListener('click', () => {
    window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
    const btn = document.getElementById('btn_rotate');
    btn.classList.toggle('active-toggle');
    btn.textContent = window.__3D_STATE__.autoRotate ? '⏸️ Stop Rotation' : '🔄 Rotate Watch';
});

document.getElementById('btn_reset').addEventListener('click', resetAll);

// Animation
const clock = new THREE.Clock();
let duckInitialRotY = 0;

function animate() {
    requestAnimationFrame(animate);
    
    const elapsed = clock.getElapsedTime();
    const delta = clock.getDelta();
    
    window.__3D_STATE__.frameCount++;
    
    // Watch hands - use real time for continuous rotation
    const now = Date.now();
    // Minute hand: 1 full rotation per 60 seconds
    const minuteAngle = -((now / 60000) % 1) * Math.PI * 2;
    minutePivot.rotation.y = minuteAngle;
    window.__3D_STATE__.minuteHandAngle = minuteAngle;
    
    // Hour hand: 1 full rotation per 720 seconds (12 minutes)
    const hourAngle = -((now / 720000) % 1) * Math.PI * 2;
    hourPivot.rotation.y = hourAngle;
    window.__3D_STATE__.hourHandAngle = hourAngle;
    
    // Second hand
    const secondAngle = -((now / 1000) % 1) * Math.PI * 2;
    secondPivot.rotation.y = secondAngle;
    
    // Auto rotate
    if (window.__3D_STATE__.autoRotate) {
        watchGroup.rotation.y += 0.5 * (1/60);
    }
    window.__3D_STATE__.watchRotationY = watchGroup.rotation.y;
    
    // Duck bob
    if (duckModel) {
        const bobY = duckBaseY + Math.sin(elapsed * Math.PI) * 0.1;
        duckModel.position.y = bobY;
        
        // Duck spin
        if (duckSpinStart > 0) {
            const spinElapsed = (performance.now() - duckSpinStart) / 1000;
            if (spinElapsed < 0.5) {
                const spinProgress = spinElapsed / 0.5;
                // Ease in-out
                const eased = spinProgress < 0.5 
                    ? 2 * spinProgress * spinProgress 
                    : 1 - Math.pow(-2 * spinProgress + 2, 2) / 2;
                duckModel.rotation.y = duckInitialRotY + eased * Math.PI * 2;
            } else {
                duckModel.rotation.y = duckInitialRotY + Math.PI * 2;
                duckInitialRotY = duckModel.rotation.y;
                duckSpinStart = -1;
                window.__3D_STATE__.duckSpinning = false;
            }
        }
    }
    
    controls.update();
    renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
