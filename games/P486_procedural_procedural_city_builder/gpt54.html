<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procedural City Builder</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #0a0a2e;
      color: white;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: 420px;
    }

    button {
      padding: 10px 14px;
      border: 2px solid #666;
      background: rgba(20, 20, 35, 0.9);
      color: white;
      cursor: pointer;
      border-radius: 8px;
      font-size: 14px;
    }

    button:hover {
      background: rgba(40, 40, 65, 0.95);
    }

    button.active {
      border: 3px solid #ffcc00;
    }

    #demolishBtn.active {
      background: #cc3333;
      border-color: #ffaaaa;
    }

    #hud {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 180px;
      text-align: right;
    }

    .panel {
      background: rgba(10, 10, 30, 0.75);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 15px;
      backdrop-filter: blur(4px);
    }

    #info {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(10, 10, 30, 0.75);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      color: #ddd;
    }
  </style>
</head>
<body>
  <div id="ui">
    <button id="residentialBtn" class="active">Residential</button>
    <button id="commercialBtn">Commercial</button>
    <button id="parkBtn">Park</button>
    <button id="monumentBtn">Monument</button>
    <button id="demolishBtn">Demolish</button>
    <button id="dayNightBtn">Day/Night</button>
    <button id="resetBtn">Reset</button>
  </div>

  <div id="hud">
    <div id="budgetDisplay" class="panel">Budget: $500</div>
    <div id="statsPanel" class="panel">R:0 C:0 P:0 M:0</div>
    <div id="populationDisplay" class="panel">Pop: 0 | Workers: 0</div>
  </div>

  <div id="info">
    Click ground to build. Demolish removes buildings with half refund.<br/>
    Keys: 1-4 select type, R toggles camera auto-rotate.
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/loaders/GLTFLoader.js';

    let scene, camera, renderer, controls;
    let ambientLight, dirLight;
    let ground;
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const CELL_SIZE = 4;
    const GRID_MIN = -40;
    const GRID_MAX = 40;

    const budgetDisplay = document.getElementById('budgetDisplay');
    const statsPanel = document.getElementById('statsPanel');
    const populationDisplay = document.getElementById('populationDisplay');

    const buttons = {
      residential: document.getElementById('residentialBtn'),
      commercial: document.getElementById('commercialBtn'),
      park: document.getElementById('parkBtn'),
      monument: document.getElementById('monumentBtn'),
      demolish: document.getElementById('demolishBtn'),
      dayNight: document.getElementById('dayNightBtn'),
      reset: document.getElementById('resetBtn')
    };

    const buildingDefs = {
      residential: { cost: 10 },
      commercial: { cost: 25 },
      park: { cost: 5 },
      monument: { cost: 50 }
    };

    let selectedType = 'residential';
    let isDemolishMode = false;
    let isNightMode = true;
    let monumentModel = null;
    let monumentExists = false;
    let monumentCellKey = null;
    let lastPlacedType = null;
    let lastAction = 'none';

    let budget = 500;
    let buildingCount = {
      residential: 0,
      commercial: 0,
      park: 0,
      monument: 0
    };
    let population = 0;
    let workers = 0;

    const gridData = new Map();
    const cityGroup = new THREE.Group();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a2e);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
      camera.position.set(40, 35, 40);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 0, 0);
      controls.enableDamping = true;
      controls.autoRotate = false;
      controls.autoRotateSpeed = 2.0;

      ambientLight = new THREE.AmbientLight(0x404060, 0.4);
      scene.add(ambientLight);

      dirLight = new THREE.DirectionalLight(0xffeedd, 1.0);
      dirLight.position.set(50, 80, 30);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.set(2048, 2048);
      dirLight.shadow.camera.left = -100;
      dirLight.shadow.camera.right = 100;
      dirLight.shadow.camera.top = 100;
      dirLight.shadow.camera.bottom = -100;
      dirLight.shadow.camera.near = 1;
      dirLight.shadow.camera.far = 250;
      scene.add(dirLight);

      const groundGeo = new THREE.PlaneGeometry(200, 200);
      const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a4a2a });
      ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      ground.name = 'ground';
      scene.add(ground);

      createGridOverlay();
      scene.add(cityGroup);

      loadMonumentModel();
      setupUI();
      updateHUD();
      updateState();

      window.addEventListener('resize', onWindowResize);
      renderer.domElement.addEventListener('pointerdown', onPointerDown);
      window.addEventListener('keydown', onKeyDown);

      animate();
    }

    function createGridOverlay() {
      const points = [];
      const y = 0.02;
      for (let i = GRID_MIN; i <= GRID_MAX; i += CELL_SIZE) {
        points.push(new THREE.Vector3(i, y, GRID_MIN), new THREE.Vector3(i, y, GRID_MAX));
        points.push(new THREE.Vector3(GRID_MIN, y, i), new THREE.Vector3(GRID_MAX, y, i));
      }
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({
        color: 0x557755,
        transparent: true,
        opacity: 0.45
      });
      const gridLines = new THREE.LineSegments(geometry, material);
      scene.add(gridLines);
    }

    function loadMonumentModel() {
      const loader = new GLTFLoader();
      loader.load(
        'AntiqueCamera.glb',
        (gltf) => {
          monumentModel = gltf.scene;
          monumentModel.traverse((obj) => {
            if (obj.isMesh) {
              obj.castShadow = true;
              obj.receiveShadow = true;
            }
          });
        },
        undefined,
        (err) => {
          console.warn('Could not load AntiqueCamera.glb, monument placement will use fallback.', err);
        }
      );
    }

    function setupUI() {
      buttons.residential.addEventListener('click', () => selectType('residential'));
      buttons.commercial.addEventListener('click', () => selectType('commercial'));
      buttons.park.addEventListener('click', () => selectType('park'));
      buttons.monument.addEventListener('click', () => selectType('monument'));

      buttons.demolish.addEventListener('click', () => {
        isDemolishMode = !isDemolishMode;
        buttons.demolish.classList.toggle('active', isDemolishMode);
        updateState();
      });

      buttons.dayNight.addEventListener('click', toggleDayNight);
      buttons.reset.addEventListener('click', resetCity);
    }

    function selectType(type) {
      selectedType = type;
      Object.entries(buttons).forEach(([key, btn]) => {
        if (['residential','commercial','park','monument'].includes(key)) {
          btn.classList.toggle('active', key === type);
        }
      });
      updateState();
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function onKeyDown(e) {
      if (e.key === '1') selectType('residential');
      if (e.key === '2') selectType('commercial');
      if (e.key === '3') selectType('park');
      if (e.key === '4') selectType('monument');

      if (e.key.toLowerCase() === 'r') {
        controls.autoRotate = !controls.autoRotate;
        updateState();
      }
    }

    function onPointerDown(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const hits = raycaster.intersectObject(ground);
      if (!hits.length) return;

      const point = hits[0].point;
      const snapped = snapToGrid(point.x, point.z);
      if (!isInsideGrid(snapped.x, snapped.z)) return;

      const key = cellKey(snapped.x, snapped.z);

      if (isDemolishMode) {
        demolishAt(key);
      } else {
        placeBuilding(selectedType, snapped.x, snapped.z, key);
      }
    }

    function snapToGrid(x, z) {
      return {
        x: Math.round(x / CELL_SIZE) * CELL_SIZE,
        z: Math.round(z / CELL_SIZE) * CELL_SIZE
      };
    }

    function isInsideGrid(x, z) {
      return x >= GRID_MIN && x <= GRID_MAX && z >= GRID_MIN && z <= GRID_MAX;
    }

    function cellKey(x, z) {
      return `${x},${z}`;
    }

    function placeBuilding(type, x, z, key) {
      if (gridData.has(key)) return;

      const cost = buildingDefs[type].cost;
      if (budget < cost) return;

      if (type === 'monument' && monumentExists && monumentCellKey) {
        demolishAt(monumentCellKey, true);
      }

      let objectInfo = null;

      if (type === 'residential') objectInfo = createResidential(x, z);
      if (type === 'commercial') objectInfo = createCommercial(x, z);
      if (type === 'park') objectInfo = createPark(x, z);
      if (type === 'monument') objectInfo = createMonument(x, z);

      if (!objectInfo) return;

      cityGroup.add(objectInfo.group);
      gridData.set(key, {
        type,
        cost,
        group: objectInfo.group,
        population: objectInfo.population || 0,
        workers: objectInfo.workers || 0
      });

      budget -= cost;
      buildingCount[type] += 1;
      population += objectInfo.population || 0;
      workers += objectInfo.workers || 0;

      if (type === 'monument') {
        monumentExists = true;
        monumentCellKey = key;
      }

      lastPlacedType = type;
      lastAction = 'place';
      updateHUD();
      updateState();
    }

    function demolishAt(key, silentForMonumentReplace = false) {
      const entry = gridData.get(key);
      if (!entry) return;

      cityGroup.remove(entry.group);
      disposeGroup(entry.group);

      gridData.delete(key);

      const refund = Math.floor(entry.cost / 2);
      if (!silentForMonumentReplace) {
        budget += refund;
      }

      buildingCount[entry.type] = Math.max(0, buildingCount[entry.type] - 1);
      population -= entry.population || 0;
      workers -= entry.workers || 0;

      if (entry.type === 'monument') {
        monumentExists = false;
        monumentCellKey = null;
      }

      lastAction = silentForMonumentReplace ? 'place' : 'demolish';
      updateHUD();
      updateState();
    }

    function createResidential(x, z) {
      const h = THREE.MathUtils.randFloat(4, 12);
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(3, h, 3),
        new THREE.MeshStandardMaterial({ color: 0x8899aa })
      );
      body.position.set(x, h / 2, z);
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);

      return { group, population: 10, workers: 0 };
    }

    function createCommercial(x, z) {
      const h = THREE.MathUtils.randFloat(8, 20);
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(3.5, h, 3.5),
        new THREE.MeshStandardMaterial({
          color: 0xddaa44,
          emissive: 0x332200,
          emissiveIntensity: isNightMode ? 0.3 : 0.08
        })
      );
      body.position.set(x, h / 2, z);
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);

      const windowBox = new THREE.Mesh(
        new THREE.BoxGeometry(3.1, h - 0.4, 3.1),
        new THREE.MeshStandardMaterial({
          color: 0xffdd88,
          emissive: 0xffcc66,
          emissiveIntensity: isNightMode ? 0.45 : 0.12,
          transparent: true,
          opacity: 0.22
        })
      );
      windowBox.position.set(x, h / 2, z);
      windowBox.castShadow = false;
      windowBox.receiveShadow = true;
      group.add(windowBox);

      return { group, population: 0, workers: 5 };
    }

    function createPark(x, z) {
      const group = new THREE.Group();

      const base = new THREE.Mesh(
        new THREE.BoxGeometry(3.4, 0.3, 3.4),
        new THREE.MeshStandardMaterial({ color: 0x44aa44 })
      );
      base.position.set(x, 0.15, z);
      base.castShadow = true;
      base.receiveShadow = true;
      group.add(base);

      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.22, 0.28, 1.6, 8),
        new THREE.MeshStandardMaterial({ color: 0x6b4423 })
      );
      trunk.position.set(x, 1.1, z);
      trunk.castShadow = true;
      trunk.receiveShadow = true;
      group.add(trunk);

      const tree = new THREE.Mesh(
        new THREE.SphereGeometry(1.5, 18, 18),
        new THREE.MeshStandardMaterial({ color: 0x228822 })
      );
      tree.position.set(x, 2.5, z);
      tree.castShadow = true;
      tree.receiveShadow = true;
      group.add(tree);

      return { group, population: 0, workers: 0 };
    }

    function createMonument(x, z) {
      const group = new THREE.Group();

      const plinth = new THREE.Mesh(
        new THREE.CylinderGeometry(1.6, 1.8, 0.5, 24),
        new THREE.MeshStandardMaterial({ color: 0x999999, metalness: 0.2, roughness: 0.8 })
      );
      plinth.position.set(x, 0.25, z);
      plinth.castShadow = true;
      plinth.receiveShadow = true;
      group.add(plinth);

      if (monumentModel) {
        const clone = monumentModel.clone(true);
        clone.position.set(x, 0.5, z);
        clone.scale.setScalar(2.0);
        clone.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        group.add(clone);
      } else {
        const fallback = new THREE.Mesh(
          new THREE.TorusKnotGeometry(0.8, 0.25, 100, 16),
          new THREE.MeshStandardMaterial({
            color: 0xaabbee,
            metalness: 0.5,
            roughness: 0.35,
            emissive: 0x111122
          })
        );
        fallback.position.set(x, 2.0, z);
        fallback.castShadow = true;
        fallback.receiveShadow = true;
        group.add(fallback);
      }

      return { group, population: 0, workers: 0 };
    }

    function disposeGroup(group) {
      group.traverse((obj) => {
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
          if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
          else obj.material.dispose();
        }
      });
    }

    function toggleDayNight() {
      isNightMode = !isNightMode;

      if (isNightMode) {
        ambientLight.color.setHex(0x101030);
        ambientLight.intensity = 0.2;
        dirLight.intensity = 0.3;
        scene.background = new THREE.Color(0x0a0a2e);
      } else {
        ambientLight.color.setHex(0x404060);
        ambientLight.intensity = 0.4;
        dirLight.intensity = 1.0;
        scene.background = new THREE.Color(0x87CEEB);
      }

      cityGroup.traverse((obj) => {
        if (obj.isMesh && obj.material) {
          const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
          mats.forEach((mat) => {
            if ('emissiveIntensity' in mat) {
              if (mat.color && mat.color.getHex() === 0xddaa44) {
                mat.emissiveIntensity = isNightMode ? 0.3 : 0.08;
              } else if (mat.emissive && mat.emissive.getHex() === 0xffcc66) {
                mat.emissiveIntensity = isNightMode ? 0.45 : 0.12;
              }
            }
          });
        }
      });

      updateState();
    }

    function resetCity() {
      const toRemove = [];
      cityGroup.children.forEach(child => toRemove.push(child));
      toRemove.forEach(child => {
        cityGroup.remove(child);
        disposeGroup(child);
      });

      gridData.clear();
      budget = 500;
      buildingCount = { residential: 0, commercial: 0, park: 0, monument: 0 };
      population = 0;
      workers = 0;
      monumentExists = false;
      monumentCellKey = null;
      lastPlacedType = null;
      lastAction = 'reset';
      updateHUD();
      updateState();
    }

    function updateHUD() {
      budgetDisplay.textContent = `Budget: $${budget}`;
      statsPanel.textContent = `R:${buildingCount.residential} C:${buildingCount.commercial} P:${buildingCount.park} M:${buildingCount.monument}`;
      populationDisplay.textContent = `Pop: ${population} | Workers: ${workers}`;
    }

    function updateState() {
      window.__3D_STATE__ = {
        budget,
        buildingCount: { ...buildingCount },
        totalBuildings: buildingCount.residential + buildingCount.commercial + buildingCount.park + buildingCount.monument,
        selectedType,
        isDemolishMode,
        isNightMode,
        population,
        workers,
        autoRotate: controls ? controls.autoRotate : false,
        gridOccupied: gridData.size,
        monumentExists,
        lastPlacedType,
        lastAction
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    init();
  </script>
</body>
</html>
