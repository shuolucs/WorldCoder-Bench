<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procedural Farm</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
  canvas { display: block; }
  #ui {
    position: absolute; top: 10px; left: 10px; z-index: 10;
    background: rgba(0,0,0,0.6); color: #fff; padding: 12px 16px;
    border-radius: 8px; min-width: 200px;
  }
  #animalInfo { margin-bottom: 8px; font-size: 14px; min-height: 40px; }
  #feedBtn {
    padding: 8px 20px; font-size: 14px; cursor: pointer;
    background: #4CAF50; color: #fff; border: none; border-radius: 4px;
  }
  #feedBtn:hover { background: #45a049; }
  #feedBtn:disabled { background: #666; cursor: not-allowed; }
  #timeInfo {
    position: absolute; top: 10px; right: 10px; z-index: 10;
    background: rgba(0,0,0,0.6); color: #fff; padding: 8px 14px;
    border-radius: 8px; font-size: 13px;
  }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="ui">
  <div id="animalInfo">Click an animal to select it.</div>
  <button id="feedBtn" disabled>Feed Selected</button>
</div>
<div id="timeInfo">Time: Day</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Scene Setup ───
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(18, 14, 18);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.enableDamping = true;
controls.maxPolarAngle = Math.PI / 2.1;

// ─── Lights ───
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -20;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x556B2F, 0.3);
scene.add(hemiLight);

// ─── Ground ───
const groundGeo = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x4a7c2e });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ─── Fence ───
const FIELD_SIZE = 15;
const HALF = FIELD_SIZE / 2;
const PADDING = 1.0;

function createFence() {
  const fenceGroup = new THREE.Group();
  const postMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
  const railMat = new THREE.MeshLambertMaterial({ color: 0xA0522D });

  const sides = [
    { start: [-HALF, 0, -HALF], end: [HALF, 0, -HALF], dir: 'x' },
    { start: [HALF, 0, -HALF], end: [HALF, 0, HALF], dir: 'z' },
    { start: [HALF, 0, HALF], end: [-HALF, 0, HALF], dir: 'x' },
    { start: [-HALF, 0, HALF], end: [-HALF, 0, -HALF], dir: 'z' },
  ];

  sides.forEach(side => {
    const sx = side.start[0], sz = side.start[2];
    const ex = side.end[0], ez = side.end[2];
    const numPosts = 8;

    for (let i = 0; i <= numPosts; i++) {
      const t = i / numPosts;
      const px = sx + (ex - sx) * t;
      const pz = sz + (ez - sz) * t;

      const post = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 1.5, 6), postMat);
      post.position.set(px, 0.75, pz);
      post.castShadow = true;
      fenceGroup.add(post);
    }

    // Rails
    const midX = (sx + ex) / 2;
    const midZ = (sz + ez) / 2;
    const len = Math.sqrt((ex - sx) ** 2 + (ez - sz) ** 2);
    const angle = Math.atan2(ex - sx, ez - sz);

    for (let h of [0.4, 0.9]) {
      const rail = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.08, len), railMat);
      rail.position.set(midX, h, midZ);
      rail.rotation.y = Math.PI / 2 - angle;
      rail.castShadow = true;
      fenceGroup.add(rail);
    }
  });

  return fenceGroup;
}
scene.add(createFence());

// ─── Decorations ───
function addTree(x, z) {
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.15, 0.2, 1.5, 6),
    new THREE.MeshLambertMaterial({ color: 0x8B4513 })
  );
  trunk.position.set(x, 0.75, z);
  trunk.castShadow = true;
  scene.add(trunk);

  const leaves = new THREE.Mesh(
    new THREE.SphereGeometry(0.8, 8, 6),
    new THREE.MeshLambertMaterial({ color: 0x228B22 })
  );
  leaves.position.set(x, 2.0, z);
  leaves.castShadow = true;
  scene.add(leaves);
}
addTree(-12, -12);
addTree(12, 10);
addTree(-10, 13);
addTree(14, -11);

// ─── Animal Creation ───
const animals = [];
const animalMeshes = [];

function createCow(name, color = 0xf5f5f5) {
  const group = new THREE.Group();
  group.userData = { type: 'cow', name };

  const bodyMat = new THREE.MeshLambertMaterial({ color });
  const darkMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
  const pinkMat = new THREE.MeshLambertMaterial({ color: 0xffb6c1 });

  // Body
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.9, 0.8), bodyMat);
  body.position.y = 0.9;
  body.castShadow = true;
  group.add(body);

  // Spots
  const spot1 = new THREE.Mesh(new THREE.SphereGeometry(0.2, 6, 4), darkMat);
  spot1.position.set(0.2, 1.1, 0.41);
  spot1.scale.set(1, 1, 0.1);
  group.add(spot1);

  const spot2 = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6, 4), darkMat);
  spot2.position.set(-0.3, 0.8, -0.41);
  spot2.scale.set(1, 1, 0.1);
  group.add(spot2);

  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 8, 6), bodyMat);
  head.position.set(0.85, 1.15, 0);
  head.castShadow = true;
  group.add(head);

  // Snout
  const snout = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.15, 0.25), pinkMat);
  snout.position.set(1.1, 1.05, 0);
  group.add(snout);

  // Eyes
  for (let s of [-1, 1]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.05, 6, 4), darkMat);
    eye.position.set(1.0, 1.25, s * 0.2);
    group.add(eye);
  }

  // Horns
  const hornMat = new THREE.MeshLambertMaterial({ color: 0xfff8dc });
  for (let s of [-1, 1]) {
    const horn = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.25, 6), hornMat);
    horn.position.set(0.75, 1.5, s * 0.2);
    horn.rotation.z = s * 0.3;
    group.add(horn);
  }

  // Legs
  const legMat = new THREE.MeshLambertMaterial({ color: 0xddd });
  const legPositions = [
    [0.45, 0.25, 0.25], [0.45, 0.25, -0.25],
    [-0.45, 0.25, 0.25], [-0.45, 0.25, -0.25]
  ];
  legPositions.forEach(p => {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.5, 6), legMat);
    leg.position.set(...p);
    leg.castShadow = true;
    group.add(leg);
  });

  // Tail
  const tail = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.03, 0.5, 4), darkMat);
  tail.position.set(-0.9, 1.1, 0);
  tail.rotation.z = 0.5;
  group.add(tail);

  // Udder
  const udder = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 4), pinkMat);
  udder.position.set(-0.2, 0.5, 0);
  group.add(udder);

  return group;
}

function createChicken(name, color = 0xffffff) {
  const group = new THREE.Group();
  group.userData = { type: 'chicken', name };

  const bodyMat = new THREE.MeshLambertMaterial({ color });
  const beakMat = new THREE.MeshLambertMaterial({ color: 0xFFA500 });
  const combMat = new THREE.MeshLambertMaterial({ color: 0xFF0000 });
  const darkMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
  const legMat = new THREE.MeshLambertMaterial({ color: 0xDAA520 });

  // Body
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 6), bodyMat);
  body.position.y = 0.45;
  body.scale.set(1.1, 0.9, 0.85);
  body.castShadow = true;
  group.add(body);

  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 6), bodyMat);
  head.position.set(0.3, 0.7, 0);
  head.castShadow = true;
  group.add(head);

  // Beak
  const beak = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.15, 4), beakMat);
  beak.position.set(0.48, 0.67, 0);
  beak.rotation.z = -Math.PI / 2;
  group.add(beak);

  // Comb
  const comb = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.04), combMat);
  comb.position.set(0.32, 0.87, 0);
  group.add(comb);

  // Eyes
  for (let s of [-1, 1]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.025, 6, 4), darkMat);
    eye.position.set(0.4, 0.73, s * 0.1);
    group.add(eye);
  }

  // Wings (flat planes)
  const wingGeo = new THREE.PlaneGeometry(0.25, 0.18);
  for (let s of [-1, 1]) {
    const wingMat = new THREE.MeshLambertMaterial({ color, side: THREE.DoubleSide });
    const wing = new THREE.Mesh(wingGeo, wingMat);
    wing.position.set(-0.05, 0.5, s * 0.28);
    wing.rotation.y = s * 0.2;
    wing.rotation.x = s * 0.3;
    group.add(wing);
  }

  // Legs
  for (let s of [-1, 1]) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.2, 4), legMat);
    leg.position.set(0.05, 0.1, s * 0.1);
    group.add(leg);
  }

  // Tail feathers
  const tailGeo = new THREE.PlaneGeometry(0.15, 0.2);
  const tailMat2 = new THREE.MeshLambertMaterial({ color, side: THREE.DoubleSide });
  const tail = new THREE.Mesh(tailGeo, tailMat2);
  tail.position.set(-0.35, 0.6, 0);
  tail.rotation.z = 0.5;
  group.add(tail);

  return group;
}

function createPig(name, color = 0xFFB6C1) {
  const group = new THREE.Group();
  group.userData = { type: 'pig', name };

  const bodyMat = new THREE.MeshLambertMaterial({ color });
  const noseMat = new THREE.MeshLambertMaterial({ color: 0xFF69B4 });
  const darkMat = new THREE.MeshLambertMaterial({ color: 0x111111 });

  // Body (sphere-ish)
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.55, 10, 8), bodyMat);
  body.position.y = 0.65;
  body.scale.set(1.2, 0.9, 0.9);
  body.castShadow = true;
  group.add(body);

  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 6), bodyMat);
  head.position.set(0.7, 0.75, 0);
  head.castShadow = true;
  group.add(head);

  // Snout (flat box)
  const snout = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.12, 0.18), noseMat);
  snout.position.set(0.95, 0.7, 0);
  group.add(snout);

  // Nostrils
  for (let s of [-1, 1]) {
    const nostril = new THREE.Mesh(new THREE.SphereGeometry(0.025, 4, 4), darkMat);
    nostril.position.set(1.03, 0.7, s * 0.04);
    group.add(nostril);
  }

  // Eyes
  for (let s of [-1, 1]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.035, 6, 4), darkMat);
    eye.position.set(0.88, 0.85, s * 0.18);
    group.add(eye);
  }

  // Ears
  for (let s of [-1, 1]) {
    const ear = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.15, 0.04), bodyMat);
    ear.position.set(0.6, 1.0, s * 0.22);
    ear.rotation.x = s * 0.4;
    ear.rotation.z = -0.3;
    group.add(ear);
  }

  // Legs
  const legPositions = [
    [0.35, 0.2, 0.25], [0.35, 0.2, -0.25],
    [-0.35, 0.2, 0.25], [-0.35, 0.2, -0.25]
  ];
  legPositions.forEach(p => {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.07, 0.4, 6), bodyMat);
    leg.position.set(...p);
    leg.castShadow = true;
    group.add(leg);

    // Hoof
    const hoof = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.08, 0.05, 6), darkMat);
    hoof.position.set(p[0], 0.02, p[2]);
    group.add(hoof);
  });

  // Curly tail (torus segment)
  const tailGeo = new THREE.TorusGeometry(0.1, 0.025, 6, 12, Math.PI * 1.5);
  const tail = new THREE.Mesh(tailGeo, noseMat);
  tail.position.set(-0.7, 0.85, 0);
  tail.rotation.y = Math.PI / 2;
  group.add(tail);

  return group;
}

// ─── Spawn Animals ───
const cowColors = [0xf5f5f5, 0xd2b48c, 0x8B7355];
const chickenColors = [0xffffff, 0xFFD700, 0xCD853F];
const pigColors = [0xFFB6C1, 0xFFA07A, 0xF4A460];

function randomInField() {
  const bound = HALF - PADDING - 1;
  return {
    x: (Math.random() - 0.5) * 2 * bound,
    z: (Math.random() - 0.5) * 2 * bound
  };
}

for (let i = 0; i < 3; i++) {
  const pos = randomInField();
  const cow = createCow(`Cow_${i + 1}`, cowColors[i]);
  cow.position.set(pos.x, 0, pos.z);
  cow.rotation.y = Math.random() * Math.PI * 2;
  scene.add(cow);
  animals.push({
    mesh: cow,
    type: 'cow',
    name: `Cow_${i + 1}`,
    speed: 0.4 + Math.random() * 0.2,
    direction: Math.random() * Math.PI * 2,
    changeTimer: 2 + Math.random() * 3,
    changeInterval: 2 + Math.random() * 3,
    selected: false,
    feeding: false,
    feedTime: 0,
    baseY: 0
  });
  animalMeshes.push(cow);
}

for (let i = 0; i < 3; i++) {
  const pos = randomInField();
  const chicken = createChicken(`Chicken_${i + 1}`, chickenColors[i]);
  chicken.position.set(pos.x, 0, pos.z);
  chicken.rotation.y = Math.random() * Math.PI * 2;
  scene.add(chicken);
  animals.push({
    mesh: chicken,
    type: 'chicken',
    name: `Chicken_${i + 1}`,
    speed: 0.6 + Math.random() * 0.3,
    direction: Math.random() * Math.PI * 2,
    changeTimer: 2 + Math.random() * 3,
    changeInterval: 2 + Math.random() * 3,
    selected: false,
    feeding: false,
    feedTime: 0,
    baseY: 0
  });
  animalMeshes.push(chicken);
}

for (let i = 0; i < 3; i++) {
  const pos = randomInField();
  const pig = createPig(`Pig_${i + 1}`, pigColors[i]);
  pig.position.set(pos.x, 0, pos.z);
  pig.rotation.y = Math.random() * Math.PI * 2;
  scene.add(pig);
  animals.push({
    mesh: pig,
    type: 'pig',
    name: `Pig_${i + 1}`,
    speed: 0.35 + Math.random() * 0.2,
    direction: Math.random() * Math.PI * 2,
    changeTimer: 2 + Math.random() * 3,
    changeInterval: 2 + Math.random() * 3,
    selected: false,
    feeding: false,
    feedTime: 0,
    baseY: 0
  });
  animalMeshes.push(pig);
}

// ─── Selection highlight ───
let selectedAnimal = null;
const selectionRing = new THREE.Mesh(
  new THREE.RingGeometry(0.8, 1.0, 32),
  new THREE.MeshBasicMaterial({ color: 0xFFFF00, side: THREE.DoubleSide, transparent: true, opacity: 0.7 })
);
selectionRing.rotation.x = -Math.PI / 2;
selectionRing.position.y = 0.02;
selectionRing.visible = false;
scene.add(selectionRing);

// ─── Raycasting ───
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getAnimalFromMesh(object) {
  let current = object;
  while (current) {
    if (current.userData && current.userData.name) {
      return animals.find(a => a.name === current.userData.name);
    }
    current = current.parent;
  }
  return null;
}

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(animalMeshes, true);

  if (intersects.length > 0) {
    const animal = getAnimalFromMesh(intersects[0].object);
    if (animal) {
      selectAnimal(animal);
    }
  } else {
    deselectAll();
  }
});

function selectAnimal(animal) {
  deselectAll();
  animal.selected = true;
  selectedAnimal = animal;
  selectionRing.visible = true;

  const infoEl = document.getElementById('animalInfo');
  infoEl.innerHTML = `<strong>${animal.name}</strong><br>Type: ${animal.type}`;
  document.getElementById('feedBtn').disabled = false;
}

function deselectAll() {
  animals.forEach(a => a.selected = false);
  selectedAnimal = null;
  selectionRing.visible = false;
  document.getElementById('animalInfo').textContent = 'Click an animal to select it.';
  document.getElementById('feedBtn').disabled = true;
}

// ─── Feed Button ───
document.getElementById('feedBtn').addEventListener('click', () => {
  if (selectedAnimal && !selectedAnimal.feeding) {
    triggerFeed(selectedAnimal);
  }
});

function triggerFeed(animal) {
  animal.feeding = true;
  animal.feedTime = 0;
  animal.baseY = animal.mesh.position.y;
}

// ─── Day/Night Cycle ───
const DAY_CYCLE = 30; // seconds
let dayTime = 0;
let elapsedTime = 0;

// Sky sphere
const skyGeo = new THREE.SphereGeometry(80, 32, 16);
const skyMat = new THREE.MeshBasicMaterial({ color: 0x87CEEB, side: THREE.BackSide });
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

// Sun/Moon visual
const sunGeo = new THREE.SphereGeometry(1.2, 16, 8);
const sunMat = new THREE.MeshBasicMaterial({ color: 0xFFFF00 });
const sun = new THREE.Mesh(sunGeo, sunMat);
scene.add(sun);

const moonMat = new THREE.MeshBasicMaterial({ color: 0xCCCCFF });
const moon = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 8), moonMat);
scene.add(moon);

// Stars
const starsGeo = new THREE.BufferGeometry();
const starPositions = [];
for (let i = 0; i < 500; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.random() * Math.PI;
  const r = 70;
  starPositions.push(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta)
  );
}
starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, transparent: true, opacity: 0 });
const stars = new THREE.Points(starsGeo, starsMat);
scene.add(stars);

function updateDayNight(dt) {
  elapsedTime += dt;
  dayTime = (elapsedTime % DAY_CYCLE) / DAY_CYCLE;

  const angle = dayTime * Math.PI * 2;

  // Sun position
  const sunRadius = 25;
  const sunX = Math.cos(angle) * sunRadius;
  const sunY = Math.sin(angle) * sunRadius;
  sun.position.set(sunX, sunY, 0);
  sun.visible = sunY > -2;

  // Moon opposite
  moon.position.set(-sunX, -sunY, 0);
  moon.visible = -sunY > -2;

  // Directional light follows sun
  dirLight.position.set(sunX, Math.max(sunY, 2), 5);
  dirLight.target.position.set(0, 0, 0);

  // Determine brightness based on sun height
  const sunNorm = Math.sin(angle); // -1 to 1, 1 = noon, -1 = midnight
  const brightness = Math.max(0, sunNorm);
  const nightFactor = Math.max(0, -sunNorm);

  // Directional light intensity
  dirLight.intensity = THREE.MathUtils.lerp(0.05, 1.2, brightness);

  // Ambient light
  const ambIntensity = THREE.MathUtils.lerp(0.08, 0.5, brightness);
  ambientLight.intensity = ambIntensity;

  // Sky color
  const dayColor = new THREE.Color(0x87CEEB);
  const sunsetColor = new THREE.Color(0xFF6347);
  const nightColor = new THREE.Color(0x0a0a2e);

  let skyColor;
  if (brightness > 0.3) {
    skyColor = dayColor.clone();
  } else if (brightness > 0) {
    // Sunset/sunrise
    const t = brightness / 0.3;
    skyColor = sunsetColor.clone().lerp(dayColor, t);
  } else {
    skyColor = nightColor.clone();
  }

  skyMat.color.copy(skyColor);
  scene.fog.color.copy(skyColor);

  // Ambient color
  if (brightness > 0.1) {
    ambientLight.color.set(0xfff5e6);
  } else {
    ambientLight.color.set(0x334466);
  }

  // Dir light color
  if (brightness > 0.3) {
    dirLight.color.set(0xffffff);
  } else if (brightness > 0) {
    dirLight.color.set(0xFF8C00);
  } else {
    dirLight.color.set(0x4466aa);
  }

  // Stars
  starsMat.opacity = THREE.MathUtils.lerp(0, 0.8, nightFactor);

  // Hemisphere light
  if (brightness > 0.1) {
    hemiLight.color.set(0x87CEEB);
    hemiLight.groundColor.set(0x556B2F);
    hemiLight.intensity = 0.3;
  } else {
    hemiLight.color.set(0x112244);
    hemiLight.groundColor.set(0x111111);
    hemiLight.intensity = 0.1;
  }

  // Time info
  const timeEl = document.getElementById('timeInfo');
  let timeStr;
  if (brightness > 0.5) timeStr = '☀️ Day';
  else if (brightness > 0.1) timeStr = '🌅 Dawn/Dusk';
  else timeStr = '🌙 Night';
  timeEl.textContent = `Time: ${timeStr} (${(dayTime * 24).toFixed(1)}h)`;
}

// ─── Animation Loop ───
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  // Update day/night
  updateDayNight(dt);

  // Update animals
  const bound = HALF - PADDING;

  animals.forEach(animal => {
    // Direction change timer
    animal.changeTimer -= dt;
    if (animal.changeTimer <= 0) {
      animal.direction += (Math.random() - 0.5) * Math.PI;
      animal.changeInterval = 2 + Math.random() * 3;
      animal.changeTimer = animal.changeInterval;
    }

    // Move
    if (!animal.feeding) {
      const dx = Math.sin(animal.direction) * animal.speed * dt;
      const dz = Math.cos(animal.direction) * animal.speed * dt;

      let newX = animal.mesh.position.x + dx;
      let newZ = animal.mesh.position.z + dz;

      // Boundary check
      if (Math.abs(newX) > bound) {
        animal.direction = Math.PI - animal.direction;
        newX = THREE.MathUtils.clamp(newX, -bound, bound);
      }
      if (Math.abs(newZ) > bound) {
        animal.direction = -animal.direction;
        newZ = THREE.MathUtils.clamp(newZ, -bound, bound);
      }

      animal.mesh.position.x = newX;
      animal.mesh.position.z = newZ;

      // Face direction
      const targetRotY = animal.direction;
      animal.mesh.rotation.y = THREE.MathUtils.lerp(animal.mesh.rotation.y, targetRotY, 0.05);
    }

    // Feeding animation
    if (animal.feeding) {
      animal.feedTime += dt;
      const bobCycles = 4;
      const feedDuration = 2.0;
      if (animal.feedTime < feedDuration) {
        const bobY = Math.sin(animal.feedTime * Math.PI * 2 * bobCycles / feedDuration) * 0.3;
        animal.mesh.position.y = animal.baseY + Math.abs(bobY);
      } else {
        animal.feeding = false;
        animal.mesh.position.y = 0;
      }
    }

    // Selection ring follows selected
    if (animal.selected) {
      selectionRing.position.x = animal.mesh.position.x;
      selectionRing.position.z = animal.mesh.position.z;

      // Pulse ring
      const pulse = 0.9 + Math.sin(elapsedTime * 4) * 0.1;
      selectionRing.scale.set(pulse, pulse, pulse);
    }
  });

  // ─── Expose State ───
  window.__3D_STATE__ = {
    animalCount: animals.length,
    animals: animals.map(a => ({
      type: a.type,
      name: a.name,
      x: a.mesh.position.x,
      y: a.mesh.position.y,
      z: a.mesh.position.z,
      selected: a.selected
    })),
    dayTime: dayTime,
    selectedAnimal: selectedAnimal ? selectedAnimal.name : null
  };

  controls.update();
  renderer.render(scene, camera);
}

// ─── Helper Functions ───
window.__ICG_selectAnimal__ = function(indexOrName) {
  let animal;
  if (typeof indexOrName === 'number') {
    animal = animals[indexOrName];
  } else {
    animal = animals.find(a => a.name === indexOrName);
  }
  if (animal) {
    selectAnimal(animal);
  }
};

window.__ICG_triggerFeed__ = function() {
  if (selectedAnimal && !selectedAnimal.feeding) {
    triggerFeed(selectedAnimal);
  }
};

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
