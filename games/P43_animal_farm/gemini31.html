<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Geometry Farm</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 200px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #animalInfo {
            font-size: 18px;
            font-weight: bold;
        }
        #feedBtn {
            pointer-events: auto;
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.2s;
        }
        #feedBtn:hover {
            background: #45a049;
        }
        #feedBtn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-container">
        <div id="animalInfo">Select an animal</div>
        <button id="feedBtn" disabled>Feed</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 12, 18);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground
        controls.minDistance = 5;
        controls.maxDistance = 30;

        // --- Lighting & Environment ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // Colors for Day/Night
        const skyColorDay = new THREE.Color(0x87CEEB);
        const skyColorNight = new THREE.Color(0x050515);
        const ambientDay = new THREE.Color(0xffffff);
        const ambientNight = new THREE.Color(0x222244);
        const lightDay = new THREE.Color(0xffffee);
        const lightNight = new THREE.Color(0x5555aa);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Fence (15x15 area)
        const fenceGroup = new THREE.Group();
        const fenceMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const fenceThickness = 0.2;
        const fenceHeight = 1.0;
        const fenceLength = 15;
        const offset = 7.5;

        const createFenceWall = (w, d, x, z) => {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, fenceHeight, d), fenceMat);
            mesh.position.set(x, fenceHeight / 2, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            fenceGroup.add(mesh);
        };

        createFenceWall(fenceLength + fenceThickness, fenceThickness, 0, offset);
        createFenceWall(fenceLength + fenceThickness, fenceThickness, 0, -offset);
        createFenceWall(fenceThickness, fenceLength, offset, 0);
        createFenceWall(fenceThickness, fenceLength, -offset, 0);
        scene.add(fenceGroup);

        // --- Procedural Animals ---
        const animals = [];
        const animalGroup = new THREE.Group();
        scene.add(animalGroup);

        // Materials
        const matWhite = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const matBlack = new THREE.MeshStandardMaterial({ color: 0x222222 });
        const matPink = new THREE.MeshStandardMaterial({ color: 0xffb6c1 });
        const matOrange = new THREE.MeshStandardMaterial({ color: 0xffa500 });
        const matRed = new THREE.MeshStandardMaterial({ color: 0xcc0000 });

        function createCow(name) {
            const group = new THREE.Group();
            
            // Body
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.8, 2.0), matWhite);
            body.position.y = 1.0;
            body.castShadow = true;
            group.add(body);

            // Head
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), matBlack);
            head.position.set(0, 1.4, 1.1);
            head.castShadow = true;
            group.add(head);

            // Horns
            const hornGeo = new THREE.ConeGeometry(0.08, 0.3, 8);
            const hornL = new THREE.Mesh(hornGeo, matWhite);
            hornL.position.set(0.3, 1.8, 1.1);
            hornL.rotation.x = -0.2;
            const hornR = hornL.clone();
            hornR.position.set(-0.3, 1.8, 1.1);
            group.add(hornL, hornR);

            // Legs
            const legGeo = new THREE.CylinderGeometry(0.12, 0.1, 0.8);
            const positions = [
                [-0.4, 0.4, 0.7], [0.4, 0.4, 0.7],
                [-0.4, 0.4, -0.7], [0.4, 0.4, -0.7]
            ];
            positions.forEach(pos => {
                const leg = new THREE.Mesh(legGeo, matBlack);
                leg.position.set(...pos);
                leg.castShadow = true;
                group.add(leg);
            });

            return { mesh: group, type: 'cow', name, baseY: 0, radius: 1.2, speed: 1.0 };
        }

        function createChicken(name) {
            const group = new THREE.Group();
            
            // Body
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), matWhite);
            body.position.y = 0.4;
            body.castShadow = true;
            group.add(body);

            // Beak
            const beak = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.2, 8), matOrange);
            beak.position.set(0, 0.45, 0.35);
            beak.rotation.x = Math.PI / 2;
            group.add(beak);

            // Comb
            const comb = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.15, 0.2), matRed);
            comb.position.set(0, 0.75, 0.1);
            group.add(comb);

            // Wings
            const wingGeo = new THREE.BoxGeometry(0.05, 0.25, 0.4);
            const wingL = new THREE.Mesh(wingGeo, matWhite);
            wingL.position.set(0.35, 0.4, 0);
            const wingR = wingL.clone();
            wingR.position.set(-0.35, 0.4, 0);
            group.add(wingL, wingR);

            return { mesh: group, type: 'chicken', name, baseY: 0, radius: 0.5, speed: 1.5 };
        }

        function createPig(name) {
            const group = new THREE.Group();
            
            // Body
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), matPink);
            body.scale.set(1, 0.9, 1.3);
            body.position.y = 0.6;
            body.castShadow = true;
            group.add(body);

            // Snout
            const snout = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 0.15), matPink);
            snout.position.set(0, 0.6, 0.75);
            group.add(snout);

            // Tail
            const tail = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.04, 8, 16, Math.PI * 1.5), matPink);
            tail.position.set(0, 0.7, -0.75);
            tail.rotation.y = Math.PI / 2;
            tail.rotation.x = Math.PI / 4;
            group.add(tail);

            // Legs
            const legGeo = new THREE.CylinderGeometry(0.1, 0.08, 0.4);
            const positions = [
                [-0.3, 0.2, 0.4], [0.3, 0.2, 0.4],
                [-0.3, 0.2, -0.4], [0.3, 0.2, -0.4]
            ];
            positions.forEach(pos => {
                const leg = new THREE.Mesh(legGeo, matPink);
                leg.position.set(...pos);
                leg.castShadow = true;
                group.add(leg);
            });

            return { mesh: group, type: 'pig', name, baseY: 0, radius: 0.8, speed: 1.2 };
        }

        // Instantiate animals
        const spawnArea = 6.0;
        let idCounter = 1;
        
        const addAnimal = (factory, prefix) => {
            const animal = factory(`${prefix}_${idCounter++}`);
            
            // Random position within bounds
            animal.mesh.position.x = (Math.random() - 0.5) * spawnArea * 2;
            animal.mesh.position.z = (Math.random() - 0.5) * spawnArea * 2;
            
            // AI State
            animal.targetAngle = Math.random() * Math.PI * 2;
            animal.mesh.rotation.y = animal.targetAngle;
            animal.changeDirTimer = 0;
            animal.feedTimer = 0;
            
            // UserData for raycasting
            animal.mesh.userData = { isAnimal: true, ref: animal };
            // Apply to all children
            animal.mesh.traverse(child => {
                if (child.isMesh) child.userData = animal.mesh.userData;
            });

            animalGroup.add(animal.mesh);
            animals.push(animal);
        };

        for(let i=0; i<3; i++) addAnimal(createCow, 'Cow');
        for(let i=0; i<3; i++) addAnimal(createChicken, 'Chicken');
        for(let i=0; i<3; i++) addAnimal(createPig, 'Pig');

        // --- Selection & Interaction ---
        let selectedAnimal = null;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        // Selection Ring
        const ringGeo = new THREE.TorusGeometry(1, 0.05, 8, 32);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xffff00, depthTest: false });
        const selectionRing = new THREE.Mesh(ringGeo, ringMat);
        selectionRing.rotation.x = Math.PI / 2;
        selectionRing.position.y = 0.05;
        selectionRing.visible = false;
        scene.add(selectionRing);

        const infoUI = document.getElementById('animalInfo');
        const feedBtn = document.getElementById('feedBtn');

        function selectAnimal(animal) {
            selectedAnimal = animal;
            if (animal) {
                selectionRing.visible = true;
                selectionRing.scale.setScalar(animal.radius);
                infoUI.innerText = `Name: ${animal.name} | Type: ${animal.type}`;
                feedBtn.disabled = false;
            } else {
                selectionRing.visible = false;
                infoUI.innerText = 'Select an animal';
                feedBtn.disabled = true;
            }
        }

        window.addEventListener('pointerdown', (event) => {
            // Don't raycast if clicking UI
            if(event.target.tagName === 'BUTTON') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(animalGroup.children, true);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                if (object.userData && object.userData.isAnimal) {
                    selectAnimal(object.userData.ref);
                }
            } else {
                selectAnimal(null);
            }
        });

        function triggerFeed() {
            if (selectedAnimal) {
                selectedAnimal.feedTimer = 2.0; // 2 seconds of feeding animation
            }
        }
        feedBtn.addEventListener('click', triggerFeed);

        // --- Helpers ---
        window.__ICG_selectAnimal__ = (indexOrName) => {
            let target = null;
            if (typeof indexOrName === 'number') {
                target = animals[indexOrName];
            } else {
                target = animals.find(a => a.name === indexOrName);
            }
            selectAnimal(target || null);
        };
        window.__ICG_triggerFeed__ = triggerFeed;

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let cycleTime = 0;
        const CYCLE_DURATION = 30.0;
        const BOUNDS = 7.0; // 15/2 - padding

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // 1. Day/Night Cycle
            cycleTime = (cycleTime + delta) % CYCLE_DURATION;
            const dayTime = cycleTime / CYCLE_DURATION; // 0 to 1

            // Sun angle: sunrise at 0.25, noon at 0.5, sunset at 0.75
            const sunAngle = (dayTime - 0.25) * Math.PI * 2;
            dirLight.position.set(Math.cos(sunAngle) * 20, Math.sin(sunAngle) * 20, 0);

            // Intensity and Colors
            const sunHeight = Math.sin(sunAngle);
            const isDay = sunHeight > 0;
            
            // Smooth blend factor based on sun height
            const blend = Math.max(0, Math.min(1, sunHeight * 2 + 0.2)); 

            scene.background = skyColorNight.clone().lerp(skyColorDay, blend);
            ambientLight.color = ambientNight.clone().lerp(ambientDay, blend);
            ambientLight.intensity = 0.2 + blend * 0.4;
            
            if (isDay) {
                dirLight.intensity = sunHeight * 1.5;
                dirLight.color = lightNight.clone().lerp(lightDay, blend);
            } else {
                dirLight.intensity = 0;
            }

            // 2. Animal AI & Animation
            animals.forEach(animal => {
                // Feeding Animation
                if (animal.feedTimer > 0) {
                    animal.feedTimer -= delta;
                    // Bobbing up and down
                    const bobOffset = Math.abs(Math.sin(animal.feedTimer * Math.PI * 4)) * 0.3;
                    animal.mesh.position.y = animal.baseY + bobOffset;
                } else {
                    animal.mesh.position.y = animal.baseY;
                    
                    // Roaming Logic
                    animal.changeDirTimer -= delta;
                    if (animal.changeDirTimer <= 0) {
                        animal.targetAngle = Math.random() * Math.PI * 2;
                        animal.changeDirTimer = 2.0 + Math.random() * 3.0; // 2-5s
                    }

                    // Move
                    const dx = Math.sin(animal.targetAngle) * animal.speed * delta;
                    const dz = Math.cos(animal.targetAngle) * animal.speed * delta;
                    
                    let nextX = animal.mesh.position.x + dx;
                    let nextZ = animal.mesh.position.z + dz;

                    // Boundary Check & Bounce
                    let bounced = false;
                    if (Math.abs(nextX) > BOUNDS) {
                        nextX = Math.sign(nextX) * BOUNDS;
                        animal.targetAngle = -animal.targetAngle;
                        bounced = true;
                    }
                    if (Math.abs(nextZ) > BOUNDS) {
                        nextZ = Math.sign(nextZ) * BOUNDS;
                        animal.targetAngle = Math.PI - animal.targetAngle;
                        bounced = true;
                    }
                    
                    if (bounced) animal.changeDirTimer = 2.0 + Math.random() * 3.0;

                    animal.mesh.position.x = nextX;
                    animal.mesh.position.z = nextZ;

                    // Smooth Rotation
                    // Calculate shortest angle difference
                    let diff = animal.targetAngle - animal.mesh.rotation.y;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    animal.mesh.rotation.y += diff * 5 * delta;
                }
            });

            // Update Selection Ring Position
            if (selectedAnimal) {
                selectionRing.position.x = selectedAnimal.mesh.position.x;
                selectionRing.position.z = selectedAnimal.mesh.position.z;
            }

            // 3. State Exposure
            window.__3D_STATE__ = {
                animalCount: 9,
                animals: animals.map(a => ({
                    type: a.type,
                    name: a.name,
                    x: a.mesh.position.x,
                    y: a.mesh.position.y,
                    z: a.mesh.position.z,
                    selected: a === selectedAnimal
                })),
                dayTime: dayTime,
                selectedAnimal: selectedAnimal ? selectedAnimal.name : null
            };

            controls.update();
            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        animate();
    </script>
</body>
</html>
