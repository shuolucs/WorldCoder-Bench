<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 程序化几何体农场</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #87b6ff;
    }
    #app {
      position: fixed;
      inset: 0;
    }
    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.9);
      padding: 12px 14px;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      min-width: 220px;
    }
    #animalInfo {
      margin-bottom: 10px;
      font-size: 14px;
      color: #222;
      line-height: 1.5;
      min-height: 42px;
    }
    #feedBtn {
      border: none;
      background: #ffb347;
      color: #222;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }
    #feedBtn:hover {
      background: #ffa32b;
    }
    #hint {
      margin-top: 8px;
      font-size: 12px;
      color: #555;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app"></div>

  <div id="ui">
    <div id="animalInfo">未选中动物</div>
    <button id="feedBtn">喂食选中动物</button>
    <div id="hint">点击动物可选中，拖动可旋转视角。</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const animalInfo = document.getElementById('animalInfo');
    const feedBtn = document.getElementById('feedBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 25, 60);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(12, 11, 15);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.5, 0);
    controls.enableDamping = true;
    controls.minDistance = 8;
    controls.maxDistance = 35;
    controls.maxPolarAngle = Math.PI * 0.48;

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
    sunLight.position.set(10, 12, 6);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(2048, 2048);
    sunLight.shadow.camera.left = -20;
    sunLight.shadow.camera.right = 20;
    sunLight.shadow.camera.top = 20;
    sunLight.shadow.camera.bottom = -20;
    sunLight.shadow.camera.near = 1;
    sunLight.shadow.camera.far = 60;
    scene.add(sunLight);
    scene.add(sunLight.target);

    const groundSize = 15;
    const halfGround = groundSize / 2;
    const margin = 1.1;

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(groundSize, groundSize, 1, 1),
      new THREE.MeshStandardMaterial({ color: 0x6fbf5f })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    function createFence() {
      const fenceGroup = new THREE.Group();

      const postGeo = new THREE.BoxGeometry(0.18, 1.1, 0.18);
      const railGeoX = new THREE.BoxGeometry(groundSize, 0.12, 0.12);
      const railGeoZ = new THREE.BoxGeometry(0.12, 0.12, groundSize);
      const woodMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });

      const postY = 0.55;
      const edge = halfGround;

      const postPositions = [
        [-edge, postY, -edge], [ edge, postY, -edge],
        [-edge, postY,  edge], [ edge, postY,  edge],
        [0, postY, -edge], [0, postY, edge],
        [-edge, postY, 0], [edge, postY, 0],
      ];

      postPositions.forEach(p => {
        const post = new THREE.Mesh(postGeo, woodMat);
        post.position.set(...p);
        post.castShadow = true;
        post.receiveShadow = true;
        fenceGroup.add(post);
      });

      const railYs = [0.35, 0.75];
      railYs.forEach(y => {
        const front = new THREE.Mesh(railGeoX, woodMat);
        front.position.set(0, y, -edge);
        const back = front.clone();
        back.position.z = edge;

        const left = new THREE.Mesh(railGeoZ, woodMat);
        left.position.set(-edge, y, 0);
        const right = left.clone();
        right.position.x = edge;

        [front, back, left, right].forEach(r => {
          r.castShadow = true;
          r.receiveShadow = true;
          fenceGroup.add(r);
        });
      });

      scene.add(fenceGroup);
    }
    createFence();

    function addShadowProps(mesh) {
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function createCow(name) {
      const root = new THREE.Group();
      root.name = name;

      const bodyMat = new THREE.MeshStandardMaterial({ color: 0xf5f1e8 });
      const spotMat = new THREE.MeshStandardMaterial({ color: 0x2d241f });
      const hornMat = new THREE.MeshStandardMaterial({ color: 0xd8c29d });
      const legMat = new THREE.MeshStandardMaterial({ color: 0x3c322d });

      const body = addShadowProps(new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.0, 0.9), bodyMat));
      body.position.y = 1.1;
      root.add(body);

      const spot1 = addShadowProps(new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.35, 0.1), spotMat));
      spot1.position.set(0.2, 1.2, 0.46);
      root.add(spot1);

      const spot2 = addShadowProps(new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.28, 0.1), spotMat));
      spot2.position.set(-0.4, 1.0, -0.46);
      root.add(spot2);

      const head = addShadowProps(new THREE.Mesh(new THREE.SphereGeometry(0.42, 24, 24), bodyMat));
      head.position.set(1.05, 1.2, 0);
      root.add(head);

      const muzzle = addShadowProps(new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.2, 0.34), new THREE.MeshStandardMaterial({ color: 0xf2b6bf })));
      muzzle.position.set(1.38, 1.06, 0);
      root.add(muzzle);

      const horn1 = addShadowProps(new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.18, 12), hornMat));
      horn1.position.set(0.94, 1.55, 0.18);
      horn1.rotation.z = Math.PI / 6;
      root.add(horn1);

      const horn2 = horn1.clone();
      horn2.position.z = -0.18;
      root.add(horn2);

      const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.9, 12);
      const legPositions = [
        [0.55, 0.45, 0.28],
        [0.55, 0.45, -0.28],
        [-0.55, 0.45, 0.28],
        [-0.55, 0.45, -0.28]
      ];
      legPositions.forEach(([x, y, z]) => {
        const leg = addShadowProps(new THREE.Mesh(legGeo, legMat));
        leg.position.set(x, y, z);
        root.add(leg);
      });

      root.userData.type = 'cow';
      root.userData.baseY = 0;
      root.userData.bobOffset = 0;
      return root;
    }

    function createChicken(name) {
      const root = new THREE.Group();
      root.name = name;

      const bodyMat = new THREE.MeshStandardMaterial({ color: 0xfff5dc });
      const wingMat = new THREE.MeshStandardMaterial({ color: 0xf3e3b5, side: THREE.DoubleSide });
      const beakMat = new THREE.MeshStandardMaterial({ color: 0xffa500 });
      const combMat = new THREE.MeshStandardMaterial({ color: 0xe53935 });
      const legMat = new THREE.MeshStandardMaterial({ color: 0xd9902f });

      const body = addShadowProps(new THREE.Mesh(new THREE.SphereGeometry(0.42, 24, 24), bodyMat));
      body.position.y = 0.7;
      root.add(body);

      const head = addShadowProps(new THREE.Mesh(new THREE.SphereGeometry(0.22, 20, 20), bodyMat));
      head.position.set(0.36, 0.95, 0);
      root.add(head);

      const beak = addShadowProps(new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.2, 12), beakMat));
      beak.position.set(0.58, 0.92, 0);
      beak.rotation.z = -Math.PI / 2;
      root.add(beak);

      const comb = addShadowProps(new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.16), combMat));
      comb.position.set(0.36, 1.14, 0);
      root.add(comb);

      const wingGeo = new THREE.PlaneGeometry(0.32, 0.22);
      const wingL = addShadowProps(new THREE.Mesh(wingGeo, wingMat));
      wingL.position.set(0.03, 0.72, 0.34);
      wingL.rotation.y = -Math.PI / 2.8;
      root.add(wingL);

      const wingR = wingL.clone();
      wingR.position.z = -0.34;
      wingR.rotation.y = Math.PI / 2.8;
      root.add(wingR);

      const legGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.35, 8);
      const leg1 = addShadowProps(new THREE.Mesh(legGeo, legMat));
      leg1.position.set(0.08, 0.18, 0.1);
      root.add(leg1);

      const leg2 = leg1.clone();
      leg2.position.z = -0.1;
      root.add(leg2);

      root.userData.type = 'chicken';
      root.userData.baseY = 0;
      root.userData.bobOffset = 0;
      return root;
    }

    function createPig(name) {
      const root = new THREE.Group();
      root.name = name;

      const bodyMat = new THREE.MeshStandardMaterial({ color: 0xf3a6b6 });
      const noseMat = new THREE.MeshStandardMaterial({ color: 0xe2879d });
      const legMat = new THREE.MeshStandardMaterial({ color: 0xd97f95 });
      const tailMat = new THREE.MeshStandardMaterial({ color: 0xd97f95 });

      const body = addShadowProps(new THREE.Mesh(new THREE.SphereGeometry(0.65, 28, 28), bodyMat));
      body.scale.set(1.15, 0.85, 0.9);
      body.position.y = 0.9;
      root.add(body);

      const head = addShadowProps(new THREE.Mesh(new THREE.SphereGeometry(0.38, 24, 24), bodyMat));
      head.position.set(0.78, 0.94, 0);
      root.add(head);

      const nose = addShadowProps(new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.16, 0.28), noseMat));
      nose.position.set(1.08, 0.88, 0);
      root.add(nose);

      const earGeo = new THREE.ConeGeometry(0.09, 0.18, 12);
      const ear1 = addShadowProps(new THREE.Mesh(earGeo, bodyMat));
      ear1.position.set(0.7, 1.24, 0.2);
      ear1.rotation.z = -0.35;
      root.add(ear1);

      const ear2 = ear1.clone();
      ear2.position.z = -0.2;
      root.add(ear2);

      const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.45, 12);
      const legPositions = [
        [0.35, 0.28, 0.22],
        [0.35, 0.28, -0.22],
        [-0.35, 0.28, 0.22],
        [-0.35, 0.28, -0.22]
      ];
      legPositions.forEach(([x, y, z]) => {
        const leg = addShadowProps(new THREE.Mesh(legGeo, legMat));
        leg.position.set(x, y, z);
        root.add(leg);
      });

      const tail = addShadowProps(new THREE.Mesh(
        new THREE.TorusGeometry(0.12, 0.03, 10, 24, Math.PI * 1.5),
        tailMat
      ));
      tail.position.set(-0.82, 0.96, 0);
      tail.rotation.y = Math.PI / 2;
      root.add(tail);

      root.userData.type = 'pig';
      root.userData.baseY = 0;
      root.userData.bobOffset = 0;
      return root;
    }

    const animals = [];
    const animalMeshes = [];
    let selectedAnimal = null;

    function randomInRange(a, b) {
      return a + Math.random() * (b - a);
    }

    function randomDirection() {
      const angle = Math.random() * Math.PI * 2;
      return new THREE.Vector3(Math.cos(angle), 0, Math.sin(angle));
    }

    function placeAnimal(animal, x, z) {
      animal.position.set(x, 0, z);
      animal.userData.baseY = 0;
    }

    function registerAnimal(animal) {
      animal.userData.speed = randomInRange(0.45, 0.8);
      animal.userData.direction = randomDirection();
      animal.userData.turnTimer = randomInRange(2, 5);
      animal.userData.feed = {
        active: false,
        time: 0,
        duration: 1.8,
        amplitude: 0.28,
        cycles: 4
      };
      animal.userData.selected = false;
      animal.userData.highlight = null;

      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(0.8, 0.05, 10, 40),
        new THREE.MeshBasicMaterial({ color: 0xffff00 })
      );
      ring.rotation.x = Math.PI / 2;
      ring.position.y = 0.05;
      ring.visible = false;
      animal.add(ring);
      animal.userData.highlight = ring;

      animals.push(animal);
      animalMeshes.push(animal);
      scene.add(animal);
    }

    const usedPositions = [];
    function getSafePosition() {
      for (let i = 0; i < 100; i++) {
        const x = randomInRange(-halfGround + margin, halfGround - margin);
        const z = randomInRange(-halfGround + margin, halfGround - margin);
        let ok = true;
        for (const p of usedPositions) {
          const dx = x - p.x;
          const dz = z - p.z;
          if (Math.sqrt(dx * dx + dz * dz) < 2.0) {
            ok = false;
            break;
          }
        }
        if (ok) {
          usedPositions.push({ x, z });
          return { x, z };
        }
      }
      return { x: 0, z: 0 };
    }

    const defs = [
      { type: 'cow', create: createCow, names: ['cow_1', 'cow_2', 'cow_3'] },
      { type: 'chicken', create: createChicken, names: ['chicken_1', 'chicken_2', 'chicken_3'] },
      { type: 'pig', create: createPig, names: ['pig_1', 'pig_2', 'pig_3'] }
    ];

    defs.forEach(def => {
      def.names.forEach(name => {
        const animal = def.create(name);
        const p = getSafePosition();
        placeAnimal(animal, p.x, p.z);
        animal.rotation.y = Math.random() * Math.PI * 2;
        registerAnimal(animal);
      });
    });

    const hayGroup = new THREE.Group();
    scene.add(hayGroup);
    function createHayBale(x, z) {
      const bale = addShadowProps(new THREE.Mesh(
        new THREE.CylinderGeometry(0.35, 0.35, 0.5, 16),
        new THREE.MeshStandardMaterial({ color: 0xd9c95b })
      ));
      bale.rotation.z = Math.PI / 2;
      bale.position.set(x, 0.25, z);
      hayGroup.add(bale);
    }
    createHayBale(-4.8, -5.2);
    createHayBale(-3.9, -5.2);
    createHayBale(-4.35, -4.7);

    function updateAnimalInfo() {
      if (!selectedAnimal) {
        animalInfo.textContent = '未选中动物';
      } else {
        animalInfo.textContent = `name: ${selectedAnimal.name} | type: ${selectedAnimal.userData.type}`;
      }
    }

    function setSelectedAnimal(animal) {
      if (selectedAnimal && selectedAnimal.userData.highlight) {
        selectedAnimal.userData.selected = false;
        selectedAnimal.userData.highlight.visible = false;
      }
      selectedAnimal = animal || null;
      if (selectedAnimal && selectedAnimal.userData.highlight) {
        selectedAnimal.userData.selected = true;
        selectedAnimal.userData.highlight.visible = true;
      }
      updateAnimalInfo();
    }

    function triggerFeed(animal) {
      if (!animal) return;
      animal.userData.feed.active = true;
      animal.userData.feed.time = 0;
    }

    feedBtn.addEventListener('click', () => {
      if (selectedAnimal) triggerFeed(selectedAnimal);
    });

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    renderer.domElement.addEventListener('pointerdown', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);

      const intersects = raycaster.intersectObjects(animalMeshes, true);
      if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj && !animals.includes(obj)) {
          obj = obj.parent;
        }
        if (obj) setSelectedAnimal(obj);
      }
    });

    function clampAnimalInside(animal) {
      const limit = halfGround - margin;
      animal.position.x = THREE.MathUtils.clamp(animal.position.x, -limit, limit);
      animal.position.z = THREE.MathUtils.clamp(animal.position.z, -limit, limit);
    }

    function redirectIfNeeded(animal) {
      const limit = halfGround - margin;
      let bounced = false;

      if (animal.position.x <= -limit || animal.position.x >= limit) {
        animal.userData.direction.x *= -1;
        bounced = true;
      }
      if (animal.position.z <= -limit || animal.position.z >= limit) {
        animal.userData.direction.z *= -1;
        bounced = true;
      }
      if (bounced) {
        animal.userData.direction.normalize();
      }
    }

    const clock = new THREE.Clock();

    function updateAnimals(dt, elapsed) {
      animals.forEach((animal) => {
        animal.userData.turnTimer -= dt;
        if (animal.userData.turnTimer <= 0) {
          animal.userData.direction = randomDirection();
          animal.userData.turnTimer = randomInRange(2, 5);
        }

        const move = animal.userData.direction.clone().multiplyScalar(animal.userData.speed * dt);
        animal.position.x += move.x;
        animal.position.z += move.z;

        redirectIfNeeded(animal);
        clampAnimalInside(animal);

        const dir = animal.userData.direction;
        if (dir.lengthSq() > 0.0001) {
          const targetRot = Math.atan2(dir.x, dir.z);
          animal.rotation.y = THREE.MathUtils.lerp(animal.rotation.y, targetRot, 0.08);
        }

        let bobY = 0;
        const feed = animal.userData.feed;
        if (feed.active) {
          feed.time += dt;
          const t = Math.min(feed.time / feed.duration, 1);
          bobY = Math.sin(t * Math.PI * 2 * feed.cycles) * feed.amplitude;
          if (feed.time >= feed.duration) {
            feed.active = false;
            bobY = 0;
          }
        }

        const walkBob = Math.sin(elapsed * 6 + animal.position.x * 0.5 + animal.position.z * 0.5) * 0.02;
        animal.position.y = animal.userData.baseY + bobY + walkBob;
      });
    }

    function updateDayNight(elapsed) {
      const cycle = 30;
      const dayTime = (elapsed % cycle) / cycle;

      const angle = dayTime * Math.PI * 2;
      const radius = 18;
      sunLight.position.set(Math.cos(angle) * radius, Math.sin(angle) * 16, Math.sin(angle + 0.6) * radius * 0.7);
      sunLight.target.position.set(0, 0, 0);
      sunLight.target.updateMatrixWorld();

      const sunHeight01 = THREE.MathUtils.clamp((sunLight.position.y + 2) / 16, 0, 1);
      const ambientDay = new THREE.Color(0xffffff);
      const ambientNight = new THREE.Color(0x223355);
      const bgDay = new THREE.Color(0x87ceeb);
      const bgNight = new THREE.Color(0x07111f);

      ambientLight.color.copy(ambientNight).lerp(ambientDay, sunHeight01);
      ambientLight.intensity = 0.18 + sunHeight01 * 0.95;

      sunLight.intensity = 0.1 + sunHeight01 * 1.6;
      sunLight.color.copy(new THREE.Color(0xffd27f).lerp(new THREE.Color(0xffffff), sunHeight01));

      scene.background.copy(bgNight).lerp(bgDay, sunHeight01);
      scene.fog.color.copy(scene.background);

      return dayTime;
    }

    function updateState(dayTime) {
      window.__3D_STATE__ = {
        animalCount: animals.length,
        animals: animals.map(a => ({
          type: a.userData.type,
          name: a.name,
          x: Number(a.position.x.toFixed(3)),
          y: Number(a.position.y.toFixed(3)),
          z: Number(a.position.z.toFixed(3)),
          selected: !!a.userData.selected
        })),
        dayTime,
        selectedAnimal: selectedAnimal ? selectedAnimal.name : null
      };
    }

    window.__ICG_selectAnimal__ = function(indexOrName) {
      let animal = null;
      if (typeof indexOrName === 'number') {
        animal = animals[indexOrName] || null;
      } else {
        animal = animals.find(a => a.name === indexOrName) || null;
      }
      if (animal) setSelectedAnimal(animal);
      return animal ? animal.name : null;
    };

    window.__ICG_triggerFeed__ = function() {
      if (selectedAnimal) {
        triggerFeed(selectedAnimal);
        return true;
      }
      return false;
    };

    updateAnimalInfo();

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);
      const elapsed = clock.getElapsedTime();

      updateAnimals(dt, elapsed);
      const dayTime = updateDayNight(elapsed);
      updateState(dayTime);

      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
