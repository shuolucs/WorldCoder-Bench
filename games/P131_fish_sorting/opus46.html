<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 鱼类分拣游戏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a1628; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  
  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #e0f0ff;
    font-size: 16px;
    background: rgba(0, 20, 60, 0.75);
    padding: 18px 24px;
    border-radius: 14px;
    border: 1px solid rgba(100, 180, 255, 0.3);
    backdrop-filter: blur(10px);
    min-width: 200px;
    box-shadow: 0 4px 20px rgba(0, 50, 120, 0.4);
    z-index: 10;
  }
  #hud h2 {
    margin-bottom: 12px;
    font-size: 20px;
    color: #60c0ff;
    text-align: center;
    text-shadow: 0 0 10px rgba(96, 192, 255, 0.5);
  }
  #hud .stat {
    display: flex;
    justify-content: space-between;
    margin: 8px 0;
    padding: 4px 0;
    border-bottom: 1px solid rgba(100, 180, 255, 0.1);
  }
  #hud .stat:last-child { border-bottom: none; }
  #hud .label { color: #8ab8e0; }
  #hud .value { font-weight: bold; color: #fff; }
  #timer { color: #ffcc00 !important; font-size: 18px !important; }
  
  #game-over {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 15, 50, 0.92);
    color: #fff;
    padding: 50px 60px;
    border-radius: 20px;
    text-align: center;
    border: 2px solid rgba(100, 180, 255, 0.4);
    box-shadow: 0 0 60px rgba(0, 100, 255, 0.3);
    backdrop-filter: blur(15px);
    z-index: 100;
  }
  #game-over h1 {
    font-size: 36px;
    margin-bottom: 20px;
    color: #60c0ff;
    text-shadow: 0 0 20px rgba(96, 192, 255, 0.6);
  }
  #game-over p {
    font-size: 20px;
    margin: 10px 0;
    color: #c0d8f0;
  }
  #game-over .final-score {
    font-size: 52px;
    font-weight: bold;
    color: #ffcc00;
    margin: 20px 0;
    text-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
  }
  #game-over button {
    margin-top: 25px;
    padding: 14px 40px;
    font-size: 18px;
    background: linear-gradient(135deg, #1a6baa, #2090dd);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s;
  }
  #game-over button:hover {
    background: linear-gradient(135deg, #2090dd, #30b0ff);
    box-shadow: 0 0 20px rgba(32, 144, 221, 0.5);
  }
  
  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #60c0ff;
    font-size: 24px;
    text-align: center;
    z-index: 200;
  }
  #loading .spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(96, 192, 255, 0.2);
    border-top-color: #60c0ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .feedback {
    position: absolute;
    font-size: 28px;
    font-weight: bold;
    pointer-events: none;
    animation: floatUp 1.2s ease-out forwards;
    z-index: 50;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .feedback.correct { color: #00ff88; }
  .feedback.wrong { color: #ff4466; }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-80px); }
  }
</style>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>加载鱼类模型中...</div>
</div>

<div id="hud">
  <h2>🐟 鱼类分拣</h2>
  <div class="stat">
    <span class="label">⏱ 时间</span>
    <span class="value" id="timer">90s</span>
  </div>
  <div class="stat">
    <span class="label">🏆 得分</span>
    <span class="value" id="score">0</span>
  </div>
  <div class="stat">
    <span class="label">📦 已分拣</span>
    <span class="value" id="sorted">0/10</span>
  </div>
  <div class="stat">
    <span class="label">🎯 正确率</span>
    <span class="value" id="accuracy">0%</span>
  </div>
</div>

<div id="game-over">
  <h1>⏰ 游戏结束!</h1>
  <div class="final-score" id="final-score">0</div>
  <p>已分拣: <span id="final-sorted">0</span>/10</p>
  <p>正确率: <span id="final-accuracy">0%</span></p>
  <button onclick="location.reload()">🔄 再来一局</button>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ Game State ============
let score = 0;
let sortedCount = 0;
let correctCount = 0;
let totalAttempts = 0;
let timeRemaining = 90;
let gameOver = false;
let modelLoaded = false;

const fishData = []; // { mesh, size: 'small'|'medium'|'large', originalPos, sorted }
const containers = []; // { mesh, label, size }

window.__3D_STATE__ = {
  modelLoaded: false,
  score: 0,
  sortedCount: 0,
  accuracy: 0,
  timeRemaining: 90,
  fishRemaining: 10
};

// ============ Scene Setup ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1e3d);
scene.fog = new THREE.FogExp2(0x0a1e3d, 0.015);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 12, 18);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minDistance = 8;
controls.maxDistance = 35;
controls.target.set(0, 1, 0);

// ============ Lights ============
const ambientLight = new THREE.AmbientLight(0x4488cc, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5);
dirLight.position.set(8, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 40;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x6688cc, 0.4);
fillLight.position.set(-5, 8, -5);
scene.add(fillLight);

const pointLight = new THREE.PointLight(0x00aaff, 0.5, 30);
pointLight.position.set(0, 8, 0);
scene.add(pointLight);

// ============ Ground / Water Surface ============
const groundGeo = new THREE.PlaneGeometry(40, 30);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x0d2847,
  roughness: 0.3,
  metalness: 0.1,
  transparent: true,
  opacity: 0.9
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.5;
ground.receiveShadow = true;
scene.add(ground);

// Water caustics effect - subtle grid
const gridHelper = new THREE.GridHelper(40, 40, 0x1a4a7a, 0x0d2a50);
gridHelper.position.y = -0.49;
gridHelper.material.opacity = 0.3;
gridHelper.material.transparent = true;
scene.add(gridHelper);

// ============ Bubbles (particles) ============
const bubbleCount = 80;
const bubbleGeo = new THREE.BufferGeometry();
const bubblePositions = new Float32Array(bubbleCount * 3);
const bubbleSpeeds = [];
for (let i = 0; i < bubbleCount; i++) {
  bubblePositions[i * 3] = (Math.random() - 0.5) * 30;
  bubblePositions[i * 3 + 1] = Math.random() * 15 - 2;
  bubblePositions[i * 3 + 2] = (Math.random() - 0.5) * 20;
  bubbleSpeeds.push(0.005 + Math.random() * 0.02);
}
bubbleGeo.setAttribute('position', new THREE.BufferAttribute(bubblePositions, 3));
const bubbleMat = new THREE.PointsMaterial({
  color: 0x88ccff,
  size: 0.12,
  transparent: true,
  opacity: 0.5,
  blending: THREE.AdditiveBlending
});
const bubbles = new THREE.Points(bubbleGeo, bubbleMat);
scene.add(bubbles);

// ============ Create Containers ============
const containerSizes = [
  { label: '小', size: 'small', color: 0x22aa44 },
  { label: '中', size: 'medium', color: 0x2266cc },
  { label: '大', size: 'large', color: 0xcc6622 }
];

const containerSpacing = 6;
const containerY = -0.3;
const containerZ = -6;

containerSizes.forEach((cs, i) => {
  const group = new THREE.Group();
  
  // Box container
  const boxW = 4, boxH = 2.5, boxD = 3.5;
  
  // Bottom
  const bottomGeo = new THREE.BoxGeometry(boxW, 0.15, boxD);
  const bottomMat = new THREE.MeshStandardMaterial({ color: cs.color, roughness: 0.4, metalness: 0.2 });
  const bottom = new THREE.Mesh(bottomGeo, bottomMat);
  bottom.position.y = 0;
  bottom.receiveShadow = true;
  group.add(bottom);
  
  // Walls (transparent)
  const wallMat = new THREE.MeshStandardMaterial({
    color: cs.color,
    transparent: true,
    opacity: 0.25,
    roughness: 0.1,
    metalness: 0.3,
    side: THREE.DoubleSide
  });
  
  // Front wall
  const frontGeo = new THREE.BoxGeometry(boxW, boxH, 0.08);
  const front = new THREE.Mesh(frontGeo, wallMat);
  front.position.set(0, boxH / 2, boxD / 2);
  group.add(front);
  
  // Back wall
  const back = new THREE.Mesh(frontGeo, wallMat);
  back.position.set(0, boxH / 2, -boxD / 2);
  group.add(back);
  
  // Left wall
  const sideGeo = new THREE.BoxGeometry(0.08, boxH, boxD);
  const left = new THREE.Mesh(sideGeo, wallMat);
  left.position.set(-boxW / 2, boxH / 2, 0);
  group.add(left);
  
  // Right wall
  const right = new THREE.Mesh(sideGeo, wallMat);
  right.position.set(boxW / 2, boxH / 2, 0);
  group.add(right);
  
  // Edge glow lines
  const edgeMat = new THREE.LineBasicMaterial({ color: cs.color, transparent: true, opacity: 0.6 });
  const edgePoints = [
    new THREE.Vector3(-boxW/2, 0, -boxD/2),
    new THREE.Vector3(boxW/2, 0, -boxD/2),
    new THREE.Vector3(boxW/2, 0, boxD/2),
    new THREE.Vector3(-boxW/2, 0, boxD/2),
    new THREE.Vector3(-boxW/2, 0, -boxD/2),
    new THREE.Vector3(-boxW/2, boxH, -boxD/2),
    new THREE.Vector3(boxW/2, boxH, -boxD/2),
    new THREE.Vector3(boxW/2, 0, -boxD/2),
  ];
  const edgeGeo2 = new THREE.BufferGeometry().setFromPoints(edgePoints);
  const edgeLine = new THREE.Line(edgeGeo2, edgeMat);
  group.add(edgeLine);
  
  // Label using sprite
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, 256, 128);
  ctx.font = 'bold 72px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 4;
  ctx.strokeText(cs.label, 128, 55);
  ctx.fillText(cs.label, 128, 55);
  
  // Size hint text
  ctx.font = '28px Arial';
  ctx.fillStyle = '#aaddff';
  const sizeHint = cs.size === 'small' ? '(0.5x)' : cs.size === 'medium' ? '(1.0x)' : '(1.5x)';
  ctx.fillText(sizeHint, 128, 100);
  
  const texture = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(3, 1.5, 1);
  sprite.position.set(0, boxH + 1.2, 0);
  group.add(sprite);
  
  const x = (i - 1) * containerSpacing;
  group.position.set(x, containerY, containerZ);
  scene.add(group);
  
  containers.push({
    group,
    size: cs.size,
    label: cs.label,
    bounds: {
      minX: x - boxW / 2,
      maxX: x + boxW / 2,
      minZ: containerZ - boxD / 2,
      maxZ: containerZ + boxD / 2
    },
    fishCount: 0
  });
});

// ============ Load Fish Model ============
const loader = new GLTFLoader();
const fishGroup = new THREE.Group();
scene.add(fishGroup);

const sizeConfig = [
  { size: 'small', scale: 0.5, count: 4 },
  { size: 'medium', scale: 1.0, count: 3 },
  { size: 'large', scale: 1.5, count: 3 }
];

loader.load('assets/BarramundiFish.glb', (gltf) => {
  const originalModel = gltf.scene;
  
  let fishIndex = 0;
  sizeConfig.forEach(cfg => {
    for (let i = 0; i < cfg.count; i++) {
      const fishClone = originalModel.clone();
      
      // Scale
      const s = cfg.scale * 3;
      fishClone.scale.set(s, s, s);
      
      // Random position in upper area
      const x = (Math.random() - 0.5) * 16;
      const z = (Math.random() - 0.5) * 6 + 4;
      const y = 0.5 + Math.random() * 0.5;
      fishClone.position.set(x, y, z);
      
      // Random rotation
      fishClone.rotation.y = (Math.random() - 0.5) * Math.PI * 0.5;
      
      fishClone.traverse(child => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          // Store original material for color changes
          child.userData.originalMaterial = child.material.clone();
        }
      });
      
      fishClone.userData.fishIndex = fishIndex;
      fishClone.userData.fishSize = cfg.size;
      
      fishGroup.add(fishClone);
      
      fishData.push({
        mesh: fishClone,
        size: cfg.size,
        scaleValue: cfg.scale,
        originalPos: new THREE.Vector3(x, y, z),
        sorted: false,
        animPhase: Math.random() * Math.PI * 2,
        animSpeed: 0.5 + Math.random() * 0.5
      });
      
      fishIndex++;
    }
  });
  
  modelLoaded = true;
  document.getElementById('loading').style.display = 'none';
  startTimer();
  
}, (progress) => {
  // Loading progress
}, (error) => {
  console.error('Error loading fish model:', error);
  // Fallback: create simple fish shapes
  createFallbackFish();
});

function createFallbackFish() {
  let fishIndex = 0;
  sizeConfig.forEach(cfg => {
    for (let i = 0; i < cfg.count; i++) {
      const group = new THREE.Group();
      
      // Body
      const bodyGeo = new THREE.ConeGeometry(0.3 * cfg.scale, 1.2 * cfg.scale, 8);
      bodyGeo.rotateZ(Math.PI / 2);
      const bodyMat = new THREE.MeshStandardMaterial({
        color: new THREE.Color().setHSL(0.55 + Math.random() * 0.1, 0.7, 0.5),
        roughness: 0.3,
        metalness: 0.4
      });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.castShadow = true;
      body.userData.originalMaterial = bodyMat.clone();
      group.add(body);
      
      // Tail
      const tailGeo = new THREE.ConeGeometry(0.25 * cfg.scale, 0.4 * cfg.scale, 4);
      tailGeo.rotateZ(-Math.PI / 2);
      const tail = new THREE.Mesh(tailGeo, bodyMat);
      tail.position.x = -0.7 * cfg.scale;
      tail.userData.originalMaterial = bodyMat.clone();
      group.add(tail);
      
      // Eye
      const eyeGeo = new THREE.SphereGeometry(0.06 * cfg.scale);
      const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
      const eye = new THREE.Mesh(eyeGeo, eyeMat);
      eye.position.set(0.35 * cfg.scale, 0.12 * cfg.scale, 0.2 * cfg.scale);
      group.add(eye);
      
      const s = 3;
      group.scale.set(s, s, s);
      
      const x = (Math.random() - 0.5) * 16;
      const z = (Math.random() - 0.5) * 6 + 4;
      const y = 0.5 + Math.random() * 0.5;
      group.position.set(x, y, z);
      group.rotation.y = (Math.random() - 0.5) * Math.PI * 0.5;
      
      group.userData.fishIndex = fishIndex;
      group.userData.fishSize = cfg.size;
      
      fishGroup.add(group);
      
      fishData.push({
        mesh: group,
        size: cfg.size,
        scaleValue: cfg.scale,
        originalPos: new THREE.Vector3(x, y, z),
        sorted: false,
        animPhase: Math.random() * Math.PI * 2,
        animSpeed: 0.5 + Math.random() * 0.5
      });
      
      fishIndex++;
    }
  });
  
  modelLoaded = true;
  document.getElementById('loading').style.display = 'none';
  startTimer();
}

// ============ Drag & Drop ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const intersection = new THREE.Vector3();

let isDragging = false;
let draggedFish = null;
let draggedFishData = null;
let dragOffset = new THREE.Vector3();

function getFishRoot(object) {
  let current = object;
  while (current.parent && current.parent !== fishGroup) {
    current = current.parent;
  }
  if (current.parent === fishGroup) return current;
  return null;
}

renderer.domElement.addEventListener('pointerdown', (event) => {
  if (gameOver) return;
  
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  
  const meshes = [];
  fishGroup.traverse(child => {
    if (child.isMesh) meshes.push(child);
  });
  
  const intersects = raycaster.intersectObjects(meshes, false);
  
  if (intersects.length > 0) {
    const fishRoot = getFishRoot(intersects[0].object);
    if (!fishRoot) return;
    
    const fd = fishData.find(f => f.mesh === fishRoot);
    if (!fd || fd.sorted) return;
    
    isDragging = true;
    draggedFish = fishRoot;
    draggedFishData = fd;
    controls.enabled = false;
    
    // Calculate offset
    dragPlane.constant = -fishRoot.position.y;
    raycaster.ray.intersectPlane(dragPlane, intersection);
    dragOffset.copy(fishRoot.position).sub(intersection);
    
    // Highlight
    fishRoot.traverse(child => {
      if (child.isMesh) {
        child.material = child.material.clone();
        child.material.emissive = new THREE.Color(0x224466);
        child.material.emissiveIntensity = 0.3;
      }
    });
    
    renderer.domElement.style.cursor = 'grabbing';
  }
});

renderer.domElement.addEventListener('pointermove', (event) => {
  if (!isDragging || !draggedFish) return;
  
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  raycaster.ray.intersectPlane(dragPlane, intersection);
  
  draggedFish.position.x = intersection.x + dragOffset.x;
  draggedFish.position.z = intersection.z + dragOffset.z;
});

renderer.domElement.addEventListener('pointerup', (event) => {
  if (!isDragging || !draggedFish || !draggedFishData) return;
  
  isDragging = false;
  controls.enabled = true;
  renderer.domElement.style.cursor = 'default';
  
  // Check if fish is over a container
  const fishPos = draggedFish.position;
  let matchedContainer = null;
  
  for (const container of containers) {
    if (fishPos.x >= container.bounds.minX && fishPos.x <= container.bounds.maxX &&
        fishPos.z >= container.bounds.minZ && fishPos.z <= container.bounds.maxZ) {
      matchedContainer = container;
      break;
    }
  }
  
  if (matchedContainer) {
    totalAttempts++;
    
    if (matchedContainer.size === draggedFishData.size) {
      // Correct!
      correctCount++;
      score += 10;
      sortedCount++;
      draggedFishData.sorted = true;
      matchedContainer.fishCount++;
      
      // Turn green
      setFishColor(draggedFish, 0x00ff88);
      
      // Animate into container
      const targetY = containerY + 0.3 + matchedContainer.fishCount * 0.4;
      const targetX = matchedContainer.group.position.x + (Math.random() - 0.5) * 1.5;
      const targetZ = matchedContainer.group.position.z + (Math.random() - 0.5) * 1;
      
      animateFishTo(draggedFish, targetX, targetY, targetZ, 0.4);
      
      showFeedback(event.clientX, event.clientY, '+10', true);
      
    } else {
      // Wrong!
      score = Math.max(0, score - 5);
      
      // Turn red temporarily
      setFishColor(draggedFish, 0xff4466);
      
      // Bounce back
      const fd = draggedFishData;
      animateFishTo(draggedFish, fd.originalPos.x, fd.originalPos.y, fd.originalPos.z, 0.5, () => {
        resetFishColor(draggedFish);
      });
      
      showFeedback(event.clientX, event.clientY, '-5', false);
    }
  } else {
    // Dropped outside containers - return to original
    resetFishColor(draggedFish);
    const fd = draggedFishData;
    animateFishTo(draggedFish, fd.originalPos.x, fd.originalPos.y, fd.originalPos.z, 0.4);
  }
  
  updateHUD();
  
  draggedFish = null;
  draggedFishData = null;
  
  // Check win condition
  if (sortedCount >= 10) {
    endGame();
  }
});

function setFishColor(fishMesh, color) {
  fishMesh.traverse(child => {
    if (child.isMesh) {
      child.material = child.material.clone();
      child.material.color.set(color);
      child.material.emissive = new THREE.Color(color);
      child.material.emissiveIntensity = 0.4;
    }
  });
}

function resetFishColor(fishMesh) {
  fishMesh.traverse(child => {
    if (child.isMesh && child.userData.originalMaterial) {
      child.material = child.userData.originalMaterial.clone();
    }
  });
}

// ============ Animation helpers ============
const animations = [];

function animateFishTo(fish, tx, ty, tz, duration, onComplete) {
  const startPos = fish.position.clone();
  const startTime = performance.now();
  
  animations.push({
    fish,
    startPos,
    targetPos: new THREE.Vector3(tx, ty, tz),
    startTime,
    duration: duration * 1000,
    onComplete
  });
}

function updateAnimations() {
  const now = performance.now();
  for (let i = animations.length - 1; i >= 0; i--) {
    const anim = animations[i];
    let t = (now - anim.startTime) / anim.duration;
    
    if (t >= 1) {
      t = 1;
      anim.fish.position.copy(anim.targetPos);
      if (anim.onComplete) anim.onComplete();
      animations.splice(i, 1);
    } else {
      // Ease out cubic
      t = 1 - Math.pow(1 - t, 3);
      anim.fish.position.lerpVectors(anim.startPos, anim.targetPos, t);
      // Arc
      const arc = Math.sin(t * Math.PI) * 1.5;
      anim.fish.position.y += arc;
    }
  }
}

// ============ Feedback popup ============
function showFeedback(x, y, text, isCorrect) {
  const div = document.createElement('div');
  div.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
  div.textContent = text;
  div.style.left = x + 'px';
  div.style.top = y + 'px';
  document.body.appendChild(div);
  
  setTimeout(() => div.remove(), 1200);
}

// ============ Timer ============
let timerInterval = null;

function startTimer() {
  timerInterval = setInterval(() => {
    if (gameOver) return;
    
    timeRemaining--;
    if (timeRemaining <= 0) {
      timeRemaining = 0;
      endGame();
    }
    updateHUD();
  }, 1000);
}

function endGame() {
  gameOver = true;
  if (timerInterval) clearInterval(timerInterval);
  
  const accuracy = totalAttempts > 0 ? Math.round((correctCount / totalAttempts) * 100) : 0;
  
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-sorted').textContent = sortedCount;
  document.getElementById('final-accuracy').textContent = accuracy + '%';
  document.getElementById('game-over').style.display = 'block';
}

// ============ HUD Update ============
function updateHUD() {
  const accuracy = totalAttempts > 0 ? Math.round((correctCount / totalAttempts) * 100) : 0;
  
  document.getElementById('score').textContent = score;
  document.getElementById('sorted').textContent = `${sortedCount}/10`;
  document.getElementById('accuracy').textContent = accuracy + '%';
  document.getElementById('timer').textContent = timeRemaining + 's';
  
  // Color timer when low
  const timerEl = document.getElementById('timer');
  if (timeRemaining <= 10) {
    timerEl.style.color = '#ff4466';
  } else if (timeRemaining <= 30) {
    timerEl.style.color = '#ffaa00';
  }
  
  // Update global state
  window.__3D_STATE__ = {
    modelLoaded,
    score,
    sortedCount,
    accuracy,
    timeRemaining,
    fishRemaining: 10 - sortedCount
  };
}

// ============ Animate Loop ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const elapsed = clock.getElapsedTime();
  const delta = clock.getDelta();
  
  controls.update();
  
  // Animate unsorted fish (idle swimming)
  fishData.forEach(fd => {
    if (fd.sorted) return;
    if (isDragging && draggedFish === fd.mesh) return;
    
    const t = elapsed * fd.animSpeed + fd.animPhase;
    fd.mesh.position.y = fd.originalPos.y + Math.sin(t * 2) * 0.15;
    fd.mesh.rotation.y += Math.sin(t) * 0.002;
    // Subtle side sway
    fd.mesh.position.x = fd.originalPos.x + Math.sin(t * 0.7) * 0.1;
  });
  
  // Animate bubbles
  const positions = bubbles.geometry.attributes.position.array;
  for (let i = 0; i < bubbleCount; i++) {
    positions[i * 3 + 1] += bubbleSpeeds[i];
    if (positions[i * 3 + 1] > 12) {
      positions[i * 3 + 1] = -2;
      positions[i * 3] = (Math.random() - 0.5) * 30;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 20;
    }
  }
  bubbles.geometry.attributes.position.needsUpdate = true;
  
  // Container glow pulse
  containers.forEach((c, i) => {
    const pulse = 0.2 + Math.sin(elapsed * 2 + i) * 0.08;
    c.group.children.forEach(child => {
      if (child.isMesh && child.material.transparent && child.material.opacity < 0.5) {
        child.material.opacity = pulse;
      }
    });
  });
  
  // Update drag animations
  updateAnimations();
  
  // Update state every frame
  window.__3D_STATE__ = {
    modelLoaded,
    score,
    sortedCount,
    accuracy: totalAttempts > 0 ? Math.round((correctCount / totalAttempts) * 100) : 0,
    timeRemaining,
    fishRemaining: 10 - sortedCount
  };
  
  renderer.render(scene, camera);
}

animate();

// ============ Resize ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
