<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 鱼类分拣游戏</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #87c8ff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0, 0, 0, 0.35);
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 180px;
      line-height: 1.7;
      backdrop-filter: blur(4px);
      user-select: none;
    }

    #message {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 14px;
      border-radius: 10px;
      max-width: 320px;
      line-height: 1.5;
      user-select: none;
    }

    #gameOver {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.45);
    }

    #gameOver .panel {
      color: #fff;
      background: rgba(0, 0, 0, 0.72);
      padding: 24px 28px;
      border-radius: 14px;
      text-align: center;
      min-width: 240px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    #gameOver button {
      margin-top: 14px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #4fc3f7;
      color: #07243a;
      font-size: 15px;
      cursor: pointer;
      font-weight: bold;
    }

    #loading {
      position: absolute;
      inset: 0;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      background: linear-gradient(180deg, rgba(80,155,220,0.45), rgba(19,77,125,0.45));
      font-size: 22px;
      letter-spacing: 1px;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div>得分：<span id="score">0</span></div>
      <div>已分拣数：<span id="sorted">0</span></div>
      <div>正确率：<span id="accuracy">0%</span></div>
      <div>剩余时间：<span id="timer">90</span>s</div>
    </div>

    <div id="message">
      拖动鱼到下方对应大小容器：小 / 中 / 大
    </div>

    <div id="loading">模型加载中...</div>

    <div id="gameOver">
      <div class="panel">
        <h2>游戏结束</h2>
        <div id="finalScore">最终得分：0</div>
        <div id="finalSorted">已分拣：0</div>
        <div id="finalAccuracy">正确率：0%</div>
        <button id="restartBtn">重新开始</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const scoreEl = document.getElementById('score');
    const sortedEl = document.getElementById('sorted');
    const accuracyEl = document.getElementById('accuracy');
    const timerEl = document.getElementById('timer');
    const loadingEl = document.getElementById('loading');
    const gameOverEl = document.getElementById('gameOver');
    const finalScoreEl = document.getElementById('finalScore');
    const finalSortedEl = document.getElementById('finalSorted');
    const finalAccuracyEl = document.getElementById('finalAccuracy');
    const restartBtn = document.getElementById('restartBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 25, 60);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 12, 22);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 3, 0);
    controls.minDistance = 10;
    controls.maxDistance = 35;
    controls.maxPolarAngle = Math.PI * 0.48;

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.3);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.3);
    dirLight.position.set(12, 18, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    scene.add(dirLight);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 30),
      new THREE.MeshPhongMaterial({ color: 0x6cc4ff, transparent: true, opacity: 0.85 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    floor.receiveShadow = true;
    scene.add(floor);

    const grid = new THREE.GridHelper(40, 40, 0xffffff, 0x5aa9d6);
    grid.position.y = 0.01;
    scene.add(grid);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const dragIntersect = new THREE.Vector3();
    const dragOffset = new THREE.Vector3();

    let modelLoaded = false;
    let baseFishModel = null;
    let fishes = [];
    let draggableFishes = [];
    let containers = [];
    let labels = [];

    let draggedFish = null;
    let gameEnded = false;

    let score = 0;
    let sortedCount = 0;
    let attempts = 0;
    let timeRemaining = 90;
    let lastTimerTick = performance.now();

    const fishConfigs = [
      { size: '小', scale: 0.5, count: 4, color: 0x8ecae6 },
      { size: '中', scale: 1.0, count: 3, color: 0x90be6d },
      { size: '大', scale: 1.5, count: 3, color: 0xf9c74f }
    ];

    function createTextSprite(text) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(18, 22, 220, 84);
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.lineWidth = 4;
      ctx.strokeRect(18, 22, 220, 84);

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 54px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, 128, 64);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;

      const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(3.8, 1.9, 1);
      return sprite;
    }

    function createContainers() {
      const defs = [
        { size: '小', x: -8, color: 0x4fc3f7 },
        { size: '中', x: 0, color: 0x81c784 },
        { size: '大', x: 8, color: 0xffb74d }
      ];

      defs.forEach(def => {
        const box = new THREE.Mesh(
          new THREE.BoxGeometry(4.8, 2.4, 4.8),
          new THREE.MeshPhongMaterial({
            color: def.color,
            transparent: true,
            opacity: 0.35
          })
        );
        box.position.set(def.x, 1.2, 8);
        box.receiveShadow = true;
        scene.add(box);

        const edges = new THREE.LineSegments(
          new THREE.EdgesGeometry(box.geometry),
          new THREE.LineBasicMaterial({ color: 0xffffff })
        );
        edges.position.copy(box.position);
        scene.add(edges);

        const label = createTextSprite(def.size);
        label.position.set(def.x, 4.2, 8);
        scene.add(label);
        labels.push(label);

        containers.push({
          size: def.size,
          mesh: box,
          bounds: new THREE.Box3().setFromObject(box)
        });
      });
    }

    function traverseFishMaterials(object, callback) {
      object.traverse(child => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          if (Array.isArray(child.material)) {
            child.material = child.material.map(mat => {
              const cloned = mat.clone();
              callback(cloned);
              return cloned;
            });
          } else if (child.material) {
            child.material = child.material.clone();
            callback(child.material);
          }
        }
      });
    }

    function tintFish(fish, color) {
      fish.traverse(child => {
        if (child.isMesh) {
          if (Array.isArray(child.material)) {
            child.material.forEach(mat => {
              if (mat.color) mat.color.set(color);
              if ('emissive' in mat) mat.emissive.set(color).multiplyScalar(0.15);
            });
          } else if (child.material) {
            if (child.material.color) child.material.color.set(color);
            if ('emissive' in child.material) child.material.emissive.set(color).multiplyScalar(0.15);
          }
        }
      });
    }

    function spawnFishes() {
      fishes = [];
      draggableFishes = [];

      fishConfigs.forEach(config => {
        for (let i = 0; i < config.count; i++) {
          const fish = baseFishModel.clone(true);

          traverseFishMaterials(fish, mat => {
            if (mat.color) mat.color.offsetHSL((Math.random() - 0.5) * 0.04, 0, 0);
          });

          fish.scale.setScalar(config.scale);
          fish.rotation.y = Math.random() * Math.PI * 2;
          fish.position.set(
            THREE.MathUtils.randFloatSpread(16),
            THREE.MathUtils.randFloat(5, 9),
            THREE.MathUtils.randFloat(-6, 2)
          );

          fish.userData = {
            isFish: true,
            size: config.size,
            sorted: false,
            originalPosition: fish.position.clone(),
            originalRotation: fish.rotation.clone(),
            originalScale: config.scale,
            bobOffset: Math.random() * Math.PI * 2,
            animSpeed: THREE.MathUtils.randFloat(0.8, 1.5)
          };

          scene.add(fish);
          fishes.push(fish);
          draggableFishes.push(fish);
        }
      });
    }

    function resetGame() {
      fishes.forEach(f => scene.remove(f));
      fishes = [];
      draggableFishes = [];
      draggedFish = null;
      gameEnded = false;
      score = 0;
      sortedCount = 0;
      attempts = 0;
      timeRemaining = 90;
      lastTimerTick = performance.now();
      gameOverEl.style.display = 'none';

      if (baseFishModel) {
        spawnFishes();
      }

      updateHUD();
    }

    function updateHUD() {
      const accuracy = attempts > 0 ? Math.round((sortedCount / attempts) * 100) : 0;
      scoreEl.textContent = score;
      sortedEl.textContent = sortedCount;
      accuracyEl.textContent = `${accuracy}%`;
      timerEl.textContent = timeRemaining;
    }

    function finishGame() {
      gameEnded = true;
      draggedFish = null;
      finalScoreEl.textContent = `最终得分：${score}`;
      finalSortedEl.textContent = `已分拣：${sortedCount}`;
      const accuracy = attempts > 0 ? Math.round((sortedCount / attempts) * 100) : 0;
      finalAccuracyEl.textContent = `正确率：${accuracy}%`;
      gameOverEl.style.display = 'flex';
    }

    function getFishRoot(object) {
      let current = object;
      while (current) {
        if (current.userData && current.userData.isFish) return current;
        current = current.parent;
      }
      return null;
    }

    function setPointer(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function onPointerDown(event) {
      if (gameEnded) return;
      setPointer(event);
      raycaster.setFromCamera(pointer, camera);

      const intersects = raycaster.intersectObjects(draggableFishes, true);
      if (!intersects.length) return;

      const fish = getFishRoot(intersects[0].object);
      if (!fish || fish.userData.sorted) return;

      draggedFish = fish;
      controls.enabled = false;

      if (raycaster.ray.intersectPlane(dragPlane, dragIntersect)) {
        dragOffset.copy(fish.position).sub(dragIntersect);
      }

      renderer.domElement.style.cursor = 'grabbing';
    }

    function onPointerMove(event) {
      if (!draggedFish) return;

      setPointer(event);
      raycaster.setFromCamera(pointer, camera);

      if (raycaster.ray.intersectPlane(dragPlane, dragIntersect)) {
        draggedFish.position.copy(dragIntersect).add(dragOffset);
        draggedFish.position.y = 1.8;
      }
    }

    function checkContainerForFish(fish) {
      const pos = fish.position;
      for (const container of containers) {
        const b = container.bounds;
        const withinX = pos.x >= b.min.x && pos.x <= b.max.x;
        const withinZ = pos.z >= b.min.z && pos.z <= b.max.z;
        if (withinX && withinZ) return container;
      }
      return null;
    }

    function animateBounceBack(fish) {
      fish.position.copy(fish.userData.originalPosition);
      fish.rotation.copy(fish.userData.originalRotation);
    }

    function settleFishInContainer(fish, container) {
      fish.userData.sorted = true;
      fish.position.set(
        container.mesh.position.x + THREE.MathUtils.randFloat(-1.1, 1.1),
        1.0,
        container.mesh.position.z + THREE.MathUtils.randFloat(-1.1, 1.1)
      );
      fish.rotation.y = Math.random() * Math.PI * 2;
    }

    function onPointerUp() {
      if (!draggedFish) return;

      const fish = draggedFish;
      draggedFish = null;
      controls.enabled = true;
      renderer.domElement.style.cursor = 'grab';

      const container = checkContainerForFish(fish);

      if (!container) {
        animateBounceBack(fish);
        return;
      }

      attempts++;

      if (container.size === fish.userData.size) {
        score += 10;
        sortedCount++;
        tintFish(fish, 0x22cc66);
        settleFishInContainer(fish, container);
        draggableFishes = draggableFishes.filter(f => f !== fish);
      } else {
        score -= 5;
        tintFish(fish, 0xff4444);
        setTimeout(() => {
          if (!fish.userData.sorted) {
            traverseFishMaterials(fish, () => {});
          }
        }, 250);
        animateBounceBack(fish);
      }

      updateHUD();

      if (sortedCount === fishes.length) {
        finishGame();
      }
    }

    function loadModel() {
      const loader = new GLTFLoader();
      loader.load(
        'assets/BarramundiFish.glb',
        gltf => {
          baseFishModel = gltf.scene;

          const box = new THREE.Box3().setFromObject(baseFishModel);
          const size = new THREE.Vector3();
          const center = new THREE.Vector3();
          box.getSize(size);
          box.getCenter(center);

          baseFishModel.position.sub(center);
          const maxDim = Math.max(size.x, size.y, size.z) || 1;
          const normalizeScale = 2.4 / maxDim;
          baseFishModel.scale.setScalar(normalizeScale);
          baseFishModel.rotation.y = Math.PI;

          traverseFishMaterials(baseFishModel, mat => {
            if ('metalness' in mat) mat.metalness = 0.1;
            if ('roughness' in mat) mat.roughness = 0.7;
          });

          spawnFishes();
          modelLoaded = true;
          loadingEl.style.display = 'none';
          updateHUD();
        },
        undefined,
        err => {
          console.error('模型加载失败:', err);
          loadingEl.textContent = '模型加载失败，请检查 assets/BarramundiFish.glb';
        }
      );
    }

    createContainers();
    loadModel();
    updateHUD();

    renderer.domElement.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);

    restartBtn.addEventListener('click', resetGame);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function updateTimer(now) {
      if (gameEnded || !modelLoaded) return;
      if (now - lastTimerTick >= 1000) {
        const deltaSeconds = Math.floor((now - lastTimerTick) / 1000);
        timeRemaining = Math.max(0, timeRemaining - deltaSeconds);
        lastTimerTick += deltaSeconds * 1000;
        updateHUD();
        if (timeRemaining <= 0) {
          finishGame();
        }
      }
    }

    function updateFishAnimation(elapsed) {
      fishes.forEach(fish => {
        if (fish.userData.sorted || fish === draggedFish) return;
        fish.position.y = fish.userData.originalPosition.y + Math.sin(elapsed * fish.userData.animSpeed + fish.userData.bobOffset) * 0.18;
        fish.rotation.z = Math.sin(elapsed * 1.6 + fish.userData.bobOffset) * 0.08;
      });
    }

    function updateState() {
      const accuracy = attempts > 0 ? Math.round((sortedCount / attempts) * 100) : 0;
      window.__3D_STATE__ = {
        modelLoaded,
        score,
        sortedCount,
        accuracy,
        timeRemaining,
        fishRemaining: fishes.length - sortedCount
      };
    }

    const clock = new THREE.Clock();

    function animate(now) {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();
      controls.update();
      updateTimer(now);
      updateFishAnimation(elapsed);
      updateState();

      renderer.render(scene, camera);
    }

    renderer.domElement.style.cursor = 'grab';
    animate(performance.now());
  </script>
</body>
</html>
