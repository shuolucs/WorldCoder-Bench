<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 鱼类分拣游戏</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: sans-serif;
            user-select: none;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 16px;
            line-height: 1.5;
            z-index: 10;
        }
        #hud span {
            font-weight: bold;
            color: #FFD700;
        }
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            z-index: 20;
            display: none;
        }
        #game-over h1 {
            margin: 0 0 20px 0;
            color: #4CAF50;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="hud">
        <div>得分: <span id="score">0</span></div>
        <div>已分拣: <span id="sorted">0</span>/10</div>
        <div>正确率: <span id="accuracy">0%</span></div>
        <div>剩余时间: <span id="timer">90</span>s</div>
    </div>
    <div id="game-over">
        <h1>游戏结束</h1>
        <div>最终得分: <span id="final-score">0</span></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Initialization ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            score: 0,
            sortedCount: 0,
            accuracy: 0,
            timeRemaining: 90,
            fishRemaining: 10
        };

        // --- Game Variables ---
        let score = 0;
        let sortedCount = 0;
        let totalAttempts = 0;
        let timeRemaining = 90;
        let gameOver = false;
        const FISH_TOTAL = 10;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 12, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 - 0.1; // Don't go below ground
        controls.minDistance = 5;
        controls.maxDistance = 25;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 15, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // --- Environment ---
        const floorGeo = new THREE.PlaneGeometry(50, 50);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xc2b280, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- Containers ---
        const containers = [];
        const containerConfigs = [
            { size: 'small', label: '小', x: -4, color: 0x4488ff },
            { size: 'medium', label: '中', x: 0, color: 0x44ff88 },
            { size: 'large', label: '大', x: 4, color: 0xff8844 }
        ];

        function createTextSprite(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 80px sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 4;
            ctx.strokeText(text, canvas.width / 2, canvas.height / 2);
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(2, 1, 1);
            return sprite;
        }

        const boxGeo = new THREE.BoxGeometry(2.5, 1.5, 2.5);
        containerConfigs.forEach(cfg => {
            const mat = new THREE.MeshStandardMaterial({ 
                color: cfg.color, 
                transparent: true, 
                opacity: 0.4,
                side: THREE.DoubleSide
            });
            const box = new THREE.Mesh(boxGeo, mat);
            box.position.set(cfg.x, 0.75, 3); // Lower row
            box.receiveShadow = true;
            box.userData = { size: cfg.size, isContainer: true };
            
            // Edges
            const edges = new THREE.EdgesGeometry(boxGeo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 }));
            box.add(line);

            // Label
            const label = createTextSprite(cfg.label);
            label.position.set(0, 1.2, 0);
            box.add(label);

            scene.add(box);
            containers.push(box);
        });

        // --- Fish Loading & Setup ---
        const fishGroup = new THREE.Group();
        scene.add(fishGroup);
        const draggableFishes = [];

        function processFishMaterials(object) {
            object.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    // Clone material to allow individual color changes
                    child.material = child.material.clone();
                    child.userData.originalColor = child.material.color.clone();
                }
            });
        }

        function setupFishes(baseModel) {
            const fishConfigs = [
                { size: 'small', scale: 0.5, count: 4 },
                { size: 'medium', scale: 1.0, count: 3 },
                { size: 'large', scale: 1.5, count: 3 }
            ];

            fishConfigs.forEach(cfg => {
                for (let i = 0; i < cfg.count; i++) {
                    const fish = baseModel.clone();
                    processFishMaterials(fish);
                    
                    fish.scale.setScalar(cfg.scale);
                    
                    // Random position in upper area
                    const rx = (Math.random() - 0.5) * 12;
                    const rz = -2 - Math.random() * 6;
                    fish.position.set(rx, 0.5, rz);
                    fish.rotation.y = Math.random() * Math.PI * 2;

                    fish.userData = {
                        isFish: true,
                        size: cfg.size,
                        originalPosition: fish.position.clone(),
                        originalRotation: fish.rotation.clone()
                    };

                    fishGroup.add(fish);
                    draggableFishes.push(fish);
                }
            });
            window.__3D_STATE__.modelLoaded = true;
        }

        // Load GLB with fallback
        const loader = new GLTFLoader();
        loader.load(
            'assets/BarramundiFish.glb',
            (gltf) => {
                setupFishes(gltf.scene);
            },
            undefined,
            (error) => {
                console.warn('Failed to load BarramundiFish.glb, using fallback geometry.', error);
                // Fallback: A simple fish-like shape
                const shape = new THREE.Group();
                const bodyGeo = new THREE.ConeGeometry(0.3, 1.2, 8);
                bodyGeo.rotateX(Math.PI / 2);
                const bodyMat = new THREE.MeshStandardMaterial({ color: 0x88aaff });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                shape.add(body);
                const tailGeo = new THREE.ConeGeometry(0.2, 0.5, 4);
                tailGeo.rotateX(-Math.PI / 2);
                const tailMat = new THREE.MeshStandardMaterial({ color: 0x6688cc });
                const tail = new THREE.Mesh(tailGeo, tailMat);
                tail.position.z = -0.7;
                shape.add(tail);
                setupFishes(shape);
            }
        );

        // --- Interaction (Drag & Drop) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -0.5); // Drag on y=0.5 plane
        
        let draggedFish = null;
        let dragOffset = new THREE.Vector3();
        const activeAnimations = [];

        function getRootFish(object) {
            let curr = object;
            while (curr && curr !== scene) {
                if (curr.userData && curr.userData.isFish) return curr;
                curr = curr.parent;
            }
            return null;
        }

        function setFishColor(fish, hexColor) {
            fish.traverse((child) => {
                if (child.isMesh && child.material) {
                    child.material.color.setHex(hexColor);
                }
            });
        }

        function resetFishColor(fish) {
            fish.traverse((child) => {
                if (child.isMesh && child.material && child.userData.originalColor) {
                    child.material.color.copy(child.userData.originalColor);
                }
            });
        }

        window.addEventListener('pointerdown', (e) => {
            if (gameOver || !window.__3D_STATE__.modelLoaded) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(draggableFishes, true);

            if (intersects.length > 0) {
                const fish = getRootFish(intersects[0].object);
                if (fish && draggableFishes.includes(fish)) {
                    controls.enabled = false;
                    draggedFish = fish;
                    
                    // Calculate offset
                    const intersectPoint = new THREE.Vector3();
                    raycaster.ray.intersectPlane(dragPlane, intersectPoint);
                    dragOffset.copy(intersectPoint).sub(fish.position);
                    
                    // Lift slightly while dragging
                    fish.position.y = 1.0;
                    dragPlane.constant = -1.0; 
                }
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!draggedFish) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersectPoint = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(dragPlane, intersectPoint)) {
                draggedFish.position.copy(intersectPoint.sub(dragOffset));
            }
        });

        window.addEventListener('pointerup', (e) => {
            if (!draggedFish) return;

            controls.enabled = true;
            dragPlane.constant = -0.5; // Reset plane height

            // Check drop target
            let targetContainer = null;
            for (const container of containers) {
                // 2D distance check (ignoring Y)
                const dx = draggedFish.position.x - container.position.x;
                const dz = draggedFish.position.z - container.position.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                
                if (dist < 2.0) { // Within container radius
                    targetContainer = container;
                    break;
                }
            }

            totalAttempts++;

            if (targetContainer) {
                if (draggedFish.userData.size === targetContainer.userData.size) {
                    // Correct
                    score += 10;
                    sortedCount++;
                    setFishColor(draggedFish, 0x00ff00);
                    
                    // Remove from draggable
                    const index = draggableFishes.indexOf(draggedFish);
                    if (index > -1) draggableFishes.splice(index, 1);

                    // Animate drop into container
                    activeAnimations.push({
                        obj: draggedFish,
                        type: 'drop',
                        targetPos: new THREE.Vector3(
                            targetContainer.position.x + (Math.random()-0.5)*1, 
                            0.2, 
                            targetContainer.position.z + (Math.random()-0.5)*1
                        ),
                        progress: 0
                    });

                } else {
                    // Incorrect
                    score -= 5;
                    setFishColor(draggedFish, 0xff0000);
                    
                    // Animate bounce back
                    activeAnimations.push({
                        obj: draggedFish,
                        type: 'bounce',
                        startPos: draggedFish.position.clone(),
                        targetPos: draggedFish.userData.originalPosition.clone(),
                        progress: 0
                    });
                }
            } else {
                // Dropped outside, bounce back without penalty
                activeAnimations.push({
                    obj: draggedFish,
                    type: 'bounce',
                    startPos: draggedFish.position.clone(),
                    targetPos: draggedFish.userData.originalPosition.clone(),
                    progress: 0
                });
            }

            draggedFish = null;
        });

        // --- Game Logic & Loop ---
        function endGame() {
            gameOver = true;
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('final-score').innerText = score;
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        let lastTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;

            // Timer logic
            if (!gameOver && window.__3D_STATE__.modelLoaded) {
                timeRemaining -= dt;
                if (timeRemaining <= 0) {
                    timeRemaining = 0;
                    endGame();
                } else if (sortedCount >= FISH_TOTAL) {
                    endGame();
                }
            }

            // Process Animations
            for (let i = activeAnimations.length - 1; i >= 0; i--) {
                const anim = activeAnimations[i];
                anim.progress += dt * 3; // Animation speed

                if (anim.progress >= 1) {
                    anim.progress = 1;
                    anim.obj.position.copy(anim.targetPos);
                    if (anim.type === 'bounce') {
                        resetFishColor(anim.obj);
                    }
                    activeAnimations.splice(i, 1);
                } else {
                    if (anim.type === 'drop') {
                        anim.obj.position.lerp(anim.targetPos, 0.15);
                    } else if (anim.type === 'bounce') {
                        // Parabolic arc
                        anim.obj.position.lerpVectors(anim.startPos, anim.targetPos, anim.progress);
                        anim.obj.position.y += Math.sin(anim.progress * Math.PI) * 2; 
                    }
                }
            }

            // Update HUD DOM
            document.getElementById('score').innerText = score;
            document.getElementById('sorted').innerText = sortedCount;
            const acc = totalAttempts === 0 ? 0 : Math.round((sortedCount / totalAttempts) * 100);
            document.getElementById('accuracy').innerText = acc + '%';
            document.getElementById('timer').innerText = Math.ceil(timeRemaining);

            // Update Global State
            window.__3D_STATE__.score = score;
            window.__3D_STATE__.sortedCount = sortedCount;
            window.__3D_STATE__.accuracy = acc;
            window.__3D_STATE__.timeRemaining = Math.ceil(timeRemaining);
            window.__3D_STATE__.fishRemaining = FISH_TOTAL - sortedCount;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
