<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D L-System Plant Growth</title>
<style>
  body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    color: #e0e0e0;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    min-width: 220px;
    z-index: 100;
  }
  #hud h3 {
    margin: 0 0 8px 0;
    color: #66bb6a;
    font-size: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding-bottom: 6px;
  }
  #hud .label { color: #aaa; }
  #hud .value { color: #fff; font-weight: bold; }
  #btnSnapshot {
    display: block;
    margin-top: 12px;
    padding: 8px 16px;
    background: linear-gradient(135deg, #66bb6a, #388e3c);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    width: 100%;
    transition: all 0.2s;
  }
  #btnSnapshot:hover { background: linear-gradient(135deg, #81c784, #43a047); transform: scale(1.02); }
  #controls {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: #999;
    background: rgba(0,0,0,0.6);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 12px;
    text-align: center;
    z-index: 100;
  }
  #controls span { margin: 0 10px; }
  #controls kbd {
    background: rgba(255,255,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    font-family: monospace;
    color: #ddd;
  }
</style>
</head>
<body>

<div id="hud">
  <h3>🌿 L-System Plant</h3>
  <div><span class="label">Generation: </span><span class="value" id="genDisplay">0</span></div>
  <div><span class="label">Branches: </span><span class="value" id="branchCount">0</span></div>
  <div><span class="label">Leaves: </span><span class="value" id="leafCount">0</span></div>
  <div><span class="label">Theme: </span><span class="value" id="themeDisplay">natural</span></div>
  <div><span class="label">Selected Depth: </span><span class="value" id="selectedDepth">-</span></div>
  <button id="btnSnapshot">📸 Snapshot Stats</button>
</div>

<div id="controls">
  <span><kbd>G</kbd> Grow</span>
  <span><kbd>R</kbd> Reset</span>
  <span><kbd>C</kbd> Color Theme</span>
  <span><kbd>L</kbd> Toggle Leaves</span>
  <span>🖱️ Click branch to inspect</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  // State
  window.__3D_STATE__ = {
    generation: 0,
    totalBranches: 0,
    totalLeaves: 0,
    growthProgress: 1.0,
    colorTheme: 'natural',
    leavesVisible: true,
    selectedBranchDepth: -1,
    maxGeneration: 4,
    isGrowing: false,
    plantHeight: 0,
    snapshotTaken: false,
    branchRadiusBase: 0.15
  };

  const state = window.__3D_STATE__;

  // Color themes
  const colorThemes = {
    natural: { base: 0x8B4513, tip: 0x228B22, leaf: 0x22aa22 },
    autumn: { base: 0xFF6600, tip: 0xCC0000, leaf: 0xCC0000 },
    fantasy: { base: 0x9900FF, tip: 0x00FFCC, leaf: 0x00FFCC }
  };
  const themeNames = ['natural', 'autumn', 'fantasy'];
  let currentThemeIndex = 0;

  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);
  scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 8, 15);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0, 4, 0);
  controls.update();

  // Lights
  const ambientLight = new THREE.AmbientLight(0x404040);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
  dirLight.position.set(5, 10, 5);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 50;
  dirLight.shadow.camera.left = -15;
  dirLight.shadow.camera.right = 15;
  dirLight.shadow.camera.top = 15;
  dirLight.shadow.camera.bottom = -15;
  scene.add(dirLight);

  // Ground plane
  const groundGeo = new THREE.PlaneGeometry(20, 20);
  const groundMat = new THREE.MeshLambertMaterial({ color: 0x3d5c2e });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = 0;
  ground.receiveShadow = true;
  scene.add(ground);

  // Grid helper
  const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x333333);
  gridHelper.position.y = 0.01;
  scene.add(gridHelper);

  // Plant group
  let plantGroup = new THREE.Group();
  scene.add(plantGroup);

  // Branch and leaf tracking
  let branches = [];
  let leaves = [];
  let selectedBranch = null;
  let originalMaterial = null;

  // L-System
  function generateLSystem(axiom, rules, iterations) {
    let current = axiom;
    for (let i = 0; i < iterations; i++) {
      let next = '';
      for (let ch of current) {
        next += rules[ch] || ch;
      }
      current = next;
    }
    return current;
  }

  const lRules = {
    'F': 'FF+[+F-F-F]-[-F+F+F]'
  };

  // Interpret L-system string and build geometry data
  function interpretLSystem(str, angle, segmentLength, generation) {
    const segments = [];
    const leafPositions = [];
    const stack = [];
    
    let pos = new THREE.Vector3(0, 0, 0);
    let dir = new THREE.Vector3(0, 1, 0);
    let right = new THREE.Vector3(1, 0, 0);
    let depth = 0;
    const angleRad = THREE.MathUtils.degToRad(angle);

    for (let i = 0; i < str.length; i++) {
      const ch = str[i];
      if (ch === 'F') {
        const start = pos.clone();
        const len = segmentLength * Math.pow(0.75, depth);
        const end = pos.clone().add(dir.clone().multiplyScalar(len));
        segments.push({ start: start, end: end, depth: depth });
        pos = end;
      } else if (ch === '+') {
        // Rotate around a random-ish axis for 3D effect
        const axis = new THREE.Vector3(
          Math.sin(depth * 1.3 + i * 0.1) * 0.3,
          1,
          Math.cos(depth * 0.7 + i * 0.2) * 0.3
        ).normalize();
        dir.applyAxisAngle(axis, angleRad);
        right.applyAxisAngle(axis, angleRad);
      } else if (ch === '-') {
        const axis = new THREE.Vector3(
          Math.sin(depth * 1.3 + i * 0.1) * 0.3,
          1,
          Math.cos(depth * 0.7 + i * 0.2) * 0.3
        ).normalize();
        dir.applyAxisAngle(axis, -angleRad);
        right.applyAxisAngle(axis, -angleRad);
      } else if (ch === '[') {
        stack.push({ pos: pos.clone(), dir: dir.clone(), right: right.clone(), depth: depth });
        depth++;
      } else if (ch === ']') {
        // Check if this is a terminal (next char is not F or is end)
        const isTerminal = (i + 1 >= str.length || str[i + 1] !== 'F');
        if (generation >= 2 && isTerminal) {
          leafPositions.push({ pos: pos.clone(), depth: depth });
        }
        if (stack.length > 0) {
          const s = stack.pop();
          pos = s.pos;
          dir = s.dir;
          right = s.right;
          depth = s.depth;
        }
      }
    }
    return { segments, leafPositions };
  }

  // Build plant meshes
  function buildPlant(generation) {
    // Clear existing
    clearPlant();

    if (generation === 0) {
      updateHUD();
      return;
    }

    const str = generateLSystem('F', lRules, generation);
    const segmentLength = 1.5;
    const data = interpretLSystem(str, 25, segmentLength, generation);

    const theme = colorThemes[state.colorTheme];
    const baseColor = new THREE.Color(theme.base);
    const tipColor = new THREE.Color(theme.tip);

    // Find max depth for color interpolation
    let maxDepth = 0;
    for (const seg of data.segments) {
      if (seg.depth > maxDepth) maxDepth = seg.depth;
    }
    if (maxDepth === 0) maxDepth = 1;

    // Create branches
    data.segments.forEach((seg, index) => {
      const start = seg.start;
      const end = seg.end;
      const direction = new THREE.Vector3().subVectors(end, start);
      const length = direction.length();
      if (length < 0.001) return;

      const radius = state.branchRadiusBase * Math.pow(0.7, seg.depth);
      const geometry = new THREE.CylinderGeometry(radius * 0.7, radius, length, 6, 1);
      
      const t = seg.depth / maxDepth;
      const color = baseColor.clone().lerp(tipColor, t);
      const material = new THREE.MeshLambertMaterial({ color: color });

      const mesh = new THREE.Mesh(geometry, material);
      
      // Position and orient
      const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      mesh.position.copy(midpoint);

      // Orient cylinder along direction
      const up = new THREE.Vector3(0, 1, 0);
      const quat = new THREE.Quaternion().setFromUnitVectors(up, direction.clone().normalize());
      mesh.quaternion.copy(quat);

      mesh.castShadow = true;
      mesh.receiveShadow = true;

      // Store metadata
      mesh.userData = {
        type: 'branch',
        depth: seg.depth,
        index: index,
        originalColor: color.clone(),
        targetScale: mesh.scale.clone()
      };

      // Start scaled to 0 for animation
      mesh.scale.set(0, 0, 0);

      plantGroup.add(mesh);
      branches.push(mesh);
    });

    // Create leaves
    const leafGeo = new THREE.SphereGeometry(0.1, 8, 6);
    data.leafPositions.forEach((lp, index) => {
      const leafColor = new THREE.Color(theme.leaf);
      const leafMat = new THREE.MeshLambertMaterial({ color: leafColor });
      const leaf = new THREE.Mesh(leafGeo, leafMat);
      leaf.position.copy(lp.pos);
      leaf.castShadow = true;
      leaf.userData = {
        type: 'leaf',
        depth: lp.depth,
        index: index,
        originalColor: leafColor.clone()
      };
      leaf.scale.set(0, 0, 0);
      leaf.visible = state.leavesVisible;
      plantGroup.add(leaf);
      leaves.push(leaf);
    });

    // Start growth animation
    startGrowthAnimation();
    updateHUD();
  }

  function clearPlant() {
    while (plantGroup.children.length > 0) {
      const child = plantGroup.children[0];
      plantGroup.remove(child);
      if (child.geometry) child.geometry.dispose();
      if (child.material) child.material.dispose();
    }
    branches = [];
    leaves = [];
    selectedBranch = null;
    originalMaterial = null;
    state.selectedBranchDepth = -1;
  }

  // Growth animation
  let growthStartTime = 0;
  const growthDuration = 2000; // 2 seconds

  function startGrowthAnimation() {
    state.isGrowing = true;
    state.growthProgress = 0;
    growthStartTime = performance.now();
  }

  function updateGrowthAnimation(now) {
    if (!state.isGrowing) return;

    const elapsed = now - growthStartTime;
    const progress = Math.min(elapsed / growthDuration, 1.0);
    state.growthProgress = progress;

    const totalItems = branches.length + leaves.length;
    if (totalItems === 0) {
      state.isGrowing = false;
      state.growthProgress = 1.0;
      return;
    }

    // Animate branches first, then leaves
    const branchPortion = branches.length / totalItems;

    branches.forEach((branch, i) => {
      const branchProgress = (i / branches.length) * branchPortion;
      const localProgress = Math.max(0, Math.min(1, (progress - branchProgress) / (1.0 / branches.length * 3)));
      
      const eased = easeOutBack(localProgress);
      const ts = branch.userData.targetScale || new THREE.Vector3(1, 1, 1);
      branch.scale.set(ts.x * eased, ts.y * eased, ts.z * eased);
    });

    leaves.forEach((leaf, i) => {
      const leafStart = branchPortion + (i / leaves.length) * (1 - branchPortion);
      const localProgress = Math.max(0, Math.min(1, (progress - leafStart) / (1.0 / Math.max(leaves.length, 1) * 3)));
      
      const eased = easeOutBack(localProgress);
      leaf.scale.set(eased, eased, eased);
    });

    if (progress >= 1.0) {
      state.isGrowing = false;
      state.growthProgress = 1.0;
      // Ensure all at full scale
      branches.forEach(b => {
        const ts = b.userData.targetScale || new THREE.Vector3(1, 1, 1);
        b.scale.copy(ts);
      });
      leaves.forEach(l => l.scale.set(1, 1, 1));
    }
  }

  function easeOutBack(t) {
    const c1 = 1.70158;
    const c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  }

  // Color theme update
  function updateColors() {
    const theme = colorThemes[state.colorTheme];
    const baseColor = new THREE.Color(theme.base);
    const tipColor = new THREE.Color(theme.tip);

    let maxDepth = 0;
    branches.forEach(b => { if (b.userData.depth > maxDepth) maxDepth = b.userData.depth; });
    if (maxDepth === 0) maxDepth = 1;

    branches.forEach(b => {
      if (b === selectedBranch) return; // Don't change highlighted branch
      const t = b.userData.depth / maxDepth;
      const color = baseColor.clone().lerp(tipColor, t);
      b.material.color.copy(color);
      b.userData.originalColor = color.clone();
    });

    const leafColor = new THREE.Color(theme.leaf);
    leaves.forEach(l => {
      l.material.color.copy(leafColor);
      l.userData.originalColor = leafColor.clone();
    });
  }

  // Selection
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  function onMouseClick(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(branches);

    // Deselect previous
    if (selectedBranch && originalMaterial) {
      selectedBranch.material.color.copy(originalMaterial);
      selectedBranch = null;
      originalMaterial = null;
      state.selectedBranchDepth = -1;
    }

    if (intersects.length > 0) {
      const hit = intersects[0].object;
      if (hit.userData.type === 'branch') {
        selectedBranch = hit;
        originalMaterial = hit.material.color.clone();
        hit.material.color.set(0xFFFF00);
        state.selectedBranchDepth = hit.userData.depth;
      }
    }

    updateHUD();
  }

  // HUD update
  function updateHUD() {
    document.getElementById('genDisplay').textContent = state.generation;
    document.getElementById('branchCount').textContent = state.totalBranches;
    document.getElementById('leafCount').textContent = state.totalLeaves;
    document.getElementById('themeDisplay').textContent = state.colorTheme;
    document.getElementById('selectedDepth').textContent = state.selectedBranchDepth >= 0 ? state.selectedBranchDepth : '-';
  }

  // Calculate plant height
  function calcPlantHeight() {
    let maxY = 0;
    branches.forEach(b => {
      const worldPos = new THREE.Vector3();
      b.getWorldPosition(worldPos);
      if (worldPos.y > maxY) maxY = worldPos.y;
    });
    leaves.forEach(l => {
      const worldPos = new THREE.Vector3();
      l.getWorldPosition(worldPos);
      if (worldPos.y > maxY) maxY = worldPos.y;
    });
    return maxY;
  }

  // Key handlers
  document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    
    if (key === 'g') {
      if (!state.isGrowing && state.generation < state.maxGeneration) {
        state.generation++;
        buildPlant(state.generation);
      }
    } else if (key === 'r') {
      state.generation = 0;
      state.isGrowing = false;
      state.growthProgress = 1.0;
      clearPlant();
      updateHUD();
    } else if (key === 'c') {
      currentThemeIndex = (currentThemeIndex + 1) % themeNames.length;
      state.colorTheme = themeNames[currentThemeIndex];
      updateColors();
      updateHUD();
    } else if (key === 'l') {
      state.leavesVisible = !state.leavesVisible;
      leaves.forEach(l => { l.visible = state.leavesVisible; });
    }
  });

  // Click handler
  renderer.domElement.addEventListener('click', onMouseClick);

  // Snapshot button
  document.getElementById('btnSnapshot').addEventListener('click', () => {
    state.snapshotTaken = true;
    console.log('Snapshot:', JSON.parse(JSON.stringify(state)));
  });

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Animation loop
  function animate(now) {
    requestAnimationFrame(animate);

    controls.update();

    updateGrowthAnimation(now);

    // Update state
    state.totalBranches = branches.length;
    state.totalLeaves = leaves.length;
    state.plantHeight = calcPlantHeight();

    // Subtle leaf animation
    leaves.forEach((leaf, i) => {
      if (leaf.visible && state.growthProgress >= 1.0) {
        leaf.position.y += Math.sin(now * 0.003 + i * 0.5) * 0.0003;
      }
    });

    updateHUD();

    renderer.render(scene, camera);
  }

  animate(performance.now());
})();
</script>
</body>
</html>
