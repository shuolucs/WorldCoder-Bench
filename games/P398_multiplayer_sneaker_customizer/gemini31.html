<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Sneaker Customizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .panel {
            background: rgba(20, 20, 40, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .bottom-bar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            max-width: 600px;
            margin: 0 auto;
        }
        .row {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        button.active {
            background: #4a90e2;
            border-color: #4a90e2;
            box-shadow: 0 0 10px rgba(74, 144, 226, 0.5);
        }
        .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: transform 0.2s;
            padding: 0;
        }
        .color-swatch:hover {
            transform: scale(1.1);
        }
        .color-swatch.active {
            border-color: #fff;
            box-shadow: 0 0 0 2px #4a90e2;
        }
        #price-display {
            font-size: 24px;
            font-weight: bold;
            color: #4ade80;
        }
        #sync-indicator {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .synced { background: rgba(74, 222, 128, 0.2); color: #4ade80; border: 1px solid #4ade80; }
        .unsynced { background: rgba(248, 113, 113, 0.2); color: #f87171; border: 1px solid #f87171; }
        .label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #aaa; margin-bottom: 5px; text-align: center; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; z-index: 10; pointer-events: none; }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="loading">Loading Model...</div>
    
    <div id="ui-container">
        <div class="top-bar">
            <div class="panel">
                <div class="label">Multiplayer</div>
                <div class="row">
                    <button id="player-toggle">Player 1</button>
                    <div id="sync-indicator" class="synced">Synced</div>
                </div>
            </div>
            <div class="panel">
                <div class="label">Total Price</div>
                <div id="price-display">$89.99</div>
            </div>
            <div class="panel">
                <div class="label">Controls</div>
                <div class="row">
                    <button id="rotate-toggle">Rotate: OFF</button>
                    <button id="snapshot-btn">Snapshot</button>
                    <button id="undo-btn" disabled>Undo</button>
                </div>
            </div>
        </div>

        <div class="bottom-bar panel">
            <div>
                <div class="label">Select Zone</div>
                <div class="row" id="zone-selector">
                    <button id="zone-sole" class="active" data-zone="sole">Sole</button>
                    <button id="zone-upper" data-zone="upper">Upper</button>
                    <button id="zone-tongue" data-zone="tongue">Tongue</button>
                    <button id="zone-laces" data-zone="laces">Laces</button>
                    <button id="zone-accent" data-zone="accent">Accent</button>
                </div>
            </div>
            
            <div>
                <div class="label">Material</div>
                <div class="row">
                    <button id="material-toggle">Matte</button>
                </div>
            </div>

            <div>
                <div class="label">Color</div>
                <div class="row" id="color-palette">
                    <button class="color-swatch" data-color="#ff4444" style="background-color: #ff4444;"></button>
                    <button class="color-swatch" data-color="#44ff44" style="background-color: #44ff44;"></button>
                    <button class="color-swatch" data-color="#4444ff" style="background-color: #4444ff;"></button>
                    <button class="color-swatch" data-color="#ffff44" style="background-color: #ffff44;"></button>
                    <button class="color-swatch" data-color="#ff44ff" style="background-color: #ff44ff;"></button>
                    <button class="color-swatch" data-color="#44ffff" style="background-color: #44ffff;"></button>
                    <button class="color-swatch" data-color="#ffffff" style="background-color: #ffffff;"></button>
                    <button class="color-swatch" data-color="#111111" style="background-color: #111111;"></button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        const ZONES = ['sole', 'upper', 'tongue', 'laces', 'accent'];
        const MATERIALS = ['matte', 'glossy', 'metallic'];
        const DEFAULT_COLOR = '#ffffff';
        const DEFAULT_MATERIAL = 'matte';

        const createInitialConfig = () => {
            const config = {};
            ZONES.forEach(z => config[z] = { color: DEFAULT_COLOR, material: DEFAULT_MATERIAL });
            return config;
        };

        window.__3D_STATE__ = {
            activePlayer: 1,
            activeZone: 'sole',
            playerConfigs: {
                1: createInitialConfig(),
                2: createInitialConfig()
            },
            currentMaterial: DEFAULT_MATERIAL,
            selectedColor: DEFAULT_COLOR,
            isRotating: false,
            rotationAngle: 0,
            price: 89.99,
            snapshotCount: 0,
            isSynced: true,
            modelLoaded: false,
            meshCount: 0,
            cameraDistance: 3,
            zoneColors: {}
        };

        let history = [];
        let modelGroup = new THREE.Group();
        let zoneMeshes = {};
        let clock = new THREE.Clock();

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        // Background is handled by CSS gradient, set renderer to transparent
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 1.5;
        controls.maxDistance = 6;
        controls.maxPolarAngle = Math.PI / 2;
        controls.target.set(0, 1, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const warmLight = new THREE.DirectionalLight(0xfff5e6, 0.8);
        warmLight.position.set(5, 5, 5);
        warmLight.castShadow = true;
        warmLight.shadow.mapSize.width = 1024;
        warmLight.shadow.mapSize.height = 1024;
        scene.add(warmLight);

        const coolLight = new THREE.DirectionalLight(0xe6f0ff, 0.5);
        coolLight.position.set(-3, 3, -2);
        scene.add(coolLight);

        // Ground
        const groundGeo = new THREE.CircleGeometry(3, 64);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x2a2a4a, 
            roughness: 0.6, 
            metalness: 0.4 
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        scene.add(modelGroup);

        // --- Load Model ---
        const loader = new GLTFLoader();
        // Using a reliable public URL for Michelle.glb
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Michelle.glb', (gltf) => {
            const model = gltf.scene;
            
            // Center and scale
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            const scale = 2 / size.y;
            model.scale.setScalar(scale);
            model.position.sub(center.multiplyScalar(scale));
            model.position.y = 0; // Rest on ground

            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    // Clone material to avoid shared material issues
                    if (child.material) {
                        child.material = child.material.clone();
                    }
                    
                    if (window.__3D_STATE__.meshCount < 5) {
                        const zoneName = ZONES[window.__3D_STATE__.meshCount];
                        zoneMeshes[zoneName] = child;
                        window.__3D_STATE__.meshCount++;
                    }
                }
            });

            modelGroup.add(model);
            document.getElementById('loading').style.display = 'none';
            
            window.__3D_STATE__.modelLoaded = true;
            applyConfigToModel();
            updateState();
        });

        // --- Logic & UI Updates ---
        const getMaterialProps = (type) => {
            switch(type) {
                case 'glossy': return { roughness: 0.2, metalness: 0.0 };
                case 'metallic': return { roughness: 0.3, metalness: 0.8 };
                case 'matte': default: return { roughness: 0.9, metalness: 0.0 };
            }
        };

        const applyConfigToModel = () => {
            const config = window.__3D_STATE__.playerConfigs[window.__3D_STATE__.activePlayer];
            ZONES.forEach(zone => {
                if (zoneMeshes[zone]) {
                    const mat = zoneMeshes[zone].material;
                    mat.color.set(config[zone].color);
                    const props = getMaterialProps(config[zone].material);
                    mat.roughness = props.roughness;
                    mat.metalness = props.metalness;
                }
            });
        };

        const calculatePrice = () => {
            let price = 89.99;
            const config = window.__3D_STATE__.playerConfigs[window.__3D_STATE__.activePlayer];
            ZONES.forEach(zone => {
                if (config[zone].color !== DEFAULT_COLOR) price += 5;
                if (config[zone].material === 'glossy') price += 10;
                if (config[zone].material === 'metallic') price += 15;
            });
            window.__3D_STATE__.price = price;
            document.getElementById('price-display').innerText = `$${price.toFixed(2)}`;
        };

        const checkSync = () => {
            const p1 = JSON.stringify(window.__3D_STATE__.playerConfigs[1]);
            const p2 = JSON.stringify(window.__3D_STATE__.playerConfigs[2]);
            window.__3D_STATE__.isSynced = (p1 === p2);
            
            const indicator = document.getElementById('sync-indicator');
            if (window.__3D_STATE__.isSynced) {
                indicator.innerText = 'Synced';
                indicator.className = 'synced';
            } else {
                indicator.innerText = 'Unsynced';
                indicator.className = 'unsynced';
            }
        };

        const updateState = () => {
            const state = window.__3D_STATE__;
            const config = state.playerConfigs[state.activePlayer][state.activeZone];
            
            state.currentMaterial = config.material;
            state.selectedColor = config.color;
            
            ZONES.forEach(z => {
                state.zoneColors[z] = state.playerConfigs[state.activePlayer][z].color;
            });

            // Update UI
            document.getElementById('player-toggle').innerText = `Player ${state.activePlayer}`;
            
            document.querySelectorAll('#zone-selector button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.zone === state.activeZone);
            });

            document.querySelectorAll('.color-swatch').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.color === state.selectedColor);
            });

            const matBtn = document.getElementById('material-toggle');
            matBtn.innerText = state.currentMaterial.charAt(0).toUpperCase() + state.currentMaterial.slice(1);

            document.getElementById('rotate-toggle').innerText = `Rotate: ${state.isRotating ? 'ON' : 'OFF'}`;
            document.getElementById('rotate-toggle').classList.toggle('active', state.isRotating);

            document.getElementById('undo-btn').disabled = history.length === 0;

            calculatePrice();
            checkSync();
        };

        const saveSnapshot = () => {
            history.push(JSON.parse(JSON.stringify(window.__3D_STATE__.playerConfigs)));
            window.__3D_STATE__.snapshotCount = history.length;
            updateState();
        };

        // --- Event Listeners ---
        document.getElementById('player-toggle').addEventListener('click', () => {
            window.__3D_STATE__.activePlayer = window.__3D_STATE__.activePlayer === 1 ? 2 : 1;
            applyConfigToModel();
            updateState();
        });

        document.querySelectorAll('#zone-selector button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                window.__3D_STATE__.activeZone = e.target.dataset.zone;
                updateState();
            });
        });

        document.querySelectorAll('.color-swatch').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const color = e.target.dataset.color;
                const state = window.__3D_STATE__;
                state.playerConfigs[state.activePlayer][state.activeZone].color = color;
                applyConfigToModel();
                updateState();
            });
        });

        document.getElementById('material-toggle').addEventListener('click', () => {
            const state = window.__3D_STATE__;
            const currentIdx = MATERIALS.indexOf(state.currentMaterial);
            const nextMat = MATERIALS[(currentIdx + 1) % MATERIALS.length];
            state.playerConfigs[state.activePlayer][state.activeZone].material = nextMat;
            applyConfigToModel();
            updateState();
        });

        document.getElementById('snapshot-btn').addEventListener('click', saveSnapshot);

        document.getElementById('undo-btn').addEventListener('click', () => {
            if (history.length > 0) {
                window.__3D_STATE__.playerConfigs = history.pop();
                window.__3D_STATE__.snapshotCount = history.length;
                applyConfigToModel();
                updateState();
            }
        });

        document.getElementById('rotate-toggle').addEventListener('click', () => {
            window.__3D_STATE__.isRotating = !window.__3D_STATE__.isRotating;
            updateState();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const animate = () => {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            
            if (window.__3D_STATE__.isRotating) {
                modelGroup.rotation.y += 0.5 * delta;
                window.__3D_STATE__.rotationAngle = modelGroup.rotation.y;
            }

            controls.update();
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);

            renderer.render(scene, camera);
        };

        // Initialize
        updateState();
        animate();

    </script>
</body>
</html>
