<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multiplayer Sneaker Customizer</title>
  <style>
    :root {
      --bg-top: #1a1a2e;
      --bg-bottom: #16213e;
      --panel: rgba(20, 24, 40, 0.85);
      --panel-border: rgba(255,255,255,0.12);
      --text: #f4f7fb;
      --muted: #b8c0d4;
      --accent: #7c9cff;
      --good: #44d17a;
      --bad: #ff5c5c;
      --button: rgba(255,255,255,0.08);
      --button-hover: rgba(255,255,255,0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(to bottom, var(--bg-top), var(--bg-bottom));
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #canvas-container {
      position: absolute;
      inset: 0;
    }

    #ui {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 360px;
      max-width: calc(100vw - 32px);
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      z-index: 10;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 20px;
      font-weight: 700;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      align-items: center;
    }

    .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
      display: block;
    }

    button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.12);
      background: var(--button);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 14px;
    }

    button:hover {
      background: var(--button-hover);
      transform: translateY(-1px);
    }

    button.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(124,156,255,0.25);
    }

    #zone-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #zone-selector button {
      flex: 1 1 calc(33.33% - 8px);
      min-width: 92px;
    }

    #color-palette {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .color-swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      padding: 0;
      border: 2px solid rgba(255,255,255,0.35);
      min-width: 32px;
    }

    .color-swatch.active {
      transform: scale(1.08);
      border-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.18);
    }

    .status-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .status-card {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .status-title {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .status-value {
      font-size: 16px;
      font-weight: 700;
    }

    #sync-indicator.synced { color: var(--good); }
    #sync-indicator.unsynced { color: var(--bad); }

    #info {
      position: absolute;
      right: 16px;
      bottom: 16px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
      font-size: 12px;
      z-index: 10;
      max-width: 360px;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="ui">
      <h1>Multiplayer Sneaker Customizer</h1>

      <div class="row">
        <button id="player-toggle">Player 1</button>
        <button id="material-toggle">Material: matte</button>
        <button id="rotate-toggle">Rotate: Off</button>
      </div>

      <label class="label">Zone Selector</label>
      <div id="zone-selector" class="row">
        <button id="zone-sole" class="active">sole</button>
        <button id="zone-upper">upper</button>
        <button id="zone-tongue">tongue</button>
        <button id="zone-laces">laces</button>
        <button id="zone-accent">accent</button>
      </div>

      <label class="label">Color Palette</label>
      <div id="color-palette" class="row">
        <button class="color-swatch active" data-color="#ffffff" style="background:#ffffff;"></button>
        <button class="color-swatch" data-color="#ff4444" style="background:#ff4444;"></button>
        <button class="color-swatch" data-color="#44ff44" style="background:#44ff44;"></button>
        <button class="color-swatch" data-color="#4444ff" style="background:#4444ff;"></button>
        <button class="color-swatch" data-color="#ffff44" style="background:#ffff44;"></button>
        <button class="color-swatch" data-color="#ff44ff" style="background:#ff44ff;"></button>
        <button class="color-swatch" data-color="#44ffff" style="background:#44ffff;"></button>
        <button class="color-swatch" data-color="#111111" style="background:#111111;"></button>
      </div>

      <div class="row">
        <button id="snapshot-btn">Snapshot</button>
        <button id="undo-btn">Undo</button>
      </div>

      <div class="status-bar">
        <div class="status-card">
          <div class="status-title">Price</div>
          <div id="price-display" class="status-value">$89.99</div>
        </div>
        <div class="status-card">
          <div class="status-title">Sync</div>
          <div id="sync-indicator" class="status-value synced">Synced</div>
        </div>
      </div>
    </div>

    <div id="info">
      Loads <strong>Michelle.glb</strong>. First 5 meshes found are mapped to:
      <strong>sole, upper, tongue, laces, accent</strong>.
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const ZONES = ['sole', 'upper', 'tongue', 'laces', 'accent'];
    const COLORS = ['#ff4444', '#44ff44', '#4444ff', '#ffff44', '#ff44ff', '#44ffff', '#ffffff', '#111111'];
    const DEFAULT_COLOR = '#ffffff';
    const DEFAULT_MATERIAL = 'matte';
    const BASE_PRICE = 89.99;

    const materialPresets = {
      matte:    { metalness: 0.0, roughness: 0.9 },
      glossy:   { metalness: 0.0, roughness: 0.2 },
      metallic: { metalness: 0.8, roughness: 0.3 }
    };

    const playerConfigsDefault = () => ({
      sole:   { color: DEFAULT_COLOR, material: DEFAULT_MATERIAL },
      upper:  { color: DEFAULT_COLOR, material: DEFAULT_MATERIAL },
      tongue: { color: DEFAULT_COLOR, material: DEFAULT_MATERIAL },
      laces:  { color: DEFAULT_COLOR, material: DEFAULT_MATERIAL },
      accent: { color: DEFAULT_COLOR, material: DEFAULT_MATERIAL }
    });

    const state = {
      activePlayer: 1,
      activeZone: 'sole',
      playerConfigs: {
        1: playerConfigsDefault(),
        2: playerConfigsDefault()
      },
      currentMaterial: 'matte',
      selectedColor: '#ffffff',
      isRotating: false,
      rotationAngle: 0,
      price: BASE_PRICE,
      snapshotCount: 0,
      isSynced: true,
      modelLoaded: false,
      meshCount: 0,
      cameraDistance: 0,
      zoneColors: {
        sole: '#ffffff',
        upper: '#ffffff',
        tongue: '#ffffff',
        laces: '#ffffff',
        accent: '#ffffff'
      }
    };

    const history = [];

    const container = document.getElementById('canvas-container');
    const playerToggleBtn = document.getElementById('player-toggle');
    const materialToggleBtn = document.getElementById('material-toggle');
    const rotateToggleBtn = document.getElementById('rotate-toggle');
    const snapshotBtn = document.getElementById('snapshot-btn');
    const undoBtn = document.getElementById('undo-btn');
    const priceDisplay = document.getElementById('price-display');
    const syncIndicator = document.getElementById('sync-indicator');
    const zoneButtons = {
      sole: document.getElementById('zone-sole'),
      upper: document.getElementById('zone-upper'),
      tongue: document.getElementById('zone-tongue'),
      laces: document.getElementById('zone-laces'),
      accent: document.getElementById('zone-accent'),
    };

    const scene = new THREE.Scene();

    const bgCanvas = document.createElement('canvas');
    bgCanvas.width = 2;
    bgCanvas.height = 512;
    const bgCtx = bgCanvas.getContext('2d');
    const gradient = bgCtx.createLinearGradient(0, 0, 0, bgCanvas.height);
    gradient.addColorStop(0, '#1a1a2e');
    gradient.addColorStop(1, '#16213e');
    bgCtx.fillStyle = gradient;
    bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
    const bgTexture = new THREE.CanvasTexture(bgCanvas);
    scene.background = bgTexture;

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.5, 3);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.9, 0);
    controls.minDistance = 1.5;
    controls.maxDistance = 6;
    controls.maxPolarAngle = Math.PI / 2;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const warmLight = new THREE.DirectionalLight(0xfff5e6, 0.8);
    warmLight.position.set(5, 5, 5);
    warmLight.castShadow = true;
    scene.add(warmLight);

    const coolLight = new THREE.DirectionalLight(0xe6f0ff, 0.5);
    coolLight.position.set(-3, 3, -2);
    scene.add(coolLight);

    const groundGroup = new THREE.Group();
    scene.add(groundGroup);

    const groundGeometry = new THREE.CircleGeometry(3, 64);
    const groundMaterial = new THREE.MeshStandardMaterial({
      color: new THREE.Color('#2a2a4a'),
      roughness: 0.35,
      metalness: 0.15
    });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    groundGroup.add(ground);

    const groundGlow = new THREE.Mesh(
      new THREE.CircleGeometry(3.15, 64),
      new THREE.MeshBasicMaterial({
        color: 0x8899ff,
        transparent: true,
        opacity: 0.05
      })
    );
    groundGlow.rotation.x = -Math.PI / 2;
    groundGlow.position.y = 0.002;
    groundGroup.add(groundGlow);

    let modelRoot = null;
    const zoneMeshes = {};

    function deepClone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function getCurrentPlayerConfig() {
      return state.playerConfigs[state.activePlayer];
    }

    function updateZoneColorsState() {
      const cfg = getCurrentPlayerConfig();
      state.zoneColors = {
        sole: cfg.sole.color,
        upper: cfg.upper.color,
        tongue: cfg.tongue.color,
        laces: cfg.laces.color,
        accent: cfg.accent.color
      };
    }

    function applyMaterialToMesh(mesh, colorHex, materialType) {
      if (!mesh) return;

      const preset = materialPresets[materialType] || materialPresets.matte;

      let mat;
      if (mesh.material && mesh.material.isMeshStandardMaterial) {
        mat = mesh.material.clone();
      } else {
        mat = new THREE.MeshStandardMaterial();
      }

      mat.color = new THREE.Color(colorHex);
      mat.metalness = preset.metalness;
      mat.roughness = preset.roughness;
      mat.envMapIntensity = materialType === 'metallic' ? 1.2 : 0.8;

      mesh.material = mat;
      mesh.castShadow = true;
      mesh.receiveShadow = true;
    }

    function applyPlayerConfigToModel(player) {
      const cfg = state.playerConfigs[player];
      ZONES.forEach(zone => {
        if (zoneMeshes[zone]) {
          applyMaterialToMesh(zoneMeshes[zone], cfg[zone].color, cfg[zone].material);
        }
      });
    }

    function recalculatePrice() {
      const cfg = getCurrentPlayerConfig();
      let total = BASE_PRICE;

      ZONES.forEach(zone => {
        if (cfg[zone].color.toLowerCase() !== DEFAULT_COLOR) total += 5;
        if (cfg[zone].material === 'glossy') total += 10;
        if (cfg[zone].material === 'metallic') total += 15;
      });

      state.price = total;
      priceDisplay.textContent = `$${total.toFixed(2)}`;
    }

    function configsEqual(a, b) {
      return JSON.stringify(a) === JSON.stringify(b);
    }

    function updateSyncIndicator() {
      state.isSynced = configsEqual(state.playerConfigs[1], state.playerConfigs[2]);
      syncIndicator.textContent = state.isSynced ? 'Synced' : 'Unsynced';
      syncIndicator.classList.toggle('synced', state.isSynced);
      syncIndicator.classList.toggle('unsynced', !state.isSynced);
    }

    function updateMaterialButton() {
      materialToggleBtn.textContent = `Material: ${state.currentMaterial}`;
    }

    function updatePlayerButton() {
      playerToggleBtn.textContent = `Player ${state.activePlayer}`;
    }

    function updateRotateButton() {
      rotateToggleBtn.textContent = `Rotate: ${state.isRotating ? 'On' : 'Off'}`;
      rotateToggleBtn.classList.toggle('active', state.isRotating);
    }

    function updateZoneButtons() {
      Object.entries(zoneButtons).forEach(([zone, btn]) => {
        btn.classList.toggle('active', zone === state.activeZone);
      });
    }

    function updateColorPaletteUI() {
      const color = getCurrentPlayerConfig()[state.activeZone].color.toLowerCase();
      state.selectedColor = color;
      document.querySelectorAll('.color-swatch').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.color.toLowerCase() === color);
      });
    }

    function syncUIToActiveSelection() {
      const cfg = getCurrentPlayerConfig()[state.activeZone];
      state.currentMaterial = cfg.material;
      state.selectedColor = cfg.color.toLowerCase();
      updateZoneColorsState();
      updateMaterialButton();
      updatePlayerButton();
      updateZoneButtons();
      updateColorPaletteUI();
      recalculatePrice();
      updateSyncIndicator();
      exposeState();
    }

    function applyChange() {
      applyPlayerConfigToModel(state.activePlayer);
      updateZoneColorsState();
      recalculatePrice();
      updateSyncIndicator();
      syncUIToActiveSelection();
    }

    function saveSnapshot() {
      history.push({
        activePlayer: state.activePlayer,
        activeZone: state.activeZone,
        playerConfigs: deepClone(state.playerConfigs),
        currentMaterial: state.currentMaterial,
        selectedColor: state.selectedColor,
        isRotating: state.isRotating,
        rotationAngle: state.rotationAngle
      });
      state.snapshotCount = history.length;
      exposeState();
    }

    function undoSnapshot() {
      if (!history.length) return;
      const snap = history.pop();

      state.activePlayer = snap.activePlayer;
      state.activeZone = snap.activeZone;
      state.playerConfigs = deepClone(snap.playerConfigs);
      state.currentMaterial = snap.currentMaterial;
      state.selectedColor = snap.selectedColor;
      state.isRotating = snap.isRotating;
      state.rotationAngle = snap.rotationAngle;
      state.snapshotCount = history.length;

      if (modelRoot) {
        modelRoot.rotation.y = state.rotationAngle;
      }

      applyPlayerConfigToModel(state.activePlayer);
      syncUIToActiveSelection();
      updateRotateButton();
      exposeState();
    }

    function cycleMaterial(material) {
      if (material === 'matte') return 'glossy';
      if (material === 'glossy') return 'metallic';
      return 'matte';
    }

    function exposeState() {
      window.__3D_STATE__ = {
        activePlayer: state.activePlayer,
        activeZone: state.activeZone,
        playerConfigs: deepClone(state.playerConfigs),
        currentMaterial: state.currentMaterial,
        selectedColor: state.selectedColor,
        isRotating: state.isRotating,
        rotationAngle: state.rotationAngle,
        price: state.price,
        snapshotCount: state.snapshotCount,
        isSynced: state.isSynced,
        modelLoaded: state.modelLoaded,
        meshCount: state.meshCount,
        cameraDistance: state.cameraDistance,
        zoneColors: deepClone(state.zoneColors)
      };
    }

    playerToggleBtn.addEventListener('click', () => {
      state.activePlayer = state.activePlayer === 1 ? 2 : 1;
      applyPlayerConfigToModel(state.activePlayer);
      syncUIToActiveSelection();
    });

    Object.entries(zoneButtons).forEach(([zone, btn]) => {
      btn.addEventListener('click', () => {
        state.activeZone = zone;
        syncUIToActiveSelection();
      });
    });

    document.querySelectorAll('.color-swatch').forEach(btn => {
      btn.addEventListener('click', () => {
        const color = btn.dataset.color.toLowerCase();
        const cfg = getCurrentPlayerConfig();
        cfg[state.activeZone].color = color;
        state.selectedColor = color;

        if (zoneMeshes[state.activeZone]) {
          applyMaterialToMesh(zoneMeshes[state.activeZone], color, cfg[state.activeZone].material);
        }

        applyChange();
      });
    });

    materialToggleBtn.addEventListener('click', () => {
      const cfg = getCurrentPlayerConfig();
      const next = cycleMaterial(cfg[state.activeZone].material);
      cfg[state.activeZone].material = next;
      state.currentMaterial = next;

      if (zoneMeshes[state.activeZone]) {
        applyMaterialToMesh(zoneMeshes[state.activeZone], cfg[state.activeZone].color, next);
      }

      applyChange();
    });

    snapshotBtn.addEventListener('click', saveSnapshot);
    undoBtn.addEventListener('click', undoSnapshot);

    rotateToggleBtn.addEventListener('click', () => {
      state.isRotating = !state.isRotating;
      updateRotateButton();
      exposeState();
    });

    const loader = new GLTFLoader();
    loader.load(
      'Michelle.glb',
      (gltf) => {
        modelRoot = gltf.scene;
        scene.add(modelRoot);

        const box = new THREE.Box3().setFromObject(modelRoot);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        const targetHeight = 2;
        const scale = size.y > 0 ? targetHeight / size.y : 1;
        modelRoot.scale.setScalar(scale);

        const scaledBox = new THREE.Box3().setFromObject(modelRoot);
        const scaledCenter = new THREE.Vector3();
        const scaledSize = new THREE.Vector3();
        scaledBox.getCenter(scaledCenter);
        scaledBox.getSize(scaledSize);

        modelRoot.position.x -= scaledCenter.x;
        modelRoot.position.z -= scaledCenter.z;
        modelRoot.position.y -= scaledBox.min.y;

        const foundMeshes = [];
        modelRoot.traverse((child) => {
          if (child.isMesh) {
            foundMeshes.push(child);
          }
        });

        ZONES.forEach((zone, index) => {
          if (foundMeshes[index]) {
            zoneMeshes[zone] = foundMeshes[index];
          }
        });

        state.meshCount = Object.keys(zoneMeshes).length;
        state.modelLoaded = true;

        applyPlayerConfigToModel(state.activePlayer);
        syncUIToActiveSelection();
      },
      undefined,
      (error) => {
        console.error('Failed to load Michelle.glb', error);
        syncIndicator.textContent = 'Unsynced';
        syncIndicator.classList.add('unsynced');
      }
    );

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (modelRoot && state.isRotating) {
        const step = 0.5 * delta;
        modelRoot.rotation.y += step;
        state.rotationAngle += step;
      }

      controls.update();

      state.cameraDistance = camera.position.distanceTo(controls.target);
      exposeState();

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    syncUIToActiveSelection();
    updateRotateButton();
    exposeState();
    animate();
  </script>
</body>
</html>
