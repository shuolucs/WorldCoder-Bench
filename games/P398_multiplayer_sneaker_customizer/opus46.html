<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Sneaker Customizer</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
    color: #ffffff;
}

#canvas-container {
    width: 100vw;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
}

canvas {
    display: block;
}

#ui-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
}

.ui-panel {
    pointer-events: all;
    background: rgba(20, 20, 50, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 12px 16px;
}

#top-bar {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 16px;
}

#player-toggle {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
}

#player-toggle:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
}

#player-toggle.player2 {
    background: linear-gradient(135deg, #f59e0b, #ef4444);
}

#sync-indicator {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.3s ease;
}

#sync-indicator.synced {
    background: rgba(34, 197, 94, 0.2);
    border: 1px solid rgba(34, 197, 94, 0.5);
    color: #22c55e;
}

#sync-indicator.unsynced {
    background: rgba(239, 68, 68, 0.2);
    border: 1px solid rgba(239, 68, 68, 0.5);
    color: #ef4444;
}

#price-display {
    font-size: 22px;
    font-weight: 700;
    color: #22c55e;
    text-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
}

#bottom-panel {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}

#zone-selector {
    display: flex;
    gap: 8px;
}

#zone-selector button {
    background: rgba(255, 255, 255, 0.08);
    color: #ccc;
    border: 2px solid transparent;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#zone-selector button:hover {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
}

#zone-selector button.active {
    border-color: #6366f1;
    background: rgba(99, 102, 241, 0.2);
    color: #fff;
    box-shadow: 0 0 10px rgba(99, 102, 241, 0.3);
}

#color-palette {
    display: flex;
    gap: 10px;
    align-items: center;
}

.color-swatch {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 3px solid rgba(255, 255, 255, 0.2);
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
}

.color-swatch:hover {
    transform: scale(1.2);
    border-color: rgba(255, 255, 255, 0.6);
}

.color-swatch.active {
    border-color: #fff;
    box-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
    transform: scale(1.15);
}

#controls-row {
    display: flex;
    gap: 8px;
    align-items: center;
}

#controls-row button {
    background: rgba(255, 255, 255, 0.1);
    color: #ccc;
    border: 1px solid rgba(255, 255, 255, 0.15);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
}

#controls-row button:hover {
    background: rgba(255, 255, 255, 0.2);
    color: #fff;
}

#controls-row button.active-toggle {
    background: rgba(99, 102, 241, 0.3);
    border-color: #6366f1;
    color: #a5b4fc;
}

#material-toggle {
    min-width: 90px;
    text-align: center;
}

#loading-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.5s ease;
}

#loading-screen.hidden {
    opacity: 0;
    pointer-events: none;
}

.loader {
    width: 50px;
    height: 50px;
    border: 3px solid rgba(99, 102, 241, 0.2);
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

#loading-screen p {
    margin-top: 16px;
    color: #8b8baf;
    font-size: 14px;
}
</style>
</head>
<body>

<div id="loading-screen">
    <div class="loader"></div>
    <p>Loading Sneaker Model...</p>
</div>

<div id="canvas-container"></div>

<div id="ui-overlay">
    <div id="top-bar" class="ui-panel">
        <button id="player-toggle">Player 1</button>
        <div id="sync-indicator" class="synced">● Synced</div>
        <div id="price-display">$89.99</div>
    </div>

    <div id="bottom-panel">
        <div id="zone-selector" class="ui-panel">
            <button id="zone-sole" class="active">Sole</button>
            <button id="zone-upper">Upper</button>
            <button id="zone-tongue">Tongue</button>
            <button id="zone-laces">Laces</button>
            <button id="zone-accent">Accent</button>
        </div>

        <div id="color-palette" class="ui-panel">
            <button class="color-swatch" data-color="#ff4444" style="background:#ff4444"></button>
            <button class="color-swatch" data-color="#44ff44" style="background:#44ff44"></button>
            <button class="color-swatch" data-color="#4444ff" style="background:#4444ff"></button>
            <button class="color-swatch" data-color="#ffff44" style="background:#ffff44"></button>
            <button class="color-swatch" data-color="#ff44ff" style="background:#ff44ff"></button>
            <button class="color-swatch" data-color="#44ffff" style="background:#44ffff"></button>
            <button class="color-swatch active" data-color="#ffffff" style="background:#ffffff"></button>
            <button class="color-swatch" data-color="#111111" style="background:#111111; border-color: rgba(255,255,255,0.4)"></button>
        </div>

        <div id="controls-row" class="ui-panel">
            <button id="material-toggle">Matte</button>
            <button id="snapshot-btn">📸 Snapshot</button>
            <button id="undo-btn">↩ Undo</button>
            <button id="rotate-toggle">🔄 Rotate</button>
        </div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
const ZONES = ['sole', 'upper', 'tongue', 'laces', 'accent'];
const COLORS = ['#ff4444', '#44ff44', '#4444ff', '#ffff44', '#ff44ff', '#44ffff', '#ffffff', '#111111'];
const MATERIALS = ['matte', 'glossy', 'metallic'];
const BASE_PRICE = 89.99;

function createDefaultZoneConfig() {
    const config = {};
    ZONES.forEach(z => {
        config[z] = { color: '#ffffff', material: 'matte' };
    });
    return config;
}

const state = {
    activePlayer: 1,
    activeZone: 'sole',
    playerConfigs: {
        1: createDefaultZoneConfig(),
        2: createDefaultZoneConfig()
    },
    currentMaterial: 'matte',
    selectedColor: '#ffffff',
    isRotating: false,
    rotationAngle: 0,
    price: BASE_PRICE,
    snapshotCount: 0,
    isSynced: true,
    modelLoaded: false,
    meshCount: 0,
    cameraDistance: 3,
    zoneColors: { sole: '#ffffff', upper: '#ffffff', tongue: '#ffffff', laces: '#ffffff', accent: '#ffffff' }
};

const snapshots = [];
const zoneMeshes = {};

window.__3D_STATE__ = state;

// ============ THREE.JS SETUP ============
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();

// Gradient background
const bgCanvas = document.createElement('canvas');
bgCanvas.width = 2;
bgCanvas.height = 512;
const bgCtx = bgCanvas.getContext('2d');
const gradient = bgCtx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#1a1a2e');
gradient.addColorStop(1, '#16213e');
bgCtx.fillStyle = gradient;
bgCtx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(bgCanvas);
scene.background = bgTexture;

// Camera
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 3);
camera.lookAt(0, 0, 0);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1.5;
controls.maxDistance = 6;
controls.maxPolarAngle = Math.PI / 2;
controls.target.set(0, 0.8, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const warmLight = new THREE.DirectionalLight(0xfff5e6, 0.8);
warmLight.position.set(5, 5, 5);
warmLight.castShadow = true;
warmLight.shadow.mapSize.set(1024, 1024);
scene.add(warmLight);

const coolLight = new THREE.DirectionalLight(0xe6f0ff, 0.5);
coolLight.position.set(-3, 3, -2);
scene.add(coolLight);

// Ground plane
const groundGeometry = new THREE.CircleGeometry(3, 64);
const groundMaterial = new THREE.MeshStandardMaterial({
    color: 0x2a2a4a,
    roughness: 0.6,
    metalness: 0.2,
});
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Add a subtle grid ring for visual interest
const ringGeometry = new THREE.RingGeometry(2.8, 3, 64);
const ringMaterial = new THREE.MeshBasicMaterial({ color: 0x3a3a6a, side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
const ring = new THREE.Mesh(ringGeometry, ringMaterial);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.001;
scene.add(ring);

// ============ MODEL LOADING ============
let model = null;

const loader = new GLTFLoader();
loader.load(
    'Michelle.glb',
    (gltf) => {
        model = gltf.scene;

        // Calculate bounding box and scale to ~2 units tall
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2 / size.y;
        model.scale.setScalar(scale);

        // Recalculate after scaling
        const box2 = new THREE.Box3().setFromObject(model);
        const center = box2.getCenter(new THREE.Vector3());
        model.position.x -= center.x;
        model.position.y -= box2.min.y;
        model.position.z -= center.z;

        // Find meshes and assign zones
        const meshes = [];
        model.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
                meshes.push(child);
            }
        });

        state.meshCount = Math.min(meshes.length, 5);

        // Assign zones to meshes
        for (let i = 0; i < ZONES.length && i < meshes.length; i++) {
            const zone = ZONES[i];
            const mesh = meshes[i];
            // Create a new material for each zone so they can be independently colored
            mesh.material = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                roughness: 0.9,
                metalness: 0.0,
            });
            zoneMeshes[zone] = mesh;
        }

        // If fewer than 5 meshes, duplicate last mesh reference for remaining zones
        if (meshes.length < 5) {
            for (let i = meshes.length; i < 5; i++) {
                const zone = ZONES[i];
                const mesh = meshes[meshes.length - 1];
                // Share the mesh but note it in zoneMeshes
                zoneMeshes[zone] = mesh;
            }
        }

        scene.add(model);
        state.modelLoaded = true;

        // Hide loading screen
        document.getElementById('loading-screen').classList.add('hidden');

        // Apply default config
        applyPlayerConfig();
    },
    (progress) => {
        // Loading progress
    },
    (error) => {
        console.error('Error loading model:', error);
        document.getElementById('loading-screen').innerHTML = '<p style="color:#ef4444">Failed to load model. Make sure Michelle.glb is in the same directory.</p>';
    }
);

// ============ MATERIAL HELPERS ============
function getMaterialProps(materialType) {
    switch (materialType) {
        case 'matte':
            return { roughness: 0.9, metalness: 0.0 };
        case 'glossy':
            return { roughness: 0.2, metalness: 0.0 };
        case 'metallic':
            return { roughness: 0.3, metalness: 0.8 };
        default:
            return { roughness: 0.9, metalness: 0.0 };
    }
}

function applyZoneMaterial(zone) {
    const config = state.playerConfigs[state.activePlayer][zone];
    const mesh = zoneMeshes[zone];
    if (!mesh) return;

    const color = new THREE.Color(config.color);
    const matProps = getMaterialProps(config.material);

    mesh.material.color.copy(color);
    mesh.material.roughness = matProps.roughness;
    mesh.material.metalness = matProps.metalness;
    mesh.material.needsUpdate = true;
}

function applyPlayerConfig() {
    const config = state.playerConfigs[state.activePlayer];
    ZONES.forEach(zone => {
        applyZoneMaterial(zone);
    });
    updateZoneColors();
}

function updateZoneColors() {
    const config = state.playerConfigs[state.activePlayer];
    ZONES.forEach(zone => {
        state.zoneColors[zone] = config[zone].color;
    });
}

// ============ PRICE CALCULATION ============
function calculatePrice() {
    let price = BASE_PRICE;
    const config = state.playerConfigs[state.activePlayer];

    ZONES.forEach(zone => {
        if (config[zone].color !== '#ffffff') {
            price += 5;
        }
        if (config[zone].material === 'glossy') {
            price += 10;
        } else if (config[zone].material === 'metallic') {
            price += 15;
        }
    });

    state.price = Math.round(price * 100) / 100;
    document.getElementById('price-display').textContent = `$${state.price.toFixed(2)}`;
}

// ============ SYNC CHECK ============
function checkSync() {
    const c1 = state.playerConfigs[1];
    const c2 = state.playerConfigs[2];
    let synced = true;

    for (const zone of ZONES) {
        if (c1[zone].color !== c2[zone].color || c1[zone].material !== c2[zone].material) {
            synced = false;
            break;
        }
    }

    state.isSynced = synced;
    const indicator = document.getElementById('sync-indicator');
    if (synced) {
        indicator.className = 'synced';
        indicator.textContent = '● Synced';
    } else {
        indicator.className = 'unsynced';
        indicator.textContent = '● Unsynced';
    }
}

// ============ SNAPSHOT SYSTEM ============
function takeSnapshot() {
    const snapshot = JSON.parse(JSON.stringify(state.playerConfigs));
    snapshots.push(snapshot);
    state.snapshotCount = snapshots.length;
}

function undoSnapshot() {
    if (snapshots.length === 0) return;
    const snapshot = snapshots.pop();
    state.playerConfigs[1] = snapshot[1];
    state.playerConfigs[2] = snapshot[2];
    state.snapshotCount = snapshots.length;

    // Update current material display for active zone
    const activeConfig = state.playerConfigs[state.activePlayer][state.activeZone];
    state.currentMaterial = activeConfig.material;
    state.selectedColor = activeConfig.color;

    applyPlayerConfig();
    calculatePrice();
    checkSync();
    updateUIHighlights();
}

// ============ UI UPDATES ============
function updateUIHighlights() {
    // Update zone buttons
    document.querySelectorAll('#zone-selector button').forEach(btn => {
        const zone = btn.id.replace('zone-', '');
        btn.classList.toggle('active', zone === state.activeZone);
    });

    // Update color swatches
    const activeConfig = state.playerConfigs[state.activePlayer][state.activeZone];
    document.querySelectorAll('.color-swatch').forEach(swatch => {
        swatch.classList.toggle('active', swatch.dataset.color === activeConfig.color);
    });

    // Update material button
    document.getElementById('material-toggle').textContent =
        state.currentMaterial.charAt(0).toUpperCase() + state.currentMaterial.slice(1);

    // Update rotate toggle
    document.getElementById('rotate-toggle').classList.toggle('active-toggle', state.isRotating);
}

// ============ EVENT HANDLERS ============

// Player toggle
document.getElementById('player-toggle').addEventListener('click', () => {
    state.activePlayer = state.activePlayer === 1 ? 2 : 1;
    const btn = document.getElementById('player-toggle');
    btn.textContent = `Player ${state.activePlayer}`;
    btn.classList.toggle('player2', state.activePlayer === 2);

    // Load this player's config
    const activeConfig = state.playerConfigs[state.activePlayer][state.activeZone];
    state.currentMaterial = activeConfig.material;
    state.selectedColor = activeConfig.color;

    applyPlayerConfig();
    calculatePrice();
    checkSync();
    updateUIHighlights();
});

// Zone selector
ZONES.forEach(zone => {
    document.getElementById(`zone-${zone}`).addEventListener('click', () => {
        state.activeZone = zone;
        const activeConfig = state.playerConfigs[state.activePlayer][zone];
        state.currentMaterial = activeConfig.material;
        state.selectedColor = activeConfig.color;
        updateUIHighlights();
    });
});

// Color palette
document.querySelectorAll('.color-swatch').forEach(swatch => {
    swatch.addEventListener('click', () => {
        const color = swatch.dataset.color;
        state.selectedColor = color;
        state.playerConfigs[state.activePlayer][state.activeZone].color = color;

        applyZoneMaterial(state.activeZone);
        updateZoneColors();
        calculatePrice();
        checkSync();
        updateUIHighlights();
    });
});

// Material toggle
document.getElementById('material-toggle').addEventListener('click', () => {
    const currentIndex = MATERIALS.indexOf(state.currentMaterial);
    const nextIndex = (currentIndex + 1) % MATERIALS.length;
    state.currentMaterial = MATERIALS[nextIndex];
    state.playerConfigs[state.activePlayer][state.activeZone].material = state.currentMaterial;

    applyZoneMaterial(state.activeZone);
    calculatePrice();
    checkSync();
    updateUIHighlights();
});

// Snapshot
document.getElementById('snapshot-btn').addEventListener('click', () => {
    takeSnapshot();
});

// Undo
document.getElementById('undo-btn').addEventListener('click', () => {
    undoSnapshot();
});

// Rotate toggle
document.getElementById('rotate-toggle').addEventListener('click', () => {
    state.isRotating = !state.isRotating;
    updateUIHighlights();
});

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    // Auto rotation
    if (state.isRotating && model) {
        const rotAmount = 0.5 * delta;
        model.rotation.y += rotAmount;
        state.rotationAngle += rotAmount;
    }

    // Update camera distance
    state.cameraDistance = camera.position.distanceTo(controls.target);

    controls.update();
    renderer.render(scene, camera);
}

animate();

// Initialize UI
updateUIHighlights();
calculatePrice();
checkSync();
</script>
</body>
</html>
