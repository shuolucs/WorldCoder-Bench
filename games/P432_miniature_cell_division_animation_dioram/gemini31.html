<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitosis 3D Educational Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #info-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 30, 0.8);
            border: 1px solid #4444aa;
            border-radius: 10px;
            padding: 15px 25px;
            text-align: center;
            width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            pointer-events: none;
        }
        #stage-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
            border-bottom: 1px solid #4444aa;
            padding-bottom: 5px;
        }
        #stage-name {
            font-size: 24px;
            font-weight: bold;
            color: #88ccff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #stage-number {
            font-size: 16px;
            color: #aaaaaa;
        }
        #stage-description {
            font-size: 14px;
            line-height: 1.4;
            margin: 0;
            color: #dddddd;
        }
        #progress-bar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: #111;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4444aa, #88ccff);
            transition: width 0.5s ease-out;
        }
        .btn {
            position: absolute;
            bottom: 30px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background: #2a2a4a;
            border: 2px solid #4444aa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn:hover {
            background: #4444aa;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn:disabled {
            background: #1a1a2e;
            border-color: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        #btn-prev { left: 30px; }
        #btn-next { right: 30px; background: #3a3a6a; }
        #btn-next:hover:not(:disabled) { background: #5555cc; }
        #btn-reset { left: 50%; transform: translateX(-50%); bottom: 30px; }
        #btn-reset:hover { transform: translateX(-50%) translateY(-2px); }
        #btn-reset:active { transform: translateX(-50%) translateY(0); }
        
        #controls-hint {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #666;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="progress-bar-container"><div id="progress-bar"></div></div>
    
    <div id="info-panel">
        <div id="stage-header">
            <span id="stage-name">Interphase</span>
            <span id="stage-number">1/6</span>
        </div>
        <p id="stage-description">The cell grows and DNA is replicated. The nucleus is intact and chromosomes are loosely arranged.</p>
    </div>

    <button id="btn-prev" class="btn" disabled>◀ Previous</button>
    <button id="btn-reset" class="btn">↺ Reset</button>
    <button id="btn-next" class="btn">Next Stage ▶</button>
    
    <div id="controls-hint">Drag to rotate | Arrow Keys to navigate | 'R' to reset</div>

    <div id="canvas-container"></div>

    <!-- Import Three.js as ES module -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Stage Data & Descriptions ---
        const STAGE_INFO = [
            { name: "Interphase", desc: "The cell grows and DNA is replicated. The nucleus is intact and chromosomes are loosely arranged." },
            { name: "Prophase", desc: "Chromosomes condense and become visible. The nuclear membrane begins to dissolve." },
            { name: "Metaphase", desc: "Chromosomes align at the cell's equator. Spindle fibers attach to the centromeres." },
            { name: "Anaphase", desc: "Sister chromatids are pulled apart toward opposite poles of the cell by spindle fibers." },
            { name: "Telophase", desc: "Chromosomes arrive at poles. New nuclear membranes form around the two sets of chromosomes." },
            { name: "Cytokinesis", desc: "The cell membrane pinches in the middle, dividing the cytoplasm to form two identical daughter cells." }
        ];

        // --- Global State ---
        window.__3D_STATE__ = {
            currentStage: 0,
            stageName: STAGE_INFO[0].name,
            isAnimating: false,
            cellCount: 1,
            chromosomeCount: 4,
            nucleusOpacity: 0.6,
            spindleFibersVisible: false,
            totalStages: 6,
            animationProgress: 1.0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableZoom = false;
        controls.enablePan = false;
        controls.target.set(0, 2, 0);
        controls.update();

        let isDragging = false;
        controls.addEventListener('start', () => isDragging = true);
        controls.addEventListener('end', () => isDragging = false);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0x88ccff, 0.3, 10);
        pointLight.position.set(0, 3, 0);
        scene.add(pointLight);

        // --- Diorama Construction ---
        const dioramaGroup = new THREE.Group();
        scene.add(dioramaGroup);

        // Base Platform
        const baseGeo = new THREE.CylinderGeometry(6, 6, 0.5, 64);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8 });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.position.y = -0.25;
        dioramaGroup.add(base);

        // Base Ring
        const ringGeo = new THREE.TorusGeometry(6, 0.1, 16, 100);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0x654321, roughness: 0.9 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2;
        dioramaGroup.add(ring);

        // Label Sign
        const createLabel = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#222';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 10;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 60px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('MITOSIS', canvas.width/2, canvas.height/2);
            
            const tex = new THREE.CanvasTexture(canvas);
            const mat = new THREE.MeshBasicMaterial({ map: tex });
            const geo = new THREE.PlaneGeometry(3, 0.75);
            const mesh = new THREE.Mesh(geo, mat);
            
            const signGroup = new THREE.Group();
            mesh.position.y = 0.5;
            signGroup.add(mesh);
            
            const postGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.5);
            const postMat = new THREE.MeshStandardMaterial({color: 0x333333});
            const post1 = new THREE.Mesh(postGeo, postMat);
            post1.position.set(-1.3, 0.25, 0);
            const post2 = new THREE.Mesh(postGeo, postMat);
            post2.position.set(1.3, 0.25, 0);
            signGroup.add(post1, post2);
            
            signGroup.position.set(0, 0, 5.5);
            signGroup.rotation.x = -0.1;
            return signGroup;
        };
        dioramaGroup.add(createLabel());

        // --- Cell Model Components ---
        const cellGroup = new THREE.Group();
        cellGroup.position.y = 3;
        dioramaGroup.add(cellGroup);

        // Materials
        const membraneMat = new THREE.MeshPhysicalMaterial({
            color: 0x88cc88, transparent: true, opacity: 0.3,
            roughness: 0.2, transmission: 0.5, depthWrite: false
        });
        const nucleusMat = new THREE.MeshStandardMaterial({
            color: 0x4444aa, transparent: true, opacity: 0.6, depthWrite: false
        });
        const chromosomeMat = new THREE.MeshStandardMaterial({ color: 0xff6644 });
        const organelleMat = new THREE.MeshStandardMaterial({ color: 0xccaa44 });
        const spindleMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 });

        // Geometries
        const sphereGeo = new THREE.SphereGeometry(1, 32, 32);
        const chromoGeo = new THREE.CapsuleGeometry(0.1, 0.4, 4, 8);
        const orgGeo = new THREE.SphereGeometry(0.15, 8, 8);

        // Meshes
        const meshes = {
            memA: new THREE.Mesh(sphereGeo, membraneMat.clone()),
            memB: new THREE.Mesh(sphereGeo, membraneMat.clone()),
            nucA: new THREE.Mesh(sphereGeo, nucleusMat.clone()),
            nucB: new THREE.Mesh(sphereGeo, nucleusMat.clone()),
            chrA: [], chrB: [],
            orgA: [], orgB: [],
            spindles: new THREE.Group()
        };

        // Render order to fix transparency issues
        meshes.memA.renderOrder = 2;
        meshes.memB.renderOrder = 2;
        meshes.nucA.renderOrder = 1;
        meshes.nucB.renderOrder = 1;

        cellGroup.add(meshes.memA, meshes.memB, meshes.nucA, meshes.nucB, meshes.spindles);

        // Create Chromosomes (4 pairs)
        for(let i=0; i<4; i++) {
            const cA = new THREE.Mesh(chromoGeo, chromosomeMat.clone());
            const cB = new THREE.Mesh(chromoGeo, chromosomeMat.clone());
            meshes.chrA.push(cA);
            meshes.chrB.push(cB);
            cellGroup.add(cA, cB);
        }

        // Create Organelles (10 total, split 5 and 5)
        for(let i=0; i<5; i++) {
            const oA = new THREE.Mesh(orgGeo, organelleMat);
            const oB = new THREE.Mesh(orgGeo, organelleMat);
            meshes.orgA.push(oA);
            meshes.orgB.push(oB);
            cellGroup.add(oA, oB);
        }

        // Create Spindle Fibers
        const equatorPoints = [];
        for(let i=0; i<4; i++) {
            const angle = (i / 4) * Math.PI * 2;
            equatorPoints.push(new THREE.Vector3(Math.cos(angle)*0.6, 0, Math.sin(angle)*0.6));
        }
        const poleA = new THREE.Vector3(0, 2, 0);
        const poleB = new THREE.Vector3(0, -2, 0);
        
        equatorPoints.forEach(eq => {
            const geoA = new THREE.BufferGeometry().setFromPoints([poleA, eq]);
            const geoB = new THREE.BufferGeometry().setFromPoints([poleB, eq]);
            meshes.spindles.add(new THREE.Line(geoA, spindleMat));
            meshes.spindles.add(new THREE.Line(geoB, spindleMat));
        });

        // --- State Generation ---
        // Helper to get random point in sphere
        const randomInSphere = (radius) => {
            const u = Math.random(), v = Math.random();
            const theta = u * 2.0 * Math.PI, phi = Math.acos(2.0 * v - 1.0);
            const r = Math.cbrt(Math.random()) * radius;
            return new THREE.Vector3(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
        };

        // Base positions
        const basePos = {
            chr: Array(4).fill(0).map(() => randomInSphere(0.8)),
            chrEq: equatorPoints,
            orgA: Array(5).fill(0).map(() => randomInSphere(2.2).add(new THREE.Vector3(0,0,0))),
            orgB: Array(5).fill(0).map(() => randomInSphere(2.2).add(new THREE.Vector3(0,0,0)))
        };
        // Push organelles out of nucleus
        [...basePos.orgA, ...basePos.orgB].forEach(p => { if(p.length() < 1.3) p.normalize().multiplyScalar(1.4); });

        const eulerFlat = new THREE.Euler(0,0,Math.PI/2);
        const eulerRand = () => new THREE.Euler(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
        const baseRot = { chr: Array(4).fill(0).map(eulerRand) };

        // Define the 6 discrete states
        const states = [];
        
        // Helper to create a deep copy of a state template
        const createState = () => ({
            memA: { p: new THREE.Vector3(), s: 1, o: 0.3 },
            memB: { p: new THREE.Vector3(), s: 0.01, o: 0 },
            nucA: { p: new THREE.Vector3(), s: 1.2, o: 0.6 },
            nucB: { p: new THREE.Vector3(), s: 0.01, o: 0 },
            chrA: Array(4).fill(0).map(() => ({ p: new THREE.Vector3(), r: new THREE.Euler(), s: 1, o: 0.5 })),
            chrB: Array(4).fill(0).map(() => ({ p: new THREE.Vector3(), r: new THREE.Euler(), s: 1, o: 0 })),
            orgA: Array(5).fill(0).map(() => ({ p: new THREE.Vector3() })),
            orgB: Array(5).fill(0).map(() => ({ p: new THREE.Vector3() })),
            spindle: { s: 1, o: 0 }
        });

        // S0: Interphase
        let s0 = createState();
        s0.memA.s = 2.5;
        for(let i=0; i<4; i++) {
            s0.chrA[i].p.copy(basePos.chr[i]); s0.chrA[i].r.copy(baseRot.chr[i]);
            s0.chrB[i].p.copy(basePos.chr[i]); s0.chrB[i].r.copy(baseRot.chr[i]);
        }
        for(let i=0; i<5; i++) { s0.orgA[i].p.copy(basePos.orgA[i]); s0.orgB[i].p.copy(basePos.orgB[i]); }
        states.push(s0);

        // S1: Prophase
        let s1 = JSON.parse(JSON.stringify(s0)); // Deep copy structure
        const copyVecs = (src, dst) => { // Restore Three.js objects
            dst.memA.p.copy(src.memA.p); dst.memB.p.copy(src.memB.p); dst.nucA.p.copy(src.nucA.p); dst.nucB.p.copy(src.nucB.p);
            for(let i=0; i<4; i++) { dst.chrA[i].p.copy(src.chrA[i].p); dst.chrA[i].r.copy(src.chrA[i].r); dst.chrB[i].p.copy(src.chrB[i].p); dst.chrB[i].r.copy(src.chrB[i].r); }
            for(let i=0; i<5; i++) { dst.orgA[i].p.copy(src.orgA[i].p); dst.orgB[i].p.copy(src.orgB[i].p); }
        };
        
        let _s1 = createState(); copyVecs(s0, _s1);
        _s1.memA.s = 2.5; _s1.nucA.o = 0.2;
        for(let i=0; i<4; i++) { _s1.chrA[i].s = 1.5; _s1.chrA[i].o = 1.0; }
        states.push(_s1);

        // S2: Metaphase
        let _s2 = createState(); copyVecs(_s1, _s2);
        _s2.memA.s = 2.5; _s2.nucA.o = 0; _s2.spindle.o = 0.5;
        for(let i=0; i<4; i++) {
            _s2.chrA[i].p.copy(basePos.chrEq[i]);
            _s2.chrA[i].r.copy(eulerFlat);
            _s2.chrA[i].s = 1.5; _s2.chrA[i].o = 1.0;
            _s2.chrB[i].p.copy(basePos.chrEq[i]);
            _s2.chrB[i].r.copy(eulerFlat);
        }
        states.push(_s2);

        // S3: Anaphase
        let _s3 = createState(); copyVecs(_s2, _s3);
        _s3.memA.s = 2.5; _s3.nucA.o = 0; _s3.spindle.o = 0.5; _s3.spindle.s = 1.5;
        for(let i=0; i<4; i++) {
            _s3.chrA[i].p.copy(basePos.chrEq[i]).add(new THREE.Vector3(0, 1.2, 0));
            _s3.chrB[i].p.copy(basePos.chrEq[i]).add(new THREE.Vector3(0, -1.2, 0));
            _s3.chrB[i].s = 1.5; _s3.chrB[i].o = 1.0;
        }
        states.push(_s3);

        // S4: Telophase
        let _s4 = createState(); copyVecs(_s3, _s4);
        _s4.memA.s = 2.5; _s4.spindle.o = 0;
        _s4.nucA.p.set(0, 1.2, 0); _s4.nucA.s = 1.0; _s4.nucA.o = 0.6;
        _s4.nucB.p.set(0, -1.2, 0); _s4.nucB.s = 1.0; _s4.nucB.o = 0.6;
        for(let i=0; i<4; i++) {
            _s4.chrA[i].p.copy(basePos.chr[i]).add(new THREE.Vector3(0, 1.2, 0));
            _s4.chrA[i].s = 1.0;
            _s4.chrB[i].p.copy(basePos.chr[i]).add(new THREE.Vector3(0, -1.2, 0));
            _s4.chrB[i].s = 1.0;
        }
        states.push(_s4);

        // S5: Cytokinesis
        let _s5 = createState(); copyVecs(_s4, _s5);
        _s5.memA.p.set(0, 1.5, 0); _s5.memA.s = 1.8;
        _s5.memB.p.set(0, -1.5, 0); _s5.memB.s = 1.8; _s5.memB.o = 0.3;
        _s5.nucA.p.set(0, 1.5, 0); _s5.nucB.p.set(0, -1.5, 0);
        for(let i=0; i<4; i++) {
            _s5.chrA[i].p.copy(basePos.chr[i]).add(new THREE.Vector3(0, 1.5, 0));
            _s5.chrB[i].p.copy(basePos.chr[i]).add(new THREE.Vector3(0, -1.5, 0));
        }
        for(let i=0; i<5; i++) {
            _s5.orgA[i].p.copy(basePos.orgA[i]).add(new THREE.Vector3(0, 1.5, 0));
            _s5.orgB[i].p.copy(basePos.orgB[i]).add(new THREE.Vector3(0, -1.5, 0));
        }
        states.push(_s5);

        // --- Animation Logic ---
        let currentStageIdx = 0;
        let targetStageIdx = 0;
        let animProgress = 1.0;
        const ANIM_DURATION = 2.0; // seconds
        let currentState = createState();

        const lerpFloat = (a, b, t) => a + (b - a) * t;
        const lerpVec = (a, b, t, out) => out.lerpVectors(a, b, t);
        const lerpEuler = (a, b, t, out) => {
            const qa = new THREE.Quaternion().setFromEuler(a);
            const qb = new THREE.Quaternion().setFromEuler(b);
            qa.slerp(qb, t);
            out.setFromQuaternion(qa);
        };

        const updateCurrentState = (t) => {
            const sA = states[currentStageIdx];
            const sB = states[targetStageIdx];
            const out = currentState;

            // Ease in out cubic
            const easeT = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

            lerpVec(sA.memA.p, sB.memA.p, easeT, out.memA.p); out.memA.s = lerpFloat(sA.memA.s, sB.memA.s, easeT); out.memA.o = lerpFloat(sA.memA.o, sB.memA.o, easeT);
            lerpVec(sA.memB.p, sB.memB.p, easeT, out.memB.p); out.memB.s = lerpFloat(sA.memB.s, sB.memB.s, easeT); out.memB.o = lerpFloat(sA.memB.o, sB.memB.o, easeT);
            
            lerpVec(sA.nucA.p, sB.nucA.p, easeT, out.nucA.p); out.nucA.s = lerpFloat(sA.nucA.s, sB.nucA.s, easeT); out.nucA.o = lerpFloat(sA.nucA.o, sB.nucA.o, easeT);
            lerpVec(sA.nucB.p, sB.nucB.p, easeT, out.nucB.p); out.nucB.s = lerpFloat(sA.nucB.s, sB.nucB.s, easeT); out.nucB.o = lerpFloat(sA.nucB.o, sB.nucB.o, easeT);

            for(let i=0; i<4; i++) {
                lerpVec(sA.chrA[i].p, sB.chrA[i].p, easeT, out.chrA[i].p); lerpEuler(sA.chrA[i].r, sB.chrA[i].r, easeT, out.chrA[i].r);
                out.chrA[i].s = lerpFloat(sA.chrA[i].s, sB.chrA[i].s, easeT); out.chrA[i].o = lerpFloat(sA.chrA[i].o, sB.chrA[i].o, easeT);
                
                lerpVec(sA.chrB[i].p, sB.chrB[i].p, easeT, out.chrB[i].p); lerpEuler(sA.chrB[i].r, sB.chrB[i].r, easeT, out.chrB[i].r);
                out.chrB[i].s = lerpFloat(sA.chrB[i].s, sB.chrB[i].s, easeT); out.chrB[i].o = lerpFloat(sA.chrB[i].o, sB.chrB[i].o, easeT);
            }

            for(let i=0; i<5; i++) {
                lerpVec(sA.orgA[i].p, sB.orgA[i].p, easeT, out.orgA[i].p);
                lerpVec(sA.orgB[i].p, sB.orgB[i].p, easeT, out.orgB[i].p);
            }

            out.spindle.s = lerpFloat(sA.spindle.s, sB.spindle.s, easeT);
            out.spindle.o = lerpFloat(sA.spindle.o, sB.spindle.o, easeT);
        };

        const applyStateToMeshes = (state) => {
            meshes.memA.position.copy(state.memA.p); meshes.memA.scale.setScalar(state.memA.s); meshes.memA.material.opacity = state.memA.o;
            meshes.memB.position.copy(state.memB.p); meshes.memB.scale.setScalar(state.memB.s); meshes.memB.material.opacity = state.memB.o;
            
            meshes.nucA.position.copy(state.nucA.p); meshes.nucA.scale.setScalar(state.nucA.s); meshes.nucA.material.opacity = state.nucA.o;
            meshes.nucB.position.copy(state.nucB.p); meshes.nucB.scale.setScalar(state.nucB.s); meshes.nucB.material.opacity = state.nucB.o;

            for(let i=0; i<4; i++) {
                meshes.chrA[i].position.copy(state.chrA[i].p); meshes.chrA[i].rotation.copy(state.chrA[i].r);
                meshes.chrA[i].scale.setScalar(state.chrA[i].s); meshes.chrA[i].material.opacity = state.chrA[i].o; meshes.chrA[i].material.transparent = state.chrA[i].o < 1;
                
                meshes.chrB[i].position.copy(state.chrB[i].p); meshes.chrB[i].rotation.copy(state.chrB[i].r);
                meshes.chrB[i].scale.setScalar(state.chrB[i].s); meshes.chrB[i].material.opacity = state.chrB[i].o; meshes.chrB[i].material.transparent = state.chrB[i].o < 1;
            }

            for(let i=0; i<5; i++) {
                meshes.orgA[i].position.copy(state.orgA[i].p);
                meshes.orgB[i].position.copy(state.orgB[i].p);
            }

            meshes.spindles.scale.y = state.spindle.s;
            spindleMat.opacity = state.spindle.o;
        };

        // Initial apply
        updateCurrentState(1.0);
        applyStateToMeshes(currentState);

        // --- UI & Interaction ---
        const elStageName = document.getElementById('stage-name');
        const elStageNum = document.getElementById('stage-number');
        const elStageDesc = document.getElementById('stage-description');
        const elProgBar = document.getElementById('progress-bar');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnReset = document.getElementById('btn-reset');

        const updateUI = () => {
            const info = STAGE_INFO[targetStageIdx];
            elStageName.innerText = info.name;
            elStageNum.innerText = `${targetStageIdx + 1}/6`;
            elStageDesc.innerText = info.desc;
            elProgBar.style.width = `${(targetStageIdx / 5) * 100}%`;
            
            btnPrev.disabled = targetStageIdx === 0;
            btnNext.disabled = targetStageIdx === 5;
        };

        const setStage = (idx) => {
            if(idx < 0 || idx > 5 || idx === targetStageIdx) return;
            if(animProgress < 1.0) {
                // Fast forward current animation to start new one cleanly
                currentStageIdx = targetStageIdx;
            }
            targetStageIdx = idx;
            animProgress = 0.0;
            updateUI();
        };

        btnPrev.addEventListener('click', () => setStage(targetStageIdx - 1));
        btnNext.addEventListener('click', () => setStage(targetStageIdx + 1));
        btnReset.addEventListener('click', () => setStage(0));

        window.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowRight') setStage(targetStageIdx + 1);
            else if(e.key === 'ArrowLeft') setStage(targetStageIdx - 1);
            else if(e.key.toLowerCase() === 'r') setStage(0);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Render Loop ---
        const clock = new THREE.Clock();

        const animate = () => {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Handle Animation
            if (animProgress < 1.0) {
                animProgress += delta / ANIM_DURATION;
                if (animProgress >= 1.0) {
                    animProgress = 1.0;
                    currentStageIdx = targetStageIdx;
                }
                updateCurrentState(animProgress);
                applyStateToMeshes(currentState);
            }

            // Auto-rotation
            if (!isDragging) {
                dioramaGroup.rotation.y += 0.1 * delta;
            }

            // Update Global State Object
            window.__3D_STATE__.currentStage = targetStageIdx;
            window.__3D_STATE__.stageName = STAGE_INFO[targetStageIdx].name;
            window.__3D_STATE__.isAnimating = animProgress < 1.0;
            window.__3D_STATE__.cellCount = currentState.memB.o > 0.1 ? 2 : 1;
            window.__3D_STATE__.chromosomeCount = currentState.chrB[0].o > 0.1 ? 8 : 4;
            window.__3D_STATE__.nucleusOpacity = currentState.nucA.o;
            window.__3D_STATE__.spindleFibersVisible = currentState.spindle.o > 0.1;
            window.__3D_STATE__.animationProgress = animProgress;

            controls.update();
            renderer.render(scene, camera);
        };

        animate();
    </script>
</body>
</html>
