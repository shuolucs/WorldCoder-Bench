<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitosis Diorama</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
canvas { display: block; }

#info-panel {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(100, 150, 255, 0.3);
    border-radius: 12px;
    padding: 16px 28px;
    color: #e0e0ff;
    text-align: center;
    min-width: 340px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    z-index: 10;
}

#stage-name {
    font-size: 22px;
    font-weight: 700;
    color: #88ccff;
    display: block;
    margin-bottom: 4px;
}

#stage-number {
    font-size: 14px;
    color: #8888aa;
    display: block;
    margin-bottom: 8px;
}

#stage-description {
    font-size: 13px;
    color: #aaaacc;
    line-height: 1.4;
    margin-top: 8px;
}

#progress-bar-container {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    margin-top: 12px;
    overflow: hidden;
}

#progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #4488ff, #88ccff);
    border-radius: 3px;
    transition: width 0.5s ease;
    width: 0%;
}

.btn {
    position: absolute;
    bottom: 30px;
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 600;
    border: 1px solid rgba(100, 150, 255, 0.4);
    border-radius: 8px;
    background: rgba(20, 20, 50, 0.9);
    color: #88ccff;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.2s ease;
    z-index: 10;
    user-select: none;
}

.btn:hover {
    background: rgba(40, 40, 80, 0.95);
    border-color: rgba(100, 150, 255, 0.7);
    box-shadow: 0 0 15px rgba(100, 150, 255, 0.2);
}

.btn:active {
    transform: scale(0.97);
}

.btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

#btn-prev { left: 30px; }
#btn-next { right: 30px; }
#btn-reset { left: 50%; transform: translateX(-50%); bottom: 30px; }
</style>
</head>
<body>

<div id="info-panel">
    <span id="stage-name">Interphase</span>
    <span id="stage-number">1 / 6</span>
    <p id="stage-description">The cell is in its normal state. The nucleus is intact and chromosomes are loosely arranged as chromatin.</p>
    <div id="progress-bar-container">
        <div id="progress-bar"></div>
    </div>
</div>

<button class="btn" id="btn-prev">◀ Previous</button>
<button class="btn" id="btn-reset">↺ Reset</button>
<button class="btn" id="btn-next">Next Stage ▶</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
    // Stage data
    const STAGES = [
        { name: 'Interphase', desc: 'The cell is in its normal state. The nucleus is intact and chromosomes are loosely arranged as chromatin.' },
        { name: 'Prophase', desc: 'Chromosomes condense and become visible. The nuclear envelope begins to break down.' },
        { name: 'Metaphase', desc: 'Chromosomes align at the cell\'s equator. Spindle fibers attach to the centromeres.' },
        { name: 'Anaphase', desc: 'Sister chromatids separate and move to opposite poles of the cell, pulled by spindle fibers.' },
        { name: 'Telophase', desc: 'Chromosomes arrive at the poles and decondense. New nuclear envelopes form around each set.' },
        { name: 'Cytokinesis', desc: 'The cell membrane pinches inward, dividing the cytoplasm and forming two identical daughter cells.' }
    ];

    // State
    window.__3D_STATE__ = {
        currentStage: 0,
        stageName: 'Interphase',
        isAnimating: false,
        cellCount: 1,
        chromosomeCount: 4,
        nucleusOpacity: 0.6,
        spindleFibersVisible: false,
        totalStages: 6,
        animationProgress: 1.0
    };

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 2, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Controls
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableZoom = false;
    controls.enablePan = false;
    controls.target.set(0, 2.5, 0);
    controls.update();
    controls.minPolarAngle = 0.3;
    controls.maxPolarAngle = Math.PI / 2.2;

    // Track user interaction
    let userInteracting = false;
    let interactionTimeout;
    controls.addEventListener('start', () => {
        userInteracting = true;
        clearTimeout(interactionTimeout);
    });
    controls.addEventListener('end', () => {
        interactionTimeout = setTimeout(() => { userInteracting = false; }, 2000);
    });

    // Lighting
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambLight);

    const pointLight = new THREE.PointLight(0x88ccff, 0.3, 8);
    pointLight.position.set(0, 3, 0);
    scene.add(pointLight);

    // Diorama group (for rotation)
    const diorama = new THREE.Group();
    scene.add(diorama);

    // Base platform
    const baseGeo = new THREE.CylinderGeometry(6, 6, 0.5, 64);
    const baseMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8, metalness: 0.1 });
    const base = new THREE.Mesh(baseGeo, baseMat);
    base.position.y = -0.25;
    base.receiveShadow = true;
    diorama.add(base);

    // Base ring
    const ringGeo = new THREE.TorusGeometry(6, 0.15, 16, 64);
    const ringMat = new THREE.MeshStandardMaterial({ color: 0x654321, roughness: 0.7 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.y = 0;
    ring.rotation.x = Math.PI / 2;
    diorama.add(ring);

    // MITOSIS label using canvas sprite
    function createLabel(text) {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#2a1a0a';
        ctx.fillRect(0, 0, 512, 128);
        ctx.strokeStyle = '#654321';
        ctx.lineWidth = 4;
        ctx.strokeRect(4, 4, 504, 120);
        ctx.fillStyle = '#f0d090';
        ctx.font = 'bold 64px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, 256, 64);

        const texture = new THREE.CanvasTexture(canvas);
        const mat = new THREE.MeshBasicMaterial({ map: texture });
        const geo = new THREE.PlaneGeometry(2.5, 0.6);
        const mesh = new THREE.Mesh(geo, mat);
        return mesh;
    }

    const label = createLabel('MITOSIS');
    label.position.set(0, 0.01, 4.5);
    label.rotation.x = -Math.PI / 2;
    diorama.add(label);

    // Small sign standing up
    const signGeo = new THREE.PlaneGeometry(2, 0.8);
    const signCanvas = document.createElement('canvas');
    signCanvas.width = 256;
    signCanvas.height = 100;
    const signCtx = signCanvas.getContext('2d');
    signCtx.fillStyle = '#1a1a0a';
    signCtx.fillRect(0, 0, 256, 100);
    signCtx.fillStyle = '#f0d090';
    signCtx.font = 'bold 40px serif';
    signCtx.textAlign = 'center';
    signCtx.textBaseline = 'middle';
    signCtx.fillText('MITOSIS', 128, 50);
    const signTex = new THREE.CanvasTexture(signCanvas);
    const signMat = new THREE.MeshBasicMaterial({ map: signTex, side: THREE.DoubleSide });
    const sign = new THREE.Mesh(signGeo, signMat);
    sign.position.set(0, 0.5, 5);
    sign.rotation.y = 0;
    diorama.add(sign);

    // Cell group
    const cellGroup = new THREE.Group();
    cellGroup.position.set(0, 3, 0);
    diorama.add(cellGroup);

    // Cell membrane
    const cellMembraneMat = new THREE.MeshPhysicalMaterial({
        color: 0x88cc88,
        transparent: true,
        opacity: 0.3,
        roughness: 0.1,
        metalness: 0.0,
        side: THREE.DoubleSide,
        depthWrite: false
    });
    const cellMembraneGeo = new THREE.SphereGeometry(2.5, 32, 32);
    const cellMembrane = new THREE.Mesh(cellMembraneGeo, cellMembraneMat);
    cellGroup.add(cellMembrane);

    // Second cell (for cytokinesis)
    const cellMembrane2Mat = cellMembraneMat.clone();
    const cellMembrane2 = new THREE.Mesh(cellMembraneGeo.clone(), cellMembrane2Mat);
    cellMembrane2.visible = false;
    cellGroup.add(cellMembrane2);

    // Nucleus
    const nucleusGeo = new THREE.SphereGeometry(1.2, 32, 32);
    const nucleusMat = new THREE.MeshPhysicalMaterial({
        color: 0x4444aa,
        transparent: true,
        opacity: 0.6,
        roughness: 0.3,
        side: THREE.DoubleSide,
        depthWrite: false
    });
    const nucleus = new THREE.Mesh(nucleusGeo, nucleusMat);
    cellGroup.add(nucleus);

    // Second nucleus (for telophase/cytokinesis)
    const nucleus2Mat = nucleusMat.clone();
    const nucleus2 = new THREE.Mesh(nucleusGeo.clone(), nucleus2Mat);
    nucleus2.visible = false;
    cellGroup.add(nucleus2);

    // Chromosomes (4 original)
    const chromosomes = [];
    const chromosomeGeo = new THREE.SphereGeometry(0.15, 16, 16);
    const chromosomeMat = new THREE.MeshStandardMaterial({ color: 0xff6644, roughness: 0.5 });

    const chromInitPositions = [
        new THREE.Vector3(-0.3, 0.2, 0.1),
        new THREE.Vector3(0.3, -0.1, -0.2),
        new THREE.Vector3(-0.1, -0.3, 0.3),
        new THREE.Vector3(0.2, 0.3, -0.1)
    ];

    for (let i = 0; i < 4; i++) {
        const chrom = new THREE.Mesh(chromosomeGeo.clone(), chromosomeMat.clone());
        chrom.scale.set(1, 2, 1);
        chrom.position.copy(chromInitPositions[i]);
        chrom.rotation.z = Math.random() * Math.PI;
        cellGroup.add(chrom);
        chromosomes.push(chrom);
    }

    // Duplicated chromosomes (for anaphase)
    const chromosomesDup = [];
    for (let i = 0; i < 4; i++) {
        const chrom = new THREE.Mesh(chromosomeGeo.clone(), chromosomeMat.clone());
        chrom.scale.set(1, 2, 1);
        chrom.position.copy(chromInitPositions[i]);
        chrom.rotation.z = chromosomes[i].rotation.z;
        chrom.visible = false;
        cellGroup.add(chrom);
        chromosomesDup.push(chrom);
    }

    // Organelles
    const organelles = [];
    const organelleGeo = new THREE.SphereGeometry(0.15, 12, 12);
    const organelleMat = new THREE.MeshStandardMaterial({ color: 0xccaa44, roughness: 0.6 });

    for (let i = 0; i < 10; i++) {
        const org = new THREE.Mesh(organelleGeo.clone(), organelleMat.clone());
        const angle = Math.random() * Math.PI * 2;
        const r = 1.4 + Math.random() * 0.8;
        const y = (Math.random() - 0.5) * 1.5;
        org.position.set(Math.cos(angle) * r, y, Math.sin(angle) * r);
        cellGroup.add(org);
        organelles.push(org);
    }

    // Spindle fibers
    const spindleFibers = [];
    const spindleMat = new THREE.LineBasicMaterial({ color: 0xaaaaff, transparent: true, opacity: 0.6 });

    for (let i = 0; i < 8; i++) {
        const points = [
            new THREE.Vector3(0, 2.2, 0),
            new THREE.Vector3(0, 0, 0),
            new THREE.Vector3(0, -2.2, 0)
        ];
        const geo = new THREE.BufferGeometry().setFromPoints(points);
        const line = new THREE.Line(geo, spindleMat.clone());
        line.visible = false;
        cellGroup.add(line);
        spindleFibers.push(line);
    }

    // Stage target states
    // We'll define target properties for each stage and lerp between them

    // Animation state
    let currentStageIndex = 0;
    let targetStageIndex = 0;
    let animProgress = 1.0;
    let animating = false;
    const ANIM_DURATION = 2.0;

    // Snapshot states for interpolation
    let stateFrom = {};
    let stateTo = {};

    function captureState() {
        return {
            nucleusOpacity: nucleusMat.opacity,
            nucleusScale: nucleus.scale.clone(),
            nucleusPos: nucleus.position.clone(),
            nucleus2Visible: nucleus2.visible,
            nucleus2Opacity: nucleus2Mat.opacity,
            nucleus2Scale: nucleus2.scale.clone(),
            nucleus2Pos: nucleus2.position.clone(),
            cellScale: cellMembrane.scale.clone(),
            cellPos: cellMembrane.position.clone(),
            cell2Visible: cellMembrane2.visible,
            cell2Scale: cellMembrane2.scale.clone(),
            cell2Pos: cellMembrane2.position.clone(),
            cell2Opacity: cellMembrane2Mat.opacity,
            cellOpacity: cellMembraneMat.opacity,
            chromPositions: chromosomes.map(c => c.position.clone()),
            chromScales: chromosomes.map(c => c.scale.clone()),
            chromOpacities: chromosomes.map(c => c.material.opacity),
            chromDupVisible: chromosomesDup.map(c => c.visible),
            chromDupPositions: chromosomesDup.map(c => c.position.clone()),
            chromDupScales: chromosomesDup.map(c => c.scale.clone()),
            spindleVisible: spindleFibers[0].visible,
            spindleOpacity: spindleFibers[0].material.opacity,
            organellePositions: organelles.map(o => o.position.clone()),
        };
    }

    function getStageState(stageIdx) {
        const state = {};

        // Defaults
        state.nucleusScale = new THREE.Vector3(1, 1, 1);
        state.nucleusPos = new THREE.Vector3(0, 0, 0);
        state.nucleus2Visible = false;
        state.nucleus2Opacity = 0;
        state.nucleus2Scale = new THREE.Vector3(0.7, 0.7, 0.7);
        state.nucleus2Pos = new THREE.Vector3(0, 1.2, 0);
        state.cellScale = new THREE.Vector3(1, 1, 1);
        state.cellPos = new THREE.Vector3(0, 0, 0);
        state.cell2Visible = false;
        state.cell2Scale = new THREE.Vector3(1, 1, 1);
        state.cell2Pos = new THREE.Vector3(0, 0, 0);
        state.cell2Opacity = 0;
        state.cellOpacity = 0.3;
        state.spindleVisible = false;
        state.spindleOpacity = 0;

        // Chromosome defaults
        state.chromPositions = chromInitPositions.map(p => p.clone());
        state.chromScales = [
            new THREE.Vector3(1, 2, 1),
            new THREE.Vector3(1, 2, 1),
            new THREE.Vector3(1, 2, 1),
            new THREE.Vector3(1, 2, 1)
        ];
        state.chromOpacities = [1, 1, 1, 1];
        state.chromDupVisible = [false, false, false, false];
        state.chromDupPositions = chromInitPositions.map(p => p.clone());
        state.chromDupScales = state.chromScales.map(s => s.clone());

        // Organelle positions (keep original)
        state.organellePositions = organelles.map(o => {
            const angle = Math.atan2(o.position.z, o.position.x);
            const r = Math.sqrt(o.position.x ** 2 + o.position.z ** 2);
            return new THREE.Vector3(o.position.x, o.position.y, o.position.z);
        });

        switch (stageIdx) {
            case 0: // Interphase
                state.nucleusOpacity = 0.6;
                break;

            case 1: // Prophase
                state.nucleusOpacity = 0.35;
                state.chromScales = [
                    new THREE.Vector3(1.4, 2.8, 1.4),
                    new THREE.Vector3(1.4, 2.8, 1.4),
                    new THREE.Vector3(1.4, 2.8, 1.4),
                    new THREE.Vector3(1.4, 2.8, 1.4)
                ];
                state.chromPositions = [
                    new THREE.Vector3(-0.4, 0.3, 0.15),
                    new THREE.Vector3(0.4, -0.15, -0.3),
                    new THREE.Vector3(-0.15, -0.4, 0.4),
                    new THREE.Vector3(0.3, 0.4, -0.15)
                ];
                break;

            case 2: // Metaphase
                state.nucleusOpacity = 0.0;
                state.spindleVisible = true;
                state.spindleOpacity = 0.6;
                state.chromScales = [
                    new THREE.Vector3(1.5, 3, 1.5),
                    new THREE.Vector3(1.5, 3, 1.5),
                    new THREE.Vector3(1.5, 3, 1.5),
                    new THREE.Vector3(1.5, 3, 1.5)
                ];
                // Align at equator (y=0 in cell local space)
                state.chromPositions = [
                    new THREE.Vector3(-0.5, 0, 0.3),
                    new THREE.Vector3(0.5, 0, -0.3),
                    new THREE.Vector3(-0.2, 0, -0.5),
                    new THREE.Vector3(0.2, 0, 0.5)
                ];
                break;

            case 3: // Anaphase
                state.nucleusOpacity = 0.0;
                state.spindleVisible = true;
                state.spindleOpacity = 0.4;
                state.chromScales = [
                    new THREE.Vector3(1.2, 2.4, 1.2),
                    new THREE.Vector3(1.2, 2.4, 1.2),
                    new THREE.Vector3(1.2, 2.4, 1.2),
                    new THREE.Vector3(1.2, 2.4, 1.2)
                ];
                // Move up
                state.chromPositions = [
                    new THREE.Vector3(-0.4, 1.2, 0.2),
                    new THREE.Vector3(0.4, 1.2, -0.2),
                    new THREE.Vector3(-0.15, 1.2, -0.4),
                    new THREE.Vector3(0.15, 1.2, 0.4)
                ];
                // Duplicates move down
                state.chromDupVisible = [true, true, true, true];
                state.chromDupPositions = [
                    new THREE.Vector3(-0.4, -1.2, 0.2),
                    new THREE.Vector3(0.4, -1.2, -0.2),
                    new THREE.Vector3(-0.15, -1.2, -0.4),
                    new THREE.Vector3(0.15, -1.2, 0.4)
                ];
                state.chromDupScales = state.chromScales.map(s => s.clone());
                break;

            case 4: // Telophase
                state.nucleusOpacity = 0.5;
                state.nucleusScale = new THREE.Vector3(0.7, 0.7, 0.7);
                state.nucleusPos = new THREE.Vector3(0, 1.2, 0);
                state.nucleus2Visible = true;
                state.nucleus2Opacity = 0.5;
                state.nucleus2Scale = new THREE.Vector3(0.7, 0.7, 0.7);
                state.nucleus2Pos = new THREE.Vector3(0, -1.2, 0);
                state.chromScales = [
                    new THREE.Vector3(0.8, 1.6, 0.8),
                    new THREE.Vector3(0.8, 1.6, 0.8),
                    new THREE.Vector3(0.8, 1.6, 0.8),
                    new THREE.Vector3(0.8, 1.6, 0.8)
                ];
                state.chromPositions = [
                    new THREE.Vector3(-0.2, 1.3, 0.1),
                    new THREE.Vector3(0.2, 1.1, -0.1),
                    new THREE.Vector3(-0.1, 1.4, -0.2),
                    new THREE.Vector3(0.1, 1.0, 0.2)
                ];
                state.chromDupVisible = [true, true, true, true];
                state.chromDupPositions = [
                    new THREE.Vector3(-0.2, -1.1, 0.1),
                    new THREE.Vector3(0.2, -1.3, -0.1),
                    new THREE.Vector3(-0.1, -1.0, -0.2),
                    new THREE.Vector3(0.1, -1.4, 0.2)
                ];
                state.chromDupScales = state.chromScales.map(s => s.clone());
                // Cell starts to elongate
                state.cellScale = new THREE.Vector3(0.85, 1.15, 0.85);
                break;

            case 5: // Cytokinesis
                state.nucleusOpacity = 0.6;
                state.nucleusScale = new THREE.Vector3(0.55, 0.55, 0.55);
                state.nucleusPos = new THREE.Vector3(0, 1.8, 0);
                state.nucleus2Visible = true;
                state.nucleus2Opacity = 0.6;
                state.nucleus2Scale = new THREE.Vector3(0.55, 0.55, 0.55);
                state.nucleus2Pos = new THREE.Vector3(0, -1.8, 0);
                // Hide main cell, show two cells
                state.cellScale = new THREE.Vector3(0.0, 0.0, 0.0);
                state.cellOpacity = 0.0;
                state.cell2Visible = true;
                state.cell2Scale = new THREE.Vector3(0.7, 0.7, 0.7);
                state.cell2Pos = new THREE.Vector3(0, -1.8, 0);
                state.cell2Opacity = 0.3;
                // We'll use cellMembrane as top cell
                state.cellScale = new THREE.Vector3(0.7, 0.7, 0.7);
                state.cellPos = new THREE.Vector3(0, 1.8, 0);
                state.cellOpacity = 0.3;
                state.chromScales = [
                    new THREE.Vector3(0.7, 1.4, 0.7),
                    new THREE.Vector3(0.7, 1.4, 0.7),
                    new THREE.Vector3(0.7, 1.4, 0.7),
                    new THREE.Vector3(0.7, 1.4, 0.7)
                ];
                state.chromPositions = [
                    new THREE.Vector3(-0.15, 1.9, 0.08),
                    new THREE.Vector3(0.15, 1.7, -0.08),
                    new THREE.Vector3(-0.08, 2.0, -0.15),
                    new THREE.Vector3(0.08, 1.6, 0.15)
                ];
                state.chromDupVisible = [true, true, true, true];
                state.chromDupPositions = [
                    new THREE.Vector3(-0.15, -1.7, 0.08),
                    new THREE.Vector3(0.15, -1.9, -0.08),
                    new THREE.Vector3(-0.08, -1.6, -0.15),
                    new THREE.Vector3(0.08, -2.0, 0.15)
                ];
                state.chromDupScales = state.chromScales.map(s => s.clone());
                break;
        }

        return state;
    }

    function lerpValue(a, b, t) {
        return a + (b - a) * t;
    }

    function lerpVec3(a, b, t) {
        return new THREE.Vector3(
            lerpValue(a.x, b.x, t),
            lerpValue(a.y, b.y, t),
            lerpValue(a.z, b.z, t)
        );
    }

    function smoothstep(t) {
        return t * t * (3 - 2 * t);
    }

    function applyInterpolatedState(from, to, t) {
        const st = smoothstep(t);

        // Nucleus
        nucleusMat.opacity = lerpValue(from.nucleusOpacity, to.nucleusOpacity, st);
        nucleus.scale.copy(lerpVec3(from.nucleusScale || new THREE.Vector3(1,1,1), to.nucleusScale, st));
        nucleus.position.copy(lerpVec3(from.nucleusPos || new THREE.Vector3(0,0,0), to.nucleusPos, st));
        nucleus.visible = nucleusMat.opacity > 0.01;

        // Nucleus 2
        const n2op = lerpValue(from.nucleus2Opacity || 0, to.nucleus2Opacity, st);
        nucleus2Mat.opacity = n2op;
        nucleus2.visible = n2op > 0.01 || to.nucleus2Visible;
        nucleus2.scale.copy(lerpVec3(from.nucleus2Scale || new THREE.Vector3(0.7,0.7,0.7), to.nucleus2Scale, st));
        nucleus2.position.copy(lerpVec3(from.nucleus2Pos || new THREE.Vector3(0,-1.2,0), to.nucleus2Pos, st));

        // Cell membrane
        cellMembrane.scale.copy(lerpVec3(from.cellScale || new THREE.Vector3(1,1,1), to.cellScale, st));
        cellMembrane.position.copy(lerpVec3(from.cellPos || new THREE.Vector3(0,0,0), to.cellPos, st));
        cellMembraneMat.opacity = lerpValue(from.cellOpacity !== undefined ? from.cellOpacity : 0.3, to.cellOpacity, st);

        // Cell 2
        const c2op = lerpValue(from.cell2Opacity || 0, to.cell2Opacity, st);
        cellMembrane2Mat.opacity = c2op;
        cellMembrane2.visible = c2op > 0.01 || to.cell2Visible;
        cellMembrane2.scale.copy(lerpVec3(from.cell2Scale || new THREE.Vector3(1,1,1), to.cell2Scale, st));
        cellMembrane2.position.copy(lerpVec3(from.cell2Pos || new THREE.Vector3(0,0,0), to.cell2Pos, st));

        // Chromosomes
        for (let i = 0; i < 4; i++) {
            chromosomes[i].position.copy(lerpVec3(from.chromPositions[i], to.chromPositions[i], st));
            chromosomes[i].scale.copy(lerpVec3(from.chromScales[i], to.chromScales[i], st));
        }

        // Duplicate chromosomes
        for (let i = 0; i < 4; i++) {
            const vis = to.chromDupVisible[i];
            const fromVis = from.chromDupVisible ? from.chromDupVisible[i] : false;
            chromosomesDup[i].visible = vis || fromVis;
            if (chromosomesDup[i].visible) {
                const fromPos = from.chromDupPositions ? from.chromDupPositions[i] : from.chromPositions[i];
                const fromScale = from.chromDupScales ? from.chromDupScales[i] : from.chromScales[i];
                chromosomesDup[i].position.copy(lerpVec3(fromPos, to.chromDupPositions[i], st));
                chromosomesDup[i].scale.copy(lerpVec3(fromScale, to.chromDupScales[i], st));
                // Fade in
                if (!fromVis && vis) {
                    chromosomesDup[i].material.opacity = st;
                } else {
                    chromosomesDup[i].material.opacity = 1;
                }
            }
        }

        // Spindle fibers
        const spindleOp = lerpValue(from.spindleOpacity || 0, to.spindleOpacity, st);
        const spindleVis = spindleOp > 0.01;
        for (let i = 0; i < spindleFibers.length; i++) {
            spindleFibers[i].visible = spindleVis;
            spindleFibers[i].material.opacity = spindleOp;
        }

        // Update spindle fiber positions
        if (spindleVis) {
            updateSpindleFibers(st);
        }

        // Update state object
        window.__3D_STATE__.nucleusOpacity = nucleusMat.opacity;
        window.__3D_STATE__.spindleFibersVisible = spindleVis;
    }

    function updateSpindleFibers(t) {
        const targetStage = targetStageIndex;
        const topPole = new THREE.Vector3(0, 2.0, 0);
        const bottomPole = new THREE.Vector3(0, -2.0, 0);

        for (let i = 0; i < 4; i++) {
            const chromPos = chromosomes[i].position;
            const positions = spindleFibers[i].geometry.attributes.position;
            positions.setXYZ(0, topPole.x, topPole.y, topPole.z);
            positions.setXYZ(1, chromPos.x, chromPos.y, chromPos.z);
            positions.setXYZ(2, chromPos.x, chromPos.y, chromPos.z);
            positions.needsUpdate = true;
        }

        for (let i = 0; i < 4; i++) {
            if (chromosomesDup[i].visible) {
                const chromPos = chromosomesDup[i].position;
                const positions = spindleFibers[i + 4].geometry.attributes.position;
                positions.setXYZ(0, bottomPole.x, bottomPole.y, bottomPole.z);
                positions.setXYZ(1, chromPos.x, chromPos.y, chromPos.z);
                positions.setXYZ(2, chromPos.x, chromPos.y, chromPos.z);
                positions.needsUpdate = true;
                spindleFibers[i + 4].visible = spindleFibers[0].visible;
                spindleFibers[i + 4].material.opacity = spindleFibers[0].material.opacity;
            } else {
                spindleFibers[i + 4].visible = false;
            }
        }
    }

    function goToStage(idx) {
        if (idx < 0 || idx > 5 || animating) return;
        if (idx === currentStageIndex && animProgress >= 1.0) return;

        stateFrom = captureState();
        stateTo = getStageState(idx);
        targetStageIndex = idx;
        animProgress = 0;
        animating = true;

        window.__3D_STATE__.isAnimating = true;
        window.__3D_STATE__.animationProgress = 0;

        updateUI(idx);
    }

    function updateUI(stageIdx) {
        const stage = STAGES[stageIdx];
        document.getElementById('stage-name').textContent = stage.name;
        document.getElementById('stage-number').textContent = `${stageIdx + 1} / 6`;
        document.getElementById('stage-description').textContent = stage.desc;
        document.getElementById('progress-bar').style.width = `${(stageIdx / 5) * 100}%`;

        document.getElementById('btn-prev').disabled = stageIdx === 0;
        document.getElementById('btn-next').disabled = stageIdx === 5;

        window.__3D_STATE__.currentStage = stageIdx;
        window.__3D_STATE__.stageName = stage.name;
        window.__3D_STATE__.cellCount = stageIdx === 5 ? 2 : 1;
        window.__3D_STATE__.chromosomeCount = stageIdx >= 3 ? 8 : 4;
    }

    // Initialize to stage 0
    function initStage0() {
        const s = getStageState(0);
        stateFrom = s;
        stateTo = s;
        applyInterpolatedState(s, s, 1);
        updateUI(0);
    }

    // Buttons
    document.getElementById('btn-next').addEventListener('click', () => {
        if (!animating) goToStage(currentStageIndex + 1);
    });

    document.getElementById('btn-prev').addEventListener('click', () => {
        if (!animating) goToStage(currentStageIndex - 1);
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
        if (animating) {
            // Force finish current animation
            animProgress = 1.0;
            animating = false;
            currentStageIndex = targetStageIndex;
        }
        goToStage(0);
    });

    // Keyboard
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') {
            if (!animating) goToStage(currentStageIndex + 1);
        } else if (e.key === 'ArrowLeft') {
            if (!animating) goToStage(currentStageIndex - 1);
        } else if (e.key === 'r' || e.key === 'R') {
            if (animating) {
                animProgress = 1.0;
                animating = false;
                currentStageIndex = targetStageIndex;
            }
            goToStage(0);
        }
    });

    // Animation loop
    const clock = new THREE.Clock();
    let dioramaRotation = 0;

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        // Auto-rotate diorama
        if (!userInteracting) {
            dioramaRotation += 0.1 * delta;
            diorama.rotation.y = dioramaRotation;
        } else {
            dioramaRotation = diorama.rotation.y;
        }

        // Stage transition animation
        if (animating) {
            animProgress += delta / ANIM_DURATION;
            if (animProgress >= 1.0) {
                animProgress = 1.0;
                animating = false;
                currentStageIndex = targetStageIndex;
                window.__3D_STATE__.isAnimating = false;
            }
            window.__3D_STATE__.animationProgress = animProgress;
            applyInterpolatedState(stateFrom, stateTo, animProgress);
        }

        // Gentle chromosome wobble
        const time = clock.elapsedTime;
        for (let i = 0; i < chromosomes.length; i++) {
            chromosomes[i].rotation.z += Math.sin(time * 0.5 + i) * 0.001;
        }
        for (let i = 0; i < chromosomesDup.length; i++) {
            if (chromosomesDup[i].visible) {
                chromosomesDup[i].rotation.z += Math.sin(time * 0.5 + i + 2) * 0.001;
            }
        }

        // Gentle organelle float
        for (let i = 0; i < organelles.length; i++) {
            organelles[i].position.y += Math.sin(time * 0.3 + i * 0.7) * 0.001;
        }

        controls.update();
        renderer.render(scene, camera);
    }

    // Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    initStage0();
    animate();
})();
</script>
</body>
