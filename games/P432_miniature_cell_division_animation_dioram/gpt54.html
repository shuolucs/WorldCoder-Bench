<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mitosis Diorama - Three.js</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #info-panel {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: min(520px, 90vw);
      background: rgba(10, 10, 20, 0.78);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: center;
      backdrop-filter: blur(6px);
      z-index: 10;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    #info-panel h2 {
      margin: 0 0 6px 0;
      font-size: 20px;
      font-weight: 700;
    }

    #info-panel p {
      margin: 8px 0 0 0;
      font-size: 14px;
      line-height: 1.45;
      color: #d7d7e6;
    }

    #progress-track {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      margin-top: 10px;
      overflow: hidden;
    }

    #progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #6dd5ed, #88cc88);
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    .controls {
      position: absolute;
      bottom: 20px;
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    #controls-left {
      left: 20px;
    }

    #controls-right {
      right: 20px;
    }

    button {
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.16);
      transition: transform 0.15s ease, background 0.2s ease;
    }

    button:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <div id="info-panel">
    <h2>
      <span id="stage-name">Interphase</span>
      —
      <span id="stage-number">1/6</span>
    </h2>
    <p id="stage-description">The cell is intact with a visible nucleus, and chromosomes are loosely arranged inside.</p>
    <div id="progress-track">
      <div id="progress-bar"></div>
    </div>
  </div>

  <div class="controls" id="controls-left">
    <button id="btn-prev">◀ Previous</button>
    <button id="btn-reset">↺ Reset</button>
  </div>

  <div class="controls" id="controls-right">
    <button id="btn-next">Next Stage ▶</button>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 3, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableZoom = false;
    controls.enablePan = false;
    controls.target.set(0, 3, 0);
    controls.update();

    let userInteracting = false;
    controls.addEventListener("start", () => userInteracting = true);
    controls.addEventListener("end", () => setTimeout(() => userInteracting = false, 200));

    const clock = new THREE.Clock();

    const root = new THREE.Group();
    scene.add(root);

    // Lighting
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const cellPointLight = new THREE.PointLight(0x88ccff, 0.3, 20);
    cellPointLight.position.set(0, 3, 0);
    scene.add(cellPointLight);

    // Platform
    const platformGeo = new THREE.CylinderGeometry(6, 6, 0.5, 64);
    const platformMat = new THREE.MeshStandardMaterial({
      color: 0x8B4513,
      roughness: 0.85,
      metalness: 0.05
    });
    const platform = new THREE.Mesh(platformGeo, platformMat);
    platform.position.set(0, -0.25, 0);
    root.add(platform);

    const ringGeo = new THREE.TorusGeometry(5.95, 0.08, 16, 64);
    const ringMat = new THREE.MeshStandardMaterial({ color: 0x654321, roughness: 0.8 });
    const platformRing = new THREE.Mesh(ringGeo, ringMat);
    platformRing.rotation.x = Math.PI / 2;
    platformRing.position.y = 0.02;
    root.add(platformRing);

    // Sign sprite "MITOSIS"
    function makeTextSprite(text) {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 128;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "rgba(30,20,10,0.8)";
      ctx.roundRect?.(10, 10, 492, 108, 20);
      if (!ctx.roundRect) {
        ctx.fillRect(10, 10, 492, 108);
      } else {
        ctx.fill();
      }

      ctx.strokeStyle = "rgba(220,190,140,0.9)";
      ctx.lineWidth = 6;
      if (ctx.roundRect) {
        ctx.beginPath();
        ctx.roundRect(10, 10, 492, 108, 20);
        ctx.stroke();
      } else {
        ctx.strokeRect(10, 10, 492, 108);
      }

      ctx.fillStyle = "#f5e6c8";
      ctx.font = "bold 56px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, 256, 64);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      const mat = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(2.8, 0.7, 1);
      return sprite;
    }

    const sign = makeTextSprite("MITOSIS");
    sign.position.set(0, 0.6, 4.6);
    root.add(sign);

    // Cell system
    const cellGroup = new THREE.Group();
    root.add(cellGroup);

    const CELL_CENTER = new THREE.Vector3(0, 3, 0);

    const membraneMat = new THREE.MeshPhongMaterial({
      color: 0x88cc88,
      transparent: true,
      opacity: 0.3,
      side: THREE.DoubleSide,
      shininess: 60
    });

    const nucleusMat = new THREE.MeshPhongMaterial({
      color: 0x4444aa,
      transparent: true,
      opacity: 0.6,
      shininess: 80
    });

    const chromosomeMat = new THREE.MeshPhongMaterial({
      color: 0xff6644,
      transparent: true,
      opacity: 0.95
    });

    const organelleMat = new THREE.MeshStandardMaterial({
      color: 0xccaa44,
      roughness: 0.5
    });

    const membraneGeo = new THREE.SphereGeometry(2.5, 48, 48);
    const nucleusGeo = new THREE.SphereGeometry(1.2, 32, 32);
    const chromoGeo = new THREE.SphereGeometry(0.22, 24, 24);
    const organelleGeo = new THREE.SphereGeometry(0.15, 16, 16);

    const mainMembrane = new THREE.Mesh(membraneGeo, membraneMat.clone());
    mainMembrane.position.copy(CELL_CENTER);
    cellGroup.add(mainMembrane);

    const splitMembraneA = new THREE.Mesh(membraneGeo, membraneMat.clone());
    splitMembraneA.visible = false;
    cellGroup.add(splitMembraneA);

    const splitMembraneB = new THREE.Mesh(membraneGeo, membraneMat.clone());
    splitMembraneB.visible = false;
    cellGroup.add(splitMembraneB);

    const nucleusMain = new THREE.Mesh(nucleusGeo, nucleusMat.clone());
    nucleusMain.position.copy(CELL_CENTER);
    cellGroup.add(nucleusMain);

    const nucleusTop = new THREE.Mesh(nucleusGeo, nucleusMat.clone());
    nucleusTop.visible = false;
    cellGroup.add(nucleusTop);

    const nucleusBottom = new THREE.Mesh(nucleusGeo, nucleusMat.clone());
    nucleusBottom.visible = false;
    cellGroup.add(nucleusBottom);

    const chromosomes = [];
    for (let i = 0; i < 8; i++) {
      const c = new THREE.Mesh(chromoGeo, chromosomeMat.clone());
      c.scale.set(0.8, 1.8, 0.8);
      c.visible = i < 4;
      chromosomes.push(c);
      cellGroup.add(c);
    }

    const organelles = [];
    const organellePositions = [
      [-1.6, 3.7, 0.4], [1.6, 2.8, -0.6], [-0.8, 1.8, 1.2], [1.1, 4.4, 0.9],
      [0.7, 2.2, -1.5], [-1.4, 3.0, -1.2], [0.0, 4.6, -0.7], [1.9, 3.4, 0.2],
      [-0.3, 2.1, 1.6], [-1.9, 2.7, 0.8]
    ];
    for (let i = 0; i < 10; i++) {
      const o = new THREE.Mesh(organelleGeo, organelleMat);
      o.position.set(...organellePositions[i]);
      organelles.push(o);
      cellGroup.add(o);
    }

    // Spindle fibers
    const spindleGroup = new THREE.Group();
    cellGroup.add(spindleGroup);

    const spindleMaterial = new THREE.LineBasicMaterial({
      color: 0xaadfff,
      transparent: true,
      opacity: 0.85
    });

    const spindleLines = [];
    for (let i = 0; i < 8; i++) {
      const geom = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(),
        new THREE.Vector3()
      ]);
      const line = new THREE.Line(geom, spindleMaterial);
      line.visible = false;
      spindleLines.push(line);
      spindleGroup.add(line);
    }

    const poleTop = new THREE.Vector3(0, 5.2, 0);
    const poleBottom = new THREE.Vector3(0, 0.8, 0);

    // Stage data
    const STAGES = [
      {
        name: "Interphase",
        description: "The cell is intact with a visible nucleus, and chromosomes are loosely arranged inside."
      },
      {
        name: "Prophase",
        description: "Chromosomes condense and become more distinct while the nuclear membrane begins to fade."
      },
      {
        name: "Metaphase",
        description: "Chromosomes align at the cell center as spindle fibers attach from opposite poles."
      },
      {
        name: "Anaphase",
        description: "Sister chromatids separate and move toward opposite poles of the cell."
      },
      {
        name: "Telophase",
        description: "Two new nuclei begin to reform around the separated chromosome sets."
      },
      {
        name: "Cytokinesis",
        description: "The cell membrane pinches inward and divides, forming two daughter cells."
      }
    ];

    // UI
    const stageNameEl = document.getElementById("stage-name");
    const stageNumberEl = document.getElementById("stage-number");
    const stageDescriptionEl = document.getElementById("stage-description");
    const progressBarEl = document.getElementById("progress-bar");

    // State
    let currentStage = 0;
    let fromStage = 0;
    let targetStage = 0;
    let isAnimating = false;
    let transitionTime = 0;
    const transitionDuration = 2.0;

    function easeInOut(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function vecLerp(a, b, t) {
      return new THREE.Vector3(
        lerp(a.x, b.x, t),
        lerp(a.y, b.y, t),
        lerp(a.z, b.z, t)
      );
    }

    function setLinePoints(line, a, b) {
      const positions = line.geometry.attributes.position.array;
      positions[0] = a.x; positions[1] = a.y; positions[2] = a.z;
      positions[3] = b.x; positions[4] = b.y; positions[5] = b.z;
      line.geometry.attributes.position.needsUpdate = true;
    }

    function getStagePose(stageIndex) {
      const pose = {
        mainCellVisible: true,
        mainCellScale: new THREE.Vector3(1, 1, 1),
        mainCellPos: CELL_CENTER.clone(),
        splitVisible: false,
        splitScaleA: new THREE.Vector3(0.85, 0.85, 0.85),
        splitScaleB: new THREE.Vector3(0.85, 0.85, 0.85),
        splitPosA: new THREE.Vector3(-1.45, 3, 0),
        splitPosB: new THREE.Vector3(1.45, 3, 0),

        nucleusMainVisible: true,
        nucleusMainOpacity: 0.6,
        nucleusMainPos: CELL_CENTER.clone(),
        nucleusTopVisible: false,
        nucleusBottomVisible: false,
        nucleusTopOpacity: 0.6,
        nucleusBottomOpacity: 0.6,
        nucleusTopPos: new THREE.Vector3(0, 4.0, 0),
        nucleusBottomPos: new THREE.Vector3(0, 2.0, 0),

        spindleVisible: false,
        chromosomeCount: 4,
        chromosomePositions: [],
        chromosomeScales: [],
        chromosomeOpacity: [],
        cellCount: 1
      };

      const loose = [
        new THREE.Vector3(-0.45, 3.35, 0.15),
        new THREE.Vector3(0.35, 2.85, -0.25),
        new THREE.Vector3(-0.2, 2.65, 0.35),
        new THREE.Vector3(0.5, 3.2, 0.2)
      ];

      const condensed = [
        new THREE.Vector3(-0.45, 3.3, 0.1),
        new THREE.Vector3(0.45, 2.8, -0.15),
        new THREE.Vector3(-0.15, 2.7, 0.3),
        new THREE.Vector3(0.25, 3.3, 0.25)
      ];

      const metaphase = [
        new THREE.Vector3(-0.75, 3.0, 0.0),
        new THREE.Vector3(-0.25, 3.0, 0.0),
        new THREE.Vector3(0.25, 3.0, 0.0),
        new THREE.Vector3(0.75, 3.0, 0.0)
      ];

      const anaphase = [
        new THREE.Vector3(-0.7, 4.1, 0.0),
        new THREE.Vector3(-0.25, 4.45, 0.0),
        new THREE.Vector3(0.25, 4.45, 0.0),
        new THREE.Vector3(0.7, 4.1, 0.0),
        new THREE.Vector3(-0.7, 1.9, 0.0),
        new THREE.Vector3(-0.25, 1.55, 0.0),
        new THREE.Vector3(0.25, 1.55, 0.0),
        new THREE.Vector3(0.7, 1.9, 0.0)
      ];

      const telophase = [
        new THREE.Vector3(-0.45, 4.0, 0.1),
        new THREE.Vector3(0.45, 4.1, -0.1),
        new THREE.Vector3(-0.15, 3.8, 0.2),
        new THREE.Vector3(0.25, 4.2, 0.15),
        new THREE.Vector3(-0.45, 2.0, 0.1),
        new THREE.Vector3(0.45, 1.9, -0.1),
        new THREE.Vector3(-0.15, 2.2, 0.2),
        new THREE.Vector3(0.25, 1.8, 0.15)
      ];

      const cytokinesis = [
        new THREE.Vector3(-1.75, 3.35, 0.0),
        new THREE.Vector3(-1.25, 2.95, 0.0),
        new THREE.Vector3(-1.55, 3.0, 0.25),
        new THREE.Vector3(-1.35, 3.25, -0.2),
        new THREE.Vector3(1.25, 2.95, 0.0),
        new THREE.Vector3(1.75, 3.35, 0.0),
        new THREE.Vector3(1.55, 3.0, 0.25),
        new THREE.Vector3(1.35, 3.25, -0.2)
      ];

      switch (stageIndex) {
        case 0:
          pose.chromosomeCount = 4;
          pose.chromosomePositions = loose;
          pose.chromosomeScales = Array(4).fill(new THREE.Vector3(0.8, 1.8, 0.8));
          pose.chromosomeOpacity = Array(4).fill(0.8);
          break;

        case 1:
          pose.chromosomeCount = 4;
          pose.nucleusMainOpacity = 0.6;
          pose.chromosomePositions = condensed;
          pose.chromosomeScales = Array(4).fill(new THREE.Vector3(1.0, 2.2, 1.0));
          pose.chromosomeOpacity = Array(4).fill(1.0);
          break;

        case 2:
          pose.chromosomeCount = 4;
          pose.nucleusMainOpacity = 0.0;
          pose.spindleVisible = true;
          pose.chromosomePositions = metaphase;
          pose.chromosomeScales = Array(4).fill(new THREE.Vector3(1.0, 2.2, 1.0));
          pose.chromosomeOpacity = Array(4).fill(1.0);
          break;

        case 3:
          pose.chromosomeCount = 8;
          pose.nucleusMainOpacity = 0.0;
          pose.spindleVisible = true;
          pose.chromosomePositions = anaphase;
          pose.chromosomeScales = Array(8).fill(new THREE.Vector3(0.9, 1.8, 0.9));
          pose.chromosomeOpacity = Array(8).fill(1.0);
          break;

        case 4:
          pose.chromosomeCount = 8;
          pose.nucleusMainVisible = false;
          pose.nucleusMainOpacity = 0.0;
          pose.nucleusTopVisible = true;
          pose.nucleusBottomVisible = true;
          pose.spindleVisible = false;
          pose.chromosomePositions = telophase;
          pose.chromosomeScales = Array(8).fill(new THREE.Vector3(0.75, 1.35, 0.75));
          pose.chromosomeOpacity = Array(8).fill(0.85);
          break;

        case 5:
          pose.mainCellVisible = false;
          pose.splitVisible = true;
          pose.cellCount = 2;
          pose.nucleusMainVisible = false;
          pose.nucleusMainOpacity = 0.0;
          pose.nucleusTopVisible = true;
          pose.nucleusBottomVisible = true;
          pose.nucleusTopPos = new THREE.Vector3(-1.45, 3.0, 0);
          pose.nucleusBottomPos = new THREE.Vector3(1.45, 3.0, 0);
          pose.chromosomeCount = 8;
          pose.spindleVisible = false;
          pose.chromosomePositions = cytokinesis;
          pose.chromosomeScales = Array(8).fill(new THREE.Vector3(0.7, 1.2, 0.7));
          pose.chromosomeOpacity = Array(8).fill(0.8);
          break;
      }

      return pose;
    }

    function applyPoseInterpolated(stageA, stageB, t) {
      const a = getStagePose(stageA);
      const b = getStagePose(stageB);
      const k = easeInOut(t);

      const mainVisibleBlend = (a.mainCellVisible ? 1 : 0) * (1 - k) + (b.mainCellVisible ? 1 : 0) * k;
      mainMembrane.visible = mainVisibleBlend > 0.02;
      mainMembrane.material.opacity = 0.3 * mainVisibleBlend;
      mainMembrane.position.copy(vecLerp(a.mainCellPos, b.mainCellPos, k));
      mainMembrane.scale.set(
        lerp(a.mainCellScale.x, b.mainCellScale.x, k),
        lerp(a.mainCellScale.y, b.mainCellScale.y, k),
        lerp(a.mainCellScale.z, b.mainCellScale.z, k)
      );

      // Cytokinesis pinch effect
      if ((stageA === 4 && stageB === 5) || stageB === 5 || stageA === 5) {
        const pinch = (stageB === 5 ? k : 1 - k);
        mainMembrane.scale.x = Math.max(0.18, 1.0 - pinch * 0.68);
      }

      const splitBlend = (a.splitVisible ? 1 : 0) * (1 - k) + (b.splitVisible ? 1 : 0) * k;
      splitMembraneA.visible = splitBlend > 0.02;
      splitMembraneB.visible = splitBlend > 0.02;
      splitMembraneA.material.opacity = 0.3 * splitBlend;
      splitMembraneB.material.opacity = 0.3 * splitBlend;
      splitMembraneA.position.copy(vecLerp(a.splitPosA, b.splitPosA, k));
      splitMembraneB.position.copy(vecLerp(a.splitPosB, b.splitPosB, k));
      splitMembraneA.scale.set(
        lerp(a.splitScaleA.x, b.splitScaleA.x, k),
        lerp(a.splitScaleA.y, b.splitScaleA.y, k),
        lerp(a.splitScaleA.z, b.splitScaleA.z, k)
      );
      splitMembraneB.scale.set(
        lerp(a.splitScaleB.x, b.splitScaleB.x, k),
        lerp(a.splitScaleB.y, b.splitScaleB.y, k),
        lerp(a.splitScaleB.z, b.splitScaleB.z, k)
      );

      // Nuclei
      nucleusMain.visible = ((a.nucleusMainVisible ? 1 : 0) * (1 - k) + (b.nucleusMainVisible ? 1 : 0) * k) > 0.02;
      nucleusMain.position.copy(vecLerp(a.nucleusMainPos, b.nucleusMainPos, k));
      nucleusMain.material.opacity = lerp(a.nucleusMainOpacity, b.nucleusMainOpacity, k);

      nucleusTop.visible = ((a.nucleusTopVisible ? 1 : 0) * (1 - k) + (b.nucleusTopVisible ? 1 : 0) * k) > 0.02;
      nucleusBottom.visible = ((a.nucleusBottomVisible ? 1 : 0) * (1 - k) + (b.nucleusBottomVisible ? 1 : 0) * k) > 0.02;
      nucleusTop.position.copy(vecLerp(a.nucleusTopPos, b.nucleusTopPos, k));
      nucleusBottom.position.copy(vecLerp(a.nucleusBottomPos, b.nucleusBottomPos, k));
      nucleusTop.material.opacity = lerp(0, b.nucleusTopOpacity, k);
      nucleusBottom.material.opacity = lerp(0, b.nucleusBottomOpacity, k);

      // Chromosomes
      const maxCount = Math.max(a.chromosomeCount, b.chromosomeCount, 8);
      for (let i = 0; i < chromosomes.length; i++) {
        const c = chromosomes[i];

        const aActive = i < a.chromosomeCount;
        const bActive = i < b.chromosomeCount;

        let posA, posB, scaleA, scaleB, opA, opB;

        if (aActive) {
          posA = a.chromosomePositions[i];
          scaleA = a.chromosomeScales[i];
          opA = a.chromosomeOpacity[i];
        } else {
          posA = i < 4 ? (a.chromosomePositions[i % a.chromosomePositions.length] || CELL_CENTER.clone()) : CELL_CENTER.clone();
          scaleA = new THREE.Vector3(0.1, 0.1, 0.1);
          opA = 0;
        }

        if (bActive) {
          posB = b.chromosomePositions[i];
          scaleB = b.chromosomeScales[i];
          opB = b.chromosomeOpacity[i];
        } else {
          posB = i < 4 ? (b.chromosomePositions[i % Math.max(1, b.chromosomePositions.length)] || CELL_CENTER.clone()) : CELL_CENTER.clone();
          scaleB = new THREE.Vector3(0.1, 0.1, 0.1);
          opB = 0;
        }

        c.visible = i < maxCount;
        c.position.copy(vecLerp(posA, posB, k));
        c.scale.set(
          lerp(scaleA.x, scaleB.x, k),
          lerp(scaleA.y, scaleB.y, k),
          lerp(scaleA.z, scaleB.z, k)
        );
        c.material.opacity = lerp(opA, opB, k);
        c.visible = c.material.opacity > 0.03;
      }

      // Organelles gently drift
      const driftTime = performance.now() * 0.001;
      organelles.forEach((o, i) => {
        const base = organellePositions[i];
        o.position.set(
          base[0] + Math.sin(driftTime + i) * 0.05,
          base[1] + Math.cos(driftTime * 1.2 + i) * 0.04,
          base[2] + Math.sin(driftTime * 0.9 + i * 0.7) * 0.05
        );
      });

      // Spindles
      const spindleBlend = (a.spindleVisible ? 1 : 0) * (1 - k) + (b.spindleVisible ? 1 : 0) * k;
      spindleLines.forEach((line, i) => {
        line.visible = spindleBlend > 0.05 && i < Math.max(a.chromosomeCount, b.chromosomeCount);
        line.material.opacity = 0.85 * spindleBlend;
      });

      const activeChromosomeTargets = chromosomes.filter(c => c.visible).map(c => c.position.clone());
      for (let i = 0; i < spindleLines.length; i++) {
        if (!spindleLines[i].visible || !activeChromosomeTargets[i]) continue;
        const target = activeChromosomeTargets[i];
        const fromPole = target.y >= 3 ? poleTop : poleBottom;
        setLinePoints(spindleLines[i], fromPole, target);
      }
    }

    function updateHUD(index) {
      const stage = STAGES[index];
      stageNameEl.textContent = stage.name;
      stageNumberEl.textContent = `${index + 1}/6`;
      stageDescriptionEl.textContent = stage.description;
      progressBarEl.style.width = `${(index / 5) * 100}%`;
    }

    function update3DState(progress = 1) {
      const name = STAGES[currentStage].name;
      const nucleusOpacityMap = [0.6, 0.6, 0.0, 0.0, 0.6, 0.6];
      const spindleVisibleMap = [false, false, true, true, false, false];
      const chromosomeCountMap = [4, 4, 4, 8, 8, 8];
      const cellCountMap = [1, 1, 1, 1, 1, 2];

      window.__3D_STATE__ = {
        currentStage,
        stageName: name,
        isAnimating,
        cellCount: cellCountMap[currentStage],
        chromosomeCount: chromosomeCountMap[currentStage],
        nucleusOpacity: nucleusOpacityMap[currentStage],
        spindleFibersVisible: spindleVisibleMap[currentStage],
        totalStages: 6,
        animationProgress: progress
      };
    }

    function goToStage(index) {
      const clamped = Math.max(0, Math.min(5, index));
      if (clamped === targetStage && isAnimating) return;
      if (clamped === currentStage && !isAnimating) return;

      fromStage = currentStage;
      targetStage = clamped;
      transitionTime = 0;
      isAnimating = true;
      updateHUD(targetStage);
      update3DState(0);
    }

    function nextStage() {
      if (isAnimating) return;
      goToStage(currentStage + 1);
    }

    function prevStage() {
      if (isAnimating) return;
      goToStage(currentStage - 1);
    }

    function resetStage() {
      if (isAnimating) return;
      goToStage(0);
    }

    document.getElementById("btn-next").addEventListener("click", nextStage);
    document.getElementById("btn-prev").addEventListener("click", prevStage);
    document.getElementById("btn-reset").addEventListener("click", resetStage);

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") nextStage();
      else if (e.key === "ArrowLeft") prevStage();
      else if (e.key === "r" || e.key === "R") resetStage();
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Initial
    updateHUD(0);
    applyPoseInterpolated(0, 0, 1);
    update3DState(1);

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      if (!userInteracting) {
        root.rotation.y += 0.1 * delta;
      }

      if (isAnimating) {
        transitionTime += delta;
        const t = Math.min(transitionTime / transitionDuration, 1);
        applyPoseInterpolated(fromStage, targetStage, t);
        update3DState(t);

        if (t >= 1) {
          currentStage = targetStage;
          isAnimating = false;
          applyPoseInterpolated(currentStage, currentStage, 1);
          updateHUD(currentStage);
          update3DState(1);
        }
      } else {
        applyPoseInterpolated(currentStage, currentStage, 1);
        update3DState(1);
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
