<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flamingo Projectile Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: monospace;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 15px;
            border-radius: 5px;
            pointer-events: none;
            user-select: none;
            min-width: 300px;
            font-size: 14px;
            line-height: 1.5;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
        }
        .controls {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #555;
            color: #ccc;
            font-size: 12px;
        }
        #dragToggleContainer {
            pointer-events: auto;
            margin-top: 10px;
            display: flex;
            align-items: center;
        }
        #dragToggleContainer input {
            margin-right: 8px;
            cursor: pointer;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="hud">
        <div class="hud-row"><span>Status:</span> <span id="hudStatus">GROUNDED</span></div>
        <div class="hud-row"><span>Angle:</span> <span id="hudAngle">45</span>&deg;</div>
        <div class="hud-row"><span>Speed:</span> <span id="hudSpeed">30</span> m/s</div>
        <div class="hud-row"><span>Drag:</span> <span id="hudDrag">ON</span></div>
        <div class="hud-row"><span>Velocity:</span> <span id="hudVelocity">0.00</span> m/s</div>
        <div class="hud-row"><span>Height:</span> <span id="hudHeight">1.00</span> m</div>
        <div class="hud-row"><span>Max Height:</span> <span id="hudMaxHeight">0.00</span> m</div>
        <div class="hud-row"><span>Range:</span> <span id="hudRange">0.00</span> m</div>
        <div class="hud-row"><span>Flight Time:</span> <span id="hudTime">0.00</span> s</div>
        <div class="hud-row"><span>Launches:</span> <span id="hudLaunchCount">0</span></div>
        
        <div id="dragToggleContainer">
            <input type="checkbox" id="dragToggle" checked>
            <label for="dragToggle">Enable Drag</label>
        </div>

        <div class="controls">
            UP/DOWN: Angle &nbsp;|&nbsp; LEFT/RIGHT: Speed<br>
            SPACE: Launch &nbsp;|&nbsp; R: Reset
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            launchAngle: 45,
            launchSpeed: 30,
            dragEnabled: true,
            status: 'GROUNDED',
            position: { x: -30, y: 1, z: 0 },
            velocity: { x: 0, y: 0, z: 0 },
            velocityMagnitude: 0,
            currentHeight: 1,
            maxHeight: 0,
            range: 0,
            flightTime: 0,
            launchCount: 0,
            kineticEnergy: 0,
            potentialEnergy: 0,
            totalMechanicalEnergy: 0,
            dragEnergyLost: 0,
            initialTotalEnergy: 0,
            trailPointCount: 0,
            landingMarkerCount: 0,
            physicsStepCount: 0,
            flamingo_loaded: false,
            ghostTrajectoryVisible: true,
            animationPlaying: false
        };

        const state = window.__3D_STATE__;

        // --- Physics Constants ---
        const g = 9.81;
        const rho = 1.225;
        const Cd = 0.47;
        const A = 0.25;
        const m = 3.0;
        const fixedDt = 1 / 60;
        const startPos = new THREE.Vector3(-30, 1, 0);

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 40);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.update();

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 100;
        dirLight.shadow.camera.bottom = -100;
        dirLight.shadow.camera.left = -100;
        dirLight.shadow.camera.right = 100;
        dirLight.shadow.camera.near = 0.1;
        dirLight.shadow.camera.far = 500;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Ground & Grid ---
        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a7d3a, roughness: 0.8, metalness: 0.2 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(200, 20);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // --- Flamingo Model ---
        const flamingoGroup = new THREE.Group();
        flamingoGroup.position.copy(startPos);
        scene.add(flamingoGroup);

        let mixer;
        let flyAction;
        const loader = new GLTFLoader();
        loader.load('https://threejs.org/examples/models/gltf/Flamingo.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.05, 0.05, 0.05);
            // The default flamingo faces +Z. Rotate it to face -Z of the group.
            // When group looks at +X, model will face +X.
            model.rotation.y = Math.PI; 
            
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            flamingoGroup.add(model);
            flamingoGroup.lookAt(flamingoGroup.position.clone().add(new THREE.Vector3(1, 0, 0)));

            mixer = new THREE.AnimationMixer(model);
            if (gltf.animations && gltf.animations.length > 0) {
                flyAction = mixer.clipAction(gltf.animations[0]);
            }
            state.flamingo_loaded = true;
        });

        // --- Trail ---
        const maxTrailPoints = 2000;
        const trailPositions = new Float32Array(maxTrailPoints * 3);
        const trailGeo = new THREE.BufferGeometry();
        trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
        const trailMat = new THREE.LineBasicMaterial({ color: 0xffff00, linewidth: 2 });
        const trailLine = new THREE.Line(trailGeo, trailMat);
        scene.add(trailLine);

        // --- Ghost Trajectory ---
        const ghostGeo = new THREE.BufferGeometry();
        const ghostMat = new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 1, gapSize: 0.5 });
        const ghostLine = new THREE.Line(ghostGeo, ghostMat);
        scene.add(ghostLine);

        // --- Landing Markers ---
        const landingMarkers = [];
        const markerGeo = new THREE.SphereGeometry(0.5, 16, 16);
        const markerMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });

        // --- Physics Variables ---
        let velocity = new THREE.Vector3();
        let timeAccumulator = 0;
        let isFlying = false;
        let currentMaxHeight = 0;

        // --- Functions ---
        function updateGhostTrajectory() {
            if (isFlying) {
                ghostLine.visible = false;
                state.ghostTrajectoryVisible = false;
                return;
            }
            ghostLine.visible = true;
            state.ghostTrajectoryVisible = true;

            const angleRad = THREE.MathUtils.degToRad(state.launchAngle);
            const vx = state.launchSpeed * Math.cos(angleRad);
            const vy = state.launchSpeed * Math.sin(angleRad);
            const y0 = startPos.y;

            // Solve 0 = y0 + vy*t - 0.5*g*t^2 for t
            const tEnd = (vy + Math.sqrt(vy * vy + 2 * g * y0)) / g;
            const points = [];
            const numPoints = 100;

            for (let i = 0; i <= numPoints; i++) {
                const t = (i / numPoints) * tEnd;
                const x = startPos.x + vx * t;
                const y = y0 + vy * t - 0.5 * g * t * t;
                points.push(new THREE.Vector3(x, Math.max(0, y), 0));
            }

            ghostGeo.setFromPoints(points);
            ghostLine.computeLineDistances();
        }

        function addLandingMarker(pos) {
            const marker = new THREE.Mesh(markerGeo, markerMat);
            marker.position.copy(pos);
            marker.castShadow = true;
            scene.add(marker);
            landingMarkers.push(marker);
            state.landingMarkerCount = landingMarkers.length;

            if (landingMarkers.length > 10) {
                const oldMarker = landingMarkers.shift();
                scene.remove(oldMarker);
                oldMarker.geometry.dispose();
                oldMarker.material.dispose();
                state.landingMarkerCount = landingMarkers.length;
            }
        }

        function launch() {
            if (isFlying || !state.flamingo_loaded) return;

            isFlying = true;
            state.status = 'FLYING';
            state.launchCount++;
            state.physicsStepCount = 0;
            state.flightTime = 0;
            state.dragEnergyLost = 0;
            state.trailPointCount = 0;
            trailGeo.setDrawRange(0, 0);
            
            const angleRad = THREE.MathUtils.degToRad(state.launchAngle);
            velocity.set(
                state.launchSpeed * Math.cos(angleRad),
                state.launchSpeed * Math.sin(angleRad),
                0
            );

            currentMaxHeight = startPos.y;
            state.maxHeight = currentMaxHeight;

            const vMag = velocity.length();
            state.initialTotalEnergy = (0.5 * m * vMag * vMag) + (m * g * startPos.y);

            if (flyAction) {
                flyAction.reset().play();
                state.animationPlaying = true;
            }
            updateGhostTrajectory();
        }

        function reset() {
            isFlying = false;
            state.status = 'GROUNDED';
            flamingoGroup.position.copy(startPos);
            velocity.set(0, 0, 0);
            flamingoGroup.lookAt(flamingoGroup.position.clone().add(new THREE.Vector3(1, 0, 0)));
            
            state.trailPointCount = 0;
            trailGeo.setDrawRange(0, 0);
            
            if (flyAction) {
                flyAction.stop();
                state.animationPlaying = false;
            }
            updateGhostTrajectory();
        }

        function updateHUD() {
            document.getElementById('hudAngle').innerText = state.launchAngle;
            document.getElementById('hudSpeed').innerText = state.launchSpeed;
            document.getElementById('hudDrag').innerText = state.dragEnabled ? 'ON' : 'OFF';
            document.getElementById('hudStatus').innerText = state.status;
            document.getElementById('hudVelocity').innerText = state.velocityMagnitude.toFixed(2);
            document.getElementById('hudHeight').innerText = state.currentHeight.toFixed(2);
            document.getElementById('hudMaxHeight').innerText = state.maxHeight.toFixed(2);
            document.getElementById('hudRange').innerText = state.range.toFixed(2);
            document.getElementById('hudTime').innerText = state.flightTime.toFixed(2);
            document.getElementById('hudLaunchCount').innerText = state.launchCount;
        }

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowUp') {
                state.launchAngle = Math.min(80, state.launchAngle + 5);
                updateGhostTrajectory();
            } else if (e.code === 'ArrowDown') {
                state.launchAngle = Math.max(10, state.launchAngle - 5);
                updateGhostTrajectory();
            } else if (e.code === 'ArrowRight') {
                state.launchSpeed = Math.min(60, state.launchSpeed + 5);
                updateGhostTrajectory();
            } else if (e.code === 'ArrowLeft') {
                state.launchSpeed = Math.max(10, state.launchSpeed - 5);
                updateGhostTrajectory();
            } else if (e.code === 'Space') {
                launch();
            } else if (e.code === 'KeyR') {
                reset();
            }
        });

        document.getElementById('dragToggle').addEventListener('change', (e) => {
            state.dragEnabled = e.target.checked;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Main Loop ---
        const clock = new THREE.Clock();
        updateGhostTrajectory();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            
            if (mixer && state.animationPlaying) {
                mixer.update(delta);
            }

            if (isFlying) {
                timeAccumulator += delta;

                while (timeAccumulator >= fixedDt) {
                    const vMag = velocity.length();
                    let dragForce = new THREE.Vector3(0, 0, 0);

                    if (state.dragEnabled && vMag > 0) {
                        const dragMag = 0.5 * rho * Cd * A * vMag * vMag;
                        dragForce.copy(velocity).normalize().multiplyScalar(-dragMag);
                        
                        // Energy lost in this step: F * d = F * v * dt
                        state.dragEnergyLost += dragMag * vMag * fixedDt;
                    }

                    const gravityForce = new THREE.Vector3(0, -m * g, 0);
                    const totalForce = new THREE.Vector3().addVectors(gravityForce, dragForce);
                    const acceleration = totalForce.divideScalar(m);

                    // Semi-implicit Euler
                    velocity.add(acceleration.multiplyScalar(fixedDt));
                    flamingoGroup.position.add(velocity.clone().multiplyScalar(fixedDt));

                    state.physicsStepCount++;
                    state.flightTime += fixedDt;

                    // Update Trail
                    if (state.trailPointCount < maxTrailPoints) {
                        const idx = state.trailPointCount * 3;
                        trailPositions[idx] = flamingoGroup.position.x;
                        trailPositions[idx + 1] = flamingoGroup.position.y;
                        trailPositions[idx + 2] = flamingoGroup.position.z;
                        state.trailPointCount++;
                        trailGeo.attributes.position.needsUpdate = true;
                        trailGeo.setDrawRange(0, state.trailPointCount);
                    }

                    // Track Max Height
                    if (flamingoGroup.position.y > currentMaxHeight) {
                        currentMaxHeight = flamingoGroup.position.y;
                        state.maxHeight = currentMaxHeight;
                    }

                    // Landing Check
                    if (flamingoGroup.position.y <= 0) {
                        flamingoGroup.position.y = 0;
                        isFlying = false;
                        state.status = 'LANDED';
                        state.range = flamingoGroup.position.x - startPos.x;
                        
                        addLandingMarker(flamingoGroup.position);
                        
                        if (flyAction) {
                            flyAction.stop();
                            state.animationPlaying = false;
                        }
                        updateGhostTrajectory();
                        break; // Exit physics loop
                    }

                    timeAccumulator -= fixedDt;
                }

                // Orientation
                if (velocity.lengthSq() > 0.1) {
                    const target = flamingoGroup.position.clone().add(velocity);
                    flamingoGroup.lookAt(target);
                }
            }

            // Update State Object
            state.position.x = flamingoGroup.position.x;
            state.position.y = flamingoGroup.position.y;
            state.position.z = flamingoGroup.position.z;
            state.velocity.x = velocity.x;
            state.velocity.y = velocity.y;
            state.velocity.z = velocity.z;
            
            const currentVMag = velocity.length();
            state.velocityMagnitude = currentVMag;
            state.currentHeight = flamingoGroup.position.y;
            
            state.kineticEnergy = 0.5 * m * currentVMag * currentVMag;
            state.potentialEnergy = m * g * flamingoGroup.position.y;
            state.totalMechanicalEnergy = state.kineticEnergy + state.potentialEnergy;

            updateHUD();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
