<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Conveyor Belt Sorting Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #0f0;
            font-family: monospace;
            padding: 10px;
            border-radius: 6px;
            z-index: 100;
            pointer-events: none;
            min-width: 200px;
            line-height: 1.4;
        }
        #controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 14px;
            border-radius: 8px;
            z-index: 100;
            min-width: 240px;
        }
        .control-group {
            margin-bottom: 10px;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 4px;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        .instructions {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            z-index: 100;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
        }
        .key {
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: #ffeb3b;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            font-family: sans-serif;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            z-index: 200;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>

    <div id="loading">Loading Models...</div>

    <div id="hud">
        <div>Score: <span id="hud-score">0</span></div>
        <div>Correct: <span id="hud-correct">0</span></div>
        <div>Wrong: <span id="hud-wrong">0</span></div>
        <div>Missed: <span id="hud-missed">0</span></div>
        <div>Spawned: <span id="hud-spawned">0</span></div>
        <div>Belt Speed: <span id="hud-beltspeed">2.0</span></div>
        <div>Next Item: <span id="hud-nextitem">--</span></div>
        <div>Frame: <span id="hud-framecount">0</span></div>
        <div>Paused: <span id="hud-paused">No</span></div>
    </div>

    <div id="controls">
        <div class="control-group">
            <label><span>Belt Speed</span> <span id="val-beltspeed">2.0</span></label>
            <input type="range" id="slider-beltspeed" min="0.5" max="6.0" step="0.5" value="2.0">
        </div>
        <div class="control-group">
            <label><span>Spawn Rate (s)</span> <span id="val-spawnrate">3.0</span></label>
            <input type="range" id="slider-spawnrate" min="1" max="6" step="0.5" value="3.0">
        </div>
        <div class="control-group">
            <label><span>Difficulty</span> <span id="val-difficulty">1</span></label>
            <input type="range" id="slider-difficulty" min="1" max="3" step="1" value="1">
        </div>
    </div>

    <div class="instructions">
        <strong>Controls:</strong><br>
        <span class="key">1</span> or <span class="key">A</span> : Divert to Bin A (Red)<br>
        <span class="key">2</span> or <span class="key">S</span> : Straight to Bin B (Yellow)<br>
        <span class="key">3</span> or <span class="key">D</span> : Divert to Bin C (Blue)<br>
        <span class="key">P</span> : Pause/Unpause<br>
        <span class="key">R</span> : Reset Game
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        const state = {
            frameCount: 0,
            isPaused: false,
            score: 0,
            correctSorts: 0,
            wrongSorts: 0,
            missedItems: 0,
            itemsSpawned: 0,
            beltSpeed: 2.0,
            spawnRate: 3.0,
            itemsOnBelt: 0,
            diverterActive: "none",
            lastSortResult: "none",
            isValid: true
        };
        window.__3D_STATE__ = state;

        // --- Game Constants ---
        const BELT_LENGTH = 20;
        const BELT_WIDTH = 3;
        const BELT_HEIGHT = 0.3;
        const GRAVITY = 9.81;
        const DIVERTER_IMPULSE = 4.0;
        const DIVERTER_ZONE_START = 7;
        const DIVERTER_ZONE_END = 9;

        const ITEM_TYPES = {
            A: { id: 'A', name: 'Box', color: 0xff0000, url: 'https://raw.githubusercontent.com/nicobailon/CodingWithVision/main/shared_assets/glb/BoxAnimated.glb', binZ: -4 },
            B: { id: 'B', name: 'Duck', color: 0xffff00, url: 'https://raw.githubusercontent.com/nicobailon/CodingWithVision/main/shared_assets/glb/Duck.glb', binZ: 0 },
            C: { id: 'C', name: 'Bottle', color: 0x0088ff, url: 'https://raw.githubusercontent.com/nicobailon/CodingWithVision/main/shared_assets/glb/WaterBottle.glb', binZ: 4 }
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x607d8b);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 12, 14);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 15, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        const pointLight1 = new THREE.PointLight(0xffaa00, 0.5, 20);
        pointLight1.position.set(10, 5, -4);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0x00aaff, 0.5, 20);
        pointLight2.position.set(10, 5, 4);
        scene.add(pointLight2);

        // --- Environment ---
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x37474f, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -1;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Conveyor Belt ---
        // Create striped texture for belt
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 256;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#263238';
        ctx.fillRect(0, 0, 256, 256);
        ctx.fillStyle = '#1c262b';
        for (let i = 0; i < 256; i += 32) {
            ctx.fillRect(i, 0, 16, 256);
        }
        const beltTexture = new THREE.CanvasTexture(canvas);
        beltTexture.wrapS = THREE.RepeatWrapping;
        beltTexture.wrapT = THREE.RepeatWrapping;
        beltTexture.repeat.set(BELT_LENGTH / 2, 1);

        const beltGeo = new THREE.BoxGeometry(BELT_LENGTH, BELT_HEIGHT, BELT_WIDTH);
        const beltMat = new THREE.MeshStandardMaterial({ map: beltTexture, roughness: 0.9 });
        const belt = new THREE.Mesh(beltGeo, beltMat);
        belt.position.y = 0;
        belt.receiveShadow = true;
        scene.add(belt);

        // Diverter Zone Marker
        const zoneGeo = new THREE.PlaneGeometry(DIVERTER_ZONE_END - DIVERTER_ZONE_START, BELT_WIDTH + 0.1);
        const zoneMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
        const zoneMarker = new THREE.Mesh(zoneGeo, zoneMat);
        zoneMarker.rotation.x = -Math.PI / 2;
        zoneMarker.position.set((DIVERTER_ZONE_START + DIVERTER_ZONE_END) / 2, BELT_HEIGHT / 2 + 0.01, 0);
        scene.add(zoneMarker);

        // Rollers
        const rollerGeo = new THREE.CylinderGeometry(0.3, 0.3, BELT_WIDTH + 0.2, 16);
        const rollerMat = new THREE.MeshStandardMaterial({ color: 0x546e7a, metalness: 0.5 });
        const rollerLeft = new THREE.Mesh(rollerGeo, rollerMat);
        rollerLeft.rotation.x = Math.PI / 2;
        rollerLeft.position.set(-BELT_LENGTH / 2, 0, 0);
        rollerLeft.castShadow = true;
        scene.add(rollerLeft);

        const rollerRight = new THREE.Mesh(rollerGeo, rollerMat);
        rollerRight.rotation.x = Math.PI / 2;
        rollerRight.position.set(BELT_LENGTH / 2, 0, 0);
        rollerRight.castShadow = true;
        scene.add(rollerRight);

        // --- Bins ---
        const bins = [];
        function createBin(x, z, color, label) {
            const binGroup = new THREE.Group();
            binGroup.position.set(x, -0.5, z);

            const mat = new THREE.MeshStandardMaterial({ color: color, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
            const thickness = 0.1;
            const size = 2.5;
            const height = 1.5;

            // Bottom
            const bottom = new THREE.Mesh(new THREE.BoxGeometry(size, thickness, size), mat);
            bottom.position.y = -height / 2 + thickness / 2;
            bottom.receiveShadow = true;
            binGroup.add(bottom);

            // Sides
            const sideGeoX = new THREE.BoxGeometry(thickness, height, size);
            const sideGeoZ = new THREE.BoxGeometry(size, height, thickness);

            const left = new THREE.Mesh(sideGeoX, mat);
            left.position.set(-size / 2 + thickness / 2, 0, 0);
            left.castShadow = true; left.receiveShadow = true;
            binGroup.add(left);

            const right = new THREE.Mesh(sideGeoX, mat);
            right.position.set(size / 2 - thickness / 2, 0, 0);
            right.castShadow = true; right.receiveShadow = true;
            binGroup.add(right);

            const back = new THREE.Mesh(sideGeoZ, mat);
            back.position.set(0, 0, -size / 2 + thickness / 2);
            back.castShadow = true; back.receiveShadow = true;
            binGroup.add(back);

            const front = new THREE.Mesh(sideGeoZ, mat);
            front.position.set(0, 0, size / 2 - thickness / 2);
            front.castShadow = true; front.receiveShadow = true;
            binGroup.add(front);

            scene.add(binGroup);
            
            return { group: binGroup, x: x, z: z, size: size, color: color, id: label };
        }

        // Place bins slightly past the belt end
        const BIN_X = 11.5;
        bins.push(createBin(BIN_X, ITEM_TYPES.A.binZ, ITEM_TYPES.A.color, 'A'));
        bins.push(createBin(BIN_X, ITEM_TYPES.B.binZ, ITEM_TYPES.B.color, 'B'));
        bins.push(createBin(BIN_X, ITEM_TYPES.C.binZ, ITEM_TYPES.C.color, 'C'));

        // --- Diverters ---
        const diverters = {
            front: { pivot: new THREE.Group(), targetAngle: 0, currentAngle: 0, dir: -1 },
            rear: { pivot: new THREE.Group(), targetAngle: 0, currentAngle: 0, dir: 1 }
        };

        function createDiverterPaddle(pivotGroup, zOffset, color) {
            pivotGroup.position.set(DIVERTER_ZONE_START + 0.5, BELT_HEIGHT / 2 + 0.2, zOffset);
            
            const paddleGeo = new THREE.BoxGeometry(2, 0.4, 0.1);
            const paddleMat = new THREE.MeshStandardMaterial({ color: color });
            const paddle = new THREE.Mesh(paddleGeo, paddleMat);
            // Offset paddle so it swings from the pivot
            paddle.position.set(-1, 0, 0);
            paddle.castShadow = true;
            
            pivotGroup.add(paddle);
            scene.add(pivotGroup);
        }

        createDiverterPaddle(diverters.front.pivot, BELT_WIDTH / 2 + 0.1, 0xff5555);
        createDiverterPaddle(diverters.rear.pivot, -BELT_WIDTH / 2 - 0.1, 0x5555ff);

        // --- Asset Loading ---
        const loadedModels = {};
        let modelsReady = false;
        const loader = new GLTFLoader();

        Promise.all(Object.values(ITEM_TYPES).map(type => {
            return new Promise((resolve, reject) => {
                loader.load(type.url, (gltf) => {
                    const model = gltf.scene;
                    
                    // Normalize scale and center
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 0.8 / maxDim;
                    
                    model.scale.setScalar(scale);
                    model.position.sub(center.multiplyScalar(scale));
                    
                    // Wrapper group to hold model and ring
                    const wrapper = new THREE.Group();
                    wrapper.add(model);

                    // Add colored ring
                    const ringGeo = new THREE.TorusGeometry(0.6, 0.05, 8, 24);
                    const ringMat = new THREE.MeshBasicMaterial({ color: type.color });
                    const ring = new THREE.Mesh(ringGeo, ringMat);
                    ring.rotation.x = -Math.PI / 2;
                    // Position ring at the bottom of the normalized model
                    ring.position.y = - (size.y * scale) / 2 + 0.05;
                    wrapper.add(ring);

                    // Enable shadows
                    wrapper.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });

                    loadedModels[type.id] = wrapper;
                    resolve();
                }, undefined, reject);
            });
        })).then(() => {
            document.getElementById('loading').style.display = 'none';
            modelsReady = true;
        }).catch(err => {
            console.error("Error loading models:", err);
            document.getElementById('loading').innerText = "Error loading models.";
        });

        // --- Game Logic ---
        let activeItems = [];
        let spawnTimer = 0;
        let clock = new THREE.Clock();

        function spawnItem() {
            if (!modelsReady) return;
            
            const types = Object.keys(ITEM_TYPES);
            const randomType = ITEM_TYPES[types[Math.floor(Math.random() * types.length)]];
            
            const itemGroup = loadedModels[randomType.id].clone();
            
            // Initial position: left end of belt, slightly above
            itemGroup.position.set(-BELT_LENGTH / 2, BELT_HEIGHT / 2 + 0.4, 0);
            scene.add(itemGroup);

            activeItems.push({
                mesh: itemGroup,
                type: randomType,
                vx: state.beltSpeed,
                vy: 0,
                vz: 0,
                status: 'on_belt' // 'on_belt', 'falling', 'scored'
            });

            state.itemsSpawned++;
        }

        function activateDiverter(type) {
            state.diverterActive = type;
            
            // Find item in zone
            let targetItem = null;
            for (let item of activeItems) {
                if (item.status === 'on_belt' && item.mesh.position.x >= DIVERTER_ZONE_START && item.mesh.position.x <= DIVERTER_ZONE_END) {
                    targetItem = item;
                    break; // Only divert first item found
                }
            }

            if (type === 'A') {
                diverters.front.targetAngle = Math.PI / 3; // Swing in
                if (targetItem) targetItem.vz = -DIVERTER_IMPULSE;
            } else if (type === 'C') {
                diverters.rear.targetAngle = -Math.PI / 3; // Swing in
                if (targetItem) targetItem.vz = DIVERTER_IMPULSE;
            } else if (type === 'B') {
                // Just let it pass
                if (targetItem) targetItem.vz = 0;
            }

            // Reset diverter visual after a short delay
            setTimeout(() => {
                if (type === 'A') diverters.front.targetAngle = 0;
                if (type === 'C') diverters.rear.targetAngle = 0;
                state.diverterActive = "none";
            }, 300);
        }

        function checkCollision(item) {
            const pos = item.mesh.position;
            let scored = false;

            for (let bin of bins) {
                // Simple AABB check against bin bounds
                const halfSize = bin.size / 2;
                if (pos.x > bin.x - halfSize && pos.x < bin.x + halfSize &&
                    pos.z > bin.z - halfSize && pos.z < bin.z + halfSize) {
                    
                    if (item.type.id === bin.id) {
                        state.score += 10;
                        state.correctSorts++;
                        state.lastSortResult = "correct";
                    } else {
                        state.score -= 5;
                        state.wrongSorts++;
                        state.lastSortResult = "wrong";
                    }
                    scored = true;
                    break;
                }
            }

            if (!scored) {
                state.score -= 3;
                state.missedItems++;
                state.lastSortResult = "miss";
            }

            item.status = 'scored';
            scene.remove(item.mesh);
        }

        function resetGame() {
            activeItems.forEach(item => scene.remove(item.mesh));
            activeItems = [];
            state.score = 0;
            state.correctSorts = 0;
            state.wrongSorts = 0;
            state.missedItems = 0;
            state.itemsSpawned = 0;
            state.lastSortResult = "none";
            spawnTimer = 0;
        }

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'p') {
                state.isPaused = !state.isPaused;
            } else if (key === 'r') {
                resetGame();
            } else if (!state.isPaused) {
                if (key === '1' || key === 'a') activateDiverter('A');
                if (key === '2' || key === 's') activateDiverter('B');
                if (key === '3' || key === 'd') activateDiverter('C');
            }
        });

        // --- UI Controls ---
        const sliderSpeed = document.getElementById('slider-beltspeed');
        const sliderSpawn = document.getElementById('slider-spawnrate');
        const sliderDiff = document.getElementById('slider-difficulty');
        const valSpeed = document.getElementById('val-beltspeed');
        const valSpawn = document.getElementById('val-spawnrate');
        const valDiff = document.getElementById('val-difficulty');

        sliderSpeed.addEventListener('input', (e) => {
            state.beltSpeed = parseFloat(e.target.value);
            valSpeed.innerText = state.beltSpeed.toFixed(1);
        });

        sliderSpawn.addEventListener('input', (e) => {
            state.spawnRate = parseFloat(e.target.value);
            valSpawn.innerText = state.spawnRate.toFixed(1);
        });

        sliderDiff.addEventListener('input', (e) => {
            const diff = parseInt(e.target.value);
            valDiff.innerText = diff;
            if (diff === 1) {
                sliderSpeed.value = 2.0;
                sliderSpawn.value = 4.0;
            } else if (diff === 2) {
                sliderSpeed.value = 3.5;
                sliderSpawn.value = 2.5;
            } else if (diff === 3) {
                sliderSpeed.value = 5.0;
                sliderSpawn.value = 1.5;
            }
            sliderSpeed.dispatchEvent(new Event('input'));
            sliderSpawn.dispatchEvent(new Event('input'));
        });

        // --- Update Loop ---
        function updateHUD() {
            document.getElementById('hud-score').innerText = state.score;
            document.getElementById('hud-correct').innerText = state.correctSorts;
            document.getElementById('hud-wrong').innerText = state.wrongSorts;
            document.getElementById('hud-missed').innerText = state.missedItems;
            document.getElementById('hud-spawned').innerText = state.itemsSpawned;
            document.getElementById('hud-beltspeed').innerText = state.beltSpeed.toFixed(1);
            document.getElementById('hud-framecount').innerText = state.frameCount;
            document.getElementById('hud-paused').innerText = state.isPaused ? "Yes" : "No";

            // Find next item
            let nextItemName = "--";
            let maxZoneX = -Infinity;
            for (let item of activeItems) {
                if (item.status === 'on_belt' && item.mesh.position.x < DIVERTER_ZONE_END) {
                    if (item.mesh.position.x > maxZoneX) {
                        maxZoneX = item.mesh.position.x;
                        nextItemName = item.type.name;
                    }
                }
            }
            document.getElementById('hud-nextitem').innerText = nextItemName;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const dt = Math.min(clock.getDelta(), 0.1); // Cap dt to prevent huge jumps
            state.frameCount++;

            controls.update();

            if (!state.isPaused && modelsReady) {
                // Spawning
                spawnTimer += dt;
                if (spawnTimer >= state.spawnRate) {
                    spawnItem();
                    spawnTimer = 0;
                }

                // Belt Animation
                beltTexture.offset.x -= (state.beltSpeed / BELT_LENGTH) * dt;
                const rollerRot = (state.beltSpeed / 0.3) * dt; // v = r*w -> w = v/r
                rollerLeft.rotation.y -= rollerRot;
                rollerRight.rotation.y -= rollerRot;

                // Diverter Animation
                diverters.front.currentAngle += (diverters.front.targetAngle - diverters.front.currentAngle) * 10 * dt;
                diverters.front.pivot.rotation.y = diverters.front.currentAngle;
                
                diverters.rear.currentAngle += (diverters.rear.targetAngle - diverters.rear.currentAngle) * 10 * dt;
                diverters.rear.pivot.rotation.y = diverters.rear.currentAngle;

                // Item Physics
                let itemsOnBeltCount = 0;
                let validState = true;

                for (let i = activeItems.length - 1; i >= 0; i--) {
                    let item = activeItems[i];
                    
                    if (item.status === 'scored') {
                        activeItems.splice(i, 1);
                        continue;
                    }

                    // Determine if on belt
                    const pos = item.mesh.position;
                    const onBeltX = pos.x < BELT_LENGTH / 2;
                    const onBeltZ = Math.abs(pos.z) < BELT_WIDTH / 2;
                    const aboveBelt = pos.y >= BELT_HEIGHT / 2;

                    if (onBeltX && onBeltZ && aboveBelt && item.status === 'on_belt') {
                        item.vx = state.beltSpeed;
                        // Friction dampens vz if not being actively pushed
                        if (pos.x > DIVERTER_ZONE_END) {
                            item.vz *= 0.9; 
                        }
                    } else {
                        item.status = 'falling';
                        item.vy -= GRAVITY * dt;
                    }

                    // Apply velocity
                    pos.x += item.vx * dt;
                    pos.y += item.vy * dt;
                    pos.z += item.vz * dt;

                    // Floor collision / Scoring
                    if (pos.y < -0.5) {
                        checkCollision(item);
                    } else if (item.status === 'on_belt') {
                        itemsOnBeltCount++;
                    }

                    // Validation check
                    if (isNaN(pos.x) || isNaN(pos.y) || isNaN(pos.z)) {
                        validState = false;
                    }
                }

                state.itemsOnBelt = itemsOnBeltCount;
                state.isValid = validState;
            }

            updateHUD();
            renderer.render(scene, camera);
        }

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start loop
        animate();

    </script>
</body>
</html>
