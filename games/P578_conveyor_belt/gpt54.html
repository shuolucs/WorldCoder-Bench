<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Conveyor Belt Sorting Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #607d8b;
      font-family: Arial, sans-serif;
    }
    canvas { display: block; }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.6);
      color: #0f0;
      font-family: monospace;
      padding: 10px;
      border-radius: 6px;
      z-index: 100;
      pointer-events: none;
      min-width: 220px;
      line-height: 1.45;
    }

    #controls-panel {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 14px;
      border-radius: 8px;
      z-index: 100;
      min-width: 240px;
      box-sizing: border-box;
    }

    #controls-panel h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .control-group {
      margin-bottom: 12px;
    }

    .control-group label {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-row input[type="range"] {
      flex: 1;
    }

    .value {
      min-width: 52px;
      text-align: right;
      font-size: 12px;
      color: #ffd54f;
    }

    #help {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      padding: 10px 12px;
      border-radius: 6px;
      z-index: 100;
      font-size: 12px;
      line-height: 1.5;
      max-width: 260px;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="hud">
    <div>Score: <span id="hud-score">0</span></div>
    <div>Correct: <span id="hud-correct">0</span></div>
    <div>Wrong: <span id="hud-wrong">0</span></div>
    <div>Missed: <span id="hud-missed">0</span></div>
    <div>Items Spawned: <span id="hud-spawned">0</span></div>
    <div>Belt Speed: <span id="hud-beltspeed">2.0</span></div>
    <div>Next Item: <span id="hud-nextitem">--</span></div>
    <div>Frame Count: <span id="hud-framecount">0</span></div>
    <div>Paused: <span id="hud-paused">No</span></div>
  </div>

  <div id="help">
    <strong>Controls</strong><br>
    1 / A = Divert to Bin A<br>
    2 / S = Straight to Bin B<br>
    3 / D = Divert to Bin C<br>
    R = Reset<br>
    P = Pause / Unpause
  </div>

  <div id="controls-panel">
    <h3>Game Controls</h3>

    <div class="control-group">
      <label for="slider-beltspeed">Belt Speed</label>
      <div class="control-row">
        <input id="slider-beltspeed" type="range" min="0.5" max="6.0" step="0.5" value="2.0">
        <span class="value" id="value-beltspeed">2.0 u/s</span>
      </div>
    </div>

    <div class="control-group">
      <label for="slider-spawnrate">Spawn Rate</label>
      <div class="control-row">
        <input id="slider-spawnrate" type="range" min="1" max="6" step="0.5" value="3">
        <span class="value" id="value-spawnrate">3.0 s</span>
      </div>
    </div>

    <div class="control-group">
      <label for="slider-difficulty">Difficulty</label>
      <div class="control-row">
        <input id="slider-difficulty" type="range" min="1" max="3" step="1" value="1">
        <span class="value" id="value-difficulty">Level 1</span>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    let scene, camera, renderer, controls, clock;
    let belt, beltTexture, rollerLeft, rollerRight;
    let diverterPaddleA, diverterPaddleC;
    let loader;

    const BELT_LENGTH = 20;
    const BELT_WIDTH = 3;
    const BELT_HEIGHT = 0.3;
    const BELT_Y = 0;
    const BELT_MIN_X = -10;
    const BELT_MAX_X = 10;
    const DIVERTER_X = 8.0;
    const ITEM_BASE_Y = BELT_Y + BELT_HEIGHT / 2 + 0.5;
    const GRAVITY = 9.81;

    const TYPE_INFO = {
      A: {
        name: 'Box',
        key: 'A',
        url: 'https://raw.githubusercontent.com/nicobailon/CodingWithVision/main/shared_assets/glb/BoxAnimated.glb',
        color: 0xff4444,
        binZ: -4
      },
      B: {
        name: 'Duck',
        key: 'B',
        url: 'https://raw.githubusercontent.com/nicobailon/CodingWithVision/main/shared_assets/glb/Duck.glb',
        color: 0xffeb3b,
        binZ: 0
      },
      C: {
        name: 'Bottle',
        key: 'C',
        url: 'https://raw.githubusercontent.com/nicobailon/CodingWithVision/main/shared_assets/glb/WaterBottle.glb',
        color: 0x42a5f5,
        binZ: 4
      }
    };

    const state = {
      frameCount: 0,
      isPaused: false,
      score: 0,
      correctSorts: 0,
      wrongSorts: 0,
      missedItems: 0,
      itemsSpawned: 0,
      beltSpeed: 2.0,
      spawnRate: 3.0,
      itemsOnBelt: 0,
      diverterActive: 'none',
      lastSortResult: 'none',
      nextSpawnTimer: 0,
      models: {},
      mixerMap: new Map(),
      items: [],
      itemIdCounter: 0
    };

    const hud = {
      score: document.getElementById('hud-score'),
      correct: document.getElementById('hud-correct'),
      wrong: document.getElementById('hud-wrong'),
      missed: document.getElementById('hud-missed'),
      spawned: document.getElementById('hud-spawned'),
      beltspeed: document.getElementById('hud-beltspeed'),
      nextitem: document.getElementById('hud-nextitem'),
      framecount: document.getElementById('hud-framecount'),
      paused: document.getElementById('hud-paused')
    };

    const sliders = {
      beltSpeed: document.getElementById('slider-beltspeed'),
      spawnRate: document.getElementById('slider-spawnrate'),
      difficulty: document.getElementById('slider-difficulty')
    };

    const sliderValues = {
      beltSpeed: document.getElementById('value-beltspeed'),
      spawnRate: document.getElementById('value-spawnrate'),
      difficulty: document.getElementById('value-difficulty')
    };

    const bins = [];

    init();

    async function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x607d8b);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 12, 14);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 0, 0);

      clock = new THREE.Clock();
      loader = new GLTFLoader();

      setupLights();
      setupGround();
      setupBelt();
      setupBins();
      setupDiverterZone();
      setupUI();
      setupKeyboard();

      await loadModels();

      resetSpawnTimer();
      animate();
      window.addEventListener('resize', onResize);
    }

    function setupLights() {
      const ambient = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambient);

      const dir = new THREE.DirectionalLight(0xffffff, 1.0);
      dir.position.set(5, 15, 5);
      dir.castShadow = true;
      dir.shadow.mapSize.set(2048, 2048);
      dir.shadow.camera.left = -20;
      dir.shadow.camera.right = 20;
      dir.shadow.camera.top = 20;
      dir.shadow.camera.bottom = -20;
      dir.shadow.camera.near = 1;
      dir.shadow.camera.far = 50;
      scene.add(dir);

      const pointA = new THREE.PointLight(0xff6666, 0.5, 20);
      pointA.position.set(10, 4, -4);
      pointA.castShadow = true;
      scene.add(pointA);

      const pointC = new THREE.PointLight(0x6699ff, 0.5, 20);
      pointC.position.set(10, 4, 4);
      pointC.castShadow = true;
      scene.add(pointC);
    }

    function setupGround() {
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(60, 40),
        new THREE.MeshStandardMaterial({ color: 0x37474f, roughness: 0.95 })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -1;
      ground.receiveShadow = true;
      scene.add(ground);
    }

    function createScrollTexture() {
      const size = 256;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#37474f';
      ctx.fillRect(0, 0, size, size);

      for (let i = 0; i < size; i += 32) {
        ctx.fillStyle = i % 64 === 0 ? '#455a64' : '#263238';
        ctx.fillRect(i, 0, 16, size);
      }

      for (let y = 0; y < size; y += 32) {
        ctx.fillStyle = 'rgba(255,255,255,0.03)';
        ctx.fillRect(0, y, size, 2);
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(6, 1);
      return tex;
    }

    function setupBelt() {
      beltTexture = createScrollTexture();

      belt = new THREE.Mesh(
        new THREE.BoxGeometry(BELT_LENGTH, BELT_HEIGHT, BELT_WIDTH),
        new THREE.MeshStandardMaterial({
          color: 0x37474f,
          map: beltTexture,
          roughness: 0.9,
          metalness: 0.1
        })
      );
      belt.position.set(0, BELT_Y, 0);
      belt.receiveShadow = true;
      belt.castShadow = true;
      scene.add(belt);

      const rollerMat = new THREE.MeshStandardMaterial({ color: 0x90a4ae, metalness: 0.7, roughness: 0.3 });
      const rollerGeo = new THREE.CylinderGeometry(0.3, 0.3, BELT_WIDTH + 0.25, 24);

      rollerLeft = new THREE.Mesh(rollerGeo, rollerMat);
      rollerLeft.rotation.x = Math.PI / 2;
      rollerLeft.position.set(BELT_MIN_X, BELT_Y, 0);
      rollerLeft.castShadow = true;
      scene.add(rollerLeft);

      rollerRight = new THREE.Mesh(rollerGeo, rollerMat);
      rollerRight.rotation.x = Math.PI / 2;
      rollerRight.position.set(BELT_MAX_X, BELT_Y, 0);
      rollerRight.castShadow = true;
      scene.add(rollerRight);
    }

    function createBin(color, label, position) {
      const group = new THREE.Group();
      group.position.copy(position);

      const wallMat = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.7,
        metalness: 0.15,
        emissive: new THREE.Color(color).multiplyScalar(0.08)
      });

      const floor = new THREE.Mesh(
        new THREE.BoxGeometry(2.2, 0.2, 2.2),
        wallMat
      );
      floor.position.y = -0.9;
      floor.receiveShadow = true;
      floor.castShadow = true;
      group.add(floor);

      const wallThickness = 0.15;
      const wallHeight = 1.6;

      const leftWall = new THREE.Mesh(new THREE.BoxGeometry(wallThickness, wallHeight, 2.2), wallMat);
      leftWall.position.set(-1.1, -0.1, 0);
      group.add(leftWall);

      const rightWall = new THREE.Mesh(new THREE.BoxGeometry(wallThickness, wallHeight, 2.2), wallMat);
      rightWall.position.set(1.1, -0.1, 0);
      group.add(rightWall);

      const frontWall = new THREE.Mesh(new THREE.BoxGeometry(2.2, wallHeight, wallThickness), wallMat);
      frontWall.position.set(0, -0.1, -1.1);
      group.add(frontWall);

      const backWall = new THREE.Mesh(new THREE.BoxGeometry(2.2, wallHeight, wallThickness), wallMat);
      backWall.position.set(0, -0.1, 1.1);
      group.add(backWall);

      group.traverse(o => {
        if (o.isMesh) {
          o.castShadow = true;
          o.receiveShadow = true;
        }
      });

      const marker = new THREE.Mesh(
        new THREE.CylinderGeometry(0.22, 0.22, 0.08, 32),
        new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.35 })
      );
      marker.rotation.x = Math.PI / 2;
      marker.position.set(0, 0.55, 0);
      group.add(marker);

      const labelSprite = makeTextSprite(label, color);
      labelSprite.position.set(0, 1.6, 0);
      group.add(labelSprite);

      scene.add(group);

      bins.push({
        label,
        typeKey: label,
        group,
        center: position.clone(),
        minX: position.x - 1.1,
        maxX: position.x + 1.1,
        minZ: position.z - 1.1,
        maxZ: position.z + 1.1,
        floorY: -0.9
      });
    }

    function setupBins() {
      createBin(0xff4444, 'A', new THREE.Vector3(10, 0, -4));
      createBin(0xffeb3b, 'B', new THREE.Vector3(10, 0, 0));
      createBin(0x42a5f5, 'C', new THREE.Vector3(10, 0, 4));
    }

    function setupDiverterZone() {
      const zoneGroup = new THREE.Group();

      const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.15 });
      for (let i = -1; i <= 1; i++) {
        const line = new THREE.Mesh(
          new THREE.BoxGeometry(0.08, 0.01, BELT_WIDTH + 0.3),
          lineMat
        );
        line.position.set(DIVERTER_X + i * 0.5, BELT_Y + BELT_HEIGHT / 2 + 0.01, 0);
        zoneGroup.add(line);
      }
      scene.add(zoneGroup);

      const paddleMatA = new THREE.MeshStandardMaterial({ color: 0xff6666, metalness: 0.2, roughness: 0.5 });
      diverterPaddleA = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.12, 0.25), paddleMatA);
      diverterPaddleA.position.set(DIVERTER_X, BELT_Y + BELT_HEIGHT / 2 + 0.12, -BELT_WIDTH / 2 - 0.05);
      diverterPaddleA.castShadow = true;
      diverterPaddleA.userData.side = 'A';
      diverterPaddleA.userData.timer = 0;
      scene.add(diverterPaddleA);

      const paddleMatC = new THREE.MeshStandardMaterial({ color: 0x6699ff, metalness: 0.2, roughness: 0.5 });
      diverterPaddleC = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.12, 0.25), paddleMatC);
      diverterPaddleC.position.set(DIVERTER_X, BELT_Y + BELT_HEIGHT / 2 + 0.12, BELT_WIDTH / 2 + 0.05);
      diverterPaddleC.castShadow = true;
      diverterPaddleC.userData.side = 'C';
      diverterPaddleC.userData.timer = 0;
      scene.add(diverterPaddleC);
    }

    function makeTextSprite(text, colorHex) {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = 'rgba(0,0,0,0.0)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.font = 'bold 40px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 6;
      ctx.strokeText(text, canvas.width / 2, canvas.height / 2);
      ctx.fillStyle = '#' + new THREE.Color(colorHex).getHexString();
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(1.5, 0.75, 1);
      return sprite;
    }

    async function loadModels() {
      const entries = Object.entries(TYPE_INFO);
      await Promise.all(entries.map(async ([key, info]) => {
        try {
          const gltf = await loader.loadAsync(info.url);
          const root = gltf.scene;
          root.updateMatrixWorld(true);

          root.traverse(obj => {
            if (obj.isMesh) {
              obj.castShadow = true;
              obj.receiveShadow = true;
              if (obj.material) obj.material = obj.material.clone();
            }
          });

          state.models[key] = { scene: root, animations: gltf.animations || [] };
        } catch (err) {
          console.warn('Failed loading model', key, err);
          state.models[key] = { scene: createFallbackModel(key), animations: [] };
        }
      }));
    }

    function createFallbackModel(key) {
      let mesh;
      if (key === 'A') {
        mesh = new THREE.Mesh(
          new THREE.BoxGeometry(0.8, 0.8, 0.8),
          new THREE.MeshStandardMaterial({ color: 0xb0bec5 })
        );
      } else if (key === 'B') {
        mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.45, 20, 20),
          new THREE.MeshStandardMaterial({ color: 0xffd54f })
        );
      } else {
        mesh = new THREE.Mesh(
          new THREE.CylinderGeometry(0.22, 0.3, 1.0, 20),
          new THREE.MeshStandardMaterial({ color: 0x90caf9 })
        );
      }
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      const g = new THREE.Group();
      g.add(mesh);
      return g;
    }

    function createItem(typeKey) {
      const info = TYPE_INFO[typeKey];
      const modelData = state.models[typeKey];
      const group = new THREE.Group();
      group.position.set(BELT_MIN_X, ITEM_BASE_Y, 0);

      const ring = new THREE.Mesh(
        new THREE.RingGeometry(0.38, 0.55, 32),
        new THREE.MeshBasicMaterial({
          color: info.color,
          transparent: true,
          opacity: 0.9,
          side: THREE.DoubleSide
        })
      );
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = -0.46;
      group.add(ring);

      const glow = new THREE.Mesh(
        new THREE.CircleGeometry(0.42, 32),
        new THREE.MeshBasicMaterial({
          color: info.color,
          transparent: true,
          opacity: 0.18,
          side: THREE.DoubleSide
        })
      );
      glow.rotation.x = -Math.PI / 2;
      glow.position.y = -0.455;
      group.add(glow);

      const model = modelData.scene.clone(true);
      const box = new THREE.Box3().setFromObject(model);
      const size = new THREE.Vector3();
      box.getSize(size);
      const maxDim = Math.max(size.x || 1, size.y || 1, size.z || 1);
      const scale = 0.8 / maxDim;
      model.scale.setScalar(scale);
      model.position.y = -0.02;
      group.add(model);

      group.traverse(o => {
        if (o.isMesh) {
          o.castShadow = true;
          o.receiveShadow = true;
        }
      });

      scene.add(group);

      let mixer = null;
      if (modelData.animations && modelData.animations.length > 0) {
        mixer = new THREE.AnimationMixer(model);
        modelData.animations.forEach(clip => {
          const action = mixer.clipAction(clip);
          action.play();
        });
      }

      const item = {
        id: state.itemIdCounter++,
        typeKey,
        typeName: info.name,
        group,
        model,
        ring,
        glow,
        mixer,
        pos: group.position,
        vel: new THREE.Vector3(state.beltSpeed, 0, 0),
        onBelt: true,
        sorted: false,
        removed: false,
        targetBin: null,
        decisionMade: false,
        canBeDirected: true
      };

      state.items.push(item);
      if (mixer) state.mixerMap.set(item.id, mixer);
      state.itemsSpawned++;
    }

    function setupUI() {
      sliders.beltSpeed.addEventListener('input', () => {
        state.beltSpeed = parseFloat(sliders.beltSpeed.value);
        sliderValues.beltSpeed.textContent = `${state.beltSpeed.toFixed(1)} u/s`;
      });

      sliders.spawnRate.addEventListener('input', () => {
        state.spawnRate = parseFloat(sliders.spawnRate.value);
        sliderValues.spawnRate.textContent = `${state.spawnRate.toFixed(1)} s`;
      });

      sliders.difficulty.addEventListener('input', () => {
        const level = parseInt(sliders.difficulty.value);
        sliderValues.difficulty.textContent = `Level ${level}`;

        const presets = {
          1: { beltSpeed: 2.0, spawnRate: 4.0 },
          2: { beltSpeed: 3.5, spawnRate: 2.5 },
          3: { beltSpeed: 5.0, spawnRate: 1.5 }
        };

        const preset = presets[level];
        setSliderValue(sliders.beltSpeed, preset.beltSpeed.toFixed(1));
        setSliderValue(sliders.spawnRate, preset.spawnRate.toFixed(1));
      });

      sliders.beltSpeed.dispatchEvent(new Event('input'));
      sliders.spawnRate.dispatchEvent(new Event('input'));
      sliders.difficulty.dispatchEvent(new Event('input'));
    }

    function setSliderValue(slider, value) {
      slider.value = value;
      slider.dispatchEvent(new Event('input', { bubbles: true }));
    }

    function setupKeyboard() {
      window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();

        if (key === '1' || key === 'a') {
          activateDiverter('A');
        } else if (key === '2' || key === 's') {
          activateDiverter('B');
        } else if (key === '3' || key === 'd') {
          activateDiverter('C');
        } else if (key === 'r') {
          resetGame();
        } else if (key === 'p') {
          state.isPaused = !state.isPaused;
        }
      });
    }

    function activateDiverter(which) {
      state.diverterActive = which;
      if (which === 'A') diverterPaddleA.userData.timer = 0.22;
      if (which === 'C') diverterPaddleC.userData.timer = 0.22;

      const candidate = getNextItemInDiverterZone();
      if (!candidate) return;

      candidate.decisionMade = true;

      if (which === 'A') {
        candidate.vel.z = -4.0;
        candidate.targetBin = 'A';
      } else if (which === 'B') {
        candidate.vel.z = 0;
        candidate.targetBin = 'B';
      } else if (which === 'C') {
        candidate.vel.z = 4.0;
        candidate.targetBin = 'C';
      }
    }

    function getNextItemInDiverterZone() {
      const candidates = state.items
        .filter(item =>
          !item.removed &&
          item.onBelt &&
          item.pos.x >= DIVERTER_X - 0.7 &&
          item.pos.x <= DIVERTER_X + 0.9
        )
        .sort((a, b) => a.pos.x - b.pos.x);

      return candidates[0] || null;
    }

    function resetSpawnTimer() {
      const min = Math.max(1, state.spawnRate - 1);
      const max = Math.min(6, state.spawnRate + 1);
      state.nextSpawnTimer = THREE.MathUtils.randFloat(min, max);
    }

    function updateSpawning(dt) {
      state.nextSpawnTimer -= dt;
      if (state.nextSpawnTimer <= 0) {
        const keys = ['A', 'B', 'C'];
        const typeKey = keys[Math.floor(Math.random() * keys.length)];
        createItem(typeKey);
        resetSpawnTimer();
      }
    }

    function updateDiverters(dt) {
      if (diverterPaddleA.userData.timer > 0) {
        diverterPaddleA.userData.timer -= dt;
      }
      if (diverterPaddleC.userData.timer > 0) {
        diverterPaddleC.userData.timer -= dt;
      }

      const tA = Math.max(diverterPaddleA.userData.timer, 0);
      const tC = Math.max(diverterPaddleC.userData.timer, 0);

      diverterPaddleA.rotation.y = -Math.sin((tA / 0.22) * Math.PI) * 0.8;
      diverterPaddleC.rotation.y = Math.sin((tC / 0.22) * Math.PI) * 0.8;
    }

    function updateItems(dt) {
      for (const item of state.items) {
        if (item.removed) continue;

        if (item.mixer) item.mixer.update(dt);

        if (item.onBelt) {
          item.vel.x = state.beltSpeed;
          item.vel.y = 0;
          item.pos.y = ITEM_BASE_Y;

          item.pos.x += item.vel.x * dt;
          item.pos.z += item.vel.z * dt;

          item.ring.rotation.z += dt * 2.0;

          const halfWidth = BELT_WIDTH / 2;

          if (Math.abs(item.pos.z) > halfWidth + 0.2 || item.pos.x > BELT_MAX_X + 0.25) {
            item.onBelt = false;
            if (item.targetBin == null) {
              item.targetBin = 'B';
            }
          }
        } else {
          item.vel.y -= GRAVITY * dt;
          item.pos.addScaledVector(item.vel, dt);
          item.group.rotation.z += item.vel.z * dt * 0.2;
          item.group.rotation.x += item.vel.x * dt * 0.08;
        }

        if (!item.sorted && item.pos.y <= -0.8) {
          resolveLanding(item);
        }

        if (item.pos.y < -5 || Math.abs(item.pos.x) > 40 || Math.abs(item.pos.z) > 30) {
          removeItem(item);
        }
      }

      state.items = state.items.filter(i => !i.removed);
    }

    function resolveLanding(item) {
      item.sorted = true;

      let landedBin = null;
      for (const bin of bins) {
        if (
          item.pos.x >= bin.minX &&
          item.pos.x <= bin.maxX &&
          item.pos.z >= bin.minZ &&
          item.pos.z <= bin.maxZ
        ) {
          landedBin = bin;
          break;
        }
      }

      if (landedBin) {
        if (landedBin.typeKey === item.typeKey) {
          state.score += 10;
          state.correctSorts++;
          state.lastSortResult = 'correct';
        } else {
          state.score -= 5;
          state.wrongSorts++;
          state.lastSortResult = 'wrong';
        }

        item.vel.set(0, 0, 0);
        item.pos.y = -0.6;
        setTimeout(() => removeItem(item), 350);
      } else {
        state.score -= 3;
        state.missedItems++;
        state.lastSortResult = 'miss';
        setTimeout(() => removeItem(item), 350);
      }
    }

    function removeItem(item) {
      if (item.removed) return;
      item.removed = true;
      scene.remove(item.group);
      if (state.mixerMap.has(item.id)) state.mixerMap.delete(item.id);
    }

    function resetGame() {
      for (const item of state.items) {
        scene.remove(item.group);
      }
      state.items.length = 0;
      state.mixerMap.clear();
      state.score = 0;
      state.correctSorts = 0;
      state.wrongSorts = 0;
      state.missedItems = 0;
      state.itemsSpawned = 0;
      state.lastSortResult = 'none';
      state.diverterActive = 'none';
      state.itemIdCounter = 0;
      resetSpawnTimer();
    }

    function updateHUD() {
      hud.score.textContent = state.score;
      hud.correct.textContent = state.correctSorts;
      hud.wrong.textContent = state.wrongSorts;
      hud.missed.textContent = state.missedItems;
      hud.spawned.textContent = state.itemsSpawned;
      hud.beltspeed.textContent = state.beltSpeed.toFixed(1);
      hud.framecount.textContent = state.frameCount;
      hud.paused.textContent = state.isPaused ? 'Yes' : 'No';

      const nextItem = getNextItemInDiverterZone() ||
        state.items
          .filter(i => !i.removed && i.onBelt)
          .sort((a, b) => b.pos.x - a.pos.x)[0];

      hud.nextitem.textContent = nextItem ? nextItem.typeName : '--';
    }

    function updateThreeState() {
      state.itemsOnBelt = state.items.filter(i => !i.removed && i.onBelt).length;

      const payload = {
        frameCount: state.frameCount,
        isPaused: state.isPaused,
        score: state.score,
        correctSorts: state.correctSorts,
        wrongSorts: state.wrongSorts,
        missedItems: state.missedItems,
        itemsSpawned: state.itemsSpawned,
        beltSpeed: state.beltSpeed,
        spawnRate: state.spawnRate,
        itemsOnBelt: state.itemsOnBelt,
        diverterActive: state.diverterActive,
        lastSortResult: state.lastSortResult,
        isValid: true
      };

      for (const v of Object.values(payload)) {
        if (typeof v === 'number' && !Number.isFinite(v)) {
          payload.isValid = false;
          break;
        }
      }

      window.__3D_STATE__ = payload;
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);
      state.frameCount++;

      controls.update();

      if (!state.isPaused) {
        if (beltTexture) {
          beltTexture.offset.x += state.beltSpeed * dt * 0.2;
        }

        const rollerRot = (state.beltSpeed / 0.3) * dt;
        rollerLeft.rotation.y -= rollerRot;
        rollerRight.rotation.y -= rollerRot;

        updateSpawning(dt);
        updateDiverters(dt);
        updateItems(dt);
      }

      updateHUD();
      updateThreeState();
      renderer.render(scene, camera);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
  </script>
</body>
