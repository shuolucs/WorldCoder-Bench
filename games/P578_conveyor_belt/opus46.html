<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conveyor Belt Sorting Game</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
body { margin: 0; overflow: hidden; background: #000; }
canvas { display: block; }
#hud {
  position: fixed; top: 10px; left: 10px;
  background: rgba(0,0,0,0.6); color: #0f0;
  font-family: monospace; padding: 10px;
  border-radius: 6px; z-index: 100; pointer-events: none;
  font-size: 14px; line-height: 1.6;
}
#controls {
  position: fixed; bottom: 10px; right: 10px;
  background: rgba(0,0,0,0.7); color: #fff;
  font-family: monospace; padding: 14px;
  border-radius: 8px; z-index: 100; min-width: 240px;
  font-size: 13px;
}
#controls label { display: block; margin-bottom: 8px; }
#controls input[type="range"] { width: 100%; }
#instructions {
  position: fixed; top: 10px; right: 10px;
  background: rgba(0,0,0,0.6); color: #adf;
  font-family: monospace; padding: 10px;
  border-radius: 6px; z-index: 100; pointer-events: none;
  font-size: 12px; line-height: 1.5;
}
</style>
</head>
<body>

<div id="hud">
  <div>Score: <span id="hud-score">0</span></div>
  <div>Correct: <span id="hud-correct">0</span></div>
  <div>Wrong: <span id="hud-wrong">0</span></div>
  <div>Missed: <span id="hud-missed">0</span></div>
  <div>Items Spawned: <span id="hud-spawned">0</span></div>
  <div>Belt Speed: <span id="hud-beltspeed">2.0</span></div>
  <div>Next Item: <span id="hud-nextitem">--</span></div>
  <div>Frame: <span id="hud-framecount">0</span></div>
  <div>Paused: <span id="hud-paused">No</span></div>
</div>

<div id="instructions">
  [1/A] Bin A (Red/Box)<br>
  [2/S] Bin B (Yellow/Duck)<br>
  [3/D] Bin C (Blue/Bottle)<br>
  [R] Reset | [P] Pause
</div>

<div id="controls">
  <label>Belt Speed: <span id="lbl-beltspeed">2.0</span>
    <input type="range" id="slider-beltspeed" min="0.5" max="6.0" value="2.0" step="0.5">
  </label>
  <label>Spawn Rate: <span id="lbl-spawnrate">3.0</span>s
    <input type="range" id="slider-spawnrate" min="1" max="6" value="3" step="0.5">
  </label>
  <label>Difficulty: <span id="lbl-difficulty">1</span>
    <input type="range" id="slider-difficulty" min="1" max="3" value="1" step="1">
  </label>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ---- State ----
const state = {
  frameCount: 0,
  isPaused: false,
  score: 0,
  correctSorts: 0,
  wrongSorts: 0,
  missedItems: 0,
  itemsSpawned: 0,
  beltSpeed: 2.0,
  spawnRate: 3.0,
  itemsOnBelt: 0,
  diverterActive: "none",
  lastSortResult: "none",
  isValid: true
};
window.__3D_STATE__ = state;

// ---- Scene Setup ----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x607d8b);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 12, 14);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// ---- Lights ----
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 15, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -20;
scene.add(dirLight);

const pointLight1 = new THREE.PointLight(0xff6644, 0.5, 20);
pointLight1.position.set(10, 4, -4);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x4466ff, 0.5, 20);
pointLight2.position.set(10, 4, 4);
scene.add(pointLight2);

// ---- Ground Plane ----
const groundGeo = new THREE.PlaneGeometry(50, 50);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x37474f });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1;
ground.receiveShadow = true;
scene.add(ground);

// ---- Conveyor Belt ----
const beltLength = 20;
const beltWidth = 3;
const beltHeight = 0.3;

// Belt texture with UV scrolling
const beltCanvas = document.createElement('canvas');
beltCanvas.width = 512;
beltCanvas.height = 128;
const bctx = beltCanvas.getContext('2d');
bctx.fillStyle = '#37474f';
bctx.fillRect(0, 0, 512, 128);
// Draw belt lines
bctx.strokeStyle = '#2c3e3e';
bctx.lineWidth = 2;
for (let i = 0; i < 512; i += 16) {
  bctx.beginPath();
  bctx.moveTo(i, 0);
  bctx.lineTo(i, 128);
  bctx.stroke();
}
const beltTexture = new THREE.CanvasTexture(beltCanvas);
beltTexture.wrapS = THREE.RepeatWrapping;
beltTexture.wrapT = THREE.RepeatWrapping;
beltTexture.repeat.set(10, 1);

const beltGeo = new THREE.BoxGeometry(beltLength, beltHeight, beltWidth);
const beltMat = new THREE.MeshStandardMaterial({ map: beltTexture, roughness: 0.8 });
const belt = new THREE.Mesh(beltGeo, beltMat);
belt.position.set(0, 0, 0);
belt.receiveShadow = true;
belt.castShadow = true;
scene.add(belt);

// Belt side rails
const railGeo = new THREE.BoxGeometry(beltLength, 0.5, 0.1);
const railMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.6 });
const rail1 = new THREE.Mesh(railGeo, railMat);
rail1.position.set(0, 0.25, -beltWidth / 2 - 0.05);
rail1.castShadow = true;
scene.add(rail1);
const rail2 = new THREE.Mesh(railGeo, railMat);
rail2.position.set(0, 0.25, beltWidth / 2 + 0.05);
rail2.castShadow = true;
scene.add(rail2);

// Belt rollers
const rollerGeo = new THREE.CylinderGeometry(0.3, 0.3, beltWidth + 0.4, 16);
const rollerMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.7 });
const rollerLeft = new THREE.Mesh(rollerGeo, rollerMat);
rollerLeft.rotation.x = Math.PI / 2;
rollerLeft.position.set(-beltLength / 2, 0, 0);
rollerLeft.castShadow = true;
scene.add(rollerLeft);
const rollerRight = new THREE.Mesh(rollerGeo, rollerMat);
rollerRight.rotation.x = Math.PI / 2;
rollerRight.position.set(beltLength / 2, 0, 0);
rollerRight.castShadow = true;
scene.add(rollerRight);

// Belt support legs
const legGeo = new THREE.BoxGeometry(0.3, 1, 0.3);
const legMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
for (let x = -8; x <= 8; x += 4) {
  for (let z of [-1.2, 1.2]) {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(x, -0.5, z);
    leg.castShadow = true;
    scene.add(leg);
  }
}

// ---- Diverter Zone Marker ----
const diverterZoneGeo = new THREE.PlaneGeometry(2, beltWidth + 0.5);
const diverterZoneMat = new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.2 });
const diverterZone = new THREE.Mesh(diverterZoneGeo, diverterZoneMat);
diverterZone.rotation.x = -Math.PI / 2;
diverterZone.position.set(8, 0.16, 0);
scene.add(diverterZone);

// Diverter zone lines
const lineMatYellow = new THREE.MeshBasicMaterial({ color: 0xffff00 });
for (let z = -1.5; z <= 1.5; z += 3) {
  const lineGeo = new THREE.BoxGeometry(2, 0.02, 0.05);
  const line = new THREE.Mesh(lineGeo, lineMatYellow);
  line.position.set(8, 0.16, z);
  scene.add(line);
}

// ---- Diverter Paddles ----
const paddleGeo = new THREE.BoxGeometry(1.5, 0.6, 0.15);
const paddleMatA = new THREE.MeshStandardMaterial({ color: 0xff4444 });
const paddleMatC = new THREE.MeshStandardMaterial({ color: 0x4444ff });

const paddlePivotA = new THREE.Group();
paddlePivotA.position.set(8, 0.3, -beltWidth / 2 - 0.1);
scene.add(paddlePivotA);
const paddleA = new THREE.Mesh(paddleGeo, paddleMatA);
paddleA.position.set(0.75, 0, 0);
paddlePivotA.add(paddleA);
paddlePivotA.rotation.y = 0;
paddlePivotA.visible = true;

const paddlePivotC = new THREE.Group();
paddlePivotC.position.set(8, 0.3, beltWidth / 2 + 0.1);
scene.add(paddlePivotC);
const paddleC = new THREE.Mesh(paddleGeo, paddleMatC);
paddleC.position.set(0.75, 0, 0);
paddlePivotC.add(paddleC);
paddlePivotC.rotation.y = 0;
paddlePivotC.visible = true;

let paddleAAngle = 0;
let paddleCAngle = 0;
let paddleATarget = 0;
let paddleCTarget = 0;

// ---- Sorting Bins ----
function createBin(x, y, z, color, label) {
  const group = new THREE.Group();
  const binW = 3, binD = 3, binH = 2, thick = 0.15;
  const mat = new THREE.MeshStandardMaterial({ color, transparent: true, opacity: 0.7 });

  // Bottom
  const bottom = new THREE.Mesh(new THREE.BoxGeometry(binW, thick, binD), mat);
  bottom.position.set(0, 0, 0);
  bottom.receiveShadow = true;
  group.add(bottom);

  // Walls
  const wallFront = new THREE.Mesh(new THREE.BoxGeometry(binW, binH, thick), mat);
  wallFront.position.set(0, binH / 2, -binD / 2);
  wallFront.castShadow = true;
  group.add(wallFront);

  const wallBack = new THREE.Mesh(new THREE.BoxGeometry(binW, binH, thick), mat);
  wallBack.position.set(0, binH / 2, binD / 2);
  wallBack.castShadow = true;
  group.add(wallBack);

  const wallLeft = new THREE.Mesh(new THREE.BoxGeometry(thick, binH, binD), mat);
  wallLeft.position.set(-binW / 2, binH / 2, 0);
  wallLeft.castShadow = true;
  group.add(wallLeft);

  const wallRight = new THREE.Mesh(new THREE.BoxGeometry(thick, binH, binD), mat);
  wallRight.position.set(binW / 2, binH / 2, 0);
  wallRight.castShadow = true;
  group.add(wallRight);

  // Label
  const labelCanvas = document.createElement('canvas');
  labelCanvas.width = 128;
  labelCanvas.height = 128;
  const lctx = labelCanvas.getContext('2d');
  lctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
  lctx.fillRect(0, 0, 128, 128);
  lctx.fillStyle = '#fff';
  lctx.font = 'bold 80px monospace';
  lctx.textAlign = 'center';
  lctx.textBaseline = 'middle';
  lctx.fillText(label, 64, 64);
  const labelTex = new THREE.CanvasTexture(labelCanvas);
  const labelMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(1.5, 1.5),
    new THREE.MeshBasicMaterial({ map: labelTex })
  );
  labelMesh.position.set(0, binH + 0.1, -binD / 2 - 0.1);
  group.add(labelMesh);

  group.position.set(x, y, z);
  scene.add(group);
  return { group, x, y, z, binW, binD, binH, label };
}

const binA = createBin(12, -1, -4, 0xff4444, 'A');
const binB = createBin(12, -1, 0, 0xffcc00, 'B');
const binC = createBin(12, -1, 4, 0x4444ff, 'C');

// Ramps from belt to bins
function createRamp(targetZ) {
  const rampGeo = new THREE.BoxGeometry(4, 0.1, Math.abs(targetZ) > 0.5 ? 4 : 2);
  const rampMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.3 });
  const ramp = new THREE.Mesh(rampGeo, rampMat);
  const midZ = targetZ * 0.5;
  ramp.position.set(10, -0.3, midZ);
  if (targetZ !== 0) {
    ramp.rotation.x = targetZ > 0 ? 0.15 : -0.15;
  }
  ramp.receiveShadow = true;
  scene.add(ramp);
}

// ---- Load GLB Models ----
const loader = new GLTFLoader();
const modelTemplates = {};
let modelsLoaded = 0;

const modelDefs = [
  { type: 'Box', url: 'https://raw.githubusercontent.com/nicobailon/CodingWithVision/main/shared_assets/glb/BoxAnimated.glb', color: 0xff4444, scale: 0.8 },
  { type: 'Duck', url: 'https://raw.githubusercontent.com/nicobailon/CodingWithVision/main/shared_assets/glb/Duck.glb', color: 0xffcc00, scale: 0.008 },
  { type: 'Bottle', url: 'https://raw.githubusercontent.com/nicobailon/CodingWithVision/main/shared_assets/glb/WaterBottle.glb', color: 0x4488ff, scale: 8.0 }
];

// Fallback geometry for items if models fail to load
function createFallbackMesh(type, color) {
  let geo;
  if (type === 'Box') {
    geo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
  } else if (type === 'Duck') {
    geo = new THREE.ConeGeometry(0.3, 0.7, 8);
  } else {
    geo = new THREE.CylinderGeometry(0.15, 0.15, 0.7, 8);
  }
  const mat = new THREE.MeshStandardMaterial({ color });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  return mesh;
}

modelDefs.forEach(def => {
  loader.load(def.url, (gltf) => {
    const model = gltf.scene;
    model.scale.setScalar(def.scale);
    model.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    modelTemplates[def.type] = model;
    modelsLoaded++;
  }, undefined, (err) => {
    console.warn(`Failed to load ${def.type}, using fallback`, err);
    modelTemplates[def.type] = createFallbackMesh(def.type, def.color);
    modelsLoaded++;
  });
});

// ---- Items Management ----
const items = [];
let spawnTimer = 0;

function createItemRing(color) {
  const ringGeo = new THREE.RingGeometry(0.5, 0.7, 32);
  const ringMat = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  return ring;
}

function spawnItem() {
  const typeIndex = Math.floor(Math.random() * 3);
  const typeDef = modelDefs[typeIndex];
  const type = typeDef.type;

  const group = new THREE.Group();

  // Clone model or use fallback
  let model;
  if (modelTemplates[type]) {
    model = modelTemplates[type].clone();
  } else {
    model = createFallbackMesh(type, typeDef.color);
  }
  group.add(model);

  // Color ring
  const ring = createItemRing(typeDef.color);
  ring.position.y = 0.02;
  group.add(ring);

  group.position.set(-10, beltHeight / 2 + 0.01, (Math.random() - 0.5) * 1.5);

  scene.add(group);

  const item = {
    group,
    type,
    vx: state.beltSpeed,
    vy: 0,
    vz: 0,
    onBelt: true,
    diverted: false,
    divertTarget: null,
    settled: false,
    scored: false,
    ring
  };

  items.push(item);
  state.itemsSpawned++;
}

// ---- Scoring ----
function scoreItem(item) {
  if (item.scored) return;
  item.scored = true;

  const ix = item.group.position.x;
  const iz = item.group.position.z;
  const iy = item.group.position.y;

  // Check each bin
  const bins = [
    { bin: binA, label: 'A', expectedType: 'Box' },
    { bin: binB, label: 'B', expectedType: 'Duck' },
    { bin: binC, label: 'C', expectedType: 'Bottle' }
  ];

  let inBin = null;
  for (const b of bins) {
    const bx = b.bin.x;
    const bz = b.bin.z;
    const hw = b.bin.binW / 2;
    const hd = b.bin.binD / 2;
    if (ix > bx - hw && ix < bx + hw && iz > bz - hd && iz < bz + hd && iy < b.bin.y + b.bin.binH) {
      inBin = b;
      break;
    }
  }

  if (inBin) {
    if (item.type === inBin.expectedType) {
      state.score += 10;
      state.correctSorts++;
      state.lastSortResult = "correct";
      flashDiverterZone(0x00ff00);
    } else {
      state.score -= 5;
      state.wrongSorts++;
      state.lastSortResult = "wrong";
      flashDiverterZone(0xff0000);
    }
  } else {
    state.score -= 3;
    state.missedItems++;
    state.lastSortResult = "miss";
    flashDiverterZone(0xff8800);
  }
}

function flashDiverterZone(color) {
  diverterZoneMat.color.setHex(color);
  diverterZoneMat.opacity = 0.5;
  setTimeout(() => {
    diverterZoneMat.color.setHex(0xffff00);
    diverterZoneMat.opacity = 0.2;
  }, 300);
}

// ---- Diverter Activation ----
function activateDiverter(target) {
  state.diverterActive = target;

  // Find the frontmost item in the diverter zone
  let closest = null;
  let closestX = -Infinity;
  for (const item of items) {
    if (item.onBelt && !item.diverted && !item.scored) {
      const x = item.group.position.x;
      if (x >= 6.5 && x <= 9.5) {
        if (x > closestX) {
          closestX = x;
          closest = item;
        }
      }
    }
  }

  if (!closest) return;

  closest.diverted = true;
  closest.divertTarget = target;

  if (target === 'A') {
    closest.vz = -5.0;
    closest.vx = state.beltSpeed * 0.5;
    paddleATarget = Math.PI / 3;
    setTimeout(() => { paddleATarget = 0; }, 400);
  } else if (target === 'C') {
    closest.vz = 5.0;
    closest.vx = state.beltSpeed * 0.5;
    paddleCTarget = -Math.PI / 3;
    setTimeout(() => { paddleCTarget = 0; }, 400);
  } else {
    // B - straight through
    closest.vx = state.beltSpeed;
  }

  closest.onBelt = false;
}

// ---- Keyboard ----
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === '1' || key === 'a') {
    if (!e.repeat) activateDiverter('A');
  } else if (key === '2' || key === 's') {
    if (!e.repeat) activateDiverter('B');
  } else if (key === '3' || key === 'd') {
    if (!e.repeat) activateDiverter('C');
  } else if (key === 'r') {
    resetGame();
  } else if (key === 'p') {
    state.isPaused = !state.isPaused;
  }
});

// ---- Sliders ----
const sliderBeltSpeed = document.getElementById('slider-beltspeed');
const sliderSpawnRate = document.getElementById('slider-spawnrate');
const sliderDifficulty = document.getElementById('slider-difficulty');

sliderBeltSpeed.addEventListener('input', () => {
  state.beltSpeed = parseFloat(sliderBeltSpeed.value);
  document.getElementById('lbl-beltspeed').textContent = state.beltSpeed.toFixed(1);
});

sliderSpawnRate.addEventListener('input', () => {
  state.spawnRate = parseFloat(sliderSpawnRate.value);
  document.getElementById('lbl-spawnrate').textContent = state.spawnRate.toFixed(1);
});

sliderDifficulty.addEventListener('input', () => {
  const diff = parseInt(sliderDifficulty.value);
  document.getElementById('lbl-difficulty').textContent = diff;
  if (diff === 1) {
    sliderBeltSpeed.value = 2.0;
    sliderSpawnRate.value = 4.0;
  } else if (diff === 2) {
    sliderBeltSpeed.value = 3.5;
    sliderSpawnRate.value = 2.5;
  } else {
    sliderBeltSpeed.value = 5.5;
    sliderSpawnRate.value = 1.5;
  }
  sliderBeltSpeed.dispatchEvent(new Event('input'));
  sliderSpawnRate.dispatchEvent(new Event('input'));
});

// ---- Reset ----
function resetGame() {
  for (const item of items) {
    scene.remove(item.group);
  }
  items.length = 0;
  state.score = 0;
  state.correctSorts = 0;
  state.wrongSorts = 0;
  state.missedItems = 0;
  state.itemsSpawned = 0;
  state.lastSortResult = "none";
  state.diverterActive = "none";
  spawnTimer = 0;
}

// ---- HUD Update ----
function updateHUD() {
  document.getElementById('hud-score').textContent = state.score;
  document.getElementById('hud-correct').textContent = state.correctSorts;
  document.getElementById('hud-wrong').textContent = state.wrongSorts;
  document.getElementById('hud-missed').textContent = state.missedItems;
  document.getElementById('hud-spawned').textContent = state.itemsSpawned;
  document.getElementById('hud-beltspeed').textContent = state.beltSpeed.toFixed(1);
  document.getElementById('hud-framecount').textContent = state.frameCount;
  document.getElementById('hud-paused').textContent = state.isPaused ? "Yes" : "No";

  // Next item approaching diverter
  let nextItem = null;
  let nextX = -Infinity;
  for (const item of items) {
    if (item.onBelt && !item.diverted && !item.scored) {
      const x = item.group.position.x;
      if (x > nextX && x < 8) {
        nextX = x;
        nextItem = item;
      }
    }
  }
  document.getElementById('hud-nextitem').textContent = nextItem ? nextItem.type : '--';
}

// ---- Animation Loop ----
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.05);
  state.frameCount++;

  controls.update();

  if (!state.isPaused) {
    // Scroll belt texture
    beltTexture.offset.x += state.beltSpeed * dt * 0.1;

    // Rotate rollers
    const rollerSpeed = state.beltSpeed * dt * 2;
    rollerLeft.rotation.z -= rollerSpeed;
    rollerRight.rotation.z -= rollerSpeed;

    // Animate paddles
    paddleAAngle += (paddleATarget - paddleAAngle) * Math.min(1, dt * 10);
    paddleCAngle += (paddleCTarget - paddleCAngle) * Math.min(1, dt * 10);
    paddlePivotA.rotation.y = paddleAAngle;
    paddlePivotC.rotation.y = paddleCAngle;

    // Spawn items
    if (modelsLoaded >= 3 || state.frameCount > 60) {
      spawnTimer += dt;
      if (spawnTimer >= state.spawnRate) {
        spawnTimer = 0;
        spawnItem();
      }
    }

    // Update items
    const gravity = 9.81;
    const toRemove = [];

    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      const pos = item.group.position;

      if (item.onBelt) {
        // Move with belt
        item.vx = state.beltSpeed;
        pos.x += item.vx * dt;

        // Keep on belt surface
        pos.y = beltHeight / 2 + 0.01;

        // Clamp z on belt
        pos.z = THREE.MathUtils.clamp(pos.z, -beltWidth / 2 + 0.3, beltWidth / 2 - 0.3);

        // If past belt end without diverting, falls off into B direction
        if (pos.x > 10) {
          item.onBelt = false;
          item.diverted = true;
          item.divertTarget = 'B';
          item.vy = 0;
        }
      } else {
        // Apply gravity and velocity
        item.vy -= gravity * dt;
        pos.x += item.vx * dt;
        pos.y += item.vy * dt;
        pos.z += item.vz * dt;

        // Friction on vz when on ground
        if (pos.y <= -0.8) {
          pos.y = -0.8;
          item.vy = 0;
          item.vx *= 0.9;
          item.vz *= 0.9;

          if (Math.abs(item.vx) < 0.1 && Math.abs(item.vz) < 0.1) {
            item.settled = true;
          }
        }

        // Check if inside a bin (simple check)
        if (pos.y <= -0.5 && !item.scored) {
          scoreItem(item);
        }

        // Remove if too far or settled for a while
        if (pos.y < -5 || pos.x > 20 || pos.x < -15) {
          if (!item.scored) scoreItem(item);
          toRemove.push(i);
        }

        if (item.settled) {
          item._settleTime = (item._settleTime || 0) + dt;
          if (item._settleTime > 2) {
            toRemove.push(i);
          }
        }
      }

      // Pulse ring
      if (item.ring) {
        const pulse = 0.5 + 0.2 * Math.sin(state.frameCount * 0.1);
        item.ring.material.opacity = pulse;
      }
    }

    // Remove settled/fallen items
    const uniqueRemove = [...new Set(toRemove)].sort((a, b) => b - a);
    for (const idx of uniqueRemove) {
      scene.remove(items[idx].group);
      items.splice(idx, 1);
    }
  }

  // Count items on belt
  state.itemsOnBelt = items.filter(i => i.onBelt).length;

  // Validate state
  state.isValid = !Object.values(state).some(v => typeof v === 'number' && (isNaN(v) || !isFinite(v)));

  updateHUD();
  renderer.render(scene, camera);
}

// ---- Resize ----
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
