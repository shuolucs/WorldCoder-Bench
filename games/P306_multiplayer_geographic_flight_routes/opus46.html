<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Flight Routes Globe</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
canvas { display: block; }

#hud-panel {
    position: fixed;
    top: 10px;
    left: 10px;
    width: 250px;
    background: rgba(10, 22, 40, 0.9);
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 8px;
    padding: 15px;
    color: white;
    z-index: 100;
}

#hud-panel h2 {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 12px;
    color: white;
}

.player-btn {
    display: block;
    width: 100%;
    padding: 8px 12px;
    margin-bottom: 6px;
    border: none;
    border-radius: 4px;
    color: #000;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.3s;
}

.player-btn.inactive {
    opacity: 0.3;
}

.control-group {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid rgba(0, 255, 255, 0.2);
}

.control-group label {
    display: block;
    font-size: 13px;
    margin-bottom: 4px;
    color: #aaa;
}

.control-group input[type="range"] {
    width: 100%;
    margin-bottom: 4px;
}

.control-group .value-display {
    font-size: 12px;
    color: #0ff;
    text-align: right;
}

.checkbox-group {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.checkbox-group label {
    font-size: 13px;
    color: #aaa;
    cursor: pointer;
}

#stats-panel {
    position: fixed;
    top: 10px;
    right: 10px;
    width: 200px;
    background: rgba(10, 22, 40, 0.9);
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 8px;
    padding: 15px;
    color: white;
    z-index: 100;
    font-size: 13px;
}

#stats-panel h3 {
    font-size: 15px;
    margin-bottom: 10px;
    color: #0ff;
}

#stats-panel .stat-line {
    margin-bottom: 6px;
    color: #ccc;
}

#stats-panel .stat-value {
    color: #0ff;
    font-weight: bold;
}
</style>
</head>
<body>

<div id="hud-panel">
    <h2>Flight Routes</h2>
    <button class="player-btn" id="btn-player-0" style="background:#ff3333;" onclick="togglePlayer(0)">Player 1</button>
    <button class="player-btn" id="btn-player-1" style="background:#33ff33;" onclick="togglePlayer(1)">Player 2</button>
    <button class="player-btn" id="btn-player-2" style="background:#3333ff; color:#fff;" onclick="togglePlayer(2)">Player 3</button>
    <button class="player-btn" id="btn-player-3" style="background:#ffff33;" onclick="togglePlayer(3)">Player 4</button>

    <div class="control-group">
        <label>Speed</label>
        <input type="range" id="speed-slider" min="0.5" max="3.0" step="0.1" value="1.0" oninput="updateSpeed(this.value)">
        <div class="value-display" id="speed-value">1.0x</div>
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="labels-checkbox" checked onchange="toggleLabels(this.checked)">
        <label for="labels-checkbox">Show Labels</label>
    </div>

    <div class="control-group">
        <label>Altitude</label>
        <input type="range" id="altitude-slider" min="1.1" max="2.0" step="0.05" value="1.3" oninput="updateAltitude(this.value)">
        <div class="value-display" id="altitude-value">1.30</div>
    </div>
</div>

<div id="stats-panel">
    <h3>Statistics</h3>
    <div class="stat-line">Active Players: <span class="stat-value" id="stat-active">4</span></div>
    <div class="stat-line">Total Routes: <span class="stat-value" id="stat-routes">8</span></div>
    <div class="stat-line">Avg Altitude: <span class="stat-value" id="stat-altitude">1.30</span></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// State
window.__3D_STATE__ = {
    globeRadius: 5,
    playerVisibility: [true, true, true, true],
    activePlayers: 4,
    totalVisibleRoutes: 8,
    speedMultiplier: 1.0,
    showLabels: true,
    arcAltitude: 1.3,
    planePositions: [[0, 0], [0, 0], [0, 0], [0, 0]],
    cameraDistance: 15,
    frameCount: 0,
    cityMarkerCount: 12,
    visibleMarkerCount: 12,
    routeSegmentCount: 8
};

const GLOBE_RADIUS = 5;
const SURFACE_RADIUS = 5.02;

// Player data
const players = [
    {
        color: 0xff3333,
        colorHex: '#ff3333',
        name: 'Player 1',
        cities: [
            { name: 'New York', lat: 40.7, lon: -74.0 },
            { name: 'London', lat: 51.5, lon: -0.1 },
            { name: 'Dubai', lat: 25.3, lon: 55.3 }
        ]
    },
    {
        color: 0x33ff33,
        colorHex: '#33ff33',
        name: 'Player 2',
        cities: [
            { name: 'Tokyo', lat: 35.7, lon: 139.7 },
            { name: 'Sydney', lat: -33.9, lon: 151.2 },
            { name: 'Auckland', lat: -36.8, lon: 174.8 }
        ]
    },
    {
        color: 0x3333ff,
        colorHex: '#3333ff',
        name: 'Player 3',
        cities: [
            { name: 'São Paulo', lat: -23.6, lon: -46.6 },
            { name: 'Cape Town', lat: -33.9, lon: 18.4 },
            { name: 'Mumbai', lat: 19.1, lon: 72.9 }
        ]
    },
    {
        color: 0xffff33,
        colorHex: '#ffff33',
        name: 'Player 4',
        cities: [
            { name: 'Los Angeles', lat: 34.1, lon: -118.2 },
            { name: 'Honolulu', lat: 21.3, lon: -157.8 },
            { name: 'Tokyo', lat: 35.7, lon: 139.7 }
        ]
    }
];

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(10, 10, 10);
scene.add(directionalLight);

// Create globe texture
function createGlobeTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 2048;
    canvas.height = 1024;
    const ctx = canvas.getContext('2d');

    // Background
    ctx.fillStyle = '#0a1628';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid lines
    ctx.strokeStyle = '#00ffff';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.4;

    // Longitude lines every 30 degrees
    for (let lon = -180; lon <= 180; lon += 30) {
        const x = ((lon + 180) / 360) * canvas.width;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }

    // Latitude lines every 30 degrees
    for (let lat = -90; lat <= 90; lat += 30) {
        const y = ((90 - lat) / 180) * canvas.height;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }

    ctx.globalAlpha = 1.0;

    const texture = new THREE.CanvasTexture(canvas);
    texture.wrapS = THREE.RepeatWrapping;
    texture.wrapT = THREE.ClampToEdgeWrapping;
    return texture;
}

// Globe
const globeTexture = createGlobeTexture();
const globeGeometry = new THREE.SphereGeometry(GLOBE_RADIUS, 64, 64);
const globeMaterial = new THREE.MeshPhongMaterial({
    map: globeTexture,
    transparent: false,
    shininess: 10
});
const globe = new THREE.Mesh(globeGeometry, globeMaterial);
scene.add(globe);

// Lat/Lon to 3D
function latLonToVec3(lat, lon, radius) {
    const phi = (90 - lat) * (Math.PI / 180);
    const theta = (lon + 180) * (Math.PI / 180);
    const x = -radius * Math.sin(phi) * Math.cos(theta);
    const y = radius * Math.cos(phi);
    const z = radius * Math.sin(phi) * Math.sin(theta);
    return new THREE.Vector3(x, y, z);
}

// Create text sprite
function createTextSprite(text, color) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 256;
    canvas.height = 64;

    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = 'bold 28px Arial';
    ctx.fillStyle = color || '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, canvas.width / 2, canvas.height / 2);

    const texture = new THREE.CanvasTexture(canvas);
    const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(material);
    sprite.scale.set(1.5, 0.4, 1);
    return sprite;
}

// Create arc curve between two points
function createArcCurve(start, end, radius, altitudeMultiplier) {
    const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
    mid.normalize().multiplyScalar(radius * altitudeMultiplier);
    const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
    return curve;
}

// Player objects storage
const playerObjects = [];

function buildPlayerObjects(altitudeMultiplier) {
    // Remove old objects
    playerObjects.forEach(po => {
        po.routes.forEach(r => scene.remove(r));
        po.markers.forEach(m => scene.remove(m));
        po.labels.forEach(l => scene.remove(l));
        po.planes.forEach(p => scene.remove(p));
    });
    playerObjects.length = 0;

    players.forEach((player, pi) => {
        const po = {
            routes: [],
            markers: [],
            labels: [],
            planes: [],
            curves: [],
            planeProgress: []
        };

        const color = new THREE.Color(player.color);

        // Create markers and labels for each city
        player.cities.forEach(city => {
            const pos = latLonToVec3(city.lat, city.lon, SURFACE_RADIUS);

            // Marker sphere
            const markerGeo = new THREE.SphereGeometry(0.08, 16, 16);
            const markerMat = new THREE.MeshBasicMaterial({ color: player.color });
            const marker = new THREE.Mesh(markerGeo, markerMat);
            marker.position.copy(pos);
            scene.add(marker);
            po.markers.push(marker);

            // Label
            const labelPos = pos.clone().normalize().multiplyScalar(SURFACE_RADIUS + 0.25);
            const label = createTextSprite(city.name, player.colorHex);
            label.position.copy(labelPos);
            scene.add(label);
            po.labels.push(label);
        });

        // Create route segments
        for (let i = 0; i < player.cities.length - 1; i++) {
            const startCity = player.cities[i];
            const endCity = player.cities[i + 1];
            const startPos = latLonToVec3(startCity.lat, startCity.lon, SURFACE_RADIUS);
            const endPos = latLonToVec3(endCity.lat, endCity.lon, SURFACE_RADIUS);

            const curve = createArcCurve(startPos, endPos, GLOBE_RADIUS, altitudeMultiplier);
            po.curves.push(curve);

            // Tube geometry for route
            const tubeGeo = new THREE.TubeGeometry(curve, 64, 0.03, 8, false);
            const tubeMat = new THREE.MeshBasicMaterial({ color: player.color, transparent: true, opacity: 0.7 });
            const tube = new THREE.Mesh(tubeGeo, tubeMat);
            scene.add(tube);
            po.routes.push(tube);

            // Plane (cone)
            const coneGeo = new THREE.ConeGeometry(0.06, 0.15, 8);
            const coneMat = new THREE.MeshBasicMaterial({ color: player.color });
            const cone = new THREE.Mesh(coneGeo, coneMat);
            // Rotate cone so it points along +Z by default (we'll orient it along tangent)
            coneGeo.rotateX(Math.PI / 2);
            scene.add(cone);
            po.planes.push(cone);
            po.planeProgress.push(window.__3D_STATE__.planePositions[pi][i] || 0);
        }

        playerObjects.push(po);
    });

    // Update visibility
    playerObjects.forEach((po, i) => {
        const visible = window.__3D_STATE__.playerVisibility[i];
        setPlayerVisibility(i, visible);
    });
}

function setPlayerVisibility(playerIndex, visible) {
    const po = playerObjects[playerIndex];
    if (!po) return;
    po.routes.forEach(r => r.visible = visible);
    po.markers.forEach(m => m.visible = visible);
    po.labels.forEach(l => l.visible = visible && window.__3D_STATE__.showLabels);
    po.planes.forEach(p => p.visible = visible);
}

// Build initial
buildPlayerObjects(window.__3D_STATE__.arcAltitude);

// UI functions
window.togglePlayer = function(index) {
    const state = window.__3D_STATE__;
    state.playerVisibility[index] = !state.playerVisibility[index];
    const btn = document.getElementById('btn-player-' + index);
    if (state.playerVisibility[index]) {
        btn.classList.remove('inactive');
    } else {
        btn.classList.add('inactive');
    }
    setPlayerVisibility(index, state.playerVisibility[index]);
    updateStats();
};

window.updateSpeed = function(val) {
    window.__3D_STATE__.speedMultiplier = parseFloat(val);
    document.getElementById('speed-value').textContent = parseFloat(val).toFixed(1) + 'x';
};

window.toggleLabels = function(checked) {
    window.__3D_STATE__.showLabels = checked;
    playerObjects.forEach((po, i) => {
        const visible = window.__3D_STATE__.playerVisibility[i];
        po.labels.forEach(l => l.visible = visible && checked);
    });
};

window.updateAltitude = function(val) {
    const alt = parseFloat(val);
    window.__3D_STATE__.arcAltitude = alt;
    document.getElementById('altitude-value').textContent = alt.toFixed(2);

    // Save plane progress
    playerObjects.forEach((po, i) => {
        po.planeProgress.forEach((p, j) => {
            window.__3D_STATE__.planePositions[i][j] = p;
        });
    });

    buildPlayerObjects(alt);
    updateStats();
};

function updateStats() {
    const state = window.__3D_STATE__;
    state.activePlayers = state.playerVisibility.filter(v => v).length;
    state.totalVisibleRoutes = state.playerVisibility.reduce((sum, v, i) => {
        return sum + (v ? (players[i].cities.length - 1) : 0);
    }, 0);
    state.visibleMarkerCount = state.playerVisibility.reduce((sum, v, i) => {
        return sum + (v ? players[i].cities.length : 0);
    }, 0);

    document.getElementById('stat-active').textContent = state.activePlayers;
    document.getElementById('stat-routes').textContent = state.totalVisibleRoutes;
    document.getElementById('stat-altitude').textContent = state.arcAltitude.toFixed(2);
}

// Animation
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
    requestAnimationFrame(animate);

    const state = window.__3D_STATE__;
    const delta = clock.getDelta();
    state.frameCount++;

    // Update camera distance
    state.cameraDistance = camera.position.length();

    // Animate planes
    const segmentDuration = 4.0; // seconds per segment
    playerObjects.forEach((po, pi) => {
        po.curves.forEach((curve, si) => {
            // Update progress
            const speed = state.speedMultiplier / segmentDuration;
            po.planeProgress[si] = (po.planeProgress[si] + delta * speed) % 1.0;
            const t = po.planeProgress[si];

            // Position plane on curve
            const pos = curve.getPointAt(t);
            const plane = po.planes[si];
            plane.position.copy(pos);

            // Orient along tangent
            const tangent = curve.getTangentAt(t);
            const lookTarget = pos.clone().add(tangent);
            plane.lookAt(lookTarget);

            // Update state
            state.planePositions[pi][si] = t;
        });
    });

    // Update stats
    state.activePlayers = state.playerVisibility.filter(v => v).length;
    state.totalVisibleRoutes = state.playerVisibility.reduce((sum, v, i) => {
        return sum + (v ? (players[i].cities.length - 1) : 0);
    }, 0);
    state.visibleMarkerCount = state.playerVisibility.reduce((sum, v, i) => {
        return sum + (v ? players[i].cities.length : 0);
    }, 0);

    controls.update();
    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

updateStats();
animate();
</script>
</body>
</html>
