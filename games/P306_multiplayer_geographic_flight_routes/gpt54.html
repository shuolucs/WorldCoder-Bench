<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Flight Routes Globe</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000000;
      font-family: Arial, sans-serif;
    }

    #hud, #stats {
      position: absolute;
      top: 12px;
      padding: 12px;
      background: rgba(10, 22, 40, 0.85);
      border: 1px solid rgba(0, 255, 255, 0.25);
      color: white;
      border-radius: 8px;
      z-index: 10;
      user-select: none;
    }

    #hud {
      left: 12px;
      width: 250px;
    }

    #stats {
      right: 12px;
      width: 210px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
      color: white;
    }

    .player-btn {
      width: 100%;
      border: none;
      color: #000;
      font-weight: bold;
      padding: 8px 10px;
      margin: 5px 0;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .player-btn:hover {
      transform: scale(1.02);
    }

    .player-btn.off {
      opacity: 0.35;
      filter: grayscale(0.3);
    }

    .control-group {
      margin-top: 12px;
    }

    .control-group label {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="range"] {
      width: 100%;
    }

    .stat-line {
      margin: 6px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="title">Flight Routes</div>
    <button class="player-btn" id="playerBtn0" style="background:#ff3333;">Player 1</button>
    <button class="player-btn" id="playerBtn1" style="background:#33ff33;">Player 2</button>
    <button class="player-btn" id="playerBtn2" style="background:#3333ff; color:#fff;">Player 3</button>
    <button class="player-btn" id="playerBtn3" style="background:#ffff33;">Player 4</button>

    <div class="control-group">
      <label for="speedSlider">Speed: <span id="speedValue">1.0x</span></label>
      <input id="speedSlider" type="range" min="0.5" max="3.0" step="0.1" value="1.0" />
    </div>

    <div class="control-group">
      <label class="control-row">
        <input id="labelsCheckbox" type="checkbox" checked />
        <span>Show Labels</span>
      </label>
    </div>

    <div class="control-group">
      <label for="altitudeSlider">Altitude: <span id="altitudeValue">1.3</span></label>
      <input id="altitudeSlider" type="range" min="1.1" max="2.0" step="0.05" value="1.3" />
    </div>
  </div>

  <div id="stats">
    <div class="title">Stats</div>
    <div class="stat-line" id="activePlayersStat">Active Players: 4</div>
    <div class="stat-line" id="totalRoutesStat">Total Routes: 8</div>
    <div class="stat-line" id="avgAltitudeStat">Avg Altitude: 1.30</div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const globeRadius = 5;
    const markerRadius = 0.08;
    const routeSurfaceRadius = 5.02;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#000000");

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 10, 10);
    scene.add(directionalLight);

    function createEarthGridTexture() {
      const size = 2048;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#0a1628";
      ctx.fillRect(0, 0, size, size);

      ctx.strokeStyle = "#00ffff";
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.85;

      for (let lon = -180; lon <= 180; lon += 30) {
        const x = ((lon + 180) / 360) * size;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, size);
        ctx.stroke();
      }

      for (let lat = -90; lat <= 90; lat += 30) {
        const y = ((90 - lat) / 180) * size;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(size, y);
        ctx.stroke();
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    const earthTexture = createEarthGridTexture();
    const earthGeometry = new THREE.SphereGeometry(globeRadius, 64, 64);
    const earthMaterial = new THREE.MeshPhongMaterial({
      map: earthTexture,
      color: "#0a1628",
      shininess: 8
    });
    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    scene.add(earth);

    function latLonToVector3(lat, lon, radius) {
      const phi = THREE.MathUtils.degToRad(90 - lat);
      const theta = THREE.MathUtils.degToRad(lon + 180);

      const x = -radius * Math.sin(phi) * Math.cos(theta);
      const y = radius * Math.cos(phi);
      const z = radius * Math.sin(phi) * Math.sin(theta);

      return new THREE.Vector3(x, y, z);
    }

    function createLabelSprite(text, color = "#ffffff") {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 64;
      const ctx = canvas.getContext("2d");

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      roundRect(ctx, 4, 8, 248, 48, 10);
      ctx.fill();

      ctx.strokeStyle = "rgba(0,255,255,0.4)";
      ctx.lineWidth = 2;
      roundRect(ctx, 4, 8, 248, 48, 10);
      ctx.stroke();

      ctx.font = "24px Arial";
      ctx.fillStyle = color;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthWrite: false
      });

      const sprite = new THREE.Sprite(material);
      sprite.scale.set(1.6, 0.4, 1);
      return sprite;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    const playerData = [
      {
        name: "Player 1",
        color: "#ff3333",
        cities: [
          { name: "New York", lat: 40.7, lon: -74.0 },
          { name: "London", lat: 51.5, lon: -0.1 },
          { name: "Dubai", lat: 25.3, lon: 55.3 }
        ]
      },
      {
        name: "Player 2",
        color: "#33ff33",
        cities: [
          { name: "Tokyo", lat: 35.7, lon: 139.7 },
          { name: "Sydney", lat: -33.9, lon: 151.2 },
          { name: "Auckland", lat: -36.8, lon: 174.8 }
        ]
      },
      {
        name: "Player 3",
        color: "#3333ff",
        cities: [
          { name: "São Paulo", lat: -23.6, lon: -46.6 },
          { name: "Cape Town", lat: -33.9, lon: 18.4 },
          { name: "Mumbai", lat: 19.1, lon: 72.9 }
        ]
      },
      {
        name: "Player 4",
        color: "#ffff33",
        cities: [
          { name: "Los Angeles", lat: 34.1, lon: -118.2 },
          { name: "Honolulu", lat: 21.3, lon: -157.8 },
          { name: "Tokyo", lat: 35.7, lon: 139.7 }
        ]
      }
    ];

    const players = [];
    let arcAltitude = 1.3;
    let speedMultiplier = 1.0;
    let showLabels = true;
    let frameCount = 0;

    function createArcCurve(start, end, altitudeMultiplier) {
      const mid = start.clone().add(end).multiplyScalar(0.5).normalize().multiplyScalar(globeRadius * altitudeMultiplier);
      return new THREE.QuadraticBezierCurve3(start.clone(), mid, end.clone());
    }

    function buildPlayerObjects(playerIndex, playerInfo) {
      const group = new THREE.Group();
      const routeGroup = new THREE.Group();
      const markerGroup = new THREE.Group();
      const labelGroup = new THREE.Group();
      const planeGroup = new THREE.Group();

      const cityObjects = [];
      const segmentObjects = [];

      playerInfo.cities.forEach((city) => {
        const pos = latLonToVector3(city.lat, city.lon, routeSurfaceRadius);

        const markerGeo = new THREE.SphereGeometry(markerRadius, 16, 16);
        const markerMat = new THREE.MeshBasicMaterial({ color: playerInfo.color });
        const marker = new THREE.Mesh(markerGeo, markerMat);
        marker.position.copy(pos);
        markerGroup.add(marker);

        const label = createLabelSprite(city.name, "#ffffff");
        label.position.copy(pos.clone().normalize().multiplyScalar(routeSurfaceRadius + 0.35));
        label.visible = showLabels;
        labelGroup.add(label);

        cityObjects.push({ city, marker, label, position: pos.clone() });
      });

      for (let i = 0; i < playerInfo.cities.length - 1; i++) {
        const start = cityObjects[i].position.clone();
        const end = cityObjects[i + 1].position.clone();
        const curve = createArcCurve(start, end, arcAltitude);

        const tubeGeo = new THREE.TubeGeometry(curve, 64, 0.03, 8, false);
        const tubeMat = new THREE.MeshPhongMaterial({
          color: playerInfo.color,
          emissive: new THREE.Color(playerInfo.color).multiplyScalar(0.2)
        });
        const tube = new THREE.Mesh(tubeGeo, tubeMat);
        routeGroup.add(tube);

        const planeGeo = new THREE.ConeGeometry(0.06, 0.15, 12);
        const planeMat = new THREE.MeshPhongMaterial({ color: playerInfo.color });
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = Math.PI / 2;
        planeGroup.add(plane);

        segmentObjects.push({
          start,
          end,
          curve,
          tube,
          plane,
          progress: Math.random()
        });
      }

      group.add(routeGroup, markerGroup, labelGroup, planeGroup);
      scene.add(group);

      return {
        index: playerIndex,
        name: playerInfo.name,
        color: playerInfo.color,
        group,
        routeGroup,
        markerGroup,
        labelGroup,
        planeGroup,
        cityObjects,
        segmentObjects,
        visible: true
      };
    }

    playerData.forEach((playerInfo, index) => {
      players.push(buildPlayerObjects(index, playerInfo));
    });

    function updatePlaneOnCurve(segment) {
      const t = segment.progress;
      const pos = segment.curve.getPointAt(t);
      const tangent = segment.curve.getTangentAt(t).normalize();

      segment.plane.position.copy(pos);

      const up = new THREE.Vector3(0, 1, 0);
      const quaternion = new THREE.Quaternion().setFromUnitVectors(up, tangent.clone().normalize());
      segment.plane.quaternion.copy(quaternion);
      segment.plane.rotateX(Math.PI / 2);
    }

    function rebuildAllArcs() {
      players.forEach((player) => {
        player.segmentObjects.forEach((segment) => {
          segment.curve = createArcCurve(segment.start, segment.end, arcAltitude);

          segment.tube.geometry.dispose();
          segment.tube.geometry = new THREE.TubeGeometry(segment.curve, 64, 0.03, 8, false);

          updatePlaneOnCurve(segment);
        });
      });
    }

    function updateVisibility() {
      players.forEach((player, i) => {
        player.routeGroup.visible = player.visible;
        player.markerGroup.visible = player.visible;
        player.planeGroup.visible = player.visible;
        player.labelGroup.visible = player.visible && showLabels;

        document.getElementById(`playerBtn${i}`).classList.toggle("off", !player.visible);
      });
    }

    function updateStats() {
      const activePlayers = players.filter(p => p.visible).length;
      const totalRoutes = players.reduce((sum, p) => sum + (p.visible ? p.segmentObjects.length : 0), 0);

      document.getElementById("activePlayersStat").textContent = `Active Players: ${activePlayers}`;
      document.getElementById("totalRoutesStat").textContent = `Total Routes: ${totalRoutes}`;
      document.getElementById("avgAltitudeStat").textContent = `Avg Altitude: ${arcAltitude.toFixed(2)}`;
    }

    players.forEach((player, i) => {
      const btn = document.getElementById(`playerBtn${i}`);
      btn.addEventListener("click", () => {
        player.visible = !player.visible;
        updateVisibility();
        updateStats();
      });
    });

    const speedSlider = document.getElementById("speedSlider");
    const speedValue = document.getElementById("speedValue");
    speedSlider.addEventListener("input", () => {
      speedMultiplier = parseFloat(speedSlider.value);
      speedValue.textContent = `${speedMultiplier.toFixed(1)}x`;
    });

    const labelsCheckbox = document.getElementById("labelsCheckbox");
    labelsCheckbox.addEventListener("change", () => {
      showLabels = labelsCheckbox.checked;
      updateVisibility();
    });

    const altitudeSlider = document.getElementById("altitudeSlider");
    const altitudeValue = document.getElementById("altitudeValue");
    altitudeSlider.addEventListener("input", () => {
      arcAltitude = parseFloat(altitudeSlider.value);
      altitudeValue.textContent = arcAltitude.toFixed(2);
      rebuildAllArcs();
      updateStats();
    });

    updateVisibility();
    updateStats();

    const clock = new THREE.Clock();

    window.__3D_STATE__ = {
      globeRadius: 5,
      playerVisibility: [true, true, true, true],
      activePlayers: 4,
      totalVisibleRoutes: 8,
      speedMultiplier: 1.0,
      showLabels: true,
      arcAltitude: 1.3,
      planePositions: [[0, 0], [0, 0], [0, 0], [0, 0]],
      cameraDistance: camera.position.length(),
      frameCount: 0,
      cityMarkerCount: 12,
      visibleMarkerCount: 12,
      routeSegmentCount: 8
    };

    function updateState() {
      const playerVisibility = players.map(p => p.visible);
      const activePlayers = players.filter(p => p.visible).length;
      const totalVisibleRoutes = players.reduce((sum, p) => sum + (p.visible ? p.segmentObjects.length : 0), 0);
      const planePositions = players.map(p => p.segmentObjects.map(s => s.progress));
      const visibleMarkerCount = players.reduce((sum, p) => sum + (p.visible ? p.cityObjects.length : 0), 0);

      window.__3D_STATE__.globeRadius = globeRadius;
      window.__3D_STATE__.playerVisibility = playerVisibility;
      window.__3D_STATE__.activePlayers = activePlayers;
      window.__3D_STATE__.totalVisibleRoutes = totalVisibleRoutes;
      window.__3D_STATE__.speedMultiplier = speedMultiplier;
      window.__3D_STATE__.showLabels = showLabels;
      window.__3D_STATE__.arcAltitude = arcAltitude;
      window.__3D_STATE__.planePositions = planePositions;
      window.__3D_STATE__.cameraDistance = camera.position.length();
      window.__3D_STATE__.frameCount = frameCount;
      window.__3D_STATE__.cityMarkerCount = 12;
      window.__3D_STATE__.visibleMarkerCount = visibleMarkerCount;
      window.__3D_STATE__.routeSegmentCount = 8;
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      frameCount++;

      const speedPerSecond = (1 / 4) * speedMultiplier;

      players.forEach((player) => {
        player.segmentObjects.forEach((segment) => {
          segment.progress = (segment.progress + delta * speedPerSecond) % 1;
          if (player.visible) {
            updatePlaneOnCurve(segment);
          }
        });
      });

      controls.update();
      updateStats();
      updateState();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
