<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Multiplayer Flight Routes</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .panel {
            position: absolute;
            background: rgba(10, 22, 40, 0.85);
            border: 1px solid #00ffff;
            border-radius: 8px;
            padding: 15px;
            color: #ffffff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }
        #hud {
            top: 20px;
            left: 20px;
            width: 250px;
        }
        #stats {
            top: 20px;
            right: 20px;
            width: 200px;
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            padding-bottom: 5px;
        }
        .player-btn {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
            transition: opacity 0.2s;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }
        .player-btn:hover { opacity: 0.8; }
        .player-btn.disabled { opacity: 0.3; text-shadow: none; color: #fff; }
        
        .control-group {
            margin-top: 15px;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
            color: #aaa;
        }
        input[type=range] {
            width: 100%;
            accent-color: #00ffff;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-top: 15px;
            font-size: 14px;
            cursor: pointer;
        }
        .checkbox-group input {
            margin-right: 10px;
            cursor: pointer;
            accent-color: #00ffff;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .stat-value {
            font-weight: bold;
            color: #00ffff;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud" class="panel">
        <h2>Flight Routes</h2>
        <div id="player-buttons"></div>
        
        <div class="control-group">
            <label><span>Speed</span> <span id="speed-val">1.0x</span></label>
            <input type="range" id="speed-slider" min="0.5" max="3.0" step="0.1" value="1.0">
        </div>
        
        <div class="control-group">
            <label><span>Altitude</span> <span id="alt-val">1.30</span></label>
            <input type="range" id="alt-slider" min="1.1" max="2.0" step="0.05" value="1.3">
        </div>

        <label class="checkbox-group">
            <input type="checkbox" id="labels-toggle" checked>
            Show Labels
        </label>
    </div>

    <div id="stats" class="panel">
        <h2>Statistics</h2>
        <div class="stat-row">
            <span>Active Players:</span>
            <span id="stat-players" class="stat-value">4</span>
        </div>
        <div class="stat-row">
            <span>Total Routes:</span>
            <span id="stat-routes" class="stat-value">8</span>
        </div>
        <div class="stat-row">
            <span>Avg Altitude:</span>
            <span id="stat-alt" class="stat-value">1.30</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            globeRadius: 5,
            playerVisibility: [true, true, true, true],
            activePlayers: 4,
            totalVisibleRoutes: 8,
            speedMultiplier: 1.0,
            showLabels: true,
            arcAltitude: 1.3,
            planePositions: [[0,0], [0,0], [0,0], [0,0]],
            cameraDistance: 15,
            frameCount: 0,
            cityMarkerCount: 12,
            visibleMarkerCount: 12,
            routeSegmentCount: 8
        };

        // --- Data ---
        const players = [
            {
                id: 0, name: 'Player 1', color: '#ff3333',
                routes: [
                    { name: 'New York', lat: 40.7, lon: -74.0 },
                    { name: 'London', lat: 51.5, lon: -0.1 },
                    { name: 'Dubai', lat: 25.3, lon: 55.3 }
                ]
            },
            {
                id: 1, name: 'Player 2', color: '#33ff33',
                routes: [
                    { name: 'Tokyo', lat: 35.7, lon: 139.7 },
                    { name: 'Sydney', lat: -33.9, lon: 151.2 },
                    { name: 'Auckland', lat: -36.8, lon: 174.8 }
                ]
            },
            {
                id: 2, name: 'Player 3', color: '#3333ff',
                routes: [
                    { name: 'São Paulo', lat: -23.6, lon: -46.6 },
                    { name: 'Cape Town', lat: -33.9, lon: 18.4 },
                    { name: 'Mumbai', lat: 19.1, lon: 72.9 }
                ]
            },
            {
                id: 3, name: 'Player 4', color: '#ffff33',
                routes: [
                    { name: 'Los Angeles', lat: 34.1, lon: -118.2 },
                    { name: 'Honolulu', lat: 21.3, lon: -157.8 },
                    { name: 'Tokyo', lat: 35.7, lon: 139.7 }
                ]
            }
        ];

        const sceneData = players.map(() => ({
            group: new THREE.Group(),
            segments: [],
            markers: [],
            labels: []
        }));

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#000000');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 6;
        controls.maxDistance = 30;

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.3));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 10, 10);
        scene.add(dirLight);

        // --- Globe Creation ---
        function createGridTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#0a1628';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.5;

            // Latitudes (every 30 deg -> 6 segments -> 5 lines)
            for (let i = 1; i < 6; i++) {
                const y = i * (canvas.height / 6);
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Longitudes (every 30 deg -> 12 segments -> 12 lines)
            for (let i = 0; i < 12; i++) {
                const x = i * (canvas.width / 12);
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        const globeGeo = new THREE.SphereGeometry(window.__3D_STATE__.globeRadius, 64, 64);
        const globeMat = new THREE.MeshPhongMaterial({
            color: 0xffffff,
            map: createGridTexture(),
            shininess: 10
        });
        const globe = new THREE.Mesh(globeGeo, globeMat);
        scene.add(globe);

        // --- Helpers ---
        function getPos(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            return new THREE.Vector3(
                -(radius * Math.sin(phi) * Math.cos(theta)),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

        function createLabelSprite(text, color) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.font = 'bold 24px sans-serif';
            const metrics = ctx.measureText(text);
            canvas.width = metrics.width + 20;
            canvas.height = 40;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.roundRect(0, 0, canvas.width, canvas.height, 8);
            ctx.fill();
            
            ctx.fillStyle = color;
            ctx.font = 'bold 24px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            const spriteMat = new THREE.SpriteMaterial({ map: texture, depthTest: false });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(canvas.width / 40, canvas.height / 40, 1);
            return sprite;
        }

        // --- Build Routes ---
        function buildPlayerObjects() {
            const rSurface = window.__3D_STATE__.globeRadius + 0.02;
            const rLabel = window.__3D_STATE__.globeRadius + 0.2;

            players.forEach((player, pIdx) => {
                const pData = sceneData[pIdx];
                scene.add(pData.group);

                const markerMat = new THREE.MeshBasicMaterial({ color: player.color });
                const markerGeo = new THREE.SphereGeometry(0.08, 16, 16);
                const tubeMat = new THREE.MeshBasicMaterial({ color: player.color, transparent: true, opacity: 0.6 });
                
                const planeGeo = new THREE.ConeGeometry(0.06, 0.15, 8);
                planeGeo.rotateX(Math.PI / 2); // Point tip along local Z
                const planeMat = new THREE.MeshBasicMaterial({ color: player.color });

                // Create Markers & Labels
                player.routes.forEach(city => {
                    const pos = getPos(city.lat, city.lon, rSurface);
                    const marker = new THREE.Mesh(markerGeo, markerMat);
                    marker.position.copy(pos);
                    pData.group.add(marker);
                    pData.markers.push(marker);

                    const label = createLabelSprite(city.name, player.color);
                    label.position.copy(getPos(city.lat, city.lon, rLabel));
                    pData.group.add(label);
                    pData.labels.push(label);
                });

                // Create Routes & Planes
                for (let i = 0; i < player.routes.length - 1; i++) {
                    const startPos = getPos(player.routes[i].lat, player.routes[i].lon, rSurface);
                    const endPos = getPos(player.routes[i+1].lat, player.routes[i+1].lon, rSurface);
                    
                    const midPos = startPos.clone().lerp(endPos, 0.5);
                    midPos.normalize().multiplyScalar(window.__3D_STATE__.globeRadius * window.__3D_STATE__.arcAltitude);
                    
                    const curve = new THREE.QuadraticBezierCurve3(startPos, midPos, endPos);
                    const tubeGeo = new THREE.TubeGeometry(curve, 64, 0.03, 8, false);
                    const tube = new THREE.Mesh(tubeGeo, tubeMat);
                    pData.group.add(tube);

                    const plane = new THREE.Mesh(planeGeo, planeMat);
                    pData.group.add(plane);

                    pData.segments.push({
                        start: startPos,
                        end: endPos,
                        curve: curve,
                        tube: tube,
                        plane: plane,
                        t: 0
                    });
                }
            });
        }

        buildPlayerObjects();

        // --- UI & Interactions ---
        const btnContainer = document.getElementById('player-buttons');
        players.forEach((p, i) => {
            const btn = document.createElement('button');
            btn.className = 'player-btn';
            btn.style.backgroundColor = p.color;
            btn.innerText = p.name;
            btn.onclick = () => {
                window.__3D_STATE__.playerVisibility[i] = !window.__3D_STATE__.playerVisibility[i];
                sceneData[i].group.visible = window.__3D_STATE__.playerVisibility[i];
                btn.classList.toggle('disabled', !window.__3D_STATE__.playerVisibility[i]);
                updateLabelsVisibility();
            };
            btnContainer.appendChild(btn);
        });

        document.getElementById('speed-slider').addEventListener('input', (e) => {
            window.__3D_STATE__.speedMultiplier = parseFloat(e.target.value);
            document.getElementById('speed-val').innerText = window.__3D_STATE__.speedMultiplier.toFixed(1) + 'x';
        });

        document.getElementById('labels-toggle').addEventListener('change', (e) => {
            window.__3D_STATE__.showLabels = e.target.checked;
            updateLabelsVisibility();
        });

        document.getElementById('alt-slider').addEventListener('input', (e) => {
            const alt = parseFloat(e.target.value);
            window.__3D_STATE__.arcAltitude = alt;
            document.getElementById('alt-val').innerText = alt.toFixed(2);
            
            sceneData.forEach(pData => {
                pData.segments.forEach(seg => {
                    const midPos = seg.start.clone().lerp(seg.end, 0.5);
                    midPos.normalize().multiplyScalar(window.__3D_STATE__.globeRadius * alt);
                    seg.curve.v1.copy(midPos);
                    seg.curve.updateArcLengths();
                    
                    seg.tube.geometry.dispose();
                    seg.tube.geometry = new THREE.TubeGeometry(seg.curve, 64, 0.03, 8, false);
                });
            });
        });

        function updateLabelsVisibility() {
            const showAll = window.__3D_STATE__.showLabels;
            sceneData.forEach((pData, i) => {
                const pVis = window.__3D_STATE__.playerVisibility[i];
                pData.labels.forEach(label => {
                    label.visible = showAll && pVis;
                });
            });
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const state = window.__3D_STATE__;
            state.frameCount++;
            state.cameraDistance = camera.position.distanceTo(scene.position);

            let activeCount = 0;
            let routeCount = 0;
            let visibleMarkers = 0;

            for (let i = 0; i < players.length; i++) {
                if (state.playerVisibility[i]) {
                    activeCount++;
                    routeCount += sceneData[i].segments.length;
                    visibleMarkers += sceneData[i].markers.length;

                    sceneData[i].segments.forEach((seg, j) => {
                        // 4 seconds per segment
                        seg.t += (delta / 4.0) * state.speedMultiplier;
                        if (seg.t > 1.0) seg.t -= 1.0;
                        
                        state.planePositions[i][j] = seg.t;

                        const pt = seg.curve.getPointAt(seg.t);
                        const tangent = seg.curve.getTangentAt(seg.t).normalize();
                        
                        seg.plane.position.copy(pt);
                        seg.plane.lookAt(pt.clone().add(tangent));
                    });
                }
            }

            state.activePlayers = activeCount;
            state.totalVisibleRoutes = routeCount;
            state.visibleMarkerCount = visibleMarkers;

            // Update Stats UI
            document.getElementById('stat-players').innerText = state.activePlayers;
            document.getElementById('stat-routes').innerText = state.totalVisibleRoutes;
            document.getElementById('stat-alt').innerText = state.arcAltitude.toFixed(2);

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
