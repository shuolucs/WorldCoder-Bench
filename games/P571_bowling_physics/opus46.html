<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Bowling Simulator</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#hud {
  position: absolute; top: 10px; left: 10px;
  background: rgba(0,0,0,0.75); color: #fff; padding: 15px 20px;
  border-radius: 10px; font-size: 14px; min-width: 220px;
  border: 1px solid rgba(100,100,255,0.3);
  backdrop-filter: blur(5px);
}
#hud h2 { margin-bottom: 8px; color: #88aaff; font-size: 16px; }
#hud div { margin: 3px 0; }
#hud span { color: #ffcc44; font-weight: bold; }

#controls {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.8); color: #fff; padding: 15px 25px;
  border-radius: 10px; display: flex; gap: 25px; align-items: center;
  border: 1px solid rgba(100,100,255,0.3);
  backdrop-filter: blur(5px);
}
#controls label { font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
#controls input[type="range"] { width: 120px; accent-color: #88aaff; }
#controls .val { color: #ffcc44; font-size: 12px; }

#instructions {
  position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.6); color: #aaa; padding: 8px 16px;
  border-radius: 6px; font-size: 12px; text-align: center;
}
#instructions kbd { background: #333; padding: 2px 6px; border-radius: 3px; color: #fff; }

#strike-banner {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 72px; font-weight: bold; color: #ffdd00;
  text-shadow: 0 0 30px #ff8800, 0 0 60px #ff4400;
  display: none; pointer-events: none; animation: strikeAnim 2s ease-out forwards;
}
@keyframes strikeAnim {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
  20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
  40% { transform: translate(-50%, -50%) scale(1.0); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
}
</style>
</head>
<body>

<div id="hud">
  <h2>🎳 Bowling Score</h2>
  <div>Phase: <span id="hud-phase">AIM</span></div>
  <div>Score: <span id="hud-score">0</span></div>
  <div>Standing: <span id="hud-standing">10</span></div>
  <div>Ball Speed: <span id="hud-ball-speed">0.0</span> m/s</div>
  <div>Ball Z: <span id="hud-ball-pos">7.0</span></div>
  <div>Spin: <span id="hud-spin">0.0</span></div>
</div>

<div id="controls">
  <label>Aim Position
    <input type="range" id="slider-aim" min="-0.8" max="0.8" step="0.05" value="0">
    <span class="val" id="aim-val">0.00</span>
  </label>
  <label>Power
    <input type="range" id="slider-power" min="5" max="15" step="0.5" value="10">
    <span class="val" id="power-val">10.0</span>
  </label>
  <label>Spin
    <input type="range" id="slider-spin" min="-5" max="5" step="0.5" value="0">
    <span class="val" id="spin-val">0.0</span>
  </label>
</div>

<div id="instructions">
  <kbd>Space</kbd> Launch &nbsp; <kbd>R</kbd> Reset Frame &nbsp; <kbd>N</kbd> New Game &nbsp; <kbd>C</kbd> Toggle Camera
</div>

<div id="strike-banner">STRIKE! 🎳</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);
scene.fog = new THREE.Fog(0x1a1a1a, 20, 35);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 12);
camera.lookAt(0, 1, -8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 1, -2);
controls.update();

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);

const spotLight = new THREE.SpotLight(0xfff5e0, 80, 30, Math.PI / 5, 0.4, 1.5);
spotLight.position.set(0, 10, -2);
spotLight.target.position.set(0, 0, -10);
spotLight.castShadow = true;
spotLight.shadow.mapSize.set(2048, 2048);
spotLight.shadow.camera.near = 1;
spotLight.shadow.camera.far = 25;
scene.add(spotLight);
scene.add(spotLight.target);

const spotLight2 = new THREE.SpotLight(0xfff0d0, 30, 25, Math.PI / 6, 0.5, 1.5);
spotLight2.position.set(0, 8, 6);
spotLight2.target.position.set(0, 0, 2);
spotLight2.castShadow = true;
spotLight2.shadow.mapSize.set(1024, 1024);
scene.add(spotLight2);
scene.add(spotLight2.target);

// Accent lights along gutters
const accentColors = [0x4444ff, 0x8844ff, 0x4466ff, 0x6644ff];
for (let i = 0; i < 4; i++) {
  const z = 4 - i * 5;
  const leftLight = new THREE.PointLight(accentColors[i], 3, 6, 2);
  leftLight.position.set(-1.5, 0.3, z);
  scene.add(leftLight);
  const rightLight = new THREE.PointLight(accentColors[i], 3, 6, 2);
  rightLight.position.set(1.5, 0.3, z);
  scene.add(rightLight);
}

// ============ TEXTURES ============
function createWoodTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 2048;
  const ctx = canvas.getContext('2d');
  
  // Base wood color
  ctx.fillStyle = '#c8944a';
  ctx.fillRect(0, 0, 512, 2048);
  
  // Wood grain lines
  for (let i = 0; i < 200; i++) {
    const y = Math.random() * 2048;
    const alpha = 0.05 + Math.random() * 0.15;
    ctx.strokeStyle = `rgba(80, 50, 20, ${alpha})`;
    ctx.lineWidth = 1 + Math.random() * 2;
    ctx.beginPath();
    ctx.moveTo(0, y);
    for (let x = 0; x < 512; x += 20) {
      ctx.lineTo(x, y + Math.sin(x * 0.02) * 3);
    }
    ctx.stroke();
  }
  
  // Board lines (vertical strips)
  for (let x = 0; x < 512; x += 32) {
    ctx.strokeStyle = 'rgba(60, 35, 15, 0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, 2048);
    ctx.stroke();
  }
  
  // Arrows pattern around z=2 area (mapped to texture)
  const arrowY = 1400;
  ctx.fillStyle = 'rgba(80, 50, 20, 0.3)';
  for (let a = -2; a <= 2; a++) {
    const ax = 256 + a * 50;
    ctx.beginPath();
    ctx.moveTo(ax, arrowY);
    ctx.lineTo(ax - 10, arrowY + 40);
    ctx.lineTo(ax + 10, arrowY + 40);
    ctx.closePath();
    ctx.fill();
  }
  
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1, 1);
  return tex;
}

// ============ LANE CONSTRUCTION ============
const woodTex = createWoodTexture();
const laneMaterial = new THREE.MeshStandardMaterial({
  map: woodTex, roughness: 0.3, metalness: 0.05
});

// Main lane: z=8 to z=-12, width=2, centered at z=-2
const laneGeo = new THREE.BoxGeometry(2.0, 0.1, 20);
const laneMesh = new THREE.Mesh(laneGeo, laneMaterial);
laneMesh.position.set(0, -0.05, -2);
laneMesh.receiveShadow = true;
scene.add(laneMesh);

// Approach area overlay (slightly different shade) z=5 to z=8
const approachTex = createWoodTexture();
const approachMat = new THREE.MeshStandardMaterial({
  map: approachTex, roughness: 0.4, metalness: 0.02, color: 0xddaa66
});
const approachGeo = new THREE.BoxGeometry(2.0, 0.102, 3);
const approachMesh = new THREE.Mesh(approachGeo, approachMat);
approachMesh.position.set(0, -0.049, 6.5);
approachMesh.receiveShadow = true;
scene.add(approachMesh);

// Pin deck area z=-10 to z=-12 (slightly raised)
const pinDeckMat = new THREE.MeshStandardMaterial({
  color: 0xd4a050, roughness: 0.25, metalness: 0.05
});
const pinDeckGeo = new THREE.BoxGeometry(2.0, 0.12, 2);
const pinDeckMesh = new THREE.Mesh(pinDeckGeo, pinDeckMat);
pinDeckMesh.position.set(0, -0.04, -11);
pinDeckMesh.receiveShadow = true;
scene.add(pinDeckMesh);

// Foul line at z=5
const foulLineGeo = new THREE.BoxGeometry(2.0, 0.005, 0.03);
const foulLineMat = new THREE.MeshStandardMaterial({ color: 0xff2222, emissive: 0x440000 });
const foulLineMesh = new THREE.Mesh(foulLineGeo, foulLineMat);
foulLineMesh.position.set(0, 0.01, 5);
scene.add(foulLineMesh);

// Gutters
const gutterMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
const gutterGeo = new THREE.BoxGeometry(0.3, 0.15, 20);

const leftGutter = new THREE.Mesh(gutterGeo, gutterMat);
leftGutter.position.set(-1.15, -0.125, -2);
leftGutter.receiveShadow = true;
scene.add(leftGutter);

const rightGutter = new THREE.Mesh(gutterGeo, gutterMat);
rightGutter.position.set(1.15, -0.125, -2);
rightGutter.receiveShadow = true;
scene.add(rightGutter);

// Gutter rails (edges)
const railMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.5, roughness: 0.3 });
const railGeo = new THREE.BoxGeometry(0.02, 0.08, 20);
[-1.0, 1.0, -1.3, 1.3].forEach(x => {
  const rail = new THREE.Mesh(railGeo, railMat);
  rail.position.set(x, 0.0, -2);
  scene.add(rail);
});

// Back wall
const wallMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
const wallGeo = new THREE.BoxGeometry(3, 1.5, 0.2);
const backWall = new THREE.Mesh(wallGeo, wallMat);
backWall.position.set(0, 0.65, -13);
backWall.receiveShadow = true;
scene.add(backWall);

// Side walls near pins
const sideWallGeo = new THREE.BoxGeometry(0.1, 0.8, 3);
const leftWall = new THREE.Mesh(sideWallGeo, wallMat);
leftWall.position.set(-1.5, 0.3, -11.5);
scene.add(leftWall);
const rightWall = new THREE.Mesh(sideWallGeo, wallMat);
rightWall.position.set(1.5, 0.3, -11.5);
scene.add(rightWall);

// Floor under lane
const floorGeo = new THREE.PlaneGeometry(30, 40);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x111115, roughness: 0.9 });
const floorMesh = new THREE.Mesh(floorGeo, floorMat);
floorMesh.rotation.x = -Math.PI / 2;
floorMesh.position.y = -0.2;
floorMesh.receiveShadow = true;
scene.add(floorMesh);

// ============ BOWLING BALL ============
const BALL_RADIUS = 0.11;
const BALL_MASS = 6.0;

function createBallMaterial() {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  
  // Dark swirl base
  const grad = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
  grad.addColorStop(0, '#1a0a2e');
  grad.addColorStop(0.5, '#16213e');
  grad.addColorStop(1, '#0f0f23');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 256, 256);
  
  // Swirl pattern
  for (let i = 0; i < 8; i++) {
    ctx.strokeStyle = `rgba(40, 20, 80, 0.4)`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let t = 0; t < Math.PI * 4; t += 0.1) {
      const r = 20 + t * 10 + i * 8;
      const x = 128 + Math.cos(t + i) * r * 0.3;
      const y = 128 + Math.sin(t + i) * r * 0.3;
      if (t === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  
  // Finger holes
  ctx.fillStyle = '#050510';
  ctx.beginPath(); ctx.arc(115, 90, 10, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(140, 90, 10, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(128, 115, 8, 0, Math.PI * 2); ctx.fill();
  
  const tex = new THREE.CanvasTexture(canvas);
  return new THREE.MeshStandardMaterial({
    map: tex, roughness: 0.15, metalness: 0.1, clearcoat: 0.8
  });
}

const ballGeo = new THREE.SphereGeometry(BALL_RADIUS, 32, 32);
const ballMat = createBallMaterial();
const ballMesh = new THREE.Mesh(ballGeo, ballMat);
ballMesh.castShadow = true;
scene.add(ballMesh);

// Ball physics state
const ball = {
  pos: new THREE.Vector3(0, BALL_RADIUS, 7),
  vel: new THREE.Vector3(0, 0, 0),
  spin: 0, // vertical axis spin
  inGutter: false,
  active: false
};

function resetBall() {
  const aimX = parseFloat(document.getElementById('slider-aim').value);
  ball.pos.set(aimX, BALL_RADIUS, 7);
  ball.vel.set(0, 0, 0);
  ball.spin = 0;
  ball.inGutter = false;
  ball.active = false;
  ballMesh.position.copy(ball.pos);
  ballMesh.rotation.set(0, 0, 0);
}

// ============ BOWLING PINS ============
const PIN_MASS = 1.5;
const PIN_RADIUS = 0.06;
const PIN_HEIGHT = 0.38;
const PIN_RESTITUTION = 0.4;
const BALL_PIN_RESTITUTION = 0.3;

const pinPositions = [
  [0, 0, -10],
  [-0.3, 0, -10.52], [0.3, 0, -10.52],
  [-0.6, 0, -11.04], [0, 0, -11.04], [0.6, 0, -11.04],
  [-0.9, 0, -11.56], [-0.3, 0, -11.56], [0.3, 0, -11.56], [0.9, 0, -11.56]
];

function createPinGeometry() {
  // More detailed pin shape using lathe
  const points = [];
  // Bottom
  points.push(new THREE.Vector2(0.06, 0));
  points.push(new THREE.Vector2(0.065, 0.02));
  // Belly
  points.push(new THREE.Vector2(0.068, 0.06));
  points.push(new THREE.Vector2(0.065, 0.12));
  points.push(new THREE.Vector2(0.055, 0.18));
  // Neck
  points.push(new THREE.Vector2(0.032, 0.24));
  points.push(new THREE.Vector2(0.025, 0.28));
  // Head
  points.push(new THREE.Vector2(0.03, 0.31));
  points.push(new THREE.Vector2(0.035, 0.33));
  points.push(new THREE.Vector2(0.033, 0.36));
  points.push(new THREE.Vector2(0.02, 0.38));
  points.push(new THREE.Vector2(0, 0.385));
  
  return new THREE.LatheGeometry(points, 16);
}

function createPinMaterial() {
  const canvas = document.createElement('canvas');
  canvas.width = 128; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  
  // White base
  ctx.fillStyle = '#f5f0e8';
  ctx.fillRect(0, 0, 128, 256);
  
  // Red stripe bands (neck area)
  ctx.fillStyle = '#cc2222';
  ctx.fillRect(0, 60, 128, 15);
  ctx.fillStyle = '#dd3333';
  ctx.fillRect(0, 80, 128, 10);
  
  const tex = new THREE.CanvasTexture(canvas);
  return new THREE.MeshStandardMaterial({
    map: tex, roughness: 0.4, metalness: 0.02
  });
}

const pinGeo = createPinGeometry();
const pinMat = createPinMaterial();

const pins = [];

function createPin(index) {
  const mesh = new THREE.Mesh(pinGeo, pinMat.clone());
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  
  const startPos = pinPositions[index];
  const pin = {
    mesh: mesh,
    index: index,
    pos: new THREE.Vector3(startPos[0], PIN_HEIGHT / 2, startPos[2]),
    vel: new THREE.Vector3(0, 0, 0),
    angVel: new THREE.Vector3(0, 0, 0),
    quaternion: new THREE.Quaternion(),
    standing: true,
    settled: false,
    startPos: new THREE.Vector3(startPos[0], PIN_HEIGHT / 2, startPos[2])
  };
  
  mesh.position.copy(pin.pos);
  return pin;
}

function initPins() {
  pins.forEach(p => scene.remove(p.mesh));
  pins.length = 0;
  for (let i = 0; i < 10; i++) {
    pins.push(createPin(i));
  }
}

function resetPins() {
  pins.forEach((pin, i) => {
    const sp = pinPositions[i];
    pin.pos.set(sp[0], PIN_HEIGHT / 2, sp[2]);
    pin.vel.set(0, 0, 0);
    pin.angVel.set(0, 0, 0);
    pin.quaternion.identity();
    pin.standing = true;
    pin.settled = false;
    pin.mesh.position.copy(pin.pos);
    pin.mesh.quaternion.copy(pin.quaternion);
  });
}

initPins();

// ============ GAME STATE ============
let gameState = {
  phase: 'aim', // 'aim', 'rolling', 'scoring'
  score: 0,
  pinsKnockedThisThrow: 0,
  isStrike: false,
  frameCount: 0,
  simTime: 0,
  firstContactTime: -1,
  cameraMode: 0, // 0=default, 1=overhead, 2=side
  isPaused: false
};

window.__3D_STATE__ = {
  frameCount: 0,
  score: 0,
  pinsStanding: 10,
  pinsKnocked: 0,
  ballPos: { x: 0, y: BALL_RADIUS, z: 7 },
  ballSpeed: 0,
  ballSpin: 0,
  aimX: 0,
  launchPower: 10,
  phase: 'aim',
  isStrike: false,
  pinStates: new Array(10).fill(true),
  isPaused: false,
  simTime: 0
};

// ============ AIMING GUIDE ============
const guideLineMat = new THREE.LineBasicMaterial({ color: 0x44ff44, transparent: true, opacity: 0.4 });
const guideLineGeo = new THREE.BufferGeometry();
const guidePoints = [new THREE.Vector3(0, 0.02, 7), new THREE.Vector3(0, 0.02, -12)];
guideLineGeo.setFromPoints(guidePoints);
const guideLine = new THREE.Line(guideLineGeo, guideLineMat);
scene.add(guideLine);

function updateGuideLine() {
  const aimX = parseFloat(document.getElementById('slider-aim').value);
  const spin = parseFloat(document.getElementById('slider-spin').value);
  const power = parseFloat(document.getElementById('slider-power').value);
  
  const pts = [];
  let x = aimX;
  let vz = -power;
  let vx = 0;
  const dt = 0.05;
  const spinCoeff = 0.3;
  const friction = 0.5;
  
  for (let z = 7; z > -12; z -= 0.3) {
    pts.push(new THREE.Vector3(x, 0.02, z));
    const speed = Math.sqrt(vx * vx + vz * vz);
    if (speed > 0) {
      const hookForce = spinCoeff * spin * Math.abs(vz) / BALL_MASS;
      vx += hookForce * dt;
      const decel = friction * dt;
      const factor = Math.max(0, (speed - decel)) / speed;
      vx *= factor;
      vz *= factor;
    }
    x += vx * dt * 6;
  }
  
  guideLineGeo.setFromPoints(pts);
  guideLineGeo.computeBoundingSphere();
}

// ============ PHYSICS ============
const GRAVITY = 9.81;
const LANE_FRICTION = 0.5;
const SPIN_COEFF = 0.3;

function updateBallPhysics(dt) {
  if (!ball.active) return;
  
  const speed = ball.vel.length();
  
  // Hook force from spin
  if (!ball.inGutter && speed > 0.5) {
    const hookForce = SPIN_COEFF * ball.spin * Math.abs(ball.vel.z) / BALL_MASS;
    ball.vel.x += hookForce * dt;
  }
  
  // Friction deceleration
  if (speed > 0) {
    const decel = LANE_FRICTION * dt;
    const newSpeed = Math.max(0, speed - decel);
    ball.vel.multiplyScalar(newSpeed / speed);
  }
  
  // Update position
  ball.pos.add(ball.vel.clone().multiplyScalar(dt));
  
  // Gutter check
  if (!ball.inGutter && Math.abs(ball.pos.x) > 1.0) {
    ball.inGutter = true;
    ball.pos.y = BALL_RADIUS - 0.05; // Drop into gutter
    ball.vel.x *= 0.3;
  }
  
  // Keep ball on surface
  if (!ball.inGutter) {
    ball.pos.y = BALL_RADIUS;
  } else {
    ball.pos.y = Math.max(BALL_RADIUS - 0.08, ball.pos.y);
  }
  
  // Clamp x in gutter
  if (ball.inGutter) {
    if (ball.pos.x > 1.0) ball.pos.x = Math.min(ball.pos.x, 1.25);
    if (ball.pos.x < -1.0) ball.pos.x = Math.max(ball.pos.x, -1.25);
  }
  
  // Ball rotation visual
  if (speed > 0.1) {
    const rollAxis = new THREE.Vector3(-ball.vel.z, 0, ball.vel.x).normalize();
    const rollAngle = speed * dt / BALL_RADIUS;
    const q = new THREE.Quaternion().setFromAxisAngle(rollAxis, rollAngle);
    ballMesh.quaternion.premultiply(q);
  }
  
  ballMesh.position.copy(ball.pos);
}

function isPinStanding(pin) {
  // Check tilt angle
  const up = new THREE.Vector3(0, 1, 0);
  const pinUp = new THREE.Vector3(0, 1, 0).applyQuaternion(pin.quaternion);
  const angle = Math.acos(Math.min(1, Math.max(-1, up.dot(pinUp))));
  
  return pin.pos.y > 0.05 && angle < Math.PI / 4; // 45 degrees
}

function updatePinPhysics(pin, dt) {
  if (pin.settled && pin.standing) return;
  
  // Gravity
  pin.vel.y -= GRAVITY * dt;
  
  // Update position
  pin.pos.add(pin.vel.clone().multiplyScalar(dt));
  
  // Apply angular velocity to quaternion
  if (pin.angVel.length() > 0.01) {
    const angSpeed = pin.angVel.length();
    const axis = pin.angVel.clone().normalize();
    const dq = new THREE.Quaternion().setFromAxisAngle(axis, angSpeed * dt);
    pin.quaternion.premultiply(dq);
    pin.quaternion.normalize();
  }
  
  // Floor collision
  const pinUp = new THREE.Vector3(0, 1, 0).applyQuaternion(pin.quaternion);
  const tiltAngle = Math.acos(Math.min(1, Math.max(-1, new THREE.Vector3(0, 1, 0).dot(pinUp))));
  
  if (tiltAngle < Math.PI / 6) {
    // Mostly upright
    if (pin.pos.y < PIN_HEIGHT / 2) {
      pin.pos.y = PIN_HEIGHT / 2;
      pin.vel.y = Math.max(0, pin.vel.y * -0.2);
    }
  } else {
    // Tilted - use lower collision point
    const halfLen = PIN_HEIGHT / 2;
    const lowestY = pin.pos.y - halfLen * Math.abs(pinUp.y) - PIN_RADIUS;
    if (lowestY < 0) {
      pin.pos.y -= lowestY;
      pin.vel.y = Math.max(0, pin.vel.y * -0.15);
      // Friction on floor
      pin.vel.x *= 0.95;
      pin.vel.z *= 0.95;
      pin.angVel.multiplyScalar(0.95);
    }
  }
  
  // Gravity torque for toppling
  if (tiltAngle > Math.PI / 12) { // > 15 degrees
    const gravityTorqueAxis = new THREE.Vector3().crossVectors(pinUp, new THREE.Vector3(0, 1, 0));
    if (gravityTorqueAxis.length() > 0.001) {
      gravityTorqueAxis.normalize();
      const torqueMag = GRAVITY * PIN_MASS * Math.sin(tiltAngle) * 0.1;
      pin.angVel.add(gravityTorqueAxis.multiplyScalar(-torqueMag * dt));
    }
  }
  
  // Damping
  pin.vel.multiplyScalar(0.998);
  pin.angVel.multiplyScalar(0.995);
  
  // Wall collisions
  if (pin.pos.z < -12.9) {
    pin.pos.z = -12.9;
    pin.vel.z *= -0.3;
  }
  if (pin.pos.x < -1.4) { pin.pos.x = -1.4; pin.vel.x *= -0.3; }
  if (pin.pos.x > 1.4) { pin.pos.x = 1.4; pin.vel.x *= -0.3; }
  
  // Check if settled
  const totalVel = pin.vel.length() + pin.angVel.length();
  if (totalVel < 0.05 && pin.pos.y < PIN_HEIGHT / 2 + 0.02) {
    if (!pin.standing || tiltAngle > Math.PI / 3) {
      pin.settled = true;
    }
  }
  
  // Update standing state
  pin.standing = isPinStanding(pin);
  
  // Update mesh
  pin.mesh.position.copy(pin.pos);
  pin.mesh.quaternion.copy(pin.quaternion);
}

function checkBallPinCollision(pin) {
  if (!ball.active) return;
  if (ball.inGutter) return;
  
  // Distance from ball center to pin center (in xz plane primarily)
  const dx = ball.pos.x - pin.pos.x;
  const dy = ball.pos.y - pin.pos.y;
  const dz = ball.pos.z - pin.pos.z;
  const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
  const minDist = BALL_RADIUS + PIN_RADIUS;
  
  if (dist < minDist && dist > 0.001) {
    if (gameState.firstContactTime < 0) {
      gameState.firstContactTime = gameState.simTime;
    }
    
    // Normal from pin to ball
    const nx = dx / dist;
    const ny = dy / dist;
    const nz = dz / dist;
    
    // Relative velocity (ball - pin)
    const rvx = ball.vel.x - pin.vel.x;
    const rvy = ball.vel.y - pin.vel.y;
    const rvz = ball.vel.z - pin.vel.z;
    
    const relVelNormal = rvx * nx + rvy * ny + rvz * nz;
    
    // Only resolve if objects are approaching
    if (relVelNormal > 0) return;
    
    const e = BALL_PIN_RESTITUTION;
    const j = -(1 + e) * relVelNormal / (1 / BALL_MASS + 1 / PIN_MASS);
    
    // Apply impulse to ball
    ball.vel.x += (j / BALL_MASS) * nx;
    ball.vel.y += (j / BALL_MASS) * ny;
    ball.vel.z += (j / BALL_MASS) * nz;
    
    // Apply impulse to pin
    pin.vel.x -= (j / PIN_MASS) * nx;
    pin.vel.y -= (j / PIN_MASS) * ny;
    pin.vel.z -= (j / PIN_MASS) * nz;
    
    // Add upward component to pin for dramatic effect
    pin.vel.y += 1.5;
    
    // Angular impulse on pin (causes toppling)
    const contactOffset = new THREE.Vector3(-nx, -ny, -nz).multiplyScalar(PIN_RADIUS);
    const impulseVec = new THREE.Vector3(-nx, -ny, -nz).multiplyScalar(j / PIN_MASS);
    const torque = new THREE.Vector3().crossVectors(contactOffset, impulseVec);
    pin.angVel.add(torque.multiplyScalar(15));
    
    // Separate objects
    const overlap = minDist - dist;
    const totalMass = BALL_MASS + PIN_MASS;
    ball.pos.x += nx * overlap * (PIN_MASS / totalMass);
    ball.pos.z += nz * overlap * (PIN_MASS / totalMass);
    pin.pos.x -= nx * overlap * (BALL_MASS / totalMass);
    pin.pos.z -= nz * overlap * (BALL_MASS / totalMass);
    
    pin.settled = false;
  }
}

function checkPinPinCollision(pinA, pinB) {
  const dx = pinA.pos.x - pinB.pos.x;
  const dy = pinA.pos.y - pinB.pos.y;
  const dz = pinA.pos.z - pinB.pos.z;
  const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
  const minDist = PIN_RADIUS * 2 + 0.01;
  
  if (dist < minDist && dist > 0.001) {
    const nx = dx / dist;
    const ny = dy / dist;
    const nz = dz / dist;
    
    const rvx = pinA.vel.x - pinB.vel.x;
    const rvy = pinA.vel.y - pinB.vel.y;
    const rvz = pinA.vel.z - pinB.vel.z;
    
    const relVelNormal = rvx * nx + rvy * ny + rvz * nz;
    
    if (relVelNormal > 0) return;
    
    const e = PIN_RESTITUTION;
    const j = -(1 + e) * relVelNormal / (1 / PIN_MASS + 1 / PIN_MASS);
    
    pinA.vel.x += (j / PIN_MASS) * nx;
    pinA.vel.y += (j / PIN_MASS) * ny;
    pinA.vel.z += (j / PIN_MASS) * nz;
    
    pinB.vel.x -= (j / PIN_MASS) * nx;
    pinB.vel.y -= (j / PIN_MASS) * ny;
    pinB.vel.z -= (j / PIN_MASS) * nz;
    
    // Angular impulse
    const contactOff = new THREE.Vector3(-nx, -ny, -nz).multiplyScalar(PIN_RADIUS);
    const impVec = new THREE.Vector3(nx, ny, nz).multiplyScalar(j / PIN_MASS);
    const torqueA = new THREE.Vector3().crossVectors(contactOff, impVec);
    pinA.angVel.add(torqueA.multiplyScalar(8));
    
    const torqueB = new THREE.Vector3().crossVectors(contactOff.negate(), impVec.negate());
    pinB.angVel.add(torqueB.multiplyScalar(8));
    
    // Separate
    const overlap = minDist - dist;
    pinA.pos.x += nx * overlap * 0.5;
    pinA.pos.z += nz * overlap * 0.5;
    pinB.pos.x -= nx * overlap * 0.5;
    pinB.pos.z -= nz * overlap * 0.5;
    
    pinA.settled = false;
    pinB.settled = false;
  }
}

// ============ GAME LOGIC ============
function launchBall() {
  if (gameState.phase !== 'aim') return;
  
  const aimX = parseFloat(document.getElementById('slider-aim').value);
  const power = parseFloat(document.getElementById('slider-power').value);
  const spin = parseFloat(document.getElementById('slider-spin').value);
  
  ball.pos.set(aimX, BALL_RADIUS, 7);
  ball.vel.set(0, 0, -power);
  ball.spin = spin;
  ball.inGutter = false;
  ball.active = true;
  
  gameState.phase = 'rolling';
  gameState.firstContactTime = -1;
  
  guideLine.visible = false;
}

function countStandingPins() {
  return pins.filter(p => p.standing).length;
}

function enterScoring() {
  gameState.phase = 'scoring';
  const standing = countStandingPins();
  gameState.pinsKnockedThisThrow = 10 - standing;
  gameState.score += gameState.pinsKnockedThisThrow;
  gameState.isStrike = gameState.pinsKnockedThisThrow === 10;
  
  if (gameState.isStrike) {
    showStrikeBanner();
  }
}

function showStrikeBanner() {
  const banner = document.getElementById('strike-banner');
  banner.style.display = 'block';
  banner.style.animation = 'none';
  banner.offsetHeight; // Trigger reflow
  banner.style.animation = 'strikeAnim 2s ease-out forwards';
  setTimeout(() => { banner.style.display = 'none'; }, 2000);
}

function resetFrame() {
  resetPins();
  resetBall();
  gameState.phase = 'aim';
  gameState.firstContactTime = -1;
  gameState.isStrike = false;
  gameState.pinsKnockedThisThrow = 0;
  guideLine.visible = true;
}

function newGame() {
  gameState.score = 0;
  resetFrame();
}

// ============ INPUT HANDLING ============
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    launchBall();
  } else if (e.code === 'KeyR') {
    resetFrame();
  } else if (e.code === 'KeyN') {
    newGame();
  } else if (e.code === 'KeyC') {
    gameState.cameraMode = (gameState.cameraMode + 1) % 3;
    switch (gameState.cameraMode) {
      case 0: // Default
        camera.position.set(0, 5, 12);
        controls.target.set(0, 1, -2);
        break;
      case 1: // Overhead
        camera.position.set(0, 15, -2);
        controls.target.set(0, 0, -2);
        break;
      case 2: // Side
        camera.position.set(5, 3, -2);
        controls.target.set(0, 1, -5);
        break;
    }
    controls.update();
  }
});

// Slider listeners
document.getElementById('slider-aim').addEventListener('input', (e) => {
  document.getElementById('aim-val').textContent = parseFloat(e.target.value).toFixed(2);
  if (gameState.phase === 'aim') {
    ball.pos.x = parseFloat(e.target.value);
    ballMesh.position.x = ball.pos.x;
    updateGuideLine();
  }
});

document.getElementById('slider-power').addEventListener('input', (e) => {
  document.getElementById('power-val').textContent = parseFloat(e.target.value).toFixed(1);
  if (gameState.phase === 'aim') updateGuideLine();
});

document.getElementById('slider-spin').addEventListener('input', (e) => {
  document.getElementById('spin-val').textContent = parseFloat(e.target.value).toFixed(1);
  if (gameState.phase === 'aim') updateGuideLine();
});

// ============ HUD UPDATE ============
function updateHUD() {
  const standing = countStandingPins();
  const speed = ball.vel.length();
  
  document.getElementById('hud-phase').textContent = gameState.phase.toUpperCase();
  document.getElementById('hud-score').textContent = gameState.score;
  document.getElementById('hud-standing').textContent = standing;
  document.getElementById('hud-ball-speed').textContent = speed.toFixed(1);
  document.getElementById('hud-ball-pos').textContent = ball.pos.z.toFixed(1);
  document.getElementById('hud-spin').textContent = ball.spin.toFixed(1);
}

function updateState() {
  const standing = countStandingPins();
  const speed = ball.vel.length();
  
  window.__3D_STATE__ = {
    frameCount: gameState.frameCount,
    score: gameState.score,
    pinsStanding: standing,
    pinsKnocked: 10 - standing,
    ballPos: { x: ball.pos.x, y: ball.pos.y, z: ball.pos.z },
    ballSpeed: speed,
    ballSpin: ball.spin,
    aimX: parseFloat(document.getElementById('slider-aim').value),
    launchPower: parseFloat(document.getElementById('slider-power').value),
    phase: gameState.phase,
    isStrike: gameState.isStrike,
    pinStates: pins.map(p => p.standing),
    isPaused: gameState.isPaused,
    simTime: gameState.simTime
  };
}

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

resetBall();
updateGuideLine();

function animate() {
  requestAnimationFrame(animate);
  
  const rawDt = clock.getDelta();
  const dt = Math.min(rawDt, 1 / 30); // Cap delta time
  
  gameState.frameCount++;
  gameState.simTime += dt;
  
  if (gameState.phase === 'aim') {
    // Update ball position from aim slider
    const aimX = parseFloat(document.getElementById('slider-aim').value);
    ball.pos.x = aimX;
    ball.pos.y = BALL_RADIUS;
    ball.pos.z = 7;
    ballMesh.position.copy(ball.pos);
    
    // Gentle ball rotation
    ballMesh.rotation.y += dt * 0.5;
  }
  
  if (gameState.phase === 'rolling') {
    // Sub-step physics for stability
    const subSteps = 4;
    const subDt = dt / subSteps;
    
    for (let s = 0; s < subSteps; s++) {
      updateBallPhysics(subDt);
      
      // Ball-pin collisions
      pins.forEach(pin => {
        checkBallPinCollision(pin);
      });
      
      // Pin-pin collisions
      for (let i = 0; i < pins.length; i++) {
        for (let j = i + 1; j < pins.length; j++) {
          checkPinPinCollision(pins[i], pins[j]);
        }
      }
      
      // Update pin physics
      pins.forEach(pin => {
        updatePinPhysics(pin, subDt);
      });
    }
    
    // Check if ball has passed pins or stopped
    const ballPastPins = ball.pos.z < -13;
    const ballStopped = ball.vel.length() < 0.1;
    const timeSinceContact = gameState.firstContactTime > 0 ? 
      gameState.simTime - gameState.firstContactTime : -1;
    
    if (ballPastPins || ballStopped || (timeSinceContact > 3)) {
      enterScoring();
    }
  }
  
  if (gameState.phase === 'scoring') {
    // Continue pin physics briefly
    const subSteps = 2;
    const subDt = dt / subSteps;
    for (let s = 0; s < subSteps; s++) {
      for (let i = 0; i < pins.length; i++) {
        for (let j = i + 1; j < pins.length; j++) {
          checkPinPinCollision(pins[i], pins[j]);
        }
      }
      pins.forEach(pin => updatePinPhysics(pin, subDt));
    }
  }
  
  // Guide line visibility
  guideLine.visible = gameState.phase === 'aim';
  
  controls.update();
  updateHUD();
  updateState();
  
  renderer.render(scene, camera);
}

animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
