<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Bowling Lane</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a1a;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 260px;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      line-height: 1.5;
      font-size: 14px;
    }

    #controls-panel {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      width: 280px;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      font-size: 14px;
    }

    #controls-panel h3 {
      margin: 0 0 10px 0;
      font-size: 15px;
    }

    .control-row {
      margin-bottom: 10px;
    }

    .control-row label {
      display: block;
      margin-bottom: 4px;
      color: #ddd;
    }

    .control-row input[type="range"] {
      width: 100%;
    }

    .small {
      color: #bbb;
      font-size: 12px;
      margin-top: 8px;
      line-height: 1.4;
    }

    .value {
      color: #9bd1ff;
      font-weight: bold;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="hud">
    <div id="hud-score">Total pins knocked: 0</div>
    <div id="hud-standing">Pins standing: 10</div>
    <div id="hud-ball-speed">Ball speed: 0.0</div>
    <div id="hud-ball-pos">Ball z-position: 7.0</div>
    <div id="hud-spin">Spin: 0.0</div>
    <div id="hud-phase">Phase: AIM</div>
  </div>

  <div id="controls-panel">
    <h3>Bowling Controls</h3>

    <div class="control-row">
      <label for="slider-aim">Aim X: <span class="value" id="value-aim">0.00</span></label>
      <input id="slider-aim" type="range" min="-0.8" max="0.8" step="0.05" value="0" />
    </div>

    <div class="control-row">
      <label for="slider-power">Power: <span class="value" id="value-power">10.0</span></label>
      <input id="slider-power" type="range" min="5" max="15" step="0.5" value="10" />
    </div>

    <div class="control-row">
      <label for="slider-spin">Spin: <span class="value" id="value-spin">0.0</span></label>
      <input id="slider-spin" type="range" min="-5" max="5" step="0.5" value="0" />
    </div>

    <div class="small">
      Space = Launch<br>
      R = Reset throw<br>
      N = New game<br>
      C = Toggle camera
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ------------------------------------------------------------
    // Basic scene
    // ------------------------------------------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a1a');

    const camera = new THREE.PerspectiveCamera(
      55,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 1, -8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1, -8);
    controls.maxPolarAngle = Math.PI * 0.49;

    // ------------------------------------------------------------
    // Lights
    // ------------------------------------------------------------
    const ambient = new THREE.AmbientLight(0xffffff, 0.35);
    scene.add(ambient);

    const spot = new THREE.SpotLight(0xfff1d6, 2.2, 50, Math.PI / 6, 0.35, 1.5);
    spot.position.set(0, 9, -2);
    spot.target.position.set(0, 0, -8);
    spot.castShadow = true;
    spot.shadow.mapSize.set(2048, 2048);
    scene.add(spot);
    scene.add(spot.target);

    const accentLeft = new THREE.PointLight(0x3b82f6, 1.4, 18, 2);
    accentLeft.position.set(-1.35, 0.35, -2);
    scene.add(accentLeft);

    const accentRight = new THREE.PointLight(0xa855f7, 1.4, 18, 2);
    accentRight.position.set(1.35, 0.35, -6);
    scene.add(accentRight);

    // ------------------------------------------------------------
    // Helpers / constants
    // ------------------------------------------------------------
    const clock = new THREE.Clock();

    const LANE_WIDTH = 2.0;
    const LANE_HALF = LANE_WIDTH * 0.5;
    const LANE_LENGTH = 20.0;
    const LANE_CENTER_Z = -2.0; // from z=8 to z=-12
    const BALL_RADIUS = 0.11;
    const BALL_MASS = 6.0;
    const PIN_RADIUS = 0.06;
    const PIN_HEIGHT = 0.38;
    const PIN_MASS = 1.5;
    const G = 9.81;

    const PIN_POSITIONS = [
      [ 0.0, 0, -10.00 ],
      [ -0.3, 0, -10.52 ], [ 0.3, 0, -10.52 ],
      [ -0.6, 0, -11.04 ], [ 0.0, 0, -11.04 ], [ 0.6, 0, -11.04 ],
      [ -0.9, 0, -11.56 ], [ -0.3, 0, -11.56 ], [ 0.3, 0, -11.56 ], [ 0.9, 0, -11.56 ]
    ];

    // ------------------------------------------------------------
    // Texture loader
    // ------------------------------------------------------------
    const textureLoader = new THREE.TextureLoader();

    function createLaneTexture() {
      const tex = textureLoader.load(
        'https://threejs.org/examples/textures/hardwood2_diffuse.jpg'
      );
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(1, 10);
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      return tex;
    }

    // ------------------------------------------------------------
    // Environment / lane
    // ------------------------------------------------------------
    const laneGroup = new THREE.Group();
    scene.add(laneGroup);

    const laneTexture = createLaneTexture();

    const laneMat = new THREE.MeshStandardMaterial({
      map: laneTexture,
      color: 0xffffff,
      roughness: 0.45,
      metalness: 0.05
    });

    const laneGeo = new THREE.BoxGeometry(LANE_WIDTH, 0.1, LANE_LENGTH);
    const laneMesh = new THREE.Mesh(laneGeo, laneMat);
    laneMesh.position.set(0, 0.05, LANE_CENTER_Z);
    laneMesh.receiveShadow = true;
    laneMesh.castShadow = false;
    laneGroup.add(laneMesh);

    const approachGeo = new THREE.BoxGeometry(LANE_WIDTH, 0.1, 3);
    const approachMat = new THREE.MeshStandardMaterial({
      color: 0x7f6447,
      roughness: 0.55,
      metalness: 0.03
    });
    const approach = new THREE.Mesh(approachGeo, approachMat);
    approach.position.set(0, 0.051, 6.5);
    approach.receiveShadow = true;
    laneGroup.add(approach);

    const deckGeo = new THREE.BoxGeometry(LANE_WIDTH, 0.12, 2);
    const deckMat = new THREE.MeshStandardMaterial({
      color: 0xb18b61,
      roughness: 0.42,
      metalness: 0.03
    });
    const pinDeck = new THREE.Mesh(deckGeo, deckMat);
    pinDeck.position.set(0, 0.06, -11);
    pinDeck.receiveShadow = true;
    laneGroup.add(pinDeck);

    const foulLine = new THREE.Mesh(
      new THREE.BoxGeometry(2.02, 0.005, 0.04),
      new THREE.MeshStandardMaterial({ color: 0xcc2222, emissive: 0x440000 })
    );
    foulLine.position.set(0, 0.103, 5);
    laneGroup.add(foulLine);

    const gutterMat = new THREE.MeshStandardMaterial({
      color: 0x202022,
      roughness: 0.85,
      metalness: 0.02
    });
    const gutterGeo = new THREE.BoxGeometry(0.3, 0.12, LANE_LENGTH);

    const gutterLeft = new THREE.Mesh(gutterGeo, gutterMat);
    gutterLeft.position.set(-1.15, 0.00, LANE_CENTER_Z);
    gutterLeft.receiveShadow = true;
    laneGroup.add(gutterLeft);

    const gutterRight = new THREE.Mesh(gutterGeo, gutterMat);
    gutterRight.position.set(1.15, 0.00, LANE_CENTER_Z);
    gutterRight.receiveShadow = true;
    laneGroup.add(gutterRight);

    const backWall = new THREE.Mesh(
      new THREE.BoxGeometry(3.2, 1.8, 0.25),
      new THREE.MeshStandardMaterial({ color: 0x353535, roughness: 0.8 })
    );
    backWall.position.set(0, 0.9, -13.1);
    backWall.receiveShadow = true;
    laneGroup.add(backWall);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 40),
      new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.95 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.01;
    floor.receiveShadow = true;
    scene.add(floor);

    // ------------------------------------------------------------
    // Ball
    // ------------------------------------------------------------
    function createBowlingBallMaterial() {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#1a1b24';
      ctx.fillRect(0, 0, 256, 256);

      for (let i = 0; i < 120; i++) {
        const x = Math.random() * 256;
        const y = Math.random() * 256;
        const r = 10 + Math.random() * 30;
        const g = ctx.createRadialGradient(x, y, 0, x, y, r);
        g.addColorStop(0, 'rgba(80,80,110,0.45)');
        g.addColorStop(1, 'rgba(20,20,35,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;

      return new THREE.MeshStandardMaterial({
        map: tex,
        color: 0x22252f,
        roughness: 0.4,
        metalness: 0.15
      });
    }

    const ballGroup = new THREE.Group();
    scene.add(ballGroup);

    const ballMesh = new THREE.Mesh(
      new THREE.SphereGeometry(BALL_RADIUS, 40, 40),
      createBowlingBallMaterial()
    );
    ballMesh.castShadow = true;
    ballMesh.receiveShadow = true;
    ballGroup.add(ballMesh);

    const holeMat = new THREE.MeshStandardMaterial({ color: 0x0b0b0e, roughness: 1.0 });
    const holeGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.018, 16);
    const holeOffsets = [
      new THREE.Vector3(0.028, 0.07, 0.03),
      new THREE.Vector3(0.0,   0.078, 0.0),
      new THREE.Vector3(-0.028, 0.07, 0.03)
    ];
    for (const offset of holeOffsets) {
      const hole = new THREE.Mesh(holeGeo, holeMat);
      hole.rotation.x = Math.PI / 2;
      hole.position.copy(offset);
      ballGroup.add(hole);
    }

    // ------------------------------------------------------------
    // Pins
    // ------------------------------------------------------------
    const pinBodies = [];
    const pinGroup = new THREE.Group();
    scene.add(pinGroup);

    function createPinMesh() {
      const pin = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.04, 0.06, PIN_HEIGHT, 20, 1),
        new THREE.MeshStandardMaterial({
          color: 0xf8f8f8,
          roughness: 0.55,
          metalness: 0.04
        })
      );
      body.castShadow = true;
      body.receiveShadow = true;
      pin.add(body);

      const stripeMat = new THREE.MeshStandardMaterial({
        color: 0xc91d28,
        roughness: 0.55,
        metalness: 0.04
      });

      const stripe1 = new THREE.Mesh(
        new THREE.CylinderGeometry(0.050, 0.050, 0.02, 20),
        stripeMat
      );
      stripe1.position.y = 0.06;
      pin.add(stripe1);

      const stripe2 = new THREE.Mesh(
        new THREE.CylinderGeometry(0.048, 0.048, 0.016, 20),
        stripeMat
      );
      stripe2.position.y = 0.085;
      pin.add(stripe2);

      return pin;
    }

    function createPinBody(index, x, z) {
      const mesh = createPinMesh();
      pinGroup.add(mesh);

      const body = {
        index,
        mesh,
        position: new THREE.Vector3(x, PIN_HEIGHT / 2, z),
        velocity: new THREE.Vector3(),
        rotation: new THREE.Quaternion(),
        angularVelocity: new THREE.Vector3(),
        mass: PIN_MASS,
        radius: PIN_RADIUS,
        height: PIN_HEIGHT,
        inertia: 0.5 * PIN_MASS * PIN_RADIUS * PIN_RADIUS,
        standing: true,
        settled: false,
        hitTimer: 0
      };

      mesh.position.copy(body.position);
      mesh.quaternion.copy(body.rotation);
      return body;
    }

    function rebuildPins() {
      for (const p of pinBodies) {
        pinGroup.remove(p.mesh);
      }
      pinBodies.length = 0;

      PIN_POSITIONS.forEach((p, i) => {
        pinBodies.push(createPinBody(i, p[0], p[2]));
      });
    }

    rebuildPins();

    // ------------------------------------------------------------
    // Game state
    // ------------------------------------------------------------
    const PHASE = {
      AIM: 'aim',
      ROLLING: 'rolling',
      SCORING: 'scoring'
    };

    let phase = PHASE.AIM;
    let frameCount = 0;
    let simTime = 0;
    let totalScore = 0;
    let pinsKnockedThisThrow = 0;
    let isStrike = false;
    let firstPinContactTime = null;
    let overheadCamera = false;
    let isPaused = false;

    const ballState = {
      position: new THREE.Vector3(0, BALL_RADIUS, 7),
      velocity: new THREE.Vector3(),
      omegaY: 0,
      launched: false,
      inGutter: false
    };

    function resetBall() {
      ballState.position.set(parseFloat(sliderAim.value), BALL_RADIUS, 7);
      ballState.velocity.set(0, 0, 0);
      ballState.omegaY = 0;
      ballState.launched = false;
      ballState.inGutter = false;
      ballGroup.position.copy(ballState.position);
      ballGroup.rotation.set(0, 0, 0);
    }

    function resetThrow() {
      rebuildPins();
      resetBall();
      phase = PHASE.AIM;
      pinsKnockedThisThrow = 0;
      isStrike = false;
      firstPinContactTime = null;
      updateHUD();
    }

    function newGame() {
      totalScore = 0;
      resetThrow();
    }

    // ------------------------------------------------------------
    // UI elements
    // ------------------------------------------------------------
    const sliderAim = document.getElementById('slider-aim');
    const sliderPower = document.getElementById('slider-power');
    const sliderSpin = document.getElementById('slider-spin');

    const valueAim = document.getElementById('value-aim');
    const valuePower = document.getElementById('value-power');
    const valueSpin = document.getElementById('value-spin');

    const hudScore = document.getElementById('hud-score');
    const hudStanding = document.getElementById('hud-standing');
    const hudBallSpeed = document.getElementById('hud-ball-speed');
    const hudBallPos = document.getElementById('hud-ball-pos');
    const hudSpin = document.getElementById('hud-spin');
    const hudPhase = document.getElementById('hud-phase');

    function syncSliderLabels() {
      valueAim.textContent = parseFloat(sliderAim.value).toFixed(2);
      valuePower.textContent = parseFloat(sliderPower.value).toFixed(1);
      valueSpin.textContent = parseFloat(sliderSpin.value).toFixed(1);
      if (phase === PHASE.AIM) {
        ballState.position.x = parseFloat(sliderAim.value);
        ballGroup.position.x = ballState.position.x;
      }
    }

    sliderAim.addEventListener('input', syncSliderLabels);
    sliderPower.addEventListener('input', syncSliderLabels);
    sliderSpin.addEventListener('input', syncSliderLabels);

    syncSliderLabels();
    resetBall();

    // ------------------------------------------------------------
    // Camera toggle
    // ------------------------------------------------------------
    function setCameraMode() {
      if (overheadCamera) {
        camera.position.set(0, 16, -2);
        controls.target.set(0, 0.5, -8);
      } else {
        camera.position.set(4.8, 3.2, 8.5);
        controls.target.set(0, 0.8, -8);
      }
    }

    // initial requested camera
    camera.position.set(0, 5, 12);
    controls.target.set(0, 1, -8);

    // ------------------------------------------------------------
    // Launch
    // ------------------------------------------------------------
    function launchBall() {
      if (phase !== PHASE.AIM) return;

      const aimX = parseFloat(sliderAim.value);
      const power = parseFloat(sliderPower.value);
      const spin = parseFloat(sliderSpin.value);

      ballState.position.set(aimX, BALL_RADIUS, 7);
      ballState.velocity.set(0, 0, -power);
      ballState.omegaY = spin;
      ballState.launched = true;
      ballState.inGutter = false;

      ballGroup.position.copy(ballState.position);

      phase = PHASE.ROLLING;
      firstPinContactTime = null;
      pinsKnockedThisThrow = 0;
      isStrike = false;
    }

    // ------------------------------------------------------------
    // Physics helpers
    // ------------------------------------------------------------
    function clamp(x, a, b) {
      return Math.max(a, Math.min(b, x));
    }

    function getPinTiltAngle(pin) {
      const up = new THREE.Vector3(0, 1, 0).applyQuaternion(pin.rotation);
      return Math.acos(clamp(up.dot(new THREE.Vector3(0, 1, 0)), -1, 1));
    }

    function updateStandingState(pin) {
      const tilt = getPinTiltAngle(pin);
      pin.standing = pin.position.y > 0.1 && tilt < Math.PI / 4;
    }

    function computeStandingPins() {
      let count = 0;
      for (const pin of pinBodies) {
        updateStandingState(pin);
        if (pin.standing) count++;
      }
      return count;
    }

    function resolveSphereLikeCollision(aPos, aVel, aMass, bPos, bVel, bMass, radiusSum, restitution) {
      const delta = new THREE.Vector3().subVectors(bPos, aPos);
      const dist = delta.length();
      if (dist === 0 || dist >= radiusSum) return null;

      const n = delta.clone().divideScalar(dist);
      const rv = new THREE.Vector3().subVectors(aVel, bVel);
      const velAlongNormal = rv.dot(n);

      // If separating, just depenetrate lightly
      const overlap = radiusSum - dist;
      if (overlap > 0) {
        const correction = n.clone().multiplyScalar(overlap * 0.5 + 1e-4);
        aPos.addScaledVector(correction, -1);
        bPos.add(correction);
      }

      if (velAlongNormal > 0) return { hit: false };

      const j = -(1 + restitution) * velAlongNormal / (1 / aMass + 1 / bMass);
      const impulse = n.clone().multiplyScalar(j);

      aVel.addScaledVector(impulse, 1 / aMass);
      bVel.addScaledVector(impulse, -1 / bMass);

      return { hit: true, normal: n, impulse };
    }

    function applyBallPhysics(dt) {
      if (!ballState.launched) return;

      const speed = ballState.velocity.length();
      if (speed > 0.0001) {
        // Friction
        const frictionDecel = 0.5;
        const newSpeed = Math.max(0, speed - frictionDecel * dt);
        ballState.velocity.multiplyScalar(newSpeed / speed);
      }

      // Hook / curve
      if (!ballState.inGutter) {
        const spinCoeff = 0.3;
        const vz = ballState.velocity.z;
        const hookAccelX = spinCoeff * ballState.omegaY * (-vz) * 0.12;
        ballState.velocity.x += hookAccelX * dt;
      }

      ballState.position.addScaledVector(ballState.velocity, dt);

      // Lane/gutter behavior
      if (Math.abs(ballState.position.x) > 1.0) {
        ballState.inGutter = true;
        ballState.position.y = 0.02;
      } else {
        ballState.position.y = BALL_RADIUS;
      }

      // Back wall
      if (ballState.position.z - BALL_RADIUS < -13.0) {
        ballState.position.z = -13.0 + BALL_RADIUS;
        if (ballState.velocity.z < 0) ballState.velocity.z *= -0.2;
      }

      // Visual rolling
      const forwardDist = Math.abs(ballState.velocity.z) * dt;
      ballGroup.rotation.x -= forwardDist / BALL_RADIUS;
      ballGroup.rotation.y += ballState.omegaY * dt * 0.3;
      ballGroup.position.copy(ballState.position);
    }

    function applyBallPinCollisions() {
      if (ballState.inGutter) return;

      const ballCanHitPins = Math.abs(ballState.position.x) <= 1.0 && ballState.position.z > -12.8;
      if (!ballCanHitPins) return;

      for (const pin of pinBodies) {
        const pinCenter = pin.position.clone();
        const verticalOffset = clamp(ballState.position.y - pinCenter.y, -PIN_HEIGHT / 2, PIN_HEIGHT / 2);
        const closest = new THREE.Vector3(pinCenter.x, pinCenter.y + verticalOffset, pinCenter.z);

        const aPos = ballState.position;
        const bPos = pin.position;
        const simpleRadius = BALL_RADIUS + PIN_RADIUS + 0.015;
        const dx = aPos.x - closest.x;
        const dz = aPos.z - closest.z;
        const flatDist = Math.sqrt(dx * dx + dz * dz);

        if (flatDist < simpleRadius) {
          const result = resolveSphereLikeCollision(
            ballState.position,
            ballState.velocity,
            BALL_MASS,
            pin.position,
            pin.velocity,
            PIN_MASS,
            simpleRadius,
            0.3
          );

          if (result && result.hit) {
            if (firstPinContactTime === null) firstPinContactTime = simTime;

            // Angular impulse to topple pin
            const lateral = new THREE.Vector3(
              result.normal.z * 12.0,
              0,
              -result.normal.x * 12.0
            );
            const impactStrength = ballState.velocity.length();
            pin.angularVelocity.addScaledVector(lateral, 0.015 * impactStrength);
            pin.angularVelocity.x += (Math.random() - 0.5) * 2.0;
            pin.angularVelocity.z += (Math.random() - 0.5) * 2.0;
            pin.velocity.y += 0.2;
            pin.hitTimer = 0.8;
          }
        }
      }
    }

    function applyPinPinCollisions() {
      for (let i = 0; i < pinBodies.length; i++) {
        for (let j = i + 1; j < pinBodies.length; j++) {
          const a = pinBodies[i];
          const b = pinBodies[j];

          const dx = b.position.x - a.position.x;
          const dz = b.position.z - a.position.z;
          const dist = Math.sqrt(dx * dx + dz * dz);
          const minDist = PIN_RADIUS * 2.0;

          if (dist > 0 && dist < minDist) {
            const aPos = a.position;
            const bPos = b.position;
            const aVel = a.velocity;
            const bVel = b.velocity;

            const result = resolveSphereLikeCollision(
              aPos, aVel, a.mass,
              bPos, bVel, b.mass,
              minDist,
              0.4
            );

            if (result && result.hit) {
              const impulseMag = result.impulse.length();
              const n = result.normal;

              a.angularVelocity.x += n.z * impulseMag * 0.05;
              a.angularVelocity.z += -n.x * impulseMag * 0.05;
              b.angularVelocity.x += -n.z * impulseMag * 0.05;
              b.angularVelocity.z += n.x * impulseMag * 0.05;

              a.hitTimer = 0.6;
              b.hitTimer = 0.6;
            }
          }
        }
      }
    }

    function applyPinPhysics(dt) {
      for (const pin of pinBodies) {
        pin.hitTimer = Math.max(0, pin.hitTimer - dt);

        // Linear motion
        pin.velocity.y -= G * dt;
        pin.velocity.multiplyScalar(0.992);
        pin.position.addScaledVector(pin.velocity, dt);

        // Floor collision
        const baseY = 0.0;
        const minCenterY = PIN_HEIGHT / 2 * 0.55;
        if (pin.position.y < minCenterY) {
          pin.position.y = minCenterY;
          if (pin.velocity.y < 0) pin.velocity.y *= -0.15;
          pin.velocity.x *= 0.96;
          pin.velocity.z *= 0.96;
        }

        // Back wall
        if (pin.position.z < -12.95) {
          pin.position.z = -12.95;
          if (pin.velocity.z < 0) pin.velocity.z *= -0.2;
        }

        // Side limits around lane/pin deck
        if (pin.position.x < -1.35) {
          pin.position.x = -1.35;
          if (pin.velocity.x < 0) pin.velocity.x *= -0.2;
        }
        if (pin.position.x > 1.35) {
          pin.position.x = 1.35;
          if (pin.velocity.x > 0) pin.velocity.x *= -0.2;
        }

        // Tipping dynamics
        const tilt = getPinTiltAngle(pin);

        if (tilt > THREE.MathUtils.degToRad(15)) {
          const up = new THREE.Vector3(0, 1, 0).applyQuaternion(pin.rotation);
          const fallAxis = new THREE.Vector3(up.z, 0, -up.x).normalize();
          if (fallAxis.lengthSq() > 0.0001) {
            pin.angularVelocity.addScaledVector(fallAxis, 4.5 * dt * (0.5 + tilt));
          }
        }

        // Damping
        pin.angularVelocity.multiplyScalar(pin.standing ? 0.985 : 0.975);

        // Integrate rotation
        const angSpeed = pin.angularVelocity.length();
        if (angSpeed > 1e-5) {
          const axis = pin.angularVelocity.clone().normalize();
          const dq = new THREE.Quaternion().setFromAxisAngle(axis, angSpeed * dt);
          pin.rotation.premultiply(dq).normalize();
        }

        // If fallen hard, slide flatter
        const newTilt = getPinTiltAngle(pin);
        if (newTilt > Math.PI / 2.3 && pin.position.y > PIN_RADIUS) {
          pin.position.y = Math.max(PIN_RADIUS, pin.position.y - dt * 0.25);
        }

        // Keep visually on floor if very toppled
        if (newTilt > Math.PI / 2 && pin.position.y < PIN_RADIUS) {
          pin.position.y = PIN_RADIUS;
        }

        pin.mesh.position.copy(pin.position);
        pin.mesh.quaternion.copy(pin.rotation);

        updateStandingState(pin);
      }
    }

    function evaluateScoring() {
      if (phase !== PHASE.ROLLING) return;

      const standing = computeStandingPins();

      let shouldScore = false;
      if (ballState.position.z < -13.0) shouldScore = true;
      if (firstPinContactTime !== null && simTime - firstPinContactTime > 3.0) shouldScore = true;

      if (shouldScore) {
        phase = PHASE.SCORING;
        pinsKnockedThisThrow = 10 - standing;
        totalScore += pinsKnockedThisThrow;
        isStrike = pinsKnockedThisThrow === 10;
      }
    }

    // ------------------------------------------------------------
    // HUD / external state
    // ------------------------------------------------------------
    function updateHUD() {
      const standing = computeStandingPins();
      const speed = ballState.velocity.length();

      hudScore.textContent = `Total pins knocked: ${totalScore}`;
      hudStanding.textContent = `Pins standing: ${standing}`;
      hudBallSpeed.textContent = `Ball speed: ${speed.toFixed(1)}`;
      hudBallPos.textContent = `Ball z-position: ${ballState.position.z.toFixed(1)}`;
      hudSpin.textContent = `Spin: ${ballState.omegaY.toFixed(1)}`;
      hudPhase.textContent = `Phase: ${phase.toUpperCase()}${isStrike && phase === PHASE.SCORING ? ' - STRIKE!' : ''}`;

      window.__3D_STATE__ = {
        frameCount,
        score: totalScore,
        pinsStanding: standing,
        pinsKnocked: pinsKnockedThisThrow,
        ballPos: {
          x: ballState.position.x,
          y: ballState.position.y,
          z: ballState.position.z
        },
        ballSpeed: speed,
        ballSpin: ballState.omegaY,
        aimX: parseFloat(sliderAim.value),
        launchPower: parseFloat(sliderPower.value),
        phase,
        isStrike,
        pinStates: pinBodies.map(p => p.standing),
        isPaused,
        simTime
      };
    }

    // ------------------------------------------------------------
    // Input
    // ------------------------------------------------------------
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        launchBall();
      } else if (e.key === 'r' || e.key === 'R') {
        resetThrow();
      } else if (e.key === 'n' || e.key === 'N') {
        newGame();
      } else if (e.key === 'c' || e.key === 'C') {
        overheadCamera = !overheadCamera;
        setCameraMode();
      }
    });

    // ------------------------------------------------------------
    // Resize
    // ------------------------------------------------------------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ------------------------------------------------------------
    // Animation
    // ------------------------------------------------------------
    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 1 / 60);
      frameCount++;
      simTime += dt;

      if (!isPaused) {
        if (phase === PHASE.AIM) {
          ballState.position.x = parseFloat(sliderAim.value);
          ballState.position.y = BALL_RADIUS;
          ballState.position.z = 7;
          ballGroup.position.copy(ballState.position);
        }

        if (phase === PHASE.ROLLING) {
          applyBallPhysics(dt);

          for (let i = 0; i < 3; i++) {
            applyBallPinCollisions();
            applyPinPinCollisions();
          }

          applyPinPhysics(dt);
          evaluateScoring();
        } else if (phase === PHASE.SCORING) {
          applyPinPinCollisions();
          applyPinPhysics(dt);
        } else {
          applyPinPhysics(dt);
        }
      }

      controls.update();
      updateHUD();
      renderer.render(scene, camera);
    }

    updateHUD();
    animate();
  </script>
</body>
</html>
