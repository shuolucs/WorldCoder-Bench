<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Bowling Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: none;
            min-width: 200px;
            z-index: 10;
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: #4da6ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .hud-value {
            font-weight: bold;
            color: #fff;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 10px;
            border: 1px solid #555;
            display: flex;
            gap: 30px;
            z-index: 10;
            align-items: center;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .control-group label {
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
        }
        input[type=range] {
            width: 120px;
            cursor: pointer;
        }
        #instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #ccc;
            pointer-events: none;
            text-align: right;
            line-height: 1.5;
        }
        .key {
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            color: #fff;
            font-family: monospace;
        }
        #message-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 0 0 20px rgba(255, 200, 0, 0.8);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 20;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud">
        <h2>Bowling Sim</h2>
        <div class="hud-row"><span>Phase:</span> <span id="hud-phase" class="hud-value">AIM</span></div>
        <div class="hud-row"><span>Total Score:</span> <span id="hud-score" class="hud-value">0</span></div>
        <div class="hud-row"><span>Standing Pins:</span> <span id="hud-standing" class="hud-value">10</span></div>
        <div class="hud-row" style="margin-top: 10px; border-top: 1px solid #444; padding-top: 5px;">
            <span>Ball Speed:</span> <span id="hud-ball-speed" class="hud-value">0.0</span> m/s
        </div>
        <div class="hud-row"><span>Ball Z-Pos:</span> <span id="hud-ball-pos" class="hud-value">7.0</span></div>
        <div class="hud-row"><span>Spin:</span> <span id="hud-spin" class="hud-value">0.0</span></div>
    </div>

    <div id="instructions">
        <div><span class="key">Space</span> Launch Ball</div>
        <div><span class="key">R</span> Reset Frame</div>
        <div><span class="key">N</span> New Game</div>
        <div><span class="key">C</span> Toggle Camera</div>
    </div>

    <div id="controls">
        <div class="control-group">
            <label for="slider-aim">Aim Position</label>
            <input type="range" id="slider-aim" min="-0.8" max="0.8" step="0.05" value="0">
        </div>
        <div class="control-group">
            <label for="slider-power">Power (m/s)</label>
            <input type="range" id="slider-power" min="5" max="15" step="0.5" value="10">
        </div>
        <div class="control-group">
            <label for="slider-spin">Spin (Hook)</label>
            <input type="range" id="slider-spin" min="-5" max="5" step="0.5" value="0">
        </div>
    </div>

    <div id="message-overlay">STRIKE!</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            frameCount: 0,
            score: 0,
            pinsStanding: 10,
            pinsKnocked: 0,
            ballPos: { x: 0, y: 0.11, z: 7 },
            ballSpeed: 0,
            ballSpin: 0,
            aimX: 0,
            launchPower: 10,
            phase: 'aim', // 'aim', 'rolling', 'scoring'
            isStrike: false,
            pinStates: Array(10).fill(true),
            isPaused: false,
            simTime: 0
        };

        // --- DOM Elements ---
        const ui = {
            aim: document.getElementById('slider-aim'),
            power: document.getElementById('slider-power'),
            spin: document.getElementById('slider-spin'),
            hudScore: document.getElementById('hud-score'),
            hudStanding: document.getElementById('hud-standing'),
            hudSpeed: document.getElementById('hud-ball-speed'),
            hudPos: document.getElementById('hud-ball-pos'),
            hudSpin: document.getElementById('hud-spin'),
            hudPhase: document.getElementById('hud-phase'),
            msgOverlay: document.getElementById('message-overlay')
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        const camPosDefault = new THREE.Vector3(0, 5, 12);
        const camTargetDefault = new THREE.Vector3(0, 1, -8);
        const camPosOverhead = new THREE.Vector3(0, 15, -5);
        const camTargetOverhead = new THREE.Vector3(0, 0, -10);
        let isOverheadCam = false;

        camera.position.copy(camPosDefault);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.copy(camTargetDefault);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xfff0dd, 500);
        spotLight.position.set(0, 10, -5);
        spotLight.angle = Math.PI / 3;
        spotLight.penumbra = 0.5;
        spotLight.decay = 2;
        spotLight.distance = 50;
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.width = 2048;
        spotLight.shadow.mapSize.height = 2048;
        spotLight.shadow.bias = -0.001;
        scene.add(spotLight);
        scene.add(spotLight.target);
        spotLight.target.position.set(0, 0, -10);

        // Accent lights (gutters)
        const accentL = new THREE.PointLight(0x4444ff, 50, 20);
        accentL.position.set(-1.5, 0.5, -2);
        scene.add(accentL);
        const accentR = new THREE.PointLight(0xaa44ff, 50, 20);
        accentR.position.set(1.5, 0.5, -2);
        scene.add(accentR);

        // --- Textures (Procedural Canvas) ---
        function createWoodTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#d4a373';
            ctx.fillRect(0, 0, 512, 1024);
            ctx.fillStyle = '#bc8a5f';
            for (let i = 0; i < 100; i++) {
                ctx.fillRect(Math.random() * 512, Math.random() * 1024, Math.random() * 5 + 1, Math.random() * 100 + 20);
            }
            // Planks
            ctx.strokeStyle = '#8a5a44';
            ctx.lineWidth = 2;
            for(let i=1; i<10; i++) {
                ctx.beginPath();
                ctx.moveTo(i * 51.2, 0);
                ctx.lineTo(i * 51.2, 1024);
                ctx.stroke();
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(1, 4);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        function createPinTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 256, 256);
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(0, 140, 256, 15);
            ctx.fillRect(0, 170, 256, 15);
            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        function createBallTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
            grad.addColorStop(0, '#2a0033');
            grad.addColorStop(1, '#0a0011');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 512, 512);
            // Swirls
            ctx.strokeStyle = '#4a0066';
            ctx.lineWidth = 10;
            for(let i=0; i<5; i++) {
                ctx.beginPath();
                ctx.arc(256, 256, 100 + i*30, 0, Math.PI*1.5);
                ctx.stroke();
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        const woodTex = createWoodTexture();
        const pinTex = createPinTexture();
        const ballTex = createBallTexture();

        // --- Environment Construction ---
        const laneWidth = 2.0;
        const laneLength = 20;
        const laneZCenter = -2; // from z=8 to z=-12

        // Main Lane
        const laneGeo = new THREE.BoxGeometry(laneWidth, 0.1, laneLength);
        const laneMat = new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.2, metalness: 0.1 });
        const lane = new THREE.Mesh(laneGeo, laneMat);
        lane.position.set(0, -0.05, laneZCenter);
        lane.receiveShadow = true;
        scene.add(lane);

        // Gutters
        const gutterWidth = 0.3;
        const gutterGeo = new THREE.BoxGeometry(gutterWidth, 0.1, laneLength);
        const gutterMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
        const gutterL = new THREE.Mesh(gutterGeo, gutterMat);
        gutterL.position.set(-laneWidth/2 - gutterWidth/2, -0.1, laneZCenter);
        gutterL.receiveShadow = true;
        scene.add(gutterL);
        const gutterR = new THREE.Mesh(gutterGeo, gutterMat);
        gutterR.position.set(laneWidth/2 + gutterWidth/2, -0.1, laneZCenter);
        gutterR.receiveShadow = true;
        scene.add(gutterR);

        // Approach Area
        const approachGeo = new THREE.BoxGeometry(laneWidth + gutterWidth*2, 0.1, 3);
        const approachMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.4 });
        const approach = new THREE.Mesh(approachGeo, approachMat);
        approach.position.set(0, -0.05, 6.5); // z=5 to z=8
        approach.receiveShadow = true;
        scene.add(approach);

        // Foul Line
        const foulLineGeo = new THREE.PlaneGeometry(laneWidth, 0.05);
        const foulLineMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const foulLine = new THREE.Mesh(foulLineGeo, foulLineMat);
        foulLine.rotation.x = -Math.PI / 2;
        foulLine.position.set(0, 0.001, 5);
        scene.add(foulLine);

        // Pin Deck
        const deckGeo = new THREE.BoxGeometry(laneWidth, 0.02, 2);
        const deckMat = new THREE.MeshStandardMaterial({ color: 0xe6c280, roughness: 0.3 });
        const deck = new THREE.Mesh(deckGeo, deckMat);
        deck.position.set(0, 0.01, -11); // z=-10 to z=-12
        deck.receiveShadow = true;
        scene.add(deck);

        // Back Wall
        const wallGeo = new THREE.BoxGeometry(laneWidth + gutterWidth*2 + 1, 2, 0.5);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a });
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(0, 1, -13.25);
        wall.receiveShadow = true;
        scene.add(wall);

        // --- Physics Entities ---
        
        class RigidBody {
            constructor(mesh, mass, radius) {
                this.mesh = mesh;
                this.mass = mass;
                this.radius = radius;
                this.position = mesh.position.clone();
                this.velocity = new THREE.Vector3();
                this.quaternion = mesh.quaternion.clone();
                this.angularVelocity = new THREE.Vector3();
                this.invMass = mass > 0 ? 1 / mass : 0;
            }
            
            update(dt) {
                // Linear
                this.position.addScaledVector(this.velocity, dt);
                this.mesh.position.copy(this.position);
                
                // Angular (simplified Euler integration for quaternion)
                if (this.angularVelocity.lengthSq() > 0.0001) {
                    const w = this.angularVelocity;
                    const q = this.quaternion;
                    const dq = new THREE.Quaternion(w.x * dt * 0.5, w.y * dt * 0.5, w.z * dt * 0.5, 0);
                    dq.multiply(q);
                    q.x += dq.x; q.y += dq.y; q.z += dq.z; q.w += dq.w;
                    q.normalize();
                    this.mesh.quaternion.copy(q);
                }
            }
        }

        // Ball
        const ballRadius = 0.11;
        const ballMass = 6.0;
        const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
        const ballMat = new THREE.MeshStandardMaterial({ map: ballTex, roughness: 0.1, metalness: 0.5 });
        const ballMesh = new THREE.Mesh(ballGeo, ballMat);
        ballMesh.castShadow = true;
        scene.add(ballMesh);
        const ball = new RigidBody(ballMesh, ballMass, ballRadius);

        // Pins
        const pinMass = 1.5;
        const pinRadius = 0.06; // Collision radius
        const pinHeight = 0.38;
        const pinGeo = new THREE.CylinderGeometry(0.04, 0.06, pinHeight, 16);
        const pinMat = new THREE.MeshStandardMaterial({ map: pinTex, roughness: 0.2, metalness: 0.1 });
        
        const pins = [];
        const pinStartPositions = [];
        
        // Triangle formation
        const rowZ = [-10, -10.52, -11.04, -11.56];
        const pinDeckY = 0.02;
        const pinCenterY = pinDeckY + pinHeight / 2; // 0.02 + 0.19 = 0.21

        const pinCoords = [
            [0, rowZ[0]],
            [-0.3, rowZ[1]], [0.3, rowZ[1]],
            [-0.6, rowZ[2]], [0, rowZ[2]], [0.6, rowZ[2]],
            [-0.9, rowZ[3]], [-0.3, rowZ[3]], [0.3, rowZ[3]], [0.9, rowZ[3]]
        ];

        pinCoords.forEach((coord, i) => {
            const mesh = new THREE.Mesh(pinGeo, pinMat);
            mesh.position.set(coord[0], pinCenterY, coord[1]);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            
            const pin = new RigidBody(mesh, pinMass, pinRadius);
            pin.id = i;
            pin.isStanding = true;
            pins.push(pin);
            pinStartPositions.push(mesh.position.clone());
        });

        // --- Game Logic & Physics Engine ---

        let firstHitTime = 0;
        let lastTime = performance.now();

        function resetBall() {
            ball.position.set(window.__3D_STATE__.aimX, ballRadius, 7);
            ball.velocity.set(0, 0, 0);
            ball.angularVelocity.set(0, 0, 0);
            ball.quaternion.identity();
            ball.mesh.position.copy(ball.position);
            ball.mesh.quaternion.copy(ball.quaternion);
        }

        function resetPins() {
            pins.forEach((pin, i) => {
                pin.position.copy(pinStartPositions[i]);
                pin.velocity.set(0, 0, 0);
                pin.angularVelocity.set(0, 0, 0);
                pin.quaternion.identity();
                pin.mesh.position.copy(pin.position);
                pin.mesh.quaternion.copy(pin.quaternion);
                pin.isStanding = true;
            });
            window.__3D_STATE__.pinStates.fill(true);
            window.__3D_STATE__.pinsStanding = 10;
            window.__3D_STATE__.pinsKnocked = 0;
        }

        function setPhase(newPhase) {
            window.__3D_STATE__.phase = newPhase;
            ui.hudPhase.innerText = newPhase.toUpperCase();
            
            if (newPhase === 'aim') {
                ui.aim.disabled = false;
                ui.power.disabled = false;
                ui.spin.disabled = false;
                firstHitTime = 0;
                ui.msgOverlay.style.opacity = 0;
            } else {
                ui.aim.disabled = true;
                ui.power.disabled = true;
                ui.spin.disabled = true;
            }
        }

        function launchBall() {
            if (window.__3D_STATE__.phase !== 'aim') return;
            
            const power = parseFloat(ui.power.value);
            const spin = parseFloat(ui.spin.value);
            
            window.__3D_STATE__.launchPower = power;
            window.__3D_STATE__.ballSpin = spin;
            
            ball.velocity.set(0, 0, -power);
            // Visual spin
            ball.angularVelocity.set(-power/ballRadius, spin, 0);
            
            setPhase('rolling');
        }

        function resolveCollision(rb1, rb2, restitution) {
            const n = new THREE.Vector3().subVectors(rb1.position, rb2.position);
            const dist = n.length();
            const minDist = rb1.radius + rb2.radius;
            
            if (dist >= minDist || dist === 0) return false;
            
            n.normalize();
            
            // Positional correction to prevent sinking
            const penetration = minDist - dist;
            const correction = n.clone().multiplyScalar(penetration / (rb1.invMass + rb2.invMass) * 0.8);
            rb1.position.add(correction.clone().multiplyScalar(rb1.invMass));
            rb2.position.sub(correction.clone().multiplyScalar(rb2.invMass));

            // Velocity resolution
            const vRel = new THREE.Vector3().subVectors(rb1.velocity, rb2.velocity);
            const vn = vRel.dot(n);
            
            if (vn > 0) return true; // Moving apart
            
            const j = -(1 + restitution) * vn / (rb1.invMass + rb2.invMass);
            const impulse = n.clone().multiplyScalar(j);
            
            rb1.velocity.add(impulse.clone().multiplyScalar(rb1.invMass));
            rb2.velocity.sub(impulse.clone().multiplyScalar(rb2.invMass));

            // Add angular velocity for toppling effect (cross product of up and normal)
            const up = new THREE.Vector3(0, 1, 0);
            const torqueDir = new THREE.Vector3().crossVectors(up, n).normalize();
            
            // Arbitrary scaling for visual effect
            if (rb1 !== ball) rb1.angularVelocity.add(torqueDir.clone().multiplyScalar(j * 1.5));
            if (rb2 !== ball) rb2.angularVelocity.sub(torqueDir.clone().multiplyScalar(j * 1.5));

            return true;
        }

        function checkPinStanding(pin) {
            // A pin is 'standing' if its y-position is > 0.1 and angular tilt from vertical is < 45 degrees
            if (pin.position.y < 0.1) return false;
            
            const up = new THREE.Vector3(0, 1, 0);
            const pinUp = new THREE.Vector3(0, 1, 0).applyQuaternion(pin.quaternion);
            const angle = up.angleTo(pinUp);
            
            return angle < (Math.PI / 4); // 45 degrees
        }

        function calculateScore() {
            let standingCount = 0;
            pins.forEach((pin, i) => {
                const standing = checkPinStanding(pin);
                pin.isStanding = standing;
                window.__3D_STATE__.pinStates[i] = standing;
                if (standing) standingCount++;
            });
            
            const knocked = 10 - standingCount;
            window.__3D_STATE__.pinsStanding = standingCount;
            window.__3D_STATE__.pinsKnocked = knocked;
            window.__3D_STATE__.score += knocked;
            
            ui.hudStanding.innerText = standingCount;
            ui.hudScore.innerText = window.__3D_STATE__.score;
            
            if (knocked === 10) {
                window.__3D_STATE__.isStrike = true;
                ui.msgOverlay.innerText = "STRIKE!";
                ui.msgOverlay.style.opacity = 1;
            } else if (knocked > 0) {
                ui.msgOverlay.innerText = `${knocked} PINS!`;
                ui.msgOverlay.style.opacity = 1;
            } else {
                ui.msgOverlay.innerText = "GUTTER BALL";
                ui.msgOverlay.style.opacity = 1;
            }
        }

        function physicsStep(dt) {
            // Cap dt to prevent explosions
            dt = Math.min(dt, 0.03);
            const state = window.__3D_STATE__;

            if (state.phase === 'rolling') {
                // --- Ball Physics ---
                const isGutter = Math.abs(ball.position.x) > (laneWidth/2);
                
                if (!isGutter && ball.position.z > -13) {
                    // On Lane: Hook and Friction
                    const speed = ball.velocity.length();
                    if (speed > 0.1) {
                        // Hook force: F_hook = spinCoeff * omega_y * v_z
                        const spinCoeff = 0.3;
                        const hookAcc = (spinCoeff * state.ballSpin * ball.velocity.z) / ballMass;
                        ball.velocity.x += hookAcc * dt;
                        
                        // Friction deceleration = 0.5 m/s^2
                        const decel = 0.5 * dt;
                        const multiplier = Math.max(0, speed - decel) / speed;
                        ball.velocity.multiplyScalar(multiplier);
                        
                        // Update visual spin based on velocity
                        ball.angularVelocity.x = ball.velocity.z / ballRadius;
                        ball.angularVelocity.z = -ball.velocity.x / ballRadius;
                    } else {
                        ball.velocity.set(0,0,0);
                    }
                } else if (isGutter) {
                    // In Gutter
                    const gutterFloorY = -0.1 + ballRadius;
                    if (ball.position.y > gutterFloorY) {
                        ball.velocity.y -= 9.8 * dt; // Fall
                    } else {
                        ball.position.y = gutterFloorY;
                        ball.velocity.y = 0;
                        ball.velocity.x = 0; // Stay in gutter
                    }
                    // Friction in gutter
                    ball.velocity.z *= 0.99;
                }

                ball.update(dt);

                // --- Pin Physics ---
                let anyCollision = false;

                pins.forEach(pin => {
                    // Gravity
                    pin.velocity.y -= 9.8 * dt;
                    
                    // Floor collision
                    const floorY = (pin.position.z > -10 && pin.position.z < -12) ? pinDeckY : 0;
                    const pinBottomY = floorY + pinHeight/2; // Center y when resting
                    
                    if (pin.position.y < pinBottomY) {
                        pin.position.y = pinBottomY;
                        pin.velocity.y = Math.max(0, -pin.velocity.y * 0.3); // Bounce
                        
                        // Floor friction
                        pin.velocity.x *= 0.95;
                        pin.velocity.z *= 0.95;
                        pin.angularVelocity.multiplyScalar(0.9);
                    }

                    // Toppling gravity torque
                    const up = new THREE.Vector3(0, 1, 0);
                    const pinUp = new THREE.Vector3(0, 1, 0).applyQuaternion(pin.quaternion);
                    const angle = up.angleTo(pinUp);
                    
                    if (angle > Math.PI / 12 && pin.position.y <= pinBottomY + 0.05) { // > 15 degrees
                        const axis = new THREE.Vector3().crossVectors(up, pinUp).normalize();
                        // Accelerate fall
                        pin.angularVelocity.add(axis.clone().multiplyScalar(-15.0 * dt));
                    }

                    pin.update(dt);

                    // Ball-Pin Collision
                    if (resolveCollision(ball, pin, 0.3)) {
                        anyCollision = true;
                    }
                });

                // Pin-Pin Collision
                for (let i = 0; i < pins.length; i++) {
                    for (let j = i + 1; j < pins.length; j++) {
                        resolveCollision(pins[i], pins[j], 0.4);
                    }
                }

                if (anyCollision && firstHitTime === 0) {
                    firstHitTime = performance.now();
                }

                // Phase transition check
                const timeSinceHit = firstHitTime > 0 ? performance.now() - firstHitTime : 0;
                if ((firstHitTime > 0 && timeSinceHit > 3000) || ball.position.z < -15 || (ball.velocity.lengthSq() < 0.01 && ball.position.z < 7)) {
                    setPhase('scoring');
                    calculateScore();
                }
            }
        }

        // --- Input Handling ---
        
        ui.aim.addEventListener('input', (e) => {
            if (window.__3D_STATE__.phase === 'aim') {
                window.__3D_STATE__.aimX = parseFloat(e.target.value);
                ball.position.x = window.__3D_STATE__.aimX;
                ball.mesh.position.x = ball.position.x;
            }
        });

        ui.spin.addEventListener('input', (e) => {
            if (window.__3D_STATE__.phase === 'aim') {
                window.__3D_STATE__.ballSpin = parseFloat(e.target.value);
                ui.hudSpin.innerText = window.__3D_STATE__.ballSpin.toFixed(1);
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                launchBall();
            } else if (e.code === 'KeyR') {
                resetPins();
                resetBall();
                setPhase('aim');
                window.__3D_STATE__.isStrike = false;
            } else if (e.code === 'KeyN') {
                window.__3D_STATE__.score = 0;
                ui.hudScore.innerText = '0';
                resetPins();
                resetBall();
                setPhase('aim');
                window.__3D_STATE__.isStrike = false;
            } else if (e.code === 'KeyC') {
                isOverheadCam = !isOverheadCam;
                if (isOverheadCam) {
                    camera.position.copy(camPosOverhead);
                    controls.target.copy(camTargetOverhead);
                } else {
                    camera.position.copy(camPosDefault);
                    controls.target.copy(camTargetDefault);
                }
                controls.update();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Main Loop ---
        
        resetBall();
        resetPins();

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;

            const state = window.__3D_STATE__;
            state.frameCount++;
            state.simTime += dt;

            if (!state.isPaused) {
                physicsStep(dt);
            }

            controls.update();

            // Update State Object & HUD
            state.ballPos.x = ball.position.x;
            state.ballPos.y = ball.position.y;
            state.ballPos.z = ball.position.z;
            state.ballSpeed = ball.velocity.length();

            if (state.frameCount % 5 === 0) { // Throttle DOM updates slightly
                ui.hudSpeed.innerText = state.ballSpeed.toFixed(1);
                ui.hudPos.innerText = state.ballPos.z.toFixed(1);
                
                if (state.phase === 'rolling') {
                    // Live update standing pins during roll
                    let standing = 0;
                    pins.forEach(p => { if(checkPinStanding(p)) standing++; });
                    ui.hudStanding.innerText = standing;
                }
            }

            renderer.render(scene, camera);
        }

        animate();

    </script>
</body>
</html>
