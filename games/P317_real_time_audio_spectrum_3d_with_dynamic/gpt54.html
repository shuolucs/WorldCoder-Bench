<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Spectrum 3D</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(20, 20, 20, 0.72);
      color: white;
      padding: 12px;
      border-radius: 8px;
      min-width: 220px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      user-select: none;
    }

    #hud h1 {
      margin: 0 0 10px 0;
      font-size: 18px;
      font-weight: 700;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    button {
      background: #1f1f1f;
      color: white;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
      transition: 0.15s ease;
    }

    button:hover {
      background: #2a2a2a;
    }

    button.active-easy {
      border: 2px solid #00cc66;
    }

    button.active-medium {
      border: 2px solid #ff9900;
    }

    button.active-hard {
      border: 2px solid #ff3333;
    }

    .info {
      font-size: 13px;
      line-height: 1.5;
      opacity: 0.95;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div id="hud">
    <h1>Audio Spectrum 3D</h1>

    <div class="row">
      <button id="btn-easy">Easy</button>
      <button id="btn-medium">Medium</button>
      <button id="btn-hard">Hard</button>
    </div>

    <div class="row">
      <button id="btn-camera-toggle">Camera: Static</button>
      <button id="btn-pause">Pause</button>
    </div>

    <div class="info">
      <div id="hud-fps">FPS: 0</div>
      <div id="hud-difficulty">Difficulty: easy</div>
      <div id="hud-camera">Camera: static</div>
    </div>

    <div class="hint">
      Keys: 1 Easy, 2 Medium, 3 Hard, C Camera, Space Pause
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const BAR_COUNT = 64;
    const BAR_SPACING = 1.2;
    const BAR_WIDTH = 1.0;
    const BAR_DEPTH = 1.0;

    const difficultySettings = {
      easy:   { frequencyMultiplier: 1.0, lerpFactor: 0.05, saturation: 0.5, rotating: false },
      medium: { frequencyMultiplier: 2.5, lerpFactor: 0.1,  saturation: 0.8, rotating: false },
      hard:   { frequencyMultiplier: 5.0, lerpFactor: 0.2,  saturation: 1.0, rotating: true  }
    };

    let difficulty = "easy";
    let cameraMode = "static";
    let isPaused = false;
    let frameCount = 0;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 30, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 10, 0);
    controls.update();

    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
    directionalLight.position.set(10, 30, 10);
    directionalLight.castShadow = true;
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(100, 100),
      new THREE.MeshStandardMaterial({ color: 0x111111 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    const bars = [];
    const geometry = new THREE.BoxGeometry(BAR_WIDTH, 1, BAR_DEPTH);

    const totalWidth = (BAR_COUNT - 1) * BAR_SPACING;

    function createBars() {
      for (let i = 0; i < BAR_COUNT; i++) {
        const hue = i / BAR_COUNT;
        const color = new THREE.Color().setHSL(hue, difficultySettings[difficulty].saturation, 0.5);
        const material = new THREE.MeshStandardMaterial({ color });
        const bar = new THREE.Mesh(geometry, material);

        const x = i * BAR_SPACING - totalWidth / 2;
        bar.position.set(x, 0.05, 0);
        bar.scale.set(1, 0.1, 1);
        bar.castShadow = true;
        bar.receiveShadow = true;
        scene.add(bar);
        bars.push(bar);
      }
    }

    createBars();

    const btnEasy = document.getElementById("btn-easy");
    const btnMedium = document.getElementById("btn-medium");
    const btnHard = document.getElementById("btn-hard");
    const btnCameraToggle = document.getElementById("btn-camera-toggle");
    const btnPause = document.getElementById("btn-pause");
    const hudFps = document.getElementById("hud-fps");
    const hudDifficulty = document.getElementById("hud-difficulty");
    const hudCamera = document.getElementById("hud-camera");

    function setDifficulty(mode) {
      difficulty = mode;
      const settings = difficultySettings[difficulty];

      bars.forEach((bar, i) => {
        const hue = i / BAR_COUNT;
        bar.material.color.setHSL(hue, settings.saturation, 0.5);
      });

      updateHUD();
      updateActiveButtons();
    }

    function toggleCameraMode() {
      cameraMode = cameraMode === "static" ? "orbit" : "static";
      controls.enabled = cameraMode === "static";
      updateHUD();
    }

    function togglePause() {
      isPaused = !isPaused;
      btnPause.textContent = isPaused ? "Resume" : "Pause";
      updateHUD();
    }

    function updateHUD(fps = null) {
      if (fps !== null) hudFps.textContent = `FPS: ${fps}`;
      hudDifficulty.textContent = `Difficulty: ${difficulty}`;
      hudCamera.textContent = `Camera: ${cameraMode}`;
      btnCameraToggle.textContent = `Camera: ${cameraMode === "static" ? "Static" : "Orbit"}`;
    }

    function updateActiveButtons() {
      btnEasy.className = "";
      btnMedium.className = "";
      btnHard.className = "";

      if (difficulty === "easy") btnEasy.classList.add("active-easy");
      if (difficulty === "medium") btnMedium.classList.add("active-medium");
      if (difficulty === "hard") btnHard.classList.add("active-hard");
    }

    btnEasy.addEventListener("click", () => setDifficulty("easy"));
    btnMedium.addEventListener("click", () => setDifficulty("medium"));
    btnHard.addEventListener("click", () => setDifficulty("hard"));
    btnCameraToggle.addEventListener("click", toggleCameraMode);
    btnPause.addEventListener("click", togglePause);

    window.addEventListener("keydown", (e) => {
      if (e.code === "Digit1") setDifficulty("easy");
      if (e.code === "Digit2") setDifficulty("medium");
      if (e.code === "Digit3") setDifficulty("hard");
      if (e.code === "KeyC") toggleCameraMode();
      if (e.code === "Space") {
        e.preventDefault();
        togglePause();
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.__3D_STATE__ = {
      barCount: BAR_COUNT,
      difficulty,
      cameraMode,
      isPaused,
      frequencyMultiplier: difficultySettings[difficulty].frequencyMultiplier,
      lerpFactor: difficultySettings[difficulty].lerpFactor,
      maxBarHeight: 0,
      minBarHeight: 0,
      avgBarHeight: 0,
      elapsedTime: 0,
      frameCount: 0,
      barsRotating: difficultySettings[difficulty].rotating,
      cameraPosition: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
      activeBars: 0
    };

    const clock = new THREE.Clock();
    let fpsTimer = 0;
    let fpsFrames = 0;

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      if (!isPaused) {
        const elapsed = clock.elapsedTime;
        const settings = difficultySettings[difficulty];

        if (cameraMode === "orbit") {
          camera.position.x = 50 * Math.sin(elapsed * 0.3);
          camera.position.z = 50 * Math.cos(elapsed * 0.3);
          camera.position.y = 30;
          camera.lookAt(0, 10, 0);
        } else {
          controls.update();
        }

        let maxBarHeight = -Infinity;
        let minBarHeight = Infinity;
        let totalBarHeight = 0;
        let activeBars = 0;

        for (let i = 0; i < BAR_COUNT; i++) {
          const amplitude = 0.5 + 0.5 * Math.sin(elapsed * settings.frequencyMultiplier * (i + 1) * 0.1);
          const targetScaleY = 0.1 + amplitude * (20 - 0.1);

          bars[i].scale.y = THREE.MathUtils.lerp(bars[i].scale.y, targetScaleY, settings.lerpFactor);
          bars[i].position.y = bars[i].scale.y * 0.5;

          if (settings.rotating) {
            bars[i].rotation.y = amplitude * Math.PI;
          } else {
            bars[i].rotation.y = THREE.MathUtils.lerp(bars[i].rotation.y, 0, 0.1);
          }

          const h = bars[i].scale.y;
          if (h > maxBarHeight) maxBarHeight = h;
          if (h < minBarHeight) minBarHeight = h;
          totalBarHeight += h;
          if (h > 1.0) activeBars++;
        }

        frameCount++;

        window.__3D_STATE__.barCount = BAR_COUNT;
        window.__3D_STATE__.difficulty = difficulty;
        window.__3D_STATE__.cameraMode = cameraMode;
        window.__3D_STATE__.isPaused = isPaused;
        window.__3D_STATE__.frequencyMultiplier = settings.frequencyMultiplier;
        window.__3D_STATE__.lerpFactor = settings.lerpFactor;
        window.__3D_STATE__.maxBarHeight = maxBarHeight;
        window.__3D_STATE__.minBarHeight = minBarHeight;
        window.__3D_STATE__.avgBarHeight = totalBarHeight / BAR_COUNT;
        window.__3D_STATE__.elapsedTime = elapsed;
        window.__3D_STATE__.frameCount = frameCount;
        window.__3D_STATE__.barsRotating = settings.rotating;
        window.__3D_STATE__.cameraPosition = {
          x: camera.position.x,
          y: camera.position.y,
          z: camera.position.z
        };
        window.__3D_STATE__.activeBars = activeBars;
      } else if (cameraMode === "static") {
        controls.update();
      }

      fpsTimer += delta;
      fpsFrames++;
      if (fpsTimer >= 0.5) {
        const fps = Math.round(fpsFrames / fpsTimer);
        updateHUD(fps);
        fpsTimer = 0;
        fpsFrames = 0;
      }

      renderer.render(scene, camera);
    }

    setDifficulty("easy");
    updateHUD(0);
    updateActiveButtons();
    controls.enabled = true;
    animate();
  </script>
</body>
</html>
