<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Spectrum 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #ffffff;
            padding: 15px;
            border-radius: 8px;
            width: 220px;
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 16px;
            margin: 0 0 15px 0;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .control-group {
            margin-bottom: 15px;
        }
        button {
            display: block;
            width: 100%;
            padding: 8px;
            margin-bottom: 5px;
            background: #333333;
            color: #ffffff;
            border: 2px solid #555555;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover {
            background: #444444;
        }
        .active-easy { border-color: #4CAF50 !important; background: rgba(76, 175, 80, 0.2); }
        .active-medium { border-color: #FF9800 !important; background: rgba(255, 152, 0, 0.2); }
        .active-hard { border-color: #F44336 !important; background: rgba(244, 67, 54, 0.2); }
        
        .stats {
            font-size: 12px;
            line-height: 1.6;
            color: #cccccc;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 4px;
        }
        .stats span {
            color: #ffffff;
            font-weight: bold;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <h1>Audio Spectrum 3D</h1>
        
        <div class="control-group">
            <button id="btn-easy" class="active-easy">Easy (1)</button>
            <button id="btn-medium">Medium (2)</button>
            <button id="btn-hard">Hard (3)</button>
        </div>
        
        <div class="control-group">
            <button id="btn-camera-toggle">Camera: Static (C)</button>
            <button id="btn-pause">Pause (Space)</button>
        </div>
        
        <div class="stats">
            <div>FPS: <span id="hud-fps">0</span></div>
            <div>Mode: <span id="hud-difficulty">easy</span></div>
            <div>Camera: <span id="hud-camera">static</span></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            barCount: 64,
            difficulty: 'easy',
            cameraMode: 'static',
            isPaused: false,
            frequencyMultiplier: 1.0,
            lerpFactor: 0.05,
            maxBarHeight: 0,
            minBarHeight: 0,
            avgBarHeight: 0,
            elapsedTime: 0,
            frameCount: 0,
            barsRotating: false,
            cameraPosition: { x: 0, y: 0, z: 0 },
            activeBars: 0
        };

        const state = window.__3D_STATE__;
        let animationTime = 0;
        let lastTime = performance.now();
        let fpsFrames = 0;
        let fpsLastTime = lastTime;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 50);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 30, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 100;
        dirLight.shadow.camera.left = -40;
        dirLight.shadow.camera.right = 40;
        dirLight.shadow.camera.top = 40;
        dirLight.shadow.camera.bottom = -40;
        scene.add(dirLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8, metalness: 0.2 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Spectrum Bars ---
        const bars = [];
        const barGeometry = new THREE.BoxGeometry(1, 1, 1);
        const spacing = 1.2;
        const totalWidth = (state.barCount - 1) * spacing;
        const startX = -totalWidth / 2;

        for (let i = 0; i < state.barCount; i++) {
            const material = new THREE.MeshStandardMaterial({ 
                color: new THREE.Color().setHSL(i / state.barCount, 0.5, 0.5),
                roughness: 0.2,
                metalness: 0.8
            });
            const bar = new THREE.Mesh(barGeometry, material);
            bar.position.x = startX + i * spacing;
            bar.position.y = 0.5;
            bar.castShadow = true;
            bar.receiveShadow = true;
            scene.add(bar);
            bars.push({
                mesh: bar,
                targetScaleY: 0.1,
                index: i
            });
        }

        // --- UI Elements ---
        const btnEasy = document.getElementById('btn-easy');
        const btnMedium = document.getElementById('btn-medium');
        const btnHard = document.getElementById('btn-hard');
        const btnCamera = document.getElementById('btn-camera-toggle');
        const btnPause = document.getElementById('btn-pause');
        const hudFps = document.getElementById('hud-fps');
        const hudDiff = document.getElementById('hud-difficulty');
        const hudCam = document.getElementById('hud-camera');

        // --- Logic Functions ---
        function setDifficulty(mode) {
            state.difficulty = mode;
            btnEasy.className = '';
            btnMedium.className = '';
            btnHard.className = '';
            
            if (mode === 'easy') {
                state.frequencyMultiplier = 1.0;
                state.lerpFactor = 0.05;
                state.barsRotating = false;
                btnEasy.className = 'active-easy';
            } else if (mode === 'medium') {
                state.frequencyMultiplier = 2.5;
                state.lerpFactor = 0.1;
                state.barsRotating = false;
                btnMedium.className = 'active-medium';
            } else if (mode === 'hard') {
                state.frequencyMultiplier = 5.0;
                state.lerpFactor = 0.2;
                state.barsRotating = true;
                btnHard.className = 'active-hard';
            }
            hudDiff.textContent = mode;
        }

        function toggleCamera() {
            state.cameraMode = state.cameraMode === 'static' ? 'orbit' : 'static';
            if (state.cameraMode === 'static') {
                controls.enabled = true;
                btnCamera.textContent = 'Camera: Static (C)';
            } else {
                controls.enabled = false;
                btnCamera.textContent = 'Camera: Orbit (C)';
            }
            hudCam.textContent = state.cameraMode;
        }

        function togglePause() {
            state.isPaused = !state.isPaused;
            btnPause.textContent = state.isPaused ? 'Resume (Space)' : 'Pause (Space)';
        }

        // --- Event Listeners ---
        btnEasy.addEventListener('click', () => setDifficulty('easy'));
        btnMedium.addEventListener('click', () => setDifficulty('medium'));
        btnHard.addEventListener('click', () => setDifficulty('hard'));
        btnCamera.addEventListener('click', toggleCamera);
        btnPause.addEventListener('click', togglePause);

        window.addEventListener('keydown', (e) => {
            if (e.key === '1') setDifficulty('easy');
            if (e.key === '2') setDifficulty('medium');
            if (e.key === '3') setDifficulty('hard');
            if (e.key.toLowerCase() === 'c') toggleCamera();
            if (e.key === ' ') {
                e.preventDefault();
                togglePause();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate(currentTime) {
            requestAnimationFrame(animate);

            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            // FPS Calculation
            fpsFrames++;
            if (currentTime - fpsLastTime >= 1000) {
                hudFps.textContent = fpsFrames;
                fpsFrames = 0;
                fpsLastTime = currentTime;
            }

            if (!state.isPaused) {
                animationTime += deltaTime;
                state.elapsedTime = animationTime;
            }

            state.frameCount++;

            // Camera Update
            if (state.cameraMode === 'orbit') {
                camera.position.x = 50 * Math.sin(animationTime * 0.3);
                camera.position.z = 50 * Math.cos(animationTime * 0.3);
                camera.lookAt(0, 10, 0);
            } else {
                controls.update();
            }

            state.cameraPosition.x = camera.position.x;
            state.cameraPosition.y = camera.position.y;
            state.cameraPosition.z = camera.position.z;

            // Bars Update
            let currentMax = 0;
            let currentMin = Infinity;
            let sumHeight = 0;
            let activeCount = 0;

            const targetSaturation = state.difficulty === 'easy' ? 0.5 : (state.difficulty === 'medium' ? 0.8 : 1.0);

            for (let i = 0; i < state.barCount; i++) {
                const barData = bars[i];
                const mesh = barData.mesh;

                if (!state.isPaused) {
                    // Procedural Audio Formula
                    const amplitude = 0.5 + 0.5 * Math.sin(animationTime * state.frequencyMultiplier * (i + 1) * 0.1);
                    
                    // Map amplitude (0-1) to scaleY (0.1-20)
                    barData.targetScaleY = 0.1 + (amplitude * 19.9);
                }

                // Lerp scale
                mesh.scale.y += (barData.targetScaleY - mesh.scale.y) * state.lerpFactor;
                
                // Position base on ground
                mesh.position.y = mesh.scale.y * 0.5;

                // Update Color Saturation
                mesh.material.color.setHSL(i / state.barCount, targetSaturation, 0.5);

                // Hard mode rotation
                if (state.difficulty === 'hard' && !state.isPaused) {
                    const amplitude = (barData.targetScaleY - 0.1) / 19.9;
                    mesh.rotation.y = amplitude * Math.PI;
                } else if (state.difficulty !== 'hard') {
                    mesh.rotation.y += (0 - mesh.rotation.y) * 0.1;
                }

                // Stats tracking
                if (mesh.scale.y > currentMax) currentMax = mesh.scale.y;
                if (mesh.scale.y < currentMin) currentMin = mesh.scale.y;
                sumHeight += mesh.scale.y;
                if (mesh.scale.y > 1.0) activeCount++;
            }

            state.maxBarHeight = currentMax;
            state.minBarHeight = currentMin;
            state.avgBarHeight = sumHeight / state.barCount;
            state.activeBars = activeCount;

            renderer.render(scene, camera);
        }

        // Initialize
        setDifficulty('easy');
        animate(performance.now());

    </script>
</body>
</html>
