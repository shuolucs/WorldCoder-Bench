<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Spectrum 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }
  
  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.75);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 10px;
    padding: 18px 22px;
    color: #fff;
    min-width: 220px;
    backdrop-filter: blur(10px);
    z-index: 100;
  }
  
  #hud h2 {
    font-size: 18px;
    margin-bottom: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  #hud .info {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 4px;
  }
  
  #hud .info span {
    color: #fff;
    font-weight: 600;
  }
  
  .btn-group {
    margin-top: 12px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  
  .btn-group button {
    padding: 6px 14px;
    border: 2px solid #555;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.08);
    color: #fff;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    outline: none;
  }
  
  .btn-group button:hover {
    background: rgba(255, 255, 255, 0.15);
  }
  
  #btn-easy.active { border-color: #2ecc71; color: #2ecc71; }
  #btn-medium.active { border-color: #f39c12; color: #f39c12; }
  #btn-hard.active { border-color: #e74c3c; color: #e74c3c; }
  
  .separator {
    border-top: 1px solid rgba(255,255,255,0.1);
    margin: 10px 0;
  }
  
  .control-btn {
    padding: 6px 14px;
    border: 2px solid #555;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.08);
    color: #fff;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    outline: none;
    margin-right: 6px;
    margin-top: 6px;
  }
  
  .control-btn:hover {
    background: rgba(255, 255, 255, 0.15);
  }
</style>
</head>
<body>

<div id="hud">
  <h2>Audio Spectrum 3D</h2>
  <div class="info">FPS: <span id="hud-fps">0</span></div>
  <div class="info">Difficulty: <span id="hud-difficulty">easy</span></div>
  <div class="info">Camera: <span id="hud-camera">static</span></div>
  
  <div class="separator"></div>
  
  <div style="font-size: 11px; color: #888; margin-bottom: 6px;">Difficulty Mode</div>
  <div class="btn-group">
    <button id="btn-easy" class="active">Easy</button>
    <button id="btn-medium">Medium</button>
    <button id="btn-hard">Hard</button>
  </div>
  
  <div class="separator"></div>
  
  <button id="btn-camera-toggle" class="control-btn">Camera: Static</button>
  <button id="btn-pause" class="control-btn">Pause</button>
  
  <div style="margin-top: 10px; font-size: 10px; color: #555;">
    Keys: 1/2/3 = Difficulty | Space = Pause | C = Camera
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  // State
  const state = {
    difficulty: 'easy',
    cameraMode: 'static',
    isPaused: false,
    elapsedTime: 0,
    frameCount: 0
  };

  const difficultySettings = {
    easy:   { frequencyMultiplier: 1.0, lerpFactor: 0.05, saturation: 0.5 },
    medium: { frequencyMultiplier: 2.5, lerpFactor: 0.1,  saturation: 0.8 },
    hard:   { frequencyMultiplier: 5.0, lerpFactor: 0.2,  saturation: 1.0 }
  };

  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 30, 50);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // Controls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0, 10, 0);

  // Lights
  const ambientLight = new THREE.AmbientLight(0x404040);
  scene.add(ambientLight);

  const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
  directionalLight.position.set(10, 30, 10);
  directionalLight.castShadow = true;
  directionalLight.shadow.mapSize.width = 2048;
  directionalLight.shadow.mapSize.height = 2048;
  directionalLight.shadow.camera.near = 0.5;
  directionalLight.shadow.camera.far = 100;
  directionalLight.shadow.camera.left = -50;
  directionalLight.shadow.camera.right = 50;
  directionalLight.shadow.camera.top = 50;
  directionalLight.shadow.camera.bottom = -50;
  scene.add(directionalLight);

  // Ground plane
  const groundGeometry = new THREE.PlaneGeometry(100, 100);
  const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x111111 });
  const ground = new THREE.Mesh(groundGeometry, groundMaterial);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = 0;
  ground.receiveShadow = true;
  scene.add(ground);

  // Spectrum bars
  const BAR_COUNT = 64;
  const BAR_WIDTH = 1.0;
  const BAR_DEPTH = 1.0;
  const BAR_SPACING = 1.2;
  const bars = [];
  const barTargetScaleY = new Float32Array(BAR_COUNT);
  const barCurrentScaleY = new Float32Array(BAR_COUNT);

  const totalWidth = (BAR_COUNT - 1) * BAR_SPACING;
  const startX = -totalWidth / 2;

  for (let i = 0; i < BAR_COUNT; i++) {
    const geometry = new THREE.BoxGeometry(BAR_WIDTH, 1, BAR_DEPTH);
    // Shift geometry so pivot is at the bottom
    geometry.translate(0, 0.5, 0);

    const hue = i / BAR_COUNT;
    const color = new THREE.Color();
    color.setHSL(hue, difficultySettings[state.difficulty].saturation, 0.5);

    const material = new THREE.MeshStandardMaterial({
      color: color,
      metalness: 0.3,
      roughness: 0.4
    });

    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.x = startX + i * BAR_SPACING;
    mesh.position.y = 0;
    mesh.position.z = 0;
    mesh.castShadow = true;
    mesh.receiveShadow = true;

    scene.add(mesh);
    bars.push(mesh);
    barCurrentScaleY[i] = 0.1;
    barTargetScaleY[i] = 0.1;
  }

  // FPS tracking
  let fpsFrames = 0;
  let fpsTime = 0;
  let currentFPS = 0;

  // Animation
  let lastTime = performance.now();
  const clock = new THREE.Clock();

  // Expose state
  window.__3D_STATE__ = {};

  function setDifficulty(mode) {
    state.difficulty = mode;
    const settings = difficultySettings[mode];

    // Update button states
    document.getElementById('btn-easy').classList.toggle('active', mode === 'easy');
    document.getElementById('btn-medium').classList.toggle('active', mode === 'medium');
    document.getElementById('btn-hard').classList.toggle('active', mode === 'hard');

    // Update bar colors
    for (let i = 0; i < BAR_COUNT; i++) {
      const hue = i / BAR_COUNT;
      bars[i].material.color.setHSL(hue, settings.saturation, 0.5);
    }

    document.getElementById('hud-difficulty').textContent = mode;
  }

  function setCameraMode(mode) {
    state.cameraMode = mode;
    document.getElementById('hud-camera').textContent = mode;
    document.getElementById('btn-camera-toggle').textContent = 'Camera: ' + mode.charAt(0).toUpperCase() + mode.slice(1);

    if (mode === 'static') {
      controls.enabled = true;
    } else {
      controls.enabled = false;
    }
  }

  function togglePause() {
    state.isPaused = !state.isPaused;
    document.getElementById('btn-pause').textContent = state.isPaused ? 'Resume' : 'Pause';
  }

  // Button events
  document.getElementById('btn-easy').addEventListener('click', () => setDifficulty('easy'));
  document.getElementById('btn-medium').addEventListener('click', () => setDifficulty('medium'));
  document.getElementById('btn-hard').addEventListener('click', () => setDifficulty('hard'));
  document.getElementById('btn-camera-toggle').addEventListener('click', () => {
    setCameraMode(state.cameraMode === 'static' ? 'orbit' : 'static');
  });
  document.getElementById('btn-pause').addEventListener('click', togglePause);

  // Keyboard events
  document.addEventListener('keydown', (e) => {
    if (e.key === '1') setDifficulty('easy');
    else if (e.key === '2') setDifficulty('medium');
    else if (e.key === '3') setDifficulty('hard');
    else if (e.key === ' ' || e.code === 'Space') {
      e.preventDefault();
      togglePause();
    }
    else if (e.key === 'c' || e.key === 'C') {
      setCameraMode(state.cameraMode === 'static' ? 'orbit' : 'static');
    }
  });

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    const delta = (now - lastTime) / 1000;
    lastTime = now;

    // FPS calculation
    fpsFrames++;
    fpsTime += delta;
    if (fpsTime >= 0.5) {
      currentFPS = Math.round(fpsFrames / fpsTime);
      document.getElementById('hud-fps').textContent = currentFPS;
      fpsFrames = 0;
      fpsTime = 0;
    }

    if (!state.isPaused) {
      state.elapsedTime += delta;
    }

    const time = state.elapsedTime;
    const settings = difficultySettings[state.difficulty];
    const freqMult = settings.frequencyMultiplier;
    const lerpFactor = settings.lerpFactor;

    // Generate simulated audio data
    for (let i = 0; i < BAR_COUNT; i++) {
      const amplitude = 0.5 + 0.5 * Math.sin(time * freqMult * (i + 1) * 0.1);
      // Map amplitude (0..1) to scaleY (0.1..20)
      barTargetScaleY[i] = 0.1 + amplitude * 19.9;
    }

    // Animate bars
    let maxH = -Infinity, minH = Infinity, sumH = 0, activeBars = 0;

    for (let i = 0; i < BAR_COUNT; i++) {
      if (!state.isPaused) {
        barCurrentScaleY[i] += (barTargetScaleY[i] - barCurrentScaleY[i]) * lerpFactor;
      }

      const sy = barCurrentScaleY[i];
      bars[i].scale.y = sy;
      bars[i].position.y = 0;

      // Hard mode rotation
      if (state.difficulty === 'hard' && !state.isPaused) {
        const amplitude = (sy - 0.1) / 19.9;
        bars[i].rotation.y = amplitude * Math.PI;
      } else if (state.difficulty !== 'hard') {
        bars[i].rotation.y = 0;
      }

      if (sy > maxH) maxH = sy;
      if (sy < minH) minH = sy;
      sumH += sy;
      if (sy > 1.0) activeBars++;
    }

    const avgH = sumH / BAR_COUNT;

    // Camera modes
    if (state.cameraMode === 'orbit' && !state.isPaused) {
      camera.position.x = 50 * Math.sin(time * 0.3);
      camera.position.z = 50 * Math.cos(time * 0.3);
      camera.lookAt(0, 10, 0);
    }

    if (state.cameraMode === 'static') {
      controls.update();
    }

    state.frameCount++;

    // Update global state
    window.__3D_STATE__ = {
      barCount: BAR_COUNT,
      difficulty: state.difficulty,
      cameraMode: state.cameraMode,
      isPaused: state.isPaused,
      frequencyMultiplier: freqMult,
      lerpFactor: lerpFactor,
      maxBarHeight: maxH,
      minBarHeight: minH,
      avgBarHeight: avgH,
      elapsedTime: state.elapsedTime,
      frameCount: state.frameCount,
      barsRotating: state.difficulty === 'hard',
      cameraPosition: {
        x: camera.position.x,
        y: camera.position.y,
        z: camera.position.z
      },
      activeBars: activeBars
    };

    renderer.render(scene, camera);
  }

  animate();
})();
</script>
</body>
</html>
