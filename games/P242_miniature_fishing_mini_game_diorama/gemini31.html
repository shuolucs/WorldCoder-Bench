<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miniature Fishing Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .hud {
            position: absolute;
            color: white;
            text-shadow: 1px 1px 2px black, -1px -1px 2px black, 1px -1px 2px black, -1px 1px 2px black;
            pointer-events: none;
            font-weight: bold;
            font-size: 24px;
        }
        #hud-score {
            top: 20px;
            left: 20px;
        }
        #hud-remaining {
            top: 20px;
            right: 20px;
        }
        #hud-status {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            text-align: center;
        }
        #hud-missed {
            bottom: 20px;
            left: 20px;
        }
        #controls-help {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 1px 1px 1px black;
            font-size: 16px;
            text-align: right;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud-score" class="hud">Score: 0</div>
    <div id="hud-remaining" class="hud">Fish Remaining: 5</div>
    <div id="hud-status" class="hud">Cast with SPACE</div>
    <div id="hud-missed" class="hud">Missed: 0</div>
    <div id="controls-help">
        Left/Right: Move Rod<br>
        Space: Cast<br>
        R: Reel In<br>
        E: Cancel
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        const state = {
            gameState: 'idle', // 'idle', 'casting', 'waiting', 'biting', 'reeling'
            score: 0,
            fishRemaining: 5,
            missedFish: 0,
            hookY: 1,
            rodAngle: 0,
            fishPositions: [],
            flamingoLoaded: false,
            castCount: 0
        };
        window.__3D_STATE__ = state;

        // --- DOM Elements ---
        const elScore = document.getElementById('hud-score');
        const elRemaining = document.getElementById('hud-remaining');
        const elStatus = document.getElementById('hud-status');
        const elMissed = document.getElementById('hud-missed');

        function updateHUD() {
            elScore.innerText = `Score: ${state.score}`;
            elRemaining.innerText = `Fish Remaining: ${state.fishRemaining}`;
            elMissed.innerText = `Missed: ${state.missedFish}`;
        }

        function setStatus(msg) {
            elStatus.innerText = msg;
        }

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const clock = new THREE.Clock();
        const mixers = [];

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // --- Environment ---
        // Ground
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x44aa44 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.15;
        ground.receiveShadow = true;
        scene.add(ground);

        // Pond
        const pondGeo = new THREE.CylinderGeometry(5, 5, 0.3, 64);
        const pondMat = new THREE.MeshPhysicalMaterial({
            color: 0x2288cc,
            transparent: true,
            opacity: 0.6,
            roughness: 0.1,
            transmission: 0.5,
            ior: 1.33
        });
        const pond = new THREE.Mesh(pondGeo, pondMat);
        pond.position.y = 0;
        pond.receiveShadow = true;
        scene.add(pond);

        // --- Flamingo ---
        const loader = new GLTFLoader();
        loader.load('https://threejs.org/examples/models/gltf/Flamingo.glb', (gltf) => {
            const flamingo = gltf.scene;
            flamingo.scale.set(0.015, 0.015, 0.015);
            flamingo.position.set(-6, 0, -3);
            flamingo.rotation.y = Math.PI / 4;
            
            flamingo.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(flamingo);
            state.flamingoLoaded = true;

            if (gltf.animations && gltf.animations.length > 0) {
                const mixer = new THREE.AnimationMixer(flamingo);
                mixer.clipAction(gltf.animations[0]).play();
                mixers.push(mixer);
            }
        });

        // --- Fishing Rod ---
        const rodPivot = new THREE.Group();
        scene.add(rodPivot);

        const rodBase = new THREE.Group();
        rodBase.position.set(0, 1, 6);
        rodPivot.add(rodBase);

        const rodGeo = new THREE.CylinderGeometry(0.05, 0.05, 3);
        rodGeo.translate(0, 1.5, 0); // Move origin to bottom
        const rodMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
        const rodMesh = new THREE.Mesh(rodGeo, rodMat);
        rodMesh.rotation.x = -Math.PI / 4; // Tilt towards pond
        rodMesh.castShadow = true;
        rodBase.add(rodMesh);

        const rodTip = new THREE.Object3D();
        rodTip.position.set(0, 3, 0); // At the end of the 3-unit cylinder
        rodMesh.add(rodTip);

        // Hook
        const hookGeo = new THREE.SphereGeometry(0.1);
        const hookMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const hook = new THREE.Mesh(hookGeo, hookMat);
        scene.add(hook);

        // Line
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff });
        const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const line = new THREE.Line(lineGeo, lineMat);
        scene.add(line);

        // --- Fish ---
        const fishColors = [0xff0000, 0xffa500, 0xffff00, 0x008000, 0x800080];
        const fishes = [];
        
        fishColors.forEach((color) => {
            const fGeo = new THREE.SphereGeometry(0.15);
            fGeo.scale(1.5, 1, 0.5);
            const fMat = new THREE.MeshStandardMaterial({ color: color });
            const fMesh = new THREE.Mesh(fGeo, fMat);
            fMesh.castShadow = true;
            
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * 4;
            fMesh.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
            scene.add(fMesh);

            fishes.push({
                mesh: fMesh,
                angle: Math.random() * Math.PI * 2,
                speed: 0.3 + Math.random() * 0.3,
                active: true,
                turnSpeed: 1.0
            });
        });

        // --- Input Handling ---
        const keys = { ArrowLeft: false, ArrowRight: false };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = true;

            if (e.code === 'Space' && state.gameState === 'idle') {
                state.gameState = 'casting';
                state.castCount++;
                castProgress = 0;
                setStatus('Casting...');
            }

            if (e.code === 'KeyR' && state.gameState === 'biting') {
                state.gameState = 'reeling';
                state.score++;
                state.fishRemaining--;
                if (bitingFish) {
                    bitingFish.active = false;
                    scene.remove(bitingFish.mesh);
                }
                bitingFish = null;
                setStatus('Caught one!');
                updateHUD();
                
                setTimeout(() => {
                    if(state.gameState === 'reeling') {
                        state.gameState = 'idle';
                        if(state.fishRemaining > 0) setStatus('Cast with SPACE');
                        else setStatus('All fish caught!');
                    }
                }, 1500);
            }

            if (e.code === 'KeyE') {
                state.gameState = 'idle';
                bitingFish = null;
                if(state.fishRemaining > 0) setStatus('Cast with SPACE');
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Game Loop Variables ---
        let castProgress = 0;
        let biteTimer = 0;
        let bitingFish = null;
        const tipWorldPos = new THREE.Vector3();

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            // Update Mixers
            mixers.forEach(m => m.update(dt));

            // Rod Movement
            if (keys.ArrowLeft) state.rodAngle += 1.5 * dt;
            if (keys.ArrowRight) state.rodAngle -= 1.5 * dt;
            rodPivot.rotation.y = state.rodAngle;

            // Hook & Line Logic
            rodTip.getWorldPosition(tipWorldPos);
            hook.position.x = tipWorldPos.x;
            hook.position.z = tipWorldPos.z;

            if (state.gameState === 'casting') {
                castProgress += dt / 0.5; // 0.5 seconds to cast
                if (castProgress >= 1) {
                    castProgress = 1;
                    state.gameState = 'waiting';
                    setStatus('Waiting for bite...');
                }
                state.hookY = THREE.MathUtils.lerp(1, -0.1, castProgress);
            } else if (state.gameState === 'idle' || state.gameState === 'reeling') {
                state.hookY = 1;
            }

            hook.position.y = state.hookY;

            // Update Line Geometry
            const positions = line.geometry.attributes.position.array;
            positions[0] = tipWorldPos.x;
            positions[1] = tipWorldPos.y;
            positions[2] = tipWorldPos.z;
            positions[3] = hook.position.x;
            positions[4] = hook.position.y;
            positions[5] = hook.position.z;
            line.geometry.attributes.position.needsUpdate = true;

            // Fish Logic
            state.fishPositions = [];
            fishes.forEach(f => {
                if (!f.active) return;

                if (state.gameState === 'biting' && bitingFish === f) {
                    // Fish is hooked, stop moving
                } else {
                    // Wandering
                    f.angle += (Math.random() - 0.5) * f.turnSpeed * dt;
                    f.mesh.position.x += Math.cos(f.angle) * f.speed * dt;
                    f.mesh.position.z += Math.sin(f.angle) * f.speed * dt;

                    // Boundary check (pond radius 4.5)
                    const distFromCenter = Math.sqrt(f.mesh.position.x ** 2 + f.mesh.position.z ** 2);
                    if (distFromCenter > 4.5) {
                        const targetAngle = Math.atan2(-f.mesh.position.z, -f.mesh.position.x);
                        // Steer towards center
                        f.angle = THREE.MathUtils.lerp(f.angle, targetAngle, 0.1);
                    }

                    // Orient fish
                    f.mesh.rotation.y = -f.angle;
                }

                state.fishPositions.push({ x: f.mesh.position.x, z: f.mesh.position.z });

                // Bite Detection
                if (state.gameState === 'waiting') {
                    const dx = hook.position.x - f.mesh.position.x;
                    const dz = hook.position.z - f.mesh.position.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    
                    if (dist < 1.0) {
                        state.gameState = 'biting';
                        bitingFish = f;
                        biteTimer = 3.0;
                        setStatus('BITE! Press R to reel!');
                    }
                }
            });

            // Bite Timer Logic
            if (state.gameState === 'biting') {
                biteTimer -= dt;
                if (biteTimer <= 0) {
                    state.gameState = 'idle';
                    state.missedFish++;
                    bitingFish = null;
                    setStatus('It got away!');
                    updateHUD();
                    setTimeout(() => {
                        if(state.gameState === 'idle' && state.fishRemaining > 0) {
                            setStatus('Cast with SPACE');
                        }
                    }, 1500);
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
