<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Fishing Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #87c9ff;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    .hud {
      position: fixed;
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      pointer-events: none;
      z-index: 10;
      font-weight: bold;
    }

    #hud-score {
      top: 12px;
      left: 12px;
      font-size: 22px;
    }

    #hud-remaining {
      top: 12px;
      right: 12px;
      font-size: 22px;
    }

    #hud-status {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      text-align: center;
    }

    #hud-missed {
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div id="hud-score" class="hud">Score: 0</div>
  <div id="hud-remaining" class="hud">Fish Remaining: 5</div>
  <div id="hud-status" class="hud">Cast with SPACE</div>
  <div id="hud-missed" class="hud">Missed: 0</div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87c9ff);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const clock = new THREE.Clock();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(1024, 1024);
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0x44aa44 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.15;
    ground.receiveShadow = true;
    scene.add(ground);

    const pond = new THREE.Mesh(
      new THREE.CylinderGeometry(5, 5, 0.3, 64),
      new THREE.MeshPhysicalMaterial({
        color: 0x2288cc,
        opacity: 0.6,
        transparent: true,
        roughness: 0.1
      })
    );
    pond.position.y = 0;
    pond.receiveShadow = true;
    scene.add(pond);

    const pondRadius = 4.5;

    const rodPivot = new THREE.Group();
    scene.add(rodPivot);

    const rodGroup = new THREE.Group();
    rodPivot.add(rodGroup);

    const rodMesh = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.05, 3, 12),
      new THREE.MeshStandardMaterial({ color: 0x8b5a2b })
    );
    rodMesh.castShadow = true;
    rodMesh.position.y = 1.5;
    rodMesh.rotation.z = -Math.PI / 4;
    rodGroup.add(rodMesh);

    const rodBase = new THREE.Vector3(0, 1, 6);
    let rodAngle = 0;

    function updateRodOrbit() {
      rodPivot.position.set(
        Math.sin(rodAngle) * 6,
        0,
        Math.cos(rodAngle) * 6
      );
      rodPivot.lookAt(0, 1, 0);
    }
    updateRodOrbit();

    const hook = new THREE.Mesh(
      new THREE.SphereGeometry(0.1, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0xffffff })
    );
    hook.castShadow = true;
    scene.add(hook);

    const lineGeometry = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(),
      new THREE.Vector3()
    ]);
    const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });
    const fishingLine = new THREE.Line(lineGeometry, lineMaterial);
    scene.add(fishingLine);

    function getRodTipWorld() {
      const localTip = new THREE.Vector3(1.06, 2.56, 0);
      return rodGroup.localToWorld(localTip.clone());
    }

    let hookPos = new THREE.Vector3(0, 1, 0);
    let hookTargetY = 1;
    let hookStartY = 1;
    let hookAnimTime = 0;
    let hookAnimDuration = 0.5;
    let hookAnimating = false;

    function resetHookPosition() {
      const tip = getRodTipWorld();
      hookPos.set(tip.x, 1, tip.z);
      hook.position.copy(hookPos);
      hookAnimating = false;
      hookAnimTime = 0;
      hookTargetY = 1;
      hookStartY = 1;
    }

    resetHookPosition();

    function animateHookTo(targetY, duration = 0.5) {
      hookStartY = hookPos.y;
      hookTargetY = targetY;
      hookAnimDuration = duration;
      hookAnimTime = 0;
      hookAnimating = true;
    }

    const fishColors = [0xff4444, 0xff9933, 0xffff44, 0x44dd66, 0xaa55ff];
    const fishes = [];
    const fishGroup = new THREE.Group();
    scene.add(fishGroup);

    for (let i = 0; i < 5; i++) {
      const angle = Math.random() * Math.PI * 2;
      const radius = Math.random() * 3.8;
      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;

      const fishMat = new THREE.MeshStandardMaterial({ color: fishColors[i] });
      const fish = new THREE.Mesh(
        new THREE.SphereGeometry(0.25, 16, 12),
        fishMat
      );
      fish.scale.set(1.5, 0.7, 0.8);
      fish.position.set(x, 0, z);
      fish.castShadow = true;

      fish.userData = {
        angle: Math.random() * Math.PI * 2,
        speed: 0.3 + Math.random() * 0.3,
        turnRate: 0.4 + Math.random() * 0.6,
        phase: Math.random() * Math.PI * 2,
        radiusBias: 1 + Math.random() * 2.5,
        caught: false,
        biting: false
      };

      fishes.push(fish);
      fishGroup.add(fish);
    }

    let mixer = null;
    let flamingoLoaded = false;
    const loader = new GLTFLoader();
    loader.load(
      "https://threejs.org/examples/models/gltf/Flamingo.glb",
      (gltf) => {
        const flamingo = gltf.scene;
        flamingo.scale.setScalar(0.015);
        flamingo.position.set(-6, 0, -3);
        flamingo.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        scene.add(flamingo);

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(flamingo);
          mixer.clipAction(gltf.animations[0]).play();
        }
        flamingoLoaded = true;
      }
    );

    const keys = {
      ArrowLeft: false,
      ArrowRight: false
    };

    let gameState = "idle";
    let score = 0;
    let missedFish = 0;
    let castCount = 0;
    let caughtFish = null;
    let biteTimer = 0;
    let statusMessage = "Cast with SPACE";

    const hudScore = document.getElementById("hud-score");
    const hudRemaining = document.getElementById("hud-remaining");
    const hudStatus = document.getElementById("hud-status");
    const hudMissed = document.getElementById("hud-missed");

    function updateHUD() {
      hudScore.textContent = `Score: ${score}`;
      hudRemaining.textContent = `Fish Remaining: ${fishes.filter(f => !f.userData.caught).length}`;
      hudStatus.textContent = statusMessage;
      hudMissed.textContent = `Missed: ${missedFish}`;
    }

    function setState(state, message) {
      gameState = state;
      statusMessage = message;
      updateHUD();
    }

    function cancelCast(message = "Cast with SPACE") {
      caughtFish = null;
      biteTimer = 0;
      animateHookTo(1, 0.25);
      setState("idle", message);
      fishes.forEach(f => f.userData.biting = false);
    }

    window.addEventListener("keydown", (e) => {
      if (e.code === "ArrowLeft") keys.ArrowLeft = true;
      if (e.code === "ArrowRight") keys.ArrowRight = true;

      if (e.code === "Space") {
        e.preventDefault();
        if (gameState === "idle") {
          castCount++;
          animateHookTo(-0.1, 0.5);
          setState("casting", "Casting...");
        }
      }

      if (e.code === "KeyR") {
        if (gameState === "biting" && caughtFish) {
          setState("reeling", "Caught one!");
          animateHookTo(1, 0.5);
        }
      }

      if (e.code === "KeyE") {
        cancelCast("Cast cancelled");
      }
    });

    window.addEventListener("keyup", (e) => {
      if (e.code === "ArrowLeft") keys.ArrowLeft = false;
      if (e.code === "ArrowRight") keys.ArrowRight = false;
    });

    function updateFish(dt, elapsed) {
      for (const fish of fishes) {
        if (fish.userData.caught || fish.userData.biting) continue;

        const d = fish.userData;
        d.phase += dt * d.speed;
        d.angle += Math.sin(elapsed * d.turnRate + d.phase) * dt * 0.8;

        fish.position.x += Math.cos(d.angle) * d.speed * dt;
        fish.position.z += Math.sin(d.angle) * d.speed * dt;

        fish.position.x += Math.sin(elapsed * 0.9 + d.phase) * 0.01;
        fish.position.z += Math.cos(elapsed * 0.7 + d.phase * 1.3) * 0.01;

        const dist = Math.sqrt(fish.position.x * fish.position.x + fish.position.z * fish.position.z);
        if (dist > pondRadius) {
          const nx = fish.position.x / dist;
          const nz = fish.position.z / dist;
          fish.position.x = nx * pondRadius;
          fish.position.z = nz * pondRadius;
          d.angle += Math.PI * 0.7;
        }

        fish.rotation.y = -d.angle;
        fish.position.y = 0.02 + Math.sin(elapsed * 3 + d.phase) * 0.03;
      }
    }

    function updateHook(dt) {
      const tip = getRodTipWorld();

      if (gameState === "idle") {
        hookPos.x = tip.x;
        hookPos.z = tip.z;
      }

      if (hookAnimating) {
        hookAnimTime += dt;
        const t = Math.min(hookAnimTime / hookAnimDuration, 1);
        const smooth = t * t * (3 - 2 * t);
        hookPos.y = THREE.MathUtils.lerp(hookStartY, hookTargetY, smooth);
        hookPos.x = tip.x;
        hookPos.z = tip.z;

        if (t >= 1) {
          hookAnimating = false;
          hookPos.y = hookTargetY;

          if (gameState === "casting" && hookTargetY <= -0.1) {
            setState("waiting", "Waiting for bite...");
          } else if (gameState === "reeling" && hookTargetY >= 1) {
            if (caughtFish) {
              caughtFish.userData.caught = true;
              fishGroup.remove(caughtFish);
              const idx = fishes.indexOf(caughtFish);
              if (idx >= 0) fishes.splice(idx, 1);
              score++;
              caughtFish = null;
            }
            setState("idle", "Caught one!");
            setTimeout(() => {
              if (gameState === "idle") {
                statusMessage = "Cast with SPACE";
                updateHUD();
              }
            }, 1000);
          } else if (gameState === "idle" && hookTargetY >= 1) {
            statusMessage = "Cast with SPACE";
            updateHUD();
          }
        }
      } else {
        if (gameState === "idle") {
          hookPos.y = 1;
        }
        if (gameState === "waiting" || gameState === "biting" || gameState === "reeling") {
          hookPos.x = tip.x;
          hookPos.z = tip.z;
        }
      }

      hook.position.copy(hookPos);
    }

    function updateBiteCheck(dt) {
      if (gameState === "waiting") {
        for (const fish of fishes) {
          if (fish.userData.caught) continue;
          const dx = fish.position.x - hookPos.x;
          const dz = fish.position.z - hookPos.z;
          const dist = Math.sqrt(dx * dx + dz * dz);
          if (dist < 1.0) {
            caughtFish = fish;
            fish.userData.biting = true;
            biteTimer = 3;
            setState("biting", "BITE! Press R to reel!");
            break;
          }
        }
      } else if (gameState === "biting") {
        biteTimer -= dt;
        if (caughtFish) {
          caughtFish.position.x = THREE.MathUtils.lerp(caughtFish.position.x, hookPos.x, 0.08);
          caughtFish.position.z = THREE.MathUtils.lerp(caughtFish.position.z, hookPos.z, 0.08);
          caughtFish.position.y = 0.02;
        }

        if (biteTimer <= 0) {
          if (caughtFish) {
            caughtFish.userData.biting = false;
            caughtFish = null;
          }
          missedFish++;
          animateHookTo(1, 0.35);
          setState("idle", "It got away!");
          setTimeout(() => {
            if (gameState === "idle") {
              statusMessage = "Cast with SPACE";
              updateHUD();
            }
          }, 1000);
        }
      } else if (gameState === "reeling" && caughtFish) {
        caughtFish.position.x = hookPos.x;
        caughtFish.position.z = hookPos.z;
        caughtFish.position.y = hookPos.y + 0.15;
      }
    }

    function updateFishingLine() {
      const tip = getRodTipWorld();
      const positions = fishingLine.geometry.attributes.position.array;
      positions[0] = tip.x;
      positions[1] = tip.y;
      positions[2] = tip.z;
      positions[3] = hook.position.x;
      positions[4] = hook.position.y;
      positions[5] = hook.position.z;
      fishingLine.geometry.attributes.position.needsUpdate = true;
    }

    window.__3D_STATE__ = {
      gameState: "idle",
      score: 0,
      fishRemaining: 5,
      missedFish: 0,
      hookY: 1,
      rodAngle: 0,
      fishPositions: [],
      flamingoLoaded: false,
      castCount: 0
    };

    function updateDebugState() {
      window.__3D_STATE__.gameState = gameState;
      window.__3D_STATE__.score = score;
      window.__3D_STATE__.fishRemaining = fishes.filter(f => !f.userData.caught).length;
      window.__3D_STATE__.missedFish = missedFish;
      window.__3D_STATE__.hookY = hookPos.y;
      window.__3D_STATE__.rodAngle = rodAngle;
      window.__3D_STATE__.fishPositions = fishes.map(f => ({
        x: f.position.x,
        z: f.position.z
      }));
      window.__3D_STATE__.flamingoLoaded = flamingoLoaded;
      window.__3D_STATE__.castCount = castCount;
    }

    updateHUD();

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);
      const elapsed = clock.elapsedTime;

      if (keys.ArrowLeft) rodAngle += 1.5 * dt;
      if (keys.ArrowRight) rodAngle -= 1.5 * dt;
      updateRodOrbit();

      updateFish(dt, elapsed);
      updateHook(dt);
      updateBiteCheck(dt);
      updateFishingLine();

      if (mixer) mixer.update(dt);

      updateHUD();
      updateDebugState();

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
