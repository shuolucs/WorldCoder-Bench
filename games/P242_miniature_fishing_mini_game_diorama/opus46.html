<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fishing Mini-Game Diorama</title>
<style>
body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }
canvas { display: block; }
#hud-score {
    position: absolute; top: 20px; left: 20px;
    color: white; font-size: 24px; font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}
#hud-remaining {
    position: absolute; top: 20px; right: 20px;
    color: white; font-size: 24px; font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}
#hud-status {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: white; font-size: 28px; font-weight: bold;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
    pointer-events: none;
    transition: opacity 0.3s;
}
#hud-missed {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #ff9999; font-size: 20px; font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}
#hud-controls {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.6); font-size: 14px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    text-align: center;
}
</style>
</head>
<body>

<div id="hud-score">Score: 0</div>
<div id="hud-remaining">Fish Remaining: 5</div>
<div id="hud-status">Cast with SPACE</div>
<div id="hud-missed">Missed: 0</div>
<div id="hud-controls">← → Rotate Rod | SPACE Cast | R Reel | E Cancel</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 20, 40);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
directionalLight.shadow.camera.near = 0.5;
directionalLight.shadow.camera.far = 30;
directionalLight.shadow.camera.left = -10;
directionalLight.shadow.camera.right = 10;
directionalLight.shadow.camera.top = 10;
directionalLight.shadow.camera.bottom = -10;
scene.add(directionalLight);

// Ground plane
const groundGeometry = new THREE.PlaneGeometry(20, 20);
const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x44aa44, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.15;
ground.receiveShadow = true;
scene.add(ground);

// Pond
const pondGeometry = new THREE.CylinderGeometry(5, 5, 0.3, 64);
const pondMaterial = new THREE.MeshPhysicalMaterial({
    color: 0x2288cc,
    opacity: 0.6,
    transparent: true,
    roughness: 0.1,
    metalness: 0.1,
    clearcoat: 1.0,
    clearcoatRoughness: 0.1,
});
const pond = new THREE.Mesh(pondGeometry, pondMaterial);
pond.position.y = 0;
pond.receiveShadow = true;
scene.add(pond);

// Pond bottom
const pondBottomGeometry = new THREE.CylinderGeometry(4.9, 4.9, 0.05, 64);
const pondBottomMaterial = new THREE.MeshStandardMaterial({ color: 0x1a5566, roughness: 0.9 });
const pondBottom = new THREE.Mesh(pondBottomGeometry, pondBottomMaterial);
pondBottom.position.y = -0.2;
scene.add(pondBottom);

// Some decorative rocks around the pond
function createRock(x, z, scale) {
    const rockGeo = new THREE.DodecahedronGeometry(0.3 * scale, 1);
    const rockMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9, flatShading: true });
    const rock = new THREE.Mesh(rockGeo, rockMat);
    rock.position.set(x, -0.05, z);
    rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
    rock.castShadow = true;
    rock.receiveShadow = true;
    scene.add(rock);
}
for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2 + Math.random() * 0.3;
    const r = 5.2 + Math.random() * 0.5;
    createRock(Math.cos(angle) * r, Math.sin(angle) * r, 0.8 + Math.random() * 1.2);
}

// Small trees/bushes
function createTree(x, z) {
    const trunkGeo = new THREE.CylinderGeometry(0.1, 0.15, 1, 8);
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.set(x, 0.35, z);
    trunk.castShadow = true;
    scene.add(trunk);

    const leavesGeo = new THREE.SphereGeometry(0.6, 8, 8);
    const leavesMat = new THREE.MeshStandardMaterial({ color: 0x228B22, flatShading: true });
    const leaves = new THREE.Mesh(leavesGeo, leavesMat);
    leaves.position.set(x, 1.1, z);
    leaves.castShadow = true;
    scene.add(leaves);
}
createTree(-7, -5);
createTree(7, -4);
createTree(-5, -7);
createTree(6, -6);

// Flamingo
let flamingoMixer = null;
let flamingoLoaded = false;
const loader = new GLTFLoader();
loader.load('https://threejs.org/examples/models/gltf/Flamingo.glb', (gltf) => {
    const flamingo = gltf.scene;
    flamingo.scale.set(0.015, 0.015, 0.015);
    flamingo.position.set(-6, 0, -3);
    flamingo.rotation.y = Math.PI / 4;
    flamingo.traverse((child) => {
        if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
        }
    });
    scene.add(flamingo);
    flamingoLoaded = true;

    if (gltf.animations && gltf.animations.length > 0) {
        flamingoMixer = new THREE.AnimationMixer(flamingo);
        const action = flamingoMixer.clipAction(gltf.animations[0]);
        action.play();
    }
}, undefined, (error) => {
    console.error('Error loading flamingo:', error);
    flamingoLoaded = false;
});

// Fishing Rod
let rodAngle = 0;
const rodRadius = 6;
const rodGroup = new THREE.Group();

// Rod stick
const rodStickGeo = new THREE.CylinderGeometry(0.05, 0.05, 3, 8);
const rodStickMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
const rodStick = new THREE.Mesh(rodStickGeo, rodStickMat);
rodStick.castShadow = true;
rodGroup.add(rodStick);

// Rod handle (slightly thicker at bottom)
const handleGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.5, 8);
const handleMat = new THREE.MeshStandardMaterial({ color: 0x4a2800 });
const handle = new THREE.Mesh(handleGeo, handleMat);
handle.position.y = -1.25;
rodGroup.add(handle);

// Tilt the rod at 45 degrees
rodGroup.rotation.x = -Math.PI / 4;
rodGroup.position.set(0, 1, rodRadius);

const rodPivot = new THREE.Group();
rodPivot.add(rodGroup);
scene.add(rodPivot);

// Fishing line
const lineGeometry = new THREE.BufferGeometry();
const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
const linePositions = new Float32Array(6);
lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
const fishingLine = new THREE.Line(lineGeometry, lineMaterial);
scene.add(fishingLine);

// Hook (small sphere)
const hookGeo = new THREE.SphereGeometry(0.1, 8, 8);
const hookMat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.8, roughness: 0.2 });
const hook = new THREE.Mesh(hookGeo, hookMat);
let hookY = 1;
scene.add(hook);

// Fish
const fishColors = [0xff3333, 0xff8833, 0xffdd33, 0x33cc33, 0x9933ff];
const fishArray = [];

function createFish(color, index) {
    const fishGroup = new THREE.Group();

    // Body
    const bodyGeo = new THREE.SphereGeometry(0.2, 12, 8);
    bodyGeo.scale(1.5, 0.8, 1);
    const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.2 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    fishGroup.add(body);

    // Tail
    const tailGeo = new THREE.ConeGeometry(0.15, 0.3, 4);
    const tailMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3 });
    const tail = new THREE.Mesh(tailGeo, tailMat);
    tail.rotation.z = Math.PI / 2;
    tail.position.x = -0.35;
    fishGroup.add(tail);

    // Eye
    const eyeGeo = new THREE.SphereGeometry(0.04, 8, 8);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const eye = new THREE.Mesh(eyeGeo, eyeMat);
    eye.position.set(0.2, 0.05, 0.12);
    fishGroup.add(eye);

    const pupilGeo = new THREE.SphereGeometry(0.02, 8, 8);
    const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
    const pupil = new THREE.Mesh(pupilGeo, pupilMat);
    pupil.position.set(0.23, 0.05, 0.13);
    fishGroup.add(pupil);

    // Random starting position within pond
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * 3.5 + 0.5;
    fishGroup.position.set(Math.cos(angle) * r, 0, Math.sin(angle) * r);
    fishGroup.rotation.y = angle;

    scene.add(fishGroup);

    return {
        mesh: fishGroup,
        angle: angle,
        speed: 0.3 + Math.random() * 0.3,
        turnRate: 0.5 + Math.random() * 1.0,
        phase: Math.random() * Math.PI * 2,
        wanderAngle: Math.random() * Math.PI * 2,
        caught: false,
        biting: false,
        x: fishGroup.position.x,
        z: fishGroup.position.z
    };
}

for (let i = 0; i < 5; i++) {
    fishArray.push(createFish(fishColors[i], i));
}

// Game State
let gameState = 'idle';
let score = 0;
let missedFish = 0;
let castCount = 0;
let biteTimer = 0;
let bitingFishIndex = -1;
let statusTimeout = null;

const keys = {};

// HUD elements
const hudScore = document.getElementById('hud-score');
const hudRemaining = document.getElementById('hud-remaining');
const hudStatus = document.getElementById('hud-status');
const hudMissed = document.getElementById('hud-missed');

function updateHUD() {
    const remaining = fishArray.filter(f => !f.caught).length;
    hudScore.textContent = `Score: ${score}`;
    hudRemaining.textContent = `Fish Remaining: ${remaining}`;
    hudMissed.textContent = `Missed: ${missedFish}`;
}

function setStatus(text, duration) {
    hudStatus.textContent = text;
    hudStatus.style.opacity = '1';
    if (statusTimeout) clearTimeout(statusTimeout);
    if (duration) {
        statusTimeout = setTimeout(() => {
            if (gameState === 'idle') {
                hudStatus.textContent = 'Cast with SPACE';
            }
        }, duration);
    }
}

// Input handling
window.addEventListener('keydown', (e) => {
    keys[e.code] = true;

    if (e.code === 'Space' && gameState === 'idle') {
        e.preventDefault();
        gameState = 'casting';
        castCount++;
        setStatus('Casting...');
    }

    if (e.code === 'KeyR' && gameState === 'biting') {
        e.preventDefault();
        gameState = 'reeling';
        // Catch the fish
        if (bitingFishIndex >= 0 && bitingFishIndex < fishArray.length) {
            const fish = fishArray[bitingFishIndex];
            fish.caught = true;
            fish.biting = false;
            scene.remove(fish.mesh);
            score++;
            setStatus('Caught one! 🐟', 2000);
        }
        bitingFishIndex = -1;
        biteTimer = 0;
        // Reel hook back up
        hookY = 1;
        gameState = 'idle';
        updateHUD();

        const remaining = fishArray.filter(f => !f.caught).length;
        if (remaining === 0) {
            setStatus('All fish caught! You win! 🎉');
        }
    }

    if (e.code === 'KeyE') {
        e.preventDefault();
        // Cancel / reset
        if (bitingFishIndex >= 0 && bitingFishIndex < fishArray.length) {
            fishArray[bitingFishIndex].biting = false;
        }
        bitingFishIndex = -1;
        biteTimer = 0;
        hookY = 1;
        gameState = 'idle';
        setStatus('Cast with SPACE');
    }
});

window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
});

// Window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Water ripple effect - small circles on the pond surface
const ripples = [];
function createRipple(x, z) {
    const rippleGeo = new THREE.RingGeometry(0.05, 0.1, 16);
    const rippleMat = new THREE.MeshBasicMaterial({ color: 0xaaddff, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
    const ripple = new THREE.Mesh(rippleGeo, rippleMat);
    ripple.rotation.x = -Math.PI / 2;
    ripple.position.set(x, 0.16, z);
    scene.add(ripple);
    ripples.push({ mesh: ripple, life: 1.0, speed: 2.0 });
}

// Expose state
window.__3D_STATE__ = {
    gameState: 'idle',
    score: 0,
    fishRemaining: 5,
    missedFish: 0,
    hookY: 1,
    rodAngle: 0,
    fishPositions: [],
    flamingoLoaded: false,
    castCount: 0
};

// Rod tip world position helper
function getRodTipWorldPos() {
    // The rod stick is 3 units tall, centered, so tip is at local y=1.5
    // The rod group is tilted 45 degrees on x
    // We need to compute the world position of the tip
    const tipLocal = new THREE.Vector3(0, 1.5, 0);
    rodStick.localToWorld(tipLocal);
    return tipLocal;
}

// Hook position based on rod angle
function getHookBasePosition() {
    // Hook should be roughly below the rod tip, projected onto the pond
    const tipPos = getRodTipWorldPos();
    return { x: tipPos.x, z: tipPos.z };
}

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const time = clock.getElapsedTime();

    // Flamingo animation
    if (flamingoMixer) {
        flamingoMixer.update(delta);
    }

    // Rod rotation
    if (keys['ArrowLeft']) {
        rodAngle += 1.5 * delta;
    }
    if (keys['ArrowRight']) {
        rodAngle -= 1.5 * delta;
    }

    // Update rod position
    rodPivot.rotation.y = rodAngle;

    // Get rod tip world position
    const rodTipPos = getRodTipWorldPos();

    // Hook position
    const hookBasePos = getHookBasePosition();

    // Casting animation
    if (gameState === 'casting') {
        hookY = THREE.MathUtils.lerp(hookY, -0.1, delta * 4);
        if (hookY <= -0.05) {
            hookY = -0.1;
            gameState = 'waiting';
            setStatus('Waiting for bite...');
            createRipple(hookBasePos.x, hookBasePos.z);
        }
    }

    // Update hook position
    hook.position.set(hookBasePos.x, hookY, hookBasePos.z);

    // Update fishing line
    const positions = fishingLine.geometry.attributes.position.array;
    positions[0] = rodTipPos.x;
    positions[1] = rodTipPos.y;
    positions[2] = rodTipPos.z;
    positions[3] = hook.position.x;
    positions[4] = hook.position.y;
    positions[5] = hook.position.z;
    fishingLine.geometry.attributes.position.needsUpdate = true;

    // Fish movement
    const activeFish = fishArray.filter(f => !f.caught);
    for (let i = 0; i < fishArray.length; i++) {
        const fish = fishArray[i];
        if (fish.caught) continue;

        if (!fish.biting) {
            // Wandering movement
            fish.phase += delta;
            fish.wanderAngle += Math.sin(fish.phase * fish.turnRate) * delta * 1.5;

            const dx = Math.cos(fish.wanderAngle) * fish.speed * delta;
            const dz = Math.sin(fish.wanderAngle) * fish.speed * delta;

            let newX = fish.mesh.position.x + dx;
            let newZ = fish.mesh.position.z + dz;

            // Keep within pond radius
            const dist = Math.sqrt(newX * newX + newZ * newZ);
            if (dist > 4.5) {
                // Turn back toward center
                fish.wanderAngle = Math.atan2(-newZ, -newX) + (Math.random() - 0.5) * 0.5;
                newX = fish.mesh.position.x;
                newZ = fish.mesh.position.z;
            }

            fish.mesh.position.x = newX;
            fish.mesh.position.z = newZ;
            fish.mesh.position.y = Math.sin(time * 2 + fish.phase) * 0.03;

            // Face direction of movement
            fish.mesh.rotation.y = fish.wanderAngle;

            // Tail wiggle
            fish.mesh.children[1].rotation.y = Math.sin(time * 8 + fish.phase) * 0.3;
        }

        fish.x = fish.mesh.position.x;
        fish.z = fish.mesh.position.z;
    }

    // Check for bites
    if (gameState === 'waiting') {
        for (let i = 0; i < fishArray.length; i++) {
            const fish = fishArray[i];
            if (fish.caught || fish.biting) continue;

            const dx = fish.mesh.position.x - hook.position.x;
            const dz = fish.mesh.position.z - hook.position.z;
            const distXZ = Math.sqrt(dx * dx + dz * dz);

            if (distXZ < 1.0) {
                // Bite!
                fish.biting = true;
                bitingFishIndex = i;
                biteTimer = 3.0;
                gameState = 'biting';
                setStatus('BITE! Press R to reel!');
                createRipple(hook.position.x, hook.position.z);
                break;
            }
        }

        // Occasional ripples near hook
        if (Math.random() < 0.01) {
            createRipple(hook.position.x + (Math.random() - 0.5) * 0.5, hook.position.z + (Math.random() - 0.5) * 0.5);
        }
    }

    // Bite timer
    if (gameState === 'biting') {
        biteTimer -= delta;

        // Make the biting fish wiggle near the hook
        if (bitingFishIndex >= 0) {
            const fish = fishArray[bitingFishIndex];
            fish.mesh.position.x = hook.position.x + Math.sin(time * 10) * 0.15;
            fish.mesh.position.z = hook.position.z + Math.cos(time * 10) * 0.15;
            fish.mesh.rotation.y = time * 5;
        }

        if (biteTimer <= 0) {
            // Fish escapes
            if (bitingFishIndex >= 0) {
                fishArray[bitingFishIndex].biting = false;
            }
            bitingFishIndex = -1;
            missedFish++;
            hookY = 1;
            gameState = 'idle';
            setStatus('It got away!', 2000);
            updateHUD();
        }
    }

    // Update ripples
    for (let i = ripples.length - 1; i >= 0; i--) {
        const ripple = ripples[i];
        ripple.life -= delta * 0.8;
        ripple.mesh.scale.set(1 + (1 - ripple.life) * 3, 1 + (1 - ripple.life) * 3, 1);
        ripple.mesh.material.opacity = ripple.life * 0.5;
        if (ripple.life <= 0) {
            scene.remove(ripple.mesh);
            ripple.mesh.geometry.dispose();
            ripple.mesh.material.dispose();
            ripples.splice(i, 1);
        }
    }

    // Water surface animation - subtle vertex displacement on pond
    pond.position.y = Math.sin(time * 0.5) * 0.02;

    // Update global state
    const remaining = fishArray.filter(f => !f.caught).length;
    window.__3D_STATE__ = {
        gameState: gameState,
        score: score,
        fishRemaining: remaining,
        missedFish: missedFish,
        hookY: hookY,
        rodAngle: rodAngle,
        fishPositions: fishArray.filter(f => !f.caught).map(f => ({ x: f.x, z: f.z })),
        flamingoLoaded: flamingoLoaded,
        castCount: castCount
    };

    updateHUD();
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
