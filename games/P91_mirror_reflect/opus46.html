<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three.js Mirror Room</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #controls {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(15, 15, 25, 0.88);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 20px;
    color: #e0e0e0;
    width: 280px;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  #controls h2 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
    color: #fff;
    letter-spacing: 0.5px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 10px;
  }

  .control-group {
    margin-bottom: 14px;
  }

  .control-group label {
    display: block;
    font-size: 12px;
    color: #aaa;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.15);
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #6ea8fe;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(110,168,254,0.5);
  }

  .range-value {
    float: right;
    font-size: 12px;
    color: #6ea8fe;
    font-weight: 600;
  }

  select, input[type="color"] {
    width: 100%;
    padding: 8px 10px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }

  select:hover, input[type="color"]:hover {
    border-color: rgba(110,168,254,0.5);
  }

  input[type="color"] {
    height: 38px;
    padding: 4px;
  }

  #fps-display {
    position: fixed;
    top: 16px;
    left: 16px;
    background: rgba(15, 15, 25, 0.85);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 16px;
    color: #6ea8fe;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: 700;
    z-index: 100;
  }

  .color-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .color-row input[type="color"] {
    width: 50px;
    flex-shrink: 0;
  }

  .color-row span {
    font-size: 12px;
    color: #888;
    font-family: monospace;
  }
</style>
</head>
<body>

<div id="fps-display">FPS: --</div>

<div id="controls">
  <h2>🪞 Mirror Room Controls</h2>

  <div class="control-group">
    <label>Reflectivity <span class="range-value" id="reflectivityValue">0.80</span></label>
    <input type="range" id="reflectivity" min="0" max="1" step="0.01" value="0.80">
  </div>

  <div class="control-group">
    <label>Object Color</label>
    <select id="objectColorSelect">
      <option value="all">All Objects</option>
      <option value="box">Box</option>
      <option value="sphere">Sphere</option>
      <option value="cone">Cone</option>
      <option value="cylinder">Cylinder</option>
      <option value="torus">Torus</option>
    </select>
    <div style="margin-top:8px;">
      <input type="color" id="objectColor" value="#ff6644">
    </div>
  </div>

  <div class="control-group">
    <label>Mirror Tint</label>
    <div class="color-row">
      <input type="color" id="mirrorTint" value="#ffffff">
      <span id="mirrorTintHex">#ffffff</span>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Reflector } from 'three/addons/objects/Reflector.js';

// ── State ──
window.__3D_STATE__ = {
  mirrorReflectivity: 0.8,
  mirrorTint: '#ffffff',
  objectCount: 5,
  objects: [],
  fps: 0
};

// ── Scene Setup ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 15, 30);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3.5, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 1.5, 0);
controls.maxPolarAngle = Math.PI * 0.85;
controls.minDistance = 2;
controls.maxDistance = 14;

// ── Room Dimensions ──
const roomW = 10, roomH = 6, roomD = 10;

// ── Materials ──
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x3a3a4a,
  roughness: 0.6,
  metalness: 0.1
});

const wallMat = new THREE.MeshStandardMaterial({
  color: 0x4a4a5e,
  roughness: 0.8,
  metalness: 0.05,
  side: THREE.DoubleSide
});

const ceilingMat = new THREE.MeshStandardMaterial({
  color: 0x555570,
  roughness: 0.9,
  metalness: 0.0
});

// ── Floor ──
const floor = new THREE.Mesh(new THREE.PlaneGeometry(roomW, roomD), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// ── Ceiling ──
const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(roomW, roomD), ceilingMat);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.y = roomH;
scene.add(ceiling);

// ── Back Wall ──
const backWall = new THREE.Mesh(new THREE.PlaneGeometry(roomW, roomH), wallMat);
backWall.position.set(0, roomH / 2, -roomD / 2);
backWall.receiveShadow = true;
scene.add(backWall);

// ── Left Wall ──
const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(roomD, roomH), wallMat);
leftWall.position.set(-roomW / 2, roomH / 2, 0);
leftWall.rotation.y = Math.PI / 2;
leftWall.receiveShadow = true;
scene.add(leftWall);

// ── Right Wall (Mirror) ──
const mirrorGeometry = new THREE.PlaneGeometry(roomD, roomH);
const mirror = new Reflector(mirrorGeometry, {
  clipBias: 0.003,
  textureWidth: window.innerWidth * window.devicePixelRatio,
  textureHeight: window.innerHeight * window.devicePixelRatio,
  color: 0xffffff
});
mirror.position.set(roomW / 2, roomH / 2, 0);
mirror.rotation.y = -Math.PI / 2;
scene.add(mirror);

// Mirror frame
const frameMat = new THREE.MeshStandardMaterial({ color: 0x888899, metalness: 0.8, roughness: 0.2 });
const frameThickness = 0.08;
const frameDepth = 0.05;

// Top frame
const topFrame = new THREE.Mesh(new THREE.BoxGeometry(roomD + frameThickness * 2, frameThickness, frameDepth), frameMat);
topFrame.position.set(roomW / 2 - frameDepth / 2, roomH / 2 + roomH / 2 + frameThickness / 2, 0);
topFrame.rotation.y = -Math.PI / 2;
scene.add(topFrame);

// Bottom frame
const bottomFrame = topFrame.clone();
bottomFrame.position.y = roomH / 2 - roomH / 2 - frameThickness / 2;
scene.add(bottomFrame);

// ── Overlay plane for reflectivity & tint control ──
const overlayMat = new THREE.MeshBasicMaterial({
  color: 0xffffff,
  transparent: true,
  opacity: 0.0,
  side: THREE.DoubleSide,
  depthWrite: false
});
const overlayPlane = new THREE.Mesh(new THREE.PlaneGeometry(roomD, roomH), overlayMat);
overlayPlane.position.set(roomW / 2 - 0.001, roomH / 2, 0);
overlayPlane.rotation.y = -Math.PI / 2;
scene.add(overlayPlane);

// ── Lights ──
const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambientLight);

const mainLight = new THREE.PointLight(0xffeedd, 40, 20);
mainLight.position.set(0, roomH - 0.5, 0);
mainLight.castShadow = true;
mainLight.shadow.mapSize.set(1024, 1024);
mainLight.shadow.bias = -0.001;
scene.add(mainLight);

// Light bulb visual
const bulbGeo = new THREE.SphereGeometry(0.15, 16, 16);
const bulbMat = new THREE.MeshBasicMaterial({ color: 0xffeedd });
const bulb = new THREE.Mesh(bulbGeo, bulbMat);
bulb.position.copy(mainLight.position);
scene.add(bulb);

const fillLight = new THREE.PointLight(0x6688cc, 15, 15);
fillLight.position.set(-3, 2, 3);
scene.add(fillLight);

const accentLight = new THREE.SpotLight(0xff8866, 20, 12, Math.PI / 6, 0.5);
accentLight.position.set(2, 5, -2);
accentLight.target.position.set(0, 0, 0);
accentLight.castShadow = true;
scene.add(accentLight);
scene.add(accentLight.target);

// ── Objects ──
const objectsData = [];
const objectMeshes = [];

function createObjects() {
  // Box
  const boxGeo = new THREE.BoxGeometry(1, 1, 1);
  const boxMat = new THREE.MeshStandardMaterial({ color: 0xff6644, roughness: 0.4, metalness: 0.3 });
  const box = new THREE.Mesh(boxGeo, boxMat);
  box.position.set(-2, 0.5, -2);
  box.rotation.y = Math.PI / 6;
  box.castShadow = true;
  box.receiveShadow = true;
  box.userData.name = 'box';
  scene.add(box);
  objectMeshes.push(box);

  // Sphere
  const sphereGeo = new THREE.SphereGeometry(0.6, 32, 32);
  const sphereMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, roughness: 0.2, metalness: 0.6 });
  const sphere = new THREE.Mesh(sphereGeo, sphereMat);
  sphere.position.set(2, 0.6, -1);
  sphere.castShadow = true;
  sphere.receiveShadow = true;
  sphere.userData.name = 'sphere';
  scene.add(sphere);
  objectMeshes.push(sphere);

  // Cone
  const coneGeo = new THREE.ConeGeometry(0.5, 1.2, 32);
  const coneMat = new THREE.MeshStandardMaterial({ color: 0x44ff88, roughness: 0.5, metalness: 0.2 });
  const cone = new THREE.Mesh(coneGeo, coneMat);
  cone.position.set(-1, 0.6, 2);
  cone.castShadow = true;
  cone.receiveShadow = true;
  cone.userData.name = 'cone';
  scene.add(cone);
  objectMeshes.push(cone);

  // Cylinder
  const cylGeo = new THREE.CylinderGeometry(0.4, 0.4, 1.5, 32);
  const cylMat = new THREE.MeshStandardMaterial({ color: 0xffaa22, roughness: 0.35, metalness: 0.4 });
  const cyl = new THREE.Mesh(cylGeo, cylMat);
  cyl.position.set(1.5, 0.75, 2.5);
  cyl.castShadow = true;
  cyl.receiveShadow = true;
  cyl.userData.name = 'cylinder';
  scene.add(cyl);
  objectMeshes.push(cyl);

  // Torus
  const torusGeo = new THREE.TorusGeometry(0.5, 0.18, 24, 48);
  const torusMat = new THREE.MeshStandardMaterial({ color: 0xcc44ff, roughness: 0.3, metalness: 0.5 });
  const torus = new THREE.Mesh(torusGeo, torusMat);
  torus.position.set(0, 1.2, -0.5);
  torus.rotation.x = Math.PI / 4;
  torus.castShadow = true;
  torus.receiveShadow = true;
  torus.userData.name = 'torus';
  scene.add(torus);
  objectMeshes.push(torus);
}

createObjects();

// ── UI Elements ──
const reflectivitySlider = document.getElementById('reflectivity');
const reflectivityValue = document.getElementById('reflectivityValue');
const objectColorSelect = document.getElementById('objectColorSelect');
const objectColorInput = document.getElementById('objectColor');
const mirrorTintInput = document.getElementById('mirrorTint');
const mirrorTintHex = document.getElementById('mirrorTintHex');
const fpsDisplay = document.getElementById('fps-display');

// ── Reflectivity Control ──
function updateReflectivity(val) {
  window.__3D_STATE__.mirrorReflectivity = val;
  reflectivityValue.textContent = val.toFixed(2);

  // Control overlay opacity: at reflectivity=1 overlay is fully transparent (full reflection)
  // At reflectivity=0 overlay is opaque (blocks reflection)
  overlayMat.opacity = 1.0 - val;

  // Also update the Reflector's internal shader color based on tint
  updateMirrorTint(mirrorTintInput.value);
}

reflectivitySlider.addEventListener('input', (e) => {
  updateReflectivity(parseFloat(e.target.value));
});

// ── Object Color Control ──
objectColorInput.addEventListener('input', () => {
  const colorHex = objectColorInput.value;
  const target = objectColorSelect.value;

  if (target === 'all') {
    objectMeshes.forEach(mesh => {
      mesh.material.color.set(colorHex);
    });
  } else {
    const mesh = objectMeshes.find(m => m.userData.name === target);
    if (mesh) {
      mesh.material.color.set(colorHex);
    }
  }
});

// ── Mirror Tint Control ──
function updateMirrorTint(hexColor) {
  window.__3D_STATE__.mirrorTint = hexColor;
  mirrorTintHex.textContent = hexColor;

  // Apply tint to the overlay
  const tintColor = new THREE.Color(hexColor);
  overlayMat.color.copy(tintColor);

  // Also modify the Reflector's color uniform
  if (mirror.material && mirror.material.uniforms && mirror.material.uniforms.color) {
    // Blend tint with reflectivity
    mirror.material.uniforms.color.value.copy(tintColor);
  }
}

mirrorTintInput.addEventListener('input', () => {
  updateMirrorTint(mirrorTintInput.value);
});

// ── FPS Counter ──
let frameCount = 0;
let lastFpsTime = performance.now();
let currentFps = 0;

function updateFps() {
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    currentFps = Math.round(frameCount * 1000 / (now - lastFpsTime));
    frameCount = 0;
    lastFpsTime = now;
    fpsDisplay.textContent = `FPS: ${currentFps}`;
  }
}

// ── Update State ──
function updateState() {
  const reflectivity = parseFloat(reflectivitySlider.value);

  window.__3D_STATE__.mirrorReflectivity = reflectivity;
  window.__3D_STATE__.mirrorTint = mirrorTintInput.value;
  window.__3D_STATE__.objectCount = objectMeshes.length;
  window.__3D_STATE__.fps = currentFps;

  window.__3D_STATE__.objects = objectMeshes.map(mesh => ({
    name: mesh.userData.name,
    x: parseFloat(mesh.position.x.toFixed(3)),
    y: parseFloat(mesh.position.y.toFixed(3)),
    z: parseFloat(mesh.position.z.toFixed(3)),
    color: '#' + mesh.material.color.getHexString()
  }));
}

// ── Animation ──
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const elapsed = clock.getElapsedTime();

  // Gentle object animations
  objectMeshes.forEach((mesh, i) => {
    const baseY = mesh.userData.name === 'box' ? 0.5 :
                  mesh.userData.name === 'sphere' ? 0.6 :
                  mesh.userData.name === 'cone' ? 0.6 :
                  mesh.userData.name === 'cylinder' ? 0.75 :
                  1.2;

    mesh.position.y = baseY + Math.sin(elapsed * 0.8 + i * 1.3) * 0.15;
    mesh.rotation.y += 0.003 + i * 0.001;

    if (mesh.userData.name === 'torus') {
      mesh.rotation.x = Math.PI / 4 + Math.sin(elapsed * 0.5) * 0.2;
    }
  });

  controls.update();
  updateFps();
  updateState();

  renderer.render(scene, camera);
}

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Initialize ──
updateReflectivity(0.8);
updateMirrorTint('#ffffff');
animate();
</script>
</body>
</html>
