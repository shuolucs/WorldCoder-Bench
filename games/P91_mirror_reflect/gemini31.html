<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Mirror Room</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: auto;
            z-index: 10;
            min-width: 250px;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .control-group input[type="range"] {
            width: 100%;
        }
        .control-group input[type="color"] {
            vertical-align: middle;
            cursor: pointer;
        }
        .info {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="ui-container">
        <div class="control-group">
            <label for="reflectivity">Mirror Reflectivity: <span id="refVal">1.00</span></label>
            <input type="range" id="reflectivity" min="0" max="1" step="0.01" value="1">
        </div>
        <div class="control-group">
            <label for="mirrorTint">Mirror Tint</label>
            <input type="color" id="mirrorTint" value="#ffffff">
        </div>
        <div class="control-group">
            <label for="objectColorSelect">Selected Object Color</label>
            <input type="color" id="objectColorSelect" value="#ffffff">
            <div class="info">Selected: <span id="selectedName">None (Click an object)</span></div>
        </div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { Reflector } from 'three/addons/objects/Reflector.js';

        // --- State Initialization ---
        window.__3D_STATE__ = {
            mirrorReflectivity: 1.0,
            mirrorTint: '#ffffff',
            objectCount: 5,
            objects: [],
            fps: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 6, 16);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 3, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // --- Room Construction ---
        const roomMaterial = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.8 });
        
        // Floor
        const floorGeo = new THREE.PlaneGeometry(20, 20);
        const floor = new THREE.Mesh(floorGeo, roomMaterial);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Left Wall
        const wallGeo = new THREE.PlaneGeometry(20, 10);
        const leftWall = new THREE.Mesh(wallGeo, roomMaterial);
        leftWall.position.set(-10, 5, 0);
        leftWall.rotation.y = Math.PI / 2;
        scene.add(leftWall);

        // Right Wall
        const rightWall = new THREE.Mesh(wallGeo, roomMaterial);
        rightWall.position.set(10, 5, 0);
        rightWall.rotation.y = -Math.PI / 2;
        scene.add(rightWall);

        // Ceiling
        const ceiling = new THREE.Mesh(floorGeo, roomMaterial);
        ceiling.position.set(0, 10, 0);
        ceiling.rotation.x = Math.PI / 2;
        scene.add(ceiling);

        // --- Mirror (Back Wall) ---
        const mirrorGeometry = new THREE.PlaneGeometry(20, 10);
        const mirror = new Reflector(mirrorGeometry, {
            clipBias: 0.003,
            textureWidth: window.innerWidth * window.devicePixelRatio,
            textureHeight: window.innerHeight * window.devicePixelRatio,
            color: 0xffffff
        });
        mirror.position.set(0, 5, -10);
        scene.add(mirror);

        // --- Objects ---
        const interactableObjects = [];
        
        const createObject = (geometry, color, x, y, z, name) => {
            const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4, metalness: 0.1 });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z);
            mesh.name = name;
            scene.add(mesh);
            interactableObjects.push(mesh);
            return mesh;
        };

        createObject(new THREE.BoxGeometry(2, 2, 2), 0xff0000, -5, 1, -4, 'Box');
        createObject(new THREE.SphereGeometry(1.2, 32, 16), 0x00ff00, 4, 1.2, -6, 'Sphere');
        createObject(new THREE.ConeGeometry(1.2, 3, 32), 0x0000ff, -4, 1.5, 4, 'Cone');
        createObject(new THREE.CylinderGeometry(1, 1, 2.5, 32), 0xffff00, 5, 1.25, 3, 'Cylinder');
        
        const torusMesh = createObject(new THREE.TorusGeometry(1, 0.4, 16, 100), 0xff00ff, 0, 1.5, 0, 'Torus');
        torusMesh.rotation.x = Math.PI / 4;
        torusMesh.rotation.y = Math.PI / 4;

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedObject = null;

        // UI Elements
        const reflectivitySlider = document.getElementById('reflectivity');
        const refValDisplay = document.getElementById('refVal');
        const mirrorTintPicker = document.getElementById('mirrorTint');
        const objectColorPicker = document.getElementById('objectColorSelect');
        const selectedNameDisplay = document.getElementById('selectedName');

        // Update Mirror Appearance
        const updateMirror = () => {
            const refVal = parseFloat(reflectivitySlider.value);
            const tintColor = new THREE.Color(mirrorTintPicker.value);
            
            // Simulate reflectivity by scaling the tint color brightness
            tintColor.multiplyScalar(refVal);
            
            if (mirror.material.uniforms && mirror.material.uniforms.color) {
                mirror.material.uniforms.color.value.copy(tintColor);
            }
            
            window.__3D_STATE__.mirrorReflectivity = refVal;
            window.__3D_STATE__.mirrorTint = mirrorTintPicker.value;
            refValDisplay.textContent = refVal.toFixed(2);
        };

        reflectivitySlider.addEventListener('input', updateMirror);
        mirrorTintPicker.addEventListener('input', updateMirror);

        // Object Selection
        window.addEventListener('pointerdown', (event) => {
            // Ignore UI clicks
            if (event.target.closest('#ui-container')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactableObjects);

            if (intersects.length > 0) {
                if (selectedObject) {
                    selectedObject.material.emissive.setHex(0x000000);
                }
                selectedObject = intersects[0].object;
                selectedObject.material.emissive.setHex(0x444444); // Highlight
                
                objectColorPicker.value = '#' + selectedObject.material.color.getHexString();
                selectedNameDisplay.textContent = selectedObject.name;
            } else {
                if (selectedObject) {
                    selectedObject.material.emissive.setHex(0x000000);
                    selectedObject = null;
                    selectedNameDisplay.textContent = 'None (Click an object)';
                }
            }
        });

        // Change Object Color
        objectColorPicker.addEventListener('input', (e) => {
            if (selectedObject) {
                selectedObject.material.color.set(e.target.value);
            } else {
                // If no object selected, apply to all (as per prompt "统一调色" option)
                interactableObjects.forEach(obj => {
                    obj.material.color.set(e.target.value);
                });
            }
        });

        // --- Window Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            // Update mirror resolution
            mirror.getRenderTarget().setSize(
                window.innerWidth * window.devicePixelRatio,
                window.innerHeight * window.devicePixelRatio
            );
        });

        // --- Animation Loop & State Update ---
        let lastTime = performance.now();
        let frames = 0;

        function animate() {
            requestAnimationFrame(animate);

            // Calculate FPS
            const time = performance.now();
            frames++;
            if (time >= lastTime + 1000) {
                window.__3D_STATE__.fps = Math.round((frames * 1000) / (time - lastTime));
                frames = 0;
                lastTime = time;
            }

            // Update State Objects Array
            window.__3D_STATE__.objects = interactableObjects.map(obj => ({
                name: obj.name,
                x: parseFloat(obj.position.x.toFixed(2)),
                y: parseFloat(obj.position.y.toFixed(2)),
                z: parseFloat(obj.position.z.toFixed(2)),
                color: '#' + obj.material.color.getHexString()
            }));

            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize state values
        updateMirror();
        animate();

    </script>
</body>
</html>
