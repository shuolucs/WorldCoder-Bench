<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 镜面房间</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(20, 20, 20, 0.72);
      color: #fff;
      padding: 12px 14px;
      border-radius: 10px;
      backdrop-filter: blur(6px);
      min-width: 260px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.25);
    }

    #ui label {
      display: block;
      margin: 8px 0 4px;
      font-size: 13px;
    }

    #ui input, #ui select {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 8px;
    }

    #hint {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 6px;
      line-height: 1.4;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <label for="reflectivity">镜面反射强度</label>
      <input id="reflectivity" type="range" min="0" max="1" step="0.01" value="0.85" />

      <label for="objectSelector">选择物体</label>
      <select id="objectSelector"></select>

      <label for="objectColorSelect">物体颜色</label>
      <input id="objectColorSelect" type="color" value="#ff6b6b" />

      <label for="mirrorTint">镜面色调</label>
      <input id="mirrorTint" type="color" value="#ffffff" />

      <div id="hint">
        鼠标拖拽旋转，滚轮缩放。<br />
        可选择单个物体并修改颜色；左侧墙面为镜子。
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { Reflector } from 'three/addons/objects/Reflector.js';

    const app = document.getElementById('app');
    const reflectivityInput = document.getElementById('reflectivity');
    const objectSelector = document.getElementById('objectSelector');
    const objectColorSelect = document.getElementById('objectColorSelect');
    const mirrorTintInput = document.getElementById('mirrorTint');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x20242a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3.2, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 2, 0);
    controls.enableDamping = true;
    controls.minDistance = 4;
    controls.maxDistance = 20;
    controls.maxPolarAngle = Math.PI * 0.49;

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(4, 8, 6);
    scene.add(dirLight);

    const pointLight = new THREE.PointLight(0xfff2cc, 25, 30, 2);
    pointLight.position.set(0, 5.5, 0);
    scene.add(pointLight);

    const roomGroup = new THREE.Group();
    scene.add(roomGroup);

    const roomWidth = 12;
    const roomHeight = 6;
    const roomDepth = 12;

    const wallMaterial = new THREE.MeshStandardMaterial({
      color: 0xd9dde3,
      roughness: 0.9,
      metalness: 0.02
    });

    const floorMaterial = new THREE.MeshStandardMaterial({
      color: 0x8c7b6b,
      roughness: 0.95,
      metalness: 0.0
    });

    const ceilingMaterial = new THREE.MeshStandardMaterial({
      color: 0xf2f2f2,
      roughness: 0.95,
      metalness: 0.0
    });

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(roomWidth, roomDepth),
      floorMaterial
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    roomGroup.add(floor);

    const ceiling = new THREE.Mesh(
      new THREE.PlaneGeometry(roomWidth, roomDepth),
      ceilingMaterial
    );
    ceiling.rotation.x = Math.PI / 2;
    ceiling.position.y = roomHeight;
    roomGroup.add(ceiling);

    const backWall = new THREE.Mesh(
      new THREE.PlaneGeometry(roomWidth, roomHeight),
      wallMaterial
    );
    backWall.position.set(0, roomHeight / 2, -roomDepth / 2);
    roomGroup.add(backWall);

    const rightWall = new THREE.Mesh(
      new THREE.PlaneGeometry(roomDepth, roomHeight),
      wallMaterial
    );
    rightWall.rotation.y = -Math.PI / 2;
    rightWall.position.set(roomWidth / 2, roomHeight / 2, 0);
    roomGroup.add(rightWall);

    const frontFrameTop = new THREE.Mesh(
      new THREE.BoxGeometry(roomWidth, 0.2, 0.2),
      new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.6 })
    );
    frontFrameTop.position.set(0, roomHeight, roomDepth / 2);
    roomGroup.add(frontFrameTop);

    const frontFrameBottom = new THREE.Mesh(
      new THREE.BoxGeometry(roomWidth, 0.2, 0.2),
      new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.6 })
    );
    frontFrameBottom.position.set(0, 0, roomDepth / 2);
    roomGroup.add(frontFrameBottom);

    const mirrorReflector = new Reflector(
      new THREE.PlaneGeometry(roomDepth, roomHeight - 0.4),
      {
        textureWidth: window.innerWidth * Math.min(window.devicePixelRatio, 2),
        textureHeight: window.innerHeight * Math.min(window.devicePixelRatio, 2),
        color: 0xffffff
      }
    );
    mirrorReflector.rotation.y = Math.PI / 2;
    mirrorReflector.position.set(-roomWidth / 2 + 0.01, roomHeight / 2, 0);
    scene.add(mirrorReflector);

    const mirrorOverlayMaterial = new THREE.MeshStandardMaterial({
      color: new THREE.Color(mirrorTintInput.value),
      transparent: true,
      opacity: 0.15,
      roughness: 0.08,
      metalness: 0.95,
      side: THREE.DoubleSide
    });

    const mirrorOverlay = new THREE.Mesh(
      new THREE.PlaneGeometry(roomDepth, roomHeight - 0.4),
      mirrorOverlayMaterial
    );
    mirrorOverlay.rotation.y = Math.PI / 2;
    mirrorOverlay.position.set(-roomWidth / 2 + 0.02, roomHeight / 2, 0);
    scene.add(mirrorOverlay);

    const mirrorFrameMaterial = new THREE.MeshStandardMaterial({
      color: 0x55585f,
      roughness: 0.5,
      metalness: 0.7
    });

    const frameThickness = 0.18;
    const mirrorWidth = roomDepth;
    const mirrorHeight = roomHeight - 0.4;

    const frameTop = new THREE.Mesh(
      new THREE.BoxGeometry(frameThickness, 0.18, mirrorWidth + 0.18),
      mirrorFrameMaterial
    );
    frameTop.position.set(-roomWidth / 2 + 0.08, roomHeight - 0.1, 0);
    scene.add(frameTop);

    const frameBottom = new THREE.Mesh(
      new THREE.BoxGeometry(frameThickness, 0.18, mirrorWidth + 0.18),
      mirrorFrameMaterial
    );
    frameBottom.position.set(-roomWidth / 2 + 0.08, 0.1, 0);
    scene.add(frameBottom);

    const frameLeft = new THREE.Mesh(
      new THREE.BoxGeometry(frameThickness, mirrorHeight, 0.18),
      mirrorFrameMaterial
    );
    frameLeft.position.set(-roomWidth / 2 + 0.08, roomHeight / 2, -mirrorWidth / 2);
    scene.add(frameLeft);

    const frameRight = new THREE.Mesh(
      new THREE.BoxGeometry(frameThickness, mirrorHeight, 0.18),
      mirrorFrameMaterial
    );
    frameRight.position.set(-roomWidth / 2 + 0.08, roomHeight / 2, mirrorWidth / 2);
    scene.add(frameRight);

    const objects = [];

    function createObject(name, geometry, color, position) {
      const material = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.35,
        metalness: 0.15
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.name = name;
      mesh.position.copy(position);
      scene.add(mesh);
      objects.push(mesh);
      return mesh;
    }

    createObject(
      'Box',
      new THREE.BoxGeometry(1.4, 1.4, 1.4),
      '#ff6b6b',
      new THREE.Vector3(-2.5, 0.7, -1.5)
    );

    createObject(
      'Sphere',
      new THREE.SphereGeometry(0.85, 32, 24),
      '#4ecdc4',
      new THREE.Vector3(1.8, 0.85, -2.2)
    );

    createObject(
      'Cone',
      new THREE.ConeGeometry(0.8, 1.8, 32),
      '#ffd166',
      new THREE.Vector3(3.0, 0.9, 1.7)
    );

    createObject(
      'Cylinder',
      new THREE.CylinderGeometry(0.7, 0.7, 1.8, 32),
      '#5b8cff',
      new THREE.Vector3(-0.6, 0.9, 2.3)
    );

    createObject(
      'Torus',
      new THREE.TorusGeometry(0.9, 0.28, 20, 64),
      '#c77dff',
      new THREE.Vector3(-3.2, 1.2, 2.0)
    );

    objects.forEach((obj, i) => {
      const option = document.createElement('option');
      option.value = String(i);
      option.textContent = obj.name;
      objectSelector.appendChild(option);
    });

    let selectedIndex = 0;
    objectSelector.value = '0';
    objectColorSelect.value = colorToHex(objects[0].material.color);

    function colorToHex(color) {
      return `#${color.getHexString()}`;
    }

    function applyReflectivity(value) {
      const v = THREE.MathUtils.clamp(value, 0, 1);
      mirrorOverlayMaterial.opacity = 1 - v;
      mirrorOverlayMaterial.needsUpdate = true;
      window.__3D_STATE__.mirrorReflectivity = v;
    }

    function applyMirrorTint(hex) {
      mirrorOverlayMaterial.color.set(hex);
      mirrorReflector.material.color.set(hex);
      window.__3D_STATE__.mirrorTint = hex.toLowerCase();
    }

    reflectivityInput.addEventListener('input', (e) => {
      applyReflectivity(parseFloat(e.target.value));
    });

    objectSelector.addEventListener('change', (e) => {
      selectedIndex = parseInt(e.target.value, 10);
      objectColorSelect.value = colorToHex(objects[selectedIndex].material.color);
    });

    objectColorSelect.addEventListener('input', (e) => {
      const hex = e.target.value;
      const target = objects[selectedIndex];
      target.material.color.set(hex);
    });

    mirrorTintInput.addEventListener('input', (e) => {
      applyMirrorTint(e.target.value);
    });

    window.__3D_STATE__ = {
      mirrorReflectivity: parseFloat(reflectivityInput.value),
      mirrorTint: mirrorTintInput.value.toLowerCase(),
      objectCount: objects.length,
      objects: [],
      fps: 0
    };

    applyReflectivity(parseFloat(reflectivityInput.value));
    applyMirrorTint(mirrorTintInput.value);

    const clock = new THREE.Clock();
    let fpsTimer = 0;
    let fpsFrames = 0;
    let currentFps = 0;

    function resize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    window.addEventListener('resize', resize);

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      fpsTimer += delta;
      fpsFrames += 1;
      if (fpsTimer >= 0.5) {
        currentFps = fpsFrames / fpsTimer;
        fpsTimer = 0;
        fpsFrames = 0;
      }

      objects[0].rotation.x += 0.01;
      objects[0].rotation.y += 0.015;

      objects[1].rotation.y += 0.012;

      objects[2].rotation.y += 0.02;

      objects[3].rotation.x += 0.008;
      objects[3].rotation.z += 0.01;

      objects[4].rotation.x += 0.015;
      objects[4].rotation.y += 0.01;

      controls.update();

      window.__3D_STATE__ = {
        mirrorReflectivity: parseFloat(reflectivityInput.value),
        mirrorTint: mirrorTintInput.value.toLowerCase(),
        objectCount: objects.length,
        objects: objects.map((obj) => ({
          name: obj.name,
          x: Number(obj.position.x.toFixed(3)),
          y: Number(obj.position.y.toFixed(3)),
          z: Number(obj.position.z.toFixed(3)),
          color: colorToHex(obj.material.color)
        })),
        fps: Number(currentFps.toFixed(1))
      };

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
