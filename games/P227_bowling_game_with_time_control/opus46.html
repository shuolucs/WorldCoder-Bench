<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Bowling Game with Time Control</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #fff;
    background: rgba(0,0,0,0.7);
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 220px;
    border: 1px solid rgba(255,255,255,0.15);
}
#hud .label { color: #aaa; }
#hud .value { color: #fff; font-weight: bold; }
#hud .highlight { color: #FFD700; }
#controls {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: #ccc;
    background: rgba(0,0,0,0.6);
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.6;
}
#notification {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #FFD700;
    font-size: 72px;
    font-weight: bold;
    text-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,215,0,0.4);
    display: none;
    pointer-events: none;
    z-index: 100;
    animation: notifyPulse 0.5s ease-in-out infinite alternate;
}
@keyframes notifyPulse {
    from { transform: translate(-50%, -50%) scale(1); }
    to { transform: translate(-50%, -50%) scale(1.1); }
}
#powerBar {
    width: 150px;
    height: 12px;
    background: #333;
    border-radius: 6px;
    overflow: hidden;
    display: inline-block;
    vertical-align: middle;
    margin-left: 5px;
}
#powerBarFill {
    height: 100%;
    background: linear-gradient(90deg, #4CAF50, #FFC107, #F44336);
    border-radius: 6px;
    transition: width 0.1s;
}
#spinIndicator {
    display: inline-block;
    width: 60px;
    text-align: center;
}
</style>
</head>
<body>

<div id="hud">
    <div><span class="label">Frame:</span> <span class="value" id="frameDisplay">1 / 3</span></div>
    <div><span class="label">Throw:</span> <span class="value" id="throwDisplay">1</span></div>
    <div><span class="label">Pins Down:</span> <span class="value highlight" id="pinsDisplay">0</span></div>
    <div><span class="label">Total Score:</span> <span class="value highlight" id="scoreDisplay">0</span></div>
    <hr style="border-color:rgba(255,255,255,0.1);margin:5px 0;">
    <div><span class="label">Power:</span> <span class="value" id="powerDisplay">15</span>
        <div id="powerBar"><div id="powerBarFill" style="width:50%"></div></div>
    </div>
    <div><span class="label">Spin:</span> <span class="value" id="spinDisplay"><span id="spinIndicator">0</span></span></div>
    <div><span class="label">Time Scale:</span> <span class="value" id="timeDisplay">1.0x</span></div>
    <div><span class="label">Status:</span> <span class="value" id="statusDisplay">Aim & Throw!</span></div>
</div>

<div id="controls">
    <b>Controls:</b><br>
    A/D or ←/→ : Aim | W/S or ↑/↓ : Power<br>
    Q/E : Spin | Space : Throw | R : Reset<br>
    T : Time Scale | P : Pause
</div>

<div id="notification"></div>

<script type="importmap">

        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

// ============ BOWLING PINS ============
function createPinGeometry() {
    const shape = new THREE.Shape();
    const points = [
        [0, 0], [0.15, 0], [0.15, 0.05], [0.14, 0.15],
        [0.08, 0.3], [0.06, 0.35], [0.07, 0.4],
        [0.09, 0.45], [0.08, 0.5], [0.05, 0.55],
        [0.03, 0.58], [0, 0.6]
    ];
    const lathePoints = points.map(p => new THREE.Vector2(p[0], p[1]));
    return new THREE.LatheGeometry(lathePoints, 12);
}

const pinGeo = createPinGeometry();
const pinMat = new THREE.MeshStandardMaterial({
    color: 0xffffff, roughness: 0.3, metalness: 0.05
});
const pinRedMat = new THREE.MeshStandardMaterial({
    color: 0xcc0000, roughness: 0.3
});

const PIN_POSITIONS = [
    [0, 0],
    [-0.2, -0.5], [0.2, -0.5],
    [-0.4, -1.0], [0, -1.0], [0.4, -1.0],
    [-0.6, -1.5], [-0.2, -1.5], [0.2, -1.5], [0.6, -1.5]
];

const PIN_BASE_Z = -22;

class Pin {
    constructor(x, z, index) {
        this.index = index;
        this.startX = x;
        this.startZ = z;

        this.group = new THREE.Group();

        const body = new THREE.Mesh(pinGeo, pinMat.clone());
        body.castShadow = true;
        this.group.add(body);

        // Red stripes
        const stripeGeo = new THREE.CylinderGeometry(0.082, 0.082, 0.03, 12);
        const stripe1 = new THREE.Mesh(stripeGeo, pinRedMat);
        stripe1.position.y = 0.42;
        this.group.add(stripe1);
        const stripe2 = new THREE.Mesh(stripeGeo, pinRedMat);
        stripe2.position.y = 0.46;
        this.group.add(stripe2);

        this.group.position.set(x, 0.1, z);
        scene.add(this.group);

        // Physics state
        this.velocity = new THREE.Vector3(0, 0, 0);
        this.angularVelocity = new THREE.Vector3(0, 0, 0);
        this.mass = 0.5;
        this.standing = true;
        this.knockedDown = false;
        this.onGround = true;
    }

    reset() {
        this.group.position.set(this.startX, 0.1, this.startZ);
        this.group.rotation.set(0, 0, 0);
        this.group.quaternion.identity();
        this.velocity.set(0, 0, 0);
        this.angularVelocity.set(0, 0, 0);
        this.standing = true;
        this.knockedDown = false;
        this.onGround = true;
    }

    isDown() {
        const up = new THREE.Vector3(0, 1, 0);
        up.applyQuaternion(this.group.quaternion);
        return up.dot(new THREE.Vector3(0, 1, 0)) < 0.707;
    }

    update(dt) {
        if (!this.standing && this.onGround && this.velocity.length() < 0.01 && this.angularVelocity.length() < 0.01) {
            return;
        }

        // Gravity
        this.velocity.y -= 9.81 * dt;

        // Damping
        this.velocity.multiplyScalar(1 - 2.0 * dt);
        this.angularVelocity.multiplyScalar(1 - 3.0 * dt);

        // Update position
        this.group.position.addScaledVector(this.velocity, dt);
        
        // Update rotation
        const q = new THREE.Quaternion();
        const angLen = this.angularVelocity.length();
        if (angLen > 0.001) {
            const axis = this.angularVelocity.clone().normalize();
            q.setFromAxisAngle(axis, angLen * dt);
            this.group.quaternion.premultiply(q);
            this.group.quaternion.normalize();
        }

        // Ground collision
        if (this.group.position.y < 0.1) {
            this.group.position.y = 0.1;
            if (this.velocity.y < 0) {
                this.velocity.y *= -0.2;
                if (Math.abs(this.velocity.y) < 0.5) {
                    this.velocity.y = 0;
                    this.onGround = true;
                }
            }
            // Friction on ground
            this.velocity.x *= (1 - 5.0 * dt);
            this.velocity.z *= (1 - 5.0 * dt);
        }

        // Check if knocked down
        if (this.isDown()) {
            this.knockedDown = true;
            this.standing = false;
        }

        // Lane boundaries
        if (Math.abs(this.group.position.x) > 3) {
            this.group.position.x = Math.sign(this.group.position.x) * 3;
            this.velocity.x *= -0.3;
        }
    }

    applyImpulse(impulse, contactPoint) {
        this.velocity.addScaledVector(impulse, 1.0 / this.mass);
        
        // Angular impulse from contact offset
        const r = contactPoint.clone().sub(this.group.position);
        const torque = new THREE.Vector3().crossVectors(r, impulse);
        this.angularVelocity.addScaledVector(torque, 2.0 / this.mass);
        
        this.standing = false;
    }
}

let pins = [];
function createPins() {
    pins.forEach(p => scene.remove(p.group));
    pins = [];
    for (let i = 0; i < 10; i++) {
        const px = PIN_POSITIONS[i][0] * 1.8;
        const pz = PIN_BASE_Z + PIN_POSITIONS[i][1] * 1.8;
        pins.push(new Pin(px, pz, i));
    }
}
createPins();

// ============ BOWLING BALL ============
const ballGeo = new THREE.SphereGeometry(0.35, 32, 32);
const ballMat = new THREE.MeshStandardMaterial({
    color: 0x222244, roughness: 0.15, metalness: 0.6

const ball = new THREE.Mesh(ballGeo, ballMat);
ball.castShadow = true;

// Ball finger holes

const holeMat = new THREE.MeshStandardMaterial({ color: 0x111122 });
const hole1 = new THREE.Mesh(holeGeo, holeMat);
hole1.position.set(0, 0.3, 0);
hole1.rotation.x = Math.PI * 0.1;
ball.add(hole1);
const hole2 = new THREE.Mesh(holeGeo, holeMat);
hole2.position.set(-0.08, 0.28, 0.08);
hole2.rotation.x = Math.PI * 0.1;
ball.add(hole2);
const hole3 = new THREE.Mesh(holeGeo, holeMat);
hole3.position.set(0.08, 0.28, 0.08);
hole3.rotation.x = Math.PI * 0.1;
ball.add(hole3);

const BALL_START = new THREE.Vector3(0, 0.55, 4);
ball.position.copy(BALL_START);
scene.add(ball);

let ballVelocity = new THREE.Vector3(0, 0, 0);
const BALL_MASS = 5;
const BALL_RADIUS = 0.35;

// ============ TROPHY PEDESTAL ============
const pedestalGeo = new THREE.BoxGeometry(1, 1, 1);
const pedestalMat = new THREE.MeshStandardMaterial({
    color: 0xDAA520, roughness: 0.3, metalness: 0.7
});
const pedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
pedestal.position.set(4, 0.5, 5);
pedestal.castShadow = true;
pedestal.receiveShadow = true;
scene.add(pedestal);

// Pedestal label
const pedestalTopGeo = new THREE.BoxGeometry(1.1, 0.05, 1.1);
const pedestalTopMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.8, roughness: 0.2 });
const pedestalTop = new THREE.Mesh(pedestalTopGeo, pedestalTopMat);
pedestalTop.position.set(4, 1.025, 5);
scene.add(pedestalTop);

// Load trophy (Corset.glb)
let trophyLoaded = false;
const loader = new GLTFLoader();
loader.load(
    'Corset.glb',
    (gltf) => {
        const model = gltf.scene;
        // Compute bounding box to scale
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 1.0 / maxDim;
        model.scale.setScalar(scale * 20);
        
        // Center the model
        const center = box.getCenter(new THREE.Vector3());
        model.position.set(
            4 - center.x * scale * 20,
            1.05 - (box.min.y * scale * 20),
            5 - center.z * scale * 20
        );
        
        model.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        
        scene.add(model);
        trophyLoaded = true;
        window.__3D_STATE__.trophyLoaded = true;
        console.log('Trophy loaded successfully');
    },
    (progress) => {
        console.log('Loading trophy...', Math.round((progress.loaded / progress.total) * 100) + '%');
    },
    (error) => {
        console.warn('Could not load Corset.glb, creating placeholder trophy:', error);
        // Create a placeholder trophy
        const trophyGroup = new THREE.Group();
        
        // Cup
        const cupGeo = new THREE.CylinderGeometry(0.2, 0.3, 0.5, 16, 1, true);
        const cupMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.9, roughness: 0.1, side: THREE.DoubleSide });
        const cup = new THREE.Mesh(cupGeo, cupMat);
        cup.position.y = 0.5;
        trophyGroup.add(cup);
        
        // Base
        const baseGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.1, 16);
        const base = new THREE.Mesh(baseGeo, cupMat);
        base.position.y = 0.15;
        trophyGroup.add(base);
        
        // Stem
        const stemGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.2, 8);
        const stem = new THREE.Mesh(stemGeo, cupMat);
        stem.position.y = 0.25;
        trophyGroup.add(stem);
        
        // Handles
        const handleGeo = new THREE.TorusGeometry(0.12, 0.02, 8, 16, Math.PI);
        const handleL = new THREE.Mesh(handleGeo, cupMat);
        handleL.position.set(-0.3, 0.5, 0);
        handleL.rotation.z = Math.PI / 2;
        trophyGroup.add(handleL);
        const handleR = new THREE.Mesh(handleGeo, cupMat);
        handleR.position.set(0.3, 0.5, 0);
        handleR.rotation.z = -Math.PI / 2;
        trophyGroup.add(handleR);
        
        // Star on top
        const starShape = new THREE.Shape();
        for (let i = 0; i < 5; i++) {
            const outerAngle = (i * 2 * Math.PI / 5) - Math.PI / 2;
            const innerAngle = outerAngle + Math.PI / 5;
            if (i === 0) starShape.moveTo(Math.cos(outerAngle) * 0.1, Math.sin(outerAngle) * 0.1);
            else starShape.lineTo(Math.cos(outerAngle) * 0.1, Math.sin(outerAngle) * 0.1);
            starShape.lineTo(Math.cos(innerAngle) * 0.04, Math.sin(innerAngle) * 0.04);
        }
        starShape.closePath();
        const starGeo = new THREE.ExtrudeGeometry(starShape, { depth: 0.02, bevelEnabled: false });
        const star = new THREE.Mesh(starGeo, cupMat);
        star.position.set(0, 0.8, 0);
        trophyGroup.add(star);
        
        trophyGroup.position.set(4, 1.05, 5);
        trophyGroup.traverse(c => { if (c.isMesh) { c.castShadow = true; } });
        scene.add(trophyGroup);
        trophyLoaded = true;
        window.__3D_STATE__.trophyLoaded = true;
    }
);

// Spotlight on trophy
const trophySpot = new THREE.SpotLight(0xFFD700, 1, 10, Math.PI / 6, 0.5);
trophySpot.position.set(4, 5, 5);
trophySpot.target.position.set(4, 1, 5);
scene.add(trophySpot);
scene.add(trophySpot.target);

// ============ GAME STATE ============
let throwPower = 15;
let spinValue = 0;
let ballThrown = false;
let throwTime = 0;
let timeScale = 1.0;
let paused = false;
let currentFrame = 1;
let currentThrow = 1;
let pinsDownThisFrame = 0;
let pinsDownFirstThrow = 0;
let totalScore = 0;
let isStrike = false;
let isSpare = false;
let gameOver = false;
let gutterBall = false;
let notificationTimer = 0;
let ballSpinApplied = false;

const timeScales = [1.0, 0.25, 0.1];
let timeScaleIndex = 0;

// ============ STATE EXPOSURE ============
window.__3D_STATE__ = {
    ballPosition: { x: 0, y: 0.55, z: 4 },
    ballThrown: false,
    throwPower: 15,
    spinValue: 0,
    timeScale: 1.0,
    paused: false,
    pinsDown: 0,
    currentFrame: 1,
    currentThrow: 1,
    totalScore: 0,
    isStrike: false,
    isSpare: false,
    pinStates: new Array(10).fill(true),
    trophyLoaded: false,
    gameOver: false,
    gutterBall: false
};

// ============ INPUT ============
const keys = {};
window.addEventListener('keydown', (e) => {
    if (keys[e.code]) return;
    keys[e.code] = true;
    
    switch(e.code) {
        case 'Space':
            e.preventDefault();
            if (!ballThrown && !gameOver && !paused) {
                throwBall();
            }
            break;
        case 'KeyT':
            if (!paused) {
                timeScaleIndex = (timeScaleIndex + 1) % timeScales.length;
                timeScale = timeScales[timeScaleIndex];
            }
            break;
        case 'KeyP':
            paused = !paused;
            if (paused) {
                timeScale = 0;
            } else {
                timeScale = timeScales[timeScaleIndex];
            }
            break;
        case 'KeyR':
            resetFrame();
            break;
        case 'KeyQ':
            if (!ballThrown) {
                spinValue = Math.max(-3, spinValue - 1);
            }
            break;
        case 'KeyE':
            if (!ballThrown) {
                spinValue = Math.min(3, spinValue + 1);
            }
            break;
        case 'KeyW':
        case 'ArrowUp':
            e.preventDefault();
            if (!ballThrown) {
                throwPower = Math.min(25, throwPower + 1);
            }
            break;
        case 'KeyS':
        case 'ArrowDown':
            e.preventDefault();
            if (!ballThrown) {
                throwPower = Math.max(5, throwPower - 1);
            }
            break;
    }
});

window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
});

// ============ GAME LOGIC ============
function throwBall() {
    ballThrown = true;
    throwTime = 0;
    gutterBall = false;
    ballSpinApplied = false;
    ballVelocity.set(spinValue * 0.5, 0, -throwPower);
    document.getElementById('statusDisplay').textContent = 'Ball thrown!';
}

function countPinsDown() {
    let count = 0;
    for (let i = 0; i < pins.length; i++) {
        if (pins[i].knockedDown || pins[i].isDown()) {
            count++;
        }
    }
    return count;
}

function endThrow() {
    const currentPinsDown = countPinsDown();
    
    if (currentThrow === 1) {
        pinsDownFirstThrow = currentPinsDown;
        pinsDownThisFrame = currentPinsDown;
        
        if (currentPinsDown === 10) {
            // Strike!
            isStrike = true;
            totalScore += 10;
            showNotification('STRIKE!');
            document.getElementById('statusDisplay').textContent = 'STRIKE!';
            
            setTimeout(() => {
                if (currentFrame < 3) {
                    currentFrame++;
                    currentThrow = 1;
                    pinsDownThisFrame = 0;
                    pinsDownFirstThrow = 0;
                    isStrike = false;
                    resetPinsAndBall();
                } else {
                    gameOver = true;
                    document.getElementById('statusDisplay').textContent = 'Game Over! Press R to restart.';
                }
            }, 2500);
        } else {
            currentThrow = 2;
            // Reset ball but keep pins
            resetBallOnly();
            document.getElementById('statusDisplay').textContent = 'Throw 2 - Aim & Throw!';
        }
    } else {
        // Second throw
        const additionalPins = currentPinsDown - pinsDownFirstThrow;
        pinsDownThisFrame = currentPinsDown;
        totalScore += currentPinsDown;
        
        if (currentPinsDown === 10) {
            isSpare = true;
            showNotification('SPARE!');
            document.getElementById('statusDisplay').textContent = 'SPARE!';
        } else {
            document.getElementById('statusDisplay').textContent = `Knocked down ${currentPinsDown} pins.`;
        }
        
        setTimeout(() => {
            if (currentFrame < 3) {
                currentFrame++;
                currentThrow = 1;
                pinsDownThisFrame = 0;
                pinsDownFirstThrow = 0;
                isStrike = false;
                isSpare = false;
                resetPinsAndBall();
            } else {
                gameOver = true;
                document.getElementById('statusDisplay').textContent = 'Game Over! Press R to restart.';
            }
        }, 2000);
    }
}

function resetBallOnly() {
    ball.position.copy(BALL_START);
    ball.rotation.set(0, 0, 0);
    ballVelocity.set(0, 0, 0);
    ballThrown = false;
    throwTime = 0;
    gutterBall = false;
    spinValue = 0;
}

function resetPinsAndBall() {
    pins.forEach(p => p.reset());
    resetBallOnly();
    document.getElementById('statusDisplay').textContent = 'Aim & Throw!';
}

function resetFrame() {
    if (gameOver) {
        // Full game reset
        currentFrame = 1;
        totalScore = 0;
        gameOver = false;
    }
    currentThrow = 1;
    pinsDownThisFrame = 0;
    pinsDownFirstThrow = 0;
    isStrike = false;
    isSpare = false;
    throwPower = 15;
    spinValue = 0;
    gutterBall = false;
    resetPinsAndBall();
    document.getElementById('statusDisplay').textContent = 'Aim & Throw!';
}

function showNotification(text) {
    const el = document.getElementById('notification');
    el.textContent = text;
    el.style.display = 'block';
    notificationTimer = 2.0;
}

// ============ PHYSICS UPDATE ============
function updatePhysics(dt) {
    if (dt <= 0) return;
    
    // Ball physics
    if (ballThrown) {
        throwTime += dt;
        
        // Gravity
        ballVelocity.y -= 9.81 * dt;
        
        // Apply spin gradually
        if (spinValue !== 0) {
            ballVelocity.x += spinValue * 2.0 * dt;
        }
        
        // Rolling friction
        ballVelocity.x *= (1 - 0.5 * dt);
        ballVelocity.z *= (1 - 0.3 * dt);
        
        // Update position
        ball.position.addScaledVector(ballVelocity, dt);
        
        // Ball rotation (visual)
        const speed = ballVelocity.length();
        if (speed > 0.1) {
            const rotAxis = new THREE.Vector3(-ballVelocity.z, 0, ballVelocity.x).normalize();
            const rotAngle = speed * dt / BALL_RADIUS;
            const q = new THREE.Quaternion().setFromAxisAngle(rotAxis, rotAngle);
            ball.quaternion.premultiply(q);
        }
        
        // Ground collision
        if (ball.position.y < BALL_RADIUS + 0.1) {
            ball.position.y = BALL_RADIUS + 0.1;
            if (ballVelocity.y < 0) ballVelocity.y = 0;
        }
        
        // Gutter check
        if (Math.abs(ball.position.x) > 1.75) {
            if (!gutterBall) {
                gutterBall = true;
                document.getElementById('statusDisplay').textContent = 'Gutter ball!';
                // Ball drops into gutter
                ballVelocity.y = -2;
                ball.position.y -= 0.1;
            }
        }
        
        // Ball-pin collisions
        for (const pin of pins) {
            if (pin.knockedDown && pin.velocity.length() < 0.1) continue;
            
            const diff = new THREE.Vector3().subVectors(pin.group.position, ball.position);
            diff.y = 0; // 2D collision on xz plane
            const dist = diff.length();
            const minDist = BALL_RADIUS + 0.15;
            
            if (dist < minDist && dist > 0.001) {
                const normal = diff.clone().normalize();
                
                // Separate
                const overlap = minDist - dist;
                pin.group.position.addScaledVector(normal, overlap);
                
                // Impulse
                const relVel = ballVelocity.clone().sub(pin.velocity);
                const velAlongNormal = relVel.dot(normal);
                
                if (velAlongNormal > 0) {
                    const restitution = 0.4;
                    const j = -(1 + restitution) * velAlongNormal / (1/BALL_MASS + 1/pin.mass);
                    
                    const impulse = normal.clone().multiplyScalar(-j);
                    ballVelocity.addScaledVector(impulse, 1/BALL_MASS);
                    
                    const pinImpulse = normal.clone().multiplyScalar(j);
                    const contactPoint = ball.position.clone().addScaledVector(normal, BALL_RADIUS);
                    pin.applyImpulse(pinImpulse, contactPoint);
                    
                    // Add upward component to make pins fly
                    pin.velocity.y += Math.abs(velAlongNormal) * 0.3;
                }
            }
        }
        
        // Pin-pin collisions
        for (let i = 0; i < pins.length; i++) {
            for (let j = i + 1; j < pins.length; j++) {
                const pi = pins[i];
                const pj = pins[j];
                
                if (pi.standing && pj.standing) continue;
                if (pi.velocity.length() < 0.01 && pj.velocity.length() < 0.01 && 
                    pi.standing && pj.standing) continue;
                
                const diff = new THREE.Vector3().subVectors(pj.group.position, pi.group.position);
                diff.y = 0;
                const dist = diff.length();
                const minDist = 0.3;
                
                if (dist < minDist && dist > 0.001) {
                    const normal = diff.clone().normalize();
                    const overlap = minDist - dist;
                    
                    pi.group.position.addScaledVector(normal, -overlap * 0.5);
                    pj.group.position.addScaledVector(normal, overlap * 0.5);
                    
                    const relVel = pi.velocity.clone().sub(pj.velocity);
                    const velAlongNormal = relVel.dot(normal);
                    
                    if (velAlongNormal > 0) {
                        const restitution = 0.3;
                        const j_val = -(1 + restitution) * velAlongNormal / (1/pi.mass + 1/pj.mass);
                        
                        const impulse = normal.clone().multiplyScalar(j_val);
                        pi.velocity.addScaledVector(impulse, -1/pi.mass);
                        pj.velocity.addScaledVector(impulse, 1/pj.mass);
                        
                        // Transfer angular momentum
                        if (!pi.standing) {
                            const cp = pi.group.position.clone().addScaledVector(normal, 0.15);
                            pj.applyImpulse(impulse.clone().multiplyScalar(0.5), cp);
                        }
                        if (!pj.standing) {
                            const cp = pj.group.position.clone().addScaledVector(normal, -0.15);
                            pi.applyImpulse(impulse.clone().negate().multiplyScalar(0.5), cp);
                        }
                    }
                }
            }
        }
        
        // Check if ball should be reset
        if (ball.position.z < -26 || throwTime > 5) {
            // Wait a moment for pins to settle
            setTimeout(() => {
                if (ballThrown) {
                    ballThrown = false;
                    endThrow();
                }
            }, 1000);
            ballThrown = false;
            ballVelocity.set(0, 0, 0);
        }
    } else if (!gameOver) {
        // Aiming - move ball left/right
        if (keys['KeyA'] || keys['ArrowLeft']) {
            ball.position.x = Math.max(-1.5, ball.position.x - 3 * dt);
            BALL_START.x = ball.position.x;
        }
        if (keys['KeyD'] || keys['ArrowRight']) {
            ball.position.x = Math.min(1.5, ball.position.x + 3 * dt);
            BALL_START.x = ball.position.x;
        }
    }
    
    // Update pins
    for (const pin of pins) {
        pin.update(dt);
    }
}

// ============ HUD UPDATE ============
function updateHUD() {
    document.getElementById('frameDisplay').textContent = `${currentFrame} / 3`;
    document.getElementById('throwDisplay').textContent = currentThrow;
    document.getElementById('pinsDisplay').textContent = countPinsDown();
    document.getElementById('scoreDisplay').textContent = totalScore + (currentThrow === 2 ? pinsDownFirstThrow : 0) + (ballThrown ? 0 : 0);
    document.getElementById('powerDisplay').textContent = throwPower;
    
    const powerPercent = ((throwPower - 5) / 20) * 100;
    document.getElementById('powerBarFill').style.width = powerPercent + '%';
    
    let spinText = spinValue === 0 ? '0' : (spinValue > 0 ? '→'.repeat(spinValue) : '←'.repeat(-spinValue));
    document.getElementById('spinIndicator').textContent = spinText + ` (${spinValue})`;
    
    if (paused) {
        document.getElementById('timeDisplay').textContent = 'PAUSED';
    } else {
        document.getElementById('timeDisplay').textContent = timeScale + 'x';
    }
    
    // Update score display more accurately
    let displayScore = totalScore;
    if (ballThrown || currentThrow === 2) {
        displayScore = totalScore + (currentThrow === 2 ? 0 : 0);
    }
    document.getElementById('scoreDisplay').textContent = totalScore;
    
    // Update state
    const state = window.__3D_STATE__;
    state.ballPosition = { x: ball.position.x, y: ball.position.y, z: ball.position.z };
    state.ballThrown = ballThrown;
    state.throwPower = throwPower;
    state.spinValue = spinValue;
    state.timeScale = timeScale;
    state.paused = paused;
    state.pinsDown = countPinsDown();
    state.currentFrame = currentFrame;
    state.currentThrow = currentThrow;
    state.totalScore = totalScore;
    state.isStrike = isStrike;
    state.isSpare = isSpare;
    state.pinStates = pins.map(p => p.standing && !p.knockedDown);
    state.gameOver = gameOver;
    state.gutterBall = gutterBall;
}

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

// Aim arrow
const arrowGroup = new THREE.Group();
const arrowBodyGeo = new THREE.CylinderGeometry(0.03, 0.03, 1.5, 8);
const arrowMat = new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x004422 });
const arrowBody = new THREE.Mesh(arrowBodyGeo, arrowMat);
arrowBody.rotation.x = Math.PI / 2;
arrowBody.position.z = -0.75;
arrowGroup.add(arrowBody);

const arrowHeadGeo = new THREE.ConeGeometry(0.08, 0.2, 8);
const arrowHead = new THREE.Mesh(arrowHeadGeo, arrowMat);
arrowHead.rotation.x = -Math.PI / 2;
arrowHead.position.z = -1.6;
arrowGroup.add(arrowHead);

arrowGroup.position.set(0, 0.55, 4);
scene.add(arrowGroup);

// Particle system for impact
const particleCount = 50;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

function animate() {
    requestAnimationFrame(animate);
    
    const rawDt = clock.getDelta();
    const dt = Math.min(rawDt, 0.05) * timeScale;
    
    // Update physics
    if (!paused) {
        // Sub-step physics for stability
        const subSteps = 3;
        const subDt = dt / subSteps;
        for (let s = 0; s < subSteps; s++) {
            updatePhysics(subDt);
        }
    }
    
    // Update aim arrow
    if (!ballThrown && !gameOver) {
        arrowGroup.visible = true;
        arrowGroup.position.set(ball.position.x, 0.55, ball.position.z);
        // Show spin direction
        arrowGroup.rotation.y = spinValue * 0.1;
        // Scale by power
        const powerScale = throwPower / 15;
        arrowGroup.scale.set(1, 1, powerScale);
        
        // Pulse effect
        const pulse = 0.8 + 0.2 * Math.sin(Date.now() * 0.005);
        arrowMat.emissiveIntensity = pulse;
    } else {
        arrowGroup.visible = false;
    }
    
    // Notification timer
    if (notificationTimer > 0) {
        notificationTimer -= rawDt;
        if (notificationTimer <= 0) {
            document.getElementById('notification').style.display = 'none';
        }
    }
    
    // Camera slight movement
    if (ballThrown && !gutterBall) {
        const targetZ = Math.max(ball.position.z - 5, -10);
        camera.position.z += (targetZ + 15 - camera.position.z) * 0.02;
        camera.lookAt(ball.position.x * 0.3, 0, ball.position.z - 5);
    } else {
        camera.position.z += (18 - camera.position.z) * 0.02;
        camera.lookAt(0, 0, -15);
    }
    
    updateHUD();
    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
