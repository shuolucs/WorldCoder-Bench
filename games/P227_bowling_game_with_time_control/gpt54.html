<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Bowling with Time Control</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }
    canvas { display: block; }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      background: rgba(0,0,0,0.55);
      padding: 12px 14px;
      border-radius: 8px;
      line-height: 1.5;
      font-size: 14px;
      z-index: 10;
      min-width: 220px;
    }
    #notification {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffd84d;
      background: rgba(0,0,0,0.7);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 28px;
      font-weight: bold;
      display: none;
      z-index: 20;
      text-shadow: 0 0 8px rgba(255,216,77,0.5);
    }
    #help {
      position: absolute;
      right: 12px;
      top: 12px;
      color: white;
      background: rgba(0,0,0,0.45);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.45;
      z-index: 10;
      max-width: 280px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="frameDisplay">Frame: 1 / 3</div>
    <div id="throwDisplay">Throw: 1 / 2</div>
    <div id="pinsDisplay">Pins this frame: 0</div>
    <div id="scoreDisplay">Total Score: 0</div>
    <div id="powerDisplay">Power: 15</div>
    <div id="timeDisplay">Time Scale: 1.0</div>
    <div id="spinDisplay">Spin: 0</div>
    <div id="statusDisplay">Status: Ready</div>
  </div>

  <div id="notification"></div>

  <div id="help">
    <b>Controls</b><br>
    A/D or ←/→: Aim<br>
    W/S or ↑/↓: Power +/-<br>
    Q/E: Spin left/right<br>
    Space: Throw<br>
    T: Time scale 1.0 → 0.25 → 0.1<br>
    P: Pause<br>
    R: Reset game
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1b1f2a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 18);
    camera.lookAt(0, 0, -15);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 15, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 60;
    scene.add(dirLight);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(80, 80),
      new THREE.MeshStandardMaterial({ color: 0x2a2a2a })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -1.2;
    floor.receiveShadow = true;
    scene.add(floor);

    const laneWidth = 3.5;
    const laneHeight = 0.2;
    const laneLength = 30;
    const laneCenter = new THREE.Vector3(0, 0, -10);

    const lane = new THREE.Mesh(
      new THREE.BoxGeometry(laneWidth, laneHeight, laneLength),
      new THREE.MeshStandardMaterial({ color: 0xC4A46C })
    );
    lane.position.copy(laneCenter);
    lane.receiveShadow = true;
    lane.castShadow = true;
    scene.add(lane);

    const gutterMaterial = new THREE.MeshStandardMaterial({ color: 0x444444 });
    const gutterGeom = new THREE.BoxGeometry(0.55, 0.22, laneLength);
    const leftGutter = new THREE.Mesh(gutterGeom, gutterMaterial);
    const rightGutter = new THREE.Mesh(gutterGeom, gutterMaterial);
    leftGutter.position.set(-(laneWidth / 2 + 0.28), -0.06, -10);
    rightGutter.position.set((laneWidth / 2 + 0.28), -0.06, -10);
    leftGutter.receiveShadow = rightGutter.receiveShadow = true;
    scene.add(leftGutter, rightGutter);

    const pedestal = new THREE.Mesh(
      new THREE.BoxGeometry(1, 1, 1),
      new THREE.MeshStandardMaterial({ color: 0xD4AF37, metalness: 0.7, roughness: 0.3 })
    );
    pedestal.position.set(4, 0.5, 5);
    pedestal.castShadow = true;
    pedestal.receiveShadow = true;
    scene.add(pedestal);

    let trophyLoaded = false;
    const loader = new GLTFLoader();
    loader.load(
      "Corset.glb",
      (gltf) => {
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x || 1, size.y || 1, size.z || 1);
        const scale = 1 / maxDim;
        model.scale.setScalar(scale);
        const box2 = new THREE.Box3().setFromObject(model);
        const center = new THREE.Vector3();
        const size2 = new THREE.Vector3();
        box2.getCenter(center);
        box2.getSize(size2);
        model.position.set(4 - center.x * scale, 1.0 - box2.min.y * scale, 5 - center.z * scale);
        model.traverse((c) => {
          if (c.isMesh) {
            c.castShadow = true;
            c.receiveShadow = true;
          }
        });
        scene.add(model);
        trophyLoaded = true;
      },
      undefined,
      (err) => {
        console.warn("Failed to load Corset.glb", err);
      }
    );

    class Body {
      constructor({
        mesh,
        mass = 1,
        radius = 0.2,
        position = new THREE.Vector3(),
        velocity = new THREE.Vector3(),
        angularVelocity = new THREE.Vector3(),
        quaternion = new THREE.Quaternion(),
        type = "dynamic",
      }) {
        this.mesh = mesh;
        this.mass = mass;
        this.invMass = mass > 0 ? 1 / mass : 0;
        this.radius = radius;
        this.position = position.clone();
        this.velocity = velocity.clone();
        this.angularVelocity = angularVelocity.clone();
        this.quaternion = quaternion.clone();
        this.type = type;
        this.forces = new THREE.Vector3();
        this.active = true;
      }
      syncMesh() {
        this.mesh.position.copy(this.position);
        this.mesh.quaternion.copy(this.quaternion);
      }
    }

    const gravity = new THREE.Vector3(0, -9.81, 0);

    const pinMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const pinBodies = [];
    const pinStartTransforms = [];

    function createPinMesh() {
      const group = new THREE.Group();

      const bottom = new THREE.Mesh(
        new THREE.CylinderGeometry(0.16, 0.18, 0.22, 16),
        pinMaterial
      );
      bottom.position.y = 0.11;

      const mid = new THREE.Mesh(
        new THREE.CylinderGeometry(0.13, 0.16, 0.22, 16),
        pinMaterial
      );
      mid.position.y = 0.31;

      const neck = new THREE.Mesh(
        new THREE.CylinderGeometry(0.09, 0.13, 0.18, 16),
        pinMaterial
      );
      neck.position.y = 0.51;

      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.11, 16, 16),
        pinMaterial
      );
      head.position.y = 0.66;
      head.scale.y = 1.2;

      [bottom, mid, neck, head].forEach(m => {
        m.castShadow = true;
        m.receiveShadow = true;
        group.add(m);
      });

      return group;
    }

    function createPins() {
      const startZ = -22;
      const rowSpacing = 0.58;
      const colSpacing = 0.38;
      let idx = 0;
      for (let row = 0; row < 4; row++) {
        const count = row + 1;
        for (let i = 0; i < count; i++) {
          const x = (i - (count - 1) / 2) * colSpacing;
          const z = startZ - row * rowSpacing;
          const pinMesh = createPinMesh();
          scene.add(pinMesh);
          const body = new Body({
            mesh: pinMesh,
            mass: 0.5,
            radius: 0.16,
            position: new THREE.Vector3(x, 0.1, z),
            velocity: new THREE.Vector3(),
            angularVelocity: new THREE.Vector3(),
            quaternion: new THREE.Quaternion(),
          });
          body.syncMesh();
          pinBodies.push(body);
          pinStartTransforms[idx++] = {
            position: body.position.clone(),
            quaternion: body.quaternion.clone()
          };
        }
      }
    }
    createPins();

    const ballMesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.35, 32, 32),
      new THREE.MeshStandardMaterial({ color: 0x222244, metalness: 0.2, roughness: 0.5 })
    );
    ballMesh.castShadow = true;
    ballMesh.receiveShadow = true;
    scene.add(ballMesh);

    const ballBody = new Body({
      mesh: ballMesh,
      mass: 5,
      radius: 0.35,
      position: new THREE.Vector3(0, 0.55, 4),
      velocity: new THREE.Vector3(),
      angularVelocity: new THREE.Vector3(),
      quaternion: new THREE.Quaternion(),
    });
    ballBody.syncMesh();

    const hud = {
      frame: document.getElementById("frameDisplay"),
      throwD: document.getElementById("throwDisplay"),
      pins: document.getElementById("pinsDisplay"),
      score: document.getElementById("scoreDisplay"),
      power: document.getElementById("powerDisplay"),
      time: document.getElementById("timeDisplay"),
      spin: document.getElementById("spinDisplay"),
      status: document.getElementById("statusDisplay"),
      notification: document.getElementById("notification")
    };

    const state = {
      throwPower: 15,
      spinValue: 0,
      timeScale: 1.0,
      paused: false,
      thrown: false,
      throwStartTime: 0,
      frame: 1,
      currentThrow: 1,
      pinsDownThisFrame: 0,
      totalScore: 0,
      isStrike: false,
      isSpare: false,
      gameOver: false,
      gutterBall: false,
      frameStandingAtStart: [],
      lastEvaluatedThrow: 0
    };

    function resetBall() {
      ballBody.position.set(0, 0.55, 4);
      ballBody.velocity.set(0, 0, 0);
      ballBody.angularVelocity.set(0, 0, 0);
      ballBody.quaternion.identity();
      ballBody.active = true;
      ballBody.syncMesh();
      state.thrown = false;
      state.throwStartTime = 0;
      state.gutterBall = false;
    }

    function resetPins() {
      pinBodies.forEach((pin, i) => {
        pin.position.copy(pinStartTransforms[i].position);
        pin.quaternion.copy(pinStartTransforms[i].quaternion);
        pin.velocity.set(0, 0, 0);
        pin.angularVelocity.set(0, 0, 0);
        pin.active = true;
        pin.syncMesh();
      });
    }

    function fullReset() {
      state.throwPower = 15;
      state.spinValue = 0;
      state.timeScale = state.paused ? 0 : 1.0;
      state.paused = false;
      state.frame = 1;
      state.currentThrow = 1;
      state.pinsDownThisFrame = 0;
      state.totalScore = 0;
      state.isStrike = false;
      state.isSpare = false;
      state.gameOver = false;
      state.gutterBall = false;
      state.lastEvaluatedThrow = 0;
      resetPins();
      resetBall();
      captureStandingPins();
      updateHUD();
      updateExposedState();
    }

    function captureStandingPins() {
      state.frameStandingAtStart = pinBodies.map(pin => isPinStanding(pin));
    }

    function isPinStanding(pin) {
      const up = new THREE.Vector3(0, 1, 0).applyQuaternion(pin.quaternion);
      return up.dot(new THREE.Vector3(0, 1, 0)) >= 0.707;
    }

    function countStandingPins() {
      return pinBodies.filter(p => isPinStanding(p)).length;
    }

    function standingArray() {
      return pinBodies.map(p => isPinStanding(p));
    }

    function showNotification(text) {
      hud.notification.textContent = text;
      hud.notification.style.display = "block";
      clearTimeout(showNotification._timer);
      showNotification._timer = setTimeout(() => {
        hud.notification.style.display = "none";
      }, 2000);
    }

    function updateHUD() {
      hud.frame.textContent = `Frame: ${state.frame} / 3`;
      hud.throwD.textContent = `Throw: ${state.currentThrow} / 2`;
      hud.pins.textContent = `Pins this frame: ${state.pinsDownThisFrame}`;
      hud.score.textContent = `Total Score: ${state.totalScore}`;
      hud.power.textContent = `Power: ${state.throwPower}`;
      hud.time.textContent = `Time Scale: ${state.paused ? 0 : state.timeScale.toFixed(2).replace(/\.00$/, ".0")}`;
      hud.spin.textContent = `Spin: ${state.spinValue}`;
      let status = state.gameOver ? "Game Over" : state.thrown ? "Ball in play" : "Ready";
      if (state.gutterBall) status = "Gutter Ball";
      if (state.paused) status = "Paused";
      hud.status.textContent = `Status: ${status}`;
    }

    function updateExposedState() {
      window.__3D_STATE__ = {
        ballPosition: {
          x: ballBody.position.x,
          y: ballBody.position.y,
          z: ballBody.position.z
        },
        ballThrown: state.thrown,
        throwPower: state.throwPower,
        spinValue: state.spinValue,
        timeScale: state.paused ? 0 : state.timeScale,
        paused: state.paused,
        pinsDown: state.pinsDownThisFrame,
        currentFrame: state.frame,
        currentThrow: state.currentThrow,
        totalScore: state.totalScore,
        isStrike: state.isStrike,
        isSpare: state.isSpare,
        pinStates: standingArray(),
        trophyLoaded,
        gameOver: state.gameOver,
        gutterBall: state.gutterBall
      };
    }

    function endThrowAndScore() {
      if (!state.thrown || state.gameOver) return;

      state.thrown = false;
      ballBody.velocity.set(0, 0, 0);
      ballBody.angularVelocity.set(0, 0, 0);

      const beforeStanding = state.frameStandingAtStart;
      const afterStanding = standingArray();

      let newlyKnocked = 0;
      for (let i = 0; i < 10; i++) {
        if (beforeStanding[i] && !afterStanding[i]) newlyKnocked++;
      }

      state.pinsDownThisFrame += newlyKnocked;
      state.totalScore += newlyKnocked;
      state.isStrike = false;
      state.isSpare = false;

      const allDown = countStandingPins() === 0;

      if (state.currentThrow === 1) {
        if (state.pinsDownThisFrame === 10 || allDown) {
          state.isStrike = true;
          state.totalScore += 10;
          showNotification("STRIKE!");
          advanceFrame();
        } else {
          state.currentThrow = 2;
          state.frameStandingAtStart = standingArray();
          resetBall();
        }
      } else {
        if (state.pinsDownThisFrame === 10 || allDown) {
          state.isSpare = true;
          state.totalScore += 5;
          showNotification("SPARE!");
        }
        advanceFrame();
      }

      updateHUD();
      updateExposedState();
    }

    function advanceFrame() {
      if (state.frame >= 3) {
        state.gameOver = true;
        resetBall();
        updateHUD();
        updateExposedState();
        return;
      }
      state.frame += 1;
      state.currentThrow = 1;
      state.pinsDownThisFrame = 0;
      state.isStrike = false;
      state.isSpare = false;
      resetPins();
      resetBall();
      captureStandingPins();
    }

    function throwBall() {
      if (state.thrown || state.gameOver) return;
      state.thrown = true;
      state.gutterBall = false;
      state.throwStartTime = performance.now() / 1000;
      ballBody.velocity.set(0, 0, -state.throwPower);
      ballBody.angularVelocity.set(state.throwPower * 2, 0, 0);
      updateHUD();
      updateExposedState();
    }

    function onKeyDown(e) {
      const key = e.key.toLowerCase();

      if (key === "p") {
        state.paused = !state.paused;
        updateHUD();
        updateExposedState();
        return;
      }

      if (key === "t") {
        if (!state.paused) {
          if (state.timeScale === 1.0) state.timeScale = 0.25;
          else if (state.timeScale === 0.25) state.timeScale = 0.1;
          else state.timeScale = 1.0;
        }
        updateHUD();
        updateExposedState();
        return;
      }

      if (key === "r") {
        fullReset();
        return;
      }

      if (state.gameOver || state.paused) return;

      if (!state.thrown) {
        if (key === "a" || e.key === "ArrowLeft") {
          ballBody.position.x = Math.max(-1.5, ballBody.position.x - 0.15);
          ballBody.syncMesh();
        }
        if (key === "d" || e.key === "ArrowRight") {
          ballBody.position.x = Math.min(1.5, ballBody.position.x + 0.15);
          ballBody.syncMesh();
        }
        if (key === "w" || e.key === "ArrowUp") {
          state.throwPower = Math.min(25, state.throwPower + 1);
        }
        if (key === "s" || e.key === "ArrowDown") {
          state.throwPower = Math.max(5, state.throwPower - 1);
        }
        if (key === "q") {
          state.spinValue = Math.max(-3, state.spinValue - 1);
        }
        if (key === "e") {
          state.spinValue = Math.min(3, state.spinValue + 1);
        }
        if (e.code === "Space") {
          e.preventDefault();
          throwBall();
        }
      }

      updateHUD();
      updateExposedState();
    }

    window.addEventListener("keydown", onKeyDown);

    function integrateBody(body, dt) {
      if (!body.active || body.type !== "dynamic") return;

      body.velocity.addScaledVector(gravity, dt);
      body.position.addScaledVector(body.velocity, dt);

      const w = body.angularVelocity;
      const angle = w.length() * dt;
      if (angle > 0.00001) {
        const axis = w.clone().normalize();
        const dq = new THREE.Quaternion().setFromAxisAngle(axis, angle);
        body.quaternion.premultiply(dq).normalize();
      }
    }

    function laneAndGroundCollision(body, isBall = false) {
      const laneTop = laneCenter.y + laneHeight / 2;
      const leftEdge = -laneWidth / 2;
      const rightEdge = laneWidth / 2;

      if (isBall) {
        if (Math.abs(body.position.x) <= laneWidth / 2 && body.position.y - body.radius < laneTop) {
          body.position.y = laneTop + body.radius;
          if (body.velocity.y < 0) body.velocity.y = 0;
          body.velocity.z *= 0.995;
          body.velocity.x *= 0.985;
          body.angularVelocity.x *= 0.99;

          if (state.thrown) {
            body.velocity.x += state.spinValue * 0.04;
            body.velocity.x = THREE.MathUtils.clamp(body.velocity.x, -6, 6);
          }
        } else {
          if (Math.abs(body.position.x) > 1.75 && body.position.y > -3) {
            state.gutterBall = true;
          }
          if (body.position.y - body.radius < -1.2) {
            body.position.y = -1.2 + body.radius;
            if (body.velocity.y < 0) body.velocity.y *= -0.2;
            body.velocity.multiplyScalar(0.96);
          }
        }

        if (Math.abs(body.position.x) > 1.75 && body.position.y < 0.2) {
          body.velocity.y -= 2.5 * (1 / 60);
        }

        if (body.position.x - body.radius < leftEdge && Math.abs(body.position.x) < laneWidth / 2 + 0.15 && body.position.y < laneTop + 0.5) {
          body.velocity.x += 0.3;
        }
        if (body.position.x + body.radius > rightEdge && Math.abs(body.position.x) < laneWidth / 2 + 0.15 && body.position.y < laneTop + 0.5) {
          body.velocity.x -= 0.3;
        }
      } else {
        if (body.position.y < laneTop) {
          body.position.y = laneTop;
          if (body.velocity.y < 0) body.velocity.y = 0;
          body.velocity.x *= 0.92;
          body.velocity.z *= 0.92;
          body.angularVelocity.multiplyScalar(0.96);
        }
      }
    }

    function resolveSpherePin(ball, pin) {
      const dx = pin.position.x - ball.position.x;
      const dz = pin.position.z - ball.position.z;
      const distSq = dx * dx + dz * dz;
      const minDist = ball.radius + pin.radius;
      if (distSq < minDist * minDist) {
        const dist = Math.sqrt(distSq) || 0.0001;
        const nx = dx / dist;
        const nz = dz / dist;
        const overlap = minDist - dist;

        pin.position.x += nx * overlap * 0.7;
        pin.position.z += nz * overlap * 0.7;
        ball.position.x -= nx * overlap * 0.12;
        ball.position.z -= nz * overlap * 0.12;

        const relVel = new THREE.Vector3(
          pin.velocity.x - ball.velocity.x,
          0,
          pin.velocity.z - ball.velocity.z
        );
        const sepVel = relVel.x * nx + relVel.z * nz;
        if (sepVel < 0) {
          const restitution = 0.35;
          const j = -(1 + restitution) * sepVel / (ball.invMass + pin.invMass);
          const impulseX = nx * j;
          const impulseZ = nz * j;
          ball.velocity.x -= impulseX * ball.invMass;
          ball.velocity.z -= impulseZ * ball.invMass;
          pin.velocity.x += impulseX * pin.invMass;
          pin.velocity.z += impulseZ * pin.invMass;

          const side = new THREE.Vector3(-nz, 0, nx);
          const torqueMag = Math.min(10, ball.velocity.length() * 0.2 + Math.abs(state.spinValue) * 0.5);
          pin.angularVelocity.addScaledVector(side, torqueMag);
          pin.angularVelocity.x += (Math.random() - 0.5) * 2;
          pin.angularVelocity.z += (Math.random() - 0.5) * 2;
          pin.velocity.y += 0.4;
        }
      }
    }

    function resolvePinPin(a, b) {
      const dx = b.position.x - a.position.x;
      const dz = b.position.z - a.position.z;
      const distSq = dx * dx + dz * dz;
      const minDist = a.radius + b.radius;
      if (distSq < minDist * minDist) {
        const dist = Math.sqrt(distSq) || 0.0001;
        const nx = dx / dist;
        const nz = dz / dist;
        const overlap = minDist - dist;

        a.position.x -= nx * overlap * 0.5;
        a.position.z -= nz * overlap * 0.5;
        b.position.x += nx * overlap * 0.5;
        b.position.z += nz * overlap * 0.5;

        const rvx = b.velocity.x - a.velocity.x;
        const rvz = b.velocity.z - a.velocity.z;
        const sepVel = rvx * nx + rvz * nz;
        if (sepVel < 0) {
          const restitution = 0.2;
          const j = -(1 + restitution) * sepVel / (a.invMass + b.invMass);
          const ix = nx * j;
          const iz = nz * j;
          a.velocity.x -= ix * a.invMass;
          a.velocity.z -= iz * a.invMass;
          b.velocity.x += ix * b.invMass;
          b.velocity.z += iz * b.invMass;

          const side = new THREE.Vector3(-nz, 0, nx);
          a.angularVelocity.addScaledVector(side, -1.2);
          b.angularVelocity.addScaledVector(side, 1.2);
        }
      }
    }

    let lastTime = performance.now() / 1000;
    captureStandingPins();
    updateHUD();
    updateExposedState();

    function animate() {
      requestAnimationFrame(animate);

      const now = performance.now() / 1000;
      let realDt = now - lastTime;
      lastTime = now;
      realDt = Math.min(realDt, 0.05);

      const simScale = state.paused ? 0 : state.timeScale;
      const dt = realDt * simScale;

      if (dt > 0 && !state.gameOver) {
        integrateBody(ballBody, dt);
        laneAndGroundCollision(ballBody, true);

        for (const pin of pinBodies) {
          integrateBody(pin, dt);
          laneAndGroundCollision(pin, false);
        }

        if (state.thrown) {
          for (const pin of pinBodies) {
            resolveSpherePin(ballBody, pin);
          }
          for (let i = 0; i < pinBodies.length; i++) {
            for (let j = i + 1; j < pinBodies.length; j++) {
              resolvePinPin(pinBodies[i], pinBodies[j]);
            }
          }

          if (Math.abs(ballBody.velocity.z) > 0.1) {
            ballBody.angularVelocity.x = -ballBody.velocity.z / ballBody.radius;
          }

          if (state.gutterBall) {
            ballBody.velocity.y -= 9.81 * dt;
          }

          const elapsed = now - state.throwStartTime;
          const shouldEnd =
            ballBody.position.z < -25 ||
            elapsed > 5 ||
            ballBody.velocity.length() < 0.25 ||
            ballBody.position.y < -2.5;

          if (shouldEnd) {
            endThrowAndScore();
          }
        } else {
          ballBody.position.y = 0.55;
          ballBody.velocity.set(0, 0, 0);
        }

        ballBody.syncMesh();
        pinBodies.forEach(p => p.syncMesh());
      }

      updateHUD();
      updateExposedState();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
