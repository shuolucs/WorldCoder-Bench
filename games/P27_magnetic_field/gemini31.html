<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Magnetic Dipole Field Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #ui-container {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(10, 10, 26, 0.85);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            pointer-events: auto;
            width: 280px;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }
        label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 5px;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        button {
            background: #2a2a4a;
            color: white;
            border: 1px solid #4a4a6a;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            width: 48%;
        }
        button:hover {
            background: #3a3a5a;
        }
        button:disabled {
            background: #1a1a2a;
            color: #555;
            cursor: not-allowed;
            border-color: #222;
        }
        .button-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .hud-stats {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            font-size: 13px;
            line-height: 1.6;
        }
        .hud-stats span {
            font-weight: bold;
            color: #00ffff;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="ui-container">
        <div class="button-row">
            <button id="addDipole">Add Dipole</button>
            <button id="removeDipole">Remove Dipole</button>
        </div>
        
        <div class="control-group">
            <label>Field Strength: <span id="strengthDisplay">1.0</span></label>
            <input type="range" id="fieldStrength" min="0.1" max="5.0" step="0.1" value="1.0">
        </div>
        
        <div class="control-group">
            <label>Seed Density: <span id="densityDisplay">20</span></label>
            <input type="range" id="seedDensity" min="10" max="50" step="5" value="20">
        </div>

        <div class="hud-stats">
            <div>Dipoles: <span id="dipoleCount">2</span></div>
            <div>Streamlines: <span id="streamlineCount">0</span></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State & Configuration ---
        const state = {
            dipoles: [
                { pos: new THREE.Vector3(0, 0, -1.5), m: new THREE.Vector3(0, 1, 0) },
                { pos: new THREE.Vector3(0, 0, 1.5), m: new THREE.Vector3(0, 1, 0) }
            ],
            fieldStrength: 1.0,
            seedDensity: 20,
            streamlineCount: 0
        };

        const config = {
            seedRadius: 0.3,
            rk4Step: 0.05,
            maxSteps: 500,
            minB: 1e-6,
            singularityDist: 0.1,
            maxDist: 10
        };

        // --- Three.js Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(6, 4, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Environment Helpers
        const axesHelper = new THREE.AxesHelper(5);
        scene.add(axesHelper);

        const planeGeo = new THREE.PlaneGeometry(20, 20);
        const planeMat = new THREE.MeshBasicMaterial({ 
            color: 0x222233, 
            transparent: true, 
            opacity: 0.3, 
            side: THREE.DoubleSide,
            depthWrite: false
        });
        const refPlane = new THREE.Mesh(planeGeo, planeMat);
        refPlane.rotation.x = Math.PI / 2;
        scene.add(refPlane);

        // --- Physics & Math ---
        function getBField(r) {
            const B = new THREE.Vector3(0, 0, 0);
            const r_minus_c = new THREE.Vector3();
            const m_scaled = new THREE.Vector3();

            for (const dipole of state.dipoles) {
                r_minus_c.subVectors(r, dipole.pos);
                const dist = r_minus_c.length();
                if (dist < config.singularityDist * 0.5) continue;

                const r_hat = r_minus_c.clone().normalize();
                m_scaled.copy(dipole.m).multiplyScalar(state.fieldStrength);

                const m_dot_r_hat = m_scaled.dot(r_hat);
                const term1 = r_hat.clone().multiplyScalar(3 * m_dot_r_hat);
                const B_i = term1.sub(m_scaled).divideScalar(dist * dist * dist);
                B.add(B_i);
            }
            return B;
        }

        function rk4Step(p, ds, direction) {
            const B1 = getBField(p);
            const mag1 = B1.length();
            if (mag1 < config.minB) return null;
            const k1 = B1.clone().normalize().multiplyScalar(ds * direction);

            const p2 = p.clone().add(k1.clone().multiplyScalar(0.5));
            const B2 = getBField(p2);
            if (B2.length() < config.minB) return null;
            const k2 = B2.clone().normalize().multiplyScalar(ds * direction);

            const p3 = p.clone().add(k2.clone().multiplyScalar(0.5));
            const B3 = getBField(p3);
            if (B3.length() < config.minB) return null;
            const k3 = B3.clone().normalize().multiplyScalar(ds * direction);

            const p4 = p.clone().add(k3);
            const B4 = getBField(p4);
            if (B4.length() < config.minB) return null;
            const k4 = B4.clone().normalize().multiplyScalar(ds * direction);

            const step = k1.add(k2.multiplyScalar(2)).add(k3.multiplyScalar(2)).add(k4).divideScalar(6);
            return { nextP: p.clone().add(step), mag: mag1 };
        }

        function traceStreamline(seed, direction) {
            const points = [];
            const magnitudes = [];
            let currentP = seed.clone();

            for (let i = 0; i < config.maxSteps; i++) {
                points.push(currentP.clone());
                const B = getBField(currentP);
                magnitudes.push(B.length());

                if (currentP.length() > config.maxDist) break;
                
                let hitSingularity = false;
                for (const d of state.dipoles) {
                    if (currentP.distanceTo(d.pos) < config.singularityDist) {
                        hitSingularity = true;
                        break;
                    }
                }
                if (hitSingularity && i > 5) break;

                const stepResult = rk4Step(currentP, config.rk4Step, direction);
                if (!stepResult) break;
                currentP = stepResult.nextP;
            }
            return { points, magnitudes };
        }

        function getFibonacciSpherePoints(samples, radius, center) {
            const points = [];
            const phi = Math.PI * (3 - Math.sqrt(5));
            for (let i = 0; i < samples; i++) {
                const y = 1 - (i / (samples - 1)) * 2;
                const radiusAtY = Math.sqrt(1 - y * y);
                const theta = phi * i;
                const x = Math.cos(theta) * radiusAtY;
                const z = Math.sin(theta) * radiusAtY;
                points.push(new THREE.Vector3(x * radius, y * radius, z * radius).add(center));
            }
            return points;
        }

        // --- Rendering ---
        const colorBlue = new THREE.Color(0x0000ff);
        const colorCyan = new THREE.Color(0x00ffff);
        const colorGreen = new THREE.Color(0x00ff00);
        const colorYellow = new THREE.Color(0xffff00);
        const colorRed = new THREE.Color(0xff0000);

        function getColor(mag) {
            const logMag = Math.log10(mag);
            let t = (logMag + 2) / 3.5; // Map approx [-2, 1.5] to [0, 1]
            t = THREE.MathUtils.clamp(t, 0, 1);
            const c = new THREE.Color();
            if (t < 0.25) c.lerpColors(colorBlue, colorCyan, t / 0.25);
            else if (t < 0.5) c.lerpColors(colorCyan, colorGreen, (t - 0.25) / 0.25);
            else if (t < 0.75) c.lerpColors(colorGreen, colorYellow, (t - 0.5) / 0.25);
            else c.lerpColors(colorYellow, colorRed, (t - 0.75) / 0.25);
            return c;
        }

        let streamlineMeshes = [];
        let dipoleMeshes = [];

        function buildStreamlines() {
            streamlineMeshes.forEach(m => {
                m.geometry.dispose();
                m.material.dispose();
                scene.remove(m);
            });
            streamlineMeshes = [];
            state.streamlineCount = 0;

            const lineMaterial = new THREE.LineBasicMaterial({ vertexColors: true, linewidth: 2 });

            state.dipoles.forEach(dipole => {
                const seeds = getFibonacciSpherePoints(state.seedDensity, config.seedRadius, dipole.pos);
                
                seeds.forEach(seed => {
                    const forward = traceStreamline(seed, 1);
                    const backward = traceStreamline(seed, -1);

                    backward.points.reverse();
                    backward.magnitudes.reverse();
                    
                    if (backward.points.length > 0) {
                        backward.points.pop();
                        backward.magnitudes.pop();
                    }

                    const fullPoints = backward.points.concat(forward.points);
                    const fullMags = backward.magnitudes.concat(forward.magnitudes);

                    if (fullPoints.length > 1) {
                        const geometry = new THREE.BufferGeometry().setFromPoints(fullPoints);
                        const colors = [];
                        for (let i = 0; i < fullMags.length; i++) {
                            const c = getColor(fullMags[i]);
                            colors.push(c.r, c.g, c.b);
                        }
                        geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                        
                        const line = new THREE.Line(geometry, lineMaterial);
                        scene.add(line);
                        streamlineMeshes.push(line);
                        state.streamlineCount++;
                    }
                });
            });
            updateExposedState();
        }

        function buildDipoles() {
            dipoleMeshes.forEach(m => scene.remove(m));
            dipoleMeshes = [];

            const sphereGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const sphereMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

            state.dipoles.forEach((dipole, index) => {
                const group = new THREE.Group();
                
                const sphere = new THREE.Mesh(sphereGeo, sphereMat);
                group.add(sphere);

                const dir = dipole.m.clone().normalize();
                const arrow = new THREE.ArrowHelper(dir, new THREE.Vector3(0,0,0), 0.5, 0xffffff, 0.15, 0.1);
                group.add(arrow);

                group.position.copy(dipole.pos);
                group.userData = { isDipole: true, index: index };
                
                // Invisible larger sphere for easier raycasting
                const hitGeo = new THREE.SphereGeometry(0.4, 8, 8);
                const hitMat = new THREE.MeshBasicMaterial({ visible: false });
                const hitMesh = new THREE.Mesh(hitGeo, hitMat);
                group.add(hitMesh);

                scene.add(group);
                dipoleMeshes.push(group);
            });
        }

        function updateScene() {
            buildDipoles();
            buildStreamlines();
        }

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        let draggedDipoleIndex = -1;

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(dipoleMeshes, true);
            
            if (intersects.length > 0) {
                let obj = intersects[0].object;
                while (obj.parent && obj.parent.type !== 'Scene') {
                    if (obj.userData.isDipole) break;
                    obj = obj.parent;
                }
                if (obj.userData.isDipole) {
                    draggedDipoleIndex = obj.userData.index;
                    controls.enabled = false;
                }
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (draggedDipoleIndex !== -1) {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                
                raycaster.setFromCamera(mouse, camera);
                const target = new THREE.Vector3();
                raycaster.ray.intersectPlane(dragPlane, target);
                
                if (target) {
                    state.dipoles[draggedDipoleIndex].pos.set(target.x, 0, target.z);
                    dipoleMeshes[draggedDipoleIndex].position.copy(target);
                    buildStreamlines(); // Recompute lines on drag
                }
            }
        });

        window.addEventListener('pointerup', () => {
            draggedDipoleIndex = -1;
            controls.enabled = true;
        });

        // --- UI & State Management ---
        const uiAdd = document.getElementById('addDipole');
        const uiRemove = document.getElementById('removeDipole');
        const uiStrength = document.getElementById('fieldStrength');
        const uiDensity = document.getElementById('seedDensity');
        
        function updateUI() {
            uiAdd.disabled = state.dipoles.length >= 4;
            uiRemove.disabled = state.dipoles.length <= 1;
            document.getElementById('dipoleCount').innerText = state.dipoles.length;
            document.getElementById('streamlineCount').innerText = state.streamlineCount;
            document.getElementById('strengthDisplay').innerText = state.fieldStrength.toFixed(1);
            document.getElementById('densityDisplay').innerText = state.seedDensity;
        }

        function updateExposedState() {
            window.__3D_STATE__ = {
                dipoleCount: state.dipoles.length,
                dipoles: state.dipoles.map(d => ({ 
                    x: d.pos.x, y: d.pos.y, z: d.pos.z, 
                    mx: d.m.x, my: d.m.y, mz: d.m.z 
                })),
                streamlineCount: state.streamlineCount,
                seedDensity: state.seedDensity,
                fieldStrength: state.fieldStrength
            };
            updateUI();
        }

        uiAdd.addEventListener('click', () => {
            if (state.dipoles.length < 4) {
                const x = (Math.random() - 0.5) * 4;
                const z = (Math.random() - 0.5) * 4;
                state.dipoles.push({ pos: new THREE.Vector3(x, 0, z), m: new THREE.Vector3(0, 1, 0) });
                updateScene();
            }
        });

        uiRemove.addEventListener('click', () => {
            if (state.dipoles.length > 1) {
                state.dipoles.pop();
                updateScene();
            }
        });

        uiStrength.addEventListener('input', (e) => {
            state.fieldStrength = parseFloat(e.target.value);
            document.getElementById('strengthDisplay').innerText = state.fieldStrength.toFixed(1);
            buildStreamlines();
        });

        uiDensity.addEventListener('input', (e) => {
            state.seedDensity = parseInt(e.target.value);
            document.getElementById('densityDisplay').innerText = state.seedDensity;
            buildStreamlines();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Initialization & Loop ---
        updateScene();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            // Ensure state is updated every frame as requested
            updateExposedState(); 
        }
        animate();

    </script>
</body>
</html>
