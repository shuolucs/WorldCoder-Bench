<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Magnetic Dipole Field Visualization</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, sans-serif; }
canvas { display: block; }

#controls {
  position: absolute;
  top: 15px;
  left: 15px;
  background: rgba(10, 10, 30, 0.85);
  border: 1px solid rgba(100, 140, 255, 0.3);
  border-radius: 12px;
  padding: 18px;
  color: #c8d8ff;
  min-width: 260px;
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

#controls h2 {
  font-size: 16px;
  margin-bottom: 14px;
  color: #8ab4ff;
  border-bottom: 1px solid rgba(100, 140, 255, 0.2);
  padding-bottom: 8px;
  letter-spacing: 1px;
}

.control-group {
  margin-bottom: 12px;
}

.control-group label {
  display: block;
  font-size: 12px;
  color: #8899bb;
  margin-bottom: 4px;
}

.control-group input[type="range"] {
  width: 100%;
  accent-color: #5588ff;
  cursor: pointer;
}

.control-group .value {
  font-size: 12px;
  color: #aabbdd;
  float: right;
  margin-top: -18px;
}

.btn-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.btn-row button {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid rgba(100, 140, 255, 0.4);
  border-radius: 6px;
  background: rgba(50, 70, 120, 0.4);
  color: #aaccff;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-row button:hover {
  background: rgba(70, 100, 180, 0.6);
  border-color: rgba(100, 160, 255, 0.7);
}

.btn-row button:active {
  transform: scale(0.97);
}

#hud {
  position: absolute;
  top: 15px;
  right: 15px;
  background: rgba(10, 10, 30, 0.85);
  border: 1px solid rgba(100, 140, 255, 0.3);
  border-radius: 12px;
  padding: 16px 20px;
  color: #c8d8ff;
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  min-width: 200px;
}

#hud h3 {
  font-size: 14px;
  color: #8ab4ff;
  margin-bottom: 10px;
  border-bottom: 1px solid rgba(100, 140, 255, 0.2);
  padding-bottom: 6px;
}

.hud-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  font-size: 13px;
}

.hud-item .label { color: #8899bb; }
.hud-item .val { color: #aaddff; font-weight: bold; }

#instructions {
  position: absolute;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10, 10, 30, 0.75);
  border: 1px solid rgba(100, 140, 255, 0.2);
  border-radius: 8px;
  padding: 8px 18px;
  color: #7788aa;
  font-size: 12px;
  backdrop-filter: blur(5px);
}
</style>
</head>
<body>

<div id="controls">
  <h2>⚡ Dipole Controls</h2>
  <div class="btn-row">
    <button id="addDipole">+ Add Dipole</button>
    <button id="removeDipole">− Remove Dipole</button>
  </div>
  <div class="control-group">
    <label>Field Strength Multiplier</label>
    <input type="range" id="fieldStrength" min="0.1" max="5.0" step="0.1" value="1.0">
    <span class="value" id="strengthVal">1.0</span>
  </div>
  <div class="control-group">
    <label>Seed Density (per dipole)</label>
    <input type="range" id="seedDensity" min="10" max="50" step="5" value="20">
    <span class="value" id="seedVal">20</span>
  </div>
</div>

<div id="hud">
  <h3>📊 Status</h3>
  <div class="hud-item">
    <span class="label">Dipoles:</span>
    <span class="val" id="dipoleCount">2</span>
  </div>
  <div class="hud-item">
    <span class="label">Streamlines:</span>
    <span class="val" id="streamlineCount">0</span>
  </div>
  <div class="hud-item">
    <span class="label">Field Strength:</span>
    <span class="val" id="strengthDisplay">1.0×</span>
  </div>
</div>

<div id="instructions">
  Drag dipoles on the XZ plane • Scroll to zoom • Right-click to pan
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(6, 5, 6);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// Axes
const axes = new THREE.AxesHelper(5);
scene.add(axes);

// Reference plane y=0
const planeGeo = new THREE.PlaneGeometry(20, 20);
const planeMat = new THREE.MeshBasicMaterial({
  color: 0x334466,
  transparent: true,
  opacity: 0.08,
  side: THREE.DoubleSide
});
const refPlane = new THREE.Mesh(planeGeo, planeMat);
refPlane.rotation.x = -Math.PI / 2;
refPlane.position.y = 0;
scene.add(refPlane);

// Grid
const grid = new THREE.GridHelper(20, 20, 0x223355, 0x112233);
grid.material.transparent = true;
grid.material.opacity = 0.3;
scene.add(grid);

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 1.0);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

// ============ DIPOLE DATA ============
let dipoles = [
  { pos: new THREE.Vector3(0, 0, -1.5), moment: new THREE.Vector3(0, 1, 0) },
  { pos: new THREE.Vector3(0, 0, 1.5), moment: new THREE.Vector3(0, 1, 0) }
];

let fieldStrength = 1.0;
let seedDensity = 20;

// ============ DIPOLE VISUALS ============
const dipoleGroup = new THREE.Group();
scene.add(dipoleGroup);

const streamlineGroup = new THREE.Group();
scene.add(streamlineGroup);

const dipoleMeshes = []; // for raycasting

function createDipoleVisual(dipole) {
  const group = new THREE.Group();

  // Sphere
  const sphereGeo = new THREE.SphereGeometry(0.15, 24, 24);
  const sphereMat = new THREE.MeshPhongMaterial({
    color: 0xff6644,
    emissive: 0x441100,
    shininess: 80
  });
  const sphere = new THREE.Mesh(sphereGeo, sphereMat);
  group.add(sphere);

  // Arrow for moment direction
  const dir = dipole.moment.clone().normalize();
  const arrow = new THREE.ArrowHelper(dir, new THREE.Vector3(0, 0, 0), 0.5, 0xffffff, 0.12, 0.08);
  group.add(arrow);

  group.position.copy(dipole.pos);
  group.userData.dipoleIndex = dipoles.indexOf(dipole);

  return { group, sphere, arrow };
}

function rebuildDipoleVisuals() {
  // Clear
  dipoleGroup.clear();
  dipoleMeshes.length = 0;

  dipoles.forEach((d, i) => {
    const vis = createDipoleVisual(d);
    vis.group.userData.dipoleIndex = i;
    vis.sphere.userData.dipoleIndex = i;
    dipoleGroup.add(vis.group);
    dipoleMeshes.push(vis.sphere);
    // Make sphere world-accessible for raycasting
    vis.sphere.userData.parentGroup = vis.group;
  });
}

// ============ MAGNETIC FIELD COMPUTATION ============
const _tmpVec = new THREE.Vector3();
const _rVec = new THREE.Vector3();
const _rHat = new THREE.Vector3();
const _bField = new THREE.Vector3();

function computeField(point, result) {
  result.set(0, 0, 0);

  for (let i = 0; i < dipoles.length; i++) {
    const d = dipoles[i];
    _rVec.subVectors(point, d.pos);
    const rLen = _rVec.length();

    if (rLen < 0.05) continue; // avoid singularity

    _rHat.copy(_rVec).divideScalar(rLen);

    const m = d.moment;
    const mScaled_x = m.x * fieldStrength;
    const mScaled_y = m.y * fieldStrength;
    const mScaled_z = m.z * fieldStrength;

    const mDotR = mScaled_x * _rHat.x + mScaled_y * _rHat.y + mScaled_z * _rHat.z;
    const r3 = rLen * rLen * rLen;

    // B = (1/r³) * [3(m·r̂)r̂ - m]
    result.x += (3 * mDotR * _rHat.x - mScaled_x) / r3;
    result.y += (3 * mDotR * _rHat.y - mScaled_y) / r3;
    result.z += (3 * mDotR * _rHat.z - mScaled_z) / r3;
  }

  return result;
}

// ============ SEED POINTS ============
function generateSeedPoints() {
  const seeds = [];
  const radius = 0.3;

  for (const d of dipoles) {
    const n = seedDensity;
    // Fibonacci sphere distribution
    const goldenAngle = Math.PI * (3 - Math.sqrt(5));
    for (let i = 0; i < n; i++) {
      const y = 1 - (i / (n - 1)) * 2; // -1 to 1
      const radiusAtY = Math.sqrt(1 - y * y);
      const theta = goldenAngle * i;

      const px = d.pos.x + radius * radiusAtY * Math.cos(theta);
      const py = d.pos.y + radius * y;
      const pz = d.pos.z + radius * radiusAtY * Math.sin(theta);

      seeds.push(new THREE.Vector3(px, py, pz));
    }
  }

  return seeds;
}

// ============ RK4 INTEGRATION ============
const _k1 = new THREE.Vector3();
const _k2 = new THREE.Vector3();
const _k3 = new THREE.Vector3();
const _k4 = new THREE.Vector3();
const _tmpP = new THREE.Vector3();
const _fieldResult = new THREE.Vector3();

function traceStreamline(seed, direction) {
  const points = [];
  const fieldMags = [];
  const p = seed.clone();
  const ds = 0.05 * direction;
  const maxSteps = 500;

  for (let step = 0; step < maxSteps; step++) {
    // Check termination: distance from any dipole center
    let tooClose = false;
    for (const d of dipoles) {
      if (p.distanceTo(d.pos) < 0.1) {
        tooClose = true;
        break;
      }
    }
    if (tooClose && step > 2) break;

    // Check distance from origin
    if (p.length() > 10) break;

    // Compute field at p
    computeField(p, _fieldResult);
    const mag = _fieldResult.length();
    if (mag < 1e-6) break;

    points.push(p.clone());
    fieldMags.push(mag);

    // RK4
    // k1
    _k1.copy(_fieldResult).normalize().multiplyScalar(ds);

    // k2
    _tmpP.copy(p).addScaledVector(_k1, 0.5);
    computeField(_tmpP, _fieldResult);
    if (_fieldResult.length() < 1e-6) break;
    _k2.copy(_fieldResult).normalize().multiplyScalar(ds);

    // k3
    _tmpP.copy(p).addScaledVector(_k2, 0.5);
    computeField(_tmpP, _fieldResult);
    if (_fieldResult.length() < 1e-6) break;
    _k3.copy(_fieldResult).normalize().multiplyScalar(ds);

    // k4
    _tmpP.copy(p).add(_k3);
    computeField(_tmpP, _fieldResult);
    if (_fieldResult.length() < 1e-6) break;
    _k4.copy(_fieldResult).normalize().multiplyScalar(ds);

    // Update position
    p.x += (_k1.x + 2 * _k2.x + 2 * _k3.x + _k4.x) / 6;
    p.y += (_k1.y + 2 * _k2.y + 2 * _k3.y + _k4.y) / 6;
    p.z += (_k1.z + 2 * _k2.z + 2 * _k3.z + _k4.z) / 6;
  }

  return { points, fieldMags };
}

// ============ COLOR MAPPING ============
function fieldMagToColor(mag, minMag, maxMag) {
  // Normalize to 0-1 with log scale for better visualization
  let t;
  if (maxMag <= minMag) {
    t = 0.5;
  } else {
    const logMin = Math.log(minMag + 1e-8);
    const logMax = Math.log(maxMag + 1e-8);
    const logMag = Math.log(mag + 1e-8);
    t = (logMag - logMin) / (logMax - logMin);
  }
  t = Math.max(0, Math.min(1, t));

  // Blue -> Cyan -> Green -> Yellow -> Red
  const color = new THREE.Color();
  if (t < 0.25) {
    color.setRGB(0, t * 4, 1);
  } else if (t < 0.5) {
    color.setRGB(0, 1, 1 - (t - 0.25) * 4);
  } else if (t < 0.75) {
    color.setRGB((t - 0.5) * 4, 1, 0);
  } else {
    color.setRGB(1, 1 - (t - 0.75) * 4, 0);
  }
  return color;
}

// ============ BUILD STREAMLINES ============
let totalStreamlines = 0;

function rebuildStreamlines() {
  // Clear old
  while (streamlineGroup.children.length > 0) {
    const child = streamlineGroup.children[0];
    streamlineGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
    if (child.material) {
      if (Array.isArray(child.material)) {
        child.material.forEach(m => m.dispose());
      } else {
        child.material.dispose();
      }
    }
  }

  const seeds = generateSeedPoints();
  totalStreamlines = 0;

  // Collect all field magnitudes for color normalization
  const allLines = [];

  for (const seed of seeds) {
    // Forward trace
    const fwd = traceStreamline(seed, 1);
    // Backward trace
    const bwd = traceStreamline(seed, -1);

    // Combine: reverse backward + forward
    const combinedPoints = [];
    const combinedMags = [];

    for (let i = bwd.points.length - 1; i >= 0; i--) {
      combinedPoints.push(bwd.points[i]);
      combinedMags.push(bwd.fieldMags[i]);
    }
    for (let i = 0; i < fwd.points.length; i++) {
      combinedPoints.push(fwd.points[i]);
      combinedMags.push(fwd.fieldMags[i]);
    }

    if (combinedPoints.length >= 2) {
      allLines.push({ points: combinedPoints, mags: combinedMags });
    }
  }

  // Find global min/max field magnitude
  let globalMin = Infinity, globalMax = -Infinity;
  for (const line of allLines) {
    for (const m of line.mags) {
      if (m < globalMin) globalMin = m;
      if (m > globalMax) globalMax = m;
    }
  }

  // Create line geometries
  for (const line of allLines) {
    const positions = [];
    const colors = [];

    for (let i = 0; i < line.points.length; i++) {
      const p = line.points[i];
      positions.push(p.x, p.y, p.z);

      const col = fieldMagToColor(line.mags[i], globalMin, globalMax);
      colors.push(col.r, col.g, col.b);
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

    const material = new THREE.LineBasicMaterial({
      vertexColors: true,
      linewidth: 1,
      transparent: true,
      opacity: 0.85
    });

    const lineObj = new THREE.Line(geometry, material);
    streamlineGroup.add(lineObj);
    totalStreamlines++;
  }

  // Update HUD
  document.getElementById('streamlineCount').textContent = totalStreamlines;
}

// ============ DRAG INTERACTION ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let isDragging = false;
let draggedDipoleIndex = -1;
const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const intersection = new THREE.Vector3();
let needsRebuild = false;
let rebuildTimeout = null;

function onPointerDown(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Get all sphere meshes from dipole groups
  const spheres = [];
  dipoleGroup.traverse(child => {
    if (child.isMesh && child.geometry.type === 'SphereGeometry') {
      spheres.push(child);
    }
  });

  const intersects = raycaster.intersectObjects(spheres, false);

  if (intersects.length > 0) {
    const hit = intersects[0].object;
    // Find which dipole group this belongs to
    let parent = hit.parent;
    if (parent && parent.userData.dipoleIndex !== undefined) {
      draggedDipoleIndex = parent.userData.dipoleIndex;
    } else if (hit.userData.dipoleIndex !== undefined) {
      draggedDipoleIndex = hit.userData.dipoleIndex;
    }

    if (draggedDipoleIndex >= 0) {
      isDragging = true;
      controls.enabled = false;
      // Set drag plane at the dipole's y position
      dragPlane.set(new THREE.Vector3(0, 1, 0), -dipoles[draggedDipoleIndex].pos.y);
    }
  }
}

function onPointerMove(event) {
  if (!isDragging || draggedDipoleIndex < 0) return;

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  if (raycaster.ray.intersectPlane(dragPlane, intersection)) {
    const d = dipoles[draggedDipoleIndex];
    d.pos.x = intersection.x;
    d.pos.z = intersection.z;

    // Update visual position
    const group = dipoleGroup.children[draggedDipoleIndex];
    if (group) {
      group.position.copy(d.pos);
    }

    // Debounced rebuild
    if (rebuildTimeout) clearTimeout(rebuildTimeout);
    rebuildTimeout = setTimeout(() => {
      rebuildStreamlines();
    }, 50);
  }
}

function onPointerUp() {
  if (isDragging) {
    isDragging = false;
    controls.enabled = true;
    if (draggedDipoleIndex >= 0) {
      rebuildStreamlines();
    }
    draggedDipoleIndex = -1;
  }
}

renderer.domElement.addEventListener('pointerdown', onPointerDown);
renderer.domElement.addEventListener('pointermove', onPointerMove);
renderer.domElement.addEventListener('pointerup', onPointerUp);

// ============ UI CONTROLS ============
document.getElementById('addDipole').addEventListener('click', () => {
  if (dipoles.length >= 4) return;

  const angle = Math.random() * Math.PI * 2;
  const r = 1.5 + Math.random() * 1.5;
  const newDipole = {
    pos: new THREE.Vector3(r * Math.cos(angle), 0, r * Math.sin(angle)),
    moment: new THREE.Vector3(0, 1, 0)
  };
  dipoles.push(newDipole);

  rebuildDipoleVisuals();
  rebuildStreamlines();
  updateHUD();
});

document.getElementById('removeDipole').addEventListener('click', () => {
  if (dipoles.length <= 1) return;

  dipoles.pop();

  rebuildDipoleVisuals();
  rebuildStreamlines();
  updateHUD();
});

document.getElementById('fieldStrength').addEventListener('input', (e) => {
  fieldStrength = parseFloat(e.target.value);
  document.getElementById('strengthVal').textContent = fieldStrength.toFixed(1);
  rebuildStreamlines();
  updateHUD();
});

document.getElementById('seedDensity').addEventListener('input', (e) => {
  seedDensity = parseInt(e.target.value);
  document.getElementById('seedVal').textContent = seedDensity;
  rebuildStreamlines();
  updateHUD();
});

// ============ HUD UPDATE ============
function updateHUD() {
  document.getElementById('dipoleCount').textContent = dipoles.length;
  document.getElementById('streamlineCount').textContent = totalStreamlines;
  document.getElementById('strengthDisplay').textContent = fieldStrength.toFixed(1) + '×';
}

// ============ STATE EXPOSURE ============
function updateState() {
  window.__3D_STATE__ = {
    dipoleCount: dipoles.length,
    dipoles: dipoles.map(d => ({
      x: d.pos.x, y: d.pos.y, z: d.pos.z,
      mx: d.moment.x, my: d.moment.y, mz: d.moment.z
    })),
    streamlineCount: totalStreamlines,
    seedDensity: seedDensity,
    fieldStrength: fieldStrength
  };
}

// ============ WINDOW RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ INIT ============
rebuildDipoleVisuals();
rebuildStreamlines();
updateHUD();

// ============ ANIMATION LOOP ============
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  updateState();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
