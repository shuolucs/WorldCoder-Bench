<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 磁偶极子场磁力线可视化</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 20;
      width: 320px;
      background: rgba(20, 24, 40, 0.78);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px 14px 10px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    #ui h2 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
    }

    .row {
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .row label {
      font-size: 13px;
      min-width: 110px;
      color: #d9e2ff;
    }

    .row input[type="range"] {
      flex: 1;
    }

    button {
      background: #2d65ff;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover { background: #4a7cff; }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .stat {
      font-size: 13px;
      color: #c8d3ff;
      line-height: 1.7;
    }

    .hint {
      font-size: 12px;
      color: #9fb1ff;
      opacity: 0.9;
      margin-top: 6px;
    }

    .value {
      color: #fff;
      font-weight: 700;
      min-width: 40px;
      text-align: right;
      display: inline-block;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h2>3D 磁偶极子场</h2>

      <div class="row">
        <button id="addDipole">添加偶极子</button>
        <button id="removeDipole">删除偶极子</button>
      </div>

      <div class="row">
        <label for="fieldStrength">磁场强度倍率</label>
        <input id="fieldStrength" type="range" min="0.1" max="5.0" step="0.1" value="1.0" />
        <span id="strengthDisplay" class="value">1.0</span>
      </div>

      <div class="row">
        <label for="seedDensity">种子点密度</label>
        <input id="seedDensity" type="range" min="10" max="50" step="5" value="20" />
        <span id="seedDensityDisplay" class="value">20</span>
      </div>

      <div class="stat">偶极子数量: <span id="dipoleCount">2</span></div>
      <div class="stat">磁力线条数: <span id="streamlineCount">0</span></div>

      <div class="hint">
        鼠标左键拖拽视角；点击并拖拽白色球体可在 xz 平面移动偶极子。
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const addDipoleBtn = document.getElementById('addDipole');
    const removeDipoleBtn = document.getElementById('removeDipole');
    const fieldStrengthSlider = document.getElementById('fieldStrength');
    const seedDensitySlider = document.getElementById('seedDensity');
    const dipoleCountEl = document.getElementById('dipoleCount');
    const streamlineCountEl = document.getElementById('streamlineCount');
    const strengthDisplayEl = document.getElementById('strengthDisplay');
    const seedDensityDisplayEl = document.getElementById('seedDensityDisplay');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#0a0a1a');

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(6, 5, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 8, 6);
    scene.add(dirLight);

    const axes = new THREE.AxesHelper(5);
    scene.add(axes);

    const planeGeo = new THREE.PlaneGeometry(20, 20);
    const planeMat = new THREE.MeshBasicMaterial({
      color: 0x4466aa,
      transparent: true,
      opacity: 0.12,
      side: THREE.DoubleSide
    });
    const refPlane = new THREE.Mesh(planeGeo, planeMat);
    refPlane.rotation.x = -Math.PI / 2;
    refPlane.position.y = 0;
    scene.add(refPlane);

    const grid = new THREE.GridHelper(20, 20, 0x5577aa, 0x334466);
    grid.material.transparent = true;
    grid.material.opacity = 0.18;
    scene.add(grid);

    const dipoleGroup = new THREE.Group();
    const streamlineGroup = new THREE.Group();
    scene.add(dipoleGroup);
    scene.add(streamlineGroup);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const dragIntersect = new THREE.Vector3();
    let selectedDipole = null;
    let isDragging = false;

    const MU = 1.0;
    const STEP_DS = 0.05;
    const MAX_STEPS = 500;
    const MIN_FIELD = 1e-6;
    const SINGULARITY_RADIUS = 0.1;
    const ESCAPE_RADIUS = 10;
    const SEED_RADIUS = 0.3;
    const DIPOLE_MIN = 1;
    const DIPOLE_MAX = 4;

    let fieldStrength = 1.0;
    let seedDensity = 20;
    let streamlineCount = 0;

    const dipoles = [
      {
        position: new THREE.Vector3(0, 0, -1.5),
        momentBase: new THREE.Vector3(0, 1, 0),
        mesh: null,
        arrow: null
      },
      {
        position: new THREE.Vector3(0, 0, 1.5),
        momentBase: new THREE.Vector3(0, 1, 0),
        mesh: null,
        arrow: null
      }
    ];

    function colorMap(t) {
      const stops = [
        { t: 0.0, c: new THREE.Color(0x2060ff) },
        { t: 0.33, c: new THREE.Color(0x00d080) },
        { t: 0.66, c: new THREE.Color(0xffd200) },
        { t: 1.0, c: new THREE.Color(0xff3030) }
      ];

      t = THREE.MathUtils.clamp(t, 0, 1);

      for (let i = 0; i < stops.length - 1; i++) {
        const a = stops[i];
        const b = stops[i + 1];
        if (t >= a.t && t <= b.t) {
          const u = (t - a.t) / (b.t - a.t);
          return a.c.clone().lerp(b.c, u);
        }
      }
      return stops[stops.length - 1].c.clone();
    }

    function fibonacciSphere(count, radius = 1) {
      const pts = [];
      const offset = 2 / count;
      const increment = Math.PI * (3 - Math.sqrt(5));

      for (let i = 0; i < count; i++) {
        const y = ((i * offset) - 1) + offset / 2;
        const r = Math.sqrt(Math.max(0, 1 - y * y));
        const phi = i * increment;

        const x = Math.cos(phi) * r;
        const z = Math.sin(phi) * r;
        pts.push(new THREE.Vector3(x, y, z).multiplyScalar(radius));
      }
      return pts;
    }

    function getMoment(d) {
      return d.momentBase.clone().multiplyScalar(fieldStrength);
    }

    function magneticFieldAt(point) {
      const B = new THREE.Vector3();

      for (const d of dipoles) {
        const r = new THREE.Vector3().subVectors(point, d.position);
        const dist = r.length();

        if (dist < SINGULARITY_RADIUS * 0.5) continue;

        const rhat = r.clone().divideScalar(dist);
        const m = getMoment(d);
        const mdotr = m.dot(rhat);

        const term = rhat.clone().multiplyScalar(3 * mdotr).sub(m);
        term.multiplyScalar(MU / (dist * dist * dist));
        B.add(term);
      }

      return B;
    }

    function shouldTerminate(point, Bmag) {
      if (Bmag < MIN_FIELD) return true;
      if (point.length() > ESCAPE_RADIUS) return true;

      for (const d of dipoles) {
        if (point.distanceTo(d.position) < SINGULARITY_RADIUS) return true;
      }
      return false;
    }

    function rk4Step(point, directionSign = 1) {
      const f = (p) => {
        const B = magneticFieldAt(p);
        const mag = B.length();
        if (mag < MIN_FIELD) return null;
        return B.multiplyScalar(directionSign / mag * STEP_DS);
      };

      const k1 = f(point);
      if (!k1) return null;

      const k2p = point.clone().addScaledVector(k1, 0.5);
      const k2 = f(k2p);
      if (!k2) return null;

      const k3p = point.clone().addScaledVector(k2, 0.5);
      const k3 = f(k3p);
      if (!k3) return null;

      const k4p = point.clone().add(k3);
      const k4 = f(k4p);
      if (!k4) return null;

      return point.clone().add(
        k1.clone()
          .addScaledVector(k2, 2)
          .addScaledVector(k3, 2)
          .add(k4)
          .multiplyScalar(1 / 6)
      );
    }

    function traceOneDirection(seed, sign) {
      const points = [];
      const strengths = [];
      let p = seed.clone();

      for (let i = 0; i < MAX_STEPS; i++) {
        const B = magneticFieldAt(p);
        const Bmag = B.length();

        if (shouldTerminate(p, Bmag)) break;

        points.push(p.clone());
        strengths.push(Bmag);

        const next = rk4Step(p, sign);
        if (!next) break;
        p = next;
      }

      return { points, strengths };
    }

    function createStreamline(points, strengths) {
      if (points.length < 2) return null;

      let minS = Infinity;
      let maxS = -Infinity;
      for (const s of strengths) {
        minS = Math.min(minS, s);
        maxS = Math.max(maxS, s);
      }
      if (!isFinite(minS) || !isFinite(maxS)) {
        minS = 0;
        maxS = 1;
      }
      const span = Math.max(maxS - minS, 1e-9);

      const positions = new Float32Array(points.length * 3);
      const colors = new Float32Array(points.length * 3);

      for (let i = 0; i < points.length; i++) {
        const p = points[i];
        positions[i * 3] = p.x;
        positions[i * 3 + 1] = p.y;
        positions[i * 3 + 2] = p.z;

        const t = (strengths[i] - minS) / span;
        const c = colorMap(t);
        colors[i * 3] = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;
      }

      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      const mat = new THREE.LineBasicMaterial({
        vertexColors: true,
        transparent: true,
        opacity: 0.95
      });

      return new THREE.Line(geom, mat);
    }

    function clearGroup(group) {
      while (group.children.length) {
        const child = group.children.pop();
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
          if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
          else child.material.dispose();
        }
      }
    }

    function rebuildDipoleMeshes() {
      clearGroup(dipoleGroup);

      const sphereGeo = new THREE.SphereGeometry(0.12, 24, 24);

      dipoles.forEach((d, i) => {
        const sphereMat = new THREE.MeshStandardMaterial({
          color: 0xffffff,
          emissive: 0x222222,
          roughness: 0.3,
          metalness: 0.1
        });

        const mesh = new THREE.Mesh(sphereGeo, sphereMat);
        mesh.position.copy(d.position);
        mesh.userData.dipoleIndex = i;
        dipoleGroup.add(mesh);
        d.mesh = mesh;

        const dir = d.momentBase.clone().normalize();
        const arrow = new THREE.ArrowHelper(dir, d.position, 0.5, 0xffffff, 0.14, 0.08);
        dipoleGroup.add(arrow);
        d.arrow = arrow;
      });
    }

    function updateDipoleMeshes() {
      dipoles.forEach((d, i) => {
        if (!d.mesh || !d.arrow) return;
        d.mesh.position.copy(d.position);
        d.mesh.userData.dipoleIndex = i;

        const dir = d.momentBase.clone().normalize();
        d.arrow.position.copy(d.position);
        d.arrow.setDirection(dir);
        d.arrow.setLength(0.5, 0.14, 0.08);
      });
    }

    function rebuildStreamlines() {
      clearGroup(streamlineGroup);
      streamlineCount = 0;

      for (const d of dipoles) {
        const localSeeds = fibonacciSphere(seedDensity, SEED_RADIUS);

        for (const offset of localSeeds) {
          const seed = d.position.clone().add(offset);

          const forward = traceOneDirection(seed, +1);
          const backward = traceOneDirection(seed, -1);

          const backPts = backward.points.slice().reverse();
          const backStr = backward.strengths.slice().reverse();

          if (backPts.length > 0) {
            backPts.pop();
            backStr.pop();
          }

          const points = backPts.concat(forward.points);
          const strengths = backStr.concat(forward.strengths);

          const line = createStreamline(points, strengths);
          if (line) {
            streamlineGroup.add(line);
            streamlineCount++;
          }
        }
      }

      updateHUD();
    }

    function rebuildAll() {
      rebuildDipoleMeshes();
      rebuildStreamlines();
      updateHUD();
    }

    function updateHUD() {
      dipoleCountEl.textContent = String(dipoles.length);
      streamlineCountEl.textContent = String(streamlineCount);
      strengthDisplayEl.textContent = fieldStrength.toFixed(1);
      seedDensityDisplayEl.textContent = String(seedDensity);

      addDipoleBtn.disabled = dipoles.length >= DIPOLE_MAX;
      removeDipoleBtn.disabled = dipoles.length <= DIPOLE_MIN;
    }

    function randomDipolePosition() {
      return new THREE.Vector3(
        THREE.MathUtils.randFloatSpread(6),
        0,
        THREE.MathUtils.randFloatSpread(6)
      );
    }

    addDipoleBtn.addEventListener('click', () => {
      if (dipoles.length >= DIPOLE_MAX) return;
      dipoles.push({
        position: randomDipolePosition(),
        momentBase: new THREE.Vector3(0, 1, 0),
        mesh: null,
        arrow: null
      });
      rebuildAll();
    });

    removeDipoleBtn.addEventListener('click', () => {
      if (dipoles.length <= DIPOLE_MIN) return;
      dipoles.pop();
      rebuildAll();
    });

    fieldStrengthSlider.addEventListener('input', () => {
      fieldStrength = parseFloat(fieldStrengthSlider.value);
      updateHUD();
      rebuildStreamlines();
    });

    seedDensitySlider.addEventListener('input', () => {
      seedDensity = parseInt(seedDensitySlider.value, 10);
      updateHUD();
      rebuildStreamlines();
    });

    function getIntersections(clientX, clientY) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      return raycaster.intersectObjects(dipoleGroup.children.filter(o => o.isMesh), false);
    }

    function onPointerDown(event) {
      const hits = getIntersections(event.clientX, event.clientY);
      if (hits.length > 0) {
        const hit = hits[0].object;
        selectedDipole = dipoles[hit.userData.dipoleIndex];
        isDragging = true;
        controls.enabled = false;
      }
    }

    function onPointerMove(event) {
      if (!isDragging || !selectedDipole) return;

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      if (raycaster.ray.intersectPlane(dragPlane, dragIntersect)) {
        selectedDipole.position.set(
          THREE.MathUtils.clamp(dragIntersect.x, -8, 8),
          0,
          THREE.MathUtils.clamp(dragIntersect.z, -8, 8)
        );
        updateDipoleMeshes();
      }
    }

    function onPointerUp() {
      if (isDragging && selectedDipole) {
        rebuildStreamlines();
      }
      isDragging = false;
      selectedDipole = null;
      controls.enabled = true;
    }

    renderer.domElement.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function updateState() {
      window.__3D_STATE__ = {
        dipoleCount: dipoles.length,
        dipoles: dipoles.map(d => {
          const m = getMoment(d);
          return {
            x: d.position.x,
            y: d.position.y,
            z: d.position.z,
            mx: m.x,
            my: m.y,
            mz: m.z
          };
        }),
        streamlineCount,
        seedDensity,
        fieldStrength
      };
    }

    rebuildAll();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      updateState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
