<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Solar Eclipse Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #050510;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #controlPanel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 30, 0.75);
      padding: 12px 18px;
      border-radius: 12px;
      display: flex;
      gap: 14px;
      align-items: center;
      z-index: 10;
      box-shadow: 0 0 12px rgba(255,255,255,0.12);
    }

    #controlPanel label {
      font-size: 14px;
    }

    #controlPanel input[type="range"] {
      width: 160px;
    }

    #controlPanel button {
      background: #22283a;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
    }

    #controlPanel button:hover {
      background: #2f3650;
    }

    #infoPanel {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(20, 20, 30, 0.75);
      padding: 12px 16px;
      border-radius: 12px;
      z-index: 10;
      min-width: 220px;
      line-height: 1.5;
      box-shadow: 0 0 12px rgba(255,255,255,0.12);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="infoPanel">
    <div><strong>Eclipse:</strong> <span id="eclipseStateText">No Eclipse</span></div>
    <div><strong>Moon Angle:</strong> <span id="moonAngleText">0.0°</span></div>
    <div><strong>Speed:</strong> <span id="speedText">1.0x</span></div>
  </div>

  <div id="controlPanel">
    <button id="playPauseBtn">Pause</button>
    <label for="speedSlider">Speed</label>
    <input id="speedSlider" type="range" min="0.1" max="5" step="0.1" value="1" />
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    let cameraPreset = 1;

    function setCameraPreset(preset) {
      cameraPreset = preset;
      if (preset === 1) {
        camera.position.set(0, 0, 30);
        camera.lookAt(0, 0, -50);
      } else if (preset === 2) {
        camera.position.set(0, 80, -50);
        camera.lookAt(0, 0, -50);
      } else if (preset === 3) {
        camera.position.set(80, 0, -50);
        camera.lookAt(0, 0, -50);
      }
    }
    setCameraPreset(1);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.1);
    scene.add(ambientLight);

    const sunLight = new THREE.PointLight(0xffffff, 2, 500);
    sunLight.position.set(0, 0, -50);
    scene.add(sunLight);

    // Starfield
    const starCount = 500;
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      let v = new THREE.Vector3();
      do {
        v.set(
          THREE.MathUtils.randFloatSpread(400),
          THREE.MathUtils.randFloatSpread(400),
          THREE.MathUtils.randFloatSpread(400)
        );
      } while (v.length() > 200);
      starPositions[i * 3] = v.x;
      starPositions[i * 3 + 1] = v.y;
      starPositions[i * 3 + 2] = v.z;
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute("position", new THREE.BufferAttribute(starPositions, 3));
    const starMat = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.7,
      sizeAttenuation: true
    });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // Sun
    const sunGroup = new THREE.Group();
    sunGroup.position.set(0, 0, -50);
    scene.add(sunGroup);

    const sunGeo = new THREE.SphereGeometry(8, 32, 32);
    const sunMat = new THREE.MeshBasicMaterial({ color: 0xFDB813 });
    const sunMesh = new THREE.Mesh(sunGeo, sunMat);
    sunGroup.add(sunMesh);

    const coronaGeo = new THREE.SphereGeometry(12, 32, 32);
    const coronaMat = new THREE.MeshBasicMaterial({
      color: 0xffbb44,
      transparent: true,
      opacity: 0.18,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const coronaMesh = new THREE.Mesh(coronaGeo, coronaMat);
    sunGroup.add(coronaMesh);

    // Moon
    const moonGeo = new THREE.SphereGeometry(2.2, 32, 32);
    const moonMat = new THREE.MeshStandardMaterial({
      color: 0x333333,
      roughness: 1.0,
      metalness: 0.0
    });
    const moon = new THREE.Mesh(moonGeo, moonMat);
    scene.add(moon);

    // Particle system (solar wind/corona)
    const particleCount = 1000;
    const particlePositions = new Float32Array(particleCount * 3);
    const particleDirs = [];
    const particleRadii = new Float32Array(particleCount);

    function randomUnitVector() {
      const v = new THREE.Vector3(
        THREE.MathUtils.randFloatSpread(2),
        THREE.MathUtils.randFloatSpread(2),
        THREE.MathUtils.randFloatSpread(2)
      ).normalize();
      return v;
    }

    function initParticle(i) {
      const dir = randomUnitVector();
      const r = THREE.MathUtils.randFloat(9, 15);
      particleDirs[i] = dir;
      particleRadii[i] = r;
      particlePositions[i * 3] = dir.x * r;
      particlePositions[i * 3 + 1] = dir.y * r;
      particlePositions[i * 3 + 2] = dir.z * r;
    }

    for (let i = 0; i < particleCount; i++) initParticle(i);

    const particleGeo = new THREE.BufferGeometry();
    particleGeo.setAttribute("position", new THREE.BufferAttribute(particlePositions, 3));

    const particleMat = new THREE.PointsMaterial({
      color: 0xffaa33,
      size: 0.15,
      transparent: true,
      opacity: 0.45,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true
    });

    const particles = new THREE.Points(particleGeo, particleMat);
    particles.position.copy(sunGroup.position);
    scene.add(particles);

    // Diamond ring effect
    const diamondRingGeo = new THREE.BufferGeometry();
    diamondRingGeo.setAttribute("position", new THREE.Float32BufferAttribute([0, 0, 0], 3));
    const diamondRingMat = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 1.5,
      transparent: true,
      opacity: 1,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true
    });
    const diamondRing = new THREE.Points(diamondRingGeo, diamondRingMat);
    diamondRing.visible = false;
    scene.add(diamondRing);

    // UI
    const playPauseBtn = document.getElementById("playPauseBtn");
    const speedSlider = document.getElementById("speedSlider");
    const eclipseStateText = document.getElementById("eclipseStateText");
    const moonAngleText = document.getElementById("moonAngleText");
    const speedText = document.getElementById("speedText");

    let isPlaying = true;
    let speedMultiplier = parseFloat(speedSlider.value);
    let moonAngle = 0; // radians
    const orbitalPeriod = 20; // seconds at 1x
    const orbitRadius = 30;

    playPauseBtn.addEventListener("click", () => {
      isPlaying = !isPlaying;
      playPauseBtn.textContent = isPlaying ? "Pause" : "Play";
    });

    speedSlider.addEventListener("input", () => {
      speedMultiplier = parseFloat(speedSlider.value);
      speedText.textContent = speedMultiplier.toFixed(1) + "x";
    });

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (key === "r") {
        moonAngle = 0;
        isPlaying = true;
        playPauseBtn.textContent = "Pause";
      } else if (key === "1") {
        setCameraPreset(1);
      } else if (key === "2") {
        setCameraPreset(2);
      } else if (key === "3") {
        setCameraPreset(3);
      }
    });

    // Raycaster for sun click
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let coronaVisible = true;

    window.addEventListener("click", (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(sunMesh, false);
      if (intersects.length > 0) {
        coronaVisible = !coronaVisible;
        particles.visible = coronaVisible;
      }
    });

    function updateMoonPosition() {
      moon.position.set(
        orbitRadius * Math.cos(moonAngle),
        0,
        -50 + orbitRadius * Math.sin(moonAngle)
      );
    }
    updateMoonPosition();

    const clock = new THREE.Clock();

    const camToSun = new THREE.Vector3();
    const camToMoon = new THREE.Vector3();
    const moonToSun = new THREE.Vector3();

    window.__3D_STATE__ = {
      moonAngle: 0,
      eclipseState: 'none',
      angularSeparation: 0,
      isPlaying: true,
      speedMultiplier: 1,
      cameraPreset: 1,
      coronaVisible: true,
      ambientIntensity: 0.1,
      particleSize: 0.15,
      moonPosition: { x: 30, y: 0, z: -50 },
      frameCount: 0
    };

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();

      if (isPlaying) {
        moonAngle += dt * speedMultiplier * (Math.PI * 2 / orbitalPeriod);
        moonAngle %= Math.PI * 2;
        updateMoonPosition();
      }

      // Update particles
      const posAttr = particleGeo.attributes.position;
      for (let i = 0; i < particleCount; i++) {
        particleRadii[i] += dt * THREE.MathUtils.randFloat(0.08, 0.18);
        if (particleRadii[i] >= 15) {
          const dir = randomUnitVector();
          particleDirs[i] = dir;
          particleRadii[i] = THREE.MathUtils.randFloat(9, 10.5);
        }
        const dir = particleDirs[i];
        const r = particleRadii[i];
        posAttr.array[i * 3] = dir.x * r;
        posAttr.array[i * 3 + 1] = dir.y * r;
        posAttr.array[i * 3 + 2] = dir.z * r;
      }
      posAttr.needsUpdate = true;

      // Eclipse mechanics
      camToSun.copy(sunGroup.position).sub(camera.position).normalize();
      camToMoon.copy(moon.position).sub(camera.position).normalize();

      let angleDeg = THREE.MathUtils.radToDeg(camToSun.angleTo(camToMoon));
      let eclipseState = 'none';
      let eclipseLabel = 'No Eclipse';
      let ambientIntensity = 0.1;
      let particleSize = 0.15;
      let particleOpacity = coronaVisible ? 0.45 : 0.0;

      if (angleDeg < 1.5) {
        eclipseState = 'total';
        eclipseLabel = 'Total Eclipse';
        ambientIntensity = 0.02;
        particleSize = 0.3;
        particleOpacity = coronaVisible ? 0.95 : 0.0;
        diamondRing.visible = true;

        moonToSun.copy(sunGroup.position).sub(moon.position).normalize();
        const ringPos = moon.position.clone().add(moonToSun.multiplyScalar(2.7));
        diamondRing.position.copy(ringPos);
      } else if (angleDeg >= 1.5 && angleDeg <= 5) {
        eclipseState = 'partial';
        eclipseLabel = 'Partial Eclipse';
        const t = (angleDeg - 1.5) / (5 - 1.5);
        ambientIntensity = THREE.MathUtils.lerp(0.02, 0.1, t);
        particleSize = 0.2;
        particleOpacity = coronaVisible ? 0.65 : 0.0;
        diamondRing.visible = false;
      } else {
        diamondRing.visible = false;
      }

      ambientLight.intensity = ambientIntensity;
      particleMat.size = particleSize;
      particleMat.opacity = particleOpacity;
      coronaMesh.visible = coronaVisible;

      // UI text
      const angleDisplay = (THREE.MathUtils.radToDeg(moonAngle) % 360 + 360) % 360;
      eclipseStateText.textContent = eclipseLabel;
      moonAngleText.textContent = angleDisplay.toFixed(1) + "°";
      speedText.textContent = speedMultiplier.toFixed(1) + "x";

      // State exposure
      window.__3D_STATE__.moonAngle = parseFloat(angleDisplay.toFixed(1));
      window.__3D_STATE__.eclipseState = eclipseState;
      window.__3D_STATE__.angularSeparation = parseFloat(angleDeg.toFixed(2));
      window.__3D_STATE__.isPlaying = isPlaying;
      window.__3D_STATE__.speedMultiplier = speedMultiplier;
      window.__3D_STATE__.cameraPreset = cameraPreset;
      window.__3D_STATE__.coronaVisible = coronaVisible;
      window.__3D_STATE__.ambientIntensity = ambientIntensity;
      window.__3D_STATE__.particleSize = particleSize;
      window.__3D_STATE__.moonPosition = {
        x: moon.position.x,
        y: moon.position.y,
        z: moon.position.z
      };
      window.__3D_STATE__.frameCount += 1;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
