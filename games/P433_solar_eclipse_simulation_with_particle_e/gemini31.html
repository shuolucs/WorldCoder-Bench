<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Eclipse Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #infoPanel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 20, 0.8);
            color: #ffffff;
            padding: 15px 20px;
            border-radius: 10px;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 200px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        #infoPanel div {
            margin-bottom: 8px;
            font-size: 14px;
        }
        #infoPanel div:last-child {
            margin-bottom: 0;
        }
        #infoPanel span {
            font-weight: bold;
            color: #FFaa33;
        }
        #controlPanel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 20, 0.8);
            color: #ffffff;
            padding: 15px 25px;
            border-radius: 10px;
            display: flex;
            gap: 20px;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        button {
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            background: #333344;
            color: white;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #555566;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        input[type=range] {
            cursor: pointer;
        }
        #instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="instructions">
        Controls:<br>
        [1, 2, 3] - Camera Presets<br>
        [R] - Reset Orbit<br>
        Click Sun - Toggle Corona
    </div>

    <div id="infoPanel">
        <div>State: <span id="stateText">No Eclipse</span></div>
        <div>Moon Angle: <span id="angleText">0.0°</span></div>
        <div>Speed: <span id="speedText">1.0x</span></div>
    </div>

    <div id="controlPanel">
        <button id="playPauseBtn">Pause</button>
        <div class="slider-container">
            <label for="speedSlider">Orbit Speed</label>
            <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1">
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // State Management
        window.__3D_STATE__ = {
            moonAngle: 0,
            eclipseState: 'none',
            angularSeparation: 0,
            isPlaying: true,
            speedMultiplier: 1,
            cameraPreset: 1,
            coronaVisible: true,
            ambientIntensity: 0.1,
            particleSize: 0.15,
            moonPosition: {x: 30, y: 0, z: -50},
            frameCount: 0
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 30);
        camera.lookAt(0, 0, -50);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Starfield
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 500;
        const starsPos = new Float32Array(starsCount * 3);
        for(let i = 0; i < starsCount; i++) {
            const r = 200 * Math.cbrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            const phi = Math.acos(2 * Math.random() - 1);
            starsPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
            starsPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            starsPos[i*3+2] = r * Math.cos(phi);
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // Sun
        const sunPos = new THREE.Vector3(0, 0, -50);
        const sunGeo = new THREE.SphereGeometry(8, 64, 64);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xFDB813 });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        sun.position.copy(sunPos);
        scene.add(sun);

        // Sun Corona (Inner Glow)
        const coronaGeo = new THREE.SphereGeometry(12, 64, 64);
        const coronaMat = new THREE.MeshBasicMaterial({
            color: 0xffaa00,
            transparent: true,
            opacity: 0.2,
            blending: THREE.AdditiveBlending,
            side: THREE.BackSide
        });
        const corona = new THREE.Mesh(coronaGeo, coronaMat);
        sun.add(corona);

        // Moon
        const moonGeo = new THREE.SphereGeometry(2.2, 64, 64);
        const moonMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
        const moon = new THREE.Mesh(moonGeo, moonMat);
        scene.add(moon);

        // Lights
        const sunLight = new THREE.PointLight(0xffffff, 2, 0);
        sunLight.position.copy(sunPos);
        scene.add(sunLight);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.1);
        scene.add(ambientLight);

        // Particle System (Solar Wind)
        const partCount = 1000;
        const partGeo = new THREE.BufferGeometry();
        const partPos = new Float32Array(partCount * 3);
        const partDir = new Float32Array(partCount * 3);
        const partDist = new Float32Array(partCount);

        for(let i = 0; i < partCount; i++) {
            const theta = Math.random() * 2 * Math.PI;
            const phi = Math.acos(2 * Math.random() - 1);
            const dx = Math.sin(phi) * Math.cos(theta);
            const dy = Math.sin(phi) * Math.sin(theta);
            const dz = Math.cos(phi);
            
            partDir[i*3] = dx;
            partDir[i*3+1] = dy;
            partDir[i*3+2] = dz;
            
            const d = 9 + Math.random() * 6; // Radius between 9 and 15
            partDist[i] = d;
            
            partPos[i*3] = sunPos.x + dx * d;
            partPos[i*3+1] = sunPos.y + dy * d;
            partPos[i*3+2] = sunPos.z + dz * d;
        }
        partGeo.setAttribute('position', new THREE.BufferAttribute(partPos, 3));
        const partMat = new THREE.PointsMaterial({
            color: 0xFFaa33,
            size: 0.15,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const particles = new THREE.Points(partGeo, partMat);
        scene.add(particles);

        // Diamond Ring Effect
        const canvas = document.createElement('canvas');
        canvas.width = 128;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
        grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
        grad.addColorStop(0.1, 'rgba(255, 255, 200, 0.8)');
        grad.addColorStop(0.4, 'rgba(255, 200, 100, 0.3)');
        grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 128, 128);
        
        const ringTex = new THREE.CanvasTexture(canvas);
        const ringMat = new THREE.SpriteMaterial({
            map: ringTex,
            color: 0xffffff,
            blending: THREE.AdditiveBlending,
            transparent: true,
            depthTest: false
        });
        const diamondRing = new THREE.Sprite(ringMat);
        diamondRing.scale.set(10, 10, 1);
        diamondRing.visible = false;
        scene.add(diamondRing);

        // Variables
        let moonAngleRad = 0;
        const orbitRadius = 30;
        const orbitPeriod = 20; // seconds
        const clock = new THREE.Clock();

        // UI Elements
        const playPauseBtn = document.getElementById('playPauseBtn');
        const speedSlider = document.getElementById('speedSlider');
        const stateText = document.getElementById('stateText');
        const angleText = document.getElementById('angleText');
        const speedText = document.getElementById('speedText');

        // Event Listeners
        playPauseBtn.addEventListener('click', () => {
            window.__3D_STATE__.isPlaying = !window.__3D_STATE__.isPlaying;
            playPauseBtn.innerText = window.__3D_STATE__.isPlaying ? 'Pause' : 'Play';
        });

        speedSlider.addEventListener('input', (e) => {
            window.__3D_STATE__.speedMultiplier = parseFloat(e.target.value);
            speedText.innerText = `${window.__3D_STATE__.speedMultiplier.toFixed(1)}x`;
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'r') {
                moonAngleRad = 0;
                window.__3D_STATE__.isPlaying = true;
                playPauseBtn.innerText = 'Pause';
            } else if (key === '1') {
                window.__3D_STATE__.cameraPreset = 1;
                camera.position.set(0, 0, 30);
                camera.lookAt(0, 0, -50);
            } else if (key === '2') {
                window.__3D_STATE__.cameraPreset = 2;
                camera.position.set(0, 80, -50);
                camera.lookAt(0, 0, -50);
            } else if (key === '3') {
                window.__3D_STATE__.cameraPreset = 3;
                camera.position.set(80, 0, -50);
                camera.lookAt(0, 0, -50);
            }
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        window.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObject(sun);
            if (intersects.length > 0) {
                window.__3D_STATE__.coronaVisible = !window.__3D_STATE__.coronaVisible;
                particles.visible = window.__3D_STATE__.coronaVisible;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            window.__3D_STATE__.frameCount++;

            // Update Moon Position
            if (window.__3D_STATE__.isPlaying) {
                const angularSpeed = (Math.PI * 2) / orbitPeriod;
                moonAngleRad += angularSpeed * delta * window.__3D_STATE__.speedMultiplier;
                if (moonAngleRad >= Math.PI * 2) moonAngleRad -= Math.PI * 2;
            }

            moon.position.x = sunPos.x + orbitRadius * Math.cos(moonAngleRad);
            moon.position.y = 0;
            moon.position.z = sunPos.z + orbitRadius * Math.sin(moonAngleRad);

            // Update Particles
            if (window.__3D_STATE__.coronaVisible) {
                const posAttr = particles.geometry.attributes.position;
                for(let i = 0; i < partCount; i++) {
                    partDist[i] += 1.5 * delta * window.__3D_STATE__.speedMultiplier;
                    if (partDist[i] > 15) partDist[i] = 9;
                    
                    posAttr.array[i*3] = sunPos.x + partDir[i*3] * partDist[i];
                    posAttr.array[i*3+1] = sunPos.y + partDir[i*3+1] * partDist[i];
                    posAttr.array[i*3+2] = sunPos.z + partDir[i*3+2] * partDist[i];
                }
                posAttr.needsUpdate = true;
            }

            // Calculate Eclipse State
            const camToSun = new THREE.Vector3().subVectors(sunPos, camera.position).normalize();
            const camToMoon = new THREE.Vector3().subVectors(moon.position, camera.position).normalize();
            const angleRad = camToSun.angleTo(camToMoon);
            const angleDeg = angleRad * THREE.MathUtils.RAD2DEG;

            let eclipseState = 'none';
            let targetAmbient = 0.1;
            let targetPartSize = 0.15;
            diamondRing.visible = false;

            if (angleDeg < 1.5) {
                eclipseState = 'total';
                targetAmbient = 0.02;
                targetPartSize = 0.3;
                diamondRing.visible = true;
                
                // Position diamond ring on the edge of the moon facing the sun
                const moonToSun = new THREE.Vector3().subVectors(sunPos, moon.position).normalize();
                diamondRing.position.copy(moon.position).add(moonToSun.multiplyScalar(2.1));
                
            } else if (angleDeg <= 5) {
                eclipseState = 'partial';
                const t = (5 - angleDeg) / (5 - 1.5);
                targetAmbient = 0.1 - t * (0.1 - 0.02);
            }

            // Apply Effects
            ambientLight.intensity = targetAmbient;
            partMat.size = targetPartSize;

            // Update UI
            let stateDisplay = 'No Eclipse';
            if (eclipseState === 'partial') stateDisplay = 'Partial Eclipse';
            if (eclipseState === 'total') stateDisplay = 'Total Eclipse';
            
            stateText.innerText = stateDisplay;
            stateText.style.color = eclipseState === 'total' ? '#ff4444' : (eclipseState === 'partial' ? '#ffff44' : '#FFaa33');
            
            const moonAngleDeg = moonAngleRad * THREE.MathUtils.RAD2DEG;
            angleText.innerText = `${moonAngleDeg.toFixed(1)}°`;

            // Update Global State Object
            window.__3D_STATE__.moonAngle = moonAngleDeg;
            window.__3D_STATE__.eclipseState = eclipseState;
            window.__3D_STATE__.angularSeparation = parseFloat(angleDeg.toFixed(2));
            window.__3D_STATE__.ambientIntensity = ambientLight.intensity;
            window.__3D_STATE__.particleSize = partMat.size;
            window.__3D_STATE__.moonPosition.x = moon.position.x;
            window.__3D_STATE__.moonPosition.y = moon.position.y;
            window.__3D_STATE__.moonPosition.z = moon.position.z;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
