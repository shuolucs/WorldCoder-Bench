<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar Eclipse Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #050510; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#controlPanel {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 30, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 15px 25px;
    display: flex;
    align-items: center;
    gap: 20px;
    color: white;
    z-index: 100;
    backdrop-filter: blur(10px);
}

#playPauseBtn {
    background: rgba(253, 184, 19, 0.3);
    border: 1px solid rgba(253, 184, 19, 0.6);
    color: white;
    padding: 8px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.3s;
}
#playPauseBtn:hover {
    background: rgba(253, 184, 19, 0.5);
}

.slider-container {
    display: flex;
    align-items: center;
    gap: 10px;
}
.slider-container label {
    font-size: 13px;
    white-space: nowrap;
}

#speedSlider {
    -webkit-appearance: none;
    width: 120px;
    height: 4px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 2px;
    outline: none;
}
#speedSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #FDB813;
    border-radius: 50%;
    cursor: pointer;
}

#infoPanel {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 30, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 15px 20px;
    color: white;
    font-size: 13px;
    line-height: 1.8;
    z-index: 100;
    min-width: 220px;
    backdrop-filter: blur(10px);
}
#infoPanel .title {
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 8px;
    color: #FDB813;
    border-bottom: 1px solid rgba(253, 184, 19, 0.3);
    padding-bottom: 6px;
}
#infoPanel .state-indicator {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
}
.state-none { background: #4CAF50; }
.state-partial { background: #FF9800; }
.state-total { background: #f44336; }

#instructions {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 30, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 15px 20px;
    color: rgba(255, 255, 255, 0.7);
    font-size: 12px;
    line-height: 1.8;
    z-index: 100;
    backdrop-filter: blur(10px);
}
#instructions .key {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    padding: 1px 6px;
    border-radius: 3px;
    font-family: monospace;
    margin: 0 2px;
}
</style>
</head>
<body>

<div id="controlPanel">
    <button id="playPauseBtn">Pause</button>
    <div class="slider-container">
        <label for="speedSlider">Speed:</label>
        <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1">
        <span id="speedValue">1.0x</span>
    </div>
</div>

<div id="infoPanel">
    <div class="title">Eclipse Info</div>
    <div id="eclipseStateDisplay"><span class="state-indicator state-none"></span>No Eclipse</div>
    <div>Moon Angle: <span id="moonAngleDisplay">0.0°</span></div>
    <div>Angular Sep: <span id="angSepDisplay">0.00°</span></div>
    <div>Speed: <span id="speedDisplay">1.0x</span></div>
</div>

<div id="instructions">
    <strong style="color: #FDB813;">Controls</strong><br>
    <span class="key">1</span> <span class="key">2</span> <span class="key">3</span> Camera presets<br>
    <span class="key">R</span> Reset moon position<br>
    <span class="key">Click Sun</span> Toggle corona
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
    // State
    window.__3D_STATE__ = {
        moonAngle: 0,
        eclipseState: 'none',
        angularSeparation: 0,
        isPlaying: true,
        speedMultiplier: 1,
        cameraPreset: 1,
        coronaVisible: true,
        ambientIntensity: 0.1,
        particleSize: 0.15,
        moonPosition: { x: 0, y: 0, z: 0 },
        frameCount: 0
    };

    const state = window.__3D_STATE__;

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 0, 30);
    camera.lookAt(0, 0, -50);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Starfield
    const starGeometry = new THREE.BufferGeometry();
    const starPositions = new Float32Array(500 * 3);
    for (let i = 0; i < 500; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = Math.random() * 200;
        starPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        starPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        starPositions[i * 3 + 2] = r * Math.cos(phi);
    }
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, sizeAttenuation: true });
    scene.add(new THREE.Points(starGeometry, starMaterial));

    // Sun
    const sunPosition = new THREE.Vector3(0, 0, -50);
    const sunGeometry = new THREE.SphereGeometry(8, 64, 64);
    const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xFDB813 });
    const sunMesh = new THREE.Mesh(sunGeometry, sunMaterial);
    sunMesh.position.copy(sunPosition);
    scene.add(sunMesh);

    // Corona sphere
    const coronaGeometry = new THREE.SphereGeometry(12, 64, 64);
    const coronaMaterial = new THREE.MeshBasicMaterial({
        color: 0xFFaa33,
        transparent: true,
        opacity: 0.15,
        blending: THREE.AdditiveBlending,
        side: THREE.FrontSide
    });
    const coronaMesh = new THREE.Mesh(coronaGeometry, coronaMaterial);
    coronaMesh.position.copy(sunPosition);
    scene.add(coronaMesh);

    // Sun glow (additional layer)
    const glowGeometry = new THREE.SphereGeometry(10, 64, 64);
    const glowMaterial = new THREE.MeshBasicMaterial({
        color: 0xFDB813,
        transparent: true,
        opacity: 0.08,
        blending: THREE.AdditiveBlending
    });
    const glowMesh = new THREE.Mesh(glowGeometry, glowMaterial);
    glowMesh.position.copy(sunPosition);
    scene.add(glowMesh);

    // Moon
    const moonGeometry = new THREE.SphereGeometry(2.2, 32, 32);
    const moonMaterial = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9, metalness: 0.1 });
    const moonMesh = new THREE.Mesh(moonGeometry, moonMaterial);
    scene.add(moonMesh);

    // Lights
    const pointLight = new THREE.PointLight(0xffffff, 2, 0);
    pointLight.position.copy(sunPosition);
    scene.add(pointLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.1);
    scene.add(ambientLight);

    // Particle system (corona/solar wind)
    const particleCount = 1000;
    const particleGeometry = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(particleCount * 3);
    const particleVelocities = new Float32Array(particleCount);
    const particleRadii = new Float32Array(particleCount);
    const particleThetas = new Float32Array(particleCount);
    const particlePhis = new Float32Array(particleCount);

    for (let i = 0; i < particleCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = 9 + Math.random() * 6;

        particleThetas[i] = theta;
        particlePhis[i] = phi;
        particleRadii[i] = r;
        particleVelocities[i] = 0.5 + Math.random() * 1.5;

        particlePositions[i * 3] = sunPosition.x + r * Math.sin(phi) * Math.cos(theta);
        particlePositions[i * 3 + 1] = sunPosition.y + r * Math.sin(phi) * Math.sin(theta);
        particlePositions[i * 3 + 2] = sunPosition.z + r * Math.cos(phi);
    }

    particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

    const particleMaterial = new THREE.PointsMaterial({
        color: 0xFFaa33,
        size: 0.15,
        transparent: true,
        opacity: 0.7,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true,
        depthWrite: false
    });

    const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particleSystem);

    // Diamond ring effect sprite
    const diamondCanvas = document.createElement('canvas');
    diamondCanvas.width = 64;
    diamondCanvas.height = 64;
    const dCtx = diamondCanvas.getContext('2d');
    const gradient = dCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
    gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
    gradient.addColorStop(0.1, 'rgba(255, 240, 200, 0.8)');
    gradient.addColorStop(0.4, 'rgba(255, 200, 100, 0.3)');
    gradient.addColorStop(1, 'rgba(255, 150, 50, 0)');
    dCtx.fillStyle = gradient;
    dCtx.fillRect(0, 0, 64, 64);

    const diamondTexture = new THREE.CanvasTexture(diamondCanvas);
    const diamondMaterial = new THREE.SpriteMaterial({
        map: diamondTexture,
        color: 0xffffff,
        blending: THREE.AdditiveBlending,
        transparent: true,
        opacity: 0
    });
    const diamondSprite = new THREE.Sprite(diamondMaterial);
    diamondSprite.scale.set(4, 4, 1);
    scene.add(diamondSprite);

    // Variables
    let moonAngle = 0;
    let isPlaying = true;
    let speedMultiplier = 1;
    let cameraPreset = 1;
    let coronaVisible = true;
    const orbitalPeriod = 20; // seconds
    const orbitRadius = 30;
    const orbitCenterZ = -50;

    // Raycaster
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    // DOM elements
    const playPauseBtn = document.getElementById('playPauseBtn');
    const speedSlider = document.getElementById('speedSlider');
    const speedValue = document.getElementById('speedValue');
    const eclipseStateDisplay = document.getElementById('eclipseStateDisplay');
    const moonAngleDisplay = document.getElementById('moonAngleDisplay');
    const angSepDisplay = document.getElementById('angSepDisplay');
    const speedDisplay = document.getElementById('speedDisplay');

    // Event listeners
    playPauseBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        playPauseBtn.textContent = isPlaying ? 'Pause' : 'Play';
        state.isPlaying = isPlaying;
    });

    speedSlider.addEventListener('input', (e) => {
        speedMultiplier = parseFloat(e.target.value);
        speedValue.textContent = speedMultiplier.toFixed(1) + 'x';
        state.speedMultiplier = speedMultiplier;
    });

    window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'r') {
            moonAngle = 0;
            isPlaying = true;
            playPauseBtn.textContent = 'Pause';
            state.isPlaying = true;
        } else if (key === '1') {
            cameraPreset = 1;
            camera.position.set(0, 0, 30);
            camera.lookAt(0, 0, -50);
            state.cameraPreset = 1;
        } else if (key === '2') {
            cameraPreset = 2;
            camera.position.set(0, 80, -50);
            camera.lookAt(0, 0, 0);
            state.cameraPreset = 2;
        } else if (key === '3') {
            cameraPreset = 3;
            camera.position.set(80, 0, -50);
            camera.lookAt(sunPosition);
            state.cameraPreset = 3;
        }
    });

    renderer.domElement.addEventListener('click', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(sunMesh);
        if (intersects.length > 0) {
            coronaVisible = !coronaVisible;
            particleSystem.visible = coronaVisible;
            state.coronaVisible = coronaVisible;
        }
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Animation
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);

        const delta = clock.getDelta();

        // Update moon orbit
        if (isPlaying) {
            const angularSpeed = (2 * Math.PI) / orbitalPeriod;
            moonAngle += angularSpeed * delta * speedMultiplier;
            if (moonAngle >= Math.PI * 2) moonAngle -= Math.PI * 2;
        }

        // Moon position: circular orbit in XZ plane at y=0, centered at (0, 0, orbitCenterZ)
        const moonX = orbitRadius * Math.cos(moonAngle);
        const moonY = 0;
        const moonZ = orbitCenterZ + orbitRadius * Math.sin(moonAngle);
        moonMesh.position.set(moonX, moonY, moonZ);

        // Calculate angular separation
        const camPos = camera.position.clone();
        const toMoon = new THREE.Vector3().subVectors(moonMesh.position, camPos).normalize();
        const toSun = new THREE.Vector3().subVectors(sunPosition, camPos).normalize();
        const angularSeparation = THREE.MathUtils.radToDeg(Math.acos(THREE.MathUtils.clamp(toMoon.dot(toSun), -1, 1)));

        // Eclipse state
        let eclipseState = 'none';
        let eclipseLabel = 'No Eclipse';
        let stateClass = 'state-none';

        if (angularSeparation < 1.5) {
            eclipseState = 'total';
            eclipseLabel = 'Total Eclipse';
            stateClass = 'state-total';
        } else if (angularSeparation < 5) {
            eclipseState = 'partial';
            eclipseLabel = 'Partial Eclipse';
            stateClass = 'state-partial';
        }

        // Ambient light adjustment
        let ambientIntensity = 0.1;
        let currentParticleSize = 0.15;

        if (eclipseState === 'total') {
            ambientIntensity = 0.02;
            currentParticleSize = 0.3;
        } else if (eclipseState === 'partial') {
            const t = (angularSeparation - 1.5) / (5 - 1.5);
            ambientIntensity = 0.02 + t * (0.1 - 0.02);
            currentParticleSize = 0.3 - t * (0.3 - 0.15);
        }

        ambientLight.intensity = ambientIntensity;
        particleMaterial.size = currentParticleSize;

        // Diamond ring effect
        if (eclipseState === 'total') {
            // Position diamond at moon's limb (edge facing away from eclipse center)
            const moonToSun = new THREE.Vector3().subVectors(sunPosition, moonMesh.position).normalize();
            const limbPos = moonMesh.position.clone().add(moonToSun.multiplyScalar(2.2));
            diamondSprite.position.copy(limbPos);
            diamondSprite.material.opacity = 0.9;
            diamondSprite.scale.set(3, 3, 1);
        } else if (eclipseState === 'partial' && angularSeparation < 2.5) {
            const t = (angularSeparation - 1.5) / (2.5 - 1.5);
            diamondSprite.material.opacity = Math.max(0, 0.9 * (1 - t));
            const moonToSun = new THREE.Vector3().subVectors(sunPosition, moonMesh.position).normalize();
            const limbPos = moonMesh.position.clone().add(moonToSun.multiplyScalar(2.2));
            diamondSprite.position.copy(limbPos);
        } else {
            diamondSprite.material.opacity = 0;
        }

        // Corona brightness during eclipse
        if (eclipseState === 'total') {
            coronaMaterial.opacity = 0.35;
            particleMaterial.opacity = 1.0;
        } else if (eclipseState === 'partial') {
            const t = (angularSeparation - 1.5) / (5 - 1.5);
            coronaMaterial.opacity = 0.15 + (1 - t) * 0.2;
            particleMaterial.opacity = 0.7 + (1 - t) * 0.3;
        } else {
            coronaMaterial.opacity = 0.15;
            particleMaterial.opacity = 0.7;
        }

        // Update particles (solar wind drift)
        const positions = particleGeometry.attributes.position.array;
        for (let i = 0; i < particleCount; i++) {
            particleRadii[i] += particleVelocities[i] * delta;
            if (particleRadii[i] >= 15) {
                particleRadii[i] = 9;
                particleThetas[i] = Math.random() * Math.PI * 2;
                particlePhis[i] = Math.acos(2 * Math.random() - 1);
            }
            const r = particleRadii[i];
            const theta = particleThetas[i];
            const phi = particlePhis[i];
            positions[i * 3] = sunPosition.x + r * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = sunPosition.y + r * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = sunPosition.z + r * Math.cos(phi);
        }
        particleGeometry.attributes.position.needsUpdate = true;

        // Update info panel
        const moonAngleDeg = THREE.MathUtils.radToDeg(moonAngle);
        const displayAngle = ((moonAngleDeg % 360) + 360) % 360;

        eclipseStateDisplay.innerHTML = `<span class="state-indicator ${stateClass}"></span>${eclipseLabel}`;
        moonAngleDisplay.textContent = displayAngle.toFixed(1) + '°';
        angSepDisplay.textContent = angularSeparation.toFixed(2) + '°';
        speedDisplay.textContent = speedMultiplier.toFixed(1) + 'x';

        // Update state
        state.moonAngle = parseFloat(displayAngle.toFixed(1));
        state.eclipseState = eclipseState;
        state.angularSeparation = parseFloat(angularSeparation.toFixed(2));
        state.isPlaying = isPlaying;
        state.speedMultiplier = speedMultiplier;
        state.cameraPreset = cameraPreset;
        state.coronaVisible = coronaVisible;
        state.ambientIntensity = parseFloat(ambientIntensity.toFixed(4));
        state.particleSize = parseFloat(currentParticleSize.toFixed(2));
        state.moonPosition = {
            x: parseFloat(moonX.toFixed(3)),
            y: parseFloat(moonY.toFixed(3)),
            z: parseFloat(moonZ.toFixed(3))
        };
        state.frameCount++;

        renderer.render(scene, camera);
    }

    animate();
})();
</script>
</body>
</html>
