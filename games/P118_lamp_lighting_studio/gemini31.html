<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Lighting Studio</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        #hud div {
            margin-bottom: 5px;
            font-size: 14px;
        }
        #hud div:last-child {
            margin-bottom: 0;
        }
        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        label {
            font-size: 14px;
        }
        input[type="range"] {
            width: 120px;
        }
        input[type="color"] {
            cursor: pointer;
            border: none;
            padding: 0;
            width: 30px;
            height: 30px;
            border-radius: 4px;
        }
        button {
            background: #444;
            color: white;
            border: 1px solid #666;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #555;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="hud">
        <div>灯光数量: <span id="lightCount">0</span></div>
        <div>阴影状态: <span id="shadowState">on</span></div>
        <div>当前强度: <span id="intensityValue">1.0</span></div>
    </div>

    <div id="controls">
        <div class="control-group">
            <label for="intensitySlider">灯光强度</label>
            <input type="range" id="intensitySlider" min="0" max="5" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label for="lightColor">灯光颜色</label>
            <input type="color" id="lightColor" value="#ffeedd">
        </div>
        <button id="shadowToggle">切换阴影开关</button>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 初始化全局状态
        window.__3D_STATE__ = {
            modelLoaded: false,
            lightCount: 0,
            shadowEnabled: true,
            intensity: 1,
            lightColor: '#ffeedd'
        };

        let loadedModelsCount = 0;
        const pointLights = [];

        // 场景设置
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        // 相机设置
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 4, 10);

        // 渲染器设置
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // 环境光 (提供基础照明)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.05);
        scene.add(ambientLight);

        // 地面 (接收阴影)
        const planeGeo = new THREE.PlaneGeometry(30, 30);
        const planeMat = new THREE.MeshStandardMaterial({ 
            color: 0x333333,
            roughness: 0.8,
            metalness: 0.2
        });
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = -1;
        plane.receiveShadow = true;
        scene.add(plane);

        // 中心受光球体
        const sphereGeo = new THREE.SphereGeometry(1, 64, 64);
        const sphereMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff,
            roughness: 0.3,
            metalness: 0.1
        });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        sphere.position.set(0, 0, 0);
        sphere.castShadow = true;
        sphere.receiveShadow = true;
        scene.add(sphere);

        // 模型加载器
        const loader = new GLTFLoader();

        // 通用模型处理函数
        function processLoadedModel(gltf, position) {
            const model = gltf.scene;
            model.position.copy(position);
            
            // 开启模型阴影
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            // 创建并绑定 PointLight
            const lightColor = new THREE.Color(window.__3D_STATE__.lightColor);
            const pointLight = new THREE.PointLight(lightColor, window.__3D_STATE__.intensity, 15);
            pointLight.position.set(0, 1, 0); // 将光源放置在灯具内部偏上位置
            pointLight.castShadow = true;
            pointLight.shadow.bias = -0.001;
            pointLight.shadow.mapSize.width = 1024;
            pointLight.shadow.mapSize.height = 1024;

            model.add(pointLight);
            pointLights.push(pointLight);
            scene.add(model);

            // 更新加载状态
            loadedModelsCount++;
            if (loadedModelsCount === 2) {
                window.__3D_STATE__.modelLoaded = true;
            }
            window.__3D_STATE__.lightCount = pointLights.length;
        }

        // 加载 IridescenceLamp
        loader.load('assets/IridescenceLamp.glb', (gltf) => {
            processLoadedModel(gltf, new THREE.Vector3(-2, 0, 0));
        }, undefined, (error) => {
            console.warn('IridescenceLamp 加载失败，使用替代几何体', error);
            const fallbackMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 1.5), new THREE.MeshStandardMaterial({color: 0x888888}));
            processLoadedModel({scene: fallbackMesh}, new THREE.Vector3(-2, 0, 0));
        });

        // 加载 Lantern
        loader.load('assets/Lantern.glb', (gltf) => {
            processLoadedModel(gltf, new THREE.Vector3(2, 0, 0));
        }, undefined, (error) => {
            console.warn('Lantern 加载失败，使用替代几何体', error);
            const fallbackMesh = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.2, 0.6), new THREE.MeshStandardMaterial({color: 0x888888}));
            processLoadedModel({scene: fallbackMesh}, new THREE.Vector3(2, 0, 0));
        });

        // UI 交互逻辑
        const intensitySlider = document.getElementById('intensitySlider');
        const lightColorPicker = document.getElementById('lightColor');
        const shadowToggleBtn = document.getElementById('shadowToggle');

        intensitySlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            window.__3D_STATE__.intensity = val;
            pointLights.forEach(light => light.intensity = val);
        });

        lightColorPicker.addEventListener('input', (e) => {
            const hex = e.target.value;
            window.__3D_STATE__.lightColor = hex;
            const color = new THREE.Color(hex);
            pointLights.forEach(light => light.color = color);
        });

        shadowToggleBtn.addEventListener('click', () => {
            const newState = !renderer.shadowMap.enabled;
            renderer.shadowMap.enabled = newState;
            window.__3D_STATE__.shadowEnabled = newState;
            
            // 强制更新材质以应用阴影状态变化
            scene.traverse((child) => {
                if (child.material) {
                    child.material.needsUpdate = true;
                }
            });
        });

        // 窗口缩放适配
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // HUD 元素引用
        const elLightCount = document.getElementById('lightCount');
        const elShadowState = document.getElementById('shadowState');
        const elIntensityValue = document.getElementById('intensityValue');

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            controls.update();

            // 更新 HUD 显示
            elLightCount.textContent = window.__3D_STATE__.lightCount;
            elShadowState.textContent = window.__3D_STATE__.shadowEnabled ? 'on' : 'off';
            elIntensityValue.textContent = window.__3D_STATE__.intensity.toFixed(1);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
