<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 灯光工作室</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 220px;
      line-height: 1.7;
      backdrop-filter: blur(6px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.25);
      user-select: none;
    }

    .controls {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.92);
      color: #111;
      padding: 14px;
      border-radius: 12px;
      min-width: 280px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .controls h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .control-group {
      margin-bottom: 12px;
    }

    .control-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input[type="range"] {
      width: 100%;
    }

    input[type="color"] {
      width: 52px;
      height: 34px;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      background: #1f6feb;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1859be;
    }

    .small {
      font-size: 12px;
      color: #555;
    }

    .pos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 12px;
    }

    .subpanel {
      padding: 10px;
      border-radius: 8px;
      background: rgba(0,0,0,0.04);
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div class="hud">
      <div>灯光数量：<span id="lightCount">0</span></div>
      <div>阴影状态：<span id="shadowState">off</span></div>
      <div>当前强度：<span id="intensityValue">1.00</span></div>
    </div>

    <div class="controls">
      <h3>灯光工作室控制台</h3>

      <div class="control-group">
        <label for="intensitySlider">灯光强度</label>
        <div class="row">
          <input id="intensitySlider" type="range" min="0" max="5" step="0.01" value="1">
          <span id="intensityText">1.00</span>
        </div>
      </div>

      <div class="control-group">
        <label for="lightColor">灯光颜色</label>
        <div class="row">
          <input id="lightColor" type="color" value="#ffeedd">
          <span id="colorText">#ffeedd</span>
        </div>
      </div>

      <div class="control-group">
        <button id="shadowToggle">阴影开关</button>
      </div>

      <div class="control-group">
        <label>灯具位置调整</label>
        <div class="pos-grid">
          <div class="subpanel">
            <div><strong>左灯 X</strong></div>
            <input id="lamp1X" type="range" min="-6" max="0" step="0.1" value="-2">
            <div class="small">当前位置：<span id="lamp1XValue">-2.0</span></div>
          </div>
          <div class="subpanel">
            <div><strong>右灯 X</strong></div>
            <input id="lamp2X" type="range" min="0" max="6" step="0.1" value="2">
            <div class="small">当前位置：<span id="lamp2XValue">2.0</span></div>
          </div>
          <div class="subpanel">
            <div><strong>左灯 Y</strong></div>
            <input id="lamp1Y" type="range" min="0" max="5" step="0.1" value="0">
            <div class="small">当前位置：<span id="lamp1YValue">0.0</span></div>
          </div>
          <div class="subpanel">
            <div><strong>右灯 Y</strong></div>
            <input id="lamp2Y" type="range" min="0" max="5" step="0.1" value="0">
            <div class="small">当前位置：<span id="lamp2YValue">0.0</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');

    const intensitySlider = document.getElementById('intensitySlider');
    const lightColorInput = document.getElementById('lightColor');
    const shadowToggle = document.getElementById('shadowToggle');

    const lightCountEl = document.getElementById('lightCount');
    const shadowStateEl = document.getElementById('shadowState');
    const intensityValueEl = document.getElementById('intensityValue');
    const intensityTextEl = document.getElementById('intensityText');
    const colorTextEl = document.getElementById('colorText');

    const lamp1X = document.getElementById('lamp1X');
    const lamp2X = document.getElementById('lamp2X');
    const lamp1Y = document.getElementById('lamp1Y');
    const lamp2Y = document.getElementById('lamp2Y');
    const lamp1XValue = document.getElementById('lamp1XValue');
    const lamp2XValue = document.getElementById('lamp2XValue');
    const lamp1YValue = document.getElementById('lamp1YValue');
    const lamp2YValue = document.getElementById('lamp2YValue');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1b1c1f);
    scene.fog = new THREE.Fog(0x1b1c1f, 12, 28);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 4.5, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.2, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.18);
    scene.add(ambientLight);

    const hemiLight = new THREE.HemisphereLight(0xbfd8ff, 0x2e241d, 0.35);
    scene.add(hemiLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshStandardMaterial({ color: 0x7e7e7e, roughness: 0.95, metalness: 0.02 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.001;
    ground.receiveShadow = true;
    scene.add(ground);

    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(1, 64, 64),
      new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.25, metalness: 0.05 })
    );
    sphere.position.set(0, 1, 0);
    sphere.castShadow = true;
    sphere.receiveShadow = false;
    scene.add(sphere);

    const stage = new THREE.Mesh(
      new THREE.CylinderGeometry(1.6, 1.8, 0.2, 48),
      new THREE.MeshStandardMaterial({ color: 0xd8d8d8, roughness: 0.8, metalness: 0.1 })
    );
    stage.position.set(0, 0.1, 0);
    stage.receiveShadow = true;
    stage.castShadow = true;
    scene.add(stage);

    const loader = new GLTFLoader();
    const lampRoots = [];
    const lampLights = [];
    let loadedModels = 0;
    let modelLoaded = false;
    let shadowEnabled = true;

    function markShadowRecursive(object, cast = true, receive = false) {
      object.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = cast;
          child.receiveShadow = receive;
          if (child.material) {
            child.material.side = THREE.FrontSide;
          }
        }
      });
    }

    function createFallbackLamp() {
      const group = new THREE.Group();

      const base = new THREE.Mesh(
        new THREE.CylinderGeometry(0.35, 0.45, 0.2, 24),
        new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.5, roughness: 0.5 })
      );
      base.position.y = 0.1;
      base.castShadow = true;
      group.add(base);

      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.08, 0.08, 1.2, 16),
        new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.7, roughness: 0.35 })
      );
      pole.position.y = 0.8;
      pole.castShadow = true;
      group.add(pole);

      const shade = new THREE.Mesh(
        new THREE.ConeGeometry(0.45, 0.7, 24, 1, true),
        new THREE.MeshStandardMaterial({ color: 0x999999, metalness: 0.35, roughness: 0.55, side: THREE.DoubleSide })
      );
      shade.position.y = 1.55;
      shade.rotation.x = Math.PI;
      shade.castShadow = true;
      group.add(shade);

      return group;
    }

    function createLampLight() {
      const pointLight = new THREE.PointLight(lightColorInput.value, parseFloat(intensitySlider.value), 15, 2);
      pointLight.position.set(0, 1.5, 0);
      pointLight.castShadow = true;
      pointLight.shadow.mapSize.set(1024, 1024);
      pointLight.shadow.bias = -0.001;
      pointLight.shadow.normalBias = 0.02;
      pointLight.shadow.camera.near = 0.1;
      pointLight.shadow.camera.far = 25;

      const bulb = new THREE.Mesh(
        new THREE.SphereGeometry(0.09, 16, 16),
        new THREE.MeshBasicMaterial({ color: lightColorInput.value })
      );
      pointLight.add(bulb);

      return { pointLight, bulb };
    }

    function addLampModel(path, position, scale = 1) {
      return new Promise((resolve) => {
        loader.load(
          path,
          (gltf) => {
            const root = gltf.scene;
            root.position.copy(position);
            root.scale.setScalar(scale);
            markShadowRecursive(root, true, false);

            const { pointLight } = createLampLight();
            root.add(pointLight);

            scene.add(root);
            lampRoots.push(root);
            lampLights.push(pointLight);

            loadedModels++;
            modelLoaded = loadedModels >= 2;
            resolve(root);
          },
          undefined,
          () => {
            const fallback = createFallbackLamp();
            fallback.position.copy(position);
            fallback.scale.setScalar(scale);
            markShadowRecursive(fallback, true, false);

            const { pointLight } = createLampLight();
            fallback.add(pointLight);

            scene.add(fallback);
            lampRoots.push(fallback);
            lampLights.push(pointLight);

            loadedModels++;
            modelLoaded = loadedModels >= 2;
            resolve(fallback);
          }
        );
      });
    }

    Promise.all([
      addLampModel('assets/IridescenceLamp.glb', new THREE.Vector3(-2, 0, 0), 1),
      addLampModel('assets/Lantern.glb', new THREE.Vector3(2, 0, 0), 1)
    ]);

    function updateLights() {
      const intensity = parseFloat(intensitySlider.value);
      const color = lightColorInput.value;

      lampLights.forEach((light) => {
        light.intensity = intensity;
        light.color.set(color);
        if (light.children[0] && light.children[0].material) {
          light.children[0].material.color.set(color);
        }
      });

      intensityValueEl.textContent = intensity.toFixed(2);
      intensityTextEl.textContent = intensity.toFixed(2);
      colorTextEl.textContent = color;
    }

    function updateLampPositions() {
      if (lampRoots[0]) {
        lampRoots[0].position.x = parseFloat(lamp1X.value);
        lampRoots[0].position.y = parseFloat(lamp1Y.value);
      }
      if (lampRoots[1]) {
        lampRoots[1].position.x = parseFloat(lamp2X.value);
        lampRoots[1].position.y = parseFloat(lamp2Y.value);
      }

      lamp1XValue.textContent = parseFloat(lamp1X.value).toFixed(1);
      lamp2XValue.textContent = parseFloat(lamp2X.value).toFixed(1);
      lamp1YValue.textContent = parseFloat(lamp1Y.value).toFixed(1);
      lamp2YValue.textContent = parseFloat(lamp2Y.value).toFixed(1);
    }

    function updateHUD() {
      lightCountEl.textContent = String(lampLights.length);
      shadowStateEl.textContent = shadowEnabled ? 'on' : 'off';
      intensityValueEl.textContent = parseFloat(intensitySlider.value).toFixed(2);
    }

    intensitySlider.addEventListener('input', updateLights);
    lightColorInput.addEventListener('input', updateLights);

    [lamp1X, lamp2X, lamp1Y, lamp2Y].forEach((input) => {
      input.addEventListener('input', updateLampPositions);
    });

    shadowToggle.addEventListener('click', () => {
      shadowEnabled = !shadowEnabled;
      renderer.shadowMap.enabled = shadowEnabled;
      lampLights.forEach((light) => {
        light.castShadow = shadowEnabled;
      });
      updateHUD();
    });

    updateLights();
    updateLampPositions();
    updateHUD();

    window.__3D_STATE__ = {
      modelLoaded: false,
      lightCount: 0,
      shadowEnabled: true,
      intensity: 1,
      lightColor: '#ffeedd'
    };

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();

      if (lampRoots[0]) lampRoots[0].rotation.y = Math.sin(t * 0.6) * 0.08;
      if (lampRoots[1]) lampRoots[1].rotation.y = -Math.sin(t * 0.6) * 0.08;

      controls.update();
      updateHUD();

      window.__3D_STATE__ = {
        modelLoaded,
        lightCount: lampLights.length,
        shadowEnabled,
        intensity: parseFloat(intensitySlider.value),
        lightColor: lightColorInput.value
      };

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
