<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Lighting Studio</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
  position: absolute;
  top: 20px;
  left: 20px;
  background: rgba(10, 10, 30, 0.85);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  padding: 20px;
  color: #e0e0e0;
  font-size: 14px;
  min-width: 220px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

#hud h2 {
  margin-bottom: 16px;
  font-size: 18px;
  color: #ffeedd;
  border-bottom: 1px solid rgba(255, 238, 221, 0.3);
  padding-bottom: 10px;
  letter-spacing: 1px;
}

.hud-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  padding: 4px 0;
}

.hud-row label {
  color: #aaa;
  font-size: 13px;
}

.hud-row span {
  color: #ffeedd;
  font-weight: 600;
}

#controls {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10, 10, 30, 0.85);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  padding: 20px 30px;
  display: flex;
  gap: 30px;
  align-items: center;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

.control-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.control-group label {
  color: #aaa;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

input[type="range"] {
  -webkit-appearance: none;
  width: 180px;
  height: 6px;
  border-radius: 3px;
  background: linear-gradient(to right, #333, #ffeedd);
  outline: none;
  cursor: pointer;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #ffeedd;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(255, 238, 221, 0.5);
}

input[type="color"] {
  -webkit-appearance: none;
  border: 2px solid rgba(255, 255, 255, 0.2);
  border-radius: 8px;
  width: 50px;
  height: 36px;
  cursor: pointer;
  background: transparent;
  padding: 2px;
}

input[type="color"]::-webkit-color-swatch-wrapper {
  padding: 2px;
}

input[type="color"]::-webkit-color-swatch {
  border: none;
  border-radius: 4px;
}

#shadowToggle {
  background: linear-gradient(135deg, #ffeedd, #ffcc99);
  color: #1a1a2e;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 700;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(255, 238, 221, 0.3);
}

#shadowToggle:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255, 238, 221, 0.5);
}

#shadowToggle.off {
  background: linear-gradient(135deg, #555, #333);
  color: #aaa;
  box-shadow: none;
}

.loading-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
  transition: opacity 0.5s ease;
}

.loading-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

.loading-spinner {
  width: 50px;
  height: 50px;
  border: 3px solid rgba(255, 238, 221, 0.2);
  border-top-color: #ffeedd;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  color: #ffeedd;
  margin-top: 20px;
  font-family: 'Segoe UI', sans-serif;
  font-size: 16px;
  letter-spacing: 2px;
}
</style>
</head>
<body>

<div id="loading" class="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading Studio...</div>
</div>

<div id="hud">
  <h2>🔦 Light Studio</h2>
  <div class="hud-row">
    <label>Light Count:</label>
    <span id="lightCount">0</span>
  </div>
  <div class="hud-row">
    <label>Shadows:</label>
    <span id="shadowState">on</span>
  </div>
  <div class="hud-row">
    <label>Intensity:</label>
    <span id="intensityValue">1.00</span>
  </div>
</div>

<div id="controls">
  <div class="control-group">
    <label>Intensity</label>
    <input type="range" id="intensitySlider" min="0" max="5" step="0.01" value="1">
  </div>
  <div class="control-group">
    <label>Light Color</label>
    <input type="color" id="lightColor" value="#ffeedd">
  </div>
  <div class="control-group">
    <label>Shadows</label>
    <button id="shadowToggle">Shadows ON</button>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Initialize state
window.__3D_STATE__ = {
  modelLoaded: false,
  lightCount: 0,
  shadowEnabled: true,
  intensity: 1,
  lightColor: '#ffeedd'
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.035);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(5, 4, 7);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 3;
controls.maxDistance = 20;
controls.maxPolarAngle = Math.PI / 2 + 0.1;
controls.target.set(0, 1, 0);

// Ambient light (very dim)
const ambientLight = new THREE.AmbientLight(0x222244, 0.3);
scene.add(ambientLight);

// Ground plane
const groundGeometry = new THREE.PlaneGeometry(30, 30);
const groundMaterial = new THREE.MeshStandardMaterial({
  color: 0x2a2a3e,
  roughness: 0.8,
  metalness: 0.2
});
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Grid on ground
const gridHelper = new THREE.GridHelper(30, 30, 0x333355, 0x222244);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// Central sphere
const sphereGeometry = new THREE.SphereGeometry(1, 64, 64);
const sphereMaterial = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  roughness: 0.3,
  metalness: 0.1
});
const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
sphere.position.set(0, 1.2, 0);
sphere.castShadow = true;
sphere.receiveShadow = true;
scene.add(sphere);

// Additional scene objects for visual interest
const boxGeometry = new THREE.BoxGeometry(0.6, 0.6, 0.6);
const boxMaterial = new THREE.MeshStandardMaterial({ color: 0x8888cc, roughness: 0.4, metalness: 0.3 });
const box1 = new THREE.Mesh(boxGeometry, boxMaterial);
box1.position.set(-1.5, 0.3, 2);
box1.castShadow = true;
box1.receiveShadow = true;
scene.add(box1);

const cylinderGeometry = new THREE.CylinderGeometry(0.3, 0.3, 1.2, 32);
const cylinderMaterial = new THREE.MeshStandardMaterial({ color: 0xcc8888, roughness: 0.5, metalness: 0.2 });
const cylinder = new THREE.Mesh(cylinderGeometry, cylinderMaterial);
cylinder.position.set(1.5, 0.6, 2);
cylinder.castShadow = true;
cylinder.receiveShadow = true;
scene.add(cylinder);

// Point lights for the lamps
const pointLight1 = new THREE.PointLight(0xffeedd, 1, 20, 2);
pointLight1.position.set(-2, 2, 0);
pointLight1.castShadow = true;
pointLight1.shadow.mapSize.width = 1024;
pointLight1.shadow.mapSize.height = 1024;
pointLight1.shadow.camera.near = 0.1;
pointLight1.shadow.camera.far = 20;
pointLight1.shadow.bias = -0.002;
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0xffeedd, 1, 20, 2);
pointLight2.position.set(2, 2, 0);
pointLight2.castShadow = true;
pointLight2.shadow.mapSize.width = 1024;
pointLight2.shadow.mapSize.height = 1024;
pointLight2.shadow.camera.near = 0.1;
pointLight2.shadow.camera.far = 20;
pointLight2.shadow.bias = -0.002;
scene.add(pointLight2);

// Light helpers (small glowing spheres at light positions)
const lightHelperGeo = new THREE.SphereGeometry(0.08, 16, 16);
const lightHelperMat1 = new THREE.MeshBasicMaterial({ color: 0xffeedd });
const lightHelper1 = new THREE.Mesh(lightHelperGeo, lightHelperMat1);
pointLight1.add(lightHelper1);

const lightHelperMat2 = new THREE.MeshBasicMaterial({ color: 0xffeedd });
const lightHelper2 = new THREE.Mesh(lightHelperGeo, lightHelperMat2);
pointLight2.add(lightHelper2);

// Load models
const loader = new GLTFLoader();
let model1Loaded = false;
let model2Loaded = false;

function createFallbackLamp(position, light) {
  const group = new THREE.Group();
  
  // Base
  const baseGeo = new THREE.CylinderGeometry(0.3, 0.35, 0.1, 32);
  const baseMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.2 });
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.position.y = 0.05;
  base.castShadow = true;
  group.add(base);
  
  // Pole
  const poleGeo = new THREE.CylinderGeometry(0.04, 0.04, 1.8, 16);
  const poleMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.9, roughness: 0.1 });
  const pole = new THREE.Mesh(poleGeo, poleMat);
  pole.position.y = 1;
  pole.castShadow = true;
  group.add(pole);
  
  // Lamp shade
  const shadeGeo = new THREE.ConeGeometry(0.4, 0.5, 32, 1, true);
  const shadeMat = new THREE.MeshStandardMaterial({ 
    color: 0xaa8866, 
    metalness: 0.5, 
    roughness: 0.3,
    side: THREE.DoubleSide 
  });
  const shade = new THREE.Mesh(shadeGeo, shadeMat);
  shade.position.y = 2.0;
  shade.castShadow = true;
  group.add(shade);
  
  // Bulb glow
  const bulbGeo = new THREE.SphereGeometry(0.12, 16, 16);
  const bulbMat = new THREE.MeshBasicMaterial({ color: 0xffeedd });
  const bulb = new THREE.Mesh(bulbGeo, bulbMat);
  bulb.position.y = 1.85;
  group.add(bulb);
  
  group.position.copy(position);
  
  // Attach light to lamp
  light.position.set(position.x, position.y + 2, position.z);
  
  return { group, bulb };
}

let lamp1Bulb, lamp2Bulb;

function setupLampShadows(model) {
  model.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
}

// Try loading model 1
loader.load(
  'assets/IridescenceLamp.glb',
  (gltf) => {
    const model = gltf.scene;
    model.position.set(-2, 0, 0);
    
    // Scale to reasonable size
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    if (maxDim > 0) {
      const scale = 2.5 / maxDim;
      model.scale.setScalar(scale);
    }
    
    setupLampShadows(model);
    scene.add(model);
    
    // Position light at top of model
    const scaledBox = new THREE.Box3().setFromObject(model);
    const top = scaledBox.max.y;
    pointLight1.position.set(-2, top, 0);
    
    model1Loaded = true;
    checkAllLoaded();
  },
  undefined,
  (error) => {
    console.warn('Could not load IridescenceLamp.glb, using fallback:', error);
    const fallback = createFallbackLamp(new THREE.Vector3(-2, 0, 0), pointLight1);
    scene.add(fallback.group);
    lamp1Bulb = fallback.bulb;
    model1Loaded = true;
    checkAllLoaded();
  }
);

// Try loading model 2
loader.load(
  'assets/Lantern.glb',
  (gltf) => {
    const model = gltf.scene;
    model.position.set(2, 0, 0);
    
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    if (maxDim > 0) {
      const scale = 2.5 / maxDim;
      model.scale.setScalar(scale);
    }
    
    setupLampShadows(model);
    scene.add(model);
    
    const scaledBox = new THREE.Box3().setFromObject(model);
    const top = scaledBox.max.y;
    pointLight2.position.set(2, top, 0);
    
    model2Loaded = true;
    checkAllLoaded();
  },
  undefined,
  (error) => {
    console.warn('Could not load Lantern.glb, using fallback:', error);
    const fallback = createFallbackLamp(new THREE.Vector3(2, 0, 0), pointLight2);
    scene.add(fallback.group);
    lamp2Bulb = fallback.bulb;
    model2Loaded = true;
    checkAllLoaded();
  }
);

function checkAllLoaded() {
  if (model1Loaded && model2Loaded) {
    window.__3D_STATE__.modelLoaded = true;
    window.__3D_STATE__.lightCount = 2;
    document.getElementById('lightCount').textContent = '2';
    
    const loadingEl = document.getElementById('loading');
    loadingEl.classList.add('hidden');
    setTimeout(() => loadingEl.style.display = 'none', 500);
  }
}

// UI Controls
const intensitySlider = document.getElementById('intensitySlider');
const lightColorInput = document.getElementById('lightColor');
const shadowToggleBtn = document.getElementById('shadowToggle');

let shadowEnabled = true;

intensitySlider.addEventListener('input', (e) => {
  const val = parseFloat(e.target.value);
  pointLight1.intensity = val;
  pointLight2.intensity = val;
  window.__3D_STATE__.intensity = val;
  document.getElementById('intensityValue').textContent = val.toFixed(2);
});

lightColorInput.addEventListener('input', (e) => {
  const color = new THREE.Color(e.target.value);
  pointLight1.color.copy(color);
  pointLight2.color.copy(color);
  
  lightHelperMat1.color.copy(color);
  lightHelperMat2.color.copy(color);
  
  if (lamp1Bulb) lamp1Bulb.material.color.copy(color);
  if (lamp2Bulb) lamp2Bulb.material.color.copy(color);
  
  window.__3D_STATE__.lightColor = e.target.value;
});

shadowToggleBtn.addEventListener('click', () => {
  shadowEnabled = !shadowEnabled;
  renderer.shadowMap.enabled = shadowEnabled;
  
  // Need to update all materials when toggling shadow map
  pointLight1.castShadow = shadowEnabled;
  pointLight2.castShadow = shadowEnabled;
  
  // Force material updates
  scene.traverse((obj) => {
    if (obj.isMesh && obj.material) {
      obj.material.needsUpdate = true;
    }
  });
  
  shadowToggleBtn.textContent = shadowEnabled ? 'Shadows ON' : 'Shadows OFF';
  shadowToggleBtn.classList.toggle('off', !shadowEnabled);
  document.getElementById('shadowState').textContent = shadowEnabled ? 'on' : 'off';
  window.__3D_STATE__.shadowEnabled = shadowEnabled;
});

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const time = clock.getElapsedTime();
  
  // Gentle sphere bobbing
  sphere.position.y = 1.2 + Math.sin(time * 0.8) * 0.1;
  
  // Subtle box rotation
  box1.rotation.y = time * 0.5;
  
  // Update light helper brightness based on intensity
  const intensity = parseFloat(intensitySlider.value);
  const baseColor = new THREE.Color(lightColorInput.value);
  
  // Pulsing glow effect
  const pulse = 0.9 + Math.sin(time * 2) * 0.1;
  lightHelperMat1.color.copy(baseColor).multiplyScalar(pulse);
  lightHelperMat2.color.copy(baseColor).multiplyScalar(pulse);
  
  if (lamp1Bulb) lamp1Bulb.material.color.copy(baseColor).multiplyScalar(pulse);
  if (lamp2Bulb) lamp2Bulb.material.color.copy(baseColor).multiplyScalar(pulse);
  
  // Update state
  window.__3D_STATE__.intensity = intensity;
  window.__3D_STATE__.lightCount = 2;
  window.__3D_STATE__.shadowEnabled = shadowEnabled;
  window.__3D_STATE__.lightColor = lightColorInput.value;
  
  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
