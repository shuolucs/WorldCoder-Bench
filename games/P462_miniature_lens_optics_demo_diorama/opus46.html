<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thin Lens Optics Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  
  #title {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    pointer-events: none;
    z-index: 10;
  }
  
  #buttons {
    position: absolute;
    top: 15px;
    left: 15px;
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  
  #buttons button {
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    background: rgba(30,30,50,0.85);
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    backdrop-filter: blur(4px);
  }
  
  #buttons button:hover {
    background: rgba(60,60,100,0.9);
    transform: translateY(-1px);
  }
  
  #buttons button:active {
    transform: translateY(0);
  }
  
  #infoPanel {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: rgba(10,10,30,0.85);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 16px 20px;
    color: #fff;
    font-size: 14px;
    line-height: 1.8;
    z-index: 10;
    backdrop-filter: blur(6px);
    min-width: 240px;
    display: none;
  }
  
  #infoPanel .label {
    color: #aaa;
    font-size: 12px;
  }
  
  #infoPanel .value {
    color: #4fc3f7;
    font-weight: bold;
  }
  
  #infoPanel .header {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 8px;
    color: #ffcc00;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding-bottom: 6px;
  }
  
  #instructions {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="title">Thin Lens Optics Demo</div>

<div id="buttons">
  <button id="btnToggleRays">Toggle Rays</button>
  <button id="btnSwitchLens">Switch Lens</button>
  <button id="btnReset">Reset</button>
</div>

<div id="infoPanel">
  <div class="header">Optics Info (I)</div>
  <div><span class="label">Object Distance (do): </span><span class="value" id="infoDo">6.00</span></div>
  <div><span class="label">Image Distance (di): </span><span class="value" id="infoDi">6.00</span></div>
  <div><span class="label">Magnification (m): </span><span class="value" id="infoM">-1.00</span></div>
  <div><span class="label">Image Type: </span><span class="value" id="infoType">Real, Inverted</span></div>
  <div><span class="label">Lens Type: </span><span class="value" id="infoLens">Convex</span></div>
</div>

<div id="instructions">Drag the red arrow along the axis · Press 'I' for info</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ STATE ============
const STATE = {
  objectZ: -6,
  objectDistance: 6,
  focalLength: 3,
  imageDistance: 6,
  magnification: -1,
  imageZ: 6,
  imageHeight: -1.5,
  isRealImage: true,
  raysVisible: true,
  lensType: 'convex',
  infoPanelVisible: false,
  objectHeight: 1.5
};
window.__3D_STATE__ = STATE;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 5;
controls.maxDistance = 25;
controls.maxPolarAngle = Math.PI / 2.1;

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -12;
dirLight.shadow.camera.right = 12;
dirLight.shadow.camera.top = 8;
dirLight.shadow.camera.bottom = -8;
scene.add(dirLight);

// Subtle fill light
const fillLight = new THREE.DirectionalLight(0x4488ff, 0.15);
fillLight.position.set(-5, 3, -5);
scene.add(fillLight);

// ============ TABLETOP ============
const tableGeo = new THREE.BoxGeometry(20, 0.3, 8);
const tableMat = new THREE.MeshStandardMaterial({ 
  color: 0x8B4513, 
  roughness: 0.8, 
  metalness: 0.1 
});
const table = new THREE.Mesh(tableGeo, tableMat);
table.position.y = -0.15;
table.receiveShadow = true;
scene.add(table);

// Table edge trim
const edgeGeo = new THREE.BoxGeometry(20.1, 0.35, 8.1);
const edgeMat = new THREE.MeshStandardMaterial({ color: 0x5C3317, roughness: 0.9 });
const edge = new THREE.Mesh(edgeGeo, edgeMat);
edge.position.y = -0.175;
scene.add(edge);

// Grid lines on table
const gridHelper = new THREE.GridHelper(18, 18, 0x553311, 0x442200);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// ============ PRINCIPAL AXIS ============
const axisGeo = new THREE.CylinderGeometry(0.015, 0.015, 18, 8);
const axisMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
const axis = new THREE.Mesh(axisGeo, axisMat);
axis.rotation.z = Math.PI / 2;
axis.rotation.y = Math.PI / 2;
axis.position.y = 0.5;
scene.add(axis);

// Axis tick marks
for (let z = -9; z <= 9; z++) {
  if (z === 0) continue;
  const tickGeo = new THREE.BoxGeometry(0.02, 0.1, 0.02);
  const tickMat = new THREE.MeshBasicMaterial({ color: 0x888888 });
  const tick = new THREE.Mesh(tickGeo, tickMat);
  tick.position.set(0, 0.5, z);
  scene.add(tick);
}

// ============ LENS ============
const lensGroup = new THREE.Group();
lensGroup.position.set(0, 0.5, 0);
scene.add(lensGroup);

let lensMeshes = [];

function createConvexLens() {
  clearLensMeshes();
  
  // Create lens using two sphere segments
  const sphereRadius = 3;
  const lensRadius = 1.5;
  
  // Front cap
  const capGeo1 = new THREE.SphereGeometry(sphereRadius, 32, 32, 0, Math.PI * 2, 0, Math.asin(lensRadius / sphereRadius));
  const lensMat = new THREE.MeshPhysicalMaterial({
    color: 0x88CCFF,
    transparent: true,
    opacity: 0.5,
    roughness: 0.05,
    metalness: 0.0,
    transmission: 0.6,
    thickness: 0.5,
    side: THREE.DoubleSide
  });
  
  const cap1 = new THREE.Mesh(capGeo1, lensMat);
  cap1.rotation.x = -Math.PI / 2;
  cap1.position.z = -sphereRadius + 0.15;
  lensGroup.add(cap1);
  lensMeshes.push(cap1);
  
  const cap2 = new THREE.Mesh(capGeo1.clone(), lensMat);
  cap2.rotation.x = Math.PI / 2;
  cap2.position.z = sphereRadius - 0.15;
  lensGroup.add(cap2);
  lensMeshes.push(cap2);
  
  // Lens rim (torus)
  const rimGeo = new THREE.TorusGeometry(lensRadius, 0.04, 8, 32);
  const rimMat = new THREE.MeshStandardMaterial({ color: 0x6699CC, metalness: 0.3, roughness: 0.5 });
  const rim = new THREE.Mesh(rimGeo, rimMat);
  rim.rotation.y = Math.PI / 2;
  lensGroup.add(rim);
  lensMeshes.push(rim);
  
  // Lens holder
  const holderGeo = new THREE.CylinderGeometry(0.05, 0.08, 0.5, 8);
  const holderMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.5 });
  const holder = new THREE.Mesh(holderGeo, holderMat);
  holder.position.y = -1.5 - 0.25;
  lensGroup.add(holder);
  lensMeshes.push(holder);
  
  // Base
  const baseGeo = new THREE.CylinderGeometry(0.3, 0.35, 0.1, 16);
  const base = new THREE.Mesh(baseGeo, holderMat);
  base.position.y = -2;
  lensGroup.add(base);
  lensMeshes.push(base);
}

function createConcaveLens() {
  clearLensMeshes();
  
  const lensRadius = 1.5;
  
  // For concave lens, use a flat disc with indented appearance
  const lensMat = new THREE.MeshPhysicalMaterial({
    color: 0xFF8844,
    transparent: true,
    opacity: 0.5,
    roughness: 0.05,
    metalness: 0.0,
    transmission: 0.4,
    thickness: 0.3,
    side: THREE.DoubleSide
  });
  
  // Thin edges, thick center inverted - use ring shape
  const ringGeo = new THREE.TorusGeometry(lensRadius * 0.75, 0.15, 16, 32);
  const ring = new THREE.Mesh(ringGeo, lensMat);
  ring.rotation.y = Math.PI / 2;
  lensGroup.add(ring);
  lensMeshes.push(ring);
  
  // Inner disc (thinner)
  const discGeo = new THREE.CylinderGeometry(lensRadius * 0.6, lensRadius * 0.6, 0.05, 32);
  const disc = new THREE.Mesh(discGeo, lensMat);
  disc.rotation.z = Math.PI / 2;
  disc.rotation.y = Math.PI / 2;
  lensGroup.add(disc);
  lensMeshes.push(disc);
  
  // Rim
  const rimGeo = new THREE.TorusGeometry(lensRadius, 0.04, 8, 32);
  const rimMat = new THREE.MeshStandardMaterial({ color: 0xCC6633, metalness: 0.3, roughness: 0.5 });
  const rim = new THREE.Mesh(rimGeo, rimMat);
  rim.rotation.y = Math.PI / 2;
  lensGroup.add(rim);
  lensMeshes.push(rim);
  
  // Holder
  const holderGeo = new THREE.CylinderGeometry(0.05, 0.08, 0.5, 8);
  const holderMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.5 });
  const holder = new THREE.Mesh(holderGeo, holderMat);
  holder.position.y = -1.5 - 0.25;
  lensGroup.add(holder);
  lensMeshes.push(holder);
  
  const baseGeo = new THREE.CylinderGeometry(0.3, 0.35, 0.1, 16);
  const base = new THREE.Mesh(baseGeo, holderMat);
  base.position.y = -2;
  lensGroup.add(base);
  lensMeshes.push(base);
}

function clearLensMeshes() {
  lensMeshes.forEach(m => {
    lensGroup.remove(m);
    m.geometry.dispose();
    if (m.material.dispose) m.material.dispose();
  });
  lensMeshes = [];
}

createConvexLens();

// ============ FOCAL POINTS ============
const focalPointGeo = new THREE.SphereGeometry(0.1, 16, 16);
const focalPointMat = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0xff0000, emissiveIntensity: 0.3 });

const focalPoint1 = new THREE.Mesh(focalPointGeo, focalPointMat);
focalPoint1.position.set(0, 0.5, -3);
scene.add(focalPoint1);

const focalPoint2 = new THREE.Mesh(focalPointGeo, focalPointMat);
focalPoint2.position.set(0, 0.5, 3);
scene.add(focalPoint2);

// ============ FOCAL POINT LABELS ============
function createTextSprite(text, color = '#ff4444') {
  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.font = 'bold 48px Arial';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 64, 32);
  
  const texture = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(0.6, 0.3, 1);
  return sprite;
}

const fLabel1 = createTextSprite('F');
fLabel1.position.set(0, 1.0, -3);
scene.add(fLabel1);

const fLabel2 = createTextSprite('F');
fLabel2.position.set(0, 1.0, 3);
scene.add(fLabel2);

// F' labels
const fPrimeLabel1 = createTextSprite("F'", '#ff8888');
fPrimeLabel1.position.set(0.4, 1.0, -3);
fPrimeLabel1.visible = false;
scene.add(fPrimeLabel1);

const fPrimeLabel2 = createTextSprite("F'", '#ff8888');
fPrimeLabel2.position.set(0.4, 1.0, 3);
fPrimeLabel2.visible = false;
scene.add(fPrimeLabel2);

// Lens label
const lensLabel = createTextSprite('Lens', '#88CCFF');
lensLabel.position.set(0, 2.3, 0);
lensLabel.scale.set(0.8, 0.4, 1);
scene.add(lensLabel);

// ============ OBJECT ARROW ============
function createArrow(color, height, isObject = true) {
  const group = new THREE.Group();
  
  const shaftH = height * 0.75;
  const coneH = height * 0.25;
  
  const shaftGeo = new THREE.CylinderGeometry(0.05, 0.05, shaftH, 8);
  const mat = new THREE.MeshStandardMaterial({ 
    color: color, 
    emissive: color, 
    emissiveIntensity: 0.15,
    metalness: 0.2,
    roughness: 0.6
  });
  const shaft = new THREE.Mesh(shaftGeo, mat);
  shaft.position.y = shaftH / 2;
  shaft.castShadow = true;
  group.add(shaft);
  
  const coneGeo = new THREE.ConeGeometry(0.12, coneH, 12);
  const cone = new THREE.Mesh(coneGeo, mat);
  cone.position.y = shaftH + coneH / 2;
  cone.castShadow = true;
  group.add(cone);
  
  // Base disc
  const baseGeo = new THREE.CylinderGeometry(0.15, 0.18, 0.05, 16);
  const baseMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.position.y = -0.025;
  group.add(base);
  
  return group;
}

const objectArrow = createArrow(0xff3333, STATE.objectHeight);
objectArrow.position.set(0, 0.5, STATE.objectZ);
scene.add(objectArrow);

// Object label
const objLabel = createTextSprite('Object', '#ff6666');
objLabel.position.set(0, 2.5, STATE.objectZ);
objLabel.scale.set(0.9, 0.45, 1);
scene.add(objLabel);

// ============ IMAGE ARROW ============
let imageArrowGroup = new THREE.Group();
scene.add(imageArrowGroup);

const imageLabel = createTextSprite('Image', '#66ff66');
imageLabel.scale.set(0.9, 0.45, 1);
scene.add(imageLabel);

function updateImageArrow() {
  // Clear previous
  while (imageArrowGroup.children.length > 0) {
    const child = imageArrowGroup.children[0];
    imageArrowGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
    if (child.material) child.material.dispose();
  }
  
  const f = STATE.focalLength;
  const doVal = STATE.objectDistance; // positive
  
  // Thin lens equation: 1/f = 1/do + 1/di => di = (f * do) / (do - f)
  const di = (f * doVal) / (doVal - f);
  const m = -di / doVal;
  
  STATE.imageDistance = di;
  STATE.magnification = m;
  STATE.imageZ = di;
  STATE.imageHeight = m * STATE.objectHeight;
  STATE.isRealImage = di > 0;
  
  const absHeight = Math.abs(STATE.imageHeight);
  
  if (absHeight < 0.01 || absHeight > 20 || !isFinite(di)) {
    imageLabel.visible = false;
    return;
  }
  
  const isVirtual = !STATE.isRealImage;
  
  const shaftH = absHeight * 0.75;
  const coneH = absHeight * 0.25;
  
  const opacity = isVirtual ? 0.4 : 1.0;
  const mat = new THREE.MeshStandardMaterial({
    color: 0x33ff33,
    emissive: 0x33ff33,
    emissiveIntensity: 0.15,
    metalness: 0.2,
    roughness: 0.6,
    transparent: isVirtual,
    opacity: opacity
  });
  
  if (isVirtual) {
    // Dashed appearance for virtual - use wireframe-like effect
    mat.wireframe = false;
  }
  
  const shaftGeo = new THREE.CylinderGeometry(0.05, 0.05, shaftH, 8);
  const shaft = new THREE.Mesh(shaftGeo, mat);
  shaft.position.y = shaftH / 2;
  imageArrowGroup.add(shaft);
  
  const coneGeo = new THREE.ConeGeometry(0.12, coneH, 12);
  const cone = new THREE.Mesh(coneGeo, mat);
  cone.position.y = shaftH + coneH / 2;
  imageArrowGroup.add(cone);
  
  // Base
  const baseGeo = new THREE.CylinderGeometry(0.15, 0.18, 0.05, 16);
  const baseMat = new THREE.MeshStandardMaterial({ color: 0x333333, transparent: isVirtual, opacity: opacity });
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.position.y = -0.025;
  imageArrowGroup.add(base);
  
  imageArrowGroup.position.set(0, 0.5, STATE.imageZ);
  
  // If inverted (m < 0 means inverted for real image), flip the arrow
  if (STATE.imageHeight < 0) {
    imageArrowGroup.scale.set(1, -1, 1);
    imageArrowGroup.position.y = 0.5;
  } else {
    imageArrowGroup.scale.set(1, 1, 1);
  }
  
  // Scale height
  const scaleY = absHeight / STATE.objectHeight;
  imageArrowGroup.scale.y = (STATE.imageHeight < 0 ? -1 : 1) * scaleY;
  imageArrowGroup.scale.x = Math.min(scaleY, 2);
  imageArrowGroup.scale.z = Math.min(scaleY, 2);
  
  // Clamp image position for display
  const clampedZ = Math.max(-9, Math.min(9, STATE.imageZ));
  imageArrowGroup.position.z = clampedZ;
  
  // Image label
  imageLabel.visible = true;
  const labelY = STATE.imageHeight < 0 ? 0.5 - absHeight * scaleY - 0.3 : 0.5 + absHeight + 0.5;
  imageLabel.position.set(0, Math.max(0.3, Math.min(4, 0.5 + absHeight * scaleY + 0.3)), clampedZ);
}

// ============ RAY TRACING ============
const raysGroup = new THREE.Group();
scene.add(raysGroup);

function createRayLine(points, color) {
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const material = new THREE.LineBasicMaterial({ color: color, linewidth: 2 });
  const line = new THREE.Line(geometry, material);
  return line;
}

function updateRays() {
  // Clear previous rays
  while (raysGroup.children.length > 0) {
    const child = raysGroup.children[0];
    raysGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
    if (child.material) child.material.dispose();
  }
  
  if (!STATE.raysVisible) return;
  
  const f = STATE.focalLength;
  const objZ = STATE.objectZ;
  const objY = 0.5 + STATE.objectHeight; // tip of object arrow
  const baseY = 0.5; // principal axis height
  const doVal = STATE.objectDistance;
  const di = STATE.imageDistance;
  const m = STATE.magnification;
  
  if (!isFinite(di) || Math.abs(di) > 50) return;
  
  const imageY = baseY + m * STATE.objectHeight;
  const imageZ = di;
  
  // Clamp for display
  const maxZ = 9;
  const minZ = -9;
  
  // ---- RAY 1: Parallel Ray (yellow) ----
  // From object tip, travels parallel to axis to lens, then refracts through far focal point
  {
    const points = [];
    points.push(new THREE.Vector3(0, objY, objZ));
    points.push(new THREE.Vector3(0, objY, 0)); // hits lens
    
    // After lens, goes through focal point on far side (z = f for convex)
    // Direction: from (0, objY, 0) toward (0, baseY, f)
    if (STATE.isRealImage) {
      // Extend to image or beyond
      const targetZ = Math.min(maxZ, Math.max(imageZ, f + 3));
      const slope = (baseY - objY) / (f - 0);
      const extendY = objY + slope * targetZ;
      points.push(new THREE.Vector3(0, extendY, targetZ));
    } else {
      // Virtual image: ray appears to diverge, extend forward
      const targetZ = maxZ;
      const slope = (baseY - objY) / (f - 0);
      const extendY = objY + slope * targetZ;
      points.push(new THREE.Vector3(0, extendY, targetZ));
      
      // Also draw virtual extension backward (dashed effect via separate line)
      const vPoints = [];
      vPoints.push(new THREE.Vector3(0, objY, 0));
      // Extend backward toward virtual image
      const backZ = Math.max(minZ, imageZ);
      const backY = objY - slope * (-backZ);
      const slopeBack = (baseY - objY) / f;
      const virtualExtY = objY + slopeBack * backZ;
      vPoints.push(new THREE.Vector3(0, virtualExtY, backZ));
      
      const vLine = createRayLine(vPoints, 0xffff00);
      vLine.material.transparent = true;
      vLine.material.opacity = 0.3;
      vLine.material.dashSize = 0.2;
      vLine.material.gapSize = 0.1;
      raysGroup.add(vLine);
    }
    
    raysGroup.add(createRayLine(points, 0xffff00));
  }
  
  // ---- RAY 2: Focal Ray (cyan) ----
  // From object tip, passes through near focal point (z = -f), hits lens, refracts parallel
  {
    const points = [];
    points.push(new THREE.Vector3(0, objY, objZ));
    
    // Direction toward near focal point at (0, baseY, -f)
    // Line from (0, objY, objZ) toward (0, baseY, -f)
    // Find where this line hits z=0 (the lens)
    const dz1 = -f - objZ;
    const dy1 = baseY - objY;
    // At z=0: t = (0 - objZ) / dz1
    const t = (0 - objZ) / dz1;
    const lensHitY = objY + t * dy1;
    
    points.push(new THREE.Vector3(0, lensHitY, 0));
    
    // After lens, travels parallel to axis
    const targetZ = STATE.isRealImage ? Math.min(maxZ, Math.max(imageZ, 5)) : maxZ;
    points.push(new THREE.Vector3(0, lensHitY, targetZ));
    
    raysGroup.add(createRayLine(points, 0x00ffff));
    
    if (!STATE.isRealImage) {
      // Virtual extension backward
      const vPoints = [];
      vPoints.push(new THREE.Vector3(0, lensHitY, 0));
      vPoints.push(new THREE.Vector3(0, lensHitY, Math.max(minZ, imageZ)));
      const vLine = createRayLine(vPoints, 0x00ffff);
      vLine.material.transparent = true;
      vLine.material.opacity = 0.3;
      raysGroup.add(vLine);
    }
  }
  
  // ---- RAY 3: Central Ray (magenta) ----
  // Passes straight through lens center
  {
    const points = [];
    // Direction from object tip through lens center (0, baseY, 0)
    const dx = 0;
    const dy = baseY - objY;
    const dz = 0 - objZ;
    
    // Extend beyond lens
    const targetZ = STATE.isRealImage ? Math.min(maxZ, Math.max(imageZ + 1, 3)) : maxZ;
    const tFwd = targetZ / dz * (dz > 0 ? 1 : 1);
    
    points.push(new THREE.Vector3(0, objY, objZ));
    points.push(new THREE.Vector3(0, baseY, 0));
    
    // Continue in same direction
    const slope = dy / dz;
    const extendY = baseY + slope * targetZ;
    points.push(new THREE.Vector3(0, extendY, targetZ));
    
    raysGroup.add(createRayLine(points, 0xff00ff));
    
    if (!STATE.isRealImage) {
      // Virtual extension backward
      const vPoints = [];
      vPoints.push(new THREE.Vector3(0, baseY, 0));
      const backZ = Math.max(minZ, imageZ);
      const backY = baseY + slope * backZ;
      vPoints.push(new THREE.Vector3(0, backY, backZ));
      const vLine = createRayLine(vPoints, 0xff00ff);
      vLine.material.transparent = true;
      vLine.material.opacity = 0.3;
      raysGroup.add(vLine);
    }
  }
}

// ============ COMPUTE & UPDATE ============
function computeOptics() {
  STATE.objectDistance = -STATE.objectZ; // do is positive
  
  const f = STATE.focalLength;
  const doVal = STATE.objectDistance;
  
  const di = (f * doVal) / (doVal - f);
  STATE.imageDistance = di;
  STATE.magnification = -di / doVal;
  STATE.imageZ = di;
  STATE.imageHeight = STATE.magnification * STATE.objectHeight;
  STATE.isRealImage = di > 0;
}

function updateAll() {
  computeOptics();
  
  objectArrow.position.z = STATE.objectZ;
  objLabel.position.z = STATE.objectZ;
  
  updateImageArrow();
  updateRays();
  updateInfoPanel();
  
  // Update focal points
  const f = Math.abs(STATE.focalLength);
  focalPoint1.position.z = -f;
  focalPoint2.position.z = f;
  fLabel1.position.z = -f;
  fLabel2.position.z = f;
}

function updateInfoPanel() {
  const panel = document.getElementById('infoPanel');
  panel.style.display = STATE.infoPanelVisible ? 'block' : 'none';
  
  if (STATE.infoPanelVisible) {
    document.getElementById('infoDo').textContent = STATE.objectDistance.toFixed(2);
    document.getElementById('infoDi').textContent = isFinite(STATE.imageDistance) ? STATE.imageDistance.toFixed(2) : '∞';
    document.getElementById('infoM').textContent = isFinite(STATE.magnification) ? STATE.magnification.toFixed(2) : '∞';
    
    let typeStr = '';
    if (!isFinite(STATE.imageDistance)) {
      typeStr = 'At infinity';
    } else if (STATE.isRealImage) {
      typeStr = STATE.magnification < 0 ? 'Real, Inverted' : 'Real, Upright';
    } else {
      typeStr = STATE.magnification > 0 ? 'Virtual, Upright' : 'Virtual, Inverted';
    }
    document.getElementById('infoType').textContent = typeStr;
    document.getElementById('infoLens').textContent = STATE.lensType === 'convex' ? 'Convex (f=' + STATE.focalLength + ')' : 'Concave (f=' + STATE.focalLength + ')';
  }
}

// ============ DRAGGING ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let isDragging = false;
const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -0.5);

function onPointerDown(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  
  // Check intersection with object arrow
  const intersects = raycaster.intersectObjects(objectArrow.children, true);
  if (intersects.length > 0) {
    isDragging = true;
    controls.enabled = false;
  }
}

function onPointerMove(event) {
  if (!isDragging) return;
  
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  
  const intersection = new THREE.Vector3();
  raycaster.ray.intersectPlane(dragPlane, intersection);
  
  if (intersection) {
    let newZ = Math.max(-9, Math.min(-0.5, intersection.z));
    STATE.objectZ = newZ;
    updateAll();
  }
}

function onPointerUp() {
  if (isDragging) {
    isDragging = false;
    controls.enabled = true;
  }
}

renderer.domElement.addEventListener('pointerdown', onPointerDown);
renderer.domElement.addEventListener('pointermove', onPointerMove);
renderer.domElement.addEventListener('pointerup', onPointerUp);

// ============ BUTTONS ============
document.getElementById('btnToggleRays').addEventListener('click', () => {
  STATE.raysVisible = !STATE.raysVisible;
  updateRays();
});

document.getElementById('btnSwitchLens').addEventListener('click', () => {
  if (STATE.lensType === 'convex') {
    STATE.lensType = 'concave';
    STATE.focalLength = -3;
    createConcaveLens();
    lensLabel.material.map.dispose();
    const newLabel = createTextSprite('Lens', '#FF8844');
    lensLabel.material = newLabel.material;
  } else {
    STATE.lensType = 'convex';
    STATE.focalLength = 3;
    createConvexLens();
    lensLabel.material.map.dispose();
    const newLabel = createTextSprite('Lens', '#88CCFF');
    lensLabel.material = newLabel.material;
  }
  updateAll();
});

document.getElementById('btnReset').addEventListener('click', () => {
  STATE.objectZ = -6;
  STATE.lensType = 'convex';
  STATE.focalLength = 3;
  createConvexLens();
  lensLabel.material.map.dispose();
  const newLabel = createTextSprite('Lens', '#88CCFF');
  lensLabel.material = newLabel.material;
  updateAll();
});

// ============ KEYBOARD ============
document.addEventListener('keydown', (e) => {
  if (e.key === 'i' || e.key === 'I') {
    STATE.infoPanelVisible = !STATE.infoPanelVisible;
    updateInfoPanel();
  }
});

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ DECORATIONS ============
// Add some small decorative elements to make it feel like a diorama

// Small ruler on the table
const rulerGeo = new THREE.BoxGeometry(16, 0.02, 0.3);
const rulerMat = new THREE.MeshStandardMaterial({ color: 0xddcc88, roughness: 0.9 });
const ruler = new THREE.Mesh(rulerGeo, rulerMat);
ruler.position.set(0, 0.01, 3.2);
scene.add(ruler);

// Ruler markings
for (let i = -8; i <= 8; i++) {
  const markGeo = new THREE.BoxGeometry(0.02, 0.025, i % 2 === 0 ? 0.2 : 0.1);
  const markMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
  const mark = new THREE.Mesh(markGeo, markMat);
  mark.position.set(i, 0.02, 3.2);
  scene.add(mark);
}

// ============ ANIMATION LOOP ============
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

// Initial update
updateAll();
animate();

</script>
