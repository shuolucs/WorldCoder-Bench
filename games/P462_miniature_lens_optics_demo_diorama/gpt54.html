<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thin Lens Optics Demo</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #title {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
      z-index: 20;
      pointer-events: none;
    }

    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 8px;
      z-index: 20;
    }

    #controls button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: rgba(255,255,255,0.9);
      cursor: pointer;
      font-weight: bold;
    }

    #controls button:hover {
      background: white;
    }

    #infoPanel {
      position: absolute;
      right: 12px;
      bottom: 12px;
      min-width: 220px;
      color: white;
      background: rgba(0,0,0,0.65);
      padding: 12px 14px;
      border-radius: 10px;
      z-index: 20;
      line-height: 1.5;
      font-size: 14px;
    }

    .label {
      color: white;
      font-size: 16px;
      font-weight: bold;
      text-shadow: 0 0 6px black;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="title">Thin Lens Optics Demo</div>

    <div id="controls">
      <button id="toggleRaysBtn">Toggle Rays</button>
      <button id="switchLensBtn">Switch Lens</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div id="infoPanel">
      <div><strong>Object distance (do):</strong> <span id="doVal"></span></div>
      <div><strong>Image distance (di):</strong> <span id="diVal"></span></div>
      <div><strong>Magnification (m):</strong> <span id="mVal"></span></div>
      <div><strong>Image type:</strong> <span id="imgTypeVal"></span></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'https://unpkg.com/three@0.160.0/examples/jsm/renderers/CSS2DRenderer.js';

    const app = document.getElementById('app');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1b1b1f);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    app.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.7, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const table = new THREE.Mesh(
      new THREE.BoxGeometry(20, 0.3, 8),
      new THREE.MeshPhongMaterial({ color: '#8B4513' })
    );
    table.position.set(0, -0.15, 0);
    scene.add(table);

    const axis = new THREE.Mesh(
      new THREE.CylinderGeometry(0.03, 0.03, 18, 16),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    axis.rotation.x = Math.PI / 2;
    axis.position.set(0, 0.5, 0);
    scene.add(axis);

    const lensGroup = new THREE.Group();
    scene.add(lensGroup);

    function createLensMesh(color = '#88CCFF') {
      const group = new THREE.Group();

      const mat = new THREE.MeshPhongMaterial({
        color,
        transparent: true,
        opacity: 0.5,
        side: THREE.DoubleSide
      });

      const front = new THREE.Mesh(new THREE.SphereGeometry(1.15, 32, 32), mat);
      front.scale.set(0.22, 1.2, 1.2);
      front.position.x = 0.18;

      const back = new THREE.Mesh(new THREE.SphereGeometry(1.15, 32, 32), mat);
      back.scale.set(0.22, 1.2, 1.2);
      back.position.x = -0.18;

      group.add(front, back);
      group.position.set(0, 0.5, 0);
      return group;
    }

    let lensMesh = createLensMesh('#88CCFF');
    lensGroup.add(lensMesh);

    const focalMarkers = [];
    const focalLabels = [];

    function createFocalMarker(z) {
      const marker = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xff3333 })
      );
      marker.position.set(0, 0.5, z);

      const div = document.createElement('div');
      div.className = 'label';
      div.textContent = 'F';
      const label = new CSS2DObject(div);
      label.position.set(0, 0.25, 0);
      marker.add(label);

      scene.add(marker);
      focalMarkers.push(marker);
      focalLabels.push(label);
    }

    createFocalMarker(-3);
    createFocalMarker(3);

    function createArrow(color, baseY = 0.5) {
      const group = new THREE.Group();

      const shaftMat = new THREE.MeshPhongMaterial({ color, transparent: true, opacity: 1 });
      const headMat = new THREE.MeshPhongMaterial({ color, transparent: true, opacity: 1 });

      const shaft = new THREE.Mesh(
        new THREE.CylinderGeometry(0.08, 0.08, 1.1, 16),
        shaftMat
      );
      shaft.position.y = baseY + 0.55;

      const head = new THREE.Mesh(
        new THREE.ConeGeometry(0.18, 0.4, 16),
        headMat
      );
      head.position.y = baseY + 1.3;

      group.add(shaft, head);
      group.userData = { shaft, head, baseY };
      return group;
    }

    const OBJECT_HEIGHT = 1.5;

    const objectArrow = createArrow(0xff2222);
    objectArrow.position.set(0, 0, -6);
    scene.add(objectArrow);

    const imageArrow = createArrow(0x22ff66);
    scene.add(imageArrow);

    const dragHandle = new THREE.Mesh(
      new THREE.BoxGeometry(0.8, 1.8, 0.8),
      new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 })
    );
    dragHandle.position.set(0, 1.25, -6);
    scene.add(dragHandle);

    const rayGroup = new THREE.Group();
    scene.add(rayGroup);

    function makeLine(color) {
      const geom = new THREE.BufferGeometry();
      const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 1 });
      const line = new THREE.Line(geom, mat);
      rayGroup.add(line);
      return line;
    }

    const parallelRay1 = makeLine(0xffff00);
    const parallelRay2 = makeLine(0xffff00);

    const focalRay1 = makeLine(0x00ffff);
    const focalRay2 = makeLine(0x00ffff);

    const centralRay1 = makeLine(0xff00ff);
    const centralRay2 = makeLine(0xff00ff);

    const virtualExtensions = [
      makeLine(0xffff88),
      makeLine(0x88ffff),
      makeLine(0xff88ff)
    ];
    virtualExtensions.forEach(line => line.material.opacity = 0.45);

    const state = {
      objectZ: -6,
      focalLength: 3,
      raysVisible: true,
      lensType: 'convex',
      infoPanelVisible: true,
      objectHeight: OBJECT_HEIGHT
    };

    function setLinePoints(line, points) {
      line.geometry.dispose();
      line.geometry = new THREE.BufferGeometry().setFromPoints(points);
      line.visible = state.raysVisible;
    }

    function updateArrowGeometry(group, height, isVirtual = false) {
      const shaft = group.userData.shaft;
      const head = group.userData.head;
      const baseY = 0.5;

      const absH = Math.max(Math.abs(height), 0.001);
      const shaftHeight = Math.max(absH - 0.4, 0.2);

      shaft.geometry.dispose();
      shaft.geometry = new THREE.CylinderGeometry(0.08, 0.08, shaftHeight, 16);

      head.geometry.dispose();
      head.geometry = new THREE.ConeGeometry(0.18, 0.4, 16);

      if (height >= 0) {
        shaft.position.y = baseY + shaftHeight / 2;
        head.position.y = baseY + shaftHeight + 0.2;
        head.rotation.z = 0;
      } else {
        shaft.position.y = baseY - shaftHeight / 2;
        head.position.y = baseY - shaftHeight - 0.2;
        head.rotation.z = Math.PI;
      }

      const opacity = isVirtual ? 0.4 : 1.0;
      shaft.material.opacity = opacity;
      head.material.opacity = opacity;
      shaft.material.transparent = true;
      head.material.transparent = true;
    }

    function computeOptics() {
      const doVal = -state.objectZ;
      const f = state.focalLength;
      let di;

      const denom = (1 / f) - (1 / doVal);
      if (Math.abs(denom) < 1e-6) {
        di = 1e6;
      } else {
        di = 1 / denom;
      }

      const m = -di / doVal;
      const imageHeight = OBJECT_HEIGHT * m;
      const imageZ = di;
      const isRealImage = di > 0;

      return { doVal, di, m, imageHeight, imageZ, isRealImage };
    }

    function updateStateExposure(values) {
      window.__3D_STATE__ = {
        objectZ: state.objectZ,
        objectDistance: values.doVal,
        focalLength: state.focalLength,
        imageDistance: values.di,
        magnification: values.m,
        imageZ: values.imageZ,
        imageHeight: values.imageHeight,
        isRealImage: values.isRealImage,
        raysVisible: state.raysVisible,
        lensType: state.lensType,
        infoPanelVisible: state.infoPanelVisible,
        objectHeight: state.objectHeight
      };
    }

    function updateInfoPanel(values) {
      document.getElementById('doVal').textContent = values.doVal.toFixed(2);
      document.getElementById('diVal').textContent = Math.abs(values.di) > 1e5 ? '∞' : values.di.toFixed(2);
      document.getElementById('mVal').textContent = Math.abs(values.m) > 1e5 ? '∞' : values.m.toFixed(2);
      document.getElementById('imgTypeVal').textContent = values.isRealImage ? 'Real' : 'Virtual';
      document.getElementById('infoPanel').style.display = state.infoPanelVisible ? 'block' : 'none';
    }

    function updateLensAppearance() {
      lensGroup.remove(lensMesh);
      lensMesh = createLensMesh(state.lensType === 'convex' ? '#88CCFF' : '#FF8844');
      if (state.lensType === 'concave') {
        lensMesh.scale.x = 0.8;
        lensMesh.children[0].scale.set(0.12, 1.2, 1.2);
        lensMesh.children[1].scale.set(0.12, 1.2, 1.2);
      }
      lensGroup.add(lensMesh);

      focalMarkers[0].position.set(0, 0.5, -Math.abs(state.focalLength));
      focalMarkers[1].position.set(0, 0.5, Math.abs(state.focalLength));
    }

    function updateRays(values) {
      const tip = new THREE.Vector3(0, 0.5 + OBJECT_HEIGHT, state.objectZ);
      const lensPlanePoint = new THREE.Vector3(0, tip.y, 0);
      const lensCenter = new THREE.Vector3(0, 0.5, 0);
      const imageTip = new THREE.Vector3(0, 0.5 + values.imageHeight, values.imageZ);

      const farFocal = new THREE.Vector3(0, 0.5, state.focalLength > 0 ? Math.abs(state.focalLength) : -Math.abs(state.focalLength));
      const nearFocal = new THREE.Vector3(0, 0.5, state.focalLength > 0 ? -Math.abs(state.focalLength) : Math.abs(state.focalLength));

      const zEndRight = 9;
      const zEndLeft = -9;

      // Parallel ray
      setLinePoints(parallelRay1, [tip, lensPlanePoint]);

      let p2End;
      if (state.focalLength > 0) {
        p2End = intersectYAtZ(lensPlanePoint, farFocal, zEndRight);
      } else {
        p2End = new THREE.Vector3(0, tip.y, zEndRight);
      }
      setLinePoints(parallelRay2, [lensPlanePoint, p2End]);

      // Focal ray
      const focalHit = new THREE.Vector3(0, tip.y, 0);
      setLinePoints(focalRay1, [tip, nearFocal.clone().setX(0).setY(0.5), focalHit]);

      let f2End;
      if (state.focalLength > 0) {
        f2End = new THREE.Vector3(0, tip.y, zEndRight);
      } else {
        f2End = intersectYAtZ(focalHit, farFocal, zEndRight);
      }
      setLinePoints(focalRay2, [focalHit, f2End]);

      // Central ray
      const centralEnd = intersectYAtZ(tip, lensCenter, values.isRealImage ? zEndRight : zEndLeft);
      setLinePoints(centralRay1, [tip, lensCenter]);
      setLinePoints(centralRay2, [lensCenter, centralEnd]);

      // Virtual extensions
      virtualExtensions.forEach(v => v.visible = false);

      if (!values.isRealImage) {
        const ext1 = intersectYAtZ(lensPlanePoint, state.focalLength > 0 ? farFocal : new THREE.Vector3(0, tip.y, zEndRight), zEndLeft);
        const ext2 = intersectYAtZ(focalHit, state.focalLength > 0 ? new THREE.Vector3(0, tip.y, zEndRight) : farFocal, zEndLeft);
        const ext3 = intersectYAtZ(lensCenter, centralEnd, zEndLeft);

        setLinePoints(virtualExtensions[0], [lensPlanePoint, ext1]);
        setLinePoints(virtualExtensions[1], [focalHit, ext2]);
        setLinePoints(virtualExtensions[2], [lensCenter, ext3]);
        virtualExtensions.forEach(v => v.visible = state.raysVisible);
      }
    }

    function intersectYAtZ(p1, p2, targetZ) {
      const dz = p2.z - p1.z;
      if (Math.abs(dz) < 1e-6) return new THREE.Vector3(p1.x, p1.y, targetZ);
      const t = (targetZ - p1.z) / dz;
      return new THREE.Vector3(
        p1.x + (p2.x - p1.x) * t,
        p1.y + (p2.y - p1.y) * t,
        targetZ
      );
    }

    function updateScene() {
      objectArrow.position.z = state.objectZ;
      dragHandle.position.z = state.objectZ;

      updateArrowGeometry(objectArrow, OBJECT_HEIGHT, false);

      const values = computeOptics();

      imageArrow.position.set(0, 0, values.imageZ);
      updateArrowGeometry(imageArrow, values.imageHeight, !values.isRealImage);

      updateRays(values);
      updateInfoPanel(values);
      updateStateExposure(values);
    }

    updateLensAppearance();
    updateScene();

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const dragPlane = new THREE.Plane(new THREE.Vector3(1, 0, 0), 0);
    const dragPoint = new THREE.Vector3();
    let dragging = false;

    function getMouseNDC(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      getMouseNDC(event);
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(dragHandle);
      if (hits.length > 0) {
        dragging = true;
        controls.enabled = false;
      }
    });

    window.addEventListener('pointermove', (event) => {
      if (!dragging) return;
      getMouseNDC(event);
      raycaster.setFromCamera(mouse, camera);

      if (raycaster.ray.intersectPlane(dragPlane, dragPoint)) {
        state.objectZ = THREE.MathUtils.clamp(dragPoint.z, -9, -0.5);
        updateScene();
      }
    });

    window.addEventListener('pointerup', () => {
      dragging = false;
      controls.enabled = true;
    });

    document.getElementById('toggleRaysBtn').addEventListener('click', () => {
      state.raysVisible = !state.raysVisible;
      rayGroup.children.forEach(c => c.visible = state.raysVisible);
      updateScene();
    });

    document.getElementById('switchLensBtn').addEventListener('click', () => {
      if (state.lensType === 'convex') {
        state.lensType = 'concave';
        state.focalLength = -3;
      } else {
        state.lensType = 'convex';
        state.focalLength = 3;
      }
      updateLensAppearance();
      updateScene();
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      state.objectZ = -6;
      state.focalLength = 3;
      state.lensType = 'convex';
      state.raysVisible = true;
      state.infoPanelVisible = true;
      updateLensAppearance();
      updateScene();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'i') {
        state.infoPanelVisible = !state.infoPanelVisible;
        updateScene();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
