<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thin Lens Optics Demo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #title {
            position: absolute;
            top: 15px;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            pointer-events: auto;
        }
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        button {
            background: rgba(40, 40, 40, 0.8);
            color: white;
            border: 1px solid #666;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            backdrop-filter: blur(4px);
        }
        button:hover {
            background: rgba(80, 80, 80, 0.9);
        }
        #info-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            color: #ddd;
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 200px;
            backdrop-filter: blur(4px);
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        .info-label {
            font-weight: bold;
            color: #aaa;
        }
        .info-value {
            font-family: monospace;
            font-size: 15px;
            color: #fff;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #888;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="title">Thin Lens Optics Demo</div>
        
        <div id="controls">
            <button id="btn-rays">Toggle Rays</button>
            <button id="btn-lens">Switch Lens</button>
            <button id="btn-reset">Reset</button>
        </div>

        <div id="info-panel">
            <div class="info-row">
                <span class="info-label">Object Dist (do):</span>
                <span class="info-value" id="val-do">6.00</span>
            </div>
            <div class="info-row">
                <span class="info-label">Image Dist (di):</span>
                <span class="info-value" id="val-di">6.00</span>
            </div>
            <div class="info-row">
                <span class="info-label">Magnification (m):</span>
                <span class="info-value" id="val-m">-1.00</span>
            </div>
            <div class="info-row">
                <span class="info-label">Image Type:</span>
                <span class="info-value" id="val-type">Real</span>
            </div>
        </div>

        <div id="instructions">
            Drag the red arrow to move the object.<br>
            Press 'I' to toggle info panel.
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            objectZ: -6,
            objectDistance: 6,
            focalLength: 3,
            imageDistance: 6,
            magnification: -1,
            imageZ: 6,
            imageHeight: -1.5,
            isRealImage: true,
            raysVisible: true,
            lensType: 'convex',
            infoPanelVisible: true,
            objectHeight: 1.5
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below table

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- Environment ---
        // Tabletop
        const tableGeo = new THREE.BoxGeometry(20, 0.3, 8);
        const tableMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
        const table = new THREE.Mesh(tableGeo, tableMat);
        table.position.y = -0.15;
        scene.add(table);

        // Principal Axis
        const axisGeo = new THREE.CylinderGeometry(0.02, 0.02, 18, 8);
        const axisMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const axis = new THREE.Mesh(axisGeo, axisMat);
        axis.rotation.x = Math.PI / 2;
        axis.position.y = 0.5;
        scene.add(axis);

        // --- Optical Components ---
        // Lens Geometries
        const convexGeo = new THREE.SphereGeometry(1.5, 32, 16);
        convexGeo.scale(1, 1, 0.1);
        const concaveGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.2, 32);
        concaveGeo.rotateX(Math.PI / 2);

        const lensMat = new THREE.MeshPhysicalMaterial({
            color: 0x88CCFF,
            transparent: true,
            opacity: 0.5,
            roughness: 0.1,
            transmission: 0.9,
            side: THREE.DoubleSide
        });
        const lensMesh = new THREE.Mesh(convexGeo, lensMat);
        lensMesh.position.set(0, 0.5, 0);
        scene.add(lensMesh);

        // Focal Points
        const focalGeo = new THREE.SphereGeometry(0.1, 16, 16);
        const focalMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const f1 = new THREE.Mesh(focalGeo, focalMat);
        f1.position.set(0, 0.5, 3);
        scene.add(f1);
        const f2 = new THREE.Mesh(focalGeo, focalMat);
        f2.position.set(0, 0.5, -3);
        scene.add(f2);

        // Sprite Labels for Focal Points
        function createTextSprite(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ff4444';
            ctx.font = 'bold 40px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 32, 32);
            const tex = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: tex, depthTest: false });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(0.8, 0.8, 1);
            return sprite;
        }
        const labelF1 = createTextSprite('F');
        labelF1.position.set(0, 0.9, 3);
        scene.add(labelF1);
        const labelF2 = createTextSprite('F');
        labelF2.position.set(0, 0.9, -3);
        scene.add(labelF2);

        // Arrows
        function createArrow(colorHex) {
            const group = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({ color: colorHex });
            
            const shaftGeo = new THREE.CylinderGeometry(0.05, 0.05, 1.2, 16);
            const shaft = new THREE.Mesh(shaftGeo, mat);
            shaft.position.y = 0.6; // Base at 0, top at 1.2
            
            const headGeo = new THREE.ConeGeometry(0.15, 0.3, 16);
            const head = new THREE.Mesh(headGeo, mat);
            head.position.y = 1.35; // Base at 1.2, top at 1.5
            
            group.add(shaft);
            group.add(head);
            return group;
        }

        const objArrow = createArrow(0xff0000);
        objArrow.position.set(0, 0.5, state.objectZ);
        scene.add(objArrow);

        const imgArrow = createArrow(0x00ff00);
        scene.add(imgArrow);

        // --- Ray Tracing Visualization ---
        const raysGroup = new THREE.Group();
        scene.add(raysGroup);

        const matRay1 = new THREE.LineBasicMaterial({ color: 0xffff00, linewidth: 2 }); // Parallel
        const matRay2 = new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 2 }); // Focal
        const matRay3 = new THREE.LineBasicMaterial({ color: 0xff00ff, linewidth: 2 }); // Central
        
        const matDash1 = new THREE.LineDashedMaterial({ color: 0xffff00, dashSize: 0.2, gapSize: 0.1 });
        const matDash2 = new THREE.LineDashedMaterial({ color: 0x00ffff, dashSize: 0.2, gapSize: 0.1 });
        const matDash3 = new THREE.LineDashedMaterial({ color: 0xff00ff, dashSize: 0.2, gapSize: 0.1 });

        const ray1 = new THREE.Line(new THREE.BufferGeometry(), matRay1);
        const ray2 = new THREE.Line(new THREE.BufferGeometry(), matRay2);
        const ray3 = new THREE.Line(new THREE.BufferGeometry(), matRay3);
        
        const dash1 = new THREE.Line(new THREE.BufferGeometry(), matDash1);
        const dash2 = new THREE.Line(new THREE.BufferGeometry(), matDash2);
        const dash3 = new THREE.Line(new THREE.BufferGeometry(), matDash3);

        raysGroup.add(ray1, ray2, ray3, dash1, dash2, dash3);

        // --- Logic & Updates ---
        function updateOptics() {
            state.objectDistance = -state.objectZ;
            const do_ = state.objectDistance;
            const f = state.focalLength;

            // Thin lens equation
            let di;
            if (Math.abs(do_ - Math.abs(f)) < 0.001) {
                di = 10000 * Math.sign(f); // Avoid infinity
            } else {
                di = 1 / (1/f - 1/do_);
            }

            state.imageDistance = di;
            state.magnification = -di / do_;
            state.imageZ = di;
            state.isRealImage = di > 0;

            // Clamp magnification for rendering to avoid giant meshes
            let renderM = state.magnification;
            if (Math.abs(renderM) > 20) renderM = 20 * Math.sign(renderM);
            state.imageHeight = state.objectHeight * renderM;

            // Update Object
            objArrow.position.z = state.objectZ;

            // Update Image
            imgArrow.position.z = state.imageZ;
            if (renderM > 0) {
                imgArrow.rotation.x = 0;
                imgArrow.scale.y = renderM;
            } else {
                imgArrow.rotation.x = Math.PI;
                imgArrow.scale.y = -renderM;
            }

            // Image styling (Virtual vs Real)
            imgArrow.children.forEach(child => {
                if (state.isRealImage) {
                    child.material.transparent = false;
                    child.material.opacity = 1.0;
                } else {
                    child.material.transparent = true;
                    child.material.opacity = 0.4;
                }
            });

            updateRays();
            updateUI();
        }

        function updateRays() {
            const P_obj = new THREE.Vector3(0, 0.5 + state.objectHeight, state.objectZ);
            const P_img = new THREE.Vector3(0, 0.5 + state.imageHeight, state.imageZ);

            // Ray 1: Parallel -> Focal
            const L1 = new THREE.Vector3(0, P_obj.y, 0);
            let dir1;
            if (state.focalLength > 0) {
                dir1 = new THREE.Vector3(0, 0.5, state.focalLength).sub(L1).normalize();
            } else {
                dir1 = new THREE.Vector3().copy(L1).sub(new THREE.Vector3(0, 0.5, state.focalLength)).normalize();
            }
            const End1 = new THREE.Vector3().copy(L1).add(dir1.clone().multiplyScalar(20));

            // Ray 2: Focal -> Parallel
            let dir2_in;
            if (state.focalLength > 0) {
                dir2_in = new THREE.Vector3(0, 0.5, -state.focalLength).sub(P_obj).normalize();
            } else {
                dir2_in = new THREE.Vector3(0, 0.5, -state.focalLength).sub(P_obj).normalize();
            }
            const t2 = (0 - P_obj.z) / dir2_in.z;
            const L2 = new THREE.Vector3().copy(P_obj).add(dir2_in.clone().multiplyScalar(t2));
            const dir2_out = new THREE.Vector3(0, 0, 1);
            const End2 = new THREE.Vector3().copy(L2).add(dir2_out.clone().multiplyScalar(20));

            // Ray 3: Central
            const L3 = new THREE.Vector3(0, 0.5, 0);
            const dir3 = new THREE.Vector3().copy(L3).sub(P_obj).normalize();
            const End3 = new THREE.Vector3().copy(L3).add(dir3.clone().multiplyScalar(20));

            // Set Geometries
            ray1.geometry.setFromPoints([P_obj, L1, End1]);
            ray2.geometry.setFromPoints([P_obj, L2, End2]);
            ray3.geometry.setFromPoints([P_obj, L3, End3]);

            // Virtual Extensions
            if (!state.isRealImage) {
                dash1.geometry.setFromPoints([L1, P_img]);
                dash2.geometry.setFromPoints([L2, P_img]);
                dash3.geometry.setFromPoints([L3, P_img]);
                
                dash1.visible = state.raysVisible;
                dash2.visible = state.raysVisible;
                dash3.visible = state.raysVisible;
                
                dash1.computeLineDistances();
                dash2.computeLineDistances();
                dash3.computeLineDistances();
            } else {
                dash1.visible = false;
                dash2.visible = false;
                dash3.visible = false;
            }

            ray1.visible = state.raysVisible;
            ray2.visible = state.raysVisible;
            ray3.visible = state.raysVisible;
        }

        function updateUI() {
            document.getElementById('val-do').innerText = state.objectDistance.toFixed(2);
            document.getElementById('val-di').innerText = Math.abs(state.imageDistance) > 100 ? '∞' : state.imageDistance.toFixed(2);
            document.getElementById('val-m').innerText = Math.abs(state.magnification) > 100 ? '∞' : state.magnification.toFixed(2);
            
            let typeStr = state.isRealImage ? 'Real' : 'Virtual';
            typeStr += state.magnification < 0 ? ' / Inverted' : ' / Upright';
            document.getElementById('val-type').innerText = typeStr;

            document.getElementById('info-panel').style.display = state.infoPanelVisible ? 'flex' : 'none';
        }

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const dragPlane = new THREE.Plane(new THREE.Vector3(1, 0, 0), 0);
        let isDragging = false;

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(objArrow, true);
            
            if (intersects.length > 0) {
                isDragging = true;
                controls.enabled = false;
                document.body.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) {
                // Hover effect
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(objArrow, true);
                document.body.style.cursor = intersects.length > 0 ? 'grab' : 'default';
                return;
            }

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const target = new THREE.Vector3();
            raycaster.ray.intersectPlane(dragPlane, target);
            
            if (target) {
                let z = target.z;
                z = Math.max(-9, Math.min(-0.5, z));
                state.objectZ = z;
                updateOptics();
            }
        });

        window.addEventListener('pointerup', () => {
            isDragging = false;
            controls.enabled = true;
            document.body.style.cursor = 'default';
        });

        // --- UI Events ---
        document.getElementById('btn-rays').addEventListener('click', () => {
            state.raysVisible = !state.raysVisible;
            updateOptics();
        });

        document.getElementById('btn-lens').addEventListener('click', () => {
            if (state.lensType === 'convex') {
                state.lensType = 'concave';
                state.focalLength = -3;
                lensMesh.geometry = concaveGeo;
                lensMesh.material.color.setHex(0xFF8844);
            } else {
                state.lensType = 'convex';
                state.focalLength = 3;
                lensMesh.geometry = convexGeo;
                lensMesh.material.color.setHex(0x88CCFF);
            }
            updateOptics();
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            state.objectZ = -6;
            state.lensType = 'convex';
            state.focalLength = 3;
            lensMesh.geometry = convexGeo;
            lensMesh.material.color.setHex(0x88CCFF);
            updateOptics();
            
            camera.position.set(0, 5, 12);
            camera.lookAt(0, 0, 0);
            controls.target.set(0, 0, 0);
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'i') {
                state.infoPanelVisible = !state.infoPanelVisible;
                updateUI();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Initialization ---
        updateOptics();

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

    </script>
</body>
</html>
