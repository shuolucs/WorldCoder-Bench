<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Magnetic Levitation - Michelle</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #05080d;
      font-family: Arial, Helvetica, sans-serif;
      color: #dffcff;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 12px 14px;
      background: rgba(0, 10, 18, 0.55);
      border: 1px solid rgba(0, 255, 255, 0.25);
      border-radius: 10px;
      backdrop-filter: blur(8px);
      z-index: 10;
      min-width: 220px;
      box-shadow: 0 0 18px rgba(0, 255, 255, 0.12);
    }

    #hud div {
      margin: 4px 0;
      font-size: 14px;
      letter-spacing: 0.2px;
    }

    #pulseBtn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      padding: 10px 16px;
      background: rgba(0, 20, 30, 0.65);
      color: #86ffff;
      border: 2px solid #00ffff;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 1px;
      box-shadow: 0 0 16px rgba(0, 255, 255, 0.25);
      transition: transform 0.1s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    #pulseBtn:hover {
      background: rgba(0, 40, 55, 0.75);
      box-shadow: 0 0 24px rgba(0, 255, 255, 0.45);
    }

    #pulseBtn:active {
      transform: scale(0.97);
    }

    #info {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      padding: 8px 10px;
      color: #8fd7df;
      background: rgba(0, 0, 0, 0.28);
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="hudMagnet">Magnet: 40.0 N·m²</div>
    <div id="hudPosY">Height: 2.00 m</div>
    <div id="hudVelY">Velocity: 0.00 m/s</div>
    <div id="hudState">State: running</div>
    <div id="hudGravity">Gravity: -9.81</div>
  </div>

  <button id="pulseBtn">PULSE</button>

  <div id="info">
    ↑ / W: magnet up &nbsp; ↓ / S: magnet down &nbsp; Space: pause<br />
    R: reset &nbsp; G: toggle gravity &nbsp; P: particles on/off<br />
    Click Michelle to push her downward
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05080d);
    scene.fog = new THREE.Fog(0x05080d, 8, 18);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 2, 6);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.4, 0);

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambient);

    const blueLight = new THREE.PointLight(0x2f7bff, 1.5, 20);
    blueLight.position.set(0, 5, 3);
    scene.add(blueLight);

    const cyanLight = new THREE.PointLight(0x00ffff, 1.0, 20);
    cyanLight.position.set(0, -3, 0);
    scene.add(cyanLight);

    // Optional subtle floor glow
    const grid = new THREE.GridHelper(18, 18, 0x113344, 0x0a1b28);
    grid.position.y = -1.001;
    grid.material.transparent = true;
    grid.material.opacity = 0.18;
    scene.add(grid);

    // Platform
    const platform = new THREE.Mesh(
      new THREE.CylinderGeometry(1.5, 1.5, 0.2, 64),
      new THREE.MeshStandardMaterial({
        color: 0x2a2d33,
        metalness: 0.9,
        roughness: 0.1
      })
    );
    platform.position.y = -1;
    scene.add(platform);

    // Glowing ring
    const ringMaterial = new THREE.MeshStandardMaterial({
      color: 0x00d8ff,
      emissive: 0x00ffff,
      emissiveIntensity: 1.5,
      metalness: 0.5,
      roughness: 0.2
    });

    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(1.2, 0.05, 16, 100),
      ringMaterial
    );
    ring.rotation.x = Math.PI / 2;
    ring.position.y = -0.8;
    scene.add(ring);

    // Physics constants/state
    const dt = 1 / 60;
    const mass = 2.0;
    const platformSurfaceY = -0.9;
    const minY = -0.7;
    const maxY = 5.0;

    let gravity = -9.81;
    let magnetStrength = 40.0;
    let verticalVelocity = 0.0;
    let isPaused = false;
    let pulseActive = false;
    let pulseRestoreStrength = 40.0;
    let simulationFrames = 0;
    let modelScale = 0.015;

    // Michelle model
    let michelle = null;
    let modelLoaded = false;

    const levitationGroup = new THREE.Group();
    scene.add(levitationGroup);

    // Particles
    const particleGroup = new THREE.Group();
    scene.add(particleGroup);

    const particleMaterial = new THREE.MeshBasicMaterial({
      color: 0x66ffff,
      transparent: true,
      opacity: 0.85
    });

    const particleGeometry = new THREE.SphereGeometry(0.03, 10, 10);
    const particles = [];
    const particleCount = 50;

    for (let i = 0; i < particleCount; i++) {
      const p = new THREE.Mesh(particleGeometry, particleMaterial.clone());
      p.userData = {
        angle: Math.random() * Math.PI * 2,
        radius: 0.6 + Math.random() * 0.9,
        speed: 0.002 + Math.random() * 0.006,
        yOffset: -0.2 + Math.random() * 1.8,
        phase: Math.random() * Math.PI * 2
      };
      particles.push(p);
      particleGroup.add(p);
    }

    let particlesVisible = true;

    // HUD refs
    const hudMagnet = document.getElementById("hudMagnet");
    const hudPosY = document.getElementById("hudPosY");
    const hudVelY = document.getElementById("hudVelY");
    const hudState = document.getElementById("hudState");
    const hudGravity = document.getElementById("hudGravity");
    const pulseBtn = document.getElementById("pulseBtn");

    // Exposed state
    window.__3D_STATE__ = {
      modelLoaded: false,
      posY: 2.00,
      velY: 0.00,
      magnetStrength: 40.0,
      isPaused: false,
      gravity: -9.81,
      particlesVisible: true,
      pulseActive: false,
      frameCount: 0,
      equilibriumReached: false,
      modelScale: modelScale
    };

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function updateHUD(posYValue) {
      hudMagnet.textContent = `Magnet: ${magnetStrength.toFixed(1)} N·m²`;
      hudPosY.textContent = `Height: ${posYValue.toFixed(2)} m`;
      hudVelY.textContent = `Velocity: ${verticalVelocity.toFixed(2)} m/s`;
      hudState.textContent = `State: ${isPaused ? "paused" : "running"}`;
      hudGravity.textContent = `Gravity: ${gravity.toFixed(2)}`;
    }

    function updateState(posYValue) {
      window.__3D_STATE__.modelLoaded = modelLoaded;
      window.__3D_STATE__.posY = Number(posYValue.toFixed(2));
      window.__3D_STATE__.velY = Number(verticalVelocity.toFixed(2));
      window.__3D_STATE__.magnetStrength = magnetStrength;
      window.__3D_STATE__.isPaused = isPaused;
      window.__3D_STATE__.gravity = gravity;
      window.__3D_STATE__.particlesVisible = particlesVisible;
      window.__3D_STATE__.pulseActive = pulseActive;
      window.__3D_STATE__.frameCount += 1;
      window.__3D_STATE__.equilibriumReached =
        !isPaused &&
        simulationFrames > 120 &&
        Math.abs(verticalVelocity) < 0.05;
      window.__3D_STATE__.modelScale = modelScale;
    }

    function setMichelleY(y) {
      if (michelle) {
        michelle.position.y = y;
      } else {
        levitationGroup.position.y = y;
      }
    }

    function getMichelleY() {
      if (michelle) return michelle.position.y;
      return levitationGroup.position.y;
    }

    function resetSimulation() {
      verticalVelocity = 0;
      magnetStrength = 40.0;
      gravity = -9.81;
      pulseActive = false;
      pulseRestoreStrength = 40.0;
      simulationFrames = 0;
      setMichelleY(2.0);
      ringMaterial.emissiveIntensity = 1.5;
      updateHUD(getMichelleY());
    }

    function triggerPulse() {
      if (pulseActive) return;
      pulseActive = true;
      pulseRestoreStrength = magnetStrength;
      magnetStrength = clamp(magnetStrength * 3.0, 0, 100);

      setTimeout(() => {
        magnetStrength = clamp(pulseRestoreStrength, 0, 100);
        pulseActive = false;
      }, 1000);
    }

    pulseBtn.addEventListener("click", triggerPulse);

    // Load Michelle.glb
    const loader = new GLTFLoader();
    loader.load(
      "Michelle.glb",
      (gltf) => {
        michelle = gltf.scene;

        const box = new THREE.Box3().setFromObject(michelle);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        michelle.position.sub(center);

        michelle.scale.setScalar(modelScale);

        // Recompute after scale/centering to place feet roughly above levitation zone
        const scaledBox = new THREE.Box3().setFromObject(michelle);
        const scaledSize = new THREE.Vector3();
        const scaledCenter = new THREE.Vector3();
        scaledBox.getSize(scaledSize);
        scaledBox.getCenter(scaledCenter);

        michelle.position.x -= scaledCenter.x;
        michelle.position.z -= scaledCenter.z;

        // Put the model's center at the levitating physics y position
        michelle.position.y = 2.0;

        levitationGroup.add(michelle);

        michelle.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = false;
            obj.receiveShadow = false;
            if (obj.material) {
              obj.material.side = THREE.FrontSide;
            }
          }
        });

        modelLoaded = true;
        updateHUD(getMichelleY());
      },
      undefined,
      (err) => {
        console.warn("Failed to load Michelle.glb:", err);

        // Fallback placeholder if model isn't available
        const fallback = new THREE.Mesh(
          new THREE.CapsuleGeometry(0.35, 1.1, 8, 16),
          new THREE.MeshStandardMaterial({
            color: 0xa8b8c8,
            metalness: 0.15,
            roughness: 0.6,
            emissive: 0x003344,
            emissiveIntensity: 0.3
          })
        );
        fallback.position.y = 2.0;
        levitationGroup.add(fallback);
        michelle = fallback;
        modelLoaded = false;
      }
    );

    // Raycaster for click interaction
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    window.addEventListener("pointerdown", (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      if (!michelle) return;

      const hitTargets = [];
      michelle.traverse?.((obj) => {
        if (obj.isMesh) hitTargets.push(obj);
      });

      if (michelle.isMesh) hitTargets.push(michelle);

      const intersects = raycaster.intersectObjects(hitTargets, true);
      if (intersects.length > 0) {
        verticalVelocity += -3.0;
      }
    });

    // Keyboard controls
    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (e.key === "ArrowUp" || key === "w") {
        magnetStrength = clamp(magnetStrength + 2.0, 0, 100);
      } else if (e.key === "ArrowDown" || key === "s") {
        magnetStrength = clamp(magnetStrength - 2.0, 0, 100);
      } else if (e.code === "Space") {
        e.preventDefault();
        isPaused = !isPaused;
      } else if (key === "r") {
        resetSimulation();
      } else if (key === "g") {
        gravity = gravity === 0 ? -9.81 : 0;
      } else if (key === "p") {
        particlesVisible = !particlesVisible;
        particleGroup.visible = particlesVisible;
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const time = clock.getElapsedTime();
      controls.update();

      // Ring pulse based on magnet strength
      const strengthNorm = magnetStrength / 100;
      ringMaterial.emissiveIntensity =
        1.2 + strengthNorm * 2.5 + Math.sin(time * 4.0) * (0.15 + strengthNorm * 0.35);
      ring.scale.setScalar(1 + Math.sin(time * 3.5) * 0.01 + strengthNorm * 0.03);

      let y = getMichelleY();

      if (michelle && !isPaused) {
        const distance = Math.max(0.1, y - platformSurfaceY);
        const fMag = magnetStrength / (distance * distance);
        const fGravity = mass * gravity;
        const acceleration = (fMag + fGravity) / mass;

        // semi-implicit Euler
        verticalVelocity += acceleration * dt;
        verticalVelocity *= 0.95;
        y += verticalVelocity * dt;

        if (y < minY) {
          y = minY;
          if (verticalVelocity < 0) verticalVelocity = 0;
        }

        if (y > maxY) {
          y = maxY;
          if (verticalVelocity > 0) verticalVelocity = 0;
        }

        setMichelleY(y);
        simulationFrames++;
      }

      // Particle field animation
      if (michelle) {
        const baseY = getMichelleY();
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          const d = p.userData;
          d.angle += d.speed * (1 + strengthNorm * 2.0);

          const wobble = Math.sin(time * 2.0 + d.phase) * 0.12;
          p.position.set(
            Math.cos(d.angle) * (d.radius + wobble),
            baseY + d.yOffset + Math.sin(time * 1.5 + d.phase) * 0.08,
            Math.sin(d.angle) * (d.radius + wobble)
          );

          const s = 0.7 + 0.6 * Math.sin(time * 3.0 + d.phase);
          p.scale.setScalar(0.7 + 0.3 * s);
          p.material.opacity = 0.35 + 0.5 * Math.abs(Math.sin(time * 2.5 + d.phase));
        }
      }

      y = getMichelleY();
      updateHUD(y);
      updateState(y);

      renderer.render(scene, camera);
    }

    resetSimulation();
    animate();
  </script>
</body>
</html>
