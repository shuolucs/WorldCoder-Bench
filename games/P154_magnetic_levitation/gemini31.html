<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Levitation Physics Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 1px solid #0ff;
            border-radius: 5px;
            pointer-events: none;
            user-select: none;
        }
        #hud div {
            margin-bottom: 5px;
        }
        #pulseBtn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 255, 255, 0.1);
            color: #0ff;
            border: 2px solid #0ff;
            padding: 10px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            text-transform: uppercase;
            pointer-events: auto;
            transition: all 0.2s;
        }
        #pulseBtn:hover {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 15px #0ff;
        }
        #pulseBtn:active {
            background: rgba(0, 255, 255, 0.6);
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div id="hudMagnet">Magnet: 40.0 N·m²</div>
        <div id="hudPosY">Height: 2.00 m</div>
        <div id="hudVelY">Velocity: 0.00 m/s</div>
        <div id="hudState">State: running</div>
        <div id="hudGravity">Gravity: -9.81</div>
    </div>
    <button id="pulseBtn">PULSE</button>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            modelLoaded: false,
            posY: 2.0,
            velY: 0.0,
            magnetStrength: 40.0,
            isPaused: false,
            gravity: -9.81,
            particlesVisible: true,
            pulseActive: false,
            frameCount: 0,
            equilibriumReached: false,
            modelScale: 0.015
        };

        // Physics Constants & Variables
        const mass = 2.0;
        const dt = 1 / 60;
        const platformSurfaceY = -0.9;
        let y = 2.0;
        let vy = 0.0;

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const blueLight = new THREE.PointLight(0x0000ff, 1.5, 20);
        blueLight.position.set(0, 5, 3);
        scene.add(blueLight);

        const cyanLight = new THREE.PointLight(0x00ffff, 1.0, 10);
        cyanLight.position.set(0, -3, 0);
        scene.add(cyanLight);

        // Platform
        const platformGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.2, 32);
        const platformMat = new THREE.MeshStandardMaterial({
            color: 0x222222,
            metalness: 0.9,
            roughness: 0.1
        });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = -1;
        scene.add(platform);

        // Glowing Ring
        const ringGeo = new THREE.TorusGeometry(1.2, 0.05, 16, 64);
        const ringMat = new THREE.MeshStandardMaterial({
            color: 0x000000,
            emissive: 0x00ffff,
            emissiveIntensity: 1.0,
            metalness: 0.5,
            roughness: 0.2
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.y = -0.8;
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);

        // Particles
        const particlesGroup = new THREE.Group();
        const particleGeo = new THREE.SphereGeometry(0.02, 8, 8);
        const particleMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
        
        for (let i = 0; i < 50; i++) {
            const particle = new THREE.Mesh(particleGeo, particleMat);
            const radius = 0.5 + Math.random() * 1.0;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            
            particle.position.x = radius * Math.sin(phi) * Math.cos(theta);
            particle.position.y = radius * Math.cos(phi);
            particle.position.z = radius * Math.sin(phi) * Math.sin(theta);
            
            // Store orbital parameters
            particle.userData = {
                radius: radius,
                theta: theta,
                phi: phi,
                speed: 0.01 + Math.random() * 0.02
            };
            
            particlesGroup.add(particle);
        }
        scene.add(particlesGroup);

        // Load Model
        let michelleModel = null;
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Michelle.glb',
            (gltf) => {
                michelleModel = gltf.scene;
                michelleModel.scale.set(window.__3D_STATE__.modelScale, window.__3D_STATE__.modelScale, window.__3D_STATE__.modelScale);
                
                // Center model
                const box = new THREE.Box3().setFromObject(michelleModel);
                const center = box.getCenter(new THREE.Vector3());
                michelleModel.position.x = -center.x;
                michelleModel.position.z = -center.z;
                
                // Wrap in a group to handle physics Y position easily
                const wrapper = new THREE.Group();
                wrapper.add(michelleModel);
                wrapper.position.y = y;
                scene.add(wrapper);
                
                michelleModel = wrapper; // Reassign to wrapper for raycasting and positioning
                window.__3D_STATE__.modelLoaded = true;
            },
            undefined,
            (error) => console.error('Error loading model:', error)
        );

        // Raycaster
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (event.button !== 0) return; // Only left click
            
            // Don't trigger if clicking HUD or Button
            if (event.target.id === 'pulseBtn' || event.target.closest('#hud')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            if (michelleModel) {
                const intersects = raycaster.intersectObject(michelleModel, true);
                if (intersects.length > 0) {
                    vy -= 3.0;
                }
            }
        });

        // Keyboard Interactions
        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            switch (key) {
                case 'arrowup':
                case 'w':
                    window.__3D_STATE__.magnetStrength = Math.min(100, window.__3D_STATE__.magnetStrength + 2.0);
                    break;
                case 'arrowdown':
                case 's':
                    window.__3D_STATE__.magnetStrength = Math.max(0, window.__3D_STATE__.magnetStrength - 2.0);
                    break;
                case ' ':
                    window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
                    break;
                case 'r':
                    y = 2.0;
                    vy = 0.0;
                    window.__3D_STATE__.magnetStrength = 40.0;
                    window.__3D_STATE__.frameCount = 0;
                    break;
                case 'g':
                    window.__3D_STATE__.gravity = window.__3D_STATE__.gravity === 0 ? -9.81 : 0;
                    break;
                case 'p':
                    window.__3D_STATE__.particlesVisible = !window.__3D_STATE__.particlesVisible;
                    particlesGroup.visible = window.__3D_STATE__.particlesVisible;
                    break;
            }
        });

        // Pulse Button
        let pulseTimeout;
        document.getElementById('pulseBtn').addEventListener('click', () => {
            if (window.__3D_STATE__.pulseActive) {
                clearTimeout(pulseTimeout);
            }
            window.__3D_STATE__.pulseActive = true;
            
            pulseTimeout = setTimeout(() => {
                window.__3D_STATE__.pulseActive = false;
            }, 1000);
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // DOM Elements for HUD
        const elMagnet = document.getElementById('hudMagnet');
        const elPosY = document.getElementById('hudPosY');
        const elVelY = document.getElementById('hudVelY');
        const elState = document.getElementById('hudState');
        const elGravity = document.getElementById('hudGravity');

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            const state = window.__3D_STATE__;
            state.frameCount++;

            // Physics Update
            if (!state.isPaused) {
                const effectiveMagnetStrength = state.pulseActive ? state.magnetStrength * 3 : state.magnetStrength;
                
                // Distance from center to platform surface
                const distance = Math.max(y - platformSurfaceY, 0.01); 
                
                const fGravity = mass * state.gravity;
                const fMag = effectiveMagnetStrength / (distance * distance);
                const fTotal = fGravity + fMag;
                
                const acceleration = fTotal / mass;
                
                // Semi-implicit Euler
                vy += acceleration * dt;
                vy *= 0.95; // Damping
                y += vy * dt;

                // Constraints
                if (y < -0.7) {
                    y = -0.7;
                    vy = 0;
                } else if (y > 5.0) {
                    y = 5.0;
                    vy = 0;
                }

                // Equilibrium check
                state.equilibriumReached = Math.abs(vy) < 0.05 && state.frameCount > 120;
            }

            // Update State Object
            state.posY = Number(y.toFixed(2));
            state.velY = Number(vy.toFixed(2));

            // Apply to Model
            if (michelleModel) {
                michelleModel.position.y = y;
            }

            // Visual Updates
            const effectiveMagnetStrength = state.pulseActive ? state.magnetStrength * 3 : state.magnetStrength;
            
            // Ring pulse
            const targetIntensity = 0.2 + (effectiveMagnetStrength / 100) * 2.0;
            ringMat.emissiveIntensity += (targetIntensity - ringMat.emissiveIntensity) * 0.1;

            // Particles animation
            if (state.particlesVisible) {
                particlesGroup.position.y = y;
                particlesGroup.rotation.y += 0.005;
                
                particlesGroup.children.forEach(p => {
                    p.userData.theta += p.userData.speed;
                    p.position.x = p.userData.radius * Math.sin(p.userData.phi) * Math.cos(p.userData.theta);
                    p.position.z = p.userData.radius * Math.sin(p.userData.phi) * Math.sin(p.userData.theta);
                });
            }

            // Update HUD
            elMagnet.textContent = `Magnet: ${state.magnetStrength.toFixed(1)} N·m²`;
            elPosY.textContent = `Height: ${state.posY.toFixed(2)} m`;
            elVelY.textContent = `Velocity: ${state.velY.toFixed(2)} m/s`;
            elState.textContent = `State: ${state.isPaused ? 'paused' : 'running'}`;
            elGravity.textContent = `Gravity: ${state.gravity.toFixed(2)}`;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
