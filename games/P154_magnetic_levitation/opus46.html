<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Levitation Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #00ffff;
    font-size: 14px;
    line-height: 1.8;
    background: rgba(0, 20, 40, 0.75);
    padding: 15px 20px;
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 8px;
    pointer-events: none;
    text-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
    min-width: 220px;
  }
  #hud div { margin: 2px 0; }
  #pulseBtn {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 40px;
    font-size: 18px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    color: #00ffff;
    background: rgba(0, 20, 40, 0.7);
    border: 2px solid #00ffff;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 4px;
    text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.2), inset 0 0 15px rgba(0, 255, 255, 0.1);
    transition: all 0.2s;
  }
  #pulseBtn:hover {
    background: rgba(0, 255, 255, 0.15);
    box-shadow: 0 0 25px rgba(0, 255, 255, 0.4), inset 0 0 25px rgba(0, 255, 255, 0.15);
  }
  #pulseBtn:active {
    transform: translateX(-50%) scale(0.95);
  }
  #pulseBtn.active {
    background: rgba(0, 255, 255, 0.3);
    box-shadow: 0 0 40px rgba(0, 255, 255, 0.6);
  }
  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #00ffff;
    font-size: 20px;
    font-family: 'Courier New', monospace;
    text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
  }
</style>
</head>
<body>

<div id="hud">
  <div id="hudMagnet">Magnet: 40.0 N·m²</div>
  <div id="hudPosY">Height: 2.00 m</div>
  <div id="hudVelY">Velocity: 0.00 m/s</div>
  <div id="hudState">State: running</div>
  <div id="hudGravity">Gravity: -9.81</div>
</div>

<button id="pulseBtn">PULSE</button>
<div id="loading">Loading model...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// === State ===
const state = {
  modelLoaded: false,
  posY: 2.0,
  velY: 0.0,
  magnetStrength: 40.0,
  isPaused: false,
  gravity: -9.81,
  particlesVisible: true,
  pulseActive: false,
  frameCount: 0,
  equilibriumReached: false,
  modelScale: 0.015
};
window.__3D_STATE__ = state;

// Physics
const mass = 2.0;
const damping = 0.95;
const dt = 1 / 60;
const platformSurfaceY = -0.9;
const minY = -0.7;
const maxY = 5.0;

let baseMagnetStrength = 40.0;
let pulseTimer = 0;
let pulseRestoreStrength = 40.0;

// === Scene Setup ===
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.FogExp2(0x050510, 0.08);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 6);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// === Lights ===
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

const blueLight = new THREE.PointLight(0x4488ff, 1.5, 20);
blueLight.position.set(0, 5, 3);
scene.add(blueLight);

const cyanLight = new THREE.PointLight(0x00ffff, 1.0, 15);
cyanLight.position.set(0, -3, 0);
scene.add(cyanLight);

// === Platform ===
const platformGeom = new THREE.CylinderGeometry(1.5, 1.5, 0.2, 64);
const platformMat = new THREE.MeshStandardMaterial({
  color: 0x333333,
  metalness: 0.9,
  roughness: 0.1
});
const platform = new THREE.Mesh(platformGeom, platformMat);
platform.position.y = -1;
scene.add(platform);

// Platform edge glow
const edgeGeom = new THREE.TorusGeometry(1.5, 0.02, 8, 64);
const edgeMat = new THREE.MeshStandardMaterial({
  color: 0x00ffff,
  emissive: 0x00ffff,
  emissiveIntensity: 0.5
});
const edgeRing = new THREE.Mesh(edgeGeom, edgeMat);
edgeRing.rotation.x = Math.PI / 2;
edgeRing.position.y = -0.89;
scene.add(edgeRing);

// === Glowing Ring ===
const ringGeom = new THREE.TorusGeometry(1.2, 0.05, 16, 64);
const ringMat = new THREE.MeshStandardMaterial({
  color: 0x00ffff,
  emissive: 0x00ffff,
  emissiveIntensity: 1.0,
  transparent: true,
  opacity: 0.8
});
const glowRing = new THREE.Mesh(ringGeom, ringMat);
glowRing.rotation.x = Math.PI / 2;
glowRing.position.y = -0.8;
scene.add(glowRing);

// Inner ring
const innerRingGeom = new THREE.TorusGeometry(0.8, 0.03, 16, 64);
const innerRingMat = new THREE.MeshStandardMaterial({
  color: 0x00aaff,
  emissive: 0x00aaff,
  emissiveIntensity: 0.6,
  transparent: true,
  opacity: 0.6
});
const innerRing = new THREE.Mesh(innerRingGeom, innerRingMat);
innerRing.rotation.x = Math.PI / 2;
innerRing.position.y = -0.82;
scene.add(innerRing);

// === Grid on platform ===
const gridHelper = new THREE.GridHelper(3, 20, 0x004444, 0x002222);
gridHelper.position.y = -0.89;
scene.add(gridHelper);

// === Particles (magnetic field lines) ===
const particleGroup = new THREE.Group();
const particles = [];
const particleGeom = new THREE.SphereGeometry(0.03, 8, 8);

for (let i = 0; i < 50; i++) {
  const pMat = new THREE.MeshStandardMaterial({
    color: 0x00ffff,
    emissive: 0x00ffff,
    emissiveIntensity: 0.8,
    transparent: true,
    opacity: 0.6 + Math.random() * 0.4
  });
  const p = new THREE.Mesh(particleGeom, pMat);
  
  const angle = Math.random() * Math.PI * 2;
  const radius = 0.5 + Math.random() * 1.5;
  const heightOffset = (Math.random() - 0.5) * 3;
  const speed = 0.2 + Math.random() * 0.5;
  const direction = Math.random() > 0.5 ? 1 : -1;
  
  particles.push({
    mesh: p,
    angle: angle,
    radius: radius,
    heightOffset: heightOffset,
    speed: speed,
    direction: direction,
    baseY: 0
  });
  
  particleGroup.add(p);
}
scene.add(particleGroup);

// === Load Michelle Model ===
let michelleModel = null;
let michelleMixer = null;
const loader = new GLTFLoader();

loader.load(
  'https://threejs.org/examples/models/gltf/Michelle.glb',
  (gltf) => {
    michelleModel = gltf.scene;
    michelleModel.scale.set(state.modelScale, state.modelScale, state.modelScale);
    
    // Center the model
    const box = new THREE.Box3().setFromObject(michelleModel);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    
    michelleModel.position.x = -center.x;
    michelleModel.position.z = -center.z;
    michelleModel.position.y = state.posY - center.y + box.min.y * 0;
    
    // Recalculate with proper centering
    michelleModel.position.set(0, 0, 0);
    const box2 = new THREE.Box3().setFromObject(michelleModel);
    const center2 = box2.getCenter(new THREE.Vector3());
    michelleModel.position.x -= center2.x;
    michelleModel.position.z -= center2.z;
    
    // Wrapper group for positioning
    const wrapper = new THREE.Group();
    wrapper.add(michelleModel);
    wrapper.position.y = state.posY;
    scene.add(wrapper);
    michelleModel = wrapper;
    
    // Setup animations if any
    if (gltf.animations && gltf.animations.length > 0) {
      michelleMixer = new THREE.AnimationMixer(gltf.scene);
      const action = michelleMixer.clipAction(gltf.animations[0]);
      action.play();
    }
    
    state.modelLoaded = true;
    document.getElementById('loading').style.display = 'none';
    console.log('Michelle model loaded successfully');
  },
  (progress) => {
    const pct = progress.total > 0 ? Math.round(progress.loaded / progress.total * 100) : '...';
    document.getElementById('loading').textContent = `Loading model... ${pct}%`;
  },
  (error) => {
    console.error('Error loading model:', error);
    document.getElementById('loading').textContent = 'Model load failed - using placeholder';
    
    // Create placeholder
    const placeholderGeom = new THREE.CapsuleGeometry(0.3, 1.0, 8, 16);
    const placeholderMat = new THREE.MeshStandardMaterial({
      color: 0xcccccc,
      metalness: 0.3,
      roughness: 0.7
    });
    const placeholder = new THREE.Mesh(placeholderGeom, placeholderMat);
    const wrapper = new THREE.Group();
    wrapper.add(placeholder);
    wrapper.position.y = state.posY;
    scene.add(wrapper);
    michelleModel = wrapper;
    state.modelLoaded = true;
    
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
    }, 2000);
  }
);

// === Raycaster for clicking ===
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  if (!michelleModel || state.isPaused) return;
  
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(michelleModel, true);
  
  if (intersects.length > 0) {
    state.velY -= 3.0;
  }
});

// === Keyboard Input ===
document.addEventListener('keydown', (event) => {
  const key = event.key.toLowerCase();
  
  if (key === 'arrowup' || key === 'w') {
    baseMagnetStrength = Math.min(100, baseMagnetStrength + 2.0);
    if (!state.pulseActive) {
      state.magnetStrength = baseMagnetStrength;
    }
    event.preventDefault();
  }
  
  if (key === 'arrowdown' || key === 's') {
    baseMagnetStrength = Math.max(0, baseMagnetStrength - 2.0);
    if (!state.pulseActive) {
      state.magnetStrength = baseMagnetStrength;
    }
    event.preventDefault();
  }
  
  if (key === ' ') {
    state.isPaused = !state.isPaused;
    event.preventDefault();
  }
  
  if (key === 'r') {
    state.posY = 2.0;
    state.velY = 0.0;
    baseMagnetStrength = 40.0;
    state.magnetStrength = 40.0;
    state.equilibriumReached = false;
    state.frameCount = 0;
    if (michelleModel) michelleModel.position.y = state.posY;
  }
  
  if (key === 'g') {
    state.gravity = state.gravity === -9.81 ? 0 : -9.81;
  }
  
  if (key === 'p') {
    state.particlesVisible = !state.particlesVisible;
    particleGroup.visible = state.particlesVisible;
  }
});

// === Pulse Button ===
const pulseBtn = document.getElementById('pulseBtn');
pulseBtn.addEventListener('click', () => {
  if (!state.pulseActive) {
    state.pulseActive = true;
    pulseRestoreStrength = baseMagnetStrength;
    state.magnetStrength = baseMagnetStrength * 3;
    pulseBtn.classList.add('active');
    
    setTimeout(() => {
      state.pulseActive = false;
      state.magnetStrength = baseMagnetStrength;
      pulseBtn.classList.remove('active');
    }, 1000);
  }
});

// === HUD Elements ===
const hudMagnet = document.getElementById('hudMagnet');
const hudPosY = document.getElementById('hudPosY');
const hudVelY = document.getElementById('hudVelY');
const hudState = document.getElementById('hudState');
const hudGravity = document.getElementById('hudGravity');

// === Beam effect ===
const beamGeom = new THREE.CylinderGeometry(0.02, 0.6, 3, 16, 1, true);
const beamMat = new THREE.MeshBasicMaterial({
  color: 0x00ffff,
  transparent: true,
  opacity: 0.08,
  side: THREE.DoubleSide,
  depthWrite: false
});
const beam = new THREE.Mesh(beamGeom, beamMat);
beam.position.y = 0.5;
scene.add(beam);

// === Animation Loop ===
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const elapsed = clock.getElapsedTime();
  state.frameCount++;
  
  // Physics update
  if (!state.isPaused && michelleModel) {
    const currentMagnet = state.pulseActive ? baseMagnetStrength * 3 : baseMagnetStrength;
    state.magnetStrength = currentMagnet;
    
    // Distance from model center to platform surface
    const distance = Math.max(state.posY - platformSurfaceY, 0.1);
    
    // Magnetic force (upward)
    const F_mag = currentMagnet / (distance * distance);
    
    // Gravity force (downward)
    const F_gravity = mass * state.gravity;
    
    // Net force
    const F_net = F_mag + F_gravity;
    
    // Acceleration
    const acceleration = F_net / mass;
    
    // Semi-implicit Euler
    state.velY += acceleration * dt;
    state.velY *= damping;
    state.posY += state.velY * dt;
    
    // Clamp position
    if (state.posY < minY) {
      state.posY = minY;
      state.velY = Math.abs(state.velY) * 0.3; // Bounce
    }
    if (state.posY > maxY) {
      state.posY = maxY;
      state.velY = 0;
    }
    
    // Update model position
    michelleModel.position.y = state.posY;
    
    // Slight rotation for visual effect
    michelleModel.rotation.y = Math.sin(elapsed * 0.3) * 0.1;
    
    // Equilibrium check
    if (state.frameCount > 120 && Math.abs(state.velY) < 0.05) {
      state.equilibriumReached = true;
    } else if (Math.abs(state.velY) >= 0.05) {
      state.equilibriumReached = false;
    }
  }
  
  // Round state values
  state.posY = parseFloat(state.posY.toFixed(2));
  state.velY = parseFloat(state.velY.toFixed(2));
  
  // Update animation mixer
  if (michelleMixer) {
    michelleMixer.update(dt);
  }
  
  // Glowing ring pulse
  const magnetRatio = state.magnetStrength / 100;
  const pulse = 0.5 + Math.sin(elapsed * 4) * 0.3;
  ringMat.emissiveIntensity = (0.5 + magnetRatio * 2.0) * pulse;
  ringMat.opacity = 0.4 + magnetRatio * 0.6;
  innerRingMat.emissiveIntensity = (0.3 + magnetRatio * 1.5) * (1 - pulse + 0.5);
  
  // Rotate inner ring
  innerRing.rotation.z = elapsed * 0.5;
  
  // Beam effect
  const beamHeight = Math.max(state.posY - (-0.9), 0.5);
  beam.scale.y = beamHeight / 3;
  beam.position.y = -0.9 + beamHeight / 2;
  beamMat.opacity = 0.03 + magnetRatio * 0.08 + Math.sin(elapsed * 6) * 0.02;
  
  // Cyan light intensity based on magnet
  cyanLight.intensity = 0.5 + magnetRatio * 1.5 + Math.sin(elapsed * 3) * 0.2;
  
  // Update particles
  if (state.particlesVisible) {
    const targetY = michelleModel ? michelleModel.position.y : 1.0;
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.angle += p.speed * dt * p.direction;
      
      const x = Math.cos(p.angle) * p.radius;
      const z = Math.sin(p.angle) * p.radius;
      const y = targetY + p.heightOffset + Math.sin(elapsed * p.speed + i) * 0.3;
      
      p.mesh.position.set(x, y, z);
      
      // Pulse opacity
      p.mesh.material.opacity = 0.3 + Math.sin(elapsed * 2 + i * 0.5) * 0.3;
      p.mesh.material.emissiveIntensity = 0.5 + magnetRatio * 1.0;
    }
  }
  
  // Edge ring glow
  edgeMat.emissiveIntensity = 0.3 + magnetRatio * 1.0 + Math.sin(elapsed * 5) * 0.15;
  
  // Update HUD
  hudMagnet.textContent = `Magnet: ${state.magnetStrength.toFixed(1)} N·m²`;
  hudPosY.textContent = `Height: ${state.posY.toFixed(2)} m`;
  hudVelY.textContent = `Velocity: ${state.velY.toFixed(2)} m/s`;
  hudState.textContent = `State: ${state.isPaused ? 'paused' : 'running'}`;
  hudGravity.textContent = `Gravity: ${state.gravity.toFixed(2)}`;
  
  controls.update();
  renderer.render(scene, camera);
}

animate();

// === Resize Handler ===
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
