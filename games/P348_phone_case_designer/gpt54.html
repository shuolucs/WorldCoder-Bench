<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Phone Case Designer</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #1a1a2e;
    }

    canvas {
      display: block;
    }

    .panel {
      position: absolute;
      z-index: 10;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px;
      backdrop-filter: blur(8px);
      color: white;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    #color-panel {
      top: 16px;
      left: 16px;
    }

    #texture-panel {
      top: 16px;
      right: 16px;
    }

    #price-display {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: white;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 22px;
      font-weight: bold;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    #engrave-controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 10px;
      align-items: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    #finish-toggle {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 10;
    }

    #spin-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 10;
    }

    .color-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      margin: 4px;
      outline: none;
      transition: transform 0.15s ease, border 0.15s ease;
    }

    .color-btn:hover {
      transform: scale(1.08);
    }

    .color-btn.active {
      border: 3px solid white;
    }

    .texture-btn, #engrave-btn, #finish-toggle, #spin-btn {
      color: white;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .texture-btn:hover, #engrave-btn:hover, #finish-toggle:hover, #spin-btn:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-1px);
    }

    .texture-btn.active {
      outline: 2px solid white;
    }

    #texture-panel .texture-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: 260px;
    }

    #engrave-input {
      width: 220px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      outline: none;
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 14px;
    }

    #engrave-input::placeholder {
      color: rgba(255,255,255,0.65);
    }

    .panel-title {
      font-size: 13px;
      margin-bottom: 8px;
      opacity: 0.9;
      font-weight: bold;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div id="color-panel" class="panel">
    <div class="panel-title">Case Color</div>
    <div>
      <button class="color-btn" data-color="#e74c3c" style="background:#e74c3c;"></button>
      <button class="color-btn active" data-color="#3498db" style="background:#3498db;"></button>
      <button class="color-btn" data-color="#2ecc71" style="background:#2ecc71;"></button>
      <button class="color-btn" data-color="#f1c40f" style="background:#f1c40f;"></button>
      <button class="color-btn" data-color="#9b59b6" style="background:#9b59b6;"></button>
      <button class="color-btn" data-color="#ecf0f1" style="background:#ecf0f1;"></button>
    </div>
  </div>

  <div id="texture-panel" class="panel">
    <div class="panel-title">Pattern</div>
    <div class="texture-buttons">
      <button class="texture-btn active" data-texture="none">None</button>
      <button class="texture-btn" data-texture="stripes">Stripes</button>
      <button class="texture-btn" data-texture="dots">Dots</button>
      <button class="texture-btn" data-texture="gradient">Gradient</button>
    </div>
  </div>

  <div id="price-display">$19.99</div>

  <div id="engrave-controls">
    <input id="engrave-input" type="text" maxlength="12" placeholder="Enter engraving text" />
    <button id="engrave-btn">Engrave</button>
  </div>

  <button id="finish-toggle">Matte / Glossy</button>
  <button id="spin-btn">Auto Spin</button>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { RoundedBoxGeometry } from "https://unpkg.com/three@0.160.0/examples/jsm/geometries/RoundedBoxGeometry.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#1a1a2e");

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const state = {
      caseColor: "#3498db",
      pattern: "none",
      engravedText: "",
      finish: "matte",
      isSpinning: false,
      price: 19.99,
      caseRotationY: 0,
      roughness: 0.9,
      metalness: 0.1,
      cameraDistance: camera.position.length()
    };

    window.__3D_STATE__ = state;

    function hexToRgb(hex) {
      const c = new THREE.Color(hex);
      return {
        r: Math.round(c.r * 255),
        g: Math.round(c.g * 255),
        b: Math.round(c.b * 255)
      };
    }

    function darkerHex(hex, factor = 0.55) {
      const c = new THREE.Color(hex);
      c.multiplyScalar(factor);
      return "#" + c.getHexString();
    }

    function createCaseTexture(baseHex, pattern, text) {
      const canvas = document.createElement("canvas");
      canvas.width = 1024;
      canvas.height = 2048;
      const ctx = canvas.getContext("2d");

      const base = baseHex;
      const dark = darkerHex(baseHex, 0.55);

      ctx.fillStyle = base;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (pattern === "stripes") {
        const stripeH = 140;
        for (let y = 0; y < canvas.height; y += stripeH) {
          ctx.fillStyle = (Math.floor(y / stripeH) % 2 === 0) ? base : dark;
          ctx.fillRect(0, y, canvas.width, stripeH);
        }
      }

      if (pattern === "dots") {
        ctx.fillStyle = base;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const rgb = hexToRgb(dark);
        ctx.fillStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.95)`;
        const spacing = 170;
        const radius = 34;

        for (let y = 80; y < canvas.height; y += spacing) {
          for (let x = 80; x < canvas.width; x += spacing) {
            const offsetX = ((Math.floor(y / spacing) % 2) * 60);
            ctx.beginPath();
            ctx.arc(x + offsetX, y, radius, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      if (pattern === "gradient") {
        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, base);
        grad.addColorStop(1, "#000000");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      if (text && text.trim() !== "") {
        ctx.save();
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "bold 110px Arial";
        ctx.shadowColor = "rgba(0,0,0,0.35)";
        ctx.shadowBlur = 10;
        ctx.fillText(text.slice(0, 12), canvas.width / 2, canvas.height * 0.78);
        ctx.restore();
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
      texture.needsUpdate = true;
      return texture;
    }

    const caseGeometry = new RoundedBoxGeometry(1.5, 3.0, 0.15, 8, 0.1);
    const caseMaterial = new THREE.MeshStandardMaterial({
      color: state.caseColor,
      roughness: 0.9,
      metalness: 0.1
    });
    caseMaterial.map = createCaseTexture(state.caseColor, state.pattern, state.engravedText);
    caseMaterial.needsUpdate = true;

    const phoneCase = new THREE.Mesh(caseGeometry, caseMaterial);
    phoneCase.position.set(0, 0, 0);
    scene.add(phoneCase);

    const cutoutGeometry = new THREE.CylinderGeometry(0.15, 0.15, 0.02, 32);
    const cutoutMaterial = new THREE.MeshStandardMaterial({
      color: 0x111111,
      roughness: 0.8,
      metalness: 0.2
    });
    const cameraCutout = new THREE.Mesh(cutoutGeometry, cutoutMaterial);
    cameraCutout.rotation.x = Math.PI / 2;
    cameraCutout.position.set(0.4, 1.0, 0.08);
    scene.add(cameraCutout);

    function updateCaseAppearance() {
      const newTexture = createCaseTexture(state.caseColor, state.pattern, state.engravedText);

      if (caseMaterial.map) caseMaterial.map.dispose();
      caseMaterial.map = newTexture;
      caseMaterial.color.set("#ffffff");
      caseMaterial.roughness = state.finish === "matte" ? 0.9 : 0.15;
      caseMaterial.metalness = state.finish === "matte" ? 0.1 : 0.6;
      caseMaterial.needsUpdate = true;

      state.roughness = caseMaterial.roughness;
      state.metalness = caseMaterial.metalness;

      updatePrice();
    }

    function updatePrice() {
      let price = 19.99;
      if (state.pattern !== "none") price += 3.00;
      if (state.engravedText.trim() !== "") price += 5.00;
      if (state.finish === "glossy") price += 2.00;
      state.price = Number(price.toFixed(2));
      document.getElementById("price-display").textContent = `$${state.price.toFixed(2)}`;
    }

    document.querySelectorAll(".color-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".color-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        state.caseColor = btn.dataset.color;
        updateCaseAppearance();
      });
    });

    document.querySelectorAll(".texture-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".texture-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        state.pattern = btn.dataset.texture;
        updateCaseAppearance();
      });
    });

    document.getElementById("engrave-btn").addEventListener("click", () => {
      const input = document.getElementById("engrave-input");
      state.engravedText = input.value.slice(0, 12);
      updateCaseAppearance();
    });

    document.getElementById("finish-toggle").addEventListener("click", () => {
      state.finish = state.finish === "matte" ? "glossy" : "matte";
      updateCaseAppearance();
    });

    document.getElementById("spin-btn").addEventListener("click", () => {
      state.isSpinning = !state.isSpinning;
      document.getElementById("spin-btn").textContent = state.isSpinning ? "Stop Spin" : "Auto Spin";
    });

    updateCaseAppearance();

    function animate() {
      requestAnimationFrame(animate);

      if (state.isSpinning) {
        phoneCase.rotation.y += 0.02;
        cameraCutout.position.set(0.4, 1.0, 0.08);
        cameraCutout.rotation.x = Math.PI / 2;
        cameraCutout.rotation.y = phoneCase.rotation.y;
      } else {
        cameraCutout.rotation.x = Math.PI / 2;
        cameraCutout.rotation.y = phoneCase.rotation.y;
      }

      controls.update();

      state.caseRotationY = phoneCase.rotation.y;
      state.roughness = caseMaterial.roughness;
      state.metalness = caseMaterial.metalness;
      state.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));

      window.__3D_STATE__ = {
        caseColor: state.caseColor,
        pattern: state.pattern,
        engravedText: state.engravedText,
        finish: state.finish,
        isSpinning: state.isSpinning,
        price: state.price,
        caseRotationY: state.caseRotationY,
        roughness: state.roughness,
        metalness: state.metalness,
        cameraDistance: state.cameraDistance
      };

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
