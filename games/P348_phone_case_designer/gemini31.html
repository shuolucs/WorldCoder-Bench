<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Phone Case Designer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .panel {
            position: absolute;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #color-panel {
            top: 20px;
            left: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .color-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .color-btn:hover {
            transform: scale(1.1);
        }
        .color-btn.active {
            border: 3px solid white;
        }
        #texture-panel {
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .texture-btn {
            padding: 10px 15px;
            background: #2c3e50;
            color: white;
            border: 1px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .texture-btn:hover {
            background: #34495e;
        }
        .texture-btn.active {
            background: #3498db;
            border: 1px solid white;
        }
        #engrave-panel {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        #engrave-input {
            padding: 10px;
            border-radius: 4px;
            border: none;
            outline: none;
            width: 150px;
            font-size: 16px;
        }
        #engrave-btn {
            padding: 10px 20px;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        #engrave-btn:hover {
            background: #d35400;
        }
        #finish-toggle {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 10px 20px;
            background: #8e44ad;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        #spin-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        #price-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #f1c40f;
            color: #f1c40f;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="price-display">$19.99</div>

    <div id="color-panel" class="panel">
        <div class="color-btn" data-color="#e74c3c" style="background-color: #e74c3c;"></div>
        <div class="color-btn active" data-color="#3498db" style="background-color: #3498db;"></div>
        <div class="color-btn" data-color="#2ecc71" style="background-color: #2ecc71;"></div>
        <div class="color-btn" data-color="#f1c40f" style="background-color: #f1c40f;"></div>
        <div class="color-btn" data-color="#9b59b6" style="background-color: #9b59b6;"></div>
        <div class="color-btn" data-color="#ecf0f1" style="background-color: #ecf0f1;"></div>
    </div>

    <div id="texture-panel" class="panel">
        <button class="texture-btn active" data-texture="none">None</button>
        <button class="texture-btn" data-texture="stripes">Stripes</button>
        <button class="texture-btn" data-texture="dots">Dots</button>
        <button class="texture-btn" data-texture="gradient">Gradient</button>
    </div>

    <div id="engrave-panel" class="panel">
        <input type="text" id="engrave-input" maxlength="12" placeholder="Enter text...">
        <button id="engrave-btn">Engrave</button>
    </div>

    <button id="finish-toggle" class="panel">Matte / Glossy</button>
    <button id="spin-btn" class="panel">Auto Spin</button>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            caseColor: '#3498db',
            pattern: 'none',
            engravedText: '',
            finish: 'matte',
            isSpinning: false,
            price: 19.99,
            caseRotationY: 0,
            roughness: 0.9,
            metalness: 0.1,
            cameraDistance: 5
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Texture Generation ---
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 1024;
        const ctx = canvas.getContext('2d');
        const caseTexture = new THREE.CanvasTexture(canvas);
        caseTexture.colorSpace = THREE.SRGBColorSpace;

        function updateTexture() {
            const state = window.__3D_STATE__;
            
            // Base Color
            ctx.fillStyle = state.caseColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Pattern
            if (state.pattern === 'stripes') {
                const color = new THREE.Color(state.caseColor);
                color.multiplyScalar(0.7);
                ctx.fillStyle = '#' + color.getHexString();
                for (let i = 0; i < canvas.height; i += 60) {
                    ctx.fillRect(0, i, canvas.width, 30);
                }
            } else if (state.pattern === 'dots') {
                const color = new THREE.Color(state.caseColor);
                color.multiplyScalar(0.7);
                ctx.fillStyle = '#' + color.getHexString();
                for (let x = 30; x < canvas.width; x += 80) {
                    for (let y = 30; y < canvas.height; y += 80) {
                        ctx.beginPath();
                        ctx.arc(x, y, 20, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            } else if (state.pattern === 'gradient') {
                const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                grad.addColorStop(0, state.caseColor);
                grad.addColorStop(1, '#000000');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Engraved Text
            if (state.engravedText) {
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 70px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                // Add slight shadow for depth
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;
                ctx.fillText(state.engravedText, canvas.width / 2, canvas.height * 0.8);
                // Reset shadow
                ctx.shadowColor = 'transparent';
            }

            caseTexture.needsUpdate = true;
        }

        // --- Phone Case Model ---
        const caseGroup = new THREE.Group();
        scene.add(caseGroup);

        const geometry = new RoundedBoxGeometry(1.5, 3.0, 0.15, 16, 0.1);
        const material = new THREE.MeshStandardMaterial({
            map: caseTexture,
            roughness: window.__3D_STATE__.roughness,
            metalness: window.__3D_STATE__.metalness,
        });
        const phoneCase = new THREE.Mesh(geometry, material);
        caseGroup.add(phoneCase);

        // Camera Cutout
        const cutoutGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.02, 32);
        cutoutGeo.rotateX(Math.PI / 2);
        const cutoutMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });
        const cutout = new THREE.Mesh(cutoutGeo, cutoutMat);
        cutout.position.set(0.4, 1.0, 0.08);
        caseGroup.add(cutout);

        // Initial Texture Render
        updateTexture();

        // --- UI Interactions & Logic ---
        function updatePrice() {
            let price = 19.99;
            if (window.__3D_STATE__.pattern !== 'none') price += 3.00;
            if (window.__3D_STATE__.engravedText !== '') price += 5.00;
            if (window.__3D_STATE__.finish === 'glossy') price += 2.00;
            
            window.__3D_STATE__.price = price;
            document.getElementById('price-display').innerText = '$' + price.toFixed(2);
        }

        // Colors
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                window.__3D_STATE__.caseColor = e.target.getAttribute('data-color');
                updateTexture();
            });
        });

        // Textures/Patterns
        document.querySelectorAll('.texture-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.texture-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                window.__3D_STATE__.pattern = e.target.getAttribute('data-texture');
                updateTexture();
                updatePrice();
            });
        });

        // Engraving
        document.getElementById('engrave-btn').addEventListener('click', () => {
            const text = document.getElementById('engrave-input').value.trim();
            window.__3D_STATE__.engravedText = text;
            updateTexture();
            updatePrice();
        });

        // Finish Toggle
        document.getElementById('finish-toggle').addEventListener('click', () => {
            const state = window.__3D_STATE__;
            if (state.finish === 'matte') {
                state.finish = 'glossy';
                state.roughness = 0.15;
                state.metalness = 0.6;
            } else {
                state.finish = 'matte';
                state.roughness = 0.9;
                state.metalness = 0.1;
            }
            material.roughness = state.roughness;
            material.metalness = state.metalness;
            updatePrice();
        });

        // Auto Spin
        const spinBtn = document.getElementById('spin-btn');
        spinBtn.addEventListener('click', () => {
            window.__3D_STATE__.isSpinning = !window.__3D_STATE__.isSpinning;
            spinBtn.innerText = window.__3D_STATE__.isSpinning ? 'Stop Spin' : 'Auto Spin';
            spinBtn.style.background = window.__3D_STATE__.isSpinning ? '#c0392b' : '#27ae60';
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (window.__3D_STATE__.isSpinning) {
                caseGroup.rotation.y += 0.02;
            }

            controls.update();
            renderer.render(scene, camera);

            // Update dynamic state fields
            window.__3D_STATE__.caseRotationY = caseGroup.rotation.y;
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
        }

        animate();
    </script>
</body>
</html>
