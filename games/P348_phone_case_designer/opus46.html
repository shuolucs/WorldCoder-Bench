<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Phone Case Designer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
  canvas { display: block; }

  #color-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: rgba(0,0,0,0.6);
    padding: 12px;
    border-radius: 10px;
    backdrop-filter: blur(10px);
  }
  #color-panel label {
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .color-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .color-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
    outline: none;
  }
  .color-btn:hover { transform: scale(1.15); }
  .color-btn.active { border-color: #ffffff; }

  #texture-panel {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: rgba(0,0,0,0.6);
    padding: 12px;
    border-radius: 10px;
    backdrop-filter: blur(10px);
  }
  #texture-panel label {
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .texture-btn {
    padding: 8px 16px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 2px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .texture-btn:hover { background: rgba(255,255,255,0.2); }
  .texture-btn.active { border-color: #fff; background: rgba(255,255,255,0.25); }

  #price-display {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: #2ecc71;
    font-size: 28px;
    font-weight: 700;
    padding: 10px 30px;
    border-radius: 10px;
    backdrop-filter: blur(10px);
    letter-spacing: 1px;
  }

  #engrave-container {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    align-items: center;
    background: rgba(0,0,0,0.6);
    padding: 10px 16px;
    border-radius: 10px;
    backdrop-filter: blur(10px);
  }
  #engrave-input {
    padding: 8px 12px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 14px;
    width: 160px;
    outline: none;
  }
  #engrave-input::placeholder { color: rgba(255,255,255,0.4); }
  #engrave-btn {
    padding: 8px 18px;
    background: #3498db;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.2s;
  }
  #engrave-btn:hover { background: #2980b9; }

  #finish-toggle {
    position: absolute;
    bottom: 20px;
    left: 20px;
    padding: 10px 18px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    backdrop-filter: blur(10px);
    transition: all 0.2s;
  }
  #finish-toggle:hover { background: rgba(255,255,255,0.15); }

  #spin-btn {
    position: absolute;
    bottom: 20px;
    right: 20px;
    padding: 10px 18px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    backdrop-filter: blur(10px);
    transition: all 0.2s;
  }
  #spin-btn:hover { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>

<div id="color-panel">
  <label>Case Color</label>
  <div class="color-row">
    <button class="color-btn" data-color="#e74c3c" style="background:#e74c3c;" title="Red"></button>
    <button class="color-btn active" data-color="#3498db" style="background:#3498db;" title="Blue"></button>
    <button class="color-btn" data-color="#2ecc71" style="background:#2ecc71;" title="Green"></button>
    <button class="color-btn" data-color="#f1c40f" style="background:#f1c40f;" title="Yellow"></button>
    <button class="color-btn" data-color="#9b59b6" style="background:#9b59b6;" title="Purple"></button>
    <button class="color-btn" data-color="#ecf0f1" style="background:#ecf0f1;" title="White"></button>
  </div>
</div>

<div id="texture-panel">
  <label>Pattern</label>
  <button class="texture-btn active" data-texture="none">None</button>
  <button class="texture-btn" data-texture="stripes">Stripes</button>
  <button class="texture-btn" data-texture="dots">Dots</button>
  <button class="texture-btn" data-texture="gradient">Gradient</button>
</div>

<div id="price-display">$19.99</div>

<div id="engrave-container">
  <input type="text" id="engrave-input" maxlength="12" placeholder="Your text here...">
  <button id="engrave-btn">Engrave</button>
</div>

<button id="finish-toggle">Matte / Glossy</button>
<button id="spin-btn">Auto Spin</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {

  // State
  window.__3D_STATE__ = {
    caseColor: '#3498db',
    pattern: 'none',
    engravedText: '',
    finish: 'matte',
    isSpinning: false,
    price: 19.99,
    caseRotationY: 0,
    roughness: 0.9,
    metalness: 0.1,
    cameraDistance: 5
  };

  const state = window.__3D_STATE__;

  // Scene
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 5);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(5, 10, 7);
  scene.add(dirLight);

  // Controls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;

  // Create rounded box geometry
  function createRoundedBoxGeometry(width, height, depth, radius, segments) {
    const shape = new THREE.Shape();
    const w = width / 2;
    const h = height / 2;
    const r = Math.min(radius, w, h);

    shape.moveTo(-w + r, -h);
    shape.lineTo(w - r, -h);
    shape.quadraticCurveTo(w, -h, w, -h + r);
    shape.lineTo(w, h - r);
    shape.quadraticCurveTo(w, h, w - r, h);
    shape.lineTo(-w + r, h);
    shape.quadraticCurveTo(-w, h, -w, h - r);
    shape.lineTo(-w, -h + r);
    shape.quadraticCurveTo(-w, -h, -w + r, -h);

    const extrudeSettings = {
      depth: depth,
      bevelEnabled: true,
      bevelThickness: 0.03,
      bevelSize: 0.03,
      bevelOffset: 0,
      bevelSegments: 3,
      curveSegments: segments || 12
    };

    const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
    geometry.center();
    return geometry;
  }

  // Texture canvas
  const texCanvas = document.createElement('canvas');
  texCanvas.width = 512;
  texCanvas.height = 1024;
  const texCtx = texCanvas.getContext('2d');

  const caseTexture = new THREE.CanvasTexture(texCanvas);

  // Case material
  const caseMaterial = new THREE.MeshStandardMaterial({
    color: new THREE.Color(state.caseColor),
    roughness: 0.9,
    metalness: 0.1,
    map: null
  });

  // Case mesh
  const caseGeometry = createRoundedBoxGeometry(1.5, 3.0, 0.15, 0.1, 16);
  const caseMesh = new THREE.Mesh(caseGeometry, caseMaterial);
  caseMesh.position.set(0, 0, 0);
  scene.add(caseMesh);

  // Camera cutout
  const cutoutGeometry = new THREE.CylinderGeometry(0.15, 0.15, 0.02, 32);
  const cutoutMaterial = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8, metalness: 0.2 });
  const cutoutMesh = new THREE.Mesh(cutoutGeometry, cutoutMaterial);
  cutoutMesh.rotation.x = Math.PI / 2;
  cutoutMesh.position.set(0.4, 1.0, 0.08);
  caseMesh.add(cutoutMesh);

  // Helper: hex to RGB
  function hexToRgb(hex) {
    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? {
      r: parseInt(result[1], 16),
      g: parseInt(result[2], 16),
      b: parseInt(result[3], 16)
    } : { r: 0, g: 0, b: 0 };
  }

  function darkenColor(hex, factor) {
    const rgb = hexToRgb(hex);
    return `rgb(${Math.floor(rgb.r * factor)}, ${Math.floor(rgb.g * factor)}, ${Math.floor(rgb.b * factor)})`;
  }

  // Update texture
  function updateTexture() {
    const w = texCanvas.width;
    const h = texCanvas.height;
    const rgb = hexToRgb(state.caseColor);
    const baseColor = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;

    texCtx.clearRect(0, 0, w, h);

    if (state.pattern === 'none' && state.engravedText === '') {
      caseMaterial.map = null;
      caseMaterial.color.set(state.caseColor);
      caseMaterial.needsUpdate = true;
      return;
    }

    // Fill base color
    texCtx.fillStyle = baseColor;
    texCtx.fillRect(0, 0, w, h);

    if (state.pattern === 'stripes') {
      const stripeHeight = 40;
      const darkColor = darkenColor(state.caseColor, 0.6);
      for (let y = 0; y < h; y += stripeHeight * 2) {
        texCtx.fillStyle = darkColor;
        texCtx.fillRect(0, y, w, stripeHeight);
      }
    } else if (state.pattern === 'dots') {
      const dotRadius = 15;
      const spacingX = 60;
      const spacingY = 60;
      const darkColor = darkenColor(state.caseColor, 0.65);
      texCtx.fillStyle = darkColor;
      for (let row = 0; row < h / spacingY + 1; row++) {
        for (let col = 0; col < w / spacingX + 1; col++) {
          const offsetX = (row % 2 === 0) ? 0 : spacingX / 2;
          const cx = col * spacingX + offsetX;
          const cy = row * spacingY;
          texCtx.beginPath();
          texCtx.arc(cx, cy, dotRadius, 0, Math.PI * 2);
          texCtx.fill();
        }
      }
    } else if (state.pattern === 'gradient') {
      const grad = texCtx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, baseColor);
      grad.addColorStop(1, '#000000');
      texCtx.fillStyle = grad;
      texCtx.fillRect(0, 0, w, h);
    }

    // Engraved text
    if (state.engravedText !== '') {
      texCtx.save();
      texCtx.fillStyle = '#ffffff';
      texCtx.font = 'bold 48px Segoe UI, Arial, sans-serif';
      texCtx.textAlign = 'center';
      texCtx.textBaseline = 'middle';
      texCtx.shadowColor = 'rgba(0,0,0,0.5)';
      texCtx.shadowBlur = 4;
      texCtx.fillText(state.engravedText, w / 2, h * 0.75);
      texCtx.restore();
    }

    caseMaterial.map = caseTexture;
    caseMaterial.color.set(0xffffff);
    caseTexture.needsUpdate = true;
    caseMaterial.needsUpdate = true;
  }

  // Price calculation
  function updatePrice() {
    let price = 19.99;
    if (state.pattern !== 'none') price += 3.00;
    if (state.engravedText !== '') price += 5.00;
    if (state.finish === 'glossy') price += 2.00;
    state.price = parseFloat(price.toFixed(2));
    document.getElementById('price-display').textContent = '$' + state.price.toFixed(2);
  }

  // Color buttons
  document.querySelectorAll('.color-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.caseColor = btn.getAttribute('data-color');
      updateTexture();
    });
  });

  // Texture buttons
  document.querySelectorAll('.texture-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.texture-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.pattern = btn.getAttribute('data-texture');
      updateTexture();
      updatePrice();
    });
  });

  // Engrave
  document.getElementById('engrave-btn').addEventListener('click', () => {
    const text = document.getElementById('engrave-input').value.trim().substring(0, 12);
    state.engravedText = text;
    updateTexture();
    updatePrice();
  });

  // Finish toggle
  let isGlossy = false;
  document.getElementById('finish-toggle').addEventListener('click', () => {
    isGlossy = !isGlossy;
    if (isGlossy) {
      state.finish = 'glossy';
      caseMaterial.roughness = 0.15;
      caseMaterial.metalness = 0.6;
    } else {
      state.finish = 'matte';
      caseMaterial.roughness = 0.9;
      caseMaterial.metalness = 0.1;
    }
    state.roughness = caseMaterial.roughness;
    state.metalness = caseMaterial.metalness;
    caseMaterial.needsUpdate = true;
    updatePrice();
  });

  // Spin toggle
  let spinning = false;
  const spinBtn = document.getElementById('spin-btn');
  spinBtn.addEventListener('click', () => {
    spinning = !spinning;
    state.isSpinning = spinning;
    spinBtn.textContent = spinning ? 'Stop Spin' : 'Auto Spin';
  });

  // Initial texture
  updateTexture();
  updatePrice();

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Animation loop
  function animate() {
    requestAnimationFrame(animate);

    if (spinning) {
      caseMesh.rotation.y += 0.02;
    }

    controls.update();

    // Update state
    state.caseRotationY = caseMesh.rotation.y;
    state.roughness = caseMaterial.roughness;
    state.metalness = caseMaterial.metalness;
    state.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));

    renderer.render(scene, camera);
  }

  animate();

})();
</script>
</body>
</html>
