<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Weather Radar Visualization</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Courier New', monospace; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
}
#hud > * { pointer-events: auto; }
#scorePanel {
    position: absolute;
    top: 20px; left: 20px;
    color: white;
    font-size: 20px;
    text-shadow: 0 0 10px rgba(0,255,68,0.5);
}
#scorePanel div { margin-bottom: 8px; }
#threatPanel {
    position: absolute;
    top: 20px; right: 20px;
    color: white;
    font-size: 20px;
    text-align: right;
    text-shadow: 0 0 10px rgba(255,0,0,0.5);
}
#threatBar {
    width: 200px;
    height: 20px;
    background: #333;
    border: 1px solid #666;
    margin-top: 8px;
    border-radius: 3px;
    overflow: hidden;
}
#threatFill {
    height: 100%;
    width: 100%;
    background: linear-gradient(to right, #00ff00, #ff0000);
    transition: width 0.3s;
    border-radius: 3px;
}
#cellsPanel {
    position: absolute;
    bottom: 60px; left: 20px;
    color: white;
    font-size: 20px;
    text-shadow: 0 0 10px rgba(0,255,68,0.5);
}
#resetBtn {
    position: absolute;
    bottom: 20px; left: 50%; transform: translateX(-50%);
    padding: 10px 30px;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    background: #1a3a1a;
    color: #00ff44;
    border: 2px solid #00ff44;
    cursor: pointer;
    border-radius: 5px;
    transition: all 0.3s;
}
#resetBtn:hover {
    background: #00ff44;
    color: #0a0a1a;
}
#clearMsg {
    position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #00ff44;
    font-size: 60px;
    font-weight: bold;
    text-shadow: 0 0 30px rgba(0,255,68,0.8), 0 0 60px rgba(0,255,68,0.4);
    display: none;
    animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.05); }
}
#pauseIndicator {
    position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #ffff00;
    font-size: 40px;
    display: none;
    text-shadow: 0 0 20px rgba(255,255,0,0.5);
}
</style>
</head>
<body>
<div id="hud">
    <div id="scorePanel">
        <div id="scoreText">Score: 0</div>
        <div id="comboText">Combo: 1x</div>
    </div>
    <div id="threatPanel">
        <div id="threatText">Threat Level: 15/15</div>
        <div id="threatBar"><div id="threatFill"></div></div>
    </div>
    <div id="cellsPanel">
        <div id="cellsText">Cells Analyzed: 0/5</div>
    </div>
    <button id="resetBtn">Reset</button>
    <div id="clearMsg">RADAR CLEAR</div>
    <div id="pauseIndicator">⏸ PAUSED</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
    // State
    window.__3D_STATE__ = {
        radarAngle: 0,
        paused: false,
        score: 0,
        combo: 1,
        cellsAnalyzed: 0,
        threatLevel: 15,
        domeVisible: false,
        weatherCells: [],
        lastAnalyzedSeverity: 0,
        allClear: false
    };

    const state = window.__3D_STATE__;

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);
    scene.fog = new THREE.FogExp2(0x0a0a1a, 0.003);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 80, 120);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.insertBefore(renderer.domElement, document.getElementById('hud'));

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0, 0);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x334455, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(50, 100, 50);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // Ground plane
    const groundGeo = new THREE.CircleGeometry(100, 64);
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x1a3a1a });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Grid rings on ground for radar look
    for (let r = 20; r <= 80; r += 20) {
        const ringGeo = new THREE.RingGeometry(r - 0.2, r + 0.2, 64);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x003300, side: THREE.DoubleSide });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = -Math.PI / 2;
        ring.position.y = 0.1;
        scene.add(ring);
    }

    // Radar dish group
    const radarGroup = new THREE.Group();

    // Pedestal
    const pedestalGeo = new THREE.CylinderGeometry(2, 2, 15, 16);
    const pedestalMat = new THREE.MeshLambertMaterial({ color: 0x666666 });
    const pedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
    pedestal.position.y = 7.5;
    pedestal.castShadow = true;
    radarGroup.add(pedestal);

    // Dish
    const dishGeo = new THREE.ConeGeometry(5, 3, 32, 1, true);
    const dishMat = new THREE.MeshLambertMaterial({ color: 0x888888, side: THREE.DoubleSide });
    const dish = new THREE.Mesh(dishGeo, dishMat);
    dish.position.y = 16;
    dish.rotation.x = Math.PI;
    dish.castShadow = true;
    radarGroup.add(dish);

    scene.add(radarGroup);

    // Radar sweep line
    const sweepGroup = new THREE.Group();
    const sweepShape = new THREE.Shape();
    sweepShape.moveTo(0, 0);
    const sweepAngle = 0.08;
    const sweepRadius = 90;
    sweepShape.lineTo(Math.cos(-sweepAngle) * sweepRadius, Math.sin(-sweepAngle) * sweepRadius);
    const arcSegments = 16;
    for (let i = 0; i <= arcSegments; i++) {
        const a = -sweepAngle + (2 * sweepAngle * i / arcSegments);
        sweepShape.lineTo(Math.cos(a) * sweepRadius, Math.sin(a) * sweepRadius);
    }
    sweepShape.lineTo(0, 0);

    const sweepGeo = new THREE.ShapeGeometry(sweepShape);
    const sweepMat = new THREE.MeshBasicMaterial({
        color: 0x00ff44,
        transparent: true,
        opacity: 0.15,
        side: THREE.DoubleSide,
        depthWrite: false
    });
    const sweepMesh = new THREE.Mesh(sweepGeo, sweepMat);
    sweepMesh.rotation.x = -Math.PI / 2;
    sweepMesh.position.y = 0.5;
    sweepGroup.add(sweepMesh);

    // Add a trailing fade effect
    for (let i = 1; i <= 5; i++) {
        const trailShape = new THREE.Shape();
        const trailAngleOffset = -sweepAngle * 2 * i;
        trailShape.moveTo(0, 0);
        trailShape.lineTo(Math.cos(trailAngleOffset - sweepAngle) * sweepRadius, Math.sin(trailAngleOffset - sweepAngle) * sweepRadius);
        for (let j = 0; j <= arcSegments; j++) {
            const a = trailAngleOffset - sweepAngle + (2 * sweepAngle * j / arcSegments);
            trailShape.lineTo(Math.cos(a) * sweepRadius, Math.sin(a) * sweepRadius);
        }
        trailShape.lineTo(0, 0);
        const trailGeo = new THREE.ShapeGeometry(trailShape);
        const trailMat = new THREE.MeshBasicMaterial({
            color: 0x00ff44,
            transparent: true,
            opacity: 0.15 * (1 - i / 6),
            side: THREE.DoubleSide,
            depthWrite: false
        });
        const trailMesh = new THREE.Mesh(trailGeo, trailMat);
        trailMesh.rotation.x = -Math.PI / 2;
        trailMesh.position.y = 0.5;
        sweepGroup.add(trailMesh);
    }

    scene.add(sweepGroup);

    // Coverage dome
    const domeGeo = new THREE.SphereGeometry(90, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
    const domeMat = new THREE.MeshBasicMaterial({
        color: 0x00ff44,
        wireframe: true,
        transparent: true,
        opacity: 0.15
    });
    const dome = new THREE.Mesh(domeGeo, domeMat);
    dome.visible = false;
    scene.add(dome);

    // Severity colors
    const severityColors = {
        1: 0x00ff00,
        2: 0xffff00,
        3: 0xff8800,
        4: 0xff0000,
        5: 0xff00ff
    };

    // Weather cells data
    let weatherCellGroups = [];
    let weatherCellData = [];

    function randomPosition(maxRadius) {
        const angle = Math.random() * Math.PI * 2;
        const r = 20 + Math.random() * (maxRadius - 20);
        return { x: Math.cos(angle) * r, z: Math.sin(angle) * r };
    }

    function createWeatherCell(severity, x, z) {
        const group = new THREE.Group();
        group.position.set(x, 5, z);

        const color = severityColors[severity];
        const baseRadius = severity * 4;

        // Three nested spheres
        const radii = [baseRadius, baseRadius * 0.7, baseRadius * 0.4];
        const opacities = [0.15, 0.25, 0.4];

        for (let i = 0; i < 3; i++) {
            const geo = new THREE.SphereGeometry(radii[i], 16, 12);
            const mat = new THREE.MeshPhongMaterial({
                color: color,
                transparent: true,
                opacity: opacities[i],
                depthWrite: false,
                emissive: color,
                emissiveIntensity: 0.3
            });
            const sphere = new THREE.Mesh(geo, mat);
            group.add(sphere);
        }

        // Inner glow point light
        const pointLight = new THREE.PointLight(color, 0.5, baseRadius * 3);
        group.add(pointLight);

        group.userData = {
            severity: severity,
            analyzed: false,
            dirX: (Math.random() - 0.5) * 2,
            dirZ: (Math.random() - 0.5) * 2,
            speed: severity * 0.5,
            baseY: 5,
            phaseOffset: Math.random() * Math.PI * 2,
            ring: null
        };

        // Normalize direction
        const len = Math.sqrt(group.userData.dirX ** 2 + group.userData.dirZ ** 2);
        if (len > 0) {
            group.userData.dirX /= len;
            group.userData.dirZ /= len;
        }

        scene.add(group);
        return group;
    }

    function createAnalysisRing(group) {
        const severity = group.userData.severity;
        const ringRadius = severity * 4 + 3;
        const ringGeo = new THREE.TorusGeometry(ringRadius, 0.5, 8, 32);
        const ringMat = new THREE.MeshBasicMaterial({
            color: 0x00ffff,
            transparent: true,
            opacity: 0.8,
            emissive: 0x00ffff
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2;
        group.add(ring);
        group.userData.ring = ring;
    }

    function initWeatherCells() {
        // Clear existing
        weatherCellGroups.forEach(g => scene.remove(g));
        weatherCellGroups = [];
        weatherCellData = [];

        const severities = [1, 2, 3, 4, 5];
        // Shuffle positions
        for (let i = 0; i < 5; i++) {
            const pos = randomPosition(80);
            const group = createWeatherCell(severities[i], pos.x, pos.z);
            weatherCellGroups.push(group);
            weatherCellData.push({
                severity: severities[i],
                analyzed: false,
                x: pos.x,
                z: pos.z
            });
        }

        state.weatherCells = weatherCellData;
    }

    initWeatherCells();

    // Raycaster for clicking
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function onMouseClick(event) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);

        // Check intersections with weather cell spheres
        for (let i = 0; i < weatherCellGroups.length; i++) {
            const group = weatherCellGroups[i];
            if (group.userData.analyzed) continue;

            const intersects = raycaster.intersectObjects(group.children, true);
            if (intersects.length > 0) {
                analyzeCell(i);
                break;
            }
        }
    }

    function analyzeCell(index) {
        const group = weatherCellGroups[index];
        const severity = group.userData.severity;

        group.userData.analyzed = true;
        weatherCellData[index].analyzed = true;

        // Check combo
        if (state.lastAnalyzedSeverity === 0 && severity === 1) {
            state.combo = 1;
        } else if (severity === state.lastAnalyzedSeverity + 1) {
            state.combo++;
        } else {
            state.combo = 1;
        }

        state.lastAnalyzedSeverity = severity;

        // Score
        const points = severity * 100 * state.combo;
        state.score += points;

        // Update analyzed count
        state.cellsAnalyzed++;
        state.threatLevel -= severity;

        // Visual feedback - add ring
        createAnalysisRing(group);

        // Make spheres more transparent
        group.children.forEach(child => {
            if (child.material && child.material.opacity !== undefined && child.type === 'Mesh') {
                child.material.opacity *= 0.5;
                child.material.emissiveIntensity = 0.1;
            }
        });

        // Check all clear
        if (state.cellsAnalyzed >= 5) {
            state.allClear = true;
            document.getElementById('clearMsg').style.display = 'block';
        }

        updateHUD();
    }

    function resetGame() {
        state.score = 0;
        state.combo = 1;
        state.cellsAnalyzed = 0;
        state.threatLevel = 15;
        state.lastAnalyzedSeverity = 0;
        state.allClear = false;
        document.getElementById('clearMsg').style.display = 'none';

        initWeatherCells();
        updateHUD();
    }

    function updateHUD() {
        document.getElementById('scoreText').textContent = 'Score: ' + state.score;
        document.getElementById('comboText').textContent = 'Combo: ' + state.combo + 'x';
        document.getElementById('threatText').textContent = 'Threat Level: ' + state.threatLevel + '/15';
        document.getElementById('cellsText').textContent = 'Cells Analyzed: ' + state.cellsAnalyzed + '/5';

        const threatPercent = (state.threatLevel / 15) * 100;
        document.getElementById('threatFill').style.width = threatPercent + '%';
    }

    // Event listeners
    renderer.domElement.addEventListener('click', onMouseClick);
    document.getElementById('resetBtn').addEventListener('click', resetGame);

    window.addEventListener('keydown', (e) => {
        if (e.key === 'p' || e.key === 'P') {
            state.paused = !state.paused;
            document.getElementById('pauseIndicator').style.display = state.paused ? 'block' : 'none';
        }
        if (e.key === 't' || e.key === 'T') {
            state.domeVisible = !state.domeVisible;
            dome.visible = state.domeVisible;
        }
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Animation
    const clock = new THREE.Clock();
    let elapsedTime = 0;

    function animate() {
        requestAnimationFrame(animate);

        const delta = clock.getDelta();

        if (!state.paused) {
            elapsedTime += delta;

            // Rotate radar
            state.radarAngle += 0.5 * delta;
            dish.rotation.y = state.radarAngle;
            sweepGroup.rotation.y = state.radarAngle;

            // Update weather cells
            for (let i = 0; i < weatherCellGroups.length; i++) {
                const group = weatherCellGroups[i];
                const data = group.userData;

                // Drift
                let newX = group.position.x + data.dirX * data.speed * delta;
                let newZ = group.position.z + data.dirZ * data.speed * delta;

                // Bounce off boundary
                const dist = Math.sqrt(newX * newX + newZ * newZ);
                if (dist > 80) {
                    data.dirX = -data.dirX;
                    data.dirZ = -data.dirZ;
                    newX = group.position.x + data.dirX * data.speed * delta;
                    newZ = group.position.z + data.dirZ * data.speed * delta;
                }

                group.position.x = newX;
                group.position.z = newZ;

                // Bob
                group.position.y = data.baseY + Math.sin(elapsedTime * (2 * Math.PI / 3) + data.phaseOffset) * 2;

                // Update state data
                weatherCellData[i].x = group.position.x;
                weatherCellData[i].z = group.position.z;

                // Animate ring if exists
                if (data.ring) {
                    data.ring.rotation.z += delta * 2;
                    data.ring.material.opacity = 0.5 + 0.3 * Math.sin(elapsedTime * 4);
                }
            }
        }

        controls.update();
        renderer.render(scene, camera);
    }

    updateHUD();
    animate();
})();
</script>
</body>
</html>
