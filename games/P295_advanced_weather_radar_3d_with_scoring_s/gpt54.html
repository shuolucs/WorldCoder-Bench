<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Weather Radar Visualization</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: monospace;
    }
    canvas { display: block; }

    .hud {
      position: absolute;
      color: white;
      font-size: 20px;
      z-index: 10;
      user-select: none;
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
    }

    #scoreHud { top: 16px; left: 16px; }
    #threatHud { top: 16px; right: 16px; text-align: right; }
    #analyzedHud { bottom: 16px; left: 16px; }

    #resetBtn {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 10px 20px;
      font-size: 18px;
      font-family: monospace;
      background: #16222f;
      color: white;
      border: 1px solid #5fa8ff;
      border-radius: 6px;
      cursor: pointer;
    }

    #resetBtn:hover {
      background: #213446;
    }

    #clearMsg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      color: #00ff66;
      font-size: 48px;
      font-weight: bold;
      letter-spacing: 4px;
      text-shadow: 0 0 20px #00ff66;
      display: none;
      pointer-events: none;
    }

    #threatBarWrap {
      width: 220px;
      height: 16px;
      border: 1px solid #ccc;
      margin-top: 6px;
      background: rgba(255,255,255,0.08);
      display: inline-block;
    }

    #threatBar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
      transform-origin: left center;
    }

    #help {
      position: absolute;
      top: 70px;
      left: 16px;
      color: #aaccff;
      font-size: 14px;
      z-index: 10;
      line-height: 1.5;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="scoreHud" class="hud">Score: 0<br>Combo: 1x</div>

  <div id="threatHud" class="hud">
    Threat Level: <span id="threatText">15/15</span>
    <div id="threatBarWrap"><div id="threatBar"></div></div>
  </div>

  <div id="analyzedHud" class="hud">Cells Analyzed: 0/5</div>

  <div id="help">
    Click cells to analyze<br>
    P = Pause/Unpause<br>
    T = Toggle Coverage Dome
  </div>

  <button id="resetBtn">Reset</button>
  <div id="clearMsg">RADAR CLEAR</div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 80, 120);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 10, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0x334455, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(50, 100, 50);
    scene.add(dirLight);

    // Ground plane as large flat circle
    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(100, 96),
      new THREE.MeshPhongMaterial({ color: 0x1a3a1a, side: THREE.DoubleSide })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    // Radar base + dish
    const radarGroup = new THREE.Group();
    scene.add(radarGroup);

    const pedestal = new THREE.Mesh(
      new THREE.CylinderGeometry(2, 2, 15, 24),
      new THREE.MeshPhongMaterial({ color: 0x666666 })
    );
    pedestal.position.y = 7.5;
    radarGroup.add(pedestal);

    const dishPivot = new THREE.Group();
    dishPivot.position.y = 16;
    radarGroup.add(dishPivot);

    const dish = new THREE.Mesh(
      new THREE.ConeGeometry(5, 3, 32, 1, true),
      new THREE.MeshPhongMaterial({
        color: 0x888888,
        shininess: 80,
        side: THREE.DoubleSide
      })
    );
    dish.rotation.z = Math.PI / 2;
    dish.rotation.x = Math.PI;
    dishPivot.add(dish);

    // Sweep wedge
    function createSweepShape(radius = 90, angleWidth = 0.28) {
      const shape = new THREE.Shape();
      shape.moveTo(0, 0);
      const start = -angleWidth / 2;
      const end = angleWidth / 2;
      shape.absarc(0, 0, radius, start, end, false);
      shape.lineTo(0, 0);
      return shape;
    }

    const sweepGeom = new THREE.ShapeGeometry(createSweepShape(90, 0.22));
    const sweepMat = new THREE.MeshBasicMaterial({
      color: 0x00ff44,
      transparent: true,
      opacity: 0.15,
      side: THREE.DoubleSide,
      depthWrite: false
    });
    const sweep = new THREE.Mesh(sweepGeom, sweepMat);
    sweep.rotation.x = -Math.PI / 2;
    sweep.position.y = 0.25;
    radarGroup.add(sweep);

    // Coverage dome
    const dome = new THREE.Mesh(
      new THREE.SphereGeometry(90, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2),
      new THREE.MeshBasicMaterial({
        color: 0x44ffaa,
        wireframe: true,
        transparent: true,
        opacity: 0.2
      })
    );
    dome.position.y = 0;
    dome.visible = false;
    scene.add(dome);

    // Weather cells
    const severityColors = {
      1: 0x00ff00,
      2: 0xffff00,
      3: 0xff8800,
      4: 0xff0000,
      5: 0xff00ff
    };

    const weatherCells = [];
    const cellRoot = new THREE.Group();
    scene.add(cellRoot);

    function randomPointInRadius(maxRadius) {
      const r = Math.sqrt(Math.random()) * maxRadius;
      const theta = Math.random() * Math.PI * 2;
      return {
        x: Math.cos(theta) * r,
        z: Math.sin(theta) * r
      };
    }

    function randomDriftDir() {
      const a = Math.random() * Math.PI * 2;
      return new THREE.Vector3(Math.cos(a), 0, Math.sin(a));
    }

    function createAnalysisRing(radius, color) {
      const ringGroup = new THREE.Group();
      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(radius + 1.5, 0.4, 12, 48),
        new THREE.MeshBasicMaterial({
          color,
          transparent: true,
          opacity: 0.95
        })
      );
      ring.rotation.x = Math.PI / 2;
      ringGroup.add(ring);

      const glow = new THREE.Mesh(
        new THREE.TorusGeometry(radius + 1.9, 0.8, 12, 48),
        new THREE.MeshBasicMaterial({
          color,
          transparent: true,
          opacity: 0.25
        })
      );
      glow.rotation.x = Math.PI / 2;
      ringGroup.add(glow);
      ringGroup.visible = false;
      return ringGroup;
    }

    function createWeatherCell(severity) {
      const color = severityColors[severity];
      const outerRadius = severity * 4;
      const pos = randomPointInRadius(80);

      const group = new THREE.Group();
      group.position.set(pos.x, 5, pos.z);

      const materials = [
        new THREE.MeshPhongMaterial({
          color,
          transparent: true,
          opacity: 0.18,
          emissive: color,
          emissiveIntensity: 0.12,
          depthWrite: false
        }),
        new THREE.MeshPhongMaterial({
          color,
          transparent: true,
          opacity: 0.28,
          emissive: color,
          emissiveIntensity: 0.16,
          depthWrite: false
        }),
        new THREE.MeshPhongMaterial({
          color,
          transparent: true,
          opacity: 0.4,
          emissive: color,
          emissiveIntensity: 0.2,
          depthWrite: false
        })
      ];

      const radii = [outerRadius, outerRadius * 0.72, outerRadius * 0.45];
      const offsets = [
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(outerRadius * 0.18, outerRadius * 0.08, -outerRadius * 0.12),
        new THREE.Vector3(-outerRadius * 0.15, -outerRadius * 0.05, outerRadius * 0.16)
      ];

      const clickable = new THREE.Group();
      group.add(clickable);

      radii.forEach((r, i) => {
        const sphere = new THREE.Mesh(
          new THREE.SphereGeometry(r, 28, 20),
          materials[i]
        );
        sphere.position.copy(offsets[i]);
        sphere.userData.isWeatherCellPart = true;
        sphere.userData.severity = severity;
        clickable.add(sphere);
      });

      const ring = createAnalysisRing(outerRadius, color);
      ring.position.y = -outerRadius * 0.3;
      group.add(ring);

      const dir = randomDriftDir();

      const cell = {
        severity,
        group,
        clickable,
        ring,
        analyzed: false,
        baseY: 5,
        bobOffset: Math.random() * Math.PI * 2,
        driftDir: dir,
        speed: severity * 0.5,
        outerRadius
      };

      clickable.userData.cellRef = cell;
      clickable.children.forEach(child => child.userData.cellRef = cell);

      cellRoot.add(group);
      weatherCells.push(cell);
    }

    [1, 2, 3, 4, 5].forEach(createWeatherCell);

    // State
    const state = {
      radarAngle: 0,
      paused: false,
      score: 0,
      combo: 1,
      cellsAnalyzed: 0,
      threatLevel: 15,
      domeVisible: false,
      weatherCells: [],
      lastAnalyzedSeverity: 0,
      allClear: false
    };

    window.__3D_STATE__ = state;

    function syncState() {
      state.weatherCells = weatherCells.map(cell => ({
        severity: cell.severity,
        analyzed: cell.analyzed,
        x: Number(cell.group.position.x.toFixed(2)),
        z: Number(cell.group.position.z.toFixed(2))
      }));
      state.domeVisible = dome.visible;
      state.allClear = state.cellsAnalyzed === 5;
      updateHUD();
    }

    // HUD
    const scoreHud = document.getElementById("scoreHud");
    const analyzedHud = document.getElementById("analyzedHud");
    const threatText = document.getElementById("threatText");
    const threatBar = document.getElementById("threatBar");
    const clearMsg = document.getElementById("clearMsg");
    const resetBtn = document.getElementById("resetBtn");

    function updateHUD() {
      scoreHud.innerHTML = `Score: ${state.score}<br>Combo: ${state.combo}x`;
      analyzedHud.textContent = `Cells Analyzed: ${state.cellsAnalyzed}/5`;
      threatText.textContent = `${state.threatLevel}/15`;

      const threatRatio = state.threatLevel / 15;
      threatBar.style.transform = `scaleX(${threatRatio})`;

      clearMsg.style.display = state.allClear ? "block" : "none";
    }

    // Scoring logic
    function analyzeCell(cell) {
      if (cell.analyzed) return;

      if (state.lastAnalyzedSeverity === 0) {
        state.combo = (cell.severity === 1) ? 1 : 1;
      } else {
        if (cell.severity === state.lastAnalyzedSeverity + 1) {
          state.combo += 1;
        } else {
          state.combo = 1;
        }
      }

      const gained = cell.severity * 100 * state.combo;
      state.score += gained;
      state.lastAnalyzedSeverity = cell.severity;

      cell.analyzed = true;
      cell.ring.visible = true;

      state.cellsAnalyzed += 1;
      state.threatLevel -= cell.severity;
      state.allClear = state.cellsAnalyzed === 5;

      syncState();
    }

    // Raycasting
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function onPointerDown(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const targets = [];
      weatherCells.forEach(cell => {
        cell.clickable.children.forEach(c => targets.push(c));
      });

      const intersects = raycaster.intersectObjects(targets, false);
      if (intersects.length > 0) {
        const obj = intersects[0].object;
        const cell = obj.userData.cellRef;
        if (cell) analyzeCell(cell);
      }
    }

    window.addEventListener("pointerdown", onPointerDown);

    // Reset
    function repositionCell(cell) {
      const pos = randomPointInRadius(80);
      cell.group.position.set(pos.x, 5, pos.z);
      cell.driftDir = randomDriftDir();
      cell.bobOffset = Math.random() * Math.PI * 2;
      cell.analyzed = false;
      cell.ring.visible = false;
    }

    function resetAll() {
      state.score = 0;
      state.combo = 1;
      state.cellsAnalyzed = 0;
      state.threatLevel = 15;
      state.lastAnalyzedSeverity = 0;
      state.allClear = false;

      weatherCells.forEach(repositionCell);
      syncState();
    }

    resetBtn.addEventListener("click", resetAll);

    // Keyboard
    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (key === "p") {
        state.paused = !state.paused;
      }
      if (key === "t") {
        dome.visible = !dome.visible;
        state.domeVisible = dome.visible;
      }
      syncState();
    });

    // Animation
    const clock = new THREE.Clock();

    function keepWithinRadius(cell, maxR = 80) {
      const x = cell.group.position.x;
      const z = cell.group.position.z;
      const len = Math.sqrt(x * x + z * z);

      if (len > maxR) {
        const nx = x / len;
        const nz = z / len;
        cell.group.position.x = nx * maxR;
        cell.group.position.z = nz * maxR;

        const normal = new THREE.Vector3(nx, 0, nz);
        const d = cell.driftDir.clone();
        const reflected = d.sub(normal.multiplyScalar(2 * d.dot(normal))).normalize();
        cell.driftDir.copy(reflected);
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();
      const elapsed = clock.elapsedTime;

      if (!state.paused) {
        state.radarAngle += 0.5 * dt;
        radarGroup.rotation.y = state.radarAngle;

        weatherCells.forEach(cell => {
          cell.group.position.x += cell.driftDir.x * cell.speed * dt;
          cell.group.position.z += cell.driftDir.z * cell.speed * dt;
          keepWithinRadius(cell, 80);

          cell.group.position.y = cell.baseY + Math.sin((elapsed + cell.bobOffset) * (Math.PI * 2 / 3)) * 2;

          if (cell.ring.visible) {
            cell.ring.rotation.y += dt * 0.8;
          }
        });
      }

      controls.update();
      syncState();
      renderer.render(scene, camera);
    }

    updateHUD();
    syncState();
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
