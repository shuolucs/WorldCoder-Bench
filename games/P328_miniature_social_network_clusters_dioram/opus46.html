<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Social Network Diorama</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0d0d1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
    position: fixed;
    top: 15px;
    left: 15px;
    background: rgba(13, 13, 26, 0.85);
    color: #ffffff;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    z-index: 100;
    pointer-events: none;
}

#info-panel {
    position: fixed;
    top: 15px;
    right: 15px;
    width: 220px;
    background: rgba(13, 13, 26, 0.9);
    color: #ffffff;
    padding: 16px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    z-index: 100;
    display: none;
}

#info-panel h3 {
    margin-bottom: 8px;
    font-size: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 6px;
}

#info-panel .cluster-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: bold;
}

#button-container {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 100;
}

.cluster-btn {
    padding: 10px 22px;
    border: 2px solid;
    border-radius: 8px;
    background: rgba(13, 13, 26, 0.85);
    color: #ffffff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
}

.cluster-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.cluster-btn.hidden {
    opacity: 0.4;
}

#btn-cluster-a { border-color: #ff4444; }
#btn-cluster-a:hover { background: rgba(255, 68, 68, 0.3); }
#btn-cluster-b { border-color: #4488ff; }
#btn-cluster-b:hover { background: rgba(68, 136, 255, 0.3); }
#btn-cluster-c { border-color: #44ff88; }
#btn-cluster-c:hover { background: rgba(68, 255, 136, 0.3); }

#instructions {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(13, 13, 26, 0.7);
    color: rgba(255,255,255,0.5);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 11px;
    z-index: 100;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="hud">Loading...</div>

<div id="info-panel">
    <h3 id="info-title">Node</h3>
    <div id="info-cluster"></div>
    <div id="info-connections"></div>
</div>

<div id="button-container">
    <button class="cluster-btn" id="btn-cluster-a">Cluster A</button>
    <button class="cluster-btn" id="btn-cluster-b">Cluster B</button>
    <button class="cluster-btn" id="btn-cluster-c">Cluster C</button>
</div>

<div id="instructions">R: Reset View | L: Toggle Layout | E: Cycle Edge Mode | Click: Select | Hover: Highlight</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// State
window.__3D_STATE__ = {
    nodeCount: 15,
    edgeCount: 0,
    clusterAVisible: true,
    clusterBVisible: true,
    clusterCVisible: true,
    selectedNodeId: null,
    hoveredNodeId: null,
    layoutMode: 'scattered',
    edgeMode: 'all',
    visibleNodeCount: 15,
    visibleEdgeCount: 0,
    cameraDistance: 0,
    initialized: false
};

const state = window.__3D_STATE__;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d1a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 12, 18);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);
controls.update();

const initialCameraPos = new THREE.Vector3(0, 12, 18);
const initialCameraTarget = new THREE.Vector3(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// Platform
const platformGeo = new THREE.CylinderGeometry(10, 10, 0.3, 64);
const platformMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3e, roughness: 0.8, metalness: 0.2 });
const platform = new THREE.Mesh(platformGeo, platformMat);
platform.position.y = 0;
platform.receiveShadow = true;
scene.add(platform);

// Add subtle grid on platform
const gridGeo = new THREE.RingGeometry(0.5, 9.8, 64, 8);
const gridMat = new THREE.MeshBasicMaterial({ color: 0x3a3a5e, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
const grid = new THREE.Mesh(gridGeo, gridMat);
grid.rotation.x = -Math.PI / 2;
grid.position.y = 0.16;
scene.add(grid);

// Deterministic pseudo-random
function seededOffset(i, seed) {
    const x = Math.sin(i * 1.3 + seed * 0.7) * 1.5;
    const z = Math.cos(i * 1.7 + seed * 1.1) * 1.5;
    const y = (Math.sin(i * 2.1 + seed * 0.3) * 0.25 + 0.25);
    return { x, y, z };
}

// Cluster definitions
const clusterDefs = [
    { name: 'A', color: 0xff4444, center: new THREE.Vector3(-4, 1, -2), count: 6 },
    { name: 'B', color: 0x4488ff, center: new THREE.Vector3(4, 1, -1), count: 5 },
    { name: 'C', color: 0x44ff88, center: new THREE.Vector3(0, 1, 4), count: 4 }
];

const nodes = []; // { mesh, clusterId, originalPos, circularPos, connections: [] }
const edges = []; // { line, type: 'intra'|'inter', clusterId (for intra), nodeA, nodeB }
const nodeGroup = new THREE.Group();
const edgeGroup = new THREE.Group();
scene.add(nodeGroup);
scene.add(edgeGroup);

let globalNodeId = 0;

// Create nodes
clusterDefs.forEach((cluster, ci) => {
    for (let i = 0; i < cluster.count; i++) {
        const offset = seededOffset(i, ci * 10);
        const pos = new THREE.Vector3(
            cluster.center.x + offset.x,
            Math.max(0.5, cluster.center.y + offset.y),
            cluster.center.z + offset.z
        );

        const geo = new THREE.SphereGeometry(0.3, 24, 24);
        const mat = new THREE.MeshStandardMaterial({
            color: cluster.color,
            emissive: cluster.color,
            emissiveIntensity: 0.3,
            roughness: 0.3,
            metalness: 0.5
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(pos);
        mesh.castShadow = true;
        mesh.receiveShadow = true;

        const nodeData = {
            id: globalNodeId,
            mesh,
            clusterId: ci,
            clusterName: cluster.name,
            originalPos: pos.clone(),
            circularPos: new THREE.Vector3(),
            targetPos: pos.clone(),
            connections: [],
            edgeIndices: []
        };

        mesh.userData = { nodeIndex: globalNodeId };
        nodes.push(nodeData);
        nodeGroup.add(mesh);
        globalNodeId++;
    }
});

// Compute circular positions
function computeCircularPositions() {
    const visibleNodes = nodes.filter(n => {
        const cv = [state.clusterAVisible, state.clusterBVisible, state.clusterCVisible];
        return cv[n.clusterId];
    });
    const count = visibleNodes.length;
    visibleNodes.forEach((node, i) => {
        const angle = (i / count) * Math.PI * 2;
        node.circularPos.set(
            Math.cos(angle) * 6,
            1,
            Math.sin(angle) * 6
        );
    });
    // Hidden nodes keep their original pos as circular
    nodes.forEach(n => {
        const cv = [state.clusterAVisible, state.clusterBVisible, state.clusterCVisible];
        if (!cv[n.clusterId]) {
            n.circularPos.copy(n.originalPos);
        }
    });
}

// Create intra-cluster edges (connect each node to 2-3 nearest neighbors)
function getClusterNodes(clusterId) {
    return nodes.filter(n => n.clusterId === clusterId);
}

function distance(a, b) {
    return a.originalPos.distanceTo(b.originalPos);
}

function createEdgeLine(nodeA, nodeB, color, opacity, type, clusterId) {
    const points = [nodeA.mesh.position.clone(), nodeB.mesh.position.clone()];
    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineBasicMaterial({
        color: color,
        transparent: true,
        opacity: opacity,
        linewidth: 1
    });
    const line = new THREE.Line(geo, mat);

    const edgeData = {
        line,
        type, // 'intra' or 'inter'
        clusterId,
        nodeA: nodeA.id,
        nodeB: nodeB.id,
        originalColor: color,
        originalOpacity: opacity
    };

    edges.push(edgeData);
    edgeGroup.add(line);

    nodeA.edgeIndices.push(edges.length - 1);
    nodeB.edgeIndices.push(edges.length - 1);
    nodeA.connections.push(nodeB.id);
    nodeB.connections.push(nodeA.id);

    return edgeData;
}

// Build intra-cluster edges
clusterDefs.forEach((cluster, ci) => {
    const clusterNodes = getClusterNodes(ci);

    clusterNodes.forEach(node => {
        // Find nearest neighbors
        const others = clusterNodes.filter(n => n.id !== node.id);
        others.sort((a, b) => distance(node, a) - distance(node, b));

        const connectCount = Math.min(2 + (node.id % 2), others.length); // 2 or 3
        for (let i = 0; i < connectCount; i++) {
            const neighbor = others[i];
            // Check if edge already exists
            const exists = edges.some(e =>
                (e.nodeA === node.id && e.nodeB === neighbor.id) ||
                (e.nodeA === neighbor.id && e.nodeB === node.id)
            );
            if (!exists) {
                createEdgeLine(node, neighbor, cluster.color, 0.5, 'intra', ci);
            }
        }
    });
});

// Build inter-cluster edges (3 bridge edges)
function findClosestPair(clusterIdA, clusterIdB) {
    const nodesA = getClusterNodes(clusterIdA);
    const nodesB = getClusterNodes(clusterIdB);
    let minDist = Infinity;
    let bestA = null, bestB = null;
    nodesA.forEach(a => {
        nodesB.forEach(b => {
            const d = distance(a, b);
            if (d < minDist) {
                minDist = d;
                bestA = a;
                bestB = b;
            }
        });
    });
    return { a: bestA, b: bestB };
}

const bridgeAB = findClosestPair(0, 1);
createEdgeLine(bridgeAB.a, bridgeAB.b, 0xffffff, 0.3, 'inter', -1);

const bridgeBC = findClosestPair(1, 2);
createEdgeLine(bridgeBC.a, bridgeBC.b, 0xffffff, 0.3, 'inter', -1);

const bridgeAC = findClosestPair(0, 2);
createEdgeLine(bridgeAC.a, bridgeAC.b, 0xffffff, 0.3, 'inter', -1);

state.edgeCount = edges.length;

// Add glow sprites to nodes
const spriteMaterial = new THREE.SpriteMaterial({
    map: createGlowTexture(),
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
});

function createGlowTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
    gradient.addColorStop(0, 'rgba(255,255,255,0.4)');
    gradient.addColorStop(0.3, 'rgba(255,255,255,0.1)');
    gradient.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 64, 64);
    const texture = new THREE.CanvasTexture(canvas);
    return texture;
}

nodes.forEach(node => {
    const clusterColor = clusterDefs[node.clusterId].color;
    const mat = spriteMaterial.clone();
    mat.color = new THREE.Color(clusterColor);
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(1.2, 1.2, 1.2);
    node.mesh.add(sprite);
    node.sprite = sprite;
});

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let previousHovered = null;

function onMouseMove(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
}

function onMouseClick(event) {
    if (state.hoveredNodeId !== null) {
        selectNode(state.hoveredNodeId);
    } else {
        deselectNode();
    }
}

function selectNode(nodeId) {
    state.selectedNodeId = nodeId;
    const node = nodes[nodeId];
    const panel = document.getElementById('info-panel');
    const clusterColors = ['#ff4444', '#4488ff', '#44ff88'];
    document.getElementById('info-title').textContent = `Node ${nodeId}`;
    document.getElementById('info-cluster').innerHTML = `Cluster: <span class="cluster-badge" style="background:${clusterColors[node.clusterId]};color:#fff">${node.clusterName}</span>`;
    document.getElementById('info-connections').textContent = `Connections: ${node.connections.length}`;
    panel.style.display = 'block';
}

function deselectNode() {
    state.selectedNodeId = null;
    document.getElementById('info-panel').style.display = 'none';
}

// Keyboard
function onKeyDown(event) {
    const key = event.key.toUpperCase();

    if (key === 'R') {
        // Reset view
        camera.position.copy(initialCameraPos);
        controls.target.copy(initialCameraTarget);
        controls.update();
        state.clusterAVisible = true;
        state.clusterBVisible = true;
        state.clusterCVisible = true;
        updateClusterButtons();
        updateVisibility();
    } else if (key === 'L') {
        // Toggle layout
        state.layoutMode = state.layoutMode === 'scattered' ? 'circular' : 'scattered';
        if (state.layoutMode === 'circular') {
            computeCircularPositions();
        }
        layoutTransitionStart = performance.now();
        layoutTransitioning = true;
        nodes.forEach(node => {
            node.transitionFrom = node.mesh.position.clone();
            node.targetPos = state.layoutMode === 'circular' ? node.circularPos.clone() : node.originalPos.clone();
        });
    } else if (key === 'E') {
        // Cycle edge mode
        const modes = ['all', 'intra-only', 'inter-only'];
        const idx = modes.indexOf(state.edgeMode);
        state.edgeMode = modes[(idx + 1) % modes.length];
        updateEdgeVisibility();
    }
}

let layoutTransitioning = false;
let layoutTransitionStart = 0;
const TRANSITION_DURATION = 1000;

// Cluster toggle buttons
document.getElementById('btn-cluster-a').addEventListener('click', () => {
    state.clusterAVisible = !state.clusterAVisible;
    updateClusterButtons();
    updateVisibility();
});
document.getElementById('btn-cluster-b').addEventListener('click', () => {
    state.clusterBVisible = !state.clusterBVisible;
    updateClusterButtons();
    updateVisibility();
});
document.getElementById('btn-cluster-c').addEventListener('click', () => {
    state.clusterCVisible = !state.clusterCVisible;
    updateClusterButtons();
    updateVisibility();
});

function updateClusterButtons() {
    document.getElementById('btn-cluster-a').classList.toggle('hidden', !state.clusterAVisible);
    document.getElementById('btn-cluster-b').classList.toggle('hidden', !state.clusterBVisible);
    document.getElementById('btn-cluster-c').classList.toggle('hidden', !state.clusterCVisible);
}

function updateVisibility() {
    const cv = [state.clusterAVisible, state.clusterBVisible, state.clusterCVisible];

    nodes.forEach(node => {
        node.mesh.visible = cv[node.clusterId];
    });

    edges.forEach(edge => {
        if (edge.type === 'intra') {
            edge.line.visible = cv[edge.clusterId];
        } else {
            // Inter-cluster: visible only if both clusters are visible
            const nodeA = nodes[edge.nodeA];
            const nodeB = nodes[edge.nodeB];
            edge.line.visible = cv[nodeA.clusterId] && cv[nodeB.clusterId];
        }
    });

    updateEdgeVisibility();

    // Recompute circular if in circular mode
    if (state.layoutMode === 'circular') {
        computeCircularPositions();
        layoutTransitionStart = performance.now();
        layoutTransitioning = true;
        nodes.forEach(node => {
            node.transitionFrom = node.mesh.position.clone();
            node.targetPos = node.circularPos.clone();
        });
    }

    // If selected node is now hidden, deselect
    if (state.selectedNodeId !== null && !nodes[state.selectedNodeId].mesh.visible) {
        deselectNode();
    }
}

function updateEdgeVisibility() {
    const cv = [state.clusterAVisible, state.clusterBVisible, state.clusterCVisible];

    edges.forEach(edge => {
        // First check cluster visibility
        let clusterVisible = true;
        if (edge.type === 'intra') {
            clusterVisible = cv[edge.clusterId];
        } else {
            const nodeA = nodes[edge.nodeA];
            const nodeB = nodes[edge.nodeB];
            clusterVisible = cv[nodeA.clusterId] && cv[nodeB.clusterId];
        }

        if (!clusterVisible) {
            edge.line.visible = false;
            return;
        }

        // Then check edge mode
        if (state.edgeMode === 'all') {
            edge.line.visible = true;
        } else if (state.edgeMode === 'intra-only') {
            edge.line.visible = edge.type === 'intra';
        } else if (state.edgeMode === 'inter-only') {
            edge.line.visible = edge.type === 'inter';
        }
    });
}

function updateEdgePositions() {
    edges.forEach(edge => {
        const posA = nodes[edge.nodeA].mesh.position;
        const posB = nodes[edge.nodeB].mesh.position;
        const positions = edge.line.geometry.attributes.position;
        positions.setXYZ(0, posA.x, posA.y, posA.z);
        positions.setXYZ(1, posB.x, posB.y, posB.z);
        positions.needsUpdate = true;
    });
}

function countVisibles() {
    const cv = [state.clusterAVisible, state.clusterBVisible, state.clusterCVisible];
    state.visibleNodeCount = nodes.filter(n => cv[n.clusterId]).length;
    state.visibleEdgeCount = edges.filter(e => e.line.visible).length;
}

// Event listeners
window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onMouseClick);
window.addEventListener('keydown', onKeyDown);
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const time = performance.now();
    const dt = clock.getDelta();

    controls.update();

    // Layout transition
    if (layoutTransitioning) {
        const elapsed = time - layoutTransitionStart;
        const t = Math.min(elapsed / TRANSITION_DURATION, 1);
        const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; // easeInOutQuad

        nodes.forEach(node => {
            if (node.transitionFrom && node.targetPos) {
                node.mesh.position.lerpVectors(node.transitionFrom, node.targetPos, eased);
            }
        });

        updateEdgePositions();

        if (t >= 1) {
            layoutTransitioning = false;
        }
    }

    // Raycasting for hover
    raycaster.setFromCamera(mouse, camera);
    const meshes = nodes.filter(n => n.mesh.visible).map(n => n.mesh);
    const intersects = raycaster.intersectObjects(meshes);

    // Reset previous hover
    if (previousHovered !== null) {
        const prevNode = nodes[previousHovered];
        if (state.selectedNodeId !== previousHovered) {
            prevNode.mesh.scale.set(1, 1, 1);
        }
        prevNode.mesh.material.emissiveIntensity = 0.3;

        // Reset edge colors
        prevNode.edgeIndices.forEach(ei => {
            const edge = edges[ei];
            edge.line.material.color.set(edge.originalColor);
            edge.line.material.opacity = edge.originalOpacity;
        });

        previousHovered = null;
        state.hoveredNodeId = null;
    }

    if (intersects.length > 0) {
        const hitMesh = intersects[0].object;
        const nodeIndex = hitMesh.userData.nodeIndex;
        if (nodeIndex !== undefined) {
            state.hoveredNodeId = nodeIndex;
            previousHovered = nodeIndex;
            const node = nodes[nodeIndex];

            if (state.selectedNodeId !== nodeIndex) {
                node.mesh.scale.set(1.8, 1.8, 1.8);
            }
            node.mesh.material.emissiveIntensity = 0.8;

            // Highlight connected edges
            node.edgeIndices.forEach(ei => {
                const edge = edges[ei];
                if (edge.line.visible) {
                    edge.line.material.color.set(0xffff00);
                    edge.line.material.opacity = 0.9;
                }
            });
        }
    }

    // Selected node pulsing
    if (state.selectedNodeId !== null) {
        const selNode = nodes[state.selectedNodeId];
        if (selNode.mesh.visible) {
            const pulse = 1.0 + 0.5 * (Math.sin(time * 0.005) + 1); // 1.0 to 2.0
            selNode.mesh.scale.set(pulse, pulse, pulse);
        }
    }

    // Floating animation for all nodes (subtle)
    nodes.forEach((node, i) => {
        if (!layoutTransitioning && node.mesh.visible) {
            const baseY = state.layoutMode === 'circular' ? node.circularPos.y : node.originalPos.y;
            node.mesh.position.y = baseY + Math.sin(time * 0.001 + i * 0.5) * 0.05;
        }
    });

    if (!layoutTransitioning) {
        updateEdgePositions();
    }

    // Update state
    state.cameraDistance = camera.position.length();
    countVisibles();

    // Update HUD
    document.getElementById('hud').innerHTML =
        `Nodes: ${state.visibleNodeCount} | Edges: ${state.visibleEdgeCount}<br>Layout: ${state.layoutMode} | Edge Mode: ${state.edgeMode}`;

    renderer.render(scene, camera);
}

// Initialize circular positions
computeCircularPositions();
state.initialized = true;

animate();

</script>
</body>
</html>
