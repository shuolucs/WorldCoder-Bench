<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Social Network Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0d0d1a;
      font-family: Arial, sans-serif;
      color: white;
    }
    canvas { display: block; }

    .ui-panel {
      position: absolute;
      background: rgba(20, 20, 35, 0.78);
      color: white;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
      font-size: 14px;
      line-height: 1.4;
      user-select: none;
    }

    #hud {
      top: 12px;
      left: 12px;
      min-width: 260px;
    }

    #info-panel {
      top: 12px;
      right: 12px;
      width: 220px;
      min-height: 80px;
    }

    #buttons {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: rgba(20, 20, 35, 0.85);
      color: white;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    button:hover {
      background: rgba(40, 40, 65, 0.95);
    }

    button.inactive {
      opacity: 0.45;
    }

    #help {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(20, 20, 35, 0.78);
      color: white;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div id="hud" class="ui-panel">Loading...</div>

  <div id="info-panel" class="ui-panel">
    <strong>No node selected</strong><br />
    Click a node to inspect it.
  </div>

  <div id="buttons">
    <button id="btn-cluster-a">Cluster A</button>
    <button id="btn-cluster-b">Cluster B</button>
    <button id="btn-cluster-c">Cluster C</button>
  </div>

  <div id="help">
    <strong>Controls</strong><br>
    Mouse: orbit / zoom<br>
    R: reset view<br>
    L: toggle layout<br>
    E: cycle edge mode
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#0d0d1a");

    const camera = new THREE.PerspectiveCamera(
      55,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    const initialCameraPosition = new THREE.Vector3(0, 12, 18);
    camera.position.copy(initialCameraPosition);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.2, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 15, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(1024, 1024);
    scene.add(dirLight);

    const platform = new THREE.Mesh(
      new THREE.CylinderGeometry(10, 10, 0.3, 64),
      new THREE.MeshStandardMaterial({ color: "#2a2a3e", roughness: 0.9, metalness: 0.1 })
    );
    platform.position.y = 0;
    platform.receiveShadow = true;
    scene.add(platform);

    const nodeGeometry = new THREE.SphereGeometry(0.3, 24, 24);

    const clusters = {
      A: { color: "#ff4444", center: new THREE.Vector3(-4, 1, -2), count: 6, visible: true },
      B: { color: "#4488ff", center: new THREE.Vector3(4, 1, -1), count: 5, visible: true },
      C: { color: "#44ff88", center: new THREE.Vector3(0, 1, 4), count: 4, visible: true }
    };

    const nodes = [];
    const edges = [];
    const clusterGroups = {
      A: { nodes: [], intraEdges: [] },
      B: { nodes: [], intraEdges: [] },
      C: { nodes: [], intraEdges: [] }
    };

    function deterministicOffset(i, clusterKey) {
      const clusterBias = { A: 0.17, B: 0.43, C: 0.71 }[clusterKey];
      const x = ((((i * 1.3 + clusterBias) % 3) / 3) * 3.0) - 1.5;
      const z = ((((i * 2.1 + clusterBias * 2) % 3) / 3) * 3.0) - 1.5;
      const y = Math.max(0.5, 1 + ((((i * 0.9 + clusterBias * 3) % 1) * 1.0) - 0.5));
      return new THREE.Vector3(x, y - 1, z);
    }

    let globalNodeId = 0;

    for (const clusterKey of ["A", "B", "C"]) {
      const cluster = clusters[clusterKey];
      for (let i = 0; i < cluster.count; i++) {
        const offset = deterministicOffset(i, clusterKey);
        const pos = cluster.center.clone().add(offset);
        pos.y = Math.max(0.5, pos.y);

        const mat = new THREE.MeshStandardMaterial({
          color: cluster.color,
          emissive: new THREE.Color(cluster.color),
          emissiveIntensity: 0.3,
          roughness: 0.35,
          metalness: 0.15
        });

        const mesh = new THREE.Mesh(nodeGeometry, mat);
        mesh.position.copy(pos);
        mesh.castShadow = true;
        mesh.receiveShadow = true;

        const node = {
          id: globalNodeId++,
          cluster: clusterKey,
          mesh,
          baseScale: 1,
          scatteredPosition: pos.clone(),
          targetPosition: pos.clone(),
          circularPosition: pos.clone(),
          connectedEdges: [],
          connectionIds: new Set()
        };

        mesh.userData.nodeId = node.id;
        scene.add(mesh);
        nodes.push(node);
        clusterGroups[clusterKey].nodes.push(node);
      }
    }

    function makeLine(p1, p2, color, opacity, isCross, clusterKey = null) {
      const geometry = new THREE.BufferGeometry().setFromPoints([p1.clone(), p2.clone()]);
      const material = new THREE.LineBasicMaterial({
        color,
        transparent: true,
        opacity
      });
      const line = new THREE.Line(geometry, material);
      scene.add(line);
      return {
        line,
        geometry,
        material,
        from: null,
        to: null,
        isCross,
        cluster: clusterKey,
        baseColor: new THREE.Color(color),
        highlightColor: new THREE.Color("#ffff00")
      };
    }

    function connectNodes(nodeA, nodeB, color, opacity, isCross = false, clusterKey = null) {
      const edge = makeLine(nodeA.mesh.position, nodeB.mesh.position, color, opacity, isCross, clusterKey);
      edge.from = nodeA.id;
      edge.to = nodeB.id;
      edges.push(edge);

      nodeA.connectedEdges.push(edge);
      nodeB.connectedEdges.push(edge);
      nodeA.connectionIds.add(nodeB.id);
      nodeB.connectionIds.add(nodeA.id);

      if (!isCross && clusterKey) {
        clusterGroups[clusterKey].intraEdges.push(edge);
      }
      return edge;
    }

    function dist(a, b) {
      return a.mesh.position.distanceTo(b.mesh.position);
    }

    for (const clusterKey of ["A", "B", "C"]) {
      const clusterNodes = clusterGroups[clusterKey].nodes;
      const targetNeighborCount = clusterKey === "A" ? 3 : 2;

      for (let i = 0; i < clusterNodes.length; i++) {
        const source = clusterNodes[i];
        const sorted = clusterNodes
          .filter(n => n !== source)
          .map(n => ({ node: n, d: dist(source, n) }))
          .sort((a, b) => a.d - b.d);

        const desired = Math.min(targetNeighborCount + (i % 2), sorted.length);
        for (let j = 0; j < desired; j++) {
          const target = sorted[j].node;
          const exists = edges.some(e =>
            !e.isCross &&
            ((e.from === source.id && e.to === target.id) || (e.from === target.id && e.to === source.id))
          );
          if (!exists) {
            connectNodes(source, target, clusters[clusterKey].color, 0.5, false, clusterKey);
          }
        }
      }
    }

    const a0 = clusterGroups.A.nodes[0];
    const b0 = clusterGroups.B.nodes[0];
    const c0 = clusterGroups.C.nodes[0];

    connectNodes(a0, b0, "#ffffff", 0.3, true);
    connectNodes(b0, c0, "#ffffff", 0.3, true);
    connectNodes(clusterGroups.A.nodes[1], c0, "#ffffff", 0.3, true);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const hud = document.getElementById("hud");
    const infoPanel = document.getElementById("info-panel");
    const btnA = document.getElementById("btn-cluster-a");
    const btnB = document.getElementById("btn-cluster-b");
    const btnC = document.getElementById("btn-cluster-c");

    const state = {
      nodeCount: nodes.length,
      edgeCount: edges.length,
      clusterAVisible: true,
      clusterBVisible: true,
      clusterCVisible: true,
      selectedNodeId: null,
      hoveredNodeId: null,
      layoutMode: "scattered",
      edgeMode: "all",
      visibleNodeCount: nodes.length,
      visibleEdgeCount: edges.length,
      cameraDistance: camera.position.length(),
      initialized: false
    };

    window.__3D_STATE__ = state;

    function getNodeById(id) {
      return nodes.find(n => n.id === id) || null;
    }

    function updateInfoPanel() {
      if (state.selectedNodeId == null) {
        infoPanel.innerHTML = `<strong>No node selected</strong><br>Click a node to inspect it.`;
        return;
      }
      const node = getNodeById(state.selectedNodeId);
      if (!node) return;
      infoPanel.innerHTML = `
        <strong>Node ${node.id}</strong><br>
        Cluster ${node.cluster}<br>
        Connections: ${node.connectionIds.size}
      `;
    }

    function updateButtonStyles() {
      btnA.classList.toggle("inactive", !state.clusterAVisible);
      btnB.classList.toggle("inactive", !state.clusterBVisible);
      btnC.classList.toggle("inactive", !state.clusterCVisible);
    }

    function clusterVisible(clusterKey) {
      return state[`cluster${clusterKey}Visible`];
    }

    function updateCircularTargets() {
      const visibleNodes = nodes.filter(n => clusterVisible(n.cluster));
      const radius = 6;
      const count = visibleNodes.length;
      visibleNodes.forEach((node, i) => {
        const angle = (i / Math.max(count, 1)) * Math.PI * 2;
        node.circularPosition.set(
          Math.cos(angle) * radius,
          1,
          Math.sin(angle) * radius
        );
      });
      nodes.forEach(node => {
        node.targetPosition.copy(
          state.layoutMode === "circular" ? node.circularPosition : node.scatteredPosition
        );
      });
    }

    function updateEdgeGeometry(edge) {
      const fromNode = getNodeById(edge.from);
      const toNode = getNodeById(edge.to);
      const positions = edge.geometry.attributes.position.array;
      positions[0] = fromNode.mesh.position.x;
      positions[1] = fromNode.mesh.position.y;
      positions[2] = fromNode.mesh.position.z;
      positions[3] = toNode.mesh.position.x;
      positions[4] = toNode.mesh.position.y;
      positions[5] = toNode.mesh.position.z;
      edge.geometry.attributes.position.needsUpdate = true;
    }

    function updateVisibility() {
      for (const clusterKey of ["A", "B", "C"]) {
        const visible = clusterVisible(clusterKey);
        clusterGroups[clusterKey].nodes.forEach(node => {
          node.mesh.visible = visible;
        });
      }

      edges.forEach(edge => {
        const fromNode = getNodeById(edge.from);
        const toNode = getNodeById(edge.to);
        const fromVisible = clusterVisible(fromNode.cluster);
        const toVisible = clusterVisible(toNode.cluster);

        let visible = fromVisible && toVisible;

        if (state.edgeMode === "intra-only" && edge.isCross) visible = false;
        if (state.edgeMode === "inter-only" && !edge.isCross) visible = false;

        edge.line.visible = visible;
      });

      updateCircularTargets();
      updateButtonStyles();
    }

    function resetHoverEffects() {
      edges.forEach(edge => {
        edge.material.color.copy(edge.baseColor);
      });
      nodes.forEach(node => {
        node.mesh.material.emissiveIntensity = 0.3;
      });
    }

    function applyHover(nodeId) {
      resetHoverEffects();
      state.hoveredNodeId = nodeId;
      if (nodeId == null) return;
      const node = getNodeById(nodeId);
      if (!node || !node.mesh.visible) return;
      node.mesh.material.emissiveIntensity = 0.8;
      node.connectedEdges.forEach(edge => {
        edge.material.color.set("#ffff00");
      });
    }

    function pointerToNDC(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    window.addEventListener("mousemove", (event) => {
      pointerToNDC(event);
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(nodes.map(n => n.mesh).filter(m => m.visible));
      if (intersects.length > 0) {
        applyHover(intersects[0].object.userData.nodeId);
      } else {
        applyHover(null);
      }
    });

    window.addEventListener("click", (event) => {
      pointerToNDC(event);
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(nodes.map(n => n.mesh).filter(m => m.visible));
      if (intersects.length > 0) {
        state.selectedNodeId = intersects[0].object.userData.nodeId;
      } else {
        state.selectedNodeId = null;
      }
      updateInfoPanel();
    });

    function toggleCluster(clusterKey) {
      const key = `cluster${clusterKey}Visible`;
      state[key] = !state[key];
      updateVisibility();
    }

    btnA.addEventListener("click", () => toggleCluster("A"));
    btnB.addEventListener("click", () => toggleCluster("B"));
    btnC.addEventListener("click", () => toggleCluster("C"));

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (key === "r") {
        camera.position.copy(initialCameraPosition);
        controls.target.set(0, 1.2, 0);
        controls.update();
        state.clusterAVisible = true;
        state.clusterBVisible = true;
        state.clusterCVisible = true;
        updateVisibility();
      }

      if (key === "l") {
        state.layoutMode = state.layoutMode === "scattered" ? "circular" : "scattered";
        updateCircularTargets();
      }

      if (key === "e") {
        const modes = ["all", "intra-only", "inter-only"];
        const idx = modes.indexOf(state.edgeMode);
        state.edgeMode = modes[(idx + 1) % modes.length];
        updateVisibility();
      }
    });

    const clock = new THREE.Clock();

    updateCircularTargets();
    updateVisibility();
    updateInfoPanel();

    state.initialized = true;

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      nodes.forEach(node => {
        node.mesh.position.lerp(node.targetPosition, 0.08);

        let scale = 1.0;

        if (state.hoveredNodeId === node.id && node.mesh.visible) {
          scale = Math.max(scale, 1.8);
        }

        if (state.selectedNodeId === node.id && node.mesh.visible) {
          scale = Math.max(scale, 1.5 + 0.5 * Math.sin(t * 4.0));
        }

        node.mesh.scale.setScalar(scale);
      });

      edges.forEach(edge => {
        updateEdgeGeometry(edge);
      });

      controls.update();

      const visibleNodeCount = nodes.filter(n => n.mesh.visible).length;
      const visibleEdgeCount = edges.filter(e => e.line.visible).length;

      state.visibleNodeCount = visibleNodeCount;
      state.visibleEdgeCount = visibleEdgeCount;
      state.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));

      hud.textContent = `Nodes: ${state.visibleNodeCount} | Edges: ${state.visibleEdgeCount} | Layout: ${state.layoutMode} | Edge Mode: ${state.edgeMode}`;

      window.__3D_STATE__ = {
        nodeCount: state.nodeCount,
        edgeCount: state.edgeCount,
        clusterAVisible: state.clusterAVisible,
        clusterBVisible: state.clusterBVisible,
        clusterCVisible: state.clusterCVisible,
        selectedNodeId: state.selectedNodeId,
        hoveredNodeId: state.hoveredNodeId,
        layoutMode: state.layoutMode,
        edgeMode: state.edgeMode,
        visibleNodeCount: state.visibleNodeCount,
        visibleEdgeCount: state.visibleEdgeCount,
        cameraDistance: state.cameraDistance,
        initialized: state.initialized
      };

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
