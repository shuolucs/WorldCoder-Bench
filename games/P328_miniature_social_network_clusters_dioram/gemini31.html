<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Social Network Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0d0d1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .ui-panel {
            position: absolute;
            background: rgba(20, 20, 40, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        #hud {
            top: 20px;
            left: 20px;
            font-size: 14px;
            line-height: 1.6;
        }
        #info-panel {
            top: 20px;
            right: 20px;
            width: 220px;
            display: none;
        }
        #info-panel h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 5px;
        }
        #info-panel p {
            margin: 5px 0;
            font-size: 14px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        button {
            background: rgba(40, 40, 70, 0.9);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover {
            background: rgba(60, 60, 100, 0.9);
        }
        button.inactive {
            opacity: 0.5;
            text-decoration: line-through;
        }
        #instructions {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 12px;
            pointer-events: none;
            text-align: center;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud" class="ui-panel">
        <div id="hud-nodes">Nodes: 0</div>
        <div id="hud-edges">Edges: 0</div>
        <div id="hud-layout">Layout: scattered</div>
        <div id="hud-edge-mode">Edge Mode: all</div>
    </div>

    <div id="info-panel" class="ui-panel">
        <h3 id="info-title">Node Info</h3>
        <p id="info-cluster">Cluster: -</p>
        <p id="info-connections">Connections: 0</p>
    </div>

    <div id="instructions">
        Click: Select | Hover: Highlight | R: Reset View | L: Toggle Layout | E: Cycle Edge Mode
    </div>

    <div id="controls">
        <button id="btn-cluster-a" style="border-color: #ff4444;">Cluster A</button>
        <button id="btn-cluster-b" style="border-color: #4488ff;">Cluster B</button>
        <button id="btn-cluster-c" style="border-color: #44ff88;">Cluster C</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            nodeCount: 15,
            edgeCount: 0,
            clusterAVisible: true,
            clusterBVisible: true,
            clusterCVisible: true,
            selectedNodeId: null,
            hoveredNodeId: null,
            layoutMode: 'scattered',
            edgeMode: 'all',
            visibleNodeCount: 0,
            visibleEdgeCount: 0,
            cameraDistance: 0,
            initialized: false
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0d0d1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 18);
        const initialCameraPos = camera.position.clone();

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        scene.add(dirLight);

        // --- Platform ---
        const platformGeo = new THREE.CylinderGeometry(10, 10, 0.3, 64);
        const platformMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3e, roughness: 0.8, metalness: 0.2 });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = 0;
        platform.receiveShadow = true;
        scene.add(platform);

        // --- Data & Clusters ---
        const clusterDefs = {
            'A': { color: 0xff4444, count: 6, center: new THREE.Vector3(-4, 1, -2) },
            'B': { color: 0x4488ff, count: 5, center: new THREE.Vector3(4, 1, -1) },
            'C': { color: 0x44ff88, count: 4, center: new THREE.Vector3(0, 1, 4) }
        };

        const nodes = [];
        const edges = [];
        let nodeIdCounter = 0;

        // Deterministic random
        const pseudoRandom = (seed) => {
            const x = Math.sin(seed * 1.3) * 10000;
            return x - Math.floor(x);
        };

        const nodeGeo = new THREE.SphereGeometry(0.3, 32, 32);

        // Generate Nodes
        Object.keys(clusterDefs).forEach((clusterId, cIdx) => {
            const def = clusterDefs[clusterId];
            for (let i = 0; i < def.count; i++) {
                const seed = cIdx * 100 + i;
                
                // Scattered position
                const offsetX = (pseudoRandom(seed) * 3) - 1.5;
                const offsetY = (pseudoRandom(seed + 1) * 1) - 0.5;
                const offsetZ = (pseudoRandom(seed + 2) * 3) - 1.5;
                
                const scatteredPos = new THREE.Vector3(
                    def.center.x + offsetX,
                    Math.max(0.5, def.center.y + offsetY),
                    def.center.z + offsetZ
                );

                // Circular position (calculated later)
                const circularPos = new THREE.Vector3();

                const mat = new THREE.MeshStandardMaterial({
                    color: def.color,
                    emissive: def.color,
                    emissiveIntensity: 0.3,
                    roughness: 0.4,
                    metalness: 0.1
                });

                const mesh = new THREE.Mesh(nodeGeo, mat);
                mesh.position.copy(scatteredPos);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);

                nodes.push({
                    id: nodeIdCounter++,
                    cluster: clusterId,
                    mesh: mesh,
                    color: def.color,
                    scatteredPos: scatteredPos,
                    circularPos: circularPos,
                    connections: [],
                    baseScale: 1.0
                });
            }
        });

        // Calculate Circular Layout Positions
        nodes.forEach((node, i) => {
            const angle = (i / nodes.length) * Math.PI * 2;
            node.circularPos.set(Math.cos(angle) * 6, 1, Math.sin(angle) * 6);
        });

        // Generate Edges
        const createEdge = (source, target, type, color, opacity) => {
            const points = [source.mesh.position, target.mesh.position];
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const mat = new THREE.LineBasicMaterial({ 
                color: color, 
                transparent: true, 
                opacity: opacity,
                depthWrite: false
            });
            const line = new THREE.Line(geo, mat);
            scene.add(line);

            const edge = {
                source: source,
                target: target,
                line: line,
                type: type, // 'intra' or 'inter'
                baseColor: color,
                baseOpacity: opacity
            };
            edges.push(edge);
            source.connections.push(edge);
            target.connections.push(edge);
            return edge;
        };

        // Intra-cluster edges (2-3 nearest neighbors)
        Object.keys(clusterDefs).forEach(clusterId => {
            const clusterNodes = nodes.filter(n => n.cluster === clusterId);
            clusterNodes.forEach(node => {
                // Sort others by distance
                const others = clusterNodes.filter(n => n !== node).map(n => ({
                    node: n,
                    dist: node.scatteredPos.distanceTo(n.scatteredPos)
                })).sort((a, b) => a.dist - b.dist);

                const numConnections = Math.floor(pseudoRandom(node.id * 7) * 2) + 2; // 2 or 3
                
                for (let i = 0; i < Math.min(numConnections, others.length); i++) {
                    const target = others[i].node;
                    // Check if edge already exists
                    const exists = edges.some(e => 
                        (e.source === node && e.target === target) || 
                        (e.source === target && e.target === node)
                    );
                    if (!exists) {
                        createEdge(node, target, 'intra', clusterDefs[clusterId].color, 0.5);
                    }
                }
            });
        });

        // Inter-cluster edges
        const getNodesByCluster = (c) => nodes.filter(n => n.cluster === c);
        const nodesA = getNodesByCluster('A');
        const nodesB = getNodesByCluster('B');
        const nodesC = getNodesByCluster('C');

        createEdge(nodesA[0], nodesB[0], 'inter', 0xffffff, 0.3);
        createEdge(nodesB[1], nodesC[0], 'inter', 0xffffff, 0.3);
        createEdge(nodesA[1], nodesC[1], 'inter', 0xffffff, 0.3);

        state.edgeCount = edges.length;

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let layoutTransitionTime = 0;
        let isTransitioning = false;

        const updateVisibility = () => {
            let vNodes = 0;
            let vEdges = 0;

            nodes.forEach(node => {
                const isVisible = state[`cluster${node.cluster}Visible`];
                node.mesh.visible = isVisible;
                if (isVisible) vNodes++;
            });

            edges.forEach(edge => {
                const sourceVisible = state[`cluster${edge.source.cluster}Visible`];
                const targetVisible = state[`cluster${edge.target.cluster}Visible`];
                
                let edgeVisible = false;
                if (sourceVisible && targetVisible) {
                    if (state.edgeMode === 'all') edgeVisible = true;
                    else if (state.edgeMode === 'intra-only' && edge.type === 'intra') edgeVisible = true;
                    else if (state.edgeMode === 'inter-only' && edge.type === 'inter') edgeVisible = true;
                }
                
                edge.line.visible = edgeVisible;
                if (edgeVisible) vEdges++;
            });

            state.visibleNodeCount = vNodes;
            state.visibleEdgeCount = vEdges;

            // Clear selection/hover if hidden
            if (state.selectedNodeId !== null) {
                const selectedNode = nodes.find(n => n.id === state.selectedNodeId);
                if (!selectedNode.mesh.visible) {
                    state.selectedNodeId = null;
                    document.getElementById('info-panel').style.display = 'none';
                    selectedNode.mesh.scale.setScalar(1);
                }
            }
        };

        const resetHoverState = () => {
            nodes.forEach(node => {
                if (node.id !== state.selectedNodeId) {
                    node.mesh.scale.setScalar(node.baseScale);
                }
                node.mesh.material.emissiveIntensity = 0.3;
            });
            edges.forEach(edge => {
                edge.line.material.color.setHex(edge.baseColor);
                edge.line.material.opacity = edge.baseOpacity;
            });
        };

        const applyHoverState = (nodeId) => {
            const node = nodes.find(n => n.id === nodeId);
            if (!node) return;

            node.mesh.scale.setScalar(1.8);
            node.mesh.material.emissiveIntensity = 0.8;

            node.connections.forEach(edge => {
                if (edge.line.visible) {
                    edge.line.material.color.setHex(0xffff00);
                    edge.line.material.opacity = 0.8;
                }
            });
        };

        // Mouse Move (Hover)
        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const visibleMeshes = nodes.filter(n => n.mesh.visible).map(n => n.mesh);
            const intersects = raycaster.intersectObjects(visibleMeshes);

            resetHoverState();

            if (intersects.length > 0) {
                const hoveredMesh = intersects[0].object;
                const hoveredNode = nodes.find(n => n.mesh === hoveredMesh);
                state.hoveredNodeId = hoveredNode.id;
                applyHoverState(hoveredNode.id);
                document.body.style.cursor = 'pointer';
            } else {
                state.hoveredNodeId = null;
                document.body.style.cursor = 'default';
            }
        });

        // Click (Select)
        window.addEventListener('click', () => {
            if (state.hoveredNodeId !== null) {
                state.selectedNodeId = state.hoveredNodeId;
                const node = nodes.find(n => n.id === state.selectedNodeId);
                
                const infoPanel = document.getElementById('info-panel');
                infoPanel.style.display = 'block';
                document.getElementById('info-title').innerText = `Node ${node.id}`;
                document.getElementById('info-cluster').innerText = `Cluster: ${node.cluster}`;
                document.getElementById('info-connections').innerText = `Connections: ${node.connections.length}`;
            } else {
                state.selectedNodeId = null;
                document.getElementById('info-panel').style.display = 'none';
                nodes.forEach(n => n.mesh.scale.setScalar(1));
            }
        });

        // Buttons
        const setupButton = (id, cluster) => {
            const btn = document.getElementById(id);
            btn.addEventListener('click', () => {
                const prop = `cluster${cluster}Visible`;
                state[prop] = !state[prop];
                btn.classList.toggle('inactive', !state[prop]);
                updateVisibility();
            });
        };
        setupButton('btn-cluster-a', 'A');
        setupButton('btn-cluster-b', 'B');
        setupButton('btn-cluster-c', 'C');

        // Keyboard
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'r') {
                // Reset
                camera.position.copy(initialCameraPos);
                controls.target.set(0, 0, 0);
                state.clusterAVisible = true;
                state.clusterBVisible = true;
                state.clusterCVisible = true;
                document.getElementById('btn-cluster-a').classList.remove('inactive');
                document.getElementById('btn-cluster-b').classList.remove('inactive');
                document.getElementById('btn-cluster-c').classList.remove('inactive');
                updateVisibility();
            } else if (key === 'l') {
                // Layout Toggle
                state.layoutMode = state.layoutMode === 'scattered' ? 'circular' : 'scattered';
                isTransitioning = true;
                layoutTransitionTime = 0;
            } else if (key === 'e') {
                // Edge Mode
                const modes = ['all', 'intra-only', 'inter-only'];
                const idx = modes.indexOf(state.edgeMode);
                state.edgeMode = modes[(idx + 1) % modes.length];
                updateVisibility();
            }
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        updateVisibility();
        state.initialized = true;

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            controls.update();

            // Layout Transition
            if (isTransitioning) {
                layoutTransitionTime += delta;
                const t = Math.min(layoutTransitionTime / 1.0, 1.0); // 1 second duration
                
                // Easing function (easeInOutQuad)
                const easeT = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

                nodes.forEach(node => {
                    const targetPos = state.layoutMode === 'scattered' ? node.scatteredPos : node.circularPos;
                    const startPos = state.layoutMode === 'scattered' ? node.circularPos : node.scatteredPos;
                    node.mesh.position.lerpVectors(startPos, targetPos, easeT);
                });

                if (t >= 1.0) isTransitioning = false;
            }

            // Pulsing Animation for Selected Node
            nodes.forEach(node => {
                if (node.id === state.selectedNodeId && node.id !== state.hoveredNodeId) {
                    const scale = 1.0 + (Math.sin(time * 5) * 0.5 + 0.5); // Oscillate 1.0 to 2.0
                    node.mesh.scale.setScalar(scale);
                } else if (node.id !== state.hoveredNodeId) {
                    node.mesh.scale.setScalar(1.0);
                }
            });

            // Update Edge Geometries (since nodes move)
            edges.forEach(edge => {
                if (edge.line.visible) {
                    const positions = edge.line.geometry.attributes.position.array;
                    positions[0] = edge.source.mesh.position.x;
                    positions[1] = edge.source.mesh.position.y;
                    positions[2] = edge.source.mesh.position.z;
                    positions[3] = edge.target.mesh.position.x;
                    positions[4] = edge.target.mesh.position.y;
                    positions[5] = edge.target.mesh.position.z;
                    edge.line.geometry.attributes.position.needsUpdate = true;
                }
            });

            // Update State & HUD
            state.cameraDistance = camera.position.distanceTo(controls.target);
            
            document.getElementById('hud-nodes').innerText = `Nodes: ${state.visibleNodeCount}`;
            document.getElementById('hud-edges').innerText = `Edges: ${state.visibleEdgeCount}`;
            document.getElementById('hud-layout').innerText = `Layout: ${state.layoutMode}`;
            document.getElementById('hud-edge-mode').innerText = `Edge Mode: ${state.edgeMode}`;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
