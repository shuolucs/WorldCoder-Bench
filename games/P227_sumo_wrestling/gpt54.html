<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duck Sumo 3D</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1b1b1b;
      font-family: Arial, sans-serif;
    }

    #ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
      color: white;
    }

    #score {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 32px;
      font-weight: bold;
      text-shadow: 2px 2px 4px black;
      z-index: 10;
    }

    #bars {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      z-index: 10;
    }

    .label {
      font-size: 14px;
      margin-bottom: 4px;
      text-shadow: 1px 1px 2px black;
    }

    .barContainer {
      width: 100%;
      height: 16px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.5);
      margin-bottom: 10px;
      border-radius: 4px;
      overflow: hidden;
    }

    .barFill {
      height: 100%;
      width: 100%;
      transition: width 0.08s linear;
    }

    #playerHealthFill { background: #4da6ff; }
    #aiHealthFill { background: #ff6666; }
    #playerStaminaFill { background: #3399ff; }

    #roundText {
      position: absolute;
      top: 140px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 42px;
      font-weight: bold;
      text-shadow: 2px 2px 6px black;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 10;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.5);
      pointer-events: auto;
      z-index: 20;
    }

    #overlayContent {
      text-align: center;
      color: white;
      text-shadow: 2px 2px 4px black;
    }

    #overlayTitle {
      font-size: 48px;
      margin-bottom: 20px;
      font-weight: bold;
    }

    button {
      pointer-events: auto;
      padding: 12px 24px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #ffffff;
      color: #111;
      font-weight: bold;
    }

    button:hover {
      background: #e5e5e5;
    }

    #restartBtn {
      display: none;
    }

    #fps {
      position: absolute;
      top: 10px;
      right: 12px;
      color: white;
      font-size: 14px;
      text-shadow: 1px 1px 2px black;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="score">Player: 0 - AI: 0</div>

    <div id="bars">
      <div class="label">Player Health</div>
      <div class="barContainer"><div id="playerHealthFill" class="barFill"></div></div>

      <div class="label">AI Health</div>
      <div class="barContainer"><div id="aiHealthFill" class="barFill"></div></div>

      <div class="label">Player Stamina</div>
      <div class="barContainer"><div id="playerStaminaFill" class="barFill"></div></div>
    </div>

    <div id="roundText">ROUND 1</div>
    <div id="fps">FPS: 0</div>

    <div id="overlay">
      <div id="overlayContent">
        <div id="overlayTitle">Duck Sumo</div>
        <button id="startBtn">Start Game</button>
        <button id="restartBtn">Restart</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const ringRadius = 5.0;
    const ringHeight = 0.3;
    const ringY = ringHeight / 2;

    const dohyo = new THREE.Mesh(
      new THREE.CylinderGeometry(ringRadius, ringRadius, ringHeight, 64),
      new THREE.MeshStandardMaterial({ color: new THREE.Color('#DEB887') })
    );
    dohyo.position.set(0, ringY, 0);
    scene.add(dohyo);

    const border = new THREE.Mesh(
      new THREE.TorusGeometry(ringRadius, 0.12, 16, 100),
      new THREE.MeshStandardMaterial({ color: 0xffffff })
    );
    border.rotation.x = Math.PI / 2;
    border.position.y = ringHeight + 0.02;
    scene.add(border);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(50, 50),
      new THREE.MeshStandardMaterial({ color: 0x0b6623 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const ui = {
      score: document.getElementById('score'),
      playerHealthFill: document.getElementById('playerHealthFill'),
      aiHealthFill: document.getElementById('aiHealthFill'),
      playerStaminaFill: document.getElementById('playerStaminaFill'),
      roundText: document.getElementById('roundText'),
      overlay: document.getElementById('overlay'),
      overlayTitle: document.getElementById('overlayTitle'),
      startBtn: document.getElementById('startBtn'),
      restartBtn: document.getElementById('restartBtn'),
      fps: document.getElementById('fps')
    };

    const keys = {
      w: false,
      a: false,
      s: false,
      d: false,
      space: false
    };

    function safeNum(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function setTint(model, colorHex) {
      model.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = false;
          child.receiveShadow = true;
          child.material = child.material.clone();
          if (child.material.color) {
            child.material.color.multiply(new THREE.Color(colorHex));
          }
        }
      });
    }

    function createDuckState(type) {
      return {
        type,
        model: null,
        position: { x: type === 'player' ? -2 : 2, z: 0 },
        velocity: { x: 0, z: 0 },
        mass: 1.0,
        health: 100,
        stamina: 100,
        attacking: false,
        attackCooldown: 0,
        facing: new THREE.Vector3(type === 'player' ? 1 : -1, 0, 0),
        lastAttackTime: 0
      };
    }

    const player = createDuckState('player');
    const ai = createDuckState('ai');

    let gameState = 'waiting';
    let playerScore = 0;
    let aiScore = 0;
    let roundNumber = 1;
    let winner = null;
    let lastCollisionTime = 0;
    let roundMessageTimeout = null;
    let countdownStart = 0;

    window.__3D_STATE__ = {
      gameState: 'waiting',
      playerScore: 0,
      aiScore: 0,
      playerPos: { x: -2, z: 0 },
      aiPos: { x: 2, z: 0 },
      playerStamina: 100,
      aiStamina: 100,
      playerVelocity: { x: 0, z: 0 },
      aiVelocity: { x: 0, z: 0 },
      roundNumber: 1,
      playerDistFromCenter: 2,
      aiDistFromCenter: 2,
      winner: null,
      lastCollisionTime: 0,
      playerAttacking: false,
      modelsLoaded: false,
      ringRadius: 5.0
    };

    const loader = new GLTFLoader();
    let modelsLoadedCount = 0;

    function onModelLoaded() {
      modelsLoadedCount++;
      if (modelsLoadedCount >= 2) {
        window.__3D_STATE__.modelsLoaded = true;
      }
    }

    loader.load(
      'Duck.glb',
      (gltf) => {
        const duck = gltf.scene;
        duck.scale.setScalar(2.0);
        setTint(duck, '#6666ff');
        duck.position.set(player.position.x, ringHeight, player.position.z);
        duck.rotation.y = -Math.PI / 2;
        scene.add(duck);
        player.model = duck;
        onModelLoaded();
      },
      undefined,
      (err) => console.error('Failed to load player duck:', err)
    );

    loader.load(
      'Duck.glb',
      (gltf) => {
        const duck = gltf.scene;
        duck.scale.setScalar(2.0);
        setTint(duck, '#ff6666');
        duck.position.set(ai.position.x, ringHeight, ai.position.z);
        duck.rotation.y = Math.PI / 2;
        scene.add(duck);
        ai.model = duck;
        onModelLoaded();
      },
      undefined,
      (err) => console.error('Failed to load AI duck:', err)
    );

    function resetDuck(duck) {
      duck.position.x = duck.type === 'player' ? -2 : 2;
      duck.position.z = 0;
      duck.velocity.x = 0;
      duck.velocity.z = 0;
      duck.health = 100;
      duck.stamina = 100;
      duck.attacking = false;
      duck.attackCooldown = 0;
      duck.facing.set(duck.type === 'player' ? 1 : -1, 0, 0);
      updateDuckTransform(duck);
    }

    function resetRound() {
      resetDuck(player);
      resetDuck(ai);
      gameState = 'countdown';
      countdownStart = performance.now();
      showRoundText(`ROUND ${roundNumber}`);
    }

    function startGame() {
      playerScore = 0;
      aiScore = 0;
      roundNumber = 1;
      winner = null;
      ui.overlay.style.display = 'none';
      ui.startBtn.style.display = 'none';
      ui.restartBtn.style.display = 'none';
      resetRound();
    }

    function endGame(win) {
      winner = win;
      gameState = 'gameOver';
      ui.overlay.style.display = 'flex';
      ui.startBtn.style.display = 'none';
      ui.restartBtn.style.display = 'inline-block';
      ui.overlayTitle.textContent = win === 'player' ? 'PLAYER WINS!' : 'AI WINS!';
    }

    function showRoundText(text) {
      ui.roundText.textContent = text;
      ui.roundText.style.opacity = '1';
      if (roundMessageTimeout) clearTimeout(roundMessageTimeout);
      roundMessageTimeout = setTimeout(() => {
        ui.roundText.style.opacity = '0';
      }, 2000);
    }

    function updateDuckTransform(duck) {
      if (!duck.model) return;
      duck.position.x = safeNum(duck.position.x);
      duck.position.z = safeNum(duck.position.z);

      duck.model.position.set(duck.position.x, ringHeight, duck.position.z);

      if (duck.type === 'player') {
        const moveLen = Math.hypot(duck.velocity.x, duck.velocity.z);
        if (moveLen > 0.001) {
          duck.facing.set(duck.velocity.x / moveLen, 0, duck.velocity.z / moveLen);
        }
      } else {
        const dx = player.position.x - duck.position.x;
        const dz = player.position.z - duck.position.z;
        const len = Math.hypot(dx, dz);
        if (len > 0.001) {
          duck.facing.set(dx / len, 0, dz / len);
        }
      }

      const angle = Math.atan2(duck.facing.x, duck.facing.z);
      duck.model.rotation.y = angle;
    }

    function applyMovementInput() {
      let ax = 0;
      let az = 0;

      if (keys.w) az -= 0.5;
      if (keys.s) az += 0.5;
      if (keys.a) ax -= 0.5;
      if (keys.d) ax += 0.5;

      const len = Math.hypot(ax, az);
      if (len > 0) {
        ax /= len;
        az /= len;
        player.velocity.x += ax * 0.01;
        player.velocity.z += az * 0.01;
      }

      const speed = Math.hypot(player.velocity.x, player.velocity.z);
      const maxSpeed = 0.15;
      if (speed > maxSpeed) {
        player.velocity.x = (player.velocity.x / speed) * maxSpeed;
        player.velocity.z = (player.velocity.z / speed) * maxSpeed;
      }
    }

    function performAttack(attacker, target, forceAmount, staminaCost, cooldownMs) {
      const now = performance.now();
      if (attacker.stamina < staminaCost) return false;
      if (now - attacker.lastAttackTime < cooldownMs) return false;

      attacker.stamina = clamp(attacker.stamina - staminaCost, 0, 100);
      attacker.lastAttackTime = now;
      attacker.attacking = true;
      attacker.attackCooldown = cooldownMs;

      const fx = attacker.facing.x * forceAmount;
      const fz = attacker.facing.z * forceAmount;
      attacker.velocity.x += fx;
      attacker.velocity.z += fz;

      const dx = target.position.x - attacker.position.x;
      const dz = target.position.z - attacker.position.z;
      const dist = Math.hypot(dx, dz);
      if (dist < 2.0 && dist > 0.0001) {
        target.velocity.x += attacker.facing.x * forceAmount * 0.6;
        target.velocity.z += attacker.facing.z * forceAmount * 0.6;
        target.health = clamp(target.health - 5, 0, 100);
      }

      return true;
    }

    function updateAI() {
      const dx = player.position.x - ai.position.x;
      const dz = player.position.z - ai.position.z;
      const distToPlayer = Math.hypot(dx, dz);

      let tx = 0;
      let tz = 0;

      if (distToPlayer > 3.5) {
        const centerDx = -ai.position.x;
        const centerDz = -ai.position.z;
        const centerDist = Math.hypot(centerDx, centerDz);

        if (centerDist > 1.5) {
          tx = centerDx / (centerDist || 1);
          tz = centerDz / (centerDist || 1);
        } else if (distToPlayer > 0.001) {
          tx = dx / distToPlayer;
          tz = dz / distToPlayer;
        }
      } else if (distToPlayer > 0.001) {
        tx = dx / distToPlayer;
        tz = dz / distToPlayer;
      }

      ai.velocity.x += tx * 0.006;
      ai.velocity.z += tz * 0.006;

      const speed = Math.hypot(ai.velocity.x, ai.velocity.z);
      const maxSpeed = 0.15 * 0.6;
      if (speed > maxSpeed) {
        ai.velocity.x = (ai.velocity.x / speed) * maxSpeed;
        ai.velocity.z = (ai.velocity.z / speed) * maxSpeed;
      }

      if (distToPlayer <= 2.0) {
        performAttack(ai, player, 0.08, 20, 1500);
      }
    }

    function handleCollisions() {
      const dx = ai.position.x - player.position.x;
      const dz = ai.position.z - player.position.z;
      const dist = Math.hypot(dx, dz);

      if (dist < 1.2 && dist > 0.00001) {
        const nx = dx / dist;
        const nz = dz / dist;

        const rvx = player.velocity.x - ai.velocity.x;
        const rvz = player.velocity.z - ai.velocity.z;
        const relSpeed = rvx * nx + rvz * nz;

        const playerSpeed = Math.hypot(player.velocity.x, player.velocity.z);
        const aiSpeed = Math.hypot(ai.velocity.x, ai.velocity.z);

        const pushFactor = Math.max(0.03, Math.abs(relSpeed) * 0.4 + 0.03);

        if (playerSpeed >= aiSpeed) {
          ai.velocity.x += nx * pushFactor;
          ai.velocity.z += nz * pushFactor;
          player.velocity.x -= nx * pushFactor * 0.35;
          player.velocity.z -= nz * pushFactor * 0.35;
        } else {
          player.velocity.x -= nx * pushFactor;
          player.velocity.z -= nz * pushFactor;
          ai.velocity.x += nx * pushFactor * 0.35;
          ai.velocity.z += nz * pushFactor * 0.35;
        }

        const overlap = 1.2 - dist;
        player.position.x -= nx * overlap * 0.5;
        player.position.z -= nz * overlap * 0.5;
        ai.position.x += nx * overlap * 0.5;
        ai.position.z += nz * overlap * 0.5;

        lastCollisionTime = performance.now();
        player.health = clamp(player.health - 0.2, 0, 100);
        ai.health = clamp(ai.health - 0.2, 0, 100);
      }
    }

    function applyPhysics(duck) {
      duck.velocity.x = safeNum(duck.velocity.x);
      duck.velocity.z = safeNum(duck.velocity.z);
      duck.position.x = safeNum(duck.position.x);
      duck.position.z = safeNum(duck.position.z);

      duck.position.x += duck.velocity.x;
      duck.position.z += duck.velocity.z;

      duck.velocity.x *= 0.92;
      duck.velocity.z *= 0.92;

      if (Math.abs(duck.velocity.x) < 0.00001) duck.velocity.x = 0;
      if (Math.abs(duck.velocity.z) < 0.00001) duck.velocity.z = 0;
    }

    function checkRingOut() {
      const playerDist = Math.hypot(player.position.x, player.position.z);
      const aiDist = Math.hypot(ai.position.x, ai.position.z);

      if (playerDist > ringRadius) {
        aiScore++;
        if (aiScore >= 3) {
          endGame('ai');
        } else {
          gameState = 'roundEnd';
          roundNumber++;
          setTimeout(() => {
            if (gameState !== 'gameOver') resetRound();
          }, 1000);
        }
      } else if (aiDist > ringRadius) {
        playerScore++;
        if (playerScore >= 3) {
          endGame('player');
        } else {
          gameState = 'roundEnd';
          roundNumber++;
          setTimeout(() => {
            if (gameState !== 'gameOver') resetRound();
          }, 1000);
        }
      }
    }

    function updateStamina(deltaSec) {
      const pNow = performance.now();
      if (pNow - player.lastAttackTime > 150) {
        player.attacking = false;
      }
      if (pNow - ai.lastAttackTime > 150) {
        ai.attacking = false;
      }

      if (!player.attacking) player.stamina = clamp(player.stamina + 2 * deltaSec, 0, 100);
      if (!ai.attacking) ai.stamina = clamp(ai.stamina + 2 * deltaSec, 0, 100);
    }

    function updateUI() {
      ui.score.textContent = `Player: ${playerScore} - AI: ${aiScore}`;
      ui.playerHealthFill.style.width = `${clamp(player.health, 0, 100)}%`;
      ui.aiHealthFill.style.width = `${clamp(ai.health, 0, 100)}%`;
      ui.playerStaminaFill.style.width = `${clamp(player.stamina, 0, 100)}%`;
    }

    function updateState() {
      const playerDist = safeNum(Math.hypot(player.position.x, player.position.z));
      const aiDist = safeNum(Math.hypot(ai.position.x, ai.position.z));

      window.__3D_STATE__.gameState = gameState;
      window.__3D_STATE__.playerScore = safeNum(playerScore);
      window.__3D_STATE__.aiScore = safeNum(aiScore);
      window.__3D_STATE__.playerPos = {
        x: safeNum(player.position.x),
        z: safeNum(player.position.z)
      };
      window.__3D_STATE__.aiPos = {
        x: safeNum(ai.position.x),
        z: safeNum(ai.position.z)
      };
      window.__3D_STATE__.playerStamina = safeNum(player.stamina);
      window.__3D_STATE__.aiStamina = safeNum(ai.stamina);
      window.__3D_STATE__.playerVelocity = {
        x: safeNum(player.velocity.x),
        z: safeNum(player.velocity.z)
      };
      window.__3D_STATE__.aiVelocity = {
        x: safeNum(ai.velocity.x),
        z: safeNum(ai.velocity.z)
      };
      window.__3D_STATE__.roundNumber = safeNum(roundNumber);
      window.__3D_STATE__.playerDistFromCenter = playerDist;
      window.__3D_STATE__.aiDistFromCenter = aiDist;
      window.__3D_STATE__.winner = winner;
      window.__3D_STATE__.lastCollisionTime = safeNum(lastCollisionTime);
      window.__3D_STATE__.playerAttacking = !!player.attacking;
      window.__3D_STATE__.modelsLoaded = !!(player.model && ai.model);
      window.__3D_STATE__.ringRadius = 5.0;
    }

    window.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (k === 'w') keys.w = true;
      if (k === 'a') keys.a = true;
      if (k === 's') keys.s = true;
      if (k === 'd') keys.d = true;
      if (e.code === 'Space') {
        e.preventDefault();
        keys.space = true;
      }
    });

    window.addEventListener('keyup', (e) => {
      const k = e.key.toLowerCase();
      if (k === 'w') keys.w = false;
      if (k === 'a') keys.a = false;
      if (k === 's') keys.s = false;
      if (k === 'd') keys.d = false;
      if (e.code === 'Space') keys.space = false;
    });

    ui.startBtn.addEventListener('click', () => {
      startGame();
    });

    ui.restartBtn.addEventListener('click', () => {
      ui.overlayTitle.textContent = 'Duck Sumo';
      startGame();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    let prevTime = performance.now();
    let fpsAccum = 0;
    let fpsFrames = 0;
    let fpsLast = performance.now();

    function animate(now) {
      requestAnimationFrame(animate);

      const deltaMs = now - prevTime;
      prevTime = now;
      const deltaSec = Math.min(0.05, Math.max(0.001, deltaMs / 1000));

      fpsAccum += deltaMs;
      fpsFrames++;
      if (now - fpsLast >= 500) {
        const fps = Math.round((fpsFrames * 1000) / (fpsAccum || 1));
        ui.fps.textContent = `FPS: ${fps}`;
        fpsAccum = 0;
        fpsFrames = 0;
        fpsLast = now;
      }

      if (gameState === 'countdown') {
        if (now - countdownStart >= 2000) {
          gameState = 'playing';
        }
      } else if (gameState === 'playing') {
        applyMovementInput();

        if (keys.space) {
          performAttack(player, ai, 0.12, 20, 500);
          keys.space = false;
        }

        updateAI();
        handleCollisions();
        applyPhysics(player);
        applyPhysics(ai);
        updateStamina(deltaSec);
        checkRingOut();
      }

      updateDuckTransform(player);
      updateDuckTransform(ai);
      updateUI();
      updateState();

      renderer.render(scene, camera);
    }

    updateUI();
    updateState();
    animate(performance.now());
  </script>
</body>
</html>
