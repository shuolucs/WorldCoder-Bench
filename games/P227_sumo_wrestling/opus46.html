<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duck Sumo Wrestling</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    pointer-events: none;
    z-index: 10;
}

#score {
    text-align: center;
    font-size: 36px;
    color: white;
    text-shadow: 2px 2px 4px black, -1px -1px 2px black;
    padding: 15px;
    font-weight: bold;
}

#bars {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 0 20px;
}

.bar-group {
    width: 250px;
}

.bar-label {
    color: white;
    font-size: 14px;
    text-shadow: 1px 1px 2px black;
    margin-bottom: 3px;
}

.bar-container {
    width: 100%;
    height: 16px;
    background: rgba(0,0,0,0.5);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 5px;
    border: 1px solid rgba(255,255,255,0.3);
}

.bar-fill {
    height: 100%;
    transition: width 0.1s;
    border-radius: 8px;
}

.health-bar { background: linear-gradient(to right, #ff4444, #ff6666); }
.health-bar.player { background: linear-gradient(to right, #4488ff, #66aaff); }
.stamina-bar { background: linear-gradient(to right, #44aaff, #66ccff); }

#roundText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 72px;
    color: white;
    text-shadow: 3px 3px 6px black;
    font-weight: bold;
    display: none;
    pointer-events: none;
    z-index: 20;
}

#overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 30;
}

#overlay.hidden { display: none; }

#overlay h1 {
    font-size: 64px;
    color: #FFD700;
    text-shadow: 3px 3px 6px black;
    margin-bottom: 30px;
}

#overlay button {
    padding: 15px 40px;
    font-size: 24px;
    background: linear-gradient(to bottom, #FFD700, #FFA500);
    border: 3px solid #DAA520;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    color: #333;
    pointer-events: all;
    transition: transform 0.1s;
}

#overlay button:hover {
    transform: scale(1.05);
}

#fps {
    position: absolute;
    top: 10px;
    right: 10px;
    color: #0f0;
    font-size: 14px;
    font-family: monospace;
    text-shadow: 1px 1px 2px black;
    z-index: 10;
}

#instructions {
    color: rgba(255,255,255,0.6);
    font-size: 16px;
    margin-top: 20px;
    text-align: center;
}
</style>
</head>
<body>

<div id="hud">
    <div id="score">Player: 0 - AI: 0</div>
    <div id="bars">
        <div class="bar-group">
            <div class="bar-label">Player Health</div>
            <div class="bar-container"><div class="bar-fill health-bar player" id="playerHealth" style="width:100%"></div></div>
            <div class="bar-label">Stamina</div>
            <div class="bar-container"><div class="bar-fill stamina-bar" id="playerStamina" style="width:100%"></div></div>
        </div>
        <div class="bar-group">
            <div class="bar-label">AI Health</div>
            <div class="bar-container"><div class="bar-fill health-bar" id="aiHealth" style="width:100%"></div></div>
            <div class="bar-label">Stamina</div>
            <div class="bar-container"><div class="bar-fill stamina-bar" id="aiStamina" style="width:100%"></div></div>
        </div>
    </div>
</div>

<div id="roundText">ROUND 1</div>

<div id="overlay">
    <h1 id="overlayTitle">🦆 Duck Sumo 🦆</h1>
    <button id="startBtn">Start Game</button>
    <div id="instructions">WASD to move | SPACE to attack</div>
</div>

<div id="fps">FPS: 0</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    gameState: 'waiting',
    playerScore: 0,
    aiScore: 0,
    playerPos: { x: -2, z: 0 },
    aiPos: { x: 2, z: 0 },
    playerStamina: 100,
    aiStamina: 100,
    playerVelocity: { x: 0, z: 0 },
    aiVelocity: { x: 0, z: 0 },
    roundNumber: 1,
    playerDistFromCenter: 2,
    aiDistFromCenter: 2,
    winner: null,
    lastCollisionTime: 0,
    playerAttacking: false,
    modelsLoaded: false,
    ringRadius: 5.0
};

const state = window.__3D_STATE__;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 20, 50);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(50, 50);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// Dohyo (ring)
const ringGeo = new THREE.CylinderGeometry(5, 5, 0.3, 64);
const ringMat = new THREE.MeshStandardMaterial({ color: 0xDEB887 });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.position.y = 0.15;
ring.receiveShadow = true;
ring.castShadow = true;
scene.add(ring);

// Ring border (torus)
const torusGeo = new THREE.TorusGeometry(5, 0.1, 16, 64);
const torusMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
const torus = new THREE.Mesh(torusGeo, torusMat);
torus.rotation.x = -Math.PI / 2;
torus.position.y = 0.31;
scene.add(torus);

// Inner ring decoration
const innerTorusGeo = new THREE.TorusGeometry(4.5, 0.05, 16, 64);
const innerTorusMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
const innerTorus = new THREE.Mesh(innerTorusGeo, innerTorusMat);
innerTorus.rotation.x = -Math.PI / 2;
innerTorus.position.y = 0.32;
scene.add(innerTorus);

// Duck models
let playerDuck = null;
let aiDuck = null;
let modelsLoadedCount = 0;

const loader = new GLTFLoader();

function tintModel(model, color) {
    model.traverse((child) => {
        if (child.isMesh) {
            child.material = child.material.clone();
            child.material.color.multiply(new THREE.Color(color));
            child.castShadow = true;
            child.receiveShadow = true;
        }
    });
}

function loadDuck(color, posX, rotY, callback) {
    loader.load('Duck.glb', (gltf) => {
        const model = gltf.scene;
        model.scale.set(2.0, 2.0, 2.0);
        model.position.set(posX, 0.3, 0);
        model.rotation.y = rotY;
        tintModel(model, color);
        scene.add(model);
        callback(model);
    }, undefined, (error) => {
        console.error('Error loading Duck.glb:', error);
        // Create fallback duck
        const fallback = createFallbackDuck(color);
        fallback.position.set(posX, 0.3, 0);
        fallback.rotation.y = rotY;
        scene.add(fallback);
        callback(fallback);
    });
}

function createFallbackDuck(color) {
    const group = new THREE.Group();
    
    // Body
    const bodyGeo = new THREE.SphereGeometry(0.4, 16, 16);
    bodyGeo.scale(1, 0.8, 1.2);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xFFD700 });
    bodyMat.color.multiply(new THREE.Color(color));
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.4;
    body.castShadow = true;
    group.add(body);
    
    // Head
    const headGeo = new THREE.SphereGeometry(0.25, 16, 16);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xFFD700 });
    headMat.color.multiply(new THREE.Color(color));
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.set(0, 0.75, 0.3);
    head.castShadow = true;
    group.add(head);
    
    // Beak
    const beakGeo = new THREE.ConeGeometry(0.1, 0.2, 8);
    const beakMat = new THREE.MeshStandardMaterial({ color: 0xFF8C00 });
    const beak = new THREE.Mesh(beakGeo, beakMat);
    beak.rotation.x = -Math.PI / 2;
    beak.position.set(0, 0.75, 0.55);
    group.add(beak);
    
    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.04, 8, 8);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
    const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
    eyeL.position.set(-0.1, 0.82, 0.45);
    group.add(eyeL);
    const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
    eyeR.position.set(0.1, 0.82, 0.45);
    group.add(eyeR);
    
    return group;
}

// Load player duck (blue tint, faces right +x)
loadDuck(0x8888ff, -2, -Math.PI / 2, (model) => {
    playerDuck = model;
    modelsLoadedCount++;
    if (modelsLoadedCount === 2) state.modelsLoaded = true;
});

// Load AI duck (red tint, faces left -x)
loadDuck(0xff8888, 2, Math.PI / 2, (model) => {
    aiDuck = model;
    modelsLoadedCount++;
    if (modelsLoadedCount === 2) state.modelsLoaded = true;
});

// Game variables
const player = {
    pos: { x: -2, z: 0 },
    vel: { x: 0, z: 0 },
    mass: 1.0,
    health: 100,
    stamina: 100,
    attacking: false,
    lastAttackTime: 0
};

const ai = {
    pos: { x: 2, z: 0 },
    vel: { x: 0, z: 0 },
    mass: 1.0,
    health: 100,
    stamina: 100,
    attacking: false,
    lastAttackTime: 0
};

const keys = {};
const ACCEL = 0.5;
const MAX_SPEED = 0.15;
const FRICTION = 0.92;
const RING_RADIUS = 5.0;
const COLLISION_DIST = 1.2;
const ATTACK_COST = 20;
const ATTACK_COOLDOWN = 500;
const AI_ATTACK_COOLDOWN = 1500;
const STAMINA_REGEN = 2;

let lastTime = performance.now();
let roundStartTime = 0;
let roundTextTimeout = null;

// Input
window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

// UI elements
const scoreEl = document.getElementById('score');
const playerHealthEl = document.getElementById('playerHealth');
const aiHealthEl = document.getElementById('aiHealth');
const playerStaminaEl = document.getElementById('playerStamina');
const aiStaminaEl = document.getElementById('aiStamina');
const roundTextEl = document.getElementById('roundText');
const overlayEl = document.getElementById('overlay');
const overlayTitleEl = document.getElementById('overlayTitle');
const startBtn = document.getElementById('startBtn');
const fpsEl = document.getElementById('fps');

// Buttons
startBtn.addEventListener('click', () => {
    startGame();
});

function startGame() {
    state.playerScore = 0;
    state.aiScore = 0;
    state.roundNumber = 1;
    state.winner = null;
    state.gameState = 'countdown';
    overlayEl.classList.add('hidden');
    startRound();
}

function startRound() {
    resetPositions();
    state.gameState = 'countdown';
    
    roundTextEl.textContent = `ROUND ${state.roundNumber}`;
    roundTextEl.style.display = 'block';
    
    if (roundTextTimeout) clearTimeout(roundTextTimeout);
    roundTextTimeout = setTimeout(() => {
        roundTextEl.style.display = 'none';
        state.gameState = 'playing';
    }, 2000);
}

function resetPositions() {
    player.pos.x = -2; player.pos.z = 0;
    player.vel.x = 0; player.vel.z = 0;
    player.health = 100; player.stamina = 100;
    player.attacking = false;
    
    ai.pos.x = 2; ai.pos.z = 0;
    ai.vel.x = 0; ai.vel.z = 0;
    ai.health = 100; ai.stamina = 100;
    ai.attacking = false;
    
    if (playerDuck) {
        playerDuck.position.set(-2, 0.3, 0);
        playerDuck.rotation.y = -Math.PI / 2;
    }
    if (aiDuck) {
        aiDuck.position.set(2, 0.3, 0);
        aiDuck.rotation.y = Math.PI / 2;
    }
}

function handleRingOut(who) {
    if (state.gameState !== 'playing') return;
    
    state.gameState = 'roundEnd';
    
    if (who === 'player') {
        state.aiScore++;
    } else {
        state.playerScore++;
    }
    
    // Check for game over
    if (state.playerScore >= 3) {
        state.winner = 'player';
        state.gameState = 'gameOver';
        showGameOver('PLAYER WINS! 🎉');
        return;
    }
    if (state.aiScore >= 3) {
        state.winner = 'ai';
        state.gameState = 'gameOver';
        showGameOver('AI WINS! 🤖');
        return;
    }
    
    // Next round
    state.roundNumber++;
    setTimeout(() => {
        startRound();
    }, 1000);
}

function showGameOver(text) {
    overlayTitleEl.textContent = text;
    startBtn.textContent = 'Restart';
    startBtn.id = 'restartBtn';
    document.getElementById('instructions').textContent = '';
    overlayEl.classList.remove('hidden');
    
    // Re-add the startBtn id as well for compatibility
    startBtn.addEventListener('click', () => {
        startBtn.id = 'startBtn';
        startGame();
    }, { once: true });
}

// Particles for attacks
const particles = [];

function spawnParticles(x, z, color) {
    for (let i = 0; i < 8; i++) {
        const geo = new THREE.SphereGeometry(0.05, 4, 4);
        const mat = new THREE.MeshBasicMaterial({ color });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, 0.5 + Math.random() * 0.5, z);
        scene.add(mesh);
        particles.push({
            mesh,
            vel: {
                x: (Math.random() - 0.5) * 0.2,
                y: Math.random() * 0.15,
                z: (Math.random() - 0.5) * 0.2
            },
            life: 1.0
        });
    }
}

function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.mesh.position.x += p.vel.x;
        p.mesh.position.y += p.vel.y;
        p.mesh.position.z += p.vel.z;
        p.vel.y -= 0.005;
        p.life -= dt * 2;
        p.mesh.material.opacity = Math.max(0, p.life);
        p.mesh.material.transparent = true;
        if (p.life <= 0) {
            scene.remove(p.mesh);
            p.mesh.geometry.dispose();
            p.mesh.material.dispose();
            particles.splice(i, 1);
        }
    }
}

// FPS counter
let frameCount = 0;
let fpsTime = 0;
let currentFPS = 0;

// Attack indicator rings
const playerAttackRing = new THREE.Mesh(
    new THREE.RingGeometry(0.5, 0.7, 16),
    new THREE.MeshBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0, side: THREE.DoubleSide })
);
playerAttackRing.rotation.x = -Math.PI / 2;
playerAttackRing.position.y = 0.35;
scene.add(playerAttackRing);

const aiAttackRing = new THREE.Mesh(
    new THREE.RingGeometry(0.5, 0.7, 16),
    new THREE.MeshBasicMaterial({ color: 0xff4444, transparent: true, opacity: 0, side: THREE.DoubleSide })
);
aiAttackRing.rotation.x = -Math.PI / 2;
aiAttackRing.position.y = 0.35;
scene.add(aiAttackRing);

// Main loop
function animate() {
    requestAnimationFrame(animate);
    
    const now = performance.now();
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    
    // FPS
    frameCount++;
    fpsTime += dt;
    if (fpsTime >= 1.0) {
        currentFPS = Math.round(frameCount / fpsTime);
        fpsEl.textContent = `FPS: ${currentFPS}`;
        frameCount = 0;
        fpsTime = 0;
    }
    
    if (state.gameState === 'playing') {
        updatePlayer(dt, now);
        updateAI(dt, now);
        checkCollisions(now);
        checkRingOut();
    }
    
    updateParticles(dt);
    
    // Update duck positions
    if (playerDuck) {
        playerDuck.position.x = player.pos.x;
        playerDuck.position.z = player.pos.z;
        playerDuck.position.y = 0.3;
        
        // Face direction of movement or toward AI
        if (Math.abs(player.vel.x) > 0.01 || Math.abs(player.vel.z) > 0.01) {
            playerDuck.rotation.y = Math.atan2(-player.vel.z, -player.vel.x);
        } else {
            const dx = ai.pos.x - player.pos.x;
            const dz = ai.pos.z - player.pos.z;
            playerDuck.rotation.y = Math.atan2(-dz, -dx);
        }
    }
    
    if (aiDuck) {
        aiDuck.position.x = ai.pos.x;
        aiDuck.position.z = ai.pos.z;
        aiDuck.position.y = 0.3;
        
        const dx = player.pos.x - ai.pos.x;
        const dz = player.pos.z - ai.pos.z;
        aiDuck.rotation.y = Math.atan2(-dz, -dx);
    }
    
    // Attack ring indicators
    if (player.attacking) {
        playerAttackRing.material.opacity = 0.6;
        playerAttackRing.position.x = player.pos.x;
        playerAttackRing.position.z = player.pos.z;
        const scale = 1 + Math.sin(now * 0.02) * 0.3;
        playerAttackRing.scale.set(scale, scale, scale);
    } else {
        playerAttackRing.material.opacity *= 0.9;
    }
    
    if (ai.attacking) {
        aiAttackRing.material.opacity = 0.6;
        aiAttackRing.position.x = ai.pos.x;
        aiAttackRing.position.z = ai.pos.z;
        const scale = 1 + Math.sin(now * 0.02) * 0.3;
        aiAttackRing.scale.set(scale, scale, scale);
    } else {
        aiAttackRing.material.opacity *= 0.9;
    }
    
    // Update UI
    updateUI();
    updateState(now);
    
    renderer.render(scene, camera);
}

function updatePlayer(dt, now) {
    let ax = 0, az = 0;
    
    if (keys['w'] || keys['arrowup']) az -= ACCEL;
    if (keys['s'] || keys['arrowdown']) az += ACCEL;
    if (keys['a'] || keys['arrowleft']) ax -= ACCEL;
    if (keys['d'] || keys['arrowright']) ax += ACCEL;
    
    // Normalize diagonal
    if (ax !== 0 && az !== 0) {
        const norm = Math.sqrt(ax * ax + az * az);
        ax = (ax / norm) * ACCEL;
        az = (az / norm) * ACCEL;
    }
    
    player.vel.x += ax * dt;
    player.vel.z += az * dt;
    
    // Clamp speed
    const speed = Math.sqrt(player.vel.x * player.vel.x + player.vel.z * player.vel.z);
    if (speed > MAX_SPEED) {
        player.vel.x = (player.vel.x / speed) * MAX_SPEED;
        player.vel.z = (player.vel.z / speed) * MAX_SPEED;
    }
    
    // Friction
    player.vel.x *= FRICTION;
    player.vel.z *= FRICTION;
    
    // Apply velocity
    player.pos.x += player.vel.x;
    player.pos.z += player.vel.z;
    
    // Attack
    player.attacking = false;
    if (keys[' '] && player.stamina >= ATTACK_COST && (now - player.lastAttackTime) > ATTACK_COOLDOWN) {
        player.attacking = true;
        player.lastAttackTime = now;
        player.stamina -= ATTACK_COST;
        
        // Push in facing direction (toward AI)
        const dx = ai.pos.x - player.pos.x;
        const dz = ai.pos.z - player.pos.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > 0.01) {
            const pushForce = 0.2;
            player.vel.x += (dx / dist) * pushForce;
            player.vel.z += (dz / dist) * pushForce;
        }
        
        spawnParticles(player.pos.x, player.pos.z, 0x4488ff);
    }
    
    // Stamina regen
    if (!player.attacking) {
        player.stamina = Math.min(100, player.stamina + STAMINA_REGEN * dt);
    }
}

function updateAI(dt, now) {
    const dx = player.pos.x - ai.pos.x;
    const dz = player.pos.z - ai.pos.z;
    const distToPlayer = Math.sqrt(dx * dx + dz * dz);
    
    const aiDistFromCenter = Math.sqrt(ai.pos.x * ai.pos.x + ai.pos.z * ai.pos.z);
    
    let targetX, targetZ;
    
    if (distToPlayer > 4) {
        // Move toward center when far from player
        targetX = -ai.pos.x;
        targetZ = -ai.pos.z;
    } else {
        // Move toward player
        targetX = dx;
        targetZ = dz;
    }
    
    // Also bias toward center if near edge
    if (aiDistFromCenter > 3) {
        targetX -= ai.pos.x * 0.5;
        targetZ -= ai.pos.z * 0.5;
    }
    
    const targetDist = Math.sqrt(targetX * targetX + targetZ * targetZ);
    if (targetDist > 0.01) {
        const aiAccel = ACCEL * 0.6;
        ai.vel.x += (targetX / targetDist) * aiAccel * dt;
        ai.vel.z += (targetZ / targetDist) * aiAccel * dt;
    }
    
    // Clamp AI speed
    const aiMaxSpeed = MAX_SPEED * 0.6;
    const aiSpeed = Math.sqrt(ai.vel.x * ai.vel.x + ai.vel.z * ai.vel.z);
    if (aiSpeed > aiMaxSpeed) {
        ai.vel.x = (ai.vel.x / aiSpeed) * aiMaxSpeed;
        ai.vel.z = (ai.vel.z / aiSpeed) * aiMaxSpeed;
    }
    
    // Friction
    ai.vel.x *= FRICTION;
    ai.vel.z *= FRICTION;
    
    // Apply velocity
    ai.pos.x += ai.vel.x;
    ai.pos.z += ai.vel.z;
    
    // AI attack
    ai.attacking = false;
    if (distToPlayer < 2.0 && ai.stamina >= ATTACK_COST && (now - ai.lastAttackTime) > AI_ATTACK_COOLDOWN) {
        ai.attacking = true;
        ai.lastAttackTime = now;
        ai.stamina -= ATTACK_COST;
        
        if (distToPlayer > 0.01) {
            const pushForce = 0.18;
            ai.vel.x += (dx / distToPlayer) * pushForce;
            ai.vel.z += (dz / distToPlayer) * pushForce;
        }
        
        spawnParticles(ai.pos.x, ai.pos.z, 0xff4444);
    }
    
    // Stamina regen
    if (!ai.attacking) {
        ai.stamina = Math.min(100, ai.stamina + STAMINA_REGEN * dt);
    }
}

function checkCollisions(now) {
    const dx = ai.pos.x - player.pos.x;
    const dz = ai.pos.z - player.pos.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    
    if (dist < COLLISION_DIST && dist > 0.001) {
        state.lastCollisionTime = now;
        
        // Normalize collision direction
        const nx = dx / dist;
        const nz = dz / dist;
        
        // Relative velocity
        const relVelX = player.vel.x - ai.vel.x;
        const relVelZ = player.vel.z - ai.vel.z;
        const relVelDot = relVelX * nx + relVelZ * nz;
        
        // Only resolve if moving toward each other
        if (relVelDot > 0) {
            const restitution = 0.8;
            const impulse = relVelDot * (1 + restitution) / (player.mass + ai.mass);
            
            // Apply attack bonus
            let playerBonus = player.attacking ? 1.5 : 1.0;
            let aiBonus = ai.attacking ? 1.5 : 1.0;
            
            player.vel.x -= impulse * ai.mass * nx * aiBonus;
            player.vel.z -= impulse * ai.mass * nz * aiBonus;
            ai.vel.x += impulse * player.mass * nx * playerBonus;
            ai.vel.z += impulse * player.mass * nz * playerBonus;
            
            // Damage based on impact
            const impactForce = Math.abs(relVelDot) * 50;
            player.health = Math.max(0, player.health - impactForce * aiBonus * 0.3);
            ai.health = Math.max(0, ai.health - impactForce * playerBonus * 0.3);
        }
        
        // Separate overlapping ducks
        const overlap = COLLISION_DIST - dist;
        const sepX = nx * overlap * 0.5;
        const sepZ = nz * overlap * 0.5;
        player.pos.x -= sepX;
        player.pos.z -= sepZ;
        ai.pos.x += sepX;
        ai.pos.z += sepZ;
        
        spawnParticles((player.pos.x + ai.pos.x) / 2, (player.pos.z + ai.pos.z) / 2, 0xffff00);
    }
}

function checkRingOut() {
    const playerDist = Math.sqrt(player.pos.x * player.pos.x + player.pos.z * player.pos.z);
    const aiDist = Math.sqrt(ai.pos.x * ai.pos.x + ai.pos.z * ai.pos.z);
    
    if (playerDist > RING_RADIUS) {
        handleRingOut('player');
    } else if (aiDist > RING_RADIUS) {
        handleRingOut('ai');
    }
}

function updateUI() {
    scoreEl.textContent = `Player: ${state.playerScore} - AI: ${state.aiScore}`;
    playerHealthEl.style.width = `${Math.max(0, player.health)}%`;
    aiHealthEl.style.width = `${Math.max(0, ai.health)}%`;
    playerStaminaEl.style.width = `${Math.max(0, player.stamina)}%`;
    aiStaminaEl.style.width = `${Math.max(0, ai.stamina)}%`;
}

function safeNum(v) {
    return isNaN(v) ? 0 : v;
}

function updateState(now) {
    state.playerPos.x = safeNum(player.pos.x);
    state.playerPos.z = safeNum(player.pos.z);
    state.aiPos.x = safeNum(ai.pos.x);
    state.aiPos.z = safeNum(ai.pos.z);
    state.playerVelocity.x = safeNum(player.vel.x);
    state.playerVelocity.z = safeNum(player.vel.z);
    state.aiVelocity.x = safeNum(ai.vel.x);
    state.aiVelocity.z = safeNum(ai.vel.z);
    state.playerStamina = safeNum(player.stamina);
    state.aiStamina = safeNum(ai.stamina);
    state.playerDistFromCenter = safeNum(Math.sqrt(player.pos.x * player.pos.x + player.pos.z * player.pos.z));
    state.aiDistFromCenter = safeNum(Math.sqrt(ai.pos.x * ai.pos.x + ai.pos.z * ai.pos.z));
    state.playerAttacking = !!player.attacking;
    state.lastCollisionTime = safeNum(state.lastCollisionTime);
}

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
