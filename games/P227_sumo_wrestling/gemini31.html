<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sumo Duck Wrestling</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        #top-hud {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }
        #score-display {
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            margin-bottom: 10px;
        }
        .bars-container {
            display: flex;
            gap: 50px;
            width: 600px;
            justify-content: space-between;
        }
        .player-bars, .ai-bars {
            width: 250px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .bar-bg {
            width: 100%;
            height: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
        }
        .health-fill {
            height: 100%;
            background-color: #ff3333;
            width: 100%;
            transition: width 0.1s;
        }
        .stamina-fill {
            height: 100%;
            background-color: #3388ff;
            width: 100%;
        }
        .bar-label {
            color: white;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            text-align: center;
        }
        #fps-counter {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #00ff00;
            font-family: monospace;
            font-size: 16px;
            background: rgba(0,0,0,0.5);
            padding: 5px;
            border-radius: 5px;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 10;
        }
        .hidden {
            display: none !important;
        }
        h1 {
            color: white;
            font-size: 64px;
            text-shadow: 4px 4px 0 #000;
            margin-bottom: 40px;
        }
        button {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            background-color: #DEB887;
            border: 4px solid white;
            border-radius: 10px;
            color: black;
            transition: transform 0.1s, background-color 0.2s;
        }
        button:hover {
            background-color: #f5deb3;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        #round-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 4px 4px 0 #000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="top-hud">
            <div id="score-display">Player: 0 - AI: 0</div>
            <div class="bars-container">
                <div class="player-bars">
                    <div class="bar-label">PLAYER</div>
                    <div class="bar-bg"><div id="player-health" class="health-fill"></div></div>
                    <div class="bar-bg"><div id="player-stamina" class="stamina-fill"></div></div>
                </div>
                <div class="ai-bars">
                    <div class="bar-label">AI</div>
                    <div class="bar-bg"><div id="ai-health" class="health-fill"></div></div>
                </div>
            </div>
        </div>
        <div id="fps-counter">FPS: 0</div>
    </div>

    <div id="round-text">ROUND 1</div>

    <div id="start-screen" class="overlay">
        <h1>DUCK SUMO</h1>
        <button id="startBtn">Start Game</button>
    </div>

    <div id="game-over-screen" class="overlay hidden">
        <h1 id="winner-text">PLAYER WINS!</h1>
        <button id="restartBtn">Restart</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        window.__3D_STATE__ = {
            gameState: 'waiting',
            playerScore: 0,
            aiScore: 0,
            playerPos: { x: -2, z: 0 },
            aiPos: { x: 2, z: 0 },
            playerStamina: 100,
            aiStamina: 100,
            playerVelocity: { x: 0, z: 0 },
            aiVelocity: { x: 0, z: 0 },
            roundNumber: 1,
            playerDistFromCenter: 2,
            aiDistFromCenter: 2,
            winner: null,
            lastCollisionTime: 0,
            playerAttacking: false,
            modelsLoaded: false,
            ringRadius: 5.0
        };

        const state = window.__3D_STATE__;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        scene.add(dirLight);

        const ringGeo = new THREE.CylinderGeometry(5, 5, 0.3, 64);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xDEB887, roughness: 0.8 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.receiveShadow = true;
        scene.add(ring);

        const borderGeo = new THREE.TorusGeometry(5, 0.1, 16, 100);
        const borderMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const border = new THREE.Mesh(borderGeo, borderMat);
        border.rotation.x = Math.PI / 2;
        border.position.y = 0.15;
        scene.add(border);

        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x006400 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.15;
        ground.receiveShadow = true;
        scene.add(ground);

        let playerMesh, aiMesh;
        const duckY = 0.15;

        const loader = new GLTFLoader();
        
        const fallbackGeo = new THREE.BoxGeometry(1, 1, 1);
        const fallbackMat = new THREE.MeshStandardMaterial({color: 0xcccccc});
        
        function setupDuck(mesh, colorHex, startX, rotY) {
            mesh.scale.set(2.0, 2.0, 2.0);
            mesh.position.set(startX, duckY, 0);
            mesh.rotation.y = rotY;
            mesh.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    child.material = child.material.clone();
                    child.material.color.setHex(colorHex);
                }
            });
            scene.add(mesh);
            return mesh;
        }

        loader.load('Duck.glb', (gltf) => {
            playerMesh = setupDuck(gltf.scene.clone(), 0x8888ff, -2, Math.PI / 2);
            aiMesh = setupDuck(gltf.scene.clone(), 0xff8888, 2, -Math.PI / 2);
            state.modelsLoaded = true;
        }, undefined, (error) => {
            console.warn("Could not load Duck.glb, using fallback boxes.");
            const pBox = new THREE.Mesh(fallbackGeo, fallbackMat.clone());
            const aBox = new THREE.Mesh(fallbackGeo, fallbackMat.clone());
            playerMesh = setupDuck(pBox, 0x8888ff, -2, Math.PI / 2);
            aiMesh = setupDuck(aBox, 0xff8888, 2, -Math.PI / 2);
            state.modelsLoaded = true;
        });

        const keys = { w: false, a: false, s: false, d: false, ' ': false };
        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        let lastTime = performance.now();
        let frames = 0;
        let lastFpsTime = lastTime;
        let lastPlayerAttackTime = 0;
        let lastAiAttackTime = 0;

        const player = { pos: new THREE.Vector3(-2, duckY, 0), vel: new THREE.Vector3(), health: 100, stamina: 100 };
        const ai = { pos: new THREE.Vector3(2, duckY, 0), vel: new THREE.Vector3(), health: 100, stamina: 100 };

        document.getElementById('startBtn').addEventListener('click', () => {
            if (!state.modelsLoaded) return;
            document.getElementById('start-screen').classList.add('hidden');
            startRound();
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            state.playerScore = 0;
            state.aiScore = 0;
            state.roundNumber = 1;
            document.getElementById('game-over-screen').classList.add('hidden');
            startRound();
        });

        function startRound() {
            state.gameState = 'countdown';
            player.pos.set(-2, duckY, 0);
            ai.pos.set(2, duckY, 0);
            player.vel.set(0,0,0);
            ai.vel.set(0,0,0);
            player.health = 100;
            ai.health = 100;
            player.stamina = 100;
            ai.stamina = 100;
            
            if(playerMesh) {
                playerMesh.position.copy(player.pos);
                playerMesh.rotation.y = Math.PI / 2;
            }
            if(aiMesh) {
                aiMesh.position.copy(ai.pos);
                aiMesh.rotation.y = -Math.PI / 2;
            }

            const roundText = document.getElementById('round-text');
            roundText.innerText = `ROUND ${state.roundNumber}`;
            roundText.style.opacity = 1;

            setTimeout(() => {
                roundText.style.opacity = 0;
                state.gameState = 'playing';
            }, 2000);
        }

        function endRound(loser) {
            state.gameState = 'roundEnd';
            if (loser === 'ai') state.playerScore++;
            else state.aiScore++;

            updateUI();

            if (state.playerScore >= 3 || state.aiScore >= 3) {
                setTimeout(() => {
                    state.gameState = 'gameOver';
                    state.winner = state.playerScore >= 3 ? 'player' : 'ai';
                    document.getElementById('winner-text').innerText = state.winner === 'player' ? 'PLAYER WINS!' : 'AI WINS!';
                    document.getElementById('game-over-screen').classList.remove('hidden');
                }, 1000);
            } else {
                state.roundNumber++;
                setTimeout(startRound, 2000);
            }
        }

        function updateUI() {
            document.getElementById('score-display').innerText = `Player: ${state.playerScore} - AI: ${state.aiScore}`;
            document.getElementById('player-health').style.width = `${Math.max(0, player.health)}%`;
            document.getElementById('ai-health').style.width = `${Math.max(0, ai.health)}%`;
            document.getElementById('player-stamina').style.width = `${Math.max(0, player.stamina)}%`;
        }

        function animate(time) {
            requestAnimationFrame(animate);
            
            const delta = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;

            frames++;
            if (time - lastFpsTime >= 1000) {
                document.getElementById('fps-counter').innerText = `FPS: ${frames}`;
                frames = 0;
                lastFpsTime = time;
            }

            if (state.gameState === 'playing' && state.modelsLoaded) {
                const accelForce = 0.5;
                const maxSpeed = 0.15;
                const friction = 0.92;

                let pInput = new THREE.Vector3();
                if (keys.w) pInput.z -= 1;
                if (keys.s) pInput.z += 1;
                if (keys.a) pInput.x -= 1;
                if (keys.d) pInput.x += 1;

                if (pInput.lengthSq() > 0) {
                    pInput.normalize().multiplyScalar(accelForce);
                    player.vel.add(pInput);
                }

                state.playerAttacking = false;
                if (keys[' '] && player.stamina >= 20 && time - lastPlayerAttackTime > 500) {
                    player.stamina -= 20;
                    lastPlayerAttackTime = time;
                    state.playerAttacking = true;
                    const facing = new THREE.Vector3(Math.sin(playerMesh.rotation.y), 0, Math.cos(playerMesh.rotation.y));
                    player.vel.add(facing.multiplyScalar(0.3));
                }

                if (!keys[' ']) {
                    player.stamina = Math.min(100, player.stamina + 2 * delta);
                }

                let aiDir = new THREE.Vector3().subVectors(player.pos, ai.pos);
                let distToPlayer = aiDir.length();
                aiDir.y = 0;

                if (distToPlayer > 2.0) {
                    if (aiDir.lengthSq() > 0) {
                        aiDir.normalize().multiplyScalar(accelForce * 0.6);
                        ai.vel.add(aiDir);
                    }
                } else if (time - lastAiAttackTime > 1500) {
                    lastAiAttackTime = time;
                    if (aiDir.lengthSq() > 0) {
                        ai.vel.add(aiDir.normalize().multiplyScalar(0.3));
                    }
                }

                if (player.vel.length() > maxSpeed && !state.playerAttacking) {
                    player.vel.setLength(maxSpeed);
                }
                if (ai.vel.length() > maxSpeed * 0.6 && (time - lastAiAttackTime > 500)) {
                    ai.vel.setLength(maxSpeed * 0.6);
                }

                player.vel.multiplyScalar(friction);
                ai.vel.multiplyScalar(friction);

                player.pos.add(player.vel);
                ai.pos.add(ai.vel);

                const currentDist = player.pos.distanceTo(ai.pos);
                if (currentDist < 1.2) {
                    state.lastCollisionTime = time;
                    const pushDir = new THREE.Vector3().subVectors(player.pos, ai.pos).normalize();
                    const overlap = 1.2 - currentDist;
                    
                    player.pos.add(pushDir.clone().multiplyScalar(overlap / 2));
                    ai.pos.sub(pushDir.clone().multiplyScalar(overlap / 2));

                    const pSpeed = player.vel.length();
                    const aSpeed = ai.vel.length();

                    if (pSpeed > aSpeed) {
                        ai.vel.add(pushDir.clone().multiplyScalar(-pSpeed * 0.5));
                    } else {
                        player.vel.add(pushDir.clone().multiplyScalar(aSpeed * 0.5));
                    }
                }

                player.pos.y = duckY;
                ai.pos.y = duckY;

                if (player.vel.lengthSq() > 0.0001) {
                    playerMesh.rotation.y = Math.atan2(player.vel.x, player.vel.z);
                }
                if (ai.vel.lengthSq() > 0.0001) {
                    aiMesh.rotation.y = Math.atan2(ai.vel.x, ai.vel.z);
                }

                playerMesh.position.copy(player.pos);
                aiMesh.position.copy(ai.pos);

                const pDistCenter = Math.hypot(player.pos.x, player.pos.z);
                const aDistCenter = Math.hypot(ai.pos.x, ai.pos.z);

                if (pDistCenter > 5.0) endRound('player');
                else if (aDistCenter > 5.0) endRound('ai');

                updateUI();
            }

            state.playerPos.x = player.pos.x || 0;
            state.playerPos.z = player.pos.z || 0;
            state.aiPos.x = ai.pos.x || 0;
            state.aiPos.z = ai.pos.z || 0;
            state.playerVelocity.x = player.vel.x || 0;
            state.playerVelocity.z = player.vel.z || 0;
            state.aiVelocity.x = ai.vel.x || 0;
            state.aiVelocity.z = ai.vel.z || 0;
            state.playerStamina = player.stamina || 0;
            state.aiStamina = ai.stamina || 0;
            state.playerDistFromCenter = Math.hypot(player.pos.x, player.pos.z) || 0;
            state.aiDistFromCenter = Math.hypot(ai.pos.x, ai.pos.z) || 0;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        requestAnimationFrame(animate);
    </script>
</body>
</html>
