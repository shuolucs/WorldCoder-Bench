<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procedural City Builder - Three.js</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    .hud {
      position: absolute;
      z-index: 10;
      background: rgba(20, 20, 20, 0.75);
      color: white;
      padding: 12px;
      border-radius: 10px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.15);
      user-select: none;
    }

    #buildPanel {
      top: 12px;
      left: 12px;
      min-width: 220px;
      transition: box-shadow 0.2s ease, background 0.2s ease;
    }

    #buildPanel.flash {
      box-shadow: 0 0 0 3px #f44336, 0 0 18px rgba(244,67,54,0.8);
      background: rgba(80, 10, 10, 0.9);
    }

    #statsPanel {
      top: 12px;
      right: 12px;
      min-width: 190px;
    }

    .hud-title {
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 14px;
      letter-spacing: 0.4px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      background: #2f2f2f;
      color: white;
      border: 2px solid transparent;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: 0.15s ease;
    }

    button:hover {
      filter: brightness(1.15);
    }

    button.selected {
      border-color: #ffffff;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.2) inset;
    }

    #btnResidential { background: #4CAF50; }
    #btnCommercial { background: #2196F3; }
    #btnIndustrial { background: #FF9800; color: #111; }
    #btnPark { background: #66BB6A; color: #111; }

    #btnDemolish.active {
      background: #f44336;
      border-color: #ffcdd2;
    }

    #btnDayNight {
      background: #5c6bc0;
    }

    .stats-line {
      margin: 6px 0;
      font-size: 14px;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #ddd;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="buildPanel" class="hud">
      <div class="hud-title">Build Menu</div>
      <div class="button-row">
        <button id="btnResidential">Residential</button>
        <button id="btnCommercial">Commercial</button>
        <button id="btnIndustrial">Industrial</button>
        <button id="btnPark">Park</button>
      </div>
      <div class="button-row" style="margin-top:10px;">
        <button id="btnDemolish">Demolish</button>
        <button id="btnDayNight">Toggle Day/Night</button>
      </div>
      <div class="hint">
        Move: WASD<br/>
        Place/Demolish: SPACE
      </div>
    </div>

    <div id="statsPanel" class="hud">
      <div class="hud-title">City Stats</div>
      <div class="stats-line">Population: <span id="populationValue">0</span></div>
      <div class="stats-line">Revenue: <span id="revenueValue">0</span></div>
      <div class="stats-line">Buildings: <span id="buildingCountValue">0</span></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const GRID_SIZE = 10;
    const CELL_SIZE = 5;
    const HALF_CITY = (GRID_SIZE * CELL_SIZE) / 2;
    const GROUND_SIZE = GRID_SIZE * CELL_SIZE; // 50, but requested ground plane is 100x100
    const FULL_GROUND_SIZE = 100;

    const BUILDING_CONFIG = {
      residential: { color: '#4CAF50', width: 4, depth: 4 },
      commercial: { color: '#2196F3', width: 4, depth: 4 },
      industrial: { color: '#FF9800', width: 4, depth: 4 },
      park: { color: '#66BB6A', width: 4, depth: 4 }
    };

    const app = document.getElementById('app');
    const buildPanel = document.getElementById('buildPanel');
    const btnResidential = document.getElementById('btnResidential');
    const btnCommercial = document.getElementById('btnCommercial');
    const btnIndustrial = document.getElementById('btnIndustrial');
    const btnPark = document.getElementById('btnPark');
    const btnDemolish = document.getElementById('btnDemolish');
    const btnDayNight = document.getElementById('btnDayNight');
    const populationValue = document.getElementById('populationValue');
    const revenueValue = document.getElementById('revenueValue');
    const buildingCountValue = document.getElementById('buildingCountValue');

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#87CEEB');

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      500
    );
    camera.position.set(30, 40, 30);
    camera.lookAt(0, 0, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(50, 80, 50);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -60;
    dirLight.shadow.camera.right = 60;
    dirLight.shadow.camera.top = 60;
    dirLight.shadow.camera.bottom = -60;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 200;
    scene.add(dirLight);

    // Ground plane 100x100 at y=0, dark color #2a2a2a
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(FULL_GROUND_SIZE, FULL_GROUND_SIZE),
      new THREE.MeshStandardMaterial({ color: '#2a2a2a' })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    ground.position.y = 0;
    scene.add(ground);

    // Visible grid lines for 10x10 city area (50x50 centered at origin)
    const gridHelper = new THREE.GridHelper(GROUND_SIZE, GRID_SIZE, '#444444', '#444444');
    gridHelper.position.y = 0.02;
    scene.add(gridHelper);

    // Optional border for clarity
    const cityBorder = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.PlaneGeometry(GROUND_SIZE, GROUND_SIZE)),
      new THREE.LineBasicMaterial({ color: '#555555' })
    );
    cityBorder.rotation.x = -Math.PI / 2;
    cityBorder.position.y = 0.03;
    scene.add(cityBorder);

    function safeNum(n, fallback = 0) {
      return Number.isFinite(n) ? n : fallback;
    }

    function createEmptyGrid() {
      return Array.from({ length: GRID_SIZE }, () =>
        Array.from({ length: GRID_SIZE }, () => null)
      );
    }

    const gridState = createEmptyGrid();
    const buildingObjects = Array.from({ length: GRID_SIZE }, () =>
      Array.from({ length: GRID_SIZE }, () => null)
    );

    const avatarGroup = new THREE.Group();
    scene.add(avatarGroup);

    let avatarModel = null;
    let avatarLoaded = false;
    let avatarGridPos = { row: 5, col: 5 };
    let selectedBuildingType = 'residential';
    let demolishMode = false;
    let isNight = false;

    let moveAnimation = null;

    let totals = {
      totalResidential: 0,
      totalCommercial: 0,
      totalIndustrial: 0,
      totalParks: 0,
      buildingCount: 0,
      population: 0,
      revenue: 0
    };

    function gridToWorld(row, col) {
      const x = -HALF_CITY + col * CELL_SIZE + CELL_SIZE / 2;
      const z = -HALF_CITY + row * CELL_SIZE + CELL_SIZE / 2;
      return { x, y: 0, z };
    }

    function updateStatsFromGrid() {
      let totalResidential = 0;
      let totalCommercial = 0;
      let totalIndustrial = 0;
      let totalParks = 0;
      let buildingCount = 0;

      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          const cell = gridState[r][c];
          if (!cell) continue;
          buildingCount++;
          if (cell.type === 'residential') totalResidential++;
          if (cell.type === 'commercial') totalCommercial++;
          if (cell.type === 'industrial') totalIndustrial++;
          if (cell.type === 'park') totalParks++;
        }
      }

      const population = totalResidential * 100 + totalParks * 50 - totalIndustrial * 10;
      const revenue = totalCommercial * 500 + totalIndustrial * 200;

      totals.totalResidential = safeNum(totalResidential);
      totals.totalCommercial = safeNum(totalCommercial);
      totals.totalIndustrial = safeNum(totalIndustrial);
      totals.totalParks = safeNum(totalParks);
      totals.buildingCount = safeNum(buildingCount);
      totals.population = safeNum(population);
      totals.revenue = safeNum(revenue);

      populationValue.textContent = String(totals.population);
      revenueValue.textContent = String(totals.revenue);
      buildingCountValue.textContent = String(totals.buildingCount);

      sync3DState();
    }

    function sync3DState() {
      const world = gridToWorld(avatarGridPos.row, avatarGridPos.col);
      const avatarWorldPos = {
        x: safeNum(avatarGroup.position.x || world.x),
        y: safeNum(avatarGroup.position.y || 0),
        z: safeNum(avatarGroup.position.z || world.z)
      };

      window.__3D_STATE__ = {
        gridState: gridState.map(row => row.map(cell => cell ? { type: cell.type } : null)),
        avatarGridPos: { row: safeNum(avatarGridPos.row), col: safeNum(avatarGridPos.col) },
        avatarWorldPos,
        selectedBuildingType,
        demolishMode: !!demolishMode,
        buildingCount: safeNum(totals.buildingCount),
        population: safeNum(totals.population),
        revenue: safeNum(totals.revenue),
        isNight: !!isNight,
        avatarLoaded: !!avatarLoaded,
        totalResidential: safeNum(totals.totalResidential),
        totalCommercial: safeNum(totals.totalCommercial),
        totalIndustrial: safeNum(totals.totalIndustrial),
        totalParks: safeNum(totals.totalParks)
      };
    }

    function setSelectedButton() {
      [btnResidential, btnCommercial, btnIndustrial, btnPark].forEach(btn => btn.classList.remove('selected'));
      if (selectedBuildingType === 'residential') btnResidential.classList.add('selected');
      if (selectedBuildingType === 'commercial') btnCommercial.classList.add('selected');
      if (selectedBuildingType === 'industrial') btnIndustrial.classList.add('selected');
      if (selectedBuildingType === 'park') btnPark.classList.add('selected');
      btnDemolish.classList.toggle('active', demolishMode);
      sync3DState();
    }

    function flashBuildPanel() {
      buildPanel.classList.add('flash');
      setTimeout(() => buildPanel.classList.remove('flash'), 180);
    }

    function applyNightMaterialRecursive(object, enabled) {
      object.traverse(child => {
        if (!child.isMesh || !child.material) return;
        const materials = Array.isArray(child.material) ? child.material : [child.material];
        materials.forEach(mat => {
          if ('emissive' in mat) {
            if (enabled) {
              if (!mat.userData.baseEmissive) {
                mat.userData.baseEmissive = mat.emissive.clone();
              }
              if (mat.color) {
                const glow = mat.color.clone().multiplyScalar(0.15);
                mat.emissive.copy(glow);
              } else {
                mat.emissive.setRGB(0.08, 0.08, 0.08);
              }
              mat.emissiveIntensity = 0.8;
            } else {
              if (mat.userData.baseEmissive) {
                mat.emissive.copy(mat.userData.baseEmissive);
              } else {
                mat.emissive.setRGB(0, 0, 0);
              }
              mat.emissiveIntensity = 1.0;
            }
          }
        });
      });
    }

    function createBuilding(type, row, col) {
      const world = gridToWorld(row, col);
      const root = new THREE.Group();
      root.position.set(world.x, 0, world.z);
      root.userData.type = type;

      if (type === 'park') {
        const parkBase = new THREE.Mesh(
          new THREE.PlaneGeometry(4, 4),
          new THREE.MeshStandardMaterial({ color: '#66BB6A' })
        );
        parkBase.rotation.x = -Math.PI / 2;
        parkBase.position.y = 0.05;
        parkBase.receiveShadow = true;
        root.add(parkBase);

        const treePositions = [
          [-1.1, -1.0],
          [1.1, -0.2],
          [0.0, 1.1]
        ];

        treePositions.forEach(([tx, tz]) => {
          const trunk = new THREE.Mesh(
            new THREE.CylinderGeometry(0.12, 0.15, 0.8, 8),
            new THREE.MeshStandardMaterial({ color: '#6D4C41' })
          );
          trunk.position.set(tx, 0.4, tz);
          trunk.castShadow = true;
          trunk.receiveShadow = true;

          const canopy = new THREE.Mesh(
            new THREE.SphereGeometry(0.45, 12, 12),
            new THREE.MeshStandardMaterial({ color: '#2E7D32' })
          );
          canopy.position.set(tx, 1.0, tz);
          canopy.castShadow = true;
          canopy.receiveShadow = true;

          root.add(trunk);
          root.add(canopy);
        });
      } else {
        let height = 8;
        let color = '#ffffff';

        if (type === 'residential') {
          height = 5 + Math.random() * 10;
          color = '#4CAF50';
        } else if (type === 'commercial') {
          height = 10 + Math.random() * 15;
          color = '#2196F3';
        } else if (type === 'industrial') {
          height = 8;
          color = '#FF9800';
        }

        height = safeNum(height, 8);

        const building = new THREE.Mesh(
          new THREE.BoxGeometry(4, height, 4),
          new THREE.MeshStandardMaterial({ color })
        );
        building.position.y = height / 2;
        building.castShadow = true;
        building.receiveShadow = true;
        root.add(building);
      }

      applyNightMaterialRecursive(root, isNight);
      scene.add(root);
      return root;
    }

    function placeBuildingAtAvatar() {
      const { row, col } = avatarGridPos;

      if (demolishMode) {
        const existing = gridState[row][col];
        if (!existing) {
          flashBuildPanel();
          return;
        }
        const obj = buildingObjects[row][col];
        if (obj) scene.remove(obj);
        buildingObjects[row][col] = null;
        gridState[row][col] = null;
        updateStatsFromGrid();
        return;
      }

      if (!selectedBuildingType) {
        flashBuildPanel();
        return;
      }

      if (gridState[row][col]) {
        flashBuildPanel();
        return;
      }

      const obj = createBuilding(selectedBuildingType, row, col);
      buildingObjects[row][col] = obj;
      gridState[row][col] = { type: selectedBuildingType };
      updateStatsFromGrid();
    }

    function setDayNight(night) {
      isNight = !!night;
      if (isNight) {
        scene.background.set('#1a1a3e');
        dirLight.intensity = 0.3;
        ambientLight.intensity = 0.15;
      } else {
        scene.background.set('#87CEEB');
        dirLight.intensity = 1.2;
        ambientLight.intensity = 0.4;
      }

      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          const obj = buildingObjects[r][c];
          if (obj) applyNightMaterialRecursive(obj, isNight);
        }
      }

      sync3DState();
    }

    function setAvatarFacing(direction) {
      if (!avatarModel) return;
      let targetY = 0;

      if (direction === 'W') targetY = Math.PI;        // north / -Z
      if (direction === 'S') targetY = 0;              // south / +Z
      if (direction === 'A') targetY = Math.PI / 2;    // west / -X
      if (direction === 'D') targetY = -Math.PI / 2;   // east / +X

      avatarModel.rotation.y = targetY;
      sync3DState();
    }

    function moveAvatar(dr, dc, directionKey) {
      if (moveAnimation) return;

      const newRow = Math.max(0, Math.min(GRID_SIZE - 1, avatarGridPos.row + dr));
      const newCol = Math.max(0, Math.min(GRID_SIZE - 1, avatarGridPos.col + dc));

      if (newRow === avatarGridPos.row && newCol === avatarGridPos.col) {
        setAvatarFacing(directionKey);
        return;
      }

      setAvatarFacing(directionKey);

      const start = {
        x: avatarGroup.position.x,
        y: avatarGroup.position.y,
        z: avatarGroup.position.z
      };
      const targetWorld = gridToWorld(newRow, newCol);
      const end = {
        x: targetWorld.x,
        y: 0,
        z: targetWorld.z
      };

      moveAnimation = {
        startTime: performance.now(),
        duration: 300,
        start,
        end,
        targetRow: newRow,
        targetCol: newCol
      };
    }

    function initAvatarPlaceholder() {
      const placeholder = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.5, 1.5, 4, 8),
        new THREE.MeshStandardMaterial({ color: '#e91e63' })
      );
      placeholder.castShadow = true;
      placeholder.receiveShadow = true;
      avatarGroup.add(placeholder);
      avatarModel = placeholder;

      const world = gridToWorld(avatarGridPos.row, avatarGridPos.col);
      avatarGroup.position.set(world.x, 0, world.z);
      avatarLoaded = false;
      sync3DState();
    }

    initAvatarPlaceholder();

    const loader = new GLTFLoader();
    loader.load(
      'https://threejs.org/examples/models/gltf/Xbot.glb',
      (gltf) => {
        if (avatarModel && avatarGroup.children.includes(avatarModel)) {
          avatarGroup.remove(avatarModel);
        }

        const model = gltf.scene;
        model.traverse(child => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
            if (child.material && 'emissive' in child.material && !child.material.userData.baseEmissive) {
              child.material.userData.baseEmissive = child.material.emissive.clone();
            }
          }
        });

        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        box.getSize(size);

        const currentHeight = Math.max(size.y, 0.001);
        const targetHeight = 3;
        const scale = targetHeight / currentHeight;
        model.scale.setScalar(scale);

        const box2 = new THREE.Box3().setFromObject(model);
        const minY = box2.min.y;
        model.position.y -= minY;

        avatarGroup.add(model);
        avatarModel = model;
        avatarLoaded = true;

        const world = gridToWorld(avatarGridPos.row, avatarGridPos.col);
        avatarGroup.position.set(world.x, 0, world.z);

        sync3DState();
      },
      undefined,
      (err) => {
        console.warn('Failed to load Xbot.glb, using placeholder avatar.', err);
        avatarLoaded = false;
        sync3DState();
      }
    );

    btnResidential.addEventListener('click', () => {
      selectedBuildingType = 'residential';
      demolishMode = false;
      setSelectedButton();
    });

    btnCommercial.addEventListener('click', () => {
      selectedBuildingType = 'commercial';
      demolishMode = false;
      setSelectedButton();
    });

    btnIndustrial.addEventListener('click', () => {
      selectedBuildingType = 'industrial';
      demolishMode = false;
      setSelectedButton();
    });

    btnPark.addEventListener('click', () => {
      selectedBuildingType = 'park';
      demolishMode = false;
      setSelectedButton();
    });

    btnDemolish.addEventListener('click', () => {
      demolishMode = !demolishMode;
      setSelectedButton();
    });

    btnDayNight.addEventListener('click', () => {
      setDayNight(!isNight);
    });

    window.addEventListener('keydown', (e) => {
      const tag = document.activeElement?.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;

      const key = e.code;

      if (key === 'KeyW') {
        e.preventDefault();
        moveAvatar(-1, 0, 'W');
      } else if (key === 'KeyS') {
        e.preventDefault();
        moveAvatar(1, 0, 'S');
      } else if (key === 'KeyA') {
        e.preventDefault();
        moveAvatar(0, -1, 'A');
      } else if (key === 'KeyD') {
        e.preventDefault();
        moveAvatar(0, 1, 'D');
      } else if (key === 'Space') {
        e.preventDefault();
        if (!moveAnimation) {
          placeBuildingAtAvatar();
        }
      }
    });

    function updateAvatarAnimation(now) {
      if (!moveAnimation) return;

      const elapsed = now - moveAnimation.startTime;
      const t = Math.min(1, elapsed / moveAnimation.duration);
      const eased = t < 1 ? (1 - Math.pow(1 - t, 3)) : 1;

      avatarGroup.position.x = THREE.MathUtils.lerp(moveAnimation.start.x, moveAnimation.end.x, eased);
      avatarGroup.position.y = THREE.MathUtils.lerp(moveAnimation.start.y, moveAnimation.end.y, eased);
      avatarGroup.position.z = THREE.MathUtils.lerp(moveAnimation.start.z, moveAnimation.end.z, eased);

      sync3DState();

      if (t >= 1) {
        avatarGridPos.row = moveAnimation.targetRow;
        avatarGridPos.col = moveAnimation.targetCol;
        avatarGroup.position.set(moveAnimation.end.x, moveAnimation.end.y, moveAnimation.end.z);
        moveAnimation = null;
        sync3DState();
      }
    }

    function animate(now = 0) {
      requestAnimationFrame(animate);
      updateAvatarAnimation(now);
      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    setSelectedButton();
    updateStatsFromGrid();

    const startWorld = gridToWorld(avatarGridPos.row, avatarGridPos.col);
    avatarGroup.position.set(startWorld.x, 0, startWorld.z);
    sync3DState();

    animate();
  </script>
</body>
</html>
