<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural City Builder</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .hud-panel {
            position: absolute;
            background: rgba(30, 30, 30, 0.85);
            color: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #555;
            backdrop-filter: blur(4px);
        }
        #build-hud {
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: background-color 0.2s;
        }
        #stats-hud {
            top: 20px;
            right: 20px;
            min-width: 150px;
        }
        #time-hud {
            bottom: 20px;
            right: 20px;
        }
        .hud-title {
            margin: 0 0 10px 0;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        button {
            background: #444;
            color: white;
            border: 2px solid transparent;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            text-align: left;
        }
        button:hover {
            background: #555;
        }
        button.selected {
            border-color: white;
            background: #666;
        }
        button.demolish-active {
            background: #f44336;
            border-color: #ffcdd2;
        }
        .btn-res { border-left: 4px solid #4CAF50; }
        .btn-com { border-left: 4px solid #2196F3; }
        .btn-ind { border-left: 4px solid #FF9800; }
        .btn-prk { border-left: 4px solid #66BB6A; }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .stat-value {
            font-weight: bold;
            color: #4CAF50;
        }
        .stat-value.negative {
            color: #f44336;
        }
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
        }
        .flash-red {
            background-color: rgba(244, 67, 54, 0.5) !important;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="build-hud" class="hud-panel">
        <h3 class="hud-title">Construction</h3>
        <button id="btn-residential" class="btn-res selected">Residential</button>
        <button id="btn-commercial" class="btn-com">Commercial</button>
        <button id="btn-industrial" class="btn-ind">Industrial</button>
        <button id="btn-park" class="btn-prk">Park</button>
        <div style="height: 10px;"></div>
        <button id="btn-demolish">Demolish Mode</button>
    </div>

    <div id="stats-hud" class="hud-panel">
        <h3 class="hud-title">City Stats</h3>
        <div class="stat-row"><span>Population:</span> <span id="stat-pop" class="stat-value">0</span></div>
        <div class="stat-row"><span>Revenue:</span> <span id="stat-rev" class="stat-value">0</span></div>
        <div class="stat-row"><span>Buildings:</span> <span id="stat-bld" class="stat-value">0</span></div>
    </div>

    <div id="time-hud" class="hud-panel">
        <button id="btn-time">Toggle Day/Night</button>
    </div>

    <div class="instructions">
        WASD: Move Inspector | SPACE: Build/Demolish | Mouse: Rotate/Zoom Camera
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            gridState: Array(10).fill(null).map(() => Array(10).fill(null)),
            avatarGridPos: { row: 5, col: 5 },
            avatarWorldPos: { x: 0, y: 0, z: 0 },
            selectedBuildingType: 'residential',
            demolishMode: false,
            buildingCount: 0,
            population: 0,
            revenue: 0,
            isNight: false,
            avatarLoaded: false,
            totalResidential: 0,
            totalCommercial: 0,
            totalIndustrial: 0,
            totalParks: 0
        };

        const internalGridMeshes = Array(10).fill(null).map(() => Array(10).fill(null));

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(30, 40, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.update();

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(50, 80, 50);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 150;
        const d = 40;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        scene.add(dirLight);

        // --- Ground & Grid ---
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(50, 10, 0x444444, 0x444444);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // --- Avatar Setup ---
        let avatar = null;
        const avatarScale = 1.66; // ~3 units tall
        let isMoving = false;
        let moveStartTime = 0;
        const moveDuration = 300;
        let startPos = new THREE.Vector3();
        let targetPos = new THREE.Vector3();
        let startQuat = new THREE.Quaternion();
        let targetQuat = new THREE.Quaternion();

        function getGridWorldPos(row, col) {
            return new THREE.Vector3((col - 4.5) * 5, 0, (row - 4.5) * 5);
        }

        const loader = new GLTFLoader();
        loader.load('https://threejs.org/examples/models/gltf/Xbot.glb', (gltf) => {
            avatar = gltf.scene;
            avatar.scale.set(avatarScale, avatarScale, avatarScale);
            
            avatar.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            const initialPos = getGridWorldPos(window.__3D_STATE__.avatarGridPos.row, window.__3D_STATE__.avatarGridPos.col);
            avatar.position.copy(initialPos);
            
            // Default facing +Z (South)
            avatar.rotation.y = 0;

            scene.add(avatar);
            window.__3D_STATE__.avatarLoaded = true;
            updateState();
        });

        // --- Building System ---
        const buildingColors = {
            residential: 0x4CAF50,
            commercial: 0x2196F3,
            industrial: 0xFF9800,
            park: 0x66BB6A
        };

        function createBuildingMesh(type) {
            const group = new THREE.Group();
            group.userData = { isBuilding: true, type: type };

            if (type === 'park') {
                const planeGeo = new THREE.PlaneGeometry(4, 4);
                const planeMat = new THREE.MeshStandardMaterial({ color: buildingColors.park });
                const plane = new THREE.Mesh(planeGeo, planeMat);
                plane.rotation.x = -Math.PI / 2;
                plane.position.y = 0.02;
                plane.receiveShadow = true;
                group.add(plane);

                const treePositions = [
                    {x: -1, z: -1}, {x: 1, z: 0.5}, {x: -0.5, z: 1.2}
                ];

                treePositions.forEach(pos => {
                    const trunkGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.5);
                    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5D4037 });
                    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                    trunk.position.set(pos.x, 0.25, pos.z);
                    trunk.castShadow = true;
                    
                    const leavesGeo = new THREE.SphereGeometry(0.4);
                    const leavesMat = new THREE.MeshStandardMaterial({ color: 0x2E7D32 });
                    const leaves = new THREE.Mesh(leavesGeo, leavesMat);
                    leaves.position.set(pos.x, 0.7, pos.z);
                    leaves.castShadow = true;

                    group.add(trunk);
                    group.add(leaves);
                });
            } else {
                let height = 4;
                if (type === 'residential') height = 5 + Math.random() * 10;
                else if (type === 'commercial') height = 10 + Math.random() * 15;
                else if (type === 'industrial') height = 8;

                const geo = new THREE.BoxGeometry(4, height, 4);
                const mat = new THREE.MeshStandardMaterial({ 
                    color: buildingColors[type],
                    emissive: buildingColors[type],
                    emissiveIntensity: window.__3D_STATE__.isNight ? 0.2 : 0
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = height / 2;
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                group.add(mesh);
            }
            return group;
        }

        function updateStats() {
            let pop = 0, rev = 0, count = 0;
            let res = 0, com = 0, ind = 0, prk = 0;

            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 10; c++) {
                    const cell = window.__3D_STATE__.gridState[r][c];
                    if (cell) {
                        count++;
                        if (cell.type === 'residential') { pop += 100; res++; }
                        else if (cell.type === 'commercial') { rev += 500; com++; }
                        else if (cell.type === 'industrial') { rev += 200; pop -= 10; ind++; }
                        else if (cell.type === 'park') { pop += 50; prk++; }
                    }
                }
            }

            window.__3D_STATE__.population = isNaN(pop) ? 0 : pop;
            window.__3D_STATE__.revenue = isNaN(rev) ? 0 : rev;
            window.__3D_STATE__.buildingCount = isNaN(count) ? 0 : count;
            window.__3D_STATE__.totalResidential = res;
            window.__3D_STATE__.totalCommercial = com;
            window.__3D_STATE__.totalIndustrial = ind;
            window.__3D_STATE__.totalParks = prk;

            document.getElementById('stat-pop').textContent = window.__3D_STATE__.population;
            document.getElementById('stat-pop').className = `stat-value ${window.__3D_STATE__.population < 0 ? 'negative' : ''}`;
            document.getElementById('stat-rev').textContent = window.__3D_STATE__.revenue;
            document.getElementById('stat-bld').textContent = window.__3D_STATE__.buildingCount;
        }

        function updateState() {
            if (avatar) {
                window.__3D_STATE__.avatarWorldPos = {
                    x: avatar.position.x,
                    y: avatar.position.y,
                    z: avatar.position.z
                };
            }
            updateStats();
        }

        function flashError() {
            const hud = document.getElementById('build-hud');
            hud.classList.add('flash-red');
            setTimeout(() => hud.classList.remove('flash-red'), 200);
        }

        function handleAction() {
            const r = window.__3D_STATE__.avatarGridPos.row;
            const c = window.__3D_STATE__.avatarGridPos.col;

            if (window.__3D_STATE__.demolishMode) {
                if (internalGridMeshes[r][c]) {
                    scene.remove(internalGridMeshes[r][c]);
                    internalGridMeshes[r][c] = null;
                    window.__3D_STATE__.gridState[r][c] = null;
                    updateState();
                }
            } else {
                if (internalGridMeshes[r][c]) {
                    flashError();
                } else {
                    const type = window.__3D_STATE__.selectedBuildingType;
                    const mesh = createBuildingMesh(type);
                    const pos = getGridWorldPos(r, c);
                    mesh.position.set(pos.x, 0, pos.z);
                    scene.add(mesh);
                    
                    internalGridMeshes[r][c] = mesh;
                    window.__3D_STATE__.gridState[r][c] = { type: type };
                    updateState();
                }
            }
        }

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            if (!avatar || isMoving) return;

            let dr = 0, dc = 0;
            let targetRotY = avatar.rotation.y;

            switch(e.key.toLowerCase()) {
                case 'w': dr = -1; targetRotY = Math.PI; break; // North (-Z)
                case 's': dr = 1; targetRotY = 0; break;        // South (+Z)
                case 'a': dc = -1; targetRotY = -Math.PI/2; break; // West (-X)
                case 'd': dc = 1; targetRotY = Math.PI/2; break;  // East (+X)
                case ' ': 
                    e.preventDefault();
                    handleAction(); 
                    return;
                default: return;
            }

            const newR = window.__3D_STATE__.avatarGridPos.row + dr;
            const newC = window.__3D_STATE__.avatarGridPos.col + dc;

            if (newR >= 0 && newR < 10 && newC >= 0 && newC < 10) {
                isMoving = true;
                moveStartTime = performance.now();
                startPos.copy(avatar.position);
                targetPos.copy(getGridWorldPos(newR, newC));
                
                startQuat.copy(avatar.quaternion);
                const euler = new THREE.Euler(0, targetRotY, 0);
                targetQuat.setFromEuler(euler);

                window.__3D_STATE__.avatarGridPos.row = newR;
                window.__3D_STATE__.avatarGridPos.col = newC;
            } else {
                // Just rotate if hitting boundary
                startQuat.copy(avatar.quaternion);
                const euler = new THREE.Euler(0, targetRotY, 0);
                targetQuat.setFromEuler(euler);
                avatar.quaternion.slerp(targetQuat, 1);
            }
        });

        // --- UI Interactions ---
        const btns = ['residential', 'commercial', 'industrial', 'park'];
        btns.forEach(type => {
            document.getElementById(`btn-${type}`).addEventListener('click', (e) => {
                window.__3D_STATE__.selectedBuildingType = type;
                window.__3D_STATE__.demolishMode = false;
                
                btns.forEach(b => document.getElementById(`btn-${b}`).classList.remove('selected'));
                e.target.classList.add('selected');
                
                const demBtn = document.getElementById('btn-demolish');
                demBtn.classList.remove('demolish-active');
                updateState();
            });
        });

        document.getElementById('btn-demolish').addEventListener('click', (e) => {
            window.__3D_STATE__.demolishMode = !window.__3D_STATE__.demolishMode;
            if (window.__3D_STATE__.demolishMode) {
                e.target.classList.add('demolish-active');
                btns.forEach(b => document.getElementById(`btn-${b}`).classList.remove('selected'));
                window.__3D_STATE__.selectedBuildingType = null;
            } else {
                e.target.classList.remove('demolish-active');
                window.__3D_STATE__.selectedBuildingType = 'residential';
                document.getElementById('btn-residential').classList.add('selected');
            }
            updateState();
        });

        document.getElementById('btn-time').addEventListener('click', () => {
            window.__3D_STATE__.isNight = !window.__3D_STATE__.isNight;
            const isNight = window.__3D_STATE__.isNight;

            scene.background.setHex(isNight ? 0x1a1a3e : 0x87CEEB);
            dirLight.intensity = isNight ? 0.3 : 1.2;
            ambientLight.intensity = isNight ? 0.15 : 0.4;

            scene.traverse((child) => {
                if (child.isMesh && child.material && child.material.emissive) {
                    // Only apply to building blocks, not ground or avatar
                    if (child.parent && child.parent.userData.isBuilding && child.parent.userData.type !== 'park') {
                        child.material.emissiveIntensity = isNight ? 0.2 : 0;
                    }
                }
            });
            updateState();
        });

        // --- Animation Loop ---
        function animate(time) {
            requestAnimationFrame(animate);

            if (isMoving && avatar) {
                const elapsed = time - moveStartTime;
                const t = Math.min(elapsed / moveDuration, 1);
                
                avatar.position.lerpVectors(startPos, targetPos, t);
                avatar.quaternion.slerpQuaternions(startQuat, targetQuat, t);

                if (t >= 1) {
                    isMoving = false;
                    updateState();
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate(performance.now());
        updateState();
    </script>
</body>
</html>
