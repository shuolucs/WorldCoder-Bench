<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procedural City Builder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #hud-left {
    position: absolute;
    top: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }

  .hud-btn {
    padding: 10px 18px;
    border: 3px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    transition: all 0.2s;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  }

  .hud-btn:hover { opacity: 0.85; transform: scale(1.03); }

  #btn-residential { background: #4CAF50; }
  #btn-commercial { background: #2196F3; }
  #btn-industrial { background: #FF9800; }
  #btn-park { background: #66BB6A; }
  #btn-demolish { background: #757575; }
  #btn-demolish.active { background: #f44336; }
  #btn-daynight { background: #5C6BC0; }

  .hud-btn.selected { border-color: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.6); }

  #hud-right {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 18px 24px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.8;
    z-index: 10;
    min-width: 200px;
    backdrop-filter: blur(5px);
  }

  #hud-right h3 {
    margin-bottom: 8px;
    font-size: 18px;
    border-bottom: 1px solid rgba(255,255,255,0.3);
    padding-bottom: 6px;
  }

  .stat-label { color: #aaa; }
  .stat-value { font-weight: bold; float: right; }

  #flash-overlay {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 180px;
    height: 300px;
    background: rgba(244, 67, 54, 0.4);
    border-radius: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    z-index: 11;
  }

  #flash-overlay.show { opacity: 1; }

  #instructions {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: #ccc;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 10;
    text-align: center;
  }
</style>
</head>
<body>

<div id="hud-left">
  <button class="hud-btn" id="btn-residential" onclick="selectBuilding('residential')">🏠 Residential</button>
  <button class="hud-btn" id="btn-commercial" onclick="selectBuilding('commercial')">🏢 Commercial</button>
  <button class="hud-btn" id="btn-industrial" onclick="selectBuilding('industrial')">🏭 Industrial</button>
  <button class="hud-btn" id="btn-park" onclick="selectBuilding('park')">🌳 Park</button>
  <hr style="border-color: rgba(255,255,255,0.2); margin: 4px 0;">
  <button class="hud-btn" id="btn-demolish" onclick="toggleDemolish()">🔨 Demolish</button>
  <button class="hud-btn" id="btn-daynight" onclick="toggleDayNight()">🌙 Day/Night</button>
</div>

<div id="flash-overlay"></div>

<div id="hud-right">
  <h3>📊 City Stats</h3>
  <div><span class="stat-label">Population:</span> <span class="stat-value" id="stat-pop">0</span></div>
  <div><span class="stat-label">Revenue:</span> <span class="stat-value" id="stat-rev">$0</span></div>
  <div><span class="stat-label">Buildings:</span> <span class="stat-value" id="stat-bld">0</span></div>
  <hr style="border-color: rgba(255,255,255,0.15); margin: 8px 0;">
  <div><span class="stat-label">Residential:</span> <span class="stat-value" id="stat-res">0</span></div>
  <div><span class="stat-label">Commercial:</span> <span class="stat-value" id="stat-com">0</span></div>
  <div><span class="stat-label">Industrial:</span> <span class="stat-value" id="stat-ind">0</span></div>
  <div><span class="stat-label">Parks:</span> <span class="stat-value" id="stat-park">0</span></div>
</div>

<div id="instructions">
  <strong>WASD</strong> to move avatar | <strong>SPACE</strong> to place/demolish | Select building type from left panel
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
const GRID_SIZE = 10;
const CELL_SIZE = 5;

const gridState = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(null));
const gridMeshes = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(null));

let avatarGridPos = { row: 5, col: 5 };
let selectedBuildingType = null;
let demolishMode = false;
let isNight = false;
let avatarLoaded = false;
let population = 0;
let revenue = 0;
let buildingCount = 0;
let totalResidential = 0;
let totalCommercial = 0;
let totalIndustrial = 0;
let totalParks = 0;

let avatarModel = null;
let isMoving = false;

// Expose state
window.__3D_STATE__ = {};

function updateState() {
  const wp = avatarModel ? avatarModel.position : { x: 0, y: 0, z: 0 };
  window.__3D_STATE__ = {
    gridState,
    avatarGridPos: { ...avatarGridPos },
    avatarWorldPos: { x: wp.x || 0, y: wp.y || 0, z: wp.z || 0 },
    selectedBuildingType,
    demolishMode,
    buildingCount: buildingCount || 0,
    population: population || 0,
    revenue: revenue || 0,
    isNight,
    avatarLoaded,
    totalResidential: totalResidential || 0,
    totalCommercial: totalCommercial || 0,
    totalIndustrial: totalIndustrial || 0,
    totalParks: totalParks || 0
  };
}

function gridToWorld(row, col) {
  const x = col * CELL_SIZE - (GRID_SIZE * CELL_SIZE) / 2 + CELL_SIZE / 2;
  const z = row * CELL_SIZE - (GRID_SIZE * CELL_SIZE) / 2 + CELL_SIZE / 2;
  return { x, z };
}

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(30, 40, 30);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(50, 80, 50);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 200;
dirLight.shadow.camera.left = -60;
dirLight.shadow.camera.right = 60;
dirLight.shadow.camera.top = 60;
dirLight.shadow.camera.bottom = -60;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Grid lines
const gridGroup = new THREE.Group();
const lineMat = new THREE.LineBasicMaterial({ color: 0x444444 });
const halfSize = (GRID_SIZE * CELL_SIZE) / 2;

for (let i = 0; i <= GRID_SIZE; i++) {
  const offset = i * CELL_SIZE - halfSize;
  // Horizontal
  const hPoints = [new THREE.Vector3(-halfSize, 0.01, offset), new THREE.Vector3(halfSize, 0.01, offset)];
  const hGeo = new THREE.BufferGeometry().setFromPoints(hPoints);
  gridGroup.add(new THREE.Line(hGeo, lineMat));
  // Vertical
  const vPoints = [new THREE.Vector3(offset, 0.01, -halfSize), new THREE.Vector3(offset, 0.01, halfSize)];
  const vGeo = new THREE.BufferGeometry().setFromPoints(vPoints);
  gridGroup.add(new THREE.Line(vGeo, lineMat));
}
scene.add(gridGroup);

// Cell highlight
const highlightGeo = new THREE.PlaneGeometry(CELL_SIZE, CELL_SIZE);
const highlightMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 });
const cellHighlight = new THREE.Mesh(highlightGeo, highlightMat);
cellHighlight.rotation.x = -Math.PI / 2;
cellHighlight.position.y = 0.02;
scene.add(cellHighlight);

function updateHighlight() {
  const wp = gridToWorld(avatarGridPos.row, avatarGridPos.col);
  cellHighlight.position.x = wp.x;
  cellHighlight.position.z = wp.z;
}

// ============ AVATAR ============
const loader = new GLTFLoader();
const avatarStartWorld = gridToWorld(5, 5);

loader.load(
  'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/Xbot.glb',
  (gltf) => {
    avatarModel = gltf.scene;
    
    // Calculate bounding box to scale to 3 units
    const box = new THREE.Box3().setFromObject(avatarModel);
    const currentHeight = box.max.y - box.min.y;
    const scaleFactor = 3 / currentHeight;
    avatarModel.scale.set(scaleFactor, scaleFactor, scaleFactor);
    
    avatarModel.position.set(avatarStartWorld.x, 0, avatarStartWorld.z);
    avatarModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    
    scene.add(avatarModel);
    avatarLoaded = true;
    updateHighlight();
    updateState();
    console.log('Avatar loaded successfully');
  },
  undefined,
  (error) => {
    console.error('Error loading avatar:', error);
    // Fallback: create a simple avatar
    const fallbackGroup = new THREE.Group();
    const bodyGeo = new THREE.CylinderGeometry(0.4, 0.4, 2, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x00bcd4 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1;
    body.castShadow = true;
    fallbackGroup.add(body);
    
    const headGeo = new THREE.SphereGeometry(0.5, 8, 8);
    const head = new THREE.Mesh(headGeo, bodyMat);
    head.position.y = 2.5;
    head.castShadow = true;
    fallbackGroup.add(head);
    
    fallbackGroup.position.set(avatarStartWorld.x, 0, avatarStartWorld.z);
    scene.add(fallbackGroup);
    avatarModel = fallbackGroup;
    avatarLoaded = true;
    updateHighlight();
    updateState();
  }
);

// ============ BUILDING CREATION ============
function createBuilding(type, row, col) {
  const wp = gridToWorld(row, col);
  const group = new THREE.Group();
  group.userData.type = type;

  if (type === 'park') {
    // Flat green plane
    const planeGeo = new THREE.PlaneGeometry(4, 4);
    const planeMat = new THREE.MeshStandardMaterial({ 
      color: 0x66BB6A,
      emissive: isNight ? 0x112211 : 0x000000
    });
    const plane = new THREE.Mesh(planeGeo, planeMat);
    plane.rotation.x = -Math.PI / 2;
    plane.position.set(wp.x, 0.03, wp.z);
    plane.receiveShadow = true;
    group.add(plane);

    // 3 trees
    const treePositions = [
      { x: -1, z: -1 },
      { x: 1, z: 0.8 },
      { x: -0.5, z: 1 }
    ];

    treePositions.forEach(tp => {
      // Trunk
      const trunkGeo = new THREE.CylinderGeometry(0.1, 0.15, 1.5, 6);
      const trunkMat = new THREE.MeshStandardMaterial({ 
        color: 0x795548,
        emissive: isNight ? 0x110800 : 0x000000
      });
      const trunk = new THREE.Mesh(trunkGeo, trunkMat);
      trunk.position.set(wp.x + tp.x, 0.75, wp.z + tp.z);
      trunk.castShadow = true;
      group.add(trunk);

      // Canopy
      const canopyGeo = new THREE.SphereGeometry(0.6, 8, 6);
      const canopyMat = new THREE.MeshStandardMaterial({ 
        color: 0x4CAF50,
        emissive: isNight ? 0x112211 : 0x000000
      });
      const canopy = new THREE.Mesh(canopyGeo, canopyMat);
      canopy.position.set(wp.x + tp.x, 1.8, wp.z + tp.z);
      canopy.castShadow = true;
      group.add(canopy);
    });
  } else {
    let color, height;
    if (type === 'residential') {
      color = 0x4CAF50;
      height = 5 + Math.random() * 10;
    } else if (type === 'commercial') {
      color = 0x2196F3;
      height = 10 + Math.random() * 15;
    } else if (type === 'industrial') {
      color = 0xFF9800;
      height = 8;
    }

    const geo = new THREE.BoxGeometry(4, height, 4);
    const mat = new THREE.MeshStandardMaterial({ 
      color,
      emissive: isNight ? new THREE.Color(color).multiplyScalar(0.15) : new THREE.Color(0x000000)
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(wp.x, height / 2, wp.z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);

    // Window details for non-park buildings
    if (type !== 'industrial') {
      const windowRows = Math.floor(height / 2.5);
      for (let wr = 0; wr < windowRows; wr++) {
        for (let side = 0; side < 4; side++) {
          const winGeo = new THREE.PlaneGeometry(0.5, 0.7);
          const winMat = new THREE.MeshStandardMaterial({
            color: isNight ? 0xFFEB3B : 0x90CAF9,
            emissive: isNight ? 0xFFEB3B : 0x000000,
            emissiveIntensity: isNight ? 0.5 : 0
          });
          const win = new THREE.Mesh(winGeo, winMat);
          const y = 1.5 + wr * 2.5;
          if (y > height - 1) continue;
          
          if (side === 0) { win.position.set(wp.x - 1, y, wp.z + 2.01); }
          else if (side === 1) { win.position.set(wp.x + 1, y, wp.z + 2.01); }
          else if (side === 2) { win.position.set(wp.x - 1, y, wp.z - 2.01); win.rotation.y = Math.PI; }
          else { win.position.set(wp.x + 1, y, wp.z - 2.01); win.rotation.y = Math.PI; }
          
          group.add(win);
        }
      }
    }
  }

  scene.add(group);
  return group;
}

// ============ BUILDING PLACEMENT / DEMOLISH ============
function placeBuilding() {
  const { row, col } = avatarGridPos;

  if (demolishMode) {
    if (gridState[row][col]) {
      const type = gridState[row][col].type;
      // Remove mesh
      if (gridMeshes[row][col]) {
        scene.remove(gridMeshes[row][col]);
        gridMeshes[row][col].traverse(child => {
          if (child.geometry) child.geometry.dispose();
          if (child.material) {
            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
            else child.material.dispose();
          }
        });
        gridMeshes[row][col] = null;
      }
      // Update stats
      if (type === 'residential') { population -= 100; totalResidential--; }
      else if (type === 'commercial') { revenue -= 500; totalCommercial--; }
      else if (type === 'industrial') { revenue -= 200; population += 10; totalIndustrial--; }
      else if (type === 'park') { population -= 50; totalParks--; }
      buildingCount--;

      gridState[row][col] = null;
      updateHUD();
      updateState();
    }
    return;
  }

  if (!selectedBuildingType) return;

  if (gridState[row][col]) {
    flashError();
    return;
  }

  gridState[row][col] = { type: selectedBuildingType };
  gridMeshes[row][col] = createBuilding(selectedBuildingType, row, col);
  buildingCount++;

  if (selectedBuildingType === 'residential') { population += 100; totalResidential++; }
  else if (selectedBuildingType === 'commercial') { revenue += 500; totalCommercial++; }
  else if (selectedBuildingType === 'industrial') { revenue += 200; population -= 10; totalIndustrial++; }
  else if (selectedBuildingType === 'park') { population += 50; totalParks++; }

  updateHUD();
  updateState();
}

function flashError() {
  const el = document.getElementById('flash-overlay');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 300);
}

// ============ HUD ============
function updateHUD() {
  document.getElementById('stat-pop').textContent = population || 0;
  document.getElementById('stat-rev').textContent = '$' + (revenue || 0);
  document.getElementById('stat-bld').textContent = buildingCount || 0;
  document.getElementById('stat-res').textContent = totalResidential || 0;
  document.getElementById('stat-com').textContent = totalCommercial || 0;
  document.getElementById('stat-ind').textContent = totalIndustrial || 0;
  document.getElementById('stat-park').textContent = totalParks || 0;
}

// ============ BUTTON HANDLERS ============
window.selectBuilding = function(type) {
  if (demolishMode) {
    demolishMode = false;
    document.getElementById('btn-demolish').classList.remove('active');
  }
  
  selectedBuildingType = type;
  
  document.querySelectorAll('.hud-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('btn-' + type).classList.add('selected');
  updateState();
};

window.toggleDemolish = function() {
  demolishMode = !demolishMode;
  const btn = document.getElementById('btn-demolish');
  
  if (demolishMode) {
    btn.classList.add('active');
    selectedBuildingType = null;
    document.querySelectorAll('.hud-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  } else {
    btn.classList.remove('active');
    btn.classList.remove('selected');
  }
  updateState();
};

window.toggleDayNight = function() {
  isNight = !isNight;
  
  if (isNight) {
    scene.background = new THREE.Color(0x1a1a3e);
    dirLight.intensity = 0.3;
    ambientLight.intensity = 0.15;
  } else {
    scene.background = new THREE.Color(0x87CEEB);
    dirLight.intensity = 1.2;
    ambientLight.intensity = 0.4;
  }

  // Update all building materials
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (gridMeshes[r][c]) {
        const type = gridState[r][c]?.type;
        gridMeshes[r][c].traverse(child => {
          if (child.isMesh && child.material) {
            if (child.material.color) {
              const hex = child.material.color.getHex();
              // Window materials
              if (hex === 0x90CAF9 || hex === 0xFFEB3B) {
                child.material.color.setHex(isNight ? 0xFFEB3B : 0x90CAF9);
                child.material.emissive.setHex(isNight ? 0xFFEB3B : 0x000000);
                child.material.emissiveIntensity = isNight ? 0.5 : 0;
              } else if (hex !== 0x2a2a2a && hex !== 0x444444 && hex !== 0xffffff) {
                // Building materials
                if (isNight) {
                  child.material.emissive = new THREE.Color(child.material.color).multiplyScalar(0.15);
                } else {
                  child.material.emissive = new THREE.Color(0x000000);
                }
              }
            }
          }
        });
      }
    }
  }

  const btnText = isNight ? '☀️ Day/Night' : '🌙 Day/Night';
  document.getElementById('btn-daynight').textContent = btnText;
  updateState();
};

// ============ AVATAR MOVEMENT ============
let moveStartPos = null;
let moveEndPos = null;
let moveStartTime = 0;
const MOVE_DURATION = 300;

const directionRotations = {
  'w': Math.PI,     // North (-Z)
  's': 0,           // South (+Z)
  'a': Math.PI / 2, // West (-X)
  'd': -Math.PI / 2 // East (+X)
};

document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  
  if (key === ' ') {
    e.preventDefault();
    placeBuilding();
    return;
  }

  if (isMoving || !avatarModel) return;

  let newRow = avatarGridPos.row;
  let newCol = avatarGridPos.col;

  if (key === 'w') newRow--;
  else if (key === 's') newRow++;
  else if (key === 'a') newCol--;
  else if (key === 'd') newCol++;
  else return;

  e.preventDefault();

  // Clamp
  newRow = Math.max(0, Math.min(GRID_SIZE - 1, newRow));
  newCol = Math.max(0, Math.min(GRID_SIZE - 1, newCol));

  if (newRow === avatarGridPos.row && newCol === avatarGridPos.col) return;

  // Set rotation
  avatarModel.rotation.y = directionRotations[key];

  avatarGridPos.row = newRow;
  avatarGridPos.col = newCol;

  const target = gridToWorld(newRow, newCol);
  moveStartPos = { x: avatarModel.position.x, z: avatarModel.position.z };
  moveEndPos = { x: target.x, z: target.z };
  moveStartTime = performance.now();
  isMoving = true;

  updateHighlight();
  updateState();
});

// ============ ANIMATION LOOP ============
function animate(time) {
  requestAnimationFrame(animate);

  // Avatar lerp movement
  if (isMoving && avatarModel && moveStartPos && moveEndPos) {
    const elapsed = time - moveStartTime;
    const t = Math.min(elapsed / MOVE_DURATION, 1);
    const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; // easeInOutQuad

    avatarModel.position.x = moveStartPos.x + (moveEndPos.x - moveStartPos.x) * eased;
    avatarModel.position.z = moveStartPos.z + (moveEndPos.z - moveStartPos.z) * eased;

    if (t >= 1) {
      isMoving = false;
      avatarModel.position.x = moveEndPos.x;
      avatarModel.position.z = moveEndPos.z;
      updateState();
    }
  }

  controls.update();
  renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ INIT ============
updateHighlight();
updateHUD();
updateState();
animate(performance.now());

</script>
</body>
</html>
