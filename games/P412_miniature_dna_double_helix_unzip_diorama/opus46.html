<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D DNA Double Helix Unzip Diorama</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a2e; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
}

#unzipInfo {
    position: absolute;
    top: 15px; left: 15px;
    color: #88ccff;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(100,180,255,0.5);
    background: rgba(10,10,46,0.7);
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid rgba(100,180,255,0.3);
}

#rotationInfo {
    position: absolute;
    top: 15px; right: 15px;
    color: #88ccff;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(100,180,255,0.5);
    background: rgba(10,10,46,0.7);
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid rgba(100,180,255,0.3);
}

#controls {
    position: absolute;
    bottom: 80px; left: 15px;
    pointer-events: all;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

#toggleLabelsBtn {
    padding: 10px 20px;
    background: linear-gradient(135deg, #3366ff, #6633ff);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: all 0.3s;
    box-shadow: 0 0 15px rgba(51,102,255,0.3);
}
#toggleLabelsBtn:hover {
    background: linear-gradient(135deg, #4477ff, #7744ff);
    box-shadow: 0 0 25px rgba(51,102,255,0.5);
    transform: scale(1.05);
}

.slider-container {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #88ccff;
    font-size: 13px;
    background: rgba(10,10,46,0.7);
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid rgba(100,180,255,0.3);
}

#speedSlider {
    width: 120px;
    accent-color: #3366ff;
    cursor: pointer;
}

#speedValue {
    min-width: 35px;
    text-align: right;
    color: #ffcc33;
    font-weight: bold;
}

#instructions {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(136,204,255,0.7);
    font-size: 12px;
    text-align: center;
    background: rgba(10,10,46,0.7);
    padding: 8px 20px;
    border-radius: 8px;
    border: 1px solid rgba(100,180,255,0.2);
    white-space: nowrap;
}

.base-label {
    position: absolute;
    color: #ffffff;
    font-size: 11px;
    font-weight: bold;
    pointer-events: none;
    text-shadow: 0 0 6px rgba(255,255,255,0.8);
    background: rgba(0,0,0,0.5);
    padding: 2px 6px;
    border-radius: 4px;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    display: none;
}

#labelsContainer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="hud">
    <div id="unzipInfo">Unzipped: 0/20</div>
    <div id="rotationInfo">Helix Rotation: 0°</div>
    <div id="controls">
        <button id="toggleLabelsBtn">Toggle Labels</button>
        <div class="slider-container">
            <label for="speedSlider">Animation Speed:</label>
            <input type="range" id="speedSlider" min="0.5" max="3.0" step="0.1" value="1.0">
            <span id="speedValue">1.0x</span>
        </div>
    </div>
    <div id="instructions">
        SPACE: Unzip next pair | R: Rezip all | L: Toggle lantern | ↑↓: Rotate helix | Click base pair to unzip to it
    </div>
</div>

<div id="labelsContainer"></div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.157.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);
scene.fog = new THREE.FogExp2(0x0a0a2e, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// Lighting
const ambientLight = new THREE.AmbientLight(0x334466, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
scene.add(directionalLight);

// Lantern light
const lanternPosition = new THREE.Vector3(-6, 0, 0);
const lanternLight = new THREE.PointLight(0xffaa33, 1.5, 15);
lanternLight.position.copy(lanternPosition);
lanternLight.castShadow = true;
scene.add(lanternLight);

// Add a small glow sphere at lantern position as fallback visual
const lanternGlowGeo = new THREE.SphereGeometry(0.3, 16, 16);
const lanternGlowMat = new THREE.MeshBasicMaterial({ color: 0xffaa33, transparent: true, opacity: 0.6 });
const lanternGlow = new THREE.Mesh(lanternGlowGeo, lanternGlowMat);
lanternGlow.position.copy(lanternPosition);
scene.add(lanternGlow);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x111133, roughness: 0.9, metalness: 0.1 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -6;
ground.receiveShadow = true;
scene.add(ground);

// Add subtle grid
const gridHelper = new THREE.GridHelper(30, 30, 0x222255, 0x111133);
gridHelper.position.y = -5.99;
scene.add(gridHelper);

// --- State ---
let unzipLevel = 0;
let helixRotationDeg = 0;
let lanternLightOn = true;
let labelsVisible = false;
let animationSpeed = 1.0;
let lanternLoaded = false;

const NUM_PAIRS = 20;
const HELIX_RADIUS = 1.5;
const VERTICAL_SPACING = 0.5;
const TWIST_ANGLE = THREE.MathUtils.degToRad(36);
const UNZIP_OFFSET = 1.5;

// Animation tracking
const pairAnimations = []; // { index, targetOffset, currentOffset, animating }
for (let i = 0; i < NUM_PAIRS; i++) {
    pairAnimations.push({ index: i, targetOffset: 0, currentOffset: 0, animating: false });
}

// --- DNA Construction ---
const helixGroup = new THREE.Group();
scene.add(helixGroup);

const strandAMat = new THREE.MeshStandardMaterial({ color: 0x3366ff, roughness: 0.3, metalness: 0.6, emissive: 0x112244, emissiveIntensity: 0.3 });
const strandBMat = new THREE.MeshStandardMaterial({ color: 0xff3366, roughness: 0.3, metalness: 0.6, emissive: 0x441122, emissiveIntensity: 0.3 });
const atMat = new THREE.MeshStandardMaterial({ color: 0x33ff66, roughness: 0.4, metalness: 0.3, emissive: 0x114422, emissiveIntensity: 0.2 });
const gcMat = new THREE.MeshStandardMaterial({ color: 0xffff33, roughness: 0.4, metalness: 0.3, emissive: 0x444411, emissiveIntensity: 0.2 });
const backboneAMat = new THREE.MeshStandardMaterial({ color: 0x3366ff, roughness: 0.5, metalness: 0.3 });
const backboneBMat = new THREE.MeshStandardMaterial({ color: 0xff3366, roughness: 0.5, metalness: 0.3 });

const sphereGeo = new THREE.SphereGeometry(0.15, 12, 12);

const strandASpheres = [];
const strandBSpheres = [];
const basePairCylinders = [];
const backboneACylinders = [];
const backboneBCylinders = [];
const basePairTypes = []; // 'AT' or 'GC'

// Base positions (unzipped offset = 0)
const basePositionsA = [];
const basePositionsB = [];

for (let i = 0; i < NUM_PAIRS; i++) {
    const y = -5 + i * VERTICAL_SPACING;
    const angle = i * TWIST_ANGLE;

    const ax = HELIX_RADIUS * Math.cos(angle);
    const az = HELIX_RADIUS * Math.sin(angle);
    const bx = HELIX_RADIUS * Math.cos(angle + Math.PI);
    const bz = HELIX_RADIUS * Math.sin(angle + Math.PI);

    basePositionsA.push(new THREE.Vector3(ax, y, az));
    basePositionsB.push(new THREE.Vector3(bx, y, bz));

    // Strand A sphere
    const sphereA = new THREE.Mesh(sphereGeo, strandAMat);
    sphereA.position.set(ax, y, az);
    sphereA.castShadow = true;
    helixGroup.add(sphereA);
    strandASpheres.push(sphereA);

    // Strand B sphere
    const sphereB = new THREE.Mesh(sphereGeo, strandBMat);
    sphereB.position.set(bx, y, bz);
    sphereB.castShadow = true;
    helixGroup.add(sphereB);
    strandBSpheres.push(sphereB);

    // Base pair cylinder
    const isAT = i % 2 === 0;
    basePairTypes.push(isAT ? 'AT' : 'GC');
    const pairMat = isAT ? atMat : gcMat;

    const pairDir = new THREE.Vector3(bx - ax, 0, bz - az);
    const pairLen = pairDir.length();
    const cylGeo = new THREE.CylinderGeometry(0.06, 0.06, pairLen, 8);
    const pairCyl = new THREE.Mesh(cylGeo, pairMat);

    const midX = (ax + bx) / 2;
    const midZ = (az + bz) / 2;
    pairCyl.position.set(midX, y, midZ);

    // Orient cylinder
    const up = new THREE.Vector3(0, 1, 0);
    const dir = pairDir.clone().normalize();
    const quat = new THREE.Quaternion().setFromUnitVectors(up, dir);
    pairCyl.quaternion.copy(quat);

    pairCyl.castShadow = true;
    pairCyl.userData = { pairIndex: i };
    helixGroup.add(pairCyl);
    basePairCylinders.push(pairCyl);
}

// Backbone cylinders
function createBackboneCylinder(p1, p2, mat) {
    const dir = new THREE.Vector3().subVectors(p2, p1);
    const len = dir.length();
    const geo = new THREE.CylinderGeometry(0.05, 0.05, len, 6);
    const cyl = new THREE.Mesh(geo, mat);
    const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
    cyl.position.copy(mid);
    const up = new THREE.Vector3(0, 1, 0);
    const d = dir.clone().normalize();
    const quat = new THREE.Quaternion().setFromUnitVectors(up, d);
    cyl.quaternion.copy(quat);
    cyl.userData.length = len;
    return cyl;
}

for (let i = 0; i < NUM_PAIRS - 1; i++) {
    const backA = createBackboneCylinder(basePositionsA[i], basePositionsA[i + 1], backboneAMat);
    helixGroup.add(backA);
    backboneACylinders.push(backA);

    const backB = createBackboneCylinder(basePositionsB[i], basePositionsB[i + 1], backboneBMat);
    helixGroup.add(backB);
    backboneBCylinders.push(backB);
}

// Enzyme marker
const enzymeGeo = new THREE.SphereGeometry(0.3, 16, 16);
const enzymeMat = new THREE.MeshStandardMaterial({
    color: 0xffff00,
    emissive: 0xffff00,
    emissiveIntensity: 0.8,
    roughness: 0.2,
    metalness: 0.5
});
const enzymeMarker = new THREE.Mesh(enzymeGeo, enzymeMat);
enzymeMarker.position.set(0, -5, 0);
helixGroup.add(enzymeMarker);

// Add a glow ring around enzyme
const ringGeo = new THREE.TorusGeometry(0.5, 0.05, 8, 32);
const ringMat = new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.4 });
const enzymeRing = new THREE.Mesh(ringGeo, ringMat);
enzymeRing.rotation.x = Math.PI / 2;
enzymeMarker.add(enzymeRing);

// --- Load Lantern GLB ---
const loader = new GLTFLoader();
loader.load(
    'https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/Lantern/glTF-Binary/Lantern.glb',
    (gltf) => {
        const lantern = gltf.scene;
        lantern.scale.set(0.5, 0.5, 0.5);
        lantern.position.copy(lanternPosition);
        lantern.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        scene.add(lantern);
        lanternLoaded = true;
        lanternGlow.visible = false;
    },
    undefined,
    (error) => {
        console.warn('Could not load Lantern.glb:', error);
        // Keep the glow sphere as fallback
        lanternLoaded = false;
    }
);

// --- Labels ---
const labelsContainer = document.getElementById('labelsContainer');
const labelElements = [];
for (let i = 0; i < NUM_PAIRS; i++) {
    const label = document.createElement('div');
    label.className = 'base-label';
    label.textContent = basePairTypes[i] === 'AT' ? 'A-T' : 'G-C';
    label.style.color = basePairTypes[i] === 'AT' ? '#33ff66' : '#ffff33';
    labelsContainer.appendChild(label);
    labelElements.push(label);
}

// --- Helper Functions ---
function getUnzippedPositions(index, offset) {
    const y = -5 + index * VERTICAL_SPACING;
    const angle = index * TWIST_ANGLE;

    const ax = HELIX_RADIUS * Math.cos(angle);
    const az = HELIX_RADIUS * Math.sin(angle);
    const bx = HELIX_RADIUS * Math.cos(angle + Math.PI);
    const bz = HELIX_RADIUS * Math.sin(angle + Math.PI);

    // Direction from center outward for each strand
    const dirA = new THREE.Vector2(ax, az).normalize();
    const dirB = new THREE.Vector2(bx, bz).normalize();

    return {
        a: new THREE.Vector3(ax + dirA.x * offset, y, az + dirA.y * offset),
        b: new THREE.Vector3(bx + dirB.x * offset, y, bz + dirB.y * offset)
    };
}

function updateBackbone(index) {
    // Update backbone connecting index to index-1 and index to index+1
    if (index > 0) {
        updateBackboneSegment(index - 1);
    }
    if (index < NUM_PAIRS - 1) {
        updateBackboneSegment(index);
    }
}

function updateBackboneSegment(segIndex) {
    const p1A = strandASpheres[segIndex].position;
    const p2A = strandASpheres[segIndex + 1].position;
    const backA = backboneACylinders[segIndex];

    const dirA = new THREE.Vector3().subVectors(p2A, p1A);
    const lenA = dirA.length();
    backA.geometry.dispose();
    backA.geometry = new THREE.CylinderGeometry(0.05, 0.05, lenA, 6);
    const midA = new THREE.Vector3().addVectors(p1A, p2A).multiplyScalar(0.5);
    backA.position.copy(midA);
    const upA = new THREE.Vector3(0, 1, 0);
    const dA = dirA.clone().normalize();
    backA.quaternion.setFromUnitVectors(upA, dA);

    const p1B = strandBSpheres[segIndex].position;
    const p2B = strandBSpheres[segIndex + 1].position;
    const backB = backboneBCylinders[segIndex];

    const dirB = new THREE.Vector3().subVectors(p2B, p1B);
    const lenB = dirB.length();
    backB.geometry.dispose();
    backB.geometry = new THREE.CylinderGeometry(0.05, 0.05, lenB, 6);
    const midB = new THREE.Vector3().addVectors(p1B, p2B).multiplyScalar(0.5);
    backB.position.copy(midB);
    const upB = new THREE.Vector3(0, 1, 0);
    const dB = dirB.clone().normalize();
    backB.quaternion.setFromUnitVectors(upB, dB);
}

function updateBasePairCylinder(index) {
    const posA = strandASpheres[index].position;
    const posB = strandBSpheres[index].position;
    const cyl = basePairCylinders[index];

    const dir = new THREE.Vector3().subVectors(posB, posA);
    const len = dir.length();
    cyl.geometry.dispose();
    cyl.geometry = new THREE.CylinderGeometry(0.06, 0.06, len, 8);
    const mid = new THREE.Vector3().addVectors(posA, posB).multiplyScalar(0.5);
    cyl.position.copy(mid);
    const up = new THREE.Vector3(0, 1, 0);
    const d = dir.clone().normalize();
    cyl.quaternion.setFromUnitVectors(up, d);
}

function unzipTo(targetLevel) {
    if (targetLevel > NUM_PAIRS) targetLevel = NUM_PAIRS;
    if (targetLevel <= unzipLevel) return;

    for (let i = unzipLevel; i < targetLevel; i++) {
        pairAnimations[i].targetOffset = UNZIP_OFFSET;
        pairAnimations[i].animating = true;
    }
    unzipLevel = targetLevel;
}

function rezipAll() {
    for (let i = 0; i < NUM_PAIRS; i++) {
        pairAnimations[i].targetOffset = 0;
        pairAnimations[i].animating = true;
    }
    unzipLevel = 0;
}

// --- Raycasting ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(basePairCylinders);

    if (intersects.length > 0) {
        const pairIndex = intersects[0].object.userData.pairIndex;
        if (pairIndex !== undefined && pairIndex >= unzipLevel) {
            unzipTo(pairIndex + 1);
        }
    }
});

// --- Keyboard ---
document.addEventListener('keydown', (event) => {
    switch (event.code) {
        case 'Space':
            event.preventDefault();
            if (unzipLevel < NUM_PAIRS) {
                unzipTo(unzipLevel + 1);
            }
            break;
        case 'KeyR':
            rezipAll();
            break;
        case 'KeyL':
            lanternLightOn = !lanternLightOn;
            lanternLight.visible = lanternLightOn;
            lanternGlow.visible = lanternLightOn && !lanternLoaded;
            break;
        case 'ArrowUp':
            event.preventDefault();
            helixRotationDeg += 15;
            break;
        case 'ArrowDown':
            event.preventDefault();
            helixRotationDeg -= 15;
            break;
    }
});

// --- UI ---
const toggleLabelsBtn = document.getElementById('toggleLabelsBtn');
toggleLabelsBtn.addEventListener('click', () => {
    labelsVisible = !labelsVisible;
});

const speedSlider = document.getElementById('speedSlider');
const speedValue = document.getElementById('speedValue');
speedSlider.addEventListener('input', () => {
    animationSpeed = parseFloat(speedSlider.value);
    speedValue.textContent = animationSpeed.toFixed(1) + 'x';
});

// --- Particles (ambient) ---
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3] = (Math.random() - 0.5) * 30;
    particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 20;
    particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 30;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0x6688cc, size: 0.05, transparent: true, opacity: 0.5 });
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// --- State Object ---
window.__3D_STATE__ = {
    unzipLevel: 0,
    helixRotationDeg: 0,
    lanternLightOn: true,
    labelsVisible: false,
    enzymeMarkerY: -5,
    animationSpeed: 1.0,
    basePairsTotal: 20,
    lanternLoaded: false,
    strandAPositions: [],
    strandBPositions: [],
    basePairVisible: []
};

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    const speedDelta = delta * animationSpeed;

    // Animate pair separations
    for (let i = 0; i < NUM_PAIRS; i++) {
        const anim = pairAnimations[i];
        if (anim.animating) {
            const diff = anim.targetOffset - anim.currentOffset;
            const step = diff * Math.min(1, speedDelta * 4);

            if (Math.abs(diff) < 0.001) {
                anim.currentOffset = anim.targetOffset;
                anim.animating = false;
            } else {
                anim.currentOffset += step;
            }

            // Update sphere positions
            const pos = getUnzippedPositions(i, anim.currentOffset);
            strandASpheres[i].position.copy(pos.a);
            strandBSpheres[i].position.copy(pos.b);

            // Update base pair cylinder visibility and position
            if (anim.currentOffset > 0.1) {
                basePairCylinders[i].visible = false;
            } else {
                basePairCylinders[i].visible = true;
                updateBasePairCylinder(i);
            }

            // Update backbone
            updateBackbone(i);
        }
    }

    // Update helix rotation
    const targetRotRad = THREE.MathUtils.degToRad(helixRotationDeg);
    helixGroup.rotation.y += (targetRotRad - helixGroup.rotation.y) * Math.min(1, speedDelta * 5);

    // Update enzyme marker position
    let enzymeY;
    if (unzipLevel >= NUM_PAIRS) {
        enzymeY = -5 + (NUM_PAIRS - 1) * VERTICAL_SPACING;
    } else {
        enzymeY = -5 + unzipLevel * VERTICAL_SPACING;
    }
    enzymeMarker.position.y += (enzymeY - enzymeMarker.position.y) * Math.min(1, speedDelta * 5);

    // Enzyme ring rotation
    enzymeRing.rotation.z += delta * 2;

    // Particle drift
    const posArr = particleGeo.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
        posArr[i * 3 + 1] += Math.sin(Date.now() * 0.001 + i) * 0.002;
    }
    particleGeo.attributes.position.needsUpdate = true;

    // Update labels
    for (let i = 0; i < NUM_PAIRS; i++) {
        const label = labelElements[i];
        if (labelsVisible && basePairCylinders[i].visible) {
            label.style.display = 'block';
            const worldPos = new THREE.Vector3();
            basePairCylinders[i].getWorldPosition(worldPos);
            worldPos.project(camera);
            const x = (worldPos.x * 0.5 + 0.5) * window.innerWidth;
            const y = (-worldPos.y * 0.5 + 0.5) * window.innerHeight;
            if (worldPos.z < 1 && x > 0 && x < window.innerWidth && y > 0 && y < window.innerHeight) {
                label.style.left = (x + 20) + 'px';
                label.style.top = y + 'px';
            } else {
                label.style.display = 'none';
            }
        } else {
            label.style.display = 'none';
        }
    }

    // Update HUD
    document.getElementById('unzipInfo').textContent = `Unzipped: ${unzipLevel}/${NUM_PAIRS}`;
    document.getElementById('rotationInfo').textContent = `Helix Rotation: ${Math.round(helixRotationDeg)}°`;

    // Update state
    const strandAPos = [];
    const strandBPos = [];
    const bpVisible = [];
    for (let i = 0; i < NUM_PAIRS; i++) {
        const wA = new THREE.Vector3();
        strandASpheres[i].getWorldPosition(wA);
        strandAPos.push({ x: isFinite(wA.x) ? wA.x : 0, y: isFinite(wA.y) ? wA.y : 0, z: isFinite(wA.z) ? wA.z : 0 });

        const wB = new THREE.Vector3();
        strandBSpheres[i].getWorldPosition(wB);
        strandBPos.push({ x: isFinite(wB.x) ? wB.x : 0, y: isFinite(wB.y) ? wB.y : 0, z: isFinite(wB.z) ? wB.z : 0 });

        bpVisible.push(basePairCylinders[i].visible);
    }

    const eY = isFinite(enzymeMarker.position.y) ? enzymeMarker.position.y : 0;

    window.__3D_STATE__ = {
        unzipLevel: unzipLevel,
        helixRotationDeg: Math.round(helixRotationDeg),
        lanternLightOn: lanternLightOn,
        labelsVisible: labelsVisible,
        enzymeMarkerY: eY,
        animationSpeed: animationSpeed,
        basePairsTotal: 20,
        lanternLoaded: lanternLoaded,
        strandAPositions: strandAPos,
        strandBPositions: strandBPos,
        basePairVisible: bpVisible
    };

    controls.update();
    renderer.render(scene, camera);
}

animate();

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
