<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D DNA Double Helix Unzip Diorama</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      z-index: 20;
      pointer-events: none;
      font-size: 16px;
      text-shadow: 0 0 6px rgba(0,0,0,0.8);
    }

    #hudLeft {
      top: 12px;
      left: 12px;
    }

    #hudRight {
      top: 12px;
      right: 12px;
      text-align: right;
    }

    #controlsPanel {
      position: absolute;
      top: 52px;
      left: 12px;
      z-index: 30;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(10, 10, 46, 0.6);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 12px;
      backdrop-filter: blur(4px);
    }

    #controlsPanel button,
    #controlsPanel input {
      pointer-events: auto;
    }

    #toggleLabelsBtn {
      background: #1f3b73;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
    }

    #toggleLabelsBtn:hover {
      background: #29539b;
    }

    .sliderRow {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 220px;
    }

    .sliderLabel {
      font-size: 14px;
    }

    #instructions {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      pointer-events: none;
      text-align: center;
      font-size: 14px;
      line-height: 1.4;
      max-width: 90vw;
      color: #dce6ff;
      text-shadow: 0 0 6px rgba(0,0,0,0.8);
    }

    #labelsContainer {
      position: absolute;
      inset: 0;
      z-index: 25;
      pointer-events: none;
    }

    .pairLabel {
      position: absolute;
      transform: translate(-50%, -50%);
      font-size: 12px;
      color: #ffffff;
      background: rgba(0,0,0,0.45);
      padding: 2px 6px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      white-space: nowrap;
      text-shadow: 0 0 4px rgba(0,0,0,0.9);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hudLeft" class="hud">Unzipped: 0/20</div>
    <div id="hudRight" class="hud">Helix Rotation: 0deg</div>

    <div id="controlsPanel">
      <button id="toggleLabelsBtn">Toggle Labels</button>
      <div class="sliderRow">
        <label class="sliderLabel" for="speedSlider">Animation Speed: <span id="speedValue">1.0x</span></label>
        <input id="speedSlider" type="range" min="0.5" max="3.0" step="0.1" value="1.0" />
      </div>
    </div>

    <div id="labelsContainer"></div>

    <div id="instructions">
      Space: unzip next pair &nbsp;|&nbsp; R: rezip all &nbsp;|&nbsp; L: lantern light on/off &nbsp;|&nbsp;
      Click a base pair to unzip up to it &nbsp;|&nbsp; ↑ / ↓: rotate helix ±15°
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.157.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.157.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const hudLeft = document.getElementById('hudLeft');
    const hudRight = document.getElementById('hudRight');
    const toggleLabelsBtn = document.getElementById('toggleLabelsBtn');
    const speedSlider = document.getElementById('speedSlider');
    const speedValue = document.getElementById('speedValue');
    const labelsContainer = document.getElementById('labelsContainer');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0x334466, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const lanternLight = new THREE.PointLight(0xffaa33, 1.5, 15);
    lanternLight.position.set(-6, 0, 0);
    scene.add(lanternLight);

    const helixGroup = new THREE.Group();
    scene.add(helixGroup);

    const dnaGroup = new THREE.Group();
    helixGroup.add(dnaGroup);

    const totalPairs = 20;
    const helixRadius = 1.5;
    const verticalSpacing = 10 / (totalPairs - 1);
    const twistPerPair = THREE.MathUtils.degToRad(36);
    const unzipSpread = 1.5;

    const strandA = [];
    const strandB = [];
    const pairConnectors = [];
    const backboneA = [];
    const backboneB = [];
    const pairMeta = [];
    const labelElements = [];

    const blueMat = new THREE.MeshStandardMaterial({ color: 0x3366ff });
    const redMat = new THREE.MeshStandardMaterial({ color: 0xff3366 });
    const atMat = new THREE.MeshStandardMaterial({ color: 0x33ff66 });
    const gcMat = new THREE.MeshStandardMaterial({ color: 0xffff33 });
    const enzymeMat = new THREE.MeshStandardMaterial({
      color: 0xffff00,
      emissive: 0xffff00,
      emissiveIntensity: 1.2
    });

    const sphereGeo = new THREE.SphereGeometry(0.15, 20, 20);
    const enzymeGeo = new THREE.SphereGeometry(0.3, 24, 24);
    const backboneGeo = new THREE.CylinderGeometry(0.05, 0.05, 1, 12);
    const pairGeo = new THREE.CylinderGeometry(0.08, 0.08, 1, 16);

    function finiteNum(n, fallback = 0) {
      return Number.isFinite(n) ? n : fallback;
    }

    function computeClosedPos(index, strand) {
      const y = -5 + index * verticalSpacing;
      const angle = index * twistPerPair + (strand === 'B' ? Math.PI : 0);
      return new THREE.Vector3(
        helixRadius * Math.cos(angle),
        y,
        helixRadius * Math.sin(angle)
      );
    }

    function createCylinderBetween(mesh, start, end, visible = true) {
      const dir = new THREE.Vector3().subVectors(end, start);
      const len = Math.max(dir.length(), 0.0001);
      mesh.position.copy(start).add(end).multiplyScalar(0.5);
      mesh.scale.set(1, len, 1);
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
      mesh.visible = visible;
    }

    for (let i = 0; i < totalPairs; i++) {
      const posA = computeClosedPos(i, 'A');
      const posB = computeClosedPos(i, 'B');

      const sphereA = new THREE.Mesh(sphereGeo, blueMat);
      sphereA.position.copy(posA);
      dnaGroup.add(sphereA);
      strandA.push(sphereA);

      const sphereB = new THREE.Mesh(sphereGeo, redMat);
      sphereB.position.copy(posB);
      dnaGroup.add(sphereB);
      strandB.push(sphereB);

      const isAT = i % 2 === 0;
      const connector = new THREE.Mesh(pairGeo, isAT ? atMat : gcMat);
      connector.userData.index = i;
      connector.userData.isBasePair = true;
      createCylinderBetween(connector, posA, posB, true);
      dnaGroup.add(connector);
      pairConnectors.push(connector);

      pairMeta.push({
        type: isAT ? 'A-T' : 'G-C',
        closedA: posA.clone(),
        closedB: posB.clone(),
        openA: posA.clone().add(new THREE.Vector3(-unzipSpread, 0, 0)),
        openB: posB.clone().add(new THREE.Vector3(unzipSpread, 0, 0)),
        progress: 0,
        target: 0
      });

      const label = document.createElement('div');
      label.className = 'pairLabel';
      label.textContent = isAT ? 'A-T' : 'G-C';
      label.style.display = 'none';
      labelsContainer.appendChild(label);
      labelElements.push(label);
    }

    for (let i = 0; i < totalPairs - 1; i++) {
      const segA = new THREE.Mesh(backboneGeo, blueMat);
      dnaGroup.add(segA);
      backboneA.push(segA);

      const segB = new THREE.Mesh(backboneGeo, redMat);
      dnaGroup.add(segB);
      backboneB.push(segB);
    }

    const enzymeMarker = new THREE.Mesh(enzymeGeo, enzymeMat);
    enzymeMarker.position.set(0, pairMeta[0].closedA.y, 0);
    dnaGroup.add(enzymeMarker);

    const basePlatform = new THREE.Mesh(
      new THREE.CylinderGeometry(4.2, 4.6, 0.4, 48),
      new THREE.MeshStandardMaterial({
        color: 0x223344,
        metalness: 0.2,
        roughness: 0.8
      })
    );
    basePlatform.position.set(0, -5.8, 0);
    helixGroup.add(basePlatform);

    let unzipLevel = 0;
    let helixRotationDeg = 0;
    let lanternLightOn = true;
    let labelsVisible = false;
    let animationSpeed = 1.0;
    let lanternLoaded = false;

    function setTargetsFromUnzipLevel() {
      for (let i = 0; i < totalPairs; i++) {
        pairMeta[i].target = i < unzipLevel ? 1 : 0;
      }
    }

    function unzipTo(level) {
      unzipLevel = Math.max(0, Math.min(totalPairs, Math.floor(level)));
      setTargetsFromUnzipLevel();
    }

    function rezipAll() {
      unzipLevel = 0;
      setTargetsFromUnzipLevel();
    }

    function updatePairTransforms() {
      for (let i = 0; i < totalPairs; i++) {
        const meta = pairMeta[i];
        const p = THREE.MathUtils.clamp(meta.progress, 0, 1);

        const posA = meta.closedA.clone().lerp(meta.openA, p);
        const posB = meta.closedB.clone().lerp(meta.openB, p);

        strandA[i].position.copy(posA);
        strandB[i].position.copy(posB);

        pairConnectors[i].visible = p < 0.98;
        if (pairConnectors[i].visible) {
          createCylinderBetween(pairConnectors[i], posA, posB, true);
        }
      }

      for (let i = 0; i < totalPairs - 1; i++) {
        createCylinderBetween(backboneA[i], strandA[i].position, strandA[i + 1].position, true);
        createCylinderBetween(backboneB[i], strandB[i].position, strandB[i + 1].position, true);
      }

      const forkIndex = Math.min(unzipLevel, totalPairs - 1);
      const forkY = pairMeta[forkIndex].closedA.y;
      enzymeMarker.position.set(0, forkY, 0);
      if (unzipLevel >= totalPairs) {
        enzymeMarker.position.set(0, pairMeta[totalPairs - 1].closedA.y + 0.6, 0);
      }
    }

    updatePairTransforms();

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    renderer.domElement.addEventListener('click', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(pairConnectors.filter(m => m.visible), false);

      if (intersects.length > 0) {
        const obj = intersects[0].object;
        const idx = obj.userData.index;
        if (Number.isInteger(idx) && idx >= unzipLevel) {
          unzipTo(idx + 1);
        }
      }
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        unzipTo(unzipLevel + 1);
      } else if (e.key === 'r' || e.key === 'R') {
        rezipAll();
      } else if (e.key === 'l' || e.key === 'L') {
        lanternLightOn = !lanternLightOn;
        lanternLight.visible = lanternLightOn;
      } else if (e.key === 'ArrowUp') {
        helixRotationDeg += 15;
        helixGroup.rotation.y = THREE.MathUtils.degToRad(helixRotationDeg);
      } else if (e.key === 'ArrowDown') {
        helixRotationDeg -= 15;
        helixGroup.rotation.y = THREE.MathUtils.degToRad(helixRotationDeg);
      }
    });

    toggleLabelsBtn.addEventListener('click', () => {
      labelsVisible = !labelsVisible;
      for (const el of labelElements) {
        el.style.display = labelsVisible ? 'block' : 'none';
      }
    });

    speedSlider.addEventListener('input', () => {
      animationSpeed = finiteNum(parseFloat(speedSlider.value), 1.0);
      speedValue.textContent = `${animationSpeed.toFixed(1)}x`;
    });

    const loader = new GLTFLoader();
    loader.load(
      'Lantern.glb',
      (gltf) => {
        const lantern = gltf.scene;
        lantern.scale.setScalar(0.5);
        lantern.position.set(-6, 0, 0);
        scene.add(lantern);
        lanternLoaded = true;
      },
      undefined,
      () => {
        lanternLoaded = false;
        const fallbackLantern = new THREE.Group();

        const body = new THREE.Mesh(
          new THREE.CylinderGeometry(0.35, 0.35, 1.0, 16),
          new THREE.MeshStandardMaterial({ color: 0x886644, metalness: 0.3, roughness: 0.7 })
        );
        body.position.y = 0.5;
        fallbackLantern.add(body);

        const glow = new THREE.Mesh(
          new THREE.SphereGeometry(0.22, 16, 16),
          new THREE.MeshStandardMaterial({ color: 0xffcc66, emissive: 0xffaa33, emissiveIntensity: 1.3 })
        );
        glow.position.y = 0.5;
        fallbackLantern.add(glow);

        fallbackLantern.scale.setScalar(0.5);
        fallbackLantern.position.set(-6, 0, 0);
        scene.add(fallbackLantern);
      }
    );

    window.__3D_STATE__ = {
      unzipLevel: 0,
      helixRotationDeg: 0,
      lanternLightOn: true,
      labelsVisible: false,
      enzymeMarkerY: 0,
      animationSpeed: 1.0,
      basePairsTotal: 20,
      lanternLoaded: false,
      strandAPositions: [],
      strandBPositions: [],
      basePairVisible: new Array(20).fill(true)
    };

    function updateLabels() {
      for (let i = 0; i < totalPairs; i++) {
        const label = labelElements[i];
        if (!labelsVisible) {
          label.style.display = 'none';
          continue;
        }

        const a = strandA[i].getWorldPosition(new THREE.Vector3());
        const b = strandB[i].getWorldPosition(new THREE.Vector3());
        const mid = a.clone().add(b).multiplyScalar(0.5);
        mid.y += 0.2;

        const projected = mid.project(camera);
        const visible = projected.z >= -1 && projected.z <= 1;

        if (!visible) {
          label.style.display = 'none';
          continue;
        }

        const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;

        if (Number.isFinite(x) && Number.isFinite(y)) {
          label.style.display = 'block';
          label.style.left = `${x}px`;
          label.style.top = `${y}px`;
        } else {
          label.style.display = 'none';
        }
      }
    }

    function updateState() {
      const strandAPositions = [];
      const strandBPositions = [];
      const basePairVisible = [];

      for (let i = 0; i < totalPairs; i++) {
        const wa = strandA[i].getWorldPosition(new THREE.Vector3());
        const wb = strandB[i].getWorldPosition(new THREE.Vector3());

        strandAPositions.push({
          x: finiteNum(wa.x),
          y: finiteNum(wa.y),
          z: finiteNum(wa.z)
        });

        strandBPositions.push({
          x: finiteNum(wb.x),
          y: finiteNum(wb.y),
          z: finiteNum(wb.z)
        });

        basePairVisible.push(!!pairConnectors[i].visible);
      }

      window.__3D_STATE__.unzipLevel = Math.max(0, Math.min(totalPairs, unzipLevel));
      window.__3D_STATE__.helixRotationDeg = finiteNum(helixRotationDeg);
      window.__3D_STATE__.lanternLightOn = !!lanternLightOn;
      window.__3D_STATE__.labelsVisible = !!labelsVisible;
      window.__3D_STATE__.enzymeMarkerY = finiteNum(enzymeMarker.getWorldPosition(new THREE.Vector3()).y);
      window.__3D_STATE__.animationSpeed = finiteNum(animationSpeed, 1.0);
      window.__3D_STATE__.basePairsTotal = totalPairs;
      window.__3D_STATE__.lanternLoaded = !!lanternLoaded;
      window.__3D_STATE__.strandAPositions = strandAPositions;
      window.__3D_STATE__.strandBPositions = strandBPositions;
      window.__3D_STATE__.basePairVisible = basePairVisible;
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);

      for (let i = 0; i < totalPairs; i++) {
        const meta = pairMeta[i];
        const duration = meta.target > meta.progress ? 0.5 : 1.0;
        const rate = dt * animationSpeed / duration;
        if (meta.progress < meta.target) {
          meta.progress = Math.min(meta.target, meta.progress + rate);
        } else if (meta.progress > meta.target) {
          meta.progress = Math.max(meta.target, meta.progress - rate);
        }
      }

      updatePairTransforms();
      controls.update();
      updateLabels();

      hudLeft.textContent = `Unzipped: ${unzipLevel}/20`;
      hudRight.textContent = `Helix Rotation: ${Math.round(helixRotationDeg)}deg`;

      updateState();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
