<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Case Designer - Physics Debug</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: Arial, sans-serif; }
  canvas { display: block; }

  #color-panel {
    position: absolute;
    top: 15px;
    left: 15px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }

  #color-panel .color-btn {
    width: 120px;
    padding: 10px 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: transform 0.15s, border-color 0.15s;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    color: #fff;
  }

  #color-panel .color-btn:hover {
    transform: scale(1.05);
    border-color: rgba(255,255,255,0.8);
  }

  #color-panel .color-btn.active {
    border-color: #fff;
    box-shadow: 0 0 8px rgba(255,255,255,0.5);
  }

  #btn-red { background: #e74c3c; }
  #btn-blue { background: #3498db; }
  #btn-green { background: #2ecc71; }
  #btn-white { background: #ecf0f1; color: #333; text-shadow: none; }

  #controls-panel {
    position: absolute;
    top: 210px;
    left: 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
  }

  #controls-panel label {
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,0,0,0.6);
    padding: 8px 12px;
    border-radius: 6px;
  }

  #controls-panel label input {
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  #wireframe-btn {
    padding: 10px 16px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.15s;
  }

  #wireframe-btn:hover {
    background: rgba(255,255,255,0.15);
  }

  #debug-overlay {
    position: absolute;
    bottom: 15px;
    right: 15px;
    width: 280px;
    padding: 15px;
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    font-family: 'Courier New', Courier, monospace;
    font-size: 12px;
    border-radius: 8px;
    z-index: 10;
    line-height: 1.8;
    backdrop-filter: blur(4px);
  }

  #debug-overlay .debug-title {
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.3);
  }

  #debug-overlay .debug-label {
    color: #aaa;
  }

  #debug-overlay .debug-value {
    color: #0f0;
  }

  #loading-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26, 26, 46, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    color: #fff;
    font-size: 18px;
    font-family: Arial, sans-serif;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: #3498db;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 15px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div id="color-panel">
  <button class="color-btn" id="btn-red" data-color="red">Red</button>
  <button class="color-btn" id="btn-blue" data-color="blue">Blue</button>
  <button class="color-btn" id="btn-green" data-color="green">Green</button>
  <button class="color-btn active" id="btn-white" data-color="white">White</button>
</div>

<div id="controls-panel">
  <label>
    <input type="checkbox" id="auto-rotate-checkbox">
    Auto-Rotate
  </label>
  <button id="wireframe-btn">Toggle Wireframe</button>
</div>

<div id="debug-overlay">
  <div class="debug-title">Physics Debug</div>
  <div><span class="debug-label">Model Y Position: </span><span class="debug-value" id="dbg-model-y">0.00</span></div>
  <div><span class="debug-label">Rotation Y: </span><span class="debug-value" id="dbg-rotation-y">0.00°</span></div>
  <div><span class="debug-label">Bounding Box: </span><span class="debug-value" id="dbg-bbox">0.00 x 0.00 x 0.00</span></div>
  <div><span class="debug-label">Frame Count: </span><span class="debug-value" id="dbg-frame">0</span></div>
  <div><span class="debug-label">Wireframe Mode: </span><span class="debug-value" id="dbg-wireframe">OFF</span></div>
</div>

<div id="loading-overlay">
  <div class="spinner"></div>
  Loading 3D Model...
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
  modelLoaded: false,
  currentColor: 'white',
  rotationY: 0,
  autoRotate: false,
  wireframe: false,
  frameCount: 0,
  modelPositionY: 0.8,
  meshCount: 0,
  cameraDistance: 0
};

const colorMap = {
  red: '#e74c3c',
  blue: '#3498db',
  green: '#2ecc71',
  white: '#ecf0f1'
};

let model = null;
let wireframeOn = false;
let boundingBoxSize = new THREE.Vector3();

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color('#1a1a2e');

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 3.5);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(3, 5, 2);
scene.add(directionalLight);

// Grid
const gridHelper = new THREE.GridHelper(4, 10);
scene.add(gridHelper);

// Load model
const loader = new GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/TextureTransformMultiTest/glTF-Binary/TextureTransformMultiTest.glb',
  (gltf) => {
    model = gltf.scene;

    // Compute bounding box and normalize
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 1.5 / maxDim;
    model.scale.set(scale, scale, scale);

    // Recompute bounding box after scaling
    const boxScaled = new THREE.Box3().setFromObject(model);
    boxScaled.getSize(boundingBoxSize);

    // Center the model horizontally
    const center = boxScaled.getCenter(new THREE.Vector3());
    model.position.x -= center.x;
    model.position.z -= center.z;
    model.position.y = 0.8;

    // Count meshes
    let meshCount = 0;
    model.traverse((child) => {
      if (child.isMesh) {
        meshCount++;
      }
    });
    window.__3D_STATE__.meshCount = meshCount;

    // Apply default white color
    applyColor('white');

    scene.add(model);
    window.__3D_STATE__.modelLoaded = true;

    // Hide loading overlay
    document.getElementById('loading-overlay').style.display = 'none';
  },
  (progress) => {
    // Loading progress
  },
  (error) => {
    console.error('Error loading model:', error);
    document.getElementById('loading-overlay').innerHTML = '<span style="color:#e74c3c;">Failed to load model. Check console.</span>';
  }
);

// Apply color to all meshes
function applyColor(colorName) {
  if (!model) return;
  const hex = colorMap[colorName];
  const color = new THREE.Color(hex);
  model.traverse((child) => {
    if (child.isMesh) {
      if (child.material) {
        if (Array.isArray(child.material)) {
          child.material.forEach(mat => {
            mat.color.copy(color);
          });
        } else {
          child.material.color.copy(color);
        }
      }
    }
  });
  window.__3D_STATE__.currentColor = colorName;

  // Update button active state
  document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('btn-' + colorName).classList.add('active');
}

// Toggle wireframe
function toggleWireframe() {
  if (!model) return;
  wireframeOn = !wireframeOn;
  model.traverse((child) => {
    if (child.isMesh) {
      if (child.material) {
        if (Array.isArray(child.material)) {
          child.material.forEach(mat => {
            mat.wireframe = wireframeOn;
          });
        } else {
          child.material.wireframe = wireframeOn;
        }
      }
    }
  });
  window.__3D_STATE__.wireframe = wireframeOn;
}

// Event listeners
document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    applyColor(btn.dataset.color);
  });
});

document.getElementById('auto-rotate-checkbox').addEventListener('change', (e) => {
  window.__3D_STATE__.autoRotate = e.target.checked;
});

document.getElementById('wireframe-btn').addEventListener('click', () => {
  toggleWireframe();
});

// Debug elements
const dbgModelY = document.getElementById('dbg-model-y');
const dbgRotationY = document.getElementById('dbg-rotation-y');
const dbgBbox = document.getElementById('dbg-bbox');
const dbgFrame = document.getElementById('dbg-frame');
const dbgWireframe = document.getElementById('dbg-wireframe');

// Resize handler
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  window.__3D_STATE__.frameCount++;

  // Auto-rotate
  if (model && window.__3D_STATE__.autoRotate) {
    model.rotation.y += 0.01;
  }

  // Update state
  if (model) {
    window.__3D_STATE__.modelPositionY = model.position.y;
    window.__3D_STATE__.rotationY = THREE.MathUtils.radToDeg(model.rotation.y);
  }

  window.__3D_STATE__.cameraDistance = camera.position.length();

  // Update debug overlay
  if (model) {
    dbgModelY.textContent = model.position.y.toFixed(2);
    dbgRotationY.textContent = THREE.MathUtils.radToDeg(model.rotation.y).toFixed(2) + '°';
    dbgBbox.textContent = boundingBoxSize.x.toFixed(2) + ' x ' + boundingBoxSize.y.toFixed(2) + ' x ' + boundingBoxSize.z.toFixed(2);
  }
  dbgFrame.textContent = window.__3D_STATE__.frameCount;
  dbgWireframe.textContent = wireframeOn ? 'ON' : 'OFF';

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
