<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Phone Case Designer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #ui-panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 10px;
      backdrop-filter: blur(4px);
    }

    .color-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .color-btn, #wireframeBtn {
      border: none;
      color: #fff;
      padding: 10px 14px;
      cursor: pointer;
      border-radius: 6px;
      font-weight: bold;
      font-size: 14px;
      min-width: 70px;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    .color-btn:hover, #wireframeBtn:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }

    #wireframeBtn {
      background: #444;
    }

    #autoRotateWrap {
      color: #fff;
      font-size: 14px;
      user-select: none;
    }

    #debug-overlay {
      position: absolute;
      right: 16px;
      bottom: 16px;
      width: 280px;
      padding: 15px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.5;
      border-radius: 10px;
      z-index: 10;
      box-sizing: border-box;
    }

    #debug-overlay .title {
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 15px;
    }

    #debug-overlay .row {
      margin-bottom: 4px;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div id="ui-panel">
    <div class="color-row">
      <button class="color-btn" data-color="red" style="background:#e74c3c;">Red</button>
      <button class="color-btn" data-color="blue" style="background:#3498db;">Blue</button>
      <button class="color-btn" data-color="green" style="background:#2ecc71;">Green</button>
      <button class="color-btn" data-color="white" style="background:#ecf0f1; color:#222;">White</button>
    </div>

    <label id="autoRotateWrap">
      <input type="checkbox" id="autoRotateCheckbox" />
      Auto-Rotate
    </label>

    <button id="wireframeBtn">Toggle Wireframe</button>
  </div>

  <div id="debug-overlay">
    <div class="title">Physics Debug</div>
    <div class="row">Model Y Position: <span id="dbgModelY">0.00</span></div>
    <div class="row">Rotation Y: <span id="dbgRotY">0.00</span></div>
    <div class="row">Bounding Box Size: <span id="dbgBBox">0.00, 0.00, 0.00</span></div>
    <div class="row">Frame Count: <span id="dbgFrame">0</span></div>
    <div class="row">Wireframe Mode: <span id="dbgWireframe">OFF</span></div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.5, 3.5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.8, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(3, 5, 2);
    scene.add(directionalLight);

    const gridHelper = new THREE.GridHelper(4, 10);
    scene.add(gridHelper);

    const colorMap = {
      red: '#e74c3c',
      blue: '#3498db',
      green: '#2ecc71',
      white: '#ecf0f1'
    };

    let phoneModel = null;
    let modelBoundingSize = new THREE.Vector3(0, 0, 0);
    let frameCount = 0;
    let autoRotate = false;
    let wireframe = false;
    let currentColor = 'white';
    let meshCount = 0;

    window.__3D_STATE__ = {
      modelLoaded: false,
      currentColor: 'white',
      rotationY: 0,
      autoRotate: false,
      wireframe: false,
      frameCount: 0,
      modelPositionY: 0,
      meshCount: 0,
      cameraDistance: camera.position.distanceTo(new THREE.Vector3(0, 0, 0))
    };

    const dbgModelY = document.getElementById('dbgModelY');
    const dbgRotY = document.getElementById('dbgRotY');
    const dbgBBox = document.getElementById('dbgBBox');
    const dbgFrame = document.getElementById('dbgFrame');
    const dbgWireframe = document.getElementById('dbgWireframe');

    function applyColor(colorName) {
      if (!phoneModel) return;
      currentColor = colorName;
      const colorValue = colorMap[colorName];

      phoneModel.traverse((child) => {
        if (child.isMesh) {
          if (Array.isArray(child.material)) {
            child.material.forEach((mat) => {
              if (mat && mat.color) {
                mat = mat.clone();
                mat.color.set(colorValue);
                mat.wireframe = wireframe;
              }
            });
          } else if (child.material) {
            child.material = child.material.clone();
            if (child.material.color) child.material.color.set(colorValue);
            child.material.wireframe = wireframe;
          }
        }
      });
    }

    function applyWireframe(enabled) {
      if (!phoneModel) return;
      phoneModel.traverse((child) => {
        if (child.isMesh && child.material) {
          if (Array.isArray(child.material)) {
            child.material = child.material.map((mat) => {
              const cloned = mat.clone();
              cloned.wireframe = enabled;
              return cloned;
            });
          } else {
            child.material = child.material.clone();
            child.material.wireframe = enabled;
          }
        }
      });
    }

    function normalizeModelToBoundingBox(object3D, targetSize = 1.5) {
      const box = new THREE.Box3().setFromObject(object3D);
      const size = new THREE.Vector3();
      box.getSize(size);

      const maxDim = Math.max(size.x, size.y, size.z);
      if (maxDim > 0) {
        const scale = targetSize / maxDim;
        object3D.scale.multiplyScalar(scale);
      }

      const resizedBox = new THREE.Box3().setFromObject(object3D);
      resizedBox.getSize(modelBoundingSize);
    }

    const loader = new GLTFLoader();
    loader.load(
      'TextureTransformMultiTest.glb',
      (gltf) => {
        phoneModel = gltf.scene;

        normalizeModelToBoundingBox(phoneModel, 1.5);
        phoneModel.position.set(0, 0.8, 0);

        meshCount = 0;
        phoneModel.traverse((child) => {
          if (child.isMesh) {
            meshCount++;
            child.castShadow = false;
            child.receiveShadow = false;
          }
        });

        scene.add(phoneModel);

        applyColor('white');
        applyWireframe(false);

        window.__3D_STATE__.modelLoaded = true;
        window.__3D_STATE__.meshCount = meshCount;
      },
      undefined,
      (error) => {
        console.error('Error loading GLB:', error);
      }
    );

    document.querySelectorAll('.color-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        const color = btn.dataset.color;
        applyColor(color);
      });
    });

    document.getElementById('autoRotateCheckbox').addEventListener('change', (e) => {
      autoRotate = e.target.checked;
    });

    document.getElementById('wireframeBtn').addEventListener('click', () => {
      wireframe = !wireframe;
      applyWireframe(wireframe);
    });

    function updateDebugOverlay() {
      let modelY = 0;
      let rotYDeg = 0;
      let bboxText = `${modelBoundingSize.x.toFixed(2)}, ${modelBoundingSize.y.toFixed(2)}, ${modelBoundingSize.z.toFixed(2)}`;

      if (phoneModel) {
        const worldPos = new THREE.Vector3();
        phoneModel.getWorldPosition(worldPos);
        modelY = worldPos.y;
        rotYDeg = THREE.MathUtils.radToDeg(phoneModel.rotation.y);
      }

      dbgModelY.textContent = modelY.toFixed(2);
      dbgRotY.textContent = rotYDeg.toFixed(2);
      dbgBBox.textContent = bboxText;
      dbgFrame.textContent = String(frameCount);
      dbgWireframe.textContent = wireframe ? 'ON' : 'OFF';
    }

    function updateState() {
      let modelY = 0;
      let rotYDeg = 0;

      if (phoneModel) {
        const worldPos = new THREE.Vector3();
        phoneModel.getWorldPosition(worldPos);
        modelY = worldPos.y;
        rotYDeg = THREE.MathUtils.radToDeg(phoneModel.rotation.y);
      }

      window.__3D_STATE__.modelLoaded = !!phoneModel;
      window.__3D_STATE__.currentColor = currentColor;
      window.__3D_STATE__.rotationY = rotYDeg;
      window.__3D_STATE__.autoRotate = autoRotate;
      window.__3D_STATE__.wireframe = wireframe;
      window.__3D_STATE__.frameCount = frameCount;
      window.__3D_STATE__.modelPositionY = modelY;
      window.__3D_STATE__.meshCount = meshCount;
      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
    }

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      if (phoneModel && autoRotate) {
        phoneModel.rotation.y += 0.01;
      }

      controls.update();
      updateDebugOverlay();
      updateState();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
