<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Case Designer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #controls-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .color-btn-group {
            display: flex;
            gap: 5px;
        }
        .color-btn {
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            color: #333;
            text-shadow: 0px 0px 2px rgba(255,255,255,0.8);
        }
        #btn-red { background-color: #e74c3c; color: white; }
        #btn-blue { background-color: #3498db; color: white; }
        #btn-green { background-color: #2ecc71; color: #333; }
        #btn-white { background-color: #ecf0f1; color: #333; }
        
        .control-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button.action-btn {
            padding: 6px 10px;
            cursor: pointer;
            background: #333;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button.action-btn:hover {
            background: #555;
        }

        #debug-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 280px;
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.75);
            color: white;
            font-family: monospace;
            border-radius: 8px;
            pointer-events: none;
        }
        #debug-panel h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            font-weight: bold;
        }
        .debug-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 12px;
        }
        .debug-value {
            color: #a8ff60;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="controls-panel">
        <div class="color-btn-group">
            <button id="btn-red" class="color-btn">Red</button>
            <button id="btn-blue" class="color-btn">Blue</button>
            <button id="btn-green" class="color-btn">Green</button>
            <button id="btn-white" class="color-btn">White</button>
        </div>
        <div class="control-row">
            <input type="checkbox" id="auto-rotate-cb">
            <label for="auto-rotate-cb">Auto-Rotate</label>
        </div>
        <button id="btn-wireframe" class="action-btn">Toggle Wireframe</button>
    </div>

    <div id="debug-panel">
        <h3>Physics Debug</h3>
        <div class="debug-line"><span>Model Y Position:</span> <span id="dbg-pos-y" class="debug-value">0.00</span></div>
        <div class="debug-line"><span>Rotation Y:</span> <span id="dbg-rot-y" class="debug-value">0.00°</span></div>
        <div class="debug-line"><span>Bounding Box:</span> <span id="dbg-bbox" class="debug-value">0, 0, 0</span></div>
        <div class="debug-line"><span>Frame Count:</span> <span id="dbg-frames" class="debug-value">0</span></div>
        <div class="debug-line"><span>Wireframe Mode:</span> <span id="dbg-wireframe" class="debug-value">OFF</span></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            modelLoaded: false,
            currentColor: 'white',
            rotationY: 0,
            autoRotate: false,
            wireframe: false,
            frameCount: 0,
            modelPositionY: 0,
            meshCount: 0,
            cameraDistance: 0
        };

        const colors = {
            red: 0xe74c3c,
            blue: 0x3498db,
            green: 0x2ecc71,
            white: 0xecf0f1
        };

        let scene, camera, renderer, controls, model;
        let boundingBoxSize = new THREE.Vector3();

        // DOM Elements
        const dbgPosY = document.getElementById('dbg-pos-y');
        const dbgRotY = document.getElementById('dbg-rot-y');
        const dbgBBox = document.getElementById('dbg-bbox');
        const dbgFrames = document.getElementById('dbg-frames');
        const dbgWireframe = document.getElementById('dbg-wireframe');

        init();
        animate();

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);

            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.5, 3.5);
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(0, 0, 0);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(3, 5, 2);
            scene.add(directionalLight);

            // Grid Helper
            const gridHelper = new THREE.GridHelper(4, 10);
            scene.add(gridHelper);

            // Load Model
            const loader = new GLTFLoader();
            const modelUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/TextureTransformMultiTest/glTF-Binary/TextureTransformMultiTest.glb';
            
            loader.load(modelUrl, (gltf) => {
                model = gltf.scene;
                
                // Calculate bounding box and scale
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 1.5 / maxDim;
                model.scale.setScalar(scale);

                // Recalculate box after scaling for debug info
                const scaledBox = new THREE.Box3().setFromObject(model);
                scaledBox.getSize(boundingBoxSize);
                dbgBBox.textContent = `${boundingBoxSize.x.toFixed(2)}, ${boundingBoxSize.y.toFixed(2)}, ${boundingBoxSize.z.toFixed(2)}`;

                // Position model
                model.position.set(0, 0.8, 0);

                // Process meshes
                let mCount = 0;
                model.traverse((child) => {
                    if (child.isMesh) {
                        mCount++;
                        // Ensure material is unique if we are changing colors
                        if (child.material) {
                            child.material = child.material.clone();
                            child.material.color.setHex(colors.white);
                        }
                    }
                });

                scene.add(model);

                // Update State
                window.__3D_STATE__.modelLoaded = true;
                window.__3D_STATE__.meshCount = mCount;
                window.__3D_STATE__.modelPositionY = model.position.y;

            }, undefined, (error) => {
                console.error('Error loading model:', error);
            });

            // Event Listeners
            window.addEventListener('resize', onWindowResize);

            document.getElementById('btn-red').addEventListener('click', () => applyColor('red'));
            document.getElementById('btn-blue').addEventListener('click', () => applyColor('blue'));
            document.getElementById('btn-green').addEventListener('click', () => applyColor('green'));
            document.getElementById('btn-white').addEventListener('click', () => applyColor('white'));

            document.getElementById('auto-rotate-cb').addEventListener('change', (e) => {
                window.__3D_STATE__.autoRotate = e.target.checked;
            });

            document.getElementById('btn-wireframe').addEventListener('click', () => {
                window.__3D_STATE__.wireframe = !window.__3D_STATE__.wireframe;
                if (model) {
                    model.traverse((child) => {
                        if (child.isMesh && child.material) {
                            child.material.wireframe = window.__3D_STATE__.wireframe;
                        }
                    });
                }
                dbgWireframe.textContent = window.__3D_STATE__.wireframe ? 'ON' : 'OFF';
            });
        }

        function applyColor(colorName) {
            if (!model) return;
            const hex = colors[colorName];
            model.traverse((child) => {
                if (child.isMesh && child.material) {
                    child.material.color.setHex(hex);
                }
            });
            window.__3D_STATE__.currentColor = colorName;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            window.__3D_STATE__.frameCount++;

            if (model) {
                if (window.__3D_STATE__.autoRotate) {
                    model.rotation.y += 0.01;
                }
                
                // Update dynamic state
                window.__3D_STATE__.rotationY = model.rotation.y * THREE.MathUtils.RAD2DEG;
                window.__3D_STATE__.modelPositionY = model.position.y;
                
                // Update Debug UI
                dbgPosY.textContent = window.__3D_STATE__.modelPositionY.toFixed(2);
                
                // Normalize rotation for display (0-360)
                let deg = window.__3D_STATE__.rotationY % 360;
                if (deg < 0) deg += 360;
                dbgRotY.textContent = deg.toFixed(2) + '°';
            }

            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));
            dbgFrames.textContent = window.__3D_STATE__.frameCount;

            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
