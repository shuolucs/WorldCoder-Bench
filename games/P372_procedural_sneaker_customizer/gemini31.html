<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Sneaker Customizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            color: white;
            box-sizing: border-box;
            overflow-y: auto;
            z-index: 10;
        }
        h1 {
            font-size: 24px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        h2 {
            font-size: 16px;
            margin-top: 20px;
            margin-bottom: 10px;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }
        .color-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        input[type="color"] {
            background: none;
            border: none;
            width: 30px;
            height: 30px;
            cursor: pointer;
            padding: 0;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: #444;
        }
        button.active {
            border: 2px solid #00ff88;
            background: #2a2a2a;
        }
        #btn-reset {
            margin-top: 20px;
            background: #8b0000;
            border-color: #ff0000;
        }
        #btn-reset:hover {
            background: #a00000;
        }
        .info-row {
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: calc(50% + 140px);
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            font-family: Arial;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-panel">
        <h1>SNEAKER STUDIO</h1>
        
        <h2>Color Zones</h2>
        <div class="color-row">
            <label for="color-sole">Sole</label>
            <input type="color" id="color-sole" value="#ffffff">
        </div>
        <div class="color-row">
            <label for="color-upper">Upper</label>
            <input type="color" id="color-upper" value="#2196F3">
        </div>
        <div class="color-row">
            <label for="color-accent">Accent</label>
            <input type="color" id="color-accent" value="#FF5722">
        </div>

        <h2>Material</h2>
        <button id="btn-matte" class="active">Matte</button>
        <button id="btn-glossy">Glossy</button>
        <button id="btn-metallic">Metallic</button>

        <h2>View</h2>
        <button id="btn-turntable">Turntable: OFF</button>
        
        <button id="btn-reset">Reset Customization</button>

        <div class="info-row">
            Rotation: <span id="rotation-display">0</span>°
        </div>
    </div>
    
    <div id="loading">Loading Model...</div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            modelLoaded: false,
            soleColor: '#ffffff',
            upperColor: '#2196F3',
            accentColor: '#FF5722',
            materialType: 'matte',
            turntableActive: false,
            rotationY: 0,
            meshCount: 0,
            cameraDistance: 3,
            roughness: 0.9,
            metalness: 0.1
        };

        const materialPresets = {
            matte: { roughness: 0.9, metalness: 0.1 },
            glossy: { roughness: 0.2, metalness: 0.3 },
            metallic: { roughness: 0.3, metalness: 0.9 }
        };

        // Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 3);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minPolarAngle = 0.2;
        controls.maxPolarAngle = Math.PI / 2;
        controls.target.set(0, 0.5, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 5, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 15;
        scene.add(dirLight);

        // Ground Plane
        const groundGeo = new THREE.CircleGeometry(3, 64);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 1, metalness: 0 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Model Loading
        const modelGroup = new THREE.Group();
        scene.add(modelGroup);
        let modelMeshes = [];

        const loader = new GLTFLoader();
        // Using the Corset model from three.js examples as requested
        const modelUrl = 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/models/gltf/Corset/glTF/Corset.gltf';

        loader.load(modelUrl, (gltf) => {
            const model = gltf.scene;
            
            model.traverse((child) => {
                if (child.isMesh) {
                    modelMeshes.push(child);
                    child.castShadow = true;
                    child.receiveShadow = true;
                    // Replace material with a new standard material for customization
                    child.material = new THREE.MeshStandardMaterial({
                        color: 0xffffff,
                        roughness: window.__3D_STATE__.roughness,
                        metalness: window.__3D_STATE__.metalness
                    });
                }
            });

            window.__3D_STATE__.meshCount = modelMeshes.length;
            
            model.scale.set(8, 8, 8);
            model.position.set(0, 0.5, 0);
            
            // Center model
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.x += (model.position.x - center.x);
            model.position.z += (model.position.z - center.z);

            modelGroup.add(model);
            
            applyColors();
            applyMaterials();

            window.__3D_STATE__.modelLoaded = true;
            document.getElementById('loading').style.display = 'none';
        });

        // Customization Logic
        function applyColors() {
            if (modelMeshes.length === 0) return;
            
            // Sole (first mesh)
            if (modelMeshes[0]) {
                modelMeshes[0].material.color.set(window.__3D_STATE__.soleColor);
            }
            
            // Accent (last mesh)
            if (modelMeshes.length > 1) {
                modelMeshes[modelMeshes.length - 1].material.color.set(window.__3D_STATE__.accentColor);
            }
            
            // Upper (remaining meshes)
            for (let i = 1; i < modelMeshes.length - 1; i++) {
                modelMeshes[i].material.color.set(window.__3D_STATE__.upperColor);
            }
        }

        function applyMaterials() {
            modelMeshes.forEach(mesh => {
                mesh.material.roughness = window.__3D_STATE__.roughness;
                mesh.material.metalness = window.__3D_STATE__.metalness;
                mesh.material.needsUpdate = true;
            });
        }

        // UI Event Listeners
        document.getElementById('color-sole').addEventListener('input', (e) => {
            window.__3D_STATE__.soleColor = e.target.value;
            applyColors();
        });

        document.getElementById('color-upper').addEventListener('input', (e) => {
            window.__3D_STATE__.upperColor = e.target.value;
            applyColors();
        });

        document.getElementById('color-accent').addEventListener('input', (e) => {
            window.__3D_STATE__.accentColor = e.target.value;
            applyColors();
        });

        const matButtons = ['btn-matte', 'btn-glossy', 'btn-metallic'];
        matButtons.forEach(id => {
            document.getElementById(id).addEventListener('click', (e) => {
                matButtons.forEach(btn => document.getElementById(btn).classList.remove('active'));
                e.target.classList.add('active');
                
                const type = id.replace('btn-', '');
                window.__3D_STATE__.materialType = type;
                window.__3D_STATE__.roughness = materialPresets[type].roughness;
                window.__3D_STATE__.metalness = materialPresets[type].metalness;
                applyMaterials();
            });
        });

        const btnTurntable = document.getElementById('btn-turntable');
        btnTurntable.addEventListener('click', () => {
            window.__3D_STATE__.turntableActive = !window.__3D_STATE__.turntableActive;
            btnTurntable.innerText = `Turntable: ${window.__3D_STATE__.turntableActive ? 'ON' : 'OFF'}`;
            if(window.__3D_STATE__.turntableActive) {
                btnTurntable.classList.add('active');
            } else {
                btnTurntable.classList.remove('active');
            }
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            window.__3D_STATE__.soleColor = '#ffffff';
            window.__3D_STATE__.upperColor = '#2196F3';
            window.__3D_STATE__.accentColor = '#FF5722';
            window.__3D_STATE__.materialType = 'matte';
            window.__3D_STATE__.roughness = materialPresets.matte.roughness;
            window.__3D_STATE__.metalness = materialPresets.matte.metalness;
            window.__3D_STATE__.turntableActive = false;
            
            modelGroup.rotation.y = 0;

            document.getElementById('color-sole').value = window.__3D_STATE__.soleColor;
            document.getElementById('color-upper').value = window.__3D_STATE__.upperColor;
            document.getElementById('color-accent').value = window.__3D_STATE__.accentColor;
            
            matButtons.forEach(btn => document.getElementById(btn).classList.remove('active'));
            document.getElementById('btn-matte').classList.add('active');
            
            btnTurntable.innerText = 'Turntable: OFF';
            btnTurntable.classList.remove('active');

            applyColors();
            applyMaterials();
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();
        const rotationDisplay = document.getElementById('rotation-display');

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (window.__3D_STATE__.modelLoaded && window.__3D_STATE__.turntableActive) {
                modelGroup.rotation.y += 0.5 * delta;
                modelGroup.rotation.y = modelGroup.rotation.y % (2 * Math.PI);
            }

            // Update State
            window.__3D_STATE__.rotationY = modelGroup.rotation.y;
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));

            // Update UI
            rotationDisplay.innerText = Math.floor(THREE.MathUtils.radToDeg(window.__3D_STATE__.rotationY));

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
