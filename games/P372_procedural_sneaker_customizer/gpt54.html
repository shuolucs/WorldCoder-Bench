<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Procedural Sneaker Customizer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #ui-panel {
      position: fixed;
      left: 0;
      top: 0;
      width: 280px;
      height: 100vh;
      box-sizing: border-box;
      background: rgba(0, 0, 0, 0.85);
      color: white;
      padding: 20px;
      z-index: 10;
      overflow-y: auto;
    }

    #ui-panel h1 {
      margin: 0 0 20px 0;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .section {
      margin-bottom: 24px;
      border-top: 1px solid rgba(255,255,255,0.15);
      padding-top: 16px;
    }

    .section h2 {
      margin: 0 0 12px 0;
      font-size: 16px;
      font-weight: bold;
    }

    .control-row {
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .control-row label {
      font-size: 14px;
    }

    input[type="color"] {
      width: 64px;
      height: 36px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      background: #2c2c44;
      color: white;
      border: 2px solid transparent;
      padding: 10px 12px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 6px;
      transition: 0.2s ease;
    }

    button:hover {
      background: #3a3a58;
    }

    button.active {
      border: 2px solid #00ff88;
    }

    #rotation-readout {
      margin-top: 10px;
      font-size: 14px;
      color: #cfd8dc;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui-panel">
      <h1>SNEAKER STUDIO</h1>

      <div class="section">
        <h2>Color Zones</h2>
        <div class="control-row">
          <label for="color-sole">Sole</label>
          <input id="color-sole" type="color" value="#ffffff" />
        </div>
        <div class="control-row">
          <label for="color-upper">Upper</label>
          <input id="color-upper" type="color" value="#2196f3" />
        </div>
        <div class="control-row">
          <label for="color-accent">Accent</label>
          <input id="color-accent" type="color" value="#ff5722" />
        </div>
      </div>

      <div class="section">
        <h2>Material</h2>
        <div class="button-group">
          <button id="btn-matte" class="active">Matte</button>
          <button id="btn-glossy">Glossy</button>
          <button id="btn-metallic">Metallic</button>
        </div>
      </div>

      <div class="section">
        <h2>View</h2>
        <div class="button-group">
          <button id="btn-turntable">Turntable: OFF</button>
        </div>
        <div id="rotation-readout">
          Rotation: <span id="rotation-display">0</span>°
        </div>
      </div>

      <div class="section">
        <div class="button-group">
          <button id="btn-reset">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const DEFAULTS = {
      soleColor: '#ffffff',
      upperColor: '#2196F3',
      accentColor: '#FF5722',
      materialType: 'matte',
      turntableActive: false
    };

    const MATERIAL_PRESETS = {
      matte: { roughness: 0.9, metalness: 0.1 },
      glossy: { roughness: 0.2, metalness: 0.3 },
      metallic: { roughness: 0.3, metalness: 0.9 }
    };

    window.__3D_STATE__ = {
      modelLoaded: false,
      soleColor: DEFAULTS.soleColor,
      upperColor: DEFAULTS.upperColor,
      accentColor: DEFAULTS.accentColor,
      materialType: DEFAULTS.materialType,
      turntableActive: DEFAULTS.turntableActive,
      rotationY: 0,
      meshCount: 0,
      cameraDistance: 0,
      roughness: MATERIAL_PRESETS[DEFAULTS.materialType].roughness,
      metalness: MATERIAL_PRESETS[DEFAULTS.materialType].metalness
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.5, 3);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById('app').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.7, 0);
    controls.enableDamping = true;
    controls.minPolarAngle = 0.2;
    controls.maxPolarAngle = Math.PI / 2;
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 5, 5);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.set(2048, 2048);
    directionalLight.shadow.camera.near = 0.5;
    directionalLight.shadow.camera.far = 20;
    directionalLight.shadow.camera.left = -5;
    directionalLight.shadow.camera.right = 5;
    directionalLight.shadow.camera.top = 5;
    directionalLight.shadow.camera.bottom = -5;
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(3, 64),
      new THREE.MeshStandardMaterial({ color: '#222222', roughness: 0.95, metalness: 0.05 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    const modelGroup = new THREE.Group();
    scene.add(modelGroup);

    let sneakerModel = null;
    let meshChildren = [];
    let soleMeshes = [];
    let upperMeshes = [];
    let accentMeshes = [];

    function makeMaterial(colorHex, materialType) {
      const preset = MATERIAL_PRESETS[materialType];
      return new THREE.MeshStandardMaterial({
        color: new THREE.Color(colorHex),
        roughness: preset.roughness,
        metalness: preset.metalness
      });
    }

    function assignZones(meshes) {
      soleMeshes = [];
      upperMeshes = [];
      accentMeshes = [];

      if (meshes.length === 0) return;

      if (meshes.length === 1) {
        soleMeshes.push(meshes[0]);
      } else if (meshes.length === 2) {
        soleMeshes.push(meshes[0]);
        accentMeshes.push(meshes[1]);
      } else {
        soleMeshes.push(meshes[0]);
        accentMeshes.push(meshes[meshes.length - 1]);
        for (let i = 1; i < meshes.length - 1; i++) {
          upperMeshes.push(meshes[i]);
        }
      }

      if (meshes.length >= 2 && upperMeshes.length === 0) {
        upperMeshes.push(meshes[1]);
      }
    }

    function applyMaterials() {
      const materialType = window.__3D_STATE__.materialType;

      soleMeshes.forEach(mesh => {
        if (mesh.material) mesh.material.dispose?.();
        mesh.material = makeMaterial(window.__3D_STATE__.soleColor, materialType);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
      });

      upperMeshes.forEach(mesh => {
        if (mesh.material) mesh.material.dispose?.();
        mesh.material = makeMaterial(window.__3D_STATE__.upperColor, materialType);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
      });

      accentMeshes.forEach(mesh => {
        if (mesh.material) mesh.material.dispose?.();
        mesh.material = makeMaterial(window.__3D_STATE__.accentColor, materialType);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
      });

      const preset = MATERIAL_PRESETS[materialType];
      window.__3D_STATE__.roughness = preset.roughness;
      window.__3D_STATE__.metalness = preset.metalness;
    }

    function setActiveMaterialButton(type) {
      document.getElementById('btn-matte').classList.toggle('active', type === 'matte');
      document.getElementById('btn-glossy').classList.toggle('active', type === 'glossy');
      document.getElementById('btn-metallic').classList.toggle('active', type === 'metallic');
    }

    function updateTurntableButton() {
      const btn = document.getElementById('btn-turntable');
      btn.textContent = `Turntable: ${window.__3D_STATE__.turntableActive ? 'ON' : 'OFF'}`;
      btn.classList.toggle('active', window.__3D_STATE__.turntableActive);
    }

    function resetCustomizer() {
      window.__3D_STATE__.soleColor = DEFAULTS.soleColor;
      window.__3D_STATE__.upperColor = DEFAULTS.upperColor;
      window.__3D_STATE__.accentColor = DEFAULTS.accentColor;
      window.__3D_STATE__.materialType = DEFAULTS.materialType;
      window.__3D_STATE__.turntableActive = DEFAULTS.turntableActive;

      document.getElementById('color-sole').value = DEFAULTS.soleColor;
      document.getElementById('color-upper').value = DEFAULTS.upperColor.toLowerCase();
      document.getElementById('color-accent').value = DEFAULTS.accentColor.toLowerCase();

      setActiveMaterialButton(DEFAULTS.materialType);
      updateTurntableButton();
      applyMaterials();

      if (sneakerModel) {
        sneakerModel.rotation.y = 0;
      }
    }

    const loader = new GLTFLoader();
    loader.load(
      'Corset.glb',
      (gltf) => {
        sneakerModel = gltf.scene;
        sneakerModel.scale.set(8, 8, 8);
        sneakerModel.position.set(0, 0.5, 0);

        sneakerModel.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
            meshChildren.push(child);
          }
        });

        assignZones(meshChildren);
        applyMaterials();

        const box = new THREE.Box3().setFromObject(sneakerModel);
        const center = new THREE.Vector3();
        const size = new THREE.Vector3();
        box.getCenter(center);
        box.getSize(size);

        sneakerModel.position.x -= center.x;
        sneakerModel.position.z -= center.z;
        sneakerModel.position.y += -box.min.y;

        modelGroup.add(sneakerModel);

        window.__3D_STATE__.modelLoaded = true;
        window.__3D_STATE__.meshCount = meshChildren.length;
      },
      undefined,
      (error) => {
        console.error('Failed to load Corset.glb:', error);
      }
    );

    document.getElementById('color-sole').addEventListener('input', (e) => {
      window.__3D_STATE__.soleColor = e.target.value;
      applyMaterials();
    });

    document.getElementById('color-upper').addEventListener('input', (e) => {
      window.__3D_STATE__.upperColor = e.target.value;
      applyMaterials();
    });

    document.getElementById('color-accent').addEventListener('input', (e) => {
      window.__3D_STATE__.accentColor = e.target.value;
      applyMaterials();
    });

    document.getElementById('btn-matte').addEventListener('click', () => {
      window.__3D_STATE__.materialType = 'matte';
      setActiveMaterialButton('matte');
      applyMaterials();
    });

    document.getElementById('btn-glossy').addEventListener('click', () => {
      window.__3D_STATE__.materialType = 'glossy';
      setActiveMaterialButton('glossy');
      applyMaterials();
    });

    document.getElementById('btn-metallic').addEventListener('click', () => {
      window.__3D_STATE__.materialType = 'metallic';
      setActiveMaterialButton('metallic');
      applyMaterials();
    });

    document.getElementById('btn-turntable').addEventListener('click', () => {
      window.__3D_STATE__.turntableActive = !window.__3D_STATE__.turntableActive;
      updateTurntableButton();
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      resetCustomizer();
    });

    setActiveMaterialButton(DEFAULTS.materialType);
    updateTurntableButton();

    const clock = new THREE.Clock();

    function updateStatePerFrame() {
      let rotationY = sneakerModel ? sneakerModel.rotation.y : 0;
      const twoPI = Math.PI * 2;
      rotationY = ((rotationY % twoPI) + twoPI) % twoPI;

      if (sneakerModel) {
        sneakerModel.rotation.y = rotationY;
      }

      const distance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
      const safeDistance = Number.isFinite(distance) && distance > 0 ? distance : 0.0001;

      window.__3D_STATE__.rotationY = rotationY;
      window.__3D_STATE__.cameraDistance = safeDistance;
      window.__3D_STATE__.meshCount = meshChildren.length;
      window.__3D_STATE__.modelLoaded = !!sneakerModel;
      window.__3D_STATE__.roughness = MATERIAL_PRESETS[window.__3D_STATE__.materialType].roughness;
      window.__3D_STATE__.metalness = MATERIAL_PRESETS[window.__3D_STATE__.materialType].metalness;

      document.getElementById('rotation-display').textContent =
        Math.round(THREE.MathUtils.radToDeg(rotationY));
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (sneakerModel && window.__3D_STATE__.turntableActive) {
        sneakerModel.rotation.y += 0.5 * delta;
      }

      controls.update();
      updateStatePerFrame();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
