<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sneaker Studio</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    font-family: Arial, sans-serif;
}

canvas {
    display: block;
}

#ui-panel {
    position: fixed;
    left: 0;
    top: 0;
    width: 280px;
    height: 100vh;
    background: rgba(0, 0, 0, 0.85);
    padding: 20px;
    color: white;
    overflow-y: auto;
    z-index: 100;
}

#ui-panel h1 {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 20px;
    letter-spacing: 2px;
    color: #00ff88;
}

.section {
    margin-bottom: 24px;
}

.section h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    margin-bottom: 12px;
    border-bottom: 1px solid #333;
    padding-bottom: 6px;
}

.color-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
}

.color-row label {
    font-size: 14px;
    color: #ccc;
}

.color-row input[type="color"] {
    width: 50px;
    height: 30px;
    border: 2px solid #444;
    border-radius: 4px;
    cursor: pointer;
    background: none;
    padding: 0;
}

.color-row input[type="color"]::-webkit-color-swatch-wrapper {
    padding: 2px;
}

.color-row input[type="color"]::-webkit-color-swatch {
    border: none;
    border-radius: 2px;
}

.btn-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.mat-btn {
    flex: 1;
    min-width: 70px;
    padding: 8px 12px;
    background: #333;
    color: #ccc;
    border: 2px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.2s;
}

.mat-btn:hover {
    background: #444;
}

.mat-btn.active {
    border: 2px solid #00ff88;
    color: #00ff88;
}

.toggle-btn {
    width: 100%;
    padding: 10px;
    background: #333;
    color: #ccc;
    border: 2px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
}

.toggle-btn.active {
    border: 2px solid #00ff88;
    color: #00ff88;
    background: rgba(0, 255, 136, 0.1);
}

#btn-reset {
    width: 100%;
    padding: 10px;
    background: #cc3333;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
    margin-top: 10px;
}

#btn-reset:hover {
    background: #ee4444;
}

.info-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #666;
    margin-top: 8px;
}

.info-row span {
    color: #999;
}

#loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s;
}

#loading-overlay .spinner {
    width: 50px;
    height: 50px;
    border: 3px solid #333;
    border-top-color: #00ff88;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

#loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
</div>

<div id="ui-panel">
    <h1>SNEAKER STUDIO</h1>

    <div class="section">
        <h2>Color Zones</h2>
        <div class="color-row">
            <label for="color-sole">Sole</label>
            <input type="color" id="color-sole" value="#ffffff">
        </div>
        <div class="color-row">
            <label for="color-upper">Upper</label>
            <input type="color" id="color-upper" value="#2196F3">
        </div>
        <div class="color-row">
            <label for="color-accent">Accent</label>
            <input type="color" id="color-accent" value="#FF5722">
        </div>
    </div>

    <div class="section">
        <h2>Material</h2>
        <div class="btn-group">
            <button class="mat-btn active" id="btn-matte">Matte</button>
            <button class="mat-btn" id="btn-glossy">Glossy</button>
            <button class="mat-btn" id="btn-metallic">Metallic</button>
        </div>
    </div>

    <div class="section">
        <h2>View</h2>
        <button class="toggle-btn" id="btn-turntable">Turntable: OFF</button>
    </div>

    <div class="section">
        <button id="btn-reset">Reset</button>
    </div>

    <div class="section">
        <div class="info-row">
            <span>Rotation:</span>
            <span><span id="rotation-display">0</span>°</span>
        </div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

// Defaults
const DEFAULTS = {
    soleColor: '#ffffff',
    upperColor: '#2196F3',
    accentColor: '#FF5722',
    materialType: 'matte',
    turntableActive: false
};

const MATERIAL_PRESETS = {
    matte: { roughness: 0.9, metalness: 0.1 },
    glossy: { roughness: 0.2, metalness: 0.3 },
    metallic: { roughness: 0.3, metalness: 0.9 }
};

// State
window.__3D_STATE__ = {
    modelLoaded: false,
    soleColor: DEFAULTS.soleColor,
    upperColor: DEFAULTS.upperColor,
    accentColor: DEFAULTS.accentColor,
    materialType: DEFAULTS.materialType,
    turntableActive: DEFAULTS.turntableActive,
    rotationY: 0,
    meshCount: 0,
    cameraDistance: 3,
    roughness: MATERIAL_PRESETS.matte.roughness,
    metalness: MATERIAL_PRESETS.matte.metalness
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color('#1a1a2e');

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 3);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 5, 5);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
directionalLight.shadow.camera.near = 0.1;
directionalLight.shadow.camera.far = 20;
directionalLight.shadow.camera.left = -5;
directionalLight.shadow.camera.right = 5;
directionalLight.shadow.camera.top = 5;
directionalLight.shadow.camera.bottom = -5;
scene.add(directionalLight);

// Additional fill light
const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
fillLight.position.set(-3, 2, -3);
scene.add(fillLight);

// Ground plane
const groundGeometry = new THREE.CircleGeometry(3, 64);
const groundMaterial = new THREE.MeshStandardMaterial({ color: '#222222', roughness: 0.8 });
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.5, 0);
controls.minPolarAngle = 0.2;
controls.maxPolarAngle = Math.PI / 2;
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.update();

// Mesh tracking
let modelGroup = null;
let meshChildren = [];
let soleMeshes = [];
let upperMeshes = [];
let accentMeshes = [];

// Load model
const loader = new GLTFLoader();
loader.load(
    'Corset.glb',
    (gltf) => {
        const model = gltf.scene;
        model.scale.set(8, 8, 8);
        model.position.set(0, 0.5, 0);

        // Collect all mesh children
        meshChildren = [];
        model.traverse((child) => {
            if (child.isMesh) {
                meshChildren.push(child);
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });

        window.__3D_STATE__.meshCount = meshChildren.length;

        // Assign zones based on mesh children
        if (meshChildren.length >= 3) {
            soleMeshes = [meshChildren[0]];
            accentMeshes = [meshChildren[meshChildren.length - 1]];
            upperMeshes = meshChildren.slice(1, meshChildren.length - 1);
        } else if (meshChildren.length === 2) {
            soleMeshes = [meshChildren[0]];
            upperMeshes = [meshChildren[1]];
            accentMeshes = [meshChildren[1]];
        } else if (meshChildren.length === 1) {
            soleMeshes = [meshChildren[0]];
            upperMeshes = [meshChildren[0]];
            accentMeshes = [meshChildren[0]];
        }

        // Apply default materials
        applyColors();
        applyMaterial(DEFAULTS.materialType);

        modelGroup = model;
        scene.add(model);

        window.__3D_STATE__.modelLoaded = true;

        // Hide loading overlay
        const overlay = document.getElementById('loading-overlay');
        overlay.classList.add('hidden');
        setTimeout(() => overlay.style.display = 'none', 500);
    },
    (progress) => {
        // Loading progress
    },
    (error) => {
        console.error('Error loading model:', error);
        // Still hide overlay on error
        const overlay = document.getElementById('loading-overlay');
        overlay.classList.add('hidden');
        setTimeout(() => overlay.style.display = 'none', 500);
    }
);

function createMaterial(color, preset) {
    const p = MATERIAL_PRESETS[preset] || MATERIAL_PRESETS.matte;
    return new THREE.MeshStandardMaterial({
        color: new THREE.Color(color),
        roughness: p.roughness,
        metalness: p.metalness
    });
}

function applyColors() {
    const state = window.__3D_STATE__;
    const preset = state.materialType;

    soleMeshes.forEach(mesh => {
        mesh.material = createMaterial(state.soleColor, preset);
    });
    upperMeshes.forEach(mesh => {
        mesh.material = createMaterial(state.upperColor, preset);
    });
    accentMeshes.forEach(mesh => {
        mesh.material = createMaterial(state.accentColor, preset);
    });
}

function applyMaterial(type) {
    const state = window.__3D_STATE__;
    state.materialType = type;
    const p = MATERIAL_PRESETS[type];
    state.roughness = p.roughness;
    state.metalness = p.metalness;

    soleMeshes.forEach(mesh => {
        if (mesh.material) {
            mesh.material.roughness = p.roughness;
            mesh.material.metalness = p.metalness;
            mesh.material.needsUpdate = true;
        }
    });
    upperMeshes.forEach(mesh => {
        if (mesh.material) {
            mesh.material.roughness = p.roughness;
            mesh.material.metalness = p.metalness;
            mesh.material.needsUpdate = true;
        }
    });
    accentMeshes.forEach(mesh => {
        if (mesh.material) {
            mesh.material.roughness = p.roughness;
            mesh.material.metalness = p.metalness;
            mesh.material.needsUpdate = true;
        }
    });
}

// UI Elements
const colorSoleInput = document.getElementById('color-sole');
const colorUpperInput = document.getElementById('color-upper');
const colorAccentInput = document.getElementById('color-accent');
const btnMatte = document.getElementById('btn-matte');
const btnGlossy = document.getElementById('btn-glossy');
const btnMetallic = document.getElementById('btn-metallic');
const btnTurntable = document.getElementById('btn-turntable');
const btnReset = document.getElementById('btn-reset');
const rotationDisplay = document.getElementById('rotation-display');

// Color change handlers
colorSoleInput.addEventListener('input', (e) => {
    window.__3D_STATE__.soleColor = e.target.value;
    soleMeshes.forEach(mesh => {
        mesh.material.color.set(e.target.value);
    });
});

colorUpperInput.addEventListener('input', (e) => {
    window.__3D_STATE__.upperColor = e.target.value;
    upperMeshes.forEach(mesh => {
        mesh.material.color.set(e.target.value);
    });
});

colorAccentInput.addEventListener('input', (e) => {
    window.__3D_STATE__.accentColor = e.target.value;
    accentMeshes.forEach(mesh => {
        mesh.material.color.set(e.target.value);
    });
});

// Material buttons
function setActiveMaterialButton(activeBtn) {
    [btnMatte, btnGlossy, btnMetallic].forEach(btn => btn.classList.remove('active'));
    activeBtn.classList.add('active');
}

btnMatte.addEventListener('click', () => {
    applyMaterial('matte');
    setActiveMaterialButton(btnMatte);
});

btnGlossy.addEventListener('click', () => {
    applyMaterial('glossy');
    setActiveMaterialButton(btnGlossy);
});

btnMetallic.addEventListener('click', () => {
    applyMaterial('metallic');
    setActiveMaterialButton(btnMetallic);
});

// Turntable toggle
btnTurntable.addEventListener('click', () => {
    window.__3D_STATE__.turntableActive = !window.__3D_STATE__.turntableActive;
    btnTurntable.textContent = window.__3D_STATE__.turntableActive ? 'Turntable: ON' : 'Turntable: OFF';
    btnTurntable.classList.toggle('active', window.__3D_STATE__.turntableActive);
});

// Reset
btnReset.addEventListener('click', () => {
    window.__3D_STATE__.soleColor = DEFAULTS.soleColor;
    window.__3D_STATE__.upperColor = DEFAULTS.upperColor;
    window.__3D_STATE__.accentColor = DEFAULTS.accentColor;
    window.__3D_STATE__.materialType = DEFAULTS.materialType;
    window.__3D_STATE__.turntableActive = DEFAULTS.turntableActive;

    colorSoleInput.value = DEFAULTS.soleColor;
    colorUpperInput.value = DEFAULTS.upperColor;
    colorAccentInput.value = DEFAULTS.accentColor;

    setActiveMaterialButton(btnMatte);
    btnTurntable.textContent = 'Turntable: OFF';
    btnTurntable.classList.remove('active');

    applyColors();
    applyMaterial(DEFAULTS.materialType);

    if (modelGroup) {
        modelGroup.rotation.y = 0;
        window.__3D_STATE__.rotationY = 0;
    }
});

// Resize handler
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    // Turntable rotation
    if (window.__3D_STATE__.turntableActive && modelGroup) {
        modelGroup.rotation.y += 0.5 * delta;
        modelGroup.rotation.y = modelGroup.rotation.y % (2 * Math.PI);
        if (modelGroup.rotation.y < 0) {
            modelGroup.rotation.y += 2 * Math.PI;
        }
    }

    // Update state
    if (modelGroup) {
        window.__3D_STATE__.rotationY = modelGroup.rotation.y;
    }

    const dist = camera.position.length();
    window.__3D_STATE__.cameraDistance = (dist > 0 && isFinite(dist)) ? dist : 3;

    // Update rotation display
    const degrees = Math.round((window.__3D_STATE__.rotationY * 180) / Math.PI);
    rotationDisplay.textContent = degrees;

    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
