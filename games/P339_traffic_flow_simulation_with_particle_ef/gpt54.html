<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Traffic Flow Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
      min-width: 200px;
    }

    #controls {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #2f3b59;
      color: white;
      font-weight: bold;
      transition: background 0.2s;
    }

    button:hover {
      background: #43527a;
    }

    #info {
      position: absolute;
      bottom: 12px;
      left: 12px;
      padding: 8px 10px;
      font-size: 12px;
      background: rgba(0,0,0,0.35);
      border-radius: 6px;
      z-index: 10;
      color: #ddd;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="hud-vehicles">Vehicles: 0</div>
    <div id="hud-speed">Avg Speed: 0.00</div>
    <div id="hud-light">Light: H-Green</div>
    <div id="hud-time">Time: 0</div>
  </div>

  <div id="controls">
    <button id="btn-pause">Pause</button>
    <button id="btn-add">Add Traffic</button>
    <button id="btn-clear">Clear Traffic</button>
  </div>

  <div id="info">
    Keys: <b>C</b> camera toggle, <b>F</b> fast-forward
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    const defaultCamPos = new THREE.Vector3(0, 80, 100);
    const topDownPos = new THREE.Vector3(0, 120, 0.01);
    camera.position.copy(defaultCamPos);
    camera.lookAt(0, 0, 0);

    const ambient = new THREE.AmbientLight(0x404040, 0.6);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(50, 100, 50);
    scene.add(dirLight);

    // Ground plane
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(200, 200),
      new THREE.MeshPhongMaterial({ color: 0x2d2d2d })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.01;
    scene.add(ground);

    // Road network
    const ROAD_LENGTH = 160;
    const ROAD_WIDTH = 10;
    const HALF_ROAD = ROAD_WIDTH / 2;
    const LANE_WIDTH = ROAD_WIDTH / 4;

    const roadMat = new THREE.MeshPhongMaterial({ color: 0x444444 });
    const laneMat = new THREE.LineDashedMaterial({
      color: 0xffffff,
      dashSize: 2,
      gapSize: 1
    });

    const horizontalRoad = new THREE.Mesh(
      new THREE.BoxGeometry(ROAD_LENGTH, 0.05, ROAD_WIDTH),
      roadMat
    );
    horizontalRoad.position.y = 0.02;
    scene.add(horizontalRoad);

    const verticalRoad = new THREE.Mesh(
      new THREE.BoxGeometry(ROAD_WIDTH, 0.05, ROAD_LENGTH),
      roadMat
    );
    verticalRoad.position.y = 0.021;
    scene.add(verticalRoad);

    function createDashedLine(points) {
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const line = new THREE.Line(geometry, laneMat);
      line.computeLineDistances();
      scene.add(line);
      return line;
    }

    // Lane markings for horizontal road (z positions between lanes)
    const hMark1 = createDashedLine([
      new THREE.Vector3(-80, 0.06, -2.5),
      new THREE.Vector3(80, 0.06, -2.5)
    ]);
    const hMark2 = createDashedLine([
      new THREE.Vector3(-80, 0.06, 0),
      new THREE.Vector3(80, 0.06, 0)
    ]);
    const hMark3 = createDashedLine([
      new THREE.Vector3(-80, 0.06, 2.5),
      new THREE.Vector3(80, 0.06, 2.5)
    ]);

    // Lane markings for vertical road (x positions between lanes)
    const vMark1 = createDashedLine([
      new THREE.Vector3(-2.5, 0.06, -80),
      new THREE.Vector3(-2.5, 0.06, 80)
    ]);
    const vMark2 = createDashedLine([
      new THREE.Vector3(0, 0.06, -80),
      new THREE.Vector3(0, 0.06, 80)
    ]);
    const vMark3 = createDashedLine([
      new THREE.Vector3(2.5, 0.06, -80),
      new THREE.Vector3(2.5, 0.06, 80)
    ]);

    // Traffic light
    const trafficLightGroup = new THREE.Group();
    scene.add(trafficLightGroup);

    const post = new THREE.Mesh(
      new THREE.CylinderGeometry(0.25, 0.25, 8, 12),
      new THREE.MeshPhongMaterial({ color: 0x222222 })
    );
    post.position.set(6, 4, 6);
    trafficLightGroup.add(post);

    const lightBox = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 3.2, 1.2),
      new THREE.MeshPhongMaterial({ color: 0x111111 })
    );
    lightBox.position.set(6, 7.5, 6);
    trafficLightGroup.add(lightBox);

    function createSignalSphere(color, y) {
      const mat = new THREE.MeshPhongMaterial({
        color,
        emissive: 0x333333
      });
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.28, 16, 16),
        mat
      );
      mesh.position.set(6, y, 6.7);
      trafficLightGroup.add(mesh);
      return mesh;
    }

    const redLight = createSignalSphere(0xff0000, 8.4);
    const yellowLight = createSignalSphere(0xffff00, 7.5);
    const greenLight = createSignalSphere(0x00ff00, 6.6);

    // Vehicle setup
    const MAX_SPEED = 0.5;
    let maxVehicles = 60;
    const vehicles = [];
    let totalSpawned = 0;

    const vehicleGeo = new THREE.BoxGeometry(1.5, 0.5, 1.0);

    const speedMaterials = {
      red: new THREE.MeshPhongMaterial({ color: 0xff3333 }),
      yellow: new THREE.MeshPhongMaterial({ color: 0xffdd33 }),
      green: new THREE.MeshPhongMaterial({ color: 0x33ff66 })
    };

    const EXHAUST_PER_VEHICLE = 5;
    const exhaustGeo = new THREE.SphereGeometry(0.15, 8, 8);

    const laneDefs = {
      horizontal: {
        plus: [-3.75, -1.25],   // moving +X
        minus: [1.25, 3.75]     // moving -X
      },
      vertical: {
        plus: [3.75, 1.25],     // moving +Z
        minus: [-1.25, -3.75]   // moving -Z
      }
    };

    function getVehicleColorBySpeed(speed) {
      const ratio = speed / MAX_SPEED;
      if (ratio > 0.8) return speedMaterials.green;
      if (ratio >= 0.4) return speedMaterials.yellow;
      return speedMaterials.red;
    }

    function makeExhaustParticle() {
      const mat = new THREE.MeshPhongMaterial({
        color: 0x888888,
        transparent: true,
        opacity: 0.0,
        depthWrite: false
      });
      const mesh = new THREE.Mesh(exhaustGeo, mat);
      mesh.visible = false;
      scene.add(mesh);
      return {
        mesh,
        active: false,
        life: 0,
        maxLife: 1.0,
        velocity: new THREE.Vector3()
      };
    }

    function createVehicle() {
      const mesh = new THREE.Mesh(vehicleGeo, speedMaterials.green);
      mesh.castShadow = false;
      scene.add(mesh);

      const exhaust = [];
      for (let i = 0; i < EXHAUST_PER_VEHICLE; i++) {
        exhaust.push(makeExhaustParticle());
      }

      return {
        mesh,
        exhaust,
        roadType: 'horizontal',
        dir: 1,
        lane: 0,
        speed: 0,
        targetSpeed: 0,
        axisPos: 0,
        stoppedForLight: false,
        removed: false
      };
    }

    function randomChoice(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function spawnVehicle() {
      if (vehicles.length >= maxVehicles) return;

      const v = createVehicle();
      const spawnType = Math.random() < 0.5 ? 'horizontal' : 'vertical';
      const dir = Math.random() < 0.5 ? 1 : -1;
      const laneIndex = Math.random() < 0.5 ? 0 : 1;

      v.roadType = spawnType;
      v.dir = dir;
      v.lane = laneIndex;
      v.speed = 0.15 + Math.random() * 0.15;
      v.targetSpeed = 0.25 + Math.random() * 0.2;

      if (spawnType === 'horizontal') {
        const z = dir === 1 ? laneDefs.horizontal.plus[laneIndex] : laneDefs.horizontal.minus[laneIndex];
        const x = dir === 1 ? -84 : 84;
        v.axisPos = x;
        v.mesh.position.set(x, 0.3, z);
        v.mesh.rotation.y = dir === 1 ? 0 : Math.PI;
      } else {
        const x = dir === 1 ? laneDefs.vertical.plus[laneIndex] : laneDefs.vertical.minus[laneIndex];
        const z = dir === 1 ? -84 : 84;
        v.axisPos = z;
        v.mesh.position.set(x, 0.3, z);
        v.mesh.rotation.y = dir === 1 ? Math.PI / 2 : -Math.PI / 2;
      }

      vehicles.push(v);
      totalSpawned++;
    }

    function removeVehicle(index) {
      const v = vehicles[index];
      scene.remove(v.mesh);
      for (const p of v.exhaust) scene.remove(p.mesh);
      vehicles.splice(index, 1);
    }

    function clearVehicles() {
      for (let i = vehicles.length - 1; i >= 0; i--) removeVehicle(i);
    }

    function refillVehicles() {
      while (vehicles.length < maxVehicles) spawnVehicle();
    }

    // Traffic light state
    const PHASES = [
      { name: 'H-Green', duration: 8 },
      { name: 'H-Yellow', duration: 2 },
      { name: 'V-Green', duration: 8 },
      { name: 'V-Yellow', duration: 2 }
    ];
    let phaseIndex = 0;
    let phaseElapsed = 0;

    function getCurrentPhase() {
      return PHASES[phaseIndex];
    }

    function updateTrafficLightVisual() {
      redLight.material.emissive.setHex(0x333333);
      yellowLight.material.emissive.setHex(0x333333);
      greenLight.material.emissive.setHex(0x333333);

      const phase = getCurrentPhase().name;
      if (phase === 'H-Green' || phase === 'V-Green') {
        greenLight.material.emissive.setHex(0x00ff00);
      } else if (phase === 'H-Yellow' || phase === 'V-Yellow') {
        yellowLight.material.emissive.setHex(0xffff00);
      } else {
        redLight.material.emissive.setHex(0xff0000);
      }
    }

    function roadHasGreen(roadType) {
      const phase = getCurrentPhase().name;
      if (roadType === 'horizontal') {
        return phase === 'H-Green';
      }
      if (roadType === 'vertical') {
        return phase === 'V-Green';
      }
      return false;
    }

    function roadHasYellow(roadType) {
      const phase = getCurrentPhase().name;
      if (roadType === 'horizontal') {
        return phase === 'H-Yellow';
      }
      if (roadType === 'vertical') {
        return phase === 'V-Yellow';
      }
      return false;
    }

    function isRedForRoad(roadType) {
      return !(roadHasGreen(roadType) || roadHasYellow(roadType));
    }

    updateTrafficLightVisual();

    // UI
    const hudVehicles = document.getElementById('hud-vehicles');
    const hudSpeed = document.getElementById('hud-speed');
    const hudLight = document.getElementById('hud-light');
    const hudTime = document.getElementById('hud-time');

    const btnPause = document.getElementById('btn-pause');
    const btnAdd = document.getElementById('btn-add');
    const btnClear = document.getElementById('btn-clear');

    let isPaused = false;
    let isFastForward = false;
    let cameraMode = 'perspective';
    let elapsedTime = 0;

    btnPause.addEventListener('click', () => {
      isPaused = !isPaused;
      btnPause.textContent = isPaused ? 'Resume' : 'Pause';
    });

    btnAdd.addEventListener('click', () => {
      maxVehicles = Math.min(120, maxVehicles + 10);
      refillVehicles();
    });

    btnClear.addEventListener('click', () => {
      clearVehicles();
    });

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'c') {
        if (cameraMode === 'perspective') {
          cameraMode = 'topdown';
          camera.position.copy(topDownPos);
          camera.up.set(0, 0, -1);
          camera.lookAt(0, 0, 0);
        } else {
          cameraMode = 'perspective';
          camera.position.copy(defaultCamPos);
          camera.up.set(0, 1, 0);
          camera.lookAt(0, 0, 0);
        }
      } else if (key === 'f') {
        isFastForward = !isFastForward;
      }
    });

    // Exposed state
    window.__3D_STATE__ = {
      vehicleCount: 0,
      maxVehicles: maxVehicles,
      avgSpeed: 0.00,
      trafficPhase: 'H-Green',
      phaseDuration: 0,
      isPaused: false,
      isFastForward: false,
      cameraMode: 'perspective',
      elapsedTime: 0,
      totalSpawned: 0,
      intersectionQueueH: 0,
      intersectionQueueV: 0,
      exhaustParticleCount: 0
    };

    // Initial fill
    refillVehicles();

    const clock = new THREE.Clock();

    function findLeadDistance(vehicle) {
      let minDist = Infinity;

      for (const other of vehicles) {
        if (other === vehicle) continue;
        if (other.roadType !== vehicle.roadType) continue;
        if (other.dir !== vehicle.dir) continue;
        if (other.lane !== vehicle.lane) continue;

        let delta;
        if (vehicle.roadType === 'horizontal') {
          delta = (other.mesh.position.x - vehicle.mesh.position.x) * vehicle.dir;
        } else {
          delta = (other.mesh.position.z - vehicle.mesh.position.z) * vehicle.dir;
        }

        if (delta > 0 && delta < minDist) minDist = delta;
      }

      return minDist;
    }

    function shouldStopForRed(vehicle) {
      if (!isRedForRoad(vehicle.roadType)) return false;

      if (vehicle.roadType === 'horizontal') {
        const x = vehicle.mesh.position.x;
        if (vehicle.dir === 1) {
          return x < -10 && x > -20;
        } else {
          return x > 10 && x < 20;
        }
      } else {
        const z = vehicle.mesh.position.z;
        if (vehicle.dir === 1) {
          return z < -10 && z > -20;
        } else {
          return z > 10 && z < 20;
        }
      }
    }

    function distanceToStopLine(vehicle) {
      if (vehicle.roadType === 'horizontal') {
        return vehicle.dir === 1 ? (-10 - vehicle.mesh.position.x) : (vehicle.mesh.position.x - 10);
      } else {
        return vehicle.dir === 1 ? (-10 - vehicle.mesh.position.z) : (vehicle.mesh.position.z - 10);
      }
    }

    function updateVehicle(vehicle, dt) {
      const leadDist = findLeadDistance(vehicle);
      let desiredSpeed = vehicle.targetSpeed;

      // Car-following behavior
      if (leadDist < 3) {
        desiredSpeed = 0;
      } else if (leadDist < 8) {
        desiredSpeed *= Math.max(0, (leadDist - 3) / 5);
      }

      // Traffic light behavior
      vehicle.stoppedForLight = false;
      if (shouldStopForRed(vehicle)) {
        const d = distanceToStopLine(vehicle);
        if (d <= 1.5) {
          desiredSpeed = 0;
          vehicle.stoppedForLight = true;
        } else if (d < 8) {
          desiredSpeed = Math.min(desiredSpeed, MAX_SPEED * (d / 8) * 0.6);
        }
      }

      desiredSpeed = Math.min(desiredSpeed, MAX_SPEED);

      // Smooth acceleration/deceleration
      const accel = 0.02 * (dt * 60);
      vehicle.speed += (desiredSpeed - vehicle.speed) * Math.min(1, accel);

      const move = vehicle.speed * dt * 60 * vehicle.dir;

      if (vehicle.roadType === 'horizontal') {
        vehicle.mesh.position.x += move;
      } else {
        vehicle.mesh.position.z += move;
      }

      vehicle.mesh.material = getVehicleColorBySpeed(vehicle.speed);

      updateVehicleExhaust(vehicle, dt);

      // Recycle if outside boundary
      if (vehicle.roadType === 'horizontal') {
        if (Math.abs(vehicle.mesh.position.x) > 85) {
          recycleVehicle(vehicle);
        }
      } else {
        if (Math.abs(vehicle.mesh.position.z) > 85) {
          recycleVehicle(vehicle);
        }
      }
    }

    function recycleVehicle(vehicle) {
      const spawnType = Math.random() < 0.5 ? 'horizontal' : 'vertical';
      const dir = Math.random() < 0.5 ? 1 : -1;
      const laneIndex = Math.random() < 0.5 ? 0 : 1;

      vehicle.roadType = spawnType;
      vehicle.dir = dir;
      vehicle.lane = laneIndex;
      vehicle.speed = 0.1 + Math.random() * 0.1;
      vehicle.targetSpeed = 0.25 + Math.random() * 0.2;
      vehicle.stoppedForLight = false;

      if (spawnType === 'horizontal') {
        const z = dir === 1 ? laneDefs.horizontal.plus[laneIndex] : laneDefs.horizontal.minus[laneIndex];
        const x = dir === 1 ? -84 : 84;
        vehicle.mesh.position.set(x, 0.3, z);
        vehicle.mesh.rotation.y = dir === 1 ? 0 : Math.PI;
      } else {
        const x = dir === 1 ? laneDefs.vertical.plus[laneIndex] : laneDefs.vertical.minus[laneIndex];
        const z = dir === 1 ? -84 : 84;
        vehicle.mesh.position.set(x, 0.3, z);
        vehicle.mesh.rotation.y = dir === 1 ? Math.PI / 2 : -Math.PI / 2;
      }

      totalSpawned++;
    }

    function updateVehicleExhaust(vehicle, dt) {
      if (vehicle.speed > 0.05) {
        const inactive = vehicle.exhaust.find(p => !p.active);
        if (inactive && Math.random() < 0.35) {
          inactive.active = true;
          inactive.life = inactive.maxLife;

          let rearOffset;
          if (vehicle.roadType === 'horizontal') {
            rearOffset = new THREE.Vector3(-vehicle.dir * 0.9, 0.1, 0);
          } else {
            rearOffset = new THREE.Vector3(0, 0.1, -vehicle.dir * 0.9);
          }

          inactive.mesh.position.copy(vehicle.mesh.position).add(rearOffset);
          inactive.velocity.set(
            (Math.random() - 0.5) * 0.03,
            0.03 + Math.random() * 0.03,
            (Math.random() - 0.5) * 0.03
          );
          inactive.mesh.material.opacity = 0.45;
          inactive.mesh.visible = true;
        }
      }

      for (const p of vehicle.exhaust) {
        if (!p.active) continue;
        p.life -= dt;
        if (p.life <= 0) {
          p.active = false;
          p.mesh.visible = false;
          continue;
        }
        p.mesh.position.addScaledVector(p.velocity, dt * 60);
        p.mesh.material.opacity = 0.45 * (p.life / p.maxLife);
      }
    }

    function updatePhase(dt) {
      phaseElapsed += dt;
      const current = getCurrentPhase();
      if (phaseElapsed >= current.duration) {
        phaseElapsed = 0;
        phaseIndex = (phaseIndex + 1) % PHASES.length;
        updateTrafficLightVisual();
      }
    }

    function updateHUD(avgSpeed) {
      hudVehicles.textContent = `Vehicles: ${vehicles.length}`;
      hudSpeed.textContent = `Avg Speed: ${avgSpeed.toFixed(2)}`;
      hudLight.textContent = `Light: ${getCurrentPhase().name}`;
      hudTime.textContent = `Time: ${Math.floor(elapsedTime)}`;
    }

    function updateState(avgSpeed) {
      let queueH = 0;
      let queueV = 0;
      let exhaustCount = 0;

      for (const v of vehicles) {
        if (v.stoppedForLight && v.speed < 0.05) {
          if (v.roadType === 'horizontal') queueH++;
          else queueV++;
        }
        for (const p of v.exhaust) {
          if (p.active) exhaustCount++;
        }
      }

      window.__3D_STATE__.vehicleCount = vehicles.length;
      window.__3D_STATE__.maxVehicles = maxVehicles;
      window.__3D_STATE__.avgSpeed = parseFloat(avgSpeed.toFixed(2));
      window.__3D_STATE__.trafficPhase = getCurrentPhase().name;
      window.__3D_STATE__.phaseDuration = phaseElapsed;
      window.__3D_STATE__.isPaused = isPaused;
      window.__3D_STATE__.isFastForward = isFastForward;
      window.__3D_STATE__.cameraMode = cameraMode;
      window.__3D_STATE__.elapsedTime = elapsedTime;
      window.__3D_STATE__.totalSpawned = totalSpawned;
      window.__3D_STATE__.intersectionQueueH = queueH;
      window.__3D_STATE__.intersectionQueueV = queueV;
      window.__3D_STATE__.exhaustParticleCount = exhaustCount;
    }

    function animate() {
      requestAnimationFrame(animate);

      let dt = clock.getDelta();
      dt = Math.min(dt, 0.05);

      if (!isPaused) {
        const simScale = isFastForward ? 2 : 1;
        const simDt = dt * simScale;

        elapsedTime += simDt;
        updatePhase(simDt);

        while (vehicles.length < maxVehicles) spawnVehicle();

        let speedSum = 0;
        for (const vehicle of vehicles) {
          updateVehicle(vehicle, simDt);
          speedSum += vehicle.speed;
        }

        const avgSpeed = vehicles.length ? speedSum / vehicles.length : 0;
        updateHUD(avgSpeed);
        updateState(avgSpeed);
      } else {
        let speedSum = 0;
        for (const vehicle of vehicles) speedSum += vehicle.speed;
        const avgSpeed = vehicles.length ? speedSum / vehicles.length : 0;
        updateHUD(avgSpeed);
        updateState(avgSpeed);
      }

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
