<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L-System Plant Growth Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Sky blue background */
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 250px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }
        button:hover {
            background: #45a049;
        }
        .btn-group {
            display: flex;
            gap: 5px;
        }
        .btn-group button {
            flex: 1;
        }
        #status-text {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.3);
            font-size: 14px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div class="btn-group">
            <button id="btn-grow">Grow (G)</button>
            <button id="btn-reset">Reset (R)</button>
        </div>
        <div class="btn-group">
            <button id="btn-save">Save State (S)</button>
            <button id="btn-load">Load State</button>
        </div>
        <button id="btn-toggle">Toggle Visibility</button>
        <div class="btn-group">
            <button id="btn-angle-up">Angle +5°</button>
            <button id="btn-angle-down">Angle -5°</button>
        </div>
        <div id="status-text">Gen: 0 | Segments: 0 | Leaves: 0 | Angle: 25°</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            generation: 0,
            segmentCount: 0,
            leafCount: 0,
            avocadoLoaded: false,
            savedState: null,
            plantVisible: true,
            angle: 25,
            growthSpeed: 1.0
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 2, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x5a7d3a, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Models & Groups ---
        let avocadoModel = null;
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Avocado/glTF-Binary/Avocado.glb',
            (gltf) => {
                avocadoModel = gltf.scene;
                avocadoModel.scale.set(15, 15, 15);
                avocadoModel.position.set(-3, 0, 0);
                
                avocadoModel.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                scene.add(avocadoModel);
                window.__3D_STATE__.avocadoLoaded = true;
            }
        );

        const plantGroup = new THREE.Group();
        plantGroup.position.set(3, 0, 0);
        scene.add(plantGroup);

        // --- L-System Logic ---
        const branchGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.5, 8);
        branchGeo.translate(0, 0.25, 0); // Pivot at base
        const branchMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 });

        const leafGeo = new THREE.SphereGeometry(0.08, 8, 8);
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x228B22, roughness: 0.6 });

        function generateLSystemString(gen) {
            let current = 'F';
            for (let i = 0; i < gen; i++) {
                let next = '';
                for (let char of current) {
                    if (char === 'F') next += 'FF+[+F-F-F]-[-F+F+F]';
                    else next += char;
                }
                current = next;
            }
            return current;
        }

        function buildPlant() {
            // Clear existing
            while (plantGroup.children.length > 0) {
                const child = plantGroup.children[0];
                plantGroup.remove(child);
            }

            window.__3D_STATE__.segmentCount = 0;
            window.__3D_STATE__.leafCount = 0;

            const lString = generateLSystemString(window.__3D_STATE__.generation);
            const turtle = new THREE.Object3D();
            const stack = [];
            const angleRad = window.__3D_STATE__.angle * Math.PI / 180;

            for (let i = 0; i < lString.length; i++) {
                const char = lString[i];

                if (char === 'F') {
                    const segment = new THREE.Mesh(branchGeo, branchMat);
                    segment.position.copy(turtle.position);
                    segment.quaternion.copy(turtle.quaternion);
                    segment.castShadow = true;
                    plantGroup.add(segment);
                    
                    turtle.translateY(0.5);
                    window.__3D_STATE__.segmentCount++;
                } else if (char === '+') {
                    turtle.rotateZ(angleRad);
                } else if (char === '-') {
                    turtle.rotateZ(-angleRad);
                } else if (char === '[') {
                    stack.push({
                        pos: turtle.position.clone(),
                        rot: turtle.quaternion.clone()
                    });
                } else if (char === ']') {
                    // Add leaf at branch end
                    if (i > 0 && lString[i - 1] === 'F') {
                        const leaf = new THREE.Mesh(leafGeo, leafMat);
                        leaf.position.copy(turtle.position);
                        leaf.castShadow = true;
                        plantGroup.add(leaf);
                        window.__3D_STATE__.leafCount++;
                    }

                    const state = stack.pop();
                    turtle.position.copy(state.pos);
                    turtle.quaternion.copy(state.rot);
                }
            }

            // Add leaf at the very top if it ends with F
            if (lString.endsWith('F')) {
                const leaf = new THREE.Mesh(leafGeo, leafMat);
                leaf.position.copy(turtle.position);
                leaf.castShadow = true;
                plantGroup.add(leaf);
                window.__3D_STATE__.leafCount++;
            }
        }

        // Initial build
        buildPlant();

        // --- UI & Interaction ---
        const btnGrow = document.getElementById('btn-grow');
        const btnReset = document.getElementById('btn-reset');
        const btnSave = document.getElementById('btn-save');
        const btnLoad = document.getElementById('btn-load');
        const btnToggle = document.getElementById('btn-toggle');
        const btnAngleUp = document.getElementById('btn-angle-up');
        const btnAngleDown = document.getElementById('btn-angle-down');
        const statusText = document.getElementById('status-text');

        function handleGrow() {
            if (window.__3D_STATE__.generation < 4) {
                window.__3D_STATE__.generation++;
                buildPlant();
            }
        }

        function handleReset() {
            window.__3D_STATE__.generation = 0;
            buildPlant();
        }

        function handleSave() {
            window.__3D_STATE__.savedState = {
                generation: window.__3D_STATE__.generation,
                segmentCount: window.__3D_STATE__.segmentCount,
                leafCount: window.__3D_STATE__.leafCount
            };
        }

        function handleLoad() {
            if (window.__3D_STATE__.savedState) {
                window.__3D_STATE__.generation = window.__3D_STATE__.savedState.generation;
                buildPlant();
            }
        }

        btnGrow.addEventListener('click', handleGrow);
        btnReset.addEventListener('click', handleReset);
        btnSave.addEventListener('click', handleSave);
        btnLoad.addEventListener('click', handleLoad);
        
        btnToggle.addEventListener('click', () => {
            plantGroup.visible = !plantGroup.visible;
            window.__3D_STATE__.plantVisible = plantGroup.visible;
        });

        btnAngleUp.addEventListener('click', () => {
            if (window.__3D_STATE__.angle < 45) {
                window.__3D_STATE__.angle += 5;
                buildPlant();
            }
        });

        btnAngleDown.addEventListener('click', () => {
            if (window.__3D_STATE__.angle > 10) {
                window.__3D_STATE__.angle -= 5;
                buildPlant();
            }
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'g') handleGrow();
            if (key === 'r') handleReset();
            if (key === 's') handleSave();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();

            // Avocado rotation
            if (avocadoModel) {
                avocadoModel.rotation.y += 0.005;
            }

            // Plant sway
            const swayAngle = Math.sin(time * window.__3D_STATE__.growthSpeed) * (2 * Math.PI / 180);
            plantGroup.rotation.z = swayAngle;

            controls.update();

            // Update HUD
            const state = window.__3D_STATE__;
            statusText.innerText = `Gen: ${state.generation} | Segments: ${state.segmentCount} | Leaves: ${state.leafCount} | Angle: ${state.angle}°`;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
