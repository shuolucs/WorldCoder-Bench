<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L-System Plant Growth Simulation</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px;
    border-radius: 8px;
    z-index: 100;
    color: white;
    min-width: 220px;
  }
  #hud button {
    display: block;
    width: 100%;
    margin: 4px 0;
    padding: 8px 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    transition: background 0.2s;
  }
  #hud button:hover {
    filter: brightness(1.2);
  }
  #btn-grow { background: #4CAF50; color: white; }
  #btn-reset { background: #f44336; color: white; }
  #btn-save { background: #2196F3; color: white; }
  #btn-load { background: #FF9800; color: white; }
  #btn-toggle { background: #9C27B0; color: white; }
  #btn-angle-up { background: #00BCD4; color: white; }
  #btn-angle-down { background: #00BCD4; color: white; }
  .btn-row {
    display: flex;
    gap: 4px;
  }
  .btn-row button {
    flex: 1;
  }
  #status-text {
    margin-top: 10px;
    padding: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    font-size: 12px;
    line-height: 1.6;
    text-align: center;
  }
  #hud h3 {
    margin: 0 0 10px 0;
    text-align: center;
    color: #8BC34A;
    font-size: 14px;
  }
</style>
</head>
<body>

<div id="hud">
  <h3>🌱 L-System Plant</h3>
  <button id="btn-grow">🌿 Grow (G)</button>
  <button id="btn-reset">🔄 Reset (R)</button>
  <button id="btn-save">💾 Save State (S)</button>
  <button id="btn-load">📂 Load State</button>
  <button id="btn-toggle">👁 Toggle Visibility</button>
  <div class="btn-row">
    <button id="btn-angle-down">Angle -5</button>
    <button id="btn-angle-up">Angle +5</button>
  </div>
  <div id="status-text">Gen: 0 | Segments: 0 | Leaves: 0 | Angle: 25°</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
window.__3D_STATE__ = {
  generation: 0,
  segmentCount: 0,
  leafCount: 0,
  avocadoLoaded: false,
  savedState: null,
  plantVisible: true,
  angle: 25,
  growthSpeed: 1.0
};

const state = window.__3D_STATE__;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 20, 50);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 2, 0);

// --- Lights ---
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

// --- Ground Plane ---
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x5a7d3a, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// --- Avocado Model ---
let avocadoModel = null;
const loader = new GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Avocado/glTF-Binary/Avocado.glb',
  (gltf) => {
    avocadoModel = gltf.scene;
    avocadoModel.scale.set(15, 15, 15);
    avocadoModel.position.set(-3, 0, 0);
    avocadoModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(avocadoModel);
    state.avocadoLoaded = true;
  },
  undefined,
  (error) => {
    console.warn('Could not load Avocado.glb:', error);
    // Create a placeholder avocado
    const placeholderGroup = new THREE.Group();
    const bodyGeo = new THREE.SphereGeometry(0.6, 16, 16);
    bodyGeo.scale(1, 1.4, 1);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1.0;
    body.castShadow = true;
    placeholderGroup.add(body);

    const seedGeo = new THREE.SphereGeometry(0.25, 12, 12);
    const seedMat = new THREE.MeshStandardMaterial({ color: 0x8B6914 });
    const seed = new THREE.Mesh(seedGeo, seedMat);
    seed.position.y = 0.9;
    placeholderGroup.add(seed);

    placeholderGroup.position.set(-3, 0, 0);
    avocadoModel = placeholderGroup;
    scene.add(avocadoModel);
    state.avocadoLoaded = true;
  }
);

// --- A small pot for the avocado ---
const potGeo = new THREE.CylinderGeometry(0.8, 0.6, 1.0, 16);
const potMat = new THREE.MeshStandardMaterial({ color: 0xB5651D, roughness: 0.8 });
const pot1 = new THREE.Mesh(potGeo, potMat);
pot1.position.set(-3, 0.5, 0);
pot1.castShadow = true;
pot1.receiveShadow = true;
scene.add(pot1);

// Soil in pot
const soilGeo = new THREE.CylinderGeometry(0.75, 0.75, 0.1, 16);
const soilMat = new THREE.MeshStandardMaterial({ color: 0x3E2723 });
const soil1 = new THREE.Mesh(soilGeo, soilMat);
soil1.position.set(-3, 1.0, 0);
scene.add(soil1);

// --- A pot for the L-system plant ---
const pot2 = new THREE.Mesh(potGeo.clone(), potMat.clone());
pot2.position.set(3, 0.5, 0);
pot2.castShadow = true;
pot2.receiveShadow = true;
scene.add(pot2);

const soil2 = new THREE.Mesh(soilGeo.clone(), soilMat.clone());
soil2.position.set(3, 1.0, 0);
scene.add(soil2);

// --- L-System ---
const plantGroup = new THREE.Group();
plantGroup.position.set(3, 1.0, 0);
scene.add(plantGroup);

function generateLSystem(axiom, rules, generations) {
  let current = axiom;
  for (let i = 0; i < generations; i++) {
    let next = '';
    for (const ch of current) {
      next += rules[ch] || ch;
    }
    current = next;
  }
  return current;
}

const branchMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8 });
const leafMaterial = new THREE.MeshStandardMaterial({ color: 0x228B22, roughness: 0.6 });

// Shared geometries
const branchGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.5, 6);
branchGeo.translate(0, 0.25, 0); // pivot at bottom
const leafGeo = new THREE.SphereGeometry(0.08, 8, 8);

function buildPlant() {
  // Clear existing plant
  while (plantGroup.children.length > 0) {
    const child = plantGroup.children[0];
    plantGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
  }

  const lString = generateLSystem('F', { 'F': 'FF+[+F-F-F]-[-F+F+F]' }, state.generation);
  const angleRad = THREE.MathUtils.degToRad(state.angle);

  let segmentCount = 0;
  let leafCount = 0;

  // Turtle state
  const turtleStack = [];
  let position = new THREE.Vector3(0, 0, 0);
  let direction = new THREE.Vector3(0, 1, 0);
  // We'll track orientation with a quaternion
  let quaternion = new THREE.Quaternion();

  // Helper: get current up direction from quaternion
  function getDirection() {
    const dir = new THREE.Vector3(0, 1, 0);
    dir.applyQuaternion(quaternion);
    return dir.normalize();
  }

  let lastWasF = false;

  for (let i = 0; i < lString.length; i++) {
    const ch = lString[i];

    if (ch === 'F') {
      const dir = getDirection();
      const segmentLength = 0.5;

      // Create branch segment
      const branch = new THREE.Mesh(branchGeo, branchMaterial);
      branch.position.copy(position);
      branch.quaternion.copy(quaternion);
      branch.castShadow = true;
      plantGroup.add(branch);
      segmentCount++;

      // Move turtle forward
      position = position.clone().add(dir.multiplyScalar(segmentLength));
      lastWasF = true;
    } else if (ch === '+') {
      // Rotate around Z axis by +angle
      const rotQ = new THREE.Quaternion();
      const axis = new THREE.Vector3(0, 0, 1).applyQuaternion(quaternion).normalize();
      rotQ.setFromAxisAngle(axis, angleRad);
      quaternion = rotQ.multiply(quaternion);
      lastWasF = false;
    } else if (ch === '-') {
      // Rotate around Z axis by -angle
      const rotQ = new THREE.Quaternion();
      const axis = new THREE.Vector3(0, 0, 1).applyQuaternion(quaternion).normalize();
      rotQ.setFromAxisAngle(axis, -angleRad);
      quaternion = rotQ.multiply(quaternion);
      lastWasF = false;
    } else if (ch === '[') {
      turtleStack.push({
        position: position.clone(),
        quaternion: quaternion.clone()
      });
      lastWasF = false;
    } else if (ch === ']') {
      // Check if we should add a leaf at the tip (before popping)
      // Add leaf at current position (branch tip)
      const leaf = new THREE.Mesh(leafGeo, leafMaterial);
      leaf.position.copy(position);
      leaf.castShadow = true;
      plantGroup.add(leaf);
      leafCount++;

      const saved = turtleStack.pop();
      if (saved) {
        position = saved.position;
        quaternion = saved.quaternion;
      }
      lastWasF = false;
    }
  }

  // If generation 0, add a leaf at the tip
  if (state.generation === 0 && segmentCount > 0) {
    const leaf = new THREE.Mesh(leafGeo, leafMaterial);
    leaf.position.copy(position);
    leaf.castShadow = true;
    plantGroup.add(leaf);
    leafCount++;
  }

  state.segmentCount = segmentCount;
  state.leafCount = leafCount;
  updateStatusText();
}

function updateStatusText() {
  const statusEl = document.getElementById('status-text');
  if (statusEl) {
    statusEl.textContent = `Gen: ${state.generation} | Segments: ${state.segmentCount} | Leaves: ${state.leafCount} | Angle: ${state.angle}°`;
  }
}

// --- Button Handlers ---
function grow() {
  if (state.generation < 4) {
    state.generation++;
    buildPlant();
  }
}

function reset() {
  state.generation = 0;
  buildPlant();
}

function saveState() {
  state.savedState = {
    generation: state.generation,
    segmentCount: state.segmentCount,
    leafCount: state.leafCount,
    angle: state.angle
  };
}

function loadState() {
  if (state.savedState) {
    state.generation = state.savedState.generation;
    if (state.savedState.angle !== undefined) {
      state.angle = state.savedState.angle;
    }
    buildPlant();
  }
}

function toggleVisibility() {
  state.plantVisible = !state.plantVisible;
  plantGroup.visible = state.plantVisible;
}

function angleUp() {
  if (state.angle < 45) {
    state.angle = Math.min(45, state.angle + 5);
    buildPlant();
  }
}

function angleDown() {
  if (state.angle > 10) {
    state.angle = Math.max(10, state.angle - 5);
    buildPlant();
  }
}

document.getElementById('btn-grow').addEventListener('click', grow);
document.getElementById('btn-reset').addEventListener('click', reset);
document.getElementById('btn-save').addEventListener('click', saveState);
document.getElementById('btn-load').addEventListener('click', loadState);
document.getElementById('btn-toggle').addEventListener('click', toggleVisibility);
document.getElementById('btn-angle-up').addEventListener('click', angleUp);
document.getElementById('btn-angle-down').addEventListener('click', angleDown);

// --- Keyboard Controls ---
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === 'g') grow();
  else if (key === 'r') reset();
  else if (key === 's') saveState();
});

// --- Initial Build ---
buildPlant();

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const elapsed = clock.getElapsedTime();

  // Sway the plant
  if (plantGroup.visible) {
    const swayAngle = THREE.MathUtils.degToRad(2) * Math.sin(elapsed * 1.5 * state.growthSpeed);
    plantGroup.rotation.z = swayAngle;
  }

  // Rotate avocado
  if (avocadoModel) {
    avocadoModel.rotation.y += 0.005;
  }

  // Update state
  state.plantVisible = plantGroup.visible;

  // Update status text every frame
  updateStatusText();

  controls.update();
  renderer.render(scene, camera);
}

animate();

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
