<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lantern Festival</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute; top: 15px; left: 15px;
    background: rgba(0,0,0,0.7); color: #ffcc88;
    padding: 15px 20px; border-radius: 10px;
    font-size: 14px; line-height: 1.8;
    border: 1px solid rgba(255,153,0,0.3);
    backdrop-filter: blur(5px);
    pointer-events: none;
  }
  #hud span { color: #ffdd44; font-weight: bold; }
  #dayNightBtn {
    position: absolute; top: 15px; right: 15px;
    background: rgba(0,0,0,0.7); color: #ffcc88;
    border: 1px solid rgba(255,153,0,0.4);
    padding: 10px 24px; border-radius: 8px;
    font-size: 15px; cursor: pointer;
    backdrop-filter: blur(5px);
    transition: background 0.3s;
  }
  #dayNightBtn:hover { background: rgba(255,153,0,0.3); }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="hud">
  🏮 Lantern Count: <span id="lanternCount">0</span><br>
  🌗 Time of Day: <span id="timeOfDay">night</span><br>
  👆 Last Clicked: <span id="clickedLantern">-1</span><br>
  📏 Avg Height: <span id="avgHeight">0.0</span>
</div>
<button id="dayNightBtn">☀️ 昼 / 夜 🌙</button>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Global state
window.__3D_STATE__ = {
  modelLoaded: false,
  lanternCount: 0,
  timeOfDay: 'night',
  clickedLanternId: -1,
  avgHeight: 0,
  lanternHeights: [],
  dayNightTransitioning: false
};

const WARM_COLORS = [0xff6600, 0xff3300, 0xffcc00, 0xff9900, 0xff4444];
const LANTERN_COUNT = 20;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);
scene.fog = new THREE.FogExp2(0x0a0a2e, 0.012);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 12, 30);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 10, 0);
controls.maxPolarAngle = Math.PI * 0.85;

// Lighting
const ambientLight = new THREE.AmbientLight(0x334466, 0.05);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffeedd, 0);
directionalLight.position.set(10, 20, 10);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.set(2048, 2048);
directionalLight.shadow.camera.near = 0.5;
directionalLight.shadow.camera.far = 60;
directionalLight.shadow.camera.left = -30;
directionalLight.shadow.camera.right = 30;
directionalLight.shadow.camera.top = 30;
directionalLight.shadow.camera.bottom = -30;
scene.add(directionalLight);

// Ground
const groundGeom = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a1a,
  roughness: 0.9,
  metalness: 0.1
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Lantern data
const lanterns = [];
const lanternLights = [];
const lanternData = [];

// Fallback lantern geometry
function createFallbackLantern() {
  const group = new THREE.Group();

  // Main body - elongated sphere
  const bodyGeom = new THREE.SphereGeometry(0.5, 16, 12);
  bodyGeom.scale(1, 1.4, 1);
  const bodyMat = new THREE.MeshStandardMaterial({
    color: 0xcc3300,
    emissive: 0xff4400,
    emissiveIntensity: 0.3,
    transparent: true,
    opacity: 1,
    side: THREE.DoubleSide,
    roughness: 0.6
  });
  const body = new THREE.Mesh(bodyGeom, bodyMat);
  group.add(body);

  // Top cap
  const topGeom = new THREE.CylinderGeometry(0.15, 0.3, 0.15, 12);
  const capMat = new THREE.MeshStandardMaterial({
    color: 0x8B4513,
    transparent: true,
    opacity: 1,
    roughness: 0.8
  });
  const top = new THREE.Mesh(topGeom, capMat);
  top.position.y = 0.72;
  group.add(top);

  // Bottom cap
  const botGeom = new THREE.CylinderGeometry(0.3, 0.15, 0.15, 12);
  const bot = new THREE.Mesh(botGeom, capMat.clone());
  bot.position.y = -0.72;
  group.add(bot);

  // Tassel
  const tasselGeom = new THREE.CylinderGeometry(0.02, 0.02, 0.4, 6);
  const tasselMat = new THREE.MeshStandardMaterial({
    color: 0xffcc00,
    transparent: true,
    opacity: 1
  });
  const tassel = new THREE.Mesh(tasselGeom, tasselMat);
  tassel.position.y = -1.0;
  group.add(tassel);

  // String on top
  const stringGeom = new THREE.CylinderGeometry(0.01, 0.01, 0.3, 4);
  const stringMat = new THREE.MeshStandardMaterial({
    color: 0x8B4513,
    transparent: true,
    opacity: 1
  });
  const string = new THREE.Mesh(stringGeom, stringMat);
  string.position.y = 0.95;
  group.add(string);

  // Ribs (decorative lines)
  for (let i = 0; i < 8; i++) {
    const ribGeom = new THREE.TorusGeometry(0.5, 0.015, 4, 16, Math.PI);
    const ribMat = new THREE.MeshStandardMaterial({
      color: 0x993300,
      transparent: true,
      opacity: 1
    });
    const rib = new THREE.Mesh(ribGeom, ribMat);
    rib.rotation.y = (i / 8) * Math.PI;
    rib.rotation.x = Math.PI / 2;
    rib.scale.y = 1.4;
    group.add(rib);
  }

  return group;
}

function getRandomColor() {
  return WARM_COLORS[Math.floor(Math.random() * WARM_COLORS.length)];
}

function getDifferentColor(currentColor) {
  const available = WARM_COLORS.filter(c => c !== currentColor);
  return available[Math.floor(Math.random() * available.length)];
}

function setLanternOpacity(lanternGroup, opacity) {
  lanternGroup.traverse((child) => {
    if (child.isMesh && child.material) {
      if (Array.isArray(child.material)) {
        child.material.forEach(m => {
          m.transparent = true;
          m.opacity = opacity;
        });
      } else {
        child.material.transparent = true;
        child.material.opacity = opacity;
      }
    }
  });
}

function initLanternData(index) {
  return {
    baseY: Math.random() * 15,
    baseX: (Math.random() - 0.5) * 30,
    baseZ: (Math.random() - 0.5) * 30,
    swayFreqX: 0.3 + Math.random() * 0.5,
    swayFreqZ: 0.3 + Math.random() * 0.5,
    swayPhaseX: Math.random() * Math.PI * 2,
    swayPhaseZ: Math.random() * Math.PI * 2,
    flickerPhase: Math.random() * Math.PI * 2,
    flickerFreq: 2 + Math.random() * 3,
    scale: 0.5 + Math.random() * 0.3,
    color: getRandomColor(),
    opacity: 1,
    fadingOut: false,
    pulseTime: 0,
    pulsing: false,
    speed: 0.2 + Math.random() * 0.05,
    index: index
  };
}

function spawnLantern(lanternGroup, data) {
  data.baseY = Math.random() * 2;
  data.baseX = (Math.random() - 0.5) * 30;
  data.baseZ = (Math.random() - 0.5) * 30;
  data.opacity = 1;
  data.fadingOut = false;
  data.swayPhaseX = Math.random() * Math.PI * 2;
  data.swayPhaseZ = Math.random() * Math.PI * 2;
  lanternGroup.position.set(data.baseX, data.baseY, data.baseZ);
  setLanternOpacity(lanternGroup, 1);
}

// Load model or use fallback
const loader = new GLTFLoader();

function setupLanterns(templateGroup) {
  for (let i = 0; i < LANTERN_COUNT; i++) {
    const data = initLanternData(i);
    const lanternClone = templateGroup.clone();

    const scale = data.scale;
    lanternClone.scale.set(scale, scale, scale);
    lanternClone.position.set(data.baseX, data.baseY, data.baseZ);

    // Make all materials transparent-ready and enable shadows
    lanternClone.traverse((child) => {
      if (child.isMesh) {
        if (Array.isArray(child.material)) {
          child.material = child.material.map(m => {
            const nm = m.clone();
            nm.transparent = true;
            nm.opacity = 1;
            return nm;
          });
        } else {
          child.material = child.material.clone();
          child.material.transparent = true;
          child.material.opacity = 1;
        }
        child.castShadow = true;
      }
    });

    // Point light inside lantern
    const pointLight = new THREE.PointLight(data.color, 0.8, 5);
    pointLight.decay = 2;
    pointLight.castShadow = true;
    pointLight.shadow.mapSize.set(256, 256);
    lanternClone.add(pointLight);

    scene.add(lanternClone);
    lanterns.push(lanternClone);
    lanternLights.push(pointLight);
    lanternData.push(data);
  }

  window.__3D_STATE__.modelLoaded = true;
  window.__3D_STATE__.lanternCount = LANTERN_COUNT;
  document.getElementById('lanternCount').textContent = LANTERN_COUNT;
}

loader.load(
  'assets/Lantern.glb',
  (gltf) => {
    const model = gltf.scene;
    setupLanterns(model);
  },
  undefined,
  (error) => {
    console.warn('Could not load Lantern.glb, using fallback geometry:', error);
    const fallback = createFallbackLantern();
    setupLanterns(fallback);
  }
);

// Day/Night state
let isNight = true;
let transitionProgress = 1; // 0 = day, 1 = night
let transitionTarget = 1;
let transitioning = false;

const dayBg = new THREE.Color(0x87CEEB);
const nightBg = new THREE.Color(0x0a0a2e);
const dayFog = new THREE.Color(0x87CEEB);
const nightFog = new THREE.Color(0x0a0a2e);

document.getElementById('dayNightBtn').addEventListener('click', () => {
  isNight = !isNight;
  transitionTarget = isNight ? 1 : 0;
  transitioning = true;
  window.__3D_STATE__.dayNightTransitioning = true;
  window.__3D_STATE__.timeOfDay = isNight ? 'night' : 'day';
  document.getElementById('timeOfDay').textContent = isNight ? 'night' : 'day';
});

// Raycaster for click
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  for (let i = 0; i < lanterns.length; i++) {
    const meshes = [];
    lanterns[i].traverse(child => {
      if (child.isMesh) meshes.push(child);
    });
    const intersects = raycaster.intersectObjects(meshes, false);
    if (intersects.length > 0) {
      // Change color
      const oldColor = lanternData[i].color;
      const newColor = getDifferentColor(oldColor);
      lanternData[i].color = newColor;
      lanternLights[i].color.setHex(newColor);

      // Pulse effect
      lanternData[i].pulsing = true;
      lanternData[i].pulseTime = 0;

      // Update state
      window.__3D_STATE__.clickedLanternId = i;
      document.getElementById('clickedLantern').textContent = i;
      break;
    }
  }
});

// Add some ambient particles for atmosphere
const particleCount = 200;
const particleGeom = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 60;
  particlePositions[i * 3 + 1] = Math.random() * 40;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 60;
}
particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0xffaa44,
  size: 0.08,
  transparent: true,
  opacity: 0.4,
  blending: THREE.AdditiveBlending
});
const particles = new THREE.Points(particleGeom, particleMat);
scene.add(particles);

// Animation
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Day/Night transition
  if (transitioning) {
    const transitionSpeed = 1.0; // 1 second
    if (transitionProgress < transitionTarget) {
      transitionProgress = Math.min(transitionProgress + delta * transitionSpeed, transitionTarget);
    } else if (transitionProgress > transitionTarget) {
      transitionProgress = Math.max(transitionProgress - delta * transitionSpeed, transitionTarget);
    }
    if (Math.abs(transitionProgress - transitionTarget) < 0.001) {
      transitionProgress = transitionTarget;
      transitioning = false;
      window.__3D_STATE__.dayNightTransitioning = false;
    }

    // Interpolate background
    const bgColor = new THREE.Color().lerpColors(dayBg, nightBg, transitionProgress);
    scene.background = bgColor;
    scene.fog.color.copy(bgColor);

    // Ambient light
    ambientLight.intensity = THREE.MathUtils.lerp(0.6, 0.05, transitionProgress);

    // Directional light
    directionalLight.intensity = THREE.MathUtils.lerp(1.0, 0, transitionProgress);
  }

  // Base point light intensity based on day/night
  const baseLightIntensity = THREE.MathUtils.lerp(0.3, 0.8, transitionProgress);

  // Update lanterns
  const heights = [];
  for (let i = 0; i < lanterns.length; i++) {
    const data = lanternData[i];
    const lantern = lanterns[i];
    const light = lanternLights[i];

    // Rise
    data.baseY += data.speed * delta;

    // Sway
    const swayX = Math.sin(elapsed * data.swayFreqX + data.swayPhaseX) * 0.3;
    const swayZ = Math.sin(elapsed * data.swayFreqZ + data.swayPhaseZ) * 0.3;

    lantern.position.x = data.baseX + swayX;
    lantern.position.y = data.baseY;
    lantern.position.z = data.baseZ + swayZ;

    // Slight rotation from sway
    lantern.rotation.z = swayX * 0.1;
    lantern.rotation.x = swayZ * 0.1;

    // Fade out when reaching y=30
    if (data.baseY >= 30 && !data.fadingOut) {
      data.fadingOut = true;
    }

    if (data.fadingOut) {
      data.opacity -= delta / 2.0; // 2 seconds to fade
      if (data.opacity <= 0) {
        data.opacity = 0;
        // Respawn
        spawnLantern(lantern, data);
      }
      setLanternOpacity(lantern, Math.max(0, data.opacity));
      light.intensity = baseLightIntensity * Math.max(0, data.opacity);
    } else {
      // Flicker
      const flicker = Math.sin(elapsed * data.flickerFreq + data.flickerPhase) * 0.2;
      light.intensity = (baseLightIntensity + flicker) * data.opacity;
    }

    // Pulse effect
    if (data.pulsing) {
      data.pulseTime += delta;
      const pulseDuration = 0.4;
      if (data.pulseTime < pulseDuration) {
        const t = data.pulseTime / pulseDuration;
        const pulseScale = data.scale * (1 + 0.2 * Math.sin(t * Math.PI));
        lantern.scale.set(pulseScale, pulseScale, pulseScale);
      } else {
        lantern.scale.set(data.scale, data.scale, data.scale);
        data.pulsing = false;
      }
    }

    heights.push(data.baseY);
  }

  // Particle animation
  const positions = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3 + 1] += delta * 0.3;
    if (positions[i * 3 + 1] > 40) positions[i * 3 + 1] = 0;
  }
  particles.geometry.attributes.position.needsUpdate = true;
  particleMat.opacity = THREE.MathUtils.lerp(0.1, 0.4, transitionProgress);

  // Update HUD and state
  if (heights.length > 0) {
    const avg = heights.reduce((a, b) => a + b, 0) / heights.length;
    window.__3D_STATE__.avgHeight = parseFloat(avg.toFixed(1));
    window.__3D_STATE__.lanternHeights = heights.map(h => parseFloat(h.toFixed(2)));
    document.getElementById('avgHeight').textContent = avg.toFixed(1);
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
