<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 灯笼节场景</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            user-select: none;
            font-size: 14px;
            line-height: 1.6;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #dayNightBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background: #ff9900;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: background 0.3s;
        }
        #dayNightBtn:hover {
            background: #ffcc00;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="hud">
        <div>灯笼总数: <span id="lanternCount">20</span></div>
        <div>当前时段: <span id="timeOfDay">night</span></div>
        <div>最后点击ID: <span id="clickedLantern">-1</span></div>
        <div>平均高度: <span id="avgHeight">0.0</span> m</div>
    </div>
    <button id="dayNightBtn">昼/夜 切换</button>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. 初始化全局状态
        window.__3D_STATE__ = {
            modelLoaded: false,
            lanternCount: 20,
            timeOfDay: 'night',
            clickedLanternId: -1,
            avgHeight: 0,
            lanternHeights: [],
            dayNightTransitioning: false
        };

        // 2. 场景、相机、渲染器设置
        const scene = new THREE.Scene();
        const nightSkyColor = new THREE.Color(0x0a0a2e);
        const daySkyColor = new THREE.Color(0x87CEEB);
        scene.background = nightSkyColor;

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 40);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // 防止看地下

        // 3. 环境光与平行光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.05);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0);
        directionalLight.position.set(20, 50, 20);
        scene.add(directionalLight);

        // 4. 地面
        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a1a, 
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // 5. 灯笼数据与加载
        const warmColors = [0xff6600, 0xff3300, 0xffcc00, 0xff9900, 0xff4444];
        const lanterns = [];
        const lanternGroup = new THREE.Group();
        scene.add(lanternGroup);

        function setupLantern(mesh, index) {
            // 随机缩放 0.5 - 0.8
            const scale = 0.5 + Math.random() * 0.3;
            mesh.scale.set(scale, scale, scale);
            
            // 随机位置 x: -15~15, y: 0~15, z: -15~15
            const startX = (Math.random() - 0.5) * 30;
            const startY = Math.random() * 15;
            const startZ = (Math.random() - 0.5) * 30;
            mesh.position.set(startX, startY, startZ);

            // 材质处理：克隆并开启透明
            mesh.traverse((child) => {
                if (child.isMesh && child.material) {
                    if (Array.isArray(child.material)) {
                        child.material = child.material.map(m => {
                            const newMat = m.clone();
                            newMat.transparent = true;
                            newMat.opacity = 1;
                            return newMat;
                        });
                    } else {
                        child.material = child.material.clone();
                        child.material.transparent = true;
                        child.material.opacity = 1;
                    }
                }
            });

            // 记录索引用于点击检测
            mesh.userData.lanternIndex = index;

            // 添加点光源
            const colorIdx = Math.floor(Math.random() * warmColors.length);
            const pointLight = new THREE.PointLight(warmColors[colorIdx], 0.8, 5);
            pointLight.position.set(0, 0, 0); // 内部中心
            mesh.add(pointLight);

            return {
                mesh: mesh,
                light: pointLight,
                baseScale: scale,
                colorIdx: colorIdx,
                baseX: startX,
                baseZ: startZ,
                phaseX: Math.random() * Math.PI * 2,
                phaseZ: Math.random() * Math.PI * 2,
                freqX: 0.5 + Math.random() * 0.5,
                freqZ: 0.5 + Math.random() * 0.5,
                flickerPhase: Math.random() * Math.PI * 2,
                pulseTimer: 0,
                opacity: 1
            };
        }

        // 备用几何体（防止模型加载失败时白屏）
        const fallbackGeo = new THREE.CylinderGeometry(0.6, 0.6, 1.5, 16);
        const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xffddaa, emissive: 0x220000 });

        const loader = new GLTFLoader();
        loader.load('assets/Lantern.glb', (gltf) => {
            for (let i = 0; i < 20; i++) {
                const clone = gltf.scene.clone();
                const lanternData = setupLantern(clone, i);
                lanterns.push(lanternData);
                lanternGroup.add(clone);
            }
            window.__3D_STATE__.modelLoaded = true;
        }, undefined, (error) => {
            console.warn('无法加载 assets/Lantern.glb，使用备用几何体代替。', error);
            for (let i = 0; i < 20; i++) {
                const mesh = new THREE.Mesh(fallbackGeo, fallbackMat);
                const lanternData = setupLantern(mesh, i);
                lanterns.push(lanternData);
                lanternGroup.add(mesh);
            }
            window.__3D_STATE__.modelLoaded = true;
        });

        // 6. 昼夜切换逻辑
        let isDay = false;
        let transitionProgress = 1; // 1 表示过渡完成

        document.getElementById('dayNightBtn').addEventListener('click', () => {
            isDay = !isDay;
            transitionProgress = 0;
            window.__3D_STATE__.timeOfDay = isDay ? 'day' : 'night';
            window.__3D_STATE__.dayNightTransitioning = true;
        });

        function updateDayNight(dt) {
            if (transitionProgress < 1) {
                transitionProgress += dt; // 约 1 秒完成
                if (transitionProgress >= 1) {
                    transitionProgress = 1;
                    window.__3D_STATE__.dayNightTransitioning = false;
                }

                const t = transitionProgress;
                
                // 天空颜色过渡
                const currentSky = isDay 
                    ? nightSkyColor.clone().lerp(daySkyColor, t) 
                    : daySkyColor.clone().lerp(nightSkyColor, t);
                scene.background = currentSky;

                // 环境光过渡 (夜 0.05 -> 昼 0.6)
                ambientLight.intensity = isDay 
                    ? THREE.MathUtils.lerp(0.05, 0.6, t) 
                    : THREE.MathUtils.lerp(0.6, 0.05, t);

                // 平行光过渡 (夜 0 -> 昼 1)
                directionalLight.intensity = isDay 
                    ? THREE.MathUtils.lerp(0, 1, t) 
                    : THREE.MathUtils.lerp(1, 0, t);
            }
        }

        // 7. 点击交互
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(lanternGroup.children, true);

            if (intersects.length > 0) {
                let obj = intersects[0].object;
                let index = -1;
                
                // 向上查找带有 userData.lanternIndex 的父级
                while (obj) {
                    if (obj.userData && obj.userData.lanternIndex !== undefined) {
                        index = obj.userData.lanternIndex;
                        break;
                    }
                    obj = obj.parent;
                }

                if (index !== -1) {
                    window.__3D_STATE__.clickedLanternId = index;
                    const l = lanterns[index];
                    
                    // 随机更换不同颜色
                    let newColorIdx;
                    do {
                        newColorIdx = Math.floor(Math.random() * warmColors.length);
                    } while (newColorIdx === l.colorIdx);
                    
                    l.colorIdx = newColorIdx;
                    l.light.color.setHex(warmColors[newColorIdx]);
                    
                    // 触发脉冲放大
                    l.pulseTimer = 0.5; // 0.5秒脉冲动画
                }
            }
        });

        // 窗口自适应
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 8. 动画循环
        const clock = new THREE.Clock();

        // HUD DOM 元素
        const elCount = document.getElementById('lanternCount');
        const elTime = document.getElementById('timeOfDay');
        const elClicked = document.getElementById('clickedLantern');
        const elAvgHeight = document.getElementById('avgHeight');

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const time = clock.getElapsedTime();

            updateDayNight(dt);

            let totalHeight = 0;
            const heights = [];

            // 目标光强
            const targetLightIntensity = isDay ? 0.3 : 0.8;
            const startLightIntensity = isDay ? 0.8 : 0.3;
            const currentBaseIntensity = transitionProgress < 1 
                ? THREE.MathUtils.lerp(startLightIntensity, targetLightIntensity, transitionProgress)
                : targetLightIntensity;

            lanterns.forEach(l => {
                // 向上运动 0.2 m/s
                l.mesh.position.y += 0.2 * dt;

                // 水平摇摆
                l.mesh.position.x = l.baseX + Math.sin(time * l.freqX + l.phaseX) * 0.3;
                l.mesh.position.z = l.baseZ + Math.sin(time * l.freqZ + l.phaseZ) * 0.3;

                // 光源闪烁 (正弦波动 ±0.2)
                l.light.intensity = currentBaseIntensity + Math.sin(time * 5 + l.flickerPhase) * 0.2;

                // 淡出与重生逻辑
                if (l.mesh.position.y >= 30) {
                    // 速度 0.2m/s，2秒移动 0.4m。在 30 到 30.4 之间透明度从 1 到 0
                    l.opacity = 1 - (l.mesh.position.y - 30) / 0.4;
                    
                    if (l.opacity <= 0) {
                        // 重生
                        l.opacity = 1;
                        l.mesh.position.y = Math.random() * 2;
                        l.baseX = (Math.random() - 0.5) * 30;
                        l.baseZ = (Math.random() - 0.5) * 30;
                    }

                    // 应用透明度
                    l.mesh.traverse(child => {
                        if (child.isMesh && child.material) {
                            if (Array.isArray(child.material)) {
                                child.material.forEach(m => m.opacity = Math.max(0, l.opacity));
                            } else {
                                child.material.opacity = Math.max(0, l.opacity);
                            }
                        }
                    });
                }

                // 点击脉冲动画
                if (l.pulseTimer > 0) {
                    l.pulseTimer -= dt;
                    // 0.5秒内：1 -> 1.2 -> 1
                    const progress = l.pulseTimer / 0.5; // 1 -> 0
                    const pulseScale = 1 + Math.sin(progress * Math.PI) * 0.2;
                    const s = l.baseScale * pulseScale;
                    l.mesh.scale.set(s, s, s);
                } else {
                    l.mesh.scale.set(l.baseScale, l.baseScale, l.baseScale);
                }

                totalHeight += l.mesh.position.y;
                heights.push(l.mesh.position.y);
            });

            // 更新状态
            if (lanterns.length > 0) {
                window.__3D_STATE__.avgHeight = totalHeight / lanterns.length;
                window.__3D_STATE__.lanternHeights = heights;
            }

            // 更新 HUD
            elCount.innerText = window.__3D_STATE__.lanternCount;
            elTime.innerText = window.__3D_STATE__.timeOfDay;
            elClicked.innerText = window.__3D_STATE__.clickedLanternId;
            elAvgHeight.innerText = window.__3D_STATE__.avgHeight.toFixed(1);

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
