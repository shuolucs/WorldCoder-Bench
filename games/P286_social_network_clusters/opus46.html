<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Social Network Cluster Visualization</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #0a0a1a;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    color: #ccccee;
    font-size: 14px;
    line-height: 1.6;
    background: rgba(10, 10, 30, 0.85);
    padding: 15px 20px;
    border-radius: 10px;
    border: 1px solid rgba(100, 100, 200, 0.3);
    pointer-events: none;
    backdrop-filter: blur(5px);
    min-width: 260px;
  }
  #hud div { margin: 2px 0; }
  #hud .label { color: #8888bb; font-size: 12px; }
  #hud .value { color: #eeeeff; font-weight: 500; }
  #toggleLabelsBtn {
    position: absolute;
    top: 15px;
    right: 15px;
    padding: 10px 20px;
    background: rgba(60, 60, 120, 0.8);
    color: #ccccee;
    border: 1px solid rgba(100, 100, 200, 0.4);
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    backdrop-filter: blur(5px);
    transition: all 0.2s;
  }
  #toggleLabelsBtn:hover {
    background: rgba(80, 80, 160, 0.9);
    border-color: rgba(140, 140, 255, 0.6);
  }
  .node-label {
    color: #ffffff;
    font-size: 11px;
    font-family: 'Segoe UI', monospace;
    background: rgba(0, 0, 0, 0.6);
    padding: 2px 6px;
    border-radius: 4px;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="hud">
  <div><span class="label">Nodes:</span> <span class="value" id="hudNodes">24</span> <span class="label">| Edges:</span> <span class="value" id="hudEdges">0</span></div>
  <div><span class="label">Simulation:</span> <span class="value" id="hudSim">Running</span> <span class="label">| Step:</span> <span class="value" id="hudStep">0</span></div>
  <div><span class="label">Selected:</span> <span class="value" id="hudSelected">None</span></div>
  <div><span class="label">Visible Clusters:</span> <span class="value" id="hudClusters">[0, 1, 2]</span></div>
</div>

<button id="toggleLabelsBtn">Toggle Labels</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>

<script>
(function() {
  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 80);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // CSS2D Renderer for labels
  const labelRenderer = new THREE.CSS2DRenderer();
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.domElement.style.position = 'absolute';
  labelRenderer.domElement.style.top = '0px';
  labelRenderer.domElement.style.pointerEvents = 'none';
  document.body.appendChild(labelRenderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
  scene.add(ambientLight);

  const pointLight = new THREE.PointLight(0xffffff, 1.0);
  pointLight.position.set(50, 50, 50);
  scene.add(pointLight);

  // Controls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;

  // Cluster definitions
  const clusterDefs = [
    { center: { x: -20, y: 0, z: 0 }, color: 0xff4444, count: 8 },
    { center: { x: 20, y: 10, z: 0 }, color: 0x44ff44, count: 8 },
    { center: { x: 0, y: -15, z: 10 }, color: 0x4444ff, count: 8 }
  ];

  const clusterCenters = clusterDefs.map(c => ({ x: c.center.x, y: c.center.y, z: c.center.z }));

  // Node data
  const nodes = [];
  const nodeMeshes = [];
  const nodeLabels = [];
  let nodeId = 0;

  function randomOffset() {
    return (Math.random() - 0.5) * 10; // ±5
  }

  // Generate initial positions
  const initialPositions = [];

  clusterDefs.forEach((cluster, clusterIdx) => {
    for (let i = 0; i < cluster.count; i++) {
      const pos = {
        x: cluster.center.x + randomOffset(),
        y: cluster.center.y + randomOffset(),
        z: cluster.center.z + randomOffset()
      };
      initialPositions.push({ ...pos });

      const color = new THREE.Color(cluster.color);
      const geometry = new THREE.SphereGeometry(1, 16, 16);
      const material = new THREE.MeshPhongMaterial({
        color: cluster.color,
        emissive: cluster.color,
        emissiveIntensity: 0.3,
        shininess: 80
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.set(pos.x, pos.y, pos.z);
      mesh.userData = { id: nodeId, cluster: clusterIdx, originalColor: cluster.color };
      scene.add(mesh);
      nodeMeshes.push(mesh);

      // Label
      const labelDiv = document.createElement('div');
      labelDiv.className = 'node-label';
      labelDiv.textContent = `N${nodeId}`;
      const label = new THREE.CSS2DObject(labelDiv);
      label.position.set(0, 1.5, 0);
      label.visible = false;
      mesh.add(label);
      nodeLabels.push(label);

      nodes.push({
        id: nodeId,
        cluster: clusterIdx,
        position: { x: pos.x, y: pos.y, z: pos.z },
        velocity: { x: 0, y: 0, z: 0 },
        mesh: mesh
      });

      nodeId++;
    }
  });

  // Store initial positions for reset
  const storedInitialPositions = initialPositions.map(p => ({ ...p }));

  // Edge generation
  const edges = [];
  const edgeLines = [];

  // Group nodes by cluster
  const clusterNodes = [[], [], []];
  nodes.forEach(n => clusterNodes[n.cluster].push(n));

  // Intra-cluster edges: each node connects to 2-3 random nodes in same cluster
  clusterNodes.forEach((cNodes) => {
    cNodes.forEach(node => {
      const others = cNodes.filter(n => n.id !== node.id);
      const numConnections = 2 + Math.floor(Math.random() * 2); // 2 or 3
      const shuffled = others.sort(() => Math.random() - 0.5);
      for (let i = 0; i < Math.min(numConnections, shuffled.length); i++) {
        const target = shuffled[i];
        // Avoid duplicate edges
        const exists = edges.some(e =>
          (e.source === node.id && e.target === target.id) ||
          (e.source === target.id && e.target === node.id)
        );
        if (!exists) {
          edges.push({ source: node.id, target: target.id, type: 'intra' });
        }
      }
    });
  });

  // Inter-cluster edges: exactly 3
  const interClusterPairs = [[0, 1], [1, 2], [0, 2]];
  interClusterPairs.forEach(([c1, c2]) => {
    const n1 = clusterNodes[c1][Math.floor(Math.random() * clusterNodes[c1].length)];
    const n2 = clusterNodes[c2][Math.floor(Math.random() * clusterNodes[c2].length)];
    edges.push({ source: n1.id, target: n2.id, type: 'inter' });
  });

  // Create edge lines
  function createEdgeLines() {
    // Remove existing
    edgeLines.forEach(line => scene.remove(line));
    edgeLines.length = 0;

    edges.forEach((edge, idx) => {
      const color = edge.type === 'inter' ? 0xff8800 : 0x666666;
      const material = new THREE.LineBasicMaterial({
        color: color,
        transparent: true,
        opacity: edge.type === 'inter' ? 0.8 : 0.4
      });
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(6);
      const sNode = nodes[edge.source];
      const tNode = nodes[edge.target];
      positions[0] = sNode.position.x;
      positions[1] = sNode.position.y;
      positions[2] = sNode.position.z;
      positions[3] = tNode.position.x;
      positions[4] = tNode.position.y;
      positions[5] = tNode.position.z;
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const line = new THREE.Line(geometry, material);
      line.userData = { edgeIndex: idx, source: edge.source, target: edge.target };
      scene.add(line);
      edgeLines.push(line);
    });
  }

  createEdgeLines();

  // Build adjacency for attraction
  const adjacency = new Map();
  edges.forEach(e => {
    if (!adjacency.has(e.source)) adjacency.set(e.source, []);
    if (!adjacency.has(e.target)) adjacency.set(e.target, []);
    adjacency.get(e.source).push(e.target);
    adjacency.get(e.target).push(e.source);
  });

  // State
  let simulationRunning = true;
  let simulationStep = 0;
  let selectedNodeId = null;
  let visibleClusters = [0, 1, 2];
  let labelsVisible = false;
  let resetCount = 0;

  // Expose state
  window.__3D_STATE__ = {
    nodeCount: 24,
    edgeCount: edges.length,
    clusterCount: 3,
    simulationRunning: true,
    simulationStep: 0,
    selectedNodeId: null,
    selectedCluster: null,
    visibleClusters: [0, 1, 2],
    labelsVisible: false,
    nodePositions: nodes.map(n => ({ ...n.position })),
    clusterCenters: clusterCenters.map(c => ({ ...c })),
    averageEdgeLength: 0,
    resetCount: 0
  };

  function updateState() {
    const s = window.__3D_STATE__;
    s.simulationRunning = simulationRunning;
    s.simulationStep = simulationStep;
    s.selectedNodeId = selectedNodeId;
    s.selectedCluster = selectedNodeId !== null ? nodes[selectedNodeId].cluster : null;
    s.visibleClusters = [...visibleClusters];
    s.labelsVisible = labelsVisible;
    s.nodePositions = nodes.map(n => ({ x: n.position.x, y: n.position.y, z: n.position.z }));
    s.resetCount = resetCount;

    // Average edge length
    let totalLen = 0;
    let count = 0;
    edges.forEach(e => {
      const s1 = nodes[e.source].position;
      const t1 = nodes[e.target].position;
      const dx = t1.x - s1.x, dy = t1.y - s1.y, dz = t1.z - s1.z;
      totalLen += Math.sqrt(dx * dx + dy * dy + dz * dz);
      count++;
    });
    s.averageEdgeLength = count > 0 ? totalLen / count : 0;
  }

  // HUD update
  function updateHUD() {
    document.getElementById('hudNodes').textContent = '24';
    document.getElementById('hudEdges').textContent = edges.length;
    document.getElementById('hudSim').textContent = simulationRunning ? 'Running' : 'Paused';
    document.getElementById('hudStep').textContent = simulationStep;
    document.getElementById('hudSelected').textContent = selectedNodeId !== null
      ? `N${selectedNodeId} (Cluster ${nodes[selectedNodeId].cluster})`
      : 'None';
    document.getElementById('hudClusters').textContent = `[${visibleClusters.sort().join(', ')}]`;
  }

  // Force-directed simulation
  function simulateForces() {
    if (!simulationRunning) return;

    const forces = nodes.map(() => ({ x: 0, y: 0, z: 0 }));

    // Repulsion between all pairs
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const ni = nodes[i].position;
        const nj = nodes[j].position;
        let dx = ni.x - nj.x;
        let dy = ni.y - nj.y;
        let dz = ni.z - nj.z;
        let distSq = dx * dx + dy * dy + dz * dz;
        if (distSq < 0.01) distSq = 0.01;
        const dist = Math.sqrt(distSq);
        let force = 200 / distSq;
        force = Math.min(force, 2.0);
        const fx = (dx / dist) * force;
        const fy = (dy / dist) * force;
        const fz = (dz / dist) * force;
        forces[i].x += fx;
        forces[i].y += fy;
        forces[i].z += fz;
        forces[j].x -= fx;
        forces[j].y -= fy;
        forces[j].z -= fz;
      }
    }

    // Attraction along edges
    edges.forEach(edge => {
      const si = nodes[edge.source].position;
      const ti = nodes[edge.target].position;
      let dx = ti.x - si.x;
      let dy = ti.y - si.y;
      let dz = ti.z - si.z;
      const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
      if (dist < 0.01) return;
      let force = dist * 0.01;
      force = Math.min(force, 1.0);
      const fx = (dx / dist) * force;
      const fy = (dy / dist) * force;
      const fz = (dz / dist) * force;
      forces[edge.source].x += fx;
      forces[edge.source].y += fy;
      forces[edge.source].z += fz;
      forces[edge.target].x -= fx;
      forces[edge.target].y -= fy;
      forces[edge.target].z -= fz;
    });

    // Cluster gravity
    nodes.forEach((node, i) => {
      const center = clusterCenters[node.cluster];
      forces[i].x += (center.x - node.position.x) * 0.02;
      forces[i].y += (center.y - node.position.y) * 0.02;
      forces[i].z += (center.z - node.position.z) * 0.02;
    });

    // Apply forces with damping
    nodes.forEach((node, i) => {
      node.velocity.x = (node.velocity.x + forces[i].x) * 0.95;
      node.velocity.y = (node.velocity.y + forces[i].y) * 0.95;
      node.velocity.z = (node.velocity.z + forces[i].z) * 0.95;
      node.position.x += node.velocity.x;
      node.position.y += node.velocity.y;
      node.position.z += node.velocity.z;
      node.mesh.position.set(node.position.x, node.position.y, node.position.z);
    });

    simulationStep++;

    // Auto-pause after 200 frames
    if (simulationStep >= 200) {
      simulationRunning = false;
    }
  }

  // Update edge positions
  function updateEdges() {
    edgeLines.forEach((line, idx) => {
      const edge = edges[idx];
      const sNode = nodes[edge.source];
      const tNode = nodes[edge.target];
      const posAttr = line.geometry.getAttribute('position');
      posAttr.array[0] = sNode.position.x;
      posAttr.array[1] = sNode.position.y;
      posAttr.array[2] = sNode.position.z;
      posAttr.array[3] = tNode.position.x;
      posAttr.array[4] = tNode.position.y;
      posAttr.array[5] = tNode.position.z;
      posAttr.needsUpdate = true;
    });
  }

  // Update visibility based on visible clusters
  function updateVisibility() {
    nodes.forEach(node => {
      const visible = visibleClusters.includes(node.cluster);
      node.mesh.visible = visible;
    });

    edgeLines.forEach((line, idx) => {
      const edge = edges[idx];
      const sVisible = visibleClusters.includes(nodes[edge.source].cluster);
      const tVisible = visibleClusters.includes(nodes[edge.target].cluster);
      line.visible = sVisible && tVisible;
    });
  }

  // Raycasting for click
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  function onMouseClick(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const visibleMeshes = nodeMeshes.filter(m => m.visible);
    const intersects = raycaster.intersectObjects(visibleMeshes);

    // Deselect previous
    if (selectedNodeId !== null) {
      const prevMesh = nodeMeshes[selectedNodeId];
      prevMesh.scale.set(1, 1, 1);
      prevMesh.material.emissiveIntensity = 0.3;
    }

    if (intersects.length > 0) {
      const mesh = intersects[0].object;
      const id = mesh.userData.id;
      selectedNodeId = id;
      mesh.scale.set(1.8, 1.8, 1.8);
      mesh.material.emissiveIntensity = 0.8;
    } else {
      selectedNodeId = null;
    }
  }

  renderer.domElement.addEventListener('click', onMouseClick);

  // Keyboard events
  document.addEventListener('keydown', (event) => {
    if (event.code === 'Space') {
      event.preventDefault();
      simulationRunning = !simulationRunning;
    } else if (event.key === '1') {
      toggleCluster(0);
    } else if (event.key === '2') {
      toggleCluster(1);
    } else if (event.key === '3') {
      toggleCluster(2);
    } else if (event.key === 'r' || event.key === 'R') {
      resetSimulation();
    }
  });

  function toggleCluster(idx) {
    const i = visibleClusters.indexOf(idx);
    if (i >= 0) {
      visibleClusters.splice(i, 1);
    } else {
      visibleClusters.push(idx);
    }
    updateVisibility();
  }

  function resetSimulation() {
    // Regenerate new random initial positions
    let id = 0;
    clusterDefs.forEach((cluster, clusterIdx) => {
      for (let i = 0; i < cluster.count; i++) {
        const pos = {
          x: cluster.center.x + randomOffset(),
          y: cluster.center.y + randomOffset(),
          z: cluster.center.z + randomOffset()
        };
        nodes[id].position.x = pos.x;
        nodes[id].position.y = pos.y;
        nodes[id].position.z = pos.z;
        nodes[id].velocity.x = 0;
        nodes[id].velocity.y = 0;
        nodes[id].velocity.z = 0;
        nodes[id].mesh.position.set(pos.x, pos.y, pos.z);
        id++;
      }
    });

    simulationStep = 0;
    simulationRunning = true;
    resetCount++;
  }

  // Toggle labels button
  document.getElementById('toggleLabelsBtn').addEventListener('click', () => {
    labelsVisible = !labelsVisible;
    nodeLabels.forEach(label => {
      label.visible = labelsVisible;
    });
  });

  // Window resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Add some particle effects in background
  const starGeometry = new THREE.BufferGeometry();
  const starCount = 500;
  const starPositions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount * 3; i++) {
    starPositions[i] = (Math.random() - 0.5) * 300;
  }
  starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  const starMaterial = new THREE.PointsMaterial({ color: 0x444466, size: 0.3 });
  const stars = new THREE.Points(starGeometry, starMaterial);
  scene.add(stars);

  // Animation loop
  function animate() {
    requestAnimationFrame(animate);

    simulateForces();
    updateEdges();
    updateState();
    updateHUD();

    controls.update();
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
  }

  animate();
})();
</script>
</body>
</html>
