<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Social Network Cluster Visualization</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #ffffff;
      background: rgba(0,0,0,0.45);
      padding: 10px 12px;
      border-radius: 8px;
      line-height: 1.5;
      font-size: 14px;
      z-index: 10;
      min-width: 280px;
      user-select: none;
    }

    #toggleLabelsBtn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #1f2a44;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    #toggleLabelsBtn:hover {
      background: #2d3b63;
    }

    .label {
      color: white;
      font-size: 12px;
      font-weight: bold;
      text-shadow: 0 0 6px rgba(0,0,0,0.9);
      user-select: none;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="hud"></div>
  <button id="toggleLabelsBtn">Toggle Labels</button>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { CSS2DRenderer, CSS2DObject } from "https://unpkg.com/three@0.160.0/examples/jsm/renderers/CSS2DRenderer.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 80);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    labelRenderer.domElement.style.zIndex = '5';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 1.0);
    pointLight.position.set(50, 50, 50);
    scene.add(pointLight);

    const hud = document.getElementById('hud');
    const toggleLabelsBtn = document.getElementById('toggleLabelsBtn');

    const clusterCenters = [
      new THREE.Vector3(-20, 0, 0),
      new THREE.Vector3(20, 10, 0),
      new THREE.Vector3(0, -15, 10)
    ];

    const clusterColors = [0xff4444, 0x44ff44, 0x4444ff];
    const nodes = [];
    const edges = [];
    const clusterNodeIds = [[], [], []];
    const clusterVisibility = [true, true, true];

    const nodeGeometry = new THREE.SphereGeometry(1, 16, 16);

    let simulationRunning = true;
    let simulationStep = 0;
    let selectedNode = null;
    let selectedNodeId = null;
    let labelsVisible = true;
    let averageEdgeLength = 0;
    let resetCount = 0;

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function randRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function vecObj(v) {
      return { x: v.x, y: v.y, z: v.z };
    }

    function createNode(id, clusterIndex, center) {
      const material = new THREE.MeshPhongMaterial({
        color: clusterColors[clusterIndex],
        emissive: clusterColors[clusterIndex],
        emissiveIntensity: 0.3,
        shininess: 60
      });

      const mesh = new THREE.Mesh(nodeGeometry, material);

      const initialPosition = new THREE.Vector3(
        center.x + randRange(-5, 5),
        center.y + randRange(-5, 5),
        center.z + randRange(-5, 5)
      );

      mesh.position.copy(initialPosition);

      const labelDiv = document.createElement('div');
      labelDiv.className = 'label';
      labelDiv.textContent = `N${id}`;
      const label = new CSS2DObject(labelDiv);
      label.position.set(0, 2.2, 0);
      mesh.add(label);

      scene.add(mesh);

      const node = {
        id,
        cluster: clusterIndex,
        mesh,
        label,
        velocity: new THREE.Vector3(),
        initialPosition: initialPosition.clone()
      };

      nodes.push(node);
      clusterNodeIds[clusterIndex].push(id);
    }

    let nodeId = 0;
    for (let c = 0; c < 3; c++) {
      for (let i = 0; i < 8; i++) {
        createNode(nodeId++, c, clusterCenters[c]);
      }
    }

    function edgeExists(a, b) {
      return edges.some(e =>
        (e.source === a && e.target === b) || (e.source === b && e.target === a)
      );
    }

    function createEdge(sourceId, targetId, color, interCluster = false) {
      if (sourceId === targetId || edgeExists(sourceId, targetId)) return false;

      const points = [
        nodes[sourceId].mesh.position.clone(),
        nodes[targetId].mesh.position.clone()
      ];

      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({ color });
      const line = new THREE.Line(geometry, material);
      scene.add(line);

      edges.push({
        source: sourceId,
        target: targetId,
        color,
        interCluster,
        line
      });

      return true;
    }

    for (let c = 0; c < 3; c++) {
      const ids = clusterNodeIds[c];
      for (const id of ids) {
        const desiredConnections = Math.floor(randRange(2, 4)); // 2 or 3
        let attempts = 0;
        let made = 0;
        while (made < desiredConnections && attempts < 30) {
          const target = ids[Math.floor(Math.random() * ids.length)];
          attempts++;
          if (target !== id && createEdge(id, target, 0x666666, false)) {
            made++;
          }
        }
      }
    }

    let interAdded = 0;
    let interAttempts = 0;
    while (interAdded < 3 && interAttempts < 100) {
      interAttempts++;
      const c1 = Math.floor(Math.random() * 3);
      let c2 = Math.floor(Math.random() * 3);
      while (c2 === c1) c2 = Math.floor(Math.random() * 3);

      const n1 = clusterNodeIds[c1][Math.floor(Math.random() * clusterNodeIds[c1].length)];
      const n2 = clusterNodeIds[c2][Math.floor(Math.random() * clusterNodeIds[c2].length)];

      if (createEdge(n1, n2, 0xff8800, true)) {
        interAdded++;
      }
    }

    function updateEdgeGeometry(edge) {
      const sourcePos = nodes[edge.source].mesh.position;
      const targetPos = nodes[edge.target].mesh.position;
      const positions = edge.line.geometry.attributes.position.array;
      positions[0] = sourcePos.x;
      positions[1] = sourcePos.y;
      positions[2] = sourcePos.z;
      positions[3] = targetPos.x;
      positions[4] = targetPos.y;
      positions[5] = targetPos.z;
      edge.line.geometry.attributes.position.needsUpdate = true;
      edge.line.geometry.computeBoundingSphere();
    }

    function updateAllEdges() {
      let totalLength = 0;
      for (const edge of edges) {
        updateEdgeGeometry(edge);
        const a = nodes[edge.source].mesh.position;
        const b = nodes[edge.target].mesh.position;
        totalLength += a.distanceTo(b);
      }
      averageEdgeLength = edges.length ? totalLength / edges.length : 0;
    }

    function clearSelection() {
      if (selectedNode) {
        selectedNode.mesh.scale.set(1, 1, 1);
        selectedNode.mesh.material.emissiveIntensity = 0.3;
      }
      selectedNode = null;
      selectedNodeId = null;
    }

    function selectNode(node) {
      clearSelection();
      selectedNode = node;
      selectedNodeId = node.id;
      node.mesh.scale.set(1.8, 1.8, 1.8);
      node.mesh.material.emissiveIntensity = 0.8;
    }

    function setClusterVisibility(clusterIndex, visible) {
      clusterVisibility[clusterIndex] = visible;

      for (const id of clusterNodeIds[clusterIndex]) {
        nodes[id].mesh.visible = visible;
        nodes[id].label.visible = visible && labelsVisible;
      }

      for (const edge of edges) {
        const sCluster = nodes[edge.source].cluster;
        const tCluster = nodes[edge.target].cluster;
        if (sCluster === clusterIndex || tCluster === clusterIndex) {
          edge.line.visible = clusterVisibility[sCluster] && clusterVisibility[tCluster];
        }
      }

      if (selectedNode && !clusterVisibility[selectedNode.cluster]) {
        clearSelection();
      }
    }

    function resetSimulation() {
      clearSelection();
      for (const node of nodes) {
        node.mesh.position.copy(node.initialPosition);
        node.velocity.set(0, 0, 0);
        node.mesh.scale.set(1, 1, 1);
        node.mesh.material.emissiveIntensity = 0.3;
      }
      simulationStep = 0;
      simulationRunning = true;
      resetCount++;
      updateAllEdges();
      updateHUD();
      updateState();
    }

    function updateHUD() {
      const visibleClusters = clusterVisibility
        .map((v, i) => v ? i : null)
        .filter(v => v !== null);

      const selectedText = selectedNode
        ? `N${selectedNode.id} (Cluster ${selectedNode.cluster})`
        : 'None';

      hud.innerHTML = `
        <div>Nodes: 24 | Edges: ${edges.length}</div>
        <div>Simulation: ${simulationRunning ? 'Running' : 'Paused'} | Step: ${simulationStep}</div>
        <div>Selected: ${selectedText}</div>
        <div>Visible Clusters: [${visibleClusters.join(',')}]</div>
      `;
    }

    function updateState() {
      window.__3D_STATE__ = {
        nodeCount: 24,
        edgeCount: edges.length,
        clusterCount: 3,
        simulationRunning,
        simulationStep,
        selectedNodeId,
        selectedCluster: selectedNode ? selectedNode.cluster : null,
        visibleClusters: clusterVisibility.map((v, i) => v ? i : null).filter(v => v !== null),
        labelsVisible,
        nodePositions: nodes.map(n => vecObj(n.mesh.position)),
        clusterCenters: clusterCenters.map(c => vecObj(c)),
        averageEdgeLength,
        resetCount
      };
    }

    function simulate() {
      const forces = nodes.map(() => new THREE.Vector3());

      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const pi = nodes[i].mesh.position;
          const pj = nodes[j].mesh.position;
          const dir = new THREE.Vector3().subVectors(pi, pj);
          let distSq = dir.lengthSq();
          if (distSq < 0.01) distSq = 0.01;
          const dist = Math.sqrt(distSq);
          dir.normalize();

          let forceMag = 200 / distSq;
          forceMag = Math.min(forceMag, 2.0);

          const force = dir.multiplyScalar(forceMag);
          forces[i].add(force);
          forces[j].sub(force);
        }
      }

      for (const edge of edges) {
        const a = nodes[edge.source];
        const b = nodes[edge.target];
        const dir = new THREE.Vector3().subVectors(b.mesh.position, a.mesh.position);
        const dist = dir.length();
        if (dist > 0.0001) {
          dir.normalize();
          let forceMag = dist * 0.01;
          forceMag = Math.min(forceMag, 1.0);
          const force = dir.multiplyScalar(forceMag);
          forces[a.id].add(force);
          forces[b.id].sub(force);
        }
      }

      for (const node of nodes) {
        const center = clusterCenters[node.cluster];
        const gravity = new THREE.Vector3().subVectors(center, node.mesh.position).multiplyScalar(0.02);
        forces[node.id].add(gravity);
      }

      for (const node of nodes) {
        node.velocity.add(forces[node.id]);
        node.velocity.multiplyScalar(0.95);
        node.mesh.position.add(node.velocity);
      }

      simulationStep++;
      if (simulationStep >= 200) {
        simulationRunning = false;
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      if (simulationRunning) {
        simulate();
      }

      updateAllEdges();
      controls.update();
      updateHUD();
      updateState();

      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    renderer.domElement.addEventListener('click', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const visibleNodeMeshes = nodes.filter(n => n.mesh.visible).map(n => n.mesh);
      const intersects = raycaster.intersectObjects(visibleNodeMeshes);

      if (intersects.length > 0) {
        const mesh = intersects[0].object;
        const node = nodes.find(n => n.mesh === mesh);
        if (node) selectNode(node);
      } else {
        clearSelection();
      }

      updateHUD();
      updateState();
    });

    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();

      if (event.code === 'Space') {
        event.preventDefault();
        simulationRunning = !simulationRunning;
      } else if (key === '1') {
        setClusterVisibility(0, !clusterVisibility[0]);
      } else if (key === '2') {
        setClusterVisibility(1, !clusterVisibility[1]);
      } else if (key === '3') {
        setClusterVisibility(2, !clusterVisibility[2]);
      } else if (key === 'r') {
        resetSimulation();
      }

      updateHUD();
      updateState();
    });

    toggleLabelsBtn.addEventListener('click', () => {
      labelsVisible = !labelsVisible;
      for (const node of nodes) {
        node.label.visible = labelsVisible && clusterVisibility[node.cluster];
      }
      updateState();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateAllEdges();
    updateHUD();
    updateState();
    animate();
  </script>
</body>
</html>
