<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Social Network Cluster Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: monospace;
            color: #ffffff;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #css2d-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(10, 10, 26, 0.8);
            padding: 15px;
            border: 1px solid #404060;
            border-radius: 5px;
            pointer-events: none;
            z-index: 10;
            line-height: 1.5;
        }
        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
        }
        button {
            background: #404060;
            color: white;
            border: 1px solid #ffffff;
            padding: 8px 12px;
            cursor: pointer;
            font-family: monospace;
            border-radius: 3px;
        }
        button:hover {
            background: #606080;
        }
        .node-label {
            color: #ffffff;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 4px;
            border-radius: 3px;
            pointer-events: none;
            margin-top: -15px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="css2d-container"></div>
    <div id="hud"></div>
    <div id="controls">
        <button id="toggleLabelsBtn">Toggle Labels</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            nodeCount: 24,
            edgeCount: 0,
            clusterCount: 3,
            simulationRunning: true,
            simulationStep: 0,
            selectedNodeId: null,
            selectedCluster: null,
            visibleClusters: [0, 1, 2],
            labelsVisible: true,
            nodePositions: [],
            clusterCenters: [
                { x: -20, y: 0, z: 0 },
                { x: 20, y: 10, z: 0 },
                { x: 0, y: -15, z: 10 }
            ],
            averageEdgeLength: 0,
            resetCount: 0
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 80);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('css2d-container').appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.0);
        pointLight.position.set(50, 50, 50);
        scene.add(pointLight);

        // --- Network Data Generation ---
        const clustersInfo = [
            { id: 0, color: 0xff4444, center: new THREE.Vector3(-20, 0, 0) },
            { id: 1, color: 0x44ff44, center: new THREE.Vector3(20, 10, 0) },
            { id: 2, color: 0x4444ff, center: new THREE.Vector3(0, -15, 10) }
        ];

        const nodes = [];
        const edges = [];
        const nodeGeometry = new THREE.SphereGeometry(1, 16, 16);
        let nodeIdCounter = 0;

        // Generate Nodes
        clustersInfo.forEach(cluster => {
            const material = new THREE.MeshPhongMaterial({
                color: cluster.color,
                emissive: cluster.color,
                emissiveIntensity: 0.3
            });

            for (let i = 0; i < 8; i++) {
                const mesh = new THREE.Mesh(nodeGeometry, material);
                
                // Random offset ±5
                const offsetX = (Math.random() - 0.5) * 10;
                const offsetY = (Math.random() - 0.5) * 10;
                const offsetZ = (Math.random() - 0.5) * 10;
                
                const initialPos = new THREE.Vector3(
                    cluster.center.x + offsetX,
                    cluster.center.y + offsetY,
                    cluster.center.z + offsetZ
                );
                
                mesh.position.copy(initialPos);
                mesh.userData = { id: nodeIdCounter, cluster: cluster.id };
                scene.add(mesh);

                // Label
                const div = document.createElement('div');
                div.className = 'node-label';
                div.textContent = `N${nodeIdCounter}`;
                const label = new CSS2DObject(div);
                label.position.set(0, 0, 0);
                mesh.add(label);

                nodes.push({
                    id: nodeIdCounter,
                    cluster: cluster.id,
                    mesh: mesh,
                    label: label,
                    initialPos: initialPos.clone(),
                    velocity: new THREE.Vector3(0, 0, 0)
                });
                nodeIdCounter++;
            }
        });

        // Generate Edges
        const edgeSet = new Set();
        const getEdgeKey = (a, b) => a < b ? `${a}-${b}` : `${b}-${a}`;

        const intraMaterial = new THREE.LineBasicMaterial({ color: 0x666666 });
        const interMaterial = new THREE.LineBasicMaterial({ color: 0xff8800 });

        // Intra-cluster edges (2-3 per node)
        for (let c = 0; c < 3; c++) {
            const clusterNodes = nodes.filter(n => n.cluster === c);
            clusterNodes.forEach(node => {
                const targetEdges = Math.floor(Math.random() * 2) + 2;
                let currentEdges = 0;
                let attempts = 0;
                while (currentEdges < targetEdges && attempts < 20) {
                    const targetNode = clusterNodes[Math.floor(Math.random() * clusterNodes.length)];
                    if (targetNode.id !== node.id) {
                        const key = getEdgeKey(node.id, targetNode.id);
                        if (!edgeSet.has(key)) {
                            edgeSet.add(key);
                            edges.push({ source: node.id, target: targetNode.id, type: 'intra' });
                            currentEdges++;
                        }
                    }
                    attempts++;
                }
            });
        }

        // Inter-cluster edges (exactly 3)
        let interEdgesAdded = 0;
        while (interEdgesAdded < 3) {
            const n1 = nodes[Math.floor(Math.random() * nodes.length)];
            const n2 = nodes[Math.floor(Math.random() * nodes.length)];
            if (n1.cluster !== n2.cluster) {
                const key = getEdgeKey(n1.id, n2.id);
                if (!edgeSet.has(key)) {
                    edgeSet.add(key);
                    edges.push({ source: n1.id, target: n2.id, type: 'inter' });
                    interEdgesAdded++;
                }
            }
        }

        state.edgeCount = edges.length;

        // Create Line meshes
        edges.forEach(edge => {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(6);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = edge.type === 'intra' ? intraMaterial : interMaterial;
            const line = new THREE.Line(geometry, material);
            scene.add(line);
            edge.line = line;
        });

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (event.target.tagName === 'BUTTON') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodes.map(n => n.mesh));

            // Reset previous selection
            if (state.selectedNodeId !== null) {
                const prevNode = nodes[state.selectedNodeId];
                prevNode.mesh.scale.set(1, 1, 1);
                prevNode.mesh.material.emissiveIntensity = 0.3;
            }

            if (intersects.length > 0) {
                const selectedMesh = intersects[0].object;
                selectedMesh.scale.set(1.8, 1.8, 1.8);
                selectedMesh.material.emissiveIntensity = 0.8;
                
                state.selectedNodeId = selectedMesh.userData.id;
                state.selectedCluster = selectedMesh.userData.cluster;
            } else {
                state.selectedNodeId = null;
                state.selectedCluster = null;
            }
            updateHUD();
        });

        window.addEventListener('keydown', (event) => {
            if (event.code === 'Space') {
                state.simulationRunning = !state.simulationRunning;
                updateHUD();
            } else if (['Digit1', 'Digit2', 'Digit3'].includes(event.code)) {
                const clusterIdx = parseInt(event.key) - 1;
                const index = state.visibleClusters.indexOf(clusterIdx);
                if (index > -1) {
                    state.visibleClusters.splice(index, 1);
                } else {
                    state.visibleClusters.push(clusterIdx);
                    state.visibleClusters.sort();
                }
                updateVisibility();
                updateHUD();
            } else if (event.code === 'KeyR') {
                resetSimulation();
            }
        });

        document.getElementById('toggleLabelsBtn').addEventListener('click', () => {
            state.labelsVisible = !state.labelsVisible;
            nodes.forEach(n => {
                n.label.visible = state.labelsVisible && state.visibleClusters.includes(n.cluster);
            });
            updateHUD();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        function updateVisibility() {
            nodes.forEach(n => {
                const isVisible = state.visibleClusters.includes(n.cluster);
                n.mesh.visible = isVisible;
                n.label.visible = isVisible && state.labelsVisible;
            });

            edges.forEach(edge => {
                const sourceVisible = state.visibleClusters.includes(nodes[edge.source].cluster);
                const targetVisible = state.visibleClusters.includes(nodes[edge.target].cluster);
                edge.line.visible = sourceVisible && targetVisible;
            });
        }

        function resetSimulation() {
            nodes.forEach(n => {
                n.mesh.position.copy(n.initialPos);
                n.velocity.set(0, 0, 0);
            });
            state.simulationStep = 0;
            state.simulationRunning = true;
            state.resetCount++;
            updateHUD();
        }

        function updateHUD() {
            const hud = document.getElementById('hud');
            const selectedText = state.selectedNodeId !== null 
                ? `N${state.selectedNodeId} (Cluster ${state.selectedCluster})` 
                : 'None';
            
            hud.innerHTML = `
                <div>Nodes: ${state.nodeCount} | Edges: ${state.edgeCount}</div>
                <div>Simulation: ${state.simulationRunning ? 'Running' : 'Paused'} | Step: ${state.simulationStep}</div>
                <div>Selected: ${selectedText}</div>
                <div>Visible Clusters: [${state.visibleClusters.join(',')}]</div>
                <div style="margin-top:10px; font-size:0.8em; color:#aaa;">
                    [Space] Toggle Sim | [1,2,3] Toggle Clusters | [R] Reset
                </div>
            `;
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (state.simulationRunning && state.simulationStep < 200) {
                // Force-Directed Layout
                
                // 1. Repulsion
                for (let i = 0; i < nodes.length; i++) {
                    for (let j = i + 1; j < nodes.length; j++) {
                        const n1 = nodes[i];
                        const n2 = nodes[j];
                        const dx = n1.mesh.position.x - n2.mesh.position.x;
                        const dy = n1.mesh.position.y - n2.mesh.position.y;
                        const dz = n1.mesh.position.z - n2.mesh.position.z;
                        let distSq = dx*dx + dy*dy + dz*dz;
                        if (distSq === 0) distSq = 0.01;
                        
                        let force = 200 / distSq;
                        if (force > 2.0) force = 2.0;
                        
                        const dist = Math.sqrt(distSq);
                        const fx = (dx / dist) * force;
                        const fy = (dy / dist) * force;
                        const fz = (dz / dist) * force;

                        n1.velocity.x += fx; n1.velocity.y += fy; n1.velocity.z += fz;
                        n2.velocity.x -= fx; n2.velocity.y -= fy; n2.velocity.z -= fz;
                    }
                }

                // 2. Attraction (Edges)
                edges.forEach(edge => {
                    const n1 = nodes[edge.source];
                    const n2 = nodes[edge.target];
                    const dx = n2.mesh.position.x - n1.mesh.position.x;
                    const dy = n2.mesh.position.y - n1.mesh.position.y;
                    const dz = n2.mesh.position.z - n1.mesh.position.z;
                    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                    
                    let force = dist * 0.01;
                    if (force > 1.0) force = 1.0;

                    if (dist > 0) {
                        const fx = (dx / dist) * force;
                        const fy = (dy / dist) * force;
                        const fz = (dz / dist) * force;

                        n1.velocity.x += fx; n1.velocity.y += fy; n1.velocity.z += fz;
                        n2.velocity.x -= fx; n2.velocity.y -= fy; n2.velocity.z -= fz;
                    }
                });

                // 3. Cluster Gravity
                nodes.forEach(n => {
                    const center = clustersInfo[n.cluster].center;
                    const dx = center.x - n.mesh.position.x;
                    const dy = center.y - n.mesh.position.y;
                    const dz = center.z - n.mesh.position.z;
                    
                    n.velocity.x += dx * 0.02;
                    n.velocity.y += dy * 0.02;
                    n.velocity.z += dz * 0.02;
                });

                // 4. Update Positions & Damping
                nodes.forEach(n => {
                    n.mesh.position.add(n.velocity);
                    n.velocity.multiplyScalar(0.95);
                });

                state.simulationStep++;
                if (state.simulationStep >= 200) {
                    state.simulationRunning = false;
                }
                
                if (state.simulationStep % 10 === 0 || !state.simulationRunning) {
                    updateHUD();
                }
            }

            // Update Edge Geometries and State
            let totalEdgeLength = 0;
            state.nodePositions = [];

            nodes.forEach(n => {
                state.nodePositions.push({ x: n.mesh.position.x, y: n.mesh.position.y, z: n.mesh.position.z });
            });

            edges.forEach(edge => {
                const p1 = nodes[edge.source].mesh.position;
                const p2 = nodes[edge.target].mesh.position;
                
                const positions = edge.line.geometry.attributes.position.array;
                positions[0] = p1.x; positions[1] = p1.y; positions[2] = p1.z;
                positions[3] = p2.x; positions[4] = p2.y; positions[5] = p2.z;
                edge.line.geometry.attributes.position.needsUpdate = true;

                totalEdgeLength += p1.distanceTo(p2);
            });

            if (edges.length > 0) {
                state.averageEdgeLength = totalEdgeLength / edges.length;
            }

            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        // Init
        updateVisibility();
        updateHUD();
        animate();

    </script>
</body>
</html>
