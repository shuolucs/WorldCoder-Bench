<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D DNA Double Helix Unzipping Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 10px;
    padding: 15px 20px;
    color: #e0e0ff;
    font-size: 14px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    min-width: 250px;
    z-index: 10;
}
#hud h3 {
    color: #8888ff;
    margin-bottom: 8px;
    font-size: 16px;
    border-bottom: 1px solid rgba(100, 100, 255, 0.3);
    padding-bottom: 5px;
}
#hud .label { color: #aaaadd; }
#hud .value { color: #ffffff; font-weight: bold; }

#controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    align-items: center;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 12px;
    padding: 12px 20px;
    backdrop-filter: blur(10px);
    z-index: 10;
    flex-wrap: wrap;
    justify-content: center;
}

#controls button {
    padding: 8px 18px;
    border: 1px solid rgba(100, 100, 255, 0.4);
    border-radius: 6px;
    background: rgba(50, 50, 120, 0.6);
    color: #e0e0ff;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
}
#controls button:hover {
    background: rgba(80, 80, 180, 0.8);
    border-color: rgba(150, 150, 255, 0.6);
}
#controls button.active-player {
    border: 2px solid #ffcc00;
    background: rgba(100, 100, 50, 0.6);
    box-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
}

#controls .slider-container {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #e0e0ff;
    font-size: 13px;
}
#speedSlider {
    width: 100px;
    accent-color: #8888ff;
}
#speedValue {
    color: #ffcc00;
    font-weight: bold;
    min-width: 30px;
}

.separator {
    width: 1px;
    height: 30px;
    background: rgba(100, 100, 255, 0.3);
}
</style>
</head>
<body>

<div id="hud">
    <h3>🧬 DNA Unzipping Lab</h3>
    <div><span class="label">Active Player: </span><span class="value" id="hudPlayer">Player 1</span></div>
    <div><span class="label">Helicase Y: </span><span class="value" id="hudHelicaseY">-10.00</span></div>
    <div><span class="label">Base Pairs Unzipped: </span><span class="value" id="hudUnzipped">0 / 20</span></div>
    <div><span class="label">P1 Labels: </span><span class="value" id="hudP1Labels">0</span></div>
    <div><span class="label">P2 Labels: </span><span class="value" id="hudP2Labels">0</span></div>
</div>

<div id="controls">
    <button id="startUnzipBtn">▶ Start Unzip</button>
    <button id="pauseBtn">⏸ Pause</button>
    <button id="resetBtn">↺ Reset</button>
    <div class="separator"></div>
    <div class="slider-container">
        <label for="speedSlider">Speed:</label>
        <input type="range" id="speedSlider" min="0.5" max="5.0" step="0.5" value="2.0">
        <span id="speedValue">2.0</span>
    </div>
    <div class="separator"></div>
    <button id="player1Btn" class="active-player">👤 Player 1</button>
    <button id="player2Btn">👤 Player 2</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    helicaseY: -10.00,
    basePairsUnzipped: 0,
    isUnzipping: false,
    isPaused: false,
    speed: 2.0,
    activePlayer: 1,
    player1Labels: 0,
    player2Labels: 0,
    strandASeparated: 0,
    strandBSeparated: 0,
    helicaseVisible: true,
    totalBasePairs: 20,
    modelLoaded: false,
    sceneReady: false,
    resetCount: 0
};

const state = window.__3D_STATE__;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(10, 15, 10);
scene.add(directionalLight);

// Add subtle fog for depth
scene.fog = new THREE.FogExp2(0x0a0a2e, 0.01);

// DNA Parameters
const totalBasePairs = 20;
const helixRadius = 2.0;
const yMin = -10;
const yMax = 10;
const yStep = (yMax - yMin) / (totalBasePairs - 1);
const twistPerPair = (36 * Math.PI) / 180; // 36 degrees in radians

// Data structures
let basePairs = [];
let helicase;
let helicaseGlow;

// Raycaster for clicking
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function createTextSprite(text, color) {
    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = color;
    ctx.font = 'bold 40px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 32, 32);
    const texture = new THREE.CanvasTexture(canvas);
    const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(material);
    sprite.scale.set(0.8, 0.8, 0.8);
    return sprite;
}

function buildDNA() {
    // Clear existing
    basePairs.forEach(bp => {
        scene.remove(bp.sphereA);
        scene.remove(bp.sphereB);
        scene.remove(bp.bridge);
        if (bp.labelA) scene.remove(bp.labelA);
        if (bp.labelB) scene.remove(bp.labelB);
    });
    basePairs = [];

    for (let i = 0; i < totalBasePairs; i++) {
        const y = yMin + i * yStep;
        const angle = i * twistPerPair;

        const xA = helixRadius * Math.cos(angle);
        const zA = helixRadius * Math.sin(angle);
        const xB = helixRadius * Math.cos(angle + Math.PI);
        const zB = helixRadius * Math.sin(angle + Math.PI);

        // Determine base pair type: alternating A-T and G-C
        const isAT = i % 2 === 0;
        const bridgeColor = isAT ? 0x4CAF50 : 0xFFEB3B;
        const baseLabel = isAT ? ['A', 'T'] : ['G', 'C'];

        // Backbone spheres
        const geomSphere = new THREE.SphereGeometry(0.3, 16, 16);
        const matA = new THREE.MeshPhongMaterial({ color: 0x2196F3, emissive: 0x0a47a1, emissiveIntensity: 0.2 });
        const matB = new THREE.MeshPhongMaterial({ color: 0xF44336, emissive: 0x7f0000, emissiveIntensity: 0.2 });

        const sphereA = new THREE.Mesh(geomSphere, matA);
        sphereA.position.set(xA, y, zA);
        scene.add(sphereA);

        const sphereB = new THREE.Mesh(geomSphere, matB);
        sphereB.position.set(xB, y, zB);
        scene.add(sphereB);

        // Bridge (cylinder between the two spheres)
        const dist = Math.sqrt((xB - xA) ** 2 + (zB - zA) ** 2);
        const bridgeGeom = new THREE.CylinderGeometry(0.08, 0.08, dist, 8);
        const bridgeMat = new THREE.MeshPhongMaterial({
            color: bridgeColor,
            emissive: bridgeColor,
            emissiveIntensity: 0.15,
            transparent: true,
            opacity: 1.0
        });
        const bridge = new THREE.Mesh(bridgeGeom, bridgeMat);

        // Position bridge at midpoint
        const midX = (xA + xB) / 2;
        const midZ = (zA + zB) / 2;
        bridge.position.set(midX, y, midZ);

        // Rotate bridge to connect the two spheres
        const dir = new THREE.Vector3(xB - xA, 0, zB - zA).normalize();
        const up = new THREE.Vector3(0, 1, 0);
        const quat = new THREE.Quaternion().setFromUnitVectors(up, dir);
        bridge.quaternion.copy(quat);

        scene.add(bridge);

        // Store base pair data
        basePairs.push({
            index: i,
            y: y,
            origA: new THREE.Vector3(xA, y, zA),
            origB: new THREE.Vector3(xB, y, zB),
            targetA: new THREE.Vector3(xA - 3, y, zA),
            targetB: new THREE.Vector3(xB + 3, y, zB),
            sphereA: sphereA,
            sphereB: sphereB,
            bridge: bridge,
            isAT: isAT,
            baseLabel: baseLabel,
            unzipped: false,
            separating: false,
            separateProgress: 0,
            bridgeDissolving: false,
            bridgeProgress: 0,
            separated: false,
            labelA: null,
            labelB: null,
            hasLabelA: false,
            hasLabelB: false
        });

        // Tag spheres for raycasting
        sphereA.userData = { bpIndex: i, strand: 'A' };
        sphereB.userData = { bpIndex: i, strand: 'B' };
    }

    // Add backbone connections (tubes along the helix)
    addBackboneConnections();
}

let backboneLines = [];

function addBackboneConnections() {
    backboneLines.forEach(l => scene.remove(l));
    backboneLines = [];

    // Strand A backbone
    const pointsA = [];
    const pointsB = [];
    for (let i = 0; i < totalBasePairs; i++) {
        pointsA.push(basePairs[i].origA.clone());
        pointsB.push(basePairs[i].origB.clone());
    }

    const curveA = new THREE.CatmullRomCurve3(pointsA);
    const curveB = new THREE.CatmullRomCurve3(pointsB);

    const tubeGeomA = new THREE.TubeGeometry(curveA, 100, 0.1, 8, false);
    const tubeMatA = new THREE.MeshPhongMaterial({ color: 0x2196F3, emissive: 0x0a47a1, emissiveIntensity: 0.1, transparent: true, opacity: 0.6 });
    const tubeA = new THREE.Mesh(tubeGeomA, tubeMatA);
    scene.add(tubeA);
    backboneLines.push(tubeA);

    const tubeGeomB = new THREE.TubeGeometry(curveB, 100, 0.1, 8, false);
    const tubeMatB = new THREE.MeshPhongMaterial({ color: 0xF44336, emissive: 0x7f0000, emissiveIntensity: 0.1, transparent: true, opacity: 0.6 });
    const tubeB = new THREE.Mesh(tubeGeomB, tubeMatB);
    scene.add(tubeB);
    backboneLines.push(tubeB);
}

function createHelicase() {
    if (helicase) {
        scene.remove(helicase);
        scene.remove(helicaseGlow);
    }

    const torusGeom = new THREE.TorusGeometry(1.5, 0.4, 16, 48);
    const torusMat = new THREE.MeshPhongMaterial({
        color: 0xFF9800,
        emissive: 0xFF9800,
        emissiveIntensity: 0.5,
        transparent: true,
        opacity: 0.9
    });
    helicase = new THREE.Mesh(torusGeom, torusMat);
    helicase.position.set(0, yMin, 0);
    helicase.rotation.x = Math.PI / 2;
    scene.add(helicase);

    // Glow effect
    const glowGeom = new THREE.TorusGeometry(1.5, 0.6, 16, 48);
    const glowMat = new THREE.MeshBasicMaterial({
        color: 0xFF9800,
        transparent: true,
        opacity: 0.15
    });
    helicaseGlow = new THREE.Mesh(glowGeom, glowMat);
    helicaseGlow.position.copy(helicase.position);
    helicaseGlow.rotation.x = Math.PI / 2;
    scene.add(helicaseGlow);

    state.helicaseVisible = true;
}

// Add some particles for atmosphere
function createParticles() {
    const particleCount = 500;
    const geom = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 40;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 30;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 40;
    }
    geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({ color: 0x4444aa, size: 0.05, transparent: true, opacity: 0.5 });
    const particles = new THREE.Points(geom, mat);
    scene.add(particles);
    return particles;
}

const particles = createParticles();

// Load facecap.glb model
const loader = new GLTFLoader();
loader.load(
    'https://threejs.org/examples/models/gltf/facecap.glb',
    (gltf) => {
        const model = gltf.scene;
        model.position.set(-8, 0, 0);
        model.scale.set(2.0, 2.0, 2.0);
        scene.add(model);
        state.modelLoaded = true;
        console.log('facecap.glb loaded successfully');
    },
    (progress) => {
        // Loading progress
    },
    (error) => {
        console.warn('Could not load facecap.glb:', error);
        // Create a placeholder scientist avatar
        const headGeom = new THREE.SphereGeometry(0.8, 16, 16);
        const headMat = new THREE.MeshPhongMaterial({ color: 0xffcc99 });
        const head = new THREE.Mesh(headGeom, headMat);
        head.position.set(-8, 1.5, 0);

        const bodyGeom = new THREE.CylinderGeometry(0.5, 0.7, 2, 16);
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
        const body = new THREE.Mesh(bodyGeom, bodyMat);
        body.position.set(-8, -0.2, 0);

        const group = new THREE.Group();
        group.add(head);
        group.add(body);
        group.scale.set(2.0, 2.0, 2.0);
        scene.add(group);
        state.modelLoaded = true;
    }
);

// Initialize
buildDNA();
createHelicase();
state.sceneReady = true;

// Animation state
let clock = new THREE.Clock();
let animatingPairs = [];

function startUnzip() {
    if (!state.isUnzipping) {
        state.isUnzipping = true;
        state.isPaused = false;
        document.getElementById('startUnzipBtn').textContent = '▶ Unzipping...';
        document.getElementById('pauseBtn').textContent = '⏸ Pause';
    } else if (state.isPaused) {
        state.isPaused = false;
        document.getElementById('pauseBtn').textContent = '⏸ Pause';
    }
}

function togglePause() {
    if (state.isUnzipping) {
        state.isPaused = !state.isPaused;
        document.getElementById('pauseBtn').textContent = state.isPaused ? '▶ Resume' : '⏸ Pause';
    }
}

function resetAll() {
    state.resetCount++;
    state.isUnzipping = false;
    state.isPaused = false;
    state.helicaseY = -10.00;
    state.basePairsUnzipped = 0;
    state.player1Labels = 0;
    state.player2Labels = 0;
    state.strandASeparated = 0;
    state.strandBSeparated = 0;
    animatingPairs = [];

    document.getElementById('startUnzipBtn').textContent = '▶ Start Unzip';
    document.getElementById('pauseBtn').textContent = '⏸ Pause';

    // Rebuild DNA
    buildDNA();
    createHelicase();
    updateHUD();
}

function setActivePlayer(p) {
    state.activePlayer = p;
    document.getElementById('player1Btn').classList.toggle('active-player', p === 1);
    document.getElementById('player2Btn').classList.toggle('active-player', p === 2);
    updateHUD();
}

// UI Event Listeners
document.getElementById('startUnzipBtn').addEventListener('click', startUnzip);
document.getElementById('pauseBtn').addEventListener('click', togglePause);
document.getElementById('resetBtn').addEventListener('click', resetAll);
document.getElementById('player1Btn').addEventListener('click', () => setActivePlayer(1));
document.getElementById('player2Btn').addEventListener('click', () => setActivePlayer(2));

document.getElementById('speedSlider').addEventListener('input', (e) => {
    state.speed = parseFloat(e.target.value);
    document.getElementById('speedValue').textContent = state.speed.toFixed(1);
});

// Keyboard controls
document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (key === 'u') startUnzip();
    else if (key === 'p') togglePause();
    else if (key === 'r') resetAll();
    else if (key === '1') setActivePlayer(1);
    else if (key === '2') setActivePlayer(2);
});

// Click handling for labeling
renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    // Collect all clickable spheres
    const clickable = [];
    basePairs.forEach(bp => {
        if (bp.separated) {
            clickable.push(bp.sphereA);
            clickable.push(bp.sphereB);
        }
    });

    const intersects = raycaster.intersectObjects(clickable);
    if (intersects.length > 0) {
        const obj = intersects[0].object;
        const { bpIndex, strand } = obj.userData;
        const bp = basePairs[bpIndex];

        if (strand === 'A' && state.activePlayer === 1 && !bp.hasLabelA) {
            // Place label on strand A
            const label = createTextSprite(bp.baseLabel[0], '#2196F3');
            label.position.copy(bp.sphereA.position);
            label.position.y += 0.6;
            scene.add(label);
            bp.labelA = label;
            bp.hasLabelA = true;
            state.player1Labels++;
            updateHUD();
        } else if (strand === 'A' && state.activePlayer === 1 && bp.hasLabelA) {
            // Toggle off
            scene.remove(bp.labelA);
            bp.labelA = null;
            bp.hasLabelA = false;
            state.player1Labels--;
            updateHUD();
        } else if (strand === 'B' && state.activePlayer === 2 && !bp.hasLabelB) {
            const label = createTextSprite(bp.baseLabel[1], '#F44336');
            label.position.copy(bp.sphereB.position);
            label.position.y += 0.6;
            scene.add(label);
            bp.labelB = label;
            bp.hasLabelB = true;
            state.player2Labels++;
            updateHUD();
        } else if (strand === 'B' && state.activePlayer === 2 && bp.hasLabelB) {
            scene.remove(bp.labelB);
            bp.labelB = null;
            bp.hasLabelB = false;
            state.player2Labels--;
            updateHUD();
        }
    }
});

function updateHUD() {
    document.getElementById('hudPlayer').textContent = `Player ${state.activePlayer}`;
    document.getElementById('hudHelicaseY').textContent = state.helicaseY.toFixed(2);
    document.getElementById('hudUnzipped').textContent = `${state.basePairsUnzipped} / ${state.totalBasePairs}`;
    document.getElementById('hudP1Labels').textContent = state.player1Labels;
    document.getElementById('hudP2Labels').textContent = state.player2Labels;
}

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    controls.update();

    // Rotate particles slowly
    particles.rotation.y += delta * 0.02;

    // Helicase glow pulsation
    if (helicaseGlow) {
        const pulse = 0.1 + 0.08 * Math.sin(Date.now() * 0.003);
        helicaseGlow.material.opacity = pulse;
    }

    // Helicase rotation
    if (helicase) {
        helicase.rotation.z += delta * 2;
        if (helicaseGlow) helicaseGlow.rotation.z = helicase.rotation.z;
    }

    // Unzipping logic
    if (state.isUnzipping && !state.isPaused) {
        const moveAmount = state.speed * delta;
        state.helicaseY += moveAmount;

        if (state.helicaseY > yMax + 2) {
            state.helicaseY = yMax + 2;
            state.isUnzipping = false;
            document.getElementById('startUnzipBtn').textContent = '✓ Complete';
        }

        state.helicaseY = parseFloat(state.helicaseY.toFixed(2));

        // Move helicase
        if (helicase) {
            helicase.position.y = state.helicaseY;
            helicaseGlow.position.y = state.helicaseY;
        }

        // Check which base pairs to unzip
        basePairs.forEach(bp => {
            if (!bp.unzipped && state.helicaseY >= bp.y) {
                bp.unzipped = true;
                bp.separating = true;
                bp.bridgeDissolving = true;
                bp.separateProgress = 0;
                bp.bridgeProgress = 0;
                state.basePairsUnzipped++;
            }
        });
    }

    // Animate separating pairs
    basePairs.forEach(bp => {
        if (bp.bridgeDissolving) {
            bp.bridgeProgress += delta * 2; // dissolve over 0.5s
            if (bp.bridgeProgress >= 1) {
                bp.bridgeProgress = 1;
                bp.bridgeDissolving = false;
                bp.bridge.visible = false;
            }
            bp.bridge.material.opacity = 1 - bp.bridgeProgress;
        }

        if (bp.separating) {
            bp.separateProgress += delta * 2; // separate over 0.5s
            if (bp.separateProgress >= 1) {
                bp.separateProgress = 1;
                bp.separating = false;
                bp.separated = true;

                // Count separated
                let sepA = 0, sepB = 0;
                basePairs.forEach(b => {
                    if (b.separated) { sepA++; sepB++; }
                });
                state.strandASeparated = sepA;
                state.strandBSeparated = sepB;
            }

            const t = bp.separateProgress;
            // Smooth easing
            const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

            bp.sphereA.position.lerpVectors(bp.origA, bp.targetA, ease);
            bp.sphereB.position.lerpVectors(bp.origB, bp.targetB, ease);

            // Update labels if they exist
            if (bp.labelA) {
                bp.labelA.position.copy(bp.sphereA.position);
                bp.labelA.position.y += 0.6;
            }
            if (bp.labelB) {
                bp.labelB.position.copy(bp.sphereB.position);
                bp.labelB.position.y += 0.6;
            }
        }
    });

    updateHUD();
    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
