<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D DNA Double Helix Unzipping Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, sans-serif;
      color: white;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 250px;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    #hud h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }

    #hud .line {
      font-size: 14px;
      margin: 4px 0;
    }

    #controls {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
      max-width: 90vw;
      backdrop-filter: blur(4px);
    }

    button {
      background: #1e1e3f;
      color: white;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #2a2a55;
    }

    button.active-player {
      border-color: #ffffff;
      box-shadow: 0 0 10px rgba(255,255,255,0.4);
    }

    label {
      font-size: 14px;
    }

    input[type="range"] {
      width: 140px;
      vertical-align: middle;
    }

    #hint {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 260px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <h3>DNA Unzipping HUD</h3>
      <div class="line" id="hudPlayer">Current Player: 1</div>
      <div class="line" id="hudHelicase">Helicase Y: -10.00</div>
      <div class="line" id="hudUnzipped">Base Pairs Unzipped: 0 / 20</div>
      <div class="line" id="hudP1">Player 1 Labels: 0</div>
      <div class="line" id="hudP2">Player 2 Labels: 0</div>
    </div>

    <div id="hint">
      <strong>Keyboard:</strong><br>
      U = Start/Resume<br>
      P = Pause/Resume<br>
      R = Reset<br>
      1 = Player 1<br>
      2 = Player 2
    </div>

    <div id="controls">
      <button id="startUnzipBtn">Start Unzip</button>
      <button id="pauseBtn">Pause</button>
      <button id="resetBtn">Reset</button>
      <label>
        Speed
        <input id="speedSlider" type="range" min="0.5" max="5.0" step="0.5" value="2.0" />
        <span id="speedValue">2.0</span>
      </label>
      <button id="player1Btn" class="active-player">Player 1</button>
      <button id="player2Btn">Player 2</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const TOTAL_BASE_PAIRS = 20;
    const HELIX_RADIUS = 2.0;
    const BASE_PAIR_STEP = 20 / (TOTAL_BASE_PAIRS - 1);
    const TWIST_PER_PAIR = THREE.MathUtils.degToRad(36);
    const SEPARATION_DISTANCE = 3.0;
    const ANIM_DURATION = 0.5;

    let scene, camera, renderer, controls, clock;
    let helicase;
    let dnaGroup;
    let scientistAvatar = null;
    let raycaster, mouse;

    const basePairs = [];
    const animations = [];

    let isUnzipping = false;
    let isPaused = false;
    let speed = 2.0;
    let activePlayer = 1;
    let resetCount = 0;
    let modelLoaded = false;
    let sceneReady = false;

    const state = {
      helicaseY: -10.00,
      basePairsUnzipped: 0,
      isUnzipping: false,
      isPaused: false,
      speed: 2.0,
      activePlayer: 1,
      player1Labels: 0,
      player2Labels: 0,
      strandASeparated: 0,
      strandBSeparated: 0,
      helicaseVisible: true,
      totalBasePairs: 20,
      modelLoaded: false,
      sceneReady: false,
      resetCount: 0
    };
    window.__3D_STATE__ = state;

    const hudPlayer = document.getElementById('hudPlayer');
    const hudHelicase = document.getElementById('hudHelicase');
    const hudUnzipped = document.getElementById('hudUnzipped');
    const hudP1 = document.getElementById('hudP1');
    const hudP2 = document.getElementById('hudP2');

    const startUnzipBtn = document.getElementById('startUnzipBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const speedSlider = document.getElementById('speedSlider');
    const speedValue = document.getElementById('speedValue');
    const player1Btn = document.getElementById('player1Btn');
    const player2Btn = document.getElementById('player2Btn');

    init();
    animate();

    function init() {
      const app = document.getElementById('app');

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a2e);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 5, 20);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      app.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 0, 0);

      clock = new THREE.Clock();

      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();

      const ambient = new THREE.AmbientLight(0x404060, 0.5);
      scene.add(ambient);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
      dirLight.position.set(10, 15, 10);
      scene.add(dirLight);

      dnaGroup = new THREE.Group();
      scene.add(dnaGroup);

      createDNA();
      createHelicase();
      loadScientistAvatar();
      setupUI();
      setupEvents();
      updateHUD();
      updateState();

      sceneReady = true;
      state.sceneReady = true;
    }

    function createDNA() {
      const sphereGeo = new THREE.SphereGeometry(0.3, 24, 24);
      const blueMatTemplate = new THREE.MeshStandardMaterial({ color: 0x2196F3 });
      const redMatTemplate = new THREE.MeshStandardMaterial({ color: 0xF44336 });

      for (let i = 0; i < TOTAL_BASE_PAIRS; i++) {
        const y = -10 + i * BASE_PAIR_STEP;
        const angle = i * TWIST_PER_PAIR;

        const xA = Math.cos(angle) * HELIX_RADIUS;
        const zA = Math.sin(angle) * HELIX_RADIUS;
        const xB = Math.cos(angle + Math.PI) * HELIX_RADIUS;
        const zB = Math.sin(angle + Math.PI) * HELIX_RADIUS;

        const strandAMesh = new THREE.Mesh(sphereGeo, blueMatTemplate.clone());
        strandAMesh.position.set(xA, y, zA);
        strandAMesh.userData = { strand: 'A', index: i };
        dnaGroup.add(strandAMesh);

        const strandBMesh = new THREE.Mesh(sphereGeo, redMatTemplate.clone());
        strandBMesh.position.set(xB, y, zB);
        strandBMesh.userData = { strand: 'B', index: i };
        dnaGroup.add(strandBMesh);

        const start = new THREE.Vector3(xA, y, zA);
        const end = new THREE.Vector3(xB, y, zB);
        const bridgeColor = i % 2 === 0 ? 0x4CAF50 : 0xFFEB3B;
        const bridge = createCylinderBetweenPoints(start, end, 0.08, bridgeColor);
        bridge.material.transparent = true;
        dnaGroup.add(bridge);

        const pair = {
          index: i,
          y,
          type: i % 2 === 0 ? 'A-T' : 'G-C',
          strandA: strandAMesh,
          strandB: strandBMesh,
          bridge,
          unzipped: false,
          animating: false,
          progress: 0,
          initialA: new THREE.Vector3(xA, y, zA),
          initialB: new THREE.Vector3(xB, y, zB),
          targetA: new THREE.Vector3(xA - SEPARATION_DISTANCE, y, zA),
          targetB: new THREE.Vector3(xB + SEPARATION_DISTANCE, y, zB),
          labelA: null,
          labelB: null
        };

        basePairs.push(pair);
      }
    }

    function createCylinderBetweenPoints(start, end, radius, color) {
      const direction = new THREE.Vector3().subVectors(end, start);
      const length = direction.length();
      const geometry = new THREE.CylinderGeometry(radius, radius, length, 16);
      const material = new THREE.MeshStandardMaterial({ color });
      const cylinder = new THREE.Mesh(geometry, material);

      const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      cylinder.position.copy(midpoint);

      const up = new THREE.Vector3(0, 1, 0);
      cylinder.quaternion.setFromUnitVectors(up, direction.clone().normalize());

      return cylinder;
    }

    function createHelicase() {
      const geo = new THREE.TorusGeometry(1.5, 0.4, 16, 48);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xFF9800,
        emissive: 0xFF6F00,
        emissiveIntensity: 1.2
      });
      helicase = new THREE.Mesh(geo, mat);
      helicase.rotation.x = Math.PI / 2;
      helicase.position.set(0, -10, 0);
      scene.add(helicase);
    }

    function loadScientistAvatar() {
      const loader = new GLTFLoader();
      loader.load(
        'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/FaceCap/glTF-Binary/FaceCap.glb',
        (gltf) => {
          scientistAvatar = gltf.scene;
          scientistAvatar.position.set(-8, 0, 0);
          scientistAvatar.scale.setScalar(2.0);
          scene.add(scientistAvatar);
          modelLoaded = true;
          state.modelLoaded = true;
        },
        undefined,
        () => {
          modelLoaded = false;
          state.modelLoaded = false;
        }
      );
    }

    function setupUI() {
      startUnzipBtn.addEventListener('click', startUnzip);
      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetSimulation);

      speedSlider.addEventListener('input', () => {
        speed = parseFloat(speedSlider.value);
        speedValue.textContent = speed.toFixed(1);
        updateState();
      });

      player1Btn.addEventListener('click', () => setActivePlayer(1));
      player2Btn.addEventListener('click', () => setActivePlayer(2));
    }

    function setupEvents() {
      window.addEventListener('resize', onWindowResize);

      window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'u') startUnzip();
        if (key === 'p') togglePause();
        if (key === 'r') resetSimulation();
        if (key === '1') setActivePlayer(1);
        if (key === '2') setActivePlayer(2);
      });

      renderer.domElement.addEventListener('pointerdown', onPointerDown);
    }

    function startUnzip() {
      if (state.basePairsUnzipped >= TOTAL_BASE_PAIRS) return;
      isUnzipping = true;
      isPaused = false;
      updateState();
    }

    function togglePause() {
      if (!isUnzipping && state.basePairsUnzipped === 0) return;
      isPaused = !isPaused;
      if (!isPaused && state.basePairsUnzipped < TOTAL_BASE_PAIRS) {
        isUnzipping = true;
      }
      updateState();
    }

    function resetSimulation() {
      isUnzipping = false;
      isPaused = false;
      speed = 2.0;
      speedSlider.value = "2.0";
      speedValue.textContent = "2.0";
      resetCount++;

      animations.length = 0;

      for (const pair of basePairs) {
        pair.unzipped = false;
        pair.animating = false;
        pair.progress = 0;

        pair.strandA.position.copy(pair.initialA);
        pair.strandB.position.copy(pair.initialB);

        pair.bridge.material.opacity = 1;
        pair.bridge.visible = true;

        if (pair.labelA) {
          pair.strandA.remove(pair.labelA);
          pair.labelA = null;
        }
        if (pair.labelB) {
          pair.strandB.remove(pair.labelB);
          pair.labelB = null;
        }
      }

      helicase.position.y = -10;

      state.player1Labels = 0;
      state.player2Labels = 0;
      setActivePlayer(1);
      updateState();
      updateHUD();
    }

    function setActivePlayer(player) {
      activePlayer = player;
      player1Btn.classList.toggle('active-player', player === 1);
      player2Btn.classList.toggle('active-player', player === 2);
      updateState();
    }

    function triggerUnzip(pair) {
      if (pair.unzipped || pair.animating) return;
      pair.animating = true;
      pair.progress = 0;
      animations.push(pair);
    }

    function updateAnimations(delta) {
      for (let i = animations.length - 1; i >= 0; i--) {
        const pair = animations[i];
        pair.progress += delta / ANIM_DURATION;
        const t = Math.min(pair.progress, 1);
        const ease = t * (2 - t);

        pair.bridge.material.opacity = 1 - ease;
        if (t >= 1) pair.bridge.visible = false;

        pair.strandA.position.lerpVectors(pair.initialA, pair.targetA, ease);
        pair.strandB.position.lerpVectors(pair.initialB, pair.targetB, ease);

        if (t >= 1) {
          pair.animating = false;
          pair.unzipped = true;
          animations.splice(i, 1);
        }
      }
    }

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const clickable = [];
      for (const pair of basePairs) {
        if (pair.unzipped) {
          clickable.push(pair.strandA, pair.strandB);
        }
      }

      const intersects = raycaster.intersectObjects(clickable, false);
      if (intersects.length === 0) return;

      const obj = intersects[0].object;
      const strand = obj.userData.strand;
      const index = obj.userData.index;
      const pair = basePairs[index];

      if (activePlayer === 1 && strand !== 'A') return;
      if (activePlayer === 2 && strand !== 'B') return;

      if (strand === 'A') {
        if (pair.labelA) {
          obj.remove(pair.labelA);
          pair.labelA = null;
        } else {
          pair.labelA = createTextSprite(index % 2 === 0 ? 'A' : 'T', '#8fd3ff');
          pair.labelA.position.set(0, 0.8, 0);
          obj.add(pair.labelA);
        }
      } else {
        if (pair.labelB) {
          obj.remove(pair.labelB);
          pair.labelB = null;
        } else {
          pair.labelB = createTextSprite(index % 2 === 0 ? 'T' : 'G', '#ffb0b0');
          pair.labelB.position.set(0, 0.8, 0);
          obj.add(pair.labelB);
        }
      }

      updateState();
      updateHUD();
    }

    function createTextSprite(text, color) {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(8, 8, 112, 48);
      ctx.strokeStyle = 'white';
      ctx.strokeRect(8, 8, 112, 48);
      ctx.fillStyle = color;
      ctx.font = 'bold 34px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, 64, 34);

      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(1.3, 0.65, 1);
      return sprite;
    }

    function updateHUD() {
      hudPlayer.textContent = `Current Player: ${activePlayer}`;
      hudHelicase.textContent = `Helicase Y: ${helicase.position.y.toFixed(2)}`;
      hudUnzipped.textContent = `Base Pairs Unzipped: ${state.basePairsUnzipped} / 20`;
      hudP1.textContent = `Player 1 Labels: ${state.player1Labels}`;
      hudP2.textContent = `Player 2 Labels: ${state.player2Labels}`;
      pauseBtn.textContent = isPaused ? 'Resume' : 'Pause';
    }

    function updateState() {
      let unzippedCount = 0;
      let strandASeparated = 0;
      let strandBSeparated = 0;
      let p1 = 0;
      let p2 = 0;

      for (const pair of basePairs) {
        if (pair.unzipped) {
          unzippedCount++;
          strandASeparated++;
          strandBSeparated++;
        }
        if (pair.labelA) p1++;
        if (pair.labelB) p2++;
      }

      state.helicaseY = Number(helicase.position.y.toFixed(2));
      state.basePairsUnzipped = unzippedCount;
      state.isUnzipping = isUnzipping;
      state.isPaused = isPaused;
      state.speed = speed;
      state.activePlayer = activePlayer;
      state.player1Labels = p1;
      state.player2Labels = p2;
      state.strandASeparated = strandASeparated;
      state.strandBSeparated = strandBSeparated;
      state.helicaseVisible = helicase.visible;
      state.totalBasePairs = TOTAL_BASE_PAIRS;
      state.modelLoaded = modelLoaded;
      state.sceneReady = sceneReady;
      state.resetCount = resetCount;
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      if (isUnzipping && !isPaused) {
        helicase.position.y += speed * delta;
        if (helicase.position.y > 10) {
          helicase.position.y = 10;
          isUnzipping = false;
        }

        for (const pair of basePairs) {
          if (!pair.unzipped && !pair.animating && helicase.position.y >= pair.y) {
            triggerUnzip(pair);
          }
        }
      }

      updateAnimations(delta);
      controls.update();
      updateState();
      updateHUD();
      renderer.render(scene, camera);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
  </script>
</body>
</html>
