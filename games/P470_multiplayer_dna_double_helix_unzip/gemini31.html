<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D DNA Unzipping Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 46, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #404060;
            pointer-events: none;
            min-width: 200px;
        }
        #hud h3 { margin: 0 0 10px 0; font-size: 16px; color: #4CAF50; }
        .hud-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .hud-val { font-weight: bold; }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 46, 0.8);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid #404060;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .control-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover { background: #1976D2; }
        button:active { transform: scale(0.95); }
        
        #player1Btn { background: #1565C0; }
        #player2Btn { background: #C62828; }
        
        .active-player {
            outline: 3px solid #FFEB3B;
            outline-offset: 2px;
        }
        
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        input[type=range] { cursor: pointer; }
        
        #instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 46, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #404060;
            font-size: 12px;
            pointer-events: none;
            text-align: right;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@tweenjs/tween.js": "https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.esm.js"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <h3>Simulation Status</h3>
        <div class="hud-row"><span>Active Player:</span> <span id="hud-player" class="hud-val">Player 1</span></div>
        <div class="hud-row"><span>Helicase Y:</span> <span id="hud-helicase" class="hud-val">-10.00</span></div>
        <div class="hud-row"><span>Unzipped:</span> <span id="hud-unzipped" class="hud-val">0 / 20</span></div>
        <div class="hud-row"><span>P1 Labels (Blue):</span> <span id="hud-p1labels" class="hud-val">0</span></div>
        <div class="hud-row"><span>P2 Labels (Red):</span> <span id="hud-p2labels" class="hud-val">0</span></div>
    </div>

    <div id="instructions">
        <strong>Controls:</strong><br>
        [U] Start/Resume<br>
        [P] Pause<br>
        [R] Reset<br>
        [1] Select Player 1<br>
        [2] Select Player 2<br>
        Click separated spheres to label
    </div>

    <div id="controls">
        <div class="control-row">
            <button id="player1Btn" class="active-player">Player 1 (Blue)</button>
            <button id="player2Btn">Player 2 (Red)</button>
        </div>
        <div class="control-row">
            <button id="startUnzipBtn">Start Unzip</button>
            <button id="pauseBtn">Pause</button>
            <button id="resetBtn">Reset</button>
        </div>
        <div class="slider-container">
            <label for="speedSlider">Speed:</label>
            <input type="range" id="speedSlider" min="0.5" max="5.0" step="0.5" value="2.0">
            <span id="speedValue">2.0</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as TWEEN from '@tweenjs/tween.js';

        // State Management
        window.__3D_STATE__ = {
            helicaseY: -10,
            basePairsUnzipped: 0,
            isUnzipping: false,
            isPaused: false,
            speed: 2.0,
            activePlayer: 1,
            player1Labels: 0,
            player2Labels: 0,
            strandASeparated: 0,
            strandBSeparated: 0,
            helicaseVisible: true,
            totalBasePairs: 20,
            modelLoaded: false,
            sceneReady: false,
            resetCount: 0
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(10, 15, 10);
        scene.add(directionalLight);

        // Load Scientist Avatar
        const gltfLoader = new GLTFLoader();
        gltfLoader.load('https://unpkg.com/three@0.160.0/examples/models/gltf/facecap.glb', (gltf) => {
            const avatar = gltf.scene;
            avatar.position.set(-8, 0, 0);
            avatar.scale.set(2.0, 2.0, 2.0);
            scene.add(avatar);
            window.__3D_STATE__.modelLoaded = true;
        });

        // DNA Generation
        const basePairs = [];
        const numPairs = 20;
        const startY = -10;
        const endY = 10;
        const radius = 2.0;
        const twistPerPair = 36 * (Math.PI / 180);

        const sphereGeom = new THREE.SphereGeometry(0.3, 32, 32);
        const matA = new THREE.MeshStandardMaterial({ color: 0x2196F3 }); // Blue
        const matB = new THREE.MeshStandardMaterial({ color: 0xF44336 }); // Red
        
        const bridgeGeom = new THREE.CylinderGeometry(0.08, 0.08, radius * 2);
        bridgeGeom.rotateX(Math.PI / 2); // Align with Z axis initially

        for (let i = 0; i < numPairs; i++) {
            const y = startY + (i / (numPairs - 1)) * (endY - startY);
            const angle = i * twistPerPair;

            const posA = new THREE.Vector3(Math.cos(angle) * radius, y, Math.sin(angle) * radius);
            const posB = new THREE.Vector3(Math.cos(angle + Math.PI) * radius, y, Math.sin(angle + Math.PI) * radius);

            const sphereA = new THREE.Mesh(sphereGeom, matA);
            sphereA.position.copy(posA);
            scene.add(sphereA);

            const sphereB = new THREE.Mesh(sphereGeom, matB);
            sphereB.position.copy(posB);
            scene.add(sphereB);

            const type = i % 2 === 0 ? 'AT' : 'GC';
            const bridgeMat = new THREE.MeshStandardMaterial({
                color: type === 'AT' ? 0x4CAF50 : 0xFFEB3B,
                transparent: true,
                opacity: 1
            });

            const bridge = new THREE.Mesh(bridgeGeom, bridgeMat);
            bridge.position.copy(posA).lerp(posB, 0.5);
            bridge.lookAt(posB);
            scene.add(bridge);

            basePairs.push({
                index: i,
                y: y,
                sphereA: sphereA,
                sphereB: sphereB,
                bridge: bridge,
                type: type,
                unzipped: false,
                separated: false,
                labelA: null,
                labelB: null
            });
        }

        // Helicase Generation
        const helicaseGeom = new THREE.TorusGeometry(1.5, 0.4, 16, 100);
        const helicaseMat = new THREE.MeshStandardMaterial({
            color: 0xFF9800,
            emissive: 0xFF9800,
            emissiveIntensity: 0.5
        });
        const helicase = new THREE.Mesh(helicaseGeom, helicaseMat);
        helicase.rotation.x = Math.PI / 2;
        helicase.position.y = -10;
        scene.add(helicase);

        // Label Creation Helper
        function createLabelSprite(text, color) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(64, 64, 50, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.fillStyle = 'white';
            ctx.font = 'bold 60px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 64, 64);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(1.5, 1.5, 1);
            sprite.position.y = 0.8;
            return sprite;
        }

        // Raycaster for Interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            if (event.target.tagName === 'BUTTON' || event.target.tagName === 'INPUT') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, false);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                
                const bp = basePairs.find(b => b.sphereA === object || b.sphereB === object);
                if (bp && bp.separated) {
                    const state = window.__3D_STATE__;
                    
                    if (state.activePlayer === 1 && object === bp.sphereA) {
                        if (!bp.labelA) {
                            bp.labelA = createLabelSprite(bp.type === 'AT' ? 'A' : 'G', '#2196F3');
                            bp.sphereA.add(bp.labelA);
                            state.player1Labels++;
                        } else {
                            bp.sphereA.remove(bp.labelA);
                            bp.labelA = null;
                            state.player1Labels--;
                        }
                    } else if (state.activePlayer === 2 && object === bp.sphereB) {
                        if (!bp.labelB) {
                            bp.labelB = createLabelSprite(bp.type === 'AT' ? 'T' : 'C', '#F44336');
                            bp.sphereB.add(bp.labelB);
                            state.player2Labels++;
                        } else {
                            bp.sphereB.remove(bp.labelB);
                            bp.labelB = null;
                            state.player2Labels--;
                        }
                    }
                }
            }
        });

        // UI Controls
        const startBtn = document.getElementById('startUnzipBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const p1Btn = document.getElementById('player1Btn');
        const p2Btn = document.getElementById('player2Btn');

        function toggleUnzip() {
            const state = window.__3D_STATE__;
            if (state.helicaseY >= 10) return;
            
            if (!state.isUnzipping) {
                state.isUnzipping = true;
                state.isPaused = false;
                startBtn.textContent = 'Unzipping...';
            } else if (state.isPaused) {
                state.isPaused = false;
            }
        }

        function togglePause() {
            const state = window.__3D_STATE__;
            if (state.isUnzipping) {
                state.isPaused = !state.isPaused;
                pauseBtn.textContent = state.isPaused ? 'Resume' : 'Pause';
            }
        }

        function resetSim() {
            const state = window.__3D_STATE__;
            state.helicaseY = -10;
            state.basePairsUnzipped = 0;
            state.isUnzipping = false;
            state.isPaused = false;
            state.player1Labels = 0;
            state.player2Labels = 0;
            state.strandASeparated = 0;
            state.strandBSeparated = 0;
            state.resetCount++;

            helicase.position.y = -10;
            startBtn.textContent = 'Start Unzip';
            pauseBtn.textContent = 'Pause';

            TWEEN.removeAll();

            basePairs.forEach((bp, i) => {
                bp.unzipped = false;
                bp.separated = false;
                
                bp.bridge.visible = true;
                bp.bridge.material.opacity = 1;

                const angle = i * twistPerPair;
                bp.sphereA.position.set(Math.cos(angle) * radius, bp.y, Math.sin(angle) * radius);
                bp.sphereB.position.set(Math.cos(angle + Math.PI) * radius, bp.y, Math.sin(angle + Math.PI) * radius);

                if (bp.labelA) { bp.sphereA.remove(bp.labelA); bp.labelA = null; }
                if (bp.labelB) { bp.sphereB.remove(bp.labelB); bp.labelB = null; }
            });
        }

        function setPlayer(p) {
            window.__3D_STATE__.activePlayer = p;
            if (p === 1) {
                p1Btn.classList.add('active-player');
                p2Btn.classList.remove('active-player');
            } else {
                p2Btn.classList.add('active-player');
                p1Btn.classList.remove('active-player');
            }
        }

        startBtn.addEventListener('click', toggleUnzip);
        pauseBtn.addEventListener('click', togglePause);
        resetBtn.addEventListener('click', resetSim);
        
        speedSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            window.__3D_STATE__.speed = val;
            speedValue.textContent = val.toFixed(1);
        });

        p1Btn.addEventListener('click', () => setPlayer(1));
        p2Btn.addEventListener('click', () => setPlayer(2));

        // Keyboard Controls
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'u') toggleUnzip();
            if (key === 'p') togglePause();
            if (key === 'r') resetSim();
            if (key === '1') setPlayer(1);
            if (key === '2') setPlayer(2);
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // HUD Elements
        const hudPlayer = document.getElementById('hud-player');
        const hudHelicase = document.getElementById('hud-helicase');
        const hudUnzipped = document.getElementById('hud-unzipped');
        const hudP1Labels = document.getElementById('hud-p1labels');
        const hudP2Labels = document.getElementById('hud-p2labels');

        window.__3D_STATE__.sceneReady = true;

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const state = window.__3D_STATE__;

            TWEEN.update();
            controls.update();

            if (state.isUnzipping && !state.isPaused) {
                helicase.position.y += state.speed * delta;
                state.helicaseY = helicase.position.y;

                if (helicase.position.y >= 10) {
                    helicase.position.y = 10;
                    state.helicaseY = 10;
                    state.isUnzipping = false;
                    startBtn.textContent = 'Finished';
                }

                helicase.rotation.z += 5 * delta; // Spin effect

                basePairs.forEach(bp => {
                    if (helicase.position.y >= bp.y && !bp.unzipped) {
                        bp.unzipped = true;
                        state.basePairsUnzipped++;

                        // Dissolve bridge
                        new TWEEN.Tween(bp.bridge.material)
                            .to({ opacity: 0 }, 500)
                            .onComplete(() => { bp.bridge.visible = false; })
                            .start();

                        // Separate spheres (Strand A left -3, Strand B right +3)
                        new TWEEN.Tween(bp.sphereA.position)
                            .to({ x: bp.sphereA.position.x - 3 }, 500)
                            .easing(TWEEN.Easing.Quadratic.Out)
                            .onComplete(() => {
                                bp.separated = true;
                                state.strandASeparated++;
                            })
                            .start();

                        new TWEEN.Tween(bp.sphereB.position)
                            .to({ x: bp.sphereB.position.x + 3 }, 500)
                            .easing(TWEEN.Easing.Quadratic.Out)
                            .onComplete(() => {
                                state.strandBSeparated++;
                            })
                            .start();
                    }
                });
            }

            // Update HUD
            hudPlayer.textContent = `Player ${state.activePlayer}`;
            hudPlayer.style.color = state.activePlayer === 1 ? '#2196F3' : '#F44336';
            hudHelicase.textContent = state.helicaseY.toFixed(2);
            hudUnzipped.textContent = `${state.basePairsUnzipped} / 20`;
            hudP1Labels.textContent = state.player1Labels;
            hudP2Labels.textContent = state.player2Labels;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
