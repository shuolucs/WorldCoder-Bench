<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural City Builder</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-sizing: border-box;
            transition: border 0.2s ease;
            border: 0px solid red;
        }
        body.demolish-mode {
            border-width: 5px;
        }
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }
        #hud {
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            pointer-events: auto;
            min-width: 200px;
        }
        .hud-item {
            margin-bottom: 5px;
        }
        .hud-value {
            font-weight: bold;
            color: #f1c40f;
        }
        #controls {
            display: flex;
            gap: 10px;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 8px;
        }
        button {
            padding: 10px 15px;
            cursor: pointer;
            border: 3px solid transparent;
            background: #ecf0f1;
            color: #2c3e50;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.1s;
        }
        button:hover {
            background: #fff;
        }
        button.selected {
            border-color: #f1c40f;
        }
        #reset-btn {
            background: #e74c3c;
            color: white;
        }
        #reset-btn:hover {
            background: #c0392b;
        }
        #instructions {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.75);
            color: #ccc;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: auto;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <div class="top-bar">
            <div id="hud">
                <div class="hud-item">Player 1 Budget: <span id="p1-budget" class="hud-value">$2000</span></div>
                <div class="hud-item">Player 2 Budget: <span id="p2-budget" class="hud-value">$2000</span></div>
                <div class="hud-item">Buildings: <span id="total-buildings" class="hud-value">0</span></div>
                <div class="hud-item">Population: <span id="population" class="hud-value">0</span></div>
                <div class="hud-item">Mode: <span id="current-mode" class="hud-value">Build</span></div>
            </div>
            <div id="controls">
                <button class="build-btn selected" data-type="0">House</button>
                <button class="build-btn" data-type="1">Office</button>
                <button class="build-btn" data-type="2">Factory</button>
                <button class="build-btn" data-type="3">Park</button>
                <button id="reset-btn">Reset</button>
            </div>
        </div>
    </div>
    <div id="instructions">
        Click: Place/Demolish | 'U': Undo | 'D': Toggle Demolish Mode | Drag: Rotate Camera
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            player1Budget: 2000,
            player2Budget: 2000,
            selectedType: 0,
            totalBuildings: 0,
            player1Buildings: 0,
            player2Buildings: 0,
            population: 0,
            demolishMode: false,
            gridOccupied: {},
            lastAction: 'none',
            undoStack: [],
            aiPlacementCount: 0
        };
        const state = window.__3D_STATE__;

        const BUILDINGS = [
            { name: 'House', w: 6, h: 8, d: 6, color: 0xc0392b, cost: 100, pop: 10 },
            { name: 'Office', w: 8, h: 16, d: 8, color: 0x2980b9, cost: 250, pop: 50 },
            { name: 'Factory', w: 12, h: 10, d: 10, color: 0x7f8c8d, cost: 400, pop: 30 },
            { name: 'Park', w: 10, h: 1, d: 10, color: 0x27ae60, cost: 50, pop: 5 }
        ];

        // --- Three.js Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#87CEEB');

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(30, 40, 30);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05;

        // Lights
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(50, 80, 50);
        scene.add(dirLight);

        const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambLight);

        // Ground & Grid
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x4a7c4f });
        const groundPlane = new THREE.Mesh(groundGeo, groundMat);
        groundPlane.rotation.x = -Math.PI / 2;
        scene.add(groundPlane);

        const gridHelper = new THREE.GridHelper(100, 10);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        const buildingsGroup = new THREE.Group();
        scene.add(buildingsGroup);

        // Preview Mesh
        const previewMat = new THREE.MeshLambertMaterial({ transparent: true, opacity: 0.4, depthWrite: false });
        const previewMesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), previewMat);
        previewMesh.visible = false;
        scene.add(previewMesh);

        // --- Core Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function getGridIndices(x, z) {
            const gx = Math.floor((x + 50) / 10);
            const gz = Math.floor((z + 50) / 10);
            return { gx, gz };
        }

        function getWorldCoords(gx, gz) {
            return { x: gx * 10 - 45, z: gz * 10 - 45 };
        }

        function getMeshAt(gx, gz) {
            return buildingsGroup.children.find(m => m.userData.gx === gx && m.userData.gz === gz);
        }

        function updateHUD() {
            document.getElementById('p1-budget').innerText = `$${state.player1Budget}`;
            document.getElementById('p2-budget').innerText = `$${state.player2Budget}`;
            document.getElementById('total-buildings').innerText = state.totalBuildings;
            document.getElementById('population').innerText = state.population;
            document.getElementById('current-mode').innerText = state.demolishMode ? 'Demolish' : 'Build';
            document.getElementById('current-mode').style.color = state.demolishMode ? '#e74c3c' : '#f1c40f';
        }

        function updatePreviewGeometry() {
            const spec = BUILDINGS[state.selectedType];
            previewMesh.geometry.dispose();
            const geo = new THREE.BoxGeometry(spec.w, spec.h, spec.d);
            geo.translate(0, spec.h / 2, 0);
            previewMesh.geometry = geo;
            previewMesh.material.color.setHex(spec.color);
            previewMesh.userData.type = state.selectedType;
        }
        updatePreviewGeometry();

        function placeBuilding(gx, gz, typeIdx, player) {
            const key = `${gx}_${gz}`;
            if (state.gridOccupied[key]) return false;

            const spec = BUILDINGS[typeIdx];
            if (player === 1 && state.player1Budget < spec.cost) return false;
            if (player === 2 && state.player2Budget < spec.cost) return false;

            if (player === 1) state.player1Budget -= spec.cost;
            else state.player2Budget -= spec.cost;

            const geo = new THREE.BoxGeometry(spec.w, spec.h, spec.d);
            geo.translate(0, spec.h / 2, 0);
            
            const color = new THREE.Color(spec.color);
            if (player === 2) color.lerp(new THREE.Color(0xffffff), 0.3);
            
            const mat = new THREE.MeshLambertMaterial({ color });
            const mesh = new THREE.Mesh(geo, mat);

            const pos = getWorldCoords(gx, gz);
            mesh.position.set(pos.x, 0, pos.z);
            mesh.userData = { gx, gz, player };
            
            buildingsGroup.add(mesh);

            state.gridOccupied[key] = { player, type: typeIdx, cost: spec.cost };
            state.totalBuildings++;
            state.population += spec.pop;

            if (player === 1) {
                state.player1Buildings++;
                state.undoStack.push({ gx, gz });
                state.lastAction = 'place';
            } else {
                state.player2Buildings++;
                state.aiPlacementCount++;
            }

            updateHUD();
            return true;
        }

        function undo() {
            while (state.undoStack.length > 0) {
                const action = state.undoStack.pop();
                const key = `${action.gx}_${action.gz}`;
                const occ = state.gridOccupied[key];
                
                if (occ && occ.player === 1) {
                    const mesh = getMeshAt(action.gx, action.gz);
                    if (mesh) {
                        buildingsGroup.remove(mesh);
                        mesh.geometry.dispose();
                        mesh.material.dispose();
                    }
                    
                    state.player1Budget += occ.cost;
                    state.population -= BUILDINGS[occ.type].pop;
                    state.totalBuildings--;
                    state.player1Buildings--;
                    delete state.gridOccupied[key];
                    state.lastAction = 'undo';
                    updateHUD();
                    return;
                }
            }
        }

        function toggleDemolish() {
            state.demolishMode = !state.demolishMode;
            document.body.classList.toggle('demolish-mode', state.demolishMode);
            previewMesh.visible = false;
            updateHUD();
        }

        function resetScene() {
            while (buildingsGroup.children.length > 0) {
                const m = buildingsGroup.children[0];
                buildingsGroup.remove(m);
                m.geometry.dispose();
                m.material.dispose();
            }
            state.player1Budget = 2000;
            state.player2Budget = 2000;
            state.totalBuildings = 0;
            state.player1Buildings = 0;
            state.player2Buildings = 0;
            state.population = 0;
            state.gridOccupied = {};
            state.undoStack = [];
            state.lastAction = 'reset';
            updateHUD();
        }

        // --- Interaction Events ---
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            if (state.demolishMode) {
                previewMesh.visible = false;
                return;
            }

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(groundPlane);

            if (intersects.length > 0) {
                const pt = intersects[0].point;
                const { gx, gz } = getGridIndices(pt.x, pt.z);

                if (gx >= 0 && gx < 10 && gz >= 0 && gz < 10) {
                    const key = `${gx}_${gz}`;
                    if (!state.gridOccupied[key]) {
                        previewMesh.visible = true;
                        const pos = getWorldCoords(gx, gz);
                        previewMesh.position.set(pos.x, 0, pos.z);
                        if (previewMesh.userData.type !== state.selectedType) {
                            updatePreviewGeometry();
                        }
                    } else {
                        previewMesh.visible = false;
                    }
                } else {
                    previewMesh.visible = false;
                }
            } else {
                previewMesh.visible = false;
            }
        });

        window.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') return;

            raycaster.setFromCamera(mouse, camera);

            if (state.demolishMode) {
                const intersects = raycaster.intersectObjects(buildingsGroup.children);
                if (intersects.length > 0) {
                    const mesh = intersects[0].object;
                    if (mesh.userData.player === 1) {
                        const { gx, gz } = mesh.userData;
                        const key = `${gx}_${gz}`;
                        const occ = state.gridOccupied[key];
                        
                        buildingsGroup.remove(mesh);
                        mesh.geometry.dispose();
                        mesh.material.dispose();
                        
                        state.player1Budget += Math.floor(occ.cost * 0.5);
                        state.population -= BUILDINGS[occ.type].pop;
                        state.totalBuildings--;
                        state.player1Buildings--;
                        delete state.gridOccupied[key];
                        state.lastAction = 'demolish';
                        updateHUD();
                    }
                }
            } else {
                const intersects = raycaster.intersectObject(groundPlane);
                if (intersects.length > 0) {
                    const pt = intersects[0].point;
                    const { gx, gz } = getGridIndices(pt.x, pt.z);
                    if (gx >= 0 && gx < 10 && gz >= 0 && gz < 10) {
                        placeBuilding(gx, gz, state.selectedType, 1);
                        previewMesh.visible = false;
                    }
                }
            }
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'u') undo();
            if (key === 'd') toggleDemolish();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // UI Buttons
        document.querySelectorAll('.build-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.build-btn').forEach(b => b.classList.remove('selected'));
                e.target.classList.add('selected');
                state.selectedType = parseInt(e.target.dataset.type);
                if (state.demolishMode) toggleDemolish();
                updatePreviewGeometry();
            });
        });

        document.getElementById('reset-btn').addEventListener('click', resetScene);

        // --- AI Logic ---
        setInterval(() => {
            const emptyCells = [];
            for (let x = 0; x < 10; x++) {
                for (let z = 0; z < 10; z++) {
                    if (!state.gridOccupied[`${x}_${z}`]) emptyCells.push({ x, z });
                }
            }
            if (emptyCells.length === 0) return;

            const cell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            const type = Math.floor(Math.random() * 4);
            
            if (state.player2Budget >= BUILDINGS[type].cost) {
                placeBuilding(cell.x, cell.z, type, 2);
            }
        }, 8000);

        // --- Render Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
