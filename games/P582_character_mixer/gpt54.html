<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Three.js Animation Blending and Mixing</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #445566;
      font-family: system-ui, sans-serif;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 320px;
      max-width: calc(100vw - 24px);
      background: rgba(20, 24, 30, 0.82);
      color: #fff;
      padding: 12px;
      border-radius: 10px;
      box-sizing: border-box;
      z-index: 10;
      font-size: 13px;
      backdrop-filter: blur(4px);
    }

    #ui h2 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .slot {
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .slot-title {
      font-weight: 700;
      margin-bottom: 8px;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
    }

    .row-inline {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    label {
      font-size: 12px;
      opacity: 0.95;
    }

    select, input[type="range"], button {
      width: 100%;
      box-sizing: border-box;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 8px 10px;
      background: #4b84c6;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      filter: brightness(1.08);
    }

    .button-half {
      width: calc(50% - 4px);
    }

    .small-note {
      font-size: 11px;
      opacity: 0.75;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.55);
      color: white;
      padding: 12px;
      font: 14px monospace;
      z-index: 10;
      border-radius: 8px;
      white-space: pre-line;
      min-width: 240px;
    }

    #status {
      margin-top: 6px;
      color: #ffdca8;
      font-size: 12px;
      min-height: 16px;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="hud">
    <div id="hud-clip0">Slot 0: -</div>
    <div id="hud-clip1">Slot 1: -</div>
    <div id="hud-clip2">Slot 2: -</div>
    <div id="hud-speed">Speed: 1.00</div>
    <div id="hud-time">Time: 0.00</div>
    <div id="hud-skeleton">Skeleton: OFF</div>
  </div>

  <div id="ui">
    <h2>Animation Blend Mixer</h2>

    <div class="slot">
      <div class="slot-title">Slot 0</div>
      <div class="row">
        <label for="select-anim-0">Animation</label>
        <select id="select-anim-0"></select>
      </div>
      <div class="row">
        <label for="slider-weight-0">Weight</label>
        <input id="slider-weight-0" type="range" min="0" max="1" step="0.01" value="1" />
      </div>
    </div>

    <div class="slot">
      <div class="slot-title">Slot 1</div>
      <div class="row">
        <label for="select-anim-1">Animation</label>
        <select id="select-anim-1"></select>
      </div>
      <div class="row">
        <label for="slider-weight-1">Weight</label>
        <input id="slider-weight-1" type="range" min="0" max="1" step="0.01" value="0" />
      </div>
    </div>

    <div class="slot">
      <div class="slot-title">Slot 2</div>
      <div class="row">
        <label for="select-anim-2">Animation</label>
        <select id="select-anim-2"></select>
      </div>
      <div class="row">
        <label for="slider-weight-2">Weight</label>
        <input id="slider-weight-2" type="range" min="0" max="1" step="0.01" value="0" />
      </div>
    </div>

    <div class="row-inline">
      <button id="btn-crossfade-01" class="button-half">Crossfade 0 → 1</button>
      <button id="btn-crossfade-12" class="button-half">Crossfade 1 → 2</button>
    </div>

    <div class="row-inline">
      <button id="btn-play" class="button-half">Play</button>
      <button id="btn-pause" class="button-half">Pause</button>
    </div>

    <div class="row">
      <label for="slider-speed">Playback Speed</label>
      <input id="slider-speed" type="range" min="0.1" max="3.0" step="0.1" value="1.0" />
    </div>

    <div class="row">
      <button id="btn-skeleton">Toggle Skeleton</button>
    </div>

    <div class="small-note">Keyboard: P = play/pause, S = skeleton</div>
    <div id="status">Loading ./Xbot.glb ...</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x445566);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.5, 4);
    camera.lookAt(0, 1, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(3, 5, 3);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.1;
    dirLight.shadow.camera.far = 20;
    dirLight.shadow.camera.left = -5;
    dirLight.shadow.camera.right = 5;
    dirLight.shadow.camera.top = 5;
    dirLight.shadow.camera.bottom = -5;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 10),
      new THREE.MeshStandardMaterial({ color: 0x555555 })
    );
    ground.rotation.x = -Math.PI * 0.5;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(10, 10, 0xaaaaaa, 0x777777);
    grid.position.y = 0.001;
    scene.add(grid);

    const clock = new THREE.Clock();

    let model = null;
    let mixer = null;
    let skeletonHelper = null;
    let skeletonVisible = false;
    let isPaused = false;

    let clips = [];
    let clipNames = [];
    const actionsByName = new Map();

    const slotState = [
      { clipName: null, weight: 1.0 },
      { clipName: null, weight: 0.0 },
      { clipName: null, weight: 0.0 }
    ];

    const crossfades = [];
    let frameCount = 0;

    const el = {
      select0: document.getElementById('select-anim-0'),
      select1: document.getElementById('select-anim-1'),
      select2: document.getElementById('select-anim-2'),
      weight0: document.getElementById('slider-weight-0'),
      weight1: document.getElementById('slider-weight-1'),
      weight2: document.getElementById('slider-weight-2'),
      speed: document.getElementById('slider-speed'),
      play: document.getElementById('btn-play'),
      pause: document.getElementById('btn-pause'),
      skeleton: document.getElementById('btn-skeleton'),
      cross01: document.getElementById('btn-crossfade-01'),
      cross12: document.getElementById('btn-crossfade-12'),
      status: document.getElementById('status'),
      hudClip0: document.getElementById('hud-clip0'),
      hudClip1: document.getElementById('hud-clip1'),
      hudClip2: document.getElementById('hud-clip2'),
      hudSpeed: document.getElementById('hud-speed'),
      hudTime: document.getElementById('hud-time'),
      hudSkeleton: document.getElementById('hud-skeleton'),
    };

    function setupAction(action, weight) {
      action.enabled = true;
      action.setEffectiveTimeScale(1);
      action.setEffectiveWeight(weight);
      action.play();
      return action;
    }

    function getAction(name) {
      return actionsByName.get(name) || null;
    }

    function ensureActionPlaying(name) {
      const action = getAction(name);
      if (!action) return null;
      action.enabled = true;
      action.play();
      return action;
    }

    function setSlotClip(slotIndex, clipName) {
      if (!mixer || !actionsByName.has(clipName)) return;
      slotState[slotIndex].clipName = clipName;
      applyAllSlotWeights();
    }

    function setSlotWeight(slotIndex, weight) {
      slotState[slotIndex].weight = THREE.MathUtils.clamp(Number(weight), 0, 1);
      applyAllSlotWeights();
      syncSlidersFromState();
    }

    function applyAllSlotWeights() {
      if (!mixer) return;

      for (const action of actionsByName.values()) {
        action.setEffectiveWeight(0);
      }

      for (let i = 0; i < 3; i++) {
        const slot = slotState[i];
        if (!slot.clipName) continue;
        const action = ensureActionPlaying(slot.clipName);
        if (!action) continue;
        action.setEffectiveWeight(slot.weight);
      }
    }

    function syncSlidersFromState() {
      el.weight0.value = slotState[0].weight.toFixed(2);
      el.weight1.value = slotState[1].weight.toFixed(2);
      el.weight2.value = slotState[2].weight.toFixed(2);
    }

    function populateSelect(selectEl, defaultIndex) {
      selectEl.innerHTML = '';
      clipNames.forEach((name, index) => {
        const option = document.createElement('option');
        option.value = name;
        option.textContent = `${index}: ${name}`;
        selectEl.appendChild(option);
      });
      if (clipNames.length > 0) {
        selectEl.value = clipNames[Math.min(defaultIndex, clipNames.length - 1)];
      }
    }

    function updateHUD() {
      el.hudClip0.textContent = `Slot 0: ${slotState[0].clipName ?? '-'} | w=${slotState[0].weight.toFixed(2)}`;
      el.hudClip1.textContent = `Slot 1: ${slotState[1].clipName ?? '-'} | w=${slotState[1].weight.toFixed(2)}`;
      el.hudClip2.textContent = `Slot 2: ${slotState[2].clipName ?? '-'} | w=${slotState[2].weight.toFixed(2)}`;
      el.hudSpeed.textContent = `Speed: ${mixer ? mixer.timeScale.toFixed(2) : '1.00'}`;
      el.hudTime.textContent = `Time: ${mixer ? mixer.time.toFixed(2) : '0.00'}`;
      el.hudSkeleton.textContent = `Skeleton: ${skeletonVisible ? 'ON' : 'OFF'}`;
    }

    function updateStateObject() {
      const w0 = slotState[0].weight;
      const w1 = slotState[1].weight;
      const w2 = slotState[2].weight;
      const finite = [w0, w1, w2].every(v => Number.isFinite(v) && v >= 0 && v <= 1);
      const anyActive = [w0, w1, w2].some(v => v > 0);

      window.__3D_STATE__ = {
        frameCount,
        clipNames: [...clipNames],
        activeClip0: slotState[0].clipName,
        activeClip1: slotState[1].clipName,
        activeClip2: slotState[2].clipName,
        weight0: w0,
        weight1: w1,
        weight2: w2,
        playbackSpeed: mixer ? mixer.timeScale : Number(el.speed.value),
        mixerTime: mixer ? mixer.time : 0,
        skeletonVisible,
        mixerValid: finite && anyActive,
        isPaused
      };
    }

    function startCrossfade(fromSlot, toSlot, duration = 1.0) {
      if (!mixer) return;
      const from = slotState[fromSlot];
      const to = slotState[toSlot];
      if (!from.clipName || !to.clipName) return;

      ensureActionPlaying(from.clipName);
      ensureActionPlaying(to.clipName);

      crossfades.push({
        fromSlot,
        toSlot,
        duration,
        elapsed: 0,
        startFromWeight: from.weight,
        startToWeight: to.weight,
        endFromWeight: 0,
        endToWeight: 1
      });
    }

    function updateCrossfades(delta) {
      if (crossfades.length === 0) return;

      for (let i = crossfades.length - 1; i >= 0; i--) {
        const cf = crossfades[i];
        cf.elapsed += delta;
        const t = Math.min(cf.elapsed / cf.duration, 1);
        const k = t;

        slotState[cf.fromSlot].weight = THREE.MathUtils.lerp(cf.startFromWeight, cf.endFromWeight, k);
        slotState[cf.toSlot].weight = THREE.MathUtils.lerp(cf.startToWeight, cf.endToWeight, k);

        if (t >= 1) {
          crossfades.splice(i, 1);
        }
      }

      applyAllSlotWeights();
      syncSlidersFromState();
    }

    function toggleSkeleton() {
      if (!model) return;

      skeletonVisible = !skeletonVisible;

      if (skeletonVisible) {
        if (!skeletonHelper) {
          skeletonHelper = new THREE.SkeletonHelper(model);
          skeletonHelper.visible = true;
          scene.add(skeletonHelper);
        } else {
          skeletonHelper.visible = true;
        }
      } else if (skeletonHelper) {
        skeletonHelper.visible = false;
      }
    }

    function setPaused(paused) {
      isPaused = paused;
    }

    function bindUI() {
      el.select0.addEventListener('change', () => setSlotClip(0, el.select0.value));
      el.select1.addEventListener('change', () => setSlotClip(1, el.select1.value));
      el.select2.addEventListener('change', () => setSlotClip(2, el.select2.value));

      el.weight0.addEventListener('input', () => setSlotWeight(0, el.weight0.value));
      el.weight1.addEventListener('input', () => setSlotWeight(1, el.weight1.value));
      el.weight2.addEventListener('input', () => setSlotWeight(2, el.weight2.value));

      el.speed.addEventListener('input', () => {
        if (mixer) mixer.timeScale = Number(el.speed.value);
      });

      el.play.addEventListener('click', () => {
        setPaused(false);
        if (mixer) mixer.timeScale = Number(el.speed.value);
        actionsByName.forEach(action => action.play());
      });

      el.pause.addEventListener('click', () => {
        setPaused(true);
      });

      el.cross01.addEventListener('click', () => startCrossfade(0, 1, 1.0));
      el.cross12.addEventListener('click', () => startCrossfade(1, 2, 1.0));

      el.skeleton.addEventListener('click', () => toggleSkeleton());

      window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'p') {
          setPaused(!isPaused);
        } else if (key === 's') {
          toggleSkeleton();
        }
      });
    }

    bindUI();

    const loader = new GLTFLoader();
    loader.load(
      './Xbot.glb',
      (gltf) => {
        model = gltf.scene;
        model.position.set(0, 0, 0);

        model.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        scene.add(model);

        clips = gltf.animations || [];
        clipNames = clips.map((clip, i) => clip.name || `Clip_${i}`);

        mixer = new THREE.AnimationMixer(model);

        clips.forEach((clip, i) => {
          if (!clip.name) clip.name = `Clip_${i}`;
          const action = mixer.clipAction(clip);
          const initialWeight = i === 0 ? 1 : 0;
          setupAction(action, initialWeight);
          actionsByName.set(clip.name, action);
        });

        populateSelect(el.select0, 0);
        populateSelect(el.select1, 1);
        populateSelect(el.select2, 2);

        slotState[0].clipName = clipNames[0] ?? null;
        slotState[1].clipName = clipNames[1] ?? clipNames[0] ?? null;
        slotState[2].clipName = clipNames[2] ?? clipNames[0] ?? null;

        el.select0.value = slotState[0].clipName ?? '';
        el.select1.value = slotState[1].clipName ?? '';
        el.select2.value = slotState[2].clipName ?? '';

        slotState[0].weight = 1.0;
        slotState[1].weight = 0.0;
        slotState[2].weight = 0.0;

        applyAllSlotWeights();
        syncSlidersFromState();

        mixer.timeScale = Number(el.speed.value);

        el.status.textContent = clips.length
          ? `Loaded ${clips.length} clips from ./Xbot.glb`
          : 'Loaded model, but no animation clips were found.';
      },
      undefined,
      (err) => {
        console.error(err);
        el.status.textContent = 'Failed to load ./Xbot.glb';
      }
    );

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const delta = clock.getDelta();

      if (mixer) {
        updateCrossfades(delta);
        if (!isPaused) {
          mixer.update(delta * mixer.timeScale);
        }
      }

      controls.update();

      if (skeletonHelper) {
        skeletonHelper.visible = skeletonVisible;
      }

      updateHUD();
      updateStateObject();

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
