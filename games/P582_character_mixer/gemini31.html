<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Character Animation Blending</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 320px;
            background: rgba(30, 30, 30, 0.85);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            box-sizing: border-box;
            max-height: 95vh;
            overflow-y: auto;
        }
        .slot {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .slot-header {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }
        select, input[type="range"], button {
            width: 100%;
            margin-bottom: 8px;
            box-sizing: border-box;
        }
        select {
            padding: 4px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
        }
        button {
            padding: 8px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #45a049;
        }
        .btn-group {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
        .btn-group button {
            margin-bottom: 0;
        }
        .control-group {
            margin-bottom: 15px;
            border-top: 1px solid #555;
            padding-top: 10px;
        }
        label {
            font-size: 12px;
            display: block;
            margin-bottom: 4px;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px;
            color: white;
            font-family: monospace;
            font-size: 14px;
            border-radius: 4px;
            pointer-events: none;
        }
        #hud div {
            margin-bottom: 4px;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            font-family: sans-serif;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 8px;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="loading">Loading Model...</div>

    <div id="hud">
        <div id="hud-clip0">Slot 0: - (1.00)</div>
        <div id="hud-clip1">Slot 1: - (0.00)</div>
        <div id="hud-clip2">Slot 2: - (0.00)</div>
        <div id="hud-speed">Speed: 1.0x</div>
        <div id="hud-time">Time: 0.00</div>
        <div id="hud-skeleton">Skeleton: OFF</div>
    </div>

    <div id="ui-panel" style="display: none;">
        <div class="slot">
            <div class="slot-header">Slot 0</div>
            <select id="select-anim-0"></select>
            <label>Weight</label>
            <input type="range" id="slider-weight-0" min="0" max="1" step="0.01" value="1">
        </div>
        
        <div class="slot">
            <div class="slot-header">Slot 1</div>
            <select id="select-anim-1"></select>
            <label>Weight</label>
            <input type="range" id="slider-weight-1" min="0" max="1" step="0.01" value="0">
        </div>

        <div class="slot">
            <div class="slot-header">Slot 2</div>
            <select id="select-anim-2"></select>
            <label>Weight</label>
            <input type="range" id="slider-weight-2" min="0" max="1" step="0.01" value="0">
        </div>

        <div class="control-group">
            <div class="btn-group">
                <button id="btn-crossfade-01">Crossfade 0 &rarr; 1</button>
                <button id="btn-crossfade-12">Crossfade 1 &rarr; 2</button>
            </div>
        </div>

        <div class="control-group">
            <div class="btn-group">
                <button id="btn-play">Play</button>
                <button id="btn-pause">Pause</button>
            </div>
            <label>Playback Speed</label>
            <input type="range" id="slider-speed" min="0.1" max="3.0" step="0.1" value="1.0">
        </div>

        <div class="control-group">
            <button id="btn-skeleton">Toggle Skeleton</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            frameCount: 0,
            clipNames: [],
            activeClip0: '',
            activeClip1: '',
            activeClip2: '',
            weight0: 1.0,
            weight1: 0.0,
            weight2: 0.0,
            playbackSpeed: 1.0,
            mixerTime: 0.0,
            skeletonVisible: false,
            mixerValid: false,
            isPaused: false
        };

        // Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x445566);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 4);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1, 0);
        controls.update();

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(3, 5, 3);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 2;
        dirLight.shadow.camera.bottom = -2;
        dirLight.shadow.camera.left = -2;
        dirLight.shadow.camera.right = 2;
        dirLight.shadow.camera.near = 0.1;
        dirLight.shadow.camera.far = 20;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(10, 10);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x555555, depthWrite: true });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(10, 10, 0x000000, 0x000000);
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // Variables
        let mixer;
        let skeletonHelper;
        const actions = {};
        const slotClips = ['', '', ''];
        const slotWeights = [1.0, 0.0, 0.0];
        let activeCrossfades = [];
        const clock = new THREE.Clock();

        // Load Model
        const loader = new GLTFLoader();
        loader.load('./Xbot.glb', function (gltf) {
            const model = gltf.scene;
            scene.add(model);

            model.traverse(function (object) {
                if (object.isMesh) {
                    object.castShadow = true;
                    object.receiveShadow = true;
                }
            });

            skeletonHelper = new THREE.SkeletonHelper(model);
            skeletonHelper.visible = false;
            scene.add(skeletonHelper);

            mixer = new THREE.AnimationMixer(model);
            const animations = gltf.animations;

            animations.forEach((clip) => {
                window.__3D_STATE__.clipNames.push(clip.name);
                const action = mixer.clipAction(clip);
                action.play();
                action.setEffectiveWeight(0);
                actions[clip.name] = action;
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('ui-panel').style.display = 'block';

            initUI();
        }, undefined, function (e) {
            console.error(e);
            document.getElementById('loading').innerText = 'Error loading model. Ensure ./Xbot.glb exists.';
        });

        function initUI() {
            const clipNames = window.__3D_STATE__.clipNames;

            // Populate Dropdowns
            for (let i = 0; i < 3; i++) {
                const select = document.getElementById(`select-anim-${i}`);
                clipNames.forEach(name => {
                    const option = document.createElement('option');
                    option.value = name;
                    option.text = name;
                    select.appendChild(option);
                });

                // Set defaults
                if (clipNames.length > i) {
                    select.selectedIndex = i;
                    slotClips[i] = clipNames[i];
                } else if (clipNames.length > 0) {
                    select.selectedIndex = 0;
                    slotClips[i] = clipNames[0];
                }

                // Event Listeners
                select.addEventListener('change', (e) => {
                    slotClips[i] = e.target.value;
                });

                const slider = document.getElementById(`slider-weight-${i}`);
                slider.addEventListener('input', (e) => {
                    slotWeights[i] = parseFloat(e.target.value);
                });
            }

            // Crossfade Buttons
            document.getElementById('btn-crossfade-01').addEventListener('click', () => startCrossfade(0, 1));
            document.getElementById('btn-crossfade-12').addEventListener('click', () => startCrossfade(1, 2));

            // Playback Controls
            document.getElementById('btn-play').addEventListener('click', () => {
                window.__3D_STATE__.isPaused = false;
            });
            document.getElementById('btn-pause').addEventListener('click', () => {
                window.__3D_STATE__.isPaused = true;
            });

            const speedSlider = document.getElementById('slider-speed');
            speedSlider.addEventListener('input', (e) => {
                window.__3D_STATE__.playbackSpeed = parseFloat(e.target.value);
                if (mixer) mixer.timeScale = window.__3D_STATE__.playbackSpeed;
            });

            // Skeleton Toggle
            document.getElementById('btn-skeleton').addEventListener('click', toggleSkeleton);

            // Keyboard Controls
            window.addEventListener('keydown', (e) => {
                if (e.key === 'p' || e.key === 'P') {
                    window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
                }
                if (e.key === 's' || e.key === 'S') {
                    toggleSkeleton();
                }
            });
        }

        function toggleSkeleton() {
            if (skeletonHelper) {
                skeletonHelper.visible = !skeletonHelper.visible;
                window.__3D_STATE__.skeletonVisible = skeletonHelper.visible;
            }
        }

        function startCrossfade(fromSlot, toSlot) {
            activeCrossfades.push({
                fromSlot: fromSlot,
                toSlot: toSlot,
                duration: 1.0,
                elapsed: 0,
                startWeightFrom: slotWeights[fromSlot],
                startWeightTo: slotWeights[toSlot]
            });
        }

        function updateCrossfades(delta) {
            for (let i = activeCrossfades.length - 1; i >= 0; i--) {
                const cf = activeCrossfades[i];
                cf.elapsed += delta;
                let t = cf.elapsed / cf.duration;
                
                if (t >= 1) {
                    t = 1;
                    activeCrossfades.splice(i, 1);
                }

                slotWeights[cf.fromSlot] = THREE.MathUtils.lerp(cf.startWeightFrom, 0, t);
                slotWeights[cf.toSlot] = THREE.MathUtils.lerp(cf.startWeightTo, 1, t);

                document.getElementById(`slider-weight-${cf.fromSlot}`).value = slotWeights[cf.fromSlot];
                document.getElementById(`slider-weight-${cf.toSlot}`).value = slotWeights[cf.toSlot];
            }
        }

        function applyWeights() {
            if (!mixer) return;

            // Reset all actions to 0 weight
            for (const name in actions) {
                actions[name].setEffectiveWeight(0);
            }

            // Apply slot weights
            for (let i = 0; i < 3; i++) {
                const clipName = slotClips[i];
                if (clipName && actions[clipName]) {
                    const currentWeight = actions[clipName].getEffectiveWeight();
                    actions[clipName].setEffectiveWeight(currentWeight + slotWeights[i]);
                }
            }
        }

        function updateHUD() {
            document.getElementById('hud-clip0').innerText = `Slot 0: ${slotClips[0] || '-'} (${slotWeights[0].toFixed(2)})`;
            document.getElementById('hud-clip1').innerText = `Slot 1: ${slotClips[1] || '-'} (${slotWeights[1].toFixed(2)})`;
            document.getElementById('hud-clip2').innerText = `Slot 2: ${slotClips[2] || '-'} (${slotWeights[2].toFixed(2)})`;
            document.getElementById('hud-speed').innerText = `Speed: ${window.__3D_STATE__.playbackSpeed.toFixed(1)}x`;
            document.getElementById('hud-time').innerText = `Time: ${mixer ? mixer.time.toFixed(2) : '0.00'}`;
            document.getElementById('hud-skeleton').innerText = `Skeleton: ${skeletonHelper && skeletonHelper.visible ? 'ON' : 'OFF'}`;
        }

        function updateState() {
            const state = window.__3D_STATE__;
            state.frameCount++;
            state.activeClip0 = slotClips[0];
            state.activeClip1 = slotClips[1];
            state.activeClip2 = slotClips[2];
            state.weight0 = slotWeights[0];
            state.weight1 = slotWeights[1];
            state.weight2 = slotWeights[2];
            state.mixerTime = mixer ? mixer.time : 0;
            
            const w0 = state.weight0;
            const w1 = state.weight1;
            const w2 = state.weight2;
            const validWeights = [w0, w1, w2].every(w => Number.isFinite(w) && w >= 0 && w <= 1);
            const sumWeights = w0 + w1 + w2;
            state.mixerValid = validWeights && sumWeights > 0;
        }

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (!window.__3D_STATE__.isPaused) {
                updateCrossfades(delta);
                applyWeights();
                if (mixer) {
                    mixer.update(delta);
                }
            }

            updateHUD();
            updateState();

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
