<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Sneaker Customizer</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.15);
      --text: #f5f7ff;
      --muted: #b7bdd6;
      --active: #7c5cff;
      --button: rgba(255, 255, 255, 0.1);
      --button-hover: rgba(255, 255, 255, 0.18);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    .panel {
      position: absolute;
      top: 20px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      z-index: 10;
      min-width: 180px;
    }

    #part-panel {
      left: 20px;
    }

    #color-panel {
      right: 20px;
    }

    #controls-panel {
      position: absolute;
      left: 20px;
      bottom: 60px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      z-index: 10;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      max-width: calc(100% - 40px);
    }

    h3 {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      appearance: none;
      border: 1px solid var(--panel-border);
      background: var(--button);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    button:hover {
      background: var(--button-hover);
      transform: translateY(-1px);
    }

    button.active {
      background: rgba(124, 92, 255, 0.35);
      border-color: rgba(124, 92, 255, 0.9);
      box-shadow: 0 0 0 1px rgba(124, 92, 255, 0.3) inset;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(2, 56px);
      gap: 12px;
    }

    .swatch {
      width: 56px;
      height: 56px;
      padding: 0;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.25);
    }

    .swatch:hover {
      border-color: #ffffff;
    }

    #status-bar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 14px 18px;
      background: rgba(0, 0, 0, 0.35);
      border-top: 1px solid rgba(255,255,255,0.12);
      color: var(--muted);
      font-size: 14px;
      z-index: 20;
      backdrop-filter: blur(8px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      margin-top: 10px;
    }

    @media (max-width: 900px) {
      #color-panel {
        top: auto;
        bottom: 160px;
      }

      #controls-panel {
        right: 20px;
      }
    }

    @media (max-width: 640px) {
      .panel {
        min-width: 150px;
        padding: 12px;
      }

      .swatches {
        grid-template-columns: repeat(3, 48px);
      }

      .swatch {
        width: 48px;
        height: 48px;
      }

      #controls-panel {
        gap: 8px;
        padding: 12px;
      }

      button {
        font-size: 13px;
        padding: 9px 10px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="part-panel" class="panel">
      <h3>Select Part</h3>
      <div class="stack">
        <button id="btn-part-0" class="active">Part 0</button>
        <button id="btn-part-1">Part 1</button>
        <button id="btn-part-2">Part 2</button>
        <button id="btn-part-3">Part 3</button>
        <button id="btn-part-4">Part 4</button>
      </div>
      <div class="hint">Pick a model part, then apply a color.</div>
    </div>

    <div id="color-panel" class="panel">
      <h3>Color Palette</h3>
      <div class="swatches">
        <button id="color-ff0000" class="swatch" title="Red" style="background:#ff0000;"></button>
        <button id="color-00ff00" class="swatch" title="Green" style="background:#00ff00;"></button>
        <button id="color-0000ff" class="swatch" title="Blue" style="background:#0000ff;"></button>
        <button id="color-ffff00" class="swatch" title="Yellow" style="background:#ffff00;"></button>
        <button id="color-ff00ff" class="swatch" title="Magenta" style="background:#ff00ff;"></button>
        <button id="color-ffffff" class="swatch" title="White" style="background:#ffffff;"></button>
      </div>
    </div>

    <div id="controls-panel">
      <button id="btn-save">Save State</button>
      <button id="btn-load">Load State</button>
      <button id="btn-reset">Reset</button>
      <button id="btn-rotate">Rotate Toggle</button>
    </div>

    <div id="status-bar">Initializing scene...</div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const statusBar = document.getElementById('status-bar');
    const rotateBtn = document.getElementById('btn-rotate');

    const partButtons = Array.from({ length: 5 }, (_, i) => document.getElementById(`btn-part-${i}`));
    const colorMap = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#ffffff'];
    const colorButtons = colorMap.map(hex => document.getElementById(`color-${hex.replace('#', '')}`));

    window.__3D_STATE__ = {
      modelLoaded: false,
      selectedPart: 0,
      partColors: ['#ffffff', '#ffffff', '#ffffff', '#ffffff', '#ffffff'],
      autoRotate: false,
      rotationAngle: 0,
      savedConfig: null,
      lastAction: 'Initializing scene...',
      cameraDistance: 0,
      meshCount: 0,
      partsAvailable: 0
    };

    function setStatus(message) {
      window.__3D_STATE__.lastAction = message;
      statusBar.textContent = message;
    }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.5, 3);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.5, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 5, 5);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(10, 20, 0x8888aa, 0x444466);
    grid.material.transparent = true;
    grid.material.opacity = 0.22;
    scene.add(grid);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 10),
      new THREE.MeshStandardMaterial({
        color: 0x22223a,
        transparent: true,
        opacity: 0.18,
        roughness: 1
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.001;
    scene.add(ground);

    let productRoot = new THREE.Group();
    scene.add(productRoot);

    let customizableParts = [];
    let allMeshes = [];

    function cloneMaterialIfNeeded(mesh) {
      if (!mesh || !mesh.material) return;
      if (Array.isArray(mesh.material)) {
        mesh.material = mesh.material.map(m => m.clone());
      } else {
        mesh.material = mesh.material.clone();
      }
    }

    function setMeshColor(mesh, hex) {
      if (!mesh || !mesh.material) return;
      const applyToMaterial = (mat) => {
        if (mat.color) mat.color.set(hex);
      };
      if (Array.isArray(mesh.material)) {
        mesh.material.forEach(applyToMaterial);
      } else {
        applyToMaterial(mesh.material);
      }
    }

    function setMeshHighlight(mesh, enabled) {
      if (!mesh || !mesh.material) return;
      const apply = (mat) => {
        if ('emissive' in mat) {
          mat.emissive.set(enabled ? '#222222' : '#000000');
          mat.emissiveIntensity = enabled ? 0.7 : 0.0;
        }
      };
      if (Array.isArray(mesh.material)) {
        mesh.material.forEach(apply);
      } else {
        apply(mesh.material);
      }
    }

    function refreshPartSelectionUI() {
      partButtons.forEach((btn, i) => {
        btn.classList.toggle('active', i === window.__3D_STATE__.selectedPart);
      });

      customizableParts.forEach((mesh, i) => {
        setMeshHighlight(mesh, i === window.__3D_STATE__.selectedPart);
      });
    }

    function updatePartButtonsAvailability() {
      const count = window.__3D_STATE__.partsAvailable;
      partButtons.forEach((btn, i) => {
        btn.disabled = i >= count;
      });
    }

    function applyColorToPart(index, hex) {
      if (index < 0 || index >= customizableParts.length) {
        setStatus(`Part ${index} is not available`);
        return;
      }
      const mesh = customizableParts[index];
      setMeshColor(mesh, hex);
      window.__3D_STATE__.partColors[index] = hex.toLowerCase();
      setStatus(`Color applied: ${hex.toLowerCase()} to Part ${index}`);
    }

    function applyAllColorsFromState() {
      for (let i = 0; i < customizableParts.length; i++) {
        const hex = window.__3D_STATE__.partColors[i] || '#ffffff';
        setMeshColor(customizableParts[i], hex);
      }
    }

    function resetColors() {
      for (let i = 0; i < 5; i++) {
        window.__3D_STATE__.partColors[i] = '#ffffff';
      }
      applyAllColorsFromState();
      setStatus('Reset to defaults');
    }

    function saveState() {
      const data = JSON.stringify(window.__3D_STATE__.partColors);
      localStorage.setItem('sneaker_config', data);
      window.__3D_STATE__.savedConfig = data;
      setStatus('Saved configuration');
    }

    function loadState() {
      const data = localStorage.getItem('sneaker_config');
      if (!data) {
        window.__3D_STATE__.savedConfig = null;
        setStatus('No saved configuration found');
        return;
      }

      try {
        const parsed = JSON.parse(data);
        if (!Array.isArray(parsed)) throw new Error('Invalid format');

        for (let i = 0; i < 5; i++) {
          const value = typeof parsed[i] === 'string' ? parsed[i].toLowerCase() : '#ffffff';
          window.__3D_STATE__.partColors[i] = value;
        }

        applyAllColorsFromState();
        window.__3D_STATE__.savedConfig = data;
        setStatus('Loaded configuration');
      } catch (err) {
        setStatus('Failed to load configuration');
      }
    }

    function toggleRotation() {
      window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
      rotateBtn.textContent = window.__3D_STATE__.autoRotate ? 'Stop Rotation' : 'Rotate Toggle';
      setStatus(window.__3D_STATE__.autoRotate ? 'Auto-rotation enabled' : 'Auto-rotation disabled');
    }

    partButtons.forEach((btn, i) => {
      btn.addEventListener('click', () => {
        if (i >= window.__3D_STATE__.partsAvailable) return;
        window.__3D_STATE__.selectedPart = i;
        refreshPartSelectionUI();
        setStatus(`Selected Part ${i}`);
      });
    });

    colorButtons.forEach((btn, idx) => {
      const hex = colorMap[idx];
      btn.addEventListener('click', () => {
        applyColorToPart(window.__3D_STATE__.selectedPart, hex);
      });
    });

    document.getElementById('btn-save').addEventListener('click', saveState);
    document.getElementById('btn-load').addEventListener('click', loadState);
    document.getElementById('btn-reset').addEventListener('click', resetColors);
    rotateBtn.addEventListener('click', toggleRotation);

    const loader = new GLTFLoader();
    setStatus('Loading WaterBottle.glb...');

    loader.load(
      'WaterBottle.glb',
      (gltf) => {
        const model = gltf.scene;
        productRoot.clear();
        productRoot.add(model);

        allMeshes = [];
        model.traverse((child) => {
          if (child.isMesh) {
            allMeshes.push(child);
            cloneMaterialIfNeeded(child);
            child.castShadow = false;
            child.receiveShadow = false;
          }
        });

        window.__3D_STATE__.meshCount = allMeshes.length;
        customizableParts = allMeshes.slice(0, 5);
        window.__3D_STATE__.partsAvailable = customizableParts.length;

        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        model.position.sub(center);

        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const targetSize = 1.5;
        const scale = targetSize / maxDim;
        model.scale.setScalar(scale);

        const scaledBox = new THREE.Box3().setFromObject(model);
        const scaledCenter = new THREE.Vector3();
        const scaledSize = new THREE.Vector3();
        scaledBox.getCenter(scaledCenter);
        scaledBox.getSize(scaledSize);

        model.position.x -= scaledCenter.x;
        model.position.y -= scaledBox.min.y;
        model.position.z -= scaledCenter.z;

        applyAllColorsFromState();
        updatePartButtonsAvailability();
        refreshPartSelectionUI();

        window.__3D_STATE__.modelLoaded = true;
        setStatus(`Model loaded: ${window.__3D_STATE__.meshCount} mesh(es), ${window.__3D_STATE__.partsAvailable} customizable part(s)`);
      },
      undefined,
      (error) => {
        console.error(error);
        setStatus('Failed to load WaterBottle.glb');
      }
    );

    function animate() {
      requestAnimationFrame(animate);

      controls.update();

      if (window.__3D_STATE__.autoRotate) {
        productRoot.rotation.y += 0.01;
        window.__3D_STATE__.rotationAngle = productRoot.rotation.y;
      } else {
        window.__3D_STATE__.rotationAngle = productRoot.rotation.y;
      }

      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
