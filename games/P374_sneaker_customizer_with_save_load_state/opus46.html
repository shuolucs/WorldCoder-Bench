<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Product Customizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
  canvas { display: block; }

  .panel {
    position: fixed;
    background: rgba(26, 26, 46, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 16px;
    color: #e0e0e0;
  }

  .panel h3 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
    color: #8888cc;
    font-weight: 600;
  }

  /* Left panel - Part selector */
  #part-panel {
    top: 50%;
    left: 20px;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 140px;
  }

  .part-btn {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: #ccc;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s ease;
    text-align: left;
  }

  .part-btn:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(255, 255, 255, 0.25);
    color: #fff;
  }

  .part-btn.active {
    background: rgba(100, 100, 220, 0.3);
    border-color: rgba(100, 100, 220, 0.6);
    color: #fff;
    box-shadow: 0 0 12px rgba(100, 100, 220, 0.2);
  }

  .part-btn .color-indicator {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-right: 8px;
    border: 1px solid rgba(255,255,255,0.3);
    vertical-align: middle;
  }

  /* Right panel - Color palette */
  #color-panel {
    top: 50%;
    right: 20px;
    transform: translateY(-50%);
    min-width: 140px;
  }

  .color-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .color-swatch {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    border: 2px solid rgba(255, 255, 255, 0.15);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
  }

  .color-swatch:hover {
    transform: scale(1.15);
    border-color: rgba(255, 255, 255, 0.5);
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
  }

  .color-swatch:active {
    transform: scale(0.95);
  }

  .color-label {
    font-size: 9px;
    text-align: center;
    margin-top: 2px;
    color: #888;
  }

  .swatch-container {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Top panel - Actions */
  #action-panel {
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    flex-direction: row;
  }

  .action-btn {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: #ccc;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .action-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
    border-color: rgba(255, 255, 255, 0.3);
  }

  .action-btn.rotate-active {
    background: rgba(220, 100, 100, 0.3);
    border-color: rgba(220, 100, 100, 0.6);
    color: #ffaaaa;
  }

  /* Status bar */
  #status-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(26, 26, 46, 0.9);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    padding: 10px 24px;
    color: #8888cc;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #status-bar::before {
    content: '●';
    color: #44cc88;
    font-size: 8px;
  }

  /* Title */
  #title {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.15);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 4px;
    pointer-events: none;
  }

  /* Loading overlay */
  #loading {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 1000;
    transition: opacity 0.5s ease;
  }

  #loading.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #8888cc;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    color: #8888cc;
    margin-top: 16px;
    font-size: 13px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Loading Model...</div>
</div>

<div id="part-panel" class="panel">
  <h3>Parts</h3>
</div>

<div id="color-panel" class="panel">
  <h3>Colors</h3>
  <div class="color-grid" id="color-grid"></div>
</div>

<div id="action-panel" class="panel">
  <button class="action-btn" id="btn-save">💾 Save State</button>
  <button class="action-btn" id="btn-load">📂 Load State</button>
  <button class="action-btn" id="btn-reset">🔄 Reset</button>
  <button class="action-btn" id="btn-rotate">⟳ Rotate Toggle</button>
</div>

<div id="title">3D Product Customizer</div>

<div id="status-bar">Ready</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── State ──
window.__3D_STATE__ = {
  modelLoaded: false,
  selectedPart: 0,
  partColors: ['#ffffff', '#ffffff', '#ffffff', '#ffffff', '#ffffff'],
  autoRotate: false,
  rotationAngle: 0,
  savedConfig: null,
  lastAction: 'Ready',
  cameraDistance: 3,
  meshCount: 0,
  partsAvailable: 0
};

const state = window.__3D_STATE__;
const statusBar = document.getElementById('status-bar');

function setStatus(msg) {
  state.lastAction = msg;
  statusBar.textContent = msg;
}

// ── Scene Setup ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 1.5, 3);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.prepend(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 5, 5);
dirLight.castShadow = true;
scene.add(dirLight);

// Extra fill light
const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
fillLight.position.set(-3, 2, -3);
scene.add(fillLight);

// Grid
const gridHelper = new THREE.GridHelper(6, 20, 0x333355, 0x222244);
gridHelper.position.y = -0.75;
scene.add(gridHelper);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);
controls.update();

// ── Model Loading ──
let modelGroup = null;
const meshParts = [];

const loader = new GLTFLoader();
loader.load(
  'WaterBottle.glb',
  (gltf) => {
    const model = gltf.scene;

    // Find all meshes
    model.traverse((child) => {
      if (child.isMesh) {
        meshParts.push(child);
      }
    });

    state.meshCount = meshParts.length;
    state.partsAvailable = Math.min(meshParts.length, 5);

    // Auto-scale to fit bounding box ~1.5 units
    const box = new THREE.Box3().setFromObject(model);
    const size = new THREE.Vector3();
    const center = new THREE.Vector3();
    box.getSize(size);
    box.getCenter(center);

    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 1.5 / maxDim;
    model.scale.setScalar(scale);

    // Re-center
    box.setFromObject(model);
    box.getCenter(center);
    model.position.sub(center);

    modelGroup = new THREE.Group();
    modelGroup.add(model);
    scene.add(modelGroup);

    // Clone materials so each mesh has its own
    for (let i = 0; i < state.partsAvailable; i++) {
      const mesh = meshParts[i];
      mesh.material = mesh.material.clone();
      // Set initial color to white
      mesh.material.color = new THREE.Color('#ffffff');
      mesh.material.emissive = new THREE.Color(0x000000);
      mesh.material.emissiveIntensity = 0;
    }

    state.modelLoaded = true;
    document.getElementById('loading').classList.add('hidden');
    setStatus(`Model loaded — ${state.meshCount} meshes found, ${state.partsAvailable} customizable parts`);

    buildPartButtons();
    highlightSelectedPart();
  },
  (progress) => {
    if (progress.total > 0) {
      const pct = Math.round((progress.loaded / progress.total) * 100);
      document.querySelector('.loading-text').textContent = `Loading... ${pct}%`;
    }
  },
  (error) => {
    console.error('Error loading model:', error);
    document.querySelector('.loading-text').textContent = 'Failed to load model. Check console.';
    setStatus('Error loading model');
  }
);

// ── Part Buttons ──
function buildPartButtons() {
  const panel = document.getElementById('part-panel');
  // Remove old buttons if any
  panel.querySelectorAll('.part-btn').forEach(b => b.remove());

  for (let i = 0; i < state.partsAvailable; i++) {
    const btn = document.createElement('button');
    btn.className = 'part-btn' + (i === state.selectedPart ? ' active' : '');
    btn.id = `btn-part-${i}`;
    btn.innerHTML = `<span class="color-indicator" style="background:${state.partColors[i]}"></span>Part ${i}`;
    btn.addEventListener('click', () => selectPart(i));
    panel.appendChild(btn);
  }

  // If fewer than 5 parts, still create the remaining buttons but disabled
  for (let i = state.partsAvailable; i < 5; i++) {
    const btn = document.createElement('button');
    btn.className = 'part-btn';
    btn.id = `btn-part-${i}`;
    btn.innerHTML = `<span class="color-indicator" style="background:#333"></span>Part ${i}`;
    btn.style.opacity = '0.3';
    btn.style.cursor = 'not-allowed';
    panel.appendChild(btn);
  }
}

function selectPart(index) {
  if (index >= state.partsAvailable) return;
  state.selectedPart = index;

  document.querySelectorAll('.part-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });

  highlightSelectedPart();
  setStatus(`Selected Part ${index}`);
}

function highlightSelectedPart() {
  for (let i = 0; i < state.partsAvailable; i++) {
    const mesh = meshParts[i];
    if (i === state.selectedPart) {
      mesh.material.emissive = new THREE.Color(0x333366);
      mesh.material.emissiveIntensity = 0.4;
    } else {
      mesh.material.emissive = new THREE.Color(0x000000);
      mesh.material.emissiveIntensity = 0;
    }
  }
}

// ── Color Palette ──
const colors = [
  { hex: '#ff0000', name: 'Red' },
  { hex: '#00ff00', name: 'Green' },
  { hex: '#0000ff', name: 'Blue' },
  { hex: '#ffff00', name: 'Yellow' },
  { hex: '#ff00ff', name: 'Magenta' },
  { hex: '#ffffff', name: 'White' }
];

const colorGrid = document.getElementById('color-grid');
colors.forEach(c => {
  const container = document.createElement('div');
  container.className = 'swatch-container';

  const btn = document.createElement('button');
  btn.className = 'color-swatch';
  btn.id = `color-${c.hex.slice(1)}`;
  btn.style.background = c.hex;
  btn.title = c.name;
  btn.addEventListener('click', () => applyColor(c.hex));

  const label = document.createElement('div');
  label.className = 'color-label';
  label.textContent = c.name;

  container.appendChild(btn);
  container.appendChild(label);
  colorGrid.appendChild(container);
});

function applyColor(hex) {
  if (!state.modelLoaded) return;
  const idx = state.selectedPart;
  if (idx >= state.partsAvailable) return;

  state.partColors[idx] = hex;
  meshParts[idx].material.color = new THREE.Color(hex);

  // Update button indicator
  const btn = document.getElementById(`btn-part-${idx}`);
  if (btn) {
    const indicator = btn.querySelector('.color-indicator');
    if (indicator) indicator.style.background = hex;
  }

  highlightSelectedPart();
  setStatus(`Color applied: ${hex} to Part ${idx}`);
}

// ── Action Buttons ──
document.getElementById('btn-save').addEventListener('click', () => {
  const json = JSON.stringify(state.partColors);
  localStorage.setItem('sneaker_config', json);
  state.savedConfig = json;
  setStatus('Saved configuration');
});

document.getElementById('btn-load').addEventListener('click', () => {
  const json = localStorage.getItem('sneaker_config');
  if (!json) {
    setStatus('No saved configuration found');
    return;
  }

  try {
    const colors = JSON.parse(json);
    state.savedConfig = json;

    for (let i = 0; i < state.partsAvailable; i++) {
      const hex = colors[i] || '#ffffff';
      state.partColors[i] = hex;
      meshParts[i].material.color = new THREE.Color(hex);

      const btn = document.getElementById(`btn-part-${i}`);
      if (btn) {
        const indicator = btn.querySelector('.color-indicator');
        if (indicator) indicator.style.background = hex;
      }
    }

    highlightSelectedPart();
    setStatus('Loaded configuration');
  } catch (e) {
    setStatus('Error loading configuration');
  }
});

document.getElementById('btn-reset').addEventListener('click', () => {
  for (let i = 0; i < state.partsAvailable; i++) {
    state.partColors[i] = '#ffffff';
    meshParts[i].material.color = new THREE.Color('#ffffff');

    const btn = document.getElementById(`btn-part-${i}`);
    if (btn) {
      const indicator = btn.querySelector('.color-indicator');
      if (indicator) indicator.style.background = '#ffffff';
    }
  }
  // Reset remaining partColors entries too
  for (let i = state.partsAvailable; i < 5; i++) {
    state.partColors[i] = '#ffffff';
  }

  highlightSelectedPart();
  setStatus('Reset to defaults');
});

const rotateBtn = document.getElementById('btn-rotate');
rotateBtn.addEventListener('click', () => {
  state.autoRotate = !state.autoRotate;
  if (state.autoRotate) {
    rotateBtn.textContent = '⏹ Stop Rotation';
    rotateBtn.classList.add('rotate-active');
  } else {
    rotateBtn.textContent = '⟳ Rotate Toggle';
    rotateBtn.classList.remove('rotate-active');
  }
  setStatus(state.autoRotate ? 'Auto-rotation enabled' : 'Auto-rotation disabled');
});

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Animation Loop ──
function animate() {
  requestAnimationFrame(animate);

  if (state.autoRotate && modelGroup) {
    state.rotationAngle += 0.01;
    modelGroup.rotation.y = state.rotationAngle;
  }

  state.cameraDistance = camera.position.distanceTo(controls.target);

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
