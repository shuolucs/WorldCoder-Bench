<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Product Customizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .ui-layer {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            width: 100%;
            height: 100%;
        }

        .panel {
            background: rgba(15, 15, 30, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* Top Controls */
        #top-controls {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        button {
            background: #2a2a4a;
            color: #fff;
            border: 1px solid #4a4a6a;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #3a3a5a;
            border-color: #6a6a8a;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Left Panel - Parts */
        #left-panel {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 120px;
        }

        #left-panel h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            text-align: center;
        }

        .part-btn {
            width: 100%;
            text-align: left;
            padding: 10px 15px;
            background: transparent;
            border: 1px solid transparent;
            border-left: 3px solid transparent;
            border-radius: 0 6px 6px 0;
        }

        .part-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .part-btn.active {
            background: rgba(255, 255, 255, 0.1);
            border-left: 3px solid #00ffcc;
            color: #00ffcc;
        }

        .part-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Right Panel - Colors */
        #right-panel {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
        }

        #right-panel h3 {
            margin: 0 0 15px 0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            text-align: center;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .color-swatch {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            padding: 0;
        }

        .color-swatch:hover {
            transform: scale(1.1);
            border-color: #fff;
        }

        /* Bottom Status Bar */
        #status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 20, 0.9);
            padding: 10px 20px;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            color: #00ffcc;
            border-top: 1px solid #333;
            pointer-events: auto;
        }

        /* Loading Overlay */
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            transition: opacity 0.5s;
        }
    </style>
    
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="loading">LOADING MODEL...</div>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <div id="top-controls" class="panel">
            <button id="btn-save">Save State</button>
            <button id="btn-load">Load State</button>
            <button id="btn-reset">Reset</button>
            <button id="btn-rotate">Rotate Toggle</button>
        </div>

        <div id="left-panel" class="panel">
            <h3>Parts</h3>
            <button id="btn-part-0" class="part-btn active">Part 0</button>
            <button id="btn-part-1" class="part-btn">Part 1</button>
            <button id="btn-part-2" class="part-btn">Part 2</button>
            <button id="btn-part-3" class="part-btn">Part 3</button>
            <button id="btn-part-4" class="part-btn">Part 4</button>
        </div>

        <div id="right-panel" class="panel">
            <h3>Colors</h3>
            <div class="color-grid">
                <button id="color-ff0000" class="color-swatch" style="background-color: #ff0000;" title="Red"></button>
                <button id="color-00ff00" class="color-swatch" style="background-color: #00ff00;" title="Green"></button>
                <button id="color-0000ff" class="color-swatch" style="background-color: #0000ff;" title="Blue"></button>
                <button id="color-ffff00" class="color-swatch" style="background-color: #ffff00;" title="Yellow"></button>
                <button id="color-ff00ff" class="color-swatch" style="background-color: #ff00ff;" title="Magenta"></button>
                <button id="color-ffffff" class="color-swatch" style="background-color: #ffffff;" title="White"></button>
            </div>
        </div>

        <div id="status-bar">Initializing scene...</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            selectedPart: 0,
            partColors: ['#ffffff', '#ffffff', '#ffffff', '#ffffff', '#ffffff'],
            autoRotate: false,
            rotationAngle: 0,
            savedConfig: null,
            lastAction: 'Initializing scene...',
            cameraDistance: 3,
            meshCount: 0,
            partsAvailable: 0
        };

        const MAX_PARTS = 5;
        let customizableMeshes = [];
        let modelGroup = new THREE.Group();

        // --- DOM ELEMENTS ---
        const statusBar = document.getElementById('status-bar');
        const loadingScreen = document.getElementById('loading');
        const partButtons = [];
        for (let i = 0; i < MAX_PARTS; i++) {
            partButtons.push(document.getElementById(`btn-part-${i}`));
        }

        function updateStatus(message) {
            window.__3D_STATE__.lastAction = message;
            statusBar.textContent = message;
        }

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 3);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 1;
        controls.maxDistance = 10;
        controls.target.set(0, 0.5, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        // Grid
        const gridHelper = new THREE.GridHelper(10, 20, 0x444444, 0x222222);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        scene.add(modelGroup);

        // --- MODEL LOADING ---
        const loader = new GLTFLoader();
        const modelUrl = 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/WaterBottle/WaterBottle.glb';

        loader.load(
            modelUrl,
            (gltf) => {
                const model = gltf.scene;
                let totalMeshes = 0;

                model.traverse((child) => {
                    if (child.isMesh) {
                        totalMeshes++;
                        if (customizableMeshes.length < MAX_PARTS) {
                            // Clone material to ensure independent coloring
                            child.material = child.material.clone();
                            // Ensure material can show colors properly
                            if (child.material.color) {
                                child.material.color.setHex(0xffffff);
                            }
                            customizableMeshes.push(child);
                        }
                    }
                });

                window.__3D_STATE__.meshCount = totalMeshes;
                window.__3D_STATE__.partsAvailable = customizableMeshes.length;

                // Center and Scale
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 1.5 / maxDim;
                model.scale.setScalar(scale);
                
                model.position.sub(center.multiplyScalar(scale));
                
                // Adjust Y to sit on grid
                const newBox = new THREE.Box3().setFromObject(model);
                model.position.y -= newBox.min.y;

                modelGroup.add(model);
                
                window.__3D_STATE__.modelLoaded = true;
                loadingScreen.style.opacity = '0';
                setTimeout(() => loadingScreen.style.display = 'none', 500);
                
                setupUI();
                highlightPart(0);
                updateStatus(`Model loaded. Found ${totalMeshes} meshes, ${window.__3D_STATE__.partsAvailable} customizable.`);
            },
            undefined,
            (error) => {
                console.error('Error loading model:', error);
                updateStatus('Error loading model.');
                loadingScreen.textContent = 'ERROR LOADING MODEL';
            }
        );

        // --- INTERACTION LOGIC ---

        function highlightPart(index) {
            if (index >= window.__3D_STATE__.partsAvailable) return;
            
            window.__3D_STATE__.selectedPart = index;

            // Update 3D Emissive
            customizableMeshes.forEach((mesh, i) => {
                if (mesh.material && mesh.material.emissive) {
                    if (i === index) {
                        mesh.material.emissive.setHex(0x333333);
                    } else {
                        mesh.material.emissive.setHex(0x000000);
                    }
                }
            });

            // Update UI
            partButtons.forEach((btn, i) => {
                if (i < window.__3D_STATE__.partsAvailable) {
                    if (i === index) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                }
            });
        }

        function applyColor(hexString) {
            const idx = window.__3D_STATE__.selectedPart;
            if (idx < window.__3D_STATE__.partsAvailable) {
                const mesh = customizableMeshes[idx];
                if (mesh.material && mesh.material.color) {
                    mesh.material.color.set(hexString);
                    window.__3D_STATE__.partColors[idx] = hexString;
                    updateStatus(`Color applied: ${hexString} to Part ${idx}`);
                }
            }
        }

        function setupUI() {
            // Disable unused part buttons
            partButtons.forEach((btn, i) => {
                if (i >= window.__3D_STATE__.partsAvailable) {
                    btn.disabled = true;
                    btn.style.opacity = '0.2';
                } else {
                    btn.addEventListener('click', () => highlightPart(i));
                }
            });

            // Color Swatches
            const colors = ['ff0000', '00ff00', '0000ff', 'ffff00', 'ff00ff', 'ffffff'];
            colors.forEach(hex => {
                document.getElementById(`color-${hex}`).addEventListener('click', () => {
                    applyColor(`#${hex}`);
                });
            });

            // Save
            document.getElementById('btn-save').addEventListener('click', () => {
                const configStr = JSON.stringify(window.__3D_STATE__.partColors);
                localStorage.setItem('sneaker_config', configStr);
                window.__3D_STATE__.savedConfig = configStr;
                updateStatus('Saved configuration');
            });

            // Load
            document.getElementById('btn-load').addEventListener('click', () => {
                const configStr = localStorage.getItem('sneaker_config');
                if (configStr) {
                    try {
                        const colors = JSON.parse(configStr);
                        colors.forEach((color, i) => {
                            if (i < window.__3D_STATE__.partsAvailable) {
                                window.__3D_STATE__.partColors[i] = color;
                                customizableMeshes[i].material.color.set(color);
                            }
                        });
                        window.__3D_STATE__.savedConfig = configStr;
                        updateStatus('Loaded configuration');
                    } catch (e) {
                        updateStatus('Error parsing saved configuration');
                    }
                } else {
                    updateStatus('No saved configuration found');
                }
            });

            // Reset
            document.getElementById('btn-reset').addEventListener('click', () => {
                window.__3D_STATE__.partColors.fill('#ffffff');
                customizableMeshes.forEach(mesh => {
                    if (mesh.material && mesh.material.color) {
                        mesh.material.color.set('#ffffff');
                    }
                });
                updateStatus('Reset to defaults');
            });

            // Rotate Toggle
            const btnRotate = document.getElementById('btn-rotate');
            btnRotate.addEventListener('click', () => {
                window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
                btnRotate.textContent = window.__3D_STATE__.autoRotate ? 'Stop Rotation' : 'Rotate Toggle';
                updateStatus(window.__3D_STATE__.autoRotate ? 'Auto-rotation enabled' : 'Auto-rotation disabled');
            });
        }

        // --- RESIZE HANDLER ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            controls.update();

            if (window.__3D_STATE__.modelLoaded && window.__3D_STATE__.autoRotate) {
                modelGroup.rotation.y += 0.01;
                window.__3D_STATE__.rotationAngle = modelGroup.rotation.y;
            }

            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
