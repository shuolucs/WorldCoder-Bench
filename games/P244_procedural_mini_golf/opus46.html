<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procedural Mini Golf</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: Arial, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  #hud-top-left {
    position: absolute;
    top: 15px; left: 15px;
    color: white;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    font-size: 18px;
    line-height: 1.6;
  }
  #hud-top-center {
    position: absolute;
    top: 15px; left: 50%; transform: translateX(-50%);
    color: white;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    font-size: 22px;
    font-weight: bold;
    text-align: center;
  }
  #hud-top-right {
    position: absolute;
    top: 15px; right: 15px;
    pointer-events: all;
  }
  #hud-top-right button {
    display: block;
    margin-bottom: 8px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
    background: rgba(255,255,255,0.9);
    border: 2px solid #333;
    border-radius: 5px;
    font-weight: bold;
  }
  #hud-top-right button:hover {
    background: #fff;
  }
  #power-bar-container {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 20px;
    background: rgba(0,0,0,0.5);
    border: 2px solid white;
    border-radius: 4px;
    overflow: hidden;
  }
  #power-bar-fill {
    width: 0%;
    height: 100%;
    transition: none;
    border-radius: 2px;
  }
  #power-label {
    position: absolute;
    bottom: 65px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    font-size: 14px;
  }
</style>
</head>
<body>

<div id="hud">
  <div id="hud-top-left">
    <div id="hole-label">Hole 1</div>
    <div id="strokes-label">Strokes: 0</div>
    <div id="par-label">Par: 3</div>
  </div>
  <div id="hud-top-center">
    <div id="status-message">Aim and shoot!</div>
  </div>
  <div id="hud-top-right">
    <button id="reset-btn">Reset Ball</button>
    <button id="new-course-btn">New Course</button>
  </div>
  <div id="power-label">Power</div>
  <div id="power-bar-container">
    <div id="power-bar-fill"></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 12, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// Course dimensions
const courseWidth = 8;
const courseLength = 20;
const wallHeight = 0.3;
const wallThickness = 0.3;

// Course group
let courseGroup = new THREE.Group();
scene.add(courseGroup);

// Hole position
const holePosition = { x: 0, z: -7 };
const holeRadius = 0.4;

// Tee position
const teePosition = { x: 0, y: 0.2, z: 6 };

// Obstacles
let obstacles = [
  { x: -2, z: -3, w: 3, d: 0.5 },
  { x: 1.5, z: -5, w: 2.5, d: 0.5 }
];
let obstacleMeshes = [];

// Ferrari
let ferrariModel = null;
let ferrariLoaded = false;
let ferrariPosition = new THREE.Vector3(0, 0.5, -1);
let ferrariCollisionRadius = 1.5;

// Ball
const ballGeometry = new THREE.SphereGeometry(0.2, 32, 32);
const ballMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
const ball = new THREE.Mesh(ballGeometry, ballMaterial);
ball.castShadow = true;
ball.position.set(teePosition.x, teePosition.y, teePosition.z);
scene.add(ball);

// Ball physics
let ballVelocity = new THREE.Vector3(0, 0, 0);
const friction = 0.985;
const minSpeed = 0.01;

// Game state
let strokes = 0;
let holeComplete = false;
let aimAngle = 0; // radians, 0 = negative Z direction (toward hole)
let power = 0;
let charging = false;
let chargeStartTime = 0;
let gameStatus = 'aiming';

// Arrow helper
let arrowHelper = null;

function createArrowHelper() {
  if (arrowHelper) scene.remove(arrowHelper);
  const dir = new THREE.Vector3(-Math.sin(aimAngle), 0, -Math.cos(aimAngle)).normalize();
  arrowHelper = new THREE.ArrowHelper(dir, ball.position.clone(), 2, 0xff4444, 0.4, 0.2);
  scene.add(arrowHelper);
}

function updateArrowHelper() {
  if (!arrowHelper) createArrowHelper();
  const dir = new THREE.Vector3(-Math.sin(aimAngle), 0, -Math.cos(aimAngle)).normalize();
  arrowHelper.setDirection(dir);
  arrowHelper.position.copy(ball.position);
  arrowHelper.visible = !isBallMoving() && !holeComplete;
}

function isBallMoving() {
  return ballVelocity.length() > minSpeed;
}

// Build course
function buildCourse() {
  // Clear old course
  while (courseGroup.children.length > 0) {
    courseGroup.remove(courseGroup.children[0]);
  }
  obstacleMeshes = [];

  // Green surface
  const courseGeo = new THREE.BoxGeometry(courseWidth, 0.2, courseLength);
  const courseMat = new THREE.MeshStandardMaterial({ color: 0x2d8a4e });
  const courseMesh = new THREE.Mesh(courseGeo, courseMat);
  courseMesh.position.set(0, -0.1, 0);
  courseMesh.receiveShadow = true;
  courseGroup.add(courseMesh);

  // Walls
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });

  // Left wall
  const leftWall = new THREE.Mesh(
    new THREE.BoxGeometry(wallThickness, wallHeight, courseLength + wallThickness * 2),
    wallMat
  );
  leftWall.position.set(-courseWidth / 2 - wallThickness / 2, wallHeight / 2, 0);
  leftWall.castShadow = true;
  courseGroup.add(leftWall);

  // Right wall
  const rightWall = new THREE.Mesh(
    new THREE.BoxGeometry(wallThickness, wallHeight, courseLength + wallThickness * 2),
    wallMat
  );
  rightWall.position.set(courseWidth / 2 + wallThickness / 2, wallHeight / 2, 0);
  rightWall.castShadow = true;
  courseGroup.add(rightWall);

  // Back wall (far end, negative Z)
  const backWall = new THREE.Mesh(
    new THREE.BoxGeometry(courseWidth + wallThickness * 2, wallHeight, wallThickness),
    wallMat
  );
  backWall.position.set(0, wallHeight / 2, -courseLength / 2 - wallThickness / 2);
  backWall.castShadow = true;
  courseGroup.add(backWall);

  // Front wall (near end, positive Z)
  const frontWall = new THREE.Mesh(
    new THREE.BoxGeometry(courseWidth + wallThickness * 2, wallHeight, wallThickness),
    wallMat
  );
  frontWall.position.set(0, wallHeight / 2, courseLength / 2 + wallThickness / 2);
  frontWall.castShadow = true;
  courseGroup.add(frontWall);

  // Hole
  const holeGeo = new THREE.CylinderGeometry(holeRadius, holeRadius, 0.2, 32);
  const holeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
  const holeMesh = new THREE.Mesh(holeGeo, holeMat);
  holeMesh.position.set(holePosition.x, -0.05, holePosition.z);
  courseGroup.add(holeMesh);

  // Flag pole
  const poleGeo = new THREE.CylinderGeometry(0.05, 0.05, 2, 8);
  const poleMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
  const pole = new THREE.Mesh(poleGeo, poleMat);
  pole.position.set(holePosition.x, 1, holePosition.z);
  pole.castShadow = true;
  courseGroup.add(pole);

  // Flag
  const flagGeo = new THREE.BufferGeometry();
  const vertices = new Float32Array([
    0, 0, 0,
    0.6, -0.2, 0,
    0, -0.4, 0
  ]);
  flagGeo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
  flagGeo.computeVertexNormals();
  const flagMat = new THREE.MeshStandardMaterial({ color: 0xff0000, side: THREE.DoubleSide });
  const flag = new THREE.Mesh(flagGeo, flagMat);
  flag.position.set(holePosition.x + 0.05, 2, holePosition.z);
  courseGroup.add(flag);

  // Tee marker
  const teeGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.02, 16);
  const teeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
  const teeMesh = new THREE.Mesh(teeGeo, teeMat);
  teeMesh.position.set(teePosition.x, 0.01, teePosition.z);
  courseGroup.add(teeMesh);

  // Obstacles (bumpers)
  const bumperMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
  obstacles.forEach(obs => {
    const bumperGeo = new THREE.BoxGeometry(obs.w, 0.5, obs.d);
    const bumper = new THREE.Mesh(bumperGeo, bumperMat);
    bumper.position.set(obs.x, 0.25, obs.z);
    bumper.castShadow = true;
    bumper.receiveShadow = true;
    courseGroup.add(bumper);
    obstacleMeshes.push({
      mesh: bumper,
      minX: obs.x - obs.w / 2,
      maxX: obs.x + obs.w / 2,
      minZ: obs.z - obs.d / 2,
      maxZ: obs.z + obs.d / 2
    });
  });
}

buildCourse();

// Load Ferrari
const loader = new GLTFLoader();
function loadFerrari() {
  loader.load('ferrari.glb', (gltf) => {
    if (ferrariModel) scene.remove(ferrariModel);
    ferrariModel = gltf.scene;
    ferrariModel.scale.set(0.8, 0.8, 0.8);
    ferrariModel.position.copy(ferrariPosition);
    ferrariModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(ferrariModel);
    ferrariLoaded = true;
  }, undefined, (error) => {
    console.warn('Could not load ferrari.glb:', error);
    // Create a placeholder car
    createPlaceholderCar();
  });
}

function createPlaceholderCar() {
  if (ferrariModel) scene.remove(ferrariModel);
  ferrariModel = new THREE.Group();

  // Car body
  const bodyGeo = new THREE.BoxGeometry(1.2, 0.5, 2.5);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.25;
  body.castShadow = true;
  ferrariModel.add(body);

  // Car top
  const topGeo = new THREE.BoxGeometry(0.9, 0.35, 1.2);
  const top = new THREE.Mesh(topGeo, bodyMat);
  top.position.y = 0.65;
  top.position.z = -0.2;
  top.castShadow = true;
  ferrariModel.add(top);

  // Wheels
  const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.15, 16);
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
  const wheelPositions = [
    [-0.65, 0.1, 0.7],
    [0.65, 0.1, 0.7],
    [-0.65, 0.1, -0.7],
    [0.65, 0.1, -0.7]
  ];
  wheelPositions.forEach(pos => {
    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
    wheel.rotation.z = Math.PI / 2;
    wheel.position.set(...pos);
    ferrariModel.add(wheel);
  });

  ferrariModel.position.copy(ferrariPosition);
  scene.add(ferrariModel);
  ferrariLoaded = true;
}

loadFerrari();

// Input handling
const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.code] = true;

  if (e.code === 'Space' && !charging && !isBallMoving() && !holeComplete) {
    charging = true;
    chargeStartTime = performance.now();
    power = 0;
    e.preventDefault();
  }
  if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
    e.preventDefault();
  }
});

window.addEventListener('keyup', (e) => {
  keys[e.code] = false;

  if (e.code === 'Space' && charging) {
    charging = false;
    if (!isBallMoving() && !holeComplete && power > 0) {
      shoot();
    }
    e.preventDefault();
  }
});

function shoot() {
  const dir = new THREE.Vector3(-Math.sin(aimAngle), 0, -Math.cos(aimAngle));
  ballVelocity.copy(dir.multiplyScalar(power));
  strokes++;
  power = 0;
  gameStatus = 'moving';
}

// Reset ball
function resetBall() {
  ball.position.set(teePosition.x, teePosition.y, teePosition.z);
  ballVelocity.set(0, 0, 0);
  strokes = 0;
  holeComplete = false;
  power = 0;
  charging = false;
  gameStatus = 'aiming';
}

// Randomize obstacles
function randomizeCourse() {
  obstacles = [
    {
      x: (Math.random() - 0.5) * (courseWidth - 4),
      z: -1 - Math.random() * 4,
      w: 1.5 + Math.random() * 2,
      d: 0.5
    },
    {
      x: (Math.random() - 0.5) * (courseWidth - 4),
      z: -3 - Math.random() * 4,
      w: 1.5 + Math.random() * 2,
      d: 0.5
    }
  ];
  ferrariPosition.x = (Math.random() - 0.5) * (courseWidth - 3);
  ferrariPosition.z = -1 - Math.random() * 3;

  buildCourse();
  if (ferrariModel) {
    ferrariModel.position.copy(ferrariPosition);
  }
  resetBall();
}

// Buttons
document.getElementById('reset-btn').addEventListener('click', resetBall);
document.getElementById('new-course-btn').addEventListener('click', randomizeCourse);

// HUD elements
const holeLabelEl = document.getElementById('hole-label');
const strokesLabelEl = document.getElementById('strokes-label');
const statusMessageEl = document.getElementById('status-message');
const powerBarFill = document.getElementById('power-bar-fill');
const powerLabel = document.getElementById('power-label');
const powerBarContainer = document.getElementById('power-bar-container');

// State
window.__3D_STATE__ = {};

// Clock
const clock = new THREE.Clock();

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  let dt = clock.getDelta();
  if (dt > 1 / 30) dt = 1 / 30;

  // Aim controls
  if (!isBallMoving() && !holeComplete) {
    if (keys['ArrowLeft']) {
      aimAngle -= 0.05;
    }
    if (keys['ArrowRight']) {
      aimAngle += 0.05;
    }
  }

  // Power charging
  if (charging && !isBallMoving() && !holeComplete) {
    const elapsed = (performance.now() - chargeStartTime) / 1000;
    power = Math.min(10, (elapsed / 2) * 10);
  }

  // Ball physics
  if (isBallMoving() && !holeComplete) {
    // Apply friction
    ballVelocity.multiplyScalar(friction);

    // Move ball
    ball.position.x += ballVelocity.x * dt;
    ball.position.z += ballVelocity.z * dt;

    const ballRadius = 0.2;
    const halfW = courseWidth / 2;
    const halfL = courseLength / 2;

    // Wall collisions
    if (ball.position.x - ballRadius < -halfW) {
      ball.position.x = -halfW + ballRadius;
      ballVelocity.x = Math.abs(ballVelocity.x) * 0.7;
    }
    if (ball.position.x + ballRadius > halfW) {
      ball.position.x = halfW - ballRadius;
      ballVelocity.x = -Math.abs(ballVelocity.x) * 0.7;
    }
    if (ball.position.z - ballRadius < -halfL) {
      ball.position.z = -halfL + ballRadius;
      ballVelocity.z = Math.abs(ballVelocity.z) * 0.7;
    }
    if (ball.position.z + ballRadius > halfL) {
      ball.position.z = halfL - ballRadius;
      ballVelocity.z = -Math.abs(ballVelocity.z) * 0.7;
    }

    // Bumper collisions (AABB)
    obstacleMeshes.forEach(obs => {
      const bx = ball.position.x;
      const bz = ball.position.z;

      // Check if ball overlaps with bumper
      const closestX = Math.max(obs.minX, Math.min(bx, obs.maxX));
      const closestZ = Math.max(obs.minZ, Math.min(bz, obs.maxZ));
      const distX = bx - closestX;
      const distZ = bz - closestZ;
      const dist = Math.sqrt(distX * distX + distZ * distZ);

      if (dist < ballRadius) {
        // Determine which side to reflect
        const overlapLeft = bx - (obs.minX - ballRadius);
        const overlapRight = (obs.maxX + ballRadius) - bx;
        const overlapFront = (obs.maxZ + ballRadius) - bz;
        const overlapBack = bz - (obs.minZ - ballRadius);

        const minOverlap = Math.min(overlapLeft, overlapRight, overlapFront, overlapBack);

        if (minOverlap === overlapLeft || minOverlap === overlapRight) {
          ballVelocity.x *= -0.7;
          if (minOverlap === overlapLeft) ball.position.x = obs.minX - ballRadius;
          else ball.position.x = obs.maxX + ballRadius;
        } else {
          ballVelocity.z *= -0.7;
          if (minOverlap === overlapBack) ball.position.z = obs.minZ - ballRadius;
          else ball.position.z = obs.maxZ + ballRadius;
        }
      }
    });

    // Ferrari collision
    if (ferrariModel) {
      const fPos = ferrariModel.position;
      const dx = ball.position.x - fPos.x;
      const dz = ball.position.z - fPos.z;
      const dist = Math.sqrt(dx * dx + dz * dz);

      if (dist < ferrariCollisionRadius + ballRadius) {
        // Reflect velocity away from ferrari center
        const nx = dx / dist;
        const nz = dz / dist;
        const dot = ballVelocity.x * nx + ballVelocity.z * nz;
        if (dot < 0) {
          ballVelocity.x -= 2 * dot * nx;
          ballVelocity.z -= 2 * dot * nz;
          ballVelocity.multiplyScalar(0.6);
        }
        // Push ball out
        ball.position.x = fPos.x + nx * (ferrariCollisionRadius + ballRadius);
        ball.position.z = fPos.z + nz * (ferrariCollisionRadius + ballRadius);
      }
    }

    // Stop check
    if (ballVelocity.length() < minSpeed) {
      ballVelocity.set(0, 0, 0);
      gameStatus = 'aiming';
    }

    // Hole detection
    const hDx = ball.position.x - holePosition.x;
    const hDz = ball.position.z - holePosition.z;
    const holeDist = Math.sqrt(hDx * hDx + hDz * hDz);

    if (holeDist < 0.5 && ballVelocity.length() < 2.0) {
      ball.position.set(holePosition.x, 0.0, holePosition.z);
      ballVelocity.set(0, 0, 0);
      holeComplete = true;
      gameStatus = 'complete';
    }
  }

  // Ferrari rotation
  if (ferrariModel) {
    ferrariModel.rotation.y += 0.3 * dt;
  }

  // Update arrow
  updateArrowHelper();

  // Update HUD
  strokesLabelEl.textContent = `Strokes: ${strokes}`;

  if (holeComplete) {
    if (strokes === 1) {
      statusMessageEl.textContent = 'HOLE IN ONE!';
    } else {
      statusMessageEl.textContent = `Hole Complete! Strokes: ${strokes}`;
    }
    statusMessageEl.style.color = '#FFD700';
  } else if (isBallMoving()) {
    statusMessageEl.textContent = 'Ball in motion...';
    statusMessageEl.style.color = 'white';
  } else {
    statusMessageEl.textContent = 'Aim and shoot!';
    statusMessageEl.style.color = 'white';
  }

  // Power bar
  const powerPct = (power / 10) * 100;
  powerBarFill.style.width = powerPct + '%';

  // Color gradient: green -> yellow -> red
  let r, g, b;
  const t = power / 10;
  if (t < 0.5) {
    r = Math.floor(255 * (t * 2));
    g = 255;
    b = 0;
  } else {
    r = 255;
    g = Math.floor(255 * (1 - (t - 0.5) * 2));
    b = 0;
  }
  powerBarFill.style.background = `rgb(${r},${g},${b})`;

  const showPower = charging || (!isBallMoving() && !holeComplete);
  powerBarContainer.style.display = showPower ? 'block' : 'none';
  powerLabel.style.display = showPower ? 'block' : 'none';

  // Update state
  window.__3D_STATE__ = {
    ballPosition: { x: ball.position.x, y: ball.position.y, z: ball.position.z },
    ballVelocity: { x: ballVelocity.x, y: ballVelocity.y, z: ballVelocity.z },
    ballSpeed: ballVelocity.length(),
    ballMoving: isBallMoving(),
    strokes: strokes,
    holeComplete: holeComplete,
    aimAngle: aimAngle,
    power: power,
    charging: charging,
    ferrariLoaded: ferrariLoaded,
    ferrariRotation: ferrariModel ? ferrariModel.rotation.y : 0,
    obstacleCount: obstacleMeshes.length + (ferrariModel ? 1 : 0),
    holePosition: { x: holePosition.x, z: holePosition.z },
    courseWidth: courseWidth,
    courseLength: courseLength,
    par: 3,
    gameStatus: gameStatus
  };

  controls.update();
  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
