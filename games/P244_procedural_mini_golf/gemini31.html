<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Mini Golf</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #top-left {
            position: absolute;
            top: 20px;
            left: 20px;
        }
        #hole-text {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        #strokes-text {
            font-size: 22px;
        }
        #top-center {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
        }
        #status-text {
            font-size: 36px;
            font-weight: bold;
            transition: color 0.3s;
        }
        #top-right {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background: rgba(50, 50, 50, 0.8);
        }
        button:active {
            transform: scale(0.95);
        }
        #bottom-center {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #power-label {
            font-size: 18px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        #power-bar-container {
            width: 200px;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid white;
            border-radius: 10px;
            overflow: hidden;
        }
        #power-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
            transform-origin: left;
        }
        #controls-help {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 14px;
            color: rgba(255,255,255,0.8);
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div id="top-left">
            <div id="hole-text">Hole 1</div>
            <div id="strokes-text">Strokes: 0</div>
        </div>
        <div id="top-center">
            <div id="status-text">Aim and shoot!</div>
        </div>
        <div id="top-right">
            <button id="btn-reset">Reset Ball</button>
            <button id="btn-new">New Course</button>
        </div>
        <div id="bottom-center">
            <div id="power-label">POWER</div>
            <div id="power-bar-container">
                <div id="power-bar-fill"></div>
            </div>
        </div>
        <div id="controls-help">
            Left/Right Arrows: Aim<br>
            Hold SPACE: Power<br>
            Release SPACE: Shoot
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            ballPosition: {x: 0, y: 0.2, z: 6},
            ballVelocity: {x: 0, y: 0, z: 0},
            ballSpeed: 0,
            ballMoving: false,
            strokes: 0,
            holeComplete: false,
            aimAngle: 0,
            power: 0,
            charging: false,
            ferrarLoaded: false,
            ferrariRotation: 0,
            obstacleCount: 3,
            holePosition: {x: 0, z: -7},
            courseWidth: 8,
            courseLength: 20,
            par: 3,
            gameStatus: 'aiming'
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Course Generation ---
        const courseGroup = new THREE.Group();
        scene.add(courseGroup);

        // Green
        const greenGeo = new THREE.BoxGeometry(8, 0.1, 20);
        const greenMat = new THREE.MeshStandardMaterial({ color: 0x2d8a4e, roughness: 0.8 });
        const green = new THREE.Mesh(greenGeo, greenMat);
        green.position.y = -0.05;
        green.receiveShadow = true;
        courseGroup.add(green);

        // Walls
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 });
        const wallThickness = 0.5;
        const wallHeight = 0.3;

        const createWall = (w, h, d, x, y, z) => {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geo, wallMat);
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            courseGroup.add(mesh);
            return mesh;
        };

        createWall(8 + wallThickness*2, wallHeight, wallThickness, 0, wallHeight/2, -10 - wallThickness/2); // Top
        createWall(8 + wallThickness*2, wallHeight, wallThickness, 0, wallHeight/2, 10 + wallThickness/2);  // Bottom
        createWall(wallThickness, wallHeight, 20, -4 - wallThickness/2, wallHeight/2, 0);                   // Left
        createWall(wallThickness, wallHeight, 20, 4 + wallThickness/2, wallHeight/2, 0);                    // Right

        // Hole
        const holeGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.11, 32);
        const holeMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
        const hole = new THREE.Mesh(holeGeo, holeMat);
        hole.position.set(0, 0.01, -7);
        courseGroup.add(hole);

        // Flag Pole
        const poleGeo = new THREE.CylinderGeometry(0.05, 0.05, 2, 8);
        const poleMat = new THREE.MeshStandardMaterial({ color: 0xdddddd });
        const pole = new THREE.Mesh(poleGeo, poleMat);
        pole.position.set(0, 1, -7);
        pole.castShadow = true;
        courseGroup.add(pole);

        // Flag
        const flagGeo = new THREE.PlaneGeometry(0.6, 0.4);
        const flagMat = new THREE.MeshStandardMaterial({ color: 0xff0000, side: THREE.DoubleSide });
        const flag = new THREE.Mesh(flagGeo, flagMat);
        flag.position.set(0.3, 1.8, -7);
        flag.castShadow = true;
        courseGroup.add(flag);

        // Bumpers
        const bumperMat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.5 });
        const bumpers = [];

        const createBumper = (w, h, d, x, y, z) => {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geo, bumperMat);
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            courseGroup.add(mesh);
            bumpers.push(mesh);
        };

        createBumper(3, 0.5, 0.5, -2, 0.25, -3);
        createBumper(2.5, 0.5, 0.5, 1.5, 0.25, -5);

        // --- Ferrari Obstacle ---
        let ferrariModel = null;
        const loader = new GLTFLoader();
        
        // Create a placeholder in case loading fails or takes time
        const placeholderGeo = new THREE.BoxGeometry(1.5, 0.8, 3);
        const placeholderMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const placeholder = new THREE.Mesh(placeholderGeo, placeholderMat);
        placeholder.position.set(0, 0.4, -1);
        placeholder.castShadow = true;
        courseGroup.add(placeholder);
        ferrariModel = placeholder; // Use placeholder initially for physics

        loader.load(
            'ferrari.glb',
            (gltf) => {
                courseGroup.remove(placeholder);
                ferrariModel = gltf.scene;
                ferrariModel.position.set(0, 0.5, -1);
                ferrariModel.scale.set(0.8, 0.8, 0.8);
                
                ferrariModel.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                courseGroup.add(ferrariModel);
                window.__3D_STATE__.ferrarLoaded = true;
            },
            undefined,
            (error) => {
                console.warn('Ferrari model not found, using placeholder.', error);
                // Keep placeholder as ferrariModel
            }
        );

        // --- Golf Ball ---
        const ballRadius = 0.2;
        const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
        const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2, metalness: 0.1 });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.position.set(0, ballRadius, 6);
        ball.castShadow = true;
        scene.add(ball);

        // Aiming Arrow
        const arrowDir = new THREE.Vector3(0, 0, -1);
        const arrowOrigin = ball.position.clone();
        const arrowLength = 2;
        const arrowColor = 0xffffff;
        const arrowHelper = new THREE.ArrowHelper(arrowDir, arrowOrigin, arrowLength, arrowColor, 0.4, 0.3);
        scene.add(arrowHelper);

        // --- Game Variables ---
        let vx = 0;
        let vz = 0;
        let aimAngle = 0;
        let power = 0;
        let isCharging = false;
        let strokes = 0;
        let holeComplete = false;
        let isMoving = false;

        // --- Input Handling ---
        const keys = { left: false, right: false, space: false };

        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft') keys.left = true;
            if (e.code === 'ArrowRight') keys.right = true;
            if (e.code === 'Space') {
                if (!keys.space && !isMoving && !holeComplete) {
                    isCharging = true;
                    power = 0;
                }
                keys.space = true;
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft') keys.left = false;
            if (e.code === 'ArrowRight') keys.right = false;
            if (e.code === 'Space') {
                keys.space = false;
                if (isCharging && !isMoving && !holeComplete) {
                    shoot();
                }
            }
        });

        function shoot() {
            isCharging = false;
            strokes++;
            
            const dir = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), aimAngle);
            vx = dir.x * power;
            vz = dir.z * power;
            
            power = 0;
            isMoving = true;
        }

        // UI Buttons
        document.getElementById('btn-reset').addEventListener('click', resetBall);
        document.getElementById('btn-new').addEventListener('click', newCourse);

        function resetBall() {
            ball.position.set(0, ballRadius, 6);
            vx = 0;
            vz = 0;
            isMoving = false;
            holeComplete = false;
            aimAngle = 0;
            power = 0;
            isCharging = false;
        }

        function newCourse() {
            resetBall();
            strokes = 0;
            
            // Randomize bumpers within safe bounds
            bumpers.forEach(b => {
                b.position.x = (Math.random() - 0.5) * 5; // -2.5 to 2.5
                b.position.z = (Math.random() - 0.5) * 10 - 2; // -7 to 3
                b.updateMatrixWorld();
            });
        }

        // --- Physics & Collision ---
        function checkAABBCollision(mesh) {
            mesh.geometry.computeBoundingBox();
            const box = mesh.geometry.boundingBox.clone();
            box.applyMatrix4(mesh.matrixWorld);

            const closestX = Math.max(box.min.x, Math.min(ball.position.x, box.max.x));
            const closestY = Math.max(box.min.y, Math.min(ball.position.y, box.max.y));
            const closestZ = Math.max(box.min.z, Math.min(ball.position.z, box.max.z));

            const dx = ball.position.x - closestX;
            const dy = ball.position.y - closestY;
            const dz = ball.position.z - closestZ;

            const distanceSq = dx*dx + dy*dy + dz*dz;

            if (distanceSq < ballRadius * ballRadius) {
                const distance = Math.sqrt(distanceSq);
                let nx = dx / distance;
                let nz = dz / distance;

                if (distance === 0) {
                    nx = 1; nz = 0;
                }

                // Reflect velocity
                const dot = vx * nx + vz * nz;
                vx = (vx - 2 * dot * nx) * 0.7;
                vz = (vz - 2 * dot * nz) * 0.7;

                // Resolve penetration
                const pen = ballRadius - distance;
                ball.position.x += nx * pen;
                ball.position.z += nz * pen;
            }
        }

        function updatePhysics(dt) {
            if (holeComplete) return;

            const speed = Math.sqrt(vx*vx + vz*vz);
            
            if (speed > 0.01) {
                isMoving = true;
                
                // Apply velocity
                ball.position.x += vx * dt;
                ball.position.z += vz * dt;

                // Friction (per frame as requested)
                vx *= 0.985;
                vz *= 0.985;

                // Wall Collisions
                const boundX = 4 - ballRadius;
                const boundZ = 10 - ballRadius;

                if (ball.position.x < -boundX) { ball.position.x = -boundX; vx *= -0.7; }
                if (ball.position.x > boundX) { ball.position.x = boundX; vx *= -0.7; }
                if (ball.position.z < -boundZ) { ball.position.z = -boundZ; vz *= -0.7; }
                if (ball.position.z > boundZ) { ball.position.z = boundZ; vz *= -0.7; }

                // Bumper Collisions
                bumpers.forEach(b => checkAABBCollision(b));

                // Ferrari Collision (Sphere based)
                if (ferrariModel) {
                    const fx = ferrariModel.position.x;
                    const fz = ferrariModel.position.z;
                    const dx = ball.position.x - fx;
                    const dz = ball.position.z - fz;
                    const dist = Math.sqrt(dx*dx + dz*dz);
                    const collisionRadius = 1.5 + ballRadius;

                    if (dist < collisionRadius) {
                        const nx = dx / dist;
                        const nz = dz / dist;
                        const dot = vx * nx + vz * nz;
                        
                        vx = (vx - 2 * dot * nx) * 0.6;
                        vz = (vz - 2 * dot * nz) * 0.6;

                        const pen = collisionRadius - dist;
                        ball.position.x += nx * pen;
                        ball.position.z += nz * pen;
                    }
                }

                // Hole Detection
                const hx = hole.position.x;
                const hz = hole.position.z;
                const hdx = ball.position.x - hx;
                const hdz = ball.position.z - hz;
                const hDist = Math.sqrt(hdx*hdx + hdz*hdz);

                if (hDist < 0.5 && speed < 2.0) {
                    ball.position.x = hx;
                    ball.position.z = hz;
                    ball.position.y = -0.1; // Sink into hole
                    vx = 0;
                    vz = 0;
                    holeComplete = true;
                    isMoving = false;
                }

            } else {
                if (isMoving) {
                    vx = 0;
                    vz = 0;
                    isMoving = false;
                }
            }
        }

        // --- Main Loop ---
        let lastTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            let dt = (now - lastTime) / 1000;
            lastTime = now;
            if (dt > 1/30) dt = 1/30; // Cap delta time

            // Update Ferrari
            if (ferrariModel) {
                ferrariModel.rotation.y += 0.3 * dt;
            }

            // Update Input & Aiming
            if (!isMoving && !holeComplete) {
                if (keys.left) aimAngle += 0.05;
                if (keys.right) aimAngle -= 0.05;
                
                if (isCharging) {
                    power += (10 / 2) * dt; // 0 to 10 over 2 seconds
                    if (power > 10) power = 10;
                }

                arrowHelper.visible = true;
                const dir = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), aimAngle);
                arrowHelper.setDirection(dir);
                arrowHelper.position.copy(ball.position);
            } else {
                arrowHelper.visible = false;
            }

            updatePhysics(dt);

            // Update HUD
            document.getElementById('strokes-text').innerText = `Strokes: ${strokes}`;
            document.getElementById('power-bar-fill').style.width = `${(power / 10) * 100}%`;

            const statusEl = document.getElementById('status-text');
            if (holeComplete) {
                statusEl.innerText = strokes === 1 ? 'HOLE IN ONE!' : `Hole Complete! Strokes: ${strokes}`;
                statusEl.style.color = '#FFD700'; // Gold
            } else if (isMoving) {
                statusEl.innerText = 'Ball in motion...';
                statusEl.style.color = '#FFFFFF';
            } else {
                statusEl.innerText = 'Aim and shoot!';
                statusEl.style.color = '#FFFFFF';
            }

            // Update State Object
            const currentSpeed = Math.sqrt(vx*vx + vz*vz);
            const status = holeComplete ? 'complete' : (isMoving ? 'moving' : 'aiming');

            window.__3D_STATE__ = {
                ballPosition: {x: ball.position.x, y: ball.position.y, z: ball.position.z},
                ballVelocity: {x: vx, y: 0, z: vz},
                ballSpeed: currentSpeed,
                ballMoving: isMoving,
                strokes: strokes,
                holeComplete: holeComplete,
                aimAngle: aimAngle,
                power: power,
                charging: isCharging,
                ferrarLoaded: window.__3D_STATE__.ferrarLoaded,
                ferrariRotation: ferrariModel ? ferrariModel.rotation.y : 0,
                obstacleCount: 3,
                holePosition: {x: 0, z: -7},
                courseWidth: 8,
                courseLength: 20,
                par: 3,
                gameStatus: status
            };

            controls.update();
            renderer.render(scene, camera);
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start loop
        animate();
    </script>
</body>
</html>
