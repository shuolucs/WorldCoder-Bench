<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procedural Mini Golf - Three.js</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #87CEEB;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      font-size: 18px;
    }

    #topLeft {
      position: absolute;
      top: 16px;
      left: 16px;
      line-height: 1.5;
    }

    #status {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 26px;
      font-weight: bold;
      text-align: center;
    }

    #controlsPanel {
      position: absolute;
      top: 16px;
      right: 16px;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      background: rgba(255,255,255,0.9);
      color: #222;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    button:hover {
      background: white;
    }

    #powerContainer {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      width: 200px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.95);
      background: rgba(0,0,0,0.25);
      border-radius: 4px;
      overflow: hidden;
    }

    #powerBar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00cc44, #ffdd00, #ff3300);
      transform-origin: left center;
    }

    #powerLabel {
      position: absolute;
      left: 50%;
      bottom: 50px;
      transform: translateX(-50%);
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="topLeft">
      <div id="holeText">Hole 1</div>
      <div id="strokeText">Strokes: 0</div>
    </div>

    <div id="status">Aim and shoot!</div>

    <div id="controlsPanel">
      <button id="resetBtn">Reset Ball</button>
      <button id="newCourseBtn">New Course</button>
    </div>

    <div id="powerLabel">Power: 0.0</div>
    <div id="powerContainer">
      <div id="powerBar"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    // -----------------------------
    // Basic setup
    // -----------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#87CEEB');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 12, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    // -----------------------------
    // Lights
    // -----------------------------
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(10, 20, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 60;
    scene.add(dirLight);

    // -----------------------------
    // Constants / State
    // -----------------------------
    const COURSE_LENGTH = 20;
    const COURSE_WIDTH = 8;
    const COURSE_HALF_L = COURSE_LENGTH / 2;
    const COURSE_HALF_W = COURSE_WIDTH / 2;
    const WALL_HEIGHT = 0.3;
    const WALL_THICKNESS = 0.3;
    const BALL_RADIUS = 0.2;
    const TEE_POS = new THREE.Vector3(0, 0.2, 6);
    const HOLE_POS = new THREE.Vector3(0, 0.01, -7);
    const PAR = 3;

    let strokes = 0;
    let holeComplete = false;
    let aimAngle = -Math.PI / 2;
    let power = 0;
    let charging = false;
    let ferrariLoaded = false;
    let gameStatus = 'aiming';
    let chargeTime = 0;

    const ballVelocity = new THREE.Vector3(0, 0, 0);
    const clock = new THREE.Clock();

    // -----------------------------
    // HUD refs
    // -----------------------------
    const holeText = document.getElementById('holeText');
    const strokeText = document.getElementById('strokeText');
    const statusText = document.getElementById('status');
    const powerBar = document.getElementById('powerBar');
    const powerLabel = document.getElementById('powerLabel');
    const resetBtn = document.getElementById('resetBtn');
    const newCourseBtn = document.getElementById('newCourseBtn');

    // -----------------------------
    // Course
    // -----------------------------
    const courseGroup = new THREE.Group();
    scene.add(courseGroup);

    const greenMat = new THREE.MeshStandardMaterial({ color: '#2d8a4e' });
    const wallMat = new THREE.MeshStandardMaterial({ color: '#8B4513' });
    const obstacleMat = new THREE.MeshStandardMaterial({ color: '#666666' });
    const holeMat = new THREE.MeshStandardMaterial({ color: '#111111' });
    const poleMat = new THREE.MeshStandardMaterial({ color: '#dddddd' });
    const flagMat = new THREE.MeshStandardMaterial({ color: '#ff0000', side: THREE.DoubleSide });
    const ballMat = new THREE.MeshStandardMaterial({ color: '#ffffff' });

    const green = new THREE.Mesh(
      new THREE.BoxGeometry(COURSE_WIDTH, 0.2, COURSE_LENGTH),
      greenMat
    );
    green.position.set(0, -0.1, 0);
    green.receiveShadow = true;
    courseGroup.add(green);

    const walls = [];
    function createWall(w, h, d, x, y, z) {
      const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
      wall.position.set(x, y, z);
      wall.castShadow = true;
      wall.receiveShadow = true;
      courseGroup.add(wall);
      walls.push(wall);
    }

    createWall(COURSE_WIDTH + WALL_THICKNESS * 2, WALL_HEIGHT, WALL_THICKNESS, 0, WALL_HEIGHT / 2, -COURSE_HALF_L - WALL_THICKNESS / 2);
    createWall(COURSE_WIDTH + WALL_THICKNESS * 2, WALL_HEIGHT, WALL_THICKNESS, 0, WALL_HEIGHT / 2, COURSE_HALF_L + WALL_THICKNESS / 2);
    createWall(WALL_THICKNESS, WALL_HEIGHT, COURSE_LENGTH, -COURSE_HALF_W - WALL_THICKNESS / 2, WALL_HEIGHT / 2, 0);
    createWall(WALL_THICKNESS, WALL_HEIGHT, COURSE_LENGTH, COURSE_HALF_W + WALL_THICKNESS / 2, WALL_HEIGHT / 2, 0);

    const holeMesh = new THREE.Mesh(
      new THREE.CylinderGeometry(0.4, 0.4, 0.15, 32),
      holeMat
    );
    holeMesh.position.copy(HOLE_POS);
    holeMesh.position.y = -0.02;
    courseGroup.add(holeMesh);

    const pole = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.05, 2, 12),
      poleMat
    );
    pole.position.set(HOLE_POS.x, 1, HOLE_POS.z);
    pole.castShadow = true;
    courseGroup.add(pole);

    const flag = new THREE.Mesh(
      new THREE.PlaneGeometry(0.6, 0.35),
      flagMat
    );
    flag.position.set(HOLE_POS.x + 0.32, 1.7, HOLE_POS.z);
    flag.castShadow = true;
    courseGroup.add(flag);

    // Make the flag triangular by scaling geometry vertices
    {
      const pos = flag.geometry.attributes.position;
      pos.setXY(0, 0, 0.175);
      pos.setXY(1, 0.6, 0.175);
      pos.setXY(2, 0, -0.175);
      pos.setXY(3, 0.6, -0.175);
      pos.needsUpdate = true;
    }

    // -----------------------------
    // Obstacles
    // -----------------------------
    const bumperDefs = [
      { size: new THREE.Vector3(3, 0.5, 0.5), pos: new THREE.Vector3(-2, 0.25, -3) },
      { size: new THREE.Vector3(2.5, 0.5, 0.5), pos: new THREE.Vector3(1.5, 0.25, -5) }
    ];

    const bumpers = [];

    function clearBumpers() {
      bumpers.forEach(b => {
        courseGroup.remove(b.mesh);
        b.mesh.geometry.dispose();
      });
      bumpers.length = 0;
    }

    function createBumper(size, pos) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(size.x, size.y, size.z),
        obstacleMat
      );
      mesh.position.copy(pos);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      courseGroup.add(mesh);
      bumpers.push({ mesh, size: size.clone() });
    }

    function buildDefaultBumpers() {
      clearBumpers();
      bumperDefs.forEach(def => createBumper(def.size, def.pos));
    }

    buildDefaultBumpers();

    // -----------------------------
    // Ferrari obstacle
    // -----------------------------
    const loader = new GLTFLoader();
    let ferrari = null;
    const ferrariCenter = new THREE.Vector3(0, 0.5, -1);

    loader.load(
      'ferrari.glb',
      (gltf) => {
        ferrari = gltf.scene;
        ferrari.position.copy(ferrariCenter);
        ferrari.scale.setScalar(0.8);
        ferrari.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        scene.add(ferrari);
        ferrariLoaded = true;
      },
      undefined,
      () => {
        // Fallback proxy if model fails
        const proxy = new THREE.Mesh(
          new THREE.BoxGeometry(2.4, 0.8, 4.2),
          new THREE.MeshStandardMaterial({ color: '#cc0000' })
        );
        proxy.position.copy(ferrariCenter);
        proxy.castShadow = true;
        proxy.receiveShadow = true;
        ferrari = proxy;
        scene.add(ferrari);
        ferrariLoaded = true;
      }
    );

    // -----------------------------
    // Ball
    // -----------------------------
    const ball = new THREE.Mesh(
      new THREE.SphereGeometry(BALL_RADIUS, 32, 32),
      ballMat
    );
    ball.position.copy(TEE_POS);
    ball.castShadow = true;
    ball.receiveShadow = true;
    scene.add(ball);

    // -----------------------------
    // Aim arrow
    // -----------------------------
    const arrowDir = new THREE.Vector3(Math.cos(aimAngle), 0, Math.sin(aimAngle)).normalize();
    const arrow = new THREE.ArrowHelper(arrowDir, ball.position.clone(), 2, 0xffff00);
    scene.add(arrow);

    // -----------------------------
    // Input
    // -----------------------------
    const keys = {};

    window.addEventListener('keydown', (e) => {
      keys[e.code] = true;

      if (e.code === 'ArrowLeft' && !isBallMoving() && !holeComplete) {
        aimAngle -= 0.05;
      }
      if (e.code === 'ArrowRight' && !isBallMoving() && !holeComplete) {
        aimAngle += 0.05;
      }

      if (e.code === 'Space') {
        e.preventDefault();
        if (!charging && !isBallMoving() && !holeComplete) {
          charging = true;
          chargeTime = 0;
        }
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.code] = false;

      if (e.code === 'Space') {
        e.preventDefault();
        if (charging && !isBallMoving() && !holeComplete) {
          charging = false;
          shootBall();
          chargeTime = 0;
          power = 0;
        }
      }
    });

    // -----------------------------
    // Buttons
    // -----------------------------
    resetBtn.addEventListener('click', () => {
      resetBall();
    });

    newCourseBtn.addEventListener('click', () => {
      randomizeCourse();
      resetEverything();
    });

    // -----------------------------
    // Helpers
    // -----------------------------
    function isBallMoving() {
      return ballVelocity.length() > 0.01;
    }

    function resetBall() {
      ball.position.copy(TEE_POS);
      ballVelocity.set(0, 0, 0);
      holeComplete = false;
      power = 0;
      charging = false;
      gameStatus = 'aiming';
    }

    function resetEverything() {
      strokes = 0;
      aimAngle = -Math.PI / 2;
      resetBall();
    }

    function shootBall() {
      const dir = new THREE.Vector3(Math.cos(aimAngle), 0, Math.sin(aimAngle)).normalize();
      ballVelocity.copy(dir.multiplyScalar(power));
      strokes++;
      gameStatus = 'moving';
    }

    function clampBallInsideCourse() {
      const minX = -COURSE_HALF_W + BALL_RADIUS;
      const maxX = COURSE_HALF_W - BALL_RADIUS;
      const minZ = -COURSE_HALF_L + BALL_RADIUS;
      const maxZ = COURSE_HALF_L - BALL_RADIUS;

      if (ball.position.x < minX) {
        ball.position.x = minX;
        ballVelocity.x *= -0.7;
      } else if (ball.position.x > maxX) {
        ball.position.x = maxX;
        ballVelocity.x *= -0.7;
      }

      if (ball.position.z < minZ) {
        ball.position.z = minZ;
        ballVelocity.z *= -0.7;
      } else if (ball.position.z > maxZ) {
        ball.position.z = maxZ;
        ballVelocity.z *= -0.7;
      }
    }

    function handleBumperCollisions() {
      for (const b of bumpers) {
        const halfX = b.size.x / 2;
        const halfZ = b.size.z / 2;
        const minX = b.mesh.position.x - halfX - BALL_RADIUS;
        const maxX = b.mesh.position.x + halfX + BALL_RADIUS;
        const minZ = b.mesh.position.z - halfZ - BALL_RADIUS;
        const maxZ = b.mesh.position.z + halfZ + BALL_RADIUS;

        if (
          ball.position.x >= minX && ball.position.x <= maxX &&
          ball.position.z >= minZ && ball.position.z <= maxZ
        ) {
          const dxLeft = Math.abs(ball.position.x - minX);
          const dxRight = Math.abs(maxX - ball.position.x);
          const dzTop = Math.abs(ball.position.z - minZ);
          const dzBottom = Math.abs(maxZ - ball.position.z);
          const minPen = Math.min(dxLeft, dxRight, dzTop, dzBottom);

          if (minPen === dxLeft) {
            ball.position.x = minX;
            ballVelocity.x = -Math.abs(ballVelocity.x) * 0.7;
          } else if (minPen === dxRight) {
            ball.position.x = maxX;
            ballVelocity.x = Math.abs(ballVelocity.x) * 0.7;
          } else if (minPen === dzTop) {
            ball.position.z = minZ;
            ballVelocity.z = -Math.abs(ballVelocity.z) * 0.7;
          } else {
            ball.position.z = maxZ;
            ballVelocity.z = Math.abs(ballVelocity.z) * 0.7;
          }
        }
      }
    }

    function handleFerrariCollision() {
      if (!ferrari) return;

      const center = ferrari.position.clone();
      center.y = ball.position.y;
      const delta = ball.position.clone().sub(center);
      const dist = delta.length();
      const collisionRadius = 1.5;

      if (dist < collisionRadius + BALL_RADIUS) {
        if (dist < 0.0001) delta.set(1, 0, 0);
        delta.normalize();

        const speed = ballVelocity.length();
        const reflected = delta.clone().multiplyScalar(speed * 0.6);
        ballVelocity.copy(reflected);

        ball.position.x = ferrari.position.x + delta.x * (collisionRadius + BALL_RADIUS);
        ball.position.z = ferrari.position.z + delta.z * (collisionRadius + BALL_RADIUS);
      }
    }

    function checkHole() {
      const ball2D = new THREE.Vector2(ball.position.x, ball.position.z);
      const hole2D = new THREE.Vector2(HOLE_POS.x, HOLE_POS.z);
      const dist = ball2D.distanceTo(hole2D);
      const speed = ballVelocity.length();

      if (!holeComplete && dist <= 0.5 && speed < 2.0) {
        holeComplete = true;
        ball.position.set(HOLE_POS.x, 0.02, HOLE_POS.z);
        ballVelocity.set(0, 0, 0);
        gameStatus = 'complete';
      }
    }

    function randomizeCourse() {
      clearBumpers();

      const sizes = [
        new THREE.Vector3(3, 0.5, 0.5),
        new THREE.Vector3(2.5, 0.5, 0.5)
      ];

      for (let i = 0; i < 2; i++) {
        const size = sizes[i];
        let pos;
        let attempts = 0;

        do {
          pos = new THREE.Vector3(
            THREE.MathUtils.randFloat(-COURSE_HALF_W + 1.8, COURSE_HALF_W - 1.8),
            0.25,
            THREE.MathUtils.randFloat(-COURSE_HALF_L + 2.0, COURSE_HALF_L - 2.0)
          );
          attempts++;
        } while (
          (
            pos.distanceTo(new THREE.Vector3(TEE_POS.x, 0.25, TEE_POS.z)) < 2.5 ||
            pos.distanceTo(new THREE.Vector3(HOLE_POS.x, 0.25, HOLE_POS.z)) < 2.5
          ) && attempts < 50
        );

        createBumper(size, pos);
      }

      if (ferrari) {
        ferrari.position.set(
          THREE.MathUtils.randFloat(-2.0, 2.0),
          0.5,
          THREE.MathUtils.randFloat(-2.5, 2.0)
        );
      }
    }

    // -----------------------------
    // State exposure
    // -----------------------------
    window.__3D_STATE__ = {};

    function update3DState() {
      const speed = ballVelocity.length();
      window.__3D_STATE__ = {
        ballPosition: {
          x: ball.position.x,
          y: ball.position.y,
          z: ball.position.z
        },
        ballVelocity: {
          x: ballVelocity.x,
          y: ballVelocity.y,
          z: ballVelocity.z
        },
        ballSpeed: speed,
        ballMoving: speed > 0.01,
        strokes,
        holeComplete,
        aimAngle,
        power,
        charging,
        ferrarLoaded: ferrariLoaded,
        ferrariRotation: ferrari ? ferrari.rotation.y : 0,
        obstacleCount: 2 + (ferrari ? 1 : 1),
        holePosition: {
          x: HOLE_POS.x,
          z: HOLE_POS.z
        },
        courseWidth: COURSE_WIDTH,
        courseLength: COURSE_LENGTH,
        par: PAR,
        gameStatus
      };
    }

    // -----------------------------
    // HUD update
    // -----------------------------
    function updateHUD() {
      holeText.textContent = 'Hole 1';
      strokeText.textContent = `Strokes: ${strokes}`;
      powerBar.style.width = `${(power / 10) * 100}%`;
      powerLabel.textContent = `Power: ${power.toFixed(1)}`;

      if (holeComplete) {
        statusText.textContent = strokes === 1 ? 'HOLE IN ONE!' : `Hole Complete! Strokes: ${strokes}`;
      } else if (isBallMoving()) {
        statusText.textContent = 'Ball in motion...';
      } else {
        statusText.textContent = 'Aim and shoot!';
      }
    }

    // -----------------------------
    // Animation / physics
    // -----------------------------
    function animate() {
      requestAnimationFrame(animate);

      let dt = clock.getDelta();
      dt = Math.min(dt, 1 / 30);

      controls.update();

      if (ferrari) {
        ferrari.rotation.y += 0.3 * dt;
      }

      if (charging && !isBallMoving() && !holeComplete) {
        chargeTime += dt;
        power = Math.min((chargeTime / 2) * 10, 10);
      }

      if (!holeComplete) {
        if (isBallMoving()) {
          ball.position.x += ballVelocity.x * dt;
          ball.position.z += ballVelocity.z * dt;

          const frictionFactor = Math.pow(0.985, dt * 60);
          ballVelocity.multiplyScalar(frictionFactor);

          if (ballVelocity.length() < 0.01) {
            ballVelocity.set(0, 0, 0);
            gameStatus = 'aiming';
          }

          clampBallInsideCourse();
          handleBumperCollisions();
          handleFerrariCollision();
          checkHole();
        } else if (!holeComplete) {
          gameStatus = 'aiming';
        }
      }

      ball.position.y = BALL_RADIUS;

      const dir = new THREE.Vector3(Math.cos(aimAngle), 0, Math.sin(aimAngle)).normalize();
      arrow.position.copy(ball.position);
      arrow.setDirection(dir);
      arrow.setLength(2, 0.5, 0.3);
      arrow.visible = !isBallMoving() && !holeComplete;

      updateHUD();
      update3DState();

      renderer.render(scene, camera);
    }

    animate();

    // -----------------------------
    // Resize
    // -----------------------------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
