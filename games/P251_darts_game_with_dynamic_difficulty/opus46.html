<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Darts Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    pointer-events: none;
    padding: 20px;
}

.hud-panel {
    background: rgba(0, 0, 0, 0.75);
    border: 1px solid rgba(255, 200, 50, 0.5);
    border-radius: 10px;
    padding: 15px 20px;
    color: #fff;
    display: inline-block;
    backdrop-filter: blur(5px);
}

.hud-top-left {
    position: absolute;
    top: 20px;
    left: 20px;
}

.hud-top-right {
    position: absolute;
    top: 20px;
    right: 20px;
    text-align: right;
}

.hud-bottom-center {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
}

.hud-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255, 200, 50, 0.8);
    margin-bottom: 4px;
}

.hud-value {
    font-size: 28px;
    font-weight: bold;
    color: #fff;
}

.hud-value.large {
    font-size: 42px;
    color: #ffc832;
}

.hud-row {
    margin-bottom: 10px;
}

.hud-row:last-child {
    margin-bottom: 0;
}

#difficulty-display {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: bold;
}

.diff-1 { background: #2ecc71; color: #000; }
.diff-2 { background: #f39c12; color: #000; }
.diff-3 { background: #e74c3c; color: #fff; }

#new-game-btn {
    pointer-events: all;
    cursor: pointer;
    background: linear-gradient(135deg, #ffc832, #ff8c00);
    border: none;
    color: #000;
    padding: 12px 30px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 25px;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.3s;
    margin-top: 10px;
}

#new-game-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255, 200, 50, 0.5);
}

#game-over-msg {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 0, 0, 0.9);
    border: 2px solid #ffc832;
    border-radius: 20px;
    padding: 40px 60px;
    text-align: center;
    color: #fff;
    pointer-events: none;
    z-index: 100;
}

#game-over-msg h1 {
    font-size: 48px;
    color: #ffc832;
    margin-bottom: 10px;
}

#game-over-msg p {
    font-size: 24px;
    color: #ccc;
}

#crosshair {
    position: absolute;
    pointer-events: none;
    z-index: 50;
    color: rgba(255, 255, 255, 0.9);
    font-size: 24px;
    font-weight: bold;
    transform: translate(-50%, -50%);
    text-shadow: 0 0 5px rgba(255, 50, 50, 0.8), 0 0 10px rgba(255, 50, 50, 0.4);
    display: none;
}

#last-dart-score {
    transition: all 0.3s;
}

.score-popup {
    position: absolute;
    pointer-events: none;
    color: #ffc832;
    font-size: 36px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255, 200, 50, 0.8);
    animation: scoreFloat 1.5s ease-out forwards;
    z-index: 60;
}

@keyframes scoreFloat {
    0% { opacity: 1; transform: translate(-50%, 0) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -80px) scale(1.5); }
}
</style>
</head>
<body>

<div id="hud">
    <div class="hud-top-left hud-panel">
        <div class="hud-row">
            <div class="hud-label">Round</div>
            <div class="hud-value" id="round-display">1 / 3</div>
        </div>
        <div class="hud-row">
            <div class="hud-label">Darts Remaining</div>
            <div class="hud-value" id="darts-display">3</div>
        </div>
        <div class="hud-row">
            <div class="hud-label">Difficulty</div>
            <div id="difficulty-display" class="diff-1">Level 1</div>
        </div>
    </div>

    <div class="hud-top-right hud-panel">
        <div class="hud-row">
            <div class="hud-label">Total Score</div>
            <div class="hud-value large" id="total-score-display">0</div>
        </div>
        <div class="hud-row">
            <div class="hud-label">Round Score</div>
            <div class="hud-value" id="round-score-display">0</div>
        </div>
        <div class="hud-row">
            <div class="hud-label">Last Dart</div>
            <div class="hud-value" id="last-dart-score">-</div>
        </div>
    </div>

    <div class="hud-bottom-center">
        <button id="new-game-btn">New Game</button>
    </div>
</div>

<div id="crosshair">+</div>

<div id="game-over-msg">
    <h1>GAME OVER</h1>
    <p>Final Score: <span id="final-score">0</span></p>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

// ============ STATE ============
const state = {
    totalScore: 0,
    roundScore: 0,
    currentRound: 1,
    dartsRemaining: 3,
    dartsThrown: 0,
    difficultyLevel: 1,
    lastDartScore: 0,
    lastDartPosition: { x: 0, y: 0 },
    gameOver: false,
    helmetVisible: false,
    boardRotation: 0,
    dartInFlight: false
};
window.__3D_STATE__ = state;

// ============ CONSTANTS ============
const SECTOR_SCORES = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
const BOARD_CENTER = new THREE.Vector3(0, 1.6, -3);
const BOARD_RADIUS = 0.5;
const DART_FLY_TIME = 0.4;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 5, 15);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.6, 3);
camera.lookAt(BOARD_CENTER);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const spotlight = new THREE.SpotLight(0xffffff, 1.2);
spotlight.position.set(0, 3, 0);
spotlight.target.position.copy(BOARD_CENTER);
spotlight.angle = Math.PI / 4;
spotlight.penumbra = 0.3;
spotlight.castShadow = true;
spotlight.shadow.mapSize.set(1024, 1024);
scene.add(spotlight);
scene.add(spotlight.target);

// Additional fill light
const fillLight = new THREE.PointLight(0x4466aa, 0.3, 10);
fillLight.position.set(-2, 2, 1);
scene.add(fillLight);

// ============ FLOOR ============
const floorGeo = new THREE.PlaneGeometry(20, 20);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3e, roughness: 0.8 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// ============ BACK WALL ============
const wallGeo = new THREE.PlaneGeometry(10, 5);
const wallMat = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.9 });
const wall = new THREE.Mesh(wallGeo, wallMat);
wall.position.set(0, 2.5, -3.1);
wall.receiveShadow = true;
scene.add(wall);

// ============ DARTBOARD ============
const boardGroup = new THREE.Group();
boardGroup.position.copy(BOARD_CENTER);
scene.add(boardGroup);

function createDartboard() {
    // Board backing
    const backGeo = new THREE.CylinderGeometry(0.38, 0.38, 0.03, 64);
    const backMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const backing = new THREE.Mesh(backGeo, backMat);
    backing.rotation.x = Math.PI / 2;
    backing.castShadow = true;
    backing.receiveShadow = true;
    boardGroup.add(backing);

    // Wire frame ring
    const outerRingGeo = new THREE.TorusGeometry(0.34, 0.005, 8, 64);
    const wireMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8 });
    const outerRing = new THREE.Mesh(outerRingGeo, wireMat);
    outerRing.position.z = 0.016;
    boardGroup.add(outerRing);

    const tripleOuterRing = new THREE.Mesh(new THREE.TorusGeometry(0.21, 0.003, 8, 64), wireMat);
    tripleOuterRing.position.z = 0.016;
    boardGroup.add(tripleOuterRing);

    const tripleInnerRing = new THREE.Mesh(new THREE.TorusGeometry(0.19, 0.003, 8, 64), wireMat);
    tripleInnerRing.position.z = 0.016;
    boardGroup.add(tripleInnerRing);

    const doubleInnerRing = new THREE.Mesh(new THREE.TorusGeometry(0.32, 0.003, 8, 64), wireMat);
    doubleInnerRing.position.z = 0.016;
    boardGroup.add(doubleInnerRing);

    const bullOuterRing = new THREE.Mesh(new THREE.TorusGeometry(0.06, 0.002, 8, 32), wireMat);
    bullOuterRing.position.z = 0.016;
    boardGroup.add(bullOuterRing);

    // Draw sectors using canvas texture
    const canvas = document.createElement('canvas');
    canvas.width = 1024;
    canvas.height = 1024;
    const ctx = canvas.getContext('2d');
    const cx = 512, cy = 512;
    const scale = 512 / 0.38;

    // Background
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, 1024, 1024);

    const sectorAngle = Math.PI / 10;
    // Offset: sector 0 (score 20) is at top, centered at -PI/2
    const startOffset = -Math.PI / 2 - sectorAngle / 2;

    const colors = {
        red: '#c0392b',
        green: '#27ae60',
        white: '#f5e6c8',
        black: '#1a1a1a'
    };

    for (let i = 0; i < 20; i++) {
        const angle1 = startOffset + i * sectorAngle;
        const angle2 = angle1 + sectorAngle;
        const isEven = i % 2 === 0;

        // Double ring (0.32-0.34)
        drawSector(ctx, cx, cy, 0.32 * scale, 0.34 * scale, angle1, angle2, isEven ? colors.red : colors.green);
        // Outer single (0.21-0.32)
        drawSector(ctx, cx, cy, 0.21 * scale, 0.32 * scale, angle1, angle2, isEven ? colors.black : colors.white);
        // Triple ring (0.19-0.21)
        drawSector(ctx, cx, cy, 0.19 * scale, 0.21 * scale, angle1, angle2, isEven ? colors.red : colors.green);
        // Inner single (0.06-0.19)
        drawSector(ctx, cx, cy, 0.06 * scale, 0.19 * scale, angle1, angle2, isEven ? colors.black : colors.white);
    }

    // Inner bull (0.025-0.06)
    ctx.beginPath();
    ctx.arc(cx, cy, 0.06 * scale, 0, Math.PI * 2);
    ctx.fillStyle = colors.green;
    ctx.fill();

    // Bullseye (0-0.025)
    ctx.beginPath();
    ctx.arc(cx, cy, 0.025 * scale, 0, Math.PI * 2);
    ctx.fillStyle = colors.red;
    ctx.fill();

    // Wire lines
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 20; i++) {
        const angle = startOffset + i * sectorAngle;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(angle) * 0.06 * scale, cy + Math.sin(angle) * 0.06 * scale);
        ctx.lineTo(cx + Math.cos(angle) * 0.34 * scale, cy + Math.sin(angle) * 0.34 * scale);
        ctx.stroke();
    }

    // Number labels
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < 20; i++) {
        const angle = startOffset + i * sectorAngle + sectorAngle / 2;
        const r = 0.36 * scale;
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        ctx.fillText(SECTOR_SCORES[i].toString(), x, y);
    }

    const texture = new THREE.CanvasTexture(canvas);
    texture.colorSpace = THREE.SRGBColorSpace;
    const boardFaceGeo = new THREE.CircleGeometry(0.38, 64);
    const boardFaceMat = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.7 });
    const boardFace = new THREE.Mesh(boardFaceGeo, boardFaceMat);
    boardFace.position.z = 0.016;
    boardFace.receiveShadow = true;
    boardGroup.add(boardFace);
}

function drawSector(ctx, cx, cy, innerR, outerR, angle1, angle2, color) {
    ctx.beginPath();
    ctx.arc(cx, cy, outerR, angle1, angle2);
    ctx.arc(cx, cy, innerR, angle2, angle1, true);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
}

createDartboard();

// ============ HELMET (TROPHY) ============
let helmetModel = null;

const loader = new GLTFLoader();
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/libs/draco/');
loader.setDRACOLoader(dracoLoader);

// Try loading the helmet model
function loadHelmet() {
    const urls = [
        'DamagedHelmet.glb',
        './DamagedHelmet.glb',
        '._DamagedHelmet.glb',
        'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb'
    ];

    function tryLoad(index) {
        if (index >= urls.length) {
            // Create a fallback trophy
            createFallbackTrophy();
            return;
        }
        loader.load(urls[index],
            (gltf) => {
                helmetModel = gltf.scene;
                helmetModel.position.set(2, 0.5, -2);
                helmetModel.scale.set(0.3, 0.3, 0.3);
                helmetModel.visible = false;
                helmetModel.traverse(child => {
                    if (child.isMesh) {
                        child.castShadow = true;
                    }
                });
                scene.add(helmetModel);
            },
            undefined,
            () => tryLoad(index + 1)
        );
    }
    tryLoad(0);
}

function createFallbackTrophy() {
    // Create a trophy-like object as fallback
    const group = new THREE.Group();

    // Cup body
    const cupGeo = new THREE.LatheGeometry([
        new THREE.Vector2(0, 0),
        new THREE.Vector2(0.15, 0),
        new THREE.Vector2(0.18, 0.05),
        new THREE.Vector2(0.08, 0.15),
        new THREE.Vector2(0.06, 0.25),
        new THREE.Vector2(0.06, 0.3),
        new THREE.Vector2(0.2, 0.45),
        new THREE.Vector2(0.22, 0.5),
        new THREE.Vector2(0.22, 0.55),
        new THREE.Vector2(0.2, 0.6),
        new THREE.Vector2(0.15, 0.62),
    ], 32);
    const cupMat = new THREE.MeshStandardMaterial({
        color: 0xffd700,
        metalness: 0.9,
        roughness: 0.1
    });
    const cup = new THREE.Mesh(cupGeo, cupMat);
    cup.castShadow = true;
    group.add(cup);

    // Star on top
    const starShape = new THREE.Shape();
    const outerR2 = 0.08, innerR2 = 0.04;
    for (let i = 0; i < 5; i++) {
        const outerAngle = (i * 2 * Math.PI / 5) - Math.PI / 2;
        const innerAngle = outerAngle + Math.PI / 5;
        if (i === 0) starShape.moveTo(Math.cos(outerAngle) * outerR2, Math.sin(outerAngle) * outerR2);
        else starShape.lineTo(Math.cos(outerAngle) * outerR2, Math.sin(outerAngle) * outerR2);
        starShape.lineTo(Math.cos(innerAngle) * innerR2, Math.sin(innerAngle) * innerR2);
    }
    starShape.closePath();
    const starGeo = new THREE.ExtrudeGeometry(starShape, { depth: 0.02, bevelEnabled: false });
    const star = new THREE.Mesh(starGeo, cupMat);
    star.position.set(0, 0.65, 0);
    star.rotation.x = -Math.PI / 2;
    group.add(star);

    group.position.set(2, 0.5, -2);
    group.scale.set(0.8, 0.8, 0.8);
    group.visible = false;
    scene.add(group);
    helmetModel = group;
}

loadHelmet();

// ============ DARTS COLLECTION ============
const thrownDarts = [];

function createDart() {
    const dartGroup = new THREE.Group();

    // Dart body (cone)
    const bodyGeo = new THREE.ConeGeometry(0.015, 0.15, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc2222, metalness: 0.3, roughness: 0.5 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.rotation.x = Math.PI / 2;
    body.position.z = -0.075;
    body.castShadow = true;
    dartGroup.add(body);

    // Dart tip
    const tipGeo = new THREE.ConeGeometry(0.005, 0.04, 6);
    const tipMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.9, roughness: 0.2 });
    const tip = new THREE.Mesh(tipGeo, tipMat);
    tip.rotation.x = Math.PI / 2;
    tip.position.z = -0.17;
    dartGroup.add(tip);

    // Flights (fins)
    const flightGeo = new THREE.PlaneGeometry(0.03, 0.04);
    const flightMat = new THREE.MeshStandardMaterial({ color: 0xff4444, side: THREE.DoubleSide });
    for (let i = 0; i < 4; i++) {
        const flight = new THREE.Mesh(flightGeo, flightMat);
        flight.position.z = 0.02;
        flight.rotation.z = (i * Math.PI) / 2;
        dartGroup.add(flight);
    }

    return dartGroup;
}

// ============ AIMING ============
const mouse = new THREE.Vector2();
const raycaster = new THREE.Raycaster();
const boardPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 3);
const crosshairEl = document.getElementById('crosshair');
let aimPoint = new THREE.Vector3();

function onMouseMove(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersectPoint = new THREE.Vector3();
    raycaster.ray.intersectPlane(boardPlane, intersectPoint);

    if (intersectPoint) {
        aimPoint.copy(intersectPoint);
        // Project to screen for crosshair
        const screenPos = intersectPoint.clone().project(camera);
        const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;
        crosshairEl.style.left = x + 'px';
        crosshairEl.style.top = y + 'px';
        crosshairEl.style.display = 'block';
    }
}

function onMouseClick(event) {
    if (event.button !== 0) return;
    if (state.dartInFlight || state.gameOver || state.dartsRemaining <= 0) return;

    throwDart();
}

window.addEventListener('mousemove', onMouseMove);
window.addEventListener('mousedown', onMouseClick);

// ============ THROW DART ============
function throwDart() {
    state.dartInFlight = true;

    const dart = createDart();
    scene.add(dart);

    const startPos = camera.position.clone().add(new THREE.Vector3(0.1, -0.1, -0.3));
    dart.position.copy(startPos);

    // Calculate target with difficulty offset
    let targetLocal = new THREE.Vector3(
        aimPoint.x - BOARD_CENTER.x,
        aimPoint.y - BOARD_CENTER.y,
        0
    );

    // If board is rotating at difficulty 3, we need to account for the board's rotation
    // The aim point is in world space, but scoring is in board-local space
    // Apply inverse rotation to get the local position
    if (state.difficultyLevel >= 3) {
        const invRotation = -boardGroup.rotation.z;
        const rx = targetLocal.x * Math.cos(invRotation) - targetLocal.y * Math.sin(invRotation);
        const ry = targetLocal.x * Math.sin(invRotation) + targetLocal.y * Math.cos(invRotation);
        targetLocal.x = rx;
        targetLocal.y = ry;
    }

    // Apply difficulty offset
    let offset = 0;
    if (state.difficultyLevel === 2) offset = 0.03;
    else if (state.difficultyLevel >= 3) offset = 0.06;

    if (offset > 0) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * offset;
        targetLocal.x += Math.cos(angle) * dist;
        targetLocal.y += Math.sin(angle) * dist;
    }

    // Convert back to world space for animation target
    let worldTarget = new THREE.Vector3();
    if (state.difficultyLevel >= 3) {
        const rot = boardGroup.rotation.z;
        worldTarget.x = targetLocal.x * Math.cos(rot) - targetLocal.y * Math.sin(rot) + BOARD_CENTER.x;
        worldTarget.y = targetLocal.x * Math.sin(rot) + targetLocal.y * Math.cos(rot) + BOARD_CENTER.y;
    } else {
        worldTarget.x = targetLocal.x + BOARD_CENTER.x;
        worldTarget.y = targetLocal.y + BOARD_CENTER.y;
    }
    worldTarget.z = BOARD_CENTER.z + 0.02;

    // Store the local position for scoring
    const localHitX = targetLocal.x;
    const localHitY = targetLocal.y;

    // Animate
    const startTime = performance.now();
    const duration = DART_FLY_TIME * 1000;

    function animateDart(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);

        // Smooth easing
        const easeT = 1 - Math.pow(1 - t, 3);

        // Position with parabolic arc
        dart.position.lerpVectors(startPos, worldTarget, easeT);
        dart.position.y += Math.sin(t * Math.PI) * 0.15 * (1 - t);

        // Orient dart toward target
        const direction = worldTarget.clone().sub(dart.position).normalize();
        dart.lookAt(dart.position.clone().add(direction));

        if (t < 1) {
            requestAnimationFrame(animateDart);
        } else {
            // Dart landed
            dart.position.copy(worldTarget);
            dart.lookAt(worldTarget.clone().add(new THREE.Vector3(0, 0, -1)));
            thrownDarts.push(dart);

            // Score the dart
            const score = calculateScore(localHitX, localHitY);
            state.lastDartScore = score;
            state.lastDartPosition = { x: localHitX, y: localHitY };
            state.roundScore += score;
            state.totalScore += score;
            state.dartsRemaining--;
            state.dartsThrown++;
            state.dartInFlight = false;

            // Show score popup
            showScorePopup(score, worldTarget);

            // Update difficulty
            updateDifficulty();

            // Check helmet visibility
            if (state.totalScore >= 100 && helmetModel) {
                helmetModel.visible = true;
                state.helmetVisible = true;
            }

            // Check round/game end
            if (state.dartsRemaining <= 0) {
                if (state.currentRound >= 3) {
                    state.gameOver = true;
                    document.getElementById('game-over-msg').style.display = 'block';
                    document.getElementById('final-score').textContent = state.totalScore;
                } else {
                    // Next round after a short delay
                    setTimeout(() => {
                        state.currentRound++;
                        state.dartsRemaining = 3;
                        state.roundScore = 0;
                        updateHUD();
                    }, 800);
                }
            }

            updateHUD();
        }
    }

    requestAnimationFrame(animateDart);
}

// ============ SCORING ============
function calculateScore(x, y) {
    const dist = Math.sqrt(x * x + y * y);

    // Outside board
    if (dist > 0.34) return 0;

    // Bullseye
    if (dist < 0.025) return 50;

    // Inner bull
    if (dist < 0.06) return 25;

    // Determine sector
    let angle = Math.atan2(x, y); // Note: atan2(x,y) because 0 is at top
    if (angle < 0) angle += Math.PI * 2;

    const sectorAngle = Math.PI / 10;
    // Shift by half sector so sector boundaries align
    let adjustedAngle = angle + sectorAngle / 2;
    if (adjustedAngle >= Math.PI * 2) adjustedAngle -= Math.PI * 2;

    const sectorIndex = Math.floor(adjustedAngle / sectorAngle) % 20;
    const baseScore = SECTOR_SCORES[sectorIndex];

    // Triple ring
    if (dist >= 0.19 && dist <= 0.21) return baseScore * 3;

    // Double ring
    if (dist >= 0.32 && dist <= 0.34) return baseScore * 2;

    // Single (inner or outer)
    return baseScore;
}

// ============ DIFFICULTY ============
function updateDifficulty() {
    if (state.totalScore >= 150) {
        state.difficultyLevel = 3;
    } else if (state.totalScore >= 50) {
        state.difficultyLevel = 2;
    } else {
        state.difficultyLevel = 1;
    }
}

// ============ SCORE POPUP ============
function showScorePopup(score, worldPos) {
    const screenPos = worldPos.clone().project(camera);
    const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;

    const popup = document.createElement('div');
    popup.className = 'score-popup';
    popup.textContent = score > 0 ? `+${score}` : 'MISS';
    if (score === 0) popup.style.color = '#e74c3c';
    if (score >= 50) popup.style.color = '#ff0';
    popup.style.left = x + 'px';
    popup.style.top = y + 'px';
    document.body.appendChild(popup);

    setTimeout(() => popup.remove(), 1500);
}

// ============ HUD UPDATE ============
function updateHUD() {
    document.getElementById('round-display').textContent = `${state.currentRound} / 3`;
    document.getElementById('darts-display').textContent = state.dartsRemaining;
    document.getElementById('round-score-display').textContent = state.roundScore;
    document.getElementById('total-score-display').textContent = state.totalScore;

    const lastScoreEl = document.getElementById('last-dart-score');
    if (state.dartsThrown > 0) {
        lastScoreEl.textContent = state.lastDartScore;
        if (state.lastDartScore >= 50) lastScoreEl.style.color = '#ffd700';
        else if (state.lastDartScore >= 20) lastScoreEl.style.color = '#2ecc71';
        else if (state.lastDartScore > 0) lastScoreEl.style.color = '#fff';
        else lastScoreEl.style.color = '#e74c3c';
    } else {
        lastScoreEl.textContent = '-';
        lastScoreEl.style.color = '#fff';
    }

    const diffEl = document.getElementById('difficulty-display');
    diffEl.textContent = `Level ${state.difficultyLevel}`;
    diffEl.className = `diff-${state.difficultyLevel}`;
}

// ============ NEW GAME ============
document.getElementById('new-game-btn').addEventListener('click', () => {
    // Reset state
    state.totalScore = 0;
    state.roundScore = 0;
    state.currentRound = 1;
    state.dartsRemaining = 3;
    state.dartsThrown = 0;
    state.difficultyLevel = 1;
    state.lastDartScore = 0;
    state.lastDartPosition = { x: 0, y: 0 };
    state.gameOver = false;
    state.helmetVisible = false;
    state.boardRotation = 0;
    state.dartInFlight = false;

    // Remove thrown darts
    thrownDarts.forEach(d => scene.remove(d));
    thrownDarts.length = 0;

    // Hide helmet
    if (helmetModel) helmetModel.visible = false;

    // Reset board rotation
    boardGroup.rotation.z = 0;

    // Hide game over
    document.getElementById('game-over-msg').style.display = 'none';

    updateHUD();
});

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    // Rotate board at difficulty 3
    if (state.difficultyLevel >= 3 && !state.gameOver) {
        boardGroup.rotation.z += 0.2 * delta;
        state.boardRotation = boardGroup.rotation.z;

        // Update thrown darts to follow board rotation
        // (Darts are in world space, so we don't need to rotate them with the board visually
        //  since they're stuck in the board)
    }

    // Rotate helmet trophy
    if (helmetModel && helmetModel.visible) {
        helmetModel.rotation.y += 0.5 * delta;
    }

    // Sync state
    state.boardRotation = boardGroup.rotation.z;

    renderer.render(scene, camera);
}

updateHUD();
animate();
</script>
