<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Darts Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            color: white;
            text-shadow: 1px 1px 2px black;
        }
        .hud-panel {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: auto;
        }
        .top-hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .stats {
            font-size: 1.2rem;
            line-height: 1.5;
        }
        .score-display {
            text-align: right;
        }
        .score-display h1 {
            margin: 0;
            font-size: 3rem;
            color: #ffd700;
        }
        .score-display h3 {
            margin: 5px 0 0 0;
            font-size: 1.5rem;
        }
        #new-game-btn {
            pointer-events: auto;
            padding: 10px 20px;
            font-size: 1.2rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #new-game-btn:hover {
            background-color: #45a049;
        }
        #game-over-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: bold;
            color: #ff4444;
            text-shadow: 2px 2px 4px #000;
            display: none;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 10px;
            border: 2px solid #ff4444;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none; /* Using 3D crosshair instead */
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div class="top-hud">
            <div class="hud-panel stats">
                <div>Round: <span id="round-display">1</span> / 3</div>
                <div>Darts Remaining: <span id="darts-display">3</span></div>
                <div>Difficulty Level: <span id="difficulty-display">1</span></div>
                <div style="margin-top: 10px; font-size: 0.9em; color: #aaa;">
                    Last Dart: <span id="last-dart-score">0</span> pts
                </div>
            </div>
            
            <div class="hud-panel score-display">
                <div>Total Score</div>
                <h1 id="total-score-display">0</h1>
                <div>Round Score</div>
                <h3 id="round-score-display">0</h3>
            </div>
        </div>
        
        <div>
            <button id="new-game-btn">New Game</button>
        </div>
    </div>

    <div id="game-over-msg">GAME OVER</div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            totalScore: 0,
            roundScore: 0,
            currentRound: 1,
            dartsRemaining: 3,
            dartsThrown: 0,
            difficultyLevel: 1,
            lastDartScore: 0,
            lastDartPosition: { x: 0, y: 0 },
            gameOver: false,
            helmetVisible: false,
            boardRotation: 0,
            dartInFlight: false
        };

        const state = window.__3D_STATE__;
        const sectors = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        scene.fog = new THREE.FogExp2(0x111111, 0.05);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.6, 3);
        camera.lookAt(0, 1.6, -3);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xffffff, 1.2);
        spotLight.position.set(0, 3, 0);
        spotLight.target.position.set(0, 1.6, -3);
        spotLight.angle = Math.PI / 4;
        spotLight.penumbra = 0.5;
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.width = 1024;
        spotLight.shadow.mapSize.height = 1024;
        scene.add(spotLight);
        scene.add(spotLight.target);

        // --- Dartboard Generation ---
        function createDartboardTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            const cx = 512, cy = 512, r = 512;

            // Background
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, 1024, 1024);

            // Helper to map 3D radius (0.5 max) to canvas radius (512 max)
            const mapR = (rad3D) => (rad3D / 0.5) * r;

            const rDoubleOut = mapR(0.34);
            const rDoubleIn = mapR(0.32);
            const rTripleOut = mapR(0.21);
            const rTripleIn = mapR(0.19);
            const rBullOut = mapR(0.06);
            const rBullIn = mapR(0.025);

            // Draw Sectors
            for (let i = 0; i < 20; i++) {
                const angleStart = (i * Math.PI / 10) - Math.PI / 2 - Math.PI / 20;
                const angleEnd = angleStart + Math.PI / 10;
                const isEven = i % 2 === 0;

                // Outer Single
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, rDoubleIn, angleStart, angleEnd);
                ctx.fillStyle = isEven ? '#222222' : '#e0d8c8';
                ctx.fill();

                // Double Ring
                ctx.beginPath();
                ctx.arc(cx, cy, rDoubleOut, angleStart, angleEnd);
                ctx.arc(cx, cy, rDoubleIn, angleEnd, angleStart, true);
                ctx.fillStyle = isEven ? '#c41e3a' : '#009e60';
                ctx.fill();

                // Inner Single (overwrites part of outer single)
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, rTripleIn, angleStart, angleEnd);
                ctx.fillStyle = isEven ? '#222222' : '#e0d8c8';
                ctx.fill();

                // Triple Ring
                ctx.beginPath();
                ctx.arc(cx, cy, rTripleOut, angleStart, angleEnd);
                ctx.arc(cx, cy, rTripleIn, angleEnd, angleStart, true);
                ctx.fillStyle = isEven ? '#c41e3a' : '#009e60';
                ctx.fill();
            }

            // Outer Bull
            ctx.beginPath();
            ctx.arc(cx, cy, rBullOut, 0, Math.PI * 2);
            ctx.fillStyle = '#009e60';
            ctx.fill();

            // Inner Bull
            ctx.beginPath();
            ctx.arc(cx, cy, rBullIn, 0, Math.PI * 2);
            ctx.fillStyle = '#c41e3a';
            ctx.fill();

            // Wireframe overlay (simple circles)
            ctx.strokeStyle = '#dddddd';
            ctx.lineWidth = 2;
            [rDoubleOut, rDoubleIn, rTripleOut, rTripleIn, rBullOut, rBullIn].forEach(rad => {
                ctx.beginPath();
                ctx.arc(cx, cy, rad, 0, Math.PI * 2);
                ctx.stroke();
            });

            // Sector lines
            for (let i = 0; i < 20; i++) {
                const angle = (i * Math.PI / 10) - Math.PI / 2 - Math.PI / 20;
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(angle) * rBullOut, cy + Math.sin(angle) * rBullOut);
                ctx.lineTo(cx + Math.cos(angle) * rDoubleOut, cy + Math.sin(angle) * rDoubleOut);
                ctx.stroke();
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        const boardGeometry = new THREE.CylinderGeometry(0.5, 0.5, 0.05, 64);
        boardGeometry.rotateX(Math.PI / 2); // Face camera
        const boardMaterial = new THREE.MeshStandardMaterial({
            map: createDartboardTexture(),
            roughness: 0.8,
            metalness: 0.1
        });
        const dartboard = new THREE.Mesh(boardGeometry, boardMaterial);
        dartboard.position.set(0, 1.6, -3);
        dartboard.castShadow = true;
        dartboard.receiveShadow = true;
        scene.add(dartboard);

        // Wall behind board
        const wallGeo = new THREE.PlaneGeometry(10, 10);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9 });
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(0, 1.6, -3.05);
        wall.receiveShadow = true;
        scene.add(wall);

        // --- Trophy Helmet ---
        let helmetModel = null;
        const loader = new GLTFLoader();
        loader.load('._DamagedHelmet.glb', (gltf) => {
            helmetModel = gltf.scene;
            helmetModel.position.set(2, 0.5, -2);
            helmetModel.scale.set(0.3, 0.3, 0.3);
            helmetModel.visible = false;
            
            helmetModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(helmetModel);
        }, undefined, (error) => {
            console.warn("Could not load helmet model. It will be ignored.", error);
        });

        // --- Crosshair & Raycasting ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const targetPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 3); // Plane at z=-3
        const aimPoint = new THREE.Vector3();

        // 3D Crosshair
        const crosshairGeo = new THREE.BufferGeometry();
        const crosshairVerts = new Float32Array([
            -0.05, 0, 0,  0.05, 0, 0,
            0, -0.05, 0,  0, 0.05, 0
        ]);
        crosshairGeo.setAttribute('position', new THREE.BufferAttribute(crosshairVerts, 3));
        const crosshairMat = new THREE.LineBasicMaterial({ color: 0x00ff00, depthTest: false });
        const crosshair = new THREE.LineSegments(crosshairGeo, crosshairMat);
        crosshair.renderOrder = 999;
        scene.add(crosshair);

        // --- Dart Mechanics ---
        const thrownDarts = [];
        let activeDart = null;
        let throwStartTime = 0;
        const dartStartPos = new THREE.Vector3();
        const dartTargetPos = new THREE.Vector3();

        function createDartMesh() {
            const group = new THREE.Group();
            
            // Body
            const bodyGeo = new THREE.CylinderGeometry(0.005, 0.005, 0.1, 8);
            bodyGeo.translate(0, 0.05, 0);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8, roughness: 0.2 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            
            // Tip (Cone)
            const tipGeo = new THREE.ConeGeometry(0.015, 0.15, 16);
            tipGeo.translate(0, 0.075, 0);
            const tipMat = new THREE.MeshStandardMaterial({ color: 0xff0000, roughness: 0.4 });
            const tip = new THREE.Mesh(tipGeo, tipMat);
            
            // Flights
            const flightGeo = new THREE.PlaneGeometry(0.04, 0.04);
            const flightMat = new THREE.MeshStandardMaterial({ color: 0x222222, side: THREE.DoubleSide });
            const flight1 = new THREE.Mesh(flightGeo, flightMat);
            flight1.position.y = 0.1;
            const flight2 = new THREE.Mesh(flightGeo, flightMat);
            flight2.position.y = 0.1;
            flight2.rotation.y = Math.PI / 2;

            group.add(body);
            group.add(tip);
            group.add(flight1);
            group.add(flight2);
            
            // Orient so tip points along -Z initially
            group.rotation.x = -Math.PI / 2;
            
            // Wrap in another group to pivot around tip
            const pivot = new THREE.Group();
            group.position.z = 0.075; // Shift back so origin is at tip
            pivot.add(group);
            
            pivot.castShadow = true;
            return pivot;
        }

        // --- Game Logic ---
        function calculateScore(x, y, boardRot) {
            const dx = x - dartboard.position.x;
            const dy = y - dartboard.position.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > 0.34) return 0;
            if (dist < 0.025) return 50;
            if (dist < 0.06) return 25;

            // Calculate angle clockwise from top (+y)
            let angle = Math.atan2(dx, dy);
            if (angle < 0) angle += Math.PI * 2;

            // Adjust for board rotation (board rotates CCW around Z, so sectors move CCW)
            // A hit at angle A on a board rotated by R is equivalent to hitting angle A+R on unrotated board
            let effectiveAngle = angle + boardRot;
            effectiveAngle = effectiveAngle % (Math.PI * 2);
            if (effectiveAngle < 0) effectiveAngle += Math.PI * 2;

            const sectorIdx = Math.floor((effectiveAngle + Math.PI / 20) / (Math.PI / 10)) % 20;
            const baseScore = sectors[sectorIdx];

            if (dist >= 0.32 && dist <= 0.34) return baseScore * 2;
            if (dist >= 0.19 && dist <= 0.21) return baseScore * 3;
            return baseScore;
        }

        function updateUI() {
            document.getElementById('round-display').innerText = state.currentRound;
            document.getElementById('darts-display').innerText = state.dartsRemaining;
            document.getElementById('difficulty-display').innerText = state.difficultyLevel;
            document.getElementById('last-dart-score').innerText = state.lastDartScore;
            document.getElementById('round-score-display').innerText = state.roundScore;
            document.getElementById('total-score-display').innerText = state.totalScore;
            
            if (state.gameOver) {
                document.getElementById('game-over-msg').style.display = 'block';
            } else {
                document.getElementById('game-over-msg').style.display = 'none';
            }
        }

        function handleDartLanded() {
            const score = calculateScore(dartTargetPos.x, dartTargetPos.y, state.boardRotation);
            
            state.lastDartScore = score;
            state.lastDartPosition = { 
                x: dartTargetPos.x - dartboard.position.x, 
                y: dartTargetPos.y - dartboard.position.y 
            };
            state.roundScore += score;
            state.totalScore += score;

            // Dynamic Difficulty
            if (state.totalScore >= 150) state.difficultyLevel = 3;
            else if (state.totalScore >= 50) state.difficultyLevel = 2;

            // Helmet Trophy
            if (state.totalScore >= 100 && !state.helmetVisible) {
                state.helmetVisible = true;
                if (helmetModel) helmetModel.visible = true;
            }

            thrownDarts.push(activeDart);
            
            // Attach dart to board so it rotates with it
            THREE.SceneUtils?.attach ? THREE.SceneUtils.attach(activeDart, scene, dartboard) : dartboard.attach(activeDart);

            activeDart = null;

            if (state.dartsRemaining === 0) {
                if (state.currentRound < 3) {
                    setTimeout(() => {
                        state.currentRound++;
                        state.dartsRemaining = 3;
                        state.roundScore = 0;
                        
                        // Clear darts
                        thrownDarts.forEach(d => {
                            d.removeFromParent();
                            // Dispose geometry/materials in a real app
                        });
                        thrownDarts.length = 0;
                        
                        updateUI();
                    }, 1500);
                } else {
                    state.gameOver = true;
                }
            }
            updateUI();
        }

        function throwDart() {
            if (state.dartInFlight || state.dartsRemaining <= 0 || state.gameOver) return;

            let targetX = aimPoint.x;
            let targetY = aimPoint.y;

            // Apply difficulty offset
            let offsetMax = 0;
            if (state.difficultyLevel === 2) offsetMax = 0.03;
            if (state.difficultyLevel === 3) offsetMax = 0.06;

            if (offsetMax > 0) {
                const r = Math.random() * offsetMax;
                const theta = Math.random() * Math.PI * 2;
                targetX += r * Math.cos(theta);
                targetY += r * Math.sin(theta);
            }

            dartTargetPos.set(targetX, targetY, -3);
            dartStartPos.copy(camera.position);
            dartStartPos.y -= 0.2; // Throw from slightly below camera
            dartStartPos.x += 0.2; // Throw from slightly right

            activeDart = createDartMesh();
            scene.add(activeDart);

            throwStartTime = performance.now();
            state.dartInFlight = true;
            state.dartsRemaining--;
            state.dartsThrown++;
            
            updateUI();
        }

        function resetGame() {
            state.totalScore = 0;
            state.roundScore = 0;
            state.currentRound = 1;
            state.dartsRemaining = 3;
            state.dartsThrown = 0;
            state.difficultyLevel = 1;
            state.lastDartScore = 0;
            state.gameOver = false;
            state.helmetVisible = false;
            state.boardRotation = 0;
            state.dartInFlight = false;

            if (helmetModel) helmetModel.visible = false;
            dartboard.rotation.z = 0;

            thrownDarts.forEach(d => d.removeFromParent());
            thrownDarts.length = 0;
            if (activeDart) {
                activeDart.removeFromParent();
                activeDart = null;
            }

            updateUI();
        }

        // --- Input Handling ---
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(targetPlane, aimPoint);
            
            crosshair.position.copy(aimPoint);
            // Keep crosshair slightly in front of board
            crosshair.position.z += 0.01;
        });

        window.addEventListener('mousedown', (e) => {
            if (e.button === 0 && e.target.tagName !== 'BUTTON') {
                throwDart();
            }
        });

        document.getElementById('new-game-btn').addEventListener('click', resetGame);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = clock.getDelta();

            // Dart Animation
            if (state.dartInFlight && activeDart) {
                const elapsed = (time - throwStartTime) / 1000;
                const duration = 0.4;
                let t = elapsed / duration;

                if (t >= 1) {
                    t = 1;
                    state.dartInFlight = false;
                    
                    // Final position and orientation
                    activeDart.position.copy(dartTargetPos);
                    
                    // Calculate final derivative for orientation
                    const prevT = 0.99;
                    const prevPos = new THREE.Vector3().lerpVectors(dartStartPos, dartTargetPos, prevT);
                    prevPos.y += Math.sin(prevT * Math.PI) * 0.4;
                    
                    const lookDir = new THREE.Vector3().subVectors(dartTargetPos, prevPos).normalize();
                    const lookTarget = new THREE.Vector3().copy(dartTargetPos).add(lookDir);
                    activeDart.lookAt(lookTarget);

                    handleDartLanded();
                } else {
                    // Interpolate position
                    const currentPos = new THREE.Vector3().lerpVectors(dartStartPos, dartTargetPos, t);
                    // Add parabolic arc
                    currentPos.y += Math.sin(t * Math.PI) * 0.4; 
                    activeDart.position.copy(currentPos);

                    // Orient dart along trajectory
                    const nextT = Math.min(1, t + 0.05);
                    const nextPos = new THREE.Vector3().lerpVectors(dartStartPos, dartTargetPos, nextT);
                    nextPos.y += Math.sin(nextT * Math.PI) * 0.4;
                    activeDart.lookAt(nextPos);
                }
            }

            // Board Rotation (Difficulty 3)
            if (state.difficultyLevel === 3 && !state.gameOver) {
                state.boardRotation += 0.2 * delta;
                dartboard.rotation.z = state.boardRotation;
            }

            // Helmet Rotation
            if (state.helmetVisible && helmetModel) {
                helmetModel.rotation.y += 0.5 * delta;
            }

            renderer.render(scene, camera);
        }

        // Initialize UI and start loop
        updateUI();
        animate();

    </script>
</body>
</html>
