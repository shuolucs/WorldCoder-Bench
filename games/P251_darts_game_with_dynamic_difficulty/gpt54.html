<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Darts Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.55);
      padding: 12px 14px;
      border-radius: 8px;
      line-height: 1.6;
      min-width: 220px;
    }

    #hud button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #d32f2f;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    #hud button:hover {
      background: #f44336;
    }

    #game-over-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 42px;
      font-weight: bold;
      color: #ffd54f;
      text-shadow: 0 0 12px rgba(0,0,0,0.8);
      z-index: 20;
      display: none;
    }

    #crosshair {
      position: absolute;
      width: 24px;
      height: 24px;
      pointer-events: none;
      z-index: 15;
      transform: translate(-50%, -50%);
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: white;
      box-shadow: 0 0 6px rgba(255,255,255,0.9);
    }

    #crosshair::before {
      left: 11px;
      top: 0;
      width: 2px;
      height: 24px;
    }

    #crosshair::after {
      top: 11px;
      left: 0;
      width: 24px;
      height: 2px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Difficulty: <span id="difficulty-display">1</span></div>
    <div>Round: <span id="round-display">1</span></div>
    <div>Darts Remaining: <span id="darts-display">3</span></div>
    <div>Round Score: <span id="round-score-display">0</span></div>
    <div>Total Score: <span id="total-score-display">0</span></div>
    <div>Last Dart Score: <span id="last-dart-score">0</span></div>
    <button id="new-game-btn">New Game</button>
  </div>

  <div id="crosshair"></div>
  <div id="game-over-msg">Game Over</div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.6, 3);
    camera.lookAt(0, 1.6, -3);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const spotlight = new THREE.SpotLight(0xffffff, 1.2, 20, Math.PI / 6, 0.25, 1);
    spotlight.position.set(0, 3, 0);
    spotlight.target.position.set(0, 1.6, -3);
    scene.add(spotlight);
    scene.add(spotlight.target);

    const boardCenter = new THREE.Vector3(0, 1.6, -3);
    const boardRadius = 0.5;

    const boardGroup = new THREE.Group();
    boardGroup.position.copy(boardCenter);
    scene.add(boardGroup);

    function createRingGeometry(inner, outer, segments = 64) {
      const shape = new THREE.Shape();
      shape.absarc(0, 0, outer, 0, Math.PI * 2, false);

      const hole = new THREE.Path();
      hole.absarc(0, 0, inner, 0, Math.PI * 2, true);
      shape.holes.push(hole);

      return new THREE.ShapeGeometry(shape, segments);
    }

    function createDartboard() {
      const sectorValues = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];

      const boardBacking = new THREE.Mesh(
        new THREE.CircleGeometry(boardRadius, 64),
        new THREE.MeshStandardMaterial({ color: 0xf5e6c8 })
      );
      boardGroup.add(boardBacking);

      const radii = {
        bullseye: 0.025,
        innerBull: 0.06,
        tripleInner: 0.19,
        tripleOuter: 0.21,
        doubleInner: 0.32,
        doubleOuter: 0.34
      };

      const black = new THREE.Color(0x111111);
      const cream = new THREE.Color(0xf1e4b8);
      const red = new THREE.Color(0xc62828);
      const green = new THREE.Color(0x2e7d32);

      const sectorAngle = (Math.PI * 2) / 20;

      for (let i = 0; i < 20; i++) {
        const start = Math.PI / 2 - (i + 1) * sectorAngle;
        const end = Math.PI / 2 - i * sectorAngle;

        const singleColor = i % 2 === 0 ? black : cream;
        const ringColor = i % 2 === 0 ? red : green;

        const single1 = new THREE.Mesh(
          createSectorGeometry(radii.innerBull, radii.tripleInner, start, end),
          new THREE.MeshStandardMaterial({ color: singleColor, side: THREE.DoubleSide })
        );
        single1.position.z = 0.001;
        boardGroup.add(single1);

        const triple = new THREE.Mesh(
          createSectorGeometry(radii.tripleInner, radii.tripleOuter, start, end),
          new THREE.MeshStandardMaterial({ color: ringColor, side: THREE.DoubleSide })
        );
        triple.position.z = 0.002;
        boardGroup.add(triple);

        const single2 = new THREE.Mesh(
          createSectorGeometry(radii.tripleOuter, radii.doubleInner, start, end),
          new THREE.MeshStandardMaterial({ color: singleColor, side: THREE.DoubleSide })
        );
        single2.position.z = 0.001;
        boardGroup.add(single2);

        const doubleRing = new THREE.Mesh(
          createSectorGeometry(radii.doubleInner, radii.doubleOuter, start, end),
          new THREE.MeshStandardMaterial({ color: ringColor, side: THREE.DoubleSide })
        );
        doubleRing.position.z = 0.002;
        boardGroup.add(doubleRing);
      }

      const innerBull = new THREE.Mesh(
        new THREE.CircleGeometry(radii.innerBull, 32),
        new THREE.MeshStandardMaterial({ color: green })
      );
      innerBull.position.z = 0.003;
      boardGroup.add(innerBull);

      const bullseye = new THREE.Mesh(
        new THREE.CircleGeometry(radii.bullseye, 32),
        new THREE.MeshStandardMaterial({ color: red })
      );
      bullseye.position.z = 0.004;
      boardGroup.add(bullseye);

      const border = new THREE.Mesh(
        createRingGeometry(radii.doubleOuter, boardRadius),
        new THREE.MeshStandardMaterial({ color: 0x333333, side: THREE.DoubleSide })
      );
      border.position.z = -0.001;
      boardGroup.add(border);

      return sectorValues;
    }

    function createSectorGeometry(innerR, outerR, startAngle, endAngle, steps = 24) {
      const shape = new THREE.Shape();
      const pts = [];

      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const a = startAngle + (endAngle - startAngle) * t;
        pts.push(new THREE.Vector2(Math.cos(a) * outerR, Math.sin(a) * outerR));
      }

      for (let i = steps; i >= 0; i--) {
        const t = i / steps;
        const a = startAngle + (endAngle - startAngle) * t;
        pts.push(new THREE.Vector2(Math.cos(a) * innerR, Math.sin(a) * innerR));
      }

      shape.setFromPoints(pts);
      return new THREE.ShapeGeometry(shape);
    }

    const sectorValues = createDartboard();

    const roomFloor = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 10),
      new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 1 })
    );
    roomFloor.rotation.x = -Math.PI / 2;
    roomFloor.position.y = 0;
    scene.add(roomFloor);

    const roomBack = new THREE.Mesh(
      new THREE.PlaneGeometry(8, 5),
      new THREE.MeshStandardMaterial({ color: 0x2a2a2a })
    );
    roomBack.position.set(0, 2.5, -4.5);
    scene.add(roomBack);

    let helmetModel = null;
    const loader = new GLTFLoader();
    loader.load(
      '._DamagedHelmet.glb',
      (gltf) => {
        helmetModel = gltf.scene;
        helmetModel.position.set(2, 0.5, -2);
        helmetModel.scale.setScalar(0.3);
        helmetModel.visible = false;
        scene.add(helmetModel);
      },
      undefined,
      (err) => {
        console.warn('Failed to load helmet model:', err);
      }
    );

    const dartGeometry = new THREE.ConeGeometry(0.015, 0.15, 12);
    dartGeometry.rotateX(Math.PI / 2);
    const dartMaterial = new THREE.MeshStandardMaterial({ color: 0xd32f2f });

    const dartboardPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 3);
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const crosshair = document.getElementById('crosshair');
    const difficultyDisplay = document.getElementById('difficulty-display');
    const roundDisplay = document.getElementById('round-display');
    const dartsDisplay = document.getElementById('darts-display');
    const roundScoreDisplay = document.getElementById('round-score-display');
    const totalScoreDisplay = document.getElementById('total-score-display');
    const lastDartScoreDisplay = document.getElementById('last-dart-score');
    const gameOverMsg = document.getElementById('game-over-msg');
    const newGameBtn = document.getElementById('new-game-btn');

    const state = {
      totalScore: 0,
      roundScore: 0,
      currentRound: 1,
      dartsRemaining: 3,
      dartsThrown: 0,
      difficultyLevel: 1,
      lastDartScore: 0,
      lastDartPosition: { x: 0, y: 0 },
      gameOver: false,
      helmetVisible: false,
      boardRotation: 0,
      dartInFlight: false
    };

    window.__3D_STATE__ = { ...state };

    let currentAimPoint = new THREE.Vector3(0, 1.6, -3);
    const thrownDarts = [];
    let activeThrow = null;

    function updateDifficulty() {
      if (state.totalScore >= 150) {
        state.difficultyLevel = 3;
      } else if (state.totalScore >= 50) {
        state.difficultyLevel = 2;
      } else {
        state.difficultyLevel = 1;
      }
    }

    function updateHUD() {
      difficultyDisplay.textContent = state.difficultyLevel;
      roundDisplay.textContent = state.currentRound;
      dartsDisplay.textContent = state.dartsRemaining;
      roundScoreDisplay.textContent = state.roundScore;
      totalScoreDisplay.textContent = state.totalScore;
      lastDartScoreDisplay.textContent = state.lastDartScore;
      gameOverMsg.style.display = state.gameOver ? 'block' : 'none';
    }

    function syncState() {
      state.helmetVisible = helmetModel ? helmetModel.visible : false;
      state.boardRotation = boardGroup.rotation.z;
      window.__3D_STATE__ = {
        totalScore: state.totalScore,
        roundScore: state.roundScore,
        currentRound: state.currentRound,
        dartsRemaining: state.dartsRemaining,
        dartsThrown: state.dartsThrown,
        difficultyLevel: state.difficultyLevel,
        lastDartScore: state.lastDartScore,
        lastDartPosition: {
          x: state.lastDartPosition.x,
          y: state.lastDartPosition.y
        },
        gameOver: state.gameOver,
        helmetVisible: state.helmetVisible,
        boardRotation: state.boardRotation,
        dartInFlight: state.dartInFlight
      };
    }

    function getMouseBoardIntersection(clientX, clientY) {
      mouse.x = (clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hit = new THREE.Vector3();
      raycaster.ray.intersectPlane(dartboardPlane, hit);
      return hit;
    }

    function updateCrosshairPosition(clientX, clientY) {
      const intersection = getMouseBoardIntersection(clientX, clientY);
      if (!intersection) return;

      currentAimPoint.copy(intersection);

      const projected = intersection.clone().project(camera);
      const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;

      crosshair.style.left = `${x}px`;
      crosshair.style.top = `${y}px`;
    }

    function getDifficultyOffset() {
      let maxOffset = 0;
      if (state.difficultyLevel === 2) maxOffset = 0.03;
      if (state.difficultyLevel === 3) maxOffset = 0.06;
      return new THREE.Vector2(
        (Math.random() * 2 - 1) * maxOffset,
        (Math.random() * 2 - 1) * maxOffset
      );
    }

    function scoreFromPoint(localX, localY) {
      const r = Math.sqrt(localX * localX + localY * localY);

      if (r > 0.34) return 0;
      if (r < 0.025) return 50;
      if (r < 0.06) return 25;

      let angle = Math.atan2(localY, localX);
      let fromTopClockwise = (Math.PI / 2 - angle);
      while (fromTopClockwise < 0) fromTopClockwise += Math.PI * 2;
      while (fromTopClockwise >= Math.PI * 2) fromTopClockwise -= Math.PI * 2;

      const sectorIndex = Math.floor(fromTopClockwise / ((Math.PI * 2) / 20)) % 20;
      const base = sectorValues[sectorIndex];

      if (r >= 0.19 && r <= 0.21) return base * 3;
      if (r >= 0.32 && r <= 0.34) return base * 2;
      if ((r >= 0.06 && r < 0.19) || (r > 0.21 && r < 0.32)) return base;

      return 0;
    }

    function throwDart() {
      if (state.gameOver || state.dartInFlight || state.dartsThrown >= 9) return;

      const dart = new THREE.Mesh(dartGeometry, dartMaterial);
      const start = camera.position.clone();

      const targetWorld = currentAimPoint.clone();
      const localTarget = boardGroup.worldToLocal(targetWorld.clone());

      const difficultyOffset = getDifficultyOffset();
      localTarget.x += difficultyOffset.x;
      localTarget.y += difficultyOffset.y;

      const finalLocal = localTarget.clone();
      finalLocal.z = 0.08;

      const finalWorld = boardGroup.localToWorld(finalLocal.clone());

      dart.position.copy(start);
      dart.lookAt(finalWorld);
      scene.add(dart);

      thrownDarts.push(dart);

      activeThrow = {
        dart,
        start,
        end: finalWorld.clone(),
        boardHitLocal: new THREE.Vector3(localTarget.x, localTarget.y, 0),
        duration: 0.4,
        elapsed: 0
      };

      state.dartInFlight = true;
      syncState();
    }

    function completeThrow(hitLocal, dart) {
      const score = scoreFromPoint(hitLocal.x, hitLocal.y);

      state.lastDartScore = score;
      state.lastDartPosition = { x: hitLocal.x, y: hitLocal.y };
      state.totalScore += score;
      state.roundScore += score;
      state.dartsThrown += 1;
      state.dartsRemaining -= 1;

      updateDifficulty();

      if (helmetModel && state.totalScore >= 100) {
        helmetModel.visible = true;
      }

      if (state.dartsRemaining <= 0 && !state.gameOver) {
        if (state.currentRound < 3) {
          state.currentRound += 1;
          state.dartsRemaining = 3;
          state.roundScore = 0;
        }
      }

      if (state.dartsThrown >= 9) {
        state.gameOver = true;
      }

      state.dartInFlight = false;
      updateHUD();
      syncState();
    }

    window.addEventListener('mousemove', (e) => {
      updateCrosshairPosition(e.clientX, e.clientY);
      syncState();
    });

    window.addEventListener('mousedown', (e) => {
      if (e.button === 0) {
        throwDart();
      }
    });

    newGameBtn.addEventListener('click', () => {
      state.totalScore = 0;
      state.roundScore = 0;
      state.currentRound = 1;
      state.dartsRemaining = 3;
      state.dartsThrown = 0;
      state.difficultyLevel = 1;
      state.lastDartScore = 0;
      state.lastDartPosition = { x: 0, y: 0 };
      state.gameOver = false;
      state.dartInFlight = false;
      boardGroup.rotation.z = 0;
      activeThrow = null;

      for (const dart of thrownDarts) {
        scene.remove(dart);
      }
      thrownDarts.length = 0;

      if (helmetModel) {
        helmetModel.visible = false;
      }

      updateHUD();
      syncState();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateCrosshairPosition(window.innerWidth / 2, window.innerHeight / 2);
    updateHUD();
    syncState();

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      if (state.difficultyLevel === 3) {
        boardGroup.rotation.z += 0.2 * delta;
      }

      if (helmetModel && helmetModel.visible) {
        helmetModel.rotation.y += 0.4 * delta;
      }

      if (activeThrow) {
        activeThrow.elapsed += delta;
        const t = Math.min(activeThrow.elapsed / activeThrow.duration, 1);

        const pos = new THREE.Vector3().lerpVectors(activeThrow.start, activeThrow.end, t);
        const arcHeight = 0.18 * Math.sin(Math.PI * t);
        pos.y += arcHeight;

        activeThrow.dart.position.copy(pos);

        const nextT = Math.min((activeThrow.elapsed + 0.01) / activeThrow.duration, 1);
        const nextPos = new THREE.Vector3().lerpVectors(activeThrow.start, activeThrow.end, nextT);
        nextPos.y += 0.18 * Math.sin(Math.PI * nextT);
        activeThrow.dart.lookAt(nextPos);

        if (t >= 1) {
          const impactLocal = activeThrow.boardHitLocal.clone();
          const stickLocal = impactLocal.clone();
          stickLocal.z = 0.08;
          const stickWorld = boardGroup.localToWorld(stickLocal.clone());

          activeThrow.dart.position.copy(stickWorld);
          activeThrow.dart.lookAt(boardGroup.localToWorld(new THREE.Vector3(impactLocal.x, impactLocal.y, -1)));

          completeThrow(impactLocal, activeThrow.dart);
          activeThrow = null;
        }
      }

      syncState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
