<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Phylogenetic Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(10, 10, 26, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 18px 22px;
    color: #fff;
    font-size: 14px;
    min-width: 220px;
    backdrop-filter: blur(10px);
    z-index: 10;
  }
  #hud h3 { margin-bottom: 10px; color: #FFD700; font-size: 16px; }
  #hud .stat { margin: 5px 0; }
  #hud .stat span { color: #00FFFF; font-weight: bold; }
  #hud .combo-display { font-size: 18px; color: #FF00FF; font-weight: bold; }

  #quizBtn {
    position: absolute;
    top: 15px;
    left: 260px;
    padding: 10px 20px;
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #0a0a1a;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    z-index: 10;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  #quizBtn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }
  #quizBtn.active { background: linear-gradient(135deg, #FF4500, #FF6347); color: #fff; }

  #quizPanel {
    position: absolute;
    top: 60px;
    left: 260px;
    background: rgba(10, 10, 26, 0.9);
    border: 1px solid rgba(255, 215, 0, 0.3);
    border-radius: 12px;
    padding: 18px 22px;
    color: #fff;
    font-size: 14px;
    min-width: 300px;
    display: none;
    backdrop-filter: blur(10px);
    z-index: 10;
  }
  #quizPanel h4 { color: #FFD700; margin-bottom: 10px; }
  #quizPanel .question { margin-bottom: 12px; font-size: 15px; }
  #quizPanel .choices { display: flex; flex-direction: column; gap: 8px; }
  #quizPanel .choices button {
    padding: 8px 16px;
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s, border-color 0.2s;
  }
  #quizPanel .choices button:hover {
    background: rgba(255, 255, 255, 0.2);
    border-color: rgba(255, 215, 0, 0.5);
  }
  #quizPanel .feedback {
    margin-top: 10px;
    font-weight: bold;
    font-size: 15px;
    min-height: 20px;
  }

  #infoPanel {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(10, 10, 26, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 18px 22px;
    color: #fff;
    font-size: 14px;
    min-width: 220px;
    display: none;
    backdrop-filter: blur(10px);
    z-index: 10;
  }
  #infoPanel h3 { color: #00FFFF; margin-bottom: 10px; }
  #infoPanel .info-row { margin: 6px 0; }
  #infoPanel .info-row .label { color: #aaa; }
  #infoPanel .info-row .value { color: #fff; font-weight: bold; }

  #controls-help {
    position: absolute;
    bottom: 15px;
    left: 15px;
    background: rgba(10, 10, 26, 0.7);
    border-radius: 8px;
    padding: 10px 15px;
    color: #888;
    font-size: 12px;
    z-index: 10;
  }
  #controls-help kbd {
    background: rgba(255,255,255,0.15);
    padding: 2px 6px;
    border-radius: 3px;
    color: #ccc;
  }
</style>
</head>
<body>

<div id="hud">
  <h3>🧬 Phylogenetic Tree</h3>
  <div class="stat">Score: <span id="scoreDisplay">0</span></div>
  <div class="stat">Combo: <span id="comboDisplay" class="combo-display">x1</span></div>
  <div class="stat">Correct: <span id="correctDisplay">0</span> | Wrong: <span id="wrongDisplay">0</span></div>
  <div class="stat">Selected: <span id="selectedDisplay">None</span></div>
  <div class="stat">Highlight Level: <span id="levelDisplay">All</span></div>
</div>

<button id="quizBtn">🧪 Quiz Mode</button>

<div id="quizPanel">
  <h4>🧪 Evolution Quiz</h4>
  <div class="question" id="quizQuestion">Loading...</div>
  <div class="choices">
    <button id="choiceA">A</button>
    <button id="choiceB">B</button>
    <button id="choiceC">C</button>
  </div>
  <div class="feedback" id="quizFeedback"></div>
</div>

<div id="infoPanel">
  <h3>📋 Node Info</h3>
  <div class="info-row"><span class="label">Label: </span><span class="value" id="infoLabel">-</span></div>
  <div class="info-row"><span class="label">Depth: </span><span class="value" id="infoDepth">-</span></div>
  <div class="info-row"><span class="label">Children: </span><span class="value" id="infoChildren">-</span></div>
  <div class="info-row"><span class="label">Parent: </span><span class="value" id="infoParent">-</span></div>
</div>

<div id="controls-help">
  <kbd>H</kbd> Cycle highlight level &nbsp;
  <kbd>R</kbd> Reset camera &nbsp;
  <kbd>T</kbd> Toggle rotation &nbsp;
  Click node to select
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(10, 15, 10);
directionalLight.castShadow = true;
scene.add(directionalLight);

// Add subtle fog
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.015);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, -4, 0);
controls.update();

// State
const state = {
  totalNodes: 22,
  score: 0,
  combo: 1,
  correctAnswers: 0,
  wrongAnswers: 0,
  selectedNode: null,
  highlightLevel: -1,
  quizMode: false,
  treeRotating: false,
  treeRotationAngle: 0,
  horseLoaded: false,
  horsePosition: { x: 0, y: 0, z: 0 },
  cameraPosition: { x: 0, y: 5, z: 20 },
  currentQuizNode: null,
  nodesAtLevel: { 0: 1, 1: 3, 2: 6, 3: 12 }
};
window.__3D_STATE__ = state;

// Tree data structure
const treeNodes = [];
const treeBranches = [];
const treeGroup = new THREE.Group();
scene.add(treeGroup);

const levelColors = {
  0: 0xFFD700,
  1: 0x00FFFF,
  2: 0x00FF00,
  3: 0xFF00FF
};

const levelRadii = {
  0: 0.5,
  1: 0.4,
  2: 0.3,
  3: 0.25
};

// Node class
class TreeNode {
  constructor(label, depth, parent, position) {
    this.label = label;
    this.depth = depth;
    this.parent = parent;
    this.children = [];
    this.position = position.clone();
    this.mesh = null;
    this.originalColor = new THREE.Color(levelColors[depth]);
    this.flashTimer = 0;
    this.flashColor = null;
  }
}

// Build tree
function buildTree() {
  const root = new TreeNode('Ancestor', 0, null, new THREE.Vector3(0, 0, 0));
  treeNodes.push(root);

  const level1Labels = ['Branch_A', 'Branch_B', 'Branch_C'];
  const level1Spread = 6;

  for (let i = 0; i < 3; i++) {
    const angle = ((i / 3) * Math.PI * 2) - Math.PI / 2;
    const x = Math.cos(angle) * level1Spread;
    const z = Math.sin(angle) * level1Spread;
    const pos = new THREE.Vector3(x, -4, z);
    const node = new TreeNode(level1Labels[i], 1, root, pos);
    root.children.push(node);
    treeNodes.push(node);
  }

  // Level 2
  const suffixes2 = ['1', '2'];
  for (const l1Node of root.children) {
    for (let i = 0; i < 2; i++) {
      const label = l1Node.label + suffixes2[i];
      const offset = (i - 0.5) * 3;
      const dir = new THREE.Vector3(l1Node.position.x, 0, l1Node.position.z).normalize();
      const perp = new THREE.Vector3(-dir.z, 0, dir.x);
      const pos = new THREE.Vector3(
        l1Node.position.x + dir.x * 2 + perp.x * offset,
        l1Node.position.y - 4,
        l1Node.position.z + dir.z * 2 + perp.z * offset
      );
      const node = new TreeNode(label, 2, l1Node, pos);
      l1Node.children.push(node);
      treeNodes.push(node);
    }
  }

  // Level 3 (leaves)
  const suffixes3 = ['a', 'b'];
  for (const l1Node of root.children) {
    for (const l2Node of l1Node.children) {
      for (let i = 0; i < 2; i++) {
        const label = l2Node.label + suffixes3[i];
        const dir = new THREE.Vector3(l2Node.position.x, 0, l2Node.position.z).normalize();
        const perp = new THREE.Vector3(-dir.z, 0, dir.x);
        const offset = (i - 0.5) * 2;
        const pos = new THREE.Vector3(
          l2Node.position.x + dir.x * 1.5 + perp.x * offset,
          l2Node.position.y - 4,
          l2Node.position.z + dir.z * 1.5 + perp.z * offset
        );
        const node = new TreeNode(label, 3, l2Node, pos);
        l2Node.children.push(node);
        treeNodes.push(node);
      }
    }
  }
}

buildTree();

// Create meshes
const nodeMeshes = [];
const nodeMap = {};

function createNodeMesh(node) {
  const geometry = new THREE.SphereGeometry(levelRadii[node.depth], 32, 32);
  const material = new THREE.MeshStandardMaterial({
    color: levelColors[node.depth],
    emissive: 0x000000,
    emissiveIntensity: 0,
    metalness: 0.3,
    roughness: 0.4
  });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.copy(node.position);
  mesh.userData = { nodeLabel: node.label, nodeDepth: node.depth };
  node.mesh = mesh;
  treeGroup.add(mesh);
  nodeMeshes.push(mesh);
  nodeMap[node.label] = node;

  // Add glow ring
  const ringGeo = new THREE.RingGeometry(levelRadii[node.depth] * 1.3, levelRadii[node.depth] * 1.6, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: levelColors[node.depth],
    transparent: true,
    opacity: 0.15,
    side: THREE.DoubleSide
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.copy(node.position);
  ring.lookAt(camera.position);
  ring.userData.isRing = true;
  treeGroup.add(ring);
}

function createBranch(parentNode, childNode) {
  const start = parentNode.position;
  const end = childNode.position;
  const direction = new THREE.Vector3().subVectors(end, start);
  const length = direction.length();
  const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);

  const geometry = new THREE.CylinderGeometry(0.05, 0.05, length, 8);
  const material = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.6,
    metalness: 0.1,
    roughness: 0.8
  });
  const cylinder = new THREE.Mesh(geometry, material);
  cylinder.position.copy(midpoint);

  const axis = new THREE.Vector3(0, 1, 0);
  const dir = direction.clone().normalize();
  const quaternion = new THREE.Quaternion().setFromUnitVectors(axis, dir);
  cylinder.setRotationFromQuaternion(quaternion);

  cylinder.userData.isBranch = true;
  treeGroup.add(cylinder);
  treeBranches.push(cylinder);
}

// Create all nodes and branches
for (const node of treeNodes) {
  createNodeMesh(node);
}

for (const node of treeNodes) {
  for (const child of node.children) {
    createBranch(node, child);
  }
}

// Add floating particles
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleColors = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 40;
  particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 30 - 5;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 40;
  const c = new THREE.Color().setHSL(Math.random(), 0.5, 0.5);
  particleColors[i * 3] = c.r;
  particleColors[i * 3 + 1] = c.g;
  particleColors[i * 3 + 2] = c.b;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
const particleMat = new THREE.PointsMaterial({ size: 0.08, vertexColors: true, transparent: true, opacity: 0.4 });
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// Load horse model
let horseModel = null;
const horseTargetNode = nodeMap['Branch_A1a'];
const loader = new GLTFLoader();

try {
  loader.load(
    '._horse.glb',
    (gltf) => {
      horseModel = gltf.scene;
      horseModel.scale.set(0.5, 0.5, 0.5);
      horseModel.position.copy(horseTargetNode.position);
      treeGroup.add(horseModel);
      state.horseLoaded = true;
      state.horsePosition = {
        x: horseTargetNode.position.x,
        y: horseTargetNode.position.y,
        z: horseTargetNode.position.z
      };
    },
    undefined,
    (error) => {
      console.log('Horse model not found, creating placeholder');
      createHorsePlaceholder();
    }
  );
} catch (e) {
  createHorsePlaceholder();
}

function createHorsePlaceholder() {
  const group = new THREE.Group();

  // Body
  const bodyGeo = new THREE.BoxGeometry(1.2, 0.6, 0.5);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, metalness: 0.2, roughness: 0.6 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.5;
  group.add(body);

  // Head
  const headGeo = new THREE.BoxGeometry(0.4, 0.5, 0.35);
  const head = new THREE.Mesh(headGeo, bodyMat);
  head.position.set(0.7, 0.9, 0);
  head.rotation.z = -0.3;
  group.add(head);

  // Legs
  const legGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.5, 8);
  const legPositions = [[-0.4, 0.15, 0.15], [-0.4, 0.15, -0.15], [0.4, 0.15, 0.15], [0.4, 0.15, -0.15]];
  for (const lp of legPositions) {
    const leg = new THREE.Mesh(legGeo, bodyMat);
    leg.position.set(lp[0], lp[1], lp[2]);
    group.add(leg);
  }

  // Label
  const labelText = '🐴 Horse';

  group.scale.set(0.5, 0.5, 0.5);
  group.position.copy(horseTargetNode.position);
  group.position.y += 0.5;
  treeGroup.add(group);
  horseModel = group;
  state.horseLoaded = true;
  state.horsePosition = {
    x: horseTargetNode.position.x,
    y: horseTargetNode.position.y,
    z: horseTargetNode.position.z
  };
}

// Raycasting
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedNodeObj = null;

function onMouseClick(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodeMeshes);

  if (intersects.length > 0) {
    const mesh = intersects[0].object;
    selectNode(mesh.userData.nodeLabel);
  }
}

function selectNode(label) {
  // Deselect previous
  if (selectedNodeObj && selectedNodeObj.mesh) {
    selectedNodeObj.mesh.material.emissive.setHex(0x000000);
    selectedNodeObj.mesh.material.emissiveIntensity = 0;
  }

  const node = nodeMap[label];
  if (node) {
    selectedNodeObj = node;
    node.mesh.material.emissive.setHex(0xFFFF00);
    node.mesh.material.emissiveIntensity = 0.5;
    state.selectedNode = label;

    // Update info panel
    document.getElementById('infoPanel').style.display = 'block';
    document.getElementById('infoLabel').textContent = node.label;
    document.getElementById('infoDepth').textContent = node.depth;
    document.getElementById('infoChildren').textContent = node.children.length;
    document.getElementById('infoParent').textContent = node.parent ? node.parent.label : 'None (Root)';
    document.getElementById('selectedDisplay').textContent = label;
  }
}

renderer.domElement.addEventListener('click', onMouseClick);

// Keyboard controls
let highlightCycle = -1; // -1 = all
let cameraResetting = false;
let cameraResetStart = null;
let cameraResetFrom = null;
const initialCameraPos = new THREE.Vector3(0, 5, 20);
const initialTarget = new THREE.Vector3(0, -4, 0);

document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();

  if (key === 'h') {
    highlightCycle++;
    if (highlightCycle > 4) highlightCycle = 0;

    const level = highlightCycle <= 3 ? highlightCycle : -1;
    state.highlightLevel = level;

    for (const node of treeNodes) {
      if (node === selectedNodeObj) continue;
      if (level === -1) {
        node.mesh.material.emissive.setHex(0x000000);
        node.mesh.material.emissiveIntensity = 0;
        node.mesh.material.opacity = 1;
      } else if (node.depth === level) {
        node.mesh.material.emissive.setHex(0xFFFF00);
        node.mesh.material.emissiveIntensity = 0.4;
      } else {
        node.mesh.material.emissive.setHex(0x000000);
        node.mesh.material.emissiveIntensity = 0;
      }
    }

    const levelText = level === -1 ? 'All' : `Level ${level}`;
    document.getElementById('levelDisplay').textContent = levelText;
  }

  if (key === 'r') {
    cameraResetting = true;
    cameraResetStart = performance.now();
    cameraResetFrom = {
      pos: camera.position.clone(),
      target: controls.target.clone()
    };
  }

  if (key === 't') {
    state.treeRotating = !state.treeRotating;
  }
});

// Quiz system
let quizActive = false;
let currentQuiz = null;

const quizBtn = document.getElementById('quizBtn');
const quizPanel = document.getElementById('quizPanel');
const quizQuestion = document.getElementById('quizQuestion');
const quizFeedback = document.getElementById('quizFeedback');
const choiceA = document.getElementById('choiceA');
const choiceB = document.getElementById('choiceB');
const choiceC = document.getElementById('choiceC');

quizBtn.addEventListener('click', () => {
  quizActive = !quizActive;
  state.quizMode = quizActive;
  quizBtn.classList.toggle('active', quizActive);
  quizBtn.textContent = quizActive ? '❌ Exit Quiz' : '🧪 Quiz Mode';
  quizPanel.style.display = quizActive ? 'block' : 'none';
  if (quizActive) generateQuiz();
});

function generateQuiz() {
  // Pick a random non-root node
  const nonRootNodes = treeNodes.filter(n => n.depth > 0);
  const targetNode = nonRootNodes[Math.floor(Math.random() * nonRootNodes.length)];
  const correctAnswer = targetNode.parent.label;

  state.currentQuizNode = targetNode.label;

  // Generate wrong answers
  const allLabels = treeNodes.map(n => n.label).filter(l => l !== correctAnswer && l !== targetNode.label);
  const shuffled = allLabels.sort(() => Math.random() - 0.5);
  const wrongAnswers = shuffled.slice(0, 2);

  const choices = [correctAnswer, ...wrongAnswers].sort(() => Math.random() - 0.5);

  quizQuestion.textContent = `What is the parent of "${targetNode.label}"?`;
  choiceA.textContent = choices[0];
  choiceB.textContent = choices[1];
  choiceC.textContent = choices[2];
  quizFeedback.textContent = '';
  quizFeedback.style.color = '#fff';

  currentQuiz = {
    targetNode,
    correctAnswer,
    choices
  };

  // Highlight the target node
  selectNode(targetNode.label);
}

function handleQuizAnswer(chosenAnswer) {
  if (!currentQuiz || !quizActive) return;

  if (chosenAnswer === currentQuiz.correctAnswer) {
    const points = 100 * state.combo;
    state.score += points;
    state.combo = Math.min(state.combo + 1, 5);
    state.correctAnswers++;
    quizFeedback.textContent = `✅ Correct! +${points} points`;
    quizFeedback.style.color = '#00FF00';

    // Flash correct node green
    flashNode(currentQuiz.targetNode.parent, 0x00FF00);
  } else {
    state.score = Math.max(0, state.score - 50);
    state.combo = 1;
    state.wrongAnswers++;
    quizFeedback.textContent = `❌ Wrong! The answer was "${currentQuiz.correctAnswer}". -50 points`;
    quizFeedback.style.color = '#FF4444';

    // Flash red
    flashNode(currentQuiz.targetNode, 0xFF0000);
  }

  updateHUD();

  // Next question after delay
  setTimeout(() => {
    if (quizActive) generateQuiz();
  }, 1500);
}

function flashNode(node, color) {
  node.flashColor = new THREE.Color(color);
  node.flashTimer = 1.0;
}

choiceA.addEventListener('click', () => handleQuizAnswer(choiceA.textContent));
choiceB.addEventListener('click', () => handleQuizAnswer(choiceB.textContent));
choiceC.addEventListener('click', () => handleQuizAnswer(choiceC.textContent));

function updateHUD() {
  document.getElementById('scoreDisplay').textContent = state.score;
  document.getElementById('comboDisplay').textContent = `x${state.combo}`;
  document.getElementById('correctDisplay').textContent = state.correctAnswers;
  document.getElementById('wrongDisplay').textContent = state.wrongAnswers;
}

// Animation
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const time = clock.getElapsedTime();

  // Tree rotation
  if (state.treeRotating) {
    state.treeRotationAngle += 0.5 * delta;
    treeGroup.rotation.y = state.treeRotationAngle;
  }

  // Camera reset animation
  if (cameraResetting && cameraResetFrom) {
    const elapsed = (performance.now() - cameraResetStart) / 1000;
    const t = Math.min(elapsed / 1.0, 1.0);
    const eased = 1 - Math.pow(1 - t, 3); // ease out cubic

    camera.position.lerpVectors(cameraResetFrom.pos, initialCameraPos, eased);
    controls.target.lerpVectors(cameraResetFrom.target, initialTarget, eased);

    if (t >= 1.0) {
      cameraResetting = false;
    }
  }

  // Node animations
  for (const node of treeNodes) {
    if (node.mesh) {
      // Gentle bob
      const bobOffset = Math.sin(time * 1.5 + node.depth * 0.5 + node.position.x * 0.3) * 0.05;
      node.mesh.position.y = node.position.y + bobOffset;

      // Flash effect
      if (node.flashTimer > 0) {
        node.flashTimer -= delta * 2;
        const intensity = Math.max(0, node.flashTimer);
        node.mesh.material.emissive.copy(node.flashColor);
        node.mesh.material.emissiveIntensity = intensity;
        if (node.flashTimer <= 0) {
          if (node === selectedNodeObj) {
            node.mesh.material.emissive.setHex(0xFFFF00);
            node.mesh.material.emissiveIntensity = 0.5;
          } else {
            node.mesh.material.emissive.setHex(0x000000);
            node.mesh.material.emissiveIntensity = 0;
          }
        }
      }
    }
  }

  // Particle animation
  const positions = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3 + 1] += Math.sin(time + i) * 0.002;
  }
  particles.geometry.attributes.position.needsUpdate = true;
  particles.rotation.y = time * 0.02;

  // Update state
  state.cameraPosition = {
    x: parseFloat(camera.position.x.toFixed(3)),
    y: parseFloat(camera.position.y.toFixed(3)),
    z: parseFloat(camera.position.z.toFixed(3))
  };
  state.treeRotationAngle = treeGroup.rotation.y;

  if (horseModel) {
    const worldPos = new THREE.Vector3();
    horseModel.getWorldPosition(worldPos);
    state.horsePosition = {
      x: parseFloat(worldPos.x.toFixed(3)),
      y: parseFloat(worldPos.y.toFixed(3)),
      z: parseFloat(worldPos.z.toFixed(3))
    };
  }

  controls.update();
  renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
