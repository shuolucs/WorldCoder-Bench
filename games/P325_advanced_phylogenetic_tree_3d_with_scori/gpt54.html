<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Phylogenetic Tree Quiz</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #0a0a1a;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(10, 10, 26, 0.78);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 12px;
      border-radius: 10px;
      min-width: 260px;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    #hud h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }

    #hud .row {
      margin: 4px 0;
      font-size: 14px;
    }

    #quizBtn {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #2b7cff;
      color: white;
      font-weight: bold;
    }

    #quizArea {
      margin-top: 10px;
      display: none;
    }

    #questionText {
      margin-bottom: 8px;
      font-size: 14px;
      color: #dfe8ff;
    }

    .choiceBtn {
      display: block;
      width: 100%;
      margin: 6px 0;
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #303a5a;
      color: white;
      text-align: left;
    }

    .choiceBtn:hover {
      background: #44507a;
    }

    #infoPanel {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 260px;
      background: rgba(10, 10, 26, 0.78);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 12px;
      border-radius: 10px;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    #infoPanel h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }

    #infoContent {
      font-size: 14px;
      line-height: 1.5;
      color: #e8e8f0;
    }

    #help {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(10, 10, 26, 0.7);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 10px 12px;
      border-radius: 10px;
      z-index: 10;
      font-size: 13px;
      color: #d7d7e6;
    }
  </style>
</head>
<body>
  <div id="hud">
    <h3>Phylogenetic Tree HUD</h3>
    <div class="row">Score: <span id="scoreValue">0</span></div>
    <div class="row">Combo: <span id="comboValue">1</span>x</div>
    <div class="row">Selected Node: <span id="selectedNodeValue">None</span></div>
    <div class="row">Correct: <span id="correctValue">0</span></div>
    <div class="row">Wrong: <span id="wrongValue">0</span></div>
    <button id="quizBtn">Quiz Mode: OFF</button>

    <div id="quizArea">
      <div id="questionText">Question will appear here</div>
      <button id="choiceA" class="choiceBtn">Choice A</button>
      <button id="choiceB" class="choiceBtn">Choice B</button>
      <button id="choiceC" class="choiceBtn">Choice C</button>
    </div>
  </div>

  <div id="infoPanel">
    <h3>Node Info</h3>
    <div id="infoContent">
      No node selected.
    </div>
  </div>

  <div id="help">
    Click nodes to select.<br>
    H = cycle level highlight<br>
    R = reset camera<br>
    T = toggle tree rotation
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, -4, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 15, 10);
    scene.add(dirLight);

    const treeGroup = new THREE.Group();
    scene.add(treeGroup);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const clock = new THREE.Clock();

    const hud = {
      scoreValue: document.getElementById('scoreValue'),
      comboValue: document.getElementById('comboValue'),
      selectedNodeValue: document.getElementById('selectedNodeValue'),
      correctValue: document.getElementById('correctValue'),
      wrongValue: document.getElementById('wrongValue'),
      quizBtn: document.getElementById('quizBtn'),
      quizArea: document.getElementById('quizArea'),
      questionText: document.getElementById('questionText'),
      choiceA: document.getElementById('choiceA'),
      choiceB: document.getElementById('choiceB'),
      choiceC: document.getElementById('choiceC')
    };

    const infoContent = document.getElementById('infoContent');

    const state = {
      score: 0,
      combo: 1,
      correctAnswers: 0,
      wrongAnswers: 0,
      selectedNode: null,
      highlightLevel: 0,
      quizMode: false,
      treeRotating: false,
      treeRotationAngle: 0,
      horseLoaded: false,
      horsePosition: { x: 0, y: 0, z: 0 },
      currentQuizNode: null
    };

    const levelColors = {
      0: 0xFFD700,
      1: 0x00FFFF,
      2: 0x00FF00,
      3: 0xFF00FF
    };

    const levelRadii = {
      0: 0.5,
      1: 0.4,
      2: 0.3,
      3: 0.25
    };

    const nodeMap = new Map();
    const nodeMeshes = [];
    let selectedMesh = null;
    let allNodeRecords = [];
    let horseModel = null;

    function createNode(label, depth, position, parentLabel = null) {
      const geometry = new THREE.SphereGeometry(levelRadii[depth], 24, 24);
      const material = new THREE.MeshStandardMaterial({
        color: levelColors[depth],
        emissive: 0x000000,
        emissiveIntensity: 0.0
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(position);
      mesh.userData = { label, depth };
      treeGroup.add(mesh);

      const record = {
        label,
        depth,
        position: position.clone(),
        parent: parentLabel,
        children: [],
        mesh,
        baseColor: levelColors[depth],
        flashUntil: 0,
        flashColor: null
      };

      nodeMap.set(label, record);
      nodeMeshes.push(mesh);
      allNodeRecords.push(record);

      if (parentLabel) {
        const parent = nodeMap.get(parentLabel);
        if (parent) parent.children.push(label);
      }

      return record;
    }

    function createBranch(start, end) {
      const direction = new THREE.Vector3().subVectors(end, start);
      const length = direction.length();
      const geometry = new THREE.CylinderGeometry(0.05, 0.05, length, 12);
      const material = new THREE.MeshStandardMaterial({ color: 0xffffff });
      const cylinder = new THREE.Mesh(geometry, material);

      const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      cylinder.position.copy(midpoint);

      const up = new THREE.Vector3(0, 1, 0);
      cylinder.quaternion.setFromUnitVectors(up, direction.clone().normalize());

      treeGroup.add(cylinder);
    }

    function buildTree() {
      const ySpacing = 4;

      createNode('Ancestor', 0, new THREE.Vector3(0, 0, 0), null);

      const level1 = [
        { label: 'Branch_A', pos: new THREE.Vector3(-6, -ySpacing, -2) },
        { label: 'Branch_B', pos: new THREE.Vector3(0, -ySpacing, 0) },
        { label: 'Branch_C', pos: new THREE.Vector3(6, -ySpacing, 2) }
      ];

      level1.forEach(n => {
        createNode(n.label, 1, n.pos, 'Ancestor');
        createBranch(nodeMap.get('Ancestor').position, n.pos);
      });

      const level2Specs = [
        { parent: 'Branch_A', children: [
          { label: 'Branch_A1', pos: new THREE.Vector3(-9, -ySpacing * 2, -4) },
          { label: 'Branch_A2', pos: new THREE.Vector3(-3, -ySpacing * 2, 0) }
        ]},
        { parent: 'Branch_B', children: [
          { label: 'Branch_B1', pos: new THREE.Vector3(-3, -ySpacing * 2, -2) },
          { label: 'Branch_B2', pos: new THREE.Vector3(3, -ySpacing * 2, 2) }
        ]},
        { parent: 'Branch_C', children: [
          { label: 'Branch_C1', pos: new THREE.Vector3(3, -ySpacing * 2, 0) },
          { label: 'Branch_C2', pos: new THREE.Vector3(9, -ySpacing * 2, 4) }
        ]}
      ];

      level2Specs.forEach(group => {
        group.children.forEach(child => {
          createNode(child.label, 2, child.pos, group.parent);
          createBranch(nodeMap.get(group.parent).position, child.pos);
        });
      });

      const leafSpecs = [
        { parent: 'Branch_A1', children: [
          { label: 'Branch_A1a', pos: new THREE.Vector3(-10.5, -ySpacing * 3, -5) },
          { label: 'Branch_A1b', pos: new THREE.Vector3(-7.5, -ySpacing * 3, -3) }
        ]},
        { parent: 'Branch_A2', children: [
          { label: 'Branch_A2a', pos: new THREE.Vector3(-4.5, -ySpacing * 3, -1) },
          { label: 'Branch_A2b', pos: new THREE.Vector3(-1.5, -ySpacing * 3, 1) }
        ]},
        { parent: 'Branch_B1', children: [
          { label: 'Branch_B1a', pos: new THREE.Vector3(-4.5, -ySpacing * 3, -3.5) },
          { label: 'Branch_B1b', pos: new THREE.Vector3(-1.5, -ySpacing * 3, -0.5) }
        ]},
        { parent: 'Branch_B2', children: [
          { label: 'Branch_B2a', pos: new THREE.Vector3(1.5, -ySpacing * 3, 0.5) },
          { label: 'Branch_B2b', pos: new THREE.Vector3(4.5, -ySpacing * 3, 3.5) }
        ]},
        { parent: 'Branch_C1', children: [
          { label: 'Branch_C1a', pos: new THREE.Vector3(1.5, -ySpacing * 3, -1) },
          { label: 'Branch_C1b', pos: new THREE.Vector3(4.5, -ySpacing * 3, 1) }
        ]},
        { parent: 'Branch_C2', children: [
          { label: 'Branch_C2a', pos: new THREE.Vector3(7.5, -ySpacing * 3, 3) },
          { label: 'Branch_C2b', pos: new THREE.Vector3(10.5, -ySpacing * 3, 5) }
        ]}
      ];

      leafSpecs.forEach(group => {
        group.children.forEach(child => {
          createNode(child.label, 3, child.pos, group.parent);
          createBranch(nodeMap.get(group.parent).position, child.pos);
        });
      });
    }

    buildTree();

    function updateHUD() {
      hud.scoreValue.textContent = state.score;
      hud.comboValue.textContent = state.combo;
      hud.selectedNodeValue.textContent = state.selectedNode || 'None';
      hud.correctValue.textContent = state.correctAnswers;
      hud.wrongValue.textContent = state.wrongAnswers;
      hud.quizBtn.textContent = `Quiz Mode: ${state.quizMode ? 'ON' : 'OFF'}`;
      hud.quizArea.style.display = state.quizMode ? 'block' : 'none';
    }

    function updateInfoPanel(label) {
      if (!label || !nodeMap.has(label)) {
        infoContent.innerHTML = `No node selected.`;
        return;
      }
      const node = nodeMap.get(label);
      infoContent.innerHTML = `
        <strong>Label:</strong> ${node.label}<br>
        <strong>Depth Level:</strong> ${node.depth}<br>
        <strong>Children:</strong> ${node.children.length}<br>
        <strong>Parent:</strong> ${node.parent || 'None'}
      `;
    }

    function clearSelection() {
      if (selectedMesh) {
        const record = allNodeRecords.find(r => r.mesh === selectedMesh);
        if (record) {
          record.mesh.material.emissive.setHex(0x000000);
          record.mesh.material.emissiveIntensity = 0.0;
        }
      }
      selectedMesh = null;
      state.selectedNode = null;
      updateInfoPanel(null);
      updateHUD();
    }

    function selectNode(mesh) {
      if (selectedMesh === mesh) return;

      if (selectedMesh) {
        const prevRecord = allNodeRecords.find(r => r.mesh === selectedMesh);
        if (prevRecord) {
          prevRecord.mesh.material.emissive.setHex(0x000000);
          prevRecord.mesh.material.emissiveIntensity = 0.0;
        }
      }

      selectedMesh = mesh;
      const record = allNodeRecords.find(r => r.mesh === mesh);
      if (record) {
        mesh.material.emissive.setHex(0xffff00);
        mesh.material.emissiveIntensity = 0.8;
        state.selectedNode = record.label;
        updateInfoPanel(record.label);
      }
      updateHUD();
    }

    function flashNode(label, colorHex) {
      const node = nodeMap.get(label);
      if (!node) return;
      node.flashUntil = performance.now() + 500;
      node.flashColor = colorHex;
    }

    function generateQuizQuestion() {
      const possible = allNodeRecords.filter(n => n.parent !== null);
      const quizNode = possible[Math.floor(Math.random() * possible.length)];
      state.currentQuizNode = quizNode.label;

      const correctParent = quizNode.parent;
      const incorrectOptions = allNodeRecords
        .filter(n => n.label !== correctParent && n.label !== quizNode.label)
        .map(n => n.label);

      const shuffledIncorrect = incorrectOptions.sort(() => Math.random() - 0.5).slice(0, 2);
      const options = [correctParent, ...shuffledIncorrect].sort(() => Math.random() - 0.5);

      hud.questionText.textContent = `What is the parent of ${quizNode.label}?`;
      hud.choiceA.textContent = options[0];
      hud.choiceB.textContent = options[1];
      hud.choiceC.textContent = options[2];

      [hud.choiceA, hud.choiceB, hud.choiceC].forEach(btn => {
        btn.onclick = () => checkQuizAnswer(btn.textContent, correctParent, quizNode.label);
      });
    }

    function checkQuizAnswer(answer, correctParent, quizNodeLabel) {
      if (!state.quizMode) return;

      if (answer === correctParent) {
        state.score += 100 * state.combo;
        state.combo = Math.min(5, state.combo + 1);
        state.correctAnswers += 1;
        flashNode(correctParent, 0x00ff00);
      } else {
        state.score = Math.max(0, state.score - 50);
        state.combo = 1;
        state.wrongAnswers += 1;
        flashNode(quizNodeLabel, 0xff0000);
      }

      updateHUD();
      generateQuizQuestion();
    }

    hud.quizBtn.addEventListener('click', () => {
      state.quizMode = !state.quizMode;
      if (state.quizMode) {
        generateQuizQuestion();
      } else {
        state.currentQuizNode = null;
      }
      updateHUD();
    });

    let resetAnimating = false;
    let resetStartTime = 0;
    let resetDuration = 1000;
    let resetFrom = new THREE.Vector3();
    let resetTo = new THREE.Vector3(0, 5, 20);
    let targetFrom = new THREE.Vector3();
    let targetTo = new THREE.Vector3(0, -4, 0);

    function startCameraReset() {
      resetAnimating = true;
      resetStartTime = performance.now();
      resetFrom.copy(camera.position);
      targetFrom.copy(controls.target);
    }

    function cycleHighlightLevel() {
      const order = [0, 1, 2, 3, -1];
      const currentIndex = order.indexOf(state.highlightLevel);
      state.highlightLevel = order[(currentIndex + 1) % order.length];
    }

    function updateLevelHighlights(now) {
      allNodeRecords.forEach(node => {
        const isSelected = selectedMesh === node.mesh;
        const shouldLevelHighlight =
          state.highlightLevel === -1 || node.depth === state.highlightLevel;

        let emissiveHex = 0x000000;
        let emissiveIntensity = 0.0;

        if (shouldLevelHighlight) {
          emissiveHex = 0x2244ff;
          emissiveIntensity = 0.25;
        }

        if (node.flashUntil > now && node.flashColor !== null) {
          emissiveHex = node.flashColor;
          emissiveIntensity = 1.2;
        }

        if (isSelected) {
          emissiveHex = 0xffff00;
          emissiveIntensity = 0.8;
        }

        node.mesh.material.emissive.setHex(emissiveHex);
        node.mesh.material.emissiveIntensity = emissiveIntensity;
      });
    }

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'h') {
        cycleHighlightLevel();
      } else if (key === 'r') {
        startCameraReset();
      } else if (key === 't') {
        state.treeRotating = !state.treeRotating;
      }
    });

    renderer.domElement.addEventListener('click', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(nodeMeshes, false);

      if (intersects.length > 0) {
        selectNode(intersects[0].object);
      }
    });

    const loader = new GLTFLoader();
    const horseLeaf = nodeMap.get('Branch_A1a');

    loader.load(
      '._horse.glb',
      (gltf) => {
        horseModel = gltf.scene;
        horseModel.position.copy(horseLeaf.position);
        horseModel.scale.set(0.5, 0.5, 0.5);
        horseModel.position.y += 0.4;
        treeGroup.add(horseModel);

        state.horseLoaded = true;
        state.horsePosition = {
          x: horseModel.position.x,
          y: horseModel.position.y,
          z: horseModel.position.z
        };
      },
      undefined,
      () => {
        const fallback = new THREE.Mesh(
          new THREE.BoxGeometry(0.5, 0.5, 1),
          new THREE.MeshStandardMaterial({ color: 0x8b6f47 })
        );
        fallback.position.copy(horseLeaf.position);
        fallback.scale.set(0.5, 0.5, 0.5);
        fallback.position.y += 0.4;
        horseModel = fallback;
        treeGroup.add(fallback);

        state.horseLoaded = false;
        state.horsePosition = {
          x: fallback.position.x,
          y: fallback.position.y,
          z: fallback.position.z
        };
      }
    );

    window.__3D_STATE__ = {
      totalNodes: 22,
      score: 0,
      combo: 1,
      correctAnswers: 0,
      wrongAnswers: 0,
      selectedNode: null,
      highlightLevel: 0,
      quizMode: false,
      treeRotating: false,
      treeRotationAngle: 0,
      horseLoaded: false,
      horsePosition: { x: 0, y: 0, z: 0 },
      cameraPosition: { x: 0, y: 5, z: 20 },
      currentQuizNode: null,
      nodesAtLevel: { 0: 1, 1: 3, 2: 6, 3: 12 }
    };

    updateHUD();
    updateInfoPanel(null);

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      const now = performance.now();

      controls.update();

      if (state.treeRotating) {
        treeGroup.rotation.y += 0.5 * delta;
      }
      state.treeRotationAngle = treeGroup.rotation.y;

      if (resetAnimating) {
        const elapsed = now - resetStartTime;
        const t = Math.min(elapsed / resetDuration, 1);
        const ease = 1 - Math.pow(1 - t, 3);

        camera.position.lerpVectors(resetFrom, resetTo, ease);
        controls.target.lerpVectors(targetFrom, targetTo, ease);

        if (t >= 1) {
          resetAnimating = false;
        }
      }

      updateLevelHighlights(now);

      window.__3D_STATE__.totalNodes = 22;
      window.__3D_STATE__.score = state.score;
      window.__3D_STATE__.combo = state.combo;
      window.__3D_STATE__.correctAnswers = state.correctAnswers;
      window.__3D_STATE__.wrongAnswers = state.wrongAnswers;
      window.__3D_STATE__.selectedNode = state.selectedNode;
      window.__3D_STATE__.highlightLevel = state.highlightLevel;
      window.__3D_STATE__.quizMode = state.quizMode;
      window.__3D_STATE__.treeRotating = state.treeRotating;
      window.__3D_STATE__.treeRotationAngle = state.treeRotationAngle;
      window.__3D_STATE__.horseLoaded = state.horseLoaded;
      window.__3D_STATE__.horsePosition = { ...state.horsePosition };
      window.__3D_STATE__.cameraPosition = {
        x: camera.position.x,
        y: camera.position.y,
        z: camera.position.z
      };
      window.__3D_STATE__.currentQuizNode = state.currentQuizNode;
      window.__3D_STATE__.nodesAtLevel = { 0: 1, 1: 3, 2: 6, 3: 12 };

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
