<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Phylogenetic Tree</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .panel {
            position: absolute;
            background: rgba(10, 10, 26, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }
        #hud {
            top: 20px;
            left: 20px;
            min-width: 200px;
        }
        #infoPanel {
            top: 20px;
            right: 20px;
            min-width: 200px;
            display: none;
        }
        #quizPanel {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            display: none;
            min-width: 300px;
        }
        h2, h3 {
            margin: 0 0 10px 0;
            font-size: 1.2em;
            color: #ffd700;
        }
        p {
            margin: 5px 0;
            font-size: 0.9em;
        }
        .stat-value {
            font-weight: bold;
            color: #00ffff;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }
        #quizBtn {
            margin-top: 15px;
            width: 100%;
            background: rgba(0, 255, 255, 0.2);
            border-color: #00ffff;
        }
        #quizBtn:hover {
            background: rgba(0, 255, 255, 0.4);
        }
        .choice-btn {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            font-size: 1em;
        }
        #controls-help {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud" class="panel">
        <h2>Evolution Stats</h2>
        <p>Score: <span id="scoreVal" class="stat-value">0</span></p>
        <p>Combo: <span id="comboVal" class="stat-value">x1</span></p>
        <p>Selected: <span id="selectedVal" class="stat-value">None</span></p>
        <button id="quizBtn">Start Quiz Mode</button>
    </div>

    <div id="infoPanel" class="panel">
        <h3 id="infoLabel">Node Name</h3>
        <p>Level: <span id="infoLevel" class="stat-value"></span></p>
        <p>Parent: <span id="infoParent" class="stat-value"></span></p>
        <p>Children: <span id="infoChildren" class="stat-value"></span></p>
    </div>

    <div id="quizPanel" class="panel">
        <h3 id="quizQuestion">What is the parent of X?</h3>
        <button id="choiceA" class="choice-btn">Choice A</button>
        <button id="choiceB" class="choice-btn">Choice B</button>
        <button id="choiceC" class="choice-btn">Choice C</button>
    </div>

    <div id="controls-help">
        Click Node: Select | H: Toggle Level Highlight | R: Reset Camera | T: Toggle Rotation
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            totalNodes: 22,
            score: 0,
            combo: 1,
            correctAnswers: 0,
            wrongAnswers: 0,
            selectedNode: null,
            highlightLevel: -1,
            quizMode: false,
            treeRotating: false,
            treeRotationAngle: 0,
            horseLoaded: false,
            horsePosition: { x: 0, y: 0, z: 0 },
            cameraPosition: { x: 0, y: 5, z: 20 },
            currentQuizNode: null,
            nodesAtLevel: { 0: 1, 1: 3, 2: 6, 3: 12 }
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 15, 10);
        scene.add(dirLight);

        // --- Tree Generation ---
        const treeGroup = new THREE.Group();
        scene.add(treeGroup);

        const nodesData = [];
        const nodeMeshes = [];

        const levelConfigs = {
            0: { color: 0xFFD700, radius: 0.5 },
            1: { color: 0x00FFFF, radius: 0.4 },
            2: { color: 0x00FF00, radius: 0.3 },
            3: { color: 0xFF00FF, radius: 0.25 }
        };

        const cylinderMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });

        function createNode(label, level, parent, position) {
            const config = levelConfigs[level];
            const geometry = new THREE.SphereGeometry(config.radius, 32, 32);
            const material = new THREE.MeshStandardMaterial({ 
                color: config.color,
                roughness: 0.4,
                metalness: 0.2
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.copy(position);
            mesh.userData = { label, level, parentLabel: parent ? parent.label : 'None', originalColor: config.color };
            
            treeGroup.add(mesh);
            nodeMeshes.push(mesh);

            const nodeObj = { label, level, parent, children: [], pos: position, mesh };
            if (parent) parent.children.push(nodeObj);
            nodesData.push(nodeObj);

            if (parent) {
                const distance = parent.pos.distanceTo(position);
                const cylGeo = new THREE.CylinderGeometry(0.05, 0.05, distance, 8);
                const cylinder = new THREE.Mesh(cylGeo, cylinderMaterial);
                
                const midPoint = new THREE.Vector3().addVectors(parent.pos, position).multiplyScalar(0.5);
                cylinder.position.copy(midPoint);
                
                cylinder.quaternion.setFromUnitVectors(
                    new THREE.Vector3(0, 1, 0),
                    new THREE.Vector3().subVectors(position, parent.pos).normalize()
                );
                treeGroup.add(cylinder);
            }
            return nodeObj;
        }

        // Build Hierarchy
        const root = createNode('Ancestor', 0, null, new THREE.Vector3(0, 0, 0));

        const l1Labels = ['Branch_A', 'Branch_B', 'Branch_C'];
        const l1Nodes = [];
        for (let i = 0; i < 3; i++) {
            const angle = (i * Math.PI * 2) / 3;
            const pos = new THREE.Vector3(Math.cos(angle) * 6, 4, Math.sin(angle) * 6);
            l1Nodes.push(createNode(l1Labels[i], 1, root, pos));
        }

        const l2Nodes = [];
        l1Nodes.forEach(p => {
            for (let i = 0; i < 2; i++) {
                const baseAngle = Math.atan2(p.pos.z, p.pos.x);
                const angle = baseAngle + (i === 0 ? -0.6 : 0.6);
                const pos = new THREE.Vector3(
                    p.pos.x + Math.cos(angle) * 4, 
                    8, 
                    p.pos.z + Math.sin(angle) * 4
                );
                l2Nodes.push(createNode(`${p.label}${i + 1}`, 2, p, pos));
            }
        });

        l2Nodes.forEach(p => {
            for (let i = 0; i < 2; i++) {
                const baseAngle = Math.atan2(p.pos.z - p.parent.pos.z, p.pos.x - p.parent.pos.x);
                const angle = baseAngle + (i === 0 ? -0.4 : 0.4);
                const pos = new THREE.Vector3(
                    p.pos.x + Math.cos(angle) * 2.5, 
                    12, 
                    p.pos.z + Math.sin(angle) * 2.5
                );
                createNode(`${p.label}${['a', 'b'][i]}`, 3, p, pos);
            }
        });

        // --- Load 3D Model ---
        const loader = new GLTFLoader();
        let horseModel = null;
        loader.load(
            '._horse.glb',
            (gltf) => {
                horseModel = gltf.scene;
                horseModel.scale.set(0.5, 0.5, 0.5);
                const targetNode = nodesData.find(n => n.label === 'Branch_A1a');
                if (targetNode) {
                    horseModel.position.copy(targetNode.pos);
                    // Offset slightly so it doesn't clip exactly inside the sphere
                    horseModel.position.y += 0.5; 
                    treeGroup.add(horseModel);
                    window.__3D_STATE__.horseLoaded = true;
                }
            },
            undefined,
            (error) => {
                console.warn("Could not load horse model (expected if file missing).", error);
            }
        );

        // --- Interaction & Raycasting ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedMesh = null;

        function updateHighlights() {
            nodeMeshes.forEach(mesh => {
                mesh.material.emissive.setHex(0x000000);
                
                if (window.__3D_STATE__.highlightLevel === mesh.userData.level) {
                    mesh.material.emissive.setHex(0x333333);
                }
                
                if (mesh === selectedMesh) {
                    mesh.material.emissive.setHex(0x888800); // Yellowish glow
                }
            });
        }

        window.addEventListener('pointerdown', (event) => {
            if (event.target.tagName === 'BUTTON' || event.target.closest('.panel')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodeMeshes);

            if (intersects.length > 0) {
                selectedMesh = intersects[0].object;
                const data = selectedMesh.userData;
                const nodeObj = nodesData.find(n => n.label === data.label);
                
                window.__3D_STATE__.selectedNode = data.label;
                document.getElementById('selectedVal').innerText = data.label;
                
                const infoPanel = document.getElementById('infoPanel');
                infoPanel.style.display = 'block';
                document.getElementById('infoLabel').innerText = data.label;
                document.getElementById('infoLevel').innerText = data.level;
                document.getElementById('infoParent').innerText = data.parentLabel;
                document.getElementById('infoChildren').innerText = nodeObj.children.length;
            } else {
                selectedMesh = null;
                window.__3D_STATE__.selectedNode = null;
                document.getElementById('selectedVal').innerText = 'None';
                document.getElementById('infoPanel').style.display = 'none';
            }
            updateHighlights();
        });

        // --- Keyboard Controls ---
        let cameraAnim = { active: false, startPos: new THREE.Vector3(), startTime: 0, duration: 1000 };

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'h') {
                let hl = window.__3D_STATE__.highlightLevel;
                hl = hl >= 3 ? -1 : hl + 1;
                window.__3D_STATE__.highlightLevel = hl;
                updateHighlights();
            } else if (key === 'r') {
                cameraAnim.active = true;
                cameraAnim.startPos.copy(camera.position);
                cameraAnim.startTime = performance.now();
            } else if (key === 't') {
                window.__3D_STATE__.treeRotating = !window.__3D_STATE__.treeRotating;
            }
        });

        // --- Quiz System ---
        const quizBtn = document.getElementById('quizBtn');
        const quizPanel = document.getElementById('quizPanel');
        const questionEl = document.getElementById('quizQuestion');
        const choiceBtns = [document.getElementById('choiceA'), document.getElementById('choiceB'), document.getElementById('choiceC')];
        
        let currentCorrectAnswer = '';
        let currentQuizNodeMesh = null;

        function updateHUD() {
            document.getElementById('scoreVal').innerText = window.__3D_STATE__.score;
            document.getElementById('comboVal').innerText = 'x' + window.__3D_STATE__.combo;
        }

        function flashNode(mesh, isCorrect) {
            const origColor = mesh.userData.originalColor;
            mesh.material.color.setHex(isCorrect ? 0x00ff00 : 0xff0000);
            setTimeout(() => {
                mesh.material.color.setHex(origColor);
            }, 500);
        }

        function generateQuestion() {
            // Pick a random node from level 2 or 3 to ensure multiple parent options exist at the level above
            const validNodes = nodesData.filter(n => n.level > 1);
            const targetNode = validNodes[Math.floor(Math.random() * validNodes.length)];
            
            window.__3D_STATE__.currentQuizNode = targetNode.label;
            currentQuizNodeMesh = targetNode.mesh;
            currentCorrectAnswer = targetNode.parent.label;

            questionEl.innerText = `What is the parent of ${targetNode.label}?`;

            // Get wrong options from the same level as the parent
            const parentLevelNodes = nodesData.filter(n => n.level === targetNode.level - 1 && n.label !== currentCorrectAnswer);
            
            // Shuffle parentLevelNodes
            const shuffledWrong = parentLevelNodes.sort(() => 0.5 - Math.random());
            const wrongChoices = shuffledWrong.slice(0, 2).map(n => n.label);

            const choices = [currentCorrectAnswer, ...wrongChoices].sort(() => 0.5 - Math.random());

            choiceBtns.forEach((btn, index) => {
                btn.innerText = choices[index];
                btn.onclick = () => handleAnswer(choices[index] === currentCorrectAnswer);
            });
        }

        function handleAnswer(isCorrect) {
            if (isCorrect) {
                window.__3D_STATE__.score += 100 * window.__3D_STATE__.combo;
                window.__3D_STATE__.combo = Math.min(5, window.__3D_STATE__.combo + 1);
                window.__3D_STATE__.correctAnswers++;
                flashNode(currentQuizNodeMesh, true);
            } else {
                window.__3D_STATE__.score = Math.max(0, window.__3D_STATE__.score - 50);
                window.__3D_STATE__.combo = 1;
                window.__3D_STATE__.wrongAnswers++;
                flashNode(currentQuizNodeMesh, false);
            }
            updateHUD();
            generateQuestion();
        }

        quizBtn.addEventListener('click', () => {
            window.__3D_STATE__.quizMode = !window.__3D_STATE__.quizMode;
            if (window.__3D_STATE__.quizMode) {
                quizBtn.innerText = "Stop Quiz Mode";
                quizBtn.style.background = "rgba(255, 0, 0, 0.2)";
                quizBtn.style.borderColor = "#ff0000";
                quizPanel.style.display = 'block';
                generateQuestion();
            } else {
                quizBtn.innerText = "Start Quiz Mode";
                quizBtn.style.background = "rgba(0, 255, 255, 0.2)";
                quizBtn.style.borderColor = "#00ffff";
                quizPanel.style.display = 'none';
                window.__3D_STATE__.currentQuizNode = null;
            }
        });

        // --- Window Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        const targetCamPos = new THREE.Vector3(0, 5, 20);

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = performance.now();

            controls.update();

            // Camera Reset Animation
            if (cameraAnim.active) {
                let t = (time - cameraAnim.startTime) / cameraAnim.duration;
                if (t >= 1) {
                    t = 1;
                    cameraAnim.active = false;
                }
                // Smoothstep
                const smoothT = t * t * (3 - 2 * t);
                camera.position.lerpVectors(cameraAnim.startPos, targetCamPos, smoothT);
                controls.target.lerp(new THREE.Vector3(0,0,0), smoothT);
            }

            // Tree Rotation
            if (window.__3D_STATE__.treeRotating) {
                treeGroup.rotation.y += 0.5 * delta;
            }
            window.__3D_STATE__.treeRotationAngle = treeGroup.rotation.y;

            // Update State
            window.__3D_STATE__.cameraPosition = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
            if (horseModel) {
                const worldPos = new THREE.Vector3();
                horseModel.getWorldPosition(worldPos);
                window.__3D_STATE__.horsePosition = { x: worldPos.x, y: worldPos.y, z: worldPos.z };
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
