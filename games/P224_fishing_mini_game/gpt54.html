<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Fishing Mini-Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #87CEEB;
    }

    #score-display, #fish-count, #status-display {
      position: absolute;
      color: white;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 18px;
      z-index: 10;
      user-select: none;
    }

    #score-display {
      top: 12px;
      left: 12px;
    }

    #fish-count {
      top: 60px;
      left: 12px;
    }

    #status-display {
      top: 12px;
      right: 12px;
    }

    #reset-btn {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #ffffff;
      cursor: pointer;
      z-index: 10;
    }

    #reset-btn:hover {
      background: #f0f0f0;
    }

    #help {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      background: rgba(0,0,0,0.35);
      padding: 10px 14px;
      border-radius: 8px;
      z-index: 10;
      font-size: 14px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="score-display">Score: 0</div>
  <div id="fish-count">Fish Remaining: 5</div>
  <div id="status-display">State: idle</div>
  <button id="reset-btn">Reset Game</button>
  <div id="help">
    C = Cast line<br>
    Space = Hook fish when biting<br>
    R = Reset game
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 8, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Lights
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambientLight);

    // Water
    const waterGeo = new THREE.PlaneGeometry(30, 30, 60, 60);
    const waterMat = new THREE.MeshPhongMaterial({
      color: 0x2288cc,
      transparent: true,
      opacity: 0.7,
      side: THREE.DoubleSide,
      flatShading: false
    });
    const water = new THREE.Mesh(waterGeo, waterMat);
    water.rotation.x = -Math.PI / 2;
    water.position.y = 0;
    scene.add(water);

    const waterBasePositions = water.geometry.attributes.position.array.slice();

    // Dock
    const dock = new THREE.Mesh(
      new THREE.BoxGeometry(2, 0.3, 6),
      new THREE.MeshPhongMaterial({ color: 0x8B4513 })
    );
    dock.position.set(0, 0.15, 5);
    scene.add(dock);

    // Shore/ground behind dock for nicer look
    const shore = new THREE.Mesh(
      new THREE.BoxGeometry(30, 0.2, 8),
      new THREE.MeshPhongMaterial({ color: 0x7c9a4d })
    );
    shore.position.set(0, -0.05, 11);
    scene.add(shore);

    // Fishing rod
    const rod = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.05, 4, 8),
      new THREE.MeshPhongMaterial({ color: 0x4b2e19 })
    );
    rod.position.set(0, 2.0, 2.2);
    rod.rotation.z = Math.PI / 4;
    scene.add(rod);

    const rodTip = new THREE.Vector3();
    function getRodTipWorldPosition() {
      // Top end of cylinder in local space
      const localTip = new THREE.Vector3(0, 2, 0);
      rod.updateMatrixWorld();
      return rod.localToWorld(localTip.clone());
    }

    // Bobber
    const bobber = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 16, 16),
      new THREE.MeshPhongMaterial({ color: 0xff0000 })
    );
    bobber.position.set(0, 0, 1);
    scene.add(bobber);

    // Fishing line
    const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });
    const linePoints = [new THREE.Vector3(), new THREE.Vector3()];
    const lineGeometry = new THREE.BufferGeometry().setFromPoints(linePoints);
    const fishingLine = new THREE.Line(lineGeometry, lineMaterial);
    scene.add(fishingLine);

    function updateLine() {
      const tip = getRodTipWorldPosition();
      const positions = lineGeometry.attributes.position.array;
      positions[0] = tip.x;
      positions[1] = tip.y;
      positions[2] = tip.z;
      positions[3] = bobber.position.x;
      positions[4] = bobber.position.y;
      positions[5] = bobber.position.z;
      lineGeometry.attributes.position.needsUpdate = true;
      lineGeometry.computeBoundingSphere();
    }

    // Fish setup
    const fishGroup = new THREE.Group();
    scene.add(fishGroup);

    let fishList = [];

    function createFish(index = 0) {
      const fish = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.SphereGeometry(0.28, 16, 12),
        new THREE.MeshPhongMaterial({ color: 0xFF8C00 })
      );
      body.scale.set(1.7, 0.8, 0.8);
      fish.add(body);

      const tail = new THREE.Mesh(
        new THREE.ConeGeometry(0.18, 0.35, 8),
        new THREE.MeshPhongMaterial({ color: 0xFF8C00 })
      );
      tail.rotation.z = -Math.PI / 2;
      tail.position.set(-0.5, 0, 0);
      fish.add(tail);

      const x = THREE.MathUtils.randFloat(-8, 8);
      const y = THREE.MathUtils.randFloat(-3, -1);
      const z = THREE.MathUtils.randFloat(-8, 4);

      fish.position.set(x, y, z);

      fish.userData = {
        speed: THREE.MathUtils.randFloat(0.5, 2.0),
        phase: Math.random() * Math.PI * 2,
        phase2: Math.random() * Math.PI * 2,
        centerX: x,
        centerZ: z,
        ampX: THREE.MathUtils.randFloat(1.0, 3.5),
        ampZ: THREE.MathUtils.randFloat(1.0, 3.5),
        yBase: y,
        nearTimer: 0,
        biteThreshold: THREE.MathUtils.randFloat(0.5, 1.5),
        active: true,
        id: index
      };

      fishGroup.add(fish);
      return fish;
    }

    function spawnAllFish() {
      fishList.forEach(f => fishGroup.remove(f));
      fishList = [];
      for (let i = 0; i < 5; i++) {
        fishList.push(createFish(i));
      }
    }

    spawnAllFish();

    // Game state
    let gameState = 'idle';
    let score = 0;
    let castCount = 0;
    let lastCaughtTime = 0;

    let currentBitingFish = null;
    let hookedFish = null;
    let biteStartTime = 0;
    let reelStartTime = 0;

    const defaultBobberPos = new THREE.Vector3(0, 0, 1);

    const scoreDisplay = document.getElementById('score-display');
    const statusDisplay = document.getElementById('status-display');
    const fishCountDisplay = document.getElementById('fish-count');
    const resetBtn = document.getElementById('reset-btn');

    function round2(v) {
      return Math.round(v * 100) / 100;
    }

    function updateHUD() {
      scoreDisplay.textContent = `Score: ${score}`;
      statusDisplay.textContent = `State: ${gameState}`;
      fishCountDisplay.textContent = `Fish Remaining: ${fishList.length}`;
    }

    function updateExposedState() {
      window.__3D_STATE__ = {
        gameState,
        score,
        fishRemaining: fishList.length,
        bobberY: round2(bobber.position.y),
        bobberX: round2(bobber.position.x),
        bobberZ: round2(bobber.position.z),
        fishPositions: fishList.map(f => ({
          x: round2(f.position.x),
          y: round2(f.position.y),
          z: round2(f.position.z)
        })),
        lineAttached: true,
        castCount,
        lastCaughtTime
      };
    }

    function resetBobberToDock() {
      bobber.position.copy(defaultBobberPos);
      updateLine();
    }

    function castLine() {
      if (gameState === 'hooked' || gameState === 'reeling') return;

      bobber.position.set(
        THREE.MathUtils.randFloat(-8, 8),
        0,
        THREE.MathUtils.randFloat(-8, 4)
      );
      currentBitingFish = null;
      hookedFish = null;
      biteStartTime = 0;
      gameState = 'cast';
      castCount++;
      updateLine();
      updateHUD();
    }

    function startBite(fish) {
      if (gameState !== 'cast') return;
      currentBitingFish = fish;
      biteStartTime = performance.now();
      gameState = 'biting';
      bobber.position.y = -0.5;
      updateLine();
      updateHUD();
    }

    function missBite() {
      if (gameState !== 'biting') return;
      currentBitingFish = null;
      bobber.position.y = 0;
      gameState = 'cast';
      updateLine();
      updateHUD();
    }

    function hookFish() {
      if (gameState !== 'biting' || !currentBitingFish) return;
      hookedFish = currentBitingFish;
      currentBitingFish = null;
      gameState = 'hooked';
      reelStartTime = performance.now();
      updateHUD();
    }

    function removeHookedFish() {
      if (!hookedFish) return;
      fishGroup.remove(hookedFish);
      fishList = fishList.filter(f => f !== hookedFish);
      hookedFish = null;
      score++;
      lastCaughtTime = Date.now();
    }

    function resetGame() {
      score = 0;
      castCount = 0;
      lastCaughtTime = 0;
      gameState = 'idle';
      currentBitingFish = null;
      hookedFish = null;
      biteStartTime = 0;
      reelStartTime = 0;
      spawnAllFish();
      resetBobberToDock();
      updateHUD();
      updateExposedState();
    }

    resetBtn.addEventListener('click', resetGame);

    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyC') {
        castLine();
      } else if (e.code === 'Space') {
        e.preventDefault();
        if (gameState === 'biting') {
          hookFish();
        }
      } else if (e.code === 'KeyR') {
        resetGame();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animateWater(time) {
      const pos = water.geometry.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const ix = i * 3;
        const x = waterBasePositions[ix];
        const z = waterBasePositions[ix + 2];
        pos.array[ix + 1] =
          Math.sin(time * 0.0015 + x * 0.6) * 0.06 +
          Math.cos(time * 0.0012 + z * 0.5) * 0.05;
      }
      pos.needsUpdate = true;
      water.geometry.computeVertexNormals();
    }

    function clampFishPosition(fish) {
      fish.position.x = THREE.MathUtils.clamp(fish.position.x, -14, 14);
      fish.position.z = THREE.MathUtils.clamp(fish.position.z, -14, 14);
      fish.position.y = THREE.MathUtils.clamp(fish.position.y, -3, -1);
    }

    let lastTime = performance.now();

    function animate(now) {
      requestAnimationFrame(animate);

      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      animateWater(now);

      // Fish movement
      fishList.forEach((fish) => {
        if (fish === hookedFish) return;

        const d = fish.userData;
        d.phase += dt * d.speed;
        d.phase2 += dt * d.speed * 0.7;

        fish.position.x = d.centerX + Math.sin(d.phase) * d.ampX;
        fish.position.z = d.centerZ + Math.cos(d.phase2) * d.ampZ;
        fish.position.y = d.yBase + Math.sin(d.phase * 1.3) * 0.15;

        clampFishPosition(fish);

        const dx = fish.position.x - bobber.position.x;
        const dz = fish.position.z - bobber.position.z;
        const distXZ = Math.sqrt(dx * dx + dz * dz);

        fish.rotation.y = Math.atan2(
          Math.cos(d.phase2) * d.ampZ * 0.7,
          Math.cos(d.phase) * d.ampX
        );

        if (gameState === 'cast') {
          if (distXZ <= 1.5) {
            d.nearTimer += dt;
            if (d.nearTimer >= d.biteThreshold) {
              if (Math.random() < 0.02 + dt * 2.0) {
                startBite(fish);
              }
            }
          } else {
            d.nearTimer = 0;
            d.biteThreshold = THREE.MathUtils.randFloat(0.5, 1.5);
          }
        } else {
          d.nearTimer = 0;
        }
      });

      // Bite timeout
      if (gameState === 'biting') {
        if (now - biteStartTime > 2000) {
          missBite();
        }
      }

      // Reel in animation
      if (gameState === 'hooked') {
        gameState = 'reeling';
        updateHUD();
      }

      if (gameState === 'reeling' && hookedFish) {
        const duration = 2000;
        const t = THREE.MathUtils.clamp((now - reelStartTime) / duration, 0, 1);

        const target = defaultBobberPos.clone();
        bobber.position.lerpVectors(
          new THREE.Vector3(bobber.position.x, bobber.position.y, bobber.position.z),
          target,
          t
        );

        bobber.position.y = THREE.MathUtils.lerp(-0.5, 0.0, t);

        hookedFish.position.set(
          bobber.position.x,
          bobber.position.y - 0.35,
          bobber.position.z
        );

        if (t >= 1) {
          removeHookedFish();
          resetBobberToDock();
          gameState = 'idle';
          updateHUD();
        }
      } else if (gameState !== 'biting') {
        // subtle floating when not biting/reeling
        bobber.position.y = (gameState === 'cast' || gameState === 'idle')
          ? Math.sin(now * 0.004 + bobber.position.x) * 0.03
          : bobber.position.y;
      }

      updateLine();
      updateHUD();
      updateExposedState();
      renderer.render(scene, camera);
    }

    resetBobberToDock();
    updateHUD();
    updateExposedState();
    animate(performance.now());
  </script>
</body>
</html>
