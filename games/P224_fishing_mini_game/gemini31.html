<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fishing Mini-Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .hud {
            position: absolute;
            color: white;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #score-display {
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        #fish-count {
            top: 65px;
            left: 20px;
            font-size: 16px;
        }
        #status-display {
            top: 20px;
            right: 20px;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #controls-help {
            bottom: 20px;
            left: 20px;
            font-size: 14px;
            line-height: 1.5;
        }
        #reset-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #8B4513;
            border: 2px solid #5c2e0d;
            border-radius: 5px;
            cursor: pointer;
            pointer-events: auto;
            transition: background-color 0.2s;
        }
        #reset-btn:hover {
            background-color: #a0522d;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="score-display" class="hud">Score: 0</div>
    <div id="fish-count" class="hud">Fish Remaining: 5</div>
    <div id="status-display" class="hud">IDLE</div>
    <div id="controls-help" class="hud">
        <strong>Controls:</strong><br>
        [ C ] - Cast Line<br>
        [ Space ] - Hook Fish (when biting)<br>
        [ R ] - Reset Game
    </div>
    <button id="reset-btn">Reset Game</button>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            gameState: 'idle',
            score: 0,
            fishRemaining: 5,
            bobberY: 0,
            bobberX: 0,
            bobberZ: 0,
            fishPositions: [],
            lineAttached: true,
            castCount: 0,
            lastCaughtTime: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- Objects ---
        // Water
        const waterGeo = new THREE.PlaneGeometry(30, 30, 32, 32);
        waterGeo.rotateX(-Math.PI / 2);
        const waterMat = new THREE.MeshPhongMaterial({
            color: 0x2288cc,
            transparent: true,
            opacity: 0.7,
            shininess: 80,
            flatShading: true
        });
        const water = new THREE.Mesh(waterGeo, waterMat);
        scene.add(water);

        // Dock
        const dockGeo = new THREE.BoxGeometry(2, 0.3, 6);
        const dockMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8 });
        const dock = new THREE.Mesh(dockGeo, dockMat);
        dock.position.set(0, 0.15, 5);
        scene.add(dock);

        // Rod
        const rodGroup = new THREE.Group();
        rodGroup.position.set(0, 0.3, 2); // End of dock
        rodGroup.rotation.x = -Math.PI / 4; // Angle towards water
        scene.add(rodGroup);

        const rodGeo = new THREE.CylinderGeometry(0.05, 0.05, 4, 8);
        rodGeo.translate(0, 2, 0); // Pivot at base
        const rodMat = new THREE.MeshStandardMaterial({ color: 0x3d2314 });
        const rod = new THREE.Mesh(rodGeo, rodMat);
        rodGroup.add(rod);

        // Bobber
        const bobberGeo = new THREE.SphereGeometry(0.15, 16, 16);
        const bobberMat = new THREE.MeshStandardMaterial({ color: 0xff0000, roughness: 0.4 });
        const bobber = new THREE.Mesh(bobberGeo, bobberMat);
        bobber.position.set(0, 0, 1);
        scene.add(bobber);

        // Line
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
        const lineGeo = new THREE.BufferGeometry();
        const linePositions = new Float32Array(6); // 2 points * 3 coords
        lineGeo.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
        const fishingLine = new THREE.Line(lineGeo, lineMat);
        scene.add(fishingLine);

        // --- Fish Logic ---
        let fishList = [];
        const fishGeo = new THREE.SphereGeometry(1, 16, 16);
        fishGeo.scale(0.15, 0.25, 0.5); // Elongated shape
        const fishMat = new THREE.MeshStandardMaterial({ color: 0xFF8C00, roughness: 0.5 });

        function createFish() {
            const mesh = new THREE.Mesh(fishGeo, fishMat);
            const y = -1 - Math.random() * 2; // -1 to -3
            const x = (Math.random() - 0.5) * 20;
            const z = (Math.random() - 0.5) * 16 - 2; // mostly in front of dock
            mesh.position.set(x, y, z);
            scene.add(mesh);

            return {
                mesh: mesh,
                baseY: y,
                speed: 0.5 + Math.random() * 1.5, // 0.5 to 2.0
                angle: Math.random() * Math.PI * 2,
                turnSpeed: (Math.random() - 0.5) * 0.5,
                timeNearBobber: 0,
                biteThreshold: 0.5 + Math.random() * 1.0, // 0.5s to 1.5s
                state: 'swimming', // swimming, biting, hooked
                seed: Math.random() * 100
            };
        }

        function initFish() {
            fishList.forEach(f => scene.remove(f.mesh));
            fishList = [];
            for (let i = 0; i < 5; i++) {
                fishList.push(createFish());
            }
            window.__3D_STATE__.fishRemaining = 5;
        }

        initFish();

        // --- Game Variables ---
        let activeFish = null;
        let escapeTimer = 0;
        let reelTimer = 0;
        let reelStartPos = new THREE.Vector3();
        const clock = new THREE.Clock();

        // --- DOM Elements ---
        const scoreEl = document.getElementById('score-display');
        const statusEl = document.getElementById('status-display');
        const fishCountEl = document.getElementById('fish-count');
        const resetBtn = document.getElementById('reset-btn');

        // --- Input Handling ---
        function castLine() {
            if (window.__3D_STATE__.gameState === 'reeling' || window.__3D_STATE__.gameState === 'hooked') return;
            
            // Reset any biting fish
            if (activeFish && activeFish.state === 'biting') {
                activeFish.state = 'swimming';
                activeFish.timeNearBobber = 0;
                activeFish = null;
            }

            const rx = (Math.random() - 0.5) * 16; // -8 to 8
            const rz = (Math.random() * 12) - 8;   // -8 to 4
            bobber.position.set(rx, 0, rz);
            
            window.__3D_STATE__.gameState = 'cast';
            window.__3D_STATE__.castCount++;
            updateHUD();
        }

        function tryHook() {
            if (window.__3D_STATE__.gameState === 'biting' && activeFish) {
                window.__3D_STATE__.gameState = 'reeling'; // Skip 'hooked' state visually, go straight to reeling anim
                activeFish.state = 'hooked';
                reelTimer = 0;
                reelStartPos.copy(bobber.position);
                updateHUD();
            }
        }

        function resetGame() {
            initFish();
            window.__3D_STATE__.score = 0;
            window.__3D_STATE__.gameState = 'idle';
            bobber.position.set(0, 0, 1);
            activeFish = null;
            updateHUD();
        }

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'c') castLine();
            if (e.key === ' ') tryHook();
            if (e.key.toLowerCase() === 'r') resetGame();
        });

        resetBtn.addEventListener('click', resetGame);

        function updateHUD() {
            scoreEl.innerText = `Score: ${window.__3D_STATE__.score}`;
            fishCountEl.innerText = `Fish Remaining: ${window.__3D_STATE__.fishRemaining}`;
            statusEl.innerText = window.__3D_STATE__.gameState;
            
            // Color code status
            switch(window.__3D_STATE__.gameState) {
                case 'idle': statusEl.style.color = 'white'; break;
                case 'cast': statusEl.style.color = '#aaddff'; break;
                case 'biting': statusEl.style.color = '#ff4444'; break;
                case 'reeling': statusEl.style.color = '#ffff44'; break;
            }
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // 1. Water Animation
            const positions = waterGeo.attributes.position;
            for (let i = 0; i < positions.count; i++) {
                const x = positions.getX(i);
                const y = positions.getY(i);
                // Calculate wave height
                const z = Math.sin(x * 0.8 + time * 1.5) * 0.1 + Math.cos(y * 0.8 + time * 1.2) * 0.1;
                positions.setZ(i, z);
            }
            positions.needsUpdate = true;

            // 2. Update Line Geometry
            const tipPos = new THREE.Vector3(0, 4, 0);
            tipPos.applyMatrix4(rodGroup.matrixWorld);
            
            const linePosArray = fishingLine.geometry.attributes.position.array;
            linePosArray[0] = tipPos.x; linePosArray[1] = tipPos.y; linePosArray[2] = tipPos.z;
            linePosArray[3] = bobber.position.x; linePosArray[4] = bobber.position.y; linePosArray[5] = bobber.position.z;
            fishingLine.geometry.attributes.position.needsUpdate = true;

            // 3. Fish Movement & Logic
            const state = window.__3D_STATE__.gameState;
            let bitingFishFound = false;

            fishList.forEach(f => {
                if (f.state === 'swimming') {
                    // Move forward
                    f.mesh.position.x += Math.cos(f.angle) * f.speed * delta;
                    f.mesh.position.z += Math.sin(f.angle) * f.speed * delta;
                    
                    // Sinusoidal path
                    f.angle += Math.sin(time + f.seed) * 0.02;
                    f.mesh.position.y = f.baseY + Math.sin(time * 3 + f.seed) * 0.2;
                    
                    // Face direction of travel
                    f.mesh.rotation.y = -f.angle;

                    // Bounds wrapping
                    if (f.mesh.position.x > 15) f.mesh.position.x = -15;
                    if (f.mesh.position.x < -15) f.mesh.position.x = 15;
                    if (f.mesh.position.z > 10) f.mesh.position.z = -15;
                    if (f.mesh.position.z < -15) f.mesh.position.z = 10;

                    // Bite detection
                    if (state === 'cast') {
                        const dx = f.mesh.position.x - bobber.position.x;
                        const dz = f.mesh.position.z - bobber.position.z;
                        if (dx*dx + dz*dz < 2.25) { // 1.5 squared
                            f.timeNearBobber += delta;
                            if (f.timeNearBobber > f.biteThreshold && !bitingFishFound) {
                                bitingFishFound = true;
                                activeFish = f;
                            }
                        } else {
                            f.timeNearBobber = 0;
                        }
                    }
                }
            });

            // 4. State Machine Updates
            if (state === 'cast' && bitingFishFound && activeFish) {
                window.__3D_STATE__.gameState = 'biting';
                activeFish.state = 'biting';
                bobber.position.y = -0.5; // Dip bobber
                escapeTimer = 0;
                updateHUD();
            }

            if (state === 'biting') {
                escapeTimer += delta;
                // Bobber jitter
                bobber.position.x += (Math.random() - 0.5) * 0.05;
                bobber.position.z += (Math.random() - 0.5) * 0.05;

                if (escapeTimer > 2.0) {
                    // Fish escapes
                    window.__3D_STATE__.gameState = 'cast';
                    bobber.position.y = 0;
                    if (activeFish) {
                        activeFish.state = 'swimming';
                        activeFish.timeNearBobber = 0;
                        activeFish = null;
                    }
                    updateHUD();
                }
            }

            if (state === 'reeling') {
                reelTimer += delta;
                const t = Math.min(reelTimer / 2.0, 1.0);
                
                // Ease out quad
                const easeT = t * (2 - t);
                
                const targetPos = new THREE.Vector3(0, 0, 1); // Dock position
                bobber.position.lerpVectors(reelStartPos, targetPos, easeT);
                
                // Arc the bobber up slightly while reeling
                bobber.position.y = Math.sin(easeT * Math.PI) * 2;

                if (activeFish) {
                    activeFish.mesh.position.copy(bobber.position);
                    activeFish.mesh.position.y -= 0.3; // Hang below
                    
                    // Flop around
                    activeFish.mesh.rotation.x += 10 * delta;
                    activeFish.mesh.rotation.y += 15 * delta;
                }

                if (t >= 1.0) {
                    // Catch complete
                    window.__3D_STATE__.score++;
                    window.__3D_STATE__.lastCaughtTime = Date.now();
                    
                    if (activeFish) {
                        scene.remove(activeFish.mesh);
                        fishList = fishList.filter(f => f !== activeFish);
                        activeFish = null;
                    }
                    
                    window.__3D_STATE__.fishRemaining = fishList.length;
                    window.__3D_STATE__.gameState = 'idle';
                    bobber.position.set(0, 0, 1);
                    updateHUD();
                }
            }

            // Idle bobber float
            if (state === 'idle' || state === 'cast') {
                bobber.position.y = Math.sin(time * 2) * 0.05;
            }

            // 5. Update Global State Object
            window.__3D_STATE__.bobberX = Number(bobber.position.x.toFixed(2));
            window.__3D_STATE__.bobberY = Number(bobber.position.y.toFixed(2));
            window.__3D_STATE__.bobberZ = Number(bobber.position.z.toFixed(2));
            window.__3D_STATE__.fishPositions = fishList.map(f => ({
                x: Number(f.mesh.position.x.toFixed(2)),
                y: Number(f.mesh.position.y.toFixed(2)),
                z: Number(f.mesh.position.z.toFixed(2))
            }));

            renderer.render(scene, camera);
        }

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        updateHUD();
        animate();
    </script>
</body>
</html>
