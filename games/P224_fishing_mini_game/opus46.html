<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Fishing Mini-Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }
#score-display {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}
#fish-count {
    position: absolute;
    top: 55px;
    left: 20px;
    color: white;
    font-size: 18px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}
#status-display {
    position: absolute;
    top: 20px;
    right: 20px;
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    background: rgba(0,0,0,0.4);
    padding: 8px 16px;
    border-radius: 8px;
}
#reset-btn {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 30px;
    font-size: 18px;
    font-weight: bold;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    transition: transform 0.1s, box-shadow 0.1s;
}
#reset-btn:hover {
    transform: translateX(-50%) scale(1.05);
    box-shadow: 0 6px 12px rgba(0,0,0,0.4);
}
#instructions {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 14px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
    text-align: center;
    background: rgba(0,0,0,0.3);
    padding: 8px 16px;
    border-radius: 8px;
    white-space: nowrap;
}
</style>
</head>
<body>

<div id="score-display">Score: 0</div>
<div id="fish-count">Fish Remaining: 5</div>
<div id="status-display">idle</div>
<div id="instructions">[C] Cast Line &nbsp; | &nbsp; [Space] Hook Fish &nbsp; | &nbsp; [R] Reset Game</div>
<button id="reset-btn">Reset Game</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Lighting
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambientLight);

    // Water surface with wave animation
    const waterGeometry = new THREE.PlaneGeometry(30, 30, 64, 64);
    waterGeometry.rotateX(-Math.PI / 2);
    const waterMaterial = new THREE.MeshPhongMaterial({
        color: 0x2288cc,
        transparent: true,
        opacity: 0.7,
        side: THREE.DoubleSide,
        shininess: 100,
    });
    const water = new THREE.Mesh(waterGeometry, waterMaterial);
    water.position.y = 0;
    scene.add(water);

    // Store original water vertices
    const waterVerticesOriginal = [];
    const posAttr = waterGeometry.attributes.position;
    for (let i = 0; i < posAttr.count; i++) {
        waterVerticesOriginal.push(posAttr.getY(i));
    }

    // Dock
    const dockGeometry = new THREE.BoxGeometry(2, 0.3, 6);
    const dockMaterial = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
    const dock = new THREE.Mesh(dockGeometry, dockMaterial);
    dock.position.set(0, 0.15, 5);
    dock.castShadow = true;
    dock.receiveShadow = true;
    scene.add(dock);

    // Dock posts
    for (let dx of [-0.8, 0.8]) {
        for (let dz of [3, 5, 7]) {
            const postGeo = new THREE.CylinderGeometry(0.08, 0.08, 1.5, 8);
            const postMat = new THREE.MeshPhongMaterial({ color: 0x6B3410 });
            const post = new THREE.Mesh(postGeo, postMat);
            post.position.set(dx, -0.5, dz);
            scene.add(post);
        }
    }

    // Fishing rod
    const rodGroup = new THREE.Group();
    const rodGeometry = new THREE.CylinderGeometry(0.05, 0.05, 4, 8);
    const rodMaterial = new THREE.MeshPhongMaterial({ color: 0x4A2800 });
    const rod = new THREE.Mesh(rodGeometry, rodMaterial);
    rod.position.y = 2;
    rodGroup.add(rod);
    rodGroup.position.set(0, 0.3, 2.5);
    rodGroup.rotation.x = -Math.PI / 4;
    scene.add(rodGroup);

    // Calculate rod tip position in world space
    function getRodTipPosition() {
        const tip = new THREE.Vector3(0, 4, 0);
        rod.localToWorld(tip);
        rodGroup.localToWorld(tip);
        // Manual calculation
        const rodBase = new THREE.Vector3(0, 0.3, 2.5);
        const rodLength = 4;
        const angle = Math.PI / 4;
        const tipOffset = new THREE.Vector3(0, rodLength * Math.cos(angle), -rodLength * Math.sin(angle));
        return rodBase.add(tipOffset);
    }

    const rodTipPos = new THREE.Vector3(0, 0.3 + 4 * Math.cos(Math.PI/4), 2.5 - 4 * Math.sin(Math.PI/4));

    // Bobber
    const bobberGeometry = new THREE.SphereGeometry(0.15, 16, 16);
    const bobberMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000 });
    const bobber = new THREE.Mesh(bobberGeometry, bobberMaterial);
    bobber.position.set(0, 0.15, 1);
    scene.add(bobber);

    // Fishing line
    const lineGeometry = new THREE.BufferGeometry();
    const linePoints = [rodTipPos.clone(), bobber.position.clone()];
    lineGeometry.setFromPoints(linePoints);
    const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 1 });
    const fishingLine = new THREE.Line(lineGeometry, lineMaterial);
    scene.add(fishingLine);

    // Fish creation
    const fishArray = [];
    const fishMeshes = [];

    function createFish(index) {
        const fishGroup = new THREE.Group();

        // Body - elongated ellipsoid
        const bodyGeo = new THREE.SphereGeometry(0.3, 12, 8);
        bodyGeo.scale(1.8, 0.8, 0.8);
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0xFF8C00 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        fishGroup.add(body);

        // Tail
        const tailGeo = new THREE.ConeGeometry(0.2, 0.4, 4);
        tailGeo.rotateZ(Math.PI / 2);
        const tailMat = new THREE.MeshPhongMaterial({ color: 0xFF6600 });
        const tail = new THREE.Mesh(tailGeo, tailMat);
        tail.position.x = -0.6;
        fishGroup.add(tail);

        // Eye
        const eyeGeo = new THREE.SphereGeometry(0.05, 8, 8);
        const eyeMat = new THREE.MeshPhongMaterial({ color: 0x000000 });
        const eye1 = new THREE.Mesh(eyeGeo, eyeMat);
        eye1.position.set(0.35, 0.1, 0.18);
        fishGroup.add(eye1);
        const eye2 = new THREE.Mesh(eyeGeo, eyeMat);
        eye2.position.set(0.35, 0.1, -0.18);
        fishGroup.add(eye2);

        // Random starting position
        const x = (Math.random() - 0.5) * 16;
        const z = (Math.random() - 0.5) * 12 - 2;
        const y = -1 - Math.random() * 2;
        fishGroup.position.set(x, y, z);

        scene.add(fishGroup);
        fishMeshes.push(fishGroup);

        const speed = 0.5 + Math.random() * 1.5;
        const phase = Math.random() * Math.PI * 2;
        const amplitude = 2 + Math.random() * 4;
        const zAmplitude = 1 + Math.random() * 3;
        const direction = Math.random() > 0.5 ? 1 : -1;

        return {
            mesh: fishGroup,
            speed: speed,
            phase: phase,
            amplitude: amplitude,
            zAmplitude: zAmplitude,
            direction: direction,
            baseX: x,
            baseZ: z,
            baseY: y,
            nearBobberTime: 0,
            biteThreshold: 0.5 + Math.random() * 1.0,
            alive: true,
            index: index
        };
    }

    function initFish() {
        // Remove existing fish meshes
        fishMeshes.forEach(m => scene.remove(m));
        fishMeshes.length = 0;
        fishArray.length = 0;

        for (let i = 0; i < 5; i++) {
            fishArray.push(createFish(i));
        }
    }

    initFish();

    // Game state
    let gameState = 'idle';
    let score = 0;
    let castCount = 0;
    let lastCaughtTime = 0;
    let bitingFish = null;
    let biteStartTime = 0;
    let hookedFish = null;
    let reelStartTime = 0;
    let reelStartPos = new THREE.Vector3();
    const reelDuration = 2000;
    const biteTimeout = 2000;

    // DOM elements
    const scoreDisplay = document.getElementById('score-display');
    const statusDisplay = document.getElementById('status-display');
    const fishCountDisplay = document.getElementById('fish-count');
    const resetBtn = document.getElementById('reset-btn');

    function updateHUD() {
        const remaining = fishArray.filter(f => f.alive).length;
        scoreDisplay.textContent = `Score: ${score}`;
        statusDisplay.textContent = gameState;
        fishCountDisplay.textContent = `Fish Remaining: ${remaining}`;

        // Status color
        const colors = {
            'idle': '#aaa',
            'cast': '#4CAF50',
            'biting': '#FF9800',
            'hooked': '#f44336',
            'reeling': '#2196F3'
        };
        statusDisplay.style.background = colors[gameState] || 'rgba(0,0,0,0.4)';
    }

    function updateLine() {
        const points = [rodTipPos.clone(), bobber.position.clone()];
        fishingLine.geometry.setFromPoints(points);
        fishingLine.geometry.attributes.position.needsUpdate = true;
    }

    // Cast the line
    function castLine() {
        if (gameState !== 'idle') return;

        const x = (Math.random() * 16) - 8;
        const z = (Math.random() * 12) - 8;
        bobber.position.set(x, 0.15, z);
        gameState = 'cast';
        castCount++;
        bitingFish = null;

        // Reset near bobber times
        fishArray.forEach(f => f.nearBobberTime = 0);

        updateLine();
        updateHUD();
    }

    // Hook the fish
    function hookFish() {
        if (gameState !== 'biting' || !bitingFish) return;

        gameState = 'hooked';
        hookedFish = bitingFish;
        bitingFish = null;

        // Start reeling
        gameState = 'reeling';
        reelStartTime = Date.now();
        reelStartPos.copy(bobber.position);

        updateHUD();
    }

    // Reset game
    function resetGame() {
        gameState = 'idle';
        score = 0;
        castCount = 0;
        lastCaughtTime = 0;
        bitingFish = null;
        hookedFish = null;
        bobber.position.set(0, 0.15, 1);

        initFish();
        updateLine();
        updateHUD();
    }

    // Input handling
    document.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'c') {
            castLine();
        } else if (key === ' ' || e.code === 'Space') {
            e.preventDefault();
            if (gameState === 'biting') {
                hookFish();
            }
        } else if (key === 'r') {
            resetGame();
        }
    });

    resetBtn.addEventListener('click', resetGame);

    // Window resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Expose state
    window.__3D_STATE__ = {};

    const clock = new THREE.Clock();

    // Animation loop
    function animate() {
        requestAnimationFrame(animate);

        const delta = clock.getDelta();
        const elapsed = clock.getElapsedTime();

        // Water wave animation
        const waterPos = waterGeometry.attributes.position;
        for (let i = 0; i < waterPos.count; i++) {
            const x = waterPos.getX(i);
            const z = waterPos.getZ(i);
            const wave = Math.sin(x * 0.5 + elapsed * 1.5) * 0.08 +
                         Math.cos(z * 0.3 + elapsed * 1.2) * 0.06 +
                         Math.sin((x + z) * 0.4 + elapsed * 0.8) * 0.04;
            waterPos.setY(i, waterVerticesOriginal[i] + wave);
        }
        waterPos.needsUpdate = true;
        waterGeometry.computeVertexNormals();

        // Fish movement
        const aliveFish = fishArray.filter(f => f.alive);

        aliveFish.forEach(fish => {
            const t = elapsed * fish.speed + fish.phase;
            fish.mesh.position.x = fish.baseX + Math.sin(t) * fish.amplitude * fish.direction;
            fish.mesh.position.z = fish.baseZ + Math.cos(t * 0.7) * fish.zAmplitude;
            fish.mesh.position.y = fish.baseY + Math.sin(t * 1.3) * 0.3;

            // Clamp to water area
            fish.mesh.position.x = Math.max(-14, Math.min(14, fish.mesh.position.x));
            fish.mesh.position.z = Math.max(-14, Math.min(14, fish.mesh.position.z));
            fish.mesh.position.y = Math.max(-3, Math.min(-0.5, fish.mesh.position.y));

            // Face direction of movement
            const dx = Math.cos(t) * fish.amplitude * fish.direction * fish.speed;
            const dz = -Math.sin(t * 0.7) * fish.zAmplitude * 0.7 * fish.speed;
            fish.mesh.rotation.y = Math.atan2(dz, dx);

            // Tail wiggle
            if (fish.mesh.children[1]) {
                fish.mesh.children[1].rotation.y = Math.sin(elapsed * 8 + fish.phase) * 0.3;
            }

            // Check proximity to bobber (only in 'cast' state)
            if (gameState === 'cast') {
                const distXZ = Math.sqrt(
                    Math.pow(fish.mesh.position.x - bobber.position.x, 2) +
                    Math.pow(fish.mesh.position.z - bobber.position.z, 2)
                );

                if (distXZ < 1.5) {
                    fish.nearBobberTime += delta;
                    if (fish.nearBobberTime >= fish.biteThreshold) {
                        // Fish bites!
                        gameState = 'biting';
                        bitingFish = fish;
                        biteStartTime = Date.now();
                        bobber.position.y = -0.5;
                        updateLine();
                        updateHUD();
                    }
                } else {
                    fish.nearBobberTime = Math.max(0, fish.nearBobberTime - delta * 0.5);
                }
            }
        });

        // Handle biting timeout
        if (gameState === 'biting') {
            const biteElapsed = Date.now() - biteStartTime;
            // Bobber bobbing while biting
            bobber.position.y = -0.5 + Math.sin(elapsed * 10) * 0.1;

            if (biteElapsed > biteTimeout) {
                // Fish escapes
                gameState = 'cast';
                if (bitingFish) {
                    bitingFish.nearBobberTime = 0;
                    bitingFish.biteThreshold = 0.5 + Math.random() * 1.0;
                }
                bitingFish = null;
                bobber.position.y = 0.15;
                // Return to cast state so player can try again or recast
                gameState = 'idle';
                updateLine();
                updateHUD();
            }
            updateLine();
        }

        // Handle reeling
        if (gameState === 'reeling' && hookedFish) {
            const reelElapsed = Date.now() - reelStartTime;
            const t = Math.min(reelElapsed / reelDuration, 1);

            // Ease in-out
            const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

            const dockEnd = new THREE.Vector3(0, 0.5, 2.5);
            bobber.position.lerpVectors(reelStartPos, dockEnd, eased);

            // Move hooked fish with bobber
            hookedFish.mesh.position.copy(bobber.position);
            hookedFish.mesh.position.y -= 0.5;

            updateLine();

            if (t >= 1) {
                // Catch complete
                score++;
                lastCaughtTime = Date.now();
                hookedFish.alive = false;
                scene.remove(hookedFish.mesh);
                hookedFish = null;
                gameState = 'idle';
                bobber.position.set(0, 0.15, 1);
                updateLine();
                updateHUD();

                // Check if all fish caught
                if (fishArray.filter(f => f.alive).length === 0) {
                    statusDisplay.textContent = 'All fish caught! Press R to reset.';
                }
            }
        }

        // Bobber floating animation (when cast and not biting)
        if (gameState === 'cast') {
            bobber.position.y = 0.15 + Math.sin(elapsed * 2) * 0.05;
            updateLine();
        }

        // Idle bobber slight movement
        if (gameState === 'idle') {
            bobber.position.y = 0.15 + Math.sin(elapsed * 1.5) * 0.02;
            updateLine();
        }

        // Update global state
        const remaining = fishArray.filter(f => f.alive);
        window.__3D_STATE__ = {
            gameState: gameState,
            score: score,
            fishRemaining: remaining.length,
            bobberY: parseFloat(bobber.position.y.toFixed(2)),
            bobberX: parseFloat(bobber.position.x.toFixed(2)),
            bobberZ: parseFloat(bobber.position.z.toFixed(2)),
            fishPositions: remaining.map(f => ({
                x: parseFloat(f.mesh.position.x.toFixed(2)),
                y: parseFloat(f.mesh.position.y.toFixed(2)),
                z: parseFloat(f.mesh.position.z.toFixed(2))
            })),
            lineAttached: true,
            castCount: castCount,
            lastCaughtTime: lastCaughtTime
        };

        updateHUD();
        renderer.render(scene, camera);
    }

    animate();
})();
</script>
</body>
</html>
