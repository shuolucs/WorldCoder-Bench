<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 力导向图社交网络可视化</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #0b1020;
      color: #e6edf3;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(8, 12, 24, 0.72);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 12px;
      backdrop-filter: blur(8px);
      min-width: 220px;
      line-height: 1.6;
      font-size: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    }

    #hud .row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }

    #hoverPanel {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 10;
      background: rgba(8, 12, 24, 0.72);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 12px;
      backdrop-filter: blur(8px);
      min-width: 180px;
      font-size: 14px;
    }

    #pauseBtn {
      margin-top: 8px;
      width: 100%;
      padding: 8px 10px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-weight: 600;
    }

    #pauseBtn:hover {
      background: #1d4ed8;
    }

    .label {
      opacity: 0.78;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div class="row"><span class="label">节点数</span><span id="nodeCount">50</span></div>
      <div class="row"><span class="label">边数</span><span id="edgeCount">80</span></div>
      <div class="row"><span class="label">仿真能量</span><span id="simEnergy">0</span></div>
      <div class="row"><span class="label">已固定节点</span><span id="pinnedCount">0</span></div>
      <button id="pauseBtn">暂停</button>
    </div>

    <div id="hoverPanel">
      <div class="label">悬停节点</div>
      <div id="hoverInfo">无</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const nodeCountEl = document.getElementById('nodeCount');
    const edgeCountEl = document.getElementById('edgeCount');
    const simEnergyEl = document.getElementById('simEnergy');
    const pinnedCountEl = document.getElementById('pinnedCount');
    const hoverInfoEl = document.getElementById('hoverInfo');
    const pauseBtn = document.getElementById('pauseBtn');

    // =========================
    // 硬编码图数据：50 节点、80 无向边
    // =========================
    const nodes = Array.from({ length: 50 }, (_, i) => ({
      id: i,
      name: `User ${String(i + 1).padStart(2, '0')}`,
      group: i % 5,
      degree: 0,
      pinned: false,
      pos: new THREE.Vector3(),
      vel: new THREE.Vector3(),
      force: new THREE.Vector3(),
      mesh: null,
      baseColor: null,
      baseEmissive: null,
      radius: 1
    }));

    const edges = [
      { source: 0, target: 1 }, { source: 1, target: 2 }, { source: 2, target: 3 }, { source: 3, target: 4 },
      { source: 4, target: 5 }, { source: 5, target: 6 }, { source: 6, target: 7 }, { source: 7, target: 8 },
      { source: 8, target: 9 }, { source: 9, target: 0 },

      { source: 10, target: 11 }, { source: 11, target: 12 }, { source: 12, target: 13 }, { source: 13, target: 14 },
      { source: 14, target: 15 }, { source: 15, target: 16 }, { source: 16, target: 17 }, { source: 17, target: 18 },
      { source: 18, target: 19 }, { source: 19, target: 10 },

      { source: 20, target: 21 }, { source: 21, target: 22 }, { source: 22, target: 23 }, { source: 23, target: 24 },
      { source: 24, target: 25 }, { source: 25, target: 26 }, { source: 26, target: 27 }, { source: 27, target: 28 },
      { source: 28, target: 29 }, { source: 29, target: 20 },

      { source: 30, target: 31 }, { source: 31, target: 32 }, { source: 32, target: 33 }, { source: 33, target: 34 },
      { source: 34, target: 35 }, { source: 35, target: 36 }, { source: 36, target: 37 }, { source: 37, target: 38 },
      { source: 38, target: 39 }, { source: 39, target: 30 },

      { source: 40, target: 41 }, { source: 41, target: 42 }, { source: 42, target: 43 }, { source: 43, target: 44 },
      { source: 44, target: 45 }, { source: 45, target: 46 }, { source: 46, target: 47 }, { source: 47, target: 48 },
      { source: 48, target: 49 }, { source: 49, target: 40 },

      { source: 0, target: 10 }, { source: 10, target: 20 }, { source: 20, target: 30 }, { source: 30, target: 40 }, { source: 40, target: 0 },
      { source: 2, target: 12 }, { source: 12, target: 22 }, { source: 22, target: 32 }, { source: 32, target: 42 }, { source: 42, target: 2 },
      { source: 4, target: 14 }, { source: 14, target: 24 }, { source: 24, target: 34 }, { source: 34, target: 44 }, { source: 44, target: 4 },
      { source: 6, target: 16 }, { source: 16, target: 26 }, { source: 26, target: 36 }, { source: 36, target: 46 }, { source: 46, target: 6 },
      { source: 8, target: 18 }, { source: 18, target: 28 }, { source: 28, target: 38 }, { source: 38, target: 48 }, { source: 48, target: 8 },
      { source: 1, target: 25 }, { source: 5, target: 35 }, { source: 9, target: 45 }, { source: 15, target: 41 }, { source: 19, target: 29 }
    ];

    // 校验数量
    if (nodes.length !== 50 || edges.length !== 80) {
      throw new Error(`图数据数量不符合要求: nodes=${nodes.length}, edges=${edges.length}`);
    }

    // 邻接与度数
    const adjacency = Array.from({ length: nodes.length }, () => new Set());
    for (const e of edges) {
      adjacency[e.source].add(e.target);
      adjacency[e.target].add(e.source);
      nodes[e.source].degree++;
      nodes[e.target].degree++;
    }

    // =========================
    // Three.js 基础场景
    // =========================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1020);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 70, 140);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.85));

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(60, 80, 40);
    scene.add(dirLight);

    const pointLight = new THREE.PointLight(0x88aaff, 0.8, 600);
    pointLight.position.set(-80, 50, -40);
    scene.add(pointLight);

    const grid = new THREE.GridHelper(220, 22, 0x334155, 0x1f2937);
    grid.position.y = -45;
    scene.add(grid);

    // =========================
    // 颜色与初始布局
    // =========================
    const groupColors = [
      new THREE.Color(0xef4444),
      new THREE.Color(0x22c55e),
      new THREE.Color(0x3b82f6),
      new THREE.Color(0xf59e0b),
      new THREE.Color(0xa855f7)
    ];

    // 初始位置：按 group 分 5 团
    const clusterCenters = [
      new THREE.Vector3(-35,  12, -20),
      new THREE.Vector3( 35,  14, -15),
      new THREE.Vector3(-28, -10,  28),
      new THREE.Vector3( 30,  -8,  25),
      new THREE.Vector3(  0,  18,  10)
    ];

    const maxDegree = Math.max(...nodes.map(n => n.degree));
    const minDegree = Math.min(...nodes.map(n => n.degree));

    function randSpread(r) {
      return (Math.random() - 0.5) * 2 * r;
    }

    const nodeGroup = new THREE.Group();
    scene.add(nodeGroup);

    const sphereGeo = new THREE.SphereGeometry(1, 20, 20);

    nodes.forEach((node) => {
      const c = clusterCenters[node.group];
      node.pos.set(
        c.x + randSpread(10),
        c.y + randSpread(10),
        c.z + randSpread(10)
      );
      node.vel.set(randSpread(0.2), randSpread(0.2), randSpread(0.2));

      const t = (node.degree - minDegree) / Math.max(1, (maxDegree - minDegree));
      node.radius = 1.6 + t * 2.4;

      const material = new THREE.MeshStandardMaterial({
        color: groupColors[node.group].clone(),
        emissive: new THREE.Color(0x000000),
        roughness: 0.35,
        metalness: 0.15
      });

      const mesh = new THREE.Mesh(sphereGeo, material);
      mesh.scale.setScalar(node.radius);
      mesh.position.copy(node.pos);
      mesh.userData.nodeIndex = node.id;
      node.mesh = mesh;
      node.baseColor = material.color.clone();
      node.baseEmissive = material.emissive.clone();
      nodeGroup.add(mesh);
    });

    // 边几何
    const edgePositions = new Float32Array(edges.length * 2 * 3);
    const edgeGeometry = new THREE.BufferGeometry();
    edgeGeometry.setAttribute('position', new THREE.BufferAttribute(edgePositions, 3));

    const edgeMaterial = new THREE.LineBasicMaterial({
      color: 0x7dd3fc,
      transparent: true,
      opacity: 0.45
    });

    const edgeLines = new THREE.LineSegments(edgeGeometry, edgeMaterial);
    scene.add(edgeLines);

    function updateEdgeGeometry() {
      let ptr = 0;
      for (const e of edges) {
        const a = nodes[e.source].pos;
        const b = nodes[e.target].pos;
        edgePositions[ptr++] = a.x;
        edgePositions[ptr++] = a.y;
        edgePositions[ptr++] = a.z;
        edgePositions[ptr++] = b.x;
        edgePositions[ptr++] = b.y;
        edgePositions[ptr++] = b.z;
      }
      edgeGeometry.attributes.position.needsUpdate = true;
      edgeGeometry.computeBoundingSphere();
    }

    updateEdgeGeometry();

    // 保存边的 restLength
    const restLengths = edges.map(e => {
      const a = nodes[e.source].pos;
      const b = nodes[e.target].pos;
      const d = a.distanceTo(b);
      return Number.isFinite(d) ? Math.max(8, Math.min(28, d)) : 16;
    });

    // =========================
    // 力导向参数
    // =========================
    let isPaused = false;

    const params = {
      dt: 0.016,
      repulsion: 2400.0,
      springK: 1.25,
      centering: 0.12,
      damping: 0.92,
      maxSpeed: 18,
      softening: 4.0
    };

    // =========================
    // 射线交互
    // =========================
    const raycaster = new THREE.Raycaster();
    const mouseNdc = new THREE.Vector2(2, 2);
    let hoveredIndex = -1;

    renderer.domElement.addEventListener('mousemove', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouseNdc.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouseNdc.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    });

    renderer.domElement.addEventListener('mouseleave', () => {
      hoveredIndex = -1;
      hoverInfoEl.textContent = '无';
      applyHighlight(-1);
    });

    renderer.domElement.addEventListener('click', () => {
      if (hoveredIndex >= 0) {
        const n = nodes[hoveredIndex];
        n.pinned = !n.pinned;
        if (n.pinned) {
          n.vel.set(0, 0, 0);
        }
        updatePinnedCount();
      }
    });

    pauseBtn.addEventListener('click', () => {
      isPaused = !isPaused;
      pauseBtn.textContent = isPaused ? '继续' : '暂停';
    });

    function updatePinnedCount() {
      const pinnedCount = nodes.reduce((s, n) => s + (n.pinned ? 1 : 0), 0);
      pinnedCountEl.textContent = String(pinnedCount);
    }

    function detectHover() {
      raycaster.setFromCamera(mouseNdc, camera);
      const intersects = raycaster.intersectObjects(nodeGroup.children, false);
      const hit = intersects.length > 0 ? intersects[0].object.userData.nodeIndex : -1;
      if (hit !== hoveredIndex) {
        hoveredIndex = hit;
        if (hoveredIndex >= 0) {
          hoverInfoEl.textContent = nodes[hoveredIndex].name;
        } else {
          hoverInfoEl.textContent = '无';
        }
        applyHighlight(hoveredIndex);
      }
    }

    function applyHighlight(index) {
      const neighborSet = index >= 0 ? adjacency[index] : null;

      for (const node of nodes) {
        const mat = node.mesh.material;
        mat.color.copy(node.baseColor);
        mat.emissive.copy(node.baseEmissive);
        mat.transparent = false;
        mat.opacity = 1.0;

        if (node.pinned) {
          mat.emissive.setRGB(0.18, 0.18, 0.18);
        }

        node.mesh.scale.setScalar(node.radius);
      }

      edgeMaterial.color.set(0x7dd3fc);
      edgeMaterial.opacity = index >= 0 ? 0.22 : 0.45;

      if (index < 0) return;

      for (const node of nodes) {
        const isSelf = node.id === index;
        const isNeighbor = neighborSet.has(node.id);

        if (isSelf) {
          node.mesh.material.emissive.set(0xffffff);
          node.mesh.material.color.offsetHSL(0, 0, 0.18);
          node.mesh.scale.setScalar(node.radius * 1.25);
        } else if (isNeighbor) {
          node.mesh.material.emissive.set(0x88ffcc);
          node.mesh.scale.setScalar(node.radius * 1.12);
        } else {
          node.mesh.material.transparent = true;
          node.mesh.material.opacity = 0.45;
        }
      }
    }

    // =========================
    // 力导向仿真
    // =========================
    function safeClampVec3(v, maxAbs = 500) {
      v.x = Number.isFinite(v.x) ? Math.max(-maxAbs, Math.min(maxAbs, v.x)) : 0;
      v.y = Number.isFinite(v.y) ? Math.max(-maxAbs, Math.min(maxAbs, v.y)) : 0;
      v.z = Number.isFinite(v.z) ? Math.max(-maxAbs, Math.min(maxAbs, v.z)) : 0;
    }

    function integrate() {
      const n = nodes.length;
      const dt = params.dt;
      const repulsion = params.repulsion;
      const springK = params.springK;
      const centering = params.centering;
      const damping = params.damping;
      const soft = params.softening;
      const maxSpeed = params.maxSpeed;

      for (let i = 0; i < n; i++) {
        nodes[i].force.set(0, 0, 0);
      }

      // 全连接库仑斥力
      for (let i = 0; i < n; i++) {
        for (let j = i + 1; j < n; j++) {
          const ni = nodes[i];
          const nj = nodes[j];
          const d = new THREE.Vector3().subVectors(ni.pos, nj.pos);
          let distSq = d.lengthSq();
          if (!Number.isFinite(distSq)) distSq = soft * soft;
          distSq += soft * soft;
          const dist = Math.sqrt(distSq);
          const mag = repulsion / distSq;
          d.multiplyScalar(1 / Math.max(dist, 1e-6));

          const fx = d.x * mag;
          const fy = d.y * mag;
          const fz = d.z * mag;

          ni.force.x += fx;
          ni.force.y += fy;
          ni.force.z += fz;
          nj.force.x -= fx;
          nj.force.y -= fy;
          nj.force.z -= fz;
        }
      }

      // 边弹簧引力
      for (let ei = 0; ei < edges.length; ei++) {
        const e = edges[ei];
        const a = nodes[e.source];
        const b = nodes[e.target];
        const d = new THREE.Vector3().subVectors(b.pos, a.pos);
        let len = d.length();
        if (!Number.isFinite(len) || len < 1e-6) len = 1e-6;
        const rest = restLengths[ei];
        const ext = len - rest;
        const mag = springK * ext;
        d.multiplyScalar(1 / len);

        const fx = d.x * mag;
        const fy = d.y * mag;
        const fz = d.z * mag;

        a.force.x += fx;
        a.force.y += fy;
        a.force.z += fz;
        b.force.x -= fx;
        b.force.y -= fy;
        b.force.z -= fz;
      }

      // 向原点的弱引力
      for (const node of nodes) {
        node.force.addScaledVector(node.pos, -centering);
        safeClampVec3(node.force, 2000);
      }

      // 半隐式欧拉
      for (const node of nodes) {
        if (node.pinned) {
          node.vel.set(0, 0, 0);
          continue;
        }

        node.vel.addScaledVector(node.force, dt);
        node.vel.multiplyScalar(damping);

        const speed = node.vel.length();
        if (Number.isFinite(speed) && speed > maxSpeed) {
          node.vel.multiplyScalar(maxSpeed / speed);
        }

        safeClampVec3(node.vel, maxSpeed);
        node.pos.addScaledVector(node.vel, dt);
        safeClampVec3(node.pos, 300);

        if (!Number.isFinite(node.pos.x) || !Number.isFinite(node.pos.y) || !Number.isFinite(node.pos.z)) {
          node.pos.set(randSpread(20), randSpread(20), randSpread(20));
          node.vel.set(0, 0, 0);
        }
      }
    }

    function computeSimEnergy() {
      let kinetic = 0;
      let centerPotential = 0;
      for (const node of nodes) {
        kinetic += node.vel.lengthSq();
        centerPotential += 0.002 * node.pos.lengthSq();
      }

      let springPotential = 0;
      for (let i = 0; i < edges.length; i++) {
        const e = edges[i];
        const a = nodes[e.source].pos;
        const b = nodes[e.target].pos;
        const len = a.distanceTo(b);
        const diff = len - restLengths[i];
        springPotential += 0.02 * diff * diff;
      }

      const energy = kinetic + centerPotential + springPotential;
      return Number.isFinite(energy) ? energy : 0;
    }

    function syncVisuals() {
      for (const node of nodes) {
        node.mesh.position.copy(node.pos);
      }
      updateEdgeGeometry();
    }

    function updateHud(simEnergy) {
      nodeCountEl.textContent = String(nodes.length);
      edgeCountEl.textContent = String(edges.length);
      simEnergyEl.textContent = simEnergy.toFixed(2);
      pinnedCountEl.textContent = String(nodes.reduce((s, n) => s + (n.pinned ? 1 : 0), 0));
    }

    function updateExposedState(simEnergy) {
      window.__3D_STATE__ = {
        nodeCount: nodes.length,
        edgeCount: edges.length,
        nodes: nodes.map(n => ({
          x: Number.isFinite(n.pos.x) ? n.pos.x : 0,
          y: Number.isFinite(n.pos.y) ? n.pos.y : 0,
          z: Number.isFinite(n.pos.z) ? n.pos.z : 0,
          name: n.name,
          group: n.group,
          pinned: !!n.pinned,
          degree: n.degree
        })),
        simEnergy: Number.isFinite(simEnergy) ? simEnergy : 0,
        isPaused,
        pinnedCount: nodes.reduce((s, n) => s + (n.pinned ? 1 : 0), 0)
      };
    }

    // 初始 HUD
    nodeCountEl.textContent = String(nodes.length);
    edgeCountEl.textContent = String(edges.length);
    updatePinnedCount();

    // =========================
    // 动画循环
    // =========================
    function animate() {
      requestAnimationFrame(animate);

      detectHover();

      if (!isPaused) {
        integrate();
        syncVisuals();
      }

      const simEnergy = computeSimEnergy();
      updateHud(simEnergy);
      updateExposedState(simEnergy);

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // =========================
    // 自适应
    // =========================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
