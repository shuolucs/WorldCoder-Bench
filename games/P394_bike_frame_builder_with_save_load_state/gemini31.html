<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Bike Frame Builder</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        #sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            background: rgba(30, 30, 30, 0.9);
            color: white;
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            backdrop-filter: blur(5px);
        }
        h2 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            border-bottom: 1px solid #555;
            padding-bottom: 10px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        select, button {
            width: 100%;
            padding: 8px;
            background: #444;
            color: white;
            border: 1px solid #666;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        select:hover, button:hover {
            background: #555;
        }
        button:active {
            background: #666;
        }
        .weight-panel {
            margin-top: 10px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 6px;
            text-align: center;
        }
        .weight-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4CAF50;
        }
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        #wireframeBtn {
            grid-column: span 2;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="sidebar">
        <h2>Bike Frame Builder</h2>
        
        <div class="control-group">
            <label>Frame Size (cm) <span id="val-frameSize">54</span></label>
            <input type="range" id="frameSize" min="48" max="62" value="54" step="1">
        </div>
        
        <div class="control-group">
            <label>Seat Tube Angle (°) <span id="val-seatTubeAngle">73</span></label>
            <input type="range" id="seatTubeAngle" min="70" max="78" value="73" step="0.5">
        </div>
        
        <div class="control-group">
            <label>Head Tube Angle (°) <span id="val-headTubeAngle">72</span></label>
            <input type="range" id="headTubeAngle" min="68" max="76" value="72" step="0.5">
        </div>
        
        <div class="control-group">
            <label>Top Tube Length (cm) <span id="val-topTubeLength">55</span></label>
            <input type="range" id="topTubeLength" min="50" max="60" value="55" step="0.5">
        </div>
        
        <div class="control-group">
            <label>Chain Stay Length (cm) <span id="val-chainStayLength">42</span></label>
            <input type="range" id="chainStayLength" min="40" max="45" value="42" step="0.5">
        </div>

        <div class="control-group">
            <label>Material</label>
            <select id="materialSelect">
                <option value="aluminum">Aluminum</option>
                <option value="carbon">Carbon Fiber</option>
                <option value="steel">Steel</option>
                <option value="titanium">Titanium</option>
            </select>
        </div>

        <div class="weight-panel">
            <div>Estimated Weight</div>
            <div class="weight-value"><span id="weightDisplay">0.00</span> kg</div>
        </div>

        <div class="button-group">
            <button id="saveBtn">Save State</button>
            <button id="loadBtn">Load State</button>
            <button id="resetBtn">Reset</button>
            <button id="wireframeBtn">Toggle Wireframe</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            frameSize: 54,
            seatTubeAngle: 73,
            headTubeAngle: 72,
            topTubeLength: 55,
            chainStayLength: 42,
            material: 'aluminum',
            wireframe: false,
            tubeCount: 9,
            weight: 0,
            savedState: false,
            loadedState: false,
            referenceModelLoaded: false,
            tubeRadii: 0.05
        };

        const materialsData = {
            aluminum: { radius: 0.05, weightMult: 1.0 },
            carbon: { radius: 0.04, weightMult: 0.7 },
            steel: { radius: 0.06, weightMult: 1.3 },
            titanium: { radius: 0.045, weightMult: 0.9 }
        };

        const defaultState = JSON.parse(JSON.stringify(window.__3D_STATE__));

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 2, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Ground
        const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
        scene.add(gridHelper);

        // --- REFERENCE MODEL ---
        let ferrariModel = null;
        const loader = new GLTFLoader();
        loader.load(
            'ferrari.glb',
            (gltf) => {
                ferrariModel = gltf.scene;
                ferrariModel.scale.set(0.3, 0.3, 0.3);
                ferrariModel.position.set(8, 0, -6);
                scene.add(ferrariModel);
                window.__3D_STATE__.referenceModelLoaded = true;
            },
            undefined,
            (error) => {
                console.warn("Reference model 'ferrari.glb' could not be loaded. This is expected if the file is not present locally.", error);
            }
        );

        // --- BIKE FRAME SYSTEM ---
        const frameGroup = new THREE.Group();
        scene.add(frameGroup);

        function createTube(p1, p2, radius, colorHex) {
            const distance = p1.distanceTo(p2);
            const geometry = new THREE.CylinderGeometry(radius, radius, distance, 16);
            const material = new THREE.MeshStandardMaterial({
                color: colorHex,
                wireframe: window.__3D_STATE__.wireframe,
                roughness: 0.3,
                metalness: 0.7
            });
            const mesh = new THREE.Mesh(geometry, material);
            
            mesh.position.copy(p1).lerp(p2, 0.5);
            
            const direction = new THREE.Vector3().subVectors(p2, p1).normalize();
            const axis = new THREE.Vector3(0, 1, 0);
            mesh.quaternion.setFromUnitVectors(axis, direction);
            
            return mesh;
        }

        function buildFrame() {
            // Clear existing frame
            while(frameGroup.children.length > 0){ 
                const child = frameGroup.children[0];
                child.geometry.dispose();
                child.material.dispose();
                frameGroup.remove(child); 
            }

            const state = window.__3D_STATE__;
            const matData = materialsData[state.material];
            state.tubeRadii = matData.radius;
            const r = state.tubeRadii;

            // Convert parameters to Three.js units (cm / 10)
            const fs = state.frameSize / 10;
            const sta = state.seatTubeAngle * Math.PI / 180;
            const hta = state.headTubeAngle * Math.PI / 180;
            const ttl = state.topTubeLength / 10;
            const csl = state.chainStayLength / 10;

            // Define key points
            const BB = new THREE.Vector3(0, 3.0, 0); // Bottom Bracket
            
            // Seat Tube Top (goes up and back)
            const ST_top = new THREE.Vector3(
                BB.x - fs * Math.cos(sta),
                BB.y + fs * Math.sin(sta),
                0
            );

            // Head Tube Top (horizontal from ST_top)
            const HT_top = new THREE.Vector3(
                ST_top.x + ttl,
                ST_top.y,
                0
            );

            // Head Tube Bottom (goes down and forward)
            const htLength = 1.5;
            const HT_bottom = new THREE.Vector3(
                HT_top.x + htLength * Math.cos(hta),
                HT_top.y - htLength * Math.sin(hta),
                0
            );

            // Rear Axle (horizontal from BB, offset for hub width)
            const hubWidthHalf = 0.65;
            const RearAxle_L = new THREE.Vector3(BB.x - csl, BB.y, -hubWidthHalf);
            const RearAxle_R = new THREE.Vector3(BB.x - csl, BB.y, hubWidthHalf);

            // Front Axle (Fork extending from head tube)
            const forkLength = 3.8;
            const FrontAxle = new THREE.Vector3(
                HT_bottom.x + forkLength * Math.cos(hta),
                HT_bottom.y - forkLength * Math.sin(hta),
                0
            );

            // Create Tubes
            // 1. Top Tube (red)
            frameGroup.add(createTube(ST_top, HT_top, r, 0xcc0000));
            // 2. Down Tube (blue)
            frameGroup.add(createTube(BB, HT_bottom, r, 0x0000cc));
            // 3. Seat Tube (green)
            frameGroup.add(createTube(BB, ST_top, r, 0x00cc00));
            // 4 & 5. Chain Stays (orange)
            frameGroup.add(createTube(BB, RearAxle_L, r, 0xcc6600));
            frameGroup.add(createTube(BB, RearAxle_R, r, 0xcc6600));
            // 6 & 7. Seat Stays (purple)
            frameGroup.add(createTube(ST_top, RearAxle_L, r, 0x6600cc));
            frameGroup.add(createTube(ST_top, RearAxle_R, r, 0x6600cc));
            // 8. Head Tube (yellow)
            frameGroup.add(createTube(HT_top, HT_bottom, r * 1.2, 0xcccc00)); // Slightly thicker
            // 9. Fork (cyan)
            frameGroup.add(createTube(HT_bottom, FrontAxle, r, 0x00cccc));

            // Update Weight
            const rawWeight = (state.frameSize * 0.05) + (state.topTubeLength * 0.03) + (state.chainStayLength * 0.02);
            state.weight = rawWeight * matData.weightMult;
            document.getElementById('weightDisplay').innerText = state.weight.toFixed(2);
        }

        // --- UI & INTERACTION ---
        const inputs = ['frameSize', 'seatTubeAngle', 'headTubeAngle', 'topTubeLength', 'chainStayLength'];
        
        function updateUIFromState() {
            inputs.forEach(id => {
                document.getElementById(id).value = window.__3D_STATE__[id];
                document.getElementById(`val-${id}`).innerText = window.__3D_STATE__[id];
            });
            document.getElementById('materialSelect').value = window.__3D_STATE__.material;
        }

        function handleInputChange(e) {
            const id = e.target.id;
            const val = parseFloat(e.target.value);
            window.__3D_STATE__[id] = val;
            document.getElementById(`val-${id}`).innerText = val;
            buildFrame();
        }

        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', handleInputChange);
        });

        document.getElementById('materialSelect').addEventListener('change', (e) => {
            window.__3D_STATE__.material = e.target.value;
            buildFrame();
        });

        document.getElementById('wireframeBtn').addEventListener('click', () => {
            window.__3D_STATE__.wireframe = !window.__3D_STATE__.wireframe;
            frameGroup.children.forEach(mesh => {
                mesh.material.wireframe = window.__3D_STATE__.wireframe;
            });
        });

        document.getElementById('saveBtn').addEventListener('click', () => {
            localStorage.setItem('bikeFrameState', JSON.stringify(window.__3D_STATE__));
            window.__3D_STATE__.savedState = true;
            alert('State saved successfully!');
        });

        document.getElementById('loadBtn').addEventListener('click', () => {
            const saved = localStorage.getItem('bikeFrameState');
            if (saved) {
                const parsed = JSON.parse(saved);
                Object.assign(window.__3D_STATE__, parsed);
                window.__3D_STATE__.loadedState = true;
                updateUIFromState();
                buildFrame();
            } else {
                alert('No saved state found.');
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            Object.assign(window.__3D_STATE__, JSON.parse(JSON.stringify(defaultState)));
            updateUIFromState();
            buildFrame();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize
        updateUIFromState();
        buildFrame();

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            controls.update();
            
            if (ferrariModel) {
                ferrariModel.rotation.y += 0.005;
            }
            
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
