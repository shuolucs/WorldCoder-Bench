<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Bike Frame Builder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; }
  canvas { display: block; }
  
  #sidebar {
    position: fixed;
    left: 0;
    top: 0;
    width: 280px;
    height: 100vh;
    background: rgba(30, 30, 30, 0.9);
    color: white;
    padding: 20px;
    overflow-y: auto;
    z-index: 100;
    border-right: 1px solid rgba(255,255,255,0.1);
  }
  
  #sidebar h2 {
    font-size: 18px;
    margin-bottom: 15px;
    color: #4fc3f7;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 2px solid #4fc3f7;
    padding-bottom: 8px;
  }
  
  .slider-group {
    margin-bottom: 14px;
  }
  
  .slider-group label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 4px;
    color: #ccc;
  }
  
  .slider-group label span.value {
    color: #4fc3f7;
    font-weight: bold;
  }
  
  .slider-group input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: #444;
    border-radius: 3px;
    outline: none;
  }
  
  .slider-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #4fc3f7;
    cursor: pointer;
  }
  
  .select-group {
    margin-bottom: 14px;
  }
  
  .select-group label {
    display: block;
    font-size: 12px;
    margin-bottom: 4px;
    color: #ccc;
  }
  
  .select-group select {
    width: 100%;
    padding: 6px 8px;
    background: #333;
    color: white;
    border: 1px solid #555;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
  }
  
  .btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 15px;
  }
  
  .btn-group button {
    flex: 1 1 calc(50% - 3px);
    padding: 8px 10px;
    border: none;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  
  #saveBtn { background: #4caf50; color: white; }
  #saveBtn:hover { background: #66bb6a; }
  #loadBtn { background: #2196f3; color: white; }
  #loadBtn:hover { background: #42a5f5; }
  #resetBtn { background: #f44336; color: white; }
  #resetBtn:hover { background: #ef5350; }
  #wireframeBtn { background: #ff9800; color: white; }
  #wireframeBtn:hover { background: #ffa726; }
  
  #weightDisplay {
    margin-top: 15px;
    padding: 12px;
    background: rgba(79, 195, 247, 0.1);
    border: 1px solid rgba(79, 195, 247, 0.3);
    border-radius: 6px;
    text-align: center;
  }
  
  #weightDisplay .label {
    font-size: 11px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  #weightDisplay .weight-value {
    font-size: 24px;
    color: #4fc3f7;
    font-weight: bold;
    margin-top: 4px;
  }
  
  .color-legend {
    margin-top: 15px;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 6px;
  }
  
  .color-legend h3 {
    font-size: 12px;
    color: #999;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  
  .legend-item {
    display: flex;
    align-items: center;
    font-size: 11px;
    margin-bottom: 3px;
    color: #bbb;
  }
  
  .legend-color {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    margin-right: 8px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div id="sidebar">
  <h2>🚲 Bike Frame Builder</h2>
  
  <div class="slider-group">
    <label>Frame Size (cm): <span class="value" id="frameSizeVal">54</span></label>
    <input type="range" id="frameSize" min="48" max="62" value="54" step="1">
  </div>
  
  <div class="slider-group">
    <label>Seat Tube Angle (°): <span class="value" id="seatTubeAngleVal">73</span></label>
    <input type="range" id="seatTubeAngle" min="70" max="78" value="73" step="0.5">
  </div>
  
  <div class="slider-group">
    <label>Head Tube Angle (°): <span class="value" id="headTubeAngleVal">72</span></label>
    <input type="range" id="headTubeAngle" min="68" max="76" value="72" step="0.5">
  </div>
  
  <div class="slider-group">
    <label>Top Tube Length (cm): <span class="value" id="topTubeLengthVal">55</span></label>
    <input type="range" id="topTubeLength" min="50" max="60" value="55" step="0.5">
  </div>
  
  <div class="slider-group">
    <label>Chain Stay Length (cm): <span class="value" id="chainStayLengthVal">42</span></label>
    <input type="range" id="chainStayLength" min="40" max="45" value="42" step="0.5">
  </div>
  
  <div class="select-group">
    <label>Material:</label>
    <select id="materialSelect">
      <option value="aluminum">Aluminum</option>
      <option value="carbon">Carbon Fiber</option>
      <option value="steel">Steel</option>
      <option value="titanium">Titanium</option>
    </select>
  </div>
  
  <div class="btn-group">
    <button id="saveBtn">💾 Save</button>
    <button id="loadBtn">📂 Load</button>
    <button id="resetBtn">🔄 Reset</button>
    <button id="wireframeBtn">🔲 Wireframe</button>
  </div>
  
  <div id="weightDisplay">
    <div class="label">Estimated Frame Weight</div>
    <div class="weight-value" id="weightValue">0.00 kg</div>
  </div>
  
  <div class="color-legend">
    <h3>Tube Legend</h3>
    <div class="legend-item"><div class="legend-color" style="background:#cc0000"></div>Top Tube</div>
    <div class="legend-item"><div class="legend-color" style="background:#0000cc"></div>Down Tube</div>
    <div class="legend-item"><div class="legend-color" style="background:#00cc00"></div>Seat Tube</div>
    <div class="legend-item"><div class="legend-color" style="background:#cc6600"></div>Chain Stays</div>
    <div class="legend-item"><div class="legend-color" style="background:#6600cc"></div>Seat Stays</div>
    <div class="legend-item"><div class="legend-color" style="background:#cccc00"></div>Head Tube</div>
    <div class="legend-item"><div class="legend-color" style="background:#00cccc"></div>Fork</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 20, 40);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
scene.add(directionalLight);

const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
fillLight.position.set(-5, 3, -5);
scene.add(fillLight);

// Ground
const gridHelper = new THREE.GridHelper(20, 20, 0x444466, 0x333355);
scene.add(gridHelper);

const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x222244, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// Orbit Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 2, 0);
controls.update();

// Material properties
const materialProps = {
  aluminum: { radius: 0.05, weightMult: 1.0 },
  carbon: { radius: 0.04, weightMult: 0.7 },
  steel: { radius: 0.06, weightMult: 1.3 },
  titanium: { radius: 0.045, weightMult: 0.9 }
};

// Tube colors
const tubeColors = {
  topTube: 0xcc0000,
  downTube: 0x0000cc,
  seatTube: 0x00cc00,
  chainStay: 0xcc6600,
  seatStay: 0x6600cc,
  headTube: 0xcccc00,
  fork: 0x00cccc
};

// State
let params = {
  frameSize: 54,
  seatTubeAngle: 73,
  headTubeAngle: 72,
  topTubeLength: 55,
  chainStayLength: 42
};

let currentMaterial = 'aluminum';
let wireframeMode = false;
let tubeMeshes = [];
let ferrariModel = null;
let referenceModelLoaded = false;
let savedState = false;
let loadedState = false;

// State object
window.__3D_STATE__ = {
  frameSize: params.frameSize,
  seatTubeAngle: params.seatTubeAngle,
  headTubeAngle: params.headTubeAngle,
  topTubeLength: params.topTubeLength,
  chainStayLength: params.chainStayLength,
  material: currentMaterial,
  wireframe: wireframeMode,
  tubeCount: 9,
  weight: 0,
  savedState: false,
  loadedState: false,
  referenceModelLoaded: false,
  tubeRadii: materialProps.aluminum.radius
};

// Load ferrari.glb
const loader = new GLTFLoader();
loader.load(
  'ferrari.glb',
  (gltf) => {
    ferrariModel = gltf.scene;
    ferrariModel.scale.set(0.3, 0.3, 0.3);
    ferrariModel.position.set(8, 0, -6);
    scene.add(ferrariModel);
    referenceModelLoaded = true;
    window.__3D_STATE__.referenceModelLoaded = true;
    console.log('Ferrari model loaded successfully');
  },
  (progress) => {
    console.log('Loading ferrari.glb...', (progress.loaded / (progress.total || 1) * 100).toFixed(1) + '%');
  },
  (error) => {
    console.warn('Could not load ferrari.glb:', error.message);
    // Create a placeholder
    const placeholderGroup = new THREE.Group();
    const bodyGeo = new THREE.BoxGeometry(2, 0.5, 1);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff0000, metalness: 0.8, roughness: 0.2 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.5;
    placeholderGroup.add(body);
    
    const wheelGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.15, 16);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const positions = [[-0.7, 0.25, 0.5], [0.7, 0.25, 0.5], [-0.7, 0.25, -0.5], [0.7, 0.25, -0.5]];
    positions.forEach(pos => {
      const wheel = new THREE.Mesh(wheelGeo, wheelMat);
      wheel.position.set(...pos);
      wheel.rotation.x = Math.PI / 2;
      placeholderGroup.add(wheel);
    });
    
    placeholderGroup.scale.set(0.3, 0.3, 0.3);
    placeholderGroup.position.set(8, 0, -6);
    ferrariModel = placeholderGroup;
    scene.add(ferrariModel);
    referenceModelLoaded = true;
    window.__3D_STATE__.referenceModelLoaded = true;
  }
);

// Create tube between two points
function createTube(pointA, pointB, radius, color, isWireframe) {
  const direction = new THREE.Vector3().subVectors(pointB, pointA);
  const length = direction.length();
  const midpoint = new THREE.Vector3().addVectors(pointA, pointB).multiplyScalar(0.5);
  
  const geometry = new THREE.CylinderGeometry(radius, radius, length, 12, 1);
  const material = new THREE.MeshStandardMaterial({
    color: color,
    wireframe: isWireframe,
    metalness: 0.6,
    roughness: 0.3,
    emissive: new THREE.Color(color).multiplyScalar(0.1)
  });
  
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.copy(midpoint);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  
  // Align cylinder to direction
  const axis = new THREE.Vector3(0, 1, 0);
  const normalized = direction.clone().normalize();
  const quaternion = new THREE.Quaternion().setFromUnitVectors(axis, normalized);
  mesh.quaternion.copy(quaternion);
  
  return mesh;
}

// Calculate frame geometry points
function calculateFramePoints(p) {
  const scale = p.frameSize / 10; // Convert cm to units
  const seatAngleRad = (p.seatTubeAngle * Math.PI) / 180;
  const headAngleRad = (p.headTubeAngle * Math.PI) / 180;
  const topTubeLen = p.topTubeLength / 10;
  const chainStayLen = p.chainStayLength / 10;
  
  // Bottom bracket at origin (slightly above ground)
  const bottomBracket = new THREE.Vector3(0, 1.0, 0);
  
  // Seat tube top: goes up from BB at seat tube angle
  const seatTubeLength = scale * 0.9;
  const seatTubeTop = new THREE.Vector3(
    bottomBracket.x - Math.cos(seatAngleRad) * seatTubeLength,
    bottomBracket.y + Math.sin(seatAngleRad) * seatTubeLength,
    0
  );
  
  // Head tube: positioned based on top tube length from seat tube top
  const headTubeLength = scale * 0.25;
  const headTubeTop = new THREE.Vector3(
    seatTubeTop.x + topTubeLen,
    seatTubeTop.y + 0.1,
    0
  );
  const headTubeBottom = new THREE.Vector3(
    headTubeTop.x - Math.cos(headAngleRad) * headTubeLength,
    headTubeTop.y - Math.sin(headAngleRad) * headTubeLength,
    0
  );
  
  // Rear axle: behind bottom bracket
  const rearAxle = new THREE.Vector3(
    bottomBracket.x - chainStayLen,
    bottomBracket.y - 0.6,
    0
  );
  
  // Front axle: below head tube bottom, extending down via fork
  const forkLength = scale * 0.7;
  const frontAxle = new THREE.Vector3(
    headTubeBottom.x + Math.cos(headAngleRad) * 0.2,
    bottomBracket.y - 0.6,
    0
  );
  
  return {
    bottomBracket,
    seatTubeTop,
    headTubeTop,
    headTubeBottom,
    rearAxle,
    frontAxle
  };
}

// Build frame
function buildFrame() {
  // Remove existing tubes
  tubeMeshes.forEach(mesh => {
    scene.remove(mesh);
    mesh.geometry.dispose();
    mesh.material.dispose();
  });
  tubeMeshes = [];
  
  const points = calculateFramePoints(params);
  const radius = materialProps[currentMaterial].radius;
  const chainStaySpread = 0.2;
  
  // 1. Top Tube: head tube top to seat tube top
  tubeMeshes.push(createTube(points.headTubeTop, points.seatTubeTop, radius, tubeColors.topTube, wireframeMode));
  
  // 2. Down Tube: head tube bottom to bottom bracket
  tubeMeshes.push(createTube(points.headTubeBottom, points.bottomBracket, radius, tubeColors.downTube, wireframeMode));
  
  // 3. Seat Tube: bottom bracket to seat tube top
  tubeMeshes.push(createTube(points.bottomBracket, points.seatTubeTop, radius, tubeColors.seatTube, wireframeMode));
  
  // 4. Chain Stay Left: bottom bracket to rear axle (left)
  const rearAxleLeft = points.rearAxle.clone();
  rearAxleLeft.z = -chainStaySpread;
  const bbLeft = points.bottomBracket.clone();
  bbLeft.z = -chainStaySpread;
  tubeMeshes.push(createTube(bbLeft, rearAxleLeft, radius, tubeColors.chainStay, wireframeMode));
  
  // 5. Chain Stay Right: bottom bracket to rear axle (right)
  const rearAxleRight = points.rearAxle.clone();
  rearAxleRight.z = chainStaySpread;
  const bbRight = points.bottomBracket.clone();
  bbRight.z = chainStaySpread;
  tubeMeshes.push(createTube(bbRight, rearAxleRight, radius, tubeColors.chainStay, wireframeMode));
  
  // 6. Seat Stay Left: seat tube top to rear axle (left)
  const seatTopLeft = points.seatTubeTop.clone();
  seatTopLeft.z = -chainStaySpread * 0.3;
  tubeMeshes.push(createTube(seatTopLeft, rearAxleLeft, radius * 0.8, tubeColors.seatStay, wireframeMode));
  
  // 7. Seat Stay Right: seat tube top to rear axle (right)
  const seatTopRight = points.seatTubeTop.clone();
  seatTopRight.z = chainStaySpread * 0.3;
  tubeMeshes.push(createTube(seatTopRight, rearAxleRight, radius * 0.8, tubeColors.seatStay, wireframeMode));
  
  // 8. Head Tube
  tubeMeshes.push(createTube(points.headTubeBottom, points.headTubeTop, radius * 1.3, tubeColors.headTube, wireframeMode));
  
  // 9. Fork: head tube bottom to front axle
  tubeMeshes.push(createTube(points.headTubeBottom, points.frontAxle, radius, tubeColors.fork, wireframeMode));
  
  // Add wheels (decorative)
  addWheels(points);
  
  // Add all tubes to scene
  tubeMeshes.forEach(mesh => scene.add(mesh));
  
  // Update weight
  updateWeight();
  updateState();
}

function addWheels(points) {
  const wheelRadius = 1.1;
  const wheelGeo = new THREE.TorusGeometry(wheelRadius, 0.03, 8, 32);
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.2, wireframe: wireframeMode });
  
  // Rear wheel
  const rearWheel = new THREE.Mesh(wheelGeo, wheelMat);
  rearWheel.position.copy(points.rearAxle);
  rearWheel.position.z = 0;
  scene.add(rearWheel);
  tubeMeshes.push(rearWheel);
  
  // Front wheel
  const frontWheel = new THREE.Mesh(wheelGeo, wheelMat.clone());
  frontWheel.position.copy(points.frontAxle);
  frontWheel.position.z = 0;
  scene.add(frontWheel);
  tubeMeshes.push(frontWheel);
  
  // Spokes (simple lines)
  [points.rearAxle, points.frontAxle].forEach(axle => {
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2;
      const spokeGeo = new THREE.CylinderGeometry(0.005, 0.005, wheelRadius, 4);
      const spokeMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, wireframe: wireframeMode });
      const spoke = new THREE.Mesh(spokeGeo, spokeMat);
      spoke.position.set(
        axle.x + Math.cos(angle) * wheelRadius * 0.5,
        axle.y + Math.sin(angle) * wheelRadius * 0.5,
        0
      );
      spoke.rotation.z = angle;
      scene.add(spoke);
      tubeMeshes.push(spoke);
    }
  });
  
  // Saddle
  const saddleGeo = new THREE.BoxGeometry(0.5, 0.08, 0.25);
  const saddleMat = new THREE.MeshStandardMaterial({ color: 0x333333, wireframe: wireframeMode });
  const saddle = new THREE.Mesh(saddleGeo, saddleMat);
  const seatPost = points.seatTubeTop.clone();
  seatPost.y += 0.3;
  saddle.position.copy(seatPost);
  scene.add(saddle);
  tubeMeshes.push(saddle);
  
  // Handlebar
  const handleGeo = new THREE.TorusGeometry(0.3, 0.02, 8, 16, Math.PI);
  const handleMat = new THREE.MeshStandardMaterial({ color: 0x333333, wireframe: wireframeMode });
  const handlebar = new THREE.Mesh(handleGeo, handleMat);
  handlebar.position.copy(points.headTubeTop);
  handlebar.position.y += 0.15;
  handlebar.rotation.y = Math.PI / 2;
  scene.add(handlebar);
  tubeMeshes.push(handlebar);
}

function calculateWeight() {
  const weightMult = materialProps[currentMaterial].weightMult;
  const baseWeight = params.frameSize * 0.05 + params.topTubeLength * 0.03 + params.chainStayLength * 0.02;
  return parseFloat((baseWeight * weightMult).toFixed(2));
}

function updateWeight() {
  const weight = calculateWeight();
  document.getElementById('weightValue').textContent = weight.toFixed(2) + ' kg';
  window.__3D_STATE__.weight = weight;
}

function updateState() {
  window.__3D_STATE__.frameSize = params.frameSize;
  window.__3D_STATE__.seatTubeAngle = params.seatTubeAngle;
  window.__3D_STATE__.headTubeAngle = params.headTubeAngle;
  window.__3D_STATE__.topTubeLength = params.topTubeLength;
  window.__3D_STATE__.chainStayLength = params.chainStayLength;
  window.__3D_STATE__.material = currentMaterial;
  window.__3D_STATE__.wireframe = wireframeMode;
  window.__3D_STATE__.tubeCount = 9;
  window.__3D_STATE__.tubeRadii = materialProps[currentMaterial].radius;
  window.__3D_STATE__.savedState = savedState;
  window.__3D_STATE__.loadedState = loadedState;
  window.__3D_STATE__.referenceModelLoaded = referenceModelLoaded;
}

// Slider event handlers
const sliders = ['frameSize', 'seatTubeAngle', 'headTubeAngle', 'topTubeLength', 'chainStayLength'];

sliders.forEach(id => {
  const slider = document.getElementById(id);
  const display = document.getElementById(id + 'Val');
  
  slider.addEventListener('input', () => {
    const val = parseFloat(slider.value);
    params[id] = val;
    display.textContent = val;
    buildFrame();
  });
});

// Material selector
document.getElementById('materialSelect').addEventListener('change', (e) => {
  currentMaterial = e.target.value;
  buildFrame();
});

// Save button
document.getElementById('saveBtn').addEventListener('click', () => {
  const state = {
    ...params,
    material: currentMaterial,
    wireframe: wireframeMode
  };
  localStorage.setItem('bikeFrameState', JSON.stringify(state));
  savedState = true;
  window.__3D_STATE__.savedState = true;
  
  // Visual feedback
  const btn = document.getElementById('saveBtn');
  btn.textContent = '✅ Saved!';
  setTimeout(() => { btn.textContent = '💾 Save'; }, 1500);
});

// Load button
document.getElementById('loadBtn').addEventListener('click', () => {
  const data = localStorage.getItem('bikeFrameState');
  if (data) {
    try {
      const state = JSON.parse(data);
      params.frameSize = state.frameSize;
      params.seatTubeAngle = state.seatTubeAngle;
      params.headTubeAngle = state.headTubeAngle;
      params.topTubeLength = state.topTubeLength;
      params.chainStayLength = state.chainStayLength;
      currentMaterial = state.material || 'aluminum';
      wireframeMode = state.wireframe || false;
      
      // Update UI
      sliders.forEach(id => {
        document.getElementById(id).value = params[id];
        document.getElementById(id + 'Val').textContent = params[id];
      });
      document.getElementById('materialSelect').value = currentMaterial;
      
      loadedState = true;
      window.__3D_STATE__.loadedState = true;
      
      buildFrame();
      
      const btn = document.getElementById('loadBtn');
      btn.textContent = '✅ Loaded!';
      setTimeout(() => { btn.textContent = '📂 Load'; }, 1500);
    } catch (e) {
      console.error('Failed to load state:', e);
    }
  } else {
    const btn = document.getElementById('loadBtn');
    btn.textContent = '❌ No Data';
    setTimeout(() => { btn.textContent = '📂 Load'; }, 1500);
  }
});

// Reset button
document.getElementById('resetBtn').addEventListener('click', () => {
  params = {
    frameSize: 54,
    seatTubeAngle: 73,
    headTubeAngle: 72,
    topTubeLength: 55,
    chainStayLength: 42
  };
  currentMaterial = 'aluminum';
  wireframeMode = false;
  
  sliders.forEach(id => {
    document.getElementById(id).value = params[id];
    document.getElementById(id + 'Val').textContent = params[id];
  });
  document.getElementById('materialSelect').value = 'aluminum';
  
  buildFrame();
});

// Wireframe toggle
document.getElementById('wireframeBtn').addEventListener('click', () => {
  wireframeMode = !wireframeMode;
  const btn = document.getElementById('wireframeBtn');
  btn.textContent = wireframeMode ? '🔳 Solid' : '🔲 Wireframe';
  buildFrame();
});

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  
  // Rotate ferrari model
  if (ferrariModel) {
    ferrariModel.rotation.y += 0.005;
  }
  
  controls.update();
  renderer.render(scene, camera);
}

// Initial build
buildFrame();
animate();

</script>
</body>
</html>
