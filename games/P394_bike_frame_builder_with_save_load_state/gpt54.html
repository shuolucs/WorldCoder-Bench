<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Bike Frame Builder</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #sidebar {
      position: absolute;
      left: 0;
      top: 0;
      width: 280px;
      height: 100vh;
      box-sizing: border-box;
      padding: 16px;
      background: rgba(30, 30, 30, 0.9);
      color: white;
      overflow-y: auto;
      z-index: 10;
    }

    #sidebar h2 {
      margin-top: 0;
      font-size: 20px;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .value {
      color: #7fdcff;
      font-weight: bold;
      margin-left: 6px;
    }

    input[type="range"] {
      width: 100%;
    }

    select, button {
      width: 100%;
      margin-top: 6px;
      padding: 10px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }

    select {
      background: #eee;
      color: #111;
    }

    button {
      background: #444;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #666;
    }

    #weightDisplay {
      margin-top: 10px;
      padding: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      font-size: 15px;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <h2>Bike Frame Builder</h2>

      <div class="control-group">
        <label for="frameSize">Frame Size: <span id="frameSizeValue" class="value">54</span> cm</label>
        <input type="range" id="frameSize" min="48" max="62" step="1" value="54">
      </div>

      <div class="control-group">
        <label for="seatTubeAngle">Seat Tube Angle: <span id="seatTubeAngleValue" class="value">73</span>°</label>
        <input type="range" id="seatTubeAngle" min="70" max="78" step="1" value="73">
      </div>

      <div class="control-group">
        <label for="headTubeAngle">Head Tube Angle: <span id="headTubeAngleValue" class="value">72</span>°</label>
        <input type="range" id="headTubeAngle" min="68" max="76" step="1" value="72">
      </div>

      <div class="control-group">
        <label for="topTubeLength">Top Tube Length: <span id="topTubeLengthValue" class="value">55</span> cm</label>
        <input type="range" id="topTubeLength" min="50" max="60" step="1" value="55">
      </div>

      <div class="control-group">
        <label for="chainStayLength">Chain Stay Length: <span id="chainStayLengthValue" class="value">42</span> cm</label>
        <input type="range" id="chainStayLength" min="40" max="45" step="1" value="42">
      </div>

      <div class="control-group">
        <label for="materialSelect">Material</label>
        <select id="materialSelect">
          <option value="aluminum" selected>aluminum</option>
          <option value="carbon">carbon</option>
          <option value="steel">steel</option>
          <option value="titanium">titanium</option>
        </select>
      </div>

      <button id="saveBtn">Save State</button>
      <button id="loadBtn">Load State</button>
      <button id="resetBtn">Reset</button>
      <button id="wireframeBtn">Toggle Wireframe</button>

      <div id="weightDisplay">Estimated Weight: 0.00 kg</div>
    </div>

    <div id="canvas-container"></div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const defaults = {
      frameSize: 54,
      seatTubeAngle: 73,
      headTubeAngle: 72,
      topTubeLength: 55,
      chainStayLength: 42,
      material: 'aluminum'
    };

    const materialSettings = {
      aluminum: { radius: 0.05, weightMultiplier: 1.0 },
      carbon: { radius: 0.04, weightMultiplier: 0.7 },
      steel: { radius: 0.06, weightMultiplier: 1.3 },
      titanium: { radius: 0.045, weightMultiplier: 0.9 }
    };

    const state = {
      frameSize: defaults.frameSize,
      seatTubeAngle: defaults.seatTubeAngle,
      headTubeAngle: defaults.headTubeAngle,
      topTubeLength: defaults.topTubeLength,
      chainStayLength: defaults.chainStayLength,
      material: defaults.material,
      wireframe: false,
      tubeCount: 9,
      weight: 0.00,
      savedState: false,
      loadedState: false,
      referenceModelLoaded: false,
      tubeRadii: materialSettings[defaults.material].radius
    };

    window.__3D_STATE__ = state;

    const container = document.getElementById('canvas-container');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.5, 0);
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const gridHelper = new THREE.GridHelper(20, 20);
    scene.add(gridHelper);

    const frameGroup = new THREE.Group();
    scene.add(frameGroup);

    let referenceModel = null;

    const loader = new GLTFLoader();
    loader.load(
      'ferrari.glb',
      (gltf) => {
        referenceModel = gltf.scene;
        referenceModel.scale.setScalar(0.3);
        referenceModel.position.set(8, 0, -6);
        scene.add(referenceModel);
        state.referenceModelLoaded = true;
      },
      undefined,
      (error) => {
        console.warn('Failed to load ferrari.glb:', error);
      }
    );

    function degToRad(deg) {
      return deg * Math.PI / 180;
    }

    function clearFrame() {
      while (frameGroup.children.length > 0) {
        const child = frameGroup.children[0];
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
        frameGroup.remove(child);
      }
    }

    function makeTube(start, end, color, radius, wireframe = false) {
      const dir = new THREE.Vector3().subVectors(end, start);
      const length = dir.length();

      const geometry = new THREE.CylinderGeometry(radius, radius, length, 16);
      const material = new THREE.MeshStandardMaterial({
        color,
        wireframe
      });

      const mesh = new THREE.Mesh(geometry, material);

      const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      mesh.position.copy(midpoint);

      const up = new THREE.Vector3(0, 1, 0);
      mesh.quaternion.setFromUnitVectors(up, dir.clone().normalize());

      frameGroup.add(mesh);
      return mesh;
    }

    function calculateWeight() {
      const baseWeight =
        state.frameSize * 0.05 +
        state.topTubeLength * 0.03 +
        state.chainStayLength * 0.02;

      const multiplier = materialSettings[state.material].weightMultiplier;
      return +(baseWeight * multiplier).toFixed(2);
    }

    function updateWeightDisplay() {
      state.weight = calculateWeight();
      document.getElementById('weightDisplay').textContent =
        `Estimated Weight: ${state.weight.toFixed(2)} kg`;
    }

    function updateState() {
      state.frameSize = +document.getElementById('frameSize').value;
      state.seatTubeAngle = +document.getElementById('seatTubeAngle').value;
      state.headTubeAngle = +document.getElementById('headTubeAngle').value;
      state.topTubeLength = +document.getElementById('topTubeLength').value;
      state.chainStayLength = +document.getElementById('chainStayLength').value;
      state.material = document.getElementById('materialSelect').value;
      state.tubeRadii = materialSettings[state.material].radius;
      state.tubeCount = 9;
      updateWeightDisplay();
    }

    function updateLabels() {
      document.getElementById('frameSizeValue').textContent = document.getElementById('frameSize').value;
      document.getElementById('seatTubeAngleValue').textContent = document.getElementById('seatTubeAngle').value;
      document.getElementById('headTubeAngleValue').textContent = document.getElementById('headTubeAngle').value;
      document.getElementById('topTubeLengthValue').textContent = document.getElementById('topTubeLength').value;
      document.getElementById('chainStayLengthValue').textContent = document.getElementById('chainStayLength').value;
    }

    function buildFrame() {
      clearFrame();
      updateState();

      const radius = materialSettings[state.material].radius;

      const frameSize = state.frameSize / 10;
      const topTubeLength = state.topTubeLength / 10;
      const chainStayLength = state.chainStayLength / 10;
      const seatTubeAngle = degToRad(state.seatTubeAngle);
      const headTubeAngle = degToRad(state.headTubeAngle);

      const bb = new THREE.Vector3(0, frameSize * 0.55, 0);

      const seatTubeTop = new THREE.Vector3(
        -Math.cos(seatTubeAngle) * frameSize,
        bb.y + Math.sin(seatTubeAngle) * frameSize,
        0
      );

      const headTubeTop = new THREE.Vector3(
        seatTubeTop.x + topTubeLength,
        seatTubeTop.y - 0.15,
        0
      );

      const headTubeLength = 1.4;
      const headTubeBottom = new THREE.Vector3(
        headTubeTop.x - Math.cos(headTubeAngle) * headTubeLength,
        headTubeTop.y - Math.sin(headTubeAngle) * headTubeLength,
        0
      );

      const rearAxle = new THREE.Vector3(
        bb.x - chainStayLength,
        bb.y - 0.45,
        0
      );

      const frontAxle = new THREE.Vector3(
        headTubeBottom.x + Math.cos(headTubeAngle) * 0.9,
        headTubeBottom.y - 2.0,
        0
      );

      const rearOffset = 0.12;
      const seatStayTop = seatTubeTop.clone();

      makeTube(headTubeTop, seatTubeTop, '#cc0000', radius, state.wireframe); // Top Tube
      makeTube(headTubeBottom, bb, '#0000cc', radius, state.wireframe); // Down Tube
      makeTube(bb, seatTubeTop, '#00cc00', radius, state.wireframe); // Seat Tube

      makeTube(
        new THREE.Vector3(bb.x, bb.y, rearOffset),
        new THREE.Vector3(rearAxle.x, rearAxle.y, rearOffset),
        '#cc6600',
        radius,
        state.wireframe
      ); // Chain Stay 1
      makeTube(
        new THREE.Vector3(bb.x, bb.y, -rearOffset),
        new THREE.Vector3(rearAxle.x, rearAxle.y, -rearOffset),
        '#cc6600',
        radius,
        state.wireframe
      ); // Chain Stay 2

      makeTube(
        new THREE.Vector3(seatStayTop.x, seatStayTop.y, rearOffset),
        new THREE.Vector3(rearAxle.x, rearAxle.y, rearOffset),
        '#6600cc',
        radius,
        state.wireframe
      ); // Seat Stay 1
      makeTube(
        new THREE.Vector3(seatStayTop.x, seatStayTop.y, -rearOffset),
        new THREE.Vector3(rearAxle.x, rearAxle.y, -rearOffset),
        '#6600cc',
        radius,
        state.wireframe
      ); // Seat Stay 2

      makeTube(headTubeTop, headTubeBottom, '#cccc00', radius, state.wireframe); // Head Tube
      makeTube(headTubeBottom, frontAxle, '#00cccc', radius, state.wireframe); // Fork
    }

    function applyStateToUI(sourceState) {
      document.getElementById('frameSize').value = sourceState.frameSize;
      document.getElementById('seatTubeAngle').value = sourceState.seatTubeAngle;
      document.getElementById('headTubeAngle').value = sourceState.headTubeAngle;
      document.getElementById('topTubeLength').value = sourceState.topTubeLength;
      document.getElementById('chainStayLength').value = sourceState.chainStayLength;
      document.getElementById('materialSelect').value = sourceState.material;
      updateLabels();
      buildFrame();
    }

    const sliderIds = [
      'frameSize',
      'seatTubeAngle',
      'headTubeAngle',
      'topTubeLength',
      'chainStayLength'
    ];

    sliderIds.forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener('input', () => {
        updateLabels();
        buildFrame();
      });
    });

    document.getElementById('materialSelect').addEventListener('change', () => {
      buildFrame();
    });

    document.getElementById('saveBtn').addEventListener('click', () => {
      const saveData = {
        frameSize: +document.getElementById('frameSize').value,
        seatTubeAngle: +document.getElementById('seatTubeAngle').value,
        headTubeAngle: +document.getElementById('headTubeAngle').value,
        topTubeLength: +document.getElementById('topTubeLength').value,
        chainStayLength: +document.getElementById('chainStayLength').value,
        material: document.getElementById('materialSelect').value
      };
      localStorage.setItem('bikeFrameState', JSON.stringify(saveData));
      state.savedState = true;
    });

    document.getElementById('loadBtn').addEventListener('click', () => {
      const raw = localStorage.getItem('bikeFrameState');
      if (!raw) return;
      try {
        const loaded = JSON.parse(raw);
        applyStateToUI({
          frameSize: loaded.frameSize ?? defaults.frameSize,
          seatTubeAngle: loaded.seatTubeAngle ?? defaults.seatTubeAngle,
          headTubeAngle: loaded.headTubeAngle ?? defaults.headTubeAngle,
          topTubeLength: loaded.topTubeLength ?? defaults.topTubeLength,
          chainStayLength: loaded.chainStayLength ?? defaults.chainStayLength,
          material: loaded.material ?? defaults.material
        });
        state.loadedState = true;
      } catch (e) {
        console.warn('Invalid saved bike frame state', e);
      }
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      applyStateToUI(defaults);
      state.savedState = false;
      state.loadedState = false;
    });

    document.getElementById('wireframeBtn').addEventListener('click', () => {
      state.wireframe = !state.wireframe;
      buildFrame();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateLabels();
    buildFrame();

    function animate() {
      requestAnimationFrame(animate);

      if (referenceModel) {
        referenceModel.rotation.y += 0.005;
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
