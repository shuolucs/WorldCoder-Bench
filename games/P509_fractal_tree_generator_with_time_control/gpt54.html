<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Fractal Tree Generator</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
    }

    canvas {
      display: block;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .panel {
      position: absolute;
      background: rgba(20, 20, 20, 0.62);
      color: white;
      padding: 10px 12px;
      border-radius: 10px;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
      pointer-events: auto;
    }

    #topLeft {
      top: 14px;
      left: 14px;
      min-width: 220px;
      line-height: 1.7;
    }

    #bottomControls {
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      width: min(60vw, 900px);
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    #buttonRow {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    button, select, input[type="range"] {
      pointer-events: auto;
    }

    button, select {
      background: rgba(35, 35, 35, 0.85);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover, select:hover {
      background: rgba(55, 55, 55, 0.9);
    }

    #timeSlider {
      width: 100%;
      accent-color: #8fd36b;
    }

    #hint {
      position: absolute;
      top: 14px;
      right: 14px;
      max-width: 290px;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="topLeft" class="panel">
      <div id="timeLabel">Growth: 0%</div>
      <div id="branchCount">Branches: 0 | Fruits: 0</div>
      <div id="colorLabel">Color Mode: natural</div>
      <div id="wireLabel">Wireframe: off</div>
      <div id="cameraStatus">Camera Prop Loaded: false</div>
    </div>

    <div id="hint" class="panel">
      <strong>Keyboard</strong><br>
      Space: Play/Pause<br>
      R: Reset<br>
      ← / →: Step time<br>
      C: Toggle color mode<br>
      W: Toggle wireframe
    </div>

    <div id="bottomControls" class="panel">
      <input id="timeSlider" type="range" min="0" max="1000" value="0" />
      <div id="buttonRow">
        <button id="playBtn">Play</button>
        <button id="pauseBtn">Pause</button>
        <button id="resetBtn">Reset</button>
        <label style="display:flex;align-items:center;gap:8px;color:white;">
          Speed
          <select id="speedSelect">
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="2">2x</option>
          </select>
        </label>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Gradient sky using a large inverted sphere
    const skyGeo = new THREE.SphereGeometry(120, 32, 16);
    const skyMat = new THREE.ShaderMaterial({
      side: THREE.BackSide,
      uniforms: {
        topColor: { value: new THREE.Color(0x87CEEB) },
        bottomColor: { value: new THREE.Color(0xdff3ff) },
        offset: { value: 12 },
        exponent: { value: 0.8 }
      },
      vertexShader: `
        varying vec3 vWorldPosition;
        void main() {
          vec4 worldPosition = modelMatrix * vec4(position, 1.0);
          vWorldPosition = worldPosition.xyz;
          gl_Position = projectionMatrix * viewMatrix * worldPosition;
        }
      `,
      fragmentShader: `
        uniform vec3 topColor;
        uniform vec3 bottomColor;
        uniform float offset;
        uniform float exponent;
        varying vec3 vWorldPosition;
        void main() {
          float h = normalize(vWorldPosition + offset).y;
          float t = max(pow(max(h, 0.0), exponent), 0.0);
          gl_FragColor = vec4(mix(bottomColor, topColor, t), 1.0);
        }
      `
    });
    const sky = new THREE.Mesh(skyGeo, skyMat);
    scene.add(sky);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 300);
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 0, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 4, 0);
    controls.enableDamping = true;

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 15, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 60;
    scene.add(dirLight);

    const ambient = new THREE.AmbientLight(0xccddff, 0.4);
    scene.add(ambient);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshStandardMaterial({ color: 0x2d5a27, roughness: 1, metalness: 0.05 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    // Decorative antique camera prop
    let cameraLoaded = false;
    const gltfLoader = new GLTFLoader();
    gltfLoader.load(
      "AntiqueCamera.glb",
      (gltf) => {
        const model = gltf.scene;
        model.position.set(6, 0, 4);
        model.scale.set(2, 2, 2);
        model.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        model.lookAt(0, 1.5, 0);
        scene.add(model);
        cameraLoaded = true;
      },
      undefined,
      () => {
        cameraLoaded = false;
      }
    );

    // UI refs
    const timeSlider = document.getElementById("timeSlider");
    const playBtn = document.getElementById("playBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const speedSelect = document.getElementById("speedSelect");
    const timeLabel = document.getElementById("timeLabel");
    const branchCountLabel = document.getElementById("branchCount");
    const colorLabel = document.getElementById("colorLabel");
    const wireLabel = document.getElementById("wireLabel");
    const cameraStatus = document.getElementById("cameraStatus");

    // State
    const MAX_DEPTH = 7;
    const BASE_LENGTH = 3.0;
    const BASE_RADIUS = 0.3;
    const LENGTH_SCALE = 0.7;
    const RADIUS_SCALE = 0.65;

    let currentTime = 0;
    let isPlaying = false;
    let speed = 1;
    let colorMode = "natural";
    let wireframe = false;

    const treeRoot = new THREE.Vector3(0, 0, 0);
    const treeGroup = new THREE.Group();
    scene.add(treeGroup);

    const branchNodes = [];
    const fruitNodes = [];

    const naturalBrown = new THREE.Color(0x8B4513);
    const naturalGreen = new THREE.Color(0x228B22);

    function mulberry32(a) {
      return function() {
        let t = a += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      }
    }

    const rand = mulberry32(123456);

    function randomRange(min, max) {
      return min + (max - min) * rand();
    }

    function naturalColorByDepth(depth) {
      return naturalBrown.clone().lerp(naturalGreen, depth / MAX_DEPTH);
    }

    function rainbowColorByDepth(depth) {
      const c = new THREE.Color();
      c.setHSL((depth / (MAX_DEPTH + 1)) % 1, 0.85, 0.5);
      return c;
    }

    function getBranchColor(depth) {
      return colorMode === "natural" ? naturalColorByDepth(depth) : rainbowColorByDepth(depth);
    }

    function createBranchMesh(length, radius, depth) {
      const geom = new THREE.CylinderGeometry(radius * 0.65, radius, length, 10);
      geom.translate(0, length / 2, 0);
      const mat = new THREE.MeshStandardMaterial({
        color: getBranchColor(depth),
        roughness: 0.85,
        metalness: 0.05,
        wireframe
      });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function createFruitMesh() {
      const geom = new THREE.SphereGeometry(0.15, 12, 12);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xFF4444,
        roughness: 0.5,
        metalness: 0.1
      });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function orientYToDirection(obj, direction) {
      const up = new THREE.Vector3(0, 1, 0);
      const q = new THREE.Quaternion().setFromUnitVectors(up, direction.clone().normalize());
      obj.quaternion.copy(q);
    }

    function buildTree() {
      branchNodes.length = 0;
      fruitNodes.length = 0;
      treeGroup.clear();

      function recurse(start, direction, length, radius, depth) {
        const branchMesh = createBranchMesh(length, radius, depth);
        branchMesh.position.copy(start);
        orientYToDirection(branchMesh, direction);
        treeGroup.add(branchMesh);

        const end = start.clone().add(direction.clone().multiplyScalar(length));

        const node = {
          mesh: branchMesh,
          start: start.clone(),
          end: end.clone(),
          direction: direction.clone(),
          length,
          radius,
          depth,
          fruit: null,
          children: []
        };
        branchNodes.push(node);

        const isTerminal = depth >= MAX_DEPTH;
        if (isTerminal) {
          if (depth >= 6) {
            const fruit = createFruitMesh();
            fruit.position.copy(end);
            fruit.visible = false;
            treeGroup.add(fruit);
            node.fruit = fruit;
            fruitNodes.push(fruit);
          }
          return node;
        }

        const childCount = rand() < 0.55 ? 2 : 3;
        const baseDir = direction.clone().normalize();

        for (let i = 0; i < childCount; i++) {
          const axis = new THREE.Vector3(
            randomRange(-1, 1),
            randomRange(0.1, 1),
            randomRange(-1, 1)
          ).normalize();

          if (Math.abs(axis.dot(baseDir)) > 0.92) {
            axis.x += 0.3;
            axis.z -= 0.2;
            axis.normalize();
          }

          const spreadDeg = randomRange(25, 45);
          const spread = THREE.MathUtils.degToRad(spreadDeg);
          const twist = randomRange(0, Math.PI * 2);

          const q1 = new THREE.Quaternion().setFromAxisAngle(axis, spread);
          const q2 = new THREE.Quaternion().setFromAxisAngle(baseDir, twist);
          const childDir = baseDir.clone().applyQuaternion(q1).applyQuaternion(q2).normalize();

          const child = recurse(
            end,
            childDir,
            length * LENGTH_SCALE,
            radius * RADIUS_SCALE,
            depth + 1
          );
          node.children.push(child);
        }

        return node;
      }

      recurse(treeRoot.clone(), new THREE.Vector3(0, 1, 0), BASE_LENGTH, BASE_RADIUS, 0);
    }

    buildTree();

    function updateBranchAppearance() {
      for (const node of branchNodes) {
        node.mesh.material.color.copy(getBranchColor(node.depth));
        node.mesh.material.wireframe = wireframe;
      }
    }

    function updateGrowth(time) {
      const scaled = time * MAX_DEPTH;
      const fullyVisibleDepth = Math.floor(scaled);
      const partialProgress = scaled - fullyVisibleDepth;

      let visibleBranches = 0;
      let visibleFruits = 0;
      let maxDepthReached = 0;

      for (const node of branchNodes) {
        const mesh = node.mesh;

        if (node.depth < fullyVisibleDepth) {
          mesh.visible = true;
          mesh.scale.set(1, 1, 1);
          visibleBranches++;
          maxDepthReached = Math.max(maxDepthReached, node.depth);
        } else if (node.depth === fullyVisibleDepth && fullyVisibleDepth <= MAX_DEPTH) {
          const s = THREE.MathUtils.clamp(partialProgress, 0, 1);
          if (s > 0 || node.depth === 0) {
            mesh.visible = true;
            mesh.scale.set(1, Math.max(s, node.depth === 0 ? Math.max(time * MAX_DEPTH, 0.0001) : 0.0001), 1);
            visibleBranches++;
            if (s > 0.0001 || node.depth === 0) {
              maxDepthReached = Math.max(maxDepthReached, node.depth);
            }
          } else {
            mesh.visible = false;
          }
        } else if (node.depth === 0 && time === 0) {
          mesh.visible = true;
          mesh.scale.set(1, 0.0001, 1);
          visibleBranches++;
        } else {
          mesh.visible = false;
        }

        if (node.fruit) {
          const fruitVisible = node.depth >= 6 && time >= 0.85 && node.depth <= fullyVisibleDepth + (partialProgress > 0 ? 1 : 0) && mesh.visible;
          node.fruit.visible = fruitVisible;
          if (fruitVisible) visibleFruits++;
        }
      }

      branchCountLabel.textContent = `Branches: ${visibleBranches} | Fruits: ${visibleFruits}`;
      timeLabel.textContent = `Growth: ${Math.round(time * 100)}%`;
      colorLabel.textContent = `Color Mode: ${colorMode}`;
      wireLabel.textContent = `Wireframe: ${wireframe ? "on" : "off"}`;
      cameraStatus.textContent = `Camera Prop Loaded: ${cameraLoaded}`;

      window.__3D_STATE__ = {
        currentTime: time,
        isPlaying,
        speed,
        visibleDepth: Math.min(fullyVisibleDepth, MAX_DEPTH),
        totalBranches: visibleBranches,
        totalFruits: visibleFruits,
        colorMode,
        wireframe,
        cameraLoaded,
        treeRoot: { x: treeRoot.x, y: treeRoot.y, z: treeRoot.z },
        maxDepthReached
      };
    }

    function setTime(t) {
      currentTime = THREE.MathUtils.clamp(t, 0, 1);
      timeSlider.value = Math.round(currentTime * 1000);
      updateGrowth(currentTime);
    }

    playBtn.addEventListener("click", () => { isPlaying = true; });
    pauseBtn.addEventListener("click", () => { isPlaying = false; });
    resetBtn.addEventListener("click", () => {
      isPlaying = false;
      setTime(0);
    });

    speedSelect.addEventListener("change", () => {
      speed = parseFloat(speedSelect.value);
    });

    timeSlider.addEventListener("input", () => {
      currentTime = parseInt(timeSlider.value, 10) / 1000;
      updateGrowth(currentTime);
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        isPlaying = !isPlaying;
      } else if (e.key === "r" || e.key === "R") {
        isPlaying = false;
        setTime(0);
      } else if (e.key === "ArrowLeft") {
        setTime(currentTime - 0.05);
      } else if (e.key === "ArrowRight") {
        setTime(currentTime + 0.05);
      } else if (e.key === "c" || e.key === "C") {
        colorMode = colorMode === "natural" ? "rainbow" : "natural";
        updateBranchAppearance();
        updateGrowth(currentTime);
      } else if (e.key === "w" || e.key === "W") {
        wireframe = !wireframe;
        updateBranchAppearance();
        updateGrowth(currentTime);
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Initial state
    window.__3D_STATE__ = {
      currentTime: 0,
      isPlaying: false,
      speed: 1,
      visibleDepth: 0,
      totalBranches: 0,
      totalFruits: 0,
      colorMode: "natural",
      wireframe: false,
      cameraLoaded: false,
      treeRoot: { x: 0, y: 0, z: 0 },
      maxDepthReached: 0
    };

    updateBranchAppearance();
    setTime(0);

    function animate() {
      requestAnimationFrame(animate);

      if (isPlaying) {
        currentTime += 0.005 * speed;
        if (currentTime >= 1) {
          currentTime = 1;
          isPlaying = false;
        }
        timeSlider.value = Math.round(currentTime * 1000);
        updateGrowth(currentTime);
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
