<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fractal Tree Generator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            background: rgba(20, 20, 20, 0.85);
            color: #fff;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            user-select: none;
        }
        #stats-row {
            display: flex;
            justify-content: space-between;
            width: 60%;
            font-weight: bold;
            font-size: 1.1em;
            text-shadow: 1px 1px 2px #000;
        }
        #timeSlider {
            width: 60%;
            cursor: pointer;
            accent-color: #4CAF50;
        }
        #controls-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button, select {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover, select:hover {
            background: #4CAF50;
            border-color: #4CAF50;
        }
        button:active {
            transform: scale(0.95);
        }
        select {
            appearance: none;
            padding-right: 30px;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 10px top 50%;
            background-size: 12px auto;
        }
        #help-text {
            font-size: 0.85em;
            color: #aaa;
            margin-top: 5px;
            text-align: center;
        }
        kbd {
            background: #444;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: #fff;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-overlay">
        <div id="stats-row">
            <span id="timeLabel">Growth: 0%</span>
            <span id="branchCount">Branches: 0</span>
        </div>
        
        <input type="range" id="timeSlider" min="0" max="1000" value="0">
        
        <div id="controls-row">
            <button id="playBtn">Play</button>
            <button id="pauseBtn">Pause</button>
            <button id="resetBtn">Reset</button>
            <select id="speedSelect">
                <option value="0.5">0.5x Speed</option>
                <option value="1" selected>1x Speed</option>
                <option value="2">2x Speed</option>
            </select>
        </div>
        
        <div id="help-text">
            <kbd>Space</kbd> Play/Pause &nbsp;|&nbsp; 
            <kbd>R</kbd> Reset &nbsp;|&nbsp; 
            <kbd>←</kbd> <kbd>→</kbd> Step Time &nbsp;|&nbsp; 
            <kbd>C</kbd> Color Mode &nbsp;|&nbsp; 
            <kbd>W</kbd> Wireframe
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            currentTime: 0,
            isPlaying: false,
            speed: 1,
            visibleDepth: 0,
            totalBranches: 0,
            totalFruits: 0,
            colorMode: 'natural',
            wireframe: false,
            cameraLoaded: false,
            treeRoot: { x: 0, y: 0, z: 0 },
            maxDepthReached: 0
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        
        // Gradient Sky Background
        const canvas = document.createElement('canvas');
        canvas.width = 2;
        canvas.height = 2;
        const context = canvas.getContext('2d');
        const gradient = context.createLinearGradient(0, 0, 0, 2);
        gradient.addColorStop(0, '#87CEEB'); // Sky blue
        gradient.addColorStop(1, '#e0f6ff'); // Lighter horizon
        context.fillStyle = gradient;
        context.fillRect(0, 0, 2, 2);
        scene.background = new THREE.CanvasTexture(canvas);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 5, 0);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xccddff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        scene.add(dirLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x2d5a27,
            roughness: 0.8,
            metalness: 0.1
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- GLTF Model ---
        const gltfLoader = new GLTFLoader();
        gltfLoader.load('AntiqueCamera.glb', (gltf) => {
            const camModel = gltf.scene;
            camModel.position.set(6, 0, 4);
            camModel.scale.set(2, 2, 2);
            camModel.lookAt(0, 0, 0);
            
            camModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            scene.add(camModel);
            state.cameraLoaded = true;
        }, undefined, (error) => {
            console.warn('AntiqueCamera.glb could not be loaded. Proceeding without it.', error);
        });

        // --- Fractal Tree Generation ---
        const treeRoot = new THREE.Group();
        scene.add(treeRoot);

        const maxDepth = 7;
        const branches = [];
        const fruits = [];

        // Geometries
        const cylinderGeo = new THREE.CylinderGeometry(1, 1, 1, 8);
        cylinderGeo.translate(0, 0.5, 0); // Base at origin
        const sphereGeo = new THREE.SphereGeometry(0.15, 16, 16);

        // Materials Pool
        const naturalMats = [];
        const rainbowMats = [];
        const colorStart = new THREE.Color(0x8B4513); // Brown
        const colorEnd = new THREE.Color(0x228B22);   // Green

        for (let i = 0; i <= maxDepth; i++) {
            // Natural
            const cNat = colorStart.clone().lerp(colorEnd, i / maxDepth);
            naturalMats.push(new THREE.MeshStandardMaterial({ color: cNat, roughness: 0.9 }));
            
            // Rainbow
            const cRain = new THREE.Color().setHSL(i / maxDepth, 1.0, 0.5);
            rainbowMats.push(new THREE.MeshStandardMaterial({ color: cRain, roughness: 0.5 }));
        }

        const fruitMat = new THREE.MeshStandardMaterial({ 
            color: 0xFF4444, 
            roughness: 0.2, 
            metalness: 0.1 
        });

        function generateTree(parentObj, depth, length, radius) {
            if (depth > maxDepth) return;

            const branchGroup = new THREE.Group();
            parentObj.add(branchGroup);

            // Create Mesh
            const mesh = new THREE.Mesh(cylinderGeo, naturalMats[depth]);
            mesh.scale.set(radius, length, radius);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            branchGroup.add(mesh);

            branches.push({
                group: branchGroup,
                mesh: mesh,
                depth: depth
            });

            // Add Fruit
            if (depth >= 6) {
                const fruitMesh = new THREE.Mesh(sphereGeo, fruitMat);
                fruitMesh.position.set(0, length, 0);
                fruitMesh.visible = false;
                fruitMesh.castShadow = true;
                branchGroup.add(fruitMesh);
                fruits.push({
                    mesh: fruitMesh,
                    depth: depth
                });
            }

            // Recursive Children
            if (depth < maxDepth) {
                const numChildren = Math.random() < 0.5 ? 2 : 3;
                for (let i = 0; i < numChildren; i++) {
                    const childLength = length * 0.7;
                    const childRadius = radius * 0.65;

                    const childGroup = new THREE.Group();
                    childGroup.position.set(0, length, 0);

                    // Spread 25-45 degrees + random variation
                    const angle = THREE.MathUtils.degToRad(25 + Math.random() * 20);
                    // Distribute around Y axis
                    const phi = (i / numChildren) * Math.PI * 2 + (Math.random() * 0.5 - 0.25);

                    childGroup.rotation.y = phi;
                    childGroup.rotateZ(angle);

                    branchGroup.add(childGroup);
                    generateTree(childGroup, depth + 1, childLength, childRadius);
                }
            }
        }

        // Start generation: trunk radius 0.3, height 3.0
        generateTree(treeRoot, 0, 3.0, 0.3);

        // --- UI Elements & Event Listeners ---
        const timeSlider = document.getElementById('timeSlider');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const speedSelect = document.getElementById('speedSelect');
        const timeLabel = document.getElementById('timeLabel');
        const branchCountLabel = document.getElementById('branchCount');

        function updateUIFromState() {
            timeSlider.value = state.currentTime * 1000;
            timeLabel.innerText = `Growth: ${Math.round(state.currentTime * 100)}%`;
            branchCountLabel.innerText = `Branches: ${state.totalBranches}`;
            
            playBtn.style.backgroundColor = state.isPlaying ? '#4CAF50' : '#333';
            pauseBtn.style.backgroundColor = !state.isPlaying ? '#f44336' : '#333';
        }

        timeSlider.addEventListener('input', (e) => {
            state.currentTime = e.target.value / 1000;
            state.isPlaying = false;
        });

        playBtn.addEventListener('click', () => state.isPlaying = true);
        pauseBtn.addEventListener('click', () => state.isPlaying = false);
        resetBtn.addEventListener('click', () => {
            state.currentTime = 0;
            state.isPlaying = false;
        });
        speedSelect.addEventListener('change', (e) => {
            state.speed = parseFloat(e.target.value);
        });

        // --- Keyboard Controls ---
        window.addEventListener('keydown', (e) => {
            // Prevent default scrolling for space and arrows
            if(['Space', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
                e.preventDefault();
            }

            switch(e.code) {
                case 'Space':
                    state.isPlaying = !state.isPlaying;
                    break;
                case 'KeyR':
                    state.currentTime = 0;
                    state.isPlaying = false;
                    break;
                case 'ArrowLeft':
                    state.currentTime = Math.max(0, state.currentTime - 0.05);
                    state.isPlaying = false;
                    break;
                case 'ArrowRight':
                    state.currentTime = Math.min(1, state.currentTime + 0.05);
                    state.isPlaying = false;
                    break;
                case 'KeyC':
                    state.colorMode = state.colorMode === 'natural' ? 'rainbow' : 'natural';
                    updateMaterials();
                    break;
                case 'KeyW':
                    state.wireframe = !state.wireframe;
                    updateMaterials();
                    break;
            }
        });

        function updateMaterials() {
            const mats = state.colorMode === 'natural' ? naturalMats : rainbowMats;
            for (let i = 0; i <= maxDepth; i++) {
                mats[i].wireframe = state.wireframe;
            }
            for (const b of branches) {
                b.mesh.material = mats[b.depth];
            }
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            // Update Time
            if (state.isPlaying) {
                state.currentTime += 0.005 * state.speed;
                if (state.currentTime >= 1) {
                    state.currentTime = 1;
                    state.isPlaying = false;
                }
            }

            // Update Tree Growth
            let currentVisibleBranches = 0;
            let currentVisibleFruits = 0;
            let maxDepthReached = 0;
            
            const continuousDepth = state.currentTime * maxDepth;
            state.visibleDepth = Math.floor(continuousDepth);

            for (const b of branches) {
                // Growth factor: 0 (hidden) to 1 (fully grown)
                const g = Math.max(0, Math.min(1, continuousDepth - b.depth));
                
                if (g > 0) {
                    b.group.scale.set(g, g, g);
                    b.group.visible = true;
                    currentVisibleBranches++;
                    maxDepthReached = Math.max(maxDepthReached, b.depth);
                } else {
                    b.group.visible = false;
                }
            }

            // Update Fruits
            const showFruits = state.currentTime >= 0.85;
            for (const f of fruits) {
                if (showFruits && f.depth <= continuousDepth) {
                    f.mesh.visible = true;
                    currentVisibleFruits++;
                } else {
                    f.mesh.visible = false;
                }
            }

            // Update State Object
            state.totalBranches = currentVisibleBranches;
            state.totalFruits = currentVisibleFruits;
            state.maxDepthReached = maxDepthReached;

            updateUIFromState();
            controls.update();
            renderer.render(scene, camera);
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start Loop
        animate();
    </script>
</body>
</html>
