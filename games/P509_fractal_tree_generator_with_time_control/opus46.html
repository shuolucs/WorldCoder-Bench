<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Fractal Tree Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #ui-overlay {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 70%;
    max-width: 800px;
    background: rgba(0, 0, 0, 0.7);
    border-radius: 12px;
    padding: 15px 20px;
    color: white;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    z-index: 100;
  }

  #slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  #timeSlider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(to right, #8B4513, #228B22);
    outline: none;
    cursor: pointer;
  }

  #timeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #ffffff;
    border: 2px solid #228B22;
    cursor: pointer;
    box-shadow: 0 0 4px rgba(0,0,0,0.4);
  }

  #timeSlider::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #ffffff;
    border: 2px solid #228B22;
    cursor: pointer;
  }

  #timeLabel {
    font-size: 14px;
    font-weight: bold;
    min-width: 100px;
    text-align: right;
  }

  #controls-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
  }

  .ctrl-btn:hover {
    background: rgba(255,255,255,0.25);
  }

  .ctrl-btn:active {
    background: rgba(255,255,255,0.35);
  }

  #speedSelect {
    padding: 5px 8px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 13px;
    cursor: pointer;
  }

  #speedSelect option {
    background: #333;
    color: white;
  }

  #branchCount {
    margin-left: auto;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
  }

  #info-panel {
    position: fixed;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.6);
    border-radius: 10px;
    padding: 12px 16px;
    color: white;
    font-size: 12px;
    line-height: 1.6;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    z-index: 100;
  }

  #info-panel h3 {
    margin-bottom: 6px;
    font-size: 14px;
    color: #90EE90;
  }

  kbd {
    background: rgba(255,255,255,0.15);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 11px;
    border: 1px solid rgba(255,255,255,0.2);
  }
</style>
</head>
<body>

<div id="info-panel">
  <h3>🌳 Fractal Tree Controls</h3>
  <kbd>Space</kbd> Play/Pause &nbsp;
  <kbd>R</kbd> Reset<br>
  <kbd>←</kbd><kbd>→</kbd> Step time &nbsp;
  <kbd>C</kbd> Color mode<br>
  <kbd>W</kbd> Wireframe toggle
</div>

<div id="ui-overlay">
  <div id="slider-row">
    <input type="range" id="timeSlider" min="0" max="1000" value="0">
    <span id="timeLabel">Growth: 0%</span>
  </div>
  <div id="controls-row">
    <button class="ctrl-btn" id="playBtn">▶ Play</button>
    <button class="ctrl-btn" id="pauseBtn">⏸ Pause</button>
    <button class="ctrl-btn" id="resetBtn">⏮ Reset</button>
    <label style="font-size:13px; margin-left:8px;">Speed:</label>
    <select id="speedSelect">
      <option value="0.5">0.5x</option>
      <option value="1" selected>1x</option>
      <option value="2">2x</option>
    </select>
    <span id="branchCount">Branches: 0 | Fruits: 0</span>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const state = {
  currentTime: 0,
  isPlaying: false,
  speed: 1,
  visibleDepth: 0,
  totalBranches: 0,
  totalFruits: 0,
  colorMode: 'natural',
  wireframe: false,
  cameraLoaded: false,
  treeRoot: { x: 0, y: 0, z: 0 },
  maxDepthReached: 0
};
window.__3D_STATE__ = state;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// Add fog for atmosphere
scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.update();

// --- Lights ---
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -5;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 40;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0xccddff, 0.4);
scene.add(ambientLight);

// Hemisphere light for more natural lighting
const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x2d5a27, 0.3);
scene.add(hemiLight);

// --- Ground ---
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x2d5a27,
  roughness: 0.9,
  metalness: 0.0
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// --- Load Antique Camera ---
const gltfLoader = new GLTFLoader();
gltfLoader.load(
  'https://threejs.org/examples/models/gltf/AntiqueCamera/AntiqueCamera.glb',
  (gltf) => {
    const model = gltf.scene;
    model.position.set(6, 0, 4);
    model.scale.set(2, 2, 2);
    // Face the tree (look toward origin from position 6,0,4)
    model.lookAt(0, 2, 0);
    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(model);
    state.cameraLoaded = true;
  },
  undefined,
  (err) => {
    console.warn('Could not load AntiqueCamera.glb:', err);
    // Create a placeholder camera prop
    const camBody = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 1.5, 1.8),
      new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.6, metalness: 0.3 })
    );
    camBody.position.set(6, 0.75, 4);
    camBody.castShadow = true;
    
    const lens = new THREE.Mesh(
      new THREE.CylinderGeometry(0.3, 0.35, 0.8, 16),
      new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3, metalness: 0.7 })
    );
    lens.rotation.x = Math.PI / 2;
    lens.position.set(6, 0.9, 3.1);
    lens.castShadow = true;
    
    const tripodLeg1 = new THREE.Mesh(
      new THREE.CylinderGeometry(0.04, 0.04, 2, 8),
      new THREE.MeshStandardMaterial({ color: 0x5c3a1e })
    );
    tripodLeg1.position.set(5.5, 0, 4.5);
    tripodLeg1.rotation.z = 0.15;
    
    const tripodLeg2 = tripodLeg1.clone();
    tripodLeg2.position.set(6.5, 0, 4.5);
    tripodLeg2.rotation.z = -0.15;
    
    const tripodLeg3 = tripodLeg1.clone();
    tripodLeg3.position.set(6, 0, 3.5);
    
    const camGroup = new THREE.Group();
    camGroup.add(camBody, lens, tripodLeg1, tripodLeg2, tripodLeg3);
    camGroup.lookAt(0, 2, 0);
    scene.add(camGroup);
    state.cameraLoaded = true;
  }
);

// --- Fractal Tree ---
const MAX_DEPTH = 7;
const TRUNK_RADIUS = 0.3;
const TRUNK_HEIGHT = 3.0;
const LENGTH_RATIO = 0.70;
const RADIUS_RATIO = 0.65;
const MIN_ANGLE = 25 * Math.PI / 180;
const MAX_ANGLE = 45 * Math.PI / 180;

const treeGroup = new THREE.Group();
scene.add(treeGroup);

// Pre-generate tree structure
const branchData = [];
const fruitData = [];

// Seeded random for consistency
let seed = 42;
function seededRandom() {
  seed = (seed * 16807) % 2147483647;
  return (seed - 1) / 2147483646;
}

function generateTreeData(depth, position, direction, length, radius, parentIndex) {
  const idx = branchData.length;
  branchData.push({
    depth,
    position: position.clone(),
    direction: direction.clone(),
    length,
    radius,
    parentIndex,
    mesh: null,
    fruit: null
  });

  if (depth >= MAX_DEPTH) return;

  // End position of this branch
  const endPos = position.clone().add(direction.clone().multiplyScalar(length));

  // Number of children: 2-3
  const numChildren = depth < 2 ? 3 : (seededRandom() > 0.5 ? 3 : 2);

  for (let i = 0; i < numChildren; i++) {
    const angle = MIN_ANGLE + seededRandom() * (MAX_ANGLE - MIN_ANGLE);
    const rotationAngle = (i / numChildren) * Math.PI * 2 + seededRandom() * 0.5;

    // Create rotation axis perpendicular to direction
    const up = new THREE.Vector3(0, 1, 0);
    let perp = new THREE.Vector3().crossVectors(direction, up);
    if (perp.length() < 0.001) {
      perp = new THREE.Vector3(1, 0, 0);
    }
    perp.normalize();

    // Rotate perp around direction
    perp.applyAxisAngle(direction, rotationAngle);

    // Rotate direction by angle around perp
    const newDir = direction.clone().applyAxisAngle(perp, angle).normalize();

    const newLength = length * LENGTH_RATIO;
    const newRadius = radius * RADIUS_RATIO;

    generateTreeData(depth + 1, endPos, newDir, newLength, newRadius, idx);
  }
}

// Generate tree structure
generateTreeData(0, new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 1, 0), TRUNK_HEIGHT, TRUNK_RADIUS, -1);

// Color helpers
const brownColor = new THREE.Color(0x8B4513);
const greenColor = new THREE.Color(0x228B22);

function getNaturalColor(depth) {
  const t = depth / MAX_DEPTH;
  return new THREE.Color().lerpColors(brownColor, greenColor, t);
}

function getRainbowColor(depth) {
  const hue = depth / (MAX_DEPTH + 1);
  return new THREE.Color().setHSL(hue, 0.8, 0.5);
}

// Create meshes for all branches
const branchGeometries = {};
function getBranchGeometry(radius, length) {
  const key = `${radius.toFixed(4)}_${length.toFixed(4)}`;
  if (!branchGeometries[key]) {
    branchGeometries[key] = new THREE.CylinderGeometry(radius * 0.7, radius, length, 8, 1);
  }
  return branchGeometries[key];
}

const fruitGeometry = new THREE.SphereGeometry(0.15, 8, 8);
const fruitMaterial = new THREE.MeshStandardMaterial({ color: 0xFF4444, roughness: 0.3, metalness: 0.1 });

for (const bd of branchData) {
  const geo = new THREE.CylinderGeometry(bd.radius * 0.7, bd.radius, bd.length, 8, 1);
  const color = state.colorMode === 'natural' ? getNaturalColor(bd.depth) : getRainbowColor(bd.depth);
  const mat = new THREE.MeshStandardMaterial({
    color: color,
    roughness: 0.8,
    metalness: 0.05,
    wireframe: state.wireframe
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;

  // Position and orient the branch
  // The cylinder is centered at origin along Y axis
  // We need to move it so its base is at bd.position and it points along bd.direction
  const midPoint = bd.position.clone().add(bd.direction.clone().multiplyScalar(bd.length / 2));
  mesh.position.copy(midPoint);

  // Orient cylinder to point along direction
  const quaternion = new THREE.Quaternion();
  quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), bd.direction);
  mesh.quaternion.copy(quaternion);

  mesh.visible = false;
  treeGroup.add(mesh);
  bd.mesh = mesh;

  // Create fruit for terminal branches at depth >= 6
  if (bd.depth >= 6) {
    const endPos = bd.position.clone().add(bd.direction.clone().multiplyScalar(bd.length));
    // Check if this is a terminal branch (no children)
    const hasChildren = branchData.some(b => b.parentIndex === branchData.indexOf(bd));
    if (!hasChildren || bd.depth === MAX_DEPTH) {
      const fruit = new THREE.Mesh(fruitGeometry, fruitMaterial.clone());
      fruit.position.copy(endPos);
      fruit.castShadow = true;
      fruit.visible = false;
      treeGroup.add(fruit);
      bd.fruit = fruit;
    }
  }
}

// --- Update Tree Based on Time ---
function updateTree(t) {
  const continuousDepth = t * MAX_DEPTH;
  const fullDepth = Math.floor(continuousDepth);
  const partialFraction = continuousDepth - fullDepth;

  let visibleBranches = 0;
  let visibleFruits = 0;
  let maxDepthReached = 0;

  for (const bd of branchData) {
    const mesh = bd.mesh;
    if (!mesh) continue;

    if (bd.depth <= fullDepth) {
      // Fully visible
      mesh.visible = true;
      mesh.scale.set(1, 1, 1);
      visibleBranches++;
      maxDepthReached = Math.max(maxDepthReached, bd.depth);
    } else if (bd.depth === fullDepth + 1 && partialFraction > 0) {
      // Partially visible - growing
      mesh.visible = true;
      const s = partialFraction;
      mesh.scale.set(s, s, s);

      // Adjust position for scaling (scale from base)
      const basePos = bd.position.clone();
      const scaledMid = basePos.add(bd.direction.clone().multiplyScalar(bd.length * s / 2));
      mesh.position.copy(scaledMid);

      visibleBranches++;
      maxDepthReached = Math.max(maxDepthReached, bd.depth);
    } else {
      mesh.visible = false;
    }

    // Update colors
    if (mesh.visible) {
      const color = state.colorMode === 'natural' ? getNaturalColor(bd.depth) : getRainbowColor(bd.depth);
      mesh.material.color.copy(color);
      mesh.material.wireframe = state.wireframe;
    }

    // Fruits
    if (bd.fruit) {
      if (t >= 0.85 && bd.depth <= fullDepth + 1 && mesh.visible) {
        bd.fruit.visible = true;
        // Update fruit position for scaled branches
        if (bd.depth === fullDepth + 1 && partialFraction > 0) {
          const s = partialFraction;
          const endPos = bd.position.clone().add(bd.direction.clone().multiplyScalar(bd.length * s));
          bd.fruit.position.copy(endPos);
          bd.fruit.scale.setScalar(s);
        } else {
          const endPos = bd.position.clone().add(bd.direction.clone().multiplyScalar(bd.length));
          bd.fruit.position.copy(endPos);
          bd.fruit.scale.setScalar(1);
        }
        // Gentle bobbing
        bd.fruit.position.y += Math.sin(Date.now() * 0.003 + bd.depth) * 0.02;
        visibleFruits++;
      } else {
        bd.fruit.visible = false;
      }
    }
  }

  // Reset positions for fully visible branches (they might have been adjusted during partial phase)
  for (const bd of branchData) {
    if (bd.mesh && bd.mesh.visible && bd.depth <= fullDepth) {
      const midPoint = bd.position.clone().add(bd.direction.clone().multiplyScalar(bd.length / 2));
      bd.mesh.position.copy(midPoint);
      bd.mesh.scale.set(1, 1, 1);
    }
  }

  state.visibleDepth = fullDepth;
  state.totalBranches = visibleBranches;
  state.totalFruits = visibleFruits;
  state.maxDepthReached = maxDepthReached;
}

// --- UI Elements ---
const timeSlider = document.getElementById('timeSlider');
const playBtn = document.getElementById('playBtn');
const pauseBtn = document.getElementById('pauseBtn');
const resetBtn = document.getElementById('resetBtn');
const speedSelect = document.getElementById('speedSelect');
const timeLabel = document.getElementById('timeLabel');
const branchCountLabel = document.getElementById('branchCount');

timeSlider.addEventListener('input', () => {
  state.currentTime = parseInt(timeSlider.value) / 1000;
  state.isPlaying = false;
});

playBtn.addEventListener('click', () => {
  state.isPlaying = true;
});

pauseBtn.addEventListener('click', () => {
  state.isPlaying = false;
});

resetBtn.addEventListener('click', () => {
  state.currentTime = 0;
  state.isPlaying = false;
  timeSlider.value = 0;
});

speedSelect.addEventListener('change', () => {
  state.speed = parseFloat(speedSelect.value);
});

// --- Keyboard Controls ---
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  switch (e.code) {
    case 'Space':
      e.preventDefault();
      state.isPlaying = !state.isPlaying;
      break;
    case 'KeyR':
      state.currentTime = 0;
      state.isPlaying = false;
      timeSlider.value = 0;
      break;
    case 'ArrowLeft':
      e.preventDefault();
      state.currentTime = Math.max(0, state.currentTime - 0.05);
      state.isPlaying = false;
      break;
    case 'ArrowRight':
      e.preventDefault();
      state.currentTime = Math.min(1, state.currentTime + 0.05);
      state.isPlaying = false;
      break;
    case 'KeyC':
      state.colorMode = state.colorMode === 'natural' ? 'rainbow' : 'natural';
      break;
    case 'KeyW':
      state.wireframe = !state.wireframe;
      break;
  }
});

// --- Animation Loop ---
function animate() {
  requestAnimationFrame(animate);

  // Auto-play
  if (state.isPlaying) {
    state.currentTime += 0.005 * state.speed;
    if (state.currentTime >= 1) {
      state.currentTime = 1;
      state.isPlaying = false;
    }
  }

  // Update slider
  timeSlider.value = Math.round(state.currentTime * 1000);

  // Update tree
  updateTree(state.currentTime);

  // Update UI labels
  timeLabel.textContent = `Growth: ${Math.round(state.currentTime * 100)}%`;
  branchCountLabel.textContent = `Branches: ${state.totalBranches} | Fruits: ${state.totalFruits}`;

  // Update state
  state.treeRoot = { x: 0, y: 0, z: 0 };

  controls.update();
  renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
