<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Bloom Spheres</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000208; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #controls {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(0, 2, 8, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 20px;
    color: #e0e0e0;
    width: 280px;
    z-index: 100;
  }

  #controls h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #aaa;
    margin-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 8px;
  }

  .control-group {
    margin-bottom: 14px;
  }

  .control-group label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    margin-bottom: 6px;
    color: #ccc;
  }

  .control-group label span.val {
    color: #7df;
    font-weight: bold;
    font-size: 12px;
    min-width: 36px;
    text-align: right;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.15);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #7df;
    box-shadow: 0 0 6px rgba(119, 221, 255, 0.6);
    cursor: pointer;
  }

  .toggle-group {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .toggle-btn {
    flex: 1;
    padding: 8px 0;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    color: #999;
    font-size: 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.3s;
    user-select: none;
  }

  .toggle-btn.active {
    background: rgba(119, 221, 255, 0.15);
    border-color: rgba(119, 221, 255, 0.5);
    color: #7df;
    box-shadow: 0 0 12px rgba(119, 221, 255, 0.15);
  }

  #fps-display {
    position: fixed;
    top: 16px;
    left: 16px;
    background: rgba(0, 2, 8, 0.8);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 8px 14px;
    color: #7df;
    font-family: monospace;
    font-size: 13px;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="fps-display">FPS: --</div>

<div id="controls">
  <h2>Bloom Controls</h2>

  <div class="control-group">
    <label>Strength <span class="val" id="strengthVal">1.50</span></label>
    <input type="range" id="bloomStrength" min="0" max="3" step="0.01" value="1.5">
  </div>

  <div class="control-group">
    <label>Radius <span class="val" id="radiusVal">0.40</span></label>
    <input type="range" id="bloomRadius" min="0" max="1" step="0.01" value="0.4">
  </div>

  <div class="control-group">
    <label>Threshold <span class="val" id="thresholdVal">0.10</span></label>
    <input type="range" id="bloomThreshold" min="0" max="1" step="0.01" value="0.1">
  </div>

  <div class="toggle-group">
    <div class="toggle-btn active" id="bloomToggle">BLOOM ON</div>
    <div class="toggle-btn active" id="fxaaToggle">FXAA ON</div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { FXAAShader } from 'three/addons/shaders/FXAAShader.js';

// State
window.__3D_STATE__ = {
  bloomStrength: 1.5,
  bloomRadius: 0.4,
  bloomThreshold: 0.1,
  bloomEnabled: true,
  fxaaEnabled: true,
  objectCount: 20,
  fps: 0
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000208);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 25);

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Controls
const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.05;

// Neon colors - high saturation
function randomNeonColor() {
  const hue = Math.random();
  const color = new THREE.Color();
  color.setHSL(hue, 1.0, 0.5);
  return color;
}

// Create 20 neon spheres
const spheres = [];
const SPHERE_COUNT = 20;
const SPREAD = 20;

for (let i = 0; i < SPHERE_COUNT; i++) {
  const radius = 0.5 + Math.random() * 1.2;
  const geometry = new THREE.SphereGeometry(radius, 32, 32);
  const color = randomNeonColor();

  const material = new THREE.MeshStandardMaterial({
    color: color,
    emissive: color,
    emissiveIntensity: 2.5,
    roughness: 0.2,
    metalness: 0.1,
  });

  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.set(
    (Math.random() - 0.5) * SPREAD,
    (Math.random() - 0.5) * SPREAD,
    (Math.random() - 0.5) * SPREAD
  );

  // Store animation data
  mesh.userData = {
    basePos: mesh.position.clone(),
    phase: Math.random() * Math.PI * 2,
    speed: 0.3 + Math.random() * 0.7,
    amplitude: 0.5 + Math.random() * 1.5,
  };

  scene.add(mesh);
  spheres.push(mesh);
}

// Subtle ambient light
const ambientLight = new THREE.AmbientLight(0x111122, 0.3);
scene.add(ambientLight);

// Post-processing
const composer = new EffectComposer(renderer);

const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.5,  // strength
  0.4,  // radius
  0.1   // threshold
);
composer.addPass(bloomPass);

const fxaaPass = new ShaderPass(FXAAShader);
fxaaPass.uniforms['resolution'].value.set(
  1 / (window.innerWidth * window.devicePixelRatio),
  1 / (window.innerHeight * window.devicePixelRatio)
);
composer.addPass(fxaaPass);

// UI bindings
const strengthSlider = document.getElementById('bloomStrength');
const radiusSlider = document.getElementById('bloomRadius');
const thresholdSlider = document.getElementById('bloomThreshold');
const bloomToggle = document.getElementById('bloomToggle');
const fxaaToggle = document.getElementById('fxaaToggle');

const strengthVal = document.getElementById('strengthVal');
const radiusVal = document.getElementById('radiusVal');
const thresholdVal = document.getElementById('thresholdVal');
const fpsDisplay = document.getElementById('fps-display');

let bloomEnabled = true;
let fxaaEnabled = true;
let savedStrength = 1.5;

strengthSlider.addEventListener('input', (e) => {
  const v = parseFloat(e.target.value);
  bloomPass.strength = v;
  savedStrength = v;
  strengthVal.textContent = v.toFixed(2);
  window.__3D_STATE__.bloomStrength = v;
});

radiusSlider.addEventListener('input', (e) => {
  const v = parseFloat(e.target.value);
  bloomPass.radius = v;
  radiusVal.textContent = v.toFixed(2);
  window.__3D_STATE__.bloomRadius = v;
});

thresholdSlider.addEventListener('input', (e) => {
  const v = parseFloat(e.target.value);
  bloomPass.threshold = v;
  thresholdVal.textContent = v.toFixed(2);
  window.__3D_STATE__.bloomThreshold = v;
});

bloomToggle.addEventListener('click', () => {
  bloomEnabled = !bloomEnabled;
  if (bloomEnabled) {
    bloomPass.strength = savedStrength;
    bloomToggle.textContent = 'BLOOM ON';
    bloomToggle.classList.add('active');
  } else {
    savedStrength = bloomPass.strength;
    bloomPass.strength = 0;
    bloomToggle.textContent = 'BLOOM OFF';
    bloomToggle.classList.remove('active');
  }
  window.__3D_STATE__.bloomEnabled = bloomEnabled;
});

fxaaToggle.addEventListener('click', () => {
  fxaaEnabled = !fxaaEnabled;
  fxaaPass.enabled = fxaaEnabled;
  if (fxaaEnabled) {
    fxaaToggle.textContent = 'FXAA ON';
    fxaaToggle.classList.add('active');
  } else {
    fxaaToggle.textContent = 'FXAA OFF';
    fxaaToggle.classList.remove('active');
  }
  window.__3D_STATE__.fxaaEnabled = fxaaEnabled;
});

// Resize
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  fxaaPass.uniforms['resolution'].value.set(
    1 / (w * window.devicePixelRatio),
    1 / (h * window.devicePixelRatio)
  );
});

// FPS tracking
const fpsSamples = [];
const FPS_SAMPLE_COUNT = 30;
let lastTime = performance.now();

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const delta = now - lastTime;
  lastTime = now;

  // FPS calculation (sliding average)
  if (delta > 0) {
    fpsSamples.push(1000 / delta);
    if (fpsSamples.length > FPS_SAMPLE_COUNT) fpsSamples.shift();
    const avgFps = fpsSamples.reduce((a, b) => a + b, 0) / fpsSamples.length;
    window.__3D_STATE__.fps = Math.round(avgFps);
    fpsDisplay.textContent = `FPS: ${Math.round(avgFps)}`;
  }

  const t = now * 0.001;

  // Animate spheres
  for (const sphere of spheres) {
    const ud = sphere.userData;
    sphere.position.x = ud.basePos.x + Math.sin(t * ud.speed + ud.phase) * ud.amplitude;
    sphere.position.y = ud.basePos.y + Math.cos(t * ud.speed * 0.7 + ud.phase * 1.3) * ud.amplitude * 0.8;
    sphere.position.z = ud.basePos.z + Math.sin(t * ud.speed * 0.5 + ud.phase * 0.7) * ud.amplitude * 0.6;

    // Subtle emissive pulsing
    const pulse = 2.0 + Math.sin(t * ud.speed * 2 + ud.phase) * 0.8;
    sphere.material.emissiveIntensity = pulse;
  }

  orbitControls.update();

  // Update state
  window.__3D_STATE__.bloomStrength = bloomPass.strength;
  window.__3D_STATE__.bloomRadius = bloomPass.radius;
  window.__3D_STATE__.bloomThreshold = bloomPass.threshold;
  window.__3D_STATE__.bloomEnabled = bloomEnabled;
  window.__3D_STATE__.fxaaEnabled = fxaaEnabled;
  window.__3D_STATE__.objectCount = SPHERE_COUNT;

  composer.render();
}

animate();
</script>
</body>
</html>
