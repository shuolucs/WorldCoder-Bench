<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Neon Bloom</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            pointer-events: auto;
        }
        .control-group {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 250px;
        }
        .control-group label {
            font-size: 12px;
            flex: 1;
        }
        .control-group input[type="range"] {
            flex: 1;
        }
        .control-group input[type="checkbox"] {
            margin-left: 10px;
        }
        .value-display {
            display: inline-block;
            width: 30px;
            text-align: right;
            font-size: 12px;
            margin-left: 5px;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="ui-panel">
        <div class="control-group">
            <label for="bloomToggle">Enable Bloom</label>
            <input type="checkbox" id="bloomToggle" checked>
        </div>
        <div class="control-group">
            <label for="bloomStrength">Strength</label>
            <input type="range" id="bloomStrength" min="0" max="3" step="0.01" value="1.5">
            <span class="value-display" id="val-strength">1.5</span>
        </div>
        <div class="control-group">
            <label for="bloomRadius">Radius</label>
            <input type="range" id="bloomRadius" min="0" max="1" step="0.01" value="0.4">
            <span class="value-display" id="val-radius">0.4</span>
        </div>
        <div class="control-group">
            <label for="bloomThreshold">Threshold</label>
            <input type="range" id="bloomThreshold" min="0" max="1" step="0.01" value="0.1">
            <span class="value-display" id="val-threshold">0.1</span>
        </div>
        <div class="control-group">
            <label for="fxaaToggle">Enable FXAA</label>
            <input type="checkbox" id="fxaaToggle" checked>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { FXAAShader } from 'three/addons/shaders/FXAAShader.js';

        // State Initialization
        window.__3D_STATE__ = {
            bloomStrength: 1.5,
            bloomRadius: 0.4,
            bloomThreshold: 0.1,
            bloomEnabled: true,
            fxaaEnabled: true,
            objectCount: 20,
            fps: 0
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#000208');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: false }); // Disable native AA for FXAA
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Objects Setup
        const geometry = new THREE.SphereGeometry(1, 32, 32);
        const objectCount = 20;

        for (let i = 0; i < objectCount; i++) {
            const color = new THREE.Color().setHSL(Math.random(), 1.0, 0.5);
            const material = new THREE.MeshStandardMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 2.0,
                roughness: 0.2,
                metalness: 0.1
            });

            const sphere = new THREE.Mesh(geometry, material);
            
            sphere.position.x = (Math.random() - 0.5) * 20;
            sphere.position.y = (Math.random() - 0.5) * 20;
            sphere.position.z = (Math.random() - 0.5) * 20;
            
            const scale = Math.random() * 0.5 + 0.5;
            sphere.scale.set(scale, scale, scale);

            scene.add(sphere);
        }

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.1);
        scene.add(ambientLight);

        // Post-processing
        const renderScene = new RenderPass(scene, camera);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            window.__3D_STATE__.bloomStrength,
            window.__3D_STATE__.bloomRadius,
            window.__3D_STATE__.bloomThreshold
        );

        const fxaaPass = new ShaderPass(FXAAShader);
        const pixelRatio = renderer.getPixelRatio();
        fxaaPass.material.uniforms['resolution'].value.x = 1 / (window.innerWidth * pixelRatio);
        fxaaPass.material.uniforms['resolution'].value.y = 1 / (window.innerHeight * pixelRatio);

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        composer.addPass(fxaaPass);

        // UI Binding
        const elBloomToggle = document.getElementById('bloomToggle');
        const elBloomStrength = document.getElementById('bloomStrength');
        const elBloomRadius = document.getElementById('bloomRadius');
        const elBloomThreshold = document.getElementById('bloomThreshold');
        const elFxaaToggle = document.getElementById('fxaaToggle');

        const valStrength = document.getElementById('val-strength');
        const valRadius = document.getElementById('val-radius');
        const valThreshold = document.getElementById('val-threshold');

        elBloomToggle.addEventListener('change', (e) => {
            bloomPass.enabled = e.target.checked;
            window.__3D_STATE__.bloomEnabled = e.target.checked;
        });

        elBloomStrength.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            bloomPass.strength = val;
            valStrength.textContent = val.toFixed(2);
            window.__3D_STATE__.bloomStrength = val;
        });

        elBloomRadius.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            bloomPass.radius = val;
            valRadius.textContent = val.toFixed(2);
            window.__3D_STATE__.bloomRadius = val;
        });

        elBloomThreshold.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            bloomPass.threshold = val;
            valThreshold.textContent = val.toFixed(2);
            window.__3D_STATE__.bloomThreshold = val;
        });

        elFxaaToggle.addEventListener('change', (e) => {
            fxaaPass.enabled = e.target.checked;
            window.__3D_STATE__.fxaaEnabled = e.target.checked;
        });

        // Resize Handler
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();

            renderer.setSize(width, height);
            composer.setSize(width, height);

            const pr = renderer.getPixelRatio();
            fxaaPass.material.uniforms['resolution'].value.x = 1 / (width * pr);
            fxaaPass.material.uniforms['resolution'].value.y = 1 / (height * pr);
        });

        // FPS Calculation variables
        let lastTime = performance.now();
        let frames = 0;

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            controls.update();

            // FPS Calculation
            const time = performance.now();
            frames++;
            if (time >= lastTime + 1000) {
                window.__3D_STATE__.fps = Math.round((frames * 1000) / (time - lastTime));
                frames = 0;
                lastTime = time;
            }

            // Render via composer
            composer.render();
        }

        animate();
    </script>
</body>
</html>
