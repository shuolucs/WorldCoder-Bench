<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Bloom Neon Spheres</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000208;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    .panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      width: 280px;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(10, 14, 24, 0.72);
      color: #e8f0ff;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 700;
    }

    .control {
      margin: 10px 0 14px;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .control input[type="range"] {
      width: 100%;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0;
      font-size: 13px;
    }

    .value {
      color: #8fd3ff;
      font-variant-numeric: tabular-nums;
      min-width: 44px;
      text-align: right;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #9fb1d1;
      line-height: 1.45;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div class="panel">
      <h2>Bloom 控制</h2>

      <div class="control">
        <label for="bloomStrength">
          <span>Bloom Strength</span>
          <span class="value" id="bloomStrengthValue">1.50</span>
        </label>
        <input id="bloomStrength" type="range" min="0" max="3" step="0.01" value="1.5" />
      </div>

      <div class="control">
        <label for="bloomRadius">
          <span>Bloom Radius</span>
          <span class="value" id="bloomRadiusValue">0.35</span>
        </label>
        <input id="bloomRadius" type="range" min="0" max="1" step="0.01" value="0.35" />
      </div>

      <div class="control">
        <label for="bloomThreshold">
          <span>Bloom Threshold</span>
          <span class="value" id="bloomThresholdValue">0.10</span>
        </label>
        <input id="bloomThreshold" type="range" min="0" max="1" step="0.01" value="0.10" />
      </div>

      <div class="row">
        <label for="bloomToggle">启用 Bloom</label>
        <input id="bloomToggle" type="checkbox" checked />
      </div>

      <div class="row">
        <label for="fxaaToggle">启用 FXAA</label>
        <input id="fxaaToggle" type="checkbox" checked />
      </div>

      <div class="hint">
        鼠标拖拽旋转，滚轮缩放。场景中恰好 20 个随机霓虹球体。
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { FXAAShader } from 'three/addons/shaders/FXAAShader.js';

    const app = document.getElementById('app');

    const bloomStrengthEl = document.getElementById('bloomStrength');
    const bloomRadiusEl = document.getElementById('bloomRadius');
    const bloomThresholdEl = document.getElementById('bloomThreshold');
    const bloomToggleEl = document.getElementById('bloomToggle');
    const fxaaToggleEl = document.getElementById('fxaaToggle');

    const bloomStrengthValueEl = document.getElementById('bloomStrengthValue');
    const bloomRadiusValueEl = document.getElementById('bloomRadiusValue');
    const bloomThresholdValueEl = document.getElementById('bloomThresholdValue');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#000208');
    scene.fog = new THREE.Fog('#000208', 18, 42);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 4, 16);

    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 6;
    controls.maxDistance = 40;
    controls.target.set(0, 0, 0);

    const ambient = new THREE.AmbientLight(0x334455, 0.35);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.35);
    dirLight.position.set(6, 10, 8);
    scene.add(dirLight);

    const pointLight = new THREE.PointLight(0x88aaff, 1.5, 40, 2);
    pointLight.position.set(0, 5, 0);
    scene.add(pointLight);

    const stars = new THREE.Points(
      new THREE.BufferGeometry(),
      new THREE.PointsMaterial({ color: 0x6f8cff, size: 0.05, transparent: true, opacity: 0.55 })
    );
    {
      const starCount = 400;
      const positions = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i++) {
        const r = 25 + Math.random() * 25;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        positions[i * 3 + 0] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.cos(phi);
        positions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
      }
      stars.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      scene.add(stars);
    }

    const sphereGroup = new THREE.Group();
    scene.add(sphereGroup);

    const neonPalette = [
      '#ff1177', '#00f0ff', '#39ff14', '#fffb00', '#ff6b00',
      '#a100ff', '#00ffa8', '#ff2bd6', '#00c3ff', '#ff1744',
      '#7cff00', '#00ffd5', '#ff8a00', '#8a2bff', '#00e5ff'
    ];

    const sphereGeometry = new THREE.SphereGeometry(0.7, 32, 32);
    const objectCount = 20;
    const sphereData = [];

    for (let i = 0; i < objectCount; i++) {
      const color = new THREE.Color(neonPalette[Math.floor(Math.random() * neonPalette.length)]);
      color.offsetHSL((Math.random() - 0.5) * 0.08, 0, 0);

      const material = new THREE.MeshStandardMaterial({
        color,
        emissive: color.clone().multiplyScalar(1.8),
        emissiveIntensity: 1.8 + Math.random() * 1.6,
        roughness: 0.22,
        metalness: 0.05
      });

      const mesh = new THREE.Mesh(sphereGeometry, material);

      const radius = 5 + Math.random() * 7;
      const angle = Math.random() * Math.PI * 2;
      const height = (Math.random() - 0.5) * 7;

      mesh.position.set(
        Math.cos(angle) * radius + (Math.random() - 0.5) * 1.5,
        height,
        Math.sin(angle) * radius + (Math.random() - 0.5) * 1.5
      );

      const scale = 0.75 + Math.random() * 1.35;
      mesh.scale.setScalar(scale);

      sphereGroup.add(mesh);

      sphereData.push({
        mesh,
        baseY: mesh.position.y,
        phase: Math.random() * Math.PI * 2,
        speed: 0.5 + Math.random() * 1.0,
        orbitRadius: Math.sqrt(mesh.position.x * mesh.position.x + mesh.position.z * mesh.position.z),
        orbitAngle: Math.atan2(mesh.position.z, mesh.position.x),
        orbitSpeed: (Math.random() - 0.5) * 0.18
      });
    }

    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      parseFloat(bloomStrengthEl.value),
      parseFloat(bloomRadiusEl.value),
      parseFloat(bloomThresholdEl.value)
    );
    composer.addPass(bloomPass);

    const fxaaPass = new ShaderPass(FXAAShader);
    composer.addPass(fxaaPass);

    function updateFXAAResolution() {
      const pixelRatio = renderer.getPixelRatio();
      fxaaPass.material.uniforms['resolution'].value.set(
        1 / (window.innerWidth * pixelRatio),
        1 / (window.innerHeight * pixelRatio)
      );
    }
    updateFXAAResolution();

    function syncUI() {
      bloomStrengthValueEl.textContent = Number(bloomStrengthEl.value).toFixed(2);
      bloomRadiusValueEl.textContent = Number(bloomRadiusEl.value).toFixed(2);
      bloomThresholdValueEl.textContent = Number(bloomThresholdEl.value).toFixed(2);

      bloomPass.strength = Number(bloomStrengthEl.value);
      bloomPass.radius = Number(bloomRadiusEl.value);
      bloomPass.threshold = Number(bloomThresholdEl.value);

      bloomPass.enabled = bloomToggleEl.checked;
      fxaaPass.enabled = fxaaToggleEl.checked;
    }

    bloomStrengthEl.addEventListener('input', syncUI);
    bloomRadiusEl.addEventListener('input', syncUI);
    bloomThresholdEl.addEventListener('input', syncUI);
    bloomToggleEl.addEventListener('change', syncUI);
    fxaaToggleEl.addEventListener('change', syncUI);
    syncUI();

    window.__3D_STATE__ = {
      bloomStrength: Number(bloomStrengthEl.value),
      bloomRadius: Number(bloomRadiusEl.value),
      bloomThreshold: Number(bloomThresholdEl.value),
      bloomEnabled: bloomToggleEl.checked,
      fxaaEnabled: fxaaToggleEl.checked,
      objectCount,
      fps: 0
    };

    window.addEventListener('resize', () => {
      const w = window.innerWidth;
      const h = window.innerHeight;

      camera.aspect = w / h;
      camera.updateProjectionMatrix();

      renderer.setSize(w, h);
      composer.setSize(w, h);
      bloomPass.setSize(w, h);
      updateFXAAResolution();
    });

    const clock = new THREE.Clock();
    let fpsSmoothed = 60;

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();
      const delta = Math.max(clock.getDelta(), 1e-5);
      const fpsInstant = 1 / delta;
      fpsSmoothed = THREE.MathUtils.lerp(fpsSmoothed, fpsInstant, 0.08);

      for (const item of sphereData) {
        const t = elapsed * item.speed + item.phase;
        item.mesh.position.y = item.baseY + Math.sin(t) * 0.35;

        item.orbitAngle += item.orbitSpeed * delta;
        item.mesh.position.x = Math.cos(item.orbitAngle) * item.orbitRadius;
        item.mesh.position.z = Math.sin(item.orbitAngle) * item.orbitRadius;

        item.mesh.rotation.y += 0.25 * delta;
        item.mesh.rotation.x += 0.15 * delta;
      }

      stars.rotation.y += 0.01 * delta;
      controls.update();

      window.__3D_STATE__.bloomStrength = Number(bloomStrengthEl.value);
      window.__3D_STATE__.bloomRadius = Number(bloomRadiusEl.value);
      window.__3D_STATE__.bloomThreshold = Number(bloomThresholdEl.value);
      window.__3D_STATE__.bloomEnabled = bloomToggleEl.checked;
      window.__3D_STATE__.fxaaEnabled = fxaaToggleEl.checked;
      window.__3D_STATE__.objectCount = objectCount;
      window.__3D_STATE__.fps = Number(fpsSmoothed.toFixed(2));

      composer.render();
    }

    animate();
  </script>
</body>
</html>
