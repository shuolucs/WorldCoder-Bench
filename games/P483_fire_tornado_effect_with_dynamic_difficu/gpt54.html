<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Fire Tornado Ferrari</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a0a;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }
    canvas {
      display: block;
    }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 12px 14px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,120,40,0.35);
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
      min-width: 220px;
      pointer-events: none;
    }
    #toggleWind {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 11;
      padding: 10px 14px;
      border: 1px solid rgba(255,140,60,0.5);
      border-radius: 8px;
      background: rgba(20,20,20,0.85);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    #toggleWind:hover {
      background: rgba(40,40,40,0.95);
    }
  </style>
</head>
<body>
  <div id="hud"></div>
  <button id="toggleWind">Wind: OFF</button>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const BG_COLOR = 0x0a0a0a;
    const hud = document.getElementById("hud");
    const windBtn = document.getElementById("toggleWind");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(BG_COLOR);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.2, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0x331100, 0.3);
    scene.add(ambient);

    const pointLight = new THREE.PointLight(0xff4400, 2, 40, 2);
    pointLight.position.set(0, 8, 0);
    scene.add(pointLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0x1e1e1e, roughness: 0.95, metalness: 0.05 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    let car = null;
    let modelLoaded = false;
    const loader = new GLTFLoader();
    loader.load(
      "ferrari.glb",
      (gltf) => {
        car = gltf.scene;
        const box = new THREE.Box3().setFromObject(car);
        const size = new THREE.Vector3();
        box.getSize(size);
        const scale = size.x > 0 ? 3 / size.x : 1;
        car.scale.setScalar(scale);

        const box2 = new THREE.Box3().setFromObject(car);
        const center = new THREE.Vector3();
        box2.getCenter(center);
        car.position.sub(center);
        car.position.y -= box2.min.y;

        scene.add(car);
        modelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn("Failed to load ferrari.glb:", err);
      }
    );

    const difficultyLabels = {
      1: "Ember",
      2: "Blaze",
      3: "Inferno",
      4: "Firestorm",
      5: "Apocalypse"
    };

    const difficultyConfigs = {
      1: { particles: 2000, rMin: 1.5, rMax: 3.0, rot: 1.0, turb: 0.15, colorInt: 0.9, breakaway: 0.00, ember: 0.00, wind: 0.25 },
      2: { particles: 3000, rMin: 1.4, rMax: 3.3, rot: 1.5, turb: 0.30, colorInt: 1.0, breakaway: 0.00, ember: 0.00, wind: 0.35 },
      3: { particles: 4000, rMin: 1.3, rMax: 3.6, rot: 2.1, turb: 0.50, colorInt: 1.1, breakaway: 0.02, ember: 0.02, wind: 0.50 },
      4: { particles: 5000, rMin: 1.2, rMax: 3.8, rot: 2.8, turb: 0.85, colorInt: 1.2, breakaway: 0.06, ember: 0.06, wind: 0.70 },
      5: { particles: 6000, rMin: 1.0, rMax: 4.0, rot: 3.6, turb: 1.25, colorInt: 1.35, breakaway: 0.12, ember: 0.12, wind: 0.95 }
    };

    let difficultyLevel = 1;
    let paused = false;
    let windEnabled = false;
    let elapsedTime = 0;

    const MAX_PARTICLES = 6000;
    let activeCount = difficultyConfigs[difficultyLevel].particles;

    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(MAX_PARTICLES * 3);
    const colors = new Float32Array(MAX_PARTICLES * 3);
    const sizes = new Float32Array(MAX_PARTICLES);

    const baseAngle = new Float32Array(MAX_PARTICLES);
    const radius = new Float32Array(MAX_PARTICLES);
    const yPos = new Float32Array(MAX_PARTICLES);
    const verticalSpeed = new Float32Array(MAX_PARTICLES);
    const lifetime = new Float32Array(MAX_PARTICLES);
    const age = new Float32Array(MAX_PARTICLES);
    const sizeData = new Float32Array(MAX_PARTICLES);
    const driftX = new Float32Array(MAX_PARTICLES);
    const driftZ = new Float32Array(MAX_PARTICLES);
    const seed = new Float32Array(MAX_PARTICLES);

    function clampFinite(v, min, max, fallback = 0) {
      if (!Number.isFinite(v)) return fallback;
      return Math.min(max, Math.max(min, v));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function smoothNoise(a, b, c) {
      return Math.sin(a * 1.37 + c) * 0.5 + Math.cos(b * 1.91 - c * 0.7) * 0.5;
    }

    function getColorForHeight(t, intensity) {
      const col = new THREE.Color();
      if (t < 0.55) {
        const k = t / 0.55;
        col.setRGB(
          lerp(1.0, 1.0, k),
          lerp(0.95, 0.35, k),
          lerp(0.15, 0.02, k)
        );
      } else if (t < 0.85) {
        const k = (t - 0.55) / 0.30;
        col.setRGB(
          lerp(1.0, 0.35, k),
          lerp(0.35, 0.05, k),
          lerp(0.02, 0.02, k)
        );
      } else {
        const k = (t - 0.85) / 0.15;
        col.setRGB(
          lerp(0.35, 0.12, k),
          lerp(0.05, 0.12, k),
          lerp(0.02, 0.12, k)
        );
      }
      col.multiplyScalar(intensity);
      col.r = Math.min(1, col.r);
      col.g = Math.min(1, col.g);
      col.b = Math.min(1, col.b);
      return col;
    }

    function respawnParticle(i, cfg, randomizeY = false) {
      const y = randomizeY ? Math.random() * 15 : 0;
      yPos[i] = y;
      baseAngle[i] = Math.random() * Math.PI * 2;
      radius[i] = lerp(cfg.rMin, cfg.rMax, Math.random());
      verticalSpeed[i] = lerp(2.0, 5.0, Math.random());
      lifetime[i] = lerp(2.5, 6.0, Math.random());
      age[i] = Math.random() * lifetime[i] * (randomizeY ? 1 : 0);
      sizeData[i] = lerp(0.05, 0.3, 1 - Math.min(y / 15, 1));
      driftX[i] = 0;
      driftZ[i] = 0;
      seed[i] = Math.random() * 1000;
    }

    for (let i = 0; i < MAX_PARTICLES; i++) {
      respawnParticle(i, difficultyConfigs[1], true);
    }

    geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute("aSize", new THREE.BufferAttribute(sizes, 1));
    geometry.setDrawRange(0, activeCount);

    const particleMaterial = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      vertexColors: true,
      uniforms: {
        uPixelRatio: { value: renderer.getPixelRatio() }
      },
      vertexShader: `
        attribute float aSize;
        varying vec3 vColor;
        void main() {
          vColor = color;
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = aSize * 220.0 * uPixelRatio / max(1.0, -mvPosition.z);
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        varying vec3 vColor;
        void main() {
          vec2 uv = gl_PointCoord - vec2(0.5);
          float d = length(uv);
          float alpha = smoothstep(0.5, 0.0, d);
          alpha *= 1.2;
          gl_FragColor = vec4(vColor, alpha);
        }
      `
    });

    const points = new THREE.Points(geometry, particleMaterial);
    scene.add(points);

    function applyDifficulty(level) {
      difficultyLevel = Math.max(1, Math.min(5, level));
      activeCount = difficultyConfigs[difficultyLevel].particles;
      geometry.setDrawRange(0, activeCount);
      const cfg = difficultyConfigs[difficultyLevel];
      for (let i = 0; i < activeCount; i++) {
        if (radius[i] < cfg.rMin || radius[i] > cfg.rMax) {
          respawnParticle(i, cfg, true);
        }
      }
    }

    function resetState() {
      paused = false;
      windEnabled = false;
      elapsedTime = 0;
      windBtn.textContent = "Wind: OFF";
      applyDifficulty(1);
      camera.position.set(0, 5, 12);
      controls.target.set(0, 1.2, 0);
      controls.update();
      for (let i = 0; i < MAX_PARTICLES; i++) {
        respawnParticle(i, difficultyConfigs[1], true);
      }
    }

    windBtn.addEventListener("click", () => {
      windEnabled = !windEnabled;
      windBtn.textContent = `Wind: ${windEnabled ? "ON" : "OFF"}`;
    });

    window.addEventListener("keydown", (e) => {
      if (e.key >= "1" && e.key <= "5") {
        applyDifficulty(parseInt(e.key, 10));
      } else if (e.key === "ArrowUp") {
        applyDifficulty(difficultyLevel + 1);
      } else if (e.key === "ArrowDown") {
        applyDifficulty(difficultyLevel - 1);
      } else if (e.code === "Space") {
        e.preventDefault();
        paused = !paused;
      } else if (e.key === "r" || e.key === "R") {
        resetState();
      }
    });

    window.__3D_STATE__ = {
      difficultyLevel: 1,
      difficultyLabel: difficultyLabels[1],
      particleCount: activeCount,
      tornadoActive: true,
      windEnabled: false,
      carRotationY: 0,
      modelLoaded: false,
      fps: 0,
      maxParticleHeight: 0,
      tornadoRadius: 0,
      elapsedTime: 0
    };

    let lastTime = performance.now();
    let fps = 0;

    function animate(now) {
      requestAnimationFrame(animate);

      const dtRaw = (now - lastTime) / 1000;
      lastTime = now;
      const dt = Math.min(Math.max(dtRaw, 0.0001), 0.05);
      fps = 1 / dt;

      controls.update();

      if (car) {
        car.rotation.y += 0.3 * dt;
      }

      const cfg = difficultyConfigs[difficultyLevel];
      let maxY = 0;
      let radiusSum = 0;

      if (!paused) {
        elapsedTime += dt;
        for (let i = 0; i < activeCount; i++) {
          age[i] += dt;
          yPos[i] += verticalSpeed[i] * dt;

          if (yPos[i] > 15 || age[i] > lifetime[i]) {
            respawnParticle(i, cfg, false);
          }

          const h = clampFinite(yPos[i] / 15, 0, 1, 0);
          const osc = 0.5 + 0.5 * Math.sin(elapsedTime * 1.3 + seed[i] + h * 8.0);
          let r = lerp(cfg.rMin, cfg.rMax, osc * (0.65 + 0.35 * Math.sin(seed[i] * 0.11 + elapsedTime * 0.7)));
          r += Math.sin(elapsedTime * 2.1 + seed[i] * 2.0) * 0.08 * difficultyLevel;

          const angularVel = cfg.rot * (1.0 + h * (1.5 + difficultyLevel * 0.2));
          baseAngle[i] += angularVel * dt;

          const turb = cfg.turb;
          const n1 = smoothNoise(elapsedTime * 2.3 + seed[i], yPos[i] * 0.7, seed[i]);
          const n2 = smoothNoise(elapsedTime * 1.7 - seed[i], yPos[i] * 0.5, seed[i] * 0.7);

          driftX[i] += n1 * turb * 0.03;
          driftZ[i] += n2 * turb * 0.03;

          driftX[i] *= 0.96;
          driftZ[i] *= 0.96;

          if (Math.random() < cfg.breakaway * dt) {
            driftX[i] += (Math.random() - 0.5) * 1.5;
            driftZ[i] += (Math.random() - 0.5) * 1.5;
          }

          if (Math.random() < cfg.ember * dt && h > 0.6) {
            driftX[i] += (Math.random() - 0.5) * 2.5;
            driftZ[i] += (Math.random() - 0.5) * 2.5;
            yPos[i] += Math.random() * 0.3;
          }

          const windForce = windEnabled ? cfg.wind * 0.35 : 0;
          const x = Math.cos(baseAngle[i]) * r + driftX[i] + windForce * yPos[i] * 0.08;
          const z = Math.sin(baseAngle[i]) * r + driftZ[i];

          positions[i * 3 + 0] = clampFinite(x, -100, 100, 0);
          positions[i * 3 + 1] = clampFinite(yPos[i], 0, 100, 0);
          positions[i * 3 + 2] = clampFinite(z, -100, 100, 0);

          const c = getColorForHeight(h, cfg.colorInt);
          colors[i * 3 + 0] = c.r;
          colors[i * 3 + 1] = c.g;
          colors[i * 3 + 2] = c.b;

          sizes[i] = lerp(0.3, 0.05, h) * (0.85 + 0.3 * Math.sin(seed[i] + elapsedTime * 8.0));
          sizes[i] = clampFinite(Math.abs(sizes[i]), 0.02, 0.4, 0.08);

          maxY = Math.max(maxY, positions[i * 3 + 1]);
          radiusSum += Math.sqrt(
            positions[i * 3 + 0] * positions[i * 3 + 0] +
            positions[i * 3 + 2] * positions[i * 3 + 2]
          );
        }
      } else {
        for (let i = 0; i < activeCount; i++) {
          maxY = Math.max(maxY, positions[i * 3 + 1] || 0);
          radiusSum += Math.sqrt(
            (positions[i * 3 + 0] || 0) * (positions[i * 3 + 0] || 0) +
            (positions[i * 3 + 2] || 0) * (positions[i * 3 + 2] || 0)
          );
        }
      }

      geometry.attributes.position.needsUpdate = true;
      geometry.attributes.color.needsUpdate = true;
      geometry.attributes.aSize.needsUpdate = true;

      const avgRadius = activeCount > 0 ? radiusSum / activeCount : 0;

      hud.innerHTML = `
        <strong>Fire Tornado HUD</strong><br>
        Difficulty: Level ${difficultyLevel}: ${difficultyLabels[difficultyLevel]}<br>
        Particles: ${activeCount}<br>
        FPS: ${fps.toFixed(1)}<br>
        Status: ${paused ? "Paused" : "Active"}<br>
        Wind: ${windEnabled ? "ON" : "OFF"}
      `;

      window.__3D_STATE__.difficultyLevel = difficultyLevel;
      window.__3D_STATE__.difficultyLabel = difficultyLabels[difficultyLevel];
      window.__3D_STATE__.particleCount = activeCount;
      window.__3D_STATE__.tornadoActive = !paused;
      window.__3D_STATE__.windEnabled = windEnabled;
      window.__3D_STATE__.carRotationY = car ? car.rotation.y : 0;
      window.__3D_STATE__.modelLoaded = modelLoaded;
      window.__3D_STATE__.fps = fps;
      window.__3D_STATE__.maxParticleHeight = maxY;
      window.__3D_STATE__.tornadoRadius = avgRadius;
      window.__3D_STATE__.elapsedTime = elapsedTime;

      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      particleMaterial.uniforms.uPixelRatio.value = renderer.getPixelRatio();
    });

    resetState();
    animate(performance.now());
  </script>
</body>
</html>
