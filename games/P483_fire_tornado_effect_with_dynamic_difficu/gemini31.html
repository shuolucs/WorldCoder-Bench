<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferrari Fire Tornado</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 1px solid #ff4400;
            border-radius: 5px;
            pointer-events: none;
            text-shadow: 1px 1px 2px #000;
            min-width: 250px;
        }
        #hud h2 {
            margin: 0 0 10px 0;
            color: #ff8800;
            font-size: 1.2rem;
        }
        .hud-line {
            margin: 5px 0;
            font-size: 0.9rem;
        }
        .val {
            color: #ffaa00;
            font-weight: bold;
        }
        #controls-help {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            font-size: 0.8rem;
            color: #aaa;
            pointer-events: none;
            border-radius: 5px;
        }
        #toggleWind {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #222;
            color: #fff;
            border: 1px solid #ff4400;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
            pointer-events: auto;
        }
        #toggleWind:hover {
            background: #ff4400;
            color: #000;
        }
        #toggleWind.active {
            background: #ff4400;
            color: #000;
            box-shadow: 0 0 10px #ff4400;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <h2 id="hud-level-label">Level 1: Ember</h2>
        <div class="hud-line">Difficulty: <span id="hud-level" class="val">1</span></div>
        <div class="hud-line">Particles: <span id="hud-particles" class="val">2000</span></div>
        <div class="hud-line">Status: <span id="hud-status" class="val">Active</span></div>
        <div class="hud-line">FPS: <span id="hud-fps" class="val">0</span></div>
    </div>

    <button id="toggleWind">Wind: OFF</button>

    <div id="controls-help">
        [1-5] Set Level | [↑/↓] Change Level | [Space] Pause/Resume | [R] Reset
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            difficultyLevel: 1,
            difficultyLabel: 'Ember',
            particleCount: 2000,
            tornadoActive: true,
            windEnabled: false,
            carRotationY: 0,
            modelLoaded: false,
            fps: 0,
            maxParticleHeight: 0,
            tornadoRadius: 0,
            elapsedTime: 0
        };

        const DIFFICULTY_CONFIG = {
            1: { label: 'Ember', count: 2000, minRad: 1.5, maxRad: 2.5, rotSpeed: 1.0, turb: 0.1, colorInt: 0.8, windForce: 2, breakaway: false },
            2: { label: 'Blaze', count: 3000, minRad: 1.5, maxRad: 3.0, rotSpeed: 1.5, turb: 0.3, colorInt: 1.0, windForce: 3, breakaway: false },
            3: { label: 'Inferno', count: 4000, minRad: 1.5, maxRad: 3.5, rotSpeed: 2.0, turb: 0.6, colorInt: 1.2, windForce: 4, breakaway: false },
            4: { label: 'Firestorm', count: 5000, minRad: 1.5, maxRad: 4.0, rotSpeed: 2.8, turb: 1.2, colorInt: 1.5, windForce: 6, breakaway: true },
            5: { label: 'Apocalypse', count: 6000, minRad: 1.5, maxRad: 5.0, rotSpeed: 4.0, turb: 2.0, colorInt: 2.0, windForce: 9, breakaway: true }
        };

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        scene.fog = new THREE.FogExp2(0x0a0a0a, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1; // Allow looking slightly below ground

        // Lights
        const ambientLight = new THREE.AmbientLight(0x331100, 0.3);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xff4400, 2, 50);
        pointLight.position.set(0, 8, 0);
        scene.add(pointLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x111111,
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Grid helper for aesthetics
        const grid = new THREE.GridHelper(20, 20, 0x333333, 0x222222);
        grid.position.y = 0.01;
        scene.add(grid);

        // --- CAR MODEL ---
        const carGroup = new THREE.Group();
        scene.add(carGroup);

        // Fallback car (red box) in case GLTF fails or is missing
        const fallbackGeo = new THREE.BoxGeometry(3, 0.8, 6);
        const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, roughness: 0.4, metalness: 0.6 });
        const fallbackCar = new THREE.Mesh(fallbackGeo, fallbackMat);
        fallbackCar.position.y = 0.4;
        carGroup.add(fallbackCar);

        const loader = new GLTFLoader();
        loader.load('ferrari.glb', (gltf) => {
            carGroup.remove(fallbackCar);
            const model = gltf.scene;
            
            // Scale to roughly 3 units wide
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const scale = 3 / size.x;
            model.scale.setScalar(scale);
            
            // Center model
            box.setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            model.position.y = 0; // Ground level
            
            carGroup.add(model);
            window.__3D_STATE__.modelLoaded = true;
        }, undefined, (error) => {
            console.warn("Could not load ferrari.glb, using fallback geometry.", error);
        });

        // --- FIRE TORNADO PARTICLE SYSTEM ---
        const MAX_PARTICLES = 6000;
        const particleGeo = new THREE.BufferGeometry();
        
        const positions = new Float32Array(MAX_PARTICLES * 3);
        const colors = new Float32Array(MAX_PARTICLES * 3);
        const sizes = new Float32Array(MAX_PARTICLES);
        
        // Custom attributes for logic
        const pData = [];

        for (let i = 0; i < MAX_PARTICLES; i++) {
            pData.push({
                angle: Math.random() * Math.PI * 2,
                baseRadius: 1.5 + Math.random() * 2.5,
                speedY: 2 + Math.random() * 3,
                life: Math.random() * 5,
                maxLife: 2 + Math.random() * 3,
                baseSize: 0.05 + Math.random() * 0.25,
                phaseOffset: Math.random() * Math.PI * 2
            });
            
            // Initialize hidden
            positions[i * 3] = 0;
            positions[i * 3 + 1] = -100;
            positions[i * 3 + 2] = 0;
        }

        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const particleMat = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 }
            },
            vertexShader: `
                attribute float size;
                attribute vec3 color;
                varying vec3 vColor;
                void main() {
                    vColor = color;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = size * (50.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                void main() {
                    vec2 xy = gl_PointCoord.xy - vec2(0.5);
                    float ll = length(xy);
                    if(ll > 0.5) discard;
                    
                    // Soft particle edge
                    float alpha = pow((0.5 - ll) * 2.0, 1.5);
                    gl_FragColor = vec4(vColor, alpha);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(particleGeo, particleMat);
        scene.add(particleSystem);

        // --- INPUT HANDLING ---
        const setDifficulty = (level) => {
            level = Math.max(1, Math.min(5, level));
            window.__3D_STATE__.difficultyLevel = level;
            window.__3D_STATE__.difficultyLabel = DIFFICULTY_CONFIG[level].label;
            window.__3D_STATE__.particleCount = DIFFICULTY_CONFIG[level].count;
            updateHUD();
        };

        window.addEventListener('keydown', (e) => {
            if (e.key >= '1' && e.key <= '5') {
                setDifficulty(parseInt(e.key));
            } else if (e.key === 'ArrowUp') {
                setDifficulty(window.__3D_STATE__.difficultyLevel + 1);
            } else if (e.key === 'ArrowDown') {
                setDifficulty(window.__3D_STATE__.difficultyLevel - 1);
            } else if (e.key === ' ') {
                window.__3D_STATE__.tornadoActive = !window.__3D_STATE__.tornadoActive;
                updateHUD();
            } else if (e.key.toLowerCase() === 'r') {
                setDifficulty(1);
                window.__3D_STATE__.tornadoActive = true;
                window.__3D_STATE__.windEnabled = false;
                document.getElementById('toggleWind').classList.remove('active');
                document.getElementById('toggleWind').innerText = 'Wind: OFF';
                camera.position.set(0, 5, 12);
                controls.target.set(0, 0, 0);
                updateHUD();
            }
        });

        const windBtn = document.getElementById('toggleWind');
        windBtn.addEventListener('click', () => {
            window.__3D_STATE__.windEnabled = !window.__3D_STATE__.windEnabled;
            if (window.__3D_STATE__.windEnabled) {
                windBtn.classList.add('active');
                windBtn.innerText = 'Wind: ON';
            } else {
                windBtn.classList.remove('active');
                windBtn.innerText = 'Wind: OFF';
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- HUD UPDATE ---
        const elLevelLabel = document.getElementById('hud-level-label');
        const elLevel = document.getElementById('hud-level');
        const elParticles = document.getElementById('hud-particles');
        const elStatus = document.getElementById('hud-status');
        const elFps = document.getElementById('hud-fps');

        function updateHUD() {
            const state = window.__3D_STATE__;
            elLevelLabel.innerText = `Level ${state.difficultyLevel}: ${state.difficultyLabel}`;
            elLevel.innerText = state.difficultyLevel;
            elParticles.innerText = state.particleCount;
            elStatus.innerText = state.tornadoActive ? 'Active' : 'Paused';
            elStatus.style.color = state.tornadoActive ? '#00ff00' : '#ff0000';
        }

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();
        let frames = 0;
        let prevTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1); // Cap dt to prevent huge jumps
            const time = clock.getElapsedTime();
            const state = window.__3D_STATE__;
            const config = DIFFICULTY_CONFIG[state.difficultyLevel];

            // FPS Calculation
            frames++;
            const currTime = performance.now();
            if (currTime >= prevTime + 1000) {
                state.fps = Math.round((frames * 1000) / (currTime - prevTime));
                elFps.innerText = state.fps;
                frames = 0;
                prevTime = currTime;
            }

            // Car Rotation
            carGroup.rotation.y += 0.3 * dt;
            state.carRotationY = carGroup.rotation.y;

            // Tornado Logic
            if (state.tornadoActive) {
                state.elapsedTime += dt;
                let maxH = 0;
                let sumR = 0;
                let activeCount = 0;

                const posAttr = particleGeo.attributes.position.array;
                const colAttr = particleGeo.attributes.color.array;
                const sizeAttr = particleGeo.attributes.size.array;

                for (let i = 0; i < MAX_PARTICLES; i++) {
                    if (i >= state.particleCount) {
                        posAttr[i * 3 + 1] = -100; // Hide unused particles
                        continue;
                    }

                    activeCount++;
                    let p = pData[i];
                    p.life -= dt;
                    let y = posAttr[i * 3 + 1];

                    // Respawn
                    if (p.life <= 0 || y > 15 || y < 0) {
                        p.life = p.maxLife;
                        y = 0;
                        p.angle = Math.random() * Math.PI * 2;
                        p.baseRadius = config.minRad + Math.random() * (config.maxRad - config.minRad);
                    }

                    // Vertical movement
                    y += p.speedY * dt;

                    // Angular movement (faster at top)
                    let angVel = config.rotSpeed * (1 + y * 0.15);
                    p.angle += angVel * dt;

                    // Radius shaping (hourglass/funnel)
                    let rShape = p.baseRadius * (1 - 0.4 * Math.sin((y / 15) * Math.PI));
                    
                    // Turbulence (pseudo-noise)
                    let turbX = Math.sin(y * 1.5 + state.elapsedTime * 2 + p.phaseOffset) * config.turb;
                    let turbZ = Math.cos(y * 1.8 + state.elapsedTime * 2.5 + p.phaseOffset) * config.turb;

                    // Breakaway embers for higher levels
                    if (config.breakaway && Math.random() < 0.005 * state.difficultyLevel) {
                        turbX += (Math.random() - 0.5) * 5;
                        turbZ += (Math.random() - 0.5) * 5;
                    }

                    let x = Math.cos(p.angle) * rShape + turbX;
                    let z = Math.sin(p.angle) * rShape + turbZ;

                    // Wind effect
                    if (state.windEnabled) {
                        x += (y / 15) * config.windForce;
                    }

                    // NaN prevention
                    x = isNaN(x) ? 0 : x;
                    y = isNaN(y) ? 0 : y;
                    z = isNaN(z) ? 0 : z;

                    posAttr[i * 3] = x;
                    posAttr[i * 3 + 1] = y;
                    posAttr[i * 3 + 2] = z;

                    maxH = Math.max(maxH, y);
                    sumR += Math.sqrt(x*x + z*z);

                    // Coloring based on height
                    let normY = Math.max(0, Math.min(1, y / 15));
                    let r, g, b;
                    
                    if (normY < 0.2) {
                        // Bright Yellow base
                        let t = normY / 0.2;
                        r = 1; g = 1 - 0.5 * t; b = 0.2 * (1-t);
                    } else if (normY < 0.6) {
                        // Orange to Red
                        let t = (normY - 0.2) / 0.4;
                        r = 1; g = 0.5 - 0.5 * t; b = 0;
                    } else if (normY < 0.8) {
                        // Deep Red
                        let t = (normY - 0.6) / 0.2;
                        r = 1 - 0.6 * t; g = 0; b = 0;
                    } else {
                        // Dark Smoke
                        let t = (normY - 0.8) / 0.2;
                        r = 0.4 * (1-t) + 0.05; 
                        g = 0.1 * (1-t) + 0.05; 
                        b = 0.1 * (1-t) + 0.05;
                    }

                    // Apply intensity
                    r = Math.min(1, r * config.colorInt);
                    g = Math.min(1, g * config.colorInt);
                    b = Math.min(1, b * config.colorInt);

                    colAttr[i * 3] = r;
                    colAttr[i * 3 + 1] = g;
                    colAttr[i * 3 + 2] = b;

                    // Size (larger at base, smaller at top)
                    sizeAttr[i] = p.baseSize * (1.5 - normY);
                }

                particleGeo.attributes.position.needsUpdate = true;
                particleGeo.attributes.color.needsUpdate = true;
                particleGeo.attributes.size.needsUpdate = true;

                state.maxParticleHeight = maxH;
                state.tornadoRadius = activeCount > 0 ? sumR / activeCount : 0;
                
                // Dynamic light intensity based on tornado
                pointLight.intensity = 2 + Math.sin(state.elapsedTime * 10) * 0.5 * (state.difficultyLevel / 2);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Init
        updateHUD();
        animate();
    </script>
</body>
</html>
