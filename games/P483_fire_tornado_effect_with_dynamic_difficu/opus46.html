<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fire Tornado Ferrari</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a0a; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #ff6600;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    background: rgba(0,0,0,0.7);
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #ff4400;
    min-width: 250px;
    text-shadow: 0 0 5px #ff4400;
    z-index: 10;
}
#hud h2 {
    color: #ffaa00;
    margin-bottom: 8px;
    font-size: 16px;
}
#hud .stat {
    margin: 4px 0;
    display: flex;
    justify-content: space-between;
}
#hud .stat .label { color: #cc5500; }
#hud .stat .value { color: #ffcc00; }
#toggleWind {
    position: absolute;
    top: 10px;
    right: 10px;
    padding: 10px 20px;
    background: rgba(255, 68, 0, 0.3);
    color: #ffaa00;
    border: 1px solid #ff4400;
    border-radius: 5px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    cursor: pointer;
    z-index: 10;
    transition: all 0.3s;
}
#toggleWind:hover {
    background: rgba(255, 68, 0, 0.6);
    color: #ffffff;
}
#controls-info {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #884400;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    background: rgba(0,0,0,0.5);
    padding: 8px 15px;
    border-radius: 5px;
    text-align: center;
    z-index: 10;
}
</style>
</head>
<body>

<div id="hud">
    <h2>🔥 FIRE TORNADO 🔥</h2>
    <div class="stat"><span class="label">Difficulty:</span><span class="value" id="hud-difficulty">Level 1: Ember</span></div>
    <div class="stat"><span class="label">Particles:</span><span class="value" id="hud-particles">0</span></div>
    <div class="stat"><span class="label">FPS:</span><span class="value" id="hud-fps">0</span></div>
    <div class="stat"><span class="label">Tornado:</span><span class="value" id="hud-status">Active</span></div>
</div>

<button id="toggleWind">Wind: OFF</button>

<div id="controls-info">
    [1-5] Set Difficulty | [↑↓] Adjust Level | [Space] Pause | [R] Reset | Mouse: Orbit
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
const state = {
    difficultyLevel: 1,
    difficultyLabel: 'Ember',
    particleCount: 0,
    tornadoActive: true,
    windEnabled: false,
    carRotationY: 0,
    modelLoaded: false,
    fps: 0,
    maxParticleHeight: 0,
    tornadoRadius: 2.5,
    elapsedTime: 0
};
window.__3D_STATE__ = state;

const difficultyLabels = { 1: 'Ember', 2: 'Blaze', 3: 'Inferno', 4: 'Firestorm', 5: 'Apocalypse' };

const difficultySettings = {
    1: { particleMultiplier: 1.0, radiusMin: 1.5, radiusMax: 4.0, rotSpeed: 1.0, turbulence: 0.1, colorIntensity: 0.8 },
    2: { particleMultiplier: 1.5, radiusMin: 1.3, radiusMax: 4.2, rotSpeed: 1.5, turbulence: 0.25, colorIntensity: 0.9 },
    3: { particleMultiplier: 2.0, radiusMin: 1.2, radiusMax: 4.5, rotSpeed: 2.2, turbulence: 0.45, colorIntensity: 1.0 },
    4: { particleMultiplier: 2.5, radiusMin: 1.0, radiusMax: 5.0, rotSpeed: 3.0, turbulence: 0.7, colorIntensity: 1.1 },
    5: { particleMultiplier: 3.0, radiusMin: 0.8, radiusMax: 5.5, rotSpeed: 4.0, turbulence: 1.0, colorIntensity: 1.2 }
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);
scene.fog = new THREE.FogExp2(0x0a0a0a, 0.03);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1.5, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0x331100, 0.3);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xff4400, 2, 30);
pointLight.position.set(0, 8, 0);
scene.add(pointLight);

const pointLight2 = new THREE.PointLight(0xff6600, 1, 20);
pointLight2.position.set(0, 2, 0);
scene.add(pointLight2);

// Ground plane
const groundGeom = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x1a1a1a,
    roughness: 0.9,
    metalness: 0.1
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Car model
let carModel = null;
const carGroup = new THREE.Group();
scene.add(carGroup);

// Create a placeholder car
function createPlaceholderCar() {
    const group = new THREE.Group();
    
    // Body
    const bodyGeom = new THREE.BoxGeometry(3, 0.6, 1.4);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, metalness: 0.8, roughness: 0.2 });
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    body.position.y = 0.5;
    group.add(body);
    
    // Cabin
    const cabinGeom = new THREE.BoxGeometry(1.5, 0.5, 1.2);
    const cabinMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.5, roughness: 0.3 });
    const cabin = new THREE.Mesh(cabinGeom, cabinMat);
    cabin.position.set(-0.2, 1.0, 0);
    group.add(cabin);
    
    // Wheels
    const wheelGeom = new THREE.CylinderGeometry(0.25, 0.25, 0.15, 16);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const wheelPositions = [
        [1.0, 0.25, 0.75], [1.0, 0.25, -0.75],
        [-1.0, 0.25, 0.75], [-1.0, 0.25, -0.75]
    ];
    wheelPositions.forEach(pos => {
        const wheel = new THREE.Mesh(wheelGeom, wheelMat);
        wheel.position.set(...pos);
        wheel.rotation.x = Math.PI / 2;
        group.add(wheel);
    });
    
    // Hood scoop
    const scoopGeom = new THREE.BoxGeometry(0.4, 0.15, 0.3);
    const scoopMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const scoop = new THREE.Mesh(scoopGeom, scoopMat);
    scoop.position.set(0.5, 0.85, 0);
    group.add(scoop);
    
    return group;
}

// Try loading GLTF, fall back to placeholder
const loader = new GLTFLoader();
const placeholder = createPlaceholderCar();
carGroup.add(placeholder);

// Try to load ferrari model
try {
    loader.load(
        'https://threejs.org/examples/models/gltf/ferrari.glb',
        (gltf) => {
            carGroup.remove(placeholder);
            carModel = gltf.scene;
            const box = new THREE.Box3().setFromObject(carModel);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 3 / maxDim;
            carModel.scale.setScalar(scale);
            const center = box.getCenter(new THREE.Vector3());
            carModel.position.set(-center.x * scale, -box.min.y * scale, -center.z * scale);
            carGroup.add(carModel);
            state.modelLoaded = true;
        },
        undefined,
        (err) => {
            console.log('Ferrari model not available, using placeholder');
            state.modelLoaded = true;
        }
    );
} catch(e) {
    state.modelLoaded = true;
}

// Noise function (simplex-like)
function noise3D(x, y, z) {
    const p = x * 12.9898 + y * 78.233 + z * 45.164;
    return (Math.sin(p) * 43758.5453) % 1;
}

function smoothNoise(x, y, z) {
    const ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
    const fx = x - ix, fy = y - iy, fz = z - iz;
    const sx = fx * fx * (3 - 2 * fx);
    const sy = fy * fy * (3 - 2 * fy);
    const sz = fz * fz * (3 - 2 * fz);
    
    const n000 = noise3D(ix, iy, iz);
    const n100 = noise3D(ix+1, iy, iz);
    const n010 = noise3D(ix, iy+1, iz);
    const n110 = noise3D(ix+1, iy+1, iz);
    const n001 = noise3D(ix, iy, iz+1);
    const n101 = noise3D(ix+1, iy, iz+1);
    const n011 = noise3D(ix, iy+1, iz+1);
    const n111 = noise3D(ix+1, iy+1, iz+1);
    
    const nx00 = n000 + sx * (n100 - n000);
    const nx10 = n010 + sx * (n110 - n010);
    const nx01 = n001 + sx * (n101 - n001);
    const nx11 = n011 + sx * (n111 - n011);
    
    const nxy0 = nx00 + sy * (nx10 - nx00);
    const nxy1 = nx01 + sy * (nx11 - nx01);
    
    return nxy0 + sz * (nxy1 - nxy0);
}

// Fire particle system
const MAX_PARTICLES = 6000;

const particleGeometry = new THREE.BufferGeometry();
const positions = new Float32Array(MAX_PARTICLES * 3);
const colors = new Float32Array(MAX_PARTICLES * 3);
const sizes = new Float32Array(MAX_PARTICLES);
const alphas = new Float32Array(MAX_PARTICLES);

// Custom attributes for particle state
const particleData = [];
for (let i = 0; i < MAX_PARTICLES; i++) {
    particleData.push({
        angle: Math.random() * Math.PI * 2,
        radius: 1.5 + Math.random() * 2.5,
        y: Math.random() * 15,
        verticalSpeed: 2 + Math.random() * 3,
        angularSpeed: 1 + Math.random() * 2,
        lifetime: Math.random() * 5,
        maxLifetime: 3 + Math.random() * 4,
        radiusOffset: Math.random() * Math.PI * 2,
        active: false,
        breakaway: false,
        breakawayVx: 0,
        breakawayVz: 0
    });
}

particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
particleGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

// Custom shader material for fire particles
const particleMaterial = new THREE.ShaderMaterial({
    uniforms: {
        uTime: { value: 0 }
    },
    vertexShader: `
        attribute float size;
        attribute vec3 color;
        varying vec3 vColor;
        varying float vAlpha;
        void main() {
            vColor = color;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = size * (200.0 / -mvPosition.z);
            gl_PointSize = clamp(gl_PointSize, 1.0, 50.0);
            gl_Position = projectionMatrix * mvPosition;
            vAlpha = 1.0;
        }
    `,
    fragmentShader: `
        varying vec3 vColor;
        varying float vAlpha;
        void main() {
            float dist = length(gl_PointCoord - vec2(0.5));
            if (dist > 0.5) discard;
            float alpha = 1.0 - smoothstep(0.0, 0.5, dist);
            alpha *= alpha;
            gl_FragColor = vec4(vColor, alpha * 0.8);
        }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
});

const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particleSystem);

// Glow/ember particles for higher levels
const emberGeometry = new THREE.BufferGeometry();
const emberPositions = new Float32Array(500 * 3);
const emberColors = new Float32Array(500 * 3);
const emberSizes = new Float32Array(500);
emberGeometry.setAttribute('position', new THREE.BufferAttribute(emberPositions, 3));
emberGeometry.setAttribute('color', new THREE.BufferAttribute(emberColors, 3));
emberGeometry.setAttribute('size', new THREE.BufferAttribute(emberSizes, 1));

const emberSystem = new THREE.Points(emberGeometry, particleMaterial.clone());
scene.add(emberSystem);

const emberData = [];
for (let i = 0; i < 500; i++) {
    emberData.push({
        x: 0, y: 0, z: 0,
        vx: 0, vy: 0, vz: 0,
        life: 0, maxLife: 2,
        active: false
    });
}

function initParticle(i) {
    const p = particleData[i];
    p.angle = Math.random() * Math.PI * 2;
    p.radius = 1.5 + Math.random() * 2.5;
    p.y = Math.random() * 0.5;
    p.verticalSpeed = 2 + Math.random() * 3;
    p.angularSpeed = 1 + Math.random() * 2;
    p.lifetime = 0;
    p.maxLifetime = 3 + Math.random() * 4;
    p.radiusOffset = Math.random() * Math.PI * 2;
    p.active = true;
    p.breakaway = false;
    p.breakawayVx = 0;
    p.breakawayVz = 0;
}

function getActiveParticleCount() {
    const settings = difficultySettings[state.difficultyLevel];
    return Math.floor(2000 * settings.particleMultiplier);
}

function setDifficulty(level) {
    level = Math.max(1, Math.min(5, level));
    state.difficultyLevel = level;
    state.difficultyLabel = difficultyLabels[level];
    
    const count = getActiveParticleCount();
    for (let i = 0; i < MAX_PARTICLES; i++) {
        if (i < count) {
            if (!particleData[i].active) {
                initParticle(i);
            }
            particleData[i].active = true;
        } else {
            particleData[i].active = false;
        }
    }
    
    updateHUD();
}

// FPS tracking
let frameCount = 0;
let fpsTime = 0;
let currentFPS = 60;

// Animation
let clock = new THREE.Clock();
let lastTime = 0;
let tornadoPaused = false;

function updateParticles(dt, elapsed) {
    const settings = difficultySettings[state.difficultyLevel];
    const count = getActiveParticleCount();
    let maxHeight = 0;
    let totalRadius = 0;
    let activeCount = 0;
    
    for (let i = 0; i < MAX_PARTICLES; i++) {
        const p = particleData[i];
        const i3 = i * 3;
        
        if (!p.active || i >= count) {
            positions[i3] = 0;
            positions[i3 + 1] = -100;
            positions[i3 + 2] = 0;
            sizes[i] = 0;
            colors[i3] = 0;
            colors[i3 + 1] = 0;
            colors[i3 + 2] = 0;
            continue;
        }
        
        if (!tornadoPaused) {
            p.lifetime += dt;
            
            if (p.lifetime > p.maxLifetime || p.y > 15) {
                initParticle(i);
            }
            
            // Height-dependent angular velocity
            const heightFactor = p.y / 15;
            const angularMult = 1 + heightFactor * 2 * settings.rotSpeed;
            p.angle += p.angularSpeed * angularMult * dt;
            
            // Vertical movement
            p.y += p.verticalSpeed * dt;
            
            // Radius oscillation
            const baseRadius = settings.radiusMin + (settings.radiusMax - settings.radiusMin) * 
                (0.5 + 0.5 * Math.sin(p.radiusOffset + elapsed * 0.5));
            const radiusShrink = 1 - heightFactor * 0.3;
            p.radius = baseRadius * radiusShrink;
            
            // Turbulence
            const turbulence = settings.turbulence;
            const nx = smoothNoise(p.angle * 0.5, p.y * 0.3, elapsed * 0.5) * 2 - 1;
            const ny = smoothNoise(p.angle * 0.5 + 100, p.y * 0.3, elapsed * 0.5) * 2 - 1;
            const nz = smoothNoise(p.angle * 0.5 + 200, p.y * 0.3, elapsed * 0.5) * 2 - 1;
            
            // Breakaway for level 4+
            if (state.difficultyLevel >= 4 && !p.breakaway && Math.random() < 0.001 * state.difficultyLevel) {
                p.breakaway = true;
                p.breakawayVx = (Math.random() - 0.5) * 3 * settings.turbulence;
                p.breakawayVz = (Math.random() - 0.5) * 3 * settings.turbulence;
            }
            
            let x, z;
            if (p.breakaway) {
                p.breakawayVx *= 0.98;
                p.breakawayVz *= 0.98;
                x = Math.cos(p.angle) * p.radius + nx * turbulence + p.breakawayVx * p.lifetime;
                z = Math.sin(p.angle) * p.radius + nz * turbulence + p.breakawayVz * p.lifetime;
            } else {
                x = Math.cos(p.angle) * p.radius + nx * turbulence;
                z = Math.sin(p.angle) * p.radius + nz * turbulence;
            }
            
            let y = p.y + ny * turbulence * 0.5;
            
            // Wind effect
            if (state.windEnabled) {
                x += Math.sin(elapsed * 0.7) * settings.turbulence * 1.5;
                z += Math.cos(elapsed * 0.5) * settings.turbulence * 0.5;
            }
            
            // Clamp
            if (isNaN(x)) x = 0;
            if (isNaN(y)) y = 0;
            if (isNaN(z)) z = 0;
            y = Math.max(0, y);
            
            positions[i3] = x;
            positions[i3 + 1] = y;
            positions[i3 + 2] = z;
        }
        
        const y = positions[i3 + 1];
        const heightNorm = Math.min(y / 15, 1);
        
        // Color: yellow at bottom -> red in middle -> dark smoke at top
        let r, g, b;
        if (heightNorm < 0.3) {
            // Yellow to orange
            r = 1.0 * settings.colorIntensity;
            g = (0.8 - heightNorm * 2) * settings.colorIntensity;
            b = (0.1 - heightNorm * 0.3) * settings.colorIntensity;
        } else if (heightNorm < 0.7) {
            // Orange to red
            const t = (heightNorm - 0.3) / 0.4;
            r = (1.0 - t * 0.3) * settings.colorIntensity;
            g = (0.2 - t * 0.15) * settings.colorIntensity;
            b = 0.02 * settings.colorIntensity;
        } else {
            // Red to dark smoke
            const t = (heightNorm - 0.7) / 0.3;
            r = (0.7 - t * 0.5) * settings.colorIntensity;
            g = (0.05 - t * 0.04) * settings.colorIntensity;
            b = (0.02 + t * 0.03) * settings.colorIntensity;
        }
        
        colors[i3] = Math.max(0, r);
        colors[i3 + 1] = Math.max(0, g);
        colors[i3 + 2] = Math.max(0, b);
        
        // Size: larger at base
        const lifeFade = 1 - (p.lifetime / p.maxLifetime);
        sizes[i] = (0.3 - heightNorm * 0.25) * lifeFade * (0.8 + settings.turbulence * 0.3);
        sizes[i] = Math.max(0.05, sizes[i]);
        
        if (y > maxHeight) maxHeight = y;
        totalRadius += p.radius;
        activeCount++;
    }
    
    // Update ember particles for level 5
    if (state.difficultyLevel >= 4) {
        for (let i = 0; i < 500; i++) {
            const e = emberData[i];
            const i3 = i * 3;
            
            if (!e.active) {
                if (Math.random() < 0.05 * (state.difficultyLevel - 3)) {
                    e.active = true;
                    const angle = Math.random() * Math.PI * 2;
                    const r = 2 + Math.random() * 2;
                    e.x = Math.cos(angle) * r;
                    e.y = Math.random() * 5;
                    e.z = Math.sin(angle) * r;
                    e.vx = (Math.random() - 0.5) * 4;
                    e.vy = 2 + Math.random() * 3;
                    e.vz = (Math.random() - 0.5) * 4;
                    e.life = 0;
                    e.maxLife = 1 + Math.random() * 2;
                }
                emberPositions[i3 + 1] = -100;
                emberSizes[i] = 0;
                continue;
            }
            
            if (!tornadoPaused) {
                e.life += dt;
                if (e.life > e.maxLife) {
                    e.active = false;
                    emberPositions[i3 + 1] = -100;
                    emberSizes[i] = 0;
                    continue;
                }
                
                e.x += e.vx * dt;
                e.y += e.vy * dt;
                e.z += e.vz * dt;
                e.vy -= 0.5 * dt;
            }
            
            emberPositions[i3] = e.x;
            emberPositions[i3 + 1] = e.y;
            emberPositions[i3 + 2] = e.z;
            
            const fade = 1 - e.life / e.maxLife;
            emberColors[i3] = 1.0 * fade;
            emberColors[i3 + 1] = 0.5 * fade;
            emberColors[i3 + 2] = 0.1 * fade;
            emberSizes[i] = 0.08 * fade;
        }
        emberGeometry.attributes.position.needsUpdate = true;
        emberGeometry.attributes.color.needsUpdate = true;
        emberGeometry.attributes.size.needsUpdate = true;
    }
    
    particleGeometry.attributes.position.needsUpdate = true;
    particleGeometry.attributes.color.needsUpdate = true;
    particleGeometry.attributes.size.needsUpdate = true;
    
    state.particleCount = activeCount;
    state.maxParticleHeight = maxHeight;
    state.tornadoRadius = activeCount > 0 ? totalRadius / activeCount : 0;
}

function updateHUD() {
    document.getElementById('hud-difficulty').textContent = 
        `Level ${state.difficultyLevel}: ${state.difficultyLabel}`;
    document.getElementById('hud-particles').textContent = state.particleCount;
    document.getElementById('hud-fps').textContent = Math.round(state.fps);
    document.getElementById('hud-status').textContent = state.tornadoActive ? 'Active' : 'Paused';
    document.getElementById('hud-status').style.color = state.tornadoActive ? '#00ff44' : '#ff4444';
}

const initialCameraPos = new THREE.Vector3(0, 5, 12);
const initialTarget = new THREE.Vector3(0, 1.5, 0);

function resetState() {
    setDifficulty(1);
    tornadoPaused = false;
    state.tornadoActive = true;
    state.windEnabled = false;
    state.elapsedTime = 0;
    carGroup.rotation.y = 0;
    camera.position.copy(initialCameraPos);
    controls.target.copy(initialTarget);
    controls.update();
    document.getElementById('toggleWind').textContent = 'Wind: OFF';
    
    for (let i = 0; i < MAX_PARTICLES; i++) {
        initParticle(i);
    }
    
    updateHUD();
}

// Event listeners
document.addEventListener('keydown', (e) => {
    if (e.key >= '1' && e.key <= '5') {
        setDifficulty(parseInt(e.key));
    } else if (e.key === 'ArrowUp') {
        setDifficulty(state.difficultyLevel + 1);
    } else if (e.key === 'ArrowDown') {
        setDifficulty(state.difficultyLevel - 1);
    } else if (e.key === ' ') {
        e.preventDefault();
        tornadoPaused = !tornadoPaused;
        state.tornadoActive = !tornadoPaused;
        updateHUD();
    } else if (e.key === 'r' || e.key === 'R') {
        resetState();
    }
});

document.getElementById('toggleWind').addEventListener('click', () => {
    state.windEnabled = !state.windEnabled;
    document.getElementById('toggleWind').textContent = state.windEnabled ? 'Wind: ON' : 'Wind: OFF';
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize
setDifficulty(1);
for (let i = 0; i < MAX_PARTICLES; i++) {
    initParticle(i);
    particleData[i].y = Math.random() * 15;
    particleData[i].lifetime = Math.random() * particleData[i].maxLifetime;
}

// Animation loop
function animate() {
    requestAnimationFrame(animate);
    
    const dt = Math.min(clock.getDelta(), 0.05);
    
    // FPS
    frameCount++;
    fpsTime += dt;
    if (fpsTime >= 0.5) {
        currentFPS = frameCount / fpsTime;
        state.fps = currentFPS;
        frameCount = 0;
        fpsTime = 0;
    }
    
    if (!tornadoPaused) {
        state.elapsedTime += dt;
    }
    
    // Car rotation
    carGroup.rotation.y += 0.3 * dt;
    state.carRotationY = carGroup.rotation.y;
    
    // Dynamic light
    const settings = difficultySettings[state.difficultyLevel];
    pointLight.intensity = 2 + Math.sin(state.elapsedTime * 3) * 0.5 * settings.colorIntensity;
    pointLight2.intensity = 1 + Math.sin(state.elapsedTime * 5 + 1) * 0.3 * settings.colorIntensity;
    
    // Update particles
    updateParticles(dt, state.elapsedTime);
    
    // Update material time
    particleMaterial.uniforms.uTime.value = state.elapsedTime;
    
    // Update HUD periodically
    if (frameCount % 10 === 0) {
        updateHUD();
    }
    
    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>
