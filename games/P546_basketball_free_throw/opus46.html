<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Basketball Free Throw Simulator</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #000; }
canvas { display: block; }
#hud {
    position: absolute; top: 10px; left: 10px;
    background: rgba(0,0,0,0.75); color: #fff; padding: 15px 20px;
    border-radius: 10px; font-size: 14px; line-height: 1.8;
    min-width: 220px; backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.1);
}
#hud h3 { margin: 0 0 8px 0; color: #ff8833; font-size: 16px; }
#hud .stat { display: flex; justify-content: space-between; }
#hud .stat span:first-child { color: #aab; }
#hud .stat span:last-child { color: #fff; font-weight: bold; }
#controls {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.75); color: #fff; padding: 15px 25px;
    border-radius: 10px; font-size: 13px; display: flex; gap: 25px; align-items: center;
    backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
}
#controls label { display: flex; flex-direction: column; align-items: center; gap: 4px; }
#controls input[type="range"] { width: 120px; accent-color: #ff8833; }
#controls .val { color: #ff8833; font-weight: bold; font-size: 14px; }
#instructions {
    position: absolute; top: 10px; right: 10px;
    background: rgba(0,0,0,0.75); color: #aab; padding: 12px 16px;
    border-radius: 10px; font-size: 13px; line-height: 1.6;
    backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
}
#instructions kbd { background: #444; padding: 2px 6px; border-radius: 3px; color: #ff8833; }
</style>
</head>
<body>

<div id="hud">
    <h3>🏀 Free Throw Stats</h3>
    <div class="stat"><span>Score:</span><span id="hud-score">0</span></div>
    <div class="stat"><span>Attempts:</span><span id="hud-attempts">0</span></div>
    <div class="stat"><span>Accuracy:</span><span id="hud-accuracy">0.0%</span></div>
    <div class="stat"><span>Height:</span><span id="hud-height">1.80</span></div>
    <div class="stat"><span>Speed:</span><span id="hud-speed">0.00</span></div>
    <div class="stat"><span>Status:</span><span id="hud-status">Ready</span></div>
</div>

<div id="instructions">
    <kbd>T</kbd> Throw &nbsp; <kbd>R</kbd> Reset<br>
    Use sliders to adjust
</div>

<div id="controls">
    <label>
        Angle: <span class="val" id="val-angle">52°</span>
        <input type="range" id="slider-angle" min="30" max="70" step="1" value="52">
    </label>
    <label>
        Speed: <span class="val" id="val-speed">8.5</span>
        <input type="range" id="slider-speed" min="5" max="15" step="0.5" value="8.5">
    </label>
    <label>
        Backspin: <span class="val" id="val-spin">3</span>
        <input type="range" id="slider-spin" min="-10" max="10" step="1" value="3">
    </label>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x334455);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 15);
camera.lookAt(0, 3, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 3, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0x445566, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
scene.add(dirLight);

// ============ FLOOR ============
const floorGeo = new THREE.PlaneGeometry(30, 20);
const floorMat = new THREE.MeshStandardMaterial({ color: 0xbb8844 });

// Create a simple procedural hardwood texture
const canvas = document.createElement('canvas');
canvas.width = 512;
canvas.height = 512;
const ctx = canvas.getContext('2d');
ctx.fillStyle = '#bb8844';
ctx.fillRect(0, 0, 512, 512);
// Wood grain lines
for (let i = 0; i < 200; i++) {
    ctx.strokeStyle = `rgba(${100 + Math.random()*50}, ${70 + Math.random()*40}, ${30 + Math.random()*20}, ${0.1 + Math.random()*0.15})`;
    ctx.lineWidth = 1 + Math.random() * 2;
    ctx.beginPath();
    const y = Math.random() * 512;
    ctx.moveTo(0, y);
    for (let x = 0; x < 512; x += 20) {
        ctx.lineTo(x, y + Math.sin(x * 0.02) * 3 + (Math.random() - 0.5) * 2);
    }
    ctx.stroke();
}
// Court lines
ctx.strokeStyle = 'rgba(255,255,255,0.3)';
ctx.lineWidth = 3;
ctx.strokeRect(20, 20, 472, 472);
ctx.beginPath();
ctx.arc(256, 256, 100, 0, Math.PI * 2);
ctx.stroke();

const floorTex = new THREE.CanvasTexture(canvas);
floorTex.wrapS = THREE.RepeatWrapping;
floorTex.wrapT = THREE.RepeatWrapping;
floorTex.repeat.set(4, 3);
floorMat.map = floorTex;

const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Free throw line marker
const ftLineGeo = new THREE.PlaneGeometry(3.6, 0.05);
const ftLineMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
const ftLine = new THREE.Mesh(ftLineGeo, ftLineMat);
ftLine.rotation.x = -Math.PI / 2;
ftLine.position.set(0, 0.01, 8);
scene.add(ftLine);

// ============ BACKBOARD ============
const backboardGeo = new THREE.BoxGeometry(1.8, 1.2, 0.05);
const backboardMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, transparent: true, opacity: 0.85 });
const backboard = new THREE.Mesh(backboardGeo, backboardMat);
backboard.position.set(0, 3.05, -5);
backboard.castShadow = true;
backboard.receiveShadow = true;
scene.add(backboard);

// Red target rectangle on backboard
const targetGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(0.6, 0.45, 0.001));
const targetMat = new THREE.LineBasicMaterial({ color: 0xff0000, linewidth: 2 });
const target = new THREE.LineSegments(targetGeo, targetMat);
target.position.set(0, 3.05, -4.97);
scene.add(target);

// ============ POLE ============
const poleGeo = new THREE.CylinderGeometry(0.08, 0.08, 3.05, 16);
const poleMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.6, roughness: 0.3 });
const pole = new THREE.Mesh(poleGeo, poleMat);
pole.position.set(0, 3.05 / 2, -5.2);
pole.castShadow = true;
scene.add(pole);

// Support arm from pole to backboard
const armGeo = new THREE.BoxGeometry(0.06, 0.06, 0.3);
const arm = new THREE.Mesh(armGeo, poleMat);
arm.position.set(0, 3.05, -5.1);
arm.castShadow = true;
scene.add(arm);

// ============ RIM (Spring-based segments) ============
const RIM_SEGMENTS = 12;
const RIM_RADIUS = 0.45;
const RIM_TUBE = 0.025;
const RIM_Y = 3.05;
const RIM_Z = -4.4;
const RIM_CENTER = new THREE.Vector3(0, RIM_Y, RIM_Z);

// Rim segment data
const rimSegments = [];
const rimRestPositions = [];
for (let i = 0; i < RIM_SEGMENTS; i++) {
    const angle = (i / RIM_SEGMENTS) * Math.PI * 2;
    const x = Math.cos(angle) * RIM_RADIUS;
    const z = Math.sin(angle) * RIM_RADIUS + RIM_Z;
    const restPos = new THREE.Vector3(x, RIM_Y, z);
    rimRestPositions.push(restPos.clone());
    rimSegments.push({
        pos: restPos.clone(),
        vel: new THREE.Vector3(),
        restPos: restPos.clone(),
        mass: 0.5
    });
}

// Rim visual - use small spheres at each segment + cylinders between
const rimGroup = new THREE.Group();
scene.add(rimGroup);

const rimSphereMeshes = [];
const rimCylinderMeshes = [];
const rimMat = new THREE.MeshStandardMaterial({ color: 0xff4400, metalness: 0.7, roughness: 0.3 });

for (let i = 0; i < RIM_SEGMENTS; i++) {
    const sGeo = new THREE.SphereGeometry(RIM_TUBE, 8, 8);
    const sMesh = new THREE.Mesh(sGeo, rimMat);
    sMesh.position.copy(rimSegments[i].pos);
    sMesh.castShadow = true;
    rimGroup.add(sMesh);
    rimSphereMeshes.push(sMesh);

    const cGeo = new THREE.CylinderGeometry(RIM_TUBE, RIM_TUBE, 1, 8);
    const cMesh = new THREE.Mesh(cGeo, rimMat);
    cMesh.castShadow = true;
    rimGroup.add(cMesh);
    rimCylinderMeshes.push(cMesh);
}

function updateRimVisuals() {
    for (let i = 0; i < RIM_SEGMENTS; i++) {
        rimSphereMeshes[i].position.copy(rimSegments[i].pos);
        
        const next = (i + 1) % RIM_SEGMENTS;
        const p1 = rimSegments[i].pos;
        const p2 = rimSegments[next].pos;
        const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
        const dir = new THREE.Vector3().subVectors(p2, p1);
        const len = dir.length();
        
        rimCylinderMeshes[i].position.copy(mid);
        rimCylinderMeshes[i].scale.y = len;
        
        dir.normalize();
        const quat = new THREE.Quaternion();
        quat.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
        rimCylinderMeshes[i].quaternion.copy(quat);
    }
}
updateRimVisuals();

// Rim spring physics constants
const RIM_SPRING_K = 500;
const RIM_DAMPING = 10;
const RIM_NEIGHBOR_K = 300;
const RIM_NEIGHBOR_DAMPING = 8;

function updateRimPhysics(dt) {
    for (let i = 0; i < RIM_SEGMENTS; i++) {
        const seg = rimSegments[i];
        
        // Spring to rest position (connection to backboard mount)
        const disp = new THREE.Vector3().subVectors(seg.restPos, seg.pos);
        const springForce = disp.clone().multiplyScalar(RIM_SPRING_K);
        const dampForce = seg.vel.clone().multiplyScalar(-RIM_DAMPING);
        
        const totalForce = springForce.add(dampForce);
        
        // Neighbor springs
        const prev = (i - 1 + RIM_SEGMENTS) % RIM_SEGMENTS;
        const next = (i + 1) % RIM_SEGMENTS;
        
        for (const ni of [prev, next]) {
            const nSeg = rimSegments[ni];
            const restDist = rimRestPositions[i].distanceTo(rimRestPositions[ni]);
            const diff = new THREE.Vector3().subVectors(nSeg.pos, seg.pos);
            const dist = diff.length();
            if (dist > 0.001) {
                const stretch = dist - restDist;
                const nForce = diff.normalize().multiplyScalar(stretch * RIM_NEIGHBOR_K);
                const relVel = new THREE.Vector3().subVectors(nSeg.vel, seg.vel);
                nForce.add(relVel.multiplyScalar(RIM_NEIGHBOR_DAMPING));
                totalForce.add(nForce);
            }
        }
        
        // Update velocity and position
        const acc = totalForce.divideScalar(seg.mass);
        seg.vel.add(acc.multiplyScalar(dt));
        seg.pos.add(seg.vel.clone().multiplyScalar(dt));
    }
}

// ============ NET ============
const NET_CHAINS = 12;
const NET_POINTS_PER_CHAIN = 5;
const NET_REST_LENGTH = 0.15;
const NET_SPRING_K = 80;
const NET_DAMPING = 3;
const NET_GRAVITY = new THREE.Vector3(0, -9.81, 0);

const netPoints = []; // [chain][point]
const netVelocities = [];

for (let c = 0; c < NET_CHAINS; c++) {
    const chain = [];
    const vels = [];
    const rimPt = rimSegments[c].pos;
    for (let p = 0; p < NET_POINTS_PER_CHAIN; p++) {
        chain.push(new THREE.Vector3(
            rimPt.x * (1 - (p + 1) * 0.08),
            rimPt.y - (p + 1) * NET_REST_LENGTH,
            rimPt.z + (rimPt.z - RIM_Z) * (-0.08 * (p + 1))
        ));
        vels.push(new THREE.Vector3());
    }
    netPoints.push(chain);
    netVelocities.push(vels);
}

// Cross-links between adjacent chains
function updateNetPhysics(dt) {
    for (let c = 0; c < NET_CHAINS; c++) {
        for (let p = 0; p < NET_POINTS_PER_CHAIN; p++) {
            const point = netPoints[c][p];
            const vel = netVelocities[c][p];
            
            const force = NET_GRAVITY.clone().multiplyScalar(0.02); // mass ~0.02
            
            // Spring to point above
            let anchor;
            if (p === 0) {
                anchor = rimSegments[c].pos;
            } else {
                anchor = netPoints[c][p - 1];
            }
            
            const diff = new THREE.Vector3().subVectors(anchor, point);
            const dist = diff.length();
            if (dist > 0.001) {
                const stretch = dist - NET_REST_LENGTH;
                const springF = diff.normalize().multiplyScalar(stretch * NET_SPRING_K);
                force.add(springF);
            }
            
            // Spring to point below (if exists)
            if (p < NET_POINTS_PER_CHAIN - 1) {
                const below = netPoints[c][p + 1];
                const diff2 = new THREE.Vector3().subVectors(below, point);
                const dist2 = diff2.length();
                if (dist2 > 0.001) {
                    const stretch2 = dist2 - NET_REST_LENGTH;
                    const springF2 = diff2.normalize().multiplyScalar(stretch2 * NET_SPRING_K);
                    force.add(springF2);
                }
            }
            
            // Cross-links to adjacent chains (same level)
            const nextC = (c + 1) % NET_CHAINS;
            const prevC = (c - 1 + NET_CHAINS) % NET_CHAINS;
            
            const crossRestLen = NET_REST_LENGTH * 1.2;
            for (const adjC of [nextC, prevC]) {
                const adjPt = netPoints[adjC][p];
                const cdiff = new THREE.Vector3().subVectors(adjPt, point);
                const cdist = cdiff.length();
                if (cdist > 0.001) {
                    const cstretch = cdist - crossRestLen;
                    const cforce = cdiff.normalize().multiplyScalar(cstretch * NET_SPRING_K * 0.3);
                    force.add(cforce);
                }
            }
            
            // Damping
            force.add(vel.clone().multiplyScalar(-NET_DAMPING));
            
            // Update
            const acc = force.divideScalar(0.02);
            vel.add(acc.multiplyScalar(dt));
            // Clamp velocity
            if (vel.length() > 20) vel.setLength(20);
            point.add(vel.clone().multiplyScalar(dt));
        }
    }
}

// Net visual
const netLineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
const netLines = [];

// Vertical lines
for (let c = 0; c < NET_CHAINS; c++) {
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array((NET_POINTS_PER_CHAIN + 1) * 3);
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const line = new THREE.Line(geo, netLineMat);
    scene.add(line);
    netLines.push({ geo, type: 'vertical', chain: c });
}

// Horizontal rings
for (let p = 0; p < NET_POINTS_PER_CHAIN; p++) {
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array((NET_CHAINS + 1) * 3);
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const line = new THREE.Line(geo, netLineMat);
    scene.add(line);
    netLines.push({ geo, type: 'horizontal', level: p });
}

function updateNetVisuals() {
    for (const nl of netLines) {
        const posAttr = nl.geo.getAttribute('position');
        if (nl.type === 'vertical') {
            const c = nl.chain;
            // First point is rim segment
            posAttr.setXYZ(0, rimSegments[c].pos.x, rimSegments[c].pos.y, rimSegments[c].pos.z);
            for (let p = 0; p < NET_POINTS_PER_CHAIN; p++) {
                const pt = netPoints[c][p];
                posAttr.setXYZ(p + 1, pt.x, pt.y, pt.z);
            }
        } else {
            const p = nl.level;
            for (let c = 0; c <= NET_CHAINS; c++) {
                const ci = c % NET_CHAINS;
                const pt = netPoints[ci][p];
                posAttr.setXYZ(c, pt.x, pt.y, pt.z);
            }
        }
        posAttr.needsUpdate = true;
    }
}

// ============ BASKETBALL ============
const BALL_RADIUS = 0.12;
const BALL_MASS = 0.6;

// Create basketball with seam lines
const ballGeo = new THREE.SphereGeometry(BALL_RADIUS, 32, 32);

// Procedural basketball texture
const ballCanvas = document.createElement('canvas');
ballCanvas.width = 256;
ballCanvas.height = 256;
const bctx = ballCanvas.getContext('2d');

// Orange base
bctx.fillStyle = '#ff8833';
bctx.fillRect(0, 0, 256, 256);

// Add some texture/noise
for (let i = 0; i < 3000; i++) {
    const x = Math.random() * 256;
    const y = Math.random() * 256;
    bctx.fillStyle = `rgba(${180 + Math.random()*40}, ${100 + Math.random()*30}, ${20 + Math.random()*20}, 0.15)`;
    bctx.fillRect(x, y, 2, 2);
}

// Seam lines
bctx.strokeStyle = '#331100';
bctx.lineWidth = 3;
// Horizontal seam
bctx.beginPath();
bctx.moveTo(0, 128);
bctx.lineTo(256, 128);
bctx.stroke();
// Vertical seam
bctx.beginPath();
bctx.moveTo(128, 0);
bctx.lineTo(128, 256);
bctx.stroke();
// Curved seams
bctx.beginPath();
bctx.arc(128, 128, 60, 0, Math.PI * 2);
bctx.stroke();

const ballTex = new THREE.CanvasTexture(ballCanvas);
const ballMat = new THREE.MeshStandardMaterial({ map: ballTex, roughness: 0.8, metalness: 0.1 });
const ball = new THREE.Mesh(ballGeo, ballMat);
ball.castShadow = true;
scene.add(ball);

// Ball shadow on floor
const shadowGeo = new THREE.CircleGeometry(BALL_RADIUS * 2, 16);
const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 });
const ballShadow = new THREE.Mesh(shadowGeo, shadowMat);
ballShadow.rotation.x = -Math.PI / 2;
ballShadow.position.y = 0.01;
scene.add(ballShadow);

// ============ BALL PHYSICS ============
const THROW_POS = new THREE.Vector3(0, 1.8, 8);
const GRAVITY = new THREE.Vector3(0, -9.81, 0);
const AIR_DRAG = 0.01;

let ballPos = THROW_POS.clone();
let ballVel = new THREE.Vector3();
let ballPrevPos = THROW_POS.clone();
let ballSpin = 0;

let status = 'Ready';
let score = 0;
let attempts = 0;
let frameCount = 0;
let ballFlying = false;
let scoreChecked = false;
let prevBallY = 0;
let statusTimer = 0;

ball.position.copy(ballPos);

// ============ CONTROLS ============
const sliderAngle = document.getElementById('slider-angle');
const sliderSpeed = document.getElementById('slider-speed');
const sliderSpin = document.getElementById('slider-spin');
const valAngle = document.getElementById('val-angle');
const valSpeed = document.getElementById('val-speed');
const valSpin = document.getElementById('val-spin');

sliderAngle.addEventListener('input', () => { valAngle.textContent = sliderAngle.value + '°'; });
sliderSpeed.addEventListener('input', () => { valSpeed.textContent = sliderSpeed.value; });
sliderSpin.addEventListener('input', () => { valSpin.textContent = sliderSpin.value; });

function throwBall() {
    if (ballFlying) return;
    
    const angle = parseFloat(sliderAngle.value) * Math.PI / 180;
    const speed = parseFloat(sliderSpeed.value);
    ballSpin = parseFloat(sliderSpin.value);
    
    ballPos.copy(THROW_POS);
    ballVel.set(0, speed * Math.sin(angle), -speed * Math.cos(angle));
    ballPrevPos.copy(ballPos);
    ballFlying = true;
    scoreChecked = false;
    prevBallY = ballPos.y;
    status = 'Flying';
    attempts++;
    statusTimer = 0;
}

function resetBall() {
    ballPos.copy(THROW_POS);
    ballVel.set(0, 0, 0);
    ballPrevPos.copy(THROW_POS);
    ballFlying = false;
    scoreChecked = false;
    status = 'Ready';
    statusTimer = 0;
    ball.position.copy(ballPos);
    ball.rotation.set(0, 0, 0);
}

document.addEventListener('keydown', (e) => {
    if (e.key === 't' || e.key === 'T') throwBall();
    if (e.key === 'r' || e.key === 'R') resetBall();
});

// ============ COLLISION HELPERS ============
function closestPointOnSegment(p, a, b) {
    const ab = new THREE.Vector3().subVectors(b, a);
    const ap = new THREE.Vector3().subVectors(p, a);
    let t = ap.dot(ab) / ab.dot(ab);
    t = Math.max(0, Math.min(1, t));
    return a.clone().add(ab.multiplyScalar(t));
}

function ballRimCollision(dt) {
    for (let i = 0; i < RIM_SEGMENTS; i++) {
        const next = (i + 1) % RIM_SEGMENTS;
        const p1 = rimSegments[i].pos;
        const p2 = rimSegments[next].pos;
        
        const closest = closestPointOnSegment(ballPos, p1, p2);
        const diff = new THREE.Vector3().subVectors(ballPos, closest);
        const dist = diff.length();
        const minDist = BALL_RADIUS + RIM_TUBE;
        
        if (dist < minDist && dist > 0.001) {
            const normal = diff.normalize();
            const penetration = minDist - dist;
            
            // Push ball out
            ballPos.add(normal.clone().multiplyScalar(penetration * 0.8));
            
            // Relative velocity
            const rimVel = rimSegments[i].vel.clone().add(rimSegments[next].vel).multiplyScalar(0.5);
            const relVel = new THREE.Vector3().subVectors(ballVel, rimVel);
            const velAlongNormal = relVel.dot(normal);
            
            if (velAlongNormal < 0) {
                const restitution = 0.6;
                const impulse = -(1 + restitution) * velAlongNormal;
                const impulseMass = impulse / (1 / BALL_MASS + 1 / rimSegments[i].mass);
                
                ballVel.add(normal.clone().multiplyScalar(impulseMass / BALL_MASS));
                
                // Apply force to rim segments
                const rimImpulse = normal.clone().multiplyScalar(-impulseMass / rimSegments[i].mass * 0.5);
                rimSegments[i].vel.add(rimImpulse);
                rimSegments[next].vel.add(rimImpulse);
            }
        }
    }
}

function ballBackboardCollision() {
    // Backboard at z = -5, extends from x=-0.9 to x=0.9, y=2.45 to y=3.65
    const bz = -5 + 0.025; // front face
    if (ballPos.z < bz + BALL_RADIUS && ballPos.z > bz - 0.1 &&
        ballPos.x > -0.9 && ballPos.x < 0.9 &&
        ballPos.y > 2.45 && ballPos.y < 3.65) {
        
        ballPos.z = bz + BALL_RADIUS;
        ballVel.z *= -0.5;
        ballVel.x *= 0.9;
        ballVel.y *= 0.9;
    }
}

function ballFloorCollision() {
    if (ballPos.y < BALL_RADIUS) {
        ballPos.y = BALL_RADIUS;
        ballVel.y *= -0.7;
        ballVel.x *= (1 - 0.4);
        ballVel.z *= (1 - 0.4);
        
        // Stop if very slow
        if (Math.abs(ballVel.y) < 0.1) {
            ballVel.y = 0;
        }
    }
}

function ballNetCollision() {
    for (let c = 0; c < NET_CHAINS; c++) {
        for (let p = 0; p < NET_POINTS_PER_CHAIN; p++) {
            const netPt = netPoints[c][p];
            const diff = new THREE.Vector3().subVectors(ballPos, netPt);
            const dist = diff.length();
            const minDist = BALL_RADIUS + 0.03;
            
            if (dist < minDist && dist > 0.001) {
                const normal = diff.normalize();
                
                // Push net point away
                netPt.add(normal.clone().multiplyScalar(-(minDist - dist) * 0.5));
                netVelocities[c][p].add(normal.clone().multiplyScalar(-2));
                
                // Slow ball slightly
                ballVel.multiplyScalar(0.98);
            }
        }
    }
}

function checkScore() {
    if (scoreChecked) return;
    
    // Check if ball passes through rim plane from above
    const rimY = RIM_Y;
    if (prevBallY > rimY && ballPos.y <= rimY) {
        // Ball crossed rim plane downward
        const dx = ballPos.x - 0;
        const dz = ballPos.z - RIM_Z;
        const distFromCenter = Math.sqrt(dx * dx + dz * dz);
        
        if (distFromCenter < RIM_RADIUS - BALL_RADIUS * 0.5) {
            score++;
            status = 'Scored!';
            scoreChecked = true;
            statusTimer = 0;
            return;
        }
    }
    
    // Check if ball is clearly past the hoop and below it
    if (ballPos.y < RIM_Y - 1 && ballFlying && !scoreChecked) {
        const dx = ballPos.x;
        const dz = ballPos.z - RIM_Z;
        const distFromCenter = Math.sqrt(dx * dx + dz * dz);
        if (distFromCenter > RIM_RADIUS + 1 || ballPos.z > RIM_Z + 2 || ballPos.z < RIM_Z - 3) {
            status = 'Missed';
            scoreChecked = true;
            statusTimer = 0;
        }
    }
    
    // Floor hit = missed if not scored
    if (ballPos.y <= BALL_RADIUS + 0.05 && ballFlying && !scoreChecked) {
        status = 'Missed';
        scoreChecked = true;
        statusTimer = 0;
    }
}

// ============ TRAJECTORY PREVIEW ============
const trajectoryMat = new THREE.LineBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.3 });
const trajectoryGeo = new THREE.BufferGeometry();
const trajPositions = new Float32Array(300 * 3);
trajectoryGeo.setAttribute('position', new THREE.BufferAttribute(trajPositions, 3));
const trajectoryLine = new THREE.Line(trajectoryGeo, trajectoryMat);
scene.add(trajectoryLine);

function updateTrajectoryPreview() {
    if (ballFlying) {
        trajectoryLine.visible = false;
        return;
    }
    trajectoryLine.visible = true;
    
    const angle = parseFloat(sliderAngle.value) * Math.PI / 180;
    const speed = parseFloat(sliderSpeed.value);
    
    let px = THROW_POS.x, py = THROW_POS.y, pz = THROW_POS.z;
    let vx = 0, vy = speed * Math.sin(angle), vz = -speed * Math.cos(angle);
    
    const posAttr = trajectoryGeo.getAttribute('position');
    const dt = 0.03;
    let count = 0;
    
    for (let i = 0; i < 300; i++) {
        posAttr.setXYZ(i, px, py, pz);
        count++;
        
        vx += GRAVITY.x * dt;
        vy += GRAVITY.y * dt;
        vz += GRAVITY.z * dt;
        
        px += vx * dt;
        py += vy * dt;
        pz += vz * dt;
        
        if (py < 0) break;
    }
    
    trajectoryGeo.setDrawRange(0, count);
    posAttr.needsUpdate = true;
}

// ============ STATE ============
window.__3D_STATE__ = {
    score: 0,
    attempts: 0,
    accuracy: 0,
    ballHeight: 1.8,
    ballSpeed: 0,
    status: 'Ready',
    launchAngle: 52,
    launchSpeed: 8.5,
    backspin: 3,
    frameCount: 0,
    ballValid: true,
    rimDeflection: 0
};

function getMaxRimDeflection() {
    let maxDefl = 0;
    for (let i = 0; i < RIM_SEGMENTS; i++) {
        const d = rimSegments[i].pos.distanceTo(rimSegments[i].restPos);
        if (d > maxDefl) maxDefl = d;
    }
    return maxDefl;
}

function updateState() {
    const spd = ballVel.length();
    const ballValid = !isNaN(ballPos.x) && !isNaN(ballPos.y) && !isNaN(ballPos.z);
    const accuracy = attempts > 0 ? Math.round((score / attempts) * 1000) / 10 : 0;
    
    window.__3D_STATE__ = {
        score,
        attempts,
        accuracy,
        ballHeight: Math.round(ballPos.y * 1000) / 1000,
        ballSpeed: Math.round(spd * 1000) / 1000,
        status,
        launchAngle: parseFloat(sliderAngle.value),
        launchSpeed: parseFloat(sliderSpeed.value),
        backspin: parseFloat(sliderSpin.value),
        frameCount,
        ballValid,
        rimDeflection: Math.round(getMaxRimDeflection() * 10000) / 10000
    };
    
    // Update HUD
    document.getElementById('hud-score').textContent = score;
    document.getElementById('hud-attempts').textContent = attempts;
    document.getElementById('hud-accuracy').textContent = accuracy.toFixed(1) + '%';
    document.getElementById('hud-height').textContent = ballPos.y.toFixed(2);
    document.getElementById('hud-speed').textContent = spd.toFixed(2);
    
    const statusEl = document.getElementById('hud-status');
    statusEl.textContent = status;
    statusEl.style.color = status === 'Scored!' ? '#44ff44' : status === 'Missed' ? '#ff4444' : status === 'Flying' ? '#ffaa00' : '#ffffff';
}

// ============ PHYSICS STEP ============
const PHYSICS_DT = 1 / 120;

function physicsStep(dt) {
    if (!ballFlying) return;
    
    prevBallY = ballPos.y;
    
    // Backspin effect (Magnus-like: slight upward force with backspin)
    const spinEffect = ballSpin * 0.002;
    const magnusForce = new THREE.Vector3(0, spinEffect, 0);
    
    // Air drag
    const speed = ballVel.length();
    const dragForce = ballVel.clone().normalize().multiplyScalar(-AIR_DRAG * speed * speed);
    
    // Total acceleration
    const acc = GRAVITY.clone().add(dragForce.divideScalar(BALL_MASS)).add(magnusForce);
    
    // Verlet-style integration
    ballVel.add(acc.multiplyScalar(dt));
    ballPos.add(ballVel.clone().multiplyScalar(dt));
    
    // Ball rotation visual
    ball.rotation.x -= ballSpin * dt * 0.5;
    ball.rotation.z += ballVel.x * dt * 2;
    
    // Collisions
    ballRimCollision(dt);
    ballBackboardCollision();
    ballFloorCollision();
    ballNetCollision();
    checkScore();
    
    // Auto-stop after ball settles
    if (ballPos.y <= BALL_RADIUS + 0.1 && speed < 0.3 && scoreChecked) {
        statusTimer += dt;
        if (statusTimer > 2) {
            ballFlying = false;
        }
    }
    
    // Safety: reset if ball goes too far
    if (ballPos.y < -5 || Math.abs(ballPos.x) > 20 || Math.abs(ballPos.z) > 25) {
        resetBall();
        status = 'Missed';
    }
    
    // NaN check
    if (isNaN(ballPos.x) || isNaN(ballPos.y) || isNaN(ballPos.z)) {
        resetBall();
    }
}

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    
    const delta = Math.min(clock.getDelta(), 0.05);
    frameCount++;
    
    // 2 substeps
    const substeps = 2;
    const subDt = PHYSICS_DT;
    
    for (let s = 0; s < substeps; s++) {
        physicsStep(subDt);
        updateRimPhysics(subDt);
        updateNetPhysics(subDt);
    }
    
    // Status timer for display
    if ((status === 'Scored!' || status === 'Missed') && !ballFlying) {
        statusTimer += delta;
    }
    
    // Update visuals
    ball.position.copy(ballPos);
    ballShadow.position.set(ballPos.x, 0.01, ballPos.z);
    ballShadow.material.opacity = Math.max(0, 0.3 - ballPos.y * 0.02);
    
    updateRimVisuals();
    updateNetVisuals();
    updateTrajectoryPreview();
    
    // Update state before render
    updateState();
    
    controls.update();
    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
