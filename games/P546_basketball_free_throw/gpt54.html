<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Basketball Free Throw Simulator</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #223344;
      font-family: Arial, sans-serif;
      color: #fff;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 280px;
      backdrop-filter: blur(4px);
    }
    #ui .row {
      margin: 8px 0;
    }
    #ui label {
      display: inline-block;
      width: 110px;
      font-size: 14px;
    }
    #ui input[type="range"] {
      width: 140px;
      vertical-align: middle;
    }
    #ui .value {
      display: inline-block;
      width: 48px;
      text-align: right;
      font-size: 13px;
    }
    #hud {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 210px;
      line-height: 1.5;
      backdrop-filter: blur(4px);
    }
    #help {
      position: absolute;
      bottom: 10px;
      left: 10px;
      z-index: 10;
      background: rgba(0,0,0,0.35);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
    }
    b { color: #ffd67a; }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="ui">
    <div class="row">
      <label for="slider-angle">Angle</label>
      <input id="slider-angle" type="range" min="30" max="70" step="1" value="52">
      <span class="value" id="value-angle">52°</span>
    </div>
    <div class="row">
      <label for="slider-speed">Speed</label>
      <input id="slider-speed" type="range" min="5" max="15" step="0.5" value="8.5">
      <span class="value" id="value-speed">8.5</span>
    </div>
    <div class="row">
      <label for="slider-spin">Backspin</label>
      <input id="slider-spin" type="range" min="-10" max="10" step="1" value="3">
      <span class="value" id="value-spin">3</span>
    </div>
  </div>

  <div id="hud">
    <div>Score: <b id="hud-score">0</b></div>
    <div>Attempts: <b id="hud-attempts">0</b></div>
    <div>Accuracy: <b id="hud-accuracy">0.0%</b></div>
    <div>Ball height: <b id="hud-height">0.00</b></div>
    <div>Ball speed: <b id="hud-speed">0.00</b></div>
    <div>Status: <b id="hud-status">Ready</b></div>
  </div>

  <div id="help">
    Press <b>T</b> to throw, <b>R</b> to reset. Drag to orbit camera.
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ------------------------------------------------------------
    // Basic setup
    // ------------------------------------------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x334455);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 3, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 3, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0x445566, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 15, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 50;
    scene.add(dirLight);

    // ------------------------------------------------------------
    // Floor with fallback texture
    // ------------------------------------------------------------
    const textureLoader = new THREE.TextureLoader();

    function makeFallbackWoodTexture() {
      const c = document.createElement('canvas');
      c.width = 512;
      c.height = 512;
      const ctx = c.getContext('2d');

      ctx.fillStyle = '#bb8844';
      ctx.fillRect(0, 0, 512, 512);

      for (let i = 0; i < 24; i++) {
        const y = i * 22;
        ctx.fillStyle = i % 2 === 0 ? 'rgba(255,220,170,0.08)' : 'rgba(90,50,20,0.10)';
        ctx.fillRect(0, y, 512, 18);
      }

      for (let i = 0; i < 120; i++) {
        ctx.strokeStyle = `rgba(80,40,10,${0.04 + Math.random() * 0.08})`;
        ctx.beginPath();
        ctx.moveTo(Math.random() * 512, Math.random() * 512);
        ctx.bezierCurveTo(
          Math.random() * 512, Math.random() * 512,
          Math.random() * 512, Math.random() * 512,
          Math.random() * 512, Math.random() * 512
        );
        ctx.stroke();
      }

      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(4, 3);
      return tex;
    }

    const floorTexture = makeFallbackWoodTexture();
    textureLoader.load(
      'hardwood2_diffuse.jpg',
      (tex) => {
        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(4, 3);
        floor.material.map = tex;
        floor.material.needsUpdate = true;
      },
      undefined,
      () => {}
    );

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 20),
      new THREE.MeshStandardMaterial({
        color: 0xbb8844,
        map: floorTexture,
        roughness: 0.85,
        metalness: 0.05
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // ------------------------------------------------------------
    // Hoop assembly
    // ------------------------------------------------------------
    const hoopGroup = new THREE.Group();
    scene.add(hoopGroup);

    const backboard = new THREE.Mesh(
      new THREE.BoxGeometry(1.8, 1.2, 0.05),
      new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.7 })
    );
    backboard.position.set(0, 3.05, -5);
    backboard.castShadow = true;
    backboard.receiveShadow = true;
    hoopGroup.add(backboard);

    // Backboard target square
    const squareShape = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-0.225, 0.15, 0),
      new THREE.Vector3( 0.225, 0.15, 0),
      new THREE.Vector3( 0.225,-0.15, 0),
      new THREE.Vector3(-0.225,-0.15, 0),
      new THREE.Vector3(-0.225, 0.15, 0)
    ]);
    const squareLine = new THREE.Line(
      squareShape,
      new THREE.LineBasicMaterial({ color: 0xdd2222 })
    );
    squareLine.position.set(0, 3.05, -4.973);
    hoopGroup.add(squareLine);

    const pole = new THREE.Mesh(
      new THREE.CylinderGeometry(0.08, 0.08, 3.05, 16),
      new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.8 })
    );
    pole.position.set(0, 1.525, -5.2);
    pole.castShadow = true;
    pole.receiveShadow = true;
    hoopGroup.add(pole);

    // Static visual torus for rim
    const rimVisual = new THREE.Mesh(
      new THREE.TorusGeometry(0.45, 0.025, 12, 48),
      new THREE.MeshStandardMaterial({ color: 0xff4400, roughness: 0.45, metalness: 0.2 })
    );
    rimVisual.position.set(0, 3.05, -4.4);
    rimVisual.rotation.x = -Math.PI / 2;
    rimVisual.castShadow = true;
    hoopGroup.add(rimVisual);

    // ------------------------------------------------------------
    // Rim spring physics: 12 connected segments
    // ------------------------------------------------------------
    const RIM_SEGMENTS = 12;
    const rimRadius = 0.45;
    const rimTubeRadius = 0.025;
    const rimCenter = new THREE.Vector3(0, 3.05, -4.4);
    const mountPoint = new THREE.Vector3(0, 3.05, -4.85); // toward backboard
    const rimK = 500;
    const rimC = 10;
    const rimMass = 0.08;

    const rimSegments = [];
    const rimVisualSegments = new THREE.Group();
    scene.add(rimVisualSegments);

    const segmentGeom = new THREE.CylinderGeometry(rimTubeRadius, rimTubeRadius, 1, 8);
    const segmentMat = new THREE.MeshStandardMaterial({ color: 0xff4400, roughness: 0.45 });

    function rimRestPos(i) {
      const a = (i / RIM_SEGMENTS) * Math.PI * 2;
      return new THREE.Vector3(
        rimCenter.x + Math.cos(a) * rimRadius,
        rimCenter.y,
        rimCenter.z + Math.sin(a) * rimRadius
      );
    }

    for (let i = 0; i < RIM_SEGMENTS; i++) {
      const p = rimRestPos(i);
      const mesh = new THREE.Mesh(segmentGeom, segmentMat);
      mesh.castShadow = true;
      rimVisualSegments.add(mesh);

      rimSegments.push({
        rest: p.clone(),
        pos: p.clone(),
        vel: new THREE.Vector3(),
        force: new THREE.Vector3(),
        mesh
      });
    }

    const rimNeighborRest = [];
    for (let i = 0; i < RIM_SEGMENTS; i++) {
      const a = rimRestPos(i);
      const b = rimRestPos((i + 1) % RIM_SEGMENTS);
      rimNeighborRest.push(a.distanceTo(b));
    }

    const rimMountRest = rimSegments.map(seg => seg.rest.distanceTo(mountPoint));

    function updateRimMeshes() {
      for (let i = 0; i < RIM_SEGMENTS; i++) {
        const a = rimSegments[i].pos;
        const b = rimSegments[(i + 1) % RIM_SEGMENTS].pos;
        const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
        const dir = new THREE.Vector3().subVectors(b, a);
        const len = Math.max(dir.length(), 1e-6);

        const mesh = rimSegments[i].mesh;
        mesh.position.copy(mid);
        mesh.scale.set(1, len, 1);
        mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.normalize());
      }
      // keep torus visual approximately centered with average rim
      let avg = new THREE.Vector3();
      rimSegments.forEach(s => avg.add(s.pos));
      avg.multiplyScalar(1 / RIM_SEGMENTS);
      rimVisual.position.copy(avg);
    }

    // ------------------------------------------------------------
    // Net physics: 12 vertical chains x 5 points
    // ------------------------------------------------------------
    const NET_CHAINS = 12;
    const NET_POINTS = 5;
    const netK = 80;
    const netC = 3;
    const netRest = 0.15;
    const netMass = 0.03;

    const netChains = [];
    const netLineGroup = new THREE.Group();
    scene.add(netLineGroup);

    for (let i = 0; i < NET_CHAINS; i++) {
      const chain = [];
      const attachIdx = i % RIM_SEGMENTS;
      const anchor = rimSegments[attachIdx].pos.clone();

      for (let j = 0; j < NET_POINTS; j++) {
        const p = anchor.clone().add(new THREE.Vector3(0, -(j + 1) * netRest, 0));
        chain.push({
          pos: p.clone(),
          vel: new THREE.Vector3(),
          force: new THREE.Vector3(),
          lineAnchor: j === 0,
          attachSegment: attachIdx
        });
      }

      const geom = new THREE.BufferGeometry();
      const positions = new Float32Array((NET_POINTS + 1) * 3);
      geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const line = new THREE.Line(
        geom,
        new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.75 })
      );
      netLineGroup.add(line);

      netChains.push({ points: chain, line });
    }

    function updateNetLines() {
      for (const chain of netChains) {
        const arr = chain.line.geometry.attributes.position.array;
        const anchor = rimSegments[chain.points[0].attachSegment].pos;
        arr[0] = anchor.x; arr[1] = anchor.y; arr[2] = anchor.z;
        for (let j = 0; j < chain.points.length; j++) {
          const p = chain.points[j].pos;
          arr[(j + 1) * 3 + 0] = p.x;
          arr[(j + 1) * 3 + 1] = p.y;
          arr[(j + 1) * 3 + 2] = p.z;
        }
        chain.line.geometry.attributes.position.needsUpdate = true;
      }
    }

    // ------------------------------------------------------------
    // Basketball
    // ------------------------------------------------------------
    const ballRadius = 0.12;
    const ballMass = 0.6;
    const gravity = new THREE.Vector3(0, -9.81, 0);
    const baseDrag = 0.01;
    const throwPos = new THREE.Vector3(0, 1.8, 8);

    function makeBasketballTexture() {
      const c = document.createElement('canvas');
      c.width = 512;
      c.height = 256;
      const ctx = c.getContext('2d');

      ctx.fillStyle = '#ff8833';
      ctx.fillRect(0, 0, c.width, c.height);

      ctx.strokeStyle = '#3b1f0f';
      ctx.lineWidth = 10;

      // vertical seam arcs
      ctx.beginPath();
      ctx.arc(c.width * 0.25, c.height * 0.5, c.height * 0.48, -Math.PI/2, Math.PI/2);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(c.width * 0.75, c.height * 0.5, c.height * 0.48, Math.PI/2, 3*Math.PI/2);
      ctx.stroke();

      // center lines
      ctx.beginPath();
      ctx.moveTo(c.width * 0.5, 0);
      ctx.lineTo(c.width * 0.5, c.height);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(0, c.height * 0.5);
      ctx.quadraticCurveTo(c.width * 0.5, c.height * 0.2, c.width, c.height * 0.5);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(0, c.height * 0.5);
      ctx.quadraticCurveTo(c.width * 0.5, c.height * 0.8, c.width, c.height * 0.5);
      ctx.stroke();

      const tex = new THREE.CanvasTexture(c);
      return tex;
    }

    const ball = {
      pos: throwPos.clone(),
      prevPos: throwPos.clone(),
      vel: new THREE.Vector3(),
      spin: 3,
      flying: false,
      scoredThisShot: false,
      shotResolved: false,
      passedRimPlane: false
    };

    const ballMesh = new THREE.Mesh(
      new THREE.SphereGeometry(ballRadius, 32, 32),
      new THREE.MeshStandardMaterial({
        color: 0xff8833,
        map: makeBasketballTexture(),
        roughness: 0.8
      })
    );
    ballMesh.castShadow = true;
    ballMesh.receiveShadow = true;
    scene.add(ballMesh);

    // ------------------------------------------------------------
    // UI / HUD
    // ------------------------------------------------------------
    const sliderAngle = document.getElementById('slider-angle');
    const sliderSpeed = document.getElementById('slider-speed');
    const sliderSpin = document.getElementById('slider-spin');

    const valueAngle = document.getElementById('value-angle');
    const valueSpeed = document.getElementById('value-speed');
    const valueSpin = document.getElementById('value-spin');

    const hudScore = document.getElementById('hud-score');
    const hudAttempts = document.getElementById('hud-attempts');
    const hudAccuracy = document.getElementById('hud-accuracy');
    const hudHeight = document.getElementById('hud-height');
    const hudSpeed = document.getElementById('hud-speed');
    const hudStatus = document.getElementById('hud-status');

    function syncSliderLabels() {
      valueAngle.textContent = `${sliderAngle.value}°`;
      valueSpeed.textContent = `${sliderSpeed.value}`;
      valueSpin.textContent = `${sliderSpin.value}`;
    }
    sliderAngle.addEventListener('input', syncSliderLabels);
    sliderSpeed.addEventListener('input', syncSliderLabels);
    sliderSpin.addEventListener('input', syncSliderLabels);
    syncSliderLabels();

    let score = 0;
    let attempts = 0;
    let status = 'Ready';
    let frameCount = 0;

    // ------------------------------------------------------------
    // Helpers
    // ------------------------------------------------------------
    const tmpV1 = new THREE.Vector3();
    const tmpV2 = new THREE.Vector3();
    const tmpV3 = new THREE.Vector3();

    function clamp(x, a, b) {
      return Math.max(a, Math.min(b, x));
    }

    function resetBall() {
      ball.pos.copy(throwPos);
      ball.prevPos.copy(throwPos);
      ball.vel.set(0, 0, 0);
      ball.spin = parseFloat(sliderSpin.value);
      ball.flying = false;
      ball.scoredThisShot = false;
      ball.shotResolved = false;
      ball.passedRimPlane = false;
      status = 'Ready';
    }

    function throwBall() {
      if (ball.flying) return;
      const angle = THREE.MathUtils.degToRad(parseFloat(sliderAngle.value));
      const speed = parseFloat(sliderSpeed.value);
      ball.spin = parseFloat(sliderSpin.value);

      ball.pos.copy(throwPos);
      ball.vel.set(0, speed * Math.sin(angle), -speed * Math.cos(angle));
      ball.prevPos.copy(ball.pos.clone().sub(ball.vel.clone().multiplyScalar(1/120)));
      ball.flying = true;
      ball.scoredThisShot = false;
      ball.shotResolved = false;
      ball.passedRimPlane = false;
      attempts++;
      status = 'Flying';
    }

    // ------------------------------------------------------------
    // Physics
    // ------------------------------------------------------------
    const dt = 1 / 120;
    const substeps = 2;

    function integrateBallVerlet(dt) {
      const current = ball.pos.clone();
      const inferredVel = ball.pos.clone().sub(ball.prevPos).divideScalar(dt);
      ball.vel.copy(inferredVel);

      const spinDragFactor = 1 + Math.abs(ball.spin) * 0.015;
      const dragAcc = inferredVel.clone().multiplyScalar(-baseDrag * spinDragFactor);
      const acc = gravity.clone().add(dragAcc);

      const next = ball.pos.clone()
        .multiplyScalar(2)
        .sub(ball.prevPos)
        .add(acc.multiplyScalar(dt * dt));

      ball.prevPos.copy(current);
      ball.pos.copy(next);
      ball.vel.copy(ball.pos.clone().sub(ball.prevPos).divideScalar(dt));

      // visual spin
      ballMesh.rotation.x += ball.spin * dt;
    }

    function applyBallVelocityImmediate(newVel, dt) {
      ball.vel.copy(newVel);
      ball.prevPos.copy(ball.pos.clone().sub(newVel.clone().multiplyScalar(dt)));
    }

    function floorCollision() {
      if (ball.pos.y < ballRadius) {
        ball.pos.y = ballRadius;
        const v = ball.vel.clone();
        if (v.y < 0) v.y *= -0.7;
        v.x *= (1 - 0.4);
        v.z *= (1 - 0.4);
        applyBallVelocityImmediate(v, dt);
      }
    }

    function backboardCollision() {
      const half = new THREE.Vector3(0.9, 0.6, 0.025);
      const boardCenter = backboard.position;
      const local = ball.pos.clone().sub(boardCenter);

      const closest = new THREE.Vector3(
        clamp(local.x, -half.x, half.x),
        clamp(local.y, -half.y, half.y),
        clamp(local.z, -half.z, half.z)
      );

      const worldClosest = closest.clone().add(boardCenter);
      const delta = ball.pos.clone().sub(worldClosest);
      const dist = delta.length();

      if (dist < ballRadius) {
        const normal = dist > 1e-6 ? delta.normalize() : new THREE.Vector3(0, 0, 1);
        ball.pos.copy(worldClosest.clone().add(normal.clone().multiplyScalar(ballRadius + 1e-4)));
        const v = ball.vel.clone();
        const vn = normal.clone().multiplyScalar(v.dot(normal));
        const vt = v.clone().sub(vn);
        const newVel = vt.add(vn.multiplyScalar(-0.5));
        applyBallVelocityImmediate(newVel, dt);
      }
    }

    function rimCollision() {
      for (let i = 0; i < RIM_SEGMENTS; i++) {
        const a = rimSegments[i].pos;
        const b = rimSegments[(i + 1) % RIM_SEGMENTS].pos;

        const ab = tmpV1.subVectors(b, a);
        const ap = tmpV2.subVectors(ball.pos, a);
        const t = clamp(ap.dot(ab) / Math.max(ab.lengthSq(), 1e-8), 0, 1);
        const closest = a.clone().add(ab.clone().multiplyScalar(t));
        const delta = ball.pos.clone().sub(closest);
        const dist = delta.length();
        const hitDist = ballRadius + rimTubeRadius;

        if (dist < hitDist) {
          const normal = dist > 1e-6 ? delta.normalize() : new THREE.Vector3(0, 1, 0);
          const penetration = hitDist - dist;

          ball.pos.add(normal.clone().multiplyScalar(penetration + 1e-4));

          const segVel = rimSegments[i].vel.clone().lerp(rimSegments[(i + 1) % RIM_SEGMENTS].vel, t);
          const relVel = ball.vel.clone().sub(segVel);
          const vn = relVel.dot(normal);

          if (vn < 0) {
            const restitution = 0.6;
            const impulseMag = -(1 + restitution) * vn * 0.75;
            const impulse = normal.clone().multiplyScalar(impulseMag);

            const newBallVel = ball.vel.clone().add(impulse.clone());
            applyBallVelocityImmediate(newBallVel, dt);

            rimSegments[i].vel.add(impulse.clone().multiplyScalar(-0.7 / rimMass));
            rimSegments[(i + 1) % RIM_SEGMENTS].vel.add(impulse.clone().multiplyScalar(-0.3 / rimMass));

            // extra downward deflection
            rimSegments[i].vel.y -= Math.abs(vn) * 0.15;
          }
        }
      }
    }

    function netCollision() {
      for (const chain of netChains) {
        for (const p of chain.points) {
          const delta = p.pos.clone().sub(ball.pos);
          const dist = delta.length();
          const minDist = ballRadius + 0.03;
          if (dist < minDist) {
            const n = dist > 1e-6 ? delta.normalize() : new THREE.Vector3(0, 1, 0);
            const push = minDist - dist;
            p.pos.add(n.clone().multiplyScalar(push * 0.65));
            p.vel.add(n.clone().multiplyScalar(2.2));
            const dampVel = ball.vel.clone().add(n.clone().multiplyScalar(-0.2));
            dampVel.multiplyScalar(0.995);
            applyBallVelocityImmediate(dampVel, dt);
          }
        }
      }
    }

    function updateRimPhysics(dt) {
      for (let i = 0; i < RIM_SEGMENTS; i++) {
        const seg = rimSegments[i];
        seg.force.set(0, 0, 0);

        // spring to rest
        const toRest = seg.pos.clone().sub(seg.rest);
        seg.force.add(toRest.multiplyScalar(-rimK));
        seg.force.add(seg.vel.clone().multiplyScalar(-rimC));

        // neighbor springs
        const next = rimSegments[(i + 1) % RIM_SEGMENTS];
        const prev = rimSegments[(i - 1 + RIM_SEGMENTS) % RIM_SEGMENTS];

        for (const [other, restLen] of [[next, rimNeighborRest[i]], [prev, rimNeighborRest[(i - 1 + RIM_SEGMENTS) % RIM_SEGMENTS]]]) {
          const d = other.pos.clone().sub(seg.pos);
          const len = d.length();
          if (len > 1e-6) {
            const dir = d.clone().divideScalar(len);
            const rel = other.vel.clone().sub(seg.vel);
            const stretch = len - restLen;
            const fs = dir.clone().multiplyScalar(rimK * stretch + rimC * rel.dot(dir));
            seg.force.add(fs);
          }
        }

        // mount point spring
        const dm = mountPoint.clone().sub(seg.pos);
        const lm = dm.length();
        if (lm > 1e-6) {
          const dir = dm.clone().divideScalar(lm);
          const stretch = lm - rimMountRest[i];
          const fs = dir.multiplyScalar(rimK * 0.6 * stretch - rimC * 0.2 * seg.vel.dot(dir));
          seg.force.add(fs);
        }
      }

      for (const seg of rimSegments) {
        const acc = seg.force.clone().divideScalar(rimMass);
        seg.vel.add(acc.multiplyScalar(dt));
        seg.vel.multiplyScalar(0.992);
        seg.pos.add(seg.vel.clone().multiplyScalar(dt));
      }
    }

    function updateNetPhysics(dt) {
      for (const chain of netChains) {
        const anchor = rimSegments[chain.points[0].attachSegment].pos;

        for (let j = 0; j < chain.points.length; j++) {
          const p = chain.points[j];
          p.force.set(0, -9.81 * netMass, 0);
          p.force.add(p.vel.clone().multiplyScalar(-0.6));

          const parentPos = (j === 0) ? anchor : chain.points[j - 1].pos;
          const parentVel = (j === 0) ? rimSegments[p.attachSegment].vel : chain.points[j - 1].vel;

          const d = parentPos.clone().sub(p.pos);
          const len = d.length();
          if (len > 1e-6) {
            const dir = d.clone().divideScalar(len);
            const relVel = parentVel.clone().sub(p.vel);
            const stretch = len - netRest;
            p.force.add(dir.clone().multiplyScalar(netK * stretch + netC * relVel.dot(dir)));
          }

          if (j < chain.points.length - 1) {
            const child = chain.points[j + 1];
            const d2 = child.pos.clone().sub(p.pos);
            const len2 = d2.length();
            if (len2 > 1e-6) {
              const dir2 = d2.clone().divideScalar(len2);
              const relVel2 = child.vel.clone().sub(p.vel);
              const stretch2 = len2 - netRest;
              p.force.add(dir2.clone().multiplyScalar(netK * stretch2 + netC * relVel2.dot(dir2)));
            }
          }
        }

        for (const p of chain.points) {
          const acc = p.force.clone().divideScalar(netMass);
          p.vel.add(acc.multiplyScalar(dt));
          p.vel.multiplyScalar(0.985);
          p.pos.add(p.vel.clone().multiplyScalar(dt));
        }
      }
    }

    function detectScoreAndShotState(prevY, prevPos) {
      // Score when crossing rim plane downward through hoop cylinder
      const rimY = 3.05;
      if (!ball.scoredThisShot) {
        if (prevY > rimY && ball.pos.y <= rimY) {
          const xzDist = Math.hypot(ball.pos.x - rimCenter.x, ball.pos.z - rimCenter.z);
          if (xzDist < rimRadius - ballRadius * 0.15) {
            ball.scoredThisShot = true;
            score++;
            status = 'Scored!';
          }
        }
      }

      if (ball.flying && !ball.shotResolved) {
        if (ball.pos.y < 0.2 && ball.vel.length() < 1.0) {
          ball.shotResolved = true;
          if (!ball.scoredThisShot) status = 'Missed';
          ball.flying = false;
        } else if (ball.pos.z < -7.5 || Math.abs(ball.pos.x) > 8 || ball.pos.y < -2) {
          ball.shotResolved = true;
          if (!ball.scoredThisShot) status = 'Missed';
          ball.flying = false;
        }
      }
    }

    // ------------------------------------------------------------
    // State exposure
    // ------------------------------------------------------------
    window.__3D_STATE__ = {};

    function updateHudAndState() {
      const launchAngle = parseFloat(sliderAngle.value);
      const launchSpeed = parseFloat(sliderSpeed.value);
      const backspin = parseFloat(sliderSpin.value);
      const ballSpeed = ball.vel.length();
      const accuracy = attempts > 0 ? (score / attempts) * 100 : 0;

      let rimDeflection = 0;
      for (const seg of rimSegments) {
        rimDeflection = Math.max(rimDeflection, seg.pos.distanceTo(seg.rest));
      }

      hudScore.textContent = score;
      hudAttempts.textContent = attempts;
      hudAccuracy.textContent = `${accuracy.toFixed(1)}%`;
      hudHeight.textContent = ball.pos.y.toFixed(2);
      hudSpeed.textContent = ballSpeed.toFixed(2);
      hudStatus.textContent = status;

      const ballValid =
        Number.isFinite(ball.pos.x) &&
        Number.isFinite(ball.pos.y) &&
        Number.isFinite(ball.pos.z);

      window.__3D_STATE__ = {
        score,
        attempts,
        accuracy: Math.round(accuracy * 10) / 10,
        ballHeight: Math.round(ball.pos.y * 1000) / 1000,
        ballSpeed: Math.round(ballSpeed * 1000) / 1000,
        status,
        launchAngle,
        launchSpeed,
        backspin,
        frameCount,
        ballValid,
        rimDeflection: Math.round(rimDeflection * 10000) / 10000
      };
    }

    // ------------------------------------------------------------
    // Events
    // ------------------------------------------------------------
    window.addEventListener('keydown', (e) => {
      if (e.key === 't' || e.key === 'T') throwBall();
      if (e.key === 'r' || e.key === 'R') resetBall();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ------------------------------------------------------------
    // Init
    // ------------------------------------------------------------
    resetBall();
    updateRimMeshes();
    updateNetLines();

    // Court markings
    const courtLines = new THREE.Group();
    scene.add(courtLines);

    function addCourtLine(points, color = 0xffffff) {
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color }));
      line.position.y = 0.01;
      courtLines.add(line);
    }

    addCourtLine([
      new THREE.Vector3(-3, 0, 6),
      new THREE.Vector3(3, 0, 6),
      new THREE.Vector3(3, 0, -5),
      new THREE.Vector3(-3, 0, -5),
      new THREE.Vector3(-3, 0, 6)
    ], 0xf5f1da);

    // ------------------------------------------------------------
    // Animation loop
    // ------------------------------------------------------------
    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      controls.update();

      for (let s = 0; s < substeps; s++) {
        updateRimPhysics(dt / substeps);
        updateNetPhysics(dt / substeps);

        if (ball.flying) {
          const prevY = ball.pos.y;
          const prevPos = ball.pos.clone();

          integrateBallVerlet(dt / substeps);
          rimCollision();
          backboardCollision();
          floorCollision();
          netCollision();
          detectScoreAndShotState(prevY, prevPos);
        }
      }

      ballMesh.position.copy(ball.pos);
      updateRimMeshes();
      updateNetLines();

      updateHudAndState(); // update every frame before rendering
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
