<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Basketball Free Throw Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #334455;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            user-select: none;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .control-group label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }
        .control-group span {
            font-weight: bold;
            font-size: 14px;
        }
        input[type=range] {
            width: 120px;
            cursor: pointer;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-left: 10px;
        }
        button {
            background: #ff8833;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #ffaa66;
        }
        button:active {
            background: #cc6622;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #ff8833;
            text-transform: uppercase;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            width: 180px;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .hud-label {
            color: #aaa;
        }
        .hud-value {
            font-weight: bold;
            font-family: monospace;
            font-size: 15px;
        }
        #hud-status {
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            padding: 5px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
        }
        .status-ready { color: #44ff44; }
        .status-flying { color: #ffff44; }
        .status-scored { color: #44ffff; background: rgba(68, 255, 255, 0.2) !important; }
        .status-missed { color: #ff4444; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud">
        <h2>Stats</h2>
        <div class="hud-row"><span class="hud-label">Score:</span> <span class="hud-value" id="hud-score">0</span></div>
        <div class="hud-row"><span class="hud-label">Attempts:</span> <span class="hud-value" id="hud-attempts">0</span></div>
        <div class="hud-row"><span class="hud-label">Accuracy:</span> <span class="hud-value" id="hud-accuracy">0.0%</span></div>
        <div style="height: 10px;"></div>
        <div class="hud-row"><span class="hud-label">Height:</span> <span class="hud-value" id="hud-height">1.80</span></div>
        <div class="hud-row"><span class="hud-label">Speed:</span> <span class="hud-value" id="hud-speed">0.00</span></div>
        <div id="hud-status" class="status-ready">Ready</div>
    </div>

    <div id="ui-panel">
        <div class="control-group">
            <label for="slider-angle">Angle (deg)</label>
            <input type="range" id="slider-angle" min="30" max="70" step="1" value="52">
            <span id="val-angle">52</span>
        </div>
        <div class="control-group">
            <label for="slider-speed">Speed (m/s)</label>
            <input type="range" id="slider-speed" min="5" max="15" step="0.5" value="8.5">
            <span id="val-speed">8.5</span>
        </div>
        <div class="control-group">
            <label for="slider-spin">Backspin</label>
            <input type="range" id="slider-spin" min="-10" max="10" step="1" value="3">
            <span id="val-spin">3</span>
        </div>
        <div class="btn-group">
            <button id="btn-throw">Throw (T)</button>
            <button id="btn-reset">Reset (R)</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            score: 0,
            attempts: 0,
            accuracy: 0.0,
            ballHeight: 1.8,
            ballSpeed: 0.0,
            status: 'Ready',
            launchAngle: 52,
            launchSpeed: 8.5,
            backspin: 3,
            frameCount: 0,
            ballValid: true,
            rimDeflection: 0.0
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x334455);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 3, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 3, 0);
        controls.update();

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x445566, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Texture Generators ---
        function createWoodTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#bb8844';
            ctx.fillRect(0, 0, 512, 512);
            ctx.fillStyle = '#a07030';
            for (let i = 0; i < 200; i++) {
                ctx.globalAlpha = Math.random() * 0.5 + 0.1;
                ctx.fillRect(Math.random() * 512, Math.random() * 512, Math.random() * 150 + 50, Math.random() * 3 + 1);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(4, 3);
            return tex;
        }

        function createBackboardTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#eeeeee';
            ctx.fillRect(0, 0, 512, 256);
            ctx.strokeStyle = '#dd0000';
            ctx.lineWidth = 8;
            // Target square (scaled to 1.8x1.2 ratio)
            ctx.strokeRect(256 - 60, 128 - 40, 120, 90);
            return new THREE.CanvasTexture(canvas);
        }

        function createBallTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ff8833';
            ctx.fillRect(0, 0, 512, 256);
            ctx.strokeStyle = '#331100';
            ctx.lineWidth = 6;
            ctx.beginPath(); ctx.moveTo(0, 128); ctx.lineTo(512, 128); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(256, 0); ctx.lineTo(256, 256); ctx.stroke();
            return new THREE.CanvasTexture(canvas);
        }

        // --- Environment Objects ---
        // Floor
        const floorGeo = new THREE.PlaneGeometry(30, 20);
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff, 
            map: createWoodTexture(),
            roughness: 0.8
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Pole
        const poleGeo = new THREE.CylinderGeometry(0.08, 0.08, 3.05, 16);
        const poleMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.6, roughness: 0.4 });
        const pole = new THREE.Mesh(poleGeo, poleMat);
        pole.position.set(0, 3.05 / 2, -5.2);
        pole.castShadow = true;
        pole.receiveShadow = true;
        scene.add(pole);

        // Backboard
        const bbGeo = new THREE.BoxGeometry(1.8, 1.2, 0.05);
        const bbMat = new THREE.MeshStandardMaterial({ map: createBackboardTexture(), roughness: 0.3 });
        const backboard = new THREE.Mesh(bbGeo, bbMat);
        backboard.position.set(0, 3.05, -5);
        backboard.castShadow = true;
        backboard.receiveShadow = true;
        scene.add(backboard);

        // --- Physics System Setup ---
        const GRAVITY = new THREE.Vector3(0, -9.81, 0);
        const DT = 1 / 120; // 2 substeps per 60fps frame
        const SUBSTEPS = 2;

        // Ball
        const ballRadius = 0.12;
        const ballMass = 0.6;
        const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 16);
        const ballMat = new THREE.MeshStandardMaterial({ map: createBallTexture(), roughness: 0.6 });
        const ballMesh = new THREE.Mesh(ballGeo, ballMat);
        ballMesh.castShadow = true;
        ballMesh.receiveShadow = true;
        scene.add(ballMesh);

        const ball = {
            pos: new THREE.Vector3(0, 1.8, 8),
            oldPos: new THREE.Vector3(0, 1.8, 8),
            radius: ballRadius,
            mass: ballMass,
            drag: 0.01,
            restitutionFloor: 0.7,
            frictionFloor: 0.4,
            restitutionBB: 0.5,
            restitutionRim: 0.6
        };

        // Rim Physics (12 segments)
        const rimRadius = 0.45;
        const rimTube = 0.025;
        const rimCenter = new THREE.Vector3(0, 3.05, -4.4);
        const numRimNodes = 12;
        const rimNodes = [];
        const rimMeshes = [];
        
        const rimMat = new THREE.MeshStandardMaterial({ color: 0xff4400, roughness: 0.4, metalness: 0.2 });
        const cylGeo = new THREE.CylinderGeometry(rimTube, rimTube, 1, 8);
        cylGeo.rotateX(Math.PI / 2); // Align with Z axis for lookAt

        for (let i = 0; i < numRimNodes; i++) {
            const angle = (i / numRimNodes) * Math.PI * 2;
            const x = rimCenter.x + Math.cos(angle) * rimRadius;
            const z = rimCenter.z + Math.sin(angle) * rimRadius;
            const pos = new THREE.Vector3(x, rimCenter.y, z);
            
            rimNodes.push({
                pos: pos.clone(),
                oldPos: pos.clone(),
                restPos: pos.clone(),
                force: new THREE.Vector3(),
                mass: 0.5
            });

            const mesh = new THREE.Mesh(cylGeo, rimMat);
            mesh.castShadow = true;
            scene.add(mesh);
            rimMeshes.push(mesh);
        }

        // Net Physics (12 chains x 5 nodes)
        const netChains = 12;
        const netLevels = 5;
        const netNodes = [];
        const netSprings = [];
        
        for (let c = 0; c < netChains; c++) {
            const chain = [];
            const angle = (c / netChains) * Math.PI * 2;
            for (let l = 0; l < netLevels; l++) {
                // Taper the net slightly
                const r = rimRadius - (l * 0.04);
                const x = rimCenter.x + Math.cos(angle) * r;
                const z = rimCenter.z + Math.sin(angle) * r;
                const y = rimCenter.y - (l * 0.15);
                chain.push({
                    pos: new THREE.Vector3(x, y, z),
                    oldPos: new THREE.Vector3(x, y, z),
                    force: new THREE.Vector3(),
                    mass: 0.05,
                    isStatic: l === 0 // Top nodes attached to rim
                });
            }
            netNodes.push(chain);
        }

        // Setup Net Springs
        const netK = 80;
        const netDamp = 3;
        const netRestV = 0.15;
        
        for (let c = 0; c < netChains; c++) {
            for (let l = 0; l < netLevels; l++) {
                // Vertical springs
                if (l < netLevels - 1) {
                    netSprings.push({
                        n1: netNodes[c][l],
                        n2: netNodes[c][l+1],
                        k: netK, damp: netDamp, rest: netRestV
                    });
                }
                // Horizontal springs (rings)
                const nextC = (c + 1) % netChains;
                const r = rimRadius - (l * 0.04);
                const restH = 2 * Math.PI * r / netChains;
                netSprings.push({
                    n1: netNodes[c][l],
                    n2: netNodes[nextC][l],
                    k: netK * 0.5, damp: netDamp, rest: restH
                });
            }
        }

        // Net Visuals
        const netGeo = new THREE.BufferGeometry();
        const netPositions = new Float32Array(netSprings.length * 6);
        netGeo.setAttribute('position', new THREE.BufferAttribute(netPositions, 3));
        const netMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
        const netMesh = new THREE.LineSegments(netGeo, netMat);
        scene.add(netMesh);

        // --- Physics Engine ---

        function applySpringForce(n1, n2, k, damp, rest, dt) {
            const delta = new THREE.Vector3().subVectors(n2.pos, n1.pos);
            const dist = delta.length();
            if (dist === 0) return;
            const dir = delta.clone().divideScalar(dist);
            
            const v1 = new THREE.Vector3().subVectors(n1.pos, n1.oldPos).divideScalar(dt);
            const v2 = new THREE.Vector3().subVectors(n2.pos, n2.oldPos).divideScalar(dt);
            const relVel = new THREE.Vector3().subVectors(v2, v1);
            
            const springForce = (dist - rest) * k;
            const dampForce = relVel.dot(dir) * damp;
            const totalForce = dir.multiplyScalar(springForce + dampForce);
            
            n1.force.add(totalForce);
            n2.force.sub(totalForce);
        }

        function updatePhysics() {
            // --- Ball Integration ---
            if (state.status === 'Flying' || state.status === 'Missed' || state.status === 'Scored!') {
                const vel = new THREE.Vector3().subVectors(ball.pos, ball.oldPos);
                
                // Air drag
                vel.multiplyScalar(1 - ball.drag * DT);
                
                // Magnus effect (backspin)
                if (state.status === 'Flying') {
                    const spinAxis = new THREE.Vector3(1, 0, 0); // Assuming spin around X
                    const magnus = new THREE.Vector3().crossVectors(vel, spinAxis).multiplyScalar(state.backspin * 0.002);
                    vel.add(magnus.multiplyScalar(DT));
                }

                ball.oldPos.copy(ball.pos);
                ball.pos.add(vel).add(GRAVITY.clone().multiplyScalar(DT * DT));
            }

            // --- Rim Physics ---
            let maxDeflection = 0;
            for (let i = 0; i < numRimNodes; i++) {
                const n = rimNodes[i];
                n.force.set(0, 0, 0);
                
                // Spring to rest position (mount/stiffness)
                const deltaRest = new THREE.Vector3().subVectors(n.restPos, n.pos);
                const distRest = deltaRest.length();
                maxDeflection = Math.max(maxDeflection, distRest);
                
                const v = new THREE.Vector3().subVectors(n.pos, n.oldPos).divideScalar(DT);
                const forceRest = deltaRest.multiplyScalar(500).sub(v.clone().multiplyScalar(10));
                n.force.add(forceRest);

                // Spring to neighbors
                const prev = rimNodes[(i - 1 + numRimNodes) % numRimNodes];
                const next = rimNodes[(i + 1) % numRimNodes];
                const restDist = (2 * Math.PI * rimRadius) / numRimNodes;
                
                applySpringForce(n, next, 1000, 10, restDist, DT);
            }
            state.rimDeflection = maxDeflection;

            for (let i = 0; i < numRimNodes; i++) {
                const n = rimNodes[i];
                const temp = n.pos.clone();
                const vel = new THREE.Vector3().subVectors(n.pos, n.oldPos);
                n.pos.add(vel).add(n.force.multiplyScalar(DT * DT / n.mass));
                n.oldPos.copy(temp);
            }

            // --- Net Physics ---
            for (let c = 0; c < netChains; c++) {
                for (let l = 0; l < netLevels; l++) {
                    const n = netNodes[c][l];
                    n.force.copy(GRAVITY).multiplyScalar(n.mass);
                    if (l === 0) {
                        // Attach top to rim nodes
                        n.pos.copy(rimNodes[c].pos);
                        n.oldPos.copy(rimNodes[c].oldPos);
                    }
                }
            }

            for (const s of netSprings) {
                applySpringForce(s.n1, s.n2, s.k, s.damp, s.rest, DT);
            }

            for (let c = 0; c < netChains; c++) {
                for (let l = 1; l < netLevels; l++) { // Skip l=0 (static)
                    const n = netNodes[c][l];
                    const temp = n.pos.clone();
                    const vel = new THREE.Vector3().subVectors(n.pos, n.oldPos);
                    n.pos.add(vel).add(n.force.multiplyScalar(DT * DT / n.mass));
                    n.oldPos.copy(temp);
                }
            }

            // --- Collisions ---

            // 1. Ball vs Floor
            if (ball.pos.y < ball.radius) {
                ball.pos.y = ball.radius;
                const vel = new THREE.Vector3().subVectors(ball.pos, ball.oldPos);
                vel.y *= -ball.restitutionFloor;
                vel.x *= (1 - ball.frictionFloor);
                vel.z *= (1 - ball.frictionFloor);
                ball.oldPos.copy(ball.pos).sub(vel);
                
                if (state.status === 'Flying') {
                    setStatus('Missed');
                }
            }

            // 2. Ball vs Backboard
            // Backboard bounds: x[-0.9, 0.9], y[2.45, 3.65], z[-5.025, -4.975]
            if (ball.pos.z - ball.radius < -4.975 && ball.pos.z + ball.radius > -5.025) {
                if (ball.pos.x > -0.9 && ball.pos.x < 0.9 && ball.pos.y > 2.45 && ball.pos.y < 3.65) {
                    // Push out
                    ball.pos.z = -4.975 + ball.radius;
                    const vel = new THREE.Vector3().subVectors(ball.pos, ball.oldPos);
                    vel.z *= -ball.restitutionBB;
                    ball.oldPos.copy(ball.pos).sub(vel);
                }
            }

            // 3. Ball vs Rim Segments
            for (let i = 0; i < numRimNodes; i++) {
                const n1 = rimNodes[i];
                const n2 = rimNodes[(i + 1) % numRimNodes];
                
                const line = new THREE.Line3(n1.pos, n2.pos);
                const closest = new THREE.Vector3();
                line.closestPointToPoint(ball.pos, true, closest);
                
                const dist = ball.pos.distanceTo(closest);
                const minDist = ball.radius + rimTube;
                
                if (dist < minDist) {
                    const normal = new THREE.Vector3().subVectors(ball.pos, closest).normalize();
                    const penetration = minDist - dist;
                    
                    // Push ball
                    ball.pos.add(normal.clone().multiplyScalar(penetration * 0.8));
                    
                    // Push rim nodes
                    const d1 = closest.distanceTo(n1.pos);
                    const d2 = closest.distanceTo(n2.pos);
                    const len = d1 + d2 || 1;
                    const w1 = 1 - (d1 / len);
                    const w2 = 1 - (d2 / len);
                    
                    n1.pos.sub(normal.clone().multiplyScalar(penetration * 0.2 * w1));
                    n2.pos.sub(normal.clone().multiplyScalar(penetration * 0.2 * w2));

                    // Velocity reflection
                    const vel = new THREE.Vector3().subVectors(ball.pos, ball.oldPos);
                    const dot = vel.dot(normal);
                    if (dot < 0) {
                        vel.sub(normal.clone().multiplyScalar(dot * (1 + ball.restitutionRim)));
                        ball.oldPos.copy(ball.pos).sub(vel);
                    }
                }
            }

            // 4. Ball vs Net Nodes
            for (let c = 0; c < netChains; c++) {
                for (let l = 1; l < netLevels; l++) {
                    const n = netNodes[c][l];
                    const dist = ball.pos.distanceTo(n.pos);
                    const minDist = ball.radius + 0.05; // Net node interaction radius
                    if (dist < minDist) {
                        const normal = new THREE.Vector3().subVectors(n.pos, ball.pos).normalize();
                        const pen = minDist - dist;
                        n.pos.add(normal.multiplyScalar(pen * 0.5));
                        
                        // Slight drag on ball
                        const vel = new THREE.Vector3().subVectors(ball.pos, ball.oldPos);
                        vel.multiplyScalar(0.98);
                        ball.oldPos.copy(ball.pos).sub(vel);
                    }
                }
            }

            // --- Scoring Logic ---
            if (state.status === 'Flying') {
                // Check if passed through rim plane downwards
                if (ball.oldPos.y > 3.05 && ball.pos.y <= 3.05) {
                    const distXZ = Math.hypot(ball.pos.x - rimCenter.x, ball.pos.z - rimCenter.z);
                    if (distXZ < rimRadius - ball.radius + 0.05) { // Margin for error
                        state.score++;
                        setStatus('Scored!');
                    }
                }
            }
        }

        // --- Game Logic & Controls ---

        function throwBall() {
            if (state.status === 'Flying') return;
            
            state.attempts++;
            state.launchAngle = parseFloat(document.getElementById('slider-angle').value);
            state.launchSpeed = parseFloat(document.getElementById('slider-speed').value);
            state.backspin = parseFloat(document.getElementById('slider-spin').value);
            
            const angleRad = state.launchAngle * Math.PI / 180;
            const speed = state.launchSpeed;
            
            const vy = speed * Math.sin(angleRad);
            const vz = -speed * Math.cos(angleRad);
            const vx = 0;

            ball.pos.set(0, 1.8, 8);
            const vel = new THREE.Vector3(vx, vy, vz);
            ball.oldPos.copy(ball.pos).sub(vel.multiplyScalar(DT));
            
            setStatus('Flying');
        }

        function resetBall() {
            ball.pos.set(0, 1.8, 8);
            ball.oldPos.set(0, 1.8, 8);
            setStatus('Ready');
        }

        function setStatus(newStatus) {
            state.status = newStatus;
            const el = document.getElementById('hud-status');
            el.textContent = newStatus;
            el.className = '';
            if (newStatus === 'Ready') el.classList.add('status-ready');
            if (newStatus === 'Flying') el.classList.add('status-flying');
            if (newStatus === 'Scored!') el.classList.add('status-scored');
            if (newStatus === 'Missed') el.classList.add('status-missed');
            updateHUD();
        }

        function updateHUD() {
            state.accuracy = state.attempts > 0 ? (state.score / state.attempts) * 100 : 0;
            document.getElementById('hud-score').textContent = state.score;
            document.getElementById('hud-attempts').textContent = state.attempts;
            document.getElementById('hud-accuracy').textContent = state.accuracy.toFixed(1) + '%';
        }

        // Event Listeners
        document.getElementById('btn-throw').addEventListener('click', throwBall);
        document.getElementById('btn-reset').addEventListener('click', resetBall);
        
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 't') throwBall();
            if (e.key.toLowerCase() === 'r') resetBall();
        });

        const sliders = ['angle', 'speed', 'spin'];
        sliders.forEach(id => {
            const el = document.getElementById(`slider-${id}`);
            const valEl = document.getElementById(`val-${id}`);
            el.addEventListener('input', (e) => {
                valEl.textContent = e.target.value;
                if (id === 'angle') state.launchAngle = parseFloat(e.target.value);
                if (id === 'speed') state.launchSpeed = parseFloat(e.target.value);
                if (id === 'spin') state.backspin = parseFloat(e.target.value);
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Physics Substeps
            for (let i = 0; i < SUBSTEPS; i++) {
                updatePhysics();
            }

            // Update Meshes
            ballMesh.position.copy(ball.pos);
            
            // Spin ball visually based on velocity and backspin
            if (state.status === 'Flying' || state.status === 'Missed' || state.status === 'Scored!') {
                const vel = new THREE.Vector3().subVectors(ball.pos, ball.oldPos).divideScalar(DT);
                const speed = vel.length();
                if (speed > 0.1) {
                    const axis = new THREE.Vector3(-vel.z, 0, vel.x).normalize();
                    ballMesh.rotateOnWorldAxis(axis, speed * DT / ballRadius);
                }
                ballMesh.rotateOnWorldAxis(new THREE.Vector3(1,0,0), state.backspin * DT);
            } else {
                ballMesh.rotation.set(0,0,0);
            }

            // Update Rim Meshes
            for (let i = 0; i < numRimNodes; i++) {
                const n1 = rimNodes[i];
                const n2 = rimNodes[(i + 1) % numRimNodes];
                const mesh = rimMeshes[i];
                
                const mid = new THREE.Vector3().addVectors(n1.pos, n2.pos).multiplyScalar(0.5);
                mesh.position.copy(mid);
                mesh.lookAt(n2.pos);
                const dist = n1.pos.distanceTo(n2.pos);
                mesh.scale.set(1, 1, dist);
            }

            // Update Net Mesh
            let idx = 0;
            for (const s of netSprings) {
                netPositions[idx++] = s.n1.pos.x;
                netPositions[idx++] = s.n1.pos.y;
                netPositions[idx++] = s.n1.pos.z;
                netPositions[idx++] = s.n2.pos.x;
                netPositions[idx++] = s.n2.pos.y;
                netPositions[idx++] = s.n2.pos.z;
            }
            netGeo.attributes.position.needsUpdate = true;

            // Update State Object & HUD
            state.frameCount++;
            state.ballHeight = parseFloat(ball.pos.y.toFixed(3));
            const currentVel = new THREE.Vector3().subVectors(ball.pos, ball.oldPos).divideScalar(DT);
            state.ballSpeed = parseFloat(currentVel.length().toFixed(3));
            state.ballValid = !isNaN(ball.pos.x) && !isNaN(ball.pos.y) && !isNaN(ball.pos.z);
            state.rimDeflection = parseFloat(state.rimDeflection.toFixed(4));

            document.getElementById('hud-height').textContent = state.ballHeight.toFixed(2);
            document.getElementById('hud-speed').textContent = state.ballSpeed.toFixed(2);

            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize
        resetBall();
        animate();

    </script>
</body>
</html>
