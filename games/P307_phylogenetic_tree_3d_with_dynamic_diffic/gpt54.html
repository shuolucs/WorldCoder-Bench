<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Phylogenetic Tree</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      color: #e8ecff;
    }

    #container {
      position: fixed;
      inset: 0;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(12, 14, 28, 0.78);
      border: 1px solid rgba(120, 140, 255, 0.25);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.5;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
      max-width: 520px;
    }

    #diff-bar {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .diff-cell {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1px solid #7d89d6;
      background: rgba(255,255,255,0.08);
      box-sizing: border-box;
    }

    .diff-cell.filled {
      background: linear-gradient(180deg, #7ec8ff, #4967ff);
      box-shadow: 0 0 8px rgba(100, 160, 255, 0.45);
    }

    #info-panel {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 20;
      width: 260px;
      min-height: 90px;
      background: rgba(12, 14, 28, 0.82);
      border: 1px solid rgba(120, 140, 255, 0.25);
      border-radius: 10px;
      padding: 12px;
      display: none;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }

    #info-panel h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
      color: #ffffff;
    }

    #tooltip {
      position: fixed;
      z-index: 30;
      display: none;
      pointer-events: none;
      background: rgba(20, 24, 42, 0.95);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 12px;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
    }

    .label {
      color: #f0f4ff;
      font-size: 12px;
      text-shadow: 0 0 4px rgba(0,0,0,0.9);
      white-space: nowrap;
      user-select: none;
      pointer-events: none;
    }

    .keys {
      opacity: 0.85;
      margin-top: 8px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="container"></div>

  <div id="hud">
    <div id="hud-text">Loading...</div>
    <div id="diff-bar"></div>
    <div class="keys">
      Keys: D/A difficulty, R reset camera, C color mode, L labels, S spin
    </div>
  </div>

  <div id="info-panel"></div>
  <div id="tooltip"></div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'https://unpkg.com/three@0.160.0/examples/jsm/renderers/CSS2DRenderer.js';

    const container = document.getElementById('container');
    const hudText = document.getElementById('hud-text');
    const diffBar = document.getElementById('diff-bar');
    const infoPanel = document.getElementById('info-panel');
    const tooltip = document.getElementById('tooltip');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    const initialCameraPosition = new THREE.Vector3(0, 5, 25);
    const initialTarget = new THREE.Vector3(0, 0, 0);
    camera.position.copy(initialCameraPosition);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'fixed';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    labelRenderer.domElement.style.zIndex = '10';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.copy(initialTarget);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;

    const ambient = new THREE.AmbientLight(0x404060, 0.4);
    scene.add(ambient);

    const dir1 = new THREE.DirectionalLight(0xffffff, 0.8);
    dir1.position.set(10, 20, 15);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0x4488ff, 0.3);
    dir2.position.set(-10, -5, 10);
    scene.add(dir2);

    const treeGroup = new THREE.Group();
    scene.add(treeGroup);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock = new THREE.Clock();

    const SPECIES = [
      'Homo sapiens',
      'Pan troglodytes',
      'Gorilla gorilla',
      'Mus musculus',
      'Drosophila',
      'E. coli',
      'Arabidopsis',
      'Saccharomyces',
      'Canis lupus',
      'Felis catus',
      'Gallus gallus',
      'Danio rerio',
      'Xenopus',
      'Caenorhabditis',
      'Rattus norvegicus',
      'Bos taurus',
      'Sus scrofa',
      'Ovis aries',
      'Equus caballus',
      'Anolis carolinensis'
    ];

    const DEPTH_COLORS = [
      0xff4444,
      0xff8844,
      0xffff44,
      0x44ff44,
      0x44ffff,
      0x4444ff,
      0x8844ff
    ];

    const state = {
      difficultyLevel: 1,
      treeDepth: 3,
      totalNodes: 0,
      leafCount: 0,
      internalNodeCount: 0,
      selectedNodeId: null,
      selectedNodeDepth: null,
      selectedNodeDescendants: null,
      hoveredNodeId: null,
      colorMode: 'depth',
      labelsVisible: false,
      spinEnabled: false,
      spinAngle: 0,
      cameraPosition: { x: 0, y: 5, z: 25 },
      cameraDistance: 25.4951,
      frameCount: 0,
      treeGenCount: 1
    };

    window.__3D_STATE__ = state;

    let nodeIdCounter = 0;
    let rootNode = null;
    let allNodes = [];
    let nodeMeshes = [];
    let branchMeshes = [];
    let hoveredMesh = null;
    let selectedMesh = null;

    let cameraResetAnim = null;

    function safeNumber(n, fallback = 0) {
      return Number.isFinite(n) ? n : fallback;
    }

    function randRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function randomSpecies() {
      return SPECIES[Math.floor(Math.random() * SPECIES.length)];
    }

    function branchColorByDepth(depth) {
      return DEPTH_COLORS[Math.min(depth, 6)];
    }

    function hslColor(h, s, l) {
      const c = new THREE.Color();
      c.setHSL(h, s, l);
      return c;
    }

    function getNodeColor(node) {
      if (state.colorMode === 'depth') {
        return new THREE.Color(branchColorByDepth(node.depth));
      }

      const hue = node.topCladeHue ?? 0.75;
      const lightness = Math.max(0.35, 0.68 - node.depth * 0.06);
      return hslColor(hue, 0.75, lightness);
    }

    function clearTree() {
      for (const obj of [...treeGroup.children]) {
        treeGroup.remove(obj);
      }

      for (const mesh of nodeMeshes) {
        if (mesh.geometry) mesh.geometry.dispose();
        if (mesh.material) mesh.material.dispose();
      }

      for (const mesh of branchMeshes) {
        if (mesh.geometry) mesh.geometry.dispose();
        if (mesh.material) mesh.material.dispose();
      }

      allNodes = [];
      nodeMeshes = [];
      branchMeshes = [];
      nodeIdCounter = 0;
      rootNode = null;
      hoveredMesh = null;
      selectedMesh = null;
      tooltip.style.display = 'none';
      infoPanel.style.display = 'none';
    }

    function createNode(depth, position, parent = null, topCladeHue = null) {
      return {
        id: nodeIdCounter++,
        depth,
        position: position.clone(),
        parent,
        children: [],
        species: null,
        isLeaf: false,
        topCladeHue,
        descendants: 0,
        subtreeLeafCount: 0,
        mesh: null,
        labelObject: null
      };
    }

    function buildTreeRecursive(node, maxDepth) {
      if (node.depth >= maxDepth) {
        node.isLeaf = true;
        node.species = randomSpecies();
        return;
      }

      const childCount = Math.random() < 0.5 ? 2 : 3;
      const parentDir = node.parent
        ? node.position.clone().sub(node.parent.position).normalize()
        : new THREE.Vector3(0, 1, 0);

      for (let i = 0; i < childCount; i++) {
        const dir = parentDir.clone();

        const randomAxis = new THREE.Vector3(
          randRange(-1, 1),
          randRange(-0.2, 1),
          randRange(-1, 1)
        ).normalize();

        const angle = randRange(0.45, 1.05);
        dir.applyAxisAngle(randomAxis, angle);

        dir.x += randRange(-0.6, 0.6);
        dir.y += randRange(0.1, 0.9);
        dir.z += randRange(-0.6, 0.6);
        dir.normalize();

        const length = randRange(2.0, 4.0);
        const childPos = node.position.clone().add(dir.multiplyScalar(length));

        let cladeHue = node.topCladeHue;
        if (node.depth === 0) {
          cladeHue = Math.random();
        }

        const child = createNode(node.depth + 1, childPos, node, cladeHue);
        node.children.push(child);
        allNodes.push(child);
        buildTreeRecursive(child, maxDepth);
      }
    }

    function computeStats(node) {
      if (node.children.length === 0) {
        node.isLeaf = true;
        node.descendants = 0;
        node.subtreeLeafCount = 1;
        return { descendants: 0, leaves: 1 };
      }

      let desc = 0;
      let leaves = 0;
      for (const child of node.children) {
        const stats = computeStats(child);
        desc += 1 + stats.descendants;
        leaves += stats.leaves;
      }
      node.descendants = desc;
      node.subtreeLeafCount = leaves;
      return { descendants: desc, leaves };
    }

    function createBranch(start, end, color) {
      const path = new THREE.LineCurve3(start, end);
      const geometry = new THREE.TubeGeometry(path, 8, 0.08, 8, false);
      const material = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.45,
        metalness: 0.15,
        emissive: new THREE.Color(color).multiplyScalar(0.08)
      });
      const mesh = new THREE.Mesh(geometry, material);
      branchMeshes.push(mesh);
      treeGroup.add(mesh);
      return mesh;
    }

    function createLabel(node) {
      const div = document.createElement('div');
      div.className = 'label';
      div.textContent = node.species;
      div.style.display = state.labelsVisible ? 'block' : 'none';

      const label = new CSS2DObject(div);
      label.position.set(0, 0.45, 0);
      node.mesh.add(label);
      node.labelObject = label;
    }

    function renderNodeRecursive(node) {
      if (node.parent) {
        createBranch(node.parent.position, node.position, getNodeColor(node));
      }

      const color = node.isLeaf ? getNodeColor(node) : new THREE.Color(0x888888);
      const geometry = new THREE.SphereGeometry(0.3, 20, 20);
      const material = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.35,
        metalness: 0.2,
        emissive: 0x000000
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(node.position);
      mesh.userData.node = node;
      node.mesh = mesh;
      nodeMeshes.push(mesh);
      treeGroup.add(mesh);

      if (node.isLeaf) {
        createLabel(node);
      }

      for (const child of node.children) {
        renderNodeRecursive(child);
      }
    }

    function updateTreeColors() {
      for (const branch of branchMeshes) {
        // branch order matches nodes excluding root by creation; not reliable enough to map directly
      }

      const recolorRecursive = (node) => {
        if (node.mesh) {
          if (node.isLeaf) {
            node.mesh.material.color.copy(getNodeColor(node));
          } else {
            node.mesh.material.color.set(0x888888);
          }
        }

        for (const child of node.children) {
          const branchIndex = branchMeshes.findIndex(m =>
            m.geometry && m.parent === treeGroup && m.userData.from === undefined
          );
          recolorRecursive(child);
        }
      };

      // Rebuild branch colors by traversing actual nodes and matching branch meshes through custom refs
      const recolorBranches = (node) => {
        for (const child of node.children) {
          if (child._branchMesh) {
            const c = getNodeColor(child);
            child._branchMesh.material.color.copy(c);
            child._branchMesh.material.emissive.copy(c.clone().multiplyScalar(0.08));
          }
          recolorBranches(child);
        }
      };

      recolorRecursive(rootNode);
      recolorBranches(rootNode);
    }

    function assignBranchesRecursive(node) {
      for (const child of node.children) {
        const branch = createBranch(node.position, child.position, getNodeColor(child));
        child._branchMesh = branch;
        assignBranchesRecursive(child);
      }
    }

    function rebuildVisuals() {
      for (const obj of [...treeGroup.children]) {
        treeGroup.remove(obj);
      }

      for (const mesh of nodeMeshes) {
        if (mesh.geometry) mesh.geometry.dispose();
        if (mesh.material) mesh.material.dispose();
      }

      for (const mesh of branchMeshes) {
        if (mesh.geometry) mesh.geometry.dispose();
        if (mesh.material) mesh.material.dispose();
      }

      nodeMeshes = [];
      branchMeshes = [];

      assignBranchesRecursive(rootNode);
      renderNodeOnlyRecursive(rootNode);
    }

    function renderNodeOnlyRecursive(node) {
      const color = node.isLeaf ? getNodeColor(node) : new THREE.Color(0x888888);
      const geometry = new THREE.SphereGeometry(0.3, 20, 20);
      const material = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.35,
        metalness: 0.2,
        emissive: 0x000000
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(node.position);
      mesh.userData.node = node;
      node.mesh = mesh;
      nodeMeshes.push(mesh);
      treeGroup.add(mesh);

      if (node.isLeaf) {
        createLabel(node);
      }

      for (const child of node.children) {
        renderNodeOnlyRecursive(child);
      }
    }

    function generateTree() {
      clearTree();

      state.treeDepth = 2 + state.difficultyLevel;

      rootNode = createNode(0, new THREE.Vector3(0, 0, 0), null, null);
      allNodes.push(rootNode);
      buildTreeRecursive(rootNode, state.treeDepth);
      computeStats(rootNode);

      rebuildVisuals();

      state.totalNodes = allNodes.length;
      state.leafCount = allNodes.filter(n => n.isLeaf).length;
      state.internalNodeCount = allNodes.filter(n => !n.isLeaf).length;
      state.selectedNodeId = null;
      state.selectedNodeDepth = null;
      state.selectedNodeDescendants = null;
      state.hoveredNodeId = null;

      updateHUD();
    }

    function updateHUD() {
      state.treeDepth = 2 + state.difficultyLevel;
      hudText.textContent =
        `Difficulty: ${state.difficultyLevel}/5 | Nodes: ${state.totalNodes} | Leaves: ${state.leafCount} | Depth: ${state.treeDepth} | Color: ${state.colorMode} | Labels: ${state.labelsVisible ? 'on' : 'off'} | Spin: ${state.spinEnabled ? 'on' : 'off'}`;

      diffBar.innerHTML = '';
      for (let i = 1; i <= 5; i++) {
        const cell = document.createElement('div');
        cell.className = 'diff-cell' + (i <= state.difficultyLevel ? ' filled' : '');
        diffBar.appendChild(cell);
      }
    }

    function setHover(mesh, event) {
      if (hoveredMesh === mesh) {
        if (mesh && event) {
          tooltip.style.left = `${event.clientX + 12}px`;
          tooltip.style.top = `${event.clientY + 12}px`;
        }
        return;
      }

      clearHover();

      hoveredMesh = mesh;
      if (!mesh) return;

      const node = mesh.userData.node;
      if (mesh !== selectedMesh) {
        mesh.material.emissive.set(0xffff00);
        mesh.material.emissiveIntensity = 0.65;
      }

      state.hoveredNodeId = node.id;
      tooltip.style.display = 'block';
      tooltip.innerHTML = node.isLeaf
        ? `Species: ${node.species}, Depth: ${node.depth}`
        : `Node ID: ${node.id}, Depth: ${node.depth}`;

      if (event) {
        tooltip.style.left = `${event.clientX + 12}px`;
        tooltip.style.top = `${event.clientY + 12}px`;
      }
    }

    function clearHover() {
      if (hoveredMesh && hoveredMesh !== selectedMesh) {
        hoveredMesh.material.emissive.set(0x000000);
        hoveredMesh.material.emissiveIntensity = 1.0;
      }
      hoveredMesh = null;
      state.hoveredNodeId = null;
      tooltip.style.display = 'none';
    }

    function updateInfoPanel(node) {
      if (!node) {
        infoPanel.style.display = 'none';
        infoPanel.innerHTML = '';
        return;
      }

      infoPanel.style.display = 'block';
      infoPanel.innerHTML = `
        <h3>Selected Node</h3>
        <div><strong>Node ID:</strong> ${node.id}</div>
        <div><strong>Depth:</strong> ${node.depth}</div>
        <div><strong>Descendants:</strong> ${node.descendants}</div>
        <div><strong>Subtree Leaf Count:</strong> ${node.subtreeLeafCount}</div>
        ${node.isLeaf ? `<div><strong>Species:</strong> ${node.species}</div>` : ''}
      `;
    }

    function clearSelection() {
      if (selectedMesh) {
        selectedMesh.material.emissive.set(0x000000);
        selectedMesh.material.emissiveIntensity = 1.0;
        if (selectedMesh === hoveredMesh) {
          selectedMesh.material.emissive.set(0xffff00);
          selectedMesh.material.emissiveIntensity = 0.65;
        }
      }
      selectedMesh = null;
      state.selectedNodeId = null;
      state.selectedNodeDepth = null;
      state.selectedNodeDescendants = null;
      updateInfoPanel(null);
    }

    function selectNode(mesh) {
      if (!mesh) return;
      if (selectedMesh === mesh) {
        clearSelection();
        return;
      }

      clearSelection();

      selectedMesh = mesh;
      const node = mesh.userData.node;
      mesh.material.emissive.set(0xffffff);
      mesh.material.emissiveIntensity = 0.95;

      state.selectedNodeId = node.id;
      state.selectedNodeDepth = node.depth;
      state.selectedNodeDescendants = node.descendants;

      updateInfoPanel(node);
    }

    function updateLabelsVisibility() {
      for (const node of allNodes) {
        if (node.labelObject && node.labelObject.element) {
          node.labelObject.element.style.display = state.labelsVisible ? 'block' : 'none';
        }
      }
    }

    function onPointerMove(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(nodeMeshes, false);

      if (intersects.length > 0) {
        setHover(intersects[0].object, event);
      } else {
        clearHover();
      }
    }

    function onClick() {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(nodeMeshes, false);
      if (intersects.length > 0) {
        selectNode(intersects[0].object);
      } else {
        clearSelection();
      }
    }

    function animateCameraReset() {
      cameraResetAnim = {
        startTime: performance.now(),
        duration: 500,
        fromPos: camera.position.clone(),
        toPos: initialCameraPosition.clone(),
        fromTarget: controls.target.clone(),
        toTarget: initialTarget.clone()
      };
    }

    function updateCameraReset(now) {
      if (!cameraResetAnim) return;

      const t = Math.min(1, (now - cameraResetAnim.startTime) / cameraResetAnim.duration);
      const ease = 1 - Math.pow(1 - t, 3);

      camera.position.lerpVectors(cameraResetAnim.fromPos, cameraResetAnim.toPos, ease);
      controls.target.lerpVectors(cameraResetAnim.fromTarget, cameraResetAnim.toTarget, ease);

      if (t >= 1) {
        cameraResetAnim = null;
      }
    }

    function sanitizeState() {
      state.treeDepth = Math.max(3, Math.min(7, safeNumber(2 + state.difficultyLevel, 3)));
      state.totalNodes = Math.max(0, safeNumber(state.totalNodes, 0));
      state.leafCount = Math.max(0, safeNumber(state.leafCount, 0));
      state.internalNodeCount = Math.max(0, safeNumber(state.internalNodeCount, 0));
      state.spinAngle = safeNumber(state.spinAngle, 0);
      state.frameCount = Math.max(0, safeNumber(state.frameCount, 0));

      state.cameraPosition = {
        x: safeNumber(camera.position.x, 0),
        y: safeNumber(camera.position.y, 0),
        z: safeNumber(camera.position.z, 0)
      };

      state.cameraDistance = safeNumber(camera.position.length(), 0);
    }

    function onKeyDown(e) {
      const key = e.key.toLowerCase();

      if (key === 'd') {
        if (state.difficultyLevel < 5) {
          state.difficultyLevel++;
          state.treeGenCount++;
          clearSelection();
          generateTree();
        }
      } else if (key === 'a') {
        if (state.difficultyLevel > 1) {
          state.difficultyLevel--;
          state.treeGenCount++;
          clearSelection();
          generateTree();
        }
      } else if (key === 'r') {
        animateCameraReset();
      } else if (key === 'c') {
        state.colorMode = state.colorMode === 'depth' ? 'clade' : 'depth';
        rebuildVisuals();
        clearHover();
        clearSelection();
        updateLabelsVisibility();
        updateHUD();
      } else if (key === 'l') {
        state.labelsVisible = !state.labelsVisible;
        updateLabelsVisibility();
        updateHUD();
      } else if (key === 's') {
        state.spinEnabled = !state.spinEnabled;
        updateHUD();
      }
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    }

    renderer.domElement.addEventListener('pointermove', onPointerMove);
    renderer.domElement.addEventListener('click', onClick);
    window.addEventListener('keydown', onKeyDown);
    window.addEventListener('resize', onResize);

    generateTree();

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.05);
      const now = performance.now();

      updateCameraReset(now);

      if (state.spinEnabled) {
        treeGroup.rotation.y += 0.3 * delta;
        state.spinAngle += 0.3 * delta;
      }

      controls.update();

      state.frameCount++;
      sanitizeState();
      updateHUD();

      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
