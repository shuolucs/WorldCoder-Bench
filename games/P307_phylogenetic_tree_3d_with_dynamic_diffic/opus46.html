<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Phylogenetic Tree</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Consolas', 'Monaco', monospace; }
canvas { display: block; }

#hud {
  position: fixed;
  top: 15px;
  left: 15px;
  color: #ccddff;
  font-size: 13px;
  background: rgba(10, 10, 30, 0.85);
  padding: 12px 16px;
  border-radius: 8px;
  border: 1px solid rgba(68, 136, 255, 0.3);
  z-index: 100;
  line-height: 1.6;
  backdrop-filter: blur(5px);
  max-width: 420px;
}

#diff-bar {
  display: flex;
  gap: 4px;
  margin-top: 8px;
  align-items: center;
}

#diff-bar span {
  font-size: 12px;
  color: #8899bb;
  margin-right: 6px;
}

.diff-square {
  width: 18px;
  height: 18px;
  border: 2px solid rgba(68, 136, 255, 0.5);
  border-radius: 3px;
  transition: background 0.3s;
}

.diff-square.filled {
  background: #4488ff;
  border-color: #66aaff;
  box-shadow: 0 0 6px rgba(68, 136, 255, 0.5);
}

#info-panel {
  position: fixed;
  top: 15px;
  right: 15px;
  color: #ccddff;
  font-size: 13px;
  background: rgba(10, 10, 30, 0.9);
  padding: 16px 20px;
  border-radius: 8px;
  border: 1px solid rgba(68, 136, 255, 0.4);
  z-index: 100;
  min-width: 220px;
  display: none;
  backdrop-filter: blur(5px);
  line-height: 1.8;
}

#info-panel h3 {
  color: #66aaff;
  margin-bottom: 8px;
  font-size: 14px;
  border-bottom: 1px solid rgba(68, 136, 255, 0.3);
  padding-bottom: 6px;
}

#tooltip {
  position: fixed;
  color: #eef;
  font-size: 12px;
  background: rgba(10, 10, 40, 0.92);
  padding: 6px 10px;
  border-radius: 5px;
  border: 1px solid rgba(100, 150, 255, 0.4);
  z-index: 200;
  pointer-events: none;
  display: none;
  white-space: nowrap;
  backdrop-filter: blur(3px);
}

#controls-help {
  position: fixed;
  bottom: 15px;
  left: 15px;
  color: #667799;
  font-size: 11px;
  background: rgba(10, 10, 30, 0.7);
  padding: 10px 14px;
  border-radius: 6px;
  border: 1px solid rgba(68, 136, 255, 0.15);
  z-index: 100;
  line-height: 1.6;
}
</style>
</head>
<body>

<div id="hud"></div>
<div id="info-panel"></div>
<div id="tooltip"></div>
<div id="controls-help">
  [D/A] Difficulty ↑/↓ &nbsp; [R] Reset Camera &nbsp; [C] Color Mode &nbsp; [L] Labels &nbsp; [S] Spin
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/controls/OrbitControls.js"></script>

<script>
(function() {

const SPECIES_NAMES = [
  'Homo sapiens', 'Pan troglodytes', 'Gorilla gorilla', 'Mus musculus',
  'Drosophila', 'E. coli', 'Arabidopsis', 'Saccharomyces',
  'Canis lupus', 'Felis catus', 'Gallus gallus', 'Danio rerio',
  'Xenopus', 'Caenorhabditis', 'Rattus norvegicus', 'Bos taurus',
  'Sus scrofa', 'Ovis aries', 'Equus caballus', 'Anolis carolinensis'
];

const DEPTH_COLORS = [
  0xff4444, 0xff8844, 0xffff44, 0x44ff44, 0x44ffff, 0x4444ff, 0x8844ff
];

function getDepthColor(depth) {
  if (depth < DEPTH_COLORS.length) return DEPTH_COLORS[depth];
  return 0x8844ff;
}

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
const initialCameraPos = new THREE.Vector3(0, 5, 25);
camera.position.copy(initialCameraPos);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight1.position.set(10, 20, 15);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0x4488ff, 0.3);
dirLight2.position.set(-10, -5, 10);
scene.add(dirLight2);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// State
const state = {
  difficultyLevel: 1,
  treeDepth: 3,
  totalNodes: 0,
  leafCount: 0,
  internalNodeCount: 0,
  selectedNodeId: null,
  selectedNodeDepth: null,
  selectedNodeDescendants: null,
  hoveredNodeId: null,
  colorMode: 'depth',
  labelsVisible: false,
  spinEnabled: false,
  spinAngle: 0,
  cameraPosition: { x: 0, y: 5, z: 25 },
  cameraDistance: 25,
  frameCount: 0,
  treeGenCount: 0
};
window.__3D_STATE__ = state;

// Tree data
let treeGroup = new THREE.Group();
scene.add(treeGroup);
let treeNodes = []; // { id, depth, position, isLeaf, species, children[], parent, mesh, descendants, leafCount }
let nodeMeshes = []; // for raycasting
let labelSprites = [];
let cladeColors = {};
let nodeIdCounter = 0;

function randomRange(min, max) {
  return min + Math.random() * (max - min);
}

function generateTree() {
  // Clear old
  scene.remove(treeGroup);
  treeGroup = new THREE.Group();
  scene.add(treeGroup);
  treeNodes = [];
  nodeMeshes = [];
  labelSprites = [];
  cladeColors = {};
  nodeIdCounter = 0;

  state.treeGenCount++;
  state.selectedNodeId = null;
  state.selectedNodeDepth = null;
  state.selectedNodeDescendants = null;
  state.hoveredNodeId = null;

  const maxDepth = 2 + state.difficultyLevel;
  state.treeDepth = maxDepth;

  // Build tree structure
  const root = createNode(null, 0, new THREE.Vector3(0, 0, 0), maxDepth);
  
  // Compute descendants
  computeDescendants(root);

  // Count
  let totalNodes = 0, leafCount = 0, internalCount = 0;
  treeNodes.forEach(n => {
    totalNodes++;
    if (n.isLeaf) leafCount++;
    else internalCount++;
  });
  state.totalNodes = totalNodes;
  state.leafCount = leafCount;
  state.internalNodeCount = internalCount;

  // Build meshes
  buildTreeMeshes();
  updateHUD();
  updateInfoPanel();
}

function createNode(parent, depth, position, maxDepth) {
  const id = nodeIdCounter++;
  const isLeaf = depth >= maxDepth;
  const species = isLeaf ? SPECIES_NAMES[Math.floor(Math.random() * SPECIES_NAMES.length)] : null;

  const node = {
    id, depth, position: position.clone(), isLeaf, species,
    children: [], parent, mesh: null, descendants: 0, leafCount: 0
  };
  treeNodes.push(node);

  if (!isLeaf) {
    const numChildren = Math.random() < 0.5 ? 2 : 3;
    
    // Generate spread directions
    for (let i = 0; i < numChildren; i++) {
      const branchLength = randomRange(2.0, 4.0);
      
      // Spread in 3D
      let theta, phi;
      if (parent === null) {
        // Root: spread upward hemisphere
        theta = randomRange(-Math.PI, Math.PI);
        phi = randomRange(0.3, 1.2);
      } else {
        // Continue roughly in parent direction with spread
        const parentDir = new THREE.Vector3().subVectors(position, parent.position).normalize();
        const baseTheta = Math.atan2(parentDir.x, parentDir.z);
        const basePhi = Math.acos(Math.max(-1, Math.min(1, parentDir.y)));
        
        const spreadAngle = randomRange(0.4, 1.2);
        const rotAngle = (i / numChildren) * Math.PI * 2 + randomRange(-0.5, 0.5);
        
        theta = baseTheta + Math.cos(rotAngle) * spreadAngle;
        phi = Math.max(0.1, Math.min(Math.PI - 0.1, basePhi + Math.sin(rotAngle) * spreadAngle));
      }
      
      // Add some per-child variation
      if (parent === null) {
        const angleSpread = (2 * Math.PI / numChildren);
        theta = i * angleSpread + randomRange(-0.4, 0.4);
        phi = randomRange(0.4, 1.3);
      }

      const dir = new THREE.Vector3(
        Math.sin(phi) * Math.sin(theta),
        Math.cos(phi),
        Math.sin(phi) * Math.cos(theta)
      ).normalize();

      const childPos = position.clone().add(dir.multiplyScalar(branchLength));
      const child = createNode(node, depth + 1, childPos, maxDepth);
      node.children.push(child);
    }
  }

  return node;
}

function computeDescendants(node) {
  if (node.isLeaf) {
    node.descendants = 0;
    node.leafCount = 1;
    return;
  }
  let desc = 0;
  let leaves = 0;
  node.children.forEach(c => {
    computeDescendants(c);
    desc += 1 + c.descendants;
    leaves += c.leafCount;
  });
  node.descendants = desc;
  node.leafCount = leaves;
}

function getCladeColor(node) {
  // Find top-level clade (child of root)
  let current = node;
  while (current.parent && current.parent.depth > 0) {
    current = treeNodes.find(n => n.id === current.parent.id) || current.parent;
  }
  const cladeId = current.id;
  
  if (!cladeColors[cladeId]) {
    cladeColors[cladeId] = Math.random();
  }
  
  const hue = cladeColors[cladeId];
  const lightness = 0.3 + (node.depth / state.treeDepth) * 0.4;
  const color = new THREE.Color();
  color.setHSL(hue, 0.8, lightness);
  return color.getHex();
}

function getNodeColor(node) {
  if (state.colorMode === 'clade') {
    return getCladeColor(node);
  }
  return getDepthColor(node.depth);
}

function buildTreeMeshes() {
  // Clear existing
  while (treeGroup.children.length > 0) {
    const child = treeGroup.children[0];
    treeGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
    if (child.material) child.material.dispose();
  }
  nodeMeshes = [];
  labelSprites = [];

  // Assign clade colors for root's children
  const root = treeNodes.find(n => n.depth === 0);
  if (root) {
    root.children.forEach(child => {
      if (!cladeColors[child.id]) {
        cladeColors[child.id] = Math.random();
      }
    });
  }

  treeNodes.forEach(node => {
    const color = node.isLeaf ? getNodeColor(node) : 0x888888;
    
    // Node sphere
    const sphereGeo = new THREE.SphereGeometry(0.3, 16, 12);
    const sphereMat = new THREE.MeshPhongMaterial({
      color: color,
      emissive: 0x000000,
      shininess: 60,
      specular: 0x222244
    });
    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
    sphere.position.copy(node.position);
    sphere.userData = { nodeId: node.id };
    node.mesh = sphere;
    treeGroup.add(sphere);
    nodeMeshes.push(sphere);

    // Branch to parent
    if (node.parent !== null) {
      const parentNode = treeNodes.find(n => n.id === node.parent.id) || node.parent;
      const start = parentNode.position;
      const end = node.position;
      
      const branchColor = getNodeColor(node);
      createBranch(start, end, branchColor);
    }

    // Label sprite for leaves
    if (node.isLeaf && node.species) {
      const sprite = createTextSprite(node.species);
      sprite.position.copy(node.position);
      sprite.position.y += 0.5;
      sprite.visible = state.labelsVisible;
      sprite.userData = { isLabel: true };
      treeGroup.add(sprite);
      labelSprites.push(sprite);
    }
  });
}

function createBranch(start, end, color) {
  const direction = new THREE.Vector3().subVectors(end, start);
  const length = direction.length();
  const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);

  const cylGeo = new THREE.CylinderGeometry(0.06, 0.06, length, 6);
  const cylMat = new THREE.MeshPhongMaterial({
    color: color,
    emissive: new THREE.Color(color).multiplyScalar(0.15),
    shininess: 30
  });
  const cylinder = new THREE.Mesh(cylGeo, cylMat);
  cylinder.position.copy(midpoint);

  // Orient cylinder
  const axis = new THREE.Vector3(0, 1, 0);
  const dir = direction.clone().normalize();
  const quaternion = new THREE.Quaternion().setFromUnitVectors(axis, dir);
  cylinder.setRotationFromQuaternion(quaternion);

  treeGroup.add(cylinder);
}

function createTextSprite(text) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 256;
  canvas.height = 64;
  
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  ctx.font = 'bold 20px Consolas, monospace';
  ctx.fillStyle = '#ccddff';
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 3;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.strokeText(text, 128, 32);
  ctx.fillText(text, 128, 32);

  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  
  const spriteMat = new THREE.SpriteMaterial({
    map: texture,
    transparent: true,
    depthTest: false
  });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(4, 1, 1);
  return sprite;
}

function rebuildColors() {
  if (state.colorMode === 'clade') {
    // Regenerate clade colors
    cladeColors = {};
    const root = treeNodes.find(n => n.depth === 0);
    if (root) {
      root.children.forEach(child => {
        cladeColors[child.id] = Math.random();
      });
    }
  }
  
  // Rebuild all meshes
  buildTreeMeshes();
}

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let mouseX = 0, mouseY = 0;

function onMouseMove(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  mouseX = event.clientX;
  mouseY = event.clientY;
}

function onMouseClick(event) {
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodeMeshes);
  
  if (intersects.length > 0) {
    const clickedMesh = intersects[0].object;
    const nodeId = clickedMesh.userData.nodeId;
    
    if (state.selectedNodeId === nodeId) {
      // Deselect
      deselectNode();
    } else {
      deselectNode();
      selectNode(nodeId);
    }
  }
}

function selectNode(nodeId) {
  const node = treeNodes.find(n => n.id === nodeId);
  if (!node || !node.mesh) return;
  
  state.selectedNodeId = nodeId;
  state.selectedNodeDepth = node.depth;
  state.selectedNodeDescendants = node.descendants;
  
  node.mesh.material.emissive.setHex(0xffffff);
  node.mesh.material.emissiveIntensity = 0.8;
  
  updateInfoPanel();
}

function deselectNode() {
  if (state.selectedNodeId !== null) {
    const node = treeNodes.find(n => n.id === state.selectedNodeId);
    if (node && node.mesh) {
      node.mesh.material.emissive.setHex(0x000000);
      node.mesh.material.emissiveIntensity = 1;
    }
  }
  state.selectedNodeId = null;
  state.selectedNodeDepth = null;
  state.selectedNodeDescendants = null;
  updateInfoPanel();
}

let lastHoveredMesh = null;

function updateHover() {
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodeMeshes);
  
  const tooltip = document.getElementById('tooltip');
  
  // Unhover previous
  if (lastHoveredMesh) {
    const prevNode = treeNodes.find(n => n.id === lastHoveredMesh.userData.nodeId);
    if (prevNode && prevNode.mesh && state.selectedNodeId !== prevNode.id) {
      prevNode.mesh.material.emissive.setHex(0x000000);
    }
    lastHoveredMesh = null;
    state.hoveredNodeId = null;
  }
  
  if (intersects.length > 0) {
    const mesh = intersects[0].object;
    const nodeId = mesh.userData.nodeId;
    const node = treeNodes.find(n => n.id === nodeId);
    
    if (node) {
      state.hoveredNodeId = nodeId;
      lastHoveredMesh = mesh;
      
      if (state.selectedNodeId !== nodeId) {
        mesh.material.emissive.setHex(0xffff00);
        mesh.material.emissiveIntensity = 0.5;
      }
      
      // Tooltip
      let tooltipText;
      if (node.isLeaf) {
        tooltipText = `Species: ${node.species}, Depth: ${node.depth}`;
      } else {
        tooltipText = `Node ID: ${node.id}, Depth: ${node.depth}`;
      }
      
      tooltip.textContent = tooltipText;
      tooltip.style.display = 'block';
      tooltip.style.left = (mouseX + 15) + 'px';
      tooltip.style.top = (mouseY - 10) + 'px';
    }
  } else {
    tooltip.style.display = 'none';
  }
}

function updateHUD() {
  const hud = document.getElementById('hud');
  
  let diffSquares = '';
  for (let i = 1; i <= 5; i++) {
    diffSquares += `<div class="diff-square ${i <= state.difficultyLevel ? 'filled' : ''}"></div>`;
  }
  
  hud.innerHTML = `
    <div>Difficulty: ${state.difficultyLevel}/5 | Nodes: ${state.totalNodes} | Leaves: ${state.leafCount} | Depth: ${state.treeDepth}</div>
    <div>Color: ${state.colorMode} | Labels: ${state.labelsVisible ? 'on' : 'off'} | Spin: ${state.spinEnabled ? 'on' : 'off'}</div>
    <div id="diff-bar">
      <span>Level:</span>
      ${diffSquares}
    </div>
  `;
}

function updateInfoPanel() {
  const panel = document.getElementById('info-panel');
  
  if (state.selectedNodeId === null) {
    panel.style.display = 'none';
    return;
  }
  
  const node = treeNodes.find(n => n.id === state.selectedNodeId);
  if (!node) {
    panel.style.display = 'none';
    return;
  }
  
  panel.style.display = 'block';
  panel.innerHTML = `
    <h3>🧬 Node Info</h3>
    <div>Node ID: <strong>${node.id}</strong></div>
    <div>Type: <strong>${node.isLeaf ? 'Leaf' : 'Internal'}</strong></div>
    ${node.isLeaf ? `<div>Species: <strong>${node.species}</strong></div>` : ''}
    <div>Depth: <strong>${node.depth}</strong></div>
    <div>Descendants: <strong>${node.descendants}</strong></div>
    <div>Subtree Leaves: <strong>${node.leafCount}</strong></div>
  `;
}

// Camera reset animation
let cameraResetAnim = null;

function resetCamera() {
  const startPos = camera.position.clone();
  const startTarget = controls.target.clone();
  const endPos = initialCameraPos.clone();
  const endTarget = new THREE.Vector3(0, 0, 0);
  const startTime = performance.now();
  const duration = 500;
  
  cameraResetAnim = { startPos, startTarget, endPos, endTarget, startTime, duration };
}

function updateCameraReset() {
  if (!cameraResetAnim) return;
  
  const elapsed = performance.now() - cameraResetAnim.startTime;
  const t = Math.min(elapsed / cameraResetAnim.duration, 1);
  const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
  
  camera.position.lerpVectors(cameraResetAnim.startPos, cameraResetAnim.endPos, ease);
  controls.target.lerpVectors(cameraResetAnim.startTarget, cameraResetAnim.endTarget, ease);
  
  if (t >= 1) {
    cameraResetAnim = null;
  }
}

// Keyboard
function onKeyDown(event) {
  const key = event.key.toLowerCase();
  
  if (key === 'd') {
    if (state.difficultyLevel < 5) {
      state.difficultyLevel++;
      state.treeDepth = 2 + state.difficultyLevel;
      generateTree();
    }
  } else if (key === 'a') {
    if (state.difficultyLevel > 1) {
      state.difficultyLevel--;
      state.treeDepth = 2 + state.difficultyLevel;
      generateTree();
    }
  } else if (key === 'r') {
    resetCamera();
  } else if (key === 'c') {
    state.colorMode = state.colorMode === 'depth' ? 'clade' : 'depth';
    rebuildColors();
    updateHUD();
  } else if (key === 'l') {
    state.labelsVisible = !state.labelsVisible;
    labelSprites.forEach(s => { s.visible = state.labelsVisible; });
    updateHUD();
  } else if (key === 's') {
    state.spinEnabled = !state.spinEnabled;
    updateHUD();
  }
}

// Resize
function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// Events
window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onMouseClick);
window.addEventListener('keydown', onKeyDown);
window.addEventListener('resize', onResize);

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const delta = clock.getDelta();
  
  // Camera reset animation
  updateCameraReset();
  
  // Spin
  if (state.spinEnabled) {
    const spinDelta = 0.3 * delta;
    state.spinAngle += spinDelta;
    treeGroup.rotation.y += spinDelta;
  }
  
  // Hover
  updateHover();
  
  // Controls
  controls.update();
  
  // Update state
  state.cameraPosition.x = isFinite(camera.position.x) ? camera.position.x : 0;
  state.cameraPosition.y = isFinite(camera.position.y) ? camera.position.y : 0;
  state.cameraPosition.z = isFinite(camera.position.z) ? camera.position.z : 0;
  
  const dist = camera.position.length();
  state.cameraDistance = isFinite(dist) ? dist : 0;
  state.frameCount++;
  
  // Ensure no NaN/Infinity
  for (const key in state) {
    if (typeof state[key] === 'number' && !isFinite(state[key])) {
      state[key] = 0;
    }
  }
  
  renderer.render(scene, camera);
}

// Initialize
generateTree();
animate();

})();
</script>
</body>
</html>
