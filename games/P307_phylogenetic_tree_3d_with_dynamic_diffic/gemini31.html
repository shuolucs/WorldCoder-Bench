<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Phylogenetic Tree</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        .panel {
            background: rgba(10, 10, 26, 0.8);
            border: 1px solid #444466;
            border-radius: 8px;
            padding: 15px;
            backdrop-filter: blur(4px);
            pointer-events: auto;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 14px;
        }
        .hud-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stat-label {
            color: #8888aa;
            width: 60px;
            display: inline-block;
        }
        .stat-value {
            font-family: monospace;
            font-size: 15px;
            color: #aaaaff;
        }
        #diff-bar {
            display: flex;
            gap: 4px;
        }
        .diff-square {
            width: 12px;
            height: 12px;
            border: 1px solid #aaaaff;
            border-radius: 2px;
        }
        .diff-square.filled {
            background-color: #aaaaff;
        }
        #info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 250px;
            display: none;
            flex-direction: column;
            gap: 10px;
        }
        #info-panel h3 {
            margin: 0 0 10px 0;
            color: #ffffff;
            border-bottom: 1px solid #444466;
            padding-bottom: 5px;
        }
        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #ffff00;
            color: #ffff00;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            transform: translate(15px, 15px);
            white-space: nowrap;
            z-index: 20;
        }
        .controls-help {
            margin-top: 10px;
            font-size: 12px;
            color: #666688;
            border-top: 1px solid #333344;
            padding-top: 10px;
        }
        .key {
            display: inline-block;
            background: #222233;
            border: 1px solid #444455;
            border-radius: 3px;
            padding: 1px 5px;
            color: #fff;
            font-family: monospace;
        }
        .node-label {
            color: #ffffff;
            font-family: sans-serif;
            font-size: 12px;
            padding: 2px 4px;
            background: rgba(0,0,0,0.6);
            border-radius: 3px;
            pointer-events: none;
            white-space: nowrap;
            margin-top: 1em;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div id="hud" class="panel">
            <div class="hud-row">
                <span class="stat-label">Difficulty</span>
                <div id="diff-bar"></div>
            </div>
            <div class="hud-row"><span class="stat-label">Nodes</span><span id="hud-nodes" class="stat-value">0</span></div>
            <div class="hud-row"><span class="stat-label">Leaves</span><span id="hud-leaves" class="stat-value">0</span></div>
            <div class="hud-row"><span class="stat-label">Depth</span><span id="hud-depth" class="stat-value">0</span></div>
            <div class="hud-row"><span class="stat-label">Color</span><span id="hud-color" class="stat-value">Depth</span></div>
            <div class="hud-row"><span class="stat-label">Labels</span><span id="hud-labels" class="stat-value">Off</span></div>
            <div class="hud-row"><span class="stat-label">Spin</span><span id="hud-spin" class="stat-value">Off</span></div>
            
            <div class="controls-help">
                <span class="key">D</span>/<span class="key">A</span> Diff Up/Down<br>
                <span class="key">R</span> Reset Camera<br>
                <span class="key">C</span> Toggle Color<br>
                <span class="key">L</span> Toggle Labels<br>
                <span class="key">S</span> Toggle Spin
            </div>
        </div>

        <div id="info-panel" class="panel">
            <h3>Node Information</h3>
            <div class="hud-row"><span class="stat-label">ID:</span><span id="info-id" class="stat-value">-</span></div>
            <div class="hud-row"><span class="stat-label">Depth:</span><span id="info-depth" class="stat-value">-</span></div>
            <div class="hud-row"><span class="stat-label">Descendants:</span><span id="info-desc" class="stat-value">-</span></div>
            <div class="hud-row"><span class="stat-label">Sub-Leaves:</span><span id="info-subleaves" class="stat-value">-</span></div>
            <div id="info-species-row" class="hud-row" style="display:none;"><span class="stat-label">Species:</span><span id="info-species" class="stat-value" style="color:#ffffaa">-</span></div>
        </div>

        <div id="tooltip"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            difficultyLevel: 1,
            treeDepth: 3,
            totalNodes: 0,
            leafCount: 0,
            internalNodeCount: 0,
            selectedNodeId: null,
            selectedNodeDepth: null,
            selectedNodeDescendants: null,
            hoveredNodeId: null,
            colorMode: 'depth',
            labelsVisible: false,
            spinEnabled: false,
            spinAngle: 0,
            cameraPosition: { x: 0, y: 5, z: 25 },
            cameraDistance: 25,
            frameCount: 0,
            treeGenCount: 0
        };

        // --- Constants & Data ---
        const SPECIES_POOL = [
            'Homo sapiens', 'Pan troglodytes', 'Gorilla gorilla', 'Mus musculus', 
            'Drosophila', 'E. coli', 'Arabidopsis', 'Saccharomyces', 
            'Canis lupus', 'Felis catus', 'Gallus gallus', 'Danio rerio', 
            'Xenopus', 'Caenorhabditis', 'Rattus norvegicus', 'Bos taurus', 
            'Sus scrofa', 'Ovis aries', 'Equus caballus', 'Anolis carolinensis'
        ];

        const DEPTH_COLORS = [
            0xff4444, // 0: Red
            0xff8844, // 1: Orange
            0xffff44, // 2: Yellow
            0x44ff44, // 3: Green
            0x44ffff, // 4: Cyan
            0x4444ff, // 5: Blue
            0x8844ff  // 6+: Purple
        ];

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
        camera.position.set(0, 5, 25);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        container.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        scene.add(new THREE.AmbientLight(0x404060, 0.4));
        
        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(10, 20, 15);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0x4488ff, 0.3);
        dirLight2.position.set(-10, -5, 10);
        scene.add(dirLight2);

        // --- Tree Generation Variables ---
        const treeGroup = new THREE.Group();
        scene.add(treeGroup);
        
        let nodeMeshes = [];
        let labelObjects = [];
        let treeDataRoot = null;
        let nextNodeId = 1;

        const nodeGeometry = new THREE.SphereGeometry(0.3, 16, 16);
        const branchMaterialBase = new THREE.MeshStandardMaterial({ roughness: 0.7, metalness: 0.1 });
        const nodeMaterialBase = new THREE.MeshStandardMaterial({ roughness: 0.5, metalness: 0.2 });

        class TreeNode {
            constructor(depth, pos, parent, dir) {
                this.id = nextNodeId++;
                this.depth = depth;
                this.pos = pos;
                this.parent = parent;
                this.dir = dir;
                this.children = [];
                this.isLeaf = false;
                this.species = "";
                this.cladeHue = parent ? parent.cladeHue : 0;
                this.descendants = 0;
                this.leafCount = 0;
                this.mesh = null;
                this.branchMesh = null;
            }
        }

        function getDepthColor(depth) {
            return DEPTH_COLORS[Math.min(depth, DEPTH_COLORS.length - 1)];
        }

        function getCladeColor(hue, depth, maxDepth) {
            const lightness = 40 + (depth / maxDepth) * 40; // 40% to 80%
            const color = new THREE.Color();
            color.setHSL(hue, 0.8, lightness / 100);
            return color.getHex();
        }

        function getChildDirection(parentDir, childIndex, numChildren) {
            const angleAround = (childIndex / numChildren) * Math.PI * 2 + (Math.random() * 0.5);
            const spread = 0.4 + Math.random() * 0.4; 
            
            let axis1 = new THREE.Vector3(1, 0, 0);
            if (Math.abs(parentDir.x) > 0.9) axis1.set(0, 1, 0);
            axis1.cross(parentDir).normalize();
            let axis2 = new THREE.Vector3().crossVectors(parentDir, axis1).normalize();

            let dir = parentDir.clone().multiplyScalar(Math.cos(spread));
            dir.add(axis1.clone().multiplyScalar(Math.sin(spread) * Math.cos(angleAround)));
            dir.add(axis2.clone().multiplyScalar(Math.sin(spread) * Math.sin(angleAround)));
            return dir.normalize();
        }

        function buildTreeData(node, maxDepth) {
            if (node.depth >= maxDepth) {
                node.isLeaf = true;
                node.species = SPECIES_POOL[Math.floor(Math.random() * SPECIES_POOL.length)];
                node.leafCount = 1;
                return;
            }

            const numChildren = Math.random() > 0.5 ? 2 : 3;
            for (let i = 0; i < numChildren; i++) {
                let childDir;
                if (node.depth === 0) {
                    // Root children spread around Y axis
                    const angle = (i / numChildren) * Math.PI * 2;
                    childDir = new THREE.Vector3(Math.cos(angle), 0.5 + Math.random()*0.5, Math.sin(angle)).normalize();
                } else {
                    childDir = getChildDirection(node.dir, i, numChildren);
                }

                const length = 2.0 + Math.random() * 2.0;
                const childPos = node.pos.clone().add(childDir.clone().multiplyScalar(length));
                
                const childNode = new TreeNode(node.depth + 1, childPos, node, childDir);
                
                if (node.depth === 0) {
                    childNode.cladeHue = Math.random();
                }

                node.children.push(childNode);
                buildTreeData(childNode, maxDepth);
                
                node.descendants += 1 + childNode.descendants;
                node.leafCount += childNode.leafCount;
            }
        }

        function createTreeMeshes(node, maxDepth) {
            // Determine Colors
            let branchColorHex, nodeColorHex;
            
            if (window.__3D_STATE__.colorMode === 'depth') {
                branchColorHex = getDepthColor(node.depth);
            } else {
                branchColorHex = getCladeColor(node.cladeHue, node.depth, maxDepth);
            }

            if (node.isLeaf) {
                nodeColorHex = branchColorHex;
            } else {
                nodeColorHex = 0x888888;
            }

            // Create Node Mesh
            const nMat = nodeMaterialBase.clone();
            nMat.color.setHex(nodeColorHex);
            const nMesh = new THREE.Mesh(nodeGeometry, nMat);
            nMesh.position.copy(node.pos);
            nMesh.userData = { node: node, originalEmissive: nMat.emissive.getHex() };
            treeGroup.add(nMesh);
            nodeMeshes.push(nMesh);
            node.mesh = nMesh;

            // Create Label if Leaf
            if (node.isLeaf) {
                const div = document.createElement('div');
                div.className = 'node-label';
                div.textContent = node.species;
                const label = new CSS2DObject(div);
                label.position.set(0, 0.4, 0);
                label.visible = window.__3D_STATE__.labelsVisible;
                nMesh.add(label);
                labelObjects.push(label);
            }

            // Create Branch Mesh (if has parent)
            if (node.parent) {
                const distance = node.parent.pos.distanceTo(node.pos);
                const bGeo = new THREE.CylinderGeometry(0.08, 0.12, distance, 8);
                const bMat = branchMaterialBase.clone();
                bMat.color.setHex(branchColorHex);
                const bMesh = new THREE.Mesh(bGeo, bMat);
                
                bMesh.position.copy(node.parent.pos).lerp(node.pos, 0.5);
                bMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), node.pos.clone().sub(node.parent.pos).normalize());
                
                treeGroup.add(bMesh);
                node.branchMesh = bMesh;
            }

            // Recurse
            node.children.forEach(child => createTreeMeshes(child, maxDepth));
        }

        function clearTree() {
            treeGroup.children.slice().forEach(child => {
                if (child.geometry) child.geometry.dispose();
                if (child.material) child.material.dispose();
                treeGroup.remove(child);
            });
            nodeMeshes = [];
            labelObjects = [];
            treeDataRoot = null;
            nextNodeId = 1;
            selectedNodeMesh = null;
            hoveredNodeMesh = null;
            updateInfoPanel();
            document.getElementById('tooltip').style.display = 'none';
        }

        function generateTree() {
            clearTree();
            
            const maxDepth = 2 + window.__3D_STATE__.difficultyLevel;
            window.__3D_STATE__.treeDepth = maxDepth;
            
            treeDataRoot = new TreeNode(0, new THREE.Vector3(0, 0, 0), null, new THREE.Vector3(0, 1, 0));
            buildTreeData(treeDataRoot, maxDepth);
            createTreeMeshes(treeDataRoot, maxDepth);

            window.__3D_STATE__.totalNodes = nextNodeId - 1;
            window.__3D_STATE__.leafCount = treeDataRoot.leafCount;
            window.__3D_STATE__.internalNodeCount = window.__3D_STATE__.totalNodes - window.__3D_STATE__.leafCount;
            window.__3D_STATE__.treeGenCount++;
            
            updateHUD();
        }

        function updateColors() {
            const maxDepth = window.__3D_STATE__.treeDepth;
            const mode = window.__3D_STATE__.colorMode;
            
            function traverse(node) {
                let colorHex;
                if (mode === 'depth') {
                    colorHex = getDepthColor(node.depth);
                } else {
                    colorHex = getCladeColor(node.cladeHue, node.depth, maxDepth);
                }

                if (node.branchMesh) {
                    node.branchMesh.material.color.setHex(colorHex);
                }
                
                if (node.isLeaf) {
                    node.mesh.material.color.setHex(colorHex);
                }

                node.children.forEach(traverse);
            }
            if (treeDataRoot) traverse(treeDataRoot);
        }

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredNodeMesh = null;
        let selectedNodeMesh = null;

        const tooltipEl = document.getElementById('tooltip');

        function onPointerMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            tooltipEl.style.left = event.clientX + 'px';
            tooltipEl.style.top = event.clientY + 'px';

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodeMeshes);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                if (hoveredNodeMesh !== object) {
                    if (hoveredNodeMesh && hoveredNodeMesh !== selectedNodeMesh) {
                        hoveredNodeMesh.material.emissive.setHex(hoveredNodeMesh.userData.originalEmissive);
                    }
                    hoveredNodeMesh = object;
                    if (hoveredNodeMesh !== selectedNodeMesh) {
                        hoveredNodeMesh.material.emissive.setHex(0xffff00);
                    }
                    
                    const node = hoveredNodeMesh.userData.node;
                    window.__3D_STATE__.hoveredNodeId = node.id;
                    
                    tooltipEl.style.display = 'block';
                    if (node.isLeaf) {
                        tooltipEl.innerHTML = `Species: ${node.species}<br>Depth: ${node.depth}`;
                    } else {
                        tooltipEl.innerHTML = `Node ID: ${node.id}<br>Depth: ${node.depth}`;
                    }
                    document.body.style.cursor = 'pointer';
                }
            } else {
                if (hoveredNodeMesh) {
                    if (hoveredNodeMesh !== selectedNodeMesh) {
                        hoveredNodeMesh.material.emissive.setHex(hoveredNodeMesh.userData.originalEmissive);
                    }
                    hoveredNodeMesh = null;
                    window.__3D_STATE__.hoveredNodeId = null;
                    tooltipEl.style.display = 'none';
                    document.body.style.cursor = 'default';
                }
            }
        }

        function onClick(event) {
            if (hoveredNodeMesh) {
                if (selectedNodeMesh === hoveredNodeMesh) {
                    // Deselect
                    selectedNodeMesh.material.emissive.setHex(0xffff00); // Revert to hover color
                    selectedNodeMesh = null;
                } else {
                    // Select new
                    if (selectedNodeMesh) {
                        selectedNodeMesh.material.emissive.setHex(selectedNodeMesh.userData.originalEmissive);
                    }
                    selectedNodeMesh = hoveredNodeMesh;
                    selectedNodeMesh.material.emissive.setHex(0xffffff);
                }
                updateInfoPanel();
            } else if (selectedNodeMesh) {
                // Clicked empty space, deselect
                selectedNodeMesh.material.emissive.setHex(selectedNodeMesh.userData.originalEmissive);
                selectedNodeMesh = null;
                updateInfoPanel();
            }
        }

        function updateInfoPanel() {
            const panel = document.getElementById('info-panel');
            if (selectedNodeMesh) {
                const node = selectedNodeMesh.userData.node;
                document.getElementById('info-id').textContent = node.id;
                document.getElementById('info-depth').textContent = node.depth;
                document.getElementById('info-desc').textContent = node.descendants;
                document.getElementById('info-subleaves').textContent = node.leafCount;
                
                const speciesRow = document.getElementById('info-species-row');
                if (node.isLeaf) {
                    speciesRow.style.display = 'flex';
                    document.getElementById('info-species').textContent = node.species;
                } else {
                    speciesRow.style.display = 'none';
                }
                panel.style.display = 'flex';

                window.__3D_STATE__.selectedNodeId = node.id;
                window.__3D_STATE__.selectedNodeDepth = node.depth;
                window.__3D_STATE__.selectedNodeDescendants = node.descendants;
            } else {
                panel.style.display = 'none';
                window.__3D_STATE__.selectedNodeId = null;
                window.__3D_STATE__.selectedNodeDepth = null;
                window.__3D_STATE__.selectedNodeDescendants = null;
            }
        }

        // --- Keyboard Controls ---
        let resetAnim = { active: false, startPos: new THREE.Vector3(), startTarget: new THREE.Vector3(), time: 0 };

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            let stateChanged = false;

            if (key === 'd') {
                if (window.__3D_STATE__.difficultyLevel < 5) {
                    window.__3D_STATE__.difficultyLevel++;
                    generateTree();
                    stateChanged = true;
                }
            } else if (key === 'a') {
                if (window.__3D_STATE__.difficultyLevel > 1) {
                    window.__3D_STATE__.difficultyLevel--;
                    generateTree();
                    stateChanged = true;
                }
            } else if (key === 'r') {
                resetAnim.active = true;
                resetAnim.startPos.copy(camera.position);
                resetAnim.startTarget.copy(controls.target);
                resetAnim.time = 0;
            } else if (key === 'c') {
                window.__3D_STATE__.colorMode = window.__3D_STATE__.colorMode === 'depth' ? 'clade' : 'depth';
                updateColors();
                stateChanged = true;
            } else if (key === 'l') {
                window.__3D_STATE__.labelsVisible = !window.__3D_STATE__.labelsVisible;
                labelObjects.forEach(l => l.visible = window.__3D_STATE__.labelsVisible);
                stateChanged = true;
            } else if (key === 's') {
                window.__3D_STATE__.spinEnabled = !window.__3D_STATE__.spinEnabled;
                stateChanged = true;
            }

            if (stateChanged) updateHUD();
        });

        // --- UI Updates ---
        function updateHUD() {
            const state = window.__3D_STATE__;
            
            // Difficulty Bar
            const diffBar = document.getElementById('diff-bar');
            diffBar.innerHTML = '';
            for (let i = 1; i <= 5; i++) {
                const sq = document.createElement('div');
                sq.className = 'diff-square' + (i <= state.difficultyLevel ? ' filled' : '');
                diffBar.appendChild(sq);
            }

            document.getElementById('hud-nodes').textContent = state.totalNodes;
            document.getElementById('hud-leaves').textContent = state.leafCount;
            document.getElementById('hud-depth').textContent = state.treeDepth;
            document.getElementById('hud-color').textContent = state.colorMode.charAt(0).toUpperCase() + state.colorMode.slice(1);
            document.getElementById('hud-labels').textContent = state.labelsVisible ? 'On' : 'Off';
            document.getElementById('hud-spin').textContent = state.spinEnabled ? 'On' : 'Off';
        }

        // --- Event Listeners ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('click', onClick);

        // --- Initialization ---
        generateTree();

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Handle Spin
            if (window.__3D_STATE__.spinEnabled) {
                const angle = 0.3 * delta;
                treeGroup.rotation.y += angle;
                window.__3D_STATE__.spinAngle = treeGroup.rotation.y;
            }

            // Handle Camera Reset
            if (resetAnim.active) {
                resetAnim.time += delta / 0.5; // 0.5s duration
                if (resetAnim.time >= 1) {
                    resetAnim.time = 1;
                    resetAnim.active = false;
                }
                const t = 1 - Math.pow(1 - resetAnim.time, 3); // easeOutCubic
                camera.position.lerpVectors(resetAnim.startPos, new THREE.Vector3(0, 5, 25), t);
                controls.target.lerpVectors(resetAnim.startTarget, new THREE.Vector3(0, 0, 0), t);
            }

            controls.update();

            // Update State
            window.__3D_STATE__.cameraPosition = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));
            window.__3D_STATE__.frameCount++;

            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
