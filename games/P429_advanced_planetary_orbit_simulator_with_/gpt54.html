<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Planetary Orbit Simulator</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000011;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    .hud-panel {
      position: absolute;
      color: white;
      background: rgba(0,0,0,0.45);
      padding: 10px 14px;
      border-radius: 8px;
      user-select: none;
      pointer-events: none;
      box-shadow: 0 0 12px rgba(255,255,255,0.08);
    }

    #scorePanel {
      top: 14px;
      left: 14px;
      font-size: 26px;
      font-weight: bold;
    }

    #timePanel {
      top: 14px;
      right: 14px;
      font-size: 20px;
      text-align: right;
    }

    #infoPanel {
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 320px;
      text-align: center;
      font-size: 18px;
    }

    #challengePanel {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      text-align: center;
      max-width: 70vw;
    }

    #helpPanel {
      position: absolute;
      left: 14px;
      bottom: 14px;
      color: white;
      background: rgba(0,0,0,0.35);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.45;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="scorePanel" class="hud-panel">Score: 0</div>
  <div id="timePanel" class="hud-panel">Time: 0.0s | Speed: 1.0x</div>
  <div id="challengePanel" class="hud-panel" style="display:none;">Challenge Ready</div>
  <div id="infoPanel" class="hud-panel">Selected: None</div>
  <div id="helpPanel">
    SPACE: Pause/Resume<br>
    T: Time Scale<br>
    C: Next Challenge<br>
    R: Reset<br>
    F: Follow Camera<br>
    N: Next Follow Planet<br>
    O: Toggle Trails<br>
    Click planet to select
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000011);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 30, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.15);
    scene.add(ambientLight);

    const sunLight = new THREE.PointLight(0xffdd44, 2.0, 500);
    sunLight.position.set(0, 0, 0);
    scene.add(sunLight);

    // Sun
    const sunGeo = new THREE.SphereGeometry(3, 48, 48);
    const sunMat = new THREE.MeshBasicMaterial({
      color: 0xffdd44
    });
    const sun = new THREE.Mesh(sunGeo, sunMat);
    scene.add(sun);

    // Glow shell
    const glowGeo = new THREE.SphereGeometry(3.8, 48, 48);
    const glowMat = new THREE.MeshBasicMaterial({
      color: 0xffee88,
      transparent: true,
      opacity: 0.18
    });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    scene.add(glow);

    // Decorative model
    let modelLoaded = false;
    const loader = new GLTFLoader();
    loader.load(
      'ABeautifulGame.glb',
      (gltf) => {
        const model = gltf.scene;
        model.scale.setScalar(0.5);
        model.position.set(0, 0, 0);
        scene.add(model);
        modelLoaded = true;
      },
      undefined,
      () => {
        modelLoaded = false;
      }
    );

    // Optional fallback CDN try if local file unavailable
    setTimeout(() => {
      if (!modelLoaded) {
        loader.load(
          './ABeautifulGame.glb',
          (gltf) => {
            const model = gltf.scene;
            model.scale.setScalar(0.5);
            model.position.set(0, 0, 0);
            scene.add(model);
            modelLoaded = true;
          },
          undefined,
          () => {}
        );
      }
    }, 500);

    const GM = 1000;
    const timeScaleOptions = [0.5, 1.0, 2.0, 4.0];

    const planetDefs = [
      { name: 'Mercury', radius: 0.5, color: 0xaaaaaa, a: 8,  e: 0.2,  period: 3 },
      { name: 'Earth',   radius: 0.8, color: 0x2266ff, a: 14, e: 0.1,  period: 6 },
      { name: 'Mars',    radius: 0.6, color: 0xff4422, a: 20, e: 0.15, period: 9 },
      { name: 'Jupiter', radius: 1.5, color: 0xddaa55, a: 28, e: 0.05, period: 15 }
    ];

    const planets = [];
    const trailMaxPoints = 200;
    let trailsVisible = true;

    function safeNum(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function createOrbitPath(a, e, color) {
      const b = a * Math.sqrt(Math.max(0, 1 - e * e));
      const points = [];
      for (let i = 0; i <= 256; i++) {
        const E = (i / 256) * Math.PI * 2;
        const x = a * (Math.cos(E) - e);
        const z = b * Math.sin(E);
        points.push(new THREE.Vector3(x, 0, z));
      }
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({
        color,
        transparent: true,
        opacity: 0.22
      });
      return new THREE.LineLoop(geo, mat);
    }

    function createTrail(color) {
      const positions = new Float32Array(trailMaxPoints * 3);
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setDrawRange(0, 0);
      const material = new THREE.LineBasicMaterial({
        color,
        transparent: true,
        opacity: 0.8
      });
      return new THREE.Line(geometry, material);
    }

    function updateTrail(planet) {
      const pos = planet.mesh.position;
      planet.trailPoints.push(new THREE.Vector3(pos.x, pos.y, pos.z));
      if (planet.trailPoints.length > trailMaxPoints) planet.trailPoints.shift();

      const arr = planet.trail.geometry.attributes.position.array;
      for (let i = 0; i < trailMaxPoints; i++) {
        const p = planet.trailPoints[i];
        const idx = i * 3;
        if (p) {
          arr[idx] = safeNum(p.x);
          arr[idx + 1] = safeNum(p.y);
          arr[idx + 2] = safeNum(p.z);
        } else {
          arr[idx] = arr[idx + 1] = arr[idx + 2] = 0;
        }
      }
      planet.trail.geometry.setDrawRange(0, planet.trailPoints.length);
      planet.trail.geometry.attributes.position.needsUpdate = true;
      planet.trail.visible = trailsVisible;
    }

    planetDefs.forEach((def, index) => {
      const geo = new THREE.SphereGeometry(def.radius, 32, 32);
      const mat = new THREE.MeshStandardMaterial({
        color: def.color,
        roughness: 0.8,
        metalness: 0.1
      });
      const mesh = new THREE.Mesh(geo, mat);
      scene.add(mesh);

      const orbitLine = createOrbitPath(def.a, def.e, def.color);
      scene.add(orbitLine);

      const trail = createTrail(def.color);
      scene.add(trail);

      const b = def.a * Math.sqrt(Math.max(0, 1 - def.e * def.e));
      const planet = {
        ...def,
        index,
        b,
        mesh,
        orbitLine,
        trail,
        trailPoints: [],
        E: 0,
        trueAnomaly: 0,
        distanceFromSun: 0,
        velocity: 0
      };
      planets.push(planet);
    });

    // Selection / raycasting
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let selectedPlanetIndex = null;

    // Follow cam
    let followMode = false;
    let followTarget = 0;

    // Simulation state
    let simulationTime = 0;
    let timeScale = 1.0;
    let isPaused = false;
    let score = 0;
    let challengeActive = false;
    let challengeType = null;
    let challengeCount = 0;

    // Challenge state
    const challengeTypes = ['identify_fastest', 'predict_position', 'speed_quiz'];
    let challengeIndex = -1;
    let challengeData = {
      targetPlanetIndex: null,
      ghost: null,
      ghostPlanetIndex: null,
      ghostFuturePosition: null,
      startedAt: 0
    };

    const scorePanel = document.getElementById('scorePanel');
    const timePanel = document.getElementById('timePanel');
    const infoPanel = document.getElementById('infoPanel');
    const challengePanel = document.getElementById('challengePanel');

    function solvePlanetPositionAtTime(planet, t) {
      const angleRate = (Math.PI * 2) / Math.max(planet.period, 0.0001);
      const E = angleRate * t;
      const x = planet.a * (Math.cos(E) - planet.e);
      const z = planet.b * Math.sin(E);
      const r = Math.sqrt(x * x + z * z);
      const cosE = Math.cos(E);
      const sinE = Math.sin(E);
      const factor = Math.sqrt((1 + planet.e) / Math.max(0.0001, 1 - planet.e));
      const trueAnomaly = 2 * Math.atan2(factor * sinE / (1 + cosE), 1);
      const velocity = Math.sqrt(Math.max(0, GM * (2 / Math.max(r, 0.0001) - 1 / Math.max(planet.a, 0.0001))));
      return {
        E: safeNum(E),
        x: safeNum(x),
        z: safeNum(z),
        r: safeNum(r),
        velocity: safeNum(velocity),
        angle: safeNum(trueAnomaly)
      };
    }

    function updatePlanet(planet) {
      const state = solvePlanetPositionAtTime(planet, simulationTime);
      planet.E = state.E;
      planet.mesh.position.set(state.x, 0, state.z);
      planet.distanceFromSun = state.r;
      planet.velocity = state.velocity;
      planet.trueAnomaly = state.angle;
      updateTrail(planet);
    }

    function updateAllPlanets() {
      planets.forEach(updatePlanet);
    }

    function resetSimulation() {
      simulationTime = 0;
      score = 0;
      isPaused = false;
      challengeActive = false;
      challengeType = null;
      challengePanel.style.display = 'none';
      challengeData.targetPlanetIndex = null;
      challengeData.ghostPlanetIndex = null;
      challengeData.ghostFuturePosition = null;
      if (challengeData.ghost) {
        scene.remove(challengeData.ghost);
        challengeData.ghost.geometry.dispose();
        challengeData.ghost.material.dispose();
        challengeData.ghost = null;
      }
      planets.forEach(p => {
        p.trailPoints = [];
      });
      updateAllPlanets();
      updateHUD();
    }

    function getFastestPlanetIndex() {
      let bestIdx = 0;
      let bestV = -Infinity;
      planets.forEach((p, i) => {
        if (p.velocity > bestV) {
          bestV = p.velocity;
          bestIdx = i;
        }
      });
      return bestIdx;
    }

    function clearChallengeGhost() {
      if (challengeData.ghost) {
        scene.remove(challengeData.ghost);
        challengeData.ghost.geometry.dispose();
        challengeData.ghost.material.dispose();
        challengeData.ghost = null;
      }
      challengeData.ghostFuturePosition = null;
      challengeData.ghostPlanetIndex = null;
    }

    function activateNextChallenge() {
      clearChallengeGhost();
      challengeIndex = (challengeIndex + 1) % challengeTypes.length;
      challengeType = challengeTypes[challengeIndex];
      challengeActive = true;
      challengeData.startedAt = simulationTime;

      if (challengeType === 'identify_fastest') {
        challengePanel.style.display = 'block';
        challengePanel.innerHTML = "Challenge: Identify Fastest<br>Click the planet closest to the Sun right now.";
      }

      if (challengeType === 'predict_position') {
        isPaused = true;
        const pIndex = Math.floor(Math.random() * planets.length);
        challengeData.ghostPlanetIndex = pIndex;
        const future = solvePlanetPositionAtTime(planets[pIndex], simulationTime + 3);
        challengeData.ghostFuturePosition = new THREE.Vector3(future.x, 0.05, future.z);

        const ghostGeo = new THREE.SphereGeometry(0.45, 20, 20);
        const ghostMat = new THREE.MeshBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 0.35
        });
        const ghost = new THREE.Mesh(ghostGeo, ghostMat);
        ghost.position.copy(challengeData.ghostFuturePosition);
        scene.add(ghost);
        challengeData.ghost = ghost;

        challengePanel.style.display = 'block';
        challengePanel.innerHTML =
          `Challenge: Predict Position<br>Paused. Click near where <b>${planets[pIndex].name}</b> will be in 3 seconds.`;
      }

      if (challengeType === 'speed_quiz') {
        challengePanel.style.display = 'block';
        challengePanel.innerHTML = "Challenge: Speed Quiz<br>Answer the prompt.";
        setTimeout(() => {
          const answer = prompt('Which planet is fastest right now? (Mercury, Earth, Mars, Jupiter)');
          if (answer !== null) {
            const fastest = planets[getFastestPlanetIndex()].name.toLowerCase();
            if (answer.trim().toLowerCase() === fastest) {
              score += 15;
              challengePanel.innerHTML = `Correct! +15 points`;
            } else {
              challengePanel.innerHTML = `Incorrect. Fastest was ${planets[getFastestPlanetIndex()].name}.`;
            }
          } else {
            challengePanel.innerHTML = `Quiz cancelled.`;
          }
          challengeActive = false;
          challengeType = null;
          challengeCount++;
          setTimeout(() => {
            if (!challengeActive) challengePanel.style.display = 'none';
          }, 1200);
        }, 50);
      }
    }

    function completeChallenge(message) {
      challengePanel.style.display = 'block';
      challengePanel.innerHTML = message;
      challengeActive = false;
      challengeType = null;
      challengeCount++;
      setTimeout(() => {
        if (!challengeActive) challengePanel.style.display = 'none';
      }, 1400);
    }

    function updateHUD() {
      scorePanel.textContent = `Score: ${score}`;
      timePanel.textContent = `Time: ${safeNum(simulationTime).toFixed(1)}s | Speed: ${safeNum(timeScale).toFixed(1)}x`;

      if (selectedPlanetIndex === null) {
        infoPanel.innerHTML = `Selected: None`;
      } else {
        const p = planets[selectedPlanetIndex];
        infoPanel.innerHTML =
          `<b>${p.name}</b> | Distance: ${safeNum(p.distanceFromSun).toFixed(2)} | ` +
          `Velocity: ${safeNum(p.velocity).toFixed(2)} | Period: ${safeNum(p.period).toFixed(1)}s`;
      }
    }

    function onClick(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const intersects = raycaster.intersectObjects(planets.map(p => p.mesh), false);
      if (intersects.length > 0) {
        const clickedMesh = intersects[0].object;
        const idx = planets.findIndex(p => p.mesh === clickedMesh);
        if (idx !== -1) {
          selectedPlanetIndex = idx;

          if (challengeActive && challengeType === 'identify_fastest') {
            const fastest = getFastestPlanetIndex();
            if (idx === fastest) {
              score += 10;
              completeChallenge(`Correct! ${planets[idx].name} is fastest. +10 points`);
            } else {
              completeChallenge(`Incorrect. ${planets[fastest].name} was fastest.`);
            }
          }
          updateHUD();
          return;
        }
      }

      if (challengeActive && challengeType === 'predict_position') {
        const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        const point = new THREE.Vector3();
        if (raycaster.ray.intersectPlane(plane, point) && challengeData.ghostFuturePosition) {
          const dist = point.distanceTo(challengeData.ghostFuturePosition);
          if (dist <= 3) {
            score += 20;
            completeChallenge(`Great prediction! +20 points`);
          } else {
            completeChallenge(`Missed by ${dist.toFixed(2)} units.`);
          }
          clearChallengeGhost();
          isPaused = false;
          updateHUD();
        }
      }
    }

    renderer.domElement.addEventListener('click', onClick);

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
      }

      if (key === 't') {
        const i = timeScaleOptions.indexOf(timeScale);
        timeScale = timeScaleOptions[(i + 1) % timeScaleOptions.length];
      }

      if (key === 'c') {
        activateNextChallenge();
      }

      if (key === 'r') {
        resetSimulation();
      }

      if (key === 'f') {
        followMode = !followMode;
      }

      if (key === 'n') {
        followTarget = (followTarget + 1) % planets.length;
      }

      if (key === 'o') {
        trailsVisible = !trailsVisible;
        planets.forEach(p => p.trail.visible = trailsVisible);
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    window.__3D_STATE__ = {
      simulationTime: 0,
      timeScale: 1.0,
      isPaused: false,
      score: 0,
      selectedPlanet: null,
      followMode: false,
      followTarget: 0,
      trailsVisible: true,
      challengeActive: false,
      challengeType: null,
      challengeCount: 0,
      planets: [],
      modelLoaded: false,
      planetCount: 4,
      sunPosition: { x: 0, y: 0, z: 0 }
    };

    function updateState() {
      window.__3D_STATE__ = {
        simulationTime: safeNum(simulationTime),
        timeScale: safeNum(timeScale, 1),
        isPaused: !!isPaused,
        score: safeNum(score),
        selectedPlanet: selectedPlanetIndex !== null ? planets[selectedPlanetIndex].name : null,
        followMode: !!followMode,
        followTarget: Math.max(0, Math.min(3, safeNum(followTarget))),
        trailsVisible: !!trailsVisible,
        challengeActive: !!challengeActive,
        challengeType: challengeType,
        challengeCount: safeNum(challengeCount),
        planets: planets.map(p => ({
          name: p.name,
          x: safeNum(p.mesh.position.x),
          z: safeNum(p.mesh.position.z),
          distanceFromSun: safeNum(p.distanceFromSun),
          velocity: safeNum(p.velocity),
          angle: safeNum(p.trueAnomaly)
        })),
        modelLoaded: !!modelLoaded,
        planetCount: planets.length,
        sunPosition: { x: 0, y: 0, z: 0 }
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);

      if (!isPaused) {
        simulationTime += dt * timeScale;
        simulationTime = safeNum(simulationTime, 0);
      }

      updateAllPlanets();

      if (followMode && planets[followTarget]) {
        const target = planets[followTarget].mesh.position.clone();
        const desired = target.clone().add(new THREE.Vector3(0, 8, 14));
        camera.position.lerp(desired, 0.08);
        controls.target.lerp(target, 0.12);
      } else {
        controls.target.lerp(new THREE.Vector3(0, 0, 0), 0.08);
      }

      controls.update();
      updateHUD();
      updateState();
      renderer.render(scene, camera);
    }

    resetSimulation();
    animate();
  </script>
</body>
</html>
