<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planetary Orbit Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000011; font-family: Arial, sans-serif; }
canvas { display: block; }

#hud {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}

#score-panel {
  position: absolute;
  top: 20px; left: 20px;
  background: rgba(0,0,0,0.6);
  padding: 12px 20px;
  border-radius: 8px;
  color: white;
  font-size: 24px;
  font-weight: bold;
}

#time-panel {
  position: absolute;
  top: 20px; right: 20px;
  background: rgba(0,0,0,0.6);
  padding: 12px 20px;
  border-radius: 8px;
  color: white;
  font-size: 18px;
  text-align: right;
}

#planet-info {
  position: absolute;
  bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  padding: 14px 28px;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  text-align: center;
  display: none;
  min-width: 350px;
}

#planet-info .planet-name {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 6px;
}

#challenge-prompt {
  position: absolute;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(0,0,20,0.85);
  padding: 20px 36px;
  border-radius: 12px;
  color: #ffdd44;
  font-size: 22px;
  text-align: center;
  display: none;
  border: 2px solid #ffdd44;
  pointer-events: auto;
}

#challenge-prompt input, #challenge-prompt button {
  margin-top: 10px;
  padding: 8px 16px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

#challenge-prompt button {
  background: #ffdd44;
  color: #000;
  font-weight: bold;
  margin-left: 8px;
}

#controls-help {
  position: absolute;
  bottom: 20px; right: 20px;
  background: rgba(0,0,0,0.6);
  padding: 10px 16px;
  border-radius: 8px;
  color: #aaa;
  font-size: 12px;
  line-height: 1.6;
}

#feedback {
  position: absolute;
  top: 45%; left: 50%; transform: translate(-50%, -50%);
  color: #00ff88;
  font-size: 28px;
  font-weight: bold;
  display: none;
  text-shadow: 0 0 10px #00ff88;
}
</style>
</head>
<body>

<div id="hud">
  <div id="score-panel">Score: 0</div>
  <div id="time-panel">Time: 0.0s | Speed: 1.0x</div>
  <div id="planet-info">
    <div class="planet-name" id="pi-name"></div>
    <div id="pi-details"></div>
  </div>
  <div id="challenge-prompt"></div>
  <div id="feedback"></div>
  <div id="controls-help">
    SPACE: Pause/Resume | T: Time Scale<br>
    C: Challenge | R: Reset | O: Trails<br>
    F: Follow Mode | N: Next Planet<br>
    Click planet to select
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
const state = {
  simulationTime: 0,
  timeScale: 1.0,
  isPaused: false,
  score: 0,
  selectedPlanet: null,
  followMode: false,
  followTarget: 0,
  trailsVisible: true,
  challengeActive: false,
  challengeType: null,
  challengeCount: 0,
  planets: [],
  modelLoaded: false,
  planetCount: 4,
  sunPosition: { x: 0, y: 0, z: 0 }
};
window.__3D_STATE__ = state;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000011);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 30, 50);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const pointLight = new THREE.PointLight(0xffdd44, 2.0, 200);
pointLight.position.set(0, 0, 0);
scene.add(pointLight);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.15);
scene.add(ambientLight);

// Sun
const sunGeom = new THREE.SphereGeometry(3, 32, 32);
const sunMat = new THREE.MeshBasicMaterial({ color: 0xffdd44 });
const sunMesh = new THREE.Mesh(sunGeom, sunMat);
scene.add(sunMesh);

// Sun glow
const sunGlowGeom = new THREE.SphereGeometry(3.5, 32, 32);
const sunGlowMat = new THREE.MeshBasicMaterial({ color: 0xffdd44, transparent: true, opacity: 0.2 });
const sunGlow = new THREE.Mesh(sunGlowGeom, sunGlowMat);
scene.add(sunGlow);

// Stars
const starsGeom = new THREE.BufferGeometry();
const starsCount = 2000;
const starsPos = new Float32Array(starsCount * 3);
for (let i = 0; i < starsCount * 3; i++) {
  starsPos[i] = (Math.random() - 0.5) * 500;
}
starsGeom.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
scene.add(new THREE.Points(starsGeom, starsMat));

// ============ LOAD GLB MODEL ============
const loader = new GLTFLoader();
loader.load(
  'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/models/gltf/ABeautifulGame.glb',
  (gltf) => {
    const model = gltf.scene;
    model.scale.set(0.5, 0.5, 0.5);
    model.position.set(0, 0, 0);
    scene.add(model);
    state.modelLoaded = true;
  },
  undefined,
  (err) => {
    console.warn('GLB load error:', err);
    state.modelLoaded = false;
  }
);

// ============ PLANETS ============
const GM = 1000;
const MAX_TRAIL_POINTS = 200;

const planetDefs = [
  { name: 'Mercury', radius: 0.5, color: 0xaaaaaa, a: 8,  e: 0.2,  period: 3 },
  { name: 'Earth',   radius: 0.8, color: 0x2266ff, a: 14, e: 0.1,  period: 6 },
  { name: 'Mars',    radius: 0.6, color: 0xff4422, a: 20, e: 0.15, period: 9 },
  { name: 'Jupiter', radius: 1.5, color: 0xddaa55, a: 28, e: 0.05, period: 15 }
];

const planets = [];

planetDefs.forEach((def) => {
  const geom = new THREE.SphereGeometry(def.radius, 24, 24);
  const mat = new THREE.MeshStandardMaterial({ color: def.color, roughness: 0.7, metalness: 0.2 });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.userData.planetName = def.name;
  scene.add(mesh);

  // Trail
  const trailGeom = new THREE.BufferGeometry();
  const trailPositions = new Float32Array(MAX_TRAIL_POINTS * 3);
  trailGeom.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
  trailGeom.setDrawRange(0, 0);

  const trailColors = new Float32Array(MAX_TRAIL_POINTS * 3);
  trailGeom.setAttribute('color', new THREE.BufferAttribute(trailColors, 3));

  const trailMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.7 });
  const trailLine = new THREE.Line(trailGeom, trailMat);
  scene.add(trailLine);

  // Orbit ellipse guide (faint)
  const orbitPoints = [];
  const b = def.a * Math.sqrt(1 - def.e * def.e);
  for (let i = 0; i <= 128; i++) {
    const angle = (i / 128) * Math.PI * 2;
    const ox = def.a * (Math.cos(angle) - def.e);
    const oz = b * Math.sin(angle);
    orbitPoints.push(new THREE.Vector3(ox, 0, oz));
  }
  const orbitGeom = new THREE.BufferGeometry().setFromPoints(orbitPoints);
  const orbitLine = new THREE.Line(orbitGeom, new THREE.LineBasicMaterial({ color: def.color, transparent: true, opacity: 0.15 }));
  scene.add(orbitLine);

  planets.push({
    def,
    mesh,
    trailLine,
    trailGeom,
    trailPositions: Array.from({ length: MAX_TRAIL_POINTS }, () => null),
    trailCount: 0,
    trailIndex: 0,
    orbitLine,
    eccentricAnomaly: Math.random() * Math.PI * 2,
    initialE: 0
  });
});

// Store initial eccentric anomalies
planets.forEach(p => { p.initialE = p.eccentricAnomaly; });

// ============ KEPLER FUNCTIONS ============
function computePosition(planet, simTime) {
  const { a, e, period } = planet.def;
  const b = a * Math.sqrt(1 - e * e);
  const meanMotion = (2 * Math.PI) / period;
  const M = (meanMotion * simTime + planet.initialE) % (2 * Math.PI);

  // Solve Kepler's equation M = E - e*sin(E) using Newton's method
  let E = M;
  for (let i = 0; i < 10; i++) {
    E = E - (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
  }

  const x = a * (Math.cos(E) - e);
  const z = b * Math.sin(E);
  const r = Math.sqrt(x * x + z * z);

  // True anomaly
  const trueAnomaly = Math.atan2(z, x);

  // Vis-viva velocity
  const v = Math.sqrt(Math.max(0, GM * (2 / Math.max(r, 0.01) - 1 / a)));

  return { x, z, r, v, trueAnomaly, E };
}

// ============ RAYCASTING ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Ghost marker for predict challenge
const ghostGeom = new THREE.SphereGeometry(0.4, 16, 16);
const ghostMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.5 });
const ghostMarker = new THREE.Mesh(ghostGeom, ghostMat);
ghostMarker.visible = false;
scene.add(ghostMarker);

// ============ CHALLENGE SYSTEM ============
const challengeTypes = ['identify_fastest', 'predict_position', 'speed_quiz'];
let challengeIndex = -1;
let predictTarget = null;
let predictFuturePos = null;
let predictStartTime = 0;
let speedQuizAnswer = null;

function showFeedback(text, color = '#00ff88') {
  const fb = document.getElementById('feedback');
  fb.style.color = color;
  fb.style.textShadow = `0 0 10px ${color}`;
  fb.textContent = text;
  fb.style.display = 'block';
  setTimeout(() => { fb.style.display = 'none'; }, 1500);
}

function startChallenge(type) {
  state.challengeActive = true;
  state.challengeType = type;
  const prompt = document.getElementById('challenge-prompt');

  if (type === 'identify_fastest') {
    prompt.innerHTML = '<div>🚀 CHALLENGE: Click the planet with the HIGHEST velocity!</div>';
    prompt.style.display = 'block';
    prompt.style.pointerEvents = 'none';
  } else if (type === 'predict_position') {
    // Pick a random planet
    const idx = Math.floor(Math.random() * 4);
    predictTarget = idx;
    const futureTime = state.simulationTime + 3;
    const futureData = computePosition(planets[idx], futureTime);
    predictFuturePos = new THREE.Vector3(futureData.x, 0, futureData.z);
    predictStartTime = state.simulationTime;

    // Show ghost at current position as hint
    ghostMarker.position.copy(planets[idx].mesh.position);
    ghostMarker.visible = true;

    prompt.innerHTML = `<div>🎯 CHALLENGE: Where will <b>${planets[idx].def.name}</b> be in 3 seconds?<br>Pause (SPACE) and click the predicted position!</div>`;
    prompt.style.display = 'block';
    prompt.style.pointerEvents = 'none';
  } else if (type === 'speed_quiz') {
    // Find fastest planet right now
    let maxV = -1, fastestName = '';
    planets.forEach(p => {
      const data = computePosition(p, state.simulationTime);
      if (data.v > maxV) { maxV = data.v; fastestName = p.def.name; }
    });
    speedQuizAnswer = fastestName;

    prompt.innerHTML = `
      <div>⚡ SPEED QUIZ: Which planet is fastest right now?</div>
      <div style="margin-top:12px;">
        <button onclick="window._quizAnswer('Mercury')">Mercury</button>
        <button onclick="window._quizAnswer('Earth')">Earth</button>
        <button onclick="window._quizAnswer('Mars')">Mars</button>
        <button onclick="window._quizAnswer('Jupiter')">Jupiter</button>
      </div>`;
    prompt.style.display = 'block';
    prompt.style.pointerEvents = 'auto';
  }
}

window._quizAnswer = function(answer) {
  if (state.challengeType !== 'speed_quiz') return;
  if (answer === speedQuizAnswer) {
    state.score += 15;
    showFeedback('+15 Points! Correct!', '#00ff88');
  } else {
    showFeedback(`Wrong! It was ${speedQuizAnswer}`, '#ff4444');
  }
  endChallenge();
};

function endChallenge() {
  state.challengeActive = false;
  state.challengeType = null;
  state.challengeCount++;
  ghostMarker.visible = false;
  predictTarget = null;
  predictFuturePos = null;
  speedQuizAnswer = null;
  document.getElementById('challenge-prompt').style.display = 'none';
}

// ============ EVENT HANDLERS ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const timeScales = [0.5, 1.0, 2.0, 4.0];
let timeScaleIndex = 1;

window.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();

  if (key === ' ' || e.code === 'Space') {
    e.preventDefault();
    state.isPaused = !state.isPaused;
  } else if (key === 't') {
    timeScaleIndex = (timeScaleIndex + 1) % timeScales.length;
    state.timeScale = timeScales[timeScaleIndex];
  } else if (key === 'c') {
    if (state.challengeActive) {
      endChallenge();
    }
    challengeIndex = (challengeIndex + 1) % challengeTypes.length;
    startChallenge(challengeTypes[challengeIndex]);
  } else if (key === 'r') {
    state.simulationTime = 0;
    state.score = 0;
    state.isPaused = false;
    state.timeScale = 1.0;
    timeScaleIndex = 1;
    state.selectedPlanet = null;
    state.followMode = false;
    state.followTarget = 0;
    state.challengeActive = false;
    state.challengeType = null;
    state.challengeCount = 0;
    endChallenge();
    document.getElementById('planet-info').style.display = 'none';
    // Clear trails
    planets.forEach(p => {
      p.trailCount = 0;
      p.trailIndex = 0;
      p.trailGeom.setDrawRange(0, 0);
    });
    camera.position.set(0, 30, 50);
    controls.target.set(0, 0, 0);
  } else if (key === 'f') {
    state.followMode = !state.followMode;
  } else if (key === 'n') {
    state.followTarget = (state.followTarget + 1) % 4;
  } else if (key === 'o') {
    state.trailsVisible = !state.trailsVisible;
    planets.forEach(p => { p.trailLine.visible = state.trailsVisible; p.orbitLine.visible = state.trailsVisible; });
  }
});

window.addEventListener('click', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Check planet clicks
  const planetMeshes = planets.map(p => p.mesh);
  const intersects = raycaster.intersectObjects(planetMeshes);

  if (intersects.length > 0) {
    const clickedMesh = intersects[0].object;
    const planetName = clickedMesh.userData.planetName;
    state.selectedPlanet = planetName;

    // Handle identify_fastest challenge
    if (state.challengeActive && state.challengeType === 'identify_fastest') {
      let maxV = -1, fastestName = '';
      planets.forEach(p => {
        const data = computePosition(p, state.simulationTime);
        if (data.v > maxV) { maxV = data.v; fastestName = p.def.name; }
      });
      if (planetName === fastestName) {
        state.score += 10;
        showFeedback('+10 Points! Correct!', '#00ff88');
      } else {
        showFeedback(`Wrong! ${fastestName} is fastest.`, '#ff4444');
      }
      endChallenge();
      return;
    }

    return;
  }

  // Handle predict_position challenge - click on empty space
  if (state.challengeActive && state.challengeType === 'predict_position' && predictFuturePos) {
    // Get click position on y=0 plane
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const clickPos = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, clickPos);

    if (clickPos) {
      const dist = clickPos.distanceTo(predictFuturePos);
      if (dist < 3) {
        state.score += 20;
        showFeedback('+20 Points! Great prediction!', '#00ff88');
      } else {
        showFeedback(`Missed by ${dist.toFixed(1)} units`, '#ff4444');
      }
      endChallenge();
    }
  }
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();
let lastTrailTime = 0;

function safeNum(v) {
  return (isNaN(v) || !isFinite(v)) ? 0 : v;
}

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();

  if (!state.isPaused) {
    state.simulationTime += delta * state.timeScale;
  }

  const simTime = state.simulationTime;

  // Update planets
  const planetStates = [];
  planets.forEach((planet, idx) => {
    const data = computePosition(planet, simTime);
    const px = safeNum(data.x);
    const pz = safeNum(data.z);
    const pr = safeNum(data.r);
    const pv = safeNum(data.v);
    const pa = safeNum(data.trueAnomaly);

    planet.mesh.position.set(px, 0, pz);

    // Rotate planet
    planet.mesh.rotation.y += delta * 2;

    // Trail update (every 0.05 sim seconds)
    if (!state.isPaused && simTime - lastTrailTime > 0.02) {
      const posAttr = planet.trailGeom.getAttribute('position');
      const colAttr = planet.trailGeom.getAttribute('color');
      const ti = planet.trailIndex % MAX_TRAIL_POINTS;

      posAttr.array[ti * 3] = px;
      posAttr.array[ti * 3 + 1] = 0;
      posAttr.array[ti * 3 + 2] = pz;

      // Color based on planet color, fading
      const c = new THREE.Color(planet.def.color);
      colAttr.array[ti * 3] = c.r;
      colAttr.array[ti * 3 + 1] = c.g;
      colAttr.array[ti * 3 + 2] = c.b;

      // Fade older points
      const count = Math.min(planet.trailCount + 1, MAX_TRAIL_POINTS);
      for (let i = 0; i < count; i++) {
        const age = (planet.trailIndex - i + MAX_TRAIL_POINTS) % MAX_TRAIL_POINTS;
        const fade = Math.max(0, 1 - age / MAX_TRAIL_POINTS);
        const ci = ((planet.trailIndex - age + MAX_TRAIL_POINTS) % MAX_TRAIL_POINTS);
        colAttr.array[ci * 3] = c.r * fade;
        colAttr.array[ci * 3 + 1] = c.g * fade;
        colAttr.array[ci * 3 + 2] = c.b * fade;
      }

      planet.trailIndex++;
      planet.trailCount = Math.min(planet.trailCount + 1, MAX_TRAIL_POINTS);

      posAttr.needsUpdate = true;
      colAttr.needsUpdate = true;
      planet.trailGeom.setDrawRange(0, planet.trailCount);
    }

    planetStates.push({
      name: planet.def.name,
      x: px,
      z: pz,
      distanceFromSun: pr,
      velocity: pv,
      angle: pa
    });
  });

  if (!state.isPaused && simTime - lastTrailTime > 0.02) {
    lastTrailTime = simTime;
  }

  // Sun pulse
  const pulse = 1 + 0.05 * Math.sin(simTime * 3);
  sunGlow.scale.set(pulse, pulse, pulse);

  // Follow mode
  if (state.followMode && planets[state.followTarget]) {
    const target = planets[state.followTarget].mesh.position;
    const offset = new THREE.Vector3(0, 10, 15);
    camera.position.lerp(target.clone().add(offset), 0.05);
    controls.target.lerp(target, 0.05);
  }

  controls.update();

  // Update HUD
  document.getElementById('score-panel').textContent = `Score: ${state.score}`;
  document.getElementById('time-panel').textContent = `Time: ${simTime.toFixed(1)}s | Speed: ${state.timeScale}x${state.isPaused ? ' [PAUSED]' : ''}`;

  // Planet info panel
  if (state.selectedPlanet) {
    const ps = planetStates.find(p => p.name === state.selectedPlanet);
    if (ps) {
      const infoPanel = document.getElementById('planet-info');
      infoPanel.style.display = 'block';
      document.getElementById('pi-name').textContent = ps.name;
      const pDef = planetDefs.find(d => d.name === ps.name);
      document.getElementById('pi-details').innerHTML =
        `Distance: ${ps.distanceFromSun.toFixed(2)} | Velocity: ${ps.velocity.toFixed(2)} | Period: ${pDef.period}s<br>` +
        `Position: (${ps.x.toFixed(1)}, ${ps.z.toFixed(1)}) | Angle: ${(ps.angle * 180 / Math.PI).toFixed(1)}°`;
    }
  }

  // Update state
  state.planets = planetStates;
  state.sunPosition = { x: 0, y: 0, z: 0 };
  state.simulationTime = safeNum(simTime);
  state.score = safeNum(state.score);

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
