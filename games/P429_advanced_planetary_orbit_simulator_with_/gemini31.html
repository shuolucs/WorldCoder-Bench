<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Planetary Orbit Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000011;
            font-family: Arial, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .panel {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            position: absolute;
            pointer-events: auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #score-panel {
            top: 20px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
        }
        #time-panel {
            top: 20px;
            right: 20px;
            text-align: right;
            font-size: 18px;
        }
        #info-panel {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            text-align: center;
            min-width: 250px;
        }
        #info-panel h2 {
            margin: 0 0 10px 0;
            font-size: 22px;
            color: #ffdd44;
        }
        #info-panel p {
            margin: 5px 0;
            font-size: 16px;
        }
        #challenge-panel {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            flex-direction: column;
            align-items: center;
            min-width: 300px;
        }
        #challenge-panel h3 {
            margin: 0 0 15px 0;
            color: #44ff44;
            font-size: 24px;
        }
        #challenge-panel p {
            font-size: 18px;
            margin-bottom: 15px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            background: #333;
            color: white;
            border: 1px solid #666;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 16px;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #555;
        }
        #controls-help {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="hud">
        <div id="score-panel" class="panel">Score: 0</div>
        <div id="time-panel" class="panel">Time: 0.0s<br>Speed: 1.0x</div>
        <div id="info-panel" class="panel">
            <h2 id="info-name">Planet</h2>
            <p>Distance: <span id="info-dist">0</span></p>
            <p>Velocity: <span id="info-vel">0</span></p>
            <p>Period: <span id="info-period">0</span>s</p>
        </div>
        <div id="challenge-panel" class="panel">
            <h3 id="challenge-title">Challenge</h3>
            <p id="challenge-desc">Description</p>
            <div id="challenge-content" class="btn-group"></div>
        </div>
        <div id="controls-help">
            SPACE: Pause | T: Time Scale | C: Challenge | R: Reset | F: Follow Cam | N: Next Target | O: Toggle Trails | Click: Select
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            simulationTime: 0,
            timeScale: 1.0,
            isPaused: false,
            score: 0,
            selectedPlanet: null,
            followMode: false,
            followTarget: 0,
            trailsVisible: true,
            challengeActive: false,
            challengeType: null,
            challengeCount: 0,
            planets: [],
            modelLoaded: false,
            planetCount: 4,
            sunPosition: { x: 0, y: 0, z: 0 }
        };

        // --- Constants & Setup ---
        const GM = 1000;
        const MAX_TRAIL_POINTS = 200;
        const TIME_SCALES = [0.5, 1.0, 2.0, 4.0];
        const CHALLENGE_TYPES = ['identify_fastest', 'predict_position', 'speed_quiz'];

        const planetDefs = [
            { name: 'Mercury', r: 0.5, color: 0xaaaaaa, a: 8, e: 0.2, period: 3 },
            { name: 'Earth', r: 0.8, color: 0x2266ff, a: 14, e: 0.1, period: 6 },
            { name: 'Mars', r: 0.6, color: 0xff4422, a: 20, e: 0.15, period: 9 },
            { name: 'Jupiter', r: 1.5, color: 0xddaa55, a: 28, e: 0.05, period: 15 }
        ];

        // --- Three.js Initialization ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000011);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 50);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.15);
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xffdd44, 2.0, 300);
        sunLight.position.set(0, 0, 0);
        scene.add(sunLight);

        // --- Objects ---
        // Sun
        const sunGeo = new THREE.SphereGeometry(3, 32, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xffdd44 });
        const sunMesh = new THREE.Mesh(sunGeo, sunMat);
        scene.add(sunMesh);

        // Invisible plane for raycasting (Predict Position challenge)
        const planeGeo = new THREE.PlaneGeometry(1000, 1000);
        planeGeo.rotateX(-Math.PI / 2);
        const planeMesh = new THREE.Mesh(planeGeo, new THREE.MeshBasicMaterial({ visible: false }));
        scene.add(planeMesh);

        // Ghost marker
        const ghostGeo = new THREE.SphereGeometry(0.5, 16, 16);
        const ghostMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.5, wireframe: true });
        const ghostMarker = new THREE.Mesh(ghostGeo, ghostMat);
        ghostMarker.visible = false;
        scene.add(ghostMarker);

        // Load Model
        const loader = new GLTFLoader();
        // Using a reliable CDN for the requested model
        loader.load(
            'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r163/examples/models/gltf/ABeautifulGame/glTF/ABeautifulGame.gltf',
            (gltf) => {
                const model = gltf.scene;
                model.scale.set(0.5, 0.5, 0.5);
                model.position.set(0, 0, 0);
                scene.add(model);
                window.__3D_STATE__.modelLoaded = true;
            },
            undefined,
            (error) => {
                console.warn('Model could not be loaded, continuing without it.', error);
                window.__3D_STATE__.modelLoaded = true; // Set true to avoid blocking state
            }
        );

        // --- Planet Class ---
        class Planet {
            constructor(def) {
                this.def = def;
                this.b = def.a * Math.sqrt(1 - def.e * def.e);
                this.n = (2 * Math.PI) / def.period;
                
                this.mesh = new THREE.Mesh(
                    new THREE.SphereGeometry(def.r, 32, 32),
                    new THREE.MeshStandardMaterial({ color: def.color, roughness: 0.4, metalness: 0.1 })
                );
                scene.add(this.mesh);

                // Trail
                this.trailGeo = new THREE.BufferGeometry();
                this.trailPositions = new Float32Array(MAX_TRAIL_POINTS * 3);
                this.trailColors = new Float32Array(MAX_TRAIL_POINTS * 3);
                
                const baseColor = new THREE.Color(def.color);
                for (let i = 0; i < MAX_TRAIL_POINTS; i++) {
                    const alpha = i / (MAX_TRAIL_POINTS - 1);
                    this.trailColors[i * 3] = baseColor.r * alpha;
                    this.trailColors[i * 3 + 1] = baseColor.g * alpha;
                    this.trailColors[i * 3 + 2] = baseColor.b * alpha;
                }
                
                this.trailGeo.setAttribute('position', new THREE.BufferAttribute(this.trailPositions, 3));
                this.trailGeo.setAttribute('color', new THREE.BufferAttribute(this.trailColors, 3));
                
                this.trailLine = new THREE.Line(
                    this.trailGeo,
                    new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.8 })
                );
                scene.add(this.trailLine);

                this.trailPoints = [];
                this.currentData = { x: 0, z: 0, v: 0, r: 0, angle: 0 };
            }

            solveKepler(M) {
                let E = M;
                for (let i = 0; i < 10; i++) {
                    E = E - (E - this.def.e * Math.sin(E) - M) / (1 - this.def.e * Math.cos(E));
                }
                return E;
            }

            calculatePosition(time) {
                const M = this.n * time;
                const E = this.solveKepler(M);
                const x = this.def.a * (Math.cos(E) - this.def.e);
                const z = this.b * Math.sin(E);
                return { x, z, E };
            }

            update(time) {
                const pos = this.calculatePosition(time);
                this.mesh.position.set(pos.x, 0, pos.z);

                const r = Math.sqrt(pos.x * pos.x + pos.z * pos.z);
                const v = Math.sqrt(GM * (2 / r - 1 / this.def.a));
                const angle = Math.atan2(pos.z, pos.x);

                this.currentData = {
                    x: pos.x || 0,
                    z: pos.z || 0,
                    v: v || 0,
                    r: r || 0,
                    angle: angle || 0
                };

                // Update Trail
                this.trailPoints.push(new THREE.Vector3(pos.x, 0, pos.z));
                if (this.trailPoints.length > MAX_TRAIL_POINTS) {
                    this.trailPoints.shift();
                }

                for (let i = 0; i < MAX_TRAIL_POINTS; i++) {
                    const pt = this.trailPoints[i] || this.trailPoints[this.trailPoints.length - 1] || this.mesh.position;
                    this.trailPositions[i * 3] = pt.x;
                    this.trailPositions[i * 3 + 1] = pt.y;
                    this.trailPositions[i * 3 + 2] = pt.z;
                }
                this.trailGeo.attributes.position.needsUpdate = true;
                this.trailLine.visible = window.__3D_STATE__.trailsVisible;
            }
        }

        const planets = planetDefs.map(def => new Planet(def));

        // --- Interaction & Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let currentChallengeIndex = -1;
        let predictTargetPlanet = null;

        function updateHUD() {
            document.getElementById('score-panel').innerText = `Score: ${window.__3D_STATE__.score}`;
            document.getElementById('time-panel').innerHTML = `Time: ${window.__3D_STATE__.simulationTime.toFixed(1)}s<br>Speed: ${window.__3D_STATE__.timeScale}x`;
            
            if (window.__3D_STATE__.selectedPlanet) {
                const p = planets.find(pl => pl.def.name === window.__3D_STATE__.selectedPlanet);
                if (p) {
                    document.getElementById('info-panel').style.display = 'block';
                    document.getElementById('info-name').innerText = p.def.name;
                    document.getElementById('info-dist').innerText = p.currentData.r.toFixed(2);
                    document.getElementById('info-vel').innerText = p.currentData.v.toFixed(2);
                    document.getElementById('info-period').innerText = p.def.period;
                }
            } else {
                document.getElementById('info-panel').style.display = 'none';
            }
        }

        function showMessage(msg, duration = 2000) {
            const panel = document.getElementById('challenge-panel');
            panel.innerHTML = `<h3>Result</h3><p>${msg}</p>`;
            setTimeout(() => {
                if (!window.__3D_STATE__.challengeActive) {
                    panel.style.display = 'none';
                }
            }, duration);
        }

        function endChallenge(msg) {
            window.__3D_STATE__.challengeActive = false;
            window.__3D_STATE__.challengeType = null;
            ghostMarker.visible = false;
            showMessage(msg);
        }

        function activateChallenge() {
            currentChallengeIndex = (currentChallengeIndex + 1) % CHALLENGE_TYPES.length;
            const type = CHALLENGE_TYPES[currentChallengeIndex];
            
            window.__3D_STATE__.challengeType = type;
            window.__3D_STATE__.challengeActive = true;
            ghostMarker.visible = false;

            const panel = document.getElementById('challenge-panel');
            panel.style.display = 'flex';
            const title = document.getElementById('challenge-title');
            const desc = document.getElementById('challenge-desc');
            const content = document.getElementById('challenge-content');
            
            panel.innerHTML = '<h3 id="challenge-title"></h3><p id="challenge-desc"></p><div id="challenge-content" class="btn-group"></div>';
            
            if (type === 'identify_fastest') {
                document.getElementById('challenge-title').innerText = 'Identify Fastest';
                document.getElementById('challenge-desc').innerText = 'Click the planet moving the fastest right now!';
            } else if (type === 'predict_position') {
                predictTargetPlanet = planets[Math.floor(Math.random() * planets.length)];
                document.getElementById('challenge-title').innerText = 'Predict Position';
                document.getElementById('challenge-desc').innerHTML = `Pause (SPACE) and click on the grid where <b>${predictTargetPlanet.def.name}</b> will be in 3 seconds!`;
            } else if (type === 'speed_quiz') {
                document.getElementById('challenge-title').innerText = 'Speed Quiz';
                document.getElementById('challenge-desc').innerText = 'Which planet is fastest right now?';
                const btnContainer = document.getElementById('challenge-content');
                planets.forEach(p => {
                    const btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.innerText = p.def.name;
                    btn.onclick = () => {
                        const fastest = [...planets].sort((a, b) => b.currentData.v - a.currentData.v)[0];
                        if (p === fastest) {
                            window.__3D_STATE__.score += 15;
                            window.__3D_STATE__.challengeCount++;
                            endChallenge("Correct! +15 pts");
                        } else {
                            endChallenge("Wrong! Try again later.");
                        }
                    };
                    btnContainer.appendChild(btn);
                });
            }
        }

        window.addEventListener('pointerdown', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            if (window.__3D_STATE__.challengeActive) {
                const type = window.__3D_STATE__.challengeType;
                
                if (type === 'identify_fastest') {
                    const intersects = raycaster.intersectObjects(planets.map(p => p.mesh));
                    if (intersects.length > 0) {
                        const clickedPlanet = planets.find(p => p.mesh === intersects[0].object);
                        const fastest = [...planets].sort((a, b) => b.currentData.v - a.currentData.v)[0];
                        if (clickedPlanet === fastest) {
                            window.__3D_STATE__.score += 10;
                            window.__3D_STATE__.challengeCount++;
                            endChallenge("Correct! +10 pts");
                        } else {
                            endChallenge("Wrong! Try again later.");
                        }
                    }
                } else if (type === 'predict_position') {
                    const intersects = raycaster.intersectObject(planeMesh);
                    if (intersects.length > 0) {
                        const clickPoint = intersects[0].point;
                        const futureTime = window.__3D_STATE__.simulationTime + 3;
                        const futurePos = predictTargetPlanet.calculatePosition(futureTime);
                        
                        ghostMarker.position.set(futurePos.x, 0, futurePos.z);
                        ghostMarker.visible = true;

                        const dist = Math.hypot(clickPoint.x - futurePos.x, clickPoint.z - futurePos.z);
                        if (dist <= 3) {
                            window.__3D_STATE__.score += 20;
                            window.__3D_STATE__.challengeCount++;
                            endChallenge(`Great prediction! Missed by ${dist.toFixed(1)}. +20 pts`);
                        } else {
                            endChallenge(`Missed by ${dist.toFixed(1)} units. Too far!`);
                        }
                    }
                }
            } else {
                // Normal selection
                const intersects = raycaster.intersectObjects(planets.map(p => p.mesh));
                if (intersects.length > 0) {
                    const clickedPlanet = planets.find(p => p.mesh === intersects[0].object);
                    window.__3D_STATE__.selectedPlanet = clickedPlanet.def.name;
                } else {
                    window.__3D_STATE__.selectedPlanet = null;
                }
            }
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === ' ') {
                window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
            } else if (key === 't') {
                let idx = TIME_SCALES.indexOf(window.__3D_STATE__.timeScale);
                idx = (idx + 1) % TIME_SCALES.length;
                window.__3D_STATE__.timeScale = TIME_SCALES[idx];
            } else if (key === 'c') {
                activateChallenge();
            } else if (key === 'r') {
                window.__3D_STATE__.simulationTime = 0;
                window.__3D_STATE__.score = 0;
                window.__3D_STATE__.challengeActive = false;
                window.__3D_STATE__.challengeType = null;
                document.getElementById('challenge-panel').style.display = 'none';
                ghostMarker.visible = false;
                planets.forEach(p => p.trailPoints = []);
            } else if (key === 'f') {
                window.__3D_STATE__.followMode = !window.__3D_STATE__.followMode;
            } else if (key === 'n') {
                window.__3D_STATE__.followTarget = (window.__3D_STATE__.followTarget + 1) % planets.length;
            } else if (key === 'o') {
                window.__3D_STATE__.trailsVisible = !window.__3D_STATE__.trailsVisible;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (!window.__3D_STATE__.isPaused) {
                window.__3D_STATE__.simulationTime += delta * window.__3D_STATE__.timeScale;
            }

            // Update Planets
            const statePlanets = [];
            planets.forEach(p => {
                p.update(window.__3D_STATE__.simulationTime);
                statePlanets.push({
                    name: p.def.name,
                    x: p.currentData.x,
                    z: p.currentData.z,
                    distanceFromSun: p.currentData.r,
                    velocity: p.currentData.v,
                    angle: p.currentData.angle
                });
            });

            // Update State Object
            window.__3D_STATE__.planets = statePlanets;

            // Follow Cam
            if (window.__3D_STATE__.followMode) {
                const target = planets[window.__3D_STATE__.followTarget].mesh.position;
                camera.position.lerp(new THREE.Vector3(target.x + 10, target.y + 10, target.z + 10), 0.1);
                controls.target.lerp(target, 0.1);
            } else {
                controls.target.lerp(new THREE.Vector3(0, 0, 0), 0.05);
            }

            controls.update();
            updateHUD();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
