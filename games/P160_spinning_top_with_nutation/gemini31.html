<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinning Top Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: monospace;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            min-width: 250px;
            border: 1px solid #333;
        }
        .hud-line {
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
        }
        .hud-label {
            color: #aaa;
        }
        .hud-value {
            font-weight: bold;
            color: #00ffcc;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 8px;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 16px;
            cursor: pointer;
            font-family: monospace;
            border-radius: 4px;
            transition: background 0.2s;
        }
        button:hover {
            background: #555;
        }
        #instructions {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            text-align: right;
            border: 1px solid #333;
        }
        .key {
            background: #eee;
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div class="hud-line"><span class="hud-label">Status:</span> <span class="hud-value" id="val-status">Idle</span></div>
        <div class="hud-line"><span class="hud-label">Spin Rate:</span> <span class="hud-value" id="val-spin">0.00 rad/s</span></div>
        <div class="hud-line"><span class="hud-label">Precession:</span> <span class="hud-value" id="val-prec">0.000 rad/s</span></div>
        <div class="hud-line"><span class="hud-label">Tilt Angle:</span> <span class="hud-value" id="val-tilt">0.0°</span></div>
        <div class="hud-line"><span class="hud-label">Nutation Amp:</span> <span class="hud-value" id="val-nut">0.000 rad</span></div>
    </div>

    <div id="instructions">
        <div class="hud-line">Boost Spin: <span class="key">B</span></div>
        <div class="hud-line">Increase Tilt: <span class="key">T</span></div>
        <div class="hud-line">Pause/Resume: <span class="key">Space</span></div>
    </div>

    <div id="controls">
        <button id="launchBtn">Launch Top</button>
        <button id="frictionBtn">Friction: ON</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            spinRate: 0,
            precessionRate: 0,
            tiltAngle: 0,
            nutationAmplitude: 0,
            status: 'idle', // 'idle', 'spinning', 'toppled', 'paused'
            frictionEnabled: true,
            elapsedTime: 0,
            topPosition: { x: 0, y: 0, z: 0 },
            spinBoostCount: 0,
            totalEnergy: 0
        };

        // Physics Parameters
        const m = 0.5; // kg
        const g = 9.81; // m/s^2
        const d = 0.5; // m (distance from tip to CM)
        const I_spin = 0.02; // kg*m^2
        const I_perp = 0.05; // kg*m^2
        const initialSpin = 15; // rad/s
        const initialTilt = 0.3; // rad
        const frictionDecay = 0.3; // rad/s per second

        // Simulation Variables
        let baseTilt = 0;
        let spinAngle = 0;
        let precessionAngle = 0;
        let nutationPhase = 0;
        let previousStatus = 'idle';

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(4, 3, 4);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.5, 0);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // --- Ground & Grid ---
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x556B2F, roughness: 0.8, metalness: 0.1 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(20, 20, 0x000000, 0x000000);
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // --- Spinning Top Construction ---
        // Hierarchy: precessionGroup (rotates Y) -> tiltGroup (rotates Z) -> spinGroup (rotates Y) -> meshes
        const precessionGroup = new THREE.Group();
        scene.add(precessionGroup);

        const tiltGroup = new THREE.Group();
        precessionGroup.add(tiltGroup);

        const spinGroup = new THREE.Group();
        tiltGroup.add(spinGroup);

        // Materials
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xDAA520, metalness: 0.8, roughness: 0.2 });
        const tipMat = new THREE.MeshStandardMaterial({ color: 0xC0C0C0, metalness: 0.9, roughness: 0.1 });
        const discMat = new THREE.MeshStandardMaterial({ color: 0xB22222, metalness: 0.3, roughness: 0.7 });
        const handleMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, metalness: 0.1, roughness: 0.9 });

        // Body (Cone)
        const bodyGeo = new THREE.ConeGeometry(0.5, 1.5, 32);
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.rotation.x = Math.PI; // Point down
        body.position.y = 0.75; // Base at 1.5, tip at 0
        body.castShadow = true;
        spinGroup.add(body);

        // Tip (Sphere)
        const tipGeo = new THREE.SphereGeometry(0.05, 16, 16);
        const tip = new THREE.Mesh(tipGeo, tipMat);
        tip.position.y = 0;
        tip.castShadow = true;
        spinGroup.add(tip);

        // Disc (Cylinder)
        const discGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.08, 32);
        const disc = new THREE.Mesh(discGeo, discMat);
        disc.position.y = 1.5;
        disc.castShadow = true;
        spinGroup.add(disc);

        // Handle (Cylinder)
        const handleGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.3, 16);
        const handle = new THREE.Mesh(handleGeo, handleMat);
        handle.position.y = 1.65; // 1.5 + 0.15
        handle.castShadow = true;
        spinGroup.add(handle);

        // --- UI Elements ---
        const launchBtn = document.getElementById('launchBtn');
        const frictionBtn = document.getElementById('frictionBtn');
        const valStatus = document.getElementById('val-status');
        const valSpin = document.getElementById('val-spin');
        const valPrec = document.getElementById('val-prec');
        const valTilt = document.getElementById('val-tilt');
        const valNut = document.getElementById('val-nut');

        // --- Interaction Logic ---
        function resetTop() {
            window.__3D_STATE__.spinRate = initialSpin;
            window.__3D_STATE__.status = 'spinning';
            window.__3D_STATE__.elapsedTime = 0;
            window.__3D_STATE__.spinBoostCount = 0;
            
            baseTilt = initialTilt;
            spinAngle = 0;
            precessionAngle = 0;
            nutationPhase = 0;
            
            launchBtn.innerText = 'Reset';
        }

        launchBtn.addEventListener('click', () => {
            if (window.__3D_STATE__.status === 'idle' || window.__3D_STATE__.status === 'toppled') {
                resetTop();
            } else {
                resetTop(); // Reset even if spinning/paused
            }
        });

        frictionBtn.addEventListener('click', () => {
            window.__3D_STATE__.frictionEnabled = !window.__3D_STATE__.frictionEnabled;
            frictionBtn.innerText = window.__3D_STATE__.frictionEnabled ? 'Friction: ON' : 'Friction: OFF';
        });

        window.addEventListener('keydown', (e) => {
            const state = window.__3D_STATE__;
            if (e.code === 'Space') {
                e.preventDefault();
                if (state.status === 'spinning') {
                    previousStatus = state.status;
                    state.status = 'paused';
                } else if (state.status === 'paused') {
                    state.status = previousStatus;
                }
            }
            if (state.status === 'spinning') {
                if (e.key === 'b' || e.key === 'B') {
                    state.spinRate += 5;
                    state.spinBoostCount++;
                }
                if (e.key === 't' || e.key === 'T') {
                    baseTilt += 0.05;
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function updateHUD() {
            const state = window.__3D_STATE__;
            valStatus.innerText = state.status.charAt(0).toUpperCase() + state.status.slice(1);
            valStatus.style.color = state.status === 'spinning' ? '#00ffcc' : (state.status === 'toppled' ? '#ff4444' : '#aaaaaa');
            valSpin.innerText = state.spinRate.toFixed(2) + ' rad/s';
            valPrec.innerText = state.precessionRate.toFixed(3) + ' rad/s';
            valTilt.innerText = (state.tiltAngle * 180 / Math.PI).toFixed(1) + '°';
            valNut.innerText = state.nutationAmplitude.toFixed(3) + ' rad';
        }

        function animate() {
            requestAnimationFrame(animate);

            let dt = clock.getDelta();
            if (dt > 0.05) dt = 0.05; // Clamp dt

            const state = window.__3D_STATE__;

            if (state.status === 'spinning' || state.status === 'toppled') {
                state.elapsedTime += dt;

                if (state.status === 'spinning') {
                    // Friction
                    if (state.frictionEnabled) {
                        state.spinRate -= frictionDecay * dt;
                        if (state.spinRate < 0) state.spinRate = 0;
                    }

                    // Precession: Ω_p = (m*g*d) / (I_spin * ψ_dot)
                    if (state.spinRate > 0.5) {
                        state.precessionRate = (m * g * d) / (I_spin * state.spinRate);
                    } else {
                        // Cap precession when spin is very low to avoid explosion
                        state.precessionRate = (m * g * d) / (I_spin * 0.5);
                    }

                    // Nutation
                    let baseNutAmp = 0.05;
                    if (state.spinRate < 2) {
                        baseNutAmp += (2 - state.spinRate) * 0.15; // Wobble increases
                    }
                    state.nutationAmplitude = baseNutAmp;
                    
                    // Nutation frequency related to spin
                    const nutationFreq = state.spinRate * 0.8 + 2; 
                    nutationPhase += nutationFreq * dt;
                    
                    state.tiltAngle = baseTilt + state.nutationAmplitude * Math.sin(nutationPhase);

                    // Topple condition
                    if (state.tiltAngle > Math.PI / 4) {
                        state.status = 'toppled';
                        launchBtn.innerText = 'Launch Top';
                    }

                } else if (state.status === 'toppled') {
                    // Fall over animation
                    state.tiltAngle += (Math.PI / 2 - state.tiltAngle) * 3 * dt;
                    state.spinRate = Math.max(0, state.spinRate - 10 * dt);
                    state.precessionRate *= 0.95;
                    state.nutationAmplitude *= 0.9;
                }

                // Update Angles
                precessionAngle += state.precessionRate * dt;
                spinAngle += state.spinRate * dt;

                // Apply to Groups
                precessionGroup.rotation.y = precessionAngle;
                tiltGroup.rotation.z = state.tiltAngle;
                spinGroup.rotation.y = spinAngle;

                // Energy Calculation
                const Ek = 0.5 * I_spin * state.spinRate * state.spinRate + 0.5 * I_perp * state.precessionRate * state.precessionRate;
                const Ep = m * g * d * Math.cos(state.tiltAngle);
                state.totalEnergy = Ek + Ep;
            }

            // Update state position
            const worldPos = new THREE.Vector3();
            spinGroup.getWorldPosition(worldPos);
            state.topPosition = { x: worldPos.x, y: worldPos.y, z: worldPos.z };

            updateHUD();
            controls.update();
            renderer.render(scene, camera);
        }

        // Initial setup
        tiltGroup.rotation.z = initialTilt;
        updateHUD();
        animate();

    </script>
</body>
</html>
