<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Binary Star System Simulator</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000005;
      color: #e8eefc;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(5, 10, 20, 0.72);
      border: 1px solid rgba(150, 180, 255, 0.18);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 260px;
      backdrop-filter: blur(6px);
    }

    #ui h3 {
      margin: 0 0 10px 0;
      font-size: 15px;
      font-weight: 600;
    }

    .control {
      margin-bottom: 10px;
    }

    .control label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      color: #c9d5ff;
    }

    .control input[type="range"] {
      width: 100%;
    }

    .value {
      font-size: 12px;
      color: #9ec2ff;
    }

    #hud {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(5, 10, 20, 0.72);
      border: 1px solid rgba(150, 180, 255, 0.18);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 250px;
      backdrop-filter: blur(6px);
      line-height: 1.5;
      font-size: 13px;
    }

    #help {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(5, 10, 20, 0.62);
      border: 1px solid rgba(150, 180, 255, 0.14);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      color: #cad7ff;
    }

    .key {
      display: inline-block;
      min-width: 18px;
      padding: 1px 6px;
      margin: 0 2px;
      border-radius: 5px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      text-align: center;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="ui">
    <h3>Binary Star Controls</h3>

    <div class="control">
      <label for="slider-mass-a">Star A Mass: <span class="value" id="value-mass-a">100</span></label>
      <input id="slider-mass-a" type="range" min="20" max="200" step="10" value="100" />
    </div>

    <div class="control">
      <label for="slider-mass-b">Star B Mass: <span class="value" id="value-mass-b">60</span></label>
      <input id="slider-mass-b" type="range" min="20" max="200" step="10" value="60" />
    </div>

    <div class="control">
      <label for="slider-separation">Initial Separation: <span class="value" id="value-separation">15</span></label>
      <input id="slider-separation" type="range" min="5" max="30" step="1" value="15" />
    </div>
  </div>

  <div id="hud">
    <div>Star A mass: <span id="hud-mass-a">100</span></div>
    <div>Star B mass: <span id="hud-mass-b">60</span></div>
    <div>Separation: <span id="hud-sep">15.00</span></div>
    <div>Total energy: <span id="hud-energy">0.00</span></div>
    <div>Energy drift: <span id="hud-drift">0.0000</span>%</div>
    <div>Planet: <span id="hud-planet">ON</span></div>
  </div>

  <div id="help">
    <div><span class="key">R</span> Reset orbits</div>
    <div><span class="key">Space</span> Pause/Play</div>
    <div><span class="key">P</span> Toggle planet</div>
    <div><span class="key">T</span> Toggle trails</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const G = 1;
    const DT = 0.005;
    const SUBSTEPS = 4;
    const TRAIL_LENGTH = 500;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000005);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 30, 40);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    // Starfield: 2000 random white points inside sphere radius 200
    const starfieldCount = 2000;
    const starfieldPositions = new Float32Array(starfieldCount * 3);
    for (let i = 0; i < starfieldCount; i++) {
      const u = Math.random();
      const v = Math.random();
      const theta = 2 * Math.PI * u;
      const phi = Math.acos(2 * v - 1);
      const r = 200 * Math.cbrt(Math.random());

      const sinPhi = Math.sin(phi);
      starfieldPositions[i * 3 + 0] = r * sinPhi * Math.cos(theta);
      starfieldPositions[i * 3 + 1] = r * Math.cos(phi);
      starfieldPositions[i * 3 + 2] = r * sinPhi * Math.sin(theta);
    }

    const starfieldGeometry = new THREE.BufferGeometry();
    starfieldGeometry.setAttribute('position', new THREE.BufferAttribute(starfieldPositions, 3));
    const starfieldMaterial = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.7,
      sizeAttenuation: true
    });
    const starfield = new THREE.Points(starfieldGeometry, starfieldMaterial);
    scene.add(starfield);

    const sphereGeoA = new THREE.SphereGeometry(2.0, 32, 32);
    const sphereGeoB = new THREE.SphereGeometry(1.2, 32, 32);
    const sphereGeoPlanet = new THREE.SphereGeometry(0.3, 20, 20);

    const coronaGeoA = new THREE.SphereGeometry(2.0 * 1.5, 32, 32);
    const coronaGeoB = new THREE.SphereGeometry(1.2 * 1.5, 32, 32);

    const starAMaterial = new THREE.MeshBasicMaterial({ color: 0xff6633 });
    const starBMaterial = new THREE.MeshBasicMaterial({ color: 0x6688ff });
    const planetMaterial = new THREE.MeshBasicMaterial({ color: 0x44cc44 });

    const coronaMatA = new THREE.MeshBasicMaterial({
      color: 0xff9966,
      transparent: true,
      opacity: 0.15,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const coronaMatB = new THREE.MeshBasicMaterial({
      color: 0x99bbff,
      transparent: true,
      opacity: 0.15,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const starAGroup = new THREE.Group();
    const starBGroup = new THREE.Group();

    const starAMesh = new THREE.Mesh(sphereGeoA, starAMaterial);
    const starBMesh = new THREE.Mesh(sphereGeoB, starBMaterial);
    const coronaA = new THREE.Mesh(coronaGeoA, coronaMatA);
    const coronaB = new THREE.Mesh(coronaGeoB, coronaMatB);

    const lightA = new THREE.PointLight(0xff6633, 3, 80);
    const lightB = new THREE.PointLight(0x6688ff, 2, 50);

    starAGroup.add(starAMesh, coronaA, lightA);
    starBGroup.add(starBMesh, coronaB, lightB);

    scene.add(starAGroup);
    scene.add(starBGroup);

    const planetMesh = new THREE.Mesh(sphereGeoPlanet, planetMaterial);
    scene.add(planetMesh);

    function createTrail(color) {
      const positions = new Float32Array(TRAIL_LENGTH * 3);
      const colors = new Float32Array(TRAIL_LENGTH * 4);

      for (let i = 0; i < TRAIL_LENGTH; i++) {
        const t = i / (TRAIL_LENGTH - 1);
        const c = new THREE.Color(color);
        colors[i * 4 + 0] = c.r;
        colors[i * 4 + 1] = c.g;
        colors[i * 4 + 2] = c.b;
        colors[i * 4 + 3] = t;
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 4));

      const material = new THREE.LineBasicMaterial({
        vertexColors: true,
        transparent: true,
        opacity: 1
      });

      const line = new THREE.Line(geometry, material);
      scene.add(line);

      return {
        line,
        geometry,
        positions,
        points: []
      };
    }

    const trailA = createTrail(0xff6633);
    const trailB = createTrail(0x6688ff);
    const trailPlanet = createTrail(0x44cc44);

    const sliderMassA = document.getElementById('slider-mass-a');
    const sliderMassB = document.getElementById('slider-mass-b');
    const sliderSeparation = document.getElementById('slider-separation');

    const valueMassA = document.getElementById('value-mass-a');
    const valueMassB = document.getElementById('value-mass-b');
    const valueSeparation = document.getElementById('value-separation');

    const hudMassA = document.getElementById('hud-mass-a');
    const hudMassB = document.getElementById('hud-mass-b');
    const hudSep = document.getElementById('hud-sep');
    const hudEnergy = document.getElementById('hud-energy');
    const hudDrift = document.getElementById('hud-drift');
    const hudPlanet = document.getElementById('hud-planet');

    function syncSliderLabels() {
      valueMassA.textContent = sliderMassA.value;
      valueMassB.textContent = sliderMassB.value;
      valueSeparation.textContent = sliderSeparation.value;
    }
    syncSliderLabels();

    sliderMassA.addEventListener('input', syncSliderLabels);
    sliderMassB.addEventListener('input', syncSliderLabels);
    sliderSeparation.addEventListener('input', syncSliderLabels);

    const state = {
      massA: 100,
      massB: 60,
      radiusA: 2.0,
      radiusB: 1.2,
      massPlanet: 0.1,
      planetEnabled: true,
      trailsEnabled: true,
      paused: false,
      initialEnergy: 0,
      frameCount: 0,
      orbitCount: 0,
      prevAngle: 0,
      angleAccumulator: 0,
      A: {
        pos: new THREE.Vector3(),
        vel: new THREE.Vector3()
      },
      B: {
        pos: new THREE.Vector3(),
        vel: new THREE.Vector3()
      },
      P: {
        pos: new THREE.Vector3(),
        vel: new THREE.Vector3()
      }
    };

    function clearTrail(trail) {
      trail.points = [];
      for (let i = 0; i < TRAIL_LENGTH * 3; i++) trail.positions[i] = 0;
      trail.geometry.attributes.position.needsUpdate = true;
      trail.geometry.setDrawRange(0, 0);
    }

    function pushTrail(trail, position) {
      trail.points.push(position.clone());
      if (trail.points.length > TRAIL_LENGTH) trail.points.shift();

      const offset = TRAIL_LENGTH - trail.points.length;
      for (let i = 0; i < trail.points.length; i++) {
        const p = trail.points[i];
        const idx = (offset + i) * 3;
        trail.positions[idx + 0] = p.x;
        trail.positions[idx + 1] = p.y;
        trail.positions[idx + 2] = p.z;
      }

      for (let i = 0; i < offset * 3; i++) {
        trail.positions[i] = trail.points[0] ? trail.points[0].toArray()[i % 3] : 0;
      }

      trail.geometry.attributes.position.needsUpdate = true;
      trail.geometry.setDrawRange(offset, trail.points.length);
    }

    function computeCircularBinaryInitialConditions(mA, mB, separation) {
      const totalMass = mA + mB;
      const dA = separation * mB / totalMass;
      const dB = separation * mA / totalMass;

      const rA = new THREE.Vector3(-dA, 0, 0);
      const rB = new THREE.Vector3(dB, 0, 0);

      // Angular speed for circular binary orbit
      const omega = Math.sqrt(G * totalMass / Math.pow(separation, 3));

      const vA = new THREE.Vector3(0, -omega * dA, 0);
      const vB = new THREE.Vector3(0, omega * dB, 0);

      return { rA, rB, vA, vB };
    }

    function resetSimulation() {
      state.massA = Number(sliderMassA.value);
      state.massB = Number(sliderMassB.value);
      const separation = Number(sliderSeparation.value);

      const init = computeCircularBinaryInitialConditions(state.massA, state.massB, separation);

      state.A.pos.copy(init.rA);
      state.A.vel.copy(init.vA);
      state.B.pos.copy(init.rB);
      state.B.vel.copy(init.vB);

      state.P.pos.set(25, 0, 0);
      state.P.vel.set(0, 0, 3);

      starAGroup.position.copy(state.A.pos);
      starBGroup.position.copy(state.B.pos);
      planetMesh.position.copy(state.P.pos);

      clearTrail(trailA);
      clearTrail(trailB);
      clearTrail(trailPlanet);

      pushTrail(trailA, state.A.pos);
      pushTrail(trailB, state.B.pos);
      if (state.planetEnabled) pushTrail(trailPlanet, state.P.pos);

      state.initialEnergy = computeTotalEnergy();
      state.prevAngle = Math.atan2(state.A.pos.y, state.A.pos.x);
      state.angleAccumulator = 0;
      state.orbitCount = 0;
    }

    function accelStars(posA, posB, mA, mB) {
      const rBA = new THREE.Vector3().subVectors(posB, posA);
      const distSq = Math.max(rBA.lengthSq(), 1e-8);
      const dist = Math.sqrt(distSq);
      const factor = G / (distSq * dist);

      const aA = rBA.clone().multiplyScalar(mB * factor);
      const aB = rBA.clone().multiplyScalar(-mA * factor);
      return { aA, aB };
    }

    function accelPlanet(posP, posA, posB, mA, mB) {
      const rAP = new THREE.Vector3().subVectors(posA, posP);
      const rBP = new THREE.Vector3().subVectors(posB, posP);

      const dASq = Math.max(rAP.lengthSq(), 1e-8);
      const dBSq = Math.max(rBP.lengthSq(), 1e-8);

      const dA = Math.sqrt(dASq);
      const dB = Math.sqrt(dBSq);

      const a = new THREE.Vector3();
      a.add(rAP.multiplyScalar(G * mA / (dASq * dA)));
      a.add(rBP.multiplyScalar(G * mB / (dBSq * dB)));
      return a;
    }

    function cloneSystem() {
      return {
        A: { pos: state.A.pos.clone(), vel: state.A.vel.clone() },
        B: { pos: state.B.pos.clone(), vel: state.B.vel.clone() },
        P: { pos: state.P.pos.clone(), vel: state.P.vel.clone() }
      };
    }

    function derivatives(sys) {
      const sAcc = accelStars(sys.A.pos, sys.B.pos, state.massA, state.massB);
      const d = {
        A: { dpos: sys.A.vel.clone(), dvel: sAcc.aA.clone() },
        B: { dpos: sys.B.vel.clone(), dvel: sAcc.aB.clone() },
        P: { dpos: sys.P.vel.clone(), dvel: new THREE.Vector3() }
      };

      if (state.planetEnabled) {
        d.P.dvel.copy(accelPlanet(sys.P.pos, sys.A.pos, sys.B.pos, state.massA, state.massB));
      }

      return d;
    }

    function addScaledSystem(sys, deriv, scale) {
      return {
        A: {
          pos: sys.A.pos.clone().addScaledVector(deriv.A.dpos, scale),
          vel: sys.A.vel.clone().addScaledVector(deriv.A.dvel, scale)
        },
        B: {
          pos: sys.B.pos.clone().addScaledVector(deriv.B.dpos, scale),
          vel: sys.B.vel.clone().addScaledVector(deriv.B.dvel, scale)
        },
        P: {
          pos: sys.P.pos.clone().addScaledVector(deriv.P.dpos, scale),
          vel: sys.P.vel.clone().addScaledVector(deriv.P.dvel, scale)
        }
      };
    }

    function rk4Step(dt) {
      const y = cloneSystem();

      const k1 = derivatives(y);
      const k2 = derivatives(addScaledSystem(y, k1, dt * 0.5));
      const k3 = derivatives(addScaledSystem(y, k2, dt * 0.5));
      const k4 = derivatives(addScaledSystem(y, k3, dt));

      const bodies = ['A', 'B', 'P'];
      for (const body of bodies) {
        state[body].pos.addScaledVector(k1[body].dpos, dt / 6);
        state[body].pos.addScaledVector(k2[body].dpos, dt / 3);
        state[body].pos.addScaledVector(k3[body].dpos, dt / 3);
        state[body].pos.addScaledVector(k4[body].dpos, dt / 6);

        state[body].vel.addScaledVector(k1[body].dvel, dt / 6);
        state[body].vel.addScaledVector(k2[body].dvel, dt / 3);
        state[body].vel.addScaledVector(k3[body].dvel, dt / 3);
        state[body].vel.addScaledVector(k4[body].dvel, dt / 6);
      }
    }

    function computeTotalEnergy() {
      const r = state.A.pos.distanceTo(state.B.pos);
      let energy =
        0.5 * state.massA * state.A.vel.lengthSq() +
        0.5 * state.massB * state.B.vel.lengthSq() -
        G * state.massA * state.massB / Math.max(r, 1e-8);

      if (state.planetEnabled) {
        const rpA = state.P.pos.distanceTo(state.A.pos);
        const rpB = state.P.pos.distanceTo(state.B.pos);
        energy += 0.5 * state.massPlanet * state.P.vel.lengthSq();
        energy -= G * state.massPlanet * state.massA / Math.max(rpA, 1e-8);
        energy -= G * state.massPlanet * state.massB / Math.max(rpB, 1e-8);
      }

      return energy;
    }

    function computeAngularMomentumZ() {
      const LA = new THREE.Vector3().copy(state.A.pos).cross(state.A.vel).multiplyScalar(state.massA);
      const LB = new THREE.Vector3().copy(state.B.pos).cross(state.B.vel).multiplyScalar(state.massB);
      const LP = new THREE.Vector3();

      if (state.planetEnabled) {
        LP.copy(state.P.pos).cross(state.P.vel).multiplyScalar(state.massPlanet);
      }

      return LA.add(LB).add(LP).z;
    }

    function finiteVec3(v) {
      return Number.isFinite(v.x) && Number.isFinite(v.y) && Number.isFinite(v.z);
    }

    function updateBodiesVisual() {
      starAGroup.position.copy(state.A.pos);
      starBGroup.position.copy(state.B.pos);
      planetMesh.position.copy(state.P.pos);
      planetMesh.visible = state.planetEnabled;
    }

    function updateTrails() {
      trailA.line.visible = state.trailsEnabled;
      trailB.line.visible = state.trailsEnabled;
      trailPlanet.line.visible = state.trailsEnabled && state.planetEnabled;

      if (!state.trailsEnabled) return;

      pushTrail(trailA, state.A.pos);
      pushTrail(trailB, state.B.pos);
      if (state.planetEnabled) {
        pushTrail(trailPlanet, state.P.pos);
      }
    }

    function updateOrbitCount() {
      const angle = Math.atan2(state.A.pos.y, state.A.pos.x);
      let delta = angle - state.prevAngle;
      if (delta > Math.PI) delta -= 2 * Math.PI;
      if (delta < -Math.PI) delta += 2 * Math.PI;
      state.angleAccumulator += Math.abs(delta);
      state.orbitCount = Math.floor(state.angleAccumulator / (2 * Math.PI));
      state.prevAngle = angle;
    }

    function updateHUDAndGlobalState() {
      const separation = state.A.pos.distanceTo(state.B.pos);
      const totalEnergy = computeTotalEnergy();
      const drift = Math.abs(totalEnergy - state.initialEnergy) / Math.max(Math.abs(state.initialEnergy), 1e-12) * 100;
      const angularMomentum = computeAngularMomentumZ();
      const bodiesValid = finiteVec3(state.A.pos) && finiteVec3(state.A.vel) &&
                          finiteVec3(state.B.pos) && finiteVec3(state.B.vel) &&
                          finiteVec3(state.P.pos) && finiteVec3(state.P.vel);

      hudMassA.textContent = state.massA.toFixed(0);
      hudMassB.textContent = state.massB.toFixed(0);
      hudSep.textContent = separation.toFixed(2);
      hudEnergy.textContent = totalEnergy.toFixed(2);
      hudDrift.textContent = drift.toFixed(4);
      hudPlanet.textContent = state.planetEnabled ? 'ON' : 'OFF';

      window.__3D_STATE__ = {
        massA: state.massA,
        massB: state.massB,
        separation: Number(separation.toFixed(3)),
        totalEnergy: Number(totalEnergy.toFixed(4)),
        energyDrift: Number(drift.toFixed(4)),
        angularMomentum: Number(angularMomentum.toFixed(3)),
        isPaused: state.paused,
        planetEnabled: state.planetEnabled,
        trailsEnabled: state.trailsEnabled,
        frameCount: state.frameCount,
        bodiesValid,
        orbitCount: state.orbitCount
      };
    }

    window.__3D_STATE__ = {};

    resetSimulation();

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        state.paused = !state.paused;
      } else if (e.key === 'r' || e.key === 'R') {
        resetSimulation();
      } else if (e.key === 'p' || e.key === 'P') {
        state.planetEnabled = !state.planetEnabled;
        if (!state.planetEnabled) {
          clearTrail(trailPlanet);
        } else {
          state.P.pos.set(25, 0, 0);
          state.P.vel.set(0, 0, 3);
          clearTrail(trailPlanet);
          pushTrail(trailPlanet, state.P.pos);
        }
      } else if (e.key === 't' || e.key === 'T') {
        state.trailsEnabled = !state.trailsEnabled;
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);

      if (!state.paused) {
        for (let i = 0; i < SUBSTEPS; i++) {
          rk4Step(DT);
        }

        updateOrbitCount();
        updateBodiesVisual();
        updateTrails();
      }

      controls.update();
      state.frameCount++;

      updateHUDAndGlobalState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
