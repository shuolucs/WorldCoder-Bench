<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nefertiti L-System Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 15, 25, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2d5a27;
            color: #e0e0e0;
            width: 250px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: none; /* Let clicks pass through panel background */
            backdrop-filter: blur(4px);
        }
        .ui-element {
            pointer-events: auto; /* Re-enable clicks for interactive elements */
        }
        h1 {
            margin: 0 0 15px 0;
            font-size: 18px;
            color: #fff;
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        button {
            width: 100%;
            background: #2d5a27;
            color: white;
            border: none;
            padding: 10px;
            margin: 6px 0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover {
            background: #3a7533;
            transform: translateY(-1px);
        }
        button:active {
            transform: translateY(1px);
        }
        #resetBtn {
            background: #8b3a3a;
        }
        #resetBtn:hover {
            background: #a54545;
        }
        #infoText {
            margin-top: 15px;
            font-size: 13px;
            line-height: 1.6;
            color: #a0a0b0;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 6px;
        }
        .controls-hint {
            margin-top: 15px;
            font-size: 11px;
            color: #777;
            text-align: center;
        }
        .key {
            display: inline-block;
            background: #333;
            color: #fff;
            padding: 2px 6px;
            border-radius: 3px;
            margin: 0 2px;
        }
    </style>
    <!-- Load Three.js and dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h1>Botanical Diorama</h1>
        <button id="growBtn" class="ui-element">Grow (Gen: 0)</button>
        <button id="resetBtn" class="ui-element">Reset</button>
        <button id="glowBtn" class="ui-element">Toggle Glow</button>
        
        <div id="infoText">
            Generation: 0<br>
            Angle: 25°<br>
            Plants: 5
        </div>

        <div class="controls-hint">
            <span class="key">R</span> Randomize Angle<br>
            <span class="key">C</span> Cycle Colors<br>
            Click Bust to Spin
        </div>
    </div>

    <script>
        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            nefertitiLoaded: false,
            globalGeneration: 0,
            plants: Array(5).fill(null).map((_, i) => ({
                generation: 0,
                maxGeneration: 4,
                position: {
                    x: Math.cos((i / 5) * Math.PI * 2) * 2.5,
                    y: 0,
                    z: Math.sin((i / 5) * Math.PI * 2) * 2.5
                },
                visible: true
            })),
            glowEnabled: false,
            lsystemAngle: 25,
            colorPresetIndex: 0,
            nefertitiSpinning: false,
            nefertitiSpinCount: 0,
            totalBranches: 0,
            sceneReady: false
        };

        const COLOR_PRESETS = [
            { name: 'Green', branch: 0x2d5a27, leaf: 0x4a7c3f },
            { name: 'Autumn', branch: 0x5c4033, leaf: 0xc4721a },
            { name: 'Cherry', branch: 0x4a3b32, leaf: 0xffb7c5 }
        ];

        // --- THREE.JS SETUP ---
        let scene, camera, renderer, controls;
        let nefertitiGroup, seedGroup;
        let branchMesh, leafMesh;
        let lastTime = 0;
        let spinProgress = 0;

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        init();
        animate(0);

        function init() {
            const container = document.getElementById('canvas-container');

            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 8, 25);

            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 5, 10);
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground
            controls.minDistance = 3;
            controls.maxDistance = 20;

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffeedd, 0.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 5);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 25;
            dirLight.shadow.camera.left = -6;
            dirLight.shadow.camera.right = 6;
            dirLight.shadow.camera.top = 6;
            dirLight.shadow.camera.bottom = -6;
            scene.add(dirLight);

            // Ground
            const groundGeo = new THREE.CircleGeometry(5, 64);
            const groundMat = new THREE.MeshStandardMaterial({ 
                color: 0x3d2b1f,
                roughness: 0.9,
                metalness: 0.1
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Decorative border for ground
            const borderGeo = new THREE.TorusGeometry(5, 0.1, 16, 64);
            const borderMat = new THREE.MeshStandardMaterial({ color: 0x2a1b12 });
            const border = new THREE.Mesh(borderGeo, borderMat);
            border.rotation.x = -Math.PI / 2;
            scene.add(border);

            // Load Nefertiti Centerpiece
            nefertitiGroup = new THREE.Group();
            scene.add(nefertitiGroup);
            
            const loader = new THREE.GLTFLoader();
            // Attempt to load external model, fallback to procedural if it fails
            loader.load(
                'Nefertiti.glb',
                (gltf) => {
                    setupModel(gltf.scene);
                },
                undefined,
                (error) => {
                    console.warn("Could not load Nefertiti.glb, using procedural fallback bust.");
                    createProceduralBust();
                }
            );

            // Initialize Seeds (Gen 0)
            createSeeds();

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', onKeyDown);
            renderer.domElement.addEventListener('click', onCanvasClick);
            
            document.getElementById('growBtn').addEventListener('click', () => {
                if (window.__3D_STATE__.globalGeneration < 4) {
                    window.__3D_STATE__.globalGeneration++;
                    buildPlants();
                    updateUI();
                }
            });

            document.getElementById('resetBtn').addEventListener('click', () => {
                window.__3D_STATE__.globalGeneration = 0;
                buildPlants();
                updateUI();
            });

            document.getElementById('glowBtn').addEventListener('click', () => {
                window.__3D_STATE__.glowEnabled = !window.__3D_STATE__.glowEnabled;
                buildPlants(); // Rebuild to apply material changes
                updateUI();
            });

            window.__3D_STATE__.sceneReady = true;
            updateUI();
        }

        function setupModel(model) {
            // Scale to roughly 2 units high
            const box = new THREE.Box3().setFromObject(model);
            const height = box.max.y - box.min.y;
            const scale = 2 / height;
            model.scale.setScalar(scale);
            
            // Center and place on ground
            box.setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            model.position.y += (box.max.y - box.min.y) / 2;
            
            // Apply materials to cast/receive shadows
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    if(child.material) {
                        child.material.roughness = 0.7;
                        child.material.metalness = 0.2;
                    }
                }
            });

            nefertitiGroup.add(model);
            window.__3D_STATE__.nefertitiLoaded = true;
        }

        function createProceduralBust() {
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0xd4af37, // Gold-ish
                roughness: 0.4,
                metalness: 0.6
            });

            // Base
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 0.4, 32), mat);
            base.position.y = 0.2;
            base.castShadow = true;
            base.receiveShadow = true;
            nefertitiGroup.add(base);

            // Neck
            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.25, 0.6, 32), mat);
            neck.position.y = 0.7;
            neck.castShadow = true;
            neck.receiveShadow = true;
            nefertitiGroup.add(neck);

            // Head
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 32, 32), mat);
            head.position.y = 1.1;
            head.scale.set(1, 1.2, 1.1);
            head.castShadow = true;
            head.receiveShadow = true;
            nefertitiGroup.add(head);

            // Crown/Hat
            const crownMat = new THREE.MeshStandardMaterial({ color: 0x1e3d59, roughness: 0.8 });
            const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.36, 0.8, 32), crownMat);
            crown.position.y = 1.6;
            crown.castShadow = true;
            crown.receiveShadow = true;
            nefertitiGroup.add(crown);

            window.__3D_STATE__.nefertitiLoaded = true;
        }

        function createSeeds() {
            seedGroup = new THREE.Group();
            const seedGeo = new THREE.SphereGeometry(0.08, 16, 16);
            const seedMat = new THREE.MeshStandardMaterial({ 
                color: COLOR_PRESETS[window.__3D_STATE__.colorPresetIndex].leaf,
                roughness: 0.6
            });

            window.__3D_STATE__.plants.forEach(plant => {
                const mesh = new THREE.Mesh(seedGeo, seedMat);
                mesh.position.set(plant.position.x, plant.position.y + 0.04, plant.position.z);
                mesh.castShadow = true;
                seedGroup.add(mesh);
            });
            scene.add(seedGroup);
        }

        // --- L-SYSTEM LOGIC ---

        function generateLSystemString(generation) {
            let str = 'F';
            for (let i = 0; i < generation; i++) {
                let nextStr = '';
                for (let char of str) {
                    if (char === 'F') {
                        nextStr += 'FF+[+F-F-F]-[-F+F+F]';
                    } else {
                        nextStr += char;
                    }
                }
                str = nextStr;
            }
            return str;
        }

        function countCharacters(str, charToCount) {
            let count = 0;
            for (let i = 0; i < str.length; i++) {
                if (str[i] === charToCount) count++;
            }
            return count;
        }

        function buildPlants() {
            // Cleanup old geometry
            if (branchMesh) {
                scene.remove(branchMesh);
                branchMesh.geometry.dispose();
                branchMesh.material.dispose();
                branchMesh = null;
            }
            if (leafMesh) {
                scene.remove(leafMesh);
                leafMesh.geometry.dispose();
                leafMesh.material.dispose();
                leafMesh = null;
            }

            const gen = window.__3D_STATE__.globalGeneration;
            
            // Update plant state array
            window.__3D_STATE__.plants.forEach(p => p.generation = gen);

            if (gen === 0) {
                seedGroup.visible = true;
                window.__3D_STATE__.totalBranches = 0;
                // Update seed colors if changed
                const seedColor = COLOR_PRESETS[window.__3D_STATE__.colorPresetIndex].leaf;
                seedGroup.children.forEach(c => {
                    c.material.color.setHex(seedColor);
                    if(window.__3D_STATE__.glowEnabled) {
                        c.material.emissive.setHex(seedColor);
                        c.material.emissiveIntensity = 0.5;
                    } else {
                        c.material.emissive.setHex(0x000000);
                    }
                });
                return;
            }

            seedGroup.visible = false;

            const lStr = generateLSystemString(gen);
            const numBranchesPerPlant = countCharacters(lStr, 'F');
            const totalBranches = numBranchesPerPlant * 5;
            window.__3D_STATE__.totalBranches = totalBranches;

            // Geometries
            // Cylinder origin at base
            const bGeo = new THREE.CylinderGeometry(0.03, 0.04, 1, 6);
            bGeo.translate(0, 0.5, 0); 
            
            // Sphere origin at base (to sit on top of branch)
            const lGeo = new THREE.SphereGeometry(0.06, 8, 8);
            lGeo.translate(0, 1.0, 0);

            // Materials
            const preset = COLOR_PRESETS[window.__3D_STATE__.colorPresetIndex];
            const bMat = new THREE.MeshStandardMaterial({ color: preset.branch, roughness: 0.8 });
            const lMat = new THREE.MeshStandardMaterial({ color: preset.leaf, roughness: 0.5 });

            if (window.__3D_STATE__.glowEnabled) {
                bMat.emissive.setHex(preset.branch);
                bMat.emissiveIntensity = 0.3;
                lMat.emissive.setHex(preset.leaf);
                lMat.emissiveIntensity = 0.8;
            }

            branchMesh = new THREE.InstancedMesh(bGeo, bMat, totalBranches);
            branchMesh.castShadow = true;
            branchMesh.receiveShadow = true;
            
            leafMesh = new THREE.InstancedMesh(lGeo, lMat, totalBranches);
            leafMesh.castShadow = true;

            const dummy = new THREE.Object3D();
            let instanceIdx = 0;
            const angleRad = window.__3D_STATE__.lsystemAngle * Math.PI / 180;

            // Scaling factors based on generation to keep overall size manageable
            const lengthScale = 0.8 * Math.pow(0.55, gen - 1);
            const thickScale = 1.0 * Math.pow(0.7, gen - 1);

            for (let p = 0; p < 5; p++) {
                const plantData = window.__3D_STATE__.plants[p];
                
                let pos = new THREE.Vector3(plantData.position.x, plantData.position.y, plantData.position.z);
                let rot = new THREE.Quaternion();
                
                // Tilt slightly outward from center
                const angleOffset = (p / 5) * Math.PI * 2;
                const outwardTilt = new THREE.Quaternion().setFromAxisAngle(
                    new THREE.Vector3(-Math.sin(angleOffset), 0, Math.cos(angleOffset)), 
                    0.2 // slight tilt rad
                );
                rot.multiply(outwardTilt);

                let stack = [];

                for (let i = 0; i < lStr.length; i++) {
                    const char = lStr[i];

                    if (char === 'F') {
                        dummy.position.copy(pos);
                        dummy.quaternion.copy(rot);
                        dummy.scale.set(thickScale, lengthScale, thickScale);
                        dummy.updateMatrix();

                        branchMesh.setMatrixAt(instanceIdx, dummy.matrix);
                        
                        // Add leaf/bud at the end of the segment. 
                        // Make terminal leaves slightly larger.
                        let isTerminal = true;
                        if(i + 1 < lStr.length && lStr[i+1] === 'F') isTerminal = false;
                        
                        if(isTerminal) {
                            dummy.scale.set(thickScale*1.5, lengthScale, thickScale*1.5);
                            dummy.updateMatrix();
                        }
                        leafMesh.setMatrixAt(instanceIdx, dummy.matrix);
                        
                        instanceIdx++;

                        // Move forward
                        const dir = new THREE.Vector3(0, 1, 0).applyQuaternion(rot);
                        pos.add(dir.multiplyScalar(lengthScale));

                    } else if (char === '+') {
                        // Yaw and Pitch to create 3D bushiness
                        const qZ = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1), -angleRad);
                        const qY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), angleRad * 1.3);
                        rot.multiply(qZ).multiply(qY);
                    } else if (char === '-') {
                        const qZ = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1), angleRad);
                        const qY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), -angleRad * 1.3);
                        rot.multiply(qZ).multiply(qY);
                    } else if (char === '[') {
                        stack.push({ p: pos.clone(), r: rot.clone() });
                    } else if (char === ']') {
                        const s = stack.pop();
                        pos.copy(s.p);
                        rot.copy(s.r);
                    }
                }
            }

            branchMesh.instanceMatrix.needsUpdate = true;
            leafMesh.instanceMatrix.needsUpdate = true;
            
            scene.add(branchMesh);
            scene.add(leafMesh);
        }

        // --- INTERACTION & UI ---

        function updateUI() {
            const state = window.__3D_STATE__;
            const growBtn = document.getElementById('growBtn');
            
            growBtn.innerText = `Grow (Gen: ${state.globalGeneration})`;
            if (state.globalGeneration >= 4) {
                growBtn.style.opacity = '0.5';
                growBtn.style.cursor = 'not-allowed';
            } else {
                growBtn.style.opacity = '1';
                growBtn.style.cursor = 'pointer';
            }

            const glowBtn = document.getElementById('glowBtn');
            glowBtn.style.background = state.glowEnabled ? '#4a7c3f' : '#2d5a27';

            const presetName = COLOR_PRESETS[state.colorPresetIndex].name;

            document.getElementById('infoText').innerHTML = `
                Generation: <strong style="color:#fff">${state.globalGeneration} / 4</strong><br>
                Angle: <strong style="color:#fff">${state.lsystemAngle}°</strong><br>
                Color: <strong style="color:#fff">${presetName}</strong><br>
                Total Branches: <strong style="color:#fff">${state.totalBranches.toLocaleString()}</strong><br>
                Spins: <strong style="color:#fff">${state.nefertitiSpinCount}</strong>
            `;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onKeyDown(event) {
            const key = event.key.toLowerCase();
            if (key === 'r') {
                // Randomize angle between 15 and 35
                window.__3D_STATE__.lsystemAngle = Math.floor(Math.random() * 21) + 15;
                if(window.__3D_STATE__.globalGeneration > 0) buildPlants();
                updateUI();
            } else if (key === 'c') {
                // Cycle colors
                window.__3D_STATE__.colorPresetIndex = (window.__3D_STATE__.colorPresetIndex + 1) % COLOR_PRESETS.length;
                buildPlants();
                updateUI();
            }
        }

        function onCanvasClick(event) {
            // Calculate mouse position in normalized device coordinates (-1 to +1)
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Check intersection with Nefertiti group
            const intersects = raycaster.intersectObject(nefertitiGroup, true);

            if (intersects.length > 0 && !window.__3D_STATE__.nefertitiSpinning) {
                window.__3D_STATE__.nefertitiSpinning = true;
                spinProgress = 0;
            }
        }

        // --- ANIMATION LOOP ---

        function animate(time) {
            requestAnimationFrame(animate);

            const dt = (time - lastTime) / 1000;
            lastTime = time;

            controls.update();

            // Handle Nefertiti Spin Animation
            if (window.__3D_STATE__.nefertitiSpinning) {
                spinProgress += dt;
                const duration = 3.0; // 3 seconds per spin
                
                if (spinProgress >= duration) {
                    nefertitiGroup.rotation.y = 0;
                    window.__3D_STATE__.nefertitiSpinning = false;
                    window.__3D_STATE__.nefertitiSpinCount++;
                    updateUI();
                } else {
                    // Smooth ease-in-out rotation
                    const t = spinProgress / duration;
                    const easeT = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                    nefertitiGroup.rotation.y = easeT * Math.PI * 2;
                }
            }

            // Subtle floating animation for seeds if gen 0
            if (window.__3D_STATE__.globalGeneration === 0 && seedGroup) {
                seedGroup.children.forEach((seed, i) => {
                    seed.position.y = 0.04 + Math.sin(time * 0.002 + i) * 0.02;
                });
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
