<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L-System Plant Diorama</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }
  
  #uiPanel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.7);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    z-index: 10;
  }
  
  #uiPanel button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #2d5a27;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  
  #uiPanel button:hover {
    background: #3a7a32;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(45, 90, 39, 0.4);
  }
  
  #uiPanel button:active {
    transform: translateY(0);
  }
  
  #infoText {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.7);
    color: #ddd;
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 14px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    white-space: nowrap;
    z-index: 10;
  }
  
  #helpText {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    z-index: 10;
    white-space: nowrap;
  }
  
  #loadingOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26, 26, 46, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 18px;
    z-index: 100;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>

<div id="uiPanel">
  <button id="growBtn">🌱 Grow (Gen: 0)</button>
  <button id="resetBtn">🔄 Reset</button>
  <button id="glowBtn">✨ Toggle Glow</button>
</div>

<div id="infoText">Generation: 0 | Angle: 25° | Plants: 5</div>
<div id="helpText">Press R: Random Angle | C: Cycle Colors | Click Bust to Spin</div>
<div id="loadingOverlay">Loading Diorama...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State management
window.__3D_STATE__ = {
  nefertitiLoaded: false,
  globalGeneration: 0,
  plants: [],
  glowEnabled: false,
  lsystemAngle: 25,
  colorPresetIndex: 0,
  nefertitiSpinning: false,
  nefertitiSpinCount: 0,
  totalBranches: 0,
  sceneReady: false
};

const STATE = window.__3D_STATE__;

const colorPresets = [
  { branch: 0x2d5a27, leaf: 0x4a7c3f, name: 'Green' },
  { branch: 0xc4721a, leaf: 0xe8943a, name: 'Autumn' },
  { branch: 0xffb7c5, leaf: 0xff8fa3, name: 'Cherry Blossom' }
];

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 8, 25);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1.5, 0);
controls.maxPolarAngle = Math.PI / 2 + 0.2;
controls.minDistance = 3;
controls.maxDistance = 20;

// Lights
const ambientLight = new THREE.AmbientLight(0xffeedd, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -8;
dirLight.shadow.camera.right = 8;
dirLight.shadow.camera.top = 8;
dirLight.shadow.camera.bottom = -8;
scene.add(dirLight);

// Additional fill light
const fillLight = new THREE.DirectionalLight(0x8888ff, 0.2);
fillLight.position.set(-5, 3, -5);
scene.add(fillLight);

// Point light near plants for warmth
const pointLight = new THREE.PointLight(0xffaa44, 0.3, 10);
pointLight.position.set(0, 3, 0);
scene.add(pointLight);

// Ground plane
const groundGeom = new THREE.CircleGeometry(5, 64);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x3d2b1f,
  roughness: 0.9,
  metalness: 0.0
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Add some ground detail - small ring around center
const ringGeom = new THREE.RingGeometry(1.8, 2.0, 64);
const ringMat = new THREE.MeshStandardMaterial({ color: 0x5a3d2b, roughness: 0.8, side: THREE.DoubleSide });
const ring = new THREE.Mesh(ringGeom, ringMat);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.01;
scene.add(ring);

// Decorative stones around the base
for (let i = 0; i < 20; i++) {
  const angle = (i / 20) * Math.PI * 2;
  const r = 3.5 + Math.random() * 1.0;
  const stoneGeom = new THREE.SphereGeometry(0.05 + Math.random() * 0.08, 6, 4);
  const stoneMat = new THREE.MeshStandardMaterial({ color: 0x666655, roughness: 1.0 });
  const stone = new THREE.Mesh(stoneGeom, stoneMat);
  stone.position.set(Math.cos(angle) * r, 0.02, Math.sin(angle) * r);
  stone.scale.y = 0.5;
  scene.add(stone);
}

// Nefertiti bust placeholder (geometric approximation)
let nefertitiGroup = new THREE.Group();
let nefertitiModel = null;

function createPlaceholderBust() {
  const group = new THREE.Group();
  
  // Base/pedestal
  const baseGeom = new THREE.CylinderGeometry(0.5, 0.6, 0.3, 16);
  const baseMat = new THREE.MeshStandardMaterial({ color: 0xd4a574, roughness: 0.4, metalness: 0.1 });
  const base = new THREE.Mesh(baseGeom, baseMat);
  base.position.y = 0.15;
  base.castShadow = true;
  group.add(base);
  
  // Neck
  const neckGeom = new THREE.CylinderGeometry(0.25, 0.35, 0.5, 12);
  const skinMat = new THREE.MeshStandardMaterial({ color: 0xd4a574, roughness: 0.5, metalness: 0.05 });
  const neck = new THREE.Mesh(neckGeom, skinMat);
  neck.position.y = 0.55;
  neck.castShadow = true;
  group.add(neck);
  
  // Head
  const headGeom = new THREE.SphereGeometry(0.35, 16, 12);
  const head = new THREE.Mesh(headGeom, skinMat);
  head.position.y = 1.05;
  head.scale.set(0.85, 1.1, 0.9);
  head.castShadow = true;
  group.add(head);
  
  // Crown (Nefertiti's iconic tall crown)
  const crownGeom = new THREE.CylinderGeometry(0.15, 0.32, 0.7, 12);
  const crownMat = new THREE.MeshStandardMaterial({ color: 0x1a3a6a, roughness: 0.3, metalness: 0.3 });
  const crown = new THREE.Mesh(crownGeom, crownMat);
  crown.position.y = 1.65;
  crown.castShadow = true;
  group.add(crown);
  
  // Crown band
  const bandGeom = new THREE.TorusGeometry(0.33, 0.03, 8, 24);
  const goldMat = new THREE.MeshStandardMaterial({ color: 0xffd700, roughness: 0.2, metalness: 0.8 });
  const band = new THREE.Mesh(bandGeom, goldMat);
  band.position.y = 1.3;
  band.rotation.x = Math.PI / 2;
  group.add(band);
  
  // Cobra ornament on crown
  const cobraGeom = new THREE.ConeGeometry(0.05, 0.2, 6);
  const cobra = new THREE.Mesh(cobraGeom, goldMat);
  cobra.position.set(0, 1.35, 0.33);
  group.add(cobra);
  
  // Eyes (simple)
  const eyeGeom = new THREE.SphereGeometry(0.04, 8, 8);
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0x2a1a0a });
  const leftEye = new THREE.Mesh(eyeGeom, eyeMat);
  leftEye.position.set(-0.1, 1.1, 0.3);
  group.add(leftEye);
  const rightEye = new THREE.Mesh(eyeGeom, eyeMat);
  rightEye.position.set(0.1, 1.1, 0.3);
  group.add(rightEye);
  
  // Nose
  const noseGeom = new THREE.ConeGeometry(0.03, 0.1, 4);
  const nose = new THREE.Mesh(noseGeom, skinMat);
  nose.position.set(0, 1.02, 0.33);
  nose.rotation.x = -Math.PI / 6;
  group.add(nose);
  
  // Necklace
  const necklaceGeom = new THREE.TorusGeometry(0.35, 0.02, 8, 24);
  const necklace = new THREE.Mesh(necklaceGeom, goldMat);
  necklace.position.y = 0.4;
  necklace.rotation.x = Math.PI / 2;
  group.add(necklace);
  
  return group;
}

// Try loading GLTF, fall back to placeholder
const loader = new GLTFLoader();
function loadNefertiti() {
  loader.load(
    'Nefertiti.glb',
    (gltf) => {
      nefertitiModel = gltf.scene;
      const box = new THREE.Box3().setFromObject(nefertitiModel);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 2.0 / maxDim;
      nefertitiModel.scale.setScalar(scale);
      
      const newBox = new THREE.Box3().setFromObject(nefertitiModel);
      const center = newBox.getCenter(new THREE.Vector3());
      nefertitiModel.position.sub(center);
      nefertitiModel.position.y -= newBox.min.y;
      
      nefertitiModel.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
      
      nefertitiGroup.add(nefertitiModel);
      STATE.nefertitiLoaded = true;
      console.log('Nefertiti model loaded');
    },
    undefined,
    (error) => {
      console.log('Could not load Nefertiti.glb, using placeholder bust');
      const placeholder = createPlaceholderBust();
      nefertitiGroup.add(placeholder);
      STATE.nefertitiLoaded = true;
    }
  );
}

nefertitiGroup.position.set(0, 0, 0);
scene.add(nefertitiGroup);
loadNefertiti();

// L-System implementation
function generateLSystem(axiom, rules, iterations) {
  let current = axiom;
  for (let i = 0; i < iterations; i++) {
    let next = '';
    for (const char of current) {
      next += rules[char] || char;
    }
    current = next;
  }
  return current;
}

function interpretLSystem(lstring, angle, segmentLength, basePosition, generation) {
  const group = new THREE.Group();
  const stack = [];
  let pos = new THREE.Vector3(0, 0, 0);
  let dir = new THREE.Vector3(0, 1, 0);
  let right = new THREE.Vector3(1, 0, 0);
  
  const angleRad = THREE.MathUtils.degToRad(angle);
  let branchCount = 0;
  
  const preset = colorPresets[STATE.colorPresetIndex];
  
  const branchMat = new THREE.MeshStandardMaterial({
    color: preset.branch,
    roughness: 0.7,
    metalness: 0.0,
    emissive: STATE.glowEnabled ? new THREE.Color(preset.branch).multiplyScalar(0.3) : new THREE.Color(0x000000),
    emissiveIntensity: STATE.glowEnabled ? 0.5 : 0
  });
  
  const leafMat = new THREE.MeshStandardMaterial({
    color: preset.leaf,
    roughness: 0.5,
    metalness: 0.0,
    emissive: STATE.glowEnabled ? new THREE.Color(preset.leaf).multiplyScalar(0.4) : new THREE.Color(0x000000),
    emissiveIntensity: STATE.glowEnabled ? 0.8 : 0
  });
  
  // Thickness decreases with depth
  let depth = 0;
  
  const branchGeomCache = {};
  function getBranchGeom(thickness) {
    const key = thickness.toFixed(3);
    if (!branchGeomCache[key]) {
      branchGeomCache[key] = new THREE.CylinderGeometry(thickness * 0.5, thickness, segmentLength, 5, 1);
    }
    return branchGeomCache[key];
  }
  
  const leafGeom = new THREE.SphereGeometry(segmentLength * 0.3, 6, 4);
  
  for (const char of lstring) {
    switch (char) {
      case 'F': {
        const thickness = Math.max(0.01, 0.04 * Math.pow(0.7, depth));
        const geom = getBranchGeom(thickness);
        const branch = new THREE.Mesh(geom, branchMat);
        
        const midPoint = pos.clone().add(dir.clone().multiplyScalar(segmentLength * 0.5));
        branch.position.copy(midPoint);
        
        const quaternion = new THREE.Quaternion();
        quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
        branch.quaternion.copy(quaternion);
        
        branch.castShadow = true;
        group.add(branch);
        
        pos.add(dir.clone().multiplyScalar(segmentLength));
        branchCount++;
        break;
      }
      case '+': {
        const axis = right.clone().normalize();
        dir.applyAxisAngle(axis, angleRad);
        break;
      }
      case '-': {
        const axis = right.clone().normalize();
        dir.applyAxisAngle(axis, -angleRad);
        break;
      }
      case '[': {
        stack.push({
          pos: pos.clone(),
          dir: dir.clone(),
          right: right.clone(),
          depth: depth
        });
        depth++;
        break;
      }
      case ']': {
        const state = stack.pop();
        if (state) {
          // Add leaf at branch tip before popping
          if (generation >= 2) {
            const leaf = new THREE.Mesh(leafGeom, leafMat);
            leaf.position.copy(pos);
            leaf.scale.setScalar(0.8 + Math.random() * 0.4);
            group.add(leaf);
          }
          pos = state.pos;
          dir = state.dir;
          right = state.right;
          depth = state.depth;
        }
        break;
      }
    }
  }
  
  // Add a leaf at the very tip
  if (generation >= 1) {
    const tipLeaf = new THREE.Mesh(leafGeom, leafMat);
    tipLeaf.position.copy(pos);
    group.add(tipLeaf);
  }
  
  group.position.copy(basePosition);
  
  // Add slight random rotation for variety
  group.rotation.y = Math.random() * Math.PI * 2;
  
  return { group, branchCount };
}

// Plant management
const plantGroups = [];
const plantPositions = [];
const seedDots = [];

// Calculate plant positions in a circle
for (let i = 0; i < 5; i++) {
  const angle = (i / 5) * Math.PI * 2;
  const x = Math.cos(angle) * 2.5;
  const z = Math.sin(angle) * 2.5;
  plantPositions.push(new THREE.Vector3(x, 0, z));
  
  STATE.plants.push({
    generation: 0,
    maxGeneration: 4,
    position: { x, y: 0, z },
    visible: true
  });
}

// Create seed dots
const seedGeom = new THREE.SphereGeometry(0.08, 8, 8);
const seedMat = new THREE.MeshStandardMaterial({ color: 0x5a3d1a, roughness: 0.8 });

plantPositions.forEach((pos, i) => {
  const seed = new THREE.Mesh(seedGeom, seedMat);
  seed.position.copy(pos);
  seed.position.y = 0.05;
  scene.add(seed);
  seedDots.push(seed);
});

function clearPlants() {
  plantGroups.forEach(g => {
    scene.remove(g);
    g.traverse((child) => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) {
        if (Array.isArray(child.material)) {
          child.material.forEach(m => m.dispose());
        } else {
          child.material.dispose();
        }
      }
    });
  });
  plantGroups.length = 0;
  STATE.totalBranches = 0;
}

function regeneratePlants() {
  clearPlants();
  
  const gen = STATE.globalGeneration;
  
  if (gen === 0) {
    seedDots.forEach(s => s.visible = true);
    STATE.totalBranches = 0;
    updateInfo();
    return;
  }
  
  seedDots.forEach(s => s.visible = false);
  
  const axiom = 'F';
  const rules = { 'F': 'FF+[+F-F-F]-[-F+F+F]' };
  
  let totalBranches = 0;
  
  plantPositions.forEach((pos, i) => {
    const lstring = generateLSystem(axiom, rules, gen);
    const segmentLength = 0.15 * Math.pow(0.75, gen - 1);
    
    const { group, branchCount } = interpretLSystem(
      lstring,
      STATE.lsystemAngle,
      segmentLength,
      pos,
      gen
    );
    
    scene.add(group);
    plantGroups.push(group);
    totalBranches += branchCount;
    
    STATE.plants[i].generation = gen;
  });
  
  STATE.totalBranches = totalBranches;
  updateInfo();
}

// UI Updates
function updateInfo() {
  const infoText = document.getElementById('infoText');
  const visiblePlants = STATE.plants.filter(p => p.visible).length;
  infoText.textContent = `Generation: ${STATE.globalGeneration} | Angle: ${STATE.lsystemAngle}° | Plants: ${visiblePlants} | Branches: ${STATE.totalBranches}`;
}

function updateGrowBtn() {
  document.getElementById('growBtn').textContent = `🌱 Grow (Gen: ${STATE.globalGeneration})`;
}

// Button handlers
document.getElementById('growBtn').addEventListener('click', () => {
  if (STATE.globalGeneration < 4) {
    STATE.globalGeneration++;
    updateGrowBtn();
    regeneratePlants();
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  STATE.globalGeneration = 0;
  updateGrowBtn();
  regeneratePlants();
});

document.getElementById('glowBtn').addEventListener('click', () => {
  STATE.glowEnabled = !STATE.glowEnabled;
  document.getElementById('glowBtn').textContent = STATE.glowEnabled ? '✨ Glow: ON' : '✨ Toggle Glow';
  
  // Update existing plant materials
  plantGroups.forEach(group => {
    group.traverse((child) => {
      if (child.isMesh && child.material) {
        const preset = colorPresets[STATE.colorPresetIndex];
        if (STATE.glowEnabled) {
          child.material.emissive = new THREE.Color(child.material.color).multiplyScalar(0.3);
          child.material.emissiveIntensity = 0.6;
        } else {
          child.material.emissive = new THREE.Color(0x000000);
          child.material.emissiveIntensity = 0;
        }
        child.material.needsUpdate = true;
      }
    });
  });
  
  // Also affect point light
  pointLight.intensity = STATE.glowEnabled ? 0.8 : 0.3;
  pointLight.color.set(STATE.glowEnabled ? 0x88ff88 : 0xffaa44);
});

// Keyboard handlers
document.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') {
    STATE.lsystemAngle = 15 + Math.floor(Math.random() * 21); // 15-35
    regeneratePlants();
  }
  
  if (e.key === 'c' || e.key === 'C') {
    STATE.colorPresetIndex = (STATE.colorPresetIndex + 1) % 3;
    regeneratePlants();
  }
});

// Click on Nefertiti to spin
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  if (STATE.nefertitiSpinning) return;
  
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nefertitiGroup.children, true);
  
  if (intersects.length > 0) {
    STATE.nefertitiSpinning = true;
    spinStartTime = performance.now();
    spinStartRotation = nefertitiGroup.rotation.y;
  }
});

let spinStartTime = 0;
let spinStartRotation = 0;

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const delta = clock.getDelta();
  const time = clock.getElapsedTime();
  
  controls.update();
  
  // Nefertiti spin animation
  if (STATE.nefertitiSpinning) {
    const elapsed = (performance.now() - spinStartTime) / 1000;
    const duration = 3.0;
    
    if (elapsed >= duration) {
      nefertitiGroup.rotation.y = spinStartRotation + Math.PI * 2;
      STATE.nefertitiSpinning = false;
      STATE.nefertitiSpinCount++;
    } else {
      const t = elapsed / duration;
      // Ease in-out
      const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      nefertitiGroup.rotation.y = spinStartRotation + eased * Math.PI * 2;
    }
  }
  
  // Subtle plant sway
  plantGroups.forEach((group, i) => {
    if (group) {
      group.rotation.z = Math.sin(time * 0.5 + i * 1.2) * 0.02;
      group.rotation.x = Math.cos(time * 0.3 + i * 0.8) * 0.01;
    }
  });
  
  // Seed dot pulse
  seedDots.forEach((seed, i) => {
    if (seed.visible) {
      const scale = 1 + Math.sin(time * 2 + i) * 0.2;
      seed.scale.setScalar(scale);
    }
  });
  
  // Glow pulsing
  if (STATE.glowEnabled) {
    const glowPulse = 0.4 + Math.sin(time * 1.5) * 0.2;
    plantGroups.forEach(group => {
      group.traverse((child) => {
        if (child.isMesh && child.material && child.material.emissiveIntensity > 0) {
          child.material.emissiveIntensity = glowPulse;
        }
      });
    });
  }
  
  renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize
function init() {
  updateInfo();
  updateGrowBtn();
  
  // Hide loading after a short delay
  setTimeout(() => {
    const overlay = document.getElementById('loadingOverlay');
    overlay.style.opacity = '0';
    setTimeout(() => overlay.style.display = 'none', 500);
  }, 1000);
  
  STATE.sceneReady = true;
  animate();
}

init();
</script>
</body>
</html>
