<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nefertiti L-System Plant Diorama</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    #uiPanel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      background: rgba(10, 16, 20, 0.72);
      border: 1px solid rgba(120, 200, 140, 0.25);
      border-radius: 14px;
      padding: 12px;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    #uiPanel button {
      display: block;
      width: 160px;
      margin: 6px 0;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(180deg, #3f8f58, #2c6a40);
      color: #f2fff0;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    #uiPanel button:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    #uiPanel button:active {
      transform: translateY(0);
      filter: brightness(0.96);
    }

    #infoText {
      position: absolute;
      left: 16px;
      top: 180px;
      z-index: 10;
      color: #e8f7e8;
      background: rgba(10, 16, 20, 0.65);
      border: 1px solid rgba(120, 200, 140, 0.2);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
      user-select: none;
    }

    #hintText {
      position: absolute;
      right: 16px;
      bottom: 16px;
      z-index: 10;
      color: rgba(255,255,255,0.8);
      background: rgba(10, 16, 20, 0.5);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="uiPanel">
    <button id="growBtn">Grow (Gen: 0)</button>
    <button id="resetBtn">Reset</button>
    <button id="glowBtn">Toggle Glow</button>
  </div>

  <div id="infoText">Generation: 0 | Angle: 25° | Plants: 5</div>
  <div id="hintText">Keys: R = randomize angle, C = cycle color, Click bust = spin</div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    window.__3D_STATE__ = {
      nefertitiLoaded: false,
      globalGeneration: 0,
      plants: [],
      glowEnabled: false,
      lsystemAngle: 25,
      colorPresetIndex: 0,
      nefertitiSpinning: false,
      nefertitiSpinCount: 0,
      totalBranches: 0,
      sceneReady: false
    };

    const COLOR_PRESETS = [
      { branch: 0x2d5a27, leaf: 0x4a7c3f },
      { branch: 0xc4721a, leaf: 0xe0a14a },
      { branch: 0xffb7c5, leaf: 0xffd7e2 }
    ];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 8, 25);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.5, 0);

    const ambientLight = new THREE.AmbientLight(0xffeedd, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const hemiLight = new THREE.HemisphereLight(0x445577, 0x22180f, 0.35);
    scene.add(hemiLight);

    // Ground
    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(5, 64),
      new THREE.MeshStandardMaterial({
        color: 0x3d2b1f,
        roughness: 1.0,
        metalness: 0.0
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    // Decorative soil ring shading
    const groundRing = new THREE.Mesh(
      new THREE.RingGeometry(4.2, 5.0, 64),
      new THREE.MeshBasicMaterial({
        color: 0x2a1c12,
        transparent: true,
        opacity: 0.18,
        side: THREE.DoubleSide
      })
    );
    groundRing.rotation.x = -Math.PI / 2;
    groundRing.position.y = 0.005;
    scene.add(groundRing);

    // Simple sky gradient backdrop effect via large sphere
    const skyGeo = new THREE.SphereGeometry(40, 32, 16);
    const skyMat = new THREE.ShaderMaterial({
      side: THREE.BackSide,
      uniforms: {
        topColor: { value: new THREE.Color(0x232347) },
        bottomColor: { value: new THREE.Color(0x090910) }
      },
      vertexShader: `
        varying vec3 vWorldPosition;
        void main() {
          vec4 worldPosition = modelMatrix * vec4(position, 1.0);
          vWorldPosition = worldPosition.xyz;
          gl_Position = projectionMatrix * viewMatrix * worldPosition;
        }
      `,
      fragmentShader: `
        uniform vec3 topColor;
        uniform vec3 bottomColor;
        varying vec3 vWorldPosition;
        void main() {
          float h = normalize(vWorldPosition).y * 0.5 + 0.5;
          vec3 color = mix(bottomColor, topColor, smoothstep(0.0, 1.0, h));
          gl_FragColor = vec4(color, 1.0);
        }
      `
    });
    const sky = new THREE.Mesh(skyGeo, skyMat);
    scene.add(sky);

    const plantRoot = new THREE.Group();
    scene.add(plantRoot);

    let nefertiti = null;
    let nefertitiRoot = new THREE.Group();
    scene.add(nefertitiRoot);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    const clock = new THREE.Clock();
    let spinAnimation = null;

    function updateInfoText() {
      const visiblePlants = window.__3D_STATE__.plants.filter(p => p.visible).length;
      document.getElementById("infoText").textContent =
        `Generation: ${window.__3D_STATE__.globalGeneration} | Angle: ${Math.round(window.__3D_STATE__.lsystemAngle)}° | Plants: ${visiblePlants}`;
      document.getElementById("growBtn").textContent = `Grow (Gen: ${window.__3D_STATE__.globalGeneration})`;
      document.getElementById("glowBtn").textContent = `Toggle Glow${window.__3D_STATE__.glowEnabled ? " (On)" : " (Off)"}`;
    }

    function getCurrentColors() {
      return COLOR_PRESETS[window.__3D_STATE__.colorPresetIndex];
    }

    function makeSeedDot(position) {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.07, 12, 12),
        new THREE.MeshStandardMaterial({
          color: 0x8b6b3f,
          roughness: 1.0,
          metalness: 0.0
        })
      );
      mesh.position.copy(position);
      mesh.position.y = 0.03;
      return mesh;
    }

    function createPlantPoints() {
      window.__3D_STATE__.plants = [];
      for (let i = 0; i < 5; i++) {
        const angle = (i / 5) * Math.PI * 2;
        const pos = new THREE.Vector3(
          Math.cos(angle) * 2.5,
          0,
          Math.sin(angle) * 2.5
        );

        const plantObj = {
          generation: 0,
          maxGeneration: 4,
          position: { x: pos.x, y: pos.y, z: pos.z },
          visible: true,
          group: new THREE.Group()
        };

        plantObj.group.position.set(pos.x, pos.y, pos.z);
        plantRoot.add(plantObj.group);
        window.__3D_STATE__.plants.push(plantObj);
      }
    }

    function clearPlantGeometry(group) {
      while (group.children.length > 0) {
        const child = group.children.pop();
        disposeHierarchy(child);
      }
    }

    function disposeHierarchy(obj) {
      obj.traverse?.((c) => {
        if (c.geometry) c.geometry.dispose();
        if (c.material) {
          if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
          else c.material.dispose();
        }
      });
      if (obj.parent) obj.parent.remove(obj);
    }

    function generateLSystem(iterations) {
      let current = "F";
      const rule = { "F": "FF+[+F-F-F]-[-F+F+F]" };
      for (let i = 0; i < iterations; i++) {
        let next = "";
        for (const ch of current) {
          next += rule[ch] || ch;
        }
        current = next;
      }
      return current;
    }

    function buildPlant(plant, generation) {
      clearPlantGeometry(plant.group);

      const seed = makeSeedDot(new THREE.Vector3(0, 0, 0));
      plant.group.add(seed);

      if (generation === 0) return;

      const colors = getCurrentColors();
      const glow = window.__3D_STATE__.glowEnabled;

      const branchMaterial = new THREE.MeshStandardMaterial({
        color: colors.branch,
        roughness: 0.85,
        metalness: 0.05,
        emissive: glow ? new THREE.Color(colors.branch).multiplyScalar(0.25) : new THREE.Color(0x000000),
        emissiveIntensity: glow ? 1.2 : 0.0
      });

      const leafMaterial = new THREE.MeshStandardMaterial({
        color: colors.leaf,
        roughness: 0.7,
        metalness: 0.0,
        emissive: glow ? new THREE.Color(colors.leaf).multiplyScalar(0.35) : new THREE.Color(0x000000),
        emissiveIntensity: glow ? 1.5 : 0.0
      });

      const string = generateLSystem(generation);
      const angle = THREE.MathUtils.degToRad(window.__3D_STATE__.lsystemAngle);
      const stack = [];

      let pos = new THREE.Vector3(0, 0.06, 0);
      let quat = new THREE.Quaternion();
      let branchCount = 0;

      const segmentLength = 0.22 - generation * 0.01;
      const baseRadius = Math.max(0.028 - generation * 0.002, 0.012);

      for (let i = 0; i < string.length; i++) {
        const ch = string[i];

        if (ch === "F") {
          const dir = new THREE.Vector3(0, 1, 0).applyQuaternion(quat).normalize();
          const nextPos = pos.clone().add(dir.clone().multiplyScalar(segmentLength));

          const center = pos.clone().add(nextPos).multiplyScalar(0.5);
          const geometry = new THREE.CylinderGeometry(baseRadius * 0.75, baseRadius, segmentLength, 6);
          const mesh = new THREE.Mesh(geometry, branchMaterial);

          mesh.position.copy(center);
          mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
          plant.group.add(mesh);

          const isTip =
            i === string.length - 1 ||
            (string[i + 1] !== "F" && string[i + 1] !== "+" && string[i + 1] !== "-");

          if (isTip) {
            const bud = new THREE.Mesh(
              new THREE.SphereGeometry(0.05, 8, 8),
              leafMaterial
            );
            bud.position.copy(nextPos);
            plant.group.add(bud);
          }

          pos.copy(nextPos);
          branchCount++;
        } else if (ch === "+") {
          const q = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), -angle);
          quat.multiply(q);
        } else if (ch === "-") {
          const q = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), angle);
          quat.multiply(q);
        } else if (ch === "[") {
          stack.push({
            pos: pos.clone(),
            quat: quat.clone()
          });
        } else if (ch === "]") {
          const state = stack.pop();
          if (state) {
            pos.copy(state.pos);
            quat.copy(state.quat);
          }
        }
      }

      plant._branchCount = branchCount;
    }

    function regeneratePlants() {
      let totalBranches = 0;
      for (const plant of window.__3D_STATE__.plants) {
        plant.generation = window.__3D_STATE__.globalGeneration;
        plant.visible = true;
        buildPlant(plant, plant.generation);
        totalBranches += plant._branchCount || 0;
      }
      window.__3D_STATE__.totalBranches = totalBranches;
      updateInfoText();
    }

    function resetPlants() {
      window.__3D_STATE__.globalGeneration = 0;
      for (const plant of window.__3D_STATE__.plants) {
        plant.generation = 0;
        plant.visible = true;
        buildPlant(plant, 0);
      }
      window.__3D_STATE__.totalBranches = 0;
      updateInfoText();
    }

    function toggleGlow() {
      window.__3D_STATE__.glowEnabled = !window.__3D_STATE__.glowEnabled;
      regeneratePlants();
    }

    function randomizeAngle() {
      window.__3D_STATE__.lsystemAngle = +(15 + Math.random() * 20).toFixed(1);
      regeneratePlants();
    }

    function cycleColorPreset() {
      window.__3D_STATE__.colorPresetIndex = (window.__3D_STATE__.colorPresetIndex + 1) % 3;
      regeneratePlants();
    }

    function normalizeAndPlaceNefertiti(model) {
      const box = new THREE.Box3().setFromObject(model);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const targetHeight = 2.0;
      const scale = size.y > 0 ? targetHeight / size.y : 1.0;
      model.scale.setScalar(scale);

      const scaledBox = new THREE.Box3().setFromObject(model);
      const scaledCenter = new THREE.Vector3();
      const scaledSize = new THREE.Vector3();
      scaledBox.getCenter(scaledCenter);
      scaledBox.getSize(scaledSize);

      model.position.x -= scaledCenter.x;
      model.position.y -= scaledBox.min.y;
      model.position.z -= scaledCenter.z;

      nefertitiRoot.add(model);
    }

    function createFallbackBust() {
      const group = new THREE.Group();

      const mat = new THREE.MeshStandardMaterial({
        color: 0xc8b28a,
        roughness: 0.85,
        metalness: 0.1
      });

      const base = new THREE.Mesh(new THREE.CylinderGeometry(0.65, 0.85, 0.5, 24), mat);
      base.position.y = 0.25;
      group.add(base);

      const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 0.25, 16), mat);
      neck.position.y = 0.65;
      group.add(neck);

      const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 24, 24), mat);
      head.scale.set(0.9, 1.1, 0.95);
      head.position.y = 1.15;
      group.add(head);

      const crown = new THREE.Mesh(
        new THREE.CylinderGeometry(0.38, 0.52, 0.9, 20),
        new THREE.MeshStandardMaterial({ color: 0x2c5a8a, roughness: 0.7, metalness: 0.15 })
      );
      crown.position.y = 1.75;
      group.add(crown);

      const shoulder = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.7, 0.35, 24), mat);
      shoulder.position.y = 0.48;
      group.add(shoulder);

      nefertiti = group;
      nefertitiRoot.add(group);
      window.__3D_STATE__.nefertitiLoaded = true;
    }

    function loadNefertiti() {
      const loader = new GLTFLoader();
      loader.load(
        "Nefertiti.glb",
        (gltf) => {
          nefertiti = gltf.scene;
          normalizeAndPlaceNefertiti(nefertiti);
          window.__3D_STATE__.nefertitiLoaded = true;
        },
        undefined,
        () => {
          console.warn("Could not load Nefertiti.glb, using fallback bust.");
          createFallbackBust();
        }
      );
    }

    function spinNefertiti() {
      if (!nefertitiRoot || window.__3D_STATE__.nefertitiSpinning) return;

      window.__3D_STATE__.nefertitiSpinning = true;
      const startRot = nefertitiRoot.rotation.y;
      spinAnimation = {
        start: performance.now(),
        duration: 3000,
        from: startRot,
        to: startRot + Math.PI * 2
      };
    }

    function onPointerDown(event) {
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);

      if (nefertitiRoot) {
        const intersects = raycaster.intersectObject(nefertitiRoot, true);
        if (intersects.length > 0) {
          spinNefertiti();
        }
      }
    }

    document.getElementById("growBtn").addEventListener("click", () => {
      window.__3D_STATE__.globalGeneration = Math.min(window.__3D_STATE__.globalGeneration + 1, 4);
      regeneratePlants();
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      resetPlants();
    });

    document.getElementById("glowBtn").addEventListener("click", () => {
      toggleGlow();
    });

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (key === "r") {
        randomizeAngle();
      } else if (key === "c") {
        cycleColorPreset();
      }
    });

    window.addEventListener("pointerdown", onPointerDown);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    createPlantPoints();
    resetPlants();
    loadNefertiti();

    window.__3D_STATE__.sceneReady = true;
    updateInfoText();

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();

      // Gentle plant sway
      for (let i = 0; i < window.__3D_STATE__.plants.length; i++) {
        const plant = window.__3D_STATE__.plants[i];
        if (plant.group) {
          plant.group.rotation.y = Math.sin(elapsed * 0.7 + i) * 0.06;
        }
      }

      if (spinAnimation) {
        const now = performance.now();
        const t = Math.min((now - spinAnimation.start) / spinAnimation.duration, 1);
        const eased = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        nefertitiRoot.rotation.y = THREE.MathUtils.lerp(spinAnimation.from, spinAnimation.to, eased);

        if (t >= 1) {
          spinAnimation = null;
          window.__3D_STATE__.nefertitiSpinning = false;
          window.__3D_STATE__.nefertitiSpinCount += 1;
        }
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
