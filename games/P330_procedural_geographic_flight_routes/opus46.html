<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Globe Flight Routes with Storks</title>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a2e; font-family: Arial, sans-serif; }
  canvas { display: block; }
  #ui-panel {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    padding: 15px;
    border-radius: 8px;
    font-size: 14px;
    min-width: 220px;
    z-index: 100;
  }
  #ui-panel div { margin: 4px 0; }
  #ui-panel button {
    display: block;
    width: 100%;
    margin: 5px 0;
    padding: 8px;
    background: #1a3a5c;
    color: white;
    border: 1px solid #2a5a8c;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
  }
  #ui-panel button:hover { background: #2a5a8c; }
  .label { font-weight: bold; color: #88ccff; }
</style>
</head>
<body>

<div id="ui-panel">
  <div class="label">🌍 Globe Flight Routes</div>
  <hr style="border-color:#333">
  <div id="hud-routes">Active Routes: 5/5</div>
  <div id="hud-selected">Selected Route: None</div>
  <div id="hud-speed">Speed Multiplier: 1.0x</div>
  <div id="hud-storks">Storks Loaded: 0/5</div>
  <div id="hud-paused" style="color:#ff8888;display:none;">⏸ PAUSED</div>
  <hr style="border-color:#333">
  <button id="btn-toggle">Toggle Route</button>
  <button id="btn-speedup">Speed Up</button>
  <button id="btn-speeddown">Speed Down</button>
  <button id="btn-reset">Reset View</button>
  <button id="btn-highlight">Highlight: OFF</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(10, 10, 10);
scene.add(directionalLight);

// Procedural Earth texture
function createEarthTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 2048;
  canvas.height = 1024;
  const ctx = canvas.getContext('2d');

  // Ocean base
  ctx.fillStyle = '#1a4a8a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Add ocean variation
  for (let i = 0; i < 5000; i++) {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height;
    ctx.fillStyle = `rgba(${20 + Math.random()*30}, ${60 + Math.random()*40}, ${120 + Math.random()*40}, 0.3)`;
    ctx.fillRect(x, y, 3 + Math.random()*5, 2 + Math.random()*3);
  }

  // Simplified continent shapes using polygons
  const continents = [
    // North America
    { color: '#2d8a4e', points: [[0.08, 0.15], [0.08, 0.45], [0.15, 0.5], [0.22, 0.48], [0.28, 0.42], [0.3, 0.35], [0.28, 0.25], [0.22, 0.18], [0.15, 0.12]] },
    // South America
    { color: '#35a055', points: [[0.2, 0.52], [0.18, 0.55], [0.2, 0.65], [0.24, 0.75], [0.26, 0.82], [0.24, 0.85], [0.22, 0.8], [0.28, 0.72], [0.3, 0.6], [0.28, 0.52]] },
    // Europe
    { color: '#3d9a5e', points: [[0.45, 0.15], [0.42, 0.22], [0.44, 0.3], [0.48, 0.35], [0.52, 0.32], [0.55, 0.25], [0.53, 0.18], [0.5, 0.15]] },
    // Africa
    { color: '#4aaa55', points: [[0.42, 0.38], [0.4, 0.45], [0.42, 0.55], [0.45, 0.65], [0.5, 0.72], [0.55, 0.7], [0.58, 0.6], [0.56, 0.5], [0.54, 0.42], [0.5, 0.38]] },
    // Asia
    { color: '#3a9050', points: [[0.55, 0.1], [0.52, 0.18], [0.55, 0.25], [0.6, 0.32], [0.65, 0.38], [0.72, 0.4], [0.78, 0.35], [0.82, 0.28], [0.8, 0.2], [0.75, 0.15], [0.68, 0.1], [0.62, 0.08]] },
    // Russia/Northern Asia
    { color: '#3a8848', points: [[0.55, 0.08], [0.55, 0.18], [0.65, 0.2], [0.75, 0.18], [0.85, 0.15], [0.9, 0.12], [0.88, 0.08], [0.75, 0.06], [0.65, 0.06]] },
    // Australia
    { color: '#5aaa45', points: [[0.78, 0.58], [0.75, 0.62], [0.76, 0.68], [0.8, 0.72], [0.85, 0.7], [0.88, 0.65], [0.87, 0.6], [0.83, 0.57]] },
    // India
    { color: '#45a050', points: [[0.65, 0.32], [0.63, 0.38], [0.65, 0.48], [0.68, 0.5], [0.72, 0.45], [0.7, 0.38], [0.68, 0.33]] },
    // Japan area
    { color: '#3d9555', points: [[0.85, 0.25], [0.84, 0.3], [0.86, 0.35], [0.88, 0.32], [0.87, 0.27]] },
    // Greenland
    { color: '#e8e8e8', points: [[0.28, 0.05], [0.25, 0.1], [0.27, 0.15], [0.32, 0.14], [0.34, 0.1], [0.32, 0.06]] },
    // Antarctica
    { color: '#dde8ee', points: [[0.0, 0.9], [0.0, 1.0], [1.0, 1.0], [1.0, 0.9], [0.8, 0.88], [0.6, 0.9], [0.4, 0.88], [0.2, 0.9]] },
  ];

  continents.forEach(cont => {
    ctx.fillStyle = cont.color;
    ctx.beginPath();
    const pts = cont.points;
    ctx.moveTo(pts[0][0] * canvas.width, pts[0][1] * canvas.height);
    for (let i = 1; i < pts.length; i++) {
      ctx.lineTo(pts[i][0] * canvas.width, pts[i][1] * canvas.height);
    }
    ctx.closePath();
    ctx.fill();

    // Add terrain noise
    for (let i = 0; i < 300; i++) {
      const bx = (pts[0][0] + Math.random() * 0.2) * canvas.width;
      const by = (pts[0][1] + Math.random() * 0.3) * canvas.height;
      ctx.fillStyle = `rgba(${30 + Math.random()*40}, ${100 + Math.random()*60}, ${40 + Math.random()*30}, 0.2)`;
      ctx.fillRect(bx, by, 4, 3);
    }
  });

  // Ice caps
  const gradient1 = ctx.createLinearGradient(0, 0, 0, 60);
  gradient1.addColorStop(0, 'rgba(220,235,245,0.8)');
  gradient1.addColorStop(1, 'rgba(220,235,245,0)');
  ctx.fillStyle = gradient1;
  ctx.fillRect(0, 0, canvas.width, 60);

  const texture = new THREE.CanvasTexture(canvas);
  texture.wrapS = THREE.RepeatWrapping;
  texture.wrapT = THREE.ClampToEdgeWrapping;
  return texture;
}

const earthTexture = createEarthTexture();
const earthGeometry = new THREE.SphereGeometry(5, 64, 64);
const earthMaterial = new THREE.MeshPhongMaterial({
  map: earthTexture,
  shininess: 25,
  specular: new THREE.Color(0x222244),
});
const earth = new THREE.Mesh(earthGeometry, earthMaterial);
scene.add(earth);

// Atmosphere glow
const atmosphereGeometry = new THREE.SphereGeometry(5.15, 64, 64);
const atmosphereMaterial = new THREE.MeshPhongMaterial({
  color: 0x4488ff,
  transparent: true,
  opacity: 0.08,
  side: THREE.BackSide,
});
const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
scene.add(atmosphere);

// Lat/Lon to 3D position
function latLonToVec3(lat, lon, radius) {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);
  const x = -radius * Math.sin(phi) * Math.cos(theta);
  const y = radius * Math.cos(phi);
  const z = radius * Math.sin(phi) * Math.sin(theta);
  return new THREE.Vector3(x, y, z);
}

// City definitions
const cities = [
  { name: 'New York', lat: 40.7, lon: -74.0 },
  { name: 'London', lat: 51.5, lon: -0.1 },
  { name: 'Tokyo', lat: 35.7, lon: 139.7 },
  { name: 'Sydney', lat: -33.9, lon: 151.2 },
  { name: 'Cape Town', lat: -33.9, lon: 18.4 },
];

const GLOBE_RADIUS = 5.05;
const cityPositions = cities.map(c => latLonToVec3(c.lat, c.lon, GLOBE_RADIUS));

// City markers
cityPositions.forEach((pos, i) => {
  const markerGeo = new THREE.SphereGeometry(0.08, 16, 16);
  const markerMat = new THREE.MeshBasicMaterial({ color: 0xff3333 });
  const marker = new THREE.Mesh(markerGeo, markerMat);
  marker.position.copy(pos);
  scene.add(marker);

  // Text sprite label
  const sprite = createTextSprite(cities[i].name);
  const labelOffset = pos.clone().normalize().multiplyScalar(0.3);
  sprite.position.copy(pos).add(labelOffset);
  scene.add(sprite);
});

function createTextSprite(text) {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, 256, 64);
  ctx.font = 'bold 28px Arial';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 32);

  const texture = new THREE.CanvasTexture(canvas);
  const material = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(material);
  sprite.scale.set(1.5, 0.4, 1);
  return sprite;
}

// Flight routes
const routePairs = [
  [0, 1], // NY - London
  [1, 2], // London - Tokyo
  [2, 3], // Tokyo - Sydney
  [3, 4], // Sydney - Cape Town
  [4, 0], // Cape Town - NY
];

const routeNames = ['NY→London', 'London→Tokyo', 'Tokyo→Sydney', 'Sydney→Cape Town', 'Cape Town→NY'];

const routes = [];
const routeMeshes = [];
const routeCurves = [];

routePairs.forEach(([a, b], i) => {
  const start = cityPositions[a].clone();
  const end = cityPositions[b].clone();

  // Control point: midpoint elevated above globe
  const mid = start.clone().add(end).multiplyScalar(0.5);
  const midDist = mid.length();
  const controlPoint = mid.clone().normalize().multiplyScalar(midDist * 1.5);

  const curve = new THREE.QuadraticBezierCurve3(start, controlPoint, end);
  routeCurves.push(curve);

  const tubeGeo = new THREE.TubeGeometry(curve, 64, 0.02, 8, false);
  const tubeMat = new THREE.MeshBasicMaterial({
    color: 0x00ffff,
    transparent: true,
    opacity: 0.8,
  });
  // Add emissive glow effect
  const tubeMat2 = new THREE.MeshStandardMaterial({
    color: 0x00ffff,
    emissive: 0x00ffff,
    emissiveIntensity: 0.5,
    transparent: true,
    opacity: 0.8,
  });
  const tubeMesh = new THREE.Mesh(tubeGeo, tubeMat);
  scene.add(tubeMesh);
  routeMeshes.push(tubeMesh);

  routes.push({
    curve,
    mesh: tubeMesh,
    visible: true,
  });
});

// State
const state = {
  globeRadius: 5,
  routeCount: 5,
  activeRoutes: 5,
  selectedRoute: -1,
  speedMultiplier: 1.0,
  isPaused: false,
  highlightMode: false,
  storksLoaded: 0,
  storkPositions: Array(5).fill(null).map(() => ({ x: 0, y: 0, z: 0 })),
  storkT: [0, 0, 0, 0, 0],
  routeVisibility: [true, true, true, true, true],
  cameraDistance: 15,
  frameCount: 0,
};
window.__3D_STATE__ = state;

// Stork models (create simple procedural stork if GLB fails)
const storks = [];
const storkMixers = [];
let storksReady = false;

function createProceduralStork() {
  const group = new THREE.Group();

  // Body
  const bodyGeo = new THREE.ConeGeometry(0.3, 1.2, 8);
  bodyGeo.rotateX(Math.PI / 2);
  const bodyMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  group.add(body);

  // Head
  const headGeo = new THREE.SphereGeometry(0.15, 8, 8);
  const headMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.set(0, 0.05, 0.6);
  group.add(head);

  // Beak
  const beakGeo = new THREE.ConeGeometry(0.05, 0.3, 6);
  beakGeo.rotateX(-Math.PI / 2);
  const beakMat = new THREE.MeshPhongMaterial({ color: 0xff6600 });
  const beak = new THREE.Mesh(beakGeo, beakMat);
  beak.position.set(0, 0, 0.85);
  group.add(beak);

  // Wings
  const wingShape = new THREE.Shape();
  wingShape.moveTo(0, 0);
  wingShape.lineTo(1.0, 0.3);
  wingShape.lineTo(1.0, 0.1);
  wingShape.lineTo(0, -0.1);
  wingShape.closePath();

  const wingGeo = new THREE.ShapeGeometry(wingShape);
  const wingMat = new THREE.MeshPhongMaterial({ color: 0x111111, side: THREE.DoubleSide });

  const leftWing = new THREE.Mesh(wingGeo, wingMat);
  leftWing.position.set(0.1, 0.1, 0);
  leftWing.name = 'leftWing';
  group.add(leftWing);

  const rightWing = new THREE.Mesh(wingGeo.clone(), wingMat);
  rightWing.position.set(-0.1, 0.1, 0);
  rightWing.rotation.y = Math.PI;
  rightWing.name = 'rightWing';
  group.add(rightWing);

  // Tail
  const tailGeo = new THREE.ConeGeometry(0.1, 0.4, 6);
  tailGeo.rotateX(Math.PI / 2);
  const tailMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
  const tail = new THREE.Mesh(tailGeo, tailMat);
  tail.position.set(0, 0.05, -0.7);
  group.add(tail);

  // Legs
  const legGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.4);
  const legMat = new THREE.MeshPhongMaterial({ color: 0xff4444 });
  const leftLeg = new THREE.Mesh(legGeo, legMat);
  leftLeg.position.set(0.1, -0.3, -0.2);
  group.add(leftLeg);
  const rightLeg = new THREE.Mesh(legGeo.clone(), legMat);
  rightLeg.position.set(-0.1, -0.3, -0.2);
  group.add(rightLeg);

  return group;
}

// Try loading GLB, fall back to procedural
const loader = new GLTFLoader();

function initStorks() {
  // Try to load the GLB file first
  let loadAttempted = false;

  try {
    loader.load(
      '._stork.glb',
      (gltf) => {
        loadAttempted = true;
        const model = gltf.scene;
        for (let i = 0; i < 5; i++) {
          const stork = model.clone();
          stork.scale.set(0.15, 0.15, 0.15);
          scene.add(stork);
          storks.push(stork);
          state.storksLoaded = i + 1;
          updateHUD();

          // If there are animations
          if (gltf.animations && gltf.animations.length > 0) {
            const mixer = new THREE.AnimationMixer(stork);
            const action = mixer.clipAction(gltf.animations[0]);
            action.play();
            storkMixers.push(mixer);
          }
        }
        storksReady = true;
      },
      undefined,
      (error) => {
        if (!loadAttempted) {
          loadAttempted = true;
          console.log('GLB not found, using procedural storks');
          createProceduralStorks();
        }
      }
    );
  } catch (e) {
    createProceduralStorks();
  }

  // Fallback timeout
  setTimeout(() => {
    if (!storksReady && storks.length === 0) {
      createProceduralStorks();
    }
  }, 2000);
}

function createProceduralStorks() {
  for (let i = 0; i < 5; i++) {
    const stork = createProceduralStork();
    stork.scale.set(0.15, 0.15, 0.15);
    scene.add(stork);
    storks.push(stork);
    state.storksLoaded = i + 1;
    updateHUD();
  }
  storksReady = true;
}

initStorks();

// HUD update
function updateHUD() {
  const activeCount = state.routeVisibility.filter(v => v).length;
  state.activeRoutes = activeCount;

  document.getElementById('hud-routes').textContent = `Active Routes: ${activeCount}/5`;
  document.getElementById('hud-selected').textContent = `Selected Route: ${state.selectedRoute >= 0 ? routeNames[state.selectedRoute] : 'None'}`;
  document.getElementById('hud-speed').textContent = `Speed Multiplier: ${state.speedMultiplier.toFixed(1)}x`;
  document.getElementById('hud-storks').textContent = `Storks Loaded: ${state.storksLoaded}/5`;
  document.getElementById('hud-paused').style.display = state.isPaused ? 'block' : 'none';
}

// Toggle route cycling
let toggleIndex = 0;
document.getElementById('btn-toggle').addEventListener('click', () => {
  const idx = toggleIndex % 5;
  state.routeVisibility[idx] = !state.routeVisibility[idx];
  routes[idx].mesh.visible = state.routeVisibility[idx];
  if (storks[idx]) storks[idx].visible = state.routeVisibility[idx];
  state.selectedRoute = idx;
  toggleIndex++;
  updateHUD();
});

document.getElementById('btn-speedup').addEventListener('click', () => {
  state.speedMultiplier = Math.min(4.0, state.speedMultiplier * 1.5);
  updateHUD();
});

document.getElementById('btn-speeddown').addEventListener('click', () => {
  state.speedMultiplier = Math.max(0.25, state.speedMultiplier / 1.5);
  updateHUD();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  camera.position.set(0, 0, 15);
  camera.lookAt(0, 0, 0);
  controls.reset();
  updateHUD();
});

document.getElementById('btn-highlight').addEventListener('click', () => {
  state.highlightMode = !state.highlightMode;
  document.getElementById('btn-highlight').textContent = `Highlight: ${state.highlightMode ? 'ON' : 'OFF'}`;
});

// Keyboard controls
document.addEventListener('keydown', (e) => {
  if (e.key >= '1' && e.key <= '5') {
    const idx = parseInt(e.key) - 1;
    state.selectedRoute = idx;
    updateHUD();
  } else if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    state.isPaused = !state.isPaused;
    updateHUD();
  } else if (e.key === 'r' || e.key === 'R') {
    // Reset all
    for (let i = 0; i < 5; i++) {
      state.routeVisibility[i] = true;
      routes[i].mesh.visible = true;
      if (storks[i]) storks[i].visible = true;
    }
    state.speedMultiplier = 1.0;
    state.highlightMode = false;
    state.selectedRoute = -1;
    document.getElementById('btn-highlight').textContent = 'Highlight: OFF';
    updateHUD();
  }
});

// Animation
const clock = new THREE.Clock();
let elapsedTime = 0;

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  if (!state.isPaused) {
    elapsedTime += delta * state.speedMultiplier;
  }

  controls.update();

  // Rotate earth slowly
  earth.rotation.y += delta * 0.02;

  // Update stork positions
  if (storksReady) {
    for (let i = 0; i < 5; i++) {
      if (!storks[i]) continue;

      const offset = i * 0.2;
      const loopDuration = 8.0;
      const t = ((elapsedTime / loopDuration) + offset) % 1.0;
      state.storkT[i] = t;

      const curve = routeCurves[i];
      const pos = curve.getPointAt(t);
      storks[i].position.copy(pos);

      state.storkPositions[i] = { x: pos.x, y: pos.y, z: pos.z };

      // Orient along tangent
      const tangent = curve.getTangentAt(t);
      const lookTarget = pos.clone().add(tangent);
      storks[i].lookAt(lookTarget);

      // Animate wings for procedural storks
      const leftWing = storks[i].getObjectByName('leftWing');
      const rightWing = storks[i].getObjectByName('rightWing');
      if (leftWing && rightWing) {
        const wingAngle = Math.sin(elapsedTime * 8 + i) * 0.4;
        leftWing.rotation.z = wingAngle;
        rightWing.rotation.z = -wingAngle;
      }
    }

    // Update animation mixers
    storkMixers.forEach(mixer => mixer.update(delta * state.speedMultiplier));
  }

  // Highlight mode - pulse selected route
  if (state.highlightMode && state.selectedRoute >= 0) {
    const pulseT = (Math.sin(elapsedTime * 4) + 1) / 2; // 0 to 1
    const opacity = 0.3 + pulseT * 0.7; // 0.3 to 1.0
    routeMeshes[state.selectedRoute].material.opacity = opacity;
  } else {
    // Reset all route opacities
    routeMeshes.forEach((mesh, i) => {
      if (mesh.material.opacity !== 0.8) {
        mesh.material.opacity = 0.8;
      }
    });
  }

  // Update state
  state.cameraDistance = camera.position.length();
  state.frameCount++;

  renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

updateHUD();
animate();
</script>
</body>
</html>
