<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flight Routes</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: sans-serif;
        }
        #ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(10, 10, 46, 0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            pointer-events: auto;
            z-index: 100;
            min-width: 200px;
        }
        #ui-panel h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        .stat {
            margin-bottom: 5px;
            font-size: 14px;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        button {
            background: #1e3f66;
            color: white;
            border: 1px solid #4a90e2;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        button:hover {
            background: #2a5a8f;
        }
        .instructions {
            margin-top: 15px;
            font-size: 11px;
            color: #aaa;
            border-top: 1px solid #555;
            padding-top: 10px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-panel">
        <h3>Flight Control</h3>
        <div class="stat" id="stat-active">Active Routes: 5/5</div>
        <div class="stat" id="stat-selected">Selected Route: None</div>
        <div class="stat" id="stat-speed">Speed Multiplier: 1.0x</div>
        <div class="stat" id="stat-storks">Storks Loaded: 0/5</div>
        
        <div class="controls">
            <button id="btn-toggle">Toggle Route</button>
            <button id="btn-speedup">Speed Up</button>
            <button id="btn-speeddown">Speed Down</button>
            <button id="btn-reset">Reset View</button>
            <button id="btn-highlight">Highlight: OFF</button>
        </div>

        <div class="instructions">
            Keys: 1-5 (Select), Space (Pause), R (Reset All)
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            globeRadius: 5,
            routeCount: 5,
            activeRoutes: 5,
            selectedRoute: -1,
            speedMultiplier: 1.0,
            isPaused: false,
            highlightMode: false,
            storksLoaded: 0,
            storkPositions: Array(5).fill({x:0, y:0, z:0}),
            storkT: Array(5).fill(0),
            routeVisibility: Array(5).fill(true),
            cameraDistance: 15,
            frameCount: 0
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 6;
        controls.maxDistance = 50;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 10, 10);
        scene.add(dirLight);

        // --- Procedural Globe ---
        function createProceduralTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#1e3f66'; // Ocean
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#2e8b57'; // Land
            // Generate random blobs for continents
            Math.seedrandom = 42; // Pseudo-random for consistency
            let seed = 1;
            function random() {
                const x = Math.sin(seed++) * 10000;
                return x - Math.floor(x);
            }

            for (let i = 0; i < 100; i++) {
                const x = random() * canvas.width;
                const y = random() * canvas.height;
                const r = random() * 40 + 10;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        const globeGeo = new THREE.SphereGeometry(state.globeRadius, 64, 64);
        const globeMat = new THREE.MeshPhongMaterial({
            map: createProceduralTexture(),
            shininess: 10
        });
        const globe = new THREE.Mesh(globeGeo, globeMat);
        scene.add(globe);

        // --- Cities & Routes ---
        const cities = [
            { name: "New York", lat: 40.7, lon: -74.0 },
            { name: "London", lat: 51.5, lon: -0.1 },
            { name: "Tokyo", lat: 35.7, lon: 139.7 },
            { name: "Sydney", lat: -33.9, lon: 151.2 },
            { name: "Cape Town", lat: -33.9, lon: 18.4 }
        ];

        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = (radius * Math.sin(phi) * Math.sin(theta));
            const y = (radius * Math.cos(phi));
            return new THREE.Vector3(x, y, z);
        }

        function createTextSprite(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 64;
            ctx.font = 'Bold 24px Arial';
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.fillText(text, 128, 40);
            
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture, depthTest: false });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(2, 0.5, 1);
            return sprite;
        }

        const cityNodes = [];
        cities.forEach(city => {
            const pos = latLonToVector3(city.lat, city.lon, 5.05);
            
            const markerGeo = new THREE.SphereGeometry(0.08, 16, 16);
            const markerMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const marker = new THREE.Mesh(markerGeo, markerMat);
            marker.position.copy(pos);
            scene.add(marker);
            
            const label = createTextSprite(city.name);
            label.position.copy(pos).multiplyScalar(1.05);
            scene.add(label);
            
            cityNodes.push(pos);
        });

        const routes = [];
        const routeMeshes = [];
        const routeMaterials = [];

        for (let i = 0; i < 5; i++) {
            const start = cityNodes[i];
            const end = cityNodes[(i + 1) % 5];
            
            const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
            const distance = start.distanceTo(end);
            const controlPoint = midpoint.clone().normalize().multiplyScalar(state.globeRadius + distance * 0.3);
            
            const curve = new THREE.QuadraticBezierCurve3(start, controlPoint, end);
            routes.push(curve);
            
            const tubeGeo = new THREE.TubeGeometry(curve, 64, 0.02, 8, false);
            const tubeMat = new THREE.MeshStandardMaterial({
                color: 0x00ffff,
                emissive: 0x00ffff,
                emissiveIntensity: 1,
                transparent: true,
                opacity: 1.0
            });
            const tube = new THREE.Mesh(tubeGeo, tubeMat);
            scene.add(tube);
            
            routeMeshes.push(tube);
            routeMaterials.push(tubeMat);
        }

        // --- Stork Models ---
        const storks = [];
        const mixers = [];
        const storkGroup = new THREE.Group();
        scene.add(storkGroup);

        const loader = new GLTFLoader();
        // Using a reliable CDN for the standard Three.js Stork model
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Stork.glb', (gltf) => {
            const baseModel = gltf.scene;
            const animations = gltf.animations;

            for (let i = 0; i < 5; i++) {
                const stork = SkeletonUtils.clone(baseModel);
                stork.scale.set(0.15, 0.15, 0.15);
                
                const mixer = new THREE.AnimationMixer(stork);
                if (animations && animations.length > 0) {
                    mixer.clipAction(animations[0]).play();
                }
                
                storks.push(stork);
                mixers.push(mixer);
                storkGroup.add(stork);
                
                state.storksLoaded++;
                updateUI();
            }
        });

        // --- UI & Interaction ---
        let currentToggleIndex = 0;

        const uiActive = document.getElementById('stat-active');
        const uiSelected = document.getElementById('stat-selected');
        const uiSpeed = document.getElementById('stat-speed');
        const uiStorks = document.getElementById('stat-storks');
        const btnHighlight = document.getElementById('btn-highlight');

        function updateUI() {
            uiActive.innerText = `Active Routes: ${state.activeRoutes}/5`;
            uiSelected.innerText = `Selected Route: ${state.selectedRoute === -1 ? 'None' : state.selectedRoute}`;
            uiSpeed.innerText = `Speed Multiplier: ${state.speedMultiplier.toFixed(2)}x`;
            uiStorks.innerText = `Storks Loaded: ${state.storksLoaded}/5`;
            btnHighlight.innerText = `Highlight: ${state.highlightMode ? 'ON' : 'OFF'}`;
        }

        function setRouteVisibility(index, visible) {
            state.routeVisibility[index] = visible;
            routeMeshes[index].visible = visible;
            if (storks[index]) storks[index].visible = visible;
            
            state.activeRoutes = state.routeVisibility.filter(v => v).length;
            updateUI();
        }

        document.getElementById('btn-toggle').addEventListener('click', () => {
            state.selectedRoute = currentToggleIndex;
            setRouteVisibility(currentToggleIndex, !state.routeVisibility[currentToggleIndex]);
            currentToggleIndex = (currentToggleIndex + 1) % 5;
            updateUI();
        });

        document.getElementById('btn-speedup').addEventListener('click', () => {
            state.speedMultiplier = Math.min(4.0, state.speedMultiplier * 1.5);
            updateUI();
        });

        document.getElementById('btn-speeddown').addEventListener('click', () => {
            state.speedMultiplier = Math.max(0.25, state.speedMultiplier / 1.5);
            updateUI();
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            camera.position.set(0, 0, 15);
            controls.target.set(0, 0, 0);
            controls.update();
        });

        document.getElementById('btn-highlight').addEventListener('click', () => {
            state.highlightMode = !state.highlightMode;
            updateUI();
        });

        window.addEventListener('keydown', (e) => {
            if (e.key >= '1' && e.key <= '5') {
                state.selectedRoute = parseInt(e.key) - 1;
                state.highlightMode = true;
                updateUI();
            } else if (e.code === 'Space') {
                state.isPaused = !state.isPaused;
            } else if (e.key.toLowerCase() === 'r') {
                for (let i = 0; i < 5; i++) setRouteVisibility(i, true);
                state.speedMultiplier = 1.0;
                state.highlightMode = false;
                state.selectedRoute = -1;
                updateUI();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let simTime = 0;

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            
            if (!state.isPaused) {
                simTime += delta * state.speedMultiplier;
                
                mixers.forEach(mixer => {
                    mixer.update(delta * state.speedMultiplier);
                });
            }

            controls.update();

            // Update Storks
            if (storks.length === 5) {
                for (let i = 0; i < 5; i++) {
                    if (!state.routeVisibility[i]) continue;

                    const offset = i * 0.2;
                    const t = ((simTime / 8) + offset) % 1.0;
                    
                    const curve = routes[i];
                    const pos = curve.getPointAt(t);
                    const tangent = curve.getTangentAt(t);
                    
                    storks[i].position.copy(pos);
                    
                    // Stork model faces +Z, so lookAt needs adjustment or just look at pos + tangent
                    const lookAtPos = pos.clone().add(tangent);
                    storks[i].lookAt(lookAtPos);
                    
                    // Update state
                    state.storkPositions[i] = { x: pos.x, y: pos.y, z: pos.z };
                    state.storkT[i] = t;
                }
            }

            // Update Highlights
            for (let i = 0; i < 5; i++) {
                if (state.highlightMode && state.selectedRoute === i) {
                    routeMaterials[i].opacity = 0.3 + 0.7 * (Math.sin(time * 5) * 0.5 + 0.5);
                } else {
                    routeMaterials[i].opacity = 1.0;
                }
            }

            // Update State
            state.cameraDistance = camera.position.distanceTo(controls.target);
            state.frameCount++;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
