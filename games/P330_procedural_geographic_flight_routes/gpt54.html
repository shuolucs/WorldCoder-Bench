<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procedural Globe Flight Routes with Storks</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(10, 10, 30, 0.75);
      color: white;
      padding: 12px;
      border-radius: 8px;
      min-width: 220px;
      line-height: 1.5;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    #hud .buttons {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #hud button {
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 5px;
      padding: 7px 10px;
      cursor: pointer;
      text-align: left;
    }

    #hud button:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="activeRoutes">Active Routes: 5/5</div>
    <div id="selectedRoute">Selected Route: None</div>
    <div id="speedDisplay">Speed Multiplier: 1.0x</div>
    <div id="storksLoaded">Storks Loaded: 0/5</div>

    <div class="buttons">
      <button id="btn-toggle">Toggle Route</button>
      <button id="btn-speedup">Speed Up</button>
      <button id="btn-speeddown">Speed Down</button>
      <button id="btn-reset">Reset View</button>
      <button id="btn-highlight">Highlight: OFF</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";
    import { SkeletonUtils } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/utils/SkeletonUtils.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 10, 10);
    scene.add(directionalLight);

    const GLOBE_RADIUS = 5;
    const CITY_RADIUS = 5.05;
    const ROUTE_TUBE_RADIUS = 0.02;
    const ROUTE_SEGMENTS = 64;
    const LOOP_DURATION = 8.0;

    const hud = {
      activeRoutes: document.getElementById("activeRoutes"),
      selectedRoute: document.getElementById("selectedRoute"),
      speedDisplay: document.getElementById("speedDisplay"),
      storksLoaded: document.getElementById("storksLoaded"),
      btnToggle: document.getElementById("btn-toggle"),
      btnSpeedUp: document.getElementById("btn-speedup"),
      btnSpeedDown: document.getElementById("btn-speeddown"),
      btnReset: document.getElementById("btn-reset"),
      btnHighlight: document.getElementById("btn-highlight"),
    };

    function createProceduralGlobeTexture(size = 1024) {
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#1f5fae";
      ctx.fillRect(0, 0, size, size);

      const landColor = "#2f9b4b";

      function drawBlob(cx, cy, rx, ry, points = 8, rot = 0) {
        ctx.beginPath();
        for (let i = 0; i <= points; i++) {
          const a = (i / points) * Math.PI * 2 + rot;
          const rMod = 0.75 + 0.35 * Math.sin(i * 1.7 + cx * 0.01 + cy * 0.02);
          const x = cx + Math.cos(a) * rx * rMod;
          const y = cy + Math.sin(a) * ry * rMod;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
      }

      ctx.fillStyle = landColor;

      // Rough continent-like masses in equirectangular space.
      drawBlob(size * 0.18, size * 0.35, size * 0.10, size * 0.18, 12, 0.3); // North America
      drawBlob(size * 0.27, size * 0.62, size * 0.07, size * 0.14, 10, -0.2); // South America
      drawBlob(size * 0.50, size * 0.30, size * 0.07, size * 0.06, 10, 0.1); // Europe
      drawBlob(size * 0.54, size * 0.48, size * 0.09, size * 0.16, 10, 0.05); // Africa
      drawBlob(size * 0.69, size * 0.36, size * 0.19, size * 0.16, 14, 0.15); // Asia
      drawBlob(size * 0.80, size * 0.72, size * 0.08, size * 0.05, 10, 0.2); // Australia
      drawBlob(size * 0.47, size * 0.15, size * 0.03, size * 0.03, 8, 0); // Greenland

      // Simple latitude/longitude segment feel
      ctx.strokeStyle = "rgba(255,255,255,0.06)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 18; i++) {
        const y = (i / 18) * size;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(size, y);
        ctx.stroke();
      }
      for (let i = 0; i <= 36; i++) {
        const x = (i / 36) * size;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, size);
        ctx.stroke();
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    const globeTexture = createProceduralGlobeTexture();
    const globe = new THREE.Mesh(
      new THREE.SphereGeometry(GLOBE_RADIUS, 64, 64),
      new THREE.MeshPhongMaterial({
        map: globeTexture,
        shininess: 20
      })
    );
    scene.add(globe);

    function latLonToVector3(lat, lon, radius) {
      const phi = THREE.MathUtils.degToRad(90 - lat);
      const theta = THREE.MathUtils.degToRad(lon + 180);

      const x = -(radius * Math.sin(phi) * Math.cos(theta));
      const z = radius * Math.sin(phi) * Math.sin(theta);
      const y = radius * Math.cos(phi);
      return new THREE.Vector3(x, y, z);
    }

    function createTextSprite(text) {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = 256;
      canvas.height = 96;

      ctx.fillStyle = "rgba(0,0,0,0.0)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.font = "28px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      ctx.strokeStyle = "rgba(0,0,0,0.7)";
      ctx.lineWidth = 6;
      ctx.strokeText(text, canvas.width / 2, canvas.height / 2);

      ctx.fillStyle = "white";
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;

      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthWrite: false
      });

      const sprite = new THREE.Sprite(material);
      sprite.scale.set(1.4, 0.52, 1);
      return sprite;
    }

    const cityData = [
      { name: "New York", lat: 40.7, lon: -74.0 },
      { name: "London", lat: 51.5, lon: -0.1 },
      { name: "Tokyo", lat: 35.7, lon: 139.7 },
      { name: "Sydney", lat: -33.9, lon: 151.2 },
      { name: "Cape Town", lat: -33.9, lon: 18.4 }
    ];

    const cityPositions = cityData.map(c => latLonToVector3(c.lat, c.lon, CITY_RADIUS));

    cityData.forEach((city, i) => {
      const marker = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 16, 16),
        new THREE.MeshPhongMaterial({ color: 0xff3333 })
      );
      marker.position.copy(cityPositions[i]);
      scene.add(marker);

      const label = createTextSprite(city.name);
      label.position.copy(cityPositions[i].clone().normalize().multiplyScalar(CITY_RADIUS + 0.35));
      scene.add(label);
    });

    const routePairs = [
      [0, 1], // NY-London
      [1, 2], // London-Tokyo
      [2, 3], // Tokyo-Sydney
      [3, 4], // Sydney-CapeTown
      [4, 0], // CapeTown-NY
    ];

    const routeCurves = [];
    const routeMeshes = [];
    const routeMaterials = [];

    function createRouteCurve(start, end) {
      const midpoint = start.clone().add(end).multiplyScalar(0.5);
      const control = midpoint.clone().normalize().multiplyScalar(midpoint.length() * 1.5);
      return new THREE.QuadraticBezierCurve3(start.clone(), control, end.clone());
    }

    routePairs.forEach(([a, b]) => {
      const curve = createRouteCurve(cityPositions[a], cityPositions[b]);
      routeCurves.push(curve);

      const tubeGeom = new THREE.TubeGeometry(curve, ROUTE_SEGMENTS, ROUTE_TUBE_RADIUS, 8, false);
      const mat = new THREE.MeshPhongMaterial({
        color: 0x44ffff,
        emissive: 0x00ffff,
        emissiveIntensity: 0.9,
        transparent: true,
        opacity: 1.0
      });
      const mesh = new THREE.Mesh(tubeGeom, mat);
      scene.add(mesh);

      routeMaterials.push(mat);
      routeMeshes.push(mesh);
    });

    let storkTemplate = null;
    const storks = new Array(5).fill(null);
    const mixers = new Array(5).fill(null);
    const routeVisibility = [true, true, true, true, true];

    let storksLoaded = 0;
    let selectedRoute = -1;
    let speedMultiplier = 1.0;
    let isPaused = false;
    let highlightMode = false;
    let toggleCycleIndex = 0;
    let frameCount = 0;

    const loader = new GLTFLoader();

    function createFallbackStork() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.12, 0.45, 4, 8),
        new THREE.MeshPhongMaterial({ color: 0xffffff })
      );
      body.rotation.z = Math.PI / 2;
      group.add(body);

      const wingL = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 0.03, 0.18),
        new THREE.MeshPhongMaterial({ color: 0xeeeeee })
      );
      wingL.position.set(0, 0.08, 0.18);
      group.add(wingL);

      const wingR = wingL.clone();
      wingR.position.z = -0.18;
      group.add(wingR);

      const beak = new THREE.Mesh(
        new THREE.ConeGeometry(0.05, 0.22, 8),
        new THREE.MeshPhongMaterial({ color: 0xffaa33 })
      );
      beak.rotation.z = -Math.PI / 2;
      beak.position.set(0.38, 0.0, 0.0);
      group.add(beak);

      const neck = new THREE.Mesh(
        new THREE.CylinderGeometry(0.03, 0.03, 0.22, 8),
        new THREE.MeshPhongMaterial({ color: 0xffffff })
      );
      neck.position.set(0.24, 0.1, 0);
      neck.rotation.z = -0.6;
      group.add(neck);

      return group;
    }

    function finishCreateStorks(baseScene, animations) {
      for (let i = 0; i < 5; i++) {
        let clone;
        try {
          clone = SkeletonUtils.clone(baseScene);
        } catch {
          clone = baseScene.clone(true);
        }

        clone.scale.setScalar(0.15);
        scene.add(clone);
        storks[i] = clone;

        if (animations && animations.length > 0) {
          const mixer = new THREE.AnimationMixer(clone);
          animations.forEach(clip => {
            const action = mixer.clipAction(clip);
            action.play();
          });
          mixers[i] = mixer;
        }

        storksLoaded++;
        updateHUD();
      }
    }

    loader.load(
      "._stork.glb",
      (gltf) => {
        storkTemplate = gltf.scene;
        finishCreateStorks(storkTemplate, gltf.animations || []);
      },
      undefined,
      () => {
        storkTemplate = createFallbackStork();
        finishCreateStorks(storkTemplate, []);
      }
    );

    function updateHUD() {
      const activeCount = routeVisibility.filter(Boolean).length;
      hud.activeRoutes.textContent = `Active Routes: ${activeCount}/5`;
      hud.selectedRoute.textContent = `Selected Route: ${selectedRoute === -1 ? "None" : selectedRoute}`;
      hud.speedDisplay.textContent = `Speed Multiplier: ${speedMultiplier.toFixed(1)}x`;
      hud.storksLoaded.textContent = `Storks Loaded: ${storksLoaded}/5`;
      hud.btnHighlight.textContent = highlightMode ? "Highlight: ON" : "Highlight: OFF";
    }

    function resetCameraView() {
      camera.position.set(0, 0, 15);
      controls.target.set(0, 0, 0);
      controls.update();
    }

    function setRouteVisibility(index, visible) {
      routeVisibility[index] = visible;
      routeMeshes[index].visible = visible;
      if (storks[index]) storks[index].visible = visible;
      updateHUD();
    }

    function toggleNextRoute() {
      selectedRoute = toggleCycleIndex;
      setRouteVisibility(selectedRoute, !routeVisibility[selectedRoute]);
      toggleCycleIndex = (toggleCycleIndex + 1) % 5;
      updateHUD();
    }

    function resetAll() {
      for (let i = 0; i < 5; i++) {
        setRouteVisibility(i, true);
        routeMaterials[i].opacity = 1.0;
      }
      speedMultiplier = 1.0;
      highlightMode = false;
      selectedRoute = -1;
      isPaused = false;
      updateHUD();
    }

    hud.btnToggle.addEventListener("click", toggleNextRoute);

    hud.btnSpeedUp.addEventListener("click", () => {
      speedMultiplier = Math.min(4.0, speedMultiplier * 1.5);
      updateHUD();
    });

    hud.btnSpeedDown.addEventListener("click", () => {
      speedMultiplier = Math.max(0.25, speedMultiplier / 1.5);
      updateHUD();
    });

    hud.btnReset.addEventListener("click", resetCameraView);

    hud.btnHighlight.addEventListener("click", () => {
      highlightMode = !highlightMode;
      updateHUD();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key >= "1" && e.key <= "5") {
        selectedRoute = parseInt(e.key, 10) - 1;
        updateHUD();
      } else if (e.code === "Space") {
        e.preventDefault();
        isPaused = !isPaused;
      } else if (e.key.toLowerCase() === "r") {
        resetAll();
      }
    });

    const clock = new THREE.Clock();

    window.__3D_STATE__ = {
      globeRadius: 5,
      routeCount: 5,
      activeRoutes: 5,
      selectedRoute: -1,
      speedMultiplier: 1.0,
      isPaused: false,
      highlightMode: false,
      storksLoaded: 0,
      storkPositions: Array.from({ length: 5 }, () => ({ x: 0, y: 0, z: 0 })),
      storkT: [0, 0, 0, 0, 0],
      routeVisibility: [...routeVisibility],
      cameraDistance: camera.position.length(),
      frameCount: 0
    };

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const elapsed = clock.getElapsedTime();
      const delta = clock.getDelta();

      controls.update();

      if (!isPaused) {
        for (let i = 0; i < mixers.length; i++) {
          if (mixers[i]) mixers[i].update(delta * speedMultiplier);
        }
      }

      for (let i = 0; i < 5; i++) {
        if (!storks[i]) continue;

        const offset = i * 0.2;
        const t = isPaused
          ? window.__3D_STATE__.storkT[i]
          : (((elapsed * speedMultiplier) / LOOP_DURATION) + offset) % 1;

        const curve = routeCurves[i];
        const pos = curve.getPointAt(t);
        const tangent = curve.getTangentAt(t).normalize();

        storks[i].position.copy(pos);

        const lookTarget = pos.clone().add(tangent);
        storks[i].lookAt(lookTarget);

        storks[i].rotateY(Math.PI / 2);

        window.__3D_STATE__.storkPositions[i] = { x: pos.x, y: pos.y, z: pos.z };
        window.__3D_STATE__.storkT[i] = t;
      }

      for (let i = 0; i < 5; i++) {
        if (highlightMode && i === selectedRoute && routeMeshes[i].visible) {
          const pulse = 0.65 + 0.35 * Math.sin(elapsed * 4.0);
          routeMaterials[i].opacity = THREE.MathUtils.lerp(0.3, 1.0, pulse);
          routeMaterials[i].emissiveIntensity = 1.4;
        } else {
          routeMaterials[i].opacity = 1.0;
          routeMaterials[i].emissiveIntensity = 0.9;
        }
      }

      window.__3D_STATE__.globeRadius = 5;
      window.__3D_STATE__.routeCount = 5;
      window.__3D_STATE__.activeRoutes = routeVisibility.filter(Boolean).length;
      window.__3D_STATE__.selectedRoute = selectedRoute;
      window.__3D_STATE__.speedMultiplier = speedMultiplier;
      window.__3D_STATE__.isPaused = isPaused;
      window.__3D_STATE__.highlightMode = highlightMode;
      window.__3D_STATE__.storksLoaded = storksLoaded;
      window.__3D_STATE__.routeVisibility = [...routeVisibility];
      window.__3D_STATE__.cameraDistance = camera.position.length();
      window.__3D_STATE__.frameCount = frameCount;

      renderer.render(scene, camera);
    }

    updateHUD();
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
