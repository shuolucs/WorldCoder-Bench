<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Abstract Particle Art with Time Control</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      z-index: 10;
      min-width: 220px;
      backdrop-filter: blur(4px);
    }

    #hud .title {
      font-weight: bold;
      margin-bottom: 6px;
      color: #d8c6ff;
    }

    #help {
      margin-top: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.75);
    }

    #timeBar {
      position: fixed;
      bottom: 18px;
      left: 10%;
      width: 80%;
      height: 10px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      z-index: 10;
      overflow: visible;
    }

    #timeBarCenter {
      position: absolute;
      left: 40%;
      top: -4px;
      width: 2px;
      height: 18px;
      background: rgba(255,255,255,0.3);
    }

    #timeBarMarker {
      position: absolute;
      top: -4px;
      width: 3px;
      height: 18px;
      background: #fff;
      box-shadow: 0 0 10px rgba(255,255,255,0.8);
      border-radius: 2px;
      transform: translateX(-50%);
    }

    #timeBarLabels {
      position: fixed;
      bottom: 2px;
      left: 10%;
      width: 80%;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      display: flex;
      justify-content: space-between;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="title">Particle Flow HUD</div>
    <div id="hudContent"></div>
    <div id="help">
      ↑/↓ speed · Space pause · R reset · 1-5 palette · B bloom · E explosion · C orbit
    </div>
  </div>

  <div id="timeBar">
    <div id="timeBarCenter"></div>
    <div id="timeBarMarker"></div>
  </div>
  <div id="timeBarLabels">
    <span>-2.0</span>
    <span>0.0</span>
    <span>3.0</span>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { EffectComposer } from "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js";
    import { RenderPass } from "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js";
    import { UnrealBloomPass } from "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js";

    const PARTICLE_COUNT = 2000;
    const SPHERE_RADIUS = 25;
    const PARTICLE_SIZE = 0.3;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 80);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    let bloomEnabled = true;
    let cameraMode = "static";
    let orbitAngle = 0;

    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      1.2,
      0.7,
      0.2
    );
    composer.addPass(bloomPass);

    const palettes = {
      fire: ["#ff3b1f", "#ff6b1a", "#ff9f1c", "#ffd166", "#ff5d3a"],
      ocean: ["#00b4d8", "#0077b6", "#90e0ef", "#48cae4", "#0096c7"],
      forest: ["#2d6a4f", "#40916c", "#52b788", "#74c69d", "#95d5b2"],
      galaxy: ["#9d4edd", "#c77dff", "#ff5ea8", "#7b2cbf", "#e0aaff"],
      monochrome: ["#ffffff", "#dddddd", "#bbbbbb", "#999999", "#f2f2f2"]
    };

    let currentPaletteName = "galaxy";

    function randomPaletteColor(name) {
      const list = palettes[name];
      return new THREE.Color(list[Math.floor(Math.random() * list.length)]);
    }

    function randomPointInSphere(radius) {
      const u = Math.random();
      const v = Math.random();
      const w = Math.random();

      const theta = u * Math.PI * 2;
      const phi = Math.acos(2 * v - 1);
      const r = radius * Math.cbrt(w);

      return new THREE.Vector3(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
      );
    }

    // Simple swirling pseudo-3D noise field
    function noise3(x, y, z) {
      return Math.sin(x * 1.17 + z * 0.31) *
             Math.cos(y * 1.31 - x * 0.27) *
             Math.sin(z * 0.73 + y * 0.53);
    }

    function flowField(x, y, z, t) {
      const s = 0.08;
      const qx = x * s;
      const qy = y * s;
      const qz = z * s;
      const tt = t * 0.25;

      const nx = noise3(qx + 1.3, qy - 0.7 + tt, qz + 0.2);
      const ny = noise3(qx - 2.1 - tt, qy + 0.9, qz + 1.7);
      const nz = noise3(qx + 0.4, qy + 2.3, qz - 1.1 + tt);

      const swirl = new THREE.Vector3(
        Math.sin(qy * 2.0 + nz * 2.5) - Math.cos(qz * 2.3 - ny * 2.0),
        Math.sin(qz * 2.2 + nx * 2.2) - Math.cos(qx * 2.1 - nz * 2.3),
        Math.sin(qx * 2.4 + ny * 2.1) - Math.cos(qy * 2.0 - nx * 2.4)
      );

      swirl.multiplyScalar(0.35);

      const radial = new THREE.Vector3(-y, x, Math.sin(qx + qy + qz + tt) * 4.0).multiplyScalar(0.015);
      return swirl.add(radial);
    }

    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);
    const alphas = new Float32Array(PARTICLE_COUNT);
    const sizes = new Float32Array(PARTICLE_COUNT);

    const velocities = [];
    const lives = new Float32Array(PARTICLE_COUNT);
    const initialPositions = [];

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const p = randomPointInSphere(SPHERE_RADIUS);
      initialPositions.push(p.clone());
      velocities.push(new THREE.Vector3());

      positions[i * 3 + 0] = p.x;
      positions[i * 3 + 1] = p.y;
      positions[i * 3 + 2] = p.z;

      const c = randomPaletteColor(currentPaletteName);
      colors[i * 3 + 0] = c.r;
      colors[i * 3 + 1] = c.g;
      colors[i * 3 + 2] = c.b;

      lives[i] = 0.4 + Math.random() * 0.6;
      alphas[i] = lives[i];
      sizes[i] = PARTICLE_SIZE;
    }

    geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute("alpha", new THREE.BufferAttribute(alphas, 1));
    geometry.setAttribute("aSize", new THREE.BufferAttribute(sizes, 1));

    const material = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      vertexColors: true,
      uniforms: {
        uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) },
        uBaseSize: { value: 6.0 },
        uBloomBoost: { value: 1.0 }
      },
      vertexShader: `
        attribute float alpha;
        attribute float aSize;
        varying vec3 vColor;
        varying float vAlpha;
        uniform float uPixelRatio;
        uniform float uBaseSize;
        void main() {
          vColor = color;
          vAlpha = alpha;
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = aSize * uBaseSize * uPixelRatio * (120.0 / -mvPosition.z);
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        varying vec3 vColor;
        varying float vAlpha;
        uniform float uBloomBoost;
        void main() {
          vec2 uv = gl_PointCoord - vec2(0.5);
          float d = length(uv);
          float glow = smoothstep(0.5, 0.0, d);
          float core = smoothstep(0.18, 0.0, d);
          vec3 col = vColor * (glow * 0.8 + core * 1.4) * uBloomBoost;
          float alpha = vAlpha * glow;
          if(alpha < 0.01) discard;
          gl_FragColor = vec4(col, alpha);
        }
      `
    });

    const points = new THREE.Points(geometry, material);
    scene.add(points);

    let simTime = 0;
    let timeScale = 1.0;
    let previousTimeScale = 1.0;
    let paused = false;
    let explosionCount = 0;
    let frameCount = 0;

    const hudContent = document.getElementById("hudContent");
    const timeBarMarker = document.getElementById("timeBarMarker");

    function applyPalette(name) {
      currentPaletteName = name;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const c = randomPaletteColor(name);
        colors[i * 3 + 0] = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;
      }
      geometry.attributes.color.needsUpdate = true;
    }

    function respawnParticle(i) {
      const p = randomPointInSphere(SPHERE_RADIUS);
      positions[i * 3 + 0] = p.x;
      positions[i * 3 + 1] = p.y;
      positions[i * 3 + 2] = p.z;
      velocities[i].set(0, 0, 0);

      lives[i] = 0.4 + Math.random() * 0.6;
      alphas[i] = lives[i];

      const c = randomPaletteColor(currentPaletteName);
      colors[i * 3 + 0] = c.r;
      colors[i * 3 + 1] = c.g;
      colors[i * 3 + 2] = c.b;
    }

    function resetParticles() {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const p = initialPositions[i];
        positions[i * 3 + 0] = p.x;
        positions[i * 3 + 1] = p.y;
        positions[i * 3 + 2] = p.z;
        velocities[i].set(0, 0, 0);
        lives[i] = 0.4 + Math.random() * 0.6;
        alphas[i] = lives[i];

        const c = randomPaletteColor(currentPaletteName);
        colors[i * 3 + 0] = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;
      }

      simTime = 0;
      timeScale = 1.0;
      previousTimeScale = 1.0;
      paused = false;
      explosionCount = 0;
    }

    function triggerExplosion() {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const x = positions[i * 3 + 0];
        const y = positions[i * 3 + 1];
        const z = positions[i * 3 + 2];
        const dir = new THREE.Vector3(x, y, z).normalize();
        velocities[i].addScaledVector(dir, 2.0);
      }
      explosionCount++;
    }

    function togglePause() {
      if (!paused) {
        previousTimeScale = timeScale === 0 ? 1.0 : timeScale;
        timeScale = 0;
        paused = true;
      } else {
        timeScale = previousTimeScale;
        paused = false;
      }
    }

    function updateHUD(aliveCount, avgDist) {
      hudContent.innerHTML = `
        <div>timeScale: <b>${timeScale.toFixed(2)}</b></div>
        <div>simTime: <b>${simTime.toFixed(1)}</b></div>
        <div>palette: <b>${currentPaletteName}</b></div>
        <div>alive: <b>${aliveCount}</b></div>
        <div>bloom: <b>${bloomEnabled ? "ON" : "OFF"}</b></div>
        <div>camera: <b>${cameraMode.toUpperCase()}</b></div>
      `;

      const min = -2.0;
      const max = 3.0;
      const normalized = (timeScale - min) / (max - min);
      const clamped = Math.max(0, Math.min(1, normalized));
      timeBarMarker.style.left = `${clamped * 100}%`;
      timeBarMarker.style.background = timeScale < 0 ? "#4db8ff" : timeScale > 0 ? "#ff7bff" : "#ffffff";

      window.__3D_STATE__ = {
        particleCount: PARTICLE_COUNT,
        aliveCount,
        timeScale,
        simTime,
        paused,
        palette: currentPaletteName,
        bloomEnabled,
        cameraMode,
        cameraDistance: camera.position.length(),
        explosionCount,
        avgParticleDistance: avgDist,
        frameCount,
        previousTimeScale
      };
    }

    window.__3D_STATE__ = {
      particleCount: PARTICLE_COUNT,
      aliveCount: PARTICLE_COUNT,
      timeScale,
      simTime,
      paused,
      palette: currentPaletteName,
      bloomEnabled,
      cameraMode,
      cameraDistance: camera.position.length(),
      explosionCount,
      avgParticleDistance: 0,
      frameCount,
      previousTimeScale
    };

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (e.key === "ArrowUp") {
        timeScale = Math.min(3.0, timeScale + 0.25);
        if (timeScale !== 0) {
          previousTimeScale = timeScale;
          paused = false;
        }
      } else if (e.key === "ArrowDown") {
        timeScale = Math.max(-2.0, timeScale - 0.25);
        if (timeScale !== 0) {
          previousTimeScale = timeScale;
          paused = false;
        }
      } else if (e.code === "Space") {
        e.preventDefault();
        togglePause();
      } else if (key === "r") {
        resetParticles();
      } else if (key === "1") {
        applyPalette("fire");
      } else if (key === "2") {
        applyPalette("ocean");
      } else if (key === "3") {
        applyPalette("forest");
      } else if (key === "4") {
        applyPalette("galaxy");
      } else if (key === "5") {
        applyPalette("monochrome");
      } else if (key === "b") {
        bloomEnabled = !bloomEnabled;
        material.uniforms.uBloomBoost.value = bloomEnabled ? 1.0 : 0.7;
      } else if (key === "e") {
        triggerExplosion();
      } else if (key === "c") {
        cameraMode = cameraMode === "static" ? "orbit" : "static";
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      bloomPass.setSize(window.innerWidth, window.innerHeight);
      material.uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio, 2);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.033);
      const scaledDt = dt * timeScale;
      simTime += scaledDt;
      frameCount++;

      let aliveCount = 0;
      let totalDistance = 0;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        let x = positions[i * 3 + 0];
        let y = positions[i * 3 + 1];
        let z = positions[i * 3 + 2];

        if (lives[i] > 0) aliveCount++;

        if (timeScale !== 0) {
          const flow = flowField(x, y, z, simTime);
          velocities[i].lerp(flow, 0.12);

          x += velocities[i].x * scaledDt * 8.0;
          y += velocities[i].y * scaledDt * 8.0;
          z += velocities[i].z * scaledDt * 8.0;

          const dist = Math.sqrt(x * x + y * y + z * z);
          if (dist > 42) {
            velocities[i].addScaledVector(new THREE.Vector3(-x, -y, -z).normalize(), 0.08);
          }

          lives[i] -= Math.abs(scaledDt) * (0.14 + (dist / 80) * 0.05);

          if (lives[i] <= 0) {
            respawnParticle(i);
            x = positions[i * 3 + 0];
            y = positions[i * 3 + 1];
            z = positions[i * 3 + 2];
          } else {
            positions[i * 3 + 0] = x;
            positions[i * 3 + 1] = y;
            positions[i * 3 + 2] = z;
            alphas[i] = Math.max(0, Math.min(1, lives[i]));
          }
        }

        const d = Math.sqrt(
          positions[i * 3 + 0] * positions[i * 3 + 0] +
          positions[i * 3 + 1] * positions[i * 3 + 1] +
          positions[i * 3 + 2] * positions[i * 3 + 2]
        );
        totalDistance += d;
      }

      if (cameraMode === "orbit") {
        orbitAngle += dt * 0.18;
        camera.position.x = Math.cos(orbitAngle) * 80;
        camera.position.z = Math.sin(orbitAngle) * 80;
        camera.position.y = Math.sin(orbitAngle * 0.6) * 12;
        camera.lookAt(0, 0, 0);
      } else {
        camera.position.lerp(new THREE.Vector3(0, 0, 80), 0.05);
        camera.lookAt(0, 0, 0);
      }

      geometry.attributes.position.needsUpdate = true;
      geometry.attributes.alpha.needsUpdate = true;
      geometry.attributes.color.needsUpdate = true;

      const avgDist = totalDistance / PARTICLE_COUNT;
      updateHUD(aliveCount, avgDist);

      if (bloomEnabled) {
        composer.render();
      } else {
        renderer.render(scene, camera);
      }
    }

    updateHUD(PARTICLE_COUNT, SPHERE_RADIUS * 0.75);
    animate();
  </script>
</body>
</html>
