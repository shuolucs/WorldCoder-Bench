<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 1D Spring-Mass Chain</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111122;
      font-family: Arial, sans-serif;
    }

    body {
      background:
        linear-gradient(to bottom, #1a1a2e 0%, #16213e 100%);
    }

    #app {
      width: 100%;
      height: 100%;
      display: block;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.6);
      color: #0f0;
      font-family: monospace;
      padding: 10px;
      border-radius: 6px;
      z-index: 100;
      pointer-events: none;
      line-height: 1.45;
      min-width: 220px;
    }

    #controls {
      position: fixed;
      right: 12px;
      bottom: 12px;
      background: rgba(10, 10, 20, 0.82);
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      z-index: 100;
      width: 280px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }

    #controls h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      font-weight: 600;
    }

    .control-row {
      margin-bottom: 10px;
    }

    .control-row label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 4px;
      gap: 8px;
    }

    .control-row input[type="range"] {
      width: 100%;
    }

    .hint {
      font-size: 12px;
      color: #c8d6ff;
      margin-top: 8px;
      line-height: 1.35;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <canvas id="app"></canvas>

  <div id="hud">
    <div>Wave Speed: <span id="hud-wavespeed">0.000</span></div>
    <div>Max Displacement: <span id="hud-maxdisp">0.000</span></div>
    <div>Total Energy: <span id="hud-energy">0.000</span></div>
    <div>Mode: <span id="hud-mode">Idle</span></div>
    <div>Frame Count: <span id="hud-framecount">0</span></div>
    <div>Paused: <span id="hud-paused">No</span></div>
  </div>

  <div id="controls">
    <h3>Spring-Mass Controls</h3>

    <div class="control-row">
      <label>
        <span>Stiffness</span>
        <span id="label-stiffness">40</span>
      </label>
      <input id="slider-stiffness" type="range" min="5" max="200" value="40" step="1" />
    </div>

    <div class="control-row">
      <label>
        <span>Mass Count</span>
        <span id="label-masscount">20</span>
      </label>
      <input id="slider-masscount" type="range" min="5" max="50" value="20" step="1" />
    </div>

    <div class="control-row">
      <label>
        <span>Damping</span>
        <span id="label-damping">0.5</span>
      </label>
      <input id="slider-damping" type="range" min="0" max="5" value="0.5" step="0.1" />
    </div>

    <div class="control-row">
      <label>
        <span>Drive Frequency</span>
        <span id="label-drivefreq">1.0</span>
      </label>
      <input id="slider-drivefreq" type="range" min="0.1" max="5.0" value="1.0" step="0.1" />
    </div>

    <div class="control-row">
      <label>
        <span>Boundary</span>
        <span id="label-boundary">Fixed</span>
      </label>
      <input id="slider-boundary" type="range" min="0" max="1" value="0" step="1" />
    </div>

    <div class="hint">
      Keys: <b>Space</b> = Pluck, <b>Enter</b> = Toggle drive, <b>R</b> = Reset, <b>P</b> = Pause
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ----------------------------
    // Basic scene setup
    // ----------------------------
    const canvas = document.getElementById('app');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111122);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 7);
    scene.add(directionalLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const grid = new THREE.GridHelper(40, 40, 0x666688, 0x444455);
    grid.position.y = -2;
    grid.material.transparent = true;
    grid.material.opacity = 0.22;
    scene.add(grid);

    // ----------------------------
    // UI refs
    // ----------------------------
    const sliderStiffness = document.getElementById('slider-stiffness');
    const sliderMassCount = document.getElementById('slider-masscount');
    const sliderDamping = document.getElementById('slider-damping');
    const sliderDriveFreq = document.getElementById('slider-drivefreq');
    const sliderBoundary = document.getElementById('slider-boundary');

    const labelStiffness = document.getElementById('label-stiffness');
    const labelMassCount = document.getElementById('label-masscount');
    const labelDamping = document.getElementById('label-damping');
    const labelDriveFreq = document.getElementById('label-drivefreq');
    const labelBoundary = document.getElementById('label-boundary');

    const hudWaveSpeed = document.getElementById('hud-wavespeed');
    const hudMaxDisp = document.getElementById('hud-maxdisp');
    const hudEnergy = document.getElementById('hud-energy');
    const hudMode = document.getElementById('hud-mode');
    const hudFrameCount = document.getElementById('hud-framecount');
    const hudPaused = document.getElementById('hud-paused');

    function setSliderValueAndDispatch(slider, value) {
      slider.value = value;
      slider.dispatchEvent(new Event('input', { bubbles: true }));
    }

    // ----------------------------
    // Simulation parameters
    // ----------------------------
    const restLength = 0.8;
    const massValue = 1.0;
    const dt = 1 / 60;
    const maxSubsteps = 4;
    const pluckAmplitude = 2.0;
    const driveAmplitude = 1.5;

    let frameCount = 0;
    let isPaused = false;
    let simTime = 0;

    let N = 20;
    let k = 40.0;
    let damping = 0.5;
    let driveFreq = 1.0;
    let boundaryCondition = 'fixed'; // 'fixed' or 'free'
    let mode = 'idle'; // 'idle' | 'pluck' | 'driven'
    let driveActive = false;

    // ----------------------------
    // Chain data
    // ----------------------------
    let masses = [];
    let chainGroup = new THREE.Group();
    scene.add(chainGroup);

    let sphereMeshes = [];
    let trailLines = [];
    let springLines = [];

    const sphereGeometry = new THREE.SphereGeometry(0.25, 20, 20);

    function lerpColor(c1, c2, t) {
      return new THREE.Color().copy(c1).lerp(c2, THREE.MathUtils.clamp(t, 0, 1));
    }

    function displacementColor(y) {
      const maxRef = 2.0;
      const t = THREE.MathUtils.clamp(Math.abs(y) / maxRef, 0, 1);
      const white = new THREE.Color(0xffffff);
      const blue = new THREE.Color(0x2196f3);
      const red = new THREE.Color(0xf44336);
      return y >= 0 ? lerpColor(white, red, t) : lerpColor(white, blue, t);
    }

    function springColor(delta) {
      const neutral = new THREE.Color(0x888888);
      const compressed = new THREE.Color(0xff9800);
      const extended = new THREE.Color(0x00bcd4);
      const ref = 1.5;
      const t = THREE.MathUtils.clamp(Math.abs(delta) / ref, 0, 1);
      return delta >= 0 ? lerpColor(neutral, extended, t) : lerpColor(neutral, compressed, t);
    }

    function createMass(x) {
      return { x, y: 0, vy: 0 };
    }

    function clearChainVisuals() {
      chainGroup.clear();
      sphereMeshes = [];
      trailLines = [];
      springLines = [];
    }

    function buildChain() {
      clearChainVisuals();
      masses = [];

      for (let i = 0; i < N; i++) {
        const x = (i - N / 2) * restLength;
        masses.push(createMass(x));
      }

      // Springs
      for (let i = 0; i < N - 1; i++) {
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(6);
        const colors = new Float32Array(6);
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.LineBasicMaterial({
          vertexColors: true,
          transparent: true,
          opacity: 0.95
        });

        const line = new THREE.Line(geometry, material);
        springLines.push(line);
        chainGroup.add(line);
      }

      // Trails
      for (let i = 0; i < N; i++) {
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(6);
        const colors = new Float32Array(6);
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.LineBasicMaterial({
          vertexColors: true,
          transparent: true,
          opacity: 0.6
        });

        const line = new THREE.Line(geometry, material);
        trailLines.push(line);
        chainGroup.add(line);
      }

      // Masses
      for (let i = 0; i < N; i++) {
        const material = new THREE.MeshPhongMaterial({
          color: 0xffffff,
          shininess: 80
        });
        const mesh = new THREE.Mesh(sphereGeometry, material);
        sphereMeshes.push(mesh);
        chainGroup.add(mesh);
      }

      updateVisuals();
    }

    function resetSystem() {
      for (let i = 0; i < N; i++) {
        masses[i].y = 0;
        masses[i].vy = 0;
      }
      simTime = 0;
      if (!driveActive) mode = 'idle';
      updateVisuals();
    }

    function leftMovableIndex() {
      return boundaryCondition === 'fixed' ? 1 : 0;
    }

    function rightMovableIndex() {
      return boundaryCondition === 'fixed' ? N - 2 : N - 1;
    }

    function pluck() {
      resetSystem();
      const idx = leftMovableIndex();
      if (masses[idx]) {
        masses[idx].y = pluckAmplitude;
        masses[idx].vy = 0;
      }
      driveActive = false;
      mode = 'pluck';
    }

    function computeForces() {
      const forces = new Array(N).fill(0);

      for (let i = 0; i < N; i++) {
        if (i > 0) {
          forces[i] += -k * (masses[i].y - masses[i - 1].y);
        }
        if (i < N - 1) {
          forces[i] += -k * (masses[i].y - masses[i + 1].y);
        }
      }

      return forces;
    }

    function stepSimulation(stepDt) {
      if (boundaryCondition === 'fixed') {
        masses[0].y = 0;
        masses[0].vy = 0;
        masses[N - 1].y = 0;
        masses[N - 1].vy = 0;
      }

      if (driveActive && N > 0) {
        const driveY = driveAmplitude * Math.sin(2 * Math.PI * driveFreq * simTime);
        masses[0].y = driveY;
        masses[0].vy = 2 * Math.PI * driveFreq * driveAmplitude * Math.cos(2 * Math.PI * driveFreq * simTime);
      }

      const forces = computeForces();

      for (let i = 0; i < N; i++) {
        const fixedBoundaryMass =
          boundaryCondition === 'fixed' && (i === 0 || i === N - 1);
        const drivenMass = driveActive && i === 0;

        if (fixedBoundaryMass || drivenMass) continue;

        const ay = forces[i] / massValue;
        masses[i].vy += ay * stepDt;
        masses[i].vy *= Math.max(0, 1 - damping * stepDt);
        masses[i].y += masses[i].vy * stepDt;
      }

      if (boundaryCondition === 'fixed') {
        masses[0].y = 0;
        masses[0].vy = 0;
        masses[N - 1].y = 0;
        masses[N - 1].vy = 0;
      }

      if (driveActive && N > 0) {
        const driveY = driveAmplitude * Math.sin(2 * Math.PI * driveFreq * simTime);
        masses[0].y = driveY;
      }

      simTime += stepDt;
    }

    function updateVisuals() {
      for (let i = 0; i < N; i++) {
        const m = masses[i];
        const mesh = sphereMeshes[i];
        mesh.position.set(m.x, m.y, 0);

        const c = displacementColor(m.y);
        mesh.material.color.copy(c);

        const trail = trailLines[i];
        const pos = trail.geometry.attributes.position.array;
        pos[0] = m.x; pos[1] = 0;   pos[2] = 0;
        pos[3] = m.x; pos[4] = m.y; pos[5] = 0;

        const alphaLike = THREE.MathUtils.clamp(Math.abs(m.y) / 2.0, 0.05, 1.0);
        const tc = c.clone().lerp(new THREE.Color(0xffffff), 0.25).multiplyScalar(0.35 + 0.65 * alphaLike);
        const col = trail.geometry.attributes.color.array;
        col[0] = tc.r; col[1] = tc.g; col[2] = tc.b;
        col[3] = tc.r; col[4] = tc.g; col[5] = tc.b;

        trail.material.opacity = 0.1 + 0.45 * alphaLike;
        trail.geometry.attributes.position.needsUpdate = true;
        trail.geometry.attributes.color.needsUpdate = true;
      }

      for (let i = 0; i < N - 1; i++) {
        const a = masses[i];
        const b = masses[i + 1];
        const line = springLines[i];
        const pos = line.geometry.attributes.position.array;

        pos[0] = a.x; pos[1] = a.y; pos[2] = 0;
        pos[3] = b.x; pos[4] = b.y; pos[5] = 0;

        const delta = (b.y - a.y);
        const c = springColor(delta);
        const col = line.geometry.attributes.color.array;
        col[0] = c.r; col[1] = c.g; col[2] = c.b;
        col[3] = c.r; col[4] = c.g; col[5] = c.b;

        line.geometry.attributes.position.needsUpdate = true;
        line.geometry.attributes.color.needsUpdate = true;
      }
    }

    function computeEnergy() {
      let ke = 0;
      let pe = 0;

      for (let i = 0; i < N; i++) {
        ke += 0.5 * massValue * masses[i].vy * masses[i].vy;
      }

      for (let i = 0; i < N - 1; i++) {
        const dy = masses[i + 1].y - masses[i].y;
        pe += 0.5 * k * dy * dy;
      }

      return ke + pe;
    }

    function computeMaxDisp() {
      let maxDisp = 0;
      for (let i = 0; i < N; i++) {
        maxDisp = Math.max(maxDisp, Math.abs(masses[i].y));
      }
      return maxDisp;
    }

    function getWaveSpeed() {
      return Math.sqrt(k / massValue) * restLength;
    }

    function updateHUD() {
      const waveSpeed = getWaveSpeed();
      const maxDisp = computeMaxDisp();
      const totalEnergy = computeEnergy();

      hudWaveSpeed.textContent = waveSpeed.toFixed(3);
      hudMaxDisp.textContent = maxDisp.toFixed(3);
      hudEnergy.textContent = totalEnergy.toFixed(3);
      hudMode.textContent =
        mode === 'idle' ? 'Idle' :
        mode === 'pluck' ? 'Pluck' : 'Driven';
      hudFrameCount.textContent = String(frameCount);
      hudPaused.textContent = isPaused ? 'Yes' : 'No';
    }

    function validateState(state) {
      function isFiniteNumber(v) {
        return typeof v === 'number' && Number.isFinite(v);
      }

      if (!Number.isInteger(state.frameCount)) return false;
      if (typeof state.isPaused !== 'boolean') return false;
      if (!Number.isInteger(state.massCount)) return false;
      if (!isFiniteNumber(state.stiffness)) return false;
      if (!isFiniteNumber(state.damping)) return false;
      if (typeof state.boundaryCondition !== 'string') return false;
      if (!isFiniteNumber(state.waveSpeed)) return false;
      if (!isFiniteNumber(state.maxDisplacement)) return false;
      if (!isFiniteNumber(state.totalEnergy)) return false;
      if (typeof state.mode !== 'string') return false;
      if (!isFiniteNumber(state.driveFrequency)) return false;
      if (!Array.isArray(state.masses)) return false;

      for (const m of state.masses) {
        if (!isFiniteNumber(m.x) || !isFiniteNumber(m.y) || !isFiniteNumber(m.vy)) {
          return false;
        }
      }
      return true;
    }

    function updateGlobalState() {
      const state = {
        frameCount,
        isPaused,
        massCount: N,
        stiffness: k,
        damping,
        boundaryCondition,
        waveSpeed: getWaveSpeed(),
        maxDisplacement: computeMaxDisp(),
        totalEnergy: computeEnergy(),
        mode,
        driveFrequency: driveFreq,
        masses: masses.map(m => ({ x: m.x, y: m.y, vy: m.vy })),
        isValid: true
      };
      state.isValid = validateState(state);
      window.__3D_STATE__ = state;
    }

    // ----------------------------
    // Slider bindings
    // ----------------------------
    sliderStiffness.addEventListener('input', () => {
      k = parseFloat(sliderStiffness.value);
      labelStiffness.textContent = k.toFixed(0);
    });

    sliderMassCount.addEventListener('input', () => {
      N = parseInt(sliderMassCount.value, 10);
      labelMassCount.textContent = String(N);
      buildChain();
      resetSystem();
    });

    sliderDamping.addEventListener('input', () => {
      damping = parseFloat(sliderDamping.value);
      labelDamping.textContent = damping.toFixed(1);
    });

    sliderDriveFreq.addEventListener('input', () => {
      driveFreq = parseFloat(sliderDriveFreq.value);
      labelDriveFreq.textContent = driveFreq.toFixed(1);
    });

    sliderBoundary.addEventListener('input', () => {
      boundaryCondition = parseInt(sliderBoundary.value, 10) === 0 ? 'fixed' : 'free';
      labelBoundary.textContent = boundaryCondition === 'fixed' ? 'Fixed' : 'Free';
      resetSystem();
    });

    // Initialize labels via dispatched input
    setSliderValueAndDispatch(sliderStiffness, sliderStiffness.value);
    setSliderValueAndDispatch(sliderMassCount, sliderMassCount.value);
    setSliderValueAndDispatch(sliderDamping, sliderDamping.value);
    setSliderValueAndDispatch(sliderDriveFreq, sliderDriveFreq.value);
    setSliderValueAndDispatch(sliderBoundary, sliderBoundary.value);

    // ----------------------------
    // Keyboard controls
    // ----------------------------
    window.addEventListener('keydown', (e) => {
      if (e.repeat) return;

      if (e.code === 'Space') {
        e.preventDefault();
        pluck();
      } else if (e.code === 'Enter') {
        e.preventDefault();
        driveActive = !driveActive;
        if (driveActive) {
          resetSystem();
          mode = 'driven';
        } else {
          mode = 'idle';
        }
      } else if (e.code === 'KeyR') {
        resetSystem();
        driveActive = false;
        mode = 'idle';
      } else if (e.code === 'KeyP') {
        isPaused = !isPaused;
      }
    });

    // ----------------------------
    // Resize
    // ----------------------------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ----------------------------
    // Init
    // ----------------------------
    buildChain();
    resetSystem();

    // ----------------------------
    // Animation loop
    // ----------------------------
    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      if (!isPaused) {
        for (let i = 0; i < maxSubsteps; i++) {
          stepSimulation(dt / maxSubsteps);
        }

        if (!driveActive) {
          const maxDisp = computeMaxDisp();
          if (mode !== 'idle' && maxDisp < 1e-3) {
            mode = 'idle';
          }
        }
      }

      updateVisuals();
      updateHUD();
      updateGlobalState();

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
