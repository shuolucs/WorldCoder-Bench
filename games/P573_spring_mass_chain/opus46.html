<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spring-Mass Chain Wave Simulation</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
  body { margin: 0; overflow: hidden; background: #111122; }
  canvas { display: block; }

  #hud {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.6);
    color: #0f0;
    font-family: monospace;
    padding: 10px;
    border-radius: 6px;
    z-index: 100;
    pointer-events: none;
    font-size: 13px;
    line-height: 1.6;
  }

  #controls {
    position: fixed;
    bottom: 10px;
    right: 10px;
    background: rgba(0,0,0,0.7);
    color: #ccc;
    font-family: monospace;
    padding: 12px;
    border-radius: 8px;
    z-index: 100;
    font-size: 12px;
    min-width: 240px;
  }
  #controls label {
    display: block;
    margin-bottom: 6px;
  }
  #controls input[type="range"] {
    width: 100%;
    margin-top: 2px;
  }
  #controls .slider-row {
    margin-bottom: 10px;
  }
  #controls .slider-label {
    display: flex;
    justify-content: space-between;
  }
  #instructions {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    color: #aaa;
    font-family: monospace;
    padding: 10px;
    border-radius: 6px;
    z-index: 100;
    pointer-events: none;
    font-size: 11px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div id="hud">
  <div>Wave Speed: <span id="hud-wavespeed">0.00</span> u/s</div>
  <div>Max Displacement: <span id="hud-maxdisp">0.00</span></div>
  <div>Total Energy: <span id="hud-energy">0.00</span></div>
  <div>Mode: <span id="hud-mode">Idle</span></div>
  <div>Frame: <span id="hud-framecount">0</span></div>
  <div>Paused: <span id="hud-paused">No</span></div>
</div>

<div id="instructions">
  [Space] Pluck &nbsp; [Enter] Drive<br>
  [R] Reset &nbsp; [P] Pause
</div>

<div id="controls">
  <div class="slider-row">
    <div class="slider-label"><span>Stiffness</span><span id="val-stiffness">40</span></div>
    <input type="range" id="slider-stiffness" min="5" max="200" value="40" step="1">
  </div>
  <div class="slider-row">
    <div class="slider-label"><span>Mass Count</span><span id="val-masscount">20</span></div>
    <input type="range" id="slider-masscount" min="5" max="50" value="20" step="1">
  </div>
  <div class="slider-row">
    <div class="slider-label"><span>Damping</span><span id="val-damping">0.5</span></div>
    <input type="range" id="slider-damping" min="0" max="5" value="0.5" step="0.1">
  </div>
  <div class="slider-row">
    <div class="slider-label"><span>Drive Frequency</span><span id="val-drivefreq">1.0</span></div>
    <input type="range" id="slider-drivefreq" min="0.1" max="5.0" value="1.0" step="0.1">
  </div>
  <div class="slider-row">
    <div class="slider-label"><span>Boundary</span><span id="val-boundary">Fixed</span></div>
    <input type="range" id="slider-boundary" min="0" max="1" value="0" step="1">
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111122);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambLight);

// Grid
const grid = new THREE.GridHelper(40, 40, 0x444466, 0x333355);
grid.position.y = -2;
grid.material.opacity = 0.3;
grid.material.transparent = true;
scene.add(grid);

// --- Simulation State ---
let N = 20;
let stiffness = 40.0;
let damping = 0.5;
let driveFreq = 1.0;
let boundaryCondition = 'fixed'; // 'fixed' or 'free'
let restLength = 0.8;
let massValue = 1.0;
let mode = 'idle'; // 'idle', 'pluck', 'driven'
let isPaused = false;
let frameCount = 0;
let simTime = 0;

let positions = []; // y displacements
let velocities = []; // vy
let xPositions = []; // equilibrium x

// 3D objects
let massMeshes = [];
let springLines = [];
let trailLines = [];

const sphereGeom = new THREE.SphereGeometry(0.25, 16, 12);

// Colors
const colorBlue = new THREE.Color(0x2196f3);
const colorWhite = new THREE.Color(0xffffff);
const colorRed = new THREE.Color(0xf44336);
const colorOrange = new THREE.Color(0xff9800);
const colorGray = new THREE.Color(0x888888);
const colorCyan = new THREE.Color(0x00bcd4);

function buildChain() {
  // Remove old objects
  massMeshes.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
  springLines.forEach(l => { scene.remove(l); l.geometry.dispose(); l.material.dispose(); });
  trailLines.forEach(l => { scene.remove(l); l.geometry.dispose(); l.material.dispose(); });
  massMeshes = [];
  springLines = [];
  trailLines = [];

  positions = new Float64Array(N);
  velocities = new Float64Array(N);
  xPositions = new Float64Array(N);

  for (let i = 0; i < N; i++) {
    xPositions[i] = (i - (N - 1) / 2) * restLength;
    positions[i] = 0;
    velocities[i] = 0;
  }

  // Create mass meshes
  for (let i = 0; i < N; i++) {
    const mat = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 60 });
    const mesh = new THREE.Mesh(sphereGeom, mat);
    mesh.position.set(xPositions[i], 0, 0);
    scene.add(mesh);
    massMeshes.push(mesh);
  }

  // Create spring lines
  for (let i = 0; i < N - 1; i++) {
    const geom = new THREE.BufferGeometry();
    const verts = new Float32Array(6);
    geom.setAttribute('position', new THREE.BufferAttribute(verts, 3));
    const mat = new THREE.LineBasicMaterial({ color: 0x888888, linewidth: 2 });
    const line = new THREE.Line(geom, mat);
    scene.add(line);
    springLines.push(line);
  }

  // Create trail lines (vertical lines from equilibrium to current y)
  for (let i = 0; i < N; i++) {
    const geom = new THREE.BufferGeometry();
    const verts = new Float32Array(6);
    geom.setAttribute('position', new THREE.BufferAttribute(verts, 3));
    const mat = new THREE.LineBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.0 });
    const line = new THREE.Line(geom, mat);
    scene.add(line);
    trailLines.push(line);
  }

  simTime = 0;
  mode = 'idle';
}

function getDisplacementColor(y) {
  const maxY = 2.5;
  const t = Math.max(-1, Math.min(1, y / maxY));
  const color = new THREE.Color();
  if (t < 0) {
    color.copy(colorWhite).lerp(colorBlue, -t);
  } else {
    color.copy(colorWhite).lerp(colorRed, t);
  }
  return color;
}

function getSpringColor(extension) {
  // extension > 0 means extended, < 0 means compressed
  const maxExt = 1.5;
  const t = Math.max(-1, Math.min(1, extension / maxExt));
  const color = new THREE.Color();
  if (t < 0) {
    color.copy(colorGray).lerp(colorOrange, -t);
  } else {
    color.copy(colorGray).lerp(colorCyan, t);
  }
  return color;
}

function physicsStep(dt) {
  const subSteps = 4;
  const subDt = dt / subSteps;

  for (let s = 0; s < subSteps; s++) {
    // Compute forces
    const forces = new Float64Array(N);

    for (let i = 0; i < N; i++) {
      // Left neighbor
      if (i > 0) {
        forces[i] += -stiffness * (positions[i] - positions[i - 1]);
      }
      // Right neighbor
      if (i < N - 1) {
        forces[i] += -stiffness * (positions[i] - positions[i + 1]);
      }
    }

    // Update velocities and positions (symplectic Euler)
    for (let i = 0; i < N; i++) {
      let isBoundaryFixed = false;

      if (boundaryCondition === 'fixed') {
        if (i === 0 || i === N - 1) {
          isBoundaryFixed = true;
        }
      }

      // Driven mode overrides left boundary
      if (mode === 'driven' && i === 0) {
        isBoundaryFixed = true; // handled separately
      }

      if (isBoundaryFixed && mode !== 'driven') {
        positions[i] = 0;
        velocities[i] = 0;
        continue;
      }

      if (mode === 'driven' && i === 0) {
        simTime += (s === 0 ? 0 : 0); // simTime updated outside
        positions[i] = 1.5 * Math.sin(2 * Math.PI * driveFreq * simTime);
        velocities[i] = 1.5 * 2 * Math.PI * driveFreq * Math.cos(2 * Math.PI * driveFreq * simTime);
        continue;
      }

      // Apply damping
      velocities[i] *= (1 - damping * subDt);

      // Symplectic Euler: update velocity first, then position
      velocities[i] += (forces[i] / massValue) * subDt;
      positions[i] += velocities[i] * subDt;
    }
  }

  if (mode === 'driven') {
    simTime += dt;
  } else {
    simTime += dt;
  }
}

function computeEnergy() {
  let ke = 0;
  let pe = 0;
  for (let i = 0; i < N; i++) {
    ke += 0.5 * massValue * velocities[i] * velocities[i];
  }
  for (let i = 0; i < N - 1; i++) {
    const dy = positions[i] - positions[i + 1];
    pe += 0.5 * stiffness * dy * dy;
  }
  return ke + pe;
}

function computeMaxDisp() {
  let maxD = 0;
  for (let i = 0; i < N; i++) {
    const a = Math.abs(positions[i]);
    if (a > maxD) maxD = a;
  }
  return maxD;
}

function computeWaveSpeed() {
  return Math.sqrt(stiffness / massValue) * restLength;
}

function updateVisuals() {
  for (let i = 0; i < N; i++) {
    const mesh = massMeshes[i];
    mesh.position.y = positions[i];
    mesh.material.color.copy(getDisplacementColor(positions[i]));
  }

  for (let i = 0; i < N - 1; i++) {
    const line = springLines[i];
    const posAttr = line.geometry.getAttribute('position');
    posAttr.array[0] = xPositions[i];
    posAttr.array[1] = positions[i];
    posAttr.array[2] = 0;
    posAttr.array[3] = xPositions[i + 1];
    posAttr.array[4] = positions[i + 1];
    posAttr.array[5] = 0;
    posAttr.needsUpdate = true;

    const extension = positions[i + 1] - positions[i]; // vertical difference as proxy
    line.material.color.copy(getSpringColor(extension));
  }

  for (let i = 0; i < N; i++) {
    const line = trailLines[i];
    const posAttr = line.geometry.getAttribute('position');
    posAttr.array[0] = xPositions[i];
    posAttr.array[1] = 0;
    posAttr.array[2] = 0;
    posAttr.array[3] = xPositions[i];
    posAttr.array[4] = positions[i];
    posAttr.array[5] = 0;
    posAttr.needsUpdate = true;

    const alpha = Math.min(1.0, Math.abs(positions[i]) / 1.5);
    line.material.opacity = alpha * 0.6;
  }
}

function updateHUD() {
  const ws = computeWaveSpeed();
  const maxD = computeMaxDisp();
  const energy = computeEnergy();

  document.getElementById('hud-wavespeed').textContent = ws.toFixed(2);
  document.getElementById('hud-maxdisp').textContent = maxD.toFixed(4);
  document.getElementById('hud-energy').textContent = energy.toFixed(4);
  document.getElementById('hud-mode').textContent = mode.charAt(0).toUpperCase() + mode.slice(1);
  document.getElementById('hud-framecount').textContent = frameCount;
  document.getElementById('hud-paused').textContent = isPaused ? 'Yes' : 'No';
}

function updateState() {
  const ws = computeWaveSpeed();
  const maxD = computeMaxDisp();
  const energy = computeEnergy();

  const massesArr = [];
  let isValid = true;
  for (let i = 0; i < N; i++) {
    const x = xPositions[i];
    const y = positions[i];
    const vy = velocities[i];
    if (!isFinite(x) || !isFinite(y) || !isFinite(vy)) isValid = false;
    massesArr.push({ x, y, vy });
  }
  if (!isFinite(ws) || !isFinite(maxD) || !isFinite(energy)) isValid = false;

  window.__3D_STATE__ = {
    frameCount,
    isPaused,
    massCount: N,
    stiffness,
    damping,
    boundaryCondition,
    waveSpeed: ws,
    maxDisplacement: maxD,
    totalEnergy: energy,
    mode,
    driveFrequency: driveFreq,
    masses: massesArr,
    isValid
  };
}

// --- Slider Handlers ---
const sliderStiffness = document.getElementById('slider-stiffness');
const sliderMassCount = document.getElementById('slider-masscount');
const sliderDamping = document.getElementById('slider-damping');
const sliderDriveFreq = document.getElementById('slider-drivefreq');
const sliderBoundary = document.getElementById('slider-boundary');

sliderStiffness.addEventListener('input', () => {
  stiffness = parseFloat(sliderStiffness.value);
  document.getElementById('val-stiffness').textContent = sliderStiffness.value;
});

sliderMassCount.addEventListener('input', () => {
  N = parseInt(sliderMassCount.value);
  document.getElementById('val-masscount').textContent = sliderMassCount.value;
  buildChain();
});

sliderDamping.addEventListener('input', () => {
  damping = parseFloat(sliderDamping.value);
  document.getElementById('val-damping').textContent = sliderDamping.value;
});

sliderDriveFreq.addEventListener('input', () => {
  driveFreq = parseFloat(sliderDriveFreq.value);
  document.getElementById('val-drivefreq').textContent = parseFloat(sliderDriveFreq.value).toFixed(1);
});

sliderBoundary.addEventListener('input', () => {
  const val = parseInt(sliderBoundary.value);
  boundaryCondition = val === 0 ? 'fixed' : 'free';
  document.getElementById('val-boundary').textContent = val === 0 ? 'Fixed' : 'Free';
});

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    // Pluck: displace leftmost movable mass
    mode = 'pluck';
    const idx = boundaryCondition === 'fixed' ? 1 : 0;
    positions[idx] = 2.0;
    velocities[idx] = 0;
  } else if (e.code === 'Enter') {
    e.preventDefault();
    if (mode === 'driven') {
      mode = 'idle';
    } else {
      mode = 'driven';
      simTime = 0;
    }
  } else if (e.code === 'KeyR') {
    e.preventDefault();
    for (let i = 0; i < N; i++) {
      positions[i] = 0;
      velocities[i] = 0;
    }
    mode = 'idle';
    simTime = 0;
  } else if (e.code === 'KeyP') {
    e.preventDefault();
    isPaused = !isPaused;
  }
});

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Init ---
buildChain();

// --- Animation Loop ---
const dt = 1 / 60;

function animate() {
  requestAnimationFrame(animate);

  frameCount++;

  if (!isPaused) {
    physicsStep(dt);
  }

  updateVisuals();
  updateHUD();
  updateState();

  controls.update();
  renderer.render(scene, camera);
}

// Initialize state
window.__3D_STATE__ = {
  frameCount: 0,
  isPaused: false,
  massCount: N,
  stiffness,
  damping,
  boundaryCondition,
  waveSpeed: computeWaveSpeed(),
  maxDisplacement: 0,
  totalEnergy: 0,
  mode: 'idle',
  driveFrequency: driveFreq,
  masses: [],
  isValid: true
};

animate();
</script>
</body>
</html>
