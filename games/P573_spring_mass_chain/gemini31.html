<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1D Spring-Mass Chain Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            color: white;
            font-family: sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #0f0;
            font-family: monospace;
            padding: 10px;
            border-radius: 6px;
            z-index: 100;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
        }
        #controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(20, 20, 30, 0.8);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            border: 1px solid #445;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .control-group {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 280px;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }
        label {
            font-size: 12px;
            flex: 1;
        }
        input[type=range] {
            flex: 1.5;
            margin: 0 10px;
        }
        .val-display {
            font-size: 12px;
            width: 40px;
            text-align: right;
            font-family: monospace;
        }
        #instructions {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            color: #aaa;
            pointer-events: none;
        }
        kbd {
            background: #333;
            padding: 2px 5px;
            border-radius: 3px;
            color: #fff;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud">
        <div>Wave Speed: <span id="hud-wavespeed">0.00</span> u/s</div>
        <div>Max Disp: <span id="hud-maxdisp">0.00</span></div>
        <div>Energy: <span id="hud-energy">0.00</span></div>
        <div>Mode: <span id="hud-mode">Idle</span></div>
        <div>Frame: <span id="hud-framecount">0</span></div>
        <div>Paused: <span id="hud-paused">No</span></div>
    </div>

    <div id="instructions">
        <kbd>Space</kbd> Pluck | <kbd>Enter</kbd> Toggle Drive | <kbd>R</kbd> Reset | <kbd>P</kbd> Pause
    </div>

    <div id="controls">
        <div class="control-group">
            <label for="slider-stiffness">Stiffness (k)</label>
            <input type="range" id="slider-stiffness" min="5" max="200" step="1" value="40">
            <span class="val-display" id="val-stiffness">40</span>
        </div>
        <div class="control-group">
            <label for="slider-masscount">Mass Count</label>
            <input type="range" id="slider-masscount" min="5" max="50" step="1" value="20">
            <span class="val-display" id="val-masscount">20</span>
        </div>
        <div class="control-group">
            <label for="slider-damping">Damping</label>
            <input type="range" id="slider-damping" min="0" max="5" step="0.1" value="0.5">
            <span class="val-display" id="val-damping">0.5</span>
        </div>
        <div class="control-group">
            <label for="slider-drivefreq">Drive Freq</label>
            <input type="range" id="slider-drivefreq" min="0.1" max="5.0" step="0.1" value="1.0">
            <span class="val-display" id="val-drivefreq">1.0</span>
        </div>
        <div class="control-group">
            <label for="slider-boundary">Boundary</label>
            <input type="range" id="slider-boundary" min="0" max="1" step="1" value="0">
            <span class="val-display" id="val-boundary">Fixed</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Global State & Parameters ---
        let N = 20;
        let k = 40.0;
        let damping = 0.5;
        let driveFreq = 1.0;
        let boundary = 'fixed'; // 'fixed' or 'free'
        const restLength = 0.8;
        const mass = 1.0;

        let isPaused = false;
        let mode = 'idle'; // 'idle', 'pluck', 'driven'
        let frameCount = 0;
        let simTime = 0;

        // Physics arrays
        let y = new Float32Array(N);
        let vy = new Float32Array(N);
        let x = new Float32Array(N);

        // Three.js objects
        let scene, camera, renderer, controls;
        let massMeshes = [];
        let springLines, trailLines;

        // Colors
        const colorBlue = new THREE.Color(0x2196f3);
        const colorWhite = new THREE.Color(0xffffff);
        const colorRed = new THREE.Color(0xf44336);
        const colorOrange = new THREE.Color(0xff9800);
        const colorGray = new THREE.Color(0x888888);
        const colorCyan = new THREE.Color(0x00bcd4);

        // DOM Elements
        const elWaveSpeed = document.getElementById('hud-wavespeed');
        const elMaxDisp = document.getElementById('hud-maxdisp');
        const elEnergy = document.getElementById('hud-energy');
        const elMode = document.getElementById('hud-mode');
        const elFrameCount = document.getElementById('hud-framecount');
        const elPaused = document.getElementById('hud-paused');

        init();
        animate();

        function init() {
            // Scene setup
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            // Background is handled by CSS on body, so we use alpha: true on renderer

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 20);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Lights
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambLight);

            // Grid
            const grid = new THREE.GridHelper(40, 40, 0x444444, 0x222222);
            grid.position.y = -2;
            grid.material.opacity = 0.3;
            grid.material.transparent = true;
            scene.add(grid);

            // Build initial chain
            buildChain();

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            setupUI();
            setupKeyboard();
        }

        function buildChain() {
            // Cleanup existing
            massMeshes.forEach(m => scene.remove(m));
            if (springLines) scene.remove(springLines);
            if (trailLines) scene.remove(trailLines);

            massMeshes = [];
            y = new Float32Array(N);
            vy = new Float32Array(N);
            x = new Float32Array(N);

            const sphereGeo = new THREE.SphereGeometry(0.25, 32, 16);
            const baseMat = new THREE.MeshPhongMaterial({ color: 0xffffff });

            for (let i = 0; i < N; i++) {
                x[i] = (i - N / 2) * restLength;
                let mesh = new THREE.Mesh(sphereGeo, baseMat.clone());
                mesh.position.set(x[i], 0, 0);
                scene.add(mesh);
                massMeshes.push(mesh);
            }

            // Springs Geometry
            const springGeo = new THREE.BufferGeometry();
            const springPos = new Float32Array((N - 1) * 2 * 3);
            const springCol = new Float32Array((N - 1) * 2 * 3);
            springGeo.setAttribute('position', new THREE.BufferAttribute(springPos, 3));
            springGeo.setAttribute('color', new THREE.BufferAttribute(springCol, 3));
            const springMat = new THREE.LineBasicMaterial({ vertexColors: true, linewidth: 2 });
            springLines = new THREE.LineSegments(springGeo, springMat);
            scene.add(springLines);

            // Trails Geometry (using 4-component color for alpha)
            const trailGeo = new THREE.BufferGeometry();
            const trailPos = new Float32Array(N * 2 * 3);
            const trailCol = new Float32Array(N * 2 * 4);
            trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
            trailGeo.setAttribute('color', new THREE.BufferAttribute(trailCol, 4));
            const trailMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, depthWrite: false });
            trailLines = new THREE.LineSegments(trailGeo, trailMat);
            scene.add(trailLines);

            resetSim();
        }

        function resetSim() {
            for (let i = 0; i < N; i++) {
                y[i] = 0;
                vy[i] = 0;
            }
            simTime = 0;
            mode = 'idle';
        }

        function setupUI() {
            const bindSlider = (id, valId, callback) => {
                const slider = document.getElementById(id);
                const display = document.getElementById(valId);
                slider.addEventListener('input', (e) => {
                    callback(e.target.value, display);
                });
            };

            bindSlider('slider-stiffness', 'val-stiffness', (v, d) => { k = parseFloat(v); d.textContent = k; });
            bindSlider('slider-masscount', 'val-masscount', (v, d) => { N = parseInt(v); d.textContent = N; buildChain(); });
            bindSlider('slider-damping', 'val-damping', (v, d) => { damping = parseFloat(v); d.textContent = parseFloat(v).toFixed(1); });
            bindSlider('slider-drivefreq', 'val-drivefreq', (v, d) => { driveFreq = parseFloat(v); d.textContent = parseFloat(v).toFixed(1); });
            bindSlider('slider-boundary', 'val-boundary', (v, d) => {
                boundary = parseInt(v) === 0 ? 'fixed' : 'free';
                d.textContent = boundary === 'fixed' ? 'Fixed' : 'Free';
                if (boundary === 'fixed') {
                    y[0] = 0; vy[0] = 0;
                    y[N - 1] = 0; vy[N - 1] = 0;
                }
            });
        }

        function setupKeyboard() {
            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    mode = 'pluck';
                    let idx = boundary === 'fixed' ? 1 : 0;
                    if (idx < N) {
                        y[idx] = 2.0;
                        vy[idx] = 0;
                    }
                } else if (e.code === 'Enter') {
                    mode = mode === 'driven' ? 'idle' : 'driven';
                    if (mode === 'driven') simTime = 0;
                } else if (e.code === 'KeyR') {
                    resetSim();
                } else if (e.code === 'KeyP') {
                    isPaused = !isPaused;
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updatePhysics() {
            if (isPaused) return;

            const dt = (1 / 60) / 4; // 4 sub-steps
            
            for (let step = 0; step < 4; step++) {
                simTime += dt;
                let forces = new Float32Array(N);

                // Calculate spring forces
                for (let i = 0; i < N; i++) {
                    let force = 0;
                    if (i > 0) force += -k * (y[i] - y[i - 1]);
                    if (i < N - 1) force += -k * (y[i] - y[i + 1]);
                    forces[i] = force;
                }

                // Integrate
                for (let i = 0; i < N; i++) {
                    let isLeft = (i === 0);
                    let isRight = (i === N - 1);

                    // Boundary conditions
                    if (boundary === 'fixed') {
                        if (isLeft && mode !== 'driven') continue;
                        if (isRight) continue;
                    }

                    // Drive
                    if (mode === 'driven' && isLeft) {
                        y[0] = 1.5 * Math.sin(2 * Math.PI * driveFreq * simTime);
                        vy[0] = 1.5 * 2 * Math.PI * driveFreq * Math.cos(2 * Math.PI * driveFreq * simTime);
                        continue;
                    }

                    // Symplectic Euler
                    vy[i] += (forces[i] / mass) * dt;
                    vy[i] *= (1 - damping * dt);
                    y[i] += vy[i] * dt;
                }
            }
        }

        function getMassColor(disp) {
            let c = new THREE.Color();
            if (disp < 0) {
                let t = Math.max(0, 1 + disp / 2.0);
                c.lerpColors(colorBlue, colorWhite, t);
            } else {
                let t = Math.min(1, disp / 2.0);
                c.lerpColors(colorWhite, colorRed, t);
            }
            return c;
        }

        function getSpringColor(dy) {
            let c = new THREE.Color();
            if (dy < 0) {
                let t = Math.max(0, 1 + dy);
                c.lerpColors(colorOrange, colorGray, t);
            } else {
                let t = Math.min(1, dy);
                c.lerpColors(colorGray, colorCyan, t);
            }
            return c;
        }

        function updateVisuals() {
            let tPos = trailLines.geometry.attributes.position.array;
            let tCol = trailLines.geometry.attributes.color.array;
            let sPos = springLines.geometry.attributes.position.array;
            let sCol = springLines.geometry.attributes.color.array;

            for (let i = 0; i < N; i++) {
                // Masses
                massMeshes[i].position.y = y[i];
                massMeshes[i].material.color = getMassColor(y[i]);

                // Trails
                let alpha = Math.min(1.0, Math.abs(y[i]) / 1.5);
                
                tPos[i * 6 + 0] = x[i]; tPos[i * 6 + 1] = 0; tPos[i * 6 + 2] = 0;
                tCol[i * 8 + 0] = 1; tCol[i * 8 + 1] = 1; tCol[i * 8 + 2] = 1; tCol[i * 8 + 3] = 0;

                tPos[i * 6 + 3] = x[i]; tPos[i * 6 + 4] = y[i]; tPos[i * 6 + 5] = 0;
                tCol[i * 8 + 4] = 1; tCol[i * 8 + 5] = 1; tCol[i * 8 + 6] = 1; tCol[i * 8 + 7] = alpha;

                // Springs
                if (i < N - 1) {
                    sPos[i * 6 + 0] = x[i]; sPos[i * 6 + 1] = y[i]; sPos[i * 6 + 2] = 0;
                    sPos[i * 6 + 3] = x[i + 1]; sPos[i * 6 + 4] = y[i + 1]; sPos[i * 6 + 5] = 0;

                    let dy = y[i + 1] - y[i];
                    let c = getSpringColor(dy);
                    sCol[i * 6 + 0] = c.r; sCol[i * 6 + 1] = c.g; sCol[i * 6 + 2] = c.b;
                    sCol[i * 6 + 3] = c.r; sCol[i * 6 + 4] = c.g; sCol[i * 6 + 5] = c.b;
                }
            }

            trailLines.geometry.attributes.position.needsUpdate = true;
            trailLines.geometry.attributes.color.needsUpdate = true;
            springLines.geometry.attributes.position.needsUpdate = true;
            springLines.geometry.attributes.color.needsUpdate = true;
        }

        function calculateEnergy() {
            let ke = 0;
            let pe = 0;
            for (let i = 0; i < N; i++) {
                ke += 0.5 * mass * vy[i] * vy[i];
                if (i < N - 1) {
                    let dy = y[i] - y[i + 1];
                    pe += 0.5 * k * dy * dy;
                }
            }
            return ke + pe;
        }

        function updateHUDAndState() {
            const waveSpeed = Math.sqrt(k / mass) * restLength;
            let maxDisp = 0;
            let isNaNFound = false;
            let massesState = [];

            for (let i = 0; i < N; i++) {
                let absY = Math.abs(y[i]);
                if (absY > maxDisp) maxDisp = absY;
                if (isNaN(y[i]) || isNaN(vy[i])) isNaNFound = true;
                massesState.push({ x: x[i], y: y[i], vy: vy[i] });
            }

            const totalEnergy = calculateEnergy();
            if (isNaN(totalEnergy) || !isFinite(totalEnergy)) isNaNFound = true;

            // Update DOM
            elWaveSpeed.textContent = waveSpeed.toFixed(2);
            elMaxDisp.textContent = maxDisp.toFixed(2);
            elEnergy.textContent = totalEnergy.toFixed(2);
            elMode.textContent = mode.charAt(0).toUpperCase() + mode.slice(1);
            elFrameCount.textContent = frameCount;
            elPaused.textContent = isPaused ? "Yes" : "No";

            // Expose State
            window.__3D_STATE__ = {
                frameCount: frameCount,
                isPaused: isPaused,
                massCount: N,
                stiffness: k,
                damping: damping,
                boundaryCondition: boundary,
                waveSpeed: waveSpeed,
                maxDisplacement: maxDisp,
                totalEnergy: totalEnergy,
                mode: mode,
                driveFrequency: driveFreq,
                masses: massesState,
                isValid: !isNaNFound
            };
        }

        function animate() {
            requestAnimationFrame(animate);
            frameCount++;

            updatePhysics();
            updateVisuals();
            updateHUDAndState();

            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
