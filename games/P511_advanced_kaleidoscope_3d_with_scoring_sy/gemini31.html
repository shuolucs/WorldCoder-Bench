<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 3D Kaleidoscope</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: #ffffff;
            text-shadow: 0 0 5px #00aaff;
            box-sizing: border-box;
            padding: 20px;
        }
        .hud-element {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
        }
        #score-container { top: 20px; left: 20px; }
        #combo-container { top: 20px; right: 20px; text-align: right; color: #ffaa00; text-shadow: 0 0 5px #ff0000;}
        #segments-container { bottom: 20px; left: 20px; }
        #speed-container { bottom: 20px; right: 20px; text-align: right; }
        
        #pause-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 20px #ff0055;
            pointer-events: none;
            display: none;
            letter-spacing: 10px;
        }
        
        #controls-help {
            position: absolute;
            bottom: 80px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div id="score-container" class="hud-element">SCORE: <span id="score-display">0</span></div>
        <div id="combo-container" class="hud-element">COMBO: <span id="combo-display">1</span>x</div>
        <div id="segments-container" class="hud-element">SEGMENTS: <span id="segments-display">6</span></div>
        <div id="speed-container" class="hud-element">SPEED LVL: <span id="speed-display">2</span></div>
    </div>
    <div id="pause-overlay">PAUSED</div>
    <div id="controls-help">Click: Pulse | Arrows: Speed/Segments | Space: Color | R: Reset | P: Pause</div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            score: 0,
            combo: 1,
            segments: 6,
            rotationSpeed: 0.5,
            colorMode: 0,
            isPaused: false,
            kaleidoscopeRotation: 0,
            particleCount: 200,
            pulseRingCount: 0,
            speedLevel: 2,
            flamingosLoaded: false,
            lastClickTime: 0,
            cameraZ: 15
        };

        const state = window.__3D_STATE__;
        let clickTimestamps = [];

        // DOM Elements
        const scoreEl = document.getElementById('score-display');
        const comboEl = document.getElementById('combo-display');
        const segmentsEl = document.getElementById('segments-display');
        const speedEl = document.getElementById('speed-display');
        const pauseEl = document.getElementById('pause-overlay');

        function updateHUD() {
            scoreEl.textContent = state.score;
            comboEl.textContent = state.combo;
            segmentsEl.textContent = state.segments;
            state.speedLevel = Math.round(state.rotationSpeed / 0.25);
            speedEl.textContent = state.speedLevel;
            pauseEl.style.display = state.isPaused ? 'block' : 'none';
        }

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, state.cameraZ);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(5, 10, 5);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xff88cc, 0.5);
        dirLight2.position.set(-5, -5, 10);
        scene.add(dirLight2);

        // Groups
        const kaleidoscopeGroup = new THREE.Group();
        scene.add(kaleidoscopeGroup);

        const particleGroup = new THREE.Group();
        scene.add(particleGroup);

        const pulseGroup = new THREE.Group();
        scene.add(pulseGroup);

        // Particles
        const particleGeo = new THREE.SphereGeometry(0.03, 8, 8);
        for (let i = 0; i < state.particleCount; i++) {
            const hue = Math.random();
            const mat = new THREE.MeshBasicMaterial({ color: new THREE.Color().setHSL(hue, 1, 0.6) });
            const particle = new THREE.Mesh(particleGeo, mat);
            
            const r = 8 * Math.cbrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            const phi = Math.acos(2 * Math.random() - 1);
            
            particle.position.x = r * Math.sin(phi) * Math.cos(theta);
            particle.position.y = r * Math.sin(phi) * Math.sin(theta);
            particle.position.z = r * Math.cos(phi);
            
            particleGroup.add(particle);
        }

        // Model Loading
        let baseMesh = null;
        let clonesData = [];
        const loader = new GLTFLoader();
        
        loader.load('https://threejs.org/examples/models/gltf/Flamingo.glb', (gltf) => {
            baseMesh = gltf.scene.children[0];
            // Center geometry
            baseMesh.geometry.computeBoundingBox();
            const center = new THREE.Vector3();
            baseMesh.geometry.boundingBox.getCenter(center);
            baseMesh.geometry.translate(-center.x, -center.y, -center.z);
            
            state.flamingosLoaded = true;
            buildKaleidoscope();
        });

        function buildKaleidoscope() {
            if (!baseMesh) return;
            
            // Clear existing
            while(kaleidoscopeGroup.children.length > 0){ 
                const child = kaleidoscopeGroup.children[0];
                kaleidoscopeGroup.remove(child); 
            }
            clonesData = [];

            for (let i = 0; i < state.segments; i++) {
                const pivot = new THREE.Group();
                pivot.rotation.z = (Math.PI * 2 / state.segments) * i;

                const clone = baseMesh.clone();
                clone.position.y = 4; // Offset to create pattern
                clone.scale.setScalar(0.02);
                
                // Apply color mode
                if (state.colorMode === 1) {
                    clone.material = new THREE.MeshStandardMaterial({
                        color: new THREE.Color().setHSL(i / state.segments, 1, 0.5),
                        roughness: 0.4,
                        metalness: 0.1
                    });
                } else if (state.colorMode === 2) {
                    clone.material = new THREE.MeshStandardMaterial({
                        color: 0xffffff,
                        emissive: 0xffffff,
                        emissiveIntensity: 0.5
                    });
                } else {
                    clone.material = baseMesh.material.clone();
                }

                pivot.add(clone);
                kaleidoscopeGroup.add(pivot);
                clonesData.push({ mesh: clone, index: i });
            }
        }

        // Interactions
        const pulseGeo = new THREE.TorusGeometry(2, 0.05, 16, 100);
        
        window.addEventListener('click', () => {
            const now = performance.now() / 1000;
            state.lastClickTime = now;
            
            // Combo logic
            clickTimestamps.push(now);
            clickTimestamps = clickTimestamps.filter(t => now - t <= 2);
            
            if (clickTimestamps.length >= 3) {
                state.combo = Math.min(5, state.combo + 1);
                clickTimestamps = []; // Reset window after combo up
            }

            state.score += 10 * state.combo;

            // Spawn Pulse
            const pulseMat = new THREE.MeshBasicMaterial({ 
                color: 0x00aaff, 
                transparent: true, 
                opacity: 1,
                blending: THREE.AdditiveBlending
            });
            const pulse = new THREE.Mesh(pulseGeo, pulseMat);
            pulseGroup.add(pulse);

            updateHUD();
        });

        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'ArrowUp':
                    state.rotationSpeed = Math.min(3.0, state.rotationSpeed + 0.25);
                    break;
                case 'ArrowDown':
                    state.rotationSpeed = Math.max(0.25, state.rotationSpeed - 0.25);
                    break;
                case 'ArrowRight':
                    if (state.segments < 16) {
                        state.segments += 2;
                        state.score += 25;
                        buildKaleidoscope();
                    }
                    break;
                case 'ArrowLeft':
                    if (state.segments > 2) {
                        state.segments -= 2;
                        state.score += 25;
                        buildKaleidoscope();
                    }
                    break;
                case 'Space':
                    state.colorMode = (state.colorMode + 1) % 3;
                    state.score += 15;
                    buildKaleidoscope();
                    break;
                case 'KeyR':
                    state.score = 0;
                    state.combo = 1;
                    state.segments = 6;
                    state.rotationSpeed = 0.5;
                    state.colorMode = 0;
                    state.isPaused = false;
                    clickTimestamps = [];
                    buildKaleidoscope();
                    break;
                case 'KeyP':
                    state.isPaused = !state.isPaused;
                    break;
            }
            updateHUD();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            const now = performance.now() / 1000;

            if (!state.isPaused) {
                // Rotations
                kaleidoscopeGroup.rotation.z += state.rotationSpeed * delta;
                particleGroup.rotation.z -= 0.2 * delta;
                particleGroup.rotation.y += 0.1 * delta;

                // Flamingo oscillation
                clonesData.forEach(data => {
                    const scale = 0.02 + 0.005 * Math.sin(time * 2 + data.index * Math.PI / 3);
                    data.mesh.scale.setScalar(scale);
                });

                // Pulse rings animation
                for (let i = pulseGroup.children.length - 1; i >= 0; i--) {
                    const ring = pulseGroup.children[i];
                    ring.scale.addScalar(delta * 3);
                    ring.material.opacity -= delta * 0.8;
                    
                    // Remove condition: opacity < 0.01 or radius > 10 (base radius 2 * scale 5 = 10)
                    if (ring.material.opacity < 0.01 || ring.scale.x > 5) {
                        pulseGroup.remove(ring);
                        ring.material.dispose();
                    }
                }

                // Combo timeout
                if (now - state.lastClickTime > 3 && state.combo > 1) {
                    state.combo = 1;
                    clickTimestamps = [];
                    updateHUD();
                }
            }

            // Update State Object
            state.kaleidoscopeRotation = kaleidoscopeGroup.rotation.z || 0;
            state.pulseRingCount = pulseGroup.children.length || 0;
            
            // Ensure no NaNs
            state.score = state.score || 0;
            state.combo = state.combo || 1;

            renderer.render(scene, camera);
        }

        updateHUD();
        animate();
    </script>
</body>
</html>
