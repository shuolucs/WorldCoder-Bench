<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Flamingo Kaleidoscope</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: white;
      font-size: 18px;
      text-shadow: 0 0 8px rgba(255,255,255,0.35);
      z-index: 10;
    }

    .hud-item {
      position: absolute;
      padding: 12px 16px;
      background: rgba(0,0,0,0.18);
      border-radius: 8px;
    }

    #score-box { top: 8px; left: 8px; }
    #combo-box { top: 8px; right: 8px; }
    #segments-box { bottom: 8px; left: 8px; }
    #speed-box { bottom: 8px; right: 8px; }

    #pause-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 56px;
      font-weight: bold;
      letter-spacing: 6px;
      text-shadow: 0 0 18px rgba(255,255,255,0.5);
      pointer-events: none;
      z-index: 20;
      background: rgba(0,0,0,0.12);
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="score-box" class="hud-item">Score: <span id="score-display">0</span></div>
    <div id="combo-box" class="hud-item">Combo: <span id="combo-display">1x</span></div>
    <div id="segments-box" class="hud-item">Segments: <span id="segments-display">6</span></div>
    <div id="speed-box" class="hud-item">Speed: <span id="speed-display">2</span></div>
  </div>

  <div id="pause-overlay">PAUSED</div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    let scene, camera, renderer, clock;
    let kaleidoscopeGroup, particleGroup;
    let flamingoTemplate = null;
    let flamingoClones = [];
    let pulseRings = [];

    let score = 0;
    let combo = 1;
    let segments = 6;
    let rotationSpeed = 0.5;
    let colorMode = 0;
    let isPaused = false;
    let flamingosLoaded = false;

    let lastClickTime = 0;
    let recentClicks = [];

    const MAX_COMBO = 5;
    const PARTICLE_COUNT = 200;

    const hud = {
      score: document.getElementById('score-display'),
      combo: document.getElementById('combo-display'),
      segments: document.getElementById('segments-display'),
      speed: document.getElementById('speed-display'),
      pause: document.getElementById('pause-overlay')
    };

    const safeNumber = (v, fallback = 0) => Number.isFinite(v) ? v : fallback;
    const clamp = (v, min, max) => Math.min(max, Math.max(min, v));

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color('#000000');

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 15);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      clock = new THREE.Clock();

      const ambient = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambient);

      const dir1 = new THREE.DirectionalLight(0xffffff, 0.8);
      dir1.position.set(5, 10, 5);
      scene.add(dir1);

      const dir2 = new THREE.DirectionalLight(new THREE.Color('#ff88cc'), 0.5);
      dir2.position.set(-5, -5, 10);
      scene.add(dir2);

      kaleidoscopeGroup = new THREE.Group();
      kaleidoscopeGroup.name = 'kaleidoscopeGroup';
      scene.add(kaleidoscopeGroup);

      particleGroup = new THREE.Group();
      particleGroup.name = 'particleGroup';
      scene.add(particleGroup);

      createParticles();
      loadFlamingo();
      setupEvents();
      updateHUD();
      updateState();
    }

    function createParticles() {
      while (particleGroup.children.length > 0) {
        const child = particleGroup.children.pop();
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
      }

      const geometry = new THREE.SphereGeometry(0.03, 8, 8);

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const hue = Math.random();
        const material = new THREE.MeshStandardMaterial({
          color: new THREE.Color().setHSL(hue, 0.9, 0.6),
          emissive: new THREE.Color().setHSL(hue, 0.8, 0.2)
        });

        const particle = new THREE.Mesh(geometry, material);

        const pos = randomPointInSphere(8);
        particle.position.copy(pos);

        particleGroup.add(particle);
      }
    }

    function randomPointInSphere(radius) {
      const u = Math.random();
      const v = Math.random();
      const theta = 2 * Math.PI * u;
      const phi = Math.acos(2 * v - 1);
      const r = radius * Math.cbrt(Math.random());

      return new THREE.Vector3(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
      );
    }

    function loadFlamingo() {
      const loader = new GLTFLoader();
      loader.load(
        'https://threejs.org/examples/models/gltf/Flamingo.glb',
        (gltf) => {
          let foundMesh = null;
          gltf.scene.traverse((obj) => {
            if (!foundMesh && obj.isMesh) foundMesh = obj;
          });

          if (!foundMesh) {
            console.warn('No mesh found in flamingo.glb');
            return;
          }

          flamingoTemplate = foundMesh.clone(true);
          flamingoTemplate.geometry = foundMesh.geometry.clone();

          if (Array.isArray(foundMesh.material)) {
            flamingoTemplate.material = foundMesh.material.map(m => m.clone());
          } else {
            flamingoTemplate.material = foundMesh.material.clone();
          }

          flamingoTemplate.rotation.x = 0;
          flamingoTemplate.rotation.y = 0;
          flamingoTemplate.rotation.z = 0;
          flamingosLoaded = true;

          rebuildKaleidoscope();
        },
        undefined,
        (err) => {
          console.error('Error loading Flamingo.glb', err);
        }
      );
    }

    function rebuildKaleidoscope() {
      while (kaleidoscopeGroup.children.length > 0) {
        const child = kaleidoscopeGroup.children.pop();
        disposeHierarchy(child);
      }
      flamingoClones = [];

      if (!flamingoTemplate) return;

      const angleStep = (Math.PI * 2) / segments;

      for (let i = 0; i < segments; i++) {
        const holder = new THREE.Group();

        const clone = flamingoTemplate.clone(true);
        clone.geometry = flamingoTemplate.geometry.clone();

        if (Array.isArray(flamingoTemplate.material)) {
          clone.material = flamingoTemplate.material.map(m => m.clone());
        } else {
          clone.material = flamingoTemplate.material.clone();
        }

        clone.scale.setScalar(0.02);
        clone.position.set(3.0, 0, 0);
        clone.rotation.y = Math.PI / 2;

        applyColorModeToClone(clone, i, segments);

        holder.rotation.z = angleStep * i;
        holder.add(clone);

        kaleidoscopeGroup.add(holder);
        flamingoClones.push(clone);
      }
    }

    function applyColorModeToClone(clone, i, n) {
      const materials = Array.isArray(clone.material) ? clone.material : [clone.material];

      materials.forEach((mat) => {
        if (!mat) return;

        mat = mat.clone();

        if (mat.color) {
          if (colorMode === 0) {
            // keep original cloned material values
          } else if (colorMode === 1) {
            const color = new THREE.Color().setHSL(i / Math.max(n, 1), 1.0, 0.55);
            mat.color.copy(color);
            if ('emissive' in mat) mat.emissive.copy(color).multiplyScalar(0.25);
          } else if (colorMode === 2) {
            mat.color.set(0xffffff);
            if ('emissive' in mat) mat.emissive.set(0xffffff);
            if ('emissiveIntensity' in mat) mat.emissiveIntensity = 0.6;
          }
        }

        if (colorMode !== 2 && 'emissiveIntensity' in mat) {
          mat.emissiveIntensity = 0.2;
        }

        mat.transparent = true;
        clone.material = Array.isArray(clone.material)
          ? materials.map((m, idx) => idx === materials.indexOf(mat) ? mat : m)
          : mat;
      });
    }

    function createPulseRing() {
      const geometry = new THREE.TorusGeometry(2, 0.05, 16, 64);
      const material = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.9
      });
      const ring = new THREE.Mesh(geometry, material);
      ring.rotation.x = Math.PI / 2;
      ring.userData.radius = 2;
      ring.userData.life = 1.0;
      scene.add(ring);
      pulseRings.push(ring);
    }

    function setupEvents() {
      window.addEventListener('resize', onResize);

      renderer.domElement.addEventListener('click', () => {
        const now = performance.now() / 1000;

        if (now - lastClickTime > 3) {
          combo = 1;
          recentClicks = [];
        }

        recentClicks.push(now);
        recentClicks = recentClicks.filter(t => now - t <= 2);

        if (recentClicks.length >= 3) {
          combo = clamp(combo + 1, 1, MAX_COMBO);
          recentClicks = [];
        }

        score += 10 * combo;
        lastClickTime = now;
        createPulseRing();
        updateHUD();
      });

      window.addEventListener('keydown', (e) => {
        const key = e.key;

        if (key === 'ArrowUp') {
          rotationSpeed = clamp(rotationSpeed + 0.25, 0.25, 3.0);
        } else if (key === 'ArrowDown') {
          rotationSpeed = clamp(rotationSpeed - 0.25, 0.25, 3.0);
        } else if (key === 'ArrowRight') {
          segments = clamp(segments + 2, 2, 16);
          score += 25;
          rebuildKaleidoscope();
        } else if (key === 'ArrowLeft') {
          segments = clamp(segments - 2, 2, 16);
          score += 25;
          rebuildKaleidoscope();
        } else if (key === ' ' || key === 'Spacebar') {
          e.preventDefault();
          colorMode = (colorMode + 1) % 3;
          score += 15;
          rebuildKaleidoscope();
        } else if (key === 'r' || key === 'R') {
          resetAll();
        } else if (key === 'p' || key === 'P') {
          isPaused = !isPaused;
          hud.pause.style.display = isPaused ? 'flex' : 'none';
        }

        updateHUD();
      });
    }

    function resetAll() {
      score = 0;
      combo = 1;
      segments = 6;
      rotationSpeed = 0.5;
      colorMode = 0;
      isPaused = false;
      lastClickTime = 0;
      recentClicks = [];
      hud.pause.style.display = 'none';

      kaleidoscopeGroup.rotation.z = 0;
      particleGroup.rotation.z = 0;

      pulseRings.forEach(r => {
        scene.remove(r);
        if (r.geometry) r.geometry.dispose();
        if (r.material) r.material.dispose();
      });
      pulseRings = [];

      rebuildKaleidoscope();
      updateHUD();
    }

    function updateHUD() {
      hud.score.textContent = `${Math.floor(safeNumber(score, 0))}`;
      hud.combo.textContent = `${Math.floor(safeNumber(combo, 1))}x`;
      hud.segments.textContent = `${Math.floor(safeNumber(segments, 6))}`;
      hud.speed.textContent = `${Math.round(safeNumber(rotationSpeed, 0.5) / 0.25)}`;
    }

    function updatePulseRings(delta) {
      for (let i = pulseRings.length - 1; i >= 0; i--) {
        const ring = pulseRings[i];
        ring.userData.radius = safeNumber(ring.userData.radius, 2) + delta * 3.0;
        ring.scale.setScalar(ring.userData.radius / 2);
        ring.material.opacity = Math.max(0, safeNumber(ring.material.opacity, 0.9) - delta * 0.35);

        if (ring.userData.radius > 10 || ring.material.opacity < 0.01) {
          scene.remove(ring);
          ring.geometry.dispose();
          ring.material.dispose();
          pulseRings.splice(i, 1);
        }
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = safeNumber(clock.getElapsedTime(), 0);
      const delta = safeNumber(clock.getDelta(), 0);

      const now = performance.now() / 1000;
      if (now - lastClickTime > 3 && combo !== 1) {
        combo = 1;
        recentClicks = [];
      }

      if (!isPaused) {
        kaleidoscopeGroup.rotation.z += rotationSpeed * delta;
        particleGroup.rotation.z -= 0.2 * delta;

        for (let i = 0; i < flamingoClones.length; i++) {
          const clone = flamingoClones[i];
          const s = 0.02 + 0.005 * Math.sin(elapsed * 2 + i * Math.PI / 3);
          const safeScale = safeNumber(s, 0.02);
          clone.scale.setScalar(safeScale);
        }
      }

      updatePulseRings(delta);
      updateHUD();
      updateState();

      renderer.render(scene, camera);
    }

    function updateState() {
      window.__3D_STATE__ = {
        score: safeNumber(score, 0),
        combo: safeNumber(combo, 1),
        segments: safeNumber(segments, 6),
        rotationSpeed: safeNumber(rotationSpeed, 0.5),
        colorMode: safeNumber(colorMode, 0),
        isPaused: !!isPaused,
        kaleidoscopeRotation: safeNumber(kaleidoscopeGroup?.rotation?.z, 0),
        particleCount: safeNumber(particleGroup?.children?.length, PARTICLE_COUNT),
        pulseRingCount: safeNumber(pulseRings.length, 0),
        speedLevel: safeNumber(Math.round(rotationSpeed / 0.25), 2),
        flamingosLoaded: !!flamingosLoaded,
        lastClickTime: safeNumber(lastClickTime, 0),
        cameraZ: safeNumber(camera?.position?.z, 15)
      };
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function disposeHierarchy(obj) {
      obj.traverse((child) => {
        if (child.geometry) child.geometry.dispose();

        if (child.material) {
          if (Array.isArray(child.material)) {
            child.material.forEach(m => m && m.dispose && m.dispose());
          } else if (child.material.dispose) {
            child.material.dispose();
          }
        }
      });
    }
  </script>
</body>
</html>
