<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Parkour Runner</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        .hud {
            position: absolute;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 10;
        }
        #hud-score {
            top: 20px;
            left: 20px;
        }
        #hud-distance {
            top: 20px;
            right: 20px;
            text-align: right;
        }
        #hud-speed {
            top: 50px;
            right: 20px;
            text-align: right;
            font-size: 18px;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        .overlay h1 {
            color: #ff4444;
            font-size: 64px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255,0,0,0.5);
        }
        button {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: #4CAF50;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s, background 0.2s;
        }
        button:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        #start-overlay h1 {
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="hud-score" class="hud">Score: 0</div>
    <div id="hud-distance" class="hud">Distance: 0 m</div>
    <div id="hud-speed" class="hud">Speed: 15</div>

    <div id="start-overlay" class="overlay">
        <h1>3D PARKOUR</h1>
        <button id="btn-start">Start</button>
    </div>

    <div id="game-over-overlay" class="overlay" style="display: none;">
        <h1>GAME OVER</h1>
        <button id="btn-restart">Restart</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            gameStarted: false,
            gameOver: false,
            paused: true,
            playerX: 0,
            playerY: 0,
            playerZ: 0,
            currentLane: 0,
            score: 0,
            distance: 0,
            speed: 15,
            isJumping: false,
            isSliding: false,
            velocityY: 0,
            obstacleCount: 0,
            coinCount: 0,
            coinsCollected: 0,
            modelLoaded: false,
            frameCount: 0,
            lastCollisionType: 'none'
        };

        const state = window.__3D_STATE__;

        // Scene Setup
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 50, 300);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Lighting
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 50;
        dirLight.shadow.camera.bottom = -50;
        dirLight.shadow.camera.left = -50;
        dirLight.shadow.camera.right = 50;
        dirLight.shadow.camera.near = 0.1;
        dirLight.shadow.camera.far = 200;
        scene.add(dirLight);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        // Ground
        const groundGeo = new THREE.BoxGeometry(9, 1, 600);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x555555 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.position.set(0, -0.5, 300); // Center at z=300 so it goes from 0 to 600
        ground.receiveShadow = true;
        scene.add(ground);

        // Player Setup
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);
        
        // Placeholder until model loads
        const placeholderGeo = new THREE.BoxGeometry(1, 1.8, 1);
        const placeholderMat = new THREE.MeshLambertMaterial({ color: 0x0000ff });
        const placeholder = new THREE.Mesh(placeholderGeo, placeholderMat);
        placeholder.position.y = 0.9;
        placeholder.castShadow = true;
        playerGroup.add(placeholder);

        let mixer;
        let playerModel;
        const clock = new THREE.Clock();

        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Michelle.glb', (gltf) => {
            playerModel = gltf.scene;
            playerModel.scale.set(0.02, 0.02, 0.02);
            
            playerModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            playerGroup.remove(placeholder);
            playerGroup.add(playerModel);
            
            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(playerModel);
                const action = mixer.clipAction(gltf.animations[0]);
                action.play();
            }
            
            state.modelLoaded = true;
        });

        // Level Generation
        const obstacles = [];
        const coins = [];
        const lanes = [-3, 0, 3];

        function createLevel() {
            // Clear existing
            obstacles.forEach(o => scene.remove(o));
            coins.forEach(c => scene.remove(c));
            obstacles.length = 0;
            coins.length = 0;
            state.obstacleCount = 0;
            state.coinCount = 0;

            // Generate Obstacles
            let zPos = 30;
            while (zPos < 580) {
                const isBarrier = Math.random() > 0.5;
                const lane = lanes[Math.floor(Math.random() * lanes.length)];
                
                let obsGeo, obsMat, obsMesh;
                if (isBarrier) {
                    obsGeo = new THREE.BoxGeometry(2, 2, 1);
                    obsMat = new THREE.MeshLambertMaterial({ color: 0xff0000 });
                    obsMesh = new THREE.Mesh(obsGeo, obsMat);
                    obsMesh.position.set(lane, 1, zPos); // Center y=1, bottom y=0
                    obsMesh.userData = { type: 'barrier' };
                } else {
                    obsGeo = new THREE.BoxGeometry(2, 1, 1);
                    obsMat = new THREE.MeshLambertMaterial({ color: 0xffa500 });
                    obsMesh = new THREE.Mesh(obsGeo, obsMat);
                    obsMesh.position.set(lane, 3, zPos); // Center y=3, bottom y=2.5
                    obsMesh.userData = { type: 'beam' };
                }
                
                obsMesh.castShadow = true;
                obsMesh.receiveShadow = true;
                scene.add(obsMesh);
                obstacles.push(obsMesh);
                state.obstacleCount++;

                zPos += 25 + Math.random() * 5;
            }

            // Generate Coins
            const coinGeo = new THREE.TorusGeometry(0.4, 0.1, 8, 16);
            const coinMat = new THREE.MeshLambertMaterial({ color: 0xffff00 });
            
            for (let i = 0; i < 30; i++) {
                const coin = new THREE.Mesh(coinGeo, coinMat);
                const lane = lanes[Math.floor(Math.random() * lanes.length)];
                const z = 40 + Math.random() * 500;
                coin.position.set(lane, 1.5, z);
                coin.castShadow = true;
                scene.add(coin);
                coins.push(coin);
                state.coinCount++;
            }
        }

        createLevel();

        // Input Handling
        let targetLane = 0;
        let slideTimer = 0;

        window.addEventListener('keydown', (e) => {
            if (state.gameOver || state.paused) return;

            if (e.code === 'KeyA' || e.code === 'ArrowLeft') {
                targetLane = Math.max(-3, targetLane - 3);
            } else if (e.code === 'KeyD' || e.code === 'ArrowRight') {
                targetLane = Math.min(3, targetLane + 3);
            } else if ((e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'Space') && state.playerY <= 0.05) {
                state.velocityY = 12;
                state.isJumping = true;
            } else if (e.code === 'KeyS' || e.code === 'ArrowDown') {
                if (!state.isSliding) {
                    state.isSliding = true;
                    slideTimer = 0.6;
                    if (playerModel) playerModel.scale.y = 0.01; // Half of 0.02
                    else placeholder.scale.y = 0.5;
                }
            }
        });

        // UI Logic
        const startOverlay = document.getElementById('start-overlay');
        const gameOverOverlay = document.getElementById('game-over-overlay');
        const hudScore = document.getElementById('hud-score');
        const hudDistance = document.getElementById('hud-distance');
        const hudSpeed = document.getElementById('hud-speed');

        document.getElementById('btn-start').addEventListener('click', () => {
            startOverlay.style.display = 'none';
            state.gameStarted = true;
            state.paused = false;
            clock.getDelta(); // Reset clock
        });

        document.getElementById('btn-restart').addEventListener('click', () => {
            gameOverOverlay.style.display = 'none';
            
            // Reset State
            state.playerX = 0;
            state.playerY = 0;
            state.playerZ = 0;
            state.velocityY = 0;
            state.isJumping = false;
            state.isSliding = false;
            state.score = 0;
            state.distance = 0;
            state.coinsCollected = 0;
            state.gameOver = false;
            state.paused = false;
            state.lastCollisionType = 'none';
            
            targetLane = 0;
            slideTimer = 0;
            
            playerGroup.position.set(0, 0, 0);
            if (playerModel) playerModel.scale.y = 0.02;
            else placeholder.scale.y = 1;

            // Reset Coins
            coins.forEach(c => c.visible = true);
            
            updateHUD();
            clock.getDelta();
        });

        function updateHUD() {
            hudScore.innerText = `Score: ${state.score}`;
            hudDistance.innerText = `Distance: ${Math.floor(state.distance)} m`;
            hudSpeed.innerText = `Speed: ${state.speed}`;
        }

        function triggerGameOver(type) {
            state.gameOver = true;
            state.paused = true;
            state.lastCollisionType = type;
            gameOverOverlay.style.display = 'flex';
        }

        // Main Loop
        const targetCamPos = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            state.frameCount++;

            const dt = clock.getDelta();

            if (mixer && !state.paused) {
                mixer.update(dt);
            }

            if (!state.paused && !state.gameOver) {
                // Z Movement
                state.playerZ += state.speed * dt;
                state.distance = Math.floor(state.playerZ);
                
                // X Movement (Snap)
                state.currentLane = targetLane;
                state.playerX = targetLane;
                
                // Y Movement (Jump/Gravity)
                if (state.playerY > 0 || state.velocityY > 0) {
                    state.velocityY -= 30 * dt; // Gravity
                    state.playerY += state.velocityY * dt;
                    
                    if (state.playerY <= 0) {
                        state.playerY = 0;
                        state.velocityY = 0;
                        state.isJumping = false;
                    }
                }

                // Slide Timer
                if (state.isSliding) {
                    slideTimer -= dt;
                    if (slideTimer <= 0) {
                        state.isSliding = false;
                        if (playerModel) playerModel.scale.y = 0.02;
                        else placeholder.scale.y = 1;
                    }
                }

                // Apply positions to group
                playerGroup.position.set(state.playerX, state.playerY, state.playerZ);

                // Collision Detection - Obstacles
                for (let i = 0; i < obstacles.length; i++) {
                    const obs = obstacles[i];
                    const dx = Math.abs(state.playerX - obs.position.x);
                    const dz = Math.abs(state.playerZ - obs.position.z);
                    
                    if (dx < 1.5 && dz < 1.5) {
                        if (obs.userData.type === 'barrier') {
                            if (state.playerY < 1.5) {
                                triggerGameOver('barrier');
                                break;
                            }
                        } else if (obs.userData.type === 'beam') {
                            if (!state.isSliding && state.playerY < 2.5) {
                                triggerGameOver('beam');
                                break;
                            }
                        }
                    }
                }

                // Collision Detection - Coins
                for (let i = 0; i < coins.length; i++) {
                    const coin = coins[i];
                    if (!coin.visible) continue;
                    
                    coin.rotation.y += 2 * dt;
                    
                    const dist = playerGroup.position.distanceTo(coin.position);
                    if (dist < 2) {
                        coin.visible = false;
                        state.score++;
                        state.coinsCollected++;
                    }
                }

                updateHUD();
            } else if (state.paused && !state.gameOver) {
                // Rotate coins even when paused before start
                for (let i = 0; i < coins.length; i++) {
                    coins[i].rotation.y += 2 * dt;
                }
            }

            // Camera Follow
            targetCamPos.set(state.playerX, state.playerY + 5, state.playerZ - 10);
            
            // Prevent NaN in lerp
            if (!isNaN(targetCamPos.x) && !isNaN(targetCamPos.y) && !isNaN(targetCamPos.z)) {
                camera.position.lerp(targetCamPos, 0.1);
                camera.lookAt(state.playerX, state.playerY, state.playerZ + 5);
            }

            // Update directional light position to follow player
            dirLight.position.set(state.playerX + 5, 15, state.playerZ + 10);
            dirLight.target.position.set(state.playerX, 0, state.playerZ);
            dirLight.target.updateMatrixWorld();

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start loop
        animate();
    </script>
</body>
</html>
