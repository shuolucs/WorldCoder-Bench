<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Parkour Runner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#hud-score {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #fff;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    z-index: 10;
}

#hud-distance {
    position: absolute;
    top: 20px;
    right: 20px;
    color: #fff;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    z-index: 10;
}

#hud-speed {
    position: absolute;
    top: 50px;
    right: 20px;
    color: #ccc;
    font-size: 18px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    z-index: 10;
}

#btn-start {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 20px 60px;
    font-size: 32px;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    border-radius: 15px;
    cursor: pointer;
    z-index: 20;
    box-shadow: 0 8px 32px rgba(102, 126, 234, 0.4);
    transition: transform 0.2s, box-shadow 0.2s;
}

#btn-start:hover {
    transform: translate(-50%, -50%) scale(1.05);
    box-shadow: 0 12px 40px rgba(102, 126, 234, 0.6);
}

#game-over-overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.75);
    z-index: 30;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

#game-over-overlay.visible {
    display: flex;
}

#game-over-overlay h1 {
    color: #ff4444;
    font-size: 72px;
    text-shadow: 0 0 30px rgba(255, 68, 68, 0.8);
    margin-bottom: 20px;
}

#game-over-overlay .final-score {
    color: #fff;
    font-size: 28px;
    margin-bottom: 30px;
}

#btn-restart {
    padding: 15px 50px;
    font-size: 24px;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 8px 32px rgba(245, 87, 108, 0.4);
    transition: transform 0.2s;
}

#btn-restart:hover {
    transform: scale(1.05);
}

.loading-text {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #aaa;
    font-size: 20px;
    z-index: 5;
}
</style>
</head>
<body>

<div id="hud-score">Score: 0</div>
<div id="hud-distance">Distance: 0 m</div>
<div id="hud-speed">Speed: 15</div>

<button id="btn-start">START</button>

<div id="game-over-overlay">
    <h1>GAME OVER</h1>
    <div class="final-score" id="final-score-text">Score: 0 | Distance: 0 m</div>
    <button id="btn-restart">Restart</button>
</div>

<div class="loading-text" id="loading-text">Loading model...</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
window.__3D_STATE__ = {
    gameStarted: false,
    gameOver: false,
    paused: true,
    playerX: 0,
    playerY: 0,
    playerZ: 0,
    currentLane: 0,
    score: 0,
    distance: 0,
    speed: 15,
    isJumping: false,
    isSliding: false,
    velocityY: 0,
    obstacleCount: 0,
    coinCount: 0,
    coinsCollected: 0,
    modelLoaded: false,
    frameCount: 0,
    lastCollisionType: 'none'
};

const state = window.__3D_STATE__;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 50, 200);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, -10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 200;
dirLight.shadow.camera.left = -30;
dirLight.shadow.camera.right = 30;
dirLight.shadow.camera.top = 30;
dirLight.shadow.camera.bottom = -30;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

// ============ GROUND ============
const groundGeom = new THREE.BoxGeometry(9, 1, 600);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.position.set(0, -0.5, 300);
ground.receiveShadow = true;
scene.add(ground);

// Lane markers
for (let lane = -3; lane <= 3; lane += 3) {
    const lineGeom = new THREE.BoxGeometry(0.05, 0.01, 600);
    const lineMat = new THREE.MeshBasicMaterial({ color: 0x888888 });
    const line = new THREE.Mesh(lineGeom, lineMat);
    line.position.set(lane, 0.01, 300);
    scene.add(line);
}

// Side walls for visual
for (let side of [-1, 1]) {
    const wallGeom = new THREE.BoxGeometry(0.3, 2, 600);
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x333344 });
    const wall = new THREE.Mesh(wallGeom, wallMat);
    wall.position.set(side * 4.65, 1, 300);
    scene.add(wall);
}

// ============ OBSTACLES ============
const obstacles = [];
const lanes = [-3, 0, 3];

function createObstacles() {
    const numObstacles = 25;
    for (let i = 0; i < numObstacles; i++) {
        const z = 30 + i * (25 + Math.random() * 5);
        const lane = lanes[Math.floor(Math.random() * 3)];
        const type = Math.random() < 0.5 ? 'barrier' : 'beam';

        let mesh;
        if (type === 'barrier') {
            const geom = new THREE.BoxGeometry(2, 2, 1);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff2222, roughness: 0.5 });
            mesh = new THREE.Mesh(geom, mat);
            mesh.position.set(lane, 1, z);
            mesh.castShadow = true;
        } else {
            const geom = new THREE.BoxGeometry(2, 1, 1);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff8800, roughness: 0.5 });
            mesh = new THREE.Mesh(geom, mat);
            mesh.position.set(lane, 3, z);
            mesh.castShadow = true;
        }

        scene.add(mesh);
        obstacles.push({ mesh, type, lane, z, active: true });
    }
    state.obstacleCount = obstacles.length;
}

// ============ COINS ============
const coins = [];

function createCoins() {
    const numCoins = 30;
    for (let i = 0; i < numCoins; i++) {
        const z = 15 + i * 18 + Math.random() * 10;
        const lane = lanes[Math.floor(Math.random() * 3)];

        const geom = new THREE.TorusGeometry(0.4, 0.1, 12, 24);
        const mat = new THREE.MeshStandardMaterial({
            color: 0xffdd00,
            metalness: 0.8,
            roughness: 0.2,
            emissive: 0x553300,
            emissiveIntensity: 0.3
        });
        const mesh = new THREE.Mesh(geom, mat);
        mesh.position.set(lane, 1.5, z);
        mesh.castShadow = true;
        scene.add(mesh);
        coins.push({ mesh, lane, z, collected: false });
    }
    state.coinCount = coins.length;
}

createObstacles();
createCoins();

// ============ PLAYER ============
let playerModel = null;
let mixer = null;
let currentAction = null;

const playerGroup = new THREE.Group();
playerGroup.position.set(0, 0, 0);
scene.add(playerGroup);

// Fallback player (capsule)
const fallbackGeom = new THREE.CapsuleGeometry(0.3, 1.2, 8, 16);
const fallbackMat = new THREE.MeshStandardMaterial({ color: 0x4488ff });
const fallbackMesh = new THREE.Mesh(fallbackGeom, fallbackMat);
fallbackMesh.position.y = 0.9;
fallbackMesh.castShadow = true;
playerGroup.add(fallbackMesh);

// Load Michelle.glb
const loader = new GLTFLoader();
loader.load(
    'Michelle.glb',
    (gltf) => {
        playerModel = gltf.scene;
        playerModel.scale.set(0.02, 0.02, 0.02);
        playerModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
            }
        });
        playerGroup.add(playerModel);
        fallbackMesh.visible = false;

        // Animation
        if (gltf.animations && gltf.animations.length > 0) {
            mixer = new THREE.AnimationMixer(playerModel);
            currentAction = mixer.clipAction(gltf.animations[0]);
            currentAction.play();
        }

        state.modelLoaded = true;
        document.getElementById('loading-text').style.display = 'none';
        console.log('Michelle.glb loaded successfully');
    },
    (progress) => {
        const pct = progress.total > 0 ? Math.round((progress.loaded / progress.total) * 100) : '...';
        document.getElementById('loading-text').textContent = `Loading model... ${pct}%`;
    },
    (error) => {
        console.warn('Could not load Michelle.glb, using fallback:', error);
        document.getElementById('loading-text').textContent = 'Using fallback character';
        setTimeout(() => {
            document.getElementById('loading-text').style.display = 'none';
        }, 2000);
        state.modelLoaded = true;
    }
);

// ============ GAME VARIABLES ============
let velocityY = 0;
let isGrounded = true;
let isSliding = false;
let slideTimer = 0;
const SLIDE_DURATION = 0.6;
const GRAVITY = -30;
const JUMP_VELOCITY = 12;
const FORWARD_SPEED = 15;
let currentLane = 0; // index: 0=left(-3), 1=center(0), 2=right(3)
let currentLaneX = 0;
let gameStarted = false;
let gameOver = false;
let score = 0;

const clock = new THREE.Clock();

// ============ INPUT ============
const keys = {};
const keyActions = {
    jump: false,
    slideStart: false,
    left: false,
    right: false
};

document.addEventListener('keydown', (e) => {
    if (keys[e.code]) return;
    keys[e.code] = true;

    if (e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'Space') {
        keyActions.jump = true;
        e.preventDefault();
    }
    if (e.code === 'KeyS' || e.code === 'ArrowDown') {
        keyActions.slideStart = true;
        e.preventDefault();
    }
    if (e.code === 'KeyA' || e.code === 'ArrowLeft') {
        keyActions.left = true;
        e.preventDefault();
    }
    if (e.code === 'KeyD' || e.code === 'ArrowRight') {
        keyActions.right = true;
        e.preventDefault();
    }
});

document.addEventListener('keyup', (e) => {
    keys[e.code] = false;
});

// ============ UI ============
const hudScore = document.getElementById('hud-score');
const hudDistance = document.getElementById('hud-distance');
const hudSpeed = document.getElementById('hud-speed');
const btnStart = document.getElementById('btn-start');
const gameOverOverlay = document.getElementById('game-over-overlay');
const btnRestart = document.getElementById('btn-restart');
const finalScoreText = document.getElementById('final-score-text');

btnStart.addEventListener('click', () => {
    gameStarted = true;
    gameOver = false;
    state.gameStarted = true;
    state.paused = false;
    btnStart.style.display = 'none';
    clock.getDelta(); // reset delta
});

btnRestart.addEventListener('click', () => {
    resetGame();
});

function resetGame() {
    playerGroup.position.set(0, 0, 0);
    currentLane = 1;
    currentLaneX = 0;
    velocityY = 0;
    isGrounded = true;
    isSliding = false;
    slideTimer = 0;
    score = 0;
    gameOver = false;
    gameStarted = true;

    // Reset player scale
    playerGroup.scale.set(1, 1, 1);

    // Reset obstacles
    obstacles.forEach(o => { o.active = true; o.mesh.visible = true; });

    // Reset coins
    coins.forEach(c => { c.collected = false; c.mesh.visible = true; });

    // Update state
    state.gameStarted = true;
    state.gameOver = false;
    state.paused = false;
    state.playerX = 0;
    state.playerY = 0;
    state.playerZ = 0;
    state.currentLane = 0;
    state.score = 0;
    state.distance = 0;
    state.isJumping = false;
    state.isSliding = false;
    state.velocityY = 0;
    state.coinsCollected = 0;
    state.lastCollisionType = 'none';

    gameOverOverlay.classList.remove('visible');
    clock.getDelta();
}

// ============ GAME LOOP ============
function animate() {
    requestAnimationFrame(animate);

    const delta = Math.min(clock.getDelta(), 0.05);
    state.frameCount++;

    // Rotate coins
    coins.forEach(c => {
        if (!c.collected) {
            c.mesh.rotation.y += delta * 3;
        }
    });

    if (!gameStarted || gameOver) {
        // Update camera even when paused
        const targetCamPos = new THREE.Vector3(
            playerGroup.position.x,
            playerGroup.position.y + 5,
            playerGroup.position.z - 10
        );
        camera.position.lerp(targetCamPos, 0.1);
        camera.lookAt(playerGroup.position.x, playerGroup.position.y + 1, playerGroup.position.z);

        if (mixer) mixer.update(delta);
        renderer.render(scene, camera);
        return;
    }

    // ---- Process Input ----
    // Lane switching
    if (keyActions.left) {
        keyActions.left = false;
        if (currentLane > 0) {
            currentLane--;
        }
    }
    if (keyActions.right) {
        keyActions.right = false;
        if (currentLane < 2) {
            currentLane++;
        }
    }
    currentLaneX = lanes[currentLane];

    // Jump
    if (keyActions.jump) {
        keyActions.jump = false;
        if (isGrounded && playerGroup.position.y <= 0.05) {
            velocityY = JUMP_VELOCITY;
            isGrounded = false;
        }
    }

    // Slide
    if (keyActions.slideStart) {
        keyActions.slideStart = false;
        if (!isSliding && isGrounded) {
            isSliding = true;
            slideTimer = SLIDE_DURATION;
        }
    }

    // ---- Update Slide ----
    if (isSliding) {
        slideTimer -= delta;
        if (slideTimer <= 0) {
            isSliding = false;
            slideTimer = 0;
        }
    }

    // Visual slide
    if (isSliding) {
        playerGroup.scale.y = 0.5;
    } else {
        playerGroup.scale.y = 1.0;
    }

    // ---- Update Physics ----
    // Forward movement
    playerGroup.position.z += FORWARD_SPEED * delta;

    // Lane snap
    playerGroup.position.x = currentLaneX;

    // Vertical physics
    if (!isGrounded) {
        velocityY += GRAVITY * delta;
        playerGroup.position.y += velocityY * delta;

        if (playerGroup.position.y <= 0) {
            playerGroup.position.y = 0;
            velocityY = 0;
            isGrounded = true;
        }
    }

    // ---- Move directional light with player ----
    dirLight.position.set(playerGroup.position.x + 5, 15, playerGroup.position.z + 10);
    dirLight.target.position.copy(playerGroup.position);
    dirLight.target.updateMatrixWorld();

    // Move ground with player
    ground.position.z = playerGroup.position.z + 100;

    // ---- Collision Detection ----
    const playerY = playerGroup.position.y;
    const playerZ = playerGroup.position.z;
    const playerX = playerGroup.position.x;
    const playerHeight = isSliding ? 0.9 : 1.8;

    for (let i = 0; i < obstacles.length; i++) {
        const obs = obstacles[i];
        if (!obs.active) continue;

        const dx = Math.abs(playerX - obs.mesh.position.x);
        const dz = Math.abs(playerZ - obs.mesh.position.z);

        if (dx < 1.5 && dz < 1.5) {
            if (obs.type === 'barrier') {
                // Barrier at y=0 to y=2, player must jump over
                if (playerY < 1.5) {
                    // Collision!
                    triggerGameOver('barrier');
                    break;
                }
            } else if (obs.type === 'beam') {
                // Beam at y=2.5 to y=3.5, player must slide under
                if (!isSliding && playerY < 2.5) {
                    // Collision!
                    triggerGameOver('beam');
                    break;
                }
            }
        }
    }

    // ---- Coin Collection ----
    for (let i = 0; i < coins.length; i++) {
        const coin = coins[i];
        if (coin.collected) continue;

        const dist = playerGroup.position.distanceTo(coin.mesh.position);
        if (dist < 2) {
            coin.collected = true;
            coin.mesh.visible = false;
            score++;
            state.coinsCollected = score;
        }
    }

    // ---- Update Mixer ----
    if (mixer) mixer.update(delta);

    // ---- Camera Follow ----
    const targetCamPos = new THREE.Vector3(
        playerX,
        playerY + 5,
        playerZ - 10
    );
    camera.position.lerp(targetCamPos, 5 * delta);
    camera.lookAt(playerX, playerY + 1, playerZ);

    // ---- Update HUD ----
    const dist = Math.round(playerZ);
    hudScore.textContent = `Score: ${score}`;
    hudDistance.textContent = `Distance: ${dist} m`;
    hudSpeed.textContent = `Speed: ${FORWARD_SPEED}`;

    // ---- Update State ----
    state.playerX = playerX;
    state.playerY = playerY;
    state.playerZ = playerZ;
    state.currentLane = currentLaneX;
    state.score = score;
    state.distance = dist;
    state.speed = FORWARD_SPEED;
    state.isJumping = !isGrounded;
    state.isSliding = isSliding;
    state.velocityY = velocityY;

    renderer.render(scene, camera);
}

function triggerGameOver(type) {
    gameOver = true;
    state.gameOver = true;
    state.paused = true;
    state.lastCollisionType = type;

    finalScoreText.textContent = `Score: ${score} | Distance: ${Math.round(playerGroup.position.z)} m`;
    gameOverOverlay.classList.add('visible');
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize lane
currentLane = 1; // center
currentLaneX = 0;

animate();
</script>
</body>
</html>
