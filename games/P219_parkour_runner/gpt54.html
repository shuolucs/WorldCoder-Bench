<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Parkour Runner - Michelle</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #hud-score, #hud-distance, #hud-speed {
      position: absolute;
      z-index: 10;
      font-size: 22px;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    }

    #hud-score {
      top: 16px;
      left: 16px;
    }

    #hud-distance {
      top: 16px;
      right: 16px;
      text-align: right;
    }

    #hud-speed {
      top: 48px;
      right: 16px;
      text-align: right;
    }

    #btn-start {
      position: absolute;
      z-index: 20;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 28px;
      font-size: 22px;
      border: none;
      border-radius: 10px;
      background: #22aa66;
      color: white;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    }

    #game-over-overlay {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,0.7);
    }

    #game-over-overlay h1 {
      font-size: 56px;
      margin: 0 0 24px 0;
      letter-spacing: 2px;
    }

    #btn-restart {
      padding: 14px 26px;
      font-size: 22px;
      border: none;
      border-radius: 10px;
      background: #2d8cff;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="hud-score">Score: 0</div>
  <div id="hud-distance">Distance: 0 m</div>
  <div id="hud-speed">Speed: 15</div>

  <button id="btn-start">Start</button>

  <div id="game-over-overlay">
    <h1>GAME OVER</h1>
    <button id="btn-restart">Restart</button>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, -10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const clock = new THREE.Clock();

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
    directionalLight.position.set(5, 15, 10);
    scene.add(directionalLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const lanePositions = [-3, 0, 3];
    const speed = 15;
    const gravity = -30;
    const jumpVelocity = 12;
    const playerBaseHeight = 1.8;
    const playerSlideHeight = 0.9;

    let mixer = null;
    let playerModel = null;

    const player = {
      x: 0,
      y: 0,
      z: 0,
      laneIndex: 1,
      velocityY: 0,
      isJumping: false,
      isSliding: false,
      slideTimer: 0,
      collisionHeight: playerBaseHeight,
      scaleY: 1
    };

    let obstacles = [];
    let coins = [];
    let score = 0;
    let distance = 0;
    let coinsCollected = 0;

    let gameStarted = false;
    let gameOver = false;
    let paused = true;
    let frameCount = 0;
    let modelLoaded = false;
    let lastCollisionType = "none";

    const hudScore = document.getElementById("hud-score");
    const hudDistance = document.getElementById("hud-distance");
    const hudSpeed = document.getElementById("hud-speed");
    const btnStart = document.getElementById("btn-start");
    const gameOverOverlay = document.getElementById("game-over-overlay");
    const btnRestart = document.getElementById("btn-restart");

    window.__3D_STATE__ = {
      gameStarted: false,
      gameOver: false,
      paused: true,
      playerX: 0,
      playerY: 0,
      playerZ: 0,
      currentLane: 0,
      score: 0,
      distance: 0,
      speed: speed,
      isJumping: false,
      isSliding: false,
      velocityY: 0,
      obstacleCount: 0,
      coinCount: 0,
      coinsCollected: 0,
      modelLoaded: false,
      frameCount: 0,
      lastCollisionType: "none"
    };

    function safeNumber(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    // Ground
    const groundGeo = new THREE.BoxGeometry(9, 1, 600);
    const groundMat = new THREE.MeshStandardMaterial({ color: "#555555" });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.position.set(0, -0.5, 300);
    scene.add(ground);

    // Optional lane markers
    const markerMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.2 });
    for (let z = 10; z < 600; z += 12) {
      for (const x of [-1.5, 1.5]) {
        const marker = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.02, 5), markerMat);
        marker.position.set(x, 0.01, z);
        scene.add(marker);
      }
    }

    function createObstacles() {
      obstacles.forEach(o => scene.remove(o.mesh));
      obstacles = [];

      let z = 30;
      for (let i = 0; i < 22; i++) {
        const type = Math.random() < 0.5 ? "barrier" : "beam";
        const lane = lanePositions[Math.floor(Math.random() * lanePositions.length)];
        let mesh;

        if (type === "barrier") {
          mesh = new THREE.Mesh(
            new THREE.BoxGeometry(2, 2, 1),
            new THREE.MeshStandardMaterial({ color: "red" })
          );
          mesh.position.set(lane, 1, z);
        } else {
          mesh = new THREE.Mesh(
            new THREE.BoxGeometry(2, 1, 1),
            new THREE.MeshStandardMaterial({ color: "orange" })
          );
          mesh.position.set(lane, 3, z);
        }

        scene.add(mesh);
        obstacles.push({
          type,
          lane,
          z,
          mesh
        });

        z += 25 + Math.random() * 5;
      }
    }

    function createCoins() {
      coins.forEach(c => scene.remove(c.mesh));
      coins = [];

      const torusGeo = new THREE.TorusGeometry(0.4, 0.1, 12, 24);
      const torusMat = new THREE.MeshStandardMaterial({ color: "yellow", emissive: 0x886600 });

      for (let i = 0; i < 30; i++) {
        const lane = lanePositions[Math.floor(Math.random() * lanePositions.length)];
        const z = 15 + i * 18 + Math.random() * 8;

        const coin = new THREE.Mesh(torusGeo, torusMat.clone());
        coin.position.set(lane, 1.5, z);
        coin.rotation.x = Math.PI / 2;
        scene.add(coin);

        coins.push({
          mesh: coin,
          collected: false
        });
      }
    }

    createObstacles();
    createCoins();

    const loader = new GLTFLoader();
    loader.load(
      "Michelle.glb",
      (gltf) => {
        playerModel = gltf.scene;
        playerModel.scale.set(0.02, 0.02, 0.02);
        playerModel.position.set(0, 0, 0);
        scene.add(playerModel);

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(playerModel);
          const action = mixer.clipAction(gltf.animations[0]);
          action.play();
        }

        modelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn("Failed to load Michelle.glb:", err);

        const fallback = new THREE.Mesh(
          new THREE.CapsuleGeometry(0.4, 1.0, 8, 16),
          new THREE.MeshStandardMaterial({ color: 0x44aaff })
        );
        fallback.position.set(0, 0.9, 0);
        scene.add(fallback);
        playerModel = fallback;
        modelLoaded = false;
      }
    );

    function startGame() {
      gameStarted = true;
      gameOver = false;
      paused = false;
      btnStart.style.display = "none";
      gameOverOverlay.style.display = "none";
      lastCollisionType = "none";
    }

    function resetGame() {
      player.x = 0;
      player.y = 0;
      player.z = 0;
      player.laneIndex = 1;
      player.velocityY = 0;
      player.isJumping = false;
      player.isSliding = false;
      player.slideTimer = 0;
      player.collisionHeight = playerBaseHeight;
      player.scaleY = 1;

      score = 0;
      distance = 0;
      coinsCollected = 0;
      gameOver = false;
      paused = false;
      gameStarted = true;
      lastCollisionType = "none";

      createObstacles();

      for (const coin of coins) {
        coin.collected = false;
        coin.mesh.visible = true;
      }

      if (playerModel) {
        if (playerModel.isMesh) {
          playerModel.position.set(player.x, 0.9, player.z);
          playerModel.scale.set(1, 1, 1);
        } else {
          playerModel.position.set(player.x, player.y, player.z);
          playerModel.scale.set(0.02, 0.02, 0.02);
        }
      }

      gameOverOverlay.style.display = "none";
      btnStart.style.display = "none";
    }

    btnStart.addEventListener("click", startGame);
    btnRestart.addEventListener("click", resetGame);

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (!gameStarted || paused || gameOver) return;

      if (key === "a" || e.key === "ArrowLeft") {
        player.laneIndex = Math.max(0, player.laneIndex - 1);
      }

      if (key === "d" || e.key === "ArrowRight") {
        player.laneIndex = Math.min(2, player.laneIndex + 1);
      }

      if (key === "w" || e.key === "ArrowUp" || e.key === " ") {
        if (player.y <= 0.05) {
          player.velocityY = jumpVelocity;
          player.isJumping = true;
        }
      }

      if (key === "s" || e.key === "ArrowDown") {
        if (!player.isSliding) {
          player.isSliding = true;
          player.slideTimer = 0.6;
          player.collisionHeight = playerSlideHeight;
          player.scaleY = 0.5;
        }
      }
    });

    function updatePlayer(dt) {
      dt = safeNumber(dt, 0);

      player.x = safeNumber(lanePositions[player.laneIndex], 0);
      player.z = safeNumber(player.z + speed * dt, player.z);

      player.velocityY = safeNumber(player.velocityY + gravity * dt, 0);
      player.y = safeNumber(player.y + player.velocityY * dt, 0);

      if (player.y <= 0) {
        player.y = 0;
        player.velocityY = 0;
        player.isJumping = false;
      } else {
        player.isJumping = true;
      }

      if (player.isSliding) {
        player.slideTimer = safeNumber(player.slideTimer - dt, 0);
        if (player.slideTimer <= 0) {
          player.isSliding = false;
          player.slideTimer = 0;
          player.collisionHeight = playerBaseHeight;
          player.scaleY = 1;
        }
      }

      if (playerModel) {
        if (playerModel.isMesh) {
          playerModel.position.set(player.x, player.y + 0.9 * player.scaleY, player.z);
          playerModel.scale.set(1, player.scaleY, 1);
        } else {
          playerModel.position.set(player.x, player.y, player.z);
          playerModel.scale.set(0.02, 0.02 * player.scaleY, 0.02);
        }
      }

      distance = Math.round(safeNumber(player.z, 0));
    }

    function checkObstacleCollisions() {
      if (gameOver) return;

      for (const obstacle of obstacles) {
        const dx = Math.abs(player.x - obstacle.mesh.position.x);
        const dz = Math.abs(player.z - obstacle.mesh.position.z);

        if (dx <= 1.5 && dz <= 1.5) {
          if (obstacle.type === "barrier") {
            if (player.y < 1.5) {
              gameOver = true;
              paused = true;
              lastCollisionType = "barrier";
              gameOverOverlay.style.display = "flex";
              return;
            }
          }

          if (obstacle.type === "beam") {
            if (!player.isSliding && player.y < 2.5) {
              gameOver = true;
              paused = true;
              lastCollisionType = "beam";
              gameOverOverlay.style.display = "flex";
              return;
            }
          }
        }
      }
    }

    function checkCoinCollection() {
      for (const coin of coins) {
        if (coin.collected || !coin.mesh.visible) continue;

        const dist = coin.mesh.position.distanceTo(
          new THREE.Vector3(player.x, player.y + 1, player.z)
        );

        if (dist <= 2) {
          coin.collected = true;
          coin.mesh.visible = false;
          score += 1;
          coinsCollected += 1;
        }
      }
    }

    function updateCoins(dt) {
      for (const coin of coins) {
        if (!coin.collected) {
          coin.mesh.rotation.y += safeNumber(dt, 0) * 4;
        }
      }
    }

    function updateCamera() {
      const targetPos = new THREE.Vector3(
        safeNumber(player.x, 0),
        safeNumber(player.y + 5, 5),
        safeNumber(player.z - 10, -10)
      );
      camera.position.lerp(targetPos, 0.12);
      camera.lookAt(
        safeNumber(player.x, 0),
        safeNumber(player.y + 1.5, 1.5),
        safeNumber(player.z, 0)
      );
    }

    function updateHUD() {
      hudScore.textContent = `Score: ${score}`;
      hudDistance.textContent = `Distance: ${distance} m`;
      hudSpeed.textContent = `Speed: ${speed}`;
    }

    function updateState() {
      window.__3D_STATE__.gameStarted = !!gameStarted;
      window.__3D_STATE__.gameOver = !!gameOver;
      window.__3D_STATE__.paused = !!paused;
      window.__3D_STATE__.playerX = safeNumber(player.x, 0);
      window.__3D_STATE__.playerY = safeNumber(player.y, 0);
      window.__3D_STATE__.playerZ = safeNumber(player.z, 0);
      window.__3D_STATE__.currentLane = safeNumber(lanePositions[player.laneIndex], 0);
      window.__3D_STATE__.score = score | 0;
      window.__3D_STATE__.distance = safeNumber(distance, 0);
      window.__3D_STATE__.speed = safeNumber(speed, 15);
      window.__3D_STATE__.isJumping = !!player.isJumping;
      window.__3D_STATE__.isSliding = !!player.isSliding;
      window.__3D_STATE__.velocityY = safeNumber(player.velocityY, 0);
      window.__3D_STATE__.obstacleCount = obstacles.length | 0;
      window.__3D_STATE__.coinCount = coins.length | 0;
      window.__3D_STATE__.coinsCollected = coinsCollected | 0;
      window.__3D_STATE__.modelLoaded = !!modelLoaded;
      window.__3D_STATE__.frameCount = frameCount | 0;
      window.__3D_STATE__.lastCollisionType = lastCollisionType;
    }

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      let dt = clock.getDelta();
      if (!Number.isFinite(dt)) dt = 0;
      dt = Math.min(dt, 0.05);

      if (mixer) mixer.update(dt);

      if (!paused && !gameOver && gameStarted) {
        updatePlayer(dt);
        updateCoins(dt);
        checkObstacleCollisions();
        checkCoinCollection();
      } else {
        updateCoins(dt);
      }

      updateCamera();
      updateHUD();
      updateState();

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
