<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Whack-a-Mole</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}
canvas {
    display: block;
}
#ui {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    pointer-events: none;
}
#startBtn {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 40px;
    font-size: 24px;
    font-weight: bold;
    background: #ff6600;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    pointer-events: all;
    z-index: 100;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}
#startBtn:hover {
    background: #ff8833;
}
#scoreDisplay {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 28px;
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}
#timerDisplay {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}
#comboDisplay {
    position: absolute;
    top: 60px;
    left: 20px;
    font-size: 22px;
    color: #ffff00;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}
#gameOverMsg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    color: white;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
    background: rgba(0,0,0,0.6);
    padding: 30px 50px;
    border-radius: 15px;
    display: none;
    text-align: center;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="ui">
    <div id="scoreDisplay">Score: 0</div>
    <div id="timerDisplay">Time: 30</div>
    <div id="comboDisplay">Combo: 0</div>
    <button id="startBtn">Start Game</button>
    <div id="gameOverMsg"></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
let gameState = 'waiting';
let score = 0;
let timeRemaining = 30;
let whackCount = 0;
let missCount = 0;
let currentCombo = 0;
let maxCombo = 0;
let totalParticlesSpawned = 0;
let molesPopulated = 0;

window.__3D_STATE__ = {
    gameState: 'waiting',
    score: 0,
    timeRemaining: 30,
    whackCount: 0,
    missCount: 0,
    currentCombo: 0,
    maxCombo: 0,
    activeMoles: 0,
    totalParticlesSpawned: 0,
    molesPopulated: 0,
    particlesAlive: 0,
    groundPlaneY: 0,
    holeCount: 9
};

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Clipping plane to hide moles below ground
const clippingPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
renderer.clippingPlanes = [clippingPlane];
renderer.localClippingEnabled = true;

// Hole positions
const holePositions = [];
const xPositions = [-3, 0, 3];
const zPositions = [-3, 0, 3];
for (let row = 0; row < 3; row++) {
    for (let col = 0; col < 3; col++) {
        holePositions.push({ x: xPositions[col], z: zPositions[row] });
    }
}

// Create holes
const holes = [];
for (let i = 0; i < 9; i++) {
    const holeGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.3, 32);
    const holeMat = new THREE.MeshStandardMaterial({ color: 0x4a2800 });
    const hole = new THREE.Mesh(holeGeo, holeMat);
    hole.position.set(holePositions[i].x, 0.15, holePositions[i].z);
    hole.receiveShadow = true;
    scene.add(hole);
    holes.push(hole);
}

// Dark circle inside each hole for depth effect
for (let i = 0; i < 9; i++) {
    const circleGeo = new THREE.CircleGeometry(0.55, 32);
    const circleMat = new THREE.MeshStandardMaterial({ color: 0x1a0a00 });
    const circle = new THREE.Mesh(circleGeo, circleMat);
    circle.rotation.x = -Math.PI / 2;
    circle.position.set(holePositions[i].x, 0.31, holePositions[i].z);
    scene.add(circle);
}

// --- Moles ---
const moles = [];
const moleStates = []; // { isUp, isAnimating, targetY, animStartY, animStartTime, animDuration, hideTimer, model }

let soldierModelLoaded = false;

// Create fallback mole (capsule shape)
function createFallbackMole() {
    const group = new THREE.Group();
    
    // Body
    const bodyGeo = new THREE.CapsuleGeometry(0.3, 0.5, 8, 16);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, clippingPlanes: [clippingPlane] });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.castShadow = true;
    group.add(body);
    
    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.06, 8, 8);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, clippingPlanes: [clippingPlane] });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.12, 0.2, 0.25);
    group.add(leftEye);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    rightEye.position.set(0.12, 0.2, 0.25);
    group.add(rightEye);
    
    // Pupils
    const pupilGeo = new THREE.SphereGeometry(0.03, 8, 8);
    const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000, clippingPlanes: [clippingPlane] });
    const leftPupil = new THREE.Mesh(pupilGeo, pupilMat);
    leftPupil.position.set(-0.12, 0.2, 0.3);
    group.add(leftPupil);
    const rightPupil = new THREE.Mesh(pupilGeo, pupilMat);
    rightPupil.position.set(0.12, 0.2, 0.3);
    group.add(rightPupil);
    
    // Nose
    const noseGeo = new THREE.SphereGeometry(0.08, 8, 8);
    const noseMat = new THREE.MeshStandardMaterial({ color: 0xff6666, clippingPlanes: [clippingPlane] });
    const nose = new THREE.Mesh(noseGeo, noseMat);
    nose.position.set(0, 0.05, 0.3);
    group.add(nose);
    
    return group;
}

// Try to load soldier.glb, fallback to custom mole
const loader = new GLTFLoader();

function initMolesWithModel(baseModel) {
    for (let i = 0; i < 9; i++) {
        let moleModel;
        if (baseModel) {
            moleModel = baseModel.clone();
            moleModel.scale.set(0.4, 0.4, 0.4);
            // Enable clipping on all materials
            moleModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    if (child.material) {
                        child.material = child.material.clone();
                        child.material.clippingPlanes = [clippingPlane];
                        child.material.clipShadows = true;
                    }
                }
            });
        } else {
            moleModel = createFallbackMole();
            moleModel.scale.set(0.4, 0.4, 0.4);
        }
        
        moleModel.position.set(holePositions[i].x, -1.5, holePositions[i].z);
        scene.add(moleModel);
        moles.push(moleModel);
        
        moleStates.push({
            isUp: false,
            isAnimating: false,
            targetY: -1.5,
            animStartY: -1.5,
            animStartTime: 0,
            animDuration: 0,
            hideTimer: null,
            whacked: false
        });
    }
}

// Try loading soldier.glb
loader.load(
    'soldier.glb',
    (gltf) => {
        soldierModelLoaded = true;
        const model = gltf.scene;
        initMolesWithModel(model);
    },
    undefined,
    (error) => {
        console.warn('Could not load soldier.glb, using fallback mole model:', error);
        initMolesWithModel(null);
    }
);

// If loading takes too long, use fallback
setTimeout(() => {
    if (moles.length === 0) {
        console.warn('Model load timeout, using fallback');
        initMolesWithModel(null);
    }
}, 3000);

// --- Particles ---
const particles = [];
const particleColors = [0xff0000, 0xffff00, 0xff8800, 0xffffff];

function spawnParticles(position) {
    for (let i = 0; i < 20; i++) {
        const color = particleColors[Math.floor(Math.random() * particleColors.length)];
        const geo = new THREE.SphereGeometry(0.05, 6, 6);
        const mat = new THREE.MeshStandardMaterial({ color: color });
        const particle = new THREE.Mesh(geo, mat);
        particle.position.copy(position);
        
        const vx = (Math.random() - 0.5) * 6; // -3 to 3
        const vy = Math.random() * 4 + 2;      // 2 to 6
        const vz = (Math.random() - 0.5) * 6;  // -3 to 3
        
        scene.add(particle);
        particles.push({
            mesh: particle,
            velocity: new THREE.Vector3(vx, vy, vz),
            spawnTime: performance.now(),
            lifetime: 1.5
        });
        totalParticlesSpawned++;
    }
}

function updateParticles(delta) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        const elapsed = (performance.now() - p.spawnTime) / 1000;
        
        if (elapsed >= p.lifetime) {
            scene.remove(p.mesh);
            p.mesh.geometry.dispose();
            p.mesh.material.dispose();
            particles.splice(i, 1);
            continue;
        }
        
        p.velocity.y -= 9.8 * delta;
        p.mesh.position.x += p.velocity.x * delta;
        p.mesh.position.y += p.velocity.y * delta;
        p.mesh.position.z += p.velocity.z * delta;
        
        // Fade out
        const alpha = 1 - (elapsed / p.lifetime);
        p.mesh.material.opacity = alpha;
        p.mesh.material.transparent = true;
    }
}

// --- Mole Animation ---
function animateMole(index, targetY, duration) {
    const state = moleStates[index];
    state.isAnimating = true;
    state.animStartY = moles[index].position.y;
    state.targetY = targetY;
    state.animStartTime = performance.now();
    state.animDuration = duration;
}

function popUpMole(index) {
    if (moleStates[index].isUp || moleStates[index].isAnimating) return;
    
    moleStates[index].isUp = true;
    moleStates[index].whacked = false;
    molesPopulated++;
    animateMole(index, 0.5, 300);
    
    // Auto-hide after 1.2 seconds
    moleStates[index].hideTimer = setTimeout(() => {
        if (moleStates[index].isUp && !moleStates[index].whacked) {
            hideMole(index);
        }
    }, 1200);
}

function hideMole(index) {
    if (!moleStates[index].isUp) return;
    
    moleStates[index].isUp = false;
    if (moleStates[index].hideTimer) {
        clearTimeout(moleStates[index].hideTimer);
        moleStates[index].hideTimer = null;
    }
    animateMole(index, -1.5, 200);
}

function updateMoleAnimations() {
    const now = performance.now();
    for (let i = 0; i < moleStates.length; i++) {
        const state = moleStates[i];
        if (!state.isAnimating || !moles[i]) continue;
        
        const elapsed = now - state.animStartTime;
        const t = Math.min(elapsed / state.animDuration, 1);
        
        // Smooth lerp
        moles[i].position.y = state.animStartY + (state.targetY - state.animStartY) * t;
        
        if (t >= 1) {
            state.isAnimating = false;
            moles[i].position.y = state.targetY;
        }
    }
}

// --- Game Logic ---
let gameTimer = null;
let moleSpawnInterval = null;
let gameStartTime = 0;

const startBtn = document.getElementById('startBtn');
const scoreDisplay = document.getElementById('scoreDisplay');
const timerDisplay = document.getElementById('timerDisplay');
const comboDisplay = document.getElementById('comboDisplay');
const gameOverMsg = document.getElementById('gameOverMsg');

function startGame() {
    gameState = 'playing';
    score = 0;
    timeRemaining = 30;
    whackCount = 0;
    missCount = 0;
    currentCombo = 0;
    maxCombo = 0;
    
    startBtn.style.display = 'none';
    gameOverMsg.style.display = 'none';
    
    updateHUD();
    
    // Hide all moles
    for (let i = 0; i < 9; i++) {
        if (moleStates[i] && moleStates[i].isUp) {
            hideMole(i);
        }
    }
    
    gameStartTime = performance.now();
    
    // Timer
    gameTimer = setInterval(() => {
        timeRemaining--;
        if (timeRemaining <= 0) {
            timeRemaining = 0;
            endGame();
        }
        updateHUD();
    }, 1000);
    
    // Mole spawning
    spawnMoles();
    moleSpawnInterval = setInterval(spawnMoles, 1500);
}

function spawnMoles() {
    if (gameState !== 'playing') return;
    if (moles.length === 0) return;
    
    const count = Math.floor(Math.random() * 3) + 1; // 1-3
    const available = [];
    for (let i = 0; i < 9; i++) {
        if (moleStates[i] && !moleStates[i].isUp && !moleStates[i].isAnimating) {
            available.push(i);
        }
    }
    
    // Shuffle and pick
    for (let i = available.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [available[i], available[j]] = [available[j], available[i]];
    }
    
    const toSpawn = Math.min(count, available.length);
    for (let i = 0; i < toSpawn; i++) {
        popUpMole(available[i]);
    }
}

function endGame() {
    gameState = 'gameover';
    
    if (gameTimer) {
        clearInterval(gameTimer);
        gameTimer = null;
    }
    if (moleSpawnInterval) {
        clearInterval(moleSpawnInterval);
        moleSpawnInterval = null;
    }
    
    // Hide all moles
    for (let i = 0; i < 9; i++) {
        if (moleStates[i] && moleStates[i].isUp) {
            hideMole(i);
        }
    }
    
    gameOverMsg.textContent = `Game Over! Final Score: ${score}`;
    gameOverMsg.style.display = 'block';
    startBtn.style.display = 'block';
    startBtn.textContent = 'Play Again';
    
    updateHUD();
}

function updateHUD() {
    scoreDisplay.textContent = `Score: ${score}`;
    timerDisplay.textContent = `Time: ${timeRemaining}`;
    comboDisplay.textContent = `Combo: ${currentCombo}`;
    if (currentCombo >= 3) {
        comboDisplay.style.color = '#ff4444';
        comboDisplay.style.fontSize = '26px';
    } else {
        comboDisplay.style.color = '#ffff00';
        comboDisplay.style.fontSize = '22px';
    }
}

startBtn.addEventListener('click', () => {
    if (gameState === 'waiting' || gameState === 'gameover') {
        startGame();
    }
});

// --- Raycasting / Click ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onPointerDown(event) {
    if (gameState !== 'playing') return;
    if (moles.length === 0) return;
    
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    
    // Check moles first
    let hitMole = false;
    
    // Collect all meshes from up moles
    const upMoleMeshes = [];
    const moleIndexMap = new Map();
    
    for (let i = 0; i < 9; i++) {
        if (moleStates[i].isUp && !moleStates[i].whacked) {
            const meshes = [];
            moles[i].traverse((child) => {
                if (child.isMesh) {
                    meshes.push(child);
                    moleIndexMap.set(child, i);
                }
            });
            upMoleMeshes.push(...meshes);
        }
    }
    
    const intersects = raycaster.intersectObjects(upMoleMeshes, false);
    
    if (intersects.length > 0) {
        const hitObject = intersects[0].object;
        const moleIndex = moleIndexMap.get(hitObject);
        
        if (moleIndex !== undefined) {
            hitMole = true;
            whackMole(moleIndex);
        }
    }
    
    if (!hitMole) {
        // Check if clicked on ground or holes
        const allObjects = [ground, ...holes];
        const groundIntersects = raycaster.intersectObjects(allObjects, false);
        if (groundIntersects.length > 0) {
            missCount++;
            currentCombo = 0;
            updateHUD();
        }
    }
}

function whackMole(index) {
    if (!moleStates[index].isUp || moleStates[index].whacked) return;
    
    moleStates[index].whacked = true;
    whackCount++;
    currentCombo++;
    
    if (currentCombo > maxCombo) {
        maxCombo = currentCombo;
    }
    
    // Score calculation
    if (currentCombo >= 3) {
        score += 10 + (currentCombo * 5);
    } else {
        score += 10;
    }
    
    // Spawn particles at mole position
    const pos = new THREE.Vector3(
        moles[index].position.x,
        moles[index].position.y + 0.3,
        moles[index].position.z
    );
    spawnParticles(pos);
    
    // Hide mole immediately
    hideMole(index);
    
    updateHUD();
}

window.addEventListener('pointerdown', onPointerDown);

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Update State ---
function updateState() {
    let activeMoles = 0;
    for (let i = 0; i < moleStates.length; i++) {
        if (moleStates[i].isUp) activeMoles++;
    }
    
    window.__3D_STATE__ = {
        gameState: gameState,
        score: score,
        timeRemaining: timeRemaining,
        whackCount: whackCount,
        missCount: missCount,
        currentCombo: currentCombo,
        maxCombo: maxCombo,
        activeMoles: activeMoles,
        totalParticlesSpawned: totalParticlesSpawned,
        molesPopulated: molesPopulated,
        particlesAlive: particles.length,
        groundPlaneY: 0,
        holeCount: 9
    };
}

// --- Animation Loop ---
let lastTime = performance.now();

function animate() {
    requestAnimationFrame(animate);
    
    const now = performance.now();
    const delta = (now - lastTime) / 1000;
    lastTime = now;
    
    controls.update();
    updateMoleAnimations();
    updateParticles(delta);
    updateState();
    
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
