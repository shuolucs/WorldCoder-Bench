<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Interactive 3D Histogram</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px;
      min-width: 220px;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }

    #hud .line {
      margin: 4px 0;
      font-size: 14px;
    }

    #buttons {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      background: #2d3250;
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #424769;
    }

    #label-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .overlay-label {
      position: absolute;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 13px;
      white-space: nowrap;
      text-shadow: 0 1px 3px rgba(0,0,0,0.85);
      user-select: none;
    }

    .value-label {
      font-weight: bold;
      font-size: 14px;
    }

    .category-label {
      color: #d6d6e7;
      font-size: 12px;
    }

    #help {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      color: #ddd;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="label-layer"></div>

  <div id="hud">
    <div class="line" id="selected-info">Selected: None</div>
    <div class="line" id="undo-info">Undo Stack: 0</div>
    <div class="line" id="redo-info">Redo Stack: 0</div>
    <div class="line" id="total-info">Total: 0</div>
    <div id="buttons">
      <button id="btn-undo">Undo</button>
      <button id="btn-redo">Redo</button>
      <button id="btn-reset">Reset</button>
    </div>
  </div>

  <div id="help">
    Click a bar to select<br />
    ↑ / ↓ change value<br />
    Z or Ctrl+Z undo<br />
    Y or Ctrl+Y redo
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const categoryNames = ['Sales', 'Marketing', 'Engineering', 'Design', 'Support'];
    const initialValues = [4, 7, 10, 5, 8];
    const categoryValues = [...initialValues];
    const colors = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6'];
    const xPositions = [-3.6, -1.8, 0, 1.8, 3.6];

    const HISTORY_LIMIT = 20;
    const BAR_WIDTH = 1.0;
    const BAR_DEPTH = 1.0;
    const MIN_VALUE = 0;
    const MAX_VALUE = 15;
    const ANIM_DURATION = 300;

    let selectedIndex = -1;
    let undoStack = [];
    let redoStack = [];
    let lastAction = 'none';

    const app = document.getElementById('app');
    const labelLayer = document.getElementById('label-layer');

    const selectedInfo = document.getElementById('selected-info');
    const undoInfo = document.getElementById('undo-info');
    const redoInfo = document.getElementById('redo-info');
    const totalInfo = document.getElementById('total-info');

    const btnUndo = document.getElementById('btn-undo');
    const btnRedo = document.getElementById('btn-redo');
    const btnReset = document.getElementById('btn-reset');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(8, 6, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 2, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const gridHelper = new THREE.GridHelper(10, 10, 0x666688, 0x444466);
    scene.add(gridHelper);

    const bars = [];
    const animations = new Array(categoryNames.length).fill(null);
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock = new THREE.Clock();

    function createOverlayLabel(className, text) {
      const div = document.createElement('div');
      div.className = `overlay-label ${className}`;
      div.textContent = text;
      labelLayer.appendChild(div);
      return div;
    }

    function createBar(index, name, value, color, x) {
      const geometry = new THREE.BoxGeometry(BAR_WIDTH, 1, BAR_DEPTH);
      const material = new THREE.MeshStandardMaterial({
        color,
        metalness: 0.3,
        roughness: 0.7,
        emissive: new THREE.Color(0x000000),
        emissiveIntensity: 0
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.set(x, value / 2, 0);
      mesh.scale.y = value;
      mesh.userData.index = index;
      scene.add(mesh);

      const valueLabel = createOverlayLabel('value-label', String(value));
      const categoryLabel = createOverlayLabel('category-label', name);

      bars.push({
        mesh,
        valueLabel,
        categoryLabel,
        currentVisualHeight: value,
        targetValue: value
      });
    }

    categoryNames.forEach((name, i) => {
      createBar(i, name, categoryValues[i], colors[i], xPositions[i]);
    });

    function updateSelectionVisuals() {
      bars.forEach((bar, i) => {
        bar.mesh.material.emissive.set(i === selectedIndex ? 0xffffff : 0x000000);
        bar.mesh.material.emissiveIntensity = i === selectedIndex ? 0.3 : 0.0;
      });
    }

    function setSelected(index) {
      if (index === selectedIndex) return;
      selectedIndex = index;
      updateSelectionVisuals();
      lastAction = index === -1 ? 'deselect' : 'select';
    }

    function animateBarTo(index, newValue) {
      const bar = bars[index];
      const fromHeight = bar.currentVisualHeight;
      const toHeight = newValue;

      animations[index] = {
        from: fromHeight,
        to: toHeight,
        elapsed: 0,
        duration: ANIM_DURATION
      };

      bar.targetValue = newValue;
    }

    function applyVisualHeight(index, height) {
      const bar = bars[index];
      bar.currentVisualHeight = height;
      bar.mesh.scale.y = Math.max(height, 0.0001);
      bar.mesh.position.y = Math.max(height, 0.0001) / 2;
      bar.valueLabel.textContent = String(Math.round(categoryValues[index]));
    }

    function pushUndoEntry(entry) {
      undoStack.push(entry);
      if (undoStack.length > HISTORY_LIMIT) {
        undoStack.shift();
      }
    }

    function performValueChange(index, newValue, actionName) {
      const oldValue = categoryValues[index];
      if (oldValue === newValue) return;

      categoryValues[index] = newValue;
      animateBarTo(index, newValue);
      pushUndoEntry({ categoryIndex: index, oldValue, newValue });
      redoStack = [];
      lastAction = actionName;
      updateHUD();
    }

    function modifySelected(delta) {
      if (selectedIndex === -1) return;
      const current = categoryValues[selectedIndex];
      const next = THREE.MathUtils.clamp(current + delta, MIN_VALUE, MAX_VALUE);
      if (next === current) return;
      performValueChange(selectedIndex, next, delta > 0 ? 'increment' : 'decrement');
    }

    function undo() {
      if (undoStack.length === 0) return;
      const entry = undoStack.pop();

      if (entry.type === 'reset-batch') {
        entry.oldValues.forEach((v, i) => {
          categoryValues[i] = v;
          animateBarTo(i, v);
        });
      } else {
        categoryValues[entry.categoryIndex] = entry.oldValue;
        animateBarTo(entry.categoryIndex, entry.oldValue);
      }

      redoStack.push(entry);
      if (redoStack.length > HISTORY_LIMIT) {
        redoStack.shift();
      }
      lastAction = 'undo';
      updateHUD();
    }

    function redo() {
      if (redoStack.length === 0) return;
      const entry = redoStack.pop();

      if (entry.type === 'reset-batch') {
        entry.newValues.forEach((v, i) => {
          categoryValues[i] = v;
          animateBarTo(i, v);
        });
      } else {
        categoryValues[entry.categoryIndex] = entry.newValue;
        animateBarTo(entry.categoryIndex, entry.newValue);
      }

      pushUndoEntry(entry);
      lastAction = 'redo';
      updateHUD();
    }

    function resetAll() {
      const oldValues = [...categoryValues];
      const newValues = [...initialValues];

      const changed = oldValues.some((v, i) => v !== newValues[i]);
      if (!changed) return;

      categoryValues.forEach((_, i) => {
        categoryValues[i] = newValues[i];
        animateBarTo(i, newValues[i]);
      });

      pushUndoEntry({
        type: 'reset-batch',
        oldValues,
        newValues
      });

      redoStack = [];
      lastAction = 'reset';
      updateHUD();
    }

    function updateHUD() {
      selectedInfo.textContent = `Selected: ${selectedIndex === -1 ? 'None' : categoryNames[selectedIndex]}`;
      undoInfo.textContent = `Undo Stack: ${undoStack.length}`;
      redoInfo.textContent = `Redo Stack: ${redoStack.length}`;
      totalInfo.textContent = `Total: ${categoryValues.reduce((a, b) => a + b, 0)}`;
    }

    function projectToScreen(position) {
      const p = position.clone().project(camera);
      return {
        x: (p.x * 0.5 + 0.5) * window.innerWidth,
        y: (-p.y * 0.5 + 0.5) * window.innerHeight,
        visible: p.z >= -1 && p.z <= 1
      };
    }

    function updateLabels() {
      bars.forEach((bar, i) => {
        const topPos = new THREE.Vector3(
          bar.mesh.position.x,
          bar.currentVisualHeight + 0.35,
          bar.mesh.position.z
        );
        const bottomPos = new THREE.Vector3(
          bar.mesh.position.x,
          -0.45,
          bar.mesh.position.z
        );

        const top2D = projectToScreen(topPos);
        const bottom2D = projectToScreen(bottomPos);

        bar.valueLabel.style.display = top2D.visible ? 'block' : 'none';
        bar.categoryLabel.style.display = bottom2D.visible ? 'block' : 'none';

        if (top2D.visible) {
          bar.valueLabel.style.left = `${top2D.x}px`;
          bar.valueLabel.style.top = `${top2D.y}px`;
          bar.valueLabel.textContent = String(categoryValues[i]);
        }

        if (bottom2D.visible) {
          bar.categoryLabel.style.left = `${bottom2D.x}px`;
          bar.categoryLabel.style.top = `${bottom2D.y}px`;
        }
      });
    }

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const meshes = bars.map(b => b.mesh);
      const intersects = raycaster.intersectObjects(meshes, false);

      if (intersects.length > 0) {
        setSelected(intersects[0].object.userData.index);
      } else {
        setSelected(-1);
      }
      updateHUD();
    }

    function onKeyDown(event) {
      const key = event.key.toLowerCase();

      if (event.key === 'ArrowUp') {
        event.preventDefault();
        modifySelected(1);
        return;
      }

      if (event.key === 'ArrowDown') {
        event.preventDefault();
        modifySelected(-1);
        return;
      }

      if ((event.ctrlKey && key === 'z') || key === 'z') {
        event.preventDefault();
        undo();
        return;
      }

      if ((event.ctrlKey && key === 'y') || key === 'y') {
        event.preventDefault();
        redo();
        return;
      }
    }

    btnUndo.addEventListener('click', undo);
    btnRedo.addEventListener('click', redo);
    btnReset.addEventListener('click', resetAll);
    renderer.domElement.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('keydown', onKeyDown);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.__3D_STATE__ = {};

    function updateAnimations(deltaMs) {
      let anyAnimating = false;

      for (let i = 0; i < animations.length; i++) {
        const anim = animations[i];
        if (!anim) continue;

        anim.elapsed += deltaMs;
        const t = Math.min(anim.elapsed / anim.duration, 1);
        const eased = t < 1 ? (1 - Math.pow(1 - t, 3)) : 1;
        const h = THREE.MathUtils.lerp(anim.from, anim.to, eased);

        applyVisualHeight(i, h);

        if (t >= 1) {
          applyVisualHeight(i, anim.to);
          animations[i] = null;
        } else {
          anyAnimating = true;
        }
      }

      return anyAnimating;
    }

    function updateState(animating) {
      window.__3D_STATE__ = {
        categoryNames: [...categoryNames],
        categoryValues: [...categoryValues],
        selectedIndex,
        undoStackSize: undoStack.length,
        redoStackSize: redoStack.length,
        totalSum: categoryValues.reduce((a, b) => a + b, 0),
        barHeights: bars.map(b => b.currentVisualHeight),
        lastAction,
        animating
      };
    }

    updateHUD();
    updateSelectionVisuals();

    function animate() {
      requestAnimationFrame(animate);

      const deltaMs = clock.getDelta() * 1000;
      const animating = updateAnimations(deltaMs);

      controls.update();
      updateLabels();
      updateHUD();
      updateState(animating);

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
