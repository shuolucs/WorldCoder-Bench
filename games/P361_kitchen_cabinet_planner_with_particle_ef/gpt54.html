<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kitchen Cabinet Planner</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      background: rgba(20, 20, 20, 0.85);
      color: white;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      box-sizing: border-box;
    }

    #title {
      font-size: 20px;
      font-weight: bold;
      margin-right: 12px;
    }

    button {
      background: #2c2c2c;
      color: white;
      border: 2px solid transparent;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #3b3b3b;
    }

    button.active {
      border: 2px solid yellow;
    }

    .stat {
      margin-left: 8px;
      font-size: 14px;
      background: rgba(255,255,255,0.08);
      padding: 6px 10px;
      border-radius: 6px;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div id="title">Kitchen Cabinet Planner</div>
      <button id="btn-base" class="active">Base</button>
      <button id="btn-wall">Wall</button>
      <button id="btn-tall">Tall</button>
      <button id="btn-clear">Clear All</button>
      <div class="stat" id="cabinet-count">Cabinets: 0/3</div>
      <div class="stat" id="total-price">Total: $0</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const btnBase = document.getElementById('btn-base');
    const btnWall = document.getElementById('btn-wall');
    const btnTall = document.getElementById('btn-tall');
    const btnClear = document.getElementById('btn-clear');
    const cabinetCountEl = document.getElementById('cabinet-count');
    const totalPriceEl = document.getElementById('total-price');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe7ee);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 2, -2);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const floorMat = new THREE.MeshStandardMaterial({
      color: 0xd9d9d9,
      roughness: 0.85,
      metalness: 0.05
    });
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20, 20, 20),
      floorMat
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    scene.add(floor);

    const gridHelper = new THREE.GridHelper(20, 20, 0xbcbcbc, 0xcfcfcf);
    gridHelper.position.y = 0.01;
    scene.add(gridHelper);

    const wall = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 8),
      new THREE.MeshStandardMaterial({ color: 0xf0e2c6 })
    );
    wall.position.set(0, 4, -5);
    scene.add(wall);

    const slotPositions = [-4, 0, 4];
    const cabinetDefs = {
      base: { color: '#8B4513', price: 200, y: 1.25 },
      wall: { color: '#2E8B57', price: 150, y: 4.5 },
      tall: { color: '#1E3A5F', price: 350, y: 2.5 }
    };

    const cabinets = [null, null, null];
    const cabinetMeshes = [null, null, null];
    const clickTargets = [];

    const slotMarkerMat = new THREE.MeshStandardMaterial({
      color: 0x999999,
      transparent: true,
      opacity: 0.15
    });

    for (let i = 0; i < slotPositions.length; i++) {
      const x = slotPositions[i];

      const marker = new THREE.Mesh(
        new THREE.PlaneGeometry(2.2, 3.2),
        slotMarkerMat
      );
      marker.rotation.x = -Math.PI / 2;
      marker.position.set(x, 0.02, -4.25);
      scene.add(marker);

      const clickTarget = new THREE.Mesh(
        new THREE.PlaneGeometry(2, 3),
        new THREE.MeshBasicMaterial({
          visible: false,
          side: THREE.DoubleSide
        })
      );
      clickTarget.rotation.x = -Math.PI / 2;
      clickTarget.position.set(x, 0.03, -4.25);
      clickTarget.userData.slotIndex = i;
      scene.add(clickTarget);
      clickTargets.push(clickTarget);
    }

    function createCabinet(type, slotIndex) {
      const def = cabinetDefs[type];
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(2, 2.5, 1),
        new THREE.MeshStandardMaterial({ color: def.color })
      );
      mesh.position.set(slotPositions[slotIndex], def.y, -4.5);
      mesh.castShadow = false;
      mesh.receiveShadow = true;
      mesh.userData = { type, slotIndex };
      return mesh;
    }

    let selectedType = 'base';

    function updateButtonState() {
      btnBase.classList.toggle('active', selectedType === 'base');
      btnWall.classList.toggle('active', selectedType === 'wall');
      btnTall.classList.toggle('active', selectedType === 'tall');
    }

    function getCabinetCount() {
      return cabinets.filter(Boolean).length;
    }

    function getTotalPrice() {
      return cabinets.reduce((sum, c) => c ? sum + cabinetDefs[c.type].price : sum, 0);
    }

    function updateHUD() {
      cabinetCountEl.textContent = `Cabinets: ${getCabinetCount()}/3`;
      totalPriceEl.textContent = `Total: $${getTotalPrice()}`;
    }

    function setSelectedType(type) {
      selectedType = type;
      updateButtonState();
      window.__3D_STATE__.selectedType = selectedType;
    }

    btnBase.addEventListener('click', () => setSelectedType('base'));
    btnWall.addEventListener('click', () => setSelectedType('wall'));
    btnTall.addEventListener('click', () => setSelectedType('tall'));

    btnClear.addEventListener('click', () => {
      for (let i = 0; i < 3; i++) {
        if (cabinetMeshes[i]) {
          scene.remove(cabinetMeshes[i]);
          cabinetMeshes[i].geometry.dispose();
          cabinetMeshes[i].material.dispose();
          cabinetMeshes[i] = null;
        }
        cabinets[i] = null;
      }
      updateHUD();
      syncState();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === '1') setSelectedType('base');
      if (e.key === '2') setSelectedType('wall');
      if (e.key === '3') setSelectedType('tall');
    });

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    renderer.domElement.addEventListener('pointerdown', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(clickTargets, false);

      if (hits.length > 0) {
        const slotIndex = hits[0].object.userData.slotIndex;
        if (!cabinets[slotIndex]) {
          const mesh = createCabinet(selectedType, slotIndex);
          cabinetMeshes[slotIndex] = mesh;
          cabinets[slotIndex] = { type: selectedType, slotIndex };
          scene.add(mesh);
          triggerParticleBurst(mesh.position);
          updateHUD();
          syncState();
        }
      }
    });

    const particleCount = 200;
    const particlePositions = new Float32Array(particleCount * 3);
    const particleOpacities = new Float32Array(particleCount);
    const particleVelocities = [];
    const particleBasePositions = [];

    const particleGeometry = new THREE.BufferGeometry();
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

    const particleMaterial = new THREE.PointsMaterial({
      color: 0xffd700,
      size: 0.1,
      transparent: true,
      opacity: 1,
      depthWrite: false
    });

    const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
    particleSystem.visible = false;
    scene.add(particleSystem);

    let particlesActive = false;
    let particleStartTime = 0;

    function triggerParticleBurst(position) {
      for (let i = 0; i < particleCount; i++) {
        const spreadX = (Math.random() - 0.5) * 2.0;
        const spreadY = Math.random() * 1.5;
        const spreadZ = (Math.random() - 0.5) * 1.2;

        const px = position.x + spreadX;
        const py = position.y + spreadY;
        const pz = position.z + spreadZ;

        particlePositions[i * 3] = px;
        particlePositions[i * 3 + 1] = py;
        particlePositions[i * 3 + 2] = pz;

        particleBasePositions[i] = { x: px, y: py, z: pz };
        particleVelocities[i] = {
          x: (Math.random() - 0.5) * 0.02,
          y: 0.02 + Math.random() * 0.03,
          z: (Math.random() - 0.5) * 0.02
        };
      }

      particleGeometry.attributes.position.needsUpdate = true;
      particleMaterial.opacity = 1;
      particleSystem.visible = true;
      particlesActive = true;
      particleStartTime = performance.now();
    }

    let parrot = null;
    let parrotLoaded = false;

    const loader = new GLTFLoader();
    loader.load(
      'Parrot.glb',
      (gltf) => {
        parrot = gltf.scene;
        parrot.position.set(4, 3.5, -4.5);
        parrot.scale.set(0.03, 0.03, 0.03);
        scene.add(parrot);
        parrotLoaded = true;
        syncState();
      },
      undefined,
      () => {
        parrotLoaded = false;
        syncState();
      }
    );

    window.__3D_STATE__ = {
      cabinetCount: 0,
      selectedType: 'base',
      totalPrice: 0,
      parrotLoaded: false,
      parrotRotation: 0,
      particlesActive: false,
      particleCount: 200,
      cabinets: [null, null, null],
      sceneReady: false
    };

    function syncState() {
      window.__3D_STATE__.cabinetCount = getCabinetCount();
      window.__3D_STATE__.selectedType = selectedType;
      window.__3D_STATE__.totalPrice = getTotalPrice();
      window.__3D_STATE__.parrotLoaded = parrotLoaded;
      window.__3D_STATE__.parrotRotation = parrot ? parrot.rotation.y : 0;
      window.__3D_STATE__.particlesActive = particlesActive;
      window.__3D_STATE__.particleCount = particleCount;
      window.__3D_STATE__.cabinets = cabinets.map(c => c ? { ...c } : null);
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      if (parrot) {
        parrot.rotation.y += 0.5 * delta;
      }

      if (particlesActive) {
        const elapsed = (performance.now() - particleStartTime) / 1000;
        const t = Math.min(elapsed / 2, 1);

        for (let i = 0; i < particleCount; i++) {
          particlePositions[i * 3] += particleVelocities[i].x;
          particlePositions[i * 3 + 1] += particleVelocities[i].y;
          particlePositions[i * 3 + 2] += particleVelocities[i].z;
        }

        particleGeometry.attributes.position.needsUpdate = true;
        particleMaterial.opacity = 1 - t;

        if (elapsed >= 2) {
          particlesActive = false;
          particleSystem.visible = false;
          particleMaterial.opacity = 1;
        }
      }

      controls.update();

      window.__3D_STATE__.cabinetCount = getCabinetCount();
      window.__3D_STATE__.selectedType = selectedType;
      window.__3D_STATE__.totalPrice = getTotalPrice();
      window.__3D_STATE__.parrotLoaded = parrotLoaded;
      window.__3D_STATE__.parrotRotation = parrot ? parrot.rotation.y : 0;
      window.__3D_STATE__.particlesActive = particlesActive;
      window.__3D_STATE__.particleCount = particleCount;
      window.__3D_STATE__.cabinets = cabinets.map(c => c ? { ...c } : null);
      window.__3D_STATE__.sceneReady = true;

      renderer.render(scene, camera);
    }

    updateButtonState();
    updateHUD();
    syncState();
    window.__3D_STATE__.sceneReady = true;
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
