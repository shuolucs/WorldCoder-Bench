<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Cabinet Planner</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .top-bar {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h1 {
            margin: 0;
            font-size: 24px;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        button {
            background: #444;
            color: white;
            border: 2px solid transparent;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover {
            background: #555;
        }
        .active-btn {
            border: 2px solid yellow !important;
        }
        #btn-clear {
            background: #8b0000;
        }
        #btn-clear:hover {
            background: #a00000;
        }
        .stats {
            display: flex;
            gap: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-container">
        <div class="top-bar">
            <h1>Kitchen Cabinet Planner</h1>
            <div class="controls">
                <button id="btn-base" class="active-btn">Base ($200)</button>
                <button id="btn-wall">Wall ($150)</button>
                <button id="btn-tall">Tall ($350)</button>
                <button id="btn-clear">Clear All</button>
            </div>
            <div class="stats">
                <span id="cabinet-count">Cabinets: 0/3</span>
                <span id="total-price">Total: $0</span>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            cabinetCount: 0,
            selectedType: 'base',
            totalPrice: 0,
            parrotLoaded: false,
            parrotRotation: 0,
            particlesActive: false,
            particleCount: 200,
            cabinets: [null, null, null],
            sceneReady: false
        };

        const state = window.__3D_STATE__;

        // Configuration
        const config = {
            slots: [-4, 0, 4],
            types: {
                base: { color: 0x8B4513, y: 1.25, price: 200 },
                wall: { color: 0x2E8B57, y: 4.5, price: 150 },
                tall: { color: 0x1E3A5F, y: 2.5, price: 350 }
            },
            cabinetGeo: new THREE.BoxGeometry(2, 2.5, 1)
        };

        // Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 2.5, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Environment
        const floorGeo = new THREE.PlaneGeometry(20, 20);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const wallGeo = new THREE.PlaneGeometry(20, 8);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xf5f5dc });
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(0, 4, -5);
        scene.add(wall);

        // Click Targets
        const clickTargets = [];
        const targetGeo = new THREE.PlaneGeometry(2, 6);
        const targetMat = new THREE.MeshBasicMaterial({ visible: false });

        config.slots.forEach((xPos, index) => {
            const target = new THREE.Mesh(targetGeo, targetMat);
            target.position.set(xPos, 3, -4.5);
            target.userData.slotIndex = index;
            scene.add(target);
            clickTargets.push(target);
        });

        // Cabinet Storage
        const cabinetMeshes = [null, null, null];

        // Parrot Model
        let parrotModel = null;
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Parrot.glb', (gltf) => {
            parrotModel = gltf.scene;
            parrotModel.position.set(4, 3.5, -4.5);
            parrotModel.scale.set(0.03, 0.03, 0.03);
            scene.add(parrotModel);
            state.parrotLoaded = true;
        });

        // Particle System
        const particleGeo = new THREE.BufferGeometry();
        const particlePos = new Float32Array(state.particleCount * 3);
        const particleVelocities = [];

        for (let i = 0; i < state.particleCount; i++) {
            particlePos[i * 3] = 0;
            particlePos[i * 3 + 1] = 0;
            particlePos[i * 3 + 2] = 0;
            particleVelocities.push(new THREE.Vector3(
                (Math.random() - 0.5) * 3,
                Math.random() * 3 + 1,
                (Math.random() - 0.5) * 3
            ));
        }

        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
        const particleMat = new THREE.PointsMaterial({
            color: 0xffd700,
            size: 0.1,
            transparent: true,
            opacity: 1,
            depthWrite: false
        });

        const particleSystem = new THREE.Points(particleGeo, particleMat);
        particleSystem.visible = false;
        scene.add(particleSystem);

        let particleStartTime = 0;
        const particleDuration = 2000;

        function triggerParticles(x, y, z) {
            const positions = particleSystem.geometry.attributes.position.array;
            for (let i = 0; i < state.particleCount; i++) {
                positions[i * 3] = x + (Math.random() - 0.5);
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = z + (Math.random() - 0.5);
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;
            particleMat.opacity = 1;
            particleSystem.visible = true;
            state.particlesActive = true;
            particleStartTime = performance.now();
        }

        // UI Elements
        const btnBase = document.getElementById('btn-base');
        const btnWall = document.getElementById('btn-wall');
        const btnTall = document.getElementById('btn-tall');
        const btnClear = document.getElementById('btn-clear');
        const countDisplay = document.getElementById('cabinet-count');
        const priceDisplay = document.getElementById('total-price');
        const buttons = { base: btnBase, wall: btnWall, tall: btnTall };

        // Interaction Logic
        function updateUI() {
            Object.values(buttons).forEach(btn => btn.classList.remove('active-btn'));
            buttons[state.selectedType].classList.add('active-btn');
            countDisplay.textContent = `Cabinets: ${state.cabinetCount}/3`;
            priceDisplay.textContent = `Total: $${state.totalPrice}`;
        }

        function selectType(type) {
            state.selectedType = type;
            updateUI();
        }

        Object.keys(buttons).forEach(type => {
            buttons[type].addEventListener('click', () => selectType(type));
        });

        btnClear.addEventListener('click', () => {
            cabinetMeshes.forEach((mesh, index) => {
                if (mesh) {
                    scene.remove(mesh);
                    mesh.geometry.dispose();
                    mesh.material.dispose();
                    cabinetMeshes[index] = null;
                    state.cabinets[index] = null;
                }
            });
            state.cabinetCount = 0;
            state.totalPrice = 0;
            updateUI();
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === '1') selectType('base');
            if (e.key === '2') selectType('wall');
            if (e.key === '3') selectType('tall');
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (event.target.tagName === 'BUTTON') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickTargets);

            if (intersects.length > 0) {
                const slotIndex = intersects[0].object.userData.slotIndex;
                
                if (!state.cabinets[slotIndex]) {
                    const typeConfig = config.types[state.selectedType];
                    const mat = new THREE.MeshStandardMaterial({ color: typeConfig.color });
                    const mesh = new THREE.Mesh(config.cabinetGeo, mat);
                    
                    mesh.position.set(config.slots[slotIndex], typeConfig.y, -4.5);
                    scene.add(mesh);
                    
                    cabinetMeshes[slotIndex] = mesh;
                    state.cabinets[slotIndex] = { type: state.selectedType, slotIndex: slotIndex };
                    state.cabinetCount++;
                    state.totalPrice += typeConfig.price;
                    
                    triggerParticles(mesh.position.x, mesh.position.y, mesh.position.z);
                    updateUI();
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();
        state.sceneReady = true;

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = performance.now();

            controls.update();

            if (parrotModel) {
                parrotModel.rotation.y += 0.5 * delta;
                state.parrotRotation = parrotModel.rotation.y;
            }

            if (state.particlesActive) {
                const elapsed = time - particleStartTime;
                if (elapsed > particleDuration) {
                    state.particlesActive = false;
                    particleSystem.visible = false;
                } else {
                    const positions = particleSystem.geometry.attributes.position.array;
                    for (let i = 0; i < state.particleCount; i++) {
                        positions[i * 3] += particleVelocities[i].x * delta;
                        positions[i * 3 + 1] += particleVelocities[i].y * delta;
                        positions[i * 3 + 2] += particleVelocities[i].z * delta;
                    }
                    particleSystem.geometry.attributes.position.needsUpdate = true;
                    particleMat.opacity = 1 - (elapsed / particleDuration);
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
