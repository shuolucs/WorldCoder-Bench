<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crystal Growth Lab</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(10, 10, 30, 0.85);
    color: #ffffff;
    padding: 15px 20px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 13px;
    line-height: 1.7;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    min-width: 260px;
    z-index: 100;
    user-select: none;
}
#hud h1 {
    font-size: 20px;
    margin-bottom: 10px;
    background: linear-gradient(90deg, #ff44aa, #44ffaa, #aa44ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
}
#hud .label { color: #888; }
#hud .value { color: #fff; font-weight: bold; }
#hud .status-on { color: #44ff88; }
#hud .status-off { color: #ff4466; }
#instructions {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 30, 0.75);
    color: #aaa;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 11px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.05);
    z-index: 100;
}
</style>
</head>
<body>

<div id="hud">
    <h1>🔮 Crystal Growth Lab</h1>
    <div><span class="label">Crystals:</span> <span class="value" id="hud-crystals">0</span></div>
    <div><span class="label">Clusters:</span> <span class="value" id="hud-clusters">0</span></div>
    <div><span class="label">Avg Height:</span> <span class="value" id="hud-avgheight">0.00</span></div>
    <div><span class="label">Speed:</span> <span class="value" id="hud-speed">1.00</span>x</div>
    <div><span class="label">Palette:</span> <span class="value" id="hud-palette">vibrant</span></div>
    <div><span class="label">Paused:</span> <span id="hud-paused" class="status-off">No</span></div>
    <div><span class="label">Glow:</span> <span id="hud-glow" class="status-off">Off</span></div>
</div>

<div id="instructions">
    Click: Plant Crystal | Space: Pause | R: Reset | C: Palette | ↑↓: Speed | G: Glow
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Palettes
const palettes = {
    vibrant: [0xff44aa, 0x44ffaa, 0xaa44ff, 0x44aaff, 0xffaa44, 0xff4444],
    ice: [0x88ccff, 0xaaeeff, 0xccffff, 0x6699cc, 0x99bbdd, 0xbbddff],
    fire: [0xff2200, 0xff6600, 0xffaa00, 0xff4400, 0xcc3300, 0xff8800]
};
const paletteModes = ['vibrant', 'ice', 'fire'];
let paletteModeIndex = 0;

// State
let crystals = [];
let clusterCount = 0;
let speedMultiplier = 1.0;
let paused = false;
let paletteMode = 'vibrant';
let glowEnabled = false;
let modelLoaded = false;

window.__3D_STATE__ = {
    crystalCount: 0,
    clusterCount: 0,
    averageHeight: 0,
    speedMultiplier: 1.0,
    paused: false,
    paletteMode: 'vibrant',
    glowEnabled: false,
    maxGeneration: 0,
    modelLoaded: false,
    growthComplete: 0
};

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.015);

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 15, 25);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

const warmLight = new THREE.DirectionalLight(0xffd700, 0.8);
warmLight.position.set(10, 20, 10);
warmLight.castShadow = true;
warmLight.shadow.mapSize.set(1024, 1024);
scene.add(warmLight);

const coolLight = new THREE.DirectionalLight(0x4488ff, 0.5);
coolLight.position.set(-10, 15, -10);
scene.add(coolLight);

// Ground plane (invisible, for raycasting)
const groundGeo = new THREE.PlaneGeometry(200, 200);
const groundMat = new THREE.MeshBasicMaterial({ visible: false });
const groundPlane = new THREE.Mesh(groundGeo, groundMat);
groundPlane.rotation.x = -Math.PI / 2;
groundPlane.position.y = 0;
groundPlane.name = 'groundPlane';
scene.add(groundPlane);

// Visible ground for aesthetics
const visGroundGeo = new THREE.PlaneGeometry(100, 100);
const visGroundMat = new THREE.MeshStandardMaterial({
    color: 0x111122,
    roughness: 0.9,
    metalness: 0.1
});
const visGround = new THREE.Mesh(visGroundGeo, visGroundMat);
visGround.rotation.x = -Math.PI / 2;
visGround.position.y = -0.01;
visGround.receiveShadow = true;
scene.add(visGround);

// Load collision-world.glb
const loader = new GLTFLoader();
loader.load(
    'collision-world.glb',
    (gltf) => {
        const model = gltf.scene;
        model.position.set(0, -2, 0);
        model.scale.set(0.05, 0.05, 0.05);
        model.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        scene.add(model);
        modelLoaded = true;
        window.__3D_STATE__.modelLoaded = true;
        console.log('collision-world.glb loaded successfully');
    },
    (progress) => {
        console.log('Loading model...', Math.round((progress.loaded / (progress.total || 1)) * 100) + '%');
    },
    (error) => {
        console.warn('Could not load collision-world.glb:', error.message);
        // Create a fallback rocky base
        createFallbackBase();
        modelLoaded = true;
        window.__3D_STATE__.modelLoaded = true;
    }
);

function createFallbackBase() {
    const group = new THREE.Group();
    for (let i = 0; i < 30; i++) {
        const size = 0.5 + Math.random() * 2;
        const geo = new THREE.DodecahedronGeometry(size, 0);
        const mat = new THREE.MeshStandardMaterial({
            color: new THREE.Color().setHSL(0, 0, 0.1 + Math.random() * 0.15),
            roughness: 0.9,
            metalness: 0.1
        });
        const rock = new THREE.Mesh(geo, mat);
        rock.position.set(
            (Math.random() - 0.5) * 20,
            -0.5 + Math.random() * 0.5,
            (Math.random() - 0.5) * 20
        );
        rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        rock.scale.set(1, 0.3 + Math.random() * 0.5, 1);
        rock.castShadow = true;
        rock.receiveShadow = true;
        group.add(rock);
    }
    scene.add(group);
}

// Crystal creation
function getRandomColor() {
    const palette = palettes[paletteMode];
    return palette[Math.floor(Math.random() * palette.length)];
}

function createCrystalMesh(color) {
    const radiusTop = 0.08 + Math.random() * 0.15;
    const radiusBottom = 0.15 + Math.random() * 0.25;
    const height = 1.0;
    const geo = new THREE.CylinderGeometry(radiusTop, radiusBottom, height, 6);
    const mat = new THREE.MeshPhysicalMaterial({
        color: color,
        transmission: 0.6,
        roughness: 0.1,
        metalness: 0.1,
        transparent: true,
        opacity: 0.85,
        thickness: 0.5,
        envMapIntensity: 1.0,
        clearcoat: 0.3,
        clearcoatRoughness: 0.1,
        side: THREE.DoubleSide
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    return mesh;
}

function createCrystal(position, generation = 0, parentAngle = null) {
    if (crystals.length >= 50) return null;

    const color = getRandomColor();
    const mesh = createCrystalMesh(color);

    const targetHeight = 1.5 + Math.random() * 3.5;

    // Random tilt
    let tiltX = 0, tiltZ = 0;
    if (generation > 0) {
        const maxTilt = (25 * Math.PI) / 180;
        tiltX = (Math.random() - 0.5) * 2 * maxTilt;
        tiltZ = (Math.random() - 0.5) * 2 * maxTilt;
    } else {
        const maxTilt = (10 * Math.PI) / 180;
        tiltX = (Math.random() - 0.5) * 2 * maxTilt;
        tiltZ = (Math.random() - 0.5) * 2 * maxTilt;
    }

    mesh.position.copy(position);
    mesh.rotation.x = tiltX;
    mesh.rotation.z = tiltZ;
    mesh.scale.set(1, 0.01, 1);

    scene.add(mesh);

    const crystalData = {
        mesh: mesh,
        color: color,
        targetHeight: targetHeight,
        currentHeight: 0.01,
        generation: generation,
        hasSpawned: false,
        growthComplete: false,
        position: position.clone(),
        glowLight: null,
        rotationSpeed: 0.005 + Math.random() * 0.003
    };

    if (glowEnabled) {
        addGlowToCrystal(crystalData);
    }

    crystals.push(crystalData);
    return crystalData;
}

function addGlowToCrystal(crystalData) {
    if (crystalData.glowLight) return;
    const light = new THREE.PointLight(crystalData.color, 0.3, 3);
    light.position.set(0, 0.5, 0);
    crystalData.mesh.add(light);
    crystalData.glowLight = light;
}

function removeGlowFromCrystal(crystalData) {
    if (!crystalData.glowLight) return;
    crystalData.mesh.remove(crystalData.glowLight);
    crystalData.glowLight.dispose();
    crystalData.glowLight = null;
}

function spawnChildren(parentCrystal) {
    if (parentCrystal.generation >= 3) return;
    if (crystals.length >= 50) return;

    const numChildren = 1 + Math.floor(Math.random() * 3);
    for (let i = 0; i < numChildren; i++) {
        if (crystals.length >= 50) break;

        const angle = Math.random() * Math.PI * 2;
        const dist = 0.3 + Math.random() * 1.2;
        const childPos = new THREE.Vector3(
            parentCrystal.position.x + Math.cos(angle) * dist,
            parentCrystal.position.y,
            parentCrystal.position.z + Math.sin(angle) * dist
        );

        createCrystal(childPos, parentCrystal.generation + 1, angle);
    }
}

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onMouseClick(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(groundPlane);

    if (intersects.length > 0) {
        const point = intersects[0].point;
        point.y = 0;
        const crystal = createCrystal(point, 0);
        if (crystal) {
            clusterCount++;
        }
    }
}

renderer.domElement.addEventListener('click', onMouseClick);

// Keyboard
document.addEventListener('keydown', (e) => {
    switch (e.code) {
        case 'Space':
            e.preventDefault();
            paused = !paused;
            break;
        case 'KeyR':
            resetSimulation();
            break;
        case 'KeyC':
            paletteModeIndex = (paletteModeIndex + 1) % paletteModes.length;
            paletteMode = paletteModes[paletteModeIndex];
            break;
        case 'ArrowUp':
            e.preventDefault();
            speedMultiplier = Math.min(4.0, speedMultiplier + 0.25);
            break;
        case 'ArrowDown':
            e.preventDefault();
            speedMultiplier = Math.max(0.25, speedMultiplier - 0.25);
            break;
        case 'KeyG':
            glowEnabled = !glowEnabled;
            crystals.forEach(c => {
                if (glowEnabled) {
                    addGlowToCrystal(c);
                } else {
                    removeGlowFromCrystal(c);
                }
            });
            break;
    }
});

function resetSimulation() {
    crystals.forEach(c => {
        if (c.glowLight) {
            c.mesh.remove(c.glowLight);
            c.glowLight.dispose();
        }
        scene.remove(c.mesh);
        c.mesh.geometry.dispose();
        c.mesh.material.dispose();
    });
    crystals = [];
    clusterCount = 0;
}

// HUD elements
const hudCrystals = document.getElementById('hud-crystals');
const hudClusters = document.getElementById('hud-clusters');
const hudAvgHeight = document.getElementById('hud-avgheight');
const hudSpeed = document.getElementById('hud-speed');
const hudPalette = document.getElementById('hud-palette');
const hudPaused = document.getElementById('hud-paused');
const hudGlow = document.getElementById('hud-glow');

function updateHUD() {
    const avgHeight = crystals.length > 0
        ? crystals.reduce((sum, c) => sum + c.currentHeight, 0) / crystals.length
        : 0;

    hudCrystals.textContent = crystals.length;
    hudClusters.textContent = clusterCount;
    hudAvgHeight.textContent = avgHeight.toFixed(2);
    hudSpeed.textContent = speedMultiplier.toFixed(2);
    hudPalette.textContent = paletteMode;

    hudPaused.textContent = paused ? 'Yes' : 'No';
    hudPaused.className = paused ? 'status-on' : 'status-off';

    hudGlow.textContent = glowEnabled ? 'On' : 'Off';
    hudGlow.className = glowEnabled ? 'status-on' : 'status-off';
}

function updateState() {
    const avgHeight = crystals.length > 0
        ? crystals.reduce((sum, c) => sum + c.currentHeight, 0) / crystals.length
        : 0;
    const maxGen = crystals.length > 0
        ? Math.max(...crystals.map(c => c.generation))
        : 0;
    const growthComplete = crystals.filter(c => c.growthComplete).length;

    window.__3D_STATE__.crystalCount = crystals.length;
    window.__3D_STATE__.clusterCount = clusterCount;
    window.__3D_STATE__.averageHeight = avgHeight;
    window.__3D_STATE__.speedMultiplier = speedMultiplier;
    window.__3D_STATE__.paused = paused;
    window.__3D_STATE__.paletteMode = paletteMode;
    window.__3D_STATE__.glowEnabled = glowEnabled;
    window.__3D_STATE__.maxGeneration = maxGen;
    window.__3D_STATE__.growthComplete = growthComplete;
}

// Particles for ambiance
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3] = (Math.random() - 0.5) * 40;
    particlePositions[i * 3 + 1] = Math.random() * 20;
    particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 40;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({
    color: 0x6644aa,
    size: 0.05,
    transparent: true,
    opacity: 0.6
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    controls.update();

    // Animate particles
    const positions = particleGeo.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
        positions[i * 3 + 1] += 0.005;
        if (positions[i * 3 + 1] > 20) positions[i * 3 + 1] = 0;
    }
    particleGeo.attributes.position.needsUpdate = true;

    if (!paused) {
        const growthStep = 0.02 * speedMultiplier;

        for (let i = 0; i < crystals.length; i++) {
            const c = crystals[i];

            // Growth
            if (!c.growthComplete) {
                c.currentHeight += growthStep;
                if (c.currentHeight >= c.targetHeight) {
                    c.currentHeight = c.targetHeight;
                    c.growthComplete = true;
                }
                const scaleY = c.currentHeight / c.targetHeight;
                c.mesh.scale.set(1, Math.max(0.01, scaleY * c.targetHeight), 1);
                c.mesh.position.y = c.position.y + (c.currentHeight * 0.5);

                // Update glow position
                if (c.glowLight) {
                    c.glowLight.position.y = c.currentHeight * 0.5;
                }
            }

            // Spawn children at 50%
            if (!c.hasSpawned && c.currentHeight >= c.targetHeight * 0.5) {
                c.hasSpawned = true;
                spawnChildren(c);
            }

            // Shimmer rotation
            c.mesh.rotation.y += c.rotationSpeed;
        }
    }

    updateHUD();
    updateState();

    renderer.render(scene, camera);
}

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
