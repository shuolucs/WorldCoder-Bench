<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Weather Radar Visualization</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(10, 18, 28, 0.78);
      border: 1px solid rgba(90, 180, 140, 0.35);
      border-radius: 12px;
      box-shadow: 0 0 18px rgba(40, 180, 120, 0.12);
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    .hud button,
    .hud select,
    .hud input[type="range"] {
      background: rgba(20, 32, 44, 0.95);
      color: #fff;
      border: 1px solid rgba(120, 220, 180, 0.35);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      outline: none;
    }

    .hud button {
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .hud button:hover,
    .hud select:hover {
      background: rgba(28, 48, 64, 0.95);
    }

    .hud button:active {
      transform: scale(0.98);
    }

    .hud label, .hud span {
      color: #d7f5e8;
      font-size: 14px;
      white-space: nowrap;
    }

    #timeSlider {
      width: 220px;
    }

    #infoPanel {
      position: absolute;
      top: 14px;
      right: 14px;
      min-width: 250px;
      padding: 14px 16px;
      background: rgba(10, 18, 28, 0.78);
      border: 1px solid rgba(90, 180, 140, 0.35);
      border-radius: 12px;
      box-shadow: 0 0 18px rgba(40, 180, 120, 0.12);
      backdrop-filter: blur(6px);
      z-index: 10;
      line-height: 1.6;
    }

    #infoPanel .title {
      font-weight: bold;
      color: #9cf3c8;
      margin-bottom: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 13px;
    }

    #infoPanel .row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      font-size: 14px;
    }

    #infoPanel .label {
      color: #b8d9cd;
    }

    #infoPanel .value {
      color: #ffffff;
      text-align: right;
    }

    #hintPanel {
      position: absolute;
      top: 14px;
      left: 14px;
      padding: 10px 12px;
      background: rgba(10, 18, 28, 0.6);
      border: 1px solid rgba(90, 180, 140, 0.25);
      border-radius: 10px;
      font-size: 12px;
      color: #d3efe3;
      z-index: 10;
      line-height: 1.5;
      max-width: 320px;
    }
  </style>
</head>
<body>
  <div id="hintPanel">
    <strong>Controls</strong><br>
    ← / → : Step time<br>
    Space : Play/Pause<br>
    R : Reset<br>
    C : Cycle color mode
  </div>

  <div id="infoPanel">
    <div class="title">Radar Status</div>
    <div class="row"><span class="label">Time Step</span><span class="value" id="infoTimeStep">0</span></div>
    <div class="row"><span class="label">Active Severe Cells</span><span class="value" id="severeCellCount">0</span></div>
    <div class="row"><span class="label">Average Intensity</span><span class="value" id="avgIntensity">0.00</span></div>
    <div class="row"><span class="label">Drone Position</span><span class="value" id="dronePos">X: 0.0, Z: 0.0</span></div>
    <div class="row"><span class="label">Color Mode</span><span class="value" id="colorModeLabel">intensity</span></div>
  </div>

  <div class="hud">
    <button id="playPauseBtn">Play</button>
    <button id="stepBackBtn">Step Back</button>
    <button id="stepForwardBtn">Step Forward</button>
    <input type="range" id="timeSlider" min="0" max="11" step="1" value="0" />
    <span id="timeLabel">T: 0/11</span>
    <select id="speedSelect">
      <option value="0.5">0.5x</option>
      <option value="1" selected>1x</option>
      <option value="2">2x</option>
    </select>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 80, 120);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(50, 100, 50);
    scene.add(directionalLight);

    const terrainGeo = new THREE.PlaneGeometry(200, 200, 20, 20);
    const terrainMat = new THREE.MeshBasicMaterial({
      color: 0x1a4a1a,
      wireframe: true,
      transparent: true,
      opacity: 0.45
    });
    const terrain = new THREE.Mesh(terrainGeo, terrainMat);
    terrain.rotation.x = -Math.PI / 2;
    scene.add(terrain);

    const gridHelper = new THREE.GridHelper(200, 20, 0x2a5a2a, 0x2a5a2a);
    gridHelper.position.y = 0.02;
    scene.add(gridHelper);

    const weatherGroup = new THREE.Group();
    scene.add(weatherGroup);

    const TIME_STEPS = 12;
    const CELL_COUNT = 6;
    const weatherTimeline = [];
    let totalParticles = 0;

    const colorModes = ["intensity", "height", "uniform"];
    let colorMode = "intensity";

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function gaussianLike() {
      return (Math.random() + Math.random() + Math.random() + Math.random() - 2) / 2;
    }

    function intensityColor(intensity) {
      if (intensity < 0.3) return new THREE.Color(0x00cc44);
      if (intensity < 0.6) return new THREE.Color(0xffdd33);
      if (intensity < 0.8) return new THREE.Color(0xff8800);
      return new THREE.Color(0xff2233);
    }

    function heightColor(y, maxY = 45) {
      const t = clamp(y / maxY, 0, 1);
      return new THREE.Color().lerpColors(
        new THREE.Color(0x2266ff),
        new THREE.Color(0xffffff),
        t
      );
    }

    function uniformColor() {
      return new THREE.Color(0x00e5ff);
    }

    function getParticleColor(cell, particleY) {
      if (colorMode === "height") return heightColor(particleY);
      if (colorMode === "uniform") return uniformColor();
      return intensityColor(cell.intensity);
    }

    function generateWeatherTimeline() {
      const baseCells = [];

      for (let i = 0; i < CELL_COUNT; i++) {
        baseCells.push({
          x: rand(-80, 80),
          z: rand(-80, 80),
          radius: rand(10, 30),
          intensity: rand(0.0, 1.0),
          height: rand(10, 40),
          particleCount: Math.floor(rand(40, 81))
        });
      }

      for (let t = 0; t < TIME_STEPS; t++) {
        const stepCells = baseCells.map((base) => {
          const driftX = t * rand(2, 5);
          const intensity = clamp(base.intensity + rand(-0.1, 0.1) + Math.sin(t * 0.7 + base.x * 0.02) * 0.05, 0, 1);
          const x = clamp(base.x + driftX, -95, 95);
          const z = clamp(base.z + Math.sin(t * 0.5 + base.z * 0.03) * 3, -95, 95);

          const particles = [];
          for (let p = 0; p < base.particleCount; p++) {
            const dx = gaussianLike() * base.radius * 0.6;
            const dz = gaussianLike() * base.radius * 0.6;
            const dy = Math.abs(gaussianLike()) * base.height;
            const px = x + dx;
            const py = 1 + dy;
            const pz = z + dz;
            const size = rand(0.3, 1.0);

            particles.push({
              position: new THREE.Vector3(px, py, pz),
              size
            });
          }

          return {
            x,
            z,
            radius: base.radius,
            intensity,
            height: base.height,
            particles
          };
        });

        weatherTimeline.push(stepCells);
      }

      totalParticles = weatherTimeline[0].reduce((sum, c) => sum + c.particles.length, 0);
    }

    generateWeatherTimeline();

    function buildWeatherForTime(step) {
      while (weatherGroup.children.length) {
        const child = weatherGroup.children.pop();
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
          if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
          else child.material.dispose();
        }
      }

      const cells = weatherTimeline[step];

      for (const cell of cells) {
        for (const particle of cell.particles) {
          const geo = new THREE.SphereGeometry(particle.size, 8, 8);
          const mat = new THREE.MeshPhongMaterial({
            color: getParticleColor(cell, particle.position.y),
            transparent: true,
            opacity: 0.72,
            emissive: getParticleColor(cell, particle.position.y).clone().multiplyScalar(0.15)
          });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.copy(particle.position);
          weatherGroup.add(mesh);
        }
      }
    }

    let parrot = null;
    let parrotMixer = null;
    let parrotLoaded = false;

    const loader = new GLTFLoader();
    loader.load(
      "https://threejs.org/examples/models/gltf/Parrot.glb",
      (gltf) => {
        parrot = gltf.scene;
        parrot.scale.setScalar(0.3);
        parrot.position.set(0, 50, 0);
        scene.add(parrot);

        if (gltf.animations && gltf.animations.length > 0) {
          parrotMixer = new THREE.AnimationMixer(parrot);
          gltf.animations.forEach((clip) => {
            parrotMixer.clipAction(clip).play();
          });
        }

        parrotLoaded = true;
        updateParrotForTime(currentTimeStep);
        updateInfoPanel();
      },
      undefined,
      (err) => {
        console.error("Failed to load Parrot.glb", err);
      }
    );

    function updateParrotForTime(step) {
      if (!parrot) return;
      const angle = (step / TIME_STEPS) * Math.PI * 2;
      const radius = 60;
      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;
      parrot.position.set(x, 50, z);

      const nextAngle = ((step + 0.05) / TIME_STEPS) * Math.PI * 2;
      const nextX = Math.cos(nextAngle) * radius;
      const nextZ = Math.sin(nextAngle) * radius;
      parrot.lookAt(nextX, 50, nextZ);
    }

    const playPauseBtn = document.getElementById("playPauseBtn");
    const stepBackBtn = document.getElementById("stepBackBtn");
    const stepForwardBtn = document.getElementById("stepForwardBtn");
    const timeSlider = document.getElementById("timeSlider");
    const timeLabel = document.getElementById("timeLabel");
    const speedSelect = document.getElementById("speedSelect");

    const infoTimeStep = document.getElementById("infoTimeStep");
    const severeCellCountEl = document.getElementById("severeCellCount");
    const avgIntensityEl = document.getElementById("avgIntensity");
    const dronePosEl = document.getElementById("dronePos");
    const colorModeLabelEl = document.getElementById("colorModeLabel");

    let currentTimeStep = 0;
    let isPlaying = false;
    let playbackSpeed = 1.0;
    let playbackTimer = null;
    const timeStepHistory = [];

    function pushHistory(step) {
      timeStepHistory.push(step);
      while (timeStepHistory.length > 5) timeStepHistory.shift();
    }

    function getCurrentCellsSummary() {
      const cells = weatherTimeline[currentTimeStep];
      const severeCellCount = cells.filter(c => c.intensity > 0.5).length;
      const avgIntensity = cells.reduce((sum, c) => sum + c.intensity, 0) / cells.length;
      return { severeCellCount, avgIntensity, cells };
    }

    function updateStateObject() {
      const { severeCellCount, avgIntensity, cells } = getCurrentCellsSummary();
      const parrotPosition = parrot
        ? { x: parrot.position.x, y: parrot.position.y, z: parrot.position.z }
        : { x: 0, y: 0, z: 0 };

      window.__3D_STATE__ = {
        currentTimeStep,
        isPlaying,
        playbackSpeed,
        colorMode,
        weatherCells: cells.map(c => ({
          x: c.x,
          z: c.z,
          intensity: c.intensity,
          radius: c.radius
        })),
        severeCellCount,
        avgIntensity,
        parrotPosition,
        parrotLoaded,
        totalParticles,
        cameraDistance: camera.position.distanceTo(new THREE.Vector3(0, 0, 0)),
        timeStepHistory: [...timeStepHistory]
      };
    }

    function updateInfoPanel() {
      const { severeCellCount, avgIntensity } = getCurrentCellsSummary();

      infoTimeStep.textContent = `${currentTimeStep}`;
      severeCellCountEl.textContent = `${severeCellCount}`;
      avgIntensityEl.textContent = avgIntensity.toFixed(2);

      if (parrot) {
        dronePosEl.textContent = `X: ${parrot.position.x.toFixed(1)}, Z: ${parrot.position.z.toFixed(1)}`;
      } else {
        dronePosEl.textContent = `X: 0.0, Z: 0.0`;
      }

      colorModeLabelEl.textContent = colorMode;
      updateStateObject();
    }

    function updateHUD() {
      timeSlider.value = String(currentTimeStep);
      timeLabel.textContent = `T: ${currentTimeStep}/11`;
      playPauseBtn.textContent = isPlaying ? "Pause" : "Play";
    }

    function renderTimeStep(step, trackHistory = true) {
      currentTimeStep = ((step % TIME_STEPS) + TIME_STEPS) % TIME_STEPS;
      if (trackHistory) pushHistory(currentTimeStep);
      buildWeatherForTime(currentTimeStep);
      updateParrotForTime(currentTimeStep);
      updateHUD();
      updateInfoPanel();
    }

    function stepForward() {
      renderTimeStep(currentTimeStep + 1);
    }

    function stepBack() {
      renderTimeStep(currentTimeStep - 1);
    }

    function clearPlaybackTimer() {
      if (playbackTimer) {
        clearInterval(playbackTimer);
        playbackTimer = null;
      }
    }

    function restartPlaybackTimer() {
      clearPlaybackTimer();
      if (!isPlaying) return;
      const interval = 2000 / playbackSpeed;
      playbackTimer = setInterval(() => {
        stepForward();
      }, interval);
    }

    function setPlaying(value) {
      isPlaying = value;
      updateHUD();
      restartPlaybackTimer();
      updateStateObject();
    }

    function resetPlayback() {
      setPlaying(false);
      renderTimeStep(0);
    }

    function cycleColorMode() {
      const idx = colorModes.indexOf(colorMode);
      colorMode = colorModes[(idx + 1) % colorModes.length];
      renderTimeStep(currentTimeStep, false);
    }

    playPauseBtn.addEventListener("click", () => {
      setPlaying(!isPlaying);
    });

    stepBackBtn.addEventListener("click", () => {
      stepBack();
    });

    stepForwardBtn.addEventListener("click", () => {
      stepForward();
    });

    timeSlider.addEventListener("input", (e) => {
      renderTimeStep(parseInt(e.target.value, 10));
    });

    speedSelect.addEventListener("change", (e) => {
      playbackSpeed = parseFloat(e.target.value);
      restartPlaybackTimer();
      updateStateObject();
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "ArrowRight") {
        stepForward();
      } else if (e.code === "ArrowLeft") {
        stepBack();
      } else if (e.code === "Space") {
        e.preventDefault();
        setPlaying(!isPlaying);
      } else if (e.key === "r" || e.key === "R") {
        resetPlayback();
      } else if (e.key === "c" || e.key === "C") {
        cycleColorMode();
      }
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();
      if (parrotMixer) parrotMixer.update(dt);

      controls.update();
      updateStateObject();
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      updateStateObject();
    });

    renderTimeStep(0);
    updateHUD();
    updateInfoPanel();
    animate();
  </script>
</body>
</html>
