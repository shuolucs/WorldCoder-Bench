<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Weather Radar Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        
        /* HUD Styling */
        #hud {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 20, 30, 0.85);
            border-top: 2px solid #2a5a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 0;
            gap: 20px;
            z-index: 10;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }
        
        .hud-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button, select {
            background: #112211;
            color: #00ffcc;
            border: 1px solid #2a5a2a;
            padding: 8px 15px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        button:hover, select:hover {
            background: #1a4a1a;
            box-shadow: 0 0 8px rgba(0, 255, 204, 0.4);
        }

        button:active {
            background: #2a5a2a;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 200px;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #00ffcc;
            cursor: pointer;
            margin-top: -6px;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #2a5a2a;
            border-radius: 2px;
        }

        #timeLabel {
            font-size: 16px;
            color: #00ffcc;
            min-width: 80px;
            text-align: center;
        }

        /* Info Panel Styling */
        #infoPanel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 20, 30, 0.85);
            border: 1px solid #2a5a2a;
            padding: 15px;
            z-index: 10;
            min-width: 250px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border-radius: 4px;
        }

        .panel-title {
            color: #00ffcc;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px solid #2a5a2a;
            padding-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .info-label {
            color: #88aa88;
        }

        .info-val {
            color: #ffffff;
            font-weight: bold;
        }

        .controls-help {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #668866;
            font-size: 12px;
            pointer-events: none;
            line-height: 1.5;
        }
        .key { color: #00ffcc; }
    </style>
    
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="controls-help">
        <div><span class="key">Space</span> : Play/Pause</div>
        <div><span class="key">← / →</span> : Step Time</div>
        <div><span class="key">R</span> : Reset Time</div>
        <div><span class="key">C</span> : Cycle Color Mode</div>
        <div><span class="key">Drag</span> : Rotate Camera</div>
    </div>

    <div id="infoPanel">
        <div class="panel-title">Radar Telemetry</div>
        <div class="info-row">
            <span class="info-label">Time Step:</span>
            <span class="info-val" id="panelTimeStep">0</span>
        </div>
        <div class="info-row">
            <span class="info-label">Severe Cells (>0.5):</span>
            <span class="info-val" id="severeCellCount">0</span>
        </div>
        <div class="info-row">
            <span class="info-label">Avg Intensity:</span>
            <span class="info-val" id="avgIntensity">0.00</span>
        </div>
        <div class="info-row">
            <span class="info-label">Drone Pos:</span>
            <span class="info-val" id="dronePos">X: 0.0, Z: 0.0</span>
        </div>
        <div class="info-row">
            <span class="info-label">Color Mode:</span>
            <span class="info-val" id="colorModeLabel">intensity</span>
        </div>
    </div>

    <div id="hud">
        <div class="hud-group">
            <button id="stepBackBtn">|&lt;</button>
            <button id="playPauseBtn">PLAY</button>
            <button id="stepForwardBtn">&gt;|</button>
        </div>
        
        <div class="hud-group">
            <input type="range" id="timeSlider" min="0" max="11" step="1" value="0">
            <div id="timeLabel">T: 0/11</div>
        </div>

        <div class="hud-group">
            <select id="speedSelect">
                <option value="0.5">0.5x</option>
                <option value="1" selected>1x</option>
                <option value="2">2x</option>
            </select>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            currentTimeStep: 0,
            isPlaying: false,
            playbackSpeed: 1.0,
            colorMode: 'intensity', // 'intensity', 'height', 'uniform'
            weatherCells: [],
            severeCellCount: 0,
            avgIntensity: 0,
            parrotPosition: { x: 0, y: 50, z: 0 },
            parrotLoaded: false,
            totalParticles: 0,
            cameraDistance: 0,
            timeStepHistory: [0]
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.004);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(0, 80, 120);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(50, 100, 50);
        scene.add(dirLight);

        // Terrain Grid
        const planeGeo = new THREE.PlaneGeometry(200, 200);
        planeGeo.rotateX(-Math.PI / 2);
        const planeMat = new THREE.MeshBasicMaterial({ color: 0x1a4a1a, wireframe: true, transparent: true, opacity: 0.5 });
        const plane = new THREE.Mesh(planeGeo, planeMat);
        scene.add(plane);

        const gridHelper = new THREE.GridHelper(200, 20, 0x2a5a2a, 0x2a5a2a);
        gridHelper.position.y = 0.1;
        scene.add(gridHelper);

        // --- Weather Data Simulation ---
        const NUM_STEPS = 12;
        const NUM_CELLS = 6;
        const weatherData = []; // Array of 12 steps, each containing cell data

        // Generate base cells for step 0
        let initialCells = [];
        for (let i = 0; i < NUM_CELLS; i++) {
            const radius = 10 + Math.random() * 20;
            const height = 10 + Math.random() * 30;
            const numParticles = Math.floor(40 + Math.random() * 41); // 40-80
            
            const particles = [];
            for (let p = 0; p < numParticles; p++) {
                // Gaussian-like distribution
                const r = (Math.random() + Math.random() + Math.random() - 1.5) * 0.66 * radius;
                const theta = Math.random() * Math.PI * 2;
                const dy = (Math.random() - 0.5) * height;
                particles.push({
                    dx: r * Math.cos(theta),
                    dy: dy,
                    dz: r * Math.sin(theta),
                    size: 0.3 + Math.random() * 0.7
                });
            }

            initialCells.push({
                x: (Math.random() - 0.5) * 160,
                z: (Math.random() - 0.5) * 160,
                radius: radius,
                intensity: Math.random(),
                height: height,
                particles: particles
            });
        }
        weatherData.push(initialCells);

        // Generate subsequent steps
        for (let t = 1; t < NUM_STEPS; t++) {
            let nextCells = [];
            for (let i = 0; i < NUM_CELLS; i++) {
                const prev = weatherData[t - 1][i];
                nextCells.push({
                    x: prev.x + 2 + Math.random() * 3, // Drift X
                    z: prev.z + (Math.random() - 0.5) * 2, // Slight Z drift
                    radius: prev.radius,
                    intensity: Math.max(0, Math.min(1, prev.intensity + (Math.random() * 0.2 - 0.1))), // Fluctuate ±0.1
                    height: prev.height,
                    particles: prev.particles // Keep relative particle positions
                });
            }
            weatherData.push(nextCells);
        }

        // --- Particle Rendering (InstancedMesh) ---
        const maxParticles = NUM_CELLS * 80;
        const sphereGeo = new THREE.SphereGeometry(1, 8, 8);
        const sphereMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
        const instancedMesh = new THREE.InstancedMesh(sphereGeo, sphereMat, maxParticles);
        instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        instancedMesh.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(maxParticles * 3), 3);
        scene.add(instancedMesh);

        const dummy = new THREE.Object3D();
        const colorGreen = new THREE.Color(0x00ff00);
        const colorYellow = new THREE.Color(0xffff00);
        const colorOrange = new THREE.Color(0xffa500);
        const colorRed = new THREE.Color(0xff0000);
        const colorCyan = new THREE.Color(0x00ffff);
        const colorBlue = new THREE.Color(0x0000ff);
        const colorWhite = new THREE.Color(0xffffff);
        const tempColor = new THREE.Color();

        function getParticleColor(intensity, yPos, mode) {
            if (mode === 'uniform') return colorCyan;
            if (mode === 'height') {
                const t = Math.max(0, Math.min(1, yPos / 40));
                return tempColor.lerpColors(colorBlue, colorWhite, t);
            }
            // Default: intensity
            if (intensity < 0.3) return colorGreen;
            if (intensity < 0.6) return colorYellow;
            if (intensity < 0.8) return colorOrange;
            return colorRed;
        }

        // --- Parrot Drone ---
        let parrot, mixer;
        const targetParrotPos = new THREE.Vector3();
        const targetParrotLookAt = new THREE.Vector3();

        const gltfLoader = new GLTFLoader();
        gltfLoader.load('https://threejs.org/examples/models/gltf/Parrot.glb', (gltf) => {
            parrot = gltf.scene;
            parrot.scale.set(0.3, 0.3, 0.3);
            scene.add(parrot);
            
            if (gltf.animations && gltf.animations.length) {
                mixer = new THREE.AnimationMixer(parrot);
                mixer.clipAction(gltf.animations[0]).play();
            }
            
            state.parrotLoaded = true;
            updateParrotTarget(state.currentTimeStep);
            parrot.position.copy(targetParrotPos);
            parrot.lookAt(targetParrotLookAt);
        });

        function updateParrotTarget(step) {
            // 1 revolution over 12 steps
            const angle = (step / NUM_STEPS) * Math.PI * 2;
            const radius = 60;
            const height = 50;
            
            const px = Math.cos(angle) * radius;
            const pz = -Math.sin(angle) * radius;
            targetParrotPos.set(px, height, pz);

            // Tangent for lookAt
            const tx = -Math.sin(angle);
            const tz = -Math.cos(angle);
            targetParrotLookAt.set(px + tx, height, pz + tz);
        }

        // --- Core Update Logic ---
        function updateScene(step) {
            const cells = weatherData[step];
            let particleIndex = 0;
            let severeCount = 0;
            let totalIntensity = 0;

            for (const cell of cells) {
                if (cell.intensity > 0.5) severeCount++;
                totalIntensity += cell.intensity;

                for (const p of cell.particles) {
                    const py = cell.height / 2 + p.dy;
                    dummy.position.set(cell.x + p.dx, py, cell.z + p.dz);
                    dummy.scale.set(p.size, p.size, p.size);
                    dummy.updateMatrix();
                    instancedMesh.setMatrixAt(particleIndex, dummy.matrix);

                    const c = getParticleColor(cell.intensity, py, state.colorMode);
                    instancedMesh.setColorAt(particleIndex, c);

                    particleIndex++;
                }
            }
            
            instancedMesh.count = particleIndex;
            instancedMesh.instanceMatrix.needsUpdate = true;
            if (instancedMesh.instanceColor) instancedMesh.instanceColor.needsUpdate = true;

            updateParrotTarget(step);

            // Update State
            state.currentTimeStep = step;
            state.weatherCells = cells.map(c => ({ x: c.x, z: c.z, intensity: c.intensity, radius: c.radius }));
            state.severeCellCount = severeCount;
            state.avgIntensity = totalIntensity / NUM_CELLS;
            state.totalParticles = particleIndex;

            if (state.timeStepHistory[state.timeStepHistory.length - 1] !== step) {
                state.timeStepHistory.push(step);
                if (state.timeStepHistory.length > 5) state.timeStepHistory.shift();
            }

            updateUI();
        }

        // --- UI & Controls ---
        const playPauseBtn = document.getElementById('playPauseBtn');
        const stepBackBtn = document.getElementById('stepBackBtn');
        const stepForwardBtn = document.getElementById('stepForwardBtn');
        const timeSlider = document.getElementById('timeSlider');
        const timeLabel = document.getElementById('timeLabel');
        const speedSelect = document.getElementById('speedSelect');
        
        const uiPanelTimeStep = document.getElementById('panelTimeStep');
        const uiSevereCount = document.getElementById('severeCellCount');
        const uiAvgIntensity = document.getElementById('avgIntensity');
        const uiDronePos = document.getElementById('dronePos');
        const uiColorMode = document.getElementById('colorModeLabel');

        function togglePlay() {
            state.isPlaying = !state.isPlaying;
            playPauseBtn.textContent = state.isPlaying ? 'PAUSE' : 'PLAY';
            playPauseBtn.style.color = state.isPlaying ? '#ffaa00' : '#00ffcc';
            lastStepTime = performance.now();
        }

        function setStep(step) {
            let s = step % NUM_STEPS;
            if (s < 0) s += NUM_STEPS;
            updateScene(s);
        }

        function stepForward() { setStep(state.currentTimeStep + 1); }
        function stepBack() { setStep(state.currentTimeStep - 1); }
        function resetTime() {
            state.isPlaying = false;
            playPauseBtn.textContent = 'PLAY';
            playPauseBtn.style.color = '#00ffcc';
            setStep(0);
        }

        function cycleColorMode() {
            const modes = ['intensity', 'height', 'uniform'];
            const idx = modes.indexOf(state.colorMode);
            state.colorMode = modes[(idx + 1) % modes.length];
            updateScene(state.currentTimeStep); // Force color update
        }

        function updateUI() {
            timeSlider.value = state.currentTimeStep;
            timeLabel.textContent = `T: ${state.currentTimeStep}/${NUM_STEPS - 1}`;
            
            uiPanelTimeStep.textContent = state.currentTimeStep;
            uiSevereCount.textContent = state.severeCellCount;
            uiAvgIntensity.textContent = state.avgIntensity.toFixed(2);
            uiColorMode.textContent = state.colorMode;
        }

        // Event Listeners
        playPauseBtn.addEventListener('click', togglePlay);
        stepForwardBtn.addEventListener('click', stepForward);
        stepBackBtn.addEventListener('click', stepBack);
        
        timeSlider.addEventListener('input', (e) => {
            setStep(parseInt(e.target.value));
        });

        speedSelect.addEventListener('change', (e) => {
            state.playbackSpeed = parseFloat(e.target.value);
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                togglePlay();
                e.preventDefault();
            } else if (e.code === 'ArrowRight') {
                stepForward();
            } else if (e.code === 'ArrowLeft') {
                stepBack();
            } else if (e.code === 'KeyR') {
                resetTime();
            } else if (e.code === 'KeyC') {
                cycleColorMode();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let lastStepTime = performance.now();

        // Initialize first frame
        updateScene(0);

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const now = performance.now();

            // Time progression logic
            if (state.isPlaying) {
                const interval = 2000 / state.playbackSpeed;
                if (now - lastStepTime > interval) {
                    stepForward();
                    lastStepTime = now;
                }
            }

            // Smooth Parrot Animation
            if (parrot) {
                parrot.position.lerp(targetParrotPos, 0.05);
                
                // Smooth lookAt
                const currentLookAt = new THREE.Vector3(0,0,1).applyQuaternion(parrot.quaternion).add(parrot.position);
                currentLookAt.lerp(targetParrotLookAt, 0.05);
                parrot.lookAt(currentLookAt);

                state.parrotPosition.x = parrot.position.x;
                state.parrotPosition.y = parrot.position.y;
                state.parrotPosition.z = parrot.position.z;
                
                uiDronePos.textContent = `X: ${parrot.position.x.toFixed(1)}, Z: ${parrot.position.z.toFixed(1)}`;
            }

            if (mixer) mixer.update(delta);

            controls.update();
            state.cameraDistance = camera.position.distanceTo(controls.target);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
