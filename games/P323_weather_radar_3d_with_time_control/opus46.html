<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Weather Radar Visualization</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; font-family: 'Courier New', monospace; }
  canvas { display: block; }

  #infoPanel {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(10, 15, 30, 0.85);
    border: 1px solid rgba(0, 255, 100, 0.3);
    border-radius: 8px;
    padding: 16px 20px;
    color: #c0ffc0;
    font-size: 13px;
    line-height: 1.8;
    min-width: 260px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0, 255, 100, 0.1);
    z-index: 100;
  }
  #infoPanel h3 {
    color: #00ff64;
    font-size: 14px;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(0, 255, 100, 0.2);
    padding-bottom: 6px;
  }
  #infoPanel .row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
  }
  #infoPanel .label { color: #80c080; }
  #infoPanel .value { color: #ffffff; font-weight: bold; }

  #hudBar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10, 15, 30, 0.9);
    border-top: 1px solid rgba(0, 255, 100, 0.3);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    backdrop-filter: blur(10px);
    z-index: 100;
  }
  #hudBar button {
    background: rgba(0, 255, 100, 0.15);
    border: 1px solid rgba(0, 255, 100, 0.4);
    color: #00ff64;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  #hudBar button:hover {
    background: rgba(0, 255, 100, 0.3);
    box-shadow: 0 0 10px rgba(0, 255, 100, 0.3);
  }
  #hudBar button:active {
    background: rgba(0, 255, 100, 0.5);
  }

  #timeSlider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: rgba(0, 255, 100, 0.2);
    border-radius: 3px;
    outline: none;
  }
  #timeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #00ff64;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(0, 255, 100, 0.5);
  }
  #timeSlider::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #00ff64;
    cursor: pointer;
    border: none;
    box-shadow: 0 0 8px rgba(0, 255, 100, 0.5);
  }

  #timeLabel {
    color: #00ff64;
    font-size: 14px;
    min-width: 70px;
    text-align: center;
    font-weight: bold;
  }

  #speedSelect {
    background: rgba(10, 15, 30, 0.9);
    border: 1px solid rgba(0, 255, 100, 0.4);
    color: #00ff64;
    padding: 8px 12px;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }
  #speedSelect option {
    background: #0a0f1e;
    color: #00ff64;
  }

  #titleBar {
    position: fixed;
    top: 20px;
    left: 20px;
    color: #00ff64;
    font-size: 18px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 0 10px rgba(0, 255, 100, 0.5);
    z-index: 100;
  }
  #titleBar .subtitle {
    font-size: 11px;
    color: #80c080;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .scanline {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 255, 100, 0.015) 2px,
      rgba(0, 255, 100, 0.015) 4px
    );
    z-index: 99;
  }
</style>
</head>
<body>

<div class="scanline"></div>

<div id="titleBar">
  ☁ Weather Radar 3D
  <div class="subtitle">Regional Precipitation Monitor</div>
</div>

<div id="infoPanel">
  <h3>☰ Radar Status</h3>
  <div class="row"><span class="label">Time Step:</span><span class="value" id="infoTimeStep">0/11</span></div>
  <div class="row"><span class="label">Severe Cells:</span><span class="value" id="severeCellCount">0</span></div>
  <div class="row"><span class="label">Avg Intensity:</span><span class="value" id="avgIntensity">0.00</span></div>
  <div class="row"><span class="label">Drone Pos:</span><span class="value" id="dronePos">X: 0.0, Z: 0.0</span></div>
  <div class="row"><span class="label">Color Mode:</span><span class="value" id="colorModeLabel">intensity</span></div>
</div>

<div id="hudBar">
  <button id="stepBackBtn">◀ Step</button>
  <button id="playPauseBtn">▶ Play</button>
  <button id="stepForwardBtn">Step ▶</button>
  <input type="range" id="timeSlider" min="0" max="11" step="1" value="0">
  <span id="timeLabel">T: 0/11</span>
  <select id="speedSelect">
    <option value="0.5">0.5x</option>
    <option value="1" selected>1x</option>
    <option value="2">2x</option>
  </select>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const state = {
  currentTimeStep: 0,
  isPlaying: false,
  playbackSpeed: 1.0,
  colorMode: 'intensity',
  weatherCells: [],
  severeCellCount: 0,
  avgIntensity: 0,
  parrotPosition: { x: 0, y: 50, z: 0 },
  parrotLoaded: false,
  totalParticles: 0,
  cameraDistance: 0,
  timeStepHistory: [0]
};
window.__3D_STATE__ = state;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.003);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 80, 120);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(50, 100, 50);
dirLight.castShadow = true;
scene.add(dirLight);

// --- Terrain ---
const terrainGeo = new THREE.PlaneGeometry(200, 200, 20, 20);
const terrainMat = new THREE.MeshBasicMaterial({ color: 0x1a4a1a, wireframe: true });
const terrain = new THREE.Mesh(terrainGeo, terrainMat);
terrain.rotation.x = -Math.PI / 2;
scene.add(terrain);

const gridHelper = new THREE.GridHelper(200, 20, 0x2a5a2a, 0x2a5a2a);
scene.add(gridHelper);

// --- Seeded Random ---
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

// --- Gaussian-like random ---
function gaussianRandom(rng) {
  let u = 0, v = 0;
  while (u === 0) u = rng();
  while (v === 0) v = rng();
  return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
}

// --- Weather Data Generation ---
const rng = seededRandom(42);

function generateBaseCells() {
  const cells = [];
  for (let i = 0; i < 6; i++) {
    cells.push({
      x: (rng() * 160) - 80,
      z: (rng() * 160) - 80,
      radius: 10 + rng() * 20,
      intensity: rng(),
      height: 10 + rng() * 30
    });
  }
  return cells;
}

const baseCells = generateBaseCells();

// Generate 12 time steps
const weatherTimeline = [];
for (let t = 0; t < 12; t++) {
  const stepCells = baseCells.map((cell, i) => {
    const drift = t * (2 + rng() * 3);
    const intensityFlux = (rng() - 0.5) * 0.2 * t * 0.3;
    return {
      x: cell.x + drift,
      z: cell.z + (rng() - 0.5) * 2 * t,
      radius: cell.radius,
      intensity: Math.max(0, Math.min(1, cell.intensity + intensityFlux)),
      height: cell.height
    };
  });
  weatherTimeline.push(stepCells);
}

// --- Particle System ---
const particleGroups = []; // Array of { group, cellIndex, particles[] }
let totalParticleCount = 0;

function getIntensityColor(intensity) {
  if (intensity < 0.3) return new THREE.Color(0x00cc00); // green
  if (intensity < 0.6) return new THREE.Color(0xcccc00); // yellow
  if (intensity < 0.8) return new THREE.Color(0xff8800); // orange
  return new THREE.Color(0xff0000); // red
}

function getHeightColor(y, maxH) {
  const t = Math.min(1, y / maxH);
  return new THREE.Color().setHSL(0.6 - t * 0.1, 0.8, 0.3 + t * 0.7);
}

function createParticlesForCell(cell, cellIndex) {
  const group = new THREE.Group();
  const particleCount = Math.floor(40 + rng() * 40);
  const particles = [];
  const cellRng = seededRandom(cellIndex * 1000 + 7);

  for (let p = 0; p < particleCount; p++) {
    const radius = 0.3 + cellRng() * 0.7;
    const geo = new THREE.SphereGeometry(radius, 6, 6);
    const color = getIntensityColor(cell.intensity);
    const mat = new THREE.MeshPhongMaterial({
      color: color,
      transparent: true,
      opacity: 0.4 + cell.intensity * 0.4,
      emissive: color.clone().multiplyScalar(0.3)
    });
    const mesh = new THREE.Mesh(geo, mat);

    // Gaussian distribution around center
    const gx = gaussianRandom(cellRng) * cell.radius * 0.4;
    const gz = gaussianRandom(cellRng) * cell.radius * 0.4;
    const gy = Math.abs(gaussianRandom(cellRng)) * cell.height * 0.5;

    mesh.position.set(gx, gy, gz);
    mesh.userData.localOffset = { x: gx, y: gy, z: gz };
    mesh.userData.radius = radius;

    group.add(mesh);
    particles.push(mesh);
  }

  group.position.set(cell.x, 0, cell.z);
  scene.add(group);
  totalParticleCount += particleCount;

  return { group, cellIndex, particles };
}

// Create initial particles
for (let i = 0; i < 6; i++) {
  const pg = createParticlesForCell(weatherTimeline[0][i], i);
  particleGroups.push(pg);
}

state.totalParticles = totalParticleCount;

// --- Update Weather Display ---
function updateWeatherDisplay(timeStep) {
  const cells = weatherTimeline[timeStep];
  state.weatherCells = cells.map(c => ({ x: c.x, z: c.z, intensity: c.intensity, radius: c.radius }));

  for (let i = 0; i < particleGroups.length; i++) {
    const pg = particleGroups[i];
    const cell = cells[i];

    pg.group.position.set(cell.x, 0, cell.z);

    pg.particles.forEach(mesh => {
      let color;
      const y = mesh.userData.localOffset.y;

      if (state.colorMode === 'intensity') {
        color = getIntensityColor(cell.intensity);
      } else if (state.colorMode === 'height') {
        color = getHeightColor(y, cell.height);
      } else {
        color = new THREE.Color(0x00cccc);
      }

      mesh.material.color.copy(color);
      mesh.material.emissive.copy(color.clone().multiplyScalar(0.3));
      mesh.material.opacity = 0.4 + cell.intensity * 0.4;
    });
  }

  // Update stats
  let severeCount = 0;
  let totalIntensity = 0;
  cells.forEach(c => {
    if (c.intensity > 0.5) severeCount++;
    totalIntensity += c.intensity;
  });
  state.severeCellCount = severeCount;
  state.avgIntensity = totalIntensity / cells.length;

  // Update UI
  document.getElementById('infoTimeStep').textContent = `${timeStep}/11`;
  document.getElementById('severeCellCount').textContent = severeCount;
  document.getElementById('avgIntensity').textContent = state.avgIntensity.toFixed(2);
  document.getElementById('timeLabel').textContent = `T: ${timeStep}/11`;
  document.getElementById('timeSlider').value = timeStep;
}

// --- Parrot ---
let parrotModel = null;
let mixer = null;
const clock = new THREE.Clock();

const loader = new GLTFLoader();
loader.load(
  'https://threejs.org/examples/models/gltf/Parrot.glb',
  (gltf) => {
    parrotModel = gltf.scene;
    parrotModel.scale.set(0.3, 0.3, 0.3);
    parrotModel.position.set(60, 50, 0);
    scene.add(parrotModel);
    state.parrotLoaded = true;

    if (gltf.animations && gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(parrotModel);
      const action = mixer.clipAction(gltf.animations[0]);
      action.play();
    }
  },
  undefined,
  (err) => {
    console.warn('Could not load Parrot.glb:', err);
    // Create a placeholder
    const geo = new THREE.ConeGeometry(2, 6, 8);
    const mat = new THREE.MeshPhongMaterial({ color: 0x00ff88, emissive: 0x004422 });
    parrotModel = new THREE.Mesh(geo, mat);
    parrotModel.position.set(60, 50, 0);
    parrotModel.rotation.z = Math.PI / 2;
    scene.add(parrotModel);
    state.parrotLoaded = true;
  }
);

function updateParrotPosition(timeStep) {
  if (!parrotModel) return;
  const angle = (timeStep / 12) * Math.PI * 2;
  const x = Math.cos(angle) * 60;
  const z = Math.sin(angle) * 60;
  parrotModel.position.set(x, 50, z);

  // Face direction of travel
  const nextAngle = ((timeStep + 1) / 12) * Math.PI * 2;
  const nx = Math.cos(nextAngle) * 60;
  const nz = Math.sin(nextAngle) * 60;
  parrotModel.lookAt(nx, 50, nz);

  state.parrotPosition = { x: x, y: 50, z: z };
  document.getElementById('dronePos').textContent = `X: ${x.toFixed(1)}, Z: ${z.toFixed(1)}`;
}

// --- Time Controls ---
let playInterval = null;

function setTimeStep(t) {
  state.currentTimeStep = t;
  updateWeatherDisplay(t);
  updateParrotPosition(t);

  // Track history
  state.timeStepHistory.push(t);
  if (state.timeStepHistory.length > 5) {
    state.timeStepHistory.shift();
  }
}

function stepForward() {
  setTimeStep((state.currentTimeStep + 1) % 12);
}

function stepBack() {
  setTimeStep((state.currentTimeStep - 1 + 12) % 12);
}

function startPlayback() {
  if (playInterval) clearInterval(playInterval);
  state.isPlaying = true;
  document.getElementById('playPauseBtn').textContent = '⏸ Pause';
  const interval = 2000 / state.playbackSpeed;
  playInterval = setInterval(stepForward, interval);
}

function stopPlayback() {
  if (playInterval) clearInterval(playInterval);
  playInterval = null;
  state.isPlaying = false;
  document.getElementById('playPauseBtn').textContent = '▶ Play';
}

function togglePlayPause() {
  if (state.isPlaying) {
    stopPlayback();
  } else {
    startPlayback();
  }
}

// --- Event Listeners ---
document.getElementById('playPauseBtn').addEventListener('click', togglePlayPause);
document.getElementById('stepForwardBtn').addEventListener('click', () => { stopPlayback(); stepForward(); });
document.getElementById('stepBackBtn').addEventListener('click', () => { stopPlayback(); stepBack(); });

document.getElementById('timeSlider').addEventListener('input', (e) => {
  stopPlayback();
  setTimeStep(parseInt(e.target.value));
});

document.getElementById('speedSelect').addEventListener('change', (e) => {
  state.playbackSpeed = parseFloat(e.target.value);
  if (state.isPlaying) {
    startPlayback(); // restart with new speed
  }
});

const colorModes = ['intensity', 'height', 'uniform'];

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  switch (e.code) {
    case 'ArrowRight':
      e.preventDefault();
      stepForward();
      break;
    case 'ArrowLeft':
      e.preventDefault();
      stepBack();
      break;
    case 'Space':
      e.preventDefault();
      togglePlayPause();
      break;
    case 'KeyR':
      stopPlayback();
      setTimeStep(0);
      break;
    case 'KeyC':
      const idx = colorModes.indexOf(state.colorMode);
      state.colorMode = colorModes[(idx + 1) % colorModes.length];
      document.getElementById('colorModeLabel').textContent = state.colorMode;
      updateWeatherDisplay(state.currentTimeStep);
      break;
  }
});

// --- Particle Animation ---
let animTime = 0;

function animateParticles(delta) {
  animTime += delta;
  particleGroups.forEach((pg, ci) => {
    pg.particles.forEach((mesh, pi) => {
      // Gentle floating motion
      const offset = mesh.userData.localOffset;
      const bobSpeed = 0.5 + (pi % 5) * 0.1;
      const bobAmp = 0.3 + (pi % 3) * 0.2;
      mesh.position.y = offset.y + Math.sin(animTime * bobSpeed + pi * 0.7 + ci * 1.3) * bobAmp;
      mesh.position.x = offset.x + Math.sin(animTime * 0.3 + pi * 0.5) * 0.2;
      mesh.position.z = offset.z + Math.cos(animTime * 0.3 + pi * 0.5) * 0.2;
    });
  });
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Initialize ---
setTimeStep(0);

// --- Render Loop ---
function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();

  controls.update();

  if (mixer) mixer.update(delta);

  animateParticles(delta);

  // Update camera distance
  state.cameraDistance = camera.position.length();

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
