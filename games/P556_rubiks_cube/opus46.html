<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rubik's Cube</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }
#hud {
  position: absolute; top: 20px; left: 20px;
  background: rgba(0,0,0,0.7); color: #fff; padding: 20px;
  border-radius: 12px; font-size: 14px; min-width: 220px;
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
}
#hud h2 { margin-bottom: 12px; font-size: 18px; color: #88aaff; }
#hud div { margin: 6px 0; }
#hud span { color: #aaccff; font-weight: bold; }
#controls {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.7); color: #aaa; padding: 15px 25px;
  border-radius: 12px; font-size: 12px; text-align: center;
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
}
#controls strong { color: #88aaff; }
#congrats {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(0, 200, 100, 0.9); color: #fff; padding: 30px 50px;
  border-radius: 16px; font-size: 28px; font-weight: bold;
  display: none; text-align: center; z-index: 100;
  animation: pulse 0.5s ease-in-out;
  box-shadow: 0 0 40px rgba(0, 200, 100, 0.5);
}
@keyframes pulse {
  0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
  50% { transform: translate(-50%, -50%) scale(1.1); }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}
</style>
</head>
<body>
<div id="hud">
  <h2>🎲 Rubik's Cube</h2>
  <div>Moves: <span id="hud-moves">0</span></div>
  <div>Status: <span id="hud-status">Solved</span></div>
  <div>Last Move: <span id="hud-last">-</span></div>
  <div>Timer: <span id="hud-timer">0.0</span>s</div>
  <div>Scramble: <span id="hud-scramble">0</span> moves</div>
  <div>Animating: <span id="hud-animating">No</span></div>
</div>
<div id="controls">
  <strong>U D R L F B</strong> = rotate face CW | <strong>Shift+key</strong> = CCW |
  <strong>S</strong> = Scramble | <strong>Z</strong> = Undo | <strong>X</strong> = Reset
</div>
<div id="congrats">🎉 Solved! Congratulations!</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(5, 5, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// Lights
const ambientLight = new THREE.AmbientLight(0x556677, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 8);
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x445566, 0.3);
fillLight.position.set(-5, -5, 5);
scene.add(fillLight);

// Color definitions
const COLORS = {
  white:  0xffffff,
  yellow: 0xffff00,
  red:    0xff0000,
  orange: 0xff8800,
  green:  0x00ff00,
  blue:   0x0000ff,
  dark:   0x222222
};

const COLOR_NAMES = {
  [0xffffff]: 'white',
  [0xffff00]: 'yellow',
  [0xff0000]: 'red',
  [0xff8800]: 'orange',
  [0x00ff00]: 'green',
  [0x0000ff]: 'blue',
  [0x222222]: 'dark'
};

// Face order in Three.js BoxGeometry: +X, -X, +Y, -Y, +Z, -Z
function getFaceColors(x, y, z) {
  const colors = [
    x === 1 ? COLORS.red : COLORS.dark,     // +X right
    x === -1 ? COLORS.orange : COLORS.dark,  // -X left
    y === 1 ? COLORS.white : COLORS.dark,    // +Y top
    y === -1 ? COLORS.yellow : COLORS.dark,  // -Y bottom
    z === 1 ? COLORS.green : COLORS.dark,    // +Z front
    z === -1 ? COLORS.blue : COLORS.dark     // -Z back
  ];
  return colors;
}

// Cubies
const cubies = [];
const cubieSize = 0.95;

function createCubie(x, y, z) {
  const geometry = new THREE.BoxGeometry(cubieSize, cubieSize, cubieSize);
  const faceColors = getFaceColors(x, y, z);
  
  const materials = faceColors.map(color => {
    return new THREE.MeshStandardMaterial({
      color: color,
      roughness: 0.3,
      metalness: 0.1
    });
  });
  
  const mesh = new THREE.Mesh(geometry, materials);
  mesh.position.set(x, y, z);
  
  // Edge lines
  const edgesGeo = new THREE.EdgesGeometry(geometry);
  const edgesMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
  const edges = new THREE.LineSegments(edgesGeo, edgesMat);
  mesh.add(edges);
  
  mesh.userData.gridPos = new THREE.Vector3(x, y, z);
  
  return mesh;
}

function buildCube() {
  // Remove old cubies
  cubies.forEach(c => scene.remove(c));
  cubies.length = 0;
  
  for (let x = -1; x <= 1; x++) {
    for (let y = -1; y <= 1; y++) {
      for (let z = -1; z <= 1; z++) {
        const cubie = createCubie(x, y, z);
        scene.add(cubie);
        cubies.push(cubie);
      }
    }
  }
}

buildCube();

// State
let moveCount = 0;
let status = 'Solved';
let lastMove = '-';
let timerStart = 0;
let timerValue = 0;
let timerRunning = false;
let scrambleMoveCount = 0;
let isAnimating = false;
let frameCount = 0;
const moveHistory = [];
const moveQueue = [];

// Easing
function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

// Round position to nearest integer
function roundPos(v) {
  return Math.round(v);
}

function snapCubies() {
  cubies.forEach(c => {
    c.position.x = roundPos(c.position.x);
    c.position.y = roundPos(c.position.y);
    c.position.z = roundPos(c.position.z);
    c.userData.gridPos.copy(c.position);
  });
}

// Get cubies on a face
function getCubiesOnFace(axis, layer) {
  return cubies.filter(c => {
    const pos = c.position;
    const val = roundPos(axis === 'x' ? pos.x : axis === 'y' ? pos.y : pos.z);
    return val === layer;
  });
}

// Face definitions: axis, layer, rotation direction for CW
const FACE_DEFS = {
  'U': { axis: 'y', layer: 1, cwAngle: -Math.PI / 2 },
  'D': { axis: 'y', layer: -1, cwAngle: Math.PI / 2 },
  'R': { axis: 'x', layer: 1, cwAngle: -Math.PI / 2 },
  'L': { axis: 'x', layer: -1, cwAngle: Math.PI / 2 },
  'F': { axis: 'z', layer: 1, cwAngle: -Math.PI / 2 },
  'B': { axis: 'z', layer: -1, cwAngle: Math.PI / 2 }
};

// Animation state
let animState = null;

function rotateFace(face, clockwise, callback, isScramble = false, isUndo = false) {
  const def = FACE_DEFS[face];
  if (!def) return;
  
  const faceCubies = getCubiesOnFace(def.axis, def.layer);
  if (faceCubies.length !== 9) return;
  
  const pivot = new THREE.Group();
  scene.add(pivot);
  
  faceCubies.forEach(c => {
    // Store world position and quaternion
    const worldPos = new THREE.Vector3();
    const worldQuat = new THREE.Quaternion();
    c.getWorldPosition(worldPos);
    c.getWorldQuaternion(worldQuat);
    
    scene.remove(c);
    pivot.add(c);
    c.position.copy(worldPos);
    c.quaternion.copy(worldQuat);
  });
  
  const angle = clockwise ? def.cwAngle : -def.cwAngle;
  const rotAxis = new THREE.Vector3(
    def.axis === 'x' ? 1 : 0,
    def.axis === 'y' ? 1 : 0,
    def.axis === 'z' ? 1 : 0
  );
  
  isAnimating = true;
  
  animState = {
    pivot,
    faceCubies,
    rotAxis,
    targetAngle: angle,
    currentAngle: 0,
    startTime: performance.now(),
    duration: isScramble ? 150 : 300,
    face,
    clockwise,
    isScramble,
    isUndo,
    callback
  };
}

function finishAnimation() {
  if (!animState) return;
  
  const { pivot, faceCubies, face, clockwise, isScramble, isUndo, callback } = animState;
  
  // Unparent cubies back to scene
  faceCubies.forEach(c => {
    const worldPos = new THREE.Vector3();
    const worldQuat = new THREE.Quaternion();
    c.getWorldPosition(worldPos);
    c.getWorldQuaternion(worldQuat);
    
    pivot.remove(c);
    scene.add(c);
    c.position.copy(worldPos);
    c.quaternion.copy(worldQuat);
  });
  
  scene.remove(pivot);
  snapCubies();
  
  // Update move notation
  const notation = face + (clockwise ? '' : "'");
  lastMove = notation;
  
  if (!isScramble && !isUndo) {
    moveCount++;
    moveHistory.push({ face, clockwise });
  }
  if (isUndo) {
    // Don't count undo as a move for the counter, but we could
    // Actually let's count it
    moveCount++;
  }
  
  isAnimating = false;
  animState = null;
  
  // Check solved
  const solved = checkSolved();
  if (solved && status !== 'Solved') {
    status = 'Solved';
    timerRunning = false;
    showCongrats();
  } else if (!solved && !isScramble) {
    if (status === 'Solved') {
      status = 'Solving';
    }
  }
  
  if (callback) callback();
  
  // Process queue
  processQueue();
}

function updateAnimation(time) {
  if (!animState) return;
  
  const elapsed = time - animState.startTime;
  const t = Math.min(elapsed / animState.duration, 1);
  const easedT = easeInOutCubic(t);
  
  const angle = animState.targetAngle * easedT;
  const deltaAngle = angle - animState.currentAngle;
  
  animState.pivot.rotateOnWorldAxis(animState.rotAxis, deltaAngle);
  animState.currentAngle = angle;
  
  if (t >= 1) {
    finishAnimation();
  }
}

function processQueue() {
  if (isAnimating || moveQueue.length === 0) return;
  const move = moveQueue.shift();
  rotateFace(move.face, move.clockwise, move.callback, move.isScramble, move.isUndo);
}

function queueMove(face, clockwise, isScramble = false, isUndo = false, callback = null) {
  moveQueue.push({ face, clockwise, isScramble, isUndo, callback });
  processQueue();
}

// Check if solved
function checkSolved() {
  const faces = {
    'U': { axis: 'y', layer: 1, faceIndex: 2 },   // +Y
    'D': { axis: 'y', layer: -1, faceIndex: 3 },   // -Y
    'R': { axis: 'x', layer: 1, faceIndex: 0 },    // +X
    'L': { axis: 'x', layer: -1, faceIndex: 1 },   // -X
    'F': { axis: 'z', layer: 1, faceIndex: 4 },     // +Z
    'B': { axis: 'z', layer: -1, faceIndex: 5 }     // -Z
  };
  
  // Face normals in world space
  const faceNormals = {
    'U': new THREE.Vector3(0, 1, 0),
    'D': new THREE.Vector3(0, -1, 0),
    'R': new THREE.Vector3(1, 0, 0),
    'L': new THREE.Vector3(-1, 0, 0),
    'F': new THREE.Vector3(0, 0, 1),
    'B': new THREE.Vector3(0, 0, -1)
  };
  
  for (const [faceName, faceDef] of Object.entries(faces)) {
    const faceCubies = getCubiesOnFace(faceDef.axis, faceDef.layer);
    if (faceCubies.length !== 9) return false;
    
    const normal = faceNormals[faceName];
    let faceColor = null;
    
    for (const cubie of faceCubies) {
      const color = getVisibleFaceColor(cubie, normal);
      if (color === null) return false;
      if (faceColor === null) faceColor = color;
      else if (faceColor !== color) return false;
    }
  }
  
  return true;
}

function getVisibleFaceColor(cubie, worldNormal) {
  // Transform world normal to local space of the cubie
  const localNormal = worldNormal.clone();
  const invQuat = cubie.quaternion.clone().invert();
  localNormal.applyQuaternion(invQuat);
  
  // Determine which face this corresponds to
  // Box faces: +X(0), -X(1), +Y(2), -Y(3), +Z(4), -Z(5)
  const normals = [
    new THREE.Vector3(1, 0, 0),
    new THREE.Vector3(-1, 0, 0),
    new THREE.Vector3(0, 1, 0),
    new THREE.Vector3(0, -1, 0),
    new THREE.Vector3(0, 0, 1),
    new THREE.Vector3(0, 0, -1)
  ];
  
  let bestDot = -2;
  let bestIndex = 0;
  for (let i = 0; i < 6; i++) {
    const dot = localNormal.dot(normals[i]);
    if (dot > bestDot) {
      bestDot = dot;
      bestIndex = i;
    }
  }
  
  if (bestDot < 0.9) return null;
  
  const mat = cubie.material[bestIndex];
  return mat.color.getHex();
}

function getFaceColors() {
  const faceNormals = {
    'U': new THREE.Vector3(0, 1, 0),
    'D': new THREE.Vector3(0, -1, 0),
    'R': new THREE.Vector3(1, 0, 0),
    'L': new THREE.Vector3(-1, 0, 0),
    'F': new THREE.Vector3(0, 0, 1),
    'B': new THREE.Vector3(0, 0, -1)
  };
  
  const faceAxes = {
    'U': { axis: 'y', layer: 1 },
    'D': { axis: 'y', layer: -1 },
    'R': { axis: 'x', layer: 1 },
    'L': { axis: 'x', layer: -1 },
    'F': { axis: 'z', layer: 1 },
    'B': { axis: 'z', layer: -1 }
  };
  
  const result = {};
  
  for (const [faceName, normal] of Object.entries(faceNormals)) {
    const def = faceAxes[faceName];
    const faceCubies = getCubiesOnFace(def.axis, def.layer);
    
    const colorCounts = {};
    for (const cubie of faceCubies) {
      const color = getVisibleFaceColor(cubie, normal);
      if (color !== null) {
        const name = COLOR_NAMES[color] || 'unknown';
        colorCounts[name] = (colorCounts[name] || 0) + 1;
      }
    }
    
    let dominant = 'mixed';
    let maxCount = 0;
    for (const [name, count] of Object.entries(colorCounts)) {
      if (count > maxCount) {
        maxCount = count;
        dominant = name;
      }
    }
    if (maxCount < 9) dominant = 'mixed';
    
    result[faceName] = dominant;
  }
  
  return result;
}

// Scramble
function scramble() {
  // Reset state
  moveCount = 0;
  moveHistory.length = 0;
  moveQueue.length = 0;
  scrambleMoveCount = 20;
  lastMove = '-';
  
  const faces = ['U', 'D', 'R', 'L', 'F', 'B'];
  let lastFace = '';
  
  let movesQueued = 0;
  
  for (let i = 0; i < 20; i++) {
    let face;
    do {
      face = faces[Math.floor(Math.random() * faces.length)];
    } while (face === lastFace);
    lastFace = face;
    
    const cw = Math.random() > 0.5;
    
    const isLast = (i === 19);
    queueMove(face, cw, true, false, isLast ? () => {
      status = 'Scrambled';
      timerStart = performance.now();
      timerRunning = true;
      moveCount = 0;
    } : null);
  }
  
  status = 'Scrambled';
}

// Undo
function undoMove() {
  if (moveHistory.length === 0) return;
  const last = moveHistory.pop();
  queueMove(last.face, !last.clockwise, false, true);
}

// Reset
function resetCube() {
  moveQueue.length = 0;
  isAnimating = false;
  animState = null;
  
  // Remove all cubies
  cubies.forEach(c => scene.remove(c));
  cubies.length = 0;
  
  // Also clean up any pivot groups
  const toRemove = [];
  scene.children.forEach(child => {
    if (child instanceof THREE.Group) toRemove.push(child);
  });
  toRemove.forEach(g => scene.remove(g));
  
  buildCube();
  
  moveCount = 0;
  moveHistory.length = 0;
  scrambleMoveCount = 0;
  lastMove = '-';
  status = 'Solved';
  timerRunning = false;
  timerValue = 0;
  timerStart = 0;
}

// Congrats
function showCongrats() {
  const el = document.getElementById('congrats');
  el.style.display = 'block';
  el.innerHTML = `🎉 Solved!<br><span style="font-size:16px">Time: ${timerValue.toFixed(1)}s | Moves: ${moveCount}</span>`;
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  
  const key = e.key.toUpperCase();
  const shift = e.shiftKey;
  
  if (['U', 'D', 'R', 'L', 'F', 'B'].includes(key) && !e.ctrlKey && !e.altKey) {
    e.preventDefault();
    const clockwise = !shift;
    queueMove(key, clockwise);
    
    if (status === 'Solved' && !checkSolved()) {
      status = 'Solving';
      timerStart = performance.now();
      timerRunning = true;
    }
  } else if (key === 'S' && !shift) {
    e.preventDefault();
    resetCube();
    setTimeout(() => scramble(), 50);
  } else if (key === 'Z' && !shift) {
    e.preventDefault();
    undoMove();
  } else if (key === 'X' && !shift) {
    e.preventDefault();
    resetCube();
  }
});

// HUD elements
const hudMoves = document.getElementById('hud-moves');
const hudStatus = document.getElementById('hud-status');
const hudLast = document.getElementById('hud-last');
const hudTimer = document.getElementById('hud-timer');
const hudScramble = document.getElementById('hud-scramble');
const hudAnimating = document.getElementById('hud-animating');

// State
window.__3D_STATE__ = {
  moveCount: 0,
  status: 'Solved',
  lastMove: '-',
  timer: 0,
  scrambleMoves: 0,
  isAnimating: false,
  isSolved: true,
  frameCount: 0,
  cubeValid: true,
  faceColors: { U: 'white', D: 'yellow', R: 'red', L: 'orange', F: 'green', B: 'blue' }
};

function validateCube() {
  if (cubies.length !== 27) return false;
  for (const c of cubies) {
    if (isNaN(c.position.x) || isNaN(c.position.y) || isNaN(c.position.z)) return false;
  }
  return true;
}

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate(time) {
  requestAnimationFrame(animate);
  frameCount++;
  
  controls.update();
  
  // Update animation
  if (animState) {
    updateAnimation(time);
  }
  
  // Timer
  if (timerRunning) {
    timerValue = (performance.now() - timerStart) / 1000;
  }
  
  // Solved check
  const solved = !isAnimating && checkSolved();
  
  // Face colors (only compute when not animating for performance)
  let faceColors = { U: 'white', D: 'yellow', R: 'red', L: 'orange', F: 'green', B: 'blue' };
  if (!isAnimating) {
    try {
      faceColors = getFaceColors();
    } catch (e) {}
  }
  
  // Update state
  const state = window.__3D_STATE__;
  state.moveCount = moveCount;
  state.status = status;
  state.lastMove = lastMove;
  state.timer = parseFloat(timerValue.toFixed(1));
  state.scrambleMoves = scrambleMoveCount;
  state.isAnimating = isAnimating;
  state.isSolved = solved;
  state.frameCount = frameCount;
  state.cubeValid = validateCube();
  state.faceColors = faceColors;
  
  // Update HUD
  hudMoves.textContent = moveCount;
  hudStatus.textContent = status;
  hudLast.textContent = lastMove;
  hudTimer.textContent = timerValue.toFixed(1);
  hudScramble.textContent = scrambleMoveCount;
  hudAnimating.textContent = isAnimating ? 'Yes' : 'No';
  
  // Color the status
  if (status === 'Solved') hudStatus.style.color = '#44ff88';
  else if (status === 'Scrambled') hudStatus.style.color = '#ff8844';
  else hudStatus.style.color = '#aaccff';
  
  renderer.render(scene, camera);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
