<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Rubik's Cube</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: monospace;
            color: #ffffff;
        }
        #container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid #445566;
            min-width: 200px;
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #00ffcc;
        }
        .hud-row {
            margin: 5px 0;
            font-size: 14px;
        }
        .hud-label {
            color: #aaaaaa;
            display: inline-block;
            width: 120px;
        }
        .hud-value {
            font-weight: bold;
        }
        #controls-help {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 12px;
            color: #aaaaaa;
            line-height: 1.5;
        }
        #flash-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 20px #00ff00;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="container"></div>
    
    <div id="hud">
        <h2>Cube Status</h2>
        <div class="hud-row"><span class="hud-label">Status:</span> <span id="hud-status" class="hud-value">Solved</span></div>
        <div class="hud-row"><span class="hud-label">Timer:</span> <span id="hud-timer" class="hud-value">0.0</span>s</div>
        <div class="hud-row"><span class="hud-label">Moves:</span> <span id="hud-moves" class="hud-value">0</span></div>
        <div class="hud-row"><span class="hud-label">Last Move:</span> <span id="hud-last" class="hud-value">-</span></div>
        <div class="hud-row"><span class="hud-label">Scramble Moves:</span> <span id="hud-scramble" class="hud-value">0</span></div>
        <div class="hud-row"><span class="hud-label">Animating:</span> <span id="hud-animating" class="hud-value">No</span></div>
    </div>

    <div id="controls-help">
        <strong>Controls:</strong><br>
        U, D, R, L, F, B : Rotate Face CW<br>
        Shift + Key : Rotate Face CCW<br>
        S : Scramble (20 moves)<br>
        Z : Undo Last Move<br>
        X : Reset to Solved<br>
        Mouse : Orbit Camera
    </div>

    <div id="flash-message">SOLVED!</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            moveCount: 0,
            status: 'Solved',
            lastMove: '-',
            timer: 0.0,
            scrambleMoves: 0,
            isAnimating: false,
            isSolved: true,
            frameCount: 0,
            cubeValid: true,
            faceColors: {}
        };

        // --- Variables ---
        let scene, camera, renderer, controls;
        const cubies = [];
        const pivot = new THREE.Group();
        
        // Animation & Queue
        const moveQueue = [];
        const moveHistory = [];
        let currentMove = null;
        let animStartTime = 0;
        const ANIM_DURATION = 300; // ms
        
        // Timer
        let solveStartTime = 0;

        // Colors
        const C_WHITE  = 0xffffff; // +Y (U)
        const C_YELLOW = 0xffff00; // -Y (D)
        const C_RED    = 0xff0000; // +X (R)
        const C_ORANGE = 0xff8800; // -X (L)
        const C_GREEN  = 0x00ff00; // +Z (F)
        const C_BLUE   = 0x0000ff; // -Z (B)
        const C_DARK   = 0x222222; // Internal

        // Move Definitions
        const MOVES = {
            'U':  { axis: 'y', layer:  1, dir: -1 },
            "U'": { axis: 'y', layer:  1, dir:  1 },
            'D':  { axis: 'y', layer: -1, dir:  1 },
            "D'": { axis: 'y', layer: -1, dir: -1 },
            'R':  { axis: 'x', layer:  1, dir: -1 },
            "R'": { axis: 'x', layer:  1, dir:  1 },
            'L':  { axis: 'x', layer: -1, dir:  1 },
            "L'": { axis: 'x', layer: -1, dir: -1 },
            'F':  { axis: 'z', layer:  1, dir: -1 },
            "F'": { axis: 'z', layer:  1, dir:  1 },
            'B':  { axis: 'z', layer: -1, dir:  1 },
            "B'": { axis: 'z', layer: -1, dir: -1 }
        };
        const MOVE_KEYS = Object.keys(MOVES);

        // Local normals for face color detection
        const localNormals = [
            new THREE.Vector3(1, 0, 0),  // 0: +x
            new THREE.Vector3(-1, 0, 0), // 1: -x
            new THREE.Vector3(0, 1, 0),  // 2: +y
            new THREE.Vector3(0, -1, 0), // 3: -y
            new THREE.Vector3(0, 0, 1),  // 4: +z
            new THREE.Vector3(0, 0, -1)  // 5: -z
        ];

        init();
        animate(0);

        function init() {
            const container = document.getElementById('container');

            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.add(pivot);

            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(5, 5, 5);
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Lights
            const ambientLight = new THREE.AmbientLight(0x556677, 0.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 8);
            scene.add(dirLight);

            const fillLight = new THREE.DirectionalLight(0x445566, 0.3);
            fillLight.position.set(-5, -5, 5);
            scene.add(fillLight);

            // Build Cube
            buildCube();

            // Events
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', onKeyDown);
        }

        function buildCube() {
            // Clear existing
            cubies.forEach(c => scene.remove(c));
            cubies.length = 0;

            const size = 0.95;
            const geo = new THREE.BoxGeometry(size, size, size);
            const edgesGeo = new THREE.EdgesGeometry(geo);
            const edgeMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });

            for (let x = -1; x <= 1; x++) {
                for (let y = -1; y <= 1; y++) {
                    for (let z = -1; z <= 1; z++) {
                        const mats = [
                            new THREE.MeshPhongMaterial({ color: x ===  1 ? C_RED    : C_DARK }), // +x
                            new THREE.MeshPhongMaterial({ color: x === -1 ? C_ORANGE : C_DARK }), // -x
                            new THREE.MeshPhongMaterial({ color: y ===  1 ? C_WHITE  : C_DARK }), // +y
                            new THREE.MeshPhongMaterial({ color: y === -1 ? C_YELLOW : C_DARK }), // -y
                            new THREE.MeshPhongMaterial({ color: z ===  1 ? C_GREEN  : C_DARK }), // +z
                            new THREE.MeshPhongMaterial({ color: z === -1 ? C_BLUE   : C_DARK })  // -z
                        ];

                        const mesh = new THREE.Mesh(geo, mats);
                        mesh.position.set(x, y, z);
                        
                        const edges = new THREE.LineSegments(edgesGeo, edgeMat);
                        mesh.add(edges);

                        scene.add(mesh);
                        cubies.push(mesh);
                    }
                }
            }
            updateFaceColorsState();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onKeyDown(e) {
            if (e.repeat) return;
            
            const key = e.key.toUpperCase();
            const isShift = e.shiftKey;

            if (['U', 'D', 'R', 'L', 'F', 'B'].includes(key)) {
                const notation = key + (isShift ? "'" : "");
                queueMove(notation, true);
            } else if (key === 'S') {
                scramble();
            } else if (key === 'Z') {
                undo();
            } else if (key === 'X') {
                resetCube();
            }
        }

        function queueMove(notation, isUserMove = false, duration = ANIM_DURATION, isUndo = false) {
            const moveDef = MOVES[notation];
            if (!moveDef) return;

            moveQueue.push({
                notation,
                axis: moveDef.axis,
                layer: moveDef.layer,
                dir: moveDef.dir,
                isUserMove,
                duration,
                isUndo
            });
        }

        function scramble() {
            resetCube();
            window.__3D_STATE__.status = 'Scrambled';
            window.__3D_STATE__.scrambleMoves = 20;
            
            for (let i = 0; i < 20; i++) {
                const randomMove = MOVE_KEYS[Math.floor(Math.random() * MOVE_KEYS.length)];
                // Faster animation for scramble
                queueMove(randomMove, false, 100);
            }
        }

        function undo() {
            if (moveHistory.length === 0 || window.__3D_STATE__.isAnimating) return;
            
            const lastMove = moveHistory.pop();
            // Invert move
            const invNotation = lastMove.endsWith("'") ? lastMove[0] : lastMove + "'";
            
            // Put at front of queue
            const moveDef = MOVES[invNotation];
            moveQueue.unshift({
                notation: invNotation,
                axis: moveDef.axis,
                layer: moveDef.layer,
                dir: moveDef.dir,
                isUserMove: false,
                duration: ANIM_DURATION,
                isUndo: true
            });
            
            window.__3D_STATE__.moveCount = Math.max(0, window.__3D_STATE__.moveCount - 1);
        }

        function resetCube() {
            moveQueue.length = 0;
            moveHistory.length = 0;
            window.__3D_STATE__.isAnimating = false;
            currentMove = null;
            
            // Reset pivot
            pivot.rotation.set(0, 0, 0);
            cubies.forEach(c => {
                if (c.parent === pivot) scene.attach(c);
            });

            buildCube();
            
            window.__3D_STATE__.moveCount = 0;
            window.__3D_STATE__.status = 'Solved';
            window.__3D_STATE__.lastMove = '-';
            window.__3D_STATE__.timer = 0.0;
            window.__3D_STATE__.scrambleMoves = 0;
            window.__3D_STATE__.isSolved = true;
            solveStartTime = 0;
            
            hideFlash();
        }

        function startNextMove(time) {
            currentMove = moveQueue.shift();
            window.__3D_STATE__.isAnimating = true;
            animStartTime = time;
            
            if (currentMove.isUserMove) {
                if (window.__3D_STATE__.status === 'Scrambled') {
                    window.__3D_STATE__.status = 'Solving';
                    solveStartTime = Date.now();
                }
                window.__3D_STATE__.moveCount++;
                moveHistory.push(currentMove.notation);
            }

            window.__3D_STATE__.lastMove = currentMove.notation;

            // Group cubies
            pivot.rotation.set(0, 0, 0);
            pivot.updateMatrixWorld();
            
            cubies.forEach(c => {
                // Check if cubie belongs to the layer
                if (Math.round(c.position[currentMove.axis]) === currentMove.layer) {
                    pivot.attach(c);
                }
            });
        }

        function finishMove() {
            window.__3D_STATE__.isAnimating = false;
            
            // Snap pivot to exact 90 deg
            pivot.rotation[currentMove.axis] = currentMove.dir * Math.PI / 2;
            pivot.updateMatrixWorld();

            // Ungroup and snap
            const children = [...pivot.children];
            children.forEach(c => {
                scene.attach(c);
                
                // Snap position
                c.position.x = Math.round(c.position.x);
                c.position.y = Math.round(c.position.y);
                c.position.z = Math.round(c.position.z);
                
                // Snap rotation matrix to avoid drift
                const mat = new THREE.Matrix4().extractRotation(c.matrix);
                const e = mat.elements;
                for (let i = 0; i < 16; i++) {
                    e[i] = Math.round(e[i]);
                }
                c.quaternion.setFromRotationMatrix(mat);
            });

            pivot.rotation.set(0, 0, 0);
            currentMove = null;

            updateFaceColorsState();
            checkSolveState();
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function updateFaceColorsState() {
            const result = { U: [], D: [], R: [], L: [], F: [], B: [] };
            const faceMap = {
                '0,1,0': 'U', '0,-1,0': 'D',
                '1,0,0': 'R', '-1,0,0': 'L',
                '0,0,1': 'F', '0,0,-1': 'B'
            };

            let valid = cubies.length === 27;

            cubies.forEach(c => {
                if (isNaN(c.position.x)) valid = false;

                for (let i = 0; i < 6; i++) {
                    const n = localNormals[i].clone().applyQuaternion(c.quaternion).round();
                    const key = `${n.x},${n.y},${n.z}`;
                    if (faceMap[key]) {
                        const colorHex = '#' + c.material[i].color.getHexString();
                        result[faceMap[key]].push(colorHex);
                    }
                }
            });

            window.__3D_STATE__.cubeValid = valid;

            const finalColors = {};
            for (const face in result) {
                const colors = result[face];
                if (colors.length === 9 && colors.every(val => val === colors[0])) {
                    finalColors[face] = colors[0];
                } else {
                    finalColors[face] = 'mixed';
                }
            }
            window.__3D_STATE__.faceColors = finalColors;
        }

        function checkSolveState() {
            const colors = window.__3D_STATE__.faceColors;
            let isSolved = true;
            
            for (const face in colors) {
                if (colors[face] === 'mixed' || colors[face] === '#222222') {
                    isSolved = false;
                    break;
                }
            }

            window.__3D_STATE__.isSolved = isSolved;

            if (isSolved && window.__3D_STATE__.status === 'Solving') {
                window.__3D_STATE__.status = 'Solved';
                showFlash();
            }
        }

        function showFlash() {
            const el = document.getElementById('flash-message');
            el.style.opacity = '1';
            setTimeout(() => { el.style.opacity = '0'; }, 3000);
        }

        function hideFlash() {
            document.getElementById('flash-message').style.opacity = '0';
        }

        function updateHUD() {
            document.getElementById('hud-status').textContent = window.__3D_STATE__.status;
            document.getElementById('hud-status').style.color = 
                window.__3D_STATE__.status === 'Solved' ? '#00ff00' : 
                window.__3D_STATE__.status === 'Scrambled' ? '#ff4444' : '#ffff00';
            
            document.getElementById('hud-moves').textContent = window.__3D_STATE__.moveCount;
            document.getElementById('hud-last').textContent = window.__3D_STATE__.lastMove;
            document.getElementById('hud-timer').textContent = window.__3D_STATE__.timer.toFixed(1);
            document.getElementById('hud-scramble').textContent = window.__3D_STATE__.scrambleMoves;
            document.getElementById('hud-animating').textContent = window.__3D_STATE__.isAnimating ? 'Yes' : 'No';
        }

        function animate(time) {
            requestAnimationFrame(animate);
            window.__3D_STATE__.frameCount++;

            controls.update();

            // Timer logic
            if (window.__3D_STATE__.status === 'Solving' && solveStartTime > 0) {
                window.__3D_STATE__.timer = (Date.now() - solveStartTime) / 1000;
            }

            // Animation logic
            if (window.__3D_STATE__.isAnimating && currentMove) {
                const elapsed = time - animStartTime;
                let t = elapsed / currentMove.duration;
                
                if (t >= 1) {
                    t = 1;
                    pivot.rotation[currentMove.axis] = currentMove.dir * Math.PI / 2;
                    finishMove();
                } else {
                    const eased = easeInOutCubic(t);
                    pivot.rotation[currentMove.axis] = eased * currentMove.dir * Math.PI / 2;
                }
            } else if (moveQueue.length > 0) {
                startNextMove(time);
            }

            updateHUD();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
