<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Three.js Rubik's Cube</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }
    canvas {
      display: block;
    }
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 240px;
      backdrop-filter: blur(6px);
      font-size: 14px;
      line-height: 1.5;
    }
    #hud b {
      display: inline-block;
      width: 110px;
      color: #cfd8ff;
    }
    #msg {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      padding: 12px 18px;
      border-radius: 10px;
      background: rgba(0, 255, 140, 0.15);
      border: 1px solid rgba(0, 255, 140, 0.4);
      color: #d8ffe9;
      font-weight: bold;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    #msg.show {
      opacity: 1;
    }
    #help {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 12px;
      max-width: 360px;
      font-size: 13px;
      color: #d8d8e8;
      line-height: 1.45;
    }
    #help code {
      color: #fff;
      background: rgba(255,255,255,0.08);
      padding: 1px 5px;
      border-radius: 4px;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="hud">
    <div><b>Moves:</b> <span id="hud-moves">0</span></div>
    <div><b>Status:</b> <span id="hud-status">Solved</span></div>
    <div><b>Last move:</b> <span id="hud-last">-</span></div>
    <div><b>Timer:</b> <span id="hud-timer">0.0</span></div>
    <div><b>Scramble moves:</b> <span id="hud-scramble">0</span></div>
    <div><b>Animating:</b> <span id="hud-animating">No</span></div>
  </div>

  <div id="msg">Solved!</div>

  <div id="help">
    <div><strong>Controls</strong></div>
    <div><code>U D R L F B</code> rotate faces, hold <code>Shift</code> for prime moves.</div>
    <div><code>S</code> scramble, <code>Z</code> undo, <code>X</code> reset.</div>
    <div>Drag to orbit. Scroll to zoom.</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(5, 5, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambient = new THREE.AmbientLight(0x556677, 0.5);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 8);
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0x445566, 0.3);
    fillLight.position.set(-5, -5, 5);
    scene.add(fillLight);

    const hudMoves = document.getElementById('hud-moves');
    const hudStatus = document.getElementById('hud-status');
    const hudLast = document.getElementById('hud-last');
    const hudTimer = document.getElementById('hud-timer');
    const hudScramble = document.getElementById('hud-scramble');
    const hudAnimating = document.getElementById('hud-animating');
    const msg = document.getElementById('msg');

    const SIZE = 0.95;
    const GAP = 0.05;
    const STEP = SIZE + GAP;
    const POS = [-STEP, 0, STEP];
    const FACE_KEYS = ['R', 'L', 'U', 'D', 'F', 'B']; // BoxGeometry material order: +x -x +y -y +z -z

    const COLORS = {
      U: 0xffffff,
      D: 0xffff00,
      R: 0xff0000,
      L: 0xff8800,
      F: 0x00ff00,
      B: 0x0000ff,
      I: 0x222222
    };

    const COLOR_NAME = {
      0xffffff: 'white',
      0xffff00: 'yellow',
      0xff0000: 'red',
      0xff8800: 'orange',
      0x00ff00: 'green',
      0x0000ff: 'blue',
      0x222222: 'darkgray'
    };

    const cubies = [];
    const cubeGroup = new THREE.Group();
    scene.add(cubeGroup);

    const animationQueue = [];
    let isAnimating = false;
    let activeAnimation = null;
    let frameCount = 0;

    let moveCount = 0;
    let lastMove = '-';
    let scrambleMoves = 0;
    let status = 'Solved';
    let scrambleStartTime = null;
    let solvedAtTime = null;
    let isSolved = true;
    let isScrambling = false;
    let history = [];
    let showMessageTimeout = null;

    function easeInOutCubic(t) {
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function roundCoord(v) {
      return Math.round(v / STEP) * STEP;
    }

    function coordIndex(v) {
      const r = Math.round(v / STEP);
      return Math.max(-1, Math.min(1, r));
    }

    function snapVector3(v) {
      v.set(roundCoord(v.x), roundCoord(v.y), roundCoord(v.z));
    }

    function faceMaterial(face) {
      return new THREE.MeshLambertMaterial({ color: COLORS[face] });
    }

    function createCubie(ix, iy, iz) {
      const faces = {
        R: ix === 1 ? 'R' : 'I',
        L: ix === -1 ? 'L' : 'I',
        U: iy === 1 ? 'U' : 'I',
        D: iy === -1 ? 'D' : 'I',
        F: iz === 1 ? 'F' : 'I',
        B: iz === -1 ? 'B' : 'I'
      };

      const geometry = new THREE.BoxGeometry(SIZE, SIZE, SIZE);
      const materials = FACE_KEYS.map(k => faceMaterial(faces[k]));
      const mesh = new THREE.Mesh(geometry, materials);

      mesh.position.set(ix * STEP, iy * STEP, iz * STEP);

      const edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(geometry),
        new THREE.LineBasicMaterial({ color: 0x000000 })
      );
      mesh.add(edges);

      mesh.userData = {
        stickers: { ...faces },   // local face -> sticker color key
        grid: { x: ix, y: iy, z: iz }
      };

      cubeGroup.add(mesh);
      cubies.push(mesh);
    }

    for (let x = -1; x <= 1; x++) {
      for (let y = -1; y <= 1; y++) {
        for (let z = -1; z <= 1; z++) {
          createCubie(x, y, z);
        }
      }
    }

    function cloneStickers(stickers) {
      return {
        R: stickers.R, L: stickers.L, U: stickers.U,
        D: stickers.D, F: stickers.F, B: stickers.B
      };
    }

    function rotateStickerMap(stickers, axis, dir) {
      const s = cloneStickers(stickers);
      const n = cloneStickers(stickers);

      if (axis === 'x') {
        if (dir === 1) {
          n.U = s.B; n.F = s.U; n.D = s.F; n.B = s.D;
          n.R = s.R; n.L = s.L;
        } else {
          n.U = s.F; n.B = s.U; n.D = s.B; n.F = s.D;
          n.R = s.R; n.L = s.L;
        }
      } else if (axis === 'y') {
        if (dir === 1) {
          n.R = s.B; n.F = s.R; n.L = s.F; n.B = s.L;
          n.U = s.U; n.D = s.D;
        } else {
          n.R = s.F; n.B = s.R; n.L = s.B; n.F = s.L;
          n.U = s.U; n.D = s.D;
        }
      } else if (axis === 'z') {
        if (dir === 1) {
          n.R = s.D; n.U = s.R; n.L = s.U; n.D = s.L;
          n.F = s.F; n.B = s.B;
        } else {
          n.R = s.U; n.D = s.R; n.L = s.D; n.U = s.L;
          n.F = s.F; n.B = s.B;
        }
      }
      return n;
    }

    function applyStickerMaterials(cubie) {
      const s = cubie.userData.stickers;
      const materialFaces = {
        R: s.R, L: s.L, U: s.U, D: s.D, F: s.F, B: s.B
      };
      FACE_KEYS.forEach((faceKey, i) => {
        cubie.material[i].color.setHex(COLORS[materialFaces[faceKey]]);
      });
    }

    function getMoveSpec(move) {
      const prime = move.endsWith("'");
      const base = prime ? move[0] : move;
      switch (base) {
        case 'U': return { axis: 'y', layer: 1, dir: prime ? -1 : 1, notation: move };
        case 'D': return { axis: 'y', layer: -1, dir: prime ? 1 : -1, notation: move };
        case 'R': return { axis: 'x', layer: 1, dir: prime ? -1 : 1, notation: move };
        case 'L': return { axis: 'x', layer: -1, dir: prime ? 1 : -1, notation: move };
        case 'F': return { axis: 'z', layer: 1, dir: prime ? -1 : 1, notation: move };
        case 'B': return { axis: 'z', layer: -1, dir: prime ? 1 : -1, notation: move };
        default: return null;
      }
    }

    function inverseMove(move) {
      return move.endsWith("'") ? move[0] : move + "'";
    }

    function selectLayer(axis, layer) {
      return cubies.filter(c => coordIndex(c.position[axis]) === layer);
    }

    function enqueueMove(move, options = {}) {
      const spec = getMoveSpec(move);
      if (!spec) return;
      animationQueue.push({ ...spec, ...options });
      pumpQueue();
    }

    function pumpQueue() {
      if (isAnimating || animationQueue.length === 0) return;
      startMove(animationQueue.shift());
    }

    function startMove(spec) {
      const layerCubies = selectLayer(spec.axis, spec.layer);
      const tempGroup = new THREE.Group();
      cubeGroup.add(tempGroup);

      layerCubies.forEach(c => tempGroup.attach(c));

      const axisVec =
        spec.axis === 'x' ? new THREE.Vector3(1, 0, 0) :
        spec.axis === 'y' ? new THREE.Vector3(0, 1, 0) :
                            new THREE.Vector3(0, 0, 1);

      activeAnimation = {
        spec,
        tempGroup,
        axisVec,
        start: performance.now(),
        duration: 300,
        startAngle: 0,
        endAngle: spec.dir * Math.PI / 2,
        lastAngle: 0
      };
      isAnimating = true;
    }

    function finalizeMove(anim) {
      const { spec, tempGroup } = anim;
      tempGroup.updateMatrixWorld(true);

      const moved = [...tempGroup.children];
      moved.forEach(cubie => {
        cubeGroup.attach(cubie);

        cubie.position.x = roundCoord(cubie.position.x);
        cubie.position.y = roundCoord(cubie.position.y);
        cubie.position.z = roundCoord(cubie.position.z);

        cubie.rotation.x = Math.round(cubie.rotation.x / (Math.PI / 2)) * (Math.PI / 2);
        cubie.rotation.y = Math.round(cubie.rotation.y / (Math.PI / 2)) * (Math.PI / 2);
        cubie.rotation.z = Math.round(cubie.rotation.z / (Math.PI / 2)) * (Math.PI / 2);

        cubie.userData.grid = {
          x: coordIndex(cubie.position.x),
          y: coordIndex(cubie.position.y),
          z: coordIndex(cubie.position.z)
        };

        cubie.userData.stickers = rotateStickerMap(cubie.userData.stickers, spec.axis, spec.dir);
        applyStickerMaterials(cubie);
      });

      cubeGroup.remove(tempGroup);

      lastMove = spec.notation;

      if (spec.countMove) moveCount++;
      if (spec.isScramble) scrambleMoves++;

      if (spec.recordHistory) {
        history.push(spec.notation);
      }

      updateStatusAfterMove(spec);

      isAnimating = false;
      activeAnimation = null;
      pumpQueue();
    }

    function getFaceStickerList(face) {
      if (face === 'U') {
        return cubies.filter(c => c.userData.grid.y === 1).map(c => c.userData.stickers.U);
      }
      if (face === 'D') {
        return cubies.filter(c => c.userData.grid.y === -1).map(c => c.userData.stickers.D);
      }
      if (face === 'R') {
        return cubies.filter(c => c.userData.grid.x === 1).map(c => c.userData.stickers.R);
      }
      if (face === 'L') {
        return cubies.filter(c => c.userData.grid.x === -1).map(c => c.userData.stickers.L);
      }
      if (face === 'F') {
        return cubies.filter(c => c.userData.grid.z === 1).map(c => c.userData.stickers.F);
      }
      if (face === 'B') {
        return cubies.filter(c => c.userData.grid.z === -1).map(c => c.userData.stickers.B);
      }
      return [];
    }

    function faceDominant(face) {
      const list = getFaceStickerList(face);
      if (list.length !== 9) return 'mixed';
      const first = list[0];
      return list.every(v => v === first) ? first : 'mixed';
    }

    function checkSolved() {
      return ['U', 'D', 'R', 'L', 'F', 'B'].every(face => {
        const stickers = getFaceStickerList(face);
        return stickers.length === 9 && stickers.every(s => s === stickers[0]);
      });
    }

    function flashMessage(text) {
      msg.textContent = text;
      msg.classList.add('show');
      clearTimeout(showMessageTimeout);
      showMessageTimeout = setTimeout(() => {
        msg.classList.remove('show');
      }, 1800);
    }

    function updateStatusAfterMove(spec) {
      isSolved = checkSolved();

      if (isSolved) {
        status = 'Solved';
        solvedAtTime = performance.now();
        flashMessage(`Solved! Time: ${getTimerValue().toFixed(1)}s`);
      } else {
        if (scrambleMoves > 0) {
          status = moveCount === 0 ? 'Scrambled' : 'Solving';
        } else {
          status = 'Solving';
        }
      }

      if (spec.isScramble && !scrambleStartTime) {
        scrambleStartTime = performance.now();
      }
    }

    function getTimerValue() {
      if (!scrambleStartTime || isSolved) return 0;
      return (performance.now() - scrambleStartTime) / 1000;
    }

    function resetCube() {
      animationQueue.length = 0;
      isAnimating = false;
      activeAnimation = null;

      cubies.forEach(c => cubeGroup.remove(c));
      cubies.length = 0;

      while (cubeGroup.children.length) {
        cubeGroup.remove(cubeGroup.children[0]);
      }

      for (let x = -1; x <= 1; x++) {
        for (let y = -1; y <= 1; y++) {
          for (let z = -1; z <= 1; z++) {
            createCubie(x, y, z);
          }
        }
      }

      moveCount = 0;
      lastMove = '-';
      scrambleMoves = 0;
      status = 'Solved';
      scrambleStartTime = null;
      solvedAtTime = null;
      isSolved = true;
      isScrambling = false;
      history = [];
    }

    function scrambleCube() {
      if (isAnimating) return;
      resetCube();
      isScrambling = true;

      const moves = ['U', "U'", 'D', "D'", 'R', "R'", 'L', "L'", 'F', "F'", 'B', "B'"];
      let prevBase = null;
      const sequence = [];

      for (let i = 0; i < 20; i++) {
        let pick;
        do {
          pick = moves[Math.floor(Math.random() * moves.length)];
        } while (pick[0] === prevBase);
        prevBase = pick[0];
        sequence.push(pick);
      }

      scrambleStartTime = null;
      moveCount = 0;
      scrambleMoves = 0;
      history = [];
      status = 'Scrambled';
      isSolved = false;

      sequence.forEach((m, i) => {
        enqueueMove(m, {
          countMove: false,
          isScramble: true,
          recordHistory: false
        });
      });

      const checkEndScramble = () => {
        if (!isAnimating && animationQueue.length === 0 && isScrambling) {
          isScrambling = false;
          scrambleStartTime = performance.now();
          status = isSolved ? 'Solved' : 'Scrambled';
        } else {
          requestAnimationFrame(checkEndScramble);
        }
      };
      requestAnimationFrame(checkEndScramble);
    }

    function undoMove() {
      if (isAnimating || history.length === 0) return;
      const last = history.pop();
      enqueueMove(inverseMove(last), {
        countMove: false,
        isScramble: false,
        recordHistory: false
      });
      lastMove = inverseMove(last);
      moveCount = Math.max(0, moveCount - 1);
    }

    function queueUserMove(move) {
      enqueueMove(move, {
        countMove: true,
        isScramble: false,
        recordHistory: true
      });

      if (scrambleMoves > 0 && !scrambleStartTime && !isScrambling) {
        scrambleStartTime = performance.now();
      }
    }

    window.addEventListener('keydown', (e) => {
      if (e.repeat) return;
      const key = e.key.toUpperCase();

      if (key === 'S') {
        scrambleCube();
        return;
      }
      if (key === 'Z') {
        undoMove();
        return;
      }
      if (key === 'X') {
        resetCube();
        return;
      }

      if (['U', 'D', 'R', 'L', 'F', 'B'].includes(key)) {
        const move = e.shiftKey ? `${key}'` : key;
        queueUserMove(move);
      }
    });

    function updateHUD() {
      hudMoves.textContent = moveCount;
      hudStatus.textContent = status;
      hudLast.textContent = lastMove;
      hudTimer.textContent = getTimerValue().toFixed(1);
      hudScramble.textContent = scrambleMoves;
      hudAnimating.textContent = isAnimating ? 'Yes' : 'No';
    }

    function validateCube() {
      if (cubies.length !== 27) return false;
      return cubies.every(c =>
        Number.isFinite(c.position.x) &&
        Number.isFinite(c.position.y) &&
        Number.isFinite(c.position.z)
      );
    }

    function update3DState() {
      const faceColors = {};
      for (const f of ['U', 'D', 'R', 'L', 'F', 'B']) {
        const dom = faceDominant(f);
        faceColors[f] = dom === 'mixed' ? 'mixed' : dom;
      }

      window.__3D_STATE__ = {
        moveCount,
        status,
        lastMove,
        timer: Number(getTimerValue().toFixed(1)),
        scrambleMoves,
        isAnimating,
        isSolved,
        frameCount,
        cubeValid: validateCube(),
        faceColors
      };
    }

    function animate(now) {
      frameCount++;

      if (activeAnimation) {
        const t = Math.min(1, (now - activeAnimation.start) / activeAnimation.duration);
        const eased = easeInOutCubic(t);
        const angle = activeAnimation.endAngle * eased;
        const delta = angle - activeAnimation.lastAngle;
        activeAnimation.tempGroup.rotateOnAxis(activeAnimation.axisVec, delta);
        activeAnimation.lastAngle = angle;

        if (t >= 1) {
          finalizeMove(activeAnimation);
        }
      }

      controls.update();
      updateHUD();
      update3DState();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    resetCube();
    updateHUD();
    update3DState();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
