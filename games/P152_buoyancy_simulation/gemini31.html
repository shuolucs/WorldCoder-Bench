<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buoyancy Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: monospace;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #444;
            pointer-events: none;
            line-height: 1.5;
            font-size: 14px;
            min-width: 200px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            border: 1px solid #444;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #666;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 3px;
            font-family: monospace;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: #555;
        }
        button.active {
            background: #0064ff;
            border-color: #0088ff;
        }
        #instructions {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #444;
            text-align: right;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud"></div>
    
    <div id="instructions">
        <b>Controls:</b><br>
        Mouse: Rotate/Zoom<br>
        Space: Pause/Resume<br>
        ArrowUp: Impulse Up (+3)<br>
        ArrowDown: Impulse Down (-3)
    </div>

    <div id="controls">
        <button id="dropBtn">Drop</button>
        <button id="resetBtn">Reset</button>
        <div style="width: 2px; background: #666; margin: 0 5px;"></div>
        <button id="waterBtn" class="fluid-btn active">Water</button>
        <button id="saltwaterBtn" class="fluid-btn">Saltwater</button>
        <button id="mercuryBtn" class="fluid-btn">Mercury</button>
        <button id="oilBtn" class="fluid-btn">Oil</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            objectY: 4.0,
            objectVelocity: 0,
            fluidDensity: 1000,
            fluidName: 'water',
            submergedFraction: 0,
            isPaused: true,
            isDropped: false,
            objectDensity: 1050,
            tankBottom: -2.5,
            fluidSurfaceY: 1.5,
            simTime: 0,
            modelLoaded: false
        };
        const state = window.__3D_STATE__;

        const fluids = {
            water: { density: 1000, color: 0x0064ff, opacity: 0.3, name: 'Water' },
            saltwater: { density: 1025, color: 0x00b4c8, opacity: 0.3, name: 'Saltwater' },
            mercury: { density: 13546, color: 0xb4b4b4, opacity: 0.5, name: 'Mercury' },
            oil: { density: 800, color: 0xc89600, opacity: 0.3, name: 'Oil' }
        };

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Ground
        const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
        gridHelper.position.y = -3.0;
        scene.add(gridHelper);

        // Tank
        const tankWidth = 4, tankHeight = 5, tankDepth = 4;
        const tankGeo = new THREE.BoxGeometry(tankWidth, tankHeight, tankDepth);
        const tankMat = new THREE.MeshPhysicalMaterial({
            color: 0x88ccff,
            transparent: true,
            opacity: 0.1,
            side: THREE.DoubleSide,
            depthWrite: false
        });
        const tank = new THREE.Mesh(tankGeo, tankMat);
        scene.add(tank);

        const edges = new THREE.EdgesGeometry(tankGeo);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x88ccff, transparent: true, opacity: 0.5 }));
        scene.add(line);

        // Fluid
        const fluidHeight = 4.0; // from -2.5 to 1.5
        const fluidGeo = new THREE.BoxGeometry(tankWidth - 0.02, fluidHeight, tankDepth - 0.02);
        const fluidMat = new THREE.MeshPhysicalMaterial({
            color: fluids.water.color,
            transparent: true,
            opacity: fluids.water.opacity,
            depthWrite: false
        });
        const fluidMesh = new THREE.Mesh(fluidGeo, fluidMat);
        fluidMesh.position.y = -0.5; // Center of -2.5 and 1.5
        scene.add(fluidMesh);

        // Specimen Container
        const specimenGroup = new THREE.Group();
        specimenGroup.position.y = state.objectY;
        scene.add(specimenGroup);

        // Fallback Geometry (while loading or if fails)
        const fallbackGeo = new THREE.SphereGeometry(0.5, 32, 32);
        const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, transparent: true, opacity: 0.8 });
        const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
        specimenGroup.add(fallbackMesh);

        // Load GLTF
        const loader = new GLTFLoader();
        loader.load(
            'MosquitoInAmber.glb',
            (gltf) => {
                const model = gltf.scene;
                
                // Calculate bounding box to scale to 1.0 diameter
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 1.0 / maxDim;
                
                model.scale.setScalar(scale);
                
                // Center the model
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center.multiplyScalar(scale));

                // Replace fallback
                specimenGroup.remove(fallbackMesh);
                specimenGroup.add(model);
                state.modelLoaded = true;
            },
            undefined,
            (error) => {
                console.warn('Could not load MosquitoInAmber.glb, using fallback sphere.', error);
                state.modelLoaded = true; // Set true anyway so simulation proceeds visually
            }
        );

        // --- PHYSICS & LOGIC ---
        const dt = 1 / 60;
        const g = 9.81;
        const radius = 0.5;
        const volume = (4 / 3) * Math.PI * Math.pow(radius, 3);
        const mass = state.objectDensity * volume;

        function resetSimulation() {
            state.objectY = 4.0;
            state.objectVelocity = 0;
            state.isPaused = true;
            state.isDropped = false;
            state.submergedFraction = 0;
            specimenGroup.position.y = state.objectY;
            updateHUD();
        }

        function setFluid(fluidKey) {
            const f = fluids[fluidKey];
            state.fluidName = fluidKey;
            state.fluidDensity = f.density;
            
            fluidMat.color.setHex(f.color);
            fluidMat.opacity = f.opacity;
            
            document.querySelectorAll('.fluid-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(fluidKey + 'Btn').classList.add('active');
            
            resetSimulation();
        }

        function updatePhysics() {
            if (state.isPaused || !state.isDropped) return;

            state.simTime += dt;

            // Calculate submerged fraction
            let fraction = (state.fluidSurfaceY - (state.objectY - radius)) / (2 * radius);
            fraction = Math.max(0, Math.min(1, fraction));
            state.submergedFraction = fraction;

            // Forces
            const F_gravity = -mass * g;
            
            const submergedVolume = fraction * volume;
            const F_buoyancy = state.fluidDensity * g * submergedVolume;

            const Cd = fraction > 0 ? 2.0 : 0.01;
            const envDensity = fraction > 0 ? state.fluidDensity : 1.225; // Air density approx
            const F_drag = -0.5 * Cd * envDensity * Math.pow(state.objectVelocity, 2) * Math.sign(state.objectVelocity);

            const F_net = F_gravity + F_buoyancy + F_drag;
            const acceleration = F_net / mass;

            // Integrate
            state.objectVelocity += acceleration * dt;
            state.objectY += state.objectVelocity * dt;

            // Collision with bottom
            const minCenterY = state.tankBottom + radius;
            if (state.objectY <= minCenterY) {
                state.objectY = minCenterY;
                state.objectVelocity = 0;
            }

            // Update Mesh
            specimenGroup.position.y = state.objectY;
        }

        // --- UI & INTERACTIONS ---
        const hudEl = document.getElementById('hud');
        function updateHUD() {
            hudEl.innerHTML = `
                <b>Fluid:</b> ${fluids[state.fluidName].name}<br>
                <b>Fluid Density:</b> ${state.fluidDensity} kg/m³<br>
                <b>Object Y:</b> ${state.objectY.toFixed(2)}<br>
                <b>Velocity:</b> ${state.objectVelocity.toFixed(2)} m/s<br>
                <b>Submerged:</b> ${Math.round(state.submergedFraction * 100)}%<br>
                <b>State:</b> <span style="color:${state.isPaused ? '#ff4444' : '#44ff44'}">${state.isPaused ? 'PAUSED' : 'RUNNING'}</span>
            `;
        }

        document.getElementById('dropBtn').addEventListener('click', () => {
            state.objectY = 4.0;
            state.objectVelocity = 0;
            state.isDropped = true;
            state.isPaused = false;
        });

        document.getElementById('resetBtn').addEventListener('click', resetSimulation);
        document.getElementById('waterBtn').addEventListener('click', () => setFluid('water'));
        document.getElementById('saltwaterBtn').addEventListener('click', () => setFluid('saltwater'));
        document.getElementById('mercuryBtn').addEventListener('click', () => setFluid('mercury'));
        document.getElementById('oilBtn').addEventListener('click', () => setFluid('oil'));

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (state.isDropped) {
                    state.isPaused = !state.isPaused;
                }
            } else if (e.code === 'ArrowUp') {
                if (!state.isPaused && state.isDropped) state.objectVelocity += 3.0;
            } else if (e.code === 'ArrowDown') {
                if (!state.isPaused && state.isDropped) state.objectVelocity -= 3.0;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- MAIN LOOP ---
        updateHUD();

        function animate() {
            requestAnimationFrame(animate);
            
            updatePhysics();
            updateHUD();
            
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
