<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buoyancy Simulation - Mosquito in Amber</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.75);
    color: #e0e0e0;
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 260px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    z-index: 10;
}

#hud .label { color: #888; }
#hud .value { color: #4fc3f7; font-weight: bold; }
#hud .title { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 6px; }
#hud .state-running { color: #4caf50; }
#hud .state-paused { color: #ff9800; }

#controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    z-index: 10;
}

#controls button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

#controls button:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

#controls button:active {
    transform: translateY(0);
}

#dropBtn { background: #4caf50; color: white; }
#resetBtn { background: #f44336; color: white; }
#waterBtn { background: #2196f3; color: white; }
#saltwaterBtn { background: #00bcd4; color: white; }
#mercuryBtn { background: #9e9e9e; color: white; }
#oilBtn { background: #ff9800; color: white; }

.btn-active {
    outline: 3px solid #fff;
    outline-offset: 2px;
}

#instructions {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(0, 0, 0, 0.65);
    color: #aaa;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    z-index: 10;
}

#instructions kbd {
    background: rgba(255,255,255,0.15);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: monospace;
}

#loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 18px;
    z-index: 20;
    background: rgba(0,0,0,0.8);
    padding: 20px 40px;
    border-radius: 10px;
}
</style>
</head>
<body>

<div id="hud">
    <div class="title">🦟 Buoyancy Simulation</div>
    <div><span class="label">Fluid: </span><span class="value" id="hudFluid">Water</span></div>
    <div><span class="label">Fluid Density: </span><span class="value" id="hudFluidDensity">1000</span> <span class="label">kg/m³</span></div>
    <div><span class="label">Object Y: </span><span class="value" id="hudObjY">4.00</span></div>
    <div><span class="label">Velocity: </span><span class="value" id="hudVelocity">0.00</span> <span class="label">m/s</span></div>
    <div><span class="label">Submerged: </span><span class="value" id="hudSubmerged">0</span><span class="label">%</span></div>
    <div><span class="label">State: </span><span id="hudState" class="state-paused">PAUSED</span></div>
</div>

<div id="instructions">
    <strong>Controls:</strong><br>
    <kbd>Space</kbd> Pause / Resume<br>
    <kbd>↑</kbd> Upward impulse<br>
    <kbd>↓</kbd> Downward impulse<br>
    🖱️ Orbit: drag | Zoom: scroll
</div>

<div id="controls">
    <button id="dropBtn">🔽 Drop</button>
    <button id="resetBtn">🔄 Reset</button>
    <button id="waterBtn" class="btn-active">💧 Water</button>
    <button id="saltwaterBtn">🌊 Saltwater</button>
    <button id="mercuryBtn">🪞 Mercury</button>
    <button id="oilBtn">🛢️ Oil</button>
</div>

<div id="loading">Loading model...</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ CONSTANTS ============
const TANK_WIDTH = 4, TANK_HEIGHT = 5, TANK_DEPTH = 4;
const TANK_BOTTOM = -2.5;
const FLUID_SURFACE_Y = 1.5;
const FLUID_DEPTH = 4.0;
const OBJECT_RADIUS = 0.5;
const OBJECT_VOLUME = (4 / 3) * Math.PI * Math.pow(OBJECT_RADIUS, 3);
const OBJECT_DENSITY = 1050;
const OBJECT_MASS = OBJECT_DENSITY * OBJECT_VOLUME;
const GRAVITY = -9.81;
const DT = 1 / 60;
const MIN_Y = TANK_BOTTOM + OBJECT_RADIUS;

const FLUIDS = {
    water:     { name: 'Water',     density: 1000,  color: [0, 100, 255, 0.3],   threeColor: 0x0064ff },
    saltwater: { name: 'Saltwater', density: 1025,  color: [0, 180, 200, 0.3],   threeColor: 0x00b4c8 },
    mercury:   { name: 'Mercury',   density: 13546, color: [180, 180, 180, 0.5], threeColor: 0xb4b4b4 },
    oil:       { name: 'Oil',       density: 800,   color: [200, 150, 0, 0.3],   threeColor: 0xc89600 }
};

// ============ STATE ============
const state = {
    objectY: 4.0,
    objectVelocity: 0,
    fluidDensity: 1000,
    fluidName: 'water',
    submergedFraction: 0,
    isPaused: true,
    isDropped: false,
    objectDensity: OBJECT_DENSITY,
    tankBottom: TANK_BOTTOM,
    fluidSurfaceY: FLUID_SURFACE_Y,
    simTime: 0,
    modelLoaded: false
};
window.__3D_STATE__ = state;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 15, 30);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -8;
dirLight.shadow.camera.right = 8;
dirLight.shadow.camera.top = 8;
dirLight.shadow.camera.bottom = -8;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x362d1b, 0.3);
scene.add(hemiLight);

// ============ GROUND PLANE ============
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -3.0;
ground.receiveShadow = true;
scene.add(ground);

// Grid
const gridHelper = new THREE.GridHelper(20, 20, 0x555577, 0x444466);
gridHelper.position.y = -2.99;
scene.add(gridHelper);

// ============ TANK ============
const tankGroup = new THREE.Group();

// Tank wireframe edges
const tankGeo = new THREE.BoxGeometry(TANK_WIDTH, TANK_HEIGHT, TANK_DEPTH);
const tankEdges = new THREE.EdgesGeometry(tankGeo);
const tankLine = new THREE.LineSegments(tankEdges, new THREE.LineBasicMaterial({ color: 0x88aaff, linewidth: 1 }));
tankGroup.add(tankLine);

// Semi-transparent tank walls
const tankWallMat = new THREE.MeshPhysicalMaterial({
    color: 0x88bbff,
    transparent: true,
    opacity: 0.08,
    roughness: 0.1,
    metalness: 0,
    side: THREE.DoubleSide,
    depthWrite: false
});
const tankWalls = new THREE.Mesh(tankGeo, tankWallMat);
tankGroup.add(tankWalls);

scene.add(tankGroup);

// ============ FLUID ============
const fluidGeo = new THREE.BoxGeometry(TANK_WIDTH * 0.98, FLUID_DEPTH, TANK_DEPTH * 0.98);
const fluidMat = new THREE.MeshPhysicalMaterial({
    color: FLUIDS.water.threeColor,
    transparent: true,
    opacity: 0.3,
    roughness: 0.1,
    metalness: 0.1,
    side: THREE.DoubleSide,
    depthWrite: false,
    transmission: 0.5
});
const fluidMesh = new THREE.Mesh(fluidGeo, fluidMat);
fluidMesh.position.y = TANK_BOTTOM + FLUID_DEPTH / 2;
scene.add(fluidMesh);

// Fluid surface highlight
const surfaceGeo = new THREE.PlaneGeometry(TANK_WIDTH * 0.98, TANK_DEPTH * 0.98);
const surfaceMat = new THREE.MeshPhysicalMaterial({
    color: 0xaaddff,
    transparent: true,
    opacity: 0.15,
    roughness: 0,
    metalness: 0.3,
    side: THREE.DoubleSide,
    depthWrite: false
});
const surfacePlane = new THREE.Mesh(surfaceGeo, surfaceMat);
surfacePlane.rotation.x = -Math.PI / 2;
surfacePlane.position.y = FLUID_SURFACE_Y;
scene.add(surfacePlane);

// ============ FALLBACK AMBER SPHERE ============
const fallbackGeo = new THREE.SphereGeometry(OBJECT_RADIUS, 32, 32);
const fallbackMat = new THREE.MeshPhysicalMaterial({
    color: 0xd4a017,
    transparent: true,
    opacity: 0.85,
    roughness: 0.15,
    metalness: 0.05,
    clearcoat: 1.0,
    clearcoatRoughness: 0.1,
    transmission: 0.3,
    ior: 1.55
});
const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
fallbackMesh.castShadow = true;
fallbackMesh.position.y = state.objectY;
scene.add(fallbackMesh);

// Small dark speck inside to represent mosquito
const mosquitoGeo = new THREE.SphereGeometry(0.12, 16, 16);
const mosquitoMat = new THREE.MeshStandardMaterial({ color: 0x1a0a00, roughness: 0.9 });
const mosquitoMesh = new THREE.Mesh(mosquitoGeo, mosquitoMat);
mosquitoMesh.position.set(0, 0.05, 0);
fallbackMesh.add(mosquitoMesh);

let specimenObject = fallbackMesh;
let glbModel = null;

// ============ LOAD GLB MODEL ============
const loader = new GLTFLoader();
const loadingEl = document.getElementById('loading');

loader.load(
    'MosquitoInAmber.glb',
    (gltf) => {
        glbModel = gltf.scene;

        // Calculate bounding box and scale to ~1.0 diameter
        const box = new THREE.Box3().setFromObject(glbModel);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 1.0 / maxDim;
        glbModel.scale.setScalar(scale);

        // Center the model
        const newBox = new THREE.Box3().setFromObject(glbModel);
        const center = new THREE.Vector3();
        newBox.getCenter(center);
        glbModel.position.sub(center);

        // Wrap in a group for positioning
        const wrapper = new THREE.Group();
        wrapper.add(glbModel);
        wrapper.position.y = state.objectY;
        wrapper.castShadow = true;

        glbModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });

        scene.remove(fallbackMesh);
        scene.add(wrapper);
        specimenObject = wrapper;

        state.modelLoaded = true;
        loadingEl.style.display = 'none';
        console.log('GLB model loaded successfully');
    },
    (progress) => {
        if (progress.total > 0) {
            const pct = Math.round((progress.loaded / progress.total) * 100);
            loadingEl.textContent = `Loading model... ${pct}%`;
        }
    },
    (error) => {
        console.warn('Could not load MosquitoInAmber.glb, using fallback sphere:', error);
        state.modelLoaded = true;
        loadingEl.style.display = 'none';
    }
);

// ============ PHYSICS ============
function updatePhysics() {
    if (state.isPaused || !state.isDropped) return;

    const y = state.objectY;
    const v = state.objectVelocity;
    const sphereBottom = y - OBJECT_RADIUS;
    const sphereTop = y + OBJECT_RADIUS;

    // Calculate submerged fraction
    let subFrac = 0;
    if (sphereBottom >= FLUID_SURFACE_Y) {
        subFrac = 0;
    } else if (sphereTop <= FLUID_SURFACE_Y) {
        subFrac = 1;
    } else {
        subFrac = Math.max(0, Math.min(1, (FLUID_SURFACE_Y - sphereBottom) / (OBJECT_RADIUS * 2)));
    }
    state.submergedFraction = subFrac;

    // Gravity force
    let force = OBJECT_MASS * GRAVITY;

    // Buoyancy force
    const submergedVolume = subFrac * OBJECT_VOLUME;
    const buoyancyForce = state.fluidDensity * (-GRAVITY) * submergedVolume;
    force += buoyancyForce;

    // Drag force
    const dragCoeff = subFrac > 0 ? 2.0 : 0.01;
    const dragDensity = subFrac > 0 ? state.fluidDensity : 1.225;
    const dragForce = -0.5 * dragCoeff * dragDensity * v * Math.abs(v);
    force += dragForce;

    // Acceleration
    const accel = force / OBJECT_MASS;

    // Integrate
    state.objectVelocity += accel * DT;
    state.objectY += state.objectVelocity * DT;

    // Tank bottom collision
    if (state.objectY < MIN_Y) {
        state.objectY = MIN_Y;
        state.objectVelocity *= -0.2; // Small bounce
        if (Math.abs(state.objectVelocity) < 0.01) {
            state.objectVelocity = 0;
        }
    }

    // Tank top (prevent flying too high, but allow above tank)
    // No hard limit on top, just let it go

    state.simTime += DT;
}

// ============ FLUID CHANGE ============
function setFluid(fluidKey) {
    const fluid = FLUIDS[fluidKey];
    state.fluidName = fluidKey;
    state.fluidDensity = fluid.density;

    // Update fluid visual
    fluidMat.color.set(fluid.threeColor);
    fluidMat.opacity = fluid.color[3];
    surfaceMat.color.set(fluid.threeColor);

    // Reset specimen
    resetSpecimen();

    // Update button active states
    document.querySelectorAll('#controls button').forEach(btn => btn.classList.remove('btn-active'));
    document.getElementById(fluidKey + 'Btn').classList.add('btn-active');
}

function resetSpecimen() {
    state.objectY = 4.0;
    state.objectVelocity = 0;
    state.isPaused = true;
    state.isDropped = false;
    state.submergedFraction = 0;
    state.simTime = 0;
}

function dropSpecimen() {
    state.objectY = 4.0;
    state.objectVelocity = 0;
    state.isPaused = false;
    state.isDropped = true;
}

// ============ HUD UPDATE ============
function updateHUD() {
    document.getElementById('hudFluid').textContent = FLUIDS[state.fluidName].name;
    document.getElementById('hudFluidDensity').textContent = state.fluidDensity;
    document.getElementById('hudObjY').textContent = state.objectY.toFixed(2);
    document.getElementById('hudVelocity').textContent = state.objectVelocity.toFixed(2);
    document.getElementById('hudSubmerged').textContent = Math.round(state.submergedFraction * 100);

    const stateEl = document.getElementById('hudState');
    if (state.isPaused) {
        stateEl.textContent = 'PAUSED';
        stateEl.className = 'state-paused';
    } else {
        stateEl.textContent = 'RUNNING';
        stateEl.className = 'state-running';
    }
}

// ============ EVENT LISTENERS ============
document.getElementById('dropBtn').addEventListener('click', dropSpecimen);
document.getElementById('resetBtn').addEventListener('click', resetSpecimen);
document.getElementById('waterBtn').addEventListener('click', () => setFluid('water'));
document.getElementById('saltwaterBtn').addEventListener('click', () => setFluid('saltwater'));
document.getElementById('mercuryBtn').addEventListener('click', () => setFluid('mercury'));
document.getElementById('oilBtn').addEventListener('click', () => setFluid('oil'));

document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        if (state.isDropped) {
            state.isPaused = !state.isPaused;
        }
    } else if (e.code === 'ArrowUp') {
        e.preventDefault();
        if (state.isDropped) {
            state.objectVelocity += 3.0;
        }
    } else if (e.code === 'ArrowDown') {
        e.preventDefault();
        if (state.isDropped) {
            state.objectVelocity -= 3.0;
        }
    }
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ PARTICLES (bubbles in fluid) ============
const bubbleCount = 30;
const bubbles = [];
const bubbleGeo = new THREE.SphereGeometry(0.03, 8, 8);
const bubbleMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 });

for (let i = 0; i < bubbleCount; i++) {
    const bubble = new THREE.Mesh(bubbleGeo, bubbleMat.clone());
    bubble.position.set(
        (Math.random() - 0.5) * 3.5,
        TANK_BOTTOM + Math.random() * FLUID_DEPTH,
        (Math.random() - 0.5) * 3.5
    );
    bubble.userData.speed = 0.002 + Math.random() * 0.005;
    bubble.userData.wobble = Math.random() * Math.PI * 2;
    scene.add(bubble);
    bubbles.push(bubble);
}

function updateBubbles(time) {
    bubbles.forEach(b => {
        b.position.y += b.userData.speed;
        b.position.x += Math.sin(time * 2 + b.userData.wobble) * 0.002;
        b.position.z += Math.cos(time * 2.5 + b.userData.wobble) * 0.002;

        if (b.position.y > FLUID_SURFACE_Y) {
            b.position.y = TANK_BOTTOM + 0.1;
            b.position.x = (Math.random() - 0.5) * 3.5;
            b.position.z = (Math.random() - 0.5) * 3.5;
        }
    });
}

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const elapsed = clock.getElapsedTime();

    // Physics
    updatePhysics();

    // Update specimen position
    specimenObject.position.y = state.objectY;

    // Gentle rotation when falling
    if (state.isDropped && !state.isPaused) {
        specimenObject.rotation.y += 0.005;
        specimenObject.rotation.x = Math.sin(elapsed * 0.5) * 0.05;
    }

    // Fluid surface wobble
    surfacePlane.position.y = FLUID_SURFACE_Y + Math.sin(elapsed * 1.5) * 0.01;

    // Bubbles
    updateBubbles(elapsed);

    // HUD
    updateHUD();

    // Controls
    controls.update();

    // Render
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
