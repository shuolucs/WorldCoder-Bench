<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Buoyancy Simulation - Mosquito in Amber</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #101418;
      font-family: Arial, sans-serif;
      color: white;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: auto;
    }

    #controlsRow1, #controlsRow2 {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #2a3440;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #3a4757;
    }

    button.active {
      background: #0d6efd;
    }

    #hud {
      position: absolute;
      top: 110px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 12px;
      border-radius: 8px;
      line-height: 1.45;
      white-space: pre-line;
      font-size: 14px;
      min-width: 220px;
    }

    #help {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.35);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="controlsRow1">
      <button id="dropBtn">Drop</button>
      <button id="resetBtn">Reset</button>
    </div>
    <div id="controlsRow2">
      <button id="waterBtn" class="active">Water</button>
      <button id="saltwaterBtn">Saltwater</button>
      <button id="mercuryBtn">Mercury</button>
      <button id="oilBtn">Oil</button>
    </div>
  </div>

  <div id="hud">Loading...</div>

  <div id="help">
    Space: Pause/Resume &nbsp; | &nbsp; ArrowUp: +3 impulse &nbsp; | &nbsp; ArrowDown: -3 impulse
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101418);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    // Ground plane at y = -3.0
    const groundCanvas = document.createElement('canvas');
    groundCanvas.width = 256;
    groundCanvas.height = 256;
    const gctx = groundCanvas.getContext('2d');
    gctx.fillStyle = '#3a3a3a';
    gctx.fillRect(0, 0, 256, 256);
    gctx.strokeStyle = '#555';
    gctx.lineWidth = 2;
    for (let i = 0; i <= 256; i += 32) {
      gctx.beginPath();
      gctx.moveTo(i, 0);
      gctx.lineTo(i, 256);
      gctx.stroke();
      gctx.beginPath();
      gctx.moveTo(0, i);
      gctx.lineTo(256, i);
      gctx.stroke();
    }
    const groundTexture = new THREE.CanvasTexture(groundCanvas);
    groundTexture.wrapS = groundTexture.wrapT = THREE.RepeatWrapping;
    groundTexture.repeat.set(8, 8);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ map: groundTexture, side: THREE.DoubleSide })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -3.0;
    scene.add(ground);

    const gridHelper = new THREE.GridHelper(20, 20, 0x666666, 0x444444);
    gridHelper.position.y = -2.999;
    scene.add(gridHelper);

    // Tank
    const tankWidth = 4;
    const tankHeight = 5;
    const tankDepth = 4;
    const tankBottom = -2.5;
    const tankTop = 2.5;
    const fluidSurfaceY = 1.5;
    const fluidDepth = 4.0;

    const tankGroup = new THREE.Group();
    scene.add(tankGroup);

    const tankGeometry = new THREE.BoxGeometry(tankWidth, tankHeight, tankDepth);
    const tankMaterial = new THREE.MeshPhysicalMaterial({
      color: 0x88bbff,
      transparent: true,
      opacity: 0.12,
      transmission: 0.2,
      roughness: 0.2,
      metalness: 0.0,
      side: THREE.DoubleSide
    });
    const tankMesh = new THREE.Mesh(tankGeometry, tankMaterial);
    tankGroup.add(tankMesh);

    const tankEdges = new THREE.LineSegments(
      new THREE.EdgesGeometry(tankGeometry),
      new THREE.LineBasicMaterial({ color: 0xaad4ff })
    );
    tankGroup.add(tankEdges);

    // Fluid box
    const fluidGeometry = new THREE.BoxGeometry(tankWidth * 0.98, fluidDepth, tankDepth * 0.98);
    const fluidMaterial = new THREE.MeshStandardMaterial({
      color: 0x0064ff,
      transparent: true,
      opacity: 0.3
    });
    const fluidMesh = new THREE.Mesh(fluidGeometry, fluidMaterial);
    fluidMesh.position.y = tankBottom + fluidDepth / 2;
    scene.add(fluidMesh);

    const fluidSurface = new THREE.Mesh(
      new THREE.PlaneGeometry(tankWidth * 0.98, tankDepth * 0.98),
      new THREE.MeshBasicMaterial({
        color: 0x66bbff,
        transparent: true,
        opacity: 0.45,
        side: THREE.DoubleSide
      })
    );
    fluidSurface.rotation.x = -Math.PI / 2;
    fluidSurface.position.y = fluidSurfaceY + 0.001;
    scene.add(fluidSurface);

    // Physics constants
    const OBJECT_DENSITY = 1050;
    const OBJECT_RADIUS = 0.5;
    const OBJECT_VOLUME = (4 / 3) * Math.PI * Math.pow(OBJECT_RADIUS, 3);
    const OBJECT_MASS = OBJECT_DENSITY * OBJECT_VOLUME;
    const GRAVITY = -9.81;
    const DT = 1 / 60;
    const MIN_CENTER_Y = tankBottom + OBJECT_RADIUS;

    const fluids = {
      water:     { name: 'water',     label: 'Water',     density: 1000,  color: new THREE.Color(0x0064ff), opacity: 0.30 },
      saltwater: { name: 'saltwater', label: 'Saltwater', density: 1025,  color: new THREE.Color(0x00b4c8), opacity: 0.30 },
      mercury:   { name: 'mercury',   label: 'Mercury',   density: 13546, color: new THREE.Color(0xb4b4b4), opacity: 0.50 },
      oil:       { name: 'oil',       label: 'Oil',       density: 800,   color: new THREE.Color(0xc89600), opacity: 0.30 }
    };

    let currentFluid = fluids.water;

    // Fallback sphere if model hasn't loaded
    const fallbackSphere = new THREE.Mesh(
      new THREE.SphereGeometry(OBJECT_RADIUS, 32, 32),
      new THREE.MeshStandardMaterial({ color: 0xcc8844, transparent: true, opacity: 0.35 })
    );
    fallbackSphere.visible = false;
    scene.add(fallbackSphere);

    let specimen = null;
    let modelLoaded = false;

    const specimenGroup = new THREE.Group();
    specimenGroup.position.set(0, 4.0, 0);
    scene.add(specimenGroup);

    const loader = new GLTFLoader();
    loader.load(
      'MosquitoInAmber.glb',
      (gltf) => {
        specimen = gltf.scene;

        const box = new THREE.Box3().setFromObject(specimen);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const scale = 1.0 / maxDim;
        specimen.scale.setScalar(scale);

        // Recompute after scaling
        const box2 = new THREE.Box3().setFromObject(specimen);
        const center2 = new THREE.Vector3();
        box2.getCenter(center2);

        specimen.position.sub(center2);

        specimen.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = false;
            child.receiveShadow = false;
          }
        });

        specimenGroup.add(specimen);
        modelLoaded = true;
        syncState();
      },
      undefined,
      (err) => {
        console.warn('Failed to load MosquitoInAmber.glb, using fallback sphere.', err);
        fallbackSphere.visible = true;
        modelLoaded = false;
        syncState();
      }
    );

    let objectY = 4.0;
    let objectVelocity = 0.0;
    let submergedFraction = 0.0;
    let isPaused = true;
    let isDropped = false;
    let simTime = 0.0;

    function setFluid(fluidKey) {
      currentFluid = fluids[fluidKey];
      fluidMaterial.color.copy(currentFluid.color);
      fluidMaterial.opacity = currentFluid.opacity;
      fluidSurface.material.color.copy(currentFluid.color);
      fluidSurface.material.opacity = Math.min(currentFluid.opacity + 0.15, 0.65);

      document.querySelectorAll('#controlsRow2 button').forEach(btn => btn.classList.remove('active'));
      document.getElementById(fluidKey + 'Btn').classList.add('active');

      resetSimulation();
    }

    function resetSimulation() {
      objectY = 4.0;
      objectVelocity = 0.0;
      submergedFraction = 0.0;
      isPaused = true;
      isDropped = false;
      simTime = 0.0;
      updateSpecimenTransform();
      updateHUD();
      syncState();
    }

    function dropSimulation() {
      objectY = 4.0;
      objectVelocity = 0.0;
      submergedFraction = 0.0;
      isPaused = false;
      isDropped = true;
      simTime = 0.0;
      updateSpecimenTransform();
      updateHUD();
      syncState();
    }

    function updateSpecimenTransform() {
      specimenGroup.position.y = objectY;
      fallbackSphere.position.copy(specimenGroup.position);
    }

    function clamp(x, a, b) {
      return Math.max(a, Math.min(b, x));
    }

    function updatePhysics() {
      const bottom = objectY - OBJECT_RADIUS;
      const fraction = clamp((fluidSurfaceY - bottom) / (2 * OBJECT_RADIUS), 0, 1);
      submergedFraction = fraction;

      const inFluid = submergedFraction > 0;

      let forceGravity = OBJECT_MASS * GRAVITY;
      let forceBuoyancy = 0;
      let dragCoefficient = inFluid ? 2.0 : 0.01;
      let forceDrag = 0;

      if (inFluid) {
        const submergedVolume = submergedFraction * OBJECT_VOLUME;
        forceBuoyancy = currentFluid.density * Math.abs(GRAVITY) * submergedVolume;
      }

      forceDrag = -0.5 * dragCoefficient * (inFluid ? currentFluid.density : 1.225) * objectVelocity * Math.abs(objectVelocity);

      const netForce = forceGravity + forceBuoyancy + forceDrag;
      const acceleration = netForce / OBJECT_MASS;

      objectVelocity += acceleration * DT;
      objectY += objectVelocity * DT;

      if (objectY < MIN_CENTER_Y) {
        objectY = MIN_CENTER_Y;
        if (objectVelocity < 0) objectVelocity = 0;
      }

      const bottom2 = objectY - OBJECT_RADIUS;
      submergedFraction = clamp((fluidSurfaceY - bottom2) / (2 * OBJECT_RADIUS), 0, 1);

      simTime += DT;
    }

    function updateHUD() {
      const stateText = isPaused ? 'paused' : 'running';
      document.getElementById('hud').textContent =
`Fluid: ${currentFluid.label}
Fluid density: ${currentFluid.density} kg/m³
Object y: ${objectY.toFixed(2)}
Velocity: ${objectVelocity.toFixed(2)}
Submerged: ${Math.round(submergedFraction * 100)}%
State: ${stateText}`;
    }

    function syncState() {
      window.__3D_STATE__ = {
        objectY,
        objectVelocity,
        fluidDensity: currentFluid.density,
        fluidName: currentFluid.name,
        submergedFraction,
        isPaused,
        isDropped,
        objectDensity: OBJECT_DENSITY,
        tankBottom,
        fluidSurfaceY,
        simTime,
        modelLoaded
      };
    }

    document.getElementById('dropBtn').addEventListener('click', dropSimulation);
    document.getElementById('resetBtn').addEventListener('click', resetSimulation);
    document.getElementById('waterBtn').addEventListener('click', () => setFluid('water'));
    document.getElementById('saltwaterBtn').addEventListener('click', () => setFluid('saltwater'));
    document.getElementById('mercuryBtn').addEventListener('click', () => setFluid('mercury'));
    document.getElementById('oilBtn').addEventListener('click', () => setFluid('oil'));

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
      } else if (e.code === 'ArrowUp') {
        e.preventDefault();
        objectVelocity += 3.0;
      } else if (e.code === 'ArrowDown') {
        e.preventDefault();
        objectVelocity -= 3.0;
      }
      updateHUD();
      syncState();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    resetSimulation();

    function animate() {
      requestAnimationFrame(animate);

      controls.update();

      if (!isPaused && isDropped) {
        updatePhysics();
        updateSpecimenTransform();
        updateHUD();
        syncState();
      } else {
        updateSpecimenTransform();
        updateHUD();
        syncState();
      }

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
