<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 解剖模型浏览器</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: #eeeeee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .panel {
            position: absolute;
            background: rgba(30, 30, 30, 0.85);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            pointer-events: auto;
        }
        /* 左侧部件列表 */
        #partsList {
            top: 20px;
            left: 20px;
            bottom: 20px;
            width: 220px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #partsList h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            border-bottom: 1px solid #555;
            padding-bottom: 8px;
            flex-shrink: 0;
        }
        #buttonsContainer {
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 5px;
        }
        /* 滚动条样式 */
        #buttonsContainer::-webkit-scrollbar { width: 6px; }
        #buttonsContainer::-webkit-scrollbar-track { background: #2a2a2a; border-radius: 3px; }
        #buttonsContainer::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        
        .part-btn {
            background: #3a3a3a;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 10px;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            font-size: 13px;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .part-btn:hover { background: #4a4a4a; }
        .part-btn.hidden-part {
            background: #222;
            color: #777;
            border-color: #333;
            text-decoration: line-through;
        }

        /* 右侧详情面板 */
        #detailPanel {
            top: 20px;
            right: 20px;
            width: 200px;
        }
        #detailPanel h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            border-bottom: 1px solid #555;
            padding-bottom: 8px;
        }
        #detailName {
            font-size: 14px;
            color: #4488ff;
            font-weight: bold;
            word-wrap: break-word;
        }

        /* 左上角 HUD */
        #hud {
            top: 20px;
            left: 260px;
            pointer-events: none;
            font-size: 13px;
            line-height: 1.6;
            background: rgba(0, 0, 0, 0.5);
            border: none;
        }
        .hud-item span { font-weight: bold; color: #4488ff; }

        /* 底部透明度控制 */
        #opacityControl {
            bottom: 20px;
            left: 260px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        input[type=range] {
            width: 150px;
            cursor: pointer;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="loading">加载模型中...</div>

    <div id="partsList" class="panel" style="display: none;">
        <h3>解剖部位控制</h3>
        <div id="buttonsContainer"></div>
    </div>

    <div id="detailPanel" class="panel" style="display: none;">
        <h3>选中部位</h3>
        <div id="detailName">无</div>
    </div>

    <div id="hud" class="panel" style="display: none;">
        <div class="hud-item">可见部件: <span id="visibleCount">0</span> / <span id="totalCount">0</span></div>
        <div class="hud-item">当前选中: <span id="selectedPart">无</span></div>
        <div class="hud-item">全局透明度: <span id="opacityValue">1.00</span></div>
    </div>

    <div id="opacityControl" class="panel" style="display: none;">
        <label for="opacitySlider">透明度</label>
        <input type="range" id="opacitySlider" min="0.1" max="1.0" step="0.05" value="1.0">
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 全局状态初始化 ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            totalParts: 0,
            visibleParts: 0,
            selectedPart: "",
            opacity: 1.0,
            cameraDistance: 0
        };

        // --- 场景基础设置 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        // --- 控制器 ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 0.5;
        controls.maxDistance = 5;

        // --- 灯光 ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight1.position.set(5, 5, 5);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight2.position.set(-5, -5, -5);
        scene.add(dirLight2);

        // --- 变量 ---
        const meshes = [];
        let selectedMesh = null;
        const highlightColor = new THREE.Color(0x4488ff);
        
        // DOM 元素
        const buttonsContainer = document.getElementById('buttonsContainer');
        const elVisibleCount = document.getElementById('visibleCount');
        const elTotalCount = document.getElementById('totalCount');
        const elSelectedPart = document.getElementById('selectedPart');
        const elDetailName = document.getElementById('detailName');
        const elOpacityValue = document.getElementById('opacityValue');
        const opacitySlider = document.getElementById('opacitySlider');

        // --- 模型加载 ---
        const loader = new GLTFLoader();
        loader.load(
            'assets/BrainStem.glb',
            (gltf) => {
                const model = gltf.scene;
                
                // 遍历并处理 Mesh
                let meshIndex = 1;
                model.traverse((child) => {
                    if (child.isMesh) {
                        // 确保有名称
                        if (!child.name) child.name = `Part_${meshIndex++}`;
                        
                        // 处理材质，确保支持透明和自发光修改
                        if (Array.isArray(child.material)) {
                            child.material = child.material.map(m => {
                                const clone = m.clone();
                                clone.transparent = true;
                                return clone;
                            });
                            child.userData.origEmissive = child.material.map(m => m.emissive ? m.emissive.clone() : new THREE.Color(0x000000));
                        } else {
                            child.material = child.material.clone();
                            child.material.transparent = true;
                            child.userData.origEmissive = child.material.emissive ? child.material.emissive.clone() : new THREE.Color(0x000000);
                        }
                        
                        meshes.push(child);
                    }
                });

                // 居中模型
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                scene.add(model);

                // 初始化 UI
                initUI();
                
                // 更新状态
                window.__3D_STATE__.modelLoaded = true;
                window.__3D_STATE__.totalParts = meshes.length;
                elTotalCount.textContent = meshes.length;
                
                // 隐藏加载提示，显示面板
                document.getElementById('loading').style.display = 'none';
                document.querySelectorAll('.panel').forEach(p => p.style.display = p.id === 'partsList' ? 'flex' : 'block');
                if(document.getElementById('opacityControl')) document.getElementById('opacityControl').style.display = 'flex';
                
                updateHUD();
            },
            undefined,
            (error) => {
                console.error('An error happened loading the model:', error);
                document.getElementById('loading').textContent = '模型加载失败';
            }
        );

        // --- UI 初始化与交互 ---
        function initUI() {
            meshes.forEach((mesh, index) => {
                const btn = document.createElement('button');
                btn.className = 'part-btn';
                btn.textContent = mesh.name;
                btn.title = mesh.name;
                
                btn.addEventListener('click', () => {
                    mesh.visible = !mesh.visible;
                    if (mesh.visible) {
                        btn.classList.remove('hidden-part');
                    } else {
                        btn.classList.add('hidden-part');
                        // 如果隐藏的是当前选中的，取消选中
                        if (selectedMesh === mesh) clearSelection();
                    }
                    updateHUD();
                });
                
                buttonsContainer.appendChild(btn);
                mesh.userData.button = btn; // 关联按钮以便后续可能的操作
            });

            // 透明度滑块事件
            opacitySlider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                meshes.forEach(mesh => {
                    if (Array.isArray(mesh.material)) {
                        mesh.material.forEach(m => m.opacity = val);
                    } else {
                        mesh.material.opacity = val;
                    }
                });
                elOpacityValue.textContent = val.toFixed(2);
                window.__3D_STATE__.opacity = val;
            });
        }

        // --- 射线检测 (点击高亮) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        renderer.domElement.addEventListener('pointerdown', (event) => {
            // 将鼠标位置归一化为设备坐标
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // 只检测可见的 mesh
            const visibleMeshes = meshes.filter(m => m.visible);
            const intersects = raycaster.intersectObjects(visibleMeshes, false);

            if (intersects.length > 0) {
                selectMesh(intersects[0].object);
            } else {
                clearSelection();
            }
        });

        function selectMesh(mesh) {
            clearSelection();
            selectedMesh = mesh;
            
            // 设置高亮
            if (Array.isArray(selectedMesh.material)) {
                selectedMesh.material.forEach(m => { if(m.emissive) m.emissive.copy(highlightColor); });
            } else {
                if(selectedMesh.material.emissive) selectedMesh.material.emissive.copy(highlightColor);
            }

            // 更新 UI
            const name = selectedMesh.name;
            elDetailName.textContent = name;
            elSelectedPart.textContent = name;
            window.__3D_STATE__.selectedPart = name;
        }

        function clearSelection() {
            if (selectedMesh) {
                // 恢复原始自发光颜色
                if (Array.isArray(selectedMesh.material)) {
                    selectedMesh.material.forEach((m, i) => {
                        if(m.emissive) m.emissive.copy(selectedMesh.userData.origEmissive[i]);
                    });
                } else {
                    if(selectedMesh.material.emissive) selectedMesh.material.emissive.copy(selectedMesh.userData.origEmissive);
                }
                selectedMesh = null;
            }
            elDetailName.textContent = "无";
            elSelectedPart.textContent = "无";
            window.__3D_STATE__.selectedPart = "";
        }

        function updateHUD() {
            const visibleCount = meshes.filter(m => m.visible).length;
            elVisibleCount.textContent = visibleCount;
            window.__3D_STATE__.visibleParts = visibleCount;
        }

        // --- 窗口缩放适配 ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 动画循环 ---
        function animate() {
            requestAnimationFrame(animate);
            
            controls.update();
            renderer.render(scene, camera);

            // 每帧更新暴露的状态
            if (window.__3D_STATE__.modelLoaded) {
                window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);
            }
        }

        animate();
    </script>
</body>
</html>
