<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 解剖模型浏览器 - BrainStem</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.88);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #e5eefc;
      --muted: #9fb3d1;
      --accent: #4488ff;
      --accent-2: #79a8ff;
      --danger-muted: #5f6b7a;
      --button-bg: rgba(255, 255, 255, 0.08);
      --button-hover: rgba(255, 255, 255, 0.14);
      --button-hidden: rgba(255, 255, 255, 0.04);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #16233f 0%, #0b1223 45%, #050811 100%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvasContainer {
      position: absolute;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .panel {
      position: absolute;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
    }

    #hud {
      top: 12px;
      left: 12px;
      padding: 12px 14px;
      min-width: 220px;
      z-index: 20;
      pointer-events: none;
    }

    #leftPanel {
      top: 130px;
      left: 12px;
      bottom: 12px;
      width: 250px;
      display: flex;
      flex-direction: column;
      z-index: 15;
      overflow: hidden;
    }

    #rightPanel {
      top: 12px;
      right: 12px;
      width: 280px;
      min-height: 140px;
      padding: 14px;
      z-index: 15;
    }

    .panel-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #ffffff;
      letter-spacing: 0.2px;
    }

    .hud-row, .detail-row {
      margin: 6px 0;
      font-size: 14px;
      line-height: 1.5;
    }

    .label {
      color: var(--muted);
      margin-right: 6px;
    }

    .value {
      color: #fff;
      font-weight: 600;
      word-break: break-word;
    }

    .section {
      padding: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .section:last-child {
      border-bottom: none;
    }

    #partsList {
      padding: 10px;
      overflow-y: auto;
      flex: 1;
    }

    #partsList::-webkit-scrollbar {
      width: 10px;
    }

    #partsList::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.14);
      border-radius: 20px;
    }

    .part-btn {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
      background: var(--button-bg);
      color: var(--text);
      padding: 10px 12px;
      margin-bottom: 8px;
      border-radius: 10px;
      text-align: left;
      cursor: pointer;
      transition: all 0.18s ease;
      font-size: 13px;
    }

    .part-btn:hover {
      background: var(--button-hover);
      transform: translateY(-1px);
    }

    .part-btn.hidden {
      background: var(--button-hidden);
      color: #8593a6;
      border-color: rgba(255,255,255,0.06);
    }

    .part-btn.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(68,136,255,0.35) inset, 0 0 14px rgba(68,136,255,0.18);
      background: rgba(68,136,255,0.16);
      color: #ffffff;
    }

    .slider-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent-2);
      cursor: pointer;
    }

    #loading {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
      padding: 14px 18px;
      border-radius: 12px;
      background: rgba(10, 15, 28, 0.82);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      font-size: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
    }

    @media (max-width: 900px) {
      #leftPanel {
        width: 200px;
      }
      #rightPanel {
        width: 220px;
      }
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="canvasContainer"></div>

    <div id="loading">模型加载中...</div>

    <div id="hud" class="panel">
      <div class="panel-title">HUD</div>
      <div class="hud-row"><span class="label">可见部件数:</span><span class="value" id="visibleCount">0</span></div>
      <div class="hud-row"><span class="label">选中部件:</span><span class="value" id="selectedPart">无</span></div>
      <div class="hud-row"><span class="label">当前透明度:</span><span class="value" id="opacityValue">1.00</span></div>
    </div>

    <div id="leftPanel" class="panel">
      <div class="section">
        <div class="panel-title">透明度控制</div>
        <div class="slider-wrap">
          <input id="opacitySlider" type="range" min="0.1" max="1.0" step="0.05" value="1.0" />
        </div>
      </div>
      <div class="section" style="padding-bottom:10px;">
        <div class="panel-title" style="margin-bottom:0;">部件列表</div>
      </div>
      <div id="partsList"></div>
    </div>

    <div id="rightPanel" class="panel">
      <div class="panel-title">部件详情</div>
      <div class="detail-row"><span class="label">名称:</span><span class="value" id="detailPanel">未选中</span></div>
      <div class="detail-row"><span class="label">操作提示:</span><span class="value">点击模型部件以高亮；点击左侧按钮切换显隐。</span></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('canvasContainer');
    const partsListEl = document.getElementById('partsList');
    const detailPanelEl = document.getElementById('detailPanel');
    const visibleCountEl = document.getElementById('visibleCount');
    const selectedPartEl = document.getElementById('selectedPart');
    const opacityValueEl = document.getElementById('opacityValue');
    const opacitySliderEl = document.getElementById('opacitySlider');
    const loadingEl = document.getElementById('loading');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x09111f);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(0, 0.4, 2.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 0.5;
    controls.maxDistance = 5;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);

    const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.1);
    dirLight1.position.set(3, 4, 5);
    scene.add(dirLight1);

    const dirLight2 = new THREE.DirectionalLight(0xbfd6ff, 0.6);
    dirLight2.position.set(-4, 2, -3);
    scene.add(dirLight2);

    const hemiLight = new THREE.HemisphereLight(0x99bbff, 0x223344, 0.4);
    scene.add(hemiLight);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    let modelRoot = null;
    let partMeshes = [];
    let selectedMesh = null;
    let currentOpacity = parseFloat(opacitySliderEl.value);

    const partButtons = new Map();

    window.__3D_STATE__ = {
      modelLoaded: false,
      totalParts: 0,
      visibleParts: 0,
      selectedPart: "",
      opacity: currentOpacity,
      cameraDistance: camera.position.distanceTo(controls.target)
    };

    function getPartName(mesh, index = 0) {
      const raw = (mesh.name || mesh.parent?.name || '').trim();
      return raw || `Part_${index + 1}`;
    }

    function ensureMaterialArray(material) {
      return Array.isArray(material) ? material : [material];
    }

    function prepareMeshMaterial(mesh) {
      const materials = ensureMaterialArray(mesh.material);
      materials.forEach((mat) => {
        if (!mat) return;
        if (!mat.userData.__originalPrepared) {
          mat.userData.__originalPrepared = true;
          if ('emissive' in mat && mat.emissive) {
            mat.userData.originalEmissive = mat.emissive.clone();
            mat.userData.originalEmissiveIntensity = mat.emissiveIntensity ?? 1;
          }
          mat.userData.originalTransparent = mat.transparent;
          mat.userData.originalOpacity = mat.opacity;
        }
        mat.transparent = true;
        mat.opacity = currentOpacity;
        mat.depthWrite = currentOpacity >= 1.0;
        mat.needsUpdate = true;
      });
    }

    function setMeshHighlight(mesh, highlighted) {
      if (!mesh) return;
      const materials = ensureMaterialArray(mesh.material);
      materials.forEach((mat) => {
        if (!mat) return;
        if ('emissive' in mat && mat.emissive) {
          if (highlighted) {
            mat.emissive.setHex(0x4488ff);
            mat.emissiveIntensity = 0.9;
          } else {
            if (mat.userData.originalEmissive) {
              mat.emissive.copy(mat.userData.originalEmissive);
            } else {
              mat.emissive.setHex(0x000000);
            }
            mat.emissiveIntensity = mat.userData.originalEmissiveIntensity ?? 1;
          }
          mat.needsUpdate = true;
        }
      });
    }

    function clearSelection() {
      if (selectedMesh) {
        setMeshHighlight(selectedMesh, false);
      }
      selectedMesh = null;
      detailPanelEl.textContent = '未选中';
      selectedPartEl.textContent = '无';
      partButtons.forEach((btn) => btn.classList.remove('selected'));
    }

    function selectMesh(mesh) {
      if (!mesh || !mesh.visible) return;
      if (selectedMesh === mesh) return;

      if (selectedMesh) {
        setMeshHighlight(selectedMesh, false);
      }

      selectedMesh = mesh;
      setMeshHighlight(selectedMesh, true);

      const name = selectedMesh.userData.partName || selectedMesh.name || '未命名部件';
      detailPanelEl.textContent = name;
      selectedPartEl.textContent = name;

      partButtons.forEach((btn, key) => {
        btn.classList.toggle('selected', key === selectedMesh.uuid);
      });
    }

    function updateVisibleCount() {
      const visible = partMeshes.filter(m => m.visible).length;
      visibleCountEl.textContent = String(visible);
    }

    function applyGlobalOpacity(value) {
      currentOpacity = value;
      opacityValueEl.textContent = value.toFixed(2);

      partMeshes.forEach((mesh) => {
        if (!mesh.visible) return;
        const materials = ensureMaterialArray(mesh.material);
        materials.forEach((mat) => {
          if (!mat) return;
          mat.transparent = true;
          mat.opacity = value;
          mat.depthWrite = value >= 1.0;
          mat.needsUpdate = true;
        });
      });
    }

    function refreshAllMeshOpacity() {
      partMeshes.forEach((mesh) => {
        const materials = ensureMaterialArray(mesh.material);
        materials.forEach((mat) => {
          if (!mat) return;
          mat.transparent = true;
          mat.opacity = mesh.visible ? currentOpacity : currentOpacity;
          mat.depthWrite = currentOpacity >= 1.0;
          mat.needsUpdate = true;
        });
      });
    }

    function createPartButton(mesh) {
      const btn = document.createElement('button');
      btn.className = 'part-btn';
      btn.textContent = mesh.userData.partName;
      btn.addEventListener('click', () => {
        mesh.visible = !mesh.visible;
        btn.classList.toggle('hidden', !mesh.visible);

        if (!mesh.visible && selectedMesh === mesh) {
          clearSelection();
        }

        if (mesh.visible) {
          const materials = ensureMaterialArray(mesh.material);
          materials.forEach((mat) => {
            if (!mat) return;
            mat.opacity = currentOpacity;
            mat.transparent = true;
            mat.depthWrite = currentOpacity >= 1.0;
            mat.needsUpdate = true;
          });
        }

        updateVisibleCount();
      });

      partButtons.set(mesh.uuid, btn);
      partsListEl.appendChild(btn);
    }

    function centerModel(root) {
      const box = new THREE.Box3().setFromObject(root);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());

      root.position.sub(center);

      const maxDim = Math.max(size.x, size.y, size.z);
      if (maxDim > 0) {
        const fitDist = Math.max(1.2, maxDim * 1.4);
        camera.position.set(0, Math.max(0.2, size.y * 0.15), Math.min(4.5, fitDist));
      } else {
        camera.position.set(0, 0.3, 2);
      }

      controls.target.set(0, 0, 0);
      controls.update();
    }

    const loader = new GLTFLoader();
    loader.load(
      'assets/BrainStem.glb',
      (gltf) => {
        modelRoot = gltf.scene;
        scene.add(modelRoot);

        let meshIndex = 0;
        modelRoot.traverse((child) => {
          if (child.isMesh) {
            child.userData.partName = getPartName(child, meshIndex++);
            prepareMeshMaterial(child);
            partMeshes.push(child);
          }
        });

        centerModel(modelRoot);

        partMeshes.forEach(createPartButton);
        updateVisibleCount();
        applyGlobalOpacity(currentOpacity);

        window.__3D_STATE__.modelLoaded = true;
        window.__3D_STATE__.totalParts = partMeshes.length;
        loadingEl.style.display = 'none';
      },
      undefined,
      (error) => {
        console.error('模型加载失败:', error);
        loadingEl.textContent = '模型加载失败，请确认 assets/BrainStem.glb 可访问。';
      }
    );

    opacitySliderEl.addEventListener('input', (e) => {
      const value = parseFloat(e.target.value);
      applyGlobalOpacity(value);
    });

    renderer.domElement.addEventListener('pointerdown', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const intersects = raycaster.intersectObjects(partMeshes.filter(m => m.visible), false);
      if (intersects.length > 0) {
        selectMesh(intersects[0].object);
      } else {
        clearSelection();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function updateState() {
      const visibleParts = partMeshes.filter(m => m.visible).length;
      window.__3D_STATE__ = {
        modelLoaded: !!modelRoot,
        totalParts: partMeshes.length,
        visibleParts,
        selectedPart: selectedMesh ? (selectedMesh.userData.partName || selectedMesh.name || '') : '',
        opacity: currentOpacity,
        cameraDistance: camera.position.distanceTo(controls.target)
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      refreshAllMeshOpacity();
      updateState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
