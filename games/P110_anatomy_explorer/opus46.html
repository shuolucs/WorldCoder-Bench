<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 解剖模型浏览器</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden; 
    background: #0a0a1a;
    color: #e0e0e0;
  }

  #canvas-container {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
  }

  canvas { display: block; }

  /* Left Panel */
  #leftPanel {
    position: absolute;
    top: 0; left: 0;
    width: 260px;
    height: 100vh;
    background: linear-gradient(180deg, rgba(15,15,35,0.95) 0%, rgba(10,10,30,0.95) 100%);
    border-right: 1px solid rgba(100,140,255,0.2);
    z-index: 10;
    display: flex;
    flex-direction: column;
    backdrop-filter: blur(10px);
  }

  #leftPanel .panel-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid rgba(100,140,255,0.15);
  }

  #leftPanel .panel-header h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #6a9fff;
    margin-bottom: 4px;
  }

  #leftPanel .panel-header p {
    font-size: 11px;
    color: #667;
  }

  #partsList {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  #partsList::-webkit-scrollbar {
    width: 4px;
  }
  #partsList::-webkit-scrollbar-track {
    background: transparent;
  }
  #partsList::-webkit-scrollbar-thumb {
    background: rgba(100,140,255,0.3);
    border-radius: 2px;
  }

  .part-btn {
    display: flex;
    align-items: center;
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 4px;
    background: rgba(30,35,60,0.6);
    border: 1px solid rgba(100,140,255,0.1);
    border-radius: 8px;
    color: #c8d8ff;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
  }

  .part-btn:hover {
    background: rgba(50,60,100,0.7);
    border-color: rgba(100,140,255,0.3);
    transform: translateX(2px);
  }

  .part-btn.hidden-part {
    background: rgba(20,20,30,0.5);
    color: #445;
    border-color: rgba(50,50,70,0.3);
  }

  .part-btn.hidden-part .eye-icon {
    opacity: 0.3;
  }

  .part-btn .eye-icon {
    margin-right: 8px;
    font-size: 14px;
    transition: opacity 0.2s;
  }

  .part-btn .part-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Right Panel */
  #rightPanel {
    position: absolute;
    top: 50%;
    right: 20px;
    transform: translateY(-50%);
    width: 240px;
    z-index: 10;
  }

  #detailPanel {
    background: linear-gradient(135deg, rgba(15,15,35,0.95), rgba(20,20,50,0.95));
    border: 1px solid rgba(100,140,255,0.2);
    border-radius: 16px;
    padding: 24px 20px;
    backdrop-filter: blur(10px);
    margin-bottom: 12px;
  }

  #detailPanel h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #6a9fff;
    margin-bottom: 16px;
  }

  #detailPanel .detail-name {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 8px;
    word-break: break-word;
  }

  #detailPanel .detail-hint {
    font-size: 11px;
    color: #556;
  }

  /* Opacity Control */
  #opacityControl {
    background: linear-gradient(135deg, rgba(15,15,35,0.95), rgba(20,20,50,0.95));
    border: 1px solid rgba(100,140,255,0.2);
    border-radius: 16px;
    padding: 20px;
    backdrop-filter: blur(10px);
  }

  #opacityControl label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #6a9fff;
    display: block;
    margin-bottom: 12px;
  }

  #opacitySlider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: rgba(30,35,60,0.8);
    outline: none;
    cursor: pointer;
  }

  #opacitySlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4488ff, #6a9fff);
    box-shadow: 0 0 10px rgba(68,136,255,0.5);
    cursor: pointer;
    transition: transform 0.15s;
  }

  #opacitySlider::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  .opacity-value-display {
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    margin-top: 8px;
  }

  /* HUD */
  #hud {
    position: absolute;
    top: 16px;
    left: 276px;
    z-index: 10;
    display: flex;
    gap: 12px;
  }

  .hud-item {
    background: rgba(15,15,35,0.9);
    border: 1px solid rgba(100,140,255,0.15);
    border-radius: 10px;
    padding: 10px 16px;
    backdrop-filter: blur(10px);
  }

  .hud-item .hud-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #557;
    margin-bottom: 4px;
  }

  .hud-item .hud-value {
    font-size: 16px;
    font-weight: 600;
    color: #c8d8ff;
  }

  /* Loading */
  #loadingOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(5,5,15,0.95);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.5s ease;
  }

  #loadingOverlay.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  .loader-ring {
    width: 60px;
    height: 60px;
    border: 3px solid rgba(100,140,255,0.1);
    border-top-color: #4488ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 20px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  #loadingOverlay p {
    font-size: 14px;
    color: #6a9fff;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Buttons at bottom of left panel */
  .panel-actions {
    padding: 12px 8px;
    border-top: 1px solid rgba(100,140,255,0.15);
    display: flex;
    gap: 6px;
  }

  .action-btn {
    flex: 1;
    padding: 8px;
    background: rgba(30,35,60,0.6);
    border: 1px solid rgba(100,140,255,0.2);
    border-radius: 8px;
    color: #8aa8ff;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .action-btn:hover {
    background: rgba(50,60,100,0.7);
    color: #fff;
  }
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="loader-ring"></div>
  <p>Loading Model...</p>
</div>

<div id="canvas-container"></div>

<!-- Left Panel -->
<div id="leftPanel">
  <div class="panel-header">
    <h2>🧠 Anatomy Parts</h2>
    <p>Click to toggle visibility</p>
  </div>
  <div id="partsList"></div>
  <div class="panel-actions">
    <button class="action-btn" id="showAllBtn">Show All</button>
    <button class="action-btn" id="hideAllBtn">Hide All</button>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-item">
    <div class="hud-label">Visible Parts</div>
    <div class="hud-value" id="visibleCount">0</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">Selected</div>
    <div class="hud-value" id="selectedPart">无</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">Opacity</div>
    <div class="hud-value" id="opacityValue">1.00</div>
  </div>
</div>

<!-- Right Panel -->
<div id="rightPanel">
  <div id="detailPanel">
    <h3>Selected Part</h3>
    <div class="detail-name" id="detailName">无</div>
    <div class="detail-hint">Click on a part to select it</div>
  </div>
  <div id="opacityControl">
    <label>Transparency</label>
    <input type="range" id="opacitySlider" min="0.1" max="1.0" step="0.05" value="1.0">
    <div class="opacity-value-display" id="opacityDisplay">100%</div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Initialize state
window.__3D_STATE__ = {
  modelLoaded: false,
  totalParts: 0,
  visibleParts: 0,
  selectedPart: "",
  opacity: 1.0,
  cameraDistance: 0
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 0.5, 2.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 0.5;
controls.maxDistance = 5;
controls.target.set(0, 0, 0);

// Lighting
const ambientLight = new THREE.AmbientLight(0x404060, 1.5);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffffff, 2.0);
dirLight1.position.set(5, 5, 5);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0x8888ff, 1.0);
dirLight2.position.set(-3, 3, -3);
scene.add(dirLight2);

const dirLight3 = new THREE.DirectionalLight(0xffffff, 0.5);
dirLight3.position.set(0, -3, 0);
scene.add(dirLight3);

// Subtle grid
const gridHelper = new THREE.GridHelper(4, 20, 0x1a1a3a, 0x111130);
scene.add(gridHelper);

// Data structures
const meshParts = [];
const originalMaterials = new Map();
let selectedMesh = null;
let currentOpacity = 1.0;

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// DOM references
const partsListEl = document.getElementById('partsList');
const visibleCountEl = document.getElementById('visibleCount');
const selectedPartEl = document.getElementById('selectedPart');
const opacityValueEl = document.getElementById('opacityValue');
const opacitySliderEl = document.getElementById('opacitySlider');
const opacityDisplayEl = document.getElementById('opacityDisplay');
const detailNameEl = document.getElementById('detailName');
const loadingOverlay = document.getElementById('loadingOverlay');
const showAllBtn = document.getElementById('showAllBtn');
const hideAllBtn = document.getElementById('hideAllBtn');

// Load model
const loader = new GLTFLoader();
loader.load(
  'assets/BrainStem.glb',
  (gltf) => {
    const model = gltf.scene;

    // Center model
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    model.position.sub(center);

    // Adjust camera based on model size
    const maxDim = Math.max(size.x, size.y, size.z);
    const fov = camera.fov * (Math.PI / 180);
    let cameraZ = maxDim / (2 * Math.tan(fov / 2));
    cameraZ *= 1.8;
    camera.position.set(cameraZ * 0.5, cameraZ * 0.3, cameraZ);
    controls.update();

    scene.add(model);

    // Collect meshes
    model.traverse((child) => {
      if (child.isMesh) {
        meshParts.push(child);

        // Store original material (clone it)
        if (child.material) {
          const origMat = child.material.clone();
          originalMaterials.set(child.uuid, origMat);

          // Make material support transparency
          child.material = child.material.clone();
          child.material.transparent = true;
          child.material.opacity = currentOpacity;
          child.material.side = THREE.DoubleSide;
        }
      }
    });

    // Create buttons
    createPartButtons();

    // Update state
    window.__3D_STATE__.modelLoaded = true;
    window.__3D_STATE__.totalParts = meshParts.length;
    updateHUD();

    // Hide loading
    setTimeout(() => {
      loadingOverlay.classList.add('fade-out');
      setTimeout(() => { loadingOverlay.style.display = 'none'; }, 500);
    }, 300);
  },
  (progress) => {
    // Loading progress
  },
  (error) => {
    console.error('Error loading model:', error);
    loadingOverlay.innerHTML = '<p style="color:#ff4444;">Error loading model</p>';
  }
);

function createPartButtons() {
  partsListEl.innerHTML = '';
  meshParts.forEach((mesh, index) => {
    const btn = document.createElement('button');
    btn.className = 'part-btn';
    btn.dataset.index = index;

    const eyeSpan = document.createElement('span');
    eyeSpan.className = 'eye-icon';
    eyeSpan.textContent = '👁';

    const nameSpan = document.createElement('span');
    nameSpan.className = 'part-name';
    nameSpan.textContent = mesh.name || `Part_${index}`;
    nameSpan.title = mesh.name || `Part_${index}`;

    btn.appendChild(eyeSpan);
    btn.appendChild(nameSpan);

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      togglePartVisibility(index, btn);
    });

    partsListEl.appendChild(btn);
  });
}

function togglePartVisibility(index, btn) {
  const mesh = meshParts[index];
  mesh.visible = !mesh.visible;

  if (mesh.visible) {
    btn.classList.remove('hidden-part');
    btn.querySelector('.eye-icon').textContent = '👁';
  } else {
    btn.classList.add('hidden-part');
    btn.querySelector('.eye-icon').textContent = '🚫';

    // If this was selected, deselect
    if (selectedMesh === mesh) {
      deselectCurrent();
    }
  }

  updateHUD();
}

function deselectCurrent() {
  if (selectedMesh) {
    // Restore material
    const origMat = originalMaterials.get(selectedMesh.uuid);
    if (origMat && selectedMesh.material) {
      selectedMesh.material.emissive = origMat.emissive ? origMat.emissive.clone() : new THREE.Color(0x000000);
      selectedMesh.material.emissiveIntensity = origMat.emissiveIntensity || 0;
    }
    selectedMesh = null;
  }
}

function selectMesh(mesh) {
  deselectCurrent();

  selectedMesh = mesh;

  if (mesh.material) {
    if (!mesh.material.emissive) {
      mesh.material.emissive = new THREE.Color(0x000000);
    }
    mesh.material.emissive.set(0x4488ff);
    mesh.material.emissiveIntensity = 0.6;
  }

  updateHUD();
}

// Mouse click for raycasting
renderer.domElement.addEventListener('click', (event) => {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const visibleMeshes = meshParts.filter(m => m.visible);
  const intersects = raycaster.intersectObjects(visibleMeshes, false);

  if (intersects.length > 0) {
    selectMesh(intersects[0].object);
  } else {
    deselectCurrent();
    updateHUD();
  }
});

// Opacity slider
opacitySliderEl.addEventListener('input', (e) => {
  currentOpacity = parseFloat(e.target.value);

  meshParts.forEach((mesh) => {
    if (mesh.material) {
      mesh.material.opacity = currentOpacity;
      mesh.material.transparent = true;
    }
  });

  updateHUD();
});

// Show All / Hide All
showAllBtn.addEventListener('click', () => {
  meshParts.forEach((mesh, index) => {
    mesh.visible = true;
    const btn = partsListEl.children[index];
    if (btn) {
      btn.classList.remove('hidden-part');
      btn.querySelector('.eye-icon').textContent = '👁';
    }
  });
  updateHUD();
});

hideAllBtn.addEventListener('click', () => {
  meshParts.forEach((mesh, index) => {
    mesh.visible = false;
    const btn = partsListEl.children[index];
    if (btn) {
      btn.classList.add('hidden-part');
      btn.querySelector('.eye-icon').textContent = '🚫';
    }
  });
  deselectCurrent();
  updateHUD();
});

function updateHUD() {
  const visibleCount = meshParts.filter(m => m.visible).length;
  const selectedName = selectedMesh ? (selectedMesh.name || 'Unnamed') : '无';

  visibleCountEl.textContent = visibleCount;
  selectedPartEl.textContent = selectedName;
  opacityValueEl.textContent = currentOpacity.toFixed(2);
  opacityDisplayEl.textContent = Math.round(currentOpacity * 100) + '%';
  detailNameEl.textContent = selectedName;

  // Update state
  window.__3D_STATE__.visibleParts = visibleCount;
  window.__3D_STATE__.selectedPart = selectedMesh ? (selectedMesh.name || 'Unnamed') : "";
  window.__3D_STATE__.opacity = currentOpacity;
}

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const dist = camera.position.distanceTo(controls.target);
  window.__3D_STATE__.cameraDistance = parseFloat(dist.toFixed(3));

  // Update visible parts count each frame
  const visibleCount = meshParts.filter(m => m.visible).length;
  window.__3D_STATE__.visibleParts = visibleCount;
  window.__3D_STATE__.totalParts = meshParts.length;
  window.__3D_STATE__.opacity = currentOpacity;
  window.__3D_STATE__.selectedPart = selectedMesh ? (selectedMesh.name || 'Unnamed') : "";

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
