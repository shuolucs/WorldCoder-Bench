<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Backpack Feature Explorer</title>
  <style>
    :root {
      --bg-top: #1a1a2e;
      --bg-bottom: #16213e;
      --panel-bg: rgba(10, 10, 20, 0.88);
      --panel-border: rgba(255, 255, 255, 0.14);
      --text: #ffffff;
      --muted: #cfd8ea;
      --button-bg: rgba(255, 255, 255, 0.12);
      --button-hover: rgba(255, 255, 255, 0.22);
      --accent: #6ec1ff;
    }

    body.light-theme {
      --bg-top: #f0f0f0;
      --bg-bottom: #dfe7f2;
      --panel-bg: rgba(255, 255, 255, 0.9);
      --panel-border: rgba(0, 0, 0, 0.12);
      --text: #1f2937;
      --muted: #4b5563;
      --button-bg: rgba(0, 0, 0, 0.08);
      --button-hover: rgba(0, 0, 0, 0.16);
      --accent: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, var(--bg-top), var(--bg-bottom));
      color: var(--text);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, var(--bg-top), var(--bg-bottom));
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .ui-btn {
      border: 1px solid var(--panel-border);
      background: var(--button-bg);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: 0.2s ease;
      font-weight: 600;
    }

    .ui-btn:hover {
      background: var(--button-hover);
      transform: translateY(-1px);
    }

    #topRightControls {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 10px;
      z-index: 20;
    }

    .panel {
      position: absolute;
      background: var(--panel-bg);
      color: var(--text);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      z-index: 15;
      min-width: 280px;
      max-width: 360px;
    }

    #featurePanel {
      left: 16px;
      bottom: 16px;
      display: none;
    }

    #quizPanel {
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: none;
      width: min(90vw, 460px);
      text-align: center;
    }

    .panel h2, .panel h3 {
      margin: 0 0 10px 0;
    }

    .panel p {
      margin: 8px 0;
      color: var(--muted);
      line-height: 1.45;
    }

    #quizChoices {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .choice-btn {
      width: 100%;
      text-align: left;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--panel-border);
      background: var(--button-bg);
      color: var(--text);
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 14px;
    }

    .choice-btn:hover {
      background: var(--button-hover);
    }

    .choice-btn.correct {
      background: rgba(34, 197, 94, 0.22);
      border-color: rgba(34, 197, 94, 0.5);
    }

    .choice-btn.wrong {
      background: rgba(239, 68, 68, 0.22);
      border-color: rgba(239, 68, 68, 0.5);
    }

    #statusBar {
      position: absolute;
      left: 16px;
      top: 16px;
      z-index: 12;
      padding: 10px 14px;
      border-radius: 10px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      color: var(--muted);
      font-size: 13px;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="statusBar">Loading model...</div>

    <div id="topRightControls">
      <button id="themeToggleBtn" class="ui-btn">Dark/Light</button>
      <button id="startQuizBtn" class="ui-btn">Start Quiz</button>
    </div>

    <div id="featurePanel" class="panel">
      <h2 id="featureTitle">Feature</h2>
      <p id="featureDescription"></p>
      <button id="closeFeatureBtn" class="ui-btn">Close</button>
    </div>

    <div id="quizPanel" class="panel">
      <h3>Feature Quiz</h3>
      <p id="quizMeta"></p>
      <p id="quizQuestion"></p>
      <div id="quizChoices"></div>
      <p id="quizFeedback"></p>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const app = document.getElementById("app");
    const statusBar = document.getElementById("statusBar");
    const featurePanel = document.getElementById("featurePanel");
    const featureTitle = document.getElementById("featureTitle");
    const featureDescription = document.getElementById("featureDescription");
    const closeFeatureBtn = document.getElementById("closeFeatureBtn");
    const startQuizBtn = document.getElementById("startQuizBtn");
    const themeToggleBtn = document.getElementById("themeToggleBtn");
    const quizPanel = document.getElementById("quizPanel");
    const quizMeta = document.getElementById("quizMeta");
    const quizQuestion = document.getElementById("quizQuestion");
    const quizChoices = document.getElementById("quizChoices");
    const quizFeedback = document.getElementById("quizFeedback");

    const scene = new THREE.Scene();

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    const defaultCameraPos = new THREE.Vector3(0, 1.5, 4);
    camera.position.copy(defaultCameraPos);
    camera.lookAt(0, 1, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(3, 5, 3);
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(2, 64),
      new THREE.MeshStandardMaterial({
        color: 0x88aaff,
        transparent: true,
        opacity: 0.12,
        roughness: 1,
        metalness: 0
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.02;
    scene.add(ground);

    const modelRoot = new THREE.Group();
    scene.add(modelRoot);

    let productModel = null;
    let autoRotateEnabled = true;
    let animationCamera = null;
    let pulseTime = 0;
    let currentTheme = "dark";

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const hotspotDefinitions = [
      {
        name: "Ergonomic Straps",
        position: new THREE.Vector3(-0.5, 1.2, 0.3),
        color: "#ff6b6b",
        description: "Contoured shoulder straps distribute weight evenly for all-day carrying comfort."
      },
      {
        name: "Solar Panel",
        position: new THREE.Vector3(0, 1.8, -0.2),
        color: "#ffd93d",
        description: "A compact solar charging panel helps power your smart backpack companion on the go."
      },
      {
        name: "Hidden Pocket",
        position: new THREE.Vector3(0.5, 0.8, 0.4),
        color: "#6bcb77",
        description: "A concealed storage compartment keeps valuables secure and easy to access."
      },
      {
        name: "Water Bottle Holder",
        position: new THREE.Vector3(-0.6, 0.5, 0.3),
        color: "#4d96ff",
        description: "Flexible side storage keeps hydration within arm’s reach during commutes or hikes."
      },
      {
        name: "LED Safety Light",
        position: new THREE.Vector3(0, 0.3, 0.5),
        color: "#ff6fff",
        description: "A built-in LED visibility module improves safety in low-light environments."
      }
    ];

    const hotspots = [];
    let highlightedHotspot = null;

    hotspotDefinitions.forEach((def) => {
      const mat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(def.color),
        emissive: new THREE.Color(def.color),
        emissiveIntensity: 1.2,
        metalness: 0.2,
        roughness: 0.3
      });

      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 24, 24),
        mat
      );
      mesh.position.copy(def.position);
      mesh.userData = { ...def, isHotspot: true, baseScale: 1 };
      scene.add(mesh);
      hotspots.push(mesh);
    });

    const loader = new GLTFLoader();
    loader.load(
      "robot.glb",
      (gltf) => {
        productModel = gltf.scene;
        modelRoot.add(productModel);

        const box = new THREE.Box3().setFromObject(productModel);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const targetSize = 2;
        const scale = targetSize / maxDim;
        productModel.scale.setScalar(scale);

        box.setFromObject(productModel);
        box.getCenter(center);
        productModel.position.sub(center);

        box.setFromObject(productModel);
        box.getSize(size);
        productModel.position.y -= box.min.y + 1.0;

        window.__3D_STATE__.modelLoaded = true;
        statusBar.textContent = "Model loaded. Explore the backpack features.";
      },
      undefined,
      (err) => {
        console.error("Failed to load robot.glb", err);
        statusBar.textContent = "Failed to load model. Hotspots and quiz are still available.";
      }
    );

    function showFeaturePanel(name, description) {
      featureTitle.textContent = name;
      featureDescription.textContent = description;
      featurePanel.style.display = "block";
      window.__3D_STATE__.featurePanelVisible = true;
    }

    function hideFeaturePanel() {
      featurePanel.style.display = "none";
      window.__3D_STATE__.featurePanelVisible = false;
      window.__3D_STATE__.activeHotspot = null;
    }

    function animateCameraTo(targetHotspotPos) {
      controls.enabled = false;

      const dir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
      const destination = targetHotspotPos.clone().add(dir.multiplyScalar(1.5)).add(new THREE.Vector3(0, 0.2, 0));

      animationCamera = {
        frame: 0,
        totalFrames: 60,
        fromPos: camera.position.clone(),
        toPos: destination,
        fromTarget: controls.target.clone(),
        toTarget: targetHotspotPos.clone()
      };
    }

    function resetCamera() {
      controls.enabled = false;
      animationCamera = {
        frame: 0,
        totalFrames: 60,
        fromPos: camera.position.clone(),
        toPos: defaultCameraPos.clone(),
        fromTarget: controls.target.clone(),
        toTarget: new THREE.Vector3(0, 1, 0),
        onComplete: () => {
          controls.enabled = true;
        }
      };
    }

    function selectHotspot(mesh) {
      autoRotateEnabled = false;
      window.__3D_STATE__.activeHotspot = mesh.userData.name;
      showFeaturePanel(mesh.userData.name, mesh.userData.description);
      animateCameraTo(mesh.position);
    }

    function clearHighlightedHotspot() {
      highlightedHotspot = null;
    }

    function setHighlightedHotspotByName(name) {
      highlightedHotspot = hotspots.find(h => h.userData.name === name) || null;
    }

    function getHotspotByName(name) {
      return hotspots.find(h => h.userData.name === name);
    }

    function onPointerDown(event) {
      if (window.__3D_STATE__.quizActive) return;
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(hotspots, false);
      if (intersects.length > 0) {
        selectHotspot(intersects[0].object);
      }
    }

    renderer.domElement.addEventListener("pointerdown", onPointerDown);

    closeFeatureBtn.addEventListener("click", () => {
      hideFeaturePanel();
      autoRotateEnabled = true;
      resetCamera();
    });

    function applyTheme(theme) {
      currentTheme = theme;
      document.body.classList.toggle("light-theme", theme === "light");

      if (theme === "dark") {
        ambientLight.intensity = 0.4;
        directionalLight.intensity = 0.8;
        renderer.setClearColor(0x000000, 0);
      } else {
        ambientLight.intensity = 0.7;
        directionalLight.intensity = 1.2;
        renderer.setClearColor(0xffffff, 0);
      }

      window.__3D_STATE__.currentTheme = currentTheme;
    }

    themeToggleBtn.addEventListener("click", () => {
      applyTheme(currentTheme === "dark" ? "light" : "dark");
    });

    const quizState = {
      questionsTotal: 5,
      currentQuestion: null,
      usedQuestions: new Set()
    };

    const colorNameMap = {
      "Ergonomic Straps": "RED",
      "Solar Panel": "YELLOW",
      "Hidden Pocket": "GREEN",
      "Water Bottle Holder": "BLUE",
      "LED Safety Light": "PINK"
    };

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pickChoices(correctName, count) {
      const others = shuffle(hotspotDefinitions.map(h => h.name).filter(n => n !== correctName)).slice(0, count - 1);
      return shuffle([correctName, ...others]);
    }

    function generateQuestion(difficulty) {
      const defs = hotspotDefinitions;

      if (difficulty === 1) {
        const target = defs[Math.floor(Math.random() * defs.length)];
        return {
          difficulty: 1,
          answer: target.name,
          prompt: `Which feature is ${colorNameMap[target.name]}?`,
          choices: pickChoices(target.name, 3),
          highlight: target.name
        };
      }

      if (difficulty === 2) {
        const prompts = [
          {
            target: "Solar Panel",
            text: "Which feature is near the top?"
          },
          {
            target: "LED Safety Light",
            text: "Which feature is closest to the bottom front?"
          },
          {
            target: "Water Bottle Holder",
            text: "Which feature is on the lower left side?"
          },
          {
            target: "Hidden Pocket",
            text: "Which feature is on the right-middle area?"
          },
          {
            target: "Ergonomic Straps",
            text: "Which feature sits high on the left side?"
          }
        ];
        const selected = prompts[Math.floor(Math.random() * prompts.length)];
        return {
          difficulty: 2,
          answer: selected.target,
          prompt: selected.text,
          choices: pickChoices(selected.target, 4),
          highlight: selected.target
        };
      }

      const prompts = [
        {
          target: "Solar Panel",
          text: "Which feature is the YELLOW one near the top rear area?"
        },
        {
          target: "Ergonomic Straps",
          text: "Which feature is the RED one on the upper-left side?"
        },
        {
          target: "Hidden Pocket",
          text: "Which feature is the GREEN one on the right-middle front?"
        },
        {
          target: "Water Bottle Holder",
          text: "Which feature is the BLUE one on the lower-left side?"
        },
        {
          target: "LED Safety Light",
          text: "Which feature is the PINK one near the lower front center?"
        }
      ];
      const selected = prompts[Math.floor(Math.random() * prompts.length)];
      return {
        difficulty: 3,
        answer: selected.target,
        prompt: selected.text,
        choices: pickChoices(selected.target, 4),
        highlight: selected.target
      };
    }

    function startQuiz() {
      hideFeaturePanel();
      autoRotateEnabled = false;
      quizPanel.style.display = "block";
      quizFeedback.textContent = "";
      controls.enabled = true;

      window.__3D_STATE__.quizActive = true;
      window.__3D_STATE__.quizDifficulty = 1;
      window.__3D_STATE__.quizScore = 0;
      window.__3D_STATE__.quizStreak = 0;
      window.__3D_STATE__.quizQuestionsAnswered = 0;
      window.__3D_STATE__.quizComplete = false;

      quizState.currentQuestion = null;
      quizState.usedQuestions.clear();

      nextQuestion();
    }

    function nextQuestion() {
      if (window.__3D_STATE__.quizQuestionsAnswered >= quizState.questionsTotal) {
        endQuiz();
        return;
      }

      const difficulty = window.__3D_STATE__.quizDifficulty;
      const q = generateQuestion(difficulty);
      quizState.currentQuestion = q;

      setHighlightedHotspotByName(q.highlight);

      quizMeta.textContent =
        `Question ${window.__3D_STATE__.quizQuestionsAnswered + 1}/${quizState.questionsTotal} • Difficulty ${difficulty} • Score ${window.__3D_STATE__.quizScore} • Streak ${window.__3D_STATE__.quizStreak}`;
      quizQuestion.textContent = q.prompt;
      quizFeedback.textContent = "";
      quizChoices.innerHTML = "";

      q.choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = choice;
        btn.addEventListener("click", () => submitAnswer(choice, btn));
        quizChoices.appendChild(btn);
      });
    }

    function submitAnswer(choice, clickedBtn) {
      const q = quizState.currentQuestion;
      if (!q) return;

      const buttons = [...quizChoices.querySelectorAll("button")];
      buttons.forEach(b => b.disabled = true);

      const correct = choice === q.answer;
      buttons.forEach(btn => {
        if (btn.textContent === q.answer) btn.classList.add("correct");
        if (btn === clickedBtn && !correct) btn.classList.add("wrong");
      });

      if (correct) {
        window.__3D_STATE__.quizScore += 1;
        window.__3D_STATE__.quizStreak += 1;
        quizFeedback.textContent = "Correct!";
        if (window.__3D_STATE__.quizStreak >= 2) {
          window.__3D_STATE__.quizDifficulty = Math.min(3, window.__3D_STATE__.quizDifficulty + 1);
        }
      } else {
        window.__3D_STATE__.quizStreak = 0;
        window.__3D_STATE__.quizDifficulty = Math.max(1, window.__3D_STATE__.quizDifficulty - 1);
        quizFeedback.textContent = `Wrong. Correct answer: ${q.answer}`;
      }

      window.__3D_STATE__.quizQuestionsAnswered += 1;

      setTimeout(() => {
        nextQuestion();
      }, 1200);
    }

    function endQuiz() {
      clearHighlightedHotspot();
      window.__3D_STATE__.quizActive = false;
      window.__3D_STATE__.quizComplete = true;
      quizQuestion.textContent = `Quiz complete! Final score: ${window.__3D_STATE__.quizScore}/${quizState.questionsTotal}`;
      quizMeta.textContent = `Difficulty ended at ${window.__3D_STATE__.quizDifficulty}`;
      quizChoices.innerHTML = "";
      quizFeedback.innerHTML = "";

      const restartBtn = document.createElement("button");
      restartBtn.className = "ui-btn";
      restartBtn.textContent = "Play Again";
      restartBtn.style.marginTop = "12px";
      restartBtn.addEventListener("click", startQuiz);
      quizChoices.appendChild(restartBtn);

      autoRotateEnabled = true;
    }

    startQuizBtn.addEventListener("click", startQuiz);

    window.__3D_STATE__ = {
      modelLoaded: false,
      autoRotateEnabled: true,
      activeHotspot: null,
      hotspotCount: 5,
      featurePanelVisible: false,
      quizActive: false,
      quizDifficulty: 1,
      quizScore: 0,
      quizStreak: 0,
      quizQuestionsAnswered: 0,
      quizComplete: false,
      currentTheme: "dark",
      cameraPosition: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
      modelRotationY: 0
    };

    applyTheme("dark");

    function updateCameraAnimation() {
      if (!animationCamera) return;

      animationCamera.frame++;
      const t = Math.min(animationCamera.frame / animationCamera.totalFrames, 1);
      const eased = t * t * (3 - 2 * t);

      camera.position.lerpVectors(animationCamera.fromPos, animationCamera.toPos, eased);
      controls.target.lerpVectors(animationCamera.fromTarget, animationCamera.toTarget, eased);
      controls.update();

      if (t >= 1) {
        const complete = animationCamera.onComplete;
        animationCamera = null;
        controls.enabled = true;
        if (complete) complete();
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      pulseTime += 0.05;

      if (productModel && autoRotateEnabled) {
        modelRoot.rotation.y += 0.005;
      }

      hotspots.forEach((hotspot, i) => {
        const pulse = 1 + 0.2 * Math.sin(pulseTime * 2 + i);
        const highlightScale = highlightedHotspot === hotspot ? 2 : 1;
        hotspot.scale.setScalar(pulse * highlightScale);
      });

      updateCameraAnimation();
      controls.update();

      renderer.render(scene, camera);

      window.__3D_STATE__.autoRotateEnabled = autoRotateEnabled;
      window.__3D_STATE__.cameraPosition = {
        x: camera.position.x,
        y: camera.position.y,
        z: camera.position.z
      };
      window.__3D_STATE__.modelRotationY = modelRoot.rotation.y;
      window.__3D_STATE__.currentTheme = currentTheme;
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
