<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Backpack Feature Explorer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            transition: background 0.5s ease;
        }

        .theme-dark {
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
        }

        .theme-light {
            background: linear-gradient(to bottom, #f0f0f0, #c0c0c0);
        }

        /* UI Elements */
        #top-ui {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            font-weight: bold;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .theme-light button {
            color: #333;
            border-color: rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.5);
        }

        .theme-light button:hover {
            background: rgba(255, 255, 255, 0.8);
        }

        /* Panels */
        .panel {
            position: absolute;
            background: rgba(20, 20, 30, 0.9);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            display: none;
            z-index: 20;
            transition: opacity 0.3s;
        }

        .theme-light .panel {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            border-color: rgba(0, 0, 0, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        #featurePanel {
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            text-align: center;
        }

        #featurePanel h2 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
        }

        #featurePanel p {
            margin: 0 0 15px 0;
            font-size: 0.9rem;
            color: #ccc;
        }

        .theme-light #featurePanel p { color: #666; }

        #quizPanel {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            text-align: center;
        }

        #quizPanel h3 { margin-top: 0; }
        
        .quiz-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 15px;
            color: #aaa;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .quiz-option {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .theme-light .quiz-option {
            background: rgba(0,0,0,0.05);
            border-color: rgba(0,0,0,0.2);
        }

        .quiz-option:hover { background: rgba(255,255,255,0.15); }
        .theme-light .quiz-option:hover { background: rgba(0,0,0,0.1); }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2rem;
            pointer-events: none;
        }
        .theme-light #loading { color: #333; }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="canvas-container" class="theme-dark">
        <div id="loading">Loading Model...</div>
    </div>

    <div id="top-ui">
        <button id="themeToggleBtn">Dark/Light</button>
        <button id="startQuizBtn">Start Quiz</button>
    </div>

    <div id="featurePanel" class="panel">
        <h2 id="fp-title">Feature Name</h2>
        <p id="fp-desc">Feature description goes here.</p>
        <button id="closeFeatureBtn">Close</button>
    </div>

    <div id="quizPanel" class="panel">
        <div class="quiz-stats">
            <span id="qz-progress">Question: 1/5</span>
            <span id="qz-diff">Difficulty: 1</span>
            <span id="qz-score">Score: 0</span>
        </div>
        <h3 id="qz-question">Question text?</h3>
        <div id="qz-options" class="quiz-options">
            <!-- Options injected here -->
        </div>
        <div id="qz-result" style="display:none; margin-top:15px;">
            <h2 id="qz-final-score"></h2>
            <button id="qz-close-btn">Close Quiz</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            autoRotateEnabled: true,
            activeHotspot: null,
            hotspotCount: 5,
            featurePanelVisible: false,
            quizActive: false,
            quizDifficulty: 1,
            quizScore: 0,
            quizStreak: 0,
            quizQuestionsAnswered: 0,
            quizComplete: false,
            currentTheme: 'dark',
            cameraPosition: { x: 0, y: 0, z: 0 },
            modelRotationY: 0
        };

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        const defaultCameraPos = new THREE.Vector3(0, 1.5, 4);
        camera.position.copy(defaultCameraPos);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(3, 5, 3);
        scene.add(dirLight);

        // Ground Plane
        const groundGeo = new THREE.CircleGeometry(2, 32);
        const groundMat = new THREE.MeshBasicMaterial({ 
            color: 0x000000, 
            transparent: true, 
            opacity: 0.2,
            side: THREE.DoubleSide
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -1; // Adjust based on model bounding box later
        scene.add(ground);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        const defaultTarget = new THREE.Vector3(0, 0, 0);
        controls.target.copy(defaultTarget);

        // --- MODEL LOADING ---
        const modelGroup = new THREE.Group();
        scene.add(modelGroup);
        
        const loader = new GLTFLoader();
        loader.load(
            'robot.glb',
            (gltf) => {
                const model = gltf.scene;
                
                // Center and scale
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 2 / maxDim;
                model.scale.setScalar(scale);
                
                model.position.sub(center.multiplyScalar(scale));
                
                modelGroup.add(model);
                window.__3D_STATE__.modelLoaded = true;
                document.getElementById('loading').style.display = 'none';
                
                // Adjust ground
                const newBox = new THREE.Box3().setFromObject(modelGroup);
                ground.position.y = newBox.min.y - 0.05;
            },
            undefined,
            (error) => {
                console.error('Error loading model, using fallback.', error);
                // Fallback box if model fails
                const boxGeo = new THREE.BoxGeometry(1, 1.5, 0.8);
                const boxMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
                const boxMesh = new THREE.Mesh(boxGeo, boxMat);
                modelGroup.add(boxMesh);
                window.__3D_STATE__.modelLoaded = true;
                document.getElementById('loading').style.display = 'none';
                ground.position.y = -0.75;
            }
        );

        // --- HOTSPOTS ---
        const hotspotsData = [
            { id: 'hs1', name: 'Ergonomic Straps', pos: [-0.5, 1.2, 0.3], color: 0xff6b6b, colorName: 'Red', locName: 'top-left', desc: 'Padded straps designed to distribute weight evenly for maximum comfort during long journeys.' },
            { id: 'hs2', name: 'Solar Panel', pos: [0, 1.8, -0.2], color: 0xffd93d, colorName: 'Yellow', locName: 'top', desc: 'Integrated high-efficiency solar panel to keep your devices charged on the go.' },
            { id: 'hs3', name: 'Hidden Pocket', pos: [0.5, 0.8, 0.4], color: 0x6bcb77, colorName: 'Green', locName: 'right', desc: 'Anti-theft concealed pocket perfect for passports, wallets, and sensitive items.' },
            { id: 'hs4', name: 'Water Bottle Holder', pos: [-0.6, 0.5, 0.3], color: 0x4d96ff, colorName: 'Blue', locName: 'bottom-left', desc: 'Expandable mesh pocket for easy access to hydration.' },
            { id: 'hs5', name: 'LED Safety Light', pos: [0, 0.3, 0.5], color: 0xff6fff, colorName: 'Pink', locName: 'bottom', desc: 'Built-in customizable LED strip to ensure you stay visible and safe at night.' }
        ];

        const hotspots = [];
        const hotspotGeo = new THREE.SphereGeometry(0.08, 32, 32);

        hotspotsData.forEach(data => {
            const mat = new THREE.MeshStandardMaterial({
                color: data.color,
                emissive: data.color,
                emissiveIntensity: 0.5,
                roughness: 0.2
            });
            const mesh = new THREE.Mesh(hotspotGeo, mat);
            mesh.position.set(...data.pos);
            mesh.userData = data;
            modelGroup.add(mesh);
            hotspots.push(mesh);
        });

        // --- INTERACTION & RAYCASTING ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (window.__3D_STATE__.quizActive || isAnimatingCamera) return; // Disable clicking hotspots during quiz or animation

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(hotspots);

            if (intersects.length > 0) {
                handleHotspotClick(intersects[0].object);
            }
        });

        // --- CAMERA ANIMATION ---
        let isAnimatingCamera = false;
        let animFrame = 0;
        const animDuration = 60;
        const startCamPos = new THREE.Vector3();
        const targetCamPos = new THREE.Vector3();
        const startLookAt = new THREE.Vector3();
        const targetLookAt = new THREE.Vector3();

        function animateCamera(targetPos, lookAtPos) {
            startCamPos.copy(camera.position);
            startLookAt.copy(controls.target);
            targetCamPos.copy(targetPos);
            targetLookAt.copy(lookAtPos);
            
            animFrame = 0;
            isAnimatingCamera = true;
            controls.enabled = false;
        }

        function handleHotspotClick(hotspotMesh) {
            const data = hotspotMesh.userData;
            window.__3D_STATE__.activeHotspot = data.name;
            window.__3D_STATE__.autoRotateEnabled = false;
            window.__3D_STATE__.featurePanelVisible = true;

            // Calculate target camera position (1.5 units away along normal from center)
            const worldPos = new THREE.Vector3();
            hotspotMesh.getWorldPosition(worldPos);
            
            const dir = worldPos.clone().normalize();
            if(dir.lengthSq() === 0) dir.set(0,0,1); // fallback if at origin
            
            const camTarget = worldPos.clone().add(dir.multiplyScalar(1.5));
            // Keep camera slightly elevated
            camTarget.y += 0.2;

            animateCamera(camTarget, worldPos);

            // Update DOM
            document.getElementById('fp-title').innerText = data.name;
            document.getElementById('fp-desc').innerText = data.desc;
            document.getElementById('featurePanel').style.display = 'block';
        }

        document.getElementById('closeFeatureBtn').addEventListener('click', () => {
            window.__3D_STATE__.activeHotspot = null;
            window.__3D_STATE__.autoRotateEnabled = true;
            window.__3D_STATE__.featurePanelVisible = false;
            document.getElementById('featurePanel').style.display = 'none';
            
            animateCamera(defaultCameraPos, defaultTarget);
        });

        // --- THEME TOGGLE ---
        document.getElementById('themeToggleBtn').addEventListener('click', () => {
            const state = window.__3D_STATE__;
            state.currentTheme = state.currentTheme === 'dark' ? 'light' : 'dark';
            
            container.className = `theme-${state.currentTheme}`;
            
            if (state.currentTheme === 'light') {
                ambientLight.intensity = 0.7;
                dirLight.intensity = 1.0;
                groundMat.color.setHex(0xffffff);
            } else {
                ambientLight.intensity = 0.4;
                dirLight.intensity = 0.8;
                groundMat.color.setHex(0x000000);
            }
        });

        // --- QUIZ LOGIC ---
        let currentQuizAnswer = null;

        document.getElementById('startQuizBtn').addEventListener('click', startQuiz);
        document.getElementById('qz-close-btn').addEventListener('click', closeQuiz);

        function startQuiz() {
            if(window.__3D_STATE__.featurePanelVisible) {
                document.getElementById('closeFeatureBtn').click();
            }
            
            const state = window.__3D_STATE__;
            state.quizActive = true;
            state.quizDifficulty = 1;
            state.quizScore = 0;
            state.quizStreak = 0;
            state.quizQuestionsAnswered = 0;
            state.quizComplete = false;
            state.autoRotateEnabled = true; // Keep rotating during quiz

            document.getElementById('startQuizBtn').style.display = 'none';
            document.getElementById('quizPanel').style.display = 'block';
            document.getElementById('qz-result').style.display = 'none';
            document.getElementById('qz-options').style.display = 'flex';
            document.getElementById('qz-question').style.display = 'block';

            nextQuestion();
        }

        function nextQuestion() {
            const state = window.__3D_STATE__;
            if (state.quizQuestionsAnswered >= 5) {
                endQuiz();
                return;
            }

            state.quizQuestionsAnswered++;
            updateQuizUIStats();

            // Select random target hotspot
            const targetIndex = Math.floor(Math.random() * hotspotsData.length);
            const targetData = hotspotsData[targetIndex];
            currentQuizAnswer = targetData.name;

            let questionText = "";
            let options = [];

            // Generate question based on difficulty
            if (state.quizDifficulty === 1) {
                questionText = `Which feature is ${targetData.colorName.toUpperCase()}?`;
                options = generateOptions(targetData.name, 3);
            } else if (state.quizDifficulty === 2) {
                questionText = `Which feature is located near the ${targetData.locName.toUpperCase()}?`;
                options = generateOptions(targetData.name, 4);
            } else {
                questionText = `Identify the ${targetData.colorName.toUpperCase()} feature located near the ${targetData.locName.toUpperCase()}.`;
                options = generateOptions(targetData.name, 5); // All options
            }

            document.getElementById('qz-question').innerText = questionText;
            
            const optionsContainer = document.getElementById('qz-options');
            optionsContainer.innerHTML = '';
            
            options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'quiz-option';
                btn.innerText = opt;
                btn.onclick = () => handleQuizAnswer(opt);
                optionsContainer.appendChild(btn);
            });
        }

        function generateOptions(correctAnswer, count) {
            const opts = new Set([correctAnswer]);
            while(opts.size < count) {
                const randomFeature = hotspotsData[Math.floor(Math.random() * hotspotsData.length)].name;
                opts.add(randomFeature);
            }
            return Array.from(opts).sort(() => Math.random() - 0.5);
        }

        function handleQuizAnswer(selected) {
            const state = window.__3D_STATE__;
            if (selected === currentQuizAnswer) {
                state.quizScore++;
                state.quizStreak++;
                if (state.quizStreak >= 2 && state.quizDifficulty < 3) {
                    state.quizDifficulty++;
                    state.quizStreak = 0; // Reset streak after leveling up
                }
            } else {
                state.quizStreak = 0;
                if (state.quizDifficulty > 1) {
                    state.quizDifficulty--;
                }
            }
            nextQuestion();
        }

        function updateQuizUIStats() {
            const state = window.__3D_STATE__;
            document.getElementById('qz-progress').innerText = `Question: ${state.quizQuestionsAnswered}/5`;
            document.getElementById('qz-diff').innerText = `Difficulty: ${state.quizDifficulty}`;
            document.getElementById('qz-score').innerText = `Score: ${state.quizScore}`;
        }

        function endQuiz() {
            const state = window.__3D_STATE__;
            state.quizComplete = true;
            currentQuizAnswer = null;
            
            document.getElementById('qz-question').style.display = 'none';
            document.getElementById('qz-options').style.display = 'none';
            document.getElementById('qz-result').style.display = 'block';
            document.getElementById('qz-final-score').innerText = `Final Score: ${state.quizScore} / 5`;
        }

        function closeQuiz() {
            window.__3D_STATE__.quizActive = false;
            document.getElementById('quizPanel').style.display = 'none';
            document.getElementById('startQuizBtn').style.display = 'block';
        }

        // --- RESIZE HANDLER ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            const state = window.__3D_STATE__;

            // Auto Rotation
            if (state.autoRotateEnabled && !isAnimatingCamera) {
                modelGroup.rotation.y += 0.005;
            }

            // Hotspot Pulsing & Quiz Highlighting
            hotspots.forEach(hs => {
                if (state.quizActive && hs.userData.name === currentQuizAnswer) {
                    // Highlight target during quiz
                    hs.scale.setScalar(2.0);
                    hs.material.emissiveIntensity = 1.0;
                } else {
                    // Normal pulse
                    const scale = 1.0 + 0.2 * Math.sin(time * 3 + hs.position.x * 10);
                    hs.scale.setScalar(scale);
                    hs.material.emissiveIntensity = 0.5 + 0.2 * Math.sin(time * 3);
                }
            });

            // Camera Animation Lerp
            if (isAnimatingCamera) {
                animFrame++;
                const t = animFrame / animDuration;
                // easeInOutCubic
                const easeT = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                
                camera.position.lerpVectors(startCamPos, targetCamPos, easeT);
                controls.target.lerpVectors(startLookAt, targetLookAt, easeT);
                
                if (animFrame >= animDuration) {
                    isAnimatingCamera = false;
                    controls.enabled = true;
                }
            }

            controls.update();

            // Update State Object
            state.cameraPosition.x = camera.position.x;
            state.cameraPosition.y = camera.position.y;
            state.cameraPosition.z = camera.position.z;
            state.modelRotationY = modelGroup.rotation.y;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
