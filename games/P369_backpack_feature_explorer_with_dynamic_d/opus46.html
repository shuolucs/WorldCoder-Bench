<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Backpack Feature Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#themeToggleBtn {
  position: fixed;
  top: 20px;
  left: 20px;
  padding: 10px 20px;
  background: rgba(255,255,255,0.15);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 25px;
  cursor: pointer;
  font-size: 14px;
  backdrop-filter: blur(10px);
  transition: all 0.3s;
  z-index: 100;
}
#themeToggleBtn:hover { background: rgba(255,255,255,0.25); }
#themeToggleBtn.light { color: #333; border-color: rgba(0,0,0,0.3); background: rgba(0,0,0,0.1); }

#startQuizBtn {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 12px 24px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.3s;
  z-index: 100;
  box-shadow: 0 4px 15px rgba(102,126,234,0.4);
}
#startQuizBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.6); }

#featurePanel {
  display: none;
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(20, 20, 40, 0.92);
  color: #fff;
  padding: 30px 40px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  z-index: 100;
  min-width: 350px;
  max-width: 450px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: slideUp 0.4s ease;
}
#featurePanel.light-panel {
  background: rgba(255,255,255,0.92);
  color: #333;
  border-color: rgba(0,0,0,0.1);
}
@keyframes slideUp {
  from { opacity: 0; transform: translateX(-50%) translateY(30px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
#featurePanel h2 { margin-bottom: 10px; font-size: 22px; }
#featurePanel .feature-color-dot {
  width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; vertical-align: middle;
}
#featurePanel p { margin-bottom: 20px; opacity: 0.8; line-height: 1.6; font-size: 15px; }
#featurePanel button {
  padding: 10px 30px;
  background: rgba(255,255,255,0.15);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 20px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s;
}
#featurePanel.light-panel button { color: #333; border-color: rgba(0,0,0,0.2); background: rgba(0,0,0,0.08); }
#featurePanel button:hover { background: rgba(255,255,255,0.25); }

#quizPanel {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(20, 20, 40, 0.95);
  color: #fff;
  padding: 35px 40px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  z-index: 200;
  min-width: 400px;
  max-width: 500px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  animation: fadeIn 0.4s ease;
}
#quizPanel.light-panel {
  background: rgba(255,255,255,0.95);
  color: #333;
  border-color: rgba(0,0,0,0.1);
}
@keyframes fadeIn {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
  to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}
#quizPanel h2 { margin-bottom: 5px; font-size: 20px; }
#quizPanel .quiz-meta {
  display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 13px; opacity: 0.7;
}
#quizPanel .quiz-question { font-size: 18px; margin-bottom: 25px; line-height: 1.5; }
#quizPanel .quiz-choices { display: flex; flex-direction: column; gap: 10px; }
#quizPanel .quiz-choice {
  padding: 12px 20px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  cursor: pointer;
  font-size: 15px;
  transition: all 0.2s;
  color: inherit;
}
#quizPanel.light-panel .quiz-choice {
  background: rgba(0,0,0,0.05);
  border-color: rgba(0,0,0,0.15);
}
#quizPanel .quiz-choice:hover { background: rgba(255,255,255,0.2); transform: translateX(5px); }
#quizPanel.light-panel .quiz-choice:hover { background: rgba(0,0,0,0.1); }
#quizPanel .quiz-choice.correct { background: rgba(107,203,119,0.4); border-color: #6bcb77; }
#quizPanel .quiz-choice.wrong { background: rgba(255,107,107,0.4); border-color: #ff6b6b; }
#quizPanel .quiz-result { font-size: 16px; line-height: 1.8; }
#quizPanel .quiz-result h2 { font-size: 24px; margin-bottom: 15px; }
#quizPanel .close-quiz-btn {
  margin-top: 20px;
  padding: 12px 30px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.3s;
}
#quizPanel .close-quiz-btn:hover { transform: translateY(-2px); }

#loadingOverlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: #1a1a2e;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 1000;
  color: #fff;
  transition: opacity 0.5s;
}
#loadingOverlay .spinner {
  width: 50px; height: 50px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top-color: #667eea;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }

#instructions {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.4);
  font-size: 12px;
  z-index: 50;
  pointer-events: none;
  transition: color 0.3s;
}
#instructions.light { color: rgba(0,0,0,0.35); }
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div>Loading 3D Model...</div>
</div>

<button id="themeToggleBtn">🌙 Dark / Light</button>
<button id="startQuizBtn">🧠 Start Quiz</button>

<div id="featurePanel">
  <h2 id="featureName"></h2>
  <p id="featureDesc"></p>
  <button onclick="closeFeaturePanel()">✕ Close</button>
</div>

<div id="quizPanel">
  <div id="quizContent"></div>
</div>

<div id="instructions">Click on glowing hotspots to explore features • Drag to orbit</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ==================== STATE ====================
window.__3D_STATE__ = {
  modelLoaded: false,
  autoRotateEnabled: true,
  activeHotspot: null,
  hotspotCount: 5,
  featurePanelVisible: false,
  quizActive: false,
  quizDifficulty: 1,
  quizScore: 0,
  quizStreak: 0,
  quizQuestionsAnswered: 0,
  quizComplete: false,
  currentTheme: 'dark',
  cameraPosition: { x: 0, y: 1.5, z: 4 },
  modelRotationY: 0
};

// ==================== SCENE SETUP ====================
const scene = new THREE.Scene();

const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
canvas.width = 2;
canvas.height = 512;
function setBackgroundGradient(topColor, bottomColor) {
  const gradient = ctx.createLinearGradient(0, 0, 0, 512);
  gradient.addColorStop(0, topColor);
  gradient.addColorStop(1, bottomColor);
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 2, 512);
  const texture = new THREE.CanvasTexture(canvas);
  scene.background = texture;
}
setBackgroundGradient('#1a1a2e', '#16213e');

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 4);
camera.lookAt(0, 0, 0);

const defaultCameraPos = new THREE.Vector3(0, 1.5, 4);
const defaultCameraTarget = new THREE.Vector3(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(3, 5, 3);
dirLight.castShadow = true;
scene.add(dirLight);

// Ground plane
const groundGeo = new THREE.CircleGeometry(2, 64);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x444466,
  transparent: true,
  opacity: 0.3,
  roughness: 0.8
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// Orbit Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0.8, 0);
controls.update();

// ==================== HOTSPOT DATA ====================
const features = [
  {
    name: 'Ergonomic Straps',
    position: new THREE.Vector3(-0.5, 1.2, 0.3),
    color: 0xff6b6b,
    colorName: 'red',
    positionDesc: 'upper-left',
    description: 'Padded, adjustable straps with breathable mesh distribute weight evenly across your shoulders, reducing strain during long commutes or hikes.'
  },
  {
    name: 'Solar Panel',
    position: new THREE.Vector3(0, 1.8, -0.2),
    color: 0xffd93d,
    colorName: 'yellow',
    positionDesc: 'top',
    description: 'Integrated flexible solar panel charges your devices on the go. Generates up to 5W of power in direct sunlight with built-in USB-C output.'
  },
  {
    name: 'Hidden Pocket',
    position: new THREE.Vector3(0.5, 0.8, 0.4),
    color: 0x6bcb77,
    colorName: 'green',
    positionDesc: 'middle-right',
    description: 'RFID-blocking hidden pocket keeps your passport, cards, and valuables safe from digital theft. Accessible only from the back panel.'
  },
  {
    name: 'Water Bottle Holder',
    position: new THREE.Vector3(-0.6, 0.5, 0.3),
    color: 0x4d96ff,
    colorName: 'blue',
    positionDesc: 'lower-left',
    description: 'Expandable side holder fits bottles up to 32oz. Features a magnetic quick-release clip and insulated sleeve to keep drinks cold.'
  },
  {
    name: 'LED Safety Light',
    position: new THREE.Vector3(0, 0.3, 0.5),
    color: 0xff6fff,
    colorName: 'pink',
    positionDesc: 'bottom-center',
    description: 'Rechargeable LED strip with 3 modes (steady, flash, pulse) provides 360° visibility at night. Lasts up to 12 hours on a single charge.'
  }
];

// ==================== CREATE HOTSPOTS ====================
const hotspots = [];
const hotspotGroup = new THREE.Group();
scene.add(hotspotGroup);

features.forEach((feature) => {
  const geo = new THREE.SphereGeometry(0.08, 32, 32);
  const mat = new THREE.MeshStandardMaterial({
    color: feature.color,
    emissive: feature.color,
    emissiveIntensity: 0.6,
    transparent: true,
    opacity: 0.9
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(feature.position);
  mesh.userData = { featureName: feature.name, feature: feature };
  hotspotGroup.add(mesh);
  hotspots.push(mesh);

  // Glow ring
  const ringGeo = new THREE.RingGeometry(0.1, 0.14, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: feature.color,
    transparent: true,
    opacity: 0.3,
    side: THREE.DoubleSide
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.copy(feature.position);
  ring.lookAt(camera.position);
  mesh.userData.ring = ring;
  hotspotGroup.add(ring);
});

// ==================== LOAD MODEL ====================
let model = null;
const loader = new GLTFLoader();

loader.load(
  'robot.glb',
  (gltf) => {
    model = gltf.scene;

    // Calculate bounding box and scale to fit within 2 units
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 2 / maxDim;
    model.scale.setScalar(scale);

    // Re-center
    const boxScaled = new THREE.Box3().setFromObject(model);
    const center = boxScaled.getCenter(new THREE.Vector3());
    model.position.sub(center);
    model.position.y -= boxScaled.min.y - center.y; // sit on ground

    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    scene.add(model);
    window.__3D_STATE__.modelLoaded = true;

    // Hide loading overlay
    const overlay = document.getElementById('loadingOverlay');
    overlay.style.opacity = '0';
    setTimeout(() => overlay.style.display = 'none', 500);
  },
  (progress) => {
    // Loading progress
  },
  (error) => {
    console.error('Error loading model:', error);
    // Still hide overlay and show scene
    const overlay = document.getElementById('loadingOverlay');
    overlay.style.opacity = '0';
    setTimeout(() => overlay.style.display = 'none', 500);
    window.__3D_STATE__.modelLoaded = true;
  }
);

// ==================== RAYCASTING ====================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  if (window.__3D_STATE__.quizActive) return;

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(hotspots);

  if (intersects.length > 0) {
    const hit = intersects[0].object;
    selectHotspot(hit.userData.feature);
  }
});

// ==================== CAMERA ANIMATION ====================
let cameraAnimating = false;
let cameraAnimFrame = 0;
let cameraAnimTarget = new THREE.Vector3();
let cameraAnimLookAt = new THREE.Vector3();
let cameraStartPos = new THREE.Vector3();
let cameraStartTarget = new THREE.Vector3();
const ANIM_FRAMES = 60;

function animateCameraTo(targetPos, lookAt) {
  cameraAnimating = true;
  cameraAnimFrame = 0;
  cameraStartPos.copy(camera.position);
  cameraStartTarget.copy(controls.target);
  cameraAnimTarget.copy(targetPos);
  cameraAnimLookAt.copy(lookAt);
  controls.enabled = false;
}

function updateCameraAnimation() {
  if (!cameraAnimating) return;
  cameraAnimFrame++;
  const t = easeInOutCubic(cameraAnimFrame / ANIM_FRAMES);

  camera.position.lerpVectors(cameraStartPos, cameraAnimTarget, t);
  controls.target.lerpVectors(cameraStartTarget, cameraAnimLookAt, t);
  controls.update();

  if (cameraAnimFrame >= ANIM_FRAMES) {
    cameraAnimating = false;
    controls.enabled = true;
  }
}

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

// ==================== FEATURE PANEL ====================
function selectHotspot(feature) {
  window.__3D_STATE__.autoRotateEnabled = false;
  window.__3D_STATE__.activeHotspot = feature.name;
  window.__3D_STATE__.featurePanelVisible = true;

  // Calculate camera position: 1.5 units away from hotspot
  const dir = new THREE.Vector3().subVectors(camera.position, feature.position).normalize();
  const targetCamPos = new THREE.Vector3().copy(feature.position).add(dir.multiplyScalar(1.5));

  animateCameraTo(targetCamPos, feature.position);

  const panel = document.getElementById('featurePanel');
  const colorHex = '#' + feature.color.toString(16).padStart(6, '0');
  document.getElementById('featureName').innerHTML =
    `<span class="feature-color-dot" style="background:${colorHex}"></span>${feature.name}`;
  document.getElementById('featureDesc').textContent = feature.description;
  panel.style.display = 'block';

  if (window.__3D_STATE__.currentTheme === 'light') {
    panel.classList.add('light-panel');
  } else {
    panel.classList.remove('light-panel');
  }
}

window.closeFeaturePanel = function() {
  document.getElementById('featurePanel').style.display = 'none';
  window.__3D_STATE__.featurePanelVisible = false;
  window.__3D_STATE__.activeHotspot = null;
  window.__3D_STATE__.autoRotateEnabled = true;

  animateCameraTo(defaultCameraPos, defaultCameraTarget);
};

// ==================== QUIZ SYSTEM ====================
let quizQuestions = [];
let currentQuestionIndex = 0;
let highlightedHotspotIndex = -1;

function generateQuestions() {
  quizQuestions = [];
  const difficulty = window.__3D_STATE__.quizDifficulty;

  for (let i = 0; i < 5; i++) {
    const q = generateQuestion(i < window.__3D_STATE__.quizQuestionsAnswered ? window.__3D_STATE__.quizDifficulty : difficulty);
    quizQuestions.push(q);
  }
}

function generateQuestion(diff) {
  const correctIdx = Math.floor(Math.random() * features.length);
  const correct = features[correctIdx];

  let question = '';
  let choices = [];
  let numChoices = diff >= 2 ? 4 : 3;

  if (diff === 1) {
    question = `Which feature is ${correct.colorName.toUpperCase()}?`;
  } else if (diff === 2) {
    question = `Which feature is located near the ${correct.positionDesc} of the backpack?`;
  } else {
    question = `Which ${correct.colorName.toUpperCase()} feature is located near the ${correct.positionDesc}?`;
  }

  // Build choices
  let choiceIndices = [correctIdx];
  while (choiceIndices.length < Math.min(numChoices, features.length)) {
    const r = Math.floor(Math.random() * features.length);
    if (!choiceIndices.includes(r)) choiceIndices.push(r);
  }

  // Shuffle
  choiceIndices.sort(() => Math.random() - 0.5);

  choices = choiceIndices.map(idx => ({
    text: features[idx].name,
    correct: idx === correctIdx
  }));

  return {
    question,
    choices,
    correctFeatureIndex: correctIdx,
    difficulty: diff
  };
}

function startQuiz() {
  window.__3D_STATE__.quizActive = true;
  window.__3D_STATE__.quizScore = 0;
  window.__3D_STATE__.quizStreak = 0;
  window.__3D_STATE__.quizDifficulty = 1;
  window.__3D_STATE__.quizQuestionsAnswered = 0;
  window.__3D_STATE__.quizComplete = false;
  window.__3D_STATE__.autoRotateEnabled = false;
  currentQuestionIndex = 0;

  document.getElementById('featurePanel').style.display = 'none';
  window.__3D_STATE__.featurePanelVisible = false;

  showNextQuestion();
}

function showNextQuestion() {
  if (window.__3D_STATE__.quizQuestionsAnswered >= 5) {
    showQuizResult();
    return;
  }

  const q = generateQuestion(window.__3D_STATE__.quizDifficulty);
  quizQuestions[window.__3D_STATE__.quizQuestionsAnswered] = q;

  highlightedHotspotIndex = q.correctFeatureIndex;

  const panel = document.getElementById('quizPanel');
  const isLight = window.__3D_STATE__.currentTheme === 'light';
  panel.className = isLight ? 'light-panel' : '';
  panel.style.display = 'block';

  const diffLabels = ['', '⭐ Easy', '⭐⭐ Medium', '⭐⭐⭐ Hard'];

  let html = `
    <h2>🧠 Feature Quiz</h2>
    <div class="quiz-meta">
      <span>Question ${window.__3D_STATE__.quizQuestionsAnswered + 1}/5</span>
      <span>${diffLabels[q.difficulty]}</span>
      <span>Score: ${window.__3D_STATE__.quizScore}</span>
    </div>
    <div class="quiz-question">${q.question}</div>
    <div class="quiz-choices">
  `;

  q.choices.forEach((choice, idx) => {
    html += `<button class="quiz-choice" data-idx="${idx}" data-correct="${choice.correct}">${choice.text}</button>`;
  });

  html += '</div>';
  document.getElementById('quizContent').innerHTML = html;

  // Attach click handlers
  document.querySelectorAll('.quiz-choice').forEach(btn => {
    btn.addEventListener('click', handleQuizAnswer);
  });
}

function handleQuizAnswer(e) {
  const btn = e.currentTarget;
  const isCorrect = btn.dataset.correct === 'true';

  // Disable all buttons
  document.querySelectorAll('.quiz-choice').forEach(b => {
    b.removeEventListener('click', handleQuizAnswer);
    b.style.pointerEvents = 'none';
    if (b.dataset.correct === 'true') b.classList.add('correct');
  });

  if (isCorrect) {
    window.__3D_STATE__.quizScore++;
    window.__3D_STATE__.quizStreak++;
    if (window.__3D_STATE__.quizStreak >= 2 && window.__3D_STATE__.quizDifficulty < 3) {
      window.__3D_STATE__.quizDifficulty++;
    }
  } else {
    btn.classList.add('wrong');
    window.__3D_STATE__.quizStreak = 0;
    if (window.__3D_STATE__.quizDifficulty > 1) {
      window.__3D_STATE__.quizDifficulty--;
    }
  }

  window.__3D_STATE__.quizQuestionsAnswered++;
  highlightedHotspotIndex = -1;

  setTimeout(() => {
    showNextQuestion();
  }, 1200);
}

function showQuizResult() {
  window.__3D_STATE__.quizComplete = true;
  highlightedHotspotIndex = -1;

  const score = window.__3D_STATE__.quizScore;
  let emoji = '🎉';
  let message = 'Perfect score! You\'re a backpack expert!';
  if (score <= 1) { emoji = '📚'; message = 'Keep exploring the features!'; }
  else if (score <= 2) { emoji = '👍'; message = 'Good effort! Try again to improve!'; }
  else if (score <= 3) { emoji = '🌟'; message = 'Great job! Almost perfect!'; }
  else if (score <= 4) { emoji = '🔥'; message = 'Excellent! So close to perfect!'; }

  document.getElementById('quizContent').innerHTML = `
    <div class="quiz-result">
      <h2>${emoji} Quiz Complete!</h2>
      <p>You scored <strong>${score}/5</strong></p>
      <p>${message}</p>
      <p style="font-size:13px;opacity:0.6;">Final difficulty reached: Level ${window.__3D_STATE__.quizDifficulty}</p>
      <button class="close-quiz-btn" onclick="closeQuiz()">Close Quiz</button>
    </div>
  `;
}

window.closeQuiz = function() {
  document.getElementById('quizPanel').style.display = 'none';
  window.__3D_STATE__.quizActive = false;
  window.__3D_STATE__.autoRotateEnabled = true;
  highlightedHotspotIndex = -1;
};

document.getElementById('startQuizBtn').addEventListener('click', startQuiz);

// ==================== THEME TOGGLE ====================
document.getElementById('themeToggleBtn').addEventListener('click', () => {
  if (window.__3D_STATE__.currentTheme === 'dark') {
    window.__3D_STATE__.currentTheme = 'light';
    setBackgroundGradient('#e8e8f0', '#f0f0f0');
    ambientLight.intensity = 0.7;
    dirLight.intensity = 1.2;
    groundMat.color.set(0x999999);
    document.getElementById('themeToggleBtn').classList.add('light');
    document.getElementById('instructions').classList.add('light');
    document.getElementById('featurePanel').classList.add('light-panel');
    document.getElementById('quizPanel').classList.add('light-panel');
  } else {
    window.__3D_STATE__.currentTheme = 'dark';
    setBackgroundGradient('#1a1a2e', '#16213e');
    ambientLight.intensity = 0.4;
    dirLight.intensity = 0.8;
    groundMat.color.set(0x444466);
    document.getElementById('themeToggleBtn').classList.remove('light');
    document.getElementById('instructions').classList.remove('light');
    document.getElementById('featurePanel').classList.remove('light-panel');
    document.getElementById('quizPanel').classList.remove('light-panel');
  }
});

// ==================== RESIZE ====================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ==================== ANIMATION LOOP ====================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const time = clock.getElapsedTime();

  // Auto-rotate model
  if (model && window.__3D_STATE__.autoRotateEnabled) {
    model.rotation.y += 0.005;
  }

  // Update model rotation state
  if (model) {
    window.__3D_STATE__.modelRotationY = model.rotation.y;
  }

  // Pulse hotspots
  hotspots.forEach((hotspot, idx) => {
    const pulse = 0.8 + 0.2 * Math.sin(time * 3 + idx * 1.2);
    const isHighlighted = idx === highlightedHotspotIndex;
    const baseScale = isHighlighted ? 2 : 1;
    hotspot.scale.setScalar(pulse * baseScale);

    // Update emissive intensity
    hotspot.material.emissiveIntensity = 0.4 + 0.3 * Math.sin(time * 4 + idx);

    // Make ring face camera
    if (hotspot.userData.ring) {
      hotspot.userData.ring.lookAt(camera.position);
      hotspot.userData.ring.scale.setScalar(pulse * baseScale);
      hotspot.userData.ring.material.opacity = 0.15 + 0.15 * Math.sin(time * 2 + idx);
    }
  });

  // Camera animation
  updateCameraAnimation();

  // Update controls
  if (!cameraAnimating) {
    controls.update();
  }

  // Update state
  window.__3D_STATE__.cameraPosition = {
    x: parseFloat(camera.position.x.toFixed(3)),
    y: parseFloat(camera.position.y.toFixed(3)),
    z: parseFloat(camera.position.z.toFixed(3))
  };

  renderer.render(scene, camera);
}

animate();
</script>
