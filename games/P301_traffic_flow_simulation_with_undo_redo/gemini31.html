<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Traffic Flow Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: none;
        }
        #ui-panel h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #4da6ff;
        }
        .stat-line {
            margin: 5px 0;
            font-size: 14px;
        }
        .controls-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .button-row {
            display: flex;
            gap: 10px;
        }
        button {
            background: #333;
            color: white;
            border: 1px solid #666;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            pointer-events: auto;
            transition: background 0.2s;
        }
        button:hover {
            background: #555;
        }
        button:active {
            background: #777;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            pointer-events: auto;
        }
        .top-buttons {
            margin-top: 10px;
            pointer-events: auto;
        }
        #pause-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 48px;
            font-weight: bold;
            pointer-events: none;
            display: none;
            text-shadow: 2px 2px 4px #000;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-panel">
        <h2>Traffic Flow Simulator</h2>
        <div class="stat-line" id="stat-vehicles">Vehicles: 8</div>
        <div class="stat-line" id="stat-lights">Lights: 0</div>
        <div class="stat-line" id="stat-stopped">Stopped: 0</div>
        <div class="stat-line" id="stat-history">History: 0</div>
        <div class="top-buttons">
            <button id="undoBtn">Undo (Z)</button>
            <button id="redoBtn">Redo (Y)</button>
        </div>
    </div>

    <div class="controls-panel">
        <div class="button-row">
            <button id="placeLight0">Place Light 0</button>
            <button id="placeLight1">Place Light 1</button>
            <button id="placeLight2">Place Light 2</button>
            <button id="placeLight3">Place Light 3</button>
        </div>
        <div class="slider-container">
            <label for="speedSlider">Speed:</label>
            <input type="range" id="speedSlider" min="1" max="20" value="5">
            <span id="speedValue">5</span>
        </div>
        <div style="color: #aaa; font-size: 12px; margin-top: 5px;">Press SPACE to Pause/Resume</div>
    </div>

    <div id="pause-overlay">PAUSED</div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            vehicleCount: 8,
            vehiclePositions: [],
            stoppedCount: 0,
            lightsPlaced: 0,
            lightStates: [],
            historySize: 0,
            redoSize: 0,
            isPaused: false,
            speed: 5,
            pedestrianLoaded: false,
            simTime: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 40);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 30, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 50;
        dirLight.shadow.camera.bottom = -50;
        dirLight.shadow.camera.left = -50;
        dirLight.shadow.camera.right = 50;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Roads
        const roadMat = new THREE.MeshLambertMaterial({ color: 0x555555 });
        const roadXGeo = new THREE.PlaneGeometry(90, 6);
        const roadX = new THREE.Mesh(roadXGeo, roadMat);
        roadX.rotation.x = -Math.PI / 2;
        roadX.position.y = 0.01;
        roadX.receiveShadow = true;
        scene.add(roadX);

        const roadZGeo = new THREE.PlaneGeometry(6, 90);
        const roadZ = new THREE.Mesh(roadZGeo, roadMat);
        roadZ.rotation.x = -Math.PI / 2;
        roadZ.position.y = 0.01;
        roadZ.receiveShadow = true;
        scene.add(roadZ);

        // --- Pedestrian ---
        let mixer;
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Michelle.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.8, 0.8, 0.8);
            model.position.set(8, 0, 8);
            
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(model);
            window.__3D_STATE__.pedestrianLoaded = true;

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                const action = mixer.clipAction(gltf.animations[0]);
                action.play();
            }
        });

        // --- Vehicles ---
        const vehicles = [];
        const vehicleColors = [0xff0000, 0x0000ff, 0x00ff00, 0xffff00];
        const vehicleGeo = new THREE.BoxGeometry(3, 1, 2); // Length along X initially
        
        const vehicleConfigs = [
            // +X direction (lane z=1.5)
            { dir: new THREE.Vector3(1, 0, 0), pos: new THREE.Vector3(-20, 0.5, 1.5), colorIdx: 0 },
            { dir: new THREE.Vector3(1, 0, 0), pos: new THREE.Vector3(-40, 0.5, 1.5), colorIdx: 1 },
            // -X direction (lane z=-1.5)
            { dir: new THREE.Vector3(-1, 0, 0), pos: new THREE.Vector3(20, 0.5, -1.5), colorIdx: 2 },
            { dir: new THREE.Vector3(-1, 0, 0), pos: new THREE.Vector3(40, 0.5, -1.5), colorIdx: 3 },
            // +Z direction (lane x=-1.5)
            { dir: new THREE.Vector3(0, 0, 1), pos: new THREE.Vector3(-1.5, 0.5, -20), colorIdx: 0 },
            { dir: new THREE.Vector3(0, 0, 1), pos: new THREE.Vector3(-1.5, 0.5, -40), colorIdx: 1 },
            // -Z direction (lane x=1.5)
            { dir: new THREE.Vector3(0, 0, -1), pos: new THREE.Vector3(1.5, 0.5, 20), colorIdx: 2 },
            { dir: new THREE.Vector3(0, 0, -1), pos: new THREE.Vector3(1.5, 0.5, 40), colorIdx: 3 }
        ];

        vehicleConfigs.forEach(config => {
            const mat = new THREE.MeshLambertMaterial({ color: vehicleColors[config.colorIdx] });
            const mesh = new THREE.Mesh(vehicleGeo, mat);
            mesh.position.copy(config.pos);
            mesh.castShadow = true;
            
            // Align mesh with direction
            if (config.dir.z !== 0) {
                mesh.rotation.y = Math.PI / 2;
            }

            scene.add(mesh);
            vehicles.push({
                mesh: mesh,
                dir: config.dir,
                isStopped: false
            });
        });

        // --- Traffic Lights ---
        const lightSpots = [
            { x: 3, z: 3 },
            { x: -3, z: 3 },
            { x: 3, z: -3 },
            { x: -3, z: -3 }
        ];
        const activeLights = [null, null, null, null];

        function createLightMesh(x, z, state) {
            const group = new THREE.Group();
            group.position.set(x, 0, z);

            const poleGeo = new THREE.CylinderGeometry(0.3, 0.3, 3);
            const poleMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
            const pole = new THREE.Mesh(poleGeo, poleMat);
            pole.position.y = 1.5;
            pole.castShadow = true;
            group.add(pole);

            const sphereGeo = new THREE.SphereGeometry(0.5);
            const sphereMat = new THREE.MeshLambertMaterial({ 
                color: state === 'red' ? 0xff0000 : 0x00ff00,
                emissive: state === 'red' ? 0x440000 : 0x004400
            });
            const sphere = new THREE.Mesh(sphereGeo, sphereMat);
            sphere.position.y = 3.5;
            group.add(sphere);

            // Add invisible hit box for easier clicking
            const hitGeo = new THREE.BoxGeometry(1.5, 4.5, 1.5);
            const hitMat = new THREE.MeshBasicMaterial({ visible: false });
            const hitBox = new THREE.Mesh(hitGeo, hitMat);
            hitBox.position.y = 2.25;
            group.add(hitBox);

            scene.add(group);
            return { group, sphere, state };
        }

        // --- Undo/Redo System ---
        const history = [];
        let redoStack = [];
        const MAX_HISTORY = 20;

        function executeAction(action, isNew = true) {
            const { type, spotIndex, state } = action;

            if (type === 'PLACE') {
                const spot = lightSpots[spotIndex];
                const initialState = state || 'red';
                activeLights[spotIndex] = createLightMesh(spot.x, spot.z, initialState);
                activeLights[spotIndex].group.children.forEach(child => {
                    child.userData = { isTrafficLight: true, spotIndex: spotIndex };
                });
            } 
            else if (type === 'REMOVE') {
                const light = activeLights[spotIndex];
                if (light) {
                    scene.remove(light.group);
                    // Dispose geometries and materials
                    light.group.children.forEach(child => {
                        if(child.geometry) child.geometry.dispose();
                        if(child.material) child.material.dispose();
                    });
                    activeLights[spotIndex] = null;
                }
            } 
            else if (type === 'TOGGLE') {
                const light = activeLights[spotIndex];
                if (light) {
                    light.state = light.state === 'red' ? 'green' : 'red';
                    light.sphere.material.color.setHex(light.state === 'red' ? 0xff0000 : 0x00ff00);
                    light.sphere.material.emissive.setHex(light.state === 'red' ? 0x440000 : 0x004400);
                }
            }

            if (isNew) {
                history.push(action);
                if (history.length > MAX_HISTORY) history.shift();
                redoStack = [];
            }
            
            updateUI();
        }

        function undo() {
            if (history.length === 0) return;
            const action = history.pop();
            
            let reverseAction;
            if (action.type === 'PLACE') {
                reverseAction = { type: 'REMOVE', spotIndex: action.spotIndex };
            } else if (action.type === 'REMOVE') {
                reverseAction = { type: 'PLACE', spotIndex: action.spotIndex, state: action.oldState };
            } else if (action.type === 'TOGGLE') {
                reverseAction = { type: 'TOGGLE', spotIndex: action.spotIndex };
            }

            executeAction(reverseAction, false);
            redoStack.push(action);
            updateUI();
        }

        function redo() {
            if (redoStack.length === 0) return;
            const action = redoStack.pop();
            executeAction(action, false);
            history.push(action);
            updateUI();
        }

        // --- Interaction & UI ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (event.target.tagName === 'BUTTON' || event.target.tagName === 'INPUT') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            for (let i = 0; i < intersects.length; i++) {
                const userData = intersects[i].object.userData;
                if (userData.isTrafficLight) {
                    executeAction({ type: 'TOGGLE', spotIndex: userData.spotIndex });
                    break;
                }
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
                document.getElementById('pause-overlay').style.display = window.__3D_STATE__.isPaused ? 'block' : 'none';
            } else if (e.key === 'z' || e.key === 'Z') {
                undo();
            } else if (e.key === 'y' || e.key === 'Y') {
                redo();
            }
        });

        // Setup UI Buttons
        for (let i = 0; i < 4; i++) {
            document.getElementById(`placeLight${i}`).addEventListener('click', () => {
                if (activeLights[i]) {
                    executeAction({ type: 'REMOVE', spotIndex: i, oldState: activeLights[i].state });
                } else {
                    executeAction({ type: 'PLACE', spotIndex: i });
                }
            });
        }

        document.getElementById('undoBtn').addEventListener('click', undo);
        document.getElementById('redoBtn').addEventListener('click', redo);

        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        speedSlider.addEventListener('input', (e) => {
            window.__3D_STATE__.speed = parseFloat(e.target.value);
            speedValue.textContent = e.target.value;
        });

        function updateUI() {
            for (let i = 0; i < 4; i++) {
                const btn = document.getElementById(`placeLight${i}`);
                if (activeLights[i]) {
                    btn.textContent = `Remove Light ${i}`;
                    btn.style.background = '#800000';
                } else {
                    btn.textContent = `Place Light ${i}`;
                    btn.style.background = '#333';
                }
            }
            
            document.getElementById('stat-vehicles').textContent = `Vehicles: ${window.__3D_STATE__.vehicleCount}`;
            document.getElementById('stat-lights').textContent = `Lights: ${window.__3D_STATE__.lightsPlaced}`;
            document.getElementById('stat-stopped').textContent = `Stopped: ${window.__3D_STATE__.stoppedCount}`;
            document.getElementById('stat-history').textContent = `History: ${window.__3D_STATE__.historySize}`;
            
            document.getElementById('undoBtn').disabled = history.length === 0;
            document.getElementById('undoBtn').style.opacity = history.length === 0 ? 0.5 : 1;
            document.getElementById('redoBtn').disabled = redoStack.length === 0;
            document.getElementById('redoBtn').style.opacity = redoStack.length === 0 ? 0.5 : 1;
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            window.__3D_STATE__.simTime += delta;

            if (mixer) mixer.update(delta);

            let stoppedCount = 0;

            if (!window.__3D_STATE__.isPaused) {
                const speed = window.__3D_STATE__.speed;

                vehicles.forEach(v => {
                    let shouldStop = false;
                    const pos = v.mesh.position;

                    // Check for red lights ahead
                    for (let i = 0; i < 4; i++) {
                        const light = activeLights[i];
                        if (light && light.state === 'red') {
                            const lx = lightSpots[i].x;
                            const lz = lightSpots[i].z;

                            // Check if light is relevant to vehicle's lane and direction
                            if (v.dir.x === 1 && Math.abs(pos.z - lz) < 2 && pos.x < lx && lx - pos.x < 8) shouldStop = true;
                            if (v.dir.x === -1 && Math.abs(pos.z - lz) < 2 && pos.x > lx && pos.x - lx < 8) shouldStop = true;
                            if (v.dir.z === 1 && Math.abs(pos.x - lx) < 2 && pos.z < lz && lz - pos.z < 8) shouldStop = true;
                            if (v.dir.z === -1 && Math.abs(pos.x - lx) < 2 && pos.z > lz && pos.z - lz < 8) shouldStop = true;
                        }
                    }

                    v.isStopped = shouldStop;

                    if (!shouldStop) {
                        pos.addScaledVector(v.dir, speed * delta);

                        // Wrap around
                        if (pos.x > 45) pos.x = -45;
                        if (pos.x < -45) pos.x = 45;
                        if (pos.z > 45) pos.z = -45;
                        if (pos.z < -45) pos.z = 45;
                    } else {
                        stoppedCount++;
                    }
                });
            } else {
                // Count stopped even when paused for accurate state
                stoppedCount = vehicles.filter(v => v.isStopped).length;
            }

            // Update State
            window.__3D_STATE__.vehiclePositions = vehicles.map(v => ({ x: v.mesh.position.x, z: v.mesh.position.z }));
            window.__3D_STATE__.stoppedCount = stoppedCount;
            window.__3D_STATE__.lightsPlaced = activeLights.filter(l => l !== null).length;
            window.__3D_STATE__.lightStates = activeLights.map((l, i) => l ? { position: lightSpots[i], color: l.state } : null).filter(l => l !== null);
            window.__3D_STATE__.historySize = history.length;
            window.__3D_STATE__.redoSize = redoStack.length;

            // Update dynamic UI stats
            document.getElementById('stat-stopped').textContent = `Stopped: ${stoppedCount}`;
            document.getElementById('stat-lights').textContent = `Lights: ${window.__3D_STATE__.lightsPlaced}`;
            document.getElementById('stat-history').textContent = `History: ${history.length}`;

            renderer.render(scene, camera);
        }

        // Init UI state
        updateUI();
        animate();
    </script>
</body>
</html>
