<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traffic Flow Simulator</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.65);
      padding: 12px;
      border-radius: 8px;
      min-width: 220px;
      z-index: 10;
    }

    #hud h2 {
      margin: 0 0 8px 0;
      font-size: 18px;
    }

    #hud .line {
      margin: 4px 0;
      font-size: 14px;
    }

    #hud .controls {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    button {
      background: #2c2c2c;
      color: white;
      border: 1px solid #666;
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
    }

    button:hover {
      background: #3c3c3c;
    }

    #bottomBar {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(0,0,0,0.65);
      padding: 10px 12px;
      border-radius: 10px;
      z-index: 10;
    }

    #bottomBar label {
      font-size: 14px;
      margin-left: 8px;
    }

    #speedSlider {
      width: 160px;
    }

    #help {
      position: absolute;
      right: 12px;
      top: 12px;
      background: rgba(0,0,0,0.55);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 10;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="hud">
    <h2>Traffic Flow Simulator</h2>
    <div class="line" id="vehicleCount">Vehicles: 8</div>
    <div class="line" id="lightsCount">Lights: 0</div>
    <div class="line" id="stoppedCount">Stopped: 0</div>
    <div class="line" id="historyCount">History: 0</div>
    <div class="controls">
      <button id="undoBtn">Undo</button>
      <button id="redoBtn">Redo</button>
    </div>
  </div>

  <div id="help">
    SPACE = Pause/Resume<br>
    Z = Undo<br>
    Y = Redo<br>
    Click light = Toggle red/green
  </div>

  <div id="bottomBar">
    <button id="placeLight0">Toggle Light 1</button>
    <button id="placeLight1">Toggle Light 2</button>
    <button id="placeLight2">Toggle Light 3</button>
    <button id="placeLight3">Toggle Light 4</button>
    <label for="speedSlider">Speed</label>
    <input id="speedSlider" type="range" min="1" max="20" value="5" />
    <span id="speedValue">5</span>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      500
    );
    camera.position.set(0, 40, 40);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = false;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;
    controls.maxPolarAngle = Math.PI / 2.05;
    controls.minDistance = 20;
    controls.maxDistance = 120;

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 30, 10);
    scene.add(dirLight);

    // Ground
    const groundGeo = new THREE.PlaneGeometry(100, 100);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    // Roads
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
    const roadX = new THREE.Mesh(new THREE.BoxGeometry(90, 0.02, 6), roadMat);
    roadX.position.set(0, 0.01, 0);
    scene.add(roadX);

    const roadZ = new THREE.Mesh(new THREE.BoxGeometry(6, 0.02, 90), roadMat);
    roadZ.position.set(0, 0.01, 0);
    scene.add(roadZ);

    // Optional lane markings
    const markMat = new THREE.MeshBasicMaterial({ color: 0xdddddd });
    for (let i = -40; i <= 40; i += 8) {
      const dashX = new THREE.Mesh(new THREE.BoxGeometry(3, 0.03, 0.15), markMat);
      dashX.position.set(i, 0.03, 0);
      scene.add(dashX);

      const dashZ = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.03, 3), markMat);
      dashZ.position.set(0, 0.03, i);
      scene.add(dashZ);
    }

    // Pedestrian
    const loader = new GLTFLoader();
    const mixers = [];
    let pedestrianLoaded = false;

    loader.load(
      "https://threejs.org/examples/models/gltf/Michelle.glb",
      (gltf) => {
        const model = gltf.scene;
        model.scale.setScalar(0.8);
        model.position.set(8, 0, 8);
        scene.add(model);
        pedestrianLoaded = true;

        if (gltf.animations && gltf.animations.length > 0) {
          const mixer = new THREE.AnimationMixer(model);
          const clip = gltf.animations[0];
          mixer.clipAction(clip).play();
          mixers.push(mixer);
        }
      },
      undefined,
      () => {
        pedestrianLoaded = false;
        // fallback marker
        const fallback = new THREE.Mesh(
          new THREE.CapsuleGeometry(0.5, 1.5, 4, 8),
          new THREE.MeshStandardMaterial({ color: 0xcccccc })
        );
        fallback.position.set(8, 1.25, 8);
        scene.add(fallback);
      }
    );

    // Placement spots
    const placementSpots = [
      new THREE.Vector3(3, 0, 3),
      new THREE.Vector3(-3, 0, 3),
      new THREE.Vector3(3, 0, -3),
      new THREE.Vector3(-3, 0, -3),
    ];

    // Visual markers for placement spots
    placementSpots.forEach((pos) => {
      const marker = new THREE.Mesh(
        new THREE.CylinderGeometry(0.45, 0.45, 0.05, 16),
        new THREE.MeshStandardMaterial({ color: 0x777777, transparent: true, opacity: 0.6 })
      );
      marker.position.set(pos.x, 0.03, pos.z);
      scene.add(marker);
    });

    // Traffic light management
    const trafficLights = new Map(); // key -> {group,pole,lamp,state,position}
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function spotKey(pos) {
      return `${pos.x},${pos.z}`;
    }

    function createTrafficLight(pos, state = "red") {
      const group = new THREE.Group();

      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.3, 0.3, 3, 16),
        new THREE.MeshStandardMaterial({ color: 0x888888 })
      );
      pole.position.y = 1.5;
      group.add(pole);

      const lampMat = new THREE.MeshStandardMaterial({
        color: state === "green" ? 0x00ff00 : 0xff0000
      });
      const lamp = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 20, 20),
        lampMat
      );
      lamp.position.y = 3.25;
      group.add(lamp);

      group.position.set(pos.x, 0, pos.z);
      group.userData.isTrafficLight = true;
      scene.add(group);

      return {
        group,
        pole,
        lamp,
        state,
        position: { x: pos.x, z: pos.z }
      };
    }

    function setLightStateAt(pos, state) {
      const key = typeof pos === "string" ? pos : spotKey(pos);
      const light = trafficLights.get(key);
      if (!light) return;
      light.state = state;
      light.lamp.material.color.set(state === "green" ? 0x00ff00 : 0xff0000);
    }

    function placeLight(pos, recordHistory = true, forcedState = "red") {
      const key = spotKey(pos);
      if (trafficLights.has(key)) return;

      const light = createTrafficLight(pos, forcedState);
      trafficLights.set(key, light);

      if (recordHistory) {
        pushHistory({
          type: "place",
          position: { x: pos.x, z: pos.z },
          state: forcedState
        });
      }
      updateHUD();
    }

    function removeLight(pos, recordHistory = true) {
      const key = spotKey(pos);
      const light = trafficLights.get(key);
      if (!light) return;

      const prevState = light.state;
      scene.remove(light.group);
      trafficLights.delete(key);

      if (recordHistory) {
        pushHistory({
          type: "remove",
          position: { x: light.position.x, z: light.position.z },
          state: prevState
        });
      }
      updateHUD();
    }

    function toggleLight(pos, recordHistory = true) {
      const key = typeof pos === "string" ? pos : spotKey(pos);
      const light = trafficLights.get(key);
      if (!light) return;

      const oldState = light.state;
      const newState = oldState === "red" ? "green" : "red";
      setLightStateAt(key, newState);

      if (recordHistory) {
        pushHistory({
          type: "toggle",
          position: { x: light.position.x, z: light.position.z },
          from: oldState,
          to: newState
        });
      }
      updateHUD();
    }

    // History
    const historyStack = [];
    const redoStack = [];
    const MAX_HISTORY = 20;

    function pushHistory(action) {
      historyStack.push(action);
      if (historyStack.length > MAX_HISTORY) {
        historyStack.shift();
      }
      redoStack.length = 0;
      updateHUD();
    }

    function undoAction() {
      if (historyStack.length === 0) return;
      const action = historyStack.pop();

      if (action.type === "place") {
        removeLight(action.position, false);
      } else if (action.type === "remove") {
        placeLight(new THREE.Vector3(action.position.x, 0, action.position.z), false, action.state || "red");
      } else if (action.type === "toggle") {
        setLightStateAt(action.position, action.from);
      }

      redoStack.push(action);
      updateHUD();
    }

    function redoAction() {
      if (redoStack.length === 0) return;
      const action = redoStack.pop();

      if (action.type === "place") {
        placeLight(new THREE.Vector3(action.position.x, 0, action.position.z), false, action.state || "red");
      } else if (action.type === "remove") {
        removeLight(action.position, false);
      } else if (action.type === "toggle") {
        setLightStateAt(action.position, action.to);
      }

      historyStack.push(action);
      if (historyStack.length > MAX_HISTORY) {
        historyStack.shift();
      }
      updateHUD();
    }

    // Vehicles
    const vehicleColors = [0xff0000, 0x0000ff, 0x00ff00, 0xffff00];
    const vehicles = [];

    function createVehicle(color, axis, direction, laneOffset, startCoord) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(2, 1, 3),
        new THREE.MeshStandardMaterial({ color })
      );
      mesh.position.y = 0.5;

      if (axis === "x") {
        mesh.position.set(startCoord, 0.5, laneOffset);
        mesh.rotation.y = direction > 0 ? Math.PI / 2 : -Math.PI / 2;
      } else {
        mesh.position.set(laneOffset, 0.5, startCoord);
        mesh.rotation.y = direction > 0 ? 0 : Math.PI;
      }

      scene.add(mesh);

      return {
        mesh,
        axis,
        direction,
        laneOffset,
        stopped: false
      };
    }

    const starts = [-35, -15, 15, 35];
    vehicles.push(createVehicle(vehicleColors[0], "x",  1, -1.5, -35));
    vehicles.push(createVehicle(vehicleColors[1], "x",  1,  1.5, -15));
    vehicles.push(createVehicle(vehicleColors[2], "x", -1, -1.5,  35));
    vehicles.push(createVehicle(vehicleColors[3], "x", -1,  1.5,  15));

    vehicles.push(createVehicle(vehicleColors[0], "z",  1, -1.5, -35));
    vehicles.push(createVehicle(vehicleColors[1], "z",  1,  1.5, -15));
    vehicles.push(createVehicle(vehicleColors[2], "z", -1, -1.5,  35));
    vehicles.push(createVehicle(vehicleColors[3], "z", -1,  1.5,  15));

    function distanceAheadToLight(vehicle, light) {
      const lx = light.position.x;
      const lz = light.position.z;
      const vx = vehicle.mesh.position.x;
      const vz = vehicle.mesh.position.z;

      if (vehicle.axis === "x") {
        if (Math.abs(lz - vehicle.laneOffset) > 4.5) return Infinity;
        const d = (lx - vx) * vehicle.direction;
        return d >= 0 ? d : Infinity;
      } else {
        if (Math.abs(lx - vehicle.laneOffset) > 4.5) return Infinity;
        const d = (lz - vz) * vehicle.direction;
        return d >= 0 ? d : Infinity;
      }
    }

    function shouldVehicleStop(vehicle) {
      for (const [, light] of trafficLights) {
        if (light.state !== "red") continue;
        const d = distanceAheadToLight(vehicle, light);
        if (d <= 8) return true;
      }
      return false;
    }

    // UI
    const vehicleCountEl = document.getElementById("vehicleCount");
    const lightsCountEl = document.getElementById("lightsCount");
    const stoppedCountEl = document.getElementById("stoppedCount");
    const historyCountEl = document.getElementById("historyCount");
    const undoBtn = document.getElementById("undoBtn");
    const redoBtn = document.getElementById("redoBtn");
    const speedSlider = document.getElementById("speedSlider");
    const speedValue = document.getElementById("speedValue");

    function updateHUD() {
      const stopped = vehicles.filter(v => v.stopped).length;
      vehicleCountEl.textContent = `Vehicles: 8`;
      lightsCountEl.textContent = `Lights: ${trafficLights.size}`;
      stoppedCountEl.textContent = `Stopped: ${stopped}`;
      historyCountEl.textContent = `History: ${historyStack.length}`;
      speedValue.textContent = speedSlider.value;
    }

    undoBtn.addEventListener("click", undoAction);
    redoBtn.addEventListener("click", redoAction);

    placementSpots.forEach((pos, index) => {
      document.getElementById(`placeLight${index}`).addEventListener("click", () => {
        const key = spotKey(pos);
        if (trafficLights.has(key)) {
          removeLight(pos, true);
        } else {
          placeLight(pos, true, "red");
        }
      });
    });

    // Click existing traffic light to toggle
    renderer.domElement.addEventListener("click", (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const trafficLightObjects = [];
      for (const [, light] of trafficLights) {
        trafficLightObjects.push(light.group);
        light.group.traverse(child => trafficLightObjects.push(child));
      }

      const intersects = raycaster.intersectObjects(trafficLightObjects, true);
      if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj && !obj.userData.isTrafficLight) obj = obj.parent;
        if (obj && obj.userData.isTrafficLight) {
          const key = `${obj.position.x},${obj.position.z}`;
          toggleLight(key, true);
        }
      }
    });

    let isPaused = false;
    document.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (key === "z") undoAction();
      if (key === "y") redoAction();
      if (e.code === "Space") {
        e.preventDefault();
        isPaused = !isPaused;
      }
    });

    // State exposure
    window.__3D_STATE__ = {
      vehicleCount: 8,
      vehiclePositions: [],
      stoppedCount: 0,
      lightsPlaced: 0,
      lightStates: [],
      historySize: 0,
      redoSize: 0,
      isPaused: false,
      speed: Number(speedSlider.value),
      pedestrianLoaded: false,
      simTime: 0
    };

    const clock = new THREE.Clock();
    let simTime = 0;

    function updateState() {
      window.__3D_STATE__ = {
        vehicleCount: 8,
        vehiclePositions: vehicles.map(v => ({
          x: Number(v.mesh.position.x.toFixed(3)),
          z: Number(v.mesh.position.z.toFixed(3))
        })),
        stoppedCount: vehicles.filter(v => v.stopped).length,
        lightsPlaced: trafficLights.size,
        lightStates: Array.from(trafficLights.values()).map(light => ({
          position: { x: light.position.x, z: light.position.z },
          color: light.state
        })),
        historySize: historyStack.length,
        redoSize: redoStack.length,
        isPaused,
        speed: Number(speedSlider.value),
        pedestrianLoaded,
        simTime: Number(simTime.toFixed(3))
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();
      const speed = Number(speedSlider.value);

      if (!isPaused) {
        simTime += dt;

        for (const mixer of mixers) mixer.update(dt);

        for (const vehicle of vehicles) {
          vehicle.stopped = shouldVehicleStop(vehicle);

          if (!vehicle.stopped) {
            if (vehicle.axis === "x") {
              vehicle.mesh.position.x += vehicle.direction * speed * dt;
              if (vehicle.mesh.position.x > 45) vehicle.mesh.position.x = -45;
              if (vehicle.mesh.position.x < -45) vehicle.mesh.position.x = 45;
            } else {
              vehicle.mesh.position.z += vehicle.direction * speed * dt;
              if (vehicle.mesh.position.z > 45) vehicle.mesh.position.z = -45;
              if (vehicle.mesh.position.z < -45) vehicle.mesh.position.z = 45;
            }
          }
        }
      }

      controls.update();
      updateHUD();
      updateState();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHUD();
    updateState();
  </script>
</body>
</html>
