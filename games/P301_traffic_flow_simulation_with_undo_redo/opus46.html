<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traffic Flow Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0,0,0,0.85);
    color: #eee;
    padding: 18px 22px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 220px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
  }
  #hud h2 {
    font-size: 18px;
    margin-bottom: 10px;
    color: #4fc3f7;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding-bottom: 8px;
  }
  #hud .stat { color: #bbb; }
  #hud .stat span { color: #fff; font-weight: bold; }

  .btn-row {
    margin-top: 12px;
    display: flex;
    gap: 8px;
  }
  .btn-row button {
    flex: 1;
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
  }
  #undoBtn {
    background: #ff7043;
    color: #fff;
  }
  #undoBtn:hover { background: #ff5722; }
  #redoBtn {
    background: #42a5f5;
    color: #fff;
  }
  #redoBtn:hover { background: #2196f3; }

  .slider-row {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .slider-row label { color: #bbb; font-size: 13px; }
  #speedSlider {
    flex: 1;
    accent-color: #4fc3f7;
  }
  #speedVal { color: #fff; font-weight: bold; min-width: 20px; text-align: right; }

  #pauseIndicator {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.7);
    color: #ff9800;
    font-size: 36px;
    font-weight: bold;
    padding: 20px 40px;
    border-radius: 16px;
    pointer-events: none;
    border: 2px solid #ff9800;
  }

  #bottomBar {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
  }
  #bottomBar button {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    color: #fff;
    min-width: 140px;
  }
  #placeLight0 { background: #7b1fa2; }
  #placeLight0:hover { background: #9c27b0; }
  #placeLight1 { background: #1565c0; }
  #placeLight1:hover { background: #1976d2; }
  #placeLight2 { background: #2e7d32; }
  #placeLight2:hover { background: #388e3c; }
  #placeLight3 { background: #e65100; }
  #placeLight3:hover { background: #ef6c00; }
</style>
</head>
<body>

<div id="hud">
  <h2>🚦 Traffic Flow Simulator</h2>
  <div class="stat">Vehicles: <span id="vehicleCountDisplay">8</span></div>
  <div class="stat">Lights: <span id="lightsDisplay">0</span></div>
  <div class="stat">Stopped: <span id="stoppedDisplay">0</span></div>
  <div class="stat">History: <span id="historyDisplay">0</span></div>
  <div class="stat">Sim Time: <span id="timeDisplay">0.0s</span></div>
  <div class="btn-row">
    <button id="undoBtn">⟲ Undo (Z)</button>
    <button id="redoBtn">⟳ Redo (Y)</button>
  </div>
  <div class="slider-row">
    <label>Speed:</label>
    <input type="range" id="speedSlider" min="1" max="20" value="5">
    <span id="speedVal">5</span>
  </div>
</div>

<div id="pauseIndicator">⏸ PAUSED</div>

<div id="bottomBar">
  <button id="placeLight0">💡 Light (3, 3)</button>
  <button id="placeLight1">💡 Light (-3, 3)</button>
  <button id="placeLight2">💡 Light (3, -3)</button>
  <button id="placeLight3">💡 Light (-3, -3)</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 60, 100);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 40, 40);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.2;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 30, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -50;
dirLight.shadow.camera.right = 50;
dirLight.shadow.camera.top = 50;
dirLight.shadow.camera.bottom = -50;
scene.add(dirLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Roads
function createRoad(width, length, rotY, posX, posZ) {
  const geo = new THREE.PlaneGeometry(width, length);
  const mat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.8 });
  const road = new THREE.Mesh(geo, mat);
  road.rotation.x = -Math.PI / 2;
  road.rotation.z = rotY;
  road.position.set(posX, 0.01, posZ);
  road.receiveShadow = true;
  return road;
}

// X-axis road
scene.add(createRoad(90, 6, 0, 0, 0));
// Z-axis road
scene.add(createRoad(6, 90, 0, 0, 0));

// Road markings (dashed center lines)
function createDashedLine(axis) {
  const points = [];
  for (let i = -44; i <= 44; i += 4) {
    if (axis === 'x') {
      points.push(new THREE.Vector3(i, 0.02, 0));
      points.push(new THREE.Vector3(i + 2, 0.02, 0));
    } else {
      points.push(new THREE.Vector3(0, 0.02, i));
      points.push(new THREE.Vector3(0, 0.02, i + 2));
    }
  }
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color: 0xffff00, linewidth: 1 });
  return new THREE.LineSegments(geo, mat);
}
scene.add(createDashedLine('x'));
scene.add(createDashedLine('z'));

// ============ PEDESTRIAN (Michelle.glb) ============
let pedestrianLoaded = false;
let pedestrianMixer = null;

const gltfLoader = new GLTFLoader();
gltfLoader.load(
  'https://threejs.org/examples/models/gltf/Michelle.glb',
  (gltf) => {
    const model = gltf.scene;
    model.scale.set(0.8, 0.8, 0.8);
    model.position.set(8, 0, 8);
    model.castShadow = true;
    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
      }
    });
    scene.add(model);
    pedestrianLoaded = true;

    if (gltf.animations && gltf.animations.length > 0) {
      pedestrianMixer = new THREE.AnimationMixer(model);
      const action = pedestrianMixer.clipAction(gltf.animations[0]);
      action.play();
    }
  },
  undefined,
  (error) => {
    console.warn('Could not load Michelle.glb:', error);
    // Create a simple placeholder pedestrian
    const bodyGeo = new THREE.CylinderGeometry(0.3, 0.3, 1.5, 8);
    const headGeo = new THREE.SphereGeometry(0.3, 8, 8);
    const mat = new THREE.MeshStandardMaterial({ color: 0xffaa66 });
    const body = new THREE.Mesh(bodyGeo, mat);
    body.position.set(8, 0.75, 8);
    const head = new THREE.Mesh(headGeo, mat);
    head.position.set(8, 1.8, 8);
    scene.add(body);
    scene.add(head);
    pedestrianLoaded = false;
  }
);

// ============ VEHICLES ============
const vehicleColors = [0xff3333, 0xff3333, 0x3388ff, 0x3388ff, 0x33cc33, 0x33cc33, 0xffcc00, 0xffcc00];
const vehicles = [];

function createVehicle(color, axis, direction, laneOffset, startPos) {
  const group = new THREE.Group();

  // Body
  const bodyGeo = new THREE.BoxGeometry(2, 1, 3);
  const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.3 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.5;
  body.castShadow = true;
  group.add(body);

  // Roof
  const roofGeo = new THREE.BoxGeometry(1.6, 0.6, 1.8);
  const roofMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5 });
  const roof = new THREE.Mesh(roofGeo, roofMat);
  roof.position.y = 1.3;
  roof.position.z = -0.2;
  group.add(roof);

  // Headlights
  const hlGeo = new THREE.SphereGeometry(0.15, 6, 6);
  const hlMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0xffffcc, emissiveIntensity: 0.5 });
  const hl1 = new THREE.Mesh(hlGeo, hlMat);
  hl1.position.set(-0.7, 0.4, 1.5);
  group.add(hl1);
  const hl2 = new THREE.Mesh(hlGeo, hlMat);
  hl2.position.set(0.7, 0.4, 1.5);
  group.add(hl2);

  // Orient vehicle based on axis and direction
  if (axis === 'x') {
    group.rotation.y = direction > 0 ? -Math.PI / 2 : Math.PI / 2;
    group.position.set(startPos, 0, laneOffset);
  } else {
    group.rotation.y = direction > 0 ? 0 : Math.PI;
    group.position.set(laneOffset, 0, startPos);
  }

  scene.add(group);

  return {
    mesh: group,
    axis,
    direction,
    laneOffset,
    speed: 5,
    stopped: false
  };
}

// X-axis vehicles
vehicles.push(createVehicle(vehicleColors[0], 'x', 1, 1.5, -30));
vehicles.push(createVehicle(vehicleColors[1], 'x', 1, 1.5, -10));
vehicles.push(createVehicle(vehicleColors[2], 'x', -1, -1.5, 20));
vehicles.push(createVehicle(vehicleColors[3], 'x', -1, -1.5, 35));

// Z-axis vehicles
vehicles.push(createVehicle(vehicleColors[4], 'z', 1, 1.5, -25));
vehicles.push(createVehicle(vehicleColors[5], 'z', 1, 1.5, -5));
vehicles.push(createVehicle(vehicleColors[6], 'z', -1, -1.5, 15));
vehicles.push(createVehicle(vehicleColors[7], 'z', -1, -1.5, 30));

// ============ TRAFFIC LIGHTS ============
const LIGHT_SPOTS = [
  { x: 3, z: 3 },
  { x: -3, z: 3 },
  { x: 3, z: -3 },
  { x: -3, z: -3 }
];

const placedLights = {}; // key: "x,z" -> { group, sphere, state: 'red'|'green', spotIndex }

function createTrafficLight(x, z) {
  const group = new THREE.Group();

  // Pole
  const poleGeo = new THREE.CylinderGeometry(0.3, 0.3, 3, 12);
  const poleMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.5 });
  const pole = new THREE.Mesh(poleGeo, poleMat);
  pole.position.y = 1.5;
  pole.castShadow = true;
  group.add(pole);

  // Housing
  const housingGeo = new THREE.BoxGeometry(0.8, 1.2, 0.8);
  const housingMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
  const housing = new THREE.Mesh(housingGeo, housingMat);
  housing.position.y = 3.2;
  group.add(housing);

  // Light sphere
  const sphereGeo = new THREE.SphereGeometry(0.5, 16, 16);
  const sphereMat = new THREE.MeshStandardMaterial({
    color: 0xff0000,
    emissive: 0xff0000,
    emissiveIntensity: 0.8
  });
  const sphere = new THREE.Mesh(sphereGeo, sphereMat);
  sphere.position.y = 3.5;
  group.add(sphere);

  // Point light for glow
  const pointLight = new THREE.PointLight(0xff0000, 2, 8);
  pointLight.position.y = 3.5;
  group.add(pointLight);

  group.position.set(x, 0, z);
  scene.add(group);

  return { group, sphere, pointLight, state: 'red' };
}

function setLightState(lightObj, state) {
  lightObj.state = state;
  const color = state === 'red' ? 0xff0000 : 0x00ff00;
  lightObj.sphere.material.color.setHex(color);
  lightObj.sphere.material.emissive.setHex(color);
  lightObj.pointLight.color.setHex(color);
}

function getKey(x, z) {
  return `${x},${z}`;
}

// ============ UNDO/REDO SYSTEM ============
const MAX_HISTORY = 20;
let undoStack = [];
let redoStack = [];

function recordAction(action) {
  undoStack.push(action);
  if (undoStack.length > MAX_HISTORY) {
    undoStack.shift();
  }
  redoStack = [];
}

function executeAction(action) {
  const key = getKey(action.x, action.z);
  if (action.type === 'place') {
    const lightObj = createTrafficLight(action.x, action.z);
    lightObj.spotIndex = action.spotIndex;
    placedLights[key] = lightObj;
  } else if (action.type === 'remove') {
    const lightObj = placedLights[key];
    if (lightObj) {
      scene.remove(lightObj.group);
      delete placedLights[key];
    }
  } else if (action.type === 'toggle') {
    const lightObj = placedLights[key];
    if (lightObj) {
      setLightState(lightObj, action.newState);
    }
  }
}

function reverseAction(action) {
  const key = getKey(action.x, action.z);
  if (action.type === 'place') {
    // Reverse of place is remove
    const lightObj = placedLights[key];
    if (lightObj) {
      scene.remove(lightObj.group);
      delete placedLights[key];
    }
  } else if (action.type === 'remove') {
    // Reverse of remove is place (restore with previous state)
    const lightObj = createTrafficLight(action.x, action.z);
    lightObj.spotIndex = action.spotIndex;
    setLightState(lightObj, action.prevState || 'red');
    placedLights[key] = lightObj;
  } else if (action.type === 'toggle') {
    const lightObj = placedLights[key];
    if (lightObj) {
      setLightState(lightObj, action.oldState);
    }
  }
}

function undo() {
  if (undoStack.length === 0) return;
  const action = undoStack.pop();
  reverseAction(action);
  redoStack.push(action);
}

function redo() {
  if (redoStack.length === 0) return;
  const action = redoStack.pop();
  executeAction(action);
  undoStack.push(action);
}

// ============ INTERACTION ============
let isPaused = false;
let speed = 5;
let simTime = 0;

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Click to toggle traffic light
renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Check if clicked on any traffic light
  for (const key in placedLights) {
    const lightObj = placedLights[key];
    const intersects = raycaster.intersectObjects(lightObj.group.children, true);
    if (intersects.length > 0) {
      const oldState = lightObj.state;
      const newState = oldState === 'red' ? 'green' : 'red';
      const [x, z] = key.split(',').map(Number);
      const action = { type: 'toggle', x, z, oldState, newState };
      setLightState(lightObj, newState);
      recordAction(action);
      return;
    }
  }
});

// Place light buttons
for (let i = 0; i < 4; i++) {
  document.getElementById(`placeLight${i}`).addEventListener('click', () => {
    const spot = LIGHT_SPOTS[i];
    const key = getKey(spot.x, spot.z);

    if (placedLights[key]) {
      // Remove
      const prevState = placedLights[key].state;
      const action = { type: 'remove', x: spot.x, z: spot.z, spotIndex: i, prevState };
      scene.remove(placedLights[key].group);
      delete placedLights[key];
      recordAction(action);
    } else {
      // Place
      const action = { type: 'place', x: spot.x, z: spot.z, spotIndex: i };
      const lightObj = createTrafficLight(spot.x, spot.z);
      lightObj.spotIndex = i;
      placedLights[key] = lightObj;
      recordAction(action);
    }
  });
}

// Undo/Redo buttons
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('redoBtn').addEventListener('click', redo);

// Speed slider
const speedSlider = document.getElementById('speedSlider');
const speedVal = document.getElementById('speedVal');
speedSlider.addEventListener('input', () => {
  speed = parseInt(speedSlider.value);
  speedVal.textContent = speed;
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    isPaused = !isPaused;
    document.getElementById('pauseIndicator').style.display = isPaused ? 'block' : 'none';
  } else if (e.code === 'KeyZ') {
    undo();
  } else if (e.code === 'KeyY') {
    redo();
  }
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ STATE ============
window.__3D_STATE__ = {
  vehicleCount: 8,
  vehiclePositions: [],
  stoppedCount: 0,
  lightsPlaced: 0,
  lightStates: [],
  historySize: 0,
  redoSize: 0,
  isPaused: false,
  speed: 5,
  pedestrianLoaded: false,
  simTime: 0
};

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function isVehicleStopped(vehicle) {
  for (const key in placedLights) {
    const lightObj = placedLights[key];
    if (lightObj.state !== 'red') continue;

    const [lx, lz] = key.split(',').map(Number);

    if (vehicle.axis === 'x') {
      // Check if light is near the road (z close to vehicle lane)
      if (Math.abs(lz - vehicle.laneOffset) < 5) {
        const vx = vehicle.mesh.position.x;
        if (vehicle.direction > 0) {
          const dist = lx - vx;
          if (dist > 0 && dist < 8) return true;
        } else {
          const dist = vx - lx;
          if (dist > 0 && dist < 8) return true;
        }
      }
    } else {
      // Z-axis vehicle
      if (Math.abs(lx - vehicle.laneOffset) < 5) {
        const vz = vehicle.mesh.position.z;
        if (vehicle.direction > 0) {
          const dist = lz - vz;
          if (dist > 0 && dist < 8) return true;
        } else {
          const dist = vz - lz;
          if (dist > 0 && dist < 8) return true;
        }
      }
    }
  }
  return false;
}

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  controls.update();

  if (pedestrianMixer) {
    pedestrianMixer.update(delta);
  }

  if (!isPaused) {
    simTime += delta;

    let stoppedCount = 0;

    for (const v of vehicles) {
      v.stopped = isVehicleStopped(v);
      if (v.stopped) {
        stoppedCount++;
        continue;
      }

      if (v.axis === 'x') {
        v.mesh.position.x += v.direction * speed * delta;
        if (v.mesh.position.x > 45) v.mesh.position.x = -45;
        if (v.mesh.position.x < -45) v.mesh.position.x = 45;
      } else {
        v.mesh.position.z += v.direction * speed * delta;
        if (v.mesh.position.z > 45) v.mesh.position.z = -45;
        if (v.mesh.position.z < -45) v.mesh.position.z = 45;
      }
    }

    // Update HUD
    document.getElementById('stoppedDisplay').textContent = stoppedCount;
  }

  // Update HUD (always)
  const lightsCount = Object.keys(placedLights).length;
  document.getElementById('lightsDisplay').textContent = lightsCount;
  document.getElementById('historyDisplay').textContent = undoStack.length;
  document.getElementById('timeDisplay').textContent = simTime.toFixed(1) + 's';

  // Update button labels
  for (let i = 0; i < 4; i++) {
    const spot = LIGHT_SPOTS[i];
    const key = getKey(spot.x, spot.z);
    const btn = document.getElementById(`placeLight${i}`);
    if (placedLights[key]) {
      btn.textContent = `🗑 Remove (${spot.x}, ${spot.z})`;
    } else {
      btn.textContent = `💡 Light (${spot.x}, ${spot.z})`;
    }
  }

  // Update state
  let stoppedNow = 0;
  const positions = [];
  const lightStates = [];

  for (const v of vehicles) {
    positions.push({ x: v.mesh.position.x, z: v.mesh.position.z });
    if (v.stopped) stoppedNow++;
  }

  for (const key in placedLights) {
    const [x, z] = key.split(',').map(Number);
    lightStates.push({ position: { x, z }, color: placedLights[key].state });
  }

  window.__3D_STATE__ = {
    vehicleCount: 8,
    vehiclePositions: positions,
    stoppedCount: stoppedNow,
    lightsPlaced: lightsCount,
    lightStates,
    historySize: undoStack.length,
    redoSize: redoStack.length,
    isPaused,
    speed,
    pedestrianLoaded,
    simTime
  };

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
