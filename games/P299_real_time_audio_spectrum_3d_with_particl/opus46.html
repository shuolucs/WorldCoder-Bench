<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Audio Spectrum Visualizer</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
  }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: #fff;
    padding: 15px;
    border-radius: 8px;
    min-width: 220px;
    z-index: 100;
  }
  #hud label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
  }
  #hud button, #hud select {
    display: block;
    width: 100%;
    padding: 8px;
    margin-bottom: 8px;
    border: 1px solid #555;
    border-radius: 4px;
    background: #222;
    color: #fff;
    cursor: pointer;
    font-size: 13px;
  }
  #hud button:hover, #hud select:hover {
    background: #333;
  }
  #hud input[type="range"] {
    width: 100%;
    margin-bottom: 8px;
  }
  #energyLabel {
    font-size: 14px;
    margin-bottom: 10px;
    color: #0ff;
  }
  .slider-label {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 4px;
  }
</style>
</head>
<body>

<div id="hud">
  <div id="energyLabel">Average Energy: 0.0</div>
  <button id="toggleRotation">Pause Rotation</button>
  <button id="toggleParticles">Hide Particles</button>
  <label for="barShape" style="font-size:12px; color:#aaa;">Layout:</label>
  <select id="barShape">
    <option value="circle" selected>circle</option>
    <option value="line">line</option>
    <option value="grid">grid</option>
  </select>
  <div class="slider-label">Sensitivity: <span id="sensVal">1.0</span></div>
  <input type="range" id="sensitivity" min="0.5" max="3.0" step="0.1" value="1.0">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  // State
  window.__3D_STATE__ = {
    barCount: 64,
    averageEnergy: 0,
    isRotating: true,
    particlesVisible: true,
    layout: 'circle',
    sensitivity: 1.0,
    frameCount: 0,
    maxBarHeight: 0,
    particleCount: 2000,
    cameraDistance: 0
  };

  const state = window.__3D_STATE__;

  // Scene
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  // Camera
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 30, 60);
  camera.lookAt(0, 0, 0);

  // Renderer
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // Controls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;

  // Lights
  const ambientLight = new THREE.AmbientLight(0x404040);
  scene.add(ambientLight);

  const blueLight = new THREE.PointLight(0x4444ff, 1, 200);
  blueLight.position.set(50, 50, 50);
  scene.add(blueLight);

  const magentaLight = new THREE.PointLight(0xff44ff, 1, 200);
  magentaLight.position.set(-50, 50, -50);
  scene.add(magentaLight);

  // Bar group
  const barGroup = new THREE.Group();
  scene.add(barGroup);

  // Create bars
  const bars = [];
  const barGeometry = new THREE.BoxGeometry(0.8, 1, 0.8);
  barGeometry.translate(0, 0.5, 0); // Move pivot to bottom

  for (let i = 0; i < 64; i++) {
    const hue = (i / 64);
    const material = new THREE.MeshPhongMaterial({
      color: new THREE.Color().setHSL(hue, 1.0, 0.5),
      shininess: 80
    });
    const mesh = new THREE.Mesh(barGeometry, material);
    bars.push(mesh);
    barGroup.add(mesh);
  }

  // Position bars in circle layout initially
  function arrangeCircle() {
    for (let i = 0; i < 64; i++) {
      const angle = (i / 64) * Math.PI * 2;
      bars[i].position.set(
        Math.cos(angle) * 20,
        0,
        Math.sin(angle) * 20
      );
      bars[i].rotation.set(0, 0, 0);
    }
  }

  function arrangeLine() {
    for (let i = 0; i < 64; i++) {
      bars[i].position.set(-32 + i * 1.0, 0, 0);
      bars[i].rotation.set(0, 0, 0);
    }
  }

  function arrangeGrid() {
    for (let i = 0; i < 64; i++) {
      const row = Math.floor(i / 8);
      const col = i % 8;
      bars[i].position.set(
        (col - 3.5) * 3.0,
        0,
        (row - 3.5) * 3.0
      );
      bars[i].rotation.set(0, 0, 0);
    }
  }

  arrangeCircle();

  // Particle texture
  function createParticleTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 32;
    canvas.height = 32;
    const ctx = canvas.getContext('2d');
    const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
    gradient.addColorStop(0, 'rgba(255,255,255,1)');
    gradient.addColorStop(0.3, 'rgba(255,255,255,0.8)');
    gradient.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 32, 32);
    const texture = new THREE.CanvasTexture(canvas);
    return texture;
  }

  // Particle system
  const particleCount = 2000;
  const particleGeometry = new THREE.BufferGeometry();
  const particlePositions = new Float32Array(particleCount * 3);
  const particleColors = new Float32Array(particleCount * 3);
  const particleAngles = new Float32Array(particleCount);
  const particleRadii = new Float32Array(particleCount);
  const particleHeights = new Float32Array(particleCount);
  const particlePhases = new Float32Array(particleCount);

  for (let i = 0; i < particleCount; i++) {
    particleAngles[i] = Math.random() * Math.PI * 2;
    particleRadii[i] = 15 + Math.random() * 20;
    particleHeights[i] = (Math.random() - 0.5) * 30;
    particlePhases[i] = Math.random() * Math.PI * 2;

    const angle = particleAngles[i];
    const radius = particleRadii[i];
    particlePositions[i * 3] = Math.cos(angle) * radius;
    particlePositions[i * 3 + 1] = particleHeights[i];
    particlePositions[i * 3 + 2] = Math.sin(angle) * radius;

    const hue = Math.random();
    const color = new THREE.Color().setHSL(hue, 1.0, 0.6);
    particleColors[i * 3] = color.r;
    particleColors[i * 3 + 1] = color.g;
    particleColors[i * 3 + 2] = color.b;
  }

  particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
  particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

  const particleMaterial = new THREE.PointsMaterial({
    size: 0.8,
    map: createParticleTexture(),
    transparent: true,
    opacity: 0.8,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    vertexColors: true,
    sizeAttenuation: true
  });

  const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
  scene.add(particleSystem);

  // Frequency data
  const frequencyData = new Float32Array(64);

  // UI
  const energyLabel = document.getElementById('energyLabel');
  const toggleRotationBtn = document.getElementById('toggleRotation');
  const toggleParticlesBtn = document.getElementById('toggleParticles');
  const barShapeSelect = document.getElementById('barShape');
  const sensitivitySlider = document.getElementById('sensitivity');
  const sensValSpan = document.getElementById('sensVal');

  toggleRotationBtn.addEventListener('click', () => {
    state.isRotating = !state.isRotating;
    toggleRotationBtn.textContent = state.isRotating ? 'Pause Rotation' : 'Resume Rotation';
  });

  toggleParticlesBtn.addEventListener('click', () => {
    state.particlesVisible = !state.particlesVisible;
    particleSystem.visible = state.particlesVisible;
    toggleParticlesBtn.textContent = state.particlesVisible ? 'Hide Particles' : 'Show Particles';
  });

  barShapeSelect.addEventListener('change', (e) => {
    state.layout = e.target.value;
    switch (state.layout) {
      case 'circle': arrangeCircle(); break;
      case 'line': arrangeLine(); break;
      case 'grid': arrangeGrid(); break;
    }
  });

  sensitivitySlider.addEventListener('input', (e) => {
    state.sensitivity = parseFloat(e.target.value);
    sensValSpan.textContent = state.sensitivity.toFixed(1);
  });

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Animation loop
  function animate() {
    requestAnimationFrame(animate);

    state.frameCount++;
    const t = state.frameCount;
    const sensitivity = state.sensitivity;

    // Simulate audio data
    let totalEnergy = 0;
    let maxHeight = 0;

    for (let i = 0; i < 64; i++) {
      const val = (Math.sin(t * 0.02 + i * 0.3) * 0.5 + 0.5) *
                  (Math.sin(t * 0.05 + i * 0.1) * 0.5 + 0.5) * 20 * sensitivity;
      frequencyData[i] = val;
      const scaleY = Math.max(1, val);
      bars[i].scale.y = scaleY;

      // Update color based on height
      const hue = (i / 64);
      bars[i].material.color.setHSL(hue, 1.0, 0.5);
      bars[i].material.emissive.setHSL(hue, 0.5, scaleY / 60);

      totalEnergy += val;
      if (scaleY > maxHeight) maxHeight = scaleY;
    }

    state.averageEnergy = totalEnergy / 64;
    state.maxBarHeight = maxHeight;

    // Update energy label
    energyLabel.textContent = 'Average Energy: ' + state.averageEnergy.toFixed(1);

    // Auto-rotate bar group
    if (state.isRotating) {
      barGroup.rotation.y += 0.005;
    }

    // Update particles
    const positions = particleGeometry.attributes.position.array;
    const colors = particleGeometry.attributes.color.array;
    const avgEnergy = state.averageEnergy;

    for (let i = 0; i < particleCount; i++) {
      particleAngles[i] += 0.002 + i * 0.00001;

      const angle = particleAngles[i];
      const torusAngle = particlePhases[i] + t * 0.01;
      const mainRadius = 25;
      const tubeRadius = 8 + avgEnergy * 0.3;

      const x = (mainRadius + tubeRadius * Math.cos(torusAngle)) * Math.cos(angle);
      const y = tubeRadius * Math.sin(torusAngle) + 10;
      const z = (mainRadius + tubeRadius * Math.cos(torusAngle)) * Math.sin(angle);

      positions[i * 3] = x;
      positions[i * 3 + 1] = y;
      positions[i * 3 + 2] = z;

      // Shift colors over time
      const hue = ((i / particleCount) + t * 0.001) % 1.0;
      const color = new THREE.Color().setHSL(hue, 1.0, 0.5 + avgEnergy * 0.01);
      colors[i * 3] = color.r;
      colors[i * 3 + 1] = color.g;
      colors[i * 3 + 2] = color.b;
    }

    particleGeometry.attributes.position.needsUpdate = true;
    particleGeometry.attributes.color.needsUpdate = true;

    // Pulse particle size based on average energy
    particleMaterial.size = 0.5 + avgEnergy * 0.1;

    // Update camera distance
    state.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));

    // Update controls
    controls.update();

    renderer.render(scene, camera);
  }

  animate();
})();
</script>
</body>
</html>
