<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D Audio Spectrum Visualizer</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(20, 20, 20, 0.75);
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      min-width: 220px;
      box-shadow: 0 0 12px rgba(255,255,255,0.08);
      backdrop-filter: blur(4px);
    }

    #hud .row {
      margin-bottom: 10px;
    }

    #hud label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      color: #ddd;
    }

    #hud button,
    #hud select,
    #hud input[type="range"] {
      width: 100%;
      box-sizing: border-box;
    }

    #hud button,
    #hud select {
      background: #1f1f1f;
      color: #fff;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 8px;
      cursor: pointer;
    }

    #hud button:hover,
    #hud select:hover {
      border-color: #777;
    }

    #energyLabel {
      font-weight: bold;
      color: #8fd3ff;
      font-size: 14px;
    }

    #sensitivityValue {
      color: #ffb6ff;
      font-size: 12px;
      margin-top: 4px;
      display: block;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="row" id="energyLabel">Average Energy: 0.0</div>

    <div class="row">
      <button id="toggleRotation">Pause Rotation</button>
    </div>

    <div class="row">
      <button id="toggleParticles">Hide Particles</button>
    </div>

    <div class="row">
      <label for="barShape">Bar Layout</label>
      <select id="barShape">
        <option value="circle" selected>circle</option>
        <option value="line">line</option>
        <option value="grid">grid</option>
      </select>
    </div>

    <div class="row">
      <label for="sensitivity">Sensitivity</label>
      <input id="sensitivity" type="range" min="0.5" max="3.0" step="0.1" value="1.0" />
      <span id="sensitivityValue">1.0x</span>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 30, 60);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 10, 0);
    controls.enableDamping = true;

    // Lights
    scene.add(new THREE.AmbientLight(0x404040));

    const blueLight = new THREE.PointLight(0x4444ff, 1.6, 300);
    blueLight.position.set(50, 50, 50);
    scene.add(blueLight);

    const magentaLight = new THREE.PointLight(0xff44ff, 1.6, 300);
    magentaLight.position.set(-50, 50, -50);
    scene.add(magentaLight);

    // State
    const BAR_COUNT = 64;
    const PARTICLE_COUNT = 2000;

    let frameCount = 0;
    let isRotating = true;
    let particlesVisible = true;
    let currentLayout = "circle";
    let sensitivity = 1.0;

    const frequencies = new Array(BAR_COUNT).fill(1);

    // Exposed state
    window.__3D_STATE__ = {
      barCount: BAR_COUNT,
      averageEnergy: 0,
      isRotating,
      particlesVisible,
      layout: currentLayout,
      sensitivity,
      frameCount,
      maxBarHeight: 1,
      particleCount: PARTICLE_COUNT,
      cameraDistance: camera.position.length()
    };

    // Bar group
    const barGroup = new THREE.Group();
    scene.add(barGroup);

    // Geometry with bottom at origin
    const barGeometry = new THREE.BoxGeometry(0.8, 1, 0.8);
    barGeometry.translate(0, 0.5, 0);

    const bars = [];
    for (let i = 0; i < BAR_COUNT; i++) {
      const hue = i / BAR_COUNT;
      const material = new THREE.MeshPhongMaterial({
        color: new THREE.Color().setHSL(hue, 1.0, 0.5),
        shininess: 80
      });

      const bar = new THREE.Mesh(barGeometry, material);
      bar.castShadow = false;
      bar.receiveShadow = false;
      bars.push(bar);
      barGroup.add(bar);
    }

    function applyLayout(layout) {
      currentLayout = layout;

      if (layout === "circle") {
        const radius = 20;
        for (let i = 0; i < BAR_COUNT; i++) {
          const angle = (i / BAR_COUNT) * Math.PI * 2;
          bars[i].position.set(
            Math.cos(angle) * radius,
            0,
            Math.sin(angle) * radius
          );
          bars[i].rotation.set(0, -angle, 0);
        }
      } else if (layout === "line") {
        for (let i = 0; i < BAR_COUNT; i++) {
          bars[i].position.set(i - 32, 0, 0);
          bars[i].rotation.set(0, 0, 0);
        }
      } else if (layout === "grid") {
        const spacing = 3.0;
        const size = 8;
        const offset = ((size - 1) * spacing) / 2;
        for (let i = 0; i < BAR_COUNT; i++) {
          const row = Math.floor(i / size);
          const col = i % size;
          bars[i].position.set(
            col * spacing - offset,
            0,
            row * spacing - offset
          );
          bars[i].rotation.set(0, 0, 0);
        }
      }
    }

    applyLayout("circle");

    // Particle texture
    function createParticleTexture() {
      const size = 128;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      const gradient = ctx.createRadialGradient(
        size / 2, size / 2, 0,
        size / 2, size / 2, size / 2
      );
      gradient.addColorStop(0.0, "rgba(255,255,255,1)");
      gradient.addColorStop(0.25, "rgba(255,255,255,0.95)");
      gradient.addColorStop(0.6, "rgba(255,255,255,0.35)");
      gradient.addColorStop(1.0, "rgba(255,255,255,0)");

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    const particleTexture = createParticleTexture();

    const particleGeometry = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
    const particleColors = new Float32Array(PARTICLE_COUNT * 3);
    const particleSizes = new Float32Array(PARTICLE_COUNT);
    const particleAngles = new Float32Array(PARTICLE_COUNT);
    const particleRadii = new Float32Array(PARTICLE_COUNT);
    const particleHeights = new Float32Array(PARTICLE_COUNT);
    const particlePhase = new Float32Array(PARTICLE_COUNT);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const angle = (i / PARTICLE_COUNT) * Math.PI * 2 * 8;
      const torusRadius = 24 + Math.sin(i * 0.17) * 5;
      const height = Math.sin(i * 0.11) * 8 + Math.cos(i * 0.037) * 3;

      particleAngles[i] = angle;
      particleRadii[i] = torusRadius;
      particleHeights[i] = height;
      particlePhase[i] = Math.random() * Math.PI * 2;
      particleSizes[i] = 6;

      const x = Math.cos(angle) * torusRadius;
      const y = height;
      const z = Math.sin(angle) * torusRadius;

      particlePositions[i * 3 + 0] = x;
      particlePositions[i * 3 + 1] = y;
      particlePositions[i * 3 + 2] = z;

      const color = new THREE.Color().setHSL((i / PARTICLE_COUNT), 1.0, 0.6);
      particleColors[i * 3 + 0] = color.r;
      particleColors[i * 3 + 1] = color.g;
      particleColors[i * 3 + 2] = color.b;
    }

    particleGeometry.setAttribute("position", new THREE.BufferAttribute(particlePositions, 3));
    particleGeometry.setAttribute("color", new THREE.BufferAttribute(particleColors, 3));
    particleGeometry.setAttribute("aSize", new THREE.BufferAttribute(particleSizes, 1));

    const particleMaterial = new THREE.ShaderMaterial({
      uniforms: {
        uPointTexture: { value: particleTexture },
        uPixelRatio: { value: renderer.getPixelRatio() }
      },
      vertexShader: `
        attribute float aSize;
        varying vec3 vColor;
        void main() {
          vColor = color;
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = aSize * uPixelRatio * (300.0 / -mvPosition.z);
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        uniform sampler2D uPointTexture;
        varying vec3 vColor;
        void main() {
          vec4 tex = texture2D(uPointTexture, gl_PointCoord);
          gl_FragColor = vec4(vColor, 1.0) * tex;
          if (gl_FragColor.a < 0.01) discard;
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      vertexColors: true
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    // UI
    const energyLabel = document.getElementById("energyLabel");
    const toggleRotationBtn = document.getElementById("toggleRotation");
    const toggleParticlesBtn = document.getElementById("toggleParticles");
    const barShapeSelect = document.getElementById("barShape");
    const sensitivitySlider = document.getElementById("sensitivity");
    const sensitivityValue = document.getElementById("sensitivityValue");

    toggleRotationBtn.addEventListener("click", () => {
      isRotating = !isRotating;
      toggleRotationBtn.textContent = isRotating ? "Pause Rotation" : "Resume Rotation";
    });

    toggleParticlesBtn.addEventListener("click", () => {
      particlesVisible = !particlesVisible;
      particles.visible = particlesVisible;
      toggleParticlesBtn.textContent = particlesVisible ? "Hide Particles" : "Show Particles";
    });

    barShapeSelect.addEventListener("change", (e) => {
      applyLayout(e.target.value);
    });

    sensitivitySlider.addEventListener("input", (e) => {
      sensitivity = parseFloat(e.target.value);
      sensitivityValue.textContent = sensitivity.toFixed(1) + "x";
    });

    // Animation
    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      let averageEnergy = 0;
      let maxBarHeight = 0;

      // Simulated audio
      for (let i = 0; i < BAR_COUNT; i++) {
        const value =
          (Math.sin(frameCount * 0.02 + i * 0.3) * 0.5 + 0.5) *
          (Math.sin(frameCount * 0.05 + i * 0.1) * 0.5 + 0.5) *
          20 *
          sensitivity;

        frequencies[i] = value;

        const height = Math.max(1, value);
        bars[i].scale.y = height;

        averageEnergy += value;
        if (height > maxBarHeight) maxBarHeight = height;
      }

      averageEnergy /= BAR_COUNT;
      energyLabel.textContent = `Average Energy: ${averageEnergy.toFixed(1)}`;

      if (isRotating) {
        barGroup.rotation.y += 0.005;
      }

      // Particles
      if (particlesVisible) {
        const positions = particleGeometry.attributes.position.array;
        const colors = particleGeometry.attributes.color.array;
        const sizes = particleGeometry.attributes.aSize.array;

        for (let i = 0; i < PARTICLE_COUNT; i++) {
          particleAngles[i] += 0.002 + i * 0.00001;

          const angle = particleAngles[i];
          const minorWave = Math.sin(frameCount * 0.02 + i * 0.03 + particlePhase[i]) * 2.5;
          const radius = particleRadii[i] + minorWave;
          const y = particleHeights[i] + Math.sin(angle * 2.0 + frameCount * 0.01) * 2.0;

          positions[i * 3 + 0] = Math.cos(angle) * radius;
          positions[i * 3 + 1] = y;
          positions[i * 3 + 2] = Math.sin(angle) * radius;

          const hue = (frameCount * 0.002 + i / PARTICLE_COUNT) % 1;
          const color = new THREE.Color().setHSL(hue, 1.0, 0.6);
          colors[i * 3 + 0] = color.r;
          colors[i * 3 + 1] = color.g;
          colors[i * 3 + 2] = color.b;

          sizes[i] = 4 + (averageEnergy / 20) * 10 + Math.sin(frameCount * 0.05 + i * 0.1) * 1.5;
        }

        particleGeometry.attributes.position.needsUpdate = true;
        particleGeometry.attributes.color.needsUpdate = true;
        particleGeometry.attributes.aSize.needsUpdate = true;
      }

      controls.update();
      renderer.render(scene, camera);

      // Update exposed state
      window.__3D_STATE__.barCount = BAR_COUNT;
      window.__3D_STATE__.averageEnergy = averageEnergy;
      window.__3D_STATE__.isRotating = isRotating;
      window.__3D_STATE__.particlesVisible = particlesVisible;
      window.__3D_STATE__.layout = currentLayout;
      window.__3D_STATE__.sensitivity = sensitivity;
      window.__3D_STATE__.frameCount = frameCount;
      window.__3D_STATE__.maxBarHeight = maxBarHeight;
      window.__3D_STATE__.particleCount = PARTICLE_COUNT;
      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
    }

    animate();

    // Resize handling
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      particleMaterial.uniforms.uPixelRatio.value = renderer.getPixelRatio();
    });
  </script>
</body>
</html>
