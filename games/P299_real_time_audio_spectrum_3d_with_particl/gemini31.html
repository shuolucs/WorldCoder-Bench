<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Audio Spectrum Visualizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(20, 20, 20, 0.85);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #444;
            width: 220px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #ccc;
        }
        #energyLabel {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 15px;
            text-align: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 6px;
        }
        button, select, input[type="range"] {
            width: 100%;
            box-sizing: border-box;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        button:hover, select:hover {
            background: #4a4a4a;
        }
        input[type="range"] {
            padding: 0;
            cursor: ew-resize;
        }
    </style>
    <!-- Import Three.js and OrbitControls -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div id="energyLabel">Average Energy: 0.0</div>
        <div class="control-group">
            <button id="toggleRotation">Pause Rotation</button>
        </div>
        <div class="control-group">
            <button id="toggleParticles">Hide Particles</button>
        </div>
        <div class="control-group">
            <label for="barShape">Layout</label>
            <select id="barShape">
                <option value="circle">Circle</option>
                <option value="line">Line</option>
                <option value="grid">Grid</option>
            </select>
        </div>
        <div class="control-group">
            <label for="sensitivity">Sensitivity</label>
            <input type="range" id="sensitivity" min="0.5" max="3.0" step="0.1" value="1.0">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // State Management
        window.__3D_STATE__ = {
            barCount: 64,
            averageEnergy: 0,
            isRotating: true,
            particlesVisible: true,
            layout: 'circle',
            sensitivity: 1.0,
            frameCount: 0,
            maxBarHeight: 0,
            particleCount: 2000,
            cameraDistance: 0
        };

        const state = window.__3D_STATE__;

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 60);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);

        const pointLight1 = new THREE.PointLight(0x4444ff, 2, 200);
        pointLight1.position.set(50, 50, 50);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xff44ff, 2, 200);
        pointLight2.position.set(-50, 50, -50);
        scene.add(pointLight2);

        // Audio Spectrum Bars
        const barGroup = new THREE.Group();
        scene.add(barGroup);
        const bars = [];

        const barGeometry = new THREE.BoxGeometry(0.8, 1, 0.8);
        barGeometry.translate(0, 0.5, 0); // Pivot at bottom

        for (let i = 0; i < state.barCount; i++) {
            const hue = (i / state.barCount);
            const material = new THREE.MeshPhongMaterial({
                color: new THREE.Color().setHSL(hue, 1.0, 0.5),
                shininess: 50
            });
            const bar = new THREE.Mesh(barGeometry, material);
            barGroup.add(bar);
            bars.push(bar);
        }

        function updateBarLayout() {
            for (let i = 0; i < state.barCount; i++) {
                const bar = bars[i];
                if (state.layout === 'circle') {
                    const angle = (i / state.barCount) * Math.PI * 2;
                    bar.position.set(Math.cos(angle) * 20, 0, Math.sin(angle) * 20);
                } else if (state.layout === 'line') {
                    bar.position.set((i - 31.5) * 1.0, 0, 0);
                } else if (state.layout === 'grid') {
                    const row = Math.floor(i / 8);
                    const col = i % 8;
                    bar.position.set((col - 3.5) * 3.0, 0, (row - 3.5) * 3.0);
                }
            }
        }
        updateBarLayout();

        // Particle System
        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.5, 'rgba(255,255,255,0.5)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        }

        const particleGeo = new THREE.BufferGeometry();
        const particlePos = new Float32Array(state.particleCount * 3);
        const particleColors = new Float32Array(state.particleCount * 3);
        const particleData = [];

        for (let i = 0; i < state.particleCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const radius = 22 + Math.random() * 15;
            const yOffset = Math.sin(theta * 4) * 6 + (Math.random() - 0.5) * 20;
            
            particleData.push({
                theta: theta,
                radius: radius,
                yOffset: yOffset,
                speed: 0.002 + i * 0.00001
            });

            particlePos[i * 3] = Math.cos(theta) * radius;
            particlePos[i * 3 + 1] = yOffset;
            particlePos[i * 3 + 2] = Math.sin(theta) * radius;

            const color = new THREE.Color().setHSL(Math.random(), 0.8, 0.6);
            particleColors[i * 3] = color.r;
            particleColors[i * 3 + 1] = color.g;
            particleColors[i * 3 + 2] = color.b;
        }

        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

        const particleMat = new THREE.PointsMaterial({
            size: 1.5,
            vertexColors: true,
            map: createCircleTexture(),
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // UI Event Listeners
        const btnRotation = document.getElementById('toggleRotation');
        btnRotation.addEventListener('click', () => {
            state.isRotating = !state.isRotating;
            btnRotation.textContent = state.isRotating ? 'Pause Rotation' : 'Resume Rotation';
        });

        const btnParticles = document.getElementById('toggleParticles');
        btnParticles.addEventListener('click', () => {
            state.particlesVisible = !state.particlesVisible;
            particles.visible = state.particlesVisible;
            btnParticles.textContent = state.particlesVisible ? 'Hide Particles' : 'Show Particles';
        });

        document.getElementById('barShape').addEventListener('change', (e) => {
            state.layout = e.target.value;
            updateBarLayout();
        });

        document.getElementById('sensitivity').addEventListener('input', (e) => {
            state.sensitivity = parseFloat(e.target.value);
        });

        const energyLabel = document.getElementById('energyLabel');

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const tempColor = new THREE.Color();

        function animate() {
            requestAnimationFrame(animate);

            state.frameCount++;
            const t = state.frameCount;
            
            let totalEnergy = 0;
            let currentMaxHeight = 0;

            // Update Bars (Simulated Audio)
            for (let i = 0; i < state.barCount; i++) {
                const freq = (Math.sin(t * 0.02 + i * 0.3) * 0.5 + 0.5) * 
                             (Math.sin(t * 0.05 + i * 0.1) * 0.5 + 0.5) * 
                             20 * state.sensitivity;
                
                const scaleY = Math.max(0.01, freq);
                bars[i].scale.y = scaleY;
                
                totalEnergy += freq;
                if (scaleY > currentMaxHeight) currentMaxHeight = scaleY;
            }

            state.averageEnergy = totalEnergy / state.barCount;
            state.maxBarHeight = currentMaxHeight;
            energyLabel.textContent = `Average Energy: ${state.averageEnergy.toFixed(1)}`;

            // Rotate Bar Group
            if (state.isRotating) {
                barGroup.rotation.y += 0.005;
            }

            // Update Particles
            if (state.particlesVisible) {
                const positions = particleGeo.attributes.position.array;
                const colors = particleGeo.attributes.color.array;

                for (let i = 0; i < state.particleCount; i++) {
                    const pData = particleData[i];
                    pData.theta += pData.speed;
                    
                    positions[i * 3] = Math.cos(pData.theta) * pData.radius;
                    positions[i * 3 + 2] = Math.sin(pData.theta) * pData.radius;

                    // Shift color
                    const hue = (t * 0.002 + i * 0.0005) % 1;
                    tempColor.setHSL(hue, 0.8, 0.6);
                    colors[i * 3] = tempColor.r;
                    colors[i * 3 + 1] = tempColor.g;
                    colors[i * 3 + 2] = tempColor.b;
                }

                particleGeo.attributes.position.needsUpdate = true;
                particleGeo.attributes.color.needsUpdate = true;

                // Pulse particle size
                particleMat.size = 1.0 + (state.averageEnergy * 0.15);
            }

            // Update Camera Distance State
            state.cameraDistance = camera.position.distanceTo(scene.position);

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
