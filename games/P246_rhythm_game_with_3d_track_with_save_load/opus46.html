<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Rhythm Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    pointer-events: none;
    z-index: 10;
}

#topBar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 15px 25px;
    background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
}

.hud-section {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.hud-label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.hud-value {
    font-size: 28px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
}

#judgmentDisplay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,0.5);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
}

#judgmentDisplay.perfect { color: #FFD700; text-shadow: 0 0 30px rgba(255,215,0,0.8); }
#judgmentDisplay.great { color: #00FF88; text-shadow: 0 0 30px rgba(0,255,136,0.8); }
#judgmentDisplay.good { color: #4488FF; text-shadow: 0 0 30px rgba(68,136,255,0.8); }
#judgmentDisplay.miss { color: #FF4444; text-shadow: 0 0 30px rgba(255,68,68,0.8); }

#statsBar {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 5px 25px;
}

.stat-item {
    font-size: 13px;
    color: #aaa;
}

.stat-item span {
    font-weight: bold;
    color: #fff;
}

.stat-perfect span { color: #FFD700; }
.stat-great span { color: #00FF88; }
.stat-good span { color: #4488FF; }
.stat-miss span { color: #FF4444; }

#buttonBar {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    pointer-events: all;
    z-index: 10;
}

#buttonBar button {
    padding: 10px 24px;
    font-size: 14px;
    font-weight: bold;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#buttonBar button:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.6);
}

#pauseOverlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 24px;
    color: rgba(255,255,255,0.7);
    text-align: center;
    pointer-events: none;
    z-index: 10;
}

#pauseOverlay .big {
    font-size: 36px;
    font-weight: bold;
    margin-bottom: 10px;
}

#laneHints {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 30px;
    pointer-events: none;
    z-index: 10;
}

.lane-hint {
    width: 44px;
    height: 44px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: bold;
    color: rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.4);
    transition: all 0.1s;
}

.lane-hint.active {
    border-color: #FFD700;
    color: #FFD700;
    background: rgba(255,215,0,0.15);
    box-shadow: 0 0 15px rgba(255,215,0,0.3);
}
</style>
</head>
<body>

<div id="hud">
    <div id="topBar">
        <div class="hud-section">
            <div class="hud-label">Score</div>
            <div class="hud-value" id="scoreDisplay">0</div>
        </div>
        <div class="hud-section" style="align-items:center;">
            <div class="hud-label">Combo</div>
            <div class="hud-value" id="comboDisplay">0</div>
        </div>
        <div class="hud-section" style="align-items:center;">
            <div class="hud-label">Multiplier</div>
            <div class="hud-value" id="multiplierDisplay">1x</div>
        </div>
        <div class="hud-section" style="align-items:flex-end;">
            <div class="hud-label">Time</div>
            <div class="hud-value" id="timeDisplay">0.0s</div>
        </div>
    </div>
    <div id="statsBar">
        <div class="stat-item stat-perfect">Perfect: <span id="perfectCount">0</span></div>
        <div class="stat-item stat-great">Great: <span id="greatCount">0</span></div>
        <div class="stat-item stat-good">Good: <span id="goodCount">0</span></div>
        <div class="stat-item stat-miss">Miss: <span id="missCount">0</span></div>
        <div class="stat-item">Remaining: <span id="notesRemaining">16</span></div>
    </div>
</div>

<div id="judgmentDisplay"></div>

<div id="pauseOverlay">
    <div class="big">PAUSED</div>
    <div>Press SPACE to start</div>
</div>

<div id="laneHints">
    <div class="lane-hint" id="hintD">D</div>
    <div class="lane-hint" id="hintF">F</div>
    <div class="lane-hint" id="hintJ">J</div>
    <div class="lane-hint" id="hintK">K</div>
</div>

<div id="buttonBar">
    <button id="saveBtn">Save</button>
    <button id="loadBtn">Load</button>
    <button id="resetBtn">Reset</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111122);
scene.fog = new THREE.Fog(0x111122, 30, 65);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 5, 10);
camera.lookAt(0, 0, -10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

// ============ TRACK ============
const trackGeom = new THREE.PlaneGeometry(4, 60);
const trackMat = new THREE.MeshStandardMaterial({
    color: 0x222222,
    roughness: 0.8,
    metalness: 0.2
});
const track = new THREE.Mesh(trackGeom, trackMat);
track.rotation.x = -Math.PI / 2;
track.position.set(0, -0.01, -22);
track.receiveShadow = true;
scene.add(track);

// Lane dividers
const dividerPositions = [-2, -1, 0, 1, 2];
dividerPositions.forEach(x => {
    const divGeom = new THREE.BoxGeometry(0.03, 0.02, 60);
    const divMat = new THREE.MeshStandardMaterial({ color: 0x555555, emissive: 0x222222 });
    const divider = new THREE.Mesh(divGeom, divMat);
    divider.position.set(x, 0, -22);
    scene.add(divider);
});

// Track edge glow
const edgeGeomL = new THREE.BoxGeometry(0.06, 0.05, 60);
const edgeMatL = new THREE.MeshStandardMaterial({ color: 0x4444ff, emissive: 0x2222aa });
const edgeL = new THREE.Mesh(edgeGeomL, edgeMatL);
edgeL.position.set(-2, 0, -22);
scene.add(edgeL);
const edgeR = new THREE.Mesh(edgeGeomL.clone(), edgeMatL.clone());
edgeR.position.set(2, 0, -22);
scene.add(edgeR);

// Lane centers
const laneCenters = [-1.5, -0.5, 0.5, 1.5];
const laneColors = [0xFF4444, 0x44FF44, 0x4488FF, 0xFFAA00];

// Receptor indicators at z=8
const receptors = [];
laneCenters.forEach((x, i) => {
    const ringGeom = new THREE.TorusGeometry(0.35, 0.05, 8, 24);
    const ringMat = new THREE.MeshStandardMaterial({
        color: laneColors[i],
        emissive: laneColors[i],
        emissiveIntensity: 0.3,
        transparent: true,
        opacity: 0.4
    });
    const ring = new THREE.Mesh(ringGeom, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(x, 0.05, 8);
    scene.add(ring);
    receptors.push(ring);
});

// Hit zone line
const hitLineGeom = new THREE.BoxGeometry(4, 0.02, 0.08);
const hitLineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.5, transparent: true, opacity: 0.3 });
const hitLine = new THREE.Mesh(hitLineGeom, hitLineMat);
hitLine.position.set(0, 0.01, 8);
scene.add(hitLine);

// Background stars
const starsGeom = new THREE.BufferGeometry();
const starsCount = 500;
const starsPos = new Float32Array(starsCount * 3);
for (let i = 0; i < starsCount; i++) {
    starsPos[i * 3] = (Math.random() - 0.5) * 100;
    starsPos[i * 3 + 1] = Math.random() * 40 + 5;
    starsPos[i * 3 + 2] = (Math.random() - 0.5) * 100 - 20;
}
starsGeom.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 });
const stars = new THREE.Points(starsGeom, starsMat);
scene.add(stars);

// ============ SONG CHART ============
const songChart = [
    {time: 1.0, lane: 0}, {time: 1.5, lane: 2}, {time: 2.0, lane: 1}, {time: 2.5, lane: 3},
    {time: 3.0, lane: 0}, {time: 3.5, lane: 1}, {time: 4.0, lane: 2}, {time: 4.5, lane: 3},
    {time: 5.0, lane: 0}, {time: 5.5, lane: 2}, {time: 6.0, lane: 1}, {time: 6.5, lane: 3},
    {time: 7.0, lane: 0}, {time: 7.5, lane: 1}, {time: 8.0, lane: 2}, {time: 8.5, lane: 3}
];

// ============ GAME STATE ============
let gameState = {
    gameStarted: false,
    paused: true,
    score: 0,
    combo: 0,
    maxCombo: 0,
    multiplier: 1,
    perfectCount: 0,
    greatCount: 0,
    goodCount: 0,
    missCount: 0,
    elapsedTime: 0,
    duckLane: 1,
    lastJudgment: 'None',
    gameComplete: false,
    noteStates: songChart.map(() => 'pending') // 'pending', 'active', 'hit', 'missed'
};

let judgmentTimer = 0;
const NOTE_SPEED = 10;
const HIT_Z = 8;
const MISS_Z = 12;
const SPAWN_Z = -50;

// Note meshes
const noteMeshes = [];
const noteTrails = [];

function createNoteMesh(laneIndex) {
    const group = new THREE.Group();
    
    const sphereGeom = new THREE.SphereGeometry(0.3, 16, 16);
    const sphereMat = new THREE.MeshStandardMaterial({
        color: laneColors[laneIndex],
        emissive: laneColors[laneIndex],
        emissiveIntensity: 0.5,
        metalness: 0.3,
        roughness: 0.4
    });
    const sphere = new THREE.Mesh(sphereGeom, sphereMat);
    group.add(sphere);

    // Glow
    const glowGeom = new THREE.SphereGeometry(0.4, 16, 16);
    const glowMat = new THREE.MeshBasicMaterial({
        color: laneColors[laneIndex],
        transparent: true,
        opacity: 0.2
    });
    const glow = new THREE.Mesh(glowGeom, glowMat);
    group.add(glow);

    group.visible = false;
    scene.add(group);
    return group;
}

songChart.forEach((note, i) => {
    const mesh = createNoteMesh(note.lane);
    mesh.position.set(laneCenters[note.lane], 0.3, SPAWN_Z);
    noteMeshes.push(mesh);
});

// Hit effect particles
function createHitEffect(x, z, color) {
    const particles = [];
    for (let i = 0; i < 12; i++) {
        const geom = new THREE.SphereGeometry(0.08, 6, 6);
        const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 1 });
        const p = new THREE.Mesh(geom, mat);
        p.position.set(x, 0.3, z);
        p.userData.vel = new THREE.Vector3(
            (Math.random() - 0.5) * 4,
            Math.random() * 3 + 1,
            (Math.random() - 0.5) * 4
        );
        p.userData.life = 1.0;
        scene.add(p);
        particles.push(p);
    }
    return particles;
}

let activeParticles = [];

// ============ DUCK ============
let duckModel = null;
let duckMixer = null;

const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/Duck/glTF-Binary/Duck.glb',
    (gltf) => {
        duckModel = gltf.scene;
        duckModel.scale.set(0.4, 0.4, 0.4);
        duckModel.position.set(laneCenters[gameState.duckLane], 0, HIT_Z);
        duckModel.rotation.y = Math.PI;
        scene.add(duckModel);

        if (gltf.animations && gltf.animations.length > 0) {
            duckMixer = new THREE.AnimationMixer(duckModel);
            const action = duckMixer.clipAction(gltf.animations[0]);
            action.play();
        }
    },
    undefined,
    (error) => {
        console.warn('Could not load Duck.glb, using placeholder');
        // Create placeholder duck
        const duckGroup = new THREE.Group();
        const bodyGeom = new THREE.SphereGeometry(0.4, 16, 16);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xFFDD00 });
        const body = new THREE.Mesh(bodyGeom, bodyMat);
        body.position.y = 0.4;
        duckGroup.add(body);

        const headGeom = new THREE.SphereGeometry(0.25, 16, 16);
        const head = new THREE.Mesh(headGeom, bodyMat);
        head.position.set(0, 0.75, -0.2);
        duckGroup.add(head);

        const beakGeom = new THREE.ConeGeometry(0.1, 0.25, 8);
        const beakMat = new THREE.MeshStandardMaterial({ color: 0xFF8800 });
        const beak = new THREE.Mesh(beakGeom, beakMat);
        beak.rotation.x = Math.PI / 2;
        beak.position.set(0, 0.7, -0.45);
        duckGroup.add(beak);

        duckGroup.position.set(laneCenters[gameState.duckLane], 0, HIT_Z);
        scene.add(duckGroup);
        duckModel = duckGroup;
    }
);

// ============ GAME LOGIC ============
function getMultiplier(combo) {
    if (combo >= 30) return 4;
    if (combo >= 20) return 3;
    if (combo >= 10) return 2;
    return 1;
}

function showJudgment(text) {
    const el = document.getElementById('judgmentDisplay');
    el.textContent = text;
    el.className = text.toLowerCase();
    el.style.opacity = '1';
    el.style.transform = 'translate(-50%, -50%) scale(1.2)';
    judgmentTimer = 0.8;
    gameState.lastJudgment = text;
}

function hitNote(noteIndex, judgment) {
    gameState.noteStates[noteIndex] = 'hit';
    noteMeshes[noteIndex].visible = false;

    let basePoints = 0;
    if (judgment === 'Perfect') {
        basePoints = 100;
        gameState.perfectCount++;
    } else if (judgment === 'Great') {
        basePoints = 75;
        gameState.greatCount++;
    } else if (judgment === 'Good') {
        basePoints = 50;
        gameState.goodCount++;
    }

    gameState.combo++;
    if (gameState.combo > gameState.maxCombo) gameState.maxCombo = gameState.combo;
    gameState.multiplier = getMultiplier(gameState.combo);
    gameState.score += basePoints * gameState.multiplier;

    showJudgment(judgment);

    // Hit effect
    const note = songChart[noteIndex];
    const color = laneColors[note.lane];
    const particles = createHitEffect(laneCenters[note.lane], HIT_Z, color);
    activeParticles.push(...particles);

    // Flash receptor
    receptors[note.lane].material.opacity = 1.0;
    receptors[note.lane].material.emissiveIntensity = 1.0;
}

function missNote(noteIndex) {
    gameState.noteStates[noteIndex] = 'missed';
    noteMeshes[noteIndex].visible = false;
    gameState.missCount++;
    gameState.combo = 0;
    gameState.multiplier = 1;
    showJudgment('Miss');
}

function tryHitLane(lane) {
    let bestIndex = -1;
    let bestDist = Infinity;

    for (let i = 0; i < songChart.length; i++) {
        if (songChart[i].lane !== lane) continue;
        if (gameState.noteStates[i] !== 'active') continue;

        const noteZ = noteMeshes[i].position.z;
        const dz = Math.abs(noteZ - HIT_Z);
        if (dz < 1.0 && dz < bestDist) {
            bestDist = dz;
            bestIndex = i;
        }
    }

    if (bestIndex >= 0) {
        let judgment;
        if (bestDist < 0.3) judgment = 'Perfect';
        else if (bestDist < 0.6) judgment = 'Great';
        else judgment = 'Good';
        hitNote(bestIndex, judgment);
    }
}

// ============ INPUT ============
const keysDown = new Set();

document.addEventListener('keydown', (e) => {
    if (e.repeat) return;

    if (e.code === 'Space') {
        e.preventDefault();
        if (!gameState.gameStarted) {
            gameState.gameStarted = true;
            gameState.paused = false;
        } else {
            gameState.paused = !gameState.paused;
        }
        updatePauseOverlay();
        return;
    }

    if (gameState.paused) return;

    const keyMap = { 'KeyD': 0, 'KeyF': 1, 'KeyJ': 2, 'KeyK': 3 };
    if (keyMap[e.code] !== undefined) {
        const lane = keyMap[e.code];
        keysDown.add(e.code);
        tryHitLane(lane);
        // Visual feedback on lane hint
        const hints = ['hintD', 'hintF', 'hintJ', 'hintK'];
        document.getElementById(hints[lane]).classList.add('active');
    }

    if (e.code === 'ArrowLeft') {
        gameState.duckLane = Math.max(0, gameState.duckLane - 1);
        if (duckModel) duckModel.position.x = laneCenters[gameState.duckLane];
    }
    if (e.code === 'ArrowRight') {
        gameState.duckLane = Math.min(3, gameState.duckLane + 1);
        if (duckModel) duckModel.position.x = laneCenters[gameState.duckLane];
    }
});

document.addEventListener('keyup', (e) => {
    keysDown.delete(e.code);
    const keyMap = { 'KeyD': 0, 'KeyF': 1, 'KeyJ': 2, 'KeyK': 3 };
    if (keyMap[e.code] !== undefined) {
        const hints = ['hintD', 'hintF', 'hintJ', 'hintK'];
        document.getElementById(hints[keyMap[e.code]]).classList.remove('active');
    }
});

// ============ SAVE/LOAD/RESET ============
document.getElementById('saveBtn').addEventListener('click', () => {
    const saveData = {
        score: gameState.score,
        combo: gameState.combo,
        maxCombo: gameState.maxCombo,
        multiplier: gameState.multiplier,
        perfectCount: gameState.perfectCount,
        greatCount: gameState.greatCount,
        goodCount: gameState.goodCount,
        missCount: gameState.missCount,
        elapsedTime: gameState.elapsedTime,
        noteStates: [...gameState.noteStates],
        duckLane: gameState.duckLane,
        paused: gameState.paused,
        gameStarted: gameState.gameStarted,
        lastJudgment: gameState.lastJudgment,
        gameComplete: gameState.gameComplete,
        notePositionsZ: noteMeshes.map(m => m.position.z)
    };
    localStorage.setItem('rhythmGameSave', JSON.stringify(saveData));
    showJudgment('Saved!');
});

document.getElementById('loadBtn').addEventListener('click', () => {
    const raw = localStorage.getItem('rhythmGameSave');
    if (!raw) {
        showJudgment('No Save!');
        return;
    }
    const saveData = JSON.parse(raw);

    gameState.score = saveData.score;
    gameState.combo = saveData.combo;
    gameState.maxCombo = saveData.maxCombo;
    gameState.multiplier = saveData.multiplier;
    gameState.perfectCount = saveData.perfectCount;
    gameState.greatCount = saveData.greatCount;
    gameState.goodCount = saveData.goodCount;
    gameState.missCount = saveData.missCount;
    gameState.elapsedTime = saveData.elapsedTime;
    gameState.noteStates = saveData.noteStates;
    gameState.duckLane = saveData.duckLane;
    gameState.gameStarted = saveData.gameStarted;
    gameState.lastJudgment = saveData.lastJudgment;
    gameState.gameComplete = saveData.gameComplete;
    gameState.paused = true;

    // Restore duck position
    if (duckModel) duckModel.position.x = laneCenters[gameState.duckLane];

    // Restore note positions and visibility
    for (let i = 0; i < songChart.length; i++) {
        if (gameState.noteStates[i] === 'hit' || gameState.noteStates[i] === 'missed') {
            noteMeshes[i].visible = false;
        } else if (gameState.noteStates[i] === 'active') {
            noteMeshes[i].visible = true;
            noteMeshes[i].position.z = saveData.notePositionsZ[i];
        } else {
            noteMeshes[i].visible = false;
            noteMeshes[i].position.z = SPAWN_Z;
        }
    }

    updatePauseOverlay();
    showJudgment('Loaded!');
});

document.getElementById('resetBtn').addEventListener('click', () => {
    gameState.gameStarted = false;
    gameState.paused = true;
    gameState.score = 0;
    gameState.combo = 0;
    gameState.maxCombo = 0;
    gameState.multiplier = 1;
    gameState.perfectCount = 0;
    gameState.greatCount = 0;
    gameState.goodCount = 0;
    gameState.missCount = 0;
    gameState.elapsedTime = 0;
    gameState.duckLane = 1;
    gameState.lastJudgment = 'None';
    gameState.gameComplete = false;
    gameState.noteStates = songChart.map(() => 'pending');

    if (duckModel) duckModel.position.x = laneCenters[1];

    noteMeshes.forEach((m, i) => {
        m.visible = false;
        m.position.set(laneCenters[songChart[i].lane], 0.3, SPAWN_Z);
    });

    // Clear particles
    activeParticles.forEach(p => scene.remove(p));
    activeParticles = [];

    updatePauseOverlay();
    showJudgment('Reset!');
});

// ============ HUD UPDATE ============
function updateHUD() {
    document.getElementById('scoreDisplay').textContent = gameState.score;
    document.getElementById('comboDisplay').textContent = gameState.combo;
    document.getElementById('multiplierDisplay').textContent = gameState.multiplier + 'x';
    document.getElementById('timeDisplay').textContent = gameState.elapsedTime.toFixed(1) + 's';
    document.getElementById('perfectCount').textContent = gameState.perfectCount;
    document.getElementById('greatCount').textContent = gameState.greatCount;
    document.getElementById('goodCount').textContent = gameState.goodCount;
    document.getElementById('missCount').textContent = gameState.missCount;

    const resolved = gameState.perfectCount + gameState.greatCount + gameState.goodCount + gameState.missCount;
    document.getElementById('notesRemaining').textContent = 16 - resolved;
}

function updatePauseOverlay() {
    const overlay = document.getElementById('pauseOverlay');
    if (gameState.paused) {
        overlay.style.display = 'block';
        if (gameState.gameComplete) {
            overlay.innerHTML = `<div class="big">COMPLETE!</div><div>Score: ${gameState.score} | Max Combo: ${gameState.maxCombo}</div>`;
        } else if (!gameState.gameStarted) {
            overlay.innerHTML = `<div class="big">RHYTHM GAME</div><div>Press SPACE to start<br>D F J K = Lanes | ← → = Move Duck</div>`;
        } else {
            overlay.innerHTML = `<div class="big">PAUSED</div><div>Press SPACE to resume</div>`;
        }
    } else {
        overlay.style.display = 'none';
    }
}

// ============ GLOBAL STATE ============
window.__3D_STATE__ = {};

function updateGlobalState() {
    const resolved = gameState.perfectCount + gameState.greatCount + gameState.goodCount + gameState.missCount;
    let notesActiveCount = 0;
    let notesSpawnedCount = 0;
    const notePositions = [];

    for (let i = 0; i < songChart.length; i++) {
        if (gameState.noteStates[i] === 'active') {
            notesActiveCount++;
            notesSpawnedCount++;
            notePositions.push({ lane: songChart[i].lane, z: noteMeshes[i].position.z, active: true });
        } else if (gameState.noteStates[i] === 'hit' || gameState.noteStates[i] === 'missed') {
            notesSpawnedCount++;
            notePositions.push({ lane: songChart[i].lane, z: noteMeshes[i].position.z, active: false });
        }
    }

    window.__3D_STATE__ = {
        gameStarted: gameState.gameStarted,
        paused: gameState.paused,
        score: gameState.score,
        combo: gameState.combo,
        maxCombo: gameState.maxCombo,
        multiplier: gameState.multiplier,
        perfectCount: gameState.perfectCount,
        greatCount: gameState.greatCount,
        goodCount: gameState.goodCount,
        missCount: gameState.missCount,
        totalNotesHit: gameState.perfectCount + gameState.greatCount + gameState.goodCount,
        totalNotes: 16,
        elapsedTime: gameState.elapsedTime,
        duckLane: gameState.duckLane,
        duckX: laneCenters[gameState.duckLane],
        notesActive: notesActiveCount,
        notesSpawned: notesSpawnedCount,
        saveExists: localStorage.getItem('rhythmGameSave') !== null,
        lastJudgment: gameState.lastJudgment,
        gameComplete: gameState.gameComplete,
        notePositions: notePositions
    };
}

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    if (!gameState.paused && gameState.gameStarted && !gameState.gameComplete) {
        gameState.elapsedTime += delta;

        // Spawn and move notes
        for (let i = 0; i < songChart.length; i++) {
            const note = songChart[i];

            // Calculate where the note should be based on elapsed time
            // Note should arrive at HIT_Z at note.time
            // So it spawns at time: note.time - (HIT_Z - SPAWN_Z) / NOTE_SPEED
            const travelTime = (HIT_Z - SPAWN_Z) / NOTE_SPEED;
            const spawnTime = note.time - travelTime;

            if (gameState.noteStates[i] === 'pending' && gameState.elapsedTime >= spawnTime) {
                gameState.noteStates[i] = 'active';
                noteMeshes[i].visible = true;
                // Calculate current position based on how much time has passed since spawn
                const timeSinceSpawn = gameState.elapsedTime - spawnTime;
                noteMeshes[i].position.z = SPAWN_Z + timeSinceSpawn * NOTE_SPEED;
            }

            if (gameState.noteStates[i] === 'active') {
                noteMeshes[i].position.z += delta * NOTE_SPEED;

                // Rotate note for visual flair
                noteMeshes[i].rotation.y += delta * 3;
                noteMeshes[i].rotation.x += delta * 2;

                // Pulse effect as note approaches hit zone
                const distToHit = Math.abs(noteMeshes[i].position.z - HIT_Z);
                if (distToHit < 3) {
                    const scale = 1 + (1 - distToHit / 3) * 0.3;
                    noteMeshes[i].scale.setScalar(scale);
                }

                // Check miss
                if (noteMeshes[i].position.z > MISS_Z) {
                    missNote(i);
                }
            }
        }

        // Check game complete
        const allResolved = gameState.noteStates.every(s => s === 'hit' || s === 'missed');
        const allSpawned = gameState.noteStates.every(s => s !== 'pending');
        if (allResolved && allSpawned) {
            gameState.gameComplete = true;
            gameState.paused = true;
            updatePauseOverlay();
        }
    }

    // Update particles
    for (let i = activeParticles.length - 1; i >= 0; i--) {
        const p = activeParticles[i];
        p.userData.life -= delta * 2;
        if (p.userData.life <= 0) {
            scene.remove(p);
            activeParticles.splice(i, 1);
        } else {
            p.position.add(p.userData.vel.clone().multiplyScalar(delta));
            p.userData.vel.y -= delta * 8;
            p.material.opacity = p.userData.life;
            p.scale.setScalar(p.userData.life);
        }
    }

    // Update judgment display fade
    if (judgmentTimer > 0) {
        judgmentTimer -= delta;
        if (judgmentTimer <= 0) {
            const el = document.getElementById('judgmentDisplay');
            el.style.opacity = '0';
            el.style.transform = 'translate(-50%, -50%) scale(0.8)';
        }
    }

    // Receptor fade back
    receptors.forEach(r => {
        if (r.material.opacity > 0.4) {
            r.material.opacity -= delta * 3;
            r.material.emissiveIntensity -= delta * 3;
        }
    });

    // Duck bob animation
    if (duckModel) {
        duckModel.position.y = Math.sin(gameState.elapsedTime * 3) * 0.1;
        // Smooth lane movement
        const targetX = laneCenters[gameState.duckLane];
        duckModel.position.x += (targetX - duckModel.position.x) * delta * 15;
    }

    // Duck mixer
    if (duckMixer) duckMixer.update(delta);

    // Track scrolling effect (visual lines on track)
    track.material.color.setHex(0x222222);

    updateHUD();
    updateGlobalState();

    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ INIT ============
updatePauseOverlay();
updateHUD();
updateGlobalState();
animate();

</script>
