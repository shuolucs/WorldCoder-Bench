<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Rhythm Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            text-shadow: 1px 1px 2px black;
        }
        .hud-panel {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .hud-center {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        #judgmentDisplay {
            font-size: 32px;
            color: #ffd700;
            min-height: 40px;
            margin-top: 10px;
        }
        .stats {
            font-size: 14px;
            line-height: 1.5;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: auto;
            display: flex;
            gap: 10px;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        #instructions {
            position: absolute;
            bottom: 70px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }
        #pauseOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div class="hud-panel stats">
            <div>Score: <span id="scoreDisplay">0</span></div>
            <div>Combo: <span id="comboDisplay">0</span></div>
            <div>Multiplier: <span id="multiplierDisplay">1</span>x</div>
            <div style="margin-top: 10px;">Time: <span id="timeDisplay">0.0</span>s</div>
            <div>Notes Left: <span id="notesRemaining">16</span></div>
        </div>
        
        <div class="hud-center">
            <div id="judgmentDisplay"></div>
        </div>
        
        <div class="hud-panel stats">
            <div style="color: #00ffff;">Perfect: <span id="perfectCount">0</span></div>
            <div style="color: #00ff00;">Great: <span id="greatCount">0</span></div>
            <div style="color: #ffff00;">Good: <span id="goodCount">0</span></div>
            <div style="color: #ff0000;">Miss: <span id="missCount">0</span></div>
        </div>
    </div>

    <div id="instructions">
        Keys: D, F, J, K to hit | Left/Right Arrows to move Duck | Space to Start/Pause
    </div>

    <div id="controls">
        <button id="saveBtn">Save</button>
        <button id="loadBtn">Load</button>
        <button id="resetBtn">Reset</button>
    </div>

    <div id="pauseOverlay">PAUSED<br><span style="font-size: 20px; text-align: center; display: block; margin-top: 10px;">Press Space to Start</span></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Configuration & Constants ---
        const SPEED = 10;
        const HIT_Z = 8;
        const SPAWN_Z = -50;
        const MISS_Z = 12;
        const LANES_X = [-1.5, -0.5, 0.5, 1.5];
        const LANE_COLORS = [0xff0055, 0x00aaff, 0x00ffaa, 0xffaa00];
        const TRAVEL_DIST = HIT_Z - SPAWN_Z;
        const TRAVEL_TIME = TRAVEL_DIST / SPEED;

        // --- Game State ---
        const defaultGameState = {
            score: 0,
            combo: 0,
            maxCombo: 0,
            multiplier: 1,
            perfectCount: 0,
            greatCount: 0,
            goodCount: 0,
            missCount: 0,
            elapsedTime: 0,
            duckLane: 1,
            paused: true,
            gameStarted: false,
            lastJudgment: 'None'
        };

        let gameState = { ...defaultGameState };

        // --- Chart ---
        const originalChartData = [
            {time: 1.0, lane: 0}, {time: 1.5, lane: 2}, {time: 2.0, lane: 1}, {time: 2.5, lane: 3},
            {time: 3.0, lane: 0}, {time: 3.5, lane: 1}, {time: 4.0, lane: 2}, {time: 4.5, lane: 3},
            {time: 5.0, lane: 0}, {time: 5.5, lane: 2}, {time: 6.0, lane: 1}, {time: 6.5, lane: 3},
            {time: 7.0, lane: 0}, {time: 7.5, lane: 1}, {time: 8.0, lane: 2}, {time: 8.5, lane: 3}
        ];

        let chart = [];

        function initChart() {
            chart = originalChartData.map(note => ({
                ...note,
                spawned: false,
                resolved: false,
                mesh: null
            }));
        }
        initChart();

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 20, 60);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, -10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Track
        const trackGeo = new THREE.PlaneGeometry(4, 60);
        const trackMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
        const track = new THREE.Mesh(trackGeo, trackMat);
        track.rotation.x = -Math.PI / 2;
        track.position.z = -20;
        scene.add(track);

        // Lane Dividers
        const dividerGeo = new THREE.BoxGeometry(0.05, 0.05, 60);
        const dividerMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
        for (let i = -2; i <= 2; i++) {
            const divider = new THREE.Mesh(dividerGeo, dividerMat);
            divider.position.set(i, 0.025, -20);
            scene.add(divider);
        }

        // Receptors
        const receptorGeo = new THREE.RingGeometry(0.35, 0.45, 32);
        const receptors = [];
        for (let i = 0; i < 4; i++) {
            const mat = new THREE.MeshBasicMaterial({ 
                color: LANE_COLORS[i], 
                transparent: true, 
                opacity: 0.5,
                side: THREE.DoubleSide
            });
            const receptor = new THREE.Mesh(receptorGeo, mat);
            receptor.rotation.x = -Math.PI / 2;
            receptor.position.set(LANES_X[i], 0.05, HIT_Z);
            scene.add(receptor);
            receptors.push(receptor);
        }

        // Duck Avatar
        let duck = new THREE.Group(); // Placeholder until loaded
        scene.add(duck);
        
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb', (gltf) => {
            scene.remove(duck);
            duck = gltf.scene;
            duck.scale.set(0.4, 0.4, 0.4);
            duck.position.set(LANES_X[gameState.duckLane], 0, HIT_Z);
            duck.rotation.y = Math.PI;
            scene.add(duck);
        });

        // Note Geometry/Material Cache
        const noteGeo = new THREE.SphereGeometry(0.3, 16, 16);
        const noteMats = LANE_COLORS.map(color => new THREE.MeshStandardMaterial({ 
            color: color, 
            emissive: color,
            emissiveIntensity: 0.5
        }));

        function createNoteMesh(laneIndex) {
            const mesh = new THREE.Mesh(noteGeo, noteMats[laneIndex]);
            mesh.position.set(LANES_X[laneIndex], 0.3, SPAWN_Z);
            return mesh;
        }

        // --- Game Logic ---

        function updateMultiplier() {
            if (gameState.combo >= 30) gameState.multiplier = 4;
            else if (gameState.combo >= 20) gameState.multiplier = 3;
            else if (gameState.combo >= 10) gameState.multiplier = 2;
            else gameState.multiplier = 1;
        }

        function resolveNote(note) {
            note.resolved = true;
            if (note.mesh) {
                scene.remove(note.mesh);
                note.mesh.geometry.dispose();
                note.mesh = null;
            }
        }

        function handleMiss(note) {
            resolveNote(note);
            gameState.combo = 0;
            gameState.multiplier = 1;
            gameState.missCount++;
            gameState.lastJudgment = 'Miss';
            updateHUD();
            showJudgment('Miss', '#ff0000');
        }

        function handleInput(laneIndex) {
            if (gameState.paused) return;

            // Visual feedback on receptor
            receptors[laneIndex].material.opacity = 1.0;
            setTimeout(() => { receptors[laneIndex].material.opacity = 0.5; }, 100);

            let closestNote = null;
            let minDz = Infinity;

            for (let note of chart) {
                if (note.spawned && !note.resolved && note.lane === laneIndex) {
                    let dz = Math.abs(note.mesh.position.z - HIT_Z);
                    if (dz < 1.0 && dz < minDz) {
                        minDz = dz;
                        closestNote = note;
                    }
                }
            }

            if (closestNote) {
                let points = 0;
                let judgment = '';
                let color = '';

                if (minDz < 0.3) { 
                    points = 100; judgment = 'Perfect'; color = '#00ffff'; gameState.perfectCount++; 
                } else if (minDz < 0.6) { 
                    points = 75; judgment = 'Great'; color = '#00ff00'; gameState.greatCount++; 
                } else { 
                    points = 50; judgment = 'Good'; color = '#ffff00'; gameState.goodCount++; 
                }

                gameState.combo++;
                if (gameState.combo > gameState.maxCombo) gameState.maxCombo = gameState.combo;
                updateMultiplier();
                gameState.score += points * gameState.multiplier;
                gameState.lastJudgment = judgment;

                resolveNote(closestNote);
                updateHUD();
                showJudgment(judgment, color);
            }
        }

        let judgmentTimeout;
        function showJudgment(text, color) {
            const el = document.getElementById('judgmentDisplay');
            el.textContent = text;
            el.style.color = color;
            el.style.transform = 'scale(1.2)';
            setTimeout(() => el.style.transform = 'scale(1)', 50);
            
            clearTimeout(judgmentTimeout);
            judgmentTimeout = setTimeout(() => {
                el.textContent = '';
            }, 1000);
        }

        function updateHUD() {
            document.getElementById('scoreDisplay').textContent = gameState.score;
            document.getElementById('comboDisplay').textContent = gameState.combo;
            document.getElementById('multiplierDisplay').textContent = gameState.multiplier;
            document.getElementById('perfectCount').textContent = gameState.perfectCount;
            document.getElementById('greatCount').textContent = gameState.greatCount;
            document.getElementById('goodCount').textContent = gameState.goodCount;
            document.getElementById('missCount').textContent = gameState.missCount;
            document.getElementById('timeDisplay').textContent = gameState.elapsedTime.toFixed(1);
            
            const remaining = chart.filter(n => !n.resolved).length;
            document.getElementById('notesRemaining').textContent = remaining;

            const overlay = document.getElementById('pauseOverlay');
            if (gameState.paused) {
                overlay.style.display = 'flex';
                overlay.innerHTML = gameState.gameStarted ? 'PAUSED<br><span style="font-size: 20px; text-align: center; display: block; margin-top: 10px;">Press Space to Resume</span>' : 'READY<br><span style="font-size: 20px; text-align: center; display: block; margin-top: 10px;">Press Space to Start</span>';
            } else {
                overlay.style.display = 'none';
            }
        }

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                gameState.paused = !gameState.paused;
                if (!gameState.paused && !gameState.gameStarted) {
                    gameState.gameStarted = true;
                }
                updateHUD();
                return;
            }

            if (e.code === 'ArrowLeft' && gameState.duckLane > 0) {
                gameState.duckLane--;
                duck.position.x = LANES_X[gameState.duckLane];
            } else if (e.code === 'ArrowRight' && gameState.duckLane < 3) {
                gameState.duckLane++;
                duck.position.x = LANES_X[gameState.duckLane];
            }

            switch(e.code) {
                case 'KeyD': handleInput(0); break;
                case 'KeyF': handleInput(1); break;
                case 'KeyJ': handleInput(2); break;
                case 'KeyK': handleInput(3); break;
            }
        });

        // --- Save / Load / Reset ---
        document.getElementById('saveBtn').addEventListener('click', () => {
            const saveObj = {
                gameState: gameState,
                chartState: chart.map(n => ({ spawned: n.spawned, resolved: n.resolved }))
            };
            localStorage.setItem('rhythmGameSave', JSON.stringify(saveObj));
            alert('Game Saved!');
        });

        document.getElementById('loadBtn').addEventListener('click', () => {
            const saved = localStorage.getItem('rhythmGameSave');
            if (!saved) {
                alert('No save found!');
                return;
            }
            
            const data = JSON.parse(saved);
            gameState = { ...data.gameState };
            gameState.paused = true; // Always pause on load

            // Clean up current scene notes
            chart.forEach(n => {
                if (n.mesh) {
                    scene.remove(n.mesh);
                    n.mesh.geometry.dispose();
                    n.mesh = null;
                }
            });

            // Restore chart state
            data.chartState.forEach((savedNote, i) => {
                chart[i].spawned = savedNote.spawned;
                chart[i].resolved = savedNote.resolved;
                
                // Recreate active notes
                if (chart[i].spawned && !chart[i].resolved) {
                    chart[i].mesh = createNoteMesh(chart[i].lane);
                    // Calculate position based on elapsed time
                    // Z = HIT_Z - (hitTime - currentTime) * SPEED
                    chart[i].mesh.position.z = HIT_Z - (chart[i].time - gameState.elapsedTime) * SPEED;
                    scene.add(chart[i].mesh);
                }
            });

            duck.position.x = LANES_X[gameState.duckLane];
            updateHUD();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            gameState = { ...defaultGameState };
            
            chart.forEach(n => {
                if (n.mesh) {
                    scene.remove(n.mesh);
                    n.mesh.geometry.dispose();
                    n.mesh = null;
                }
            });
            initChart();
            
            duck.position.x = LANES_X[gameState.duckLane];
            document.getElementById('judgmentDisplay').textContent = '';
            updateHUD();
        });

        // --- Main Loop ---
        const clock = new THREE.Clock();

        // Expose state
        window.__3D_STATE__ = {};

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (!gameState.paused) {
                gameState.elapsedTime += delta;

                // Spawn and move notes
                chart.forEach(note => {
                    const spawnTime = note.time - TRAVEL_TIME;
                    
                    if (!note.spawned && !note.resolved && gameState.elapsedTime >= spawnTime) {
                        note.mesh = createNoteMesh(note.lane);
                        // Adjust for frame delta overshoot
                        const overshoot = gameState.elapsedTime - spawnTime;
                        note.mesh.position.z = SPAWN_Z + overshoot * SPEED;
                        scene.add(note.mesh);
                        note.spawned = true;
                    }

                    if (note.spawned && !note.resolved && note.mesh) {
                        note.mesh.position.z += SPEED * delta;
                        
                        // Rotate note for visual flair
                        note.mesh.rotation.x += 5 * delta;

                        if (note.mesh.position.z > MISS_Z) {
                            handleMiss(note);
                        }
                    }
                });

                // Update time display periodically
                document.getElementById('timeDisplay').textContent = gameState.elapsedTime.toFixed(1);
            }

            // Update Global State Object
            const activeNotes = chart.filter(n => n.spawned && !n.resolved);
            const isComplete = chart.every(n => n.resolved);
            
            window.__3D_STATE__ = {
                gameStarted: gameState.gameStarted,
                paused: gameState.paused,
                score: gameState.score,
                combo: gameState.combo,
                maxCombo: gameState.maxCombo,
                multiplier: gameState.multiplier,
                perfectCount: gameState.perfectCount,
                greatCount: gameState.greatCount,
                goodCount: gameState.goodCount,
                missCount: gameState.missCount,
                totalNotesHit: gameState.perfectCount + gameState.greatCount + gameState.goodCount,
                totalNotes: chart.length,
                elapsedTime: gameState.elapsedTime,
                duckLane: gameState.duckLane,
                duckX: duck.position.x,
                notesActive: activeNotes.length,
                notesSpawned: chart.filter(n => n.spawned).length,
                saveExists: localStorage.getItem('rhythmGameSave') !== null,
                lastJudgment: gameState.lastJudgment,
                gameComplete: isComplete,
                notePositions: activeNotes.map(n => ({ lane: n.lane, z: n.mesh.position.z, active: true }))
            };

            renderer.render(scene, camera);
        }

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Init HUD
        updateHUD();
        animate();

    </script>
</body>
</html>
