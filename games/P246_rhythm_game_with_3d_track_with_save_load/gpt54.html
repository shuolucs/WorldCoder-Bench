<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Rhythm Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      padding: 12px;
      border-radius: 10px;
      min-width: 340px;
      backdrop-filter: blur(4px);
    }

    #hud .row {
      margin: 4px 0;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    #judgmentDisplay {
      font-weight: bold;
      min-width: 100px;
    }

    #controls {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #2d2d2d;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #444;
    }

    #help {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.85;
      line-height: 1.4;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="row">
      <div id="scoreDisplay">Score: 0</div>
      <div id="comboDisplay">Combo: 0</div>
      <div id="multiplierDisplay">Multiplier: 1x</div>
      <div id="judgmentDisplay">Judgment: None</div>
    </div>
    <div class="row">
      <div id="perfectCount">Perfect: 0</div>
      <div id="greatCount">Great: 0</div>
      <div id="goodCount">Good: 0</div>
      <div id="missCount">Miss: 0</div>
    </div>
    <div class="row">
      <div id="timeDisplay">Time: 0.00</div>
      <div id="notesRemaining">Notes Remaining: 16</div>
    </div>
    <div id="controls">
      <button id="saveBtn">Save</button>
      <button id="loadBtn">Load</button>
      <button id="resetBtn">Reset</button>
    </div>
    <div id="help">
      Space = Start/Pause |
      D/F/J/K = Hit lanes 0/1/2/3 |
      Left/Right = Move duck
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101018);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, -20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const laneXs = [-1.5, -0.5, 0.5, 1.5];
    const HIT_Z = 8;
    const SPAWN_Z = -50;
    const MISS_Z = 12;
    const NOTE_SPEED = 10;
    const TOTAL_NOTES = 16;

    const trackGroup = new THREE.Group();
    scene.add(trackGroup);

    const trackGeo = new THREE.BoxGeometry(4, 0.2, 60);
    const trackMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9, metalness: 0.05 });
    const track = new THREE.Mesh(trackGeo, trackMat);
    track.position.set(0, -0.15, -20);
    track.receiveShadow = true;
    trackGroup.add(track);

    const dividerMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const dividerXs = [-2, -1, 0, 1, 2];
    dividerXs.forEach(x => {
      const div = new THREE.Mesh(
        new THREE.BoxGeometry(0.03, 0.03, 60),
        dividerMat
      );
      div.position.set(x, -0.03, -20);
      trackGroup.add(div);
    });

    const receptorGroup = new THREE.Group();
    scene.add(receptorGroup);

    const receptorMeshes = [];
    laneXs.forEach((x, i) => {
      const ringGeo = new THREE.TorusGeometry(0.34, 0.05, 16, 32);
      const ringMat = new THREE.MeshBasicMaterial({
        color: 0x66ccff,
        transparent: true,
        opacity: 0.45
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2;
      ring.position.set(x, 0.05, HIT_Z);
      receptorGroup.add(ring);
      receptorMeshes.push(ring);

      const lanePad = new THREE.Mesh(
        new THREE.CylinderGeometry(0.38, 0.38, 0.03, 32),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.08 })
      );
      lanePad.position.set(x, 0.0, HIT_Z);
      receptorGroup.add(lanePad);
    });

    const noteColors = [0xff5555, 0x55ff55, 0x5599ff, 0xffcc33];
    const noteGeometry = new THREE.SphereGeometry(0.3, 24, 24);

    const songChart = [
      {time: 1.0, lane: 0}, {time: 1.5, lane: 2}, {time: 2.0, lane: 1}, {time: 2.5, lane: 3},
      {time: 3.0, lane: 0}, {time: 3.5, lane: 1}, {time: 4.0, lane: 2}, {time: 4.5, lane: 3},
      {time: 5.0, lane: 0}, {time: 5.5, lane: 2}, {time: 6.0, lane: 1}, {time: 6.5, lane: 3},
      {time: 7.0, lane: 0}, {time: 7.5, lane: 1}, {time: 8.0, lane: 2}, {time: 8.5, lane: 3}
    ];

    let duck = null;
    let duckGroup = new THREE.Group();
    scene.add(duckGroup);

    const duckGlow = new THREE.Mesh(
      new THREE.TorusGeometry(0.55, 0.08, 16, 40),
      new THREE.MeshBasicMaterial({ color: 0xffff66, transparent: true, opacity: 0.7 })
    );
    duckGlow.rotation.x = Math.PI / 2;
    duckGlow.position.set(0, 0.06, 0);
    duckGroup.add(duckGlow);

    const loader = new GLTFLoader();
    loader.load(
      'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb',
      (gltf) => {
        duck = gltf.scene;
        duck.scale.setScalar(0.4);
        duck.rotation.y = Math.PI;
        duck.position.set(0, 0, 0);
        duck.traverse(obj => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        duckGroup.add(duck);
      },
      undefined,
      () => {
        const fallback = new THREE.Mesh(
          new THREE.BoxGeometry(0.6, 0.6, 0.6),
          new THREE.MeshStandardMaterial({ color: 0xffff00 })
        );
        fallback.position.set(0, 0.3, 0);
        duck = fallback;
        duckGroup.add(duck);
      }
    );

    const scoreDisplay = document.getElementById('scoreDisplay');
    const comboDisplay = document.getElementById('comboDisplay');
    const multiplierDisplay = document.getElementById('multiplierDisplay');
    const judgmentDisplay = document.getElementById('judgmentDisplay');
    const perfectCountEl = document.getElementById('perfectCount');
    const greatCountEl = document.getElementById('greatCount');
    const goodCountEl = document.getElementById('goodCount');
    const missCountEl = document.getElementById('missCount');
    const timeDisplay = document.getElementById('timeDisplay');
    const notesRemainingEl = document.getElementById('notesRemaining');

    const saveBtn = document.getElementById('saveBtn');
    const loadBtn = document.getElementById('loadBtn');
    const resetBtn = document.getElementById('resetBtn');

    const initialState = () => ({
      gameStarted: false,
      paused: true,
      score: 0,
      combo: 0,
      maxCombo: 0,
      multiplier: 1,
      perfectCount: 0,
      greatCount: 0,
      goodCount: 0,
      missCount: 0,
      elapsedTime: 0,
      duckLane: 1,
      lastJudgment: 'None',
      gameComplete: false
    });

    let state = initialState();
    let notes = [];

    function createNotes() {
      notes.forEach(n => {
        if (n.mesh) scene.remove(n.mesh);
      });
      notes = songChart.map((data, index) => ({
        index,
        time: data.time,
        lane: data.lane,
        spawned: false,
        hit: false,
        missed: false,
        active: false,
        mesh: null,
        z: SPAWN_Z
      }));
    }

    function createNoteMesh(note) {
      const mat = new THREE.MeshStandardMaterial({
        color: noteColors[note.lane],
        emissive: new THREE.Color(noteColors[note.lane]).multiplyScalar(0.25),
        roughness: 0.5,
        metalness: 0.2
      });
      const mesh = new THREE.Mesh(noteGeometry, mat);
      mesh.castShadow = true;
      mesh.position.set(laneXs[note.lane], 0.35, SPAWN_Z);
      scene.add(mesh);
      note.mesh = mesh;
      note.spawned = true;
      note.active = true;
      note.z = SPAWN_Z;
    }

    function updateMultiplier() {
      if (state.combo >= 30) state.multiplier = 4;
      else if (state.combo >= 20) state.multiplier = 3;
      else if (state.combo >= 10) state.multiplier = 2;
      else state.multiplier = 1;
    }

    function updateHUD() {
      scoreDisplay.textContent = `Score: ${state.score}`;
      comboDisplay.textContent = `Combo: ${state.combo}`;
      multiplierDisplay.textContent = `Multiplier: ${state.multiplier}x`;
      judgmentDisplay.textContent = `Judgment: ${state.lastJudgment}`;
      perfectCountEl.textContent = `Perfect: ${state.perfectCount}`;
      greatCountEl.textContent = `Great: ${state.greatCount}`;
      goodCountEl.textContent = `Good: ${state.goodCount}`;
      missCountEl.textContent = `Miss: ${state.missCount}`;
      timeDisplay.textContent = `Time: ${state.elapsedTime.toFixed(2)}`;
      const remaining = notes.filter(n => !n.hit && !n.missed).length;
      notesRemainingEl.textContent = `Notes Remaining: ${remaining}`;
    }

    function updateDuckVisual() {
      const x = laneXs[state.duckLane];
      duckGroup.position.set(x, 0, HIT_Z);
      receptorMeshes.forEach((ring, i) => {
        ring.material.color.set(i === state.duckLane ? 0xffff66 : 0x66ccff);
        ring.material.opacity = i === state.duckLane ? 0.9 : 0.45;
      });
      duckGlow.material.color.set(state.paused ? 0x888888 : 0xffff66);
      duckGlow.material.opacity = state.paused ? 0.35 : 0.8;
      duckGlow.scale.setScalar(1 + Math.sin(performance.now() * 0.005) * 0.05);
    }

    function resolveHit(note, judgment, basePoints) {
      note.hit = true;
      note.active = false;
      if (note.mesh) {
        scene.remove(note.mesh);
        note.mesh = null;
      }

      state.combo += 1;
      if (state.combo > state.maxCombo) state.maxCombo = state.combo;
      updateMultiplier();
      state.score += basePoints * state.multiplier;
      state.lastJudgment = judgment;

      if (judgment === 'Perfect') state.perfectCount++;
      else if (judgment === 'Great') state.greatCount++;
      else if (judgment === 'Good') state.goodCount++;

      checkCompletion();
    }

    function registerMiss(note = null) {
      if (note) {
        note.missed = true;
        note.active = false;
        if (note.mesh) {
          scene.remove(note.mesh);
          note.mesh = null;
        }
      }
      state.combo = 0;
      updateMultiplier();
      state.missCount++;
      state.lastJudgment = 'Miss';
      checkCompletion();
    }

    function handleLaneHit(lane) {
      if (!state.gameStarted || state.paused || state.gameComplete) return;

      const candidates = notes.filter(n => n.lane === lane && n.active && !n.hit && !n.missed);
      if (candidates.length === 0) {
        registerMiss(null);
        updateHUD();
        return;
      }

      let best = null;
      let bestAbs = Infinity;
      for (const note of candidates) {
        const dz = note.z - HIT_Z;
        const abs = Math.abs(dz);
        if (abs < bestAbs) {
          bestAbs = abs;
          best = note;
        }
      }

      if (!best || bestAbs >= 1.0) {
        registerMiss(null);
      } else if (bestAbs < 0.3) {
        resolveHit(best, 'Perfect', 100);
      } else if (bestAbs < 0.6) {
        resolveHit(best, 'Great', 75);
      } else {
        resolveHit(best, 'Good', 50);
      }

      updateHUD();
    }

    function spawnAndUpdateNotes(delta) {
      for (const note of notes) {
        if (!note.spawned && state.elapsedTime >= note.time) {
          createNoteMesh(note);
        }

        if (note.active && note.mesh) {
          note.z += NOTE_SPEED * delta;
          note.mesh.position.z = note.z;
          note.mesh.rotation.y += delta * 2.5;
          note.mesh.rotation.x += delta * 1.4;

          if (note.z > MISS_Z) {
            registerMiss(note);
          }
        }
      }
    }

    function checkCompletion() {
      state.gameComplete = notes.every(n => n.hit || n.missed);
    }

    function resetGame() {
      state = initialState();
      createNotes();
      updateMultiplier();
      updateDuckVisual();
      updateHUD();
      syncExposedState();
    }

    function serializeState() {
      return {
        score: state.score,
        combo: state.combo,
        maxCombo: state.maxCombo,
        multiplier: state.multiplier,
        perfectCount: state.perfectCount,
        greatCount: state.greatCount,
        goodCount: state.goodCount,
        missCount: state.missCount,
        elapsedTime: state.elapsedTime,
        duckLane: state.duckLane,
        paused: state.paused,
        gameStarted: state.gameStarted,
        lastJudgment: state.lastJudgment,
        gameComplete: state.gameComplete,
        notes: notes.map(n => ({
          index: n.index,
          time: n.time,
          lane: n.lane,
          spawned: n.spawned,
          hit: n.hit,
          missed: n.missed,
          active: n.active,
          z: n.z
        }))
      };
    }

    function loadState(data) {
      state.score = data.score ?? 0;
      state.combo = data.combo ?? 0;
      state.maxCombo = data.maxCombo ?? 0;
      state.multiplier = data.multiplier ?? 1;
      state.perfectCount = data.perfectCount ?? 0;
      state.greatCount = data.greatCount ?? 0;
      state.goodCount = data.goodCount ?? 0;
      state.missCount = data.missCount ?? 0;
      state.elapsedTime = data.elapsedTime ?? 0;
      state.duckLane = data.duckLane ?? 1;
      state.paused = true;
      state.gameStarted = data.gameStarted ?? true;
      state.lastJudgment = data.lastJudgment ?? 'None';
      state.gameComplete = data.gameComplete ?? false;

      createNotes();

      if (Array.isArray(data.notes)) {
        for (const saved of data.notes) {
          const note = notes[saved.index];
          if (!note) continue;

          note.spawned = !!saved.spawned;
          note.hit = !!saved.hit;
          note.missed = !!saved.missed;
          note.active = !!saved.active && !note.hit && !note.missed;
          note.z = typeof saved.z === 'number' ? saved.z : SPAWN_Z;

          if (note.spawned && !note.hit && !note.missed) {
            createNoteMesh(note);
            note.z = saved.z;
            note.mesh.position.z = note.z;
          }
        }
      }

      updateMultiplier();
      updateDuckVisual();
      updateHUD();
      syncExposedState();
    }

    saveBtn.addEventListener('click', () => {
      localStorage.setItem('rhythmGameSave', JSON.stringify(serializeState()));
      syncExposedState();
    });

    loadBtn.addEventListener('click', () => {
      const raw = localStorage.getItem('rhythmGameSave');
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        loadState(data);
      } catch (e) {
        console.error('Failed to load save:', e);
      }
    });

    resetBtn.addEventListener('click', () => {
      localStorage.removeItem('rhythmGameSave');
      resetGame();
    });

    window.addEventListener('keydown', (e) => {
      if (e.repeat) return;

      if (e.code === 'Space') {
        e.preventDefault();
        state.gameStarted = true;
        state.paused = !state.paused;
        updateDuckVisual();
        updateHUD();
        return;
      }

      if (e.code === 'ArrowLeft') {
        state.duckLane = Math.max(0, state.duckLane - 1);
        updateDuckVisual();
        return;
      }

      if (e.code === 'ArrowRight') {
        state.duckLane = Math.min(3, state.duckLane + 1);
        updateDuckVisual();
        return;
      }

      const keyMap = {
        KeyD: 0,
        KeyF: 1,
        KeyJ: 2,
        KeyK: 3
      };

      if (keyMap.hasOwnProperty(e.code)) {
        handleLaneHit(keyMap[e.code]);
      }
    });

    function syncExposedState() {
      const activeVisible = notes.filter(n => n.active && n.mesh).length;
      const spawnedCount = notes.filter(n => n.spawned).length;
      window.__3D_STATE__ = {
        gameStarted: state.gameStarted,
        paused: state.paused,
        score: state.score,
        combo: state.combo,
        maxCombo: state.maxCombo,
        multiplier: state.multiplier,
        perfectCount: state.perfectCount,
        greatCount: state.greatCount,
        goodCount: state.goodCount,
        missCount: state.missCount,
        totalNotesHit: state.perfectCount + state.greatCount + state.goodCount,
        totalNotes: TOTAL_NOTES,
        elapsedTime: state.elapsedTime,
        duckLane: state.duckLane,
        duckX: laneXs[state.duckLane],
        notesActive: activeVisible,
        notesSpawned: spawnedCount,
        saveExists: !!localStorage.getItem('rhythmGameSave'),
        lastJudgment: state.lastJudgment,
        gameComplete: state.gameComplete,
        notePositions: notes
          .filter(n => n.spawned)
          .map(n => ({
            lane: n.lane,
            z: n.z,
            active: !!n.active
          }))
      };
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      if (state.gameStarted && !state.paused && !state.gameComplete) {
        state.elapsedTime += delta;
        spawnAndUpdateNotes(delta);
      }

      updateDuckVisual();
      updateHUD();
      syncExposedState();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    createNotes();
    updateMultiplier();
    updateDuckVisual();
    updateHUD();
    syncExposedState();
    animate();
  </script>
</body>
</html>
