<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Cake Builder</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #ffeedd, #ffccaa);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .panel {
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
        }
        #controls {
            top: 20px;
            left: 20px;
            width: 280px;
        }
        #hud {
            top: 20px;
            right: 20px;
            width: 220px;
        }
        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            border-bottom: 2px solid #ffccaa;
            padding-bottom: 5px;
        }
        .control-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 4px;
            font-weight: bold;
        }
        input[type="range"], select, button {
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background: #ffaa88;
            border: none;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 5px;
            transition: background 0.2s;
        }
        button:hover {
            background: #ff8855;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .hud-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .hud-value {
            font-weight: bold;
            color: #d35400;
        }
        .instructions {
            font-size: 0.8rem;
            color: #666;
            margin-top: 15px;
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }
        .instructions kbd {
            background: #eee;
            padding: 2px 5px;
            border-radius: 3px;
            border: 1px solid #ccc;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="controls" class="panel">
        <h2>Cake Builder</h2>
        <div class="control-group">
            <button id="btn-add-layer">Add Layer</button>
            <button id="btn-remove-layer">Remove Top Layer</button>
        </div>
        <div class="control-group">
            <label for="slider-radius">Next Radius: <span id="val-radius">1.8</span></label>
            <input type="range" id="slider-radius" min="1.0" max="2.0" step="0.1" value="1.8">
        </div>
        <div class="control-group">
            <label for="slider-height">Next Height: <span id="val-height">0.6</span></label>
            <input type="range" id="slider-height" min="0.3" max="1.0" step="0.1" value="0.6">
        </div>
        <div class="control-group">
            <label for="select-color">Next Color</label>
            <select id="select-color">
                <option value="0xfff5d4">Vanilla</option>
                <option value="0x5c3a1e">Chocolate</option>
                <option value="0xff8888">Strawberry</option>
                <option value="0x8888dd">Blueberry</option>
                <option value="0x88bb77">Matcha</option>
            </select>
        </div>
        <div class="instructions">
            <strong>Hotkeys:</strong><br>
            <kbd>1</kbd> Avocado Topper<br>
            <kbd>2</kbd> Water Bottle Topper<br>
            <kbd>F</kbd> Toggle Frosting (Top)<br>
            <kbd>R</kbd> Reset Cake
        </div>
    </div>

    <div id="hud" class="panel">
        <h2>Status</h2>
        <div class="hud-item">Layers: <span id="hud-layers" class="hud-value">0</span></div>
        <div class="hud-item">Total Height: <span id="hud-height" class="hud-value">0.00</span></div>
        <div class="hud-item">Top Frosting: <span id="hud-frosting" class="hud-value">No</span></div>
        <div class="hud-item">Decoration: <span id="hud-decoration" class="hud-value">None</span></div>
        <div class="hud-item">Models Loaded: <span id="hud-models" class="hud-value">0</span></div>
        <div class="hud-item">Bottom Comp.: <span id="hud-compression" class="hud-value">1.00</span></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            layerCount: 0,
            totalHeight: 0,
            topLayerFrosting: false,
            decoration: 'None',
            modelsLoaded: 0,
            bottomCompression: 1.0,
            nextRadius: 1.8,
            nextHeight: 0.6,
            frameCount: 0,
            cakeValid: true
        };

        const appState = {
            layers: [],
            decorationMesh: null,
            models: {},
            frostingColors: [0xffffff, 0x6b3a2a, 0xffaacc, 0xaaddff],
            frostingIndex: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(6, 5, 6);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 2, 0);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffeedd, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        scene.add(dirLight);

        // --- Table ---
        const tableGroup = new THREE.Group();
        scene.add(tableGroup);

        const textureLoader = new THREE.TextureLoader();
        const tableGeo = new THREE.CylinderGeometry(4, 4, 0.2, 64);
        const tableMat = new THREE.MeshStandardMaterial({ color: 0x886655, roughness: 0.9 });
        
        textureLoader.load('https://threejs.org/examples/textures/hardwood2_diffuse.jpg', (texture) => {
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(2, 2);
            tableMat.map = texture;
            tableMat.needsUpdate = true;
        });

        const tableMesh = new THREE.Mesh(tableGeo, tableMat);
        tableMesh.position.y = 0; // Center is at 0, top is at 0.1
        tableMesh.receiveShadow = true;
        tableGroup.add(tableMesh);

        const cakeGroup = new THREE.Group();
        scene.add(cakeGroup);

        // --- Asset Loading ---
        const gltfLoader = new GLTFLoader();
        const loadModel = (name, url) => {
            gltfLoader.load(url, (gltf) => {
                gltf.scene.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                appState.models[name] = gltf.scene;
                window.__3D_STATE__.modelsLoaded++;
                document.getElementById('hud-models').innerText = window.__3D_STATE__.modelsLoaded;
            });
        };

        loadModel('Avocado', 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Avocado/glTF-Binary/Avocado.glb');
        loadModel('WaterBottle', 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/WaterBottle/glTF-Binary/WaterBottle.glb');

        // --- Cake Logic ---
        function addLayer(radius, height, colorHex) {
            if (appState.layers.length >= 5) return;

            const geo = new THREE.CylinderGeometry(radius, radius, height, 64);
            const mat = new THREE.MeshStandardMaterial({ 
                color: colorHex, 
                roughness: 0.7,
                metalness: 0.05
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;

            cakeGroup.add(mesh);

            const layerData = {
                mesh: mesh,
                baseRadius: radius,
                baseHeight: height,
                hasFrosting: false,
                frostingMesh: null,
                anim: {
                    active: false,
                    startTime: 0,
                    duration: 500,
                    startY: 1, startXZ: 1,
                    targetY: 1, targetXZ: 1
                }
            };

            appState.layers.push(layerData);
            updateDeformations();
            updateUI();
        }

        function removeLayer() {
            if (appState.layers.length === 0) return;
            const topLayer = appState.layers.pop();
            cakeGroup.remove(topLayer.mesh);
            topLayer.mesh.geometry.dispose();
            topLayer.mesh.material.dispose();
            if (topLayer.frostingMesh) {
                topLayer.frostingMesh.geometry.dispose();
                topLayer.frostingMesh.material.dispose();
            }
            
            // If no layers left, remove decoration
            if (appState.layers.length === 0 && appState.decorationMesh) {
                setDecoration('None');
            }

            updateDeformations();
            updateUI();
        }

        function updateDeformations() {
            const total = appState.layers.length;
            const now = performance.now();

            for (let i = 0; i < total; i++) {
                const layer = appState.layers[i];
                const layersAbove = total - 1 - i;
                
                const targetY = Math.pow(0.95, layersAbove);
                const targetXZ = 1.0 + 0.02 * layersAbove;

                layer.anim.active = true;
                layer.anim.startTime = now;
                layer.anim.startY = layer.mesh.scale.y;
                layer.anim.startXZ = layer.mesh.scale.x;
                layer.anim.targetY = targetY;
                layer.anim.targetXZ = targetXZ;
            }
        }

        function toggleFrosting() {
            if (appState.layers.length === 0) return;
            const topLayer = appState.layers[appState.layers.length - 1];

            if (topLayer.hasFrosting) {
                topLayer.mesh.remove(topLayer.frostingMesh);
                topLayer.frostingMesh.geometry.dispose();
                topLayer.frostingMesh.material.dispose();
                topLayer.frostingMesh = null;
                topLayer.hasFrosting = false;
            } else {
                const fRadius = topLayer.baseRadius + 0.05;
                const fHeight = topLayer.baseHeight + 0.05;
                const fGeo = new THREE.CylinderGeometry(fRadius, fRadius, fHeight, 64);
                
                const color = appState.frostingColors[appState.frostingIndex % appState.frostingColors.length];
                appState.frostingIndex++;

                const fMat = new THREE.MeshStandardMaterial({ 
                    color: color, 
                    roughness: 0.3,
                    metalness: 0.1
                });
                const fMesh = new THREE.Mesh(fGeo, fMat);
                fMesh.castShadow = true;
                fMesh.receiveShadow = true;
                
                topLayer.mesh.add(fMesh);
                topLayer.frostingMesh = fMesh;
                topLayer.hasFrosting = true;
            }
            updateUI();
        }

        function setDecoration(type) {
            if (appState.decorationMesh) {
                cakeGroup.remove(appState.decorationMesh);
                appState.decorationMesh = null;
            }

            window.__3D_STATE__.decoration = type;

            if (type === 'None' || appState.layers.length === 0) {
                window.__3D_STATE__.decoration = 'None';
                updateUI();
                return;
            }

            const model = appState.models[type];
            if (model) {
                appState.decorationMesh = model.clone();
                if (type === 'Avocado') {
                    appState.decorationMesh.scale.set(8, 8, 8);
                } else if (type === 'WaterBottle') {
                    appState.decorationMesh.scale.set(0.3, 0.3, 0.3);
                }
                cakeGroup.add(appState.decorationMesh);
            }
            updateUI();
        }

        function resetCake() {
            while(appState.layers.length > 0) {
                removeLayer();
            }
            setDecoration('None');
        }

        // --- UI & Events ---
        const btnAdd = document.getElementById('btn-add-layer');
        const btnRemove = document.getElementById('btn-remove-layer');
        const sliderRadius = document.getElementById('slider-radius');
        const sliderHeight = document.getElementById('slider-height');
        const selectColor = document.getElementById('select-color');

        sliderRadius.addEventListener('input', (e) => {
            document.getElementById('val-radius').innerText = e.target.value;
            window.__3D_STATE__.nextRadius = parseFloat(e.target.value);
        });

        sliderHeight.addEventListener('input', (e) => {
            document.getElementById('val-height').innerText = e.target.value;
            window.__3D_STATE__.nextHeight = parseFloat(e.target.value);
        });

        btnAdd.addEventListener('click', () => {
            const r = parseFloat(sliderRadius.value);
            const h = parseFloat(sliderHeight.value);
            const c = parseInt(selectColor.value);
            addLayer(r, h, c);
        });

        btnRemove.addEventListener('click', removeLayer);

        window.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();
            if (key === '1') setDecoration('Avocado');
            if (key === '2') setDecoration('WaterBottle');
            if (key === 'F') toggleFrosting();
            if (key === 'R') resetCake();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function updateUI() {
            btnAdd.disabled = appState.layers.length >= 5;
            btnRemove.disabled = appState.layers.length === 0;
            
            document.getElementById('hud-layers').innerText = appState.layers.length;
            document.getElementById('hud-decoration').innerText = window.__3D_STATE__.decoration;
            
            const topFrosting = appState.layers.length > 0 ? appState.layers[appState.layers.length - 1].hasFrosting : false;
            document.getElementById('hud-frosting').innerText = topFrosting ? 'Yes' : 'No';
            window.__3D_STATE__.topLayerFrosting = topFrosting;
            window.__3D_STATE__.layerCount = appState.layers.length;
        }

        // --- Animation Loop ---
        function animate(time) {
            requestAnimationFrame(animate);
            window.__3D_STATE__.frameCount++;

            let currentY = 0.1; // Top of the table (y=0, height=0.2)
            let cakeValid = true;

            for (let i = 0; i < appState.layers.length; i++) {
                const layer = appState.layers[i];
                
                // Process Animation
                if (layer.anim.active) {
                    let t = (time - layer.anim.startTime) / layer.anim.duration;
                    if (t >= 1) {
                        t = 1;
                        layer.anim.active = false;
                    }
                    // Ease out quad
                    const ease = t * (2 - t);
                    const scaleY = layer.anim.startY + (layer.anim.targetY - layer.anim.startY) * ease;
                    const scaleXZ = layer.anim.startXZ + (layer.anim.targetXZ - layer.anim.startXZ) * ease;
                    
                    layer.mesh.scale.set(scaleXZ, scaleY, scaleXZ);
                }

                // Calculate Position
                const currentHeight = layer.baseHeight * layer.mesh.scale.y;
                layer.mesh.position.y = currentY + currentHeight / 2;
                currentY += currentHeight;

                if (isNaN(layer.mesh.position.y) || isNaN(layer.mesh.scale.y)) {
                    cakeValid = false;
                }
            }

            // Update Decoration Position
            if (appState.decorationMesh && appState.layers.length > 0) {
                appState.decorationMesh.position.y = currentY;
            }

            // Update State & HUD
            const totalHeight = currentY - 0.1;
            window.__3D_STATE__.totalHeight = parseFloat(totalHeight.toFixed(3));
            document.getElementById('hud-height').innerText = totalHeight.toFixed(2);

            let bottomComp = 1.0;
            if (appState.layers.length > 0) {
                bottomComp = appState.layers[0].mesh.scale.y;
            }
            window.__3D_STATE__.bottomCompression = parseFloat(bottomComp.toFixed(3));
            document.getElementById('hud-compression').innerText = bottomComp.toFixed(2);

            window.__3D_STATE__.cakeValid = cakeValid;

            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize default first layer
        addLayer(2.0, 0.6, 0xfff5d4);
        animate(performance.now());

    </script>
</body>
</html>
