<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Cake Layer Builder</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
canvas { display: block; }

#controls {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(40, 20, 10, 0.85);
    backdrop-filter: blur(10px);
    padding: 18px;
    border-radius: 14px;
    color: #ffe8d0;
    font-size: 13px;
    min-width: 220px;
    border: 1px solid rgba(255, 200, 150, 0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
#controls h2 {
    margin-bottom: 12px;
    font-size: 16px;
    color: #ffcc99;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 2px;
}
#controls label {
    display: block;
    margin: 8px 0 3px;
    font-weight: 600;
    color: #ffddbb;
}
#controls input[type="range"] {
    width: 100%;
    accent-color: #ff9966;
}
#controls select {
    width: 100%;
    padding: 5px;
    border-radius: 6px;
    border: 1px solid #886644;
    background: #3a2010;
    color: #ffe8d0;
    font-size: 13px;
}
.btn-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
}
.btn {
    flex: 1;
    padding: 8px 4px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    font-size: 12px;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
}
#btn-add-layer {
    background: linear-gradient(135deg, #ff9966, #ff6633);
    color: #fff;
}
#btn-add-layer:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,102,51,0.4); }
#btn-remove-layer {
    background: linear-gradient(135deg, #cc4444, #992222);
    color: #fff;
}
#btn-remove-layer:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(153,34,34,0.4); }
.val-display {
    float: right;
    color: #ffaa77;
    font-weight: 700;
}
.shortcut-info {
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,200,150,0.2);
    font-size: 11px;
    color: #cc9977;
    line-height: 1.6;
}
.shortcut-info kbd {
    background: rgba(255,200,150,0.15);
    padding: 1px 6px;
    border-radius: 4px;
    font-family: monospace;
    color: #ffcc99;
}

#hud {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(40, 20, 10, 0.85);
    backdrop-filter: blur(10px);
    padding: 18px;
    border-radius: 14px;
    color: #ffe8d0;
    font-size: 13px;
    min-width: 200px;
    border: 1px solid rgba(255, 200, 150, 0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
#hud h3 {
    margin-bottom: 10px;
    color: #ffcc99;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 14px;
}
#hud .hud-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,200,150,0.1);
}
#hud .hud-label { color: #cc9977; }
#hud .hud-value { color: #ffaa77; font-weight: 700; }
</style>
</head>
<body>

<div id="controls">
    <h2>🎂 Cake Builder</h2>
    <label>Radius: <span class="val-display" id="radius-val">1.8</span></label>
    <input type="range" id="slider-radius" min="1.0" max="2.0" step="0.1" value="1.8">
    <label>Height: <span class="val-display" id="height-val">0.6</span></label>
    <input type="range" id="slider-height" min="0.3" max="1.0" step="0.1" value="0.6">
    <label>Flavor:</label>
    <select id="select-color">
        <option value="0xfff5d4">Vanilla</option>
        <option value="0x5c3a1e">Chocolate</option>
        <option value="0xff8888">Strawberry</option>
        <option value="0x8888dd">Blueberry</option>
        <option value="0x88bb77">Matcha</option>
    </select>
    <div class="btn-row">
        <button class="btn" id="btn-add-layer">+ Add Layer</button>
        <button class="btn" id="btn-remove-layer">- Remove</button>
    </div>
    <div class="shortcut-info">
        <kbd>1</kbd> Avocado topper<br>
        <kbd>2</kbd> Bottle topper<br>
        <kbd>F</kbd> Toggle frosting<br>
        <kbd>R</kbd> Reset cake
    </div>
</div>

<div id="hud">
    <h3>📊 Cake Info</h3>
    <div class="hud-row"><span class="hud-label">Layers:</span><span class="hud-value" id="hud-layers">0</span></div>
    <div class="hud-row"><span class="hud-label">Total Height:</span><span class="hud-value" id="hud-height">0.00</span></div>
    <div class="hud-row"><span class="hud-label">Top Frosting:</span><span class="hud-value" id="hud-frosting">No</span></div>
    <div class="hud-row"><span class="hud-label">Decoration:</span><span class="hud-value" id="hud-decoration">None</span></div>
    <div class="hud-row"><span class="hud-label">Models Loaded:</span><span class="hud-value" id="hud-models">0</span></div>
    <div class="hud-row"><span class="hud-label">Bottom Compress:</span><span class="hud-value" id="hud-compression">1.00</span></div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();

// Background gradient
const canvas2d = document.createElement('canvas');
canvas2d.width = 2;
canvas2d.height = 512;
const ctx = canvas2d.getContext('2d');
const gradient = ctx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#ffeedd');
gradient.addColorStop(1, '#ffccaa');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(canvas2d);
scene.background = bgTexture;

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(6, 5, 6);
camera.lookAt(0, 2, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffeedd, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -8;
dirLight.shadow.camera.right = 8;
dirLight.shadow.camera.top = 8;
dirLight.shadow.camera.bottom = -8;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

// Extra fill light
const fillLight = new THREE.DirectionalLight(0xffddcc, 0.3);
fillLight.position.set(-3, 5, -3);
scene.add(fillLight);

// Table surface
const tableGeom = new THREE.CylinderGeometry(4, 4, 0.2, 64);

// Create a procedural wood texture
const woodCanvas = document.createElement('canvas');
woodCanvas.width = 512;
woodCanvas.height = 512;
const woodCtx = woodCanvas.getContext('2d');
woodCtx.fillStyle = '#886655';
woodCtx.fillRect(0, 0, 512, 512);
for (let i = 0; i < 200; i++) {
    const x = Math.random() * 512;
    const y = Math.random() * 512;
    const w = Math.random() * 300 + 50;
    const h = Math.random() * 3 + 1;
    woodCtx.fillStyle = `rgba(${100 + Math.random()*50}, ${60 + Math.random()*30}, ${40 + Math.random()*20}, ${0.1 + Math.random()*0.15})`;
    woodCtx.fillRect(x, y, w, h);
}
const woodTexture = new THREE.CanvasTexture(woodCanvas);
woodTexture.wrapS = THREE.RepeatWrapping;
woodTexture.wrapT = THREE.RepeatWrapping;

const tableMat = new THREE.MeshStandardMaterial({
    map: woodTexture,
    color: 0x886655,
    roughness: 0.7,
    metalness: 0.05
});
const table = new THREE.Mesh(tableGeom, tableMat);
table.position.y = 0.1;
table.receiveShadow = true;
scene.add(table);

// Floor
const floorGeom = new THREE.PlaneGeometry(30, 30);
const floorMat = new THREE.MeshStandardMaterial({ color: 0xddccbb, roughness: 0.9 });
const floor = new THREE.Mesh(floorGeom, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.01;
floor.receiveShadow = true;
scene.add(floor);

// State
const cakeLayers = []; // { mesh, frosting, radius, height, originalHeight, hasFrosting, color, group, targetScaleY, targetScaleXZ, currentScaleY, currentScaleXZ }
let currentDecoration = null; // { type, model }
let decorationName = 'None';
let modelsLoaded = 0;
let frameCount = 0;

const loadedModels = {};
const loader = new GLTFLoader();

// Load GLB models
const modelURLs = {
    'Avocado': 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Avocado/glTF-Binary/Avocado.glb',
    'WaterBottle': 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/WaterBottle/glTF-Binary/WaterBottle.glb'
};

function loadModel(name, url, scale) {
    loader.load(url, (gltf) => {
        const model = gltf.scene;
        model.scale.set(scale, scale, scale);
        model.traverse(child => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        loadedModels[name] = model;
        modelsLoaded++;
        console.log(`Loaded ${name}`);
    }, undefined, (err) => {
        console.warn(`Failed to load ${name}:`, err);
    });
}

loadModel('Avocado', modelURLs.Avocado, 8);
loadModel('WaterBottle', modelURLs.WaterBottle, 0.3);

// Color map
const colorMap = {
    '0xfff5d4': 0xfff5d4,
    '0x5c3a1e': 0x5c3a1e,
    '0xff8888': 0xff8888,
    '0x8888dd': 0x8888dd,
    '0x88bb77': 0x88bb77
};

const frostingColors = [0xffffff, 0x6b3a2a, 0xffaacc, 0xaaddff];
let currentFrostingColorIndex = 0;

// Cake group
const cakeGroup = new THREE.Group();
cakeGroup.position.y = 0.2;
scene.add(cakeGroup);

// Helper functions
function getStackHeight() {
    let h = 0;
    for (const layer of cakeLayers) {
        h += layer.height * layer.currentScaleY;
    }
    return h;
}

function getVisualStackHeight() {
    let h = 0;
    for (const layer of cakeLayers) {
        h += layer.height * layer.currentScaleY;
    }
    return h;
}

function createCakeLayerMesh(radius, height, color) {
    const geom = new THREE.CylinderGeometry(radius, radius, height, 48, 1);
    const mat = new THREE.MeshStandardMaterial({
        color: color,
        roughness: 0.6,
        metalness: 0.02,
    });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    return mesh;
}

function createFrostingMesh(radius, height, color) {
    const frostRadius = radius + 0.05;
    const frostHeight = height + 0.05;
    const geom = new THREE.CylinderGeometry(frostRadius, frostRadius, frostHeight, 48, 1);
    const mat = new THREE.MeshStandardMaterial({
        color: color,
        roughness: 0.3,
        metalness: 0.05,
        transparent: true,
        opacity: 0.85,
    });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    return mesh;
}

function updateDeformations() {
    const count = cakeLayers.length;
    for (let i = 0; i < count; i++) {
        const layersAbove = count - 1 - i;
        const targetScaleY = Math.pow(0.95, layersAbove);
        const targetScaleXZ = 1 + 0.02 * layersAbove;
        cakeLayers[i].targetScaleY = targetScaleY;
        cakeLayers[i].targetScaleXZ = targetScaleXZ;
    }
}

function repositionLayers() {
    let y = 0;
    for (let i = 0; i < cakeLayers.length; i++) {
        const layer = cakeLayers[i];
        const effectiveHeight = layer.height * layer.currentScaleY;
        layer.group.position.y = y + effectiveHeight / 2;
        y += effectiveHeight;
    }
    updateDecorationPosition();
}

function updateDecorationPosition() {
    if (currentDecoration && currentDecoration.model) {
        const topY = getVisualStackHeight();
        currentDecoration.model.position.y = topY;
    }
}

function addLayer() {
    if (cakeLayers.length >= 5) return;

    const radius = parseFloat(document.getElementById('slider-radius').value);
    const height = parseFloat(document.getElementById('slider-height').value);
    const colorStr = document.getElementById('select-color').value;
    const color = colorMap[colorStr] || 0xfff5d4;

    const group = new THREE.Group();
    const mesh = createCakeLayerMesh(radius, height, color);
    group.add(mesh);

    const layerData = {
        mesh,
        frosting: null,
        radius,
        height,
        originalHeight: height,
        hasFrosting: false,
        color,
        group,
        targetScaleY: 1,
        targetScaleXZ: 1,
        currentScaleY: 1,
        currentScaleXZ: 1
    };

    cakeLayers.push(layerData);
    cakeGroup.add(group);

    updateDeformations();
    repositionLayers();
}

function removeLayer() {
    if (cakeLayers.length === 0) return;
    const layer = cakeLayers.pop();
    cakeGroup.remove(layer.group);
    layer.mesh.geometry.dispose();
    layer.mesh.material.dispose();
    if (layer.frosting) {
        layer.frosting.geometry.dispose();
        layer.frosting.material.dispose();
    }

    updateDeformations();
    repositionLayers();
}

function toggleFrosting() {
    if (cakeLayers.length === 0) return;
    const topLayer = cakeLayers[cakeLayers.length - 1];

    if (topLayer.hasFrosting) {
        if (topLayer.frosting) {
            topLayer.group.remove(topLayer.frosting);
            topLayer.frosting.geometry.dispose();
            topLayer.frosting.material.dispose();
            topLayer.frosting = null;
        }
        topLayer.hasFrosting = false;
    } else {
        currentFrostingColorIndex = (currentFrostingColorIndex) % frostingColors.length;
        const frostColor = frostingColors[currentFrostingColorIndex];
        currentFrostingColorIndex++;
        const frosting = createFrostingMesh(topLayer.radius, topLayer.height, frostColor);
        topLayer.group.add(frosting);
        topLayer.frosting = frosting;
        topLayer.hasFrosting = true;
    }
}

function placeDecoration(type) {
    if (cakeLayers.length === 0) return;
    if (!loadedModels[type]) return;

    // Remove existing decoration
    if (currentDecoration && currentDecoration.model) {
        cakeGroup.remove(currentDecoration.model);
    }

    const model = loadedModels[type].clone();
    const topY = getVisualStackHeight();
    model.position.set(0, topY, 0);
    cakeGroup.add(model);

    currentDecoration = { type, model };
    decorationName = type;
}

function resetCake() {
    while (cakeLayers.length > 0) {
        removeLayer();
    }
    if (currentDecoration && currentDecoration.model) {
        cakeGroup.remove(currentDecoration.model);
        currentDecoration = null;
        decorationName = 'None';
    }
}

// UI Event Listeners
document.getElementById('btn-add-layer').addEventListener('click', addLayer);
document.getElementById('btn-remove-layer').addEventListener('click', removeLayer);

document.getElementById('slider-radius').addEventListener('input', (e) => {
    document.getElementById('radius-val').textContent = parseFloat(e.target.value).toFixed(1);
});
document.getElementById('slider-height').addEventListener('input', (e) => {
    document.getElementById('height-val').textContent = parseFloat(e.target.value).toFixed(1);
});

document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (key === '1') placeDecoration('Avocado');
    else if (key === '2') placeDecoration('WaterBottle');
    else if (key === 'f') toggleFrosting();
    else if (key === 'r') resetCake();
});

// State
window.__3D_STATE__ = {
    layerCount: 0,
    totalHeight: 0,
    topLayerFrosting: false,
    decoration: 'None',
    modelsLoaded: 0,
    bottomCompression: 1.0,
    nextRadius: 1.8,
    nextHeight: 0.6,
    frameCount: 0,
    cakeValid: true
};

// Easing
function lerp(a, b, t) {
    return a + (b - a) * t;
}

// Particle system for ambiance
const particleCount = 50;
const particleGeom = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3] = (Math.random() - 0.5) * 10;
    particlePositions[i * 3 + 1] = Math.random() * 8 + 1;
    particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 10;
}
particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0xffddaa, size: 0.05, transparent: true, opacity: 0.5 });
const particles = new THREE.Points(particleGeom, particleMat);
scene.add(particles);

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    frameCount++;

    const dt = clock.getDelta();
    const lerpFactor = Math.min(1, dt * 4); // ~500ms easing

    // Animate deformations
    for (const layer of cakeLayers) {
        layer.currentScaleY = lerp(layer.currentScaleY, layer.targetScaleY, lerpFactor);
        layer.currentScaleXZ = lerp(layer.currentScaleXZ, layer.targetScaleXZ, lerpFactor);

        layer.group.scale.set(layer.currentScaleXZ, layer.currentScaleY, layer.currentScaleXZ);
    }

    repositionLayers();

    // Animate particles
    const positions = particleGeom.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
        positions[i * 3 + 1] += dt * 0.3;
        if (positions[i * 3 + 1] > 9) positions[i * 3 + 1] = 1;
    }
    particleGeom.attributes.position.needsUpdate = true;

    // Gentle cake rotation
    // cakeGroup.rotation.y += dt * 0.05;

    // Update state
    const totalHeight = getVisualStackHeight();
    const topHasFrosting = cakeLayers.length > 0 ? cakeLayers[cakeLayers.length - 1].hasFrosting : false;
    const bottomComp = cakeLayers.length > 0 ? cakeLayers[0].currentScaleY : 1.0;

    let cakeValid = true;
    for (const layer of cakeLayers) {
        if (isNaN(layer.group.position.y) || isNaN(layer.group.scale.x) || isNaN(layer.group.scale.y) || isNaN(layer.group.scale.z)) {
            cakeValid = false;
            break;
        }
    }

    window.__3D_STATE__ = {
        layerCount: cakeLayers.length,
        totalHeight: parseFloat(totalHeight.toFixed(3)),
        topLayerFrosting: topHasFrosting,
        decoration: decorationName,
        modelsLoaded: modelsLoaded,
        bottomCompression: parseFloat(bottomComp.toFixed(3)),
        nextRadius: parseFloat(document.getElementById('slider-radius').value),
        nextHeight: parseFloat(document.getElementById('slider-height').value),
        frameCount: frameCount,
        cakeValid: cakeValid
    };

    // Update HUD
    document.getElementById('hud-layers').textContent = cakeLayers.length;
    document.getElementById('hud-height').textContent = totalHeight.toFixed(2);
    document.getElementById('hud-frosting').textContent = topHasFrosting ? 'Yes' : 'No';
    document.getElementById('hud-decoration').textContent = decorationName;
    document.getElementById('hud-models').textContent = modelsLoaded;
    document.getElementById('hud-compression').textContent = bottomComp.toFixed(2);

    controls.update();
    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Add default first layer
setTimeout(() => {
    document.getElementById('slider-radius').value = 2.0;
    document.getElementById('radius-val').textContent = '2.0';
    document.getElementById('slider-height').value = 0.6;
    document.getElementById('height-val').textContent = '0.6';
    document.getElementById('select-color').value = '0xfff5d4';
    addLayer();
}, 100);

animate();
</script>
</body>
</html>
