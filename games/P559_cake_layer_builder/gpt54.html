<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Cake Layer Builder</title>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>

  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #ffeedd 0%, #ffccaa 100%);
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #ui {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 10;
      width: 300px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.15);
      color: #3a2418;
    }

    #ui h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .row {
      margin: 8px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .row.inline {
      flex-direction: row;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    label {
      font-size: 13px;
      font-weight: 600;
    }

    input[type="range"], select, button {
      width: 100%;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      background: #9a6a52;
      color: white;
      font-weight: 700;
    }

    button:hover {
      background: #7f543f;
    }

    #hud {
      position: absolute;
      right: 14px;
      top: 14px;
      z-index: 10;
      min-width: 240px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.15);
      color: #3a2418;
      font-size: 14px;
      line-height: 1.5;
    }

    .small {
      font-size: 12px;
      opacity: 0.85;
    }

    .value {
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="ui">
    <h2>Cake Builder</h2>

    <div class="row">
      <label for="slider-radius">Next Layer Radius</label>
      <input id="slider-radius" type="range" min="1.0" max="2.0" step="0.1" value="1.8" />
      <div class="small">Value: <span id="label-radius">1.8</span></div>
    </div>

    <div class="row">
      <label for="slider-height">Next Layer Height</label>
      <input id="slider-height" type="range" min="0.3" max="1.0" step="0.1" value="0.6" />
      <div class="small">Value: <span id="label-height">0.6</span></div>
    </div>

    <div class="row">
      <label for="select-color">Next Layer Color</label>
      <select id="select-color">
        <option value="vanilla">Vanilla</option>
        <option value="chocolate">Chocolate</option>
        <option value="strawberry">Strawberry</option>
        <option value="blueberry">Blueberry</option>
        <option value="matcha">Matcha</option>
      </select>
    </div>

    <div class="row inline">
      <button id="btn-add-layer">Add Layer</button>
      <button id="btn-remove-layer">Remove Top Layer</button>
    </div>

    <div class="row">
      <div class="small">
        Keys: <b>1</b> Avocado topper, <b>2</b> WaterBottle topper, <b>F</b> toggle frosting on top layer, <b>R</b> reset
      </div>
    </div>
  </div>

  <div id="hud">
    <div>Layers: <span class="value" id="hud-layers">0</span></div>
    <div>Total height: <span class="value" id="hud-height">0.00</span></div>
    <div>Has frosting: <span class="value" id="hud-frosting">No</span></div>
    <div>Decoration: <span class="value" id="hud-decoration">None</span></div>
    <div>Models loaded: <span class="value" id="hud-models">0</span></div>
    <div>Bottom compression: <span class="value" id="hud-compression">1.00</span></div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const app = document.getElementById('app');

    const sliderRadius = document.getElementById('slider-radius');
    const sliderHeight = document.getElementById('slider-height');
    const selectColor = document.getElementById('select-color');
    const btnAddLayer = document.getElementById('btn-add-layer');
    const btnRemoveLayer = document.getElementById('btn-remove-layer');
    const labelRadius = document.getElementById('label-radius');
    const labelHeight = document.getElementById('label-height');

    const hudLayers = document.getElementById('hud-layers');
    const hudHeight = document.getElementById('hud-height');
    const hudFrosting = document.getElementById('hud-frosting');
    const hudDecoration = document.getElementById('hud-decoration');
    const hudModels = document.getElementById('hud-models');
    const hudCompression = document.getElementById('hud-compression');

    const CAKE_COLORS = {
      vanilla: 0xfff5d4,
      chocolate: 0x5c3a1e,
      strawberry: 0xff8888,
      blueberry: 0x8888dd,
      matcha: 0x88bb77
    };

    const FROSTING_COLORS = [
      0xffffff,
      0x6b3a2a,
      0xffaacc,
      0xaaddff
    ];

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(6, 5, 6);
    camera.lookAt(0, 2, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 2, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffeedd, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 40;
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    scene.add(dirLight);

    const bgCanvas = document.createElement('canvas');
    bgCanvas.width = 2;
    bgCanvas.height = 256;
    const bgCtx = bgCanvas.getContext('2d');
    const grad = bgCtx.createLinearGradient(0, 0, 0, 256);
    grad.addColorStop(0, '#ffeedd');
    grad.addColorStop(1, '#ffccaa');
    bgCtx.fillStyle = grad;
    bgCtx.fillRect(0, 0, 2, 256);
    const bgTexture = new THREE.CanvasTexture(bgCanvas);
    scene.background = bgTexture;

    const textureLoader = new THREE.TextureLoader();
    const hardwoodTex = textureLoader.load(
      'hardwood2_diffuse.jpg',
      tex => {
        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(2, 2);
        tex.colorSpace = THREE.SRGBColorSpace;
      },
      undefined,
      () => {}
    );

    const tableGeo = new THREE.CylinderGeometry(4, 4, 0.2, 64);
    const tableMat = new THREE.MeshStandardMaterial({
      color: 0x886655,
      map: hardwoodTex,
      roughness: 0.8,
      metalness: 0.05
    });
    const table = new THREE.Mesh(tableGeo, tableMat);
    table.position.y = 0;
    table.receiveShadow = true;
    table.castShadow = false;
    scene.add(table);

    const cakeRoot = new THREE.Group();
    scene.add(cakeRoot);

    const decorationRoot = new THREE.Group();
    scene.add(decorationRoot);

    const loader = new GLTFLoader();
    const clock = new THREE.Clock();

    let frameCount = 0;
    let modelsLoaded = 0;
    let activeDecorationName = 'None';
    let activeDecorationObject = null;

    const loadedModels = {
      Avocado: null,
      WaterBottle: null
    };

    const layers = [];
    const deformationAnimations = [];

    function updateSliderLabels() {
      labelRadius.textContent = Number(sliderRadius.value).toFixed(1);
      labelHeight.textContent = Number(sliderHeight.value).toFixed(1);
    }
    updateSliderLabels();

    sliderRadius.addEventListener('input', updateSliderLabels);
    sliderHeight.addEventListener('input', updateSliderLabels);

    function makeCakeMaterial(color) {
      return new THREE.MeshStandardMaterial({
        color,
        roughness: 0.85,
        metalness: 0.02
      });
    }

    function makeFrostingMaterial(color) {
      return new THREE.MeshStandardMaterial({
        color,
        roughness: 0.35,
        metalness: 0.0
      });
    }

    function getFrostingColorForLayer(index) {
      return FROSTING_COLORS[index % FROSTING_COLORS.length];
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function getLayerTopY(index, yScaleOverride = null) {
      let y = 0.1;
      for (let i = 0; i <= index; i++) {
        const layer = layers[i];
        const scaleY = (i === index && yScaleOverride !== null) ? yScaleOverride : layer.group.scale.y;
        if (i === 0) {
          y += (layer.height * scaleY) / 2;
        } else {
          const prev = layers[i - 1];
          y += (prev.height * prev.group.scale.y) / 2 + (layer.height * scaleY) / 2;
        }
      }
      return y + (layers[index].height * ((yScaleOverride !== null) ? yScaleOverride : layers[index].group.scale.y)) / 2;
    }

    function relayoutLayers() {
      let currentY = 0.1;
      for (let i = 0; i < layers.length; i++) {
        const layer = layers[i];
        const scaledHeight = layer.height * layer.group.scale.y;
        layer.group.position.y = currentY + scaledHeight / 2;
        currentY += scaledHeight;

        if (layer.frostingMesh) {
          layer.frostingMesh.visible = layer.hasFrosting;
          layer.frostingMesh.scale.set(
            1.0,
            Math.max(0.92, 1.0 / Math.max(layer.group.scale.y, 0.0001)),
            1.0
          );
        }
      }
      updateDecorationPlacement();
    }

    function applyTargetsAndAnimate() {
      deformationAnimations.length = 0;

      for (let i = 0; i < layers.length; i++) {
        const layer = layers[i];
        const layersAbove = layers.length - 1 - i;
        const targetY = Math.pow(0.95, layersAbove);
        const targetXZ = 1 + 0.02 * layersAbove;

        deformationAnimations.push({
          layer,
          startTime: performance.now(),
          duration: 500,
          fromScale: layer.group.scale.clone(),
          toScale: new THREE.Vector3(targetXZ, targetY, targetXZ)
        });
      }
    }

    function updateDeformations(now) {
      let anyRunning = false;

      for (const anim of deformationAnimations) {
        const t = Math.min(1, (now - anim.startTime) / anim.duration);
        const e = easeOutCubic(t);

        anim.layer.group.scale.set(
          THREE.MathUtils.lerp(anim.fromScale.x, anim.toScale.x, e),
          THREE.MathUtils.lerp(anim.fromScale.y, anim.toScale.y, e),
          THREE.MathUtils.lerp(anim.fromScale.z, anim.toScale.z, e)
        );

        if (t < 1) anyRunning = true;
      }

      relayoutLayers();

      if (!anyRunning && deformationAnimations.length > 0) {
        deformationAnimations.length = 0;
      }
    }

    function createLayer(radius, height, colorHex) {
      const group = new THREE.Group();

      const cakeGeo = new THREE.CylinderGeometry(radius, radius, height, 64, 1, false);
      const cakeMesh = new THREE.Mesh(cakeGeo, makeCakeMaterial(colorHex));
      cakeMesh.castShadow = true;
      cakeMesh.receiveShadow = true;
      group.add(cakeMesh);

      const frostingGeo = new THREE.CylinderGeometry(radius + 0.05, radius + 0.05, height + 0.05, 64, 1, false);
      const frostingMesh = new THREE.Mesh(frostingGeo, makeFrostingMaterial(getFrostingColorForLayer(layers.length)));
      frostingMesh.castShadow = true;
      frostingMesh.receiveShadow = true;
      frostingMesh.visible = false;
      group.add(frostingMesh);

      cakeRoot.add(group);

      return {
        group,
        cakeMesh,
        frostingMesh,
        radius,
        height,
        colorHex,
        hasFrosting: false
      };
    }

    function addLayer(radius, height, colorHex) {
      if (layers.length >= 5) return;

      const layer = createLayer(radius, height, colorHex);
      layers.push(layer);
      applyTargetsAndAnimate();
      relayoutLayers();
      updateHUD();
    }

    function removeTopLayer() {
      if (layers.length === 0) return;
      const layer = layers.pop();
      cakeRoot.remove(layer.group);

      layer.cakeMesh.geometry.dispose();
      layer.cakeMesh.material.dispose();
      if (layer.frostingMesh) {
        layer.frostingMesh.geometry.dispose();
        layer.frostingMesh.material.dispose();
      }

      applyTargetsAndAnimate();
      relayoutLayers();

      if (layers.length === 0) {
        clearDecoration();
      } else {
        updateDecorationPlacement();
      }

      updateHUD();
    }

    function toggleTopFrosting() {
      if (layers.length === 0) return;
      const top = layers[layers.length - 1];
      top.hasFrosting = !top.hasFrosting;
      top.frostingMesh.visible = top.hasFrosting;
      updateHUD();
    }

    function clearDecoration() {
      if (activeDecorationObject) {
        decorationRoot.remove(activeDecorationObject);
        activeDecorationObject.traverse(obj => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
      }
      activeDecorationObject = null;
      activeDecorationName = 'None';
    }

    function cloneModelScene(src) {
      return src.clone(true);
    }

    function computeObjectHeight(obj) {
      const box = new THREE.Box3().setFromObject(obj);
      if (!isFinite(box.min.y) || !isFinite(box.max.y)) return 1;
      return Math.max(0.001, box.max.y - box.min.y);
    }

    function normalizeBottomToZero(obj) {
      const box = new THREE.Box3().setFromObject(obj);
      if (isFinite(box.min.y)) {
        obj.position.y -= box.min.y;
      }
    }

    function placeDecoration(name) {
      if (layers.length === 0) return;
      const source = loadedModels[name];
      if (!source) return;

      clearDecoration();

      const obj = cloneModelScene(source);
      obj.traverse(child => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });

      if (name === 'Avocado') {
        obj.scale.setScalar(8);
      } else if (name === 'WaterBottle') {
        obj.scale.setScalar(0.3);
      }

      decorationRoot.add(obj);
      normalizeBottomToZero(obj);
      activeDecorationObject = obj;
      activeDecorationName = name;
      updateDecorationPlacement();
      updateHUD();
    }

    function getTotalCakeHeight() {
      let total = 0;
      for (const layer of layers) total += layer.height * layer.group.scale.y;
      return total;
    }

    function updateDecorationPlacement() {
      if (!activeDecorationObject || layers.length === 0) return;
      const cakeTop = 0.1 + getTotalCakeHeight();
      normalizeBottomToZero(activeDecorationObject);
      activeDecorationObject.position.x = 0;
      activeDecorationObject.position.z = 0;
      activeDecorationObject.position.y = cakeTop;
    }

    function resetCake() {
      while (layers.length) {
        const layer = layers.pop();
        cakeRoot.remove(layer.group);
        layer.cakeMesh.geometry.dispose();
        layer.cakeMesh.material.dispose();
        if (layer.frostingMesh) {
          layer.frostingMesh.geometry.dispose();
          layer.frostingMesh.material.dispose();
        }
      }
      deformationAnimations.length = 0;
      clearDecoration();
      relayoutLayers();
      updateHUD();
    }

    function updateHUD() {
      const layerCount = layers.length;
      const totalHeight = getTotalCakeHeight();
      const topLayer = layerCount > 0 ? layers[layerCount - 1] : null;
      const bottomCompression = layerCount > 0 ? layers[0].group.scale.y : 1.0;

      hudLayers.textContent = String(layerCount);
      hudHeight.textContent = totalHeight.toFixed(2);
      hudFrosting.textContent = topLayer && topLayer.hasFrosting ? 'Yes' : 'No';
      hudDecoration.textContent = activeDecorationName;
      hudModels.textContent = String(modelsLoaded);
      hudCompression.textContent = bottomCompression.toFixed(2);
    }

    function updateGlobalState() {
      const layerCount = layers.length;
      const totalHeight = getTotalCakeHeight();
      const topLayer = layerCount > 0 ? layers[layerCount - 1] : null;
      const bottomCompression = layerCount > 0 ? layers[0].group.scale.y : 1.0;

      let cakeValid = true;
      for (const layer of layers) {
        const p = layer.group.position;
        const s = layer.group.scale;
        if (
          !Number.isFinite(p.x) || !Number.isFinite(p.y) || !Number.isFinite(p.z) ||
          !Number.isFinite(s.x) || !Number.isFinite(s.y) || !Number.isFinite(s.z) ||
          s.x <= 0 || s.y <= 0 || s.z <= 0
        ) {
          cakeValid = false;
          break;
        }
      }

      window.__3D_STATE__ = {
        layerCount,
        totalHeight: Number(totalHeight.toFixed(3)),
        topLayerFrosting: !!(topLayer && topLayer.hasFrosting),
        decoration: activeDecorationName,
        modelsLoaded,
        bottomCompression: Number(bottomCompression.toFixed(3)),
        nextRadius: Number(sliderRadius.value),
        nextHeight: Number(sliderHeight.value),
        frameCount,
        cakeValid
      };
    }

    btnAddLayer.addEventListener('click', () => {
      const radius = Number(sliderRadius.value);
      const height = Number(sliderHeight.value);
      const colorHex = CAKE_COLORS[selectColor.value];
      addLayer(radius, height, colorHex);
    });

    btnRemoveLayer.addEventListener('click', () => {
      removeTopLayer();
    });

    window.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();

      if (k === '1') placeDecoration('Avocado');
      else if (k === '2') placeDecoration('WaterBottle');
      else if (k === 'f') toggleTopFrosting();
      else if (k === 'r') resetCake();
    });

    function loadModel(url, key) {
      loader.load(
        url,
        gltf => {
          loadedModels[key] = gltf.scene;
          modelsLoaded++;
          updateHUD();
        },
        undefined,
        () => {
          console.warn(`Failed to load model: ${url}`);
          updateHUD();
        }
      );
    }

    loadModel('Avocado.glb', 'Avocado');
    loadModel('WaterBottle.glb', 'WaterBottle');

    addLayer(2.0, 0.6, CAKE_COLORS.vanilla);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const now = performance.now();
      updateDeformations(now);
      controls.update();
      updateHUD();
      updateGlobalState();
      renderer.render(scene, camera);
    }

    updateGlobalState();
    animate();
  </script>
</body>
</html>
