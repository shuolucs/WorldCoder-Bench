<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Morph Targets</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(30, 30, 30, 0.85);
            color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid #444;
            width: 280px;
        }
        .control-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }
        label {
            font-size: 14px;
            flex: 1;
        }
        input[type="range"] {
            flex: 1.5;
            cursor: pointer;
        }
        input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="ui-container">
        <div class="control-group">
            <label for="morphWeight0">Cone Spike:</label>
            <input type="range" id="morphWeight0" min="0" max="1" step="0.01" value="0">
        </div>
        <div class="control-group">
            <label for="morphWeight1">X-Squeeze:</label>
            <input type="range" id="morphWeight1" min="0" max="1" step="0.01" value="0">
        </div>
        <div class="control-group">
            <label for="morphWeight2">Y-Stretch:</label>
            <input type="range" id="morphWeight2" min="0" max="1" step="0.01" value="0">
        </div>
        <hr style="border-color: #444; margin: 15px 0;">
        <div class="control-group">
            <label for="animateToggle">Auto Animate:</label>
            <input type="checkbox" id="animateToggle">
        </div>
        <div class="control-group">
            <label for="wireframeToggle">Wireframe:</label>
            <input type="checkbox" id="wireframeToggle">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Initialize Global State
        window.__3D_STATE__ = {
            morphWeights: [0, 0, 0],
            animating: false,
            wireframe: false,
            vertexCount: 0
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 4, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const backLight = new THREE.DirectionalLight(0x44aaff, 1);
        backLight.position.set(-5, -2, -7);
        scene.add(backLight);

        // Geometry
        const radius = 2;
        const geometry = new THREE.SphereGeometry(radius, 32, 32);
        const positionAttribute = geometry.attributes.position;
        
        window.__3D_STATE__.vertexCount = positionAttribute.count;

        // Create Morph Targets
        const target0 = []; // Cone spike
        const target1 = []; // Left-right squeeze
        const target2 = []; // Up-down stretch

        for (let i = 0; i < positionAttribute.count; i++) {
            const x = positionAttribute.getX(i);
            const y = positionAttribute.getY(i);
            const z = positionAttribute.getZ(i);

            // Target 0: Cone spike (pull top vertices up and inward)
            let x0 = x, y0 = y, z0 = z;
            if (y > 0) {
                const factor = y / radius;
                x0 *= (1 - factor * 0.7);
                z0 *= (1 - factor * 0.7);
                y0 += factor * 2.5;
            }
            target0.push(x0, y0, z0);

            // Target 1: Left-right squeeze (scale X)
            target1.push(x * 0.2, y, z);

            // Target 2: Up-down stretch (scale Y)
            target2.push(x, y * 2.0, z);
        }

        geometry.morphAttributes.position = [];
        geometry.morphAttributes.position[0] = new THREE.Float32BufferAttribute(target0, 3);
        geometry.morphAttributes.position[1] = new THREE.Float32BufferAttribute(target1, 3);
        geometry.morphAttributes.position[2] = new THREE.Float32BufferAttribute(target2, 3);

        // Material & Mesh
        const material = new THREE.MeshStandardMaterial({
            color: 0x00ff88,
            roughness: 0.3,
            metalness: 0.2,
            wireframe: false
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // UI Elements
        const slider0 = document.getElementById('morphWeight0');
        const slider1 = document.getElementById('morphWeight1');
        const slider2 = document.getElementById('morphWeight2');
        const animateToggle = document.getElementById('animateToggle');
        const wireframeToggle = document.getElementById('wireframeToggle');

        // Event Listeners
        function updateWeightsFromSliders() {
            if (!window.__3D_STATE__.animating) {
                mesh.morphTargetInfluences[0] = parseFloat(slider0.value);
                mesh.morphTargetInfluences[1] = parseFloat(slider1.value);
                mesh.morphTargetInfluences[2] = parseFloat(slider2.value);
                window.__3D_STATE__.morphWeights = [...mesh.morphTargetInfluences];
            }
        }

        slider0.addEventListener('input', updateWeightsFromSliders);
        slider1.addEventListener('input', updateWeightsFromSliders);
        slider2.addEventListener('input', updateWeightsFromSliders);

        animateToggle.addEventListener('change', (e) => {
            window.__3D_STATE__.animating = e.target.checked;
        });

        wireframeToggle.addEventListener('change', (e) => {
            material.wireframe = e.target.checked;
            window.__3D_STATE__.wireframe = e.target.checked;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            if (window.__3D_STATE__.animating) {
                const t = clock.getElapsedTime();
                
                mesh.morphTargetInfluences[0] = (Math.sin(t * 2.0) + 1) / 2;
                mesh.morphTargetInfluences[1] = (Math.sin(t * 1.5 + 1) + 1) / 2;
                mesh.morphTargetInfluences[2] = (Math.sin(t * 1.0 + 2) + 1) / 2;

                slider0.value = mesh.morphTargetInfluences[0];
                slider1.value = mesh.morphTargetInfluences[1];
                slider2.value = mesh.morphTargetInfluences[2];

                window.__3D_STATE__.morphWeights = [...mesh.morphTargetInfluences];
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
