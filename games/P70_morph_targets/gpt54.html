<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Morph Target Sphere</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #ui {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.6);
      padding: 14px 16px;
      border-radius: 10px;
      backdrop-filter: blur(6px);
      min-width: 260px;
    }

    #ui h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .control {
      margin: 10px 0;
    }

    .control label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .control input[type="range"] {
      width: 100%;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
      font-size: 14px;
    }

    .value {
      font-size: 12px;
      color: #9ad;
      margin-top: 2px;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h2>Morph Target 控制</h2>

      <div class="control">
        <label for="morphWeight0">Morph 0：锥形顶部凸起</label>
        <input id="morphWeight0" type="range" min="0" max="1" step="0.01" value="0" />
        <div class="value" id="value0">0.00</div>
      </div>

      <div class="control">
        <label for="morphWeight1">Morph 1：左右挤压</label>
        <input id="morphWeight1" type="range" min="0" max="1" step="0.01" value="0" />
        <div class="value" id="value1">0.00</div>
      </div>

      <div class="control">
        <label for="morphWeight2">Morph 2：上下拉长</label>
        <input id="morphWeight2" type="range" min="0" max="1" step="0.01" value="0" />
        <div class="value" id="value2">0.00</div>
      </div>

      <div class="row">
        <input id="animateToggle" type="checkbox" />
        <label for="animateToggle">开启动画</label>
      </div>

      <div class="row">
        <input id="wireframeToggle" type="checkbox" />
        <label for="wireframeToggle">线框模式</label>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('app');

    const slider0 = document.getElementById('morphWeight0');
    const slider1 = document.getElementById('morphWeight1');
    const slider2 = document.getElementById('morphWeight2');
    const value0 = document.getElementById('value0');
    const value1 = document.getElementById('value1');
    const value2 = document.getElementById('value2');
    const animateToggle = document.getElementById('animateToggle');
    const wireframeToggle = document.getElementById('wireframeToggle');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x151515);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.5, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
    dirLight.position.set(3, 4, 5);
    scene.add(dirLight);

    const dirLight2 = new THREE.DirectionalLight(0x88aaff, 0.8);
    dirLight2.position.set(-4, -2, -3);
    scene.add(dirLight2);

    const geometry = new THREE.SphereGeometry(1, 32, 32);
    const basePosition = geometry.attributes.position;
    const vertexCount = basePosition.count;

    const morph0 = new Float32Array(basePosition.array.length);
    const morph1 = new Float32Array(basePosition.array.length);
    const morph2 = new Float32Array(basePosition.array.length);

    for (let i = 0; i < vertexCount; i++) {
      const x = basePosition.getX(i);
      const y = basePosition.getY(i);
      const z = basePosition.getZ(i);

      const r = Math.sqrt(x * x + y * y + z * z) || 1;
      const nx = x / r;
      const ny = y / r;
      const nz = z / r;

      // Morph 0: 顶部锥形凸起
      {
        const topFactor = Math.max(0, ny);
        const radialFalloff = Math.pow(topFactor, 2.5);
        const spike = 0.65 * radialFalloff;
        morph0[i * 3 + 0] = x + nx * spike * 0.25;
        morph0[i * 3 + 1] = y + spike;
        morph0[i * 3 + 2] = z + nz * spike * 0.25;
      }

      // Morph 1: 左右挤压（压缩 X，轻微鼓出 Z）
      {
        const squeezeX = x * 0.45;
        const bulgeZ = z * (1.0 + 0.25 * (1.0 - Math.abs(nx)));
        morph1[i * 3 + 0] = squeezeX;
        morph1[i * 3 + 1] = y;
        morph1[i * 3 + 2] = bulgeZ;
      }

      // Morph 2: 上下拉长（Y 拉长，X/Z 略收缩）
      {
        morph2[i * 3 + 0] = x * 0.82;
        morph2[i * 3 + 1] = y * 1.45;
        morph2[i * 3 + 2] = z * 0.82;
      }
    }

    geometry.morphAttributes.position = [
      new THREE.Float32BufferAttribute(morph0, 3),
      new THREE.Float32BufferAttribute(morph1, 3),
      new THREE.Float32BufferAttribute(morph2, 3)
    ];

    const material = new THREE.MeshStandardMaterial({
      color: 0x66aaff,
      metalness: 0.15,
      roughness: 0.45,
      morphTargets: true,
      wireframe: false
    });

    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    const grid = new THREE.GridHelper(10, 10, 0x444444, 0x222222);
    grid.position.y = -1.8;
    scene.add(grid);

    window.__3D_STATE__ = {
      morphWeights: [0, 0, 0],
      animating: false,
      wireframe: false,
      vertexCount
    };

    function updateState() {
      window.__3D_STATE__.morphWeights = [
        mesh.morphTargetInfluences[0] ?? 0,
        mesh.morphTargetInfluences[1] ?? 0,
        mesh.morphTargetInfluences[2] ?? 0
      ];
      window.__3D_STATE__.animating = animateToggle.checked;
      window.__3D_STATE__.wireframe = material.wireframe;
      window.__3D_STATE__.vertexCount = vertexCount;
    }

    function updateValueLabels() {
      value0.textContent = Number(slider0.value).toFixed(2);
      value1.textContent = Number(slider1.value).toFixed(2);
      value2.textContent = Number(slider2.value).toFixed(2);
    }

    function applySliderWeights() {
      mesh.morphTargetInfluences[0] = Number(slider0.value);
      mesh.morphTargetInfluences[1] = Number(slider1.value);
      mesh.morphTargetInfluences[2] = Number(slider2.value);
      updateValueLabels();
      updateState();
    }

    slider0.addEventListener('input', () => {
      if (!animateToggle.checked) applySliderWeights();
      else updateValueLabels();
    });

    slider1.addEventListener('input', () => {
      if (!animateToggle.checked) applySliderWeights();
      else updateValueLabels();
    });

    slider2.addEventListener('input', () => {
      if (!animateToggle.checked) applySliderWeights();
      else updateValueLabels();
    });

    animateToggle.addEventListener('change', () => {
      if (!animateToggle.checked) {
        applySliderWeights();
      }
      updateState();
    });

    wireframeToggle.addEventListener('change', () => {
      material.wireframe = wireframeToggle.checked;
      updateState();
    });

    applySliderWeights();

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();

      if (animateToggle.checked) {
        const w0 = 0.5 + 0.5 * Math.sin(t * 1.2);
        const w1 = 0.5 + 0.5 * Math.sin(t * 1.7 + 1.1);
        const w2 = 0.5 + 0.5 * Math.sin(t * 1.4 + 2.3);

        mesh.morphTargetInfluences[0] = w0;
        mesh.morphTargetInfluences[1] = w1;
        mesh.morphTargetInfluences[2] = w2;

        slider0.value = w0.toFixed(2);
        slider1.value = w1.toFixed(2);
        slider2.value = w2.toFixed(2);
        updateValueLabels();
        updateState();
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
