<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Particle Fireworks System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #hud {
    position: fixed;
    top: 16px;
    left: 16px;
    color: #fff;
    font-size: 14px;
    line-height: 1.8;
    background: rgba(0,0,0,0.55);
    padding: 12px 18px;
    border-radius: 10px;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.1);
    pointer-events: none;
    z-index: 10;
  }
  #hud span { font-weight: bold; color: #ffd700; }

  #controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 14px;
    z-index: 10;
  }
  #controls button {
    padding: 10px 24px;
    font-size: 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
    backdrop-filter: blur(6px);
  }
  #autoBtn {
    background: rgba(255, 165, 0, 0.7);
    color: #fff;
  }
  #autoBtn:hover { background: rgba(255, 165, 0, 0.9); }
  #autoBtn.active {
    background: rgba(255, 60, 60, 0.8);
  }
  #clearBtn {
    background: rgba(100, 100, 255, 0.7);
    color: #fff;
  }
  #clearBtn:hover { background: rgba(100, 100, 255, 0.9); }

  #hint {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.3);
    font-size: 18px;
    pointer-events: none;
    z-index: 5;
    transition: opacity 1s;
  }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>

<div id="hud">
  Particles: <span id="particleCount">0</span><br>
  Explosions: <span id="explosionCount">0</span><br>
  FPS: <span id="fps">0</span>
</div>

<div id="controls">
  <button id="autoBtn">🎆 Auto Fire: OFF</button>
  <button id="clearBtn">🧹 Clear All</button>
</div>

<div id="hint">Click the sky to launch fireworks!</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── State ───
window.__3D_STATE__ = {
  particleCount: 0,
  explosionCount: 0,
  activeFireworks: 0,
  simTime: 0,
  autoFireworks: false
};

let explosionCountTotal = 0;
let autoMode = false;
let autoTimer = 0;
let simTime = 0;

// ─── Color Palette ───
const PALETTE = [
  new THREE.Color(1.0, 0.2, 0.2),   // red
  new THREE.Color(1.0, 0.84, 0.0),  // gold
  new THREE.Color(0.2, 1.0, 0.3),   // green
  new THREE.Color(0.3, 0.5, 1.0),   // blue
  new THREE.Color(0.7, 0.3, 1.0),   // purple
  new THREE.Color(1.0, 1.0, 1.0),   // white
];

const GRAVITY = 2.0;

// ─── Scene Setup ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.FogExp2(0x050510, 0.008);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 20, 60);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 20, 0);
controls.update();

// ─── Ground grid ───
const gridHelper = new THREE.GridHelper(100, 20, 0x222244, 0x111133);
scene.add(gridHelper);

// ─── Ambient light ───
const ambientLight = new THREE.AmbientLight(0x222233, 0.5);
scene.add(ambientLight);

// ─── Particle Texture ───
function createParticleTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 64;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
  gradient.addColorStop(0, 'rgba(255,255,255,1)');
  gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
  gradient.addColorStop(0.5, 'rgba(255,255,255,0.3)');
  gradient.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 64, 64);
  const texture = new THREE.CanvasTexture(canvas);
  return texture;
}

const particleTexture = createParticleTexture();

// ─── Shader for explosion particles ───
const explosionVertexShader = `
  attribute float aSize;
  attribute float aAlpha;
  attribute vec3 aColor;
  varying float vAlpha;
  varying vec3 vColor;
  void main() {
    vAlpha = aAlpha;
    vColor = aColor;
    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
    gl_PointSize = aSize * (300.0 / -mvPosition.z);
    gl_PointSize = clamp(gl_PointSize, 1.0, 80.0);
    gl_Position = projectionMatrix * mvPosition;
  }
`;

const explosionFragmentShader = `
  varying float vAlpha;
  varying vec3 vColor;
  void main() {
    float dist = length(gl_PointCoord - vec2(0.5));
    if (dist > 0.5) discard;
    float strength = 1.0 - (dist * 2.0);
    strength = pow(strength, 1.5);
    vec3 col = vColor * strength + vec3(1.0) * pow(strength, 4.0) * 0.3;
    gl_FragColor = vec4(col, vAlpha * strength);
  }
`;

// ─── Trail shader ───
const trailVertexShader = `
  attribute float aSize;
  attribute float aAlpha;
  attribute vec3 aColor;
  varying float vAlpha;
  varying vec3 vColor;
  void main() {
    vAlpha = aAlpha;
    vColor = aColor;
    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
    gl_PointSize = aSize * (300.0 / -mvPosition.z);
    gl_PointSize = clamp(gl_PointSize, 1.0, 40.0);
    gl_Position = projectionMatrix * mvPosition;
  }
`;

const trailFragmentShader = `
  varying float vAlpha;
  varying vec3 vColor;
  void main() {
    float dist = length(gl_PointCoord - vec2(0.5));
    if (dist > 0.5) discard;
    float strength = 1.0 - (dist * 2.0);
    strength = pow(strength, 2.0);
    gl_FragColor = vec4(vColor, vAlpha * strength);
  }
`;

// ─── Firework classes ───
const fireworks = [];

class RisingFirework {
  constructor(origin, target) {
    this.origin = origin.clone();
    this.target = target.clone();
    this.direction = new THREE.Vector3().subVectors(target, origin).normalize();
    this.speed = 35 + Math.random() * 15;
    this.position = origin.clone();
    this.age = 0;
    this.maxAge = origin.distanceTo(target) / this.speed;
    this.done = false;
    this.color = PALETTE[Math.floor(Math.random() * PALETTE.length)].clone();

    // Trail
    this.trailMax = 30;
    this.trailPositions = [];
    this.trailAlphas = [];

    // Create trail points
    const trailGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(this.trailMax * 3);
    const alphas = new Float32Array(this.trailMax);
    const sizes = new Float32Array(this.trailMax);
    const colors = new Float32Array(this.trailMax * 3);

    for (let i = 0; i < this.trailMax; i++) {
      positions[i * 3] = origin.x;
      positions[i * 3 + 1] = origin.y;
      positions[i * 3 + 2] = origin.z;
      alphas[i] = 0;
      sizes[i] = 3.0 * (1 - i / this.trailMax);
      colors[i * 3] = this.color.r;
      colors[i * 3 + 1] = this.color.g;
      colors[i * 3 + 2] = this.color.b;
    }

    trailGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    trailGeo.setAttribute('aAlpha', new THREE.BufferAttribute(alphas, 1));
    trailGeo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
    trailGeo.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));

    const trailMat = new THREE.ShaderMaterial({
      vertexShader: trailVertexShader,
      fragmentShader: trailFragmentShader,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
    });

    this.trailPoints = new THREE.Points(trailGeo, trailMat);
    scene.add(this.trailPoints);

    // Head particle
    const headGeo = new THREE.BufferGeometry();
    const headPos = new Float32Array(3);
    headPos[0] = origin.x; headPos[1] = origin.y; headPos[2] = origin.z;
    const headAlpha = new Float32Array([1.0]);
    const headSize = new Float32Array([6.0]);
    const headColor = new Float32Array([1, 1, 1]);

    headGeo.setAttribute('position', new THREE.BufferAttribute(headPos, 3));
    headGeo.setAttribute('aAlpha', new THREE.BufferAttribute(headAlpha, 1));
    headGeo.setAttribute('aSize', new THREE.BufferAttribute(headSize, 1));
    headGeo.setAttribute('aColor', new THREE.BufferAttribute(headColor, 3));

    const headMat = new THREE.ShaderMaterial({
      vertexShader: trailVertexShader,
      fragmentShader: trailFragmentShader,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
    });

    this.headPoints = new THREE.Points(headGeo, headMat);
    scene.add(this.headPoints);

    this.particleCount = 1 + this.trailMax;
  }

  update(dt) {
    this.age += dt;

    if (this.age >= this.maxAge) {
      this.done = true;
      this.explode();
      this.dispose();
      return;
    }

    const t = this.age / this.maxAge;
    this.position.copy(this.origin).lerp(this.target, t);
    // Add slight wobble
    this.position.x += Math.sin(this.age * 20) * 0.05;
    this.position.z += Math.cos(this.age * 20) * 0.05;

    // Update head
    const headPos = this.headPoints.geometry.attributes.position.array;
    headPos[0] = this.position.x;
    headPos[1] = this.position.y;
    headPos[2] = this.position.z;
    this.headPoints.geometry.attributes.position.needsUpdate = true;

    // Update trail
    this.trailPositions.unshift(this.position.clone());
    if (this.trailPositions.length > this.trailMax) {
      this.trailPositions.pop();
    }

    const tPos = this.trailPoints.geometry.attributes.position.array;
    const tAlpha = this.trailPoints.geometry.attributes.aAlpha.array;

    for (let i = 0; i < this.trailMax; i++) {
      if (i < this.trailPositions.length) {
        const p = this.trailPositions[i];
        tPos[i * 3] = p.x;
        tPos[i * 3 + 1] = p.y;
        tPos[i * 3 + 2] = p.z;
        tAlpha[i] = (1 - i / this.trailPositions.length) * 0.8;
      } else {
        tAlpha[i] = 0;
      }
    }

    this.trailPoints.geometry.attributes.position.needsUpdate = true;
    this.trailPoints.geometry.attributes.aAlpha.needsUpdate = true;
  }

  explode() {
    const explosion = new ExplosionFirework(this.position, this.color);
    fireworks.push(explosion);
    explosionCountTotal++;
  }

  dispose() {
    scene.remove(this.trailPoints);
    scene.remove(this.headPoints);
    this.trailPoints.geometry.dispose();
    this.trailPoints.material.dispose();
    this.headPoints.geometry.dispose();
    this.headPoints.material.dispose();
  }
}

class ExplosionFirework {
  constructor(center, color) {
    this.center = center.clone();
    this.done = false;
    this.age = 0;
    this.maxAge = 2.5 + Math.random() * 1.0;

    const count = 250 + Math.floor(Math.random() * 150);
    this.count = count;

    // Velocities
    this.velocities = new Float32Array(count * 3);
    const speed = 8 + Math.random() * 6;

    // Choose pattern
    const pattern = Math.random();

    for (let i = 0; i < count; i++) {
      // Spherical distribution
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      let r = speed * (0.5 + Math.random() * 0.5);

      if (pattern < 0.3) {
        // Ring pattern - concentrate near equator
        const ringPhi = Math.PI / 2 + (Math.random() - 0.5) * 0.5;
        this.velocities[i * 3] = r * Math.sin(ringPhi) * Math.cos(theta);
        this.velocities[i * 3 + 1] = r * Math.cos(ringPhi);
        this.velocities[i * 3 + 2] = r * Math.sin(ringPhi) * Math.sin(theta);
      } else {
        this.velocities[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        this.velocities[i * 3 + 1] = r * Math.cos(phi);
        this.velocities[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
      }
    }

    // Geometry
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(count * 3);
    const alphas = new Float32Array(count);
    const sizes = new Float32Array(count);
    const colors = new Float32Array(count * 3);

    // Secondary color for variety
    const color2 = PALETTE[Math.floor(Math.random() * PALETTE.length)].clone();
    const useMultiColor = Math.random() > 0.5;

    for (let i = 0; i < count; i++) {
      positions[i * 3] = center.x;
      positions[i * 3 + 1] = center.y;
      positions[i * 3 + 2] = center.z;
      alphas[i] = 1.0;
      sizes[i] = 2.0 + Math.random() * 3.0;

      let c = color;
      if (useMultiColor && Math.random() > 0.6) c = color2;

      // Slight variation
      colors[i * 3] = c.r * (0.8 + Math.random() * 0.4);
      colors[i * 3 + 1] = c.g * (0.8 + Math.random() * 0.4);
      colors[i * 3 + 2] = c.b * (0.8 + Math.random() * 0.4);
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('aAlpha', new THREE.BufferAttribute(alphas, 1));
    geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
    geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.ShaderMaterial({
      vertexShader: explosionVertexShader,
      fragmentShader: explosionFragmentShader,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
    });

    this.points = new THREE.Points(geometry, material);
    scene.add(this.points);

    this.particleCount = count;
  }

  update(dt) {
    this.age += dt;

    if (this.age >= this.maxAge) {
      this.done = true;
      this.dispose();
      return;
    }

    const t = this.age / this.maxAge;
    const positions = this.points.geometry.attributes.position.array;
    const alphas = this.points.geometry.attributes.aAlpha.array;
    const sizes = this.points.geometry.attributes.aSize.array;

    // Drag factor
    const drag = 0.98;

    for (let i = 0; i < this.count; i++) {
      // Apply gravity
      this.velocities[i * 3 + 1] -= GRAVITY * dt;

      // Apply drag
      this.velocities[i * 3] *= Math.pow(drag, dt * 60);
      this.velocities[i * 3 + 1] *= Math.pow(drag, dt * 60);
      this.velocities[i * 3 + 2] *= Math.pow(drag, dt * 60);

      // Update position
      positions[i * 3] += this.velocities[i * 3] * dt;
      positions[i * 3 + 1] += this.velocities[i * 3 + 1] * dt;
      positions[i * 3 + 2] += this.velocities[i * 3 + 2] * dt;

      // Fade out
      const fadeStart = 0.3;
      if (t > fadeStart) {
        alphas[i] = Math.max(0, 1.0 - (t - fadeStart) / (1.0 - fadeStart));
      }

      // Twinkle effect
      alphas[i] *= 0.8 + 0.2 * Math.sin(this.age * 10 + i * 1.7);
    }

    this.points.geometry.attributes.position.needsUpdate = true;
    this.points.geometry.attributes.aAlpha.needsUpdate = true;
  }

  dispose() {
    scene.remove(this.points);
    this.points.geometry.dispose();
    this.points.material.dispose();
  }
}

// ─── Launch firework ───
function launchFirework(targetX, targetY, targetZ) {
  const origin = new THREE.Vector3(
    targetX * 0.3 + (Math.random() - 0.5) * 5,
    0,
    targetZ * 0.3 + (Math.random() - 0.5) * 5
  );
  const target = new THREE.Vector3(targetX, targetY, targetZ);
  const rising = new RisingFirework(origin, target);
  fireworks.push(rising);

  // Hide hint
  const hint = document.getElementById('hint');
  if (hint) hint.style.opacity = '0';
}

// ─── Click handler ───
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  // Only respond to clicks in upper half of screen (sky)
  if (event.clientY > window.innerHeight * 0.75) return;

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Project to a plane at some distance
  const dir = raycaster.ray.direction.clone();
  const origin = raycaster.ray.origin.clone();

  // Find target height between 25 and 50
  const targetY = 25 + Math.random() * 25;

  if (Math.abs(dir.y) < 0.01) return;

  const t = (targetY - origin.y) / dir.y;
  if (t < 0) {
    // Click was below horizon, still launch upward
    const target = new THREE.Vector3(
      (Math.random() - 0.5) * 30,
      30 + Math.random() * 20,
      (Math.random() - 0.5) * 30
    );
    launchFirework(target.x, target.y, target.z);
    return;
  }

  const targetX = origin.x + dir.x * t;
  const targetZ = origin.z + dir.z * t;

  launchFirework(targetX, targetY, targetZ);
});

// ─── Auto fire button ───
const autoBtn = document.getElementById('autoBtn');
autoBtn.addEventListener('click', () => {
  autoMode = !autoMode;
  autoBtn.textContent = autoMode ? '🎆 Auto Fire: ON' : '🎆 Auto Fire: OFF';
  autoBtn.classList.toggle('active', autoMode);
  autoTimer = 0;
  window.__3D_STATE__.autoFireworks = autoMode;
});

// ─── Clear button ───
const clearBtn = document.getElementById('clearBtn');
clearBtn.addEventListener('click', () => {
  for (const fw of fireworks) {
    if (!fw.done) {
      fw.done = true;
      fw.dispose();
    }
  }
  fireworks.length = 0;
});

// ─── FPS tracking ───
let frameCount = 0;
let fpsTime = 0;
let currentFps = 60;

// ─── Stars background ───
function createStars() {
  const starCount = 2000;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(starCount * 3);
  const sizes = new Float32Array(starCount);

  for (let i = 0; i < starCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(Math.random()); // upper hemisphere
    const r = 200;
    pos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    pos[i * 3 + 1] = r * Math.cos(phi) + 10;
    pos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
    sizes[i] = 0.5 + Math.random() * 1.5;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

  const mat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.8,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.6,
    map: particleTexture,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });

  const stars = new THREE.Points(geo, mat);
  scene.add(stars);
}
createStars();

// ─── Animation loop ───
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.05); // cap dt
  simTime += dt;

  // FPS
  frameCount++;
  fpsTime += dt;
  if (fpsTime >= 0.5) {
    currentFps = Math.round(frameCount / fpsTime);
    fpsTime = 0;
    frameCount = 0;
  }

  // Auto fire
  if (autoMode) {
    autoTimer -= dt;
    if (autoTimer <= 0) {
      const tx = (Math.random() - 0.5) * 40;
      const ty = 25 + Math.random() * 25;
      const tz = (Math.random() - 0.5) * 40;
      launchFirework(tx, ty, tz);
      autoTimer = 1.0 + Math.random() * 1.0;
    }
  }

  // Update fireworks
  let totalParticles = 0;
  let activeCount = 0;

  for (let i = fireworks.length - 1; i >= 0; i--) {
    const fw = fireworks[i];
    if (fw.done) {
      fireworks.splice(i, 1);
      continue;
    }
    fw.update(dt);
    if (!fw.done) {
      totalParticles += fw.particleCount || 0;
      activeCount++;
    } else {
      fireworks.splice(i, 1);
    }
  }

  // Update HUD
  document.getElementById('particleCount').textContent = totalParticles;
  document.getElementById('explosionCount').textContent = explosionCountTotal;
  document.getElementById('fps').textContent = currentFps;

  // Update state
  window.__3D_STATE__.particleCount = totalParticles;
  window.__3D_STATE__.explosionCount = explosionCountTotal;
  window.__3D_STATE__.activeFireworks = activeCount;
  window.__3D_STATE__.simTime = parseFloat(simTime.toFixed(2));
  window.__3D_STATE__.autoFireworks = autoMode;

  controls.update();
  renderer.render(scene, camera);
}

animate();

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
