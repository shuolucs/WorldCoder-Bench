<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Particle Fireworks</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: monospace;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #333;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        button {
            background: #222;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-family: monospace;
            transition: background 0.2s;
        }
        button:hover {
            background: #444;
        }
        button.active {
            background: #2e8b57;
            border-color: #3cb371;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div>FPS: <span id="fps">0</span></div>
        <div>Particles: <span id="particleCount">0</span></div>
        <div>Explosions: <span id="explosionCount">0</span></div>
    </div>

    <div id="controls">
        <button id="autoBtn">Auto Launch: OFF</button>
        <button id="clearBtn">Clear All</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State ---
        window.__3D_STATE__ = {
            particleCount: 0,
            explosionCount: 0,
            activeFireworks: 0,
            simTime: 0,
            autoFireworks: false
        };

        // --- Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.002);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 60);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1; // Allow looking slightly below horizon

        // --- Shaders ---
        const fireworkVertexShader = `
            attribute float alpha;
            attribute float size;
            varying float vAlpha;
            void main() {
                vAlpha = alpha;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * (100.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fireworkFragmentShader = `
            uniform vec3 color;
            varying float vAlpha;
            void main() {
                vec2 coord = gl_PointCoord - vec2(0.5);
                float dist = length(coord);
                if (dist > 0.5) discard;
                
                // Soft edge
                float strength = 1.0 - (dist * 2.0);
                strength = pow(strength, 1.5);
                
                gl_FragColor = vec4(color, vAlpha * strength);
            }
        `;

        // --- Palette ---
        const PALETTE = [
            0xff0000, // Red
            0xffd700, // Gold
            0x00ff00, // Green
            0x0000ff, // Blue
            0x800080, // Purple
            0xffffff  // White
        ];

        // --- Classes ---
        class Rocket {
            constructor(startPos, targetPos) {
                this.startPos = startPos.clone();
                this.targetPos = targetPos.clone();
                this.position = startPos.clone();
                
                // Calculate velocity
                const distance = this.startPos.distanceTo(this.targetPos);
                const duration = distance / 30; // speed
                this.velocity = new THREE.Vector3().subVectors(this.targetPos, this.startPos).divideScalar(duration);
                
                this.trailLength = 15;
                this.isDead = false;

                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(this.trailLength * 3);
                const alphas = new Float32Array(this.trailLength);
                const sizes = new Float32Array(this.trailLength);

                for (let i = 0; i < this.trailLength; i++) {
                    positions[i * 3] = this.position.x;
                    positions[i * 3 + 1] = this.position.y;
                    positions[i * 3 + 2] = this.position.z;
                    alphas[i] = Math.max(0, 1.0 - (i / this.trailLength));
                    sizes[i] = i === 0 ? 4.0 : 2.0; // Head is bigger
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));
                geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

                const material = new THREE.ShaderMaterial({
                    uniforms: {
                        color: { value: new THREE.Color(0xffddaa) }
                    },
                    vertexShader: fireworkVertexShader,
                    fragmentShader: fireworkFragmentShader,
                    transparent: true,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending
                });

                this.points = new THREE.Points(geometry, material);
                scene.add(this.points);
            }

            update(dt) {
                if (this.isDead) return;

                this.position.addScaledVector(this.velocity, dt);

                // Check if reached target (using Y coordinate as primary indicator for upward launch)
                if (this.velocity.y > 0 && this.position.y >= this.targetPos.y) {
                    this.explode();
                    return;
                }

                // Update trail
                const positions = this.points.geometry.attributes.position.array;
                
                // Shift trail
                for (let i = this.trailLength - 1; i > 0; i--) {
                    positions[i * 3] = positions[(i - 1) * 3];
                    positions[i * 3 + 1] = positions[(i - 1) * 3 + 1];
                    positions[i * 3 + 2] = positions[(i - 1) * 3 + 2];
                }
                
                // Update head
                positions[0] = this.position.x;
                positions[1] = this.position.y;
                positions[2] = this.position.z;

                this.points.geometry.attributes.position.needsUpdate = true;
            }

            explode() {
                this.isDead = true;
                scene.remove(this.points);
                this.points.geometry.dispose();
                this.points.material.dispose();
                
                const colorHex = PALETTE[Math.floor(Math.random() * PALETTE.length)];
                explosions.push(new Explosion(this.targetPos, colorHex));
                window.__3D_STATE__.explosionCount++;
            }

            dispose() {
                scene.remove(this.points);
                this.points.geometry.dispose();
                this.points.material.dispose();
                this.isDead = true;
            }
            
            getParticleCount() {
                return this.trailLength;
            }
        }

        class Explosion {
            constructor(position, colorHex) {
                this.isDead = false;
                this.particleCount = 200 + Math.floor(Math.random() * 150); // At least 200
                
                const geometry = new THREE.BufferGeometry();
                this.positions = new Float32Array(this.particleCount * 3);
                this.velocities = new Float32Array(this.particleCount * 3);
                this.alphas = new Float32Array(this.particleCount);
                this.lifetimes = new Float32Array(this.particleCount);
                const sizes = new Float32Array(this.particleCount);

                const baseLifetime = 1.5 + Math.random() * 1.0;

                for (let i = 0; i < this.particleCount; i++) {
                    this.positions[i * 3] = position.x;
                    this.positions[i * 3 + 1] = position.y;
                    this.positions[i * 3 + 2] = position.z;

                    // Spherical distribution
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos((Math.random() * 2) - 1);
                    const speed = 10 + Math.random() * 20;

                    this.velocities[i * 3] = Math.sin(phi) * Math.cos(theta) * speed;
                    this.velocities[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * speed;
                    this.velocities[i * 3 + 2] = Math.cos(phi) * speed;

                    this.lifetimes[i] = baseLifetime * (0.5 + Math.random() * 0.5);
                    this.alphas[i] = 1.0;
                    sizes[i] = 3.0 + Math.random() * 2.0;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(this.positions, 3));
                geometry.setAttribute('alpha', new THREE.BufferAttribute(this.alphas, 1));
                geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

                const material = new THREE.ShaderMaterial({
                    uniforms: {
                        color: { value: new THREE.Color(colorHex) }
                    },
                    vertexShader: fireworkVertexShader,
                    fragmentShader: fireworkFragmentShader,
                    transparent: true,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending
                });

                this.points = new THREE.Points(geometry, material);
                scene.add(this.points);
            }

            update(dt) {
                if (this.isDead) return;

                let aliveCount = 0;
                const gravity = 2.0; // 2.0 units/s^2 downwards

                for (let i = 0; i < this.particleCount; i++) {
                    if (this.lifetimes[i] <= 0) continue;

                    aliveCount++;
                    this.lifetimes[i] -= dt;

                    // Apply gravity
                    this.velocities[i * 3 + 1] -= gravity * dt;

                    // Apply velocity
                    this.positions[i * 3] += this.velocities[i * 3] * dt;
                    this.positions[i * 3 + 1] += this.velocities[i * 3 + 1] * dt;
                    this.positions[i * 3 + 2] += this.velocities[i * 3 + 2] * dt;

                    // Update alpha
                    this.alphas[i] = Math.max(0, this.lifetimes[i]);
                }

                if (aliveCount === 0) {
                    this.dispose();
                } else {
                    this.points.geometry.attributes.position.needsUpdate = true;
                    this.points.geometry.attributes.alpha.needsUpdate = true;
                }
            }

            dispose() {
                scene.remove(this.points);
                this.points.geometry.dispose();
                this.points.material.dispose();
                this.isDead = true;
            }

            getParticleCount() {
                let count = 0;
                for(let i=0; i<this.particleCount; i++) {
                    if(this.lifetimes[i] > 0) count++;
                }
                return count;
            }
        }

        // --- System Management ---
        let rockets = [];
        let explosions = [];

        function launchFirework(targetPos) {
            // Launch from slightly below view
            const startX = targetPos.x * 0.2 + (Math.random() - 0.5) * 10;
            const startZ = targetPos.z * 0.2 + (Math.random() - 0.5) * 10;
            const startPos = new THREE.Vector3(startX, -5, startZ);
            rockets.push(new Rocket(startPos, targetPos));
        }

        function clearAll() {
            rockets.forEach(r => r.dispose());
            explosions.forEach(e => e.dispose());
            rockets = [];
            explosions = [];
        }

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            // Ignore clicks on UI
            if (event.target.tagName === 'BUTTON') return;

            // Check if click is in the upper half of the screen ("sky")
            if (event.clientY > window.innerHeight / 2) return;

            // Calculate NDC
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            // Unproject to find a target point in 3D space
            raycaster.setFromCamera(mouse, camera);
            
            // Intersect with a virtual plane at z = 0
            const planeZ = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
            const targetPos = new THREE.Vector3();
            raycaster.ray.intersectPlane(planeZ, targetPos);

            if (targetPos) {
                launchFirework(targetPos);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- UI Controls ---
        const autoBtn = document.getElementById('autoBtn');
        const clearBtn = document.getElementById('clearBtn');

        autoBtn.addEventListener('click', () => {
            window.__3D_STATE__.autoFireworks = !window.__3D_STATE__.autoFireworks;
            if (window.__3D_STATE__.autoFireworks) {
                autoBtn.textContent = 'Auto Launch: ON';
                autoBtn.classList.add('active');
            } else {
                autoBtn.textContent = 'Auto Launch: OFF';
                autoBtn.classList.remove('active');
            }
        });

        clearBtn.addEventListener('click', clearAll);

        // --- Auto Launch Logic ---
        let autoTimer = 0;
        let nextAutoTime = 1.0;

        function handleAutoLaunch(dt) {
            if (!window.__3D_STATE__.autoFireworks) return;
            
            autoTimer += dt;
            if (autoTimer >= nextAutoTime) {
                autoTimer = 0;
                nextAutoTime = 1.0 + Math.random() * 1.0; // 1-2 seconds
                
                // Random target in the sky
                const targetPos = new THREE.Vector3(
                    (Math.random() - 0.5) * 60,
                    15 + Math.random() * 25,
                    (Math.random() - 0.5) * 20 - 10
                );
                launchFirework(targetPos);
            }
        }

        // --- Main Loop ---
        const clock = new THREE.Clock();
        let frames = 0;
        let prevTime = performance.now();

        const elFps = document.getElementById('fps');
        const elParticleCount = document.getElementById('particleCount');
        const elExplosionCount = document.getElementById('explosionCount');

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1); // Cap dt to prevent huge jumps
            window.__3D_STATE__.simTime += dt;

            controls.update();
            handleAutoLaunch(dt);

            let currentParticleCount = 0;

            // Update Rockets
            for (let i = rockets.length - 1; i >= 0; i--) {
                rockets[i].update(dt);
                if (rockets[i].isDead) {
                    rockets.splice(i, 1);
                } else {
                    currentParticleCount += rockets[i].getParticleCount();
                }
            }

            // Update Explosions
            for (let i = explosions.length - 1; i >= 0; i--) {
                explosions[i].update(dt);
                if (explosions[i].isDead) {
                    explosions.splice(i, 1);
                } else {
                    currentParticleCount += explosions[i].getParticleCount();
                }
            }

            // Render
            renderer.render(scene, camera);

            // Update State & HUD
            window.__3D_STATE__.particleCount = currentParticleCount;
            window.__3D_STATE__.activeFireworks = rockets.length + explosions.length;

            frames++;
            const time = performance.now();
            if (time >= prevTime + 1000) {
                elFps.textContent = Math.round((frames * 1000) / (time - prevTime));
                frames = 0;
                prevTime = time;
            }

            elParticleCount.textContent = window.__3D_STATE__.particleCount;
            elExplosionCount.textContent = window.__3D_STATE__.explosionCount;
        }

        animate();
    </script>
</body>
</html>
