<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 粒子烟花系统</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050814;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .panel {
      background: rgba(8, 12, 24, 0.72);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 12px;
      backdrop-filter: blur(6px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.25);
      pointer-events: auto;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    button:hover {
      background: rgba(255,255,255,0.14);
    }

    button.active {
      background: rgba(94, 179, 255, 0.28);
      border-color: rgba(94, 179, 255, 0.5);
    }

    #hud {
      font-size: 14px;
      line-height: 1.8;
      min-width: 220px;
    }

    #hint {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      padding: 10px 12px;
      background: rgba(8, 12, 24, 0.62);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.88);
      pointer-events: none;
    }

    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app"></div>

  <div id="ui">
    <div class="panel row">
      <button id="autoBtn">自动发射：关闭</button>
      <button id="clearBtn">清除全部</button>
    </div>
    <div id="hud" class="panel">
      <div>活跃粒子：<span id="particleCount">0</span></div>
      <div>累计爆炸：<span id="explosionCount">0</span></div>
      <div>帧率：<span id="fps">0</span></div>
    </div>
  </div>

  <div id="hint">点击画面上半部分天空区域发射烟花，可拖拽旋转视角。</div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const autoBtn = document.getElementById('autoBtn');
    const clearBtn = document.getElementById('clearBtn');
    const particleCountEl = document.getElementById('particleCount');
    const explosionCountEl = document.getElementById('explosionCount');
    const fpsEl = document.getElementById('fps');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050814);
    scene.fog = new THREE.Fog(0x050814, 80, 220);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 18, 55);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 18, 0);
    controls.minDistance = 20;
    controls.maxDistance = 120;
    controls.maxPolarAngle = Math.PI * 0.48;

    scene.add(new THREE.AmbientLight(0xffffff, 0.35));

    const dirLight = new THREE.DirectionalLight(0x88aaff, 0.35);
    dirLight.position.set(20, 40, 10);
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(90, 64),
      new THREE.MeshBasicMaterial({
        color: 0x08101e,
        transparent: true,
        opacity: 0.55,
        side: THREE.DoubleSide
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const grid = new THREE.GridHelper(120, 24, 0x1b2f57, 0x10203d);
    grid.position.y = 0.01;
    grid.material.transparent = true;
    grid.material.opacity = 0.22;
    scene.add(grid);

    const starCount = 800;
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      const r = 180 * Math.cbrt(Math.random());
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.random() * Math.PI * 0.6;
      starPositions[i * 3 + 0] = Math.cos(theta) * Math.sin(phi) * r;
      starPositions[i * 3 + 1] = 40 + Math.cos(phi) * r * 0.45;
      starPositions[i * 3 + 2] = Math.sin(theta) * Math.sin(phi) * r;
    }
    const starGeom = new THREE.BufferGeometry();
    starGeom.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starMat = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.7,
      transparent: true,
      opacity: 0.8,
      sizeAttenuation: true,
      depthWrite: false
    });
    const stars = new THREE.Points(starGeom, starMat);
    scene.add(stars);

    const GRAVITY = 2.0;
    const fireworks = [];
    let explosionCount = 0;
    let simTime = 0;
    let autoFire = false;
    let autoTimer = 0;
    let nextAutoDelay = randomRange(1, 2);

    const raycaster = new THREE.Raycaster();
    const launchPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

    const palette = [
      new THREE.Color(0xff3b30),
      new THREE.Color(0xffd54a),
      new THREE.Color(0x30d158),
      new THREE.Color(0x0a84ff),
      new THREE.Color(0xbf5af2),
      new THREE.Color(0xffffff)
    ];

    class Firework {
      constructor(targetPoint, color) {
        this.color = color.clone();
        this.state = 'ascending';
        this.done = false;

        this.launchPos = new THREE.Vector3(
          THREE.MathUtils.randFloatSpread(10),
          0.8,
          THREE.MathUtils.randFloatSpread(10)
        );

        const target = targetPoint.clone();
        target.y = Math.max(18, target.y);

        this.burstPos = target.clone();

        this.rocketPos = this.launchPos.clone();
        this.rocketVel = target.clone().sub(this.launchPos).normalize().multiplyScalar(randomRange(22, 28));

        this.rocketGeom = new THREE.BufferGeometry();
        this.rocketPositions = new Float32Array(3);
        this.rocketPositions[0] = this.rocketPos.x;
        this.rocketPositions[1] = this.rocketPos.y;
        this.rocketPositions[2] = this.rocketPos.z;
        this.rocketGeom.setAttribute('position', new THREE.BufferAttribute(this.rocketPositions, 3));

        this.rocketMat = new THREE.PointsMaterial({
          color: this.color,
          size: 1.8,
          transparent: true,
          opacity: 1,
          depthWrite: false,
          sizeAttenuation: true
        });

        this.rocketPoints = new THREE.Points(this.rocketGeom, this.rocketMat);
        scene.add(this.rocketPoints);

        this.trailMax = 18;
        this.trailPositions = new Float32Array(this.trailMax * 3);
        for (let i = 0; i < this.trailMax; i++) {
          this.trailPositions[i * 3 + 0] = this.rocketPos.x;
          this.trailPositions[i * 3 + 1] = this.rocketPos.y;
          this.trailPositions[i * 3 + 2] = this.rocketPos.z;
        }
        this.trailGeom = new THREE.BufferGeometry();
        this.trailGeom.setAttribute('position', new THREE.BufferAttribute(this.trailPositions, 3));
        this.trailMat = new THREE.PointsMaterial({
          color: this.color,
          size: 1.05,
          transparent: true,
          opacity: 0.38,
          depthWrite: false,
          sizeAttenuation: true
        });
        this.trailPoints = new THREE.Points(this.trailGeom, this.trailMat);
        scene.add(this.trailPoints);

        this.particleCount = 0;
        this.particlePositions = null;
        this.particleVelocities = null;
        this.particleAges = null;
        this.particleLifetimes = null;
        this.particleGeom = null;
        this.particleMat = null;
        this.particlePoints = null;
        this.activeParticleCount = 0;
      }

      explode() {
        this.state = 'exploding';
        explosionCount++;

        scene.remove(this.rocketPoints);
        this.rocketGeom.dispose();
        this.rocketMat.dispose();

        scene.remove(this.trailPoints);
        this.trailGeom.dispose();
        this.trailMat.dispose();

        const count = Math.floor(randomRange(220, 320));
        this.particleCount = count;
        this.activeParticleCount = count;
        this.particlePositions = new Float32Array(count * 3);
        this.particleVelocities = new Float32Array(count * 3);
        this.particleAges = new Float32Array(count);
        this.particleLifetimes = new Float32Array(count);

        for (let i = 0; i < count; i++) {
          const dir = randomUnitVector();
          const speed = randomRange(8, 18);

          this.particlePositions[i * 3 + 0] = this.burstPos.x;
          this.particlePositions[i * 3 + 1] = this.burstPos.y;
          this.particlePositions[i * 3 + 2] = this.burstPos.z;

          this.particleVelocities[i * 3 + 0] = dir.x * speed;
          this.particleVelocities[i * 3 + 1] = dir.y * speed;
          this.particleVelocities[i * 3 + 2] = dir.z * speed;

          this.particleAges[i] = 0;
          this.particleLifetimes[i] = randomRange(2.6, 4.2);
        }

        this.particleGeom = new THREE.BufferGeometry();
        this.particleGeom.setAttribute('position', new THREE.BufferAttribute(this.particlePositions, 3));
        this.particleMat = new THREE.PointsMaterial({
          color: this.color,
          size: randomRange(1.4, 2.2),
          transparent: true,
          opacity: 1,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
          sizeAttenuation: true
        });
        this.particlePoints = new THREE.Points(this.particleGeom, this.particleMat);
        scene.add(this.particlePoints);
      }

      updateTrail() {
        for (let i = this.trailMax - 1; i > 0; i--) {
          this.trailPositions[i * 3 + 0] = this.trailPositions[(i - 1) * 3 + 0];
          this.trailPositions[i * 3 + 1] = this.trailPositions[(i - 1) * 3 + 1];
          this.trailPositions[i * 3 + 2] = this.trailPositions[(i - 1) * 3 + 2];
        }
        this.trailPositions[0] = this.rocketPos.x;
        this.trailPositions[1] = this.rocketPos.y;
        this.trailPositions[2] = this.rocketPos.z;
        this.trailGeom.attributes.position.needsUpdate = true;
      }

      update(dt) {
        if (this.done) return 0;

        if (this.state === 'ascending') {
          this.rocketPos.addScaledVector(this.rocketVel, dt);

          this.rocketPositions[0] = this.rocketPos.x;
          this.rocketPositions[1] = this.rocketPos.y;
          this.rocketPositions[2] = this.rocketPos.z;
          this.rocketGeom.attributes.position.needsUpdate = true;

          this.updateTrail();

          const distToBurst = this.rocketPos.distanceTo(this.burstPos);
          if (distToBurst < 1.6 || this.rocketPos.y >= this.burstPos.y) {
            this.explode();
          }
          return 1 + this.trailMax;
        }

        if (this.state === 'exploding') {
          let alive = 0;
          let alphaSum = 0;

          for (let i = 0; i < this.particleCount; i++) {
            const age = this.particleAges[i] + dt;
            const life = this.particleLifetimes[i];
            this.particleAges[i] = age;

            if (age >= life) {
              continue;
            }

            this.particleVelocities[i * 3 + 1] -= GRAVITY * dt;

            this.particlePositions[i * 3 + 0] += this.particleVelocities[i * 3 + 0] * dt;
            this.particlePositions[i * 3 + 1] += this.particleVelocities[i * 3 + 1] * dt;
            this.particlePositions[i * 3 + 2] += this.particleVelocities[i * 3 + 2] * dt;

            const t = age / life;
            alphaSum += (1 - t);
            alive++;
          }

          this.activeParticleCount = alive;
          this.particleGeom.attributes.position.needsUpdate = true;
          this.particleMat.opacity = alive > 0 ? THREE.MathUtils.clamp(alphaSum / Math.max(alive, 1), 0, 1) : 0;

          if (alive <= 0) {
            this.disposeParticles();
            this.done = true;
          }
          return alive;
        }

        return 0;
      }

      disposeParticles() {
        if (this.particlePoints) {
          scene.remove(this.particlePoints);
          this.particleGeom.dispose();
          this.particleMat.dispose();
          this.particlePoints = null;
        }
      }

      disposeAll() {
        if (this.rocketPoints) {
          scene.remove(this.rocketPoints);
          this.rocketGeom.dispose();
          this.rocketMat.dispose();
          this.rocketPoints = null;
        }
        if (this.trailPoints) {
          scene.remove(this.trailPoints);
          this.trailGeom.dispose();
          this.trailMat.dispose();
          this.trailPoints = null;
        }
        this.disposeParticles();
        this.done = true;
      }
    }

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function randomUnitVector() {
      const u = Math.random() * 2 - 1;
      const theta = Math.random() * Math.PI * 2;
      const s = Math.sqrt(1 - u * u);
      return new THREE.Vector3(
        s * Math.cos(theta),
        u,
        s * Math.sin(theta)
      );
    }

    function pickColor() {
      return palette[Math.floor(Math.random() * palette.length)];
    }

    function launchFirework(targetPoint) {
      const fw = new Firework(targetPoint, pickColor());
      fireworks.push(fw);
    }

    function randomAutoTarget() {
      return new THREE.Vector3(
        randomRange(-30, 30),
        randomRange(22, 48),
        randomRange(-18, 18)
      );
    }

    function clearAllFireworks() {
      for (const fw of fireworks) {
        fw.disposeAll();
      }
      fireworks.length = 0;
    }

    autoBtn.addEventListener('click', () => {
      autoFire = !autoFire;
      autoBtn.classList.toggle('active', autoFire);
      autoBtn.textContent = `自动发射：${autoFire ? '开启' : '关闭'}`;
      autoTimer = 0;
      nextAutoDelay = randomRange(1, 2);
    });

    clearBtn.addEventListener('click', () => {
      clearAllFireworks();
    });

    renderer.domElement.addEventListener('pointerdown', (event) => {
      if (event.clientY > window.innerHeight * 0.5) return;

      const rect = renderer.domElement.getBoundingClientRect();
      const ndc = new THREE.Vector2(
        ((event.clientX - rect.left) / rect.width) * 2 - 1,
        -((event.clientY - rect.top) / rect.height) * 2 + 1
      );

      raycaster.setFromCamera(ndc, camera);
      const target = new THREE.Vector3();
      const hit = raycaster.ray.intersectPlane(launchPlane, target);

      if (hit) {
        target.z = THREE.MathUtils.clamp(target.z, -20, 20);
        target.x = THREE.MathUtils.clamp(target.x, -35, 35);
        target.y = THREE.MathUtils.clamp(target.y, 18, 55);
        launchFirework(target);
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    let lastTime = performance.now();
    let fpsAccum = 0;
    let fpsFrames = 0;
    let fpsDisplay = 0;

    function animate(now) {
      requestAnimationFrame(animate);

      let dt = (now - lastTime) / 1000;
      lastTime = now;
      dt = Math.min(dt, 0.05);
      simTime += dt;

      controls.update();

      if (autoFire) {
        autoTimer += dt;
        if (autoTimer >= nextAutoDelay) {
          autoTimer = 0;
          nextAutoDelay = randomRange(1, 2);
          launchFirework(randomAutoTarget());
        }
      }

      let totalParticles = 0;

      for (let i = fireworks.length - 1; i >= 0; i--) {
        const fw = fireworks[i];
        totalParticles += fw.update(dt);
        if (fw.done) {
          fireworks.splice(i, 1);
        }
      }

      fpsAccum += dt;
      fpsFrames++;
      if (fpsAccum >= 0.5) {
        fpsDisplay = Math.round(fpsFrames / fpsAccum);
        fpsAccum = 0;
        fpsFrames = 0;
      }

      particleCountEl.textContent = String(totalParticles);
      explosionCountEl.textContent = String(explosionCount);
      fpsEl.textContent = String(fpsDisplay);

      window.__3D_STATE__ = {
        particleCount: totalParticles,
        explosionCount: explosionCount,
        activeFireworks: fireworks.length,
        simTime: simTime,
        autoFireworks: autoFire
      };

      renderer.render(scene, camera);
    }

    animate(performance.now());
  </script>
</body>
</html>
