<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Bowling Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
        #scoreDisplay {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #gameStatus {
            font-size: 18px;
            margin-bottom: 20px;
        }
        #controls-help {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 20px;
        }
        #resetBtn {
            pointer-events: auto;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #resetBtn:hover {
            background-color: #45a049;
        }
        #resetBtn:active {
            background-color: #3e8e41;
            transform: translateY(2px);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <div id="scoreDisplay">Score: 0</div>
        <div id="gameStatus">Aiming</div>
        <div id="controls-help">Left/Right Arrows to aim<br>Spacebar to launch</div>
        <button id="resetBtn">Reset Game</button>
    </div>
    <div id="loading">Loading Pins...</div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            ballPosition: { x: 0, y: 0.4, z: 10 },
            ballLaunched: false,
            pinsDown: 0,
            totalPins: 10,
            gamePhase: 'aiming', // 'aiming', 'rolling', 'finished'
            particlesActive: 0,
            pinsLoaded: false
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 18);
        camera.lookAt(0, 0, -10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, -10);
        controls.update();

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- Environment ---
        // Bowling Lane
        const laneGeometry = new THREE.BoxGeometry(3, 0.2, 30);
        const laneMaterial = new THREE.MeshStandardMaterial({ color: 0xC4A45A, roughness: 0.4 });
        const lane = new THREE.Mesh(laneGeometry, laneMaterial);
        lane.position.set(0, -0.1, -5);
        lane.receiveShadow = true;
        scene.add(lane);

        // Gutters
        const gutterGeometry = new THREE.BoxGeometry(0.2, 0.4, 30);
        const gutterMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });
        
        const leftGutter = new THREE.Mesh(gutterGeometry, gutterMaterial);
        leftGutter.position.set(-1.6, 0, -5);
        scene.add(leftGutter);

        const rightGutter = new THREE.Mesh(gutterGeometry, gutterMaterial);
        rightGutter.position.set(1.6, 0, -5);
        scene.add(rightGutter);

        // --- Bowling Ball ---
        const ballRadius = 0.4;
        const ballGeometry = new THREE.SphereGeometry(ballRadius, 32, 32);
        const ballMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a8a, 
            roughness: 0.2,
            metalness: 0.5
        });
        const ball = new THREE.Mesh(ballGeometry, ballMaterial);
        ball.position.set(0, 0.4, 10);
        ball.castShadow = true;
        scene.add(ball);

        // --- Bowling Pins ---
        const pins = [];
        const pinPositions = [
            { x: 0, z: -12 },
            { x: -0.5, z: -12.8 }, { x: 0.5, z: -12.8 },
            { x: -1, z: -13.6 }, { x: 0, z: -13.6 }, { x: 1, z: -13.6 },
            { x: -1.5, z: -14.4 }, { x: -0.5, z: -14.4 }, { x: 0.5, z: -14.4 }, { x: 1.5, z: -14.4 }
        ];

        const loader = new GLTFLoader();
        // Using a reliable public GLB for the Lantern model
        const modelUrl = 'https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/Lantern/glTF-Binary/Lantern.glb';
        
        loader.load(modelUrl, (gltf) => {
            const baseModel = gltf.scene;
            
            pinPositions.forEach((pos, index) => {
                const pinMesh = baseModel.clone();
                pinMesh.scale.set(0.3, 0.3, 0.3);
                // Lane top is at y=0
                pinMesh.position.set(pos.x, 0, pos.z);
                
                pinMesh.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                scene.add(pinMesh);
                
                pins.push({
                    mesh: pinMesh,
                    knocked: false,
                    startPos: pinMesh.position.clone(),
                    startRot: pinMesh.rotation.clone()
                });
            });
            
            window.__3D_STATE__.pinsLoaded = true;
            document.getElementById('loading').style.display = 'none';
        }, undefined, (error) => {
            console.error('Error loading pin model:', error);
            document.getElementById('loading').innerText = 'Error loading model';
        });

        // --- Particle System ---
        const particles = [];
        const particleGeometry = new THREE.SphereGeometry(0.05, 4, 4);
        const particleMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xffaa00, 
            transparent: true, 
            opacity: 1 
        });

        function spawnParticles(position) {
            for (let i = 0; i < 20; i++) {
                const mesh = new THREE.Mesh(particleGeometry, particleMaterial.clone());
                mesh.position.copy(position);
                mesh.position.y += 0.3; // Spawn slightly above base
                scene.add(mesh);

                const dir = new THREE.Vector3(
                    Math.random() - 0.5,
                    Math.random() - 0.2, // Bias upwards
                    Math.random() - 0.5
                ).normalize();
                
                const speed = Math.random() * 5 + 2;
                const velocity = dir.multiplyScalar(speed);

                particles.push({
                    mesh: mesh,
                    velocity: velocity,
                    life: 1.0
                });
            }
        }

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            if (window.__3D_STATE__.gamePhase !== 'aiming' || !window.__3D_STATE__.pinsLoaded) return;

            if (e.key === 'ArrowLeft') {
                ball.position.x -= 0.1;
                if (ball.position.x < -1.2) ball.position.x = -1.2;
            } else if (e.key === 'ArrowRight') {
                ball.position.x += 0.1;
                if (ball.position.x > 1.2) ball.position.x = 1.2;
            } else if (e.key === ' ' || e.code === 'Space') {
                window.__3D_STATE__.ballLaunched = true;
                window.__3D_STATE__.gamePhase = 'rolling';
                updateUI();
            }
        });

        // --- Reset Functionality ---
        document.getElementById('resetBtn').addEventListener('click', () => {
            // Reset Ball
            ball.position.set(0, 0.4, 10);
            ball.rotation.set(0, 0, 0);
            
            // Reset State
            window.__3D_STATE__.ballLaunched = false;
            window.__3D_STATE__.gamePhase = 'aiming';
            window.__3D_STATE__.pinsDown = 0;
            
            // Reset Pins
            pins.forEach(pin => {
                pin.knocked = false;
                pin.mesh.position.copy(pin.startPos);
                pin.mesh.rotation.copy(pin.startRot);
            });

            // Clear Particles
            particles.forEach(p => {
                scene.remove(p.mesh);
                p.mesh.material.dispose();
            });
            particles.length = 0;

            updateUI();
        });

        function updateUI() {
            document.getElementById('scoreDisplay').innerText = `Score: ${window.__3D_STATE__.pinsDown}`;
            
            let statusText = 'Aiming';
            if (window.__3D_STATE__.gamePhase === 'rolling') statusText = 'Rolling...';
            if (window.__3D_STATE__.gamePhase === 'finished') statusText = 'Finished!';
            document.getElementById('gameStatus').innerText = statusText;
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        const ballSpeed = 15;

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Update Ball
            if (window.__3D_STATE__.ballLaunched && window.__3D_STATE__.gamePhase === 'rolling') {
                ball.position.z -= ballSpeed * delta;
                ball.rotation.x -= (ballSpeed * delta) / ballRadius; // Roll animation

                // Collision Detection
                pins.forEach(pin => {
                    if (!pin.knocked) {
                        const dx = ball.position.x - pin.mesh.position.x;
                        const dz = ball.position.z - pin.mesh.position.z;
                        const dist = Math.sqrt(dx * dx + dz * dz);

                        if (dist < 0.6) {
                            pin.knocked = true;
                            window.__3D_STATE__.pinsDown++;
                            
                            // Knockdown animation
                            pin.mesh.rotation.x -= Math.PI / 2;
                            pin.mesh.position.y += 0.1; // Adjust so it doesn't clip through floor completely
                            pin.mesh.position.z -= 0.5; // Push back
                            
                            spawnParticles(pin.mesh.position);
                            updateUI();
                        }
                    }
                });

                // Check end condition
                if (ball.position.z < -18 || window.__3D_STATE__.pinsDown === 10) {
                    window.__3D_STATE__.gamePhase = 'finished';
                    updateUI();
                }
            }

            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.mesh.position.add(p.velocity.clone().multiplyScalar(delta));
                p.life -= delta;
                p.mesh.material.opacity = p.life;

                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    p.mesh.material.dispose();
                    particles.splice(i, 1);
                }
            }

            // Update State Object
            window.__3D_STATE__.ballPosition = { x: ball.position.x, y: ball.position.y, z: ball.position.z };
            window.__3D_STATE__.particlesActive = particles.length;

            renderer.render(scene, camera);
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
