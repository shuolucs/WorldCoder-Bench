<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Bowling Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #scoreDisplay, #gameStatus {
      background: rgba(0, 0, 0, 0.55);
      padding: 8px 12px;
      border-radius: 8px;
      min-width: 120px;
    }

    #resetBtn {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #f0b43c;
      color: #111;
      font-weight: bold;
      cursor: pointer;
    }

    #resetBtn:hover {
      background: #ffd06b;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="scoreDisplay">Score: 0</div>
    <div id="gameStatus">Aiming</div>
    <button id="resetBtn">Reset</button>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x20242b);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 8, 18);
    camera.lookAt(0, 0, -10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, -10);
    controls.enableDamping = true;

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    // Lane
    const laneGeometry = new THREE.BoxGeometry(3, 0.2, 30);
    const laneMaterial = new THREE.MeshStandardMaterial({ color: 0xC4A45A });
    const lane = new THREE.Mesh(laneGeometry, laneMaterial);
    lane.position.set(0, -0.1, -5);
    scene.add(lane);

    // Gutters / side walls
    const gutterGeometry = new THREE.BoxGeometry(0.12, 0.35, 30);
    const gutterMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });

    const leftGutter = new THREE.Mesh(gutterGeometry, gutterMaterial);
    leftGutter.position.set(-1.56, 0.075, -5);
    scene.add(leftGutter);

    const rightGutter = new THREE.Mesh(gutterGeometry, gutterMaterial);
    rightGutter.position.set(1.56, 0.075, -5);
    scene.add(rightGutter);

    // Ground
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(80, 80),
      new THREE.MeshStandardMaterial({ color: 0x2a2a2a, side: THREE.DoubleSide })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.11;
    scene.add(floor);

    // Ball
    const ballStart = new THREE.Vector3(0, 0.4, 10);
    const ballGeometry = new THREE.SphereGeometry(0.4, 32, 32);
    const ballMaterial = new THREE.MeshStandardMaterial({ color: 0x1a1a8a });
    const ball = new THREE.Mesh(ballGeometry, ballMaterial);
    ball.position.copy(ballStart);
    scene.add(ball);

    const BALL_SPEED = 15;
    const AIM_MIN_X = -1.2;
    const AIM_MAX_X = 1.2;

    // Pin setup
    const pinPositions = [
      [ 0.0, -12.0 ],
      [-0.5, -12.8 ], [ 0.5, -12.8 ],
      [-1.0, -13.6 ], [ 0.0, -13.6 ], [ 1.0, -13.6 ],
      [-1.5, -14.4 ], [-0.5, -14.4 ], [ 0.5, -14.4 ], [ 1.5, -14.4 ]
    ];

    const pins = [];
    let pinTemplate = null;
    let pinsLoaded = false;

    const loader = new GLTFLoader();

    // Try local first, then remote fallback
    const modelCandidates = [
      "Lantern.glb",
      "https://threejs.org/examples/models/gltf/Lantern/glTF-Binary/Lantern.glb"
    ];

    function loadLanternModel(index = 0) {
      loader.load(
        modelCandidates[index],
        (gltf) => {
          pinTemplate = gltf.scene;
          createPinsFromTemplate();
        },
        undefined,
        () => {
          if (index + 1 < modelCandidates.length) {
            loadLanternModel(index + 1);
          } else {
            console.warn("Lantern.glb failed to load; using fallback pin meshes.");
            createFallbackPins();
          }
        }
      );
    }

    function getPinBaseYForObject(obj) {
      const box = new THREE.Box3().setFromObject(obj);
      return -box.min.y + 0.1; // lane top at y = 0.1
    }

    function createPinsFromTemplate() {
      for (const [x, z] of pinPositions) {
        const pin = pinTemplate.clone(true);
        pin.scale.set(0.3, 0.3, 0.3);

        pin.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = false;
            child.receiveShadow = true;
            if (child.material) child.material = child.material.clone();
          }
        });

        const y = getPinBaseYForObject(pin);
        pin.position.set(x, y, z);
        pin.rotation.set(0, 0, 0);

        scene.add(pin);

        pins.push({
          mesh: pin,
          standingPos: new THREE.Vector3(x, y, z),
          knocked: false
        });
      }

      pinsLoaded = true;
    }

    function createFallbackPins() {
      const fallbackGeo = new THREE.CylinderGeometry(0.12, 0.16, 0.9, 16);
      const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xddddd8 });

      for (const [x, z] of pinPositions) {
        const pinMesh = new THREE.Mesh(fallbackGeo, fallbackMat.clone());
        pinMesh.position.set(x, 0.1 + 0.45, z);
        scene.add(pinMesh);

        pins.push({
          mesh: pinMesh,
          standingPos: pinMesh.position.clone(),
          knocked: false
        });
      }

      pinsLoaded = true;
    }

    loadLanternModel();

    // Particles
    const particles = [];

    function spawnParticles(position) {
      for (let i = 0; i < 20; i++) {
        const geo = new THREE.SphereGeometry(0.05, 8, 8);
        const mat = new THREE.MeshStandardMaterial({
          color: i % 2 === 0 ? 0xffcc33 : 0xff7a00,
          transparent: true,
          opacity: 1
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(position);
        scene.add(mesh);

        const velocity = new THREE.Vector3(
          (Math.random() - 0.5) * 4,
          Math.random() * 2.5,
          (Math.random() - 0.5) * 4
        );

        particles.push({
          mesh,
          velocity,
          life: 1.0,
          maxLife: 1.0
        });
      }
    }

    // UI and state
    const scoreDisplay = document.getElementById("scoreDisplay");
    const gameStatus = document.getElementById("gameStatus");
    const resetBtn = document.getElementById("resetBtn");

    let ballLaunched = false;
    let pinsDown = 0;
    let gamePhase = "aiming";

    window.__3D_STATE__ = {
      ballPosition: { x: ball.position.x, y: ball.position.y, z: ball.position.z },
      ballLaunched: false,
      pinsDown: 0,
      totalPins: 10,
      gamePhase: "aiming",
      particlesActive: 0,
      pinsLoaded: false
    };

    function updateHUD() {
      scoreDisplay.textContent = `Score: ${pinsDown}`;
      gameStatus.textContent =
        gamePhase === "aiming" ? "Aiming" :
        gamePhase === "rolling" ? "Rolling" :
        "Finished";
    }

    function updateState() {
      window.__3D_STATE__ = {
        ballPosition: {
          x: ball.position.x,
          y: ball.position.y,
          z: ball.position.z
        },
        ballLaunched,
        pinsDown,
        totalPins: 10,
        gamePhase,
        particlesActive: particles.length,
        pinsLoaded
      };
    }

    function knockPin(pin) {
      if (pin.knocked) return;

      pin.knocked = true;
      pinsDown++;

      pin.mesh.rotation.x = -Math.PI / 2;
      pin.mesh.position.y = 0.18;
      pin.mesh.position.z -= 0.15 + Math.random() * 0.2;
      pin.mesh.position.x += (Math.random() - 0.5) * 0.25;

      spawnParticles(pin.mesh.position);
      updateHUD();
    }

    function resetGame() {
      ball.position.copy(ballStart);
      ballLaunched = false;
      pinsDown = 0;
      gamePhase = "aiming";

      for (const p of particles) {
        scene.remove(p.mesh);
        p.mesh.geometry.dispose();
        p.mesh.material.dispose();
      }
      particles.length = 0;

      for (const pin of pins) {
        pin.knocked = false;
        pin.mesh.position.copy(pin.standingPos);
        pin.mesh.rotation.set(0, 0, 0);
      }

      updateHUD();
      updateState();
    }

    resetBtn.addEventListener("click", resetGame);

    // Input
    window.addEventListener("keydown", (e) => {
      if (gamePhase === "aiming" && !ballLaunched) {
        if (e.code === "ArrowLeft") {
          ball.position.x = Math.max(AIM_MIN_X, ball.position.x - 0.15);
        } else if (e.code === "ArrowRight") {
          ball.position.x = Math.min(AIM_MAX_X, ball.position.x + 0.15);
        } else if (e.code === "Space") {
          ballLaunched = true;
          gamePhase = "rolling";
          updateHUD();
        }
      }
    });

    const clock = new THREE.Clock();

    function updateParticles(delta) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= delta;

        p.mesh.position.addScaledVector(p.velocity, delta);
        p.velocity.y -= 3.5 * delta;

        const alpha = Math.max(0, p.life / p.maxLife);
        p.mesh.material.opacity = alpha;

        if (p.life <= 0) {
          scene.remove(p.mesh);
          p.mesh.geometry.dispose();
          p.mesh.material.dispose();
          particles.splice(i, 1);
        }
      }
    }

    function checkPinCollisions() {
      for (const pin of pins) {
        if (pin.knocked) continue;

        const dx = ball.position.x - pin.mesh.position.x;
        const dz = ball.position.z - pin.mesh.position.z;
        const distXZ = Math.sqrt(dx * dx + dz * dz);

        if (distXZ <= 0.6) {
          knockPin(pin);
        }
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (ballLaunched && gamePhase === "rolling") {
        ball.position.z -= BALL_SPEED * delta;
        ball.rotation.x += 10 * delta;

        checkPinCollisions();

        if (ball.position.z <= -18 || pinsDown === 10) {
          gamePhase = "finished";
          ballLaunched = false;
          updateHUD();
        }
      }

      updateParticles(delta);
      controls.update();
      updateState();
      renderer.render(scene, camera);
    }

    updateHUD();
    updateState();
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
