<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound-Reactive Sculpture</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: monospace; }
canvas { display: block; }

#score-display {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-size: 24px;
    text-shadow: 0 0 10px rgba(255,255,255,0.7), 0 0 20px rgba(255,100,0,0.5);
    z-index: 10;
}

#mode-display {
    position: absolute;
    top: 20px;
    right: 20px;
    color: white;
    font-size: 20px;
    text-shadow: 0 0 10px rgba(255,255,255,0.7), 0 0 20px rgba(0,100,255,0.5);
    z-index: 10;
}

#combo-display {
    position: absolute;
    top: 55px;
    left: 20px;
    color: white;
    font-size: 18px;
    text-shadow: 0 0 10px rgba(255,255,255,0.7), 0 0 20px rgba(255,200,0,0.5);
    z-index: 10;
}

#stats-display {
    position: absolute;
    top: 85px;
    left: 20px;
    color: white;
    font-size: 14px;
    text-shadow: 0 0 8px rgba(255,255,255,0.5);
    z-index: 10;
}

#btn-toggle-rings {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 24px;
    font-family: monospace;
    font-size: 16px;
    color: white;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    cursor: pointer;
    z-index: 10;
    text-shadow: 0 0 8px rgba(255,255,255,0.5);
    transition: background 0.3s;
}

#btn-toggle-rings:hover {
    background: rgba(255,255,255,0.25);
}

#loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-family: monospace;
    font-size: 20px;
    text-shadow: 0 0 15px rgba(255,100,0,0.8);
    z-index: 20;
}
</style>
</head>
<body>

<div id="score-display">Score: 0</div>
<div id="mode-display">Mode: chill</div>
<div id="combo-display">Combo: 1x</div>
<div id="stats-display">Hits: 0 | Misses: 0 | Max Combo: 0</div>
<button id="btn-toggle-rings">Hide Rings</button>
<div id="loading">Loading model...</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
const state = {
    modelLoaded: false,
    score: 0,
    combo: 1,
    maxCombo: 0,
    hits: 0,
    misses: 0,
    totalClicks: 0,
    mode: 'chill',
    paused: false,
    ringsVisible: true,
    sculptureRotationY: 0,
    sculptureScale: 1,
    sculptureY: 0,
    frequencyBands: [0, 0, 0, 0, 0, 0, 0, 0],
    averageFrequency: 0,
    activeRingCount: 0,
    particleOpacity: 0.2,
    timeMultiplier: 1.0,
    elapsedTime: 0,
    ringEmissiveIntensities: [0, 0, 0, 0, 0, 0, 0, 0],
    ambientIntensity: 0.3
};
window.__3D_STATE__ = state;

// DOM refs
const scoreDisplay = document.getElementById('score-display');
const modeDisplay = document.getElementById('mode-display');
const comboDisplay = document.getElementById('combo-display');
const statsDisplay = document.getElementById('stats-display');
const btnToggleRings = document.getElementById('btn-toggle-rings');
const loadingDiv = document.getElementById('loading');

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0x222244, 0.3);
scene.add(ambientLight);

const sunLight = new THREE.PointLight(0xff6600, 2);
sunLight.position.set(3, 3, 3);
scene.add(sunLight);

const moonLight = new THREE.PointLight(0x0066ff, 1.5);
moonLight.position.set(-3, 2, -2);
scene.add(moonLight);

// Sculpture
let sculpture = null;

const loader = new GLTFLoader();
loader.load(
    'MosquitoInAmber.glb',
    (gltf) => {
        sculpture = gltf.scene;

        // Compute bounding box and center/scale
        const box = new THREE.Box3().setFromObject(sculpture);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scaleFactor = 2.0 / maxDim; // fit within 2-unit bounding sphere

        sculpture.position.sub(center.multiplyScalar(1));
        sculpture.scale.setScalar(scaleFactor);

        // Re-center after scaling
        const box2 = new THREE.Box3().setFromObject(sculpture);
        const center2 = box2.getCenter(new THREE.Vector3());
        sculpture.position.sub(center2);

        scene.add(sculpture);
        state.modelLoaded = true;
        loadingDiv.style.display = 'none';
    },
    (progress) => {
        if (progress.total > 0) {
            const pct = Math.round((progress.loaded / progress.total) * 100);
            loadingDiv.textContent = `Loading model... ${pct}%`;
        }
    },
    (error) => {
        console.error('Error loading model:', error);
        loadingDiv.textContent = 'Model load failed. Scene still active.';
        setTimeout(() => { loadingDiv.style.display = 'none'; }, 3000);
    }
);

// Rings
const ringColors = [
    0xff0000, // red
    0xff8800, // orange
    0xffff00, // yellow
    0x00ff00, // green
    0x00ffff, // cyan
    0x0000ff, // blue
    0x4b0082, // indigo
    0x8b00ff  // violet
];

const ringRadii = [1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0];
const rings = [];
const ringOriginalColors = [];
const ringFlashTimers = [];

for (let i = 0; i < 8; i++) {
    const geometry = new THREE.TorusGeometry(ringRadii[i], 0.02, 16, 64);
    const color = new THREE.Color(ringColors[i]);
    const material = new THREE.MeshStandardMaterial({
        color: color,
        emissive: color.clone(),
        emissiveIntensity: 0,
        transparent: true,
        opacity: 0.3,
        side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(geometry, material);
    ring.rotation.x = Math.PI / 2; // lie flat in XZ plane
    ring.position.y = i * 0.2; // Y from 0.0 to 1.4
    ring.userData.ringIndex = i;
    scene.add(ring);
    rings.push(ring);
    ringOriginalColors.push(color.clone());
    ringFlashTimers.push(0);
}

// Particles
const particleCount = 500;
const particleGeometry = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleSpherical = []; // store spherical coords for each particle

for (let i = 0; i < particleCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 3 * Math.cbrt(Math.random()); // uniform in sphere
    particleSpherical.push({
        theta: theta,
        phi: phi,
        r: r,
        thetaSpeed: (Math.random() - 0.5) * 0.5,
        phiSpeed: (Math.random() - 0.5) * 0.2,
        rOffset: Math.random() * Math.PI * 2
    });

    particlePositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    particlePositions[i * 3 + 1] = r * Math.cos(phi);
    particlePositions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
}

particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

const particleMaterial = new THREE.PointsMaterial({
    color: 0xffaa00,
    size: 0.05,
    transparent: true,
    opacity: 0.2,
    blending: THREE.AdditiveBlending,
    depthWrite: false
});

const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Click handler
renderer.domElement.addEventListener('click', (event) => {
    if (state.paused) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    const visibleRings = rings.filter(r => r.visible);
    const intersects = raycaster.intersectObjects(visibleRings);

    if (intersects.length > 0) {
        const hitRing = intersects[0].object;
        const idx = hitRing.userData.ringIndex;
        const intensity = hitRing.material.emissiveIntensity;

        state.totalClicks++;

        if (intensity > 1.0) {
            // Successful hit
            const points = 10 * (idx + 1) * state.combo;
            state.score += points;
            state.hits++;
            state.combo++;
            if (state.combo > state.maxCombo) state.maxCombo = state.combo;

            // Flash white
            hitRing.material.emissive.set(0xffffff);
            ringFlashTimers[idx] = 0.2; // 200ms
        } else {
            // Miss
            state.score = Math.max(0, state.score - 5);
            state.misses++;
            state.combo = 1;
        }
    }
});

// Toggle rings button
btnToggleRings.addEventListener('click', () => {
    state.ringsVisible = !state.ringsVisible;
    rings.forEach(r => r.visible = state.ringsVisible);
    btnToggleRings.textContent = state.ringsVisible ? 'Hide Rings' : 'Show Rings';
});

// Keyboard
document.addEventListener('keydown', (event) => {
    const key = event.key.toLowerCase();
    if (key === '1') {
        state.mode = 'chill';
        state.timeMultiplier = 1.0;
        ambientLight.intensity = 0.3;
        state.ambientIntensity = 0.3;
    } else if (key === '2') {
        state.mode = 'intense';
        state.timeMultiplier = 2.5;
        ambientLight.intensity = 0.1;
        state.ambientIntensity = 0.1;
    } else if (key === '3') {
        state.mode = 'zen';
        state.timeMultiplier = 0.3;
        ambientLight.intensity = 0.5;
        state.ambientIntensity = 0.5;
    } else if (key === 'r') {
        state.score = 0;
        state.combo = 1;
        state.maxCombo = 0;
        state.hits = 0;
        state.misses = 0;
        state.totalClicks = 0;
    } else if (key === 'p') {
        state.paused = !state.paused;
    }
});

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation
const clock = new THREE.Clock();
let elapsedTime = 0;

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    if (!state.paused) {
        const dt = delta * state.timeMultiplier;
        elapsedTime += dt;
        state.elapsedTime = elapsedTime;

        const time = elapsedTime;

        // Mode multiplier for frequency
        let freqMultiplier = 1.0;
        if (state.mode === 'intense') freqMultiplier = 1.5;
        else if (state.mode === 'zen') freqMultiplier = 0.5;

        // Simulated frequency bands
        for (let i = 0; i < 8; i++) {
            state.frequencyBands[i] = (0.5 + 0.5 * Math.sin(time * (1.0 + i * 0.7) + i * Math.PI / 4)) * freqMultiplier;
            state.frequencyBands[i] = Math.max(0, Math.min(state.frequencyBands[i], 1.5)); // clamp
        }

        const avg = state.frequencyBands.reduce((a, b) => a + b, 0) / 8;
        state.averageFrequency = avg;

        // Update rings
        let activeCount = 0;
        for (let i = 0; i < 8; i++) {
            const ring = rings[i];
            const freq = state.frequencyBands[i];

            // Flash timer
            if (ringFlashTimers[i] > 0) {
                ringFlashTimers[i] -= delta;
                if (ringFlashTimers[i] <= 0) {
                    ringFlashTimers[i] = 0;
                    ring.material.emissive.copy(ringOriginalColors[i]);
                }
            }

            ring.scale.y = 1 + freq * 0.5;
            if (ringFlashTimers[i] <= 0) {
                ring.material.emissiveIntensity = freq * 2;
            }
            ring.material.opacity = 0.3 + freq * 0.7;

            state.ringEmissiveIntensities[i] = ring.material.emissiveIntensity;

            if (ring.material.emissiveIntensity > 1.0) activeCount++;
        }
        state.activeRingCount = activeCount;

        // Sculpture animation
        if (sculpture) {
            const rotSpeed = 0.3 + avg * 2.0;
            sculpture.rotation.y += rotSpeed * delta;
            state.sculptureRotationY = sculpture.rotation.y;

            const bobY = Math.sin(time * 1.5) * 0.2;
            sculpture.position.y = bobY;
            state.sculptureY = bobY;

            const scaleVal = 1.0 + avg * 0.15;
            sculpture.scale.setScalar(scaleVal * (sculpture.userData.baseScale || 1));
            // We need to store the base scale
            if (!sculpture.userData.baseScale) {
                sculpture.userData.baseScale = sculpture.scale.x;
                sculpture.scale.setScalar(sculpture.userData.baseScale * scaleVal);
            }
            state.sculptureScale = scaleVal;
        }

        // Particles
        const positions = particleGeometry.attributes.position.array;
        for (let i = 0; i < particleCount; i++) {
            const sp = particleSpherical[i];
            sp.theta += sp.thetaSpeed * delta;
            sp.phi += sp.phiSpeed * delta;

            const r = sp.r + Math.sin(time * 0.5 + sp.rOffset) * 0.3;
            const phi = sp.phi;
            const theta = sp.theta;

            positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = r * Math.cos(phi);
            positions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
        }
        particleGeometry.attributes.position.needsUpdate = true;

        const pOpacity = 0.2 + avg * 0.8;
        particleMaterial.opacity = pOpacity;
        state.particleOpacity = pOpacity;
    }

    // Update HUD
    scoreDisplay.textContent = `Score: ${state.score}`;
    modeDisplay.textContent = `Mode: ${state.mode}`;
    comboDisplay.textContent = `Combo: ${state.combo}x`;
    statsDisplay.textContent = `Hits: ${state.hits} | Misses: ${state.misses} | Max Combo: ${state.maxCombo}`;

    controls.update();
    renderer.render(scene, camera);
}

// Fix sculpture base scale handling
// We need to properly handle the scale. Let's set it after loading.
const checkSculpture = setInterval(() => {
    if (sculpture && !sculpture.userData.baseScale) {
        sculpture.userData.baseScale = sculpture.scale.x;
        clearInterval(checkSculpture);
    }
}, 100);

animate();
</script>
</body>
</html>
