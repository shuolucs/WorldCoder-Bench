<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Sound-Reactive Sculpture</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: monospace;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .hud {
            position: absolute;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8), 0 0 10px rgba(255, 255, 255, 0.5);
            pointer-events: none;
            z-index: 10;
        }
        #score-display { top: 20px; left: 20px; font-size: 24px; font-weight: bold; }
        #combo-display { top: 50px; left: 20px; font-size: 18px; color: #ffaa00; }
        #stats-display { top: 80px; left: 20px; font-size: 14px; color: #aaaaaa; }
        #mode-display { top: 20px; right: 20px; font-size: 20px; text-align: right; }
        #controls-help { bottom: 20px; left: 20px; font-size: 12px; color: #888; }
        
        #btn-toggle-rings {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-family: monospace;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
            transition: background 0.2s;
            z-index: 10;
            pointer-events: auto;
        }
        #btn-toggle-rings:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="score-display" class="hud">Score: 0</div>
    <div id="combo-display" class="hud">Combo: 1x</div>
    <div id="stats-display" class="hud">Hits: 0 | Misses: 0 | Max Combo: 1</div>
    <div id="mode-display" class="hud">Mode: chill</div>
    <div id="controls-help" class="hud">1: Chill | 2: Intense | 3: Zen | R: Reset | P: Pause</div>
    <button id="btn-toggle-rings">Hide Rings</button>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            score: 0,
            combo: 1,
            maxCombo: 1,
            hits: 0,
            misses: 0,
            totalClicks: 0,
            mode: 'chill',
            paused: false,
            ringsVisible: true,
            sculptureRotationY: 0,
            sculptureScale: 1,
            sculptureY: 0,
            frequencyBands: new Array(8).fill(0),
            averageFrequency: 0,
            activeRingCount: 0,
            particleOpacity: 0,
            timeMultiplier: 1.0,
            elapsedTime: 0,
            ringEmissiveIntensities: new Array(8).fill(0),
            ambientIntensity: 0.3
        };

        const state = window.__3D_STATE__;

        // --- DOM Elements ---
        const scoreEl = document.getElementById('score-display');
        const comboEl = document.getElementById('combo-display');
        const statsEl = document.getElementById('stats-display');
        const modeEl = document.getElementById('mode-display');
        const btnToggleRings = document.getElementById('btn-toggle-rings');

        function updateHUD() {
            scoreEl.innerText = `Score: ${state.score}`;
            comboEl.innerText = `Combo: ${state.combo}x`;
            statsEl.innerText = `Hits: ${state.hits} | Misses: ${state.misses} | Max Combo: ${state.maxCombo}`;
            modeEl.innerText = `Mode: ${state.mode}`;
            btnToggleRings.innerText = state.ringsVisible ? 'Hide Rings' : 'Show Rings';
        }

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0x222244, state.ambientIntensity);
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xff6600, 2);
        sunLight.position.set(3, 3, 3);
        scene.add(sunLight);

        const moonLight = new THREE.PointLight(0x0066ff, 1.5);
        moonLight.position.set(-3, 2, -2);
        scene.add(moonLight);

        // --- Reactive Ring System ---
        const ringsGroup = new THREE.Group();
        scene.add(ringsGroup);
        const rings = [];
        const ringColors = [0xff0000, 0xff7f00, 0xffff00, 0x00ff00, 0x00ffff, 0x0000ff, 0x4b0082, 0x9400d3];
        const ringRadii = [1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0];

        for (let i = 0; i < 8; i++) {
            const geometry = new THREE.TorusGeometry(ringRadii[i], 0.02, 16, 64);
            const material = new THREE.MeshStandardMaterial({
                color: ringColors[i],
                emissive: ringColors[i],
                emissiveIntensity: 0,
                transparent: true,
                opacity: 0.3,
                side: THREE.DoubleSide
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.rotation.x = Math.PI / 2; // Lie flat

            const group = new THREE.Group();
            group.position.y = i * 0.2;
            group.add(mesh);
            
            group.userData = {
                index: i,
                baseColor: ringColors[i],
                mesh: mesh,
                flashUntil: 0
            };
            
            ringsGroup.add(group);
            rings.push(group);
        }

        // --- Particle System ---
        const particleCount = 500;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleData = [];

        for (let i = 0; i < particleCount; i++) {
            const radius = 3 + (Math.random() - 0.5) * 0.5;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            
            particleData.push({
                radius: radius,
                theta: theta,
                phi: phi,
                speedTheta: (Math.random() - 0.5) * 0.5,
                speedPhi: (Math.random() - 0.5) * 0.5
            });

            particlePositions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
            particlePositions[i * 3 + 1] = radius * Math.cos(phi);
            particlePositions[i * 3 + 2] = radius * Math.sin(phi) * Math.sin(theta);
        }

        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMaterial = new THREE.PointsMaterial({
            color: 0xffaa00,
            size: 0.05,
            transparent: true,
            opacity: 0.2,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particleSystem);

        // --- Sculpture Loading ---
        let sculpture = null;
        const loader = new GLTFLoader();
        
        // Create a placeholder while loading
        const placeholderGeo = new THREE.OctahedronGeometry(0.5, 0);
        const placeholderMat = new THREE.MeshStandardMaterial({ color: 0x444444, wireframe: true });
        sculpture = new THREE.Mesh(placeholderGeo, placeholderMat);
        scene.add(sculpture);

        loader.load(
            'MosquitoInAmber.glb',
            (gltf) => {
                scene.remove(sculpture);
                sculpture = gltf.scene;
                
                // Center and scale
                const box = new THREE.Box3().setFromObject(sculpture);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                
                // Reset pivot to center
                sculpture.position.sub(center);
                
                // Wrap in a group to handle centering + animation easily
                const wrapper = new THREE.Group();
                wrapper.add(sculpture);
                
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 2.0 / maxDim;
                wrapper.scale.setScalar(scale);
                
                sculpture = wrapper;
                scene.add(sculpture);
                state.modelLoaded = true;
            },
            undefined,
            (error) => {
                console.error('Error loading model, using placeholder.', error);
                state.modelLoaded = true; // Proceed anyway
            }
        );

        // --- Interaction & Scoring ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (state.paused || !state.ringsVisible) return;
            if (event.target.id === 'btn-toggle-rings') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            
            // Raycast against the meshes inside the groups
            const meshes = rings.map(g => g.userData.mesh);
            const intersects = raycaster.intersectObjects(meshes);

            if (intersects.length > 0) {
                state.totalClicks++;
                const hitMesh = intersects[0].object;
                const group = hitMesh.parent;
                const index = group.userData.index;
                const intensity = hitMesh.material.emissiveIntensity;

                if (intensity > 1.0) {
                    // Hit
                    const points = 10 * (index + 1) * state.combo;
                    state.score += points;
                    state.hits++;
                    state.combo++;
                    if (state.combo > state.maxCombo) state.maxCombo = state.combo;
                    
                    // Flash effect
                    hitMesh.material.emissive.setHex(0xffffff);
                    group.userData.flashUntil = performance.now() + 200;
                } else {
                    // Miss
                    state.score = Math.max(0, state.score - 5);
                    state.misses++;
                    state.combo = 1;
                }
                updateHUD();
            }
        });

        // --- Controls & Modes ---
        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            if (key === '1') {
                state.mode = 'chill';
                state.timeMultiplier = 1.0;
                state.ambientIntensity = 0.3;
            } else if (key === '2') {
                state.mode = 'intense';
                state.timeMultiplier = 2.5;
                state.ambientIntensity = 0.1;
            } else if (key === '3') {
                state.mode = 'zen';
                state.timeMultiplier = 0.3;
                state.ambientIntensity = 0.5;
            } else if (key === 'r') {
                state.score = 0;
                state.combo = 1;
                state.hits = 0;
                state.misses = 0;
                state.totalClicks = 0;
            } else if (key === 'p') {
                state.paused = !state.paused;
            }
            ambientLight.intensity = state.ambientIntensity;
            updateHUD();
        });

        btnToggleRings.addEventListener('click', () => {
            state.ringsVisible = !state.ringsVisible;
            ringsGroup.visible = state.ringsVisible;
            updateHUD();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let lastTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            let delta = (now - lastTime) / 1000;
            lastTime = now;

            if (!state.paused) {
                state.elapsedTime += delta * state.timeMultiplier;
                
                // 1. Simulated Audio
                let ampMultiplier = state.mode === 'intense' ? 1.5 : (state.mode === 'zen' ? 0.5 : 1.0);
                let avgFreq = 0;
                state.activeRingCount = 0;

                for (let i = 0; i < 8; i++) {
                    let val = 0.5 + 0.5 * Math.sin(state.elapsedTime * (1.0 + i * 0.7) + i * Math.PI / 4);
                    val *= ampMultiplier;
                    state.frequencyBands[i] = val;
                    avgFreq += val;
                }
                state.averageFrequency = avgFreq / 8;

                // 2. Update Rings
                rings.forEach((group, i) => {
                    const freq = state.frequencyBands[i];
                    const mesh = group.userData.mesh;
                    
                    group.scale.y = 1 + freq * 0.5;
                    
                    const targetIntensity = freq * 2;
                    mesh.material.opacity = 0.3 + freq * 0.7;
                    
                    if (targetIntensity > 1.0) state.activeRingCount++;
                    state.ringEmissiveIntensities[i] = targetIntensity;

                    // Handle flash
                    if (now > group.userData.flashUntil) {
                        mesh.material.emissive.setHex(group.userData.baseColor);
                        mesh.material.emissiveIntensity = targetIntensity;
                    } else {
                        mesh.material.emissiveIntensity = 2.0; // Boost intensity during flash
                    }
                });

                // 3. Update Sculpture
                if (sculpture) {
                    const rotSpeed = 0.3 + (state.averageFrequency * 2.0);
                    sculpture.rotation.y += rotSpeed * delta * state.timeMultiplier;
                    sculpture.position.y = Math.sin(state.elapsedTime * 1.5) * 0.2;
                    const targetScale = 1.0 + state.averageFrequency * 0.15;
                    sculpture.scale.setScalar(targetScale);

                    state.sculptureRotationY = sculpture.rotation.y;
                    state.sculptureY = sculpture.position.y;
                    state.sculptureScale = targetScale;
                }

                // 4. Update Particles
                const positions = particleGeometry.attributes.position.array;
                for (let i = 0; i < particleCount; i++) {
                    const p = particleData[i];
                    p.theta += p.speedTheta * delta * state.timeMultiplier;
                    p.phi += p.speedPhi * delta * state.timeMultiplier;
                    
                    positions[i * 3] = p.radius * Math.sin(p.phi) * Math.cos(p.theta);
                    positions[i * 3 + 1] = p.radius * Math.cos(p.phi);
                    positions[i * 3 + 2] = p.radius * Math.sin(p.phi) * Math.sin(p.theta);
                }
                particleGeometry.attributes.position.needsUpdate = true;
                
                state.particleOpacity = 0.2 + state.averageFrequency * 0.8;
                particleMaterial.opacity = state.particleOpacity;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
