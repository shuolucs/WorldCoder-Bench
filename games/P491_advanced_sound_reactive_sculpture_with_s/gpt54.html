<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sound Reactive Sculpture Experience</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: monospace;
    }

    canvas {
      display: block;
    }

    .hud {
      position: fixed;
      color: white;
      text-shadow:
        0 0 6px rgba(255,255,255,0.6),
        0 0 12px rgba(100,180,255,0.35);
      z-index: 10;
      user-select: none;
      pointer-events: none;
    }

    #score-panel {
      top: 16px;
      left: 16px;
      font-size: 18px;
      line-height: 1.6;
    }

    #mode-display {
      top: 16px;
      right: 16px;
      font-size: 18px;
      text-align: right;
    }

    #controls-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      pointer-events: auto;
    }

    #btn-toggle-rings {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.35);
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-family: monospace;
      font-size: 15px;
      text-shadow:
        0 0 6px rgba(255,255,255,0.6),
        0 0 12px rgba(100,180,255,0.35);
      box-shadow: 0 0 14px rgba(80, 120, 255, 0.15);
      transition: background 0.2s ease, transform 0.1s ease;
    }

    #btn-toggle-rings:hover {
      background: rgba(255,255,255,0.14);
    }

    #btn-toggle-rings:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div id="score-panel" class="hud">
    <div id="score-display">Score: 0</div>
    <div id="combo-display">Combo: 1x</div>
    <div id="stats-display">Hits: 0 | Misses: 0 | Max Combo: 1</div>
  </div>

  <div id="mode-display" class="hud">Mode: chill</div>

  <div id="controls-panel">
    <button id="btn-toggle-rings">Hide Rings</button>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    // Camera
    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.5, 0);

    // Lights
    const ambientLight = new THREE.AmbientLight(0x222244, 0.3);
    scene.add(ambientLight);

    const sunLight = new THREE.PointLight(0xff6600, 2, 100);
    sunLight.position.set(3, 3, 3);
    scene.add(sunLight);

    const moonLight = new THREE.PointLight(0x0066ff, 1.5, 100);
    moonLight.position.set(-3, 2, -2);
    scene.add(moonLight);

    // Root group for sculpture
    const sculptureGroup = new THREE.Group();
    scene.add(sculptureGroup);

    let mainSculpture = null;
    let baseSculptureScale = 1;
    let modelLoaded = false;

    // Fallback sculpture if model fails
    function createFallbackSculpture() {
      const group = new THREE.Group();

      const core = new THREE.Mesh(
        new THREE.IcosahedronGeometry(0.8, 2),
        new THREE.MeshStandardMaterial({
          color: 0xaa7733,
          metalness: 0.55,
          roughness: 0.35,
          emissive: 0x221100,
          emissiveIntensity: 0.4
        })
      );

      const shell = new THREE.Mesh(
        new THREE.SphereGeometry(1.0, 48, 48),
        new THREE.MeshStandardMaterial({
          color: 0xffbb55,
          transparent: true,
          opacity: 0.25,
          metalness: 0.1,
          roughness: 0.15,
          emissive: 0x553300,
          emissiveIntensity: 0.2
        })
      );

      group.add(core, shell);
      sculptureGroup.add(group);
      mainSculpture = group;
      baseSculptureScale = 1;
      modelLoaded = false;
    }

    // Load GLB model
    const loader = new GLTFLoader();
    loader.load(
      'MosquitoInAmber.glb',
      (gltf) => {
        const model = gltf.scene;

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        model.position.sub(center);

        const radius = size.length() * 0.5 || 1;
        const targetRadius = 2.0;
        const fitScale = targetRadius / radius;
        model.scale.setScalar(fitScale);

        // Re-center after scale to ensure at origin
        const box2 = new THREE.Box3().setFromObject(model);
        const center2 = box2.getCenter(new THREE.Vector3());
        model.position.sub(center2);

        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = false;
            child.receiveShadow = false;
            if (child.material) {
              child.material.needsUpdate = true;
            }
          }
        });

        sculptureGroup.add(model);
        mainSculpture = model;
        baseSculptureScale = fitScale;
        modelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load MosquitoInAmber.glb, using fallback sculpture.', err);
        createFallbackSculpture();
      }
    );

    // Reactive Ring System
    const ringRadii = [1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0];
    const ringColors = [
      0xff0000, // red
      0xff7f00, // orange
      0xffff00, // yellow
      0x00ff00, // green
      0x00ffff, // cyan
      0x0000ff, // blue
      0x4b0082, // indigo
      0x8f00ff  // violet
    ];

    const rings = [];
    const ringBaseEmissives = [];

    for (let i = 0; i < 8; i++) {
      const geometry = new THREE.TorusGeometry(ringRadii[i], 0.02, 16, 64);
      const material = new THREE.MeshStandardMaterial({
        color: ringColors[i],
        emissive: ringColors[i],
        emissiveIntensity: 0,
        transparent: true,
        opacity: 0.3,
        metalness: 0.2,
        roughness: 0.4
      });

      const ring = new THREE.Mesh(geometry, material);
      ring.rotation.x = Math.PI / 2;
      ring.position.set(0, i * 0.2, 0);
      ring.userData.ringIndex = i;
      scene.add(ring);
      rings.push(ring);
      ringBaseEmissives.push(new THREE.Color(ringColors[i]));
    }

    let ringsVisible = true;

    // Frequency system
    const frequencyBands = new Array(8).fill(0);

    // Particles
    const particleCount = 500;
    const particlePositions = new Float32Array(particleCount * 3);
    const particleSpherical = [];
    const particleGeometry = new THREE.BufferGeometry();

    for (let i = 0; i < particleCount; i++) {
      const radius = 1.2 + Math.random() * 1.8;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.random() * Math.PI;
      const thetaSpeed = (Math.random() * 0.4 + 0.1) * (Math.random() < 0.5 ? -1 : 1);
      const phiSpeed = (Math.random() * 0.2 + 0.05) * (Math.random() < 0.5 ? -1 : 1);

      particleSpherical.push({ radius, theta, phi, thetaSpeed, phiSpeed });

      const x = radius * Math.sin(phi) * Math.cos(theta);
      const y = radius * Math.cos(phi);
      const z = radius * Math.sin(phi) * Math.sin(theta);

      particlePositions[i * 3 + 0] = x;
      particlePositions[i * 3 + 1] = y;
      particlePositions[i * 3 + 2] = z;
    }

    particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

    const particleMaterial = new THREE.PointsMaterial({
      color: 0xffaa00,
      size: 0.05,
      transparent: true,
      opacity: 0.2,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    // Raycasting / scoring
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    let score = 0;
    let combo = 1;
    let maxCombo = 1;
    let hits = 0;
    let misses = 0;
    let totalClicks = 0;

    function clampScore() {
      if (score < 0) score = 0;
    }

    function updateHUD() {
      document.getElementById('score-display').textContent = `Score: ${score}`;
      document.getElementById('combo-display').textContent = `Combo: ${combo}x`;
      document.getElementById('stats-display').textContent =
        `Hits: ${hits} | Misses: ${misses} | Max Combo: ${maxCombo}`;
      document.getElementById('mode-display').textContent = `Mode: ${mode}`;
    }

    function flashRing(ring, index) {
      const material = ring.material;
      const prevEmissive = ringBaseEmissives[index].clone();
      material.emissive.set(0xffffff);
      setTimeout(() => {
        material.emissive.copy(prevEmissive);
      }, 200);
    }

    renderer.domElement.addEventListener('click', (event) => {
      totalClicks++;

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(rings.filter(r => r.visible), false);

      if (intersects.length > 0) {
        const ring = intersects[0].object;
        const index = ring.userData.ringIndex;
        const active = ring.material.emissiveIntensity > 1.0;

        if (active) {
          hits++;
          const gained = 10 * (index + 1) * combo;
          score += gained;
          flashRing(ring, index);
          combo++;
          if (combo > maxCombo) maxCombo = combo;
        } else {
          misses++;
          score -= 5;
          clampScore();
          combo = 1;
        }
      } else {
        misses++;
        score -= 5;
        clampScore();
        combo = 1;
      }

      updateHUD();
    });

    // Modes
    let mode = 'chill';
    let paused = false;
    let timeMultiplier = 1.0;
    let amplitudeMultiplier = 1.0;

    function applyMode(newMode) {
      mode = newMode;
      if (mode === 'chill') {
        timeMultiplier = 1.0;
        amplitudeMultiplier = 1.0;
        ambientLight.intensity = 0.3;
      } else if (mode === 'intense') {
        timeMultiplier = 2.5;
        amplitudeMultiplier = 1.5;
        ambientLight.intensity = 0.1;
      } else if (mode === 'zen') {
        timeMultiplier = 0.3;
        amplitudeMultiplier = 0.5;
        ambientLight.intensity = 0.5;
      }
      updateHUD();
    }

    function resetScoreState() {
      score = 0;
      combo = 1;
      maxCombo = 1;
      hits = 0;
      misses = 0;
      totalClicks = 0;
      updateHUD();
    }

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === '1') applyMode('chill');
      if (key === '2') applyMode('intense');
      if (key === '3') applyMode('zen');
      if (key === 'r') resetScoreState();
      if (key === 'p') paused = !paused;
    });

    // Ring visibility toggle
    const btnToggleRings = document.getElementById('btn-toggle-rings');
    btnToggleRings.addEventListener('click', () => {
      ringsVisible = !ringsVisible;
      rings.forEach(r => r.visible = ringsVisible);
      btnToggleRings.textContent = ringsVisible ? 'Hide Rings' : 'Show Rings';
    });

    // Time
    const clock = new THREE.Clock();
    let elapsedTime = 0;

    // Exposed state
    window.__3D_STATE__ = {
      modelLoaded: false,
      score: 0,
      combo: 1,
      maxCombo: 1,
      hits: 0,
      misses: 0,
      totalClicks: 0,
      mode: 'chill',
      paused: false,
      ringsVisible: true,
      sculptureRotationY: 0,
      sculptureScale: 1,
      sculptureY: 0,
      frequencyBands: [...frequencyBands],
      averageFrequency: 0,
      activeRingCount: 0,
      particleOpacity: 0.2,
      timeMultiplier: 1.0,
      elapsedTime: 0,
      ringEmissiveIntensities: new Array(8).fill(0),
      ambientIntensity: ambientLight.intensity
    };

    function updateExposedState(avgFreq, activeRingCount) {
      window.__3D_STATE__.modelLoaded = modelLoaded;
      window.__3D_STATE__.score = score;
      window.__3D_STATE__.combo = combo;
      window.__3D_STATE__.maxCombo = maxCombo;
      window.__3D_STATE__.hits = hits;
      window.__3D_STATE__.misses = misses;
      window.__3D_STATE__.totalClicks = totalClicks;
      window.__3D_STATE__.mode = mode;
      window.__3D_STATE__.paused = paused;
      window.__3D_STATE__.ringsVisible = ringsVisible;
      window.__3D_STATE__.sculptureRotationY = sculptureGroup.rotation.y;
      window.__3D_STATE__.sculptureScale = sculptureGroup.scale.x;
      window.__3D_STATE__.sculptureY = sculptureGroup.position.y;
      window.__3D_STATE__.frequencyBands = [...frequencyBands];
      window.__3D_STATE__.averageFrequency = avgFreq;
      window.__3D_STATE__.activeRingCount = activeRingCount;
      window.__3D_STATE__.particleOpacity = particleMaterial.opacity;
      window.__3D_STATE__.timeMultiplier = timeMultiplier;
      window.__3D_STATE__.elapsedTime = elapsedTime;
      window.__3D_STATE__.ringEmissiveIntensities = rings.map(r => r.material.emissiveIntensity);
      window.__3D_STATE__.ambientIntensity = ambientLight.intensity;
    }

    // Init
    applyMode('chill');
    updateHUD();

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (!paused) {
        elapsedTime += delta * timeMultiplier;
      }

      const time = elapsedTime;

      // Frequency simulation
      let sum = 0;
      for (let i = 0; i < 8; i++) {
        let amp = 0.5 + 0.5 * Math.sin(time * (1.0 + i * 0.7) + i * Math.PI / 4);
        amp *= amplitudeMultiplier;
        amp = THREE.MathUtils.clamp(amp, 0, 1.5);
        frequencyBands[i] = amp;
        sum += amp;
      }

      const averageFrequency = sum / 8;

      // Rings
      let activeRingCount = 0;
      for (let i = 0; i < rings.length; i++) {
        const ring = rings[i];
        const f = frequencyBands[i];

        ring.scale.y = 1 + f * 0.5;
        ring.material.emissiveIntensity = f * 2;
        ring.material.opacity = 0.3 + Math.min(f, 1) * 0.7;

        if (ring.material.emissiveIntensity > 1.0) activeRingCount++;
      }

      // Sculpture animation
      const rotationSpeed = 0.3 + averageFrequency * 2.0;
      sculptureGroup.rotation.y += (!paused ? delta * rotationSpeed : 0);
      sculptureGroup.position.y = Math.sin(time * 1.5) * 0.2;

      const pulseScale = 1.0 + averageFrequency * 0.15;
      sculptureGroup.scale.setScalar(pulseScale);

      // Particles
      const positions = particleGeometry.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        const p = particleSpherical[i];
        if (!paused) {
          p.theta += delta * p.thetaSpeed * (0.5 + averageFrequency);
          p.phi += delta * p.phiSpeed * (0.5 + averageFrequency * 0.8);

          const phiMin = 0.08;
          const phiMax = Math.PI - 0.08;
          if (p.phi < phiMin) {
            p.phi = phiMin;
            p.phiSpeed *= -1;
          }
          if (p.phi > phiMax) {
            p.phi = phiMax;
            p.phiSpeed *= -1;
          }
        }

        const x = p.radius * Math.sin(p.phi) * Math.cos(p.theta);
        const y = p.radius * Math.cos(p.phi);
        const z = p.radius * Math.sin(p.phi) * Math.sin(p.theta);

        positions[i * 3 + 0] = x;
        positions[i * 3 + 1] = y;
        positions[i * 3 + 2] = z;
      }
      particleGeometry.attributes.position.needsUpdate = true;
      particleMaterial.opacity = 0.2 + Math.min(averageFrequency, 1) * 0.8;

      controls.update();
      updateExposedState(averageFrequency, activeRingCount);
      renderer.render(scene, camera);
    }

    animate();

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
