<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>军事阵型模拟器</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Microsoft YaHei', Arial, sans-serif; }
canvas { display: block; }

#hud {
  position: absolute;
  top: 15px;
  left: 15px;
  background: rgba(0, 0, 0, 0.75);
  color: #00ff88;
  padding: 15px 20px;
  border-radius: 10px;
  font-size: 14px;
  line-height: 1.8;
  border: 1px solid rgba(0, 255, 136, 0.3);
  backdrop-filter: blur(10px);
  min-width: 200px;
}

#hud .title {
  font-size: 16px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

#hud .label {
  color: #aaa;
  margin-right: 5px;
}

#controls {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  align-items: center;
  background: rgba(0, 0, 0, 0.75);
  padding: 15px 25px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
}

#controls button {
  padding: 10px 20px;
  border: 2px solid #00ff88;
  background: rgba(0, 255, 136, 0.1);
  color: #00ff88;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  transition: all 0.3s;
  min-width: 70px;
}

#controls button:hover {
  background: rgba(0, 255, 136, 0.3);
  transform: translateY(-2px);
  box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
}

#controls button.active {
  background: #00ff88;
  color: #000;
}

#marchBtn.marching {
  border-color: #ff4444;
  color: #ff4444;
  background: rgba(255, 68, 68, 0.2);
}

#marchBtn.marching:hover {
  background: rgba(255, 68, 68, 0.4);
}

.slider-container {
  display: flex;
  align-items: center;
  gap: 8px;
  color: #ccc;
  font-size: 13px;
  margin-left: 10px;
  padding-left: 15px;
  border-left: 1px solid rgba(255,255,255,0.2);
}

#spacingSlider {
  width: 100px;
  accent-color: #00ff88;
  cursor: pointer;
}

#loading {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #00ff88;
  font-size: 20px;
  z-index: 1000;
  transition: opacity 0.5s;
}

#loading .spinner {
  width: 50px;
  height: 50px;
  border: 4px solid rgba(0, 255, 136, 0.2);
  border-top-color: #00ff88;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>加载士兵模型中...</div>
</div>

<div id="hud">
  <div class="title">⚔️ 军事阵型模拟器</div>
  <div><span class="label">阵型：</span><span id="formationName">方阵</span></div>
  <div><span class="label">状态：</span><span id="marchState">静止</span></div>
  <div><span class="label">间距：</span><span id="spacingValue">2.0</span> 米</div>
  <div><span class="label">士兵：</span><span id="soldierCount">0</span> 人</div>
</div>

<div id="controls">
  <button id="lineBtn">横排</button>
  <button id="squareBtn" class="active">方阵</button>
  <button id="arrowBtn">箭头</button>
  <button id="circleBtn">圆阵</button>
  <button id="marchBtn">行军</button>
  <div class="slider-container">
    <span>间距</span>
    <input type="range" id="spacingSlider" min="1" max="3" step="0.1" value="2">
    <span id="sliderVal">2.0</span>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { clone } from 'three/addons/utils/SkeletonUtils.js';

// Global state
window.__3D_STATE__ = {
  modelLoaded: false,
  formation: '方阵',
  marching: false,
  spacing: 2,
  soldierCount: 0,
  soldierPositions: [],
  transitioning: false,
  marchDistance: 0
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 50, 150);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 15, 15);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.1;
controls.update();

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 60;
dirLight.shadow.camera.left = -30;
dirLight.shadow.camera.right = 30;
dirLight.shadow.camera.top = 30;
dirLight.shadow.camera.bottom = -30;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x556B2F, 0.4);
scene.add(hemiLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(200, 200);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x3a7d44,
  roughness: 0.9,
  metalness: 0.0
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper for visual reference
const gridHelper = new THREE.GridHelper(60, 60, 0x2d6a30, 0x2d6a30);
gridHelper.position.y = 0.01;
gridHelper.material.opacity = 0.15;
gridHelper.material.transparent = true;
scene.add(gridHelper);

// Soldier data
const soldiers = [];
const NUM_SOLDIERS = 12;
let currentFormation = 'square';
let spacing = 2;
let marching = false;
let marchOffset = new THREE.Vector3(0, 0, 0);
let transitioning = false;
let transitionProgress = 0;
const TRANSITION_DURATION = 2.0;

// Animation data
let baseAnimations = [];
let animationNames = {};

class Soldier {
  constructor(model, animations, index) {
    this.model = model;
    this.index = index;
    this.mixer = new THREE.AnimationMixer(model);
    this.actions = {};
    this.currentAction = null;

    // Store animations
    animations.forEach(clip => {
      const name = clip.name.toLowerCase();
      this.actions[name] = this.mixer.clipAction(clip);
    });

    // Current and target positions
    this.currentPos = new THREE.Vector3();
    this.targetPos = new THREE.Vector3();
    this.startPos = new THREE.Vector3();
    this.targetRotation = 0;
    this.currentRotation = 0;

    // Setup shadow
    model.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    scene.add(model);
  }

  playAnimation(name) {
    const lowerName = name.toLowerCase();
    // Try to find matching animation
    let action = null;
    for (const key in this.actions) {
      if (key.includes(lowerName) || lowerName.includes(key)) {
        action = this.actions[key];
        break;
      }
    }
    // Fallback: try exact match
    if (!action && this.actions[lowerName]) {
      action = this.actions[lowerName];
    }

    if (!action) {
      // Try first available action as fallback
      const keys = Object.keys(this.actions);
      if (keys.length > 0) {
        // For idle, try to find something with 'idle' or 'tpose' or first
        // For walk, try 'walk' or 'run'
        if (lowerName === 'idle') {
          action = this.actions[keys.find(k => k.includes('idle'))] || this.actions[keys[0]];
        } else if (lowerName === 'walk') {
          action = this.actions[keys.find(k => k.includes('walk') || k.includes('run'))] || this.actions[keys[0]];
        }
      }
    }

    if (action && action !== this.currentAction) {
      if (this.currentAction) {
        this.currentAction.fadeOut(0.3);
      }
      action.reset().fadeIn(0.3).play();
      this.currentAction = action;
    }
  }

  update(delta) {
    this.mixer.update(delta);
  }

  setPosition(x, z) {
    this.model.position.set(x, 0, z);
    this.currentPos.set(x, 0, z);
  }
}

// Formation calculations
function getFormationPositions(type, spacing, count) {
  const positions = [];

  switch (type) {
    case 'line': {
      const totalWidth = (count - 1) * spacing;
      const startX = -totalWidth / 2;
      for (let i = 0; i < count; i++) {
        positions.push({ x: startX + i * spacing, z: 0, rotation: 0 });
      }
      break;
    }
    case 'square': {
      const cols = 4;
      const rows = Math.ceil(count / cols);
      const offsetX = (cols - 1) * spacing / 2;
      const offsetZ = (rows - 1) * spacing / 2;
      for (let i = 0; i < count; i++) {
        const row = Math.floor(i / cols);
        const col = i % cols;
        positions.push({
          x: col * spacing - offsetX,
          z: row * spacing - offsetZ,
          rotation: 0
        });
      }
      break;
    }
    case 'arrow': {
      // V-formation with tip at front (negative Z)
      const half = Math.floor(count / 2);
      const tip = { x: 0, z: -spacing * (half), rotation: 0 };
      positions.push(tip);

      let leftCount = 0;
      let rightCount = 0;
      for (let i = 1; i < count; i++) {
        if (i % 2 === 1) {
          leftCount++;
          positions.push({
            x: -leftCount * spacing,
            z: -spacing * (half) + leftCount * spacing,
            rotation: 0
          });
        } else {
          rightCount++;
          positions.push({
            x: rightCount * spacing,
            z: -spacing * (half) + rightCount * spacing,
            rotation: 0
          });
        }
      }
      break;
    }
    case 'circle': {
      const radius = (count * spacing) / (2 * Math.PI);
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;
        const x = Math.sin(angle) * radius;
        const z = Math.cos(angle) * radius;
        // Face toward center
        const rotation = Math.atan2(-x, -z);
        positions.push({ x, z, rotation });
      }
      break;
    }
  }

  return positions;
}

function setFormation(type, smooth = true) {
  currentFormation = type;
  const positions = getFormationPositions(type, spacing, NUM_SOLDIERS);

  if (smooth && soldiers.length > 0) {
    transitioning = true;
    transitionProgress = 0;

    soldiers.forEach((soldier, i) => {
      if (i < positions.length) {
        soldier.startPos.copy(soldier.currentPos);
        soldier.targetPos.set(
          positions[i].x + marchOffset.x,
          0,
          positions[i].z + marchOffset.z
        );
        soldier.targetRotation = positions[i].rotation;
        soldier.playAnimation('walk');
      }
    });
  } else if (soldiers.length > 0) {
    soldiers.forEach((soldier, i) => {
      if (i < positions.length) {
        soldier.setPosition(
          positions[i].x + marchOffset.x,
          positions[i].z + marchOffset.z
        );
        soldier.targetRotation = positions[i].rotation;
        soldier.currentRotation = positions[i].rotation;
        soldier.model.rotation.y = positions[i].rotation;
        soldier.targetPos.set(
          positions[i].x + marchOffset.x,
          0,
          positions[i].z + marchOffset.z
        );
      }
    });
  }

  // Update HUD
  const nameMap = { line: '横排', square: '方阵', arrow: '箭头', circle: '圆阵' };
  window.__3D_STATE__.formation = nameMap[type] || type;
  document.getElementById('formationName').textContent = nameMap[type] || type;

  // Update button states
  document.querySelectorAll('#controls button:not(#marchBtn)').forEach(btn => btn.classList.remove('active'));
  document.getElementById(type + 'Btn')?.classList.add('active');
}

function toggleMarch() {
  marching = !marching;
  const btn = document.getElementById('marchBtn');

  if (marching) {
    btn.textContent = '停止';
    btn.classList.add('marching');
    document.getElementById('marchState').textContent = '行军中';
    soldiers.forEach(s => {
      if (!transitioning) s.playAnimation('walk');
    });
  } else {
    btn.textContent = '行军';
    btn.classList.remove('marching');
    document.getElementById('marchState').textContent = '静止';
    soldiers.forEach(s => {
      if (!transitioning) s.playAnimation('idle');
    });
  }

  window.__3D_STATE__.marching = marching;
}

// Load model
const loader = new GLTFLoader();
loader.load('assets/soldier.glb', (gltf) => {
  const baseModel = gltf.scene;
  baseAnimations = gltf.animations;

  console.log('Loaded animations:', baseAnimations.map(a => a.name));

  // Scale model if needed
  baseModel.scale.set(1, 1, 1);

  // Create 12 soldiers
  for (let i = 0; i < NUM_SOLDIERS; i++) {
    const clonedModel = clone(baseModel);
    const soldier = new Soldier(clonedModel, baseAnimations, i);
    soldiers.push(soldier);
  }

  // Set initial formation
  const positions = getFormationPositions('square', spacing, NUM_SOLDIERS);
  soldiers.forEach((soldier, i) => {
    if (i < positions.length) {
      soldier.setPosition(positions[i].x, positions[i].z);
      soldier.targetPos.set(positions[i].x, 0, positions[i].z);
      soldier.startPos.copy(soldier.currentPos);
      soldier.targetRotation = positions[i].rotation;
      soldier.currentRotation = positions[i].rotation;
      soldier.model.rotation.y = positions[i].rotation;
      soldier.playAnimation('idle');
    }
  });

  window.__3D_STATE__.modelLoaded = true;
  window.__3D_STATE__.soldierCount = NUM_SOLDIERS;
  document.getElementById('soldierCount').textContent = NUM_SOLDIERS;

  // Hide loading screen
  const loadingEl = document.getElementById('loading');
  loadingEl.style.opacity = '0';
  setTimeout(() => loadingEl.style.display = 'none', 500);

}, (progress) => {
  // Loading progress
}, (error) => {
  console.error('Error loading model:', error);
  // Create fallback soldiers using simple geometry
  createFallbackSoldiers();
});

function createFallbackSoldiers() {
  for (let i = 0; i < NUM_SOLDIERS; i++) {
    const group = new THREE.Group();

    // Body
    const bodyGeo = new THREE.CylinderGeometry(0.2, 0.25, 1.0, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x556B2F });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.8;
    body.castShadow = true;
    group.add(body);

    // Head
    const headGeo = new THREE.SphereGeometry(0.18, 8, 8);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xDEB887 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 1.5;
    head.castShadow = true;
    group.add(head);

    // Helmet
    const helmetGeo = new THREE.SphereGeometry(0.2, 8, 4, 0, Math.PI * 2, 0, Math.PI / 2);
    const helmetMat = new THREE.MeshStandardMaterial({ color: 0x2F4F2F });
    const helmet = new THREE.Mesh(helmetGeo, helmetMat);
    helmet.position.y = 1.55;
    helmet.castShadow = true;
    group.add(helmet);

    // Legs
    for (let side = -1; side <= 1; side += 2) {
      const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.6, 6);
      const legMat = new THREE.MeshStandardMaterial({ color: 0x556B2F });
      const leg = new THREE.Mesh(legGeo, legMat);
      leg.position.set(side * 0.12, 0.3, 0);
      leg.castShadow = true;
      group.add(leg);
    }

    // Arms
    for (let side = -1; side <= 1; side += 2) {
      const armGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.5, 6);
      const armMat = new THREE.MeshStandardMaterial({ color: 0x556B2F });
      const arm = new THREE.Mesh(armGeo, armMat);
      arm.position.set(side * 0.3, 0.9, 0);
      arm.castShadow = true;
      group.add(arm);
    }

    // Rifle
    const rifleGeo = new THREE.BoxGeometry(0.04, 0.04, 0.8);
    const rifleMat = new THREE.MeshStandardMaterial({ color: 0x4a3728 });
    const rifle = new THREE.Mesh(rifleGeo, rifleMat);
    rifle.position.set(0.35, 0.9, 0.1);
    rifle.rotation.x = 0.2;
    rifle.castShadow = true;
    group.add(rifle);

    // Direction indicator (small triangle at front)
    const indicatorGeo = new THREE.ConeGeometry(0.08, 0.15, 4);
    const indicatorMat = new THREE.MeshStandardMaterial({ color: 0xff4444 });
    const indicator = new THREE.Mesh(indicatorGeo, indicatorMat);
    indicator.position.set(0, 0.05, -0.35);
    indicator.rotation.x = Math.PI / 2;
    group.add(indicator);

    scene.add(group);

    const soldier = {
      model: group,
      index: i,
      mixer: null,
      actions: {},
      currentAction: null,
      currentPos: new THREE.Vector3(),
      targetPos: new THREE.Vector3(),
      startPos: new THREE.Vector3(),
      targetRotation: 0,
      currentRotation: 0,
      walkPhase: Math.random() * Math.PI * 2,
      isWalking: false,
      playAnimation(name) {
        this.isWalking = (name === 'walk');
      },
      update(delta) {
        // Simple walk animation for fallback
        if (this.isWalking) {
          this.walkPhase += delta * 8;
          const children = this.model.children;
          // Animate legs (indices 3 and 4)
          if (children[3]) children[3].rotation.x = Math.sin(this.walkPhase) * 0.4;
          if (children[4]) children[4].rotation.x = Math.sin(this.walkPhase + Math.PI) * 0.4;
          // Animate arms (indices 5 and 6)
          if (children[5]) children[5].rotation.x = Math.sin(this.walkPhase + Math.PI) * 0.3;
          if (children[6]) children[6].rotation.x = Math.sin(this.walkPhase) * 0.3;
          // Body bob
          if (children[0]) children[0].position.y = 0.8 + Math.abs(Math.sin(this.walkPhase * 2)) * 0.03;
        } else {
          const children = this.model.children;
          if (children[3]) children[3].rotation.x = 0;
          if (children[4]) children[4].rotation.x = 0;
          if (children[5]) children[5].rotation.x = 0;
          if (children[6]) children[6].rotation.x = 0;
          if (children[0]) children[0].position.y = 0.8;
        }
      },
      setPosition(x, z) {
        this.model.position.set(x, 0, z);
        this.currentPos.set(x, 0, z);
      }
    };

    soldiers.push(soldier);
  }

  // Set initial formation
  const positions = getFormationPositions('square', spacing, NUM_SOLDIERS);
  soldiers.forEach((soldier, i) => {
    if (i < positions.length) {
      soldier.setPosition(positions[i].x, positions[i].z);
      soldier.targetPos.set(positions[i].x, 0, positions[i].z);
      soldier.startPos.copy(soldier.currentPos);
      soldier.targetRotation = positions[i].rotation;
      soldier.currentRotation = positions[i].rotation;
      soldier.model.rotation.y = positions[i].rotation;
      soldier.playAnimation('idle');
    }
  });

  window.__3D_STATE__.modelLoaded = true;
  window.__3D_STATE__.soldierCount = NUM_SOLDIERS;
  document.getElementById('soldierCount').textContent = NUM_SOLDIERS;

  const loadingEl = document.getElementById('loading');
  loadingEl.style.opacity = '0';
  setTimeout(() => loadingEl.style.display = 'none', 500);
}

// Event listeners
document.getElementById('lineBtn').addEventListener('click', () => setFormation('line'));
document.getElementById('squareBtn').addEventListener('click', () => setFormation('square'));
document.getElementById('arrowBtn').addEventListener('click', () => setFormation('arrow'));
document.getElementById('circleBtn').addEventListener('click', () => setFormation('circle'));
document.getElementById('marchBtn').addEventListener('click', toggleMarch);

document.getElementById('spacingSlider').addEventListener('input', (e) => {
  spacing = parseFloat(e.target.value);
  document.getElementById('sliderVal').textContent = spacing.toFixed(1);
  document.getElementById('spacingValue').textContent = spacing.toFixed(1);
  window.__3D_STATE__.spacing = spacing;

  // Recalculate formation with new spacing
  setFormation(currentFormation, true);
});

// Window resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Easing function
function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = Math.min(clock.getDelta(), 0.05);

  // Handle marching
  if (marching && !transitioning) {
    const marchSpeed = 1.0;
    const marchDelta = marchSpeed * delta;
    marchOffset.z += marchDelta;

    // Move all soldiers forward
    const positions = getFormationPositions(currentFormation, spacing, NUM_SOLDIERS);
    soldiers.forEach((soldier, i) => {
      if (i < positions.length) {
        const targetX = positions[i].x + marchOffset.x;
        const targetZ = positions[i].z + marchOffset.z;
        soldier.setPosition(targetX, targetZ);
        soldier.targetPos.set(targetX, 0, targetZ);
      }
    });
  }

  // Handle formation transition
  if (transitioning) {
    transitionProgress += delta / TRANSITION_DURATION;

    if (transitionProgress >= 1.0) {
      transitionProgress = 1.0;
      transitioning = false;

      soldiers.forEach(soldier => {
        soldier.currentPos.copy(soldier.targetPos);
        soldier.setPosition(soldier.targetPos.x, soldier.targetPos.z);
        soldier.currentRotation = soldier.targetRotation;
        soldier.model.rotation.y = soldier.targetRotation;

        if (marching) {
          soldier.playAnimation('walk');
        } else {
          soldier.playAnimation('idle');
        }
      });
    } else {
      const t = easeInOutCubic(transitionProgress);

      soldiers.forEach(soldier => {
        // Interpolate position
        const newX = soldier.startPos.x + (soldier.targetPos.x - soldier.startPos.x) * t;
        const newZ = soldier.startPos.z + (soldier.targetPos.z - soldier.startPos.z) * t;

        // Face movement direction during transition
        const dx = soldier.targetPos.x - soldier.startPos.x;
        const dz = soldier.targetPos.z - soldier.startPos.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist > 0.1 && transitionProgress < 0.9) {
          const moveAngle = Math.atan2(dx, dz);
          soldier.currentRotation = moveAngle;
        } else {
          // Near end, rotate to target rotation
          const rotT = Math.max(0, (transitionProgress - 0.8) / 0.2);
          const moveAngle = Math.atan2(dx, dz);
          soldier.currentRotation = moveAngle + (soldier.targetRotation - moveAngle) * easeInOutCubic(Math.min(1, rotT));
        }

        soldier.model.rotation.y = soldier.currentRotation;
        soldier.setPosition(newX, newZ);
      });
    }
  }

  // Update soldier animations
  soldiers.forEach(soldier => {
    soldier.update(delta);
  });

  // Smooth rotation when not transitioning
  if (!transitioning) {
    soldiers.forEach(soldier => {
      let angleDiff = soldier.targetRotation - soldier.currentRotation;
      // Normalize angle difference
      while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
      while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

      if (Math.abs(angleDiff) > 0.01) {
        soldier.currentRotation += angleDiff * Math.min(1, delta * 5);
        soldier.model.rotation.y = soldier.currentRotation;
      }
    });
  }

  // Update state
  window.__3D_STATE__.transitioning = transitioning;
  window.__3D_STATE__.marchDistance = marchOffset.z;
  window.__3D_STATE__.soldierPositions = soldiers.map(s => ({
    x: parseFloat(s.currentPos.x.toFixed(2)),
    z: parseFloat(s.currentPos.z.toFixed(2))
  }));

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
