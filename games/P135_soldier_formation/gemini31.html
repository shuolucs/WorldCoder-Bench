<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>军事阵型模拟器</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 15px 20px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #4CAF50;
        }
        #hud p {
            margin: 5px 0;
            font-size: 14px;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        button:hover {
            background: #4CAF50;
            border-color: #4CAF50;
        }
        button.active {
            background: #4CAF50;
            border-color: #4CAF50;
            font-weight: bold;
        }
        #marchBtn {
            background: #d32f2f;
            border-color: #b71c1c;
        }
        #marchBtn.active {
            background: #f44336;
            border-color: #d32f2f;
            box-shadow: 0 0 10px rgba(244, 67, 54, 0.5);
        }
        .slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-size: 14px;
            width: 100%;
        }
        input[type="range"] {
            flex-grow: 1;
            cursor: pointer;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 10px;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="loading">加载模型中...</div>

    <div id="hud">
        <h2>阵型状态</h2>
        <p>当前阵型: <span id="formationName">方阵</span></p>
        <p>行军状态: <span id="marchState">静止</span></p>
        <p>当前间距: <span id="spacingValue">2.0</span> m</p>
        <p>士兵数量: <span id="soldierCount">12</span></p>
    </div>

    <div id="controls">
        <div class="btn-group">
            <button id="lineBtn">横排</button>
            <button id="squareBtn" class="active">方阵</button>
            <button id="arrowBtn">箭头</button>
            <button id="circleBtn">圆阵</button>
            <div style="width: 20px;"></div>
            <button id="marchBtn">开启行军</button>
        </div>
        <div class="slider-group">
            <label for="spacingSlider">阵型间距:</label>
            <input type="range" id="spacingSlider" min="1" max="3" step="0.1" value="2">
            <span id="sliderValueDisplay">2.0</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';

        // 初始化全局状态
        window.__3D_STATE__ = {
            modelLoaded: false,
            formation: 'square',
            marching: false,
            spacing: 2.0,
            soldierCount: 12,
            soldierPositions: [],
            transitioning: false,
            marchDistance: 0
        };

        // DOM 元素
        const ui = {
            formationName: document.getElementById('formationName'),
            marchState: document.getElementById('marchState'),
            spacingValue: document.getElementById('spacingValue'),
            sliderValueDisplay: document.getElementById('sliderValueDisplay'),
            loading: document.getElementById('loading'),
            btns: {
                line: document.getElementById('lineBtn'),
                square: document.getElementById('squareBtn'),
                arrow: document.getElementById('arrowBtn'),
                circle: document.getElementById('circleBtn')
            },
            marchBtn: document.getElementById('marchBtn'),
            spacingSlider: document.getElementById('spacingSlider')
        };

        // 场景基础设置
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // 天空蓝
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 - 0.05;

        // 灯光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // 地面
        const groundGeo = new THREE.PlaneGeometry(500, 500);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x4CAF50,
            roughness: 0.8,
            metalness: 0.1
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 网格辅助
        const gridHelper = new THREE.GridHelper(100, 100, 0x000000, 0x000000);
        gridHelper.material.opacity = 0.1;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // 士兵数据
        const soldiers = [];
        const clock = new THREE.Clock();
        const marchSpeed = 1.0; // 1 m/s

        // 加载模型
        const loader = new GLTFLoader();
        loader.load('assets/soldier.glb', (gltf) => {
            ui.loading.style.display = 'none';
            const model = gltf.scene;
            
            // 开启模型阴影
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            const animations = gltf.animations;
            // 尝试寻找 idle 和 walk/run 动画
            let idleClip = animations.find(a => a.name.toLowerCase().includes('idle')) || animations[0];
            let walkClip = animations.find(a => a.name.toLowerCase().includes('walk') || a.name.toLowerCase().includes('run')) || animations[1] || animations[0];

            for (let i = 0; i < 12; i++) {
                const clone = SkeletonUtils.clone(model);
                scene.add(clone);

                const mixer = new THREE.AnimationMixer(clone);
                const idleAction = mixer.clipAction(idleClip);
                const walkAction = mixer.clipAction(walkClip);
                
                idleAction.play();

                soldiers.push({
                    mesh: clone,
                    mixer: mixer,
                    actions: { idle: idleAction, walk: walkAction },
                    currentAction: idleAction,
                    localTarget: new THREE.Vector3(),
                    finalRotation: new THREE.Quaternion()
                });
            }

            window.__3D_STATE__.modelLoaded = true;
            calculateFormation();
            
            // 初始瞬间就位
            soldiers.forEach(s => {
                s.mesh.position.copy(s.localTarget);
                s.mesh.quaternion.copy(s.finalRotation);
            });

        }, undefined, (error) => {
            console.error('模型加载失败:', error);
            ui.loading.innerText = '模型加载失败，请检查 assets/soldier.glb 是否存在';
        });

        // 动画切换函数
        function fadeToAction(soldier, name, duration = 0.2) {
            const nextAction = soldier.actions[name];
            const currentAction = soldier.currentAction;
            
            if (currentAction !== nextAction) {
                nextAction.reset().play();
                if (currentAction) {
                    currentAction.crossFadeTo(nextAction, duration, true);
                }
                soldier.currentAction = nextAction;
            }
        }

        // 计算阵型目标位置和朝向
        function calculateFormation() {
            const spacing = window.__3D_STATE__.spacing;
            const formation = window.__3D_STATE__.formation;

            soldiers.forEach((s, i) => {
                let x = 0, z = 0;
                let lookDir = new THREE.Vector3(0, 0, 1); // 默认朝向正前 (Z正方向)

                switch (formation) {
                    case 'square':
                        // 3行4列，居中
                        const row = Math.floor(i / 4);
                        const col = i % 4;
                        x = (col - 1.5) * spacing;
                        z = (1 - row) * spacing; // row 0 在最前面
                        break;
                    case 'line':
                        // 1排12人
                        x = (i - 5.5) * spacing;
                        z = 0;
                        break;
                    case 'arrow':
                        // V字形，尖端在前
                        if (i === 0) {
                            x = 0; z = 0;
                        } else {
                            const rank = Math.ceil(i / 2);
                            const side = i % 2 === 1 ? -1 : 1; // 奇数左，偶数右
                            x = side * rank * spacing;
                            z = -rank * spacing;
                        }
                        break;
                    case 'circle':
                        // 圆阵
                        const angle = (i / 12) * Math.PI * 2;
                        const radius = spacing * 1.8; // 适当调整半径
                        x = Math.sin(angle) * radius;
                        z = Math.cos(angle) * radius;
                        // 面朝圆心
                        lookDir.set(-x, 0, -z).normalize();
                        break;
                }

                s.localTarget.set(x, 0, z);
                if (lookDir.lengthSq() > 0.001) {
                    s.finalRotation.setFromUnitVectors(new THREE.Vector3(0, 0, 1), lookDir);
                }
            });
        }

        // UI 事件绑定
        function setFormation(type, btnElement, name) {
            window.__3D_STATE__.formation = type;
            ui.formationName.innerText = name;
            
            Object.values(ui.btns).forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            
            calculateFormation();
        }

        ui.btns.line.addEventListener('click', () => setFormation('line', ui.btns.line, '横排'));
        ui.btns.square.addEventListener('click', () => setFormation('square', ui.btns.square, '方阵'));
        ui.btns.arrow.addEventListener('click', () => setFormation('arrow', ui.btns.arrow, '箭头'));
        ui.btns.circle.addEventListener('click', () => setFormation('circle', ui.btns.circle, '圆阵'));

        ui.marchBtn.addEventListener('click', () => {
            const isMarching = !window.__3D_STATE__.marching;
            window.__3D_STATE__.marching = isMarching;
            
            if (isMarching) {
                ui.marchBtn.innerText = '停止行军';
                ui.marchBtn.classList.add('active');
                ui.marchState.innerText = '行军中';
                ui.marchState.style.color = '#f44336';
            } else {
                ui.marchBtn.innerText = '开启行军';
                ui.marchBtn.classList.remove('active');
                ui.marchState.innerText = '静止';
                ui.marchState.style.color = '#fff';
            }
        });

        ui.spacingSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            window.__3D_STATE__.spacing = val;
            ui.spacingValue.innerText = val.toFixed(1);
            ui.sliderValueDisplay.innerText = val.toFixed(1);
            calculateFormation();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 渲染循环
        function animate() {
            requestAnimationFrame(animate);

            const delta = Math.min(clock.getDelta(), 0.1); // 限制最大 delta 防止卡顿跳跃
            const state = window.__3D_STATE__;

            if (state.modelLoaded) {
                let isTransitioning = false;
                const currentPositions = [];

                // 更新行军距离
                if (state.marching) {
                    state.marchDistance += marchSpeed * delta;
                    // 相机跟随
                    camera.position.z += marchSpeed * delta;
                    controls.target.z += marchSpeed * delta;
                }

                const formationCenterOffset = new THREE.Vector3(0, 0, state.marchDistance);
                const forwardDir = new THREE.Vector3(0, 0, 1);
                const forwardQuat = new THREE.Quaternion().setFromUnitVectors(forwardDir, forwardDir);

                soldiers.forEach(s => {
                    s.mixer.update(delta);

                    // 计算全局目标位置
                    const globalTarget = s.localTarget.clone().add(formationCenterOffset);
                    const dist = s.mesh.position.distanceTo(globalTarget);

                    if (dist > 0.05) {
                        isTransitioning = true;
                        
                        // 位置平滑插值 (lerp)
                        const lerpFactor = 1 - Math.exp(-3.0 * delta);
                        s.mesh.position.lerp(globalTarget, lerpFactor);

                        // 播放 walk 动画
                        fadeToAction(s, 'walk');

                        // 面朝移动方向
                        const moveDir = globalTarget.clone().sub(s.mesh.position).normalize();
                        if (moveDir.lengthSq() > 0.001) {
                            const targetRot = new THREE.Quaternion().setFromUnitVectors(forwardDir, moveDir);
                            s.mesh.quaternion.slerp(targetRot, 1 - Math.exp(-8.0 * delta));
                        }
                    } else {
                        // 到达目标位置
                        s.mesh.position.copy(globalTarget);

                        if (state.marching) {
                            // 行军中：继续 walk，面朝正前
                            fadeToAction(s, 'walk');
                            s.mesh.quaternion.slerp(forwardQuat, 1 - Math.exp(-8.0 * delta));
                        } else {
                            // 静止：切回 idle，面朝阵型要求方向
                            fadeToAction(s, 'idle');
                            s.mesh.quaternion.slerp(s.finalRotation, 1 - Math.exp(-8.0 * delta));
                        }
                    }

                    currentPositions.push({ x: s.mesh.position.x, z: s.mesh.position.z });
                });

                state.transitioning = isTransitioning;
                state.soldierPositions = currentPositions;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
