<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 军事阵型模拟器</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #87CEEB;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: auto;
    }

    #hud, #controlsPanel {
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 12px 14px;
      border-radius: 10px;
      backdrop-filter: blur(4px);
      min-width: 240px;
      box-sizing: border-box;
    }

    #hud h3, #controlsPanel h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }

    #hud .row {
      margin: 4px 0;
      font-size: 14px;
    }

    #buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      background: #1f6feb;
      color: white;
      font-size: 14px;
      transition: 0.2s;
    }

    button:hover {
      background: #388bfd;
    }

    button.active {
      background: #2ea043;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 14px;
    }

    input[type="range"] {
      width: 100%;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      background: rgba(0, 0, 0, 0.35);
      z-index: 20;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <div id="hud">
        <h3>HUD</h3>
        <div class="row">当前阵型：<span id="formationName">方阵</span></div>
        <div class="row">行军状态：<span id="marchState">静止</span></div>
        <div class="row">当前间距：<span id="spacingValue">2.0</span></div>
        <div class="row">士兵数量：<span id="soldierCount">12</span></div>
      </div>

      <div id="controlsPanel">
        <h3>阵型控制</h3>
        <div id="buttons">
          <button id="lineBtn">横排</button>
          <button id="squareBtn">方阵</button>
          <button id="arrowBtn">箭头</button>
          <button id="circleBtn">圆阵</button>
        </div>
        <button id="marchBtn">行军</button>
        <div class="slider-group" style="margin-top: 10px;">
          <label for="spacingSlider">间距：<span id="spacingValueInline">2.0</span> m</label>
          <input id="spacingSlider" type="range" min="1" max="3" step="0.1" value="2" />
        </div>
      </div>
    </div>

    <div id="loading">正在加载士兵模型...</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { clone } from 'three/addons/utils/SkeletonUtils.js';

    const SOLDIER_COUNT = 12;
    const TRANSITION_DURATION = 2.0;
    const MARCH_SPEED = 1.0;
    const GROUND_Y = 0;

    window.__3D_STATE__ = {
      modelLoaded: false,
      formation: '方阵',
      marching: false,
      spacing: 2,
      soldierCount: SOLDIER_COUNT,
      soldierPositions: [],
      transitioning: false,
      marchDistance: 0
    };

    const formationLabelMap = {
      line: '横排',
      square: '方阵',
      arrow: '箭头',
      circle: '圆阵'
    };

    const app = document.getElementById('app');
    const loadingEl = document.getElementById('loading');

    const formationNameEl = document.getElementById('formationName');
    const marchStateEl = document.getElementById('marchState');
    const spacingValueEl = document.getElementById('spacingValue');
    const spacingValueInlineEl = document.getElementById('spacingValueInline');
    const soldierCountEl = document.getElementById('soldierCount');

    const lineBtn = document.getElementById('lineBtn');
    const squareBtn = document.getElementById('squareBtn');
    const arrowBtn = document.getElementById('arrowBtn');
    const circleBtn = document.getElementById('circleBtn');
    const marchBtn = document.getElementById('marchBtn');
    const spacingSlider = document.getElementById('spacingSlider');

    soldierCountEl.textContent = String(SOLDIER_COUNT);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 15, 15);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;
    controls.maxPolarAngle = Math.PI * 0.49;
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(10, 20, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -40;
    dirLight.shadow.camera.right = 40;
    dirLight.shadow.camera.top = 40;
    dirLight.shadow.camera.bottom = -40;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(200, 200),
      new THREE.MeshStandardMaterial({ color: 0x3f9b3f })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = GROUND_Y;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(200, 100, 0x335533, 0x335533);
    grid.position.y = 0.01;
    scene.add(grid);

    const clock = new THREE.Clock();

    let soldiers = [];
    let animationClips = [];
    let currentFormation = 'square';
    let currentSpacing = 2.0;
    let marching = false;
    let transitioning = false;
    let transitionElapsed = 0;
    let marchDistance = 0;

    let formationAnchor = new THREE.Vector3(0, 0, 0);
    const marchDirection = new THREE.Vector3(0, 0, 1);

    let idleClip = null;
    let walkClip = null;

    function normalizeAngle(angle) {
      while (angle > Math.PI) angle -= Math.PI * 2;
      while (angle < -Math.PI) angle += Math.PI * 2;
      return angle;
    }

    function lerpAngle(a, b, t) {
      const diff = normalizeAngle(b - a);
      return a + diff * t;
    }

    function setActiveButton() {
      [lineBtn, squareBtn, arrowBtn, circleBtn].forEach(btn => btn.classList.remove('active'));
      if (currentFormation === 'line') lineBtn.classList.add('active');
      if (currentFormation === 'square') squareBtn.classList.add('active');
      if (currentFormation === 'arrow') arrowBtn.classList.add('active');
      if (currentFormation === 'circle') circleBtn.classList.add('active');
      marchBtn.classList.toggle('active', marching);
    }

    function updateHUD() {
      formationNameEl.textContent = formationLabelMap[currentFormation];
      marchStateEl.textContent = marching ? '行军中' : '静止';
      spacingValueEl.textContent = currentSpacing.toFixed(1);
      spacingValueInlineEl.textContent = currentSpacing.toFixed(1);
      soldierCountEl.textContent = String(SOLDIER_COUNT);
    }

    function findClipByKeywords(clips, keywords) {
      for (const clip of clips) {
        const name = (clip.name || '').toLowerCase();
        if (keywords.some(k => name.includes(k))) return clip;
      }
      return null;
    }

    function setSoldierAction(soldier, actionName, fade = 0.25) {
      if (!soldier.actions[actionName]) return;
      if (soldier.currentAction === actionName) return;

      const next = soldier.actions[actionName];
      const prev = soldier.currentAction ? soldier.actions[soldier.currentAction] : null;

      if (prev) prev.fadeOut(fade);
      next.reset().fadeIn(fade).play();
      soldier.currentAction = actionName;
    }

    function playGroupStateAnimation() {
      for (const soldier of soldiers) {
        if (transitioning || marching) {
          if (walkClip) setSoldierAction(soldier, 'walk');
        } else {
          if (idleClip) setSoldierAction(soldier, 'idle');
        }
      }
    }

    function getFormationOffsets(type, spacing) {
      const offsets = [];

      if (type === 'line') {
        for (let i = 0; i < SOLDIER_COUNT; i++) {
          const x = (i - (SOLDIER_COUNT - 1) / 2) * spacing;
          offsets.push({
            x,
            z: 0,
            finalRotation: 0
          });
        }
      }

      if (type === 'square') {
        const rows = 3;
        const cols = 4;
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const x = (c - (cols - 1) / 2) * spacing;
            const z = (r - (rows - 1) / 2) * spacing;
            offsets.push({
              x,
              z,
              finalRotation: 0
            });
          }
        }
      }

      if (type === 'arrow') {
        const rows = [
          [0],
          [-1, 1],
          [-2, 2],
          [-3, 3],
          [-4, 4],
          [-5]
        ];
        let index = 0;
        for (let row = 0; row < rows.length; row++) {
          const z = row * spacing * 0.9;
          for (const side of rows[row]) {
            if (index >= SOLDIER_COUNT) break;
            const x = side * spacing * 0.6;
            offsets.push({
              x,
              z,
              finalRotation: 0
            });
            index++;
          }
        }
      }

      if (type === 'circle') {
        const radius = Math.max(2, spacing * 2.2);
        for (let i = 0; i < SOLDIER_COUNT; i++) {
          const angle = (i / SOLDIER_COUNT) * Math.PI * 2;
          const x = Math.cos(angle) * radius;
          const z = Math.sin(angle) * radius;
          const toCenter = Math.atan2(-x, -z);
          offsets.push({
            x,
            z,
            finalRotation: toCenter
          });
        }
      }

      return offsets.slice(0, SOLDIER_COUNT);
    }

    function assignTargetsForCurrentFormation() {
      const offsets = getFormationOffsets(currentFormation, currentSpacing);

      for (let i = 0; i < soldiers.length; i++) {
        const soldier = soldiers[i];
        const offset = offsets[i];

        const worldTarget = new THREE.Vector3(
          formationAnchor.x + offset.x,
          soldier.root.position.y,
          formationAnchor.z + offset.z
        );

        soldier.startPosition.copy(soldier.root.position);
        soldier.targetPosition.copy(worldTarget);

        soldier.startRotation = soldier.root.rotation.y;
        soldier.finalRotation = offset.finalRotation;

        if (currentFormation === 'circle') {
          soldier.targetMoveRotation = Math.atan2(
            soldier.targetPosition.x - soldier.startPosition.x,
            soldier.targetPosition.z - soldier.startPosition.z
          );
        } else {
          const moveDir = new THREE.Vector3().subVectors(soldier.targetPosition, soldier.startPosition);
          if (moveDir.lengthSq() > 1e-6) {
            soldier.targetMoveRotation = Math.atan2(moveDir.x, moveDir.z);
          } else {
            soldier.targetMoveRotation = soldier.root.rotation.y;
          }
        }
      }

      transitionElapsed = 0;
      transitioning = true;
      playGroupStateAnimation();
      updateHUD();
      setActiveButton();
    }

    function setFormation(type) {
      currentFormation = type;
      assignTargetsForCurrentFormation();
    }

    function setMarching(enabled) {
      marching = enabled;
      playGroupStateAnimation();
      updateHUD();
      setActiveButton();
    }

    function createActionMap(mixer, clips) {
      const actions = {};

      if (idleClip) {
        const action = mixer.clipAction(idleClip);
        action.enabled = true;
        action.setLoop(THREE.LoopRepeat);
        actions.idle = action;
      }

      if (walkClip) {
        const action = mixer.clipAction(walkClip);
        action.enabled = true;
        action.setLoop(THREE.LoopRepeat);
        actions.walk = action;
      }

      return actions;
    }

    function initSoldiersFromGLTF(gltf) {
      const original = gltf.scene;
      animationClips = gltf.animations || [];

      idleClip = findClipByKeywords(animationClips, ['idle']);
      walkClip = findClipByKeywords(animationClips, ['walk', 'run']);

      if (!idleClip && animationClips.length > 0) idleClip = animationClips[0];
      if (!walkClip && animationClips.length > 1) walkClip = animationClips[1] || idleClip;
      if (!walkClip) walkClip = idleClip;

      for (let i = 0; i < SOLDIER_COUNT; i++) {
        const cloned = clone(original);
        cloned.traverse(obj => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        const box = new THREE.Box3().setFromObject(cloned);
        const height = box.max.y - box.min.y;
        if (height > 0) {
          const desiredHeight = 1.8;
          const scale = desiredHeight / height;
          cloned.scale.setScalar(scale);
        }

        scene.add(cloned);

        const mixer = new THREE.AnimationMixer(cloned);
        const actions = createActionMap(mixer, animationClips);

        const soldier = {
          root: cloned,
          mixer,
          actions,
          currentAction: null,
          startPosition: new THREE.Vector3(),
          targetPosition: new THREE.Vector3(),
          startRotation: 0,
          targetMoveRotation: 0,
          finalRotation: 0
        };

        soldiers.push(soldier);
      }

      const initialOffsets = getFormationOffsets('square', currentSpacing);
      for (let i = 0; i < soldiers.length; i++) {
        const soldier = soldiers[i];
        const offset = initialOffsets[i];
        soldier.root.position.set(offset.x, GROUND_Y, offset.z);
        soldier.root.rotation.y = 0;
        soldier.startPosition.copy(soldier.root.position);
        soldier.targetPosition.copy(soldier.root.position);
        soldier.startRotation = 0;
        soldier.targetMoveRotation = 0;
        soldier.finalRotation = 0;

        if (idleClip) {
          setSoldierAction(soldier, 'idle', 0.01);
        }
      }

      transitioning = false;
      currentFormation = 'square';
      updateHUD();
      setActiveButton();

      window.__3D_STATE__.modelLoaded = true;
      loadingEl.style.display = 'none';
    }

    const loader = new GLTFLoader();
    loader.load(
      'assets/soldier.glb',
      (gltf) => {
        initSoldiersFromGLTF(gltf);
      },
      undefined,
      (error) => {
        console.error('模型加载失败:', error);
        loadingEl.textContent = '模型加载失败，请确认 assets/soldier.glb 存在';
      }
    );

    lineBtn.addEventListener('click', () => setFormation('line'));
    squareBtn.addEventListener('click', () => setFormation('square'));
    arrowBtn.addEventListener('click', () => setFormation('arrow'));
    circleBtn.addEventListener('click', () => setFormation('circle'));

    marchBtn.addEventListener('click', () => {
      setMarching(!marching);
    });

    spacingSlider.addEventListener('input', (e) => {
      currentSpacing = parseFloat(e.target.value);
      updateHUD();
      if (soldiers.length > 0) {
        assignTargetsForCurrentFormation();
      }
    });

    function updateTransition(delta) {
      if (!transitioning) return;

      transitionElapsed += delta;
      const t = Math.min(transitionElapsed / TRANSITION_DURATION, 1);
      const eased = t < 0.5
        ? 2 * t * t
        : 1 - Math.pow(-2 * t + 2, 2) / 2;

      for (const soldier of soldiers) {
        soldier.root.position.lerpVectors(
          soldier.startPosition,
          soldier.targetPosition,
          eased
        );

        const rotTarget = (t < 0.9) ? soldier.targetMoveRotation : soldier.finalRotation;
        soldier.root.rotation.y = lerpAngle(soldier.root.rotation.y, rotTarget, 0.12);
      }

      if (t >= 1) {
        transitioning = false;
        for (const soldier of soldiers) {
          soldier.root.position.copy(soldier.targetPosition);
          soldier.root.rotation.y = soldier.finalRotation;
        }
        playGroupStateAnimation();
      }
    }

    function updateMarching(delta) {
      if (!marching || transitioning) return;

      const step = MARCH_SPEED * delta;
      formationAnchor.addScaledVector(marchDirection, step);
      marchDistance += step;

      const offsets = getFormationOffsets(currentFormation, currentSpacing);

      for (let i = 0; i < soldiers.length; i++) {
        const soldier = soldiers[i];
        const offset = offsets[i];

        soldier.root.position.x = formationAnchor.x + offset.x;
        soldier.root.position.z = formationAnchor.z + offset.z;

        if (currentFormation === 'circle') {
          soldier.root.rotation.y = Math.atan2(-offset.x, -offset.z);
        } else {
          soldier.root.rotation.y = 0;
        }
      }
    }

    function updateStateExpose() {
      window.__3D_STATE__.formation = formationLabelMap[currentFormation];
      window.__3D_STATE__.marching = marching;
      window.__3D_STATE__.spacing = currentSpacing;
      window.__3D_STATE__.soldierCount = soldiers.length;
      window.__3D_STATE__.transitioning = transitioning;
      window.__3D_STATE__.marchDistance = Number(marchDistance.toFixed(3));
      window.__3D_STATE__.soldierPositions = soldiers.map(s => ({
        x: Number(s.root.position.x.toFixed(3)),
        z: Number(s.root.position.z.toFixed(3))
      }));
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      for (const soldier of soldiers) {
        soldier.mixer.update(delta);
      }

      updateTransition(delta);
      updateMarching(delta);
      controls.update();
      updateHUD();
      updateStateExpose();

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHUD();
    setActiveButton();
    updateStateExpose();
  </script>
</body>
</html>
