<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js FPS 多房间竞技场</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      color: #fff;
      font-size: 16px;
      line-height: 1.7;
      z-index: 20;
      background: rgba(0,0,0,0.35);
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      user-select: none;
      pointer-events: none;
    }

    #crosshair {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%);
      z-index: 15;
      pointer-events: none;
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: white;
      box-shadow: 0 0 6px rgba(255,255,255,0.8);
    }

    #crosshair::before {
      left: 9px;
      top: 0;
      width: 2px;
      height: 20px;
    }

    #crosshair::after {
      left: 0;
      top: 9px;
      width: 20px;
      height: 2px;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
      color: white;
      z-index: 30;
      text-align: center;
      cursor: pointer;
    }

    #overlay .panel {
      background: rgba(20,20,20,0.82);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 24px 28px;
      border-radius: 12px;
      max-width: 560px;
    }

    #overlay h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    #overlay p {
      margin: 8px 0;
      color: #ddd;
    }

    #reloadNotice {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      color: #fff;
      background: rgba(0,0,0,0.55);
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      z-index: 20;
      display: none;
      pointer-events: none;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="hud">
    <div>玩家血量: <span id="playerHP">100</span></div>
    <div>弹药: <span id="ammo">30/30</span></div>
    <div>击杀数: <span id="kills">0</span></div>
    <div>存活敌人数: <span id="enemiesAlive">10</span></div>
  </div>

  <div id="crosshair"></div>

  <div id="reloadNotice">重装填中...</div>

  <div id="overlay">
    <div class="panel">
      <h1>Three.js FPS 竞技场</h1>
      <p>点击开始并锁定鼠标</p>
      <p>W / A / S / D 移动，鼠标瞄准，左键射击，R 重装填</p>
      <p>使用射线枪击杀多房间中的红色敌方方块</p>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f1115);
    scene.fog = new THREE.Fog(0x0f1115, 20, 90);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 1.6, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new PointerLockControls(camera, document.body);
    scene.add(controls.getObject());

    const overlay = document.getElementById('overlay');
    const reloadNotice = document.getElementById('reloadNotice');

    overlay.addEventListener('click', () => {
      controls.lock();
    });

    controls.addEventListener('lock', () => {
      overlay.style.display = 'none';
    });

    controls.addEventListener('unlock', () => {
      overlay.style.display = 'flex';
    });

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.28);
    scene.add(ambientLight);

    const floorMat = new THREE.MeshStandardMaterial({ color: 0x5b5b5b, roughness: 0.95, metalness: 0.05 });
    const ceilingMat = new THREE.MeshStandardMaterial({ color: 0xcfcfcf, roughness: 0.85, metalness: 0.02 });
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x22262d, roughness: 0.9, metalness: 0.05 });

    const arenaGroup = new THREE.Group();
    scene.add(arenaGroup);

    const walls = [];
    const wallBoxes = [];

    const roomSize = 20;
    const roomHeight = 6;
    const half = roomSize / 2;
    const doorWidth = 4;
    const wallThickness = 0.5;

    const roomCenters = [
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(24, 0, 0),
      new THREE.Vector3(48, 0, 0),
    ];

    function addStaticMesh(mesh) {
      mesh.receiveShadow = true;
      mesh.castShadow = false;
      arenaGroup.add(mesh);
    }

    function createFloorAndCeiling() {
      const totalLength = 68;
      const floorGeo = new THREE.PlaneGeometry(totalLength, 24);
      const floor = new THREE.Mesh(floorGeo, floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.position.set(24, 0, 0);
      floor.receiveShadow = true;
      scene.add(floor);

      const ceiling = new THREE.Mesh(floorGeo, ceilingMat);
      ceiling.rotation.x = Math.PI / 2;
      ceiling.position.set(24, roomHeight, 0);
      ceiling.receiveShadow = true;
      scene.add(ceiling);
    }

    function addWallBox(x, y, z, w, h, d) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
      mesh.position.set(x, y, z);
      addStaticMesh(mesh);
      walls.push(mesh);
      const box = new THREE.Box3().setFromObject(mesh);
      wallBoxes.push(box);
      return mesh;
    }

    function buildRoom(centerX) {
      const y = roomHeight / 2;

      addWallBox(centerX, y, -half, roomSize, roomHeight, wallThickness);
      addWallBox(centerX, y, half, roomSize, roomHeight, wallThickness);

      const hasLeftDoor = centerX !== roomCenters[0].x;
      const hasRightDoor = centerX !== roomCenters[2].x;

      if (hasLeftDoor) {
        const seg = (roomSize - doorWidth) / 2;
        addWallBox(centerX - half, y, -(doorWidth / 2 + seg / 2), wallThickness, roomHeight, seg);
        addWallBox(centerX - half, y, (doorWidth / 2 + seg / 2), wallThickness, roomHeight, seg);
      } else {
        addWallBox(centerX - half, y, 0, wallThickness, roomHeight, roomSize);
      }

      if (hasRightDoor) {
        const seg = (roomSize - doorWidth) / 2;
        addWallBox(centerX + half, y, -(doorWidth / 2 + seg / 2), wallThickness, roomHeight, seg);
        addWallBox(centerX + half, y, (doorWidth / 2 + seg / 2), wallThickness, roomHeight, seg);
      } else {
        addWallBox(centerX + half, y, 0, wallThickness, roomHeight, roomSize);
      }
    }

    createFloorAndCeiling();
    buildRoom(roomCenters[0].x);
    buildRoom(roomCenters[1].x);
    buildRoom(roomCenters[2].x);

    const roomLights = [
      { color: 0x3355ff, pos: new THREE.Vector3(0, 4.5, 0) },
      { color: 0x33ff88, pos: new THREE.Vector3(24, 4.5, 0) },
      { color: 0xff8833, pos: new THREE.Vector3(48, 4.5, 0) },
    ];

    roomLights.forEach(l => {
      const light = new THREE.PointLight(l.color, 22, 30, 2);
      light.position.copy(l.pos);
      light.castShadow = false;
      scene.add(light);
    });

    const keys = {
      KeyW: false,
      KeyA: false,
      KeyS: false,
      KeyD: false,
    };

    let playerHP = 100;
    let ammo = 30;
    const maxAmmo = 30;
    let kills = 0;
    let isReloading = false;
    let reloadTimer = null;

    document.addEventListener('keydown', (e) => {
      if (e.code in keys) keys[e.code] = true;

      if (e.code === 'KeyR') {
        startReload();
      }
    });

    document.addEventListener('keyup', (e) => {
      if (e.code in keys) keys[e.code] = false;
    });

    function createHPBar() {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 16;
      const ctx = canvas.getContext('2d');

      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;

      const material = new THREE.MeshBasicMaterial({
        map: texture,
        transparent: true,
        depthTest: false
      });

      const mesh = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 0.22), material);
      mesh.renderOrder = 999;

      function draw(hp) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let color = '#00ff66';
        if (hp <= 60) color = '#ffcc00';
        if (hp <= 30) color = '#ff3333';

        const w = Math.max(0, Math.min(1, hp / 100)) * canvas.width;
        ctx.fillStyle = color;
        ctx.fillRect(0, 0, w, canvas.height);

        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);

        texture.needsUpdate = true;
      }

      draw(100);

      return { mesh, draw };
    }

    const enemyGeo = new THREE.BoxGeometry(1, 2, 1);
    const enemyAliveMat = new THREE.MeshStandardMaterial({ color: 0xcc2222 });
    const enemyDeadMat = new THREE.MeshStandardMaterial({ color: 0x666666 });

    const enemies = [];

    const enemySpawnPositions = [
      [-5, 1, -5], [3, 1, 4], [7, 1, -3],
      [19, 1, 5], [24, 1, -6], [29, 1, 2],
      [43, 1, 4], [48, 1, -5], [53, 1, 0], [45, 1, -2]
    ];

    function createEnemy(x, y, z) {
      const mesh = new THREE.Mesh(enemyGeo, enemyAliveMat.clone());
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);

      const hpBar = createHPBar();
      hpBar.mesh.position.set(x, y + 1.8, z);
      scene.add(hpBar.mesh);

      const enemy = {
        mesh,
        hpBar,
        hp: 100,
        alive: true,
        fallProgress: 0
      };

      enemies.push(enemy);
    }

    enemySpawnPositions.forEach(p => createEnemy(p[0], p[1], p[2]));

    const moveRaycaster = new THREE.Raycaster();
    const shootRaycaster = new THREE.Raycaster();

    const tempVec = new THREE.Vector3();
    const tempDir = new THREE.Vector3();
    const rightVec = new THREE.Vector3();
    const candidatePos = new THREE.Vector3();

    function canMoveTo(direction, distance) {
      const origin = controls.getObject().position.clone();
      origin.y = 1.0;

      moveRaycaster.set(origin, direction.clone().normalize());
      moveRaycaster.far = 1.0;

      const hits = moveRaycaster.intersectObjects(walls, false);
      if (hits.length > 0 && hits[0].distance < 1.0) return false;

      candidatePos.copy(controls.getObject().position).add(direction.clone().multiplyScalar(distance));
      const playerRadius = 0.35;

      for (const box of wallBoxes) {
        const expanded = box.clone().expandByScalar(playerRadius);
        if (
          candidatePos.x >= expanded.min.x &&
          candidatePos.x <= expanded.max.x &&
          0.0 >= expanded.min.y && 0.0 <= expanded.max.y &&
          candidatePos.z >= expanded.min.z &&
          candidatePos.z <= expanded.max.z
        ) {
          return false;
        }
      }
      return true;
    }

    function startReload() {
      if (isReloading) return;
      if (ammo === maxAmmo) return;

      isReloading = true;
      reloadNotice.style.display = 'block';

      clearTimeout(reloadTimer);
      reloadTimer = setTimeout(() => {
        ammo = maxAmmo;
        isReloading = false;
        reloadNotice.style.display = 'none';
        updateHUD();
      }, 2000);
      updateHUD();
    }

    function shoot() {
      if (!controls.isLocked) return;
      if (isReloading) return;
      if (ammo <= 0) return;

      ammo--;

      shootRaycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
      shootRaycaster.far = 50;

      const aliveMeshes = enemies.filter(e => e.alive).map(e => e.mesh);
      const hits = shootRaycaster.intersectObjects(aliveMeshes, false);

      if (hits.length > 0) {
        const hitMesh = hits[0].object;
        const enemy = enemies.find(e => e.mesh === hitMesh);
        if (enemy && enemy.alive) {
          enemy.hp = Math.max(0, enemy.hp - 25);
          enemy.hpBar.draw(enemy.hp);

          if (enemy.hp <= 0) {
            enemy.alive = false;
            enemy.mesh.material = enemyDeadMat.clone();
            kills++;
          }
        }
      }

      updateHUD();
    }

    document.addEventListener('mousedown', (e) => {
      if (e.button === 0) {
        if (!controls.isLocked) {
          controls.lock();
        } else {
          shoot();
        }
      }
    });

    function updateHUD() {
      document.getElementById('playerHP').textContent = String(playerHP);
      document.getElementById('ammo').textContent = `${ammo}/${maxAmmo}`;
      document.getElementById('kills').textContent = String(kills);
      document.getElementById('enemiesAlive').textContent = String(enemies.filter(e => e.alive).length);
    }

    updateHUD();

    const clock = new THREE.Clock();

    function updatePlayer(delta) {
      if (!controls.isLocked) return;

      tempDir.set(0, 0, 0);
      camera.getWorldDirection(tempVec);
      tempVec.y = 0;
      tempVec.normalize();

      rightVec.crossVectors(tempVec, camera.up).normalize();

      if (keys.KeyW) tempDir.add(tempVec);
      if (keys.KeyS) tempDir.add(tempVec.clone().multiplyScalar(-1));
      if (keys.KeyA) tempDir.add(rightVec.clone().multiplyScalar(-1));
      if (keys.KeyD) tempDir.add(rightVec);

      if (tempDir.lengthSq() > 0) {
        tempDir.normalize();
        const moveDistance = 8 * delta;

        const moveX = new THREE.Vector3(tempDir.x, 0, 0);
        const moveZ = new THREE.Vector3(0, 0, tempDir.z);

        if (moveX.lengthSq() > 0 && canMoveTo(moveX.clone().normalize(), Math.abs(moveX.x) * moveDistance)) {
          controls.getObject().position.x += moveX.x * moveDistance;
        }

        if (moveZ.lengthSq() > 0 && canMoveTo(moveZ.clone().normalize(), Math.abs(moveZ.z) * moveDistance)) {
          controls.getObject().position.z += moveZ.z * moveDistance;
        }
      }

      controls.getObject().position.y = 1.6;
    }

    function moveEnemy(enemy, delta) {
      if (!enemy.alive) {
        if (enemy.fallProgress < 1) {
          enemy.fallProgress = Math.min(1, enemy.fallProgress + delta * 2);
          enemy.mesh.rotation.z = -Math.PI * 0.5 * enemy.fallProgress;
          enemy.mesh.position.y = 0.5;
        }
        enemy.hpBar.mesh.visible = false;
        return;
      }

      const playerPos = controls.getObject().position;
      const enemyPos = enemy.mesh.position;

      tempVec.subVectors(playerPos, enemyPos);
      const horizontal = new THREE.Vector3(tempVec.x, 0, tempVec.z);
      const dist = horizontal.length();

      if (dist > 0.001) {
        const targetYaw = Math.atan2(horizontal.x, horizontal.z);
        enemy.mesh.rotation.y = THREE.MathUtils.lerp(enemy.mesh.rotation.y, targetYaw, delta * 2.0);
      }

      if (dist < 30 && dist > 1.5) {
        horizontal.normalize();
        const speed = 1.5 * delta;
        const nextPos = enemyPos.clone().add(horizontal.multiplyScalar(speed));

        let blocked = false;
        const enemyBox = new THREE.Box3().setFromCenterAndSize(
          new THREE.Vector3(nextPos.x, 1, nextPos.z),
          new THREE.Vector3(1, 2, 1)
        );

        for (const wallBox of wallBoxes) {
          if (enemyBox.intersectsBox(wallBox)) {
            blocked = true;
            break;
          }
        }

        if (!blocked) {
          enemy.mesh.position.x = nextPos.x;
          enemy.mesh.position.z = nextPos.z;
        }
      }

      enemy.hpBar.mesh.visible = true;
      enemy.hpBar.mesh.position.set(enemy.mesh.position.x, enemy.mesh.position.y + 1.8, enemy.mesh.position.z);
      enemy.hpBar.mesh.quaternion.copy(camera.quaternion);
    }

    function updateState() {
      window.__3D_STATE__ = {
        playerHP,
        ammo,
        maxAmmo,
        kills,
        enemiesAlive: enemies.filter(e => e.alive).length,
        playerPos: {
          x: controls.getObject().position.x,
          y: controls.getObject().position.y,
          z: controls.getObject().position.z
        },
        enemies: enemies.map(e => ({
          x: e.mesh.position.x,
          y: e.mesh.position.y,
          z: e.mesh.position.z,
          hp: e.hp,
          alive: e.alive
        })),
        isReloading
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.05);

      updatePlayer(delta);

      for (const enemy of enemies) {
        moveEnemy(enemy, delta);
      }

      updateHUD();
      updateState();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateState();
  </script>
</body>
</html>
