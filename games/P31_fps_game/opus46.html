<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPS Arena</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
canvas { display: block; }

#crosshair {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 100;
  color: white;
  font-size: 24px;
  text-shadow: 0 0 4px rgba(0,0,0,0.8);
  line-height: 1;
}
#crosshair::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 20px; height: 2px;
  background: white;
  box-shadow: 0 0 4px rgba(0,0,0,0.8);
}
#crosshair::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 2px; height: 20px;
  background: white;
  box-shadow: 0 0 4px rgba(0,0,0,0.8);
}

#hud {
  position: fixed;
  top: 20px; left: 20px;
  color: #0f0;
  font-size: 16px;
  z-index: 100;
  pointer-events: none;
  text-shadow: 0 0 6px rgba(0,255,0,0.5);
  line-height: 1.8;
  background: rgba(0,0,0,0.4);
  padding: 12px 18px;
  border: 1px solid rgba(0,255,0,0.3);
  border-radius: 4px;
}
#hud .label { color: #888; }
#hud .value { color: #0f0; font-weight: bold; }
#hud .ammo-value { color: #ff0; }
#hud .hp-value { color: #f44; }

#reloadIndicator {
  position: fixed;
  bottom: 120px; left: 50%;
  transform: translateX(-50%);
  color: #ff0;
  font-size: 18px;
  z-index: 100;
  pointer-events: none;
  display: none;
  text-shadow: 0 0 8px rgba(255,255,0,0.6);
}

#hitMarker {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 101;
  display: none;
}
#hitMarker div {
  position: absolute;
  background: #f00;
}
#hitMarker .h1 { width: 12px; height: 2px; top: -1px; left: 6px; transform: rotate(45deg); }
#hitMarker .h2 { width: 12px; height: 2px; top: -1px; left: -16px; transform: rotate(-45deg); }
#hitMarker .h3 { width: 12px; height: 2px; top: -1px; left: 6px; transform: rotate(-45deg); transform-origin: left; }
#hitMarker .h4 { width: 12px; height: 2px; top: -1px; right: 6px; transform: rotate(45deg); transform-origin: right; }

#startScreen {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  color: white;
  cursor: pointer;
}
#startScreen h1 {
  font-size: 48px;
  margin-bottom: 20px;
  color: #f44;
  text-shadow: 0 0 20px rgba(255,68,68,0.6);
}
#startScreen p {
  font-size: 18px;
  color: #aaa;
  margin: 5px 0;
}
#startScreen .click-msg {
  margin-top: 30px;
  font-size: 22px;
  color: #0f0;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

#muzzleFlash {
  position: fixed;
  bottom: 80px;
  right: calc(50% - 40px);
  width: 80px; height: 80px;
  background: radial-gradient(circle, rgba(255,200,50,0.9), rgba(255,100,0,0.5), transparent);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99;
  display: none;
}
</style>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>

<div id="crosshair"></div>

<div id="hud">
  <div><span class="label">HP: </span><span class="hp-value" id="playerHP">100</span></div>
  <div><span class="label">AMMO: </span><span class="ammo-value" id="ammo">30/30</span></div>
  <div><span class="label">KILLS: </span><span class="value" id="kills">0</span></div>
  <div><span class="label">ENEMIES: </span><span class="value" id="enemiesAlive">10</span></div>
</div>

<div id="reloadIndicator">⟳ RELOADING...</div>

<div id="hitMarker">
  <div class="h1"></div>
  <div class="h2"></div>
  <div class="h3"></div>
  <div class="h4"></div>
</div>

<div id="muzzleFlash"></div>

<div id="startScreen">
  <h1>FPS ARENA</h1>
  <p>WASD - Move | Mouse - Look</p>
  <p>Left Click - Shoot | R - Reload</p>
  <p class="click-msg">[ CLICK TO START ]</p>
</div>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);
scene.fog = new THREE.Fog(0x111111, 30, 60);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.6, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new PointerLockControls(camera, document.body);

const startScreen = document.getElementById('startScreen');
startScreen.addEventListener('click', () => {
  controls.lock();
});
controls.addEventListener('lock', () => {
  startScreen.style.display = 'none';
});
controls.addEventListener('unlock', () => {
  startScreen.style.display = 'flex';
});

// Game state
let playerHP = 100;
let ammo = 30;
const maxAmmo = 30;
let kills = 0;
let isReloading = false;
let reloadTimer = 0;

const keys = { w: false, a: false, s: false, d: false };
const moveSpeed = 8;

// Materials
const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9 });
const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 });
const ceilingMaterial = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.7 });
const doorFrameMaterial = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.8 });

const walls = [];

function createWall(w, h, d, x, y, z, material) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mesh = new THREE.Mesh(geo, material || wallMaterial);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  walls.push(mesh);
  return mesh;
}

// Room dimensions: each room ~20x20, height 4
const roomH = 4;
const roomW = 20;
const wallThick = 0.5;
const doorWidth = 4;
const doorHeight = 3;

// Room 1: centered at (-20, 0, 0)
// Room 2: centered at (0, 0, 0)
// Room 3: centered at (20, 0, 0)

// Floor
const floorGeo = new THREE.BoxGeometry(62, 0.2, 22);
const floor = new THREE.Mesh(floorGeo, floorMaterial);
floor.position.set(0, -0.1, 0);
floor.receiveShadow = true;
scene.add(floor);

// Ceiling
const ceilingGeo = new THREE.BoxGeometry(62, 0.2, 22);
const ceiling = new THREE.Mesh(ceilingGeo, ceilingMaterial);
ceiling.position.set(0, roomH + 0.1, 0);
ceiling.receiveShadow = true;
scene.add(ceiling);

// Build outer walls

// Front wall (z = -10) - full length
createWall(62, roomH, wallThick, 0, roomH / 2, -10 - wallThick / 2);

// Back wall (z = 10) - full length
createWall(62, roomH, wallThick, 0, roomH / 2, 10 + wallThick / 2);

// Left wall (x = -30)
createWall(wallThick, roomH, 22, -30 - wallThick / 2, roomH / 2, 0);

// Right wall (x = 30)
createWall(wallThick, roomH, 22, 30 + wallThick / 2, roomH / 2, 0);

// Internal walls between Room 1 and Room 2 (at x = -10)
// Wall with door opening: door from z = -doorWidth/2 to z = doorWidth/2
// Bottom part above door not needed if door height < room height
// Left section of wall (z from -10 to -doorWidth/2)
const wallSectionLen1 = 10 - doorWidth / 2;
createWall(wallThick, roomH, wallSectionLen1, -10, roomH / 2, -10 + wallSectionLen1 / 2);
// Right section of wall (z from doorWidth/2 to 10)
createWall(wallThick, roomH, wallSectionLen1, -10, roomH / 2, 10 - wallSectionLen1 / 2);
// Top section above door
createWall(wallThick, roomH - doorHeight, doorWidth, -10, doorHeight + (roomH - doorHeight) / 2, 0);

// Internal walls between Room 2 and Room 3 (at x = 10)
createWall(wallThick, roomH, wallSectionLen1, 10, roomH / 2, -10 + wallSectionLen1 / 2);
createWall(wallThick, roomH, wallSectionLen1, 10, roomH / 2, 10 - wallSectionLen1 / 2);
createWall(wallThick, roomH - doorHeight, doorWidth, 10, doorHeight + (roomH - doorHeight) / 2, 0);

// Add some pillars/obstacles in rooms for cover
function createPillar(x, z) {
  createWall(1.5, roomH, 1.5, x, roomH / 2, z);
}
// Room 1 pillars
createPillar(-24, -4);
createPillar(-16, 4);
// Room 2 pillars
createPillar(-4, -4);
createPillar(4, 4);
// Room 3 pillars
createPillar(24, -4);
createPillar(16, 4);

// Lighting
// Ambient
scene.add(new THREE.AmbientLight(0x222222, 0.5));

// Room 1 - Blue atmosphere
const light1 = new THREE.PointLight(0x4488ff, 15, 30);
light1.position.set(-20, 3.5, 0);
light1.castShadow = true;
scene.add(light1);

// Room 2 - Green atmosphere
const light2 = new THREE.PointLight(0x44ff88, 15, 30);
light2.position.set(0, 3.5, 0);
light2.castShadow = true;
scene.add(light2);

// Room 3 - Red/Orange atmosphere
const light3 = new THREE.PointLight(0xff8844, 15, 30);
light3.position.set(20, 3.5, 0);
light3.castShadow = true;
scene.add(light3);

// Additional fill lights
const fill1 = new THREE.PointLight(0x4488ff, 5, 20);
fill1.position.set(-25, 1, -5);
scene.add(fill1);
const fill2 = new THREE.PointLight(0x44ff88, 5, 20);
fill2.position.set(5, 1, 5);
scene.add(fill2);
const fill3 = new THREE.PointLight(0xff8844, 5, 20);
fill3.position.set(25, 1, -5);
scene.add(fill3);

// Enemy system
class Enemy {
  constructor(x, z) {
    this.hp = 100;
    this.alive = true;
    this.dying = false;
    this.deathAngle = 0;

    // Body
    const bodyGeo = new THREE.BoxGeometry(1, 2, 1);
    this.bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc2222, roughness: 0.6 });
    this.mesh = new THREE.Mesh(bodyGeo, this.bodyMat);
    this.mesh.position.set(x, 1, z);
    this.mesh.castShadow = true;
    this.mesh.receiveShadow = true;
    scene.add(this.mesh);

    // Eyes
    const eyeGeo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.5 });
    this.leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    this.leftEye.position.set(-0.2, 0.6, 0.5);
    this.mesh.add(this.leftEye);
    this.rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    this.rightEye.position.set(0.2, 0.6, 0.5);
    this.mesh.add(this.rightEye);

    // HP bar
    this.createHPBar();

    // Movement
    this.speed = 1.5;
    this.targetDir = new THREE.Vector3();
  }

  createHPBar() {
    // Background bar
    const bgGeo = new THREE.PlaneGeometry(1.2, 0.15);
    const bgMat = new THREE.MeshBasicMaterial({ color: 0x333333, side: THREE.DoubleSide, depthTest: false });
    this.hpBarBg = new THREE.Mesh(bgGeo, bgMat);
    this.hpBarBg.position.set(0, 1.4, 0);
    this.hpBarBg.renderOrder = 999;

    // HP fill bar
    const fillGeo = new THREE.PlaneGeometry(1.1, 0.1);
    this.hpBarMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, side: THREE.DoubleSide, depthTest: false });
    this.hpBarFill = new THREE.Mesh(fillGeo, this.hpBarMat);
    this.hpBarFill.position.set(0, 0, 0.01);
    this.hpBarBg.add(this.hpBarFill);

    // Add to scene (not to mesh, so we can billboard it)
    scene.add(this.hpBarBg);
  }

  updateHPBar() {
    const ratio = Math.max(0, this.hp / 100);
    this.hpBarFill.scale.x = ratio;
    this.hpBarFill.position.x = -(1.1 * (1 - ratio)) / 2;

    if (ratio > 0.5) {
      this.hpBarMat.color.setHex(0x00ff00);
    } else if (ratio > 0.25) {
      this.hpBarMat.color.setHex(0xffff00);
    } else {
      this.hpBarMat.color.setHex(0xff0000);
    }

    // Billboard: position above enemy and face camera
    this.hpBarBg.position.set(
      this.mesh.position.x,
      this.mesh.position.y + 1.4,
      this.mesh.position.z
    );
    this.hpBarBg.lookAt(camera.position);
  }

  takeDamage(dmg) {
    if (!this.alive) return;
    this.hp -= dmg;
    if (this.hp <= 0) {
      this.hp = 0;
      this.alive = false;
      this.dying = true;
      this.bodyMat.color.setHex(0x555555);
      this.leftEye.visible = false;
      this.rightEye.visible = false;
      kills++;
    }
    this.updateHPBar();
  }

  update(delta, playerPos) {
    if (this.dying) {
      // Topple over
      this.deathAngle += delta * 3;
      if (this.deathAngle >= Math.PI / 2) {
        this.deathAngle = Math.PI / 2;
        this.dying = false;
      }
      this.mesh.rotation.z = this.deathAngle;
      this.mesh.position.y = 1 - Math.sin(this.deathAngle) * 0.5;
      this.updateHPBar();
      if (!this.dying) {
        this.hpBarBg.visible = false;
      }
      return;
    }

    if (!this.alive) return;

    // Direction to player
    this.targetDir.set(
      playerPos.x - this.mesh.position.x,
      0,
      playerPos.z - this.mesh.position.z
    );
    const dist = this.targetDir.length();
    this.targetDir.normalize();

    // Rotate towards player (slowly)
    const targetAngle = Math.atan2(this.targetDir.x, this.targetDir.z);
    let currentAngle = this.mesh.rotation.y;
    let angleDiff = targetAngle - currentAngle;
    // Normalize angle diff
    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
    this.mesh.rotation.y += angleDiff * delta * 2;

    // Move towards player if close enough
    if (dist < 30 && dist > 1.5) {
      const moveX = this.targetDir.x * this.speed * delta;
      const moveZ = this.targetDir.z * this.speed * delta;

      // Simple collision check for enemies against walls
      const testPos = new THREE.Vector3(
        this.mesh.position.x + moveX,
        1,
        this.mesh.position.z + moveZ
      );

      // Check bounds
      const margin = 0.8;
      if (testPos.x > -30 + margin && testPos.x < 30 - margin &&
          testPos.z > -10 + margin && testPos.z < 10 - margin) {
        // Check internal walls
        let blocked = false;

        // Wall at x = -10
        if ((this.mesh.position.x < -10 && testPos.x > -10 - margin) ||
            (this.mesh.position.x > -10 && testPos.x < -10 + margin)) {
          if (Math.abs(testPos.z) > doorWidth / 2) {
            blocked = true;
          }
        }
        // Wall at x = 10
        if ((this.mesh.position.x < 10 && testPos.x > 10 - margin) ||
            (this.mesh.position.x > 10 && testPos.x < 10 + margin)) {
          if (Math.abs(testPos.z) > doorWidth / 2) {
            blocked = true;
          }
        }

        if (!blocked) {
          this.mesh.position.x += moveX;
          this.mesh.position.z += moveZ;
        }
      }
    }

    // Damage player if very close
    if (dist < 2 && this.alive) {
      playerHP -= 5 * delta;
      if (playerHP < 0) playerHP = 0;
    }

    this.updateHPBar();
  }
}

// Spawn enemies
const enemies = [];
const spawnPositions = [
  // Room 1
  { x: -25, z: -5 },
  { x: -15, z: 5 },
  { x: -22, z: 3 },
  { x: -18, z: -7 },
  // Room 2
  { x: -5, z: -5 },
  { x: 5, z: 5 },
  { x: 3, z: -7 },
  // Room 3
  { x: 25, z: -5 },
  { x: 15, z: 5 },
  { x: 22, z: 7 },
];

for (const pos of spawnPositions) {
  enemies.push(new Enemy(pos.x, pos.z));
}

// Input handling
document.addEventListener('keydown', (e) => {
  switch (e.code) {
    case 'KeyW': keys.w = true; break;
    case 'KeyA': keys.a = true; break;
    case 'KeyS': keys.s = true; break;
    case 'KeyD': keys.d = true; break;
    case 'KeyR':
      if (!isReloading && ammo < maxAmmo) {
        isReloading = true;
        reloadTimer = 2;
        document.getElementById('reloadIndicator').style.display = 'block';
      }
      break;
  }
});

document.addEventListener('keyup', (e) => {
  switch (e.code) {
    case 'KeyW': keys.w = false; break;
    case 'KeyA': keys.a = false; break;
    case 'KeyS': keys.s = false; break;
    case 'KeyD': keys.d = false; break;
  }
});

// Shooting
const shootRaycaster = new THREE.Raycaster();
const hitMarker = document.getElementById('hitMarker');
const muzzleFlash = document.getElementById('muzzleFlash');
let hitMarkerTimer = 0;
let muzzleFlashTimer = 0;

document.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  if (!controls.isLocked) return;

  if (isReloading) return;
  if (ammo <= 0) return;

  ammo--;

  // Muzzle flash
  muzzleFlash.style.display = 'block';
  muzzleFlashTimer = 0.05;

  // Raycast from camera center
  shootRaycaster.set(camera.position, camera.getWorldDirection(new THREE.Vector3()));
  shootRaycaster.far = 50;

  // Get all alive enemy meshes
  const aliveEnemyMeshes = enemies.filter(e => e.alive).map(e => e.mesh);
  const intersects = shootRaycaster.intersectObjects(aliveEnemyMeshes, true);

  if (intersects.length > 0) {
    // Find which enemy was hit
    const hitMesh = intersects[0].object;
    for (const enemy of enemies) {
      if (enemy.alive && (enemy.mesh === hitMesh || enemy.mesh === hitMesh.parent)) {
        enemy.takeDamage(25);
        // Show hit marker
        hitMarker.style.display = 'block';
        hitMarkerTimer = 0.15;
        break;
      }
    }
  }

  // Auto reload when empty
  if (ammo === 0 && !isReloading) {
    isReloading = true;
    reloadTimer = 2;
    document.getElementById('reloadIndicator').style.display = 'block';
  }
});

// Collision detection for player movement
const moveRaycaster = new THREE.Raycaster();

function canMove(direction) {
  const pos = camera.position.clone();
  pos.y = 1.0; // Check at body level
  moveRaycaster.set(pos, direction);
  moveRaycaster.far = 1.0;
  const intersects = moveRaycaster.intersectObjects(walls);
  return intersects.length === 0;
}

// Animation loop
const clock = new THREE.Clock();
const direction = new THREE.Vector3();
const frontVector = new THREE.Vector3();
const sideVector = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);

  const delta = Math.min(clock.getDelta(), 0.1);

  if (controls.isLocked) {
    // Reload timer
    if (isReloading) {
      reloadTimer -= delta;
      if (reloadTimer <= 0) {
        isReloading = false;
        ammo = maxAmmo;
        document.getElementById('reloadIndicator').style.display = 'none';
      }
    }

    // Hit marker timer
    if (hitMarkerTimer > 0) {
      hitMarkerTimer -= delta;
      if (hitMarkerTimer <= 0) {
        hitMarker.style.display = 'none';
      }
    }

    // Muzzle flash timer
    if (muzzleFlashTimer > 0) {
      muzzleFlashTimer -= delta;
      if (muzzleFlashTimer <= 0) {
        muzzleFlash.style.display = 'none';
      }
    }

    // Player movement
    const cameraDir = new THREE.Vector3();
    camera.getWorldDirection(cameraDir);
    cameraDir.y = 0;
    cameraDir.normalize();

    const right = new THREE.Vector3();
    right.crossVectors(cameraDir, new THREE.Vector3(0, 1, 0)).normalize();

    const moveVec = new THREE.Vector3(0, 0, 0);

    if (keys.w) moveVec.add(cameraDir);
    if (keys.s) moveVec.sub(cameraDir);
    if (keys.d) moveVec.add(right);
    if (keys.a) moveVec.sub(right);

    if (moveVec.length() > 0) {
      moveVec.normalize();
      const speed = moveSpeed * delta;

      // Check X movement
      const moveX = new THREE.Vector3(moveVec.x, 0, 0).normalize();
      if (moveVec.x !== 0 && canMove(moveX)) {
        camera.position.x += moveVec.x * speed;
      }

      // Check Z movement
      const moveZ = new THREE.Vector3(0, 0, moveVec.z).normalize();
      if (moveVec.z !== 0 && canMove(moveZ)) {
        camera.position.z += moveVec.z * speed;
      }
    }

    // Keep camera at eye height
    camera.position.y = 1.6;

    // Update enemies
    const playerPos = camera.position.clone();
    for (const enemy of enemies) {
      enemy.update(delta, playerPos);
    }

    // Update HUD
    const enemiesAlive = enemies.filter(e => e.alive).length;
    document.getElementById('playerHP').textContent = Math.ceil(playerHP);
    document.getElementById('ammo').textContent = `${ammo}/${maxAmmo}`;
    document.getElementById('kills').textContent = kills;
    document.getElementById('enemiesAlive').textContent = enemiesAlive;

    // Update state
    window.__3D_STATE__ = {
      playerHP: Math.ceil(playerHP),
      ammo,
      maxAmmo,
      kills,
      enemiesAlive,
      playerPos: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
      enemies: enemies.map(e => ({
        x: e.mesh.position.x,
        y: e.mesh.position.y,
        z: e.mesh.position.z,
        hp: e.hp,
        alive: e.alive
      })),
      isReloading
    };
  }

  renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start player in Room 2
camera.position.set(0, 1.6, 0);

animate();
</script>
</body>
</html>
