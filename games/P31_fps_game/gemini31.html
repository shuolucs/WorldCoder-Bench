<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js FPS Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0f0;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border: 1px solid #0f0;
            border-radius: 5px;
            pointer-events: none;
            font-size: 18px;
            line-height: 1.5;
        }
        #blocker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            z-index: 10;
        }
        #instructions {
            text-align: center;
            font-size: 24px;
        }
        .hud-val { color: white; }
        .reloading { color: red; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="game-container"></div>
    <div id="crosshair">+</div>
    <div id="hud">
        <div>HP: <span id="playerHP" class="hud-val">100</span></div>
        <div>AMMO: <span id="ammo" class="hud-val">30/30</span></div>
        <div>KILLS: <span id="kills" class="hud-val">0</span></div>
        <div>ALIVE: <span id="enemiesAlive" class="hud-val">10</span></div>
    </div>
    <div id="blocker">
        <div id="instructions">
            <p style="font-size:36px; color:#0f0; margin-bottom:10px;">CLICK TO PLAY</p>
            <p>WASD = Move | Mouse = Look | Left Click = Shoot | R = Reload</p>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            playerHP: 100,
            ammo: 30,
            maxAmmo: 30,
            kills: 0,
            enemiesAlive: 10,
            playerPos: { x: 0, y: 1.6, z: 0 },
            enemies: [],
            isReloading: false
        };
        const state = window.__3D_STATE__;

        // --- DOM Elements ---
        const elPlayerHP = document.getElementById('playerHP');
        const elAmmo = document.getElementById('ammo');
        const elKills = document.getElementById('kills');
        const elEnemiesAlive = document.getElementById('enemiesAlive');
        const blocker = document.getElementById('blocker');

        function updateHUD() {
            elPlayerHP.innerText = state.playerHP;
            if (state.isReloading) {
                elAmmo.innerHTML = `<span class="reloading">RELOADING...</span>`;
            } else {
                elAmmo.innerText = `${state.ammo}/${state.maxAmmo}`;
            }
            elKills.innerText = state.kills;
            elEnemiesAlive.innerText = state.enemiesAlive;
        }

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.Fog(0x000000, 10, 60);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);

        // --- Controls ---
        const controls = new PointerLockControls(camera, document.body);
        blocker.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => blocker.style.display = 'none');
        controls.addEventListener('unlock', () => blocker.style.display = 'flex');

        // --- Lighting ---
        scene.add(new THREE.AmbientLight(0x222222));
        
        // Room 1 Light (Center) - Warm
        const light1 = new THREE.PointLight(0xffaa55, 1.5, 40);
        light1.position.set(0, 3.5, 0);
        scene.add(light1);

        // Room 2 Light (East) - Cool
        const light2 = new THREE.PointLight(0x55aaff, 1.5, 40);
        light2.position.set(20, 3.5, 0);
        scene.add(light2);

        // Room 3 Light (North) - Purple
        const light3 = new THREE.PointLight(0xaa55ff, 1.5, 40);
        light3.position.set(0, 3.5, -20);
        scene.add(light3);

        // --- Arena Construction ---
        const walls = [];
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 });
        const ceilMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 1.0 });

        function createWall(x, y, z, w, h, d) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            walls.push(mesh);
        }

        // Floor & Ceiling (covering all 3 rooms)
        const planeGeo = new THREE.PlaneGeometry(60, 60);
        const floor = new THREE.Mesh(planeGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.set(10, 0, -10);
        scene.add(floor);

        const ceiling = new THREE.Mesh(planeGeo, ceilMat);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.set(10, 4, -10);
        scene.add(ceiling);

        // Room 1 (Center: 0, 0, 0)
        createWall(-10, 2, 0, 1, 4, 20); // West
        createWall(0, 2, 10, 20, 4, 1);  // South
        createWall(-6, 2, -10, 8, 4, 1); // North Left
        createWall(6, 2, -10, 8, 4, 1);  // North Right (Door to Room 3)
        createWall(10, 2, -6, 1, 4, 8);  // East Left
        createWall(10, 2, 6, 1, 4, 8);   // East Right (Door to Room 2)

        // Room 2 (Center: 20, 0, 0)
        createWall(20, 2, -10, 20, 4, 1); // North
        createWall(30, 2, 0, 1, 4, 20);   // East
        createWall(20, 2, 10, 20, 4, 1);  // South

        // Room 3 (Center: 0, 0, -20)
        createWall(-10, 2, -20, 1, 4, 20); // West
        createWall(0, 2, -30, 20, 4, 1);   // North
        createWall(10, 2, -20, 1, 4, 20);  // East

        // --- Enemy System ---
        const enemies = [];
        const enemyGeo = new THREE.BoxGeometry(1, 2, 1);
        const enemyMatAlive = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const enemyMatDead = new THREE.MeshStandardMaterial({ color: 0x555555 });

        class Enemy {
            constructor(x, z) {
                this.hp = 100;
                this.alive = true;
                this.mesh = new THREE.Mesh(enemyGeo, enemyMatAlive);
                this.mesh.position.set(x, 1, z);
                scene.add(this.mesh);

                // HP Bar (Billboard)
                this.canvas = document.createElement('canvas');
                this.canvas.width = 128;
                this.canvas.height = 32;
                this.ctx = this.canvas.getContext('2d');
                this.texture = new THREE.CanvasTexture(this.canvas);
                const spriteMat = new THREE.SpriteMaterial({ map: this.texture, depthTest: false });
                this.hpBar = new THREE.Sprite(spriteMat);
                this.hpBar.position.set(0, 1.5, 0);
                this.hpBar.scale.set(1.5, 0.375, 1);
                this.mesh.add(this.hpBar);
                
                this.updateHPBar();
            }

            updateHPBar() {
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, 128, 32);
                this.ctx.fillStyle = '#f00';
                this.ctx.fillRect(2, 2, 124, 28);
                this.ctx.fillStyle = '#0f0';
                this.ctx.fillRect(2, 2, 124 * (this.hp / 100), 28);
                this.texture.needsUpdate = true;
            }

            takeDamage(amount) {
                if (!this.alive) return;
                this.hp -= amount;
                this.updateHPBar();
                if (this.hp <= 0) this.die();
            }

            die() {
                this.alive = false;
                this.hp = 0;
                this.mesh.material = enemyMatDead;
                this.mesh.rotation.z = Math.PI / 2;
                this.mesh.position.y = 0.5;
                this.hpBar.visible = false;
                
                state.kills++;
                state.enemiesAlive--;
                updateHUD();
            }

            update(delta) {
                if (!this.alive) return;
                
                const dist = this.mesh.position.distanceTo(camera.position);
                if (dist < 30) {
                    // Look at player (Y axis only)
                    const targetPos = new THREE.Vector3(camera.position.x, this.mesh.position.y, camera.position.z);
                    this.mesh.lookAt(targetPos);
                    
                    // Move towards player
                    const dir = new THREE.Vector3();
                    this.mesh.getWorldDirection(dir);
                    this.mesh.position.add(dir.multiplyScalar(1.5 * delta));
                }
            }
        }

        // Spawn Enemies
        for(let i=0; i<3; i++) enemies.push(new Enemy((Math.random()-0.5)*14, (Math.random()-0.5)*14)); // Room 1
        for(let i=0; i<4; i++) enemies.push(new Enemy(20 + (Math.random()-0.5)*14, (Math.random()-0.5)*14)); // Room 2
        for(let i=0; i<3; i++) enemies.push(new Enemy((Math.random()-0.5)*14, -20 + (Math.random()-0.5)*14)); // Room 3

        // --- Input & Movement ---
        const moveState = { forward: false, backward: false, left: false, right: false };
        
        document.addEventListener('keydown', (e) => {
            switch (e.code) {
                case 'KeyW': moveState.forward = true; break;
                case 'KeyA': moveState.left = true; break;
                case 'KeyS': moveState.backward = true; break;
                case 'KeyD': moveState.right = true; break;
                case 'KeyR':
                    if (state.ammo < state.maxAmmo && !state.isReloading) {
                        state.isReloading = true;
                        updateHUD();
                        setTimeout(() => {
                            state.ammo = state.maxAmmo;
                            state.isReloading = false;
                            updateHUD();
                        }, 2000);
                    }
                    break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch (e.code) {
                case 'KeyW': moveState.forward = false; break;
                case 'KeyA': moveState.left = false; break;
                case 'KeyS': moveState.backward = false; break;
                case 'KeyD': moveState.right = false; break;
            }
        });

        // --- Shooting ---
        const raycaster = new THREE.Raycaster();
        
        document.addEventListener('mousedown', (e) => {
            if (e.button !== 0 || !controls.isLocked || state.isReloading || state.ammo <= 0) return;

            state.ammo--;
            updateHUD();

            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const enemyMeshes = enemies.map(e => e.mesh);
            const intersects = raycaster.intersectObjects(enemyMeshes);

            if (intersects.length > 0 && intersects[0].distance <= 50) {
                const hitMesh = intersects[0].object;
                const enemy = enemies.find(e => e.mesh === hitMesh);
                if (enemy) enemy.takeDamage(25);
            }
        });

        // --- Main Loop ---
        const clock = new THREE.Clock();
        const collisionRaycaster = new THREE.Raycaster();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (controls.isLocked) {
                // Movement Calculation
                const dir = new THREE.Vector3();
                dir.z = Number(moveState.forward) - Number(moveState.backward);
                dir.x = Number(moveState.right) - Number(moveState.left);
                dir.normalize();

                const moveVec = new THREE.Vector3();
                if (dir.z !== 0) {
                    const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                    fwd.y = 0; fwd.normalize();
                    moveVec.add(fwd.multiplyScalar(dir.z));
                }
                if (dir.x !== 0) {
                    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                    right.y = 0; right.normalize();
                    moveVec.add(right.multiplyScalar(dir.x));
                }

                if (moveVec.lengthSq() > 0) {
                    moveVec.normalize().multiplyScalar(8 * delta);

                    // Wall Collision Detection (X and Z separately for sliding)
                    const playerRadius = 0.5;
                    
                    // Check X
                    if (moveVec.x !== 0) {
                        collisionRaycaster.set(camera.position, new THREE.Vector3(Math.sign(moveVec.x), 0, 0));
                        const hitX = collisionRaycaster.intersectObjects(walls);
                        if (hitX.length > 0 && hitX[0].distance < Math.abs(moveVec.x) + playerRadius) {
                            moveVec.x = 0;
                        }
                    }

                    // Check Z
                    if (moveVec.z !== 0) {
                        collisionRaycaster.set(camera.position, new THREE.Vector3(0, 0, Math.sign(moveVec.z)));
                        const hitZ = collisionRaycaster.intersectObjects(walls);
                        if (hitZ.length > 0 && hitZ[0].distance < Math.abs(moveVec.z) + playerRadius) {
                            moveVec.z = 0;
                        }
                    }

                    camera.position.add(moveVec);
                }
                camera.position.y = 1.6; // Enforce fixed height
            }

            // Update Enemies
            enemies.forEach(enemy => enemy.update(delta));

            // Update Global State
            state.playerPos.x = camera.position.x;
            state.playerPos.y = camera.position.y;
            state.playerPos.z = camera.position.z;
            state.enemies = enemies.map(e => ({
                x: e.mesh.position.x,
                y: e.mesh.position.y,
                z: e.mesh.position.z,
                hp: e.hp,
                alive: e.alive
            }));

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
