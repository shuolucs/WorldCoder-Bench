<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Globe Flight Routes</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: #0a0a2e;
}
canvas {
    display: block;
}
#debug-overlay {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.8);
    color: #00ff00;
    font-family: monospace;
    padding: 15px;
    min-width: 280px;
    border: 1px solid #00ff00;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.6;
    z-index: 100;
    pointer-events: none;
}
#debug-overlay h3 {
    margin: 0 0 8px 0;
    color: #00ff88;
    border-bottom: 1px solid #00ff00;
    padding-bottom: 4px;
}
#btn-speed-up {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 20px;
    background: rgba(0,100,255,0.7);
    color: white;
    border: 1px solid #4488ff;
    border-radius: 4px;
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    z-index: 100;
}
#btn-speed-up:hover {
    background: rgba(0,100,255,0.9);
}
#controls-info {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: rgba(255,255,255,0.5);
    font-family: monospace;
    font-size: 12px;
    line-height: 1.8;
    z-index: 100;
}
</style>
</head>
<body>

<div id="debug-overlay">
    <h3>⚙ Physics Debug</h3>
    <div id="debug-content"></div>
</div>

<button id="btn-speed-up">Speed 1x</button>

<div id="controls-info">
    [D] Toggle Debug &nbsp; [1/2/3] Switch Route &nbsp; [Space] Pause &nbsp; [R] Reset
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
let activeRoute = 1;
let paramT = 0;
let isPaused = false;
let speedMultiplier = 1;
let debugVisible = true;
let frameCount = 0;
let parrotLoaded = false;
let parrotModel = null;
let mixer = null;
let prevPosition = new THREE.Vector3();
let velocity = new THREE.Vector3();
let speed = 0;
let globeExists = false;
let routeTubeMeshes = [];

// Expose state
window.__3D_STATE__ = {
    globeExists: false,
    routeCount: 0,
    activeRoute: 1,
    parrotLoaded: false,
    parrotPosition: { x: 0, y: 0, z: 0 },
    paramT: 0,
    isPaused: false,
    speedMultiplier: 1,
    debugVisible: true,
    frameCount: 0,
    velocity: { x: 0, y: 0, z: 0 },
    speed: 0
};

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 15);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 3, 5);
scene.add(directionalLight);

// Wireframe globe
const globeGeometry = new THREE.SphereGeometry(5, 32, 32);
const globeMaterial = new THREE.MeshBasicMaterial({ color: 0x1a3a5c, wireframe: true });
const globe = new THREE.Mesh(globeGeometry, globeMaterial);
scene.add(globe);
globeExists = true;

// Inner solid sphere
const innerGeometry = new THREE.SphereGeometry(4.95, 32, 32);
const innerMaterial = new THREE.MeshPhongMaterial({ color: 0x0d1b2a });
const innerSphere = new THREE.Mesh(innerGeometry, innerMaterial);
scene.add(innerSphere);

// Routes definition
const routesData = [
    {
        name: 'NYC → London',
        start: new THREE.Vector3(-3.5, 2.5, 2.8),
        control: new THREE.Vector3(0, 7, 2),
        end: new THREE.Vector3(1.5, 3.2, 3.5),
        color: 0xff4444
    },
    {
        name: 'LA → Tokyo',
        start: new THREE.Vector3(-4.2, 1.8, -1.5),
        control: new THREE.Vector3(-1, 7, -4),
        end: new THREE.Vector3(3.8, 2.0, -2.5),
        color: 0x44ff44
    },
    {
        name: 'Dubai → Sydney',
        start: new THREE.Vector3(2.5, 1.5, 3.8),
        control: new THREE.Vector3(4, -3, 2),
        end: new THREE.Vector3(3.5, -2.8, 2.2),
        color: 0x4488ff
    }
];

// Create curves and route visuals
const curves = [];

routesData.forEach((route, index) => {
    const curve = new THREE.QuadraticBezierCurve3(route.start, route.control, route.end);
    curves.push(curve);

    // Tube geometry for route
    const tubeGeometry = new THREE.TubeGeometry(curve, 64, 0.03, 8, false);
    const tubeMaterial = new THREE.MeshBasicMaterial({ color: route.color });
    const tubeMesh = new THREE.Mesh(tubeGeometry, tubeMaterial);
    scene.add(tubeMesh);
    routeTubeMeshes.push(tubeMesh);

    // Start point sphere
    const startSphereGeo = new THREE.SphereGeometry(0.15, 16, 16);
    const startSphereMat = new THREE.MeshBasicMaterial({ color: route.color });
    const startSphere = new THREE.Mesh(startSphereGeo, startSphereMat);
    startSphere.position.copy(route.start);
    scene.add(startSphere);

    // End point sphere
    const endSphereGeo = new THREE.SphereGeometry(0.15, 16, 16);
    const endSphereMat = new THREE.MeshBasicMaterial({ color: route.color });
    const endSphere = new THREE.Mesh(endSphereGeo, endSphereMat);
    endSphere.position.copy(route.end);
    scene.add(endSphere);
});

// Add some stars
const starsGeometry = new THREE.BufferGeometry();
const starsCount = 2000;
const starsPositions = new Float32Array(starsCount * 3);
for (let i = 0; i < starsCount * 3; i++) {
    starsPositions[i] = (Math.random() - 0.5) * 200;
}
starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
const stars = new THREE.Points(starsGeometry, starsMaterial);
scene.add(stars);

// Load Parrot model
const loader = new GLTFLoader();
const parrotURL = 'https://threejs.org/examples/models/gltf/Parrot.glb';

loader.load(parrotURL, (gltf) => {
    parrotModel = gltf.scene;
    parrotModel.scale.set(0.005, 0.005, 0.005);
    scene.add(parrotModel);
    parrotLoaded = true;

    // Set initial position
    const initPos = curves[0].getPoint(0);
    parrotModel.position.copy(initPos);
    prevPosition.copy(initPos);

    // Play animation if available
    if (gltf.animations && gltf.animations.length > 0) {
        mixer = new THREE.AnimationMixer(parrotModel);
        const action = mixer.clipAction(gltf.animations[0]);
        action.play();
    }
}, undefined, (error) => {
    console.error('Error loading Parrot model:', error);
});

// Debug overlay
const debugContent = document.getElementById('debug-content');
const debugOverlay = document.getElementById('debug-overlay');

function updateDebugOverlay() {
    const pos = parrotModel ? parrotModel.position : new THREE.Vector3();
    debugContent.innerHTML = `
<div>Position: (${pos.x.toFixed(2)}, ${pos.y.toFixed(2)}, ${pos.z.toFixed(2)})</div>
<div>Velocity: (${velocity.x.toFixed(3)}, ${velocity.y.toFixed(3)}, ${velocity.z.toFixed(3)})</div>
<div>Speed: ${speed.toFixed(3)}</div>
<div>─────────────────────</div>
<div>Active Route: ${activeRoute} (${routesData[activeRoute - 1].name})</div>
<div>Parameter t: ${paramT.toFixed(3)}</div>
<div>Frame: ${frameCount}</div>
<div>─────────────────────</div>
<div>Paused: ${isPaused}</div>
<div>Speed Mult: ${speedMultiplier}x</div>
<div>Parrot Loaded: ${parrotLoaded}</div>
    `;
}

// Speed button
const btnSpeed = document.getElementById('btn-speed-up');
btnSpeed.addEventListener('click', () => {
    if (speedMultiplier === 1) {
        speedMultiplier = 2;
        btnSpeed.textContent = 'Speed 2x';
    } else {
        speedMultiplier = 1;
        btnSpeed.textContent = 'Speed 1x';
    }
});

// Keyboard controls
document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();

    if (key === 'd') {
        debugVisible = !debugVisible;
        debugOverlay.style.display = debugVisible ? 'block' : 'none';
    } else if (key === '1') {
        activeRoute = 1;
        paramT = 0;
    } else if (key === '2') {
        activeRoute = 2;
        paramT = 0;
    } else if (key === '3') {
        activeRoute = 3;
        paramT = 0;
    } else if (key === ' ') {
        e.preventDefault();
        isPaused = !isPaused;
    } else if (key === 'r') {
        activeRoute = 1;
        paramT = 0;
        speedMultiplier = 1;
        isPaused = false;
        btnSpeed.textContent = 'Speed 1x';
    }
});

// Clock for animation mixer
const clock = new THREE.Clock();

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    frameCount++;
    const delta = clock.getDelta();

    // Update animation mixer
    if (mixer) {
        mixer.update(delta);
    }

    // Animate parrot along route
    if (parrotModel && !isPaused) {
        const increment = 0.002 * speedMultiplier;
        paramT += increment;
        if (paramT >= 1) {
            paramT = 0;
        }
    }

    if (parrotModel) {
        const currentCurve = curves[activeRoute - 1];
        const currentPos = currentCurve.getPoint(paramT);
        parrotModel.position.copy(currentPos);

        // Face direction of travel
        const lookT = Math.min(paramT + 0.01, 1);
        const lookPos = currentCurve.getPoint(lookT);
        parrotModel.lookAt(lookPos);

        // Compute velocity
        velocity.subVectors(currentPos, prevPosition);
        speed = velocity.length();
        prevPosition.copy(currentPos);
    }

    // Slowly rotate globe for visual effect
    // globe.rotation.y += 0.001;
    // innerSphere.rotation.y += 0.001;

    controls.update();

    // Update debug overlay
    if (debugVisible) {
        updateDebugOverlay();
    }

    // Update global state
    const pos = parrotModel ? parrotModel.position : new THREE.Vector3();
    window.__3D_STATE__ = {
        globeExists: globeExists,
        routeCount: routeTubeMeshes.length,
        activeRoute: activeRoute,
        parrotLoaded: parrotLoaded,
        parrotPosition: { x: pos.x, y: pos.y, z: pos.z },
        paramT: paramT,
        isPaused: isPaused,
        speedMultiplier: speedMultiplier,
        debugVisible: debugVisible,
        frameCount: frameCount,
        velocity: { x: velocity.x, y: velocity.y, z: velocity.z },
        speed: speed
    };

    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
