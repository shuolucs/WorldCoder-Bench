<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Globe Flight Routes with Debug Overlay</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #debug-overlay {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0, 0, 0, 0.8);
      color: #00ff00;
      font-family: monospace;
      padding: 15px;
      min-width: 280px;
      border: 1px solid rgba(0, 255, 0, 0.25);
      border-radius: 8px;
      z-index: 10;
      white-space: pre-line;
      line-height: 1.4;
    }

    #btn-speed-up {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      background: #1f6feb;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    #btn-speed-up:hover {
      background: #3b82f6;
    }

    #info {
      position: absolute;
      bottom: 14px;
      left: 14px;
      z-index: 10;
      color: #cbd5e1;
      background: rgba(0,0,0,0.35);
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <button id="btn-speed-up">Speed 2x</button>
  <div id="debug-overlay"></div>
  <div id="info">Keys: 1/2/3 switch route, D toggle debug, Space pause/resume, R reset</div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#0a0a2e");

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 3, 5);
    scene.add(directionalLight);

    const globeInner = new THREE.Mesh(
      new THREE.SphereGeometry(4.95, 32, 32),
      new THREE.MeshPhongMaterial({ color: "#0d1b2a" })
    );
    scene.add(globeInner);

    const globeWire = new THREE.Mesh(
      new THREE.SphereGeometry(5, 32, 32),
      new THREE.MeshBasicMaterial({ color: "#1a3a5c", wireframe: true })
    );
    scene.add(globeWire);

    const routeData = [
      {
        start: new THREE.Vector3(-3.5, 2.5, 2.8),
        control: new THREE.Vector3(0, 7, 2),
        end: new THREE.Vector3(1.5, 3.2, 3.5),
        color: "#ff4444"
      },
      {
        start: new THREE.Vector3(-4.2, 1.8, -1.5),
        control: new THREE.Vector3(-1, 7, -4),
        end: new THREE.Vector3(3.8, 2.0, -2.5),
        color: "#44ff44"
      },
      {
        start: new THREE.Vector3(2.5, 1.5, 3.8),
        control: new THREE.Vector3(4, -3, 2),
        end: new THREE.Vector3(3.5, -2.8, 2.2),
        color: "#4488ff"
      }
    ];

    const routeCurves = [];
    const routeMeshes = [];
    const markerMeshes = [];

    routeData.forEach((route) => {
      const curve = new THREE.QuadraticBezierCurve3(route.start, route.control, route.end);
      routeCurves.push(curve);

      const tube = new THREE.Mesh(
        new THREE.TubeGeometry(curve, 64, 0.03, 8, false),
        new THREE.MeshBasicMaterial({ color: route.color })
      );
      scene.add(tube);
      routeMeshes.push(tube);

      const markerGeo = new THREE.SphereGeometry(0.15, 16, 16);
      const markerMat = new THREE.MeshBasicMaterial({ color: route.color });

      const startMarker = new THREE.Mesh(markerGeo, markerMat);
      startMarker.position.copy(route.start);
      scene.add(startMarker);
      markerMeshes.push(startMarker);

      const endMarker = new THREE.Mesh(markerGeo, markerMat.clone());
      endMarker.position.copy(route.end);
      scene.add(endMarker);
      markerMeshes.push(endMarker);
    });

    const debugOverlay = document.getElementById("debug-overlay");
    const speedBtn = document.getElementById("btn-speed-up");

    let activeRouteIndex = 0;
    let t = 0;
    let isPaused = false;
    let speedMultiplier = 1;
    let frameCount = 0;

    let parrot = null;
    let mixer = null;
    let parrotLoaded = false;

    const clock = new THREE.Clock();
    const parrotWorldPos = new THREE.Vector3();
    const prevParrotWorldPos = new THREE.Vector3();
    const velocity = new THREE.Vector3();

    window.__3D_STATE__ = {
      globeExists: true,
      routeCount: routeMeshes.length,
      activeRoute: 1,
      parrotLoaded: false,
      parrotPosition: { x: 0, y: 0, z: 0 },
      paramT: 0,
      isPaused: false,
      speedMultiplier: 1,
      debugVisible: true,
      frameCount: 0,
      velocity: { x: 0, y: 0, z: 0 },
      speed: 0
    };

    const loader = new GLTFLoader();
    loader.load(
      "https://threejs.org/examples/models/gltf/Parrot.glb",
      (gltf) => {
        parrot = gltf.scene;
        parrot.scale.set(0.005, 0.005, 0.005);

        const initialPoint = routeCurves[activeRouteIndex].getPoint(0);
        parrot.position.copy(initialPoint);

        scene.add(parrot);
        parrotLoaded = true;

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(parrot);
          mixer.clipAction(gltf.animations[0]).play();
        }

        prevParrotWorldPos.copy(initialPoint);
      },
      undefined,
      (err) => {
        console.error("Failed to load Parrot.glb:", err);
      }
    );

    function updateParrot() {
      if (!parrot) return;

      const curve = routeCurves[activeRouteIndex];
      const currentPoint = curve.getPoint(t);
      const nextT = Math.min(t + 0.01, 1);
      const nextPoint = curve.getPoint(nextT);

      parrot.position.copy(currentPoint);
      parrot.lookAt(nextPoint);

      parrot.getWorldPosition(parrotWorldPos);
      velocity.copy(parrotWorldPos).sub(prevParrotWorldPos);
      prevParrotWorldPos.copy(parrotWorldPos);
    }

    function updateDebugOverlay() {
      const speed = velocity.length();
      const pos = parrotLoaded ? parrotWorldPos : new THREE.Vector3();

      debugOverlay.textContent =
`Physics Debug Overlay
Position:
  x: ${pos.x.toFixed(2)}
  y: ${pos.y.toFixed(2)}
  z: ${pos.z.toFixed(2)}

Velocity:
  x: ${velocity.x.toFixed(3)}
  y: ${velocity.y.toFixed(3)}
  z: ${velocity.z.toFixed(3)}

Speed: ${speed.toFixed(3)}
Active Route: ${activeRouteIndex + 1}
t: ${t.toFixed(3)}
Frame: ${frameCount}`;
    }

    function updateState() {
      const speed = velocity.length();
      const pos = parrotLoaded ? parrotWorldPos : new THREE.Vector3();

      window.__3D_STATE__.globeExists = scene.children.includes(globeWire);
      window.__3D_STATE__.routeCount = routeMeshes.filter(m => scene.children.includes(m)).length;
      window.__3D_STATE__.activeRoute = activeRouteIndex + 1;
      window.__3D_STATE__.parrotLoaded = parrotLoaded;
      window.__3D_STATE__.parrotPosition = {
        x: pos.x,
        y: pos.y,
        z: pos.z
      };
      window.__3D_STATE__.paramT = t;
      window.__3D_STATE__.isPaused = isPaused;
      window.__3D_STATE__.speedMultiplier = speedMultiplier;
      window.__3D_STATE__.debugVisible = debugOverlay.style.display !== "none";
      window.__3D_STATE__.frameCount = frameCount;
      window.__3D_STATE__.velocity = {
        x: velocity.x,
        y: velocity.y,
        z: velocity.z
      };
      window.__3D_STATE__.speed = speed;
    }

    function resetState() {
      activeRouteIndex = 0;
      t = 0;
      speedMultiplier = 1;
      isPaused = false;
      speedBtn.textContent = "Speed 2x";

      if (parrot) {
        const point = routeCurves[activeRouteIndex].getPoint(0);
        parrot.position.copy(point);
        prevParrotWorldPos.copy(point);
        parrotWorldPos.copy(point);
        velocity.set(0, 0, 0);
      }
    }

    speedBtn.addEventListener("click", () => {
      speedMultiplier = speedMultiplier === 1 ? 2 : 1;
      speedBtn.textContent = speedMultiplier === 1 ? "Speed 2x" : "Speed 1x";
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "KeyD") {
        debugOverlay.style.display = debugOverlay.style.display === "none" ? "block" : "none";
      }

      if (e.code === "Digit1") {
        activeRouteIndex = 0;
        t = 0;
      }

      if (e.code === "Digit2") {
        activeRouteIndex = 1;
        t = 0;
      }

      if (e.code === "Digit3") {
        activeRouteIndex = 2;
        t = 0;
      }

      if (e.code === "Space") {
        e.preventDefault();
        isPaused = !isPaused;
      }

      if (e.code === "KeyR") {
        resetState();
      }

      if (parrot) {
        const point = routeCurves[activeRouteIndex].getPoint(t);
        parrot.position.copy(point);
        prevParrotWorldPos.copy(point);
        parrotWorldPos.copy(point);
        velocity.set(0, 0, 0);
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const delta = clock.getDelta();

      if (mixer) {
        mixer.update(delta);
      }

      if (parrotLoaded) {
        if (!isPaused) {
          t += (speedMultiplier === 2 ? 0.004 : 0.002);
          if (t >= 1) t = 0;
        }
        updateParrot();
      }

      controls.update();
      updateDebugOverlay();
      updateState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
