<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Backpack Feature Explorer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            user-select: none;
        }
        canvas {
            display: block;
        }
        .hud {
            position: absolute;
            color: white;
            pointer-events: none;
            z-index: 10;
        }
        #top-left {
            top: 20px;
            left: 20px;
        }
        #product-title {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 2px;
        }
        #product-subtitle {
            margin: 5px 0 0 0;
            color: #aaa;
            font-size: 12px;
        }
        #top-right {
            top: 20px;
            right: 20px;
            font-family: monospace;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 4px;
        }
        #info-panel {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 280px;
            background: rgba(26, 26, 46, 0.95);
            border-left: 3px solid #ff6b35;
            color: white;
            padding: 20px;
            border-radius: 8px;
            display: none;
            pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 20;
            backdrop-filter: blur(5px);
        }
        #close-panel {
            float: right;
            cursor: pointer;
            color: #ff6b35;
            font-weight: bold;
            font-size: 18px;
            line-height: 1;
        }
        #close-panel:hover {
            color: #ff8c61;
        }
        #feature-title {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #00ff88;
        }
        #feature-desc {
            margin: 0;
            font-size: 14px;
            line-height: 1.5;
            color: #ddd;
        }
        #bottom-center {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: auto;
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 10;
            background: rgba(0,0,0,0.4);
            padding: 10px 20px;
            border-radius: 30px;
        }
        .theme-btn {
            padding: 8px 16px;
            border: 2px solid transparent;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            transition: transform 0.2s, border-color 0.2s;
        }
        .theme-btn:hover {
            transform: scale(1.05);
        }
        .theme-btn.active {
            border-color: white;
        }
        #theme-classic { background: #8B4513; }
        #theme-modern { background: #2c3e50; }
        #theme-luxury { background: #c9a84c; }
        
        #zoom-level {
            color: #fff;
            font-family: monospace;
            font-size: 14px;
            margin-left: 10px;
            padding-left: 15px;
            border-left: 1px solid rgba(255,255,255,0.3);
        }
        #controls-hint {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            pointer-events: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="top-left" class="hud">
        <h1 id="product-title">ARTISAN CORSET</h1>
        <p id="product-subtitle">Explore features by clicking the orange markers</p>
    </div>

    <div id="top-right" class="hud">
        Rot: <span id="rotation-indicator">0</span>°
    </div>

    <div id="info-panel">
        <span id="close-panel">&times;</span>
        <h3 id="feature-title">Feature Title</h3>
        <p id="feature-desc">Feature description goes here.</p>
    </div>

    <div id="controls-hint">
        Scroll to Zoom | Space: Auto-Rotate | A/D: Rotate | R: Reset
    </div>

    <div id="bottom-center">
        <button id="theme-classic" class="theme-btn active">Classic</button>
        <button id="theme-modern" class="theme-btn">Modern</button>
        <button id="theme-luxury" class="theme-btn">Luxury</button>
        <div id="zoom-level">100%</div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            modelRotationY: 0,
            autoRotate: true,
            activeHotspot: 0,
            panelVisible: false,
            currentTheme: 'classic',
            cameraDistance: 0.5,
            zoomPercent: 100,
            hotspotClickCount: 0,
            platformColor: '#8B4513'
        };

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();

        // Gradient Background
        const canvas = document.createElement('canvas');
        canvas.width = 2;
        canvas.height = 2;
        const context = canvas.getContext('2d');
        const gradient = context.createLinearGradient(0, 0, 0, 2);
        gradient.addColorStop(0, '#1a1a2e');
        gradient.addColorStop(1, '#16213e');
        context.fillStyle = gradient;
        context.fillRect(0, 0, 2, 2);
        scene.background = new THREE.CanvasTexture(canvas);

        // Camera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 10);
        const defaultCameraPos = new THREE.Vector3(0, 0.15, 0.5);
        camera.position.copy(defaultCameraPos);
        
        let targetCameraPos = defaultCameraPos.clone();
        let currentLookAt = new THREE.Vector3(0, 0, 0);
        let targetLookAt = new THREE.Vector3(0, 0, 0);
        let currentZoomDistance = 0.5;

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        mainLight.position.set(2, 3, 2);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.bias = -0.001;
        scene.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0xffffff, 0.5);
        fillLight.position.set(-1, 1, -1);
        scene.add(fillLight);

        // Main Group (for rotation)
        const mainGroup = new THREE.Group();
        scene.add(mainGroup);

        // Platform
        const platformGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.01, 64);
        const platformMat = new THREE.MeshStandardMaterial({ 
            color: 0x8B4513, 
            metalness: 0.8, 
            roughness: 0.2 
        });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = -0.005;
        platform.receiveShadow = true;
        mainGroup.add(platform);

        // --- LOAD MODEL ---
        const loader = new GLTFLoader();
        const modelUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Corset/glTF-Binary/Corset.glb';
        
        loader.load(modelUrl, (gltf) => {
            const model = gltf.scene;
            model.scale.set(3.0, 3.0, 3.0);
            
            // Center model
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.x = -center.x;
            model.position.y = -box.min.y; // Rest on platform
            model.position.z = -center.z;

            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            mainGroup.add(model);
            window.__3D_STATE__.modelLoaded = true;
        });

        // --- HOTSPOTS ---
        const hotspotData = [
            { id: 1, pos: [0.05, 0.12, 0.04], title: 'Stitching Detail', desc: 'Premium double-stitched seams for durability' },
            { id: 2, pos: [-0.04, 0.08, 0.05], title: 'Material Quality', desc: 'Full-grain leather with natural patina aging' },
            { id: 3, pos: [0.0, 0.1, 0.06], title: 'Lacing System', desc: 'Adjustable cross-lacing with brass eyelets' },
            { id: 4, pos: [0.03, 0.04, 0.04], title: 'Structural Support', desc: 'Internal boning provides structured silhouette' },
            { id: 5, pos: [-0.03, 0.14, 0.03], title: 'Edge Finishing', desc: 'Hand-finished rolled edges prevent fraying' }
        ];

        const hotspotMeshes = [];
        const hotspotGeo = new THREE.SphereGeometry(0.008, 32, 32);
        const defaultHotspotColor = 0xff6b35;
        const activeHotspotColor = 0x00ff88;

        hotspotData.forEach(data => {
            const mat = new THREE.MeshBasicMaterial({ color: defaultHotspotColor });
            const mesh = new THREE.Mesh(hotspotGeo, mat);
            // Scale positions by 3 to match model scale
            mesh.position.set(data.pos[0] * 3, data.pos[1] * 3, data.pos[2] * 3);
            mesh.userData = data;
            mainGroup.add(mesh);
            hotspotMeshes.push(mesh);
        });

        // --- INTERACTION & RAYCASTING ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isFocused = false;

        window.addEventListener('pointerdown', (event) => {
            if (event.target.closest('#info-panel') || event.target.closest('#bottom-center')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(hotspotMeshes);

            if (intersects.length > 0) {
                const hit = intersects[0].object;
                activateHotspot(hit);
            }
        });

        function activateHotspot(mesh) {
            // Reset others
            hotspotMeshes.forEach(m => m.material.color.setHex(defaultHotspotColor));
            
            // Set active
            mesh.material.color.setHex(activeHotspotColor);
            const data = mesh.userData;
            
            // Update State
            window.__3D_STATE__.activeHotspot = data.id;
            window.__3D_STATE__.hotspotClickCount++;
            window.__3D_STATE__.panelVisible = true;
            window.__3D_STATE__.autoRotate = false;
            isFocused = true;

            // Update DOM
            document.getElementById('feature-title').innerText = data.title;
            document.getElementById('feature-desc').innerText = data.desc;
            document.getElementById('info-panel').style.display = 'block';

            // Camera Animation Target
            const worldPos = new THREE.Vector3();
            mesh.getWorldPosition(worldPos);
            targetLookAt.copy(worldPos);

            // Calculate camera position slightly offset from hotspot
            const dir = worldPos.clone().sub(mainGroup.position).normalize();
            targetCameraPos.copy(worldPos).add(dir.multiplyScalar(0.15));
            targetCameraPos.y += 0.05; // Look slightly down
        }

        document.getElementById('close-panel').addEventListener('click', () => {
            document.getElementById('info-panel').style.display = 'none';
            hotspotMeshes.forEach(m => m.material.color.setHex(defaultHotspotColor));
            
            window.__3D_STATE__.activeHotspot = 0;
            window.__3D_STATE__.panelVisible = false;
            isFocused = false;
            
            targetLookAt.set(0, 0, 0);
            updateZoomTarget();
        });

        // --- ZOOM CONTROLS ---
        function updateZoomTarget() {
            if (isFocused) return;
            const dir = defaultCameraPos.clone().normalize();
            targetCameraPos.copy(dir.multiplyScalar(currentZoomDistance));
        }

        window.addEventListener('wheel', (event) => {
            if (isFocused) return;
            const delta = event.deltaY * 0.0005;
            currentZoomDistance += delta;
            currentZoomDistance = Math.max(0.25, Math.min(1.0, currentZoomDistance));
            updateZoomTarget();
        });

        // --- KEYBOARD CONTROLS ---
        window.addEventListener('keydown', (event) => {
            switch(event.code) {
                case 'Space':
                    window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
                    break;
                case 'KeyA':
                    mainGroup.rotation.y -= 0.1;
                    break;
                case 'KeyD':
                    mainGroup.rotation.y += 0.1;
                    break;
                case 'KeyR':
                    mainGroup.rotation.y = 0;
                    window.__3D_STATE__.autoRotate = true;
                    if(!isFocused) {
                        currentZoomDistance = 0.5;
                        updateZoomTarget();
                    }
                    break;
            }
        });

        // --- THEMES ---
        const themes = {
            classic: { platform: 0x8B4513, light: 0xffeedd },
            modern: { platform: 0x2c3e50, light: 0xe0e0ff },
            luxury: { platform: 0xc9a84c, light: 0xfff5e0 }
        };

        function setTheme(name) {
            platformMat.color.setHex(themes[name].platform);
            mainLight.color.setHex(themes[name].light);
            
            window.__3D_STATE__.currentTheme = name;
            window.__3D_STATE__.platformColor = '#' + themes[name].platform.toString(16).padStart(6, '0');
            
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`theme-${name}`).classList.add('active');
        }

        document.getElementById('theme-classic').addEventListener('click', () => setTheme('classic'));
        document.getElementById('theme-modern').addEventListener('click', () => setTheme('modern'));
        document.getElementById('theme-luxury').addEventListener('click', () => setTheme('luxury'));

        // Initialize default theme
        setTheme('classic');

        // --- RESIZE HANDLER ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Auto Rotate
            if (window.__3D_STATE__.autoRotate) {
                mainGroup.rotation.y += 0.3 * clock.getDelta();
            } else {
                clock.getDelta(); // clear delta
            }

            // Hotspot Pulsing
            const pulseScale = 1.4 + Math.sin(time * 4) * 0.4; // oscillates between 1.0 and 1.8
            hotspotMeshes.forEach(mesh => {
                if (mesh.userData.id !== window.__3D_STATE__.activeHotspot) {
                    mesh.scale.setScalar(pulseScale);
                } else {
                    mesh.scale.setScalar(1.8); // Keep active slightly larger
                }
            });

            // Camera Lerp
            camera.position.lerp(targetCameraPos, 0.05);
            currentLookAt.lerp(targetLookAt, 0.05);
            camera.lookAt(currentLookAt);

            // Update State & HUD
            let rotDeg = Math.round(THREE.MathUtils.radToDeg(mainGroup.rotation.y)) % 360;
            if (rotDeg < 0) rotDeg += 360;
            
            const dist = camera.position.distanceTo(currentLookAt);
            const zoomPct = Math.round((0.5 / dist) * 100);

            window.__3D_STATE__.modelRotationY = mainGroup.rotation.y;
            window.__3D_STATE__.cameraDistance = dist;
            window.__3D_STATE__.zoomPercent = zoomPct;

            document.getElementById('rotation-indicator').innerText = rotDeg;
            document.getElementById('zoom-level').innerText = zoomPct + '%';

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
