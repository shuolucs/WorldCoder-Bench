<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artisan Corset - 3D Feature Explorer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
    color: white;
  }
  body.theme-classic { --accent: #8B4513; }
  body.theme-modern { --accent: #2c3e50; }
  body.theme-luxury { --accent: #c9a84c; }
  canvas { display: block; }

  #product-title {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 3px;
    color: white;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    z-index: 10;
  }
  #product-subtitle {
    position: absolute;
    top: 52px;
    left: 20px;
    font-size: 12px;
    color: #aaa;
    z-index: 10;
  }
  #rotation-indicator {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 14px;
    color: #ccc;
    font-family: 'Courier New', monospace;
    background: rgba(0,0,0,0.4);
    padding: 6px 12px;
    border-radius: 4px;
    z-index: 10;
  }
  #zoom-level {
    position: absolute;
    top: 50px;
    right: 20px;
    font-size: 12px;
    color: #aaa;
    font-family: 'Courier New', monospace;
    background: rgba(0,0,0,0.4);
    padding: 4px 10px;
    border-radius: 4px;
    z-index: 10;
  }

  #info-panel {
    display: none;
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 280px;
    background: rgba(26,26,46,0.95);
    border-left: 3px solid #ff6b35;
    color: white;
    padding: 20px;
    border-radius: 8px;
    z-index: 20;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: slideIn 0.3s ease-out;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-50%) translateX(20px); }
    to { opacity: 1; transform: translateY(-50%) translateX(0); }
  }
  #info-panel h3 {
    font-size: 16px;
    margin-bottom: 10px;
    color: #ff6b35;
    letter-spacing: 1px;
  }
  #info-panel p {
    font-size: 13px;
    line-height: 1.6;
    color: #ccc;
  }
  #close-panel {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: 1px solid #555;
    color: #aaa;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  #close-panel:hover {
    border-color: #ff6b35;
    color: #ff6b35;
  }
  #hotspot-number {
    display: inline-block;
    background: #ff6b35;
    color: white;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    text-align: center;
    line-height: 22px;
    font-size: 11px;
    font-weight: bold;
    margin-right: 8px;
    vertical-align: middle;
  }

  #theme-buttons {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
  }
  .theme-btn {
    padding: 8px 20px;
    border: 2px solid;
    border-radius: 20px;
    background: rgba(0,0,0,0.4);
    color: white;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    transition: all 0.3s;
    backdrop-filter: blur(5px);
  }
  .theme-btn:hover {
    transform: scale(1.05);
  }
  .theme-btn.active {
    background: rgba(255,255,255,0.15);
  }
  #theme-classic { border-color: #8B4513; }
  #theme-classic:hover, #theme-classic.active { background: rgba(139,69,19,0.3); }
  #theme-modern { border-color: #2c3e50; }
  #theme-modern:hover, #theme-modern.active { background: rgba(44,62,80,0.3); }
  #theme-luxury { border-color: #c9a84c; }
  #theme-luxury:hover, #theme-luxury.active { background: rgba(201,168,76,0.3); }

  #loading-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 100;
    transition: opacity 0.5s;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #333;
    border-top-color: #ff6b35;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-overlay p {
    margin-top: 15px;
    color: #888;
    font-size: 13px;
  }

  #controls-hint {
    position: absolute;
    bottom: 75px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #555;
    z-index: 10;
    text-align: center;
  }
</style>
</head>
<body class="theme-classic">

<div id="loading-overlay">
  <div class="spinner"></div>
  <p>Loading 3D Model...</p>
</div>

<div id="product-title">ARTISAN CORSET</div>
<div id="product-subtitle">Explore features by clicking the orange markers</div>
<div id="rotation-indicator">ROT: 0°</div>
<div id="zoom-level">ZOOM: 100%</div>

<div id="info-panel">
  <button id="close-panel">✕</button>
  <h3><span id="hotspot-number">1</span><span id="feature-title">Feature</span></h3>
  <p id="feature-desc">Description</p>
</div>

<div id="theme-buttons">
  <button class="theme-btn active" id="theme-classic">Classic</button>
  <button class="theme-btn" id="theme-modern">Modern</button>
  <button class="theme-btn" id="theme-luxury">Luxury</button>
</div>

<div id="controls-hint">SPACE: Toggle Rotation &nbsp;|&nbsp; A/D: Rotate &nbsp;|&nbsp; R: Reset &nbsp;|&nbsp; Scroll: Zoom</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
  modelLoaded: false,
  modelRotationY: 0,
  autoRotate: true,
  activeHotspot: 0,
  panelVisible: false,
  currentTheme: 'classic',
  cameraDistance: 0.5,
  zoomPercent: 100,
  hotspotClickCount: 0,
  platformColor: '#8B4513'
};

// Scene
const scene = new THREE.Scene();

// Gradient background
const bgCanvas = document.createElement('canvas');
bgCanvas.width = 2;
bgCanvas.height = 512;
const bgCtx = bgCanvas.getContext('2d');
const gradient = bgCtx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#1a1a2e');
gradient.addColorStop(1, '#16213e');
bgCtx.fillStyle = gradient;
bgCtx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(bgCanvas);
scene.background = bgTexture;

// Camera
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 0.15, 0.5);
camera.lookAt(0, 0.08, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(2, 3, 2);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 1024;
dirLight.shadow.mapSize.height = 1024;
dirLight.shadow.camera.near = 0.1;
dirLight.shadow.camera.far = 10;
dirLight.shadow.camera.left = -1;
dirLight.shadow.camera.right = 1;
dirLight.shadow.camera.top = 1;
dirLight.shadow.camera.bottom = -1;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0xffffff, 0.5);
fillLight.position.set(-1, 1, -1);
scene.add(fillLight);

// Platform
const platformGeom = new THREE.CylinderGeometry(0.2, 0.2, 0.01, 64);
const platformMat = new THREE.MeshStandardMaterial({
  color: 0x8B4513,
  metalness: 0.8,
  roughness: 0.2
});
const platform = new THREE.Mesh(platformGeom, platformMat);
platform.position.y = -0.005;
platform.receiveShadow = true;
scene.add(platform);

// Model group (model + hotspots rotate together)
const modelGroup = new THREE.Group();
scene.add(modelGroup);

// Hotspot data
const hotspotData = [
  { name: 'Stitching Detail', desc: 'Premium double-stitched seams for durability', pos: new THREE.Vector3(0.05, 0.12, 0.04) },
  { name: 'Material Quality', desc: 'Full-grain leather with natural patina aging', pos: new THREE.Vector3(-0.04, 0.08, 0.05) },
  { name: 'Lacing System', desc: 'Adjustable cross-lacing with brass eyelets', pos: new THREE.Vector3(0.0, 0.1, 0.06) },
  { name: 'Structural Support', desc: 'Internal boning provides structured silhouette', pos: new THREE.Vector3(0.03, 0.04, 0.04) },
  { name: 'Edge Finishing', desc: 'Hand-finished rolled edges prevent fraying', pos: new THREE.Vector3(-0.03, 0.14, 0.03) }
];

const hotspotMeshes = [];
const hotspotDefaultColor = new THREE.Color(0xff6b35);
const hotspotActiveColor = new THREE.Color(0x00ff88);

hotspotData.forEach((data, i) => {
  const geom = new THREE.SphereGeometry(0.008, 16, 16);
  const mat = new THREE.MeshBasicMaterial({ color: hotspotDefaultColor.clone() });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.position.copy(data.pos);
  mesh.userData = { hotspotIndex: i + 1 };
  modelGroup.add(mesh);
  hotspotMeshes.push(mesh);
});

// Load model
const loader = new GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Corset/glTF-Binary/Corset.glb',
  (gltf) => {
    const model = gltf.scene;
    model.scale.set(3.0, 3.0, 3.0);

    // Center model on platform
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.x -= center.x;
    model.position.z -= center.z;
    // Place bottom of model on platform
    model.position.y -= box.min.y;

    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    modelGroup.add(model);
    window.__3D_STATE__.modelLoaded = true;

    // Hide loading overlay
    const overlay = document.getElementById('loading-overlay');
    overlay.style.opacity = '0';
    setTimeout(() => { overlay.style.display = 'none'; }, 500);
  },
  (progress) => {
    // Loading progress
  },
  (error) => {
    console.error('Error loading model:', error);
  }
);

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Camera animation state
let cameraAnimating = false;
let cameraStartPos = new THREE.Vector3();
let cameraTargetPos = new THREE.Vector3();
let cameraStartLookAt = new THREE.Vector3(0, 0.08, 0);
let cameraTargetLookAt = new THREE.Vector3();
let cameraCurrentLookAt = new THREE.Vector3(0, 0.08, 0);
let cameraAnimFrame = 0;
const cameraAnimDuration = 60;

// Auto-rotate
let autoRotate = true;
const autoRotateSpeed = 0.3; // radians per second

// Zoom
let cameraDistance = 0.5;
const minDist = 0.25;
const maxDist = 1.0;
let cameraTheta = 0; // horizontal angle
let cameraPhi = Math.atan2(0.15, Math.sqrt(0.5*0.5 - 0.15*0.15)); // vertical angle

function updateCameraFromSpherical() {
  camera.position.x = cameraDistance * Math.cos(cameraPhi) * Math.sin(cameraTheta);
  camera.position.y = cameraDistance * Math.sin(cameraPhi);
  camera.position.z = cameraDistance * Math.cos(cameraPhi) * Math.cos(cameraTheta);
  camera.lookAt(cameraCurrentLookAt);
}

// Initialize camera spherical coords from initial position
cameraTheta = Math.atan2(camera.position.x, camera.position.z); // 0
cameraPhi = Math.asin(camera.position.y / cameraDistance); // asin(0.15/0.5)

// Click handler
renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(hotspotMeshes);

  if (intersects.length > 0) {
    const hit = intersects[0].object;
    const idx = hit.userData.hotspotIndex;
    activateHotspot(idx);
  }
});

function activateHotspot(idx) {
  window.__3D_STATE__.hotspotClickCount++;
  window.__3D_STATE__.activeHotspot = idx;

  // Reset all hotspot colors
  hotspotMeshes.forEach((m) => {
    m.material.color.copy(hotspotDefaultColor);
  });

  // Highlight active
  const activeHotspot = hotspotMeshes[idx - 1];
  activeHotspot.material.color.copy(hotspotActiveColor);

  // Get world position of hotspot
  const worldPos = new THREE.Vector3();
  activeHotspot.getWorldPosition(worldPos);

  // Animate camera to look at hotspot from nearby
  cameraAnimating = true;
  cameraAnimFrame = 0;
  cameraStartPos.copy(camera.position);
  cameraStartLookAt.copy(cameraCurrentLookAt);

  // Target: position camera closer to the hotspot
  const dir = new THREE.Vector3().subVectors(camera.position, worldPos).normalize();
  cameraTargetPos.copy(worldPos).add(dir.multiplyScalar(0.15));
  cameraTargetLookAt.copy(worldPos);

  // Show panel
  const data = hotspotData[idx - 1];
  document.getElementById('hotspot-number').textContent = idx;
  document.getElementById('feature-title').textContent = data.name;
  document.getElementById('feature-desc').textContent = data.desc;
  document.getElementById('info-panel').style.display = 'block';
  window.__3D_STATE__.panelVisible = true;
}

// Close panel
document.getElementById('close-panel').addEventListener('click', () => {
  document.getElementById('info-panel').style.display = 'none';
  window.__3D_STATE__.panelVisible = false;
  window.__3D_STATE__.activeHotspot = 0;

  // Reset hotspot colors
  hotspotMeshes.forEach((m) => {
    m.material.color.copy(hotspotDefaultColor);
  });

  // Animate camera back
  cameraAnimating = true;
  cameraAnimFrame = 0;
  cameraStartPos.copy(camera.position);
  cameraStartLookAt.copy(cameraCurrentLookAt);
  cameraTargetPos.set(
    cameraDistance * Math.cos(cameraPhi) * Math.sin(cameraTheta),
    cameraDistance * Math.sin(cameraPhi),
    cameraDistance * Math.cos(cameraPhi) * Math.cos(cameraTheta)
  );
  cameraTargetLookAt.set(0, 0.08, 0);
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    autoRotate = !autoRotate;
    window.__3D_STATE__.autoRotate = autoRotate;
  } else if (e.code === 'KeyA') {
    modelGroup.rotation.y += 0.1;
  } else if (e.code === 'KeyD') {
    modelGroup.rotation.y -= 0.1;
  } else if (e.code === 'KeyR') {
    modelGroup.rotation.y = 0;
    autoRotate = true;
    window.__3D_STATE__.autoRotate = true;
  }
});

// Scroll zoom
renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  cameraDistance += e.deltaY * 0.0005;
  cameraDistance = Math.max(minDist, Math.min(maxDist, cameraDistance));

  if (!cameraAnimating) {
    updateCameraFromSpherical();
  }
}, { passive: false });

// Theme buttons
const themes = {
  classic: { platform: '#8B4513', light: '#ffeedd', platformHex: 0x8B4513, lightHex: 0xffeedd },
  modern: { platform: '#2c3e50', light: '#e0e0ff', platformHex: 0x2c3e50, lightHex: 0xe0e0ff },
  luxury: { platform: '#c9a84c', light: '#fff5e0', platformHex: 0xc9a84c, lightHex: 0xfff5e0 }
};

document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const themeKey = btn.id.replace('theme-', '');
    const theme = themes[themeKey];

    platformMat.color.set(theme.platformHex);
    dirLight.color.set(theme.lightHex);

    document.body.className = 'theme-' + themeKey;
    window.__3D_STATE__.currentTheme = themeKey;
    window.__3D_STATE__.platformColor = theme.platform;
  });
});

// Easing function
function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Clock
const clock = new THREE.Clock();

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const time = clock.getElapsedTime();

  // Auto-rotate
  if (autoRotate && !cameraAnimating) {
    modelGroup.rotation.y += autoRotateSpeed * delta;
  }

  // Hotspot pulse
  hotspotMeshes.forEach((mesh, i) => {
    const pulse = 1.0 + 0.4 * Math.sin(time * 3 + i * 1.2);
    mesh.scale.setScalar(pulse);
  });

  // Camera animation
  if (cameraAnimating) {
    cameraAnimFrame++;
    const t = easeInOutCubic(Math.min(cameraAnimFrame / cameraAnimDuration, 1.0));

    camera.position.lerpVectors(cameraStartPos, cameraTargetPos, t);
    cameraCurrentLookAt.lerpVectors(cameraStartLookAt, cameraTargetLookAt, t);
    camera.lookAt(cameraCurrentLookAt);

    if (cameraAnimFrame >= cameraAnimDuration) {
      cameraAnimating = false;
    }
  } else {
    // Normal camera update (only if not animating to hotspot)
    if (window.__3D_STATE__.activeHotspot === 0) {
      updateCameraFromSpherical();
    }
  }

  // Update state
  let rotY = modelGroup.rotation.y % (Math.PI * 2);
  if (rotY < 0) rotY += Math.PI * 2;
  window.__3D_STATE__.modelRotationY = modelGroup.rotation.y;
  window.__3D_STATE__.autoRotate = autoRotate;

  const actualDist = camera.position.length();
  window.__3D_STATE__.cameraDistance = actualDist;
  const zoomPct = Math.round((0.5 / actualDist) * 100);
  window.__3D_STATE__.zoomPercent = zoomPct;

  // Update DOM
  const degrees = Math.round((rotY * 180 / Math.PI) % 360);
  document.getElementById('rotation-indicator').textContent = `ROT: ${degrees}°`;
  document.getElementById('zoom-level').textContent = `ZOOM: ${zoomPct}%`;

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
