<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procedural City Builder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    padding: 15px 20px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 220px;
    pointer-events: none;
    user-select: none;
  }

  #hud .title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 8px;
    color: #ffcc00;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 6px;
  }

  #hud .selected {
    color: #4488ff;
    font-weight: bold;
  }

  #hud .delete-on {
    color: #ff4444;
    font-weight: bold;
  }

  #hud .delete-off {
    color: #88ff88;
  }

  #buttons {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
  }

  #buttons button {
    padding: 10px 20px;
    font-size: 14px;
    font-weight: bold;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    pointer-events: all;
  }

  #btn-clear-all {
    background: #ff4444;
    color: white;
  }

  #btn-clear-all:hover {
    background: #ff6666;
  }

  #btn-randomize {
    background: #4488ff;
    color: white;
  }

  #btn-randomize:hover {
    background: #66aaff;
  }

  #controls-help {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: #ccc;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 12px;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="hud">
  <div class="title">🏙️ City Builder</div>
  <div id="hud-selected">Selected: Residential</div>
  <div id="hud-total">Total Buildings: 0</div>
  <div id="hud-residential">Residential: 0</div>
  <div id="hud-commercial">Commercial: 0</div>
  <div id="hud-industrial">Industrial: 0</div>
  <div id="hud-park">Parks: 0</div>
  <div id="hud-lamp">Lamps: 0</div>
  <div id="hud-delete">Delete Mode: OFF</div>
  <div id="hud-time">Time: Day</div>
</div>

<div id="controls-help">
  [1-5] Select Type &nbsp;|&nbsp; [Click] Place &nbsp;|&nbsp; [D] Delete Mode &nbsp;|&nbsp; [Z] Undo &nbsp;|&nbsp; [R] Reset Camera &nbsp;|&nbsp; [N] Day/Night
</div>

<div id="buttons">
  <button id="btn-clear-all">Clear All</button>
  <button id="btn-randomize">Randomize City</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function() {
  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(30, 40, 30);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // Controls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.target.set(0, 0, 0);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(20, 30, 10);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 100;
  dirLight.shadow.camera.left = -60;
  dirLight.shadow.camera.right = 60;
  dirLight.shadow.camera.top = 60;
  dirLight.shadow.camera.bottom = -60;
  scene.add(dirLight);

  // Ground plane
  const groundGeo = new THREE.PlaneGeometry(100, 100);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Grid
  const gridHelper = new THREE.GridHelper(100, 20, 0x555555, 0x444444);
  gridHelper.position.y = 0.01;
  scene.add(gridHelper);

  // Hover indicator
  const hoverGeo = new THREE.PlaneGeometry(10, 10);
  const hoverMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
  const hoverMesh = new THREE.Mesh(hoverGeo, hoverMat);
  hoverMesh.rotation.x = -Math.PI / 2;
  hoverMesh.position.y = 0.05;
  hoverMesh.visible = false;
  scene.add(hoverMesh);

  // City grid state
  const GRID_SIZE = 10;
  const cityGrid = [];
  const cityObjects = []; // 2D array of THREE.Group objects
  const cityLights = []; // 2D array of point lights for lamps

  for (let r = 0; r < GRID_SIZE; r++) {
    cityGrid[r] = [];
    cityObjects[r] = [];
    cityLights[r] = [];
    for (let c = 0; c < GRID_SIZE; c++) {
      cityGrid[r][c] = 'empty';
      cityObjects[r][c] = null;
      cityLights[r][c] = null;
    }
  }

  // State
  let selectedType = 'residential';
  let deleteMode = false;
  let isNight = false;
  let lastPlacedCell = null;
  let lastDeletedCell = null;
  const historyStack = [];
  let hoveredCell = null;

  const typeNames = {
    'residential': 'Residential',
    'commercial': 'Commercial',
    'industrial': 'Industrial',
    'park': 'Park',
    'lamp': 'Lamp'
  };

  // Expose state
  window.__3D_STATE__ = {};

  function updateState() {
    let total = 0, res = 0, com = 0, ind = 0, park = 0, lamp = 0;
    for (let r = 0; r < GRID_SIZE; r++) {
      for (let c = 0; c < GRID_SIZE; c++) {
        const v = cityGrid[r][c];
        if (v !== 'empty') {
          total++;
          if (v === 'residential') res++;
          else if (v === 'commercial') com++;
          else if (v === 'industrial') ind++;
          else if (v === 'park') park++;
          else if (v === 'lamp') lamp++;
        }
      }
    }

    window.__3D_STATE__.totalBuildings = total;
    window.__3D_STATE__.residentialCount = res;
    window.__3D_STATE__.commercialCount = com;
    window.__3D_STATE__.industrialCount = ind;
    window.__3D_STATE__.parkCount = park;
    window.__3D_STATE__.lampCount = lamp;
    window.__3D_STATE__.selectedType = selectedType;
    window.__3D_STATE__.deleteMode = deleteMode;
    window.__3D_STATE__.isNight = isNight;
    window.__3D_STATE__.lastPlacedCell = lastPlacedCell;
    window.__3D_STATE__.lastDeletedCell = lastDeletedCell;
    window.__3D_STATE__.historyLength = historyStack.length;
    window.__3D_STATE__.gridState = cityGrid.map(row => [...row]);
    window.__3D_STATE__.hoveredCell = hoveredCell;
    window.__3D_STATE__.cameraPosition = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
    window.__3D_STATE__.ambientIntensity = ambientLight.intensity;

    // Update HUD
    document.getElementById('hud-selected').innerHTML = `Selected: <span class="selected">${typeNames[selectedType]}</span>`;
    document.getElementById('hud-total').textContent = `Total Buildings: ${total}`;
    document.getElementById('hud-residential').textContent = `Residential: ${res}`;
    document.getElementById('hud-commercial').textContent = `Commercial: ${com}`;
    document.getElementById('hud-industrial').textContent = `Industrial: ${ind}`;
    document.getElementById('hud-park').textContent = `Parks: ${park}`;
    document.getElementById('hud-lamp').textContent = `Lamps: ${lamp}`;
    document.getElementById('hud-delete').innerHTML = deleteMode
      ? '<span class="delete-on">Delete Mode: ON</span>'
      : '<span class="delete-off">Delete Mode: OFF</span>';
    document.getElementById('hud-time').textContent = `Time: ${isNight ? 'Night' : 'Day'}`;
  }

  function getCellCenter(row, col) {
    return new THREE.Vector3(-45 + col * 10, 0, -45 + row * 10);
  }

  function worldToCell(x, z) {
    const col = Math.floor((x + 50) / 10);
    const row = Math.floor((z + 50) / 10);
    if (row >= 0 && row < GRID_SIZE && col >= 0 && col < GRID_SIZE) {
      return { row, col };
    }
    return null;
  }

  function randRange(min, max) {
    return min + Math.random() * (max - min);
  }

  function createBuilding(type, row, col) {
    const center = getCellCenter(row, col);
    const group = new THREE.Group();

    if (type === 'residential') {
      const h = randRange(5, 15);
      const w = randRange(6, 8);
      const d = randRange(6, 8);
      const geo = new THREE.BoxGeometry(w, h, d);
      const mat = new THREE.MeshStandardMaterial({ color: 0x4488ff });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(center.x, h / 2, center.z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      group.add(mesh);
    } else if (type === 'commercial') {
      const h = randRange(10, 25);
      const w = randRange(7, 9);
      const d = randRange(7, 9);
      const geo = new THREE.BoxGeometry(w, h, d);
      const mat = new THREE.MeshStandardMaterial({ color: 0x44ff88 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(center.x, h / 2, center.z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      group.add(mesh);
    } else if (type === 'industrial') {
      const h = randRange(4, 10);
      const w = randRange(8, 9);
      const d = randRange(8, 9);
      const geo = new THREE.BoxGeometry(w, h, d);
      const mat = new THREE.MeshStandardMaterial({ color: 0xff8844 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(center.x, h / 2, center.z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      group.add(mesh);
    } else if (type === 'park') {
      // Flat disc
      const discGeo = new THREE.CylinderGeometry(4, 4, 0.3, 32);
      const discMat = new THREE.MeshStandardMaterial({ color: 0x22aa22 });
      const disc = new THREE.Mesh(discGeo, discMat);
      disc.position.set(center.x, 0.15, center.z);
      disc.castShadow = true;
      disc.receiveShadow = true;
      group.add(disc);

      // 3 trees
      for (let i = 0; i < 3; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 3;
        const treeGeo = new THREE.SphereGeometry(1, 8, 8);
        const treeMat = new THREE.MeshStandardMaterial({ color: 0x22aa22 });
        const tree = new THREE.Mesh(treeGeo, treeMat);
        tree.position.set(
          center.x + Math.cos(angle) * dist,
          1.3,
          center.z + Math.sin(angle) * dist
        );
        tree.castShadow = true;
        tree.receiveShadow = true;
        group.add(tree);
      }
    } else if (type === 'lamp') {
      // Create a procedural lamp since GLB may not load
      // Pole
      const poleGeo = new THREE.CylinderGeometry(0.15, 0.2, 7, 8);
      const poleMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.6, roughness: 0.3 });
      const pole = new THREE.Mesh(poleGeo, poleMat);
      pole.position.set(center.x, 3.5, center.z);
      pole.castShadow = true;
      pole.receiveShadow = true;
      group.add(pole);

      // Lamp head
      const headGeo = new THREE.SphereGeometry(0.6, 16, 16);
      const headMat = new THREE.MeshStandardMaterial({ color: 0xffeecc, emissive: 0xffeecc, emissiveIntensity: 0.5 });
      const head = new THREE.Mesh(headGeo, headMat);
      head.position.set(center.x, 7.2, center.z);
      head.castShadow = true;
      group.add(head);

      // Arm
      const armGeo = new THREE.CylinderGeometry(0.08, 0.08, 1.5, 6);
      const arm = new THREE.Mesh(armGeo, poleMat);
      arm.position.set(center.x + 0.5, 7, center.z);
      arm.rotation.z = Math.PI / 4;
      arm.castShadow = true;
      group.add(arm);

      // Base
      const baseGeo = new THREE.CylinderGeometry(0.5, 0.6, 0.3, 8);
      const base = new THREE.Mesh(baseGeo, poleMat);
      base.position.set(center.x, 0.15, center.z);
      base.castShadow = true;
      base.receiveShadow = true;
      group.add(base);

      // Point light
      const pointLight = new THREE.PointLight(0xffeecc, isNight ? 2.0 : 0.3, 20);
      pointLight.position.set(center.x, 8, center.z);
      pointLight.castShadow = true;
      group.add(pointLight);
      cityLights[row][col] = pointLight;

      // Try loading GLTF model
      const loader = new THREE.GLTFLoader();
      loader.load(
        'IridescenceLamp.glb',
        function(gltf) {
          // If loaded successfully, replace procedural lamp
          // Remove existing children except the point light
          const children = [...group.children];
          children.forEach(child => {
            if (child !== pointLight && !(child instanceof THREE.PointLight)) {
              group.remove(child);
            }
          });
          const model = gltf.scene;
          model.scale.set(2.0, 2.0, 2.0);
          model.position.set(center.x, 0, center.z);
          model.traverse(child => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
            }
          });
          group.add(model);
        },
        undefined,
        function(error) {
          // Keep procedural lamp on error
        }
      );
    }

    scene.add(group);
    cityObjects[row][col] = group;
    cityGrid[row][col] = type;
  }

  function removeBuilding(row, col) {
    if (cityObjects[row][col]) {
      scene.remove(cityObjects[row][col]);
      // Dispose geometries and materials
      cityObjects[row][col].traverse(child => {
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
          if (Array.isArray(child.material)) {
            child.material.forEach(m => m.dispose());
          } else {
            child.material.dispose();
          }
        }
      });
      cityObjects[row][col] = null;
      cityLights[row][col] = null;
      cityGrid[row][col] = 'empty';
    }
  }

  function placeBuilding(type, row, col, addToHistory = true) {
    if (cityGrid[row][col] !== 'empty') return false;

    if (addToHistory) {
      historyStack.push({ action: 'place', type, row, col });
      if (historyStack.length > 50) historyStack.shift();
    }

    createBuilding(type, row, col);
    lastPlacedCell = { row, col };
    updateState();
    return true;
  }

  function deleteBuilding(row, col, addToHistory = true) {
    if (cityGrid[row][col] === 'empty') return false;

    const type = cityGrid[row][col];
    if (addToHistory) {
      historyStack.push({ action: 'delete', type, row, col });
      if (historyStack.length > 50) historyStack.shift();
    }

    removeBuilding(row, col);
    lastDeletedCell = { row, col };
    updateState();
    return true;
  }

  function undo() {
    if (historyStack.length === 0) return;
    const action = historyStack.pop();

    if (action.action === 'place') {
      // Undo a placement = delete
      removeBuilding(action.row, action.col);
      lastDeletedCell = { row: action.row, col: action.col };
    } else if (action.action === 'delete') {
      // Undo a deletion = re-place
      createBuilding(action.type, action.row, action.col);
      lastPlacedCell = { row: action.row, col: action.col };
    }

    updateState();
  }

  function clearAll() {
    for (let r = 0; r < GRID_SIZE; r++) {
      for (let c = 0; c < GRID_SIZE; c++) {
        removeBuilding(r, c);
      }
    }
    historyStack.length = 0;
    lastPlacedCell = null;
    lastDeletedCell = null;
    updateState();
  }

  function randomizeCity() {
    const emptyCells = [];
    for (let r = 0; r < GRID_SIZE; r++) {
      for (let c = 0; c < GRID_SIZE; c++) {
        if (cityGrid[r][c] === 'empty') {
          emptyCells.push({ row: r, col: c });
        }
      }
    }

    // Shuffle and pick up to 15
    for (let i = emptyCells.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [emptyCells[i], emptyCells[j]] = [emptyCells[j], emptyCells[i]];
    }

    const types = ['residential', 'commercial', 'industrial', 'park', 'lamp'];
    const count = Math.min(15, emptyCells.length);

    for (let i = 0; i < count; i++) {
      const cell = emptyCells[i];
      const type = types[Math.floor(Math.random() * types.length)];
      placeBuilding(type, cell.row, cell.col, true);
    }
  }

  function toggleDayNight() {
    isNight = !isNight;

    if (isNight) {
      scene.background = new THREE.Color(0x111122);
      ambientLight.intensity = 0.1;
    } else {
      scene.background = new THREE.Color(0x87CEEB);
      ambientLight.intensity = 0.4;
    }

    // Update lamp lights
    for (let r = 0; r < GRID_SIZE; r++) {
      for (let c = 0; c < GRID_SIZE; c++) {
        if (cityLights[r][c]) {
          cityLights[r][c].intensity = isNight ? 2.0 : 0.3;
        }
      }
    }

    updateState();
  }

  // Raycasting
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  function onMouseMove(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(ground);

    if (intersects.length > 0) {
      const point = intersects[0].point;
      const cell = worldToCell(point.x, point.z);

      if (cell) {
        hoveredCell = cell;
        const center = getCellCenter(cell.row, cell.col);
        hoverMesh.position.set(center.x, 0.05, center.z);
        hoverMesh.visible = true;

        if (deleteMode) {
          hoverMat.color.set(0xff4444);
        } else {
          hoverMat.color.set(0xffffff);
        }
      } else {
        hoveredCell = null;
        hoverMesh.visible = false;
      }
    } else {
      hoveredCell = null;
      hoverMesh.visible = false;
    }

    updateState();
  }

  function onClick(event) {
    if (event.target.tagName === 'BUTTON') return;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(ground);

    if (intersects.length > 0) {
      const point = intersects[0].point;
      const cell = worldToCell(point.x, point.z);

      if (cell) {
        if (deleteMode) {
          deleteBuilding(cell.row, cell.col);
        } else {
          placeBuilding(selectedType, cell.row, cell.col);
        }
      }
    }
  }

  function onKeyDown(event) {
    const key = event.key.toLowerCase();

    if (key === '1') {
      selectedType = 'residential';
      updateState();
    } else if (key === '2') {
      selectedType = 'commercial';
      updateState();
    } else if (key === '3') {
      selectedType = 'industrial';
      updateState();
    } else if (key === '4') {
      selectedType = 'park';
      updateState();
    } else if (key === '5') {
      selectedType = 'lamp';
      updateState();
    } else if (key === 'd') {
      deleteMode = !deleteMode;
      updateState();
    } else if (key === 'z') {
      undo();
    } else if (key === 'r') {
      camera.position.set(30, 40, 30);
      controls.target.set(0, 0, 0);
      controls.update();
      updateState();
    } else if (key === 'n') {
      toggleDayNight();
    }
  }

  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('click', onClick);
  window.addEventListener('keydown', onKeyDown);

  document.getElementById('btn-clear-all').addEventListener('click', clearAll);
  document.getElementById('btn-randomize').addEventListener('click', randomizeCity);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Initial state
  updateState();

  // Animation loop
  function animate() {
    requestAnimationFrame(animate);
    controls.update();

    // Update camera position in state
    if (window.__3D_STATE__) {
      window.__3D_STATE__.cameraPosition = {
        x: camera.position.x,
        y: camera.position.y,
        z: camera.position.z
      };
    }

    renderer.render(scene, camera);
  }

  animate();
})();
</script>
</body>
</html>
