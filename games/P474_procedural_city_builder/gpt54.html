<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procedural City Builder - Three.js</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0, 0, 0, 0.6);
      padding: 12px 14px;
      border-radius: 8px;
      min-width: 260px;
      line-height: 1.5;
      font-size: 14px;
      user-select: none;
    }

    #controls {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      gap: 8px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      background: rgba(30, 30, 30, 0.85);
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: rgba(60, 60, 60, 0.95);
    }

    #help {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0, 0, 0, 0.55);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.45;
      max-width: 420px;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud"></div>

    <div id="controls">
      <button id="btn-clear-all">Clear All</button>
      <button id="btn-randomize">Randomize City</button>
    </div>

    <div id="help">
      <strong>Controls</strong><br>
      1 Residential | 2 Commercial | 3 Industrial | 4 Park | 5 Lamp<br>
      D Toggle Delete | Z Undo | R Reset Camera | N Day/Night<br>
      Left-click to place or delete
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const hud = document.getElementById('hud');
    const btnClearAll = document.getElementById('btn-clear-all');
    const btnRandomize = document.getElementById('btn-randomize');

    const GRID_SIZE = 10;
    const CELL_SIZE = 10;
    const HALF_WORLD = 50;
    const INITIAL_CAMERA_POS = new THREE.Vector3(30, 40, 30);

    const TYPE_LABELS = {
      residential: 'Residential',
      commercial: 'Commercial',
      industrial: 'Industrial',
      park: 'Park',
      lamp: 'Lamp'
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#87CEEB');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.copy(INITIAL_CAMERA_POS);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(20, 30, 10);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.width = 2048;
    directionalLight.shadow.mapSize.height = 2048;
    directionalLight.shadow.camera.left = -70;
    directionalLight.shadow.camera.right = 70;
    directionalLight.shadow.camera.top = 70;
    directionalLight.shadow.camera.bottom = -70;
    directionalLight.shadow.camera.near = 1;
    directionalLight.shadow.camera.far = 120;
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(100, 100),
      new THREE.MeshStandardMaterial({ color: '#333333' })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    ground.name = 'ground';
    scene.add(ground);

    const gridHelper = new THREE.GridHelper(100, 20, 0xaaaaaa, 0x666666);
    gridHelper.position.y = 0.02;
    scene.add(gridHelper);

    const hoverIndicator = new THREE.Mesh(
      new THREE.PlaneGeometry(CELL_SIZE, CELL_SIZE),
      new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.28,
        side: THREE.DoubleSide,
        depthWrite: false
      })
    );
    hoverIndicator.rotation.x = -Math.PI / 2;
    hoverIndicator.position.y = 0.05;
    hoverIndicator.visible = false;
    scene.add(hoverIndicator);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const loader = new GLTFLoader();
    let lampModelTemplate = null;
    let lampModelLoaded = false;
    let lampModelFailed = false;

    const cityGrid = Array.from({ length: GRID_SIZE }, () =>
      Array.from({ length: GRID_SIZE }, () => 'empty')
    );

    const placedObjects = Array.from({ length: GRID_SIZE }, () =>
      Array.from({ length: GRID_SIZE }, () => null)
    );

    let selectedType = 'residential';
    let deleteMode = false;
    let isNight = false;
    let hoveredCell = null;
    let lastPlacedCell = null;
    let lastDeletedCell = null;
    const historyStack = [];

    function update3DState() {
      const counts = getCounts();
      window.__3D_STATE__ = {
        totalBuildings: counts.total,
        residentialCount: counts.residential,
        commercialCount: counts.commercial,
        industrialCount: counts.industrial,
        parkCount: counts.park,
        lampCount: counts.lamp,
        selectedType,
        deleteMode,
        isNight,
        lastPlacedCell,
        lastDeletedCell,
        historyLength: historyStack.length,
        gridState: cityGrid.map(row => [...row]),
        hoveredCell: hoveredCell ? { ...hoveredCell } : null,
        cameraPosition: {
          x: camera.position.x,
          y: camera.position.y,
          z: camera.position.z
        },
        ambientIntensity: ambientLight.intensity
      };
    }

    function getCounts() {
      const counts = {
        total: 0,
        residential: 0,
        commercial: 0,
        industrial: 0,
        park: 0,
        lamp: 0
      };

      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          const value = cityGrid[r][c];
          if (value !== 'empty') {
            counts.total++;
            counts[value]++;
          }
        }
      }
      return counts;
    }

    function updateHUD() {
      const counts = getCounts();
      hud.innerHTML = `
        <div><strong>Selected:</strong> ${TYPE_LABELS[selectedType]}</div>
        <div><strong>Total buildings placed:</strong> ${counts.total}</div>
        <div>Residential: ${counts.residential}</div>
        <div>Commercial: ${counts.commercial}</div>
        <div>Industrial: ${counts.industrial}</div>
        <div>Park: ${counts.park}</div>
        <div>Lamp: ${counts.lamp}</div>
        <div><strong>Delete Mode:</strong> ${deleteMode ? 'ON' : 'OFF'}</div>
        <div><strong>Time:</strong> ${isNight ? 'Night' : 'Day'}</div>
      `;
      update3DState();
    }

    function cellToWorld(row, col) {
      return {
        x: -45 + col * CELL_SIZE,
        z: -45 + row * CELL_SIZE
      };
    }

    function worldToCell(x, z) {
      const col = Math.floor((x + HALF_WORLD) / CELL_SIZE);
      const row = Math.floor((z + HALF_WORLD) / CELL_SIZE);
      if (row < 0 || row >= GRID_SIZE || col < 0 || col >= GRID_SIZE) return null;
      return { row, col };
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function setShadowRecursive(obj) {
      obj.traverse(child => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          if (child.material) {
            child.material.needsUpdate = true;
          }
        }
      });
    }

    function pushHistory(action) {
      historyStack.push(action);
      if (historyStack.length > 20) historyStack.shift();
    }

    function createResidential() {
      const w = rand(6, 8);
      const d = rand(6, 8);
      const h = rand(5, 15);

      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshStandardMaterial({ color: '#4488ff' })
      );
      mesh.position.y = h / 2;
      mesh.castShadow = true;
      mesh.receiveShadow = true;

      const group = new THREE.Group();
      group.add(mesh);
      group.userData.type = 'residential';
      return group;
    }

    function createCommercial() {
      const w = rand(7, 9);
      const d = rand(7, 9);
      const h = rand(10, 25);

      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshStandardMaterial({ color: '#44ff88' })
      );
      mesh.position.y = h / 2;
      mesh.castShadow = true;
      mesh.receiveShadow = true;

      const group = new THREE.Group();
      group.add(mesh);
      group.userData.type = 'commercial';
      return group;
    }

    function createIndustrial() {
      const w = rand(8, 9);
      const d = rand(8, 9);
      const h = rand(4, 10);

      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshStandardMaterial({ color: '#ff8844' })
      );
      mesh.position.y = h / 2;
      mesh.castShadow = true;
      mesh.receiveShadow = true;

      const group = new THREE.Group();
      group.add(mesh);
      group.userData.type = 'industrial';
      return group;
    }

    function createPark() {
      const group = new THREE.Group();

      const disc = new THREE.Mesh(
        new THREE.CylinderGeometry(4, 4, 0.3, 32),
        new THREE.MeshStandardMaterial({ color: '#22aa22' })
      );
      disc.position.y = 0.15;
      disc.castShadow = true;
      disc.receiveShadow = true;
      group.add(disc);

      for (let i = 0; i < 3; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = rand(0.5, 2.8);
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;

        const trunk = new THREE.Mesh(
          new THREE.CylinderGeometry(0.18, 0.22, 1.2, 8),
          new THREE.MeshStandardMaterial({ color: '#6b4f2a' })
        );
        trunk.position.set(x, 0.9, z);
        trunk.castShadow = true;
        trunk.receiveShadow = true;
        group.add(trunk);

        const crown = new THREE.Mesh(
          new THREE.SphereGeometry(1, 16, 16),
          new THREE.MeshStandardMaterial({ color: '#2ecc40' })
        );
        crown.position.set(x, 1.9, z);
        crown.castShadow = true;
        crown.receiveShadow = true;
        group.add(crown);
      }

      group.userData.type = 'park';
      return group;
    }

    function createLampFallback() {
      const group = new THREE.Group();

      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.25, 0.3, 6, 12),
        new THREE.MeshStandardMaterial({ color: '#888888', metalness: 0.6, roughness: 0.4 })
      );
      pole.position.y = 3;
      pole.castShadow = true;
      pole.receiveShadow = true;
      group.add(pole);

      const head = new THREE.Mesh(
        new THREESphereGeometrySafe(0.7, 16, 16),
        new THREE.MeshStandardMaterial({ color: '#ffeecc', emissive: '#553311', emissiveIntensity: 0.6 })
      );
      head.position.y = 6.5;
      head.castShadow = true;
      head.receiveShadow = true;
      group.add(head);

      const pointLight = new THREE.PointLight('#ffeecc', isNight ? 2.0 : 0.3, 20);
      pointLight.position.set(0, 8, 0);
      pointLight.castShadow = true;
      pointLight.visible = true;
      group.add(pointLight);

      group.userData.type = 'lamp';
      group.userData.pointLight = pointLight;
      return group;
    }

    function THREESphereGeometrySafe(radius, w, h) {
      return new THREE.SphereGeometry(radius, w, h);
    }

    async function loadLampTemplate() {
      try {
        const gltf = await loader.loadAsync('IridescenceLamp.glb');
        lampModelTemplate = gltf.scene;
        lampModelLoaded = true;
      } catch (e) {
        console.warn('Failed to load IridescenceLamp.glb, using fallback lamp.', e);
        lampModelFailed = true;
      }
    }

    function createLamp() {
      const group = new THREE.Group();

      if (lampModelLoaded && lampModelTemplate) {
        const lampClone = lampModelTemplate.clone(true);
        lampClone.scale.setScalar(2.0);
        lampClone.position.set(0, 0, 0);
        setShadowRecursive(lampClone);
        group.add(lampClone);
      } else {
        const fallbackVisual = createLampFallback();
        fallbackVisual.children.forEach(child => {
          if (child.type !== 'PointLight') group.add(child.clone ? child.clone() : child);
        });
      }

      const pointLight = new THREE.PointLight('#ffeecc', isNight ? 2.0 : 0.3, 20);
      pointLight.position.set(0, 8, 0);
      pointLight.castShadow = true;
      pointLight.visible = true;
      group.add(pointLight);

      group.userData.type = 'lamp';
      group.userData.pointLight = pointLight;

      return group;
    }

    function createByType(type) {
      switch (type) {
        case 'residential': return createResidential();
        case 'commercial': return createCommercial();
        case 'industrial': return createIndustrial();
        case 'park': return createPark();
        case 'lamp': return createLamp();
        default: return null;
      }
    }

    function placeBuilding(row, col, type, recordHistory = true) {
      if (cityGrid[row][col] !== 'empty') return false;

      const object = createByType(type);
      if (!object) return false;

      const pos = cellToWorld(row, col);
      object.position.set(pos.x, 0, pos.z);
      object.userData.row = row;
      object.userData.col = col;

      scene.add(object);
      cityGrid[row][col] = type;
      placedObjects[row][col] = object;
      lastPlacedCell = { row, col };

      if (recordHistory) {
        pushHistory({
          action: 'place',
          row,
          col,
          type
        });
      }

      updateHUD();
      return true;
    }

    function removeBuilding(row, col, recordHistory = true) {
      const existingType = cityGrid[row][col];
      if (existingType === 'empty') return false;

      const obj = placedObjects[row][col];
      if (obj) {
        scene.remove(obj);
        obj.traverse?.(child => {
          if (child.geometry) child.geometry.dispose?.();
          if (child.material) {
            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose?.());
            else child.material.dispose?.();
          }
        });
      }

      cityGrid[row][col] = 'empty';
      placedObjects[row][col] = null;
      lastDeletedCell = { row, col };

      if (recordHistory) {
        pushHistory({
          action: 'delete',
          row,
          col,
          type: existingType
        });
      }

      updateHUD();
      return true;
    }

    function clearAll(recordHistory = false) {
      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          if (cityGrid[r][c] !== 'empty') {
            removeBuilding(r, c, recordHistory);
          }
        }
      }
      updateHUD();
    }

    function undoLastAction() {
      if (historyStack.length === 0) return;
      const last = historyStack.pop();

      if (last.action === 'place') {
        removeBuilding(last.row, last.col, false);
      } else if (last.action === 'delete') {
        placeBuilding(last.row, last.col, last.type, false);
      }

      updateHUD();
    }

    function setTimeMode(night) {
      isNight = night;
      if (isNight) {
        scene.background = new THREE.Color('#111122');
        ambientLight.intensity = 0.1;
      } else {
        scene.background = new THREE.Color('#87CEEB');
        ambientLight.intensity = 0.4;
      }

      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          const obj = placedObjects[r][c];
          if (obj && obj.userData.type === 'lamp' && obj.userData.pointLight) {
            obj.userData.pointLight.intensity = isNight ? 2.0 : 0.3;
            obj.userData.pointLight.visible = true;
          }
        }
      }

      updateHUD();
    }

    function updateHoverFromMouse(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(ground);

      if (hits.length > 0) {
        const point = hits[0].point;
        const cell = worldToCell(point.x, point.z);
        if (cell) {
          hoveredCell = cell;
          const pos = cellToWorld(cell.row, cell.col);
          hoverIndicator.visible = true;
          hoverIndicator.position.set(pos.x, 0.05, pos.z);
          update3DState();
          return;
        }
      }

      hoveredCell = null;
      hoverIndicator.visible = false;
      update3DState();
    }

    function onPointerDown(event) {
      if (event.button !== 0) return;
      if (!hoveredCell) return;

      const { row, col } = hoveredCell;

      if (deleteMode) {
        if (cityGrid[row][col] !== 'empty') {
          removeBuilding(row, col, true);
        }
      } else {
        if (cityGrid[row][col] === 'empty') {
          placeBuilding(row, col, selectedType, true);
        }
      }
    }

    function resetCamera() {
      camera.position.copy(INITIAL_CAMERA_POS);
      controls.target.set(0, 0, 0);
      controls.update();
      update3DState();
    }

    function randomizeCity() {
      let placed = 0;
      let attempts = 0;
      const types = ['residential', 'commercial', 'industrial', 'park', 'lamp'];

      while (placed < 15 && attempts < 500) {
        attempts++;
        const row = Math.floor(Math.random() * GRID_SIZE);
        const col = Math.floor(Math.random() * GRID_SIZE);
        if (cityGrid[row][col] !== 'empty') continue;

        const type = types[Math.floor(Math.random() * types.length)];
        if (placeBuilding(row, col, type, true)) {
          placed++;
        }
      }

      updateHUD();
    }

    window.addEventListener('mousemove', updateHoverFromMouse);
    window.addEventListener('pointerdown', onPointerDown);

    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();

      if (key === '1') selectedType = 'residential';
      else if (key === '2') selectedType = 'commercial';
      else if (key === '3') selectedType = 'industrial';
      else if (key === '4') selectedType = 'park';
      else if (key === '5') selectedType = 'lamp';
      else if (key === 'd') deleteMode = !deleteMode;
      else if (key === 'z') undoLastAction();
      else if (key === 'r') resetCamera();
      else if (key === 'n') setTimeMode(!isNight);

      updateHUD();
    });

    btnClearAll.addEventListener('click', () => {
      clearAll(false);
      historyStack.length = 0;
      updateHUD();
    });

    btnRandomize.addEventListener('click', () => {
      randomizeCity();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      update3DState();
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      update3DState();
      renderer.render(scene, camera);
    }

    async function init() {
      await loadLampTemplate();
      updateHUD();
      animate();
    }

    init();
  </script>
</body>
</html>
