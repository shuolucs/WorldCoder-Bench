<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural City Builder</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(20, 20, 20, 0.8);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            min-width: 200px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid #444;
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        .hud-item {
            margin: 5px 0;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
        .hud-controls {
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
            border-top: 1px solid #555;
            padding-top: 10px;
        }
        #ui-buttons {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #555;
        }
        #btn-clear-all {
            background: #822;
        }
        #btn-clear-all:hover {
            background: #a33;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <h2>City Builder HUD</h2>
        <div class="hud-item"><span>Selected:</span> <span id="ui-selected" style="color: #4488ff; font-weight: bold;">Residential</span></div>
        <div class="hud-item"><span>Total Buildings:</span> <span id="ui-total">0</span></div>
        <div class="hud-item"><span>Residential:</span> <span id="ui-res">0</span></div>
        <div class="hud-item"><span>Commercial:</span> <span id="ui-com">0</span></div>
        <div class="hud-item"><span>Industrial:</span> <span id="ui-ind">0</span></div>
        <div class="hud-item"><span>Park:</span> <span id="ui-park">0</span></div>
        <div class="hud-item"><span>Lamp:</span> <span id="ui-lamp">0</span></div>
        <div class="hud-item" style="margin-top: 10px;"><span>Delete Mode:</span> <span id="ui-delete" style="color: #ff4444;">OFF</span></div>
        <div class="hud-item"><span>Time:</span> <span id="ui-time" style="color: #87CEEB;">Day</span></div>
        <div class="hud-controls">
            Keys: 1-5 (Select), D (Delete), Z (Undo), R (Reset Cam), N (Day/Night)
        </div>
    </div>

    <div id="ui-buttons">
        <button id="btn-clear-all">Clear All</button>
        <button id="btn-randomize">Randomize City</button>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            totalBuildings: 0,
            residentialCount: 0,
            commercialCount: 0,
            industrialCount: 0,
            parkCount: 0,
            lampCount: 0,
            selectedType: 'residential',
            deleteMode: false,
            isNight: false,
            lastPlacedCell: null,
            lastDeletedCell: null,
            historyLength: 0,
            gridState: Array(10).fill().map(() => Array(10).fill('empty')),
            hoveredCell: null,
            cameraPosition: { x: 30, y: 40, z: 30 },
            ambientIntensity: 0.4
        };

        const state = window.__3D_STATE__;
        const buildingObjects = Array(10).fill().map(() => Array(10).fill(null));
        const history = [];
        const typeMap = {
            '1': 'residential',
            '2': 'commercial',
            '3': 'industrial',
            '4': 'park',
            '5': 'lamp'
        };
        const typeColors = {
            'residential': '#4488ff',
            'commercial': '#44ff88',
            'industrial': '#ff8844',
            'park': '#22aa22',
            'lamp': '#ffeecc'
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(30, 40, 30);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 30, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 150;
        const d = 60;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grid Overlay
        const gridHelper = new THREE.GridHelper(100, 20, 0x000000, 0x000000);
        gridHelper.position.y = 0.01;
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // Hover Indicator
        const hoverGeo = new THREE.PlaneGeometry(10, 10);
        const hoverMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
        const hoverIndicator = new THREE.Mesh(hoverGeo, hoverMat);
        hoverIndicator.rotation.x = -Math.PI / 2;
        hoverIndicator.position.y = 0.02;
        hoverIndicator.visible = false;
        scene.add(hoverIndicator);

        // --- Asset Loading ---
        let loadedLampModel = null;
        const gltfLoader = new GLTFLoader();
        gltfLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/IridescenceLamp.glb', (gltf) => {
            loadedLampModel = gltf.scene;
            loadedLampModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
        }, undefined, (error) => {
            console.warn('Failed to load lamp model, using fallback.', error);
        });

        // --- Procedural Generation ---
        function createBuilding(type) {
            const group = new THREE.Group();
            
            if (type === 'residential') {
                const h = 5 + Math.random() * 10;
                const w = 6 + Math.random() * 2;
                const d = 6 + Math.random() * 2;
                const geo = new THREE.BoxGeometry(w, h, d);
                const mat = new THREE.MeshStandardMaterial({ color: 0x4488ff });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = h / 2;
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                group.add(mesh);
            } 
            else if (type === 'commercial') {
                const h = 10 + Math.random() * 15;
                const w = 7 + Math.random() * 2;
                const d = 7 + Math.random() * 2;
                const geo = new THREE.BoxGeometry(w, h, d);
                const mat = new THREE.MeshStandardMaterial({ color: 0x44ff88 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = h / 2;
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                group.add(mesh);
            } 
            else if (type === 'industrial') {
                const h = 4 + Math.random() * 6;
                const w = 8 + Math.random() * 1;
                const d = 8 + Math.random() * 1;
                const geo = new THREE.BoxGeometry(w, h, d);
                const mat = new THREE.MeshStandardMaterial({ color: 0xff8844 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = h / 2;
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                group.add(mesh);
            } 
            else if (type === 'park') {
                const baseGeo = new THREE.CylinderGeometry(4, 4, 0.3, 32);
                const baseMat = new THREE.MeshStandardMaterial({ color: 0x22aa22 });
                const base = new THREE.Mesh(baseGeo, baseMat);
                base.position.y = 0.15;
                base.receiveShadow = true;
                group.add(base);

                for (let i = 0; i < 3; i++) {
                    const treeGeo = new THREE.SphereGeometry(1, 16, 16);
                    const treeMat = new THREE.MeshStandardMaterial({ color: 0x22aa22 });
                    const tree = new THREE.Mesh(treeGeo, treeMat);
                    const angle = Math.random() * Math.PI * 2;
                    const radius = Math.random() * 2.5;
                    tree.position.set(Math.cos(angle) * radius, 0.3 + 1, Math.sin(angle) * radius);
                    tree.castShadow = true;
                    group.add(tree);
                }
            } 
            else if (type === 'lamp') {
                if (loadedLampModel) {
                    const model = loadedLampModel.clone();
                    model.scale.set(2.0, 2.0, 2.0);
                    group.add(model);
                } else {
                    // Fallback
                    const geo = new THREE.CylinderGeometry(0.2, 0.2, 8);
                    const mat = new THREE.MeshStandardMaterial({ color: 0x888888 });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.y = 4;
                    mesh.castShadow = true;
                    group.add(mesh);
                }
                const light = new THREE.PointLight(0xffeecc, state.isNight ? 2.0 : 0.3, 20);
                light.position.y = 8;
                group.add(light);
            }

            return group;
        }

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function getGridCoords(intersectPoint) {
            const x = intersectPoint.x;
            const z = intersectPoint.z;
            const c = Math.floor((x + 50) / 10);
            const r = Math.floor((z + 50) / 10);
            if (r >= 0 && r < 10 && c >= 0 && c < 10) return { r, c };
            return null;
        }

        function getWorldCoords(r, c) {
            return { x: -45 + c * 10, z: -45 + r * 10 };
        }

        function updateHUD() {
            document.getElementById('ui-selected').textContent = state.selectedType.charAt(0).toUpperCase() + state.selectedType.slice(1);
            document.getElementById('ui-selected').style.color = typeColors[state.selectedType];
            document.getElementById('ui-total').textContent = state.totalBuildings;
            document.getElementById('ui-res').textContent = state.residentialCount;
            document.getElementById('ui-com').textContent = state.commercialCount;
            document.getElementById('ui-ind').textContent = state.industrialCount;
            document.getElementById('ui-park').textContent = state.parkCount;
            document.getElementById('ui-lamp').textContent = state.lampCount;
            
            const delEl = document.getElementById('ui-delete');
            delEl.textContent = state.deleteMode ? 'ON' : 'OFF';
            delEl.style.color = state.deleteMode ? '#ff4444' : '#888';

            const timeEl = document.getElementById('ui-time');
            timeEl.textContent = state.isNight ? 'Night' : 'Day';
            timeEl.style.color = state.isNight ? '#aaaaff' : '#87CEEB';
        }

        function updateCounts(type, delta) {
            state.totalBuildings += delta;
            if (type === 'residential') state.residentialCount += delta;
            if (type === 'commercial') state.commercialCount += delta;
            if (type === 'industrial') state.industrialCount += delta;
            if (type === 'park') state.parkCount += delta;
            if (type === 'lamp') state.lampCount += delta;
        }

        function placeBuilding(type, r, c, recordHistory = true) {
            if (state.gridState[r][c] !== 'empty') return;

            const obj = createBuilding(type);
            const pos = getWorldCoords(r, c);
            obj.position.set(pos.x, 0, pos.z);
            scene.add(obj);

            state.gridState[r][c] = type;
            buildingObjects[r][c] = obj;
            updateCounts(type, 1);
            state.lastPlacedCell = { r, c };

            if (recordHistory) {
                history.push({ action: 'place', r, c, type, obj });
                state.historyLength = history.length;
            }
            updateHUD();
        }

        function removeBuilding(r, c, recordHistory = true) {
            const type = state.gridState[r][c];
            if (type === 'empty') return;

            const obj = buildingObjects[r][c];
            scene.remove(obj);

            state.gridState[r][c] = 'empty';
            buildingObjects[r][c] = null;
            updateCounts(type, -1);
            state.lastDeletedCell = { r, c };

            if (recordHistory) {
                history.push({ action: 'delete', r, c, type, obj });
                state.historyLength = history.length;
            }
            updateHUD();
        }

        function undo() {
            if (history.length === 0) return;
            const last = history.pop();
            state.historyLength = history.length;

            if (last.action === 'place') {
                removeBuilding(last.r, last.c, false);
            } else if (last.action === 'delete') {
                scene.add(last.obj);
                state.gridState[last.r][last.c] = last.type;
                buildingObjects[last.r][last.c] = last.obj;
                updateCounts(last.type, 1);
                state.lastPlacedCell = { r: last.r, c: last.c };
                updateHUD();
            }
        }

        function toggleDayNight() {
            state.isNight = !state.isNight;
            if (state.isNight) {
                scene.background = new THREE.Color(0x111122);
                ambientLight.intensity = 0.1;
            } else {
                scene.background = new THREE.Color(0x87CEEB);
                ambientLight.intensity = 0.4;
            }
            state.ambientIntensity = ambientLight.intensity;

            // Update lamp lights
            const lightIntensity = state.isNight ? 2.0 : 0.3;
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 10; c++) {
                    if (state.gridState[r][c] === 'lamp' && buildingObjects[r][c]) {
                        buildingObjects[r][c].traverse((child) => {
                            if (child.isPointLight) child.intensity = lightIntensity;
                        });
                    }
                }
            }
            updateHUD();
        }

        // Event Listeners
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(ground);

            if (intersects.length > 0) {
                const coords = getGridCoords(intersects[0].point);
                if (coords) {
                    const pos = getWorldCoords(coords.r, coords.c);
                    hoverIndicator.position.set(pos.x, 0.02, pos.z);
                    hoverIndicator.visible = true;
                    state.hoveredCell = coords;
                } else {
                    hoverIndicator.visible = false;
                    state.hoveredCell = null;
                }
            } else {
                hoverIndicator.visible = false;
                state.hoveredCell = null;
            }
        });

        window.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return; // Left click only
            if (e.target.tagName === 'BUTTON') return; // Ignore UI clicks

            if (state.hoveredCell) {
                const { r, c } = state.hoveredCell;
                if (state.deleteMode) {
                    removeBuilding(r, c);
                } else {
                    placeBuilding(state.selectedType, r, c);
                }
            }
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();
            if (['1', '2', '3', '4', '5'].includes(key)) {
                state.selectedType = typeMap[key];
                updateHUD();
            } else if (key === 'D') {
                state.deleteMode = !state.deleteMode;
                updateHUD();
            } else if (key === 'Z') {
                undo();
            } else if (key === 'R') {
                camera.position.set(30, 40, 30);
                camera.lookAt(0, 0, 0);
                controls.target.set(0, 0, 0);
            } else if (key === 'N') {
                toggleDayNight();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Buttons
        document.getElementById('btn-clear-all').addEventListener('click', () => {
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 10; c++) {
                    if (state.gridState[r][c] !== 'empty') {
                        scene.remove(buildingObjects[r][c]);
                        buildingObjects[r][c] = null;
                        state.gridState[r][c] = 'empty';
                    }
                }
            }
            state.totalBuildings = 0;
            state.residentialCount = 0;
            state.commercialCount = 0;
            state.industrialCount = 0;
            state.parkCount = 0;
            state.lampCount = 0;
            history.length = 0;
            state.historyLength = 0;
            updateHUD();
        });

        document.getElementById('btn-randomize').addEventListener('click', () => {
            const emptyCells = [];
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 10; c++) {
                    if (state.gridState[r][c] === 'empty') {
                        emptyCells.push({ r, c });
                    }
                }
            }
            
            emptyCells.sort(() => Math.random() - 0.5);
            const toFill = emptyCells.slice(0, 15);
            const types = ['residential', 'commercial', 'industrial', 'park', 'lamp'];
            
            toFill.forEach(cell => {
                const randomType = types[Math.floor(Math.random() * types.length)];
                placeBuilding(randomType, cell.r, cell.c, true);
            });
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            // Sync state
            state.cameraPosition.x = camera.position.x;
            state.cameraPosition.y = camera.position.y;
            state.cameraPosition.z = camera.position.z;

            renderer.render(scene, camera);
        }

        updateHUD();
        animate();
    </script>
</body>
</html>
