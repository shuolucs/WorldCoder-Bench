<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pendulum Wave Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px;
            border-radius: 5px;
            pointer-events: none;
            user-select: none;
            min-width: 200px;
        }
        #hud div {
            margin-bottom: 5px;
        }
        #hud div:last-child {
            margin-bottom: 0;
        }
        #controls-help {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #aaa;
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            font-size: 12px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div id="status-text">Simulation: PAUSED</div>
        <div id="time-text">Time: 0.00s</div>
        <div id="speed-text">Speed: 1.0x</div>
        <div id="gravity-text">Gravity: 9.81 m/s²</div>
        <div id="count-text">Pendulums: 15</div>
    </div>
    <div id="controls-help">
        SPACE: Play/Pause | R: Reset | G: Toggle Gravity | +/-: Speed
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            running: false,
            simTime: 0,
            timeMultiplier: 1.0,
            gravity: 9.81,
            pendulumCount: 15,
            pendulumAngles: new Array(15).fill(0.5),
            pendulumLengths: new Array(15).fill(0),
            pendulumBobPositions: Array.from({ length: 15 }, () => ({ x: 0, y: 0, z: 0 })),
            michelleLoaded: false,
            michellePosition: { x: -8, y: 0.5, z: 0 },
            resetCount: 0,
            gravityMode: 'earth'
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 6, 0);
        controls.update();

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Environment ---
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x334455 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const platformGeo = new THREE.BoxGeometry(4, 0.5, 4);
        const platformMat = new THREE.MeshStandardMaterial({ color: 0x887766 });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.set(-8, 0.25, 0);
        platform.castShadow = true;
        platform.receiveShadow = true;
        scene.add(platform);

        // --- Character ---
        let mixer;
        const gltfLoader = new GLTFLoader();
        gltfLoader.load(
            'https://unpkg.com/three@0.160.0/examples/models/gltf/Michelle.glb',
            (gltf) => {
                const model = gltf.scene;
                model.position.set(-8, 0.5, 0);
                model.scale.set(2.5, 2.5, 2.5);
                
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                scene.add(model);
                state.michelleLoaded = true;

                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(model);
                    const action = mixer.clipAction(gltf.animations[0]);
                    action.play();
                }
            }
        );

        // --- Pendulum System ---
        const supportGeo = new THREE.BoxGeometry(15, 0.2, 0.2);
        const supportMat = new THREE.MeshStandardMaterial({ color: 0x999999 });
        const support = new THREE.Mesh(supportGeo, supportMat);
        support.position.set(0, 12, 0);
        support.castShadow = true;
        support.receiveShadow = true;
        scene.add(support);

        const pendulums = [];
        const stringGeoBase = new THREE.CylinderGeometry(0.02, 0.02, 1);
        stringGeoBase.translate(0, -0.5, 0); // Pivot at top
        const bobGeo = new THREE.SphereGeometry(0.3, 32, 32);

        for (let i = 0; i < 15; i++) {
            const length = 4.0 + i * 0.3;
            state.pendulumLengths[i] = length;

            const group = new THREE.Group();
            group.position.set(-7 + i, 12, 0);

            const stringMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
            const string = new THREE.Mesh(stringGeoBase, stringMat);
            string.scale.y = length;
            string.castShadow = true;
            string.receiveShadow = true;

            const hue = (i / 14) * 0.75; // Red to Violet
            const bobMat = new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(hue, 1.0, 0.5) });
            const bob = new THREE.Mesh(bobGeo, bobMat);
            bob.position.y = -length;
            bob.castShadow = true;
            bob.receiveShadow = true;

            group.add(string);
            group.add(bob);
            scene.add(group);

            pendulums.push({
                group: group,
                bob: bob,
                length: length,
                initialAngle: 0.5
            });

            // Initial rotation (swinging along Z axis for proper wave visual)
            group.rotation.x = 0.5;
        }

        // --- Interaction & Logic ---
        window.addEventListener('keydown', (e) => {
            switch (e.key) {
                case ' ':
                    state.running = !state.running;
                    break;
                case 'r':
                case 'R':
                    state.simTime = 0;
                    state.running = false;
                    state.resetCount++;
                    updatePendulums(0);
                    break;
                case 'g':
                case 'G':
                    if (state.gravityMode === 'earth') {
                        state.gravity = 1.62;
                        state.gravityMode = 'moon';
                    } else {
                        state.gravity = 9.81;
                        state.gravityMode = 'earth';
                    }
                    break;
                case '+':
                case '=':
                    state.timeMultiplier = Math.min(5.0, state.timeMultiplier + 0.5);
                    break;
                case '-':
                case '_':
                    state.timeMultiplier = Math.max(0.5, state.timeMultiplier - 0.5);
                    break;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Update Loop ---
        const clock = new THREE.Clock();
        const statusText = document.getElementById('status-text');
        const timeText = document.getElementById('time-text');
        const speedText = document.getElementById('speed-text');
        const gravityText = document.getElementById('gravity-text');

        const bobWorldPos = new THREE.Vector3();

        function updatePendulums(time) {
            for (let i = 0; i < 15; i++) {
                const p = pendulums[i];
                const T = 2 * Math.PI * Math.sqrt(p.length / state.gravity);
                const theta = p.initialAngle * Math.cos((2 * Math.PI * time) / T);
                
                // Swing along Z axis for visual wave effect
                p.group.rotation.x = theta;
                
                state.pendulumAngles[i] = theta;

                // Calculate world position
                p.bob.getWorldPosition(bobWorldPos);
                state.pendulumBobPositions[i].x = bobWorldPos.x;
                state.pendulumBobPositions[i].y = bobWorldPos.y;
                state.pendulumBobPositions[i].z = bobWorldPos.z;
            }
        }

        function updateHUD() {
            statusText.innerText = `Simulation: ${state.running ? 'RUNNING' : 'PAUSED'}`;
            timeText.innerText = `Time: ${state.simTime.toFixed(2)}s`;
            speedText.innerText = `Speed: ${state.timeMultiplier.toFixed(1)}x`;
            gravityText.innerText = `Gravity: ${state.gravity.toFixed(2)} m/s²`;
        }

        // Initial update
        updatePendulums(0);

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (mixer) {
                mixer.update(delta);
            }

            if (state.running) {
                state.simTime += delta * state.timeMultiplier;
                updatePendulums(state.simTime);
            }

            updateHUD();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
