<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Pendulum Wave with Michelle</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f1720;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.55);
      color: #ffffff;
      padding: 12px 14px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
      line-height: 1.5;
      min-width: 220px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
      user-select: none;
    }

    #hud .title {
      font-weight: bold;
      margin-bottom: 6px;
      color: #cfe8ff;
    }

    #help {
      margin-top: 8px;
      font-size: 12px;
      color: #d0d0d0;
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="title">Pendulum Wave</div>
    <div id="status-text">Simulation: PAUSED</div>
    <div id="time-text">Time: 0.00s</div>
    <div id="speed-text">Speed: 1.0x</div>
    <div id="gravity-text">Gravity: 9.81 m/s²</div>
    <div id="count-text">Pendulums: 15</div>
    <div id="help">
      SPACE: Play/Pause<br>
      R: Reset<br>
      G: Earth/Moon gravity<br>
      +/-: Speed
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f1720);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      200
    );
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 6, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(10, 15, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -30;
    dirLight.shadow.camera.right = 30;
    dirLight.shadow.camera.top = 30;
    dirLight.shadow.camera.bottom = -30;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 80;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(50, 50),
      new THREE.MeshStandardMaterial({ color: 0x334455 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    const stage = new THREE.Mesh(
      new THREE.BoxGeometry(4, 0.5, 4),
      new THREE.MeshStandardMaterial({ color: 0x887766 })
    );
    stage.position.set(-8, 0.25, 0);
    stage.castShadow = true;
    stage.receiveShadow = true;
    scene.add(stage);

    const supportBar = new THREE.Mesh(
      new THREE.BoxGeometry(14.4, 0.2, 0.2),
      new THREE.MeshStandardMaterial({ color: 0x999999, metalness: 0.5, roughness: 0.4 })
    );
    supportBar.position.set(0, 12, 0);
    supportBar.castShadow = true;
    supportBar.receiveShadow = true;
    scene.add(supportBar);

    const statusText = document.getElementById('status-text');
    const timeText = document.getElementById('time-text');
    const speedText = document.getElementById('speed-text');
    const gravityText = document.getElementById('gravity-text');
    const countText = document.getElementById('count-text');

    const clock = new THREE.Clock();

    const state = {
      running: false,
      simTime: 0,
      timeMultiplier: 1.0,
      gravity: 9.81,
      pendulumCount: 15,
      pendulumAngles: new Array(15).fill(0.5),
      pendulumLengths: [],
      pendulumBobPositions: [],
      michelleLoaded: false,
      michellePosition: { x: -8, y: 0.5, z: 0 },
      resetCount: 0,
      gravityMode: 'earth'
    };

    window.__3D_STATE__ = state;

    const pendulums = [];
    const pendulumGroup = new THREE.Group();
    scene.add(pendulumGroup);

    const anchorY = 12;
    const zPendulum = 0;
    const stringRadius = 0.02;
    const bobRadius = 0.3;
    const initialAngle = 0.5;

    const stringGeometry = new THREE.CylinderGeometry(stringRadius, stringRadius, 1, 12);
    const bobGeometry = new THREE.SphereGeometry(bobRadius, 24, 24);

    function getPeriod(length, gravity) {
      return 2 * Math.PI * Math.sqrt(length / gravity);
    }

    function createPendulums() {
      const startX = -7;
      for (let i = 0; i < 15; i++) {
        const anchorX = startX + i;
        const length = 4.0 + i * 0.3;

        const hue = (1 - i / 14) * 0.75;
        const bobColor = new THREE.Color().setHSL(hue, 0.85, 0.55);

        const stringMaterial = new THREE.MeshStandardMaterial({ color: 0xcccccc });
        const bobMaterial = new THREE.MeshStandardMaterial({
          color: bobColor,
          roughness: 0.4,
          metalness: 0.1
        });

        const stringMesh = new THREE.Mesh(stringGeometry.clone(), stringMaterial);
        stringMesh.castShadow = true;
        stringMesh.receiveShadow = true;

        const bobMesh = new THREE.Mesh(bobGeometry, bobMaterial);
        bobMesh.castShadow = true;
        bobMesh.receiveShadow = true;

        pendulumGroup.add(stringMesh);
        pendulumGroup.add(bobMesh);

        pendulums.push({
          index: i,
          anchor: new THREE.Vector3(anchorX, anchorY, zPendulum),
          length,
          stringMesh,
          bobMesh,
          bobWorldPosition: new THREE.Vector3(),
          angle: initialAngle
        });

        state.pendulumLengths.push(length);
        state.pendulumBobPositions.push({ x: anchorX, y: anchorY - length, z: zPendulum });
      }
    }

    createPendulums();

    function updatePendulums(t) {
      for (let i = 0; i < pendulums.length; i++) {
        const p = pendulums[i];
        const T = getPeriod(p.length, state.gravity);
        const theta = initialAngle * Math.cos((2 * Math.PI * t) / T);

        p.angle = theta;
        state.pendulumAngles[i] = theta;

        const xOffset = p.length * Math.sin(theta);
        const bobX = p.anchor.x + xOffset;
        const bobY = anchorY - p.length * Math.cos(theta);
        const bobZ = p.anchor.z;

        p.bobMesh.position.set(bobX, bobY, bobZ);

        const dx = bobX - p.anchor.x;
        const dy = bobY - p.anchor.y;
        const lengthActual = Math.sqrt(dx * dx + dy * dy);
        const midX = (p.anchor.x + bobX) * 0.5;
        const midY = (p.anchor.y + bobY) * 0.5;

        p.stringMesh.position.set(midX, midY, bobZ);
        p.stringMesh.scale.set(1, lengthActual, 1);

        const dir = new THREE.Vector3(dx, dy, 0).normalize();
        const up = new THREE.Vector3(0, 1, 0);
        const quat = new THREE.Quaternion().setFromUnitVectors(up, dir);
        p.stringMesh.quaternion.copy(quat);

        p.bobWorldPosition.set(bobX, bobY, bobZ);
        state.pendulumBobPositions[i] = { x: bobX, y: bobY, z: bobZ };
      }
    }

    updatePendulums(0);

    let michelle = null;
    let mixer = null;

    const loader = new GLTFLoader();
    loader.load(
      'Michelle.glb',
      (gltf) => {
        michelle = gltf.scene;

        const box = new THREE.Box3().setFromObject(michelle);
        const size = new THREE.Vector3();
        box.getSize(size);
        const currentHeight = Math.max(size.y, 0.0001);
        const targetHeight = 2.5;
        const scale = targetHeight / currentHeight;
        michelle.scale.setScalar(scale);

        const boxAfterScale = new THREE.Box3().setFromObject(michelle);
        const min = boxAfterScale.min.clone();
        const max = boxAfterScale.max.clone();
        const centerX = (min.x + max.x) * 0.5;
        const centerZ = (min.z + max.z) * 0.5;

        michelle.position.set(
          -8 - centerX,
          0.5 - min.y,
          0 - centerZ
        );

        michelle.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        scene.add(michelle);

        state.michelleLoaded = true;
        state.michellePosition = {
          x: michelle.position.x,
          y: michelle.position.y,
          z: michelle.position.z
        };

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(michelle);
          const clip = gltf.animations[0];
          const action = mixer.clipAction(clip);
          action.play();
        }
      },
      undefined,
      (err) => {
        console.warn('Failed to load Michelle.glb:', err);
      }
    );

    function resetSimulation() {
      state.running = false;
      state.simTime = 0;
      state.resetCount += 1;
      updatePendulums(0);
      updateHUD();
    }

    function toggleGravity() {
      if (state.gravityMode === 'earth') {
        state.gravity = 1.62;
        state.gravityMode = 'moon';
      } else {
        state.gravity = 9.81;
        state.gravityMode = 'earth';
      }
      updateHUD();
    }

    function updateHUD() {
      statusText.textContent = `Simulation: ${state.running ? 'RUNNING' : 'PAUSED'}`;
      timeText.textContent = `Time: ${state.simTime.toFixed(2)}s`;
      speedText.textContent = `Speed: ${state.timeMultiplier.toFixed(1)}x`;
      gravityText.textContent = `Gravity: ${state.gravity.toFixed(2)} m/s²`;
      countText.textContent = `Pendulums: ${state.pendulumCount}`;
    }

    updateHUD();

    window.addEventListener('keydown', (e) => {
      const key = e.key;

      if (key === ' ') {
        e.preventDefault();
        state.running = !state.running;
      } else if (key === 'r' || key === 'R') {
        resetSimulation();
      } else if (key === 'g' || key === 'G') {
        toggleGravity();
      } else if (key === '+' || key === '=') {
        state.timeMultiplier = Math.min(5.0, state.timeMultiplier + 0.5);
      } else if (key === '-') {
        state.timeMultiplier = Math.max(0.5, state.timeMultiplier - 0.5);
      }

      updateHUD();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (state.running) {
        state.simTime += delta * state.timeMultiplier;
      }

      updatePendulums(state.simTime);

      if (mixer) {
        mixer.update(delta);
      }

      if (michelle) {
        state.michellePosition = {
          x: michelle.position.x,
          y: michelle.position.y,
          z: michelle.position.z
        };
      }

      controls.update();
      updateHUD();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
