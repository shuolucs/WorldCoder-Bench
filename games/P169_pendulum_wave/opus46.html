<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Pendulum Wave Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.7);
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    padding: 15px 20px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    line-height: 1.8;
    pointer-events: none;
    z-index: 100;
    backdrop-filter: blur(5px);
  }
  #hud div { white-space: nowrap; }
  #controls-help {
    position: absolute;
    bottom: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.7);
    color: #aaaaaa;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    line-height: 1.6;
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="hud">
  <div id="status-text">Simulation: PAUSED</div>
  <div id="time-text">Time: 0.00s</div>
  <div id="speed-text">Speed: 1.0x</div>
  <div id="gravity-text">Gravity: 9.81 m/s²</div>
  <div id="count-text">Pendulums: 15</div>
</div>

<div id="controls-help">
  SPACE: Play/Pause | R: Reset | G: Toggle Gravity<br>
  +/-: Speed Up/Down | Mouse: Orbit Camera
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const NUM_PENDULUMS = 15;
const INITIAL_ANGLE = 0.5;
const INITIAL_GRAVITY = 9.81;
const MOON_GRAVITY = 1.62;

let running = false;
let simTime = 0;
let timeMultiplier = 1.0;
let gravity = INITIAL_GRAVITY;
let gravityMode = 'earth';
let resetCount = 0;
let michelleLoaded = false;
let michellePosition = { x: -8, y: 0.5, z: 0 };

const pendulumLengths = [];
const pendulumAngles = new Array(NUM_PENDULUMS).fill(INITIAL_ANGLE);
const pendulumBobPositions = [];

for (let i = 0; i < NUM_PENDULUMS; i++) {
  pendulumLengths.push(4.0 + i * 0.3);
  pendulumBobPositions.push({ x: 0, y: 0, z: 0 });
}

window.__3D_STATE__ = {
  running,
  simTime,
  timeMultiplier,
  gravity,
  pendulumCount: NUM_PENDULUMS,
  pendulumAngles: [...pendulumAngles],
  pendulumLengths: [...pendulumLengths],
  pendulumBobPositions: pendulumBobPositions.map(p => ({ ...p })),
  michelleLoaded,
  michellePosition: { ...michellePosition },
  resetCount,
  gravityMode
};

function updateGlobalState() {
  window.__3D_STATE__.running = running;
  window.__3D_STATE__.simTime = simTime;
  window.__3D_STATE__.timeMultiplier = timeMultiplier;
  window.__3D_STATE__.gravity = gravity;
  window.__3D_STATE__.pendulumCount = NUM_PENDULUMS;
  window.__3D_STATE__.pendulumAngles = [...pendulumAngles];
  window.__3D_STATE__.pendulumLengths = [...pendulumLengths];
  window.__3D_STATE__.pendulumBobPositions = pendulumBobPositions.map(p => ({ ...p }));
  window.__3D_STATE__.michelleLoaded = michelleLoaded;
  window.__3D_STATE__.michellePosition = { ...michellePosition };
  window.__3D_STATE__.resetCount = resetCount;
  window.__3D_STATE__.gravityMode = gravityMode;
}

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 30, 60);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(10, 15, 10);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
directionalLight.shadow.camera.near = 0.5;
directionalLight.shadow.camera.far = 50;
directionalLight.shadow.camera.left = -20;
directionalLight.shadow.camera.right = 20;
directionalLight.shadow.camera.top = 20;
directionalLight.shadow.camera.bottom = -5;
directionalLight.shadow.bias = -0.001;
scene.add(directionalLight);

// Additional fill light
const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
fillLight.position.set(-5, 5, -5);
scene.add(fillLight);

// --- Ground Plane ---
const groundGeometry = new THREE.PlaneGeometry(50, 50);
const groundMaterial = new THREE.MeshStandardMaterial({
  color: 0x334455,
  roughness: 0.8,
  metalness: 0.2
});
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// --- Platform for Michelle ---
const platformGeometry = new THREE.BoxGeometry(4, 0.5, 4);
const platformMaterial = new THREE.MeshStandardMaterial({
  color: 0x887766,
  roughness: 0.6,
  metalness: 0.1
});
const platform = new THREE.Mesh(platformGeometry, platformMaterial);
platform.position.set(-8, 0.25, 0);
platform.castShadow = true;
platform.receiveShadow = true;
scene.add(platform);

// --- Load Michelle ---
let mixer = null;
let michelleModel = null;

const loader = new GLTFLoader();
loader.load(
  'Michelle.glb',
  (gltf) => {
    michelleModel = gltf.scene;
    
    // Calculate bounding box to scale properly
    const box = new THREE.Box3().setFromObject(michelleModel);
    const height = box.max.y - box.min.y;
    const scale = 2.5 / height;
    michelleModel.scale.set(scale, scale, scale);
    
    michelleModel.position.set(-8, 0.5, 0);
    michelleModel.rotation.y = Math.PI / 3; // Face toward pendulums
    
    michelleModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    
    scene.add(michelleModel);
    
    // Animation
    if (gltf.animations && gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(michelleModel);
      const action = mixer.clipAction(gltf.animations[0]);
      action.play();
    }
    
    michelleLoaded = true;
    michellePosition = { x: -8, y: 0.5, z: 0 };
    console.log('Michelle loaded successfully');
  },
  (progress) => {
    console.log('Loading Michelle:', (progress.loaded / progress.total * 100).toFixed(1) + '%');
  },
  (error) => {
    console.warn('Could not load Michelle.glb:', error);
    // Create a placeholder figure
    const bodyGroup = new THREE.Group();
    
    // Body
    const bodyGeo = new THREE.CylinderGeometry(0.3, 0.25, 1.2, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4488aa });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1.1;
    body.castShadow = true;
    bodyGroup.add(body);
    
    // Head
    const headGeo = new THREE.SphereGeometry(0.25, 16, 16);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xffcc99 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 2.0;
    head.castShadow = true;
    bodyGroup.add(head);
    
    // Legs
    for (let side = -1; side <= 1; side += 2) {
      const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.8, 8);
      const legMat = new THREE.MeshStandardMaterial({ color: 0x334466 });
      const leg = new THREE.Mesh(legGeo, legMat);
      leg.position.set(side * 0.15, 0.4, 0);
      leg.castShadow = true;
      bodyGroup.add(leg);
    }
    
    bodyGroup.position.set(-8, 0.5, 0);
    bodyGroup.rotation.y = Math.PI / 3;
    scene.add(bodyGroup);
    
    michelleLoaded = true;
    michellePosition = { x: -8, y: 0.5, z: 0 };
  }
);

// --- Support Bar ---
const barGeometry = new THREE.BoxGeometry(15, 0.2, 0.2);
const barMaterial = new THREE.MeshStandardMaterial({
  color: 0x999999,
  roughness: 0.3,
  metalness: 0.7
});
const supportBar = new THREE.Mesh(barGeometry, barMaterial);
supportBar.position.set(0, 12, 0);
supportBar.castShadow = true;
scene.add(supportBar);

// Support bar vertical posts
for (let side = -1; side <= 1; side += 2) {
  const postGeo = new THREE.BoxGeometry(0.15, 12, 0.15);
  const postMat = new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.4, metalness: 0.6 });
  const post = new THREE.Mesh(postGeo, postMat);
  post.position.set(side * 7.5, 6, 0);
  post.castShadow = true;
  scene.add(post);
}

// --- Pendulums ---
const pendulums = [];
const stringGeometries = [];

for (let i = 0; i < NUM_PENDULUMS; i++) {
  const xPos = -7 + i * 1;
  const length = pendulumLengths[i];
  
  // HSL color for rainbow
  const hue = i / (NUM_PENDULUMS - 1) * 0.83; // red to violet
  const color = new THREE.Color().setHSL(hue, 0.9, 0.55);
  
  // Bob
  const bobGeometry = new THREE.SphereGeometry(0.3, 24, 24);
  const bobMaterial = new THREE.MeshStandardMaterial({
    color: color,
    roughness: 0.2,
    metalness: 0.8,
    emissive: color.clone().multiplyScalar(0.1)
  });
  const bob = new THREE.Mesh(bobGeometry, bobMaterial);
  bob.castShadow = true;
  scene.add(bob);
  
  // String
  const stringGeometry = new THREE.CylinderGeometry(0.02, 0.02, length, 4);
  const stringMaterial = new THREE.MeshStandardMaterial({
    color: 0xcccccc,
    roughness: 0.5,
    metalness: 0.3
  });
  const string = new THREE.Mesh(stringGeometry, stringMaterial);
  scene.add(string);
  
  pendulums.push({
    bob,
    string,
    stringGeometry,
    anchorX: xPos,
    length: length,
    index: i
  });
}

// --- Pendulum Update ---
function updatePendulums() {
  for (let i = 0; i < NUM_PENDULUMS; i++) {
    const L = pendulumLengths[i];
    const T = 2 * Math.PI * Math.sqrt(L / gravity);
    const theta = INITIAL_ANGLE * Math.cos(2 * Math.PI * simTime / T);
    pendulumAngles[i] = theta;
    
    const anchorX = pendulums[i].anchorX;
    const xOffset = L * Math.sin(theta);
    const yBob = 12 - L * Math.cos(theta);
    
    // Update bob position
    pendulums[i].bob.position.set(anchorX + xOffset, yBob, 0);
    
    // Update bob positions array
    pendulumBobPositions[i].x = anchorX + xOffset;
    pendulumBobPositions[i].y = yBob;
    pendulumBobPositions[i].z = 0;
    
    // Update string - position it between anchor and bob
    const anchorY = 12;
    const midX = anchorX + xOffset / 2;
    const midY = (anchorY + yBob) / 2;
    
    // Calculate string length (actual distance)
    const dx = xOffset;
    const dy = anchorY - yBob;
    const actualLength = Math.sqrt(dx * dx + dy * dy);
    
    // Replace string geometry if needed
    const oldString = pendulums[i].string;
    oldString.geometry.dispose();
    oldString.geometry = new THREE.CylinderGeometry(0.02, 0.02, actualLength, 4);
    
    oldString.position.set(midX, midY, 0);
    
    // Rotate string to point from anchor to bob
    const angle = Math.atan2(xOffset, dy);
    oldString.rotation.z = -angle;
  }
}

// --- Controls ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 6, 0);
controls.minDistance = 5;
controls.maxDistance = 40;
controls.update();

// --- HUD Update ---
function updateHUD() {
  document.getElementById('status-text').textContent = `Simulation: ${running ? 'RUNNING' : 'PAUSED'}`;
  document.getElementById('time-text').textContent = `Time: ${simTime.toFixed(2)}s`;
  document.getElementById('speed-text').textContent = `Speed: ${timeMultiplier.toFixed(1)}x`;
  document.getElementById('gravity-text').textContent = `Gravity: ${gravity.toFixed(2)} m/s²`;
  document.getElementById('count-text').textContent = `Pendulums: ${NUM_PENDULUMS}`;
}

// --- Keyboard Input ---
document.addEventListener('keydown', (event) => {
  switch (event.code) {
    case 'Space':
      event.preventDefault();
      running = !running;
      break;
    case 'KeyR':
      simTime = 0;
      running = false;
      resetCount++;
      for (let i = 0; i < NUM_PENDULUMS; i++) {
        pendulumAngles[i] = INITIAL_ANGLE;
      }
      break;
    case 'KeyG':
      if (gravityMode === 'earth') {
        gravity = MOON_GRAVITY;
        gravityMode = 'moon';
      } else {
        gravity = INITIAL_GRAVITY;
        gravityMode = 'earth';
      }
      break;
    case 'Equal':
    case 'NumpadAdd':
      timeMultiplier = Math.min(5.0, timeMultiplier + 0.5);
      break;
    case 'Minus':
    case 'NumpadSubtract':
      timeMultiplier = Math.max(0.5, timeMultiplier - 0.5);
      break;
  }
  updateHUD();
});

// --- Window Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation Loop ---
const clock = new THREE.Clock();
let lastTime = 0;

// Initialize pendulums at starting position
updatePendulums();
updateHUD();

function animate() {
  requestAnimationFrame(animate);
  
  const delta = clock.getDelta();
  
  // Update simulation time
  if (running) {
    simTime += delta * timeMultiplier;
  }
  
  // Update pendulums
  updatePendulums();
  
  // Update Michelle animation
  if (mixer) {
    mixer.update(delta);
  }
  
  // Update controls
  controls.update();
  
  // Update HUD
  updateHUD();
  
  // Update global state
  updateGlobalState();
  
  // Render
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
