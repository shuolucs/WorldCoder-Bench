<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cell Division (Mitosis)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .panel {
            background: rgba(26, 26, 46, 0.85);
            border: 1px solid #404060;
            border-radius: 12px;
            padding: 20px;
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
        #top-center {
            margin-top: 30px;
            align-self: center;
            text-align: center;
            pointer-events: auto;
        }
        #phaseLabel {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        #progress-wrapper {
            width: 400px;
            height: 12px;
            background: #2a2a3e;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #404060;
        }
        #progressBar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #44aa88, #55ccaa);
            transition: width 0.5s ease-out;
        }
        #infoPanel {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
        }
        #infoPanel h3 {
            margin-top: 0;
            color: #55ccaa;
            font-size: 20px;
            border-bottom: 1px solid #404060;
            padding-bottom: 10px;
        }
        #phaseDesc {
            font-size: 16px;
            line-height: 1.5;
            color: #cccccc;
        }
        #bottom-center {
            margin-bottom: 40px;
            align-self: center;
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: #44aa88;
            color: white;
            border: none;
            border-radius: 8px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(68, 170, 136, 0.3);
        }
        button:hover:not(:disabled) {
            background: #55ccaa;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(68, 170, 136, 0.5);
        }
        button:active:not(:disabled) {
            transform: translateY(0);
        }
        button:disabled {
            background: #404060;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }
        #resetBtn {
            background: #aa4444;
            box-shadow: 0 4px 15px rgba(170, 68, 68, 0.3);
        }
        #resetBtn:hover:not(:disabled) {
            background: #cc5555;
            box-shadow: 0 6px 20px rgba(170, 68, 68, 0.5);
        }
        #playAllBtn {
            background: #4466aa;
            box-shadow: 0 4px 15px rgba(68, 102, 170, 0.3);
        }
        #playAllBtn:hover:not(:disabled) {
            background: #5577cc;
            box-shadow: 0 6px 20px rgba(68, 102, 170, 0.5);
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="top-center">
            <div id="phaseLabel">Interphase</div>
            <div id="progress-wrapper">
                <div id="progressBar"></div>
            </div>
        </div>
        
        <div id="infoPanel" class="panel">
            <h3>Phase Information</h3>
            <p id="phaseDesc">The cell is at rest, growing and copying its DNA in preparation for division. The nucleus is intact and chromosomes are not yet condensed.</p>
        </div>
        
        <div id="bottom-center">
            <button id="resetBtn">Reset</button>
            <button id="nextPhaseBtn">Next Phase</button>
            <button id="playAllBtn">Play All</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            currentPhase: 0,
            phaseName: 'Interphase',
            chromosomeCount: 8,
            nucleusCount: 1,
            cellCount: 1,
            foxLoaded: false,
            foxAnimationPlaying: false,
            isAnimating: false,
            autoPlayActive: false,
            progressPercent: 0,
            centrosomeCount: 1,
            spindleFibersVisible: false,
            daughterCellsFormed: false
        };

        const phaseData = [
            { name: "Interphase", desc: "The cell is at rest, growing and copying its DNA in preparation for division. The nucleus is intact and chromosomes are not yet condensed." },
            { name: "Prophase", desc: "Chromosomes condense and become visible. The centrosome duplicates and moves to opposite poles. The nuclear envelope begins to break down." },
            { name: "Metaphase", desc: "The nuclear membrane completely disappears. Chromosomes align at the cell equator (metaphase plate). Spindle fibers attach to the chromosomes." },
            { name: "Anaphase", desc: "Sister chromatids are pulled apart by the spindle fibers and move toward opposite poles of the elongating cell." },
            { name: "Telophase", desc: "Chromosomes reach the poles. New nuclear envelopes begin to form around each set. The cell starts to pinch in the middle (cleavage furrow)." },
            { name: "Cytokinesis", desc: "The cytoplasm completely divides, resulting in two separate, identical daughter cells, each with its own nucleus." }
        ];

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Ground Plane
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3e, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        scene.add(ground);

        // --- Objects Construction ---
        const mainGroup = new THREE.Group();
        scene.add(mainGroup);

        // Main Cell
        const cellGeo = new THREE.SphereGeometry(2, 32, 32);
        const cellMat = new THREE.MeshPhysicalMaterial({
            color: 0x44aa88,
            transparent: true,
            opacity: 0.4,
            roughness: 0.2,
            transmission: 0.5,
            thickness: 0.5
        });
        const mainCell = new THREE.Mesh(cellGeo, cellMat);
        mainGroup.add(mainCell);

        // Cytoplasm Particles
        const particleGeo = new THREE.BufferGeometry();
        const particleCount = 150;
        const posArray = new Float32Array(particleCount * 3);
        for(let i=0; i<particleCount; i++) {
            const r = 1.9 * Math.cbrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            const phi = Math.acos(2 * Math.random() - 1);
            posArray[i*3] = r * Math.sin(phi) * Math.cos(theta);
            posArray[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            posArray[i*3+2] = r * Math.cos(phi);
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.06, transparent: true, opacity: 0.3 });
        const particles = new THREE.Points(particleGeo, particleMat);
        mainGroup.add(particles);

        // Nucleus
        const nucleusGeo = new THREE.SphereGeometry(0.8, 32, 32);
        const nucleusMat = new THREE.MeshLambertMaterial({ color: 0x8844aa, transparent: true, opacity: 0.7 });
        const nucleus = new THREE.Mesh(nucleusGeo, nucleusMat);
        mainGroup.add(nucleus);

        // New Nuclei for Telophase
        const newNucGeo = new THREE.SphereGeometry(0.6, 32, 32);
        const newNucMat = new THREE.MeshLambertMaterial({ color: 0x8844aa, transparent: true, opacity: 0 });
        const newNucleusTop = new THREE.Mesh(newNucGeo, newNucMat);
        newNucleusTop.position.y = 1.2;
        const newNucleusBot = new THREE.Mesh(newNucGeo, newNucMat);
        newNucleusBot.position.y = -1.2;
        mainGroup.add(newNucleusTop);
        mainGroup.add(newNucleusBot);

        // Chromosomes (8 total, 4 pairs)
        const chromosomes = [];
        const chromoGeo = new THREE.BoxGeometry(0.1, 0.4, 0.1);
        const chromoMat = new THREE.MeshLambertMaterial({ color: 0xff4444 });
        
        // Initial random positions inside nucleus
        const initialChromoPos = [];
        for (let i = 0; i < 8; i++) {
            const mesh = new THREE.Mesh(chromoGeo, chromoMat);
            const r = 0.4 * Math.cbrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            const phi = Math.acos(2 * Math.random() - 1);
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);
            mesh.position.set(x, y, z);
            mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
            initialChromoPos.push({pos: mesh.position.clone(), rot: mesh.rotation.clone()});
            chromosomes.push(mesh);
            mainGroup.add(mesh);
        }

        // Centrosomes
        const centroGeo = new THREE.SphereGeometry(0.15, 16, 16);
        const centroMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        const centrosomeTop = new THREE.Mesh(centroGeo, centroMat);
        centrosomeTop.position.set(0, 0.8, 0);
        mainGroup.add(centrosomeTop);

        const centrosomeBot = new THREE.Mesh(centroGeo, centroMat);
        centrosomeBot.position.set(0, 0.8, 0);
        centrosomeBot.visible = false;
        mainGroup.add(centrosomeBot);

        // Spindle Fibers
        const spindleGeo = new THREE.BufferGeometry();
        const spindlePos = new Float32Array(16 * 3); // 8 lines, 2 points each
        spindleGeo.setAttribute('position', new THREE.BufferAttribute(spindlePos, 3));
        const spindleMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 });
        const spindleFibers = new THREE.LineSegments(spindleGeo, spindleMat);
        spindleFibers.visible = false;
        mainGroup.add(spindleFibers);

        // Daughter Cells Group (Phase 5)
        const daughterGroup = new THREE.Group();
        daughterGroup.visible = false;
        scene.add(daughterGroup);

        function createDaughterCell(yPos) {
            const group = new THREE.Group();
            group.position.y = yPos;
            
            const cell = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), cellMat.clone());
            group.add(cell);
            
            const nuc = new THREE.Mesh(new THREE.SphereGeometry(0.6, 32, 32), nucleusMat.clone());
            nuc.material.opacity = 0.7;
            group.add(nuc);
            
            for(let i=0; i<4; i++) {
                const c = new THREE.Mesh(chromoGeo, chromoMat);
                c.scale.y = 0.6;
                c.position.set((Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5);
                c.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                group.add(c);
            }
            return group;
        }
        daughterGroup.add(createDaughterCell(2.5));
        daughterGroup.add(createDaughterCell(-2.5));

        // --- Fox Mascot ---
        let foxMixer, foxIdle, foxWalk;
        const clock = new THREE.Clock();
        const loader = new GLTFLoader();
        
        loader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@dev/examples/models/gltf/Fox.glb', (gltf) => {
            const fox = gltf.scene;
            fox.position.set(-6, -0.5, 0);
            fox.scale.set(0.04, 0.04, 0.04);
            fox.lookAt(0, 0, 0);
            scene.add(fox);

            foxMixer = new THREE.AnimationMixer(fox);
            foxIdle = foxMixer.clipAction(gltf.animations[0]);
            foxWalk = foxMixer.clipAction(gltf.animations[1] || gltf.animations[0]);

            foxIdle.play();
            window.__3D_STATE__.foxLoaded = true;
            window.__3D_STATE__.foxAnimationPlaying = true;
        });

        // --- Tweening Engine ---
        const activeTweens = [];
        function tween(duration, onUpdate, onComplete) {
            activeTweens.push({
                duration,
                startTime: performance.now(),
                onUpdate,
                onComplete
            });
        }

        function updateTweens(time) {
            for (let i = activeTweens.length - 1; i >= 0; i--) {
                const t = activeTweens[i];
                let elapsed = time - t.startTime;
                let progress = Math.min(elapsed / t.duration, 1);
                // Ease in-out cubic
                let ease = progress < 0.5 ? 4 * progress * progress * progress : 1 - Math.pow(-2 * progress + 2, 3) / 2;
                
                t.onUpdate(ease, progress);
                
                if (progress >= 1) {
                    if (t.onComplete) t.onComplete();
                    activeTweens.splice(i, 1);
                }
            }
        }

        // --- Animation Logic ---
        function updateSpindleGeometry() {
            if (!spindleFibers.visible) return;
            const pos = spindleFibers.geometry.attributes.position.array;
            let idx = 0;
            // Top to first 4
            for(let i=0; i<4; i++) {
                pos[idx++] = centrosomeTop.position.x; pos[idx++] = centrosomeTop.position.y; pos[idx++] = centrosomeTop.position.z;
                pos[idx++] = chromosomes[i].position.x; pos[idx++] = chromosomes[i].position.y; pos[idx++] = chromosomes[i].position.z;
            }
            // Bot to last 4
            for(let i=4; i<8; i++) {
                pos[idx++] = centrosomeBot.position.x; pos[idx++] = centrosomeBot.position.y; pos[idx++] = centrosomeBot.position.z;
                pos[idx++] = chromosomes[i].position.x; pos[idx++] = chromosomes[i].position.y; pos[idx++] = chromosomes[i].position.z;
            }
            spindleFibers.geometry.attributes.position.needsUpdate = true;
        }

        let autoPlayTimeout = null;

        function updateUI() {
            const state = window.__3D_STATE__;
            document.getElementById('phaseLabel').innerText = state.phaseName;
            document.getElementById('phaseDesc').innerText = phaseData[state.currentPhase].desc;
            document.getElementById('progressBar').style.width = state.progressPercent + '%';
            
            const isAnim = state.isAnimating;
            document.getElementById('nextPhaseBtn').disabled = isAnim || state.currentPhase === 5 || state.autoPlayActive;
            document.getElementById('resetBtn').disabled = isAnim;
            document.getElementById('playAllBtn').disabled = isAnim || state.autoPlayActive || state.currentPhase === 5;
        }

        function syncStateObject() {
            const p = window.__3D_STATE__.currentPhase;
            window.__3D_STATE__.phaseName = phaseData[p].name;
            window.__3D_STATE__.progressPercent = (p / 5) * 100;
            window.__3D_STATE__.chromosomeCount = 8;
            window.__3D_STATE__.nucleusCount = p === 5 ? 2 : (p >= 4 ? 2 : (p >= 2 ? 0 : 1));
            window.__3D_STATE__.cellCount = p === 5 ? 2 : 1;
            window.__3D_STATE__.centrosomeCount = p >= 1 && p < 5 ? 2 : 1;
            window.__3D_STATE__.spindleFibersVisible = p >= 2 && p < 4;
            window.__3D_STATE__.daughterCellsFormed = p === 5;
            updateUI();
        }

        function goToNextPhase() {
            if (window.__3D_STATE__.isAnimating || window.__3D_STATE__.currentPhase >= 5) return;
            
            const targetPhase = window.__3D_STATE__.currentPhase + 1;
            window.__3D_STATE__.isAnimating = true;
            updateUI();

            const duration = 1500;

            // Capture start states
            const startChromoPos = chromosomes.map(c => c.position.clone());
            const startChromoRot = chromosomes.map(c => c.rotation.clone());
            const startChromoScaleY = chromosomes[0].scale.y;
            const startNucOpacity = nucleus.material.opacity;
            const startCentroBotY = centrosomeBot.position.y;
            const startSpindleOp = spindleMat.opacity;
            const startCellScaleY = mainCell.scale.y;
            const startCellScaleXZ = mainCell.scale.x;
            const startNewNucOp = newNucMat.opacity;

            // Target definitions for Metaphase alignment
            const metaPos = [
                new THREE.Vector3(-0.4, 0.1, 0), new THREE.Vector3(-0.1, 0.1, 0), new THREE.Vector3(0.2, 0.1, 0), new THREE.Vector3(0.5, 0.1, 0),
                new THREE.Vector3(-0.4, -0.1, 0), new THREE.Vector3(-0.1, -0.1, 0), new THREE.Vector3(0.2, -0.1, 0), new THREE.Vector3(0.5, -0.1, 0)
            ];

            if (targetPhase === 1) centrosomeBot.visible = true;
            if (targetPhase === 2) { spindleFibers.visible = true; updateSpindleGeometry(); }

            tween(duration, (ease, progress) => {
                if (targetPhase === 1) { // Prophase
                    chromosomes.forEach(c => c.scale.y = THREE.MathUtils.lerp(startChromoScaleY, 0.6, ease));
                    nucleus.material.opacity = THREE.MathUtils.lerp(startNucOpacity, 0.3, ease);
                    
                    // Curve centrosome path
                    const angle = THREE.MathUtils.lerp(0, Math.PI, ease);
                    centrosomeBot.position.set(0.8 * Math.sin(angle), 0.8 * Math.cos(angle), 0);
                } 
                else if (targetPhase === 2) { // Metaphase
                    nucleus.material.opacity = THREE.MathUtils.lerp(startNucOpacity, 0, ease);
                    spindleMat.opacity = THREE.MathUtils.lerp(startSpindleOp, 0.5, ease);
                    chromosomes.forEach((c, i) => {
                        c.position.lerpVectors(startChromoPos[i], metaPos[i], ease);
                        c.rotation.set(
                            THREE.MathUtils.lerp(startChromoRot[i].x, 0, ease),
                            THREE.MathUtils.lerp(startChromoRot[i].y, 0, ease),
                            THREE.MathUtils.lerp(startChromoRot[i].z, 0, ease)
                        );
                    });
                }
                else if (targetPhase === 3) { // Anaphase
                    mainCell.scale.y = THREE.MathUtils.lerp(startCellScaleY, 1.3, ease);
                    chromosomes.forEach((c, i) => {
                        const targetY = i < 4 ? 1.2 : -1.2;
                        c.position.y = THREE.MathUtils.lerp(startChromoPos[i].y, targetY, ease);
                    });
                }
                else if (targetPhase === 4) { // Telophase
                    newNucMat.opacity = THREE.MathUtils.lerp(startNewNucOp, 0.5, ease);
                    spindleMat.opacity = THREE.MathUtils.lerp(startSpindleOp, 0, ease);
                    mainCell.scale.x = THREE.MathUtils.lerp(startCellScaleXZ, 0.7, ease);
                    mainCell.scale.z = THREE.MathUtils.lerp(startCellScaleXZ, 0.7, ease);
                }
                else if (targetPhase === 5) { // Cytokinesis
                    mainGroup.position.x = THREE.MathUtils.lerp(0, 10, ease); // Move out of view
                    mainGroup.material?.opacity && (mainGroup.material.opacity = 1-ease);
                    if (progress > 0.5 && !daughterGroup.visible) {
                        daughterGroup.visible = true;
                        daughterGroup.scale.set(0.1, 0.1, 0.1);
                    }
                    if (daughterGroup.visible) {
                        const s = THREE.MathUtils.lerp(0.1, 1, (progress-0.5)*2);
                        daughterGroup.scale.set(s, s, s);
                    }
                }
            }, () => {
                // On Complete
                window.__3D_STATE__.currentPhase = targetPhase;
                window.__3D_STATE__.isAnimating = false;
                
                if (targetPhase === 2) nucleus.visible = false;
                if (targetPhase === 4) spindleFibers.visible = false;
                if (targetPhase === 5) {
                    mainGroup.visible = false;
                    if (foxIdle && foxWalk) {
                        foxIdle.crossFadeTo(foxWalk, 0.5, true);
                        foxWalk.play();
                    }
                }

                syncStateObject();

                if (window.__3D_STATE__.autoPlayActive) {
                    if (targetPhase < 5) {
                        autoPlayTimeout = setTimeout(goToNextPhase, 2000);
                    } else {
                        window.__3D_STATE__.autoPlayActive = false;
                        updateUI();
                    }
                }
            });
        }

        function resetScene() {
            clearTimeout(autoPlayTimeout);
            activeTweens.length = 0;
            
            window.__3D_STATE__.currentPhase = 0;
            window.__3D_STATE__.isAnimating = false;
            window.__3D_STATE__.autoPlayActive = false;

            // Reset Objects
            mainGroup.visible = true;
            mainGroup.position.set(0,0,0);
            daughterGroup.visible = false;
            
            mainCell.scale.set(1, 1, 1);
            
            nucleus.visible = true;
            nucleus.material.opacity = 0.7;
            
            newNucMat.opacity = 0;
            
            centrosomeBot.visible = false;
            centrosomeBot.position.set(0, 0.8, 0);
            
            spindleFibers.visible = false;
            spindleMat.opacity = 0;

            chromosomes.forEach((c, i) => {
                c.scale.y = 1;
                c.position.copy(initialChromoPos[i].pos);
                c.rotation.copy(initialChromoPos[i].rot);
            });

            if (foxWalk && foxIdle && window.__3D_STATE__.currentPhase === 5) {
                foxWalk.crossFadeTo(foxIdle, 0.5, true);
                foxIdle.play();
            } else if (foxWalk && foxIdle) {
                foxWalk.stop();
                foxIdle.play();
            }

            syncStateObject();
        }

        // --- Event Listeners ---
        document.getElementById('nextPhaseBtn').addEventListener('click', goToNextPhase);
        document.getElementById('resetBtn').addEventListener('click', resetScene);
        document.getElementById('playAllBtn').addEventListener('click', () => {
            if (window.__3D_STATE__.currentPhase === 5) resetScene();
            window.__3D_STATE__.autoPlayActive = true;
            updateUI();
            goToNextPhase();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Render Loop ---
        function animate(time) {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            if (foxMixer) foxMixer.update(delta);

            controls.update();
            updateTweens(time);

            // Subtle particle animation
            if (mainGroup.visible) {
                particles.rotation.y += 0.001;
                particles.rotation.x += 0.0005;
            }
            if (daughterGroup.visible) {
                daughterGroup.children.forEach(c => {
                    c.rotation.y += 0.002;
                });
            }

            if (spindleFibers.visible && window.__3D_STATE__.isAnimating) {
                updateSpindleGeometry();
            }

            renderer.render(scene, camera);
        }

        // Initialize UI
        syncStateObject();
        animate(performance.now());

    </script>
</body>
</html>
