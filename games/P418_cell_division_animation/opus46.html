<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Mitosis Animation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
canvas { display: block; }

#phaseLabel {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: #ffffff;
  font-size: 36px;
  font-weight: bold;
  text-shadow: 0 0 20px rgba(68, 170, 136, 0.8), 0 2px 4px rgba(0,0,0,0.5);
  z-index: 10;
  pointer-events: none;
  transition: opacity 0.3s;
}

#controls {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 10;
}

#controls button {
  padding: 12px 28px;
  border: none;
  border-radius: 25px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 1px;
}

#nextPhaseBtn {
  background: linear-gradient(135deg, #44aa88, #2d8f6f);
  color: white;
  box-shadow: 0 4px 15px rgba(68, 170, 136, 0.4);
}
#nextPhaseBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(68, 170, 136, 0.6); }
#nextPhaseBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

#resetBtn {
  background: linear-gradient(135deg, #aa4444, #8f2d2d);
  color: white;
  box-shadow: 0 4px 15px rgba(170, 68, 68, 0.4);
}
#resetBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(170, 68, 68, 0.6); }

#playAllBtn {
  background: linear-gradient(135deg, #4488aa, #2d6f8f);
  color: white;
  box-shadow: 0 4px 15px rgba(68, 136, 170, 0.4);
}
#playAllBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(68, 136, 170, 0.6); }
#playAllBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

#progressContainer {
  position: absolute;
  bottom: 85px;
  left: 50%;
  transform: translateX(-50%);
  width: 400px;
  z-index: 10;
}

#progressBar {
  width: 100%;
  height: 8px;
  background: rgba(255,255,255,0.15);
  border-radius: 4px;
  overflow: hidden;
}

#progressFill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #44aa88, #88ddbb);
  border-radius: 4px;
  transition: width 0.5s ease;
}

#progressText {
  color: rgba(255,255,255,0.7);
  font-size: 12px;
  text-align: center;
  margin-top: 4px;
}

#infoPanel {
  position: absolute;
  top: 80px;
  right: 20px;
  width: 280px;
  background: rgba(26, 26, 46, 0.9);
  border: 1px solid rgba(68, 170, 136, 0.3);
  border-radius: 15px;
  padding: 20px;
  color: #ffffff;
  z-index: 10;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

#infoPanel h3 {
  color: #44aa88;
  margin-bottom: 10px;
  font-size: 18px;
}

#infoPanel p {
  font-size: 14px;
  line-height: 1.6;
  color: rgba(255,255,255,0.85);
}

#foxLabel {
  position: absolute;
  bottom: 130px;
  left: 40px;
  color: #ffcc44;
  font-size: 14px;
  font-weight: bold;
  z-index: 10;
  pointer-events: none;
  text-shadow: 0 0 10px rgba(255, 204, 68, 0.5);
}
</style>
</head>
<body>

<div id="phaseLabel">Interphase</div>

<div id="progressContainer">
  <div id="progressBar"><div id="progressFill"></div></div>
  <div id="progressText">Phase 1 of 6 — 0%</div>
</div>

<div id="controls">
  <button id="nextPhaseBtn">Next Phase</button>
  <button id="playAllBtn">Play All</button>
  <button id="resetBtn">Reset</button>
</div>

<div id="infoPanel">
  <h3>Interphase</h3>
  <p>The cell is in its normal state. The nucleus is intact and chromosomes are loosely organized as chromatin. The cell grows and prepares for division by duplicating its DNA.</p>
</div>

<div id="foxLabel">🦊 Fox Guide</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
  currentPhase: 0,
  phaseName: 'Interphase',
  chromosomeCount: 4,
  nucleusCount: 1,
  cellCount: 1,
  foxLoaded: false,
  foxAnimationPlaying: false,
  isAnimating: false,
  autoPlayActive: false,
  progressPercent: 0,
  centrosomeCount: 1,
  spindleFibersVisible: false,
  daughterCellsFormed: false
};

const phaseNames = ['Interphase', 'Prophase', 'Metaphase', 'Anaphase', 'Telophase', 'Cytokinesis'];
const phaseDescriptions = [
  'The cell is in its normal state. The nucleus is intact and chromosomes are loosely organized as chromatin. The cell grows and prepares for division by duplicating its DNA.',
  'Chromosomes condense and become visible. The centrosome duplicates and begins moving to opposite poles. The nuclear envelope starts to break down.',
  'Chromosomes align along the metaphase plate (cell equator). Spindle fibers from centrosomes attach to the centromeres of each chromosome.',
  'Sister chromatids are pulled apart to opposite poles of the cell by the spindle fibers. The cell begins to elongate as the poles move further apart.',
  'Chromosomes arrive at opposite poles. New nuclear envelopes begin to form around each set of chromosomes. The cell pinches inward at the center (cleavage furrow).',
  'The cell fully divides into two identical daughter cells, each with its own nucleus and complete set of chromosomes. Mitosis is complete!'
];

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 20, 40);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
scene.add(dirLight);

const backLight = new THREE.PointLight(0x4488aa, 0.5, 20);
backLight.position.set(-5, 5, -5);
scene.add(backLight);

// Ground plane
const groundGeo = new THREE.BoxGeometry(30, 0.2, 30);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3e, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.position.y = -0.5;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const gridHelper = new THREE.GridHelper(30, 30, 0x3a3a5e, 0x2a2a4e);
gridHelper.position.y = -0.39;
scene.add(gridHelper);

// Cell group
const cellGroup = new THREE.Group();
cellGroup.position.y = 2;
scene.add(cellGroup);

// Main cell
const cellGeo = new THREE.SphereGeometry(2, 64, 64);
const cellMat = new THREE.MeshPhysicalMaterial({
  color: 0x44aa88,
  transparent: true,
  opacity: 0.4,
  roughness: 0.1,
  metalness: 0.0,
  transmission: 0.6,
  thickness: 0.5,
  side: THREE.DoubleSide,
  depthWrite: false
});
const cellMesh = new THREE.Mesh(cellGeo, cellMat);
cellGroup.add(cellMesh);

// Nucleus
const nucleusGeo = new THREE.SphereGeometry(0.8, 32, 32);
const nucleusMat = new THREE.MeshPhysicalMaterial({
  color: 0x8844aa,
  transparent: true,
  opacity: 0.7,
  roughness: 0.3,
  metalness: 0.1
});
const nucleusMesh = new THREE.Mesh(nucleusGeo, nucleusMat);
nucleusMesh.position.set(0, 0, 0);
cellGroup.add(nucleusMesh);

// Chromosomes
const chromosomes = [];
const chromosomePositions = [
  new THREE.Vector3(0.15, 0.1, 0.1),
  new THREE.Vector3(-0.2, -0.1, 0.15),
  new THREE.Vector3(0.1, 0.2, -0.15),
  new THREE.Vector3(-0.1, -0.15, -0.1)
];

for (let i = 0; i < 4; i++) {
  const chromGeo = new THREE.BoxGeometry(0.1, 0.4, 0.1);
  const chromMat = new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0x441111 });
  const chrom = new THREE.Mesh(chromGeo, chromMat);
  chrom.position.copy(chromosomePositions[i]);
  chrom.rotation.z = Math.random() * 0.5 - 0.25;
  cellGroup.add(chrom);
  chromosomes.push(chrom);
}

// Centrosome
const centrosomeGeo = new THREE.SphereGeometry(0.15, 16, 16);
const centrosomeMat = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0x444400 });
const centrosome1 = new THREE.Mesh(centrosomeGeo, centrosomeMat);
centrosome1.position.set(0, 0.8, 0);
cellGroup.add(centrosome1);

const centrosome2 = new THREE.Mesh(centrosomeGeo.clone(), centrosomeMat.clone());
centrosome2.position.set(0, -0.8, 0);
centrosome2.visible = false;
cellGroup.add(centrosome2);

// Spindle fibers
const spindleGroup = new THREE.Group();
spindleGroup.visible = false;
cellGroup.add(spindleGroup);

// Cytoplasm particles
const particleCount = 80;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);

for (let i = 0; i < particleCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = Math.random() * 1.8;
  particlePositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  particlePositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  particlePositions[i * 3 + 2] = r * Math.cos(phi);
  particleSizes[i] = Math.random() * 3 + 1;
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

const particleMat = new THREE.PointsMaterial({
  color: 0x88ccaa,
  size: 0.04,
  transparent: true,
  opacity: 0.5,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const particles = new THREE.Points(particleGeo, particleMat);
cellGroup.add(particles);

// Daughter cells (created later)
let daughterCell1 = null, daughterCell2 = null;
let daughterNucleus1 = null, daughterNucleus2 = null;
let daughterChromosomes1 = [], daughterChromosomes2 = [];
let newNucleus1 = null, newNucleus2 = null;

// Duplicate chromosomes for anaphase
const chromosomesDuplicate = [];
for (let i = 0; i < 4; i++) {
  const chromGeo = new THREE.BoxGeometry(0.1, 0.4, 0.1);
  const chromMat = new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0x441111 });
  const chrom = new THREE.Mesh(chromGeo, chromMat);
  chrom.position.copy(chromosomePositions[i]);
  chrom.rotation.z = Math.random() * 0.5 - 0.25;
  chrom.visible = false;
  cellGroup.add(chrom);
  chromosomesDuplicate.push(chrom);
}

// Fox
let foxModel = null;
let foxMixer = null;
let foxActions = [];
let currentFoxAction = null;

const loader = new GLTFLoader();
loader.load(
  'https://cdn.jsdelivr.net/gh/mrdoob/three.js@dev/examples/models/gltf/Fox.glb',
  (gltf) => {
    foxModel = gltf.scene;
    foxModel.position.set(-6, -0.5, 0);
    foxModel.scale.set(0.04, 0.04, 0.04);
    foxModel.rotation.y = Math.PI / 4;
    foxModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
      }
    });
    scene.add(foxModel);

    foxMixer = new THREE.AnimationMixer(foxModel);
    gltf.animations.forEach((clip, index) => {
      const action = foxMixer.clipAction(clip);
      foxActions.push(action);
    });

    if (foxActions.length > 0) {
      currentFoxAction = foxActions[0];
      currentFoxAction.play();
      window.__3D_STATE__.foxAnimationPlaying = true;
    }

    window.__3D_STATE__.foxLoaded = true;
  },
  undefined,
  (error) => {
    console.warn('Fox model could not be loaded:', error);
  }
);

// Animation state
let animationTargets = [];
let transitionDuration = 1.5;
let transitionTime = 0;
let isTransitioning = false;
let autoPlayInterval = null;

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function createSpindleFibers() {
  while (spindleGroup.children.length > 0) {
    const child = spindleGroup.children[0];
    spindleGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
    if (child.material) child.material.dispose();
  }

  const fiberMat = new THREE.LineBasicMaterial({ color: 0x88ff88, transparent: true, opacity: 0.6 });

  chromosomes.forEach((chrom) => {
    // From centrosome1 to chromosome
    const points1 = [centrosome1.position.clone(), chrom.position.clone()];
    const geo1 = new THREE.BufferGeometry().setFromPoints(points1);
    const line1 = new THREE.Line(geo1, fiberMat.clone());
    spindleGroup.add(line1);

    // From centrosome2 to chromosome
    const points2 = [centrosome2.position.clone(), chrom.position.clone()];
    const geo2 = new THREE.BufferGeometry().setFromPoints(points2);
    const line2 = new THREE.Line(geo2, fiberMat.clone());
    spindleGroup.add(line2);
  });
}

function updateSpindleFibers() {
  let idx = 0;
  chromosomes.forEach((chrom) => {
    if (idx < spindleGroup.children.length) {
      const line = spindleGroup.children[idx];
      const positions = line.geometry.attributes.position.array;
      positions[0] = centrosome1.position.x;
      positions[1] = centrosome1.position.y;
      positions[2] = centrosome1.position.z;
      positions[3] = chrom.position.x;
      positions[4] = chrom.position.y;
      positions[5] = chrom.position.z;
      line.geometry.attributes.position.needsUpdate = true;
    }
    idx++;
    if (idx < spindleGroup.children.length) {
      const line = spindleGroup.children[idx];
      const positions = line.geometry.attributes.position.array;
      positions[0] = centrosome2.position.x;
      positions[1] = centrosome2.position.y;
      positions[2] = centrosome2.position.z;
      positions[3] = chrom.position.x;
      positions[4] = chrom.position.y;
      positions[5] = chrom.position.z;
      line.geometry.attributes.position.needsUpdate = true;
    }
    idx++;
  });
}

function switchFoxAnimation(index) {
  if (!foxMixer || foxActions.length === 0) return;
  const newAction = foxActions[Math.min(index, foxActions.length - 1)];
  if (currentFoxAction === newAction) return;
  if (currentFoxAction) {
    currentFoxAction.fadeOut(0.5);
  }
  newAction.reset().fadeIn(0.5).play();
  currentFoxAction = newAction;
}

// Phase transitions
function startPhaseTransition(phase) {
  if (isTransitioning) return;
  if (phase < 0 || phase > 5) return;

  isTransitioning = true;
  window.__3D_STATE__.isAnimating = true;
  window.__3D_STATE__.currentPhase = phase;
  window.__3D_STATE__.phaseName = phaseNames[phase];
  transitionTime = 0;

  document.getElementById('phaseLabel').textContent = phaseNames[phase];
  document.getElementById('infoPanel').querySelector('h3').textContent = phaseNames[phase];
  document.getElementById('infoPanel').querySelector('p').textContent = phaseDescriptions[phase];

  animationTargets = [];

  switch (phase) {
    case 0: setupInterphase(); break;
    case 1: setupProphase(); break;
    case 2: setupMetaphase(); break;
    case 3: setupAnaphase(); break;
    case 4: setupTelophase(); break;
    case 5: setupCytokinesis(); break;
  }
}

function setupInterphase() {
  // Reset everything
  cellMesh.visible = true;
  cellMesh.scale.set(1, 1, 1);
  cellMat.opacity = 0.4;
  nucleusMesh.visible = true;
  nucleusMat.opacity = 0.7;
  nucleusMesh.position.set(0, 0, 0);
  centrosome1.position.set(0, 0.8, 0);
  centrosome2.visible = false;
  spindleGroup.visible = false;

  chromosomes.forEach((c, i) => {
    c.visible = true;
    c.scale.set(1, 1, 1);
    animationTargets.push({
      obj: c.position, prop: 'x', from: c.position.x, to: chromosomePositions[i].x
    });
    animationTargets.push({
      obj: c.position, prop: 'y', from: c.position.y, to: chromosomePositions[i].y
    });
    animationTargets.push({
      obj: c.position, prop: 'z', from: c.position.z, to: chromosomePositions[i].z
    });
  });

  chromosomesDuplicate.forEach(c => { c.visible = false; });

  if (newNucleus1) { newNucleus1.visible = false; }
  if (newNucleus2) { newNucleus2.visible = false; }

  // Remove daughter cells
  if (daughterCell1) { cellGroup.remove(daughterCell1); daughterCell1 = null; }
  if (daughterCell2) { cellGroup.remove(daughterCell2); daughterCell2 = null; }
  if (daughterNucleus1) { cellGroup.remove(daughterNucleus1); daughterNucleus1 = null; }
  if (daughterNucleus2) { cellGroup.remove(daughterNucleus2); daughterNucleus2 = null; }
  daughterChromosomes1.forEach(c => cellGroup.remove(c));
  daughterChromosomes2.forEach(c => cellGroup.remove(c));
  daughterChromosomes1 = [];
  daughterChromosomes2 = [];

  particles.visible = true;

  switchFoxAnimation(0);

  window.__3D_STATE__.chromosomeCount = 4;
  window.__3D_STATE__.nucleusCount = 1;
  window.__3D_STATE__.cellCount = 1;
  window.__3D_STATE__.centrosomeCount = 1;
  window.__3D_STATE__.spindleFibersVisible = false;
  window.__3D_STATE__.daughterCellsFormed = false;
}

function setupProphase() {
  centrosome2.visible = true;

  // Chromosomes condense (scale Y)
  chromosomes.forEach((c) => {
    animationTargets.push({
      obj: c.scale, prop: 'y', from: c.scale.y, to: 0.6
    });
    animationTargets.push({
      obj: c.scale, prop: 'x', from: c.scale.x, to: 1.3
    });
    animationTargets.push({
      obj: c.scale, prop: 'z', from: c.scale.z, to: 1.3
    });
  });

  // Nucleus fades
  animationTargets.push({
    obj: nucleusMat, prop: 'opacity', from: nucleusMat.opacity, to: 0.3
  });

  // Centrosome2 appears
  animationTargets.push({
    obj: centrosome2.position, prop: 'y', from: 0, to: -0.8
  });

  switchFoxAnimation(0);

  window.__3D_STATE__.centrosomeCount = 2;
  window.__3D_STATE__.chromosomeCount = 4;
  window.__3D_STATE__.nucleusCount = 1;
}

function setupMetaphase() {
  // Chromosomes align at y=0
  chromosomes.forEach((c, i) => {
    animationTargets.push({
      obj: c.position, prop: 'y', from: c.position.y, to: 0
    });
    animationTargets.push({
      obj: c.position, prop: 'x', from: c.position.x, to: (i - 1.5) * 0.3
    });
    animationTargets.push({
      obj: c.position, prop: 'z', from: c.position.z, to: 0
    });
  });

  // Nucleus disappears
  animationTargets.push({
    obj: nucleusMat, prop: 'opacity', from: nucleusMat.opacity, to: 0
  });

  // Centrosomes move to poles
  animationTargets.push({
    obj: centrosome1.position, prop: 'y', from: centrosome1.position.y, to: 1.5
  });
  animationTargets.push({
    obj: centrosome2.position, prop: 'y', from: centrosome2.position.y, to: -1.5
  });

  // Spindle fibers
  createSpindleFibers();
  spindleGroup.visible = true;

  switchFoxAnimation(0);

  window.__3D_STATE__.spindleFibersVisible = true;
  window.__3D_STATE__.nucleusCount = 0;
}

function setupAnaphase() {
  // Show duplicate chromosomes
  chromosomesDuplicate.forEach((c, i) => {
    c.visible = true;
    c.position.copy(chromosomes[i].position);
    c.scale.copy(chromosomes[i].scale);
    c.rotation.copy(chromosomes[i].rotation);
  });

  // Original chromosomes move up
  chromosomes.forEach((c, i) => {
    animationTargets.push({
      obj: c.position, prop: 'y', from: c.position.y, to: 1.2
    });
  });

  // Duplicate chromosomes move down
  chromosomesDuplicate.forEach((c, i) => {
    animationTargets.push({
      obj: c.position, prop: 'y', from: c.position.y, to: -1.2
    });
  });

  // Cell elongates
  animationTargets.push({
    obj: cellMesh.scale, prop: 'y', from: cellMesh.scale.y, to: 1.3
  });

  switchFoxAnimation(0);

  window.__3D_STATE__.chromosomeCount = 8;
}

function setupTelophase() {
  // Create new nuclei
  if (!newNucleus1) {
    const nGeo = new THREE.SphereGeometry(0.6, 32, 32);
    const nMat = new THREE.MeshPhysicalMaterial({
      color: 0x8844aa, transparent: true, opacity: 0, roughness: 0.3
    });
    newNucleus1 = new THREE.Mesh(nGeo, nMat);
    newNucleus1.position.set(0, 1.2, 0);
    cellGroup.add(newNucleus1);
  }
  newNucleus1.visible = true;
  newNucleus1.material.opacity = 0;

  if (!newNucleus2) {
    const nGeo = new THREE.SphereGeometry(0.6, 32, 32);
    const nMat = new THREE.MeshPhysicalMaterial({
      color: 0x8844aa, transparent: true, opacity: 0, roughness: 0.3
    });
    newNucleus2 = new THREE.Mesh(nGeo, nMat);
    newNucleus2.position.set(0, -1.2, 0);
    cellGroup.add(newNucleus2);
  }
  newNucleus2.visible = true;
  newNucleus2.material.opacity = 0;

  // Fade in nuclei
  animationTargets.push({
    obj: newNucleus1.material, prop: 'opacity', from: 0, to: 0.5
  });
  animationTargets.push({
    obj: newNucleus2.material, prop: 'opacity', from: 0, to: 0.5
  });

  // Cell pinches - scale X at center
  animationTargets.push({
    obj: cellMesh.scale, prop: 'y', from: cellMesh.scale.y, to: 1.5
  });
  animationTargets.push({
    obj: cellMesh.scale, prop: 'x', from: cellMesh.scale.x, to: 0.7
  });
  animationTargets.push({
    obj: cellMesh.scale, prop: 'z', from: cellMesh.scale.z, to: 0.7
  });

  // Hide spindle fibers
  spindleGroup.visible = false;

  switchFoxAnimation(0);

  window.__3D_STATE__.spindleFibersVisible = false;
  window.__3D_STATE__.nucleusCount = 2;
  window.__3D_STATE__.chromosomeCount = 8;
}

function setupCytokinesis() {
  // Hide original cell
  animationTargets.push({
    obj: cellMat, prop: 'opacity', from: cellMat.opacity, to: 0
  });

  // Hide original components
  nucleusMesh.visible = false;
  if (newNucleus1) newNucleus1.visible = false;
  if (newNucleus2) newNucleus2.visible = false;
  chromosomes.forEach(c => c.visible = false);
  chromosomesDuplicate.forEach(c => c.visible = false);
  centrosome1.visible = false;
  centrosome2.visible = false;
  particles.visible = false;

  // Create daughter cell 1
  const dc1Geo = new THREE.SphereGeometry(1.5, 48, 48);
  const dc1Mat = new THREE.MeshPhysicalMaterial({
    color: 0x44aa88, transparent: true, opacity: 0, roughness: 0.1,
    transmission: 0.6, thickness: 0.5, side: THREE.DoubleSide, depthWrite: false
  });
  daughterCell1 = new THREE.Mesh(dc1Geo, dc1Mat);
  daughterCell1.position.set(0, 2.5, 0);
  cellGroup.add(daughterCell1);

  const dn1Geo = new THREE.SphereGeometry(0.5, 32, 32);
  const dn1Mat = new THREE.MeshPhysicalMaterial({
    color: 0x8844aa, transparent: true, opacity: 0, roughness: 0.3
  });
  daughterNucleus1 = new THREE.Mesh(dn1Geo, dn1Mat);
  daughterNucleus1.position.set(0, 2.5, 0);
  cellGroup.add(daughterNucleus1);

  // Create daughter cell 2
  const dc2Geo = new THREE.SphereGeometry(1.5, 48, 48);
  const dc2Mat = new THREE.MeshPhysicalMaterial({
    color: 0x44aa88, transparent: true, opacity: 0, roughness: 0.1,
    transmission: 0.6, thickness: 0.5, side: THREE.DoubleSide, depthWrite: false
  });
  daughterCell2 = new THREE.Mesh(dc2Geo, dc2Mat);
  daughterCell2.position.set(0, -2.5, 0);
  cellGroup.add(daughterCell2);

  const dn2Geo = new THREE.SphereGeometry(0.5, 32, 32);
  const dn2Mat = new THREE.MeshPhysicalMaterial({
    color: 0x8844aa, transparent: true, opacity: 0, roughness: 0.3
  });
  daughterNucleus2 = new THREE.Mesh(dn2Geo, dn2Mat);
  daughterNucleus2.position.set(0, -2.5, 0);
  cellGroup.add(daughterNucleus2);

  // Daughter chromosomes
  for (let i = 0; i < 4; i++) {
    const cg = new THREE.BoxGeometry(0.1, 0.3, 0.1);
    const cm = new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0x441111 });
    const c1 = new THREE.Mesh(cg, cm);
    c1.position.set(
      (Math.random() - 0.5) * 0.4,
      2.5 + (Math.random() - 0.5) * 0.4,
      (Math.random() - 0.5) * 0.4
    );
    cellGroup.add(c1);
    daughterChromosomes1.push(c1);

    const c2 = new THREE.Mesh(cg.clone(), cm.clone());
    c2.position.set(
      (Math.random() - 0.5) * 0.4,
      -2.5 + (Math.random() - 0.5) * 0.4,
      (Math.random() - 0.5) * 0.4
    );
    cellGroup.add(c2);
    daughterChromosomes2.push(c2);
  }

  // Animate daughter cells appearing
  animationTargets.push({ obj: dc1Mat, prop: 'opacity', from: 0, to: 0.4 });
  animationTargets.push({ obj: dc2Mat, prop: 'opacity', from: 0, to: 0.4 });
  animationTargets.push({ obj: dn1Mat, prop: 'opacity', from: 0, to: 0.7 });
  animationTargets.push({ obj: dn2Mat, prop: 'opacity', from: 0, to: 0.7 });

  // Fox runs
  switchFoxAnimation(Math.min(2, foxActions.length - 1));

  window.__3D_STATE__.daughterCellsFormed = true;
  window.__3D_STATE__.cellCount = 2;
  window.__3D_STATE__.nucleusCount = 2;
  window.__3D_STATE__.chromosomeCount = 8;
}

function completeTransition() {
  isTransitioning = false;
  window.__3D_STATE__.isAnimating = false;
  window.__3D_STATE__.progressPercent = window.__3D_STATE__.currentPhase * 20;

  const progressFill = document.getElementById('progressFill');
  progressFill.style.width = window.__3D_STATE__.progressPercent + '%';

  const progressText = document.getElementById('progressText');
  progressText.textContent = `Phase ${window.__3D_STATE__.currentPhase + 1} of 6 — ${window.__3D_STATE__.progressPercent}%`;

  document.getElementById('nextPhaseBtn').disabled = (window.__3D_STATE__.currentPhase >= 5);
}

// UI
document.getElementById('nextPhaseBtn').addEventListener('click', () => {
  if (isTransitioning) return;
  const nextPhase = window.__3D_STATE__.currentPhase + 1;
  if (nextPhase <= 5) {
    startPhaseTransition(nextPhase);
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (autoPlayInterval) {
    clearInterval(autoPlayInterval);
    autoPlayInterval = null;
    window.__3D_STATE__.autoPlayActive = false;
    document.getElementById('playAllBtn').textContent = 'Play All';
    document.getElementById('playAllBtn').disabled = false;
  }
  isTransitioning = false;
  window.__3D_STATE__.isAnimating = false;
  startPhaseTransition(0);
});

document.getElementById('playAllBtn').addEventListener('click', () => {
  if (window.__3D_STATE__.autoPlayActive) return;
  window.__3D_STATE__.autoPlayActive = true;
  document.getElementById('playAllBtn').disabled = true;
  document.getElementById('playAllBtn').textContent = 'Playing...';

  // Start from current phase or reset
  let phase = window.__3D_STATE__.currentPhase;
  if (phase >= 5) {
    startPhaseTransition(0);
    phase = 0;
  }

  autoPlayInterval = setInterval(() => {
    if (!isTransitioning) {
      phase++;
      if (phase <= 5) {
        startPhaseTransition(phase);
      } else {
        clearInterval(autoPlayInterval);
        autoPlayInterval = null;
        window.__3D_STATE__.autoPlayActive = false;
        document.getElementById('playAllBtn').textContent = 'Play All';
        document.getElementById('playAllBtn').disabled = false;
      }
    }
  }, 3000);
});

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();

  // Fox animation
  if (foxMixer) {
    foxMixer.update(delta);
  }

  // Phase transition animation
  if (isTransitioning) {
    transitionTime += delta;
    const t = Math.min(transitionTime / transitionDuration, 1);
    const easedT = easeInOutCubic(t);

    animationTargets.forEach(target => {
      target.obj[target.prop] = lerp(target.from, target.to, easedT);
    });

    // Update spindle fibers during metaphase/anaphase
    if (spindleGroup.visible) {
      updateSpindleFibers();
    }

    if (t >= 1) {
      completeTransition();
    }
  }

  // Rotate particles slowly
  if (particles.visible) {
    const positions = particles.geometry.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
      const idx = i * 3;
      const x = positions[idx];
      const z = positions[idx + 2];
      const angle = 0.2 * delta;
      positions[idx] = x * Math.cos(angle) - z * Math.sin(angle);
      positions[idx + 2] = x * Math.sin(angle) + z * Math.cos(angle);
      positions[idx + 1] += Math.sin(Date.now() * 0.001 + i) * 0.002;
    }
    particles.geometry.attributes.position.needsUpdate = true;
  }

  // Gentle cell pulsing
  if (cellMesh.visible && !isTransitioning && window.__3D_STATE__.currentPhase < 5) {
    const pulse = 1 + Math.sin(Date.now() * 0.002) * 0.02;
    if (window.__3D_STATE__.currentPhase === 0) {
      cellMesh.scale.setScalar(pulse);
    }
  }

  // Chromosome subtle rotation
  chromosomes.forEach((c, i) => {
    if (c.visible) {
      c.rotation.z += Math.sin(Date.now() * 0.001 + i) * 0.001;
    }
  });

  controls.update();
  renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize
startPhaseTransition(0);
animate();
</script>
