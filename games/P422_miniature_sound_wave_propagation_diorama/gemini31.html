<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Wave Propagation Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 280px;
            background: rgba(20, 20, 25, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            color: #eee;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #87CEEB;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 12px;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: #87CEEB;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            flex: 1;
            padding: 8px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #444;
        }
        button:active {
            background: #222;
        }
        .stats-panel {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.6;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
        }
        .stat-label {
            color: #aaa;
        }
        .stat-value {
            font-family: monospace;
            color: #fff;
        }
        #info-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 25, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 10px 25px;
            color: #eee;
            font-size: 14px;
            display: flex;
            gap: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
        }
        .zone-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .color-box {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            text-align: right;
            line-height: 1.5;
        }
    </style>
    <!-- Import Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud">
        <h2>Wave Controls</h2>
        
        <div class="control-group">
            <div class="control-header">
                <span>Frequency (Hz)</span>
                <span id="val-freq">1.0</span>
            </div>
            <input type="range" id="slider-freq" min="0.5" max="3.0" step="0.1" value="1.0">
        </div>

        <div class="control-group">
            <div class="control-header">
                <span>Amplitude</span>
                <span id="val-amp">0.50</span>
            </div>
            <input type="range" id="slider-amp" min="0.1" max="1.0" step="0.05" value="0.5">
        </div>

        <div class="btn-group">
            <button id="btn-play">Pause</button>
            <button id="btn-reset">Reset</button>
        </div>

        <div class="stats-panel">
            <div class="stat-row">
                <span class="stat-label">Wavelength (Air):</span>
                <span class="stat-value" id="stat-wl-a">3.00</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Wavelength (Dense):</span>
                <span class="stat-value" id="stat-wl-b">4.50</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Wave Speed (Air):</span>
                <span class="stat-value">3.00</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Wave Speed (Dense):</span>
                <span class="stat-value">4.50</span>
            </div>
            <div class="stat-row" style="margin-top: 5px; border-top: 1px solid #444; padding-top: 5px;">
                <span class="stat-label" style="color: #ff9999;">Receiver Amp:</span>
                <span class="stat-value" id="stat-rec-amp" style="color: #ff9999;">0.15</span>
            </div>
        </div>
    </div>

    <div id="info-bar">
        <div class="zone-indicator">
            <div class="color-box" style="background: transparent; border: 1px solid #87CEEB;"></div>
            <span>Zone A: Air (v=3.0)</span>
        </div>
        <div style="color: #555;">|</div>
        <div class="zone-indicator">
            <div class="color-box" style="background: rgba(0,255,0,0.4);"></div>
            <span>Zone B: Dense (v=4.5)</span>
        </div>
        <div style="color: #555;">|</div>
        <div class="zone-indicator">
            <div class="color-box" style="background: transparent; border: 1px solid #87CEEB;"></div>
            <span>Zone C: Air (v=3.0)</span>
        </div>
    </div>

    <div class="controls-hint">
        Space: Play/Pause<br>
        R: Reset<br>
        ↑/↓: Frequency<br>
        ←/→: Amplitude
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            isPlaying: true,
            time: 0,
            frequency: 1.0,
            amplitude: 0.5,
            wavelength: 3.0,
            wavelengthB: 4.5,
            waveSpeed: 3.0,
            waveSpeedB: 4.5,
            receiverAmplitude: 0.15,
            particleCount: 800,
            shadowReduction: 0.3,
            obstaclePresent: true,
            zoneBVisible: true,
            sphereColorAtMax: '#ff0000',
            sphereColorAtMin: '#0000ff'
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Soft gradient sky color

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 14);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.left = -12;
        dirLight.shadow.camera.right = 12;
        dirLight.shadow.camera.top = 12;
        dirLight.shadow.camera.bottom = -12;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        // --- Diorama Objects ---
        // 1. Platform
        const platformGeo = new THREE.BoxGeometry(20, 1, 10);
        const platformMat = new THREE.MeshStandardMaterial({ 
            color: 0x8B5A2B, // Wooden texture color
            roughness: 0.8,
            metalness: 0.1
        });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = -0.5;
        platform.receiveShadow = true;
        scene.add(platform);

        // 2. Speaker (Source)
        const speakerGroup = new THREE.Group();
        speakerGroup.position.set(-8, 0.5, 0);
        
        const speakerBoxGeo = new THREE.BoxGeometry(0.8, 0.8, 0.4);
        const speakerBoxMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const speakerBox = new THREE.Mesh(speakerBoxGeo, speakerBoxMat);
        speakerBox.castShadow = true;
        speakerBox.receiveShadow = true;
        speakerGroup.add(speakerBox);

        const coneGeo = new THREE.ConeGeometry(0.3, 0.4, 16);
        const coneMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const cone = new THREE.Mesh(coneGeo, coneMat);
        cone.rotation.z = -Math.PI / 2;
        cone.position.x = 0.4 + 0.2; // Half box width + half cone height
        cone.castShadow = true;
        speakerGroup.add(cone);
        
        scene.add(speakerGroup);

        // 3. Zone B Medium (Dense)
        const zoneBGeo = new THREE.BoxGeometry(4, 2, 10);
        const zoneBMat = new THREE.MeshBasicMaterial({ 
            color: 0x00ff00, 
            transparent: true, 
            opacity: 0.15,
            depthWrite: false
        });
        const zoneB = new THREE.Mesh(zoneBGeo, zoneBMat);
        zoneB.position.set(0, 1, 0); // Centered at x=0, spans x=-2 to 2
        scene.add(zoneB);

        // 4. Obstacle Wall
        const wallGeo = new THREE.BoxGeometry(0.3, 2, 2);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(5, 1, 0);
        wall.castShadow = true;
        wall.receiveShadow = true;
        scene.add(wall);

        // 5. Receiver (Microphone)
        const micGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.6, 16);
        const micMat = new THREE.MeshStandardMaterial({ color: 0x8B0000 });
        const mic = new THREE.Mesh(micGeo, micMat);
        mic.position.set(7, 0.5, 0);
        mic.castShadow = true;
        mic.receiveShadow = true;
        scene.add(mic);

        // --- Wave Particles (InstancedMesh) ---
        const gridX = 40;
        const gridZ = 20;
        state.particleCount = gridX * gridZ;
        
        const sphereGeo = new THREE.SphereGeometry(0.08, 16, 16);
        const sphereMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff,
            roughness: 0.3,
            metalness: 0.1
        });
        
        const instancedMesh = new THREE.InstancedMesh(sphereGeo, sphereMat, state.particleCount);
        instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        instancedMesh.castShadow = true;
        instancedMesh.receiveShadow = true;
        scene.add(instancedMesh);

        // Pre-allocate objects for loop performance
        const dummy = new THREE.Object3D();
        const colorObj = new THREE.Color();
        const colorBlue = new THREE.Color(state.sphereColorAtMin);
        const colorWhite = new THREE.Color(0xffffff);
        const colorRed = new THREE.Color(state.sphereColorAtMax);

        // Calculate static grid positions
        const particlePositions = new Float32Array(state.particleCount * 2); // Store base X and Z
        let pIdx = 0;
        for (let i = 0; i < gridX; i++) {
            for (let j = 0; j < gridZ; j++) {
                const x = -7 + (i / (gridX - 1)) * 14;
                const z = -4 + (j / (gridZ - 1)) * 8;
                particlePositions[pIdx * 2] = x;
                particlePositions[pIdx * 2 + 1] = z;
                pIdx++;
            }
        }

        // --- UI Logic ---
        const sliderFreq = document.getElementById('slider-freq');
        const sliderAmp = document.getElementById('slider-amp');
        const valFreq = document.getElementById('val-freq');
        const valAmp = document.getElementById('val-amp');
        const btnPlay = document.getElementById('btn-play');
        const btnReset = document.getElementById('btn-reset');
        
        const statWlA = document.getElementById('stat-wl-a');
        const statWlB = document.getElementById('stat-wl-b');
        const statRecAmp = document.getElementById('stat-rec-amp');

        function updateUIFromState() {
            sliderFreq.value = state.frequency;
            sliderAmp.value = state.amplitude;
            valFreq.textContent = state.frequency.toFixed(1);
            valAmp.textContent = state.amplitude.toFixed(2);
            btnPlay.textContent = state.isPlaying ? "Pause" : "Play";
            
            statWlA.textContent = state.wavelength.toFixed(2);
            statWlB.textContent = state.wavelengthB.toFixed(2);
            statRecAmp.textContent = state.receiverAmplitude.toFixed(3);
        }

        sliderFreq.addEventListener('input', (e) => {
            state.frequency = parseFloat(e.target.value);
            updateUIFromState();
        });

        sliderAmp.addEventListener('input', (e) => {
            state.amplitude = parseFloat(e.target.value);
            updateUIFromState();
        });

        btnPlay.addEventListener('click', () => {
            state.isPlaying = !state.isPlaying;
            updateUIFromState();
        });

        function resetSimulation() {
            state.time = 0;
            state.frequency = 1.0;
            state.amplitude = 0.5;
            state.isPlaying = true;
            updateUIFromState();
        }

        btnReset.addEventListener('click', resetSimulation);

        // --- Keyboard Controls ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                state.isPlaying = !state.isPlaying;
                updateUIFromState();
                e.preventDefault();
            } else if (e.code === 'KeyR') {
                resetSimulation();
            } else if (e.code === 'ArrowUp') {
                state.frequency = Math.min(3.0, state.frequency + 0.1);
                updateUIFromState();
                e.preventDefault();
            } else if (e.code === 'ArrowDown') {
                state.frequency = Math.max(0.5, state.frequency - 0.1);
                updateUIFromState();
                e.preventDefault();
            } else if (e.code === 'ArrowRight') {
                state.amplitude = Math.min(1.0, state.amplitude + 0.05);
                updateUIFromState();
                e.preventDefault();
            } else if (e.code === 'ArrowLeft') {
                state.amplitude = Math.max(0.1, state.amplitude - 0.05);
                updateUIFromState();
                e.preventDefault();
            }
        });

        // --- Window Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();
            if (state.isPlaying) {
                state.time += dt;
            }

            // Update derived physics state
            state.wavelength = state.waveSpeed / state.frequency;
            state.wavelengthB = state.waveSpeedB / state.frequency;
            state.receiverAmplitude = state.amplitude * state.shadowReduction;

            const omega = 2 * Math.PI * state.frequency;
            const kA = 2 * Math.PI / state.wavelength;
            const kB = 2 * Math.PI / state.wavelengthB;

            // Update particles
            for (let i = 0; i < state.particleCount; i++) {
                const x = particlePositions[i * 2];
                const z = particlePositions[i * 2 + 1];

                // Calculate radial distance from source (-8, 0)
                const D = Math.sqrt(Math.pow(x + 8, 2) + Math.pow(z, 2));
                
                // Calculate phase delay based on path through media
                let phaseDelay = 0;
                
                if (x <= -2) {
                    // Entirely in Zone A
                    phaseDelay = kA * D;
                } else if (x <= 2) {
                    // Crosses into Zone B
                    const fractionA = 6 / (x + 8); // Distance from -8 to -2 is 6
                    const dA = D * fractionA;
                    const dB = D - dA;
                    phaseDelay = kA * dA + kB * dB;
                } else {
                    // Crosses Zone A, B, and into C
                    const fractionA = 6 / (x + 8);
                    const fractionB = 4 / (x + 8); // Distance from -2 to 2 is 4
                    const dA = D * fractionA;
                    const dB = D * fractionB;
                    const dC = D - dA - dB;
                    phaseDelay = kA * dA + kB * dB + kA * dC; // Zone C has same speed as A
                }

                // Determine local amplitude (apply shadow if behind obstacle)
                let currentAmp = state.amplitude;
                if (x > 5.3 && z >= -1 && z <= 1) {
                    currentAmp *= state.shadowReduction;
                }

                // Wave equation
                const yOffset = currentAmp * Math.sin(phaseDelay - omega * state.time);
                const y = 1.0 + yOffset;

                // Update transform
                dummy.position.set(x, y, z);
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);

                // Update color based on displacement relative to global amplitude
                // Map [-state.amplitude, state.amplitude] to [0, 1]
                let t = (yOffset + state.amplitude) / (2 * state.amplitude);
                t = Math.max(0, Math.min(1, t)); // Clamp just in case

                if (t < 0.5) {
                    colorObj.lerpColors(colorBlue, colorWhite, t * 2);
                } else {
                    colorObj.lerpColors(colorWhite, colorRed, (t - 0.5) * 2);
                }
                instancedMesh.setColorAt(i, colorObj);
            }

            instancedMesh.instanceMatrix.needsUpdate = true;
            instancedMesh.instanceColor.needsUpdate = true;

            // Update UI stats that might change continuously
            statWlA.textContent = state.wavelength.toFixed(2);
            statWlB.textContent = state.wavelengthB.toFixed(2);
            statRecAmp.textContent = state.receiverAmplitude.toFixed(3);

            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize UI and start loop
        updateUIFromState();
        animate();
    </script>
</body>
</html>
