<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Sound Wave Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #87CEEB, #dff3ff);
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 12px 14px;
      background: rgba(20, 20, 20, 0.72);
      color: white;
      border-radius: 10px;
      min-width: 260px;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    #hud h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .control-row {
      margin-bottom: 10px;
    }

    .control-row label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .control-row input[type="range"] {
      width: 100%;
    }

    .button-row {
      display: flex;
      gap: 8px;
      margin: 10px 0;
    }

    button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #2f6fed;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2458bf;
    }

    .readout {
      font-size: 13px;
      line-height: 1.5;
      margin-top: 8px;
    }

    #infoBar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      text-align: center;
      padding: 10px 8px;
      font-size: 14px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="hud">
    <h3>Sound Wave Controls</h3>

    <div class="control-row">
      <label for="frequency">Frequency: <span id="frequencyValue">1.0</span> Hz</label>
      <input id="frequency" type="range" min="0.5" max="3.0" step="0.1" value="1.0" />
    </div>

    <div class="control-row">
      <label for="amplitude">Amplitude: <span id="amplitudeValue">0.50</span></label>
      <input id="amplitude" type="range" min="0.1" max="1.0" step="0.05" value="0.5" />
    </div>

    <div class="button-row">
      <button id="playPauseBtn">Pause</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="readout">
      <div>Frequency: <span id="readoutFrequency">1.0</span> Hz</div>
      <div>Wavelength (Zone A): <span id="readoutWavelength">3.00</span></div>
      <div>Wave Speed (Zone A): <span id="readoutSpeed">3.00</span></div>
      <div>Receiver Amplitude: <span id="readoutReceiver">0.150</span></div>
    </div>
  </div>

  <div id="infoBar">
    Zone A: Air (v=3.0) | Zone B: Dense (v=4.5) | Zone C: Air (v=3.0)
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.fog = null;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x87CEEB, 1);
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 8, 14);
    camera.lookAt(0, 0, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.8, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const waveBaselineY = 1.0;
    const sourceX = -8;
    const sourceY = 0.5;
    const sourceZ = 0;

    const WAVE_SPEED_A = 3.0;
    const WAVE_SPEED_B = 4.5;
    const SHADOW_FACTOR = 0.3;

    let isPlaying = true;
    let simTime = 0;
    let frequency = 1.0;
    let amplitude = 0.5;

    const textureCanvas = document.createElement('canvas');
    textureCanvas.width = 256;
    textureCanvas.height = 256;
    const ctx = textureCanvas.getContext('2d');
    ctx.fillStyle = '#8b5a2b';
    ctx.fillRect(0, 0, 256, 256);
    for (let i = 0; i < 70; i++) {
      ctx.strokeStyle = `rgba(${90 + Math.random() * 60},${50 + Math.random() * 30},${20 + Math.random() * 20},0.25)`;
      ctx.lineWidth = 2 + Math.random() * 5;
      ctx.beginPath();
      ctx.moveTo(0, Math.random() * 256);
      ctx.bezierCurveTo(
        80, Math.random() * 256,
        180, Math.random() * 256,
        256, Math.random() * 256
      );
      ctx.stroke();
    }
    const woodTexture = new THREE.CanvasTexture(textureCanvas);
    woodTexture.wrapS = THREE.RepeatWrapping;
    woodTexture.wrapT = THREE.RepeatWrapping;
    woodTexture.repeat.set(4, 2);

    const base = new THREE.Mesh(
      new THREE.BoxGeometry(20, 1, 10),
      new THREE.MeshStandardMaterial({ map: woodTexture })
    );
    base.position.set(0, -0.5, 0);
    scene.add(base);

    const speakerGroup = new THREE.Group();
    const speakerBody = new THREE.Mesh(
      new THREE.BoxGeometry(0.8, 0.8, 0.4),
      new THREE.MeshStandardMaterial({ color: 0x333333 })
    );
    speakerBody.position.set(0, 0, 0);

    const speakerCone = new THREE.Mesh(
      new THREE.ConeGeometry(0.22, 0.25, 24),
      new THREE.MeshStandardMaterial({ color: 0x555555 })
    );
    speakerCone.rotation.z = -Math.PI / 2;
    speakerCone.position.set(0.48, 0, 0);

    speakerGroup.add(speakerBody, speakerCone);
    speakerGroup.position.set(-8, 0.5, 0);
    scene.add(speakerGroup);

    const zoneB = new THREE.Mesh(
      new THREE.BoxGeometry(4, 1.8, 8.4),
      new THREE.MeshStandardMaterial({
        color: 0x00ff66,
        transparent: true,
        opacity: 0.18
      })
    );
    zoneB.position.set(0, 0.4, 0);
    scene.add(zoneB);

    const wall = new THREE.Mesh(
      new THREE.BoxGeometry(0.3, 2, 2),
      new THREE.MeshStandardMaterial({ color: 0x8B4513 })
    );
    wall.position.set(5, 1, 0);
    scene.add(wall);

    const micGroup = new THREE.Group();
    const micStem = new THREE.Mesh(
      new THREE.CylinderGeometry(0.15, 0.15, 0.6, 24),
      new THREE.MeshStandardMaterial({ color: 0x7a1111 })
    );
    micStem.position.set(0, 0, 0);

    const micHead = new THREE.Mesh(
      new THREE.SphereGeometry(0.18, 24, 24),
      new THREE.MeshStandardMaterial({ color: 0xaa2222 })
    );
    micHead.position.set(0, 0.38, 0);

    micGroup.add(micStem, micHead);
    micGroup.position.set(7, 0.5, 0);
    scene.add(micGroup);

    const particleGroup = new THREE.Group();
    scene.add(particleGroup);

    const sphereGeometry = new THREE.SphereGeometry(0.08, 12, 12);
    const sphereMaterialTemplate = new THREE.MeshStandardMaterial({ color: 0xffffff });

    const spheres = [];
    const cols = 40;
    const rows = 20;
    const xMin = -7;
    const xMax = 7;
    const zMin = -4;
    const zMax = 4;

    for (let i = 0; i < cols; i++) {
      for (let j = 0; j < rows; j++) {
        const x = THREE.MathUtils.lerp(xMin, xMax, i / (cols - 1));
        const z = THREE.MathUtils.lerp(zMin, zMax, j / (rows - 1));
        const mat = sphereMaterialTemplate.clone();
        const sphere = new THREE.Mesh(sphereGeometry, mat);
        sphere.position.set(x, waveBaselineY, z);
        particleGroup.add(sphere);
        spheres.push({
          mesh: sphere,
          baseX: x,
          baseZ: z
        });
      }
    }

    function getWavelengthA() {
      return WAVE_SPEED_A / frequency;
    }

    function getWavelengthB() {
      return WAVE_SPEED_B / frequency;
    }

    function phaseAtX(x, time) {
      const omega = 2 * Math.PI * frequency;
      const lambdaA = getWavelengthA();
      const lambdaB = getWavelengthB();
      const kA = 2 * Math.PI / lambdaA;
      const kB = 2 * Math.PI / lambdaB;

      if (x < -2) {
        return kA * (x - sourceX) - omega * time;
      } else if (x <= 2) {
        const phaseBoundaryA = kA * ((-2) - sourceX);
        return phaseBoundaryA + kB * (x - (-2)) - omega * time;
      } else {
        const phaseBoundaryA = kA * ((-2) - sourceX);
        const phaseBoundaryB = phaseBoundaryA + kB * (2 - (-2));
        return phaseBoundaryB + kA * (x - 2) - omega * time;
      }
    }

    function getShadowFactor(x, z) {
      if (x > 5.3 && z > -1 && z < 1) return SHADOW_FACTOR;
      return 1.0;
    }

    function displacementAt(x, z, time) {
      const phase = phaseAtX(x, time);
      const factor = getShadowFactor(x, z);
      return amplitude * factor * Math.sin(phase);
    }

    function colorFromDisplacement(disp, amp) {
      const maxAmp = Math.max(amp, 0.0001);
      const t = THREE.MathUtils.clamp(disp / maxAmp, -1, 1);

      const blue = new THREE.Color('#0000ff');
      const white = new THREE.Color('#ffffff');
      const red = new THREE.Color('#ff0000');

      const color = new THREE.Color();
      if (t >= 0) {
        color.copy(white).lerp(red, t);
      } else {
        color.copy(white).lerp(blue, -t);
      }
      return color;
    }

    const frequencySlider = document.getElementById('frequency');
    const amplitudeSlider = document.getElementById('amplitude');
    const frequencyValue = document.getElementById('frequencyValue');
    const amplitudeValue = document.getElementById('amplitudeValue');
    const readoutFrequency = document.getElementById('readoutFrequency');
    const readoutWavelength = document.getElementById('readoutWavelength');
    const readoutSpeed = document.getElementById('readoutSpeed');
    const readoutReceiver = document.getElementById('readoutReceiver');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const resetBtn = document.getElementById('resetBtn');

    function clampFrequency(value) {
      return THREE.MathUtils.clamp(Math.round(value * 10) / 10, 0.5, 3.0);
    }

    function clampAmplitude(value) {
      return THREE.MathUtils.clamp(Math.round(value * 20) / 20, 0.1, 1.0);
    }

    function updateUI() {
      frequencyValue.textContent = frequency.toFixed(1);
      amplitudeValue.textContent = amplitude.toFixed(2);
      readoutFrequency.textContent = frequency.toFixed(1);
      readoutWavelength.textContent = getWavelengthA().toFixed(2);
      readoutSpeed.textContent = WAVE_SPEED_A.toFixed(2);

      const receiverDisp = displacementAt(7, 0, simTime);
      const receiverAmp = Math.abs(receiverDisp);
      readoutReceiver.textContent = receiverAmp.toFixed(3);

      frequencySlider.value = frequency.toFixed(1);
      amplitudeSlider.value = amplitude.toFixed(2);
      playPauseBtn.textContent = isPlaying ? 'Pause' : 'Play';
    }

    function resetSimulation() {
      isPlaying = true;
      simTime = 0;
      frequency = 1.0;
      amplitude = 0.5;
      updateUI();
    }

    frequencySlider.addEventListener('input', (e) => {
      frequency = clampFrequency(parseFloat(e.target.value));
      updateUI();
    });

    amplitudeSlider.addEventListener('input', (e) => {
      amplitude = clampAmplitude(parseFloat(e.target.value));
      updateUI();
    });

    playPauseBtn.addEventListener('click', () => {
      isPlaying = !isPlaying;
      updateUI();
    });

    resetBtn.addEventListener('click', () => {
      resetSimulation();
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        isPlaying = !isPlaying;
        updateUI();
      } else if (e.key === 'r' || e.key === 'R') {
        resetSimulation();
      } else if (e.key === 'ArrowUp') {
        frequency = clampFrequency(frequency + 0.1);
        updateUI();
      } else if (e.key === 'ArrowDown') {
        frequency = clampFrequency(frequency - 0.1);
        updateUI();
      } else if (e.key === 'ArrowRight') {
        amplitude = clampAmplitude(amplitude + 0.05);
        updateUI();
      } else if (e.key === 'ArrowLeft') {
        amplitude = clampAmplitude(amplitude - 0.05);
        updateUI();
      }
    });

    const clock = new THREE.Clock();

    window.__3D_STATE__ = {
      isPlaying: true,
      time: 0,
      frequency: 1.0,
      amplitude: 0.5,
      wavelength: 3.0,
      wavelengthB: 4.5,
      waveSpeed: 3.0,
      waveSpeedB: 4.5,
      receiverAmplitude: 0,
      particleCount: 800,
      shadowReduction: 0.3,
      obstaclePresent: true,
      zoneBVisible: true,
      sphereColorAtMax: '#ff0000',
      sphereColorAtMin: '#0000ff'
    };

    function updateState() {
      const receiverAmplitude = Math.abs(displacementAt(7, 0, simTime));

      window.__3D_STATE__.isPlaying = !!isPlaying;
      window.__3D_STATE__.time = Number.isFinite(simTime) ? simTime : 0;
      window.__3D_STATE__.frequency = Number.isFinite(frequency) ? frequency : 1.0;
      window.__3D_STATE__.amplitude = Number.isFinite(amplitude) ? amplitude : 0.5;
      window.__3D_STATE__.wavelength = Number.isFinite(getWavelengthA()) ? getWavelengthA() : 0;
      window.__3D_STATE__.wavelengthB = Number.isFinite(getWavelengthB()) ? getWavelengthB() : 0;
      window.__3D_STATE__.waveSpeed = WAVE_SPEED_A;
      window.__3D_STATE__.waveSpeedB = WAVE_SPEED_B;
      window.__3D_STATE__.receiverAmplitude = Number.isFinite(receiverAmplitude) ? receiverAmplitude : 0;
      window.__3D_STATE__.particleCount = spheres.length;
      window.__3D_STATE__.shadowReduction = SHADOW_FACTOR;
      window.__3D_STATE__.obstaclePresent = true;
      window.__3D_STATE__.zoneBVisible = zoneB.visible;
      window.__3D_STATE__.sphereColorAtMax = '#ff0000';
      window.__3D_STATE__.sphereColorAtMin = '#0000ff';
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      if (isPlaying) simTime += delta;

      for (const s of spheres) {
        const disp = displacementAt(s.baseX, s.baseZ, simTime);
        s.mesh.position.y = waveBaselineY + disp;

        const minY = waveBaselineY - amplitude;
        const maxY = waveBaselineY + amplitude;
        s.mesh.position.y = THREE.MathUtils.clamp(s.mesh.position.y, minY, maxY);

        const color = colorFromDisplacement(disp, amplitude);
        s.mesh.material.color.copy(color);
      }

      updateUI();
      updateState();

      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateUI();
    updateState();
    animate();
  </script>
</body>
</html>
