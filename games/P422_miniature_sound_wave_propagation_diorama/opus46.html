<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound Wave Propagation Diorama</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #87CEEB; }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    padding: 18px;
    border-radius: 10px;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 13px;
    min-width: 260px;
    z-index: 10;
    backdrop-filter: blur(5px);
  }
  #hud h3 {
    margin-bottom: 12px;
    font-size: 16px;
    color: #87CEEB;
    border-bottom: 1px solid rgba(135,206,235,0.3);
    padding-bottom: 8px;
  }
  .control-row {
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .control-row label {
    flex: 0 0 90px;
    color: #ccc;
  }
  .control-row input[type="range"] {
    flex: 1;
    margin: 0 8px;
    accent-color: #87CEEB;
  }
  .control-row .val {
    flex: 0 0 40px;
    text-align: right;
    color: #87CEEB;
    font-weight: bold;
  }
  .btn-row {
    display: flex;
    gap: 10px;
    margin: 12px 0;
  }
  .btn-row button {
    flex: 1;
    padding: 8px 12px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    transition: all 0.2s;
  }
  #playPauseBtn {
    background: #4CAF50;
    color: white;
  }
  #playPauseBtn.paused {
    background: #FF9800;
  }
  #resetBtn {
    background: #f44336;
    color: white;
  }
  .btn-row button:hover { opacity: 0.85; transform: scale(1.02); }

  .info-section {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.15);
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    font-size: 12px;
  }
  .info-row .info-label { color: #aaa; }
  .info-row .info-val { color: #87CEEB; font-weight: bold; }

  #bottomBar {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    padding: 10px 24px;
    border-radius: 8px;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 13px;
    display: flex;
    gap: 30px;
    z-index: 10;
    backdrop-filter: blur(5px);
  }
  .zone-label {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .zone-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .zone-a { background: #6699CC; }
  .zone-b { background: #44BB66; }
  .zone-c { background: #6699CC; }
</style>
</head>
<body>

<div id="hud">
  <h3>🔊 Sound Wave Controls</h3>
  <div class="control-row">
    <label>Frequency</label>
    <input type="range" id="freqSlider" min="0.5" max="3.0" step="0.1" value="1.0">
    <span class="val" id="freqVal">1.0</span>
  </div>
  <div class="control-row">
    <label>Amplitude</label>
    <input type="range" id="ampSlider" min="0.1" max="1.0" step="0.05" value="0.5">
    <span class="val" id="ampVal">0.5</span>
  </div>
  <div class="btn-row">
    <button id="playPauseBtn">⏸ Pause</button>
    <button id="resetBtn">↺ Reset</button>
  </div>
  <div class="info-section">
    <div class="info-row"><span class="info-label">Frequency:</span><span class="info-val" id="infoFreq">1.0 Hz</span></div>
    <div class="info-row"><span class="info-label">Wavelength (A):</span><span class="info-val" id="infoWL">3.00</span></div>
    <div class="info-row"><span class="info-label">Wavelength (B):</span><span class="info-val" id="infoWLB">4.50</span></div>
    <div class="info-row"><span class="info-label">Wave Speed (A):</span><span class="info-val" id="infoSpeed">3.0</span></div>
    <div class="info-row"><span class="info-label">Wave Speed (B):</span><span class="info-val" id="infoSpeedB">4.5</span></div>
    <div class="info-row"><span class="info-label">Receiver Amp:</span><span class="info-val" id="infoRecAmp">0.15</span></div>
  </div>
</div>

<div id="bottomBar">
  <div class="zone-label"><div class="zone-dot zone-a"></div>Zone A: Air (v=3.0)</div>
  <div class="zone-label"><div class="zone-dot zone-b"></div>Zone B: Dense (v=4.5)</div>
  <div class="zone-label"><div class="zone-dot zone-c"></div>Zone C: Air (v=3.0)</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  // --- State ---
  const WAVE_SPEED_A = 3.0;
  const WAVE_SPEED_B = 4.5;
  const SHADOW_REDUCTION = 0.3;
  const GRID_X = 40;
  const GRID_Z = 20;
  const PARTICLE_COUNT = GRID_X * GRID_Z;
  const BASELINE_Y = 1.0;
  const SOURCE_X = -8;

  let isPlaying = true;
  let simTime = 0;
  let frequency = 1.0;
  let amplitude = 0.5;
  let receiverAmplitude = 0;

  // Derived
  function getWavelengthA() { return WAVE_SPEED_A / frequency; }
  function getWavelengthB() { return WAVE_SPEED_B / frequency; }
  function getOmega() { return 2 * Math.PI * frequency; }
  function getKA() { return 2 * Math.PI / getWavelengthA(); }
  function getKB() { return 2 * Math.PI / getWavelengthB(); }

  // --- Global State ---
  window.__3D_STATE__ = {};
  function updateGlobalState() {
    const wlA = getWavelengthA();
    const wlB = getWavelengthB();
    window.__3D_STATE__ = {
      isPlaying: isPlaying,
      time: parseFloat(simTime.toFixed(4)),
      frequency: frequency,
      amplitude: amplitude,
      wavelength: parseFloat(wlA.toFixed(4)),
      wavelengthB: parseFloat(wlB.toFixed(4)),
      waveSpeed: WAVE_SPEED_A,
      waveSpeedB: WAVE_SPEED_B,
      receiverAmplitude: parseFloat(receiverAmplitude.toFixed(4)),
      particleCount: PARTICLE_COUNT,
      shadowReduction: SHADOW_REDUCTION,
      obstaclePresent: true,
      zoneBVisible: true,
      sphereColorAtMax: '#ff0000',
      sphereColorAtMin: '#0000ff'
    };
  }

  // --- Three.js Setup ---
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);
  scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 8, 14);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0, 1, 0);
  controls.update();

  // --- Lights ---
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(5, 10, 5);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 30;
  dirLight.shadow.camera.left = -12;
  dirLight.shadow.camera.right = 12;
  dirLight.shadow.camera.top = 8;
  dirLight.shadow.camera.bottom = -8;
  scene.add(dirLight);

  // --- Platform (wooden base) ---
  const platformGeo = new THREE.BoxGeometry(20, 1, 10);
  const platformCanvas = document.createElement('canvas');
  platformCanvas.width = 512;
  platformCanvas.height = 256;
  const pCtx = platformCanvas.getContext('2d');
  // Wood texture
  const woodGrad = pCtx.createLinearGradient(0, 0, 512, 256);
  woodGrad.addColorStop(0, '#8B6914');
  woodGrad.addColorStop(0.3, '#A0782C');
  woodGrad.addColorStop(0.5, '#8B6914');
  woodGrad.addColorStop(0.7, '#9B7424');
  woodGrad.addColorStop(1, '#7B5904');
  pCtx.fillStyle = woodGrad;
  pCtx.fillRect(0, 0, 512, 256);
  // Wood grain lines
  pCtx.strokeStyle = 'rgba(0,0,0,0.1)';
  pCtx.lineWidth = 1;
  for (let i = 0; i < 60; i++) {
    pCtx.beginPath();
    const y = Math.random() * 256;
    pCtx.moveTo(0, y);
    for (let x = 0; x < 512; x += 20) {
      pCtx.lineTo(x, y + Math.sin(x * 0.02) * 3 + (Math.random() - 0.5) * 2);
    }
    pCtx.stroke();
  }
  const woodTexture = new THREE.CanvasTexture(platformCanvas);
  woodTexture.wrapS = THREE.RepeatWrapping;
  woodTexture.wrapT = THREE.RepeatWrapping;
  const platformMat = new THREE.MeshStandardMaterial({ map: woodTexture, roughness: 0.8, metalness: 0.1 });
  const platform = new THREE.Mesh(platformGeo, platformMat);
  platform.position.y = -0.5;
  platform.receiveShadow = true;
  scene.add(platform);

  // Platform edge trim
  const edgeGeo = new THREE.BoxGeometry(20.2, 0.15, 10.2);
  const edgeMat = new THREE.MeshStandardMaterial({ color: 0x5C3A1E, roughness: 0.9 });
  const edgeTop = new THREE.Mesh(edgeGeo, edgeMat);
  edgeTop.position.y = 0.01;
  scene.add(edgeTop);

  // --- Speaker ---
  const speakerGroup = new THREE.Group();
  speakerGroup.position.set(-8, 0.5, 0);

  const speakerBody = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.8, 0.4),
    new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5, metalness: 0.3 })
  );
  speakerBody.castShadow = true;
  speakerGroup.add(speakerBody);

  // Speaker cone
  const coneGeo = new THREE.ConeGeometry(0.25, 0.3, 16);
  const coneMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.4, metalness: 0.2 });
  const cone = new THREE.Mesh(coneGeo, coneMat);
  cone.rotation.z = -Math.PI / 2;
  cone.position.set(0.35, 0, 0);
  speakerGroup.add(cone);

  // Speaker ring detail
  const ringGeo = new THREE.TorusGeometry(0.28, 0.03, 8, 24);
  const ringMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.5 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.set(0.21, 0, 0);
  ring.rotation.y = Math.PI / 2;
  speakerGroup.add(ring);

  // Speaker base
  const speakerBase = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.25, 0.1, 16),
    new THREE.MeshStandardMaterial({ color: 0x222222 })
  );
  speakerBase.position.y = -0.45;
  speakerGroup.add(speakerBase);

  scene.add(speakerGroup);

  // --- Zone B indicator (translucent green box) ---
  const zoneBGeo = new THREE.BoxGeometry(4, 2.5, 10);
  const zoneBMat = new THREE.MeshStandardMaterial({
    color: 0x44BB66,
    transparent: true,
    opacity: 0.12,
    side: THREE.DoubleSide,
    depthWrite: false
  });
  const zoneBBox = new THREE.Mesh(zoneBGeo, zoneBMat);
  zoneBBox.position.set(0, 1.0, 0);
  scene.add(zoneBBox);

  // Zone B boundary lines
  const zoneBorderMat = new THREE.MeshStandardMaterial({ color: 0x44BB66, transparent: true, opacity: 0.4 });
  const borderLeft = new THREE.Mesh(new THREE.BoxGeometry(0.05, 2.5, 10), zoneBorderMat);
  borderLeft.position.set(-2, 1.0, 0);
  scene.add(borderLeft);
  const borderRight = new THREE.Mesh(new THREE.BoxGeometry(0.05, 2.5, 10), zoneBorderMat);
  borderRight.position.set(2, 1.0, 0);
  scene.add(borderRight);

  // Zone labels on platform
  function createZoneLabel(text, x, color) {
    const canvas = document.createElement('canvas');
    canvas.width = 128;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = color;
    ctx.font = 'bold 28px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 64, 32);
    const tex = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.7 });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.set(x, 0.15, 4.2);
    sprite.scale.set(1.5, 0.75, 1);
    scene.add(sprite);
  }
  createZoneLabel('Zone A', -6, '#6699CC');
  createZoneLabel('Zone B', 0, '#44BB66');
  createZoneLabel('Zone C', 5, '#6699CC');

  // --- Obstacle wall ---
  const wallGeo = new THREE.BoxGeometry(0.3, 2, 2);
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9, metalness: 0.05 });
  const wall = new THREE.Mesh(wallGeo, wallMat);
  wall.position.set(5, 1, 0);
  wall.castShadow = true;
  wall.receiveShadow = true;
  scene.add(wall);

  // Wall top detail
  const wallTopGeo = new THREE.BoxGeometry(0.4, 0.1, 2.1);
  const wallTop = new THREE.Mesh(wallTopGeo, new THREE.MeshStandardMaterial({ color: 0x6B3410 }));
  wallTop.position.set(5, 2.05, 0);
  scene.add(wallTop);

  // --- Microphone (receiver) ---
  const micGroup = new THREE.Group();
  micGroup.position.set(7, 0.5, 0);

  const micBody = new THREE.Mesh(
    new THREE.CylinderGeometry(0.15, 0.15, 0.6, 16),
    new THREE.MeshStandardMaterial({ color: 0x8B0000, roughness: 0.4, metalness: 0.3 })
  );
  micBody.castShadow = true;
  micGroup.add(micBody);

  // Mic top
  const micTop = new THREE.Mesh(
    new THREE.SphereGeometry(0.17, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2),
    new THREE.MeshStandardMaterial({ color: 0xAA2222, metalness: 0.4 })
  );
  micTop.position.y = 0.3;
  micGroup.add(micTop);

  // Mic base
  const micBase = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.22, 0.08, 16),
    new THREE.MeshStandardMaterial({ color: 0x222222 })
  );
  micBase.position.y = -0.34;
  micGroup.add(micBase);

  scene.add(micGroup);

  // --- Wave Particles ---
  const spheres = [];
  const sphereGeo = new THREE.SphereGeometry(0.08, 8, 6);
  const sphereMats = []; // We'll update colors per sphere

  for (let ix = 0; ix < GRID_X; ix++) {
    for (let iz = 0; iz < GRID_Z; iz++) {
      const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3, metalness: 0.1 });
      const sphere = new THREE.Mesh(sphereGeo, mat);
      const x = -7 + (14 / (GRID_X - 1)) * ix;
      const z = -4 + (8 / (GRID_Z - 1)) * iz;
      sphere.position.set(x, BASELINE_Y, z);
      sphere.userData = { baseX: x, baseZ: z, ix: ix, iz: iz };
      scene.add(sphere);
      spheres.push(sphere);
      sphereMats.push(mat);
    }
  }

  // --- Speaker emission rings (visual effect) ---
  const emissionRings = [];
  for (let i = 0; i < 5; i++) {
    const ringGeo2 = new THREE.TorusGeometry(0.3 + i * 0.4, 0.02, 8, 32);
    const ringMat2 = new THREE.MeshBasicMaterial({ color: 0xFFAA00, transparent: true, opacity: 0.5 - i * 0.08 });
    const emRing = new THREE.Mesh(ringGeo2, ringMat2);
    emRing.position.set(-7.5, 0.5, 0);
    emRing.rotation.y = Math.PI / 2;
    scene.add(emRing);
    emissionRings.push(emRing);
  }

  // --- Color interpolation ---
  const colorBlue = new THREE.Color(0x0000FF);
  const colorWhite = new THREE.Color(0xFFFFFF);
  const colorRed = new THREE.Color(0xFF0000);
  const tempColor = new THREE.Color();

  function getWaveColor(displacement, amp) {
    const t = amp > 0 ? displacement / amp : 0;
    if (t >= 0) {
      tempColor.copy(colorWhite).lerp(colorRed, Math.min(t, 1));
    } else {
      tempColor.copy(colorWhite).lerp(colorBlue, Math.min(-t, 1));
    }
    return tempColor;
  }

  // --- Compute effective phase at position x ---
  // We need to handle the phase accumulation across zone boundaries
  // Zone A: x < -2, speed = 3.0
  // Zone B: -2 <= x <= 2, speed = 4.5
  // Zone C: x > 2, speed = 3.0
  // Phase = integral of k(x') dx' from source to x
  // k_A = omega / v_A, k_B = omega / v_B

  function computePhase(x) {
    const omega = getOmega();
    const kA = omega / WAVE_SPEED_A;
    const kB = omega / WAVE_SPEED_B;
    const srcX = SOURCE_X;

    // Source is at srcX = -8, which is in Zone A
    // Phase accumulates as we move from source to x
    let phase = 0;

    if (x <= -2) {
      // Entirely in Zone A
      phase = kA * (x - srcX);
    } else if (x <= 2) {
      // Zone A part: from srcX to -2
      phase = kA * (-2 - srcX);
      // Zone B part: from -2 to x
      phase += kB * (x - (-2));
    } else {
      // Zone A part: from srcX to -2
      phase = kA * (-2 - srcX);
      // Zone B part: from -2 to 2
      phase += kB * (2 - (-2));
      // Zone C part: from 2 to x
      phase += kA * (x - 2);
    }

    return phase;
  }

  function computeShadowFactor(x, z) {
    // Spheres behind the wall (x > 5.3) within z range (-1, 1) have amplitude reduced by 70%
    if (x > 5.3 && z > -1 && z < 1) {
      return SHADOW_REDUCTION;
    }
    return 1.0;
  }

  // --- Update wave ---
  function updateWave() {
    const omega = getOmega();

    for (let i = 0; i < spheres.length; i++) {
      const sphere = spheres[i];
      const x = sphere.userData.baseX;
      const z = sphere.userData.baseZ;

      const phase = computePhase(x);
      const shadowFactor = computeShadowFactor(x, z);
      const effectiveAmp = amplitude * shadowFactor;

      // Distance attenuation from z (lateral spread) - subtle
      const distFromCenter = Math.abs(z);
      const lateralFactor = 1.0; // Keep uniform for clarity

      const yOffset = effectiveAmp * lateralFactor * Math.sin(phase - omega * simTime);
      sphere.position.y = BASELINE_Y + yOffset;

      // Color
      const col = getWaveColor(yOffset, amplitude);
      sphereMats[i].color.copy(col);
    }

    // Receiver amplitude
    const recX = 7;
    const recZ = 0;
    const recShadow = computeShadowFactor(recX, recZ);
    receiverAmplitude = amplitude * recShadow;
  }

  // --- Speaker animation ---
  function updateSpeaker() {
    const omega = getOmega();
    const pulse = Math.sin(omega * simTime);
    cone.position.x = 0.35 + pulse * 0.05 * amplitude;

    // Emission rings
    for (let i = 0; i < emissionRings.length; i++) {
      const ring = emissionRings[i];
      const phase = (simTime * frequency + i * 0.2) % 1.0;
      const scale = 0.5 + phase * 2.0;
      ring.scale.set(scale, scale, scale);
      ring.material.opacity = (1.0 - phase) * 0.4 * amplitude;
      ring.position.x = -7.5 + phase * 2.0;
    }
  }

  // --- Mic glow ---
  function updateMic() {
    const recPhase = computePhase(7);
    const omega = getOmega();
    const val = Math.abs(Math.sin(recPhase - omega * simTime));
    const intensity = val * receiverAmplitude * 2;
    micBody.material.emissive = new THREE.Color(0xFF0000);
    micBody.material.emissiveIntensity = intensity * 0.5;
  }

  // --- UI ---
  const freqSlider = document.getElementById('freqSlider');
  const ampSlider = document.getElementById('ampSlider');
  const freqVal = document.getElementById('freqVal');
  const ampVal = document.getElementById('ampVal');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const resetBtn = document.getElementById('resetBtn');

  const infoFreq = document.getElementById('infoFreq');
  const infoWL = document.getElementById('infoWL');
  const infoWLB = document.getElementById('infoWLB');
  const infoSpeed = document.getElementById('infoSpeed');
  const infoSpeedB = document.getElementById('infoSpeedB');
  const infoRecAmp = document.getElementById('infoRecAmp');

  function updateUI() {
    freqVal.textContent = frequency.toFixed(1);
    ampVal.textContent = amplitude.toFixed(2);
    freqSlider.value = frequency;
    ampSlider.value = amplitude;

    infoFreq.textContent = frequency.toFixed(1) + ' Hz';
    infoWL.textContent = getWavelengthA().toFixed(2);
    infoWLB.textContent = getWavelengthB().toFixed(2);
    infoSpeed.textContent = WAVE_SPEED_A.toFixed(1);
    infoSpeedB.textContent = WAVE_SPEED_B.toFixed(1);
    infoRecAmp.textContent = receiverAmplitude.toFixed(3);

    if (isPlaying) {
      playPauseBtn.textContent = '⏸ Pause';
      playPauseBtn.classList.remove('paused');
    } else {
      playPauseBtn.textContent = '▶ Play';
      playPauseBtn.classList.add('paused');
    }
  }

  freqSlider.addEventListener('input', (e) => {
    frequency = parseFloat(e.target.value);
    updateUI();
  });

  ampSlider.addEventListener('input', (e) => {
    amplitude = parseFloat(e.target.value);
    updateUI();
  });

  playPauseBtn.addEventListener('click', () => {
    isPlaying = !isPlaying;
    updateUI();
  });

  resetBtn.addEventListener('click', () => {
    simTime = 0;
    frequency = 1.0;
    amplitude = 0.5;
    isPlaying = true;
    updateUI();
  });

  // --- Keyboard ---
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    switch (e.code) {
      case 'Space':
        e.preventDefault();
        isPlaying = !isPlaying;
        updateUI();
        break;
      case 'KeyR':
        simTime = 0;
        frequency = 1.0;
        amplitude = 0.5;
        isPlaying = true;
        updateUI();
        break;
      case 'ArrowUp':
        e.preventDefault();
        frequency = Math.min(3.0, parseFloat((frequency + 0.1).toFixed(1)));
        updateUI();
        break;
      case 'ArrowDown':
        e.preventDefault();
        frequency = Math.max(0.5, parseFloat((frequency - 0.1).toFixed(1)));
        updateUI();
        break;
      case 'ArrowRight':
        e.preventDefault();
        amplitude = Math.min(1.0, parseFloat((amplitude + 0.05).toFixed(2)));
        updateUI();
        break;
      case 'ArrowLeft':
        e.preventDefault();
        amplitude = Math.max(0.1, parseFloat((amplitude - 0.05).toFixed(2)));
        updateUI();
        break;
    }
  });

  // --- Animation Loop ---
  let lastTime = performance.now();

  function animate(now) {
    requestAnimationFrame(animate);

    const dt = (now - lastTime) / 1000;
    lastTime = now;

    if (isPlaying) {
      simTime += dt;
    }

    updateWave();
    updateSpeaker();
    updateMic();
    updateGlobalState();
    updateUI();

    controls.update();
    renderer.render(scene, camera);
  }

  // --- Resize ---
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // --- Start ---
  updateUI();
  updateGlobalState();
  requestAnimationFrame(animate);

})();
</script>
</body>
</html>
