<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Pump Cycle Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a0a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#debug-overlay {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(10, 5, 30, 0.85);
    border: 1px solid rgba(255, 68, 68, 0.5);
    border-radius: 8px;
    padding: 15px;
    color: #ff8888;
    font-size: 13px;
    font-family: 'Courier New', monospace;
    min-width: 280px;
    z-index: 100;
    backdrop-filter: blur(5px);
}
#debug-overlay h3 {
    color: #ff4444;
    margin-bottom: 10px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(255, 68, 68, 0.3);
    padding-bottom: 5px;
}
#debug-overlay .debug-row {
    display: flex;
    justify-content: space-between;
    margin: 4px 0;
    padding: 2px 0;
}
#debug-overlay .debug-label { color: #aa6666; }
#debug-overlay .debug-value { color: #ffaaaa; font-weight: bold; }
.pressure-bar {
    height: 4px;
    background: rgba(255,68,68,0.2);
    border-radius: 2px;
    margin-top: 2px;
    overflow: hidden;
}
.pressure-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff4444, #ff8844);
    border-radius: 2px;
    transition: width 0.1s;
}
.pressure-bar-fill.rv {
    background: linear-gradient(90deg, #4444ff, #4488ff);
}

#control-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10, 5, 30, 0.9);
    border-top: 1px solid rgba(255, 68, 68, 0.3);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 100;
    backdrop-filter: blur(5px);
    flex-wrap: wrap;
}
#control-panel button {
    background: rgba(255, 68, 68, 0.2);
    border: 1px solid rgba(255, 68, 68, 0.5);
    color: #ff8888;
    padding: 8px 16px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
}
#control-panel button:hover {
    background: rgba(255, 68, 68, 0.4);
    color: #ffffff;
}
#control-panel button.active {
    background: rgba(255, 68, 68, 0.5);
    border-color: #ff4444;
}
#control-panel label {
    color: #aa6666;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
}
#control-panel input[type="range"] {
    width: 120px;
    accent-color: #ff4444;
}
#control-panel input[type="checkbox"] {
    accent-color: #ff4444;
}
#phase-label {
    color: #ff4444;
    font-size: 16px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    min-width: 250px;
    text-align: center;
}
.slider-value {
    color: #ffaaaa;
    font-weight: bold;
    min-width: 35px;
}
#loading-screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #1a0a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    color: #ff4444;
    font-size: 18px;
    flex-direction: column;
    gap: 15px;
    transition: opacity 0.5s;
}
.spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,68,68,0.2);
    border-top-color: #ff4444;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading-screen">
    <div class="spinner"></div>
    <div>Loading Heart Simulator...</div>
</div>

<div id="debug-overlay">
    <h3>⚕ Physics Debug</h3>
    <div class="debug-row"><span class="debug-label">Phase:</span><span class="debug-value" id="dbg-phase">--</span></div>
    <div class="debug-row"><span class="debug-label">Heart Rate:</span><span class="debug-value" id="dbg-hr">72 BPM</span></div>
    <div class="debug-row"><span class="debug-label">LV Pressure:</span><span class="debug-value" id="dbg-lvp">0 mmHg</span></div>
    <div class="pressure-bar"><div class="pressure-bar-fill" id="lvp-bar" style="width:0%"></div></div>
    <div class="debug-row"><span class="debug-label">RV Pressure:</span><span class="debug-value" id="dbg-rvp">0 mmHg</span></div>
    <div class="pressure-bar"><div class="pressure-bar-fill rv" id="rvp-bar" style="width:0%"></div></div>
    <div class="debug-row"><span class="debug-label">LV Volume:</span><span class="debug-value" id="dbg-lvv">0 mL</span></div>
    <div class="debug-row"><span class="debug-label">Cycle Progress:</span><span class="debug-value" id="dbg-progress">0%</span></div>
    <div class="debug-row"><span class="debug-label">Particles:</span><span class="debug-value" id="dbg-particles">200</span></div>
    <div class="debug-row"><span class="debug-label">FPS:</span><span class="debug-value" id="dbg-fps">0</span></div>
    <div class="debug-row"><span class="debug-label">Cycle Count:</span><span class="debug-value" id="dbg-cycles">0</span></div>
    <div class="debug-row"><span class="debug-label">Model Loaded:</span><span class="debug-value" id="dbg-model">No</span></div>
</div>

<div id="control-panel">
    <button id="btn-play-pause" class="active">⏸ Pause</button>
    <label>
        ♥ Heart Rate:
        <input type="range" id="slider-heart-rate" min="40" max="180" value="72">
        <span class="slider-value" id="hr-display">72</span> BPM
    </label>
    <label>
        <input type="checkbox" id="chk-debug" checked>
        Show Debug
    </label>
    <div id="phase-label">DIASTOLE_FILLING</div>
    <button id="btn-reset">↺ Reset</button>
    <button id="btn-next-phase">⏭ Next Phase</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

// ============ STATE ============
const PHASES = ['DIASTOLE_FILLING', 'ISOVOLUMETRIC_CONTRACTION', 'SYSTOLE_EJECTION', 'ISOVOLUMETRIC_RELAXATION'];

const state = {
    isPlaying: true,
    heartRate: 72,
    currentPhase: 'DIASTOLE_FILLING',
    cycleProgress: 0,
    lvPressure: 8,
    rvPressure: 4,
    lvVolume: 130,
    debugVisible: true,
    modelLoaded: false,
    particleCount: 200,
    chamberScales: { la: 1, ra: 1, lv: 1, rv: 1 },
    fps: 0,
    phaseIndex: 0,
    cycleCount: 0
};

window.__3D_STATE__ = state;

function clamp(val, min, max) {
    if (!isFinite(val) || isNaN(val)) return min;
    return Math.max(min, Math.min(max, val));
}

function safeNum(val, fallback) {
    if (!isFinite(val) || isNaN(val)) return fallback;
    return val;
}

// ============ THREE.JS SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a0a2e);
scene.fog = new THREE.FogExp2(0x1a0a2e, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xff4444, 2, 50);
pointLight.position.set(5, 5, 5);
pointLight.castShadow = true;
scene.add(pointLight);

const fillLight = new THREE.PointLight(0x4444ff, 0.8, 30);
fillLight.position.set(-5, 3, -5);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xff6666, 0.5);
rimLight.position.set(0, 10, -10);
scene.add(rimLight);

// ============ HEART CHAMBERS ============
const heartGroup = new THREE.Group();
scene.add(heartGroup);

function createChamberMaterial(color, emissive) {
    return new THREE.MeshPhysicalMaterial({
        color: color,
        emissive: emissive,
        emissiveIntensity: 0.3,
        roughness: 0.4,
        metalness: 0.1,
        transparent: true,
        opacity: 0.85,
        clearcoat: 0.3,
        clearcoatRoughness: 0.2
    });
}

// Left Atrium
const laGeo = new THREE.SphereGeometry(0.8, 32, 32);
const laMat = createChamberMaterial(0xcc2222, 0x440000);
const laMesh = new THREE.Mesh(laGeo, laMat);
laMesh.position.set(-1.5, 2, 0);
heartGroup.add(laMesh);

// Right Atrium
const raGeo = new THREE.SphereGeometry(0.8, 32, 32);
const raMat = createChamberMaterial(0x2244cc, 0x000044);
const raMesh = new THREE.Mesh(raGeo, raMat);
raMesh.position.set(1.5, 2, 0);
heartGroup.add(raMesh);

// Left Ventricle
const lvGeo = new THREE.SphereGeometry(1.0, 32, 32);
const lvMat = createChamberMaterial(0xdd3333, 0x550000);
const lvMesh = new THREE.Mesh(lvGeo, lvMat);
lvMesh.position.set(-1.5, -0.5, 0);
heartGroup.add(lvMesh);

// Right Ventricle
const rvGeo = new THREE.SphereGeometry(1.0, 32, 32);
const rvMat = createChamberMaterial(0x3355dd, 0x000055);
const rvMesh = new THREE.Mesh(rvGeo, rvMat);
rvMesh.position.set(1.5, -0.5, 0);
heartGroup.add(rvMesh);

// ============ VALVES (Tubes connecting chambers) ============
function createValve(from, to, color) {
    const dir = new THREE.Vector3().subVectors(to, from);
    const length = dir.length();
    const valveGeo = new THREE.CylinderGeometry(0.15, 0.15, length, 16);
    const valveMat = new THREE.MeshPhysicalMaterial({
        color: color,
        emissive: color,
        emissiveIntensity: 0.2,
        roughness: 0.5,
        metalness: 0.3,
        transparent: true,
        opacity: 0.7
    });
    const valve = new THREE.Mesh(valveGeo, valveMat);
    const mid = new THREE.Vector3().addVectors(from, to).multiplyScalar(0.5);
    valve.position.copy(mid);
    valve.lookAt(to);
    valve.rotateX(Math.PI / 2);
    return valve;
}

// Mitral valve (LA -> LV)
const mitralValve = createValve(
    new THREE.Vector3(-1.5, 2, 0),
    new THREE.Vector3(-1.5, -0.5, 0),
    0xcc4444
);
heartGroup.add(mitralValve);

// Tricuspid valve (RA -> RV)
const tricuspidValve = createValve(
    new THREE.Vector3(1.5, 2, 0),
    new THREE.Vector3(1.5, -0.5, 0),
    0x4466cc
);
heartGroup.add(tricuspidValve);

// Aortic valve (LV -> out)
const aorticGeo = new THREE.CylinderGeometry(0.12, 0.12, 1.5, 16);
const aorticMat = new THREE.MeshPhysicalMaterial({
    color: 0xff6644, emissive: 0x441100, emissiveIntensity: 0.3,
    roughness: 0.4, transparent: true, opacity: 0.7
});
const aorticValve = new THREE.Mesh(aorticGeo, aorticMat);
aorticValve.position.set(-2.5, -0.5, 0);
aorticValve.rotation.z = Math.PI / 2;
heartGroup.add(aorticValve);

// Pulmonary valve (RV -> out)
const pulmonaryGeo = new THREE.CylinderGeometry(0.12, 0.12, 1.5, 16);
const pulmonaryMat = new THREE.MeshPhysicalMaterial({
    color: 0x4488ff, emissive: 0x001144, emissiveIntensity: 0.3,
    roughness: 0.4, transparent: true, opacity: 0.7
});
const pulmonaryValve = new THREE.Mesh(pulmonaryGeo, pulmonaryMat);
pulmonaryValve.position.set(2.5, -0.5, 0);
pulmonaryValve.rotation.z = Math.PI / 2;
heartGroup.add(pulmonaryValve);

// ============ CHAMBER LABELS ============
function createLabel(text, position) {
    const canvas = document.createElement('canvas');
    canvas.width = 128;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'transparent';
    ctx.fillRect(0, 0, 128, 64);
    ctx.font = 'bold 24px Arial';
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 64, 32);
    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.8 });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.copy(position);
    sprite.scale.set(1.2, 0.6, 1);
    return sprite;
}

heartGroup.add(createLabel('LA', new THREE.Vector3(-1.5, 3.2, 0)));
heartGroup.add(createLabel('RA', new THREE.Vector3(1.5, 3.2, 0)));
heartGroup.add(createLabel('LV', new THREE.Vector3(-1.5, -2, 0)));
heartGroup.add(createLabel('RV', new THREE.Vector3(1.5, -2, 0)));

// ============ OUTER HEART SHELL ============
const heartShape = new THREE.Shape();
const x = 0, y = 0;
heartShape.moveTo(x, y + 0.5);
heartShape.bezierCurveTo(x, y + 0.5, x - 0.5, y, x - 2.5, y);
heartShape.bezierCurveTo(x - 5.5, y, x - 5.5, y + 3.5, x - 5.5, y + 3.5);
heartShape.bezierCurveTo(x - 5.5, y + 5.5, x - 3.5, y + 7.78, x, y + 9.5);
heartShape.bezierCurveTo(x + 3.5, y + 7.78, x + 5.5, y + 5.5, x + 5.5, y + 3.5);
heartShape.bezierCurveTo(x + 5.5, y + 3.5, x + 5.5, y, x + 2.5, y);
heartShape.bezierCurveTo(x + 0.5, y, x, y + 0.5, x, y + 0.5);

const extrudeSettings = { depth: 1.5, bevelEnabled: true, bevelSegments: 5, bevelSize: 0.3, bevelThickness: 0.3 };
const heartShapeGeo = new THREE.ExtrudeGeometry(heartShape, extrudeSettings);
const heartShapeMat = new THREE.MeshPhysicalMaterial({
    color: 0x881122,
    emissive: 0x220000,
    emissiveIntensity: 0.2,
    roughness: 0.6,
    metalness: 0.1,
    transparent: true,
    opacity: 0.15,
    side: THREE.DoubleSide
});
const heartShapeMesh = new THREE.Mesh(heartShapeGeo, heartShapeMat);
heartShapeMesh.scale.set(0.55, -0.55, 0.55);
heartShapeMesh.position.set(0, 4.5, -1);
heartGroup.add(heartShapeMesh);

// ============ BLOOD PARTICLES ============
const PARTICLE_COUNT = 200;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
const particleColors = new Float32Array(PARTICLE_COUNT * 3);
const particleSizes = new Float32Array(PARTICLE_COUNT);
const particlePhases = new Float32Array(PARTICLE_COUNT); // individual progress
const particlePaths = new Uint8Array(PARTICLE_COUNT); // 0=left path, 1=right path

for (let i = 0; i < PARTICLE_COUNT; i++) {
    particlePhases[i] = Math.random();
    particlePaths[i] = Math.random() > 0.5 ? 1 : 0;
    particleSizes[i] = 3 + Math.random() * 5;
    
    // Red blood color with variation
    if (particlePaths[i] === 0) {
        particleColors[i * 3] = 0.8 + Math.random() * 0.2;
        particleColors[i * 3 + 1] = 0.05 + Math.random() * 0.1;
        particleColors[i * 3 + 2] = 0.05 + Math.random() * 0.1;
    } else {
        particleColors[i * 3] = 0.6 + Math.random() * 0.2;
        particleColors[i * 3 + 1] = 0.0 + Math.random() * 0.1;
        particleColors[i * 3 + 2] = 0.1 + Math.random() * 0.2;
    }
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

const particleTexture = createParticleTexture();
const particleMat = new THREE.PointsMaterial({
    size: 0.12,
    map: particleTexture,
    transparent: true,
    opacity: 0.9,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true
});

const particles = new THREE.Points(particleGeo, particleMat);
heartGroup.add(particles);

function createParticleTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 32;
    canvas.height = 32;
    const ctx = canvas.getContext('2d');
    const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
    gradient.addColorStop(0, 'rgba(255,255,255,1)');
    gradient.addColorStop(0.3, 'rgba(255,200,200,0.8)');
    gradient.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 32, 32);
    return new THREE.CanvasTexture(canvas);
}

// Blood flow path points
// Left path: LA -> LV -> Aorta out -> loop back
// Right path: RA -> RV -> Pulmonary out -> loop back
function getParticlePosition(progress, pathIndex) {
    const p = progress % 1;
    let x, y, z;
    
    if (pathIndex === 0) { // Left side
        if (p < 0.15) { // Entering LA from top
            const t = p / 0.15;
            x = -1.5 + Math.sin(t * Math.PI) * 0.3;
            y = 4 - t * 2;
            z = Math.cos(t * Math.PI * 2) * 0.3;
        } else if (p < 0.35) { // In LA
            const t = (p - 0.15) / 0.2;
            x = -1.5 + Math.sin(t * Math.PI * 2) * 0.5;
            y = 2 + Math.cos(t * Math.PI * 2) * 0.4;
            z = Math.sin(t * Math.PI * 3) * 0.3;
        } else if (p < 0.5) { // LA to LV (through mitral valve)
            const t = (p - 0.35) / 0.15;
            x = -1.5 + Math.sin(t * Math.PI) * 0.2;
            y = 2 - t * 2.5;
            z = Math.cos(t * Math.PI) * 0.2;
        } else if (p < 0.7) { // In LV
            const t = (p - 0.5) / 0.2;
            x = -1.5 + Math.sin(t * Math.PI * 2) * 0.6;
            y = -0.5 + Math.cos(t * Math.PI * 2) * 0.5;
            z = Math.sin(t * Math.PI * 3) * 0.4;
        } else if (p < 0.85) { // LV to Aorta
            const t = (p - 0.7) / 0.15;
            x = -1.5 - t * 2;
            y = -0.5 + t * 2;
            z = Math.sin(t * Math.PI) * 0.3;
        } else { // Aorta loop back
            const t = (p - 0.85) / 0.15;
            x = -3.5 + t * 2;
            y = 1.5 + t * 2.5;
            z = Math.sin(t * Math.PI * 2) * 0.5;
        }
    } else { // Right side
        if (p < 0.15) { // Entering RA from top
            const t = p / 0.15;
            x = 1.5 + Math.sin(t * Math.PI) * 0.3;
            y = 4 - t * 2;
            z = Math.cos(t * Math.PI * 2) * 0.3;
        } else if (p < 0.35) { // In RA
            const t = (p - 0.15) / 0.2;
            x = 1.5 + Math.sin(t * Math.PI * 2) * 0.5;
            y = 2 + Math.cos(t * Math.PI * 2) * 0.4;
            z = Math.sin(t * Math.PI * 3) * 0.3;
        } else if (p < 0.5) { // RA to RV (through tricuspid valve)
            const t = (p - 0.35) / 0.15;
            x = 1.5 + Math.sin(t * Math.PI) * 0.2;
            y = 2 - t * 2.5;
            z = Math.cos(t * Math.PI) * 0.2;
        } else if (p < 0.7) { // In RV
            const t = (p - 0.5) / 0.2;
            x = 1.5 + Math.sin(t * Math.PI * 2) * 0.6;
            y = -0.5 + Math.cos(t * Math.PI * 2) * 0.5;
            z = Math.sin(t * Math.PI * 3) * 0.4;
        } else if (p < 0.85) { // RV to Pulmonary
            const t = (p - 0.7) / 0.15;
            x = 1.5 + t * 2;
            y = -0.5 + t * 2;
            z = Math.sin(t * Math.PI) * 0.3;
        } else { // Pulmonary loop back
            const t = (p - 0.85) / 0.15;
            x = 3.5 - t * 2;
            y = 1.5 + t * 2.5;
            z = Math.sin(t * Math.PI * 2) * 0.5;
        }
    }
    
    return { x: safeNum(x, 0), y: safeNum(y, 0), z: safeNum(z, 0) };
}

// ============ LOAD GLTF MODEL ============
const loader = new GLTFLoader();
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
loader.setDRACOLoader(dracoLoader);

let mixer = null;

loader.load(
    'https://threejs.org/examples/models/gltf/LittlestTokyo.glb',
    (gltf) => {
        const model = gltf.scene;
        model.position.set(0, -5, -20);
        model.scale.set(0.005, 0.005, 0.005);
        scene.add(model);
        
        if (gltf.animations && gltf.animations.length > 0) {
            mixer = new THREE.AnimationMixer(model);
            const action = mixer.clipAction(gltf.animations[0]);
            action.play();
        }
        
        state.modelLoaded = true;
        document.getElementById('dbg-model').textContent = 'Yes';
        console.log('LittlestTokyo model loaded');
    },
    (progress) => {
        // Loading progress
    },
    (error) => {
        console.warn('Could not load LittlestTokyo.glb:', error);
        // Continue without the model
        state.modelLoaded = false;
    }
);

// ============ GRID AND HELPERS ============
const gridHelper = new THREE.GridHelper(20, 20, 0x331133, 0x220022);
gridHelper.position.y = -4;
scene.add(gridHelper);

// ============ ANIMATION VARIABLES ============
let cycleTime = 0;
let lastTime = performance.now();
let frameCount = 0;
let fpsTime = 0;
let manualPhaseOverride = -1;
let manualPhaseTimer = 0;

// ============ CARDIAC CYCLE LOGIC ============
function updateCardiacCycle(dt) {
    if (!state.isPlaying && manualPhaseOverride < 0) return;
    
    const cycleDuration = 60 / state.heartRate; // seconds per beat
    
    if (manualPhaseOverride >= 0) {
        // Manual phase advance
        state.phaseIndex = manualPhaseOverride;
        state.currentPhase = PHASES[state.phaseIndex];
        manualPhaseTimer += dt;
        
        // Map phase index to progress range
        const phaseStarts = [0, 40, 50, 80];
        const phaseEnds = [40, 50, 80, 100];
        const phaseProgress = Math.min(manualPhaseTimer / (cycleDuration * (phaseEnds[state.phaseIndex] - phaseStarts[state.phaseIndex]) / 100), 1);
        state.cycleProgress = safeNum(phaseStarts[state.phaseIndex] + phaseProgress * (phaseEnds[state.phaseIndex] - phaseStarts[state.phaseIndex]), 0);
        
        if (manualPhaseTimer > cycleDuration * (phaseEnds[state.phaseIndex] - phaseStarts[state.phaseIndex]) / 100) {
            manualPhaseOverride = -1;
            manualPhaseTimer = 0;
        }
    } else {
        cycleTime += dt;
        if (cycleTime >= cycleDuration) {
            cycleTime -= cycleDuration;
            state.cycleCount++;
        }
        
        state.cycleProgress = safeNum((cycleTime / cycleDuration) * 100, 0);
    }
    
    state.cycleProgress = clamp(state.cycleProgress, 0, 100);
    
    const progress = state.cycleProgress;
    
    // Determine phase
    if (progress < 40) {
        state.phaseIndex = 0;
        state.currentPhase = 'DIASTOLE_FILLING';
    } else if (progress < 50) {
        state.phaseIndex = 1;
        state.currentPhase = 'ISOVOLUMETRIC_CONTRACTION';
    } else if (progress < 80) {
        state.phaseIndex = 2;
        state.currentPhase = 'SYSTOLE_EJECTION';
    } else {
        state.phaseIndex = 3;
        state.currentPhase = 'ISOVOLUMETRIC_RELAXATION';
    }
    
    // Calculate pressures and volumes based on phase
    const p = progress / 100;
    
    switch (state.phaseIndex) {
        case 0: { // DIASTOLE_FILLING
            const t = progress / 40;
            state.lvPressure = safeNum(8 + t * 4, 8);
            state.rvPressure = safeNum(4 + t * 2, 4);
            state.lvVolume = safeNum(50 + t * 80, 50);
            // Atria contract, ventricles expand
            state.chamberScales.la = safeNum(1.0 - t * 0.2, 1);
            state.chamberScales.ra = safeNum(1.0 - t * 0.2, 1);
            state.chamberScales.lv = safeNum(1.0 + t * 0.25, 1);
            state.chamberScales.rv = safeNum(1.0 + t * 0.25, 1);
            break;
        }
        case 1: { // ISOVOLUMETRIC_CONTRACTION
            const t = (progress - 40) / 10;
            state.lvPressure = safeNum(12 + t * 68, 12);
            state.rvPressure = safeNum(6 + t * 14, 6);
            state.lvVolume = safeNum(130, 130);
            state.chamberScales.la = safeNum(0.8 + t * 0.1, 0.9);
            state.chamberScales.ra = safeNum(0.8 + t * 0.1, 0.9);
            state.chamberScales.lv = safeNum(1.25 - t * 0.05, 1.2);
            state.chamberScales.rv = safeNum(1.25 - t * 0.05, 1.2);
            break;
        }
        case 2: { // SYSTOLE_EJECTION
            const t = (progress - 50) / 30;
            state.lvPressure = safeNum(120 - t * 40, 80);
            state.rvPressure = safeNum(25 - t * 8, 17);
            state.lvVolume = safeNum(130 - t * 80, 50);
            // Ventricles contract
            state.chamberScales.la = safeNum(0.9 + t * 0.15, 1);
            state.chamberScales.ra = safeNum(0.9 + t * 0.15, 1);
            state.chamberScales.lv = safeNum(1.2 - t * 0.35, 0.85);
            state.chamberScales.rv = safeNum(1.2 - t * 0.35, 0.85);
            break;
        }
        case 3: { // ISOVOLUMETRIC_RELAXATION
            const t = (progress - 80) / 20;
            state.lvPressure = safeNum(80 - t * 72, 8);
            state.rvPressure = safeNum(17 - t * 13, 4);
            state.lvVolume = safeNum(50, 50);
            state.chamberScales.la = safeNum(1.05 - t * 0.05, 1);
            state.chamberScales.ra = safeNum(1.05 - t * 0.05, 1);
            state.chamberScales.lv = safeNum(0.85 + t * 0.15, 1);
            state.chamberScales.rv = safeNum(0.85 + t * 0.15, 1);
            break;
        }
    }
    
    // Clamp all values
    state.lvPressure = clamp(state.lvPressure, 0, 140);
    state.rvPressure = clamp(state.rvPressure, 0, 35);
    state.lvVolume = clamp(state.lvVolume, 50, 130);
    state.chamberScales.la = clamp(state.chamberScales.la, 0.7, 1.3);
    state.chamberScales.ra = clamp(state.chamberScales.ra, 0.7, 1.3);
    state.chamberScales.lv = clamp(state.chamberScales.lv, 0.7, 1.4);
    state.chamberScales.rv = clamp(state.chamberScales.rv, 0.7, 1.4);
}

function updateChamberVisuals(time) {
    // Subtle organic pulsing
    const microPulse = Math.sin(time * 8) * 0.02;
    
    const laScale = state.chamberScales.la + microPulse;
    const raScale = state.chamberScales.ra + microPulse;
    const lvScale = state.chamberScales.lv + microPulse;
    const rvScale = state.chamberScales.rv + microPulse;
    
    laMesh.scale.setScalar(safeNum(laScale, 1));
    raMesh.scale.setScalar(safeNum(raScale, 1));
    lvMesh.scale.setScalar(safeNum(lvScale, 1));
    rvMesh.scale.setScalar(safeNum(rvScale, 1));
    
    // Emissive intensity based on pressure
    const lvIntensity = clamp(state.lvPressure / 120, 0, 1);
    const rvIntensity = clamp(state.rvPressure / 25, 0, 1);
    
    lvMat.emissiveIntensity = 0.2 + lvIntensity * 0.5;
    rvMat.emissiveIntensity = 0.2 + rvIntensity * 0.5;
    laMat.emissiveIntensity = 0.2 + (1 - lvIntensity) * 0.3;
    raMat.emissiveIntensity = 0.2 + (1 - rvIntensity) * 0.3;
    
    // Valve opacity based on phase
    const valvesOpen = state.phaseIndex === 0; // Only open during diastole filling
    const ejectionValvesOpen = state.phaseIndex === 2; // Aortic/pulmonary open during systole
    
    mitralValve.material.opacity = valvesOpen ? 0.9 : 0.3;
    tricuspidValve.material.opacity = valvesOpen ? 0.9 : 0.3;
    aorticValve.material.opacity = ejectionValvesOpen ? 0.9 : 0.3;
    pulmonaryValve.material.opacity = ejectionValvesOpen ? 0.9 : 0.3;
    
    // Valve color glow
    mitralValve.material.emissiveIntensity = valvesOpen ? 0.5 : 0.1;
    tricuspidValve.material.emissiveIntensity = valvesOpen ? 0.5 : 0.1;
    aorticValve.material.emissiveIntensity = ejectionValvesOpen ? 0.5 : 0.1;
    pulmonaryValve.material.emissiveIntensity = ejectionValvesOpen ? 0.5 : 0.1;
}

function updateParticles(dt) {
    const positions = particleGeo.attributes.position.array;
    const cycleDuration = 60 / state.heartRate;
    const speed = (1 / cycleDuration) * dt;
    
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        if (state.isPlaying || manualPhaseOverride >= 0) {
            particlePhases[i] += speed * (0.8 + Math.random() * 0.4);
            if (particlePhases[i] > 1) particlePhases[i] -= 1;
        }
        
        const pos = getParticlePosition(particlePhases[i], particlePaths[i]);
        positions[i * 3] = pos.x;
        positions[i * 3 + 1] = pos.y;
        positions[i * 3 + 2] = pos.z;
    }
    
    particleGeo.attributes.position.needsUpdate = true;
}

// ============ UI UPDATE ============
function updateDebugOverlay() {
    if (!state.debugVisible) return;
    
    document.getElementById('dbg-phase').textContent = state.currentPhase;
    document.getElementById('dbg-hr').textContent = state.heartRate + ' BPM';
    document.getElementById('dbg-lvp').textContent = Math.round(state.lvPressure) + ' mmHg';
    document.getElementById('dbg-rvp').textContent = Math.round(state.rvPressure) + ' mmHg';
    document.getElementById('dbg-lvv').textContent = Math.round(state.lvVolume) + ' mL';
    document.getElementById('dbg-progress').textContent = Math.round(state.cycleProgress) + '%';
    document.getElementById('dbg-particles').textContent = state.particleCount;
    document.getElementById('dbg-fps').textContent = state.fps;
    document.getElementById('dbg-cycles').textContent = state.cycleCount;
    
    document.getElementById('lvp-bar').style.width = clamp(state.lvPressure / 140 * 100, 0, 100) + '%';
    document.getElementById('rvp-bar').style.width = clamp(state.rvPressure / 35 * 100, 0, 100) + '%';
}

function updatePhaseLabel() {
    const phaseNames = {
        'DIASTOLE_FILLING': '❤ Diastole Filling',
        'ISOVOLUMETRIC_CONTRACTION': '💪 Isovolumetric Contraction',
        'SYSTOLE_EJECTION': '🔴 Systole Ejection',
        'ISOVOLUMETRIC_RELAXATION': '😌 Isovolumetric Relaxation'
    };
    document.getElementById('phase-label').textContent = phaseNames[state.currentPhase] || state.currentPhase;
}

// ============ CONTROLS ============
const btnPlayPause = document.getElementById('btn-play-pause');
const sliderHR = document.getElementById('slider-heart-rate');
const hrDisplay = document.getElementById('hr-display');
const chkDebug = document.getElementById('chk-debug');
const btnReset = document.getElementById('btn-reset');
const btnNextPhase = document.getElementById('btn-next-phase');
const debugOverlay = document.getElementById('debug-overlay');

btnPlayPause.addEventListener('click', togglePlayPause);
sliderHR.addEventListener('input', () => {
    state.heartRate = parseInt(sliderHR.value);
    hrDisplay.textContent = state.heartRate;
});
chkDebug.addEventListener('change', () => {
    state.debugVisible = chkDebug.checked;
    debugOverlay.style.display = state.debugVisible ? 'block' : 'none';
});
btnReset.addEventListener('click', resetState);
btnNextPhase.addEventListener('click', advancePhase);

function togglePlayPause() {
    state.isPlaying = !state.isPlaying;
    btnPlayPause.textContent = state.isPlaying ? '⏸ Pause' : '▶ Play';
    btnPlayPause.classList.toggle('active', state.isPlaying);
}

function resetState() {
    state.isPlaying = true;
    state.heartRate = 72;
    state.cycleProgress = 0;
    state.phaseIndex = 0;
    state.currentPhase = 'DIASTOLE_FILLING';
    state.lvPressure = 8;
    state.rvPressure = 4;
    state.lvVolume = 130;
    state.cycleCount = 0;
    state.chamberScales = { la: 1, ra: 1, lv: 1, rv: 1 };
    cycleTime = 0;
    manualPhaseOverride = -1;
    manualPhaseTimer = 0;
    
    sliderHR.value = 72;
    hrDisplay.textContent = '72';
    btnPlayPause.textContent = '⏸ Pause';
    btnPlayPause.classList.add('active');
    chkDebug.checked = true;
    state.debugVisible = true;
    debugOverlay.style.display = 'block';
    
    camera.position.set(0, 2, 12);
    controls.target.set(0, 0, 0);
    controls.update();
}

function advancePhase() {
    const nextPhase = (state.phaseIndex + 1) % 4;
    manualPhaseOverride = nextPhase;
    manualPhaseTimer = 0;
    state.phaseIndex = nextPhase;
    state.currentPhase = PHASES[nextPhase];
    
    // Set cycle progress to start of next phase
    const phaseStarts = [0, 40, 50, 80];
    cycleTime = (phaseStarts[nextPhase] / 100) * (60 / state.heartRate);
}

// Keyboard controls
document.addEventListener('keydown', (e) => {
    switch (e.code) {
        case 'Space':
            e.preventDefault();
            togglePlayPause();
            break;
        case 'KeyD':
            chkDebug.checked = !chkDebug.checked;
            state.debugVisible = chkDebug.checked;
            debugOverlay.style.display = state.debugVisible ? 'block' : 'none';
            break;
        case 'KeyR':
            resetState();
            break;
        case 'ArrowUp':
            e.preventDefault();
            state.heartRate = clamp(state.heartRate + 5, 40, 180);
            sliderHR.value = state.heartRate;
            hrDisplay.textContent = state.heartRate;
            break;
        case 'ArrowDown':
            e.preventDefault();
            state.heartRate = clamp(state.heartRate - 5, 40, 180);
            sliderHR.value = state.heartRate;
            hrDisplay.textContent = state.heartRate;
            break;
        case 'KeyN':
            advancePhase();
            break;
    }
});

// ============ WINDOW RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    
    const now = performance.now();
    const dt = Math.min((now - lastTime) / 1000, 0.1); // Cap dt to prevent huge jumps
    lastTime = now;
    
    // FPS counter
    frameCount++;
    fpsTime += dt;
    if (fpsTime >= 0.5) {
        state.fps = Math.round(frameCount / fpsTime);
        frameCount = 0;
        fpsTime = 0;
    }
    
    const elapsedTime = clock.getElapsedTime();
    
    // Update cardiac cycle
    updateCardiacCycle(dt);
    
    // Update visuals
    updateChamberVisuals(elapsedTime);
    updateParticles(dt);
    
    // Gentle heart rotation
    heartGroup.rotation.y = Math.sin(elapsedTime * 0.3) * 0.1;
    
    // Point light pulsing with heartbeat
    const pulseIntensity = 1.5 + (state.lvPressure / 120) * 1.5;
    pointLight.intensity = safeNum(pulseIntensity, 2);
    
    // Update mixer for GLTF animations
    if (mixer) {
        mixer.update(dt);
    }
    
    // Update controls
    controls.update();
    
    // Update UI
    updateDebugOverlay();
    updatePhaseLabel();
    
    // Render
    renderer.render(scene, camera);
}

// Hide loading screen
setTimeout(() => {
    const loadingScreen = document.getElementById('loading-screen');
    loadingScreen.style.opacity = '0';
    setTimeout(() => loadingScreen.style.display = 'none', 500);
}, 1000);

animate();
</script>
