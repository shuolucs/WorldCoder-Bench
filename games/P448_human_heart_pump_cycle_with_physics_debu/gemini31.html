<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Pump Cycle Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a0a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .panel {
            position: absolute;
            background: rgba(15, 10, 30, 0.85);
            border: 1px solid rgba(100, 100, 255, 0.3);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 10;
        }
        #debug-overlay {
            top: 20px;
            right: 20px;
            width: 280px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            transition: opacity 0.3s;
        }
        #debug-overlay h3 {
            margin: 0 0 10px 0;
            color: #44aaff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 16px;
            border-bottom: 1px solid rgba(100, 100, 255, 0.3);
            padding-bottom: 5px;
        }
        .debug-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .debug-label { color: #aaa; }
        .debug-value { font-weight: bold; color: #fff; }
        
        #control-panel {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            width: auto;
            white-space: nowrap;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        button {
            background: #2a2a4a;
            color: white;
            border: 1px solid #44aaff;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover {
            background: #44aaff;
            color: #000;
        }
        input[type="range"] {
            accent-color: #ff4444;
        }
        #phase-label {
            font-size: 20px;
            font-weight: bold;
            color: #ff4444;
            text-align: center;
            min-width: 250px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #44aaff;
            z-index: 20;
            pointer-events: none;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div id="loading">Loading Scene...</div>
    <div id="canvas-container"></div>

    <div id="debug-overlay" class="panel">
        <h3>Physics & State Debug</h3>
        <div class="debug-row"><span class="debug-label">Phase:</span><span class="debug-value" id="dbg-phase">DIASTOLE</span></div>
        <div class="debug-row"><span class="debug-label">Heart Rate:</span><span class="debug-value" id="dbg-hr">72 BPM</span></div>
        <div class="debug-row"><span class="debug-label">LV Pressure:</span><span class="debug-value" id="dbg-lvp">8 mmHg</span></div>
        <div class="debug-row"><span class="debug-label">RV Pressure:</span><span class="debug-value" id="dbg-rvp">4 mmHg</span></div>
        <div class="debug-row"><span class="debug-label">LV Volume:</span><span class="debug-value" id="dbg-lvv">130 mL</span></div>
        <div class="debug-row"><span class="debug-label">Progress:</span><span class="debug-value" id="dbg-prog">0%</span></div>
        <div class="debug-row"><span class="debug-label">Particles:</span><span class="debug-value" id="dbg-part">200</span></div>
        <div class="debug-row"><span class="debug-label">FPS:</span><span class="debug-value" id="dbg-fps">60</span></div>
    </div>

    <div id="control-panel" class="panel">
        <div class="control-group">
            <button id="btn-play-pause">Pause (Space)</button>
        </div>
        <div class="control-group">
            <label for="slider-heart-rate" style="font-size: 12px; color: #aaa;">Heart Rate (BPM)</label>
            <input type="range" id="slider-heart-rate" min="40" max="180" value="72">
        </div>
        <div class="control-group">
            <div id="phase-label">DIASTOLE FILLING</div>
        </div>
        <div class="control-group">
            <button id="btn-next-phase">Next Phase (N)</button>
        </div>
        <div class="control-group">
            <button id="btn-reset">Reset (R)</button>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="chk-debug" checked>
            <label for="chk-debug">Debug (D)</label>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/DRACOLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            isPlaying: true,
            heartRate: 72,
            currentPhase: 'DIASTOLE_FILLING',
            cycleProgress: 0,
            lvPressure: 8,
            rvPressure: 4,
            lvVolume: 130,
            debugVisible: true,
            modelLoaded: false,
            particleCount: 200,
            chamberScales: { la: 1, ra: 1, lv: 1, rv: 1 },
            fps: 0,
            phaseIndex: 0,
            cycleCount: 0
        };

        const PHASES = [
            'DIASTOLE_FILLING',
            'ISOVOLUMETRIC_CONTRACTION',
            'SYSTOLE_EJECTION',
            'ISOVOLUMETRIC_RELAXATION'
        ];

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a0a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xff4444, 2, 50);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        const fillLight = new THREE.DirectionalLight(0x8888ff, 1);
        fillLight.position.set(-5, 3, 5);
        scene.add(fillLight);

        // --- BACKGROUND MODEL ---
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        
        const gltfLoader = new GLTFLoader();
        gltfLoader.setDRACOLoader(dracoLoader);

        gltfLoader.load(
            'https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/models/gltf/LittlestTokyo.glb',
            (gltf) => {
                const model = gltf.scene;
                model.position.set(0, -5, -20);
                model.scale.set(0.005, 0.005, 0.005);
                
                // Dim the background model
                model.traverse((child) => {
                    if (child.isMesh && child.material) {
                        child.material.color.multiplyScalar(0.3);
                        child.material.emissive.multiplyScalar(0.2);
                    }
                });
                
                scene.add(model);
                window.__3D_STATE__.modelLoaded = true;
                document.getElementById('loading').style.display = 'none';
            },
            undefined,
            (error) => {
                console.error('Error loading background model:', error);
                document.getElementById('loading').innerText = 'Model Load Failed (Continuing...)';
                setTimeout(() => document.getElementById('loading').style.display = 'none', 2000);
            }
        );

        // --- PROCEDURAL HEART MODEL ---
        const heartGroup = new THREE.Group();
        scene.add(heartGroup);

        const matRed = new THREE.MeshPhongMaterial({ color: 0xdd2222, shininess: 60 });
        const matBlue = new THREE.MeshPhongMaterial({ color: 0x2222dd, shininess: 60 });
        const matValve = new THREE.MeshPhongMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.5 });

        const sphereGeo = new THREE.SphereGeometry(1, 32, 32);

        // Left Atrium (Red)
        const laMesh = new THREE.Mesh(sphereGeo, matRed);
        laMesh.scale.setScalar(0.8);
        laMesh.position.set(-1.5, 2, 0);
        heartGroup.add(laMesh);

        // Right Atrium (Blue)
        const raMesh = new THREE.Mesh(sphereGeo, matBlue);
        raMesh.scale.setScalar(0.8);
        raMesh.position.set(1.5, 2, 0);
        heartGroup.add(raMesh);

        // Left Ventricle (Red)
        const lvMesh = new THREE.Mesh(sphereGeo, matRed);
        lvMesh.scale.setScalar(1.0);
        lvMesh.position.set(-1.5, -0.5, 0);
        heartGroup.add(lvMesh);

        // Right Ventricle (Blue)
        const rvMesh = new THREE.Mesh(sphereGeo, matBlue);
        rvMesh.scale.setScalar(1.0);
        rvMesh.position.set(1.5, -0.5, 0);
        heartGroup.add(rvMesh);

        // Valves (Cylinders)
        const valveGeo = new THREE.CylinderGeometry(0.4, 0.4, 1.5, 16);
        
        const mitralValve = new THREE.Mesh(valveGeo, matValve);
        mitralValve.position.set(-1.5, 0.75, 0);
        heartGroup.add(mitralValve);

        const tricuspidValve = new THREE.Mesh(valveGeo, matValve);
        tricuspidValve.position.set(1.5, 0.75, 0);
        heartGroup.add(tricuspidValve);

        // --- BLOOD FLOW PARTICLES ---
        const particleCount = window.__3D_STATE__.particleCount;
        const particlesGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleData = [];

        for (let i = 0; i < particleCount; i++) {
            particlePositions[i * 3] = 0;
            particlePositions[i * 3 + 1] = 0;
            particlePositions[i * 3 + 2] = 0;

            particleData.push({
                side: i % 2 === 0 ? 'L' : 'R',
                offset: Math.random(),
                speedMult: 0.8 + Math.random() * 0.4,
                jitter: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.4,
                    (Math.random() - 0.5) * 0.4,
                    (Math.random() - 0.5) * 0.4
                )
            });
        }

        particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        
        // Create a custom shader material for particles to color them based on side
        const particleMat = new THREE.PointsMaterial({
            size: 0.15,
            map: createCircleTexture(),
            transparent: true,
            opacity: 0.8,
            vertexColors: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const particleColors = new Float32Array(particleCount * 3);
        for(let i=0; i<particleCount; i++) {
            const isLeft = particleData[i].side === 'L';
            particleColors[i*3] = isLeft ? 1.0 : 0.2;     // R
            particleColors[i*3+1] = isLeft ? 0.2 : 0.2;   // G
            particleColors[i*3+2] = isLeft ? 0.2 : 1.0;   // B
        }
        particlesGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

        const particleSystem = new THREE.Points(particlesGeo, particleMat);
        scene.add(particleSystem);

        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.arc(16, 16, 14, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            return new THREE.CanvasTexture(canvas);
        }

        // --- SIMULATION LOGIC ---
        let cycleTime = 0;
        let lastTime = performance.now();
        let frameCount = 0;
        let lastFpsTime = performance.now();

        function clamp(val, min, max) {
            return Math.max(min, Math.min(max, val));
        }

        function lerp(start, end, t) {
            return start + (end - start) * clamp(t, 0, 1);
        }

        function updateSimulation(dt) {
            const state = window.__3D_STATE__;
            if (!state.isPlaying) return;

            const cycleDuration = 60 / state.heartRate;
            cycleTime += dt;
            
            if (cycleTime >= cycleDuration) {
                cycleTime %= cycleDuration;
                state.cycleCount++;
            }

            const progress = cycleTime / cycleDuration;
            state.cycleProgress = progress * 100;

            // Determine Phase
            if (progress < 0.4) state.phaseIndex = 0;
            else if (progress < 0.5) state.phaseIndex = 1;
            else if (progress < 0.8) state.phaseIndex = 2;
            else state.phaseIndex = 3;

            state.currentPhase = PHASES[state.phaseIndex];

            // Calculate Pressures and Volumes based on Wiggers diagram approximation
            // LV Volume (50 - 130)
            if (progress < 0.4) {
                state.lvVolume = lerp(50, 130, progress / 0.4);
            } else if (progress < 0.5) {
                state.lvVolume = 130;
            } else if (progress < 0.8) {
                // Ejection
                const t = (progress - 0.5) / 0.3;
                state.lvVolume = lerp(130, 50, Math.sin(t * Math.PI / 2));
            } else {
                state.lvVolume = 50;
            }

            // LV Pressure (8 - 120)
            if (progress < 0.4) {
                state.lvPressure = lerp(4, 12, progress / 0.4);
            } else if (progress < 0.5) {
                state.lvPressure = lerp(12, 80, (progress - 0.4) / 0.1);
            } else if (progress < 0.65) {
                state.lvPressure = lerp(80, 120, Math.sin(((progress - 0.5) / 0.15) * Math.PI / 2));
            } else if (progress < 0.8) {
                state.lvPressure = lerp(120, 100, (progress - 0.65) / 0.15);
            } else {
                state.lvPressure = lerp(100, 4, (progress - 0.8) / 0.2);
            }

            // RV Pressure (4 - 25) - scaled down version of LV
            state.rvPressure = clamp(state.lvPressure * 0.2 + 2, 4, 25);

            // Ensure no NaNs
            state.lvVolume = state.lvVolume || 50;
            state.lvPressure = state.lvPressure || 8;
            state.rvPressure = state.rvPressure || 4;

            // Chamber Scaling Animation
            let laScale = 1, raScale = 1, lvScale = 1, rvScale = 1;

            if (state.phaseIndex === 0) {
                // Diastole: Atria contract at end, Ventricles expand
                const atrialContraction = progress > 0.3 ? lerp(1, 0.8, (progress - 0.3) / 0.1) : 1;
                laScale = atrialContraction;
                raScale = atrialContraction;
                lvScale = lerp(0.8, 1.1, progress / 0.4);
                rvScale = lerp(0.8, 1.1, progress / 0.4);
            } else if (state.phaseIndex === 1) {
                // Isovolumetric Contraction: Ventricles tense
                lvScale = 1.1;
                rvScale = 1.1;
            } else if (state.phaseIndex === 2) {
                // Systole: Ventricles contract
                const t = (progress - 0.5) / 0.3;
                lvScale = lerp(1.1, 0.7, Math.sin(t * Math.PI / 2));
                rvScale = lerp(1.1, 0.7, Math.sin(t * Math.PI / 2));
            } else {
                // Isovolumetric Relaxation: Ventricles relax
                lvScale = lerp(0.7, 0.8, (progress - 0.8) / 0.2);
                rvScale = lerp(0.7, 0.8, (progress - 0.8) / 0.2);
            }

            state.chamberScales = { la: laScale, ra: raScale, lv: lvScale, rv: rvScale };

            laMesh.scale.setScalar(0.8 * laScale);
            raMesh.scale.setScalar(0.8 * raScale);
            lvMesh.scale.setScalar(1.0 * lvScale);
            rvMesh.scale.setScalar(1.0 * rvScale);

            // Update Particles
            const positions = particleSystem.geometry.attributes.position.array;
            
            for (let i = 0; i < particleCount; i++) {
                const pData = particleData[i];
                // Local particle progress based on global progress + offset
                let pProg = (progress + pData.offset) % 1.0;
                
                let x = 0, y = 0, z = 0;
                const baseX = pData.side === 'L' ? -1.5 : 1.5;

                // Path logic based on phase
                if (pProg < 0.4) {
                    // Atria to Ventricle
                    const t = pProg / 0.4;
                    y = lerp(2.5, -0.5, t);
                    x = baseX + Math.sin(t * Math.PI) * 0.2;
                } else if (pProg < 0.5) {
                    // Hold in ventricle
                    y = -0.5;
                    x = baseX;
                } else if (pProg < 0.8) {
                    // Ventricle to Out
                    const t = (pProg - 0.5) / 0.3;
                    y = lerp(-0.5, 3.5, t);
                    x = baseX + (pData.side === 'L' ? 1 : -1) * t * 1.5; // Curve outward
                } else {
                    // Reset/Hold above atria
                    y = 2.5;
                    x = baseX;
                }

                // Add jitter
                x += pData.jitter.x;
                y += pData.jitter.y;
                z += pData.jitter.z;

                positions[i * 3] = x;
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = z;
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;
        }

        // --- UI UPDATES ---
        const uiElements = {
            phase: document.getElementById('dbg-phase'),
            hr: document.getElementById('dbg-hr'),
            lvp: document.getElementById('dbg-lvp'),
            rvp: document.getElementById('dbg-rvp'),
            lvv: document.getElementById('dbg-lvv'),
            prog: document.getElementById('dbg-prog'),
            part: document.getElementById('dbg-part'),
            fps: document.getElementById('dbg-fps'),
            phaseLabel: document.getElementById('phase-label'),
            btnPlay: document.getElementById('btn-play-pause'),
            sliderHr: document.getElementById('slider-heart-rate'),
            chkDebug: document.getElementById('chk-debug'),
            debugOverlay: document.getElementById('debug-overlay')
        };

        function updateUI() {
            const state = window.__3D_STATE__;
            
            uiElements.phase.innerText = state.currentPhase.replace('_', ' ');
            uiElements.hr.innerText = `${Math.round(state.heartRate)} BPM`;
            uiElements.lvp.innerText = `${Math.round(state.lvPressure)} mmHg`;
            uiElements.rvp.innerText = `${Math.round(state.rvPressure)} mmHg`;
            uiElements.lvv.innerText = `${Math.round(state.lvVolume)} mL`;
            uiElements.prog.innerText = `${Math.round(state.cycleProgress)}%`;
            uiElements.part.innerText = state.particleCount;
            uiElements.fps.innerText = state.fps;
            
            uiElements.phaseLabel.innerText = state.currentPhase.replace('_', ' ');
            uiElements.btnPlay.innerText = state.isPlaying ? 'Pause (Space)' : 'Play (Space)';
            
            if (state.debugVisible) {
                uiElements.debugOverlay.style.opacity = '1';
                uiElements.debugOverlay.style.pointerEvents = 'auto';
            } else {
                uiElements.debugOverlay.style.opacity = '0';
                uiElements.debugOverlay.style.pointerEvents = 'none';
            }
        }

        // --- EVENT LISTENERS ---
        uiElements.btnPlay.addEventListener('click', () => {
            window.__3D_STATE__.isPlaying = !window.__3D_STATE__.isPlaying;
        });

        uiElements.sliderHr.addEventListener('input', (e) => {
            window.__3D_STATE__.heartRate = parseInt(e.target.value);
        });

        uiElements.chkDebug.addEventListener('change', (e) => {
            window.__3D_STATE__.debugVisible = e.target.checked;
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            window.__3D_STATE__.heartRate = 72;
            window.__3D_STATE__.isPlaying = true;
            uiElements.sliderHr.value = 72;
            cycleTime = 0;
        });

        document.getElementById('btn-next-phase').addEventListener('click', () => {
            const state = window.__3D_STATE__;
            const cycleDuration = 60 / state.heartRate;
            let nextProgress = 0;
            if (state.phaseIndex === 0) nextProgress = 0.4;
            else if (state.phaseIndex === 1) nextProgress = 0.5;
            else if (state.phaseIndex === 2) nextProgress = 0.8;
            else nextProgress = 0.0;
            
            cycleTime = nextProgress * cycleDuration;
        });

        window.addEventListener('keydown', (e) => {
            const state = window.__3D_STATE__;
            switch(e.key.toLowerCase()) {
                case ' ':
                    state.isPlaying = !state.isPlaying;
                    break;
                case 'd':
                    state.debugVisible = !state.debugVisible;
                    uiElements.chkDebug.checked = state.debugVisible;
                    break;
                case 'r':
                    document.getElementById('btn-reset').click();
                    break;
                case 'n':
                    document.getElementById('btn-next-phase').click();
                    break;
                case 'arrowup':
                    state.heartRate = Math.min(180, state.heartRate + 5);
                    uiElements.sliderHr.value = state.heartRate;
                    break;
                case 'arrowdown':
                    state.heartRate = Math.max(40, state.heartRate - 5);
                    uiElements.sliderHr.value = state.heartRate;
                    break;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const dt = Math.min((now - lastTime) / 1000, 0.1); // Cap dt to prevent huge jumps
            lastTime = now;

            // FPS Calculation
            frameCount++;
            if (now - lastFpsTime >= 1000) {
                window.__3D_STATE__.fps = Math.round((frameCount * 1000) / (now - lastFpsTime));
                frameCount = 0;
                lastFpsTime = now;
            }

            updateSimulation(dt);
            controls.update();
            renderer.render(scene, camera);
            updateUI();
        }

        animate();
    </script>
</body>
</html>
