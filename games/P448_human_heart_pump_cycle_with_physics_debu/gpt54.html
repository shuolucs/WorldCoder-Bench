<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Three.js Heart Pump Cycle Debug Demo</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a0a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #debug-overlay {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 280px;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      backdrop-filter: blur(6px);
      font-size: 13px;
      line-height: 1.5;
      z-index: 20;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }

    #debug-overlay h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #ff9aa2;
      letter-spacing: 0.5px;
    }

    .debug-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 3px 0;
    }

    .debug-row:last-child {
      border-bottom: none;
    }

    #control-panel {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      width: min(960px, calc(100% - 24px));
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 16px;
      backdrop-filter: blur(6px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }

    #control-panel button,
    #control-panel input[type="range"] {
      cursor: pointer;
    }

    #control-panel button {
      background: #41204f;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
    }

    #control-panel button:hover {
      background: #5a2b6d;
    }

    #phase-label {
      font-size: 20px;
      font-weight: 700;
      color: #ff8aa0;
      padding: 6px 10px;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      min-width: 220px;
      text-align: center;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #f0e8ff;
      font-size: 14px;
    }

    .control-group label {
      white-space: nowrap;
    }

    #slider-heart-rate {
      width: 180px;
    }

    #hr-value {
      min-width: 54px;
      display: inline-block;
      text-align: right;
      color: #ffcfda;
      font-weight: 700;
    }

    #help {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 20;
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      background: rgba(0,0,0,0.25);
      border-radius: 8px;
      padding: 8px 10px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="help">
      Keys: Space Play/Pause · D Debug · R Reset · ↑/↓ BPM · N Next Phase
    </div>

    <div id="debug-overlay">
      <h3>Physics Debug</h3>
      <div class="debug-row"><span>Phase</span><span id="dbg-phase">-</span></div>
      <div class="debug-row"><span>Heart Rate</span><span id="dbg-hr">-</span></div>
      <div class="debug-row"><span>LV Pressure</span><span id="dbg-lvp">-</span></div>
      <div class="debug-row"><span>RV Pressure</span><span id="dbg-rvp">-</span></div>
      <div class="debug-row"><span>LV Volume</span><span id="dbg-lvv">-</span></div>
      <div class="debug-row"><span>Cycle Progress</span><span id="dbg-progress">-</span></div>
      <div class="debug-row"><span>Particles Active</span><span id="dbg-particles">-</span></div>
      <div class="debug-row"><span>FPS</span><span id="dbg-fps">-</span></div>
      <div class="debug-row"><span>City Model Loaded</span><span id="dbg-model">-</span></div>
      <div class="debug-row"><span>Cycle Count</span><span id="dbg-cyclecount">-</span></div>
    </div>

    <div id="control-panel">
      <button id="btn-play-pause">Pause</button>

      <div class="control-group">
        <label for="slider-heart-rate">Heart Rate</label>
        <input id="slider-heart-rate" type="range" min="40" max="180" step="1" value="72" />
        <span id="hr-value">72 BPM</span>
      </div>

      <div class="control-group">
        <label for="chk-debug">Show Debug</label>
        <input id="chk-debug" type="checkbox" checked />
      </div>

      <div id="phase-label">DIASTOLE_FILLING</div>

      <button id="btn-reset">Reset</button>
      <button id="btn-next-phase">Next Phase</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const PHASES = [
      'DIASTOLE_FILLING',
      'ISOVOLUMETRIC_CONTRACTION',
      'SYSTOLE_EJECTION',
      'ISOVOLUMETRIC_RELAXATION'
    ];

    const PHASE_RANGES = [
      [0.0, 0.4],
      [0.4, 0.5],
      [0.5, 0.8],
      [0.8, 1.0]
    ];

    const clamp = (v, min, max) => Math.min(max, Math.max(min, Number.isFinite(v) ? v : min));
    const lerp = (a, b, t) => a + (b - a) * t;
    const smoothstep = (t) => t * t * (3 - 2 * t);
    const safeNum = (v, fallback = 0) => Number.isFinite(v) ? v : fallback;

    const state = window.__3D_STATE__ = {
      isPlaying: true,
      heartRate: 72,
      currentPhase: 'DIASTOLE_FILLING',
      cycleProgress: 0,
      lvPressure: 8,
      rvPressure: 4,
      lvVolume: 130,
      debugVisible: true,
      modelLoaded: false,
      particleCount: 200,
      chamberScales: { la: 1, ra: 1, lv: 1, rv: 1 },
      fps: 0,
      phaseIndex: 0,
      cycleCount: 0
    };

    const app = document.getElementById('app');
    const debugOverlay = document.getElementById('debug-overlay');
    const btnPlayPause = document.getElementById('btn-play-pause');
    const sliderHeartRate = document.getElementById('slider-heart-rate');
    const hrValue = document.getElementById('hr-value');
    const chkDebug = document.getElementById('chk-debug');
    const phaseLabel = document.getElementById('phase-label');
    const btnReset = document.getElementById('btn-reset');
    const btnNextPhase = document.getElementById('btn-next-phase');

    const dbg = {
      phase: document.getElementById('dbg-phase'),
      hr: document.getElementById('dbg-hr'),
      lvp: document.getElementById('dbg-lvp'),
      rvp: document.getElementById('dbg-rvp'),
      lvv: document.getElementById('dbg-lvv'),
      progress: document.getElementById('dbg-progress'),
      particles: document.getElementById('dbg-particles'),
      fps: document.getElementById('dbg-fps'),
      model: document.getElementById('dbg-model'),
      cyclecount: document.getElementById('dbg-cyclecount')
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a0a2e);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.5, 0);

    scene.add(new THREE.AmbientLight(0x404060, 0.5));

    const pointLight = new THREE.PointLight(0xff4444, 2.2, 100);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    const grid = new THREE.GridHelper(40, 40, 0x553355, 0x332244);
    grid.position.y = -4;
    scene.add(grid);

    const cityLoader = new GLTFLoader();
    cityLoader.load(
      'https://threejs.org/examples/models/gltf/LittlestTokyo.glb',
      (gltf) => {
        const model = gltf.scene;
        model.position.set(0, -5, -20);
        model.scale.setScalar(0.005);
        model.rotation.y = Math.PI;
        scene.add(model);
        state.modelLoaded = true;
      },
      undefined,
      () => {
        state.modelLoaded = false;
      }
    );

    const heartGroup = new THREE.Group();
    scene.add(heartGroup);

    const chamberMatRed = new THREE.MeshStandardMaterial({
      color: 0xcc2233,
      roughness: 0.45,
      metalness: 0.08,
      emissive: 0x220000
    });

    const chamberMatBlue = new THREE.MeshStandardMaterial({
      color: 0x2255cc,
      roughness: 0.45,
      metalness: 0.08,
      emissive: 0x000022
    });

    const valveMat = new THREE.MeshStandardMaterial({
      color: 0xd9b38c,
      roughness: 0.7,
      metalness: 0.05
    });

    function createChamber(radius, position, material) {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(radius, 32, 32),
        material
      );
      mesh.position.copy(position);
      heartGroup.add(mesh);
      return mesh;
    }

    const chamberPositions = {
      la: new THREE.Vector3(-1.5,  2.0, 0),
      ra: new THREE.Vector3( 1.5,  2.0, 0),
      lv: new THREE.Vector3(-1.5, -0.5, 0),
      rv: new THREE.Vector3( 1.5, -0.5, 0)
    };

    const chamberMeshes = {
      la: createChamber(0.8, chamberPositions.la, chamberMatRed),
      ra: createChamber(0.8, chamberPositions.ra, chamberMatBlue),
      lv: createChamber(1.0, chamberPositions.lv, chamberMatRed),
      rv: createChamber(1.0, chamberPositions.rv, chamberMatBlue)
    };

    function createTube(start, end, radius = 0.18) {
      const dir = new THREE.Vector3().subVectors(end, start);
      const len = dir.length();
      const geom = new THREE.CylinderGeometry(radius, radius, len, 16);
      const mesh = new THREE.Mesh(geom, valveMat);

      const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      mesh.position.copy(mid);

      const up = new THREE.Vector3(0, 1, 0);
      mesh.quaternion.setFromUnitVectors(up, dir.clone().normalize());

      heartGroup.add(mesh);
      return mesh;
    }

    createTube(chamberPositions.la, chamberPositions.lv, 0.15);
    createTube(chamberPositions.ra, chamberPositions.rv, 0.15);

    const vesselGeom = new THREE.TorusGeometry(3.2, 0.06, 8, 64, Math.PI * 0.7);
    const vesselMat = new THREE.MeshStandardMaterial({
      color: 0xff8888,
      emissive: 0x330000,
      roughness: 0.6
    });
    const vessel = new THREE.Mesh(vesselGeom, vesselMat);
    vessel.position.set(0, 0.7, 0);
    vessel.rotation.z = -0.25;
    vessel.rotation.x = 0.6;
    scene.add(vessel);

    const particleCount = 200;
    const particlePositions = new Float32Array(particleCount * 3);
    const particleProgress = new Float32Array(particleCount);
    const particleOffsets = new Float32Array(particleCount);
    const particleSides = new Float32Array(particleCount);

    const bloodGeometry = new THREE.BufferGeometry();
    bloodGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

    const bloodMaterial = new THREE.PointsMaterial({
      color: 0xff3344,
      size: 0.12,
      transparent: true,
      opacity: 0.9,
      depthWrite: false
    });

    const bloodPoints = new THREE.Points(bloodGeometry, bloodMaterial);
    scene.add(bloodPoints);

    for (let i = 0; i < particleCount; i++) {
      particleProgress[i] = i / particleCount;
      particleOffsets[i] = Math.random() * Math.PI * 2;
      particleSides[i] = Math.random() < 0.5 ? -1 : 1;
    }

    function getCurrentPhaseIndex(progress01) {
      if (progress01 < 0.4) return 0;
      if (progress01 < 0.5) return 1;
      if (progress01 < 0.8) return 2;
      return 3;
    }

    function phaseLocalT(progress01, index) {
      const [a, b] = PHASE_RANGES[index];
      const denom = Math.max(0.0001, b - a);
      return clamp((progress01 - a) / denom, 0, 1);
    }

    function setPhaseByIndex(index) {
      state.phaseIndex = ((index % 4) + 4) % 4;
      state.currentPhase = PHASES[state.phaseIndex];
      state.cycleProgress = [0, 40, 50, 80][state.phaseIndex];
    }

    function resetState() {
      state.isPlaying = true;
      state.heartRate = 72;
      state.currentPhase = 'DIASTOLE_FILLING';
      state.cycleProgress = 0;
      state.lvPressure = 8;
      state.rvPressure = 4;
      state.lvVolume = 130;
      state.debugVisible = true;
      state.phaseIndex = 0;
      state.chamberScales = { la: 1, ra: 1, lv: 1, rv: 1 };
      sliderHeartRate.value = '72';
      chkDebug.checked = true;
      debugOverlay.style.display = 'block';
      btnPlayPause.textContent = 'Pause';
      for (let i = 0; i < particleCount; i++) {
        particleProgress[i] = i / particleCount;
      }
    }

    function sanitizeState() {
      state.heartRate = clamp(state.heartRate, 40, 180);
      state.cycleProgress = clamp(state.cycleProgress, 0, 100);
      state.lvPressure = clamp(safeNum(state.lvPressure, 8), 8, 120);
      state.rvPressure = clamp(safeNum(state.rvPressure, 4), 4, 25);
      state.lvVolume = clamp(safeNum(state.lvVolume, 130), 50, 130);
      state.fps = clamp(safeNum(state.fps, 0), 0, 1000);
      state.phaseIndex = clamp(Math.floor(safeNum(state.phaseIndex, 0)), 0, 3);
      state.currentPhase = PHASES[state.phaseIndex];
      state.particleCount = particleCount;

      for (const key of ['la', 'ra', 'lv', 'rv']) {
        state.chamberScales[key] = clamp(safeNum(state.chamberScales[key], 1), 0.7, 1.3);
      }
    }

    function updateHemodynamics(progress01) {
      const idx = getCurrentPhaseIndex(progress01);
      state.phaseIndex = idx;
      state.currentPhase = PHASES[idx];

      const t0 = phaseLocalT(progress01, idx);
      const t = smoothstep(t0);

      let laScale = 1.0, raScale = 1.0, lvScale = 1.0, rvScale = 1.0;
      let lvPressure = 8, rvPressure = 4, lvVolume = 130;

      switch (idx) {
        case 0: {
          laScale = lerp(1.08, 0.95, t);
          raScale = lerp(1.08, 0.95, t);
          lvScale = lerp(1.06, 1.14, t);
          rvScale = lerp(1.06, 1.12, t);
          lvPressure = lerp(8, 12, t);
          rvPressure = lerp(4, 6, t);
          lvVolume = lerp(90, 130, t);
          break;
        }
        case 1: {
          laScale = lerp(0.97, 0.95, t);
          raScale = lerp(0.97, 0.95, t);
          lvScale = lerp(1.08, 0.92, t);
          rvScale = lerp(1.06, 0.95, t);
          lvPressure = lerp(12, 80, t);
          rvPressure = lerp(6, 15, t);
          lvVolume = lerp(130, 128, t);
          break;
        }
        case 2: {
          laScale = lerp(1.0, 1.04, t);
          raScale = lerp(1.0, 1.04, t);
          lvScale = lerp(0.92, 0.78, t);
          rvScale = lerp(0.95, 0.84, t);
          lvPressure = lerp(120, 100, t);
          rvPressure = lerp(25, 20, t);
          lvVolume = lerp(128, 50, t);
          break;
        }
        case 3: {
          laScale = lerp(1.02, 1.08, t);
          raScale = lerp(1.02, 1.08, t);
          lvScale = lerp(0.82, 1.02, t);
          rvScale = lerp(0.86, 1.02, t);
          lvPressure = lerp(20, 8, t);
          rvPressure = lerp(8, 4, t);
          lvVolume = lerp(50, 80, t);
          break;
        }
      }

      lvPressure = clamp(lvPressure, 8, 120);
      rvPressure = clamp(rvPressure, 4, 25);
      lvVolume = clamp(lvVolume, 50, 130);

      state.lvPressure = lvPressure;
      state.rvPressure = rvPressure;
      state.lvVolume = lvVolume;

      state.chamberScales.la = laScale;
      state.chamberScales.ra = raScale;
      state.chamberScales.lv = lvScale;
      state.chamberScales.rv = rvScale;

      chamberMeshes.la.scale.setScalar(laScale);
      chamberMeshes.ra.scale.setScalar(raScale);
      chamberMeshes.lv.scale.setScalar(lvScale);
      chamberMeshes.rv.scale.setScalar(rvScale);
    }

    function heartPathPoint(p, side, timeSec) {
      const leftAtrium = chamberPositions.la;
      const rightAtrium = chamberPositions.ra;
      const leftVentricle = chamberPositions.lv;
      const rightVentricle = chamberPositions.rv;

      const atrium = side < 0 ? leftAtrium : rightAtrium;
      const ventricle = side < 0 ? leftVentricle : rightVentricle;
      const ejectDir = side < 0
        ? new THREE.Vector3(-3.4, 2.2, -0.8)
        : new THREE.Vector3(3.4, 2.1, -0.8);

      const wobble = 0.12;
      const ox = Math.sin(timeSec * 3.0 + p * 14.0 + side) * wobble;
      const oy = Math.cos(timeSec * 2.2 + p * 11.0) * wobble;
      const oz = Math.sin(timeSec * 4.1 + p * 17.0) * wobble * 0.8;

      let pos = new THREE.Vector3();

      if (p < 0.4) {
        const t = smoothstep(p / 0.4);
        pos.lerpVectors(atrium, ventricle, t);
      } else if (p < 0.5) {
        pos.copy(ventricle);
      } else if (p < 0.8) {
        const t = smoothstep((p - 0.5) / 0.3);
        pos.lerpVectors(ventricle, ejectDir, t);
      } else {
        const t = smoothstep((p - 0.8) / 0.2);
        pos.lerpVectors(ejectDir, atrium, t);
      }

      pos.x += ox;
      pos.y += oy;
      pos.z += oz;
      return pos;
    }

    function updateParticles(delta, elapsed) {
      const speed = clamp(state.heartRate / 72, 0.3, 3.0) * delta * 0.18;
      const positions = bloodGeometry.attributes.position.array;

      for (let i = 0; i < particleCount; i++) {
        let p = particleProgress[i] + speed;
        if (p > 1) p -= 1;
        if (!Number.isFinite(p)) p = 0;
        particleProgress[i] = p;

        const pos = heartPathPoint(
          p,
          particleSides[i],
          elapsed + particleOffsets[i]
        );

        positions[i * 3 + 0] = safeNum(pos.x, 0);
        positions[i * 3 + 1] = safeNum(pos.y, 0);
        positions[i * 3 + 2] = safeNum(pos.z, 0);
      }

      bloodGeometry.attributes.position.needsUpdate = true;
    }

    function updateDebugUI() {
      hrValue.textContent = `${Math.round(state.heartRate)} BPM`;
      phaseLabel.textContent = state.currentPhase;
      debugOverlay.style.display = state.debugVisible ? 'block' : 'none';
      btnPlayPause.textContent = state.isPlaying ? 'Pause' : 'Play';

      dbg.phase.textContent = state.currentPhase;
      dbg.hr.textContent = `${Math.round(state.heartRate)} BPM`;
      dbg.lvp.textContent = `${state.lvPressure.toFixed(1)} mmHg`;
      dbg.rvp.textContent = `${state.rvPressure.toFixed(1)} mmHg`;
      dbg.lvv.textContent = `${state.lvVolume.toFixed(1)} mL`;
      dbg.progress.textContent = `${state.cycleProgress.toFixed(1)}%`;
      dbg.particles.textContent = `${state.particleCount}`;
      dbg.fps.textContent = `${state.fps.toFixed(1)}`;
      dbg.model.textContent = state.modelLoaded ? 'true' : 'false';
      dbg.cyclecount.textContent = `${state.cycleCount}`;
    }

    btnPlayPause.addEventListener('click', () => {
      state.isPlaying = !state.isPlaying;
      updateDebugUI();
    });

    sliderHeartRate.addEventListener('input', () => {
      state.heartRate = clamp(parseInt(sliderHeartRate.value, 10), 40, 180);
      updateDebugUI();
    });

    chkDebug.addEventListener('change', () => {
      state.debugVisible = chkDebug.checked;
      updateDebugUI();
    });

    btnReset.addEventListener('click', () => {
      resetState();
      updateDebugUI();
    });

    btnNextPhase.addEventListener('click', () => {
      const next = (state.phaseIndex + 1) % 4;
      if (state.phaseIndex === 3 && next === 0) state.cycleCount++;
      setPhaseByIndex(next);
      sanitizeState();
      updateHemodynamics(state.cycleProgress / 100);
      updateDebugUI();
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        state.isPlaying = !state.isPlaying;
      } else if (e.key === 'd' || e.key === 'D') {
        state.debugVisible = !state.debugVisible;
        chkDebug.checked = state.debugVisible;
      } else if (e.key === 'r' || e.key === 'R') {
        resetState();
      } else if (e.key === 'ArrowUp') {
        state.heartRate = clamp(state.heartRate + 5, 40, 180);
        sliderHeartRate.value = String(Math.round(state.heartRate));
      } else if (e.key === 'ArrowDown') {
        state.heartRate = clamp(state.heartRate - 5, 40, 180);
        sliderHeartRate.value = String(Math.round(state.heartRate));
      } else if (e.key === 'n' || e.key === 'N') {
        const next = (state.phaseIndex + 1) % 4;
        if (state.phaseIndex === 3 && next === 0) state.cycleCount++;
        setPhaseByIndex(next);
      }
      sanitizeState();
      updateHemodynamics(state.cycleProgress / 100);
      updateDebugUI();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();
    let fpsAccum = 0;
    let fpsFrames = 0;
    let fpsTimer = 0;

    resetState();
    updateHemodynamics(0);
    updateDebugUI();

    function animate() {
      requestAnimationFrame(animate);

      const deltaRaw = clock.getDelta();
      const delta = clamp(deltaRaw, 0, 0.05);
      const elapsed = clock.elapsedTime;

      if (state.isPlaying) {
        const cycleDuration = 60 / clamp(state.heartRate, 40, 180);
        const progressDelta = (delta / Math.max(cycleDuration, 0.001)) * 100;
        const prevProgress = state.cycleProgress;
        state.cycleProgress += progressDelta;

        if (state.cycleProgress >= 100) {
          const wraps = Math.floor(state.cycleProgress / 100);
          state.cycleCount += wraps;
          state.cycleProgress = state.cycleProgress % 100;
        }

        if (!Number.isFinite(state.cycleProgress)) state.cycleProgress = prevProgress;
      }

      const progress01 = clamp(state.cycleProgress / 100, 0, 1);
      updateHemodynamics(progress01);
      updateParticles(delta, elapsed);

      controls.update();

      fpsAccum += 1 / Math.max(delta, 0.0001);
      fpsFrames++;
      fpsTimer += delta;
      if (fpsTimer >= 0.25) {
        state.fps = safeNum(fpsAccum / Math.max(fpsFrames, 1), 0);
        fpsAccum = 0;
        fpsFrames = 0;
        fpsTimer = 0;
      }

      sanitizeState();
      updateDebugUI();
      renderer.render(scene, camera);
    }

    animate();
  </script>
