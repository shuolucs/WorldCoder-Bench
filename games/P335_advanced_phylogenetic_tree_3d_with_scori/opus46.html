<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Phylogenetic Tree</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#scoreDisplay {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #ffd700;
    font-size: 24px;
    font-weight: bold;
    z-index: 10;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
}

#nodeCount {
    position: absolute;
    top: 20px;
    right: 20px;
    color: #00cccc;
    font-size: 20px;
    font-weight: bold;
    z-index: 10;
    text-shadow: 0 0 10px rgba(0, 204, 204, 0.5);
}

#feedback {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 28px;
    font-weight: bold;
    z-index: 10;
    text-align: center;
    transition: opacity 0.3s;
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
}

#questionPanel {
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 22px;
    font-weight: bold;
    z-index: 10;
    text-align: center;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px 30px;
    border-radius: 10px;
    border: 2px solid #cc33cc;
    display: none;
    text-shadow: 0 0 8px rgba(204, 51, 204, 0.5);
}

#buttonContainer {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 15px;
}

#quizBtn, #resetBtn {
    padding: 10px 25px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#quizBtn {
    background: linear-gradient(135deg, #cc33cc, #9900cc);
    color: #fff;
    box-shadow: 0 0 15px rgba(204, 51, 204, 0.4);
}

#quizBtn:hover {
    box-shadow: 0 0 25px rgba(204, 51, 204, 0.7);
    transform: scale(1.05);
}

#quizBtn.active {
    background: linear-gradient(135deg, #ff6600, #cc3300);
    box-shadow: 0 0 15px rgba(255, 102, 0, 0.4);
}

#resetBtn {
    background: linear-gradient(135deg, #333, #555);
    color: #fff;
    box-shadow: 0 0 10px rgba(100, 100, 100, 0.3);
}

#resetBtn:hover {
    box-shadow: 0 0 20px rgba(100, 100, 100, 0.5);
    transform: scale(1.05);
}

#infoPanel {
    position: absolute;
    bottom: 120px;
    left: 20px;
    color: #aaa;
    font-size: 14px;
    z-index: 10;
    background: rgba(0, 0, 0, 0.6);
    padding: 10px 15px;
    border-radius: 8px;
    border: 1px solid #333;
    display: none;
    max-width: 250px;
}

#infoPanel h3 {
    color: #ffd700;
    margin-bottom: 5px;
}

.species-label {
    position: absolute;
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    pointer-events: none;
    z-index: 5;
    text-shadow: 0 0 8px rgba(204, 51, 204, 0.8), 0 0 3px #000;
    white-space: nowrap;
    transform: translate(-50%, -50%);
}

#instructions {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: #555;
    font-size: 12px;
    z-index: 10;
}
</style>
</head>
<body>

<div id="scoreDisplay">Score: 0</div>
<div id="nodeCount">Nodes: 15</div>
<div id="feedback"></div>
<div id="questionPanel"></div>

<div id="buttonContainer">
    <button id="quizBtn">Quiz Mode</button>
    <button id="resetBtn">Reset</button>
</div>

<div id="infoPanel">
    <h3 id="infoTitle">Node Info</h3>
    <p id="infoText"></p>
</div>

<div id="instructions">
    [R] Rotate tree 90° &nbsp; [H] Toggle branches &nbsp; Click nodes to interact
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const speciesNames = ['Alpha', 'Beta', 'Gamma', 'Delta', 'Epsilon', 'Zeta', 'Eta', 'Theta'];

// State management
window.__3D_STATE__ = {
    score: 0,
    quizActive: false,
    selectedNode: null,
    totalNodes: 15,
    branchesVisible: true,
    treeRotation: 0,
    currentQuestion: null,
    correctAnswers: 0,
    wrongAnswers: 0,
    helmetLoaded: false,
    leafNodes: [...speciesNames]
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
scene.add(directionalLight);

// Add subtle fog
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.02);

// Tree group
const treeGroup = new THREE.Group();
scene.add(treeGroup);

// Branch connections group
const branchGroup = new THREE.Group();
branchGroup.name = 'branches';
treeGroup.add(branchGroup);

// Node data structure
const nodeData = [];
const nodeMeshes = [];
const leafMeshes = [];
const labelDivs = [];

// Tree layout
const levelYPositions = [-4, -1, 2, 5];
const levelColors = [0xffd700, 0x00cccc, 0x33cc33, 0xcc33cc];
const levelNames = {
    0: ['root'],
    1: ['branch_1', 'branch_2'],
    2: ['branch_3', 'branch_4', 'branch_5', 'branch_6'],
    3: speciesNames
};

// Build tree structure
function buildTree() {
    const nodes = [];

    // Root (level 0)
    nodes.push({ id: 'root', level: 0, x: 0, y: levelYPositions[0], z: 0, children: [1, 2] });

    // Level 1
    nodes.push({ id: 'branch_1', level: 1, x: -5, y: levelYPositions[1], z: 0, parent: 0, children: [3, 4] });
    nodes.push({ id: 'branch_2', level: 1, x: 5, y: levelYPositions[1], z: 0, parent: 0, children: [5, 6] });

    // Level 2
    nodes.push({ id: 'branch_3', level: 2, x: -7, y: levelYPositions[2], z: 0, parent: 1, children: [7, 8] });
    nodes.push({ id: 'branch_4', level: 2, x: -3, y: levelYPositions[2], z: 0, parent: 1, children: [9, 10] });
    nodes.push({ id: 'branch_5', level: 2, x: 3, y: levelYPositions[2], z: 0, parent: 2, children: [11, 12] });
    nodes.push({ id: 'branch_6', level: 2, x: 7, y: levelYPositions[2], z: 0, parent: 2, children: [13, 14] });

    // Level 3 (leaves)
    const leafXPositions = [-8, -6, -4, -2, 2, 4, 6, 8];
    for (let i = 0; i < 8; i++) {
        nodes.push({
            id: speciesNames[i],
            level: 3,
            x: leafXPositions[i],
            y: levelYPositions[3],
            z: 0,
            parent: 3 + Math.floor(i / 2),
            children: []
        });
    }

    return nodes;
}

const treeNodes = buildTree();

// Create node spheres
function createNodes() {
    treeNodes.forEach((node, index) => {
        const geometry = new THREE.SphereGeometry(0.3, 32, 32);
        const material = new THREE.MeshPhongMaterial({
            color: levelColors[node.level],
            emissive: 0x000000,
            shininess: 80,
            specular: 0x444444
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(node.x, node.y, node.z);
        mesh.userData = { nodeIndex: index, nodeId: node.id, level: node.level };
        mesh.name = node.id;

        // Add glow effect
        const glowGeometry = new THREE.SphereGeometry(0.4, 32, 32);
        const glowMaterial = new THREE.MeshBasicMaterial({
            color: levelColors[node.level],
            transparent: true,
            opacity: 0.15
        });
        const glowMesh = new THREE.Mesh(glowGeometry, glowMaterial);
        mesh.add(glowMesh);

        treeGroup.add(mesh);
        nodeMeshes.push(mesh);

        if (node.level === 3) {
            leafMeshes.push(mesh);
        }
    });
}

// Create branch connections
function createBranches() {
    treeNodes.forEach((node) => {
        if (node.parent !== undefined) {
            const parentNode = treeNodes[node.parent];
            const start = new THREE.Vector3(parentNode.x, parentNode.y, parentNode.z);
            const end = new THREE.Vector3(node.x, node.y, node.z);

            const direction = new THREE.Vector3().subVectors(end, start);
            const length = direction.length();
            const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);

            const geometry = new THREE.CylinderGeometry(0.04, 0.04, length, 8);
            const material = new THREE.MeshPhongMaterial({
                color: 0xffffff,
                emissive: 0x111111,
                transparent: true,
                opacity: 0.7
            });
            const cylinder = new THREE.Mesh(geometry, material);

            cylinder.position.copy(midpoint);

            const axis = new THREE.Vector3(0, 1, 0);
            const dir = direction.clone().normalize();
            const quaternion = new THREE.Quaternion().setFromUnitVectors(axis, dir);
            cylinder.setRotationFromQuaternion(quaternion);

            branchGroup.add(cylinder);
        }
    });
}

// Create species labels as HTML overlays
function createLabels() {
    treeNodes.forEach((node) => {
        if (node.level === 3) {
            const div = document.createElement('div');
            div.className = 'species-label';
            div.textContent = node.id;
            div.dataset.nodeId = node.id;
            document.body.appendChild(div);
            labelDivs.push({ div, position: new THREE.Vector3(node.x, node.y + 0.6, node.z) });
        }
    });
}

// Update label positions
function updateLabels() {
    labelDivs.forEach(({ div, position }) => {
        const worldPos = position.clone();
        treeGroup.localToWorld(worldPos);
        const projected = worldPos.clone().project(camera);

        const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;

        if (projected.z < 1) {
            div.style.left = x + 'px';
            div.style.top = (y - 15) + 'px';
            div.style.display = 'block';
        } else {
            div.style.display = 'none';
        }
    });
}

// Load DamagedHelmet model
function loadHelmet() {
    const loader = new GLTFLoader();
    loader.load(
        'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
        (gltf) => {
            const helmet = gltf.scene;
            helmet.scale.set(0.5, 0.5, 0.5);
            helmet.position.set(0, -4, 0);
            helmet.name = 'helmet';
            treeGroup.add(helmet);
            window.__3D_STATE__.helmetLoaded = true;
            console.log('DamagedHelmet loaded successfully');
        },
        (progress) => {
            console.log('Loading helmet:', (progress.loaded / progress.total * 100).toFixed(1) + '%');
        },
        (error) => {
            console.warn('Could not load DamagedHelmet.glb:', error);
            // Create a fallback decorative object
            const fallbackGroup = new THREE.Group();
            const torusGeo = new THREE.TorusKnotGeometry(0.4, 0.12, 100, 16);
            const torusMat = new THREE.MeshPhongMaterial({
                color: 0xffd700,
                emissive: 0x332200,
                shininess: 100,
                specular: 0xffffff
            });
            const torusMesh = new THREE.Mesh(torusGeo, torusMat);
            fallbackGroup.add(torusMesh);
            fallbackGroup.position.set(0, -4, 0);
            fallbackGroup.scale.set(0.5, 0.5, 0.5);
            fallbackGroup.name = 'helmet_fallback';
            treeGroup.add(fallbackGroup);
            window.__3D_STATE__.helmetLoaded = true;
        }
    );
}

// Add particles for atmosphere
function createParticles() {
    const particleCount = 200;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);

    for (let i = 0; i < particleCount; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 30;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 20;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 30;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const material = new THREE.PointsMaterial({
        color: 0x4444ff,
        size: 0.05,
        transparent: true,
        opacity: 0.5
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);
    return particles;
}

// Initialize
createNodes();
createBranches();
createLabels();
loadHelmet();
const particles = createParticles();

// Add grid helper
const gridHelper = new THREE.GridHelper(30, 30, 0x111133, 0x111133);
gridHelper.position.y = -6;
scene.add(gridHelper);

// Raycaster for clicking
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let previouslySelected = null;

function onMouseClick(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(nodeMeshes, false);

    if (intersects.length > 0) {
        const clickedMesh = intersects[0].object;
        const nodeId = clickedMesh.userData.nodeId;
        const level = clickedMesh.userData.level;

        // Reset previous selection
        if (previouslySelected && previouslySelected !== clickedMesh) {
            previouslySelected.material.emissive.setHex(0x000000);
        }

        // Highlight selected node
        clickedMesh.material.emissive.setHex(0xffff00);
        previouslySelected = clickedMesh;

        window.__3D_STATE__.selectedNode = nodeId;

        // Show info panel
        const infoPanel = document.getElementById('infoPanel');
        const infoTitle = document.getElementById('infoTitle');
        const infoText = document.getElementById('infoText');
        infoPanel.style.display = 'block';
        infoTitle.textContent = nodeId;
        infoText.textContent = `Level: ${level} | Type: ${level === 3 ? 'Species (Leaf)' : level === 0 ? 'Root' : 'Branch'}`;

        // Quiz mode logic
        if (window.__3D_STATE__.quizActive && window.__3D_STATE__.currentQuestion) {
            if (level === 3 && nodeId === window.__3D_STATE__.currentQuestion) {
                // Correct answer
                window.__3D_STATE__.score += 10;
                window.__3D_STATE__.correctAnswers++;
                showFeedback('✓ Correct!', '#33ff33');
                flashNode(clickedMesh, 0x33ff33);
                updateScore();
                // Next question after delay
                setTimeout(() => {
                    if (window.__3D_STATE__.quizActive) askQuestion();
                }, 1500);
            } else {
                // Wrong answer
                window.__3D_STATE__.score -= 5;
                window.__3D_STATE__.wrongAnswers++;
                showFeedback('✗ Wrong!', '#ff3333');
                flashNode(clickedMesh, 0xff3333);
                updateScore();
            }
        }
    }
}

function flashNode(mesh, color) {
    const originalColor = mesh.material.color.getHex();
    mesh.material.emissive.setHex(color);
    setTimeout(() => {
        mesh.material.emissive.setHex(0x000000);
    }, 500);
}

function showFeedback(text, color) {
    const feedback = document.getElementById('feedback');
    feedback.textContent = text;
    feedback.style.color = color;
    feedback.style.opacity = '1';
    setTimeout(() => {
        feedback.style.opacity = '0';
    }, 1500);
}

function updateScore() {
    document.getElementById('scoreDisplay').textContent = `Score: ${window.__3D_STATE__.score}`;
}

function askQuestion() {
    const randomIndex = Math.floor(Math.random() * speciesNames.length);
    const species = speciesNames[randomIndex];
    window.__3D_STATE__.currentQuestion = species;

    const questionPanel = document.getElementById('questionPanel');
    questionPanel.textContent = `Click on species: ${species}`;
    questionPanel.style.display = 'block';
}

// Quiz button
document.getElementById('quizBtn').addEventListener('click', () => {
    window.__3D_STATE__.quizActive = !window.__3D_STATE__.quizActive;
    const btn = document.getElementById('quizBtn');
    const questionPanel = document.getElementById('questionPanel');

    if (window.__3D_STATE__.quizActive) {
        btn.textContent = 'Exit Quiz';
        btn.classList.add('active');
        askQuestion();
    } else {
        btn.textContent = 'Quiz Mode';
        btn.classList.remove('active');
        questionPanel.style.display = 'none';
        window.__3D_STATE__.currentQuestion = null;
    }
});

// Reset button
document.getElementById('resetBtn').addEventListener('click', () => {
    window.__3D_STATE__.score = 0;
    window.__3D_STATE__.quizActive = false;
    window.__3D_STATE__.currentQuestion = null;
    window.__3D_STATE__.correctAnswers = 0;
    window.__3D_STATE__.wrongAnswers = 0;
    window.__3D_STATE__.selectedNode = null;

    updateScore();

    const btn = document.getElementById('quizBtn');
    btn.textContent = 'Quiz Mode';
    btn.classList.remove('active');

    document.getElementById('questionPanel').style.display = 'none';
    document.getElementById('feedback').textContent = '';
    document.getElementById('infoPanel').style.display = 'none';

    // Reset node highlights
    nodeMeshes.forEach(mesh => {
        mesh.material.emissive.setHex(0x000000);
    });
    previouslySelected = null;

    showFeedback('Reset!', '#ffffff');
});

// Keyboard controls
let isRotating = false;
let rotationTarget = 0;
let rotationStart = 0;
let rotationProgress = 0;

document.addEventListener('keydown', (event) => {
    if (event.key === 'r' || event.key === 'R') {
        if (!isRotating) {
            isRotating = true;
            rotationStart = treeGroup.rotation.y;
            window.__3D_STATE__.treeRotation += 90;
            rotationTarget = rotationStart + Math.PI / 2;
            rotationProgress = 0;
        }
    }

    if (event.key === 'h' || event.key === 'H') {
        window.__3D_STATE__.branchesVisible = !window.__3D_STATE__.branchesVisible;
        branchGroup.visible = window.__3D_STATE__.branchesVisible;
    }
});

renderer.domElement.addEventListener('click', onMouseClick);

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    controls.update();

    // Smooth rotation animation
    if (isRotating) {
        rotationProgress += delta / 0.5; // 0.5 seconds
        if (rotationProgress >= 1) {
            rotationProgress = 1;
            isRotating = false;
        }
        // Ease in-out
        const t = rotationProgress < 0.5
            ? 2 * rotationProgress * rotationProgress
            : 1 - Math.pow(-2 * rotationProgress + 2, 2) / 2;
        treeGroup.rotation.y = rotationStart + (rotationTarget - rotationStart) * t;
    }

    // Animate node glow
    nodeMeshes.forEach((mesh, i) => {
        const glow = mesh.children[0];
        if (glow) {
            glow.material.opacity = 0.1 + 0.08 * Math.sin(elapsed * 2 + i * 0.5);
        }
    });

    // Rotate helmet slowly
    const helmet = treeGroup.getObjectByName('helmet') || treeGroup.getObjectByName('helmet_fallback');
    if (helmet) {
        helmet.rotation.y = elapsed * 0.5;
    }

    // Animate particles
    if (particles) {
        particles.rotation.y = elapsed * 0.02;
    }

    // Update labels
    updateLabels();

    renderer.render(scene, camera);
}

animate();

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
