<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Phylogenetic Tree Quiz</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .hud {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
        #scoreDisplay {
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        #nodeCount {
            top: 20px;
            right: 20px;
            font-size: 18px;
            color: #aaa;
        }
        #controls {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: auto;
            display: flex;
            gap: 10px;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }
        button.active {
            background: rgba(0, 204, 204, 0.4);
            border-color: #00cccc;
        }
        #questionPanel {
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 8px;
            border: 1px solid #00cccc;
            font-size: 20px;
            display: none;
        }
        #feedback {
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            min-height: 30px;
            transition: color 0.3s;
        }
        #labels-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .node-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            transition: opacity 0.1s;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 12px;
            color: #888;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@tweenjs/tween.js": "https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.esm.js"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="scoreDisplay" class="hud">Score: 0</div>
    <div id="nodeCount" class="hud">Nodes: 15</div>
    
    <div id="controls" class="hud">
        <button id="quizBtn">Quiz Mode</button>
        <button id="resetBtn">Reset</button>
    </div>
    
    <div id="questionPanel" class="hud"></div>
    <div id="feedback" class="hud"></div>
    
    <div id="labels-container"></div>

    <div id="instructions">Controls: Left Click to select | Drag to rotate | Scroll to zoom | 'R' to rotate tree | 'H' to toggle branches</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as TWEEN from '@tweenjs/tween.js';

        // State Management
        window.__3D_STATE__ = {
            score: 0,
            quizActive: false,
            selectedNode: null,
            totalNodes: 15,
            branchesVisible: true,
            treeRotation: 0,
            currentQuestion: null,
            correctAnswers: 0,
            wrongAnswers: 0,
            helmetLoaded: false,
            leafNodes: ['Alpha', 'Beta', 'Gamma', 'Delta', 'Epsilon', 'Zeta', 'Eta', 'Theta']
        };

        // DOM Elements
        const scoreDisplay = document.getElementById('scoreDisplay');
        const nodeCountDisplay = document.getElementById('nodeCount');
        const quizBtn = document.getElementById('quizBtn');
        const resetBtn = document.getElementById('resetBtn');
        const questionPanel = document.getElementById('questionPanel');
        const feedbackDiv = document.getElementById('feedback');
        const labelsContainer = document.getElementById('labels-container');

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.Camera(); // Will be replaced by PerspectiveCamera
        const perspCamera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        perspCamera.position.set(0, 5, 15);
        perspCamera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(perspCamera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // Tree Structure
        const treeGroup = new THREE.Group();
        scene.add(treeGroup);
        
        const branchesGroup = new THREE.Group();
        treeGroup.add(branchesGroup);

        const nodesMeshArray = [];
        const htmlLabels = [];

        const sphereGeo = new THREE.SphereGeometry(0.3, 32, 32);
        const materials = {
            level0: new THREE.MeshStandardMaterial({ color: 0xffd700 }),
            level1: new THREE.MeshStandardMaterial({ color: 0x00cccc }),
            level2: new THREE.MeshStandardMaterial({ color: 0x33cc33 }),
            level3: new THREE.MeshStandardMaterial({ color: 0xcc33cc })
        };
        const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });

        function createNode(x, y, z, material, name, isLeaf) {
            const mesh = new THREE.Mesh(sphereGeo, material.clone());
            mesh.position.set(x, y, z);
            mesh.userData = { name, isLeaf, originalColor: material.color.getHex() };
            treeGroup.add(mesh);
            nodesMeshArray.push(mesh);
            return mesh;
        }

        function createBranch(p1, p2) {
            const points = [p1, p2];
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geometry, lineMaterial);
            branchesGroup.add(line);
        }

        function createHtmlLabel(mesh, text) {
            const div = document.createElement('div');
            div.className = 'node-label';
            div.textContent = text;
            labelsContainer.appendChild(div);
            htmlLabels.push({ element: div, mesh: mesh });
        }

        // Build Tree
        // Level 0 (Root)
        const rootNode = createNode(0, -4, 0, materials.level0, 'Root', false);

        // Level 1
        const l1_1 = createNode(-4, -1, 0, materials.level1, 'Branch_1_L', false);
        const l1_2 = createNode(4, -1, 0, materials.level1, 'Branch_1_R', false);
        createBranch(rootNode.position, l1_1.position);
        createBranch(rootNode.position, l1_2.position);

        // Level 2
        const l2_1 = createNode(-6, 2, 0, materials.level2, 'Branch_2_LL', false);
        const l2_2 = createNode(-2, 2, 0, materials.level2, 'Branch_2_LR', false);
        const l2_3 = createNode(2, 2, 0, materials.level2, 'Branch_2_RL', false);
        const l2_4 = createNode(6, 2, 0, materials.level2, 'Branch_2_RR', false);
        createBranch(l1_1.position, l2_1.position);
        createBranch(l1_1.position, l2_2.position);
        createBranch(l1_2.position, l2_3.position);
        createBranch(l1_2.position, l2_4.position);

        // Level 3 (Leaves)
        const leaves = window.__3D_STATE__.leafNodes;
        const l3_nodes = [];
        for (let i = 0; i < 8; i++) {
            const x = -7 + i * 2;
            const node = createNode(x, 5, 0, materials.level3, leaves[i], true);
            l3_nodes.push(node);
            createHtmlLabel(node, leaves[i]);
        }
        createBranch(l2_1.position, l3_nodes[0].position);
        createBranch(l2_1.position, l3_nodes[1].position);
        createBranch(l2_2.position, l3_nodes[2].position);
        createBranch(l2_2.position, l3_nodes[3].position);
        createBranch(l2_3.position, l3_nodes[4].position);
        createBranch(l2_3.position, l3_nodes[5].position);
        createBranch(l2_4.position, l3_nodes[6].position);
        createBranch(l2_4.position, l3_nodes[7].position);

        // Load Model
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF/DamagedHelmet.gltf',
            function (gltf) {
                const model = gltf.scene;
                model.scale.set(0.5, 0.5, 0.5);
                model.position.set(0, -4, 0);
                treeGroup.add(model);
                window.__3D_STATE__.helmetLoaded = true;
            },
            undefined,
            function (error) {
                console.error('Error loading model:', error);
            }
        );

        // Interaction Logic
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let currentlySelectedMesh = null;

        function updateUI() {
            scoreDisplay.textContent = `Score: ${window.__3D_STATE__.score}`;
            nodeCountDisplay.textContent = `Nodes: ${window.__3D_STATE__.totalNodes}`;
        }

        function showFeedback(text, color) {
            feedbackDiv.textContent = text;
            feedbackDiv.style.color = color;
        }

        function pickNewQuestion() {
            const leaves = window.__3D_STATE__.leafNodes;
            const randomLeaf = leaves[Math.floor(Math.random() * leaves.length)];
            window.__3D_STATE__.currentQuestion = randomLeaf;
            questionPanel.textContent = `Click on species: ${randomLeaf}`;
        }

        function flashNode(node, flashColorHex) {
            node.material.emissive.setHex(flashColorHex);
            setTimeout(() => {
                if (currentlySelectedMesh === node) {
                    node.material.emissive.setHex(0xffff00);
                } else {
                    node.material.emissive.setHex(0x000000);
                }
            }, 500);
        }

        window.addEventListener('pointerdown', (event) => {
            if (event.target !== renderer.domElement) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, perspCamera);
            const intersects = raycaster.intersectObjects(nodesMeshArray);

            if (intersects.length > 0) {
                const clickedNode = intersects[0].object;

                if (currentlySelectedMesh) {
                    currentlySelectedMesh.material.emissive.setHex(0x000000);
                }

                currentlySelectedMesh = clickedNode;
                currentlySelectedMesh.material.emissive.setHex(0xffff00);
                window.__3D_STATE__.selectedNode = clickedNode.userData.name;

                if (window.__3D_STATE__.quizActive) {
                    if (clickedNode.userData.isLeaf) {
                        if (clickedNode.userData.name === window.__3D_STATE__.currentQuestion) {
                            window.__3D_STATE__.score += 10;
                            window.__3D_STATE__.correctAnswers++;
                            showFeedback('Correct!', '#33cc33');
                            flashNode(clickedNode, 0x00ff00);
                            pickNewQuestion();
                        } else {
                            window.__3D_STATE__.score -= 5;
                            window.__3D_STATE__.wrongAnswers++;
                            showFeedback('Wrong!', '#ff3333');
                            flashNode(clickedNode, 0xff0000);
                        }
                        updateUI();
                    } else {
                        showFeedback('Select a leaf node!', '#aaaaaa');
                    }
                } else {
                    showFeedback(`Selected: ${clickedNode.userData.name}`, '#ffffff');
                }
            }
        });

        // UI Event Listeners
        quizBtn.addEventListener('click', () => {
            window.__3D_STATE__.quizActive = !window.__3D_STATE__.quizActive;
            if (window.__3D_STATE__.quizActive) {
                quizBtn.classList.add('active');
                questionPanel.style.display = 'block';
                pickNewQuestion();
                showFeedback('Quiz started!', '#00cccc');
            } else {
                quizBtn.classList.remove('active');
                questionPanel.style.display = 'none';
                window.__3D_STATE__.currentQuestion = null;
                showFeedback('Quiz ended.', '#aaaaaa');
            }
        });

        resetBtn.addEventListener('click', () => {
            window.__3D_STATE__.score = 0;
            window.__3D_STATE__.correctAnswers = 0;
            window.__3D_STATE__.wrongAnswers = 0;
            window.__3D_STATE__.quizActive = false;
            quizBtn.classList.remove('active');
            questionPanel.style.display = 'none';
            window.__3D_STATE__.currentQuestion = null;
            
            if (currentlySelectedMesh) {
                currentlySelectedMesh.material.emissive.setHex(0x000000);
                currentlySelectedMesh = null;
            }
            window.__3D_STATE__.selectedNode = null;
            
            updateUI();
            showFeedback('Reset successful.', '#ffffff');
        });

        // Keyboard Controls
        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            if (key === 'r') {
                window.__3D_STATE__.treeRotation += 90;
                const targetRotation = THREE.MathUtils.degToRad(window.__3D_STATE__.treeRotation);
                
                new TWEEN.Tween(treeGroup.rotation)
                    .to({ y: targetRotation }, 500)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .start();
            } else if (key === 'h') {
                window.__3D_STATE__.branchesVisible = !window.__3D_STATE__.branchesVisible;
                branchesGroup.visible = window.__3D_STATE__.branchesVisible;
            }
        });

        // Resize Handler
        window.addEventListener('resize', () => {
            perspCamera.aspect = window.innerWidth / window.innerHeight;
            perspCamera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const tempV = new THREE.Vector3();
        
        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            controls.update();

            // Update HTML Labels positions
            htmlLabels.forEach(label => {
                label.mesh.getWorldPosition(tempV);
                tempV.project(perspCamera);
                
                if (tempV.z > 1) {
                    label.element.style.opacity = '0';
                } else {
                    const x = (tempV.x * 0.5 + 0.5) * window.innerWidth;
                    const y = (tempV.y * -0.5 + 0.5) * window.innerHeight;
                    label.element.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px)`;
                    label.element.style.opacity = '1';
                }
            });

            renderer.render(scene, perspCamera);
        }

        animate();
    </script>
</body>
</html>
