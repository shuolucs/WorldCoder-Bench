<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Phylogenetic Tree Quiz</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      z-index: 10;
      pointer-events: auto;
      user-select: none;
    }

    #scoreDisplay {
      top: 15px;
      left: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    #nodeCount {
      top: 15px;
      right: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    #controlsWrap {
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #quizBtn, #resetBtn {
      background: #1f2a44;
      color: white;
      border: 1px solid #6ea8ff;
      border-radius: 6px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    #quizBtn:hover, #resetBtn:hover {
      background: #2f4777;
    }

    #questionPanel {
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 40, 0.9);
      border: 1px solid #6ea8ff;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 18px;
      display: none;
    }

    #feedback {
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 160px;
      text-align: center;
      background: rgba(0,0,0,0.45);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 22px;
      font-weight: bold;
    }

    #infoPanel {
      position: absolute;
      z-index: 10;
      left: 15px;
      top: 55px;
      background: rgba(20,20,40,0.85);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 10px 12px;
      min-width: 180px;
      font-size: 14px;
      line-height: 1.4;
    }

    .label {
      position: absolute;
      z-index: 9;
      color: #ffffff;
      font-size: 14px;
      font-weight: bold;
      text-shadow: 0 0 6px rgba(0,0,0,0.8);
      pointer-events: none;
      transform: translate(-50%, -50%);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="scoreDisplay" class="hud">Score: 0</div>
  <div id="nodeCount" class="hud">Nodes: 15</div>

  <div id="controlsWrap" class="hud">
    <button id="quizBtn">Quiz Mode</button>
    <button id="resetBtn">Reset</button>
  </div>

  <div id="questionPanel" class="hud"></div>
  <div id="feedback" class="hud"></div>

  <div id="infoPanel">
    <strong>Selected Node:</strong> <span id="selectedNodeText">None</span><br />
    <strong>Level:</strong> <span id="selectedLevelText">-</span><br />
    <strong>Type:</strong> <span id="selectedTypeText">-</span>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const treeGroup = new THREE.Group();
    const branchGroup = new THREE.Group();
    const nodeGroup = new THREE.Group();
    treeGroup.add(branchGroup);
    treeGroup.add(nodeGroup);
    scene.add(treeGroup);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const scoreDisplay = document.getElementById('scoreDisplay');
    const nodeCount = document.getElementById('nodeCount');
    const feedback = document.getElementById('feedback');
    const questionPanel = document.getElementById('questionPanel');
    const quizBtn = document.getElementById('quizBtn');
    const resetBtn = document.getElementById('resetBtn');
    const selectedNodeText = document.getElementById('selectedNodeText');
    const selectedLevelText = document.getElementById('selectedLevelText');
    const selectedTypeText = document.getElementById('selectedTypeText');

    const leafSpecies = ['Alpha', 'Beta', 'Gamma', 'Delta', 'Epsilon', 'Zeta', 'Eta', 'Theta'];

    window.__3D_STATE__ = {
      score: 0,
      quizActive: false,
      selectedNode: null,
      totalNodes: 15,
      branchesVisible: true,
      treeRotation: 0,
      currentQuestion: null,
      correctAnswers: 0,
      wrongAnswers: 0,
      helmetLoaded: false,
      leafNodes: [...leafSpecies]
    };

    nodeCount.textContent = `Nodes: ${window.__3D_STATE__.totalNodes}`;

    const nodeMaterials = {
      root: new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0x000000 }),
      level1: new THREE.MeshStandardMaterial({ color: 0x00cccc, emissive: 0x000000 }),
      level2: new THREE.MeshStandardMaterial({ color: 0x33cc33, emissive: 0x000000 }),
      level3: new THREE.MeshStandardMaterial({ color: 0xcc33cc, emissive: 0x000000 })
    };

    const sphereGeo = new THREE.SphereGeometry(0.3, 24, 24);
    const nodes = [];
    const labels = [];

    function createNode(name, level, position, colorKey, type = 'internal') {
      const material = nodeMaterials[colorKey].clone();
      const mesh = new THREE.Mesh(sphereGeo, material);
      mesh.position.copy(position);
      mesh.userData = {
        name,
        level,
        type,
        defaultEmissive: new THREE.Color(0x000000),
        defaultColor: material.color.clone()
      };
      nodeGroup.add(mesh);
      nodes.push(mesh);
      return mesh;
    }

    function createBranch(start, end) {
      const direction = new THREE.Vector3().subVectors(end, start);
      const length = direction.length();
      const geometry = new THREE.CylinderGeometry(0.05, 0.05, length, 12);
      const material = new THREE.MeshStandardMaterial({ color: 0xffffff });
      const branch = new THREE.Mesh(geometry, material);

      const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      branch.position.copy(midpoint);

      branch.quaternion.setFromUnitVectors(
        new THREE.Vector3(0, 1, 0),
        direction.clone().normalize()
      );

      branchGroup.add(branch);
      return branch;
    }

    function createLabel(text, position) {
      const div = document.createElement('div');
      div.className = 'label';
      div.textContent = text;
      document.body.appendChild(div);
      labels.push({ element: div, position: position.clone() });
    }

    const rootPos = new THREE.Vector3(0, -4, 0);
    const level1Y = -1;
    const level2Y = 2;
    const level3Y = 5;

    const level1X = [-4, 4];
    const level2X = [-6, -2, 2, 6];
    const level3X = [-7, -5, -3, -1, 1, 3, 5, 7];

    const root = createNode('root', 0, rootPos, 'root', 'root');

    const level1Nodes = level1X.map((x, i) =>
      createNode(`branch_1_${i}`, 1, new THREE.Vector3(x, level1Y, 0), 'level1', 'branch')
    );

    const level2Nodes = level2X.map((x, i) =>
      createNode(`branch_2_${i}`, 2, new THREE.Vector3(x, level2Y, 0), 'level2', 'branch')
    );

    const level3Nodes = level3X.map((x, i) => {
      const pos = new THREE.Vector3(x, level3Y, 0);
      const node = createNode(leafSpecies[i], 3, pos, 'level3', 'leaf');
      createLabel(leafSpecies[i], pos);
      return node;
    });

    level1Nodes.forEach(n => createBranch(root.position, n.position));

    createBranch(level1Nodes[0].position, level2Nodes[0].position);
    createBranch(level1Nodes[0].position, level2Nodes[1].position);
    createBranch(level1Nodes[1].position, level2Nodes[2].position);
    createBranch(level1Nodes[1].position, level2Nodes[3].position);

    createBranch(level2Nodes[0].position, level3Nodes[0].position);
    createBranch(level2Nodes[0].position, level3Nodes[1].position);
    createBranch(level2Nodes[1].position, level3Nodes[2].position);
    createBranch(level2Nodes[1].position, level3Nodes[3].position);
    createBranch(level2Nodes[2].position, level3Nodes[4].position);
    createBranch(level2Nodes[2].position, level3Nodes[5].position);
    createBranch(level2Nodes[3].position, level3Nodes[6].position);
    createBranch(level2Nodes[3].position, level3Nodes[7].position);

    const loader = new GLTFLoader();
    loader.load(
      'https://threejs.org/examples/models/gltf/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
      (gltf) => {
        const model = gltf.scene;
        model.scale.setScalar(0.5);
        model.position.copy(rootPos);
        model.position.y -= 0.2;
        treeGroup.add(model);
        window.__3D_STATE__.helmetLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('DamagedHelmet.glb failed to load:', err);
      }
    );

    function updateScoreDisplay() {
      scoreDisplay.textContent = `Score: ${window.__3D_STATE__.score}`;
    }

    function setFeedback(text, color = '#ffffff', duration = 1000) {
      feedback.textContent = text;
      feedback.style.color = color;
      if (duration > 0) {
        clearTimeout(setFeedback._timer);
        setFeedback._timer = setTimeout(() => {
          feedback.textContent = '';
        }, duration);
      }
    }

    function clearHighlights() {
      nodes.forEach(node => {
        node.material.emissive.set(0x000000);
      });
    }

    function selectNode(node) {
      clearHighlights();
      node.material.emissive.set(0xffff00);
      window.__3D_STATE__.selectedNode = node.userData.name;
      selectedNodeText.textContent = node.userData.name;
      selectedLevelText.textContent = node.userData.level;
      selectedTypeText.textContent = node.userData.type;
    }

    function flashNode(node, colorHex, duration = 500) {
      const original = node.material.emissive.clone();
      node.material.emissive.set(colorHex);
      setTimeout(() => {
        if (window.__3D_STATE__.selectedNode === node.userData.name) {
          node.material.emissive.set(0xffff00);
        } else {
          node.material.emissive.copy(original.equals(new THREE.Color(0x000000)) ? new THREE.Color(0x000000) : original);
        }
      }, duration);
    }

    function randomSpecies() {
      return leafSpecies[Math.floor(Math.random() * leafSpecies.length)];
    }

    function nextQuestion() {
      const species = randomSpecies();
      window.__3D_STATE__.currentQuestion = species;
      questionPanel.textContent = `Click on species: ${species}`;
      questionPanel.style.display = 'block';
    }

    function setQuizMode(active) {
      window.__3D_STATE__.quizActive = active;
      quizBtn.textContent = active ? 'Quiz Mode: ON' : 'Quiz Mode';
      if (active) {
        nextQuestion();
      } else {
        window.__3D_STATE__.currentQuestion = null;
        questionPanel.style.display = 'none';
        questionPanel.textContent = '';
      }
    }

    quizBtn.addEventListener('click', () => {
      setQuizMode(!window.__3D_STATE__.quizActive);
    });

    resetBtn.addEventListener('click', () => {
      window.__3D_STATE__.score = 0;
      window.__3D_STATE__.quizActive = false;
      window.__3D_STATE__.selectedNode = null;
      window.__3D_STATE__.currentQuestion = null;
      window.__3D_STATE__.correctAnswers = 0;
      window.__3D_STATE__.wrongAnswers = 0;
      updateScoreDisplay();
      questionPanel.style.display = 'none';
      questionPanel.textContent = '';
      feedback.textContent = '';
      selectedNodeText.textContent = 'None';
      selectedLevelText.textContent = '-';
      selectedTypeText.textContent = '-';
      quizBtn.textContent = 'Quiz Mode';
      clearHighlights();
    });

    function handleQuizClick(node) {
      if (!window.__3D_STATE__.quizActive || node.userData.type !== 'leaf') return;

      if (node.userData.name === window.__3D_STATE__.currentQuestion) {
        window.__3D_STATE__.score += 10;
        window.__3D_STATE__.correctAnswers += 1;
        updateScoreDisplay();
        flashNode(node, 0x00ff00, 500);
        setFeedback('Correct!', '#00ff88');
      } else {
        window.__3D_STATE__.score -= 5;
        window.__3D_STATE__.wrongAnswers += 1;
        updateScoreDisplay();
        flashNode(node, 0xff0000, 500);
        setFeedback('Wrong!', '#ff5555');
      }
      nextQuestion();
    }

    renderer.domElement.addEventListener('click', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(nodes, false);

      if (intersects.length > 0) {
        const node = intersects[0].object;
        selectNode(node);
        handleQuizClick(node);
      }
    });

    let rotationAnimating = false;
    let rotationStart = 0;
    let rotationEnd = 0;
    let rotationStartTime = 0;
    const rotationDuration = 500;

    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'r' && !rotationAnimating) {
        rotationAnimating = true;
        rotationStart = treeGroup.rotation.y;
        rotationEnd = rotationStart + Math.PI / 2;
        rotationStartTime = performance.now();
        window.__3D_STATE__.treeRotation = (window.__3D_STATE__.treeRotation + 90) % 360;
      }

      if (e.key.toLowerCase() === 'h') {
        window.__3D_STATE__.branchesVisible = !window.__3D_STATE__.branchesVisible;
        branchGroup.visible = window.__3D_STATE__.branchesVisible;
      }
    });

    function updateLabels() {
      labels.forEach(label => {
        const worldPos = label.position.clone();
        treeGroup.localToWorld(worldPos);

        const projected = worldPos.clone().project(camera);
        const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;

        const visible = projected.z < 1;
        label.element.style.display = visible ? 'block' : 'none';
        label.element.style.left = `${x}px`;
        label.element.style.top = `${y}px`;
      });
    }

    function animate(time) {
      requestAnimationFrame(animate);

      if (rotationAnimating) {
        const elapsed = time - rotationStartTime;
        const t = Math.min(elapsed / rotationDuration, 1);
        const eased = t * (2 - t);
        treeGroup.rotation.y = THREE.MathUtils.lerp(rotationStart, rotationEnd, eased);
        if (t >= 1) {
          rotationAnimating = false;
          treeGroup.rotation.y = rotationEnd;
        }
      }

      controls.update();
      updateLabels();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
