<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Runner 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        .hud-text {
            font-size: 24px;
            font-weight: bold;
            position: absolute;
        }
        #hud-score { top: 20px; left: 20px; color: white; }
        #hud-lives { top: 20px; right: 20px; color: #ff4444; }
        #hud-center-top {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #hud-distance { color: white; font-size: 24px; font-weight: bold; }
        #hud-energy-bar {
            width: 200px;
            height: 20px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid white;
            border-radius: 10px;
            overflow: hidden;
        }
        #hud-energy-fill {
            width: 100%;
            height: 100%;
            background-color: #00ccff;
            transition: width 0.1s linear;
        }
        #hud-time-mode {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            font-weight: bold;
            color: #00ccff;
            opacity: 0.8;
            letter-spacing: 2px;
        }
        #controls-help {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            line-height: 1.5;
        }
        #game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 10;
        }
        #game-over-text {
            font-size: 64px;
            color: #ff2222;
            margin-bottom: 20px;
            font-weight: bold;
        }
        #final-stats {
            font-size: 24px;
            color: white;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.5;
        }
        #btn-restart {
            padding: 15px 40px;
            font-size: 24px;
            font-family: inherit;
            font-weight: bold;
            color: white;
            background-color: #44aa44;
            border: 3px solid white;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }
        #btn-restart:hover {
            background-color: #55cc55;
            transform: scale(1.05);
        }
        #btn-restart:active {
            transform: scale(0.95);
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>
    <div id="ui-layer">
        <div id="hud-score" class="hud-text">Score: 0</div>
        <div id="hud-lives" class="hud-text">Lives: 3</div>
        <div id="hud-center-top">
            <div id="hud-distance">Distance: 0m</div>
            <div id="hud-energy-bar"><div id="hud-energy-fill"></div></div>
        </div>
        <div id="hud-time-mode">NORMAL</div>
        <div id="controls-help">
            [Left/Right] Move | [Space] Jump<br>
            [T] Slow-Mo (Hold) | [R] Rewind (50 Energy) | [F] Freeze (30 Energy)
        </div>
    </div>
    <div id="game-over-overlay">
        <div id="game-over-text">GAME OVER</div>
        <div id="final-stats">Score: 0<br>Distance: 0m</div>
        <button id="btn-restart">RESTART</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            playerX: 0, playerY: 1, playerZ: 0,
            velocityY: 0, isGrounded: true,
            score: 0, lives: 3, distance: 0,
            timeScale: 1.0, timeEnergy: 100, timeMode: 'NORMAL',
            isInvincible: false, coinsTotal: 0, obstaclesTotal: 0,
            gameOver: false, gameStarted: false, modelLoaded: false,
            platformCount: 0, rewindAvailable: false, freezeActive: false
        };
        const state = window.__3D_STATE__;

        // --- Constants ---
        const GRAVITY = -20;
        const BASE_SPEED = 8;
        const LATERAL_SPEED = 6;
        const JUMP_VELOCITY = 12;
        const LEVEL_END_Z = -300;
        
        // --- Scene Setup ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 50, 150);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        scene.add(dirLight);

        // --- Game Objects ---
        let playerGroup = new THREE.Group();
        playerGroup.position.set(0, 1, 0);
        scene.add(playerGroup);
        
        let playerMixer;
        let playerVelocity = new THREE.Vector3(0, 0, 0);
        let playerBox = new THREE.Box3();

        // Dummy player while loading
        const dummyGeo = new THREE.BoxGeometry(1, 1.5, 1);
        const dummyMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });
        const dummyMesh = new THREE.Mesh(dummyGeo, dummyMat);
        dummyMesh.position.y = 0.75;
        dummyMesh.castShadow = true;
        playerGroup.add(dummyMesh);

        // Load Stork
        const loader = new GLTFLoader();
        loader.load('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/models/gltf/Stork.glb', (gltf) => {
            const model = gltf.scene;
            
            // Scale to ~1.5 units tall
            const box = new THREE.Box3().setFromObject(model);
            const height = box.max.y - box.min.y;
            const scale = 1.5 / height;
            model.scale.set(scale, scale, scale);
            
            // Center and position
            model.position.y = 0.75;
            model.traverse(child => { if (child.isMesh) child.castShadow = true; });
            
            playerGroup.remove(dummyMesh);
            playerGroup.add(model);
            
            playerMixer = new THREE.AnimationMixer(model);
            if (gltf.animations.length > 0) {
                playerMixer.clipAction(gltf.animations[0]).play();
            }
            state.modelLoaded = true;
        });

        // Level Arrays
        let platforms = [];
        let obstacles = [];
        let coins = [];

        // Materials
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x556655 });
        const platMat1 = new THREE.MeshStandardMaterial({ color: 0x8866aa });
        const platMat2 = new THREE.MeshStandardMaterial({ color: 0x66aa88 });
        const obsMat = new THREE.MeshStandardMaterial({ color: 0xff2222 });
        const coinMat = new THREE.MeshStandardMaterial({ color: 0xffdd00, emissive: 0xffaa00, emissiveIntensity: 0.5 });

        // Geometries
        const obsGeo = new THREE.BoxGeometry(1, 2, 1);
        const coinGeo = new THREE.SphereGeometry(0.3, 16, 16);

        function generateLevel() {
            // Clear existing
            platforms.forEach(p => scene.remove(p));
            obstacles.forEach(o => scene.remove(o));
            coins.forEach(c => scene.remove(c));
            platforms = []; obstacles = []; coins = [];
            state.coinsTotal = 0; state.obstaclesTotal = 0; state.platformCount = 0;

            // Ground
            const groundGeo = new THREE.PlaneGeometry(20, Math.abs(LEVEL_END_Z) + 50);
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.set(0, 0, LEVEL_END_Z / 2);
            ground.receiveShadow = true;
            scene.add(ground);
            platforms.push({ mesh: ground, isGround: true, box: new THREE.Box3() });

            // Procedural Platforms
            const numPlatforms = 25;
            for (let i = 0; i < numPlatforms; i++) {
                const w = 2 + Math.random() * 3;
                const h = 0.3;
                const d = 2 + Math.random() * 2;
                const geo = new THREE.BoxGeometry(w, h, d);
                const mat = i % 2 === 0 ? platMat1 : platMat2;
                const mesh = new THREE.Mesh(geo, mat);
                
                const y = 1 + Math.random() * 7;
                const z = -10 - (Math.random() * Math.abs(LEVEL_END_Z - 20));
                const x = (Math.random() - 0.5) * 6;
                
                mesh.position.set(x, y, z);
                mesh.receiveShadow = true;
                mesh.castShadow = true;
                scene.add(mesh);
                
                // Add movement data for freeze effect
                platforms.push({
                    mesh: mesh,
                    isGround: false,
                    box: new THREE.Box3(),
                    baseY: y,
                    phase: Math.random() * Math.PI * 2,
                    speed: 1 + Math.random() * 2
                });
                state.platformCount++;

                // Chance to add obstacle on platform
                if (Math.random() > 0.6) {
                    addObstacle(x, y + h/2 + 1, z);
                }
            }

            // Ground Obstacles
            for (let i = 0; i < 15; i++) {
                const z = -20 - Math.random() * Math.abs(LEVEL_END_Z - 30);
                const x = (Math.random() - 0.5) * 6;
                addObstacle(x, 1, z);
            }

            // Coins
            for (let i = 0; i < 30; i++) {
                const mesh = new THREE.Mesh(coinGeo, coinMat);
                const z = -15 - Math.random() * Math.abs(LEVEL_END_Z - 20);
                const x = (Math.random() - 0.5) * 6;
                const y = 1 + Math.random() * 5;
                mesh.position.set(x, y, z);
                scene.add(mesh);
                coins.push({ mesh: mesh, active: true, baseY: y, phase: Math.random() * Math.PI * 2 });
                state.coinsTotal++;
            }
        }

        function addObstacle(x, y, z) {
            const mesh = new THREE.Mesh(obsGeo, obsMat);
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            obstacles.push({ mesh: mesh, box: new THREE.Box3() });
            state.obstaclesTotal++;
        }

        // --- Input Handling ---
        const keys = { ArrowLeft: false, ArrowRight: false, Space: false, KeyT: false };
        
        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = true;
            
            if (e.code === 'KeyT' && !state.gameOver && state.timeMode === 'NORMAL') {
                state.timeMode = 'SLOW_MO';
            }
            if (e.code === 'KeyR' && !state.gameOver && state.timeMode === 'NORMAL') {
                activateRewind();
            }
            if (e.code === 'KeyF' && !state.gameOver && !state.freezeActive) {
                activateFreeze();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
            if (e.code === 'KeyT' && state.timeMode === 'SLOW_MO') {
                state.timeMode = 'NORMAL';
            }
        });

        // --- Time Mechanics Logic ---
        let history = [];
        let rewindTimer = 0;
        const REWIND_DURATION = 1.5;
        const HISTORY_MAX_TIME = 3.0;
        let lastSnapshotTime = 0;
        let freezeTimer = 0;
        let invincibilityTimer = 0;

        function activateRewind() {
            if (state.timeEnergy >= 50 && history.length > 0) {
                state.timeEnergy -= 50;
                state.timeMode = 'REWIND';
                rewindTimer = 0;
            }
        }

        function activateFreeze() {
            if (state.timeEnergy >= 30) {
                state.timeEnergy -= 30;
                state.freezeActive = true;
                freezeTimer = 3.0;
            }
        }

        function resetGame() {
            playerGroup.position.set(0, 1, 0);
            playerVelocity.set(0, 0, 0);
            state.score = 0;
            state.lives = 3;
            state.distance = 0;
            state.timeEnergy = 100;
            state.timeMode = 'NORMAL';
            state.isInvincible = false;
            state.gameOver = false;
            state.freezeActive = false;
            history = [];
            playerGroup.visible = true;
            
            document.getElementById('game-over-overlay').style.display = 'none';
            generateLevel();
            updateUI();
        }

        document.getElementById('btn-restart').addEventListener('click', resetGame);

        // --- Main Loop ---
        const clock = new THREE.Clock();
        let gameTime = 0;

        function updateUI() {
            document.getElementById('hud-score').innerText = `Score: ${state.score}`;
            document.getElementById('hud-lives').innerText = `Lives: ${state.lives}`;
            document.getElementById('hud-distance').innerText = `Distance: ${Math.floor(state.distance)}m`;
            document.getElementById('hud-energy-fill').style.width = `${state.timeEnergy}%`;
            
            const modeEl = document.getElementById('hud-time-mode');
            if (state.timeMode === 'NORMAL') {
                modeEl.innerText = state.freezeActive ? 'FREEZE' : '';
                modeEl.style.color = state.freezeActive ? '#aaaaff' : '#00ccff';
            } else {
                modeEl.innerText = state.timeMode.replace('_', '-');
                modeEl.style.color = state.timeMode === 'REWIND' ? '#ffaa00' : '#00ccff';
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const realDt = Math.min(clock.getDelta(), 0.1);
            state.gameStarted = true;

            if (state.gameOver) {
                renderer.render(scene, camera);
                return;
            }

            // Time Mode Logic
            if (state.timeMode === 'SLOW_MO') {
                state.timeScale = 0.25;
                state.timeEnergy -= 40 * realDt;
                if (state.timeEnergy <= 0) {
                    state.timeEnergy = 0;
                    state.timeMode = 'NORMAL';
                }
            } else if (state.timeMode === 'NORMAL') {
                state.timeScale = 1.0;
                state.timeEnergy = Math.min(100, state.timeEnergy + 10 * realDt);
            }

            const dt = realDt * state.timeScale;
            gameTime += dt;

            // Freeze Logic
            if (state.freezeActive) {
                freezeTimer -= realDt;
                if (freezeTimer <= 0) state.freezeActive = false;
            }

            // Rewind Logic
            if (state.timeMode === 'REWIND') {
                rewindTimer += realDt;
                const progress = Math.min(1.0, rewindTimer / REWIND_DURATION);
                
                if (history.length > 0) {
                    const targetIndex = (1 - progress) * (history.length - 1);
                    const idx1 = Math.floor(targetIndex);
                    const idx2 = Math.ceil(targetIndex);
                    const t = targetIndex - idx1;
                    
                    const snap1 = history[idx1];
                    const snap2 = history[idx2] || snap1;
                    
                    playerGroup.position.lerpVectors(snap1.pos, snap2.pos, t);
                    playerVelocity.lerpVectors(snap1.vel, snap2.vel, t);
                }

                if (progress >= 1.0) {
                    state.timeMode = 'NORMAL';
                    history = []; // Clear history after rewind to prevent chaining exploits
                }
            } else {
                // --- Normal Physics & Movement ---
                
                // Record History
                if (gameTime - lastSnapshotTime > 0.1) {
                    history.push({
                        pos: playerGroup.position.clone(),
                        vel: playerVelocity.clone(),
                        time: gameTime
                    });
                    if (history.length > HISTORY_MAX_TIME / 0.1) history.shift();
                    lastSnapshotTime = gameTime;
                }
                state.rewindAvailable = state.timeEnergy >= 50 && history.length > 0;

                // Lateral Movement
                if (keys.ArrowLeft) playerGroup.position.x += LATERAL_SPEED * dt;
                if (keys.ArrowRight) playerGroup.position.x -= LATERAL_SPEED * dt;
                playerGroup.position.x = THREE.MathUtils.clamp(playerGroup.position.x, -3, 3);

                // Forward Movement
                playerVelocity.z = -BASE_SPEED;

                // Gravity & Jump
                playerVelocity.y += GRAVITY * dt;
                if (keys.Space && state.isGrounded) {
                    playerVelocity.y = JUMP_VELOCITY;
                    state.isGrounded = false;
                }

                // Apply Velocity
                const prevY = playerGroup.position.y;
                playerGroup.position.addScaledVector(playerVelocity, dt);

                // --- Collisions ---
                state.isGrounded = false;
                
                // Update Player AABB (approximate size 1x1.5x1)
                playerBox.setFromCenterAndSize(
                    new THREE.Vector3(playerGroup.position.x, playerGroup.position.y + 0.75, playerGroup.position.z),
                    new THREE.Vector3(0.8, 1.5, 0.8)
                );

                // Platform Collision
                for (let p of platforms) {
                    if (p.isGround) {
                        if (playerGroup.position.y <= 0) {
                            playerGroup.position.y = 0;
                            playerVelocity.y = 0;
                            state.isGrounded = true;
                        }
                        continue;
                    }

                    // Animate platforms if not frozen
                    if (!state.freezeActive) {
                        p.mesh.position.y = p.baseY + Math.sin(gameTime * p.speed + p.phase) * 1.0;
                    }
                    p.box.setFromObject(p.mesh);

                    // Landing check: falling, was above platform, now intersecting XZ
                    if (playerVelocity.y < 0) {
                        const platTop = p.box.max.y;
                        if (prevY >= platTop - 0.2 && playerGroup.position.y <= platTop) {
                            // Check XZ overlap
                            if (playerBox.max.x > p.box.min.x && playerBox.min.x < p.box.max.x &&
                                playerBox.max.z > p.box.min.z && playerBox.min.z < p.box.max.z) {
                                playerGroup.position.y = platTop;
                                playerVelocity.y = 0;
                                state.isGrounded = true;
                            }
                        }
                    }
                }

                // Obstacle Collision
                if (!state.isInvincible) {
                    for (let o of obstacles) {
                        o.box.setFromObject(o.mesh);
                        // Shrink obstacle box slightly for fairer gameplay
                        o.box.expandByScalar(-0.1);
                        if (playerBox.intersectsBox(o.box)) {
                            state.lives--;
                            state.isInvincible = true;
                            invincibilityTimer = 2.0;
                            if (state.lives <= 0) {
                                state.gameOver = true;
                                document.getElementById('game-over-overlay').style.display = 'flex';
                                document.getElementById('final-stats').innerHTML = `Score: ${state.score}<br>Distance: ${Math.floor(state.distance)}m`;
                            }
                            break;
                        }
                    }
                }

                // Coin Collection
                for (let c of coins) {
                    if (!c.active) continue;
                    
                    // Animate coin
                    if (!state.freezeActive) {
                        c.mesh.rotation.y += 2 * dt;
                        c.mesh.position.y = c.baseY + Math.sin(gameTime * 3 + c.phase) * 0.2;
                    }

                    if (playerGroup.position.distanceTo(c.mesh.position) < 1.5) {
                        c.active = false;
                        c.mesh.visible = false;
                        state.score++;
                    }
                }

                // Distance tracking
                state.distance = Math.max(state.distance, -playerGroup.position.z);

                // Level End / Loop (Simple reset for continuous play)
                if (playerGroup.position.z < LEVEL_END_Z) {
                    state.gameOver = true;
                    document.getElementById('game-over-text').innerText = "LEVEL COMPLETE";
                    document.getElementById('game-over-text').style.color = "#44ff44";
                    document.getElementById('game-over-overlay').style.display = 'flex';
                    document.getElementById('final-stats').innerHTML = `Score: ${state.score}<br>Distance: ${Math.floor(state.distance)}m`;
                }
            }

            // Invincibility visual
            if (state.isInvincible) {
                invincibilityTimer -= realDt;
                playerGroup.visible = Math.floor(gameTime * 10) % 2 === 0;
                if (invincibilityTimer <= 0) {
                    state.isInvincible = false;
                    playerGroup.visible = true;
                }
            }

            // Animation Mixer
            if (playerMixer) {
                // Adjust animation speed based on time scale and movement
                const animSpeed = state.timeMode === 'REWIND' ? -1.5 : state.timeScale;
                playerMixer.update(realDt * animSpeed);
            }

            // Camera Follow
            camera.position.x = THREE.MathUtils.lerp(camera.position.x, playerGroup.position.x * 0.5, 0.1);
            camera.position.y = THREE.MathUtils.lerp(camera.position.y, playerGroup.position.y + 4, 0.1);
            camera.position.z = playerGroup.position.z + 8;
            camera.lookAt(playerGroup.position.x, playerGroup.position.y + 1, playerGroup.position.z - 5);

            // Update State Object
            state.playerX = playerGroup.position.x;
            state.playerY = playerGroup.position.y;
            state.playerZ = playerGroup.position.z;
            state.velocityY = playerVelocity.y;

            updateUI();
            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Init
        generateLevel();
        animate();

    </script>
</body>
</html>
