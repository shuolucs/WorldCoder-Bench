<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Three.js Time Parkour Runner</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0f1118;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }

    .hud {
      position: fixed;
      z-index: 10;
      color: white;
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
      user-select: none;
    }

    #hud-score {
      top: 16px;
      left: 16px;
      font-size: 24px;
    }

    #hud-lives {
      top: 16px;
      right: 16px;
      font-size: 24px;
      color: #ff5555;
    }

    #hud-center {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
      user-select: none;
    }

    #hud-distance {
      color: white;
      font-size: 24px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }

    #hud-energy-bar {
      width: 200px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.85);
      background: rgba(20,20,30,0.6);
      margin: 8px auto 0;
      box-sizing: border-box;
    }

    #hud-energy-fill {
      width: 100%;
      height: 100%;
      background: #00ccff;
      box-shadow: 0 0 8px rgba(0,204,255,0.5);
    }

    #hud-time-mode {
      position: fixed;
      top: 48%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      color: white;
      font-size: 30px;
      font-weight: bold;
      letter-spacing: 1px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.9);
      pointer-events: none;
      user-select: none;
    }

    #instructions {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      color: rgba(255,255,255,0.9);
      background: rgba(0,0,0,0.35);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      pointer-events: none;
    }

    #game-over-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
    }

    #game-over-panel {
      text-align: center;
      color: white;
      background: rgba(20,20,30,0.9);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 30px 36px;
      min-width: 280px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.45);
    }

    #game-over-title {
      font-size: 42px;
      font-weight: bold;
      margin-bottom: 12px;
      color: #ff6666;
    }

    #game-over-text {
      font-size: 22px;
      margin-bottom: 20px;
    }

    #btn-restart {
      font-size: 18px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #00ccff;
      color: #081018;
      cursor: pointer;
      pointer-events: auto;
      font-weight: bold;
    }

    #btn-restart:hover {
      background: #4fdbff;
    }
  </style>
</head>
<body>
  <div id="hud-score" class="hud">Score: 0</div>
  <div id="hud-lives" class="hud">Lives: 3</div>

  <div id="hud-center">
    <div id="hud-distance">Distance: 0m</div>
    <div id="hud-energy-bar">
      <div id="hud-energy-fill"></div>
    </div>
  </div>

  <div id="hud-time-mode">Time Mode: NORMAL</div>

  <div id="instructions">
    ←/→ Move &nbsp; | &nbsp; Space Jump &nbsp; | &nbsp; T Slow-Mo &nbsp; | &nbsp; R Rewind &nbsp; | &nbsp; F Freeze
  </div>

  <div id="game-over-overlay">
    <div id="game-over-panel">
      <div id="game-over-title">GAME OVER</div>
      <div id="game-over-text">Final Score: 0</div>
      <button id="btn-restart">Restart</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    let scene, camera, renderer, clock;
    let player, playerRoot, mixer = null;
    let modelLoaded = false;

    let ground;
    const platforms = [];
    const obstacles = [];
    const coins = [];

    const keys = {
      left: false,
      right: false,
      jump: false
    };

    const state = {
      score: 0,
      lives: 3,
      distance: 0,
      timeEnergy: 100,
      timeScale: 1.0,
      timeMode: 'NORMAL',
      gameOver: false,
      gameStarted: false,
      freezeActive: false,
      freezeTimer: 0,
      slowMoActive: false,
      rewindActive: false,
      rewindTimer: 0,
      rewindDuration: 1.5,
      invincible: false,
      invincibleTimer: 0,
      canJump: false,
      platformCount: 0
    };

    const physics = {
      gravity: -20,
      forwardSpeed: 8,
      lateralSpeed: 6,
      jumpVelocity: 12,
      velocity: new THREE.Vector3(0, 0, 0),
      grounded: false
    };

    const snapshotHistory = [];
    let snapshotTimer = 0;
    const SNAPSHOT_INTERVAL = 0.1;
    const SNAPSHOT_MAX_AGE = 3.0;

    const playerBox = new THREE.Box3();
    const tempBox = new THREE.Box3();
    const tempVec = new THREE.Vector3();

    const hudScore = document.getElementById('hud-score');
    const hudLives = document.getElementById('hud-lives');
    const hudDistance = document.getElementById('hud-distance');
    const hudEnergyFill = document.getElementById('hud-energy-fill');
    const hudTimeMode = document.getElementById('hud-time-mode');
    const gameOverOverlay = document.getElementById('game-over-overlay');
    const gameOverText = document.getElementById('game-over-text');
    const btnRestart = document.getElementById('btn-restart');

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87a8c4);
      scene.fog = new THREE.Fog(0x87a8c4, 35, 220);

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 5, 10);
      camera.lookAt(0, 3, -10);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      clock = new THREE.Clock();

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
      dirLight.position.set(5, 15, 10);
      scene.add(dirLight);

      const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
      scene.add(ambientLight);

      createGround();
      createPlatforms();
      createObstacles();
      createCoins();
      createPlayerFallback();
      loadStorkModel();

      window.addEventListener('resize', onResize);
      window.addEventListener('keydown', onKeyDown);
      window.addEventListener('keyup', onKeyUp);
      btnRestart.addEventListener('click', restartGame);

      updateHUD();
      updateExposedState();
    }

    function createGround() {
      const geo = new THREE.BoxGeometry(200, 0.5, 200);
      const mat = new THREE.MeshStandardMaterial({ color: 0x556655 });
      ground = new THREE.Mesh(geo, mat);
      ground.position.set(0, -0.25, -100);
      ground.receiveShadow = true;
      scene.add(ground);
    }

    function createPlatforms() {
      const colors = [0x8866aa, 0x66aa88];

      for (let i = 0; i < 15; i++) {
        const w = THREE.MathUtils.randFloat(2, 5);
        const h = 0.3;
        const d = THREE.MathUtils.randFloat(2, 4);
        const x = THREE.MathUtils.randFloat(-2.5, 2.5);
        const y = THREE.MathUtils.randFloat(1, 8);
        const z = -10 - i * 11 - THREE.MathUtils.randFloat(0, 6);

        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(w, h, d),
          new THREE.MeshStandardMaterial({ color: colors[i % 2] })
        );
        mesh.position.set(x, y, z);
        mesh.userData.basePosition = mesh.position.clone();
        mesh.userData.moveAmp = (i % 3 === 0) ? THREE.MathUtils.randFloat(0.4, 1.1) : 0;
        mesh.userData.moveSpeed = THREE.MathUtils.randFloat(0.7, 1.6);
        mesh.userData.moveAxis = (i % 2 === 0) ? 'x' : 'y';
        scene.add(mesh);
        platforms.push(mesh);
      }

      state.platformCount = platforms.length;
    }

    function createObstacles() {
      const obstacleMat = new THREE.MeshStandardMaterial({ color: 0xff2222 });

      const obstaclePositions = [
        [0, 1, -18], [-2, 1, -30], [2, 1, -42], [0, 1, -58],
        [-1.5, 1, -76], [1.5, 1, -92]
      ];

      obstaclePositions.forEach(p => {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), obstacleMat);
        mesh.position.set(p[0], p[1], p[2]);
        mesh.userData.basePosition = mesh.position.clone();
        mesh.userData.moveAmp = THREE.MathUtils.randFloat(0.3, 1.0);
        mesh.userData.moveSpeed = THREE.MathUtils.randFloat(1.0, 2.0);
        mesh.userData.phase = Math.random() * Math.PI * 2;
        scene.add(mesh);
        obstacles.push(mesh);
      });

      for (let i = 0; i < 4; i++) {
        const pf = platforms[(i * 3 + 2) % platforms.length];
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), obstacleMat);
        mesh.position.set(
          pf.position.x + THREE.MathUtils.randFloatSpread(Math.max(0.5, pf.geometry.parameters.width - 1)),
          pf.position.y + 1.15,
          pf.position.z + THREE.MathUtils.randFloatSpread(Math.max(0.5, pf.geometry.parameters.depth - 1))
        );
        mesh.userData.basePosition = mesh.position.clone();
        mesh.userData.moveAmp = (i % 2 === 0) ? 0.5 : 0;
        mesh.userData.moveSpeed = THREE.MathUtils.randFloat(1.0, 1.8);
        mesh.userData.phase = Math.random() * Math.PI * 2;
        scene.add(mesh);
        obstacles.push(mesh);
      }
    }

    function createCoins() {
      const coinMat = new THREE.MeshStandardMaterial({
        color: 0xffdd00,
        emissive: 0xffaa00,
        emissiveIntensity: 0.6
      });

      for (let i = 0; i < 10; i++) {
        const coin = new THREE.Mesh(
          new THREE.SphereGeometry(0.3, 16, 16),
          coinMat.clone()
        );

        if (i < 5) {
          coin.position.set(
            THREE.MathUtils.randFloat(-2.5, 2.5),
            1.2,
            -12 - i * 20
          );
        } else {
          const pf = platforms[(i + 2) % platforms.length];
          coin.position.set(
            pf.position.x + THREE.MathUtils.randFloatSpread(1.4),
            pf.position.y + 1.0,
            pf.position.z + THREE.MathUtils.randFloatSpread(1.2)
          );
        }

        coin.userData.collected = false;
        coin.userData.floatOffset = Math.random() * Math.PI * 2;
        coin.userData.baseY = coin.position.y;
        scene.add(coin);
        coins.push(coin);
      }
    }

    function createPlayerFallback() {
      playerRoot = new THREE.Group();
      playerRoot.position.set(0, 1, 0);

      const fallback = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 1.5, 0.8),
        new THREE.MeshStandardMaterial({ color: 0xffffff })
      );
      fallback.position.y = 0.75;
      fallback.name = 'fallbackPlayer';
      playerRoot.add(fallback);

      player = playerRoot;
      scene.add(playerRoot);
    }

    function loadStorkModel() {
      const loader = new GLTFLoader();
      loader.load(
        'https://threejs.org/examples/models/gltf/Stork.glb',
        (gltf) => {
          if (playerRoot) scene.remove(playerRoot);

          playerRoot = new THREE.Group();
          playerRoot.position.set(0, 1, 0);

          const model = gltf.scene;
          model.scale.setScalar(0.015);
          model.rotation.y = Math.PI;
          model.position.y = 0;
          playerRoot.add(model);

          const box = new THREE.Box3().setFromObject(model);
          const size = new THREE.Vector3();
          box.getSize(size);
          if (size.y > 0) {
            const desiredHeight = 1.5;
            const scale = desiredHeight / size.y;
            model.scale.multiplyScalar(scale);
          }

          player = playerRoot;
          scene.add(playerRoot);

          if (gltf.animations && gltf.animations.length > 0) {
            mixer = new THREE.AnimationMixer(model);
            const action = mixer.clipAction(gltf.animations[0]);
            action.play();
          }

          modelLoaded = true;
        },
        undefined,
        (err) => {
          console.warn('Failed to load stork.glb, using fallback player.', err);
          modelLoaded = false;
        }
      );
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function onKeyDown(e) {
      const key = e.key.toLowerCase();

      if (e.key === 'ArrowLeft') keys.left = true;
      if (e.key === 'ArrowRight') keys.right = true;
      if (e.code === 'Space') {
        keys.jump = true;
        e.preventDefault();
        attemptJump();
      }

      if (key === 't') toggleSlowMo();
      if (key === 'r') activateRewind();
      if (key === 'f') activateFreeze();
    }

    function onKeyUp(e) {
      if (e.key === 'ArrowLeft') keys.left = false;
      if (e.key === 'ArrowRight') keys.right = false;
      if (e.code === 'Space') keys.jump = false;
    }

    function attemptJump() {
      if (state.gameOver || state.rewindActive) return;
      if (physics.grounded) {
        physics.velocity.y = physics.jumpVelocity;
        physics.grounded = false;
      }
    }

    function toggleSlowMo() {
      if (state.gameOver || state.rewindActive) return;
      if (state.slowMoActive) {
        state.slowMoActive = false;
      } else if (state.timeEnergy > 0) {
        state.slowMoActive = true;
      }
    }

    function activateRewind() {
      if (state.gameOver || state.rewindActive) return;
      if (state.timeEnergy < 50) return;
      if (snapshotHistory.length < 2) return;

      state.timeEnergy -= 50;
      state.rewindActive = true;
      state.rewindTimer = 0;
      state.slowMoActive = false;
      state.timeMode = 'REWIND';
      physics.velocity.set(0, 0, 0);
      physics.grounded = false;
    }

    function activateFreeze() {
      if (state.gameOver || state.rewindActive || state.freezeActive) return;
      if (state.timeEnergy < 30) return;

      state.timeEnergy -= 30;
      state.freezeActive = true;
      state.freezeTimer = 3.0;
    }

    function updatePlatformAndObstacleMotion(elapsed, scaledDt) {
      const activeDt = state.freezeActive ? 0 : scaledDt;

      for (const pf of platforms) {
        if (pf.userData.moveAmp > 0 && activeDt >= 0) {
          if (pf.userData.moveAxis === 'x') {
            pf.position.x = pf.userData.basePosition.x + Math.sin(elapsed * pf.userData.moveSpeed) * pf.userData.moveAmp;
          } else {
            pf.position.y = pf.userData.basePosition.y + Math.sin(elapsed * pf.userData.moveSpeed) * pf.userData.moveAmp * 0.5;
          }
        }
      }

      for (const ob of obstacles) {
        if (ob.userData.moveAmp > 0 && activeDt >= 0) {
          ob.position.x = ob.userData.basePosition.x + Math.sin(elapsed * ob.userData.moveSpeed + ob.userData.phase) * ob.userData.moveAmp;
        }
      }
    }

    function applyPhysics(dt) {
      if (!playerRoot) return;

      const prevPos = playerRoot.position.clone();

      let moveX = 0;
      if (keys.left) moveX -= physics.lateralSpeed;
      if (keys.right) moveX += physics.lateralSpeed;

      playerRoot.position.x += moveX * dt;
      playerRoot.position.x = THREE.MathUtils.clamp(playerRoot.position.x, -3, 3);

      playerRoot.position.z -= physics.forwardSpeed * dt;
      physics.velocity.y += physics.gravity * dt;
      playerRoot.position.y += physics.velocity.y * dt;

      physics.grounded = false;
      let landed = false;
      let bestY = 0;

      const playerHalfWidth = 0.45;
      const playerHalfDepth = 0.45;

      if (playerRoot.position.y <= 1) {
        bestY = 1;
        landed = true;
      }

      if (physics.velocity.y <= 0) {
        for (const pf of platforms) {
          const w = pf.geometry.parameters.width / 2;
          const d = pf.geometry.parameters.depth / 2;
          const topY = pf.position.y + 0.15;

          const withinX = Math.abs(playerRoot.position.x - pf.position.x) <= (w + playerHalfWidth);
          const withinZ = Math.abs(playerRoot.position.z - pf.position.z) <= (d + playerHalfDepth);

          const prevFeetY = prevPos.y - 1;
          const newFeetY = playerRoot.position.y - 1;

          if (withinX && withinZ && prevFeetY >= topY - 0.15 && newFeetY <= topY + 0.2) {
            const candidateY = topY + 1;
            if (!landed || candidateY > bestY) {
              bestY = candidateY;
              landed = true;
            }
          }
        }
      }

      if (landed) {
        playerRoot.position.y = bestY;
        physics.velocity.y = 0;
        physics.grounded = true;
      }

      if (playerRoot.position.y < -10) {
        takeHit(true);
        respawnPlayer();
      }
    }

    function respawnPlayer() {
      playerRoot.position.set(0, 1.5, playerRoot.position.z + 4);
      physics.velocity.set(0, 0, 0);
      physics.grounded = false;
    }

    function updateCoins(realElapsed, scaledDt) {
      for (const coin of coins) {
        if (coin.userData.collected) continue;

        coin.rotation.y += 2.5 * scaledDt;
        coin.position.y = coin.userData.baseY + Math.sin(realElapsed * 2 + coin.userData.floatOffset) * 0.15;

        if (playerRoot.position.distanceTo(coin.position) <= 1.5) {
          coin.userData.collected = true;
          coin.visible = false;
          state.score += 1;
        }
      }
    }

    function updatePlayerBox() {
      const center = playerRoot.position.clone();
      playerBox.min.set(center.x - 0.4, center.y - 1.0, center.z - 0.4);
      playerBox.max.set(center.x + 0.4, center.y + 0.5, center.z + 0.4);
    }

    function checkObstacleCollisions() {
      if (state.invincible) return;

      updatePlayerBox();

      for (const ob of obstacles) {
        tempBox.setFromObject(ob);
        if (playerBox.intersectsBox(tempBox)) {
          takeHit(false);
          break;
        }
      }
    }

    function takeHit(forceRespawn) {
      if (state.invincible || state.gameOver) return;

      state.lives -= 1;
      state.invincible = true;
      state.invincibleTimer = 2.0;

      if (forceRespawn) {
        // handled by caller
      } else {
        physics.velocity.y = 6;
      }

      if (state.lives <= 0) {
        state.lives = 0;
        state.gameOver = true;
        showGameOver();
      }
    }

    function updateInvincibility(dt, realElapsed) {
      if (!state.invincible || !playerRoot) return;

      state.invincibleTimer -= dt;
      const visible = Math.floor(realElapsed * 12) % 2 === 0;
      playerRoot.visible = visible;

      if (state.invincibleTimer <= 0) {
        state.invincible = false;
        playerRoot.visible = true;
      }
    }

    function updateTimeSystems(realDt) {
      if (state.freezeActive) {
        state.freezeTimer -= realDt;
        if (state.freezeTimer <= 0) {
          state.freezeActive = false;
          state.freezeTimer = 0;
        }
      }

      if (state.slowMoActive) {
        state.timeEnergy -= 40 * realDt;
        if (state.timeEnergy <= 0) {
          state.timeEnergy = 0;
          state.slowMoActive = false;
        }
      } else if (!state.rewindActive) {
        state.timeEnergy += 10 * realDt;
      }

      state.timeEnergy = THREE.MathUtils.clamp(state.timeEnergy, 0, 100);
      state.timeScale = state.slowMoActive ? 0.25 : 1.0;
    }

    function recordSnapshot(realDt) {
      if (state.rewindActive || state.gameOver || !playerRoot) return;

      snapshotTimer += realDt;
      if (snapshotTimer >= SNAPSHOT_INTERVAL) {
        snapshotTimer = 0;
        snapshotHistory.push({
          x: playerRoot.position.x,
          y: playerRoot.position.y,
          z: playerRoot.position.z,
          velocityY: physics.velocity.y,
          grounded: physics.grounded
        });
      }

      const maxSnapshots = Math.ceil(SNAPSHOT_MAX_AGE / SNAPSHOT_INTERVAL) + 2;
      while (snapshotHistory.length > maxSnapshots) {
        snapshotHistory.shift();
      }
    }

    function updateRewind(realDt) {
      if (!state.rewindActive || snapshotHistory.length < 2) return false;

      state.rewindTimer += realDt;
      const t = THREE.MathUtils.clamp(state.rewindTimer / state.rewindDuration, 0, 1);

      const total = snapshotHistory.length - 1;
      const reverseIndex = (1 - t) * total;
      const i0 = Math.floor(reverseIndex);
      const i1 = Math.min(i0 + 1, total);
      const frac = reverseIndex - i0;

      const a = snapshotHistory[i0];
      const b = snapshotHistory[i1];

      playerRoot.position.set(
        THREE.MathUtils.lerp(a.x, b.x, frac),
        THREE.MathUtils.lerp(a.y, b.y, frac),
        THREE.MathUtils.lerp(a.z, b.z, frac)
      );
      physics.velocity.y = THREE.MathUtils.lerp(a.velocityY, b.velocityY, frac);
      physics.grounded = a.grounded;

      if (state.rewindTimer >= state.rewindDuration) {
        const last = snapshotHistory[0];
        playerRoot.position.set(last.x, last.y, last.z);
        physics.velocity.y = 0;
        physics.grounded = last.grounded;
        state.rewindActive = false;
        state.rewindTimer = 0;
        snapshotHistory.length = 0;
      }

      return true;
    }

    function updateCamera(dt) {
      if (!playerRoot) return;

      const targetPos = new THREE.Vector3(
        playerRoot.position.x * 0.4,
        playerRoot.position.y + 4.2,
        playerRoot.position.z + 10
      );
      camera.position.lerp(targetPos, 1 - Math.pow(0.0001, dt));
      const lookTarget = new THREE.Vector3(
        playerRoot.position.x,
        playerRoot.position.y + 1.2,
        playerRoot.position.z - 10
      );
      camera.lookAt(lookTarget);
    }

    function updateHUD() {
      hudScore.textContent = `Score: ${state.score}`;
      hudLives.textContent = `Lives: ${state.lives}`;
      hudDistance.textContent = `Distance: ${Math.max(0, Math.floor(state.distance))}m`;

      hudEnergyFill.style.width = `${state.timeEnergy}%`;

      let mode = 'NORMAL';
      if (state.rewindActive) mode = 'REWIND';
      else if (state.freezeActive) mode = 'FREEZE';
      else if (state.slowMoActive) mode = 'SLOW-MO';

      hudTimeMode.textContent = `Time Mode: ${mode}`;
    }

    function showGameOver() {
      gameOverText.textContent = `Final Score: ${state.score}`;
      gameOverOverlay.style.display = 'flex';
    }

    function hideGameOver() {
      gameOverOverlay.style.display = 'none';
    }

    function restartGame() {
      state.score = 0;
      state.lives = 3;
      state.distance = 0;
      state.timeEnergy = 100;
      state.timeScale = 1.0;
      state.timeMode = 'NORMAL';
      state.gameOver = false;
      state.freezeActive = false;
      state.freezeTimer = 0;
      state.slowMoActive = false;
      state.rewindActive = false;
      state.rewindTimer = 0;
      state.invincible = false;
      state.invincibleTimer = 0;

      physics.velocity.set(0, 0, 0);
      physics.grounded = true;

      if (playerRoot) {
        playerRoot.position.set(0, 1, 0);
        playerRoot.visible = true;
      }

      snapshotHistory.length = 0;
      snapshotTimer = 0;

      for (const coin of coins) {
        coin.userData.collected = false;
        coin.visible = true;
      }

      for (const pf of platforms) {
        pf.position.copy(pf.userData.basePosition);
      }

      for (const ob of obstacles) {
        ob.position.copy(ob.userData.basePosition);
      }

      hideGameOver();
      updateHUD();
      updateExposedState();
    }

    function updateExposedState() {
      const mode =
        state.rewindActive ? 'REWIND' :
        state.freezeActive ? 'FREEZE' :
        state.slowMoActive ? 'SLOW_MO' : 'NORMAL';

      window.__3D_STATE__ = {
        playerX: playerRoot ? playerRoot.position.x : 0,
        playerY: playerRoot ? playerRoot.position.y : 0,
        playerZ: playerRoot ? playerRoot.position.z : 0,
        velocityY: physics.velocity.y,
        isGrounded: physics.grounded,
        score: state.score,
        lives: state.lives,
        distance: state.distance,
        timeScale: state.timeScale,
        timeEnergy: state.timeEnergy,
        timeMode: mode,
        isInvincible: state.invincible,
        coinsTotal: coins.length,
        obstaclesTotal: obstacles.length,
        gameOver: state.gameOver,
        gameStarted: state.gameStarted,
        modelLoaded: modelLoaded,
        platformCount: state.platformCount,
        rewindAvailable: state.timeEnergy >= 50 && snapshotHistory.length > 0,
        freezeActive: state.freezeActive
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      const realDt = Math.min(clock.getDelta(), 0.05);
      const realElapsed = clock.elapsedTime;

      if (!state.gameStarted) state.gameStarted = true;

      if (!state.gameOver) {
        updateTimeSystems(realDt);

        const scaledDt = state.rewindActive ? 0 : realDt * state.timeScale;

        if (!updateRewind(realDt)) {
          updatePlatformAndObstacleMotion(realElapsed, scaledDt);
          applyPhysics(scaledDt);
          updateCoins(realElapsed, scaledDt);
          checkObstacleCollisions();
          recordSnapshot(realDt);
        }

        if (mixer) {
          mixer.update(state.rewindActive ? 0 : scaledDt);
        }

        updateInvincibility(realDt, realElapsed);

        if (playerRoot) {
          state.distance = Math.max(state.distance, -playerRoot.position.z);
        }
      }

      state.timeMode =
        state.rewindActive ? 'REWIND' :
        state.freezeActive ? 'FREEZE' :
        state.slowMoActive ? 'SLOW_MO' : 'NORMAL';

      updateCamera(realDt);
      updateHUD();
      updateExposedState();

      renderer.render(scene, camera);
    }
  </script>
</body>
