<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parkour Runner - Time Manipulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#hud-score {
    position: absolute; top: 15px; left: 20px;
    color: #ffffff; font-size: 24px; font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}
#hud-lives {
    position: absolute; top: 15px; right: 20px;
    color: #ff4444; font-size: 24px; font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}
#hud-distance {
    position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
    color: #ffffff; font-size: 24px; font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}
#hud-energy-bar {
    position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
    width: 200px; height: 20px; background: rgba(0,0,0,0.6);
    border: 2px solid #00ccff; border-radius: 10px; overflow: hidden;
}
#hud-energy-fill {
    width: 100%; height: 100%;
    background: linear-gradient(90deg, #0088cc, #00ccff);
    border-radius: 8px;
    transition: width 0.1s;
}
#hud-time-mode {
    position: absolute; top: 85px; left: 50%; transform: translateX(-50%);
    color: #00ffcc; font-size: 20px; font-weight: bold;
    text-shadow: 0 0 10px rgba(0,255,200,0.5);
}
#hud-controls {
    position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.5); font-size: 13px; text-align: center;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
}
#game-over-overlay {
    display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); z-index: 100;
    display: none; justify-content: center; align-items: center; flex-direction: column;
}
#game-over-overlay.active { display: flex; }
#game-over-overlay h1 {
    color: #ff2222; font-size: 72px; margin-bottom: 20px;
    text-shadow: 0 0 30px rgba(255,0,0,0.5);
}
#game-over-overlay p {
    color: #ffffff; font-size: 28px; margin-bottom: 30px;
}
#btn-restart {
    padding: 15px 40px; font-size: 22px; font-weight: bold;
    background: linear-gradient(135deg, #00ccff, #0088cc);
    color: #fff; border: none; border-radius: 8px; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}
#btn-restart:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(0,200,255,0.5);
}
</style>
</head>
<body>

<div id="hud-score">Score: 0</div>
<div id="hud-lives">Lives: 3</div>
<div id="hud-distance">Distance: 0m</div>
<div id="hud-energy-bar"><div id="hud-energy-fill"></div></div>
<div id="hud-time-mode">Time Mode: NORMAL</div>
<div id="hud-controls">← → Move | SPACE Jump | T Slow-Mo | R Rewind | F Freeze</div>

<div id="game-over-overlay">
    <h1>GAME OVER</h1>
    <p id="final-score">Final Score: 0</p>
    <button id="btn-restart">Restart</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 30, 120);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 200;
dirLight.shadow.camera.left = -30;
dirLight.shadow.camera.right = 30;
dirLight.shadow.camera.top = 30;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambLight);

// ============ GAME STATE ============
let gameState = {
    playerX: 0, playerY: 1, playerZ: 0,
    velocityX: 0, velocityY: 0, velocityZ: 0,
    isGrounded: true,
    score: 0, lives: 3,
    distance: 0,
    timeScale: 1.0,
    timeEnergy: 100,
    timeMode: 'NORMAL',
    isInvincible: false,
    invincibleTimer: 0,
    coinsTotal: 0,
    obstaclesTotal: 0,
    gameOver: false,
    gameStarted: false,
    modelLoaded: false,
    platformCount: 0,
    rewindAvailable: false,
    freezeActive: false,
    freezeTimer: 0,
    baseSpeed: 8,
    lateralSpeed: 6,
    gravity: -20,
    jumpVelocity: 12,
    slowMoActive: false,
    rewindActive: false,
    rewindPositions: [],
    rewindPlayback: [],
    rewindPlaybackIndex: 0,
    rewindPlaybackTimer: 0,
    snapshotTimer: 0,
};

const keys = {};
let playerModel = null;
let mixer = null;
const platforms = [];
const obstacles = [];
const coins = [];
const allMovingObjects = [];

// ============ GROUND ============
const groundGeo = new THREE.BoxGeometry(4, 0.2, 200);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x556655 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.position.set(0, -0.1, -90);
ground.receiveShadow = true;
scene.add(ground);

// Add ground lane markings
for (let i = 0; i < 40; i++) {
    const markGeo = new THREE.BoxGeometry(0.05, 0.01, 1);
    const markMat = new THREE.MeshStandardMaterial({ color: 0x889988 });
    const mark = new THREE.Mesh(markGeo, markMat);
    mark.position.set(0, 0.01, -i * 5);
    scene.add(mark);
}

// ============ PLATFORMS ============
function createPlatforms() {
    const platformColors = [0x8866aa, 0x66aa88];
    const platformData = [
        { x: -1, y: 2, z: -15, w: 3, d: 3 },
        { x: 1.5, y: 3, z: -25, w: 2.5, d: 2 },
        { x: -1, y: 4, z: -35, w: 4, d: 3 },
        { x: 0, y: 2.5, z: -45, w: 3, d: 2.5 },
        { x: 1, y: 5, z: -55, w: 2, d: 2 },
        { x: -1.5, y: 3.5, z: -65, w: 3.5, d: 3 },
        { x: 0.5, y: 6, z: -75, w: 2.5, d: 2 },
        { x: -0.5, y: 2, z: -85, w: 4, d: 3 },
        { x: 1, y: 4.5, z: -95, w: 3, d: 2.5 },
        { x: -1, y: 7, z: -105, w: 2, d: 2 },
        { x: 0, y: 3, z: -115, w: 5, d: 4 },
        { x: 1.5, y: 5.5, z: -125, w: 2.5, d: 2 },
        { x: -1, y: 1.5, z: -135, w: 3, d: 3 },
        { x: 0.5, y: 4, z: -145, w: 4, d: 2.5 },
        { x: -0.5, y: 6.5, z: -155, w: 2, d: 2 },
        { x: 0, y: 2, z: -165, w: 3.5, d: 3 },
        { x: 1, y: 8, z: -175, w: 2.5, d: 2 },
    ];

    platformData.forEach((p, i) => {
        const geo = new THREE.BoxGeometry(p.w, 0.3, p.d);
        const mat = new THREE.MeshStandardMaterial({
            color: platformColors[i % 2],
            roughness: 0.6,
            metalness: 0.2
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(p.x, p.y, p.z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
        platforms.push({
            mesh,
            bounds: {
                minX: p.x - p.w / 2, maxX: p.x + p.w / 2,
                minY: p.y - 0.15, maxY: p.y + 0.15,
                minZ: p.z - p.d / 2, maxZ: p.z + p.d / 2,
                topY: p.y + 0.15,
                width: p.w, depth: p.d
            },
            originalY: p.y,
            bobSpeed: 0.5 + Math.random() * 1.5,
            bobAmount: 0.2 + Math.random() * 0.3,
            bobPhase: Math.random() * Math.PI * 2
        });
    });
    gameState.platformCount = platforms.length;
}
createPlatforms();

// ============ OBSTACLES ============
function createObstacles() {
    const obstacleData = [
        { x: 0, y: 1, z: -20, onGround: true },
        { x: -1, y: 1, z: -40, onGround: true },
        { x: 1, y: 1, z: -60, onGround: true },
        { x: 0, y: 1, z: -80, onGround: true },
        { x: -1, y: 4.65, z: -35, onGround: false },
        { x: 1.5, y: 3.65, z: -25, onGround: false },
        { x: 0, y: 1, z: -110, onGround: true },
        { x: -0.5, y: 1, z: -140, onGround: true },
        { x: 0.5, y: 3.65, z: -115, onGround: false },
        { x: 1, y: 1, z: -160, onGround: true },
    ];

    obstacleData.forEach(o => {
        const geo = new THREE.BoxGeometry(1, 2, 1);
        const mat = new THREE.MeshStandardMaterial({
            color: 0xff2222,
            roughness: 0.4,
            metalness: 0.3,
            emissive: 0x440000
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(o.x, o.y, o.z);
        mesh.castShadow = true;
        scene.add(mesh);
        obstacles.push({
            mesh,
            bounds: {
                minX: o.x - 0.5, maxX: o.x + 0.5,
                minY: o.y - 1, maxY: o.y + 1,
                minZ: o.z - 0.5, maxZ: o.z + 0.5
            },
            active: true
        });
    });
    gameState.obstaclesTotal = obstacles.length;
}
createObstacles();

// ============ COINS ============
function createCoins() {
    const coinPositions = [
        { x: 0, y: 1.5, z: -10 },
        { x: -1, y: 3, z: -18 },
        { x: 1, y: 4, z: -30 },
        { x: 0, y: 5, z: -38 },
        { x: -1, y: 3.5, z: -50 },
        { x: 1, y: 6, z: -58 },
        { x: 0, y: 4.5, z: -70 },
        { x: -1, y: 2.5, z: -90 },
        { x: 1, y: 5.5, z: -100 },
        { x: 0, y: 3, z: -120 },
        { x: -0.5, y: 7.5, z: -108 },
        { x: 0.5, y: 2, z: -150 },
        { x: 0, y: 5, z: -130 },
    ];

    coinPositions.forEach(c => {
        const geo = new THREE.SphereGeometry(0.3, 16, 16);
        const mat = new THREE.MeshStandardMaterial({
            color: 0xffdd00,
            emissive: 0xffaa00,
            emissiveIntensity: 0.5,
            roughness: 0.2,
            metalness: 0.8
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(c.x, c.y, c.z);
        mesh.castShadow = true;
        scene.add(mesh);

        // Add glow ring
        const ringGeo = new THREE.TorusGeometry(0.4, 0.05, 8, 16);
        const ringMat = new THREE.MeshStandardMaterial({
            color: 0xffdd00,
            emissive: 0xffaa00,
            emissiveIntensity: 1,
            transparent: true,
            opacity: 0.5
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        mesh.add(ring);

        coins.push({ mesh, collected: false, originalY: c.y });
    });
    gameState.coinsTotal = coins.length;
}
createCoins();

// ============ BACKGROUND DECORATION ============
function createBackground() {
    for (let i = 0; i < 50; i++) {
        const side = Math.random() > 0.5 ? 1 : -1;
        const x = side * (4 + Math.random() * 15);
        const z = -Math.random() * 200;
        const h = 2 + Math.random() * 6;
        const geo = new THREE.BoxGeometry(0.5 + Math.random() * 2, h, 0.5 + Math.random() * 2);
        const mat = new THREE.MeshStandardMaterial({
            color: new THREE.Color().setHSL(0.6 + Math.random() * 0.2, 0.3, 0.15 + Math.random() * 0.1),
            roughness: 0.8
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, h / 2, z);
        mesh.castShadow = true;
        scene.add(mesh);
    }

    // Particles
    const particleGeo = new THREE.BufferGeometry();
    const particleCount = 200;
    const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 40;
        positions[i * 3 + 1] = Math.random() * 20;
        positions[i * 3 + 2] = -Math.random() * 200;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMat = new THREE.PointsMaterial({ color: 0x8888ff, size: 0.1, transparent: true, opacity: 0.6 });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);
}
createBackground();

// ============ LOAD STORK MODEL ============
const loader = new GLTFLoader();
let playerGroup = new THREE.Group();
playerGroup.position.set(0, 1, 0);
scene.add(playerGroup);

// Placeholder box while loading
const placeholderGeo = new THREE.BoxGeometry(0.5, 1.5, 0.8);
const placeholderMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, transparent: true, opacity: 0.5 });
const placeholder = new THREE.Mesh(placeholderGeo, placeholderMat);
placeholder.position.y = 0.75;
playerGroup.add(placeholder);

loader.load(
    'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/models/gltf/Stork.glb',
    (gltf) => {
        playerModel = gltf.scene;
        
        // Calculate bounding box to scale properly
        const box = new THREE.Box3().setFromObject(playerModel);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 1.5 / maxDim;
        playerModel.scale.set(scale, scale, scale);
        
        // Center the model
        const center = box.getCenter(new THREE.Vector3());
        playerModel.position.set(-center.x * scale, -box.min.y * scale, -center.z * scale);
        
        playerModel.traverse(child => {
            if (child.isMesh) {
                child.castShadow = true;
            }
        });

        playerGroup.remove(placeholder);
        playerGroup.add(playerModel);

        // Play animation if available
        if (gltf.animations && gltf.animations.length > 0) {
            mixer = new THREE.AnimationMixer(playerModel);
            const action = mixer.clipAction(gltf.animations[0]);
            action.play();
        }

        gameState.modelLoaded = true;
        console.log('Stork model loaded successfully');
    },
    (progress) => {
        console.log('Loading:', (progress.loaded / progress.total * 100).toFixed(1) + '%');
    },
    (error) => {
        console.error('Error loading stork model:', error);
        // Keep placeholder
        gameState.modelLoaded = false;
    }
);

// ============ PLAYER BOUNDS ============
const PLAYER_HALF_W = 0.4;
const PLAYER_HEIGHT = 1.5;
const PLAYER_HALF_D = 0.4;

function getPlayerBounds() {
    return {
        minX: gameState.playerX - PLAYER_HALF_W,
        maxX: gameState.playerX + PLAYER_HALF_W,
        minY: gameState.playerY,
        maxY: gameState.playerY + PLAYER_HEIGHT,
        minZ: gameState.playerZ - PLAYER_HALF_D,
        maxZ: gameState.playerZ + PLAYER_HALF_D
    };
}

// ============ INPUT ============
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    
    if (e.code === 'KeyT' && !gameState.gameOver && !gameState.rewindActive) {
        if (!gameState.slowMoActive && gameState.timeEnergy > 0 && !gameState.freezeActive) {
            gameState.slowMoActive = true;
            gameState.timeScale = 0.25;
            gameState.timeMode = 'SLOW_MO';
        } else if (gameState.slowMoActive) {
            gameState.slowMoActive = false;
            gameState.timeScale = 1.0;
            gameState.timeMode = 'NORMAL';
        }
    }
    
    if (e.code === 'KeyR' && !gameState.gameOver && !gameState.rewindActive && !gameState.slowMoActive && !gameState.freezeActive) {
        if (gameState.timeEnergy >= 50 && gameState.rewindPositions.length > 0) {
            gameState.timeEnergy -= 50;
            gameState.rewindActive = true;
            gameState.timeMode = 'REWIND';
            gameState.rewindPlayback = [...gameState.rewindPositions];
            gameState.rewindPlaybackIndex = gameState.rewindPlayback.length - 1;
            gameState.rewindPlaybackTimer = 0;
        }
    }
    
    if (e.code === 'KeyF' && !gameState.gameOver && !gameState.rewindActive && !gameState.freezeActive) {
        if (gameState.timeEnergy >= 30) {
            gameState.timeEnergy -= 30;
            gameState.freezeActive = true;
            gameState.freezeTimer = 3.0;
            gameState.timeMode = 'FREEZE';
            if (gameState.slowMoActive) {
                gameState.slowMoActive = false;
                gameState.timeScale = 1.0;
            }
        }
    }
    
    if (e.code === 'Space') {
        e.preventDefault();
    }
});

window.addEventListener('keyup', e => {
    keys[e.code] = false;
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ HUD ELEMENTS ============
const hudScore = document.getElementById('hud-score');
const hudLives = document.getElementById('hud-lives');
const hudDistance = document.getElementById('hud-distance');
const hudEnergyFill = document.getElementById('hud-energy-fill');
const hudTimeMode = document.getElementById('hud-time-mode');
const gameOverOverlay = document.getElementById('game-over-overlay');
const finalScoreEl = document.getElementById('final-score');
const btnRestart = document.getElementById('btn-restart');

// ============ RESTART ============
btnRestart.addEventListener('click', () => {
    resetGame();
});

function resetGame() {
    gameState.playerX = 0;
    gameState.playerY = 1;
    gameState.playerZ = 0;
    gameState.velocityX = 0;
    gameState.velocityY = 0;
    gameState.velocityZ = 0;
    gameState.isGrounded = true;
    gameState.score = 0;
    gameState.lives = 3;
    gameState.distance = 0;
    gameState.timeScale = 1.0;
    gameState.timeEnergy = 100;
    gameState.timeMode = 'NORMAL';
    gameState.isInvincible = false;
    gameState.invincibleTimer = 0;
    gameState.gameOver = false;
    gameState.slowMoActive = false;
    gameState.rewindActive = false;
    gameState.rewindPositions = [];
    gameState.rewindPlayback = [];
    gameState.freezeActive = false;
    gameState.freezeTimer = 0;
    gameState.snapshotTimer = 0;

    playerGroup.position.set(0, 1, 0);
    playerGroup.visible = true;

    coins.forEach(c => {
        c.collected = false;
        c.mesh.visible = true;
    });

    obstacles.forEach(o => {
        o.active = true;
    });

    gameOverOverlay.classList.remove('active');
    gameOverOverlay.style.display = 'none';
}

// ============ COLLISION HELPERS ============
function aabbOverlap(a, b) {
    return a.minX < b.maxX && a.maxX > b.minX &&
           a.minY < b.maxY && a.maxY > b.minY &&
           a.minZ < b.maxZ && a.maxZ > b.minZ;
}

// ============ GAME LOOP ============
const clock = new THREE.Clock();
let elapsedTotal = 0;

function update(realDt) {
    if (gameState.gameOver) return;

    gameState.gameStarted = true;
    
    // Time scale
    let effectiveDt = realDt * gameState.timeScale;
    
    // Handle rewind
    if (gameState.rewindActive) {
        gameState.rewindPlaybackTimer += realDt;
        const rewindDuration = 1.5;
        const totalSnapshots = gameState.rewindPlayback.length;
        
        if (totalSnapshots > 0) {
            const progress = Math.min(gameState.rewindPlaybackTimer / rewindDuration, 1.0);
            const idx = Math.floor((1 - progress) * (totalSnapshots - 1));
            const snap = gameState.rewindPlayback[Math.max(0, idx)];
            
            gameState.playerX = snap.x;
            gameState.playerY = snap.y;
            gameState.playerZ = snap.z;
            gameState.velocityY = 0;
            gameState.isGrounded = snap.grounded;
        }
        
        if (gameState.rewindPlaybackTimer >= rewindDuration) {
            gameState.rewindActive = false;
            gameState.timeMode = 'NORMAL';
            gameState.rewindPositions = [];
            gameState.velocityY = 0;
        }
        
        playerGroup.position.set(gameState.playerX, gameState.playerY, gameState.playerZ);
        return;
    }

    // Freeze timer
    if (gameState.freezeActive) {
        gameState.freezeTimer -= realDt;
        if (gameState.freezeTimer <= 0) {
            gameState.freezeActive = false;
            gameState.freezeTimer = 0;
            if (!gameState.slowMoActive) {
                gameState.timeMode = 'NORMAL';
            }
        }
    }

    // Time energy management
    if (gameState.slowMoActive) {
        gameState.timeEnergy -= 40 * realDt;
        if (gameState.timeEnergy <= 0) {
            gameState.timeEnergy = 0;
            gameState.slowMoActive = false;
            gameState.timeScale = 1.0;
            if (!gameState.freezeActive) {
                gameState.timeMode = 'NORMAL';
            }
        }
    } else if (!gameState.rewindActive) {
        gameState.timeEnergy = Math.min(100, gameState.timeEnergy + 10 * realDt);
    }

    // Invincibility timer
    if (gameState.isInvincible) {
        gameState.invincibleTimer -= realDt;
        if (gameState.invincibleTimer <= 0) {
            gameState.isInvincible = false;
            gameState.invincibleTimer = 0;
        }
        // Flash effect
        playerGroup.visible = Math.floor(gameState.invincibleTimer * 10) % 2 === 0;
    } else {
        playerGroup.visible = true;
    }

    // Forward movement
    gameState.playerZ -= gameState.baseSpeed * effectiveDt;
    gameState.distance = Math.abs(gameState.playerZ);

    // Lateral movement
    if (keys['ArrowLeft'] || keys['KeyA']) {
        gameState.playerX -= gameState.lateralSpeed * effectiveDt;
    }
    if (keys['ArrowRight'] || keys['KeyD']) {
        gameState.playerX += gameState.lateralSpeed * effectiveDt;
    }
    gameState.playerX = Math.max(-3, Math.min(3, gameState.playerX));

    // Jump
    if (keys['Space'] && gameState.isGrounded) {
        gameState.velocityY = gameState.jumpVelocity;
        gameState.isGrounded = false;
    }

    // Gravity
    gameState.velocityY += gameState.gravity * effectiveDt;
    gameState.playerY += gameState.velocityY * effectiveDt;

    // Ground collision
    gameState.isGrounded = false;
    if (gameState.playerY <= 0.01 && Math.abs(gameState.playerX) <= 2) {
        gameState.playerY = 0.01;
        gameState.velocityY = 0;
        gameState.isGrounded = true;
    }

    // Platform collision
    const pb = getPlayerBounds();
    for (const plat of platforms) {
        const b = plat.bounds;
        // Update bounds based on current mesh position
        const py = plat.mesh.position.y;
        const topY = py + 0.15;
        
        const platBounds = {
            minX: plat.mesh.position.x - b.width / 2,
            maxX: plat.mesh.position.x + b.width / 2,
            minY: py - 0.15,
            maxY: topY,
            minZ: plat.mesh.position.z - b.depth / 2,
            maxZ: plat.mesh.position.z + b.depth / 2
        };

        // Check if player is above platform and falling
        if (pb.minX < platBounds.maxX && pb.maxX > platBounds.minX &&
            pb.minZ < platBounds.maxZ && pb.maxZ > platBounds.minZ) {
            
            // Landing on top
            if (gameState.velocityY <= 0 &&
                gameState.playerY <= topY + 0.3 &&
                gameState.playerY >= topY - 0.5) {
                gameState.playerY = topY + 0.01;
                gameState.velocityY = 0;
                gameState.isGrounded = true;
            }
        }
    }

    // Fall off the world
    if (gameState.playerY < -10) {
        gameState.lives--;
        gameState.playerY = 5;
        gameState.velocityY = 0;
        gameState.isInvincible = true;
        gameState.invincibleTimer = 2;
        if (gameState.lives <= 0) {
            triggerGameOver();
        }
    }

    // Coin collection
    for (const coin of coins) {
        if (coin.collected) continue;
        const dx = gameState.playerX - coin.mesh.position.x;
        const dy = (gameState.playerY + 0.75) - coin.mesh.position.y;
        const dz = gameState.playerZ - coin.mesh.position.z;
        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
        if (dist < 1.5) {
            coin.collected = true;
            coin.mesh.visible = false;
            gameState.score++;
        }
    }

    // Obstacle collision
    if (!gameState.isInvincible) {
        const playerBounds = getPlayerBounds();
        for (const obs of obstacles) {
            if (!obs.active) continue;
            const ob = {
                minX: obs.mesh.position.x - 0.5,
                maxX: obs.mesh.position.x + 0.5,
                minY: obs.mesh.position.y - 1,
                maxY: obs.mesh.position.y + 1,
                minZ: obs.mesh.position.z - 0.5,
                maxZ: obs.mesh.position.z + 0.5
            };
            if (aabbOverlap(playerBounds, ob)) {
                gameState.lives--;
                gameState.isInvincible = true;
                gameState.invincibleTimer = 2;
                if (gameState.lives <= 0) {
                    triggerGameOver();
                }
                break;
            }
        }
    }

    // Store position snapshots for rewind
    gameState.snapshotTimer += realDt;
    if (gameState.snapshotTimer >= 0.1) {
        gameState.snapshotTimer = 0;
        gameState.rewindPositions.push({
            x: gameState.playerX,
            y: gameState.playerY,
            z: gameState.playerZ,
            grounded: gameState.isGrounded
        });
        // Keep last 3 seconds (30 snapshots at 0.1s interval)
        if (gameState.rewindPositions.length > 30) {
            gameState.rewindPositions.shift();
        }
    }

    // Update player position
    playerGroup.position.set(gameState.playerX, gameState.playerY, gameState.playerZ);

    // Tilt player based on lateral movement
    let targetRotZ = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) targetRotZ = 0.2;
    if (keys['ArrowRight'] || keys['KeyD']) targetRotZ = -0.2;
    playerGroup.rotation.z += (targetRotZ - playerGroup.rotation.z) * 0.1;
}

function triggerGameOver() {
    gameState.gameOver = true;
    gameState.lives = 0;
    finalScoreEl.textContent = `Final Score: ${gameState.score} | Distance: ${Math.floor(gameState.distance)}m`;
    gameOverOverlay.style.display = 'flex';
    gameOverOverlay.classList.add('active');
}

function updateVisuals(realDt, elapsed) {
    // Animate platforms (bob up and down) unless frozen
    if (!gameState.freezeActive) {
        for (const plat of platforms) {
            plat.mesh.position.y = plat.originalY + Math.sin(elapsed * plat.bobSpeed + plat.bobPhase) * plat.bobAmount;
        }
    }

    // Animate coins
    for (const coin of coins) {
        if (!coin.collected) {
            coin.mesh.rotation.y += 2 * realDt;
            coin.mesh.position.y = coin.originalY + Math.sin(elapsed * 2 + coin.originalY) * 0.2;
        }
    }

    // Animate obstacles (slight pulse)
    for (const obs of obstacles) {
        const s = 1 + Math.sin(elapsed * 3) * 0.05;
        if (!gameState.freezeActive) {
            obs.mesh.scale.set(s, 1, s);
        }
    }

    // Camera follow
    const targetCamX = gameState.playerX * 0.5;
    const targetCamY = gameState.playerY + 4;
    const targetCamZ = gameState.playerZ + 10;
    camera.position.x += (targetCamX - camera.position.x) * 0.05;
    camera.position.y += (targetCamY - camera.position.y) * 0.05;
    camera.position.z += (targetCamZ - camera.position.z) * 0.08;
    camera.lookAt(gameState.playerX, gameState.playerY + 1, gameState.playerZ - 10);

    // Update directional light to follow player
    dirLight.position.set(gameState.playerX + 5, 15, gameState.playerZ + 10);
    dirLight.target.position.set(gameState.playerX, 0, gameState.playerZ);
    dirLight.target.updateMatrixWorld();

    // Update mixer for model animations
    if (mixer) {
        mixer.update(realDt * gameState.timeScale);
    }

    // Slow-mo visual effect
    if (gameState.slowMoActive) {
        scene.fog.color.set(0x0a0a2e);
        renderer.setClearColor(0x0a0a2e);
    } else if (gameState.freezeActive) {
        scene.fog.color.set(0x001a2e);
        renderer.setClearColor(0x001a2e);
    } else if (gameState.rewindActive) {
        scene.fog.color.set(0x2e1a0a);
        renderer.setClearColor(0x2e1a0a);
    } else {
        scene.fog.color.set(0x1a1a2e);
        renderer.setClearColor(0x1a1a2e);
    }
}

function updateHUD() {
    hudScore.textContent = `Score: ${gameState.score}`;
    hudLives.textContent = `Lives: ${gameState.lives}`;
    hudDistance.textContent = `Distance: ${Math.floor(gameState.distance)}m`;
    hudEnergyFill.style.width = `${gameState.timeEnergy}%`;
    
    let modeText = 'Time Mode: NORMAL';
    let modeColor = '#00ffcc';
    if (gameState.timeMode === 'SLOW_MO') {
        modeText = 'Time Mode: SLOW-MO';
        modeColor = '#ff00ff';
    } else if (gameState.timeMode === 'REWIND') {
        modeText = 'Time Mode: REWIND';
        modeColor = '#ffaa00';
    } else if (gameState.timeMode === 'FREEZE') {
        modeText = 'Time Mode: FREEZE';
        modeColor = '#00aaff';
    }
    hudTimeMode.textContent = modeText;
    hudTimeMode.style.color = modeColor;

    // Energy bar color
    if (gameState.timeEnergy < 25) {
        hudEnergyFill.style.background = 'linear-gradient(90deg, #cc0000, #ff4444)';
    } else if (gameState.timeEnergy < 50) {
        hudEnergyFill.style.background = 'linear-gradient(90deg, #cc8800, #ffaa00)';
    } else {
        hudEnergyFill.style.background = 'linear-gradient(90deg, #0088cc, #00ccff)';
    }
}

function updateGlobalState() {
    window.__3D_STATE__ = {
        playerX: gameState.playerX,
        playerY: gameState.playerY,
        playerZ: gameState.playerZ,
        velocityY: gameState.velocityY,
        isGrounded: gameState.isGrounded,
        score: gameState.score,
        lives: gameState.lives,
        distance: gameState.distance,
        timeScale: gameState.timeScale,
        timeEnergy: gameState.timeEnergy,
        timeMode: gameState.timeMode,
        isInvincible: gameState.isInvincible,
        coinsTotal: gameState.coinsTotal,
        obstaclesTotal: gameState.obstaclesTotal,
        gameOver: gameState.gameOver,
        gameStarted: gameState.gameStarted,
        modelLoaded: gameState.modelLoaded,
        platformCount: gameState.platformCount,
        rewindAvailable: gameState.timeEnergy >= 50 && gameState.rewindPositions.length > 0,
        freezeActive: gameState.freezeActive
    };
}

// ============ MAIN LOOP ============
function animate() {
    requestAnimationFrame(animate);
    
    const realDt = Math.min(clock.getDelta(), 0.05);
    elapsedTotal += realDt;
    
    update(realDt);
    updateVisuals(realDt, elapsedTotal);
    updateHUD();
    updateGlobalState();
    
    renderer.render(scene, camera);
}

// Initialize global state
window.__3D_STATE__ = {
    playerX: 0, playerY: 1, playerZ: 0,
    velocityY: 0, isGrounded: true,
    score: 0, lives: 3, distance: 0,
    timeScale: 1.0, timeEnergy: 100,
    timeMode: 'NORMAL', isInvincible: false,
    coinsTotal: coins.length, obstaclesTotal: obstacles.length,
    gameOver: false, gameStarted: false,
    modelLoaded: false, platformCount: platforms.length,
    rewindAvailable: false, freezeActive: false
};

animate();
</script>
