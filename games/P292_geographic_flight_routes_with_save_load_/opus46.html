<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Flight Route Visualization</title>
<style>
  body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    color: #ffffff;
    background: rgba(10, 10, 46, 0.85);
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    border: 1px solid rgba(100, 150, 255, 0.3);
    backdrop-filter: blur(5px);
    min-width: 250px;
    z-index: 10;
  }
  #hud .label { color: #88aaff; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
  #hud .value { color: #ffffff; font-weight: bold; }
  #controls {
    position: absolute;
    top: 15px;
    right: 15px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }
  #controls button {
    padding: 10px 20px;
    border: 1px solid rgba(100, 150, 255, 0.5);
    background: rgba(10, 10, 46, 0.85);
    color: #ffffff;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    backdrop-filter: blur(5px);
  }
  #controls button:hover {
    background: rgba(40, 60, 120, 0.9);
    border-color: rgba(100, 150, 255, 0.8);
  }
  #statusLabel {
    color: #44ff88;
    font-size: 13px;
    text-align: center;
    min-height: 20px;
    padding: 5px;
  }
  #instructions {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    text-align: center;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="hud">
  <div><span class="label">Routes Visible: </span><span class="value" id="hudVisible">5/5</span></div>
  <div><span class="label">Selected: </span><span class="value" id="hudSelected">None</span></div>
  <div><span class="label">Total Distance: </span><span class="value" id="hudDistance">0 km</span></div>
</div>

<div id="controls">
  <button id="saveBtn">💾 Save State</button>
  <button id="loadBtn">📂 Load State</button>
  <div id="statusLabel"></div>
</div>

<div id="instructions">
  Keys 1-5: Toggle routes | Click: Select route | D: Deselect | Mouse: Orbit
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Constants
const EARTH_RADIUS = 5;
const ARC_HEIGHT_MULTIPLIER = 1.5;
const DOT_SPEED = 0.005;
const EARTH_REAL_RADIUS_KM = 6371;

// City data
const cityPairs = [
  { from: { name: 'New York', lat: 40.7, lon: -74.0 }, to: { name: 'London', lat: 51.5, lon: -0.1 }, color: 0xff4444 },
  { from: { name: 'Tokyo', lat: 35.7, lon: 139.7 }, to: { name: 'Sydney', lat: -33.9, lon: 151.2 }, color: 0x44ff44 },
  { from: { name: 'Dubai', lat: 25.3, lon: 55.3 }, to: { name: 'Singapore', lat: 1.4, lon: 103.8 }, color: 0x4444ff },
  { from: { name: 'Los Angeles', lat: 34.1, lon: -118.2 }, to: { name: 'Paris', lat: 48.9, lon: 2.3 }, color: 0xffff44 },
  { from: { name: 'São Paulo', lat: -23.6, lon: -46.6 }, to: { name: 'Cape Town', lat: -33.9, lon: 18.4 }, color: 0xff44ff },
];

const routeColors = cityPairs.map(c => c.color);

// State
const routeVisibility = [true, true, true, true, true];
let selectedRouteIndex = -1;
const dotPositions = [0, 0.2, 0.4, 0.6, 0.8]; // stagger initial positions

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0x404040);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(10, 10, 10);
scene.add(directionalLight);

// Earth
const earthGeometry = new THREE.SphereGeometry(EARTH_RADIUS, 64, 64);
const earthMaterial = new THREE.MeshPhongMaterial({ color: 0x1a6fc4, shininess: 25 });
const earth = new THREE.Mesh(earthGeometry, earthMaterial);
scene.add(earth);

const wireframeGeometry = new THREE.SphereGeometry(EARTH_RADIUS + 0.01, 32, 32);
const wireframeMaterial = new THREE.MeshBasicMaterial({ color: 0x2a8fd4, wireframe: true, transparent: true, opacity: 0.3 });
const wireframe = new THREE.Mesh(wireframeGeometry, wireframeMaterial);
scene.add(wireframe);

// Helper: lat/lon to 3D position
function latLonToVec3(lat, lon, radius) {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);
  const x = -radius * Math.sin(phi) * Math.cos(theta);
  const y = radius * Math.cos(phi);
  const z = radius * Math.sin(phi) * Math.sin(theta);
  return new THREE.Vector3(x, y, z);
}

// Haversine distance
function haversineDistance(lat1, lon1, lat2, lon2) {
  const toRad = (d) => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return EARTH_REAL_RADIUS_KM * c;
}

// Route objects
const routes = [];
const raycasterTargets = [];

cityPairs.forEach((pair, index) => {
  const fromPos = latLonToVec3(pair.from.lat, pair.from.lon, EARTH_RADIUS);
  const toPos = latLonToVec3(pair.to.lat, pair.to.lon, EARTH_RADIUS);

  // Calculate midpoint for arc
  const mid = new THREE.Vector3().addVectors(fromPos, toPos).multiplyScalar(0.5);
  const midLength = mid.length();
  if (midLength > 0.001) {
    mid.normalize().multiplyScalar(EARTH_RADIUS * ARC_HEIGHT_MULTIPLIER);
  } else {
    // If points are antipodal, pick an arbitrary perpendicular direction
    const perp = new THREE.Vector3(0, 1, 0);
    if (Math.abs(fromPos.dot(perp)) > 0.9) perp.set(1, 0, 0);
    mid.crossVectors(fromPos, perp).normalize().multiplyScalar(EARTH_RADIUS * ARC_HEIGHT_MULTIPLIER);
  }

  const curve = new THREE.QuadraticBezierCurve3(fromPos, mid, toPos);
  const curvePoints = curve.getPoints(100);

  const color = new THREE.Color(pair.color);

  // Arc line
  const arcGeometry = new THREE.BufferGeometry().setFromPoints(curvePoints);
  const arcMaterial = new THREE.LineBasicMaterial({ color: pair.color, linewidth: 2 });
  const arcLine = new THREE.Line(arcGeometry, arcMaterial);
  scene.add(arcLine);

  // Tube for raycasting and selection glow
  const tubeGeometry = new THREE.TubeGeometry(curve, 64, 0.04, 8, false);
  const tubeMaterial = new THREE.MeshBasicMaterial({ color: pair.color, transparent: true, opacity: 0.6 });
  const tube = new THREE.Mesh(tubeGeometry, tubeMaterial);
  tube.userData = { routeIndex: index };
  scene.add(tube);
  raycasterTargets.push(tube);

  // Glow tube (for selection)
  const glowGeometry = new THREE.TubeGeometry(curve, 64, 0.1, 8, false);
  const glowMaterial = new THREE.MeshBasicMaterial({ color: pair.color, transparent: true, opacity: 0 });
  const glowTube = new THREE.Mesh(glowGeometry, glowMaterial);
  scene.add(glowTube);

  // Endpoint markers
  const markerGeometry = new THREE.SphereGeometry(0.15, 16, 16);
  const markerMaterial = new THREE.MeshPhongMaterial({ color: pair.color, emissive: pair.color, emissiveIntensity: 0.5 });

  const fromMarker = new THREE.Mesh(markerGeometry, markerMaterial);
  fromMarker.position.copy(fromPos);
  fromMarker.userData = { routeIndex: index };
  scene.add(fromMarker);
  raycasterTargets.push(fromMarker);

  const toMarker = new THREE.Mesh(markerGeometry, markerMaterial.clone());
  toMarker.position.copy(toPos);
  toMarker.userData = { routeIndex: index };
  scene.add(toMarker);
  raycasterTargets.push(toMarker);

  // Animated dot
  const dotGeometry = new THREE.SphereGeometry(0.1, 12, 12);
  const dotMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const dot = new THREE.Mesh(dotGeometry, dotMaterial);
  const initialPos = curve.getPoint(dotPositions[index]);
  dot.position.copy(initialPos);
  scene.add(dot);

  // Distance
  const distance = haversineDistance(pair.from.lat, pair.from.lon, pair.to.lat, pair.to.lon);

  const routeGroup = {
    arcLine,
    tube,
    glowTube,
    fromMarker,
    toMarker,
    dot,
    curve,
    color: pair.color,
    distance,
    fromName: pair.from.name,
    toName: pair.to.name,
  };

  routes.push(routeGroup);
});

// Selection
function selectRoute(index) {
  // Deselect previous
  if (selectedRouteIndex >= 0 && selectedRouteIndex < routes.length) {
    routes[selectedRouteIndex].glowTube.material.opacity = 0;
    routes[selectedRouteIndex].tube.material.opacity = 0.6;
  }

  selectedRouteIndex = index;

  if (index >= 0 && index < routes.length) {
    routes[index].glowTube.material.opacity = 0.5;
    routes[index].tube.material.opacity = 1.0;
  }

  updateHUD();
}

function deselectRoute() {
  selectRoute(-1);
}

// Visibility toggle
function toggleRoute(index) {
  if (index < 0 || index >= routes.length) return;
  routeVisibility[index] = !routeVisibility[index];
  const visible = routeVisibility[index];
  const r = routes[index];
  r.arcLine.visible = visible;
  r.tube.visible = visible;
  r.glowTube.visible = visible;
  r.fromMarker.visible = visible;
  r.toMarker.visible = visible;
  r.dot.visible = visible;

  if (!visible && selectedRouteIndex === index) {
    deselectRoute();
  }

  updateHUD();
}

function setRouteVisibility(index, visible) {
  routeVisibility[index] = visible;
  const r = routes[index];
  r.arcLine.visible = visible;
  r.tube.visible = visible;
  r.glowTube.visible = visible;
  r.fromMarker.visible = visible;
  r.toMarker.visible = visible;
  r.dot.visible = visible;
}

// HUD update
function updateHUD() {
  const visibleCount = routeVisibility.filter(v => v).length;
  document.getElementById('hudVisible').textContent = `${visibleCount}/5`;

  if (selectedRouteIndex >= 0 && selectedRouteIndex < routes.length) {
    const r = routes[selectedRouteIndex];
    document.getElementById('hudSelected').textContent = `${r.fromName} → ${r.toName}`;
  } else {
    document.getElementById('hudSelected').textContent = 'None';
  }

  let totalDist = 0;
  routes.forEach((r, i) => {
    if (routeVisibility[i]) totalDist += r.distance;
  });
  document.getElementById('hudDistance').textContent = `${Math.round(totalDist).toLocaleString()} km`;
}

// Status label
let statusTimeout = null;
function showStatus(text) {
  const label = document.getElementById('statusLabel');
  label.textContent = text;
  if (statusTimeout) clearTimeout(statusTimeout);
  statusTimeout = setTimeout(() => {
    label.textContent = '';
  }, 2000);
}

// Save/Load
document.getElementById('saveBtn').addEventListener('click', () => {
  const state = {
    routeVisibility: [...routeVisibility],
    selectedRouteIndex,
    dotPositions: [...dotPositions],
  };
  localStorage.setItem('flightRouteState', JSON.stringify(state));
  showStatus('Saved!');
});

document.getElementById('loadBtn').addEventListener('click', () => {
  const data = localStorage.getItem('flightRouteState');
  if (!data) {
    showStatus('No saved state found!');
    return;
  }
  try {
    const state = JSON.parse(data);
    state.routeVisibility.forEach((v, i) => {
      routeVisibility[i] = v;
      setRouteVisibility(i, v);
    });
    state.dotPositions.forEach((t, i) => {
      dotPositions[i] = t;
      const pos = routes[i].curve.getPoint(t);
      routes[i].dot.position.copy(pos);
    });
    selectRoute(state.selectedRouteIndex);
    updateHUD();
    showStatus('Loaded!');
  } catch (e) {
    showStatus('Error loading state!');
  }
});

// Keyboard
window.addEventListener('keydown', (e) => {
  const key = e.key;
  if (key >= '1' && key <= '5') {
    toggleRoute(parseInt(key) - 1);
  } else if (key === 'd' || key === 'D') {
    deselectRoute();
  }
});

// Raycasting for click selection
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(raycasterTargets);

  if (intersects.length > 0) {
    const obj = intersects[0].object;
    const routeIndex = obj.userData.routeIndex;
    if (routeIndex !== undefined && routeVisibility[routeIndex]) {
      selectRoute(routeIndex);
    }
  }
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Expose state
window.__3D_STATE__ = {};

function updateExposedState() {
  const visibleCount = routeVisibility.filter(v => v).length;
  let totalDist = 0;
  routes.forEach((r, i) => {
    if (routeVisibility[i]) totalDist += r.distance;
  });

  window.__3D_STATE__ = {
    routeCount: 5,
    routeVisibility: [...routeVisibility],
    visibleCount,
    selectedRouteIndex,
    dotPositions: [...dotPositions],
    savedStateExists: localStorage.getItem('flightRouteState') !== null,
    statusText: document.getElementById('statusLabel').textContent,
    totalVisibleDistanceKm: Math.round(totalDist),
    cameraDistance: camera.position.length(),
    routeColors: routeColors,
    earthRadius: EARTH_RADIUS,
  };
}

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  // Update dot positions
  routes.forEach((r, i) => {
    dotPositions[i] += DOT_SPEED;
    if (dotPositions[i] > 1) dotPositions[i] -= 1;
    const pos = r.curve.getPoint(dotPositions[i]);
    r.dot.position.copy(pos);
  });

  // Pulse glow for selected route
  if (selectedRouteIndex >= 0 && selectedRouteIndex < routes.length) {
    const t = Date.now() * 0.003;
    const pulse = 0.3 + 0.3 * Math.sin(t);
    routes[selectedRouteIndex].glowTube.material.opacity = pulse;
  }

  controls.update();
  updateExposedState();
  renderer.render(scene, camera);
}

updateHUD();
animate();
</script>
</body>
</html>
