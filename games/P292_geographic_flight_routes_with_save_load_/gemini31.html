<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flight Routes</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: sans-serif;
            color: white;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: none;
            line-height: 1.5;
        }
        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            background: #1a6fc4;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #2a8fd4;
        }
        #statusLabel {
            position: absolute;
            top: 100px;
            right: 20px;
            background: rgba(0, 255, 0, 0.3);
            padding: 5px 10px;
            border-radius: 4px;
            display: none;
            text-align: center;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 12px;
            color: #ccc;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div id="hud-visible">Routes Visible: 5/5</div>
        <div id="hud-selected">Selected: None</div>
        <div id="hud-distance">Total Distance: 0 km</div>
    </div>

    <div id="controls">
        <button id="saveBtn">Save State</button>
        <button id="loadBtn">Load State</button>
    </div>
    <div id="statusLabel"></div>

    <div id="instructions">
        Keys 1-5: Toggle Routes | Click: Select Route | Key D: Deselect | Drag: Rotate | Scroll: Zoom
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            routeCount: 5,
            routeVisibility: [true, true, true, true, true],
            visibleCount: 5,
            selectedRouteIndex: -1,
            dotPositions: [0, 0, 0, 0, 0],
            savedStateExists: false,
            statusText: "",
            totalVisibleDistanceKm: 0,
            cameraDistance: 15,
            routeColors: [0xff4444, 0x44ff44, 0x4444ff, 0xffff44, 0xff44ff],
            earthRadius: 5
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 10, 10);
        scene.add(dirLight);

        // Earth
        const earthRadius = 5;
        const earthGeo = new THREE.SphereGeometry(earthRadius, 64, 64);
        const earthMat = new THREE.MeshPhongMaterial({ color: 0x1a6fc4 });
        const earth = new THREE.Mesh(earthGeo, earthMat);
        scene.add(earth);

        const wireGeo = new THREE.SphereGeometry(earthRadius + 0.01, 32, 32);
        const wireMat = new THREE.MeshBasicMaterial({ 
            color: 0x2a8fd4, 
            wireframe: true, 
            transparent: true, 
            opacity: 0.3 
        });
        const wireframe = new THREE.Mesh(wireGeo, wireMat);
        scene.add(wireframe);

        // --- Flight Routes Data ---
        const routesConfig = [
            { name: "New York → London", lat1: 40.7, lon1: -74.0, lat2: 51.5, lon2: -0.1, color: 0xff4444 },
            { name: "Tokyo → Sydney", lat1: 35.7, lon1: 139.7, lat2: -33.9, lon2: 151.2, color: 0x44ff44 },
            { name: "Dubai → Singapore", lat1: 25.3, lon1: 55.3, lat2: 1.4, lon2: 103.8, color: 0x4444ff },
            { name: "Los Angeles → Paris", lat1: 34.1, lon1: -118.2, lat2: 48.9, lon2: 2.3, color: 0xffff44 },
            { name: "São Paulo → Cape Town", lat1: -23.6, lon1: -46.6, lat2: -33.9, lon2: 18.4, color: 0xff44ff }
        ];

        const routesData = [];
        const interactableObjects = [];

        // Helpers
        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = (radius * Math.sin(phi) * Math.sin(theta));
            const y = (radius * Math.cos(phi));
            return new THREE.Vector3(x, y, z);
        }

        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Build Routes
        routesConfig.forEach((config, index) => {
            const group = new THREE.Group();
            scene.add(group);

            const p1 = latLonToVector3(config.lat1, config.lon1, earthRadius);
            const p2 = latLonToVector3(config.lat2, config.lon2, earthRadius);
            
            const pm = p1.clone().add(p2).multiplyScalar(0.5).normalize().multiplyScalar(earthRadius * 1.5);
            
            const curve = new THREE.QuadraticBezierCurve3(p1, pm, p2);
            
            // Arc Tube
            const tubeGeo = new THREE.TubeGeometry(curve, 64, 0.03, 8, false);
            const tubeMat = new THREE.MeshPhongMaterial({ 
                color: config.color,
                emissive: 0x000000,
                emissiveIntensity: 0
            });
            const tubeMesh = new THREE.Mesh(tubeGeo, tubeMat);
            tubeMesh.userData = { routeIndex: index };
            group.add(tubeMesh);
            interactableObjects.push(tubeMesh);

            // Endpoints
            const sphereGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const sphereMat = new THREE.MeshPhongMaterial({ color: config.color });
            
            const startSphere = new THREE.Mesh(sphereGeo, sphereMat);
            startSphere.position.copy(p1);
            startSphere.userData = { routeIndex: index };
            group.add(startSphere);
            interactableObjects.push(startSphere);

            const endSphere = new THREE.Mesh(sphereGeo, sphereMat);
            endSphere.position.copy(p2);
            endSphere.userData = { routeIndex: index };
            group.add(endSphere);
            interactableObjects.push(endSphere);

            // Animated Dot
            const dotGeo = new THREE.SphereGeometry(0.1, 16, 16);
            const dotMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const dotMesh = new THREE.Mesh(dotGeo, dotMat);
            group.add(dotMesh);

            const distance = haversineDistance(config.lat1, config.lon1, config.lat2, config.lon2);

            routesData.push({
                index: index,
                group: group,
                curve: curve,
                tube: tubeMesh,
                dot: dotMesh,
                t: 0,
                visible: true,
                distance: distance,
                name: config.name,
                color: config.color
            });
        });

        // --- Interaction & Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function updateSelectionVisuals() {
            routesData.forEach((route, i) => {
                if (i === window.__3D_STATE__.selectedRouteIndex) {
                    route.tube.material.emissive.setHex(route.color);
                    route.tube.material.emissiveIntensity = 0.8;
                } else {
                    route.tube.material.emissive.setHex(0x000000);
                    route.tube.material.emissiveIntensity = 0;
                }
            });
            updateHUD();
        }

        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            
            const visibleInteractables = interactableObjects.filter(obj => routesData[obj.userData.routeIndex].visible);
            const intersects = raycaster.intersectObjects(visibleInteractables);

            if (intersects.length > 0) {
                window.__3D_STATE__.selectedRouteIndex = intersects[0].object.userData.routeIndex;
            }
            updateSelectionVisuals();
        });

        window.addEventListener('keydown', (event) => {
            const key = event.key.toUpperCase();
            if (key >= '1' && key <= '5') {
                const idx = parseInt(key) - 1;
                routesData[idx].visible = !routesData[idx].visible;
                routesData[idx].group.visible = routesData[idx].visible;
                
                if (!routesData[idx].visible && window.__3D_STATE__.selectedRouteIndex === idx) {
                    window.__3D_STATE__.selectedRouteIndex = -1;
                    updateSelectionVisuals();
                }
                updateHUD();
            } else if (key === 'D') {
                window.__3D_STATE__.selectedRouteIndex = -1;
                updateSelectionVisuals();
            }
        });

        // --- Save / Load ---
        let statusTimeout;
        function showStatus(text) {
            const el = document.getElementById('statusLabel');
            el.innerText = text;
            el.style.display = 'block';
            window.__3D_STATE__.statusText = text;
            clearTimeout(statusTimeout);
            statusTimeout = setTimeout(() => { 
                el.style.display = 'none'; 
                el.innerText = ''; 
                window.__3D_STATE__.statusText = "";
            }, 2000);
        }

        document.getElementById('saveBtn').addEventListener('click', () => {
            const stateToSave = {
                visibility: routesData.map(r => r.visible),
                selected: window.__3D_STATE__.selectedRouteIndex,
                t: routesData.map(r => r.t)
            };
            localStorage.setItem('flightRouteState', JSON.stringify(stateToSave));
            window.__3D_STATE__.savedStateExists = true;
            showStatus('Saved!');
        });

        document.getElementById('loadBtn').addEventListener('click', () => {
            const str = localStorage.getItem('flightRouteState');
            if (str) {
                const loadedState = JSON.parse(str);
                loadedState.visibility.forEach((v, i) => {
                    routesData[i].visible = v;
                    routesData[i].group.visible = v;
                });
                window.__3D_STATE__.selectedRouteIndex = loadedState.selected;
                loadedState.t.forEach((t, i) => routesData[i].t = t);
                
                updateSelectionVisuals();
                showStatus('Loaded!');
            }
        });

        // --- HUD Update ---
        function updateHUD() {
            let visibleCount = 0;
            let totalDist = 0;
            
            routesData.forEach(r => {
                if (r.visible) {
                    visibleCount++;
                    totalDist += r.distance;
                }
            });

            const selIdx = window.__3D_STATE__.selectedRouteIndex;
            const selText = selIdx === -1 ? 'None' : `[${routesData[selIdx].name}]`;

            document.getElementById('hud-visible').innerText = `Routes Visible: ${visibleCount}/5`;
            document.getElementById('hud-selected').innerText = `Selected: ${selText}`;
            document.getElementById('hud-distance').innerText = `Total Distance: ${Math.round(totalDist)} km`;

            // Update Global State Object
            window.__3D_STATE__.visibleCount = visibleCount;
            window.__3D_STATE__.totalVisibleDistanceKm = totalDist;
            window.__3D_STATE__.routeVisibility = routesData.map(r => r.visible);
            window.__3D_STATE__.savedStateExists = !!localStorage.getItem('flightRouteState');
        }

        // Initial HUD update
        window.__3D_STATE__.savedStateExists = !!localStorage.getItem('flightRouteState');
        updateHUD();

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            controls.update();
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));

            routesData.forEach((route, i) => {
                if (route.visible) {
                    route.t = (route.t + 0.005) % 1;
                    route.dot.position.copy(route.curve.getPoint(route.t));
                    window.__3D_STATE__.dotPositions[i] = route.t;
                }
            });

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
