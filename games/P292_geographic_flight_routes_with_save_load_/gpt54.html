<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Flight Route Visualization</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, sans-serif;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
      min-width: 240px;
    }

    #controlsPanel {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      z-index: 10;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      background: #ffffff;
      color: #111;
    }

    button:hover {
      background: #e8e8e8;
    }

    #statusLabel {
      color: white;
      min-width: 70px;
      text-align: left;
      font-size: 14px;
      background: rgba(0,0,0,0.35);
      padding: 8px 10px;
      border-radius: 6px;
    }

    #help {
      position: absolute;
      bottom: 12px;
      left: 12px;
      color: #d8d8ff;
      background: rgba(0, 0, 0, 0.3);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="hud"></div>

  <div id="controlsPanel">
    <button id="saveBtn">Save State</button>
    <button id="loadBtn">Load State</button>
    <div id="statusLabel"></div>
  </div>

  <div id="help">
    Keys: 1-5 toggle routes, D deselect, Click route/endpoints to select
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const EARTH_RADIUS = 5;
    const ROUTE_COLORS = [0xff4444, 0x44ff44, 0x4444ff, 0xffff44, 0xff44ff];
    const STORAGE_KEY = "flightRouteState";

    const routeDefinitions = [
      {
        fromName: "New York",
        from: { lat: 40.7, lon: -74.0 },
        toName: "London",
        to: { lat: 51.5, lon: -0.1 },
        color: ROUTE_COLORS[0]
      },
      {
        fromName: "Tokyo",
        from: { lat: 35.7, lon: 139.7 },
        toName: "Sydney",
        to: { lat: -33.9, lon: 151.2 },
        color: ROUTE_COLORS[1]
      },
      {
        fromName: "Dubai",
        from: { lat: 25.3, lon: 55.3 },
        toName: "Singapore",
        to: { lat: 1.4, lon: 103.8 },
        color: ROUTE_COLORS[2]
      },
      {
        fromName: "Los Angeles",
        from: { lat: 34.1, lon: -118.2 },
        toName: "Paris",
        to: { lat: 48.9, lon: 2.3 },
        color: ROUTE_COLORS[3]
      },
      {
        fromName: "São Paulo",
        from: { lat: -23.6, lon: -46.6 },
        toName: "Cape Town",
        to: { lat: -33.9, lon: 18.4 },
        color: ROUTE_COLORS[4]
      }
    ];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 0, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(10, 10, 10);
    scene.add(directionalLight);

    const earthGroup = new THREE.Group();
    scene.add(earthGroup);

    const earthGeometry = new THREE.SphereGeometry(EARTH_RADIUS, 64, 64);
    const earthMaterial = new THREE.MeshPhongMaterial({
      color: 0x1a6fc4,
      shininess: 25
    });
    const earthMesh = new THREE.Mesh(earthGeometry, earthMaterial);
    earthGroup.add(earthMesh);

    const wireframeGeometry = new THREE.SphereGeometry(EARTH_RADIUS * 1.001, 24, 24);
    const wireframeMaterial = new THREE.MeshBasicMaterial({
      color: 0x2a8fd4,
      wireframe: true,
      transparent: true,
      opacity: 0.3
    });
    const wireframeMesh = new THREE.Mesh(wireframeGeometry, wireframeMaterial);
    earthGroup.add(wireframeMesh);

    function latLonToVector3(lat, lon, radius = EARTH_RADIUS) {
      const phi = (90 - lat) * Math.PI / 180;
      const theta = (lon + 180) * Math.PI / 180;

      const x = -radius * Math.sin(phi) * Math.cos(theta);
      const z = radius * Math.sin(phi) * Math.sin(theta);
      const y = radius * Math.cos(phi);

      return new THREE.Vector3(x, y, z);
    }

    function haversineDistanceKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const toRad = deg => deg * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const routes = [];
    let selectedRouteIndex = -1;
    let statusTimeout = null;

    function createRoute(def, index) {
      const start = latLonToVector3(def.from.lat, def.from.lon, EARTH_RADIUS);
      const end = latLonToVector3(def.to.lat, def.to.lon, EARTH_RADIUS);

      const mid = start.clone().add(end).multiplyScalar(0.5).normalize().multiplyScalar(EARTH_RADIUS * 1.5);
      const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
      const points = curve.getPoints(100);
      const geometry = new THREE.BufferGeometry().setFromPoints(points);

      const lineMaterial = new THREE.LineBasicMaterial({
        color: def.color,
        transparent: true,
        opacity: 0.95
      });
      const line = new THREE.Line(geometry, lineMaterial);

      const markerGeometry = new THREE.SphereGeometry(0.15, 16, 16);
      const markerMaterialA = new THREE.MeshPhongMaterial({ color: def.color, emissive: 0x111111 });
      const markerMaterialB = new THREE.MeshPhongMaterial({ color: def.color, emissive: 0x111111 });

      const startMarker = new THREE.Mesh(markerGeometry, markerMaterialA);
      const endMarker = new THREE.Mesh(markerGeometry, markerMaterialB);
      startMarker.position.copy(start);
      endMarker.position.copy(end);

      const dotGeometry = new THREE.SphereGeometry(0.1, 12, 12);
      const dotMaterial = new THREE.MeshPhongMaterial({
        color: 0xffffff,
        emissive: def.color,
        emissiveIntensity: 0.8
      });
      const dot = new THREE.Mesh(dotGeometry, dotMaterial);
      dot.position.copy(curve.getPoint(0));

      const group = new THREE.Group();
      group.add(line, startMarker, endMarker, dot);
      scene.add(group);

      line.userData.routeIndex = index;
      startMarker.userData.routeIndex = index;
      endMarker.userData.routeIndex = index;

      const routeDistance = haversineDistanceKm(
        def.from.lat, def.from.lon,
        def.to.lat, def.to.lon
      );

      return {
        index,
        def,
        group,
        curve,
        line,
        lineMaterial,
        startMarker,
        endMarker,
        dot,
        visible: true,
        t: 0,
        distanceKm: routeDistance
      };
    }

    routeDefinitions.forEach((def, i) => {
      routes.push(createRoute(def, i));
    });

    function applyRouteSelection() {
      routes.forEach((route, i) => {
        const selected = i === selectedRouteIndex;
        route.lineMaterial.color.setHex(route.def.color);
        route.lineMaterial.opacity = selected ? 1.0 : 0.95;

        route.startMarker.material.emissive.setHex(selected ? 0xffffff : 0x111111);
        route.endMarker.material.emissive.setHex(selected ? 0xffffff : 0x111111);

        route.startMarker.scale.setScalar(selected ? 1.3 : 1);
        route.endMarker.scale.setScalar(selected ? 1.3 : 1);
        route.dot.scale.setScalar(selected ? 1.4 : 1);
      });
    }

    function setRouteVisibility(index, visible) {
      const route = routes[index];
      route.visible = visible;
      route.group.visible = visible;
      updateHUD();
      updateExposedState();
    }

    function toggleRouteVisibility(index) {
      setRouteVisibility(index, !routes[index].visible);
    }

    function selectRoute(index) {
      selectedRouteIndex = index;
      applyRouteSelection();
      updateHUD();
      updateExposedState();
    }

    function deselectRoute() {
      selectedRouteIndex = -1;
      applyRouteSelection();
      updateHUD();
      updateExposedState();
    }

    function getVisibleCount() {
      return routes.filter(r => r.visible).length;
    }

    function getTotalVisibleDistanceKm() {
      return routes
        .filter(r => r.visible)
        .reduce((sum, r) => sum + r.distanceKm, 0);
    }

    const hud = document.getElementById("hud");
    const statusLabel = document.getElementById("statusLabel");
    const saveBtn = document.getElementById("saveBtn");
    const loadBtn = document.getElementById("loadBtn");

    function updateHUD() {
      const visibleCount = getVisibleCount();
      const selectedText =
        selectedRouteIndex >= 0
          ? `${routes[selectedRouteIndex].def.fromName} → ${routes[selectedRouteIndex].def.toName}`
          : "None";

      hud.innerHTML = `
        <div><strong>Routes Visible:</strong> ${visibleCount}/5</div>
        <div><strong>Selected:</strong> ${selectedText}</div>
        <div><strong>Total Distance:</strong> ${Math.round(getTotalVisibleDistanceKm()).toLocaleString()} km</div>
      `;
    }

    function setStatus(text) {
      statusLabel.textContent = text;
      updateExposedState();
      if (statusTimeout) clearTimeout(statusTimeout);
      statusTimeout = setTimeout(() => {
        statusLabel.textContent = "";
        updateExposedState();
      }, 2000);
    }

    function saveState() {
      const state = {
        routeVisibility: routes.map(r => r.visible),
        selectedRouteIndex,
        dotPositions: routes.map(r => r.t)
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      setStatus("Saved!");
      updateExposedState();
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        setStatus("No Save");
        updateExposedState();
        return;
      }

      try {
        const state = JSON.parse(raw);

        if (Array.isArray(state.routeVisibility)) {
          state.routeVisibility.forEach((v, i) => {
            if (i < routes.length) setRouteVisibility(i, !!v);
          });
        }

        if (Array.isArray(state.dotPositions)) {
          state.dotPositions.forEach((t, i) => {
            if (i < routes.length && typeof t === "number" && isFinite(t)) {
              routes[i].t = ((t % 1) + 1) % 1;
              routes[i].dot.position.copy(routes[i].curve.getPoint(routes[i].t));
            }
          });
        }

        if (
          typeof state.selectedRouteIndex === "number" &&
          state.selectedRouteIndex >= 0 &&
          state.selectedRouteIndex < routes.length
        ) {
          selectRoute(state.selectedRouteIndex);
        } else {
          deselectRoute();
        }

        setStatus("Loaded!");
        updateHUD();
        updateExposedState();
      } catch (e) {
        console.error("Failed to load state:", e);
        setStatus("Load Error");
        updateExposedState();
      }
    }

    saveBtn.addEventListener("click", saveState);
    loadBtn.addEventListener("click", loadState);

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      if (["1", "2", "3", "4", "5"].includes(key)) {
        toggleRouteVisibility(parseInt(key, 10) - 1);
      } else if (key === "d") {
        deselectRoute();
      }
    });

    renderer.domElement.addEventListener("click", (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const clickableObjects = [];
      routes.forEach(route => {
        if (!route.visible) return;
        clickableObjects.push(route.startMarker, route.endMarker, route.line);
      });

      const intersections = raycaster.intersectObjects(clickableObjects, false);

      if (intersections.length > 0) {
        const hit = intersections[0].object;
        const routeIndex = hit.userData.routeIndex;
        if (routeIndex !== undefined) {
          selectRoute(routeIndex);
        }
      }
    });

    function updateExposedState() {
      window.__3D_STATE__ = {
        routeCount: 5,
        routeVisibility: routes.map(r => r.visible),
        visibleCount: getVisibleCount(),
        selectedRouteIndex,
        dotPositions: routes.map(r => r.t),
        savedStateExists: localStorage.getItem(STORAGE_KEY) !== null,
        statusText: statusLabel.textContent,
        totalVisibleDistanceKm: getTotalVisibleDistanceKm(),
        cameraDistance: camera.position.length(),
        routeColors: [...ROUTE_COLORS],
        earthRadius: EARTH_RADIUS
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      routes.forEach(route => {
        route.t = (route.t + 0.005) % 1;
        route.dot.position.copy(route.curve.getPoint(route.t));
      });

      controls.update();
      updateExposedState();
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      updateExposedState();
    });

    applyRouteSelection();
    updateHUD();
    updateExposedState();
    animate();
  </script>
</body>
</html>
