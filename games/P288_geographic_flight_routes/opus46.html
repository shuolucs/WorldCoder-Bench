<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Globe Flight Routes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a2e; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(0, 255, 136, 0.3);
    border-radius: 12px;
    padding: 20px;
    color: #e0e0ff;
    font-size: 14px;
    min-width: 240px;
    backdrop-filter: blur(10px);
    z-index: 10;
  }
  #hud h3 {
    color: #00ff88;
    margin-bottom: 12px;
    font-size: 16px;
    letter-spacing: 1px;
  }
  #hud .hud-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  #hud .hud-label { color: #8888bb; }
  #hud .hud-value { color: #ffffff; font-weight: bold; }

  #progress-bar-container {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    margin-top: 10px;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #00ff88, #ffcc00);
    border-radius: 3px;
    width: 0%;
    transition: width 0.1s;
  }

  #route-buttons {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
  }
  .route-btn {
    padding: 12px 24px;
    background: rgba(10, 10, 46, 0.85);
    border: 2px solid rgba(255, 204, 0, 0.5);
    border-radius: 8px;
    color: #ffcc00;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    letter-spacing: 1px;
  }
  .route-btn:hover {
    background: rgba(255, 204, 0, 0.15);
    border-color: #ffcc00;
    transform: translateY(-2px);
  }
  .route-btn.active {
    background: rgba(0, 255, 136, 0.15);
    border-color: #00ff88;
    color: #00ff88;
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
  }

  #keys-hint {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    z-index: 10;
    text-align: center;
  }
  #keys-hint span {
    background: rgba(255,255,255,0.1);
    padding: 2px 8px;
    border-radius: 4px;
    margin: 0 4px;
  }
</style>
</head>
<body>

<div id="hud">
  <h3>✈ FLIGHT TRACKER</h3>
  <div class="hud-row">
    <span class="hud-label">Route:</span>
    <span class="hud-value" id="hud-route">JFK → LAX</span>
  </div>
  <div class="hud-row">
    <span class="hud-label">Progress:</span>
    <span class="hud-value" id="hud-progress">0%</span>
  </div>
  <div class="hud-row">
    <span class="hud-label">Active Routes:</span>
    <span class="hud-value" id="hud-routes">4</span>
  </div>
  <div class="hud-row">
    <span class="hud-label">Rotation:</span>
    <span class="hud-value" id="hud-rotation">Manual</span>
  </div>
  <div class="hud-row">
    <span class="hud-label">Truck At:</span>
    <span class="hud-value" id="hud-truck">JFK</span>
  </div>
  <div id="progress-bar-container">
    <div id="progress-bar"></div>
  </div>
</div>

<div id="keys-hint">
  <span>T</span> Teleport Truck &nbsp;
  <span>R</span> Toggle Rotation &nbsp;
  <span>Space</span> Pause/Resume
</div>

<div id="route-buttons">
  <button class="route-btn active" id="btn-route-0">JFK-LAX</button>
  <button class="route-btn" id="btn-route-1">JFK-LHR</button>
  <button class="route-btn" id="btn-route-2">LHR-NRT</button>
  <button class="route-btn" id="btn-route-3">NRT-SYD</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(10, 10, 10);
scene.add(directionalLight);

// Globe group for rotation
const globeGroup = new THREE.Group();
scene.add(globeGroup);

// Create procedural globe texture
function createGlobeTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 2048;
  canvas.height = 1024;
  const ctx = canvas.getContext('2d');

  // Dark blue background
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw latitude lines
  ctx.strokeStyle = 'rgba(0, 200, 255, 0.3)';
  ctx.lineWidth = 1;
  for (let lat = -80; lat <= 80; lat += 10) {
    const y = ((90 - lat) / 180) * canvas.height;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  // Draw longitude lines
  for (let lon = -180; lon < 180; lon += 10) {
    const x = ((lon + 180) / 360) * canvas.width;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }

  // Highlight major lines (equator, prime meridian, tropics)
  ctx.strokeStyle = 'rgba(0, 255, 255, 0.5)';
  ctx.lineWidth = 2;
  // Equator
  const eqY = canvas.height / 2;
  ctx.beginPath();
  ctx.moveTo(0, eqY);
  ctx.lineTo(canvas.width, eqY);
  ctx.stroke();
  // Prime meridian
  const pmX = (180 / 360) * canvas.width;
  ctx.beginPath();
  ctx.moveTo(pmX, 0);
  ctx.lineTo(pmX, canvas.height);
  ctx.stroke();

  // Add some glow dots for visual interest
  for (let i = 0; i < 500; i++) {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height;
    const r = Math.random() * 2;
    ctx.fillStyle = `rgba(0, 200, 255, ${Math.random() * 0.15})`;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  const texture = new THREE.CanvasTexture(canvas);
  texture.wrapS = THREE.RepeatWrapping;
  texture.wrapT = THREE.ClampToEdgeWrapping;
  return texture;
}

const globeTexture = createGlobeTexture();
const globeGeometry = new THREE.SphereGeometry(5, 64, 64);
const globeMaterial = new THREE.MeshPhongMaterial({
  map: globeTexture,
  transparent: true,
  opacity: 0.9,
  shininess: 20,
});
const globe = new THREE.Mesh(globeGeometry, globeMaterial);
globeGroup.add(globe);

// Add wireframe overlay
const wireframeGeo = new THREE.SphereGeometry(5.01, 36, 18);
const wireframeMat = new THREE.MeshBasicMaterial({
  color: 0x00ccff,
  wireframe: true,
  transparent: true,
  opacity: 0.08,
});
const wireframe = new THREE.Mesh(wireframeGeo, wireframeMat);
globeGroup.add(wireframe);

// Atmosphere glow
const atmosphereGeo = new THREE.SphereGeometry(5.15, 64, 64);
const atmosphereMat = new THREE.MeshBasicMaterial({
  color: 0x0066ff,
  transparent: true,
  opacity: 0.05,
  side: THREE.BackSide,
});
const atmosphere = new THREE.Mesh(atmosphereGeo, atmosphereMat);
globeGroup.add(atmosphere);

// Airport definitions
const airports = {
  JFK: { lat: 40.6, lon: -73.8 },
  LAX: { lat: 33.9, lon: -118.4 },
  LHR: { lat: 51.5, lon: -0.5 },
  NRT: { lat: 35.8, lon: 140.4 },
  SYD: { lat: -33.9, lon: 151.2 },
};

// Convert lat/lon to 3D position
function latLonToVec3(lat, lon, radius) {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);
  const x = -radius * Math.sin(phi) * Math.cos(theta);
  const y = radius * Math.cos(phi);
  const z = radius * Math.sin(phi) * Math.sin(theta);
  return new THREE.Vector3(x, y, z);
}

// Create airport markers
const airportPositions = {};
const airportMarkers = {};
Object.entries(airports).forEach(([name, { lat, lon }]) => {
  const pos = latLonToVec3(lat, lon, 5);
  airportPositions[name] = pos;

  // Red sphere marker
  const markerGeo = new THREE.SphereGeometry(0.08, 16, 16);
  const markerMat = new THREE.MeshBasicMaterial({ color: 0xff3333 });
  const marker = new THREE.Mesh(markerGeo, markerMat);
  marker.position.copy(pos);
  globeGroup.add(marker);
  airportMarkers[name] = marker;

  // Glow ring
  const ringGeo = new THREE.RingGeometry(0.1, 0.15, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0xff3333,
    transparent: true,
    opacity: 0.5,
    side: THREE.DoubleSide,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.copy(pos);
  ring.lookAt(pos.clone().multiplyScalar(2));
  globeGroup.add(ring);

  // Label
  const labelCanvas = document.createElement('canvas');
  labelCanvas.width = 128;
  labelCanvas.height = 64;
  const lctx = labelCanvas.getContext('2d');
  lctx.fillStyle = 'rgba(0,0,0,0)';
  lctx.fillRect(0, 0, 128, 64);
  lctx.font = 'bold 28px Arial';
  lctx.fillStyle = '#ffffff';
  lctx.textAlign = 'center';
  lctx.fillText(name, 64, 40);
  const labelTexture = new THREE.CanvasTexture(labelCanvas);
  const labelMat = new THREE.SpriteMaterial({ map: labelTexture, transparent: true });
  const label = new THREE.Sprite(labelMat);
  const labelPos = pos.clone().normalize().multiplyScalar(5.4);
  label.position.copy(labelPos);
  label.scale.set(0.8, 0.4, 1);
  globeGroup.add(label);
});

// Route definitions
const routeDefs = [
  { from: 'JFK', to: 'LAX', name: 'JFK → LAX' },
  { from: 'JFK', to: 'LHR', name: 'JFK → LHR' },
  { from: 'LHR', to: 'NRT', name: 'LHR → NRT' },
  { from: 'NRT', to: 'SYD', name: 'NRT → SYD' },
];

// Create route curves and lines
const routeCurves = [];
const routeLines = [];
const routeMaterials = [];

routeDefs.forEach((route, index) => {
  const start = airportPositions[route.from].clone();
  const end = airportPositions[route.to].clone();

  // Calculate midpoint and elevate it
  const mid = start.clone().add(end).multiplyScalar(0.5);
  const midNorm = mid.clone().normalize();
  const controlPoint = midNorm.multiplyScalar(7);

  const curve = new THREE.QuadraticBezierCurve3(start, controlPoint, end);
  routeCurves.push(curve);

  const points = curve.getPoints(100);
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const material = new THREE.LineBasicMaterial({
    color: index === 0 ? 0x00ff88 : 0xffcc00,
    linewidth: 2,
    transparent: true,
    opacity: index === 0 ? 1.0 : 0.6,
  });
  const line = new THREE.Line(geometry, material);
  globeGroup.add(line);
  routeLines.push(line);
  routeMaterials.push(material);
});

// Airplane indicator (cone)
const airplaneGeo = new THREE.ConeGeometry(0.06, 0.2, 8);
airplaneGeo.rotateX(Math.PI / 2);
const airplaneMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
const airplane = new THREE.Mesh(airplaneGeo, airplaneMat);
globeGroup.add(airplane);

// Add glow to airplane
const airplaneGlowGeo = new THREE.SphereGeometry(0.12, 8, 8);
const airplaneGlowMat = new THREE.MeshBasicMaterial({
  color: 0x00ff88,
  transparent: true,
  opacity: 0.3,
});
const airplaneGlow = new THREE.Mesh(airplaneGlowGeo, airplaneGlowMat);
airplane.add(airplaneGlow);

// Load GLTF milk truck
let truckModel = null;
let modelLoaded = false;
const loader = new GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/CesiumMilkTruck/glTF-Binary/CesiumMilkTruck.glb',
  (gltf) => {
    truckModel = gltf.scene;
    truckModel.scale.set(0.15, 0.15, 0.15);
    positionTruckAtAirport('JFK');
    globeGroup.add(truckModel);
    modelLoaded = true;
    updateState();
  },
  undefined,
  (error) => {
    console.warn('GLTF load failed, creating placeholder truck:', error);
    // Create a simple placeholder truck
    const truckGroup = new THREE.Group();
    // Body
    const bodyGeo = new THREE.BoxGeometry(0.3, 0.15, 0.15);
    const bodyMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.075;
    truckGroup.add(body);
    // Cab
    const cabGeo = new THREE.BoxGeometry(0.12, 0.12, 0.14);
    const cabMat = new THREE.MeshPhongMaterial({ color: 0x3366ff });
    const cab = new THREE.Mesh(cabGeo, cabMat);
    cab.position.set(0.15, 0.1, 0);
    truckGroup.add(cab);
    // Wheels
    const wheelGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.16, 8);
    const wheelMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
    [-0.08, 0.08].forEach(xOff => {
      const wheel = new THREE.Mesh(wheelGeo, wheelMat);
      wheel.rotation.x = Math.PI / 2;
      wheel.position.set(xOff, 0.03, 0);
      truckGroup.add(wheel);
    });

    truckModel = truckGroup;
    truckModel.scale.set(0.8, 0.8, 0.8);
    positionTruckAtAirport('JFK');
    globeGroup.add(truckModel);
    modelLoaded = true;
    updateState();
  }
);

function positionTruckAtAirport(airportName) {
  if (!truckModel) return;
  const pos = airportPositions[airportName].clone();
  const surfacePos = pos.clone().normalize().multiplyScalar(5.08);
  truckModel.position.copy(surfacePos);

  // Orient truck tangent to globe surface
  const up = surfacePos.clone().normalize();
  const tempForward = new THREE.Vector3(0, 1, 0);
  if (Math.abs(up.dot(tempForward)) > 0.99) {
    tempForward.set(1, 0, 0);
  }
  const right = new THREE.Vector3().crossVectors(up, tempForward).normalize();
  const forward = new THREE.Vector3().crossVectors(right, up).normalize();

  const matrix = new THREE.Matrix4();
  matrix.makeBasis(right, up, forward);
  truckModel.quaternion.setFromRotationMatrix(matrix);
}

// State
let activeRouteIndex = 0;
let flightProgress = 0;
let isPaused = false;
let isAutoRotating = false;
let truckAtAirport = 'JFK';
let truckTransitProgress = -1; // -1 means not in transit
let truckTransitStart = null;
let truckTransitEnd = null;
let truckTransitStartTime = 0;

// Initialize state object
window.__3D_STATE__ = {
  globeRadius: 5,
  activeRouteIndex: 0,
  activeRouteName: 'JFK → LAX',
  flightProgress: 0.0,
  isPaused: false,
  isAutoRotating: false,
  truckPosition: { x: 0, y: 0, z: 0 },
  truckAtAirport: 'JFK',
  airplanePosition: { x: 0, y: 0, z: 0 },
  numRoutesVisible: 4,
  selectedRouteColor: '#00ff88',
  globeRotationY: 0,
  modelLoaded: false,
};

function updateState() {
  const truckPos = truckModel ? truckModel.position : new THREE.Vector3();
  const airPos = airplane.position;

  window.__3D_STATE__ = {
    globeRadius: 5,
    activeRouteIndex: activeRouteIndex,
    activeRouteName: routeDefs[activeRouteIndex].name,
    flightProgress: flightProgress,
    isPaused: isPaused,
    isAutoRotating: isAutoRotating,
    truckPosition: { x: truckPos.x, y: truckPos.y, z: truckPos.z },
    truckAtAirport: truckAtAirport,
    airplanePosition: { x: airPos.x, y: airPos.y, z: airPos.z },
    numRoutesVisible: 4,
    selectedRouteColor: '#00ff88',
    globeRotationY: globeGroup.rotation.y,
    modelLoaded: modelLoaded,
  };
}

// HUD update
function updateHUD() {
  document.getElementById('hud-route').textContent = routeDefs[activeRouteIndex].name;
  document.getElementById('hud-progress').textContent = Math.round(flightProgress * 100) + '%';
  document.getElementById('hud-routes').textContent = '4';
  document.getElementById('hud-rotation').textContent = isAutoRotating ? 'Auto' : 'Manual';
  document.getElementById('hud-truck').textContent = truckAtAirport;
  document.getElementById('progress-bar').style.width = (flightProgress * 100) + '%';
}

// Select route
function selectRoute(index) {
  activeRouteIndex = index;
  flightProgress = 0;

  // Update route colors
  routeMaterials.forEach((mat, i) => {
    if (i === index) {
      mat.color.setHex(0x00ff88);
      mat.opacity = 1.0;
    } else {
      mat.color.setHex(0xffcc00);
      mat.opacity = 0.6;
    }
  });

  // Update buttons
  document.querySelectorAll('.route-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });

  updateHUD();
  updateState();
}

// Button event listeners
document.getElementById('btn-route-0').addEventListener('click', () => selectRoute(0));
document.getElementById('btn-route-1').addEventListener('click', () => selectRoute(1));
document.getElementById('btn-route-2').addEventListener('click', () => selectRoute(2));
document.getElementById('btn-route-3').addEventListener('click', () => selectRoute(3));

// Keyboard events
document.addEventListener('keydown', (e) => {
  if (e.code === 'KeyT') {
    // Teleport truck to destination of current route
    const destAirport = routeDefs[activeRouteIndex].to;
    if (truckAtAirport !== destAirport && truckTransitProgress < 0) {
      truckTransitStart = airportPositions[truckAtAirport].clone().normalize().multiplyScalar(5.08);
      truckTransitEnd = airportPositions[destAirport].clone().normalize().multiplyScalar(5.08);
      truckTransitStartTime = performance.now();
      truckTransitProgress = 0;
      truckAtAirport = 'in_transit';
    }
  } else if (e.code === 'KeyR') {
    isAutoRotating = !isAutoRotating;
    updateHUD();
  } else if (e.code === 'Space') {
    e.preventDefault();
    isPaused = !isPaused;
  }
});

// Slerp helper for moving along globe surface
function slerpVectors(v1, v2, t) {
  const start = v1.clone().normalize();
  const end = v2.clone().normalize();
  const dot = THREE.MathUtils.clamp(start.dot(end), -1, 1);
  const theta = Math.acos(dot);
  if (theta < 0.001) return v1.clone().lerp(v2, t);
  const sinTheta = Math.sin(theta);
  const a = Math.sin((1 - t) * theta) / sinTheta;
  const b = Math.sin(t * theta) / sinTheta;
  return start.multiplyScalar(a).add(end.multiplyScalar(b)).multiplyScalar(v1.length());
}

// Stars background
function createStars() {
  const starsGeo = new THREE.BufferGeometry();
  const positions = [];
  for (let i = 0; i < 2000; i++) {
    const r = 50 + Math.random() * 50;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI;
    positions.push(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.sin(phi) * Math.sin(theta),
      r * Math.cos(phi)
    );
  }
  starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.8 });
  const stars = new THREE.Points(starsGeo, starsMat);
  scene.add(stars);
}
createStars();

// Animation
const clock = new THREE.Clock();
let lastTime = performance.now();

function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const delta = (now - lastTime) / 1000;
  lastTime = now;

  // Auto rotation
  if (isAutoRotating) {
    globeGroup.rotation.y += 0.003;
  }

  // Flight animation
  if (!isPaused) {
    flightProgress += delta / 4.0; // 4 seconds per trip
    if (flightProgress >= 1.0) {
      flightProgress -= 1.0;
    }
  }

  // Update airplane position
  const curve = routeCurves[activeRouteIndex];
  const pos = curve.getPoint(flightProgress);
  airplane.position.copy(pos);

  // Orient airplane along direction of travel
  const nextT = Math.min(flightProgress + 0.01, 1.0);
  const nextPos = curve.getPoint(nextT);
  if (nextPos.distanceTo(pos) > 0.001) {
    airplane.lookAt(nextPos);
  }

  // Truck transit animation
  if (truckTransitProgress >= 0 && truckModel) {
    const elapsed = (now - truckTransitStartTime) / 1000;
    truckTransitProgress = Math.min(elapsed / 1.0, 1.0); // 1 second transit

    // Smooth easing
    const t = truckTransitProgress < 0.5
      ? 2 * truckTransitProgress * truckTransitProgress
      : 1 - Math.pow(-2 * truckTransitProgress + 2, 2) / 2;

    const interpPos = slerpVectors(truckTransitStart, truckTransitEnd, t);
    truckModel.position.copy(interpPos);

    // Orient truck
    const up = interpPos.clone().normalize();
    const tempForward = new THREE.Vector3(0, 1, 0);
    if (Math.abs(up.dot(tempForward)) > 0.99) tempForward.set(1, 0, 0);
    const right = new THREE.Vector3().crossVectors(up, tempForward).normalize();
    const forward = new THREE.Vector3().crossVectors(right, up).normalize();

    // Face direction of travel
    if (t < 0.99) {
      const nextInterpPos = slerpVectors(truckTransitStart, truckTransitEnd, Math.min(t + 0.05, 1));
      const travelDir = nextInterpPos.clone().sub(interpPos).normalize();
      const projectedDir = travelDir.clone().sub(up.clone().multiplyScalar(travelDir.dot(up))).normalize();
      const matrix = new THREE.Matrix4();
      const newRight = new THREE.Vector3().crossVectors(up, projectedDir).normalize();
      matrix.makeBasis(newRight, up, projectedDir);
      truckModel.quaternion.setFromRotationMatrix(matrix);
    }

    if (truckTransitProgress >= 1.0) {
      truckTransitProgress = -1;
      truckAtAirport = routeDefs[activeRouteIndex].to;
      positionTruckAtAirport(truckAtAirport);
    }
  }

  // Pulse airport markers
  Object.values(airportMarkers).forEach((marker) => {
    const scale = 1 + 0.2 * Math.sin(now * 0.003);
    marker.scale.setScalar(scale);
  });

  controls.update();
  updateHUD();
  updateState();
  renderer.render(scene, camera);
}

animate();

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
