<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flight Routes</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: sans-serif;
            color: white;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            min-width: 200px;
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #00ff88;
        }
        .hud-line {
            margin: 5px 0;
            font-size: 14px;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        button.active {
            background: rgba(0, 255, 136, 0.2);
            border-color: #00ff88;
            color: #00ff88;
        }
        #instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
            text-align: right;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <h2 id="hud-route">JFK → LAX</h2>
        <div class="hud-line">Progress: <span id="hud-progress">0</span>%</div>
        <div class="hud-line">Active Routes: <span id="hud-count">4</span></div>
        <div class="hud-line">Rotation: <span id="hud-rotation">Manual</span></div>
    </div>

    <div id="instructions">
        <strong>Controls:</strong><br>
        Left Click: Rotate<br>
        Scroll: Zoom<br>
        [Space]: Pause/Resume Flight<br>
        [R]: Toggle Auto-Rotation<br>
        [T]: Teleport Truck to Destination
    </div>

    <div id="controls">
        <button id="btn-route-0" class="active">JFK-LAX</button>
        <button id="btn-route-1">JFK-LHR</button>
        <button id="btn-route-2">LHR-NRT</button>
        <button id="btn-route-3">NRT-SYD</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            globeRadius: 5,
            activeRouteIndex: 0,
            activeRouteName: 'JFK → LAX',
            flightProgress: 0,
            isPaused: false,
            isAutoRotating: false,
            truckPosition: { x: 0, y: 0, z: 0 },
            truckAtAirport: 'JFK',
            airplanePosition: { x: 0, y: 0, z: 0 },
            numRoutesVisible: 4,
            selectedRouteColor: '#00ff88',
            globeRotationY: 0,
            modelLoaded: false
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 10, 10);
        scene.add(dirLight);

        // Group for globe and all attached objects
        const globeGroup = new THREE.Group();
        scene.add(globeGroup);

        // --- Globe Creation ---
        // Procedural Grid Texture
        const canvas = document.createElement('canvas');
        canvas.width = 1024;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#000033';
        ctx.fillRect(0, 0, 1024, 512);
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 2;
        for (let i = 0; i <= 18; i++) {
            ctx.beginPath(); ctx.moveTo(0, i * 512 / 18); ctx.lineTo(1024, i * 512 / 18); ctx.stroke();
        }
        for (let i = 0; i <= 36; i++) {
            ctx.beginPath(); ctx.moveTo(i * 1024 / 36, 0); ctx.lineTo(i * 1024 / 36, 512); ctx.stroke();
        }
        const gridTexture = new THREE.CanvasTexture(canvas);

        const globeGeo = new THREE.SphereGeometry(state.globeRadius, 64, 64);
        const globeMat = new THREE.MeshPhongMaterial({ map: gridTexture });
        const globe = new THREE.Mesh(globeGeo, globeMat);
        globeGroup.add(globe);

        // --- Airports & Routes ---
        const airportData = {
            'JFK': { lat: 40.6, lon: -73.8 },
            'LAX': { lat: 33.9, lon: -118.4 },
            'LHR': { lat: 51.5, lon: -0.5 },
            'NRT': { lat: 35.8, lon: 140.4 },
            'SYD': { lat: -33.9, lon: 151.2 }
        };

        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = (radius * Math.sin(phi) * Math.sin(theta));
            const y = (radius * Math.cos(phi));
            return new THREE.Vector3(x, y, z);
        }

        const airportPositions = {};
        const markerGeo = new THREE.SphereGeometry(0.08, 16, 16);
        const markerMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });

        for (const [name, coords] of Object.entries(airportData)) {
            const pos = latLonToVector3(coords.lat, coords.lon, state.globeRadius);
            airportPositions[name] = pos;
            const marker = new THREE.Mesh(markerGeo, markerMat);
            marker.position.copy(pos);
            globeGroup.add(marker);
        }

        const routeDefs = [
            { id: 0, name: 'JFK → LAX', from: 'JFK', to: 'LAX' },
            { id: 1, name: 'JFK → LHR', from: 'JFK', to: 'LHR' },
            { id: 2, name: 'LHR → NRT', from: 'LHR', to: 'NRT' },
            { id: 3, name: 'NRT → SYD', from: 'NRT', to: 'SYD' }
        ];

        const routes = [];
        routeDefs.forEach((def, index) => {
            const start = airportPositions[def.from];
            const end = airportPositions[def.to];
            const mid = start.clone().lerp(end, 0.5).normalize().multiplyScalar(7);
            
            const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
            const points = curve.getPoints(50);
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ 
                color: index === 0 ? 0x00ff88 : 0xffcc00 
            });
            const line = new THREE.Line(geometry, material);
            
            globeGroup.add(line);
            routes.push({ ...def, curve, line });
        });

        // --- Airplane ---
        const airplaneGeo = new THREE.ConeGeometry(0.06, 0.2, 16);
        airplaneGeo.rotateX(Math.PI / 2); // Point along Z axis
        const airplaneMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const airplane = new THREE.Mesh(airplaneGeo, airplaneMat);
        globeGroup.add(airplane);

        // --- GLTF Model (Milk Truck) ---
        let truck = new THREE.Group();
        globeGroup.add(truck); // Add empty group immediately
        
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/CesiumMilkTruck/glTF-Binary/CesiumMilkTruck.glb',
            (gltf) => {
                const model = gltf.scene;
                model.scale.set(0.15, 0.15, 0.15);
                truck.add(model);
                
                // Initial placement at JFK
                placeTruckAt(airportPositions['JFK']);
                state.modelLoaded = true;
            }
        );

        function placeTruckAt(position) {
            truck.position.copy(position);
            const normal = position.clone().normalize();
            truck.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), normal);
        }

        // --- Teleport Animation State ---
        let isTruckMoving = false;
        let truckMoveProgress = 0;
        let truckStartPos = new THREE.Vector3();
        let truckEndPos = new THREE.Vector3();
        let truckTargetAirport = '';

        // --- UI & Interactions ---
        const hudRoute = document.getElementById('hud-route');
        const hudProgress = document.getElementById('hud-progress');
        const hudRotation = document.getElementById('hud-rotation');
        const buttons = [
            document.getElementById('btn-route-0'),
            document.getElementById('btn-route-1'),
            document.getElementById('btn-route-2'),
            document.getElementById('btn-route-3')
        ];

        function selectRoute(index) {
            state.activeRouteIndex = index;
            state.activeRouteName = routes[index].name;
            state.flightProgress = 0;
            
            routes.forEach((r, i) => {
                r.line.material.color.setHex(i === index ? 0x00ff88 : 0xffcc00);
            });
            
            buttons.forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            
            hudRoute.textContent = state.activeRouteName;
        }

        buttons.forEach((btn, index) => {
            btn.addEventListener('click', () => selectRoute(index));
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                state.isPaused = !state.isPaused;
            } else if (e.code === 'KeyR') {
                state.isAutoRotating = !state.isAutoRotating;
                hudRotation.textContent = state.isAutoRotating ? 'Auto' : 'Manual';
            } else if (e.code === 'KeyT' && !isTruckMoving) {
                const currentRoute = routes[state.activeRouteIndex];
                truckStartPos.copy(truck.position);
                truckEndPos.copy(airportPositions[currentRoute.to]);
                truckTargetAirport = currentRoute.to;
                isTruckMoving = true;
                truckMoveProgress = 0;
                state.truckAtAirport = 'in_transit';
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        const tempVec = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Flight Animation
            if (!state.isPaused) {
                state.flightProgress += delta / 4.0; // 4 seconds per trip
                if (state.flightProgress > 1) state.flightProgress = 0;
            }

            const currentCurve = routes[state.activeRouteIndex].curve;
            const planePos = currentCurve.getPoint(state.flightProgress);
            airplane.position.copy(planePos);
            
            // Look at next point
            const nextProgress = Math.min(1.0, state.flightProgress + 0.01);
            const nextPos = currentCurve.getPoint(nextProgress);
            const targetWorld = globeGroup.localToWorld(nextPos.clone());
            airplane.lookAt(targetWorld);

            // Truck Teleport Animation
            if (isTruckMoving) {
                truckMoveProgress += delta / 1.0; // 1 second duration
                if (truckMoveProgress >= 1) {
                    truckMoveProgress = 1;
                    isTruckMoving = false;
                    state.truckAtAirport = truckTargetAirport;
                }
                
                // Spherical interpolation along surface
                const currentPos = new THREE.Vector3()
                    .copy(truckStartPos)
                    .lerp(truckEndPos, truckMoveProgress)
                    .normalize()
                    .multiplyScalar(state.globeRadius);
                
                placeTruckAt(currentPos);
            }

            // Globe Rotation
            if (state.isAutoRotating) {
                globeGroup.rotation.y += 0.003;
                state.globeRotationY = globeGroup.rotation.y;
            }

            // Update State World Positions
            truck.getWorldPosition(tempVec);
            state.truckPosition = { x: tempVec.x, y: tempVec.y, z: tempVec.z };
            
            airplane.getWorldPosition(tempVec);
            state.airplanePosition = { x: tempVec.x, y: tempVec.y, z: tempVec.z };

            // Update HUD
            hudProgress.textContent = Math.floor(state.flightProgress * 100);

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
