<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Flight Routes Globe</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 12px 14px;
      background: rgba(10, 10, 30, 0.75);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      min-width: 220px;
      z-index: 10;
      font-size: 14px;
      line-height: 1.5;
    }

    #buttons {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
      flex-wrap: wrap;
      justify-content: center;
    }

    #buttons button {
      background: rgba(20, 20, 50, 0.85);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    #buttons button:hover {
      background: rgba(40, 40, 80, 0.95);
    }

    #buttons button.active {
      background: #00ff88;
      color: #001b11;
      border-color: #00ff88;
      font-weight: bold;
    }

    #help {
      position: absolute;
      right: 12px;
      top: 12px;
      background: rgba(10, 10, 30, 0.75);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div><strong>Route:</strong> <span id="routeName">JFK → LAX</span></div>
    <div><strong>Progress:</strong> <span id="progressText">0%</span></div>
    <div><strong>Active Routes:</strong> <span id="routesVisible">4</span></div>
    <div><strong>Rotation:</strong> <span id="rotationStatus">manual</span></div>
  </div>

  <div id="help">
    <div><strong>Keys</strong></div>
    <div>R = Toggle globe auto-rotation</div>
    <div>T = Teleport truck to destination</div>
    <div>Space = Pause/resume flight</div>
  </div>

  <div id="buttons">
    <button id="btn-route-0" class="active">JFK-LAX</button>
    <button id="btn-route-1">JFK-LHR</button>
    <button id="btn-route-2">LHR-NRT</button>
    <button id="btn-route-3">NRT-SYD</button>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const GLOBE_RADIUS = 5;
    const ROUTE_COLOR = "#ffcc00";
    const SELECTED_ROUTE_COLOR = "#00ff88";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#0a0a2e");

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 0, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 10, 10);
    scene.add(directionalLight);

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    function createGridTexture() {
      const size = 1024;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#0d1b4d";
      ctx.fillRect(0, 0, size, size);

      ctx.strokeStyle = "#00d9ff";
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.85;

      const latLines = 12;
      const lonLines = 24;

      for (let i = 1; i < latLines; i++) {
        const y = (i / latLines) * size;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(size, y);
        ctx.stroke();
      }

      for (let i = 0; i < lonLines; i++) {
        const x = (i / lonLines) * size;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, size);
        ctx.stroke();
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.ClampToEdgeWrapping;
      return texture;
    }

    const globeTexture = createGridTexture();
    const globeMaterial = new THREE.MeshPhongMaterial({
      map: globeTexture,
      color: 0xffffff,
      shininess: 10
    });
    const globe = new THREE.Mesh(
      new THREE.SphereGeometry(GLOBE_RADIUS, 64, 64),
      globeMaterial
    );
    globeGroup.add(globe);

    function latLonToVector3(lat, lon, radius) {
      const phi = THREE.MathUtils.degToRad(90 - lat);
      const theta = THREE.MathUtils.degToRad(lon + 180);

      const x = -radius * Math.sin(phi) * Math.cos(theta);
      const y = radius * Math.cos(phi);
      const z = radius * Math.sin(phi) * Math.sin(theta);
      return new THREE.Vector3(x, y, z);
    }

    const airportData = {
      JFK: { lat: 40.6, lon: -73.8 },
      LAX: { lat: 33.9, lon: -118.4 },
      LHR: { lat: 51.5, lon: -0.5 },
      NRT: { lat: 35.8, lon: 140.4 },
      SYD: { lat: -33.9, lon: 151.2 }
    };

    const airports = {};
    const airportMarkers = new THREE.Group();
    globeGroup.add(airportMarkers);

    const airportMarkerGeo = new THREE.SphereGeometry(0.08, 16, 16);
    const airportMarkerMat = new THREE.MeshBasicMaterial({ color: 0xff3333 });

    for (const [name, data] of Object.entries(airportData)) {
      const pos = latLonToVector3(data.lat, data.lon, GLOBE_RADIUS);
      airports[name] = { ...data, position: pos };

      const marker = new THREE.Mesh(airportMarkerGeo, airportMarkerMat);
      marker.position.copy(pos);
      airportMarkers.add(marker);
    }

    const routeDefs = [
      { from: "JFK", to: "LAX", name: "JFK → LAX" },
      { from: "JFK", to: "LHR", name: "JFK → LHR" },
      { from: "LHR", to: "NRT", name: "LHR → NRT" },
      { from: "NRT", to: "SYD", name: "NRT → SYD" }
    ];

    const routes = [];
    const routeGroup = new THREE.Group();
    globeGroup.add(routeGroup);

    function createRouteCurve(start, end) {
      const mid = start.clone().add(end).multiplyScalar(0.5).normalize().multiplyScalar(7);
      return new THREE.QuadraticBezierCurve3(start.clone(), mid, end.clone());
    }

    routeDefs.forEach((routeDef, index) => {
      const start = airports[routeDef.from].position;
      const end = airports[routeDef.to].position;
      const curve = createRouteCurve(start, end);
      const points = curve.getPoints(100);

      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({
        color: index === 0 ? SELECTED_ROUTE_COLOR : ROUTE_COLOR
      });

      const line = new THREE.Line(geometry, material);
      routeGroup.add(line);

      routes.push({
        ...routeDef,
        curve,
        line
      });
    });

    const airplane = new THREE.Mesh(
      new THREE.ConeGeometry(0.06, 0.2, 12),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    airplane.rotation.x = Math.PI / 2;
    globeGroup.add(airplane);

    const truckAnchor = new THREE.Group();
    globeGroup.add(truckAnchor);

    let truckModel = null;
    let modelLoaded = false;
    let truckAtAirport = "JFK";

    const loader = new GLTFLoader();
    loader.load(
      "CesiumMilkTruck.glb",
      (gltf) => {
        truckModel = gltf.scene;
        truckModel.scale.setScalar(0.15);
        truckAnchor.add(truckModel);
        setTruckAtAirport("JFK");
        modelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn("Failed to load CesiumMilkTruck.glb", err);
      }
    );

    function orientObjectToSurface(obj, position, tangentDir = null, heightOffset = 0.12) {
      const normal = position.clone().normalize();
      const finalPos = normal.clone().multiplyScalar(GLOBE_RADIUS + heightOffset);
      obj.position.copy(finalPos);

      const up = normal.clone();
      obj.up.copy(up);

      let forward;
      if (tangentDir && tangentDir.lengthSq() > 0.0001) {
        forward = tangentDir.clone().normalize();
      } else {
        forward = new THREE.Vector3(0, 1, 0).cross(normal);
        if (forward.lengthSq() < 0.0001) forward = new THREE.Vector3(1, 0, 0);
        forward.normalize();
      }

      const lookTarget = finalPos.clone().add(forward);
      obj.lookAt(lookTarget);
    }

    function setTruckAtAirport(code) {
      const routeIndex = state.activeRouteIndex;
      const tangent = getSurfaceTangentAtAirport(code, routeIndex);
      orientObjectToSurface(truckAnchor, airports[code].position, tangent, 0.12);
      truckAtAirport = code;
    }

    function getSurfaceTangentAtAirport(code, routeIndex) {
      const route = routes[routeIndex];
      if (!route) return new THREE.Vector3(1, 0, 0);

      if (route.from === code) {
        const p0 = route.curve.getPoint(0);
        const p1 = route.curve.getPoint(0.02);
        return p1.clone().sub(p0).projectOnPlane(p0.clone().normalize()).normalize();
      }
      if (route.to === code) {
        const p0 = route.curve.getPoint(0.98);
        const p1 = route.curve.getPoint(1);
        return p1.clone().sub(p0).projectOnPlane(p1.clone().normalize()).normalize();
      }

      const normal = airports[code].position.clone().normalize();
      return new THREE.Vector3(0, 1, 0).cross(normal).normalize();
    }

    const state = {
      activeRouteIndex: 0,
      flightProgress: 0,
      isPaused: false,
      isAutoRotating: false,
      truckMove: null
    };

    function updateRouteSelection(index) {
      state.activeRouteIndex = index;
      state.flightProgress = 0;

      routes.forEach((r, i) => {
        r.line.material.color.set(i === index ? SELECTED_ROUTE_COLOR : ROUTE_COLOR);
      });

      for (let i = 0; i < 4; i++) {
        document.getElementById(`btn-route-${i}`).classList.toggle("active", i === index);
      }

      const currentRoute = routes[index];
      if (truckAtAirport !== "in_transit" && truckModel) {
        if (truckAtAirport === currentRoute.from || truckAtAirport === currentRoute.to) {
          setTruckAtAirport(truckAtAirport);
        }
      }
    }

    function animateTruckToDestination() {
      const route = routes[state.activeRouteIndex];
      const start = truckAnchor.position.clone();
      const fromPos = start.clone().normalize().multiplyScalar(GLOBE_RADIUS + 0.12);
      const toPos = airports[route.to].position.clone().normalize().multiplyScalar(GLOBE_RADIUS + 0.12);

      const startNormal = fromPos.clone().normalize();
      const endNormal = toPos.clone().normalize();

      state.truckMove = {
        from: startNormal,
        to: endNormal,
        elapsed: 0,
        duration: 1.0,
        destination: route.to
      };
      truckAtAirport = "in_transit";
    }

    document.getElementById("btn-route-0").addEventListener("click", () => updateRouteSelection(0));
    document.getElementById("btn-route-1").addEventListener("click", () => updateRouteSelection(1));
    document.getElementById("btn-route-2").addEventListener("click", () => updateRouteSelection(2));
    document.getElementById("btn-route-3").addEventListener("click", () => updateRouteSelection(3));

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        state.isPaused = !state.isPaused;
      } else if (e.key.toLowerCase() === "r") {
        state.isAutoRotating = !state.isAutoRotating;
      } else if (e.key.toLowerCase() === "t") {
        if (truckModel && !state.truckMove) {
          animateTruckToDestination();
        }
      }
    });

    const routeNameEl = document.getElementById("routeName");
    const progressTextEl = document.getElementById("progressText");
    const routesVisibleEl = document.getElementById("routesVisible");
    const rotationStatusEl = document.getElementById("rotationStatus");

    routesVisibleEl.textContent = "4";

    window.__3D_STATE__ = {
      globeRadius: GLOBE_RADIUS,
      activeRouteIndex: 0,
      activeRouteName: "JFK → LAX",
      flightProgress: 0,
      isPaused: false,
      isAutoRotating: false,
      truckPosition: { x: 0, y: 0, z: 0 },
      truckAtAirport: "JFK",
      airplanePosition: { x: 0, y: 0, z: 0 },
      numRoutesVisible: 4,
      selectedRouteColor: SELECTED_ROUTE_COLOR,
      globeRotationY: 0,
      modelLoaded: false
    };

    const clock = new THREE.Clock();

    function updateAirplane(delta) {
      const route = routes[state.activeRouteIndex];

      if (!state.isPaused) {
        state.flightProgress = (state.flightProgress + delta / 4) % 1;
      }

      const t = state.flightProgress;
      const pos = route.curve.getPoint(t);
      const nextT = Math.min(t + 0.01, 1);
      const nextPos = route.curve.getPoint(nextT);

      airplane.position.copy(pos);
      airplane.lookAt(nextPos);
      airplane.rotateX(Math.PI / 2);
    }

    function updateTruck(delta) {
      if (!truckModel || !state.truckMove) return;

      const move = state.truckMove;
      move.elapsed += delta;
      const t = Math.min(move.elapsed / move.duration, 1);

      const normal = move.from.clone().slerp(move.to, t).normalize();
      const pos = normal.clone().multiplyScalar(GLOBE_RADIUS + 0.12);

      const axis = new THREE.Vector3(0, 1, 0);
      let tangent = axis.clone().cross(normal);
      if (tangent.lengthSq() < 0.0001) tangent = new THREE.Vector3(1, 0, 0);
      tangent.normalize();

      truckAnchor.position.copy(pos);
      truckAnchor.up.copy(normal);
      truckAnchor.lookAt(pos.clone().add(tangent));

      if (t >= 1) {
        truckAtAirport = move.destination;
        state.truckMove = null;
        setTruckAtAirport(move.destination);
      }
    }

    function updateHUD() {
      const route = routes[state.activeRouteIndex];
      routeNameEl.textContent = route.name;
      progressTextEl.textContent = `${Math.round(state.flightProgress * 100)}%`;
      rotationStatusEl.textContent = state.isAutoRotating ? "auto-rotating" : "manual";
    }

    function updateStateObject() {
      window.__3D_STATE__.globeRadius = GLOBE_RADIUS;
      window.__3D_STATE__.activeRouteIndex = state.activeRouteIndex;
      window.__3D_STATE__.activeRouteName = routes[state.activeRouteIndex].name;
      window.__3D_STATE__.flightProgress = state.flightProgress;
      window.__3D_STATE__.isPaused = state.isPaused;
      window.__3D_STATE__.isAutoRotating = state.isAutoRotating;
      window.__3D_STATE__.truckPosition = {
        x: truckAnchor.position.x,
        y: truckAnchor.position.y,
        z: truckAnchor.position.z
      };
      window.__3D_STATE__.truckAtAirport = truckAtAirport;
      window.__3D_STATE__.airplanePosition = {
        x: airplane.position.x,
        y: airplane.position.y,
        z: airplane.position.z
      };
      window.__3D_STATE__.numRoutesVisible = 4;
      window.__3D_STATE__.selectedRouteColor = SELECTED_ROUTE_COLOR;
      window.__3D_STATE__.globeRotationY = globeGroup.rotation.y;
      window.__3D_STATE__.modelLoaded = modelLoaded;
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      controls.update();

      if (state.isAutoRotating) {
        globeGroup.rotation.y += 0.003;
      }

      updateAirplane(delta);
      updateTruck(delta);
      updateHUD();
      updateStateObject();

      renderer.render(scene, camera);
    }

    updateRouteSelection(0);
    if (!truckModel) {
      orientObjectToSurface(truckAnchor, airports["JFK"].position, getSurfaceTangentAtAirport("JFK", 0), 0.12);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
