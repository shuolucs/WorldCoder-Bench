<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Multiplayer Bike Frame Builder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }
  
  #playerDisplay {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #3366FF;
    font-size: 18px;
    font-weight: bold;
    background: rgba(0,0,0,0.7);
    padding: 12px 20px;
    border-radius: 8px;
    border: 2px solid #3366FF;
    text-shadow: 0 0 10px currentColor;
    z-index: 10;
  }
  
  #tubeCount {
    position: absolute;
    top: 20px;
    right: 20px;
    color: #00ff88;
    font-size: 18px;
    font-weight: bold;
    background: rgba(0,0,0,0.7);
    padding: 12px 20px;
    border-radius: 8px;
    border: 2px solid #00ff88;
    z-index: 10;
  }
  
  #scaleDisplay {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #ffcc00;
    font-size: 16px;
    font-weight: bold;
    background: rgba(0,0,0,0.7);
    padding: 10px 20px;
    border-radius: 8px;
    border: 2px solid #ffcc00;
    z-index: 10;
  }
  
  #exportBtn {
    position: absolute;
    bottom: 20px;
    right: 20px;
    padding: 12px 24px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    z-index: 10;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
  }
  
  #exportBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
  }
  
  #instructions {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: #aaa;
    font-size: 12px;
    background: rgba(0,0,0,0.6);
    padding: 8px 16px;
    border-radius: 6px;
    z-index: 10;
    text-align: center;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="playerDisplay">Active Player: Player1</div>
<div id="tubeCount">Tubes: 0/6</div>
<div id="scaleDisplay">Frame Scale: 1.0x</div>
<div id="instructions">Keys: 1-6 Add Tube | Tab Switch Player | R Reset | C Color | S Scale | Del Remove | Click Select</div>
<button id="exportBtn">Export Frame</button>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State management
window.__3D_STATE__ = {
  tubesPlaced: 0,
  activePlayer: 'Player1',
  selectedTube: null,
  frameScale: 1.0,
  frameColor: '#CC0000',
  player1Position: { x: -2, y: 1, z: 2 },
  player2Position: { x: 2, y: 1, z: -2 },
  robotLoaded: false,
  exported: false,
  tubeOwners: {},
  colorCycleIndex: 0,
  scaleCycleIndex: 0
};

const colorPresets = ['#CC0000', '#0066CC', '#00CC66', '#222222'];
const scalePresets = [1.0, 1.2, 0.8];

const tubeDefinitions = [
  { name: 'Seat Tube', start: new THREE.Vector3(0, 0.3, 0), end: new THREE.Vector3(0, 1.5, 0), radius: 0.04 },
  { name: 'Top Tube', start: new THREE.Vector3(0, 1.5, 0), end: new THREE.Vector3(-1.2, 1.4, 0), radius: 0.035 },
  { name: 'Down Tube', start: new THREE.Vector3(0, 0.3, 0), end: new THREE.Vector3(-1.2, 0.8, 0), radius: 0.04 },
  { name: 'Head Tube', start: new THREE.Vector3(-1.2, 0.8, 0), end: new THREE.Vector3(-1.2, 1.4, 0), radius: 0.045 },
  { name: 'Chain Stay', start: new THREE.Vector3(0, 0.3, 0), end: new THREE.Vector3(1.0, 0.3, 0), radius: 0.03 },
  { name: 'Seat Stay', start: new THREE.Vector3(0, 1.5, 0), end: new THREE.Vector3(1.0, 0.3, 0), radius: 0.03 }
];

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 15, 30);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 10, 7);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
directionalLight.shadow.camera.near = 0.5;
directionalLight.shadow.camera.far = 50;
directionalLight.shadow.camera.left = -10;
directionalLight.shadow.camera.right = 10;
directionalLight.shadow.camera.top = 10;
directionalLight.shadow.camera.bottom = -10;
scene.add(directionalLight);

// Additional fill light
const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
fillLight.position.set(-5, 3, -5);
scene.add(fillLight);

// Ground plane
const groundGeometry = new THREE.PlaneGeometry(20, 20);
const groundMaterial = new THREE.MeshStandardMaterial({ 
  color: 0x888888, 
  roughness: 0.8, 
  metalness: 0.2 
});
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x333333);
gridHelper.position.y = 0.001;
scene.add(gridHelper);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0.8, 0);
controls.update();

// Load robot model
const loader = new GLTFLoader();
let robotModel = null;

loader.load(
  'https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb',
  (gltf) => {
    robotModel = gltf.scene;
    robotModel.scale.set(0.5, 0.5, 0.5);
    robotModel.position.set(4, 0, 0);
    robotModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(robotModel);
    window.__3D_STATE__.robotLoaded = true;

    // Setup animations if available
    if (gltf.animations && gltf.animations.length > 0) {
      const mixer = new THREE.AnimationMixer(robotModel);
      const idleAction = mixer.clipAction(gltf.animations[0]);
      idleAction.play();
      robotModel.userData.mixer = mixer;
    }
  },
  undefined,
  (error) => {
    console.warn('Robot model could not be loaded:', error);
    // Create a placeholder robot
    const robotGroup = new THREE.Group();
    
    const bodyGeo = new THREE.BoxGeometry(0.6, 0.8, 0.4);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x888899, metalness: 0.6, roughness: 0.3 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1.0;
    body.castShadow = true;
    robotGroup.add(body);
    
    const headGeo = new THREE.SphereGeometry(0.25, 16, 16);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xaaaacc, metalness: 0.5, roughness: 0.3 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 1.65;
    head.castShadow = true;
    robotGroup.add(head);
    
    const eyeGeo = new THREE.SphereGeometry(0.05, 8, 8);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 0.5 });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.08, 1.7, 0.22);
    robotGroup.add(leftEye);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    rightEye.position.set(0.08, 1.7, 0.22);
    robotGroup.add(rightEye);
    
    const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.5, 8);
    const legMat = new THREE.MeshStandardMaterial({ color: 0x666677, metalness: 0.5 });
    const leftLeg = new THREE.Mesh(legGeo, legMat);
    leftLeg.position.set(-0.15, 0.35, 0);
    leftLeg.castShadow = true;
    robotGroup.add(leftLeg);
    const rightLeg = new THREE.Mesh(legGeo, legMat);
    rightLeg.position.set(0.15, 0.35, 0);
    rightLeg.castShadow = true;
    robotGroup.add(rightLeg);
    
    robotGroup.scale.set(0.5, 0.5, 0.5);
    robotGroup.position.set(4, 0, 0);
    scene.add(robotGroup);
    robotModel = robotGroup;
    window.__3D_STATE__.robotLoaded = true;
  }
);

// Player cursors
const player1Color = new THREE.Color(0x3366FF);
const player2Color = new THREE.Color(0xFF6633);

function createPlayerCursor(color, position) {
  const group = new THREE.Group();
  
  const sphereGeo = new THREE.SphereGeometry(0.1, 16, 16);
  const sphereMat = new THREE.MeshStandardMaterial({ 
    color: color, 
    emissive: color, 
    emissiveIntensity: 0.4,
    metalness: 0.3,
    roughness: 0.4
  });
  const sphere = new THREE.Mesh(sphereGeo, sphereMat);
  sphere.castShadow = true;
  group.add(sphere);
  
  // Add a ring around active cursor
  const ringGeo = new THREE.TorusGeometry(0.18, 0.015, 8, 32);
  const ringMat = new THREE.MeshStandardMaterial({ 
    color: color, 
    emissive: color, 
    emissiveIntensity: 0.6 
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.userData.isRing = true;
  group.add(ring);
  
  // Point light for glow effect
  const pointLight = new THREE.PointLight(color, 0.5, 3);
  group.add(pointLight);
  
  group.position.set(position.x, position.y, position.z);
  scene.add(group);
  return group;
}

const player1Cursor = createPlayerCursor(player1Color, { x: -2, y: 1, z: 2 });
const player2Cursor = createPlayerCursor(player2Color, { x: 2, y: 1, z: -2 });

// Frame group
const frameGroup = new THREE.Group();
scene.add(frameGroup);

// Tube storage
const tubes = {}; // index -> mesh
const tubeMeshes = []; // for raycasting

function createTube(index, playerColor) {
  const def = tubeDefinitions[index - 1];
  const start = def.start.clone();
  const end = def.end.clone();
  const direction = new THREE.Vector3().subVectors(end, start);
  const length = direction.length();
  const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
  
  const geometry = new THREE.CylinderGeometry(def.radius, def.radius, length, 16, 1);
  const material = new THREE.MeshStandardMaterial({ 
    color: new THREE.Color(playerColor),
    metalness: 0.6,
    roughness: 0.3,
    emissive: new THREE.Color(0x000000),
    emissiveIntensity: 0
  });
  
  const mesh = new THREE.Mesh(geometry, material);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  
  // Position at midpoint
  mesh.position.copy(midpoint);
  
  // Orient the cylinder to connect start and end
  const up = new THREE.Vector3(0, 1, 0);
  const dir = direction.clone().normalize();
  const quaternion = new THREE.Quaternion();
  quaternion.setFromUnitVectors(up, dir);
  mesh.quaternion.copy(quaternion);
  
  mesh.userData.tubeIndex = index;
  mesh.userData.originalColor = playerColor;
  
  return mesh;
}

function addTube(index) {
  if (tubes[index]) return; // Already exists
  
  const state = window.__3D_STATE__;
  const playerColor = state.activePlayer === 'Player1' ? '#3366FF' : '#FF6633';
  
  const mesh = createTube(index, playerColor);
  frameGroup.add(mesh);
  tubes[index] = mesh;
  tubeMeshes.push(mesh);
  
  state.tubeOwners[index] = state.activePlayer;
  state.tubesPlaced = Object.keys(tubes).length;
  
  // Animate tube appearance
  mesh.scale.y = 0;
  mesh.userData.animating = true;
  mesh.userData.animProgress = 0;
  
  updateHUD();
  
  // Move active player cursor toward the tube
  const def = tubeDefinitions[index - 1];
  const mid = new THREE.Vector3().addVectors(def.start, def.end).multiplyScalar(0.5);
  const cursor = state.activePlayer === 'Player1' ? player1Cursor : player2Cursor;
  cursor.userData.targetPos = mid.clone().add(new THREE.Vector3(0, 0.5, 1));
}

function removeTube(index) {
  if (!tubes[index]) return;
  
  const mesh = tubes[index];
  frameGroup.remove(mesh);
  mesh.geometry.dispose();
  mesh.material.dispose();
  
  const idx = tubeMeshes.indexOf(mesh);
  if (idx > -1) tubeMeshes.splice(idx, 1);
  
  delete tubes[index];
  delete window.__3D_STATE__.tubeOwners[index];
  
  if (window.__3D_STATE__.selectedTube === index) {
    window.__3D_STATE__.selectedTube = null;
  }
  
  window.__3D_STATE__.tubesPlaced = Object.keys(tubes).length;
  updateHUD();
}

function removeAllTubes() {
  const indices = Object.keys(tubes).map(Number);
  indices.forEach(i => removeTube(i));
  window.__3D_STATE__.tubeOwners = {};
  window.__3D_STATE__.selectedTube = null;
  updateHUD();
}

function cycleColor() {
  const state = window.__3D_STATE__;
  state.colorCycleIndex = (state.colorCycleIndex + 1) % colorPresets.length;
  state.frameColor = colorPresets[state.colorCycleIndex];
  
  const newColor = new THREE.Color(state.frameColor);
  Object.values(tubes).forEach(mesh => {
    mesh.material.color.copy(newColor);
    mesh.userData.originalColor = state.frameColor;
  });
  
  updateHUD();
}

function cycleScale() {
  const state = window.__3D_STATE__;
  state.scaleCycleIndex = (state.scaleCycleIndex + 1) % scalePresets.length;
  state.frameScale = scalePresets[state.scaleCycleIndex];
  
  frameGroup.scale.set(state.frameScale, state.frameScale, state.frameScale);
  updateHUD();
}

function selectTube(index) {
  const state = window.__3D_STATE__;
  
  // Deselect previous
  if (state.selectedTube !== null && tubes[state.selectedTube]) {
    const prevMesh = tubes[state.selectedTube];
    prevMesh.material.emissive.set(0x000000);
    prevMesh.material.emissiveIntensity = 0;
  }
  
  if (state.selectedTube === index) {
    // Deselect
    state.selectedTube = null;
  } else {
    // Select new
    state.selectedTube = index;
    if (tubes[index]) {
      tubes[index].material.emissive.set(0xFFFF00);
      tubes[index].material.emissiveIntensity = 0.3;
    }
  }
  
  updateHUD();
}

function updateHUD() {
  const state = window.__3D_STATE__;
  
  const playerDisplay = document.getElementById('playerDisplay');
  playerDisplay.textContent = `Active Player: ${state.activePlayer}`;
  playerDisplay.style.color = state.activePlayer === 'Player1' ? '#3366FF' : '#FF6633';
  playerDisplay.style.borderColor = state.activePlayer === 'Player1' ? '#3366FF' : '#FF6633';
  
  document.getElementById('tubeCount').textContent = `Tubes: ${state.tubesPlaced}/6`;
  document.getElementById('scaleDisplay').textContent = `Frame Scale: ${state.frameScale.toFixed(1)}x`;
  
  // Update cursor visibility
  player1Cursor.children.forEach(c => {
    if (c.userData && c.userData.isRing) {
      c.visible = state.activePlayer === 'Player1';
    }
  });
  player2Cursor.children.forEach(c => {
    if (c.userData && c.userData.isRing) {
      c.visible = state.activePlayer === 'Player2';
    }
  });
}

// Raycaster for clicking
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(tubeMeshes);
  
  if (intersects.length > 0) {
    const mesh = intersects[0].object;
    const tubeIndex = mesh.userData.tubeIndex;
    if (tubeIndex !== undefined) {
      selectTube(tubeIndex);
    }
  }
});

// Keyboard controls
document.addEventListener('keydown', (event) => {
  const state = window.__3D_STATE__;
  
  if (event.key === 'Tab') {
    event.preventDefault();
    state.activePlayer = state.activePlayer === 'Player1' ? 'Player2' : 'Player1';
    updateHUD();
    
    // Robot reaction
    if (robotModel) {
      robotModel.userData.reactTime = 0;
    }
  }
  
  if (event.key >= '1' && event.key <= '6') {
    const index = parseInt(event.key);
    addTube(index);
  }
  
  if (event.key === 'r' || event.key === 'R') {
    removeAllTubes();
  }
  
  if (event.key === 'c' || event.key === 'C') {
    cycleColor();
  }
  
  if (event.key === 's' || event.key === 'S') {
    cycleScale();
  }
  
  if (event.key === 'Delete' || event.key === 'Backspace') {
    if (state.selectedTube !== null) {
      removeTube(state.selectedTube);
    }
  }
});

// Export button
document.getElementById('exportBtn').addEventListener('click', () => {
  const state = window.__3D_STATE__;
  state.exported = true;
  
  const tubeNames = tubeDefinitions.map(d => d.name);
  const placedTubes = Object.keys(tubes).map(i => tubeNames[parseInt(i) - 1]);
  
  const exportInfo = `Frame Export Summary:\n` +
    `Tubes placed: ${state.tubesPlaced}/6\n` +
    `Tubes: ${placedTubes.join(', ') || 'None'}\n` +
    `Frame Color: ${state.frameColor}\n` +
    `Frame Scale: ${state.frameScale}x\n` +
    `Owners: ${JSON.stringify(state.tubeOwners)}`;
  
  console.log(exportInfo);
  alert(exportInfo);
});

// Window resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const delta = clock.getDelta();
  const time = clock.getElapsedTime();
  const state = window.__3D_STATE__;
  
  // Update controls
  controls.update();
  
  // Animate tube appearances
  Object.values(tubes).forEach(mesh => {
    if (mesh.userData.animating) {
      mesh.userData.animProgress += delta * 3;
      if (mesh.userData.animProgress >= 1) {
        mesh.userData.animProgress = 1;
        mesh.userData.animating = false;
      }
      mesh.scale.y = mesh.userData.animProgress;
    }
  });
  
  // Animate player cursors
  const bobSpeed = 2;
  const bobAmount = 0.1;
  
  // Player 1 cursor animation
  const p1BaseY = 1;
  player1Cursor.position.y = p1BaseY + Math.sin(time * bobSpeed) * bobAmount;
  if (player1Cursor.userData.targetPos) {
    player1Cursor.position.x += (player1Cursor.userData.targetPos.x - player1Cursor.position.x) * delta * 2;
    player1Cursor.position.z += (player1Cursor.userData.targetPos.z - player1Cursor.position.z) * delta * 2;
    if (player1Cursor.position.distanceTo(player1Cursor.userData.targetPos) < 0.1) {
      player1Cursor.userData.targetPos = null;
    }
  }
  player1Cursor.children.forEach(c => {
    if (c.userData && c.userData.isRing) {
      c.rotation.x = Math.sin(time * 1.5) * 0.5;
      c.rotation.y = time * 2;
    }
  });
  
  // Player 2 cursor animation
  const p2BaseY = 1;
  player2Cursor.position.y = p2BaseY + Math.sin(time * bobSpeed + Math.PI) * bobAmount;
  if (player2Cursor.userData.targetPos) {
    player2Cursor.position.x += (player2Cursor.userData.targetPos.x - player2Cursor.position.x) * delta * 2;
    player2Cursor.position.z += (player2Cursor.userData.targetPos.z - player2Cursor.position.z) * delta * 2;
    if (player2Cursor.position.distanceTo(player2Cursor.userData.targetPos) < 0.1) {
      player2Cursor.userData.targetPos = null;
    }
  }
  player2Cursor.children.forEach(c => {
    if (c.userData && c.userData.isRing) {
      c.rotation.x = Math.sin(time * 1.5 + Math.PI) * 0.5;
      c.rotation.y = -time * 2;
    }
  });
  
  // Update state positions
  state.player1Position = { 
    x: parseFloat(player1Cursor.position.x.toFixed(4)) || 0, 
    y: parseFloat(player1Cursor.position.y.toFixed(4)) || 0, 
    z: parseFloat(player1Cursor.position.z.toFixed(4)) || 0 
  };
  state.player2Position = { 
    x: parseFloat(player2Cursor.position.x.toFixed(4)) || 0, 
    y: parseFloat(player2Cursor.position.y.toFixed(4)) || 0, 
    z: parseFloat(player2Cursor.position.z.toFixed(4)) || 0 
  };
  
  // Robot animation
  if (robotModel) {
    // Gentle idle rotation toward frame
    const targetRotY = Math.sin(time * 0.5) * 0.3 - 0.5;
    robotModel.rotation.y += (targetRotY - robotModel.rotation.y) * delta * 2;
    
    // React animation
    if (robotModel.userData.reactTime !== undefined) {
      robotModel.userData.reactTime += delta;
      if (robotModel.userData.reactTime < 0.5) {
        robotModel.position.y = Math.sin(robotModel.userData.reactTime * Math.PI * 4) * 0.1;
      } else {
        robotModel.position.y = 0;
        delete robotModel.userData.reactTime;
      }
    }
    
    // Update mixer if exists
    if (robotModel.userData.mixer) {
      robotModel.userData.mixer.update(delta);
    }
  }
  
  // Pulse selected tube
  if (state.selectedTube !== null && tubes[state.selectedTube]) {
    const mesh = tubes[state.selectedTube];
    mesh.material.emissiveIntensity = 0.2 + Math.sin(time * 4) * 0.15;
  }
  
  renderer.render(scene, camera);
}

// Initialize HUD
updateHUD();

// Start animation
animate();
</script>
</body>
</html>
