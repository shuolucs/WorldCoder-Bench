<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Multiplayer Bike Frame Builder</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .hud {
            position: absolute;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 5px;
            pointer-events: none;
            font-size: 16px;
        }
        #playerDisplay {
            top: 20px;
            left: 20px;
            border-left: 5px solid #3366FF;
        }
        #tubeCount {
            top: 20px;
            right: 20px;
        }
        #scaleDisplay {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
        #exportBtn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            pointer-events: auto;
        }
        #exportBtn:hover {
            background-color: #45a049;
        }
        #instructions {
            position: absolute;
            top: 70px;
            left: 20px;
            font-size: 12px;
            color: #ccc;
            pointer-events: none;
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="playerDisplay" class="hud">Active Player: Player1</div>
    <div id="tubeCount" class="hud">Tubes: 0/6</div>
    <div id="scaleDisplay" class="hud">Frame Scale: 1.0x</div>
    <button id="exportBtn">Export Frame</button>

    <div id="instructions">
        <b>Controls:</b><br>
        Tab: Switch Player<br>
        1-6: Add Tubes<br>
        Click: Select Tube<br>
        Delete: Remove Selected<br>
        R: Reset Frame<br>
        C: Cycle Colors<br>
        S: Cycle Scale
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            tubesPlaced: 0,
            activePlayer: 'Player1',
            selectedTube: null,
            frameScale: 1.0,
            frameColor: '#CC0000',
            player1Position: { x: -2, y: 1, z: 2 },
            player2Position: { x: 2, y: 1, z: -2 },
            robotLoaded: false,
            exported: false,
            tubeOwners: {},
            colorCycleIndex: 0,
            scaleCycleIndex: 0
        };

        const PLAYER_COLORS = {
            'Player1': '#3366FF',
            'Player2': '#FF6633'
        };

        const COLOR_PRESETS = ['#CC0000', '#0066CC', '#00CC66', '#222222'];
        const SCALE_PRESETS = [1.0, 1.2, 0.8];

        const TUBE_DEFS = {
            1: { start: new THREE.Vector3(0, 0.3, 0), end: new THREE.Vector3(0, 1.5, 0), radius: 0.04 },
            2: { start: new THREE.Vector3(0, 1.5, 0), end: new THREE.Vector3(-1.2, 1.4, 0), radius: 0.035 },
            3: { start: new THREE.Vector3(0, 0.3, 0), end: new THREE.Vector3(-1.2, 0.8, 0), radius: 0.04 },
            4: { start: new THREE.Vector3(-1.2, 0.8, 0), end: new THREE.Vector3(-1.2, 1.4, 0), radius: 0.045 },
            5: { start: new THREE.Vector3(0, 0.3, 0), end: new THREE.Vector3(1.0, 0.3, 0), radius: 0.03 },
            6: { start: new THREE.Vector3(0, 1.5, 0), end: new THREE.Vector3(1.0, 0.3, 0), radius: 0.03 }
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Robot Loader
        const gltfLoader = new GLTFLoader();
        gltfLoader.load('robot.glb', (gltf) => {
            const robot = gltf.scene;
            robot.scale.set(0.5, 0.5, 0.5);
            robot.position.set(4, 0, 0);
            
            robot.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            scene.add(robot);
            window.__3D_STATE__.robotLoaded = true;
        }, undefined, (error) => {
            console.warn('Robot model not found or failed to load. Proceeding without it.', error);
        });

        // Player Cursors
        const cursorGeo = new THREE.SphereGeometry(0.1, 32, 32);
        
        const p1Mat = new THREE.MeshStandardMaterial({ color: PLAYER_COLORS['Player1'], emissive: PLAYER_COLORS['Player1'], emissiveIntensity: 0.5 });
        const p1Cursor = new THREE.Mesh(cursorGeo, p1Mat);
        p1Cursor.position.copy(window.__3D_STATE__.player1Position);
        scene.add(p1Cursor);

        const p2Mat = new THREE.MeshStandardMaterial({ color: PLAYER_COLORS['Player2'], emissive: PLAYER_COLORS['Player2'], emissiveIntensity: 0.2 });
        const p2Cursor = new THREE.Mesh(cursorGeo, p2Mat);
        p2Cursor.position.copy(window.__3D_STATE__.player2Position);
        scene.add(p2Cursor);

        // Frame Group
        const frameGroup = new THREE.Group();
        scene.add(frameGroup);

        // --- Logic Functions ---

        function updateUI() {
            const state = window.__3D_STATE__;
            
            const playerDiv = document.getElementById('playerDisplay');
            playerDiv.innerText = `Active Player: ${state.activePlayer}`;
            playerDiv.style.borderLeftColor = PLAYER_COLORS[state.activePlayer];

            document.getElementById('tubeCount').innerText = `Tubes: ${state.tubesPlaced}/6`;
            document.getElementById('scaleDisplay').innerText = `Frame Scale: ${state.frameScale.toFixed(1)}x`;

            // Update cursor visuals based on active player
            if (state.activePlayer === 'Player1') {
                p1Mat.emissiveIntensity = 0.8;
                p2Mat.emissiveIntensity = 0.2;
            } else {
                p1Mat.emissiveIntensity = 0.2;
                p2Mat.emissiveIntensity = 0.8;
            }
        }

        function createCylinder(start, end, radius, colorHex) {
            const direction = new THREE.Vector3().subVectors(end, start);
            const length = direction.length();
            
            const geometry = new THREE.CylinderGeometry(radius, radius, length, 16);
            const material = new THREE.MeshStandardMaterial({ color: colorHex });
            
            const cylinder = new THREE.Mesh(geometry, material);
            
            const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
            cylinder.position.copy(midpoint);
            
            const axis = new THREE.Vector3(0, 1, 0);
            cylinder.quaternion.setFromUnitVectors(axis, direction.clone().normalize());
            
            cylinder.castShadow = true;
            cylinder.receiveShadow = true;
            
            return cylinder;
        }

        function addTube(index) {
            if (frameGroup.children.some(child => child.userData.tubeIndex === index)) return;

            const def = TUBE_DEFS[index];
            const playerColor = PLAYER_COLORS[window.__3D_STATE__.activePlayer];
            
            const tube = createCylinder(def.start, def.end, def.radius, playerColor);
            tube.userData.tubeIndex = index;
            
            frameGroup.add(tube);
            
            window.__3D_STATE__.tubeOwners[index] = window.__3D_STATE__.activePlayer;
            window.__3D_STATE__.tubesPlaced = frameGroup.children.length;
            updateUI();
        }

        function removeTube(index) {
            const tube = frameGroup.children.find(child => child.userData.tubeIndex === index);
            if (tube) {
                frameGroup.remove(tube);
                tube.geometry.dispose();
                tube.material.dispose();
                
                delete window.__3D_STATE__.tubeOwners[index];
                if (window.__3D_STATE__.selectedTube === index) {
                    window.__3D_STATE__.selectedTube = null;
                }
                window.__3D_STATE__.tubesPlaced = frameGroup.children.length;
                updateUI();
            }
        }

        function resetFrame() {
            while(frameGroup.children.length > 0){ 
                const tube = frameGroup.children[0];
                frameGroup.remove(tube); 
                tube.geometry.dispose();
                tube.material.dispose();
            }
            window.__3D_STATE__.tubeOwners = {};
            window.__3D_STATE__.tubesPlaced = 0;
            window.__3D_STATE__.selectedTube = null;
            updateUI();
        }

        function cycleColor() {
            const state = window.__3D_STATE__;
            state.colorCycleIndex = (state.colorCycleIndex + 1) % COLOR_PRESETS.length;
            state.frameColor = COLOR_PRESETS[state.colorCycleIndex];
            
            frameGroup.children.forEach(tube => {
                tube.material.color.set(state.frameColor);
            });
        }

        function cycleScale() {
            const state = window.__3D_STATE__;
            state.scaleCycleIndex = (state.scaleCycleIndex + 1) % SCALE_PRESETS.length;
            state.frameScale = SCALE_PRESETS[state.scaleCycleIndex];
            
            frameGroup.scale.setScalar(state.frameScale);
            updateUI();
        }

        function selectTube(mesh) {
            const state = window.__3D_STATE__;
            
            // Deselect current
            if (state.selectedTube !== null) {
                const oldMesh = frameGroup.children.find(c => c.userData.tubeIndex === state.selectedTube);
                if (oldMesh) {
                    oldMesh.material.emissive.setHex(0x000000);
                    oldMesh.material.emissiveIntensity = 0;
                }
            }

            if (mesh) {
                const index = mesh.userData.tubeIndex;
                if (state.selectedTube === index) {
                    // Toggle off if clicking already selected
                    state.selectedTube = null;
                } else {
                    // Select new
                    mesh.material.emissive.setHex(0xFFFF00);
                    mesh.material.emissiveIntensity = 0.3;
                    state.selectedTube = index;
                }
            } else {
                state.selectedTube = null;
            }
        }

        // --- Event Listeners ---

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                window.__3D_STATE__.activePlayer = window.__3D_STATE__.activePlayer === 'Player1' ? 'Player2' : 'Player1';
                updateUI();
            }
            
            const keyNum = parseInt(e.key);
            if (keyNum >= 1 && keyNum <= 6) {
                addTube(keyNum);
            }

            const keyLower = e.key.toLowerCase();
            if (keyLower === 'r') resetFrame();
            if (keyLower === 'c') cycleColor();
            if (keyLower === 's') cycleScale();
            
            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (window.__3D_STATE__.selectedTube !== null) {
                    removeTube(window.__3D_STATE__.selectedTube);
                }
            }
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('mousedown', (e) => {
            // Ignore clicks on UI elements
            if (e.target.tagName === 'BUTTON') return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(frameGroup.children);

            if (intersects.length > 0) {
                selectTube(intersects[0].object);
            } else {
                selectTube(null);
            }
        });

        document.getElementById('exportBtn').addEventListener('click', () => {
            window.__3D_STATE__.exported = true;
            const count = window.__3D_STATE__.tubesPlaced;
            console.log(`Exported frame with ${count} tubes.`);
            alert(`Frame exported successfully! Total tubes: ${count}`);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Init UI
        updateUI();
        animate();

    </script>
</body>
</html>
