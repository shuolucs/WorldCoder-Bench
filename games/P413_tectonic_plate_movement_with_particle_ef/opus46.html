<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tectonic Plate Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a2a; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 15px;
    background: rgba(10, 10, 42, 0.85);
    border-bottom: 1px solid #333366;
    z-index: 10;
}

.btn {
    background: #1a1a3a;
    color: #ffffff;
    border: 1px solid #444477;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    user-select: none;
}
.btn:hover {
    background: #2a2a5a;
    border-color: #6666aa;
}
.btn.active {
    background: #3a3a7a;
    border-color: #8888cc;
    box-shadow: 0 0 8px rgba(100, 100, 200, 0.4);
}

.separator {
    width: 1px;
    height: 30px;
    background: #333366;
    margin: 0 4px;
}

.slider-container {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #aaaacc;
    font-size: 12px;
}

.slider-container input[type="range"] {
    width: 80px;
    accent-color: #6666aa;
}

#info-display {
    color: #ccccee;
    font-size: 12px;
    display: flex;
    gap: 15px;
    align-items: center;
}

#info-display span {
    white-space: nowrap;
}

.info-label {
    color: #8888aa;
}

.info-value {
    color: #ffffff;
    font-weight: bold;
}
</style>
</head>
<body>

<div id="hud">
    <button class="btn active" id="btn-convergent" onclick="setMode('convergent')">Convergent</button>
    <button class="btn" id="btn-divergent" onclick="setMode('divergent')">Divergent</button>
    <button class="btn" id="btn-transform" onclick="setMode('transform')">Transform</button>
    <div class="separator"></div>
    <button class="btn" id="btn-play">▶ Play</button>
    <button class="btn" id="btn-reset" onclick="resetSimulation()">↺ Reset</button>
    <div class="separator"></div>
    <div class="slider-container">
        <label for="speed-slider">Speed:</label>
        <input type="range" id="speed-slider" min="0.5" max="3.0" step="0.1" value="1.0">
        <span id="speed-value">1.0x</span>
    </div>
    <div class="separator"></div>
    <div id="info-display">
        <span><span class="info-label">Mode: </span><span class="info-value" id="disp-mode">Convergent</span></span>
        <span><span class="info-label">Time: </span><span class="info-value" id="disp-time">0.0s</span></span>
        <span><span class="info-label">Separation: </span><span class="info-value" id="disp-sep">2.0</span></span>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 30, 50);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 30, 10);
dirLight.castShadow = true;
scene.add(dirLight);

// Grid
const gridHelper = new THREE.GridHelper(100, 20, 0x222244, 0x222244);
gridHelper.position.y = 0;
scene.add(gridHelper);

// ============ PLATES ============
// Left plate
const leftPlateGeo = new THREE.BoxGeometry(20, 2, 30);
const leftPlateMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 });
const leftPlate = new THREE.Mesh(leftPlateGeo, leftPlateMat);
leftPlate.position.set(-11, 1, 0);
scene.add(leftPlate);

// Left crust
const leftCrustGeo = new THREE.BoxGeometry(20, 0.5, 30);
const leftCrustMat = new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.9 });
const leftCrust = new THREE.Mesh(leftCrustGeo, leftCrustMat);
leftCrust.position.set(-11, 2.25, 0);
scene.add(leftCrust);

// Right plate
const rightPlateGeo = new THREE.BoxGeometry(20, 2, 30);
const rightPlateMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9 });
const rightPlate = new THREE.Mesh(rightPlateGeo, rightPlateMat);
rightPlate.position.set(11, 1, 0);
scene.add(rightPlate);

// Right crust
const rightCrustGeo = new THREE.BoxGeometry(20, 0.5, 30);
const rightCrustMat = new THREE.MeshStandardMaterial({ color: 0xc2a645, roughness: 0.9 });
const rightCrust = new THREE.Mesh(rightCrustGeo, rightCrustMat);
rightCrust.position.set(11, 2.25, 0);
scene.add(rightCrust);

// ============ MOUNTAIN ============
let mountain = null;
let mountainHeight = 0;

function createMountain(height) {
    if (mountain) scene.remove(mountain);
    if (height <= 0.01) { mountain = null; return; }
    const geo = new THREE.ConeGeometry(3, height, 8);
    const mat = new THREE.MeshStandardMaterial({
        color: 0x6b5b3a,
        roughness: 0.9,
        flatShading: true
    });
    mountain = new THREE.Mesh(geo, mat);
    mountain.position.set(
        (leftPlate.position.x + 10 + rightPlate.position.x - 10) / 2,
        2.5 + height / 2,
        0
    );
    scene.add(mountain);
}

// ============ MAGMA STRIP ============
let magmaStrip = null;
let magmaWidth = 0;

function updateMagmaStrip(width) {
    if (magmaStrip) scene.remove(magmaStrip);
    if (width <= 0.01) { magmaStrip = null; magmaWidth = 0; return; }
    const geo = new THREE.BoxGeometry(width, 0.3, 30);
    const mat = new THREE.MeshStandardMaterial({
        color: 0xff4400,
        emissive: 0xff2200,
        emissiveIntensity: 0.8,
        roughness: 0.3
    });
    magmaStrip = new THREE.Mesh(geo, mat);
    magmaStrip.position.set(0, 1.0, 0);
    scene.add(magmaStrip);
    magmaWidth = width;
}

// ============ PARTICLE SYSTEM ============
const PARTICLE_COUNT = 300;
const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
const particleColors = new Float32Array(PARTICLE_COUNT * 3);
const particleSizes = new Float32Array(PARTICLE_COUNT);
const particleAlphas = new Float32Array(PARTICLE_COUNT);

const particleVelocities = [];
const particleLifetimes = [];
const particleMaxLifetimes = [];
const particleActive = [];

for (let i = 0; i < PARTICLE_COUNT; i++) {
    particlePositions[i * 3] = 0;
    particlePositions[i * 3 + 1] = -100;
    particlePositions[i * 3 + 2] = 0;
    particleColors[i * 3] = 1;
    particleColors[i * 3 + 1] = 0.5;
    particleColors[i * 3 + 2] = 0;
    particleSizes[i] = 2;
    particleAlphas[i] = 0;
    particleVelocities.push(new THREE.Vector3(0, 0, 0));
    particleLifetimes.push(0);
    particleMaxLifetimes.push(3);
    particleActive.push(false);
}

const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

const particleVertexShader = `
    attribute float size;
    attribute vec3 color;
    varying vec3 vColor;
    void main() {
        vColor = color;
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (200.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
    }
`;

const particleFragmentShader = `
    varying vec3 vColor;
    void main() {
        float dist = length(gl_PointCoord - vec2(0.5));
        if (dist > 0.5) discard;
        float alpha = 1.0 - dist * 2.0;
        gl_FragColor = vec4(vColor, alpha * 0.8);
    }
`;

const particleMat = new THREE.ShaderMaterial({
    vertexShader: particleVertexShader,
    fragmentShader: particleFragmentShader,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
});

const particleSystem = new THREE.Points(particleGeo, particleMat);
scene.add(particleSystem);

function spawnParticle(index, mode) {
    const i3 = index * 3;
    const gap = rightPlate.position.x - 10 - (leftPlate.position.x + 10);
    const centerX = (leftPlate.position.x + 10 + rightPlate.position.x - 10) / 2;

    particlePositions[i3] = centerX + (Math.random() - 0.5) * Math.max(1, gap);
    particlePositions[i3 + 1] = 2.5 + Math.random() * 0.5;
    particlePositions[i3 + 2] = (Math.random() - 0.5) * 28;

    if (mode === 'convergent') {
        particleVelocities[index].set(
            (Math.random() - 0.5) * 0.1,
            0.1 + Math.random() * 0.15,
            (Math.random() - 0.5) * 0.1
        );
        const r = 0.9 + Math.random() * 0.1;
        const g = 0.2 + Math.random() * 0.3;
        const b = 0;
        particleColors[i3] = r;
        particleColors[i3 + 1] = g;
        particleColors[i3 + 2] = b;
    } else if (mode === 'divergent') {
        particleVelocities[index].set(
            (Math.random() - 0.5) * 0.05,
            0.08 + Math.random() * 0.12,
            (Math.random() - 0.5) * 0.05
        );
        const r = 1.0;
        const g = 0.5 + Math.random() * 0.5;
        const b = Math.random() * 0.2;
        particleColors[i3] = r;
        particleColors[i3 + 1] = g;
        particleColors[i3 + 2] = b;
    } else {
        particleVelocities[index].set(
            (Math.random() - 0.5) * 0.3,
            0.05 + Math.random() * 0.1,
            (Math.random() - 0.5) * 0.3
        );
        const brightness = 0.8 + Math.random() * 0.2;
        particleColors[i3] = brightness;
        particleColors[i3 + 1] = brightness;
        particleColors[i3 + 2] = 0.5 + Math.random() * 0.5;
    }

    particleSizes[index] = 1.5 + Math.random() * 2.5;
    particleMaxLifetimes[index] = 2 + Math.random() * 2;
    particleLifetimes[index] = 0;
    particleActive[index] = true;
}

function updateParticles(dt) {
    let activeCount = 0;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        if (!particleActive[i]) continue;
        particleLifetimes[i] += dt;
        if (particleLifetimes[i] >= particleMaxLifetimes[i]) {
            particleActive[i] = false;
            particlePositions[i * 3 + 1] = -100;
            continue;
        }
        activeCount++;
        const t = particleLifetimes[i] / particleMaxLifetimes[i];
        particlePositions[i * 3] += particleVelocities[i].x;
        particlePositions[i * 3 + 1] += particleVelocities[i].y;
        particlePositions[i * 3 + 2] += particleVelocities[i].z;
        particleVelocities[i].y *= 0.99;
        // Fade out by reducing size
        particleSizes[i] *= (1 - t * 0.01);
    }
    particleGeo.attributes.position.needsUpdate = true;
    particleGeo.attributes.color.needsUpdate = true;
    particleGeo.attributes.size.needsUpdate = true;
    return activeCount;
}

// ============ STATE ============
let mode = 'convergent';
let isPlaying = false;
let speed = 1.0;
let elapsedTime = 0;
let collisionOccurred = false;
let totalDisplacementLeft = 0;
let totalDisplacementRight = 0;
let transformDirection = 1;
let particleSpawnTimer = 0;
let transformBurstTimer = 0;

const initialLeftX = -11;
const initialRightX = 11;
const initialY = 1;

window.__3D_STATE__ = {
    mode: 'convergent',
    isPlaying: false,
    speed: 1.0,
    elapsedTime: 0,
    leftPlateX: -11,
    rightPlateX: 11,
    plateSeparation: 2,
    leftPlateZ: 0,
    rightPlateZ: 0,
    rightPlateY: 1,
    mountainHeight: 0,
    activeParticles: 0,
    magmaWidth: 0,
    collisionOccurred: false,
    totalDisplacementLeft: 0,
    totalDisplacementRight: 0
};

// ============ UI ============
const btnPlay = document.getElementById('btn-play');
const speedSlider = document.getElementById('speed-slider');
const speedValue = document.getElementById('speed-value');

btnPlay.addEventListener('click', togglePlay);
speedSlider.addEventListener('input', () => {
    speed = parseFloat(speedSlider.value);
    speedValue.textContent = speed.toFixed(1) + 'x';
});

function togglePlay() {
    isPlaying = !isPlaying;
    btnPlay.textContent = isPlaying ? '⏸ Pause' : '▶ Play';
    btnPlay.classList.toggle('active', isPlaying);
}

function setMode(newMode) {
    if (mode === newMode) return;
    mode = newMode;
    document.getElementById('btn-convergent').classList.toggle('active', mode === 'convergent');
    document.getElementById('btn-divergent').classList.toggle('active', mode === 'divergent');
    document.getElementById('btn-transform').classList.toggle('active', mode === 'transform');
    document.getElementById('disp-mode').textContent = mode.charAt(0).toUpperCase() + mode.slice(1);
    resetSimulation();
}

function resetSimulation() {
    isPlaying = false;
    btnPlay.textContent = '▶ Play';
    btnPlay.classList.remove('active');
    elapsedTime = 0;
    collisionOccurred = false;
    totalDisplacementLeft = 0;
    totalDisplacementRight = 0;
    transformDirection = 1;
    mountainHeight = 0;
    magmaWidth = 0;

    leftPlate.position.set(initialLeftX, initialY, 0);
    leftCrust.position.set(initialLeftX, 2.25, 0);
    rightPlate.position.set(initialRightX, initialY, 0);
    rightCrust.position.set(initialRightX, 2.25, 0);

    // Reset crust geometry
    leftCrust.geometry.dispose();
    leftCrust.geometry = new THREE.BoxGeometry(20, 0.5, 30);

    if (mountain) { scene.remove(mountain); mountain = null; }
    if (magmaStrip) { scene.remove(magmaStrip); magmaStrip = null; }

    // Reset particles
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        particleActive[i] = false;
        particlePositions[i * 3 + 1] = -100;
    }
    particleGeo.attributes.position.needsUpdate = true;
}

// Keyboard
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.key === '1') setMode('convergent');
    if (e.key === '2') setMode('divergent');
    if (e.key === '3') setMode('transform');
    if (e.key === 'r' || e.key === 'R') resetSimulation();
});

// ============ ANIMATION ============
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    controls.update();

    if (isPlaying) {
        elapsedTime += dt;
        const moveSpeed = 0.05 * speed;

        if (mode === 'convergent') {
            const leftEdge = leftPlate.position.x + 10;
            const rightEdge = rightPlate.position.x - 10;
            const gap = rightEdge - leftEdge;

            if (gap > 0.5) {
                const prevLeftX = leftPlate.position.x;
                const prevRightX = rightPlate.position.x;
                leftPlate.position.x += moveSpeed;
                leftCrust.position.x += moveSpeed;
                rightPlate.position.x -= moveSpeed;
                rightCrust.position.x -= moveSpeed;
                totalDisplacementLeft += Math.abs(leftPlate.position.x - prevLeftX);
                totalDisplacementRight += Math.abs(rightPlate.position.x - prevRightX);
            } else {
                collisionOccurred = true;
                // Subduction
                if (rightPlate.position.y > -5) {
                    const prevRightY = rightPlate.position.y;
                    rightPlate.position.y -= 0.02 * speed;
                    rightCrust.position.y -= 0.02 * speed;
                    totalDisplacementRight += Math.abs(rightPlate.position.y - prevRightY);
                }

                // Mountain growth
                if (mountainHeight < 8) {
                    mountainHeight += 0.03 * speed;
                    mountainHeight = Math.min(mountainHeight, 8);
                    createMountain(mountainHeight);
                }

                // Crust deformation - raise left crust edge
                // We'll modify the left crust geometry vertices on the right side
                const positions = leftCrust.geometry.attributes.position;
                for (let i = 0; i < positions.count; i++) {
                    const x = positions.getX(i);
                    if (x > 8) {
                        const currentY = positions.getY(i);
                        const targetY = Math.min(currentY + 0.01 * speed, 3);
                        positions.setY(i, targetY);
                    }
                }
                positions.needsUpdate = true;
            }

            // Spawn particles at boundary
            particleSpawnTimer += dt;
            if (particleSpawnTimer > 0.02 && (gap <= 2 || collisionOccurred)) {
                particleSpawnTimer = 0;
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    if (!particleActive[i]) {
                        spawnParticle(i, 'convergent');
                        break;
                    }
                }
            }

        } else if (mode === 'divergent') {
            const leftEdge = leftPlate.position.x + 10;
            const rightEdge = rightPlate.position.x - 10;
            const gap = rightEdge - leftEdge;

            if (gap < 30) {
                const prevLeftX = leftPlate.position.x;
                const prevRightX = rightPlate.position.x;
                leftPlate.position.x -= moveSpeed;
                leftCrust.position.x -= moveSpeed;
                rightPlate.position.x += moveSpeed;
                rightCrust.position.x += moveSpeed;
                totalDisplacementLeft += Math.abs(leftPlate.position.x - prevLeftX);
                totalDisplacementRight += Math.abs(rightPlate.position.x - prevRightX);
            }

            // Update magma strip
            const currentGap = (rightPlate.position.x - 10) - (leftPlate.position.x + 10);
            if (currentGap > 0.1) {
                updateMagmaStrip(currentGap);
            }

            // Spawn particles
            particleSpawnTimer += dt;
            if (particleSpawnTimer > 0.015 && currentGap > 0.1) {
                particleSpawnTimer = 0;
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    if (!particleActive[i]) {
                        spawnParticle(i, 'divergent');
                        break;
                    }
                }
            }

        } else if (mode === 'transform') {
            const maxZ = 15;
            const prevLeftZ = leftPlate.position.z;
            const prevRightZ = rightPlate.position.z;

            leftPlate.position.z += moveSpeed * transformDirection;
            leftCrust.position.z += moveSpeed * transformDirection;
            rightPlate.position.z -= moveSpeed * transformDirection;
            rightCrust.position.z -= moveSpeed * transformDirection;

            totalDisplacementLeft += Math.abs(leftPlate.position.z - prevLeftZ);
            totalDisplacementRight += Math.abs(rightPlate.position.z - prevRightZ);

            if (Math.abs(leftPlate.position.z) >= maxZ) {
                transformDirection *= -1;
            }

            // Periodic earthquake bursts
            transformBurstTimer += dt;
            if (transformBurstTimer > 0.3) {
                transformBurstTimer = 0;
                const burstCount = 5 + Math.floor(Math.random() * 10);
                let spawned = 0;
                for (let i = 0; i < PARTICLE_COUNT && spawned < burstCount; i++) {
                    if (!particleActive[i]) {
                        spawnParticle(i, 'transform');
                        spawned++;
                    }
                }
            }
        }
    }

    // Update particles
    const activeParticles = updateParticles(dt);

    // Magma strip pulsing
    if (magmaStrip) {
        const pulse = 0.6 + 0.4 * Math.sin(elapsedTime * 3);
        magmaStrip.material.emissiveIntensity = pulse;
    }

    // Calculate separation
    const leftEdge = leftPlate.position.x + 10;
    const rightEdge = rightPlate.position.x - 10;
    const separation = rightEdge - leftEdge;

    // Update display
    document.getElementById('disp-time').textContent = elapsedTime.toFixed(1) + 's';
    document.getElementById('disp-sep').textContent = separation.toFixed(1);

    // Update state
    window.__3D_STATE__ = {
        mode: mode,
        isPlaying: isPlaying,
        speed: speed,
        elapsedTime: parseFloat(elapsedTime.toFixed(1)),
        leftPlateX: leftPlate.position.x,
        rightPlateX: rightPlate.position.x,
        plateSeparation: separation,
        leftPlateZ: leftPlate.position.z,
        rightPlateZ: rightPlate.position.z,
        rightPlateY: rightPlate.position.y,
        mountainHeight: mountainHeight,
        activeParticles: activeParticles,
        magmaWidth: magmaWidth,
        collisionOccurred: collisionOccurred,
        totalDisplacementLeft: totalDisplacementLeft,
        totalDisplacementRight: totalDisplacementRight
    };

    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
