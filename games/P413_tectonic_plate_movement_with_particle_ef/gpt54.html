<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Tectonic Plate Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a2a;
      font-family: Arial, sans-serif;
      color: white;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 10px;
      padding: 10px 12px;
      background: rgba(10, 10, 42, 0.75);
      border: 1px solid #2a2a5a;
      border-radius: 12px;
      backdrop-filter: blur(6px);
    }

    button {
      background: #1a1a3a;
      color: white;
      border: 1px solid #3b3b6b;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: #2d2d66;
    }

    button.active {
      background: #3d3d88;
      border-color: #7f7fff;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #141430;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #2d2d55;
    }

    input[type="range"] {
      width: 140px;
    }

    #info {
      margin-left: auto;
      font-size: 14px;
      color: #d8d8ff;
      background: rgba(20, 20, 48, 0.9);
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #2d2d55;
      min-width: 340px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <button id="mode-convergent" class="active">Convergent</button>
    <button id="mode-divergent">Divergent</button>
    <button id="mode-transform">Transform</button>
    <button id="playPause">Pause</button>
    <button id="resetBtn">Reset</button>

    <label>
      Speed
      <input id="speedSlider" type="range" min="0.5" max="3.0" step="0.1" value="1.0" />
      <span id="speedValue">1.0</span>
    </label>

    <div id="info">Mode: convergent | Time: 0.0s | Separation: 2.0</div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#0a0a2a");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 30, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 30, 10);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(100, 20, "#222244", "#222244");
    grid.position.y = 0;
    grid.material.opacity = 0.35;
    grid.material.transparent = true;
    scene.add(grid);

    const PLATE_W = 20;
    const PLATE_H = 2;
    const PLATE_D = 30;
    const CRUST_H = 0.5;
    const LEFT_START = new THREE.Vector3(-11, 1, 0);
    const RIGHT_START = new THREE.Vector3(11, 1, 0);
    const BASE_SPEED = 0.05;

    const plateGeo = new THREE.BoxGeometry(PLATE_W, PLATE_H, PLATE_D);
    const leftMat = new THREE.MeshStandardMaterial({
      color: "#8B4513",
      roughness: 0.9,
      metalness: 0.05
    });
    const rightMat = new THREE.MeshStandardMaterial({
      color: "#555555",
      roughness: 0.9,
      metalness: 0.05
    });

    const leftPlate = new THREE.Mesh(plateGeo, leftMat);
    leftPlate.position.copy(LEFT_START);
    scene.add(leftPlate);

    const rightPlate = new THREE.Mesh(plateGeo, rightMat);
    rightPlate.position.copy(RIGHT_START);
    scene.add(rightPlate);

    const leftCrustGeo = new THREE.BoxGeometry(PLATE_W, CRUST_H, PLATE_D, 10, 1, 1);
    const rightCrustGeo = new THREE.BoxGeometry(PLATE_W, CRUST_H, PLATE_D, 1, 1, 1);

    const leftCrustMat = new THREE.MeshStandardMaterial({
      color: "#2d5a1e",
      roughness: 0.9
    });
    const rightCrustMat = new THREE.MeshStandardMaterial({
      color: "#c2a645",
      roughness: 0.9
    });

    const leftCrust = new THREE.Mesh(leftCrustGeo, leftCrustMat);
    leftCrust.position.set(0, PLATE_H / 2 + CRUST_H / 2, 0);
    leftPlate.add(leftCrust);

    const rightCrust = new THREE.Mesh(rightCrustGeo, rightCrustMat);
    rightCrust.position.set(0, PLATE_H / 2 + CRUST_H / 2, 0);
    rightPlate.add(rightCrust);

    const originalLeftCrustPos = leftCrustGeo.attributes.position.array.slice();

    const magmaGeo = new THREE.PlaneGeometry(1, PLATE_D);
    const magmaMat = new THREE.MeshStandardMaterial({
      color: "#ff5500",
      emissive: "#ff3300",
      emissiveIntensity: 1.5,
      transparent: true,
      opacity: 0.85,
      side: THREE.DoubleSide
    });
    const magmaStrip = new THREE.Mesh(magmaGeo, magmaMat);
    magmaStrip.rotation.x = -Math.PI / 2;
    magmaStrip.position.set(0, 1.05, 0);
    magmaStrip.visible = false;
    scene.add(magmaStrip);

    const mountainGeo = new THREE.ConeGeometry(4, 0.01, 20);
    const mountainMat = new THREE.MeshStandardMaterial({
      color: "#7a5a3a",
      roughness: 1.0,
      metalness: 0.0
    });
    const mountain = new THREE.Mesh(mountainGeo, mountainMat);
    mountain.position.set(0, 1.5, 0);
    mountain.visible = false;
    scene.add(mountain);

    const mountainPeakMat = new THREE.MeshStandardMaterial({
      color: "#888888",
      roughness: 0.95
    });
    const peakGeo = new THREE.ConeGeometry(2.5, 0.01, 20);
    const mountainPeak = new THREE.Mesh(peakGeo, mountainPeakMat);
    mountainPeak.position.y = 0.2;
    mountain.add(mountainPeak);

    const PARTICLE_COUNT = 300;
    const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
    const particleColors = new Float32Array(PARTICLE_COUNT * 3);
    const particleSizes = new Float32Array(PARTICLE_COUNT);
    const velocities = [];
    const lifetimes = [];
    const maxLifetimes = [];
    const active = [];

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particlePositions[i * 3 + 0] = 0;
      particlePositions[i * 3 + 1] = -1000;
      particlePositions[i * 3 + 2] = 0;
      particleColors[i * 3 + 0] = 1;
      particleColors[i * 3 + 1] = 0.5;
      particleColors[i * 3 + 2] = 0;
      particleSizes[i] = 1.0;
      velocities.push(new THREE.Vector3());
      lifetimes.push(0);
      maxLifetimes.push(1);
      active.push(false);
    }

    const particleGeo = new THREE.BufferGeometry();
    particleGeo.setAttribute("position", new THREE.BufferAttribute(particlePositions, 3));
    particleGeo.setAttribute("color", new THREE.BufferAttribute(particleColors, 3));

    const particleMat = new THREE.PointsMaterial({
      size: 0.9,
      vertexColors: true,
      transparent: true,
      opacity: 0.95,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });

    const particleSystem = new THREE.Points(particleGeo, particleMat);
    scene.add(particleSystem);

    let mode = "convergent";
    let isPlaying = true;
    let speedMultiplier = 1.0;
    let elapsedTime = 0;
    let collisionOccurred = false;
    let transformDirection = 1;
    let mountainHeight = 0;
    let magmaWidth = 0;
    let totalDisplacementLeft = 0;
    let totalDisplacementRight = 0;
    let lastLeftPos = leftPlate.position.clone();
    let lastRightPos = rightPlate.position.clone();
    let earthquakeBurstTimer = 0;

    const buttons = {
      convergent: document.getElementById("mode-convergent"),
      divergent: document.getElementById("mode-divergent"),
      transform: document.getElementById("mode-transform")
    };
    const playPauseBtn = document.getElementById("playPause");
    const resetBtn = document.getElementById("resetBtn");
    const speedSlider = document.getElementById("speedSlider");
    const speedValue = document.getElementById("speedValue");
    const info = document.getElementById("info");

    function setActiveButton() {
      Object.entries(buttons).forEach(([key, btn]) => {
        btn.classList.toggle("active", key === mode);
      });
    }

    function resetCrustDeformation() {
      const pos = leftCrust.geometry.attributes.position.array;
      pos.set(originalLeftCrustPos);
      leftCrust.geometry.attributes.position.needsUpdate = true;
      leftCrust.geometry.computeVertexNormals();
    }

    function deformLeftCrust(amount) {
      const posAttr = leftCrust.geometry.attributes.position;
      const pos = posAttr.array;
      for (let i = 0; i < pos.length; i += 3) {
        const x = pos[i];
        const normalized = (x + PLATE_W / 2) / PLATE_W;
        const edgeFactor = Math.pow(normalized, 3.0);
        if (x > 5) {
          pos[i + 1] = originalLeftCrustPos[i + 1] + amount * edgeFactor;
        } else {
          pos[i + 1] = originalLeftCrustPos[i + 1];
        }
      }
      posAttr.needsUpdate = true;
      leftCrust.geometry.computeVertexNormals();
    }

    function getModeColor(modeName) {
      if (modeName === "convergent") {
        return new THREE.Color().setRGB(
          1,
          0.2 + Math.random() * 0.3,
          0
        );
      }
      if (modeName === "divergent") {
        return new THREE.Color().setRGB(
          1,
          0.6 + Math.random() * 0.4,
          0
        );
      }
      return new THREE.Color().setRGB(
        1,
        1,
        0.5 + Math.random() * 0.5
      );
    }

    function spawnParticle(modeName, burst = false) {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        if (!active[i]) {
          active[i] = true;
          lifetimes[i] = 0;
          maxLifetimes[i] = 2 + Math.random() * 2;

          const spreadX = modeName === "divergent" ? magmaWidth * 0.4 + 0.5 : 1.2;
          particlePositions[i * 3 + 0] = (Math.random() - 0.5) * spreadX;
          particlePositions[i * 3 + 1] = 2 + Math.random() * 1.5;
          particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 12;

          const c = getModeColor(modeName);
          particleColors[i * 3 + 0] = c.r;
          particleColors[i * 3 + 1] = c.g;
          particleColors[i * 3 + 2] = c.b;

          if (modeName === "convergent") {
            velocities[i].set(
              (Math.random() - 0.5) * 0.05,
              0.06 + Math.random() * 0.08,
              (Math.random() - 0.5) * 0.05
            );
          } else if (modeName === "divergent") {
            velocities[i].set(
              (Math.random() - 0.5) * 0.08,
              0.07 + Math.random() * 0.1,
              (Math.random() - 0.5) * 0.05
            );
          } else {
            const force = burst ? 0.15 : 0.08;
            velocities[i].set(
              (Math.random() - 0.5) * force,
              0.03 + Math.random() * 0.06,
              (Math.random() - 0.5) * force
            );
          }
          break;
        }
      }
    }

    function resetSimulation() {
      leftPlate.position.copy(LEFT_START);
      rightPlate.position.copy(RIGHT_START);
      leftPlate.rotation.set(0, 0, 0);
      rightPlate.rotation.set(0, 0, 0);
      transformDirection = 1;
      elapsedTime = 0;
      collisionOccurred = false;
      mountainHeight = 0;
      magmaWidth = 0;
      earthquakeBurstTimer = 0;
      totalDisplacementLeft = 0;
      totalDisplacementRight = 0;
      lastLeftPos.copy(leftPlate.position);
      lastRightPos.copy(rightPlate.position);

      resetCrustDeformation();

      mountain.visible = false;
      mountain.scale.set(1, 0.01, 1);
      mountain.position.set(0, 1.5, 0);
      mountainPeak.scale.set(1, 0.01, 1);

      magmaStrip.visible = mode === "divergent";
      magmaStrip.scale.set(0.01, 1, 1);

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        active[i] = false;
        lifetimes[i] = 0;
        particlePositions[i * 3 + 1] = -1000;
      }
      particleGeo.attributes.position.needsUpdate = true;
    }

    function setMode(newMode) {
      mode = newMode;
      setActiveButton();
      resetSimulation();
    }

    buttons.convergent.addEventListener("click", () => setMode("convergent"));
    buttons.divergent.addEventListener("click", () => setMode("divergent"));
    buttons.transform.addEventListener("click", () => setMode("transform"));

    playPauseBtn.addEventListener("click", () => {
      isPlaying = !isPlaying;
      playPauseBtn.textContent = isPlaying ? "Pause" : "Play";
    });

    resetBtn.addEventListener("click", () => resetSimulation());

    speedSlider.addEventListener("input", () => {
      speedMultiplier = parseFloat(speedSlider.value);
      speedValue.textContent = speedMultiplier.toFixed(1);
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        isPlaying = !isPlaying;
        playPauseBtn.textContent = isPlaying ? "Pause" : "Play";
      }
      if (e.key === "1") setMode("convergent");
      if (e.key === "2") setMode("divergent");
      if (e.key === "3") setMode("transform");
      if (e.key.toLowerCase() === "r") resetSimulation();
    });

    const clock = new THREE.Clock();

    function updateParticles(delta) {
      let activeCount = 0;

      if (isPlaying) {
        if (mode === "convergent" && collisionOccurred) {
          for (let i = 0; i < 3 * speedMultiplier; i++) spawnParticle("convergent");
        } else if (mode === "divergent") {
          for (let i = 0; i < 4 * speedMultiplier; i++) spawnParticle("divergent");
        } else if (mode === "transform") {
          earthquakeBurstTimer += delta;
          if (earthquakeBurstTimer > 0.35 / speedMultiplier) {
            for (let i = 0; i < 18; i++) spawnParticle("transform", true);
            earthquakeBurstTimer = 0;
          }
        }
      }

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        if (!active[i]) continue;

        lifetimes[i] += delta;
        if (lifetimes[i] >= maxLifetimes[i]) {
          active[i] = false;
          particlePositions[i * 3 + 1] = -1000;
          continue;
        }

        activeCount++;

        particlePositions[i * 3 + 0] += velocities[i].x * (delta * 60);
        particlePositions[i * 3 + 1] += velocities[i].y * (delta * 60);
        particlePositions[i * 3 + 2] += velocities[i].z * (delta * 60);

        velocities[i].y -= 0.0015 * (delta * 60);

        const lifeRatio = 1 - lifetimes[i] / maxLifetimes[i];
        particleColors[i * 3 + 0] *= 0.999;
        particleColors[i * 3 + 1] *= 0.999;
        particleColors[i * 3 + 2] *= 0.999 * lifeRatio;
      }

      particleGeo.attributes.position.needsUpdate = true;
      particleGeo.attributes.color.needsUpdate = true;
      return activeCount;
    }

    function plateSeparation() {
      const leftInner = leftPlate.position.x + PLATE_W / 2;
      const rightInner = rightPlate.position.x - PLATE_W / 2;
      return rightInner - leftInner;
    }

    function updateDisplacement() {
      totalDisplacementLeft += leftPlate.position.distanceTo(lastLeftPos);
      totalDisplacementRight += rightPlate.position.distanceTo(lastRightPos);
      lastLeftPos.copy(leftPlate.position);
      lastRightPos.copy(rightPlate.position);
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.05);
      const move = BASE_SPEED * speedMultiplier;

      if (isPlaying) {
        elapsedTime += delta;

        if (mode === "convergent") {
          magmaStrip.visible = false;

          const gap = plateSeparation();
          if (gap > 0.5) {
            leftPlate.position.x += move;
            rightPlate.position.x -= move;
          } else {
            collisionOccurred = true;
            if (rightPlate.position.y > -3.5) {
              rightPlate.position.y -= 0.02 * speedMultiplier;
              rightPlate.rotation.z = -0.15;
            }

            mountain.visible = true;
            mountainHeight = Math.min(8, mountainHeight + 0.03 * speedMultiplier);
            mountain.scale.y = Math.max(0.01, mountainHeight / 0.01);
            mountain.geometry.dispose();
            mountain.geometry = new THREE.ConeGeometry(4 + mountainHeight * 0.15, Math.max(0.01, mountainHeight), 20);

            mountainPeak.geometry.dispose();
            mountainPeak.geometry = new THREE.ConeGeometry(2.2 + mountainHeight * 0.08, Math.max(0.01, mountainHeight * 0.45), 20);
            mountainPeak.position.y = mountainHeight * 0.25;

            deformLeftCrust(Math.min(4.5, mountainHeight * 0.5));
          }
        }

        if (mode === "divergent") {
          collisionOccurred = false;
          mountain.visible = false;
          mountainHeight = 0;
          resetCrustDeformation();
          rightPlate.rotation.z = 0;
          rightPlate.position.y += (1 - rightPlate.position.y) * 0.12;

          const currentSep = plateSeparation();
          if (currentSep < 30) {
            leftPlate.position.x -= move;
            rightPlate.position.x += move;
          }

          magmaWidth = Math.max(0.1, plateSeparation());
          magmaStrip.visible = true;
          magmaStrip.scale.set(magmaWidth, 1, 1);
          magmaStrip.position.x = 0;
        }

        if (mode === "transform") {
          collisionOccurred = false;
          mountain.visible = false;
          magmaStrip.visible = false;
          magmaWidth = 0;
          mountainHeight = 0;
          resetCrustDeformation();
          rightPlate.rotation.z = 0;
          rightPlate.position.y += (1 - rightPlate.position.y) * 0.12;

          leftPlate.position.z += move * transformDirection;
          rightPlate.position.z -= move * transformDirection;

          if (leftPlate.position.z >= 15 || leftPlate.position.z <= -15) {
            transformDirection *= -1;
          }

          leftPlate.position.x += (LEFT_START.x - leftPlate.position.x) * 0.08;
          rightPlate.position.x += (RIGHT_START.x - rightPlate.position.x) * 0.08;
        }

        updateDisplacement();
      }

      const activeParticles = updateParticles(delta);
      controls.update();

      const separation = plateSeparation();

      info.textContent =
        `Mode: ${mode} | Time: ${elapsedTime.toFixed(1)}s | Separation: ${separation.toFixed(2)}`;

      window.__3D_STATE__ = {
        mode,
        isPlaying,
        speed: speedMultiplier,
        elapsedTime: Number(elapsedTime.toFixed(3)),
        leftPlateX: Number(leftPlate.position.x.toFixed(3)),
        rightPlateX: Number(rightPlate.position.x.toFixed(3)),
        plateSeparation: Number(separation.toFixed(3)),
        leftPlateZ: Number(leftPlate.position.z.toFixed(3)),
        rightPlateZ: Number(rightPlate.position.z.toFixed(3)),
        rightPlateY: Number(rightPlate.position.y.toFixed(3)),
        mountainHeight: Number((mode === "convergent" ? mountainHeight : 0).toFixed(3)),
        activeParticles,
        magmaWidth: Number((mode === "divergent" ? magmaWidth : 0).toFixed(3)),
        collisionOccurred,
        totalDisplacementLeft: Number(totalDisplacementLeft.toFixed(3)),
        totalDisplacementRight: Number(totalDisplacementRight.toFixed(3))
      };

      renderer.render(scene, camera);
    }

    resetSimulation();
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
