<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tectonic Plate Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            background: #1a1a3a;
            padding: 12px 20px;
            border-radius: 10px;
            color: white;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #2a2a5a;
        }
        .btn-group {
            display: flex;
            gap: 8px;
        }
        button {
            background: #2a2a4a;
            color: white;
            border: 1px solid #444477;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover {
            background: #3a3a6a;
            border-color: #6666aa;
        }
        button.active {
            background: #4a4a8a;
            border-color: #8888cc;
            box-shadow: 0 0 8px rgba(136, 136, 204, 0.5);
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #111122;
            padding: 6px 12px;
            border-radius: 6px;
        }
        input[type=range] {
            accent-color: #8888cc;
            cursor: pointer;
        }
        .info-panel {
            margin-left: auto;
            display: flex;
            gap: 20px;
            font-size: 14px;
            background: #111122;
            padding: 8px 15px;
            border-radius: 6px;
            border: 1px solid #2a2a5a;
        }
        .info-item span {
            color: #8888cc;
            font-weight: bold;
        }
        #instructions {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui-container">
        <div class="btn-group">
            <button id="btn-convergent" class="active">Convergent</button>
            <button id="btn-divergent">Divergent</button>
            <button id="btn-transform">Transform</button>
        </div>
        <div class="btn-group">
            <button id="btn-play">Pause</button>
            <button id="btn-reset">Reset</button>
        </div>
        <div class="control-group">
            <label for="speed-slider">Speed</label>
            <input type="range" id="speed-slider" min="0.5" max="3.0" step="0.1" value="1.0">
            <span id="speed-val">1.0x</span>
        </div>
        <div class="info-panel">
            <div class="info-item">Mode: <span id="info-mode">Convergent</span></div>
            <div class="info-item">Time: <span id="info-time">0.0s</span></div>
            <div class="info-item">Separation: <span id="info-sep">2.00</span></div>
        </div>
    </div>
    <div id="instructions">Controls: Left Click = Rotate | Right Click = Pan | Scroll = Zoom | Space = Play/Pause | 1,2,3 = Modes | R = Reset</div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            mode: 'convergent',
            isPlaying: true,
            speed: 1.0,
            elapsedTime: 0,
            leftPlateX: -11,
            rightPlateX: 11,
            plateSeparation: 2,
            leftPlateZ: 0,
            rightPlateZ: 0,
            rightPlateY: 1,
            mountainHeight: 0,
            activeParticles: 0,
            magmaWidth: 0,
            collisionOccurred: false,
            totalDisplacementLeft: 0,
            totalDisplacementRight: 0
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 50);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 30, 10);
        scene.add(dirLight);

        // Grid
        const gridHelper = new THREE.GridHelper(100, 20, 0x222244, 0x222244);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        // --- Objects ---
        const plateGeo = new THREE.BoxGeometry(20, 2, 30);
        const crustGeo = new THREE.BoxGeometry(20, 0.5, 30);

        // Left Plate
        const leftGroup = new THREE.Group();
        const leftMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 });
        const leftPlate = new THREE.Mesh(plateGeo, leftMat);
        leftPlate.position.y = 0; // Center of 2 height is 0, so bottom is -1, top is 1
        
        const leftCrustMat = new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.9 });
        const leftCrust = new THREE.Mesh(crustGeo, leftCrustMat);
        leftCrust.position.y = 1.25; // 1 (top of plate) + 0.25 (half of crust height)
        
        leftGroup.add(leftPlate);
        leftGroup.add(leftCrust);
        leftGroup.position.set(-11, 1, 0);
        scene.add(leftGroup);

        // Right Plate
        const rightGroup = new THREE.Group();
        const rightMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9 });
        const rightPlate = new THREE.Mesh(plateGeo, rightMat);
        rightPlate.position.y = 0;

        const rightCrustMat = new THREE.MeshStandardMaterial({ color: 0xc2a645, roughness: 0.9 });
        const rightCrust = new THREE.Mesh(crustGeo, rightCrustMat);
        rightCrust.position.y = 1.25;

        rightGroup.add(rightPlate);
        rightGroup.add(rightCrust);
        rightGroup.position.set(11, 1, 0);
        scene.add(rightGroup);

        // Magma (Divergent)
        const magmaGeo = new THREE.PlaneGeometry(1, 30);
        const magmaMat = new THREE.MeshBasicMaterial({ color: 0xff4400, side: THREE.DoubleSide });
        const magma = new THREE.Mesh(magmaGeo, magmaMat);
        magma.rotation.x = -Math.PI / 2;
        magma.position.y = 0.9;
        magma.scale.x = 0.001;
        scene.add(magma);

        // Mountain (Convergent)
        const mtnGeo = new THREE.ConeGeometry(4, 1, 32);
        mtnGeo.translate(0, 0.5, 0); // Pivot at bottom
        
        // Gradient vertex colors for mountain
        const mtnColors = [];
        const mtnPos = mtnGeo.attributes.position;
        const colorBottom = new THREE.Color(0x555555);
        const colorTop = new THREE.Color(0x8B4513);
        for(let i = 0; i < mtnPos.count; i++) {
            const y = mtnPos.getY(i); // 0 to 1 due to translation
            const c = new THREE.Color().lerpColors(colorBottom, colorTop, y);
            mtnColors.push(c.r, c.g, c.b);
        }
        mtnGeo.setAttribute('color', new THREE.Float32BufferAttribute(mtnColors, 3));
        
        const mtnMat = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.9 });
        const mountain = new THREE.Mesh(mtnGeo, mtnMat);
        mountain.position.set(0, 2.5, 0);
        mountain.scale.y = 0.001;
        scene.add(mountain);

        // --- Particle System ---
        const particleCount = 300;
        const pGeo = new THREE.BufferGeometry();
        const pPos = new Float32Array(particleCount * 3);
        const pCol = new Float32Array(particleCount * 3);
        const pSize = new Float32Array(particleCount);
        const pAlpha = new Float32Array(particleCount);

        const pVel = [];
        const pLife = [];
        const pMaxLife = [];

        for(let i = 0; i < particleCount; i++) {
            pPos[i*3] = 9999; // Hide initially
            pVel.push(new THREE.Vector3());
            pLife.push(0);
            pMaxLife.push(1);
            pSize[i] = Math.random() * 15 + 10;
        }

        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        pGeo.setAttribute('customColor', new THREE.BufferAttribute(pCol, 3));
        pGeo.setAttribute('size', new THREE.BufferAttribute(pSize, 1));
        pGeo.setAttribute('alpha', new THREE.BufferAttribute(pAlpha, 1));

        const pMat = new THREE.ShaderMaterial({
            uniforms: {},
            vertexShader: `
                attribute vec3 customColor;
                attribute float size;
                attribute float alpha;
                varying vec3 vColor;
                varying float vAlpha;
                void main() {
                    vColor = customColor;
                    vAlpha = alpha;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = size * (300.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                varying float vAlpha;
                void main() {
                    float dist = length(gl_PointCoord - vec2(0.5));
                    if (dist > 0.5) discard;
                    gl_FragColor = vec4(vColor, vAlpha * (1.0 - dist * 2.0));
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particleSystem = new THREE.Points(pGeo, pMat);
        scene.add(particleSystem);

        function spawnParticle(type) {
            // Find dead particle
            let idx = -1;
            for(let i = 0; i < particleCount; i++) {
                if(pLife[i] <= 0) { idx = i; break; }
            }
            if(idx === -1) return;

            const i3 = idx * 3;
            pLife[idx] = Math.random() * 2 + 2; // 2-4 seconds
            pMaxLife[idx] = pLife[idx];

            let c1, c2;

            if (type === 'convergent') {
                pPos[i3] = (Math.random() - 0.5) * 2;
                pPos[i3+1] = 2.5 + Math.random();
                pPos[i3+2] = (Math.random() - 0.5) * 28;
                pVel[idx].set((Math.random()-0.5)*2, Math.random()*3 + 2, (Math.random()-0.5)*2);
                c1 = new THREE.Color(0xff4500); c2 = new THREE.Color(0xff0000);
            } else if (type === 'divergent') {
                const gap = Math.max(0.5, state.plateSeparation);
                pPos[i3] = (Math.random() - 0.5) * gap;
                pPos[i3+1] = 1.0;
                pPos[i3+2] = (Math.random() - 0.5) * 28;
                pVel[idx].set((Math.random()-0.5)*0.5, Math.random()*4 + 1, (Math.random()-0.5)*0.5);
                c1 = new THREE.Color(0xffff00); c2 = new THREE.Color(0xff8c00);
            } else if (type === 'transform') {
                pPos[i3] = (Math.random() - 0.5) * 1;
                pPos[i3+1] = 2.5;
                pPos[i3+2] = (Math.random() - 0.5) * 28;
                pVel[idx].set((Math.random()-0.5)*5, Math.random()*2, (Math.random()-0.5)*5);
                c1 = new THREE.Color(0xffffff); c2 = new THREE.Color(0xffff00);
            }

            const finalColor = c1.lerp(c2, Math.random());
            pCol[i3] = finalColor.r;
            pCol[i3+1] = finalColor.g;
            pCol[i3+2] = finalColor.b;
        }

        // --- UI & Controls ---
        const btnConv = document.getElementById('btn-convergent');
        const btnDiv = document.getElementById('btn-divergent');
        const btnTrans = document.getElementById('btn-transform');
        const btnPlay = document.getElementById('btn-play');
        const btnReset = document.getElementById('btn-reset');
        const sliderSpeed = document.getElementById('speed-slider');
        const speedVal = document.getElementById('speed-val');
        
        const infoMode = document.getElementById('info-mode');
        const infoTime = document.getElementById('info-time');
        const infoSep = document.getElementById('info-sep');

        let transformDir = 1;
        let transformTimer = 0;

        function setMode(mode) {
            state.mode = mode;
            btnConv.classList.toggle('active', mode === 'convergent');
            btnDiv.classList.toggle('active', mode === 'divergent');
            btnTrans.classList.toggle('active', mode === 'transform');
            infoMode.innerText = mode.charAt(0).toUpperCase() + mode.slice(1);
            resetSimulation();
        }

        function togglePlay() {
            state.isPlaying = !state.isPlaying;
            btnPlay.innerText = state.isPlaying ? 'Pause' : 'Play';
            btnPlay.style.background = state.isPlaying ? '#2a2a4a' : '#552222';
        }

        function resetSimulation() {
            state.elapsedTime = 0;
            state.leftPlateX = -11;
            state.rightPlateX = 11;
            state.leftPlateZ = 0;
            state.rightPlateZ = 0;
            state.rightPlateY = 1;
            state.collisionOccurred = false;
            state.totalDisplacementLeft = 0;
            state.totalDisplacementRight = 0;
            state.mountainHeight = 0;
            state.magmaWidth = 0;
            state.plateSeparation = 2;

            leftGroup.position.set(-11, 1, 0);
            rightGroup.position.set(11, 1, 0);
            mountain.scale.y = 0.001;
            magma.scale.x = 0.001;
            transformDir = 1;
            transformTimer = 0;

            // Clear particles
            for(let i = 0; i < particleCount; i++) {
                pLife[i] = 0;
                pPos[i*3] = 9999;
            }
            pGeo.attributes.position.needsUpdate = true;
        }

        btnConv.addEventListener('click', () => setMode('convergent'));
        btnDiv.addEventListener('click', () => setMode('divergent'));
        btnTrans.addEventListener('click', () => setMode('transform'));
        btnPlay.addEventListener('click', togglePlay);
        btnReset.addEventListener('click', resetSimulation);
        
        sliderSpeed.addEventListener('input', (e) => {
            state.speed = parseFloat(e.target.value);
            speedVal.innerText = state.speed.toFixed(1) + 'x';
        });

        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space') { e.preventDefault(); togglePlay(); }
            if(e.key === '1') setMode('convergent');
            if(e.key === '2') setMode('divergent');
            if(e.key === '3') setMode('transform');
            if(e.key === 'r' || e.key === 'R') resetSimulation();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            controls.update();

            if (state.isPlaying) {
                state.elapsedTime += delta;
                const moveAmount = 0.05 * state.speed;

                // Calculate current separation
                // Left plate right edge = leftX + 10
                // Right plate left edge = rightX - 10
                state.plateSeparation = (rightGroup.position.x - 10) - (leftGroup.position.x + 10);

                if (state.mode === 'convergent') {
                    if (state.plateSeparation > 0.5) {
                        leftGroup.position.x += moveAmount;
                        rightGroup.position.x -= moveAmount;
                        state.totalDisplacementLeft += moveAmount;
                        state.totalDisplacementRight += moveAmount;
                    } else {
                        state.collisionOccurred = true;
                        rightGroup.position.y -= 0.02 * state.speed;
                        state.totalDisplacementRight += 0.02 * state.speed;
                        
                        if (mountain.scale.y < 8) {
                            mountain.scale.y += 0.05 * state.speed;
                        }
                        
                        // Spawn particles
                        if (Math.random() < 0.5 * state.speed) spawnParticle('convergent');
                    }
                } 
                else if (state.mode === 'divergent') {
                    if (state.plateSeparation < 30) {
                        leftGroup.position.x -= moveAmount;
                        rightGroup.position.x += moveAmount;
                        state.totalDisplacementLeft += moveAmount;
                        state.totalDisplacementRight += moveAmount;
                    }
                    magma.scale.x = Math.max(0.001, state.plateSeparation);
                    
                    if (state.plateSeparation > 1.0) {
                        if (Math.random() < 0.8 * state.speed) spawnParticle('divergent');
                    }
                }
                else if (state.mode === 'transform') {
                    leftGroup.position.z += moveAmount * transformDir;
                    rightGroup.position.z -= moveAmount * transformDir;
                    state.totalDisplacementLeft += moveAmount;
                    state.totalDisplacementRight += moveAmount;

                    if (Math.abs(leftGroup.position.z) > 15) {
                        transformDir *= -1;
                    }

                    transformTimer += delta * state.speed;
                    if (transformTimer > 2.0) { // Burst every ~2 seconds
                        for(let i=0; i<30; i++) spawnParticle('transform');
                        transformTimer = 0;
                    }
                }

                // Update State Object
                state.leftPlateX = leftGroup.position.x;
                state.rightPlateX = rightGroup.position.x;
                state.leftPlateZ = leftGroup.position.z;
                state.rightPlateZ = rightGroup.position.z;
                state.rightPlateY = rightGroup.position.y;
                state.mountainHeight = mountain.scale.y === 0.001 ? 0 : mountain.scale.y;
                state.magmaWidth = magma.scale.x === 0.001 ? 0 : magma.scale.x;
            }

            // Update Particles (always update to allow fade out after pause)
            let activeCount = 0;
            for(let i = 0; i < particleCount; i++) {
                if(pLife[i] > 0) {
                    pLife[i] -= delta;
                    if(pLife[i] <= 0) {
                        pPos[i*3] = 9999; // Hide
                    } else {
                        activeCount++;
                        const i3 = i * 3;
                        pPos[i3] += pVel[i].x * delta;
                        pPos[i3+1] += pVel[i].y * delta;
                        pPos[i3+2] += pVel[i].z * delta;
                        pAlpha[i] = pLife[i] / pMaxLife[i];
                    }
                }
            }
            pGeo.attributes.position.needsUpdate = true;
            pGeo.attributes.alpha.needsUpdate = true;
            state.activeParticles = activeCount;

            // Update UI Text
            infoTime.innerText = state.elapsedTime.toFixed(1) + 's';
            infoSep.innerText = Math.max(0, state.plateSeparation).toFixed(2);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
