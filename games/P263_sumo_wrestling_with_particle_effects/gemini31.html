<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sumo Wrestling</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .score-board {
            display: flex;
            justify-content: space-between;
            padding: 20px 50px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .player-score { color: #4da8da; }
        .opponent-score { color: #ff4b4b; }
        
        #roundDisplay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: bold;
            color: #f9a826;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #center-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
        }

        #statusText {
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.5), 2px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        button {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(45deg, #f9a826, #e65c00);
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s, box-shadow 0.1s;
            pointer-events: auto;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
        }
        button:active {
            transform: scale(0.95);
        }
        #resetBtn {
            display: none;
            background: linear-gradient(45deg, #4da8da, #007bb5);
        }
        
        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            text-align: center;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div class="score-board">
            <div class="player-score">PLAYER: <span id="pScore">0</span></div>
            <div class="opponent-score">OPPONENT: <span id="oScore">0</span></div>
        </div>
        
        <div id="roundDisplay">ROUND 1</div>
        
        <div id="center-message">
            <div id="statusText"></div>
            <button id="startBtn">FIGHT!</button>
            <button id="resetBtn">Play Again</button>
        </div>
        
        <div class="controls-hint">WASD to Move & Push</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            gameStarted: false,
            roundActive: false,
            currentRound: 1,
            playerScore: 0,
            opponentScore: 0,
            playerPosition: { x: -2, y: 1, z: 0 },
            opponentPosition: { x: 2, y: 1, z: 0 },
            playerInRing: true,
            opponentInRing: true,
            collisionCount: 0,
            activeParticleCount: 0,
            gameOver: false,
            winner: 'none',
            lastCollisionTime: 0,
            playerDistanceFromCenter: 0,
            opponentDistanceFromCenter: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');
        // Add a subtle fog to blend with background
        scene.fog = new THREE.FogExp2('#1a1a2e', 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        scene.add(dirLight);

        // --- Environment (Dohyo) ---
        const dohyoGroup = new THREE.Group();
        
        // Sand base
        const dohyoGeo = new THREE.CylinderGeometry(5, 5, 0.3, 64);
        const dohyoMat = new THREE.MeshStandardMaterial({ 
            color: 0xD2B48C,
            roughness: 0.9,
            metalness: 0.1
        });
        const dohyo = new THREE.Mesh(dohyoGeo, dohyoMat);
        dohyo.position.y = 0.15; // Rest on ground
        dohyo.receiveShadow = true;
        dohyoGroup.add(dohyo);

        // White border ring
        const ringGeo = new THREE.TorusGeometry(4.8, 0.1, 16, 64);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = -Math.PI / 2;
        ring.position.y = 0.3;
        ring.receiveShadow = true;
        dohyoGroup.add(ring);

        scene.add(dohyoGroup);

        // --- Wrestlers ---
        const massGeo = new THREE.SphereGeometry(1.2, 32, 32);
        const massMat = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.15,
            depthWrite: false
        });

        // Player
        const player = new THREE.Group();
        player.position.set(-2, 1, 0);
        scene.add(player);

        const playerMass = new THREE.Mesh(massGeo, massMat.clone());
        playerMass.material.color.setHex(0x4da8da);
        player.add(playerMass);

        // Load GLTF for player
        const loader = new GLTFLoader();
        const gltfUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb';
        
        // Placeholder while loading
        const placeholderGeo = new THREE.BoxGeometry(1, 1, 1);
        const placeholderMat = new THREE.MeshStandardMaterial({ color: 0x4da8da });
        const placeholder = new THREE.Mesh(placeholderGeo, placeholderMat);
        player.add(placeholder);

        loader.load(gltfUrl, (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.8, 0.8, 0.8);
            // Orient helmet to face opponent (right)
            model.rotation.y = Math.PI / 2;
            
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            player.remove(placeholder);
            player.add(model);
        });

        // Opponent
        const opponent = new THREE.Group();
        opponent.position.set(2, 1, 0);
        scene.add(opponent);

        const oppMass = new THREE.Mesh(massGeo, massMat.clone());
        oppMass.material.color.setHex(0xff4b4b);
        opponent.add(oppMass);

        const oppBodyGeo = new THREE.SphereGeometry(0.7, 32, 32);
        const oppBodyMat = new THREE.MeshStandardMaterial({
            color: 0xff0000,
            metalness: 0.8,
            roughness: 0.2
        });
        const oppBody = new THREE.Mesh(oppBodyGeo, oppBodyMat);
        oppBody.castShadow = true;
        opponent.add(oppBody);

        // --- Particle System ---
        const particles = [];
        const particleGeo = new THREE.SphereGeometry(0.1, 8, 8);
        
        function createParticle(pos, color, size, velocity, life) {
            const mat = new THREE.MeshBasicMaterial({ 
                color: color, 
                transparent: true, 
                opacity: 1 
            });
            const mesh = new THREE.Mesh(particleGeo, mat);
            mesh.position.copy(pos);
            mesh.scale.setScalar(size);
            scene.add(mesh);
            
            particles.push({
                mesh: mesh,
                velocity: velocity,
                life: life,
                maxLife: life
            });
        }

        function spawnCollisionParticles(pos) {
            const count = 20 + Math.random() * 10;
            for (let i = 0; i < count; i++) {
                const vel = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.2,
                    (Math.random() - 0.5) * 0.2 + 0.1,
                    (Math.random() - 0.5) * 0.2
                );
                const color = Math.random() > 0.5 ? 0xffaa00 : 0xff4400;
                createParticle(pos, color, 0.5 + Math.random() * 0.5, vel, 1.0);
            }
        }

        function spawnExplosionParticles(pos) {
            const count = 50;
            for (let i = 0; i < count; i++) {
                const vel = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.4,
                    Math.random() * 0.4,
                    (Math.random() - 0.5) * 0.4
                );
                createParticle(pos, 0xff0000, 1.5 + Math.random(), vel, 1.5);
            }
        }

        function spawnDust(pos) {
            if (Math.random() > 0.3) return; // Limit dust rate
            const dustPos = pos.clone();
            dustPos.y = 0.3; // Ground level
            dustPos.x += (Math.random() - 0.5) * 0.5;
            dustPos.z += (Math.random() - 0.5) * 0.5;
            
            const vel = new THREE.Vector3(0, 0.02 + Math.random() * 0.02, 0);
            createParticle(dustPos, 0x8B4513, 0.3 + Math.random() * 0.3, vel, 0.5 + Math.random() * 0.5);
        }

        function updateParticles(delta) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life -= delta;
                
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    p.mesh.material.dispose();
                    particles.splice(i, 1);
                } else {
                    p.mesh.position.add(p.velocity);
                    p.mesh.material.opacity = p.life / p.maxLife;
                    // Slight gravity for non-dust
                    if (p.mesh.material.color.getHex() !== 0x8B4513) {
                        p.velocity.y -= 0.005;
                    }
                }
            }
            window.__3D_STATE__.activeParticleCount = particles.length;
        }

        // --- Input Handling ---
        const keys = { w: false, a: false, s: false, d: false };
        
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });

        // --- UI Elements ---
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusText = document.getElementById('statusText');
        const pScoreEl = document.getElementById('pScore');
        const oScoreEl = document.getElementById('oScore');
        const roundDisplay = document.getElementById('roundDisplay');

        function showStatus(text, duration = 0) {
            statusText.innerText = text;
            statusText.style.opacity = 1;
            if (duration > 0) {
                setTimeout(() => {
                    if (statusText.innerText === text) {
                        statusText.style.opacity = 0;
                    }
                }, duration);
            }
        }

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            window.__3D_STATE__.gameStarted = true;
            startRound();
        });

        resetBtn.addEventListener('click', () => {
            resetBtn.style.display = 'none';
            window.__3D_STATE__.playerScore = 0;
            window.__3D_STATE__.opponentScore = 0;
            window.__3D_STATE__.currentRound = 1;
            window.__3D_STATE__.gameOver = false;
            window.__3D_STATE__.winner = 'none';
            pScoreEl.innerText = '0';
            oScoreEl.innerText = '0';
            startRound();
        });

        function startRound() {
            roundDisplay.innerText = `ROUND ${window.__3D_STATE__.currentRound}`;
            player.position.set(-2, 1, 0);
            opponent.position.set(2, 1, 0);
            
            showStatus('ROUND START!', 1500);
            
            setTimeout(() => {
                window.__3D_STATE__.roundActive = true;
            }, 1500);
        }

        function endRound(winner) {
            window.__3D_STATE__.roundActive = false;
            
            if (winner === 'player') {
                window.__3D_STATE__.playerScore++;
                pScoreEl.innerText = window.__3D_STATE__.playerScore;
                showStatus('Player Wins Round!');
            } else {
                window.__3D_STATE__.opponentScore++;
                oScoreEl.innerText = window.__3D_STATE__.opponentScore;
                showStatus('Opponent Wins Round!');
            }

            if (window.__3D_STATE__.playerScore >= 3 || window.__3D_STATE__.opponentScore >= 3) {
                window.__3D_STATE__.gameOver = true;
                window.__3D_STATE__.winner = winner;
                setTimeout(() => {
                    showStatus(winner === 'player' ? 'YOU WIN THE MATCH!' : 'OPPONENT WINS MATCH!');
                    resetBtn.style.display = 'inline-block';
                }, 1500);
            } else {
                window.__3D_STATE__.currentRound++;
                setTimeout(() => {
                    statusText.style.opacity = 0;
                    startRound();
                }, 2000);
            }
        }

        // --- Game Logic & Loop ---
        const clock = new THREE.Clock();
        
        // AI State
        let aiChargeTimer = 0;
        let aiIsCharging = false;
        let aiChargeDuration = 0;

        function updateGame(delta) {
            const state = window.__3D_STATE__;
            
            if (!state.gameStarted || !state.roundActive || state.gameOver) return;

            // Player Movement
            const playerSpeed = 0.08; // per frame equivalent, adjusted for delta below
            const moveDist = playerSpeed * (delta * 60); // normalize to 60fps
            const pVel = new THREE.Vector3(0,0,0);

            // Mapping W to +X (towards opponent starting pos), S to -X, A to -Z, D to +Z
            if (keys.w) pVel.x += moveDist;
            if (keys.s) pVel.x -= moveDist;
            if (keys.a) pVel.z -= moveDist;
            if (keys.d) pVel.z += moveDist;

            if (pVel.lengthSq() > 0) {
                player.position.add(pVel);
                spawnDust(player.position);
            }

            // Opponent AI
            const oVel = new THREE.Vector3(0,0,0);
            if (!aiIsCharging) {
                aiChargeTimer += delta;
                if (aiChargeTimer > 3) {
                    aiIsCharging = true;
                    aiChargeDuration = 0.5;
                    aiChargeTimer = 0;
                }
                // Move towards player slowly
                const dir = new THREE.Vector3().subVectors(player.position, opponent.position);
                dir.y = 0;
                if (dir.lengthSq() > 0.1) {
                    dir.normalize();
                    oVel.copy(dir).multiplyScalar(0.03 * (delta * 60));
                }
            } else {
                aiChargeDuration -= delta;
                if (aiChargeDuration <= 0) aiIsCharging = false;
                // Charge fast
                const dir = new THREE.Vector3().subVectors(player.position, opponent.position);
                dir.y = 0;
                if (dir.lengthSq() > 0.1) {
                    dir.normalize();
                    oVel.copy(dir).multiplyScalar(0.1 * (delta * 60));
                }
            }
            
            if (oVel.lengthSq() > 0) {
                opponent.position.add(oVel);
                spawnDust(opponent.position);
            }

            // Collision Detection
            const pPos2D = new THREE.Vector2(player.position.x, player.position.z);
            const oPos2D = new THREE.Vector2(opponent.position.x, opponent.position.z);
            const dist = pPos2D.distanceTo(oPos2D);

            if (dist < 2.0) {
                state.collisionCount++;
                state.lastCollisionTime = Date.now();
                
                const midPoint = new THREE.Vector3(
                    (player.position.x + opponent.position.x) / 2,
                    1,
                    (player.position.z + opponent.position.z) / 2
                );
                spawnCollisionParticles(midPoint);

                // Resolve overlap
                const overlap = 2.0 - dist;
                const dir = new THREE.Vector2().subVectors(oPos2D, pPos2D).normalize();
                
                // Push force based on movement (momentum approximation)
                const pMoving = pVel.lengthSq() > 0;
                const oMoving = oVel.lengthSq() > 0;
                
                let pPush = 0.5;
                let oPush = 0.5;

                if (pMoving && !oMoving) { oPush = 0.8; pPush = 0.2; }
                else if (!pMoving && oMoving) { pPush = 0.8; oPush = 0.2; }
                else if (aiIsCharging) { pPush = 0.7; oPush = 0.3; }

                player.position.x -= dir.x * overlap * pPush;
                player.position.z -= dir.y * overlap * pPush;
                
                opponent.position.x += dir.x * overlap * oPush;
                opponent.position.z += dir.y * overlap * oPush;
            }

            // Clamp to max radius (6)
            const clampRadius = 6.0;
            const pLen = Math.sqrt(player.position.x**2 + player.position.z**2);
            if (pLen > clampRadius) {
                player.position.x = (player.position.x / pLen) * clampRadius;
                player.position.z = (player.position.z / pLen) * clampRadius;
            }
            
            const oLen = Math.sqrt(opponent.position.x**2 + opponent.position.z**2);
            if (oLen > clampRadius) {
                opponent.position.x = (opponent.position.x / oLen) * clampRadius;
                opponent.position.z = (opponent.position.z / oLen) * clampRadius;
            }

            // Ring Out Check
            const ringRadius = 4.8;
            state.playerDistanceFromCenter = pLen;
            state.opponentDistanceFromCenter = oLen;
            state.playerInRing = pLen <= ringRadius;
            state.opponentInRing = oLen <= ringRadius;

            if (!state.playerInRing) {
                spawnExplosionParticles(player.position);
                endRound('opponent');
            } else if (!state.opponentInRing) {
                spawnExplosionParticles(opponent.position);
                endRound('player');
            }
        }

        function updateStateObject() {
            const state = window.__3D_STATE__;
            state.playerPosition.x = player.position.x;
            state.playerPosition.y = player.position.y;
            state.playerPosition.z = player.position.z;
            
            state.opponentPosition.x = opponent.position.x;
            state.opponentPosition.y = opponent.position.y;
            state.opponentPosition.z = opponent.position.z;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = Math.min(clock.getDelta(), 0.1); // Cap delta to prevent huge jumps
            
            updateGame(delta);
            updateParticles(delta);
            updateStateObject();

            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start loop
        animate();
    </script>
</body>
</html>
