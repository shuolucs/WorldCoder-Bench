<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Sumo Wrestling - Three.js</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #24304a 0%, #1a1a2e 60%, #101018 100%);
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: white;
      z-index: 10;
    }

    #playerScore {
      position: absolute;
      top: 16px;
      left: 20px;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }

    #opponentScore {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }

    #roundDisplay {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }

    #statusText {
      position: absolute;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 26px;
      font-weight: bold;
      color: #ffd166;
      text-shadow: 0 0 12px rgba(0,0,0,0.9);
      text-align: center;
      min-width: 300px;
    }

    #controls {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      pointer-events: auto;
    }

    button {
      background: linear-gradient(180deg, #ffb703, #fb8500);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px 22px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.35);
    }

    button:hover {
      filter: brightness(1.08);
    }

    #resetBtn {
      display: none;
      background: linear-gradient(180deg, #90e0ef, #0077b6);
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="playerScore">Player: 0</div>
    <div id="opponentScore">Opponent: 0</div>
    <div id="roundDisplay">Round 1</div>
    <div id="statusText">Press FIGHT to begin!</div>
    <div id="controls">
      <button id="startBtn">FIGHT!</button>
      <button id="resetBtn">Reset Game</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    // Ground / dohyo
    const dohyo = new THREE.Mesh(
      new THREE.CylinderGeometry(5, 5, 0.3, 64),
      new THREE.MeshStandardMaterial({ color: '#D2B48C', roughness: 0.9, metalness: 0.1 })
    );
    dohyo.position.set(0, 0, 0);
    scene.add(dohyo);

    const borderRing = new THREE.Mesh(
      new THREE.TorusGeometry(4.8, 0.08, 16, 100),
      new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x222222 })
    );
    borderRing.rotation.x = Math.PI / 2;
    borderRing.position.y = 0.19;
    scene.add(borderRing);

    // Arena base
    const arenaBase = new THREE.Mesh(
      new THREE.CylinderGeometry(6.2, 6.2, 0.25, 64),
      new THREE.MeshStandardMaterial({ color: '#7b6850', roughness: 1.0 })
    );
    arenaBase.position.y = -0.28;
    scene.add(arenaBase);

    // Wrestlers
    const wrestlerGroupPlayer = new THREE.Group();
    wrestlerGroupPlayer.position.set(-2, 1, 0);
    scene.add(wrestlerGroupPlayer);

    const playerMass = new THREE.Mesh(
      new THREE.SphereGeometry(1.2, 24, 24),
      new THREE.MeshStandardMaterial({
        color: 0x66ccff,
        transparent: true,
        opacity: 0.18,
        roughness: 0.4,
        metalness: 0.1
      })
    );
    playerMass.position.set(0, 0, 0);
    wrestlerGroupPlayer.add(playerMass);

    const fallbackPlayer = new THREE.Mesh(
      new THREE.SphereGeometry(0.7, 24, 24),
      new THREE.MeshStandardMaterial({ color: 0x88ccee, roughness: 0.6, metalness: 0.2 })
    );
    fallbackPlayer.position.set(0, 0, 0);
    wrestlerGroupPlayer.add(fallbackPlayer);

    const wrestlerOpponent = new THREE.Group();
    wrestlerOpponent.position.set(2, 1, 0);
    scene.add(wrestlerOpponent);

    const opponentBody = new THREE.Mesh(
      new THREE.SphereGeometry(0.7, 32, 32),
      new THREE.MeshStandardMaterial({
        color: 0xcc3333,
        metalness: 0.75,
        roughness: 0.28
      })
    );
    wrestlerOpponent.add(opponentBody);

    const opponentMass = new THREE.Mesh(
      new THREE.SphereGeometry(1.2, 24, 24),
      new THREE.MeshStandardMaterial({
        color: 0xff6666,
        transparent: true,
        opacity: 0.18,
        roughness: 0.4,
        metalness: 0.2
      })
    );
    wrestlerOpponent.add(opponentMass);

    // Load player GLB
    const loader = new GLTFLoader();
    let playerModel = null;
    loader.load(
      'https://threejs.org/examples/models/gltf/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
      (gltf) => {
        playerModel = gltf.scene;
        playerModel.scale.set(0.8, 0.8, 0.8);
        playerModel.position.set(0, -0.2, 0);
        playerModel.rotation.y = Math.PI / 2;
        fallbackPlayer.visible = false;
        wrestlerGroupPlayer.add(playerModel);
      },
      undefined,
      () => {
        // fallback remains visible
      }
    );

    // Input
    const keys = {
      KeyW: false,
      KeyA: false,
      KeyS: false,
      KeyD: false
    };

    window.addEventListener('keydown', (e) => {
      if (e.code in keys) keys[e.code] = true;
    });

    window.addEventListener('keyup', (e) => {
      if (e.code in keys) keys[e.code] = false;
    });

    // UI
    const playerScoreEl = document.getElementById('playerScore');
    const opponentScoreEl = document.getElementById('opponentScore');
    const roundDisplayEl = document.getElementById('roundDisplay');
    const statusTextEl = document.getElementById('statusText');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    // Particles
    const particleGroup = new THREE.Group();
    scene.add(particleGroup);

    const particles = [];

    function spawnParticle(position, velocity, color, size = 0.08, life = 1.0, opacity = 1.0) {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(size, 8, 8),
        new THREE.MeshStandardMaterial({
          color,
          transparent: true,
          opacity,
          emissive: color,
          emissiveIntensity: 0.2
        })
      );
      mesh.position.copy(position);
      particleGroup.add(mesh);

      particles.push({
        mesh,
        velocity: velocity.clone(),
        life,
        maxLife: life
      });
    }

    function spawnCollisionParticles(point) {
      const count = 20 + Math.floor(Math.random() * 11);
      for (let i = 0; i < count; i++) {
        const dir = new THREE.Vector3(
          (Math.random() - 0.5) * 2,
          Math.random() * 1.2,
          (Math.random() - 0.5) * 2
        ).normalize();
        const speed = 0.04 + Math.random() * 0.12;
        const color = Math.random() > 0.5 ? 0xffc300 : 0xff7b00;
        spawnParticle(point, dir.multiplyScalar(speed), color, 0.06 + Math.random() * 0.05, 1.0, 1.0);
      }
    }

    function spawnExplosionParticles(point) {
      for (let i = 0; i < 50; i++) {
        const dir = new THREE.Vector3(
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.2) * 2,
          (Math.random() - 0.5) * 2
        ).normalize();
        const speed = 0.06 + Math.random() * 0.18;
        spawnParticle(point, dir.multiplyScalar(speed), 0xff3333, 0.12 + Math.random() * 0.12, 1.2, 1.0);
      }
    }

    function spawnDust(position) {
      for (let i = 0; i < 2; i++) {
        const p = position.clone();
        p.y = 0.25;
        p.x += (Math.random() - 0.5) * 0.5;
        p.z += (Math.random() - 0.5) * 0.5;

        const vel = new THREE.Vector3(
          (Math.random() - 0.5) * 0.01,
          0.01 + Math.random() * 0.02,
          (Math.random() - 0.5) * 0.01
        );
        spawnParticle(p, vel, 0x9c7b5a, 0.04 + Math.random() * 0.04, 0.7, 0.5);
      }
    }

    function updateParticles(dtScale) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= 0.016 * dtScale;
        p.mesh.position.addScaledVector(p.velocity, dtScale);
        p.velocity.y -= 0.0015 * dtScale;

        if (p.mesh.material.transparent) {
          p.mesh.material.opacity = Math.max(0, p.life / p.maxLife);
        }

        if (p.life <= 0) {
          particleGroup.remove(p.mesh);
          p.mesh.geometry.dispose();
          p.mesh.material.dispose();
          particles.splice(i, 1);
        }
      }
    }

    // Game state
    const state = {
      gameStarted: false,
      roundActive: false,
      currentRound: 1,
      playerScore: 0,
      opponentScore: 0,
      gameOver: false,
      winner: 'none',
      collisionCount: 0,
      lastCollisionTime: 0
    };

    let playerVelocity = new THREE.Vector3();
    let opponentVelocity = new THREE.Vector3();
    let lastOpponentCharge = 0;
    let roundStartMessageTimeout = null;
    let collisionCooldown = 0;

    const playerStart = new THREE.Vector3(-2, 1, 0);
    const opponentStart = new THREE.Vector3(2, 1, 0);

    function clampToRadius(obj, maxRadius = 6) {
      const pos2D = new THREE.Vector2(obj.position.x, obj.position.z);
      const len = pos2D.length();
      if (len > maxRadius) {
        pos2D.setLength(maxRadius);
        obj.position.x = pos2D.x;
        obj.position.z = pos2D.y;
      }
    }

    function updateHUD() {
      playerScoreEl.textContent = `Player: ${state.playerScore}`;
      opponentScoreEl.textContent = `Opponent: ${state.opponentScore}`;
      roundDisplayEl.textContent = `Round ${state.currentRound}`;
    }

    function setStatus(text) {
      statusTextEl.textContent = text;
    }

    function showRoundStart() {
      setStatus('Round Start!');
      if (roundStartMessageTimeout) clearTimeout(roundStartMessageTimeout);
      roundStartMessageTimeout = setTimeout(() => {
        if (state.roundActive && !state.gameOver) setStatus('');
      }, 1500);
    }

    function resetPositions() {
      wrestlerGroupPlayer.position.copy(playerStart);
      wrestlerOpponent.position.copy(opponentStart);
      playerVelocity.set(0, 0, 0);
      opponentVelocity.set(0, 0, 0);
      collisionCooldown = 0;
    }

    function startRound() {
      resetPositions();
      state.roundActive = true;
      showRoundStart();
    }

    function endRound(winner) {
      if (!state.roundActive || state.gameOver) return;
      state.roundActive = false;

      if (winner === 'player') {
        state.playerScore++;
        setStatus('Player Wins Round!');
        spawnExplosionParticles(wrestlerOpponent.position.clone());
      } else {
        state.opponentScore++;
        setStatus('Opponent Wins Round!');
        spawnExplosionParticles(wrestlerGroupPlayer.position.clone());
      }

      updateHUD();

      if (state.playerScore >= 3 || state.opponentScore >= 3) {
        state.gameOver = true;
        state.winner = state.playerScore >= 3 ? 'player' : 'opponent';
        setStatus(`Game Over! ${state.winner === 'player' ? 'Player' : 'Opponent'} Wins!`);
        resetBtn.style.display = 'inline-block';
        return;
      }

      setTimeout(() => {
        if (!state.gameOver) {
          state.currentRound++;
          updateHUD();
          startRound();
        }
      }, 2000);
    }

    function resetGame() {
      state.gameStarted = false;
      state.roundActive = false;
      state.currentRound = 1;
      state.playerScore = 0;
      state.opponentScore = 0;
      state.gameOver = false;
      state.winner = 'none';
      state.collisionCount = 0;
      state.lastCollisionTime = 0;
      resetPositions();
      updateHUD();
      setStatus('Press FIGHT to begin!');
      startBtn.style.display = 'inline-block';
      resetBtn.style.display = 'none';
    }

    startBtn.addEventListener('click', () => {
      if (state.gameStarted) return;
      state.gameStarted = true;
      startBtn.style.display = 'none';
      updateHUD();
      startRound();
    });

    resetBtn.addEventListener('click', () => {
      resetGame();
    });

    // Exposed state
    window.__3D_STATE__ = {
      gameStarted: false,
      roundActive: false,
      currentRound: 1,
      playerScore: 0,
      opponentScore: 0,
      playerPosition: { x: -2, y: 1, z: 0 },
      opponentPosition: { x: 2, y: 1, z: 0 },
      playerInRing: true,
      opponentInRing: true,
      collisionCount: 0,
      activeParticleCount: 0,
      gameOver: false,
      winner: 'none',
      lastCollisionTime: 0,
      playerDistanceFromCenter: 2,
      opponentDistanceFromCenter: 2
    };

    const clock = new THREE.Clock();

    function updatePlayer() {
      if (!state.gameStarted || !state.roundActive || state.gameOver) return;

      const move = new THREE.Vector3();
      if (keys.KeyW) move.z += 1;
      if (keys.KeyS) move.z -= 1;
      if (keys.KeyA) move.x -= 1;
      if (keys.KeyD) move.x += 1;

      if (move.lengthSq() > 0) {
        move.normalize().multiplyScalar(0.08);
        playerVelocity.lerp(move, 0.35);
        wrestlerGroupPlayer.position.add(playerVelocity);
        wrestlerGroupPlayer.rotation.y = Math.atan2(playerVelocity.x, playerVelocity.z);
        spawnDust(wrestlerGroupPlayer.position.clone());
      } else {
        playerVelocity.multiplyScalar(0.84);
        wrestlerGroupPlayer.position.add(playerVelocity);
      }

      clampToRadius(wrestlerGroupPlayer, 6);
    }

    function updateOpponent(timeMs) {
      if (!state.gameStarted || !state.roundActive || state.gameOver) return;

      const toPlayer = wrestlerGroupPlayer.position.clone().sub(wrestlerOpponent.position);
      toPlayer.y = 0;
      const dist = toPlayer.length();

      if (dist > 0.001) {
        toPlayer.normalize();
      }

      let speed = 0.03;
      if (timeMs - lastOpponentCharge > 3000) {
        speed = 0.1;
        lastOpponentCharge = timeMs;
      }

      const desired = toPlayer.multiplyScalar(speed);
      opponentVelocity.lerp(desired, 0.08);
      wrestlerOpponent.position.add(opponentVelocity);

      if (opponentVelocity.lengthSq() > 0.0001) {
        wrestlerOpponent.rotation.y = Math.atan2(opponentVelocity.x, opponentVelocity.z);
        spawnDust(wrestlerOpponent.position.clone());
      }

      clampToRadius(wrestlerOpponent, 6);
    }

    function handleCollision(timeMs) {
      const p1 = wrestlerGroupPlayer.position.clone();
      const p2 = wrestlerOpponent.position.clone();
      const delta = p2.sub(p1);
      delta.y = 0;
      const dist = delta.length();

      if (collisionCooldown > 0) {
        collisionCooldown -= 1;
      }

      if (dist < 2.0 && collisionCooldown <= 0 && state.roundActive) {
        const normal = delta.length() > 0.0001 ? delta.clone().normalize() : new THREE.Vector3(1, 0, 0);

        const playerMomentum = playerVelocity.length();
        const opponentMomentum = opponentVelocity.length();

        const diff = playerMomentum - opponentMomentum;
        const basePush = 0.12;

        if (diff >= 0) {
          opponentVelocity.add(normal.clone().multiplyScalar(basePush + diff * 0.8));
          playerVelocity.add(normal.clone().multiplyScalar(-0.03));
        } else {
          playerVelocity.add(normal.clone().multiplyScalar(-(basePush + (-diff) * 0.8)));
          opponentVelocity.add(normal.clone().multiplyScalar(0.03));
        }

        const overlap = 2.0 - dist;
        wrestlerGroupPlayer.position.add(normal.clone().multiplyScalar(-overlap * 0.5));
        wrestlerOpponent.position.add(normal.clone().multiplyScalar(overlap * 0.5));

        const collisionPoint = wrestlerGroupPlayer.position.clone().lerp(wrestlerOpponent.position, 0.5);
        spawnCollisionParticles(collisionPoint);

        state.collisionCount++;
        state.lastCollisionTime = timeMs;
        collisionCooldown = 8;
      }
    }

    function checkRingOut() {
      const playerDist = Math.sqrt(
        wrestlerGroupPlayer.position.x * wrestlerGroupPlayer.position.x +
        wrestlerGroupPlayer.position.z * wrestlerGroupPlayer.position.z
      );

      const opponentDist = Math.sqrt(
        wrestlerOpponent.position.x * wrestlerOpponent.position.x +
        wrestlerOpponent.position.z * wrestlerOpponent.position.z
      );

      if (playerDist > 4.8) {
        endRound('opponent');
      } else if (opponentDist > 4.8) {
        endRound('player');
      }
    }

    function updateStateObject() {
      const playerDist = Math.sqrt(
        wrestlerGroupPlayer.position.x ** 2 + wrestlerGroupPlayer.position.z ** 2
      );
      const opponentDist = Math.sqrt(
        wrestlerOpponent.position.x ** 2 + wrestlerOpponent.position.z ** 2
      );

      window.__3D_STATE__.gameStarted = state.gameStarted;
      window.__3D_STATE__.roundActive = state.roundActive;
      window.__3D_STATE__.currentRound = state.currentRound;
      window.__3D_STATE__.playerScore = state.playerScore;
      window.__3D_STATE__.opponentScore = state.opponentScore;
      window.__3D_STATE__.playerPosition = {
        x: wrestlerGroupPlayer.position.x,
        y: wrestlerGroupPlayer.position.y,
        z: wrestlerGroupPlayer.position.z
      };
      window.__3D_STATE__.opponentPosition = {
        x: wrestlerOpponent.position.x,
        y: wrestlerOpponent.position.y,
        z: wrestlerOpponent.position.z
      };
      window.__3D_STATE__.playerInRing = playerDist <= 4.8;
      window.__3D_STATE__.opponentInRing = opponentDist <= 4.8;
      window.__3D_STATE__.collisionCount = state.collisionCount;
      window.__3D_STATE__.activeParticleCount = particles.length;
      window.__3D_STATE__.gameOver = state.gameOver;
      window.__3D_STATE__.winner = state.winner;
      window.__3D_STATE__.lastCollisionTime = state.lastCollisionTime;
      window.__3D_STATE__.playerDistanceFromCenter = playerDist;
      window.__3D_STATE__.opponentDistanceFromCenter = opponentDist;
    }

    function animate(timeMs) {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.033);
      const dtScale = dt / 0.0166667;

      updatePlayer();
      updateOpponent(timeMs);
      handleCollision(timeMs);

      wrestlerGroupPlayer.position.add(playerVelocity.clone().multiplyScalar(0.35 * dtScale));
      wrestlerOpponent.position.add(opponentVelocity.clone().multiplyScalar(0.35 * dtScale));

      playerVelocity.multiplyScalar(0.92);
      opponentVelocity.multiplyScalar(0.94);

      clampToRadius(wrestlerGroupPlayer, 6);
      clampToRadius(wrestlerOpponent, 6);

      if (state.roundActive && !state.gameOver) {
        checkRingOut();
      }

      updateParticles(dtScale);

      if (playerModel) {
        playerModel.rotation.y += 0.01 * dtScale;
      }
      opponentBody.rotation.y += 0.03 * dtScale;

      updateStateObject();
      renderer.render(scene, camera);
    }

    updateHUD();
    resetPositions();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
