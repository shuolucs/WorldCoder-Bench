<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sumo Wrestling</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Arial Black', Arial, sans-serif; }
canvas { display: block; }
#hud {
    position: absolute; top: 0; left: 0; width: 100%; pointer-events: none;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 20px 40px;
}
.score-panel {
    background: rgba(0,0,0,0.7); border: 2px solid; border-radius: 12px;
    padding: 15px 30px; text-align: center; min-width: 150px;
}
.score-panel.player { border-color: #4fc3f7; }
.score-panel.opponent { border-color: #ef5350; }
.score-label { font-size: 14px; color: #aaa; text-transform: uppercase; letter-spacing: 2px; }
.score-value { font-size: 48px; font-weight: bold; margin: 5px 0; }
.score-panel.player .score-value { color: #4fc3f7; }
.score-panel.opponent .score-value { color: #ef5350; }
#centerHud {
    text-align: center; flex: 1;
}
#roundDisplay {
    font-size: 20px; color: #ffd54f; background: rgba(0,0,0,0.7);
    padding: 8px 24px; border-radius: 8px; display: inline-block;
    border: 1px solid #ffd54f;
}
#statusText {
    font-size: 36px; color: #fff; margin-top: 15px;
    text-shadow: 0 0 20px rgba(255,213,79,0.8), 0 0 40px rgba(255,213,79,0.4);
    opacity: 0; transition: opacity 0.3s;
    min-height: 50px;
}
#statusText.visible { opacity: 1; }
#startBtn, #resetBtn {
    pointer-events: all; cursor: pointer;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 28px; padding: 15px 50px;
    border: 3px solid #ffd54f; border-radius: 12px;
    background: linear-gradient(135deg, #ff6f00, #ff8f00);
    color: #fff; text-transform: uppercase; letter-spacing: 3px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    box-shadow: 0 0 30px rgba(255,111,0,0.5);
    transition: all 0.3s;
    margin-top: 20px;
}
#startBtn:hover, #resetBtn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 50px rgba(255,111,0,0.8);
}
#resetBtn { display: none; background: linear-gradient(135deg, #c62828, #e53935); border-color: #ef5350; }
#controls {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #666; font-size: 12px; text-align: center;
}
</style>
</head>
<body>

<div id="hud">
    <div class="score-panel player">
        <div class="score-label">Player</div>
        <div class="score-value" id="playerScore">0</div>
    </div>
    <div id="centerHud">
        <div id="roundDisplay">Round 1</div>
        <div id="statusText"></div>
        <button id="startBtn">⚔️ FIGHT! ⚔️</button>
        <button id="resetBtn">🔄 Reset Game</button>
    </div>
    <div class="score-panel opponent">
        <div class="score-label">Opponent</div>
        <div class="score-value" id="opponentScore">0</div>
    </div>
</div>

<div id="controls">WASD to move | Push your opponent out of the ring!</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
window.__3D_STATE__ = {
    gameStarted: false,
    roundActive: false,
    currentRound: 1,
    playerScore: 0,
    opponentScore: 0,
    playerPosition: { x: -2, y: 1, z: 0 },
    opponentPosition: { x: 2, y: 1, z: 0 },
    playerInRing: true,
    opponentInRing: true,
    collisionCount: 0,
    activeParticleCount: 0,
    gameOver: false,
    winner: 'none',
    lastCollisionTime: 0,
    playerDistanceFromCenter: 2,
    opponentDistanceFromCenter: 2
};

const state = window.__3D_STATE__;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

const pointLight = new THREE.PointLight(0xffd54f, 0.3, 20);
pointLight.position.set(0, 5, 0);
scene.add(pointLight);

// --- Dohyo (Ring) ---
const ringGeom = new THREE.CylinderGeometry(5, 5, 0.3, 64);
const ringMat = new THREE.MeshStandardMaterial({ color: 0xD2B48C, roughness: 0.8, metalness: 0.1 });
const ring = new THREE.Mesh(ringGeom, ringMat);
ring.position.y = 0;
ring.receiveShadow = true;
scene.add(ring);

// Ring border (torus)
const torusGeom = new THREE.TorusGeometry(4.8, 0.08, 16, 64);
const torusMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3, metalness: 0.2 });
const torus = new THREE.Mesh(torusGeom, torusMat);
torus.rotation.x = -Math.PI / 2;
torus.position.y = 0.16;
scene.add(torus);

// Inner ring markings
const innerTorusGeom = new THREE.TorusGeometry(4.5, 0.04, 16, 64);
const innerTorusMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.9 });
const innerTorus = new THREE.Mesh(innerTorusGeom, innerTorusMat);
innerTorus.rotation.x = -Math.PI / 2;
innerTorus.position.y = 0.16;
scene.add(innerTorus);

// Ground plane
const groundGeom = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 1 });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.15;
ground.receiveShadow = true;
scene.add(ground);

// --- Player Wrestler ---
const playerGroup = new THREE.Group();
playerGroup.position.set(-2, 1, 0);
scene.add(playerGroup);

// Player body (fallback sphere, replaced by GLTF if loaded)
const playerBodyGeom = new THREE.SphereGeometry(0.7, 32, 32);
const playerBodyMat = new THREE.MeshStandardMaterial({ color: 0x4fc3f7, roughness: 0.3, metalness: 0.6 });
const playerBody = new THREE.Mesh(playerBodyGeom, playerBodyMat);
playerBody.castShadow = true;
playerGroup.add(playerBody);

// Player mass aura
const playerAuraGeom = new THREE.SphereGeometry(1.2, 32, 32);
const playerAuraMat = new THREE.MeshStandardMaterial({
    color: 0x4fc3f7, transparent: true, opacity: 0.15, side: THREE.DoubleSide
});
const playerAura = new THREE.Mesh(playerAuraGeom, playerAuraMat);
playerGroup.add(playerAura);

// Load GLTF for player
let playerModel = null;
const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
    (gltf) => {
        playerModel = gltf.scene;
        playerModel.scale.set(0.8, 0.8, 0.8);
        playerModel.traverse((child) => {
            if (child.isMesh) { child.castShadow = true; }
        });
        playerGroup.remove(playerBody);
        playerGroup.add(playerModel);
    },
    undefined,
    (err) => {
        console.warn('GLTF load failed, using fallback sphere:', err);
    }
);

// --- Opponent Wrestler ---
const opponentGroup = new THREE.Group();
opponentGroup.position.set(2, 1, 0);
scene.add(opponentGroup);

const opponentBodyGeom = new THREE.SphereGeometry(0.7, 32, 32);
const opponentBodyMat = new THREE.MeshStandardMaterial({ color: 0xef5350, roughness: 0.2, metalness: 0.8 });
const opponentBody = new THREE.Mesh(opponentBodyGeom, opponentBodyMat);
opponentBody.castShadow = true;
opponentGroup.add(opponentBody);

// Opponent eyes
const eyeGeom = new THREE.SphereGeometry(0.1, 16, 16);
const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.5 });
const leftEye = new THREE.Mesh(eyeGeom, eyeMat);
leftEye.position.set(-0.25, 0.15, -0.6);
opponentGroup.add(leftEye);
const rightEye = new THREE.Mesh(eyeGeom, eyeMat);
rightEye.position.set(0.25, 0.15, -0.6);
opponentGroup.add(rightEye);

const pupilGeom = new THREE.SphereGeometry(0.05, 16, 16);
const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
const leftPupil = new THREE.Mesh(pupilGeom, pupilMat);
leftPupil.position.set(-0.25, 0.15, -0.68);
opponentGroup.add(leftPupil);
const rightPupil = new THREE.Mesh(pupilGeom, pupilMat);
rightPupil.position.set(0.25, 0.15, -0.68);
opponentGroup.add(rightPupil);

// Opponent mass aura
const opponentAuraGeom = new THREE.SphereGeometry(1.2, 32, 32);
const opponentAuraMat = new THREE.MeshStandardMaterial({
    color: 0xef5350, transparent: true, opacity: 0.15, side: THREE.DoubleSide
});
const opponentAura = new THREE.Mesh(opponentAuraGeom, opponentAuraMat);
opponentGroup.add(opponentAura);

// --- Particle System ---
const particles = [];

class Particle {
    constructor(position, velocity, color, size, lifetime, gravity = true) {
        const geom = new THREE.SphereGeometry(size, 8, 8);
        const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
        this.mesh = new THREE.Mesh(geom, mat);
        this.mesh.position.copy(position);
        this.velocity = velocity.clone();
        this.lifetime = lifetime;
        this.maxLifetime = lifetime;
        this.gravity = gravity;
        this.alive = true;
        scene.add(this.mesh);
    }

    update(dt) {
        if (!this.alive) return;
        this.lifetime -= dt;
        if (this.lifetime <= 0) {
            this.alive = false;
            scene.remove(this.mesh);
            this.mesh.geometry.dispose();
            this.mesh.material.dispose();
            return;
        }
        this.mesh.position.add(this.velocity.clone().multiplyScalar(dt));
        if (this.gravity) {
            this.velocity.y -= 5 * dt;
        }
        this.mesh.material.opacity = Math.max(0, this.lifetime / this.maxLifetime);
        this.mesh.scale.setScalar(this.lifetime / this.maxLifetime);
    }
}

function spawnCollisionParticles(position) {
    const count = 20 + Math.floor(Math.random() * 11);
    for (let i = 0; i < count; i++) {
        const vel = new THREE.Vector3(
            (Math.random() - 0.5) * 8,
            Math.random() * 6 + 2,
            (Math.random() - 0.5) * 8
        );
        const colors = [0xffd54f, 0xff8f00, 0xffab00, 0xffe082, 0xff6f00];
        const color = colors[Math.floor(Math.random() * colors.length)];
        const size = 0.05 + Math.random() * 0.1;
        particles.push(new Particle(position.clone(), vel, color, size, 0.8 + Math.random() * 0.4));
    }
}

function spawnExplosionParticles(position) {
    for (let i = 0; i < 50; i++) {
        const vel = new THREE.Vector3(
            (Math.random() - 0.5) * 12,
            Math.random() * 8 + 3,
            (Math.random() - 0.5) * 12
        );
        const colors = [0xef5350, 0xf44336, 0xff1744, 0xff5252, 0xd32f2f];
        const color = colors[Math.floor(Math.random() * colors.length)];
        const size = 0.08 + Math.random() * 0.15;
        particles.push(new Particle(position.clone(), vel, color, size, 1.0 + Math.random() * 0.5));
    }
}

function spawnDustParticles(position) {
    const vel = new THREE.Vector3(
        (Math.random() - 0.5) * 0.5,
        Math.random() * 1.5 + 0.5,
        (Math.random() - 0.5) * 0.5
    );
    const colors = [0x8B7355, 0xA0926B, 0xD2B48C];
    const color = colors[Math.floor(Math.random() * colors.length)];
    particles.push(new Particle(
        new THREE.Vector3(position.x + (Math.random() - 0.5) * 0.5, 0.2, position.z + (Math.random() - 0.5) * 0.5),
        vel, color, 0.03 + Math.random() * 0.04, 0.5 + Math.random() * 0.5, false
    ));
}

// --- Input ---
const keys = {};
window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

// --- Game Logic ---
let playerVelocity = new THREE.Vector3();
let opponentVelocity = new THREE.Vector3();
let aiChargeTimer = 0;
let aiCharging = false;
let aiChargeDuration = 0;
let roundEndTimer = 0;
let roundStartTimer = 0;
let dustTimer = 0;
let collisionCooldown = 0;

const PLAYER_START = new THREE.Vector3(-2, 1, 0);
const OPPONENT_START = new THREE.Vector3(2, 1, 0);
const RING_RADIUS = 4.8;
const CLAMP_RADIUS = 6;
const COLLISION_DIST = 2.0;
const PUSH_FORCE = 0.15;
const WIN_SCORE = 3;

function resetPositions() {
    playerGroup.position.copy(PLAYER_START);
    opponentGroup.position.copy(OPPONENT_START);
    playerVelocity.set(0, 0, 0);
    opponentVelocity.set(0, 0, 0);
    aiChargeTimer = 0;
    aiCharging = false;
}

function showStatus(text, duration = 1500) {
    const el = document.getElementById('statusText');
    el.textContent = text;
    el.classList.add('visible');
    setTimeout(() => { el.classList.remove('visible'); }, duration);
}

function startRound() {
    resetPositions();
    state.roundActive = false;
    roundStartTimer = 1.5;
    showStatus('🥋 ROUND START! 🥋', 1500);
    document.getElementById('roundDisplay').textContent = `Round ${state.currentRound}`;
    setTimeout(() => {
        if (!state.gameOver) {
            state.roundActive = true;
        }
    }, 1500);
}

function endRound(winner) {
    state.roundActive = false;
    if (winner === 'player') {
        state.playerScore++;
        showStatus('💪 Player Wins Round!', 2000);
        spawnExplosionParticles(opponentGroup.position.clone());
    } else {
        state.opponentScore++;
        showStatus('😤 Opponent Wins Round!', 2000);
        spawnExplosionParticles(playerGroup.position.clone());
    }
    document.getElementById('playerScore').textContent = state.playerScore;
    document.getElementById('opponentScore').textContent = state.opponentScore;

    if (state.playerScore >= WIN_SCORE || state.opponentScore >= WIN_SCORE) {
        state.gameOver = true;
        state.winner = state.playerScore >= WIN_SCORE ? 'player' : 'opponent';
        setTimeout(() => {
            showStatus(state.winner === 'player' ? '🏆 PLAYER WINS THE MATCH! 🏆' : '💀 OPPONENT WINS THE MATCH! 💀', 5000);
            document.getElementById('resetBtn').style.display = 'inline-block';
        }, 2000);
    } else {
        state.currentRound++;
        setTimeout(() => { startRound(); }, 2000);
    }
}

function resetGame() {
    state.gameStarted = false;
    state.roundActive = false;
    state.currentRound = 1;
    state.playerScore = 0;
    state.opponentScore = 0;
    state.collisionCount = 0;
    state.gameOver = false;
    state.winner = 'none';
    state.lastCollisionTime = 0;
    document.getElementById('playerScore').textContent = '0';
    document.getElementById('opponentScore').textContent = '0';
    document.getElementById('roundDisplay').textContent = 'Round 1';
    document.getElementById('startBtn').style.display = 'inline-block';
    document.getElementById('resetBtn').style.display = 'none';
    resetPositions();
    // Clear particles
    for (const p of particles) {
        if (p.alive) {
            scene.remove(p.mesh);
            p.mesh.geometry.dispose();
            p.mesh.material.dispose();
            p.alive = false;
        }
    }
    particles.length = 0;
}

// --- UI Events ---
document.getElementById('startBtn').addEventListener('click', () => {
    if (!state.gameStarted) {
        state.gameStarted = true;
        document.getElementById('startBtn').style.display = 'none';
        startRound();
    }
});

document.getElementById('resetBtn').addEventListener('click', () => {
    resetGame();
});

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);

    if (state.gameStarted && state.roundActive) {
        // Player movement
        let playerMoving = false;
        const moveSpeed = 0.08;
        if (keys['w'] || keys['arrowup']) { playerGroup.position.z -= moveSpeed; playerMoving = true; }
        if (keys['s'] || keys['arrowdown']) { playerGroup.position.z += moveSpeed; playerMoving = true; }
        if (keys['a'] || keys['arrowleft']) { playerGroup.position.x -= moveSpeed; playerMoving = true; }
        if (keys['d'] || keys['arrowright']) { playerGroup.position.x += moveSpeed; playerMoving = true; }

        // AI movement
        aiChargeTimer += dt;
        let aiSpeed = 0.03;
        if (aiChargeTimer >= 3) {
            aiCharging = true;
            aiChargeDuration = 0.5;
            aiChargeTimer = 0;
        }
        if (aiCharging) {
            aiSpeed = 0.1;
            aiChargeDuration -= dt;
            if (aiChargeDuration <= 0) aiCharging = false;
        }

        const toPlayer = new THREE.Vector3().subVectors(playerGroup.position, opponentGroup.position);
        toPlayer.y = 0;
        if (toPlayer.length() > 0.1) {
            toPlayer.normalize();
            opponentGroup.position.x += toPlayer.x * aiSpeed;
            opponentGroup.position.z += toPlayer.z * aiSpeed;
        }

        // Apply velocities (from pushes)
        playerGroup.position.x += playerVelocity.x;
        playerGroup.position.z += playerVelocity.z;
        opponentGroup.position.x += opponentVelocity.x;
        opponentGroup.position.z += opponentVelocity.z;

        // Dampen velocities
        playerVelocity.multiplyScalar(0.92);
        opponentVelocity.multiplyScalar(0.92);

        // Clamp positions
        const playerDist2D = Math.sqrt(playerGroup.position.x ** 2 + playerGroup.position.z ** 2);
        if (playerDist2D > CLAMP_RADIUS) {
            const angle = Math.atan2(playerGroup.position.z, playerGroup.position.x);
            playerGroup.position.x = Math.cos(angle) * CLAMP_RADIUS;
            playerGroup.position.z = Math.sin(angle) * CLAMP_RADIUS;
        }
        const oppDist2D = Math.sqrt(opponentGroup.position.x ** 2 + opponentGroup.position.z ** 2);
        if (oppDist2D > CLAMP_RADIUS) {
            const angle = Math.atan2(opponentGroup.position.z, opponentGroup.position.x);
            opponentGroup.position.x = Math.cos(angle) * CLAMP_RADIUS;
            opponentGroup.position.z = Math.sin(angle) * CLAMP_RADIUS;
        }

        // Keep Y fixed
        playerGroup.position.y = 1;
        opponentGroup.position.y = 1;

        // Collision detection
        collisionCooldown -= dt;
        const diff = new THREE.Vector3().subVectors(playerGroup.position, opponentGroup.position);
        diff.y = 0;
        const dist = diff.length();

        if (dist < COLLISION_DIST && collisionCooldown <= 0) {
            collisionCooldown = 0.3;
            state.collisionCount++;
            state.lastCollisionTime = Date.now();

            const collisionPoint = new THREE.Vector3().addVectors(playerGroup.position, opponentGroup.position).multiplyScalar(0.5);
            spawnCollisionParticles(collisionPoint);

            // Push calculation based on momentum
            const playerMomentum = Math.sqrt(playerVelocity.x ** 2 + playerVelocity.z ** 2) + (playerMoving ? 0.08 : 0);
            const opponentMomentum = Math.sqrt(opponentVelocity.x ** 2 + opponentVelocity.z ** 2) + aiSpeed;

            const pushDir = diff.clone().normalize();

            if (playerMomentum >= opponentMomentum) {
                // Player pushes opponent
                opponentVelocity.x -= pushDir.x * PUSH_FORCE * (1 + playerMomentum * 2);
                opponentVelocity.z -= pushDir.z * PUSH_FORCE * (1 + playerMomentum * 2);
                playerVelocity.x += pushDir.x * PUSH_FORCE * 0.3;
                playerVelocity.z += pushDir.z * PUSH_FORCE * 0.3;
            } else {
                // Opponent pushes player
                playerVelocity.x += pushDir.x * PUSH_FORCE * (1 + opponentMomentum * 2);
                playerVelocity.z += pushDir.z * PUSH_FORCE * (1 + opponentMomentum * 2);
                opponentVelocity.x -= pushDir.x * PUSH_FORCE * 0.3;
                opponentVelocity.z -= pushDir.z * PUSH_FORCE * 0.3;
            }

            // Separate wrestlers
            if (dist < COLLISION_DIST) {
                const overlap = COLLISION_DIST - dist;
                const sep = pushDir.clone().multiplyScalar(overlap * 0.5);
                playerGroup.position.add(sep);
                opponentGroup.position.sub(sep);
            }
        }

        // Check ring out
        const pDist = Math.sqrt(playerGroup.position.x ** 2 + playerGroup.position.z ** 2);
        const oDist = Math.sqrt(opponentGroup.position.x ** 2 + opponentGroup.position.z ** 2);
        state.playerInRing = pDist <= RING_RADIUS;
        state.opponentInRing = oDist <= RING_RADIUS;

        if (!state.playerInRing) {
            endRound('opponent');
        } else if (!state.opponentInRing) {
            endRound('player');
        }

        // Dust particles
        dustTimer += dt;
        if (dustTimer > 0.05) {
            dustTimer = 0;
            if (playerMoving) {
                spawnDustParticles(playerGroup.position);
            }
            // Opponent always moving
            spawnDustParticles(opponentGroup.position);
        }
    }

    // Update particles
    let activeCount = 0;
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update(dt);
        if (particles[i].alive) {
            activeCount++;
        } else {
            particles.splice(i, 1);
        }
    }

    // Animate auras
    const time = clock.elapsedTime;
    playerAuraMat.opacity = 0.1 + Math.sin(time * 3) * 0.05;
    opponentAuraMat.opacity = 0.1 + Math.sin(time * 3 + 1) * 0.05;
    if (aiCharging) {
        opponentAuraMat.opacity = 0.3;
        opponentAuraMat.color.setHex(0xff1744);
    } else {
        opponentAuraMat.color.setHex(0xef5350);
    }

    // Opponent face player
    if (state.roundActive) {
        const lookDir = new THREE.Vector3().subVectors(playerGroup.position, opponentGroup.position);
        lookDir.y = 0;
        if (lookDir.length() > 0.01) {
            const angle = Math.atan2(lookDir.x, lookDir.z);
            opponentGroup.rotation.y = angle;
        }
    }

    // Bobbing animation
    if (playerModel) {
        playerModel.rotation.y += dt * 0.5;
    }
    opponentBody.position.y = Math.sin(time * 4) * 0.05;

    // Update state
    state.playerPosition = { x: playerGroup.position.x, y: playerGroup.position.y, z: playerGroup.position.z };
    state.opponentPosition = { x: opponentGroup.position.x, y: opponentGroup.position.y, z: opponentGroup.position.z };
    state.playerDistanceFromCenter = Math.sqrt(playerGroup.position.x ** 2 + playerGroup.position.z ** 2);
    state.opponentDistanceFromCenter = Math.sqrt(opponentGroup.position.x ** 2 + opponentGroup.position.z ** 2);
    state.playerInRing = state.playerDistanceFromCenter <= RING_RADIUS;
    state.opponentInRing = state.opponentDistanceFromCenter <= RING_RADIUS;
    state.activeParticleCount = activeCount;

    renderer.render(scene, camera);
}

animate();

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
