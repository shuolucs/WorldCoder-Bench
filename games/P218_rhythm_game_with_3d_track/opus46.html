<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Rhythm Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
}
#score-display {
    position: absolute;
    top: 20px; left: 20px;
    color: #fff;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(0,255,255,0.5);
}
#combo-display {
    position: absolute;
    top: 20px; right: 20px;
    color: #fff;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,165,0,0.5);
}
#multiplier-display {
    position: absolute;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    color: #ffdd00;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,221,0,0.5);
}
#status-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 36px;
    font-weight: bold;
    text-align: center;
    text-shadow: 0 0 20px rgba(255,255,255,0.7);
    line-height: 1.6;
    white-space: pre-line;
}
#key-hints {
    position: absolute;
    bottom: 30px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.7);
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 40px;
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
}
.judgment-flash {
    animation: judgmentPop 0.5s ease-out;
}
@keyframes judgmentPop {
    0% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
}
</style>
</head>
<body>

<div id="hud">
    <div id="score-display">Score: 0</div>
    <div id="combo-display">Combo: 0</div>
    <div id="multiplier-display">Multiplier: 1x</div>
    <div id="status-text">Press SPACE to Start</div>
    <div id="key-hints">D  F  J  K</div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);
scene.fog = new THREE.Fog(0x111111, 30, 50);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 10);
camera.lookAt(0, 0, -10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
scene.add(directionalLight);

// ============ TRACK ============
const trackGeometry = new THREE.PlaneGeometry(4, 50);
const trackMaterial = new THREE.MeshStandardMaterial({ color: 0x222222, side: THREE.DoubleSide });
const track = new THREE.Mesh(trackGeometry, trackMaterial);
track.rotation.x = -Math.PI / 2;
track.position.set(0, 0, -20); // center so it goes from z=5 to z=-45
track.receiveShadow = true;
scene.add(track);

// Lane dividers
const laneDividerMaterial = new THREE.MeshBasicMaterial({ color: 0x444444 });
for (let i = -1; i <= 1; i++) {
    const divider = new THREE.Mesh(
        new THREE.BoxGeometry(0.02, 0.01, 50),
        laneDividerMaterial
    );
    divider.position.set(i, 0.01, -20);
    scene.add(divider);
}

// Track borders
const borderMaterial = new THREE.MeshBasicMaterial({ color: 0x666666 });
for (let side of [-2, 2]) {
    const border = new THREE.Mesh(
        new THREE.BoxGeometry(0.05, 0.1, 50),
        borderMaterial
    );
    border.position.set(side, 0.05, -20);
    scene.add(border);
}

// Hit zone line
const hitZoneGeometry = new THREE.BoxGeometry(4, 0.05, 0.2);
const hitZoneMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.8 });
const hitZone = new THREE.Mesh(hitZoneGeometry, hitZoneMaterial);
hitZone.position.set(0, 0.025, 3);
scene.add(hitZone);

// Hit zone glow
const hitZoneGlow = new THREE.Mesh(
    new THREE.BoxGeometry(4.2, 0.02, 0.6),
    new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.2 })
);
hitZoneGlow.position.set(0, 0.01, 3);
scene.add(hitZoneGlow);

// Lane indicators at hit zone
const laneColors = [0xff0000, 0x0000ff, 0xffff00, 0x00ff00];
const laneXPositions = [-1.5, -0.5, 0.5, 1.5];
const laneIndicators = [];

for (let i = 0; i < 4; i++) {
    const indicator = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 0.02, 0.3),
        new THREE.MeshBasicMaterial({ color: laneColors[i], transparent: true, opacity: 0.3 })
    );
    indicator.position.set(laneXPositions[i], 0.015, 3);
    scene.add(indicator);
    laneIndicators.push(indicator);
}

// ============ FISH (PLAYER AVATAR) ============
let fishModel = null;
let fishBaseY = 0.5;

// Try to load the fish model, fall back to a simple mesh
const loader = new GLTFLoader();
loader.load(
    '._BarramundiFish.glb',
    (gltf) => {
        fishModel = gltf.scene;
        fishModel.scale.set(0.8, 0.8, 0.8);
        fishModel.position.set(0, fishBaseY, 5);
        fishModel.rotation.y = Math.PI;
        scene.add(fishModel);
    },
    undefined,
    (error) => {
        console.log('Could not load fish model, using fallback geometry');
        createFallbackFish();
    }
);

function createFallbackFish() {
    const fishGroup = new THREE.Group();

    // Body
    const bodyGeom = new THREE.ConeGeometry(0.4, 1.2, 8);
    bodyGeom.rotateZ(Math.PI / 2);
    bodyGeom.rotateY(Math.PI);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff8844, metalness: 0.3, roughness: 0.6 });
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    fishGroup.add(body);

    // Tail
    const tailGeom = new THREE.ConeGeometry(0.3, 0.5, 4);
    tailGeom.rotateZ(-Math.PI / 2);
    const tailMat = new THREE.MeshStandardMaterial({ color: 0xff6622 });
    const tail = new THREE.Mesh(tailGeom, tailMat);
    tail.position.set(0, 0, 0.8);
    fishGroup.add(tail);

    // Eyes
    const eyeGeom = new THREE.SphereGeometry(0.08, 8, 8);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const pupilGeom = new THREE.SphereGeometry(0.04, 8, 8);
    const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });

    for (let side of [-1, 1]) {
        const eye = new THREE.Mesh(eyeGeom, eyeMat);
        eye.position.set(side * 0.25, 0.15, -0.3);
        fishGroup.add(eye);
        const pupil = new THREE.Mesh(pupilGeom, pupilMat);
        pupil.position.set(side * 0.3, 0.15, -0.35);
        fishGroup.add(pupil);
    }

    // Dorsal fin
    const finGeom = new THREE.ConeGeometry(0.15, 0.4, 4);
    const finMat = new THREE.MeshStandardMaterial({ color: 0xff5500 });
    const fin = new THREE.Mesh(finGeom, finMat);
    fin.position.set(0, 0.4, 0);
    fishGroup.add(fin);

    fishGroup.scale.set(0.8, 0.8, 0.8);
    fishGroup.position.set(0, fishBaseY, 5);
    fishGroup.rotation.y = Math.PI;
    scene.add(fishGroup);
    fishModel = fishGroup;
}

// ============ NOTE CHART ============
const noteChart = [
    { time: 1, lane: 0 },
    { time: 1.5, lane: 2 },
    { time: 2, lane: 1 },
    { time: 2.5, lane: 3 },
    { time: 3, lane: 0 },
    { time: 3.5, lane: 1 },
    { time: 4, lane: 2 },
    { time: 4.5, lane: 3 },
    { time: 5, lane: 0 },
    { time: 5.5, lane: 2 },
    { time: 6, lane: 1 },
    { time: 6.5, lane: 3 },
    { time: 7, lane: 0 },
    { time: 7.5, lane: 1 }
];

const NOTE_SPEED = 8;
const SPAWN_Z = -40;
const HIT_Z = 3;
const NOTE_SIZE = 0.6;

// ============ GAME STATE ============
const state = {
    gameState: 'waiting',
    score: 0,
    combo: 0,
    maxCombo: 0,
    multiplier: 1,
    totalHits: 0,
    totalMisses: 0,
    totalNotes: 14,
    perfectCount: 0,
    greatCount: 0,
    goodCount: 0,
    elapsedTime: 0,
    activeNotes: 0,
    fishY: fishBaseY,
    lastJudgment: '',
    notesSpawned: 0,
    noteSpeed: 8,
    accuracy: 0,
    lanePressCount: [0, 0, 0, 0]
};

window.__3D_STATE__ = state;

// ============ ACTIVE NOTES ============
const activeNotes = [];
const particles = [];
let nextNoteIndex = 0;
let gameStartTime = 0;
let judgmentTimeout = null;

// DOM elements
const scoreDisplay = document.getElementById('score-display');
const comboDisplay = document.getElementById('combo-display');
const multiplierDisplay = document.getElementById('multiplier-display');
const statusText = document.getElementById('status-text');
const keyHints = document.getElementById('key-hints');

// ============ NOTE CREATION ============
function createNote(lane) {
    const geometry = new THREE.BoxGeometry(NOTE_SIZE, NOTE_SIZE, NOTE_SIZE);
    const material = new THREE.MeshStandardMaterial({
        color: laneColors[lane],
        emissive: laneColors[lane],
        emissiveIntensity: 0.3,
        metalness: 0.5,
        roughness: 0.3
    });
    const note = new THREE.Mesh(geometry, material);
    note.position.set(laneXPositions[lane], NOTE_SIZE / 2 + 0.01, SPAWN_Z);
    note.castShadow = true;
    note.userData.lane = lane;
    note.userData.hit = false;
    scene.add(note);

    // Add glow
    const glowMat = new THREE.MeshBasicMaterial({
        color: laneColors[lane],
        transparent: true,
        opacity: 0.2
    });
    const glow = new THREE.Mesh(new THREE.BoxGeometry(NOTE_SIZE + 0.2, NOTE_SIZE + 0.2, NOTE_SIZE + 0.2), glowMat);
    note.add(glow);

    return note;
}

// ============ PARTICLE SYSTEM ============
function createHitParticles(position, color) {
    const particleGroup = [];
    for (let i = 0; i < 5; i++) {
        const geom = new THREE.SphereGeometry(0.08, 6, 6);
        const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 1 });
        const particle = new THREE.Mesh(geom, mat);
        particle.position.copy(position);
        const angle = (i / 5) * Math.PI * 2;
        const speed = 3 + Math.random() * 2;
        particle.userData.velocity = new THREE.Vector3(
            Math.cos(angle) * speed,
            (Math.random() * 2 + 1) * speed * 0.5,
            Math.sin(angle) * speed * 0.5
        );
        particle.userData.life = 0.3;
        particle.userData.maxLife = 0.3;
        scene.add(particle);
        particleGroup.push(particle);
    }
    particles.push(...particleGroup);
}

// ============ LANE FLASH ============
function flashLane(lane, color) {
    const indicator = laneIndicators[lane];
    if (indicator) {
        indicator.material.opacity = 0.8;
        setTimeout(() => { indicator.material.opacity = 0.3; }, 150);
    }
}

// ============ UPDATE MULTIPLIER ============
function updateMultiplier() {
    if (state.combo >= 30) state.multiplier = 4;
    else if (state.combo >= 20) state.multiplier = 3;
    else if (state.combo >= 10) state.multiplier = 2;
    else state.multiplier = 1;
}

// ============ SHOW JUDGMENT ============
function showJudgment(text, color) {
    statusText.textContent = text;
    statusText.style.color = color;
    statusText.style.fontSize = '48px';
    statusText.classList.remove('judgment-flash');
    void statusText.offsetWidth; // trigger reflow
    statusText.classList.add('judgment-flash');

    if (judgmentTimeout) clearTimeout(judgmentTimeout);
    judgmentTimeout = setTimeout(() => {
        if (state.gameState === 'playing') {
            statusText.textContent = '';
        }
    }, 400);
}

// ============ HIT NOTE ============
function hitNote(noteIndex, lane) {
    const note = activeNotes[noteIndex];
    const noteZ = note.position.z;

    let judgment, points, color;

    if (noteZ >= 2.8 && noteZ <= 3.2) {
        judgment = 'perfect';
        points = 100;
        color = '#ffdd00';
        state.perfectCount++;
    } else if (noteZ >= 2.4 && noteZ <= 3.6) {
        judgment = 'great';
        points = 50;
        color = '#00ddff';
        state.greatCount++;
    } else {
        judgment = 'good';
        points = 25;
        color = '#88ff88';
        state.goodCount++;
    }

    state.combo++;
    if (state.combo > state.maxCombo) state.maxCombo = state.combo;
    updateMultiplier();

    const earnedPoints = points * state.multiplier;
    state.score += earnedPoints;
    state.totalHits++;
    state.lastJudgment = judgment;

    showJudgment(judgment.toUpperCase() + '!', color);
    createHitParticles(note.position.clone(), laneColors[lane]);
    flashLane(lane, laneColors[lane]);

    // Remove note
    scene.remove(note);
    activeNotes.splice(noteIndex, 1);

    updateHUD();
}

// ============ MISS ============
function miss(fromKeyPress = false) {
    state.combo = 0;
    state.totalMisses++;
    updateMultiplier();
    state.lastJudgment = 'miss';

    if (fromKeyPress) {
        showJudgment('MISS!', '#ff4444');
    }

    updateHUD();
}

// ============ UPDATE HUD ============
function updateHUD() {
    scoreDisplay.textContent = `Score: ${state.score}`;
    comboDisplay.textContent = `Combo: ${state.combo}`;
    comboDisplay.style.color = state.combo >= 30 ? '#ff00ff' : state.combo >= 20 ? '#ffdd00' : state.combo >= 10 ? '#00ddff' : '#ffffff';
    multiplierDisplay.textContent = `Multiplier: ${state.multiplier}x`;
    multiplierDisplay.style.color = state.multiplier >= 4 ? '#ff00ff' : state.multiplier >= 3 ? '#ffdd00' : state.multiplier >= 2 ? '#00ddff' : '#ffffff';

    const totalProcessed = state.totalHits + state.totalMisses;
    state.accuracy = totalProcessed > 0 ? Math.round((state.totalHits / totalProcessed) * 100) : 0;
    state.activeNotes = activeNotes.length;
}

// ============ SHOW RESULTS ============
function showResults() {
    state.gameState = 'finished';
    const totalProcessed = state.totalHits + state.totalMisses;
    state.accuracy = totalProcessed > 0 ? Math.round((state.totalHits / totalProcessed) * 100) : 0;

    let grade = 'F';
    if (state.accuracy >= 95) grade = 'S';
    else if (state.accuracy >= 90) grade = 'A';
    else if (state.accuracy >= 80) grade = 'B';
    else if (state.accuracy >= 70) grade = 'C';
    else if (state.accuracy >= 60) grade = 'D';

    statusText.style.fontSize = '28px';
    statusText.style.color = '#ffffff';
    statusText.textContent = `🎵 RESULTS 🎵\n\nScore: ${state.score}\nMax Combo: ${state.maxCombo}\nAccuracy: ${state.accuracy}%\n\nPerfect: ${state.perfectCount}\nGreat: ${state.greatCount}\nGood: ${state.goodCount}\nMiss: ${state.totalMisses}\n\nGrade: ${grade}\n\nPress SPACE to Restart`;
}

// ============ INPUT ============
const keyLaneMap = { 'd': 0, 'f': 1, 'j': 2, 'k': 3 };

document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();

    if (key === ' ') {
        e.preventDefault();
        if (state.gameState === 'waiting' || state.gameState === 'finished') {
            startGame();
        }
        return;
    }

    if (state.gameState !== 'playing') return;

    if (key in keyLaneMap) {
        const lane = keyLaneMap[key];
        state.lanePressCount[lane]++;
        flashLane(lane);

        // Find hittable note in this lane
        let bestNoteIndex = -1;
        let bestDistance = Infinity;

        for (let i = 0; i < activeNotes.length; i++) {
            const note = activeNotes[i];
            if (note.userData.lane === lane) {
                const z = note.position.z;
                if (z >= 2.0 && z <= 4.0) {
                    const dist = Math.abs(z - HIT_Z);
                    if (dist < bestDistance) {
                        bestDistance = dist;
                        bestNoteIndex = i;
                    }
                }
            }
        }

        if (bestNoteIndex >= 0) {
            hitNote(bestNoteIndex, lane);
        } else {
            miss(true);
        }
    }
});

// ============ START GAME ============
function startGame() {
    // Reset state
    state.gameState = 'playing';
    state.score = 0;
    state.combo = 0;
    state.maxCombo = 0;
    state.multiplier = 1;
    state.totalHits = 0;
    state.totalMisses = 0;
    state.perfectCount = 0;
    state.greatCount = 0;
    state.goodCount = 0;
    state.elapsedTime = 0;
    state.lastJudgment = '';
    state.notesSpawned = 0;
    state.accuracy = 0;
    state.lanePressCount = [0, 0, 0, 0];

    // Clear active notes
    for (const note of activeNotes) {
        scene.remove(note);
    }
    activeNotes.length = 0;

    // Clear particles
    for (const p of particles) {
        scene.remove(p);
    }
    particles.length = 0;

    nextNoteIndex = 0;
    gameStartTime = performance.now() / 1000;

    statusText.textContent = '';
    statusText.style.fontSize = '36px';
    updateHUD();
}

// ============ ANIMATION LOOP ============
let lastTime = performance.now() / 1000;

function animate() {
    requestAnimationFrame(animate);

    const now = performance.now() / 1000;
    const delta = Math.min(now - lastTime, 0.1); // cap delta
    lastTime = now;

    // Fish bobbing
    if (fishModel) {
        const bobTime = now * Math.PI; // period ~2 seconds
        const bobY = fishBaseY + Math.sin(bobTime) * 0.2;
        fishModel.position.y = bobY;
        state.fishY = bobY;
    }

    // Hit zone glow pulse
    hitZoneGlow.material.opacity = 0.15 + Math.sin(now * 4) * 0.1;

    if (state.gameState === 'playing') {
        state.elapsedTime = now - gameStartTime;

        // Spawn notes
        // Notes need to arrive at z=3 at the specified time
        // Travel distance = HIT_Z - SPAWN_Z = 3 - (-40) = 43
        // Travel time = 43 / NOTE_SPEED = 5.375 seconds
        // So spawn time = note.time - travelTime
        const travelTime = (HIT_Z - SPAWN_Z) / NOTE_SPEED;

        while (nextNoteIndex < noteChart.length) {
            const chartNote = noteChart[nextNoteIndex];
            const spawnTime = chartNote.time - travelTime;

            if (state.elapsedTime >= spawnTime) {
                const note = createNote(chartNote.lane);
                activeNotes.push(note);
                state.notesSpawned++;
                nextNoteIndex++;
            } else {
                break;
            }
        }

        // Move notes
        for (let i = activeNotes.length - 1; i >= 0; i--) {
            const note = activeNotes[i];
            note.position.z += NOTE_SPEED * delta;

            // Rotate note for visual flair
            note.rotation.y += delta * 2;
            note.rotation.x += delta * 1.5;

            // Note passed the hit zone
            if (note.position.z > 5) {
                scene.remove(note);
                activeNotes.splice(i, 1);
                miss(false);
                showJudgment('MISS!', '#ff4444');
            }
        }

        state.activeNotes = activeNotes.length;

        // Check if game is finished
        if (nextNoteIndex >= noteChart.length && activeNotes.length === 0) {
            showResults();
        }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.userData.life -= delta;

        if (p.userData.life <= 0) {
            scene.remove(p);
            particles.splice(i, 1);
            continue;
        }

        const lifeRatio = p.userData.life / p.userData.maxLife;
        p.material.opacity = lifeRatio;
        p.position.add(p.userData.velocity.clone().multiplyScalar(delta));
        p.userData.velocity.y -= 9.8 * delta; // gravity
        p.scale.setScalar(lifeRatio);
    }

    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ START ============
// If fish model fails to load within 2 seconds, create fallback
setTimeout(() => {
    if (!fishModel) {
        createFallbackFish();
    }
}, 2000);

animate();
</script>
</body>
</html>
