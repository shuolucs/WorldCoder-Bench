<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Rhythm Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    #score-display,
    #combo-display,
    #multiplier-display,
    #status-text,
    #key-hints {
      position: absolute;
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
      font-weight: bold;
    }

    #score-display {
      top: 16px;
      left: 16px;
      font-size: 24px;
    }

    #combo-display {
      top: 16px;
      right: 16px;
      font-size: 24px;
    }

    #multiplier-display {
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
    }

    #status-text {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 42px;
      text-align: center;
      white-space: pre-line;
    }

    #key-hints {
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      letter-spacing: 18px;
      color: #cccccc;
    }
  </style>
</head>
<body>
  <div class="hud">
    <div id="score-display">Score: 0</div>
    <div id="combo-display">Combo: 0</div>
    <div id="multiplier-display">Multiplier: 1x</div>
    <div id="status-text">Press SPACE to Start</div>
    <div id="key-hints">D F J K</div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, -20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const trackGeometry = new THREE.BoxGeometry(4, 0.2, 50);
    const trackMaterial = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const track = new THREE.Mesh(trackGeometry, trackMaterial);
    track.position.set(0, -0.1, -20);
    scene.add(track);

    const laneXs = [-1.5, -0.5, 0.5, 1.5];
    const laneColors = [0xff0000, 0x0000ff, 0xffff00, 0x00ff00];

    for (let i = 0; i < laneXs.length; i++) {
      const lineGeo = new THREE.BoxGeometry(0.03, 0.03, 50);
      const lineMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
      const laneLine = new THREE.Mesh(lineGeo, lineMat);
      laneLine.position.set(laneXs[i], 0.02, -20);
      scene.add(laneLine);
    }

    const hitZoneGeometry = new THREE.BoxGeometry(4, 0.05, 0.2);
    const hitZoneMaterial = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x004400 });
    const hitZone = new THREE.Mesh(hitZoneGeometry, hitZoneMaterial);
    hitZone.position.set(0, 0.05, 3);
    scene.add(hitZone);

    let fish = null;
    let fishBaseY = 0.5;
    const loader = new GLTFLoader();
    loader.load(
      '._BarramundiFish.glb',
      (gltf) => {
        fish = gltf.scene;
        fish.scale.set(0.8, 0.8, 0.8);
        fish.position.set(0, fishBaseY, 5);
        fish.rotation.y = Math.PI;
        scene.add(fish);
      },
      undefined,
      () => {
        const fallback = new THREE.Mesh(
          new THREE.SphereGeometry(0.5, 16, 16),
          new THREE.MeshStandardMaterial({ color: 0x66ccff })
        );
        fallback.scale.set(1.2, 0.8, 0.8);
        fallback.position.set(0, fishBaseY, 5);
        fallback.rotation.y = Math.PI;
        fish = fallback;
        scene.add(fish);
      }
    );

    const scoreDisplay = document.getElementById('score-display');
    const comboDisplay = document.getElementById('combo-display');
    const multiplierDisplay = document.getElementById('multiplier-display');
    const statusText = document.getElementById('status-text');

    const NOTE_SPEED = 8;
    const HIT_Z = 3;
    const SPAWN_Z = -40;
    const HIT_WINDOW_MIN = 2.0;
    const HIT_WINDOW_MAX = 4.0;

    const noteChart = [
      { time: 1, lane: 0 },
      { time: 1.5, lane: 2 },
      { time: 2, lane: 1 },
      { time: 2.5, lane: 3 },
      { time: 3, lane: 0 },
      { time: 3.5, lane: 1 },
      { time: 4, lane: 2 },
      { time: 4.5, lane: 3 },
      { time: 5, lane: 0 },
      { time: 5.5, lane: 2 },
      { time: 6, lane: 1 },
      { time: 6.5, lane: 3 },
      { time: 7, lane: 0 },
      { time: 7.5, lane: 1 }
    ];

    const travelTime = (HIT_Z - SPAWN_Z) / NOTE_SPEED;

    let gameState = 'waiting';
    let score = 0;
    let combo = 0;
    let maxCombo = 0;
    let totalHits = 0;
    let totalMisses = 0;
    let perfectCount = 0;
    let greatCount = 0;
    let goodCount = 0;
    let elapsedTime = 0;
    let notesSpawned = 0;
    let nextSpawnIndex = 0;
    let lastJudgment = '';
    let lanePressCount = [0, 0, 0, 0];

    const activeNotes = [];
    const particles = [];

    function getMultiplier() {
      if (combo >= 30) return 4;
      if (combo >= 20) return 3;
      if (combo >= 10) return 2;
      return 1;
    }

    function getAccuracy() {
      const processed = totalHits + totalMisses;
      if (processed === 0) return 0;
      return (totalHits / processed) * 100;
    }

    function updateHUD() {
      scoreDisplay.textContent = `Score: ${score}`;
      comboDisplay.textContent = `Combo: ${combo}`;
      multiplierDisplay.textContent = `Multiplier: ${getMultiplier()}x`;
    }

    function updateStateExposure() {
      window.__3D_STATE__ = {
        gameState,
        score,
        combo,
        maxCombo,
        multiplier: getMultiplier(),
        totalHits,
        totalMisses,
        totalNotes: noteChart.length,
        perfectCount,
        greatCount,
        goodCount,
        elapsedTime,
        activeNotes: activeNotes.length,
        fishY: fish ? fish.position.y : fishBaseY,
        lastJudgment,
        notesSpawned,
        noteSpeed: NOTE_SPEED,
        accuracy: Number(getAccuracy().toFixed(2)),
        lanePressCount: [...lanePressCount]
      };
    }

    function setStatus(text, color = '#ffffff', persist = false) {
      statusText.style.color = color;
      statusText.textContent = text;

      if (!persist) {
        const id = Symbol();
        setStatus.lastId = id;
        setTimeout(() => {
          if (setStatus.lastId === id && gameState === 'playing') {
            statusText.textContent = '';
          }
        }, 500);
      }
    }

    function createNote(lane, targetTime) {
      const geometry = new THREE.BoxGeometry(0.6, 0.6, 0.6);
      const material = new THREE.MeshStandardMaterial({ color: laneColors[lane] });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.set(laneXs[lane], 0.4, SPAWN_Z);
      scene.add(mesh);

      activeNotes.push({
        lane,
        targetTime,
        mesh
      });

      notesSpawned++;
    }

    function removeNote(note) {
      scene.remove(note.mesh);
      if (note.mesh.geometry) note.mesh.geometry.dispose();
      if (note.mesh.material) note.mesh.material.dispose();
    }

    function spawnParticles(position) {
      for (let i = 0; i < 5; i++) {
        const geometry = new THREE.SphereGeometry(0.08, 8, 8);
        const material = new THREE.MeshStandardMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 1
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.copy(position);
        scene.add(mesh);

        const angle = (Math.PI * 2 * i) / 5 + Math.random() * 0.4;
        const speed = 2 + Math.random() * 1.5;
        particles.push({
          mesh,
          velocity: new THREE.Vector3(
            Math.cos(angle) * speed,
            0.5 + Math.random() * 1.5,
            Math.sin(angle) * speed
          ),
          life: 0.3,
          maxLife: 0.3
        });
      }
    }

    function registerMiss() {
      combo = 0;
      totalMisses++;
      lastJudgment = 'miss';
      setStatus('MISS!', '#ff4444');
    }

    function processHit(noteIndex) {
      const note = activeNotes[noteIndex];
      const z = note.mesh.position.z;
      let judgment = '';
      let basePoints = 0;

      if (z >= 2.8 && z <= 3.2) {
        judgment = 'perfect';
        basePoints = 100;
        perfectCount++;
        setStatus('PERFECT!', '#ffd700');
      } else if (z >= 2.4 && z <= 3.6) {
        judgment = 'great';
        basePoints = 50;
        greatCount++;
        setStatus('GREAT!', '#66ccff');
      } else {
        judgment = 'good';
        basePoints = 25;
        goodCount++;
        setStatus('GOOD!', '#ffffff');
      }

      combo++;
      maxCombo = Math.max(maxCombo, combo);
      const gained = basePoints * getMultiplier();
      score += gained;
      totalHits++;
      lastJudgment = judgment;

      spawnParticles(note.mesh.position);

      removeNote(note);
      activeNotes.splice(noteIndex, 1);
    }

    function handleLanePress(lane) {
      if (gameState !== 'playing') return;

      lanePressCount[lane]++;

      let bestIndex = -1;
      let bestDistance = Infinity;

      for (let i = 0; i < activeNotes.length; i++) {
        const note = activeNotes[i];
        if (note.lane !== lane) continue;

        const z = note.mesh.position.z;
        if (z >= HIT_WINDOW_MIN && z <= HIT_WINDOW_MAX) {
          const dist = Math.abs(z - HIT_Z);
          if (dist < bestDistance) {
            bestDistance = dist;
            bestIndex = i;
          }
        }
      }

      if (bestIndex !== -1) {
        processHit(bestIndex);
      } else {
        registerMiss();
      }
    }

    function resetGame() {
      for (const note of activeNotes) {
        removeNote(note);
      }
      activeNotes.length = 0;

      for (const p of particles) {
        scene.remove(p.mesh);
        p.mesh.geometry.dispose();
        p.mesh.material.dispose();
      }
      particles.length = 0;

      score = 0;
      combo = 0;
      maxCombo = 0;
      totalHits = 0;
      totalMisses = 0;
      perfectCount = 0;
      greatCount = 0;
      goodCount = 0;
      elapsedTime = 0;
      notesSpawned = 0;
      nextSpawnIndex = 0;
      lastJudgment = '';
      lanePressCount = [0, 0, 0, 0];

      updateHUD();
      updateStateExposure();
    }

    function startGame() {
      resetGame();
      gameState = 'playing';
      statusText.textContent = '';
      updateStateExposure();
    }

    function finishGame() {
      gameState = 'finished';
      const accuracy = getAccuracy().toFixed(2);
      statusText.style.color = '#ffffff';
      statusText.textContent =
        `Finished!\nScore: ${score}\nMax Combo: ${maxCombo}\nAccuracy: ${accuracy}%\n\nPress SPACE to Restart`;
      updateStateExposure();
    }

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (e.code === 'Space') {
        e.preventDefault();
        if (gameState === 'waiting' || gameState === 'finished') {
          startGame();
        }
        return;
      }

      if (key === 'd') handleLanePress(0);
      else if (key === 'f') handleLanePress(1);
      else if (key === 'j') handleLanePress(2);
      else if (key === 'k') handleLanePress(3);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const totalTime = clock.elapsedTime;

      if (fish) {
        fish.position.y = fishBaseY + Math.sin((totalTime / 2) * Math.PI * 2) * 0.2;
      }

      if (gameState === 'playing') {
        elapsedTime += delta;

        while (
          nextSpawnIndex < noteChart.length &&
          elapsedTime >= noteChart[nextSpawnIndex].time - travelTime
        ) {
          const noteData = noteChart[nextSpawnIndex];
          createNote(noteData.lane, noteData.time);
          nextSpawnIndex++;
        }

        for (let i = activeNotes.length - 1; i >= 0; i--) {
          const note = activeNotes[i];
          note.mesh.position.z += NOTE_SPEED * delta;

          note.mesh.rotation.x += delta * 2;
          note.mesh.rotation.y += delta * 2;

          if (note.mesh.position.z > 5) {
            removeNote(note);
            activeNotes.splice(i, 1);
            registerMiss();
          }
        }

        if (nextSpawnIndex >= noteChart.length && activeNotes.length === 0) {
          finishGame();
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= delta;
        p.mesh.position.addScaledVector(p.velocity, delta);
        p.mesh.material.opacity = Math.max(0, p.life / p.maxLife);
        p.mesh.scale.setScalar(1 + (1 - p.life / p.maxLife) * 1.5);

        if (p.life <= 0) {
          scene.remove(p.mesh);
          p.mesh.geometry.dispose();
          p.mesh.material.dispose();
          particles.splice(i, 1);
        }
      }

      updateHUD();
      updateStateExposure();
      renderer.render(scene, camera);
    }

    updateHUD();
    updateStateExposure();
    animate();
  </script>
</body>
</html>
