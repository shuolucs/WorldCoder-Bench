<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bioluminescent Ocean Fox Spirit</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000814;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 12px 14px;
      background: rgba(0, 10, 30, 0.65);
      color: #dff;
      border: 1px solid rgba(0,255,204,0.35);
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
      min-width: 220px;
      box-shadow: 0 0 20px rgba(0,255,204,0.15);
      backdrop-filter: blur(6px);
    }
    #resetBtn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: rgba(0,255,204,0.18);
      color: #eaffff;
      cursor: pointer;
      font-weight: bold;
      border: 1px solid rgba(0,255,204,0.4);
    }
    #resetBtn:hover {
      background: rgba(0,255,204,0.3);
    }
  </style>
</head>
<body>
  <div id="hud"></div>
  <button id="resetBtn">Reset Scene</button>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.159.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.159.0/examples/jsm/loaders/GLTFLoader.js';

    window.__3D_STATE__ = {
      sceneReady: false,
      foxLoaded: false,
      waveAmplitude: 2.0,
      particleCount: 500,
      bloomCount: 5,
      bloomsVisible: true,
      clickCount: 0,
      foxJumpCount: 0,
      foxJumping: false,
      colorTheme: 'cyan',
      nightMode: false,
      paused: false,
      cameraZ: 30,
      islandY: 4,
      elapsedTime: 0,
      foxPositionY: 0,
      rippleCount: 0
    };

    const state = window.__3D_STATE__;

    const THEMES = [
      { name: 'cyan', color: new THREE.Color(0x00ffcc) },
      { name: 'purple', color: new THREE.Color(0x9900ff) },
      { name: 'gold', color: new THREE.Color(0xffcc00) }
    ];
    let currentThemeIndex = 0;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x020814, 0.025);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 15, 30);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const clock = new THREE.Clock();

    const ambientLight = new THREE.AmbientLight(0x001133, 0.3);
    scene.add(ambientLight);

    const moonLight = new THREE.DirectionalLight(0x4466aa, 0.5);
    moonLight.position.set(15, 25, 10);
    scene.add(moonLight);

    const moonTarget = new THREE.Object3D();
    moonTarget.position.set(0, 0, 0);
    scene.add(moonTarget);
    moonLight.target = moonTarget;

    const stars = new THREE.Points(
      new THREE.BufferGeometry(),
      new THREE.PointsMaterial({
        color: 0xaaccff,
        size: 0.6,
        transparent: true,
        opacity: 0.8,
        depthWrite: false
      })
    );
    {
      const starCount = 1000;
      const pos = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i++) {
        pos[i * 3 + 0] = (Math.random() - 0.5) * 300;
        pos[i * 3 + 1] = 40 + Math.random() * 100;
        pos[i * 3 + 2] = (Math.random() - 0.5) * 300;
      }
      stars.geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      scene.add(stars);
    }

    const oceanUniforms = {
      uTime: { value: 0 },
      uWaveAmplitude: { value: state.waveAmplitude },
      uThemeColor: { value: THEMES[currentThemeIndex].color.clone() },
      uNightBoost: { value: 1.0 }
    };

    const oceanGeometry = new THREE.PlaneGeometry(200, 200, 256, 256);
    oceanGeometry.rotateX(-Math.PI / 2);

    const oceanMaterial = new THREE.ShaderMaterial({
      uniforms: oceanUniforms,
      side: THREE.DoubleSide,
      transparent: false,
      vertexShader: `
        uniform float uTime;
        uniform float uWaveAmplitude;
        varying vec3 vWorldPosition;
        varying float vWave;
        varying vec2 vUv;

        void main() {
          vUv = uv;
          vec3 pos = position;

          float wave1 = sin(pos.x * 0.15 + uTime * 1.2) * 0.8;
          float wave2 = sin(pos.z * 0.22 + uTime * 1.7 + pos.x * 0.1) * 0.6;
          float wave3 = sin((pos.x + pos.z) * 0.32 - uTime * 1.5) * 0.4;
          float wave4 = sin(length(pos.xz) * 0.18 - uTime * 2.0) * 0.25;

          float displacement = (wave1 + wave2 + wave3 + wave4) * uWaveAmplitude;
          pos.y += displacement;

          vWave = displacement;
          vec4 worldPos = modelMatrix * vec4(pos, 1.0);
          vWorldPosition = worldPos.xyz;
          gl_Position = projectionMatrix * viewMatrix * worldPos;
        }
      `,
      fragmentShader: `
        uniform float uTime;
        uniform vec3 uThemeColor;
        uniform float uNightBoost;
        varying vec3 vWorldPosition;
        varying float vWave;
        varying vec2 vUv;

        void main() {
          vec3 deepWater = vec3(0.01, 0.05, 0.14);
          vec3 midWater = vec3(0.02, 0.11, 0.24);

          float pulse = 0.5 + 0.5 * sin(uTime * 2.4);
          float pattern1 = sin(vWorldPosition.x * 0.18 + uTime * 1.5) * sin(vWorldPosition.z * 0.21 - uTime * 1.2);
          float pattern2 = sin((vWorldPosition.x + vWorldPosition.z) * 0.3 - uTime * 2.1);
          float pattern3 = sin(length(vWorldPosition.xz) * 0.22 - uTime * 2.8);

          float glowMask = smoothstep(0.65, 1.0, pattern1 * 0.5 + pattern2 * 0.3 + pattern3 * 0.2);
          float crest = smoothstep(0.3, 1.6, abs(vWave));
          float bio = glowMask * (0.35 + pulse * 0.65) + crest * 0.25;

          vec3 baseColor = mix(deepWater, midWater, 0.5 + 0.5 * sin(vWave * 0.5));
          vec3 color = baseColor + uThemeColor * bio * 0.9 * uNightBoost;

          gl_FragColor = vec4(color, 1.0);
        }
      `
    });

    const ocean = new THREE.Mesh(oceanGeometry, oceanMaterial);
    ocean.name = "ocean";
    scene.add(ocean);

    const islandGroup = new THREE.Group();
    scene.add(islandGroup);

    const islandGeometry = new THREE.CylinderGeometry(2.2, 3.2, 1.2, 14, 5);
    const islandMaterial = new THREE.MeshStandardMaterial({
      color: 0x4a3422,
      roughness: 1.0,
      metalness: 0.0
    });
    const island = new THREE.Mesh(islandGeometry, islandMaterial);
    island.position.set(0, 4, 0);
    island.rotation.y = 0.35;
    island.castShadow = false;
    island.receiveShadow = false;
    islandGroup.add(island);

    const grassCap = new THREE.Mesh(
      new THREE.CylinderGeometry(2.4, 2.8, 0.18, 18),
      new THREE.MeshStandardMaterial({
        color: 0x355c3a,
        roughness: 0.95
      })
    );
    grassCap.position.set(0, 4.62, 0);
    islandGroup.add(grassCap);

    const foxAnchor = new THREE.Group();
    foxAnchor.position.set(0, 4.75, 0);
    islandGroup.add(foxAnchor);

    const foxLight = new THREE.PointLight(0x00ffcc, 2, 20, 2);
    foxLight.position.set(0, 1.5, 0);
    foxAnchor.add(foxLight);

    const auraSpriteCanvas = document.createElement('canvas');
    auraSpriteCanvas.width = 128;
    auraSpriteCanvas.height = 128;
    const auraCtx = auraSpriteCanvas.getContext('2d');
    const grad = auraCtx.createRadialGradient(64, 64, 8, 64, 64, 64);
    grad.addColorStop(0, 'rgba(255,255,255,0.9)');
    grad.addColorStop(0.3, 'rgba(0,255,204,0.45)');
    grad.addColorStop(0.7, 'rgba(0,120,255,0.16)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    auraCtx.fillStyle = grad;
    auraCtx.fillRect(0, 0, 128, 128);

    const auraTexture = new THREE.CanvasTexture(auraSpriteCanvas);
    const auraMaterial = new THREE.SpriteMaterial({
      map: auraTexture,
      color: 0xffffff,
      transparent: true,
      opacity: 0.9,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const foxAura = new THREE.Sprite(auraMaterial);
    foxAura.scale.set(5, 5, 1);
    foxAura.position.set(0, 1.8, 0);
    foxAnchor.add(foxAura);

    let foxModel = null;
    let mixer = null;
    let foxBaseLocalY = 0;
    let foxJump = null;

    const loader = new GLTFLoader();
    loader.load(
      'Fox.glb',
      (gltf) => {
        foxModel = gltf.scene;
        foxModel.scale.set(0.04, 0.04, 0.04);
        foxModel.position.set(0, 0, 0);
        foxAnchor.add(foxModel);

        foxModel.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = false;
            child.receiveShadow = false;
            if (child.material) {
              child.material.emissive = new THREE.Color(0x112222);
              child.material.emissiveIntensity = 0.4;
            }
          }
        });

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(foxModel);
          const action = mixer.clipAction(gltf.animations[0]);
          action.play();
        }

        state.foxLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load Fox.glb', err);
      }
    );

    const particlesCount = 500;
    const particlePositions = new Float32Array(particlesCount * 3);
    const particleColors = new Float32Array(particlesCount * 3);
    const particleDrift = [];

    for (let i = 0; i < particlesCount; i++) {
      particlePositions[i * 3 + 0] = (Math.random() - 0.5) * 180;
      particlePositions[i * 3 + 1] = 0.2 + Math.random() * 1.5;
      particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 180;
      particleColors[i * 3 + 0] = 0;
      particleColors[i * 3 + 1] = 1;
      particleColors[i * 3 + 2] = 0.8;
      particleDrift.push({
        vx: (Math.random() - 0.5) * 0.02,
        vz: (Math.random() - 0.5) * 0.02,
        phase: Math.random() * Math.PI * 2
      });
    }

    const particleGeometry = new THREE.BufferGeometry();
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

    const particleMaterial = new THREE.PointsMaterial({
      size: 0.75,
      vertexColors: true,
      transparent: true,
      opacity: 0.95,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    const extraParticles = [];
    const ripples = [];
    const blooms = [];

    function createBloomZones() {
      for (let i = 0; i < 5; i++) {
        const radius = 5 + Math.random() * 5;
        const geo = new THREE.CircleGeometry(radius, 48);
        geo.rotateX(-Math.PI / 2);
        const mat = new THREE.MeshBasicMaterial({
          color: THEMES[currentThemeIndex].color.clone(),
          transparent: true,
          opacity: 0.18,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        });
        const bloom = new THREE.Mesh(geo, mat);
        bloom.position.set(
          (Math.random() - 0.5) * 140,
          0.08 + Math.random() * 0.05,
          (Math.random() - 0.5) * 140
        );
        bloom.userData = {
          baseOpacity: 0.12 + Math.random() * 0.18,
          phase: Math.random() * Math.PI * 2
        };
        blooms.push(bloom);
        scene.add(bloom);
      }
      state.bloomCount = blooms.length;
    }
    createBloomZones();

    function updateTheme() {
      const theme = THEMES[currentThemeIndex];
      state.colorTheme = theme.name;
      oceanUniforms.uThemeColor.value.copy(theme.color);
      foxLight.color.copy(theme.color);

      blooms.forEach(b => b.material.color.copy(theme.color));

      if (foxModel) {
        foxModel.traverse((child) => {
          if (child.isMesh && child.material && child.material.emissive) {
            child.material.emissive.copy(theme.color).multiplyScalar(0.12);
          }
        });
      }
    }

    function setNightMode(enabled) {
      state.nightMode = enabled;
      ambientLight.intensity = enabled ? 0.05 : 0.3;
      particleMaterial.size = enabled ? 1.05 : 0.75;
      particleMaterial.opacity = enabled ? 1.0 : 0.95;
      oceanUniforms.uNightBoost.value = enabled ? 1.5 : 1.0;
    }

    function createRipple(position) {
      const geo = new THREE.RingGeometry(0.4, 0.55, 64);
      geo.rotateX(-Math.PI / 2);
      const mat = new THREE.MeshBasicMaterial({
        color: THEMES[currentThemeIndex].color.clone(),
        transparent: true,
        opacity: 0.9,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide,
        depthWrite: false
      });
      const ripple = new THREE.Mesh(geo, mat);
      ripple.position.copy(position);
      ripple.position.y += 0.1;
      ripple.userData = {
        life: 0,
        duration: 1.5
      };
      scene.add(ripple);
      ripples.push(ripple);
      state.rippleCount++;
    }

    function spawnExtraParticles(position, count = 20) {
      for (let i = 0; i < count; i++) {
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.Float32BufferAttribute([0, 0, 0], 3));
        const mat = new THREE.PointsMaterial({
          color: THEMES[currentThemeIndex].color.clone(),
          size: 1.2,
          transparent: true,
          opacity: 1,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        });
        const p = new THREE.Points(geo, mat);
        p.position.copy(position);
        p.position.y += 0.2 + Math.random() * 0.8;
        p.userData = {
          velocity: new THREE.Vector3(
            (Math.random() - 0.5) * 0.08,
            Math.random() * 0.04 + 0.01,
            (Math.random() - 0.5) * 0.08
          ),
          life: 0,
          duration: 2 + Math.random() * 1.5
        };
        extraParticles.push(p);
        scene.add(p);
      }
      state.particleCount = particlesCount + extraParticles.length;
    }

    function triggerFoxJump() {
      if (!foxAnchor || state.foxJumping) return;
      state.foxJumping = true;
      state.foxJumpCount++;
      foxJump = {
        active: true,
        time: 0,
        duration: 0.6,
        height: 3
      };
    }

    function resetScene() {
      state.waveAmplitude = 2.0;
      state.clickCount = 0;
      state.foxJumpCount = 0;
      state.foxJumping = false;
      state.colorTheme = 'cyan';
      state.nightMode = false;
      state.paused = false;
      state.cameraZ = 30;
      state.bloomsVisible = true;
      currentThemeIndex = 0;
      camera.position.z = 30;
      oceanUniforms.uWaveAmplitude.value = state.waveAmplitude;
      setNightMode(false);
      updateTheme();

      blooms.forEach(b => b.visible = true);

      ripples.forEach(r => {
        scene.remove(r);
        r.geometry.dispose();
        r.material.dispose();
      });
      ripples.length = 0;
      state.rippleCount = 0;

      extraParticles.forEach(p => {
        scene.remove(p);
        p.geometry.dispose();
        p.material.dispose();
      });
      extraParticles.length = 0;
      state.particleCount = particlesCount;

      foxJump = null;
      if (foxModel) foxModel.position.y = foxBaseLocalY;
    }

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    window.addEventListener('click', (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(ocean, true);
      if (intersects.length > 0) {
        const point = intersects[0].point;
        createRipple(point);
        spawnExtraParticles(point, 20);
        state.clickCount++;
      }
    });

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === 'w') {
        state.waveAmplitude = Math.min(5.0, state.waveAmplitude + 0.5);
        oceanUniforms.uWaveAmplitude.value = state.waveAmplitude;
      } else if (key === 's') {
        state.waveAmplitude = Math.max(0.5, state.waveAmplitude - 0.5);
        oceanUniforms.uWaveAmplitude.value = state.waveAmplitude;
      } else if (key === 'b') {
        state.bloomsVisible = !state.bloomsVisible;
        blooms.forEach(b => b.visible = state.bloomsVisible);
      } else if (key === 'f') {
        triggerFoxJump();
      } else if (key === 'c') {
        currentThemeIndex = (currentThemeIndex + 1) % THEMES.length;
        updateTheme();
      } else if (key === 'n') {
        setNightMode(!state.nightMode);
      } else if (key === 'p') {
        state.paused = !state.paused;
      }
    });

    window.addEventListener('wheel', (e) => {
      camera.position.z += e.deltaY * 0.01;
      camera.position.z = THREE.MathUtils.clamp(camera.position.z, 15, 60);
      state.cameraZ = camera.position.z;
    }, { passive: true });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    document.getElementById('resetBtn').addEventListener('click', resetScene);

    function updateHUD() {
      const hud = document.getElementById('hud');
      hud.innerHTML = `
        <strong>Bioluminescent Ocean</strong><br>
        Wave Amp: ${state.waveAmplitude.toFixed(1)}<br>
        Color Theme: ${state.colorTheme}<br>
        Click Count: ${state.clickCount}<br>
        Fox Jumps: ${state.foxJumpCount}<br>
        Night Mode: ${state.nightMode ? 'On' : 'Off'}<br>
        Paused: ${state.paused ? 'Yes' : 'No'}
      `;
    }

    updateTheme();
    setNightMode(false);

    state.sceneReady = true;

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);

      if (!state.paused) {
        state.elapsedTime += dt;
        oceanUniforms.uTime.value = state.elapsedTime;

        const islandBob = 4 + Math.sin(state.elapsedTime * (Math.PI * 2 / 3)) * 0.5;
        island.position.y = islandBob;
        grassCap.position.y = islandBob + 0.62;
        foxAnchor.position.y = islandBob + 0.75;
        state.islandY = islandBob;

        if (mixer) mixer.update(dt);

        if (foxJump && foxJump.active && foxModel) {
          foxJump.time += dt;
          const t = foxJump.time / foxJump.duration;
          let yOffset = 0;
          if (t < 0.5) {
            yOffset = THREE.MathUtils.lerp(0, foxJump.height, t / 0.5);
          } else if (t < 1.0) {
            yOffset = THREE.MathUtils.lerp(foxJump.height, 0, (t - 0.5) / 0.5);
          } else {
            yOffset = 0;
            foxJump.active = false;
            state.foxJumping = false;
          }
          foxModel.position.y = foxBaseLocalY + yOffset;
        }

        if (foxModel && !state.foxJumping) {
          foxModel.position.y = foxBaseLocalY;
        }

        foxAura.material.opacity = 0.55 + 0.25 * Math.sin(state.elapsedTime * 3.0);
        foxAura.scale.setScalar(4.6 + 0.35 * Math.sin(state.elapsedTime * 2.4));

        const posAttr = particleGeometry.attributes.position;
        const colAttr = particleGeometry.attributes.color;
        const colorA = THEMES[currentThemeIndex].color;
        const cycleMix = 0.5 + 0.5 * Math.sin(state.elapsedTime * (Math.PI * 2 / 4));

        for (let i = 0; i < particlesCount; i++) {
          let x = posAttr.array[i * 3 + 0];
          let z = posAttr.array[i * 3 + 2];
          x += particleDrift[i].vx;
          z += particleDrift[i].vz;

          if (x > 100) x = -100;
          if (x < -100) x = 100;
          if (z > 100) z = -100;
          if (z < -100) z = 100;

          posAttr.array[i * 3 + 0] = x;
          posAttr.array[i * 3 + 2] = z;
          posAttr.array[i * 3 + 1] = 0.4 + Math.sin(state.elapsedTime * 1.5 + particleDrift[i].phase) * 0.3;

          const alt = new THREE.Color(0x0066ff);
          const mixed = colorA.clone().lerp(alt, cycleMix);
          colAttr.array[i * 3 + 0] = mixed.r;
          colAttr.array[i * 3 + 1] = mixed.g;
          colAttr.array[i * 3 + 2] = mixed.b;
        }
        posAttr.needsUpdate = true;
        colAttr.needsUpdate = true;

        for (let i = extraParticles.length - 1; i >= 0; i--) {
          const p = extraParticles[i];
          p.userData.life += dt;
          p.position.add(p.userData.velocity);
          p.material.opacity = 1.0 - (p.userData.life / p.userData.duration);
          p.material.color.copy(THEMES[currentThemeIndex].color);
          if (p.userData.life >= p.userData.duration) {
            scene.remove(p);
            p.geometry.dispose();
            p.material.dispose();
            extraParticles.splice(i, 1);
          }
        }
        state.particleCount = particlesCount + extraParticles.length;

        for (let i = ripples.length - 1; i >= 0; i--) {
          const r = ripples[i];
          r.userData.life += dt;
          const t = r.userData.life / r.userData.duration;
          const s = 1 + t * 10;
          r.scale.set(s, s, s);
          r.material.opacity = 0.9 * (1 - t);
          r.material.color.copy(THEMES[currentThemeIndex].color);
          r.position.y = 0.1;
          if (r.userData.life >= r.userData.duration) {
            scene.remove(r);
            r.geometry.dispose();
            r.material.dispose();
            ripples.splice(i, 1);
          }
        }

        blooms.forEach((bloom) => {
          const pulse = 0.5 + 0.5 * Math.sin(state.elapsedTime * 1.7 + bloom.userData.phase);
          bloom.material.opacity = bloom.userData.baseOpacity * (0.6 + pulse * 1.2);
          bloom.material.color.copy(THEMES[currentThemeIndex].color);
        });
      }

      state.foxPositionY = foxAnchor.getWorldPosition(new THREE.Vector3()).y + (foxModel ? foxModel.position.y : 0);
      updateHUD();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
