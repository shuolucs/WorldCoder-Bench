<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Bioluminescent Ocean</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 10, 30, 0.8);
            border: 1px solid #00ffcc;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
            min-width: 200px;
        }
        .hud-item {
            margin-bottom: 8px;
            font-size: 14px;
        }
        .hud-label {
            color: #88ccff;
        }
        .hud-value {
            float: right;
            font-weight: bold;
            color: #00ffcc;
        }
        #resetBtn {
            margin-top: 15px;
            width: 100%;
            padding: 8px;
            background: #003366;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            border-radius: 4px;
            cursor: pointer;
            pointer-events: auto;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.2s;
        }
        #resetBtn:hover {
            background: #00ffcc;
            color: #001133;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #00ffcc;
            pointer-events: none;
            text-shadow: 0 0 10px #00ffcc;
            transition: opacity 0.5s;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">Summoning Spirit...</div>
    <div id="hud">
        <div class="hud-item"><span class="hud-label">Wave Amp (W/S):</span> <span class="hud-value" id="ui-wave">2.0</span></div>
        <div class="hud-item"><span class="hud-label">Theme (C):</span> <span class="hud-value" id="ui-theme">cyan</span></div>
        <div class="hud-item"><span class="hud-label">Clicks:</span> <span class="hud-value" id="ui-clicks">0</span></div>
        <div class="hud-item"><span class="hud-label">Fox Jumps (F):</span> <span class="hud-value" id="ui-jumps">0</span></div>
        <div class="hud-item"><span class="hud-label">Night Mode (N):</span> <span class="hud-value" id="ui-night">OFF</span></div>
        <div class="hud-item"><span class="hud-label">Blooms (B):</span> <span class="hud-value" id="ui-blooms">ON</span></div>
        <div class="hud-item"><span class="hud-label">Status (P):</span> <span class="hud-value" id="ui-paused">PLAYING</span></div>
        <button id="resetBtn">Reset Scene</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        const DEFAULT_STATE = {
            sceneReady: false,
            foxLoaded: false,
            waveAmplitude: 2.0,
            particleCount: 500,
            bloomCount: 5,
            bloomsVisible: true,
            clickCount: 0,
            foxJumpCount: 0,
            foxJumping: false,
            colorTheme: 'cyan',
            nightMode: false,
            paused: false,
            cameraZ: 30,
            islandY: 4,
            elapsedTime: 0,
            foxPositionY: 0,
            rippleCount: 0
        };

        window.__3D_STATE__ = { ...DEFAULT_STATE };
        const state = window.__3D_STATE__;

        const THEMES = {
            cyan: { main: new THREE.Color(0x00ffcc), alt: new THREE.Color(0x0066ff) },
            purple: { main: new THREE.Color(0x9900ff), alt: new THREE.Color(0xff00cc) },
            gold: { main: new THREE.Color(0xffcc00), alt: new THREE.Color(0xff6600) }
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000511, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, state.cameraZ);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x001133, 0.3);
        scene.add(ambientLight);

        const moonLight = new THREE.DirectionalLight(0x4466aa, 0.5);
        moonLight.position.set(50, 100, -50);
        scene.add(moonLight);

        const foxLight = new THREE.PointLight(THEMES.cyan.main, 2, 20);
        
        // --- Ocean Surface ---
        const oceanGeo = new THREE.PlaneGeometry(200, 200, 256, 256);
        oceanGeo.rotateX(-Math.PI / 2);

        const oceanVertexShader = `
            uniform float uTime;
            uniform float uWaveAmplitude;
            varying vec2 vUv;
            varying float vElevation;

            void main() {
                vUv = uv;
                vec3 pos = position;
                
                float elevation = sin(pos.x * 0.05 + uTime) * cos(pos.z * 0.05 + uTime) * uWaveAmplitude;
                elevation += sin(pos.x * 0.1 - uTime * 1.5) * 0.5 * uWaveAmplitude;
                elevation += cos(pos.z * 0.2 + uTime * 2.0) * 0.25 * uWaveAmplitude;
                
                pos.y += elevation;
                vElevation = elevation;
                
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        const oceanFragmentShader = `
            uniform vec3 uColor;
            uniform float uTime;
            varying vec2 vUv;
            varying float vElevation;

            void main() {
                vec3 baseColor = vec3(0.0, 0.05, 0.15);
                float pulse = 0.5 + 0.5 * sin(uTime * 2.0 + vUv.x * 50.0 + vUv.y * 50.0);
                float glowIntensity = smoothstep(0.0, 2.0, vElevation);
                
                vec3 glowColor = uColor * pulse * glowIntensity;
                vec3 finalColor = mix(baseColor, uColor, glowIntensity * 0.6) + glowColor;
                
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        const oceanMat = new THREE.ShaderMaterial({
            vertexShader: oceanVertexShader,
            fragmentShader: oceanFragmentShader,
            uniforms: {
                uTime: { value: 0 },
                uWaveAmplitude: { value: state.waveAmplitude },
                uColor: { value: THEMES[state.colorTheme].main }
            },
            wireframe: false
        });

        const ocean = new THREE.Mesh(oceanGeo, oceanMat);
        scene.add(ocean);

        // --- Floating Island & Fox Hierarchy ---
        const islandGroup = new THREE.Group();
        islandGroup.position.set(0, state.islandY, 0);
        scene.add(islandGroup);

        const islandGeo = new THREE.CylinderGeometry(3, 2.5, 1, 32);
        // Add some roughness to vertices
        const posAttr = islandGeo.attributes.position;
        for(let i=0; i<posAttr.count; i++) {
            if(posAttr.getY(i) > 0) {
                posAttr.setY(i, posAttr.getY(i) + (Math.random() * 0.2 - 0.1));
            }
        }
        islandGeo.computeVertexNormals();
        const islandMat = new THREE.MeshStandardMaterial({ color: 0x3a2818, roughness: 0.9, flatShading: true });
        const island = new THREE.Mesh(islandGeo, islandMat);
        islandGroup.add(island);

        const foxGroup = new THREE.Group();
        foxGroup.position.y = 0.5; // Sit on top of island
        islandGroup.add(foxGroup);
        foxGroup.add(foxLight);
        foxLight.position.y = 2;

        // Fox Aura
        const auraGeo = new THREE.SphereGeometry(2.5, 32, 32);
        const auraMat = new THREE.MeshBasicMaterial({
            color: THEMES[state.colorTheme].main,
            transparent: true,
            opacity: 0.15,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const aura = new THREE.Mesh(auraGeo, auraMat);
        aura.position.y = 1.5;
        foxGroup.add(aura);

        // Load Fox
        let mixer;
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Fox/glTF-Binary/Fox.glb',
            (gltf) => {
                const fox = gltf.scene;
                fox.scale.set(0.04, 0.04, 0.04);
                foxGroup.add(fox);

                mixer = new THREE.AnimationMixer(fox);
                if (gltf.animations.length > 0) {
                    const action = mixer.clipAction(gltf.animations[0]); // Idle
                    action.play();
                }
                
                state.foxLoaded = true;
                state.sceneReady = true;
                document.getElementById('loading').style.opacity = 0;
            }
        );

        // --- Bioluminescent Particles ---
        const particlesGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(state.particleCount * 3);
        const particleOffsets = new Float32Array(state.particleCount);

        for (let i = 0; i < state.particleCount; i++) {
            particlePositions[i * 3] = (Math.random() - 0.5) * 180;
            particlePositions[i * 3 + 1] = Math.random() * 5;
            particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 180;
            particleOffsets[i] = Math.random() * Math.PI * 2;
        }

        particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        particlesGeo.setAttribute('aOffset', new THREE.BufferAttribute(particleOffsets, 1));

        const particleShaderMat = new THREE.ShaderMaterial({
            vertexShader: `
                uniform float uTime;
                attribute float aOffset;
                varying float vOffset;
                void main() {
                    vOffset = aOffset;
                    vec3 pos = position;
                    pos.y += sin(uTime + aOffset) * 0.5;
                    pos.x += cos(uTime * 0.5 + aOffset) * 0.5;
                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    gl_PointSize = (15.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform float uTime;
                uniform vec3 uColor1;
                uniform vec3 uColor2;
                uniform float uNightMode;
                varying float vOffset;
                void main() {
                    float dist = length(gl_PointCoord - vec2(0.5));
                    if (dist > 0.5) discard;
                    
                    float mixVal = (sin(uTime * 1.5 + vOffset) + 1.0) * 0.5;
                    vec3 color = mix(uColor1, uColor2, mixVal);
                    float intensity = uNightMode > 0.5 ? 2.5 : 1.0;
                    
                    gl_FragColor = vec4(color * intensity, (0.5 - dist) * 2.0);
                }
            `,
            uniforms: {
                uTime: { value: 0 },
                uColor1: { value: THEMES[state.colorTheme].main },
                uColor2: { value: THEMES[state.colorTheme].alt },
                uNightMode: { value: 0.0 }
            },
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particles = new THREE.Points(particlesGeo, particleShaderMat);
        scene.add(particles);

        // --- Plankton Bloom Zones ---
        const bloomsGroup = new THREE.Group();
        scene.add(bloomsGroup);
        const blooms = [];

        for (let i = 0; i < state.bloomCount; i++) {
            const radius = 5 + Math.random() * 5;
            const bloomGeo = new THREE.CircleGeometry(radius, 32);
            bloomGeo.rotateX(-Math.PI / 2);
            const bloomMat = new THREE.MeshBasicMaterial({
                color: THEMES[state.colorTheme].main,
                transparent: true,
                opacity: 0.3,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const bloom = new THREE.Mesh(bloomGeo, bloomMat);
            bloom.position.set((Math.random() - 0.5) * 150, 0.1, (Math.random() - 0.5) * 150);
            bloom.userData = { phase: Math.random() * Math.PI * 2, speed: 0.5 + Math.random() * 1.5 };
            bloomsGroup.add(bloom);
            blooms.push(bloom);
        }

        // --- Dynamic Entities (Ripples & Extra Particles) ---
        const dynamicEntities = [];

        function spawnRipple(position) {
            const geo = new THREE.RingGeometry(0.1, 0.5, 32);
            geo.rotateX(-Math.PI / 2);
            const mat = new THREE.MeshBasicMaterial({
                color: THEMES[state.colorTheme].main,
                transparent: true,
                opacity: 1.0,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(position);
            mesh.position.y += 0.2;
            scene.add(mesh);
            
            dynamicEntities.push({
                type: 'ripple',
                mesh: mesh,
                age: 0,
                maxAge: 2.0
            });
            state.rippleCount++;
        }

        function spawnExtraParticles(position) {
            const count = 20;
            const geo = new THREE.BufferGeometry();
            const posArray = new Float32Array(count * 3);
            const velArray = [];

            for(let i=0; i<count; i++) {
                posArray[i*3] = position.x;
                posArray[i*3+1] = position.y + 0.5;
                posArray[i*3+2] = position.z;
                
                const theta = Math.random() * Math.PI * 2;
                const r = Math.random() * 2 + 1;
                velArray.push(new THREE.Vector3(Math.cos(theta)*r, Math.random()*3+1, Math.sin(theta)*r));
            }
            geo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            
            const mat = new THREE.PointsMaterial({
                color: THEMES[state.colorTheme].alt,
                size: 0.5,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            
            const points = new THREE.Points(geo, mat);
            scene.add(points);
            
            dynamicEntities.push({
                type: 'particles',
                mesh: points,
                velocities: velArray,
                age: 0,
                maxAge: 1.5
            });
        }

        // --- Interactions ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (e) => {
            if(e.target.tagName === 'BUTTON' || e.target.closest('#hud')) return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(ocean);
            
            if(intersects.length > 0) {
                spawnRipple(intersects[0].point);
                spawnExtraParticles(intersects[0].point);
                state.clickCount++;
                updateHUD();
            }
        });

        let jumpStartTime = 0;

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            if (key === 'w') {
                state.waveAmplitude = Math.min(5.0, state.waveAmplitude + 0.5);
            } else if (key === 's') {
                state.waveAmplitude = Math.max(0.5, state.waveAmplitude - 0.5);
            } else if (key === 'b') {
                state.bloomsVisible = !state.bloomsVisible;
                bloomsGroup.visible = state.bloomsVisible;
            } else if (key === 'f' && !state.foxJumping && state.foxLoaded) {
                state.foxJumping = true;
                state.foxJumpCount++;
                jumpStartTime = state.elapsedTime;
            } else if (key === 'c') {
                const themeKeys = Object.keys(THEMES);
                const idx = (themeKeys.indexOf(state.colorTheme) + 1) % themeKeys.length;
                state.colorTheme = themeKeys[idx];
                applyTheme();
            } else if (key === 'n') {
                state.nightMode = !state.nightMode;
                ambientLight.intensity = state.nightMode ? 0.05 : 0.3;
                particleShaderMat.uniforms.uNightMode.value = state.nightMode ? 1.0 : 0.0;
            } else if (key === 'p') {
                state.paused = !state.paused;
            }
            
            oceanMat.uniforms.uWaveAmplitude.value = state.waveAmplitude;
            updateHUD();
        });

        window.addEventListener('wheel', (e) => {
            state.cameraZ += e.deltaY * 0.05;
            state.cameraZ = Math.max(15, Math.min(60, state.cameraZ));
            camera.position.z = state.cameraZ;
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            Object.assign(state, DEFAULT_STATE, { sceneReady: state.sceneReady, foxLoaded: state.foxLoaded });
            
            camera.position.z = state.cameraZ;
            oceanMat.uniforms.uWaveAmplitude.value = state.waveAmplitude;
            bloomsGroup.visible = state.bloomsVisible;
            ambientLight.intensity = 0.3;
            particleShaderMat.uniforms.uNightMode.value = 0.0;
            foxGroup.position.y = 0.5;
            
            applyTheme();
            updateHUD();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function applyTheme() {
            const t = THEMES[state.colorTheme];
            oceanMat.uniforms.uColor.value = t.main;
            foxLight.color = t.main;
            auraMat.color = t.main;
            particleShaderMat.uniforms.uColor1.value = t.main;
            particleShaderMat.uniforms.uColor2.value = t.alt;
            blooms.forEach(b => b.material.color = t.main);
            document.getElementById('hud').style.borderColor = '#' + t.main.getHexString();
            document.getElementById('resetBtn').style.borderColor = '#' + t.main.getHexString();
            document.getElementById('resetBtn').style.color = '#' + t.main.getHexString();
            document.querySelectorAll('.hud-value').forEach(el => el.style.color = '#' + t.main.getHexString());
        }

        function updateHUD() {
            document.getElementById('ui-wave').innerText = state.waveAmplitude.toFixed(1);
            document.getElementById('ui-theme').innerText = state.colorTheme.toUpperCase();
            document.getElementById('ui-clicks').innerText = state.clickCount;
            document.getElementById('ui-jumps').innerText = state.foxJumpCount;
            document.getElementById('ui-night').innerText = state.nightMode ? 'ON' : 'OFF';
            document.getElementById('ui-blooms').innerText = state.bloomsVisible ? 'ON' : 'OFF';
            document.getElementById('ui-paused').innerText = state.paused ? 'PAUSED' : 'PLAYING';
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            
            if (!state.paused) {
                state.elapsedTime += delta;
                const t = state.elapsedTime;

                // Ocean
                oceanMat.uniforms.uTime.value = t;

                // Island Bobbing
                islandGroup.position.y = state.islandY + Math.sin(t * (Math.PI * 2 / 3)) * 0.5;

                // Fox Animation & Jump
                if (mixer) mixer.update(delta);
                
                if (state.foxJumping) {
                    const jumpT = t - jumpStartTime;
                    if (jumpT < 0.6) {
                        // Parabola-like jump using sine
                        foxGroup.position.y = 0.5 + Math.sin((jumpT / 0.6) * Math.PI) * 3.0;
                    } else {
                        state.foxJumping = false;
                        foxGroup.position.y = 0.5;
                    }
                }
                state.foxPositionY = islandGroup.position.y + foxGroup.position.y;

                // Fox Aura Pulse
                aura.scale.setScalar(1.0 + Math.sin(t * 4) * 0.05);

                // Particles
                particleShaderMat.uniforms.uTime.value = t;

                // Blooms
                if (state.bloomsVisible) {
                    blooms.forEach(bloom => {
                        bloom.material.opacity = 0.15 + 0.15 * Math.sin(t * bloom.userData.speed + bloom.userData.phase);
                    });
                }

                // Dynamic Entities
                for (let i = dynamicEntities.length - 1; i >= 0; i--) {
                    const ent = dynamicEntities[i];
                    ent.age += delta;
                    
                    if (ent.age >= ent.maxAge) {
                        scene.remove(ent.mesh);
                        ent.mesh.geometry.dispose();
                        ent.mesh.material.dispose();
                        dynamicEntities.splice(i, 1);
                        continue;
                    }

                    const progress = ent.age / ent.maxAge;

                    if (ent.type === 'ripple') {
                        ent.mesh.scale.setScalar(1.0 + progress * 10.0);
                        ent.mesh.material.opacity = 1.0 - progress;
                    } else if (ent.type === 'particles') {
                        const positions = ent.mesh.geometry.attributes.position.array;
                        for(let j=0; j<ent.velocities.length; j++) {
                            positions[j*3] += ent.velocities[j].x * delta;
                            positions[j*3+1] += ent.velocities[j].y * delta;
                            positions[j*3+2] += ent.velocities[j].z * delta;
                            ent.velocities[j].y -= 5.0 * delta; // gravity
                        }
                        ent.mesh.geometry.attributes.position.needsUpdate = true;
                        ent.mesh.material.opacity = 1.0 - progress;
                    }
                }
            }

            renderer.render(scene, camera);
        }

        updateHUD();
        applyTheme();
        animate();
    </script>
</body>
</html>
