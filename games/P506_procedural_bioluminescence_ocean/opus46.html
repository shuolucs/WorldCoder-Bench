<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bioluminescent Ocean</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #00ffcc;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    background: rgba(0, 10, 30, 0.7);
    padding: 15px;
    border-radius: 8px;
    border: 1px solid rgba(0, 255, 204, 0.3);
    line-height: 1.8;
    pointer-events: none;
    z-index: 10;
    min-width: 220px;
}
#hud span { color: #66ffee; }
#resetBtn {
    position: absolute;
    bottom: 20px;
    right: 20px;
    padding: 10px 20px;
    background: rgba(0, 255, 204, 0.15);
    color: #00ffcc;
    border: 1px solid rgba(0, 255, 204, 0.5);
    border-radius: 6px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    cursor: pointer;
    z-index: 10;
    transition: all 0.3s;
}
#resetBtn:hover {
    background: rgba(0, 255, 204, 0.3);
    box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
}
#controls {
    position: absolute;
    bottom: 20px;
    left: 10px;
    color: #4488aa;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    background: rgba(0, 10, 30, 0.5);
    padding: 10px;
    border-radius: 6px;
    line-height: 1.6;
    z-index: 10;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="hud">
    <div>🌊 Wave Amp: <span id="hudWave">2.0</span></div>
    <div>🎨 Theme: <span id="hudTheme">cyan</span></div>
    <div>🖱️ Clicks: <span id="hudClicks">0</span></div>
    <div>🦊 Fox Jumps: <span id="hudJumps">0</span></div>
    <div>🌙 Night Mode: <span id="hudNight">OFF</span></div>
    <div>⏸️ Paused: <span id="hudPaused">NO</span></div>
</div>

<div id="controls">
    W/S: Wave ± | B: Blooms | F: Fox Jump<br>
    C: Color Theme | N: Night | P: Pause<br>
    Click: Ripple | Scroll: Zoom
</div>

<button id="resetBtn">Reset Scene</button>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// State
window.__3D_STATE__ = {
    sceneReady: false,
    foxLoaded: false,
    waveAmplitude: 2.0,
    particleCount: 500,
    bloomCount: 5,
    bloomsVisible: true,
    clickCount: 0,
    foxJumpCount: 0,
    foxJumping: false,
    colorTheme: 'cyan',
    nightMode: false,
    paused: false,
    cameraZ: 30,
    islandY: 4,
    elapsedTime: 0,
    foxPositionY: 0,
    rippleCount: 0
};

const state = window.__3D_STATE__;

const colorThemes = {
    cyan: { primary: new THREE.Color(0x00ffcc), secondary: new THREE.Color(0x0066ff) },
    purple: { primary: new THREE.Color(0x9900ff), secondary: new THREE.Color(0xff00aa) },
    gold: { primary: new THREE.Color(0xffcc00), secondary: new THREE.Color(0xff6600) }
};

// Scene
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000a14, 0.008);
scene.background = new THREE.Color(0x000a14);

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 15, 30);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0x001133, 0.3);
scene.add(ambientLight);

const foxLight = new THREE.PointLight(0x00ffcc, 2, 30);
foxLight.position.set(0, 6, 0);
scene.add(foxLight);

const moonLight = new THREE.DirectionalLight(0x4466aa, 0.5);
moonLight.position.set(10, 20, 5);
scene.add(moonLight);

// Ocean Shader Material
const oceanVertexShader = `
    uniform float uTime;
    uniform float uWaveAmplitude;
    varying vec2 vUv;
    varying float vElevation;
    varying vec3 vWorldPos;

    void main() {
        vUv = uv;
        vec3 pos = position;

        float wave1 = sin(pos.x * 0.05 + uTime * 0.8) * uWaveAmplitude * 0.5;
        float wave2 = sin(pos.y * 0.08 + uTime * 1.2) * uWaveAmplitude * 0.3;
        float wave3 = sin((pos.x + pos.y) * 0.03 + uTime * 0.5) * uWaveAmplitude * 0.7;
        float wave4 = sin(pos.x * 0.12 + pos.y * 0.06 + uTime * 1.5) * uWaveAmplitude * 0.2;

        float elevation = wave1 + wave2 + wave3 + wave4;
        pos.z = elevation;

        vElevation = elevation;
        vWorldPos = (modelMatrix * vec4(pos, 1.0)).xyz;

        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
`;

const oceanFragmentShader = `
    uniform float uTime;
    uniform vec3 uColorPrimary;
    uniform vec3 uColorSecondary;
    varying vec2 vUv;
    varying float vElevation;
    varying vec3 vWorldPos;

    float random(vec2 st) {
        return fract(sin(dot(st.xy, vec2(12.9898, 78.233))) * 43758.5453123);
    }

    float noise(vec2 st) {
        vec2 i = floor(st);
        vec2 f = fract(st);
        float a = random(i);
        float b = random(i + vec2(1.0, 0.0));
        float c = random(i + vec2(0.0, 1.0));
        float d = random(i + vec2(1.0, 1.0));
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
    }

    void main() {
        vec3 deepBlue = vec3(0.0, 0.02, 0.08);
        vec3 darkBlue = vec3(0.0, 0.04, 0.12);

        float n1 = noise(vWorldPos.xz * 0.02 + uTime * 0.1);
        float n2 = noise(vWorldPos.xz * 0.05 - uTime * 0.15);
        float n3 = noise(vWorldPos.xz * 0.1 + uTime * 0.08);

        float bioPattern = n1 * 0.5 + n2 * 0.3 + n3 * 0.2;
        bioPattern = smoothstep(0.4, 0.7, bioPattern);

        float pulse = sin(uTime * 2.0 + vWorldPos.x * 0.1) * 0.5 + 0.5;
        float pulse2 = sin(uTime * 1.5 + vWorldPos.z * 0.08) * 0.5 + 0.5;
        bioPattern *= mix(0.3, 1.0, pulse * pulse2);

        vec3 glowColor = mix(uColorPrimary, uColorSecondary, sin(uTime * 0.5 + vWorldPos.x * 0.05) * 0.5 + 0.5);

        vec3 baseColor = mix(deepBlue, darkBlue, vElevation * 0.1 + 0.5);
        vec3 finalColor = baseColor + glowColor * bioPattern * 0.6;

        float crestGlow = smoothstep(0.5, 2.0, vElevation) * 0.3;
        finalColor += glowColor * crestGlow;

        gl_FragColor = vec4(finalColor, 0.95);
    }
`;

const oceanMaterial = new THREE.ShaderMaterial({
    vertexShader: oceanVertexShader,
    fragmentShader: oceanFragmentShader,
    uniforms: {
        uTime: { value: 0 },
        uWaveAmplitude: { value: state.waveAmplitude },
        uColorPrimary: { value: colorThemes.cyan.primary.clone() },
        uColorSecondary: { value: colorThemes.cyan.secondary.clone() }
    },
    transparent: true,
    side: THREE.DoubleSide
});

const oceanGeometry = new THREE.PlaneGeometry(200, 200, 256, 256);
const ocean = new THREE.Mesh(oceanGeometry, oceanMaterial);
ocean.rotation.x = -Math.PI / 2;
ocean.name = 'ocean';
scene.add(ocean);

// Floating Island
const islandGeometry = new THREE.CylinderGeometry(2.5, 3.5, 1, 12, 3);
// Roughen the island
const islandPositions = islandGeometry.attributes.position;
for (let i = 0; i < islandPositions.count; i++) {
    const x = islandPositions.getX(i);
    const y = islandPositions.getY(i);
    const z = islandPositions.getZ(i);
    const dist = Math.sqrt(x * x + z * z);
    if (dist > 0.5) {
        islandPositions.setX(i, x + (Math.random() - 0.5) * 0.4);
        islandPositions.setZ(i, z + (Math.random() - 0.5) * 0.4);
    }
    if (y < 0) {
        islandPositions.setY(i, y - Math.random() * 0.3);
    }
}
islandGeometry.computeVertexNormals();

const islandMaterial = new THREE.MeshStandardMaterial({
    color: 0x4a3520,
    roughness: 0.9,
    metalness: 0.1,
    flatShading: true
});
const island = new THREE.Mesh(islandGeometry, islandMaterial);
island.position.set(0, 4, 0);
scene.add(island);

// Add some grass/moss on top
const mossGeometry = new THREE.CylinderGeometry(2.3, 2.5, 0.15, 12);
const mossMaterial = new THREE.MeshStandardMaterial({
    color: 0x1a4a2a,
    roughness: 1.0,
    flatShading: true
});
const moss = new THREE.Mesh(mossGeometry, mossMaterial);
moss.position.y = 0.5;
island.add(moss);

// Fox Model
let foxMixer = null;
let foxModel = null;
let foxBaseY = 0;

const loader = new GLTFLoader();
loader.load(
    'Fox.glb',
    (gltf) => {
        foxModel = gltf.scene;
        foxModel.scale.set(0.04, 0.04, 0.04);
        foxModel.position.set(0, 0.5, 0);
        foxModel.rotation.y = Math.PI;
        island.add(foxModel);

        // Aura effect
        const auraMat = new THREE.MeshBasicMaterial({
            color: 0x00ffcc,
            transparent: true,
            opacity: 0.15,
            side: THREE.DoubleSide
        });
        const auraGeo = new THREE.SphereGeometry(1.8, 16, 16);
        const aura = new THREE.Mesh(auraGeo, auraMat);
        aura.position.set(0, 1.5, 0);
        aura.name = 'foxAura';
        island.add(aura);

        // Animation
        if (gltf.animations && gltf.animations.length > 0) {
            foxMixer = new THREE.AnimationMixer(foxModel);
            const action = foxMixer.clipAction(gltf.animations[0]);
            action.play();
        }

        state.foxLoaded = true;
        foxLight.position.copy(island.position).add(new THREE.Vector3(0, 2, 0));
        checkReady();
    },
    undefined,
    (error) => {
        console.warn('Fox.glb failed to load:', error);
        // Create placeholder fox
        const placeholderGeo = new THREE.ConeGeometry(0.5, 1.5, 6);
        const placeholderMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0x331100 });
        foxModel = new THREE.Mesh(placeholderGeo, placeholderMat);
        foxModel.position.set(0, 1.2, 0);
        island.add(foxModel);

        const auraMat = new THREE.MeshBasicMaterial({
            color: 0x00ffcc,
            transparent: true,
            opacity: 0.15,
            side: THREE.DoubleSide
        });
        const auraGeo = new THREE.SphereGeometry(1.8, 16, 16);
        const aura = new THREE.Mesh(auraGeo, auraMat);
        aura.position.set(0, 1.5, 0);
        aura.name = 'foxAura';
        island.add(aura);

        state.foxLoaded = true;
        checkReady();
    }
);

// Bioluminescent Particles
const particleCount = 500;
const particleGeometry = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleSpeeds = new Float32Array(particleCount * 3);

for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3] = (Math.random() - 0.5) * 180;
    particlePositions[i * 3 + 1] = Math.random() * 2 + 0.5;
    particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 180;
    particleSpeeds[i * 3] = (Math.random() - 0.5) * 0.3;
    particleSpeeds[i * 3 + 1] = (Math.random() - 0.5) * 0.1;
    particleSpeeds[i * 3 + 2] = (Math.random() - 0.5) * 0.3;
}

particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

const particleMaterial = new THREE.PointsMaterial({
    color: 0x00ffcc,
    size: 0.4,
    transparent: true,
    opacity: 0.8,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true
});

const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

state.particleCount = particleCount;

// Extra particles from clicks
const extraParticles = [];

// Plankton Bloom Zones
const bloomZones = [];
for (let i = 0; i < 5; i++) {
    const radius = 5 + Math.random() * 5;
    const bloomGeo = new THREE.CircleGeometry(radius, 32);
    const bloomMat = new THREE.MeshBasicMaterial({
        color: 0x00ffcc,
        transparent: true,
        opacity: 0.15,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide,
        depthWrite: false
    });
    const bloom = new THREE.Mesh(bloomGeo, bloomMat);
    bloom.rotation.x = -Math.PI / 2;
    bloom.position.set(
        (Math.random() - 0.5) * 120,
        0.3,
        (Math.random() - 0.5) * 120
    );
    bloom.userData = { baseOpacity: 0.1 + Math.random() * 0.1, phaseOffset: Math.random() * Math.PI * 2, radius };
    scene.add(bloom);
    bloomZones.push(bloom);
}
state.bloomCount = 5;

// Ripples
const ripples = [];

function spawnRipple(x, z) {
    const rippleGeo = new THREE.RingGeometry(0.1, 0.3, 32);
    const rippleMat = new THREE.MeshBasicMaterial({
        color: colorThemes[state.colorTheme].primary,
        transparent: true,
        opacity: 1.0,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide,
        depthWrite: false
    });
    const ripple = new THREE.Mesh(rippleGeo, rippleMat);
    ripple.rotation.x = -Math.PI / 2;
    ripple.position.set(x, 0.5, z);
    ripple.userData = { age: 0, maxAge: 2.0 };
    scene.add(ripple);
    ripples.push(ripple);
    state.rippleCount++;
}

function spawnClickParticles(x, z, count) {
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(count * 3);
    const speeds = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
        positions[i * 3] = x + (Math.random() - 0.5) * 2;
        positions[i * 3 + 1] = 0.5 + Math.random() * 2;
        positions[i * 3 + 2] = z + (Math.random() - 0.5) * 2;
        speeds[i * 3] = (Math.random() - 0.5) * 2;
        speeds[i * 3 + 1] = Math.random() * 3;
        speeds[i * 3 + 2] = (Math.random() - 0.5) * 2;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const mat = new THREE.PointsMaterial({
        color: colorThemes[state.colorTheme].primary,
        size: 0.3,
        transparent: true,
        opacity: 1.0,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        sizeAttenuation: true
    });

    const pts = new THREE.Points(geo, mat);
    pts.userData = { speeds, age: 0, maxAge: 3.0 };
    scene.add(pts);
    extraParticles.push(pts);
    state.particleCount += count;
}

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(ocean);

    if (intersects.length > 0) {
        const point = intersects[0].point;
        spawnRipple(point.x, point.z);
        spawnClickParticles(point.x, point.z, 20);
        state.clickCount++;
        updateHUD();
    }
});

// Keyboard
let foxJumpTween = null;

document.addEventListener('keydown', (event) => {
    const key = event.key.toLowerCase();

    if (key === 'w') {
        state.waveAmplitude = Math.min(5.0, state.waveAmplitude + 0.5);
        oceanMaterial.uniforms.uWaveAmplitude.value = state.waveAmplitude;
        updateHUD();
    }
    if (key === 's') {
        state.waveAmplitude = Math.max(0.5, state.waveAmplitude - 0.5);
        oceanMaterial.uniforms.uWaveAmplitude.value = state.waveAmplitude;
        updateHUD();
    }
    if (key === 'b') {
        state.bloomsVisible = !state.bloomsVisible;
        bloomZones.forEach(b => b.visible = state.bloomsVisible);
        updateHUD();
    }
    if (key === 'f' && !state.foxJumping) {
        state.foxJumping = true;
        state.foxJumpCount++;
        foxBaseY = island.position.y;
        const jumpStart = performance.now();
        const jumpDuration = 600;

        function animateJump() {
            const elapsed = performance.now() - jumpStart;
            const t = elapsed / jumpDuration;

            if (t < 0.5) {
                const up = t / 0.5;
                island.position.y = foxBaseY + 3 * Math.sin(up * Math.PI / 2);
            } else if (t < 1.0) {
                const down = (t - 0.5) / 0.5;
                island.position.y = foxBaseY + 3 * Math.cos(down * Math.PI / 2);
            } else {
                island.position.y = foxBaseY;
                state.foxJumping = false;
                updateHUD();
                return;
            }
            requestAnimationFrame(animateJump);
        }
        animateJump();
        updateHUD();
    }
    if (key === 'c') {
        const themes = ['cyan', 'purple', 'gold'];
        const idx = themes.indexOf(state.colorTheme);
        state.colorTheme = themes[(idx + 1) % 3];
        const theme = colorThemes[state.colorTheme];
        oceanMaterial.uniforms.uColorPrimary.value.copy(theme.primary);
        oceanMaterial.uniforms.uColorSecondary.value.copy(theme.secondary);
        particleMaterial.color.copy(theme.primary);
        foxLight.color.copy(theme.primary);
        bloomZones.forEach(b => b.material.color.copy(theme.primary));

        // Update aura
        const aura = island.getObjectByName('foxAura');
        if (aura) aura.material.color.copy(theme.primary);

        updateHUD();
    }
    if (key === 'n') {
        state.nightMode = !state.nightMode;
        if (state.nightMode) {
            ambientLight.intensity = 0.05;
            particleMaterial.opacity = 1.0;
            particleMaterial.size = 0.6;
        } else {
            ambientLight.intensity = 0.3;
            particleMaterial.opacity = 0.8;
            particleMaterial.size = 0.4;
        }
        updateHUD();
    }
    if (key === 'p') {
        state.paused = !state.paused;
        updateHUD();
    }
});

// Mouse wheel zoom
renderer.domElement.addEventListener('wheel', (event) => {
    state.cameraZ += event.deltaY * 0.03;
    state.cameraZ = Math.max(15, Math.min(60, state.cameraZ));
    camera.position.z = state.cameraZ;
});

// Reset button
document.getElementById('resetBtn').addEventListener('click', () => {
    state.waveAmplitude = 2.0;
    state.clickCount = 0;
    state.foxJumpCount = 0;
    state.foxJumping = false;
    state.colorTheme = 'cyan';
    state.nightMode = false;
    state.paused = false;
    state.cameraZ = 30;
    state.bloomsVisible = true;
    state.rippleCount = 0;

    oceanMaterial.uniforms.uWaveAmplitude.value = 2.0;
    const theme = colorThemes.cyan;
    oceanMaterial.uniforms.uColorPrimary.value.copy(theme.primary);
    oceanMaterial.uniforms.uColorSecondary.value.copy(theme.secondary);
    particleMaterial.color.copy(theme.primary);
    particleMaterial.opacity = 0.8;
    particleMaterial.size = 0.4;
    foxLight.color.copy(theme.primary);
    ambientLight.intensity = 0.3;
    camera.position.set(0, 15, 30);
    bloomZones.forEach(b => {
        b.visible = true;
        b.material.color.copy(theme.primary);
    });

    const aura = island.getObjectByName('foxAura');
    if (aura) aura.material.color.copy(theme.primary);

    // Remove extra particles
    extraParticles.forEach(p => {
        scene.remove(p);
        p.geometry.dispose();
        p.material.dispose();
    });
    extraParticles.length = 0;
    state.particleCount = 500;

    // Remove ripples
    ripples.forEach(r => {
        scene.remove(r);
        r.geometry.dispose();
        r.material.dispose();
    });
    ripples.length = 0;

    updateHUD();
});

// HUD update
function updateHUD() {
    document.getElementById('hudWave').textContent = state.waveAmplitude.toFixed(1);
    document.getElementById('hudTheme').textContent = state.colorTheme;
    document.getElementById('hudClicks').textContent = state.clickCount;
    document.getElementById('hudJumps').textContent = state.foxJumpCount;
    document.getElementById('hudNight').textContent = state.nightMode ? 'ON' : 'OFF';
    document.getElementById('hudPaused').textContent = state.paused ? 'YES' : 'NO';
}

function checkReady() {
    if (state.foxLoaded) {
        state.sceneReady = true;
    }
}

// Stars background
const starGeo = new THREE.BufferGeometry();
const starCount = 2000;
const starPositions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI * 0.5;
    const r = 150 + Math.random() * 50;
    starPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    starPositions[i * 3 + 1] = r * Math.cos(phi) + 20;
    starPositions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starMat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.3,
    transparent: true,
    opacity: 0.6,
    sizeAttenuation: true
});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// Moon
const moonGeo = new THREE.SphereGeometry(3, 32, 32);
const moonMat = new THREE.MeshBasicMaterial({ color: 0xddeeff });
const moon = new THREE.Mesh(moonGeo, moonMat);
moon.position.set(50, 60, -80);
scene.add(moon);

// Animation
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    if (state.paused) {
        renderer.render(scene, camera);
        return;
    }

    const delta = clock.getDelta();
    state.elapsedTime += delta;
    const time = state.elapsedTime;

    // Ocean
    oceanMaterial.uniforms.uTime.value = time;

    // Island bobbing
    if (!state.foxJumping) {
        const bobY = 4 + Math.sin(time * (2 * Math.PI / 3)) * 0.5;
        island.position.y = bobY;
    }
    state.islandY = island.position.y;

    // Fox position
    if (foxModel) {
        const worldPos = new THREE.Vector3();
        foxModel.getWorldPosition(worldPos);
        state.foxPositionY = worldPos.y;
    }

    // Fox light follows island
    foxLight.position.set(island.position.x, island.position.y + 3, island.position.z);

    // Fox aura pulse
    const aura = island.getObjectByName('foxAura');
    if (aura) {
        aura.material.opacity = 0.1 + Math.sin(time * 3) * 0.05;
        aura.scale.setScalar(1 + Math.sin(time * 2) * 0.1);
    }

    // Fox animation mixer
    if (foxMixer) foxMixer.update(delta);

    // Particles drift
    const positions = particles.geometry.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
        positions[i * 3] += particleSpeeds[i * 3] * delta;
        positions[i * 3 + 1] = 0.5 + Math.sin(time * 0.5 + i) * 0.5 + Math.abs(Math.sin(time + i * 0.1)) * 1.5;
        positions[i * 3 + 2] += particleSpeeds[i * 3 + 2] * delta;

        // Wrap around
        if (positions[i * 3] > 90) positions[i * 3] = -90;
        if (positions[i * 3] < -90) positions[i * 3] = 90;
        if (positions[i * 3 + 2] > 90) positions[i * 3 + 2] = -90;
        if (positions[i * 3 + 2] < -90) positions[i * 3 + 2] = 90;
    }
    particles.geometry.attributes.position.needsUpdate = true;

    // Particle color cycling
    const t4 = (time % 4) / 4;
    const theme = colorThemes[state.colorTheme];
    const pColor = new THREE.Color().lerpColors(theme.primary, theme.secondary, Math.sin(t4 * Math.PI * 2) * 0.5 + 0.5);
    particleMaterial.color.copy(pColor);

    // Bloom zones pulse
    bloomZones.forEach(bloom => {
        if (bloom.visible) {
            const pulse = Math.sin(time * 1.5 + bloom.userData.phaseOffset) * 0.5 + 0.5;
            bloom.material.opacity = bloom.userData.baseOpacity + pulse * 0.15;
        }
    });

    // Ripples
    for (let i = ripples.length - 1; i >= 0; i--) {
        const ripple = ripples[i];
        ripple.userData.age += delta;
        const t = ripple.userData.age / ripple.userData.maxAge;

        if (t >= 1) {
            scene.remove(ripple);
            ripple.geometry.dispose();
            ripple.material.dispose();
            ripples.splice(i, 1);
            continue;
        }

        const scale = 1 + t * 15;
        ripple.scale.set(scale, scale, 1);
        ripple.material.opacity = 1 - t;
    }

    // Extra particles
    for (let i = extraParticles.length - 1; i >= 0; i--) {
        const pts = extraParticles[i];
        pts.userData.age += delta;
        const t = pts.userData.age / pts.userData.maxAge;

        if (t >= 1) {
            scene.remove(pts);
            const count = pts.geometry.attributes.position.count;
            state.particleCount -= count;
            pts.geometry.dispose();
            pts.material.dispose();
            extraParticles.splice(i, 1);
            continue;
        }

        pts.material.opacity = 1 - t;
        const ePositions = pts.geometry.attributes.position.array;
        const speeds = pts.userData.speeds;
        for (let j = 0; j < ePositions.length / 3; j++) {
            ePositions[j * 3] += speeds[j * 3] * delta;
            ePositions[j * 3 + 1] += speeds[j * 3 + 1] * delta;
            speeds[j * 3 + 1] -= 3 * delta; // gravity
            ePositions[j * 3 + 2] += speeds[j * 3 + 2] * delta;
        }
        pts.geometry.attributes.position.needsUpdate = true;
    }

    // Camera gentle sway
    camera.position.x = Math.sin(time * 0.1) * 2;
    camera.position.y = 15 + Math.sin(time * 0.15) * 0.5;
    camera.lookAt(0, 3, 0);

    renderer.render(scene, camera);
}

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start
checkReady();
animate();
updateHUD();

</script>
</body>
</html>
