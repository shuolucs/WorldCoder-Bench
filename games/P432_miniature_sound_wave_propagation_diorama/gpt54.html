<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Sound Wave Propagation Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #101820;
      font-family: Arial, sans-serif;
      color: white;
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    canvas {
      display: block;
    }
    .panel {
      position: absolute;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 12px;
      backdrop-filter: blur(4px);
      z-index: 10;
      user-select: none;
    }
    #controls {
      top: 12px;
      right: 12px;
      width: 270px;
    }
    #hud-info {
      top: 12px;
      left: 12px;
      min-width: 250px;
      line-height: 1.45;
      white-space: pre-line;
    }
    #hud-probe {
      bottom: 12px;
      left: 12px;
      min-width: 250px;
      line-height: 1.4;
    }
    .row {
      margin-bottom: 10px;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }
    input[type="range"] {
      width: 100%;
    }
    button {
      background: #2f4f6f;
      color: white;
      border: none;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    button:hover {
      background: #41698f;
    }
    .small {
      font-size: 12px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud-info" class="panel">Loading...</div>

    <div id="controls" class="panel">
      <div class="row">
        <button id="btn-play">Play</button>
        <button id="btn-reset">Reset</button>
        <button id="btn-medium">Medium: Air</button>
      </div>
      <div class="row">
        <label for="slider-speed">Wave Speed: <span id="speed-value">3.0</span></label>
        <input id="slider-speed" type="range" min="0.5" max="8.0" step="0.5" value="3.0" />
      </div>
      <div class="row">
        <label for="slider-freq">Emission Interval: <span id="freq-value">0.5</span> s</label>
        <input id="slider-freq" type="range" min="0.2" max="2.0" step="0.1" value="0.5" />
      </div>
      <div class="small">
        Keys:<br/>
        D = Diffraction<br/>
        R = Reflection<br/>
        M = Mute particle response<br/>
        Click base to place probe
      </div>
    </div>

    <div id="hud-probe" class="panel">Probe: none</div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const hudInfo = document.getElementById('hud-info');
    const hudProbe = document.getElementById('hud-probe');
    const btnPlay = document.getElementById('btn-play');
    const btnReset = document.getElementById('btn-reset');
    const btnMedium = document.getElementById('btn-medium');
    const sliderSpeed = document.getElementById('slider-speed');
    const sliderFreq = document.getElementById('slider-freq');
    const speedValue = document.getElementById('speed-value');
    const freqValue = document.getElementById('freq-value');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f1720);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 18);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.5, 0);
    controls.enableDamping = true;
    controls.minPolarAngle = 0.2;
    controls.maxPolarAngle = 1.4;

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const clock = new THREE.Clock();
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const BASE_Y = 0.25;
    const PARTICLE_Y = 1.0;
    const WAVE_Y = 1.5;
    const MAX_WAVE_RADIUS = 14;
    const SPEAKER_POS = new THREE.Vector3(-10, 1.5, 0);
    const WALL_POS = new THREE.Vector3(0, 1.5, 0);
    const CYL_POS = new THREE.Vector3(4, 1.5, 3);

    const mediums = [
      { name: 'Air', mult: 1.0, color: 0x44AA88 },
      { name: 'Water', mult: 0.4, color: 0x2266CC },
      { name: 'Steel', mult: 1.8, color: 0xAAAAAA }
    ];

    const state = {
      isPlaying: false,
      waveSpeed: 3.0,
      emissionInterval: 0.5,
      activeWaveCount: 0,
      oscillatingParticleCount: 0,
      medium: 'Air',
      mediumMultiplier: 1.0,
      effectiveSpeed: 3.0,
      diffractionEnabled: false,
      reflectionEnabled: false,
      muted: false,
      totalWavesEmitted: 0,
      probePosition: null,
      probeDistance: null,
      probeDelay: null,
      speakerPosition: { x: SPEAKER_POS.x, y: SPEAKER_POS.y, z: SPEAKER_POS.z },
      maxWaveRadius: MAX_WAVE_RADIUS,
      particleCount: 200,
      reflectedWaveCount: 0
    };
    window.__3D_STATE__ = state;

    function safeNumber(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function updateEffectiveSpeed() {
      state.effectiveSpeed = safeNumber(state.waveSpeed * state.mediumMultiplier, 0);
      updateProbeHUD();
    }

    // Base
    const baseGeo = new THREE.BoxGeometry(30, 0.5, 20);
    const baseMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9, metalness: 0.05 });
    const base = new THREE.Mesh(baseGeo, baseMat);
    base.position.set(0, 0, 0);
    scene.add(base);

    // Glass dome
    const domeGeo = new THREE.SphereGeometry(12, 48, 24, 0, Math.PI * 2, 0, Math.PI / 2);
    const domeMat = new THREE.MeshPhysicalMaterial({
      color: 0xCCEEFF,
      transparent: true,
      opacity: 0.1,
      roughness: 0,
      transmission: 0.2,
      side: THREE.DoubleSide
    });
    const dome = new THREE.Mesh(domeGeo, domeMat);
    dome.position.set(0, 0.25, 0);
    scene.add(dome);

    // Speaker
    const speakerGroup = new THREE.Group();
    const speakerBody = new THREE.Mesh(
      new THREE.BoxGeometry(0.8, 0.8, 0.5),
      new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.7 })
    );
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(0.3, 0.35, 24),
      new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.5 })
    );
    cone.rotation.x = Math.PI / 2;
    cone.position.z = 0.4;
    speakerGroup.add(speakerBody, cone);
    speakerGroup.position.copy(SPEAKER_POS);
    scene.add(speakerGroup);

    // Obstacles
    const wall = new THREE.Mesh(
      new THREE.BoxGeometry(4, 2, 0.3),
      new THREE.MeshStandardMaterial({ color: 0x996633, roughness: 0.8 })
    );
    wall.position.copy(WALL_POS);
    scene.add(wall);

    const cylinderObs = new THREE.Mesh(
      new THREE.CylinderGeometry(1.5, 1.5, 2, 40),
      new THREE.MeshStandardMaterial({ color: 0x669999, roughness: 0.7 })
    );
    cylinderObs.position.copy(CYL_POS);
    scene.add(cylinderObs);

    // Ground click plane
    const clickPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 20),
      new THREE.MeshBasicMaterial({ visible: false })
    );
    clickPlane.rotation.x = -Math.PI / 2;
    clickPlane.position.y = 0.251;
    scene.add(clickPlane);

    // Probe
    let probe = null;

    function setProbe(pos) {
      if (!probe) {
        probe = new THREE.Mesh(
          new THREE.SphereGeometry(0.18, 24, 24),
          new THREE.MeshStandardMaterial({ color: 0xFFFF00, emissive: 0x665500 })
        );
        scene.add(probe);
      }
      probe.position.set(pos.x, 1.1, pos.z);
      const dx = pos.x - SPEAKER_POS.x;
      const dz = pos.z - SPEAKER_POS.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      state.probePosition = { x: safeNumber(pos.x), z: safeNumber(pos.z) };
      state.probeDistance = safeNumber(dist, 0);
      state.probeDelay = state.effectiveSpeed > 0 ? safeNumber(dist / state.effectiveSpeed, 0) : null;
      updateProbeHUD();
    }

    function clearProbe() {
      if (probe) {
        scene.remove(probe);
        probe.geometry.dispose();
        probe.material.dispose();
        probe = null;
      }
      state.probePosition = null;
      state.probeDistance = null;
      state.probeDelay = null;
      updateProbeHUD();
    }

    function updateProbeHUD() {
      if (!state.probePosition) {
        hudProbe.textContent = 'Probe: none';
        return;
      }
      const d = safeNumber(state.probeDistance, 0).toFixed(2);
      const t = state.probeDelay == null ? 'N/A' : safeNumber(state.probeDelay, 0).toFixed(2) + ' s';
      hudProbe.textContent = `Probe
Position: (${state.probePosition.x.toFixed(2)}, ${state.probePosition.z.toFixed(2)})
Distance from speaker: ${d}
Time delay: ${t}`;
    }

    // Particles
    const particles = [];
    const particleGeo = new THREE.SphereGeometry(0.08, 12, 12);

    function currentMediumColor() {
      const m = mediums.find(x => x.name === state.medium) || mediums[0];
      return m.color;
    }

    for (let i = 0; i < 200; i++) {
      const x = THREE.MathUtils.randFloat(-12, 12);
      const z = THREE.MathUtils.randFloat(-8, 8);
      const mat = new THREE.MeshStandardMaterial({ color: currentMediumColor() });
      const p = new THREE.Mesh(particleGeo, mat);
      p.position.set(x, PARTICLE_Y, z);
      scene.add(p);
      particles.push({
        mesh: p,
        baseY: PARTICLE_Y,
        oscillating: false,
        oscTime: 0,
        triggerWaveId: null
      });
    }

    // Waves
    const waveGroup = new THREE.Group();
    scene.add(waveGroup);

    const waves = [];
    let emissionTimer = 0;
    let waveIdCounter = 0;

    function colorForRadius(r) {
      const t = THREE.MathUtils.clamp((r - 0.3) / (MAX_WAVE_RADIUS - 0.3), 0, 1);
      const c = new THREE.Color();
      c.setHSL((1 - t) * 0.0 + t * 0.66, 1.0, 0.5);
      return c;
    }

    function angleDiff(a, b) {
      let d = a - b;
      while (d > Math.PI) d -= Math.PI * 2;
      while (d < -Math.PI) d += Math.PI * 2;
      return Math.abs(d);
    }

    function createWave(origin, reflected = false) {
      if (waves.length >= 30) {
        const oldest = waves.shift();
        if (oldest) removeWave(oldest);
      }

      const majorRadius = 0.3;
      const geo = new THREE.TorusGeometry(majorRadius, 0.05, 12, 96);
      const mat = new THREE.MeshBasicMaterial({
        color: reflected ? 0x88ffff : 0xff0000,
        transparent: true,
        opacity: 1.0,
        side: THREE.DoubleSide,
        depthWrite: false
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = Math.PI / 2;
      mesh.position.set(origin.x, WAVE_Y, origin.z);
      waveGroup.add(mesh);

      const wave = {
        id: waveIdCounter++,
        mesh,
        radius: 0.3,
        origin: new THREE.Vector3(origin.x, WAVE_Y, origin.z),
        reflected,
        wallHitTriggered: false
      };

      waves.push(wave);
      state.totalWavesEmitted = safeNumber(state.totalWavesEmitted + 1, state.totalWavesEmitted);
      syncStateCounts();
    }

    function removeWave(wave) {
      waveGroup.remove(wave.mesh);
      wave.mesh.geometry.dispose();
      wave.mesh.material.dispose();
    }

    function resetParticles() {
      for (const p of particles) {
        p.mesh.position.y = p.baseY;
        p.oscillating = false;
        p.oscTime = 0;
        p.triggerWaveId = null;
      }
    }

    function resetAllWaves() {
      while (waves.length) {
        removeWave(waves.pop());
      }
      syncStateCounts();
    }

    function syncStateCounts() {
      state.activeWaveCount = safeNumber(waves.length, 0);
      state.reflectedWaveCount = safeNumber(waves.filter(w => w.reflected).length, 0);
      state.oscillatingParticleCount = safeNumber(particles.filter(p => p.oscillating).length, 0);
    }

    function obstacleShadowFactor(point, waveOrigin) {
      if (state.diffractionEnabled) return 1.0;

      let factor = 1.0;
      const obstacles = [
        { center: new THREE.Vector3(WALL_POS.x, WAVE_Y, WALL_POS.z), radius: 2.0 },
        { center: new THREE.Vector3(CYL_POS.x, WAVE_Y, CYL_POS.z), radius: 1.5 }
      ];

      const pointVec = new THREE.Vector3(point.x, WAVE_Y, point.z);
      const dirPoint = new THREE.Vector3().subVectors(pointVec, waveOrigin);
      const pointDist = dirPoint.length();
      if (pointDist <= 0.0001) return 1.0;
      const pointAngle = Math.atan2(dirPoint.z, dirPoint.x);

      for (const obs of obstacles) {
        const dirObs = new THREE.Vector3().subVectors(obs.center, waveOrigin);
        const obsDist = dirObs.length();
        const obsAngle = Math.atan2(dirObs.z, dirObs.x);
        const diff = angleDiff(pointAngle, obsAngle);

        if (pointDist > obsDist && diff <= THREE.MathUtils.degToRad(15)) {
          factor *= 0.3;
        }
      }
      return factor;
    }

    function updateWaveVisual(wave) {
      wave.mesh.geometry.dispose();
      wave.mesh.geometry = new THREE.TorusGeometry(safeNumber(wave.radius, 0.3), 0.05, 12, 96);

      const c = wave.reflected ? new THREE.Color(0x88ffff) : colorForRadius(wave.radius);
      wave.mesh.material.color.copy(c);

      const baseOpacity = THREE.MathUtils.clamp(1 - ((wave.radius - 0.3) / (MAX_WAVE_RADIUS - 0.3)), 0, 1);

      const samplePoint = {
        x: wave.origin.x + wave.radius,
        z: wave.origin.z
      };
      const shadowFactor = obstacleShadowFactor(samplePoint, wave.origin);
      wave.mesh.material.opacity = safeNumber(baseOpacity * shadowFactor, 0);
    }

    function tryTriggerReflection(wave) {
      if (!state.reflectionEnabled || wave.reflected || wave.wallHitTriggered) return;

      const dx = WALL_POS.x - wave.origin.x;
      const dz = WALL_POS.z - wave.origin.z;
      const distToWallCenter = Math.sqrt(dx * dx + dz * dz);
      const wallTriggerRadius = Math.max(0.1, distToWallCenter - 2.0);

      if (wave.radius >= wallTriggerRadius) {
        wave.wallHitTriggered = true;
        createWave({ x: WALL_POS.x - 2.0, z: WALL_POS.z }, true);
      }
    }

    function updateParticles(dt, elapsed) {
      if (!state.muted) {
        for (const wave of waves) {
          const band = 0.22;
          for (const p of particles) {
            if (p.triggerWaveId === wave.id) continue;
            const dx = p.mesh.position.x - wave.origin.x;
            const dz = p.mesh.position.z - wave.origin.z;
            const d = Math.sqrt(dx * dx + dz * dz);
            if (Math.abs(d - wave.radius) <= band) {
              p.oscillating = true;
              p.oscTime = 1.0;
              p.triggerWaveId = wave.id;
            }
          }
        }
      }

      for (const p of particles) {
        if (p.oscillating) {
          p.oscTime = safeNumber(p.oscTime - dt, 0);
          const phase = (1.0 - p.oscTime) * Math.PI * 8 + elapsed * 6;
          const amp = 0.5 * Math.max(p.oscTime, 0);
          p.mesh.position.y = p.baseY + 0.5 * Math.sin(phase) * Math.max(amp, 0);
          if (p.oscTime <= 0 || state.muted) {
            p.oscillating = false;
            p.oscTime = 0;
            p.mesh.position.y = p.baseY;
            p.triggerWaveId = null;
          }
        } else {
          p.mesh.position.y += (p.baseY - p.mesh.position.y) * Math.min(1, dt * 8);
          if (Math.abs(p.mesh.position.y - p.baseY) < 0.0001) p.mesh.position.y = p.baseY;
        }
      }
      syncStateCounts();
    }

    function updateHUD() {
      hudInfo.textContent =
`Active waves count: ${state.activeWaveCount}
Oscillating particles count: ${state.oscillatingParticleCount}
Current effective speed: ${safeNumber(state.effectiveSpeed, 0).toFixed(2)}
Current medium name: ${state.medium}
Diffraction: ${state.diffractionEnabled ? 'ON' : 'OFF'}
Reflection: ${state.reflectionEnabled ? 'ON' : 'OFF'}
Muted: ${state.muted ? 'ON' : 'OFF'}
Total waves emitted: ${state.totalWavesEmitted}`;
    }

    function animate() {
      requestAnimationFrame(animate);
      let dt = clock.getDelta();
      dt = Math.min(dt, 0.1);
      const elapsed = clock.elapsedTime;

      if (state.isPlaying) {
        emissionTimer += dt;
        while (emissionTimer >= state.emissionInterval) {
          emissionTimer -= state.emissionInterval;
          createWave({ x: SPEAKER_POS.x, z: SPEAKER_POS.z }, false);
        }
      }

      const speed = safeNumber(state.effectiveSpeed, 0);

      for (let i = waves.length - 1; i >= 0; i--) {
        const wave = waves[i];
        wave.radius = safeNumber(wave.radius + speed * dt, wave.radius);
        tryTriggerReflection(wave);
        updateWaveVisual(wave);
        if (wave.radius >= MAX_WAVE_RADIUS || wave.mesh.material.opacity <= 0.001) {
          removeWave(wave);
          waves.splice(i, 1);
        }
      }

      updateParticles(dt, elapsed);
      syncStateCounts();
      updateHUD();
      controls.update();
      renderer.render(scene, camera);
    }

    // UI
    function setPlaying(v) {
      state.isPlaying = !!v;
      btnPlay.textContent = state.isPlaying ? 'Pause' : 'Play';
    }

    btnPlay.addEventListener('click', () => {
      setPlaying(!state.isPlaying);
    });

    btnReset.addEventListener('click', () => {
      setPlaying(false);
      emissionTimer = 0;
      resetAllWaves();
      resetParticles();
      syncStateCounts();
      updateHUD();
    });

    sliderSpeed.addEventListener('input', () => {
      state.waveSpeed = safeNumber(parseFloat(sliderSpeed.value), 3.0);
      speedValue.textContent = state.waveSpeed.toFixed(1);
      updateEffectiveSpeed();
    });

    sliderFreq.addEventListener('input', () => {
      state.emissionInterval = safeNumber(parseFloat(sliderFreq.value), 0.5);
      freqValue.textContent = state.emissionInterval.toFixed(1);
    });

    let mediumIndex = 0;
    btnMedium.addEventListener('click', () => {
      mediumIndex = (mediumIndex + 1) % mediums.length;
      const m = mediums[mediumIndex];
      state.medium = m.name;
      state.mediumMultiplier = m.mult;
      btnMedium.textContent = `Medium: ${m.name}`;
      for (const p of particles) {
        p.mesh.material.color.setHex(m.color);
      }
      updateEffectiveSpeed();
      updateHUD();
    });

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'd') state.diffractionEnabled = !state.diffractionEnabled;
      if (key === 'r') state.reflectionEnabled = !state.reflectionEnabled;
      if (key === 'm') state.muted = !state.muted;
      updateHUD();
    });

    renderer.domElement.addEventListener('pointerdown', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(clickPlane);
      if (hits.length > 0) {
        const p = hits[0].point;
        const clampedX = THREE.MathUtils.clamp(p.x, -15, 15);
        const clampedZ = THREE.MathUtils.clamp(p.z, -10, 10);
        setProbe({ x: clampedX, z: clampedZ });
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Init
    speedValue.textContent = Number(sliderSpeed.value).toFixed(1);
    freqValue.textContent = Number(sliderFreq.value).toFixed(1);
    updateEffectiveSpeed();
    updateProbeHUD();
    updateHUD();
    animate();
  </script>
</body>
</html>
