<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Wave Propagation Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .panel {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            backdrop-filter: blur(4px);
        }
        #hud-info {
            top: 20px;
            left: 20px;
            min-width: 250px;
            pointer-events: none;
        }
        #hud-info h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #CCEEFF;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .stat-label { color: #aaa; }
        .stat-value { font-weight: bold; color: #fff; }
        
        #controls {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            align-items: center;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #666;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background: #555; }
        button:active { background: #222; }
        
        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .slider-group label { font-size: 12px; color: #aaa; }
        input[type=range] { cursor: pointer; }

        #hud-probe-container {
            position: absolute;
            top: 20px;
            right: 20px;
            display: none;
        }
        
        .instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            font-size: 12px;
            color: #888;
            pointer-events: none;
        }
        .key {
            display: inline-block;
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            color: #fff;
            margin-left: 5px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud-info" class="panel">
        <h2>Wave Simulation</h2>
        <div class="stat-row"><span class="stat-label">Active Waves:</span><span id="stat-waves" class="stat-value">0</span></div>
        <div class="stat-row"><span class="stat-label">Oscillating Particles:</span><span id="stat-particles" class="stat-value">0</span></div>
        <div class="stat-row"><span class="stat-label">Effective Speed:</span><span id="stat-speed" class="stat-value">3.0 u/s</span></div>
        <div class="stat-row"><span class="stat-label">Medium:</span><span id="stat-medium" class="stat-value">Air</span></div>
        <div class="stat-row"><span class="stat-label">Diffraction (D):</span><span id="stat-diffraction" class="stat-value" style="color:#ff5555">OFF</span></div>
        <div class="stat-row"><span class="stat-label">Reflection (R):</span><span id="stat-reflection" class="stat-value" style="color:#ff5555">OFF</span></div>
        <div class="stat-row"><span class="stat-label">Muted (M):</span><span id="stat-muted" class="stat-value" style="color:#ff5555">OFF</span></div>
        <div class="stat-row"><span class="stat-label">Total Emitted:</span><span id="stat-total" class="stat-value">0</span></div>
    </div>

    <div id="hud-probe-container" class="panel">
        <div class="stat-row"><span class="stat-label">Probe Distance:</span><span id="hud-probe-dist" class="stat-value">0.00 u</span></div>
        <div class="stat-row"><span class="stat-label">Time Delay:</span><span id="hud-probe-delay" class="stat-value">0.00 s</span></div>
    </div>

    <div class="instructions">
        Click surface to place probe<br>
        <span class="key">D</span> Toggle Diffraction<br>
        <span class="key">R</span> Toggle Reflection<br>
        <span class="key">M</span> Mute Particles
    </div>

    <div id="controls" class="panel">
        <button id="btn-play">Play</button>
        <button id="btn-reset">Reset</button>
        <button id="btn-medium">Medium: Air</button>
        
        <div class="slider-group">
            <label for="slider-speed">Speed</label>
            <input type="range" id="slider-speed" min="0.5" max="8.0" step="0.5" value="3.0">
        </div>
        
        <div class="slider-group">
            <label for="slider-freq">Interval (s)</label>
            <input type="range" id="slider-freq" min="0.2" max="2.0" step="0.1" value="0.5">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            isPlaying: false,
            waveSpeed: 3.0,
            emissionInterval: 0.5,
            activeWaveCount: 0,
            oscillatingParticleCount: 0,
            medium: 'Air',
            mediumMultiplier: 1.0,
            effectiveSpeed: 3.0,
            diffractionEnabled: false,
            reflectionEnabled: false,
            muted: false,
            totalWavesEmitted: 0,
            probePosition: null,
            probeDistance: null,
            probeDelay: null,
            speakerPosition: { x: -10, y: 1.5, z: 0 },
            maxWaveRadius: 14,
            particleCount: 200,
            reflectedWaveCount: 0
        };
        const state = window.__3D_STATE__;

        const mediums = [
            { name: 'Air', mult: 1.0, color: 0x44AA88 },
            { name: 'Water', mult: 0.4, color: 0x2266CC },
            { name: 'Steel', mult: 1.8, color: 0xAAAAAA }
        ];
        let currentMediumIdx = 0;

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 18);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minPolarAngle = 0.2;
        controls.maxPolarAngle = 1.4;
        controls.target.set(0, 0, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- Scene Objects ---
        // Base
        const baseGeo = new THREE.BoxGeometry(30, 0.5, 20);
        const baseMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
        const baseMesh = new THREE.Mesh(baseGeo, baseMat);
        scene.add(baseMesh);

        // Dome
        const domeGeo = new THREE.SphereGeometry(12, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
        const domeMat = new THREE.MeshPhysicalMaterial({
            color: 0xCCEEFF,
            transparent: true,
            opacity: 0.1,
            roughness: 0.1,
            transmission: 0.9,
            side: THREE.DoubleSide
        });
        const domeMesh = new THREE.Mesh(domeGeo, domeMat);
        scene.add(domeMesh);

        // Speaker
        const speakerGroup = new THREE.Group();
        speakerGroup.position.set(state.speakerPosition.x, state.speakerPosition.y, state.speakerPosition.z);
        
        const speakerBodyGeo = new THREE.BoxGeometry(0.8, 0.8, 0.5);
        const speakerMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
        const speakerBody = new THREE.Mesh(speakerBodyGeo, speakerMat);
        
        const speakerConeGeo = new THREE.ConeGeometry(0.3, 0.2, 16);
        speakerConeGeo.rotateX(Math.PI / 2);
        const speakerCone = new THREE.Mesh(speakerConeGeo, new THREE.MeshLambertMaterial({ color: 0x111111 }));
        speakerCone.position.z = 0.35;
        
        speakerGroup.add(speakerBody);
        speakerGroup.add(speakerCone);
        scene.add(speakerGroup);

        // Obstacles
        const wallGeo = new THREE.BoxGeometry(4, 2, 0.3);
        const wallMat = new THREE.MeshLambertMaterial({ color: 0x996633 });
        const wallMesh = new THREE.Mesh(wallGeo, wallMat);
        wallMesh.position.set(0, 1.5, 0);
        scene.add(wallMesh);

        const cylGeo = new THREE.CylinderGeometry(1.5, 1.5, 2, 32);
        const cylMat = new THREE.MeshLambertMaterial({ color: 0x669999 });
        const cylMesh = new THREE.Mesh(cylGeo, cylMat);
        cylMesh.position.set(4, 1.5, 3);
        scene.add(cylMesh);

        // Probe
        const probeGeo = new THREE.SphereGeometry(0.2, 16, 16);
        const probeMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        const probeMesh = new THREE.Mesh(probeGeo, probeMat);
        probeMesh.visible = false;
        scene.add(probeMesh);

        // --- Wave System ---
        const waves = [];
        let lastEmissionTime = 0;
        const baseTorusGeo = new THREE.TorusGeometry(1, 0.05, 8, 64);

        const waveVertexShader = `
            uniform float uRadius;
            varying vec3 vWorldPos;
            void main() {
                vec3 newPos = position;
                if (length(position.xy) > 0.001) {
                    vec2 dir = normalize(position.xy);
                    newPos.xy += dir * (uRadius - 1.0);
                }
                vec4 worldPosition = modelMatrix * vec4(newPos, 1.0);
                vWorldPos = worldPosition.xyz;
                gl_Position = projectionMatrix * viewMatrix * worldPosition;
            }
        `;

        const waveFragmentShader = `
            uniform vec3 uColor;
            uniform float uOpacity;
            uniform vec3 uSpeakerPos;
            uniform float uDiffraction;
            uniform float uIsReflected;
            varying vec3 vWorldPos;

            void main() {
                float finalOpacity = uOpacity;
                if (uDiffraction < 0.5 && uIsReflected < 0.5) {
                    vec2 toPixel = vWorldPos.xz - uSpeakerPos.xz;
                    float angle = atan(toPixel.y, toPixel.x);
                    // 15 degrees = 0.261799 rad
                    if (abs(angle) < 0.261799 && vWorldPos.x > 0.0) {
                        finalOpacity *= 0.3;
                    }
                }
                gl_FragColor = vec4(uColor, finalOpacity);
            }
        `;

        function createWave(origin, isReflected) {
            if (waves.length >= 30) return;

            const material = new THREE.ShaderMaterial({
                vertexShader: waveVertexShader,
                fragmentShader: waveFragmentShader,
                uniforms: {
                    uRadius: { value: 0.3 },
                    uColor: { value: new THREE.Color(0xff0000) },
                    uOpacity: { value: 1.0 },
                    uSpeakerPos: { value: new THREE.Vector3(state.speakerPosition.x, state.speakerPosition.y, state.speakerPosition.z) },
                    uDiffraction: { value: state.diffractionEnabled ? 1.0 : 0.0 },
                    uIsReflected: { value: isReflected ? 1.0 : 0.0 }
                },
                transparent: true,
                depthWrite: false,
                side: THREE.DoubleSide
            });

            const mesh = new THREE.Mesh(baseTorusGeo, material);
            mesh.rotation.x = Math.PI / 2;
            mesh.position.set(origin.x, origin.y, origin.z);
            scene.add(mesh);

            waves.push({
                mesh: mesh,
                radius: 0.3,
                origin: { ...origin },
                isReflected: isReflected,
                hasReflected: false
            });

            if (!isReflected) state.totalWavesEmitted++;
        }

        // --- Particle System ---
        const particles = [];
        const particleGeo = new THREE.SphereGeometry(0.08, 8, 8);
        const particleMat = new THREE.MeshLambertMaterial({ color: mediums[0].color });

        for (let i = 0; i < state.particleCount; i++) {
            const mesh = new THREE.Mesh(particleGeo, particleMat);
            const x = (Math.random() - 0.5) * 24; // [-12, 12]
            const z = (Math.random() - 0.5) * 16; // [-8, 8]
            const y = 1.0;
            mesh.position.set(x, y, z);
            scene.add(mesh);
            particles.push({
                mesh: mesh,
                basePos: { x, y, z },
                oscillationTimer: 0
            });
        }

        // --- Raycaster ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            if (event.target.tagName === 'BUTTON' || event.target.tagName === 'INPUT') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(baseMesh);

            if (intersects.length > 0) {
                const pt = intersects[0].point;
                probeMesh.position.set(pt.x, 1.0, pt.z);
                probeMesh.visible = true;
                
                state.probePosition = { x: pt.x, z: pt.z };
                updateProbeData();
                document.getElementById('hud-probe-container').style.display = 'block';
            }
        });

        function updateProbeData() {
            if (!state.probePosition) return;
            const dx = state.probePosition.x - state.speakerPosition.x;
            const dz = state.probePosition.z - state.speakerPosition.z;
            state.probeDistance = Math.hypot(dx, dz);
            state.probeDelay = state.probeDistance / state.effectiveSpeed;
            
            document.getElementById('hud-probe-dist').innerText = state.probeDistance.toFixed(2) + ' u';
            document.getElementById('hud-probe-delay').innerText = state.probeDelay.toFixed(2) + ' s';
        }

        // --- UI & Controls ---
        const btnPlay = document.getElementById('btn-play');
        const btnReset = document.getElementById('btn-reset');
        const btnMedium = document.getElementById('btn-medium');
        const sliderSpeed = document.getElementById('slider-speed');
        const sliderFreq = document.getElementById('slider-freq');

        function togglePlay() {
            state.isPlaying = !state.isPlaying;
            btnPlay.innerText = state.isPlaying ? 'Pause' : 'Play';
            if (state.isPlaying) lastEmissionTime = performance.now() / 1000;
        }

        btnPlay.addEventListener('click', togglePlay);

        btnReset.addEventListener('click', () => {
            state.isPlaying = false;
            btnPlay.innerText = 'Play';
            waves.forEach(w => {
                scene.remove(w.mesh);
                w.mesh.material.dispose();
            });
            waves.length = 0;
            particles.forEach(p => {
                p.oscillationTimer = 0;
                p.mesh.position.y = p.basePos.y;
            });
            state.totalWavesEmitted = 0;
            probeMesh.visible = false;
            state.probePosition = null;
            document.getElementById('hud-probe-container').style.display = 'none';
            updateHUD();
        });

        btnMedium.addEventListener('click', () => {
            currentMediumIdx = (currentMediumIdx + 1) % mediums.length;
            const med = mediums[currentMediumIdx];
            state.medium = med.name;
            state.mediumMultiplier = med.mult;
            state.effectiveSpeed = state.waveSpeed * state.mediumMultiplier;
            btnMedium.innerText = `Medium: ${med.name}`;
            particleMat.color.setHex(med.color);
            updateProbeData();
            updateHUD();
        });

        sliderSpeed.addEventListener('input', (e) => {
            state.waveSpeed = parseFloat(e.target.value);
            state.effectiveSpeed = state.waveSpeed * state.mediumMultiplier;
            updateProbeData();
            updateHUD();
        });

        sliderFreq.addEventListener('input', (e) => {
            state.emissionInterval = parseFloat(e.target.value);
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'd') {
                state.diffractionEnabled = !state.diffractionEnabled;
                waves.forEach(w => w.mesh.material.uniforms.uDiffraction.value = state.diffractionEnabled ? 1.0 : 0.0);
            } else if (key === 'r') {
                state.reflectionEnabled = !state.reflectionEnabled;
            } else if (key === 'm') {
                state.muted = !state.muted;
            }
            updateHUD();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- HUD Update ---
        function updateHUD() {
            document.getElementById('stat-waves').innerText = state.activeWaveCount;
            document.getElementById('stat-particles').innerText = state.oscillatingParticleCount;
            document.getElementById('stat-speed').innerText = state.effectiveSpeed.toFixed(1) + ' u/s';
            document.getElementById('stat-medium').innerText = state.medium;
            
            const elDiff = document.getElementById('stat-diffraction');
            elDiff.innerText = state.diffractionEnabled ? 'ON' : 'OFF';
            elDiff.style.color = state.diffractionEnabled ? '#55ff55' : '#ff5555';
            
            const elRefl = document.getElementById('stat-reflection');
            elRefl.innerText = state.reflectionEnabled ? 'ON' : 'OFF';
            elRefl.style.color = state.reflectionEnabled ? '#55ff55' : '#ff5555';
            
            const elMute = document.getElementById('stat-muted');
            elMute.innerText = state.muted ? 'ON' : 'OFF';
            elMute.style.color = state.muted ? '#55ff55' : '#ff5555';
            
            document.getElementById('stat-total').innerText = state.totalWavesEmitted;
        }

        // --- Animation Loop ---
        let lastTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);
            
            const currentTime = performance.now();
            const dt = Math.min((currentTime - lastTime) / 1000, 0.1); // cap dt
            lastTime = currentTime;
            const timeSec = currentTime / 1000;

            controls.update();

            // Wave Emission
            if (state.isPlaying && timeSec - lastEmissionTime > state.emissionInterval) {
                createWave(state.speakerPosition, false);
                lastEmissionTime = timeSec;
            }

            // Update Waves
            for (let i = waves.length - 1; i >= 0; i--) {
                const wave = waves[i];
                wave.radius += state.effectiveSpeed * dt;

                // Reflection
                if (!wave.hasReflected && state.reflectionEnabled && !wave.isReflected) {
                    // Wall front is at x = -2. Speaker is at x = -10. Distance = 8.
                    if (wave.radius >= 8.0) {
                        createWave({ x: -2, y: 1.5, z: 0 }, true);
                        wave.hasReflected = true;
                    }
                }

                if (wave.radius > state.maxWaveRadius) {
                    scene.remove(wave.mesh);
                    wave.mesh.material.dispose();
                    waves.splice(i, 1);
                } else {
                    const progress = (wave.radius - 0.3) / (state.maxWaveRadius - 0.3);
                    const color = new THREE.Color(0xff0000).lerp(new THREE.Color(0x0000ff), progress);
                    const opacity = 1.0 - progress;

                    wave.mesh.material.uniforms.uRadius.value = wave.radius;
                    wave.mesh.material.uniforms.uColor.value.copy(color);
                    wave.mesh.material.uniforms.uOpacity.value = opacity;
                }
            }

            // Update Particles
            let oscillatingCount = 0;
            const waveThickness = 0.2;

            particles.forEach(p => {
                if (!state.muted) {
                    let hit = false;
                    for (let i = 0; i < waves.length; i++) {
                        const wave = waves[i];
                        const dist = Math.hypot(p.basePos.x - wave.origin.x, p.basePos.z - wave.origin.z);
                        
                        // Check if particle is in shadow cone
                        let inShadow = false;
                        if (!state.diffractionEnabled && !wave.isReflected) {
                            const dx = p.basePos.x - state.speakerPosition.x;
                            const dz = p.basePos.z - state.speakerPosition.z;
                            const angle = Math.atan2(dz, dx);
                            if (Math.abs(angle) < 0.261799 && p.basePos.x > 0) {
                                inShadow = true;
                            }
                        }

                        if (!inShadow && Math.abs(dist - wave.radius) < waveThickness) {
                            hit = true;
                            break;
                        }
                    }
                    if (hit && p.oscillationTimer <= 0) {
                        p.oscillationTimer = 1.0;
                    }
                }

                if (p.oscillationTimer > 0) {
                    p.oscillationTimer -= dt;
                    if (p.oscillationTimer < 0) p.oscillationTimer = 0;
                    
                    // 2 full sine waves over 1 second
                    const phase = (1.0 - p.oscillationTimer) * Math.PI * 4;
                    p.mesh.position.y = p.basePos.y + 0.5 * Math.sin(phase);
                    oscillatingCount++;
                } else {
                    p.mesh.position.y = p.basePos.y;
                }
            });

            // Update State
            state.activeWaveCount = waves.length;
            state.reflectedWaveCount = waves.filter(w => w.isReflected).length;
            state.oscillatingParticleCount = oscillatingCount;

            // Speaker cone animation
            if (state.isPlaying) {
                speakerCone.position.z = 0.35 + 0.05 * Math.sin(timeSec * Math.PI * 2 / state.emissionInterval);
            } else {
                speakerCone.position.z = 0.35;
            }

            updateHUD();
            renderer.render(scene, camera);
        }

        updateHUD();
        animate();
    </script>
</body>
</html>
