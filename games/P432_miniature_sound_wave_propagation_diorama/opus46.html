<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound Wave Propagation Diorama</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #hud-info {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.75);
    color: #e0e0e0;
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.8;
    min-width: 240px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    z-index: 10;
  }
  #hud-info .title {
    font-size: 15px;
    font-weight: bold;
    color: #00d4ff;
    margin-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding-bottom: 6px;
  }
  #hud-info .label { color: #aaa; }
  #hud-info .value { color: #fff; font-weight: 600; }
  #hud-info .on { color: #4cff4c; }
  #hud-info .off { color: #ff6666; }

  #hud-probe {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(0, 0, 0, 0.75);
    color: #e0e0e0;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.8;
    border: 1px solid rgba(255,255,0,0.3);
    backdrop-filter: blur(10px);
    display: none;
    z-index: 10;
  }
  #hud-probe .title { color: #ffdd00; font-weight: bold; margin-bottom: 4px; }

  #controls {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.75);
    color: #e0e0e0;
    padding: 15px 25px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    z-index: 10;
    flex-wrap: wrap;
    justify-content: center;
  }
  #controls button {
    background: #2a5298;
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.2s;
  }
  #controls button:hover { background: #3a6bc5; }
  #controls button.active { background: #e74c3c; }
  .control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .control-group label {
    font-size: 11px;
    color: #aaa;
  }
  .control-group input[type="range"] {
    width: 120px;
    accent-color: #00d4ff;
  }
  .control-group .val { font-size: 12px; color: #00d4ff; font-weight: bold; }

  #keyboard-hints {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    text-align: center;
    z-index: 10;
  }
  #keyboard-hints kbd {
    background: rgba(255,255,255,0.15);
    padding: 2px 6px;
    border-radius: 3px;
    margin: 0 2px;
  }
</style>
</head>
<body>

<div id="hud-info">
  <div class="title">🔊 Sound Wave Diorama</div>
  <div><span class="label">Active Waves:</span> <span class="value" id="h-waves">0</span></div>
  <div><span class="label">Oscillating Particles:</span> <span class="value" id="h-particles">0</span></div>
  <div><span class="label">Effective Speed:</span> <span class="value" id="h-speed">3.0</span> <span class="label">u/s</span></div>
  <div><span class="label">Medium:</span> <span class="value" id="h-medium">Air</span></div>
  <div><span class="label">Diffraction:</span> <span id="h-diffraction" class="off">OFF</span></div>
  <div><span class="label">Reflection:</span> <span id="h-reflection" class="off">OFF</span></div>
  <div><span class="label">Muted:</span> <span id="h-muted" class="off">OFF</span></div>
  <div><span class="label">Total Emitted:</span> <span class="value" id="h-total">0</span></div>
</div>

<div id="hud-probe">
  <div class="title">📍 Measurement Probe</div>
  <div><span class="label">Distance:</span> <span class="value" id="p-dist">-</span></div>
  <div><span class="label">Time Delay:</span> <span class="value" id="p-delay">-</span></div>
  <div><span class="label">Position:</span> <span class="value" id="p-pos">-</span></div>
</div>

<div id="keyboard-hints">
  <kbd>D</kbd> Diffraction &nbsp; <kbd>R</kbd> Reflection &nbsp; <kbd>M</kbd> Mute &nbsp; Click surface to place probe
</div>

<div id="controls">
  <button id="btn-play">Play</button>
  <div class="control-group">
    <label>Speed</label>
    <input type="range" id="slider-speed" min="0.5" max="8.0" step="0.5" value="3.0">
    <span class="val" id="speed-val">3.0</span>
  </div>
  <div class="control-group">
    <label>Frequency (interval)</label>
    <input type="range" id="slider-freq" min="0.2" max="2.0" step="0.1" value="0.5">
    <span class="val" id="freq-val">0.5s</span>
  </div>
  <button id="btn-medium">Medium: Air</button>
  <button id="btn-reset">Reset</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  // ============ STATE ============
  const STATE = {
    isPlaying: false,
    waveSpeed: 3.0,
    emissionInterval: 0.5,
    activeWaveCount: 0,
    oscillatingParticleCount: 0,
    medium: 'Air',
    mediumMultiplier: 1.0,
    effectiveSpeed: 3.0,
    diffractionEnabled: false,
    reflectionEnabled: false,
    muted: false,
    totalWavesEmitted: 0,
    probePosition: null,
    probeDistance: null,
    probeDelay: null,
    speakerPosition: { x: -10, y: 1.5, z: 0 },
    maxWaveRadius: 14,
    particleCount: 200,
    reflectedWaveCount: 0
  };
  window.__3D_STATE__ = STATE;

  const mediums = [
    { name: 'Air', multiplier: 1.0, color: 0x44AA88 },
    { name: 'Water', multiplier: 0.4, color: 0x2266CC },
    { name: 'Steel', multiplier: 1.8, color: 0xAAAAAA }
  ];
  let currentMediumIndex = 0;

  // ============ SCENE SETUP ============
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);
  scene.fog = new THREE.FogExp2(0x1a1a2e, 0.015);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 8, 18);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // Controls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minPolarAngle = 0.2;
  controls.maxPolarAngle = 1.4;
  controls.target.set(0, 1, 0);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(5, 10, 5);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(1024, 1024);
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 30;
  dirLight.shadow.camera.left = -15;
  dirLight.shadow.camera.right = 15;
  dirLight.shadow.camera.top = 15;
  dirLight.shadow.camera.bottom = -15;
  scene.add(dirLight);

  // Subtle hemisphere light
  const hemiLight = new THREE.HemisphereLight(0x4488ff, 0x442200, 0.2);
  scene.add(hemiLight);

  // ============ DIORAMA BASE ============
  const baseGeom = new THREE.BoxGeometry(30, 0.5, 20);
  const baseMat = new THREE.MeshStandardMaterial({
    color: 0x8B4513,
    roughness: 0.8,
    metalness: 0.1
  });
  const base = new THREE.Mesh(baseGeom, baseMat);
  base.position.y = 0;
  base.receiveShadow = true;
  scene.add(base);

  // Base edge trim
  const trimGeom = new THREE.BoxGeometry(30.4, 0.6, 20.4);
  const trimMat = new THREE.MeshStandardMaterial({ color: 0x5C3317, roughness: 0.9 });
  const trim = new THREE.Mesh(trimGeom, trimMat);
  trim.position.y = -0.05;
  scene.add(trim);

  // ============ GLASS DOME ============
  const domeGeom = new THREE.SphereGeometry(12, 64, 32, 0, Math.PI * 2, 0, Math.PI / 2);
  const domeMat = new THREE.MeshPhysicalMaterial({
    color: 0xCCEEFF,
    transparent: true,
    opacity: 0.1,
    roughness: 0.05,
    metalness: 0.0,
    side: THREE.DoubleSide,
    depthWrite: false
  });
  const dome = new THREE.Mesh(domeGeom, domeMat);
  dome.position.y = 0.25;
  scene.add(dome);

  // ============ SPEAKER ============
  const speakerGroup = new THREE.Group();
  speakerGroup.position.set(-10, 1.5, 0);

  const speakerBody = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.8, 0.5),
    new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5, metalness: 0.3 })
  );
  speakerBody.castShadow = true;
  speakerGroup.add(speakerBody);

  const coneGeom = new THREE.ConeGeometry(0.3, 0.4, 16);
  const coneMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.4, metalness: 0.2 });
  const speakerCone = new THREE.Mesh(coneGeom, coneMat);
  speakerCone.rotation.z = -Math.PI / 2;
  speakerCone.position.x = 0.45;
  speakerGroup.add(speakerCone);

  // Speaker grill detail
  const grillGeom = new THREE.RingGeometry(0.1, 0.35, 16);
  const grillMat = new THREE.MeshStandardMaterial({ color: 0x222222, side: THREE.DoubleSide });
  const grill = new THREE.Mesh(grillGeom, grillMat);
  grill.rotation.y = Math.PI / 2;
  grill.position.x = 0.26;
  speakerGroup.add(grill);

  scene.add(speakerGroup);

  // Speaker glow indicator
  const glowGeom = new THREE.SphereGeometry(0.15, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
  const speakerGlow = new THREE.Mesh(glowGeom, glowMat);
  speakerGlow.position.set(-10, 2.2, 0);
  scene.add(speakerGlow);

  // ============ OBSTACLES ============
  // Wall obstacle
  const wallGeom = new THREE.BoxGeometry(4, 2, 0.3);
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x996633, roughness: 0.7, metalness: 0.1 });
  const wall = new THREE.Mesh(wallGeom, wallMat);
  wall.position.set(0, 1.5, 0);
  wall.castShadow = true;
  wall.receiveShadow = true;
  scene.add(wall);

  // Cylinder obstacle
  const cylGeom = new THREE.CylinderGeometry(1.5, 1.5, 2, 32);
  const cylMat = new THREE.MeshStandardMaterial({ color: 0x669999, roughness: 0.5, metalness: 0.2 });
  const cylinder = new THREE.Mesh(cylGeom, cylMat);
  cylinder.position.set(4, 1.5, 3);
  cylinder.castShadow = true;
  cylinder.receiveShadow = true;
  scene.add(cylinder);

  // ============ OBSTACLES DATA for shadow calculation ============
  const obstacles = [
    {
      type: 'box',
      position: new THREE.Vector3(0, 1.5, 0),
      halfWidth: 2,
      halfDepth: 0.15,
      mesh: wall
    },
    {
      type: 'cylinder',
      position: new THREE.Vector3(4, 1.5, 3),
      radius: 1.5,
      mesh: cylinder
    }
  ];

  const speakerPos2D = new THREE.Vector2(-10, 0);
  const SHADOW_HALF_ANGLE = 15 * Math.PI / 180; // ±15 degrees

  function isInShadow(x, z) {
    for (let obs of obstacles) {
      const obsPos2D = new THREE.Vector2(obs.position.x, obs.position.z);
      const toObs = new THREE.Vector2().subVectors(obsPos2D, speakerPos2D);
      const distToObs = toObs.length();
      const angleToObs = Math.atan2(toObs.y, toObs.x);

      const point2D = new THREE.Vector2(x, z);
      const toPoint = new THREE.Vector2().subVectors(point2D, speakerPos2D);
      const distToPoint = toPoint.length();

      if (distToPoint <= distToObs) continue;

      const angleToPoint = Math.atan2(toPoint.y, toPoint.x);
      let angleDiff = angleToPoint - angleToObs;
      while (angleDiff > Math.PI) angleDiff -= 2 * Math.PI;
      while (angleDiff < -Math.PI) angleDiff += 2 * Math.PI;

      if (Math.abs(angleDiff) < SHADOW_HALF_ANGLE) {
        return true;
      }
    }
    return false;
  }

  // ============ MEDIUM PARTICLES ============
  const particles = [];
  const particleMeshes = [];
  const particleGeom = new THREE.SphereGeometry(0.08, 8, 8);
  let particleMat = new THREE.MeshStandardMaterial({ color: 0x44AA88, roughness: 0.5 });

  for (let i = 0; i < 200; i++) {
    const x = -12 + Math.random() * 24;
    const z = -8 + Math.random() * 16;
    const mesh = new THREE.Mesh(particleGeom, particleMat.clone());
    mesh.position.set(x, 1.0, z);
    scene.add(mesh);
    particles.push({
      mesh: mesh,
      baseY: 1.0,
      x: x,
      z: z,
      oscillating: false,
      oscillateTime: 0,
      oscillateDuration: 1.0,
      oscillatePhase: 0
    });
    particleMeshes.push(mesh);
  }

  // ============ WAVES ============
  const waves = [];
  const reflectedWaves = [];
  let emissionTimer = 0;

  function createWave(originX, originZ, isReflected = false, direction = null) {
    const geom = new THREE.TorusGeometry(0.3, 0.05, 8, 64);
    const mat = new THREE.MeshBasicMaterial({
      color: 0xff0000,
      transparent: true,
      opacity: 1.0,
      side: THREE.DoubleSide,
      depthWrite: false
    });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(originX, 1.5, originZ);
    scene.add(mesh);

    const wave = {
      mesh: mesh,
      radius: 0.3,
      originX: originX,
      originZ: originZ,
      isReflected: isReflected,
      direction: direction // for reflected waves, normalized 2D direction
    };

    if (isReflected) {
      reflectedWaves.push(wave);
    } else {
      waves.push(wave);
    }

    if (!isReflected) {
      STATE.totalWavesEmitted++;
    }
  }

  function updateWaveGeometry(wave, newRadius) {
    wave.mesh.geometry.dispose();
    wave.mesh.geometry = new THREE.TorusGeometry(newRadius, 0.05, 8, 64);
    wave.radius = newRadius;
  }

  // ============ PROBE ============
  let probeMesh = null;
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  function placeProbe(x, z) {
    if (probeMesh) {
      scene.remove(probeMesh);
      probeMesh.geometry.dispose();
      probeMesh.material.dispose();
    }
    const geom = new THREE.SphereGeometry(0.2, 16, 16);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
    probeMesh = new THREE.Mesh(geom, mat);
    probeMesh.position.set(x, 1.2, z);
    scene.add(probeMesh);

    const dx = x - STATE.speakerPosition.x;
    const dz = z - STATE.speakerPosition.z;
    const dist = Math.sqrt(dx * dx + dz * dz);

    STATE.probePosition = { x: x, z: z };
    STATE.probeDistance = parseFloat(dist.toFixed(2));
    const eff = STATE.effectiveSpeed;
    STATE.probeDelay = eff > 0 ? parseFloat((dist / eff).toFixed(3)) : 0;

    document.getElementById('hud-probe').style.display = 'block';
    document.getElementById('p-dist').textContent = STATE.probeDistance.toFixed(2) + ' units';
    document.getElementById('p-delay').textContent = STATE.probeDelay.toFixed(3) + ' s';
    document.getElementById('p-pos').textContent = `(${x.toFixed(1)}, ${z.toFixed(1)})`;
  }

  // ============ REFLECTION ============
  // Wall at x=0, z=0, width=4 along x, depth=0.3 along z
  // Wall faces: z = -0.15 and z = 0.15
  // Speaker is at x=-10, so waves hit the z=-0.15 face... actually the wall is at (0,1.5,0)
  // The wall extends from x=-2 to x=2, z=-0.15 to z=0.15
  // Waves coming from speaker at (-10,0) hit the wall's left face (x direction doesn't matter for concentric waves)
  // For simplicity: when a wave's radius reaches the wall, emit a reflected wave from the wall surface

  function checkWallReflection(wave) {
    if (!STATE.reflectionEnabled || wave.isReflected) return;
    // Wall center at (0, 0) in XZ, extends x: [-2, 2], z: [-0.15, 0.15]
    // Distance from speaker to wall's nearest face
    const wallX = 0;
    const distToWall = Math.abs(wave.originX - wallX); // ~10 for speaker

    // Check if wave radius just crossed the wall distance
    if (wave.radius >= distToWall - 0.5 && wave.radius <= distToWall + 0.5) {
      // Check if we haven't already reflected this wave
      if (!wave._reflected) {
        wave._reflected = true;
        // Emit reflected wave from wall surface going back toward speaker
        // Reflected wave origin at wall surface
        const reflectX = wall.position.x - 0.3; // just in front of wall (speaker side)
        const reflectZ = wall.position.z;
        createWave(reflectX, reflectZ, true, { x: -1, z: 0 });
      }
    }
  }

  // ============ COLOR INTERPOLATION ============
  function getWaveColor(radius, maxRadius) {
    const t = Math.min(1, Math.max(0, (radius - 0.3) / (maxRadius - 0.3)));
    const r = Math.floor(255 * (1 - t));
    const g = Math.floor(50 * (1 - t));
    const b = Math.floor(255 * t);
    return new THREE.Color(`rgb(${r},${g},${b})`);
  }

  // ============ UI ELEMENTS ============
  const btnPlay = document.getElementById('btn-play');
  const sliderSpeed = document.getElementById('slider-speed');
  const sliderFreq = document.getElementById('slider-freq');
  const btnReset = document.getElementById('btn-reset');
  const btnMedium = document.getElementById('btn-medium');

  btnPlay.addEventListener('click', () => {
    STATE.isPlaying = !STATE.isPlaying;
    btnPlay.textContent = STATE.isPlaying ? 'Pause' : 'Play';
    btnPlay.classList.toggle('active', STATE.isPlaying);
    speakerGlow.material.color.set(STATE.isPlaying ? 0x00ff00 : 0xff0000);
  });

  sliderSpeed.addEventListener('input', () => {
    STATE.waveSpeed = parseFloat(sliderSpeed.value);
    STATE.effectiveSpeed = STATE.waveSpeed * STATE.mediumMultiplier;
    document.getElementById('speed-val').textContent = STATE.waveSpeed.toFixed(1);
    updateProbeDelay();
  });

  sliderFreq.addEventListener('input', () => {
    STATE.emissionInterval = parseFloat(sliderFreq.value);
    document.getElementById('freq-val').textContent = STATE.emissionInterval.toFixed(1) + 's';
  });

  btnReset.addEventListener('click', () => {
    STATE.isPlaying = false;
    btnPlay.textContent = 'Play';
    btnPlay.classList.remove('active');
    speakerGlow.material.color.set(0xff0000);

    // Remove all waves
    for (let w of waves) {
      scene.remove(w.mesh);
      w.mesh.geometry.dispose();
      w.mesh.material.dispose();
    }
    waves.length = 0;

    for (let w of reflectedWaves) {
      scene.remove(w.mesh);
      w.mesh.geometry.dispose();
      w.mesh.material.dispose();
    }
    reflectedWaves.length = 0;

    // Reset particles
    for (let p of particles) {
      p.oscillating = false;
      p.oscillateTime = 0;
      p.mesh.position.y = p.baseY;
    }

    STATE.totalWavesEmitted = 0;
    emissionTimer = 0;
  });

  btnMedium.addEventListener('click', () => {
    currentMediumIndex = (currentMediumIndex + 1) % mediums.length;
    const med = mediums[currentMediumIndex];
    STATE.medium = med.name;
    STATE.mediumMultiplier = med.multiplier;
    STATE.effectiveSpeed = STATE.waveSpeed * STATE.mediumMultiplier;
    btnMedium.textContent = 'Medium: ' + med.name;

    // Update particle colors
    for (let p of particles) {
      p.mesh.material.color.set(med.color);
    }
    updateProbeDelay();
  });

  function updateProbeDelay() {
    if (STATE.probeDistance !== null) {
      const eff = STATE.effectiveSpeed;
      STATE.probeDelay = eff > 0 ? parseFloat((STATE.probeDistance / eff).toFixed(3)) : 0;
      document.getElementById('p-delay').textContent = STATE.probeDelay.toFixed(3) + ' s';
    }
  }

  // Keyboard
  document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (key === 'd') {
      STATE.diffractionEnabled = !STATE.diffractionEnabled;
    } else if (key === 'r') {
      STATE.reflectionEnabled = !STATE.reflectionEnabled;
    } else if (key === 'm') {
      STATE.muted = !STATE.muted;
    }
  });

  // Click to place probe
  renderer.domElement.addEventListener('click', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(base);
    if (intersects.length > 0) {
      const pt = intersects[0].point;
      placeProbe(pt.x, pt.z);
    }
  });

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ============ ANIMATION LOOP ============
  let lastTime = performance.now();

  function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    let dt = (now - lastTime) / 1000;
    lastTime = now;

    // Clamp dt to avoid huge jumps
    if (dt > 0.1) dt = 0.1;
    if (isNaN(dt) || !isFinite(dt)) dt = 0.016;

    const effectiveSpeed = STATE.waveSpeed * STATE.mediumMultiplier;
    STATE.effectiveSpeed = isFinite(effectiveSpeed) ? effectiveSpeed : 0;

    // Speaker pulse animation
    if (STATE.isPlaying) {
      const pulse = 1 + 0.1 * Math.sin(now * 0.01);
      speakerCone.scale.set(pulse, pulse, pulse);
    }

    // Emission
    if (STATE.isPlaying) {
      emissionTimer += dt;
      if (emissionTimer >= STATE.emissionInterval) {
        emissionTimer -= STATE.emissionInterval;
        if (waves.length < 30) {
          createWave(STATE.speakerPosition.x, STATE.speakerPosition.z);
        }
      }
    }

    // Update waves
    const maxR = STATE.maxWaveRadius;
    const toRemove = [];

    for (let i = waves.length - 1; i >= 0; i--) {
      const w = waves[i];
      const newRadius = w.radius + STATE.effectiveSpeed * dt;

      if (newRadius >= maxR) {
        scene.remove(w.mesh);
        w.mesh.geometry.dispose();
        w.mesh.material.dispose();
        waves.splice(i, 1);
        continue;
      }

      updateWaveGeometry(w, newRadius);

      // Color and opacity
      const t = Math.max(0, Math.min(1, (newRadius - 0.3) / (maxR - 0.3)));
      w.mesh.material.color.copy(getWaveColor(newRadius, maxR));
      w.mesh.material.opacity = Math.max(0, 1.0 - t);

      // Shadow/obstacle occlusion (applied per-wave as uniform opacity reduction)
      // We check multiple points on the ring and reduce opacity if in shadow
      if (!STATE.diffractionEnabled) {
        // Simple approach: check if wave center-to-obstacle angle matters
        // For torus rings, we can't easily clip parts, so we reduce overall opacity
        // Check if any part of the ring is in shadow zone
        let shadowFactor = 0;
        const samples = 16;
        for (let s = 0; s < samples; s++) {
          const angle = (s / samples) * Math.PI * 2;
          const px = w.originX + Math.cos(angle) * newRadius;
          const pz = w.originZ + Math.sin(angle) * newRadius;
          if (isInShadow(px, pz)) {
            shadowFactor += 1 / samples;
          }
        }
        if (shadowFactor > 0) {
          w.mesh.material.opacity *= (1 - shadowFactor * 0.7);
        }
      }

      // Check reflection
      checkWallReflection(w);
    }

    // Update reflected waves
    for (let i = reflectedWaves.length - 1; i >= 0; i--) {
      const w = reflectedWaves[i];
      const newRadius = w.radius + STATE.effectiveSpeed * dt;

      if (newRadius >= maxR) {
        scene.remove(w.mesh);
        w.mesh.geometry.dispose();
        w.mesh.material.dispose();
        reflectedWaves.splice(i, 1);
        continue;
      }

      updateWaveGeometry(w, newRadius);

      const t = Math.max(0, Math.min(1, (newRadius - 0.3) / (maxR - 0.3)));
      // Reflected waves are green-ish
      const r2 = Math.floor(100 * (1 - t));
      const g2 = Math.floor(255 * (1 - t));
      const b2 = Math.floor(100 + 155 * t);
      w.mesh.material.color.set(new THREE.Color(`rgb(${r2},${g2},${b2})`));
      w.mesh.material.opacity = Math.max(0, 0.8 * (1.0 - t));
    }

    // Update particles
    let oscillatingCount = 0;

    for (let p of particles) {
      if (!STATE.muted) {
        // Check if any wave is passing through this particle
        const allWaves = [...waves, ...reflectedWaves];
        for (let w of allWaves) {
          const dx = p.x - w.originX;
          const dz = p.z - w.originZ;
          const dist = Math.sqrt(dx * dx + dz * dz);
          const diff = Math.abs(dist - w.radius);

          if (diff < 0.5) {
            if (!p.oscillating) {
              p.oscillating = true;
              p.oscillateTime = 0;
              p.oscillatePhase = w.radius * 2;
            }
          }
        }
      }

      if (p.oscillating) {
        p.oscillateTime += dt;
        if (p.oscillateTime >= p.oscillateDuration) {
          p.oscillating = false;
          p.oscillateTime = 0;
          p.mesh.position.y = p.baseY;
        } else {
          const phase = p.oscillatePhase + p.oscillateTime * 8;
          const decay = 1 - (p.oscillateTime / p.oscillateDuration);
          p.mesh.position.y = p.baseY + 0.5 * Math.sin(phase) * decay;
          oscillatingCount++;
        }
      }
    }

    STATE.oscillatingParticleCount = oscillatingCount;
    STATE.activeWaveCount = waves.length + reflectedWaves.length;
    STATE.reflectedWaveCount = reflectedWaves.length;

    // Sanitize state values
    for (let key of ['waveSpeed', 'emissionInterval', 'activeWaveCount', 'oscillatingParticleCount',
      'effectiveSpeed', 'mediumMultiplier', 'totalWavesEmitted', 'reflectedWaveCount', 'maxWaveRadius', 'particleCount']) {
      if (!isFinite(STATE[key]) || isNaN(STATE[key])) {
        STATE[key] = 0;
      }
    }
    if (STATE.probeDistance !== null && (!isFinite(STATE.probeDistance) || isNaN(STATE.probeDistance))) {
      STATE.probeDistance = 0;
    }
    if (STATE.probeDelay !== null && (!isFinite(STATE.probeDelay) || isNaN(STATE.probeDelay))) {
      STATE.probeDelay = 0;
    }

    // Update HUD
    document.getElementById('h-waves').textContent = STATE.activeWaveCount;
    document.getElementById('h-particles').textContent = STATE.oscillatingParticleCount;
    document.getElementById('h-speed').textContent = STATE.effectiveSpeed.toFixed(1);
    document.getElementById('h-medium').textContent = STATE.medium;

    const hDiff = document.getElementById('h-diffraction');
    hDiff.textContent = STATE.diffractionEnabled ? 'ON' : 'OFF';
    hDiff.className = STATE.diffractionEnabled ? 'on' : 'off';

    const hRef = document.getElementById('h-reflection');
    hRef.textContent = STATE.reflectionEnabled ? 'ON' : 'OFF';
    hRef.className = STATE.reflectionEnabled ? 'on' : 'off';

    const hMut = document.getElementById('h-muted');
    hMut.textContent = STATE.muted ? 'ON' : 'OFF';
    hMut.className = STATE.muted ? 'on' : 'off';

    document.getElementById('h-total').textContent = STATE.totalWavesEmitted;

    // Probe pulse
    if (probeMesh) {
      probeMesh.scale.setScalar(1 + 0.15 * Math.sin(now * 0.005));
    }

    controls.update();
    renderer.render(scene, camera);
  }

  animate();
})();
</script>
</body>
</html>
