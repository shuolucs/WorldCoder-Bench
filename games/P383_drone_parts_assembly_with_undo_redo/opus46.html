<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drone Assembly Configurator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
canvas { display: block; }

#ui-panel {
    position: fixed;
    left: 0;
    top: 0;
    width: 300px;
    height: 100vh;
    background: rgba(10, 10, 30, 0.92);
    color: #e0e0e0;
    padding: 20px;
    overflow-y: auto;
    z-index: 100;
    border-right: 2px solid #333366;
    backdrop-filter: blur(10px);
}

#ui-panel h2 {
    text-align: center;
    color: #00ccff;
    margin-bottom: 15px;
    font-size: 22px;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(0, 204, 255, 0.5);
}

.parts-list {
    margin-bottom: 20px;
}

.parts-list h3 {
    color: #aaa;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    border-bottom: 1px solid #333;
    padding-bottom: 5px;
}

.part-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    margin: 3px 0;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    font-size: 13px;
    transition: background 0.3s;
}

.part-item .part-name {
    font-weight: 600;
}

.part-item .part-status {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
}

.part-item .part-status.in-tray {
    background: rgba(255, 170, 0, 0.2);
    color: #ffaa00;
}

.part-item .part-status.assembled {
    background: rgba(0, 204, 0, 0.2);
    color: #00cc00;
}

.part-color {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    vertical-align: middle;
}

.buttons {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
}

button:hover { transform: translateY(-1px); }
button:active { transform: translateY(0); }

#btn-assemble {
    background: linear-gradient(135deg, #00cc66, #009944);
    color: white;
}
#btn-assemble:hover { background: linear-gradient(135deg, #00dd77, #00aa55); }

.btn-row {
    display: flex;
    gap: 8px;
}

#btn-undo {
    flex: 1;
    background: linear-gradient(135deg, #cc8800, #aa6600);
    color: white;
}
#btn-undo:hover { background: linear-gradient(135deg, #dd9900, #bb7700); }

#btn-redo {
    flex: 1;
    background: linear-gradient(135deg, #0088cc, #006699);
    color: white;
}
#btn-redo:hover { background: linear-gradient(135deg, #0099dd, #0077aa); }

#btn-reset {
    background: linear-gradient(135deg, #cc3333, #aa1111);
    color: white;
}
#btn-reset:hover { background: linear-gradient(135deg, #dd4444, #bb2222); }

button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
}

.progress-section {
    margin-bottom: 15px;
}

.progress-section label {
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.progress-bar-container {
    width: 100%;
    height: 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
    margin-top: 5px;
    position: relative;
}

#progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #00cc66, #00ccff);
    border-radius: 10px;
    transition: width 0.5s ease;
    width: 0%;
}

.progress-bar-container .progress-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 11px;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 3px rgba(0,0,0,0.8);
}

#assembly-count {
    text-align: center;
    font-size: 16px;
    color: #00ccff;
    margin-top: 10px;
    font-weight: bold;
}

.shortcuts {
    margin-top: 15px;
    padding-top: 15px;
    border-top: 1px solid #333;
}

.shortcuts h3 {
    color: #888;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
}

.shortcut-item {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #666;
    margin: 3px 0;
}

.shortcut-item kbd {
    background: rgba(255,255,255,0.1);
    padding: 1px 6px;
    border-radius: 3px;
    font-family: monospace;
    color: #aaa;
}

#notification {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
}

#notification.show {
    opacity: 1;
}

#notification.success {
    background: rgba(0, 204, 102, 0.9);
    color: white;
}

#notification.error {
    background: rgba(204, 51, 51, 0.9);
    color: white;
}

#notification.info {
    background: rgba(0, 136, 204, 0.9);
    color: white;
}
</style>
</head>
<body>

<div id="ui-panel">
    <h2>🛸 Drone Assembly</h2>
    
    <div class="progress-section">
        <label>Assembly Progress</label>
        <div class="progress-bar-container">
            <div id="progress-bar"></div>
            <span class="progress-text" id="progress-text">0%</span>
        </div>
        <div id="assembly-count">0 / 7 parts assembled</div>
    </div>

    <div class="parts-list">
        <h3>Parts Inventory</h3>
        <div id="parts-list-container"></div>
    </div>

    <div class="buttons">
        <button id="btn-assemble">⚙️ Assemble Next (N)</button>
        <div class="btn-row">
            <button id="btn-undo">↩ Undo (Z)</button>
            <button id="btn-redo">↪ Redo (Y)</button>
        </div>
        <button id="btn-reset">🔄 Reset All (R)</button>
    </div>

    <div class="shortcuts">
        <h3>Keyboard Shortcuts</h3>
        <div class="shortcut-item"><span>Assemble Next</span><kbd>N</kbd></div>
        <div class="shortcut-item"><span>Undo</span><kbd>Z</kbd></div>
        <div class="shortcut-item"><span>Redo</span><kbd>Y</kbd></div>
        <div class="shortcut-item"><span>Reset All</span><kbd>R</kbd></div>
    </div>
</div>

<div id="notification"></div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 15, 35);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
directionalLight.shadow.camera.near = 0.5;
directionalLight.shadow.camera.far = 50;
directionalLight.shadow.camera.left = -15;
directionalLight.shadow.camera.right = 15;
directionalLight.shadow.camera.top = 15;
directionalLight.shadow.camera.bottom = -15;
scene.add(directionalLight);

// Additional fill light
const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
fillLight.position.set(-5, 5, -5);
scene.add(fillLight);

// Ground plane
const groundGeom = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8, metalness: 0.2 });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const gridHelper = new THREE.GridHelper(20, 20, 0x444466, 0x333355);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// Assembly platform
const platformGeom = new THREE.CylinderGeometry(1.8, 2, 0.1, 32);
const platformMat = new THREE.MeshStandardMaterial({ color: 0x222244, roughness: 0.3, metalness: 0.7 });
const platform = new THREE.Mesh(platformGeom, platformMat);
platform.position.set(0, 0.05, 0);
platform.receiveShadow = true;
scene.add(platform);

// Assembly area ring
const ringGeom = new THREE.TorusGeometry(2, 0.03, 8, 64);
const ringMat = new THREE.MeshStandardMaterial({ color: 0x00ccff, emissive: 0x00ccff, emissiveIntensity: 0.5 });
const ring = new THREE.Mesh(ringGeom, ringMat);
ring.rotation.x = -Math.PI / 2;
ring.position.set(0, 0.12, 0);
scene.add(ring);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1.5, 0);
controls.update();

// ============ PARTS DEFINITION ============
const PART_DEFS = [
    { name: 'FRAME', color: 0x333333, trayPos: new THREE.Vector3(5, 0.5, 3), assemblyPos: new THREE.Vector3(0, 2, 0), type: 'frame' },
    { name: 'MOTOR_FL', color: 0xFF4444, trayPos: new THREE.Vector3(4, 0.5, 5), assemblyPos: new THREE.Vector3(-0.8, 2.3, -0.8), type: 'motor' },
    { name: 'MOTOR_FR', color: 0xFF4444, trayPos: new THREE.Vector3(6, 0.5, 5), assemblyPos: new THREE.Vector3(0.8, 2.3, -0.8), type: 'motor' },
    { name: 'MOTOR_BL', color: 0x4444FF, trayPos: new THREE.Vector3(4, 0.5, 6), assemblyPos: new THREE.Vector3(-0.8, 2.3, 0.8), type: 'motor' },
    { name: 'MOTOR_BR', color: 0x4444FF, trayPos: new THREE.Vector3(6, 0.5, 6), assemblyPos: new THREE.Vector3(0.8, 2.3, 0.8), type: 'motor' },
    { name: 'BATTERY', color: 0x00CC00, trayPos: new THREE.Vector3(5, 0.5, 7), assemblyPos: new THREE.Vector3(0, 1.85, 0), type: 'battery' },
    { name: 'CAMERA_MODULE', color: 0xFFAA00, trayPos: new THREE.Vector3(5, 0.5, 8), assemblyPos: new THREE.Vector3(0, 1.6, -0.5), type: 'camera' },
];

const DEFAULT_ASSEMBLY_ORDER = ['FRAME', 'MOTOR_FL', 'MOTOR_FR', 'MOTOR_BL', 'MOTOR_BR', 'BATTERY', 'CAMERA_MODULE'];

// ============ CREATE PART MESHES ============
const parts = {};
const partColors = {};

PART_DEFS.forEach(def => {
    let geometry;
    let mesh;

    switch (def.name) {
        case 'FRAME':
            geometry = new THREE.BoxGeometry(2, 0.2, 2);
            // Add arms to the frame
            const frameMat = new THREE.MeshStandardMaterial({ color: def.color, roughness: 0.4, metalness: 0.6 });
            mesh = new THREE.Group();
            const body = new THREE.Mesh(geometry, frameMat);
            body.castShadow = true;
            mesh.add(body);
            
            // Arms
            const armGeom = new THREE.BoxGeometry(0.15, 0.1, 1.6);
            const armMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.4, metalness: 0.6 });
            const arm1 = new THREE.Mesh(armGeom, armMat);
            arm1.position.set(-0.5, 0.05, 0);
            arm1.rotation.y = Math.PI / 4;
            arm1.castShadow = true;
            mesh.add(arm1);
            const arm2 = new THREE.Mesh(armGeom, armMat);
            arm2.position.set(0.5, 0.05, 0);
            arm2.rotation.y = -Math.PI / 4;
            arm2.castShadow = true;
            mesh.add(arm2);
            break;

        case 'MOTOR_FL':
        case 'MOTOR_FR':
        case 'MOTOR_BL':
        case 'MOTOR_BR':
            geometry = new THREE.CylinderGeometry(0.15, 0.15, 0.4, 16);
            const motorMat = new THREE.MeshStandardMaterial({ color: def.color, roughness: 0.3, metalness: 0.7 });
            mesh = new THREE.Group();
            const motorBody = new THREE.Mesh(geometry, motorMat);
            motorBody.castShadow = true;
            mesh.add(motorBody);
            // Propeller
            const propGeom = new THREE.BoxGeometry(0.6, 0.02, 0.08);
            const propMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.2, metalness: 0.8 });
            const prop = new THREE.Mesh(propGeom, propMat);
            prop.position.y = 0.22;
            prop.castShadow = true;
            prop.name = 'propeller';
            mesh.add(prop);
            break;

        case 'BATTERY':
            geometry = new THREE.BoxGeometry(0.6, 0.3, 0.4);
            const battMat = new THREE.MeshStandardMaterial({ color: def.color, roughness: 0.5, metalness: 0.3 });
            mesh = new THREE.Mesh(geometry, battMat);
            mesh.castShadow = true;
            break;

        case 'CAMERA_MODULE':
            geometry = new THREE.SphereGeometry(0.2, 16, 16);
            const camMat = new THREE.MeshStandardMaterial({ color: def.color, roughness: 0.2, metalness: 0.8 });
            mesh = new THREE.Group();
            const camBody = new THREE.Mesh(geometry, camMat);
            camBody.castShadow = true;
            mesh.add(camBody);
            // Lens
            const lensGeom = new THREE.CylinderGeometry(0.08, 0.1, 0.1, 12);
            const lensMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.9 });
            const lens = new THREE.Mesh(lensGeom, lensMat);
            lens.rotation.x = Math.PI / 2;
            lens.position.z = -0.18;
            mesh.add(lens);
            break;
    }

    mesh.position.copy(def.trayPos);
    scene.add(mesh);
    parts[def.name] = {
        mesh: mesh,
        trayPos: def.trayPos.clone(),
        assemblyPos: def.assemblyPos.clone(),
        assembled: false,
        def: def
    };
    partColors[def.name] = def.color;
});

// Tray labels (small text sprites)
PART_DEFS.forEach(def => {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, 256, 64);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(def.name.replace('_', ' '), 128, 40);
    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.set(def.trayPos.x, def.trayPos.y + 0.8, def.trayPos.z);
    sprite.scale.set(1.5, 0.4, 1);
    scene.add(sprite);
});

// ============ LOAD SOLDIER MODEL ============
let soldierLoaded = false;
const loader = new GLTFLoader();
loader.load(
    'soldier.glb',
    (gltf) => {
        const model = gltf.scene;
        model.position.set(-5, 0, 0);
        model.scale.set(2, 2, 2);
        model.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        scene.add(model);
        soldierLoaded = true;
        updateState();
        showNotification('Drone operator loaded!', 'info');
    },
    undefined,
    (error) => {
        console.warn('Could not load soldier.glb:', error);
        // Create a placeholder figure
        const placeholderGroup = new THREE.Group();
        
        // Body
        const bodyGeom = new THREE.CylinderGeometry(0.3, 0.25, 1.2, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x556b2f, roughness: 0.7 });
        const bodyMesh = new THREE.Mesh(bodyGeom, bodyMat);
        bodyMesh.position.y = 1.4;
        bodyMesh.castShadow = true;
        placeholderGroup.add(bodyMesh);
        
        // Head
        const headGeom = new THREE.SphereGeometry(0.25, 12, 12);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xdeb887, roughness: 0.6 });
        const headMesh = new THREE.Mesh(headGeom, headMat);
        headMesh.position.y = 2.25;
        headMesh.castShadow = true;
        placeholderGroup.add(headMesh);
        
        // Helmet
        const helmetGeom = new THREE.SphereGeometry(0.28, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2);
        const helmetMat = new THREE.MeshStandardMaterial({ color: 0x2f4f2f, roughness: 0.5 });
        const helmetMesh = new THREE.Mesh(helmetGeom, helmetMat);
        helmetMesh.position.y = 2.3;
        helmetMesh.castShadow = true;
        placeholderGroup.add(helmetMesh);
        
        // Legs
        const legGeom = new THREE.CylinderGeometry(0.1, 0.12, 0.8, 6);
        const legMat = new THREE.MeshStandardMaterial({ color: 0x3b5323, roughness: 0.7 });
        const leftLeg = new THREE.Mesh(legGeom, legMat);
        leftLeg.position.set(-0.15, 0.4, 0);
        leftLeg.castShadow = true;
        placeholderGroup.add(leftLeg);
        const rightLeg = new THREE.Mesh(legGeom, legMat);
        rightLeg.position.set(0.15, 0.4, 0);
        rightLeg.castShadow = true;
        placeholderGroup.add(rightLeg);
        
        placeholderGroup.position.set(-5, 0, 0);
        placeholderGroup.scale.set(2, 2, 2);
        scene.add(placeholderGroup);
        
        soldierLoaded = true;
        updateState();
        showNotification('Operator placeholder loaded', 'info');
    }
);

// ============ ASSEMBLY STATE ============
let assemblyOrder = [];
let undoStack = [];
let redoStack = [];
let animations = [];

function canAssemble(partName) {
    const part = parts[partName];
    if (!part || part.assembled) return false;

    switch (partName) {
        case 'FRAME':
            return true;
        case 'MOTOR_FL':
        case 'MOTOR_FR':
        case 'MOTOR_BL':
        case 'MOTOR_BR':
            return parts['FRAME'].assembled;
        case 'BATTERY':
            return parts['FRAME'].assembled;
        case 'CAMERA_MODULE':
            return parts['FRAME'].assembled && parts['BATTERY'].assembled;
        default:
            return false;
    }
}

function getNextAssemblablePart() {
    for (const name of DEFAULT_ASSEMBLY_ORDER) {
        if (!parts[name].assembled && canAssemble(name)) {
            return name;
        }
    }
    return null;
}

function assemblePart(partName, addToUndoStack = true) {
    if (!canAssemble(partName)) {
        flashPart(partName);
        showNotification(`Cannot assemble ${partName} yet!`, 'error');
        return false;
    }

    const part = parts[partName];
    part.assembled = true;
    assemblyOrder.push(partName);

    if (addToUndoStack) {
        undoStack.push(partName);
        redoStack = [];
    }

    animatePart(part.mesh, part.mesh.position.clone(), part.assemblyPos.clone(), 500);
    updateUI();
    updateState();
    showNotification(`${partName.replace('_', ' ')} assembled!`, 'success');
    return true;
}

function disassemblePart(partName) {
    const part = parts[partName];
    if (!part || !part.assembled) return false;

    part.assembled = false;
    const idx = assemblyOrder.lastIndexOf(partName);
    if (idx !== -1) assemblyOrder.splice(idx, 1);

    animatePart(part.mesh, part.mesh.position.clone(), part.trayPos.clone(), 500);
    updateUI();
    updateState();
    return true;
}

function undo() {
    if (undoStack.length === 0) {
        showNotification('Nothing to undo', 'info');
        return;
    }
    const partName = undoStack.pop();
    redoStack.push(partName);
    disassemblePart(partName);
    showNotification(`Undone: ${partName.replace('_', ' ')}`, 'info');
}

function redo() {
    if (redoStack.length === 0) {
        showNotification('Nothing to redo', 'info');
        return;
    }
    const partName = redoStack.pop();
    assemblePart(partName, false);
    undoStack.push(partName);
    updateState();
}

function resetAll() {
    for (const name of Object.keys(parts)) {
        const part = parts[name];
        if (part.assembled) {
            part.assembled = false;
            animatePart(part.mesh, part.mesh.position.clone(), part.trayPos.clone(), 500);
        }
    }
    assemblyOrder = [];
    undoStack = [];
    redoStack = [];
    updateUI();
    updateState();
    showNotification('All parts reset!', 'info');
}

function assembleNext() {
    const next = getNextAssemblablePart();
    if (next) {
        assemblePart(next);
    } else {
        if (Object.values(parts).every(p => p.assembled)) {
            showNotification('Drone is fully assembled! 🎉', 'success');
        } else {
            showNotification('No parts can be assembled right now', 'error');
        }
    }
}

// ============ ANIMATION ============
function animatePart(mesh, fromPos, toPos, duration) {
    const anim = {
        mesh: mesh,
        startPos: fromPos.clone(),
        endPos: toPos.clone(),
        startTime: performance.now(),
        duration: duration,
        active: true
    };
    animations.push(anim);
}

function updateAnimations() {
    const now = performance.now();
    for (let i = animations.length - 1; i >= 0; i--) {
        const anim = animations[i];
        if (!anim.active) {
            animations.splice(i, 1);
            continue;
        }

        const elapsed = now - anim.startTime;
        let t = Math.min(elapsed / anim.duration, 1);
        
        // Ease out cubic
        t = 1 - Math.pow(1 - t, 3);

        // Add arc
        const arcHeight = 1.5;
        const arc = Math.sin(t * Math.PI) * arcHeight;

        anim.mesh.position.lerpVectors(anim.startPos, anim.endPos, t);
        anim.mesh.position.y += arc;

        if (t >= 1) {
            anim.mesh.position.copy(anim.endPos);
            anim.active = false;
            animations.splice(i, 1);
            updateState();
        }
    }
}

function flashPart(partName) {
    const part = parts[partName];
    if (!part) return;

    const meshes = [];
    if (part.mesh.isMesh) {
        meshes.push(part.mesh);
    } else {
        part.mesh.traverse(child => {
            if (child.isMesh) meshes.push(child);
        });
    }

    const originalColors = meshes.map(m => m.material.color.clone());
    
    let flashCount = 0;
    const flashInterval = setInterval(() => {
        if (flashCount >= 6) {
            meshes.forEach((m, i) => m.material.color.copy(originalColors[i]));
            clearInterval(flashInterval);
            return;
        }
        if (flashCount % 2 === 0) {
            meshes.forEach(m => m.material.color.set(0xff0000));
        } else {
            meshes.forEach((m, i) => m.material.color.copy(originalColors[i]));
        }
        flashCount++;
    }, 100);
}

// ============ UI UPDATE ============
function updateUI() {
    const container = document.getElementById('parts-list-container');
    container.innerHTML = '';

    PART_DEFS.forEach(def => {
        const part = parts[def.name];
        const item = document.createElement('div');
        item.className = 'part-item';
        
        const colorHex = '#' + def.color.toString(16).padStart(6, '0');
        const statusClass = part.assembled ? 'assembled' : 'in-tray';
        const statusText = part.assembled ? '✓ Assembled' : '○ In Tray';

        item.innerHTML = `
            <span class="part-name"><span class="part-color" style="background:${colorHex}"></span>${def.name.replace(/_/g, ' ')}</span>
            <span class="part-status ${statusClass}">${statusText}</span>
        `;
        container.appendChild(item);
    });

    const assembled = Object.values(parts).filter(p => p.assembled).length;
    const percent = Math.round((assembled / 7) * 100);

    document.getElementById('progress-bar').style.width = percent + '%';
    document.getElementById('progress-text').textContent = percent + '%';
    document.getElementById('assembly-count').textContent = `${assembled} / 7 parts assembled`;

    document.getElementById('btn-undo').disabled = undoStack.length === 0;
    document.getElementById('btn-redo').disabled = redoStack.length === 0;
    document.getElementById('btn-assemble').disabled = getNextAssemblablePart() === null;

    if (assembled === 7) {
        document.getElementById('assembly-count').textContent = '7 / 7 parts assembled ✅';
    }
}

// ============ STATE MANAGEMENT ============
function updateState() {
    const assembled = Object.values(parts).filter(p => p.assembled).length;
    const motorsAssembled = ['MOTOR_FL', 'MOTOR_FR', 'MOTOR_BL', 'MOTOR_BR'].every(n => parts[n].assembled);

    const partPositions = {};
    for (const name of Object.keys(parts)) {
        const pos = parts[name].mesh.position;
        partPositions[name] = { x: pos.x || 0, y: pos.y || 0, z: pos.z || 0 };
    }

    window.__3D_STATE__ = {
        partsAssembled: assembled,
        assemblyOrder: [...assemblyOrder],
        undoStackSize: undoStack.length,
        redoStackSize: redoStack.length,
        progressPercent: Math.round((assembled / 7) * 100),
        frameAssembled: parts['FRAME'].assembled,
        allMotorsAssembled: motorsAssembled,
        batteryAssembled: parts['BATTERY'].assembled,
        cameraAssembled: parts['CAMERA_MODULE'].assembled,
        droneComplete: assembled === 7,
        soldierLoaded: soldierLoaded,
        partPositions: partPositions
    };
}

// ============ NOTIFICATIONS ============
function showNotification(message, type = 'info') {
    const notif = document.getElementById('notification');
    notif.textContent = message;
    notif.className = `show ${type}`;
    setTimeout(() => {
        notif.className = '';
    }, 2000);
}

// ============ EVENT LISTENERS ============
document.getElementById('btn-assemble').addEventListener('click', assembleNext);
document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-redo').addEventListener('click', redo);
document.getElementById('btn-reset').addEventListener('click', resetAll);

document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    
    switch (e.key.toLowerCase()) {
        case 'n':
            assembleNext();
            break;
        case 'z':
            undo();
            break;
        case 'y':
            redo();
            break;
        case 'r':
            resetAll();
            break;
    }
});

// ============ WINDOW RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    controls.update();
    updateAnimations();

    // Rotate propellers on assembled motors
    ['MOTOR_FL', 'MOTOR_FR', 'MOTOR_BL', 'MOTOR_BR'].forEach(name => {
        if (parts[name].assembled) {
            parts[name].mesh.traverse(child => {
                if (child.name === 'propeller') {
                    child.rotation.y += delta * 15;
                }
            });
        }
    });

    // Pulse the assembly ring
    ring.material.emissiveIntensity = 0.3 + Math.sin(elapsed * 2) * 0.2;

    // Gentle hover for completed drone
    if (window.__3D_STATE__ && window.__3D_STATE__.droneComplete) {
        const hoverOffset = Math.sin(elapsed * 1.5) * 0.1;
        PART_DEFS.forEach(def => {
            const part = parts[def.name];
            if (part.assembled && animations.every(a => a.mesh !== part.mesh)) {
                part.mesh.position.y = def.assemblyPos.y + hoverOffset;
            }
        });
    }

    renderer.render(scene, camera);
}

// ============ INIT ============
updateUI();
updateState();
animate();

</script>
