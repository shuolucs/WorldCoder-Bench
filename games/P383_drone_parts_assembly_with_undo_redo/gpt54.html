<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drone Assembly Configurator</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #111;
      color: #fff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #ui-panel {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 280px;
      max-width: calc(100vw - 32px);
      background: rgba(20, 20, 20, 0.86);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 16px;
      z-index: 10;
      box-sizing: border-box;
      backdrop-filter: blur(6px);
    }

    #ui-panel h2 {
      margin: 0 0 12px 0;
      font-size: 24px;
    }

    #parts-list {
      list-style: none;
      margin: 0 0 14px 0;
      padding: 0;
    }

    #parts-list li {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 14px;
    }

    .status {
      font-weight: bold;
    }

    .status.in-tray {
      color: #ffd166;
    }

    .status.assembled {
      color: #80ed99;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .buttons button:last-child {
      grid-column: span 2;
    }

    button {
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      background: #2f6fed;
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background: #4b83f0;
    }

    button:active {
      transform: scale(0.98);
    }

    .meta {
      font-size: 14px;
      margin-bottom: 8px;
    }

    .progress-wrap {
      width: 100%;
      height: 18px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    #progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00c2ff, #00e676);
      transition: width 0.2s ease;
    }

    #hint {
      font-size: 12px;
      color: #bbb;
      margin-top: 10px;
      line-height: 1.4;
    }

    canvas {
      display: block;
    }

    @media (max-width: 700px) {
      #ui-panel {
        width: calc(100vw - 24px);
        left: 12px;
        top: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui-panel">
      <h2>Drone Assembly</h2>

      <ul id="parts-list"></ul>

      <div class="buttons">
        <button id="btn-assemble">Assemble Next</button>
        <button id="btn-undo">Undo</button>
        <button id="btn-redo">Redo</button>
        <button id="btn-reset">Reset All</button>
      </div>

      <div id="assembly-count" class="meta">0 / 7 parts assembled</div>
      <div class="progress-wrap">
        <div id="progress-bar"></div>
      </div>
      <div id="progress-text" class="meta">0%</div>

      <div id="hint">
        Shortcuts: N = Assemble Next, Z = Undo, Y = Redo, R = Reset
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x20252b);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('app').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 2, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0x888888 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const grid = new THREE.GridHelper(20, 20, 0x444444, 0x666666);
    scene.add(grid);

    const loader = new GLTFLoader();
    let soldierLoaded = false;

    loader.load(
      'soldier.glb',
      (gltf) => {
        const soldier = gltf.scene;
        soldier.position.set(-5, 0, 0);
        soldier.scale.setScalar(2.0);
        scene.add(soldier);
        soldierLoaded = true;
        update3DState();
      },
      undefined,
      (err) => {
        console.warn('Failed to load soldier.glb', err);
        soldierLoaded = false;
        update3DState();
      }
    );

    const partsConfig = {
      FRAME: {
        color: 0x333333,
        tray: new THREE.Vector3(5, 0.5, 3),
        assembled: new THREE.Vector3(0, 2, 0),
        createMesh() {
          return new THREE.Mesh(
            new THREE.BoxGeometry(2, 0.2, 2),
            new THREE.MeshStandardMaterial({ color: this.color })
          );
        }
      },
      MOTOR_FL: {
        color: 0xFF4444,
        tray: new THREE.Vector3(4, 0.5, 5),
        assembled: new THREE.Vector3(-0.8, 2.3, -0.8),
        createMesh() {
          const m = new THREE.Mesh(
            new THREE.CylinderGeometry(0.15, 0.15, 0.4, 24),
            new THREE.MeshStandardMaterial({ color: this.color })
          );
          m.rotation.x = Math.PI / 2;
          return m;
        }
      },
      MOTOR_FR: {
        color: 0xFF4444,
        tray: new THREE.Vector3(6, 0.5, 5),
        assembled: new THREE.Vector3(0.8, 2.3, -0.8),
        createMesh() {
          const m = new THREE.Mesh(
            new THREE.CylinderGeometry(0.15, 0.15, 0.4, 24),
            new THREE.MeshStandardMaterial({ color: this.color })
          );
          m.rotation.x = Math.PI / 2;
          return m;
        }
      },
      MOTOR_BL: {
        color: 0x4444FF,
        tray: new THREE.Vector3(4, 0.5, 6),
        assembled: new THREE.Vector3(-0.8, 2.3, 0.8),
        createMesh() {
          const m = new THREE.Mesh(
            new THREE.CylinderGeometry(0.15, 0.15, 0.4, 24),
            new THREE.MeshStandardMaterial({ color: this.color })
          );
          m.rotation.x = Math.PI / 2;
          return m;
        }
      },
      MOTOR_BR: {
        color: 0x4444FF,
        tray: new THREE.Vector3(6, 0.5, 6),
        assembled: new THREE.Vector3(0.8, 2.3, 0.8),
        createMesh() {
          const m = new THREE.Mesh(
            new THREE.CylinderGeometry(0.15, 0.15, 0.4, 24),
            new THREE.MeshStandardMaterial({ color: this.color })
          );
          m.rotation.x = Math.PI / 2;
          return m;
        }
      },
      BATTERY: {
        color: 0x00CC00,
        tray: new THREE.Vector3(5, 0.5, 7),
        assembled: new THREE.Vector3(0, 1.85, 0),
        createMesh() {
          return new THREE.Mesh(
            new THREE.BoxGeometry(0.6, 0.3, 0.4),
            new THREE.MeshStandardMaterial({ color: this.color })
          );
        }
      },
      CAMERA_MODULE: {
        color: 0xFFAA00,
        tray: new THREE.Vector3(5, 0.5, 8),
        assembled: new THREE.Vector3(0, 1.6, -0.5),
        createMesh() {
          return new THREE.Mesh(
            new THREE.SphereGeometry(0.2, 24, 24),
            new THREE.MeshStandardMaterial({ color: this.color })
          );
        }
      }
    };

    const orderedParts = [
      'FRAME',
      'MOTOR_FL',
      'MOTOR_FR',
      'MOTOR_BL',
      'MOTOR_BR',
      'BATTERY',
      'CAMERA_MODULE'
    ];

    const parts = {};
    const assemblyOrder = [];
    const undoStack = [];
    const redoStack = [];
    const animations = [];

    function cloneColor(material) {
      return material.color.clone();
    }

    function createParts() {
      for (const name of orderedParts) {
        const cfg = partsConfig[name];
        const mesh = cfg.createMesh();
        mesh.position.copy(cfg.tray);
        mesh.castShadow = false;
        mesh.receiveShadow = false;
        mesh.userData = {
          partName: name,
          assembled: false,
          trayPosition: cfg.tray.clone(),
          assembledPosition: cfg.assembled.clone(),
          baseColor: cloneColor(mesh.material)
        };
        scene.add(mesh);
        parts[name] = mesh;
      }
    }

    createParts();

    const partsListEl = document.getElementById('parts-list');
    const progressBarEl = document.getElementById('progress-bar');
    const progressTextEl = document.getElementById('progress-text');
    const assemblyCountEl = document.getElementById('assembly-count');

    function renderPartsList() {
      partsListEl.innerHTML = '';
      for (const name of orderedParts) {
        const li = document.createElement('li');
        const label = document.createElement('span');
        label.textContent = name;

        const status = document.createElement('span');
        const assembled = !!parts[name].userData.assembled;
        status.textContent = assembled ? 'Assembled' : 'In Tray';
        status.className = `status ${assembled ? 'assembled' : 'in-tray'}`;

        li.appendChild(label);
        li.appendChild(status);
        partsListEl.appendChild(li);
      }
    }

    function countAssembled() {
      return orderedParts.reduce((sum, name) => sum + (parts[name].userData.assembled ? 1 : 0), 0);
    }

    function allMotorsAssembled() {
      return ['MOTOR_FL', 'MOTOR_FR', 'MOTOR_BL', 'MOTOR_BR'].every(n => parts[n].userData.assembled);
    }

    function safeNum(v) {
      return Number.isFinite(v) ? v : 0;
    }

    function update3DState() {
      const assembledCount = countAssembled();
      const progressPercent = Math.round((assembledCount / orderedParts.length) * 100);

      const posMap = {};
      for (const name of orderedParts) {
        const p = parts[name].position;
        posMap[name] = {
          x: safeNum(p.x),
          y: safeNum(p.y),
          z: safeNum(p.z)
        };
      }

      window.__3D_STATE__ = {
        partsAssembled: safeNum(assembledCount),
        assemblyOrder: [...assemblyOrder],
        undoStackSize: safeNum(undoStack.length),
        redoStackSize: safeNum(redoStack.length),
        progressPercent: safeNum(progressPercent),
        frameAssembled: !!parts.FRAME.userData.assembled,
        allMotorsAssembled: allMotorsAssembled(),
        batteryAssembled: !!parts.BATTERY.userData.assembled,
        cameraAssembled: !!parts.CAMERA_MODULE.userData.assembled,
        droneComplete: assembledCount === orderedParts.length,
        soldierLoaded: !!soldierLoaded,
        partPositions: posMap
      };

      assemblyCountEl.textContent = `${assembledCount} / 7 parts assembled`;
      progressBarEl.style.width = `${progressPercent}%`;
      progressTextEl.textContent = `${progressPercent}%`;
      renderPartsList();
    }

    function canAssemble(name) {
      const part = parts[name];
      if (!part || part.userData.assembled) return false;

      if (name === 'FRAME') return true;
      if (name.startsWith('MOTOR_')) return parts.FRAME.userData.assembled;
      if (name === 'BATTERY') return parts.FRAME.userData.assembled;
      if (name === 'CAMERA_MODULE') {
        return parts.FRAME.userData.assembled && parts.BATTERY.userData.assembled;
      }
      return false;
    }

    function flashRed(name) {
      const part = parts[name];
      if (!part) return;
      const material = part.material;
      const original = part.userData.baseColor.clone();
      material.color.set(0xff0000);
      setTimeout(() => {
        material.color.copy(original);
      }, 180);
      setTimeout(() => {
        material.color.set(0xff0000);
      }, 260);
      setTimeout(() => {
        material.color.copy(original);
      }, 420);
    }

    function animatePart(part, target, onComplete) {
      animations.push({
        part,
        from: part.position.clone(),
        to: target.clone(),
        duration: 0.5,
        elapsed: 0,
        onComplete
      });
      update3DState();
    }

    function setAssembledState(name, assembled) {
      const part = parts[name];
      part.userData.assembled = assembled;
      if (assembled) {
        if (!assemblyOrder.includes(name)) assemblyOrder.push(name);
      } else {
        const idx = assemblyOrder.indexOf(name);
        if (idx !== -1) assemblyOrder.splice(idx, 1);
      }
      update3DState();
    }

    function assemblePart(name, recordHistory = true) {
      if (!canAssemble(name)) {
        flashRed(name);
        return false;
      }

      const part = parts[name];
      animatePart(part, part.userData.assembledPosition, () => {
        setAssembledState(name, true);
      });

      if (recordHistory) {
        undoStack.push({ type: 'assemble', name });
        redoStack.length = 0;
      }

      update3DState();
      return true;
    }

    function unassemblePart(name, recordHistory = true) {
      const part = parts[name];
      if (!part.userData.assembled) return false;

      animatePart(part, part.userData.trayPosition, () => {
        setAssembledState(name, false);
      });

      if (recordHistory) {
        undoStack.push({ type: 'unassemble', name });
        redoStack.length = 0;
      }

      update3DState();
      return true;
    }

    function nextValidPartInOrder() {
      for (const name of orderedParts) {
        if (!parts[name].userData.assembled && canAssemble(name)) {
          return name;
        }
      }
      return null;
    }

    function assembleNext() {
      const next = nextValidPartInOrder();
      if (!next) {
        const firstBlocked = orderedParts.find(n => !parts[n].userData.assembled);
        if (firstBlocked) flashRed(firstBlocked);
        return;
      }
      assemblePart(next, true);
    }

    function undoAction() {
      if (undoStack.length === 0) return;
      const action = undoStack.pop();

      if (action.type === 'assemble') {
        const name = action.name;
        const part = parts[name];
        if (!part.userData.assembled && !isPartAnimating(name)) {
          // still in motion or already undone
        }
        animatePart(part, part.userData.trayPosition, () => {
          setAssembledState(name, false);
        });
        redoStack.push(action);
      } else if (action.type === 'unassemble') {
        const name = action.name;
        if (canAssemble(name) || name === 'FRAME' || parts.FRAME.userData.assembled) {
          animatePart(parts[name], parts[name].userData.assembledPosition, () => {
            setAssembledState(name, true);
          });
          redoStack.push(action);
        }
      }

      update3DState();
    }

    function redoAction() {
      if (redoStack.length === 0) return;
      const action = redoStack.pop();

      if (action.type === 'assemble') {
        if (canAssemble(action.name)) {
          animatePart(parts[action.name], parts[action.name].userData.assembledPosition, () => {
            setAssembledState(action.name, true);
          });
          undoStack.push(action);
        } else {
          flashRed(action.name);
        }
      } else if (action.type === 'unassemble') {
        if (parts[action.name].userData.assembled) {
          animatePart(parts[action.name], parts[action.name].userData.trayPosition, () => {
            setAssembledState(action.name, false);
          });
          undoStack.push(action);
        }
      }

      update3DState();
    }

    function isPartAnimating(name) {
      return animations.some(a => a.part.userData.partName === name);
    }

    function clearAnimations() {
      animations.length = 0;
    }

    function resetAll() {
      clearAnimations();
      assemblyOrder.length = 0;
      undoStack.length = 0;
      redoStack.length = 0;

      for (const name of orderedParts) {
        const part = parts[name];
        part.position.copy(part.userData.trayPosition);
        part.userData.assembled = false;
        part.material.color.copy(part.userData.baseColor);
      }

      update3DState();
    }

    document.getElementById('btn-assemble').addEventListener('click', assembleNext);
    document.getElementById('btn-undo').addEventListener('click', undoAction);
    document.getElementById('btn-redo').addEventListener('click', redoAction);
    document.getElementById('btn-reset').addEventListener('click', resetAll);

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'n') assembleNext();
      if (key === 'z') undoAction();
      if (key === 'y') redoAction();
      if (key === 'r') resetAll();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function updateAnimations(delta) {
      for (let i = animations.length - 1; i >= 0; i--) {
        const a = animations[i];
        a.elapsed += delta;
        const t = Math.min(a.elapsed / a.duration, 1);
        const eased = t < 0.5
          ? 2 * t * t
          : 1 - Math.pow(-2 * t + 2, 2) / 2;

        a.part.position.lerpVectors(a.from, a.to, eased);

        if (t >= 1) {
          a.part.position.copy(a.to);
          if (typeof a.onComplete === 'function') a.onComplete();
          animations.splice(i, 1);
        }
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.05);
      updateAnimations(delta);
      controls.update();
      update3DState();
      renderer.render(scene, camera);
    }

    update3DState();
    animate();
  </script>
</body>
</html>
