<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Trampoline Horse Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: monospace;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
      white-space: pre-line;
      border-radius: 6px;
    }

    #controls {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
      display: flex;
      gap: 8px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      background: #2c2c2c;
      color: white;
      cursor: pointer;
      font-family: monospace;
    }

    button:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div id="hud">Loading...</div>
  <div id="controls">
    <button id="toggleGravityBtn">Toggle Gravity</button>
    <button id="heavyModeBtn">Heavy Mode</button>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    let scene, camera, renderer, controls;
    let trampolineSurface, trampolineGeometry;
    let originalPositions = [];
    let horse;
    let clock = new THREE.Clock();

    let velocity = new THREE.Vector3(0, 0, 0);
    let gravityEnabled = true;
    let gravityValue = -9.8;
    let heavyMode = false;
    let massMultiplier = 1.0;
    let bounceCount = 0;
    let currentDeformation = 0;
    let isOnTrampoline = false;
    let simulationRunning = false;

    const keys = {
      a: false,
      d: false
    };

    const TRAMPOLINE_Y = 2;
    const HORSE_BOTTOM_OFFSET = 1;
    const SPRING_K = 25;
    const MAX_DEFORMATION = 1.5;

    const hud = document.getElementById('hud');
    const toggleGravityBtn = document.getElementById('toggleGravityBtn');
    const heavyModeBtn = document.getElementById('heavyModeBtn');

    window.__3D_STATE__ = {
      horseY: 10,
      horseVelocityY: 0,
      bounceCount: 0,
      trampolineDeformation: 0,
      gravityEnabled: true,
      heavyMode: false,
      massMultiplier: 1.0,
      horseX: 0,
      isOnTrampoline: false,
      simulationRunning: false
    };

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1a1a1a);

      camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 8, 15);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 2, 0);
      controls.update();

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(5, 10, 5);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.width = 2048;
      dirLight.shadow.mapSize.height = 2048;
      scene.add(dirLight);

      const groundGeo = new THREE.PlaneGeometry(30, 30);
      const groundMat = new THREE.MeshStandardMaterial({ color: 0x1f4d1f });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = 0;
      ground.receiveShadow = true;
      scene.add(ground);

      createTrampoline();
      loadHorse();

      window.addEventListener('resize', onWindowResize);
      window.addEventListener('keydown', onKeyDown);
      window.addEventListener('keyup', onKeyUp);

      toggleGravityBtn.addEventListener('click', () => {
        gravityEnabled = !gravityEnabled;
        gravityValue = gravityEnabled ? -9.8 : 0;
      });

      heavyModeBtn.addEventListener('click', () => {
        heavyMode = !heavyMode;
        massMultiplier = heavyMode ? 3.0 : 1.0;
      });
    }

    function createTrampoline() {
      const frameMat = new THREE.MeshStandardMaterial({
        color: 0x444444,
        metalness: 0.8,
        roughness: 0.3
      });

      const frameGeo = new THREE.TorusGeometry(4, 0.2, 24, 64);
      const frame = new THREE.Mesh(frameGeo, frameMat);
      frame.rotation.x = Math.PI / 2;
      frame.position.y = TRAMPOLINE_Y;
      frame.castShadow = true;
      frame.receiveShadow = true;
      scene.add(frame);

      const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 2, 16);
      const legPositions = [
        [-2.8, 1, -2.8],
        [ 2.8, 1, -2.8],
        [-2.8, 1,  2.8],
        [ 2.8, 1,  2.8]
      ];

      for (const [x, y, z] of legPositions) {
        const leg = new THREE.Mesh(legGeo, frameMat);
        leg.position.set(x, y, z);
        leg.castShadow = true;
        leg.receiveShadow = true;
        scene.add(leg);
      }

      trampolineGeometry = new THREE.PlaneGeometry(7, 7, 30, 30);
      const surfaceMat = new THREE.MeshStandardMaterial({
        color: 0x2d6cdf,
        side: THREE.DoubleSide,
        metalness: 0.1,
        roughness: 0.7
      });

      trampolineSurface = new THREE.Mesh(trampolineGeometry, surfaceMat);
      trampolineSurface.rotation.x = -Math.PI / 2;
      trampolineSurface.position.y = TRAMPOLINE_Y;
      trampolineSurface.receiveShadow = true;
      trampolineSurface.castShadow = true;
      scene.add(trampolineSurface);

      const pos = trampolineGeometry.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        originalPositions.push({
          x: pos.getX(i),
          y: pos.getY(i),
          z: pos.getZ(i)
        });
      }
    }

    function loadHorse() {
      const loader = new GLTFLoader();
      loader.load(
        '._horse.glb',
        (gltf) => {
          horse = gltf.scene;

          const box = new THREE.Box3().setFromObject(horse);
          const size = new THREE.Vector3();
          box.getSize(size);

          const targetHeight = 2;
          const scale = targetHeight / Math.max(size.y, 0.0001);
          horse.scale.setScalar(scale);

          box.setFromObject(horse);
          const center = new THREE.Vector3();
          box.getCenter(center);
          horse.position.sub(center);

          horse.position.set(0, 10, 0);

          horse.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
            }
          });

          scene.add(horse);
        },
        undefined,
        (err) => {
          console.error('Failed to load horse model:', err);

          const fallbackGeo = new THREE.BoxGeometry(1.2, 2, 2.5);
          const fallbackMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });
          horse = new THREE.Mesh(fallbackGeo, fallbackMat);
          horse.position.set(0, 10, 0);
          horse.castShadow = true;
          horse.receiveShadow = true;
          scene.add(horse);
        }
      );
    }

    function resetHorse() {
      if (!horse) return;
      horse.position.set(0, 10, 0);
      velocity.set(0, 0, 0);
      bounceCount = 0;
      currentDeformation = 0;
      isOnTrampoline = false;
      restoreTrampolineImmediate();
    }

    function restoreTrampolineImmediate() {
      const pos = trampolineGeometry.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        pos.setXYZ(i, originalPositions[i].x, originalPositions[i].y, originalPositions[i].z);
      }
      pos.needsUpdate = true;
      trampolineGeometry.computeVertexNormals();
    }

    function deformTrampoline(centerX, centerZ, depth) {
      const pos = trampolineGeometry.attributes.position;
      let maxDef = 0;

      for (let i = 0; i < pos.count; i++) {
        const ox = originalPositions[i].x;
        const oy = originalPositions[i].y;
        const oz = originalPositions[i].z;

        const dx = ox - centerX;
        const dz = oz - centerZ;
        const dist = Math.sqrt(dx * dx + dz * dz);
        const radius = 2.8;

        let influence = 0;
        if (dist < radius) {
          influence = Math.cos((dist / radius) * Math.PI * 0.5);
        }

        const newY = oy - depth * influence;
        pos.setXYZ(i, ox, newY, oz);

        const def = oy - newY;
        if (def > maxDef) maxDef = def;
      }

      currentDeformation = maxDef;
      pos.needsUpdate = true;
      trampolineGeometry.computeVertexNormals();
    }

    function restoreTrampolineSmooth() {
      const pos = trampolineGeometry.attributes.position;
      let maxDef = 0;

      for (let i = 0; i < pos.count; i++) {
        const cx = pos.getX(i);
        const cy = pos.getY(i);
        const cz = pos.getZ(i);

        const ox = originalPositions[i].x;
        const oy = originalPositions[i].y;
        const oz = originalPositions[i].z;

        const ny = THREE.MathUtils.lerp(cy, oy, 0.1);
        pos.setXYZ(i, cx, ny, cz);

        const def = oy - ny;
        if (def > maxDef) maxDef = def;
      }

      currentDeformation = maxDef < 0.001 ? 0 : maxDef;
      pos.needsUpdate = true;
      trampolineGeometry.computeVertexNormals();
    }

    function updatePhysics(dt) {
      if (!horse) return;

      if (keys.a) horse.position.x -= 0.15;
      if (keys.d) horse.position.x += 0.15;

      velocity.y += gravityValue * dt;
      horse.position.y += velocity.y * dt;

      const horseBottom = horse.position.y - HORSE_BOTTOM_OFFSET;
      const withinSurface =
        horse.position.x >= -3.5 &&
        horse.position.x <= 3.5 &&
        horse.position.z >= -3.5 &&
        horse.position.z <= 3.5;

      isOnTrampoline = false;

      if (withinSurface && horseBottom <= TRAMPOLINE_Y) {
        isOnTrampoline = true;

        const impactSpeed = Math.max(0, -velocity.y);
        const deformationDepth = THREE.MathUtils.clamp(
          impactSpeed * 0.08 * massMultiplier,
          0,
          MAX_DEFORMATION
        );

        deformTrampoline(horse.position.x, horse.position.z, deformationDepth);

        const bounceForce = SPRING_K * deformationDepth;
        const upwardAcceleration = bounceForce / massMultiplier;
        velocity.y += upwardAcceleration * dt * 4.0;

        if (velocity.y > 0) {
          velocity.y *= heavyMode ? 0.92 / 3.0 : 0.92;
          bounceCount++;
        }

        horse.position.y = TRAMPOLINE_Y + HORSE_BOTTOM_OFFSET - currentDeformation * 0.15;
      } else {
        restoreTrampolineSmooth();
      }
    }

    function updateHUD() {
      const horseY = horse ? horse.position.y : 0;
      const horseVY = velocity.y;

      hud.textContent =
`Height: ${horseY.toFixed(2)}
Velocity: ${horseVY.toFixed(2)}
Bounces: ${bounceCount}
Gravity: ${gravityEnabled ? 'ON' : 'OFF'}
Mass: ${heavyMode ? '3x' : '1x'}`;
    }

    function updateState() {
      window.__3D_STATE__ = {
        horseY: horse ? horse.position.y : 0,
        horseVelocityY: velocity.y,
        bounceCount: bounceCount,
        trampolineDeformation: currentDeformation,
        gravityEnabled: gravityEnabled,
        heavyMode: heavyMode,
        massMultiplier: massMultiplier,
        horseX: horse ? horse.position.x : 0,
        isOnTrampoline: isOnTrampoline,
        simulationRunning: simulationRunning
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      let dt = clock.getDelta();
      dt = Math.min(dt, 0.033);

      simulationRunning = true;

      updatePhysics(dt);
      updateHUD();
      updateState();

      renderer.render(scene, camera);
    }

    function onKeyDown(e) {
      const key = e.key.toLowerCase();

      if (e.code === 'Space') {
        e.preventDefault();
        resetHorse();
      }

      if (key === 'w') {
        velocity.y += 8;
      }

      if (key === 'a') keys.a = true;
      if (key === 'd') keys.d = true;
    }

    function onKeyUp(e) {
      const key = e.key.toLowerCase();
      if (key === 'a') keys.a = false;
      if (key === 'd') keys.d = false;
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
  </script>
</body>
</html>
