<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Trampoline Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: monospace;
            user-select: none;
        }
        #ui-container {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            min-width: 200px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #hud {
            margin-bottom: 15px;
            line-height: 1.5;
            font-size: 14px;
        }
        .btn {
            pointer-events: auto;
            margin-top: 8px;
            padding: 8px 12px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            display: block;
            width: 100%;
            font-family: monospace;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #555;
        }
        #controls-help {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.75);
            color: #aaa;
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 12px;
        }
        #controls-help span {
            color: white;
            font-weight: bold;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <div id="hud"></div>
        <button class="btn" id="btn-grav">Toggle Gravity</button>
        <button class="btn" id="btn-mass">Heavy Mode</button>
    </div>
    <div id="controls-help">
        <span>SPACE</span>: Reset | <span>W</span>: Push Up | <span>A/D</span>: Move L/R
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            horseY: 10,
            horseVelocityY: 0,
            bounceCount: 0,
            trampolineDeformation: 0,
            gravityEnabled: true,
            heavyMode: false,
            massMultiplier: 1.0,
            horseX: 0,
            isOnTrampoline: false,
            simulationRunning: false
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 20, 50);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Environment ---
        // Ground
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a4a1a, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Trampoline Frame
        const frameGeo = new THREE.TorusGeometry(4, 0.2, 16, 64);
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.8, roughness: 0.2 });
        const frame = new THREE.Mesh(frameGeo, frameMat);
        frame.rotation.x = -Math.PI / 2;
        frame.position.y = 2;
        frame.castShadow = true;
        frame.receiveShadow = true;
        scene.add(frame);

        // Trampoline Legs
        const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 2, 16);
        const legMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.2 });
        const legOffset = 4 * Math.cos(Math.PI / 4) - 0.1; // Position slightly inside the torus
        const legPositions = [
            [legOffset, legOffset], [legOffset, -legOffset],
            [-legOffset, legOffset], [-legOffset, -legOffset]
        ];
        legPositions.forEach(pos => {
            const leg = new THREE.Mesh(legGeo, legMat);
            leg.position.set(pos[0], 1, pos[1]);
            leg.castShadow = true;
            leg.receiveShadow = true;
            scene.add(leg);
        });

        // Trampoline Surface
        const surfGeo = new THREE.PlaneGeometry(7, 7, 30, 30);
        surfGeo.rotateX(-Math.PI / 2); // Local Y is now up
        surfGeo.userData.origPositions = new Float32Array(surfGeo.attributes.position.array);
        const surfMat = new THREE.MeshStandardMaterial({ 
            color: 0x0055ff, 
            side: THREE.DoubleSide,
            roughness: 0.6,
            metalness: 0.1
        });
        const trampSurface = new THREE.Mesh(surfGeo, surfMat);
        trampSurface.position.y = 2;
        trampSurface.receiveShadow = true;
        scene.add(trampSurface);

        // --- Model Loading ---
        const horseGroup = new THREE.Group();
        scene.add(horseGroup);
        horseGroup.position.set(0, 10, 0);

        // Fallback geometry while loading or if loading fails
        const fallbackGeo = new THREE.BoxGeometry(1, 2, 2);
        const fallbackMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
        fallbackMesh.castShadow = true;
        horseGroup.add(fallbackMesh);

        const loader = new GLTFLoader();
        loader.load('._horse.glb', (gltf) => {
            horseGroup.remove(fallbackMesh);
            const model = gltf.scene;
            
            // Scale to roughly 2 units tall
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const scale = 2 / size.y;
            model.scale.setScalar(scale);
            
            // Center model so horseGroup.position represents its center
            const centeredBox = new THREE.Box3().setFromObject(model);
            const center = centeredBox.getCenter(new THREE.Vector3());
            model.position.sub(center);

            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            horseGroup.add(model);
        }, undefined, (error) => {
            console.warn("Could not load ._horse.glb, continuing with fallback box.", error);
        });

        // --- Physics Variables ---
        let horseVelY = 0;
        let gravity = -9.8;
        let massMult = 1.0;
        let bounces = 0;
        let isContact = false;
        let maxDeform = 0;
        const trampY = 2;
        const springK = 25;
        const trampRadius = 3.5;

        // --- Input Handling ---
        const keys = { a: false, d: false };

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                horseGroup.position.set(0, 10, 0);
                horseVelY = 0;
                bounces = 0;
            }
            if (e.code === 'KeyW') {
                horseVelY += 8;
            }
            if (e.code === 'KeyA') keys.a = true;
            if (e.code === 'KeyD') keys.d = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyA') keys.a = false;
            if (e.code === 'KeyD') keys.d = false;
        });

        // --- UI Interactions ---
        const btnGrav = document.getElementById('btn-grav');
        const btnMass = document.getElementById('btn-mass');
        const hud = document.getElementById('hud');

        btnGrav.addEventListener('click', () => {
            window.__3D_STATE__.gravityEnabled = !window.__3D_STATE__.gravityEnabled;
            gravity = window.__3D_STATE__.gravityEnabled ? -9.8 : 0;
        });

        btnMass.addEventListener('click', () => {
            window.__3D_STATE__.heavyMode = !window.__3D_STATE__.heavyMode;
            massMult = window.__3D_STATE__.heavyMode ? 3.0 : 1.0;
        });

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1); // Clamp dt to prevent huge jumps

            // Horizontal Movement
            if (keys.a) horseGroup.position.x -= 0.15 * 60 * dt;
            if (keys.d) horseGroup.position.x += 0.15 * 60 * dt;

            // Physics Update
            let acc = gravity;
            const horseBottom = horseGroup.position.y - 1;
            let penetration = trampY - horseBottom;
            
            // Check if horse is within trampoline radius
            const distFromCenter = Math.sqrt(horseGroup.position.x ** 2 + horseGroup.position.z ** 2);
            isContact = penetration > 0 && distFromCenter < trampRadius;

            if (isContact) {
                // Spring force
                acc += (springK * penetration) / massMult;
                maxDeform = Math.min(1.5, penetration);
            } else {
                maxDeform = 0;
            }

            const prevVelY = horseVelY;
            horseVelY += acc * dt;

            // Apply damping at the bottom of the bounce
            if (isContact && prevVelY < 0 && horseVelY >= 0) {
                bounces++;
                horseVelY *= 0.92;
            }

            horseGroup.position.y += horseVelY * dt;

            // Prevent falling through ground
            if (horseGroup.position.y - 1 < 0) {
                horseGroup.position.y = 1;
                horseVelY = 0;
            }

            // Deform Trampoline Surface
            const positions = trampSurface.geometry.attributes.position;
            const orig = trampSurface.geometry.userData.origPositions;
            const hx = horseGroup.position.x;
            const hz = horseGroup.position.z;

            for (let i = 0; i < positions.count; i++) {
                let ox = orig[i * 3];
                let oy = orig[i * 3 + 1]; // Local Y is 0
                let oz = orig[i * 3 + 2];

                if (isContact) {
                    let dx = ox - hx;
                    let dz = oz - hz;
                    let dist = Math.sqrt(dx * dx + dz * dz);
                    
                    if (dist < trampRadius) {
                        let falloff = Math.max(0, 1 - dist / trampRadius);
                        falloff = falloff * falloff * (3 - 2 * falloff); // Smoothstep
                        positions.setY(i, oy - maxDeform * falloff);
                    } else {
                        positions.setY(i, oy);
                    }
                } else {
                    // Smooth return
                    let currentY = positions.getY(i);
                    positions.setY(i, currentY + (oy - currentY) * 0.1);
                }
            }
            positions.needsUpdate = true;
            trampSurface.geometry.computeVertexNormals();

            // Update State
            window.__3D_STATE__.horseY = horseGroup.position.y;
            window.__3D_STATE__.horseVelocityY = horseVelY;
            window.__3D_STATE__.bounceCount = bounces;
            window.__3D_STATE__.trampolineDeformation = maxDeform;
            window.__3D_STATE__.massMultiplier = massMult;
            window.__3D_STATE__.horseX = horseGroup.position.x;
            window.__3D_STATE__.isOnTrampoline = isContact;
            window.__3D_STATE__.simulationRunning = true;

            // Update HUD
            hud.innerHTML = `
                Height: ${horseGroup.position.y.toFixed(2)}<br>
                Velocity: ${horseVelY.toFixed(2)}<br>
                Bounces: ${bounces}<br>
                Gravity: ${window.__3D_STATE__.gravityEnabled ? 'ON' : 'OFF'}<br>
                Mass: ${window.__3D_STATE__.heavyMode ? '3x' : '1x'}
            `;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
