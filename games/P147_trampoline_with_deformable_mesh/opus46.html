<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Trampoline Simulation</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: #000;
}
canvas {
    display: block;
}
#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px;
    font-family: monospace;
    font-size: 14px;
    line-height: 1.6;
    border-radius: 5px;
    pointer-events: none;
    z-index: 10;
}
#controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
}
#controls button {
    padding: 10px 20px;
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    border: 2px solid #fff;
    background: rgba(0, 0, 0, 0.7);
    color: #fff;
    border-radius: 5px;
    transition: background 0.2s;
}
#controls button:hover {
    background: rgba(255, 255, 255, 0.2);
}
#instructions {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: #aaa;
    font-family: monospace;
    font-size: 12px;
    text-align: center;
    pointer-events: none;
    z-index: 10;
}
</style>
</head>
<body>

<div id="hud">
    <div id="hud-height">Height: 0.00</div>
    <div id="hud-velocity">Velocity: 0.00</div>
    <div id="hud-bounces">Bounces: 0</div>
    <div id="hud-gravity">Gravity: ON</div>
    <div id="hud-mass">Mass: 1x</div>
</div>

<div id="instructions">
    SPACE: Reset | W: Push Up | A/D: Move Left/Right
</div>

<div id="controls">
    <button id="btn-gravity">Toggle Gravity</button>
    <button id="btn-heavy">Heavy Mode</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// State
window.__3D_STATE__ = {
    horseY: 10,
    horseVelocityY: 0,
    bounceCount: 0,
    trampolineDeformation: 0,
    gravityEnabled: true,
    heavyMode: false,
    massMultiplier: 1.0,
    horseX: 0,
    isOnTrampoline: false,
    simulationRunning: false
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 20, 50);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 3, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a5c1a, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Trampoline frame (torus)
const torusGeo = new THREE.TorusGeometry(4, 0.2, 16, 64);
const torusMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.3 });
const torusFrame = new THREE.Mesh(torusGeo, torusMat);
torusFrame.rotation.x = -Math.PI / 2;
torusFrame.position.y = 2;
torusFrame.castShadow = true;
torusFrame.receiveShadow = true;
scene.add(torusFrame);

// Trampoline legs
const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 2, 8);
const legMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.7, roughness: 0.4 });
const legPositions = [
    [2.83, 1, 2.83],
    [-2.83, 1, 2.83],
    [2.83, 1, -2.83],
    [-2.83, 1, -2.83]
];
legPositions.forEach(pos => {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(pos[0], pos[1], pos[2]);
    leg.castShadow = true;
    leg.receiveShadow = true;
    scene.add(leg);
});

// Trampoline surface (deformable)
const trampolineGeo = new THREE.PlaneGeometry(7, 7, 30, 30);
const trampolineMat = new THREE.MeshStandardMaterial({
    color: 0x2244aa,
    side: THREE.DoubleSide,
    roughness: 0.6,
    metalness: 0.1
});
const trampolineMesh = new THREE.Mesh(trampolineGeo, trampolineMat);
trampolineMesh.rotation.x = -Math.PI / 2;
trampolineMesh.position.y = 2;
trampolineMesh.receiveShadow = true;
scene.add(trampolineMesh);

// Store original vertex positions
const trampolinePositions = trampolineGeo.attributes.position;
const originalPositions = new Float32Array(trampolinePositions.array.length);
originalPositions.set(trampolinePositions.array);

// Horse variables
let horseModel = null;
let horseVelocity = new THREE.Vector3(0, 0, 0);
let horsePosition = new THREE.Vector3(0, 10, 0);
let bounceCount = 0;
let gravityEnabled = true;
let heavyMode = false;
let massMultiplier = 1.0;
let currentDeformation = 0;
let isOnTrampoline = false;
let wasOnTrampoline = false;

const GRAVITY = -9.8;
const SPRING_K = 25;
const MAX_DEPRESSION = 1.5;
const DAMPING = 0.92;
const TRAMPOLINE_Y = 2;
const HORSE_HALF_HEIGHT = 1;
const TRAMPOLINE_RADIUS = 3.5;

// Key tracking
const keys = {};
window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        // Reset
        horsePosition.set(0, 10, 0);
        horseVelocity.set(0, 0, 0);
        bounceCount = 0;
        currentDeformation = 0;
        isOnTrampoline = false;
        wasOnTrampoline = false;
        if (horseModel) {
            horseModel.position.copy(horsePosition);
        }
    }
    if (e.key.toLowerCase() === 'w') {
        horseVelocity.y += 8;
    }
});

// Buttons
document.getElementById('btn-gravity').addEventListener('click', () => {
    gravityEnabled = !gravityEnabled;
});

document.getElementById('btn-heavy').addEventListener('click', () => {
    heavyMode = !heavyMode;
    massMultiplier = heavyMode ? 3.0 : 1.0;
});

// Load horse model
const loader = new GLTFLoader();

function createFallbackHorse() {
    const group = new THREE.Group();

    // Body
    const bodyGeo = new THREE.BoxGeometry(2, 1, 0.8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.3;
    body.castShadow = true;
    group.add(body);

    // Head
    const headGeo = new THREE.BoxGeometry(0.6, 0.8, 0.5);
    const head = new THREE.Mesh(headGeo, bodyMat);
    head.position.set(1.2, 0.8, 0);
    head.castShadow = true;
    group.add(head);

    // Neck
    const neckGeo = new THREE.BoxGeometry(0.4, 0.6, 0.4);
    const neck = new THREE.Mesh(neckGeo, bodyMat);
    neck.position.set(0.9, 0.6, 0);
    neck.rotation.z = 0.3;
    neck.castShadow = true;
    group.add(neck);

    // Legs
    const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.8, 8);
    const legMat = new THREE.MeshStandardMaterial({ color: 0x6B3410 });
    const legOffsets = [
        [0.7, -0.2, 0.25],
        [0.7, -0.2, -0.25],
        [-0.7, -0.2, 0.25],
        [-0.7, -0.2, -0.25]
    ];
    legOffsets.forEach(off => {
        const leg = new THREE.Mesh(legGeo, legMat);
        leg.position.set(off[0], off[1], off[2]);
        leg.castShadow = true;
        group.add(leg);
    });

    // Tail
    const tailGeo = new THREE.CylinderGeometry(0.05, 0.08, 0.8, 8);
    const tailMat = new THREE.MeshStandardMaterial({ color: 0x2a1506 });
    const tail = new THREE.Mesh(tailGeo, tailMat);
    tail.position.set(-1.2, 0.5, 0);
    tail.rotation.z = -0.8;
    tail.castShadow = true;
    group.add(tail);

    return group;
}

// Try loading the GLB, fall back to procedural horse
loader.load('._horse.glb',
    (gltf) => {
        horseModel = gltf.scene;
        // Calculate bounding box to scale
        const box = new THREE.Box3().setFromObject(horseModel);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2 / maxDim;
        horseModel.scale.set(scale, scale, scale);

        // Center the model
        const center = box.getCenter(new THREE.Vector3());
        horseModel.position.sub(center.multiplyScalar(scale));

        const wrapper = new THREE.Group();
        wrapper.add(horseModel);
        horseModel = wrapper;
        horseModel.position.copy(horsePosition);

        horseModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });

        scene.add(horseModel);
    },
    undefined,
    (error) => {
        console.log('Could not load horse.glb, using fallback model');
        horseModel = createFallbackHorse();
        horseModel.position.copy(horsePosition);
        scene.add(horseModel);
    }
);

// If model hasn't loaded after 2 seconds, use fallback
setTimeout(() => {
    if (!horseModel) {
        console.log('Timeout loading model, using fallback');
        horseModel = createFallbackHorse();
        horseModel.position.copy(horsePosition);
        scene.add(horseModel);
    }
}, 2000);

// Deform trampoline
function deformTrampoline(contactX, contactZ, depth) {
    const positions = trampolineGeo.attributes.position;

    for (let i = 0; i < positions.count; i++) {
        const ox = originalPositions[i * 3];
        const oy = originalPositions[i * 3 + 1];
        // Note: the plane is rotated, so in local space x,y are the plane coords
        // and z is the normal direction (which becomes y in world space after rotation)

        // Distance from contact point in local plane coords
        // The plane is rotated -90 deg around X, so local X = world X, local Y = world Z
        const dx = ox - contactX;
        const dy = oy - contactZ;
        const dist = Math.sqrt(dx * dx + dy * dy);

        const radius = 3.5;
        if (dist < radius) {
            const factor = Math.cos((dist / radius) * Math.PI * 0.5);
            const targetZ = -depth * factor * factor;
            const currentZ = positions.getZ(i);
            positions.setZ(i, THREE.MathUtils.lerp(currentZ, targetZ, 0.3));
        } else {
            const currentZ = positions.getZ(i);
            positions.setZ(i, THREE.MathUtils.lerp(currentZ, 0, 0.1));
        }
    }

    positions.needsUpdate = true;
    trampolineGeo.computeVertexNormals();
}

function resetTrampoline() {
    const positions = trampolineGeo.attributes.position;
    for (let i = 0; i < positions.count; i++) {
        const currentZ = positions.getZ(i);
        positions.setZ(i, THREE.MathUtils.lerp(currentZ, 0, 0.1));
    }
    positions.needsUpdate = true;
    trampolineGeo.computeVertexNormals();
}

// HUD elements
const hudHeight = document.getElementById('hud-height');
const hudVelocity = document.getElementById('hud-velocity');
const hudBounces = document.getElementById('hud-bounces');
const hudGravity = document.getElementById('hud-gravity');
const hudMass = document.getElementById('hud-mass');

// Animation
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
    requestAnimationFrame(animate);

    const dt = Math.min(clock.getDelta(), 0.05); // Cap delta time

    window.__3D_STATE__.simulationRunning = true;

    if (horseModel) {
        // Input handling
        if (keys['a']) {
            horsePosition.x -= 0.15;
        }
        if (keys['d']) {
            horsePosition.x += 0.15;
        }

        // Apply gravity
        if (gravityEnabled) {
            horseVelocity.y += GRAVITY * dt;
        }

        // Update position
        horsePosition.y += horseVelocity.y * dt;

        // Check trampoline contact
        const horseBottom = horsePosition.y - HORSE_HALF_HEIGHT;
        const distFromCenter = Math.sqrt(horsePosition.x * horsePosition.x + horsePosition.z * horsePosition.z);
        const onTrampolineArea = distFromCenter < TRAMPOLINE_RADIUS;

        wasOnTrampoline = isOnTrampoline;

        if (horseBottom <= TRAMPOLINE_Y && onTrampolineArea && horseVelocity.y <= 0) {
            isOnTrampoline = true;

            // Calculate deformation
            const speed = Math.abs(horseVelocity.y);
            let deformDepth = (speed / 10) * massMultiplier;
            deformDepth = Math.min(deformDepth, MAX_DEPRESSION);
            currentDeformation = deformDepth;

            // Deform trampoline
            deformTrampoline(horsePosition.x, horsePosition.z, deformDepth);

            // Prevent going below trampoline
            if (horsePosition.y < TRAMPOLINE_Y + HORSE_HALF_HEIGHT - deformDepth) {
                horsePosition.y = TRAMPOLINE_Y + HORSE_HALF_HEIGHT - deformDepth;
            }

            // Spring force
            const springForce = SPRING_K * deformDepth / massMultiplier;
            horseVelocity.y += springForce * dt;

            // Apply damping
            horseVelocity.y *= DAMPING;

            // Count bounce
            if (!wasOnTrampoline) {
                bounceCount++;
            }
        } else {
            isOnTrampoline = false;
            currentDeformation = 0;
            resetTrampoline();
        }

        // Ground collision
        if (horsePosition.y - HORSE_HALF_HEIGHT < 0) {
            horsePosition.y = HORSE_HALF_HEIGHT;
            horseVelocity.y = Math.abs(horseVelocity.y) * 0.3;
        }

        // Clamp position
        horsePosition.x = THREE.MathUtils.clamp(horsePosition.x, -10, 10);

        // Update model
        horseModel.position.copy(horsePosition);

        // Slight rotation based on velocity for visual feedback
        horseModel.rotation.z = THREE.MathUtils.clamp(-horseVelocity.y * 0.02, -0.3, 0.3);
    }

    // Update HUD
    hudHeight.textContent = `Height: ${horsePosition.y.toFixed(2)}`;
    hudVelocity.textContent = `Velocity: ${horseVelocity.y.toFixed(2)}`;
    hudBounces.textContent = `Bounces: ${bounceCount}`;
    hudGravity.textContent = `Gravity: ${gravityEnabled ? 'ON' : 'OFF'}`;
    hudMass.textContent = `Mass: ${massMultiplier.toFixed(0)}x`;

    // Update state
    window.__3D_STATE__.horseY = horsePosition.y;
    window.__3D_STATE__.horseVelocityY = horseVelocity.y;
    window.__3D_STATE__.bounceCount = bounceCount;
    window.__3D_STATE__.trampolineDeformation = currentDeformation;
    window.__3D_STATE__.gravityEnabled = gravityEnabled;
    window.__3D_STATE__.heavyMode = heavyMode;
    window.__3D_STATE__.massMultiplier = massMultiplier;
    window.__3D_STATE__.horseX = horsePosition.x;
    window.__3D_STATE__.isOnTrampoline = isOnTrampoline;

    controls.update();
    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
