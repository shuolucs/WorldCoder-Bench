<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Crystal Growth Simulation</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, Helvetica, sans-serif;
      color: #e8ecff;
    }

    canvas {
      display: block;
    }

    .hud {
      position: fixed;
      z-index: 10;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 0 8px rgba(0,0,0,0.6);
      font-size: 14px;
      line-height: 1.4;
    }

    #hud-top-left {
      top: 14px;
      left: 14px;
      background: rgba(10, 10, 26, 0.45);
      border: 1px solid rgba(120, 150, 255, 0.15);
      padding: 10px 12px;
      border-radius: 10px;
    }

    #hud-top-right {
      top: 14px;
      right: 14px;
      background: rgba(10, 10, 26, 0.45);
      border: 1px solid rgba(120, 150, 255, 0.15);
      padding: 10px 12px;
      border-radius: 10px;
      text-align: right;
    }

    #hud-bottom-left {
      left: 14px;
      bottom: 14px;
      background: rgba(10, 10, 26, 0.45);
      border: 1px solid rgba(120, 150, 255, 0.15);
      padding: 10px 12px;
      border-radius: 10px;
    }

    #hud-bottom-center {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 11;
      background: rgba(10, 10, 26, 0.65);
      border: 1px solid rgba(120, 150, 255, 0.2);
      padding: 12px 16px;
      border-radius: 12px;
      pointer-events: auto;
      color: #e8ecff;
      min-width: 260px;
      text-align: center;
    }

    #speedSlider {
      width: 220px;
      margin-top: 6px;
      accent-color: #7f8cff;
    }

    .indicator {
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-left: 8px;
      border-radius: 3px;
      vertical-align: middle;
      box-shadow: 0 0 10px currentColor;
      border: 1px solid rgba(255,255,255,0.25);
    }

    .keyhint {
      opacity: 0.75;
      font-size: 12px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div id="hud-top-left" class="hud">
    <div id="countInfo">Clusters: 0/5<br>Shards: 0/60</div>
  </div>

  <div id="hud-top-right" class="hud">
    <div>Current Type: <span id="typeName">Amethyst</span><span id="typeIndicator" class="indicator"></span></div>
    <div class="keyhint">Keys: 1/2/3 select type</div>
  </div>

  <div id="hud-bottom-left" class="hud">
    <div id="statusAuto">Auto-Growth: OFF</div>
    <div id="statusFrozen">Frozen: NO</div>
    <div id="statusRotation">Rotation: OFF</div>
    <div id="statusGlow">Glow: OFF</div>
    <div class="keyhint">G auto, F freeze, R rotate, L glow, C clear</div>
  </div>

  <div id="hud-bottom-center">
    <div id="speedLabel">Growth Speed: 1.0x</div>
    <input id="speedSlider" type="range" min="0.5" max="3.0" value="1.0" step="0.1" />
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    let scene, camera, renderer, controls, clock;
    let basePlatform;
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const clusters = [];
    const shards = [];
    const particles = [];

    let frozen = false;
    let autoGrowth = false;
    let rotating = false;
    let glowEnabled = false;
    let growthSpeed = 1.0;

    const maxClusters = 5;
    const maxShards = 60;

    let selectedType = "amethyst";
    let selectedTypeIndex = 1;

    const typeData = {
      amethyst: { name: "Amethyst", color: 0x9b59b6 },
      emerald: { name: "Emerald", color: 0x2ecc71 },
      sapphire: { name: "Sapphire", color: 0x3498db }
    };

    const ui = {
      countInfo: document.getElementById("countInfo"),
      typeName: document.getElementById("typeName"),
      typeIndicator: document.getElementById("typeIndicator"),
      speedSlider: document.getElementById("speedSlider"),
      speedLabel: document.getElementById("speedLabel"),
      statusAuto: document.getElementById("statusAuto"),
      statusFrozen: document.getElementById("statusFrozen"),
      statusRotation: document.getElementById("statusRotation"),
      statusGlow: document.getElementById("statusGlow")
    };

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a1a);
      scene.fog = new THREE.Fog(0x0a0a1a, 20, 50);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 8, 15);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 1, 0);

      clock = new THREE.Clock();

      addLights();
      addBasePlatform();

      window.addEventListener("resize", onResize);
      renderer.domElement.addEventListener("pointerdown", onPointerDown);
      window.addEventListener("keydown", onKeyDown);

      ui.speedSlider.addEventListener("input", () => {
        growthSpeed = parseFloat(ui.speedSlider.value);
        updateUI();
      });

      updateUI();
      animate();
    }

    function addLights() {
      const ambient = new THREE.AmbientLight(0x334466, 0.3);
      scene.add(ambient);

      const warm = new THREE.PointLight(0xff6644, 0.8, 60);
      warm.position.set(10, 15, 5);
      scene.add(warm);

      const cool = new THREE.PointLight(0x4466ff, 0.6, 60);
      cool.position.set(-10, 12, -5);
      scene.add(cool);
    }

    function addBasePlatform() {
      const geo = new THREE.CylinderGeometry(6, 6, 0.3, 6);
      const mat = new THREE.MeshStandardMaterial({
        color: 0x1a1a2e,
        roughness: 0.9,
        metalness: 0.1
      });
      basePlatform = new THREE.Mesh(geo, mat);
      basePlatform.position.y = 0;
      basePlatform.receiveShadow = true;
      scene.add(basePlatform);
    }

    function createSeedMarker(position, color) {
      const group = new THREE.Group();

      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 16, 16),
        new THREE.MeshBasicMaterial({ color })
      );
      sphere.position.copy(position);
      sphere.position.y += 0.18;
      group.add(sphere);

      const glow = new THREE.PointLight(color, 1.0, 3);
      glow.position.copy(position);
      glow.position.y += 0.25;
      group.add(glow);

      scene.add(group);
      return group;
    }

    function createCluster(position, type) {
      if (clusters.length >= maxClusters) return null;

      const data = typeData[type];
      const cluster = {
        center: new THREE.Vector3(position.x, 0.16, position.z),
        type,
        color: data.color,
        group: new THREE.Group(),
        seedMarker: null,
        shards: [],
        targetShardCount: THREE.MathUtils.randInt(5, 12),
        spawnedCount: 0,
        spawnAccumulator: 0,
        done: false,
        pulseOffset: Math.random() * Math.PI * 2,
        glowLight: null,
        autoAccumulator: 0
      };

      cluster.seedMarker = createSeedMarker(cluster.center, cluster.color);

      cluster.glowLight = new THREE.PointLight(cluster.color, 0, 5);
      cluster.glowLight.position.copy(cluster.center);
      cluster.glowLight.position.y += 0.6;
      scene.add(cluster.glowLight);

      scene.add(cluster.group);
      clusters.push(cluster);
      return cluster;
    }

    function createCrystalShard(cluster) {
      if (shards.length >= maxShards) return null;

      const color = cluster.color;
      const baseGeo = new THREE.IcosahedronGeometry(0.35, 0);
      const mat = new THREE.MeshPhysicalMaterial({
        color,
        transmission: 0.6,
        roughness: 0.1,
        metalness: 0.1,
        transparent: true,
        opacity: 0.85,
        thickness: 0.8,
        ior: 1.25
      });

      const mesh = new THREE.Mesh(baseGeo, mat);

      const radius = Math.random() * 1.0;
      const angle = Math.random() * Math.PI * 2;
      const x = cluster.center.x + Math.cos(angle) * radius;
      const z = cluster.center.z + Math.sin(angle) * radius;
      const y = 0.45 + Math.random() * 0.3;

      mesh.position.set(x, y, z);

      const tiltAxis = new THREE.Vector3(Math.random() - 0.5, 0, Math.random() - 0.5).normalize();
      const tiltAngle = THREE.MathUtils.degToRad(Math.random() * 30);
      mesh.quaternion.setFromAxisAngle(tiltAxis, tiltAngle);
      mesh.rotateY(Math.random() * Math.PI * 2);

      const scaleXZ = 0.45 + Math.random() * 0.35;
      const scaleY = 2.5 + Math.random() * 1.5;
      const targetScale = new THREE.Vector3(scaleXZ, scaleY, scaleXZ);

      mesh.scale.set(0.0001, 0.0001, 0.0001);

      cluster.group.add(mesh);

      const shard = {
        mesh,
        cluster,
        targetScale,
        growthTime: 0,
        growthDuration: 2.0,
        fullyGrown: false,
        currentGrowth: 0
      };

      shards.push(shard);
      cluster.shards.push(shard);
      cluster.spawnedCount++;

      emitParticles(cluster, mesh.position, 4 + Math.floor(Math.random() * 3));
      return shard;
    }

    function emitParticles(cluster, position, count = 3) {
      for (let i = 0; i < count; i++) {
        if (particles.length > 300) break;

        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.04 + Math.random() * 0.03, 8, 8),
          new THREE.MeshBasicMaterial({
            color: cluster.color,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending,
            depthWrite: false
          })
        );

        mesh.position.copy(position);
        mesh.position.x += (Math.random() - 0.5) * 0.25;
        mesh.position.y += Math.random() * 0.3;
        mesh.position.z += (Math.random() - 0.5) * 0.25;

        scene.add(mesh);

        particles.push({
          mesh,
          velocity: new THREE.Vector3(
            (Math.random() - 0.5) * 0.12,
            0.5 + Math.random(),
            (Math.random() - 0.5) * 0.12
          ),
          age: 0,
          life: 2.0
        });
      }
    }

    function updateClusters(dt, elapsed) {
      for (const cluster of clusters) {
        if (!frozen) {
          cluster.spawnAccumulator += dt * growthSpeed;
        }

        const interval = 0.3;

        while (!frozen &&
               cluster.spawnAccumulator >= interval &&
               cluster.spawnedCount < cluster.targetShardCount &&
               shards.length < maxShards) {
          cluster.spawnAccumulator -= interval;
          createCrystalShard(cluster);
        }

        if (cluster.spawnedCount >= cluster.targetShardCount) {
          cluster.done = true;
        }

        if (autoGrowth && !frozen && shards.length < maxShards) {
          cluster.autoAccumulator += dt * growthSpeed;
          const autoInterval = 1.0 + Math.random() * 0.8;
          if (cluster.autoAccumulator > autoInterval) {
            cluster.autoAccumulator = 0;
            if (Math.random() < 0.7 && cluster.spawnedCount < 12) {
              cluster.targetShardCount = Math.min(12, cluster.targetShardCount + 1);
            }
          }
        }

        if (glowEnabled) {
          const pulse = (Math.sin(elapsed * Math.PI + cluster.pulseOffset) + 1) * 0.5;
          cluster.glowLight.intensity = pulse * 2.0;
        } else {
          cluster.glowLight.intensity = 0;
        }

        if (rotating && !frozen) {
          cluster.group.rotation.y += 0.3 * dt;
        }
      }
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function updateShards(dt) {
      for (const shard of shards) {
        if (!shard || !shard.mesh) continue;

        if (!frozen && !shard.fullyGrown) {
          shard.growthTime += dt * growthSpeed;
          const t = Math.min(shard.growthTime / shard.growthDuration, 1);
          const e = easeOutCubic(t);
          shard.currentGrowth = e;
          shard.mesh.scale.set(
            shard.targetScale.x * e,
            shard.targetScale.y * e,
            shard.targetScale.z * e
          );

          if (Math.random() < 0.18) {
            emitParticles(shard.cluster, shard.mesh.position, 1);
          }

          if (t >= 1) {
            shard.fullyGrown = true;
          }
        }
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        if (!frozen) {
          p.age += dt;
          p.mesh.position.addScaledVector(p.velocity, dt);
          p.mesh.material.opacity = Math.max(0, 0.9 * (1 - p.age / p.life));
          const s = 1 + dt * 0.7;
          p.mesh.scale.multiplyScalar(s);
        }

        if (p.age >= p.life) {
          scene.remove(p.mesh);
          p.mesh.geometry.dispose();
          p.mesh.material.dispose();
          particles.splice(i, 1);
        }
      }
    }

    function onPointerDown(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(basePlatform, false);

      if (!intersects.length) return;
      if (clusters.length >= maxClusters) return;

      const p = intersects[0].point.clone();
      p.y = 0.16;

      const radial = Math.sqrt(p.x * p.x + p.z * p.z);
      if (radial > 5.7) return;

      createCluster(p, selectedType);
      updateUI();
    }

    function onKeyDown(e) {
      const k = e.key.toLowerCase();

      if (k === "1") {
        selectedType = "amethyst";
        selectedTypeIndex = 1;
      } else if (k === "2") {
        selectedType = "emerald";
        selectedTypeIndex = 2;
      } else if (k === "3") {
        selectedType = "sapphire";
        selectedTypeIndex = 3;
      } else if (k === "g") {
        autoGrowth = !autoGrowth;
      } else if (k === "f") {
        frozen = !frozen;
      } else if (k === "r") {
        rotating = !rotating;
      } else if (k === "l") {
        glowEnabled = !glowEnabled;
      } else if (k === "c") {
        clearAll();
      }

      updateUI();
    }

    function clearAll() {
      for (const cluster of clusters) {
        scene.remove(cluster.group);
        if (cluster.seedMarker) scene.remove(cluster.seedMarker);
        if (cluster.glowLight) scene.remove(cluster.glowLight);

        cluster.group.traverse(obj => {
          if (obj.isMesh) {
            obj.geometry?.dispose();
            if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
            else obj.material?.dispose();
          }
        });
      }

      for (const p of particles) {
        scene.remove(p.mesh);
        p.mesh.geometry.dispose();
        p.mesh.material.dispose();
      }

      clusters.length = 0;
      shards.length = 0;
      particles.length = 0;

      updateUI();
    }

    function updateUI() {
      ui.countInfo.innerHTML = `Clusters: ${clusters.length}/${maxClusters}<br>Shards: ${shards.length}/${maxShards}`;
      ui.typeName.textContent = typeData[selectedType].name;
      ui.typeIndicator.style.background = `#${typeData[selectedType].color.toString(16).padStart(6, "0")}`;
      ui.typeIndicator.style.color = `#${typeData[selectedType].color.toString(16).padStart(6, "0")}`;
      ui.speedLabel.textContent = `Growth Speed: ${growthSpeed.toFixed(1)}x`;
      ui.statusAuto.textContent = `Auto-Growth: ${autoGrowth ? "ON" : "OFF"}`;
      ui.statusFrozen.textContent = `Frozen: ${frozen ? "YES" : "NO"}`;
      ui.statusRotation.textContent = `Rotation: ${rotating ? "ON" : "OFF"}`;
      ui.statusGlow.textContent = `Glow: ${glowEnabled ? "ON" : "OFF"}`;
      updateState();
    }

    function updateState() {
      let avg = 0;
      let nanFree = true;

      for (const shard of shards) {
        avg += shard.currentGrowth || 0;
        const p = shard.mesh.position;
        if ([p.x, p.y, p.z].some(v => Number.isNaN(v))) nanFree = false;
      }
      avg = shards.length ? avg / shards.length : 0;

      const lastCluster = clusters.length
        ? clusters[clusters.length - 1].center
        : null;

      window.__3D_STATE__ = {
        clusterCount: clusters.length,
        shardCount: shards.length,
        selectedType,
        selectedTypeIndex,
        growthSpeed,
        autoGrowth,
        frozen,
        rotating,
        glowEnabled,
        lastClusterPosition: lastCluster ? { x: lastCluster.x, y: lastCluster.y, z: lastCluster.z } : null,
        averageShardScale: avg,
        particleCount: particles.length,
        totalClusters: clusters.map(c => ({
          x: c.center.x,
          z: c.center.z,
          type: c.type,
          shardCount: c.shards.length
        })),
        isNaNFree: nanFree
      };
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);
      const elapsed = clock.elapsedTime;

      controls.update();

      updateClusters(dt, elapsed);
      updateShards(dt);
      updateParticles(dt);
      updateState();

      renderer.render(scene, camera);
    }

    init();
  </script>
</body>
</html>
