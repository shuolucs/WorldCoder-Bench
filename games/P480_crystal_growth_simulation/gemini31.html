<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Crystal Growth Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .hud-panel {
            position: absolute;
            background: rgba(10, 10, 26, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        #top-left {
            top: 20px;
            left: 20px;
        }
        #top-right {
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #bottom-center {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #bottom-left {
            bottom: 20px;
            left: 20px;
            line-height: 1.6;
        }
        .color-box {
            width: 20px;
            height: 20px;
            border: 1px solid #fff;
            border-radius: 4px;
        }
        .status-on { color: #2ecc71; }
        .status-off { color: #e74c3c; }
        input[type=range] {
            width: 200px;
            cursor: pointer;
        }
        .controls-help {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="controls-help">
        Click Base: Place Seed | 1,2,3: Change Type | G: Auto-Growth | F: Freeze | R: Rotate | L: Glow | C: Clear
    </div>

    <div id="top-left" class="hud-panel">
        <div id="ui-clusters">Clusters: 0/5</div>
        <div id="ui-shards">Shards: 0/60</div>
    </div>

    <div id="top-right" class="hud-panel">
        <div id="ui-type-name">Amethyst</div>
        <div id="ui-type-color" class="color-box" style="background-color: #9b59b6;"></div>
    </div>

    <div id="bottom-left" class="hud-panel">
        <div>Auto-Growth: <span id="ui-auto" class="status-off">OFF</span></div>
        <div>Frozen: <span id="ui-frozen" class="status-off">NO</span></div>
        <div>Rotation: <span id="ui-rotation" class="status-off">OFF</span></div>
        <div>Glow: <span id="ui-glow" class="status-off">OFF</span></div>
    </div>

    <div id="bottom-center" class="hud-panel">
        <label id="ui-speed-label" for="speed-slider">Growth Speed: 1.00x</label>
        <input type="range" id="speed-slider" min="0.5" max="3.0" step="0.1" value="1.0">
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            clusterCount: 0,
            shardCount: 0,
            selectedType: 'amethyst',
            selectedTypeIndex: 1,
            growthSpeed: 1.0,
            autoGrowth: false,
            frozen: false,
            rotating: false,
            glowEnabled: false,
            lastClusterPosition: null,
            averageShardScale: 0,
            particleCount: 0,
            totalClusters: [],
            isNaNFree: true
        };

        const CRYSTAL_TYPES = {
            amethyst: { color: 0x9b59b6, index: 1, name: 'Amethyst' },
            emerald: { color: 0x2ecc71, index: 2, name: 'Emerald' },
            sapphire: { color: 0x3498db, index: 3, name: 'Sapphire' }
        };

        const MAX_CLUSTERS = 5;
        const MAX_SHARDS = 60;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.Fog(0x0a0a1a, 20, 50);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x334466, 0.3);
        scene.add(ambientLight);

        const warmLight = new THREE.PointLight(0xff6644, 0.8, 50);
        warmLight.position.set(10, 15, 5);
        scene.add(warmLight);

        const coolLight = new THREE.PointLight(0x4466ff, 0.6, 50);
        coolLight.position.set(-10, 12, -5);
        scene.add(coolLight);

        // --- Base Platform ---
        const baseGeo = new THREE.CylinderGeometry(6, 6, 0.3, 6);
        const baseMat = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a2e,
            roughness: 0.8,
            metalness: 0.2
        });
        const basePlatform = new THREE.Mesh(baseGeo, baseMat);
        basePlatform.position.y = 0;
        scene.add(basePlatform);

        // --- Crystal System ---
        const crystalGroup = new THREE.Group();
        scene.add(crystalGroup);

        const crystalGeo = new THREE.IcosahedronGeometry(1, 0);
        crystalGeo.translate(0, 1, 0); // Move origin to bottom

        const materials = {
            amethyst: new THREE.MeshPhysicalMaterial({ color: CRYSTAL_TYPES.amethyst.color, transmission: 0.6, roughness: 0.1, metalness: 0.1, transparent: true, opacity: 0.85 }),
            emerald: new THREE.MeshPhysicalMaterial({ color: CRYSTAL_TYPES.emerald.color, transmission: 0.6, roughness: 0.1, metalness: 0.1, transparent: true, opacity: 0.85 }),
            sapphire: new THREE.MeshPhysicalMaterial({ color: CRYSTAL_TYPES.sapphire.color, transmission: 0.6, roughness: 0.1, metalness: 0.1, transparent: true, opacity: 0.85 })
        };

        const clusters = [];
        const particles = [];
        const particleGeo = new THREE.SphereGeometry(0.05, 8, 8);

        function spawnCluster(intersectPoint) {
            if (clusters.length >= MAX_CLUSTERS) return;

            const type = window.__3D_STATE__.selectedType;
            const position = intersectPoint.clone();
            position.y = 0.15; // Sit on top of base

            const glowLight = new THREE.PointLight(CRYSTAL_TYPES[type].color, 0, 4);
            glowLight.position.copy(position);
            glowLight.position.y += 0.5;
            crystalGroup.add(glowLight);

            const seedGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const seedMat = new THREE.MeshBasicMaterial({ color: CRYSTAL_TYPES[type].color });
            const seedMesh = new THREE.Mesh(seedGeo, seedMat);
            seedMesh.position.copy(position);
            crystalGroup.add(seedMesh);

            const cluster = {
                position: position,
                type: type,
                shards: [],
                maxShards: Math.floor(Math.random() * 8) + 5, // 5 to 12
                timeSinceLastSpawn: 0,
                glowLight: glowLight,
                seedMesh: seedMesh
            };

            clusters.push(cluster);
            updateState();
        }

        function spawnShard(cluster) {
            if (window.__3D_STATE__.shardCount >= MAX_SHARDS) return;

            const mesh = new THREE.Mesh(crystalGeo, materials[cluster.type]);
            mesh.position.copy(cluster.position);

            mesh.rotation.y = Math.random() * Math.PI * 2;
            mesh.rotation.x = Math.random() * (Math.PI / 6); // 0 to 30 degrees
            mesh.rotation.order = 'YXZ';

            const baseScale = 0.15 + Math.random() * 0.2;
            const heightScale = baseScale * (2.5 + Math.random() * 1.5);

            mesh.scale.set(0, 0, 0);
            crystalGroup.add(mesh);

            cluster.shards.push({
                mesh: mesh,
                targetScaleX: baseScale,
                targetScaleY: heightScale,
                targetScaleZ: baseScale,
                progress: 0
            });

            window.__3D_STATE__.shardCount++;
            updateState();
        }

        function emitParticle(cluster) {
            if (particles.length >= clusters.length * 20) return;

            const mat = new THREE.MeshBasicMaterial({
                color: CRYSTAL_TYPES[cluster.type].color,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            const mesh = new THREE.Mesh(particleGeo, mat);
            mesh.position.copy(cluster.position);
            mesh.position.x += (Math.random() - 0.5) * 1.0;
            mesh.position.z += (Math.random() - 0.5) * 1.0;
            mesh.position.y += Math.random() * 1.5;

            scene.add(mesh);

            particles.push({
                mesh: mesh,
                velocity: new THREE.Vector3((Math.random()-0.5)*0.2, 0.5 + Math.random(), (Math.random()-0.5)*0.2),
                life: 2.0,
                maxLife: 2.0
            });
        }

        function clearCrystals() {
            clusters.forEach(c => {
                crystalGroup.remove(c.glowLight);
                crystalGroup.remove(c.seedMesh);
                c.shards.forEach(s => crystalGroup.remove(s.mesh));
            });
            clusters.length = 0;

            particles.forEach(p => scene.remove(p.mesh));
            particles.length = 0;

            window.__3D_STATE__.clusterCount = 0;
            window.__3D_STATE__.shardCount = 0;
            crystalGroup.rotation.y = 0;
            updateState();
        }

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (event.target.tagName !== 'CANVAS') return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(basePlatform);

            if (intersects.length > 0) {
                spawnCluster(intersects[0].point);
            }
        });

        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            const state = window.__3D_STATE__;

            if (key === '1') { state.selectedType = 'amethyst'; state.selectedTypeIndex = 1; }
            if (key === '2') { state.selectedType = 'emerald'; state.selectedTypeIndex = 2; }
            if (key === '3') { state.selectedType = 'sapphire'; state.selectedTypeIndex = 3; }
            if (key === 'g') state.autoGrowth = !state.autoGrowth;
            if (key === 'f') state.frozen = !state.frozen;
            if (key === 'r') state.rotating = !state.rotating;
            if (key === 'l') state.glowEnabled = !state.glowEnabled;
            if (key === 'c') clearCrystals();

            updateUI();
        });

        const speedSlider = document.getElementById('speed-slider');
        speedSlider.addEventListener('input', (e) => {
            window.__3D_STATE__.growthSpeed = parseFloat(e.target.value);
            updateUI();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Update Logic ---
        function updateState() {
            const state = window.__3D_STATE__;
            state.clusterCount = clusters.length;
            state.particleCount = particles.length;

            let totalProgress = 0;
            let totalShards = 0;
            
            state.totalClusters = clusters.map(c => {
                c.shards.forEach(s => {
                    totalProgress += s.progress;
                    totalShards++;
                });
                return { x: c.position.x, z: c.position.z, type: c.type, shardCount: c.shards.length };
            });

            state.averageShardScale = totalShards > 0 ? totalProgress / totalShards : 0;

            if (clusters.length > 0) {
                const last = clusters[clusters.length - 1];
                state.lastClusterPosition = { x: last.position.x, y: last.position.y, z: last.position.z };
            } else {
                state.lastClusterPosition = null;
            }

            state.isNaNFree = true;
            crystalGroup.traverse(child => {
                if (child.position && (isNaN(child.position.x) || isNaN(child.position.y) || isNaN(child.position.z))) {
                    state.isNaNFree = false;
                }
            });
        }

        function updateUI() {
            const state = window.__3D_STATE__;
            
            document.getElementById('ui-clusters').innerText = `Clusters: ${state.clusterCount}/${MAX_CLUSTERS}`;
            document.getElementById('ui-shards').innerText = `Shards: ${state.shardCount}/${MAX_SHARDS}`;
            
            const typeInfo = CRYSTAL_TYPES[state.selectedType];
            document.getElementById('ui-type-name').innerText = typeInfo.name;
            document.getElementById('ui-type-color').style.backgroundColor = '#' + typeInfo.color.toString(16).padStart(6, '0');

            document.getElementById('ui-speed-label').innerText = `Growth Speed: ${state.growthSpeed.toFixed(2)}x`;

            const setStatus = (id, condition, textTrue, textFalse) => {
                const el = document.getElementById(id);
                el.innerText = condition ? textTrue : textFalse;
                el.className = condition ? 'status-on' : 'status-off';
            };

            setStatus('ui-auto', state.autoGrowth, 'ON', 'OFF');
            setStatus('ui-frozen', state.frozen, 'YES', 'NO');
            setStatus('ui-rotation', state.rotating, 'ON', 'OFF');
            setStatus('ui-glow', state.glowEnabled, 'ON', 'OFF');
        }

        // --- Animation Loop ---
        let lastTime = performance.now();
        let autoGrowthTimer = 0;

        function animate(currentTime) {
            requestAnimationFrame(animate);

            let dt = (currentTime - lastTime) / 1000; // seconds
            lastTime = currentTime;

            const state = window.__3D_STATE__;

            if (!state.frozen) {
                const speed = state.growthSpeed;

                // Auto Growth Logic
                if (state.autoGrowth && clusters.length > 0 && state.shardCount < MAX_SHARDS) {
                    autoGrowthTimer += dt * speed;
                    if (autoGrowthTimer > 0.5) { // Try every 0.5s
                        autoGrowthTimer = 0;
                        const validClusters = clusters.filter(c => c.shards.length < c.maxShards);
                        if (validClusters.length > 0) {
                            const randomCluster = validClusters[Math.floor(Math.random() * validClusters.length)];
                            spawnShard(randomCluster);
                        }
                    }
                }

                // Cluster & Shard Logic
                clusters.forEach(cluster => {
                    // Spawn new shards over time
                    if (cluster.shards.length < cluster.maxShards && state.shardCount < MAX_SHARDS) {
                        cluster.timeSinceLastSpawn += dt * speed;
                        if (cluster.timeSinceLastSpawn > 0.3) { // 300ms
                            spawnShard(cluster);
                            cluster.timeSinceLastSpawn = 0;
                        }
                    }

                    // Grow existing shards
                    cluster.shards.forEach(shard => {
                        if (shard.progress < 1.0) {
                            shard.progress += (dt * speed) / 2.0; // 2 seconds to full growth
                            if (shard.progress > 1.0) shard.progress = 1.0;

                            // Ease out cubic
                            const ease = 1 - Math.pow(1 - shard.progress, 3);
                            
                            shard.mesh.scale.set(
                                ease * shard.targetScaleX,
                                ease * shard.targetScaleY,
                                ease * shard.targetScaleZ
                            );

                            // Emit particles during growth
                            if (Math.random() < 0.05 * speed) {
                                emitParticle(cluster);
                            }
                        }
                    });

                    // Glow Effect
                    if (state.glowEnabled) {
                        cluster.glowLight.intensity = (Math.sin(currentTime * 0.003) + 1.0); // 0 to 2
                    } else {
                        cluster.glowLight.intensity = 0;
                    }
                });

                // Particle Logic
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.life -= dt;
                    if (p.life <= 0) {
                        scene.remove(p.mesh);
                        p.mesh.material.dispose();
                        particles.splice(i, 1);
                    } else {
                        p.mesh.position.addScaledVector(p.velocity, dt);
                        p.mesh.material.opacity = p.life / p.maxLife;
                    }
                }
            }

            // Rotation Logic (independent of freeze, but uses dt)
            if (state.rotating) {
                // If frozen, dt is still calculated normally for rotation to keep it smooth if we want, 
                // but usually freeze stops everything. Let's make rotation independent of freeze.
                crystalGroup.rotation.y += 0.3 * dt;
            }

            controls.update();
            
            // Periodic state/UI update to avoid doing it every frame if not needed, 
            // but for smooth slider/progress it's fine.
            if (!state.frozen) {
                updateState();
                updateUI();
            }

            renderer.render(scene, camera);
        }

        // Init UI
        updateUI();
        animate(performance.now());

    </script>
</body>
</html>
