<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Crystal Growth Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud-top-left {
    position: fixed;
    top: 20px;
    left: 20px;
    color: #aabbdd;
    font-size: 14px;
    line-height: 1.8;
    text-shadow: 0 0 10px rgba(100,150,255,0.3);
    pointer-events: none;
    z-index: 10;
}

#hud-top-right {
    position: fixed;
    top: 20px;
    right: 20px;
    color: #aabbdd;
    font-size: 14px;
    text-align: right;
    display: flex;
    align-items: center;
    gap: 10px;
    text-shadow: 0 0 10px rgba(100,150,255,0.3);
    pointer-events: none;
    z-index: 10;
}

#type-indicator {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 0 8px currentColor;
}

#hud-bottom-center {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: #aabbdd;
    font-size: 13px;
    text-align: center;
    z-index: 10;
    text-shadow: 0 0 10px rgba(100,150,255,0.3);
}

#speed-slider {
    width: 200px;
    margin-top: 6px;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: #334466;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
}

#speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #6688cc;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(100,150,255,0.5);
}

#hud-bottom-left {
    position: fixed;
    bottom: 30px;
    left: 20px;
    color: #aabbdd;
    font-size: 12px;
    line-height: 2;
    text-shadow: 0 0 10px rgba(100,150,255,0.3);
    pointer-events: none;
    z-index: 10;
}

.status-on { color: #2ecc71; }
.status-off { color: #e74c3c; }

#instructions {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(170,187,221,0.6);
    font-size: 12px;
    text-align: center;
    line-height: 1.8;
    pointer-events: none;
    z-index: 10;
    transition: opacity 1s;
}
</style>
</head>
<body>

<div id="hud-top-left">
    <div id="cluster-count">Clusters: 0/5</div>
    <div id="shard-count">Shards: 0/60</div>
</div>

<div id="hud-top-right">
    <span id="type-name">Amethyst</span>
    <div id="type-indicator" style="background-color: #9b59b6; color: #9b59b6;"></div>
</div>

<div id="hud-bottom-center">
    <div id="speed-label">Growth Speed: 1.00x</div>
    <input type="range" id="speed-slider" min="0.5" max="3.0" step="0.05" value="1.0">
</div>

<div id="hud-bottom-left">
    <div>Auto-Growth: <span id="auto-status" class="status-off">OFF</span></div>
    <div>Frozen: <span id="frozen-status" class="status-off">NO</span></div>
    <div>Rotation: <span id="rotation-status" class="status-off">OFF</span></div>
    <div>Glow: <span id="glow-status" class="status-off">OFF</span></div>
</div>

<div id="instructions">
    Click on platform to place crystal seeds<br>
    Keys: 1/2/3 = Crystal Type | G = Auto-Growth | F = Freeze<br>
    R = Rotate | L = Glow | C = Clear
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.Fog(0x0a0a1a, 20, 50);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1, 0);

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0x334466, 0.3);
scene.add(ambientLight);

const warmLight = new THREE.PointLight(0xff6644, 0.8, 50);
warmLight.position.set(10, 15, 5);
scene.add(warmLight);

const coolLight = new THREE.PointLight(0x4466ff, 0.6, 50);
coolLight.position.set(-10, 12, -5);
scene.add(coolLight);

// ============ BASE PLATFORM ============
const hexShape = new THREE.Shape();
const hexRadius = 6;
for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 3) * i - Math.PI / 6;
    const x = hexRadius * Math.cos(angle);
    const z = hexRadius * Math.sin(angle);
    if (i === 0) hexShape.moveTo(x, z);
    else hexShape.lineTo(x, z);
}
hexShape.closePath();

const extrudeSettings = { depth: 0.3, bevelEnabled: true, bevelThickness: 0.05, bevelSize: 0.05, bevelSegments: 2 };
const platformGeometry = new THREE.ExtrudeGeometry(hexShape, extrudeSettings);
platformGeometry.rotateX(-Math.PI / 2);
platformGeometry.translate(0, -0.15, 0);

const platformMaterial = new THREE.MeshStandardMaterial({
    color: 0x1a1a2e,
    roughness: 0.8,
    metalness: 0.2,
});
const platform = new THREE.Mesh(platformGeometry, platformMaterial);
platform.position.y = 0;
scene.add(platform);

// ============ CRYSTAL TYPES ============
const crystalTypes = {
    amethyst: { color: 0x9b59b6, name: 'Amethyst' },
    emerald: { color: 0x2ecc71, name: 'Emerald' },
    sapphire: { color: 0x3498db, name: 'Sapphire' },
};
const typeKeys = ['amethyst', 'emerald', 'sapphire'];

// ============ STATE ============
let selectedTypeIndex = 0;
let growthSpeed = 1.0;
let autoGrowth = false;
let frozen = false;
let rotating = false;
let glowEnabled = false;
let instructionsVisible = true;

const clusters = [];
const allShards = [];
const particles = [];
const glowLights = [];

// ============ RAYCASTER ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// ============ CRYSTAL CREATION ============
function createCrystalMaterial(colorHex) {
    return new THREE.MeshPhysicalMaterial({
        color: colorHex,
        transmission: 0.6,
        roughness: 0.1,
        metalness: 0.1,
        transparent: true,
        opacity: 0.85,
        thickness: 0.5,
        envMapIntensity: 1.0,
        clearcoat: 0.3,
        side: THREE.DoubleSide,
    });
}

function createShardGeometry() {
    const geo = new THREE.IcosahedronGeometry(0.15, 0);
    const scaleY = 2.5 + Math.random() * 1.5;
    geo.scale(1, scaleY, 1);
    return geo;
}

function addShardToCluster(cluster) {
    if (allShards.length >= 60) return;
    if (cluster.shards.length >= 12) return;

    const type = crystalTypes[cluster.type];
    const geo = createShardGeometry();
    const mat = createCrystalMaterial(type.color);
    const shard = new THREE.Mesh(geo, mat);

    const angle = Math.random() * Math.PI * 2;
    const tilt = (Math.random() * 30) * (Math.PI / 180);
    const spread = Math.random() * 0.5;

    shard.position.set(
        cluster.center.x + Math.cos(angle) * spread,
        cluster.center.y,
        cluster.center.z + Math.sin(angle) * spread
    );

    shard.rotation.set(
        tilt * Math.cos(angle + Math.random()),
        Math.random() * Math.PI * 2,
        tilt * Math.sin(angle + Math.random())
    );

    const targetScale = 0.5 + Math.random() * 0.8;
    shard.scale.set(0, 0, 0);

    const shardData = {
        mesh: shard,
        targetScale: targetScale,
        currentScale: 0,
        growthStart: performance.now(),
        growthDuration: 2000,
        cluster: cluster,
        fullyGrown: false,
    };

    scene.add(shard);
    cluster.shards.push(shardData);
    allShards.push(shardData);
}

function createCluster(x, z, typeName) {
    if (clusters.length >= 5) return null;

    const cluster = {
        center: new THREE.Vector3(x, 0.15, z),
        type: typeName,
        shards: [],
        seedMesh: null,
        glowLight: null,
        lastShardTime: performance.now(),
        maxShards: 5 + Math.floor(Math.random() * 8),
        particleEmitters: [],
    };

    // Seed sphere
    const seedGeo = new THREE.SphereGeometry(0.1, 16, 16);
    const seedMat = new THREE.MeshStandardMaterial({
        color: crystalTypes[typeName].color,
        emissive: crystalTypes[typeName].color,
        emissiveIntensity: 0.8,
        transparent: true,
        opacity: 0.9,
    });
    const seedMesh = new THREE.Mesh(seedGeo, seedMat);
    seedMesh.position.copy(cluster.center);
    scene.add(seedMesh);
    cluster.seedMesh = seedMesh;

    // Glow light (initially off)
    const glowLight = new THREE.PointLight(crystalTypes[typeName].color, 0, 5);
    glowLight.position.copy(cluster.center);
    glowLight.position.y += 0.5;
    scene.add(glowLight);
    cluster.glowLight = glowLight;
    glowLights.push(glowLight);

    clusters.push(cluster);

    // Add first shard immediately
    addShardToCluster(cluster);

    return cluster;
}

// ============ PARTICLES ============
const particleGeometry = new THREE.SphereGeometry(0.02, 4, 4);

function spawnParticles(cluster, count) {
    const type = crystalTypes[cluster.type];
    for (let i = 0; i < count; i++) {
        const mat = new THREE.MeshBasicMaterial({
            color: type.color,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
        });
        const p = new THREE.Mesh(particleGeometry, mat);
        p.position.set(
            cluster.center.x + (Math.random() - 0.5) * 0.8,
            cluster.center.y + Math.random() * 0.5,
            cluster.center.z + (Math.random() - 0.5) * 0.8
        );
        const speed = 0.5 + Math.random() * 1.0;
        const particle = {
            mesh: p,
            speed: speed,
            life: 2.0,
            maxLife: 2.0,
            vx: (Math.random() - 0.5) * 0.3,
            vz: (Math.random() - 0.5) * 0.3,
        };
        scene.add(p);
        particles.push(particle);
    }
}

// ============ EASING ============
function easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
}

// ============ CLICK HANDLER ============
renderer.domElement.addEventListener('click', (event) => {
    if (clusters.length >= 5) return;
    if (allShards.length >= 60) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(platform);

    if (intersects.length > 0) {
        const point = intersects[0].point;
        // Check if within hex bounds (approximate)
        const dist = Math.sqrt(point.x * point.x + point.z * point.z);
        if (dist < 5.5) {
            const typeName = typeKeys[selectedTypeIndex];
            createCluster(point.x, point.z, typeName);
            if (instructionsVisible) {
                document.getElementById('instructions').style.opacity = '0';
                instructionsVisible = false;
            }
        }
    }
});

// ============ KEYBOARD HANDLER ============
document.addEventListener('keydown', (event) => {
    const key = event.key.toLowerCase();

    if (key === '1') {
        selectedTypeIndex = 0;
        updateTypeUI();
    } else if (key === '2') {
        selectedTypeIndex = 1;
        updateTypeUI();
    } else if (key === '3') {
        selectedTypeIndex = 2;
        updateTypeUI();
    } else if (key === 'g') {
        autoGrowth = !autoGrowth;
        updateStatusUI();
    } else if (key === 'f') {
        frozen = !frozen;
        updateStatusUI();
    } else if (key === 'r') {
        rotating = !rotating;
        updateStatusUI();
    } else if (key === 'c') {
        clearAll();
    } else if (key === 'l') {
        glowEnabled = !glowEnabled;
        updateStatusUI();
    }
});

// ============ SLIDER ============
const slider = document.getElementById('speed-slider');
slider.addEventListener('input', () => {
    growthSpeed = parseFloat(slider.value);
    document.getElementById('speed-label').textContent = `Growth Speed: ${growthSpeed.toFixed(2)}x`;
});

// ============ UI UPDATES ============
function updateTypeUI() {
    const typeName = typeKeys[selectedTypeIndex];
    const type = crystalTypes[typeName];
    document.getElementById('type-name').textContent = type.name;
    const indicator = document.getElementById('type-indicator');
    const colorStr = '#' + new THREE.Color(type.color).getHexString();
    indicator.style.backgroundColor = colorStr;
    indicator.style.color = colorStr;
}

function updateStatusUI() {
    document.getElementById('auto-status').textContent = autoGrowth ? 'ON' : 'OFF';
    document.getElementById('auto-status').className = autoGrowth ? 'status-on' : 'status-off';
    document.getElementById('frozen-status').textContent = frozen ? 'YES' : 'NO';
    document.getElementById('frozen-status').className = frozen ? 'status-on' : 'status-off';
    document.getElementById('rotation-status').textContent = rotating ? 'ON' : 'OFF';
    document.getElementById('rotation-status').className = rotating ? 'status-on' : 'status-off';
    document.getElementById('glow-status').textContent = glowEnabled ? 'ON' : 'OFF';
    document.getElementById('glow-status').className = glowEnabled ? 'status-on' : 'status-off';
}

function updateHUD() {
    document.getElementById('cluster-count').textContent = `Clusters: ${clusters.length}/5`;
    document.getElementById('shard-count').textContent = `Shards: ${allShards.length}/60`;
}

// ============ CLEAR ============
function clearAll() {
    // Remove shards
    for (const shard of allShards) {
        scene.remove(shard.mesh);
        shard.mesh.geometry.dispose();
        shard.mesh.material.dispose();
    }
    allShards.length = 0;

    // Remove clusters
    for (const cluster of clusters) {
        if (cluster.seedMesh) {
            scene.remove(cluster.seedMesh);
            cluster.seedMesh.geometry.dispose();
            cluster.seedMesh.material.dispose();
        }
        if (cluster.glowLight) {
            scene.remove(cluster.glowLight);
        }
    }
    clusters.length = 0;
    glowLights.length = 0;

    // Remove particles
    for (const p of particles) {
        scene.remove(p.mesh);
        p.mesh.material.dispose();
    }
    particles.length = 0;

    updateHUD();

    if (!instructionsVisible) {
        document.getElementById('instructions').style.opacity = '0.6';
        instructionsVisible = true;
    }
}

// ============ ANIMATION LOOP ============
let lastAutoGrowthTime = 0;
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    const delta = clock.getDelta();

    controls.update();

    if (!frozen) {
        const effectiveSpeed = growthSpeed;

        // Grow shards
        for (const shard of allShards) {
            if (!shard.fullyGrown) {
                const elapsed = (now - shard.growthStart) * effectiveSpeed;
                const t = Math.min(elapsed / shard.growthDuration, 1);
                const easedT = easeOutCubic(t);
                shard.currentScale = easedT;
                const s = shard.targetScale * easedT;
                shard.mesh.scale.set(s, s, s);
                if (t >= 1) {
                    shard.fullyGrown = true;
                }
            }
        }

        // Add new shards to clusters over time
        for (const cluster of clusters) {
            if (cluster.shards.length < cluster.maxShards && allShards.length < 60) {
                if (now - cluster.lastShardTime > 300 / effectiveSpeed) {
                    addShardToCluster(cluster);
                    cluster.lastShardTime = now;
                    spawnParticles(cluster, 3);
                    updateHUD();
                }
            }
        }

        // Auto-growth
        if (autoGrowth && clusters.length > 0 && allShards.length < 60) {
            if (now - lastAutoGrowthTime > 500 / effectiveSpeed) {
                // Pick a random cluster that can still grow
                const growable = clusters.filter(c => c.shards.length < 12);
                if (growable.length > 0) {
                    const cluster = growable[Math.floor(Math.random() * growable.length)];
                    addShardToCluster(cluster);
                    cluster.lastShardTime = now;
                    spawnParticles(cluster, 2);
                    updateHUD();
                }
                lastAutoGrowthTime = now;
            }
        }

        // Update particles
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.life -= delta * effectiveSpeed;
            if (p.life <= 0) {
                scene.remove(p.mesh);
                p.mesh.material.dispose();
                particles.splice(i, 1);
                continue;
            }
            p.mesh.position.y += p.speed * delta * effectiveSpeed;
            p.mesh.position.x += p.vx * delta * effectiveSpeed;
            p.mesh.position.z += p.vz * delta * effectiveSpeed;
            p.mesh.material.opacity = (p.life / p.maxLife) * 0.8;
            const s = 0.5 + (1 - p.life / p.maxLife) * 0.5;
            p.mesh.scale.set(s, s, s);
        }

        // Spawn ambient particles for clusters
        for (const cluster of clusters) {
            if (cluster.shards.length > 0 && Math.random() < 0.02 * effectiveSpeed) {
                spawnParticles(cluster, 1);
            }
        }

        // Rotation
        if (rotating) {
            for (const shard of allShards) {
                shard.mesh.rotation.y += 0.3 * delta;
            }
        }

        // Glow
        for (const cluster of clusters) {
            if (glowEnabled && cluster.glowLight) {
                const pulse = (Math.sin(now * 0.003) + 1) * 1.0; // 0 to 2
                cluster.glowLight.intensity = pulse;
            } else if (cluster.glowLight) {
                cluster.glowLight.intensity = 0;
            }
        }

        // Seed mesh pulse
        for (const cluster of clusters) {
            if (cluster.seedMesh) {
                const pulse = 0.8 + Math.sin(now * 0.004) * 0.2;
                cluster.seedMesh.material.emissiveIntensity = pulse;
            }
        }
    }

    // Update state
    updateState();

    renderer.render(scene, camera);
}

// ============ STATE MANAGEMENT ============
function updateState() {
    let totalScale = 0;
    let count = 0;
    let hasNaN = false;

    for (const shard of allShards) {
        const pos = shard.mesh.position;
        if (isNaN(pos.x) || isNaN(pos.y) || isNaN(pos.z)) {
            hasNaN = true;
        }
        totalScale += shard.currentScale;
        count++;
    }

    const avgScale = count > 0 ? totalScale / count : 0;
    const lastCluster = clusters.length > 0 ? clusters[clusters.length - 1] : null;

    window.__3D_STATE__ = {
        clusterCount: clusters.length,
        shardCount: allShards.length,
        selectedType: typeKeys[selectedTypeIndex],
        selectedTypeIndex: selectedTypeIndex + 1,
        growthSpeed: growthSpeed,
        autoGrowth: autoGrowth,
        frozen: frozen,
        rotating: rotating,
        glowEnabled: glowEnabled,
        lastClusterPosition: lastCluster ? { x: lastCluster.center.x, y: lastCluster.center.y, z: lastCluster.center.z } : null,
        averageShardScale: avgScale,
        particleCount: particles.length,
        totalClusters: clusters.map(c => ({
            x: c.center.x,
            z: c.center.z,
            type: c.type,
            shardCount: c.shards.length,
        })),
        isNaNFree: !hasNaN,
    };
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ INIT ============
updateTypeUI();
updateStatusUI();
updateHUD();
updateState();
animate();

</script>
</body>
</html>
