<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Ring Designer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0b1020 0%, #1b1f2f 50%, #090b12 100%);
      color: #fff;
    }

    canvas {
      display: block;
    }

    #control-panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      width: 280px;
      padding: 16px;
      border-radius: 12px;
      background: rgba(10, 10, 20, 0.7);
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.08);
    }

    #control-panel h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .row {
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    button {
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2c3555;
      color: #fff;
      font-weight: 600;
      transition: transform 0.12s ease, background 0.2s ease;
    }

    button:hover {
      background: #3d4a74;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .material-btn {
      min-width: 80px;
    }

    #btn-gold { background: #b8860b; }
    #btn-silver { background: #8f959e; }
    #btn-rosegold { background: #9c6570; }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="control-panel">
    <h2>Ring Designer</h2>

    <div class="row">Gem Count: <span id="gem-count">1</span></div>
    <div class="btn-group">
      <button id="btn-add-gem">Add Gem</button>
      <button id="btn-remove-gem">Remove Gem</button>
    </div>

    <div class="row" style="margin-top:12px;">
      Difficulty: <span id="difficulty-display">Easy</span>
    </div>
    <div class="btn-group">
      <button id="btn-difficulty">Cycle Difficulty</button>
    </div>

    <div class="row" style="margin-top:12px;">Ring Material:</div>
    <div class="btn-group">
      <button id="btn-gold" class="material-btn">Gold</button>
      <button id="btn-silver" class="material-btn">Silver</button>
      <button id="btn-rosegold" class="material-btn">Rose Gold</button>
    </div>

    <div class="row" style="margin-top:12px;">
      Price: $<span id="price-display">600</span>
    </div>

    <div class="hint">
      Keys: <b>R</b> toggle rotation, <b>Space</b> reset camera
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    // Scene setup
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    const initialCameraPosition = new THREE.Vector3(0, 2, 5);
    camera.position.copy(initialCameraPosition);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const warmLight = new THREE.DirectionalLight(0xffd700, 1.0);
    warmLight.position.set(5, 5, 5);
    scene.add(warmLight);

    const coolLight = new THREE.DirectionalLight(0x4488ff, 0.5);
    coolLight.position.set(-3, 3, -3);
    scene.add(coolLight);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;
    controls.minPolarAngle = 0.3;
    controls.maxPolarAngle = 1.5;
    controls.update();

    // Ring
    const ringRadius = 1;
    const ringTube = 0.15;
    const ringGeometry = new THREE.TorusGeometry(ringRadius, ringTube, 32, 64);

    const materialColors = {
      gold: 0xffd700,
      silver: 0xc0c0c0,
      rosegold: 0xb76e79
    };

    const baseMaterialPrices = {
      gold: 500,
      silver: 300,
      rosegold: 450
    };

    const gemPrices = {
      1: 100,
      2: 250,
      3: 400,
      4: 800
    };

    let currentRingMaterial = 'gold';
    const ringMaterial = new THREE.MeshStandardMaterial({
      color: materialColors[currentRingMaterial],
      metalness: 0.9,
      roughness: 0.1
    });

    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
    ring.position.set(0, 0, 0);
    scene.add(ring);

    // Soldier mannequin
    let soldierLoaded = false;
    const gltfLoader = new GLTFLoader();
    gltfLoader.load(
      'soldier.glb',
      (gltf) => {
        const soldier = gltf.scene;
        soldier.scale.setScalar(0.01);
        soldier.position.set(2.5, -1, 0);
        scene.add(soldier);
        soldierLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load soldier.glb', err);
        soldierLoaded = false;
      }
    );

    // Gem system
    const gems = [];
    let difficulty = 1;
    let autoRotate = true;
    let sparkleTime = 0;

    function getDifficultyLabel(level) {
      switch (level) {
        case 1: return 'Easy';
        case 2: return 'Medium';
        case 3: return 'Hard';
        case 4: return 'Expert';
        default: return 'Easy';
      }
    }

    function getGemMaterial(level) {
      const config = {
        color: 0xff0000,
        transmission: 0.8,
        roughness: 0.05,
        metalness: 0.1,
        ior: 2.4,
        transparent: true,
        opacity: 1.0,
        thickness: 0.6,
        emissive: 0x000000,
        emissiveIntensity: 0
      };

      if (level === 1) {
        config.color = 0xff0000; // Ruby
      } else if (level === 2) {
        config.color = 0x0044ff; // Sapphire
      } else if (level === 3) {
        config.color = 0x00ff44; // Emerald
        config.emissive = 0x003300;
        config.emissiveIntensity = 0.6;
      } else if (level === 4) {
        config.color = 0xffffff; // Diamond
        config.transmission = 0.98;
        config.roughness = 0.01;
        config.ior = 2.5;
      }

      return new THREE.MeshPhysicalMaterial(config);
    }

    function createGem() {
      const geometry = new THREE.IcosahedronGeometry(0.12, 1);
      const material = getGemMaterial(difficulty);
      const gem = new THREE.Mesh(geometry, material);
      ring.add(gem);
      gems.push(gem);
      redistributeGems();
      updateUI();
    }

    function removeGem() {
      if (gems.length <= 1) return;
      const gem = gems.pop();
      ring.remove(gem);
      gem.geometry.dispose();
      gem.material.dispose();
      redistributeGems();
      updateUI();
    }

    function redistributeGems() {
      const count = gems.length;
      if (count === 0) return;

      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;

        // Torus around Y-axis approximation for "top" outer placement around ring band
        const x = Math.sin(angle) * ringRadius;
        const y = ringTube + 0.08;
        const z = Math.cos(angle) * ringRadius;

        gems[i].position.set(x, y, z);
        gems[i].lookAt(0, y, 0);
      }
    }

    function updateGemMaterials() {
      for (const gem of gems) {
        gem.material.dispose();
        gem.material = getGemMaterial(difficulty);
      }
    }

    function cycleDifficulty() {
      difficulty++;
      if (difficulty > 4) difficulty = 1;
      updateGemMaterials();
      updateUI();
    }

    function setRingMaterial(type) {
      currentRingMaterial = type;
      ring.material.color.setHex(materialColors[type]);
      updateUI();
    }

    function calculatePrice() {
      return baseMaterialPrices[currentRingMaterial] + gems.length * gemPrices[difficulty];
    }

    function updateUI() {
      document.getElementById('gem-count').textContent = gems.length;
      document.getElementById('difficulty-display').textContent = getDifficultyLabel(difficulty);
      document.getElementById('price-display').textContent = calculatePrice();
    }

    // Initial gem
    createGem();

    // UI events
    document.getElementById('btn-add-gem').addEventListener('click', () => {
      if (gems.length >= 8) return;
      createGem();
    });

    document.getElementById('btn-remove-gem').addEventListener('click', () => {
      removeGem();
    });

    document.getElementById('btn-difficulty').addEventListener('click', () => {
      cycleDifficulty();
    });

    document.getElementById('btn-gold').addEventListener('click', () => {
      setRingMaterial('gold');
    });

    document.getElementById('btn-silver').addEventListener('click', () => {
      setRingMaterial('silver');
    });

    document.getElementById('btn-rosegold').addEventListener('click', () => {
      setRingMaterial('rosegold');
    });

    // Keyboard controls
    window.addEventListener('keydown', (event) => {
      if (event.code === 'KeyR') {
        autoRotate = !autoRotate;
      }

      if (event.code === 'Space') {
        event.preventDefault();
        camera.position.copy(initialCameraPosition);
        controls.target.set(0, 0, 0);
        controls.update();
      }
    });

    // State exposure
    window.__3D_STATE__ = {
      gemCount: gems.length,
      difficulty,
      ringMaterial: currentRingMaterial,
      price: calculatePrice(),
      autoRotate,
      ringRotationY: ring.rotation.y,
      soldierLoaded,
      cameraDistance: camera.position.distanceTo(new THREE.Vector3(0, 0, 0)),
      gemsArray: gems
    };

    // Animation
    function animate() {
      requestAnimationFrame(animate);

      if (autoRotate) {
        ring.rotation.y += 0.005;
      }

      // Expert sparkle animation
      sparkleTime += 0.03;
      if (difficulty === 4) {
        for (let i = 0; i < gems.length; i++) {
          const gem = gems[i];
          const pulse = 0.7 + 0.3 * Math.sin(sparkleTime * 3 + i * 1.4);
          gem.material.emissive = new THREE.Color(0xffffff);
          gem.material.emissiveIntensity = 0.15 * pulse;
          gem.scale.setScalar(1 + 0.04 * Math.sin(sparkleTime * 5 + i));
        }
      } else {
        for (const gem of gems) {
          gem.scale.setScalar(1);
        }
      }

      controls.update();

      window.__3D_STATE__.gemCount = gems.length;
      window.__3D_STATE__.difficulty = difficulty;
      window.__3D_STATE__.ringMaterial = currentRingMaterial;
      window.__3D_STATE__.price = calculatePrice();
      window.__3D_STATE__.autoRotate = autoRotate;
      window.__3D_STATE__.ringRotationY = ring.rotation.y;
      window.__3D_STATE__.soldierLoaded = soldierLoaded;
      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
      window.__3D_STATE__.gemsArray = gems;

      renderer.render(scene, camera);
    }

    animate();

    // Resize handling
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
