<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Ring Designer</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 30%, #16213e 60%, #0a0a1a 100%);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

canvas {
    display: block;
}

#control-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(255, 215, 0, 0.3);
    border-radius: 12px;
    padding: 20px;
    color: #e0e0e0;
    min-width: 260px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
}

#control-panel h2 {
    text-align: center;
    color: #ffd700;
    margin-bottom: 15px;
    font-size: 1.3em;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
}

.control-section {
    margin-bottom: 15px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.control-section:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
}

.control-section label {
    display: block;
    font-size: 0.8em;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
}

.btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

button {
    padding: 8px 14px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.08);
    color: #e0e0e0;
    cursor: pointer;
    font-size: 0.85em;
    transition: all 0.3s ease;
}

button:hover {
    background: rgba(255, 255, 255, 0.15);
    border-color: rgba(255, 215, 0, 0.5);
    transform: translateY(-1px);
}

button:active {
    transform: translateY(0);
}

button.active {
    background: rgba(255, 215, 0, 0.2);
    border-color: #ffd700;
    color: #ffd700;
}

#btn-add-gem {
    background: rgba(0, 180, 0, 0.15);
    border-color: rgba(0, 180, 0, 0.4);
}

#btn-add-gem:hover {
    background: rgba(0, 180, 0, 0.25);
}

#btn-remove-gem {
    background: rgba(180, 0, 0, 0.15);
    border-color: rgba(180, 0, 0, 0.4);
}

#btn-remove-gem:hover {
    background: rgba(180, 0, 0, 0.25);
}

#btn-difficulty {
    width: 100%;
    padding: 10px;
    font-weight: bold;
}

.info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
}

.info-value {
    font-weight: bold;
    color: #ffd700;
    font-size: 1.1em;
}

#price-display {
    font-size: 1.4em;
    color: #ffd700;
    text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
}

#difficulty-display {
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 0.85em;
    font-weight: bold;
}

.diff-1 { background: rgba(255, 0, 0, 0.2); color: #ff4444; }
.diff-2 { background: rgba(0, 68, 255, 0.2); color: #4488ff; }
.diff-3 { background: rgba(0, 255, 68, 0.2); color: #44ff88; }
.diff-4 { background: rgba(255, 255, 255, 0.2); color: #ffffff; }

#btn-gold { color: #ffd700; }
#btn-silver { color: #c0c0c0; }
#btn-rosegold { color: #e8a0a0; }

.keyboard-hint {
    font-size: 0.7em;
    color: #666;
    text-align: center;
    margin-top: 10px;
}

kbd {
    background: rgba(255, 255, 255, 0.1);
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    font-family: monospace;
}
</style>
</head>
<body>

<div id="control-panel">
    <h2>💍 Ring Designer</h2>

    <div class="control-section">
        <label>Gems</label>
        <div class="info-row">
            <span>Count: <span id="gem-count" class="info-value">1</span></span>
            <div class="btn-row">
                <button id="btn-add-gem">+ Add</button>
                <button id="btn-remove-gem">− Remove</button>
            </div>
        </div>
    </div>

    <div class="control-section">
        <label>Difficulty / Gem Type</label>
        <button id="btn-difficulty">🔴 Easy - Ruby</button>
        <div class="info-row" style="margin-top: 8px;">
            <span>Level:</span>
            <span id="difficulty-display" class="diff-1">Easy</span>
        </div>
    </div>

    <div class="control-section">
        <label>Ring Material</label>
        <div class="btn-row">
            <button id="btn-gold" class="active">🥇 Gold</button>
            <button id="btn-silver">🥈 Silver</button>
            <button id="btn-rosegold">🌹 Rose Gold</button>
        </div>
    </div>

    <div class="control-section">
        <label>Total Price</label>
        <div class="info-row">
            <span id="price-display">$600</span>
        </div>
    </div>

    <div class="keyboard-hint">
        <kbd>R</kbd> Toggle rotation &nbsp; <kbd>Space</kbd> Reset camera
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const state = {
    gemCount: 1,
    difficulty: 1,
    ringMaterial: 'gold',
    price: 600,
    autoRotate: true,
    ringRotationY: 0,
    soldierLoaded: false,
    cameraDistance: 5,
    gemsArray: []
};
window.__3D_STATE__ = state;

const materialColors = {
    gold: 0xffd700,
    silver: 0xc0c0c0,
    rosegold: 0xb76e79
};

const basePrices = { gold: 500, silver: 300, rosegold: 450 };
const gemPrices = { 1: 100, 2: 250, 3: 400, 4: 800 };

const difficultyInfo = [
    null,
    { name: 'Easy', gem: 'Ruby', emoji: '🔴', color: 0xff0000, emissive: 0x000000 },
    { name: 'Medium', gem: 'Sapphire', emoji: '🔵', color: 0x0044ff, emissive: 0x000000 },
    { name: 'Hard', gem: 'Emerald', emoji: '🟢', color: 0x00ff44, emissive: 0x003300 },
    { name: 'Expert', gem: 'Diamond', emoji: '💎', color: 0xffffff, emissive: 0x000000 }
];

// --- Scene Setup ---
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const warmLight = new THREE.DirectionalLight(0xffd700, 1.0);
warmLight.position.set(5, 5, 5);
scene.add(warmLight);

const coolLight = new THREE.DirectionalLight(0x4488ff, 0.5);
coolLight.position.set(-3, 3, -3);
scene.add(coolLight);

// Extra fill light for better ring visibility
const fillLight = new THREE.PointLight(0xffffff, 0.3, 20);
fillLight.position.set(0, 3, 0);
scene.add(fillLight);

// --- Environment map for reflections ---
const pmremGenerator = new THREE.PMREMGenerator(renderer);
const envScene = new THREE.Scene();
envScene.background = new THREE.Color(0x222244);
const envLight1 = new THREE.PointLight(0xffd700, 5, 50);
envLight1.position.set(5, 5, 5);
envScene.add(envLight1);
const envLight2 = new THREE.PointLight(0x4488ff, 3, 50);
envLight2.position.set(-5, 3, -5);
envScene.add(envLight2);
const envLight3 = new THREE.PointLight(0xffffff, 2, 50);
envLight3.position.set(0, -5, 0);
envScene.add(envLight3);
const envMap = pmremGenerator.fromScene(envScene, 0.04).texture;
scene.environment = envMap;

// --- Controls ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minPolarAngle = 0.3;
controls.maxPolarAngle = 1.5;
controls.target.set(0, 0, 0);

const initialCameraPos = new THREE.Vector3(0, 2, 5);

// --- Ring ---
const ringGroup = new THREE.Group();
scene.add(ringGroup);

const ringGeometry = new THREE.TorusGeometry(1, 0.15, 32, 64);
const ringMaterial = new THREE.MeshStandardMaterial({
    color: materialColors.gold,
    metalness: 0.9,
    roughness: 0.1,
    envMap: envMap
});
const ringMesh = new THREE.Mesh(ringGeometry, ringMaterial);
ringGroup.add(ringMesh);

// --- Gem System ---
const gemsGroup = new THREE.Group();
ringGroup.add(gemsGroup);

function createGemMaterial(difficulty) {
    const info = difficultyInfo[difficulty];
    const matProps = {
        color: info.color,
        metalness: 0.1,
        roughness: 0.05,
        transmission: 0.8,
        ior: 2.4,
        thickness: 0.5,
        emissive: info.emissive,
        emissiveIntensity: info.emissive !== 0x000000 ? 0.5 : 0,
        envMap: envMap
    };

    if (difficulty === 4) {
        matProps.transmission = 0.95;
        matProps.clearcoat = 1.0;
        matProps.clearcoatRoughness = 0.0;
    }

    return new THREE.MeshPhysicalMaterial(matProps);
}

function createGem(angle, difficulty) {
    const gemGeometry = new THREE.IcosahedronGeometry(0.12, 1);
    const gemMaterial = createGemMaterial(difficulty);
    const gem = new THREE.Mesh(gemGeometry, gemMaterial);

    // Position on top of the torus
    const R = 1; // torus radius
    const r = 0.15; // tube radius
    gem.position.x = Math.cos(angle) * R;
    gem.position.y = Math.sin(angle) * R + r + 0.08;
    gem.position.z = 0;

    // Actually position gems on the outer surface of the torus
    // The torus lies in the XY plane by default (Three.js torus is in XZ, but we haven't rotated)
    // Three.js TorusGeometry: the torus is in the XZ plane with Y as up
    // So gems should be placed at the top of the tube along the torus path
    const x = (R + r + 0.06) * Math.cos(angle);
    const z = (R + r + 0.06) * Math.sin(angle);
    const y = 0;

    // Actually, the torus in Three.js lies flat in XZ plane. The "top" of the tube is +Y direction.
    // For a point at angle `angle` along the torus, the center of the tube is at:
    // (R * cos(angle), 0, R * sin(angle))
    // The top of the tube at that point is:
    // (R * cos(angle), r, R * sin(angle))
    // We place the gem slightly above that
    gem.position.set(
        R * Math.cos(angle),
        r + 0.08,
        R * Math.sin(angle)
    );

    gem.userData.angle = angle;
    return gem;
}

function rebuildGems() {
    // Clear existing gems
    while (gemsGroup.children.length > 0) {
        const child = gemsGroup.children[0];
        child.geometry.dispose();
        child.material.dispose();
        gemsGroup.remove(child);
    }
    state.gemsArray = [];

    for (let i = 0; i < state.gemCount; i++) {
        const angle = (i / state.gemCount) * Math.PI * 2;
        const gem = createGem(angle, state.difficulty);
        gemsGroup.add(gem);
        state.gemsArray.push(gem);
    }
}

function updateGemColors() {
    state.gemsArray.forEach(gem => {
        gem.material.dispose();
        gem.material = createGemMaterial(state.difficulty);
    });
}

// Initialize with 1 gem
rebuildGems();

// --- Load Soldier Model ---
const loader = new GLTFLoader();
loader.load(
    'soldier.glb',
    (gltf) => {
        const model = gltf.scene;
        model.scale.set(0.01, 0.01, 0.01);
        model.position.set(2.5, -1, 0);
        scene.add(model);
        state.soldierLoaded = true;
        console.log('Soldier model loaded successfully');
    },
    (progress) => {
        // Loading progress
    },
    (error) => {
        console.warn('Could not load soldier.glb:', error.message);
        state.soldierLoaded = false;

        // Create a simple mannequin placeholder
        const mannequinGroup = new THREE.Group();
        mannequinGroup.position.set(2.5, -1, 0);

        // Body
        const bodyGeo = new THREE.CylinderGeometry(0.15, 0.12, 0.6, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x556655, roughness: 0.8 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.5;
        mannequinGroup.add(body);

        // Head
        const headGeo = new THREE.SphereGeometry(0.1, 8, 8);
        const head = new THREE.Mesh(headGeo, bodyMat);
        head.position.y = 0.9;
        mannequinGroup.add(head);

        // Legs
        const legGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.4, 6);
        const leftLeg = new THREE.Mesh(legGeo, bodyMat);
        leftLeg.position.set(-0.06, 0.1, 0);
        mannequinGroup.add(leftLeg);
        const rightLeg = new THREE.Mesh(legGeo, bodyMat);
        rightLeg.position.set(0.06, 0.1, 0);
        mannequinGroup.add(rightLeg);

        // Arms
        const armGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.4, 6);
        const leftArm = new THREE.Mesh(armGeo, bodyMat);
        leftArm.position.set(-0.2, 0.55, 0);
        leftArm.rotation.z = 0.2;
        mannequinGroup.add(leftArm);
        const rightArm = new THREE.Mesh(armGeo, bodyMat);
        rightArm.position.set(0.2, 0.55, 0);
        rightArm.rotation.z = -0.2;
        mannequinGroup.add(rightArm);

        // Label
        scene.add(mannequinGroup);
    }
);

// --- Floor grid for reference ---
const gridHelper = new THREE.GridHelper(10, 20, 0x333355, 0x222244);
gridHelper.position.y = -1;
scene.add(gridHelper);

// --- Price Calculation ---
function calculatePrice() {
    const base = basePrices[state.ringMaterial];
    const gemTotal = state.gemCount * gemPrices[state.difficulty];
    state.price = base + gemTotal;
    return state.price;
}

// --- UI Updates ---
function updateUI() {
    document.getElementById('gem-count').textContent = state.gemCount;

    const info = difficultyInfo[state.difficulty];
    const diffBtn = document.getElementById('btn-difficulty');
    diffBtn.textContent = `${info.emoji} ${info.name} - ${info.gem}`;

    const diffDisplay = document.getElementById('difficulty-display');
    diffDisplay.textContent = info.name;
    diffDisplay.className = `diff-${state.difficulty}`;

    const price = calculatePrice();
    document.getElementById('price-display').textContent = `$${price.toLocaleString()}`;

    // Update material button active states
    document.getElementById('btn-gold').classList.toggle('active', state.ringMaterial === 'gold');
    document.getElementById('btn-silver').classList.toggle('active', state.ringMaterial === 'silver');
    document.getElementById('btn-rosegold').classList.toggle('active', state.ringMaterial === 'rosegold');
}

// --- Event Listeners ---
document.getElementById('btn-add-gem').addEventListener('click', () => {
    if (state.gemCount < 8) {
        state.gemCount++;
        rebuildGems();
        updateUI();
    }
});

document.getElementById('btn-remove-gem').addEventListener('click', () => {
    if (state.gemCount > 1) {
        state.gemCount--;
        rebuildGems();
        updateUI();
    }
});

document.getElementById('btn-difficulty').addEventListener('click', () => {
    state.difficulty = (state.difficulty % 4) + 1;
    updateGemColors();
    updateUI();
});

document.getElementById('btn-gold').addEventListener('click', () => {
    state.ringMaterial = 'gold';
    ringMaterial.color.setHex(materialColors.gold);
    updateUI();
});

document.getElementById('btn-silver').addEventListener('click', () => {
    state.ringMaterial = 'silver';
    ringMaterial.color.setHex(materialColors.silver);
    updateUI();
});

document.getElementById('btn-rosegold').addEventListener('click', () => {
    state.ringMaterial = 'rosegold';
    ringMaterial.color.setHex(materialColors.rosegold);
    updateUI();
});

// --- Keyboard Controls ---
document.addEventListener('keydown', (e) => {
    if (e.key === 'r' || e.key === 'R') {
        state.autoRotate = !state.autoRotate;
    }
    if (e.key === ' ') {
        e.preventDefault();
        camera.position.copy(initialCameraPos);
        controls.target.set(0, 0, 0);
        controls.update();
    }
});

// --- Window Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const elapsed = clock.getElapsedTime();

    // Auto-rotate ring
    if (state.autoRotate) {
        ringGroup.rotation.y += 0.005;
    }
    state.ringRotationY = ringGroup.rotation.y;

    // Diamond sparkle animation (difficulty 4)
    if (state.difficulty === 4) {
        state.gemsArray.forEach((gem, i) => {
            const sparkle = Math.sin(elapsed * 5 + i * 1.5) * 0.5 + 0.5;
            gem.material.emissive = new THREE.Color(sparkle * 0.3, sparkle * 0.3, sparkle * 0.4);
            gem.material.emissiveIntensity = sparkle;
            // Slight scale pulse
            const s = 1 + Math.sin(elapsed * 3 + i) * 0.05;
            gem.scale.set(s, s, s);
        });
    }

    // Gentle gem rotation
    state.gemsArray.forEach((gem, i) => {
        gem.rotation.y = elapsed * 2 + i;
        gem.rotation.x = Math.sin(elapsed + i) * 0.3;
    });

    // Update state
    state.cameraDistance = camera.position.distanceTo(controls.target);

    controls.update();
    renderer.render(scene, camera);
}

// Initialize UI
updateUI();
animate();

</script>
</body>
</html>
