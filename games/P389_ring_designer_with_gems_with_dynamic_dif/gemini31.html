<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ring Designer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #2a2a35 0%, #000000 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 25, 0.85);
            color: #eee;
            padding: 20px;
            border-radius: 12px;
            width: 280px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        button {
            background: #3a3a45;
            color: white;
            border: 1px solid #555;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        button:hover {
            background: #4a4a55;
            border-color: #777;
        }
        button:active {
            transform: scale(0.95);
        }
        .mat-btns {
            display: flex;
            gap: 5px;
            width: 100%;
        }
        .mat-btns button {
            flex: 1;
            padding: 8px 0;
            font-weight: bold;
        }
        #btn-gold { color: #ffd700; }
        #btn-silver { color: #c0c0c0; }
        #btn-rosegold { color: #b76e79; }
        
        .info-text {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 15px;
            line-height: 1.4;
        }
        .price-tag {
            font-size: 1.4rem;
            font-weight: bold;
            color: #4caf50;
            text-align: right;
            margin-top: 10px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="control-panel">
        <h2>Ring Designer</h2>
        
        <div class="control-group">
            <div class="row">
                <span>Gems: <span id="gem-count">1</span>/8</span>
                <div>
                    <button id="btn-remove-gem">-</button>
                    <button id="btn-add-gem">+</button>
                </div>
            </div>
        </div>

        <div class="control-group">
            <div class="row">
                <span>Style: <span id="difficulty-display">Easy (Ruby)</span></span>
                <button id="btn-difficulty">Upgrade</button>
            </div>
        </div>

        <div class="control-group">
            <div style="margin-bottom: 8px;">Band Material:</div>
            <div class="mat-btns">
                <button id="btn-gold">Gold</button>
                <button id="btn-silver">Silver</button>
                <button id="btn-rosegold">Rose</button>
            </div>
        </div>

        <div class="price-tag" id="price-display">$600</div>

        <div class="info-text">
            Controls:<br>
            Left Click: Rotate<br>
            Scroll: Zoom<br>
            'R': Toggle Auto-Rotate<br>
            'Space': Reset Camera
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            gemCount: 1,
            difficulty: 1,
            ringMaterial: 'gold',
            price: 600,
            autoRotate: true,
            ringRotationY: 0,
            soldierLoaded: false,
            cameraDistance: 5,
            gemsArray: []
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minPolarAngle = 0.3;
        controls.maxPolarAngle = 1.5;
        controls.minDistance = 2;
        controls.maxDistance = 10;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const warmLight = new THREE.DirectionalLight(0xffd700, 1.0);
        warmLight.position.set(5, 5, 5);
        scene.add(warmLight);

        const coolLight = new THREE.DirectionalLight(0x4488ff, 0.5);
        coolLight.position.set(-3, 3, -3);
        scene.add(coolLight);

        // --- Objects ---
        const ringGroup = new THREE.Group();
        scene.add(ringGroup);

        // Ring Band
        const torusGeo = new THREE.TorusGeometry(1, 0.15, 32, 64);
        const ringMat = new THREE.MeshStandardMaterial({
            color: 0xffd700,
            metalness: 0.9,
            roughness: 0.1
        });
        const ringMesh = new THREE.Mesh(torusGeo, ringMat);
        ringMesh.rotation.x = -Math.PI / 2; // Lay flat
        ringGroup.add(ringMesh);

        // Gems
        const gemGeo = new THREE.IcosahedronGeometry(0.12, 1);
        
        function updateGems() {
            // Remove old gems
            window.__3D_STATE__.gemsArray.forEach(gem => ringGroup.remove(gem));
            window.__3D_STATE__.gemsArray = [];

            const count = window.__3D_STATE__.gemCount;
            const diff = window.__3D_STATE__.difficulty;
            const angleStep = (Math.PI * 2) / count;

            let matProps = {
                transmission: 0.8,
                roughness: 0.05,
                metalness: 0.1,
                ior: 2.4,
                thickness: 0.5
            };

            if (diff === 1) { matProps.color = 0xff0000; } // Ruby
            else if (diff === 2) { matProps.color = 0x0044ff; } // Sapphire
            else if (diff === 3) { 
                matProps.color = 0x00ff44; 
                matProps.emissive = new THREE.Color(0x003300); 
            } // Emerald
            else if (diff === 4) { 
                matProps.color = 0xffffff; 
                matProps.transmission = 0.98; 
                matProps.roughness = 0.0; 
                matProps.ior = 2.6; 
            } // Diamond

            const gemMat = new THREE.MeshPhysicalMaterial(matProps);

            for (let i = 0; i < count; i++) {
                const angle = i * angleStep;
                const gem = new THREE.Mesh(gemGeo, gemMat);
                
                // Position on top of the lying ring band
                gem.position.set(
                    Math.cos(angle) * 1,
                    0.15, 
                    Math.sin(angle) * 1
                );
                
                // Random initial rotation for better facet catching
                gem.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);

                ringGroup.add(gem);
                window.__3D_STATE__.gemsArray.push(gem);
            }
        }

        // Soldier Model
        const loader = new GLTFLoader();
        loader.load(
            'https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/models/gltf/Soldier.glb',
            function (gltf) {
                const soldier = gltf.scene;
                soldier.scale.set(0.01, 0.01, 0.01);
                soldier.position.set(2.5, -1, 0);
                
                // Adjust materials for better look in this lighting
                soldier.traverse((child) => {
                    if (child.isMesh) {
                        child.material.roughness = 0.8;
                        child.material.metalness = 0.1;
                    }
                });

                scene.add(soldier);
                window.__3D_STATE__.soldierLoaded = true;
            },
            undefined,
            function (error) {
                console.error('Error loading soldier model:', error);
            }
        );

        // --- Logic & UI ---
        function calculatePrice() {
            const state = window.__3D_STATE__;
            let base = 500;
            if (state.ringMaterial === 'silver') base = 300;
            if (state.ringMaterial === 'rosegold') base = 450;

            let gemP = 100;
            if (state.difficulty === 2) gemP = 250;
            if (state.difficulty === 3) gemP = 400;
            if (state.difficulty === 4) gemP = 800;

            return base + (state.gemCount * gemP);
        }

        function updateUI() {
            const state = window.__3D_STATE__;
            document.getElementById('gem-count').innerText = state.gemCount;
            
            const diffTexts = ['Easy (Ruby)', 'Medium (Sapphire)', 'Hard (Emerald)', 'Expert (Diamond)'];
            document.getElementById('difficulty-display').innerText = diffTexts[state.difficulty - 1];
            
            state.price = calculatePrice();
            document.getElementById('price-display').innerText = '$' + state.price;
        }

        // Event Listeners
        document.getElementById('btn-add-gem').addEventListener('click', () => {
            if (window.__3D_STATE__.gemCount < 8) {
                window.__3D_STATE__.gemCount++;
                updateGems();
                updateUI();
            }
        });

        document.getElementById('btn-remove-gem').addEventListener('click', () => {
            if (window.__3D_STATE__.gemCount > 1) {
                window.__3D_STATE__.gemCount--;
                updateGems();
                updateUI();
            }
        });

        document.getElementById('btn-difficulty').addEventListener('click', () => {
            window.__3D_STATE__.difficulty = (window.__3D_STATE__.difficulty % 4) + 1;
            updateGems();
            updateUI();
        });

        document.getElementById('btn-gold').addEventListener('click', () => {
            ringMat.color.setHex(0xffd700);
            window.__3D_STATE__.ringMaterial = 'gold';
            updateUI();
        });

        document.getElementById('btn-silver').addEventListener('click', () => {
            ringMat.color.setHex(0xc0c0c0);
            window.__3D_STATE__.ringMaterial = 'silver';
            updateUI();
        });

        document.getElementById('btn-rosegold').addEventListener('click', () => {
            ringMat.color.setHex(0xb76e79);
            window.__3D_STATE__.ringMaterial = 'rosegold';
            updateUI();
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') {
                window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
            }
            if (e.code === 'Space') {
                camera.position.set(0, 2, 5);
                controls.target.set(0, 0, 0);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize
        updateGems();
        updateUI();

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const state = window.__3D_STATE__;

            if (state.autoRotate) {
                ringGroup.rotation.y += 0.005;
            }

            // Sparkle animation for Expert difficulty
            if (state.difficulty === 4) {
                state.gemsArray.forEach(gem => {
                    gem.rotation.x += 0.02;
                    gem.rotation.y += 0.03;
                });
            }

            controls.update();

            // Update state object
            state.ringRotationY = ringGroup.rotation.y;
            state.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
