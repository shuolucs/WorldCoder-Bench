<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Magnetic Dipoles Field Lines</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }
    canvas { display: block; }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 10px 12px;
      background: rgba(0,0,0,0.45);
      color: white;
      font-size: 14px;
      line-height: 1.5;
      border-radius: 8px;
      pointer-events: none;
      min-width: 210px;
    }

    #instructions {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      padding: 8px 14px;
      background: rgba(0,0,0,0.45);
      color: white;
      font-size: 14px;
      border-radius: 8px;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="hudDipoles">Dipoles: 0</div>
    <div id="hudSelected">Selected: none</div>
    <div id="hudFieldLines">Field Lines: 0</div>
    <div id="hudUndo">Undo Stack: 0</div>
    <div id="hudRedo">Redo Stack: 0</div>
  </div>

  <div id="instructions">
    Click grid to place dipole | Click dipole to select | R: rotate | Del: remove | Ctrl+Z/Y: undo/redo
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    let scene, camera, renderer, controls;
    let raycaster, mouse;
    let gridHelper, gridPlane;
    let dipoleGroup, fieldLineGroup;
    let ambientLight, directionalLight;

    const dipoles = [];
    let selectedDipoleId = null;
    let nextDipoleId = 1;

    const undoStack = [];
    const redoStack = [];
    let lastAction = 'none';

    const MOMENT_DIRECTIONS = [
      new THREE.Vector3(0, 1, 0),  // +Y
      new THREE.Vector3(1, 0, 0),  // +X
      new THREE.Vector3(0, -1, 0), // -Y
      new THREE.Vector3(-1, 0, 0), // -X
      new THREE.Vector3(0, 0, 1),  // +Z
      new THREE.Vector3(0, 0, -1)  // -Z
    ];

    const hudDipoles = document.getElementById('hudDipoles');
    const hudSelected = document.getElementById('hudSelected');
    const hudFieldLines = document.getElementById('hudFieldLines');
    const hudUndo = document.getElementById('hudUndo');
    const hudRedo = document.getElementById('hudRedo');

    window.__3D_STATE__ = {
      dipoleCount: 0,
      selectedDipoleIndex: -1,
      fieldLineCount: 0,
      undoStackSize: 0,
      redoStackSize: 0,
      lastAction: 'none',
      dipoles: [],
      cameraDistance: 0,
      totalFieldPoints: 0,
      sceneReady: false
    };

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color('#1a1a2e');

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 8, 12);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 0, 0);
      controls.enableDamping = true;

      ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambientLight);

      directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(5, 10, 5);
      scene.add(directionalLight);

      gridHelper = new THREE.GridHelper(20, 20, 0x888888, 0x555555);
      gridHelper.material.transparent = true;
      gridHelper.material.opacity = 0.45;
      scene.add(gridHelper);

      gridPlane = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 20),
        new THREE.MeshBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 0,
          side: THREE.DoubleSide
        })
      );
      gridPlane.rotation.x = -Math.PI / 2;
      gridPlane.position.y = 0;
      scene.add(gridPlane);

      dipoleGroup = new THREE.Group();
      scene.add(dipoleGroup);

      fieldLineGroup = new THREE.Group();
      scene.add(fieldLineGroup);

      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();

      renderer.domElement.addEventListener('pointerdown', onPointerDown);
      window.addEventListener('keydown', onKeyDown);
      window.addEventListener('resize', onResize);

      updateAll();
      window.__3D_STATE__.sceneReady = true;
      updateState();
    }

    function createDipoleMesh() {
      const group = new THREE.Group();

      const cylGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.3, 24);
      const topMat = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0x000000 });
      const bottomMat = new THREE.MeshStandardMaterial({ color: 0x3366ff, emissive: 0x000000 });

      const top = new THREE.Mesh(cylGeo, topMat);
      top.position.y = 0.15;
      group.add(top);

      const bottom = new THREE.Mesh(cylGeo, bottomMat);
      bottom.position.y = -0.15;
      group.add(bottom);

      const outlineGeo = new THREE.CylinderGeometry(0.31, 0.31, 0.62, 24);
      const outline = new THREE.Mesh(
        outlineGeo,
        new THREE.MeshBasicMaterial({ color: 0x111111, wireframe: true, transparent: true, opacity: 0.25 })
      );
      group.add(outline);

      group.userData.top = top;
      group.userData.bottom = bottom;

      return group;
    }

    function setDipoleVisualRotation(dipole) {
      const dir = dipole.moment.clone().normalize();
      const base = new THREE.Vector3(0, 1, 0);
      const q = new THREE.Quaternion().setFromUnitVectors(base, dir);
      dipole.mesh.quaternion.copy(q);
    }

    function addDipole(data, pushHistory = true) {
      const dipole = {
        id: data.id ?? nextDipoleId++,
        position: new THREE.Vector3(data.x, data.y ?? 0.3, data.z),
        moment: new THREE.Vector3(data.momentX ?? 0, data.momentY ?? 1, data.momentZ ?? 0).normalize(),
        mesh: createDipoleMesh()
      };

      if (dipole.id >= nextDipoleId) nextDipoleId = dipole.id + 1;

      dipole.mesh.position.copy(dipole.position);
      dipole.mesh.userData.dipoleId = dipole.id;
      setDipoleVisualRotation(dipole);

      dipoles.push(dipole);
      dipoleGroup.add(dipole.mesh);

      if (pushHistory) {
        undoStack.push({
          type: 'place',
          dipole: serializeDipole(dipole)
        });
        redoStack.length = 0;
        lastAction = 'place';
      }

      updateAll();
      return dipole;
    }

    function removeDipoleById(id, pushHistory = true) {
      const index = dipoles.findIndex(d => d.id === id);
      if (index === -1) return false;

      const dipole = dipoles[index];
      const snapshot = serializeDipole(dipole);

      if (selectedDipoleId === id) selectedDipoleId = null;

      dipoleGroup.remove(dipole.mesh);
      disposeObject(dipole.mesh);
      dipoles.splice(index, 1);

      if (pushHistory) {
        undoStack.push({
          type: 'remove',
          dipole: snapshot,
          index
        });
        redoStack.length = 0;
        lastAction = 'remove';
      }

      updateAll();
      return true;
    }

    function rotateDipoleById(id, pushHistory = true, targetMoment = null) {
      const dipole = dipoles.find(d => d.id === id);
      if (!dipole) return false;

      const before = dipole.moment.clone();
      let after;

      if (targetMoment) {
        after = targetMoment.clone().normalize();
      } else {
        const currentIndex = findMomentIndex(dipole.moment);
        const nextIndex = (currentIndex + 1) % MOMENT_DIRECTIONS.length;
        after = MOMENT_DIRECTIONS[nextIndex].clone();
      }

      dipole.moment.copy(after);
      setDipoleVisualRotation(dipole);

      if (pushHistory) {
        undoStack.push({
          type: 'rotate',
          dipoleId: id,
          before: before.clone(),
          after: after.clone()
        });
        redoStack.length = 0;
        lastAction = 'rotate';
      }

      updateAll();
      return true;
    }

    function findMomentIndex(moment) {
      for (let i = 0; i < MOMENT_DIRECTIONS.length; i++) {
        if (moment.distanceTo(MOMENT_DIRECTIONS[i]) < 1e-6) return i;
      }
      return 0;
    }

    function serializeDipole(d) {
      return {
        id: d.id,
        x: d.position.x,
        y: d.position.y,
        z: d.position.z,
        momentX: d.moment.x,
        momentY: d.moment.y,
        momentZ: d.moment.z
      };
    }

    function setSelectedDipole(idOrNull) {
      selectedDipoleId = idOrNull;
      for (const d of dipoles) {
        const selected = d.id === selectedDipoleId;
        d.mesh.userData.top.material.emissive.setHex(selected ? 0x666600 : 0x000000);
        d.mesh.userData.bottom.material.emissive.setHex(selected ? 0x666600 : 0x000000);
      }
      lastAction = selectedDipoleId == null ? 'deselect' : 'select';
      updateState();
      updateHUD();
    }

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const dipoleMeshes = dipoles.map(d => d.mesh);
      const dipoleHits = raycaster.intersectObjects(dipoleMeshes, true);

      if (dipoleHits.length > 0) {
        let obj = dipoleHits[0].object;
        while (obj && obj.parent && obj.parent !== dipoleGroup) obj = obj.parent;
        if (obj && obj.userData.dipoleId != null) {
          setSelectedDipole(obj.userData.dipoleId);
          return;
        }
      }

      const hits = raycaster.intersectObject(gridPlane);
      if (hits.length > 0) {
        const p = hits[0].point;
        const x = Math.round(p.x);
        const z = Math.round(p.z);

        const existing = dipoles.find(d => Math.round(d.position.x) === x && Math.round(d.position.z) === z);
        if (existing) {
          setSelectedDipole(existing.id);
          return;
        }

        addDipole({
          x,
          y: 0.3,
          z,
          momentX: 0,
          momentY: 1,
          momentZ: 0
        }, true);
        setSelectedDipole(null);
        return;
      }

      setSelectedDipole(null);
    }

    function onKeyDown(event) {
      if (event.ctrlKey && (event.key === 'z' || event.key === 'Z')) {
        event.preventDefault();
        undo();
        return;
      }

      if (event.ctrlKey && (event.key === 'y' || event.key === 'Y')) {
        event.preventDefault();
        redo();
        return;
      }

      if ((event.key === 'Delete' || event.key === 'Backspace') && selectedDipoleId != null) {
        event.preventDefault();
        removeDipoleById(selectedDipoleId, true);
        return;
      }

      if ((event.key === 'r' || event.key === 'R') && selectedDipoleId != null) {
        event.preventDefault();
        rotateDipoleById(selectedDipoleId, true);
        return;
      }
    }

    function undo() {
      if (undoStack.length === 0) return;
      const action = undoStack.pop();

      if (action.type === 'place') {
        removeDipoleById(action.dipole.id, false);
      } else if (action.type === 'remove') {
        addDipole(action.dipole, false);
      } else if (action.type === 'rotate') {
        rotateDipoleById(action.dipoleId, false, action.before);
      }

      redoStack.push(action);
      lastAction = 'undo';
      updateAll();
    }

    function redo() {
      if (redoStack.length === 0) return;
      const action = redoStack.pop();

      if (action.type === 'place') {
        addDipole(action.dipole, false);
      } else if (action.type === 'remove') {
        removeDipoleById(action.dipole.id, false);
      } else if (action.type === 'rotate') {
        rotateDipoleById(action.dipoleId, false, action.after);
      }

      undoStack.push(action);
      lastAction = 'redo';
      updateAll();
    }

    function computeMagneticField(point) {
      const B = new THREE.Vector3();

      for (const d of dipoles) {
        const r = point.clone().sub(d.position);
        const rMag = r.length();
        if (rMag < 0.15) continue;

        const rHat = r.clone().divideScalar(rMag);
        const m = d.moment;
        const mDotR = m.dot(rHat);

        const term = rHat.clone().multiplyScalar(3 * mDotR).sub(m).divideScalar(Math.pow(rMag, 3));
        B.add(term);
      }

      return B;
    }

    function rk4Step(point, h, sign = 1) {
      const dir = (p) => {
        const B = computeMagneticField(p);
        const mag = B.length();
        if (mag < 1e-12) return new THREE.Vector3();
        return B.normalize().multiplyScalar(sign);
      };

      const k1 = dir(point);
      const k2 = dir(point.clone().add(k1.clone().multiplyScalar(h * 0.5)));
      const k3 = dir(point.clone().add(k2.clone().multiplyScalar(h * 0.5)));
      const k4 = dir(point.clone().add(k3.clone().multiplyScalar(h)));

      return point.clone().add(
        k1.clone().add(k2.clone().multiplyScalar(2)).add(k3.clone().multiplyScalar(2)).add(k4).multiplyScalar(h / 6)
      );
    }

    function perpendicularBasis(n) {
      const ref = Math.abs(n.y) < 0.9 ? new THREE.Vector3(0, 1, 0) : new THREE.Vector3(1, 0, 0);
      const u = new THREE.Vector3().crossVectors(n, ref).normalize();
      const v = new THREE.Vector3().crossVectors(n, u).normalize();
      return { u, v };
    }

    function colorFromT(t) {
      const c1 = new THREE.Color(0x3366ff);
      const c2 = new THREE.Color(0xff3333);
      return c1.lerp(c2, t);
    }

    function traceFieldLine(sourceDipole, seedPoint, sign) {
      const points = [];
      const colors = [];
      let current = seedPoint.clone();
      const stepSize = 0.15;

      for (let i = 0; i < 200; i++) {
        const B = computeMagneticField(current);
        const mag = B.length();
        if (mag < 0.001) break;
        if (current.length() > 15) break;

        let nearAny = false;
        for (const d of dipoles) {
          if (current.distanceTo(d.position) < 0.3) {
            nearAny = true;
            break;
          }
        }
        if (nearAny && i > 2) break;

        points.push(current.clone());

        const alignment = B.clone().normalize().dot(sourceDipole.moment);
        const t = (alignment + 1) * 0.5;
        const color = colorFromT(t);
        colors.push(color.r, color.g, color.b);

        const next = rk4Step(current, stepSize, sign);
        if (next.distanceTo(current) < 1e-6) break;
        current = next;
      }

      return { points, colors };
    }

    function rebuildFieldLines() {
      while (fieldLineGroup.children.length > 0) {
        const obj = fieldLineGroup.children.pop();
        disposeObject(obj);
      }

      let totalLines = 0;
      let totalPoints = 0;

      for (const d of dipoles) {
        const n = d.moment.clone().normalize();
        const { u, v } = perpendicularBasis(n);

        for (let i = 0; i < 8; i++) {
          const angle = (i / 8) * Math.PI * 2;
          const offset = u.clone().multiplyScalar(Math.cos(angle) * 0.5)
            .add(v.clone().multiplyScalar(Math.sin(angle) * 0.5));

          const northStart = d.position.clone().add(n.clone().multiplyScalar(0.31)).add(offset);
          const southStart = d.position.clone().add(n.clone().multiplyScalar(-0.31)).add(offset);

          const lineA = traceFieldLine(d, northStart, +1);
          if (lineA.points.length > 1) {
            const geo = new THREE.BufferGeometry().setFromPoints(lineA.points);
            geo.setAttribute('color', new THREE.Float32BufferAttribute(lineA.colors, 3));
            const mat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.9 });
            const line = new THREE.Line(geo, mat);
            fieldLineGroup.add(line);
            totalLines++;
            totalPoints += lineA.points.length;
          }

          const reversed = traceFieldLine(d, southStart, -1);
          if (reversed.points.length > 1) {
            const geo = new THREE.BufferGeometry().setFromPoints(reversed.points);
            geo.setAttribute('color', new THREE.Float32BufferAttribute(reversed.colors, 3));
            const mat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.9 });
            const line = new THREE.Line(geo, mat);
            fieldLineGroup.add(line);
            totalLines++;
            totalPoints += reversed.points.length;
          }
        }
      }

      window.__3D_STATE__.fieldLineCount = totalLines;
      window.__3D_STATE__.totalFieldPoints = totalPoints;
    }

    function disposeObject(obj) {
      obj.traverse?.((child) => {
        if (child.geometry) child.geometry.dispose?.();
        if (child.material) {
          if (Array.isArray(child.material)) child.material.forEach(m => m.dispose?.());
          else child.material.dispose?.();
        }
      });
    }

    function updateHUD() {
      const selectedIndex = getSelectedDipoleIndex();
      hudDipoles.textContent = `Dipoles: ${dipoles.length}`;
      hudSelected.textContent = `Selected: ${selectedIndex >= 0 ? `Dipole #${selectedIndex + 1}` : 'none'}`;
      hudFieldLines.textContent = `Field Lines: ${window.__3D_STATE__.fieldLineCount}`;
      hudUndo.textContent = `Undo Stack: ${undoStack.length}`;
      hudRedo.textContent = `Redo Stack: ${redoStack.length}`;
    }

    function getSelectedDipoleIndex() {
      if (selectedDipoleId == null) return -1;
      return dipoles.findIndex(d => d.id === selectedDipoleId);
    }

    function updateState() {
      window.__3D_STATE__.dipoleCount = dipoles.length;
      window.__3D_STATE__.selectedDipoleIndex = getSelectedDipoleIndex();
      window.__3D_STATE__.undoStackSize = undoStack.length;
      window.__3D_STATE__.redoStackSize = redoStack.length;
      window.__3D_STATE__.lastAction = lastAction;
      window.__3D_STATE__.dipoles = dipoles.map(d => ({
        x: d.position.x,
        y: d.position.y,
        z: d.position.z,
        momentX: d.moment.x,
        momentY: d.moment.y,
        momentZ: d.moment.z
      }));
      window.__3D_STATE__.cameraDistance = camera.position.length();
    }

    function updateAll() {
      rebuildFieldLines();
      updateState();
      updateHUD();
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      updateState();
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      window.__3D_STATE__.cameraDistance = camera.position.length();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
