<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Three.js Pendulum Wave with Difficulty Levels</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #111;
      font-family: monospace;
    }

    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      display: flex;
      gap: 8px;
    }

    button {
      background: rgba(30, 30, 30, 0.9);
      color: white;
      border: 1px solid #666;
      padding: 8px 12px;
      cursor: pointer;
      font: 16px monospace;
      border-radius: 4px;
    }

    button:hover {
      background: rgba(60, 60, 60, 0.95);
    }

    button.active {
      border-color: #ffd54a;
      box-shadow: 0 0 8px rgba(255, 213, 74, 0.5);
    }

    #hud {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 20;
      color: white;
      font: 16px monospace;
      background: rgba(0, 0, 0, 0.55);
      padding: 12px 14px;
      border-radius: 6px;
      min-width: 320px;
      line-height: 1.45;
      white-space: pre-line;
    }

    #help {
      position: fixed;
      bottom: 12px;
      left: 12px;
      z-index: 20;
      color: white;
      font: 14px monospace;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 12px;
      border-radius: 6px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="ui">
    <button id="easyBtn">Easy</button>
    <button id="mediumBtn">Medium</button>
    <button id="hardBtn">Hard</button>
  </div>

  <div id="hud"></div>

  <div id="help">
    Space: Pause/Resume<br>
    R: Reset<br>
    ↑ / ↓: Change θmax<br>
    G: Cycle gravity (Hard only)<br>
    Click bob: Select pendulum
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      200
    );
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 6, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 15, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.left = -30;
    dirLight.shadow.camera.right = 30;
    dirLight.shadow.camera.top = 30;
    dirLight.shadow.camera.bottom = -30;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 80;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(50, 50),
      new THREE.MeshStandardMaterial({ color: '#2a2a2a' })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    const frameMaterial = new THREE.MeshStandardMaterial({ color: '#888888' });

    const horizontalBar = new THREE.Mesh(
      new THREE.BoxGeometry(20, 0.35, 0.35),
      frameMaterial
    );
    horizontalBar.position.set(0, 12, 0);
    horizontalBar.castShadow = true;
    horizontalBar.receiveShadow = true;
    scene.add(horizontalBar);

    const leftPost = new THREE.Mesh(
      new THREE.BoxGeometry(0.4, 12, 0.4),
      frameMaterial
    );
    leftPost.position.set(-9.5, 6, 0);
    leftPost.castShadow = true;
    leftPost.receiveShadow = true;
    scene.add(leftPost);

    const rightPost = new THREE.Mesh(
      new THREE.BoxGeometry(0.4, 12, 0.4),
      frameMaterial
    );
    rightPost.position.set(9.5, 6, 0);
    rightPost.castShadow = true;
    rightPost.receiveShadow = true;
    scene.add(rightPost);

    let parrot = null;
    let parrotLoaded = false;
    const parrotBasePos = new THREE.Vector3(0, 13, 0);

    const gltfLoader = new GLTFLoader();
    gltfLoader.load(
      'https://threejs.org/examples/models/gltf/Parrot.glb',
      (gltf) => {
        parrot = gltf.scene;
        parrot.scale.setScalar(0.02);
        parrot.position.copy(parrotBasePos);
        parrot.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
        scene.add(parrot);
        parrotLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load Parrot.glb:', err);
      }
    );

    const pendulumGroup = new THREE.Group();
    scene.add(pendulumGroup);

    const hud = document.getElementById('hud');
    const easyBtn = document.getElementById('easyBtn');
    const mediumBtn = document.getElementById('mediumBtn');
    const hardBtn = document.getElementById('hardBtn');

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const gravityValues = [9.81, 4.9, 1.62];
    let gravityCycleIndex = 0;

    let difficulty = 1;
    let gravity = 9.81;
    let thetaMax = 0.5;
    let paused = false;
    let elapsedTime = 0;
    let dampingCoeff = 0;

    let pendulums = [];
    let selectedBobIndex = -1;
    let frameCount = 0;

    const clock = new THREE.Clock();

    function lerpColor(c1, c2, t) {
      return new THREE.Color(c1).lerp(new THREE.Color(c2), t);
    }

    function getDifficultyConfig(level) {
      if (level === 1) {
        return {
          name: 'Easy',
          count: 5,
          minLength: 4.0,
          maxLength: 6.0,
          damping: 0.0
        };
      }
      if (level === 2) {
        return {
          name: 'Medium',
          count: 10,
          minLength: 3.0,
          maxLength: 7.0,
          damping: 0.001
        };
      }
      return {
        name: 'Hard',
        count: 15,
        minLength: 2.5,
        maxLength: 8.0,
        damping: 0.005
      };
    }

    function clearPendulums() {
      while (pendulumGroup.children.length > 0) {
        const child = pendulumGroup.children[0];
        pendulumGroup.remove(child);
      }
      pendulums = [];
      selectedBobIndex = -1;
    }

    function createPendulums(level) {
      clearPendulums();

      const config = getDifficultyConfig(level);
      dampingCoeff = config.damping;

      const pivotY = 12;
      const xMin = -8.5;
      const xMax = 8.5;

      for (let i = 0; i < config.count; i++) {
        const t = config.count === 1 ? 0 : i / (config.count - 1);
        const length = THREE.MathUtils.lerp(config.minLength, config.maxLength, t);
        const x = THREE.MathUtils.lerp(xMin, xMax, t);

        const color = lerpColor('#ff0000', '#0000ff', t);

        const root = new THREE.Group();
        root.position.set(x, pivotY, 0);

        const stringMaterial = new THREE.MeshStandardMaterial({ color: 0xcccccc });
        const bobMaterial = new THREE.MeshStandardMaterial({
          color,
          emissive: 0x000000,
          emissiveIntensity: 0.8
        });

        const string = new THREE.Mesh(
          new THREE.CylinderGeometry(0.03, 0.03, length, 12),
          stringMaterial
        );
        string.position.set(0, -length / 2, 0);
        string.castShadow = true;
        string.receiveShadow = true;
        root.add(string);

        const bob = new THREE.Mesh(
          new THREE.SphereGeometry(0.3, 24, 24),
          bobMaterial
        );
        bob.position.set(0, -length, 0);
        bob.castShadow = true;
        bob.receiveShadow = true;
        bob.userData.pendulumIndex = i;
        root.add(bob);

        pendulumGroup.add(root);

        pendulums.push({
          index: i,
          length,
          root,
          string,
          bob,
          bobMaterial,
          baseColor: color.clone(),
          theta: thetaMax,
          omega0: Math.sqrt(gravity / length)
        });
      }
    }

    function setDifficulty(level) {
      difficulty = level;
      elapsedTime = 0;
      gravityCycleIndex = 0;
      gravity = gravityValues[gravityCycleIndex];
      createPendulums(level);
      updateButtonState();
    }

    function updateButtonState() {
      easyBtn.classList.toggle('active', difficulty === 1);
      mediumBtn.classList.toggle('active', difficulty === 2);
      hardBtn.classList.toggle('active', difficulty === 3);
    }

    function resetSimulation() {
      elapsedTime = 0;
    }

    function updateSelection(index) {
      selectedBobIndex = index;

      pendulums.forEach((p, i) => {
        if (i === selectedBobIndex) {
          p.bobMaterial.emissive.setHex(0xffff00);
          p.bobMaterial.emissiveIntensity = 1.2;
        } else {
          p.bobMaterial.emissive.setHex(0x000000);
          p.bobMaterial.emissiveIntensity = 0.8;
        }
      });
    }

    function updatePendulums(t) {
      for (const p of pendulums) {
        const omega = Math.sqrt(gravity / p.length);
        p.omega0 = omega;

        const dampingFactor = Math.exp(-dampingCoeff * t);
        const theta = thetaMax * Math.cos(omega * t) * dampingFactor;
        p.theta = theta;

        p.root.rotation.z = theta;
      }
    }

    function computeEnergySum(t) {
      let sum = 0;
      for (const p of pendulums) {
        const L = p.length;
        const w = Math.sqrt(gravity / L);
        const expTerm = Math.exp(-dampingCoeff * t);
        const theta = thetaMax * Math.cos(w * t) * expTerm;
        const thetaDot = thetaMax * expTerm * (-w * Math.sin(w * t) - dampingCoeff * Math.cos(w * t));

        const kinetic = 0.5 * 1 * L * L * thetaDot * thetaDot;
        const potential = 1 * gravity * L * (1 - Math.cos(theta));
        sum += kinetic + potential;
      }
      return sum;
    }

    function updateHUD() {
      const config = getDifficultyConfig(difficulty);
      let selectedText = 'Selected: none';

      if (selectedBobIndex >= 0 && pendulums[selectedBobIndex]) {
        const p = pendulums[selectedBobIndex];
        selectedText =
`Selected bob:
  Index: ${p.index}
  Length: ${p.length.toFixed(3)}
  Angle: ${(THREE.MathUtils.radToDeg(p.theta)).toFixed(2)}°
  Angular frequency: ${p.omega0.toFixed(3)}`;
      }

      hud.textContent =
`Difficulty: ${config.name}
Pendulums: ${pendulums.length}
Gravity: ${gravity.toFixed(2)}
θmax: ${thetaMax.toFixed(2)} rad
Elapsed: ${elapsedTime.toFixed(2)} s
Paused: ${paused ? 'Yes' : 'No'}

${selectedText}`;
    }

    function updateState() {
      window.__3D_STATE__ = {
        difficulty,
        numPendulums: pendulums.length,
        gravity,
        thetaMax,
        paused,
        elapsedTime,
        dampingCoeff,
        pendulumAngles: pendulums.map(p => p.theta),
        pendulumLengths: pendulums.map(p => p.length),
        selectedBobIndex,
        parrotLoaded,
        parrotY: parrot ? parrot.position.y : parrotBasePos.y,
        energySum: computeEnergySum(elapsedTime),
        gravityCycleIndex,
        frameCount
      };
    }

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const bobMeshes = pendulums.map(p => p.bob);
      const intersects = raycaster.intersectObjects(bobMeshes, false);

      if (intersects.length > 0) {
        const idx = intersects[0].object.userData.pendulumIndex;
        updateSelection(idx);
      } else {
        updateSelection(-1);
      }
    }

    function onKeyDown(event) {
      if (event.code === 'Space') {
        event.preventDefault();
        paused = !paused;
      } else if (event.key === 'r' || event.key === 'R') {
        resetSimulation();
      } else if (event.key === 'g' || event.key === 'G') {
        if (difficulty === 3) {
          gravityCycleIndex = (gravityCycleIndex + 1) % gravityValues.length;
          gravity = gravityValues[gravityCycleIndex];
        }
      } else if (event.key === 'ArrowUp') {
        thetaMax = Math.min(1.2, thetaMax + 0.1);
      } else if (event.key === 'ArrowDown') {
        thetaMax = Math.max(0.1, thetaMax - 0.1);
      }
    }

    easyBtn.addEventListener('click', () => setDifficulty(1));
    mediumBtn.addEventListener('click', () => setDifficulty(2));
    hardBtn.addEventListener('click', () => setDifficulty(3));

    renderer.domElement.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('keydown', onKeyDown);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    setDifficulty(1);

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const delta = clock.getDelta();
      if (!paused) {
        elapsedTime += delta;
      }

      updatePendulums(elapsedTime);

      if (parrot) {
        const bobOffset = Math.sin((elapsedTime / 2) * Math.PI * 2) * 0.3;
        parrot.position.set(parrotBasePos.x, parrotBasePos.y + bobOffset, parrotBasePos.z);
      }

      controls.update();
      updateHUD();
      updateState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
