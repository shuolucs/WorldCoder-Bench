<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DNA Double Helix Unzipper</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 14px;
      left: 14px;
      padding: 10px 14px;
      background: rgba(10, 10, 30, 0.72);
      border: 1px solid rgba(120, 140, 255, 0.35);
      border-radius: 10px;
      font-size: 14px;
      z-index: 10;
      user-select: none;
      box-shadow: 0 0 12px rgba(0,0,0,0.25);
    }

    #progressContainer {
      position: absolute;
      top: 62px;
      left: 14px;
      width: 420px;
      height: 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(120, 140, 255, 0.35);
      border-radius: 999px;
      overflow: hidden;
      z-index: 10;
    }

    #progressBar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #44aaff, #66ffcc, #ffee55);
      transition: width 0.2s ease;
    }

    #infoPanel {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      min-width: 420px;
      max-width: 70vw;
      padding: 12px 16px;
      text-align: center;
      background: rgba(10, 10, 30, 0.78);
      border: 1px solid rgba(120, 140, 255, 0.35);
      border-radius: 12px;
      z-index: 10;
      font-size: 15px;
      box-shadow: 0 0 16px rgba(0,0,0,0.25);
    }

    #debugOverlay {
      position: absolute;
      top: 14px;
      right: 14px;
      min-width: 260px;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(150, 200, 255, 0.45);
      border-radius: 10px;
      color: #dbe8ff;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-line;
      display: none;
      z-index: 10;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="hud">DNA Unzipper | Pairs Unzipped: 0/20 | Press UP/DOWN to unzip/zip | D for debug | R to reset</div>
  <div id="progressContainer"><div id="progressBar"></div></div>
  <div id="infoPanel">Press UP to begin unzipping the DNA double helix.</div>
  <div id="debugOverlay"></div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 10, 30);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    const warmLight = new THREE.DirectionalLight(0xffaa55, 1.0);
    warmLight.position.set(10, 15, 10);
    scene.add(warmLight);

    const coolLight = new THREE.DirectionalLight(0x55aaff, 0.9);
    coolLight.position.set(-10, -8, -10);
    scene.add(coolLight);

    const grid = new THREE.GridHelper(50, 50, 0x222244, 0x222244);
    grid.position.y = -13;
    grid.material.transparent = true;
    grid.material.opacity = 0.35;
    scene.add(grid);

    const hud = document.getElementById('hud');
    const infoPanel = document.getElementById('infoPanel');
    const progressBar = document.getElementById('progressBar');
    const debugOverlay = document.getElementById('debugOverlay');

    const TOTAL_PAIRS = 20;
    const HELIX_RADIUS = 2.0;
    const TWIST_RATE = Math.PI / 5;
    const Y_MIN = -12;
    const Y_MAX = 12;
    const Y_STEP = (Y_MAX - Y_MIN) / (TOTAL_PAIRS - 1);
    const OUTWARD_OFFSET = 3.0;
    const SPRING_K = 50;
    const DAMPING_PER_FRAME = 0.9;

    let unzipLevel = 0;
    let debugOverlayVisible = false;
    let cameraFollowEnabled = false;
    let resetCount = 0;

    let foxLoaded = false;
    let foxModel = null;
    let foxMixer = null;

    const clock = new THREE.Clock();

    const dnaGroup = new THREE.Group();
    scene.add(dnaGroup);

    const sphereGeo = new THREE.SphereGeometry(0.3, 20, 20);
    const bondGeo = new THREE.CylinderGeometry(0.05, 0.05, 1, 10);
    const backboneGeo = new THREE.CylinderGeometry(0.08, 0.08, 1, 10);

    const materials = {
      adenine: new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.35, metalness: 0.1 }),
      thymine: new THREE.MeshStandardMaterial({ color: 0x4444ff, roughness: 0.35, metalness: 0.1 }),
      guanine: new THREE.MeshStandardMaterial({ color: 0x44ff44, roughness: 0.35, metalness: 0.1 }),
      cytosine: new THREE.MeshStandardMaterial({ color: 0xffff44, roughness: 0.35, metalness: 0.1 }),
      bond: new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2, metalness: 0.1 }),
      backbone: new THREE.MeshStandardMaterial({ color: 0x6688cc, roughness: 0.4, metalness: 0.15 })
    };

    const basePairs = [];

    function cylinderBetween(start, end, geometry, material) {
      const dir = new THREE.Vector3().subVectors(end, start);
      const len = dir.length();
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(start).add(end).multiplyScalar(0.5);
      mesh.scale.set(1, len, 1);
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
      return mesh;
    }

    function updateCylinder(mesh, start, end) {
      const dir = new THREE.Vector3().subVectors(end, start);
      const len = Math.max(dir.length(), 0.0001);
      mesh.position.copy(start).add(end).multiplyScalar(0.5);
      mesh.scale.set(1, len, 1);
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
    }

    for (let i = 0; i < TOTAL_PAIRS; i++) {
      const y = Y_MIN + i * Y_STEP;
      const angle = i * TWIST_RATE;

      const x1 = Math.cos(angle) * HELIX_RADIUS;
      const z1 = Math.sin(angle) * HELIX_RADIUS;

      const x2 = Math.cos(angle + Math.PI) * HELIX_RADIUS;
      const z2 = Math.sin(angle + Math.PI) * HELIX_RADIUS;

      const leftType = (i % 2 === 0) ? 'A' : 'T';
      const rightType = (i % 2 === 0) ? 'G' : 'C';

      const leftMat = (i % 2 === 0) ? materials.adenine : materials.thymine;
      const rightMat = (i % 2 === 0) ? materials.guanine : materials.cytosine;

      const leftSphere = new THREE.Mesh(sphereGeo, leftMat);
      const rightSphere = new THREE.Mesh(sphereGeo, rightMat);

      leftSphere.position.set(x1, y, z1);
      rightSphere.position.set(x2, y, z2);

      dnaGroup.add(leftSphere, rightSphere);

      const bond = cylinderBetween(leftSphere.position, rightSphere.position, bondGeo, materials.bond);
      dnaGroup.add(bond);

      basePairs.push({
        index: i,
        y,
        angle,
        leftType,
        rightType,
        leftSphere,
        rightSphere,
        bond,
        zippedLeft: new THREE.Vector3(x1, y, z1),
        zippedRight: new THREE.Vector3(x2, y, z2),
        restLeft: new THREE.Vector3(x1 - OUTWARD_OFFSET, y, z1),
        restRight: new THREE.Vector3(x2 + OUTWARD_OFFSET, y, z2),
        leftVel: new THREE.Vector3(),
        rightVel: new THREE.Vector3(),
        leftAnimating: false,
        rightAnimating: false
      });
    }

    for (let i = 0; i < TOTAL_PAIRS - 1; i++) {
      const a = basePairs[i];
      const b = basePairs[i + 1];

      a.leftBackbone = cylinderBetween(a.leftSphere.position, b.leftSphere.position, backboneGeo, materials.backbone);
      a.rightBackbone = cylinderBetween(a.rightSphere.position, b.rightSphere.position, backboneGeo, materials.backbone);

      dnaGroup.add(a.leftBackbone, a.rightBackbone);
    }

    function updateBackbones() {
      for (let i = 0; i < TOTAL_PAIRS - 1; i++) {
        const a = basePairs[i];
        const b = basePairs[i + 1];
        updateCylinder(a.leftBackbone, a.leftSphere.position, b.leftSphere.position);
        updateCylinder(a.rightBackbone, a.rightSphere.position, b.rightSphere.position);
      }
    }

    function setPairUnzipped(pair, unzipped) {
      pair.leftAnimating = true;
      pair.rightAnimating = true;

      if (unzipped) {
        if (pair.bond.parent) dnaGroup.remove(pair.bond);
      } else {
        if (!pair.bond.parent) dnaGroup.add(pair.bond);
      }
    }

    function applyUnzipLevel(newLevel) {
      const clamped = Math.max(0, Math.min(TOTAL_PAIRS, newLevel));

      if (clamped > unzipLevel) {
        for (let i = unzipLevel; i < clamped; i++) {
          setPairUnzipped(basePairs[i], true);
          showPairInfo(i, true);
        }
      } else if (clamped < unzipLevel) {
        for (let i = unzipLevel - 1; i >= clamped; i--) {
          setPairUnzipped(basePairs[i], false);
          showPairInfo(i, false);
        }
      }

      unzipLevel = clamped;
      updateHUD();
    }

    function resetDNA() {
      applyUnzipLevel(0);
      for (const pair of basePairs) {
        pair.leftSphere.position.copy(pair.zippedLeft);
        pair.rightSphere.position.copy(pair.zippedRight);
        pair.leftVel.set(0, 0, 0);
        pair.rightVel.set(0, 0, 0);
        pair.leftAnimating = false;
        pair.rightAnimating = false;
        if (!pair.bond.parent) dnaGroup.add(pair.bond);
        updateCylinder(pair.bond, pair.leftSphere.position, pair.rightSphere.position);
      }
      updateBackbones();
      resetCount++;
      infoPanel.textContent = 'DNA reset to fully zipped state.';
      updateHUD();
    }

    function showPairInfo(pairIndex, broken) {
      const pair = basePairs[pairIndex];
      const isEven = pairIndex % 2 === 0;
      if (broken) {
        infoPanel.textContent = isEven
          ? 'Adenine-Thymine bond broken - 2 hydrogen bonds'
          : 'Guanine-Cytosine bond broken - 3 hydrogen bonds';
      } else {
        infoPanel.textContent = isEven
          ? 'Adenine-Thymine pair re-formed.'
          : 'Guanine-Cytosine pair re-formed.';
      }
    }

    function updateHUD() {
      hud.textContent = `DNA Unzipper | Pairs Unzipped: ${unzipLevel}/20 | Press UP/DOWN to unzip/zip | D for debug | R to reset`;
      progressBar.style.width = `${(unzipLevel / TOTAL_PAIRS) * 100}%`;
      if (unzipLevel === 0) {
        if (!infoPanel.textContent.includes('reset')) {
          infoPanel.textContent = 'Press UP to begin unzipping the DNA double helix.';
        }
      }
    }

    updateHUD();

    const loader = new GLTFLoader();
    loader.load(
      'Fox.glb',
      (gltf) => {
        foxModel = gltf.scene;
        foxModel.position.set(8, 0, 5);
        foxModel.scale.set(0.05, 0.05, 0.05);
        scene.add(foxModel);

        if (gltf.animations && gltf.animations.length > 0) {
          foxMixer = new THREE.AnimationMixer(foxModel);
          const action = foxMixer.clipAction(gltf.animations[0]);
          action.play();
        }

        foxLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Could not load Fox.glb:', err);
      }
    );

    document.addEventListener('keydown', (e) => {
      if (e.code === 'ArrowUp') {
        applyUnzipLevel(unzipLevel + 1);
      } else if (e.code === 'ArrowDown') {
        applyUnzipLevel(unzipLevel - 1);
      } else if (e.code === 'KeyR') {
        resetDNA();
      } else if (e.code === 'KeyD') {
        debugOverlayVisible = !debugOverlayVisible;
        debugOverlay.style.display = debugOverlayVisible ? 'block' : 'none';
      } else if (e.code === 'KeyC') {
        cameraFollowEnabled = !cameraFollowEnabled;
      }
    });

    const fpsState = {
      accum: 0,
      frames: 0,
      fps: 0
    };

    window.__3D_STATE__ = {
      unzipLevel: 0,
      totalBasePairs: TOTAL_PAIRS,
      debugOverlayVisible: false,
      cameraFollowEnabled: false,
      foxLoaded: false,
      foxPosition: { x: 0, y: 0, z: 0 },
      activePhysicsBodies: 0,
      totalSpringEnergy: 0,
      avgVelocity: 0,
      cameraPosition: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
      fps: 0,
      helixRadius: HELIX_RADIUS,
      pairsZipped: TOTAL_PAIRS,
      resetCount: 0,
      progressPercent: 0
    };

    function updatePhysics(dt) {
      const damping = Math.pow(DAMPING_PER_FRAME, dt * 60);
      let totalSpringEnergy = 0;
      let totalVelMag = 0;
      let activeBodies = 0;

      for (let i = 0; i < TOTAL_PAIRS; i++) {
        const pair = basePairs[i];
        const isUnzipped = i < unzipLevel;

        const leftTarget = isUnzipped ? pair.restLeft : pair.zippedLeft;
        const rightTarget = isUnzipped ? pair.restRight : pair.zippedRight;

        const leftDisp = new THREE.Vector3().subVectors(pair.leftSphere.position, leftTarget);
        const leftAccel = leftDisp.clone().multiplyScalar(-SPRING_K);
        pair.leftVel.addScaledVector(leftAccel, dt);
        pair.leftVel.multiplyScalar(damping);
        pair.leftSphere.position.addScaledVector(pair.leftVel, dt);

        const rightDisp = new THREE.Vector3().subVectors(pair.rightSphere.position, rightTarget);
        const rightAccel = rightDisp.clone().multiplyScalar(-SPRING_K);
        pair.rightVel.addScaledVector(rightAccel, dt);
        pair.rightVel.multiplyScalar(damping);
        pair.rightSphere.position.addScaledVector(pair.rightVel, dt);

        if (isUnzipped) {
          totalSpringEnergy += 0.5 * SPRING_K * leftDisp.lengthSq();
          totalSpringEnergy += 0.5 * SPRING_K * rightDisp.lengthSq();
          totalVelMag += pair.leftVel.length() + pair.rightVel.length();
          activeBodies += 2;
        }

        if (!isUnzipped && pair.leftSphere.position.distanceToSquared(pair.zippedLeft) < 0.0004) {
          pair.leftSphere.position.copy(pair.zippedLeft);
          pair.leftVel.set(0, 0, 0);
        }
        if (!isUnzipped && pair.rightSphere.position.distanceToSquared(pair.zippedRight) < 0.0004) {
          pair.rightSphere.position.copy(pair.zippedRight);
          pair.rightVel.set(0, 0, 0);
        }

        if (isUnzipped && pair.leftSphere.position.distanceToSquared(pair.restLeft) < 0.0004) {
          pair.leftVel.multiplyScalar(0.95);
        }
        if (isUnzipped && pair.rightSphere.position.distanceToSquared(pair.restRight) < 0.0004) {
          pair.rightVel.multiplyScalar(0.95);
        }

        if (pair.bond.parent) {
          updateCylinder(pair.bond, pair.leftSphere.position, pair.rightSphere.position);
        }
      }

      updateBackbones();

      return {
        totalSpringEnergy,
        avgVelocity: activeBodies > 0 ? totalVelMag / activeBodies : 0,
        activeBodies
      };
    }

    function updateCameraFollow(dt) {
      controls.enabled = !cameraFollowEnabled;

      if (cameraFollowEnabled) {
        const focusIndex = Math.min(Math.max(unzipLevel - 1, 0), TOTAL_PAIRS - 1);
        const targetY = basePairs[focusIndex].y + 1.5;
        const desiredPos = new THREE.Vector3(0, targetY + 7, 24);
        const desiredTarget = new THREE.Vector3(0, targetY, 0);

        camera.position.lerp(desiredPos, 1 - Math.exp(-dt * 3));
        controls.target.lerp(desiredTarget, 1 - Math.exp(-dt * 4));
        camera.lookAt(controls.target);
      } else {
        controls.enabled = true;
        controls.update();
      }
    }

    function updateFox(dt) {
      if (foxMixer) foxMixer.update(dt);

      if (foxModel) {
        const foxPos = new THREE.Vector3();
        foxModel.getWorldPosition(foxPos);

        const toCamera = new THREE.Vector3().subVectors(camera.position, foxPos);
        const targetYaw = Math.atan2(toCamera.x, toCamera.z);
        foxModel.rotation.y += (targetYaw - foxModel.rotation.y) * Math.min(1, dt * 2);
      }
    }

    function updateDebugOverlay(metrics) {
      debugOverlay.textContent =
`Physics Debug
Unzip Level: ${unzipLevel}
Active Physics Bodies: ${metrics.activeBodies}
Total Spring Energy: ${metrics.totalSpringEnergy.toFixed(2)}
Average Velocity: ${metrics.avgVelocity.toFixed(3)}
FPS: ${fpsState.fps.toFixed(1)}`;
    }

    function updateState(metrics) {
      window.__3D_STATE__.unzipLevel = unzipLevel;
      window.__3D_STATE__.totalBasePairs = TOTAL_PAIRS;
      window.__3D_STATE__.debugOverlayVisible = debugOverlayVisible;
      window.__3D_STATE__.cameraFollowEnabled = cameraFollowEnabled;
      window.__3D_STATE__.foxLoaded = foxLoaded;
      window.__3D_STATE__.foxPosition = foxModel
        ? { x: foxModel.position.x, y: foxModel.position.y, z: foxModel.position.z }
        : { x: 0, y: 0, z: 0 };
      window.__3D_STATE__.activePhysicsBodies = metrics.activeBodies;
      window.__3D_STATE__.totalSpringEnergy = metrics.totalSpringEnergy;
      window.__3D_STATE__.avgVelocity = metrics.avgVelocity;
      window.__3D_STATE__.cameraPosition = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
      window.__3D_STATE__.fps = fpsState.fps;
      window.__3D_STATE__.helixRadius = HELIX_RADIUS;
      window.__3D_STATE__.pairsZipped = TOTAL_PAIRS - unzipLevel;
      window.__3D_STATE__.resetCount = resetCount;
      window.__3D_STATE__.progressPercent = (unzipLevel / TOTAL_PAIRS) * 100;
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.033);

      fpsState.accum += dt;
      fpsState.frames++;
      if (fpsState.accum >= 0.5) {
        fpsState.fps = fpsState.frames / fpsState.accum;
        fpsState.accum = 0;
        fpsState.frames = 0;
      }

      const metrics = updatePhysics(dt);
      updateFox(dt);
      updateCameraFollow(dt);

      if (!cameraFollowEnabled) {
        controls.update();
      }

      updateDebugOverlay(metrics);
      updateState(metrics);

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
