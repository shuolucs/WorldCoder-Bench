<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Unzipper Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 46, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #55aaff;
            pointer-events: none;
            z-index: 10;
        }
        #hud h1 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: #55aaff;
        }
        #hud p {
            margin: 5px 0;
            font-size: 0.9rem;
        }
        #progressBarContainer {
            margin-top: 10px;
            width: 100%;
            height: 10px;
            background: #222244;
            border-radius: 5px;
            overflow: hidden;
        }
        #progressBar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffaa55, #55aaff);
            transition: width 0.3s ease;
        }
        #infoPanel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 46, 0.85);
            padding: 15px 30px;
            border-radius: 30px;
            border: 1px solid #ffaa55;
            font-size: 1.1rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            transition: opacity 0.3s;
        }
        #debugOverlay {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ff4444;
            font-family: monospace;
            font-size: 0.85rem;
            pointer-events: none;
            display: none;
            z-index: 10;
        }
        .debug-item {
            margin: 3px 0;
        }
        .key { color: #ffaa55; font-weight: bold; }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud">
        <h1>DNA Unzipper</h1>
        <p id="pairsText">Pairs Unzipped: 0/20</p>
        <p><span class="key">UP/DOWN</span> : Unzip / Zip</p>
        <p><span class="key">R</span> : Reset</p>
        <p><span class="key">C</span> : Toggle Camera Follow</p>
        <p><span class="key">D</span> : Toggle Debug</p>
        <div id="progressBarContainer">
            <div id="progressBar"></div>
        </div>
    </div>

    <div id="infoPanel">Fully Zipped DNA Double Helix</div>

    <div id="debugOverlay">
        <div style="color:#ff4444; margin-bottom:10px; font-weight:bold;">PHYSICS DEBUG</div>
        <div class="debug-item">Unzip Level: <span id="dbg-level">0</span></div>
        <div class="debug-item">Active Bodies: <span id="dbg-bodies">0</span></div>
        <div class="debug-item">Spring Energy: <span id="dbg-energy">0.00</span></div>
        <div class="debug-item">Avg Velocity: <span id="dbg-vel">0.00</span></div>
        <div class="debug-item">FPS: <span id="dbg-fps">0</span></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            unzipLevel: 0,
            totalBasePairs: 20,
            debugOverlayVisible: false,
            cameraFollowEnabled: false,
            foxLoaded: false,
            foxPosition: { x: 8, y: 0, z: 5 },
            activePhysicsBodies: 0,
            totalSpringEnergy: 0,
            avgVelocity: 0,
            cameraPosition: { x: 0, y: 10, z: 30 },
            fps: 0,
            helixRadius: 2.0,
            pairsZipped: 20,
            resetCount: 0,
            progressPercent: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const warmLight = new THREE.DirectionalLight(0xffaa55, 1.5);
        warmLight.position.set(10, 20, 10);
        scene.add(warmLight);

        const coolLight = new THREE.DirectionalLight(0x55aaff, 1.5);
        coolLight.position.set(-10, -10, 10);
        scene.add(coolLight);

        // Grid
        const gridHelper = new THREE.GridHelper(50, 50, 0x222244, 0x222244);
        gridHelper.position.y = -12;
        scene.add(gridHelper);

        // --- DNA Generation ---
        const numPairs = 20;
        const radius = 2.0;
        const yStart = -12;
        const yEnd = 12;
        const yStep = (yEnd - yStart) / (numPairs - 1);
        const twistRate = Math.PI / 5;

        const sphereGeo = new THREE.SphereGeometry(0.3, 16, 16);
        const bondGeo = new THREE.CylinderGeometry(0.05, 0.05, 1, 8); // Height 1 for easy scaling
        bondGeo.rotateX(Math.PI / 2); // Align with Z axis for lookAt
        const backboneGeo = new THREE.CylinderGeometry(0.08, 0.08, 1, 8);
        backboneGeo.rotateX(Math.PI / 2);

        const matA = new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.3, metalness: 0.1 }); // Red
        const matT = new THREE.MeshStandardMaterial({ color: 0x4444ff, roughness: 0.3, metalness: 0.1 }); // Blue
        const matG = new THREE.MeshStandardMaterial({ color: 0x44ff44, roughness: 0.3, metalness: 0.1 }); // Green
        const matC = new THREE.MeshStandardMaterial({ color: 0xffff44, roughness: 0.3, metalness: 0.1 }); // Yellow
        const matBond = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
        const matBackbone = new THREE.MeshStandardMaterial({ color: 0x6688cc, roughness: 0.4 });

        const dnaPairs = [];
        const backbones1 = [];
        const backbones2 = [];

        for (let i = 0; i < numPairs; i++) {
            const y = yStart + i * yStep;
            const angle = i * twistRate;

            // Rest positions
            const p1 = new THREE.Vector3(Math.cos(angle) * radius, y, Math.sin(angle) * radius);
            const p2 = new THREE.Vector3(Math.cos(angle + Math.PI) * radius, y, Math.sin(angle + Math.PI) * radius);

            // Unzip target positions (move outward by 3.0 units)
            const dir1 = new THREE.Vector3(p1.x, 0, p1.z).normalize();
            const dir2 = new THREE.Vector3(p2.x, 0, p2.z).normalize();
            const u1 = p1.clone().add(dir1.multiplyScalar(3.0));
            const u2 = p2.clone().add(dir2.multiplyScalar(3.0));

            // Nucleotides
            const s1Mat = (i % 2 === 0) ? matA : matT;
            const s2Mat = (i % 2 === 0) ? matG : matC;
            
            const s1 = new THREE.Mesh(sphereGeo, s1Mat);
            s1.position.copy(p1);
            scene.add(s1);

            const s2 = new THREE.Mesh(sphereGeo, s2Mat);
            s2.position.copy(p2);
            scene.add(s2);

            // Hydrogen Bond
            const bond = new THREE.Mesh(bondGeo, matBond);
            scene.add(bond);

            dnaPairs.push({
                index: i,
                y: y,
                s1: s1,
                s2: s2,
                bond: bond,
                p1_rest: p1,
                p2_rest: p2,
                u1_rest: u1,
                u2_rest: u2,
                v1: new THREE.Vector3(),
                v2: new THREE.Vector3(),
                type: (i % 2 === 0) ? 'A-T' : 'G-C' // Simplified representation for text
            });

            // Backbones (connect to next)
            if (i < numPairs - 1) {
                const bb1 = new THREE.Mesh(backboneGeo, matBackbone);
                scene.add(bb1);
                backbones1.push(bb1);

                const bb2 = new THREE.Mesh(backboneGeo, matBackbone);
                scene.add(bb2);
                backbones2.push(bb2);
            }
        }

        // --- Fox Mascot ---
        let fox, foxMixer;
        const gltfLoader = new GLTFLoader();
        // Using a reliable CDN for the Khronos Fox sample
        gltfLoader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Fox/glTF/Fox.gltf', (gltf) => {
            fox = gltf.scene;
            fox.position.set(8, 0, 5);
            fox.scale.set(0.05, 0.05, 0.05);
            scene.add(fox);

            if (gltf.animations && gltf.animations.length > 0) {
                foxMixer = new THREE.AnimationMixer(fox);
                // Play walk/run animation (usually index 1 or 2, 0 is often idle/survey)
                const action = foxMixer.clipAction(gltf.animations[0]); 
                action.play();
            }
            window.__3D_STATE__.foxLoaded = true;
        });

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                if (window.__3D_STATE__.unzipLevel < numPairs) {
                    window.__3D_STATE__.unzipLevel++;
                    updateUI();
                }
            } else if (e.key === 'ArrowDown') {
                if (window.__3D_STATE__.unzipLevel > 0) {
                    window.__3D_STATE__.unzipLevel--;
                    updateUI();
                }
            } else if (e.key.toLowerCase() === 'r') {
                window.__3D_STATE__.unzipLevel = 0;
                window.__3D_STATE__.resetCount++;
                updateUI();
            } else if (e.key.toLowerCase() === 'd') {
                window.__3D_STATE__.debugOverlayVisible = !window.__3D_STATE__.debugOverlayVisible;
                document.getElementById('debugOverlay').style.display = window.__3D_STATE__.debugOverlayVisible ? 'block' : 'none';
            } else if (e.key.toLowerCase() === 'c') {
                window.__3D_STATE__.cameraFollowEnabled = !window.__3D_STATE__.cameraFollowEnabled;
            }
        });

        // --- UI Updates ---
        const pairsText = document.getElementById('pairsText');
        const progressBar = document.getElementById('progressBar');
        const infoPanel = document.getElementById('infoPanel');

        function updateUI() {
            const lvl = window.__3D_STATE__.unzipLevel;
            pairsText.innerText = `Pairs Unzipped: ${lvl}/20`;
            progressBar.style.width = `${(lvl / 20) * 100}%`;

            if (lvl === 0) {
                infoPanel.innerText = "Fully Zipped DNA Double Helix";
            } else {
                const pair = dnaPairs[lvl - 1];
                if (pair.type === 'A-T') {
                    infoPanel.innerText = "Adenine-Thymine bond broken - 2 hydrogen bonds";
                } else {
                    infoPanel.innerText = "Guanine-Cytosine bond broken - 3 hydrogen bonds";
                }
            }
        }

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        const k = 50.0; // Spring constant
        const damping = 0.9; // Damping factor

        let frames = 0;
        let lastFpsTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1);
            const time = performance.now();

            // FPS Calculation
            frames++;
            if (time - lastFpsTime >= 1000) {
                window.__3D_STATE__.fps = Math.round((frames * 1000) / (time - lastFpsTime));
                frames = 0;
                lastFpsTime = time;
                if (window.__3D_STATE__.debugOverlayVisible) {
                    document.getElementById('dbg-fps').innerText = window.__3D_STATE__.fps;
                }
            }

            const lvl = window.__3D_STATE__.unzipLevel;
            let totalEnergy = 0;
            let totalVel = 0;
            let activeBodies = 0;

            // Physics & DNA Update
            for (let i = 0; i < numPairs; i++) {
                const pair = dnaPairs[i];
                const isUnzipped = i < lvl;

                const target1 = isUnzipped ? pair.u1_rest : pair.p1_rest;
                const target2 = isUnzipped ? pair.u2_rest : pair.p2_rest;

                // Spring Physics S1
                const force1 = target1.clone().sub(pair.s1.position).multiplyScalar(k);
                pair.v1.add(force1.multiplyScalar(dt));
                pair.v1.multiplyScalar(damping);
                pair.s1.position.add(pair.v1.clone().multiplyScalar(dt));

                // Spring Physics S2
                const force2 = target2.clone().sub(pair.s2.position).multiplyScalar(k);
                pair.v2.add(force2.multiplyScalar(dt));
                pair.v2.multiplyScalar(damping);
                pair.s2.position.add(pair.v2.clone().multiplyScalar(dt));

                // Update Bond
                pair.bond.visible = !isUnzipped;
                if (!isUnzipped) {
                    const dist = pair.s1.position.distanceTo(pair.s2.position);
                    pair.bond.position.copy(pair.s1.position).lerp(pair.s2.position, 0.5);
                    pair.bond.lookAt(pair.s2.position);
                    pair.bond.scale.set(1, 1, dist);
                }

                // Metrics
                if (isUnzipped) {
                    activeBodies += 2;
                    const d1 = target1.distanceTo(pair.s1.position);
                    const d2 = target2.distanceTo(pair.s2.position);
                    totalEnergy += 0.5 * k * (d1 * d1 + d2 * d2);
                    totalVel += pair.v1.length() + pair.v2.length();
                }
            }

            // Update Backbones
            for (let i = 0; i < numPairs - 1; i++) {
                const pA1 = dnaPairs[i].s1.position;
                const pB1 = dnaPairs[i+1].s1.position;
                backbones1[i].position.copy(pA1).lerp(pB1, 0.5);
                backbones1[i].lookAt(pB1);
                backbones1[i].scale.set(1, 1, pA1.distanceTo(pB1));

                const pA2 = dnaPairs[i].s2.position;
                const pB2 = dnaPairs[i+1].s2.position;
                backbones2[i].position.copy(pA2).lerp(pB2, 0.5);
                backbones2[i].lookAt(pB2);
                backbones2[i].scale.set(1, 1, pA2.distanceTo(pB2));
            }

            // Fox Update
            if (foxMixer) foxMixer.update(dt);
            if (fox) {
                // Slowly rotate to face camera
                const targetAngle = Math.atan2(camera.position.x - fox.position.x, camera.position.z - fox.position.z);
                let diff = targetAngle - fox.rotation.y;
                // Normalize angle
                diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                fox.rotation.y += diff * 2.0 * dt;
                
                window.__3D_STATE__.foxPosition = { x: fox.position.x, y: fox.position.y, z: fox.position.z };
            }

            // Camera Follow
            if (window.__3D_STATE__.cameraFollowEnabled) {
                const targetY = lvl > 0 ? dnaPairs[lvl - 1].y : yStart;
                controls.target.y += (targetY - controls.target.y) * 2.0 * dt;
                const desiredCamY = targetY + 10;
                camera.position.y += (desiredCamY - camera.position.y) * 2.0 * dt;
            }

            controls.update();

            // Update State Object
            window.__3D_STATE__.activePhysicsBodies = activeBodies;
            window.__3D_STATE__.totalSpringEnergy = totalEnergy;
            window.__3D_STATE__.avgVelocity = activeBodies > 0 ? totalVel / activeBodies : 0;
            window.__3D_STATE__.cameraPosition = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
            window.__3D_STATE__.pairsZipped = 20 - lvl;
            window.__3D_STATE__.progressPercent = (lvl / 20) * 100;

            // Update Debug UI
            if (window.__3D_STATE__.debugOverlayVisible) {
                document.getElementById('dbg-level').innerText = lvl;
                document.getElementById('dbg-bodies').innerText = activeBodies;
                document.getElementById('dbg-energy').innerText = totalEnergy.toFixed(2);
                document.getElementById('dbg-vel').innerText = window.__3D_STATE__.avgVelocity.toFixed(3);
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
