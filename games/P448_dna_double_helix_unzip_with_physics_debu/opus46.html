<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNA Double Helix Unzipper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #aaccff;
    font-size: 14px;
    background: rgba(10, 10, 46, 0.85);
    padding: 12px 18px;
    border-radius: 8px;
    border: 1px solid rgba(100, 150, 255, 0.3);
    pointer-events: none;
    z-index: 10;
    line-height: 1.6;
  }

  #progressBarContainer {
    position: absolute;
    top: 70px;
    left: 10px;
    width: 300px;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
    z-index: 10;
    pointer-events: none;
  }

  #progressBar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff4444, #ffff44, #44ff44, #4444ff);
    border-radius: 4px;
    transition: width 0.3s ease;
  }

  #infoPanel {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #ffffff;
    font-size: 15px;
    background: rgba(10, 10, 46, 0.9);
    padding: 10px 24px;
    border-radius: 8px;
    border: 1px solid rgba(100, 150, 255, 0.3);
    pointer-events: none;
    z-index: 10;
    text-align: center;
    min-width: 400px;
  }

  #debugOverlay {
    display: none;
    position: absolute;
    top: 10px;
    right: 10px;
    color: #00ff88;
    font-size: 13px;
    font-family: 'Courier New', monospace;
    background: rgba(0, 0, 0, 0.8);
    padding: 14px 18px;
    border-radius: 8px;
    border: 1px solid rgba(0, 255, 136, 0.4);
    z-index: 10;
    pointer-events: none;
    line-height: 1.8;
    min-width: 280px;
  }
</style>
</head>
<body>

<div id="hud">DNA Unzipper | Pairs Unzipped: 0/20 | Press UP/DOWN to unzip/zip | D for debug | R to reset</div>
<div id="progressBarContainer"><div id="progressBar"></div></div>
<div id="infoPanel">Press UP arrow to begin unzipping the DNA double helix</div>
<div id="debugOverlay">
  <div>── Physics Debug ──</div>
  <div id="dbgUnzip">Unzip Level: 0</div>
  <div id="dbgBodies">Active Bodies: 0</div>
  <div id="dbgEnergy">Spring Energy: 0.000</div>
  <div id="dbgVelocity">Avg Velocity: 0.000</div>
  <div id="dbgFPS">FPS: 0</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ─── Scene Setup ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 10, 30);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// ─── Lights ───
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffaa55, 0.8);
dirLight1.position.set(10, 15, 5);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0x55aaff, 0.6);
dirLight2.position.set(-10, -10, -5);
scene.add(dirLight2);

// ─── Grid ───
const gridHelper = new THREE.GridHelper(50, 50, 0x222244, 0x222244);
gridHelper.position.y = -13;
scene.add(gridHelper);

// ─── DNA Parameters ───
const TOTAL_PAIRS = 20;
const HELIX_RADIUS = 2.0;
const Y_MIN = -12;
const Y_MAX = 12;
const TWIST_RATE = Math.PI / 5;
const UNZIP_OFFSET = 3.0;
const SPRING_K = 50;
const DAMPING = 0.9;

// ─── State ───
let unzipLevel = 0;
let debugOverlayVisible = false;
let cameraFollowEnabled = false;
let foxLoaded = false;
let foxPosition = { x: 8, y: 0, z: 5 };
let resetCount = 0;
let fps = 0;
let frameCount = 0;
let lastFpsTime = performance.now();

// ─── Base Pair Data ───
// Types: 0 = A-T (red-yellow), 1 = G-C (blue-green)
const basePairs = [];

// Materials
const matAdenine = new THREE.MeshStandardMaterial({ color: 0xff4444, metalness: 0.3, roughness: 0.5 });
const matThymine = new THREE.MeshStandardMaterial({ color: 0x4444ff, metalness: 0.3, roughness: 0.5 });
const matGuanine = new THREE.MeshStandardMaterial({ color: 0x44ff44, metalness: 0.3, roughness: 0.5 });
const matCytosine = new THREE.MeshStandardMaterial({ color: 0xffff44, metalness: 0.3, roughness: 0.5 });
const matBond = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.1, roughness: 0.8 });
const matBackbone = new THREE.MeshStandardMaterial({ color: 0x6688cc, metalness: 0.3, roughness: 0.5 });

const sphereGeo = new THREE.SphereGeometry(0.3, 16, 12);
const bondGeo = new THREE.CylinderGeometry(0.05, 0.05, 1, 8);
const backboneGeo = new THREE.CylinderGeometry(0.08, 0.08, 1, 8);

const dnaGroup = new THREE.Group();
scene.add(dnaGroup);

// Helper: create cylinder between two points
function createCylinderBetween(p1, p2, geo, material) {
  const dir = new THREE.Vector3().subVectors(p2, p1);
  const len = dir.length();
  const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);

  const mesh = new THREE.Mesh(geo, material);
  mesh.position.copy(mid);
  mesh.scale.set(1, len, 1);

  const up = new THREE.Vector3(0, 1, 0);
  const quat = new THREE.Quaternion().setFromUnitVectors(up, dir.normalize());
  mesh.quaternion.copy(quat);

  return mesh;
}

function updateCylinderBetween(mesh, p1, p2) {
  const dir = new THREE.Vector3().subVectors(p2, p1);
  const len = dir.length();
  const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);

  mesh.position.copy(mid);
  mesh.scale.set(1, len, 1);

  const up = new THREE.Vector3(0, 1, 0);
  if (len > 0.001) {
    const quat = new THREE.Quaternion().setFromUnitVectors(up, dir.normalize());
    mesh.quaternion.copy(quat);
  }
}

// Generate DNA
for (let i = 0; i < TOTAL_PAIRS; i++) {
  const t = i / (TOTAL_PAIRS - 1);
  const y = Y_MIN + t * (Y_MAX - Y_MIN);
  const angle = i * TWIST_RATE;

  const type = i % 2; // alternating types

  // Strand 1 position (left)
  const x1 = HELIX_RADIUS * Math.cos(angle);
  const z1 = HELIX_RADIUS * Math.sin(angle);

  // Strand 2 position (right) - opposite side
  const x2 = HELIX_RADIUS * Math.cos(angle + Math.PI);
  const z2 = HELIX_RADIUS * Math.sin(angle + Math.PI);

  // Strand 1 materials: alternating red (Adenine) and blue (Thymine)
  const mat1 = (type === 0) ? matAdenine : matThymine;
  // Strand 2 materials: alternating green (Guanine) and yellow (Cytosine)
  const mat2 = (type === 0) ? matGuanine : matCytosine;

  const sphere1 = new THREE.Mesh(sphereGeo, mat1);
  sphere1.position.set(x1, y, z1);
  dnaGroup.add(sphere1);

  const sphere2 = new THREE.Mesh(sphereGeo, mat2);
  sphere2.position.set(x2, y, z2);
  dnaGroup.add(sphere2);

  // Hydrogen bond
  const bond = createCylinderBetween(
    new THREE.Vector3(x1, y, z1),
    new THREE.Vector3(x2, y, z2),
    bondGeo, matBond
  );
  dnaGroup.add(bond);

  // Compute unzip direction (outward from center along the radial direction)
  const radialDir1 = new THREE.Vector3(Math.cos(angle), 0, Math.sin(angle)).normalize();
  const radialDir2 = new THREE.Vector3(Math.cos(angle + Math.PI), 0, Math.sin(angle + Math.PI)).normalize();

  basePairs.push({
    index: i,
    type: type,
    y: y,
    angle: angle,
    // Original (zipped) positions
    origPos1: new THREE.Vector3(x1, y, z1),
    origPos2: new THREE.Vector3(x2, y, z2),
    // Unzipped target positions
    unzipPos1: new THREE.Vector3(x1 + radialDir1.x * UNZIP_OFFSET, y, z1 + radialDir1.z * UNZIP_OFFSET),
    unzipPos2: new THREE.Vector3(x2 + radialDir2.x * UNZIP_OFFSET, y, z2 + radialDir2.z * UNZIP_OFFSET),
    // Current positions (for physics)
    currentPos1: new THREE.Vector3(x1, y, z1),
    currentPos2: new THREE.Vector3(x2, y, z2),
    // Velocities
    vel1: new THREE.Vector3(0, 0, 0),
    vel2: new THREE.Vector3(0, 0, 0),
    // Meshes
    sphere1: sphere1,
    sphere2: sphere2,
    bond: bond,
    bondVisible: true,
    // State
    isUnzipped: false,
    targetPos1: new THREE.Vector3(x1, y, z1),
    targetPos2: new THREE.Vector3(x2, y, z2),
  });
}

// Backbone connections
const backboneMeshes1 = [];
const backboneMeshes2 = [];

for (let i = 0; i < TOTAL_PAIRS - 1; i++) {
  const bp1 = basePairs[i];
  const bp2 = basePairs[i + 1];

  const bb1 = createCylinderBetween(bp1.currentPos1, bp2.currentPos1, backboneGeo, matBackbone);
  dnaGroup.add(bb1);
  backboneMeshes1.push(bb1);

  const bb2 = createCylinderBetween(bp1.currentPos2, bp2.currentPos2, backboneGeo, matBackbone);
  dnaGroup.add(bb2);
  backboneMeshes2.push(bb2);
}

// ─── Fox Mascot ───
let foxMixer = null;
let foxModel = null;

const loader = new GLTFLoader();
loader.load(
  'https://threejs.org/examples/models/gltf/Fox/glTF/Fox.gltf',
  (gltf) => {
    foxModel = gltf.scene;
    foxModel.position.set(8, -13, 5);
    foxModel.scale.set(0.05, 0.05, 0.05);
    scene.add(foxModel);

    foxLoaded = true;
    foxPosition = { x: 8, y: -13, z: 5 };

    if (gltf.animations && gltf.animations.length > 0) {
      foxMixer = new THREE.AnimationMixer(foxModel);
      const clip = gltf.animations[0];
      const action = foxMixer.clipAction(clip);
      action.play();
    }
  },
  undefined,
  (error) => {
    console.warn('Fox model could not be loaded:', error);
  }
);

// ─── UI Elements ───
const hudEl = document.getElementById('hud');
const progressBarEl = document.getElementById('progressBar');
const infoPanelEl = document.getElementById('infoPanel');
const debugOverlayEl = document.getElementById('debugOverlay');
const dbgUnzip = document.getElementById('dbgUnzip');
const dbgBodies = document.getElementById('dbgBodies');
const dbgEnergy = document.getElementById('dbgEnergy');
const dbgVelocity = document.getElementById('dbgVelocity');
const dbgFPS = document.getElementById('dbgFPS');

function updateUI() {
  hudEl.textContent = `DNA Unzipper | Pairs Unzipped: ${unzipLevel}/20 | Press UP/DOWN to unzip/zip | D for debug | R to reset`;
  progressBarEl.style.width = `${(unzipLevel / TOTAL_PAIRS) * 100}%`;

  if (unzipLevel === 0) {
    infoPanelEl.textContent = 'Press UP arrow to begin unzipping the DNA double helix';
  } else {
    const lastPair = basePairs[unzipLevel - 1];
    if (lastPair.type === 0) {
      infoPanelEl.textContent = 'Adenine-Thymine bond broken — 2 hydrogen bonds | A=T pair separated';
    } else {
      infoPanelEl.textContent = 'Guanine-Cytosine bond broken — 3 hydrogen bonds | G≡C pair separated';
    }
  }
}

// ─── Unzip/Zip Logic ───
function unzipPair(index) {
  if (index < 0 || index >= TOTAL_PAIRS) return;
  const bp = basePairs[index];
  bp.isUnzipped = true;
  bp.targetPos1.copy(bp.unzipPos1);
  bp.targetPos2.copy(bp.unzipPos2);
}

function zipPair(index) {
  if (index < 0 || index >= TOTAL_PAIRS) return;
  const bp = basePairs[index];
  bp.isUnzipped = false;
  bp.targetPos1.copy(bp.origPos1);
  bp.targetPos2.copy(bp.origPos2);
}

function resetAll() {
  unzipLevel = 0;
  resetCount++;
  for (let i = 0; i < TOTAL_PAIRS; i++) {
    zipPair(i);
  }
  updateUI();
}

// ─── Keyboard Input ───
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp') {
    if (unzipLevel < TOTAL_PAIRS) {
      unzipPair(unzipLevel);
      unzipLevel++;
      updateUI();
    }
  } else if (e.key === 'ArrowDown') {
    if (unzipLevel > 0) {
      unzipLevel--;
      zipPair(unzipLevel);
      updateUI();
    }
  } else if (e.key === 'r' || e.key === 'R') {
    resetAll();
  } else if (e.key === 'd' || e.key === 'D') {
    debugOverlayVisible = !debugOverlayVisible;
    debugOverlayEl.style.display = debugOverlayVisible ? 'block' : 'none';
  } else if (e.key === 'c' || e.key === 'C') {
    cameraFollowEnabled = !cameraFollowEnabled;
    controls.enabled = !cameraFollowEnabled;
  }
});

// ─── Window Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Global State ───
window.__3D_STATE__ = {
  unzipLevel: 0,
  totalBasePairs: TOTAL_PAIRS,
  debugOverlayVisible: false,
  cameraFollowEnabled: false,
  foxLoaded: false,
  foxPosition: { x: 8, y: 0, z: 5 },
  activePhysicsBodies: 0,
  totalSpringEnergy: 0,
  avgVelocity: 0,
  cameraPosition: { x: 0, y: 10, z: 30 },
  fps: 0,
  helixRadius: HELIX_RADIUS,
  pairsZipped: TOTAL_PAIRS,
  resetCount: 0,
  progressPercent: 0,
};

// ─── Animation Loop ───
const clock = new THREE.Clock();
const tempVec = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.05);

  // FPS
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fps = frameCount;
    frameCount = 0;
    lastFpsTime = now;
  }

  // Physics update
  let totalSpringEnergy = 0;
  let totalVelocity = 0;
  let activeBodies = 0;

  for (let i = 0; i < TOTAL_PAIRS; i++) {
    const bp = basePairs[i];

    // Spring physics for sphere 1
    tempVec.subVectors(bp.targetPos1, bp.currentPos1);
    const disp1 = tempVec.length();
    const springForce1 = tempVec.clone().multiplyScalar(SPRING_K);
    bp.vel1.add(springForce1.multiplyScalar(dt));
    bp.vel1.multiplyScalar(DAMPING);
    bp.currentPos1.add(bp.vel1.clone().multiplyScalar(dt));
    bp.sphere1.position.copy(bp.currentPos1);

    // Spring physics for sphere 2
    tempVec.subVectors(bp.targetPos2, bp.currentPos2);
    const disp2 = tempVec.length();
    const springForce2 = tempVec.clone().multiplyScalar(SPRING_K);
    bp.vel2.add(springForce2.multiplyScalar(dt));
    bp.vel2.multiplyScalar(DAMPING);
    bp.currentPos2.add(bp.vel2.clone().multiplyScalar(dt));
    bp.sphere2.position.copy(bp.currentPos2);

    // Bond visibility
    if (bp.isUnzipped && bp.bondVisible) {
      bp.bond.visible = false;
      bp.bondVisible = false;
    } else if (!bp.isUnzipped && !bp.bondVisible) {
      bp.bond.visible = true;
      bp.bondVisible = true;
    }

    // Update bond position if visible
    if (bp.bondVisible) {
      updateCylinderBetween(bp.bond, bp.currentPos1, bp.currentPos2);
    }

    // Track physics for unzipped pairs
    if (bp.isUnzipped) {
      activeBodies += 2;
      totalSpringEnergy += 0.5 * SPRING_K * disp1 * disp1;
      totalSpringEnergy += 0.5 * SPRING_K * disp2 * disp2;
      totalVelocity += bp.vel1.length();
      totalVelocity += bp.vel2.length();
    }
  }

  // Update backbone
  for (let i = 0; i < TOTAL_PAIRS - 1; i++) {
    updateCylinderBetween(backboneMeshes1[i], basePairs[i].currentPos1, basePairs[i + 1].currentPos1);
    updateCylinderBetween(backboneMeshes2[i], basePairs[i].currentPos2, basePairs[i + 1].currentPos2);
  }

  // Fox update
  if (foxMixer) {
    foxMixer.update(dt);
  }
  if (foxModel) {
    // Slowly rotate fox to face camera
    const foxPos = foxModel.position.clone();
    const camPos = camera.position.clone();
    camPos.y = foxPos.y; // Only rotate on Y axis
    const dir = camPos.sub(foxPos).normalize();
    const targetAngle = Math.atan2(dir.x, dir.z);
    let currentAngle = foxModel.rotation.y;
    let diff = targetAngle - currentAngle;
    // Normalize angle difference
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    foxModel.rotation.y += diff * 2.0 * dt;

    foxPosition = {
      x: foxModel.position.x,
      y: foxModel.position.y,
      z: foxModel.position.z
    };
  }

  // Camera follow
  if (cameraFollowEnabled) {
    let targetY = 0;
    if (unzipLevel > 0 && unzipLevel <= TOTAL_PAIRS) {
      targetY = basePairs[Math.min(unzipLevel, TOTAL_PAIRS) - 1].y;
    }
    const targetPos = new THREE.Vector3(0, targetY, 0);
    controls.target.lerp(targetPos, 3.0 * dt);
    
    const camTarget = new THREE.Vector3(
      15 * Math.cos(now * 0.0003),
      targetY + 5,
      15 * Math.sin(now * 0.0003)
    );
    camera.position.lerp(camTarget, 2.0 * dt);
    camera.lookAt(controls.target);
  }

  controls.update();

  // Update debug overlay
  const avgVel = activeBodies > 0 ? totalVelocity / activeBodies : 0;

  if (debugOverlayVisible) {
    dbgUnzip.textContent = `Unzip Level: ${unzipLevel}`;
    dbgBodies.textContent = `Active Bodies: ${activeBodies}`;
    dbgEnergy.textContent = `Spring Energy: ${totalSpringEnergy.toFixed(3)}`;
    dbgVelocity.textContent = `Avg Velocity: ${avgVel.toFixed(3)}`;
    dbgFPS.textContent = `FPS: ${fps}`;
  }

  // Update global state
  window.__3D_STATE__.unzipLevel = unzipLevel;
  window.__3D_STATE__.totalBasePairs = TOTAL_PAIRS;
  window.__3D_STATE__.debugOverlayVisible = debugOverlayVisible;
  window.__3D_STATE__.cameraFollowEnabled = cameraFollowEnabled;
  window.__3D_STATE__.foxLoaded = foxLoaded;
  window.__3D_STATE__.foxPosition = foxPosition;
  window.__3D_STATE__.activePhysicsBodies = activeBodies;
  window.__3D_STATE__.totalSpringEnergy = totalSpringEnergy;
  window.__3D_STATE__.avgVelocity = avgVel;
  window.__3D_STATE__.cameraPosition = {
    x: camera.position.x,
    y: camera.position.y,
    z: camera.position.z
  };
  window.__3D_STATE__.fps = fps;
  window.__3D_STATE__.helixRadius = HELIX_RADIUS;
  window.__3D_STATE__.pairsZipped = TOTAL_PAIRS - unzipLevel;
  window.__3D_STATE__.resetCount = resetCount;
  window.__3D_STATE__.progressPercent = (unzipLevel / TOTAL_PAIRS) * 100;

  renderer.render(scene, camera);
}

updateUI();
animate();
</script>
</body>
</html>
