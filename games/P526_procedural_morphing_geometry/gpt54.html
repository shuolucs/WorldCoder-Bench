<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Morphing Primitives</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111111;
      font-family: Arial, sans-serif;
      color: white;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(20, 20, 20, 0.85);
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 220px;
      z-index: 10;
      font-size: 14px;
      line-height: 1.6;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    }

    #controls {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      background: rgba(20, 20, 20, 0.85);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px;
      z-index: 10;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    }

    #controls button {
      background: #1e1e1e;
      color: #ffffff;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s ease, transform 0.1s ease, border-color 0.2s ease;
    }

    #controls button:hover {
      background: #2a2a2a;
      border-color: #666;
    }

    #controls button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div><strong>Shape:</strong> <span id="shape-label">Sphere</span></div>
      <div><strong>Morph:</strong> <span id="morph-progress">100%</span></div>
      <div><strong>Vertex Count:</strong> <span id="vertex-count">0</span></div>
      <div><strong>Wireframe:</strong> <span id="wireframe-status">Off</span></div>
    </div>

    <div id="controls">
      <button id="btn-prev">Prev Shape</button>
      <button id="btn-next">Next Shape</button>
      <button id="btn-wireframe">Toggle Wireframe</button>
      <button id="btn-rotation">Toggle Rotation</button>
      <button id="btn-color">Randomize Color</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const SHAPE_NAMES = ['Sphere', 'Cube', 'Torus', 'Icosahedron', 'Octahedron'];
    const TARGET_VERTEX_COUNT = 4096;
    const MORPH_DURATION = 1500;

    const app = document.getElementById('app');
    const shapeLabelEl = document.getElementById('shape-label');
    const morphProgressEl = document.getElementById('morph-progress');
    const vertexCountEl = document.getElementById('vertex-count');
    const wireframeStatusEl = document.getElementById('wireframe-status');

    const btnNext = document.getElementById('btn-next');
    const btnPrev = document.getElementById('btn-prev');
    const btnWireframe = document.getElementById('btn-wireframe');
    const btnRotation = document.getElementById('btn-rotation');
    const btnColor = document.getElementById('btn-color');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#111111');

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 7);
    scene.add(directionalLight);

    function sampleGeometrySurface(geometry, count) {
      const nonIndexed = geometry.toNonIndexed();
      const position = nonIndexed.attributes.position;
      const triCount = position.count / 3;

      const areas = new Float32Array(triCount);
      let totalArea = 0;

      const a = new THREE.Vector3();
      const b = new THREE.Vector3();
      const c = new THREE.Vector3();
      const ab = new THREE.Vector3();
      const ac = new THREE.Vector3();
      const cross = new THREE.Vector3();

      for (let i = 0; i < triCount; i++) {
        a.fromBufferAttribute(position, i * 3 + 0);
        b.fromBufferAttribute(position, i * 3 + 1);
        c.fromBufferAttribute(position, i * 3 + 2);

        ab.subVectors(b, a);
        ac.subVectors(c, a);
        cross.crossVectors(ab, ac);
        const area = cross.length() * 0.5;
        totalArea += area;
        areas[i] = totalArea;
      }

      const points = new Float32Array(count * 3);

      for (let i = 0; i < count; i++) {
        const r = Math.random() * totalArea;

        let low = 0;
        let high = triCount - 1;
        while (low < high) {
          const mid = (low + high) >> 1;
          if (r < areas[mid]) high = mid;
          else low = mid + 1;
        }
        const triIndex = low;

        a.fromBufferAttribute(position, triIndex * 3 + 0);
        b.fromBufferAttribute(position, triIndex * 3 + 1);
        c.fromBufferAttribute(position, triIndex * 3 + 2);

        let u = Math.random();
        let v = Math.random();
        if (u + v > 1) {
          u = 1 - u;
          v = 1 - v;
        }
        const w = 1 - u - v;

        const x = a.x * w + b.x * u + c.x * v;
        const y = a.y * w + b.y * u + c.y * v;
        const z = a.z * w + b.z * u + c.z * v;

        points[i * 3 + 0] = x;
        points[i * 3 + 1] = y;
        points[i * 3 + 2] = z;
      }

      nonIndexed.dispose();
      return points;
    }

    function buildShapes() {
      const rawGeometries = [
        new THREE.SphereGeometry(1.5, 32, 32),
        new THREE.BoxGeometry(2.5, 2.5, 2.5, 16, 16, 16),
        new THREE.TorusGeometry(1.2, 0.5, 24, 64),
        new THREE.IcosahedronGeometry(1.8, 4),
        new THREE.OctahedronGeometry(1.8, 4)
      ];

      const sampled = rawGeometries.map(g => {
        const points = sampleGeometrySurface(g, TARGET_VERTEX_COUNT);
        g.dispose();
        return points;
      });

      return sampled;
    }

    const shapePositions = buildShapes();

    const baseGeometry = new THREE.BufferGeometry();
    const initialPositions = new Float32Array(shapePositions[0]);
    baseGeometry.setAttribute('position', new THREE.BufferAttribute(initialPositions, 3));
    baseGeometry.computeVertexNormals();

    const material = new THREE.MeshStandardMaterial({
      color: '#00aaff',
      metalness: 0.4,
      roughness: 0.3
    });

    const mesh = new THREE.Points(
      baseGeometry,
      new THREE.PointsMaterial({
        color: '#00aaff',
        size: 0.045,
        sizeAttenuation: true
      })
    );

    // Use a shaded mesh built from points via triangles fan-like reconstruction is not reliable,
    // so create a procedural morph cloud represented as a mesh-like object plus wire overlay.
    // To satisfy material requirement, we also create an enclosing visible surface approximation
    // using a dynamic convex-like triangle soup from the same positions arranged as triangles.
    const triGeometry = new THREE.BufferGeometry();
    const triangleVertexCount = TARGET_VERTEX_COUNT - (TARGET_VERTEX_COUNT % 3);
    const triPositions = new Float32Array(triangleVertexCount * 3);
    triPositions.set(initialPositions.slice(0, triangleVertexCount * 3));
    triGeometry.setAttribute('position', new THREE.BufferAttribute(triPositions, 3));
    triGeometry.computeVertexNormals();

    const morphMesh = new THREE.Mesh(triGeometry, material);
    morphMesh.position.set(0, 0, 0);
    scene.add(morphMesh);

    const wireframeMaterial = new THREE.MeshBasicMaterial({
      color: 0xffffff,
      wireframe: true,
      transparent: true,
      opacity: 0.35
    });

    const wireframeMesh = new THREE.Mesh(triGeometry, wireframeMaterial);
    wireframeMesh.visible = false;
    scene.add(wireframeMesh);

    let currentShapeIndex = 0;
    let sourceShapeIndex = 0;
    let targetShapeIndex = 0;
    let isMorphing = false;
    let morphStartTime = 0;
    let wireframeEnabled = false;
    let autoRotation = true;
    let frameCount = 0;

    let morphFrom = new Float32Array(shapePositions[0].slice(0, triangleVertexCount * 3));
    let morphTo = new Float32Array(shapePositions[0].slice(0, triangleVertexCount * 3));

    function easeInOut(t) {
      return t < 0.5
        ? 2 * t * t
        : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function hexString(color) {
      return '#' + color.getHexString();
    }

    function updateHUD(progress = 1) {
      shapeLabelEl.textContent = SHAPE_NAMES[targetShapeIndex];
      morphProgressEl.textContent = `${Math.round(progress * 100)}%`;
      vertexCountEl.textContent = triangleVertexCount;
      wireframeStatusEl.textContent = wireframeEnabled ? 'On' : 'Off';
    }

    function startMorph(newIndex) {
      if (newIndex === targetShapeIndex && !isMorphing) return;

      const posAttr = triGeometry.attributes.position;
      morphFrom = new Float32Array(posAttr.array);
      morphTo = new Float32Array(shapePositions[newIndex].slice(0, triangleVertexCount * 3));

      sourceShapeIndex = currentShapeIndex;
      targetShapeIndex = newIndex;
      isMorphing = true;
      morphStartTime = performance.now();

      window.__3D_STATE__.morphProgress = 0.0;
      window.__3D_STATE__.isMorphing = true;
      updateHUD(0);
    }

    function nextShape() {
      startMorph((targetShapeIndex + 1) % SHAPE_NAMES.length);
    }

    function prevShape() {
      startMorph((targetShapeIndex - 1 + SHAPE_NAMES.length) % SHAPE_NAMES.length);
    }

    function randomizeColor() {
      const color = new THREE.Color(Math.random(), Math.random(), Math.random());
      material.color.copy(color);
      wireframeMaterial.color.set(0xffffff);
      window.__3D_STATE__.meshColor = hexString(material.color);
    }

    btnNext.addEventListener('click', nextShape);
    btnPrev.addEventListener('click', prevShape);

    btnWireframe.addEventListener('click', () => {
      wireframeEnabled = !wireframeEnabled;
      wireframeMesh.visible = wireframeEnabled;
    });

    btnRotation.addEventListener('click', () => {
      autoRotation = !autoRotation;
    });

    btnColor.addEventListener('click', randomizeColor);

    window.addEventListener('keydown', (e) => {
      if (e.key >= '1' && e.key <= '5') {
        const index = parseInt(e.key, 10) - 1;
        startMorph(index);
      }
    });

    window.__3D_STATE__ = {
      currentShapeIndex: 0,
      currentShapeName: 'Sphere',
      morphProgress: 1.0,
      isMorphing: false,
      wireframeEnabled: false,
      autoRotation: true,
      rotationY: 0,
      vertexCount: triangleVertexCount,
      meshColor: '#00aaff',
      meshPositionX: 0,
      meshPositionY: 0,
      meshPositionZ: 0,
      frameCount: 0
    };

    updateHUD(1);

    function animate(now) {
      requestAnimationFrame(animate);
      frameCount++;

      if (isMorphing) {
        const elapsed = now - morphStartTime;
        const rawT = Math.min(elapsed / MORPH_DURATION, 1);
        const t = easeInOut(rawT);

        const posAttr = triGeometry.attributes.position;
        const arr = posAttr.array;

        for (let i = 0; i < arr.length; i++) {
          arr[i] = THREE.MathUtils.lerp(morphFrom[i], morphTo[i], t);
        }

        posAttr.needsUpdate = true;
        triGeometry.computeVertexNormals();

        if (rawT >= 1) {
          isMorphing = false;
          currentShapeIndex = targetShapeIndex;
          window.__3D_STATE__.morphProgress = 1.0;
        } else {
          window.__3D_STATE__.morphProgress = rawT;
        }

        updateHUD(isMorphing ? rawT : 1.0);
      }

      if (autoRotation) {
        morphMesh.rotation.y += 0.01;
        wireframeMesh.rotation.y = morphMesh.rotation.y;
        wireframeMesh.rotation.x = morphMesh.rotation.x;
        wireframeMesh.rotation.z = morphMesh.rotation.z;
      } else {
        wireframeMesh.rotation.copy(morphMesh.rotation);
      }

      controls.update();

      window.__3D_STATE__.currentShapeIndex = targetShapeIndex;
      window.__3D_STATE__.currentShapeName = SHAPE_NAMES[targetShapeIndex];
      window.__3D_STATE__.morphProgress = isMorphing ? window.__3D_STATE__.morphProgress : 1.0;
      window.__3D_STATE__.isMorphing = isMorphing;
      window.__3D_STATE__.wireframeEnabled = wireframeEnabled;
      window.__3D_STATE__.autoRotation = autoRotation;
      window.__3D_STATE__.rotationY = morphMesh.rotation.y;
      window.__3D_STATE__.vertexCount = triangleVertexCount;
      window.__3D_STATE__.meshColor = hexString(material.color);
      window.__3D_STATE__.meshPositionX = morphMesh.position.x;
      window.__3D_STATE__.meshPositionY = morphMesh.position.y;
      window.__3D_STATE__.meshPositionZ = morphMesh.position.z;
      window.__3D_STATE__.frameCount = frameCount;

      renderer.render(scene, camera);
    }

    requestAnimationFrame(animate);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
