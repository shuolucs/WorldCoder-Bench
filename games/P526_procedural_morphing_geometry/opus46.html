<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morphing Geometry</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #111111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 10px;
    padding: 18px 22px;
    color: #ffffff;
    font-size: 14px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    min-width: 220px;
}

#hud .hud-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #00aaff;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#hud .hud-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

#hud .hud-row .label {
    color: #888;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

#hud .hud-row .value {
    color: #fff;
    font-weight: 600;
}

#controls {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
}

#controls button {
    background: rgba(0, 0, 0, 0.75);
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    backdrop-filter: blur(10px);
    letter-spacing: 0.3px;
}

#controls button:hover {
    background: rgba(0, 170, 255, 0.3);
    border-color: #00aaff;
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(0, 170, 255, 0.2);
}

#controls button:active {
    transform: translateY(0);
}

.morph-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
}

.morph-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #00aaff, #00ffaa);
    border-radius: 2px;
    transition: width 0.05s linear;
}
</style>
</head>
<body>

<div id="hud">
    <div class="hud-title">Morph Controls</div>
    <div class="hud-row">
        <span class="label">Shape</span>
        <span class="value" id="shape-label">Sphere</span>
    </div>
    <div class="hud-row">
        <span class="label">Morph</span>
        <span class="value" id="morph-progress">100%</span>
    </div>
    <div class="hud-row">
        <span class="label">Vertices</span>
        <span class="value" id="vertex-count">0</span>
    </div>
    <div class="hud-row">
        <span class="label">Wireframe</span>
        <span class="value" id="wireframe-status">OFF</span>
    </div>
    <div class="morph-bar">
        <div class="morph-bar-fill" id="morph-bar-fill" style="width: 100%"></div>
    </div>
</div>

<div id="controls">
    <button id="btn-prev">◀ Prev Shape</button>
    <button id="btn-next">Next Shape ▶</button>
    <button id="btn-wireframe">Toggle Wireframe</button>
    <button id="btn-rotation">Toggle Rotation</button>
    <button id="btn-color">Randomize Color</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
    const SHAPE_NAMES = ['Sphere', 'Cube', 'Torus', 'Icosahedron', 'Octahedron'];
    const MORPH_DURATION = 1.5;
    const VERTEX_COUNT = 2048;

    // State
    window.__3D_STATE__ = {
        currentShapeIndex: 0,
        currentShapeName: 'Sphere',
        morphProgress: 1.0,
        isMorphing: false,
        wireframeEnabled: false,
        autoRotation: true,
        rotationY: 0,
        vertexCount: 0,
        meshColor: '#00aaff',
        meshPositionX: 0,
        meshPositionY: 0,
        meshPositionZ: 0,
        frameCount: 0
    };

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 7);
    scene.add(directionalLight);

    // Generate shape vertices
    function generateShapeVertices(shapeIndex) {
        let geometry;
        switch(shapeIndex) {
            case 0: geometry = new THREE.SphereGeometry(1.5, 32, 32); break;
            case 1: geometry = new THREE.BoxGeometry(2.5, 2.5, 2.5, 16, 16, 16); break;
            case 2: geometry = new THREE.TorusGeometry(1.2, 0.5, 32, 32); break;
            case 3: geometry = new THREE.IcosahedronGeometry(1.8, 4); break;
            case 4: geometry = new THREE.OctahedronGeometry(1.8, 4); break;
        }

        const posAttr = geometry.getAttribute('position');
        const srcCount = posAttr.count;
        const positions = new Float32Array(VERTEX_COUNT * 3);
        const normals = new Float32Array(VERTEX_COUNT * 3);

        const normAttr = geometry.getAttribute('normal');

        for (let i = 0; i < VERTEX_COUNT; i++) {
            const srcIdx = i % srcCount;
            positions[i * 3] = posAttr.getX(srcIdx);
            positions[i * 3 + 1] = posAttr.getY(srcIdx);
            positions[i * 3 + 2] = posAttr.getZ(srcIdx);

            if (normAttr) {
                normals[i * 3] = normAttr.getX(srcIdx);
                normals[i * 3 + 1] = normAttr.getY(srcIdx);
                normals[i * 3 + 2] = normAttr.getZ(srcIdx);
            }
        }

        geometry.dispose();
        return { positions, normals };
    }

    // Pre-compute all shape data
    const shapeData = [];
    for (let i = 0; i < 5; i++) {
        shapeData.push(generateShapeVertices(i));
    }

    // Create the morphing geometry
    const morphGeometry = new THREE.BufferGeometry();
    const initialPositions = new Float32Array(shapeData[0].positions);
    const initialNormals = new Float32Array(shapeData[0].normals);
    morphGeometry.setAttribute('position', new THREE.BufferAttribute(initialPositions, 3));
    morphGeometry.setAttribute('normal', new THREE.BufferAttribute(initialNormals, 3));

    // Generate indices for proper face rendering
    const indices = [];
    for (let i = 0; i < VERTEX_COUNT - 2; i += 3) {
        indices.push(i, i + 1, i + 2);
    }
    morphGeometry.setIndex(indices);

    // Material
    const material = new THREE.MeshStandardMaterial({
        color: 0x00aaff,
        metalness: 0.4,
        roughness: 0.3,
        flatShading: true
    });

    const wireframeMaterial = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        wireframe: true,
        transparent: true,
        opacity: 0.15
    });

    const mesh = new THREE.Mesh(morphGeometry, material);
    scene.add(mesh);

    const wireframeMesh = new THREE.Mesh(morphGeometry, wireframeMaterial);
    wireframeMesh.visible = false;
    scene.add(wireframeMesh);

    window.__3D_STATE__.vertexCount = VERTEX_COUNT;

    // Morphing state
    let morphFrom = 0;
    let morphTo = 0;
    let morphTime = 0;
    let morphing = false;
    let fromPositions = null;
    let fromNormals = null;
    let toPositions = null;
    let toNormals = null;

    // Easing function
    function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function startMorph(targetIndex) {
        if (targetIndex === window.__3D_STATE__.currentShapeIndex && !morphing) return;
        if (morphing && targetIndex === morphTo) return;

        // If currently morphing, capture current interpolated positions as the start
        const posAttr = morphGeometry.getAttribute('position');
        const normAttr = morphGeometry.getAttribute('normal');

        fromPositions = new Float32Array(posAttr.array);
        fromNormals = new Float32Array(normAttr.array);
        toPositions = shapeData[targetIndex].positions;
        toNormals = shapeData[targetIndex].normals;

        morphFrom = window.__3D_STATE__.currentShapeIndex;
        morphTo = targetIndex;
        morphTime = 0;
        morphing = true;

        window.__3D_STATE__.isMorphing = true;
        window.__3D_STATE__.morphProgress = 0.0;
        window.__3D_STATE__.currentShapeIndex = targetIndex;
        window.__3D_STATE__.currentShapeName = SHAPE_NAMES[targetIndex];
    }

    function updateMorph(delta) {
        if (!morphing) return;

        morphTime += delta;
        let t = Math.min(morphTime / MORPH_DURATION, 1.0);
        let easedT = easeInOutCubic(t);

        const posAttr = morphGeometry.getAttribute('position');
        const normAttr = morphGeometry.getAttribute('normal');
        const pos = posAttr.array;
        const norm = normAttr.array;

        for (let i = 0; i < VERTEX_COUNT * 3; i++) {
            pos[i] = fromPositions[i] + (toPositions[i] - fromPositions[i]) * easedT;
            norm[i] = fromNormals[i] + (toNormals[i] - fromNormals[i]) * easedT;
        }

        posAttr.needsUpdate = true;
        normAttr.needsUpdate = true;
        morphGeometry.computeBoundingSphere();

        if (t >= 1.0) {
            morphing = false;
            window.__3D_STATE__.isMorphing = false;
            window.__3D_STATE__.morphProgress = 1.0;
        } else {
            window.__3D_STATE__.morphProgress = parseFloat(t.toFixed(4));
        }
    }

    // UI Elements
    const shapeLabelEl = document.getElementById('shape-label');
    const morphProgressEl = document.getElementById('morph-progress');
    const vertexCountEl = document.getElementById('vertex-count');
    const wireframeStatusEl = document.getElementById('wireframe-status');
    const morphBarFill = document.getElementById('morph-bar-fill');

    function updateHUD() {
        shapeLabelEl.textContent = window.__3D_STATE__.currentShapeName;
        const pct = Math.round(window.__3D_STATE__.morphProgress * 100);
        morphProgressEl.textContent = pct + '%';
        vertexCountEl.textContent = window.__3D_STATE__.vertexCount;
        wireframeStatusEl.textContent = window.__3D_STATE__.wireframeEnabled ? 'ON' : 'OFF';
        morphBarFill.style.width = pct + '%';
    }

    // Button handlers
    document.getElementById('btn-next').addEventListener('click', () => {
        const next = (window.__3D_STATE__.currentShapeIndex + 1) % 5;
        startMorph(next);
    });

    document.getElementById('btn-prev').addEventListener('click', () => {
        const prev = (window.__3D_STATE__.currentShapeIndex - 1 + 5) % 5;
        startMorph(prev);
    });

    document.getElementById('btn-wireframe').addEventListener('click', () => {
        window.__3D_STATE__.wireframeEnabled = !window.__3D_STATE__.wireframeEnabled;
        wireframeMesh.visible = window.__3D_STATE__.wireframeEnabled;
    });

    document.getElementById('btn-rotation').addEventListener('click', () => {
        window.__3D_STATE__.autoRotation = !window.__3D_STATE__.autoRotation;
    });

    document.getElementById('btn-color').addEventListener('click', () => {
        const r = Math.random();
        const g = Math.random();
        const b = Math.random();
        const color = new THREE.Color(r, g, b);
        material.color.copy(color);
        window.__3D_STATE__.meshColor = '#' + color.getHexString();
    });

    // Keyboard
    document.addEventListener('keydown', (e) => {
        const key = parseInt(e.key);
        if (key >= 1 && key <= 5) {
            startMorph(key - 1);
        }
    });

    // Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Animation loop
    let lastTime = performance.now();

    function animate() {
        requestAnimationFrame(animate);

        const now = performance.now();
        const delta = (now - lastTime) / 1000;
        lastTime = now;

        // Update morph
        updateMorph(delta);

        // Auto rotation
        if (window.__3D_STATE__.autoRotation) {
            mesh.rotation.y += 0.01;
            wireframeMesh.rotation.y = mesh.rotation.y;
        }

        window.__3D_STATE__.rotationY = mesh.rotation.y;
        window.__3D_STATE__.meshPositionX = mesh.position.x;
        window.__3D_STATE__.meshPositionY = mesh.position.y;
        window.__3D_STATE__.meshPositionZ = mesh.position.z;
        window.__3D_STATE__.frameCount++;

        controls.update();
        updateHUD();
        renderer.render(scene, camera);
    }

    // Initialize HUD
    vertexCountEl.textContent = VERTEX_COUNT;
    animate();
})();
</script>
</body>
</html>
