<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Procedural Morphing Geometry</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(17, 17, 17, 0.85);
            padding: 15px 20px;
            border-radius: 8px;
            color: #ffffff;
            border: 1px solid #333333;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #hud div {
            margin-bottom: 8px;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        #hud div:last-child {
            margin-bottom: 0;
        }
        #hud span {
            font-weight: bold;
            color: #00aaff;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(17, 17, 17, 0.85);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            background: #222222;
            color: #ffffff;
            border: 1px solid #555555;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
        }
        button:hover {
            background: #00aaff;
            border-color: #00aaff;
            color: #ffffff;
        }
        button:active {
            transform: scale(0.96);
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="hud">
        <div id="shape-label">Shape: <span>Sphere</span></div>
        <div id="morph-progress">Morph Progress: <span>0%</span></div>
        <div id="vertex-count">Vertices: <span>0</span></div>
        <div id="wireframe-status">Wireframe: <span>OFF</span></div>
    </div>

    <div id="controls">
        <button id="btn-prev">Prev Shape</button>
        <button id="btn-next">Next Shape</button>
        <button id="btn-wireframe">Toggle Wireframe</button>
        <button id="btn-rotation">Toggle Rotation</button>
        <button id="btn-color">Randomize Color</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            currentShapeIndex: 0,
            currentShapeName: 'Sphere',
            morphProgress: 0.0,
            isMorphing: false,
            wireframeEnabled: false,
            autoRotation: false,
            rotationY: 0,
            vertexCount: 0,
            meshColor: '#00aaff',
            meshPositionX: 0,
            meshPositionY: 0,
            meshPositionZ: 0,
            frameCount: 0
        };

        const SHAPE_NAMES = ['Sphere', 'Cube', 'Torus', 'Icosahedron', 'Octahedron'];
        const MORPH_DURATION = 1500; // ms

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#111111');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        // --- Geometry Generation & Padding ---
        // Generate base geometries with relatively high segment counts for smooth morphing
        const rawGeometries = [
            new THREE.SphereGeometry(1.5, 48, 48),
            new THREE.BoxGeometry(2.5, 2.5, 2.5, 24, 24, 24),
            new THREE.TorusGeometry(1.2, 0.5, 32, 64),
            new THREE.IcosahedronGeometry(1.8, 12),
            new THREE.OctahedronGeometry(1.8, 16)
        ];

        // Convert to non-indexed to have flat triangle lists
        const nonIndexedGeometries = rawGeometries.map(g => g.toNonIndexed());

        // Find maximum vertex count
        let maxVertices = 0;
        nonIndexedGeometries.forEach(g => {
            if (g.attributes.position.count > maxVertices) {
                maxVertices = g.attributes.position.count;
            }
        });

        // Ensure maxVertices is a multiple of 3 (full triangles)
        maxVertices = Math.ceil(maxVertices / 3) * 3;
        window.__3D_STATE__.vertexCount = maxVertices;

        // Function to pad geometry to match maxVertices
        function padGeometry(geometry, targetVertexCount) {
            const posAttr = geometry.attributes.position;
            const normAttr = geometry.attributes.normal;
            const currentCount = posAttr.count;

            const newPos = new Float32Array(targetVertexCount * 3);
            const newNorm = new Float32Array(targetVertexCount * 3);

            // Copy existing data
            newPos.set(posAttr.array);
            newNorm.set(normAttr.array);

            const numOriginalTriangles = currentCount / 3;
            let offset = currentCount * 3;

            // Pad remaining space by duplicating random existing triangles
            for (let i = currentCount; i < targetVertexCount; i += 3) {
                const randomTriIndex = Math.floor(Math.random() * numOriginalTriangles);
                const srcOffset = randomTriIndex * 9;

                for (let j = 0; j < 9; j++) {
                    newPos[offset + j] = posAttr.array[srcOffset + j];
                    newNorm[offset + j] = normAttr.array[srcOffset + j];
                }
                offset += 9;
            }

            const paddedGeo = new THREE.BufferGeometry();
            paddedGeo.setAttribute('position', new THREE.BufferAttribute(newPos, 3));
            paddedGeo.setAttribute('normal', new THREE.BufferAttribute(newNorm, 3));
            return paddedGeo;
        }

        const paddedGeometries = nonIndexedGeometries.map(g => padGeometry(g, maxVertices));

        // --- Mesh & Morph Targets Setup ---
        // Use the first shape (Sphere) as the base geometry
        const baseGeometry = paddedGeometries[0].clone();
        baseGeometry.morphAttributes.position = [];
        baseGeometry.morphAttributes.normal = [];

        // Add shapes 1-4 as morph targets
        for (let i = 1; i < 5; i++) {
            baseGeometry.morphAttributes.position.push(paddedGeometries[i].getAttribute('position'));
            baseGeometry.morphAttributes.normal.push(paddedGeometries[i].getAttribute('normal'));
        }

        // Main Material
        const material = new THREE.MeshStandardMaterial({
            color: new THREE.Color(window.__3D_STATE__.meshColor),
            metalness: 0.4,
            roughness: 0.3,
            polygonOffset: true,
            polygonOffsetFactor: 1,
            polygonOffsetUnits: 1
        });

        const mesh = new THREE.Mesh(baseGeometry, material);
        scene.add(mesh);

        // Wireframe Overlay
        const wireframeMaterial = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            wireframe: true,
            transparent: true,
            opacity: 0.15,
            depthWrite: false
        });
        const wireframeMesh = new THREE.Mesh(baseGeometry, wireframeMaterial);
        wireframeMesh.visible = window.__3D_STATE__.wireframeEnabled;
        mesh.add(wireframeMesh); // Add as child so it transforms with the main mesh

        // --- Morphing Logic ---
        let morphStartTime = 0;
        let fromIndex = 0;
        let toIndex = 0;

        function easeInOutQuad(t) {
            return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
        }

        function startMorphTo(targetIndex) {
            if (window.__3D_STATE__.isMorphing) return;
            if (targetIndex === window.__3D_STATE__.currentShapeIndex) return;

            fromIndex = window.__3D_STATE__.currentShapeIndex;
            toIndex = targetIndex;
            morphStartTime = performance.now();

            window.__3D_STATE__.isMorphing = true;
            window.__3D_STATE__.currentShapeIndex = toIndex;
            window.__3D_STATE__.currentShapeName = SHAPE_NAMES[toIndex];
        }

        // --- UI & Interactions ---
        const domShapeLabel = document.querySelector('#shape-label span');
        const domMorphProgress = document.querySelector('#morph-progress span');
        const domVertexCount = document.querySelector('#vertex-count span');
        const domWireframeStatus = document.querySelector('#wireframe-status span');

        domVertexCount.innerText = window.__3D_STATE__.vertexCount.toLocaleString();

        document.getElementById('btn-next').addEventListener('click', () => {
            startMorphTo((window.__3D_STATE__.currentShapeIndex + 1) % 5);
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            startMorphTo((window.__3D_STATE__.currentShapeIndex - 1 + 5) % 5);
        });

        document.getElementById('btn-wireframe').addEventListener('click', () => {
            window.__3D_STATE__.wireframeEnabled = !window.__3D_STATE__.wireframeEnabled;
            wireframeMesh.visible = window.__3D_STATE__.wireframeEnabled;
        });

        document.getElementById('btn-rotation').addEventListener('click', () => {
            window.__3D_STATE__.autoRotation = !window.__3D_STATE__.autoRotation;
        });

        document.getElementById('btn-color').addEventListener('click', () => {
            const newColor = new THREE.Color(Math.random(), Math.random(), Math.random());
            material.color.copy(newColor);
            window.__3D_STATE__.meshColor = '#' + newColor.getHexString();
        });

        window.addEventListener('keydown', (e) => {
            const key = parseInt(e.key);
            if (key >= 1 && key <= 5) {
                startMorphTo(key - 1);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate(time) {
            requestAnimationFrame(animate);

            // Handle Morphing
            if (window.__3D_STATE__.isMorphing) {
                let t = (time - morphStartTime) / MORPH_DURATION;
                let isFinished = false;

                if (t >= 1.0) {
                    t = 1.0;
                    isFinished = true;
                }

                const easedT = easeInOutQuad(t);
                window.__3D_STATE__.morphProgress = t;

                // Reset all influences
                for (let i = 0; i < 4; i++) {
                    mesh.morphTargetInfluences[i] = 0;
                    wireframeMesh.morphTargetInfluences[i] = 0;
                }

                // Apply influences based on from/to indices
                // Note: morphTargetInfluences array maps to shapes 1, 2, 3, 4 (indices 0, 1, 2, 3)
                if (fromIndex > 0) {
                    mesh.morphTargetInfluences[fromIndex - 1] = 1 - easedT;
                    wireframeMesh.morphTargetInfluences[fromIndex - 1] = 1 - easedT;
                }
                if (toIndex > 0) {
                    mesh.morphTargetInfluences[toIndex - 1] = easedT;
                    wireframeMesh.morphTargetInfluences[toIndex - 1] = easedT;
                }

                if (isFinished) {
                    window.__3D_STATE__.isMorphing = false;
                    window.__3D_STATE__.morphProgress = 1.0; // Ensure exactly 1.0 at completion
                }
            } else {
                window.__3D_STATE__.morphProgress = 0.0; // 0.0 before any morph starts
            }

            // Handle Auto Rotation
            if (window.__3D_STATE__.autoRotation) {
                mesh.rotation.y += 0.01;
            }

            // Update State
            window.__3D_STATE__.rotationY = mesh.rotation.y;
            window.__3D_STATE__.meshPositionX = mesh.position.x;
            window.__3D_STATE__.meshPositionY = mesh.position.y;
            window.__3D_STATE__.meshPositionZ = mesh.position.z;
            window.__3D_STATE__.frameCount++;

            // Update HUD DOM
            domShapeLabel.innerText = window.__3D_STATE__.currentShapeName;
            domMorphProgress.innerText = `${(window.__3D_STATE__.morphProgress * 100).toFixed(0)}%`;
            domWireframeStatus.innerText = window.__3D_STATE__.wireframeEnabled ? 'ON' : 'OFF';

            controls.update();
            renderer.render(scene, camera);
        }

        // Start loop
        requestAnimationFrame(animate);

    </script>
</body>
</html>
