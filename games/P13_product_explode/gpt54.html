<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 智能手表 3D 爆炸分解视图</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #0f1115;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #e8edf2;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #ui {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 320px;
      background: rgba(20, 24, 30, 0.82);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px 14px 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      z-index: 10;
    }

    #ui h2 {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 700;
    }

    .row {
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.45;
    }

    .label {
      display: inline-block;
      min-width: 92px;
      color: #9fb0c3;
    }

    #explodeSlider {
      width: 100%;
      margin-top: 6px;
    }

    button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.12);
      background: #1c2430;
      color: #eef4ff;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #253142;
    }

    #partInfo {
      margin-top: 10px;
      padding: 10px;
      min-height: 60px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      color: #dce6f2;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-line;
    }

    #hint {
      position: absolute;
      right: 16px;
      bottom: 16px;
      background: rgba(20, 24, 30, 0.72);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 12px;
      color: #b8c6d8;
      z-index: 10;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h2>智能手表爆炸分解视图</h2>

      <div class="row">
        <span class="label">爆炸控制</span>
        <span id="explodePct">0%</span>
        <input id="explodeSlider" type="range" min="0" max="1" step="0.01" value="0" />
      </div>

      <div class="row">
        <span class="label">零件数量</span>
        <span id="partCount">8</span>
      </div>

      <div class="row">
        <span class="label">当前选中</span>
        <span id="selectedPart">—</span>
      </div>

      <div class="row">
        <button id="autoRotateBtn">切换自动旋转</button>
      </div>

      <div id="partInfo">点击零件查看名称与说明。</div>
    </div>

    <div id="hint">
      左键旋转 / 右键平移 / 滚轮缩放 / 点击零件高亮
    </div>
  </div>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const explodeSlider = document.getElementById('explodeSlider');
    const explodePct = document.getElementById('explodePct');
    const partCountEl = document.getElementById('partCount');
    const selectedPartEl = document.getElementById('selectedPart');
    const partInfoEl = document.getElementById('partInfo');
    const autoRotateBtn = document.getElementById('autoRotateBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f1115);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3.2, 8.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = false;
    controls.autoRotateSpeed = 1.5;
    controls.target.set(0, 0.4, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.85));

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.7);
    dirLight.position.set(5, 8, 6);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const rimLight = new THREE.DirectionalLight(0x88aaff, 0.8);
    rimLight.position.set(-6, 4, -5);
    scene.add(rimLight);

    const pointLight = new THREE.PointLight(0x66ccff, 1.2, 20);
    pointLight.position.set(0, 2.5, 4);
    scene.add(pointLight);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(14, 64),
      new THREE.MeshStandardMaterial({ color: 0x141922, roughness: 0.95, metalness: 0.05 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.8;
    scene.add(ground);

    const watchGroup = new THREE.Group();
    scene.add(watchGroup);

    const metalMat = new THREE.MeshStandardMaterial({
      color: 0x9aa4ad,
      metalness: 0.95,
      roughness: 0.22
    });

    const crownMat = new THREE.MeshStandardMaterial({
      color: 0xb6c0c9,
      metalness: 0.95,
      roughness: 0.28
    });

    const glassMat = new THREE.MeshPhysicalMaterial({
      color: 0x112233,
      metalness: 0.05,
      roughness: 0.08,
      transmission: 0.35,
      thickness: 0.2,
      transparent: true,
      opacity: 0.95,
      emissive: 0x1fa3ff,
      emissiveIntensity: 0.35,
      clearcoat: 1,
      clearcoatRoughness: 0.08
    });

    const backMat = new THREE.MeshStandardMaterial({
      color: 0x727b83,
      metalness: 0.9,
      roughness: 0.35
    });

    const batteryMat = new THREE.MeshStandardMaterial({
      color: 0x30363c,
      metalness: 0.15,
      roughness: 0.7
    });

    const pcbMat = new THREE.MeshStandardMaterial({
      color: 0x0f7d46,
      metalness: 0.15,
      roughness: 0.8
    });

    const strapMat = new THREE.MeshStandardMaterial({
      color: 0x1d2229,
      metalness: 0.05,
      roughness: 0.9
    });

    function createCurvedStrapGeometry(length = 3.2, width = 1.85, thickness = 0.28, bend = 0.9) {
      const shape = new THREE.Shape();
      const w = width / 2;
      const t = thickness / 2;
      shape.moveTo(-w, -t);
      shape.lineTo(w, -t);
      shape.lineTo(w, t);
      shape.lineTo(-w, t);
      shape.closePath();

      class StrapCurve extends THREE.Curve {
        getPoint(u) {
          const y = u * length;
          const z = Math.sin(u * Math.PI * 0.85) * bend;
          return new THREE.Vector3(0, y, z);
        }
      }

      const path = new StrapCurve();
      const geo = new THREE.ExtrudeGeometry(shape, {
        steps: 40,
        bevelEnabled: false,
        extrudePath: path
      });
      geo.center();
      return geo;
    }

    const parts = [];
    const pickables = [];
    let selectedPart = null;

    function addPart({ name, description, mesh, assembledPosition, explodeDirection, explodeDistance }) {
      mesh.userData.partName = name;
      mesh.userData.description = description;
      mesh.userData.assembledPosition = assembledPosition.clone();
      mesh.userData.currentPosition = assembledPosition.clone();
      mesh.userData.explodeDirection = explodeDirection.clone().normalize();
      mesh.userData.explodeDistance = explodeDistance;
      mesh.userData.selected = false;
      mesh.position.copy(assembledPosition);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      watchGroup.add(mesh);
      parts.push(mesh);
      pickables.push(mesh);
      return mesh;
    }

    // 1) 表身
    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(1.55, 1.55, 0.9, 64, 1),
      metalMat.clone()
    );
    body.rotation.z = Math.PI / 2;
    body.scale.y = 0.62;
    addPart({
      name: '表身',
      description: '智能手表的主金属外壳，用于固定内部元件并提供结构强度。',
      mesh: body,
      assembledPosition: new THREE.Vector3(0, 0, 0),
      explodeDirection: new THREE.Vector3(0, 0, 1),
      explodeDistance: 0.0
    });

    // 2) 屏幕
    const screen = new THREE.Mesh(
      new THREE.PlaneGeometry(2.32, 2.32, 1, 1),
      glassMat.clone()
    );
    screen.rotation.y = Math.PI / 2;
    addPart({
      name: '屏幕',
      description: '玻璃盖板与显示区域，使用发光和物理材质模拟点亮的屏幕观感。',
      mesh: screen,
      assembledPosition: new THREE.Vector3(0.46, 0, 0),
      explodeDirection: new THREE.Vector3(1, 0, 0),
      explodeDistance: 1.4
    });

    // 3) 表冠
    const crown = new THREE.Mesh(
      new THREE.CylinderGeometry(0.18, 0.18, 0.28, 32),
      crownMat.clone()
    );
    crown.rotation.z = Math.PI / 2;
    addPart({
      name: '表冠',
      description: '侧边操作旋钮，可用于滚动、确认或返回等交互操作。',
      mesh: crown,
      assembledPosition: new THREE.Vector3(0.78, 0, 0),
      explodeDirection: new THREE.Vector3(1, 0, 0),
      explodeDistance: 0.65
    });

    // 4) 后盖
    const backCase = new THREE.Mesh(
      new THREE.CylinderGeometry(1.38, 1.38, 0.12, 64),
      backMat.clone()
    );
    backCase.rotation.z = Math.PI / 2;
    addPart({
      name: '后盖',
      description: '手表背部盖板，用于封装内部结构并与表身配合固定。',
      mesh: backCase,
      assembledPosition: new THREE.Vector3(-0.48, 0, 0),
      explodeDirection: new THREE.Vector3(-1, 0, 0),
      explodeDistance: 1.15
    });

    // 5) 电池
    const battery = new THREE.Mesh(
      new THREE.BoxGeometry(1.42, 1.42, 0.26),
      batteryMat.clone()
    );
    battery.rotation.y = Math.PI / 2;
    addPart({
      name: '电池',
      description: '为设备供电的电池模块，位于后盖与主板之间。',
      mesh: battery,
      assembledPosition: new THREE.Vector3(-0.16, 0, 0),
      explodeDirection: new THREE.Vector3(-1, 0, 0),
      explodeDistance: 2.0
    });

    // 6) PCB
    const pcb = new THREE.Mesh(
      new THREE.BoxGeometry(1.6, 1.6, 0.1),
      pcbMat.clone()
    );
    pcb.rotation.y = Math.PI / 2;
    addPart({
      name: '电路板',
      description: '主控电路板，承载芯片、传感器接口与供电连接等核心电路。',
      mesh: pcb,
      assembledPosition: new THREE.Vector3(0.08, 0, 0),
      explodeDirection: new THREE.Vector3(-1, 0, 0),
      explodeDistance: 1.0
    });

    // 7) 上表带
    const strapTop = new THREE.Mesh(
      createCurvedStrapGeometry(3.4, 1.88, 0.26, 0.65),
      strapMat.clone()
    );
    strapTop.rotation.x = Math.PI / 2;
    strapTop.rotation.z = Math.PI;
    addPart({
      name: '上表带',
      description: '橡胶材质上半段表带，负责佩戴固定并提供柔性弯曲效果。',
      mesh: strapTop,
      assembledPosition: new THREE.Vector3(0, 2.85, -0.02),
      explodeDirection: new THREE.Vector3(0, 1, 0),
      explodeDistance: 1.45
    });

    // 8) 下表带
    const strapBottom = new THREE.Mesh(
      createCurvedStrapGeometry(3.4, 1.88, 0.26, 0.65),
      strapMat.clone()
    );
    strapBottom.rotation.x = -Math.PI / 2;
    addPart({
      name: '下表带',
      description: '橡胶材质下半段表带，与上表带配合形成完整佩戴结构。',
      mesh: strapBottom,
      assembledPosition: new THREE.Vector3(0, -2.85, -0.02),
      explodeDirection: new THREE.Vector3(0, -1, 0),
      explodeDistance: 1.45
    });

    partCountEl.textContent = String(parts.length);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    let explodeTarget = parseFloat(explodeSlider.value);
    let explodeCurrent = explodeTarget;

    function setSelected(mesh) {
      selectedPart = mesh || null;

      for (const part of parts) {
        const mat = part.material;
        part.userData.selected = part === selectedPart;

        if ('emissive' in mat) {
          if (part === selectedPart) {
            mat.emissive = new THREE.Color(0xffb347);
            mat.emissiveIntensity = (part.userData.partName === '屏幕') ? 0.75 : 0.6;
          } else {
            if (part.userData.partName === '屏幕') {
              mat.emissive = new THREE.Color(0x1fa3ff);
              mat.emissiveIntensity = 0.35;
            } else {
              mat.emissive = new THREE.Color(0x000000);
              mat.emissiveIntensity = 0.0;
            }
          }
        }
      }

      if (selectedPart) {
        selectedPartEl.textContent = selectedPart.userData.partName;
        partInfoEl.textContent = `${selectedPart.userData.partName}\n${selectedPart.userData.description}`;
      } else {
        selectedPartEl.textContent = '—';
        partInfoEl.textContent = '点击零件查看名称与说明。';
      }

      update3DState();
    }

    function updateHUD() {
      explodePct.textContent = `${Math.round(explodeTarget * 100)}%`;
      selectedPartEl.textContent = selectedPart ? selectedPart.userData.partName : '—';
      partCountEl.textContent = String(parts.length);
    }

    function update3DState() {
      window.__3D_STATE__ = {
        partCount: parts.length,
        parts: parts.map(p => ({
          name: p.userData.partName,
          x: Number(p.position.x.toFixed(3)),
          y: Number(p.position.y.toFixed(3)),
          z: Number(p.position.z.toFixed(3)),
          selected: !!p.userData.selected
        })),
        explodeValue: Number(explodeTarget.toFixed(2)),
        selectedPart: selectedPart ? selectedPart.userData.partName : null,
        autoRotate: !!controls.autoRotate
      };
    }

    explodeSlider.addEventListener('input', () => {
      explodeTarget = parseFloat(explodeSlider.value);
      updateHUD();
      update3DState();
    });

    autoRotateBtn.addEventListener('click', () => {
      controls.autoRotate = !controls.autoRotate;
      update3DState();
    });

    renderer.domElement.addEventListener('pointerdown', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(pickables, false);
      if (intersects.length > 0) {
        setSelected(intersects[0].object);
      } else {
        setSelected(null);
      }
    });

    function animate() {
      requestAnimationFrame(animate);

      explodeCurrent += (explodeTarget - explodeCurrent) * 0.12;

      for (const part of parts) {
        const assembled = part.userData.assembledPosition;
        const dir = part.userData.explodeDirection;
        const distance = part.userData.explodeDistance;
        const targetPos = assembled.clone().addScaledVector(dir, distance * explodeCurrent);

        part.position.lerp(targetPos, 0.16);

        if (part.userData.partName === '屏幕') {
          part.material.emissiveIntensity = part === selectedPart ? 0.75 : 0.3 + 0.15 * (1 + Math.sin(performance.now() * 0.004)) * 0.5;
        }
      }

      watchGroup.rotation.y += 0.0025;

      controls.update();
      renderer.render(scene, camera);
      update3DState();
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHUD();
    update3DState();
    animate();
  </script>
</body>
</html>
