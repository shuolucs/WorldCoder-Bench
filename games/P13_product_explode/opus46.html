<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Watch 3D Exploded View</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #controls {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 30, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 18px;
    z-index: 10;
  }

  #controls label {
    color: #aab;
    font-size: 13px;
    white-space: nowrap;
  }

  #explodeSlider {
    width: 220px;
    accent-color: #4fc3f7;
    cursor: pointer;
  }

  #autoRotateBtn {
    background: linear-gradient(135deg, #4fc3f7, #0288d1);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
  }
  #autoRotateBtn:hover { filter: brightness(1.2); }
  #autoRotateBtn.active { background: linear-gradient(135deg, #ff7043, #d32f2f); }

  #hud {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 30, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 18px 22px;
    color: #ccd;
    font-size: 13px;
    z-index: 10;
    min-width: 200px;
  }

  #hud h3 {
    color: #4fc3f7;
    margin-bottom: 12px;
    font-size: 15px;
    letter-spacing: 1px;
  }

  #hud .row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  #hud .row .label { color: #889; }
  #hud .row .value { color: #eef; font-weight: 600; }

  #partInfo {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 30, 0.9);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(79, 195, 247, 0.3);
    border-radius: 14px;
    padding: 20px 24px;
    color: #ccd;
    font-size: 13px;
    z-index: 10;
    min-width: 240px;
    max-width: 300px;
    transition: opacity 0.3s;
  }

  #partInfo h3 {
    color: #4fc3f7;
    margin-bottom: 8px;
    font-size: 16px;
  }

  #partInfo .part-name {
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  #partInfo .part-desc {
    color: #99a;
    line-height: 1.5;
  }

  .title-bar {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.15);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 5;
  }
</style>
</head>
<body>

<div class="title-bar">SMART WATCH — EXPLODED VIEW</div>

<div id="hud">
  <h3>⌚ WATCH HUD</h3>
  <div class="row">
    <span class="label">Parts Count</span>
    <span class="value" id="partCount">8</span>
  </div>
  <div class="row">
    <span class="label">Selected Part</span>
    <span class="value" id="selectedPart">—</span>
  </div>
  <div class="row">
    <span class="label">Explode %</span>
    <span class="value" id="explodePct">0</span>
  </div>
</div>

<div id="partInfo">
  <h3>📋 Part Info</h3>
  <div class="part-name" id="partInfoName">No part selected</div>
  <div class="part-desc" id="partInfoDesc">Click on a part to see its details.</div>
</div>

<div id="controls">
  <label>💥 Explode:</label>
  <input type="range" id="explodeSlider" min="0" max="1" step="0.01" value="0">
  <button id="autoRotateBtn">🔄 Auto Rotate</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Scene Setup ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d1a);
scene.fog = new THREE.FogExp2(0x0d0d1a, 0.04);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(4, 3, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ─── Controls ───
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.autoRotate = false;
controls.autoRotateSpeed = 2.0;
controls.minDistance = 2;
controls.maxDistance = 15;

// ─── Lights ───
const ambientLight = new THREE.AmbientLight(0x334466, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -5;
dirLight.shadow.camera.right = 5;
dirLight.shadow.camera.top = 5;
dirLight.shadow.camera.bottom = -5;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x4488cc, 0.5);
fillLight.position.set(-3, 2, -3);
scene.add(fillLight);

const rimLight = new THREE.PointLight(0xff6644, 0.4, 20);
rimLight.position.set(-4, 3, 4);
scene.add(rimLight);

// ─── Ground ───
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.9, metalness: 0.1 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2.5;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const gridHelper = new THREE.GridHelper(20, 40, 0x222244, 0x1a1a33);
gridHelper.position.y = -2.49;
scene.add(gridHelper);

// ─── Part Descriptions ───
const partDescriptions = {
  'Watch Body': 'The main housing of the smartwatch, crafted from brushed stainless steel with a polished bezel. Houses all internal components and provides structural integrity.',
  'Screen': 'A 1.4" AMOLED display with sapphire crystal glass protection. Features always-on display capability with 454x454 pixel resolution and 1000 nits brightness.',
  'Crown': 'The digital crown serves as the primary physical input. Rotates for scrolling and presses for selection. Contains a haptic feedback motor for tactile response.',
  'Back Case': 'Ceramic back cover with integrated optical heart rate sensor array. Features 4 photodiodes and 2 LED clusters for continuous health monitoring.',
  'Battery': 'A 590mAh lithium-polymer battery providing up to 18 hours of active use. Supports wireless Qi charging and fast-charge capability (80% in 45 minutes).',
  'PCB': 'Multi-layer printed circuit board housing the S9 SiP (System in Package) with 64-bit dual-core processor, W3 wireless chip, U2 UWB chip, and 1GB RAM.',
  'Strap Top': 'Premium fluoroelastomer sport band, top segment. Hypoallergenic, sweat-resistant material with a smooth matte finish. Features quick-release spring bars.',
  'Strap Bottom': 'Premium fluoroelastomer sport band, bottom segment. Includes the pin-and-tuck closure mechanism with multiple adjustment holes for a secure fit.'
};

// ─── Parts Array ───
const parts = [];

// Helper to create and register a part
function createPart(name, geometry, material, assembledPos, explodeDir, explodeDist) {
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.copy(assembledPos);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData = {
    name,
    assembledPos: assembledPos.clone(),
    explodeDir: explodeDir.clone().normalize(),
    explodeDist,
    selected: false,
    currentPos: assembledPos.clone(),
    targetPos: assembledPos.clone()
  };
  scene.add(mesh);
  parts.push(mesh);
  return mesh;
}

// ─── Materials ───
const bodyMaterial = new THREE.MeshPhysicalMaterial({
  color: 0x888899,
  metalness: 0.95,
  roughness: 0.15,
  clearcoat: 0.8,
  clearcoatRoughness: 0.1,
  reflectivity: 1.0
});

const screenMaterial = new THREE.MeshPhysicalMaterial({
  color: 0x112244,
  emissive: 0x1144aa,
  emissiveIntensity: 0.8,
  metalness: 0.0,
  roughness: 0.05,
  transmission: 0.3,
  thickness: 0.1,
  clearcoat: 1.0,
  clearcoatRoughness: 0.0,
  ior: 1.5
});

const crownMaterial = new THREE.MeshPhysicalMaterial({
  color: 0xaaaabb,
  metalness: 0.95,
  roughness: 0.1,
  clearcoat: 1.0,
  clearcoatRoughness: 0.05
});

const backCaseMaterial = new THREE.MeshPhysicalMaterial({
  color: 0x666677,
  metalness: 0.8,
  roughness: 0.2,
  clearcoat: 0.5
});

const batteryMaterial = new THREE.MeshStandardMaterial({
  color: 0x333333,
  metalness: 0.3,
  roughness: 0.6
});

const pcbMaterial = new THREE.MeshStandardMaterial({
  color: 0x1a6b2a,
  metalness: 0.3,
  roughness: 0.5,
  emissive: 0x0a3310,
  emissiveIntensity: 0.2
});

const strapMaterial = new THREE.MeshPhysicalMaterial({
  color: 0x222222,
  metalness: 0.0,
  roughness: 0.85,
  clearcoat: 0.1,
  sheen: 0.5,
  sheenColor: new THREE.Color(0x333344)
});

// ─── (1) Watch Body ───
const bodyRadius = 1.0;
const bodyHeight = 0.35;
const bodyGeo = new THREE.CylinderGeometry(bodyRadius, bodyRadius, bodyHeight, 64);
const watchBody = createPart(
  'Watch Body', bodyGeo, bodyMaterial,
  new THREE.Vector3(0, 0, 0),
  new THREE.Vector3(0, 0, 0),
  0
);
// Add a bezel ring
const bezelGeo = new THREE.TorusGeometry(bodyRadius, 0.05, 16, 64);
const bezelMat = new THREE.MeshPhysicalMaterial({
  color: 0x999aaa,
  metalness: 1.0,
  roughness: 0.05,
  clearcoat: 1.0
});
const bezel = new THREE.Mesh(bezelGeo, bezelMat);
bezel.rotation.x = Math.PI / 2;
bezel.position.y = bodyHeight / 2;
watchBody.add(bezel);

// ─── (2) Screen ───
const screenGeo = new THREE.CircleGeometry(bodyRadius * 0.88, 64);
const screen = createPart(
  'Screen', screenGeo, screenMaterial,
  new THREE.Vector3(0, bodyHeight / 2 + 0.01, 0),
  new THREE.Vector3(0, 1, 0),
  2.0
);
screen.rotation.x = -Math.PI / 2;

// Add screen details - simulated watch face elements
const screenDetailGroup = new THREE.Group();
// Hour markers
for (let i = 0; i < 12; i++) {
  const angle = (i / 12) * Math.PI * 2;
  const markerGeo = new THREE.BoxGeometry(0.02, 0.08, 0.005);
  const markerMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, emissive: 0x4488cc, emissiveIntensity: 1.0 });
  const marker = new THREE.Mesh(markerGeo, markerMat);
  const r = bodyRadius * 0.75;
  marker.position.set(Math.sin(angle) * r, Math.cos(angle) * r, 0.005);
  marker.rotation.z = -angle;
  screenDetailGroup.add(marker);
}
screen.add(screenDetailGroup);

// ─── (3) Crown ───
const crownGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.25, 32);
const crown = createPart(
  'Crown', crownGeo, crownMaterial,
  new THREE.Vector3(bodyRadius + 0.12, 0, 0),
  new THREE.Vector3(1, 0.3, 0),
  2.5
);
crown.rotation.z = Math.PI / 2;
// Add ridges to crown
const crownRidgeGeo = new THREE.TorusGeometry(0.08, 0.01, 8, 32);
for (let i = 0; i < 5; i++) {
  const ridge = new THREE.Mesh(crownRidgeGeo, crownMaterial);
  ridge.position.y = -0.1 + i * 0.05;
  crown.add(ridge);
}

// ─── (4) Back Case ───
const backCaseGeo = new THREE.CylinderGeometry(bodyRadius * 0.95, bodyRadius * 0.95, 0.08, 64);
const backCase = createPart(
  'Back Case', backCaseGeo, backCaseMaterial,
  new THREE.Vector3(0, -bodyHeight / 2 - 0.04, 0),
  new THREE.Vector3(0, -1, 0),
  2.5
);
// Add sensor bumps on back
const sensorGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.03, 16);
const sensorMat = new THREE.MeshStandardMaterial({ color: 0x224422, emissive: 0x113311, emissiveIntensity: 0.5, metalness: 0.5, roughness: 0.3 });
const sensorPositions = [
  [0, 0], [0.2, 0], [-0.2, 0], [0, 0.2], [0, -0.2]
];
sensorPositions.forEach(([x, z]) => {
  const sensor = new THREE.Mesh(sensorGeo, sensorMat);
  sensor.position.set(x, -0.05, z);
  backCase.add(sensor);
});

// ─── (5) Battery ───
const batteryGeo = new THREE.BoxGeometry(0.8, 0.12, 0.6);
// Round the edges slightly by using a slightly modified approach
const battery = createPart(
  'Battery', batteryGeo, batteryMaterial,
  new THREE.Vector3(0, -0.06, 0),
  new THREE.Vector3(0.3, -1, 0.3),
  3.0
);
// Battery label
const labelGeo = new THREE.PlaneGeometry(0.5, 0.08);
const labelMat = new THREE.MeshStandardMaterial({ color: 0x666666, emissive: 0x222222, emissiveIntensity: 0.3 });
const label = new THREE.Mesh(labelGeo, labelMat);
label.position.y = 0.061;
label.rotation.x = -Math.PI / 2;
battery.add(label);

// ─── (6) PCB ───
const pcbGeo = new THREE.BoxGeometry(1.2, 0.06, 0.9);
const pcb = createPart(
  'PCB', pcbGeo, pcbMaterial,
  new THREE.Vector3(0, 0.04, 0),
  new THREE.Vector3(-0.3, -0.8, -0.3),
  3.5
);
// Add chip components on PCB
const chipGeo = new THREE.BoxGeometry(0.2, 0.04, 0.2);
const chipMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8, roughness: 0.3 });
const chipPositions = [
  [0, 0.05, 0], [0.3, 0.05, 0.2], [-0.3, 0.05, -0.1], [0.2, 0.05, -0.25]
];
chipPositions.forEach(([x, y, z]) => {
  const chip = new THREE.Mesh(chipGeo, chipMat);
  chip.position.set(x, y, z);
  pcb.add(chip);
});
// Traces
const traceGeo = new THREE.BoxGeometry(0.8, 0.005, 0.01);
const traceMat = new THREE.MeshStandardMaterial({ color: 0xccaa44, metalness: 0.9, roughness: 0.2 });
for (let i = 0; i < 6; i++) {
  const trace = new THREE.Mesh(traceGeo, traceMat);
  trace.position.set(0, 0.031, -0.3 + i * 0.12);
  pcb.add(trace);
}

// ─── (7) Strap Top ───
function createStrapGeometry(length, curveUp) {
  const shape = new THREE.Shape();
  const w = 0.35;
  const t = 0.08;
  shape.moveTo(-w / 2, -t / 2);
  shape.lineTo(w / 2, -t / 2);
  shape.lineTo(w / 2, t / 2);
  shape.lineTo(-w / 2, t / 2);
  shape.lineTo(-w / 2, -t / 2);

  const curve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(0, curveUp * 0.15, length * 0.3),
    new THREE.Vector3(0, curveUp * 0.4, length * 0.6),
    new THREE.Vector3(0, curveUp * 0.8, length * 0.85),
    new THREE.Vector3(0, curveUp * 1.0, length)
  ]);

  const extrudeSettings = {
    steps: 30,
    extrudePath: curve
  };

  return new THREE.ExtrudeGeometry(shape, extrudeSettings);
}

const strapTopGeo = createStrapGeometry(2.0, -0.5);
const strapTop = createPart(
  'Strap Top', strapTopGeo, strapMaterial.clone(),
  new THREE.Vector3(0, 0, -bodyRadius),
  new THREE.Vector3(0, 0.5, -1),
  2.5
);
strapTop.rotation.x = 0;

// Add strap holes
const holeGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.1, 8);
const holeMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.5, roughness: 0.5 });
for (let i = 0; i < 6; i++) {
  const hole = new THREE.Mesh(holeGeo, holeMat);
  hole.rotation.x = Math.PI / 2;
  hole.position.set(0, -0.3 - i * 0.15, 0.8 + i * 0.2);
  strapTop.add(hole);
}

// ─── (8) Strap Bottom ───
const strapBottomGeo = createStrapGeometry(2.0, -0.5);
const strapBottom = createPart(
  'Strap Bottom', strapBottomGeo, strapMaterial.clone(),
  new THREE.Vector3(0, 0, bodyRadius),
  new THREE.Vector3(0, 0.5, 1),
  2.5
);
strapBottom.rotation.y = Math.PI;

// Add buckle
const buckleGeo = new THREE.BoxGeometry(0.38, 0.04, 0.15);
const buckleMat = new THREE.MeshPhysicalMaterial({ color: 0x999999, metalness: 0.95, roughness: 0.1 });
const buckle = new THREE.Mesh(buckleGeo, buckleMat);
buckle.position.set(0, -0.25, 0.6);
strapBottom.add(buckle);

// ─── Explode Logic ───
let currentExplode = 0;
let targetExplode = 0;

const slider = document.getElementById('explodeSlider');
slider.addEventListener('input', (e) => {
  targetExplode = parseFloat(e.target.value);
});

function updateExplode() {
  // Smooth interpolation
  currentExplode += (targetExplode - currentExplode) * 0.08;
  if (Math.abs(currentExplode - targetExplode) < 0.0001) {
    currentExplode = targetExplode;
  }

  parts.forEach(part => {
    const ud = part.userData;
    const target = new THREE.Vector3().copy(ud.assembledPos).addScaledVector(ud.explodeDir, ud.explodeDist * currentExplode);
    ud.targetPos.copy(target);
    // Smooth position interpolation
    ud.currentPos.lerp(ud.targetPos, 0.15);
    part.position.copy(ud.currentPos);
  });
}

// ─── Raycaster / Selection ───
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedMesh = null;

const originalEmissives = new Map();
parts.forEach(p => {
  originalEmissives.set(p, {
    emissive: p.material.emissive ? p.material.emissive.clone() : new THREE.Color(0),
    emissiveIntensity: p.material.emissiveIntensity || 0
  });
});

function selectPart(mesh) {
  // Deselect previous
  if (selectedMesh) {
    const orig = originalEmissives.get(selectedMesh);
    if (orig && selectedMesh.material.emissive) {
      selectedMesh.material.emissive.copy(orig.emissive);
      selectedMesh.material.emissiveIntensity = orig.emissiveIntensity;
    }
    selectedMesh.userData.selected = false;
  }

  selectedMesh = mesh;

  if (mesh) {
    mesh.userData.selected = true;
    if (mesh.material.emissive) {
      mesh.material.emissive.set(0x4fc3f7);
      mesh.material.emissiveIntensity = 0.6;
    }
    document.getElementById('partInfoName').textContent = mesh.userData.name;
    document.getElementById('partInfoDesc').textContent = partDescriptions[mesh.userData.name] || '';
  } else {
    document.getElementById('partInfoName').textContent = 'No part selected';
    document.getElementById('partInfoDesc').textContent = 'Click on a part to see its details.';
  }
}

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(parts, true);

  if (intersects.length > 0) {
    // Find the root part mesh
    let target = intersects[0].object;
    while (target.parent && !parts.includes(target)) {
      target = target.parent;
    }
    if (parts.includes(target)) {
      selectPart(target);
    }
  } else {
    selectPart(null);
  }
});

// ─── Auto Rotate Button ───
const autoRotateBtn = document.getElementById('autoRotateBtn');
autoRotateBtn.addEventListener('click', () => {
  controls.autoRotate = !controls.autoRotate;
  autoRotateBtn.classList.toggle('active', controls.autoRotate);
  autoRotateBtn.textContent = controls.autoRotate ? '⏹ Stop Rotate' : '🔄 Auto Rotate';
});

// ─── State ───
function updateState() {
  const state = {
    partCount: parts.length,
    parts: parts.map(p => ({
      name: p.userData.name,
      x: parseFloat(p.position.x.toFixed(3)),
      y: parseFloat(p.position.y.toFixed(3)),
      z: parseFloat(p.position.z.toFixed(3)),
      selected: p.userData.selected
    })),
    explodeValue: parseFloat(currentExplode.toFixed(2)),
    selectedPart: selectedMesh ? selectedMesh.userData.name : null,
    autoRotate: controls.autoRotate
  };
  window.__3D_STATE__ = state;

  // Update HUD
  document.getElementById('partCount').textContent = state.partCount;
  document.getElementById('selectedPart').textContent = state.selectedPart || '—';
  document.getElementById('explodePct').textContent = (currentExplode * 100).toFixed(1);
}

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Animation Loop ───
function animate() {
  requestAnimationFrame(animate);

  updateExplode();
  controls.update();
  updateState();

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
