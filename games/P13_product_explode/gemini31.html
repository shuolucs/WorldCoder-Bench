<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartwatch 3D Exploded View</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 300px;
            background: rgba(30, 30, 30, 0.85);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 18px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }
        .control-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #aaa;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        button:hover {
            background: #45a049;
        }
        #partInfo {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 6px;
            min-height: 60px;
            font-size: 14px;
            line-height: 1.5;
        }
        .info-title {
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 5px;
        }
        #hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            color: #ddd;
            pointer-events: none;
            display: flex;
            gap: 20px;
        }
        .hud-item span {
            font-weight: bold;
            color: #fff;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-panel">
        <h2>Smartwatch Assembly</h2>
        
        <div class="control-group">
            <label for="explodeSlider">Explode View</label>
            <input type="range" id="explodeSlider" min="0" max="1" step="0.01" value="0">
        </div>
        
        <div class="control-group">
            <button id="autoRotateBtn">Toggle Auto-Rotate (ON)</button>
        </div>

        <div id="partInfo">
            <div class="info-title">Interactive View</div>
            <div>Click on any part to view details.</div>
        </div>
    </div>

    <div id="hud">
        <div class="hud-item">Parts: <span id="partCount">0</span></div>
        <div class="hud-item">Selected: <span id="selectedPart">—</span></div>
        <div class="hud-item">Explode: <span id="explodePct">0</span>%</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            partCount: 8,
            parts: [],
            explodeValue: 0,
            selectedPart: null,
            autoRotate: true
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(6, 5, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = window.__3D_STATE__.autoRotate;
        controls.autoRotateSpeed = 1.5;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0x90b0d0, 0.8);
        fillLight.position.set(-5, 0, -5);
        scene.add(fillLight);

        // --- Materials ---
        const matMetal = new THREE.MeshStandardMaterial({ 
            color: 0x888888, metalness: 0.9, roughness: 0.2 
        });
        const matScreen = new THREE.MeshPhysicalMaterial({ 
            color: 0x050505, metalness: 0.1, roughness: 0.1, 
            clearcoat: 1.0, clearcoatRoughness: 0.1,
            emissive: 0x001122, emissiveIntensity: 1
        });
        const matBack = new THREE.MeshStandardMaterial({ 
            color: 0x222222, metalness: 0.3, roughness: 0.8 
        });
        const matBattery = new THREE.MeshStandardMaterial({ 
            color: 0xcccccc, metalness: 0.6, roughness: 0.4 
        });
        const matPCB = new THREE.MeshStandardMaterial({ 
            color: 0x005522, metalness: 0.2, roughness: 0.7 
        });
        const matRubber = new THREE.MeshStandardMaterial({ 
            color: 0x111111, metalness: 0.0, roughness: 0.9 
        });

        // --- Modeling Parts ---
        const watchGroup = new THREE.Group();
        scene.add(watchGroup);
        const partsData = [];

        function createPart(name, geometry, material, basePos, explodeDir, explodeDist, desc) {
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.copy(basePos);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData = { 
                name, 
                basePos: basePos.clone(), 
                explodeDir: explodeDir.normalize(), 
                explodeDist, 
                desc,
                originalEmissive: material.emissive ? material.emissive.clone() : new THREE.Color(0x000000)
            };
            watchGroup.add(mesh);
            partsData.push(mesh);
            return mesh;
        }

        // 1. Watch Body
        const bodyGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.5, 64);
        createPart("Watch Body", bodyGeo, matMetal, 
            new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, 0), 0, 
            "Aerospace-grade aluminum alloy chassis providing structural integrity."
        );

        // 2. Screen
        const screenGeo = new THREE.CylinderGeometry(1.4, 1.4, 0.05, 64);
        createPart("Screen", screenGeo, matScreen, 
            new THREE.Vector3(0, 0.275, 0), new THREE.Vector3(0, 1, 0), 2.5, 
            "AMOLED display with sapphire crystal glass for scratch resistance."
        );

        // 3. Crown
        const crownGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.2, 32);
        crownGeo.rotateZ(Math.PI / 2);
        createPart("Crown", crownGeo, matMetal, 
            new THREE.Vector3(1.55, 0, 0), new THREE.Vector3(1, 0, 0), 1.5, 
            "Haptic feedback digital crown for precise navigation."
        );

        // 4. Back Case
        const backGeo = new THREE.CylinderGeometry(1.4, 1.4, 0.1, 64);
        createPart("Back Case", backGeo, matBack, 
            new THREE.Vector3(0, -0.3, 0), new THREE.Vector3(0, -1, 0), 2.5, 
            "Ceramic back panel housing biometric sensors."
        );

        // 5. Battery
        const batteryGeo = new THREE.BoxGeometry(1.2, 0.15, 1.2);
        createPart("Battery", batteryGeo, matBattery, 
            new THREE.Vector3(0, -0.1, 0), new THREE.Vector3(0, -1, 0), 1.2, 
            "High-density lithium-ion cell providing 48-hour battery life."
        );

        // 6. PCB
        const pcbGeo = new THREE.BoxGeometry(1.3, 0.05, 1.3);
        createPart("Circuit Board (PCB)", pcbGeo, matPCB, 
            new THREE.Vector3(0, 0.1, 0), new THREE.Vector3(0, 1, 0), 1.2, 
            "Main logic board featuring the central processing unit and memory."
        );

        // Strap Geometry Generator
        function createStrapGeo() {
            const shape = new THREE.Shape();
            shape.moveTo(-0.7, 0);
            shape.lineTo(0.7, 0);
            shape.lineTo(0.6, 2.5);
            shape.lineTo(-0.6, 2.5);
            shape.lineTo(-0.7, 0);
            const extrudeSettings = { depth: 0.1, bevelEnabled: true, bevelSegments: 2, steps: 2, bevelSize: 0.05, bevelThickness: 0.05 };
            const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            geo.center();
            return geo;
        }

        // 7. Strap Top
        const strapTopGeo = createStrapGeo();
        strapTopGeo.rotateX(Math.PI / 2 + 0.2);
        createPart("Top Strap", strapTopGeo, matRubber, 
            new THREE.Vector3(0, -0.2, -2.5), new THREE.Vector3(0, 0, -1), 2.0, 
            "Hypoallergenic fluoroelastomer band with pin-and-tuck closure."
        );

        // 8. Strap Bottom
        const strapBottomGeo = createStrapGeo();
        strapBottomGeo.rotateX(Math.PI / 2 - 0.2);
        createPart("Bottom Strap", strapBottomGeo, matRubber, 
            new THREE.Vector3(0, -0.2, 2.5), new THREE.Vector3(0, 0, 1), 2.0, 
            "Durable and comfortable bottom strap segment."
        );

        // --- Interaction & Logic ---
        let targetExplode = 0;
        let currentExplode = 0;
        let selectedMesh = null;

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // DOM Elements
        const slider = document.getElementById('explodeSlider');
        const autoRotateBtn = document.getElementById('autoRotateBtn');
        const partInfo = document.getElementById('partInfo');
        const hudPartCount = document.getElementById('partCount');
        const hudSelectedPart = document.getElementById('selectedPart');
        const hudExplodePct = document.getElementById('explodePct');

        hudPartCount.textContent = window.__3D_STATE__.partCount;

        slider.addEventListener('input', (e) => {
            targetExplode = parseFloat(e.target.value);
        });

        autoRotateBtn.addEventListener('click', () => {
            controls.autoRotate = !controls.autoRotate;
            window.__3D_STATE__.autoRotate = controls.autoRotate;
            autoRotateBtn.textContent = `Toggle Auto-Rotate (${controls.autoRotate ? 'ON' : 'OFF'})`;
        });

        window.addEventListener('pointerdown', (event) => {
            if (event.target.closest('#ui-panel')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(watchGroup.children);

            if (selectedMesh) {
                selectedMesh.material.emissive.copy(selectedMesh.userData.originalEmissive);
            }

            if (intersects.length > 0) {
                selectedMesh = intersects[0].object;
                selectedMesh.material.emissive.setHex(0x335533); // Highlight color
                
                const data = selectedMesh.userData;
                partInfo.innerHTML = `<div class="info-title">${data.name}</div><div>${data.desc}</div>`;
                hudSelectedPart.textContent = data.name;
                window.__3D_STATE__.selectedPart = data.name;
            } else {
                selectedMesh = null;
                partInfo.innerHTML = `<div class="info-title">Interactive View</div><div>Click on any part to view details.</div>`;
                hudSelectedPart.textContent = "—";
                window.__3D_STATE__.selectedPart = null;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Smooth interpolation for explosion
            currentExplode += (targetExplode - currentExplode) * 0.1;

            // Update HUD & State
            const pct = Math.round(currentExplode * 100);
            hudExplodePct.textContent = pct;
            window.__3D_STATE__.explodeValue = currentExplode;
            window.__3D_STATE__.parts = [];

            // Update part positions
            partsData.forEach(mesh => {
                const data = mesh.userData;
                const offset = data.explodeDir.clone().multiplyScalar(data.explodeDist * currentExplode);
                mesh.position.copy(data.basePos).add(offset);

                // Populate state
                window.__3D_STATE__.parts.push({
                    name: data.name,
                    x: mesh.position.x,
                    y: mesh.position.y,
                    z: mesh.position.z,
                    selected: mesh === selectedMesh
                });
            });

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
