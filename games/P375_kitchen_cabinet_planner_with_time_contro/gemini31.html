<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Kitchen Cabinet Planner</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .ui-panel {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            pointer-events: auto;
            z-index: 10;
        }
        #titleBar {
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(30, 30, 30, 0.9);
            color: white;
            text-align: center;
            padding: 10px 0;
            font-size: 20px;
            font-weight: bold;
            z-index: 20;
            position: absolute;
            box-sizing: border-box;
        }
        #timeControl {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 300px;
        }
        #timeSlider {
            width: 100%;
            margin-bottom: 5px;
        }
        #timeLabel {
            font-weight: bold;
            font-size: 16px;
        }
        #cabinetPanel {
            top: 60px;
            right: 20px;
        }
        #colorPalette {
            top: 60px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .color-swatch {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #ccc;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .color-swatch:hover {
            transform: scale(1.1);
        }
        #costPanel {
            bottom: 20px;
            right: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        .label-text {
            margin-bottom: 5px;
            font-size: 14px;
            color: #333;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="titleBar">Kitchen Cabinet Planner</div>
    
    <div id="timeControl" class="ui-panel">
        <input type="range" id="timeSlider" min="0" max="24" step="0.5" value="12">
        <div id="timeLabel">12:00</div>
    </div>

    <div id="cabinetPanel" class="ui-panel">
        <div class="label-text">Cabinets Open: <span id="openCountLabel">0/3</span></div>
        <div class="label-text">Selected Cabinet: <span id="selectedCabinetLabel">None</span></div>
    </div>

    <div id="colorPalette" class="ui-panel">
        <div class="label-text">Colors</div>
        <div class="color-swatch" data-color="#8B6914" style="background-color: #8B6914;" title="Oak"></div>
        <div class="color-swatch" data-color="#654321" style="background-color: #654321;" title="Walnut"></div>
        <div class="color-swatch" data-color="#F5F5F5" style="background-color: #F5F5F5;" title="White"></div>
        <div class="color-swatch" data-color="#1B1B3A" style="background-color: #1B1B3A;" title="Navy"></div>
    </div>

    <div id="costPanel" class="ui-panel">
        Total: $<span id="totalCostLabel">0</span>
    </div>

    <div id="instructions">
        Left Click: Rotate Camera / Select Cabinet / Open Door<br>
        Right Click: Pan Camera<br>
        Scroll: Zoom<br>
        Keys 1, 2, 3: Toggle Base Cabinets
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            timeOfDay: 12,
            ambientIntensity: 0.7,
            directionalIntensity: 1.0,
            cabinetDoors: [false, false, false],
            openCount: 0,
            selectedCabinet: -1,
            cabinetColors: ['#654321', '#654321', '#654321', '#654321', '#654321'],
            totalCost: 0,
            soldierLoaded: false,
            soldierPosition: { x: 3, y: 0, z: 3 },
            cameraPosition: { x: 5, y: 4, z: 8 },
            frameCount: 0
        };

        const colorCosts = {
            '#8b6914': 0,
            '#654321': 25,
            '#f5f5f5': 50,
            '#1b1b3a': 75
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Default sky, will be overridden by lighting

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 4, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1, 0);
        controls.update();

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        const kitchenLight = new THREE.PointLight(0xffffaa, 0, 10);
        kitchenLight.position.set(0, 3.5, -2);
        kitchenLight.castShadow = true;
        scene.add(kitchenLight);

        // --- Room Construction ---
        const roomGroup = new THREE.Group();
        scene.add(roomGroup);

        // Floor (10x10, #8B7355)
        const floorGeo = new THREE.PlaneGeometry(10, 10);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        roomGroup.add(floor);

        // Back Wall (10x4, #FFF8DC)
        const backWallGeo = new THREE.PlaneGeometry(10, 4);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xFFF8DC, roughness: 0.9 });
        const backWall = new THREE.Mesh(backWallGeo, wallMat);
        backWall.position.set(0, 2, -5);
        backWall.receiveShadow = true;
        roomGroup.add(backWall);

        // Left Wall (10x4, #FFF8DC)
        const leftWallGeo = new THREE.PlaneGeometry(10, 4);
        const leftWall = new THREE.Mesh(leftWallGeo, wallMat);
        leftWall.rotation.y = Math.PI / 2;
        leftWall.position.set(-5, 2, 0);
        leftWall.receiveShadow = true;
        roomGroup.add(leftWall);

        // --- Cabinets ---
        const cabinets = [];
        const interactableObjects = [];

        function createCabinet(w, h, d, color, doorColor, isBase, index) {
            const group = new THREE.Group();
            
            // Body
            const bodyGeo = new THREE.BoxGeometry(w, h, d);
            const bodyMat = new THREE.MeshStandardMaterial({ color: color });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            // Shift body so origin is bottom-center-back
            body.position.set(0, h/2, d/2);
            body.castShadow = true;
            body.receiveShadow = true;
            body.userData = { isBody: true, index: index, parentCabinet: group };
            group.add(body);
            interactableObjects.push(body);

            // Door Pivot (Left edge)
            const pivot = new THREE.Group();
            pivot.position.set(-w/2, h/2, d);
            group.add(pivot);

            // Door
            const doorGeo = new THREE.BoxGeometry(w, h, 0.05);
            const doorMat = new THREE.MeshStandardMaterial({ color: doorColor });
            const door = new THREE.Mesh(doorGeo, doorMat);
            door.position.set(w/2, 0, 0.025);
            door.castShadow = true;
            door.receiveShadow = true;
            door.userData = { isDoor: true, index: index, parentCabinet: group };
            pivot.add(door);
            if (isBase) interactableObjects.push(door);

            group.userData = {
                index: index,
                isBase: isBase,
                bodyMat: bodyMat,
                doorMat: doorMat,
                pivot: pivot,
                isOpen: false,
                targetRotation: 0
            };

            return group;
        }

        // Base Cabinets (x = -2, 0, 2; y = 0; z = -5)
        const basePositions = [-2, 0, 2];
        for (let i = 0; i < 3; i++) {
            const cab = createCabinet(1.2, 0.9, 0.6, 0x654321, 0x8B6914, true, i);
            cab.position.set(basePositions[i], 0, -5);
            scene.add(cab);
            cabinets.push(cab);
        }

        // Wall Cabinets (x = -1, 1; y = 2.5; z = -5)
        const wallPositions = [-1, 1];
        for (let i = 0; i < 2; i++) {
            const cab = createCabinet(1.5, 0.8, 0.4, 0x654321, 0x8B6914, false, i + 3);
            cab.position.set(wallPositions[i], 2.5, -5);
            scene.add(cab);
            cabinets.push(cab);
        }

        // Countertop (8w x 0.05h x 0.7d, y=0.925)
        const counterGeo = new THREE.BoxGeometry(8, 0.05, 0.7);
        const counterMat = new THREE.MeshStandardMaterial({ color: 0xD4C5A9, roughness: 0.2, metalness: 0.1 });
        const counter = new THREE.Mesh(counterGeo, counterMat);
        counter.position.set(0, 0.925, -4.65);
        counter.castShadow = true;
        counter.receiveShadow = true;
        scene.add(counter);

        // --- Soldier Model ---
        let mixer;
        const loader = new GLTFLoader();
        loader.load('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/models/gltf/Soldier.glb', function (gltf) {
            const model = gltf.scene;
            model.scale.set(1.5, 1.5, 1.5);
            model.position.set(3, 0, 3);
            
            model.traverse(function (object) {
                if (object.isMesh) {
                    object.castShadow = true;
                    object.receiveShadow = true;
                }
            });
            
            scene.add(model);
            window.__3D_STATE__.soldierLoaded = true;

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                const action = mixer.clipAction(gltf.animations[0]);
                action.play();
            }
        });

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function toggleDoor(index) {
            if (index >= 0 && index < 3) {
                const cab = cabinets[index];
                cab.userData.isOpen = !cab.userData.isOpen;
                cab.userData.targetRotation = cab.userData.isOpen ? Math.PI / 2 : 0;
                window.__3D_STATE__.cabinetDoors[index] = cab.userData.isOpen;
                updateOpenCount();
            }
        }

        function selectCabinet(index) {
            window.__3D_STATE__.selectedCabinet = index;
            document.getElementById('selectedCabinetLabel').innerText = index !== -1 ? index : 'None';
            
            cabinets.forEach((cab, i) => {
                if (i === index) {
                    cab.userData.bodyMat.emissive.setHex(0x333333);
                } else {
                    cab.userData.bodyMat.emissive.setHex(0x000000);
                }
            });
        }

        function updateOpenCount() {
            const count = window.__3D_STATE__.cabinetDoors.filter(Boolean).length;
            window.__3D_STATE__.openCount = count;
            document.getElementById('openCountLabel').innerText = `${count}/3`;
        }

        function updateCost() {
            let total = 0;
            // Base cabinets: $200
            total += 3 * 200;
            // Wall cabinets: $150
            total += 2 * 150;

            // Surcharges
            window.__3D_STATE__.cabinetColors.forEach(color => {
                const hex = color.toLowerCase();
                if (colorCosts[hex] !== undefined) {
                    total += colorCosts[hex];
                }
            });

            window.__3D_STATE__.totalCost = total;
            document.getElementById('totalCostLabel').innerText = total;
        }

        window.addEventListener('pointerdown', (event) => {
            // Ignore clicks on UI
            if (event.target.closest('.ui-panel') || event.target.id === 'titleBar') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactableObjects);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                const data = object.userData;

                if (data.isDoor && data.parentCabinet.userData.isBase) {
                    toggleDoor(data.index);
                } else if (data.isBody) {
                    selectCabinet(data.index);
                }
            } else {
                selectCabinet(-1);
            }
        });

        window.addEventListener('keydown', (event) => {
            if (event.key === '1') toggleDoor(0);
            if (event.key === '2') toggleDoor(1);
            if (event.key === '3') toggleDoor(2);
        });

        // --- UI Event Listeners ---
        document.querySelectorAll('.color-swatch').forEach(swatch => {
            swatch.addEventListener('click', (e) => {
                const colorHex = e.target.getAttribute('data-color');
                const selIdx = window.__3D_STATE__.selectedCabinet;
                
                if (selIdx !== -1) {
                    const cab = cabinets[selIdx];
                    cab.userData.bodyMat.color.set(colorHex);
                    // Make door slightly lighter or same for simplicity, let's use same base color logic
                    cab.userData.doorMat.color.set(colorHex); 
                    
                    window.__3D_STATE__.cabinetColors[selIdx] = colorHex;
                    updateCost();
                }
            });
        });

        const timeSlider = document.getElementById('timeSlider');
        const timeLabel = document.getElementById('timeLabel');

        timeSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            window.__3D_STATE__.timeOfDay = val;
            
            const hours = Math.floor(val);
            const mins = Math.floor((val % 1) * 60);
            timeLabel.innerText = `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;
        });

        // --- Lighting Time-of-Day Logic ---
        const timeKeyframes = [
            { t: 0,  ambI: 0.1, ambC: new THREE.Color(0x111133), dirI: 0.0, dirC: new THREE.Color(0x000000), dirP: new THREE.Vector3(0, -5, 0), bg: new THREE.Color(0x050510) },
            { t: 6,  ambI: 0.3, ambC: new THREE.Color(0xffa500), dirI: 0.5, dirC: new THREE.Color(0xffa500), dirP: new THREE.Vector3(-10, 2, 5), bg: new THREE.Color(0xffb050) },
            { t: 12, ambI: 0.7, ambC: new THREE.Color(0xffffff), dirI: 1.0, dirC: new THREE.Color(0xffffff), dirP: new THREE.Vector3(0, 10, 5), bg: new THREE.Color(0x87CEEB) },
            { t: 18, ambI: 0.3, ambC: new THREE.Color(0xff6347), dirI: 0.5, dirC: new THREE.Color(0xff6347), dirP: new THREE.Vector3(10, 2, 5), bg: new THREE.Color(0xff8c69) },
            { t: 24, ambI: 0.1, ambC: new THREE.Color(0x111133), dirI: 0.0, dirC: new THREE.Color(0x000000), dirP: new THREE.Vector3(0, -5, 0), bg: new THREE.Color(0x050510) }
        ];

        function updateLighting(time) {
            let k1 = timeKeyframes[0], k2 = timeKeyframes[timeKeyframes.length - 1];
            for (let i = 0; i < timeKeyframes.length - 1; i++) {
                if (time >= timeKeyframes[i].t && time <= timeKeyframes[i+1].t) {
                    k1 = timeKeyframes[i];
                    k2 = timeKeyframes[i+1];
                    break;
                }
            }

            const factor = (time - k1.t) / (k2.t - k1.t || 1);

            ambientLight.intensity = THREE.MathUtils.lerp(k1.ambI, k2.ambI, factor);
            ambientLight.color.lerpColors(k1.ambC, k2.ambC, factor);

            dirLight.intensity = THREE.MathUtils.lerp(k1.dirI, k2.dirI, factor);
            dirLight.color.lerpColors(k1.dirC, k2.dirC, factor);
            dirLight.position.lerpVectors(k1.dirP, k2.dirP, factor);

            scene.background.lerpColors(k1.bg, k2.bg, factor);

            // Kitchen light logic (on at night)
            if (time < 5 || time > 19) {
                let intensity = 0.5;
                if (time >= 4 && time < 5) intensity = THREE.MathUtils.lerp(0.5, 0, time - 4);
                if (time > 19 && time <= 20) intensity = THREE.MathUtils.lerp(0, 0.5, time - 19);
                kitchenLight.intensity = intensity;
            } else {
                kitchenLight.intensity = 0;
            }

            window.__3D_STATE__.ambientIntensity = ambientLight.intensity;
            window.__3D_STATE__.directionalIntensity = dirLight.intensity;
        }

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize Cost
        updateCost();

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Update Soldier Animation
            if (mixer) mixer.update(delta);

            // Update Doors
            cabinets.forEach(cab => {
                if (cab.userData.isBase) {
                    cab.userData.pivot.rotation.y = THREE.MathUtils.lerp(
                        cab.userData.pivot.rotation.y,
                        cab.userData.targetRotation,
                        delta * 5
                    );
                }
            });

            // Update Lighting
            updateLighting(window.__3D_STATE__.timeOfDay);

            // Update State
            window.__3D_STATE__.cameraPosition = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
            window.__3D_STATE__.frameCount++;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
