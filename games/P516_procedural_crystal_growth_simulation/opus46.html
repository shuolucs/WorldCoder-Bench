<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crystal Growth Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    color: #aabbdd;
    font-size: 13px;
    line-height: 1.8;
    background: rgba(10, 10, 30, 0.75);
    padding: 15px 20px;
    border-radius: 8px;
    border: 1px solid rgba(100, 120, 180, 0.3);
    pointer-events: none;
    min-width: 220px;
  }
  #hud .label { color: #667799; }
  #hud .value { color: #ddeeff; font-weight: bold; }
  #hud .title { color: #9999cc; font-size: 15px; margin-bottom: 8px; border-bottom: 1px solid rgba(100,120,180,0.3); padding-bottom: 5px; }
  #btn-harvest {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 30px;
    background: linear-gradient(135deg, rgba(153, 102, 204, 0.6), rgba(51, 102, 204, 0.6));
    color: #ddeeff;
    border: 1px solid rgba(150, 130, 220, 0.5);
    border-radius: 25px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
  }
  #btn-harvest:hover {
    background: linear-gradient(135deg, rgba(153, 102, 204, 0.9), rgba(51, 102, 204, 0.9));
    box-shadow: 0 0 20px rgba(120, 100, 200, 0.5);
  }
  #controls-hint {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: #556677;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    text-align: center;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="hud">
  <div class="title">⬡ Crystal Growth Lab</div>
  <div><span class="label">Crystals: </span><span class="value" id="hud-count">0</span></div>
  <div><span class="label">Status: </span><span class="value" id="hud-status">Growing</span></div>
  <div><span class="label">Speed: </span><span class="value" id="hud-speed">1.0</span>x</div>
  <div><span class="label">Glow: </span><span class="value" id="hud-glow">OFF</span></div>
  <div><span class="label">Max Gen: </span><span class="value" id="hud-gen">0</span></div>
  <div><span class="label">Harvested: </span><span class="value" id="hud-harvested">0</span></div>
</div>

<button id="btn-harvest">⬡ Harvest Crystals ⬡</button>

<div id="controls-hint">
  Click: Plant | G: Pause | R: Reset | C: Burst | L: Glow | +/-: Speed | Shift+Scroll: Rotate
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Color palette
const CRYSTAL_PALETTE = {
  amethyst: { hex: '#9966cc', color: new THREE.Color('#9966cc') },
  quartz:   { hex: '#eeddff', color: new THREE.Color('#eeddff') },
  emerald:  { hex: '#33cc77', color: new THREE.Color('#33cc77') },
  ruby:     { hex: '#cc3355', color: new THREE.Color('#cc3355') },
  sapphire: { hex: '#3366cc', color: new THREE.Color('#3366cc') }
};
const PALETTE_NAMES = Object.keys(CRYSTAL_PALETTE);
let colorCycleIndex = 0;

// State
let growthActive = true;
let speedMultiplier = 1.0;
let glowMode = false;
let totalHarvested = 0;
let seedsPlanted = 0;
const crystals = [];
let baseLightIntensities = {};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.Fog(0x0a0a1a, 20, 80);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 18);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 2, 0);

// Lighting
const warmLight = new THREE.PointLight(0xffaa44, 1.5, 60);
warmLight.position.set(10, 15, 10);
scene.add(warmLight);

const coolLight = new THREE.PointLight(0x4488ff, 1.0, 60);
coolLight.position.set(-10, 12, -10);
scene.add(coolLight);

const ambientLight = new THREE.AmbientLight(0x222244, 0.3);
scene.add(ambientLight);

baseLightIntensities = {
  warm: 1.5,
  cool: 1.0,
  ambient: 0.3
};

// Crystal group
const crystalGroup = new THREE.Group();
scene.add(crystalGroup);

// Base platform
const baseGeom = new THREE.BoxGeometry(20, 0.5, 20);
const baseMat = new THREE.MeshStandardMaterial({ color: 0x333340, roughness: 0.9 });
const basePlatform = new THREE.Mesh(baseGeom, baseMat);
basePlatform.position.y = -0.25;
basePlatform.receiveShadow = true;
crystalGroup.add(basePlatform);

// Add some rocky texture bumps to the base
for (let i = 0; i < 40; i++) {
  const bumpGeom = new THREE.SphereGeometry(Math.random() * 0.3 + 0.1, 6, 4);
  const bumpMat = new THREE.MeshStandardMaterial({ color: 0x2a2a35, roughness: 0.95 });
  const bump = new THREE.Mesh(bumpGeom, bumpMat);
  bump.position.set(
    (Math.random() - 0.5) * 18,
    -0.1 + Math.random() * 0.1,
    (Math.random() - 0.5) * 18
  );
  bump.scale.y = 0.4;
  crystalGroup.add(bump);
}

// Particle system for growing crystals
const MAX_PARTICLES = 2000;
const particlePositions = new Float32Array(MAX_PARTICLES * 3);
const particleColors = new Float32Array(MAX_PARTICLES * 3);
const particleSizes = new Float32Array(MAX_PARTICLES);
const particleLifetimes = new Float32Array(MAX_PARTICLES);
const particleVelocities = new Float32Array(MAX_PARTICLES * 3);

for (let i = 0; i < MAX_PARTICLES; i++) {
  particlePositions[i * 3] = 0;
  particlePositions[i * 3 + 1] = -100;
  particlePositions[i * 3 + 2] = 0;
  particleSizes[i] = 0;
  particleLifetimes[i] = 0;
}

const particleGeom = new THREE.BufferGeometry();
particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeom.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
particleGeom.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

const particleMat = new THREE.PointsMaterial({
  size: 0.08,
  vertexColors: true,
  transparent: true,
  opacity: 0.7,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true
});

const particleSystem = new THREE.Points(particleGeom, particleMat);
scene.add(particleSystem);

let nextParticle = 0;

function emitParticle(position, color) {
  const i = nextParticle;
  nextParticle = (nextParticle + 1) % MAX_PARTICLES;

  particlePositions[i * 3] = position.x + (Math.random() - 0.5) * 0.3;
  particlePositions[i * 3 + 1] = position.y + Math.random() * 0.2;
  particlePositions[i * 3 + 2] = position.z + (Math.random() - 0.5) * 0.3;

  particleColors[i * 3] = color.r;
  particleColors[i * 3 + 1] = color.g;
  particleColors[i * 3 + 2] = color.b;

  particleSizes[i] = Math.random() * 0.1 + 0.03;
  particleLifetimes[i] = 1.0;

  particleVelocities[i * 3] = (Math.random() - 0.5) * 0.02;
  particleVelocities[i * 3 + 1] = Math.random() * 0.03 + 0.01;
  particleVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.02;
}

function updateParticles() {
  for (let i = 0; i < MAX_PARTICLES; i++) {
    if (particleLifetimes[i] > 0) {
      particleLifetimes[i] -= 0.015;
      particlePositions[i * 3] += particleVelocities[i * 3];
      particlePositions[i * 3 + 1] += particleVelocities[i * 3 + 1];
      particlePositions[i * 3 + 2] += particleVelocities[i * 3 + 2];
      particleSizes[i] *= 0.995;

      if (particleLifetimes[i] <= 0) {
        particlePositions[i * 3 + 1] = -100;
        particleSizes[i] = 0;
      }
    }
  }
  particleGeom.attributes.position.needsUpdate = true;
  particleGeom.attributes.color.needsUpdate = true;
  particleGeom.attributes.size.needsUpdate = true;
}

// Crystal creation
function createCrystalData(options) {
  const {
    x = 0, z = 0,
    baseRadius = Math.random() * 0.35 + 0.15,
    maxHeight = Math.random() * 3.0 + 2.0,
    growthRate = Math.random() * 0.03 + 0.01,
    colorName = PALETTE_NAMES[Math.floor(Math.random() * PALETTE_NAMES.length)],
    generation = 0,
    parentTip = null,
    tiltX = 0,
    tiltZ = 0
  } = options;

  const color = CRYSTAL_PALETTE[colorName].color.clone();

  // Create hexagonal prism
  const geom = new THREE.CylinderGeometry(baseRadius * 0.3, baseRadius, 1, 6);
  const mat = new THREE.MeshPhysicalMaterial({
    color: color,
    transmission: 0.6,
    roughness: 0.1,
    metalness: 0.1,
    clearcoat: 1.0,
    opacity: 0.85,
    transparent: true,
    side: THREE.DoubleSide
  });

  if (glowMode) {
    mat.emissive = color.clone();
    mat.emissiveIntensity = 0.4;
  }

  const mesh = new THREE.Mesh(geom, mat);

  // Position
  const baseY = parentTip ? parentTip.y : 0;
  const posX = parentTip ? parentTip.x : x;
  const posZ = parentTip ? parentTip.z : z;

  mesh.position.set(posX, baseY, posZ);
  mesh.rotation.x = tiltX;
  mesh.rotation.z = tiltZ;

  // Start tiny
  mesh.scale.y = 0.1 / 1;

  const crystalData = {
    mesh,
    baseRadius,
    currentHeight: 0.1,
    maxHeight,
    growthRate,
    colorName,
    color,
    generation,
    hasSpawned: false,
    baseY,
    posX,
    posZ,
    tiltX,
    tiltZ,
    fullyGrown: false,
    rotationOffset: Math.random() * Math.PI * 2
  };

  crystalGroup.add(mesh);
  crystals.push(crystalData);

  return crystalData;
}

function spawnChildCrystals(parent) {
  if (parent.hasSpawned) return;
  parent.hasSpawned = true;

  const numChildren = Math.floor(Math.random() * 2) + 1;

  for (let i = 0; i < numChildren; i++) {
    const angle = Math.random() * Math.PI * 2;
    const tiltAmount = (Math.random() * 15 + 15) * Math.PI / 180;
    const tiltX = Math.sin(angle) * tiltAmount;
    const tiltZ = Math.cos(angle) * tiltAmount;

    // Calculate tip position of parent
    const tipY = parent.baseY + parent.currentHeight * Math.cos(Math.abs(parent.tiltX) + Math.abs(parent.tiltZ));
    const offsetX = Math.sin(parent.tiltZ) * parent.currentHeight * 0.3;
    const offsetZ = -Math.sin(parent.tiltX) * parent.currentHeight * 0.3;

    createCrystalData({
      baseRadius: parent.baseRadius * (0.5 + Math.random() * 0.3),
      maxHeight: parent.maxHeight * (0.4 + Math.random() * 0.3),
      growthRate: parent.growthRate * (0.8 + Math.random() * 0.4),
      colorName: parent.colorName,
      generation: parent.generation + 1,
      parentTip: {
        x: parent.posX + offsetX + (Math.random() - 0.5) * 0.2,
        y: parent.baseY + parent.currentHeight * 0.9,
        z: parent.posZ + offsetZ + (Math.random() - 0.5) * 0.2
      },
      tiltX,
      tiltZ
    });
  }
}

// Initialize with 3 seed crystals
function initSeeds() {
  for (let i = 0; i < 3; i++) {
    createCrystalData({
      x: (Math.random() - 0.5) * 8,
      z: (Math.random() - 0.5) * 8,
      generation: 0
    });
  }
}

function removeAllCrystals() {
  for (let i = crystals.length - 1; i >= 0; i--) {
    crystalGroup.remove(crystals[i].mesh);
    crystals[i].mesh.geometry.dispose();
    crystals[i].mesh.material.dispose();
  }
  crystals.length = 0;
}

function resetSimulation() {
  removeAllCrystals();
  seedsPlanted = 0;
  colorCycleIndex = 0;
  initSeeds();
}

initSeeds();

// Raycasting for click
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(basePlatform);

  if (intersects.length > 0) {
    const point = intersects[0].point;
    // Transform point to crystalGroup local space
    const localPoint = crystalGroup.worldToLocal(point.clone());

    const colorName = PALETTE_NAMES[colorCycleIndex % PALETTE_NAMES.length];
    colorCycleIndex++;

    createCrystalData({
      x: localPoint.x,
      z: localPoint.z,
      colorName,
      generation: 0
    });
    seedsPlanted++;
  }
});

// Keyboard controls
document.addEventListener('keydown', (event) => {
  const key = event.key.toLowerCase();

  if (key === 'g') {
    growthActive = !growthActive;
  } else if (key === 'r') {
    resetSimulation();
  } else if (key === 'c') {
    // Crystallize burst
    for (const crystal of crystals) {
      if (crystal.currentHeight < crystal.maxHeight) {
        crystal.currentHeight = Math.max(crystal.currentHeight, crystal.maxHeight * 0.8);
      }
    }
  } else if (key === 'l') {
    glowMode = !glowMode;
    for (const crystal of crystals) {
      if (glowMode) {
        crystal.mesh.material.emissive = crystal.color.clone();
        crystal.mesh.material.emissiveIntensity = 0.4;
      } else {
        crystal.mesh.material.emissive = new THREE.Color(0x000000);
        crystal.mesh.material.emissiveIntensity = 0;
      }
    }
    // Adjust light intensities
    if (glowMode) {
      warmLight.intensity = baseLightIntensities.warm * 1.5;
      coolLight.intensity = baseLightIntensities.cool * 1.5;
    } else {
      warmLight.intensity = baseLightIntensities.warm;
      coolLight.intensity = baseLightIntensities.cool;
    }
  } else if (key === '+' || key === '=') {
    speedMultiplier = Math.min(3.0, speedMultiplier + 0.5);
  } else if (key === '-') {
    speedMultiplier = Math.max(0.5, speedMultiplier - 0.5);
  }
});

// Shift + scroll to rotate crystal group
renderer.domElement.addEventListener('wheel', (event) => {
  if (event.shiftKey) {
    event.preventDefault();
    crystalGroup.rotation.y += event.deltaY * 0.003;
  }
}, { passive: false });

// Harvest button
document.getElementById('btn-harvest').addEventListener('click', () => {
  for (let i = crystals.length - 1; i >= 0; i--) {
    const c = crystals[i];
    if (c.currentHeight >= c.maxHeight * 0.95) {
      crystalGroup.remove(c.mesh);
      c.mesh.geometry.dispose();
      c.mesh.material.dispose();
      crystals.splice(i, 1);
      totalHarvested++;
    }
  }
});

// Window resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// State
window.__3D_STATE__ = {
  crystalCount: 0,
  growthActive: true,
  speedMultiplier: 1.0,
  glowMode: false,
  maxGeneration: 0,
  totalHarvested: 0,
  tallestCrystalHeight: 0,
  averageCrystalHeight: 0,
  seedsPlanted: 0,
  crystalColors: {}
};

// HUD elements
const hudCount = document.getElementById('hud-count');
const hudStatus = document.getElementById('hud-status');
const hudSpeed = document.getElementById('hud-speed');
const hudGlow = document.getElementById('hud-glow');
const hudGen = document.getElementById('hud-gen');
const hudHarvested = document.getElementById('hud-harvested');

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  controls.update();

  let maxGen = 0;
  let tallest = 0;
  let totalHeight = 0;
  const colorCounts = {};

  for (const crystal of crystals) {
    // Subtle rotation
    crystal.mesh.rotation.y += 0.001;

    if (growthActive && crystal.currentHeight < crystal.maxHeight) {
      crystal.currentHeight += crystal.growthRate * speedMultiplier;
      if (crystal.currentHeight > crystal.maxHeight) {
        crystal.currentHeight = crystal.maxHeight;
      }

      // Update mesh scale
      crystal.mesh.scale.y = crystal.currentHeight;
      // Reposition so it grows upward from base
      crystal.mesh.position.y = crystal.baseY + crystal.currentHeight * 0.5;

      // Emit particles for growing crystals
      if (Math.random() < 0.15) {
        const worldPos = new THREE.Vector3();
        crystal.mesh.getWorldPosition(worldPos);
        worldPos.y += crystal.currentHeight * 0.5;
        emitParticle(worldPos, crystal.color);
      }

      // Check branching condition
      if (!crystal.hasSpawned && crystal.currentHeight >= crystal.maxHeight * 0.6 && crystal.generation < 4) {
        spawnChildCrystals(crystal);
      }
    }

    // Mark fully grown
    if (crystal.currentHeight >= crystal.maxHeight * 0.95) {
      crystal.fullyGrown = true;
    }

    // Stats
    if (crystal.generation > maxGen) maxGen = crystal.generation;
    if (crystal.currentHeight > tallest) tallest = crystal.currentHeight;
    totalHeight += crystal.currentHeight;

    if (!colorCounts[crystal.colorName]) colorCounts[crystal.colorName] = 0;
    colorCounts[crystal.colorName]++;
  }

  // Update particles
  updateParticles();

  // Update state
  const avgHeight = crystals.length > 0 ? totalHeight / crystals.length : 0;

  window.__3D_STATE__.crystalCount = crystals.length;
  window.__3D_STATE__.growthActive = growthActive;
  window.__3D_STATE__.speedMultiplier = speedMultiplier;
  window.__3D_STATE__.glowMode = glowMode;
  window.__3D_STATE__.maxGeneration = maxGen;
  window.__3D_STATE__.totalHarvested = totalHarvested;
  window.__3D_STATE__.tallestCrystalHeight = Math.round(tallest * 100) / 100;
  window.__3D_STATE__.averageCrystalHeight = Math.round(avgHeight * 100) / 100;
  window.__3D_STATE__.seedsPlanted = seedsPlanted;
  window.__3D_STATE__.crystalColors = colorCounts;

  // Update HUD
  hudCount.textContent = crystals.length;
  hudStatus.textContent = growthActive ? 'Growing' : 'Paused';
  hudStatus.style.color = growthActive ? '#44cc88' : '#cc6644';
  hudSpeed.textContent = speedMultiplier.toFixed(1);
  hudGlow.textContent = glowMode ? 'ON' : 'OFF';
  hudGlow.style.color = glowMode ? '#ffcc44' : '#667799';
  hudGen.textContent = maxGen;
  hudHarvested.textContent = totalHarvested;

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
