<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Crystal Growth</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(10, 10, 26, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333340;
            pointer-events: none;
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
            min-width: 150px;
        }
        #hud div {
            margin-bottom: 5px;
            font-size: 14px;
        }
        #hud span {
            font-weight: bold;
            color: #4488ff;
        }
        #btn-harvest {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #9966cc, #3366cc);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(51, 102, 204, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
            pointer-events: auto;
        }
        #btn-harvest:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 6px 20px rgba(51, 102, 204, 0.6);
        }
        #btn-harvest:active {
            transform: translateX(-50%) scale(0.95);
        }
        #controls-help {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #aaa;
            background: rgba(10, 10, 26, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333340;
            pointer-events: none;
            font-size: 12px;
            text-align: right;
        }
        #controls-help kbd {
            background: #222;
            padding: 2px 6px;
            border-radius: 4px;
            color: #fff;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div>Crystals: <span id="ui-count">0</span></div>
        <div>Status: <span id="ui-status">Growing</span></div>
        <div>Speed: <span id="ui-speed">1.0</span>x</div>
        <div>Glow Mode: <span id="ui-glow">OFF</span></div>
        <div>Max Gen: <span id="ui-gen">0</span></div>
        <div>Harvested: <span id="ui-harvested">0</span></div>
    </div>
    
    <div id="controls-help">
        <div>Click Base: Plant Seed</div>
        <div>Toggle Growth: <kbd>G</kbd></div>
        <div>Reset: <kbd>R</kbd></div>
        <div>Burst: <kbd>C</kbd></div>
        <div>Toggle Glow: <kbd>L</kbd></div>
        <div>Speed Up/Down: <kbd>+</kbd> / <kbd>-</kbd></div>
        <div>Rotate Group: <kbd>Shift</kbd> + Scroll</div>
    </div>

    <button id="btn-harvest">Harvest Crystals</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            crystalCount: 0,
            growthActive: true,
            speedMultiplier: 1.0,
            glowMode: false,
            maxGeneration: 0,
            totalHarvested: 0,
            tallestCrystalHeight: 0,
            averageCrystalHeight: 0,
            seedsPlanted: 0,
            crystalColors: {}
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.Fog(0x0a0a1a, 20, 80);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 18);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1; // Allow looking slightly below base

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x222244, 0.3);
        scene.add(ambientLight);

        const warmLight = new THREE.PointLight(0xffaa44, 1.5, 50);
        warmLight.position.set(10, 15, 10);
        scene.add(warmLight);

        const coolLight = new THREE.PointLight(0x4488ff, 1.0, 50);
        coolLight.position.set(-10, 12, -10);
        scene.add(coolLight);

        const origWarmInt = warmLight.intensity;
        const origCoolInt = coolLight.intensity;

        // --- Base Platform ---
        const baseGeo = new THREE.BoxGeometry(20, 0.5, 20);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x333340, roughness: 0.9 });
        const baseMesh = new THREE.Mesh(baseGeo, baseMat);
        baseMesh.position.y = -0.25;
        scene.add(baseMesh);

        // --- Crystal System ---
        const crystalGroup = new THREE.Group();
        scene.add(crystalGroup);

        const crystalGeo = new THREE.CylinderGeometry(1, 1, 1, 6);
        crystalGeo.translate(0, 0.5, 0); // Origin at bottom

        const palette = {
            amethyst: 0x9966cc,
            quartz: 0xeeddff,
            emerald: 0x33cc77,
            ruby: 0xcc3355,
            sapphire: 0x3366cc
        };
        const colorKeys = Object.keys(palette);
        const materials = {};

        for (let key of colorKeys) {
            materials[key] = new THREE.MeshPhysicalMaterial({
                color: palette[key],
                transmission: 0.6,
                roughness: 0.1,
                metalness: 0.1,
                clearcoat: 1.0,
                opacity: 0.85,
                transparent: true,
                side: THREE.DoubleSide
            });
        }

        let crystals = [];

        class Crystal {
            constructor(parentGroup, pos, quat, generation, colorName) {
                this.group = new THREE.Group();
                if (pos) this.group.position.copy(pos);
                if (quat) this.group.quaternion.copy(quat);
                parentGroup.add(this.group);

                this.mesh = new THREE.Mesh(crystalGeo, materials[colorName]);
                this.group.add(this.mesh);

                this.dummyTip = new THREE.Object3D();
                this.group.add(this.dummyTip);

                this.baseRadius = 0.15 + Math.random() * 0.35;
                this.maxHeight = 2.0 + Math.random() * 3.0;
                this.growthRate = 0.01 + Math.random() * 0.03;
                this.currentHeight = 0.1;
                this.generation = generation;
                this.hasBranched = false;
                this.colorName = colorName;
                this.children = [];

                this.mesh.scale.set(this.baseRadius, this.currentHeight, this.baseRadius);
                crystals.push(this);
            }

            update() {
                if (state.growthActive && this.currentHeight < this.maxHeight) {
                    this.currentHeight += this.growthRate * state.speedMultiplier;
                    if (this.currentHeight > this.maxHeight) this.currentHeight = this.maxHeight;
                    this.mesh.scale.set(this.baseRadius, this.currentHeight, this.baseRadius);
                }

                // Move children to current tip height
                this.children.forEach(child => {
                    child.group.position.y = this.currentHeight;
                });

                // Subtle rotation
                this.group.rotation.y += 0.001;

                // Branching logic
                if (state.growthActive && this.currentHeight >= this.maxHeight * 0.6 && !this.hasBranched) {
                    this.hasBranched = true;
                    const numChildren = Math.random() > 0.5 ? 2 : 1;
                    for (let i = 0; i < numChildren; i++) {
                        const tilt = THREE.MathUtils.degToRad(15 + Math.random() * 15);
                        const angle = Math.random() * Math.PI * 2;
                        
                        const dummyQuat = new THREE.Quaternion();
                        const euler = new THREE.Euler(tilt, angle, 0, 'YXZ');
                        dummyQuat.setFromEuler(euler);

                        const child = new Crystal(
                            this.group,
                            new THREE.Vector3(0, this.currentHeight, 0),
                            dummyQuat,
                            this.generation + 1,
                            this.colorName
                        );
                        this.children.push(child);
                    }
                }
            }
        }

        function spawnSeed(pos) {
            if (!pos) {
                pos = new THREE.Vector3((Math.random() - 0.5) * 16, 0, (Math.random() - 0.5) * 16);
            }
            const colorName = colorKeys[state.seedsPlanted % colorKeys.length];
            new Crystal(crystalGroup, pos, null, 0, colorName);
            state.seedsPlanted++;
        }

        // Initial seeds
        for (let i = 0; i < 3; i++) spawnSeed();

        // --- Particle System ---
        const pCount = 600;
        const pGeo = new THREE.BufferGeometry();
        const pPos = new Float32Array(pCount * 3);
        const pLife = new Float32Array(pCount);
        
        for(let i=0; i<pCount; i++) {
            pPos[i*3+1] = -1000; // hide initially
            pLife[i] = 0;
        }

        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        pGeo.setAttribute('life', new THREE.BufferAttribute(pLife, 1));

        const pMat = new THREE.ShaderMaterial({
            uniforms: { color: { value: new THREE.Color(0xffffff) } },
            vertexShader: `
                attribute float life;
                varying float vLife;
                void main() {
                    vLife = life;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = 6.0 * (10.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform vec3 color;
                varying float vLife;
                void main() {
                    if (vLife <= 0.0) discard;
                    vec2 coord = gl_PointCoord - vec2(0.5);
                    if(length(coord) > 0.5) discard;
                    gl_FragColor = vec4(color, vLife * 0.8);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particles = new THREE.Points(pGeo, pMat);
        scene.add(particles);
        let pIdx = 0;
        const tempVec = new THREE.Vector3();

        // --- Interactions ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(baseMesh);
            if (intersects.length > 0) {
                spawnSeed(intersects[0].point);
            }
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'g') {
                state.growthActive = !state.growthActive;
            } else if (key === 'r') {
                crystals.forEach(c => c.group.removeFromParent());
                crystals = [];
                state.seedsPlanted = 0;
                for (let i = 0; i < 3; i++) spawnSeed();
            } else if (key === 'c') {
                crystals.forEach(c => {
                    const target = c.maxHeight * 0.8;
                    if (c.currentHeight < target) c.currentHeight = target;
                });
            } else if (key === 'l') {
                state.glowMode = !state.glowMode;
                warmLight.intensity = state.glowMode ? origWarmInt * 1.5 : origWarmInt;
                coolLight.intensity = state.glowMode ? origCoolInt * 1.5 : origCoolInt;
                for (let k in materials) {
                    materials[k].emissive = state.glowMode ? new THREE.Color(palette[k]) : new THREE.Color(0x000000);
                    materials[k].emissiveIntensity = state.glowMode ? 0.4 : 0;
                }
            } else if (key === '+' || key === '=') {
                state.speedMultiplier = Math.min(3.0, state.speedMultiplier + 0.5);
            } else if (key === '-') {
                state.speedMultiplier = Math.max(0.5, state.speedMultiplier - 0.5);
            }
        });

        window.addEventListener('wheel', (e) => {
            if (e.shiftKey) {
                e.preventDefault();
                crystalGroup.rotation.y += e.deltaY * 0.005;
            }
        }, { passive: false });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Harvesting ---
        function removeCrystalAndChildren(c) {
            c.children.forEach(child => removeCrystalAndChildren(child));
            c.group.removeFromParent();
            crystals = crystals.filter(item => item !== c);
        }

        document.getElementById('btn-harvest').addEventListener('click', () => {
            const toHarvest = crystals.filter(c => c.currentHeight >= c.maxHeight * 0.95);
            let count = 0;
            toHarvest.forEach(c => {
                if (crystals.includes(c)) {
                    removeCrystalAndChildren(c);
                    count++;
                }
            });
            state.totalHarvested += count;
        });

        // --- UI Update ---
        function updateUI() {
            document.getElementById('ui-count').innerText = state.crystalCount;
            document.getElementById('ui-status').innerText = state.growthActive ? "Growing" : "Paused";
            document.getElementById('ui-speed').innerText = state.speedMultiplier.toFixed(1);
            document.getElementById('ui-glow').innerText = state.glowMode ? "ON" : "OFF";
            document.getElementById('ui-gen').innerText = state.maxGeneration;
            document.getElementById('ui-harvested').innerText = state.totalHarvested;
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Update Crystals
            crystals.forEach(c => c.update());

            // Update State
            state.crystalCount = crystals.length;
            state.maxGeneration = crystals.reduce((max, c) => Math.max(max, c.generation), 0);
            state.tallestCrystalHeight = crystals.reduce((max, c) => Math.max(max, c.currentHeight), 0);
            const sum = crystals.reduce((s, c) => s + c.currentHeight, 0);
            state.averageCrystalHeight = crystals.length ? sum / crystals.length : 0;
            
            state.crystalColors = {};
            crystals.forEach(c => {
                state.crystalColors[c.colorName] = (state.crystalColors[c.colorName] || 0) + 1;
            });

            // Update Particles
            const posAttr = particles.geometry.attributes.position;
            const lifeAttr = particles.geometry.attributes.life;
            const pArr = posAttr.array;
            const lArr = lifeAttr.array;

            // Emit
            if (state.growthActive) {
                crystals.forEach(c => {
                    if (c.currentHeight < c.maxHeight && Math.random() < 0.05) {
                        c.dummyTip.position.y = c.currentHeight;
                        c.dummyTip.getWorldPosition(tempVec);
                        pArr[pIdx*3] = tempVec.x + (Math.random()-0.5)*0.3;
                        pArr[pIdx*3+1] = tempVec.y;
                        pArr[pIdx*3+2] = tempVec.z + (Math.random()-0.5)*0.3;
                        lArr[pIdx] = 1.0;
                        pIdx = (pIdx + 1) % pCount;
                    }
                });
            }

            // Simulate particles
            for(let i=0; i<pCount; i++) {
                if (lArr[i] > 0) {
                    lArr[i] -= 0.015 * state.speedMultiplier;
                    pArr[i*3+1] += 0.02 * state.speedMultiplier; // drift up
                    pArr[i*3] += (Math.random()-0.5)*0.01;
                    pArr[i*3+2] += (Math.random()-0.5)*0.01;
                } else {
                    pArr[i*3+1] = -1000;
                }
            }
            posAttr.needsUpdate = true;
            lifeAttr.needsUpdate = true;

            updateUI();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
