<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procedural 3D Network Topology</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      color: white;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    button {
      background: #1a1f35;
      color: #fff;
      border: 1px solid #3a4a6a;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #26304f;
    }

    #hudInfo {
      position: absolute;
      top: 56px;
      left: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.35);
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <button id="toggleLayout">Toggle Layout</button>
    <button id="filterRouter">Toggle Router</button>
    <button id="filterServer">Toggle Server</button>
    <button id="filterClient">Toggle Client</button>
    <button id="pulseBtn">Send Pulse</button>
  </div>

  <div id="hudInfo">Visible: 20/20 | Selected: none</div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 0.8);
    pointLight.position.set(20, 20, 20);
    scene.add(pointLight);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const NODE_COUNT = 20;
    const GOLDEN_ANGLE = THREE.MathUtils.degToRad(137.5);

    const state = {
      hoveredNodeIndex: -1,
      selectedNodeIndex: -1,
      layoutMode: 'sphere',
      routerVisible: true,
      serverVisible: true,
      clientVisible: true,
      pulseActive: false,
      pulseProgress: 0
    };

    const nodes = [];
    const edges = [];
    const adjacency = Array.from({ length: NODE_COUNT }, () => new Set());

    const nodeGroup = new THREE.Group();
    const labelGroup = new THREE.Group();
    const edgeGroup = new THREE.Group();

    scene.add(edgeGroup);
    scene.add(nodeGroup);
    scene.add(labelGroup);

    function safeNumber(v) {
      return Number.isFinite(v) ? v : 0;
    }

    function getNodeType(index) {
      if (index <= 5) return 'router';
      if (index <= 12) return 'server';
      return 'client';
    }

    function getNodeColor(type) {
      if (type === 'router') return 0x00aaff;
      if (type === 'server') return 0x00ff88;
      return 0xff6644;
    }

    function createTextSprite(text) {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.font = '28px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;

      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthWrite: false
      });

      const sprite = new THREE.Sprite(material);
      sprite.scale.set(1.8, 0.9, 1);
      return sprite;
    }

    function generatePositions() {
      const spherePositions = [];
      const flatPositions = [];

      for (let i = 0; i < NODE_COUNT; i++) {
        const t = i / (NODE_COUNT - 1);
        const yNorm = 1 - 2 * t;
        const radiusXZ = Math.sqrt(Math.max(0, 1 - yNorm * yNorm));
        const theta = i * GOLDEN_ANGLE;
        const radius = 8 + ((i * 37) % 100) / 100 * 10;

        const x = radius * radiusXZ * Math.cos(theta);
        const y = radius * yNorm;
        const z = radius * radiusXZ * Math.sin(theta);

        const sx = safeNumber(x);
        const sy = safeNumber(y);
        const sz = safeNumber(z);

        spherePositions.push(new THREE.Vector3(sx, sy, sz));
        flatPositions.push(new THREE.Vector3(sx, 0, sz));
      }

      return { spherePositions, flatPositions };
    }

    const { spherePositions, flatPositions } = generatePositions();

    function createNodes() {
      const geometry = new THREE.SphereGeometry(0.6, 16, 16);

      for (let i = 0; i < NODE_COUNT; i++) {
        const type = getNodeType(i);
        const material = new THREE.MeshPhongMaterial({
          color: getNodeColor(type),
          emissive: 0x000000
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.copy(spherePositions[i]);
        mesh.userData = { index: i, type };

        const label = createTextSprite(String(i));
        label.position.copy(mesh.position).add(new THREE.Vector3(0, 1.2, 0));

        const node = {
          index: i,
          type,
          mesh,
          label,
          spherePos: spherePositions[i].clone(),
          flatPos: flatPositions[i].clone(),
          currentTarget: spherePositions[i].clone()
        };

        nodes.push(node);
        nodeGroup.add(mesh);
        labelGroup.add(label);
      }
    }

    function addEdge(a, b) {
      if (a === b) return;
      const min = Math.min(a, b);
      const max = Math.max(a, b);
      const key = `${min}-${max}`;
      if (edges.some(e => e.key === key)) return;

      adjacency[min].add(max);
      adjacency[max].add(min);

      const material = new THREE.LineBasicMaterial({ color: 0x334466 });
      const geometry = new THREE.BufferGeometry().setFromPoints([
        nodes[min].mesh.position.clone(),
        nodes[max].mesh.position.clone()
      ]);
      const line = new THREE.Line(geometry, material);

      const edge = { a: min, b: max, key, line, highlighted: false };
      edges.push(edge);
      edgeGroup.add(line);
    }

    function generateEdges() {
      for (let i = 0; i < NODE_COUNT; i++) {
        const distances = [];
        for (let j = 0; j < NODE_COUNT; j++) {
          if (i === j) continue;
          const d = nodes[i].spherePos.distanceTo(nodes[j].spherePos);
          distances.push({ j, d });
        }
        distances.sort((p, q) => p.d - q.d);
        addEdge(i, distances[0].j);
        addEdge(i, distances[1].j);
      }

      addEdge(0, 1);
      addEdge(1, 2);
      addEdge(2, 3);
      addEdge(3, 4);
      addEdge(4, 5);
      addEdge(5, 0);
    }

    createNodes();
    generateEdges();

    function isTypeVisible(type) {
      if (type === 'router') return state.routerVisible;
      if (type === 'server') return state.serverVisible;
      return state.clientVisible;
    }

    function updateNodeVisibility() {
      for (const node of nodes) {
        const visible = isTypeVisible(node.type);
        node.mesh.visible = visible;
        node.label.visible = visible;
      }

      for (const edge of edges) {
        const va = nodes[edge.a].mesh.visible;
        const vb = nodes[edge.b].mesh.visible;
        edge.line.visible = va && vb;
      }
    }

    function updateEdgeGeometry() {
      for (const edge of edges) {
        const positions = edge.line.geometry.attributes.position.array;
        const pa = nodes[edge.a].mesh.position;
        const pb = nodes[edge.b].mesh.position;

        positions[0] = safeNumber(pa.x);
        positions[1] = safeNumber(pa.y);
        positions[2] = safeNumber(pa.z);
        positions[3] = safeNumber(pb.x);
        positions[4] = safeNumber(pb.y);
        positions[5] = safeNumber(pb.z);

        edge.line.geometry.attributes.position.needsUpdate = true;
        edge.line.geometry.computeBoundingSphere();
      }
    }

    function resetNodeVisual(node) {
      const selected = state.selectedNodeIndex === node.index;
      const hovered = state.hoveredNodeIndex === node.index;

      node.mesh.scale.setScalar(hovered ? 1.5 : 1.0);

      if (selected) {
        node.mesh.material.emissive.setHex(0xffffff);
      } else if (hovered) {
        node.mesh.material.emissive.setHex(0x333333);
      } else {
        node.mesh.material.emissive.setHex(0x000000);
      }
    }

    function updateAllNodeVisuals() {
      for (const node of nodes) resetNodeVisual(node);
    }

    function updateSelectedEdges() {
      let selectedEdgeCount = 0;
      for (const edge of edges) {
        const selected = state.selectedNodeIndex !== -1 &&
          (edge.a === state.selectedNodeIndex || edge.b === state.selectedNodeIndex);

        edge.highlighted = selected;
        edge.line.material.color.setHex(selected ? 0xffff00 : 0x334466);

        if (selected && edge.line.visible) selectedEdgeCount++;
      }
      return selectedEdgeCount;
    }

    function updateHUD() {
      const visibleCount = nodes.filter(n => n.mesh.visible).length;
      const selectedText = state.selectedNodeIndex === -1 ? 'none' : state.selectedNodeIndex;
      document.getElementById('hudInfo').textContent = `Visible: ${visibleCount}/20 | Selected: ${selectedText}`;
    }

    renderer.domElement.addEventListener('mousemove', (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    });

    renderer.domElement.addEventListener('click', () => {
      raycaster.setFromCamera(mouse, camera);
      const visibleMeshes = nodes.filter(n => n.mesh.visible).map(n => n.mesh);
      const intersects = raycaster.intersectObjects(visibleMeshes);

      if (intersects.length > 0) {
        const idx = intersects[0].object.userData.index;
        if (state.selectedNodeIndex === idx) {
          state.selectedNodeIndex = -1;
        } else {
          state.selectedNodeIndex = idx;
        }
        updateAllNodeVisuals();
        updateSelectedEdges();
        updateHUD();
      }
    });

    document.getElementById('toggleLayout').addEventListener('click', () => {
      state.layoutMode = state.layoutMode === 'sphere' ? 'flat' : 'sphere';
      layoutAnim.active = true;
      layoutAnim.startTime = performance.now();
    });

    document.getElementById('filterRouter').addEventListener('click', () => {
      state.routerVisible = !state.routerVisible;
      updateNodeVisibility();
      updateSelectedEdges();
      updateHUD();
    });

    document.getElementById('filterServer').addEventListener('click', () => {
      state.serverVisible = !state.serverVisible;
      updateNodeVisibility();
      updateSelectedEdges();
      updateHUD();
    });

    document.getElementById('filterClient').addEventListener('click', () => {
      state.clientVisible = !state.clientVisible;
      updateNodeVisibility();
      updateSelectedEdges();
      updateHUD();
    });

    const pulseGeometry = new THREE.SphereGeometry(0.3, 16, 16);
    const pulseMaterial = new THREE.MeshPhongMaterial({
      color: 0xffff00,
      emissive: 0xffff00
    });
    const pulseMesh = new THREE.Mesh(pulseGeometry, pulseMaterial);
    pulseMesh.visible = false;
    scene.add(pulseMesh);

    const pulsePath = [0, 1, 2, 3, 4, 5, 0];
    let pulseStartTime = 0;
    const pulseSegmentDuration = 500;

    document.getElementById('pulseBtn').addEventListener('click', () => {
      state.pulseActive = true;
      state.pulseProgress = 0;
      pulseStartTime = performance.now();
      pulseMesh.visible = true;
    });

    const layoutAnim = {
      active: false,
      startTime: 0,
      duration: 1000,
      from: [],
      to: []
    };

    function beginLayoutTargets() {
      layoutAnim.from = nodes.map(n => n.mesh.position.clone());
      layoutAnim.to = nodes.map(n =>
        state.layoutMode === 'sphere' ? n.spherePos.clone() : n.flatPos.clone()
      );
    }

    function updateLayoutAnimation(now) {
      if (!layoutAnim.active) return;

      if (layoutAnim.from.length === 0 || layoutAnim.to.length === 0) {
        beginLayoutTargets();
      }

      const t = Math.min(1, (now - layoutAnim.startTime) / layoutAnim.duration);
      for (let i = 0; i < nodes.length; i++) {
        nodes[i].mesh.position.lerpVectors(layoutAnim.from[i], layoutAnim.to[i], t);
        nodes[i].label.position.copy(nodes[i].mesh.position).add(new THREE.Vector3(0, 1.2, 0));
      }

      updateEdgeGeometry();

      if (t >= 1) {
        layoutAnim.active = false;
        layoutAnim.from = [];
        layoutAnim.to = [];
      }
    }

    function updateHover() {
      raycaster.setFromCamera(mouse, camera);
      const visibleMeshes = nodes.filter(n => n.mesh.visible).map(n => n.mesh);
      const intersects = raycaster.intersectObjects(visibleMeshes);

      const newHovered = intersects.length > 0 ? intersects[0].object.userData.index : -1;

      if (newHovered !== state.hoveredNodeIndex) {
        state.hoveredNodeIndex = newHovered;
        updateAllNodeVisuals();
      }
    }

    function updatePulse(now) {
      if (!state.pulseActive) {
        pulseMesh.visible = false;
        return;
      }

      const elapsed = now - pulseStartTime;
      const totalDuration = 6 * pulseSegmentDuration;

      if (elapsed >= totalDuration) {
        state.pulseActive = false;
        state.pulseProgress = 6;
        pulseMesh.visible = false;
        return;
      }

      const segmentIndex = Math.floor(elapsed / pulseSegmentDuration);
      const segmentT = (elapsed % pulseSegmentDuration) / pulseSegmentDuration;
      state.pulseProgress = segmentIndex + segmentT;

      const fromNode = nodes[pulsePath[segmentIndex]];
      const toNode = nodes[pulsePath[segmentIndex + 1]];

      pulseMesh.position.lerpVectors(fromNode.mesh.position, toNode.mesh.position, segmentT);
      pulseMesh.visible = true;
    }

    function updateStateObject(selectedEdgeCount) {
      const visibleNodeCount = nodes.filter(n => n.mesh.visible).length;

      window.__3D_STATE__ = {
        nodeCount: NODE_COUNT,
        edgeCount: edges.length,
        hoveredNodeIndex: state.hoveredNodeIndex,
        selectedNodeIndex: state.selectedNodeIndex,
        layoutMode: state.layoutMode,
        routerVisible: state.routerVisible,
        serverVisible: state.serverVisible,
        clientVisible: state.clientVisible,
        visibleNodeCount,
        pulseActive: state.pulseActive,
        pulseProgress: state.pulseProgress,
        cameraDistance: safeNumber(camera.position.length()),
        selectedEdgeCount,
        nodesArray: nodes.map(n => ({
          x: safeNumber(n.mesh.position.x),
          y: safeNumber(n.mesh.position.y),
          z: safeNumber(n.mesh.position.z),
          type: n.type,
          visible: n.mesh.visible
        }))
      };
    }

    updateNodeVisibility();
    updateAllNodeVisuals();
    updateHUD();
    beginLayoutTargets();
    layoutAnim.active = false;
    layoutAnim.from = [];
    layoutAnim.to = [];

    function animate(now) {
      requestAnimationFrame(animate);

      controls.update();

      if (layoutAnim.active && layoutAnim.from.length === 0) beginLayoutTargets();
      updateLayoutAnimation(now);

      if (!layoutAnim.active) {
        for (const node of nodes) {
          node.label.position.copy(node.mesh.position).add(new THREE.Vector3(0, 1.2, 0));
        }
      }

      updateHover();
      updatePulse(now);

      const selectedEdgeCount = updateSelectedEdges();
      updateHUD();
      updateStateObject(selectedEdgeCount);

      renderer.render(scene, camera);
    }

    requestAnimationFrame(animate);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
