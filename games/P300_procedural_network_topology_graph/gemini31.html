<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Network Topology</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: sans-serif;
            color: white;
        }
        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334466;
        }
        button {
            background: #1a2a4a;
            color: white;
            border: 1px solid #334466;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #2a3a5a;
        }
        button.active {
            background: #00aaff;
            border-color: #00ffff;
        }
        #hudInfo {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334466;
            font-size: 14px;
        }
        .legend {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            margin-top: 5px;
        }
        .color-box {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }
    </style>
    <!-- Import Three.js -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <button id="toggleLayout">Toggle Layout (Sphere)</button>
        <div style="height: 1px; background: #334466; margin: 5px 0;"></div>
        <button id="filterRouter" class="active">Toggle Routers</button>
        <button id="filterServer" class="active">Toggle Servers</button>
        <button id="filterClient" class="active">Toggle Clients</button>
        <div style="height: 1px; background: #334466; margin: 5px 0;"></div>
        <button id="pulseBtn">Send Pulse</button>
        
        <div class="legend"><div class="color-box" style="background: #00aaff;"></div> Router (0-5)</div>
        <div class="legend"><div class="color-box" style="background: #00ff88;"></div> Server (6-12)</div>
        <div class="legend"><div class="color-box" style="background: #ff6644;"></div> Client (13-19)</div>
    </div>
    <div id="hudInfo">Visible: 20/20 | Selected: none</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State ---
        window.__3D_STATE__ = {
            nodeCount: 20,
            edgeCount: 0,
            hoveredNodeIndex: -1,
            selectedNodeIndex: -1,
            layoutMode: 'sphere',
            routerVisible: true,
            serverVisible: true,
            clientVisible: true,
            visibleNodeCount: 20,
            pulseActive: false,
            pulseProgress: 0,
            cameraDistance: 50,
            selectedEdgeCount: 0,
            nodesArray: []
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 0.8);
        pointLight.position.set(20, 20, 20);
        scene.add(pointLight);

        // --- Data Structures ---
        const nodes = [];
        const edges = [];
        const nodeGroup = new THREE.Group();
        const labelGroup = new THREE.Group();
        scene.add(nodeGroup);
        scene.add(labelGroup);

        // --- Node Generation ---
        const nodeGeometry = new THREE.SphereGeometry(0.6, 16, 16);
        const N = 20;

        for (let i = 0; i < N; i++) {
            // Golden angle distribution
            const y = 1 - (i / (N - 1)) * 2;
            const radius = 8 + (i / 19) * 10;
            const theta = Math.acos(y);
            const phi = i * 137.5 * (Math.PI / 180);

            const x = radius * Math.sin(theta) * Math.cos(phi);
            const z = radius * Math.sin(theta) * Math.sin(phi);

            let type, colorHex;
            if (i <= 5) { type = 'router'; colorHex = 0x00aaff; }
            else if (i <= 12) { type = 'server'; colorHex = 0x00ff88; }
            else { type = 'client'; colorHex = 0xff6644; }

            const material = new THREE.MeshPhongMaterial({ 
                color: colorHex,
                emissive: 0x000000
            });
            const mesh = new THREE.Mesh(nodeGeometry, material);
            mesh.position.set(x, y * radius, z); // y*radius because y was normalized -1 to 1
            
            // Ensure no NaNs
            if (isNaN(mesh.position.x)) mesh.position.x = 0;
            if (isNaN(mesh.position.y)) mesh.position.y = 0;
            if (isNaN(mesh.position.z)) mesh.position.z = 0;

            mesh.userData = { index: i, type: type, baseColor: colorHex };
            nodeGroup.add(mesh);

            // Label
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, 64, 32);
            ctx.fillStyle = 'white';
            ctx.font = '20px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(i.toString(), 32, 16);
            
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture, depthTest: false });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(2, 1, 1);
            sprite.position.copy(mesh.position).add(new THREE.Vector3(0, 1.5, 0));
            labelGroup.add(sprite);

            nodes.push({
                index: i,
                type: type,
                mesh: mesh,
                label: sprite,
                origPos: mesh.position.clone(),
                flatPos: new THREE.Vector3(mesh.position.x, 0, mesh.position.z),
                visible: true
            });
        }

        // --- Edge Generation ---
        const edgeSet = new Set();
        
        // 1. Nearest neighbors
        for (let i = 0; i < N; i++) {
            const dists = [];
            for (let j = 0; j < N; j++) {
                if (i !== j) {
                    dists.push({ j, d: nodes[i].origPos.distanceTo(nodes[j].origPos) });
                }
            }
            dists.sort((a, b) => a.d - b.d);
            for (let k = 0; k < 2; k++) {
                const j = dists[k].j;
                const min = Math.min(i, j);
                const max = Math.max(i, j);
                edgeSet.add(`${min}_${max}`);
            }
        }

        // 2. Router ring
        for (let i = 0; i < 6; i++) {
            const j = (i + 1) % 6;
            const min = Math.min(i, j);
            const max = Math.max(i, j);
            edgeSet.add(`${min}_${max}`);
        }

        edgeSet.forEach(key => {
            const [source, target] = key.split('_').map(Number);
            edges.push({ source, target });
        });
        window.__3D_STATE__.edgeCount = edges.length;

        // Edge Rendering
        const edgeGeometry = new THREE.BufferGeometry();
        const edgeMaterial = new THREE.LineBasicMaterial({ vertexColors: true, linewidth: 1 });
        const edgeLines = new THREE.LineSegments(edgeGeometry, edgeMaterial);
        scene.add(edgeLines);

        function updateEdges() {
            const positions = [];
            const colors = [];
            let selCount = 0;

            edges.forEach(edge => {
                const n1 = nodes[edge.source];
                const n2 = nodes[edge.target];

                if (n1.visible && n2.visible) {
                    positions.push(n1.mesh.position.x, n1.mesh.position.y, n1.mesh.position.z);
                    positions.push(n2.mesh.position.x, n2.mesh.position.y, n2.mesh.position.z);

                    const isSelected = (window.__3D_STATE__.selectedNodeIndex === edge.source || 
                                        window.__3D_STATE__.selectedNodeIndex === edge.target);
                    if (isSelected) selCount++;

                    const colorHex = isSelected ? 0xffff00 : 0x334466;
                    const c = new THREE.Color(colorHex);
                    colors.push(c.r, c.g, c.b, c.r, c.g, c.b);
                }
            });

            edgeGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            edgeGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            edgeGeometry.computeBoundingSphere();
            
            window.__3D_STATE__.selectedEdgeCount = selCount;
        }
        updateEdges();

        // --- Pulse Animation Setup ---
        const pulseGeo = new THREE.SphereGeometry(0.3, 8, 8);
        const pulseMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        const pulseMesh = new THREE.Mesh(pulseGeo, pulseMat);
        pulseMesh.visible = false;
        scene.add(pulseMesh);

        // --- Interactions ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function updateNodeAppearance() {
            nodes.forEach(n => {
                if (!n.visible) return;
                const isHovered = n.index === window.__3D_STATE__.hoveredNodeIndex;
                const isSelected = n.index === window.__3D_STATE__.selectedNodeIndex;

                n.mesh.scale.setScalar(isHovered ? 1.5 : 1.0);
                
                if (isSelected) {
                    n.mesh.material.emissive.setHex(0xffffff);
                } else if (isHovered) {
                    n.mesh.material.emissive.setHex(0x333333);
                } else {
                    n.mesh.material.emissive.setHex(0x000000);
                }
            });
            updateEdges();
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodeGroup.children);

            let newHover = -1;
            if (intersects.length > 0) {
                newHover = intersects[0].object.userData.index;
            }

            if (newHover !== window.__3D_STATE__.hoveredNodeIndex) {
                window.__3D_STATE__.hoveredNodeIndex = newHover;
                updateNodeAppearance();
            }
        });

        window.addEventListener('click', () => {
            if (window.__3D_STATE__.hoveredNodeIndex !== -1) {
                if (window.__3D_STATE__.selectedNodeIndex === window.__3D_STATE__.hoveredNodeIndex) {
                    window.__3D_STATE__.selectedNodeIndex = -1; // Deselect
                } else {
                    window.__3D_STATE__.selectedNodeIndex = window.__3D_STATE__.hoveredNodeIndex;
                }
                updateNodeAppearance();
            }
        });

        // --- UI Controls ---
        let layoutTransition = 0;
        let isTransitioning = false;
        let targetLayout = 'sphere';

        document.getElementById('toggleLayout').addEventListener('click', (e) => {
            targetLayout = targetLayout === 'sphere' ? 'flat' : 'sphere';
            window.__3D_STATE__.layoutMode = targetLayout;
            e.target.innerText = `Toggle Layout (${targetLayout === 'sphere' ? 'Flat' : 'Sphere'})`;
            isTransitioning = true;
            layoutTransition = 0;
        });

        function toggleFilter(type, btnId, stateKey) {
            const btn = document.getElementById(btnId);
            const isActive = !window.__3D_STATE__[stateKey];
            window.__3D_STATE__[stateKey] = isActive;
            btn.classList.toggle('active', isActive);

            let visCount = 0;
            nodes.forEach(n => {
                if (n.type === type) {
                    n.visible = isActive;
                    n.mesh.visible = isActive;
                    n.label.visible = isActive;
                }
                if (n.visible) visCount++;
            });
            window.__3D_STATE__.visibleNodeCount = visCount;
            
            // Deselect if hidden
            if (window.__3D_STATE__.selectedNodeIndex !== -1 && !nodes[window.__3D_STATE__.selectedNodeIndex].visible) {
                window.__3D_STATE__.selectedNodeIndex = -1;
                updateNodeAppearance();
            } else {
                updateEdges();
            }
        }

        document.getElementById('filterRouter').addEventListener('click', () => toggleFilter('router', 'filterRouter', 'routerVisible'));
        document.getElementById('filterServer').addEventListener('click', () => toggleFilter('server', 'filterServer', 'serverVisible'));
        document.getElementById('filterClient').addEventListener('click', () => toggleFilter('client', 'filterClient', 'clientVisible'));

        document.getElementById('pulseBtn').addEventListener('click', () => {
            if (!window.__3D_STATE__.routerVisible) return; // Don't pulse if routers hidden
            window.__3D_STATE__.pulseActive = true;
            window.__3D_STATE__.pulseProgress = 0;
            pulseMesh.visible = true;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            controls.update();

            // Layout Transition
            if (isTransitioning) {
                layoutTransition += delta; // 1 second duration
                if (layoutTransition >= 1) {
                    layoutTransition = 1;
                    isTransitioning = false;
                }
                
                // easeInOutQuad
                const t = layoutTransition;
                const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

                nodes.forEach(n => {
                    const start = targetLayout === 'flat' ? n.origPos : n.flatPos;
                    const end = targetLayout === 'flat' ? n.flatPos : n.origPos;
                    n.mesh.position.lerpVectors(start, end, ease);
                    n.label.position.copy(n.mesh.position).add(new THREE.Vector3(0, 1.5, 0));
                });
                updateEdges();
            }

            // Pulse Animation
            if (window.__3D_STATE__.pulseActive) {
                window.__3D_STATE__.pulseProgress += delta / 0.5; // 0.5s per edge
                
                if (window.__3D_STATE__.pulseProgress >= 6) {
                    window.__3D_STATE__.pulseActive = false;
                    window.__3D_STATE__.pulseProgress = 6;
                    pulseMesh.visible = false;
                } else {
                    const segment = Math.floor(window.__3D_STATE__.pulseProgress);
                    const t = window.__3D_STATE__.pulseProgress - segment;
                    const startIndex = segment;
                    const endIndex = (segment + 1) % 6;
                    
                    const startPos = nodes[startIndex].mesh.position;
                    const endPos = nodes[endIndex].mesh.position;
                    
                    pulseMesh.position.lerpVectors(startPos, endPos, t);
                }
            }

            // Update State & HUD
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));
            window.__3D_STATE__.nodesArray = nodes.map(n => ({
                x: n.mesh.position.x,
                y: n.mesh.position.y,
                z: n.mesh.position.z,
                type: n.type,
                visible: n.visible
            }));

            const selText = window.__3D_STATE__.selectedNodeIndex !== -1 ? window.__3D_STATE__.selectedNodeIndex : 'none';
            document.getElementById('hudInfo').innerText = `Visible: ${window.__3D_STATE__.visibleNodeCount}/20 | Selected: ${selText}`;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
