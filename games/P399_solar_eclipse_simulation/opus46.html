<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Solar Eclipse Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #info-panel {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 10, 30, 0.85);
    border: 1px solid rgba(100, 150, 255, 0.3);
    border-radius: 10px;
    padding: 18px 22px;
    color: #c0d8ff;
    font-size: 14px;
    line-height: 1.8;
    min-width: 240px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0, 50, 150, 0.3);
  }

  #info-panel h2 {
    color: #ffdd00;
    font-size: 16px;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(255, 221, 0, 0.3);
    padding-bottom: 8px;
  }

  #info-panel .label {
    color: #7799cc;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #info-panel .value {
    color: #ffffff;
    font-weight: bold;
    float: right;
  }

  #info-panel .eclipse-none { color: #666; }
  #info-panel .eclipse-partial { color: #ffaa00; }
  #info-panel .eclipse-total { color: #ff3300; text-shadow: 0 0 10px #ff3300; }

  #control-bar {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    background: rgba(0, 10, 30, 0.85);
    border: 1px solid rgba(100, 150, 255, 0.3);
    border-radius: 10px;
    padding: 12px 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0, 50, 150, 0.3);
  }

  #control-bar button {
    background: rgba(50, 80, 150, 0.5);
    border: 1px solid rgba(100, 150, 255, 0.4);
    color: #c0d8ff;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #control-bar button:hover {
    background: rgba(80, 120, 200, 0.6);
    border-color: rgba(150, 200, 255, 0.6);
    color: #fff;
    box-shadow: 0 0 10px rgba(100, 150, 255, 0.3);
  }

  #control-bar button:active {
    transform: scale(0.95);
  }

  #help-panel {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(0, 10, 30, 0.85);
    border: 1px solid rgba(100, 150, 255, 0.3);
    border-radius: 10px;
    padding: 14px 18px;
    color: #7799cc;
    font-size: 12px;
    line-height: 2;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0, 50, 150, 0.3);
  }

  #help-panel h3 {
    color: #aaccff;
    margin-bottom: 6px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #help-panel kbd {
    background: rgba(100, 150, 255, 0.2);
    border: 1px solid rgba(100, 150, 255, 0.3);
    border-radius: 3px;
    padding: 1px 6px;
    color: #aaccff;
    font-family: monospace;
    font-size: 12px;
  }

  .label-3d {
    position: absolute;
    color: #fff;
    font-size: 12px;
    font-weight: bold;
    text-shadow: 0 0 8px rgba(0,0,0,0.9), 0 0 3px rgba(0,0,0,1);
    pointer-events: none;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .label-sun { color: #ffdd00; }
  .label-earth { color: #4488ff; }
  .label-moon { color: #cccccc; }
</style>
</head>
<body>

<div id="info-panel">
  <h2>☀ Solar Eclipse</h2>
  <div><span class="label">Speed:</span> <span class="value" id="speed-display">1.0x</span></div>
  <div><span class="label">Moon Angle:</span> <span class="value" id="angle-display">0.0°</span></div>
  <div><span class="label">Eclipse:</span> <span class="value" id="eclipse-status">None</span></div>
  <div><span class="label">Coverage:</span> <span class="value" id="eclipse-percent">0%</span></div>
</div>

<div id="help-panel">
  <h3>Controls</h3>
  <kbd>1</kbd> Side View<br>
  <kbd>2</kbd> Top View<br>
  <kbd>3</kbd> Surface View<br>
  <kbd>S</kbd> Toggle Shadow<br>
  <kbd>L</kbd> Toggle Labels
</div>

<div id="control-bar">
  <button id="speed-down">◀ Slower</button>
  <button id="pause-btn">⏸ Pause</button>
  <button id="speed-up">Faster ▶</button>
  <button id="reset-btn">↺ Reset</button>
</div>

<div id="label-sun" class="label-3d label-sun">Sun ☀</div>
<div id="label-earth" class="label-3d label-earth">Earth 🌍</div>
<div id="label-moon" class="label-3d label-moon">Moon 🌙</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const state = {
  sunPosition: { x: -150, y: 0, z: 0 },
  earthPosition: { x: 0, y: 0, z: 0 },
  moonPosition: { x: 30, y: 0, z: 0 },
  moonAngle: 0,
  timeScale: 1.0,
  isPaused: false,
  eclipseStatus: 'none',
  eclipsePercent: 0,
  cameraView: 1,
  shadowConeVisible: true,
  labelsVisible: true,
  chairLoaded: false,
  frameCount: 0
};
window.__3D_STATE__ = state;

let storedTimeScale = 1.0;

// --- Scene ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// --- Camera ---
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 50, 200);
camera.lookAt(0, 0, 0);

// --- Renderer ---
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// --- Controls ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// --- Lighting ---
const sunLight = new THREE.PointLight(0xFFFF00, 2, 1000);
sunLight.position.set(-150, 0, 0);
sunLight.castShadow = true;
scene.add(sunLight);

const ambientLight = new THREE.AmbientLight(0x111122, 0.05);
scene.add(ambientLight);

// --- Stars ---
function createStars() {
  const starsGeometry = new THREE.BufferGeometry();
  const starCount = 3000;
  const positions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount * 3; i += 3) {
    const r = 500 + Math.random() * 500;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions[i] = r * Math.sin(phi) * Math.cos(theta);
    positions[i + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i + 2] = r * Math.cos(phi);
  }
  starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.8, sizeAttenuation: true });
  scene.add(new THREE.Points(starsGeometry, starsMaterial));
}
createStars();

// --- Sun ---
const sunGeometry = new THREE.SphereGeometry(20, 64, 64);
const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xFFDD00 });
const sun = new THREE.Mesh(sunGeometry, sunMaterial);
sun.position.set(-150, 0, 0);
scene.add(sun);

// Sun glow
const glowTexture = createGlowTexture();
const glowMaterial = new THREE.SpriteMaterial({
  map: glowTexture,
  color: 0xFFDD00,
  transparent: true,
  opacity: 0.6,
  blending: THREE.AdditiveBlending
});
const sunGlow = new THREE.Sprite(glowMaterial);
sunGlow.scale.set(80, 80, 1);
sun.add(sunGlow);

// Corona glow
const coronaMaterial = new THREE.SpriteMaterial({
  map: glowTexture,
  color: 0xFFAA33,
  transparent: true,
  opacity: 0.3,
  blending: THREE.AdditiveBlending
});
const sunCorona = new THREE.Sprite(coronaMaterial);
sunCorona.scale.set(120, 120, 1);
sun.add(sunCorona);

function createGlowTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 256;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
  gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
  gradient.addColorStop(0.2, 'rgba(255, 255, 200, 0.8)');
  gradient.addColorStop(0.5, 'rgba(255, 200, 50, 0.3)');
  gradient.addColorStop(1, 'rgba(255, 150, 0, 0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 256, 256);
  const texture = new THREE.CanvasTexture(canvas);
  return texture;
}

// --- Earth ---
const earthGeometry = new THREE.SphereGeometry(8, 64, 64);
const earthCanvas = createEarthTexture();
const earthTexture = new THREE.CanvasTexture(earthCanvas);
const earthMaterial = new THREE.MeshStandardMaterial({
  map: earthTexture,
  roughness: 0.8,
  metalness: 0.1
});
const earth = new THREE.Mesh(earthGeometry, earthMaterial);
earth.position.set(0, 0, 0);
earth.receiveShadow = true;
scene.add(earth);

function createEarthTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 512;
  canvas.height = 256;
  const ctx = canvas.getContext('2d');

  // Ocean
  ctx.fillStyle = '#1a3a6a';
  ctx.fillRect(0, 0, 512, 256);

  // Continents (simplified)
  ctx.fillStyle = '#2d7a3a';
  // Random landmasses
  const landmasses = [
    [100, 60, 80, 50], [200, 40, 60, 70], [300, 80, 90, 60],
    [50, 140, 70, 40], [180, 150, 100, 50], [350, 50, 80, 80],
    [400, 130, 60, 50], [130, 100, 40, 30], [280, 140, 50, 40]
  ];
  landmasses.forEach(([x, y, w, h]) => {
    ctx.beginPath();
    ctx.ellipse(x, y, w / 2, h / 2, Math.random() * 0.5, 0, Math.PI * 2);
    ctx.fill();
  });

  // Ice caps
  ctx.fillStyle = '#ddeeff';
  ctx.fillRect(0, 0, 512, 20);
  ctx.fillRect(0, 236, 512, 20);

  // Some clouds
  ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
  for (let i = 0; i < 30; i++) {
    const cx = Math.random() * 512;
    const cy = Math.random() * 256;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 20 + Math.random() * 30, 5 + Math.random() * 10, Math.random() * Math.PI, 0, Math.PI * 2);
    ctx.fill();
  }

  return canvas;
}

// --- Moon ---
const moonGeometry = new THREE.SphereGeometry(3, 32, 32);
const moonCanvas = createMoonTexture();
const moonTexture = new THREE.CanvasTexture(moonCanvas);
const moonMaterial = new THREE.MeshStandardMaterial({
  map: moonTexture,
  roughness: 0.9,
  metalness: 0.0
});
const moon = new THREE.Mesh(moonGeometry, moonMaterial);
moon.castShadow = true;
scene.add(moon);

function createMoonTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#aaaaaa';
  ctx.fillRect(0, 0, 256, 128);

  // Craters
  for (let i = 0; i < 40; i++) {
    const x = Math.random() * 256;
    const y = Math.random() * 128;
    const r = 2 + Math.random() * 8;
    ctx.fillStyle = `rgba(${80 + Math.random() * 40}, ${80 + Math.random() * 40}, ${80 + Math.random() * 40}, 0.5)`;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  return canvas;
}

// --- Moon Orbit Path ---
const orbitCurve = new THREE.EllipseCurve(0, 0, 30, 30, 0, 2 * Math.PI, false, 0);
const orbitPoints = orbitCurve.getPoints(128);
const orbitGeometry = new THREE.BufferGeometry().setFromPoints(
  orbitPoints.map(p => new THREE.Vector3(p.x, 0, p.y))
);
const orbitLine = new THREE.Line(
  orbitGeometry,
  new THREE.LineBasicMaterial({ color: 0x334466, transparent: true, opacity: 0.4 })
);
scene.add(orbitLine);

// --- Shadow Cone ---
const shadowConeGroup = new THREE.Group();
const coneLength = 35;
const coneRadius = 6;
const coneGeometry = new THREE.ConeGeometry(coneRadius, coneLength, 32, 1, true);
const coneMaterial = new THREE.MeshBasicMaterial({
  color: 0x000000,
  transparent: true,
  opacity: 0.15,
  side: THREE.DoubleSide,
  depthWrite: false
});
const shadowCone = new THREE.Mesh(coneGeometry, coneMaterial);
shadowConeGroup.add(shadowCone);
scene.add(shadowConeGroup);

// --- Sun-Earth alignment line (subtle) ---
const alignmentGeometry = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(-150, 0, 0),
  new THREE.Vector3(50, 0, 0)
]);
const alignmentLine = new THREE.Line(
  alignmentGeometry,
  new THREE.LineBasicMaterial({ color: 0x332200, transparent: true, opacity: 0.2 })
);
scene.add(alignmentLine);

// --- Chair (GLTF) ---
const loader = new GLTFLoader();
let chairModel = null;

loader.load(
  'https://threejs.org/examples/models/gltf/SheenChair.glb',
  (gltf) => {
    chairModel = gltf.scene;
    chairModel.scale.set(0.5, 0.5, 0.5);
    chairModel.position.set(0, 8, 0);
    // Face the sun (negative x direction)
    chairModel.rotation.y = Math.PI / 2;
    scene.add(chairModel);
    state.chairLoaded = true;
  },
  undefined,
  (error) => {
    console.warn('Could not load SheenChair.glb:', error);
    // Create a placeholder chair
    const chairGroup = new THREE.Group();
    // Seat
    const seatGeo = new THREE.BoxGeometry(1.5, 0.2, 1.5);
    const chairMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.7 });
    const seat = new THREE.Mesh(seatGeo, chairMat);
    seat.position.y = 0.6;
    chairGroup.add(seat);
    // Back
    const backGeo = new THREE.BoxGeometry(1.5, 1.2, 0.2);
    const back = new THREE.Mesh(backGeo, chairMat);
    back.position.set(0, 1.2, -0.65);
    chairGroup.add(back);
    // Legs
    const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.6);
    const positions = [[-0.6, 0.3, -0.6], [0.6, 0.3, -0.6], [-0.6, 0.3, 0.6], [0.6, 0.3, 0.6]];
    positions.forEach(([x, y, z]) => {
      const leg = new THREE.Mesh(legGeo, chairMat);
      leg.position.set(x, y, z);
      chairGroup.add(leg);
    });

    chairGroup.scale.set(0.5, 0.5, 0.5);
    chairGroup.position.set(0, 8, 0);
    chairGroup.rotation.y = Math.PI / 2;
    scene.add(chairGroup);
    chairModel = chairGroup;
    state.chairLoaded = true;
  }
);

// --- Animation variables ---
let moonAngle = 0;
let timeScale = 1.0;
let isPaused = false;

// --- UI Elements ---
const speedDisplay = document.getElementById('speed-display');
const angleDisplay = document.getElementById('angle-display');
const eclipseStatusEl = document.getElementById('eclipse-status');
const eclipsePercentEl = document.getElementById('eclipse-percent');

// --- Label elements ---
const labelSun = document.getElementById('label-sun');
const labelEarth = document.getElementById('label-earth');
const labelMoon = document.getElementById('label-moon');

// --- Button handlers ---
document.getElementById('speed-up').addEventListener('click', () => {
  if (!isPaused) {
    timeScale = Math.min(timeScale * 2, 8.0);
  }
});

document.getElementById('speed-down').addEventListener('click', () => {
  if (!isPaused) {
    timeScale = Math.max(timeScale / 2, 0.25);
  }
});

document.getElementById('pause-btn').addEventListener('click', () => {
  const btn = document.getElementById('pause-btn');
  if (!isPaused) {
    storedTimeScale = timeScale;
    timeScale = 0;
    isPaused = true;
    btn.textContent = '▶ Play';
  } else {
    timeScale = storedTimeScale;
    isPaused = false;
    btn.textContent = '⏸ Pause';
  }
});

document.getElementById('reset-btn').addEventListener('click', () => {
  moonAngle = 0;
  timeScale = 1.0;
  isPaused = false;
  document.getElementById('pause-btn').textContent = '⏸ Pause';
});

// --- Keyboard handlers ---
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();

  if (key === '1') {
    state.cameraView = 1;
    camera.position.set(0, 50, 200);
    controls.target.set(0, 0, 0);
    controls.update();
  } else if (key === '2') {
    state.cameraView = 2;
    camera.position.set(0, 200, 0);
    controls.target.set(0, 0, 0);
    camera.up.set(0, 0, -1);
    controls.update();
    // Reset up after a frame
    setTimeout(() => { camera.up.set(0, 1, 0); }, 100);
  } else if (key === '3') {
    state.cameraView = 3;
    camera.position.set(0, 12, 5);
    controls.target.set(-150, 0, 0);
    controls.update();
  } else if (key === 's') {
    state.shadowConeVisible = !state.shadowConeVisible;
    shadowConeGroup.visible = state.shadowConeVisible;
  } else if (key === 'l') {
    state.labelsVisible = !state.labelsVisible;
    labelSun.style.display = state.labelsVisible ? 'block' : 'none';
    labelEarth.style.display = state.labelsVisible ? 'block' : 'none';
    labelMoon.style.display = state.labelsVisible ? 'block' : 'none';
  }
});

// --- Helper: project 3D to screen ---
function toScreen(position, cam, w, h) {
  const vec = position.clone().project(cam);
  return {
    x: (vec.x * 0.5 + 0.5) * w,
    y: (-vec.y * 0.5 + 0.5) * h,
    z: vec.z
  };
}

// --- Animation Loop ---
function animate() {
  requestAnimationFrame(animate);

  // Update moon angle
  moonAngle += 0.005 * timeScale;

  // Moon position
  const moonX = 30 * Math.cos(moonAngle);
  const moonZ = 30 * Math.sin(moonAngle);
  moon.position.set(moonX, 0, moonZ);

  // Moon slow rotation
  moon.rotation.y += 0.002 * timeScale;

  // Earth slow rotation
  earth.rotation.y += 0.001 * timeScale;

  // --- Eclipse calculation ---
  // Sun-Earth direction
  const sunPos = new THREE.Vector3(-150, 0, 0);
  const earthPos = new THREE.Vector3(0, 0, 0);
  const moonPos = new THREE.Vector3(moonX, 0, moonZ);

  const sunToEarth = new THREE.Vector3().subVectors(earthPos, sunPos).normalize();
  const moonToEarth = new THREE.Vector3().subVectors(earthPos, moonPos).normalize();
  const earthToMoon = new THREE.Vector3().subVectors(moonPos, earthPos).normalize();

  // Angle between Sun-Earth line and Moon-Earth line
  // We want the angle between (Sun->Earth) direction and (Moon->Earth) direction
  // Actually, we want angle between Earth->Sun and Earth->Moon
  const earthToSun = new THREE.Vector3().subVectors(sunPos, earthPos).normalize();
  const angleBetween = earthToSun.angleTo(earthToMoon) * (180 / Math.PI);

  let eclipseStatus = 'none';
  let eclipsePercent = 0;

  // Moon must be roughly between Sun and Earth
  if (moonX < 0 && Math.abs(moonZ) < 30) {
    if (angleBetween < 3) {
      if (angleBetween < 0.5) {
        eclipseStatus = 'total';
        eclipsePercent = 100;
      } else {
        eclipseStatus = 'partial';
        // Map 3 degrees -> 0%, 0.5 degrees -> 100%
        eclipsePercent = Math.round(((3 - angleBetween) / 2.5) * 100);
        eclipsePercent = Math.min(100, Math.max(0, eclipsePercent));
      }
    }
  }

  // --- Shadow Cone ---
  if (state.shadowConeVisible) {
    shadowConeGroup.visible = true;
    // Position cone from moon toward earth
    const moonToEarthDir = new THREE.Vector3().subVectors(earthPos, moonPos);
    const dist = moonToEarthDir.length();
    moonToEarthDir.normalize();

    // Position the cone so its tip is at the moon and it extends toward earth
    const coneMidpoint = new THREE.Vector3().copy(moonPos).add(
      moonToEarthDir.clone().multiplyScalar(coneLength / 2)
    );
    shadowCone.position.set(0, 0, 0);
    shadowConeGroup.position.copy(coneMidpoint);

    // Orient cone: cone default points along Y axis, tip at top
    // We want it to point from moon toward earth
    const coneDir = new THREE.Vector3().subVectors(earthPos, moonPos).normalize();
    const defaultDir = new THREE.Vector3(0, 1, 0);
    const quaternion = new THREE.Quaternion().setFromUnitVectors(defaultDir, coneDir);
    shadowConeGroup.quaternion.copy(quaternion);

    // Adjust opacity based on eclipse
    if (eclipseStatus !== 'none') {
      coneMaterial.opacity = 0.1 + (eclipsePercent / 100) * 0.25;
    } else {
      coneMaterial.opacity = 0.08;
    }
  } else {
    shadowConeGroup.visible = false;
  }

  // --- Adjust ambient light during eclipse ---
  if (eclipseStatus === 'total') {
    ambientLight.intensity = 0.02;
  } else if (eclipseStatus === 'partial') {
    ambientLight.intensity = 0.05 - (eclipsePercent / 100) * 0.03;
  } else {
    ambientLight.intensity = 0.05;
  }

  // --- Update UI ---
  speedDisplay.textContent = timeScale.toFixed(2) + 'x';
  const angleDeg = ((moonAngle % (Math.PI * 2)) * (180 / Math.PI));
  angleDisplay.textContent = angleDeg.toFixed(1) + '°';

  eclipseStatusEl.textContent = eclipseStatus.charAt(0).toUpperCase() + eclipseStatus.slice(1);
  eclipseStatusEl.className = 'value eclipse-' + eclipseStatus;
  eclipsePercentEl.textContent = eclipsePercent + '%';

  // --- Update labels ---
  if (state.labelsVisible) {
    const w = window.innerWidth;
    const h = window.innerHeight;

    const sunScreen = toScreen(sun.position.clone().add(new THREE.Vector3(0, 25, 0)), camera, w, h);
    if (sunScreen.z > 0 && sunScreen.z < 1) {
      labelSun.style.left = sunScreen.x + 'px';
      labelSun.style.top = sunScreen.y + 'px';
      labelSun.style.display = 'block';
    } else {
      labelSun.style.display = 'none';
    }

    const earthScreen = toScreen(earth.position.clone().add(new THREE.Vector3(0, 12, 0)), camera, w, h);
    if (earthScreen.z > 0 && earthScreen.z < 1) {
      labelEarth.style.left = earthScreen.x + 'px';
      labelEarth.style.top = earthScreen.y + 'px';
      labelEarth.style.display = 'block';
    } else {
      labelEarth.style.display = 'none';
    }

    const moonScreen = toScreen(moon.position.clone().add(new THREE.Vector3(0, 6, 0)), camera, w, h);
    if (moonScreen.z > 0 && moonScreen.z < 1) {
      labelMoon.style.left = moonScreen.x + 'px';
      labelMoon.style.top = moonScreen.y + 'px';
      labelMoon.style.display = 'block';
    } else {
      labelMoon.style.display = 'none';
    }
  }

  // --- Update state ---
  state.sunPosition = { x: sun.position.x, y: sun.position.y, z: sun.position.z };
  state.earthPosition = { x: earth.position.x, y: earth.position.y, z: earth.position.z };
  state.moonPosition = { x: moon.position.x, y: moon.position.y, z: moon.position.z };
  state.moonAngle = moonAngle;
  state.timeScale = timeScale;
  state.isPaused = isPaused;
  state.eclipseStatus = eclipseStatus;
  state.eclipsePercent = eclipsePercent;
  state.frameCount++;

  controls.update();
  renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
