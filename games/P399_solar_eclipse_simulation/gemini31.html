<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar Eclipse Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #444;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            min-width: 200px;
        }
        #info-panel h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #FFDD00;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .info-value {
            font-weight: bold;
            color: #aaa;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #444;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #555;
        }
        button:active {
            background: #777;
        }
        #instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #444;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 12px;
            color: #ccc;
        }
        .key {
            display: inline-block;
            background: #eee;
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            margin-right: 5px;
        }
        .label {
            position: absolute;
            color: white;
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 1px 1px 2px black, -1px -1px 2px black, 1px -1px 2px black, -1px 1px 2px black;
            transform: translate(-50%, -50%);
            display: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="info-panel">
        <h2>Eclipse Status</h2>
        <div class="info-row"><span>Speed:</span> <span id="speed-display" class="info-value">1.0x</span></div>
        <div class="info-row"><span>Moon Angle:</span> <span id="angle-display" class="info-value">0.0°</span></div>
        <div class="info-row"><span>Status:</span> <span id="eclipse-status" class="info-value" style="color: #fff;">None</span></div>
        <div class="info-row"><span>Totality:</span> <span id="eclipse-percent" class="info-value">0%</span></div>
    </div>

    <div id="instructions">
        <div style="margin-bottom: 5px;"><span class="key">1</span> Side View</div>
        <div style="margin-bottom: 5px;"><span class="key">2</span> Top View</div>
        <div style="margin-bottom: 5px;"><span class="key">3</span> Earth Surface View</div>
        <div style="margin-bottom: 5px;"><span class="key">S</span> Toggle Shadow Cone</div>
        <div><span class="key">L</span> Toggle Labels</div>
    </div>

    <div id="controls">
        <button id="speed-down">Speed -</button>
        <button id="pause-btn">Pause</button>
        <button id="speed-up">Speed +</button>
        <button id="reset-btn">Reset</button>
    </div>

    <div id="label-sun" class="label">Sun</div>
    <div id="label-earth" class="label">Earth</div>
    <div id="label-moon" class="label">Moon</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            sunPosition: { x: -150, y: 0, z: 0 },
            earthPosition: { x: 0, y: 0, z: 0 },
            moonPosition: { x: 30, y: 0, z: 0 },
            moonAngle: 0,
            timeScale: 1.0,
            isPaused: false,
            eclipseStatus: 'None',
            eclipsePercent: 0,
            cameraView: 1,
            shadowConeVisible: true,
            labelsVisible: true,
            chairLoaded: false,
            frameCount: 0
        };

        const state = window.__3D_STATE__;
        let storedTimeScale = 1.0;

        // --- DOM Elements ---
        const speedDisplay = document.getElementById('speed-display');
        const angleDisplay = document.getElementById('angle-display');
        const eclipseStatusDisplay = document.getElementById('eclipse-status');
        const eclipsePercentDisplay = document.getElementById('eclipse-percent');
        const pauseBtn = document.getElementById('pause-btn');
        
        const labelSun = document.getElementById('label-sun');
        const labelEarth = document.getElementById('label-earth');
        const labelMoon = document.getElementById('label-moon');

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 50, 200);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x111122, 0.05);
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xFFFF00, 2, 1000);
        sunLight.position.set(-150, 0, 0);
        scene.add(sunLight);

        // --- 3D Objects ---
        // Sun
        const sunGeo = new THREE.SphereGeometry(20, 32, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xFFDD00 });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        sun.position.set(-150, 0, 0);
        scene.add(sun);

        // Sun Glow
        const glowGeo = new THREE.SphereGeometry(24, 32, 32);
        const glowMat = new THREE.MeshBasicMaterial({ 
            color: 0xFFDD00, 
            transparent: true, 
            opacity: 0.2,
            side: THREE.BackSide
        });
        const sunGlow = new THREE.Mesh(glowGeo, glowMat);
        sun.add(sunGlow);

        // Earth
        const earthGeo = new THREE.SphereGeometry(8, 32, 32);
        const earthMat = new THREE.MeshStandardMaterial({ 
            color: 0x2244AA,
            roughness: 0.6,
            metalness: 0.1
        });
        const earth = new THREE.Mesh(earthGeo, earthMat);
        scene.add(earth);

        // Moon
        const moonGeo = new THREE.SphereGeometry(3, 32, 32);
        const moonMat = new THREE.MeshStandardMaterial({ 
            color: 0xAAAAAA,
            roughness: 0.8,
            metalness: 0.0
        });
        const moon = new THREE.Mesh(moonGeo, moonMat);
        scene.add(moon);

        // Shadow Cone (Umbra)
        const coneGeo = new THREE.ConeGeometry(3, 30, 32);
        const coneMat = new THREE.MeshBasicMaterial({ 
            color: 0x000000, 
            transparent: true, 
            opacity: 0.15,
            depthWrite: false
        });
        const shadowCone = new THREE.Mesh(coneGeo, coneMat);
        scene.add(shadowCone);

        // Observation Chair
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/SheenChair/glTF-Binary/SheenChair.glb',
            function (gltf) {
                const chair = gltf.scene;
                chair.position.set(0, 8, 0);
                chair.scale.set(0.5, 0.5, 0.5);
                chair.lookAt(-150, 8, 0); // Face Sun
                scene.add(chair);
                state.chairLoaded = true;
            },
            undefined,
            function (error) {
                console.error('Error loading chair model:', error);
            }
        );

        // --- Event Listeners ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('speed-up').addEventListener('click', () => {
            if (!state.isPaused) {
                state.timeScale = Math.min(8.0, state.timeScale * 2);
                storedTimeScale = state.timeScale;
            }
        });

        document.getElementById('speed-down').addEventListener('click', () => {
            if (!state.isPaused) {
                state.timeScale = Math.max(0.25, state.timeScale / 2);
                storedTimeScale = state.timeScale;
            }
        });

        document.getElementById('pause-btn').addEventListener('click', () => {
            state.isPaused = !state.isPaused;
            if (state.isPaused) {
                storedTimeScale = state.timeScale;
                state.timeScale = 0;
                pauseBtn.textContent = 'Play';
                pauseBtn.style.background = '#882222';
            } else {
                state.timeScale = storedTimeScale;
                pauseBtn.textContent = 'Pause';
                pauseBtn.style.background = '#333';
            }
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            state.moonAngle = 0;
            state.timeScale = 1.0;
            storedTimeScale = 1.0;
            state.isPaused = false;
            pauseBtn.textContent = 'Pause';
            pauseBtn.style.background = '#333';
            setCameraView(1);
        });

        window.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case '1': setCameraView(1); break;
                case '2': setCameraView(2); break;
                case '3': setCameraView(3); break;
                case 's': state.shadowConeVisible = !state.shadowConeVisible; break;
                case 'l': state.labelsVisible = !state.labelsVisible; break;
            }
        });

        function setCameraView(view) {
            state.cameraView = view;
            switch(view) {
                case 1: // Side
                    camera.position.set(0, 50, 200);
                    controls.target.set(0, 0, 0);
                    break;
                case 2: // Top
                    camera.position.set(0, 200, 0);
                    controls.target.set(0, 0, 0);
                    break;
                case 3: // Earth Surface
                    camera.position.set(0, 12, 5);
                    controls.target.set(-150, 0, 0);
                    break;
            }
            controls.update();
        }

        // --- Helper Functions ---
        function updateLabels() {
            if (!state.labelsVisible) {
                labelSun.style.display = 'none';
                labelEarth.style.display = 'none';
                labelMoon.style.display = 'none';
                return;
            }

            const widthHalf = window.innerWidth / 2;
            const heightHalf = window.innerHeight / 2;

            const updateLabel = (mesh, element) => {
                const pos = mesh.position.clone();
                pos.project(camera);
                
                if (pos.z > 1) {
                    element.style.display = 'none';
                    return;
                }

                element.style.display = 'block';
                element.style.left = (pos.x * widthHalf + widthHalf) + 'px';
                element.style.top = (-(pos.y * heightHalf) + heightHalf) + 'px';
            };

            updateLabel(sun, labelSun);
            updateLabel(earth, labelEarth);
            updateLabel(moon, labelMoon);
        }

        function updateUI() {
            speedDisplay.textContent = (state.isPaused ? storedTimeScale : state.timeScale).toFixed(2) + 'x';
            
            let deg = (state.moonAngle * 180 / Math.PI) % 360;
            if (deg < 0) deg += 360;
            angleDisplay.textContent = deg.toFixed(1) + '°';

            eclipseStatusDisplay.textContent = state.eclipseStatus;
            if (state.eclipseStatus === 'Total') eclipseStatusDisplay.style.color = '#FF5555';
            else if (state.eclipseStatus === 'Partial') eclipseStatusDisplay.style.color = '#FFAA55';
            else eclipseStatusDisplay.style.color = '#FFFFFF';

            eclipsePercentDisplay.textContent = state.eclipsePercent.toFixed(1) + '%';
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            state.frameCount++;

            // Orbital Mechanics
            if (!state.isPaused) {
                state.moonAngle += 0.005 * state.timeScale;
            }

            moon.position.x = 30 * Math.cos(state.moonAngle);
            moon.position.z = 30 * Math.sin(state.moonAngle);

            // Update State Positions
            state.moonPosition.x = moon.position.x;
            state.moonPosition.z = moon.position.z;

            // Eclipse Calculation
            const earthToSun = new THREE.Vector3(-1, 0, 0); // Normalized vector from Earth to Sun
            const earthToMoon = moon.position.clone().normalize();
            
            // Angle between Earth-Sun line and Earth-Moon line
            const angleRad = Math.acos(earthToSun.dot(earthToMoon));
            const angleDeg = angleRad * 180 / Math.PI;

            if (angleDeg < 0.5) {
                state.eclipseStatus = 'Total';
                state.eclipsePercent = 100;
            } else if (angleDeg < 3) {
                state.eclipseStatus = 'Partial';
                // Map angle 3 -> 0.5 to percent 0 -> 100
                state.eclipsePercent = Math.max(0, Math.min(100, ((3 - angleDeg) / 2.5) * 100));
            } else {
                state.eclipseStatus = 'None';
                state.eclipsePercent = 0;
            }

            // Shadow Cone Logic
            if (angleDeg < 15 && state.shadowConeVisible) {
                shadowCone.visible = true;
                // Position cone halfway between Moon and Earth
                shadowCone.position.copy(moon.position).lerp(earth.position, 0.5);
                // Point cone from Moon to Earth (+Y is tip, so point +Y to Earth)
                const dir = earth.position.clone().sub(moon.position).normalize();
                shadowCone.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
            } else {
                shadowCone.visible = false;
            }

            updateUI();
            updateLabels();
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
