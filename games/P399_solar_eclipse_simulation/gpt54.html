<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Solar Eclipse Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
    }

    #container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #info-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 12px 14px;
      border-radius: 8px;
      z-index: 20;
      min-width: 220px;
      line-height: 1.6;
      font-size: 14px;
    }

    #control-bar {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      background: rgba(0, 0, 0, 0.65);
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      z-index: 20;
    }

    button {
      background: #1e2a44;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #2f4775;
    }

    .label {
      color: white;
      font-size: 13px;
      padding: 4px 8px;
      background: rgba(0,0,0,0.5);
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      white-space: nowrap;
      user-select: none;
    }

    #help {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 20;
      background: rgba(0,0,0,0.65);
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 13px;
      line-height: 1.5;
      max-width: 240px;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="info-panel">
      <div><strong>3D Solar Eclipse Simulation</strong></div>
      <div>Speed: <span id="speed-display">1.00x</span></div>
      <div>Moon Angle: <span id="angle-display">0.00°</span></div>
      <div>Eclipse Status: <span id="eclipse-status">None</span></div>
      <div>Eclipse %: <span id="eclipse-percent">0</span>%</div>
    </div>

    <div id="help">
      <div><strong>Keyboard</strong></div>
      <div>1 = Side view</div>
      <div>2 = Top-down view</div>
      <div>3 = Earth-surface view</div>
      <div>S = Toggle shadow cone</div>
      <div>L = Toggle labels</div>
    </div>

    <div id="control-bar">
      <button id="speed-down">Speed Down</button>
      <button id="pause-btn">Pause</button>
      <button id="speed-up">Speed Up</button>
      <button id="reset-btn">Reset</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
    import { CSS2DRenderer, CSS2DObject } from 'https://unpkg.com/three@0.160.0/examples/jsm/renderers/CSS2DRenderer.js';

    const container = document.getElementById('container');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      2000
    );
    camera.position.set(0, 50, 200);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    labelRenderer.domElement.style.zIndex = '10';
    container.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    // Lighting
    const sunLight = new THREE.PointLight(0xFFFF00, 2, 1000);
    sunLight.position.set(-150, 0, 0);
    scene.add(sunLight);

    const ambientLight = new THREE.AmbientLight(0x111122, 0.05);
    scene.add(ambientLight);

    // Stars
    const starGeo = new THREE.BufferGeometry();
    const starCount = 2000;
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      const r = 900;
      starPositions[i * 3 + 0] = (Math.random() - 0.5) * r * 2;
      starPositions[i * 3 + 1] = (Math.random() - 0.5) * r * 2;
      starPositions[i * 3 + 2] = (Math.random() - 0.5) * r * 2;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, sizeAttenuation: true });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // Sun
    const sunGroup = new THREE.Group();
    sunGroup.position.set(-150, 0, 0);
    scene.add(sunGroup);

    const sun = new THREE.Mesh(
      new THREE.SphereGeometry(20, 48, 48),
      new THREE.MeshBasicMaterial({ color: 0xFFDD00 })
    );
    sunGroup.add(sun);

    const sunGlow = new THREE.Mesh(
      new THREE.SphereGeometry(26, 48, 48),
      new THREE.MeshBasicMaterial({
        color: 0xFFDD66,
        transparent: true,
        opacity: 0.18,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      })
    );
    sunGroup.add(sunGlow);

    // Earth
    const earth = new THREE.Mesh(
      new THREE.SphereGeometry(8, 48, 48),
      new THREE.MeshStandardMaterial({
        color: 0x2244AA,
        roughness: 0.9,
        metalness: 0.0,
        emissive: 0x001122,
        emissiveIntensity: 0.15
      })
    );
    earth.position.set(0, 0, 0);
    scene.add(earth);

    // Earth visual variation
    const earthCloudGlow = new THREE.Mesh(
      new THREE.SphereGeometry(8.25, 48, 48),
      new THREE.MeshStandardMaterial({
        color: 0x66cc99,
        transparent: true,
        opacity: 0.12,
        roughness: 1.0,
        metalness: 0.0
      })
    );
    earth.add(earthCloudGlow);

    // Moon
    const moon = new THREE.Mesh(
      new THREE.SphereGeometry(3, 32, 32),
      new THREE.MeshStandardMaterial({
        color: 0xAAAAAA,
        roughness: 1.0,
        metalness: 0.0
      })
    );
    moon.position.set(30, 0, 0);
    scene.add(moon);

    // Orbit path
    const orbitPoints = [];
    for (let i = 0; i <= 128; i++) {
      const a = (i / 128) * Math.PI * 2;
      orbitPoints.push(new THREE.Vector3(30 * Math.cos(a), 0, 30 * Math.sin(a)));
    }
    const orbitGeometry = new THREE.BufferGeometry().setFromPoints(orbitPoints);
    const orbitLine = new THREE.LineLoop(
      orbitGeometry,
      new THREE.LineBasicMaterial({ color: 0x555555 })
    );
    scene.add(orbitLine);

    // Shadow cone (umbra visualization)
    const shadowCone = new THREE.Mesh(
      new THREE.ConeGeometry(8, 40, 24, 1, true),
      new THREE.MeshBasicMaterial({
        color: 0x000000,
        transparent: true,
        opacity: 0.15,
        side: THREE.DoubleSide,
        depthWrite: false
      })
    );
    shadowCone.visible = true;
    scene.add(shadowCone);

    // Chair loader
    let chair;
    const chairAnchor = new THREE.Group();
    chairAnchor.position.set(0, 8, 0);
    scene.add(chairAnchor);

    const loader = new GLTFLoader();
    let chairLoaded = false;

    loader.load(
      'SheenChair.glb',
      (gltf) => {
        chair = gltf.scene;
        chair.scale.set(0.5, 0.5, 0.5);
        chair.position.set(0, 0, 0);
        chairAnchor.add(chair);

        // Face the Sun
        const sunWorld = new THREE.Vector3(-150, 0, 0);
        chairAnchor.lookAt(sunWorld);

        chairLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load SheenChair.glb:', err);
        // Fallback chair placeholder
        const fallback = new THREE.Mesh(
          new THREE.BoxGeometry(2, 2, 2),
          new THREE.MeshStandardMaterial({ color: 0x884422 })
        );
        fallback.position.set(0, 0, 0);
        chairAnchor.add(fallback);
        chairLoaded = false;
      }
    );

    // Labels
    function createLabel(text) {
      const div = document.createElement('div');
      div.className = 'label';
      div.textContent = text;
      return new CSS2DObject(div);
    }

    const sunLabel = createLabel('Sun');
    sunLabel.position.set(0, 28, 0);
    sunGroup.add(sunLabel);

    const earthLabel = createLabel('Earth');
    earthLabel.position.set(0, 12, 0);
    earth.add(earthLabel);

    const moonLabel = createLabel('Moon');
    moonLabel.position.set(0, 6, 0);
    moon.add(moonLabel);

    // UI references
    const speedDisplay = document.getElementById('speed-display');
    const angleDisplay = document.getElementById('angle-display');
    const eclipseStatusDisplay = document.getElementById('eclipse-status');
    const eclipsePercentDisplay = document.getElementById('eclipse-percent');

    const speedUpBtn = document.getElementById('speed-up');
    const speedDownBtn = document.getElementById('speed-down');
    const pauseBtn = document.getElementById('pause-btn');
    const resetBtn = document.getElementById('reset-btn');

    // State
    let moonAngle = 0;
    let timeScale = 1.0;
    let isPaused = false;
    let storedTimeScale = 1.0;
    let eclipseStatus = 'none';
    let eclipsePercent = 0;
    let cameraView = 1;
    let shadowConeVisible = true;
    let labelsVisible = true;
    let frameCount = 0;

    window.__3D_STATE__ = {
      sunPosition: { x: -150, y: 0, z: 0 },
      earthPosition: { x: 0, y: 0, z: 0 },
      moonPosition: { x: 30, y: 0, z: 0 },
      moonAngle,
      timeScale,
      isPaused,
      eclipseStatus,
      eclipsePercent,
      cameraView,
      shadowConeVisible,
      labelsVisible,
      chairLoaded,
      frameCount
    };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function setCameraView(view) {
      cameraView = view;
      if (view === 1) {
        camera.position.set(0, 50, 200);
        camera.up.set(0, 1, 0);
        controls.target.set(0, 0, 0);
      } else if (view === 2) {
        camera.position.set(0, 200, 0.01);
        camera.up.set(0, 0, -1);
        controls.target.set(0, 0, 0);
      } else if (view === 3) {
        camera.position.set(0, 12, 5);
        camera.up.set(0, 1, 0);
        camera.lookAt(-150, 0, 0);
        controls.target.set(-150, 0, 0);
      }
      camera.lookAt(controls.target);
      controls.update();
    }

    function updateMoonPosition() {
      moon.position.set(
        30 * Math.cos(moonAngle),
        0,
        30 * Math.sin(moonAngle)
      );
    }

    function updateShadowCone() {
      const earthPos = earth.position.clone();
      const moonPos = moon.position.clone();
      const dirToEarth = new THREE.Vector3().subVectors(earthPos, moonPos).normalize();

      shadowCone.position.copy(moonPos).add(dirToEarth.clone().multiplyScalar(20));
      shadowCone.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dirToEarth);

      const eclipseAligned = moon.position.x < 0 && Math.abs(moon.position.z) < 5;
      shadowCone.visible = shadowConeVisible && eclipseAligned;
    }

    function updateEclipseCalculation() {
      const sunEarthVec = new THREE.Vector3().subVectors(sunGroup.position, earth.position).normalize();
      const moonEarthVec = new THREE.Vector3().subVectors(moon.position, earth.position).normalize();
      const angle = sunEarthVec.angleTo(moonEarthVec);
      const angleDeg = THREE.MathUtils.radToDeg(angle);

      const eclipseAligned = moon.position.x < 0 && Math.abs(moon.position.z) < 5;

      if (eclipseAligned && angleDeg < 0.5) {
        eclipseStatus = 'total';
      } else if (eclipseAligned && angleDeg < 3.0) {
        eclipseStatus = 'partial';
      } else {
        eclipseStatus = 'none';
      }

      if (eclipseStatus === 'total') {
        eclipsePercent = 100;
      } else if (eclipseStatus === 'partial') {
        eclipsePercent = Math.round(clamp((1 - (angleDeg - 0.5) / (3.0 - 0.5)) * 100, 0, 99));
      } else {
        eclipsePercent = 0;
      }
    }

    function updateHUD() {
      speedDisplay.textContent = `${timeScale.toFixed(2)}x`;
      angleDisplay.textContent = `${(THREE.MathUtils.radToDeg(moonAngle) % 360).toFixed(2)}°`;
      eclipseStatusDisplay.textContent =
        eclipseStatus.charAt(0).toUpperCase() + eclipseStatus.slice(1);
      eclipsePercentDisplay.textContent = `${eclipsePercent}`;
      pauseBtn.textContent = isPaused ? 'Play' : 'Pause';
    }

    function updateLabels() {
      sunLabel.element.style.display = labelsVisible ? '' : 'none';
      earthLabel.element.style.display = labelsVisible ? '' : 'none';
      moonLabel.element.style.display = labelsVisible ? '' : 'none';
    }

    function updateState() {
      window.__3D_STATE__ = {
        sunPosition: {
          x: sunGroup.position.x,
          y: sunGroup.position.y,
          z: sunGroup.position.z
        },
        earthPosition: {
          x: earth.position.x,
          y: earth.position.y,
          z: earth.position.z
        },
        moonPosition: {
          x: moon.position.x,
          y: moon.position.y,
          z: moon.position.z
        },
        moonAngle: moonAngle,
        timeScale: timeScale,
        isPaused: isPaused,
        eclipseStatus: eclipseStatus,
        eclipsePercent: eclipsePercent,
        cameraView: cameraView,
        shadowConeVisible: shadowConeVisible,
        labelsVisible: labelsVisible,
        chairLoaded: chairLoaded,
        frameCount: frameCount
      };
    }

    // Controls
    speedUpBtn.addEventListener('click', () => {
      if (!isPaused) {
        timeScale = clamp(timeScale * 2, 0.25, 8.0);
      } else {
        storedTimeScale = clamp(storedTimeScale * 2, 0.25, 8.0);
      }
    });

    speedDownBtn.addEventListener('click', () => {
      if (!isPaused) {
        timeScale = clamp(timeScale / 2, 0.25, 8.0);
      } else {
        storedTimeScale = clamp(storedTimeScale / 2, 0.25, 8.0);
      }
    });

    pauseBtn.addEventListener('click', () => {
      if (!isPaused) {
        storedTimeScale = timeScale;
        timeScale = 0;
        isPaused = true;
      } else {
        timeScale = storedTimeScale || 1.0;
        isPaused = false;
      }
    });

    resetBtn.addEventListener('click', () => {
      moonAngle = 0;
      timeScale = 1.0;
      storedTimeScale = 1.0;
      isPaused = false;
      updateMoonPosition();
      setCameraView(1);
    });

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === '1') setCameraView(1);
      if (key === '2') setCameraView(2);
      if (key === '3') setCameraView(3);

      if (key === 's') {
        shadowConeVisible = !shadowConeVisible;
      }

      if (key === 'l') {
        labelsVisible = !labelsVisible;
        updateLabels();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    setCameraView(1);
    updateMoonPosition();
    updateLabels();

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      if (!isPaused) {
        moonAngle += 0.005 * timeScale;
      }

      updateMoonPosition();

      earth.rotation.y += 0.003;
      moon.rotation.y += 0.002;

      const sunDir = new THREE.Vector3().subVectors(sunGroup.position, chairAnchor.position).normalize();
      const chairLookTarget = chairAnchor.position.clone().add(sunDir);
      chairAnchor.lookAt(chairLookTarget);

      updateEclipseCalculation();
      updateShadowCone();
      updateHUD();
      controls.update();
      updateState();

      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
