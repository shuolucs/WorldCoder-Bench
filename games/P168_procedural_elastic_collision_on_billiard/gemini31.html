<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Billiard Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
        }
        #ui-container {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            background-color: #333;
            border: 2px solid #555;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #555;
        }
        button:active {
            background-color: #777;
        }
        #hud {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            color: #00ffcc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            min-width: 150px;
            pointer-events: none;
        }
        .hud-line {
            margin-bottom: 8px;
            font-size: 14px;
        }
        .hud-line:last-child {
            margin-bottom: 0;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <button id="shootBtn">Shoot</button>
        <button id="resetBtn">Reset</button>
    </div>
    <div id="hud">
        <div id="keDisplay" class="hud-line">KE: 0.00</div>
        <div id="colDisplay" class="hud-line">Collisions: 0</div>
        <div id="statusDisplay" class="hud-line">Status: Ready</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            cueBall: { x: 0, z: 0, vx: 0, vz: 0 },
            redBall: { x: 0, z: 0, vx: 0, vz: 0 },
            blueBall: { x: 0, z: 0, vx: 0, vz: 0 },
            totalKE: 0,
            collisionCount: 0,
            status: 'Ready',
            ballsStopped: true,
            soldierLoaded: false,
            frameCount: 0
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        scene.add(dirLight);

        // --- Table Construction ---
        const tableGroup = new THREE.Group();
        
        // Bed
        const bedGeo = new THREE.BoxGeometry(12, 0.3, 8);
        const bedMat = new THREE.MeshStandardMaterial({ color: 0x006400, roughness: 0.8 });
        const bed = new THREE.Mesh(bedGeo, bedMat);
        bed.receiveShadow = true;
        tableGroup.add(bed);

        // Rails
        const railMat = new THREE.MeshStandardMaterial({ color: 0x5c4033, roughness: 0.6 });
        const railThickness = 0.4;
        const railHeight = 0.5;

        const railN = new THREE.Mesh(new THREE.BoxGeometry(12 + railThickness*2, railHeight, railThickness), railMat);
        railN.position.set(0, 0.1, -4 - railThickness/2);
        railN.castShadow = true;
        tableGroup.add(railN);

        const railS = new THREE.Mesh(new THREE.BoxGeometry(12 + railThickness*2, railHeight, railThickness), railMat);
        railS.position.set(0, 0.1, 4 + railThickness/2);
        railS.castShadow = true;
        tableGroup.add(railS);

        const railE = new THREE.Mesh(new THREE.BoxGeometry(railThickness, railHeight, 8), railMat);
        railE.position.set(6 + railThickness/2, 0.1, 0);
        railE.castShadow = true;
        tableGroup.add(railE);

        const railW = new THREE.Mesh(new THREE.BoxGeometry(railThickness, railHeight, 8), railMat);
        railW.position.set(-6 - railThickness/2, 0.1, 0);
        railW.castShadow = true;
        tableGroup.add(railW);

        scene.add(tableGroup);

        // --- Decorative Soldier ---
        const gltfLoader = new GLTFLoader();
        gltfLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Soldier.glb', (gltf) => {
            const soldier = gltf.scene;
            soldier.position.set(7, 0, 0);
            soldier.scale.set(0.02, 0.02, 0.02);
            soldier.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(soldier);
            window.__3D_STATE__.soldierLoaded = true;
        });

        // --- Billiard Balls ---
        const ballRadius = 0.25;
        const ballY = 0.15 + ballRadius; // Table surface is at Y=0.15 (0.3/2)
        const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
        const ballMatProps = { metalness: 0.1, roughness: 0.3 };

        const cueMesh = new THREE.Mesh(ballGeo, new THREE.MeshStandardMaterial({ color: 0xffffff, ...ballMatProps }));
        const redMesh = new THREE.Mesh(ballGeo, new THREE.MeshStandardMaterial({ color: 0xff0000, ...ballMatProps }));
        const blueMesh = new THREE.Mesh(ballGeo, new THREE.MeshStandardMaterial({ color: 0x0000ff, ...ballMatProps }));

        [cueMesh, redMesh, blueMesh].forEach(mesh => {
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
        });

        const balls = [
            { mesh: cueMesh, pos: new THREE.Vector2(-3, 0), vel: new THREE.Vector2(0, 0), mass: 1.0, radius: ballRadius, name: 'cueBall' },
            { mesh: redMesh, pos: new THREE.Vector2(2, 0), vel: new THREE.Vector2(0, 0), mass: 1.0, radius: ballRadius, name: 'redBall' },
            { mesh: blueMesh, pos: new THREE.Vector2(3, 1), vel: new THREE.Vector2(0, 0), mass: 1.0, radius: ballRadius, name: 'blueBall' }
        ];

        function resetScene() {
            balls[0].pos.set(-3, 0);
            balls[1].pos.set(2, 0);
            balls[2].pos.set(3, 1);
            
            balls.forEach(b => {
                b.vel.set(0, 0);
                b.mesh.position.set(b.pos.x, ballY, b.pos.y);
            });
            
            window.__3D_STATE__.collisionCount = 0;
        }
        resetScene();

        // --- Interactions ---
        document.getElementById('shootBtn').addEventListener('click', () => {
            balls[0].vel.set(5, 0.3);
        });

        document.getElementById('resetBtn').addEventListener('click', resetScene);

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') {
                resetScene();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Physics Engine ---
        const clock = new THREE.Clock();
        const boundsX = 6 - ballRadius; // 5.75
        const boundsZ = 4 - ballRadius; // 3.75

        function updatePhysics(delta) {
            let moving = false;
            let totalKE = 0;

            // 1. Update positions, apply friction, handle wall collisions
            balls.forEach(b => {
                if (b.vel.lengthSq() > 0) {
                    b.pos.addScaledVector(b.vel, delta);
                    b.vel.multiplyScalar(0.995); // Friction per frame

                    if (b.vel.length() < 0.001) {
                        b.vel.set(0, 0);
                    } else {
                        moving = true;
                    }

                    // Wall collisions
                    if (b.pos.x > boundsX) { b.pos.x = boundsX; b.vel.x *= -1; }
                    if (b.pos.x < -boundsX) { b.pos.x = -boundsX; b.vel.x *= -1; }
                    if (b.pos.y > boundsZ) { b.pos.y = boundsZ; b.vel.y *= -1; }
                    if (b.pos.y < -boundsZ) { b.pos.y = -boundsZ; b.vel.y *= -1; }
                }
                
                b.mesh.position.set(b.pos.x, ballY, b.pos.y);
                totalKE += 0.5 * b.mass * b.vel.lengthSq();
            });

            // 2. Ball-to-Ball Collisions
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const b1 = balls[i];
                    const b2 = balls[j];
                    
                    const distSq = b1.pos.distanceToSquared(b2.pos);
                    const minDist = b1.radius + b2.radius;

                    if (distSq < minDist * minDist) {
                        const dist = Math.sqrt(distSq);
                        const normal = new THREE.Vector2().subVectors(b2.pos, b1.pos).normalize();

                        // Resolve overlap
                        const overlap = minDist - dist;
                        const correction = normal.clone().multiplyScalar(overlap / 2);
                        b1.pos.sub(correction);
                        b2.pos.add(correction);

                        // Resolve velocity (1D elastic collision along normal)
                        const relVel = new THREE.Vector2().subVectors(b1.vel, b2.vel);
                        const velAlongNormal = relVel.dot(normal);

                        // Only resolve if moving towards each other
                        if (velAlongNormal > 0) {
                            const impulse = normal.clone().multiplyScalar(velAlongNormal);
                            b1.vel.sub(impulse);
                            b2.vel.add(impulse);
                            window.__3D_STATE__.collisionCount++;
                        }
                    }
                }
            }

            return { moving, totalKE };
        }

        // --- Animation Loop ---
        const keDisplay = document.getElementById('keDisplay');
        const colDisplay = document.getElementById('colDisplay');
        const statusDisplay = document.getElementById('statusDisplay');

        function animate() {
            requestAnimationFrame(animate);
            
            let delta = clock.getDelta();
            if (delta > 1/30) delta = 1/30; // Cap timestep

            const { moving, totalKE } = updatePhysics(delta);

            // Update State Object
            const state = window.__3D_STATE__;
            state.frameCount++;
            state.totalKE = totalKE;
            state.ballsStopped = !moving;
            state.status = moving ? 'Simulating' : 'Ready';

            balls.forEach(b => {
                state[b.name].x = b.pos.x;
                state[b.name].z = b.pos.y;
                state[b.name].vx = b.vel.x;
                state[b.name].vz = b.vel.y;
            });

            // Update HUD DOM
            keDisplay.innerText = `KE: ${totalKE.toFixed(2)}`;
            colDisplay.innerText = `Collisions: ${state.collisionCount}`;
            statusDisplay.innerText = `Status: ${state.status}`;
            statusDisplay.style.color = moving ? '#ffaa00' : '#00ffcc';

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
