<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Billiard Elastic Collisions</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      gap: 8px;
    }

    button {
      padding: 10px 14px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #f0f0f0;
      color: #111;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    button:hover {
      background: #ffffff;
    }

    #hud {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      color: white;
      background: rgba(0,0,0,0.55);
      padding: 10px 14px;
      border-radius: 8px;
      min-width: 180px;
      line-height: 1.5;
      font-size: 14px;
    }

    #info {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #ddd;
      background: rgba(0,0,0,0.35);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="ui">
    <button id="shootBtn">Shoot</button>
    <button id="resetBtn">Reset</button>
  </div>

  <div id="hud">
    <div>KE: 0.00</div>
    <div>Collisions: 0</div>
    <div>Status: Ready</div>
  </div>

  <div id="info">Mouse: Orbit camera • Keyboard: R to reset</div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x20252b);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 8, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.2, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    directionalLight.castShadow = true;
    scene.add(directionalLight);

    // Table
    const tableGroup = new THREE.Group();
    scene.add(tableGroup);

    const tableTop = new THREE.Mesh(
      new THREE.BoxGeometry(12, 0.3, 8),
      new THREE.MeshStandardMaterial({
        color: 0x1f7a3f,
        roughness: 0.8,
        metalness: 0.05
      })
    );
    tableTop.receiveShadow = true;
    tableTop.position.set(0, 0, 0);
    tableGroup.add(tableTop);

    const railMaterial = new THREE.MeshStandardMaterial({
      color: 0x6b3e1f,
      roughness: 0.7,
      metalness: 0.15
    });

    const railThickness = 0.35;
    const railHeight = 0.35;

    const railTop = new THREE.Mesh(
      new THREE.BoxGeometry(12.7, railHeight, railThickness),
      railMaterial
    );
    railTop.position.set(0, 0.18, 4.175);
    tableGroup.add(railTop);

    const railBottom = railTop.clone();
    railBottom.position.set(0, 0.18, -4.175);
    tableGroup.add(railBottom);

    const railLeft = new THREE.Mesh(
      new THREE.BoxGeometry(railThickness, railHeight, 8),
      railMaterial
    );
    railLeft.position.set(-6.175, 0.18, 0);
    tableGroup.add(railLeft);

    const railRight = railLeft.clone();
    railRight.position.set(6.175, 0.18, 0);
    tableGroup.add(railRight);

    // Ground for visual context
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 40),
      new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.95 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.16;
    ground.receiveShadow = true;
    scene.add(ground);

    // Soldier asset
    let soldierLoaded = false;
    const loader = new GLTFLoader();
    loader.load(
      'soldier.glb',
      (gltf) => {
        const model = gltf.scene;
        model.position.set(7, 0, 0);
        model.scale.setScalar(0.02);
        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
        scene.add(model);
        soldierLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load soldier.glb:', err);
      }
    );

    // Balls
    const BALL_RADIUS = 0.25;
    const BALL_Y = 0.4;
    const MASS = 1.0;
    const FRICTION = 0.995;

    const tableBounds = {
      minX: -5.75,
      maxX: 5.75,
      minZ: -3.75,
      maxZ: 3.75
    };

    function createBall(color, x, z) {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(BALL_RADIUS, 32, 32),
        new THREE.MeshStandardMaterial({
          color,
          metalness: 0.1,
          roughness: 0.3
        })
      );
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.position.set(x, BALL_Y, z);
      scene.add(mesh);

      return {
        mesh,
        radius: BALL_RADIUS,
        mass: MASS,
        start: new THREE.Vector3(x, BALL_Y, z),
        velocity: new THREE.Vector2(0, 0)
      };
    }

    const cueBall = createBall(0xffffff, -3, 0);
    const redBall = createBall(0xcc2222, 2, 0);
    const blueBall = createBall(0x2255dd, 3, 1);

    const balls = [cueBall, redBall, blueBall];

    let collisionCount = 0;
    let frameCount = 0;

    const shootBtn = document.getElementById('shootBtn');
    const resetBtn = document.getElementById('resetBtn');
    const hud = document.getElementById('hud');

    function resetScene() {
      balls.forEach(ball => {
        ball.mesh.position.copy(ball.start);
        ball.velocity.set(0, 0);
      });
      collisionCount = 0;
    }

    function shootCueBall() {
      cueBall.velocity.set(5, 0.3);
    }

    shootBtn.addEventListener('click', shootCueBall);
    resetBtn.addEventListener('click', resetScene);

    window.addEventListener('keydown', (e) => {
      if (e.key === 'r' || e.key === 'R') {
        resetScene();
      }
    });

    function handleRailCollision(ball) {
      const pos = ball.mesh.position;
      const r = ball.radius;

      if (pos.x + r > tableBounds.maxX) {
        pos.x = tableBounds.maxX - r;
        ball.velocity.x *= -1;
      } else if (pos.x - r < tableBounds.minX) {
        pos.x = tableBounds.minX + r;
        ball.velocity.x *= -1;
      }

      if (pos.z + r > tableBounds.maxZ) {
        pos.z = tableBounds.maxZ - r;
        ball.velocity.y *= -1;
      } else if (pos.z - r < tableBounds.minZ) {
        pos.z = tableBounds.minZ + r;
        ball.velocity.y *= -1;
      }
    }

    function handleBallCollision(a, b) {
      const dx = b.mesh.position.x - a.mesh.position.x;
      const dz = b.mesh.position.z - a.mesh.position.z;
      const distSq = dx * dx + dz * dz;
      const minDist = a.radius + b.radius;

      if (distSq === 0 || distSq > minDist * minDist) return;

      const dist = Math.sqrt(distSq);
      const nx = dx / dist;
      const nz = dz / dist;

      // Separate overlapping balls
      const overlap = minDist - dist;
      const correction = overlap * 0.5 + 1e-6;
      a.mesh.position.x -= nx * correction;
      a.mesh.position.z -= nz * correction;
      b.mesh.position.x += nx * correction;
      b.mesh.position.z += nz * correction;

      const va = a.velocity.clone();
      const vb = b.velocity.clone();

      const vaN = va.x * nx + va.y * nz;
      const vbN = vb.x * nx + vb.y * nz;

      // Only resolve if moving toward each other along normal
      if (vaN - vbN <= 0) return;

      // Equal-mass elastic collision: exchange normal components
      const vaT = new THREE.Vector2(
        va.x - vaN * nx,
        va.y - vaN * nz
      );
      const vbT = new THREE.Vector2(
        vb.x - vbN * nx,
        vb.y - vbN * nz
      );

      const newVa = new THREE.Vector2(
        vaT.x + vbN * nx,
        vaT.y + vbN * nz
      );
      const newVb = new THREE.Vector2(
        vbT.x + vaN * nx,
        vbT.y + vaN * nz
      );

      a.velocity.copy(newVa);
      b.velocity.copy(newVb);

      collisionCount++;
    }

    function applyFrictionAndStop(ball) {
      ball.velocity.multiplyScalar(FRICTION);

      if (ball.velocity.lengthSq() < 0.001 * 0.001) {
        ball.velocity.set(0, 0);
      }
    }

    function getTotalKE() {
      let total = 0;
      for (const b of balls) {
        total += 0.5 * b.mass * (b.velocity.x * b.velocity.x + b.velocity.y * b.velocity.y);
      }
      return total;
    }

    function allBallsStopped() {
      return balls.every(b => b.velocity.lengthSq() === 0);
    }

    function updateState() {
      const totalKE = getTotalKE();
      const stopped = allBallsStopped();
      const status = stopped ? 'ready' : 'simulating';

      window.__3D_STATE__ = {
        cueBall: {
          x: cueBall.mesh.position.x,
          z: cueBall.mesh.position.z,
          vx: cueBall.velocity.x,
          vz: cueBall.velocity.y
        },
        redBall: {
          x: redBall.mesh.position.x,
          z: redBall.mesh.position.z,
          vx: redBall.velocity.x,
          vz: redBall.velocity.y
        },
        blueBall: {
          x: blueBall.mesh.position.x,
          z: blueBall.mesh.position.z,
          vx: blueBall.velocity.x,
          vz: blueBall.velocity.y
        },
        totalKE,
        collisionCount,
        status,
        ballsStopped: stopped,
        soldierLoaded,
        frameCount
      };

      hud.innerHTML = `
        <div>KE: ${totalKE.toFixed(2)}</div>
        <div>Collisions: ${collisionCount}</div>
        <div>Status: ${status === 'ready' ? 'Ready' : 'Simulating'}</div>
      `;
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const dt = Math.min(clock.getDelta(), 1 / 30);

      for (const ball of balls) {
        ball.mesh.position.x += ball.velocity.x * dt;
        ball.mesh.position.z += ball.velocity.y * dt;
        ball.mesh.position.y = BALL_Y;
      }

      handleBallCollision(cueBall, redBall);
      handleBallCollision(cueBall, blueBall);
      handleBallCollision(redBall, blueBall);

      for (const ball of balls) {
        handleRailCollision(ball);
        applyFrictionAndStop(ball);
      }

      controls.update();
      updateState();
      renderer.render(scene, camera);
    }

    resetScene();
    updateState();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
