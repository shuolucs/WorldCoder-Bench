<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billiard Table Simulation</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }
    canvas { display: block; }
    #controls {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 10;
        display: flex;
        gap: 10px;
    }
    #controls button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        font-weight: bold;
        transition: background 0.2s;
    }
    #shootBtn {
        background: #4CAF50;
        color: white;
    }
    #shootBtn:hover { background: #45a049; }
    #resetBtn {
        background: #f44336;
        color: white;
    }
    #resetBtn:hover { background: #da190b; }
    #hud {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        padding: 15px 20px;
        border-radius: 8px;
        font-size: 14px;
        line-height: 1.8;
        min-width: 180px;
    }
    #hud div {
        white-space: nowrap;
    }
</style>
</head>
<body>

<div id="controls">
    <button id="shootBtn">Shoot</button>
    <button id="resetBtn">Reset</button>
</div>

<div id="hud">
    <div id="hudKE">KE: 0.00</div>
    <div id="hudCollisions">Collisions: 0</div>
    <div id="hudStatus">Status: Ready</div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
directionalLight.shadow.camera.near = 0.5;
directionalLight.shadow.camera.far = 50;
directionalLight.shadow.camera.left = -10;
directionalLight.shadow.camera.right = 10;
directionalLight.shadow.camera.top = 10;
directionalLight.shadow.camera.bottom = -10;
scene.add(directionalLight);

// Table
const tableGeometry = new THREE.BoxGeometry(12, 0.3, 8);
const tableMaterial = new THREE.MeshStandardMaterial({ color: 0x0d6b2e, roughness: 0.8, metalness: 0.1 });
const table = new THREE.Mesh(tableGeometry, tableMaterial);
table.position.set(0, 0, 0);
table.receiveShadow = true;
scene.add(table);

// Rails
const railMaterial = new THREE.MeshStandardMaterial({ color: 0x5c3317, roughness: 0.6, metalness: 0.2 });
const railThickness = 0.25;
const railHeight = 0.3;

// Top rail (positive Z)
const topRail = new THREE.Mesh(new THREE.BoxGeometry(12 + railThickness * 2, railHeight, railThickness), railMaterial);
topRail.position.set(0, 0.15 + 0.15, 4 + railThickness / 2);
topRail.castShadow = true;
scene.add(topRail);

// Bottom rail (negative Z)
const bottomRail = new THREE.Mesh(new THREE.BoxGeometry(12 + railThickness * 2, railHeight, railThickness), railMaterial);
bottomRail.position.set(0, 0.15 + 0.15, -4 - railThickness / 2);
bottomRail.castShadow = true;
scene.add(bottomRail);

// Left rail (negative X)
const leftRail = new THREE.Mesh(new THREE.BoxGeometry(railThickness, railHeight, 8), railMaterial);
leftRail.position.set(-6 - railThickness / 2, 0.15 + 0.15, 0);
leftRail.castShadow = true;
scene.add(leftRail);

// Right rail (positive X)
const rightRail = new THREE.Mesh(new THREE.BoxGeometry(railThickness, railHeight, 8), railMaterial);
rightRail.position.set(6 + railThickness / 2, 0.15 + 0.15, 0);
rightRail.castShadow = true;
scene.add(rightRail);

// Floor under table
const floorGeometry = new THREE.PlaneGeometry(30, 30);
const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x2c2c3e, roughness: 0.9 });
const floor = new THREE.Mesh(floorGeometry, floorMaterial);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.15;
floor.receiveShadow = true;
scene.add(floor);

// Ball parameters
const BALL_RADIUS = 0.25;
const BALL_Y = 0.4;
const MASS = 1.0;
const FRICTION = 0.995;
const MIN_SPEED = 0.001;
const TABLE_MIN_X = -5.75;
const TABLE_MAX_X = 5.75;
const TABLE_MIN_Z = -3.75;
const TABLE_MAX_Z = 3.75;

// Ball class
class Ball {
    constructor(color, startX, startZ, name) {
        const geometry = new THREE.SphereGeometry(BALL_RADIUS, 32, 32);
        const material = new THREE.MeshStandardMaterial({
            color: color,
            metalness: 0.1,
            roughness: 0.3
        });
        this.mesh = new THREE.Mesh(geometry, material);
        this.mesh.castShadow = true;
        this.mesh.receiveShadow = true;
        this.startX = startX;
        this.startZ = startZ;
        this.name = name;
        this.vx = 0;
        this.vz = 0;
        this.reset();
        scene.add(this.mesh);
    }

    reset() {
        this.mesh.position.set(this.startX, BALL_Y, this.startZ);
        this.vx = 0;
        this.vz = 0;
    }

    get x() { return this.mesh.position.x; }
    set x(val) { this.mesh.position.x = val; }
    get z() { return this.mesh.position.z; }
    set z(val) { this.mesh.position.z = val; }

    speed() {
        return Math.sqrt(this.vx * this.vx + this.vz * this.vz);
    }

    kineticEnergy() {
        return 0.5 * MASS * (this.vx * this.vx + this.vz * this.vz);
    }

    isStopped() {
        return this.vx === 0 && this.vz === 0;
    }
}

// Create balls
const cueBall = new Ball(0xffffff, -3, 0, 'cue');
const redBall = new Ball(0xff0000, 2, 0, 'red');
const blueBall = new Ball(0x0000ff, 3, 1, 'blue');
const balls = [cueBall, redBall, blueBall];

// Load soldier model
let soldierLoaded = false;
const loader = new GLTFLoader();
loader.load(
    'soldier.glb',
    (gltf) => {
        const model = gltf.scene;
        model.scale.set(0.02, 0.02, 0.02);
        model.position.set(7, 0, 0);
        model.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        scene.add(model);
        soldierLoaded = true;
        console.log('Soldier model loaded successfully');
    },
    (progress) => {
        console.log('Loading soldier:', (progress.loaded / progress.total * 100).toFixed(1) + '%');
    },
    (error) => {
        console.warn('Could not load soldier.glb:', error.message);
        // Create a placeholder trophy
        const trophyGroup = new THREE.Group();
        
        const baseGeo = new THREE.CylinderGeometry(0.3, 0.4, 0.3, 16);
        const trophyMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.2 });
        const base = new THREE.Mesh(baseGeo, trophyMat);
        base.position.y = 0.15;
        trophyGroup.add(base);

        const stemGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.5, 8);
        const stem = new THREE.Mesh(stemGeo, trophyMat);
        stem.position.y = 0.55;
        trophyGroup.add(stem);

        const cupGeo = new THREE.CylinderGeometry(0.3, 0.15, 0.4, 16, 1, true);
        const cup = new THREE.Mesh(cupGeo, trophyMat);
        cup.position.y = 1.0;
        trophyGroup.add(cup);

        const cupBottom = new THREE.Mesh(new THREE.CircleGeometry(0.15, 16), trophyMat);
        cupBottom.rotation.x = -Math.PI / 2;
        cupBottom.position.y = 0.8;
        trophyGroup.add(cupBottom);

        trophyGroup.position.set(7, 0, 0);
        trophyGroup.traverse(c => { if (c.isMesh) { c.castShadow = true; } });
        scene.add(trophyGroup);
        soldierLoaded = true;
    }
);

// Physics state
let collisionCount = 0;
let frameCount = 0;

// State management
window.__3D_STATE__ = {
    cueBall: { x: 0, z: 0, vx: 0, vz: 0 },
    redBall: { x: 0, z: 0, vx: 0, vz: 0 },
    blueBall: { x: 0, z: 0, vx: 0, vz: 0 },
    totalKE: 0,
    collisionCount: 0,
    status: 'ready',
    ballsStopped: true,
    soldierLoaded: false,
    frameCount: 0
};

function updateState() {
    const totalKE = balls.reduce((sum, b) => sum + b.kineticEnergy(), 0);
    const allStopped = balls.every(b => b.isStopped());

    window.__3D_STATE__ = {
        cueBall: { x: cueBall.x, z: cueBall.z, vx: cueBall.vx, vz: cueBall.vz },
        redBall: { x: redBall.x, z: redBall.z, vx: redBall.vx, vz: redBall.vz },
        blueBall: { x: blueBall.x, z: blueBall.z, vx: blueBall.vx, vz: blueBall.vz },
        totalKE: totalKE,
        collisionCount: collisionCount,
        status: allStopped ? 'ready' : 'simulating',
        ballsStopped: allStopped,
        soldierLoaded: soldierLoaded,
        frameCount: frameCount
    };

    // Update HUD
    document.getElementById('hudKE').textContent = `KE: ${totalKE.toFixed(2)}`;
    document.getElementById('hudCollisions').textContent = `Collisions: ${collisionCount}`;
    document.getElementById('hudStatus').textContent = `Status: ${allStopped ? 'Ready' : 'Simulating'}`;
}

// Physics functions
function checkBallCollision(a, b) {
    const dx = b.x - a.x;
    const dz = b.z - a.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    const minDist = BALL_RADIUS * 2;

    if (dist < minDist && dist > 0) {
        // Collision normal
        const nx = dx / dist;
        const nz = dz / dist;

        // Relative velocity
        const dvx = a.vx - b.vx;
        const dvz = a.vz - b.vz;

        // Relative velocity along collision normal
        const dvn = dvx * nx + dvz * nz;

        // Only resolve if balls are approaching
        if (dvn > 0) {
            // For equal mass elastic collision: exchange velocity components along normal
            a.vx -= dvn * nx;
            a.vz -= dvn * nz;
            b.vx += dvn * nx;
            b.vz += dvn * nz;

            collisionCount++;
        }

        // Separate balls to prevent overlap
        const overlap = minDist - dist;
        const separationX = (overlap / 2) * nx;
        const separationZ = (overlap / 2) * nz;
        a.x -= separationX;
        a.z -= separationZ;
        b.x += separationX;
        b.z += separationZ;
    }
}

function checkRailCollision(ball) {
    if (ball.x - BALL_RADIUS < TABLE_MIN_X) {
        ball.x = TABLE_MIN_X + BALL_RADIUS;
        ball.vx = Math.abs(ball.vx);
    }
    if (ball.x + BALL_RADIUS > TABLE_MAX_X) {
        ball.x = TABLE_MAX_X - BALL_RADIUS;
        ball.vx = -Math.abs(ball.vx);
    }
    if (ball.z - BALL_RADIUS < TABLE_MIN_Z) {
        ball.z = TABLE_MIN_Z + BALL_RADIUS;
        ball.vz = Math.abs(ball.vz);
    }
    if (ball.z + BALL_RADIUS > TABLE_MAX_Z) {
        ball.z = TABLE_MAX_Z - BALL_RADIUS;
        ball.vz = -Math.abs(ball.vz);
    }
}

function updatePhysics(dt) {
    // Cap delta time
    dt = Math.min(dt, 1 / 30);

    // Update positions
    for (const ball of balls) {
        if (!ball.isStopped()) {
            ball.x += ball.vx * dt;
            ball.z += ball.vz * dt;
        }
    }

    // Ball-to-ball collisions
    for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
            checkBallCollision(balls[i], balls[j]);
        }
    }

    // Rail collisions
    for (const ball of balls) {
        checkRailCollision(ball);
    }

    // Apply friction
    for (const ball of balls) {
        ball.vx *= FRICTION;
        ball.vz *= FRICTION;

        // Stop very slow balls
        if (ball.speed() < MIN_SPEED) {
            ball.vx = 0;
            ball.vz = 0;
        }
    }
}

// Shoot function
function shoot() {
    cueBall.vx = 5;
    cueBall.vz = 0.3;
}

// Reset function
function resetScene() {
    for (const ball of balls) {
        ball.reset();
    }
    collisionCount = 0;
}

// Event listeners
document.getElementById('shootBtn').addEventListener('click', shoot);
document.getElementById('resetBtn').addEventListener('click', resetScene);

document.addEventListener('keydown', (e) => {
    if (e.key === 'r' || e.key === 'R') {
        resetScene();
    }
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const dt = clock.getDelta();
    const cappedDt = Math.min(dt, 1 / 30);

    // Run physics in substeps for stability
    const substeps = 4;
    const subDt = cappedDt / substeps;
    for (let i = 0; i < substeps; i++) {
        updatePhysics(subDt);
    }

    frameCount++;
    updateState();

    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
