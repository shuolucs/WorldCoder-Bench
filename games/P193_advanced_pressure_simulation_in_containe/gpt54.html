<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gas Pressure Simulator</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border-radius: 8px;
      z-index: 10;
      line-height: 1.6;
      min-width: 220px;
    }

    #controls {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      background: #16213e;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #22345c;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="temp-display">Temperature: 300 K</div>
    <div id="pressure-display">Pressure: 0.0</div>
    <div id="target-display">Target: 0.0</div>
    <div id="score-display">Score: 0</div>
    <div id="particle-count">Particles: 20</div>

    <div id="controls">
      <button id="heat-btn">Heat (+50K)</button>
      <button id="cool-btn">Cool (-50K)</button>
      <button id="pause-btn">Pause</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    // Container
    const boxSize = 4;
    const halfBox = boxSize / 2;

    const containerGeo = new THREE.BoxGeometry(boxSize, boxSize, boxSize);
    const containerMat = new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.08,
      side: THREE.DoubleSide
    });
    const containerMesh = new THREE.Mesh(containerGeo, containerMat);
    scene.add(containerMesh);

    const edges = new THREE.EdgesGeometry(containerGeo);
    const edgeLines = new THREE.LineSegments(
      edges,
      new THREE.LineBasicMaterial({ color: 0x88aaff })
    );
    scene.add(edgeLines);

    // Particles
    const particleCount = 20;
    const particleRadius = 0.15;
    const particles = [];

    const particleGeo = new THREE.SphereGeometry(particleRadius, 16, 16);
    const particleMat = new THREE.MeshStandardMaterial({
      color: 0x00ffcc,
      emissive: 0x003333,
      roughness: 0.35,
      metalness: 0.1
    });

    function randomDirection() {
      const v = new THREE.Vector3(
        Math.random() * 2 - 1,
        Math.random() * 2 - 1,
        Math.random() * 2 - 1
      );
      return v.normalize();
    }

    function randomPositionInsideBox() {
      const limit = halfBox - particleRadius;
      return new THREE.Vector3(
        (Math.random() * 2 - 1) * limit,
        (Math.random() * 2 - 1) * limit,
        (Math.random() * 2 - 1) * limit
      );
    }

    for (let i = 0; i < particleCount; i++) {
      const mesh = new THREE.Mesh(particleGeo, particleMat);
      mesh.position.copy(randomPositionInsideBox());

      const velocity = randomDirection().multiplyScalar(0.02);

      particles.push({ mesh, velocity });
      scene.add(mesh);
    }

    // UI
    const tempDisplay = document.getElementById("temp-display");
    const pressureDisplay = document.getElementById("pressure-display");
    const targetDisplay = document.getElementById("target-display");
    const scoreDisplay = document.getElementById("score-display");
    const particleCountDisplay = document.getElementById("particle-count");

    const heatBtn = document.getElementById("heat-btn");
    const coolBtn = document.getElementById("cool-btn");
    const pauseBtn = document.getElementById("pause-btn");

    // State
    let temperature = 300;
    let pressure = 0;
    let score = 0;
    let collisionCount = 0;
    let paused = false;

    let targetPressure = randomTargetPressure();

    let activeElapsedTime = 0;
    let lastFrameTime = performance.now();
    let pressureAccumulator = 0;
    let pressureUpdateElapsed = 0;

    let targetZoneTimer = 0;

    function randomTargetPressure() {
      return +(5 + Math.random() * 20).toFixed(1);
    }

    function updateHUD() {
      tempDisplay.textContent = `Temperature: ${temperature} K`;
      pressureDisplay.textContent = `Pressure: ${pressure.toFixed(1)}`;
      targetDisplay.textContent = `Target: ${targetPressure.toFixed(1)}`;
      scoreDisplay.textContent = `Score: ${score}`;
      particleCountDisplay.textContent = `Particles: ${particleCount}`;
    }

    function getAverageParticleSpeed() {
      let total = 0;
      for (const p of particles) total += p.velocity.length();
      return total / particles.length;
    }

    function update3DState() {
      window.__3D_STATE__ = {
        temperature,
        pressure,
        targetPressure,
        score,
        particleCount,
        paused,
        collisionCount,
        elapsedTime: activeElapsedTime,
        particleSpeedAvg: getAverageParticleSpeed()
      };
    }

    function setTemperature(newTemp) {
      const clamped = Math.max(100, Math.min(700, newTemp));
      if (clamped === temperature) return;

      const oldTemp = temperature;
      temperature = clamped;

      const scale = Math.sqrt(temperature / oldTemp);
      for (const p of particles) {
        p.velocity.multiplyScalar(scale);
      }

      updateHUD();
    }

    heatBtn.addEventListener("click", () => setTemperature(temperature + 50));
    coolBtn.addEventListener("click", () => setTemperature(temperature - 50));

    pauseBtn.addEventListener("click", () => {
      paused = !paused;
      pauseBtn.textContent = paused ? "Resume" : "Pause";
      update3DState();
    });

    updateHUD();
    update3DState();

    function animate(now) {
      requestAnimationFrame(animate);

      let dt = (now - lastFrameTime) / 1000;
      lastFrameTime = now;

      // Prevent huge jumps after tab switching
      dt = Math.min(dt, 0.05);

      if (!paused) {
        activeElapsedTime += dt;
        pressureUpdateElapsed += dt;

        const wallLimit = halfBox - particleRadius;

        for (const p of particles) {
          p.mesh.position.addScaledVector(p.velocity, dt * 60);

          if (p.mesh.position.x > wallLimit) {
            p.mesh.position.x = wallLimit;
            p.velocity.x *= -1;
            collisionCount++;
            pressureAccumulator++;
          } else if (p.mesh.position.x < -wallLimit) {
            p.mesh.position.x = -wallLimit;
            p.velocity.x *= -1;
            collisionCount++;
            pressureAccumulator++;
          }

          if (p.mesh.position.y > wallLimit) {
            p.mesh.position.y = wallLimit;
            p.velocity.y *= -1;
            collisionCount++;
            pressureAccumulator++;
          } else if (p.mesh.position.y < -wallLimit) {
            p.mesh.position.y = -wallLimit;
            p.velocity.y *= -1;
            collisionCount++;
            pressureAccumulator++;
          }

          if (p.mesh.position.z > wallLimit) {
            p.mesh.position.z = wallLimit;
            p.velocity.z *= -1;
            collisionCount++;
            pressureAccumulator++;
          } else if (p.mesh.position.z < -wallLimit) {
            p.mesh.position.z = -wallLimit;
            p.velocity.z *= -1;
            collisionCount++;
            pressureAccumulator++;
          }
        }

        // Running average updated every second
        if (pressureUpdateElapsed >= 1.0) {
          pressure = (collisionCount / Math.max(activeElapsedTime, 0.0001)) / 6.0;
          pressureUpdateElapsed = 0;
          updateHUD();
        }

        // Score when pressure remains in target zone for 2 consecutive seconds
        if (Math.abs(pressure - targetPressure) <= 2) {
          targetZoneTimer += dt;
          if (targetZoneTimer >= 2.0) {
            score += 10;
            targetPressure = randomTargetPressure();
            targetZoneTimer = 0;
            updateHUD();
          }
        } else {
          targetZoneTimer = 0;
        }
      }

      update3DState();
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    requestAnimationFrame((t) => {
      lastFrameTime = t;
      animate(t);
    });
  </script>
</body>
</html>
