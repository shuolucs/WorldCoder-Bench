<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gas Pressure Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.7);
    padding: 20px;
    border-radius: 12px;
    color: #ffffff;
    font-size: 15px;
    line-height: 1.8;
    min-width: 240px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
}

#hud div {
    margin-bottom: 4px;
}

#score-display {
    font-size: 20px;
    font-weight: bold;
    color: #ffcc00;
    margin-bottom: 8px !important;
}

#target-display {
    color: #ff6699;
    font-weight: bold;
}

#temp-display {
    color: #00ffcc;
}

#pressure-display {
    color: #66bbff;
}

#particle-count {
    color: #aaaaaa;
    font-size: 13px;
}

#controls {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
}

#controls button {
    padding: 12px 24px;
    font-size: 15px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    color: #fff;
    min-width: 120px;
}

#controls button:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

#controls button:active {
    transform: translateY(0);
}

#heat-btn {
    background: linear-gradient(135deg, #ff4444, #ff8800);
}

#cool-btn {
    background: linear-gradient(135deg, #0088ff, #00ccff);
}

#pause-btn {
    background: linear-gradient(135deg, #888888, #aaaaaa);
}

#match-indicator {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px 20px;
    border-radius: 12px;
    color: #ffffff;
    font-size: 14px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    text-align: center;
}

#match-bar-container {
    width: 150px;
    height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
    margin-top: 8px;
    overflow: hidden;
}

#match-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #00ffcc, #ffcc00);
    border-radius: 4px;
    transition: width 0.1s linear;
}
</style>
</head>
<body>

<div id="hud">
    <div id="score-display">Score: 0</div>
    <div id="temp-display">Temperature: 300 K</div>
    <div id="pressure-display">Pressure: 0.0</div>
    <div id="target-display">Target: 0.0</div>
    <div id="particle-count">Particles: 20</div>
</div>

<div id="match-indicator">
    <div>Target Match</div>
    <div id="match-bar-container">
        <div id="match-bar"></div>
    </div>
    <div id="match-time" style="margin-top:5px; font-size:12px; color:#aaa;">0.0 / 2.0 s</div>
</div>

<div id="controls">
    <button id="cool-btn">Cool (-50K)</button>
    <button id="pause-btn">Pause</button>
    <button id="heat-btn">Heat (+50K)</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    // Container
    const containerSize = 4;
    const halfSize = containerSize / 2;

    // Wireframe edges
    const boxGeometry = new THREE.BoxGeometry(containerSize, containerSize, containerSize);
    const edgesGeometry = new THREE.EdgesGeometry(boxGeometry);
    const edgesMaterial = new THREE.LineBasicMaterial({ color: 0x4466aa, linewidth: 2 });
    const wireframe = new THREE.LineSegments(edgesGeometry, edgesMaterial);
    scene.add(wireframe);

    // Semi-transparent faces
    const faceMaterial = new THREE.MeshPhongMaterial({
        color: 0x2244aa,
        transparent: true,
        opacity: 0.08,
        side: THREE.DoubleSide,
        depthWrite: false
    });
    const faceBox = new THREE.Mesh(boxGeometry, faceMaterial);
    scene.add(faceBox);

    // Particles
    const PARTICLE_COUNT = 20;
    const PARTICLE_RADIUS = 0.15;
    const particles = [];

    const particleGeometry = new THREE.SphereGeometry(PARTICLE_RADIUS, 16, 16);
    const particleMaterial = new THREE.MeshPhongMaterial({
        color: 0x00ffcc,
        emissive: 0x004433,
        shininess: 80
    });

    // Glow effect
    const glowGeometry = new THREE.SphereGeometry(PARTICLE_RADIUS * 1.5, 16, 16);
    const glowMaterial = new THREE.MeshBasicMaterial({
        color: 0x00ffcc,
        transparent: true,
        opacity: 0.15
    });

    const bound = halfSize - PARTICLE_RADIUS;

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const mesh = new THREE.Mesh(particleGeometry, particleMaterial);
        const glow = new THREE.Mesh(glowGeometry, glowMaterial);
        mesh.add(glow);

        const x = (Math.random() - 0.5) * (containerSize - 2 * PARTICLE_RADIUS);
        const y = (Math.random() - 0.5) * (containerSize - 2 * PARTICLE_RADIUS);
        const z = (Math.random() - 0.5) * (containerSize - 2 * PARTICLE_RADIUS);
        mesh.position.set(x, y, z);

        // Random velocity with magnitude ~0.02
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const speed = 0.02;
        const vx = speed * Math.sin(phi) * Math.cos(theta);
        const vy = speed * Math.sin(phi) * Math.sin(theta);
        const vz = speed * Math.cos(phi);

        const particle = {
            mesh: mesh,
            velocity: new THREE.Vector3(vx, vy, vz)
        };

        particles.push(particle);
        scene.add(mesh);
    }

    // State
    let temperature = 300;
    let collisionCount = 0;
    let paused = false;
    let elapsedTime = 0;
    let score = 0;
    let pressure = 0;

    // Pressure calculation
    let lastPressureUpdate = 0;
    let collisionsSinceLastUpdate = 0;
    let displayedPressure = 0;

    // Target
    let targetPressure = Math.random() * 20 + 5;
    let matchTime = 0; // seconds within target zone

    // Timing
    let lastTimestamp = null;

    // Generate new target
    function generateTarget() {
        targetPressure = Math.round((Math.random() * 20 + 5) * 10) / 10;
        matchTime = 0;
        updateHUD();
    }

    generateTarget();

    // HUD update
    function updateHUD() {
        document.getElementById('temp-display').textContent = `Temperature: ${Math.round(temperature)} K`;
        document.getElementById('pressure-display').textContent = `Pressure: ${displayedPressure.toFixed(1)}`;
        document.getElementById('target-display').textContent = `Target: ${targetPressure.toFixed(1)}`;
        document.getElementById('score-display').textContent = `Score: ${score}`;
        document.getElementById('particle-count').textContent = `Particles: ${PARTICLE_COUNT}`;

        const matchPercent = Math.min(matchTime / 2.0, 1.0) * 100;
        document.getElementById('match-bar').style.width = matchPercent + '%';
        document.getElementById('match-time').textContent = `${matchTime.toFixed(1)} / 2.0 s`;
    }

    // Temperature controls
    document.getElementById('heat-btn').addEventListener('click', function() {
        const oldTemp = temperature;
        temperature = Math.min(700, temperature + 50);
        if (temperature !== oldTemp) {
            scaleParticleSpeeds(oldTemp, temperature);
        }
        updateHUD();
    });

    document.getElementById('cool-btn').addEventListener('click', function() {
        const oldTemp = temperature;
        temperature = Math.max(100, temperature - 50);
        if (temperature !== oldTemp) {
            scaleParticleSpeeds(oldTemp, temperature);
        }
        updateHUD();
    });

    function scaleParticleSpeeds(oldTemp, newTemp) {
        const factor = Math.sqrt(newTemp / oldTemp);
        for (const p of particles) {
            p.velocity.multiplyScalar(factor);
        }
    }

    // Pause
    document.getElementById('pause-btn').addEventListener('click', function() {
        paused = !paused;
        this.textContent = paused ? 'Resume' : 'Pause';
        if (!paused) {
            lastTimestamp = null; // Reset to avoid big dt jump
        }
    });

    // Compute average speed
    function getAverageSpeed() {
        let total = 0;
        for (const p of particles) {
            total += p.velocity.length();
        }
        return total / particles.length;
    }

    // Simple orbit-like rotation
    let mouseDown = false;
    let mouseX = 0, mouseY = 0;
    let cameraAngleX = 0, cameraAngleY = 0.37; // initial angles matching (0,3,8)
    const cameraRadius = Math.sqrt(0 + 9 + 64); // ~8.54

    renderer.domElement.addEventListener('mousedown', (e) => {
        mouseDown = true;
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    renderer.domElement.addEventListener('mousemove', (e) => {
        if (!mouseDown) return;
        const dx = e.clientX - mouseX;
        const dy = e.clientY - mouseY;
        cameraAngleX += dx * 0.005;
        cameraAngleY = Math.max(-Math.PI / 2 + 0.1, Math.min(Math.PI / 2 - 0.1, cameraAngleY + dy * 0.005));
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    renderer.domElement.addEventListener('mouseup', () => { mouseDown = false; });
    renderer.domElement.addEventListener('mouseleave', () => { mouseDown = false; });

    // Expose state
    window.__3D_STATE__ = {
        temperature: temperature,
        pressure: 0,
        targetPressure: targetPressure,
        score: 0,
        particleCount: PARTICLE_COUNT,
        paused: false,
        collisionCount: 0,
        elapsedTime: 0,
        particleSpeedAvg: 0
    };

    // Animation
    let pressureAccumulator = 0;
    let pressureCollisionAccumulator = 0;

    function animate(timestamp) {
        requestAnimationFrame(animate);

        if (lastTimestamp === null) {
            lastTimestamp = timestamp;
        }

        const rawDt = (timestamp - lastTimestamp) / 1000;
        lastTimestamp = timestamp;

        // Update camera
        camera.position.x = cameraRadius * Math.sin(cameraAngleX) * Math.cos(cameraAngleY);
        camera.position.y = cameraRadius * Math.sin(cameraAngleY);
        camera.position.z = cameraRadius * Math.cos(cameraAngleX) * Math.cos(cameraAngleY);
        camera.lookAt(0, 0, 0);

        if (!paused) {
            const dt = Math.min(rawDt, 0.05); // cap dt
            elapsedTime += dt;
            pressureAccumulator += dt;

            // Move particles
            for (const p of particles) {
                p.mesh.position.add(p.velocity);

                // Wall collisions
                if (p.mesh.position.x > bound) {
                    p.mesh.position.x = bound;
                    p.velocity.x = -Math.abs(p.velocity.x);
                    collisionCount++;
                    pressureCollisionAccumulator++;
                } else if (p.mesh.position.x < -bound) {
                    p.mesh.position.x = -bound;
                    p.velocity.x = Math.abs(p.velocity.x);
                    collisionCount++;
                    pressureCollisionAccumulator++;
                }

                if (p.mesh.position.y > bound) {
                    p.mesh.position.y = bound;
                    p.velocity.y = -Math.abs(p.velocity.y);
                    collisionCount++;
                    pressureCollisionAccumulator++;
                } else if (p.mesh.position.y < -bound) {
                    p.mesh.position.y = -bound;
                    p.velocity.y = Math.abs(p.velocity.y);
                    collisionCount++;
                    pressureCollisionAccumulator++;
                }

                if (p.mesh.position.z > bound) {
                    p.mesh.position.z = bound;
                    p.velocity.z = -Math.abs(p.velocity.z);
                    collisionCount++;
                    pressureCollisionAccumulator++;
                } else if (p.mesh.position.z < -bound) {
                    p.mesh.position.z = -bound;
                    p.velocity.z = Math.abs(p.velocity.z);
                    collisionCount++;
                    pressureCollisionAccumulator++;
                }
            }

            // Update pressure every second
            if (pressureAccumulator >= 1.0) {
                displayedPressure = (pressureCollisionAccumulator / pressureAccumulator) / 6.0;
                pressure = displayedPressure;
                pressureCollisionAccumulator = 0;
                pressureAccumulator = 0;
            }

            // Check target match
            if (Math.abs(displayedPressure - targetPressure) <= 2.0 && displayedPressure > 0) {
                matchTime += dt;
                if (matchTime >= 2.0) {
                    score += 10;
                    generateTarget();
                }
            } else {
                matchTime = 0;
            }

            // Rotate wireframe slightly for visual effect
            wireframe.rotation.y += 0.001;
            faceBox.rotation.y += 0.001;

            // Update particle glow based on speed
            const avgSpeed = getAverageSpeed();
            const glowIntensity = Math.min(avgSpeed / 0.05, 1.0);
            for (const p of particles) {
                const speed = p.velocity.length();
                const t = Math.min(speed / 0.05, 1.0);
                // Interpolate color from cyan to orange based on speed
                const r = t;
                const g = 1.0 - t * 0.5;
                const b = 1.0 - t;
                p.mesh.material.emissive.setRGB(r * 0.3, g * 0.2, b * 0.2);
            }
        }

        // Update state
        window.__3D_STATE__.temperature = temperature;
        window.__3D_STATE__.pressure = pressure;
        window.__3D_STATE__.targetPressure = targetPressure;
        window.__3D_STATE__.score = score;
        window.__3D_STATE__.particleCount = PARTICLE_COUNT;
        window.__3D_STATE__.paused = paused;
        window.__3D_STATE__.collisionCount = collisionCount;
        window.__3D_STATE__.elapsedTime = elapsedTime;
        window.__3D_STATE__.particleSpeedAvg = getAverageSpeed();

        updateHUD();
        renderer.render(scene, camera);
    }

    requestAnimationFrame(animate);

    // Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
})();
</script>
</body>
</html>
