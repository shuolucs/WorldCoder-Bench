<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gas Pressure Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: sans-serif;
            user-select: none;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            min-width: 150px;
        }
        #hud div {
            margin-bottom: 5px;
            font-size: 16px;
        }
        #hud div:last-child {
            margin-bottom: 0;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #00ffcc;
            color: #1a1a2e;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #33ffdb;
        }
        button:active {
            transform: scale(0.95);
        }
        #pause-btn {
            background-color: #ffcc00;
        }
        #pause-btn:hover {
            background-color: #ffdb33;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="temp-display">Temperature: 300 K</div>
        <div id="pressure-display">Pressure: 0.0</div>
        <div id="target-display">Target: 0.0</div>
        <div id="score-display">Score: 0</div>
        <div id="particle-count">Particles: 20</div>
    </div>

    <div id="controls">
        <button id="heat-btn">Heat (+50K)</button>
        <button id="cool-btn">Cool (-50K)</button>
        <button id="pause-btn">Pause</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // State Management
        window.__3D_STATE__ = {
            temperature: 300,
            pressure: 0,
            targetPressure: Math.floor(Math.random() * 21) + 5, // 5 to 25
            score: 0,
            particleCount: 20,
            paused: false,
            collisionCount: 0,
            elapsedTime: 0,
            particleSpeedAvg: 0
        };

        // DOM Elements
        const tempDisplay = document.getElementById('temp-display');
        const pressureDisplay = document.getElementById('pressure-display');
        const targetDisplay = document.getElementById('target-display');
        const scoreDisplay = document.getElementById('score-display');
        const heatBtn = document.getElementById('heat-btn');
        const coolBtn = document.getElementById('cool-btn');
        const pauseBtn = document.getElementById('pause-btn');

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // Container
        const containerSize = 4;
        const containerGeo = new THREE.BoxGeometry(containerSize, containerSize, containerSize);
        const containerMat = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        const container = new THREE.Mesh(containerGeo, containerMat);
        scene.add(container);

        // Particles
        const particles = [];
        const particleRadius = 0.15;
        const particleGeo = new THREE.SphereGeometry(particleRadius, 16, 16);
        const particleMat = new THREE.MeshPhongMaterial({ color: 0x00ffcc });
        const limit = (containerSize / 2) - particleRadius;

        // Initial speed ~0.02 per frame at 60fps = 1.2 units/sec
        const initialSpeed = 1.2; 

        for (let i = 0; i < window.__3D_STATE__.particleCount; i++) {
            const mesh = new THREE.Mesh(particleGeo, particleMat);
            
            mesh.position.set(
                (Math.random() - 0.5) * 2 * limit,
                (Math.random() - 0.5) * 2 * limit,
                (Math.random() - 0.5) * 2 * limit
            );

            const dir = new THREE.Vector3(
                Math.random() - 0.5,
                Math.random() - 0.5,
                Math.random() - 0.5
            ).normalize();

            const velocity = dir.multiplyScalar(initialSpeed);

            scene.add(mesh);
            particles.push({ mesh, velocity });
        }

        // Simulation Variables
        let clock = new THREE.Clock();
        let pressureTimer = 0;
        let recentCollisions = 0;
        let targetZoneTimer = 0;

        // Update HUD
        function updateHUD() {
            tempDisplay.textContent = `Temperature: ${window.__3D_STATE__.temperature} K`;
            pressureDisplay.textContent = `Pressure: ${window.__3D_STATE__.pressure.toFixed(1)}`;
            targetDisplay.textContent = `Target: ${window.__3D_STATE__.targetPressure.toFixed(1)}`;
            scoreDisplay.textContent = `Score: ${window.__3D_STATE__.score}`;
        }
        updateHUD();

        // Temperature Control
        function changeTemperature(delta) {
            const oldTemp = window.__3D_STATE__.temperature;
            let newTemp = oldTemp + delta;
            newTemp = Math.max(100, Math.min(700, newTemp));

            if (newTemp !== oldTemp) {
                const scale = Math.sqrt(newTemp / oldTemp);
                particles.forEach(p => {
                    p.velocity.multiplyScalar(scale);
                });
                window.__3D_STATE__.temperature = newTemp;
                updateHUD();
            }
        }

        heatBtn.addEventListener('click', () => changeTemperature(50));
        coolBtn.addEventListener('click', () => changeTemperature(-50));

        // Pause Control
        pauseBtn.addEventListener('click', () => {
            window.__3D_STATE__.paused = !window.__3D_STATE__.paused;
            pauseBtn.textContent = window.__3D_STATE__.paused ? 'Resume' : 'Pause';
            if (!window.__3D_STATE__.paused) {
                clock.getDelta(); // Clear accumulated time
            }
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (!window.__3D_STATE__.paused) {
                window.__3D_STATE__.elapsedTime += delta;
                pressureTimer += delta;

                let totalSpeed = 0;

                // Move particles and check collisions
                particles.forEach(p => {
                    p.mesh.position.addScaledVector(p.velocity, delta);
                    totalSpeed += p.velocity.length();

                    let hit = false;
                    if (p.mesh.position.x > limit) { p.mesh.position.x = limit; p.velocity.x *= -1; hit = true; }
                    else if (p.mesh.position.x < -limit) { p.mesh.position.x = -limit; p.velocity.x *= -1; hit = true; }

                    if (p.mesh.position.y > limit) { p.mesh.position.y = limit; p.velocity.y *= -1; hit = true; }
                    else if (p.mesh.position.y < -limit) { p.mesh.position.y = -limit; p.velocity.y *= -1; hit = true; }

                    if (p.mesh.position.z > limit) { p.mesh.position.z = limit; p.velocity.z *= -1; hit = true; }
                    else if (p.mesh.position.z < -limit) { p.mesh.position.z = -limit; p.velocity.z *= -1; hit = true; }

                    if (hit) {
                        window.__3D_STATE__.collisionCount++;
                        recentCollisions++;
                    }
                });

                window.__3D_STATE__.particleSpeedAvg = totalSpeed / particles.length;

                // Calculate Pressure every 1 second
                if (pressureTimer >= 1.0) {
                    // pressure = (collisions / time) / 6 faces
                    window.__3D_STATE__.pressure = (recentCollisions / pressureTimer) / 6.0;
                    recentCollisions = 0;
                    pressureTimer = 0;
                    updateHUD();
                }

                // Scoring System
                if (Math.abs(window.__3D_STATE__.pressure - window.__3D_STATE__.targetPressure) <= 2.0) {
                    targetZoneTimer += delta;
                    if (targetZoneTimer >= 2.0) {
                        window.__3D_STATE__.score += 10;
                        window.__3D_STATE__.targetPressure = Math.floor(Math.random() * 21) + 5;
                        targetZoneTimer = 0;
                        updateHUD();
                    }
                } else {
                    targetZoneTimer = 0;
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
