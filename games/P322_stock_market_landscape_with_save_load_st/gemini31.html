<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Stock Market Landscape</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        #dayDisplay {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        #marketCapDisplay {
            font-size: 18px;
            color: #00ff88;
        }
        #controls-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 26, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334455;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            background: #223344;
            color: white;
            border: 1px solid #445566;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #334455;
        }
        button:active {
            background: #112233;
        }
        #labels-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .stock-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2);
            transform: translate(-50%, -50%);
            will-change: transform;
            display: none; /* Hidden until projected */
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div id="dayDisplay">Day: 0</div>
        <div id="marketCapDisplay">Market Cap: $0.00</div>
    </div>

    <div id="controls-panel">
        <button id="simulateBtn">Simulate Day</button>
        <button id="saveBtn">Save State (S)</button>
        <button id="loadBtn">Load State (L)</button>
        <button id="toggleDragonBtn">Toggle Dragon</button>
        <button id="resetBtn">Reset</button>
    </div>

    <div id="labels-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Constants ---
        const INITIAL_PRICES = [150, 280, 95, 420, 210];
        const STOCK_NAMES = ['AAPL', 'GOOG', 'TSLA', 'AMZN', 'MSFT'];
        const COLORS = [0x00ff88, 0x0088ff, 0xff8800, 0xff0044, 0xaa00ff];
        const POS_X = [-12, -6, 0, 6, 12];
        const POS_Z = 5;
        const HEIGHT_DIVISOR = 20;

        // --- State Management ---
        window.__3D_STATE__ = {
            day: 0,
            prices: [...INITIAL_PRICES],
            towerHeights: INITIAL_PRICES.map(p => p / HEIGHT_DIVISOR),
            dragonVisible: true,
            dragonLoaded: false,
            marketCap: 0,
            savedStateExists: false,
            cameraPosition: { x: 0, y: 15, z: 30 },
            stockNames: STOCK_NAMES,
            simulationCount: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 30);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x334455, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(80, 80);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- Objects ---
        let dragonModel = null;
        const towers = [];
        const labelElements = [];
        const labelsContainer = document.getElementById('labels-container');

        // Load Dragon
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/DragonAttenuation.glb',
            (gltf) => {
                dragonModel = gltf.scene;
                dragonModel.scale.set(3, 3, 3);
                dragonModel.position.set(0, 0, -10);
                scene.add(dragonModel);
                window.__3D_STATE__.dragonLoaded = true;
                updateStateObject();
            },
            undefined,
            (error) => console.error('Error loading dragon model:', error)
        );

        // Create Towers and Labels
        // Base geometry height is 1, translated up by 0.5 so scaling Y grows from bottom
        const boxGeo = new THREE.BoxGeometry(3, 1, 3);
        boxGeo.translate(0, 0.5, 0);

        for (let i = 0; i < 5; i++) {
            const mat = new THREE.MeshStandardMaterial({ color: COLORS[i], roughness: 0.4, metalness: 0.1 });
            const mesh = new THREE.Mesh(boxGeo, mat);
            mesh.position.set(POS_X[i], 0, POS_Z);
            scene.add(mesh);
            towers.push(mesh);

            const label = document.createElement('div');
            label.className = 'stock-label';
            label.textContent = STOCK_NAMES[i];
            label.style.color = '#' + COLORS[i].toString(16).padStart(6, '0');
            labelsContainer.appendChild(label);
            labelElements.push(label);
        }

        // --- Logic Functions ---
        function updateStateObject() {
            const state = window.__3D_STATE__;
            state.marketCap = state.prices.reduce((a, b) => a + b, 0);
            state.towerHeights = state.prices.map(p => p / HEIGHT_DIVISOR);
            state.savedStateExists = !!localStorage.getItem('stockMarketState');
            state.cameraPosition = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
            
            document.getElementById('dayDisplay').innerText = `Day: ${state.day}`;
            document.getElementById('marketCapDisplay').innerText = `Market Cap: $${state.marketCap.toFixed(2)}`;
        }

        function applyStateToScene() {
            const state = window.__3D_STATE__;
            for (let i = 0; i < 5; i++) {
                towers[i].scale.y = state.towerHeights[i];
            }
            if (dragonModel) {
                dragonModel.visible = state.dragonVisible;
            }
            updateStateObject();
        }

        function simulateDay() {
            const state = window.__3D_STATE__;
            state.day++;
            state.simulationCount++;
            for (let i = 0; i < 5; i++) {
                const factor = 0.85 + Math.random() * 0.30; // 0.85 to 1.15
                state.prices[i] *= factor;
            }
            applyStateToScene();
        }

        function saveState() {
            const state = window.__3D_STATE__;
            const dataToSave = {
                day: state.day,
                prices: [...state.prices],
                dragonVisible: state.dragonVisible,
                cameraPosition: state.cameraPosition,
                simulationCount: state.simulationCount
            };
            localStorage.setItem('stockMarketState', JSON.stringify(dataToSave));
            updateStateObject();
        }

        function loadState() {
            const saved = localStorage.getItem('stockMarketState');
            if (saved) {
                const data = JSON.parse(saved);
                const state = window.__3D_STATE__;
                state.day = data.day;
                state.prices = [...data.prices];
                state.dragonVisible = data.dragonVisible;
                state.simulationCount = data.simulationCount || 0;
                
                camera.position.set(data.cameraPosition.x, data.cameraPosition.y, data.cameraPosition.z);
                camera.lookAt(0, 0, 0);
                controls.update();
                
                applyStateToScene();
            }
        }

        function toggleDragon() {
            window.__3D_STATE__.dragonVisible = !window.__3D_STATE__.dragonVisible;
            applyStateToScene();
        }

        function resetState() {
            const state = window.__3D_STATE__;
            state.day = 0;
            state.prices = [...INITIAL_PRICES];
            state.dragonVisible = true;
            state.simulationCount = 0;
            
            camera.position.set(0, 15, 30);
            camera.lookAt(0, 0, 0);
            controls.update();
            
            applyStateToScene();
        }

        // --- Event Listeners ---
        document.getElementById('simulateBtn').addEventListener('click', simulateDay);
        document.getElementById('saveBtn').addEventListener('click', saveState);
        document.getElementById('loadBtn').addEventListener('click', loadState);
        document.getElementById('toggleDragonBtn').addEventListener('click', toggleDragon);
        document.getElementById('resetBtn').addEventListener('click', resetState);

        // Keyboard Controls
        const spherical = new THREE.Spherical();
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 's') saveState();
            if (key === 'l') loadState();

            // Orbit with arrow keys
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                spherical.setFromVector3(camera.position);
                const step = 0.05;
                
                if (e.key === 'ArrowLeft') spherical.theta -= step;
                if (e.key === 'ArrowRight') spherical.theta += step;
                if (e.key === 'ArrowUp') spherical.phi = Math.max(0.1, spherical.phi - step);
                if (e.key === 'ArrowDown') spherical.phi = Math.min(Math.PI - 0.1, spherical.phi + step);
                
                camera.position.setFromSpherical(spherical);
                camera.lookAt(0, 0, 0);
                controls.update();
                updateStateObject();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Render Loop ---
        const tempV = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Update Labels Position
            const state = window.__3D_STATE__;
            for (let i = 0; i < 5; i++) {
                // Position at top of tower
                tempV.set(POS_X[i], state.towerHeights[i] + 1, POS_Z);
                tempV.project(camera);

                // Check if behind camera
                if (tempV.z > 1) {
                    labelElements[i].style.display = 'none';
                } else {
                    labelElements[i].style.display = 'block';
                    const x = (tempV.x * 0.5 + 0.5) * window.innerWidth;
                    const y = (tempV.y * -0.5 + 0.5) * window.innerHeight;
                    labelElements[i].style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px)`;
                }
            }

            // Continuously update camera pos in state if user is dragging mouse
            if (state.cameraPosition.x !== camera.position.x || 
                state.cameraPosition.y !== camera.position.y || 
                state.cameraPosition.z !== camera.position.z) {
                state.cameraPosition.x = camera.position.x;
                state.cameraPosition.y = camera.position.y;
                state.cameraPosition.z = camera.position.z;
            }

            renderer.render(scene, camera);
        }

        // Initialize
        applyStateToScene();
        animate();

    </script>
</body>
</html>
