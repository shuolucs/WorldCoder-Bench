<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Stock Market Landscape</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud-left {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100;
    color: #e0e0e0;
}

#dayDisplay {
    font-size: 24px;
    font-weight: bold;
    color: #00ff88;
    text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
    margin-bottom: 8px;
}

#marketCapDisplay {
    font-size: 18px;
    color: #0088ff;
    text-shadow: 0 0 10px rgba(0, 136, 255, 0.5);
}

#control-panel {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(100, 100, 200, 0.3);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
}

#control-panel button {
    padding: 10px 20px;
    border: 1px solid rgba(100, 100, 200, 0.4);
    border-radius: 8px;
    background: rgba(30, 30, 60, 0.8);
    color: #e0e0e0;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
}

#control-panel button:hover {
    background: rgba(60, 60, 120, 0.9);
    border-color: rgba(150, 150, 255, 0.6);
    transform: translateY(-1px);
    box-shadow: 0 2px 10px rgba(100, 100, 255, 0.3);
}

#simulateBtn { border-color: rgba(0, 255, 136, 0.5); }
#simulateBtn:hover { background: rgba(0, 255, 136, 0.2); box-shadow: 0 2px 10px rgba(0, 255, 136, 0.3); }

#saveBtn { border-color: rgba(0, 136, 255, 0.5); }
#saveBtn:hover { background: rgba(0, 136, 255, 0.2); box-shadow: 0 2px 10px rgba(0, 136, 255, 0.3); }

#loadBtn { border-color: rgba(255, 136, 0, 0.5); }
#loadBtn:hover { background: rgba(255, 136, 0, 0.2); box-shadow: 0 2px 10px rgba(255, 136, 0, 0.3); }

#toggleDragonBtn { border-color: rgba(170, 0, 255, 0.5); }
#toggleDragonBtn:hover { background: rgba(170, 0, 255, 0.2); box-shadow: 0 2px 10px rgba(170, 0, 255, 0.3); }

#resetBtn { border-color: rgba(255, 0, 68, 0.5); }
#resetBtn:hover { background: rgba(255, 0, 68, 0.2); box-shadow: 0 2px 10px rgba(255, 0, 68, 0.3); }

.label-container {
    position: fixed;
    z-index: 50;
    pointer-events: none;
    text-align: center;
}

.stock-label {
    color: #ffffff;
    font-size: 14px;
    font-weight: bold;
    text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    white-space: nowrap;
}

.stock-price {
    color: #aaaacc;
    font-size: 12px;
    margin-top: 2px;
}

#keyboard-hints {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 100;
    color: rgba(200, 200, 220, 0.5);
    font-size: 12px;
    line-height: 1.6;
}
</style>
</head>
<body>

<div id="hud-left">
    <div id="dayDisplay">Day: 0</div>
    <div id="marketCapDisplay">Market Cap: $1,155.00</div>
</div>

<div id="control-panel">
    <button id="simulateBtn">📈 Simulate Day</button>
    <button id="saveBtn">💾 Save State</button>
    <button id="loadBtn">📂 Load State</button>
    <button id="toggleDragonBtn">🐉 Toggle Dragon</button>
    <button id="resetBtn">🔄 Reset</button>
</div>

<div id="keyboard-hints">
    Arrow Keys: Orbit Camera<br>
    S: Save State | L: Load State
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- Constants ---
const INITIAL_PRICES = [150, 280, 95, 420, 210];
const STOCK_NAMES = ['AAPL', 'GOOG', 'TSLA', 'AMZN', 'MSFT'];
const STOCK_COLORS = [0x00ff88, 0x0088ff, 0xff8800, 0xff0044, 0xaa00ff];
const TOWER_POSITIONS_X = [-12, -6, 0, 6, 12];
const TOWER_Z = 5;
const DEFAULT_CAMERA = { x: 0, y: 15, z: 30 };

// --- State ---
let currentDay = 0;
let prices = [...INITIAL_PRICES];
let dragonVisible = true;
let dragonLoaded = false;
let simulationCount = 0;
let dragonModel = null;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.012);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(DEFAULT_CAMERA.x, DEFAULT_CAMERA.y, DEFAULT_CAMERA.z);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0x334455, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(10, 20, 10);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
directionalLight.shadow.camera.near = 0.5;
directionalLight.shadow.camera.far = 60;
directionalLight.shadow.camera.left = -30;
directionalLight.shadow.camera.right = 30;
directionalLight.shadow.camera.top = 30;
directionalLight.shadow.camera.bottom = -30;
scene.add(directionalLight);

// Add some extra atmospheric lights
const pointLight1 = new THREE.PointLight(0x00ff88, 0.3, 50);
pointLight1.position.set(-15, 10, 5);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x0088ff, 0.3, 50);
pointLight2.position.set(15, 10, 5);
scene.add(pointLight2);

// --- Ground Plane ---
const groundGeometry = new THREE.PlaneGeometry(80, 80);
const groundMaterial = new THREE.MeshStandardMaterial({
    color: 0x111122,
    roughness: 0.8,
    metalness: 0.2
});
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Add grid helper for visual effect
const gridHelper = new THREE.GridHelper(80, 40, 0x222244, 0x1a1a33);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// --- OrbitControls ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 5, 0);
controls.minDistance = 10;
controls.maxDistance = 80;
controls.maxPolarAngle = Math.PI / 2.1;

// --- Stock Towers ---
const towers = [];
const towerMeshes = [];
const labelContainers = [];

function createTower(index) {
    const price = prices[index];
    const height = price / 20;
    const geometry = new THREE.BoxGeometry(3, height, 3);
    const material = new THREE.MeshStandardMaterial({
        color: STOCK_COLORS[index],
        roughness: 0.3,
        metalness: 0.6,
        emissive: new THREE.Color(STOCK_COLORS[index]).multiplyScalar(0.15)
    });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(TOWER_POSITIONS_X[index], height / 2, TOWER_Z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);

    // Add glow effect at top
    const glowGeometry = new THREE.BoxGeometry(3.2, 0.1, 3.2);
    const glowMaterial = new THREE.MeshBasicMaterial({
        color: STOCK_COLORS[index],
        transparent: true,
        opacity: 0.6
    });
    const glowMesh = new THREE.Mesh(glowGeometry, glowMaterial);
    glowMesh.position.set(TOWER_POSITIONS_X[index], height, TOWER_Z);
    scene.add(glowMesh);

    // HTML label
    const labelDiv = document.createElement('div');
    labelDiv.className = 'label-container';
    labelDiv.innerHTML = `
        <div class="stock-label" style="color: #${new THREE.Color(STOCK_COLORS[index]).getHexString()}">${STOCK_NAMES[index]}</div>
        <div class="stock-price">$${price.toFixed(2)}</div>
    `;
    document.body.appendChild(labelDiv);

    towers.push({ mesh, glowMesh, material, glowMaterial });
    labelContainers.push(labelDiv);
    return mesh;
}

for (let i = 0; i < 5; i++) {
    towerMeshes.push(createTower(i));
}

function updateTowers() {
    for (let i = 0; i < 5; i++) {
        const price = prices[i];
        const height = price / 20;
        const tower = towers[i];

        // Remove old mesh
        scene.remove(tower.mesh);
        tower.mesh.geometry.dispose();

        // Create new geometry with updated height
        const geometry = new THREE.BoxGeometry(3, height, 3);
        tower.mesh = new THREE.Mesh(geometry, tower.material);
        tower.mesh.position.set(TOWER_POSITIONS_X[i], height / 2, TOWER_Z);
        tower.mesh.castShadow = true;
        tower.mesh.receiveShadow = true;
        scene.add(tower.mesh);

        // Update glow position
        tower.glowMesh.position.set(TOWER_POSITIONS_X[i], height, TOWER_Z);

        // Update label
        const labelDiv = labelContainers[i];
        labelDiv.querySelector('.stock-price').textContent = `$${price.toFixed(2)}`;
    }
}

function updateLabels() {
    for (let i = 0; i < 5; i++) {
        const price = prices[i];
        const height = price / 20;
        const worldPos = new THREE.Vector3(TOWER_POSITIONS_X[i], height + 1.5, TOWER_Z);
        const screenPos = worldPos.clone().project(camera);

        const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;

        const labelDiv = labelContainers[i];
        if (screenPos.z > 1) {
            labelDiv.style.display = 'none';
        } else {
            labelDiv.style.display = 'block';
            labelDiv.style.left = `${x}px`;
            labelDiv.style.top = `${y}px`;
            labelDiv.style.transform = 'translate(-50%, -100%)';
        }
    }
}

// --- Load Dragon Model ---
const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/DragonAttenuation/glTF-Binary/DragonAttenuation.glb',
    (gltf) => {
        dragonModel = gltf.scene;
        dragonModel.scale.set(3, 3, 3);
        dragonModel.position.set(0, 0, -10);
        dragonModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        scene.add(dragonModel);
        dragonLoaded = true;
        dragonModel.visible = dragonVisible;
        updateGlobalState();
        console.log('Dragon model loaded successfully');
    },
    (progress) => {
        const pct = progress.total ? ((progress.loaded / progress.total) * 100).toFixed(1) : '...';
        console.log(`Loading dragon: ${pct}%`);
    },
    (error) => {
        console.warn('Could not load dragon model:', error);
        // Create a placeholder dragon
        const placeholderGroup = new THREE.Group();
        
        // Body
        const bodyGeo = new THREE.ConeGeometry(2, 6, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8844aa, emissive: 0x220033, roughness: 0.4, metalness: 0.6 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 3;
        body.castShadow = true;
        placeholderGroup.add(body);

        // Head
        const headGeo = new THREE.SphereGeometry(1.2, 8, 8);
        const head = new THREE.Mesh(headGeo, bodyMat);
        head.position.y = 6.5;
        head.castShadow = true;
        placeholderGroup.add(head);

        // Eyes
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff4400 });
        const eyeGeo = new THREE.SphereGeometry(0.2, 6, 6);
        const eye1 = new THREE.Mesh(eyeGeo, eyeMat);
        eye1.position.set(-0.5, 6.8, 0.9);
        placeholderGroup.add(eye1);
        const eye2 = new THREE.Mesh(eyeGeo, eyeMat);
        eye2.position.set(0.5, 6.8, 0.9);
        placeholderGroup.add(eye2);

        // Wings
        const wingGeo = new THREE.PlaneGeometry(4, 3);
        const wingMat = new THREE.MeshStandardMaterial({ color: 0x6633aa, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
        const wing1 = new THREE.Mesh(wingGeo, wingMat);
        wing1.position.set(-3, 4, 0);
        wing1.rotation.y = 0.3;
        placeholderGroup.add(wing1);
        const wing2 = new THREE.Mesh(wingGeo, wingMat);
        wing2.position.set(3, 4, 0);
        wing2.rotation.y = -0.3;
        placeholderGroup.add(wing2);

        placeholderGroup.position.set(0, 0, -10);
        scene.add(placeholderGroup);
        dragonModel = placeholderGroup;
        dragonLoaded = true;
        dragonModel.visible = dragonVisible;
        updateGlobalState();
        console.log('Placeholder dragon created');
    }
);

// --- Particles for atmosphere ---
const particleCount = 500;
const particleGeometry = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3] = (Math.random() - 0.5) * 80;
    particlePositions[i * 3 + 1] = Math.random() * 30;
    particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 80;
}
particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMaterial = new THREE.PointsMaterial({
    color: 0x4466aa,
    size: 0.1,
    transparent: true,
    opacity: 0.6
});
const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

// --- HUD Updates ---
function updateHUD() {
    const marketCap = prices.reduce((sum, p) => sum + p, 0);
    document.getElementById('dayDisplay').textContent = `Day: ${currentDay}`;
    document.getElementById('marketCapDisplay').textContent = `Market Cap: $${marketCap.toFixed(2)}`;
}

// --- Global State ---
function updateGlobalState() {
    const marketCap = prices.reduce((sum, p) => sum + p, 0);
    window.__3D_STATE__ = {
        day: currentDay,
        prices: [...prices],
        towerHeights: prices.map(p => p / 20),
        dragonVisible: dragonVisible,
        dragonLoaded: dragonLoaded,
        marketCap: marketCap,
        savedStateExists: localStorage.getItem('stockMarketState') !== null,
        cameraPosition: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
        stockNames: [...STOCK_NAMES],
        simulationCount: simulationCount
    };
}

// --- Simulate Day ---
function simulateDay() {
    for (let i = 0; i < prices.length; i++) {
        const factor = 0.85 + Math.random() * 0.30; // 0.85 to 1.15
        prices[i] = prices[i] * factor;
        // Clamp to prevent negative or absurdly small values
        prices[i] = Math.max(prices[i], 1);
    }
    currentDay++;
    simulationCount++;
    updateTowers();
    updateHUD();
    updateGlobalState();
}

// --- Save State ---
function saveState() {
    const state = {
        prices: [...prices],
        day: currentDay,
        cameraPosition: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
        cameraTarget: { x: controls.target.x, y: controls.target.y, z: controls.target.z },
        dragonVisible: dragonVisible,
        simulationCount: simulationCount
    };
    localStorage.setItem('stockMarketState', JSON.stringify(state));
    updateGlobalState();
    console.log('State saved');
}

// --- Load State ---
function loadState() {
    const data = localStorage.getItem('stockMarketState');
    if (!data) {
        console.log('No saved state found');
        return;
    }
    const state = JSON.parse(data);
    prices = [...state.prices];
    currentDay = state.day;
    simulationCount = state.simulationCount || 0;
    dragonVisible = state.dragonVisible;

    camera.position.set(state.cameraPosition.x, state.cameraPosition.y, state.cameraPosition.z);
    if (state.cameraTarget) {
        controls.target.set(state.cameraTarget.x, state.cameraTarget.y, state.cameraTarget.z);
    }

    if (dragonModel) {
        dragonModel.visible = dragonVisible;
    }

    updateTowers();
    updateHUD();
    updateGlobalState();
    console.log('State loaded');
}

// --- Toggle Dragon ---
function toggleDragon() {
    dragonVisible = !dragonVisible;
    if (dragonModel) {
        dragonModel.visible = dragonVisible;
    }
    updateGlobalState();
}

// --- Reset ---
function resetAll() {
    prices = [...INITIAL_PRICES];
    currentDay = 0;
    simulationCount = 0;
    dragonVisible = true;

    camera.position.set(DEFAULT_CAMERA.x, DEFAULT_CAMERA.y, DEFAULT_CAMERA.z);
    controls.target.set(0, 5, 0);

    if (dragonModel) {
        dragonModel.visible = true;
    }

    updateTowers();
    updateHUD();
    updateGlobalState();
    console.log('Reset to initial state');
}

// --- Button Event Listeners ---
document.getElementById('simulateBtn').addEventListener('click', simulateDay);
document.getElementById('saveBtn').addEventListener('click', saveState);
document.getElementById('loadBtn').addEventListener('click', loadState);
document.getElementById('toggleDragonBtn').addEventListener('click', toggleDragon);
document.getElementById('resetBtn').addEventListener('click', resetAll);

// --- Keyboard Controls ---
const keyState = {};
document.addEventListener('keydown', (e) => {
    keyState[e.key] = true;

    if (e.key === 's' || e.key === 'S') {
        if (!e.ctrlKey && !e.metaKey) {
            saveState();
        }
    }
    if (e.key === 'l' || e.key === 'L') {
        if (!e.ctrlKey && !e.metaKey) {
            loadState();
        }
    }
});

document.addEventListener('keyup', (e) => {
    keyState[e.key] = false;
});

function handleKeyboardOrbit() {
    const orbitSpeed = 0.02;
    const target = controls.target;
    const offset = camera.position.clone().sub(target);
    const spherical = new THREE.Spherical().setFromVector3(offset);

    if (keyState['ArrowLeft']) {
        spherical.theta -= orbitSpeed;
    }
    if (keyState['ArrowRight']) {
        spherical.theta += orbitSpeed;
    }
    if (keyState['ArrowUp']) {
        spherical.phi = Math.max(0.1, spherical.phi - orbitSpeed);
    }
    if (keyState['ArrowDown']) {
        spherical.phi = Math.min(Math.PI / 2.1, spherical.phi + orbitSpeed);
    }

    offset.setFromSpherical(spherical);
    camera.position.copy(target).add(offset);
    camera.lookAt(target);
}

// --- Window Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const elapsed = clock.getElapsedTime();

    handleKeyboardOrbit();
    controls.update();

    // Animate particles
    const positions = particleGeometry.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
        positions[i * 3 + 1] += Math.sin(elapsed + i) * 0.002;
        if (positions[i * 3 + 1] > 30) positions[i * 3 + 1] = 0;
    }
    particleGeometry.attributes.position.needsUpdate = true;

    // Animate tower glow
    for (let i = 0; i < towers.length; i++) {
        const tower = towers[i];
        const pulse = 0.4 + Math.sin(elapsed * 2 + i * 1.2) * 0.2;
        tower.glowMaterial.opacity = pulse;
    }

    // Animate dragon rotation
    if (dragonModel && dragonModel.visible) {
        dragonModel.rotation.y = Math.sin(elapsed * 0.3) * 0.3;
    }

    // Animate point lights
    pointLight1.intensity = 0.3 + Math.sin(elapsed * 1.5) * 0.1;
    pointLight2.intensity = 0.3 + Math.cos(elapsed * 1.5) * 0.1;

    updateLabels();
    updateGlobalState();

    renderer.render(scene, camera);
}

// --- Initialize ---
updateHUD();
updateGlobalState();
animate();

</script>
</body>
</html>
