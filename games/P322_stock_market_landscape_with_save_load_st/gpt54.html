<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Stock Market Landscape</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      pointer-events: none;
    }

    #dayDisplay, #marketCapDisplay {
      background: rgba(10, 10, 30, 0.75);
      padding: 8px 12px;
      margin-bottom: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      font-size: 14px;
      min-width: 180px;
    }

    #controlsPanel {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: rgba(10, 10, 30, 0.75);
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
    }

    #controlsPanel button {
      background: #1d2540;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    #controlsPanel button:hover {
      background: #2a3560;
    }

    #controlsPanel button:active {
      transform: scale(0.98);
    }

    #labels {
      position: absolute;
      inset: 0;
      z-index: 15;
      pointer-events: none;
    }

    .stock-label {
      position: absolute;
      transform: translate(-50%, -50%);
      color: #ffffff;
      font-size: 13px;
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 6px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.18);
      white-space: nowrap;
      text-shadow: 0 0 6px rgba(0,0,0,0.6);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div id="dayDisplay">Day: 0</div>
      <div id="marketCapDisplay">Market Cap: 1155.00</div>
    </div>

    <div id="controlsPanel">
      <button id="simulateBtn">Simulate Day</button>
      <button id="saveBtn">Save State</button>
      <button id="loadBtn">Load State</button>
      <button id="toggleDragonBtn">Toggle Dragon</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div id="labels"></div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const STORAGE_KEY = 'stockMarketState';

    const INITIAL = {
      day: 0,
      prices: [150, 280, 95, 420, 210],
      stockNames: ['AAPL', 'GOOG', 'TSLA', 'AMZN', 'MSFT'],
      towerColors: [0x00ff88, 0x0088ff, 0xff8800, 0xff0044, 0xaa00ff],
      towerXPositions: [-12, -6, 0, 6, 12],
      zPosition: 5,
      dragonVisible: true,
      cameraPosition: { x: 0, y: 15, z: 30 }
    };

    let day = INITIAL.day;
    let prices = [...INITIAL.prices];
    let simulationCount = 0;
    let dragonVisible = INITIAL.dragonVisible;
    let dragonLoaded = false;

    const app = document.getElementById('app');
    const labelsContainer = document.getElementById('labels');
    const dayDisplay = document.getElementById('dayDisplay');
    const marketCapDisplay = document.getElementById('marketCapDisplay');
    const simulateBtn = document.getElementById('simulateBtn');
    const saveBtn = document.getElementById('saveBtn');
    const loadBtn = document.getElementById('loadBtn');
    const toggleDragonBtn = document.getElementById('toggleDragonBtn');
    const resetBtn = document.getElementById('resetBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(
      INITIAL.cameraPosition.x,
      INITIAL.cameraPosition.y,
      INITIAL.cameraPosition.z
    );
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 5, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.update();

    const ambientLight = new THREE.AmbientLight(0x334455, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(10, 20, 10);
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(80, 80),
      new THREE.MeshPhongMaterial({ color: 0x111122, side: THREE.DoubleSide })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const gridHelper = new THREE.GridHelper(80, 20, 0x223344, 0x1a2233);
    gridHelper.position.y = 0.01;
    scene.add(gridHelper);

    let dragon = null;
    const loader = new GLTFLoader();
    loader.load(
      'DragonAttenuation.glb',
      (gltf) => {
        dragon = gltf.scene;
        dragon.scale.set(3, 3, 3);
        dragon.position.set(0, 0, -10);
        dragon.visible = dragonVisible;
        scene.add(dragon);
        dragonLoaded = true;
        update3DState();
      },
      undefined,
      (err) => {
        console.warn('Failed to load DragonAttenuation.glb', err);
        dragonLoaded = false;
        update3DState();
      }
    );

    const towers = [];
    const towerLabels = [];

    function createLabel(text) {
      const el = document.createElement('div');
      el.className = 'stock-label';
      el.textContent = text;
      labelsContainer.appendChild(el);
      return el;
    }

    function createTower(price, index) {
      const height = price / 20;
      const geometry = new THREE.BoxGeometry(3, height, 3);
      const material = new THREE.MeshPhongMaterial({
        color: INITIAL.towerColors[index]
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.set(INITIAL.towerXPositions[index], height / 2, INITIAL.zPosition);
      scene.add(mesh);

      const label = createLabel(INITIAL.stockNames[index]);

      towers.push(mesh);
      towerLabels.push(label);
    }

    prices.forEach((price, i) => createTower(price, i));

    function getTowerHeights() {
      return prices.map(p => p / 20);
    }

    function getMarketCap() {
      return prices.reduce((sum, p) => sum + p, 0);
    }

    function updateHUD() {
      dayDisplay.textContent = `Day: ${day}`;
      marketCapDisplay.textContent = `Market Cap: ${getMarketCap().toFixed(2)}`;
    }

    function updateTower(index) {
      const height = prices[index] / 20;
      const oldMesh = towers[index];
      const x = INITIAL.towerXPositions[index];
      const z = INITIAL.zPosition;

      const geometry = new THREE.BoxGeometry(3, height, 3);
      const material = oldMesh.material;

      const newMesh = new THREE.Mesh(geometry, material);
      newMesh.position.set(x, height / 2, z);

      scene.add(newMesh);
      scene.remove(oldMesh);
      oldMesh.geometry.dispose();

      towers[index] = newMesh;
    }

    function updateAllTowers() {
      for (let i = 0; i < towers.length; i++) {
        updateTower(i);
      }
    }

    function updateLabels() {
      for (let i = 0; i < towers.length; i++) {
        const tower = towers[i];
        const label = towerLabels[i];
        const worldPos = new THREE.Vector3(
          tower.position.x,
          tower.position.y + (prices[i] / 20) / 2 + 1.2,
          tower.position.z
        );

        worldPos.project(camera);

        const x = (worldPos.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-worldPos.y * 0.5 + 0.5) * window.innerHeight;

        const visible = worldPos.z < 1;
        label.style.display = visible ? 'block' : 'none';
        label.style.left = `${x}px`;
        label.style.top = `${y}px`;
      }
    }

    function saveState() {
      const state = {
        day,
        prices,
        cameraPosition: {
          x: camera.position.x,
          y: camera.position.y,
          z: camera.position.z
        },
        dragonVisible: dragon ? dragon.visible : dragonVisible,
        simulationCount
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      update3DState();
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        update3DState();
        return;
      }

      try {
        const state = JSON.parse(raw);

        day = Number.isInteger(state.day) ? state.day : 0;
        prices = Array.isArray(state.prices) && state.prices.length === 5
          ? state.prices.map(v => Number(v))
          : [...INITIAL.prices];
        simulationCount = Number.isInteger(state.simulationCount) ? state.simulationCount : simulationCount;

        if (state.cameraPosition) {
          camera.position.set(
            Number(state.cameraPosition.x) || INITIAL.cameraPosition.x,
            Number(state.cameraPosition.y) || INITIAL.cameraPosition.y,
            Number(state.cameraPosition.z) || INITIAL.cameraPosition.z
          );
        } else {
          camera.position.set(
            INITIAL.cameraPosition.x,
            INITIAL.cameraPosition.y,
            INITIAL.cameraPosition.z
          );
        }

        if (typeof state.dragonVisible === 'boolean') {
          dragonVisible = state.dragonVisible;
          if (dragon) dragon.visible = dragonVisible;
        }

        controls.update();
        updateAllTowers();
        updateHUD();
        update3DState();
      } catch (e) {
        console.warn('Invalid saved state', e);
      }
    }

    function resetState() {
      day = 0;
      prices = [...INITIAL.prices];
      simulationCount = 0;
      dragonVisible = true;

      camera.position.set(
        INITIAL.cameraPosition.x,
        INITIAL.cameraPosition.y,
        INITIAL.cameraPosition.z
      );
      controls.target.set(0, 5, 0);
      controls.update();

      if (dragon) {
        dragon.visible = true;
      }

      updateAllTowers();
      updateHUD();
      update3DState();
    }

    function simulateDay() {
      prices = prices.map(price => {
        const factor = 0.85 + Math.random() * 0.30;
        return +(price * factor).toFixed(2);
      });

      day += 1;
      simulationCount += 1;

      updateAllTowers();
      updateHUD();
      update3DState();
    }

    function toggleDragon() {
      dragonVisible = !dragonVisible;
      if (dragon) dragon.visible = dragonVisible;
      update3DState();
    }

    function update3DState() {
      window.__3D_STATE__ = {
        day,
        prices: [...prices],
        towerHeights: getTowerHeights(),
        dragonVisible: dragon ? dragon.visible : dragonVisible,
        dragonLoaded,
        marketCap: getMarketCap(),
        savedStateExists: localStorage.getItem(STORAGE_KEY) !== null,
        cameraPosition: {
          x: camera.position.x,
          y: camera.position.y,
          z: camera.position.z
        },
        stockNames: [...INITIAL.stockNames],
        simulationCount
      };
    }

    simulateBtn.addEventListener('click', simulateDay);
    saveBtn.addEventListener('click', saveState);
    loadBtn.addEventListener('click', loadState);
    toggleDragonBtn.addEventListener('click', toggleDragon);
    resetBtn.addEventListener('click', resetState);

    let spherical = new THREE.Spherical();
    const orbitTarget = new THREE.Vector3(0, 5, 0);

    function rotateCamera(deltaTheta, deltaPhi) {
      const offset = camera.position.clone().sub(orbitTarget);
      spherical.setFromVector3(offset);

      spherical.theta += deltaTheta;
      spherical.phi += deltaPhi;

      const eps = 0.1;
      spherical.phi = Math.max(eps, Math.min(Math.PI - eps, spherical.phi));

      offset.setFromSpherical(spherical);
      camera.position.copy(orbitTarget.clone().add(offset));
      camera.lookAt(orbitTarget);
      controls.target.copy(orbitTarget);
      controls.update();
      update3DState();
    }

    window.addEventListener('keydown', (e) => {
      switch (e.key) {
        case 'ArrowLeft':
          e.preventDefault();
          rotateCamera(0.12, 0);
          break;
        case 'ArrowRight':
          e.preventDefault();
          rotateCamera(-0.12, 0);
          break;
        case 'ArrowUp':
          e.preventDefault();
          rotateCamera(0, -0.10);
          break;
        case 'ArrowDown':
          e.preventDefault();
          rotateCamera(0, 0.10);
          break;
        case 's':
        case 'S':
          saveState();
          break;
        case 'l':
        case 'L':
          loadState();
          break;
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      updateLabels();
      update3DState();
    });

    updateHUD();
    update3DState();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      updateLabels();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
