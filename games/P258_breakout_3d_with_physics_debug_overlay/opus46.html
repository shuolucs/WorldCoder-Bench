<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Breakout - Dragon Boss</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #0ff;
    font-size: 14px;
    text-shadow: 0 0 5px #0ff;
    pointer-events: none;
    z-index: 10;
}
#hud div { margin: 4px 0; }
#debugToggle {
    position: absolute;
    top: 10px;
    right: 10px;
    padding: 8px 16px;
    background: rgba(0, 255, 255, 0.2);
    border: 1px solid #0ff;
    color: #0ff;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    z-index: 10;
}
#debugToggle:hover { background: rgba(0, 255, 255, 0.4); }
#debugOverlay {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: #0f0;
    font-size: 12px;
    background: rgba(0, 0, 0, 0.7);
    padding: 10px;
    border: 1px solid #0f0;
    display: none;
    z-index: 10;
    min-width: 280px;
}
#debugOverlay div { margin: 2px 0; }
#gameMessage {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 28px;
    text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
    text-align: center;
    pointer-events: none;
    z-index: 10;
}
</style>
</head>
<body>

<div id="hud">
    <div>SCORE: <span id="scoreDisplay">0</span></div>
    <div>LIVES: <span id="livesDisplay">3</span></div>
    <div>SPEED: <span id="speedDisplay">1.0000</span>x</div>
    <div>BRICKS: <span id="bricksDisplay">0</span></div>
</div>

<button id="debugToggle">Toggle Debug</button>

<div id="debugOverlay">
    <div>--- PHYSICS DEBUG ---</div>
    <div>Ball Pos: <span id="dbgBallPos">0, 0</span></div>
    <div>Ball Vel: <span id="dbgBallVel">0, 0</span></div>
    <div>Paddle X: <span id="dbgPaddleX">0</span></div>
    <div>FPS: <span id="dbgFPS">0</span></div>
    <div>Collisions: <span id="dbgCollisions">0</span></div>
</div>

<div id="gameMessage">PRESS SPACE TO LAUNCH<br><small>Arrow Keys / A,D to move | P to pause | R to reset</small></div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111122);
scene.fog = new THREE.Fog(0x111122, 30, 60);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 25, 30);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
scene.add(dirLight);

// Floor
const floorGeo = new THREE.PlaneGeometry(24, 40);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x222244, roughness: 0.8 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.set(0, 0, 0);
floor.receiveShadow = true;
scene.add(floor);

// Grid helper on floor
const gridHelper = new THREE.GridHelper(40, 40, 0x333366, 0x222244);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// ============ WALLS ============
function createWall(w, h, d, x, y, z, color) {
    const geo = new THREE.BoxGeometry(w, h, d);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.15, wireframe: true });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    scene.add(mesh);
    return mesh;
}

// Left wall
createWall(0.5, 3, 40, -12.25, 1.5, 0, 0x4444ff);
// Right wall
createWall(0.5, 3, 40, 12.25, 1.5, 0, 0x4444ff);
// Top wall (far Z side, Z=-20)
createWall(24.5, 3, 0.5, 0, 1.5, -20.25, 0x4444ff);

// ============ PADDLE ============
const paddleGeo = new THREE.BoxGeometry(4, 0.5, 1);
const paddleMat = new THREE.MeshStandardMaterial({ color: 0x00aaff, emissive: 0x004466 });
const paddle = new THREE.Mesh(paddleGeo, paddleMat);
paddle.position.set(0, 0.25, 16);
paddle.castShadow = true;
scene.add(paddle);

// ============ BALL ============
const ballGeo = new THREE.SphereGeometry(0.4, 16, 16);
const ballMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff6600, emissiveIntensity: 0.5 });
const ball = new THREE.Mesh(ballGeo, ballMat);
ball.castShadow = true;
scene.add(ball);

// Ball trail
const trailParticles = [];

// ============ BRICKS ============
const bricks = [];
const rowColors = [0xff4444, 0xff8844, 0xffcc44, 0x44ff44];
const rowHP = [3, 2, 1, 1];
const rowPoints = [40, 30, 20, 10];

function createBricks() {
    // Clear existing
    bricks.forEach(b => scene.remove(b.mesh));
    bricks.length = 0;

    for (let row = 0; row < 4; row++) {
        for (let col = 0; col < 6; col++) {
            const geo = new THREE.BoxGeometry(2.8, 0.8, 1.2);
            const mat = new THREE.MeshStandardMaterial({
                color: rowColors[row],
                emissive: rowColors[row],
                emissiveIntensity: 0.2,
                transparent: true,
                opacity: 1.0
            });
            const mesh = new THREE.Mesh(geo, mat);
            const x = (col - 2.5) * 3.2;
            const z = -12 + row * 2.0;
            mesh.position.set(x, 0.4, z);
            mesh.castShadow = true;
            scene.add(mesh);
            bricks.push({
                mesh,
                hp: rowHP[row],
                maxHp: rowHP[row],
                row,
                points: rowPoints[row],
                alive: true
            });
        }
    }
}

// ============ DRAGON BOSS ============
let dragonModel = null;
let dragonBoss = {
    hp: 10,
    maxHp: 10,
    alive: true,
    mesh: null,
    boundingBox: new THREE.Box3(),
    flashTimer: 0,
    originalMaterials: []
};

const dragonPlaceholder = new THREE.Group();
dragonPlaceholder.position.set(0, 0, -6);
scene.add(dragonPlaceholder);

// Placeholder box for dragon collision
const dragonColliderGeo = new THREE.BoxGeometry(3, 3, 3);
const dragonColliderMat = new THREE.MeshBasicMaterial({ visible: false });
const dragonCollider = new THREE.Mesh(dragonColliderGeo, dragonColliderMat);
dragonCollider.position.set(0, 1.5, -6);
scene.add(dragonCollider);

// Load dragon model
const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/DragonAttenuation/glTF-Binary/DragonAttenuation.glb',
    (gltf) => {
        dragonModel = gltf.scene;
        
        // Calculate bounding box to scale properly
        const box = new THREE.Box3().setFromObject(dragonModel);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 3.0 / maxDim;
        dragonModel.scale.set(scale, scale, scale);
        
        // Center the model
        const center = new THREE.Vector3();
        box.getCenter(center);
        dragonModel.position.set(-center.x * scale, -center.y * scale + 1.5, -center.z * scale);
        
        dragonPlaceholder.add(dragonModel);
        dragonBoss.mesh = dragonModel;
        
        // Store original materials
        dragonModel.traverse((child) => {
            if (child.isMesh) {
                dragonBoss.originalMaterials.push({
                    mesh: child,
                    material: child.material.clone()
                });
            }
        });
        
        console.log('Dragon model loaded successfully');
    },
    (progress) => {
        console.log('Loading dragon:', (progress.loaded / progress.total * 100).toFixed(1) + '%');
    },
    (error) => {
        console.warn('Failed to load dragon model, using placeholder:', error);
        // Create a placeholder dragon
        const placeholderGeo = new THREE.ConeGeometry(1.5, 3, 6);
        const placeholderMat = new THREE.MeshStandardMaterial({ 
            color: 0xff00ff, 
            emissive: 0x660066,
            transparent: true,
            opacity: 0.8
        });
        const placeholderMesh = new THREE.Mesh(placeholderGeo, placeholderMat);
        placeholderMesh.position.y = 1.5;
        dragonPlaceholder.add(placeholderMesh);
        dragonBoss.mesh = placeholderMesh;
    }
);

// ============ PARTICLES ============
const particles = [];

function createExplosion(position, count, color) {
    for (let i = 0; i < count; i++) {
        const geo = new THREE.SphereGeometry(0.15, 8, 8);
        const mat = new THREE.MeshStandardMaterial({ 
            color, 
            emissive: color, 
            emissiveIntensity: 0.5,
            transparent: true, 
            opacity: 1.0 
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(position);
        mesh.position.y = 0.4 + Math.random() * 2;
        scene.add(mesh);
        particles.push({
            mesh,
            velocity: new THREE.Vector3(
                (Math.random() - 0.5) * 0.5,
                Math.random() * 0.3,
                (Math.random() - 0.5) * 0.5
            ),
            life: 1.0,
            decay: 0.01 + Math.random() * 0.02
        });
    }
}

// ============ DEBUG ============
let debugVisible = false;
const arrowHelper = new THREE.ArrowHelper(
    new THREE.Vector3(0, 0, -1), 
    new THREE.Vector3(0, 0.4, 14), 
    3, 
    0x00ff00
);
arrowHelper.visible = false;
scene.add(arrowHelper);

// ============ GAME STATE ============
let gameState = 'ready';
let score = 0;
let lives = 3;
let speedMultiplier = 1.0;
let collisionCount = 0;
let totalBricksDestroyed = 0;
let frameCount = 0;
let isPaused = false;

let ballVelocity = { x: 0.08, z: -0.15 };
const baseSpeed = Math.sqrt(0.08 * 0.08 + 0.15 * 0.15);

const keys = {};

// FPS tracking
let fps = 0;
let fpsFrames = 0;
let fpsTime = performance.now();

function resetBall() {
    ball.position.set(paddle.position.x, 0.4, 14);
    ballVelocity = { x: 0.08, z: -0.15 };
    speedMultiplier = 1.0;
    gameState = 'ready';
    updateMessage('PRESS SPACE TO LAUNCH');
}

function resetGame() {
    score = 0;
    lives = 3;
    speedMultiplier = 1.0;
    collisionCount = 0;
    totalBricksDestroyed = 0;
    paddle.position.x = 0;
    
    // Reset bricks
    createBricks();
    
    // Reset dragon
    dragonBoss.hp = 10;
    dragonBoss.alive = true;
    dragonBoss.flashTimer = 0;
    dragonPlaceholder.visible = true;
    dragonCollider.visible = true;
    
    if (dragonBoss.mesh && dragonBoss.originalMaterials.length > 0) {
        dragonBoss.originalMaterials.forEach(({ mesh, material }) => {
            mesh.material = material.clone();
        });
    }
    
    // Clear particles
    particles.forEach(p => scene.remove(p.mesh));
    particles.length = 0;
    
    resetBall();
}

function updateMessage(text) {
    document.getElementById('gameMessage').innerHTML = text || '';
}

function getBricksRemaining() {
    let count = bricks.filter(b => b.alive).length;
    if (dragonBoss.alive) count++;
    return count;
}

// ============ COLLISION DETECTION ============
function ballBrickCollision(brickMesh, halfW, halfD) {
    const bx = ball.position.x;
    const bz = ball.position.z;
    const br = 0.4;
    const mx = brickMesh.position.x;
    const mz = brickMesh.position.z;
    
    // AABB vs circle in XZ plane
    const closestX = Math.max(mx - halfW, Math.min(bx, mx + halfW));
    const closestZ = Math.max(mz - halfD, Math.min(bz, mz + halfD));
    
    const dx = bx - closestX;
    const dz = bz - closestZ;
    const dist = Math.sqrt(dx * dx + dz * dz);
    
    if (dist < br) {
        // Determine which face was hit
        const overlapX = halfW + br - Math.abs(bx - mx);
        const overlapZ = halfD + br - Math.abs(bz - mz);
        
        if (overlapX < overlapZ) {
            ballVelocity.x = -ballVelocity.x;
            ball.position.x += (bx > mx ? 1 : -1) * (br - dist + 0.01);
        } else {
            ballVelocity.z = -ballVelocity.z;
            ball.position.z += (bz > mz ? 1 : -1) * (br - dist + 0.01);
        }
        collisionCount++;
        return true;
    }
    return false;
}

// ============ INPUT ============
window.addEventListener('keydown', (e) => {
    keys[e.key.toLowerCase()] = true;
    keys[e.code] = true;
    
    if (e.code === 'Space') {
        e.preventDefault();
        if (gameState === 'ready') {
            gameState = 'playing';
            updateMessage('');
        }
    }
    
    if (e.key.toLowerCase() === 'r') {
        resetGame();
    }
    
    if (e.key.toLowerCase() === 'p') {
        if (gameState === 'playing') {
            gameState = 'paused';
            isPaused = true;
            updateMessage('PAUSED<br><small>Press P to resume</small>');
        } else if (gameState === 'paused') {
            gameState = 'playing';
            isPaused = false;
            updateMessage('');
        }
    }
});

window.addEventListener('keyup', (e) => {
    keys[e.key.toLowerCase()] = false;
    keys[e.code] = false;
});

document.getElementById('debugToggle').addEventListener('click', () => {
    debugVisible = !debugVisible;
    document.getElementById('debugOverlay').style.display = debugVisible ? 'block' : 'none';
    arrowHelper.visible = debugVisible;
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ INIT ============
createBricks();
resetBall();

// ============ EXPOSE STATE ============
window.__3D_STATE__ = {};

function updateExposedState() {
    window.__3D_STATE__ = {
        gameState,
        score,
        lives,
        bricksRemaining: getBricksRemaining(),
        ballPosition: { 
            x: parseFloat(ball.position.x.toFixed(2)), 
            z: parseFloat(ball.position.z.toFixed(2)) 
        },
        ballVelocity: { 
            x: parseFloat(ballVelocity.x.toFixed(4)), 
            z: parseFloat(ballVelocity.z.toFixed(4)) 
        },
        paddleX: parseFloat(paddle.position.x.toFixed(2)),
        speedMultiplier: parseFloat(speedMultiplier.toFixed(4)),
        dragonHP: dragonBoss.hp,
        dragonAlive: dragonBoss.alive,
        collisionCount,
        debugVisible,
        isPaused,
        totalBricksDestroyed,
        frameCount
    };
}

// ============ ANIMATION LOOP ============
function animate() {
    requestAnimationFrame(animate);
    frameCount++;
    
    // FPS calculation
    fpsFrames++;
    const now = performance.now();
    if (now - fpsTime >= 1000) {
        fps = fpsFrames;
        fpsFrames = 0;
        fpsTime = now;
    }
    
    // Paddle movement
    if (gameState !== 'gameover' && gameState !== 'won') {
        if (keys['arrowleft'] || keys['a']) {
            paddle.position.x -= 0.4;
        }
        if (keys['arrowright'] || keys['d']) {
            paddle.position.x += 0.4;
        }
        paddle.position.x = Math.max(-10, Math.min(10, paddle.position.x));
    }
    
    // Ball follows paddle in ready state
    if (gameState === 'ready') {
        ball.position.x = paddle.position.x;
        ball.position.z = 14;
        ball.position.y = 0.4;
    }
    
    // Ball physics
    if (gameState === 'playing') {
        const vx = ballVelocity.x * speedMultiplier;
        const vz = ballVelocity.z * speedMultiplier;
        
        ball.position.x += vx;
        ball.position.z += vz;
        ball.position.y = 0.4;
        
        // Wall collisions
        // Left wall
        if (ball.position.x - 0.4 <= -12) {
            ball.position.x = -12 + 0.4;
            ballVelocity.x = Math.abs(ballVelocity.x);
            collisionCount++;
        }
        // Right wall
        if (ball.position.x + 0.4 >= 12) {
            ball.position.x = 12 - 0.4;
            ballVelocity.x = -Math.abs(ballVelocity.x);
            collisionCount++;
        }
        // Top wall
        if (ball.position.z - 0.4 <= -20) {
            ball.position.z = -20 + 0.4;
            ballVelocity.z = Math.abs(ballVelocity.z);
            collisionCount++;
        }
        
        // Paddle collision
        if (ballVelocity.z > 0) {
            const px = paddle.position.x;
            const pz = paddle.position.z; // 16
            if (ball.position.z + 0.4 >= pz - 0.5 && 
                ball.position.z - 0.4 <= pz + 0.5 &&
                ball.position.x >= px - 2.4 && 
                ball.position.x <= px + 2.4) {
                
                ballVelocity.z = -Math.abs(ballVelocity.z);
                ball.position.z = pz - 0.5 - 0.4;
                
                // Offset based on hit position
                const offset = (ball.position.x - px) * 0.03;
                ballVelocity.x += offset;
                
                // Normalize speed
                const currentSpeed = Math.sqrt(ballVelocity.x * ballVelocity.x + ballVelocity.z * ballVelocity.z);
                const targetSpeed = baseSpeed;
                ballVelocity.x = (ballVelocity.x / currentSpeed) * targetSpeed;
                ballVelocity.z = (ballVelocity.z / currentSpeed) * targetSpeed;
                
                collisionCount++;
            }
        }
        
        // Death zone
        if (ball.position.z > 20) {
            lives--;
            if (lives <= 0) {
                gameState = 'gameover';
                updateMessage('GAME OVER<br><small>Score: ' + score + '<br>Press R to restart</small>');
            } else {
                resetBall();
            }
        }
        
        // Brick collisions
        for (let i = 0; i < bricks.length; i++) {
            const brick = bricks[i];
            if (!brick.alive) continue;
            
            if (ballBrickCollision(brick.mesh, 1.4, 0.6)) {
                brick.hp--;
                if (brick.hp <= 0) {
                    brick.alive = false;
                    scene.remove(brick.mesh);
                    score += brick.points;
                    totalBricksDestroyed++;
                    speedMultiplier *= 1.02;
                    createExplosion(brick.mesh.position, 8, rowColors[brick.row]);
                } else {
                    brick.mesh.material.opacity = brick.hp / brick.maxHp;
                }
                break;
            }
        }
        
        // Dragon collision
        if (dragonBoss.alive) {
            const dragonPos = dragonPlaceholder.position;
            if (ballBrickCollision({ position: dragonPos }, 1.5, 1.5)) {
                dragonBoss.hp--;
                dragonBoss.flashTimer = 6; // frames of flash
                
                if (dragonBoss.hp <= 0) {
                    dragonBoss.alive = false;
                    dragonPlaceholder.visible = false;
                    score += 50;
                    totalBricksDestroyed++;
                    speedMultiplier *= 1.02;
                    createExplosion(dragonPos, 30, 0xff00ff);
                }
            }
        }
        
        // Dragon flash effect
        if (dragonBoss.flashTimer > 0) {
            dragonBoss.flashTimer--;
            if (dragonBoss.mesh) {
                dragonBoss.mesh.traverse((child) => {
                    if (child.isMesh) {
                        if (dragonBoss.flashTimer > 0) {
                            child.material = new THREE.MeshStandardMaterial({ 
                                color: 0xff0000, 
                                emissive: 0xff0000, 
                                emissiveIntensity: 1.0 
                            });
                        } else {
                            // Restore original
                            const orig = dragonBoss.originalMaterials.find(o => o.mesh === child);
                            if (orig) {
                                child.material = orig.material.clone();
                            }
                        }
                    }
                });
            }
        }
        
        // Win condition
        if (getBricksRemaining() === 0) {
            gameState = 'won';
            updateMessage('YOU WIN!<br><small>Score: ' + score + '<br>Press R to play again</small>');
        }
    }
    
    // Rotate dragon
    if (dragonBoss.alive) {
        dragonPlaceholder.rotation.y += 0.01;
    }
    
    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.mesh.position.add(p.velocity);
        p.velocity.y -= 0.005; // gravity
        p.life -= p.decay;
        p.mesh.material.opacity = Math.max(0, p.life);
        p.mesh.scale.setScalar(p.life);
        
        if (p.life <= 0) {
            scene.remove(p.mesh);
            particles.splice(i, 1);
        }
    }
    
    // Update debug arrow
    if (debugVisible) {
        const dir = new THREE.Vector3(ballVelocity.x, 0, ballVelocity.z).normalize();
        arrowHelper.position.copy(ball.position);
        arrowHelper.setDirection(dir);
        arrowHelper.setLength(3);
        arrowHelper.visible = true;
    } else {
        arrowHelper.visible = false;
    }
    
    // Update HUD
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('livesDisplay').textContent = lives;
    document.getElementById('speedDisplay').textContent = speedMultiplier.toFixed(4);
    document.getElementById('bricksDisplay').textContent = getBricksRemaining();
    
    // Update debug overlay
    if (debugVisible) {
        document.getElementById('dbgBallPos').textContent = 
            ball.position.x.toFixed(2) + ', ' + ball.position.z.toFixed(2);
        document.getElementById('dbgBallVel').textContent = 
            ballVelocity.x.toFixed(4) + ', ' + ballVelocity.z.toFixed(4);
        document.getElementById('dbgPaddleX').textContent = paddle.position.x.toFixed(2);
        document.getElementById('dbgFPS').textContent = fps;
        document.getElementById('dbgCollisions').textContent = collisionCount;
    }
    
    // Update exposed state
    isPaused = gameState === 'paused';
    updateExposedState();
    
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
