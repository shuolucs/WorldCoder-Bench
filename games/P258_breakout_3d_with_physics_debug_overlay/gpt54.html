<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Breakout - Three.js Dragon Boss</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0b1020;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 240px;
      line-height: 1.5;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.15);
    }

    #controlsInfo {
      position: fixed;
      bottom: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.4);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    #debugPanel {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
    }

    #debugToggle {
      background: #1e90ff;
      border: none;
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    #debugToggle:hover {
      background: #46a6ff;
    }

    #debugOverlay {
      display: none;
      white-space: pre-line;
      background: rgba(0,0,0,0.55);
      padding: 12px;
      border-radius: 10px;
      min-width: 260px;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
    }

    .message {
      margin-top: 8px;
      font-weight: bold;
      color: #ffd54a;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <div><strong>3D Breakout / Arkanoid</strong></div>
    <div>Score: <span id="score">0</span></div>
    <div>Lives: <span id="lives">3</span></div>
    <div>Speed Multiplier: <span id="speedMult">1.0000</span></div>
    <div>Bricks Remaining: <span id="bricksRemaining">0</span></div>
    <div class="message" id="gameMessage">Press SPACE to launch</div>
  </div>

  <div id="debugPanel">
    <button id="debugToggle">Toggle Debug</button>
    <div id="debugOverlay"></div>
  </div>

  <div id="controlsInfo">
    Controls:
    ←/→ or A/D move paddle |
    SPACE launch |
    P pause |
    R reset
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const hudScore = document.getElementById('score');
    const hudLives = document.getElementById('lives');
    const hudSpeed = document.getElementById('speedMult');
    const hudBricks = document.getElementById('bricksRemaining');
    const gameMessage = document.getElementById('gameMessage');
    const debugToggle = document.getElementById('debugToggle');
    const debugOverlay = document.getElementById('debugOverlay');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1020);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 25, 30);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(26, 44),
      new THREE.MeshStandardMaterial({
        color: 0x1a2238,
        roughness: 0.85,
        metalness: 0.05,
        transparent: true,
        opacity: 0.95
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    scene.add(floor);

    const gridHelper = new THREE.GridHelper(24, 24, 0x335577, 0x223344);
    gridHelper.position.y = 0.01;
    scene.add(gridHelper);

    const wallMaterial = new THREE.MeshBasicMaterial({
      color: 0x66ccff,
      transparent: true,
      opacity: 0.12,
      wireframe: true
    });

    const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.4, 3, 40), wallMaterial);
    leftWall.position.set(-12.2, 1.5, 0);
    scene.add(leftWall);

    const rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.4, 3, 40), wallMaterial);
    rightWall.position.set(12.2, 1.5, 0);
    scene.add(rightWall);

    const topWall = new THREE.Mesh(new THREE.BoxGeometry(24.4, 3, 0.4), wallMaterial);
    topWall.position.set(0, 1.5, -20.2);
    scene.add(topWall);

    const paddle = new THREE.Mesh(
      new THREE.BoxGeometry(4, 0.5, 1),
      new THREE.MeshStandardMaterial({
        color: 0x00aaff,
        emissive: 0x003355,
        roughness: 0.4,
        metalness: 0.2
      })
    );
    paddle.position.set(0, 0.25, 16);
    scene.add(paddle);

    const ballMaterial = new THREE.MeshStandardMaterial({
      color: 0xffaa00,
      emissive: 0xaa5500,
      emissiveIntensity: 1.2,
      roughness: 0.3,
      metalness: 0.1
    });

    const ball = new THREE.Mesh(
      new THREE.SphereGeometry(0.4, 24, 24),
      ballMaterial
    );
    scene.add(ball);

    const ballLight = new THREE.PointLight(0xffaa33, 0.8, 8);
    ball.add(ballLight);

    const keys = {};
    const brickGroup = new THREE.Group();
    scene.add(brickGroup);

    const particleGroup = new THREE.Group();
    scene.add(particleGroup);

    let bricks = [];
    let particles = [];
    let dragonBoss = null;
    let dragonWrapper = null;
    let dragonFlashUntil = 0;

    const loader = new GLTFLoader();

    const FIELD = {
      minX: -12,
      maxX: 12,
      minZ: -20,
      maxZ: 20
    };

    const PADDLE = {
      speed: 0.4,
      minX: -10,
      maxX: 10,
      width: 4,
      depth: 1
    };

    const BALL = {
      radius: 0.4,
      baseVelocity: new THREE.Vector3(0.08, 0, -0.15)
    };

    const state = {
      gameState: 'ready',
      score: 0,
      lives: 3,
      bricksRemaining: 0,
      speedMultiplier: 1.0,
      dragonHP: 10,
      dragonAlive: true,
      collisionCount: 0,
      debugVisible: false,
      isPaused: false,
      totalBricksDestroyed: 0,
      frameCount: 0
    };

    const ballVelocity = new THREE.Vector3();
    const clock = new THREE.Clock();
    let fps = 0;
    let frameCounter = 0;
    let fpsTimer = 0;

    const arrowHelper = new THREE.ArrowHelper(
      new THREE.Vector3(1, 0, 0),
      new THREE.Vector3(0, 0.5, 14),
      2,
      0x00ffcc,
      0.8,
      0.4
    );
    arrowHelper.visible = false;
    scene.add(arrowHelper);

    function round(n, d) {
      return Number(n.toFixed(d));
    }

    function updateWindowState() {
      window.__3D_STATE__ = {
        gameState: state.gameState,
        score: state.score,
        lives: state.lives,
        bricksRemaining: state.bricksRemaining,
        ballPosition: {
          x: round(ball.position.x, 2),
          z: round(ball.position.z, 2)
        },
        ballVelocity: {
          x: round(ballVelocity.x, 4),
          z: round(ballVelocity.z, 4)
        },
        paddleX: round(paddle.position.x, 2),
        speedMultiplier: round(state.speedMultiplier, 4),
        dragonHP: state.dragonHP,
        dragonAlive: state.dragonAlive,
        collisionCount: state.collisionCount,
        debugVisible: state.debugVisible,
        isPaused: state.isPaused,
        totalBricksDestroyed: state.totalBricksDestroyed,
        frameCount: state.frameCount
      };
    }

    function updateHUD() {
      hudScore.textContent = state.score;
      hudLives.textContent = state.lives;
      hudSpeed.textContent = state.speedMultiplier.toFixed(4);
      hudBricks.textContent = state.bricksRemaining;

      if (state.gameState === 'ready') {
        gameMessage.textContent = 'Press SPACE to launch';
      } else if (state.gameState === 'paused') {
        gameMessage.textContent = 'Paused';
      } else if (state.gameState === 'gameover') {
        gameMessage.textContent = 'Game Over - Press R to reset';
      } else if (state.gameState === 'won') {
        gameMessage.textContent = 'You Win! - Press R to play again';
      } else {
        gameMessage.textContent = '';
      }
    }

    function updateDebugOverlay() {
      debugOverlay.textContent =
`Ball Position: (${ball.position.x.toFixed(2)}, ${ball.position.z.toFixed(2)})
Ball Velocity: (${ballVelocity.x.toFixed(4)}, ${ballVelocity.z.toFixed(4)})
Paddle X: ${paddle.position.x.toFixed(2)}
FPS: ${fps.toFixed(1)}
Collision Count: ${state.collisionCount}
Game State: ${state.gameState}
Dragon HP: ${state.dragonHP}
Dragon Alive: ${state.dragonAlive}`;
    }

    function resetBallToPaddle() {
      ball.position.set(paddle.position.x, BALL.radius, 14);
      ballVelocity.copy(BALL.baseVelocity);
      state.gameState = 'ready';
      state.isPaused = false;
    }

    function createBrick(x, z, row, color, hp) {
      const material = new THREE.MeshStandardMaterial({
        color,
        transparent: true,
        opacity: hp / hp,
        roughness: 0.5,
        metalness: 0.15
      });

      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(2.8, 0.8, 1.2),
        material
      );
      mesh.position.set(x, 0.4, z);

      const brick = {
        type: 'brick',
        mesh,
        x,
        z,
        width: 2.8,
        depth: 1.2,
        hp,
        maxHp: hp,
        row,
        alive: true,
        points: [40, 30, 20, 10][row]
      };

      brickGroup.add(mesh);
      bricks.push(brick);
    }

    function createBrickField() {
      const rowColors = [0xff4444, 0xff8844, 0xffcc44, 0x44ff44];
      const rowHP = [3, 2, 1, 1];
      const cols = 6;
      const rows = 4;
      const spacingX = 3.2;
      const spacingZ = 2.0;
      const startZ = -12;
      const totalWidth = (cols - 1) * spacingX;

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const x = col * spacingX - totalWidth / 2;
          const z = startZ + row * spacingZ;
          createBrick(x, z, row, rowColors[row], rowHP[row]);
        }
      }
    }

    function clearBricksAndDragon() {
      for (const b of bricks) {
        brickGroup.remove(b.mesh);
        if (b.mesh.geometry) b.mesh.geometry.dispose();
        if (b.mesh.material) b.mesh.material.dispose();
      }
      bricks = [];

      if (dragonWrapper) {
        scene.remove(dragonWrapper);
        dragonWrapper = null;
        dragonBoss = null;
      }
    }

    function loadDragon() {
      return new Promise((resolve) => {
        loader.load(
          'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DragonAttenuation/glTF-Binary/DragonAttenuation.glb',
          (gltf) => {
            const root = gltf.scene;
            const box = new THREE.Box3().setFromObject(root);
            const size = new THREE.Vector3();
            box.getSize(size);
            const maxDim = Math.max(size.x, size.y, size.z) || 1;
            const scale = 3 / maxDim;
            root.scale.setScalar(scale);

            const box2 = new THREE.Box3().setFromObject(root);
            const center = new THREE.Vector3();
            box2.getCenter(center);
            root.position.sub(center);

            root.traverse((child) => {
              if (child.isMesh) {
                child.castShadow = false;
                child.receiveShadow = false;
                if (child.material) {
                  child.material = child.material.clone();
                }
              }
            });

            const wrapper = new THREE.Group();
            wrapper.position.set(0, 0.1, -6);
            wrapper.add(root);
            scene.add(wrapper);

            dragonWrapper = wrapper;
            dragonBoss = {
              type: 'dragon',
              mesh: wrapper,
              modelRoot: root,
              width: 3,
              depth: 3,
              hp: 10,
              maxHp: 10,
              alive: true,
              points: 50
            };

            resolve();
          },
          undefined,
          () => {
            const fallback = new THREE.Mesh(
              new THREE.BoxGeometry(3, 3, 3),
              new THREE.MeshStandardMaterial({ color: 0x8844ff, emissive: 0x221144 })
            );
            const wrapper = new THREE.Group();
            wrapper.position.set(0, 1.5, -6);
            wrapper.add(fallback);
            scene.add(wrapper);

            dragonWrapper = wrapper;
            dragonBoss = {
              type: 'dragon',
              mesh: wrapper,
              modelRoot: fallback,
              width: 3,
              depth: 3,
              hp: 10,
              maxHp: 10,
              alive: true,
              points: 50
            };
            resolve();
          }
        );
      });
    }

    function flashDragon() {
      if (!dragonBoss || !dragonBoss.alive) return;
      dragonFlashUntil = performance.now() + 100;
      dragonBoss.modelRoot.traverse((child) => {
        if (child.isMesh && child.material) {
          child.userData.originalColor = child.material.color.clone();
          child.material.color.set(0xff2222);
          if ('emissive' in child.material) child.material.emissive.set(0x550000);
        }
      });
    }

    function restoreDragonColor() {
      if (!dragonBoss) return;
      dragonBoss.modelRoot.traverse((child) => {
        if (child.isMesh && child.material && child.userData.originalColor) {
          child.material.color.copy(child.userData.originalColor);
          if ('emissive' in child.material) child.material.emissive.set(0x000000);
        }
      });
    }

    function spawnDragonExplosion(position) {
      for (let i = 0; i < 30; i++) {
        const p = new THREE.Mesh(
          new THREE.SphereGeometry(0.12, 8, 8),
          new THREE.MeshStandardMaterial({
            color: new THREE.Color().setHSL(Math.random(), 0.9, 0.6),
            transparent: true,
            opacity: 1
          })
        );
        p.position.copy(position).add(new THREE.Vector3(
          (Math.random() - 0.5) * 1.0,
          0.5 + Math.random() * 1.5,
          (Math.random() - 0.5) * 1.0
        ));

        const velocity = new THREE.Vector3(
          (Math.random() - 0.5) * 0.25,
          Math.random() * 0.12 + 0.02,
          (Math.random() - 0.5) * 0.25
        );

        particleGroup.add(p);
        particles.push({
          mesh: p,
          velocity,
          life: 1.0
        });
      }
    }

    function destroyBrick(brick) {
      brick.alive = false;
      brickGroup.remove(brick.mesh);
      state.score += brick.points;
      state.totalBricksDestroyed += 1;
      state.speedMultiplier *= 1.02;
      ballVelocity.multiplyScalar(1.02);
      state.bricksRemaining -= 1;
    }

    function hitBrick(brick) {
      brick.hp -= 1;
      if (brick.hp <= 0) {
        destroyBrick(brick);
      } else {
        brick.mesh.material.opacity = brick.hp / brick.maxHp;
      }
    }

    function hitDragon() {
      if (!dragonBoss || !dragonBoss.alive) return;
      dragonBoss.hp -= 1;
      state.dragonHP = dragonBoss.hp;
      flashDragon();

      if (dragonBoss.hp <= 0) {
        dragonBoss.alive = false;
        state.dragonAlive = false;
        state.score += 50;
        state.totalBricksDestroyed += 1;
        state.speedMultiplier *= 1.02;
        ballVelocity.multiplyScalar(1.02);
        state.bricksRemaining -= 1;

        const pos = new THREE.Vector3();
        dragonBoss.mesh.getWorldPosition(pos);
        spawnDragonExplosion(pos);

        scene.remove(dragonBoss.mesh);
      }
    }

    function checkAABBCollision(ballPos, radius, objPos, halfW, halfD) {
      const dx = ballPos.x - objPos.x;
      const dz = ballPos.z - objPos.z;
      return Math.abs(dx) <= halfW + radius && Math.abs(dz) <= halfD + radius;
    }

    function resolveBrickCollision(targetPos, halfW, halfD) {
      const dx = ball.position.x - targetPos.x;
      const dz = ball.position.z - targetPos.z;
      const overlapX = (halfW + BALL.radius) - Math.abs(dx);
      const overlapZ = (halfD + BALL.radius) - Math.abs(dz);

      if (overlapX < overlapZ) {
        ballVelocity.x *= -1;
        ball.position.x += dx > 0 ? overlapX : -overlapX;
      } else {
        ballVelocity.z *= -1;
        ball.position.z += dz > 0 ? overlapZ : -overlapZ;
      }
      state.collisionCount++;
    }

    function launchBall() {
      if (state.gameState === 'ready') {
        ballVelocity.copy(BALL.baseVelocity).multiplyScalar(state.speedMultiplier);
        state.gameState = 'playing';
      }
    }

    function pauseToggle() {
      if (state.gameState === 'gameover' || state.gameState === 'won') return;
      if (state.gameState === 'paused') {
        state.gameState = 'playing';
        state.isPaused = false;
      } else if (state.gameState === 'playing' || state.gameState === 'ready') {
        state.gameState = 'paused';
        state.isPaused = true;
      }
    }

    async function resetGame() {
      clearBricksAndDragon();

      for (const p of particles) {
        particleGroup.remove(p.mesh);
      }
      particles = [];

      state.score = 0;
      state.lives = 3;
      state.speedMultiplier = 1.0;
      state.collisionCount = 0;
      state.totalBricksDestroyed = 0;
      state.gameState = 'ready';
      state.isPaused = false;
      state.dragonHP = 10;
      state.dragonAlive = true;

      paddle.position.x = 0;
      createBrickField();
      await loadDragon();
      state.bricksRemaining = bricks.length + 1;
      resetBallToPaddle();
      updateHUD();
      updateWindowState();
    }

    function loseBall() {
      state.lives -= 1;
      if (state.lives <= 0) {
        state.lives = 0;
        state.gameState = 'gameover';
        state.isPaused = false;
      } else {
        resetBallToPaddle();
      }
    }

    function checkWin() {
      const allRegularGone = bricks.every(b => !b.alive);
      const dragonGone = !dragonBoss || !dragonBoss.alive;
      if (allRegularGone && dragonGone) {
        state.gameState = 'won';
        state.isPaused = false;
      }
    }

    function movePaddle() {
      if (state.gameState === 'gameover' || state.gameState === 'won') return;
      if (keys['ArrowLeft'] || keys['KeyA']) paddle.position.x -= PADDLE.speed;
      if (keys['ArrowRight'] || keys['KeyD']) paddle.position.x += PADDLE.speed;
      paddle.position.x = THREE.MathUtils.clamp(paddle.position.x, PADDLE.minX, PADDLE.maxX);

      if (state.gameState === 'ready') {
        ball.position.x = paddle.position.x;
        ball.position.z = 14;
      }
    }

    function updateBall() {
      if (state.gameState !== 'playing') return;

      ball.position.add(ballVelocity);
      ball.position.y = BALL.radius;

      if (ball.position.x - BALL.radius <= FIELD.minX) {
        ball.position.x = FIELD.minX + BALL.radius;
        ballVelocity.x *= -1;
        state.collisionCount++;
      } else if (ball.position.x + BALL.radius >= FIELD.maxX) {
        ball.position.x = FIELD.maxX - BALL.radius;
        ballVelocity.x *= -1;
        state.collisionCount++;
      }

      if (ball.position.z - BALL.radius <= FIELD.minZ) {
        ball.position.z = FIELD.minZ + BALL.radius;
        ballVelocity.z *= -1;
        state.collisionCount++;
      }

      if (ball.position.z - BALL.radius <= paddle.position.z + PADDLE.depth / 2 &&
          ball.position.z + BALL.radius >= paddle.position.z - PADDLE.depth / 2 &&
          ball.position.x + BALL.radius >= paddle.position.x - PADDLE.width / 2 &&
          ball.position.x - BALL.radius <= paddle.position.x + PADDLE.width / 2 &&
          ballVelocity.z > 0) {
        ball.position.z = paddle.position.z - PADDLE.depth / 2 - BALL.radius;
        ballVelocity.z = -Math.abs(ballVelocity.z);
        ballVelocity.x += (ball.position.x - paddle.position.x) * 0.03;
        state.collisionCount++;
      }

      for (const brick of bricks) {
        if (!brick.alive) continue;
        if (checkAABBCollision(ball.position, BALL.radius, brick.mesh.position, brick.width / 2, brick.depth / 2)) {
          resolveBrickCollision(brick.mesh.position, brick.width / 2, brick.depth / 2);
          hitBrick(brick);
          break;
        }
      }

      if (dragonBoss && dragonBoss.alive) {
        const dragonPos = new THREE.Vector3(dragonBoss.mesh.position.x, 0, dragonBoss.mesh.position.z);
        if (checkAABBCollision(ball.position, BALL.radius, dragonPos, dragonBoss.width / 2, dragonBoss.depth / 2)) {
          resolveBrickCollision(dragonPos, dragonBoss.width / 2, dragonBoss.depth / 2);
          hitDragon();
        }
      }

      if (ball.position.z - BALL.radius > FIELD.maxZ) {
        loseBall();
      }

      checkWin();
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.mesh.position.add(p.velocity);
        p.velocity.y -= 0.003;
        p.life -= 0.02;
        p.mesh.material.opacity = Math.max(0, p.life);
        p.mesh.scale.setScalar(Math.max(0.1, p.life));

        if (p.life <= 0) {
          particleGroup.remove(p.mesh);
          if (p.mesh.geometry) p.mesh.geometry.dispose();
          if (p.mesh.material) p.mesh.material.dispose();
          particles.splice(i, 1);
        }
      }
    }

    function updateArrow() {
      const dir = new THREE.Vector3(ballVelocity.x, 0, ballVelocity.z);
      const len = Math.max(1.2, dir.length() * 20);
      if (dir.lengthSq() < 1e-8) dir.set(1, 0, 0);
      dir.normalize();
      arrowHelper.position.set(ball.position.x, 0.6, ball.position.z);
      arrowHelper.setDirection(dir);
      arrowHelper.setLength(len, 0.8, 0.4);
      arrowHelper.visible = state.debugVisible;
    }

    window.addEventListener('keydown', (e) => {
      keys[e.code] = true;

      if (e.code === 'Space') {
        e.preventDefault();
        if (state.gameState === 'ready') launchBall();
      }
      if (e.code === 'KeyR') {
        resetGame();
      }
      if (e.code === 'KeyP') {
        pauseToggle();
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    debugToggle.addEventListener('click', () => {
      state.debugVisible = !state.debugVisible;
      debugOverlay.style.display = state.debugVisible ? 'block' : 'none';
      arrowHelper.visible = state.debugVisible;
      updateWindowState();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      frameCounter++;
      fpsTimer += delta;
      state.frameCount++;

      if (fpsTimer >= 0.5) {
        fps = frameCounter / fpsTimer;
        frameCounter = 0;
        fpsTimer = 0;
      }

      movePaddle();

      if (state.gameState !== 'paused' && state.gameState !== 'gameover' && state.gameState !== 'won') {
        updateBall();
      }

      updateParticles();

      if (dragonBoss && performance.now() > dragonFlashUntil) {
        restoreDragonColor();
      }

      updateArrow();
      updateHUD();
      updateDebugOverlay();
      updateWindowState();

      renderer.render(scene, camera);
    }

    resetGame();
    animate();
  </script>
</body>
</html>
