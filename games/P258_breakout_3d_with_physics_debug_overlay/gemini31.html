<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Breakout - Dragon Boss</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            user-select: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            text-shadow: 1px 1px 2px #000;
            font-size: 18px;
            z-index: 10;
        }
        #center-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 32px;
            pointer-events: none;
            text-shadow: 2px 2px 4px #000;
            z-index: 10;
            display: none;
        }
        #debug-container {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        #debugToggle {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px 10px;
            cursor: pointer;
            font-family: inherit;
            margin-bottom: 5px;
        }
        #debugToggle:hover {
            background: #555;
        }
        #debugOverlay {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #555;
            padding: 10px;
            font-size: 12px;
            display: none;
            text-align: left;
            min-width: 200px;
        }
        .hud-stat { margin-bottom: 5px; }
        .debug-stat { margin-bottom: 3px; color: #0f0; }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="hud">
        <div class="hud-stat">SCORE: <span id="scoreVal">0</span></div>
        <div class="hud-stat">LIVES: <span id="livesVal">3</span></div>
        <div class="hud-stat">SPEED: <span id="speedVal">1.00</span>x</div>
        <div class="hud-stat">BRICKS: <span id="bricksVal">0</span></div>
    </div>

    <div id="center-message">
        <div id="msg-title"></div>
        <div id="msg-sub" style="font-size: 16px; margin-top: 10px;"></div>
    </div>

    <div id="debug-container">
        <button id="debugToggle">Toggle Debug</button>
        <div id="debugOverlay">
            <div class="debug-stat">FPS: <span id="dbgFps">0</span></div>
            <div class="debug-stat">State: <span id="dbgState">ready</span></div>
            <div class="debug-stat">Ball Pos: <span id="dbgBallPos">0, 0</span></div>
            <div class="debug-stat">Ball Vel: <span id="dbgBallVel">0, 0</span></div>
            <div class="debug-stat">Paddle X: <span id="dbgPaddleX">0</span></div>
            <div class="debug-stat">Collisions: <span id="dbgCollisions">0</span></div>
            <div class="debug-stat">Dragon HP: <span id="dbgDragonHp">0</span></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            gameState: 'ready', // ready, playing, paused, gameover, won
            score: 0,
            lives: 3,
            bricksRemaining: 0,
            ballPosition: { x: 0, z: 0 },
            ballVelocity: { x: 0, z: 0 },
            paddleX: 0,
            speedMultiplier: 1.0,
            dragonHP: 10,
            dragonAlive: false,
            collisionCount: 0,
            debugVisible: false,
            isPaused: false,
            totalBricksDestroyed: 0,
            frameCount: 0
        };
        const state = window.__3D_STATE__;

        // --- Constants ---
        const FIELD_MIN_X = -12;
        const FIELD_MAX_X = 12;
        const FIELD_MIN_Z = -20;
        const FIELD_MAX_Z = 20;
        const PADDLE_Y = 0.25;
        const PADDLE_Z = 16;
        const BALL_Y = 0.4;
        const BALL_RADIUS = 0.4;
        const BASE_BALL_SPEED = Math.sqrt(0.08**2 + 0.15**2);
        const INITIAL_VELOCITY = new THREE.Vector3(0.08, 0, -0.15);

        // --- Scene Setup ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 25, 30);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- Game Objects ---
        
        // Walls
        const wallMat = new THREE.MeshBasicMaterial({ color: 0x888888, wireframe: true, transparent: true, opacity: 0.5 });
        const leftWall = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 40), wallMat);
        leftWall.position.set(-12.5, 1, 0);
        scene.add(leftWall);
        
        const rightWall = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 40), wallMat);
        rightWall.position.set(12.5, 1, 0);
        scene.add(rightWall);
        
        const topWall = new THREE.Mesh(new THREE.BoxGeometry(26, 2, 1), wallMat);
        topWall.position.set(0, 1, -20.5);
        scene.add(topWall);

        // Paddle
        const paddleGeo = new THREE.BoxGeometry(4, 0.5, 1);
        const paddleMat = new THREE.MeshPhongMaterial({ color: 0x00aaff });
        const paddle = new THREE.Mesh(paddleGeo, paddleMat);
        paddle.position.set(0, PADDLE_Y, PADDLE_Z);
        scene.add(paddle);

        // Ball
        const ballGeo = new THREE.SphereGeometry(BALL_RADIUS, 32, 32);
        const ballMat = new THREE.MeshPhongMaterial({ color: 0xffaa00, emissive: 0xffaa00, emissiveIntensity: 0.5 });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        scene.add(ball);
        let ballVelocity = new THREE.Vector3();

        // Bricks
        let bricks = [];
        const brickRows = 4;
        const brickCols = 6;
        const brickWidth = 2.8;
        const brickHeight = 0.8;
        const brickDepth = 1.2;
        const startZ = -12;
        const spacingX = 3.2;
        const spacingZ = 2.0;
        
        const rowColors = [0xff4444, 0xff8844, 0xffcc44, 0x44ff44];
        const rowHPs = [3, 2, 1, 1];
        const rowScores = [40, 30, 20, 10];

        function createBricks() {
            // Clear existing
            bricks.forEach(b => scene.remove(b.mesh));
            bricks = [];
            state.bricksRemaining = 0;

            const startX = -(brickCols - 1) * spacingX / 2;

            for (let r = 0; r < brickRows; r++) {
                for (let c = 0; c < brickCols; c++) {
                    const x = startX + c * spacingX;
                    const z = startZ + r * spacingZ;
                    
                    // Skip center bricks to make room for dragon visually (optional, but cleaner)
                    if ((r === 2 || r === 3) && (c === 2 || c === 3)) continue;

                    const geo = new THREE.BoxGeometry(brickWidth, brickHeight, brickDepth);
                    const mat = new THREE.MeshPhongMaterial({ 
                        color: rowColors[r], 
                        transparent: true, 
                        opacity: 1.0 
                    });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(x, 0.4, z);
                    scene.add(mesh);

                    const box = new THREE.Box3().setFromObject(mesh);

                    bricks.push({
                        mesh: mesh,
                        hp: rowHPs[r],
                        maxHp: rowHPs[r],
                        score: rowScores[r],
                        box: box,
                        active: true
                    });
                    state.bricksRemaining++;
                }
            }
        }

        // Dragon Boss
        let dragonGroup = new THREE.Group();
        let dragonBox = new THREE.Box3();
        let dragonMaterials = [];
        const redMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        let dragonFlashTimeout = null;

        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DragonAttenuation/glTF-Binary/DragonAttenuation.glb', (gltf) => {
            const model = gltf.scene;
            
            // Scale to ~3x3x3
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 3 / maxDim;
            model.scale.set(scale, scale, scale);

            // Center model in group
            box.setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.set(-center.x, -center.y, -center.z);
            
            dragonGroup.add(model);
            dragonGroup.position.set(0, 0, -6);
            scene.add(dragonGroup);

            // Setup collision box (approximate)
            dragonBox.setFromCenterAndSize(
                new THREE.Vector3(0, 0, -6),
                new THREE.Vector3(3, 3, 3)
            );

            // Store materials for flashing
            model.traverse((child) => {
                if (child.isMesh) {
                    dragonMaterials.push({ mesh: child, origMat: child.material });
                }
            });

            resetDragon();
        });

        function resetDragon() {
            state.dragonHP = 10;
            state.dragonAlive = true;
            dragonGroup.visible = true;
            state.bricksRemaining++; // Count dragon as a brick
        }

        function flashDragon() {
            dragonMaterials.forEach(item => item.mesh.material = redMaterial);
            if (dragonFlashTimeout) clearTimeout(dragonFlashTimeout);
            dragonFlashTimeout = setTimeout(() => {
                if (state.dragonAlive) {
                    dragonMaterials.forEach(item => item.mesh.material = item.origMat);
                }
            }, 100);
        }

        // Particles
        let particles = [];
        function spawnParticles(pos) {
            const geo = new THREE.SphereGeometry(0.15, 8, 8);
            const mat = new THREE.MeshBasicMaterial({ color: 0xff4400, transparent: true });
            for (let i = 0; i < 30; i++) {
                const p = new THREE.Mesh(geo, mat.clone());
                p.position.copy(pos);
                const v = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.8,
                    (Math.random() - 0.5) * 0.8,
                    (Math.random() - 0.5) * 0.8
                );
                scene.add(p);
                particles.push({ mesh: p, velocity: v, life: 1.0 });
            }
        }

        // Debug Arrow
        let arrowHelper = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(0,0,0), 2, 0x00ff00);
        scene.add(arrowHelper);
        arrowHelper.visible = false;

        // --- Input Handling ---
        const keys = { ArrowLeft: false, ArrowRight: false, a: false, d: false };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
            if (e.key === ' ') launchBall();
            if (e.key.toLowerCase() === 'r') initGame();
            if (e.key.toLowerCase() === 'p') togglePause();
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        document.getElementById('debugToggle').addEventListener('click', () => {
            state.debugVisible = !state.debugVisible;
            document.getElementById('debugOverlay').style.display = state.debugVisible ? 'block' : 'none';
            arrowHelper.visible = state.debugVisible;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Game Logic ---

        function initGame() {
            state.score = 0;
            state.lives = 3;
            state.speedMultiplier = 1.0;
            state.totalBricksDestroyed = 0;
            state.collisionCount = 0;
            createBricks();
            if (dragonGroup.children.length > 0) resetDragon();
            resetBall();
            state.gameState = 'ready';
            state.isPaused = false;
            updateUI();
            hideMessage();
        }

        function resetBall() {
            state.gameState = 'ready';
            ballVelocity.set(0, 0, 0);
            paddle.position.x = 0;
        }

        function launchBall() {
            if (state.gameState === 'ready') {
                state.gameState = 'playing';
                ballVelocity.copy(INITIAL_VELOCITY).normalize().multiplyScalar(BASE_BALL_SPEED * state.speedMultiplier);
            }
        }

        function togglePause() {
            if (state.gameState === 'playing' || state.gameState === 'paused') {
                state.isPaused = !state.isPaused;
                state.gameState = state.isPaused ? 'paused' : 'playing';
                if (state.isPaused) showMessage("PAUSED", "Press 'P' to resume");
                else hideMessage();
            }
        }

        function loseLife() {
            state.lives--;
            if (state.lives <= 0) {
                state.gameState = 'gameover';
                showMessage("GAME OVER", "Press 'R' to restart");
            } else {
                resetBall();
            }
        }

        function checkWin() {
            if (state.bricksRemaining <= 0) {
                state.gameState = 'won';
                showMessage("YOU WIN!", `Score: ${state.score} | Press 'R' to play again`);
            }
        }

        function updatePhysics() {
            // Paddle Movement
            let moveX = 0;
            if (keys.ArrowLeft || keys.a) moveX -= 0.4;
            if (keys.ArrowRight || keys.d) moveX += 0.4;
            
            paddle.position.x += moveX;
            paddle.position.x = Math.max(-10, Math.min(10, paddle.position.x));

            // Ball Logic
            if (state.gameState === 'ready') {
                ball.position.set(paddle.position.x, BALL_Y, PADDLE_Z - 1.5);
            } else if (state.gameState === 'playing') {
                // Move ball
                ball.position.add(ballVelocity);
                ball.position.y = BALL_Y; // Constrain to floor

                // Wall Collisions
                if (ball.position.x - BALL_RADIUS < FIELD_MIN_X) {
                    ball.position.x = FIELD_MIN_X + BALL_RADIUS;
                    ballVelocity.x = Math.abs(ballVelocity.x);
                    state.collisionCount++;
                } else if (ball.position.x + BALL_RADIUS > FIELD_MAX_X) {
                    ball.position.x = FIELD_MAX_X - BALL_RADIUS;
                    ballVelocity.x = -Math.abs(ballVelocity.x);
                    state.collisionCount++;
                }

                if (ball.position.z - BALL_RADIUS < FIELD_MIN_Z) {
                    ball.position.z = FIELD_MIN_Z + BALL_RADIUS;
                    ballVelocity.z = Math.abs(ballVelocity.z);
                    state.collisionCount++;
                } else if (ball.position.z > FIELD_MAX_Z) {
                    loseLife();
                    return;
                }

                // Paddle Collision (AABB vs Sphere approx)
                const pBox = new THREE.Box3().setFromObject(paddle);
                if (ball.position.x + BALL_RADIUS > pBox.min.x && ball.position.x - BALL_RADIUS < pBox.max.x &&
                    ball.position.z + BALL_RADIUS > pBox.min.z && ball.position.z - BALL_RADIUS < pBox.max.z) {
                    
                    // Only bounce if coming from top
                    if (ballVelocity.z > 0) {
                        ball.position.z = pBox.min.z - BALL_RADIUS;
                        ballVelocity.z = -Math.abs(ballVelocity.z);
                        
                        // Apply offset based on hit position
                        const offset = (ball.position.x - paddle.position.x) * 0.03;
                        ballVelocity.x += offset;
                        
                        // Normalize and apply speed multiplier
                        ballVelocity.normalize().multiplyScalar(BASE_BALL_SPEED * state.speedMultiplier);
                        state.collisionCount++;
                    }
                }

                // Brick Collisions
                let hitBrick = false;
                for (let i = 0; i < bricks.length; i++) {
                    const b = bricks[i];
                    if (!b.active) continue;

                    // Simple AABB vs Sphere check
                    const closestX = Math.max(b.box.min.x, Math.min(ball.position.x, b.box.max.x));
                    const closestZ = Math.max(b.box.min.z, Math.min(ball.position.z, b.box.max.z));
                    const dx = ball.position.x - closestX;
                    const dz = ball.position.z - closestZ;

                    if ((dx * dx + dz * dz) < (BALL_RADIUS * BALL_RADIUS)) {
                        hitBrick = true;
                        
                        // Determine bounce direction
                        if (Math.abs(ball.position.x - closestX) > Math.abs(ball.position.z - closestZ)) {
                            ballVelocity.x *= -1;
                        } else {
                            ballVelocity.z *= -1;
                        }

                        // Damage brick
                        b.hp--;
                        b.mesh.material.opacity = b.hp / b.maxHp;
                        state.collisionCount++;

                        if (b.hp <= 0) {
                            b.active = false;
                            scene.remove(b.mesh);
                            state.score += b.score;
                            state.bricksRemaining--;
                            state.totalBricksDestroyed++;
                            state.speedMultiplier += 0.02;
                            // Re-normalize velocity with new speed
                            ballVelocity.normalize().multiplyScalar(BASE_BALL_SPEED * state.speedMultiplier);
                        }
                        break; // Only hit one brick per frame to avoid weird multi-bounces
                    }
                }

                // Dragon Collision
                if (state.dragonAlive && !hitBrick) {
                    const closestX = Math.max(dragonBox.min.x, Math.min(ball.position.x, dragonBox.max.x));
                    const closestZ = Math.max(dragonBox.min.z, Math.min(ball.position.z, dragonBox.max.z));
                    const dx = ball.position.x - closestX;
                    const dz = ball.position.z - closestZ;

                    if ((dx * dx + dz * dz) < (BALL_RADIUS * BALL_RADIUS)) {
                        // Bounce
                        if (Math.abs(ball.position.x - closestX) > Math.abs(ball.position.z - closestZ)) {
                            ballVelocity.x *= -1;
                        } else {
                            ballVelocity.z *= -1;
                        }

                        state.dragonHP--;
                        state.collisionCount++;
                        flashDragon();

                        if (state.dragonHP <= 0) {
                            state.dragonAlive = false;
                            dragonGroup.visible = false;
                            state.score += 50;
                            state.bricksRemaining--;
                            state.totalBricksDestroyed++;
                            state.speedMultiplier += 0.02;
                            ballVelocity.normalize().multiplyScalar(BASE_BALL_SPEED * state.speedMultiplier);
                            spawnParticles(dragonGroup.position);
                        }
                    }
                }

                checkWin();
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.mesh.position.add(p.velocity);
                p.life -= 0.02;
                p.mesh.material.opacity = p.life;
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }
        }

        // --- UI & State Updates ---

        function showMessage(title, sub) {
            const msg = document.getElementById('center-message');
            document.getElementById('msg-title').innerText = title;
            document.getElementById('msg-sub').innerText = sub;
            msg.style.display = 'block';
        }

        function hideMessage() {
            document.getElementById('center-message').style.display = 'none';
        }

        function updateUI() {
            document.getElementById('scoreVal').innerText = state.score;
            document.getElementById('livesVal').innerText = state.lives;
            document.getElementById('speedVal').innerText = state.speedMultiplier.toFixed(2);
            document.getElementById('bricksVal').innerText = state.bricksRemaining;
        }

        let lastTime = performance.now();
        let frames = 0;
        let fps = 0;

        function updateDebug() {
            if (!state.debugVisible) return;

            const now = performance.now();
            frames++;
            if (now >= lastTime + 1000) {
                fps = Math.round((frames * 1000) / (now - lastTime));
                frames = 0;
                lastTime = now;
            }

            document.getElementById('dbgFps').innerText = fps;
            document.getElementById('dbgState').innerText = state.gameState;
            document.getElementById('dbgBallPos').innerText = `${ball.position.x.toFixed(2)}, ${ball.position.z.toFixed(2)}`;
            document.getElementById('dbgBallVel').innerText = `${ballVelocity.x.toFixed(4)}, ${ballVelocity.z.toFixed(4)}`;
            document.getElementById('dbgPaddleX').innerText = paddle.position.x.toFixed(2);
            document.getElementById('dbgCollisions').innerText = state.collisionCount;
            document.getElementById('dbgDragonHp').innerText = state.dragonHP;

            if (state.gameState === 'playing') {
                arrowHelper.position.copy(ball.position);
                arrowHelper.setDirection(ballVelocity.clone().normalize());
                arrowHelper.setLength(ballVelocity.length() * 15); // Scale for visibility
            }
        }

        function updateGlobalState() {
            state.ballPosition.x = Number(ball.position.x.toFixed(2));
            state.ballPosition.z = Number(ball.position.z.toFixed(2));
            state.ballVelocity.x = Number(ballVelocity.x.toFixed(4));
            state.ballVelocity.z = Number(ballVelocity.z.toFixed(4));
            state.paddleX = Number(paddle.position.x.toFixed(2));
            state.frameCount++;
        }

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (!state.isPaused && state.gameState !== 'gameover' && state.gameState !== 'won') {
                updatePhysics();
                updateParticles();
            }

            updateUI();
            updateDebug();
            updateGlobalState();

            // Rotate dragon slightly if alive
            if (state.dragonAlive && dragonGroup.children.length > 0 && !state.isPaused) {
                dragonGroup.children[0].rotation.y = Math.sin(state.frameCount * 0.05) * 0.2;
            }

            renderer.render(scene, camera);
        }

        // Start
        initGame();
        animate();

    </script>
</body>
</html>
