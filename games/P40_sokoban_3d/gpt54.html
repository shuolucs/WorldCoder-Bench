<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 推箱子</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
    }

    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 220px;
      backdrop-filter: blur(4px);
    }

    #ui h1 {
      margin: 0 0 8px 0;
      font-size: 18px;
    }

    #info {
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 10px;
      white-space: pre-line;
    }

    button {
      border: none;
      padding: 8px 12px;
      margin-right: 8px;
      margin-top: 4px;
      border-radius: 8px;
      cursor: pointer;
      background: #2d7ef7;
      color: white;
      font-size: 14px;
    }

    button:hover {
      filter: brightness(1.08);
    }

    #undoBtn { background: #f39c12; }
    #resetBtn { background: #e74c3c; }

    #win {
      margin-top: 8px;
      color: #7CFF8A;
      font-weight: bold;
      min-height: 20px;
    }

    #tips {
      font-size: 12px;
      color: #ccc;
      margin-top: 8px;
      line-height: 1.4;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="ui">
    <h1>3D 推箱子</h1>
    <div id="info"></div>
    <button id="undoBtn">撤销一步</button>
    <button id="resetBtn">重置关卡</button>
    <div id="win"></div>
    <div id="tips">
      WASD 移动玩家球体<br>
      鼠标拖拽可旋转视角
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const GRID_SIZE = 8;
    const CELL_SIZE = 1;
    const HALF = (GRID_SIZE - 1) / 2;

    const FLOOR = 0;
    const WALL = 1;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x141821);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(7, 9, 9);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.6, 0);
    controls.enableDamping = true;
    controls.minDistance = 6;
    controls.maxDistance = 20;
    controls.maxPolarAngle = Math.PI / 2.15;

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(8, 12, 6);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    scene.add(dirLight);

    const boardGroup = new THREE.Group();
    const wallGroup = new THREE.Group();
    const targetGroup = new THREE.Group();
    const boxGroup = new THREE.Group();
    scene.add(boardGroup, wallGroup, targetGroup, boxGroup);

    const floorMat = new THREE.MeshStandardMaterial({ color: 0x3b4457, roughness: 0.85, metalness: 0.05 });
    const floorAltMat = new THREE.MeshStandardMaterial({ color: 0x465168, roughness: 0.85, metalness: 0.05 });
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x79808f, roughness: 0.9 });
    const targetMat = new THREE.MeshStandardMaterial({
      color: 0x00c2ff,
      emissive: 0x004455,
      roughness: 0.4,
      metalness: 0.2
    });
    const boxMat = new THREE.MeshStandardMaterial({ color: 0xc98a3d, roughness: 0.7 });
    const boxOnTargetMat = new THREE.MeshStandardMaterial({
      color: 0x44d16d,
      emissive: 0x113322,
      roughness: 0.5
    });
    const playerMat = new THREE.MeshStandardMaterial({
      color: 0xff5aa5,
      emissive: 0x331122,
      roughness: 0.35,
      metalness: 0.15
    });

    const floorGeo = new THREE.BoxGeometry(CELL_SIZE, 0.12, CELL_SIZE);
    const wallGeo = new THREE.BoxGeometry(CELL_SIZE, 1, CELL_SIZE);
    const targetGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.08, 32);
    const boxGeo = new THREE.BoxGeometry(0.72, 0.72, 0.72);
    const playerGeo = new THREE.SphereGeometry(0.32, 32, 24);

    const boardBase = new THREE.Mesh(
      new THREE.BoxGeometry(GRID_SIZE + 0.6, 0.4, GRID_SIZE + 0.6),
      new THREE.MeshStandardMaterial({ color: 0x222831, roughness: 0.95 })
    );
    boardBase.position.y = -0.26;
    boardBase.receiveShadow = true;
    scene.add(boardBase);

    function gridToWorld(row, col) {
      return {
        x: col - HALF,
        z: row - HALF
      };
    }

    function clonePos(p) {
      return { row: p.row, col: p.col };
    }

    function samePos(a, b) {
      return a.row === b.row && a.col === b.col;
    }

    function inside(row, col) {
      return row >= 0 && row < GRID_SIZE && col >= 0 && col < GRID_SIZE;
    }

    function isTargetCell(row, col, targets) {
      return targets.some(t => t.row === row && t.col === col);
    }

    function seededRandom(seed) {
      let s = seed >>> 0;
      return function() {
        s = (s * 1664525 + 1013904223) >>> 0;
        return s / 4294967296;
      };
    }

    function shuffle(arr, rand) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function createFixedSolvableLevel() {
      const grid = Array.from({ length: GRID_SIZE }, (_, r) =>
        Array.from({ length: GRID_SIZE }, (_, c) =>
          r === 0 || r === GRID_SIZE - 1 || c === 0 || c === GRID_SIZE - 1 ? WALL : FLOOR
        )
      );

      const extraWalls = [
        [2,2],[2,5],[3,2],[4,5],[5,2]
      ];
      extraWalls.forEach(([r, c]) => grid[r][c] = WALL);

      const player = { row: 6, col: 2 };
      const boxes = [
        { row: 3, col: 3 },
        { row: 4, col: 3 },
        { row: 5, col: 4 }
      ];
      const targets = [
        { row: 3, col: 5 },
        { row: 4, col: 4 },
        { row: 5, col: 5 }
      ];

      return { grid, player, boxes, targets };
    }

    function createSeededLevel(seed = 202411) {
      const rand = seededRandom(seed);
      for (let attempt = 0; attempt < 200; attempt++) {
        const grid = Array.from({ length: GRID_SIZE }, (_, r) =>
          Array.from({ length: GRID_SIZE }, (_, c) =>
            r === 0 || r === GRID_SIZE - 1 || c === 0 || c === GRID_SIZE - 1 ? WALL : FLOOR
          )
        );

        const allInterior = [];
        for (let r = 1; r < GRID_SIZE - 1; r++) {
          for (let c = 1; c < GRID_SIZE - 1; c++) {
            allInterior.push({ row: r, col: c });
          }
        }

        shuffle(allInterior, rand);
        const wallCount = 5;
        for (let i = 0; i < wallCount; i++) {
          const p = allInterior[i];
          grid[p.row][p.col] = WALL;
        }

        const freeCells = allInterior.filter(p => grid[p.row][p.col] === FLOOR);
        shuffle(freeCells, rand);

        const targets = freeCells.slice(0, 3).map(clonePos);
        const boxes = targets.map(t => clonePos(t));
        let player = clonePos(freeCells[3]);

        const state = {
          grid,
          player,
          boxes,
          targets
        };

        const dirs = [
          { dr: -1, dc: 0 },
          { dr: 1, dc: 0 },
          { dr: 0, dc: -1 },
          { dr: 0, dc: 1 }
        ];

        let ok = true;
        for (let step = 0; step < 18; step++) {
          const bi = Math.floor(rand() * 3);
          const box = state.boxes[bi];
          const d = dirs[Math.floor(rand() * dirs.length)];

          const oldPos = { row: box.row, col: box.col };
          const newPos = { row: box.row - d.dr, col: box.col - d.dc };
          const playerNeed = { row: box.row + d.dr, col: box.col + d.dc };

          if (!inside(newPos.row, newPos.col) || !inside(playerNeed.row, playerNeed.col)) continue;
          if (state.grid[newPos.row][newPos.col] === WALL) continue;
          if (state.grid[playerNeed.row][playerNeed.col] === WALL) continue;
          if (state.boxes.some((b, idx) => idx !== bi && samePos(b, newPos))) continue;
          if (state.boxes.some((b, idx) => idx !== bi && samePos(b, playerNeed))) continue;

          box.row = newPos.row;
          box.col = newPos.col;
          state.player = playerNeed;
        }

        const uniqueBoxSet = new Set(state.boxes.map(b => `${b.row},${b.col}`));
        const uniqueTargetSet = new Set(state.targets.map(t => `${t.row},${t.col}`));
        if (uniqueBoxSet.size !== 3 || uniqueTargetSet.size !== 3) ok = false;
        if (state.boxes.some(b => state.grid[b.row][b.col] === WALL)) ok = false;
        if (state.targets.some(t => state.grid[t.row][t.col] === WALL)) ok = false;
        if (state.boxes.some(b => samePos(b, state.player))) ok = false;
        if (!ok) continue;

        return {
          grid: state.grid,
          player: state.player,
          boxes: state.boxes.map(clonePos),
          targets: state.targets.map(clonePos)
        };
      }

      return createFixedSolvableLevel();
    }

    let initialLevel = createSeededLevel(202411);
    let grid = [];
    let playerPos = { row: 0, col: 0 };
    let boxes = [];
    let targets = [];
    let moves = 0;
    let levelComplete = false;
    let history = [];

    let playerMesh = null;
    let boxMeshes = [];

    function buildBoard() {
      boardGroup.clear();
      wallGroup.clear();
      targetGroup.clear();

      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          const wp = gridToWorld(r, c);

          const floor = new THREE.Mesh(floorGeo, (r + c) % 2 === 0 ? floorMat : floorAltMat);
          floor.position.set(wp.x, -0.06, wp.z);
          floor.receiveShadow = true;
          boardGroup.add(floor);

          if (grid[r][c] === WALL) {
            const wall = new THREE.Mesh(wallGeo, wallMat);
            wall.position.set(wp.x, 0.5, wp.z);
            wall.castShadow = true;
            wall.receiveShadow = true;
            wallGroup.add(wall);
          }
        }
      }

      targets.forEach(t => {
        const wp = gridToWorld(t.row, t.col);

        const marker = new THREE.Mesh(targetGeo, targetMat);
        marker.position.set(wp.x, 0.05, wp.z);
        marker.receiveShadow = true;
        targetGroup.add(marker);

        const ring = new THREE.Mesh(
          new THREE.TorusGeometry(0.33, 0.05, 16, 40),
          new THREE.MeshStandardMaterial({ color: 0x7be7ff, emissive: 0x103040 })
        );
        ring.rotation.x = Math.PI / 2;
        ring.position.set(wp.x, 0.09, wp.z);
        targetGroup.add(ring);
      });
    }

    function buildActors() {
      if (playerMesh) scene.remove(playerMesh);
      boxGroup.clear();
      boxMeshes = [];

      playerMesh = new THREE.Mesh(playerGeo, playerMat);
      playerMesh.castShadow = true;
      playerMesh.receiveShadow = true;
      scene.add(playerMesh);

      boxes.forEach(() => {
        const mesh = new THREE.Mesh(boxGeo, boxMat);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        boxGroup.add(mesh);
        boxMeshes.push(mesh);
      });

      syncMeshes();
    }

    function syncMeshes() {
      const p = gridToWorld(playerPos.row, playerPos.col);
      playerMesh.position.set(p.x, 0.34, p.z);

      boxes.forEach((b, i) => {
        const wp = gridToWorld(b.row, b.col);
        boxMeshes[i].position.set(wp.x, 0.36, wp.z);
        boxMeshes[i].material = isTargetCell(b.row, b.col, targets) ? boxOnTargetMat : boxMat;
      });
    }

    function snapshot() {
      return {
        playerPos: clonePos(playerPos),
        boxes: boxes.map(clonePos),
        moves,
        levelComplete
      };
    }

    function restoreState(snap) {
      playerPos = clonePos(snap.playerPos);
      boxes = snap.boxes.map(clonePos);
      moves = snap.moves;
      levelComplete = snap.levelComplete;
      syncMeshes();
      updateGameState();
    }

    function findBoxIndex(row, col) {
      return boxes.findIndex(b => b.row === row && b.col === col);
    }

    function countBoxesOnTargets() {
      return boxes.filter(b => isTargetCell(b.row, b.col, targets)).length;
    }

    function updateGameState() {
      const boxesOnTarget = countBoxesOnTargets();
      levelComplete = boxesOnTarget === 3;

      const info = document.getElementById('info');
      info.textContent =
        `步数: ${moves}\n` +
        `已到目标: ${boxesOnTarget} / 3\n` +
        `玩家: (${playerPos.row}, ${playerPos.col})`;

      document.getElementById('win').textContent = levelComplete ? '胜利：三箱全部到达目标！' : '';

      window.__3D_STATE__ = {
        playerPos: clonePos(playerPos),
        boxes: boxes.map(clonePos),
        targets: targets.map(clonePos),
        moves,
        boxesOnTarget,
        levelComplete
      };
    }

    function isWall(row, col) {
      return !inside(row, col) || grid[row][col] === WALL;
    }

    function movePlayerBy(dr, dc) {
      if (levelComplete) return false;

      const nr = playerPos.row + dr;
      const nc = playerPos.col + dc;

      if (!inside(nr, nc)) return false;
      if (isWall(nr, nc)) return false;

      const boxIndex = findBoxIndex(nr, nc);

      history.push(snapshot());

      if (boxIndex === -1) {
        playerPos.row = nr;
        playerPos.col = nc;
        moves += 1;
        syncMeshes();
        updateGameState();
        return true;
      }

      const br = nr + dr;
      const bc = nc + dc;
      if (!inside(br, bc)) {
        history.pop();
        return false;
      }
      if (isWall(br, bc)) {
        history.pop();
        return false;
      }
      if (findBoxIndex(br, bc) !== -1) {
        history.pop();
        return false;
      }

      boxes[boxIndex].row = br;
      boxes[boxIndex].col = bc;
      playerPos.row = nr;
      playerPos.col = nc;
      moves += 1;
      syncMeshes();
      updateGameState();
      return true;
    }

    function resetLevel() {
      grid = initialLevel.grid.map(row => [...row]);
      playerPos = clonePos(initialLevel.player);
      boxes = initialLevel.boxes.map(clonePos);
      targets = initialLevel.targets.map(clonePos);
      moves = 0;
      levelComplete = false;
      history = [];

      buildBoard();
      buildActors();
      updateGameState();
    }

    function undoMove() {
      if (history.length === 0) return;
      const prev = history.pop();
      restoreState(prev);
    }

    window.__ICG_move__ = function(key) {
      const k = String(key).toUpperCase();
      if (k === 'W') return movePlayerBy(-1, 0);
      if (k === 'S') return movePlayerBy(1, 0);
      if (k === 'A') return movePlayerBy(0, -1);
      if (k === 'D') return movePlayerBy(0, 1);
      return false;
    };

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (['w', 'a', 's', 'd'].includes(key)) {
        e.preventDefault();
      }

      if (key === 'w') movePlayerBy(-1, 0);
      else if (key === 's') movePlayerBy(1, 0);
      else if (key === 'a') movePlayerBy(0, -1);
      else if (key === 'd') movePlayerBy(0, 1);
    });

    document.getElementById('undoBtn').addEventListener('click', undoMove);
    document.getElementById('resetBtn').addEventListener('click', resetLevel);

    resetLevel();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      const t = performance.now() * 0.002;
      targetGroup.children.forEach((obj, i) => {
        if (obj.geometry.type === 'TorusGeometry') {
          obj.rotation.z = t * 0.7 + i * 0.2;
        }
      });

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
