<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Mitosis Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: white;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #phase-info {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 320px;
      max-width: calc(100vw - 32px);
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px 14px;
      z-index: 20;
      box-shadow: 0 6px 24px rgba(0,0,0,0.3);
    }

    #phase-counter {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 10px 14px;
      z-index: 20;
      font-weight: bold;
    }

    #controls {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 12px 14px;
      z-index: 20;
    }

    button, input[type="range"] {
      appearance: none;
      border: none;
      outline: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
    }

    button {
      background: #1f7a8c;
      color: white;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    button:hover {
      background: #2596aa;
      transform: translateY(-1px);
    }

    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      color: white;
      font-size: 14px;
      padding: 0 8px;
    }

    #slider-speed {
      width: 140px;
      padding: 0;
      background: transparent;
    }

    #robot-speech {
      position: absolute;
      top: 120px;
      left: 120px;
      max-width: 260px;
      background: rgba(255,255,255,0.92);
      color: #111;
      border-radius: 14px;
      padding: 10px 12px;
      z-index: 20;
      font-size: 14px;
      line-height: 1.35;
      box-shadow: 0 6px 16px rgba(0,0,0,0.25);
      pointer-events: none;
    }

    #robot-speech::after {
      content: "";
      position: absolute;
      left: 18px;
      bottom: -10px;
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 10px solid rgba(255,255,255,0.92);
    }

    #hud-click {
      margin-top: 8px;
      color: #8ad6ff;
      font-size: 12px;
    }

    .label {
      color: #fff;
      background: rgba(0,0,0,0.65);
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 12px;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.15);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="phase-info">
    <div id="phase-title" style="font-size:18px;font-weight:bold;">Interphase</div>
    <div id="phase-desc" style="margin-top:6px;line-height:1.4;">
      The cell grows and prepares for division. The nucleus is intact, and chromosomes are loosely arranged.
    </div>
    <div id="hud-click">Click the cell to highlight it and inspect the current phase.</div>
  </div>

  <div id="phase-counter">Phase 1/6</div>

  <div id="robot-speech">Hello! I’m your robot guide. Let’s explore mitosis step by step.</div>

  <div id="controls">
    <button id="btn-prev">Previous Phase</button>
    <button id="btn-next">Next Phase</button>
    <button id="btn-reset">Reset</button>
    <button id="btn-labels">Toggle Labels</button>
    <div class="slider-wrap">
      <label for="slider-speed">Speed</label>
      <input id="slider-speed" type="range" min="0.5" max="3.0" step="0.1" value="1.0" />
      <span id="speed-value">1.0x</span>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
    import { CSS2DRenderer, CSS2DObject } from 'https://unpkg.com/three@0.160.0/examples/jsm/renderers/CSS2DRenderer.js';

    const app = document.getElementById('app');
    const phaseTitleEl = document.getElementById('phase-title');
    const phaseDescEl = document.getElementById('phase-desc');
    const phaseCounterEl = document.getElementById('phase-counter');
    const robotSpeechEl = document.getElementById('robot-speech');
    const btnNext = document.getElementById('btn-next');
    const btnPrev = document.getElementById('btn-prev');
    const btnReset = document.getElementById('btn-reset');
    const btnLabels = document.getElementById('btn-labels');
    const sliderSpeed = document.getElementById('slider-speed');
    const speedValue = document.getElementById('speed-value');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f172a);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    app.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.5, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const platform = new THREE.Mesh(
      new THREE.CylinderGeometry(8, 8, 0.3, 64),
      new THREE.MeshStandardMaterial({ color: 0x1f4d3a, roughness: 0.8, metalness: 0.1 })
    );
    platform.position.set(0, 0, 0);
    scene.add(platform);

    const grid = new THREE.GridHelper(14, 14, 0x335544, 0x223322);
    grid.position.y = 0.16;
    scene.add(grid);

    const mainCellGroup = new THREE.Group();
    scene.add(mainCellGroup);

    const cellMaterial = new THREE.MeshStandardMaterial({
      color: 0x3b82f6,
      transparent: true,
      opacity: 0.5,
      emissive: 0x000000,
      emissiveIntensity: 0,
      roughness: 0.3,
      metalness: 0.05
    });

    const cellMesh = new THREE.Mesh(
      new THREE.SphereGeometry(1.5, 48, 48),
      cellMaterial
    );
    cellMesh.position.set(0, 1.5, 0);
    mainCellGroup.add(cellMesh);

    const nucleusMaterial = new THREE.MeshStandardMaterial({
      color: 0x8b5cf6,
      transparent: true,
      opacity: 0.7,
      roughness: 0.4,
      metalness: 0.05
    });

    const nucleusMesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.5, 32, 32),
      nucleusMaterial
    );
    nucleusMesh.position.set(0, 1.5, 0);
    mainCellGroup.add(nucleusMesh);

    const chromosomeGroup = new THREE.Group();
    mainCellGroup.add(chromosomeGroup);

    const chromosomeMaterial = new THREE.MeshStandardMaterial({ color: 0xef4444 });
    const chromosomes = [];

    const initialChromosomeOffsets = [
      [-0.15, 1.55, -0.12],
      [ 0.15, 1.45,  0.10],
      [-0.12, 1.42,  0.15],
      [ 0.10, 1.60, -0.05]
    ];

    for (let i = 0; i < 4; i++) {
      const c = new THREE.Mesh(
        new THREE.BoxGeometry(0.05, 0.3, 0.05),
        chromosomeMaterial.clone()
      );
      c.position.set(...initialChromosomeOffsets[i]);
      c.userData.initial = new THREE.Vector3(...initialChromosomeOffsets[i]);
      c.rotation.z = (i - 1.5) * 0.3;
      chromosomeGroup.add(c);
      chromosomes.push(c);
    }

    const daughterCellsGroup = new THREE.Group();
    scene.add(daughterCellsGroup);

    function createDaughterCell(zPos) {
      const g = new THREE.Group();

      const cell = new THREE.Mesh(
        new THREE.SphereGeometry(1.3, 40, 40),
        new THREE.MeshStandardMaterial({
          color: 0x3b82f6,
          transparent: true,
          opacity: 0.5,
          roughness: 0.3,
          metalness: 0.05
        })
      );
      cell.position.set(0, 1.5, zPos);

      const nucleus = new THREE.Mesh(
        new THREE.SphereGeometry(0.42, 28, 28),
        new THREE.MeshStandardMaterial({
          color: 0x8b5cf6,
          transparent: true,
          opacity: 0.7
        })
      );
      nucleus.position.set(0, 1.5, zPos);

      g.add(cell, nucleus);
      g.visible = false;
      g.userData.cell = cell;
      g.userData.nucleus = nucleus;

      return g;
    }

    const daughterA = createDaughterCell(-2);
    const daughterB = createDaughterCell(2);
    daughterCellsGroup.add(daughterA, daughterB);

    function makeLabel(text, position) {
      const div = document.createElement('div');
      div.className = 'label';
      div.textContent = text;
      const label = new CSS2DObject(div);
      label.position.copy(position);
      return label;
    }

    const labels = [];
    const cellLabel = makeLabel('Cell Membrane', new THREE.Vector3(0, 3.4, 0));
    const nucleusLabel = makeLabel('Nucleus', new THREE.Vector3(0.8, 2.3, 0));
    const chromosomeLabel = makeLabel('Chromosomes', new THREE.Vector3(1.2, 1.7, 0.4));
    const robotAnchor = new THREE.Object3D();
    robotAnchor.position.set(-5, 2.2, 4);

    cellMesh.add(cellLabel);
    nucleusMesh.add(nucleusLabel);
    chromosomeGroup.add(chromosomeLabel);
    scene.add(robotAnchor);
    const robotLabel = makeLabel('Robot Guide', new THREE.Vector3(0, 0, 0));
    robotAnchor.add(robotLabel);
    labels.push(cellLabel, nucleusLabel, chromosomeLabel, robotLabel);

    let labelsVisible = true;

    let robot = null;
    let robotLoaded = false;
    let robotRotating = false;
    let robotSpin = null;

    const loader = new GLTFLoader();
    loader.load(
      'robot.glb',
      (gltf) => {
        robot = gltf.scene;
        robot.position.set(-5, 0.3, 4);
        robot.scale.set(0.8, 0.8, 0.8);

        const box = new THREE.Box3().setFromObject(robot);
        const size = new THREE.Vector3();
        box.getSize(size);
        if (isFinite(size.y) && size.y > 0) {
          const minY = box.min.y;
          robot.position.y += (0.3 - minY);
        }

        scene.add(robot);
        robotLoaded = true;
        updateState();
      },
      undefined,
      () => {
        const fallback = new THREE.Group();
        const body = new THREE.Mesh(
          new THREE.BoxGeometry(0.8, 1.2, 0.6),
          new THREE.MeshStandardMaterial({ color: 0x94a3b8 })
        );
        body.position.y = 0.9;
        const head = new THREE.Mesh(
          new THREE.BoxGeometry(0.55, 0.45, 0.45),
          new THREE.MeshStandardMaterial({ color: 0xcbd5e1 })
        );
        head.position.y = 1.7;
        fallback.add(body, head);
        fallback.position.set(-5, 0.3, 4);
        scene.add(fallback);
        robot = fallback;
        robotLoaded = true;
        updateState();
      }
    );

    const phases = [
      {
        name: 'Interphase',
        desc: 'The cell grows and prepares for division. The nucleus is intact, and chromosomes are loosely arranged.',
        speech: 'We begin with interphase. The cell is active, the nucleus is visible, and the genetic material is still loosely arranged.'
      },
      {
        name: 'Prophase',
        desc: 'Chromosomes condense and become more visible. The nucleus begins to dissolve.',
        speech: 'Now prophase! Chromosomes condense, and the nucleus starts to break down so division can proceed.'
      },
      {
        name: 'Metaphase',
        desc: 'Chromosomes line up along the center of the cell, ready to be separated.',
        speech: 'In metaphase, the chromosomes align at the cell’s equator, like students lining up for inspection.'
      },
      {
        name: 'Anaphase',
        desc: 'Chromosomes separate into two groups and move toward opposite poles of the cell.',
        speech: 'Here comes anaphase. Sister chromatids separate and move toward opposite ends of the cell.'
      },
      {
        name: 'Telophase',
        desc: 'The cell elongates, and two new nuclei begin forming around each chromosome group.',
        speech: 'During telophase, the cell stretches and new nuclei begin to form at each pole.'
      },
      {
        name: 'Cytokinesis',
        desc: 'The cell splits into two daughter cells, each with its own nucleus.',
        speech: 'Finally, cytokinesis! The parent cell divides into two daughter cells, completing mitosis.'
      }
    ];

    const state = {
      currentPhase: 0,
      animationSpeed: 1.0,
      isAnimating: false,
      cellHighlighted: false
    };

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    const transition = {
      active: false,
      startTime: 0,
      duration: 1500,
      from: null,
      to: null
    };

    function snapshotCurrentVisualState() {
      return {
        cellPos: cellMesh.position.clone(),
        cellScaleX: cellMesh.scale.x,
        nucleusOpacity: nucleusMaterial.opacity,
        nucleusVisible: nucleusMesh.visible,
        chromosomeData: chromosomes.map(c => ({
          pos: c.position.clone(),
          scaleY: c.scale.y,
          rotZ: c.rotation.z
        })),
        daughterAVisible: daughterA.visible,
        daughterBVisible: daughterB.visible,
        daughterAPos: daughterA.userData.cell.position.clone(),
        daughterBPos: daughterB.userData.cell.position.clone(),
        daughterANucleusOpacity: daughterA.userData.nucleus.material.opacity,
        daughterBNucleusOpacity: daughterB.userData.nucleus.material.opacity,
        daughterACellOpacity: daughterA.userData.cell.material.opacity,
        daughterBCellOpacity: daughterB.userData.cell.material.opacity,
        mainCellOpacity: cellMaterial.opacity
      };
    }

    function buildPhaseTarget(phaseIndex) {
      const target = {
        cellPos: new THREE.Vector3(0, 1.5, 0),
        cellScaleX: 1.0,
        nucleusOpacity: 0.7,
        nucleusVisible: true,
        chromosomeData: [],
        daughterAVisible: false,
        daughterBVisible: false,
        daughterAPos: new THREE.Vector3(0, 1.5, -2),
        daughterBPos: new THREE.Vector3(0, 1.5,  2),
        daughterANucleusOpacity: 0.7,
        daughterBNucleusOpacity: 0.7,
        daughterACellOpacity: 0.5,
        daughterBCellOpacity: 0.5,
        mainCellOpacity: 0.5
      };

      for (let i = 0; i < chromosomes.length; i++) {
        const base = chromosomes[i].userData.initial.clone();
        const cd = {
          pos: base.clone(),
          scaleY: 1.0,
          rotZ: (i - 1.5) * 0.3
        };

        if (phaseIndex === 1) {
          cd.scaleY = 0.5;
        } else if (phaseIndex === 2) {
          cd.scaleY = 0.5;
          cd.pos.set((i - 1.5) * 0.18, 1.5, 0);
          cd.rotZ = 0;
        } else if (phaseIndex === 3) {
          cd.scaleY = 0.5;
          const sideZ = i < 2 ? -0.7 : 0.7;
          cd.pos.set((i % 2 === 0 ? -0.12 : 0.12), 1.5, sideZ);
          cd.rotZ = 0;
        } else if (phaseIndex === 4) {
          target.cellScaleX = 1.8;
          target.nucleusOpacity = 0.0;
          cd.scaleY = 0.5;
          const sideZ = i < 2 ? -0.7 : 0.7;
          cd.pos.set((i % 2 === 0 ? -0.12 : 0.12), 1.5, sideZ);
          cd.rotZ = 0;
        } else if (phaseIndex === 5) {
          target.mainCellOpacity = 0.0;
          target.nucleusOpacity = 0.0;
          target.nucleusVisible = false;
          target.daughterAVisible = true;
          target.daughterBVisible = true;
        }

        if (phaseIndex === 0) {
          // Interphase defaults
        } else if (phaseIndex === 1) {
          target.nucleusOpacity = 0.3;
        } else if (phaseIndex === 2) {
          target.nucleusOpacity = 0.0;
        } else if (phaseIndex === 3) {
          target.nucleusOpacity = 0.0;
        }

        target.chromosomeData.push(cd);
      }

      return target;
    }

    function easeInOut(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function startTransition(nextPhase) {
      if (state.isAnimating) return;
      nextPhase = Math.max(0, Math.min(5, nextPhase));
      transition.from = snapshotCurrentVisualState();
      transition.to = buildPhaseTarget(nextPhase);
      transition.active = true;
      transition.startTime = performance.now();
      transition.duration = 1500 / state.animationSpeed;
      state.isAnimating = true;
      state.currentPhase = nextPhase;
      updateHUD();
      updateState();
    }

    function applyVisualState(s) {
      cellMesh.position.copy(s.cellPos);
      cellMesh.scale.x = isFinite(s.cellScaleX) ? s.cellScaleX : 1.0;
      cellMaterial.opacity = THREE.MathUtils.clamp(s.mainCellOpacity, 0, 1);

      nucleusMesh.visible = s.nucleusVisible;
      nucleusMaterial.opacity = THREE.MathUtils.clamp(s.nucleusOpacity, 0, 1);

      for (let i = 0; i < chromosomes.length; i++) {
        const c = chromosomes[i];
        const cd = s.chromosomeData[i];
        c.position.copy(cd.pos);
        c.scale.y = isFinite(cd.scaleY) ? cd.scaleY : 1.0;
        c.rotation.z = isFinite(cd.rotZ) ? cd.rotZ : 0;
      }

      daughterA.visible = s.daughterAVisible;
      daughterB.visible = s.daughterBVisible;
      daughterA.userData.cell.position.copy(s.daughterAPos);
      daughterB.userData.cell.position.copy(s.daughterBPos);
      daughterA.userData.nucleus.position.copy(s.daughterAPos);
      daughterB.userData.nucleus.position.copy(s.daughterBPos);
      daughterA.userData.nucleus.material.opacity = THREE.MathUtils.clamp(s.daughterANucleusOpacity, 0, 1);
      daughterB.userData.nucleus.material.opacity = THREE.MathUtils.clamp(s.daughterBNucleusOpacity, 0, 1);
      daughterA.userData.cell.material.opacity = THREE.MathUtils.clamp(s.daughterACellOpacity, 0, 1);
      daughterB.userData.cell.material.opacity = THREE.MathUtils.clamp(s.daughterBCellOpacity, 0, 1);

      sanitizePositions();
    }

    function sanitizePositions() {
      const objs = [
        cellMesh.position, nucleusMesh.position,
        daughterA.userData.cell.position, daughterB.userData.cell.position,
        daughterA.userData.nucleus.position, daughterB.userData.nucleus.position
      ];

      for (const v of objs) {
        if (!isFinite(v.x)) v.x = 0;
        if (!isFinite(v.y)) v.y = 1.5;
        if (!isFinite(v.z)) v.z = 0;
      }

      if (robot) {
        if (!isFinite(robot.position.x)) robot.position.x = -5;
        if (!isFinite(robot.position.y)) robot.position.y = 0.3;
        if (!isFinite(robot.position.z)) robot.position.z = 4;
        robot.position.y = Math.max(0.3, robot.position.y);
      }

      const az = Math.abs(daughterA.userData.cell.position.z);
      daughterA.userData.cell.position.z = -az;
      daughterB.userData.cell.position.z = az;
      daughterA.userData.nucleus.position.z = -az;
      daughterB.userData.nucleus.position.z = az;
    }

    function updateTransition(now) {
      if (!transition.active) return;
      const t = Math.min(1, (now - transition.startTime) / transition.duration);
      const k = easeInOut(t);

      const from = transition.from;
      const to = transition.to;

      const current = {
        cellPos: from.cellPos.clone().lerp(to.cellPos, k),
        cellScaleX: THREE.MathUtils.lerp(from.cellScaleX, to.cellScaleX, k),
        nucleusOpacity: THREE.MathUtils.lerp(from.nucleusOpacity, to.nucleusOpacity, k),
        nucleusVisible: k < 1 ? true : to.nucleusVisible,
        chromosomeData: [],
        daughterAVisible: (from.daughterAVisible || to.daughterAVisible),
        daughterBVisible: (from.daughterBVisible || to.daughterBVisible),
        daughterAPos: from.daughterAPos.clone().lerp(to.daughterAPos, k),
        daughterBPos: from.daughterBPos.clone().lerp(to.daughterBPos, k),
        daughterANucleusOpacity: THREE.MathUtils.lerp(from.daughterANucleusOpacity, to.daughterANucleusOpacity, k),
        daughterBNucleusOpacity: THREE.MathUtils.lerp(from.daughterBNucleusOpacity, to.daughterBNucleusOpacity, k),
        daughterACellOpacity: THREE.MathUtils.lerp(from.daughterACellOpacity, to.daughterACellOpacity, k),
        daughterBCellOpacity: THREE.MathUtils.lerp(from.daughterBCellOpacity, to.daughterBCellOpacity, k),
        mainCellOpacity: THREE.MathUtils.lerp(from.mainCellOpacity, to.mainCellOpacity, k)
      };

      for (let i = 0; i < chromosomes.length; i++) {
        current.chromosomeData.push({
          pos: from.chromosomeData[i].pos.clone().lerp(to.chromosomeData[i].pos, k),
          scaleY: THREE.MathUtils.lerp(from.chromosomeData[i].scaleY, to.chromosomeData[i].scaleY, k),
          rotZ: THREE.MathUtils.lerp(from.chromosomeData[i].rotZ, to.chromosomeData[i].rotZ, k)
        });
      }

      applyVisualState(current);

      if (t >= 1) {
        applyVisualState(to);
        transition.active = false;
        state.isAnimating = false;
      }
    }

    function updateHUD() {
      const phase = phases[state.currentPhase];
      phaseTitleEl.textContent = phase.name;
      phaseDescEl.textContent = phase.desc;
      phaseCounterEl.textContent = `Phase ${state.currentPhase + 1}/6`;
      robotSpeechEl.textContent = phase.speech;
    }

    function updateRobotSpeechPosition() {
      if (!robot) return;
      const pos = new THREE.Vector3();
      pos.setFromMatrixPosition(robot.matrixWorld);
      pos.y += 2.5;
      pos.project(camera);

      const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;
      robotSpeechEl.style.left = `${x - 40}px`;
      robotSpeechEl.style.top = `${y - 80}px`;
    }

    function setLabelsVisible(v) {
      labelsVisible = v;
      for (const l of labels) l.element.style.display = v ? '' : 'none';
      updateState();
    }

    function highlightCell(toggle = true) {
      state.cellHighlighted = toggle;
      cellMaterial.emissive.set(toggle ? 0x66ccff : 0x000000);
      cellMaterial.emissiveIntensity = toggle ? 0.8 : 0.0;
      updateHUD();
      updateState();
    }

    function spinRobot() {
      if (!robot || robotRotating) return;
      robotRotating = true;
      robotSpin = {
        start: performance.now(),
        duration: 1000 / state.animationSpeed,
        baseY: robot.rotation.y
      };
      updateState();
    }

    function updateRobotSpin(now) {
      if (!robotSpin || !robot) return;
      const t = Math.min(1, (now - robotSpin.start) / robotSpin.duration);
      robot.rotation.y = robotSpin.baseY + Math.PI * 2 * easeInOut(t);
      if (t >= 1) {
        robot.rotation.y = robotSpin.baseY;
        robotSpin = null;
        robotRotating = false;
        updateState();
      }
    }

    function updateState() {
      const cellRef = state.currentPhase === 5 && daughterA.visible ? daughterA.userData.cell : cellMesh;
      const chromosomeSeparation = state.currentPhase >= 3 && state.currentPhase <= 4 ? 1.4 : 0;

      window.__3D_STATE__ = {
        currentPhase: state.currentPhase,
        phaseName: phases[state.currentPhase].name,
        cellPosition: {
          x: Number(cellRef.position.x.toFixed(3)),
          y: Number(cellRef.position.y.toFixed(3)),
          z: Number(cellRef.position.z.toFixed(3))
        },
        cellScaleX: Number((state.currentPhase === 5 ? 1.0 : cellMesh.scale.x).toFixed(3)),
        nucleusOpacity: Number((state.currentPhase === 5 ? 0 : nucleusMaterial.opacity).toFixed(3)),
        chromosomeCount: chromosomes.length,
        chromosomeSeparation: Number(chromosomeSeparation.toFixed(3)),
        daughterCellCount: state.currentPhase === 5 ? 2 : 1,
        animationSpeed: state.animationSpeed,
        labelsVisible,
        robotLoaded,
        robotRotating,
        cellHighlighted: state.cellHighlighted,
        isAnimating: state.isAnimating
      };
    }

    btnNext.addEventListener('click', () => startTransition(state.currentPhase + 1));
    btnPrev.addEventListener('click', () => startTransition(state.currentPhase - 1));
    btnReset.addEventListener('click', () => startTransition(0));
    btnLabels.addEventListener('click', () => setLabelsVisible(!labelsVisible));

    sliderSpeed.addEventListener('input', () => {
      state.animationSpeed = parseFloat(sliderSpeed.value);
      speedValue.textContent = `${state.animationSpeed.toFixed(1)}x`;
      updateState();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'r') spinRobot();
    });

    renderer.domElement.addEventListener('click', (e) => {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);

      const clickable = [cellMesh];
      if (daughterA.visible) clickable.push(daughterA.userData.cell);
      if (daughterB.visible) clickable.push(daughterB.userData.cell);

      const hit = raycaster.intersectObjects(clickable, false);
      if (hit.length > 0) {
        highlightCell(!state.cellHighlighted);
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    applyVisualState(buildPhaseTarget(0));
    updateHUD();
    updateState();

    function animate(now = 0) {
      requestAnimationFrame(animate);
      controls.update();
      updateTransition(now);
      updateRobotSpin(now);
      updateRobotSpeechPosition();
      updateState();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
