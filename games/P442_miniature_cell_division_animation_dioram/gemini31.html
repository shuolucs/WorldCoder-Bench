<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cell Division (Mitosis) Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        .panel {
            background: rgba(15, 20, 25, 0.85);
            border: 1px solid #3a4a5a;
            border-radius: 8px;
            padding: 15px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }
        #phase-info {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 300px;
            transition: box-shadow 0.3s ease;
        }
        #phase-info h2 {
            margin: 0 0 10px 0;
            color: #4db8ff;
            font-size: 1.5rem;
        }
        #phase-info p {
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.4;
            color: #cccccc;
        }
        #phase-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #4db8ff;
        }
        #controls-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            align-items: center;
        }
        button {
            background: #205b8d;
            color: white;
            border: 1px solid #4db8ff;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }
        button:hover {
            background: #4db8ff;
            color: #000;
        }
        button:active {
            transform: scale(0.95);
        }
        button:disabled {
            background: #333;
            border-color: #555;
            color: #777;
            cursor: not-allowed;
        }
        .slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 6px;
            border: 1px solid #3a4a5a;
        }
        input[type=range] {
            cursor: pointer;
        }
        .label-3d {
            color: #ffffff;
            font-family: sans-serif;
            font-size: 12px;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #4db8ff;
            border-radius: 4px;
            pointer-events: none;
            white-space: nowrap;
            text-shadow: 1px 1px 0 #000;
        }
        #robot-speech {
            position: absolute;
            background: #ffffff;
            color: #000000;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 220px;
            font-size: 14px;
            font-weight: 500;
            pointer-events: none;
            border: 2px solid #4db8ff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: none;
            text-align: center;
            line-height: 1.3;
        }
        #robot-speech::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 12px 12px 0;
            border-style: solid;
            border-color: #ffffff transparent transparent transparent;
        }
        #robot-speech::before {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 14px 14px 0;
            border-style: solid;
            border-color: #4db8ff transparent transparent transparent;
            z-index: -1;
        }
        #instructions {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            color: #888;
            pointer-events: none;
            text-align: center;
        }
    </style>
    
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="phase-info" class="panel">
            <h2 id="phase-title">Interphase</h2>
            <p id="phase-desc">Cell grows and DNA replicates.</p>
        </div>
        
        <div id="phase-counter" class="panel">Phase 1/6</div>
        
        <div id="instructions">
            Drag to rotate | Scroll to zoom | Click cell for info | Press 'R' for robot animation
        </div>

        <div id="controls-container" class="panel">
            <button id="btn-prev" disabled>Previous</button>
            <button id="btn-next">Next Phase</button>
            <button id="btn-reset">Reset</button>
            <button id="btn-labels">Toggle Labels</button>
            
            <div class="slider-group">
                <label for="slider-speed">Speed:</label>
                <input type="range" id="slider-speed" min="0.5" max="3.0" step="0.1" value="1.0">
                <span id="speed-val">1.0x</span>
            </div>
        </div>
    </div>

    <div id="robot-speech">Hello! I'm your lab assistant. Let's observe cell division!</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            currentPhase: 0,
            phaseName: 'Interphase',
            cellPosition: { x: 0, y: 1.5, z: 0 },
            cellScaleX: 1,
            nucleusOpacity: 0.7,
            chromosomeCount: 4,
            chromosomeSeparation: 0,
            daughterCellCount: 1,
            animationSpeed: 1.0,
            labelsVisible: true,
            robotLoaded: false,
            robotRotating: false,
            cellHighlighted: false,
            isAnimating: false
        };

        const phases = [
            { 
                name: "Interphase", 
                desc: "The cell grows, performs its normal functions, and prepares for division by replicating its DNA.", 
                speech: "Welcome! Here in Interphase, the cell is preparing to divide. DNA is loosely packed."
            },
            { 
                name: "Prophase", 
                desc: "Chromosomes condense and become visible. The nuclear envelope begins to dissolve.", 
                speech: "Notice the chromosomes condensing into tight packages and the nucleus fading away."
            },
            { 
                name: "Metaphase", 
                desc: "Chromosomes align at the cell equator (metaphase plate).", 
                speech: "Fascinating! The chromosomes are lining up perfectly in the middle of the cell."
            },
            { 
                name: "Anaphase", 
                desc: "Sister chromatids separate and are pulled to opposite poles of the cell.", 
                speech: "They are separating! The chromatids are being pulled to opposite sides."
            },
            { 
                name: "Telophase", 
                desc: "The cell elongates. Nuclear envelopes begin to reform around the two sets of chromosomes.", 
                speech: "The cell stretches out, and new nuclei begin to form around the separated DNA."
            },
            { 
                name: "Cytokinesis", 
                desc: "The cytoplasm divides, pinching the cell into two identical daughter cells.", 
                speech: "Division complete! We now have two identical daughter cells ready to start the cycle again."
            }
        ];

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground
        controls.minDistance = 5;
        controls.maxDistance = 30;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const backLight = new THREE.DirectionalLight(0x4db8ff, 0.3);
        backLight.position.set(-5, 5, -5);
        scene.add(backLight);

        // --- Environment ---
        // Platform
        const platformGeom = new THREE.CylinderGeometry(8, 8, 0.3, 64);
        const platformMat = new THREE.MeshStandardMaterial({ 
            color: 0x1a3320, 
            roughness: 0.8, 
            metalness: 0.2 
        });
        const platform = new THREE.Mesh(platformGeom, platformMat);
        platform.position.y = 0.15;
        scene.add(platform);

        // Grid helper for lab feel
        const grid = new THREE.GridHelper(16, 16, 0x4db8ff, 0x222222);
        grid.position.y = 0.31;
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        scene.add(grid);

        // --- Cell Models ---
        const cellGroup = new THREE.Group();
        scene.add(cellGroup);

        const allLabels = [];

        function createLabel(text, position, parent) {
            const div = document.createElement('div');
            div.className = 'label-3d';
            div.textContent = text;
            const label = new CSS2DObject(div);
            label.position.copy(position);
            parent.add(label);
            allLabels.push(label);
            return label;
        }

        // Materials
        const membraneMat = new THREE.MeshPhysicalMaterial({
            color: 0x0066ff,
            transparent: true,
            opacity: 0.5,
            roughness: 0.1,
            transmission: 0.6,
            thickness: 0.5,
            depthWrite: false
        });

        const nucleusMat = new THREE.MeshStandardMaterial({
            color: 0x8a2be2,
            transparent: true,
            opacity: 0.7,
            roughness: 0.4
        });

        const chromoMat = new THREE.MeshStandardMaterial({
            color: 0xff2222,
            roughness: 0.3
        });

        // Cell 1 (Main)
        const membrane1 = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), membraneMat.clone());
        membrane1.position.set(0, 1.5, 0);
        scene.add(membrane1);
        createLabel('Cell Membrane', new THREE.Vector3(0, 1.6, 0), membrane1);

        const nucleus1 = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), nucleusMat.clone());
        nucleus1.position.set(0, 1.5, 0);
        scene.add(nucleus1);
        createLabel('Nucleus', new THREE.Vector3(0, 0.6, 0), nucleus1);

        // Cell 2 (Daughter - hidden initially)
        const membrane2 = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), membraneMat.clone());
        membrane2.position.set(0, 1.5, 0);
        membrane2.visible = false;
        scene.add(membrane2);

        const nucleus2 = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), nucleusMat.clone());
        nucleus2.position.set(0, 1.5, 0);
        nucleus2.visible = false;
        scene.add(nucleus2);

        // Chromosomes
        const chromosomes = [];
        const chromoGeom = new THREE.BoxGeometry(0.05, 0.3, 0.05);
        
        for (let i = 0; i < 4; i++) {
            const mesh = new THREE.Mesh(chromoGeom, chromoMat);
            // Random initial positions inside nucleus
            const rx = (Math.random() - 0.5) * 0.4;
            const ry = 1.5 + (Math.random() - 0.5) * 0.4;
            const rz = (Math.random() - 0.5) * 0.4;
            mesh.position.set(rx, ry, rz);
            
            mesh.userData.origPos = new THREE.Vector3(rx, ry, rz);
            mesh.userData.origRot = new THREE.Euler(
                Math.random() * Math.PI, 
                Math.random() * Math.PI, 
                Math.random() * Math.PI
            );
            mesh.rotation.copy(mesh.userData.origRot);
            
            scene.add(mesh);
            chromosomes.push(mesh);
        }
        createLabel('Chromosomes', new THREE.Vector3(0, 0.4, 0), chromosomes[0]);

        // --- Robot Guide ---
        let robotModel = null;
        const speechDiv = document.getElementById('robot-speech');
        let speechLabel = null;

        const setupRobotSpeech = (parent) => {
            speechDiv.style.display = 'block';
            speechLabel = new CSS2DObject(speechDiv);
            speechLabel.position.set(0, 2.5, 0);
            parent.add(speechLabel);
        };

        const gltfLoader = new GLTFLoader();
        gltfLoader.load('robot.glb', (gltf) => {
            robotModel = gltf.scene;
            robotModel.position.set(-5, 0.3, 4);
            robotModel.scale.set(0.8, 0.8, 0.8);
            scene.add(robotModel);
            window.__3D_STATE__.robotLoaded = true;
            setupRobotSpeech(robotModel);
        }, undefined, (error) => {
            console.warn("Could not load robot.glb, creating fallback robot.", error);
            // Fallback Robot
            robotModel = new THREE.Group();
            
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.2 });
            const accentMat = new THREE.MeshStandardMaterial({ color: 0x4db8ff, emissive: 0x114466 });
            
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.2, 16), bodyMat);
            body.position.y = 0.6;
            
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), bodyMat);
            head.position.y = 1.4;
            
            const eye = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.3), accentMat);
            eye.position.set(0, 1.4, 0.25);
            
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 0.2, 16), bodyMat);
            base.position.y = 0.1;

            robotModel.add(body, head, eye, base);
            robotModel.position.set(-5, 0.3, 4);
            robotModel.scale.set(0.8, 0.8, 0.8);
            scene.add(robotModel);
            window.__3D_STATE__.robotLoaded = true;
            setupRobotSpeech(robotModel);
        });

        // --- Animation Logic ---
        function applyPhase(index) {
            if (window.__3D_STATE__.isAnimating) return;
            
            window.__3D_STATE__.isAnimating = true;
            window.__3D_STATE__.currentPhase = index;
            window.__3D_STATE__.phaseName = phases[index].name;
            
            // Update UI
            document.getElementById('phase-title').innerText = phases[index].name;
            document.getElementById('phase-desc').innerText = phases[index].desc;
            document.getElementById('phase-counter').innerText = `Phase ${index + 1}/6`;
            speechDiv.innerText = phases[index].speech;
            
            document.getElementById('btn-prev').disabled = index === 0;
            document.getElementById('btn-next').disabled = index === 5;

            const dur = 1.5 / window.__3D_STATE__.animationSpeed;
            const tl = gsap.timeline({
                onComplete: () => {
                    window.__3D_STATE__.isAnimating = false;
                }
            });

            switch(index) {
                case 0: // Interphase
                    tl.to(membrane1.scale, {x: 1, y: 1, z: 1, duration: dur}, 0);
                    tl.to(membrane1.position, {x: 0, y: 1.5, z: 0, duration: dur}, 0);
                    membrane2.visible = false;

                    tl.to(nucleus1.material, {opacity: 0.7, duration: dur}, 0);
                    tl.to(nucleus1.position, {x: 0, y: 1.5, z: 0, duration: dur}, 0);
                    nucleus2.visible = false;

                    chromosomes.forEach((c) => {
                        tl.to(c.scale, {y: 1, duration: dur}, 0);
                        tl.to(c.position, {x: c.userData.origPos.x, y: c.userData.origPos.y, z: c.userData.origPos.z, duration: dur}, 0);
                        tl.to(c.rotation, {x: c.userData.origRot.x, y: c.userData.origRot.y, z: c.userData.origRot.z, duration: dur}, 0);
                    });
                    break;

                case 1: // Prophase
                    tl.to(membrane1.scale, {x: 1, y: 1, z: 1, duration: dur}, 0);
                    tl.to(membrane1.position, {x: 0, y: 1.5, z: 0, duration: dur}, 0);
                    membrane2.visible = false;

                    tl.to(nucleus1.material, {opacity: 0.3, duration: dur}, 0);
                    tl.to(nucleus1.position, {x: 0, y: 1.5, z: 0, duration: dur}, 0);
                    nucleus2.visible = false;

                    chromosomes.forEach((c) => {
                        tl.to(c.scale, {y: 0.5, duration: dur}, 0);
                        // Move slightly towards center
                        tl.to(c.position, {
                            x: c.userData.origPos.x * 0.5, 
                            y: 1.5 + (c.userData.origPos.y - 1.5) * 0.5, 
                            z: c.userData.origPos.z * 0.5, 
                            duration: dur
                        }, 0);
                    });
                    break;

                case 2: // Metaphase
                    tl.to(membrane1.scale, {x: 1, y: 1, z: 1, duration: dur}, 0);
                    tl.to(membrane1.position, {x: 0, y: 1.5, z: 0, duration: dur}, 0);
                    membrane2.visible = false;

                    tl.to(nucleus1.material, {opacity: 0, duration: dur}, 0);
                    nucleus2.visible = false;

                    chromosomes.forEach((c, i) => {
                        tl.to(c.scale, {y: 0.5, duration: dur}, 0);
                        // Align at equator (z=0), spread along X
                        tl.to(c.position, {x: (i - 1.5) * 0.2, y: 1.5, z: 0, duration: dur}, 0);
                        tl.to(c.rotation, {x: 0, y: 0, z: 0, duration: dur}, 0);
                    });
                    break;

                case 3: // Anaphase
                    tl.to(membrane1.scale, {x: 1, y: 1, z: 1, duration: dur}, 0);
                    tl.to(membrane1.position, {x: 0, y: 1.5, z: 0, duration: dur}, 0);
                    membrane2.visible = false;

                    tl.to(nucleus1.material, {opacity: 0, duration: dur}, 0);
                    nucleus2.visible = false;

                    chromosomes.forEach((c, i) => {
                        tl.to(c.scale, {y: 0.5, duration: dur}, 0);
                        const targetZ = (i < 2) ? -0.7 : 0.7;
                        const targetX = (i % 2 === 0) ? -0.1 : 0.1;
                        tl.to(c.position, {x: targetX, y: 1.5, z: targetZ, duration: dur}, 0);
                    });
                    break;

                case 4: // Telophase
                    // Prompt: "Cell elongates (scaleX to 1.8)". 
                    tl.to(membrane1.scale, {x: 1.8, y: 1, z: 1, duration: dur}, 0);
                    tl.to(membrane1.position, {x: 0, y: 1.5, z: 0, duration: dur}, 0);
                    membrane2.visible = false;

                    tl.to(nucleus1.material, {opacity: 0.5, duration: dur}, 0);
                    tl.to(nucleus1.position, {x: 0, y: 1.5, z: -0.7, duration: dur}, 0);

                    nucleus2.visible = true;
                    if(nucleus2.material.opacity === 0) nucleus2.material.opacity = 0;
                    tl.to(nucleus2.material, {opacity: 0.5, duration: dur}, 0);
                    tl.to(nucleus2.position, {x: 0, y: 1.5, z: 0.7, duration: dur}, 0);

                    chromosomes.forEach((c, i) => {
                        const targetZ = (i < 2) ? -0.7 : 0.7;
                        const targetX = (i % 2 === 0) ? -0.1 : 0.1;
                        tl.to(c.position, {x: targetX, y: 1.5, z: targetZ, duration: dur}, 0);
                    });
                    break;

                case 5: // Cytokinesis
                    // Split into two at z=-2 and z=2
                    tl.to(membrane1.scale, {x: 1, y: 1, z: 1, duration: dur}, 0);
                    tl.to(membrane1.position, {x: 0, y: 1.5, z: -2, duration: dur}, 0);

                    membrane2.visible = true;
                    // If coming from Telophase, start membrane2 at center elongated to match membrane1
                    if(membrane2.position.z !== 2) {
                        tl.fromTo(membrane2.position, {x:0, y:1.5, z:0}, {x: 0, y: 1.5, z: 2, duration: dur}, 0);
                        tl.fromTo(membrane2.scale, {x:1.8, y:1, z:1}, {x: 1, y: 1, z: 1, duration: dur}, 0);
                    } else {
                        tl.to(membrane2.position, {x: 0, y: 1.5, z: 2, duration: dur}, 0);
                        tl.to(membrane2.scale, {x: 1, y: 1, z: 1, duration: dur}, 0);
                    }

                    tl.to(nucleus1.material, {opacity: 0.7, duration: dur}, 0);
                    tl.to(nucleus1.position, {x: 0, y: 1.5, z: -2, duration: dur}, 0);

                    tl.to(nucleus2.material, {opacity: 0.7, duration: dur}, 0);
                    tl.to(nucleus2.position, {x: 0, y: 1.5, z: 2, duration: dur}, 0);

                    chromosomes.forEach((c, i) => {
                        const targetZ = (i < 2) ? -2 : 2;
                        const targetX = (i % 2 === 0) ? -0.1 : 0.1;
                        tl.to(c.position, {x: targetX, y: 1.5, z: targetZ, duration: dur}, 0);
                    });
                    break;
            }
        }

        // --- Interactions ---
        document.getElementById('btn-next').addEventListener('click', () => {
            if (window.__3D_STATE__.currentPhase < 5) applyPhase(window.__3D_STATE__.currentPhase + 1);
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            if (window.__3D_STATE__.currentPhase > 0) applyPhase(window.__3D_STATE__.currentPhase - 1);
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            applyPhase(0);
        });

        const speedSlider = document.getElementById('slider-speed');
        const speedVal = document.getElementById('speed-val');
        speedSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            window.__3D_STATE__.animationSpeed = val;
            speedVal.innerText = val.toFixed(1) + 'x';
        });

        document.getElementById('btn-labels').addEventListener('click', () => {
            window.__3D_STATE__.labelsVisible = !window.__3D_STATE__.labelsVisible;
            allLabels.forEach(l => l.visible = window.__3D_STATE__.labelsVisible);
        });

        // Keyboard 'R' for Robot
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r' && robotModel && !window.__3D_STATE__.robotRotating) {
                window.__3D_STATE__.robotRotating = true;
                gsap.to(robotModel.rotation, {
                    y: robotModel.rotation.y + Math.PI * 2,
                    duration: 1,
                    ease: "power2.inOut",
                    onComplete: () => { window.__3D_STATE__.robotRotating = false; }
                });
            }
        });

        // Click Cell Highlight
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        window.addEventListener('click', (e) => {
            // Ignore clicks on UI
            if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.closest('.panel')) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects([membrane1, membrane2]);
            
            if (intersects.length > 0) {
                window.__3D_STATE__.cellHighlighted = true;
                membrane1.material.emissive.setHex(0x0022ff);
                membrane1.material.emissiveIntensity = 0.6;
                membrane2.material.emissive.setHex(0x0022ff);
                membrane2.material.emissiveIntensity = 0.6;
                
                // Flash HUD
                gsap.fromTo('#phase-info', 
                    { boxShadow: '0 0 20px 5px rgba(77, 184, 255, 0.8)' }, 
                    { boxShadow: '0 4px 15px rgba(0,0,0,0.5)', duration: 1 }
                );
                
                // Reset emissive after a delay
                setTimeout(() => {
                    membrane1.material.emissive.setHex(0x000000);
                    membrane2.material.emissive.setHex(0x000000);
                    window.__3D_STATE__.cellHighlighted = false;
                }, 1000);
            }
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Render Loop ---
        function updateStateObject() {
            const s = window.__3D_STATE__;
            s.cellPosition = { x: membrane1.position.x, y: membrane1.position.y, z: membrane1.position.z };
            s.cellScaleX = membrane1.scale.x;
            s.nucleusOpacity = nucleus1.material.opacity;
            
            // Calculate dynamic chromosome separation
            if (chromosomes.length === 4) {
                const dist = chromosomes[0].position.distanceTo(chromosomes[2].position);
                s.chromosomeSeparation = dist > 0.1 ? dist : 0;
            }
            
            s.daughterCellCount = s.currentPhase === 5 ? 2 : 1;
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            updateStateObject();
            
            // Slight floating animation for cells
            if (!window.__3D_STATE__.isAnimating) {
                const time = Date.now() * 0.001;
                membrane1.position.y = 1.5 + Math.sin(time) * 0.05;
                nucleus1.position.y = membrane1.position.y;
                if(membrane2.visible) {
                    membrane2.position.y = 1.5 + Math.sin(time + Math.PI) * 0.05;
                    nucleus2.position.y = membrane2.position.y;
                }
            }

            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        // Initialize
        applyPhase(0);
        animate();

    </script>
</body>
</html>
