<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cell Division (Mitosis) - 3D Educational Diorama</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; }
canvas { display: block; }

#phase-info {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 20, 40, 0.85);
    color: #e0f0ff;
    padding: 15px 20px;
    border-radius: 12px;
    max-width: 320px;
    border: 1px solid rgba(100, 180, 255, 0.3);
    backdrop-filter: blur(10px);
    z-index: 10;
}
#phase-info h2 {
    font-size: 18px;
    color: #60c0ff;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
}
#phase-info p {
    font-size: 13px;
    line-height: 1.5;
    color: #b0d0f0;
}

#phase-counter {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(0, 20, 40, 0.85);
    color: #60c0ff;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    border: 1px solid rgba(100, 180, 255, 0.3);
    backdrop-filter: blur(10px);
    z-index: 10;
}

#phase-progress {
    display: flex;
    gap: 6px;
    margin-top: 8px;
}
.progress-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(100, 180, 255, 0.2);
    border: 1px solid rgba(100, 180, 255, 0.4);
    transition: all 0.3s;
}
.progress-dot.active {
    background: #60c0ff;
    box-shadow: 0 0 8px #60c0ff;
}
.progress-dot.completed {
    background: rgba(100, 180, 255, 0.5);
}

#robot-speech {
    position: absolute;
    top: 60%;
    left: 50px;
    background: rgba(255, 255, 255, 0.95);
    color: #1a1a2e;
    padding: 12px 16px;
    border-radius: 12px;
    max-width: 260px;
    font-size: 13px;
    line-height: 1.4;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    z-index: 10;
    display: none;
}
#robot-speech::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 20px;
    border-width: 10px 10px 0;
    border-style: solid;
    border-color: rgba(255, 255, 255, 0.95) transparent transparent;
}

#controls {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    align-items: center;
    background: rgba(0, 20, 40, 0.85);
    padding: 12px 20px;
    border-radius: 16px;
    border: 1px solid rgba(100, 180, 255, 0.3);
    backdrop-filter: blur(10px);
    z-index: 10;
}

#controls button {
    background: linear-gradient(135deg, #1a3a5c, #2a5a8c);
    color: #e0f0ff;
    border: 1px solid rgba(100, 180, 255, 0.3);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    white-space: nowrap;
}
#controls button:hover {
    background: linear-gradient(135deg, #2a5a8c, #3a7abc);
    box-shadow: 0 0 12px rgba(100, 180, 255, 0.3);
}
#controls button:active {
    transform: scale(0.95);
}

.speed-control {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #b0d0f0;
    font-size: 12px;
}
#slider-speed {
    width: 80px;
    accent-color: #60c0ff;
}

#cell-info-popup {
    position: absolute;
    top: 50%;
    right: 20px;
    transform: translateY(-50%);
    background: rgba(0, 20, 40, 0.9);
    color: #e0f0ff;
    padding: 15px 20px;
    border-radius: 12px;
    max-width: 250px;
    border: 1px solid rgba(255, 200, 50, 0.5);
    backdrop-filter: blur(10px);
    z-index: 10;
    display: none;
    font-size: 13px;
    line-height: 1.5;
}
#cell-info-popup h3 {
    color: #ffc832;
    margin-bottom: 8px;
}
</style>
</head>
<body>

<div id="phase-info">
    <h2 id="phase-title">Interphase</h2>
    <p id="phase-desc">The cell is in its normal state. DNA is replicated and the cell prepares for division.</p>
</div>

<div id="phase-counter">
    <div>Phase <span id="phase-num">1</span>/6</div>
    <div id="phase-progress">
        <div class="progress-dot active"></div>
        <div class="progress-dot"></div>
        <div class="progress-dot"></div>
        <div class="progress-dot"></div>
        <div class="progress-dot"></div>
        <div class="progress-dot"></div>
    </div>
</div>

<div id="robot-speech">
    <span id="robot-text">Welcome! I'm your lab assistant. Let me guide you through the amazing process of cell division - mitosis!</span>
</div>

<div id="cell-info-popup">
    <h3>Cell Information</h3>
    <div id="cell-info-content"></div>
</div>

<div id="controls">
    <button id="btn-prev">◀ Previous</button>
    <button id="btn-next">Next ▶</button>
    <button id="btn-reset">⟲ Reset</button>
    <button id="btn-labels">🏷 Labels</button>
    <div class="speed-control">
        <span>Speed:</span>
        <input type="range" id="slider-speed" min="0.5" max="3.0" step="0.1" value="1.0">
        <span id="speed-val">1.0x</span>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// Additional lights for atmosphere
const pointLight1 = new THREE.PointLight(0x4080ff, 0.5, 20);
pointLight1.position.set(-3, 5, -3);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0xff4080, 0.3, 20);
pointLight2.position.set(3, 5, 3);
scene.add(pointLight2);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.1;
controls.minDistance = 5;
controls.maxDistance = 25;

// Platform
const platformGeo = new THREE.CylinderGeometry(8, 8, 0.3, 64);
const platformMat = new THREE.MeshStandardMaterial({
    color: 0x1a4a2a,
    roughness: 0.7,
    metalness: 0.2
});
const platform = new THREE.Mesh(platformGeo, platformMat);
platform.position.y = 0;
platform.receiveShadow = true;
scene.add(platform);

// Platform edge ring
const ringGeo = new THREE.TorusGeometry(8, 0.08, 16, 64);
const ringMat = new THREE.MeshStandardMaterial({ color: 0x60c0ff, emissive: 0x2060a0, emissiveIntensity: 0.5 });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.position.y = 0.15;
ring.rotation.x = Math.PI / 2;
scene.add(ring);

// Grid on platform
const gridHelper = new THREE.GridHelper(14, 20, 0x2a6a3a, 0x1a4a2a);
gridHelper.position.y = 0.16;
scene.add(gridHelper);

// Phase data
const phases = [
    { name: 'Interphase', desc: 'The cell is in its normal state. DNA has been replicated and the cell prepares for division. Chromosomes are loosely arranged as chromatin.' },
    { name: 'Prophase', desc: 'Chromosomes condense and become visible. The nuclear envelope begins to break down. Spindle fibers start forming.' },
    { name: 'Metaphase', desc: 'Chromosomes align along the cell\'s equator (metaphase plate). Spindle fibers attach to the centromeres of each chromosome.' },
    { name: 'Anaphase', desc: 'Sister chromatids separate and move to opposite poles of the cell. The cell begins to elongate.' },
    { name: 'Telophase', desc: 'The cell elongates further. New nuclear envelopes form around each set of chromosomes. Chromosomes begin to decondense.' },
    { name: 'Cytokinesis', desc: 'The cell membrane pinches inward, dividing the cytoplasm. Two identical daughter cells are formed, each with a complete set of chromosomes.' }
];

const robotSpeech = [
    "Welcome! This is Interphase - the cell's preparation stage. Notice how the DNA is loosely organized inside the nucleus. The cell is growing and copying its DNA!",
    "Now entering Prophase! Watch the chromosomes condense - they're getting shorter and thicker. The nuclear envelope is starting to dissolve. Exciting times!",
    "Metaphase! The chromosomes have lined up perfectly along the middle of the cell. This is like soldiers standing in formation before the big split!",
    "Anaphase is happening! The chromosomes are being pulled apart to opposite ends of the cell. It's like a tug-of-war with genetic material!",
    "Telophase now! The cell is stretching out and new nuclei are forming around each group of chromosomes. We're almost there!",
    "Cytokinesis - the grand finale! The cell pinches in the middle and splits into two identical daughter cells. Each one has a complete copy of DNA. Amazing!"
];

// Cell group
const cellGroup = new THREE.Group();
cellGroup.position.set(0, 1.5, 0);
scene.add(cellGroup);

// Cell membrane
const cellGeo = new THREE.SphereGeometry(1.5, 32, 32);
const cellMat = new THREE.MeshPhysicalMaterial({
    color: 0x2060c0,
    transparent: true,
    opacity: 0.35,
    roughness: 0.1,
    metalness: 0.1,
    transmission: 0.3,
    thickness: 0.5,
    side: THREE.DoubleSide
});
const cellMesh = new THREE.Mesh(cellGeo, cellMat);
cellMesh.castShadow = true;
cellGroup.add(cellMesh);

// Nucleus
const nucleusGeo = new THREE.SphereGeometry(0.5, 24, 24);
const nucleusMat = new THREE.MeshPhysicalMaterial({
    color: 0x8030c0,
    transparent: true,
    opacity: 0.7,
    roughness: 0.3,
    emissive: 0x401060,
    emissiveIntensity: 0.3
});
const nucleusMesh = new THREE.Mesh(nucleusGeo, nucleusMat);
cellGroup.add(nucleusMesh);

// Second nucleus (for telophase/cytokinesis)
const nucleus2Mesh = new THREE.Mesh(nucleusGeo.clone(), nucleusMat.clone());
nucleus2Mesh.visible = false;
cellGroup.add(nucleus2Mesh);

// Chromosomes
const chromosomes = [];
const chromoGeo = new THREE.BoxGeometry(0.05, 0.3, 0.05);
const chromoMat = new THREE.MeshStandardMaterial({
    color: 0xff2040,
    emissive: 0x801020,
    emissiveIntensity: 0.5
});

const chromoPositions = [
    { x: -0.1, y: 0.1, z: 0.05 },
    { x: 0.1, y: -0.05, z: -0.08 },
    { x: 0.05, y: 0.08, z: -0.1 },
    { x: -0.08, y: -0.1, z: 0.1 }
];

for (let i = 0; i < 4; i++) {
    const chromo = new THREE.Mesh(chromoGeo.clone(), chromoMat.clone());
    chromo.position.set(chromoPositions[i].x, chromoPositions[i].y, chromoPositions[i].z);
    chromo.rotation.set(Math.random() * 0.5, Math.random() * 0.5, Math.random() * 0.5);
    cellGroup.add(chromo);
    chromosomes.push(chromo);
}

// Daughter cell (for cytokinesis)
const daughterGroup = new THREE.Group();
daughterGroup.position.set(0, 1.5, 2);
daughterGroup.visible = false;
scene.add(daughterGroup);

const daughterCellMesh = new THREE.Mesh(cellGeo.clone(), cellMat.clone());
daughterGroup.add(daughterCellMesh);

const daughterNucleus = new THREE.Mesh(nucleusGeo.clone(), nucleusMat.clone());
daughterGroup.add(daughterNucleus);

const daughterChromosomes = [];
for (let i = 0; i < 2; i++) {
    const chromo = new THREE.Mesh(chromoGeo.clone(), chromoMat.clone());
    chromo.position.set(chromoPositions[i].x, chromoPositions[i].y, chromoPositions[i].z);
    daughterGroup.add(chromo);
    daughterChromosomes.push(chromo);
}

// Spindle fibers (for metaphase/anaphase)
const spindleGroup = new THREE.Group();
spindleGroup.visible = false;
cellGroup.add(spindleGroup);

const spindleMat = new THREE.LineBasicMaterial({ color: 0x40ff80, transparent: true, opacity: 0.4 });
for (let i = 0; i < 8; i++) {
    const points = [
        new THREE.Vector3(0, 1.2, 0),
        new THREE.Vector3((Math.random() - 0.5) * 0.5, 0, (Math.random() - 0.5) * 0.5),
        new THREE.Vector3(0, -1.2, 0)
    ];
    const curve = new THREE.QuadraticBezierCurve3(points[0], points[1], points[2]);
    const spindleGeo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(20));
    const spindleLine = new THREE.Line(spindleGeo, spindleMat);
    spindleGroup.add(spindleLine);
}

// Labels
const labelGroup = new THREE.Group();
labelGroup.visible = false;
scene.add(labelGroup);

function createLabel(text, position, color = 0xffffff) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 256;
    canvas.height = 64;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.roundRect(0, 0, 256, 64, 8);
    ctx.fill();
    ctx.fillStyle = color === 0xffffff ? '#ffffff' : '#' + color.toString(16).padStart(6, '0');
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 128, 32);

    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.copy(position);
    sprite.scale.set(2, 0.5, 1);
    return sprite;
}

const cellLabel = createLabel('Cell Membrane', new THREE.Vector3(0, 3.2, 0), 0x60c0ff);
const nucleusLabel = createLabel('Nucleus', new THREE.Vector3(0, 2.3, 0), 0xc060ff);
const chromoLabel = createLabel('Chromosomes', new THREE.Vector3(0, 1.5, 1.8), 0xff4060);
const platformLabel = createLabel('Diorama Base', new THREE.Vector3(0, 0.8, 5), 0x60ff80);
labelGroup.add(cellLabel, nucleusLabel, chromoLabel, platformLabel);

// Robot placeholder (simple robot shape)
let robotModel = null;
let robotGroup = new THREE.Group();
robotGroup.position.set(-5, 0.3, 4);
robotGroup.scale.set(0.8, 0.8, 0.8);
scene.add(robotGroup);

// Create a simple robot placeholder
function createRobotPlaceholder() {
    const robot = new THREE.Group();

    // Body
    const bodyGeo = new THREE.BoxGeometry(0.8, 1.2, 0.6);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4080c0, metalness: 0.6, roughness: 0.3 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1.0;
    robot.add(body);

    // Head
    const headGeo = new THREE.BoxGeometry(0.6, 0.6, 0.5);
    const headMat = new THREE.MeshStandardMaterial({ color: 0x60a0e0, metalness: 0.6, roughness: 0.3 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 1.9;
    robot.add(head);

    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.08, 16, 16);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x00ff80, emissive: 0x00ff80, emissiveIntensity: 1 });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.15, 1.95, 0.25);
    robot.add(leftEye);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    rightEye.position.set(0.15, 1.95, 0.25);
    robot.add(rightEye);

    // Antenna
    const antennaGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.4, 8);
    const antennaMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0 });
    const antenna = new THREE.Mesh(antennaGeo, antennaMat);
    antenna.position.y = 2.4;
    robot.add(antenna);

    const antennaBall = new THREE.Mesh(
        new THREE.SphereGeometry(0.06, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0xff4040, emissive: 0xff2020, emissiveIntensity: 0.8 })
    );
    antennaBall.position.y = 2.6;
    robot.add(antennaBall);

    // Arms
    const armGeo = new THREE.BoxGeometry(0.15, 0.8, 0.15);
    const armMat = new THREE.MeshStandardMaterial({ color: 0x3070b0, metalness: 0.5 });
    const leftArm = new THREE.Mesh(armGeo, armMat);
    leftArm.position.set(-0.55, 0.9, 0);
    robot.add(leftArm);
    const rightArm = new THREE.Mesh(armGeo, armMat);
    rightArm.position.set(0.55, 0.9, 0);
    robot.add(rightArm);

    // Legs
    const legGeo = new THREE.BoxGeometry(0.2, 0.6, 0.2);
    const leftLeg = new THREE.Mesh(legGeo, armMat);
    leftLeg.position.set(-0.2, 0.1, 0);
    robot.add(leftLeg);
    const rightLeg = new THREE.Mesh(legGeo, armMat);
    rightLeg.position.set(0.2, 0.1, 0);
    robot.add(rightLeg);

    return robot;
}

const robotPlaceholder = createRobotPlaceholder();
robotGroup.add(robotPlaceholder);

// Try loading robot.glb
const gltfLoader = new GLTFLoader();
gltfLoader.load('robot.glb', (gltf) => {
    robotGroup.remove(robotPlaceholder);
    robotModel = gltf.scene;
    robotModel.traverse(child => {
        if (child.isMesh) {
            child.castShadow = true;
        }
    });
    robotGroup.add(robotModel);
    window.__3D_STATE__.robotLoaded = true;
}, undefined, (err) => {
    console.log('Robot GLB not found, using placeholder robot.');
    window.__3D_STATE__.robotLoaded = true; // placeholder counts
});

// Decorative elements
// Lab equipment - microscope
const microscopeGroup = new THREE.Group();
microscopeGroup.position.set(5, 0.15, -3);

const baseGeo = new THREE.CylinderGeometry(0.4, 0.5, 0.15, 16);
const metalMat = new THREE.MeshStandardMaterial({ color: 0x808080, metalness: 0.8, roughness: 0.2 });
microscopeGroup.add(new THREE.Mesh(baseGeo, metalMat));

const tubeGeo = new THREE.CylinderGeometry(0.08, 0.08, 1.5, 8);
const tube = new THREE.Mesh(tubeGeo, metalMat);
tube.position.y = 0.8;
microscopeGroup.add(tube);

const eyepieceGeo = new THREE.CylinderGeometry(0.12, 0.08, 0.3, 8);
const eyepiece = new THREE.Mesh(eyepieceGeo, metalMat);
eyepiece.position.set(0, 1.5, 0.15);
eyepiece.rotation.x = 0.3;
microscopeGroup.add(eyepiece);
scene.add(microscopeGroup);

// Test tubes
for (let i = 0; i < 3; i++) {
    const testTubeGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.6, 8, 1, true);
    const colors = [0x40ff80, 0xff8040, 0x4080ff];
    const testTubeMat = new THREE.MeshPhysicalMaterial({
        color: colors[i],
        transparent: true,
        opacity: 0.6,
        transmission: 0.3
    });
    const testTube = new THREE.Mesh(testTubeGeo, testTubeMat);
    testTube.position.set(4 + i * 0.25, 0.45, 3);
    scene.add(testTube);
}

// Particle system for atmosphere
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3] = (Math.random() - 0.5) * 16;
    particlePositions[i * 3 + 1] = Math.random() * 8 + 0.5;
    particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 16;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({
    color: 0x60c0ff,
    size: 0.03,
    transparent: true,
    opacity: 0.5
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// State management
window.__3D_STATE__ = {
    currentPhase: 0,
    phaseName: 'Interphase',
    cellPosition: { x: 0, y: 1.5, z: 0 },
    cellScaleX: 1,
    nucleusOpacity: 0.7,
    chromosomeCount: 4,
    chromosomeSeparation: 0,
    daughterCellCount: 1,
    animationSpeed: 1.0,
    labelsVisible: false,
    robotLoaded: false,
    robotRotating: false,
    cellHighlighted: false,
    isAnimating: false
};

// Animation system
let currentPhase = 0;
let animating = false;
let animProgress = 0;
let animDirection = 1;
let targetPhase = 0;

// Phase state snapshots for interpolation
function getPhaseState(phase) {
    switch (phase) {
        case 0: // Interphase
            return {
                cellPos: { x: 0, y: 1.5, z: 0 },
                cellScale: { x: 1, y: 1, z: 1 },
                nucleusOpacity: 0.7,
                nucleusScale: 1,
                nucleus2Visible: false,
                nucleus2Pos: { x: 0, y: 0, z: 0.7 },
                nucleus2Opacity: 0,
                chromosomeScaleY: 1,
                chromosomePositions: chromoPositions.map(p => ({ ...p })),
                spindleVisible: false,
                daughterVisible: false,
                daughterPos: { x: 0, y: 1.5, z: 2 },
                cellOpacity: 0.35
            };
        case 1: // Prophase
            return {
                cellPos: { x: 0, y: 1.5, z: 0 },
                cellScale: { x: 1, y: 1, z: 1 },
                nucleusOpacity: 0.3,
                nucleusScale: 0.9,
                nucleus2Visible: false,
                nucleus2Pos: { x: 0, y: 0, z: 0.7 },
                nucleus2Opacity: 0,
                chromosomeScaleY: 1.67,
                chromosomePositions: chromoPositions.map(p => ({ x: p.x * 1.2, y: p.y * 1.2, z: p.z * 1.2 })),
                spindleVisible: false,
                daughterVisible: false,
                daughterPos: { x: 0, y: 1.5, z: 2 },
                cellOpacity: 0.35
            };
        case 2: // Metaphase
            return {
                cellPos: { x: 0, y: 1.5, z: 0 },
                cellScale: { x: 1, y: 1, z: 1 },
                nucleusOpacity: 0,
                nucleusScale: 0.5,
                nucleus2Visible: false,
                nucleus2Pos: { x: 0, y: 0, z: 0.7 },
                nucleus2Opacity: 0,
                chromosomeScaleY: 1.67,
                chromosomePositions: [
                    { x: -0.15, y: 0, z: 0 },
                    { x: -0.05, y: 0, z: 0 },
                    { x: 0.05, y: 0, z: 0 },
                    { x: 0.15, y: 0, z: 0 }
                ],
                spindleVisible: true,
                daughterVisible: false,
                daughterPos: { x: 0, y: 1.5, z: 2 },
                cellOpacity: 0.35
            };
        case 3: // Anaphase
            return {
                cellPos: { x: 0, y: 1.5, z: 0 },
                cellScale: { x: 1.2, y: 1, z: 1.2 },
                nucleusOpacity: 0,
                nucleusScale: 0.3,
                nucleus2Visible: false,
                nucleus2Pos: { x: 0, y: 0, z: 0.7 },
                nucleus2Opacity: 0,
                chromosomeScaleY: 1.67,
                chromosomePositions: [
                    { x: -0.08, y: 0, z: -0.7 },
                    { x: 0.08, y: 0, z: -0.7 },
                    { x: -0.08, y: 0, z: 0.7 },
                    { x: 0.08, y: 0, z: 0.7 }
                ],
                spindleVisible: true,
                daughterVisible: false,
                daughterPos: { x: 0, y: 1.5, z: 2 },
                cellOpacity: 0.35
            };
        case 4: // Telophase
            return {
                cellPos: { x: 0, y: 1.5, z: 0 },
                cellScale: { x: 1.8, y: 0.9, z: 1 },
                nucleusOpacity: 0,
                nucleusScale: 0.4,
                nucleus2Visible: true,
                nucleus2Pos: { x: 0, y: 0, z: 0.7 },
                nucleus2Opacity: 0.5,
                chromosomeScaleY: 1.2,
                chromosomePositions: [
                    { x: -0.05, y: 0, z: -0.7 },
                    { x: 0.05, y: 0, z: -0.7 },
                    { x: -0.05, y: 0, z: 0.7 },
                    { x: 0.05, y: 0, z: 0.7 }
                ],
                spindleVisible: false,
                daughterVisible: false,
                daughterPos: { x: 0, y: 1.5, z: 2 },
                cellOpacity: 0.35,
                nucleusPos: { x: 0, y: 0, z: -0.7 },
                nucleusNewOpacity: 0.5
            };
        case 5: // Cytokinesis
            return {
                cellPos: { x: 0, y: 1.5, z: -2 },
                cellScale: { x: 1, y: 1, z: 1 },
                nucleusOpacity: 0.7,
                nucleusScale: 0.5,
                nucleus2Visible: false,
                nucleus2Pos: { x: 0, y: 0, z: 0 },
                nucleus2Opacity: 0,
                chromosomeScaleY: 1,
                chromosomePositions: [
                    { x: -0.1, y: 0.1, z: 0.05 },
                    { x: 0.1, y: -0.05, z: -0.08 },
                    { x: 0, y: 0, z: 0 },
                    { x: 0, y: 0, z: 0 }
                ],
                spindleVisible: false,
                daughterVisible: true,
                daughterPos: { x: 0, y: 1.5, z: 2 },
                cellOpacity: 0.35,
                nucleusPos: { x: 0, y: 0, z: 0 },
                nucleusNewOpacity: 0.7
            };
    }
}

function lerp(a, b, t) {
    return a + (b - a) * t;
}

function applyState(t, fromPhase, toPhase) {
    const from = getPhaseState(fromPhase);
    const to = getPhaseState(toPhase);

    // Smooth easing
    const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

    // Cell position
    cellGroup.position.x = lerp(from.cellPos.x, to.cellPos.x, ease);
    cellGroup.position.y = lerp(from.cellPos.y, to.cellPos.y, ease);
    cellGroup.position.z = lerp(from.cellPos.z, to.cellPos.z, ease);

    // Cell scale
    cellMesh.scale.x = lerp(from.cellScale.x, to.cellScale.x, ease);
    cellMesh.scale.y = lerp(from.cellScale.y, to.cellScale.y, ease);
    cellMesh.scale.z = lerp(from.cellScale.z, to.cellScale.z, ease);

    // Nucleus
    const nOp = lerp(from.nucleusOpacity, to.nucleusOpacity, ease);
    nucleusMat.opacity = nOp;
    const nScale = lerp(from.nucleusScale, to.nucleusScale, ease);
    nucleusMesh.scale.setScalar(nScale);

    // Nucleus position for telophase
    if (to.nucleusPos) {
        const fromNPos = from.nucleusPos || { x: 0, y: 0, z: 0 };
        nucleusMesh.position.x = lerp(fromNPos.x, to.nucleusPos.x, ease);
        nucleusMesh.position.y = lerp(fromNPos.y, to.nucleusPos.y, ease);
        nucleusMesh.position.z = lerp(fromNPos.z, to.nucleusPos.z, ease);
    } else {
        const fromNPos = from.nucleusPos || { x: 0, y: 0, z: 0 };
        nucleusMesh.position.x = lerp(fromNPos.x, 0, ease);
        nucleusMesh.position.y = lerp(fromNPos.y, 0, ease);
        nucleusMesh.position.z = lerp(fromNPos.z, 0, ease);
    }

    // Second nucleus
    if (to.nucleus2Visible || from.nucleus2Visible) {
        nucleus2Mesh.visible = true;
        const n2Op = lerp(from.nucleus2Opacity, to.nucleus2Opacity, ease);
        nucleus2Mesh.material.opacity = n2Op;
        nucleus2Mesh.position.x = lerp(from.nucleus2Pos.x, to.nucleus2Pos.x, ease);
        nucleus2Mesh.position.y = lerp(from.nucleus2Pos.y, to.nucleus2Pos.y, ease);
        nucleus2Mesh.position.z = lerp(from.nucleus2Pos.z, to.nucleus2Pos.z, ease);
        nucleus2Mesh.scale.setScalar(lerp(from.nucleusScale * 0.8, to.nucleusScale * 0.8, ease));
        if (n2Op <= 0.01) nucleus2Mesh.visible = false;
    } else {
        nucleus2Mesh.visible = false;
    }

    // Chromosomes
    for (let i = 0; i < 4; i++) {
        const fromP = from.chromosomePositions[i];
        const toP = to.chromosomePositions[i];
        chromosomes[i].position.x = lerp(fromP.x, toP.x, ease);
        chromosomes[i].position.y = lerp(fromP.y, toP.y, ease);
        chromosomes[i].position.z = lerp(fromP.z, toP.z, ease);
        chromosomes[i].scale.y = lerp(from.chromosomeScaleY, to.chromosomeScaleY, ease);
    }

    // In cytokinesis, hide chromosomes 2 and 3 from main cell
    if (toPhase === 5) {
        chromosomes[2].visible = ease < 0.5;
        chromosomes[3].visible = ease < 0.5;
    } else {
        chromosomes[2].visible = true;
        chromosomes[3].visible = true;
    }

    // Spindle fibers
    spindleGroup.visible = to.spindleVisible || from.spindleVisible;
    if (spindleGroup.visible) {
        const sOp = to.spindleVisible ? ease : (1 - ease);
        spindleMat.opacity = sOp * 0.4;
    }

    // Daughter cell
    if (to.daughterVisible) {
        daughterGroup.visible = true;
        daughterGroup.position.set(
            lerp(from.cellPos.x, to.daughterPos.x, ease),
            lerp(from.cellPos.y, to.daughterPos.y, ease),
            lerp(0, to.daughterPos.z, ease)
        );
        const dScale = ease;
        daughterCellMesh.material.opacity = lerp(0, 0.35, ease);
        daughterNucleus.material.opacity = lerp(0, 0.7, ease);
    } else if (from.daughterVisible) {
        daughterGroup.visible = true;
        const dScale = 1 - ease;
        daughterCellMesh.material.opacity = lerp(0.35, 0, ease);
        daughterNucleus.material.opacity = lerp(0.7, 0, ease);
        if (ease > 0.95) daughterGroup.visible = false;
    } else {
        daughterGroup.visible = false;
    }

    // Update state
    const state = window.__3D_STATE__;
    state.cellPosition = {
        x: cellGroup.position.x,
        y: cellGroup.position.y,
        z: cellGroup.position.z
    };
    state.cellScaleX = cellMesh.scale.x;
    state.nucleusOpacity = nucleusMat.opacity;

    // Chromosome separation
    if (toPhase >= 3 && toPhase <= 4) {
        const sep = Math.abs(chromosomes[0].position.z - chromosomes[2].position.z);
        state.chromosomeSeparation = parseFloat(sep.toFixed(3));
    } else {
        state.chromosomeSeparation = 0;
    }

    state.daughterCellCount = (toPhase === 5 && ease > 0.5) ? 2 : 1;
    state.chromosomeCount = 4;
}

function setPhaseImmediate(phase) {
    const s = getPhaseState(phase);

    cellGroup.position.set(s.cellPos.x, s.cellPos.y, s.cellPos.z);
    cellMesh.scale.set(s.cellScale.x, s.cellScale.y, s.cellScale.z);
    nucleusMat.opacity = s.nucleusOpacity;
    nucleusMesh.scale.setScalar(s.nucleusScale);

    if (s.nucleusPos) {
        nucleusMesh.position.set(s.nucleusPos.x, s.nucleusPos.y, s.nucleusPos.z);
    } else {
        nucleusMesh.position.set(0, 0, 0);
    }

    nucleus2Mesh.visible = s.nucleus2Visible;
    nucleus2Mesh.material.opacity = s.nucleus2Opacity;
    nucleus2Mesh.position.set(s.nucleus2Pos.x, s.nucleus2Pos.y, s.nucleus2Pos.z);

    for (let i = 0; i < 4; i++) {
        chromosomes[i].position.set(s.chromosomePositions[i].x, s.chromosomePositions[i].y, s.chromosomePositions[i].z);
        chromosomes[i].scale.y = s.chromosomeScaleY;
        chromosomes[i].visible = !(phase === 5 && i >= 2);
    }

    spindleGroup.visible = s.spindleVisible;
    daughterGroup.visible = s.daughterVisible;
    if (s.daughterVisible) {
        daughterGroup.position.set(s.daughterPos.x, s.daughterPos.y, s.daughterPos.z);
        daughterCellMesh.material.opacity = 0.35;
        daughterNucleus.material.opacity = 0.7;
    }

    updateUI(phase);
    updateState(phase);
}

function updateUI(phase) {
    document.getElementById('phase-title').textContent = phases[phase].name;
    document.getElementById('phase-desc').textContent = phases[phase].desc;
    document.getElementById('phase-num').textContent = phase + 1;
    document.getElementById('robot-text').textContent = robotSpeech[phase];

    const dots = document.querySelectorAll('.progress-dot');
    dots.forEach((dot, i) => {
        dot.classList.remove('active', 'completed');
        if (i === phase) dot.classList.add('active');
        else if (i < phase) dot.classList.add('completed');
    });

    // Show robot speech
    const speechBubble = document.getElementById('robot-speech');
    speechBubble.style.display = 'block';
}

function updateState(phase) {
    const state = window.__3D_STATE__;
    state.currentPhase = phase;
    state.phaseName = phases[phase].name;
    state.cellPosition = {
        x: parseFloat(cellGroup.position.x.toFixed(3)),
        y: parseFloat(cellGroup.position.y.toFixed(3)),
        z: parseFloat(cellGroup.position.z.toFixed(3))
    };
    state.cellScaleX = parseFloat(cellMesh.scale.x.toFixed(3));
    state.nucleusOpacity = parseFloat(nucleusMat.opacity.toFixed(3));
    state.chromosomeCount = 4;
    state.daughterCellCount = phase === 5 ? 2 : 1;

    if (phase >= 3 && phase <= 4) {
        state.chromosomeSeparation = parseFloat(Math.abs(chromosomes[0].position.z - chromosomes[2].position.z).toFixed(3));
    } else {
        state.chromosomeSeparation = 0;
    }
}

// Animation transition
let transitionFrom = 0;
let transitionTo = 0;
let transitionProgress = 0;
let transitionActive = false;

function startTransition(from, to) {
    if (animating) return;
    animating = true;
    transitionFrom = from;
    transitionTo = to;
    transitionProgress = 0;
    transitionActive = true;
    window.__3D_STATE__.isAnimating = true;
    updateUI(to);
}

// Button handlers
document.getElementById('btn-next').addEventListener('click', () => {
    if (animating) return;
    if (currentPhase < 5) {
        const from = currentPhase;
        currentPhase++;
        startTransition(from, currentPhase);
    }
});

document.getElementById('btn-prev').addEventListener('click', () => {
    if (animating) return;
    if (currentPhase > 0) {
        const from = currentPhase;
        currentPhase--;
        startTransition(from, currentPhase);
    }
});

document.getElementById('btn-reset').addEventListener('click', () => {
    if (animating) return;
    currentPhase = 0;
    setPhaseImmediate(0);
    transitionActive = false;
});

document.getElementById('btn-labels').addEventListener('click', () => {
    labelGroup.visible = !labelGroup.visible;
    window.__3D_STATE__.labelsVisible = labelGroup.visible;
});

document.getElementById('slider-speed').addEventListener('input', (e) => {
    const val = parseFloat(e.target.value);
    window.__3D_STATE__.animationSpeed = val;
    document.getElementById('speed-val').textContent = val.toFixed(1) + 'x';
});

// Keyboard R for robot spin
let robotSpinProgress = -1;
document.addEventListener('keydown', (e) => {
    if (e.key === 'r' || e.key === 'R') {
        if (!window.__3D_STATE__.robotRotating) {
            robotSpinProgress = 0;
            window.__3D_STATE__.robotRotating = true;
        }
    }
});

// Click on cell
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let highlightTimeout = null;

renderer.domElement.addEventListener('click', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects([cellMesh, ...chromosomes, nucleusMesh], false);

    if (intersects.length > 0) {
        // Highlight cell
        window.__3D_STATE__.cellHighlighted = true;
        cellMat.emissive = new THREE.Color(0x204080);
        cellMat.emissiveIntensity = 0.5;

        // Show info popup
        const popup = document.getElementById('cell-info-popup');
        const content = document.getElementById('cell-info-content');
        content.innerHTML = `
            <strong>Phase:</strong> ${phases[currentPhase].name}<br>
            <strong>Position:</strong> (${cellGroup.position.x.toFixed(1)}, ${cellGroup.position.y.toFixed(1)}, ${cellGroup.position.z.toFixed(1)})<br>
            <strong>Scale X:</strong> ${cellMesh.scale.x.toFixed(2)}<br>
            <strong>Nucleus Opacity:</strong> ${nucleusMat.opacity.toFixed(2)}<br>
            <strong>Chromosomes:</strong> ${window.__3D_STATE__.chromosomeCount}<br>
            <strong>Daughter Cells:</strong> ${window.__3D_STATE__.daughterCellCount}
        `;
        popup.style.display = 'block';

        if (highlightTimeout) clearTimeout(highlightTimeout);
        highlightTimeout = setTimeout(() => {
            cellMat.emissive = new THREE.Color(0x000000);
            cellMat.emissiveIntensity = 0;
            window.__3D_STATE__.cellHighlighted = false;
            popup.style.display = 'none';
        }, 3000);
    }
});

// Also check daughter cell clicks
renderer.domElement.addEventListener('click', (e) => {
    if (!daughterGroup.visible) return;
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects([daughterCellMesh], false);
    if (intersects.length > 0) {
        daughterCellMesh.material.emissive = new THREE.Color(0x204080);
        daughterCellMesh.material.emissiveIntensity = 0.5;
        setTimeout(() => {
            daughterCellMesh.material.emissive = new THREE.Color(0x000000);
            daughterCellMesh.material.emissiveIntensity = 0;
        }, 2000);
    }
});

// Window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize
setPhaseImmediate(0);
document.getElementById('robot-speech').style.display = 'block';

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const speed = window.__3D_STATE__.animationSpeed;
    const time = clock.getElapsedTime();

    // Transition animation
    if (transitionActive && animating) {
        transitionProgress += delta * speed / 1.5; // 1.5 second base duration
        if (transitionProgress >= 1) {
            transitionProgress = 1;
            animating = false;
            transitionActive = false;
            window.__3D_STATE__.isAnimating = false;
            setPhaseImmediate(transitionTo);
        } else {
            applyState(transitionProgress, transitionFrom, transitionTo);
        }
    }

    // Robot spin animation
    if (robotSpinProgress >= 0) {
        robotSpinProgress += delta * speed;
        const spinT = Math.min(robotSpinProgress, 1);
        robotGroup.rotation.y = spinT * Math.PI * 2;
        if (spinT >= 1) {
            robotSpinProgress = -1;
            robotGroup.rotation.y = 0;
            window.__3D_STATE__.robotRotating = false;
        }
    }

    // Idle animations
    // Cell gentle pulse
    if (!animating) {
        const pulse = 1 + Math.sin(time * 2) * 0.02;
        const currentState = getPhaseState(currentPhase);
        cellMesh.scale.x = currentState.cellScale.x * pulse;
        cellMesh.scale.y = currentState.cellScale.y * pulse;
        cellMesh.scale.z = currentState.cellScale.z * pulse;
    }

    // Chromosome gentle rotation
    chromosomes.forEach((c, i) => {
        c.rotation.y = time * 0.5 + i * Math.PI / 4;
        c.rotation.z = Math.sin(time * 0.3 + i) * 0.2;
    });

    // Robot idle bob
    if (robotSpinProgress < 0) {
        robotGroup.position.y = 0.3 + Math.sin(time * 1.5) * 0.05;
    }

    // Particles float
    const positions = particles.geometry.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
        positions[i * 3 + 1] += Math.sin(time + i) * 0.001;
        if (positions[i * 3 + 1] > 8) positions[i * 3 + 1] = 0.5;
    }
    particles.geometry.attributes.position.needsUpdate = true;

    // Label positions follow objects
    if (labelGroup.visible) {
        cellLabel.position.set(cellGroup.position.x, cellGroup.position.y + 1.8, cellGroup.position.z);
        nucleusLabel.position.set(cellGroup.position.x, cellGroup.position.y + 0.8, cellGroup.position.z);
        chromoLabel.position.set(cellGroup.position.x, cellGroup.position.y, cellGroup.position.z + 1.8);
    }

    // Point light animation
    pointLight1.position.x = Math.sin(time * 0.5) * 5;
    pointLight1.position.z = Math.cos(time * 0.5) * 5;

    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>
