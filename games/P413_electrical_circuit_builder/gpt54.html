<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Circuit Builder with Fox Mascot</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #sidebar {
      position: absolute;
      left: 0;
      top: 0;
      width: 200px;
      height: 100%;
      background: rgba(20, 20, 20, 0.95);
      border-right: 1px solid #333;
      box-sizing: border-box;
      padding: 12px;
      z-index: 10;
    }

    #sidebar h2 {
      font-size: 18px;
      margin: 0 0 12px;
    }

    .tool-btn {
      width: 100%;
      margin: 6px 0;
      padding: 10px;
      border: 1px solid #555;
      background: #222;
      color: #fff;
      cursor: pointer;
      border-radius: 6px;
      text-align: left;
    }

    .tool-btn:hover {
      background: #333;
    }

    .tool-btn.active {
      background: #2f6fed;
      border-color: #6da0ff;
    }

    #hud-info {
      margin-top: 14px;
      padding: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid #444;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-line;
    }

    #instructions {
      margin-top: 12px;
      font-size: 12px;
      color: #ccc;
      line-height: 1.4;
    }

    #canvas-wrap {
      position: absolute;
      left: 200px;
      top: 0;
      right: 0;
      bottom: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <h2>Circuit Palette</h2>
      <button class="tool-btn" id="btn-battery">Battery</button>
      <button class="tool-btn" id="btn-resistor">Resistor</button>
      <button class="tool-btn" id="btn-led">LED</button>
      <button class="tool-btn" id="btn-wire">Wire</button>
      <button class="tool-btn" id="btn-switch">Switch</button>
      <button class="tool-btn" id="btn-simulate">Simulate</button>
      <button class="tool-btn" id="btn-clear">Clear Circuit</button>

      <div id="hud-info"></div>

      <div id="instructions">
        <b>Controls</b><br/>
        • Select a component, then click workbench to place<br/>
        • Right-click component to remove<br/>
        • Click switch to toggle open/closed<br/>
        • Press <b>S</b> to simulate<br/>
        • Press <b>C</b> to clear<br/>
        • Orbit with mouse
      </div>
    </div>
    <div id="canvas-wrap"></div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const canvasWrap = document.getElementById('canvas-wrap');
    const hudInfo = document.getElementById('hud-info');

    const buttons = {
      battery: document.getElementById('btn-battery'),
      resistor: document.getElementById('btn-resistor'),
      led: document.getElementById('btn-led'),
      wire: document.getElementById('btn-wire'),
      switch: document.getElementById('btn-switch'),
      simulate: document.getElementById('btn-simulate'),
      clear: document.getElementById('btn-clear'),
    };

    window.__3D_STATE__ = {
      selectedComponent: 'none',
      placedComponents: [],
      componentCount: 0,
      circuitComplete: false,
      switchClosed: false,
      totalVoltage: 0,
      totalResistance: 0,
      totalCurrent: 0,
      ledGlowing: false,
      foxAnimationState: 'idle',
      simulationRun: false,
      circuitCleared: false
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    const camera = new THREE.PerspectiveCamera(
      60,
      canvasWrap.clientWidth / canvasWrap.clientHeight,
      0.1,
      1000
    );
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(canvasWrap.clientWidth, canvasWrap.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    canvasWrap.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.5, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const workbench = new THREE.Mesh(
      new THREE.BoxGeometry(20, 0.2, 14),
      new THREE.MeshStandardMaterial({ color: 0x2d5016 })
    );
    workbench.position.set(0, 0, 0);
    workbench.receiveShadow = true;
    workbench.userData.isWorkbench = true;
    scene.add(workbench);

    function createWorkbenchGrid() {
      const points = [];
      const width = 20;
      const depth = 14;
      const y = 0.101;

      for (let x = -width / 2; x <= width / 2; x += 1) {
        points.push(new THREE.Vector3(x, y, -depth / 2));
        points.push(new THREE.Vector3(x, y, depth / 2));
      }

      for (let z = -depth / 2; z <= depth / 2; z += 1) {
        points.push(new THREE.Vector3(-width / 2, y, z));
        points.push(new THREE.Vector3(width / 2, y, z));
      }

      const geom = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({ color: 0x88aa88, transparent: true, opacity: 0.45 });
      const lines = new THREE.LineSegments(geom, mat);
      scene.add(lines);
    }
    createWorkbenchGrid();

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const componentGroup = new THREE.Group();
    scene.add(componentGroup);

    const placedObjects = [];

    let fox = null;
    let foxMixer = null;
    let foxActions = [];
    let foxIdleAction = null;
    let foxActiveAction = null;
    let foxBasePos = new THREE.Vector3(-8, 0.1, -5);

    const loader = new GLTFLoader();
    loader.load(
      'Fox.glb',
      (gltf) => {
        fox = gltf.scene;
        fox.scale.setScalar(0.03);
        fox.position.copy(foxBasePos);
        scene.add(fox);

        if (gltf.animations && gltf.animations.length) {
          foxMixer = new THREE.AnimationMixer(fox);
          foxActions = gltf.animations.map(clip => foxMixer.clipAction(clip));

          foxIdleAction = foxActions[0] || null;
          foxActiveAction = foxActions[1] || foxActions[2] || foxActions[0] || null;

          if (foxIdleAction) {
            foxIdleAction.reset().play();
          }
        }
      },
      undefined,
      (err) => {
        console.warn('Could not load Fox.glb', err);
      }
    );

    function setFoxState(active) {
      window.__3D_STATE__.foxAnimationState = active ? 'active' : 'idle';

      if (!foxMixer) return;

      if (active) {
        if (foxIdleAction && foxActiveAction && foxIdleAction !== foxActiveAction) {
          foxIdleAction.fadeOut(0.3);
          foxActiveAction.reset().fadeIn(0.3).play();
        } else if (foxActiveAction) {
          foxActiveAction.reset().play();
        }
      } else {
        if (foxActiveAction && foxIdleAction && foxIdleAction !== foxActiveAction) {
          foxActiveAction.fadeOut(0.3);
          foxIdleAction.reset().fadeIn(0.3).play();
        } else if (foxIdleAction) {
          foxIdleAction.reset().play();
        }
      }
    }

    function createBattery() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(1, 0.5, 0.5),
        new THREE.MeshStandardMaterial({ color: 0xffdd33 })
      );
      body.position.y = 0.25;
      group.add(body);

      const redTerm = new THREE.Mesh(
        new THREE.CylinderGeometry(0.06, 0.06, 0.08, 16),
        new THREE.MeshStandardMaterial({ color: 0xff0000 })
      );
      redTerm.rotation.z = Math.PI / 2;
      redTerm.position.set(0.55, 0.35, 0.12);
      group.add(redTerm);

      const blackTerm = new THREE.Mesh(
        new THREE.CylinderGeometry(0.06, 0.06, 0.08, 16),
        new THREE.MeshStandardMaterial({ color: 0x111111 })
      );
      blackTerm.rotation.z = Math.PI / 2;
      blackTerm.position.set(0.55, 0.35, -0.12);
      group.add(blackTerm);

      return group;
    }

    function createResistor() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.15, 0.8, 24),
        new THREE.MeshStandardMaterial({ color: 0x8b5a2b })
      );
      body.rotation.z = Math.PI / 2;
      body.position.y = 0.25;
      group.add(body);

      const bandColors = [0xff0000, 0xffff00, 0x000000];
      [-0.18, 0, 0.18].forEach((x, i) => {
        const band = new THREE.Mesh(
          new THREE.CylinderGeometry(0.152, 0.152, 0.05, 24),
          new THREE.MeshStandardMaterial({ color: bandColors[i] })
        );
        band.rotation.z = Math.PI / 2;
        band.position.set(x, 0.25, 0);
        group.add(band);
      });

      return group;
    }

    function createLED() {
      const group = new THREE.Group();

      const mat = new THREE.MeshStandardMaterial({
        color: 0x777777,
        emissive: 0x000000,
        emissiveIntensity: 0
      });

      const body = new THREE.Mesh(
        new THREE.ConeGeometry(0.15, 0.5, 20),
        mat
      );
      body.position.y = 0.35;
      group.add(body);

      const base = new THREE.Mesh(
        new THREE.CylinderGeometry(0.12, 0.12, 0.08, 16),
        new THREE.MeshStandardMaterial({ color: 0xaaaaaa })
      );
      base.position.y = 0.12;
      group.add(base);

      group.userData.ledMaterial = mat;
      return group;
    }

    function createWire() {
      const group = new THREE.Group();

      const wire = new THREE.Mesh(
        new THREE.CylinderGeometry(0.06, 0.06, 0.9, 16),
        new THREE.MeshStandardMaterial({ color: 0x3366ff })
      );
      wire.rotation.z = Math.PI / 2;
      wire.position.y = 0.15;
      group.add(wire);

      return group;
    }

    function createSwitch() {
      const group = new THREE.Group();

      const base = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 0.25, 0.5),
        new THREE.MeshStandardMaterial({ color: 0x666666 })
      );
      base.position.y = 0.15;
      group.add(base);

      const lever = new THREE.Mesh(
        new THREE.BoxGeometry(0.08, 0.35, 0.08),
        new THREE.MeshStandardMaterial({ color: 0xdddddd })
      );
      lever.position.set(0, 0.42, 0);
      lever.rotation.z = -0.6;
      group.add(lever);

      group.userData.switchLever = lever;
      return group;
    }

    function createComponent(type) {
      switch (type) {
        case 'battery': return createBattery();
        case 'resistor': return createResistor();
        case 'led': return createLED();
        case 'wire': return createWire();
        case 'switch': return createSwitch();
        default: return null;
      }
    }

    function updateHUD() {
      const s = window.__3D_STATE__;
      hudInfo.textContent =
`Selected: ${s.selectedComponent}
Total Voltage: ${s.totalVoltage.toFixed(2)} V
Total Current: ${s.totalCurrent.toFixed(2)} A
Circuit Status: ${s.circuitComplete ? 'Complete' : 'Incomplete'}
Resistance: ${s.totalResistance.toFixed(2)} Ω
Switch: ${s.switchClosed ? 'Closed' : 'Open'}
LED: ${s.ledGlowing ? 'Glowing' : 'Off'}
Components: ${s.componentCount}/20
Fox: ${s.foxAnimationState}`;
    }

    function setSelectedComponent(type) {
      window.__3D_STATE__.selectedComponent = type;
      Object.entries(buttons).forEach(([key, btn]) => {
        if (!btn || key === 'simulate' || key === 'clear') return;
        btn.classList.toggle('active', key === type);
      });
      updateHUD();
    }

    function addPlacedState(type, gridX, gridZ, obj) {
      const entry = { type, gridX, gridZ };
      window.__3D_STATE__.placedComponents.push(entry);
      window.__3D_STATE__.componentCount = window.__3D_STATE__.placedComponents.length;
      placedObjects.push({ mesh: obj, ...entry });
      updateDerivedState();
      updateHUD();
    }

    function updateDerivedState() {
      const comps = window.__3D_STATE__.placedComponents;
      const batteryCount = comps.filter(c => c.type === 'battery').length;
      const resistorCount = comps.filter(c => c.type === 'resistor').length;

      window.__3D_STATE__.totalVoltage = batteryCount > 0 ? 9 : 0;
      window.__3D_STATE__.totalResistance = Math.max(0, resistorCount * 100);
      if (window.__3D_STATE__.totalVoltage < 0) window.__3D_STATE__.totalVoltage = 0;
      if (window.__3D_STATE__.totalResistance < 0) window.__3D_STATE__.totalResistance = 0;
    }

    function snapToGrid(value) {
      return Math.round(value);
    }

    function withinWorkbench(x, z) {
      return x >= -10 && x <= 10 && z >= -7 && z <= 7;
    }

    function placeComponentAt(type, x, z) {
      if (!type || type === 'none') return;
      if (window.__3D_STATE__.componentCount >= 20) return;
      if (!withinWorkbench(x, z)) return;

      const gx = snapToGrid(x);
      const gz = snapToGrid(z);

      const obj = createComponent(type);
      if (!obj) return;

      obj.position.set(gx, 0.11, gz);
      obj.userData.type = type;
      obj.userData.gridX = gx;
      obj.userData.gridZ = gz;

      if (type === 'switch') {
        obj.userData.closed = window.__3D_STATE__.switchClosed;
      }

      componentGroup.add(obj);
      addPlacedState(type, gx, gz, obj);
    }

    function removeComponent(obj) {
      const idx = placedObjects.findIndex(o => o.mesh === obj);
      if (idx === -1) return;

      const removed = placedObjects[idx];
      placedObjects.splice(idx, 1);
      componentGroup.remove(obj);

      const stateIdx = window.__3D_STATE__.placedComponents.findIndex(c =>
        c.type === removed.type && c.gridX === removed.gridX && c.gridZ === removed.gridZ
      );
      if (stateIdx !== -1) {
        window.__3D_STATE__.placedComponents.splice(stateIdx, 1);
      }

      window.__3D_STATE__.componentCount = window.__3D_STATE__.placedComponents.length;
      updateDerivedState();
      updateLEDGlow(false);
      window.__3D_STATE__.circuitComplete = false;
      window.__3D_STATE__.totalCurrent = 0;
      window.__3D_STATE__.simulationRun = false;
      setFoxState(false);
      updateHUD();
    }

    function updateLEDGlow(on) {
      window.__3D_STATE__.ledGlowing = !!on;
      for (const item of placedObjects) {
        if (item.type === 'led') {
          const mat = item.mesh.userData.ledMaterial;
          if (mat) {
            if (on) {
              mat.color.setHex(0x55ff55);
              mat.emissive.setHex(0x00ff00);
              mat.emissiveIntensity = 1.5;
            } else {
              mat.color.setHex(0x777777);
              mat.emissive.setHex(0x000000);
              mat.emissiveIntensity = 0;
            }
          }
        }
      }
    }

    function toggleSwitch(obj) {
      obj.userData.closed = !obj.userData.closed;
      window.__3D_STATE__.switchClosed = !!obj.userData.closed;

      const lever = obj.userData.switchLever;
      if (lever) {
        lever.rotation.z = obj.userData.closed ? 0.6 : -0.6;
      }
      updateHUD();
    }

    function areAdjacentChain(a, b) {
      const dx = a.gridX - b.gridX;
      const dz = a.gridZ - b.gridZ;
      const dist = Math.sqrt(dx * dx + dz * dz);
      return dist <= 2;
    }

    function simulateCircuit() {
      window.__3D_STATE__.simulationRun = true;
      window.__3D_STATE__.circuitCleared = false;

      updateDerivedState();

      const comps = placedObjects;
      const battery = comps.find(c => c.type === 'battery');
      const led = comps.find(c => c.type === 'led');
      const resistor = comps.find(c => c.type === 'resistor');
      const sw = comps.find(c => c.type === 'switch');

      let complete = false;
      let current = 0;

      if (battery && led && resistor && sw) {
        const switchClosed = !!sw.mesh.userData.closed;
        window.__3D_STATE__.switchClosed = switchClosed;

        const chain1 = areAdjacentChain(battery, resistor);
        const chain2 = areAdjacentChain(resistor, sw);
        const chain3 = areAdjacentChain(sw, led);

        if (chain1 && chain2 && chain3 && switchClosed) {
          const V = Math.max(0, window.__3D_STATE__.totalVoltage);
          const R = Math.max(0, window.__3D_STATE__.totalResistance || 100);
          current = R > 0 ? V / R : 0;
          current = Math.max(0, current);
          complete = current > 0;
        }
      }

      window.__3D_STATE__.circuitComplete = complete;
      window.__3D_STATE__.totalCurrent = complete ? current : 0;

      updateLEDGlow(complete);
      setFoxState(complete);
      updateHUD();
    }

    function clearCircuit() {
      while (componentGroup.children.length > 0) {
        componentGroup.remove(componentGroup.children[0]);
      }
      placedObjects.length = 0;

      window.__3D_STATE__.placedComponents = [];
      window.__3D_STATE__.componentCount = 0;
      window.__3D_STATE__.circuitComplete = false;
      window.__3D_STATE__.switchClosed = false;
      window.__3D_STATE__.totalVoltage = 0;
      window.__3D_STATE__.totalResistance = 0;
      window.__3D_STATE__.totalCurrent = 0;
      window.__3D_STATE__.ledGlowing = false;
      window.__3D_STATE__.simulationRun = false;
      window.__3D_STATE__.circuitCleared = true;

      setFoxState(false);
      if (fox) fox.position.copy(foxBasePos);
      updateHUD();
    }

    function getIntersections(event, objects) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      return raycaster.intersectObjects(objects, true);
    }

    function getTopPlacedObject(intersectionObject) {
      let current = intersectionObject;
      while (current && current.parent) {
        if (current.parent === componentGroup) return current;
        current = current.parent;
      }
      return null;
    }

    renderer.domElement.addEventListener('click', (event) => {
      const componentHits = getIntersections(event, componentGroup.children);
      if (componentHits.length > 0) {
        const topObj = getTopPlacedObject(componentHits[0].object);
        if (topObj && topObj.userData.type === 'switch') {
          toggleSwitch(topObj);
          return;
        }
      }

      const benchHits = getIntersections(event, [workbench]);
      if (benchHits.length > 0) {
        const p = benchHits[0].point;
        placeComponentAt(window.__3D_STATE__.selectedComponent, p.x, p.z);
      }
    });

    renderer.domElement.addEventListener('contextmenu', (event) => {
      event.preventDefault();
      const hits = getIntersections(event, componentGroup.children);
      if (hits.length > 0) {
        const topObj = getTopPlacedObject(hits[0].object);
        if (topObj) removeComponent(topObj);
      }
    });

    buttons.battery.addEventListener('click', () => setSelectedComponent('battery'));
    buttons.resistor.addEventListener('click', () => setSelectedComponent('resistor'));
    buttons.led.addEventListener('click', () => setSelectedComponent('led'));
    buttons.wire.addEventListener('click', () => setSelectedComponent('wire'));
    buttons.switch.addEventListener('click', () => setSelectedComponent('switch'));
    buttons.simulate.addEventListener('click', simulateCircuit);
    buttons.clear.addEventListener('click', clearCircuit);

    window.addEventListener('keydown', (e) => {
      if (e.key === 's' || e.key === 'S') simulateCircuit();
      if (e.key === 'c' || e.key === 'C') clearCircuit();
    });

    window.addEventListener('resize', () => {
      camera.aspect = canvasWrap.clientWidth / canvasWrap.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(canvasWrap.clientWidth, canvasWrap.clientHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();
      controls.update();

      if (foxMixer) foxMixer.update(dt);

      if (fox && window.__3D_STATE__.foxAnimationState === 'active') {
        const t = performance.now() * 0.003;
        fox.position.x = foxBasePos.x + Math.sin(t) * 0.25;
        fox.position.y = foxBasePos.y + Math.abs(Math.sin(t * 1.5)) * 0.12;
      } else if (fox) {
        fox.position.lerp(foxBasePos, 0.1);
      }

      renderer.render(scene, camera);
    }

    setSelectedComponent('none');
    updateHUD();
    animate();
  </script>
</body>
</html>
