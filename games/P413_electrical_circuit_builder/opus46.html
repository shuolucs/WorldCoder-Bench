<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Circuit Builder with Fox Mascot</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
#canvas-container { position: absolute; top: 0; left: 200px; right: 0; bottom: 0; }
canvas { display: block; width: 100%; height: 100%; }

#sidebar {
    position: absolute; top: 0; left: 0; width: 200px; height: 100vh;
    background: linear-gradient(180deg, #16213e 0%, #0f3460 100%);
    padding: 15px; z-index: 10; overflow-y: auto;
    border-right: 2px solid #e94560;
}
#sidebar h2 {
    color: #e94560; font-size: 16px; margin-bottom: 10px;
    text-align: center; text-transform: uppercase; letter-spacing: 2px;
    border-bottom: 1px solid #e94560; padding-bottom: 8px;
}
#sidebar h3 {
    color: #a8d8ea; font-size: 12px; margin: 12px 0 6px;
    text-transform: uppercase; letter-spacing: 1px;
}
.component-btn {
    display: block; width: 100%; padding: 10px 12px; margin: 4px 0;
    background: #1a1a3e; color: #e0e0e0; border: 1px solid #533483;
    border-radius: 6px; cursor: pointer; font-size: 13px;
    transition: all 0.2s; text-align: left;
}
.component-btn:hover { background: #533483; color: #fff; transform: translateX(3px); }
.component-btn.selected { background: #e94560; color: #fff; border-color: #e94560; box-shadow: 0 0 10px rgba(233,69,96,0.5); }
.component-btn .icon { margin-right: 6px; }

.action-btn {
    display: block; width: 100%; padding: 10px 12px; margin: 4px 0;
    border: none; border-radius: 6px; cursor: pointer; font-size: 13px;
    font-weight: bold; transition: all 0.2s; text-transform: uppercase;
    letter-spacing: 1px;
}
#btn-simulate { background: #00b894; color: #fff; }
#btn-simulate:hover { background: #00cec9; box-shadow: 0 0 15px rgba(0,184,148,0.5); }
#btn-clear { background: #d63031; color: #fff; }
#btn-clear:hover { background: #e17055; box-shadow: 0 0 15px rgba(214,48,49,0.5); }

#hud-info {
    margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.4);
    border-radius: 8px; border: 1px solid #533483;
}
#hud-info .hud-row {
    display: flex; justify-content: space-between; padding: 3px 0;
    font-size: 11px; color: #a8d8ea; border-bottom: 1px solid rgba(83,52,131,0.3);
}
#hud-info .hud-row:last-child { border-bottom: none; }
#hud-info .hud-label { color: #888; }
#hud-info .hud-value { color: #e0e0e0; font-weight: bold; }
.status-complete { color: #00b894 !important; }
.status-incomplete { color: #e94560 !important; }

#tooltip {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.8); color: #fff; padding: 8px 16px;
    border-radius: 20px; font-size: 13px; pointer-events: none;
    transition: opacity 0.3s; z-index: 20;
}
</style>
</head>
<body>

<div id="sidebar">
    <h2>⚡ Circuit Builder</h2>
    <h3>Components</h3>
    <button class="component-btn" id="btn-battery"><span class="icon">🔋</span>Battery (9V)</button>
    <button class="component-btn" id="btn-resistor"><span class="icon">⚡</span>Resistor (100Ω)</button>
    <button class="component-btn" id="btn-led"><span class="icon">💡</span>LED</button>
    <button class="component-btn" id="btn-wire"><span class="icon">〰️</span>Wire</button>
    <button class="component-btn" id="btn-switch"><span class="icon">🔘</span>Switch</button>
    <h3>Actions</h3>
    <button class="action-btn" id="btn-simulate">▶ Simulate (S)</button>
    <button class="action-btn" id="btn-clear">✕ Clear Circuit (C)</button>
    <div id="hud-info">
        <div class="hud-row"><span class="hud-label">Selected:</span><span class="hud-value" id="hud-selected">None</span></div>
        <div class="hud-row"><span class="hud-label">Components:</span><span class="hud-value" id="hud-count">0</span></div>
        <div class="hud-row"><span class="hud-label">Voltage:</span><span class="hud-value" id="hud-voltage">0 V</span></div>
        <div class="hud-row"><span class="hud-label">Resistance:</span><span class="hud-value" id="hud-resistance">0 Ω</span></div>
        <div class="hud-row"><span class="hud-label">Current:</span><span class="hud-value" id="hud-current">0 A</span></div>
        <div class="hud-row"><span class="hud-label">Status:</span><span class="hud-value" id="hud-status">No Circuit</span></div>
        <div class="hud-row"><span class="hud-label">Fox:</span><span class="hud-value" id="hud-fox">Idle</span></div>
    </div>
</div>

<div id="canvas-container"></div>
<div id="tooltip">Click a component, then click on the workbench to place it</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    selectedComponent: 'none',
    placedComponents: [],
    componentCount: 0,
    circuitComplete: false,
    switchClosed: false,
    totalVoltage: 0,
    totalResistance: 0,
    totalCurrent: 0,
    ledGlowing: false,
    foxAnimationState: 'idle',
    simulationRun: false,
    circuitCleared: false
};
const state = window.__3D_STATE__;

// Scene setup
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 20, 40);

const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 100);
camera.position.set(0, 8, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minDistance = 5;
controls.maxDistance = 25;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// Extra fill light
const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
fillLight.position.set(-5, 5, -5);
scene.add(fillLight);

// Workbench
const benchGeom = new THREE.BoxGeometry(20, 0.2, 14);
const benchMat = new THREE.MeshStandardMaterial({ color: 0x2d5016, roughness: 0.8, metalness: 0.1 });
const workbench = new THREE.Mesh(benchGeom, benchMat);
workbench.position.y = 0;
workbench.receiveShadow = true;
scene.add(workbench);

// Workbench border
const borderGeom = new THREE.BoxGeometry(20.2, 0.25, 14.2);
const borderMat = new THREE.MeshStandardMaterial({ color: 0x1a3a0a, roughness: 0.9 });
const border = new THREE.Mesh(borderGeom, borderMat);
border.position.y = -0.025;
scene.add(border);

// Grid lines
const gridGroup = new THREE.Group();
const gridMat = new THREE.LineBasicMaterial({ color: 0x3d7020, transparent: true, opacity: 0.5 });

for (let x = -10; x <= 10; x++) {
    const points = [new THREE.Vector3(x, 0.11, -7), new THREE.Vector3(x, 0.11, 7)];
    const geom = new THREE.BufferGeometry().setFromPoints(points);
    gridGroup.add(new THREE.LineSegments(geom, gridMat));
}
for (let z = -7; z <= 7; z++) {
    const points = [new THREE.Vector3(-10, 0.11, z), new THREE.Vector3(10, 0.11, z)];
    const geom = new THREE.BufferGeometry().setFromPoints(points);
    gridGroup.add(new THREE.LineSegments(geom, gridMat));
}
scene.add(gridGroup);

// Floor
const floorGeom = new THREE.PlaneGeometry(60, 60);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 1 });
const floor = new THREE.Mesh(floorGeom, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.5;
floor.receiveShadow = true;
scene.add(floor);

// Component meshes storage
const placedMeshes = [];
const componentGroup = new THREE.Group();
scene.add(componentGroup);

// Fox
let foxModel = null;
let foxMixer = null;
let foxActions = {};
let foxBasePos = new THREE.Vector3(-8, 0.1, -5);

const loader = new GLTFLoader();
loader.load(
    'https://threejs.org/examples/models/gltf/Fox.glb',
    (gltf) => {
        foxModel = gltf.scene;
        foxModel.scale.set(0.03, 0.03, 0.03);
        foxModel.position.copy(foxBasePos);
        foxModel.rotation.y = Math.PI / 4;
        foxModel.traverse(child => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        scene.add(foxModel);

        foxMixer = new THREE.AnimationMixer(foxModel);
        if (gltf.animations.length > 0) {
            gltf.animations.forEach((clip, i) => {
                const action = foxMixer.clipAction(clip);
                const name = clip.name.toLowerCase();
                if (name.includes('idle') || name.includes('survey') || i === 0) {
                    foxActions.idle = action;
                }
                if (name.includes('walk') || i === 1) {
                    foxActions.walk = action;
                }
                if (name.includes('run') || i === 2) {
                    foxActions.run = action;
                }
            });
            if (foxActions.idle) {
                foxActions.idle.play();
            } else if (gltf.animations.length > 0) {
                foxActions.idle = foxMixer.clipAction(gltf.animations[0]);
                foxActions.idle.play();
            }
            if (!foxActions.walk && gltf.animations.length > 1) {
                foxActions.walk = foxMixer.clipAction(gltf.animations[1]);
            }
            if (!foxActions.run && gltf.animations.length > 2) {
                foxActions.run = foxMixer.clipAction(gltf.animations[2]);
            }
        }
    },
    undefined,
    (err) => { console.log('Fox model could not be loaded:', err); }
);

function setFoxAnimation(animName) {
    if (!foxMixer) return;
    const targetAction = foxActions[animName] || foxActions.walk || foxActions.idle;
    if (!targetAction) return;

    Object.values(foxActions).forEach(a => {
        if (a && a !== targetAction && a.isRunning()) {
            a.fadeOut(0.3);
        }
    });
    targetAction.reset().fadeIn(0.3).play();
}

// Component creation functions
function createBattery() {
    const group = new THREE.Group();
    group.userData.type = 'battery';

    const body = new THREE.Mesh(
        new THREE.BoxGeometry(1, 0.5, 0.5),
        new THREE.MeshStandardMaterial({ color: 0xf1c40f, roughness: 0.4, metalness: 0.3 })
    );
    body.position.y = 0.25;
    body.castShadow = true;
    group.add(body);

    // + terminal (red)
    const posTerminal = new THREE.Mesh(
        new THREE.CylinderGeometry(0.08, 0.08, 0.15, 8),
        new THREE.MeshStandardMaterial({ color: 0xe74c3c, roughness: 0.3, metalness: 0.5 })
    );
    posTerminal.position.set(0.45, 0.55, 0);
    group.add(posTerminal);

    // - terminal (black)
    const negTerminal = new THREE.Mesh(
        new THREE.CylinderGeometry(0.08, 0.08, 0.15, 8),
        new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.3, metalness: 0.5 })
    );
    negTerminal.position.set(-0.45, 0.55, 0);
    group.add(negTerminal);

    // Label
    const labelGeom = new THREE.PlaneGeometry(0.4, 0.2);
    const canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 32;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#2c3e50';
    ctx.fillRect(0, 0, 64, 32);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('9V', 32, 22);
    const labelTex = new THREE.CanvasTexture(canvas);
    const label = new THREE.Mesh(labelGeom, new THREE.MeshBasicMaterial({ map: labelTex }));
    label.position.set(0, 0.26, 0.26);
    group.add(label);

    return group;
}

function createResistor() {
    const group = new THREE.Group();
    group.userData.type = 'resistor';

    const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.15, 0.8, 12),
        new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.6 })
    );
    body.rotation.z = Math.PI / 2;
    body.position.y = 0.25;
    body.castShadow = true;
    group.add(body);

    // Color bands
    const bandColors = [0x8B4513, 0x000000, 0x8B4513, 0xC0A000];
    bandColors.forEach((c, i) => {
        const band = new THREE.Mesh(
            new THREE.CylinderGeometry(0.16, 0.16, 0.04, 12),
            new THREE.MeshStandardMaterial({ color: c, roughness: 0.3 })
        );
        band.rotation.z = Math.PI / 2;
        band.position.set(-0.25 + i * 0.15, 0.25, 0);
        group.add(band);
    });

    // Leads
    const leadMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8 });
    const leadL = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.3, 6), leadMat);
    leadL.rotation.z = Math.PI / 2;
    leadL.position.set(-0.55, 0.25, 0);
    group.add(leadL);
    const leadR = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.3, 6), leadMat);
    leadR.rotation.z = Math.PI / 2;
    leadR.position.set(0.55, 0.25, 0);
    group.add(leadR);

    return group;
}

function createLED() {
    const group = new THREE.Group();
    group.userData.type = 'led';
    group.userData.glowing = false;

    const lens = new THREE.Mesh(
        new THREE.ConeGeometry(0.15, 0.5, 12),
        new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.2, metalness: 0.1, transparent: true, opacity: 0.9 })
    );
    lens.position.y = 0.45;
    lens.castShadow = true;
    group.add(lens);
    group.userData.lensMesh = lens;

    const base = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.15, 0.15, 12),
        new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.5 })
    );
    base.position.y = 0.175;
    group.add(base);

    // Leads
    const leadMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8 });
    const leadL = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.2, 6), leadMat);
    leadL.position.set(-0.06, 0.05, 0);
    group.add(leadL);
    const leadR = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.15, 6), leadMat);
    leadR.position.set(0.06, 0.05, 0);
    group.add(leadR);

    // Point light for glow (initially off)
    const glowLight = new THREE.PointLight(0x00ff00, 0, 3);
    glowLight.position.y = 0.6;
    group.add(glowLight);
    group.userData.glowLight = glowLight;

    return group;
}

function createWire() {
    const group = new THREE.Group();
    group.userData.type = 'wire';

    const wire = new THREE.Mesh(
        new THREE.CylinderGeometry(0.03, 0.03, 1.0, 8),
        new THREE.MeshStandardMaterial({ color: 0x3498db, roughness: 0.3, metalness: 0.6 })
    );
    wire.rotation.z = Math.PI / 2;
    wire.position.y = 0.15;
    wire.castShadow = true;
    group.add(wire);

    // End caps
    const capMat = new THREE.MeshStandardMaterial({ color: 0x2980b9, metalness: 0.7 });
    const capL = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), capMat);
    capL.position.set(-0.5, 0.15, 0);
    group.add(capL);
    const capR = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), capMat);
    capR.position.set(0.5, 0.15, 0);
    group.add(capR);

    return group;
}

function createSwitch() {
    const group = new THREE.Group();
    group.userData.type = 'switch';
    group.userData.closed = false;

    const base = new THREE.Mesh(
        new THREE.BoxGeometry(0.6, 0.2, 0.4),
        new THREE.MeshStandardMaterial({ color: 0x34495e, roughness: 0.5 })
    );
    base.position.y = 0.2;
    base.castShadow = true;
    group.add(base);

    // Lever
    const lever = new THREE.Mesh(
        new THREE.BoxGeometry(0.3, 0.08, 0.15),
        new THREE.MeshStandardMaterial({ color: 0xe74c3c, roughness: 0.3, metalness: 0.4 })
    );
    lever.position.set(0.1, 0.35, 0);
    lever.castShadow = true;
    group.add(lever);
    group.userData.leverMesh = lever;

    // Contacts
    const contactMat = new THREE.MeshStandardMaterial({ color: 0xbdc3c7, metalness: 0.8 });
    const cL = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.1, 8), contactMat);
    cL.position.set(-0.2, 0.35, 0);
    group.add(cL);
    const cR = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.1, 8), contactMat);
    cR.position.set(0.2, 0.35, 0);
    group.add(cR);

    // Status indicator
    const indicator = new THREE.Mesh(
        new THREE.SphereGeometry(0.04, 8, 8),
        new THREE.MeshStandardMaterial({ color: 0xe74c3c, emissive: 0xe74c3c, emissiveIntensity: 0.5 })
    );
    indicator.position.set(0, 0.42, 0);
    group.add(indicator);
    group.userData.indicator = indicator;

    return group;
}

function createComponent(type) {
    switch (type) {
        case 'battery': return createBattery();
        case 'resistor': return createResistor();
        case 'led': return createLED();
        case 'wire': return createWire();
        case 'switch': return createSwitch();
        default: return null;
    }
}

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getMousePos(event) {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
}

function getGridPosition(event) {
    getMousePos(event);
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(workbench);
    if (intersects.length > 0) {
        const p = intersects[0].point;
        const gx = Math.round(p.x);
        const gz = Math.round(p.z);
        if (gx >= -9 && gx <= 9 && gz >= -6 && gz <= 6) {
            return { x: gx, z: gz };
        }
    }
    return null;
}

function isPositionOccupied(gx, gz) {
    return state.placedComponents.some(c => c.gridX === gx && c.gridZ === gz);
}

function placeComponent(type, gx, gz) {
    if (state.componentCount >= 20) {
        showTooltip('Maximum 20 components reached!');
        return;
    }
    if (isPositionOccupied(gx, gz)) {
        showTooltip('Position already occupied!');
        return;
    }

    const mesh = createComponent(type);
    if (!mesh) return;

    mesh.position.set(gx, 0.1, gz);
    mesh.userData.gridX = gx;
    mesh.userData.gridZ = gz;
    componentGroup.add(mesh);
    placedMeshes.push(mesh);

    state.placedComponents.push({ type, gridX: gx, gridZ: gz });
    state.componentCount = placedMeshes.length;
    state.circuitCleared = false;

    // Animate placement
    mesh.scale.set(0, 0, 0);
    animateScale(mesh, 1.0, 300);

    updateHUD();
    showTooltip(`Placed ${type} at (${gx}, ${gz})`);
}

function animateScale(obj, target, duration) {
    const start = performance.now();
    const initial = obj.scale.x;
    function tick(now) {
        const t = Math.min((now - start) / duration, 1);
        const ease = 1 - Math.pow(1 - t, 3);
        const s = initial + (target - initial) * ease;
        obj.scale.set(s, s, s);
        if (t < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
}

function removeComponent(mesh) {
    const idx = placedMeshes.indexOf(mesh);
    if (idx === -1) return;

    const gx = mesh.userData.gridX;
    const gz = mesh.userData.gridZ;

    componentGroup.remove(mesh);
    placedMeshes.splice(idx, 1);

    const si = state.placedComponents.findIndex(c => c.gridX === gx && c.gridZ === gz);
    if (si !== -1) state.placedComponents.splice(si, 1);

    state.componentCount = placedMeshes.length;
    updateHUD();
    showTooltip('Component removed');
}

function toggleSwitch(mesh) {
    if (mesh.userData.type !== 'switch') return;
    mesh.userData.closed = !mesh.userData.closed;
    state.switchClosed = mesh.userData.closed;

    const lever = mesh.userData.leverMesh;
    const indicator = mesh.userData.indicator;
    if (mesh.userData.closed) {
        lever.position.x = -0.1;
        lever.material.color.setHex(0x27ae60);
        indicator.material.color.setHex(0x27ae60);
        indicator.material.emissive.setHex(0x27ae60);
        showTooltip('Switch CLOSED');
    } else {
        lever.position.x = 0.1;
        lever.material.color.setHex(0xe74c3c);
        indicator.material.color.setHex(0xe74c3c);
        indicator.material.emissive.setHex(0xe74c3c);
        showTooltip('Switch OPEN');
    }
    updateHUD();
}

function clearCircuit() {
    while (placedMeshes.length > 0) {
        const m = placedMeshes.pop();
        componentGroup.remove(m);
    }
    state.placedComponents = [];
    state.componentCount = 0;
    state.circuitComplete = false;
    state.switchClosed = false;
    state.totalVoltage = 0;
    state.totalResistance = 0;
    state.totalCurrent = 0;
    state.ledGlowing = false;
    state.foxAnimationState = 'idle';
    state.circuitCleared = true;
    state.simulationRun = false;

    setFoxAnimation('idle');
    updateHUD();
    showTooltip('Circuit cleared!');
}

function simulate() {
    state.simulationRun = true;

    // Count component types
    const types = {};
    placedMeshes.forEach(m => {
        const t = m.userData.type;
        if (!types[t]) types[t] = [];
        types[t].push(m);
    });

    const hasBattery = types.battery && types.battery.length > 0;
    const hasResistor = types.resistor && types.resistor.length > 0;
    const hasLED = types.led && types.led.length > 0;
    const hasSwitch = types.switch && types.switch.length > 0;

    // Check switch state
    let switchClosed = false;
    if (hasSwitch) {
        switchClosed = types.switch.some(s => s.userData.closed);
    }
    state.switchClosed = switchClosed;

    // Calculate voltage and resistance
    state.totalVoltage = hasBattery ? 9 * types.battery.length : 0;
    state.totalResistance = hasResistor ? 100 * types.resistor.length : 0;

    // Check connectivity: all components within 2 units chain
    let connected = false;
    if (hasBattery && hasResistor && hasLED && hasSwitch) {
        const allKey = [...(types.battery || []), ...(types.resistor || []), ...(types.led || []), ...(types.switch || [])];
        connected = checkConnectivity(allKey);
    }

    // Circuit complete if all types present, connected, and switch closed
    state.circuitComplete = hasBattery && hasResistor && hasLED && hasSwitch && switchClosed && connected;

    if (state.circuitComplete && state.totalResistance > 0) {
        state.totalCurrent = Math.max(0, state.totalVoltage / state.totalResistance);
        state.ledGlowing = true;
        state.foxAnimationState = 'active';

        // Glow LEDs
        if (types.led) {
            types.led.forEach(led => {
                const lens = led.userData.lensMesh;
                lens.material.color.setHex(0x00ff00);
                lens.material.emissive = new THREE.Color(0x00ff00);
                lens.material.emissiveIntensity = 1.0;
                lens.material.transparent = true;
                lens.material.opacity = 0.9;
                led.userData.glowLight.intensity = 2;
                led.userData.glowing = true;
            });
        }

        setFoxAnimation('run');
        showTooltip(`✅ Circuit Complete! Current: ${state.totalCurrent.toFixed(3)} A`);
    } else {
        state.totalCurrent = 0;
        state.ledGlowing = false;
        state.foxAnimationState = 'idle';

        // Turn off LEDs
        if (types.led) {
            types.led.forEach(led => {
                const lens = led.userData.lensMesh;
                lens.material.color.setHex(0x888888);
                lens.material.emissive = new THREE.Color(0x000000);
                lens.material.emissiveIntensity = 0;
                led.userData.glowLight.intensity = 0;
                led.userData.glowing = false;
            });
        }

        setFoxAnimation('idle');

        let reason = '';
        if (!hasBattery) reason = 'No battery';
        else if (!hasResistor) reason = 'No resistor';
        else if (!hasLED) reason = 'No LED';
        else if (!hasSwitch) reason = 'No switch';
        else if (!switchClosed) reason = 'Switch is open';
        else if (!connected) reason = 'Components not connected';
        showTooltip(`❌ Circuit Incomplete: ${reason}`);
    }

    updateHUD();
}

function checkConnectivity(meshes) {
    if (meshes.length < 2) return false;
    const visited = new Set();
    const queue = [0];
    visited.add(0);

    while (queue.length > 0) {
        const current = queue.shift();
        const cPos = meshes[current].position;

        for (let i = 0; i < meshes.length; i++) {
            if (visited.has(i)) continue;
            const dist = cPos.distanceTo(meshes[i].position);
            if (dist <= 2.1) {
                visited.add(i);
                queue.push(i);
            }
        }
    }

    return visited.size === meshes.length;
}

// HUD
function updateHUD() {
    document.getElementById('hud-selected').textContent = state.selectedComponent === 'none' ? 'None' : state.selectedComponent;
    document.getElementById('hud-count').textContent = state.componentCount;
    document.getElementById('hud-voltage').textContent = state.totalVoltage + ' V';
    document.getElementById('hud-resistance').textContent = state.totalResistance + ' Ω';
    document.getElementById('hud-current').textContent = state.totalCurrent.toFixed(3) + ' A';

    const statusEl = document.getElementById('hud-status');
    if (state.circuitComplete) {
        statusEl.textContent = 'Complete ✓';
        statusEl.className = 'hud-value status-complete';
    } else {
        statusEl.textContent = 'Incomplete';
        statusEl.className = 'hud-value status-incomplete';
    }

    document.getElementById('hud-fox').textContent = state.foxAnimationState === 'active' ? '🎉 Celebrating!' : '😴 Idle';
}

function showTooltip(msg) {
    const tooltip = document.getElementById('tooltip');
    tooltip.textContent = msg;
    tooltip.style.opacity = '1';
    clearTimeout(tooltip._timeout);
    tooltip._timeout = setTimeout(() => { tooltip.style.opacity = '0.6'; }, 3000);
}

// Button handlers
const componentButtons = ['battery', 'resistor', 'led', 'wire', 'switch'];
componentButtons.forEach(type => {
    document.getElementById(`btn-${type}`).addEventListener('click', () => {
        state.selectedComponent = type;
        document.querySelectorAll('.component-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById(`btn-${type}`).classList.add('selected');
        updateHUD();
        showTooltip(`Selected: ${type} - Click on workbench to place`);
    });
});

document.getElementById('btn-simulate').addEventListener('click', simulate);
document.getElementById('btn-clear').addEventListener('click', clearCircuit);

// Mouse events
renderer.domElement.addEventListener('click', (event) => {
    if (state.selectedComponent === 'none') {
        // Check if clicking on a switch to toggle
        getMousePos(event);
        raycaster.setFromCamera(mouse, camera);
        const meshesToCheck = [];
        placedMeshes.forEach(m => m.traverse(child => { if (child.isMesh) meshesToCheck.push(child); }));
        const hits = raycaster.intersectObjects(meshesToCheck);
        if (hits.length > 0) {
            let parent = hits[0].object;
            while (parent.parent && parent.parent !== componentGroup) parent = parent.parent;
            if (parent.userData.type === 'switch') {
                toggleSwitch(parent);
                return;
            }
        }
        return;
    }

    const grid = getGridPosition(event);
    if (grid) {
        placeComponent(state.selectedComponent, grid.x, grid.z);
    }
});

renderer.domElement.addEventListener('contextmenu', (event) => {
    event.preventDefault();
    getMousePos(event);
    raycaster.setFromCamera(mouse, camera);

    const meshesToCheck = [];
    placedMeshes.forEach(m => m.traverse(child => { if (child.isMesh) meshesToCheck.push(child); }));
    const hits = raycaster.intersectObjects(meshesToCheck);

    if (hits.length > 0) {
        let parent = hits[0].object;
        while (parent.parent && parent.parent !== componentGroup) parent = parent.parent;
        if (parent.userData.type) {
            removeComponent(parent);
        }
    }
});

// Keyboard
document.addEventListener('keydown', (event) => {
    if (event.key === 's' || event.key === 'S') simulate();
    if (event.key === 'c' || event.key === 'C') clearCircuit();
});

// Hover effect
let hoveredMesh = null;
renderer.domElement.addEventListener('mousemove', (event) => {
    if (state.selectedComponent !== 'none') {
        renderer.domElement.style.cursor = 'crosshair';
        return;
    }

    getMousePos(event);
    raycaster.setFromCamera(mouse, camera);
    const meshesToCheck = [];
    placedMeshes.forEach(m => m.traverse(child => { if (child.isMesh) meshesToCheck.push(child); }));
    const hits = raycaster.intersectObjects(meshesToCheck);

    if (hits.length > 0) {
        renderer.domElement.style.cursor = 'pointer';
    } else {
        renderer.domElement.style.cursor = 'default';
    }
});

// Resize
window.addEventListener('resize', () => {
    const w = container.clientWidth;
    const h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

// Animation loop
const clock = new THREE.Clock();
let foxCelebrationTime = 0;

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    controls.update();

    if (foxMixer) foxMixer.update(delta);

    // Fox celebration oscillation
    if (foxModel && state.foxAnimationState === 'active') {
        foxCelebrationTime += delta * 3;
        foxModel.position.x = foxBasePos.x + Math.sin(foxCelebrationTime) * 0.3;
        foxModel.position.z = foxBasePos.z + Math.cos(foxCelebrationTime * 0.7) * 0.2;
        foxModel.rotation.y = Math.PI / 4 + Math.sin(foxCelebrationTime * 0.5) * 0.3;
    } else if (foxModel) {
        foxModel.position.copy(foxBasePos);
        foxModel.rotation.y = Math.PI / 4;
        foxCelebrationTime = 0;
    }

    // LED glow pulse
    placedMeshes.forEach(m => {
        if (m.userData.type === 'led' && m.userData.glowing) {
            const pulse = 0.7 + Math.sin(elapsed * 4) * 0.3;
            m.userData.lensMesh.material.emissiveIntensity = pulse;
            m.userData.glowLight.intensity = 1 + pulse;
        }
    });

    // Gentle hover animation for all components
    placedMeshes.forEach((m, i) => {
        const baseY = 0.1;
        m.position.y = baseY + Math.sin(elapsed * 2 + i * 0.5) * 0.01;
    });

    renderer.render(scene, camera);
}

animate();
updateHUD();
</script>
