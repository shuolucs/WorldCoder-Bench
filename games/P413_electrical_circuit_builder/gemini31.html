<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Electrical Circuit Builder</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 200px;
            height: 100vh;
            background: rgba(30, 30, 30, 0.9);
            border-right: 1px solid #444;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }
        h2 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
            color: #4CAF50;
        }
        button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        button:hover {
            background: #444;
        }
        button.active {
            background: #4CAF50;
            border-color: #4CAF50;
        }
        .action-btn {
            margin-top: auto;
            background: #2196F3;
            border-color: #2196F3;
        }
        .action-btn:hover {
            background: #1976D2;
        }
        #btn-clear {
            margin-top: 10px;
            background: #f44336;
            border-color: #f44336;
        }
        #btn-clear:hover {
            background: #d32f2f;
        }
        #hud-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            min-width: 200px;
            pointer-events: none;
            z-index: 10;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .hud-value {
            font-family: monospace;
            color: #4CAF50;
        }
        .status-incomplete { color: #f44336; }
        .status-complete { color: #4CAF50; font-weight: bold; }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 220px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            font-size: 12px;
            color: #ccc;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="sidebar">
        <h2>Components</h2>
        <button id="btn-battery" class="comp-btn" data-type="battery">Battery (9V)</button>
        <button id="btn-resistor" class="comp-btn" data-type="resistor">Resistor (100Ω)</button>
        <button id="btn-led" class="comp-btn" data-type="led">LED</button>
        <button id="btn-wire" class="comp-btn" data-type="wire">Wire</button>
        <button id="btn-switch" class="comp-btn" data-type="switch">Switch</button>
        
        <button id="btn-simulate" class="action-btn">Simulate (S)</button>
        <button id="btn-clear">Clear Circuit (C)</button>
    </div>

    <div id="hud-info">
        <div class="hud-row"><span>Selected:</span> <span id="hud-selected" class="hud-value">None</span></div>
        <div class="hud-row"><span>Components:</span> <span id="hud-count" class="hud-value">0/20</span></div>
        <hr style="border-color: #444; margin: 10px 0;">
        <div class="hud-row"><span>Voltage:</span> <span id="hud-voltage" class="hud-value">0 V</span></div>
        <div class="hud-row"><span>Resistance:</span> <span id="hud-resistance" class="hud-value">0 Ω</span></div>
        <div class="hud-row"><span>Current:</span> <span id="hud-current" class="hud-value">0.00 A</span></div>
        <div class="hud-row"><span>Status:</span> <span id="hud-status" class="hud-value status-incomplete">Incomplete</span></div>
    </div>

    <div id="instructions">
        Left Click: Place Component | Right Click: Remove Component | Click Switch: Toggle | Drag: Rotate Camera
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            selectedComponent: 'none',
            placedComponents: [],
            componentCount: 0,
            circuitComplete: false,
            switchClosed: false,
            totalVoltage: 0,
            totalResistance: 0,
            totalCurrent: 0,
            ledGlowing: false,
            foxAnimationState: 'idle',
            simulationRun: false,
            circuitCleared: false
        };

        const MAX_COMPONENTS = 20;
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        scene.add(dirLight);

        // Workbench
        const boardWidth = 20;
        const boardDepth = 14;
        const boardThickness = 0.2;
        const boardGeometry = new THREE.BoxGeometry(boardWidth, boardThickness, boardDepth);
        const boardMaterial = new THREE.MeshPhongMaterial({ color: 0x2d5016 }); // Dark green PCB
        const workbench = new THREE.Mesh(boardGeometry, boardMaterial);
        workbench.position.y = 0;
        workbench.receiveShadow = true;
        scene.add(workbench);

        // Grid
        const gridHelper = new THREE.GridHelper(20, 20, 0x000000, 0x000000);
        gridHelper.position.y = boardThickness / 2 + 0.01;
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // Group for placed components
        const componentsGroup = new THREE.Group();
        scene.add(componentsGroup);

        // --- Fox Mascot ---
        let mixer;
        let foxActions = {};
        let foxModel;
        let foxBaseY = 0.1;

        const loader = new GLTFLoader();
        // Using a reliable public URL for the Fox model
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Fox/glTF-Binary/Fox.glb', function (gltf) {
            foxModel = gltf.scene;
            foxModel.scale.set(0.03, 0.03, 0.03);
            foxModel.position.set(-8, foxBaseY, -5);
            foxModel.traverse((child) => {
                if (child.isMesh) child.castShadow = true;
            });
            scene.add(foxModel);

            mixer = new THREE.AnimationMixer(foxModel);
            foxActions.idle = mixer.clipAction(gltf.animations[0]); // Survey
            foxActions.walk = mixer.clipAction(gltf.animations[1]); // Walk
            foxActions.run = mixer.clipAction(gltf.animations[2]);  // Run

            foxActions.idle.play();
        });

        // --- Component Factories ---
        const materials = {
            battery: new THREE.MeshPhongMaterial({ color: 0xffcc00 }),
            terminalRed: new THREE.MeshPhongMaterial({ color: 0xff0000 }),
            terminalBlack: new THREE.MeshPhongMaterial({ color: 0x222222 }),
            resistor: new THREE.MeshPhongMaterial({ color: 0x8b4513 }),
            band1: new THREE.MeshPhongMaterial({ color: 0xff0000 }),
            band2: new THREE.MeshPhongMaterial({ color: 0x000000 }),
            ledOff: new THREE.MeshPhongMaterial({ color: 0x888888, emissive: 0x000000 }),
            ledOn: new THREE.MeshPhongMaterial({ color: 0x55ff55, emissive: 0x00ff00, emissiveIntensity: 2 }),
            wire: new THREE.MeshPhongMaterial({ color: 0x0055ff }),
            switchBase: new THREE.MeshPhongMaterial({ color: 0x555555 }),
            switchLever: new THREE.MeshPhongMaterial({ color: 0xcc0000 })
        };

        function createBattery() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 0.5), materials.battery);
            body.position.y = 0.25;
            body.castShadow = true;
            group.add(body);

            const tRed = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.2, 0.2), materials.terminalRed);
            tRed.position.set(0.55, 0.25, 0.15);
            group.add(tRed);

            const tBlack = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.2, 0.2), materials.terminalBlack);
            tBlack.position.set(0.55, 0.25, -0.15);
            group.add(tBlack);

            return group;
        }

        function createResistor() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.8, 16), materials.resistor);
            body.rotation.z = Math.PI / 2;
            body.position.y = 0.15;
            body.castShadow = true;
            group.add(body);

            const band1 = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.16, 0.1, 16), materials.band1);
            band1.rotation.z = Math.PI / 2;
            band1.position.set(-0.2, 0.15, 0);
            group.add(band1);

            const band2 = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.16, 0.1, 16), materials.band2);
            band2.rotation.z = Math.PI / 2;
            band2.position.set(0.2, 0.15, 0);
            group.add(band2);

            return group;
        }

        function createLED() {
            const group = new THREE.Group();
            const bulb = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.5, 16), materials.ledOff.clone());
            bulb.position.y = 0.25;
            bulb.castShadow = true;
            bulb.name = "ledBulb";
            group.add(bulb);
            
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.1, 16), materials.terminalBlack);
            base.position.y = 0.05;
            group.add(base);

            return group;
        }

        function createWire() {
            const group = new THREE.Group();
            const wire = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1, 8), materials.wire);
            wire.rotation.z = Math.PI / 2;
            wire.position.y = 0.05;
            wire.castShadow = true;
            group.add(wire);
            return group;
        }

        function createSwitch() {
            const group = new THREE.Group();
            const base = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, 0.6), materials.switchBase);
            base.position.y = 0.1;
            base.castShadow = true;
            group.add(base);

            const leverGroup = new THREE.Group();
            leverGroup.position.set(0, 0.2, 0);
            const lever = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4, 8), materials.switchLever);
            lever.position.y = 0.2;
            lever.castShadow = true;
            leverGroup.add(lever);
            
            leverGroup.rotation.x = -Math.PI / 4; // Open by default
            leverGroup.name = "lever";
            group.add(leverGroup);

            return group;
        }

        const factories = {
            battery: createBattery,
            resistor: createResistor,
            led: createLED,
            wire: createWire,
            switch: createSwitch
        };

        // --- UI Interactions ---
        const buttons = document.querySelectorAll('.comp-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                if (state.selectedComponent === btn.dataset.type) {
                    state.selectedComponent = 'none';
                } else {
                    btn.classList.add('active');
                    state.selectedComponent = btn.dataset.type;
                }
                updateHUD();
            });
        });

        document.getElementById('btn-clear').addEventListener('click', clearCircuit);
        document.getElementById('btn-simulate').addEventListener('click', simulateCircuit);

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 's') simulateCircuit();
            if (e.key.toLowerCase() === 'c') clearCircuit();
        });

        // --- Raycasting & Placement ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            // Ignore clicks on UI
            if (event.clientX < 200) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            if (event.button === 0) { // Left click
                // Check for switch toggle first
                const intersectsComps = raycaster.intersectObjects(componentsGroup.children, true);
                if (intersectsComps.length > 0) {
                    let obj = intersectsComps[0].object;
                    while (obj.parent && obj.parent !== componentsGroup) {
                        obj = obj.parent;
                    }
                    if (obj.userData && obj.userData.type === 'switch') {
                        toggleSwitch(obj);
                        return;
                    }
                }

                // Placement
                if (state.selectedComponent !== 'none' && state.componentCount < MAX_COMPONENTS) {
                    const intersectsBoard = raycaster.intersectObject(workbench);
                    if (intersectsBoard.length > 0) {
                        const point = intersectsBoard[0].point;
                        const gridX = Math.round(point.x);
                        const gridZ = Math.round(point.z);

                        // Check bounds
                        if (Math.abs(gridX) <= boardWidth/2 - 0.5 && Math.abs(gridZ) <= boardDepth/2 - 0.5) {
                            placeComponent(state.selectedComponent, gridX, gridZ);
                        }
                    }
                }
            } else if (event.button === 2) { // Right click
                const intersectsComps = raycaster.intersectObjects(componentsGroup.children, true);
                if (intersectsComps.length > 0) {
                    let obj = intersectsComps[0].object;
                    while (obj.parent && obj.parent !== componentsGroup) {
                        obj = obj.parent;
                    }
                    removeComponent(obj);
                }
            }
        });

        // Prevent context menu on right click
        window.addEventListener('contextmenu', e => e.preventDefault());

        // --- Logic Functions ---
        function placeComponent(type, x, z) {
            // Check if position occupied
            const occupied = state.placedComponents.some(c => c.gridX === x && c.gridZ === z);
            if (occupied) return;

            const comp = factories[type]();
            comp.position.set(x, boardThickness / 2, z);
            
            // Randomize rotation for wires/resistors to make it look better
            if (type === 'wire' || type === 'resistor') {
                comp.rotation.y = (Math.random() > 0.5 ? 0 : Math.PI / 2);
            }

            comp.userData = {
                id: Date.now(),
                type: type,
                gridX: x,
                gridZ: z,
                closed: false // for switch
            };

            componentsGroup.add(comp);
            
            state.placedComponents.push({
                id: comp.userData.id,
                type: type,
                gridX: x,
                gridZ: z,
                mesh: comp
            });
            
            state.componentCount++;
            state.simulationRun = false; // Reset simulation state
            updateHUD();
        }

        function removeComponent(mesh) {
            componentsGroup.remove(mesh);
            state.placedComponents = state.placedComponents.filter(c => c.id !== mesh.userData.id);
            state.componentCount--;
            state.simulationRun = false;
            updateHUD();
            resetVisuals();
        }

        function toggleSwitch(mesh) {
            mesh.userData.closed = !mesh.userData.closed;
            const lever = mesh.getObjectByName("lever");
            if (lever) {
                lever.rotation.x = mesh.userData.closed ? Math.PI / 4 : -Math.PI / 4;
            }
            state.simulationRun = false;
            updateHUD();
        }

        function clearCircuit() {
            while(componentsGroup.children.length > 0){ 
                componentsGroup.remove(componentsGroup.children[0]); 
            }
            state.placedComponents = [];
            state.componentCount = 0;
            state.circuitComplete = false;
            state.simulationRun = false;
            state.circuitCleared = true;
            updateHUD();
            resetVisuals();
            setFoxAnimation('idle');
        }

        function simulateCircuit() {
            state.simulationRun = true;
            
            let batteries = 0, resistors = 0, leds = 0, switches = 0;
            let allSwitchesClosed = true;

            state.placedComponents.forEach(c => {
                if (c.type === 'battery') batteries++;
                if (c.type === 'resistor') resistors++;
                if (c.type === 'led') leds++;
                if (c.type === 'switch') {
                    switches++;
                    if (!c.mesh.userData.closed) allSwitchesClosed = false;
                }
            });

            state.totalVoltage = batteries * 9;
            state.totalResistance = resistors * 100;

            // Simple connectivity check: components must be close to each other
            let isConnected = false;
            if (state.componentCount > 0) {
                const adj = Array.from({length: state.componentCount}, () => []);
                for(let i=0; i<state.componentCount; i++) {
                    for(let j=i+1; j<state.componentCount; j++) {
                        const dx = state.placedComponents[i].gridX - state.placedComponents[j].gridX;
                        const dz = state.placedComponents[i].gridZ - state.placedComponents[j].gridZ;
                        const dist = Math.sqrt(dx*dx + dz*dz);
                        if(dist <= 2.1) { // Within 2 units
                            adj[i].push(j);
                            adj[j].push(i);
                        }
                    }
                }
                
                const visited = new Set();
                function dfs(node) {
                    visited.add(node);
                    for(let neighbor of adj[node]) {
                        if(!visited.has(neighbor)) dfs(neighbor);
                    }
                }
                dfs(0);
                isConnected = (visited.size === state.componentCount);
            }

            // Circuit logic
            if (batteries > 0 && leds > 0 && resistors > 0 && switches > 0 && allSwitchesClosed && isConnected) {
                state.circuitComplete = true;
                state.totalCurrent = state.totalVoltage / state.totalResistance;
                state.ledGlowing = true;
                setFoxAnimation('active');
            } else {
                state.circuitComplete = false;
                state.totalCurrent = 0;
                state.ledGlowing = false;
                setFoxAnimation('idle');
            }

            updateVisuals();
            updateHUD();
        }

        function updateVisuals() {
            state.placedComponents.forEach(c => {
                if (c.type === 'led') {
                    const bulb = c.mesh.getObjectByName("ledBulb");
                    if (bulb) {
                        bulb.material = state.ledGlowing ? materials.ledOn : materials.ledOff;
                    }
                }
            });
        }

        function resetVisuals() {
            state.circuitComplete = false;
            state.totalCurrent = 0;
            state.totalVoltage = 0;
            state.totalResistance = 0;
            state.ledGlowing = false;
            updateVisuals();
        }

        function setFoxAnimation(animState) {
            if (state.foxAnimationState === animState || !mixer) return;
            
            if (animState === 'active' && foxActions.run) {
                foxActions.idle.crossFadeTo(foxActions.run, 0.5, true);
                foxActions.run.play();
            } else if (animState === 'idle' && foxActions.idle) {
                if (foxActions.run.isRunning()) {
                    foxActions.run.crossFadeTo(foxActions.idle, 0.5, true);
                }
                foxActions.idle.play();
            }
            state.foxAnimationState = animState;
        }

        function updateHUD() {
            document.getElementById('hud-selected').textContent = state.selectedComponent.charAt(0).toUpperCase() + state.selectedComponent.slice(1);
            document.getElementById('hud-count').textContent = `${state.componentCount}/${MAX_COMPONENTS}`;
            
            if (state.simulationRun) {
                document.getElementById('hud-voltage').textContent = `${state.totalVoltage} V`;
                document.getElementById('hud-resistance').textContent = `${state.totalResistance} Ω`;
                document.getElementById('hud-current').textContent = `${state.totalCurrent.toFixed(2)} A`;
                
                const statusEl = document.getElementById('hud-status');
                if (state.circuitComplete) {
                    statusEl.textContent = "Complete";
                    statusEl.className = "hud-value status-complete";
                } else {
                    statusEl.textContent = "Incomplete";
                    statusEl.className = "hud-value status-incomplete";
                }
            } else {
                document.getElementById('hud-voltage').textContent = `- V`;
                document.getElementById('hud-resistance').textContent = `- Ω`;
                document.getElementById('hud-current').textContent = `- A`;
                const statusEl = document.getElementById('hud-status');
                statusEl.textContent = "Pending Sim";
                statusEl.className = "hud-value";
                statusEl.style.color = "#aaa";
            }
        }

        // --- Render Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            
            if (mixer) mixer.update(delta);
            controls.update();

            // Fox celebration bounce
            if (state.circuitComplete && foxModel) {
                foxModel.position.y = foxBaseY + Math.sin(Date.now() * 0.01) * 0.2;
            } else if (foxModel) {
                foxModel.position.y = foxBaseY;
            }

            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Init
        updateHUD();
        animate();

    </script>
</body>
</html>
