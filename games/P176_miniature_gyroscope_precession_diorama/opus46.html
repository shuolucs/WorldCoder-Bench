<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gyroscope Precession Diorama</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #000;
  }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    padding: 15px 20px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 260px;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.1);
    z-index: 10;
  }
  #hud h3 {
    margin: 0 0 8px 0;
    font-size: 16px;
    color: #FFD700;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 6px;
  }
  #hud .label {
    color: #aaa;
  }
  #hud .value {
    color: #fff;
    font-weight: bold;
    float: right;
  }
  #hud .unstable {
    color: #ff4444;
    font-weight: bold;
  }
  #hud .paused-indicator {
    color: #ffaa00;
    font-weight: bold;
  }
  #controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    padding: 15px 25px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 20px;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.1);
    z-index: 10;
  }
  #controls label {
    font-size: 13px;
    white-space: nowrap;
  }
  #controls input[type="range"] {
    width: 150px;
    cursor: pointer;
    accent-color: #FFD700;
  }
  #controls button {
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    color: #fff;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
  }
  #controls button:hover {
    background: rgba(255,255,255,0.25);
  }
  #spinValue {
    font-weight: bold;
    color: #FFD700;
    min-width: 30px;
    display: inline-block;
    text-align: center;
  }
</style>
</head>
<body>

<div id="hud">
  <h3>🌀 Gyroscope Telemetry</h3>
  <div><span class="label">Spin Speed:</span> <span class="value" id="hudSpin">10.00 rad/s</span></div>
  <div><span class="label">Precession Rate:</span> <span class="value" id="hudPrec">0.981 rad/s</span></div>
  <div><span class="label">Tilt Angle:</span> <span class="value" id="hudTilt">20.00°</span></div>
  <div><span class="label">Precession Angle:</span> <span class="value" id="hudPrecAngle">0.00°</span></div>
  <div><span class="label">Elapsed Time:</span> <span class="value" id="hudTime">0.00 s</span></div>
  <div><span class="label">Status:</span> <span class="value" id="hudStatus">Running</span></div>
</div>

<div id="controls">
  <label>Spin Speed (rad/s): <input type="range" id="spinSlider" min="0" max="30" step="0.5" value="10"> <span id="spinValue">10</span></label>
  <button id="tiltBtn">Increase Tilt</button>
  <button id="resetBtn">Reset</button>
  <label style="font-size:11px;color:#888;">Space = Pause</label>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ============================================================
// State
// ============================================================
const STATE = {
  spinSpeed: 10,
  precessionRate: 0,
  tiltAngleDeg: 20,
  baseTiltDeg: 20,
  precessionAngleDeg: 0,
  rotorAngle: 0,
  paused: false,
  elapsedTime: 0,
  gyroscopePosition: { x: 0, y: 0, z: 0 },
  nutationAmplitude: 0.03,
  isUnstable: false
};
window.__3D_STATE__ = STATE;

// Physics constants
const m = 1;
const g = 9.81;
const d = 0.5;
const I = 0.5;
const MAX_PRECESSION = 5.0;

let precessionAngle = 0;
let rotorAngle = 0;
let baseTiltRad = 20 * Math.PI / 180;
let elapsedTime = 0;

// ============================================================
// Scene Setup
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.04);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 4, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 1, 0);
controls.update();

// ============================================================
// Lighting
// ============================================================
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -6;
dirLight.shadow.camera.right = 6;
dirLight.shadow.camera.top = 6;
dirLight.shadow.camera.bottom = -6;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

// Subtle fill light
const fillLight = new THREE.DirectionalLight(0x4488ff, 0.15);
fillLight.position.set(-5, 3, -5);
scene.add(fillLight);

// ============================================================
// Platform (wooden base)
// ============================================================
const platformGeom = new THREE.CylinderGeometry(3, 3, 0.2, 64);
const platformMat = new THREE.MeshStandardMaterial({
  color: 0x8B4513,
  roughness: 0.7,
  metalness: 0.05
});
const platform = new THREE.Mesh(platformGeom, platformMat);
platform.position.y = -0.1;
platform.receiveShadow = true;
platform.castShadow = true;
scene.add(platform);

// Wood grain rings on platform
const ringGeom = new THREE.RingGeometry(0.5, 0.55, 64);
const ringMat = new THREE.MeshStandardMaterial({ color: 0x6B3410, side: THREE.DoubleSide, roughness: 0.8 });
for (let r = 0.6; r < 2.8; r += 0.4) {
  const rg = new THREE.RingGeometry(r, r + 0.03, 64);
  const ring = new THREE.Mesh(rg, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.001;
  platform.add(ring);
}

// Platform edge detail
const edgeGeom = new THREE.TorusGeometry(3, 0.05, 8, 64);
const edgeMat = new THREE.MeshStandardMaterial({ color: 0x5C2E00, roughness: 0.6, metalness: 0.1 });
const edge = new THREE.Mesh(edgeGeom, edgeMat);
edge.rotation.x = Math.PI / 2;
edge.position.y = 0;
scene.add(edge);

// Ground plane
const groundGeom = new THREE.PlaneGeometry(50, 50);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 1 });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.21;
ground.receiveShadow = true;
scene.add(ground);

// ============================================================
// Gyroscope Model
// ============================================================

// Pivot group - this is positioned at the tip point on the platform
const pivotGroup = new THREE.Group();
pivotGroup.position.set(0, 0, 0); // tip on platform surface y=0

// Gyroscope group - tilted, contains all parts
const gyroscopeGroup = new THREE.Group();
pivotGroup.add(gyroscopeGroup);

// Rotor (flywheel) - torus
const rotorGeom = new THREE.TorusGeometry(0.8, 0.1, 24, 64);
const rotorMat = new THREE.MeshStandardMaterial({
  color: 0xC0C0C0,
  metalness: 0.85,
  roughness: 0.15
});
const rotor = new THREE.Mesh(rotorGeom, rotorMat);
rotor.castShadow = true;
rotor.receiveShadow = true;

// Rotor spokes for visual spin feedback
const spokeMat = new THREE.MeshStandardMaterial({ color: 0xA0A0A0, metalness: 0.8, roughness: 0.2 });
for (let i = 0; i < 6; i++) {
  const angle = (i / 6) * Math.PI * 2;
  const spokeGeom = new THREE.CylinderGeometry(0.015, 0.015, 0.7, 8);
  const spoke = new THREE.Mesh(spokeGeom, spokeMat);
  spoke.rotation.z = Math.PI / 2;
  spoke.rotation.y = angle;
  spoke.position.set(Math.cos(angle) * 0.35, 0, Math.sin(angle) * 0.35);
  rotor.add(spoke);
}

// Hub at center of rotor
const hubGeom = new THREE.CylinderGeometry(0.08, 0.08, 0.12, 16);
const hubMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9, roughness: 0.1 });
const hub = new THREE.Mesh(hubGeom, hubMat);
rotor.add(hub);

// Axle - thin cylinder
const axleGeom = new THREE.CylinderGeometry(0.03, 0.03, 2.5, 16);
const axleMat = new THREE.MeshStandardMaterial({
  color: 0x333333,
  metalness: 0.7,
  roughness: 0.3
});
const axle = new THREE.Mesh(axleGeom, axleMat);
axle.castShadow = true;

// Tip at bottom of axle (small sphere for contact point)
const tipGeom = new THREE.SphereGeometry(0.04, 16, 16);
const tipMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9, roughness: 0.1 });
const tip = new THREE.Mesh(tipGeom, tipMat);
tip.position.y = -1.25;
axle.add(tip);

// Outer gimbal ring
const outerRingGeom = new THREE.TorusGeometry(1.1, 0.05, 16, 64);
const outerRingMat = new THREE.MeshStandardMaterial({
  color: 0xFFD700,
  metalness: 0.9,
  roughness: 0.1
});
const outerRing = new THREE.Mesh(outerRingGeom, outerRingMat);
outerRing.castShadow = true;

// Small connecting brackets between ring and axle
const bracketMat = new THREE.MeshStandardMaterial({ color: 0xDDAA00, metalness: 0.8, roughness: 0.2 });
for (let i = 0; i < 2; i++) {
  const bracketGeom = new THREE.CylinderGeometry(0.025, 0.025, 0.25, 8);
  const bracket = new THREE.Mesh(bracketGeom, bracketMat);
  bracket.rotation.z = Math.PI / 2;
  bracket.position.x = (i === 0 ? 1 : -1) * 0.95;
  outerRing.add(bracket);
}

// The rotor and outer ring are in the XZ plane (default torus orientation)
// The axle is along Y axis
// We need the rotor to spin around the Y axis (the axle axis)

// Create an inner assembly that will spin (rotor + visual elements)
const spinGroup = new THREE.Group();
spinGroup.add(rotor);

// The axle, outer ring, and spin group are all in the gyroscope body
// Position them: axle center at origin of gyroscopeGroup, 
// bottom of axle at local y = -1.25, top at y = +1.25
// The rotor sits at the center (y=0)

gyroscopeGroup.add(axle);
gyroscopeGroup.add(spinGroup); // rotor spins
gyroscopeGroup.add(outerRing);

scene.add(pivotGroup);

// ============================================================
// Small decorative elements on platform
// ============================================================

// Small contact point marker on platform
const markerGeom = new THREE.CylinderGeometry(0.06, 0.06, 0.01, 16);
const markerMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.5 });
const marker = new THREE.Mesh(markerGeom, markerMat);
marker.position.y = 0.005;
scene.add(marker);

// ============================================================
// Clock
// ============================================================
const clock = new THREE.Clock();

// ============================================================
// Helper functions
// ============================================================
function computePrecessionRate(spinSpeed) {
  if (spinSpeed < 0.5) {
    // Unstable - cap precession
    if (spinSpeed < 0.01) return MAX_PRECESSION;
    return Math.min((m * g * d) / (I * spinSpeed), MAX_PRECESSION);
  }
  return (m * g * d) / (I * spinSpeed);
}

function updateGyroscope(dt) {
  const spinSpeed = STATE.spinSpeed;
  const precRate = computePrecessionRate(spinSpeed);
  STATE.precessionRate = precRate;
  STATE.isUnstable = spinSpeed < 0.5;

  // Update elapsed time
  elapsedTime += dt;
  STATE.elapsedTime = elapsedTime;

  // Update rotor spin angle
  rotorAngle += spinSpeed * dt;
  STATE.rotorAngle = rotorAngle;

  // Update precession angle
  precessionAngle += precRate * dt;
  // Keep in 0-2PI
  precessionAngle = precessionAngle % (Math.PI * 2);
  if (precessionAngle < 0) precessionAngle += Math.PI * 2;
  STATE.precessionAngleDeg = (precessionAngle * 180 / Math.PI) % 360;

  // Nutation
  const nutationOffset = STATE.nutationAmplitude * Math.sin(elapsedTime * 5);
  const currentTiltRad = baseTiltRad + nutationOffset;
  STATE.tiltAngleDeg = currentTiltRad * 180 / Math.PI;
  STATE.baseTiltDeg = baseTiltRad * 180 / Math.PI;

  // Apply transforms
  // The pivot is at the platform surface (y=0)
  // The gyroscope group's origin is at the tip
  // We need to:
  // 1. Rotate the whole assembly around Y for precession
  // 2. Tilt the gyroscope by the tilt angle
  // 3. The bottom of the axle should be at the pivot point

  // Reset pivot rotation
  pivotGroup.rotation.y = precessionAngle;

  // The gyroscope group: tilt from vertical
  // The axle goes from y=-1.25 to y=+1.25 in local coords
  // We want the bottom tip (y=-1.25 local) to be at the pivot (y=0 world on platform)
  // So we offset the gyroscope group up by 1.25, then tilt

  // Reset gyroscope group
  gyroscopeGroup.rotation.set(0, 0, 0);
  gyroscopeGroup.position.set(0, 0, 0);

  // First, position so that the center is at y=1.25 (bottom of axle at y=0)
  gyroscopeGroup.position.y = 1.25;

  // Now tilt around the pivot point (which is at y=0 in pivotGroup space)
  // We need to tilt around a point at the bottom of the axle
  // To do this: translate down to pivot, rotate, translate back
  // Or use a nested group approach

  // Actually, let's restructure: put the gyroscope parts so that the tip is at origin
  // Then tilt the group around X axis at origin

  // Reposition parts relative to tip at origin:
  // axle center should be at y=1.25
  axle.position.y = 1.25;
  spinGroup.position.y = 1.25; // rotor at center of axle
  outerRing.position.y = 1.25;

  // Now gyroscope group origin is at the tip
  gyroscopeGroup.position.y = 0;

  // Tilt around Z axis (so it leans in the X direction)
  gyroscopeGroup.rotation.z = -currentTiltRad;

  // Spin the rotor around its local Y axis (the axle axis)
  spinGroup.rotation.y = rotorAngle;

  // Update pivot position on platform
  pivotGroup.position.y = 0; // tip on platform surface

  // Update world position for state
  const worldPos = new THREE.Vector3();
  gyroscopeGroup.getWorldPosition(worldPos);
  STATE.gyroscopePosition = { x: worldPos.x, y: worldPos.y, z: worldPos.z };
}

// ============================================================
// UI Updates
// ============================================================
function updateHUD() {
  document.getElementById('hudSpin').textContent = STATE.spinSpeed.toFixed(2) + ' rad/s';
  
  const precEl = document.getElementById('hudPrec');
  precEl.textContent = STATE.precessionRate.toFixed(3) + ' rad/s';
  precEl.className = STATE.isUnstable ? 'value unstable' : 'value';
  
  document.getElementById('hudTilt').textContent = STATE.tiltAngleDeg.toFixed(2) + '°';
  document.getElementById('hudPrecAngle').textContent = STATE.precessionAngleDeg.toFixed(2) + '°';
  document.getElementById('hudTime').textContent = STATE.elapsedTime.toFixed(2) + ' s';
  
  const statusEl = document.getElementById('hudStatus');
  if (STATE.paused) {
    statusEl.textContent = '⏸ Paused';
    statusEl.className = 'value paused-indicator';
  } else if (STATE.isUnstable) {
    statusEl.textContent = '⚠ Unstable!';
    statusEl.className = 'value unstable';
  } else {
    statusEl.textContent = '▶ Running';
    statusEl.className = 'value';
  }
}

// ============================================================
// Event Listeners
// ============================================================
const spinSlider = document.getElementById('spinSlider');
const spinValueDisplay = document.getElementById('spinValue');

spinSlider.addEventListener('input', function() {
  STATE.spinSpeed = parseFloat(this.value);
  spinValueDisplay.textContent = STATE.spinSpeed.toFixed(1);
});

document.getElementById('tiltBtn').addEventListener('click', function() {
  const newTiltDeg = STATE.baseTiltDeg + 5;
  if (newTiltDeg <= 60) {
    baseTiltRad = newTiltDeg * Math.PI / 180;
    STATE.baseTiltDeg = newTiltDeg;
  }
});

document.getElementById('resetBtn').addEventListener('click', function() {
  STATE.spinSpeed = 10;
  baseTiltRad = 20 * Math.PI / 180;
  STATE.baseTiltDeg = 20;
  precessionAngle = 0;
  STATE.precessionAngleDeg = 0;
  rotorAngle = 0;
  STATE.rotorAngle = 0;
  elapsedTime = 0;
  STATE.elapsedTime = 0;
  STATE.paused = false;

  spinSlider.value = 10;
  spinValueDisplay.textContent = '10';

  clock.getDelta(); // flush accumulated delta
});

document.addEventListener('keydown', function(e) {
  if (e.code === 'Space') {
    e.preventDefault();
    STATE.paused = !STATE.paused;
    if (!STATE.paused) {
      clock.getDelta(); // flush delta accumulated during pause
    }
  }
});

window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// Animation Loop
// ============================================================
function animate() {
  requestAnimationFrame(animate);

  const dt = clock.getDelta();

  if (!STATE.paused) {
    updateGyroscope(dt);
  }

  controls.update();
  updateHUD();
  renderer.render(scene, camera);
}

// Initialize gyroscope position
updateGyroscope(0);
animate();
</script>
</body>
</html>
