<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gyroscope Precession Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.6);
            color: #ffffff;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.6;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            min-width: 220px;
        }
        #controls {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            width: 250px;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #45a049;
        }
        #resetBtn {
            background-color: #f44336;
        }
        #resetBtn:hover {
            background-color: #da190b;
        }
        .instructions {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="hud">
        <div style="font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #555; padding-bottom: 5px;">Telemetry</div>
        <div id="hud-spin">Spin Speed: 0.0 rad/s</div>
        <div id="hud-precession">Precession: 0.000 rad/s</div>
        <div id="hud-tilt">Tilt Angle: 0.0°</div>
        <div id="hud-prec-angle">Precession Angle: 0.0°</div>
        <div id="hud-status" style="margin-top: 5px; font-weight: bold; color: #4CAF50;">Status: RUNNING</div>
    </div>

    <div id="controls">
        <div class="control-group">
            <label for="spinSlider">Spin Speed (rad/s): <span id="spinVal">10.0</span></label>
            <input type="range" id="spinSlider" min="0" max="30" step="0.5" value="10">
        </div>
        <div class="control-group">
            <button id="tiltBtn">Increase Tilt (+5°)</button>
        </div>
        <div class="control-group">
            <button id="resetBtn">Reset Simulation</button>
        </div>
        <div class="instructions">
            Left Click + Drag to Orbit<br>
            Scroll to Zoom<br>
            Press SPACE to Pause/Resume
        </div>
    </div>

    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        scene.fog = new THREE.FogExp2(0x222222, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 4, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1; // Allow looking slightly below platform
        controls.minDistance = 3;
        controls.maxDistance = 20;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        // --- Platform ---
        const platformGeo = new THREE.CylinderGeometry(3, 3, 0.2, 64);
        const platformMat = new THREE.MeshStandardMaterial({ 
            color: 0x8B4513,
            roughness: 0.8,
            metalness: 0.1
        });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = -0.1; // Top surface at y=0
        platform.receiveShadow = true;
        scene.add(platform);

        // Grid helper for scale
        const grid = new THREE.GridHelper(6, 12, 0x000000, 0x000000);
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        scene.add(grid);

        // --- Gyroscope Model ---
        // Hierarchy: precessionGroup (y-rot) -> tiltGroup (z-rot) -> gyroGroup (offset) -> parts
        const precessionGroup = new THREE.Group();
        scene.add(precessionGroup);

        const tiltGroup = new THREE.Group();
        precessionGroup.add(tiltGroup);

        const gyroGroup = new THREE.Group();
        // Axle is 2.5 high. To make bottom tip touch 0, shift up by 1.25
        gyroGroup.position.y = 1.25; 
        tiltGroup.add(gyroGroup);

        // Axle
        const axleGeo = new THREE.CylinderGeometry(0.03, 0.03, 2.5, 16);
        const axleMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5, metalness: 0.8 });
        const axle = new THREE.Mesh(axleGeo, axleMat);
        axle.castShadow = true;
        gyroGroup.add(axle);

        // Rotor (Flywheel)
        const rotorContainer = new THREE.Group();
        gyroGroup.add(rotorContainer);

        const rotorGeo = new THREE.TorusGeometry(0.8, 0.1, 32, 64);
        const rotorMat = new THREE.MeshStandardMaterial({ color: 0xC0C0C0, roughness: 0.3, metalness: 0.9 });
        const rotor = new THREE.Mesh(rotorGeo, rotorMat);
        rotor.rotation.x = Math.PI / 2; // Align with XZ plane
        rotor.castShadow = true;
        rotorContainer.add(rotor);

        // Outer Gimbal Ring
        const ringGeo = new THREE.TorusGeometry(1.1, 0.05, 16, 64);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, roughness: 0.4, metalness: 0.7 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2; // Align with XZ plane
        ring.castShadow = true;
        gyroGroup.add(ring);

        // --- Physics State & Constants ---
        const m = 1;
        const g = 9.81;
        const d = 0.5;
        const I = 0.5;
        const nutationAmplitude = 0.03;

        let spinSpeed = 10;
        let baseTiltDeg = 20;
        let precessionAngle = 0;
        let rotorAngle = 0;
        let elapsedTime = 0;
        let isPaused = false;

        // --- UI Elements ---
        const spinSlider = document.getElementById('spinSlider');
        const spinValDisplay = document.getElementById('spinVal');
        const tiltBtn = document.getElementById('tiltBtn');
        const resetBtn = document.getElementById('resetBtn');

        const hudSpin = document.getElementById('hud-spin');
        const hudPrecession = document.getElementById('hud-precession');
        const hudTilt = document.getElementById('hud-tilt');
        const hudPrecAngle = document.getElementById('hud-prec-angle');
        const hudStatus = document.getElementById('hud-status');

        // --- Event Listeners ---
        spinSlider.addEventListener('input', (e) => {
            spinSpeed = parseFloat(e.target.value);
            spinValDisplay.textContent = spinSpeed.toFixed(1);
        });

        tiltBtn.addEventListener('click', () => {
            baseTiltDeg += 5;
            if (baseTiltDeg > 60) baseTiltDeg = 60;
        });

        resetBtn.addEventListener('click', () => {
            spinSpeed = 10;
            spinSlider.value = 10;
            spinValDisplay.textContent = "10.0";
            baseTiltDeg = 20;
            precessionAngle = 0;
            rotorAngle = 0;
            elapsedTime = 0;
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                isPaused = !isPaused;
                hudStatus.textContent = `Status: ${isPaused ? 'PAUSED' : 'RUNNING'}`;
                hudStatus.style.color = isPaused ? '#f44336' : '#4CAF50';
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Global State Object ---
        window.__3D_STATE__ = {};

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (!isPaused) {
                elapsedTime += delta;

                const isUnstable = spinSpeed < 0.5;
                let precessionRate = 0;

                if (isUnstable) {
                    precessionRate = 5; // Capped instability
                } else {
                    // omega_p = (m * g * d) / (I * omega_s)
                    precessionRate = (m * g * d) / (I * spinSpeed);
                }

                // Update angles
                precessionAngle += precessionRate * delta;
                rotorAngle += spinSpeed * delta;

                // Calculate current tilt with nutation
                const baseTiltRad = THREE.MathUtils.degToRad(baseTiltDeg);
                const currentTiltRad = baseTiltRad + nutationAmplitude * Math.sin(elapsedTime * 5);

                // Apply rotations
                precessionGroup.rotation.y = precessionAngle;
                tiltGroup.rotation.z = currentTiltRad;
                rotorContainer.rotation.y = rotorAngle;

                // Update HUD
                const currentTiltDeg = THREE.MathUtils.radToDeg(currentTiltRad);
                const precAngleDeg = (THREE.MathUtils.radToDeg(precessionAngle) % 360 + 360) % 360;

                hudSpin.textContent = `Spin Speed: ${spinSpeed.toFixed(1)} rad/s`;
                hudPrecession.textContent = `Precession: ${precessionRate.toFixed(3)} rad/s`;
                hudTilt.textContent = `Tilt Angle: ${currentTiltDeg.toFixed(1)}°`;
                hudPrecAngle.textContent = `Precession Angle: ${precAngleDeg.toFixed(1)}°`;

                // Update Global State
                const worldPos = new THREE.Vector3();
                gyroGroup.getWorldPosition(worldPos);

                window.__3D_STATE__ = {
                    spinSpeed: spinSpeed,
                    precessionRate: precessionRate,
                    tiltAngleDeg: currentTiltDeg,
                    baseTiltDeg: baseTiltDeg,
                    precessionAngleDeg: precAngleDeg,
                    rotorAngle: rotorAngle,
                    paused: isPaused,
                    elapsedTime: elapsedTime,
                    gyroscopePosition: { x: worldPos.x, y: worldPos.y, z: worldPos.z },
                    nutationAmplitude: nutationAmplitude,
                    isUnstable: isUnstable
                };
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize state and start
        tiltGroup.rotation.z = THREE.MathUtils.degToRad(baseTiltDeg);
        animate();

    </script>
</body>
</html>
