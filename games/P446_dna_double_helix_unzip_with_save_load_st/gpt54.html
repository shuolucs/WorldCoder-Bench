<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D DNA Double Helix Education Tool</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      background: rgba(0,0,0,0.35);
      padding: 12px;
      border-radius: 8px;
      z-index: 10;
      line-height: 1.6;
      min-width: 220px;
    }

    #controls {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    button {
      color: white;
      background: #333;
      border: none;
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 4px;
    }

    button:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="unzipDisplay">Unzipped: 0 / 20</div>
    <div id="pairDisplay">Current Pair: A-T</div>
    <div id="speedDisplay">Rotation Speed: 0.010</div>
    <div id="stateDisplay">State: Ready</div>
    <div id="controls">
      <button id="btnSave">Save State</button>
      <button id="btnLoad">Load State</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const TOTAL_PAIRS = 20;
    const BASE_LABELS = ['A-T', 'T-A', 'G-C', 'C-G'];
    const SAVE_KEY = 'dna_save_state';

    let scene, camera, renderer, controls;
    let dnaGroup;
    let rotationSpeed = 0.01;
    let unzipCount = 0;
    let saveStateLabel = 'Ready';
    let animating = false;

    const pairObjects = [];
    const activeAnimations = [];

    const unzipDisplay = document.getElementById('unzipDisplay');
    const pairDisplay = document.getElementById('pairDisplay');
    const speedDisplay = document.getElementById('speedDisplay');
    const stateDisplay = document.getElementById('stateDisplay');
    const btnSave = document.getElementById('btnSave');
    const btnLoad = document.getElementById('btnLoad');

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color('#1a1a2e');

      camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 0, 30);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 0, 0);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(5, 10, 7);
      scene.add(directionalLight);

      dnaGroup = new THREE.Group();
      scene.add(dnaGroup);

      buildDNA();

      window.addEventListener('resize', onWindowResize);
      window.addEventListener('keydown', onKeyDown);

      btnSave.addEventListener('click', saveState);
      btnLoad.addEventListener('click', loadState);

      updateHUD();
      update3DState();
    }

    function buildDNA() {
      const sphereGeometry = new THREE.SphereGeometry(0.2, 16, 16);
      const blueMaterial = new THREE.MeshStandardMaterial({ color: '#4488ff' });
      const redMaterial = new THREE.MeshStandardMaterial({ color: '#ff4444' });
      const bondMaterial = new THREE.MeshStandardMaterial({ color: '#44ff88' });

      for (let i = 0; i < TOTAL_PAIRS; i++) {
        const angle = THREE.MathUtils.degToRad(i * 36);
        const angleB = angle + Math.PI;
        const y = i * 0.8 - 8;

        const ax = 2 * Math.cos(angle);
        const az = 2 * Math.sin(angle);
        const bx = 2 * Math.cos(angleB);
        const bz = 2 * Math.sin(angleB);

        const sphereA = new THREE.Mesh(sphereGeometry, blueMaterial.clone());
        sphereA.position.set(ax, y, az);

        const sphereB = new THREE.Mesh(sphereGeometry, redMaterial.clone());
        sphereB.position.set(bx, y, bz);

        const startA = new THREE.Vector3(ax, y, az);
        const startB = new THREE.Vector3(bx, y, bz);

        const bond = createBond(startA, startB, bondMaterial.clone());

        dnaGroup.add(sphereA);
        dnaGroup.add(sphereB);
        dnaGroup.add(bond);

        const center = new THREE.Vector3().addVectors(startA, startB).multiplyScalar(0.5);
        const outwardA = new THREE.Vector3(ax - center.x, 0, az - center.z).normalize();
        const outwardB = new THREE.Vector3(bx - center.x, 0, bz - center.z).normalize();

        pairObjects.push({
          index: i,
          label: BASE_LABELS[i % BASE_LABELS.length],
          sphereA,
          sphereB,
          bond,
          zipped: true,
          basePosA: startA.clone(),
          basePosB: startB.clone(),
          outwardA,
          outwardB,
          unzipOffset: 0
        });
      }
    }

    function createBond(start, end, material) {
      const direction = new THREE.Vector3().subVectors(end, start);
      const length = direction.length();
      const geometry = new THREE.CylinderGeometry(0.06, 0.06, length, 10);

      const bond = new THREE.Mesh(geometry, material);
      const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      bond.position.copy(midpoint);

      const axis = new THREE.Vector3(0, 1, 0);
      bond.quaternion.setFromUnitVectors(axis, direction.clone().normalize());

      return bond;
    }

    function updateBond(pair) {
      const start = pair.sphereA.position.clone();
      const end = pair.sphereB.position.clone();
      const direction = new THREE.Vector3().subVectors(end, start);
      const length = direction.length();

      if (!Number.isFinite(length) || length <= 0.0001) return;

      pair.bond.visible = pair.zipped;

      if (!pair.zipped) return;

      pair.bond.position.copy(start.clone().add(end).multiplyScalar(0.5));
      pair.bond.scale.set(1, 1, 1);
      pair.bond.geometry.dispose();
      pair.bond.geometry = new THREE.CylinderGeometry(0.06, 0.06, length, 10);

      const axis = new THREE.Vector3(0, 1, 0);
      pair.bond.quaternion.setFromUnitVectors(axis, direction.normalize());
    }

    function animatePair(index, targetOffset, targetZipped, duration = 500) {
      if (index < 0 || index >= TOTAL_PAIRS || animating) return;

      const pair = pairObjects[index];
      animating = true;

      activeAnimations.push({
        pair,
        startOffset: pair.unzipOffset,
        endOffset: targetOffset,
        startTime: performance.now(),
        duration,
        targetZipped
      });
    }

    function unzipNextPair() {
      if (animating || unzipCount >= TOTAL_PAIRS) return;

      const index = TOTAL_PAIRS - 1 - unzipCount;
      animatePair(index, 3, false, 500);
      unzipCount = clampInt(unzipCount + 1, 0, TOTAL_PAIRS);
      saveStateLabel = 'Ready';
      updateHUD();
    }

    function rezipLastPair() {
      if (animating || unzipCount <= 0) return;

      const index = TOTAL_PAIRS - unzipCount;
      animatePair(index, 0, true, 500);
      unzipCount = clampInt(unzipCount - 1, 0, TOTAL_PAIRS);
      saveStateLabel = 'Ready';
      updateHUD();
    }

    function resetAllPairs() {
      if (animating) return;

      const indices = [];
      for (let i = 0; i < TOTAL_PAIRS; i++) {
        if (!pairObjects[i].zipped || pairObjects[i].unzipOffset > 0.001) {
          indices.push(i);
        }
      }

      if (indices.length === 0) {
        unzipCount = 0;
        saveStateLabel = 'Ready';
        updateHUD();
        return;
      }

      animateResetSequence(indices);
    }

    function animateResetSequence(indices) {
      if (indices.length === 0) {
        unzipCount = 0;
        saveStateLabel = 'Ready';
        updateHUD();
        return;
      }

      if (animating) return;

      const idx = indices.shift();
      const pair = pairObjects[idx];
      if (pair.unzipOffset > 0.001 || !pair.zipped) {
        if (unzipCount > 0) unzipCount = clampInt(unzipCount - 1, 0, TOTAL_PAIRS);
        animatePair(idx, 0, true, 500);
        const checkDone = () => {
          if (!animating) {
            animateResetSequence(indices);
          } else {
            requestAnimationFrame(checkDone);
          }
        };
        checkDone();
      } else {
        animateResetSequence(indices);
      }
    }

    function applyPairOffset(pair, offset, zippedStateIfFinal = null, isFinal = false) {
      const posA = pair.basePosA.clone().add(pair.outwardA.clone().multiplyScalar(offset));
      const posB = pair.basePosB.clone().add(pair.outwardB.clone().multiplyScalar(offset));

      if (isFiniteVector(posA) && isFiniteVector(posB)) {
        pair.sphereA.position.copy(posA);
        pair.sphereB.position.copy(posB);
      }

      pair.unzipOffset = Number.isFinite(offset) ? offset : 0;

      if (isFinal && zippedStateIfFinal !== null) {
        pair.zipped = zippedStateIfFinal;
      }

      if (!pair.zipped && pair.unzipOffset > 0.001) {
        pair.bond.visible = false;
      } else {
        pair.bond.visible = true;
      }

      updateBond(pair);
    }

    function updateAnimations(now) {
      if (activeAnimations.length === 0) {
        animating = false;
        return;
      }

      for (let i = activeAnimations.length - 1; i >= 0; i--) {
        const anim = activeAnimations[i];
        const elapsed = now - anim.startTime;
        const t = Math.min(elapsed / anim.duration, 1);
        const eased = easeInOutQuad(t);
        const currentOffset = THREE.MathUtils.lerp(anim.startOffset, anim.endOffset, eased);

        if (anim.endOffset > anim.startOffset) {
          anim.pair.zipped = false;
        }

        applyPairOffset(anim.pair, currentOffset);

        if (t >= 1) {
          applyPairOffset(anim.pair, anim.endOffset, anim.targetZipped, true);
          activeAnimations.splice(i, 1);
        }
      }

      animating = activeAnimations.length > 0;
    }

    function setInstantStateFromUnzipCount(count) {
      unzipCount = clampInt(count, 0, TOTAL_PAIRS);

      for (let i = 0; i < TOTAL_PAIRS; i++) {
        const shouldBeUnzipped = i >= TOTAL_PAIRS - unzipCount;
        const pair = pairObjects[i];
        pair.zipped = !shouldBeUnzipped;
        const offset = shouldBeUnzipped ? 3 : 0;
        applyPairOffset(pair, offset, !shouldBeUnzipped, true);
      }
    }

    function saveState() {
      const payload = {
        unzipCount: clampInt(unzipCount, 0, TOTAL_PAIRS),
        cameraPosition: {
          x: finiteOrDefault(camera.position.x, 0),
          y: finiteOrDefault(camera.position.y, 0),
          z: finiteOrDefault(camera.position.z, 30)
        },
        rotationSpeed: clampNumber(rotationSpeed, 0.0, 0.05)
      };

      localStorage.setItem(SAVE_KEY, JSON.stringify(payload));
      saveStateLabel = 'Saved';
      updateHUD();
      update3DState();
    }

    function loadState() {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return;

      try {
        const data = JSON.parse(raw);

        activeAnimations.length = 0;
        animating = false;

        const loadedCount = clampInt(data.unzipCount, 0, TOTAL_PAIRS);
        const loadedSpeed = clampNumber(data.rotationSpeed, 0.0, 0.05);

        rotationSpeed = loadedSpeed;
        setInstantStateFromUnzipCount(loadedCount);

        if (data.cameraPosition) {
          const x = finiteOrDefault(data.cameraPosition.x, 0);
          const y = finiteOrDefault(data.cameraPosition.y, 0);
          const z = finiteOrDefault(data.cameraPosition.z, 30);
          camera.position.set(x, y, z);
        }

        controls.update();
        saveStateLabel = 'Loaded';
        updateHUD();
        update3DState();
      } catch (e) {
        console.error('Failed to load DNA save state:', e);
      }
    }

    function onKeyDown(event) {
      if (event.code === 'Space') {
        event.preventDefault();
        unzipNextPair();
      } else if (event.code === 'Backspace') {
        event.preventDefault();
        rezipLastPair();
      } else if (event.key === 'r' || event.key === 'R') {
        resetAllPairs();
      } else if (event.key === 's' || event.key === 'S') {
        saveState();
      } else if (event.key === 'l' || event.key === 'L') {
        loadState();
      } else if (event.code === 'ArrowUp') {
        rotationSpeed = clampNumber(rotationSpeed + 0.005, 0.0, 0.05);
        saveStateLabel = 'Ready';
        updateHUD();
      } else if (event.code === 'ArrowDown') {
        rotationSpeed = clampNumber(rotationSpeed - 0.005, 0.0, 0.05);
        saveStateLabel = 'Ready';
        updateHUD();
      }
    }

    function updateHUD() {
      unzipCount = clampInt(unzipCount, 0, TOTAL_PAIRS);
      rotationSpeed = clampNumber(rotationSpeed, 0.0, 0.05);

      unzipDisplay.textContent = `Unzipped: ${unzipCount} / 20`;

      if (unzipCount === 0) {
        pairDisplay.textContent = `Current Pair: ${pairObjects[TOTAL_PAIRS - 1]?.label || 'A-T'}`;
      } else if (unzipCount >= TOTAL_PAIRS) {
        pairDisplay.textContent = 'All Unzipped';
      } else {
        const nextIndex = TOTAL_PAIRS - 1 - unzipCount;
        const label = pairObjects[nextIndex]?.label || '';
        pairDisplay.textContent = `Current Pair: ${label}`;
      }

      if (unzipCount === 0 && pairObjects.every(p => p.zipped)) {
        const nextIndex = TOTAL_PAIRS - 1;
        pairDisplay.textContent = pairObjects.length
          ? `Current Pair: ${pairObjects[nextIndex].label}`
          : 'All Zipped';
      }

      speedDisplay.textContent = `Rotation Speed: ${rotationSpeed.toFixed(3)}`;
      stateDisplay.textContent = `State: ${saveStateLabel}`;
    }

    function update3DState() {
      const pairStates = pairObjects.map((pair, i) => {
        const shouldBeZipped = i < TOTAL_PAIRS - unzipCount;
        pair.zipped = shouldBeZipped ? pair.unzipOffset < 0.001 : false;
        if (shouldBeZipped && pair.unzipOffset < 0.001) pair.zipped = true;
        if (!shouldBeZipped && pair.unzipOffset > 0.001) pair.zipped = false;
        return pair.zipped;
      });

      const trueCount = pairStates.filter(Boolean).length;
      const correctedTrueCount = TOTAL_PAIRS - unzipCount;

      if (trueCount !== correctedTrueCount) {
        for (let i = 0; i < TOTAL_PAIRS; i++) {
          const shouldBeUnzipped = i >= TOTAL_PAIRS - unzipCount;
          pairStates[i] = !shouldBeUnzipped;
        }
      }

      const nextPairIndex = unzipCount >= TOTAL_PAIRS ? null : TOTAL_PAIRS - 1 - unzipCount;

      window.__3D_STATE__ = {
        unzipCount: clampInt(unzipCount, 0, TOTAL_PAIRS),
        totalPairs: TOTAL_PAIRS,
        rotationSpeed: clampNumber(rotationSpeed, 0.0, 0.05),
        basePairLabels: pairObjects.map(p => p.label),
        pairStates,
        saveState: saveStateLabel,
        cameraPosition: {
          x: finiteOrDefault(camera.position.x, 0),
          y: finiteOrDefault(camera.position.y, 0),
          z: finiteOrDefault(camera.position.z, 30)
        },
        hasSaveData: !!localStorage.getItem(SAVE_KEY),
        nextPairIndex,
        animating
      };
    }

    function animate(now = performance.now()) {
      requestAnimationFrame(animate);

      updateAnimations(now);

      dnaGroup.rotation.y += clampNumber(rotationSpeed, 0.0, 0.05);

      controls.update();

      for (const pair of pairObjects) {
        updateBond(pair);
      }

      updateHUD();
      update3DState();

      renderer.render(scene, camera);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function easeInOutQuad(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function clampNumber(value, min, max) {
      value = Number(value);
      if (!Number.isFinite(value)) value = min;
      return Math.min(max, Math.max(min, value));
    }

    function clampInt(value, min, max) {
      value = Math.round(Number(value));
      if (!Number.isFinite(value)) value = min;
      return Math.min(max, Math.max(min, value));
    }

    function finiteOrDefault(value, fallback) {
      return Number.isFinite(value) ? value : fallback;
    }

    function isFiniteVector(v) {
      return Number.isFinite(v.x) && Number.isFinite(v.y) && Number.isFinite(v.z);
    }
  </script>
</body>
</html>
