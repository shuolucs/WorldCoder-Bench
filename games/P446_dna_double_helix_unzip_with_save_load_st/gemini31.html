<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D DNA Double Helix</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            background: rgba(26, 26, 46, 0.85);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: none;
            z-index: 10;
            min-width: 220px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .hud-line {
            margin-bottom: 8px;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        .btn-container {
            margin-top: 15px;
            pointer-events: auto;
            display: flex;
            gap: 10px;
        }
        button {
            background: #333;
            color: white;
            border: 1px solid #666;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background: #555;
        }
        button:active {
            transform: scale(0.95);
        }
        #instructions {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            pointer-events: none;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="unzipDisplay" class="hud-line">Unzipped: 0 / 20</div>
        <div id="pairDisplay" class="hud-line">Current Pair: A-T</div>
        <div id="speedDisplay" class="hud-line">Rotation Speed: 0.010</div>
        <div id="stateDisplay" class="hud-line">State: Ready</div>
        <div class="btn-container">
            <button id="btnSave">Save State</button>
            <button id="btnLoad">Load State</button>
        </div>
    </div>

    <div id="instructions">
        Controls:<br>
        Space: Unzip next pair | Backspace: Re-zip last pair<br>
        R: Reset all | S: Save | L: Load<br>
        Up/Down Arrows: Adjust rotation speed<br>
        Mouse: Rotate/Zoom/Pan
    </div>

    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            unzipCount: 0,
            totalPairs: 20,
            rotationSpeed: 0.01,
            basePairLabels: [],
            pairStates: [],
            saveState: 'Ready',
            cameraPosition: { x: 0, y: 0, z: 30 },
            hasSaveData: false,
            nextPairIndex: 19,
            animating: false
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // --- DNA Construction ---
        const dnaGroup = new THREE.Group();
        scene.add(dnaGroup);

        const pairs = [];
        const labels = ['A-T', 'T-A', 'G-C', 'C-G'];
        const TOTAL_PAIRS = 20;

        const sphereGeo = new THREE.SphereGeometry(0.2, 32, 32);
        const matA = new THREE.MeshPhongMaterial({ color: 0x4488ff, shininess: 80 });
        const matB = new THREE.MeshPhongMaterial({ color: 0xff4444, shininess: 80 });
        const matConn = new THREE.MeshPhongMaterial({ color: 0x44ff88, shininess: 50 });
        
        // Cylinder geometry setup for easy scaling between two points
        const connGeo = new THREE.CylinderGeometry(0.06, 0.06, 1, 16);
        connGeo.translate(0, 0.5, 0);
        connGeo.rotateX(Math.PI / 2);

        for (let i = 0; i < TOTAL_PAIRS; i++) {
            const y = i * 0.8 - 8;
            const angleA = i * 36 * (Math.PI / 180);
            const angleB = angleA + Math.PI;

            const origA = new THREE.Vector3(2 * Math.cos(angleA), y, 2 * Math.sin(angleA));
            const origB = new THREE.Vector3(2 * Math.cos(angleB), y, 2 * Math.sin(angleB));

            // Calculate outward vectors for unzipping
            const outDirA = new THREE.Vector3(origA.x, 0, origA.z).normalize();
            const outDirB = new THREE.Vector3(origB.x, 0, origB.z).normalize();
            
            const targetA = origA.clone().add(outDirA.multiplyScalar(3));
            const targetB = origB.clone().add(outDirB.multiplyScalar(3));

            const meshA = new THREE.Mesh(sphereGeo, matA);
            meshA.position.copy(origA);
            dnaGroup.add(meshA);

            const meshB = new THREE.Mesh(sphereGeo, matB);
            meshB.position.copy(origB);
            dnaGroup.add(meshB);

            const connector = new THREE.Mesh(connGeo, matConn);
            dnaGroup.add(connector);

            const label = labels[i % 4];
            window.__3D_STATE__.basePairLabels.push(label);
            window.__3D_STATE__.pairStates.push(true);

            pairs.push({
                index: i,
                label: label,
                meshA, meshB, connector,
                origA, origB, targetA, targetB,
                progress: 1.0,       // 1.0 = fully zipped, 0.0 = fully unzipped
                targetProgress: 1.0
            });
        }

        // --- Logic & State Management ---
        let unzipCount = 0;
        let rotationSpeed = 0.01;
        let saveStateMsg = 'Ready';
        const clock = new THREE.Clock();

        function updateTargets() {
            pairs.forEach((p, i) => {
                // Unzip from top (index 19 downwards)
                p.targetProgress = (i >= TOTAL_PAIRS - unzipCount) ? 0.0 : 1.0;
            });
            updateHUD();
        }

        function updateHUD() {
            document.getElementById('unzipDisplay').innerText = `Unzipped: ${unzipCount} / 20`;
            
            let pairText = 'All Unzipped';
            if (unzipCount < TOTAL_PAIRS) {
                pairText = `Current Pair: ${pairs[TOTAL_PAIRS - 1 - unzipCount].label}`;
            }
            document.getElementById('pairDisplay').innerText = pairText;
            
            document.getElementById('speedDisplay').innerText = `Rotation Speed: ${rotationSpeed.toFixed(3)}`;
            document.getElementById('stateDisplay').innerText = `State: ${saveStateMsg}`;
        }

        function saveState() {
            const stateData = {
                unzipCount: unzipCount,
                rotSpeed: rotationSpeed,
                camPos: { x: camera.position.x, y: camera.position.y, z: camera.position.z }
            };
            localStorage.setItem('dna_save_state', JSON.stringify(stateData));
            saveStateMsg = 'Saved';
            updateHUD();
        }

        function loadState() {
            const data = localStorage.getItem('dna_save_state');
            if (data) {
                try {
                    const parsed = JSON.parse(data);
                    
                    // Validate and apply loaded data
                    if (Number.isFinite(parsed.unzipCount)) {
                        unzipCount = Math.max(0, Math.min(TOTAL_PAIRS, Math.floor(parsed.unzipCount)));
                    }
                    if (Number.isFinite(parsed.rotSpeed)) {
                        rotationSpeed = Math.max(0.0, Math.min(0.05, parsed.rotSpeed));
                    }
                    if (parsed.camPos && Number.isFinite(parsed.camPos.x) && Number.isFinite(parsed.camPos.y) && Number.isFinite(parsed.camPos.z)) {
                        camera.position.set(parsed.camPos.x, parsed.camPos.y, parsed.camPos.z);
                        controls.update();
                    }

                    // Instant visual update
                    pairs.forEach((p, i) => {
                        p.targetProgress = (i >= TOTAL_PAIRS - unzipCount) ? 0.0 : 1.0;
                        p.progress = p.targetProgress;
                        p.meshA.position.lerpVectors(p.targetA, p.origA, p.progress);
                        p.meshB.position.lerpVectors(p.targetB, p.origB, p.progress);
                    });

                    saveStateMsg = 'Loaded';
                    updateHUD();
                } catch (e) {
                    console.error("Failed to load state", e);
                }
            }
        }

        // --- Event Listeners ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'Space':
                    if (unzipCount < TOTAL_PAIRS) {
                        unzipCount++;
                        updateTargets();
                    }
                    break;
                case 'Backspace':
                    if (unzipCount > 0) {
                        unzipCount--;
                        updateTargets();
                    }
                    break;
                case 'KeyR':
                    unzipCount = 0;
                    updateTargets();
                    break;
                case 'KeyS':
                    saveState();
                    break;
                case 'KeyL':
                    loadState();
                    break;
                case 'ArrowUp':
                    rotationSpeed = Math.min(0.05, rotationSpeed + 0.005);
                    updateHUD();
                    break;
                case 'ArrowDown':
                    rotationSpeed = Math.max(0.0, rotationSpeed - 0.005);
                    updateHUD();
                    break;
            }
        });

        document.getElementById('btnSave').addEventListener('click', saveState);
        document.getElementById('btnLoad').addEventListener('click', loadState);

        // Initial HUD update
        updateHUD();

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            let isAnimating = false;

            // Auto-rotation
            dnaGroup.rotation.y += rotationSpeed;

            // Update pairs animation
            pairs.forEach((p, i) => {
                if (p.progress !== p.targetProgress) {
                    isAnimating = true;
                    // Animation duration is 0.5 seconds
                    const step = delta / 0.5; 
                    
                    if (p.targetProgress > p.progress) {
                        p.progress = Math.min(1.0, p.progress + step);
                    } else {
                        p.progress = Math.max(0.0, p.progress - step);
                    }

                    // Interpolate positions
                    p.meshA.position.lerpVectors(p.targetA, p.origA, p.progress);
                    p.meshB.position.lerpVectors(p.targetB, p.origB, p.progress);
                }

                // Update connector visibility and transform
                if (p.progress < 1.0) {
                    p.connector.visible = false;
                } else {
                    p.connector.visible = true;
                    const dist = p.meshA.position.distanceTo(p.meshB.position);
                    p.connector.position.copy(p.meshA.position);
                    p.connector.scale.set(1, 1, dist);
                    p.connector.lookAt(p.meshB.position);
                }
                
                // Update state array
                window.__3D_STATE__.pairStates[i] = (p.targetProgress === 1.0);
            });

            controls.update();
            renderer.render(scene, camera);

            // Update global state object
            window.__3D_STATE__.unzipCount = unzipCount;
            window.__3D_STATE__.rotationSpeed = rotationSpeed;
            window.__3D_STATE__.saveState = saveStateMsg;
            window.__3D_STATE__.cameraPosition = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
            window.__3D_STATE__.hasSaveData = !!localStorage.getItem('dna_save_state');
            window.__3D_STATE__.nextPairIndex = unzipCount < TOTAL_PAIRS ? TOTAL_PAIRS - 1 - unzipCount : null;
            window.__3D_STATE__.animating = isAnimating;
        }

        animate();
    </script>
</body>
</html>
