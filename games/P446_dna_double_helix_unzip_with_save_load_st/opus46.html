<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D DNA Double Helix Education Tool</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #ffffff;
    font-size: 14px;
    line-height: 1.8;
    background: rgba(0, 0, 0, 0.6);
    padding: 16px 20px;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    min-width: 240px;
    z-index: 10;
  }
  #hud div { margin-bottom: 4px; }
  #hud .label { color: #aaaacc; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
  #hud .value { color: #ffffff; font-size: 16px; font-weight: bold; }
  .btn-container { margin-top: 12px; display: flex; gap: 8px; }
  .btn-container button {
    color: white;
    background: #333;
    border: 1px solid #555;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
  }
  .btn-container button:hover { background: #555; }
  #controls-help {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: #888;
    font-size: 12px;
    line-height: 1.6;
    background: rgba(0, 0, 0, 0.5);
    padding: 12px 16px;
    border-radius: 8px;
    z-index: 10;
  }
  #controls-help span { color: #aaa; font-weight: bold; }
</style>
</head>
<body>

<div id="hud">
  <div><span class="label">Unzipped</span><br><span class="value" id="unzipDisplay">Unzipped: 0 / 20</span></div>
  <div><span class="label">Current Pair</span><br><span class="value" id="pairDisplay">All Zipped</span></div>
  <div><span class="label">Rotation Speed</span><br><span class="value" id="speedDisplay">Rotation Speed: 0.010</span></div>
  <div><span class="label">State</span><br><span class="value" id="stateDisplay">State: Ready</span></div>
  <div class="btn-container">
    <button id="btnSave">Save State</button>
    <button id="btnLoad">Load State</button>
  </div>
</div>

<div id="controls-help">
  <span>Space</span> Unzip next pair &nbsp;|&nbsp;
  <span>Backspace</span> Re-zip last pair &nbsp;|&nbsp;
  <span>R</span> Reset<br>
  <span>S</span> Save &nbsp;|&nbsp;
  <span>L</span> Load &nbsp;|&nbsp;
  <span>↑/↓</span> Rotation speed
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 30);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
  directionalLight.position.set(5, 10, 7);
  scene.add(directionalLight);

  // OrbitControls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;

  // DNA parameters
  const totalPairs = 20;
  const basePairTypes = ['A-T', 'T-A', 'G-C', 'C-G'];
  const basePairLabels = [];
  for (let i = 0; i < totalPairs; i++) {
    basePairLabels.push(basePairTypes[i % 4]);
  }

  let unzipCount = 0;
  let rotationSpeed = 0.01;
  let saveState = 'Ready';
  let animating = false;

  // DNA group
  const dnaGroup = new THREE.Group();
  scene.add(dnaGroup);

  // Materials
  const strandAMaterial = new THREE.MeshPhongMaterial({ color: 0x4488ff, shininess: 80 });
  const strandBMaterial = new THREE.MeshPhongMaterial({ color: 0xff4444, shininess: 80 });
  const bondMaterial = new THREE.MeshPhongMaterial({ color: 0x44ff88, shininess: 60 });
  const backboneMaterialA = new THREE.MeshPhongMaterial({ color: 0x3366cc, shininess: 60 });
  const backboneMaterialB = new THREE.MeshPhongMaterial({ color: 0xcc3333, shininess: 60 });

  // Geometries
  const sphereGeo = new THREE.SphereGeometry(0.2, 16, 16);
  const bondGeo = new THREE.CylinderGeometry(0.06, 0.06, 1, 8);
  const backboneGeo = new THREE.CylinderGeometry(0.08, 0.08, 1, 8);

  // Store base pair data
  const basePairs = [];

  // Build DNA
  for (let i = 0; i < totalPairs; i++) {
    const angle = i * (36 * Math.PI / 180);
    const y = i * 0.8 - 8;

    // Strand A position
    const axBase = 2 * Math.cos(angle);
    const azBase = 2 * Math.sin(angle);

    // Strand B position (180 degrees offset)
    const bxBase = 2 * Math.cos(angle + Math.PI);
    const bzBase = 2 * Math.sin(angle + Math.PI);

    // Strand A sphere
    const sphereA = new THREE.Mesh(sphereGeo, strandAMaterial);
    sphereA.position.set(axBase, y, azBase);
    dnaGroup.add(sphereA);

    // Strand B sphere
    const sphereB = new THREE.Mesh(sphereGeo, strandBMaterial);
    sphereB.position.set(bxBase, y, bzBase);
    dnaGroup.add(sphereB);

    // Bond connector (cylinder between A and B)
    const midX = (axBase + bxBase) / 2;
    const midZ = (azBase + bzBase) / 2;
    const dx = bxBase - axBase;
    const dz = bzBase - azBase;
    const dist = Math.sqrt(dx * dx + dz * dz);

    const bond = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.06, dist, 8),
      bondMaterial.clone()
    );
    bond.position.set(midX, y, midZ);
    // Rotate to align between A and B
    const bondAngle = Math.atan2(dz, dx);
    bond.rotation.z = Math.PI / 2;
    bond.rotation.x = -bondAngle;
    // Actually, let's use a simpler approach with lookAt
    bond.rotation.set(0, 0, 0);
    bond.position.set(midX, y, midZ);

    // Calculate proper rotation for the bond
    const direction = new THREE.Vector3(dx, 0, dz).normalize();
    const up = new THREE.Vector3(0, 1, 0);
    const quaternion = new THREE.Quaternion();
    quaternion.setFromUnitVectors(up, direction);
    bond.quaternion.copy(quaternion);

    dnaGroup.add(bond);

    // Base pair label spheres (small colored indicators for base types)
    const pairLabel = basePairLabels[i];
    let leftColor, rightColor;
    if (pairLabel === 'A-T') { leftColor = 0x00aaff; rightColor = 0xffaa00; }
    else if (pairLabel === 'T-A') { leftColor = 0xffaa00; rightColor = 0x00aaff; }
    else if (pairLabel === 'G-C') { leftColor = 0x00ff66; rightColor = 0xff6600; }
    else { leftColor = 0xff6600; rightColor = 0x00ff66; }

    const labelGeoSmall = new THREE.SphereGeometry(0.12, 8, 8);
    const labelA = new THREE.Mesh(labelGeoSmall, new THREE.MeshPhongMaterial({ color: leftColor }));
    const labelB = new THREE.Mesh(labelGeoSmall, new THREE.MeshPhongMaterial({ color: rightColor }));

    const t = 0.3;
    labelA.position.set(axBase + (bxBase - axBase) * t, y, azBase + (bzBase - azBase) * t);
    labelB.position.set(axBase + (bxBase - axBase) * (1 - t), y, azBase + (bzBase - azBase) * (1 - t));
    dnaGroup.add(labelA);
    dnaGroup.add(labelB);

    basePairs.push({
      index: i,
      sphereA: sphereA,
      sphereB: sphereB,
      bond: bond,
      labelA: labelA,
      labelB: labelB,
      baseAx: axBase,
      baseAz: azBase,
      baseBx: bxBase,
      baseBz: bzBase,
      y: y,
      zipped: true,
      animProgress: 0, // 0 = zipped, 1 = unzipped
      targetProgress: 0,
      label: pairLabel
    });
  }

  // Backbone connections (tubes between consecutive spheres on same strand)
  for (let i = 0; i < totalPairs - 1; i++) {
    const pairCurr = basePairs[i];
    const pairNext = basePairs[i + 1];

    // Strand A backbone
    createBackboneSegment(pairCurr.sphereA, pairNext.sphereA, backboneMaterialA, i, 'A');
    // Strand B backbone
    createBackboneSegment(pairCurr.sphereB, pairNext.sphereB, backboneMaterialB, i, 'B');
  }

  const backboneSegments = [];

  function createBackboneSegment(sphereFrom, sphereTo, material, index, strand) {
    const from = sphereFrom.position.clone();
    const to = sphereTo.position.clone();
    const mid = from.clone().add(to).multiplyScalar(0.5);
    const dist = from.distanceTo(to);

    const seg = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.05, dist, 6),
      material
    );
    seg.position.copy(mid);

    const dir = to.clone().sub(from).normalize();
    const quat = new THREE.Quaternion();
    quat.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
    seg.quaternion.copy(quat);

    dnaGroup.add(seg);
    backboneSegments.push({ mesh: seg, fromIndex: index, toIndex: index + 1, strand: strand });
  }

  // Animation system
  const animations = [];

  function animateUnzip(pairIndex) {
    const pair = basePairs[pairIndex];
    pair.targetProgress = 1;
    pair.zipped = false;
    animations.push({ pair: pair, direction: 1 });
  }

  function animateRezip(pairIndex) {
    const pair = basePairs[pairIndex];
    pair.targetProgress = 0;
    pair.zipped = true;
    animations.push({ pair: pair, direction: -1 });
  }

  function updateAnimations() {
    const speed = 0.04; // animation speed per frame (reaches 1.0 in ~25 frames = ~0.5s at 60fps)
    const toRemove = [];

    for (let a = 0; a < animations.length; a++) {
      const anim = animations[a];
      const pair = anim.pair;

      if (anim.direction > 0) {
        pair.animProgress = Math.min(1, pair.animProgress + speed);
        if (pair.animProgress >= 1) toRemove.push(a);
      } else {
        pair.animProgress = Math.max(0, pair.animProgress - speed);
        if (pair.animProgress <= 0) toRemove.push(a);
      }
    }

    // Remove completed animations (reverse order)
    for (let r = toRemove.length - 1; r >= 0; r--) {
      animations.splice(toRemove[r], 1);
    }

    animating = animations.length > 0;
  }

  function updateDNAPositions() {
    for (let i = 0; i < totalPairs; i++) {
      const pair = basePairs[i];
      const t = pair.animProgress;
      const offset = t * 3;

      // Calculate unzipped positions (move outward)
      const ax = pair.baseAx;
      const az = pair.baseAz;
      const bx = pair.baseBx;
      const bz = pair.baseBz;

      // Direction outward from center for each strand
      const dirAx = ax / 2; // normalized direction (since radius is 2)
      const dirAz = az / 2;
      const dirBx = bx / 2;
      const dirBz = bz / 2;

      pair.sphereA.position.x = ax + dirAx * offset;
      pair.sphereA.position.z = az + dirAz * offset;
      pair.sphereB.position.x = bx + dirBx * offset;
      pair.sphereB.position.z = bz + dirBz * offset;

      // Bond visibility
      pair.bond.visible = t < 0.5;
      pair.bond.material.opacity = 1 - t * 2;

      // Label positions
      const lt = 0.3;
      pair.labelA.position.x = pair.sphereA.position.x + (pair.sphereB.position.x - pair.sphereA.position.x) * lt;
      pair.labelA.position.z = pair.sphereA.position.z + (pair.sphereB.position.z - pair.sphereA.position.z) * lt;
      pair.labelB.position.x = pair.sphereA.position.x + (pair.sphereB.position.x - pair.sphereA.position.x) * (1 - lt);
      pair.labelB.position.z = pair.sphereA.position.z + (pair.sphereB.position.z - pair.sphereA.position.z) * (1 - lt);

      pair.labelA.visible = t < 0.8;
      pair.labelB.visible = t < 0.8;
    }

    // Update backbone segments
    for (const seg of backboneSegments) {
      const fromPair = basePairs[seg.fromIndex];
      const toPair = basePairs[seg.toIndex];

      let from, to;
      if (seg.strand === 'A') {
        from = fromPair.sphereA.position;
        to = toPair.sphereA.position;
      } else {
        from = fromPair.sphereB.position;
        to = toPair.sphereB.position;
      }

      const mid = from.clone().add(to).multiplyScalar(0.5);
      const dist = from.distanceTo(to);

      seg.mesh.position.copy(mid);
      seg.mesh.scale.y = dist / (basePairs[0].y - basePairs[1].y < 0 ? 
        from.distanceTo(to) : from.distanceTo(to));

      // Recalculate geometry scale
      const origDist = new THREE.Vector3(
        basePairs[seg.fromIndex].baseAx, basePairs[seg.fromIndex].y, basePairs[seg.fromIndex].baseAz
      ).distanceTo(new THREE.Vector3(
        basePairs[seg.toIndex].baseAx, basePairs[seg.toIndex].y, basePairs[seg.toIndex].baseAz
      ));
      seg.mesh.scale.y = dist / origDist;

      const dir = to.clone().sub(from).normalize();
      const quat = new THREE.Quaternion();
      quat.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
      seg.mesh.quaternion.copy(quat);
    }
  }

  // Unzip/rezip functions
  function unzipNext() {
    if (animating || unzipCount >= totalPairs) return;
    const pairIndex = totalPairs - 1 - unzipCount; // from top (index 19) downward
    animateUnzip(pairIndex);
    unzipCount++;
  }

  function rezipLast() {
    if (animating || unzipCount <= 0) return;
    unzipCount--;
    const pairIndex = totalPairs - 1 - unzipCount;
    animateRezip(pairIndex);
  }

  function resetAll() {
    if (animating) return;
    for (let i = 0; i < totalPairs; i++) {
      if (!basePairs[i].zipped) {
        animateRezip(i);
      }
    }
    unzipCount = 0;
  }

  function doSave() {
    const state = {
      unzipCount: unzipCount,
      cameraPosition: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
      rotationSpeed: rotationSpeed
    };
    localStorage.setItem('dna_save_state', JSON.stringify(state));
    saveState = 'Saved';
  }

  function doLoad() {
    const data = localStorage.getItem('dna_save_state');
    if (!data) return;
    try {
      const state = JSON.parse(data);

      // Restore rotation speed
      rotationSpeed = Math.max(0, Math.min(0.05, state.rotationSpeed || 0.01));

      // Restore camera
      if (state.cameraPosition) {
        camera.position.set(
          isFinite(state.cameraPosition.x) ? state.cameraPosition.x : 0,
          isFinite(state.cameraPosition.y) ? state.cameraPosition.y : 0,
          isFinite(state.cameraPosition.z) ? state.cameraPosition.z : 30
        );
      }

      // Restore unzip state instantly
      const targetUnzip = Math.max(0, Math.min(20, Math.round(state.unzipCount || 0)));

      // Reset all pairs instantly
      for (let i = 0; i < totalPairs; i++) {
        basePairs[i].zipped = true;
        basePairs[i].animProgress = 0;
        basePairs[i].targetProgress = 0;
      }

      // Unzip the correct pairs instantly
      for (let u = 0; u < targetUnzip; u++) {
        const pairIndex = totalPairs - 1 - u;
        basePairs[pairIndex].zipped = false;
        basePairs[pairIndex].animProgress = 1;
        basePairs[pairIndex].targetProgress = 1;
      }

      unzipCount = targetUnzip;
      animations.length = 0;
      animating = false;

      saveState = 'Loaded';
    } catch (e) {
      console.error('Failed to load state:', e);
    }
  }

  // Event listeners
  document.addEventListener('keydown', function(e) {
    switch (e.code) {
      case 'Space':
        e.preventDefault();
        unzipNext();
        break;
      case 'Backspace':
        e.preventDefault();
        rezipLast();
        break;
      case 'KeyR':
        resetAll();
        break;
      case 'KeyS':
        doSave();
        break;
      case 'KeyL':
        doLoad();
        break;
      case 'ArrowUp':
        e.preventDefault();
        rotationSpeed = Math.min(0.05, rotationSpeed + 0.005);
        rotationSpeed = Math.round(rotationSpeed * 1000) / 1000;
        break;
      case 'ArrowDown':
        e.preventDefault();
        rotationSpeed = Math.max(0.0, rotationSpeed - 0.005);
        rotationSpeed = Math.round(rotationSpeed * 1000) / 1000;
        break;
    }
  });

  document.getElementById('btnSave').addEventListener('click', doSave);
  document.getElementById('btnLoad').addEventListener('click', doLoad);

  // HUD elements
  const unzipDisplay = document.getElementById('unzipDisplay');
  const pairDisplay = document.getElementById('pairDisplay');
  const speedDisplay = document.getElementById('speedDisplay');
  const stateDisplay = document.getElementById('stateDisplay');

  function updateHUD() {
    unzipDisplay.textContent = 'Unzipped: ' + unzipCount + ' / 20';

    if (unzipCount === 0) {
      pairDisplay.textContent = 'All Zipped';
    } else if (unzipCount >= 20) {
      pairDisplay.textContent = 'All Unzipped';
    } else {
      const nextIndex = totalPairs - 1 - unzipCount;
      pairDisplay.textContent = 'Current Pair: ' + basePairLabels[nextIndex];
    }

    speedDisplay.textContent = 'Rotation Speed: ' + rotationSpeed.toFixed(3);
    stateDisplay.textContent = 'State: ' + saveState;
  }

  // Window state
  window.__3D_STATE__ = {};

  function updateWindowState() {
    const pairStates = [];
    for (let i = 0; i < totalPairs; i++) {
      pairStates.push(basePairs[i].zipped);
    }

    const nextPairIndex = unzipCount < totalPairs ? (totalPairs - 1 - unzipCount) : null;

    window.__3D_STATE__ = {
      unzipCount: unzipCount,
      totalPairs: totalPairs,
      rotationSpeed: rotationSpeed,
      basePairLabels: basePairLabels.slice(),
      pairStates: pairStates,
      saveState: saveState,
      cameraPosition: {
        x: isFinite(camera.position.x) ? camera.position.x : 0,
        y: isFinite(camera.position.y) ? camera.position.y : 0,
        z: isFinite(camera.position.z) ? camera.position.z : 30
      },
      hasSaveData: localStorage.getItem('dna_save_state') !== null,
      nextPairIndex: nextPairIndex,
      animating: animating
    };
  }

  // Add some particle effects for atmosphere
  const particleCount = 200;
  const particleGeo = new THREE.BufferGeometry();
  const particlePositions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3] = (Math.random() - 0.5) * 40;
    particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 30;
    particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 40;
  }
  particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
  const particleMat = new THREE.PointsMaterial({ color: 0x4466aa, size: 0.08, transparent: true, opacity: 0.5 });
  const particles = new THREE.Points(particleGeo, particleMat);
  scene.add(particles);

  // Resize handler
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Animation loop
  function animate() {
    requestAnimationFrame(animate);

    // Auto-rotation
    dnaGroup.rotation.y += rotationSpeed;

    // Update animations
    updateAnimations();
    updateDNAPositions();

    // Particle drift
    particles.rotation.y += 0.0003;

    // Controls
    controls.update();

    // HUD
    updateHUD();
    updateWindowState();

    renderer.render(scene, camera);
  }

  animate();
})();
</script>
</body>
</html>
