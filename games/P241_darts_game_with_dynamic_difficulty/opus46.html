<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Darts Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    color: #fff;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}
#hud > div { pointer-events: auto; }
.top-left {
    position: absolute; top: 20px; left: 20px;
}
.top-right {
    position: absolute; top: 20px; right: 20px; text-align: right;
}
.top-center {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    text-align: center;
}
.bottom-center {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 15px;
}
.stat-label { font-size: 14px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
.stat-value { font-size: 28px; font-weight: bold; }
.stat-block { margin-bottom: 10px; }
button {
    pointer-events: auto;
    padding: 12px 30px;
    font-size: 16px;
    font-weight: bold;
    border: 2px solid #fff;
    background: rgba(255,255,255,0.1);
    color: #fff;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
}
button:hover { background: rgba(255,255,255,0.3); }
button:disabled { opacity: 0.3; cursor: default; }
#nextRoundBtn { display: none; }
#crosshair {
    position: absolute;
    pointer-events: none;
    width: 30px; height: 30px;
    transform: translate(-50%, -50%);
}
#crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255,50,50,0.8);
}
#crosshair::before {
    width: 2px; height: 100%;
    left: 50%; transform: translateX(-50%);
}
#crosshair::after {
    width: 100%; height: 2px;
    top: 50%; transform: translateY(-50%);
}
#crosshair .dot {
    position: absolute;
    width: 6px; height: 6px;
    background: rgba(255,50,50,0.9);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
}
#hitMessage {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: bold;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
}
.difficulty-bar {
    display: flex; gap: 4px; margin-top: 5px; justify-content: flex-end;
}
.diff-pip {
    width: 12px; height: 12px;
    border: 2px solid #fff;
    border-radius: 2px;
}
.diff-pip.active { background: #ff4444; }
</style>
</head>
<body>

<div id="hud">
    <div class="top-left">
        <div class="stat-block">
            <div class="stat-label">Total Score</div>
            <div class="stat-value" id="totalScoreDisplay">0</div>
        </div>
        <div class="stat-block">
            <div class="stat-label">Round Score</div>
            <div class="stat-value" id="roundScoreDisplay">0</div>
        </div>
    </div>
    <div class="top-right">
        <div class="stat-block">
            <div class="stat-label">Darts Left</div>
            <div class="stat-value" id="dartsLeftDisplay">3</div>
        </div>
        <div class="stat-block">
            <div class="stat-label">Difficulty</div>
            <div class="stat-value" id="difficultyDisplay">1</div>
            <div class="difficulty-bar" id="difficultyBar"></div>
        </div>
    </div>
    <div class="top-center">
        <div class="stat-block">
            <div class="stat-label">Round</div>
            <div class="stat-value" id="roundDisplay">1</div>
        </div>
    </div>
    <div class="bottom-center">
        <button id="newGameBtn">New Game</button>
        <button id="nextRoundBtn">Next Round</button>
    </div>
    <div id="hitMessage"></div>
</div>

<div id="crosshair"><div class="dot"></div></div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.152.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.152.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
const state = {
    totalScore: 0,
    roundScore: 0,
    dartsLeft: 3,
    difficulty: 1,
    roundNumber: 1,
    dartInFlight: false,
    lastHitZone: 'miss',
    lastHitPoints: 0,
    boardPositionX: 0,
    boardPositionY: 0,
    dartPositionZ: 3,
    gameActive: true,
    modelLoaded: false,
    wobbleAmount: 0
};
window.__3D_STATE__ = state;

// ============ RENDERER ============
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

// ============ SCENE ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 5, 15);

// ============ CAMERA ============
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.6, 3);
camera.lookAt(0, 1.6, -3);

// ============ CONTROLS ============
const controls = new OrbitControls(camera, renderer.domElement);
controls.enabled = false;
controls.target.set(0, 1.6, -2.5);
controls.enableDamping = true;

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -5;
dirLight.shadow.camera.right = 5;
dirLight.shadow.camera.top = 5;
dirLight.shadow.camera.bottom = -5;
scene.add(dirLight);

// Spot light on dartboard
const spotLight = new THREE.SpotLight(0xffffee, 1.5, 8, Math.PI / 6, 0.5);
spotLight.position.set(0, 3.5, -1.5);
spotLight.target.position.set(0, 1.7, -2.5);
spotLight.castShadow = true;
scene.add(spotLight);
scene.add(spotLight.target);

// ============ FLOOR ============
const floorGeo = new THREE.PlaneGeometry(20, 20);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.9 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Back wall
const wallGeo = new THREE.PlaneGeometry(10, 5);
const wallMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3e, roughness: 0.8 });
const wall = new THREE.Mesh(wallGeo, wallMat);
wall.position.set(0, 2.5, -2.8);
wall.receiveShadow = true;
scene.add(wall);

// ============ DARTBOARD ============
const BOARD_Z = -2.5;
const BOARD_CENTER_Y = 1.7;
const boardGroup = new THREE.Group();
boardGroup.position.set(0, BOARD_CENTER_Y, BOARD_Z);
scene.add(boardGroup);

// Sector values in order (clockwise from top)
const SECTOR_VALUES = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];

function createDartboardTexture() {
    const size = 1024;
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    const cx = size / 2, cy = size / 2;
    const scale = size / 2 / 0.72;

    // Background (wire frame area)
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, size, size);

    // Outer black circle
    ctx.beginPath();
    ctx.arc(cx, cy, 0.68 * scale, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();

    const sectorAngle = Math.PI * 2 / 20;
    const startAngle = -Math.PI / 2 - sectorAngle / 2;

    // Draw sectors
    for (let i = 0; i < 20; i++) {
        const a1 = startAngle + i * sectorAngle;
        const a2 = a1 + sectorAngle;
        const isEven = i % 2 === 0;

        // Double ring (outer): 0.58 - 0.65
        ctx.beginPath();
        ctx.arc(cx, cy, 0.65 * scale, a1, a2);
        ctx.arc(cx, cy, 0.58 * scale, a2, a1, true);
        ctx.closePath();
        ctx.fillStyle = isEven ? '#e8222a' : '#1b8a2f';
        ctx.fill();

        // Outer single: 0.42 - 0.58
        ctx.beginPath();
        ctx.arc(cx, cy, 0.58 * scale, a1, a2);
        ctx.arc(cx, cy, 0.42 * scale, a2, a1, true);
        ctx.closePath();
        ctx.fillStyle = isEven ? '#f5f0d0' : '#111';
        ctx.fill();

        // Triple ring: 0.35 - 0.42
        ctx.beginPath();
        ctx.arc(cx, cy, 0.42 * scale, a1, a2);
        ctx.arc(cx, cy, 0.35 * scale, a2, a1, true);
        ctx.closePath();
        ctx.fillStyle = isEven ? '#e8222a' : '#1b8a2f';
        ctx.fill();

        // Inner single: 0.12 - 0.35
        ctx.beginPath();
        ctx.arc(cx, cy, 0.35 * scale, a1, a2);
        ctx.arc(cx, cy, 0.12 * scale, a2, a1, true);
        ctx.closePath();
        ctx.fillStyle = isEven ? '#f5f0d0' : '#111';
        ctx.fill();
    }

    // Inner bull (green): 0.05 - 0.12
    ctx.beginPath();
    ctx.arc(cx, cy, 0.12 * scale, 0, Math.PI * 2);
    ctx.fillStyle = '#1b8a2f';
    ctx.fill();

    // Bullseye (red): < 0.05
    ctx.beginPath();
    ctx.arc(cx, cy, 0.05 * scale, 0, Math.PI * 2);
    ctx.fillStyle = '#e8222a';
    ctx.fill();

    // Wire lines
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 20; i++) {
        const a = startAngle + i * sectorAngle;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * 0.12 * scale, cy + Math.sin(a) * 0.12 * scale);
        ctx.lineTo(cx + Math.cos(a) * 0.68 * scale, cy + Math.sin(a) * 0.68 * scale);
        ctx.stroke();
    }

    // Ring wires
    [0.05, 0.12, 0.35, 0.42, 0.58, 0.65, 0.68].forEach(r => {
        ctx.beginPath();
        ctx.arc(cx, cy, r * scale, 0, Math.PI * 2);
        ctx.stroke();
    });

    // Numbers
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < 20; i++) {
        const a = startAngle + (i + 0.5) * sectorAngle;
        const r = 0.71 * scale;
        const x = cx + Math.cos(a) * r;
        const y = cy + Math.sin(a) * r;
        ctx.fillText(SECTOR_VALUES[i].toString(), x, y);
    }

    return canvas;
}

const boardTexCanvas = createDartboardTexture();
const boardTexture = new THREE.CanvasTexture(boardTexCanvas);
boardTexture.colorSpace = THREE.SRGBColorSpace;

const boardGeo = new THREE.CircleGeometry(0.72, 64);
const boardMat = new THREE.MeshStandardMaterial({ map: boardTexture, roughness: 0.7, metalness: 0.1 });
const boardMesh = new THREE.Mesh(boardGeo, boardMat);
boardMesh.castShadow = true;
boardMesh.receiveShadow = true;
boardGroup.add(boardMesh);

// Board backing (cylinder for depth)
const backingGeo = new THREE.CylinderGeometry(0.73, 0.73, 0.05, 64);
const backingMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
const backing = new THREE.Mesh(backingGeo, backingMat);
backing.rotation.x = Math.PI / 2;
backing.position.z = -0.025;
backing.castShadow = true;
backing.receiveShadow = true;
boardGroup.add(backing);

// ============ LOAD COFFEEMAT MODEL ============
const gltfLoader = new GLTFLoader();
gltfLoader.load(
    'https://raw.githubusercontent.com/AlaricBaraworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorworWorw
