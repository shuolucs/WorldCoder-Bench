<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Darts Game - Three.js</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0f1116;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }
    canvas { display: block; }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }
    .panel {
      position: absolute;
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 14px;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    #topLeft { top: 12px; left: 12px; }
    #topRight { top: 12px; right: 12px; text-align: right; }
    #topCenter {
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      min-width: 130px;
    }
    .line {
      font-size: 20px;
      line-height: 1.5;
      font-weight: 700;
      letter-spacing: 0.4px;
    }
    #crosshair {
      position: absolute;
      width: 20px;
      height: 20px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.9;
    }
    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 0 8px rgba(255,255,255,0.25);
    }
    #crosshair::before {
      width: 20px;
      height: 2px;
      left: 0;
      top: 9px;
    }
    #crosshair::after {
      width: 2px;
      height: 20px;
      left: 9px;
      top: 0;
    }
    #buttons {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      z-index: 11;
      display: flex;
      gap: 12px;
      pointer-events: auto;
    }
    button {
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: #1f6feb;
      color: white;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }
    button:hover { filter: brightness(1.08); }
    #nextRoundBtn {
      display: none;
      background: #2ea043;
    }
    #hint {
      position: fixed;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 14px;
      opacity: 0.75;
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 8px 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="topLeft" class="panel">
      <div class="line" id="scoreEl">Score: 0</div>
      <div class="line" id="roundScoreEl">Round Score: 0</div>
    </div>

    <div id="topRight" class="panel">
      <div class="line" id="dartsLeftEl">Darts Left: 3</div>
      <div class="line" id="difficultyEl">Difficulty: 1</div>
    </div>

    <div id="topCenter" class="panel">
      <div class="line" id="roundEl">Round: 1</div>
    </div>

    <div id="crosshair"></div>
  </div>

  <div id="hint">Left click: throw dart &nbsp;|&nbsp; Hold right mouse button: orbit camera</div>

  <div id="buttons">
    <button id="newGameBtn">New Game</button>
    <button id="nextRoundBtn">Next Round</button>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.152.2/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.152.2/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.152.2/examples/jsm/loaders/GLTFLoader.js";

    const scoreEl = document.getElementById("scoreEl");
    const roundScoreEl = document.getElementById("roundScoreEl");
    const dartsLeftEl = document.getElementById("dartsLeftEl");
    const difficultyEl = document.getElementById("difficultyEl");
    const roundEl = document.getElementById("roundEl");
    const newGameBtn = document.getElementById("newGameBtn");
    const nextRoundBtn = document.getElementById("nextRoundBtn");

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x10131a);
    scene.fog = new THREE.Fog(0x10131a, 4, 10);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.6, 3);
    camera.lookAt(0, 1.6, -3);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.6, -2.5);
    controls.enableDamping = true;
    controls.enabled = false;
    controls.minDistance = 1.5;
    controls.maxDistance = 8;

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -8;
    dirLight.shadow.camera.right = 8;
    dirLight.shadow.camera.top = 8;
    dirLight.shadow.camera.bottom = -8;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    scene.add(dirLight);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({
        color: 0x1a1d22,
        roughness: 0.95,
        metalness: 0.05
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    floor.receiveShadow = true;
    scene.add(floor);

    const wall = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 6),
      new THREE.MeshStandardMaterial({ color: 0x171a20, roughness: 0.9 })
    );
    wall.position.set(0, 2.2, -3.1);
    scene.add(wall);

    const boardGroup = new THREE.Group();
    const boardBasePos = new THREE.Vector3(0, 1.7, -2.5);
    boardGroup.position.copy(boardBasePos);
    scene.add(boardGroup);

    function createDartboardTexture(size = 1024) {
      const canvas = document.createElement("canvas");
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext("2d");
      const cx = size / 2;
      const cy = size / 2;
      const R = size * 0.48;

      ctx.clearRect(0, 0, size, size);

      function drawRing(r0, r1, color) {
        ctx.beginPath();
        ctx.arc(cx, cy, r1 * R, 0, Math.PI * 2);
        ctx.arc(cx, cy, r0 * R, 0, Math.PI * 2, true);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
      }

      const sectorOrder = [20, 1, 18, 4, 13, 6,10,15, 2,17, 3,19, 7,16, 8,11,14, 9,12, 5];
      const segmentAngle = (Math.PI * 2) / 20;
      const startAngle = -Math.PI / 2 - segmentAngle / 2;

      // Background black outer.
      drawRing(0, 1.0, "#111");

      // Singles outer & inner sectors
      for (let i = 0; i < 20; i++) {
        const a0 = startAngle + i * segmentAngle;
        const a1 = a0 + segmentAngle;
        const isLight = i % 2 === 0;
        const singleColor = isLight ? "#f2e8d0" : "#1c1c1c";
        const ringRG = isLight ? "#c62828" : "#2e7d32";

        // single outer: 0.42 -> 0.58
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, 0.58 * R, a0, a1);
        ctx.arc(cx, cy, 0.42 * R, a1, a0, true);
        ctx.closePath();
        ctx.fillStyle = singleColor;
        ctx.fill();

        // triple ring: 0.35 -> 0.42
        ctx.beginPath();
        ctx.arc(cx, cy, 0.42 * R, a0, a1);
        ctx.arc(cx, cy, 0.35 * R, a1, a0, true);
        ctx.closePath();
        ctx.fillStyle = ringRG;
        ctx.fill();

        // single inner: 0.12 -> 0.35
        ctx.beginPath();
        ctx.arc(cx, cy, 0.35 * R, a0, a1);
        ctx.arc(cx, cy, 0.12 * R, a1, a0, true);
        ctx.closePath();
        ctx.fillStyle = singleColor;
        ctx.fill();

        // double ring: 0.58 -> 0.65
        ctx.beginPath();
        ctx.arc(cx, cy, 0.65 * R, a0, a1);
        ctx.arc(cx, cy, 0.58 * R, a1, a0, true);
        ctx.closePath();
        ctx.fillStyle = ringRG;
        ctx.fill();
      }

      // Bulls
      drawRing(0.05, 0.12, "#2e7d32");
      drawRing(0.0, 0.05, "#c62828");

      // Boundary circles
      ctx.strokeStyle = "#d9c99a";
      ctx.lineWidth = 3;
      [0.12,0.35,0.42,0.58,0.65,0.68].forEach(r => {
        ctx.beginPath();
        ctx.arc(cx, cy, r * R, 0, Math.PI * 2);
        ctx.stroke();
      });

      // Sector lines
      ctx.strokeStyle = "rgba(230,220,200,0.85)";
      ctx.lineWidth = 2;
      for (let i = 0; i < 20; i++) {
        const a = startAngle + i * segmentAngle;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * 0.12 * R, cy + Math.sin(a) * 0.12 * R);
        ctx.lineTo(cx + Math.cos(a) * 0.68 * R, cy + Math.sin(a) * 0.68 * R);
        ctx.stroke();
      }

      // Numbers
      ctx.fillStyle = "#efe6d2";
      ctx.font = `bold ${Math.floor(size * 0.04)}px Arial`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      for (let i = 0; i < 20; i++) {
        const a = startAngle + i * segmentAngle + segmentAngle / 2;
        const tx = cx + Math.cos(a) * 0.79 * R;
        const ty = cy + Math.sin(a) * 0.79 * R;
        ctx.fillText(String(sectorOrder[i]), tx, ty);
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      tex.needsUpdate = true;
      return tex;
    }

    const boardTexture = createDartboardTexture();

    const board = new THREE.Mesh(
      new THREE.CircleGeometry(0.68, 96),
      new THREE.MeshStandardMaterial({
        map: boardTexture,
        roughness: 0.8,
        metalness: 0.05
      })
    );
    board.castShadow = true;
    board.receiveShadow = true;
    board.rotation.y = Math.PI; // face +Z toward camera
    boardGroup.add(board);

    const boardBack = new THREE.Mesh(
      new THREE.CylinderGeometry(0.72, 0.72, 0.08, 64),
      new THREE.MeshStandardMaterial({ color: 0x3f2d1d, roughness: 0.9 })
    );
    boardBack.rotation.z = Math.PI / 2;
    boardBack.rotation.y = Math.PI / 2;
    boardBack.castShadow = true;
    boardBack.receiveShadow = true;
    boardBack.position.z = -0.045;
    boardGroup.add(boardBack);

    const boardFrame = new THREE.Mesh(
      new THREE.TorusGeometry(0.70, 0.03, 24, 100),
      new THREE.MeshStandardMaterial({ color: 0x2a2016, roughness: 0.85, metalness: 0.1 })
    );
    boardFrame.castShadow = true;
    boardFrame.receiveShadow = true;
    boardFrame.rotation.y = Math.PI;
    boardGroup.add(boardFrame);

    const dartGroup = new THREE.Group();
    function createDart() {
      dartGroup.clear();

      const shaft = new THREE.Mesh(
        new THREE.CylinderGeometry(0.008, 0.008, 0.22, 16),
        new THREE.MeshStandardMaterial({ color: 0x3d7dff, metalness: 0.9, roughness: 0.25 })
      );
      shaft.rotation.x = Math.PI / 2;
      shaft.castShadow = true;
      dartGroup.add(shaft);

      const tip = new THREE.Mesh(
        new THREE.ConeGeometry(0.01, 0.05, 16),
        new THREE.MeshStandardMaterial({ color: 0xcfd6df, metalness: 1.0, roughness: 0.18 })
      );
      tip.rotation.x = -Math.PI / 2;
      tip.position.z = -0.135;
      tip.castShadow = true;
      dartGroup.add(tip);

      const tail = new THREE.Mesh(
        new THREE.ConeGeometry(0.018, 0.05, 16),
        new THREE.MeshStandardMaterial({ color: 0x61a4ff, metalness: 0.7, roughness: 0.35 })
      );
      tail.rotation.x = Math.PI / 2;
      tail.position.z = 0.135;
      tail.castShadow = true;
      dartGroup.add(tail);

      const finGeom = new THREE.BoxGeometry(0.002, 0.04, 0.04);
      const finMat = new THREE.MeshStandardMaterial({ color: 0x89bbff, metalness: 0.5, roughness: 0.4 });
      for (let i = 0; i < 4; i++) {
        const fin = new THREE.Mesh(finGeom, finMat);
        fin.position.z = 0.11;
        fin.rotation.z = (Math.PI / 2) * i;
        fin.castShadow = true;
        dartGroup.add(fin);
      }
    }
    createDart();
    scene.add(dartGroup);

    const aimPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 2.5); // z = -2.5
    const raycaster = new THREE.Raycaster();
    const mouseNDC = new THREE.Vector2(0, 0);
    const aimedPoint = new THREE.Vector3(0, 1.6, -2.5);
    const tempPoint = new THREE.Vector3();

    const particleGroup = new THREE.Group();
    scene.add(particleGroup);
    const particles = [];

    function spawnHitParticles(position, color = 0xffdd88) {
      for (let i = 0; i < 12; i++) {
        const p = new THREE.Mesh(
          new THREE.SphereGeometry(0.008, 8, 8),
          new THREE.MeshBasicMaterial({ color })
        );
        p.position.copy(position);
        p.userData.vel = new THREE.Vector3(
          (Math.random() - 0.5) * 0.25,
          (Math.random() - 0.5) * 0.25,
          (Math.random() - 0.5) * 0.12
        );
        p.userData.life = 0.5 + Math.random() * 0.35;
        particleGroup.add(p);
        particles.push(p);
      }
    }

    const loader = new GLTFLoader();

    const state = {
      totalScore: 0,
      roundScore: 0,
      dartsLeft: 3,
      difficulty: 1,
      roundNumber: 1,
      dartInFlight: false,
      lastHitZone: "miss",
      lastHitPoints: 0,
      boardPositionX: 0,
      boardPositionY: 0,
      dartPositionZ: camera.position.z,
      gameActive: true,
      modelLoaded: false,
      wobbleAmount: 0
    };
    window.__3D_STATE__ = state;

    loader.load(
      "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/CoffeeCart/glTF-Binary/CoffeeCart.glb",
      (gltf) => {
        const model = gltf.scene;
        model.position.set(1.5, 0, -1);
        model.scale.set(0.5, 0.5, 0.5);
        model.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        scene.add(model);
        state.modelLoaded = true;
      },
      undefined,
      () => {
        // Fallback decorative prop if requested filename/path is unavailable.
        const fallback = new THREE.Group();
        const body = new THREE.Mesh(
          new THREE.BoxGeometry(0.35, 0.55, 0.28),
          new THREE.MeshStandardMaterial({ color: 0x444b54, roughness: 0.5, metalness: 0.5 })
        );
        body.position.y = 0.275;
        body.castShadow = true;
        body.receiveShadow = true;
        fallback.add(body);

        const top = new THREE.Mesh(
          new THREE.BoxGeometry(0.3, 0.08, 0.24),
          new THREE.MeshStandardMaterial({ color: 0x69727d, roughness: 0.4, metalness: 0.6 })
        );
        top.position.y = 0.59;
        top.castShadow = true;
        fallback.add(top);

        const spout = new THREE.Mesh(
          new THREE.CylinderGeometry(0.015, 0.015, 0.18, 12),
          new THREE.MeshStandardMaterial({ color: 0xb9c2cf, metalness: 0.9, roughness: 0.2 })
        );
        spout.rotation.z = Math.PI / 2;
        spout.position.set(0.12, 0.4, 0.1);
        spout.castShadow = true;
        fallback.add(spout);

        fallback.position.set(1.5, 0, -1);
        fallback.scale.set(0.5, 0.5, 0.5);
        scene.add(fallback);
        state.modelLoaded = false;
      }
    );

    function safeNumber(n, def = 0) {
      return Number.isFinite(n) ? n : def;
    }

    function difficultyParams(level) {
      const l = Math.max(1, Math.min(5, Math.floor(level)));
      if (l === 1) return { wobble: 0, swayX: 0, swayY: 0 };
      if (l === 2) return { wobble: 0.03, swayX: 0.05, swayY: 0 };
      if (l === 3) return { wobble: 0.06, swayX: 0.12, swayY: 0.05 };
      if (l === 4) return { wobble: 0.08, swayX: 0.16, swayY: 0.07 };
      return { wobble: 0.10, swayX: 0.20, swayY: 0.09 };
    }

    function gaussianRandom() {
      let u = 0, v = 0;
      while (u === 0) u = Math.random();
      while (v === 0) v = Math.random();
      return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
    }

    function getBoardOscillation(timeSec) {
      const p = difficultyParams(state.difficulty);
      let x = 0, y = 0;
      if (state.difficulty >= 2) x = Math.sin(timeSec * 1.2) * p.swayX;
      if (state.difficulty >= 3) y = Math.cos(timeSec * 1.7) * p.swayY;
      return { x: safeNumber(x), y: safeNumber(y) };
    }

    function updateHUD() {
      scoreEl.textContent = `Score: ${safeNumber(state.totalScore)}`;
      roundScoreEl.textContent = `Round Score: ${safeNumber(state.roundScore)}`;
      dartsLeftEl.textContent = `Darts Left: ${safeNumber(state.dartsLeft)}`;
      difficultyEl.textContent = `Difficulty: ${safeNumber(state.difficulty)}`;
      roundEl.textContent = `Round: ${safeNumber(state.roundNumber)}`;
    }

    function resetDartToCamera() {
      dartGroup.visible = true;
      dartGroup.position.copy(camera.position);
      dartGroup.quaternion.copy(camera.quaternion);
      dartGroup.translateZ(-0.35);
      state.dartPositionZ = safeNumber(dartGroup.position.z);
    }

    function updateAimFromMouse(clientX, clientY) {
      mouseNDC.x = (clientX / window.innerWidth) * 2 - 1;
      mouseNDC.y = -(clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouseNDC, camera);
      const hit = new THREE.Vector3();
      if (raycaster.ray.intersectPlane(aimPlane, hit)) {
        aimedPoint.copy(hit);
        aimedPoint.x = THREE.MathUtils.clamp(aimedPoint.x, -1.25, 1.25);
        aimedPoint.y = THREE.MathUtils.clamp(aimedPoint.y, 0.6, 2.6);
      }
    }

    function sectorValueFromAngle(angle) {
      const order = [20, 1, 18, 4, 13, 6,10,15, 2,17, 3,19, 7,16, 8,11,14, 9,12, 5];
      const seg = (Math.PI * 2) / 20;
      let a = angle + Math.PI / 2 + seg / 2;
      while (a < 0) a += Math.PI * 2;
      while (a >= Math.PI * 2) a -= Math.PI * 2;
      const idx = Math.floor(a / seg) % 20;
      return order[idx];
    }

    function scoreHit(worldPos) {
      const local = board.worldToLocal(worldPos.clone());
      const x = -local.x;
      const y = local.y;
      const r = Math.sqrt(x*x + y*y);
      let zone = "miss";
      let points = 0;

      if (r > 0.68) {
        zone = "miss";
        points = 0;
      } else if (r < 0.05) {
        zone = "bullseye";
        points = 50;
      } else if (r < 0.12) {
        zone = "inner_bull";
        points = 25;
      } else {
        const angle = Math.atan2(y, x);
        const sector = sectorValueFromAngle(angle);
        if (r >= 0.35 && r <= 0.42) {
          zone = "triple";
          points = sector * 3;
        } else if (r >= 0.58 && r <= 0.65) {
          zone = "double";
          points = sector * 2;
        } else {
          zone = "single";
          points = sector;
        }
      }

      state.lastHitZone = zone;
      state.lastHitPoints = safeNumber(points);
      state.totalScore = safeNumber(state.totalScore) + safeNumber(points);
      state.roundScore = safeNumber(state.roundScore) + safeNumber(points);

      return { zone, points, local };
    }

    let throwData = null;
    let postHitResetTimer = 0;

    function throwDart() {
      if (!state.gameActive || state.dartInFlight || state.dartsLeft <= 0) return;

      const p = difficultyParams(state.difficulty);
      state.wobbleAmount = safeNumber(p.wobble);

      const start = camera.position.clone();
      const aim = aimedPoint.clone();

      const timeSec = performance.now() * 0.001;
      const osc = getBoardOscillation(timeSec);
      const boardCenterNow = boardBasePos.clone().add(new THREE.Vector3(osc.x, osc.y, 0));

      const wobbleX = gaussianRandom() * p.wobble * 0.35;
      const wobbleY = gaussianRandom() * p.wobble * 0.35;
      const wobbleZ = gaussianRandom() * p.wobble * 0.12;

      let target = aim.clone();
      target.x += wobbleX;
      target.y += wobbleY;
      target.z += wobbleZ;

      let isBoardHit = false;
      let finalPoint = target.clone();

      if (Math.abs(target.z - boardCenterNow.z) < 0.08) {
        const dx = target.x - boardCenterNow.x;
        const dy = target.y - boardCenterNow.y;
        const rr = Math.sqrt(dx * dx + dy * dy);
        if (rr <= 0.68) {
          isBoardHit = true;
          finalPoint.set(target.x, target.y, boardCenterNow.z + 0.005);
        }
      }

      throwData = {
        start,
        end: finalPoint,
        startTime: performance.now(),
        duration: 400,
        hitBoard: isBoardHit,
        scored: false
      };

      state.dartInFlight = true;
      state.dartsLeft = Math.max(0, safeNumber(state.dartsLeft) - 1);
    }

    function finalizeRoundIfNeeded() {
      if (state.dartsLeft === 0 && !state.dartInFlight) {
        nextRoundBtn.style.display = "inline-block";
      }
    }

    function applyDifficultyAfterRound() {
      if (state.roundScore >= 60) state.difficulty = Math.min(5, safeNumber(state.difficulty) + 1);
      else if (state.roundScore < 20) state.difficulty = Math.max(1, safeNumber(state.difficulty) - 1);
      state.difficulty = Math.max(1, Math.min(5, safeNumber(state.difficulty, 1)));
    }

    function nextRound() {
      if (state.dartInFlight) return;
      applyDifficultyAfterRound();
      state.roundNumber = safeNumber(state.roundNumber) + 1;
      state.roundScore = 0;
      state.dartsLeft = 3;
      state.lastHitZone = "miss";
      state.lastHitPoints = 0;
      nextRoundBtn.style.display = "none";
      resetDartToCamera();
    }

    function newGame() {
      state.totalScore = 0;
      state.roundScore = 0;
      state.dartsLeft = 3;
      state.difficulty = 1;
      state.roundNumber = 1;
      state.dartInFlight = false;
      state.lastHitZone = "miss";
      state.lastHitPoints = 0;
      state.boardPositionX = 0;
      state.boardPositionY = 0;
      state.dartPositionZ = camera.position.z;
      state.gameActive = true;
      state.wobbleAmount = 0;
      throwData = null;
      postHitResetTimer = 0;
      nextRoundBtn.style.display = "none";
      resetDartToCamera();
      updateHUD();
    }

    newGameBtn.addEventListener("click", newGame);
    nextRoundBtn.addEventListener("click", nextRound);

    window.addEventListener("mousemove", (e) => {
      updateAimFromMouse(e.clientX, e.clientY);
    });

    window.addEventListener("mousedown", (e) => {
      if (e.button === 2) {
        controls.enabled = true;
      } else if (e.button === 0) {
        throwDart();
      }
    });

    window.addEventListener("mouseup", (e) => {
      if (e.button === 2) controls.enabled = false;
    });

    window.addEventListener("contextmenu", (e) => e.preventDefault());

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    resetDartToCamera();
    updateAimFromMouse(window.innerWidth * 0.5, window.innerHeight * 0.5);

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();
      const dt = Math.min(0.033, clock.getDelta());

      controls.update();

      const osc = getBoardOscillation(elapsed);
      boardGroup.position.set(
        boardBasePos.x + osc.x,
        boardBasePos.y + osc.y,
        boardBasePos.z
      );
      state.boardPositionX = safeNumber(osc.x);
      state.boardPositionY = safeNumber(osc.y);

      if (!state.dartInFlight && postHitResetTimer <= 0) {
        const aimDir = aimedPoint.clone().sub(camera.position).normalize();
        dartGroup.position.copy(camera.position).add(aimDir.clone().multiplyScalar(0.35));
        dartGroup.lookAt(aimedPoint);
      }

      if (throwData) {
        const t = Math.min(1, (performance.now() - throwData.startTime) / throwData.duration);
        const pos = new THREE.Vector3().lerpVectors(throwData.start, throwData.end, t);
        const arcHeight = 0.12;
        pos.y += Math.sin(t * Math.PI) * arcHeight - 0.04 * t;

        const nextT = Math.min(1, t + 0.01);
        const nextPos = new THREE.Vector3().lerpVectors(throwData.start, throwData.end, nextT);
        nextPos.y += Math.sin(nextT * Math.PI) * arcHeight - 0.04 * nextT;

        dartGroup.position.copy(pos);
        dartGroup.lookAt(nextPos);
        dartGroup.rotateX(Math.PI / 2);
        state.dartPositionZ = safeNumber(dartGroup.position.z);

        if (t >= 1 && !throwData.scored) {
          throwData.scored = true;
          state.dartInFlight = false;

          if (throwData.hitBoard) {
            const result = scoreHit(throwData.end.clone());
            spawnHitParticles(throwData.end.clone(), result.points >= 25 ? 0xff5555 : 0xffdd88);
            // Stick into board slightly
            dartGroup.position.copy(throwData.end);
            dartGroup.lookAt(throwData.end.clone().add(new THREE.Vector3(0, 0, 1)));
            dartGroup.rotateX(Math.PI / 2);
          } else {
            state.lastHitZone = "miss";
            state.lastHitPoints = 0;
            spawnHitParticles(throwData.end.clone(), 0xaac8ff);
          }

          postHitResetTimer = 2.0;
          throwData = null;
          updateHUD();
          finalizeRoundIfNeeded();
        }
      } else if (postHitResetTimer > 0) {
        postHitResetTimer -= dt;
        if (postHitResetTimer <= 0) {
          resetDartToCamera();
          postHitResetTimer = 0;
          finalizeRoundIfNeeded();
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.userData.life -= dt;
        p.position.addScaledVector(p.userData.vel, dt);
        p.userData.vel.multiplyScalar(0.98);
        p.material.opacity = Math.max(0, p.userData.life * 2);
        p.material.transparent = true;
        if (p.userData.life <= 0) {
          particleGroup.remove(p);
          p.geometry.dispose();
          p.material.dispose();
          particles.splice(i, 1);
        }
      }

      state.totalScore = safeNumber(state.totalScore);
      state.roundScore = safeNumber(state.roundScore);
      state.dartsLeft = safeNumber(state.dartsLeft);
      state.difficulty = safeNumber(state.difficulty, 1);
      state.roundNumber = safeNumber(state.roundNumber, 1);
      state.dartPositionZ = safeNumber(state.dartPositionZ, camera.position.z);
      state.wobbleAmount = safeNumber(difficultyParams(state.difficulty).wobble);
      state.gameActive = true;

      updateHUD();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
