<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Darts Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            color: white;
            text-shadow: 1px 1px 2px black;
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .hud-left, .hud-right, .hud-center {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .hud-center {
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
        }
        .hud-stat {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .hud-substat {
            font-size: 1em;
            color: #aaa;
        }
        .hud-bottom {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            pointer-events: auto;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.2s, transform 0.1s;
            pointer-events: auto;
        }
        button:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        #nextRoundBtn {
            display: none;
            background: #2196F3;
        }
        #nextRoundBtn:hover {
            background: #1e88e5;
        }
        #crosshair {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before { width: 2px; height: 10px; }
        #crosshair::after { width: 10px; height: 2px; }
        #message-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
    <!-- Import Three.js and Addons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="crosshair"></div>
    
    <div id="ui-layer">
        <div class="hud-top">
            <div class="hud-left">
                <div class="hud-stat" id="ui-score">Score: 0</div>
                <div class="hud-substat" id="ui-round-score">Round Score: 0</div>
            </div>
            <div class="hud-center">
                <div id="ui-round">Round: 1</div>
            </div>
            <div class="hud-right">
                <div class="hud-stat" id="ui-darts">Darts Left: 3</div>
                <div class="hud-substat" id="ui-difficulty">Difficulty: 1</div>
            </div>
        </div>
        <div class="hud-bottom">
            <button id="newGameBtn">New Game</button>
            <button id="nextRoundBtn">Next Round</button>
        </div>
    </div>
    <div id="message-overlay"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            totalScore: 0,
            roundScore: 0,
            dartsLeft: 3,
            difficulty: 1,
            roundNumber: 1,
            dartInFlight: false,
            lastHitZone: 'none',
            lastHitPoints: 0,
            boardPositionX: 0,
            boardPositionY: 0,
            dartPositionZ: 0,
            gameActive: true,
            modelLoaded: false,
            wobbleAmount: 0
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.Fog(0x1a1a1a, 2, 10);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.6, 3);
        camera.lookAt(0, 1.6, -3);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        // --- Environment ---
        const floorGeo = new THREE.PlaneGeometry(20, 20);
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0x222222,
            roughness: 0.8,
            metalness: 0.2
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Wall
        const wallGeo = new THREE.PlaneGeometry(20, 10);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(0, 5, -3);
        wall.receiveShadow = true;
        scene.add(wall);

        // --- Load Model ---
        const loader = new GLTFLoader();
        loader.load(
            'coffeemat.glb',
            (gltf) => {
                const model = gltf.scene;
                model.position.set(1.5, 0, -1);
                model.scale.set(0.5, 0.5, 0.5);
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                scene.add(model);
                state.modelLoaded = true;
            },
            undefined,
            (error) => {
                console.warn('Could not load coffeemat.glb. Proceeding without it.', error);
                // Create a placeholder box if model fails to load
                const boxGeo = new THREE.BoxGeometry(0.5, 0.8, 0.5);
                const boxMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
                const box = new THREE.Mesh(boxGeo, boxMat);
                box.position.set(1.5, 0.4, -1);
                box.castShadow = true;
                box.receiveShadow = true;
                scene.add(box);
                state.modelLoaded = true; // Set true anyway so game logic doesn't block
            }
        );

        // --- Dartboard ---
        const boardGroup = new THREE.Group();
        boardGroup.position.set(0, 1.7, -2.5);
        scene.add(boardGroup);

        // Generate Dartboard Texture
        function createDartboardTexture() {
            const size = 1024;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const cx = size / 2;
            const cy = size / 2;
            const maxR = size / 2;

            // Radii based on 0.68 max radius
            const scale = maxR / 0.68;
            const rOuter = 0.68 * scale;
            const rDoubleOut = 0.65 * scale;
            const rDoubleIn = 0.58 * scale;
            const rTripleOut = 0.42 * scale;
            const rTripleIn = 0.35 * scale;
            const rInnerBull = 0.12 * scale;
            const rBull = 0.05 * scale;

            const sectors = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];
            const anglePerSector = (Math.PI * 2) / 20;

            // Background
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, size, size);

            // Draw Sectors
            for (let i = 0; i < 20; i++) {
                const startAngle = i * anglePerSector - anglePerSector / 2 - Math.PI / 2;
                const endAngle = startAngle + anglePerSector;
                
                const isEven = i % 2 === 0;
                const singleColor = isEven ? '#000000' : '#f5f5dc';
                const multiColor = isEven ? '#e3292e' : '#309f6a';

                // Outer Single
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, rOuter, startAngle, endAngle);
                ctx.fillStyle = '#111'; // Black border area
                ctx.fill();

                // Double
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, rDoubleOut, startAngle, endAngle);
                ctx.fillStyle = multiColor;
                ctx.fill();

                // Outer Single
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, rDoubleIn, startAngle, endAngle);
                ctx.fillStyle = singleColor;
                ctx.fill();

                // Triple
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, rTripleOut, startAngle, endAngle);
                ctx.fillStyle = multiColor;
                ctx.fill();

                // Inner Single
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, rTripleIn, startAngle, endAngle);
                ctx.fillStyle = singleColor;
                ctx.fill();
            }

            // Inner Bull
            ctx.beginPath();
            ctx.arc(cx, cy, rInnerBull, 0, Math.PI * 2);
            ctx.fillStyle = '#309f6a';
            ctx.fill();

            // Bullseye
            ctx.beginPath();
            ctx.arc(cx, cy, rBull, 0, Math.PI * 2);
            ctx.fillStyle = '#e3292e';
            ctx.fill();

            // Wireframe lines
            ctx.strokeStyle = '#dddddd';
            ctx.lineWidth = 2;
            for (let i = 0; i < 20; i++) {
                const angle = i * anglePerSector - anglePerSector / 2 - Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(angle) * rBull, cy + Math.sin(angle) * rBull);
                ctx.lineTo(cx + Math.cos(angle) * rDoubleOut, cy + Math.sin(angle) * rDoubleOut);
                ctx.stroke();
            }
            [rDoubleOut, rDoubleIn, rTripleOut, rTripleIn, rInnerBull, rBull].forEach(r => {
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.stroke();
            });

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        const boardGeo = new THREE.CylinderGeometry(0.68, 0.68, 0.05, 64);
        const boardMat = new THREE.MeshStandardMaterial({
            map: createDartboardTexture(),
            roughness: 0.6,
            metalness: 0.1
        });
        const boardSideMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        const boardMesh = new THREE.Mesh(boardGeo, [boardSideMat, boardMat, boardSideMat]);
        boardMesh.rotation.x = Math.PI / 2; // Face +Z
        boardMesh.castShadow = true;
        boardMesh.receiveShadow = true;
        boardGroup.add(boardMesh);

        // Surround
        const surroundGeo = new THREE.TorusGeometry(0.75, 0.08, 16, 64);
        const surroundMat = new THREE.MeshStandardMaterial({ color: 0x8b0000, roughness: 0.9 });
        const surround = new THREE.Mesh(surroundGeo, surroundMat);
        boardGroup.add(surround);

        // --- Dart ---
        const dartGroup = new THREE.Group();
        
        // Body
        const bodyGeo = new THREE.CylinderGeometry(0.005, 0.01, 0.1, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2196F3, metalness: 0.8, roughness: 0.2 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.rotation.x = Math.PI / 2;
        dartGroup.add(body);

        // Tip
        const tipGeo = new THREE.ConeGeometry(0.005, 0.04, 8);
        const tipMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 1, roughness: 0.1 });
        const tip = new THREE.Mesh(tipGeo, tipMat);
        tip.rotation.x = Math.PI / 2;
        tip.position.z = -0.07;
        dartGroup.add(tip);

        // Flight
        const flightGeo = new THREE.BoxGeometry(0.04, 0.04, 0.002);
        const flightMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const flight1 = new THREE.Mesh(flightGeo, flightMat);
        flight1.position.z = 0.05;
        const flight2 = flight1.clone();
        flight2.rotation.z = Math.PI / 2;
        dartGroup.add(flight1);
        dartGroup.add(flight2);

        dartGroup.traverse(c => { if(c.isMesh) c.castShadow = true; });
        scene.add(dartGroup);

        // --- Particles ---
        const particleCount = 30;
        const particleGeo = new THREE.BufferGeometry();
        const particlePos = new Float32Array(particleCount * 3);
        const particleVel = [];
        for(let i=0; i<particleCount; i++) {
            particlePos[i*3] = 0; particlePos[i*3+1] = 0; particlePos[i*3+2] = 0;
            particleVel.push(new THREE.Vector3((Math.random()-0.5)*2, (Math.random()-0.5)*2, Math.random()*2).normalize().multiplyScalar(Math.random()*0.05));
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.02, transparent: true, opacity: 0.8 });
        const particles = new THREE.Points(particleGeo, particleMat);
        particles.visible = false;
        scene.add(particles);

        let particleAge = 0;
        let particlesActive = false;

        function triggerParticles(pos) {
            particles.position.copy(pos);
            particles.visible = true;
            particleAge = 0;
            particlesActive = true;
            const positions = particles.geometry.attributes.position.array;
            for(let i=0; i<particleCount; i++) {
                positions[i*3] = 0; positions[i*3+1] = 0; positions[i*3+2] = 0;
            }
            particles.geometry.attributes.position.needsUpdate = true;
        }

        // --- Controls & Input ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enabled = false; // Disabled by default for aiming

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const aimPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 2.5); // z = -2.5
        const aimPoint = new THREE.Vector3();
        const crosshairEl = document.getElementById('crosshair');

        let isAiming = true;
        let rightMouseDown = false;

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            if (isAiming && !rightMouseDown && !state.dartInFlight && state.dartsLeft > 0 && state.gameActive) {
                crosshairEl.style.left = e.clientX + 'px';
                crosshairEl.style.top = e.clientY + 'px';
                crosshairEl.style.display = 'flex';

                raycaster.setFromCamera(mouse, camera);
                raycaster.ray.intersectPlane(aimPlane, aimPoint);
                
                // Keep dart at camera while aiming
                dartGroup.position.copy(camera.position);
                dartGroup.position.y -= 0.2; // slightly below eye level
                dartGroup.position.x += 0.1; // slightly right
                dartGroup.lookAt(aimPoint);
            } else {
                crosshairEl.style.display = 'none';
            }
        });

        window.addEventListener('mousedown', (e) => {
            if (e.button === 2) {
                rightMouseDown = true;
                controls.enabled = true;
                crosshairEl.style.display = 'none';
            } else if (e.button === 0 && isAiming && !rightMouseDown && !state.dartInFlight && state.dartsLeft > 0 && state.gameActive) {
                // Ignore clicks on UI
                if(e.target.tagName === 'BUTTON') return;
                throwDart();
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (e.button === 2) {
                rightMouseDown = false;
                controls.enabled = false;
                // Reset camera smoothly (handled in animation loop or just snap)
            }
        });

        window.addEventListener('contextmenu', e => e.preventDefault());

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Game Logic ---
        let throwStartTime = 0;
        const throwDuration = 0.4;
        let startPos = new THREE.Vector3();
        let targetPos = new THREE.Vector3();
        let throwWobblePhaseX = 0;
        let throwWobblePhaseY = 0;
        let stuckTimer = 0;
        let isStuck = false;

        const clock = new THREE.Clock();

        function throwDart() {
            state.dartInFlight = true;
            state.dartsLeft--;
            updateUI();
            
            startPos.copy(dartGroup.position);
            targetPos.copy(aimPoint);
            
            throwStartTime = clock.getElapsedTime();
            throwWobblePhaseX = Math.random() * Math.PI * 2;
            throwWobblePhaseY = Math.random() * Math.PI * 2;
            
            // Calculate wobble amount based on difficulty
            state.wobbleAmount = state.difficulty === 1 ? 0 : (state.difficulty - 1) * 0.03;
        }

        function calculateScore(hitPointWorld) {
            // Convert hit point to board's local space
            const localHit = boardGroup.worldToLocal(hitPointWorld.clone());
            
            const x = localHit.x;
            const y = localHit.y; // Y in local space corresponds to up/down on the board face
            
            const radius = Math.sqrt(x*x + y*y);
            let angle = Math.atan2(y, x);
            if (angle < 0) angle += Math.PI * 2;

            // Sectors array starting from +X (right) going counter-clockwise
            // Standard board: 6 is at right (+X), 20 is at top (+Y)
            // Let's map angles to sectors. Top is PI/2.
            // Sectors: 20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5
            // Top (PI/2) is 20.
            const sectors = [6, 13, 4, 18, 1, 20, 5, 12, 9, 14, 11, 8, 16, 7, 19, 3, 17, 2, 15, 10];
            
            // Offset angle so sector boundaries align correctly
            const anglePerSector = (Math.PI * 2) / 20;
            let adjustedAngle = angle + anglePerSector / 2;
            if (adjustedAngle >= Math.PI * 2) adjustedAngle -= Math.PI * 2;
            
            const sectorIndex = Math.floor(adjustedAngle / anglePerSector);
            const sectorValue = sectors[sectorIndex];

            let points = 0;
            let zone = 'miss';

            if (radius > 0.68) {
                points = 0;
                zone = 'miss';
            } else if (radius > 0.65) {
                points = 0;
                zone = 'miss'; // Outer black ring
            } else if (radius > 0.58) {
                points = sectorValue * 2;
                zone = 'double';
            } else if (radius > 0.42) {
                points = sectorValue;
                zone = 'single';
            } else if (radius > 0.35) {
                points = sectorValue * 3;
                zone = 'triple';
            } else if (radius > 0.12) {
                points = sectorValue;
                zone = 'single';
            } else if (radius > 0.05) {
                points = 25;
                zone = 'inner_bull';
            } else {
                points = 50;
                zone = 'bullseye';
            }

            state.lastHitPoints = points;
            state.lastHitZone = zone;
            state.roundScore += points;
            state.totalScore += points;
            
            showMessage(`${points > 0 ? points : 'MISS'}`, points >= 50 ? '#FF0000' : '#FFD700');
            updateUI();
        }

        function showMessage(text, color) {
            const msg = document.getElementById('message-overlay');
            msg.innerText = text;
            msg.style.color = color || '#FFD700';
            msg.style.opacity = 1;
            setTimeout(() => { msg.style.opacity = 0; }, 1000);
        }

        function updateUI() {
            document.getElementById('ui-score').innerText = `Score: ${state.totalScore}`;
            document.getElementById('ui-round-score').innerText = `Round Score: ${state.roundScore}`;
            document.getElementById('ui-darts').innerText = `Darts Left: ${state.dartsLeft}`;
            document.getElementById('ui-difficulty').innerText = `Difficulty: ${state.difficulty}`;
            document.getElementById('ui-round').innerText = `Round: ${state.roundNumber}`;

            if (state.dartsLeft === 0 && !state.dartInFlight && !isStuck) {
                document.getElementById('nextRoundBtn').style.display = 'block';
            } else {
                document.getElementById('nextRoundBtn').style.display = 'none';
            }
        }

        document.getElementById('newGameBtn').addEventListener('click', () => {
            state.totalScore = 0;
            state.roundScore = 0;
            state.dartsLeft = 3;
            state.difficulty = 1;
            state.roundNumber = 1;
            state.gameActive = true;
            resetDart();
            updateUI();
        });

        document.getElementById('nextRoundBtn').addEventListener('click', () => {
            // Adjust difficulty
            if (state.roundScore >= 60) {
                state.difficulty = Math.min(5, state.difficulty + 1);
                showMessage('LEVEL UP!', '#00FF00');
            } else if (state.roundScore < 20) {
                state.difficulty = Math.max(1, state.difficulty - 1);
                showMessage('LEVEL DOWN', '#FF0000');
            }

            state.roundNumber++;
            state.roundScore = 0;
            state.dartsLeft = 3;
            resetDart();
            updateUI();
        });

        function resetDart() {
            scene.attach(dartGroup); // Detach from board if stuck
            dartGroup.position.copy(camera.position);
            dartGroup.position.y -= 0.2;
            dartGroup.position.x += 0.1;
            dartGroup.rotation.set(0,0,0);
            state.dartInFlight = false;
            isStuck = false;
            stuckTimer = 0;
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();
            const delta = clock.getDelta();

            // Update Board Position based on difficulty
            if (state.difficulty > 1) {
                const swayX = (state.difficulty - 1) * 0.05;
                const swayY = state.difficulty >= 3 ? (state.difficulty - 2) * 0.05 : 0;
                
                boardGroup.position.x = Math.sin(time * 1.5) * swayX;
                boardGroup.position.y = 1.7 + Math.cos(time * 2.0) * swayY;
            } else {
                boardGroup.position.x = 0;
                boardGroup.position.y = 1.7;
            }
            
            state.boardPositionX = boardGroup.position.x;
            state.boardPositionY = boardGroup.position.y;

            // Dart Throw Animation
            if (state.dartInFlight && !isStuck) {
                let t = (time - throwStartTime) / throwDuration;
                
                if (t >= 1) {
                    t = 1;
                    isStuck = true;
                    stuckTimer = time;
                    
                    // Final position
                    dartGroup.position.lerpVectors(startPos, targetPos, t);
                    
                    // Attach to board so it moves with it
                    boardGroup.attach(dartGroup);
                    
                    triggerParticles(targetPos);
                    calculateScore(targetPos);
                } else {
                    // Interpolate position
                    dartGroup.position.lerpVectors(startPos, targetPos, t);
                    
                    // Parabolic arc (gravity)
                    dartGroup.position.y += Math.sin(t * Math.PI) * 0.15;
                    
                    // Wobble
                    if (state.wobbleAmount > 0) {
                        const wobbleFactor = Math.sin(t * Math.PI); // Max wobble in middle of flight
                        dartGroup.position.x += Math.sin(time * 20 + throwWobblePhaseX) * state.wobbleAmount * wobbleFactor;
                        dartGroup.position.y += Math.cos(time * 20 + throwWobblePhaseY) * state.wobbleAmount * wobbleFactor;
                    }
                    
                    // Point dart along trajectory
                    const nextPos = new THREE.Vector3().lerpVectors(startPos, targetPos, t + 0.01);
                    nextPos.y += Math.sin((t+0.01) * Math.PI) * 0.15;
                    dartGroup.lookAt(nextPos);
                }
            }

            // Stuck logic
            if (isStuck) {
                if (time - stuckTimer > 2.0) {
                    if (state.dartsLeft > 0) {
                        resetDart();
                    } else {
                        state.dartInFlight = false; // Allow next round button to show
                        updateUI();
                    }
                }
            }

            // Update Particles
            if (particlesActive) {
                particleAge += 0.016;
                const positions = particles.geometry.attributes.position.array;
                for(let i=0; i<particleCount; i++) {
                    positions[i*3] += particleVel[i].x;
                    positions[i*3+1] += particleVel[i].y - 0.002; // gravity
                    positions[i*3+2] += particleVel[i].z;
                }
                particles.geometry.attributes.position.needsUpdate = true;
                particles.material.opacity = 1 - (particleAge / 1.0);
                if (particleAge > 1.0) {
                    particlesActive = false;
                    particles.visible = false;
                }
            }

            // Camera return to center if not right clicking
            if (!rightMouseDown && !state.dartInFlight && !isStuck) {
                camera.position.lerp(new THREE.Vector3(0, 1.6, 3), 0.05);
                const targetLook = new THREE.Vector3(0, 1.6, -3);
                const currentLook = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).add(camera.position);
                currentLook.lerp(targetLook, 0.05);
                camera.lookAt(currentLook);
            }

            controls.update();
            
            // Update State Object
            state.dartPositionZ = dartGroup.position.z;
            // Ensure no NaNs
            Object.keys(state).forEach(key => {
                if (typeof state[key] === 'number' && isNaN(state[key])) state[key] = 0;
            });

            renderer.render(scene, camera);
        }

        // Initialize
        updateUI();
        animate();

    </script>
</body>
</html>
