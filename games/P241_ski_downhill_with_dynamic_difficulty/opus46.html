<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Ski Downhill Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    pointer-events: none;
    z-index: 10;
}

#scoreDisplay {
    position: absolute;
    top: 15px;
    left: 20px;
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}

#livesDisplay {
    position: absolute;
    top: 15px;
    right: 20px;
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    text-align: right;
}

#levelDisplay {
    position: absolute;
    top: 50px;
    right: 20px;
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    text-align: right;
}

#pauseBtn {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: all;
    padding: 8px 20px;
    font-size: 16px;
    font-weight: bold;
    background: rgba(255,255,255,0.2);
    color: white;
    border: 2px solid white;
    border-radius: 5px;
    cursor: pointer;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    display: none;
}
#pauseBtn:hover { background: rgba(255,255,255,0.4); }

#overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
    pointer-events: all;
}

#startScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

#startScreen h1 {
    color: white;
    font-size: 48px;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
}

#startScreen p {
    color: #ddd;
    font-size: 18px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    text-align: center;
    max-width: 400px;
}

#startBtn, #restartBtn {
    padding: 15px 40px;
    font-size: 22px;
    font-weight: bold;
    background: linear-gradient(135deg, #ff4444, #cc0000);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    transition: transform 0.2s;
}
#startBtn:hover, #restartBtn:hover { transform: scale(1.05); }

#gameoverScreen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    background: rgba(0,0,0,0.7);
    padding: 40px;
    border-radius: 20px;
}

#gameoverScreen h1 {
    color: #ff4444;
    font-size: 52px;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
}

#gameoverScreen p {
    color: white;
    font-size: 24px;
}

#pauseOverlay {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    background: rgba(0,0,0,0.5);
    padding: 40px;
    border-radius: 20px;
}

#pauseOverlay h1 {
    color: white;
    font-size: 48px;
}

#flash {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(255, 215, 0, 0.4);
    pointer-events: none;
    z-index: 15;
    display: none;
}
</style>
</head>
<body>

<div id="hud">
    <div id="scoreDisplay">Score: 0</div>
    <div id="livesDisplay">❤️❤️❤️</div>
    <div id="levelDisplay">Level: 1</div>
    <button id="pauseBtn">⏸ Pause</button>
</div>

<div id="flash"></div>

<div id="overlay">
    <div id="startScreen">
        <h1>⛷️ Ski Downhill</h1>
        <p>Race down the mountain! Dodge trees and rocks. Collect antique cameras for bonus points!</p>
        <p>Use ← → or A/D to steer</p>
        <button id="startBtn">Start Game</button>
    </div>
    <div id="gameoverScreen">
        <h1>Game Over</h1>
        <p id="finalScore">Score: 0</p>
        <p id="finalCameras">Cameras: 0</p>
        <button id="restartBtn">Restart</button>
    </div>
    <div id="pauseOverlay">
        <h1>⏸ Paused</h1>
        <p>Press P or click Pause to resume</p>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
let gameState = 'waiting';
let score = 0;
let lives = 3;
let difficultyLevel = 1;
let camerasCollected = 0;
let elapsedTime = 0;
let speed = 0.1;
let skierX = 0;
let cameraModelLoaded = false;
let cameraModelTemplate = null;

const obstacles = [];
const cameras = [];
const snowParticles = [];

let lastObstacleSpawn = 0;
let lastCameraSpawn = 0;
let lastDifficultyIncrease = 0;
let gameStartTime = 0;
let pausedTimeAccumulated = 0;
let pauseStartTime = 0;

const keys = {};

// Expose state
window.__3D_STATE__ = {
    gameState: 'waiting',
    score: 0,
    lives: 3,
    difficultyLevel: 1,
    skierX: 0,
    speed: 0.1,
    camerasCollected: 0,
    obstacleCount: 0,
    elapsedTime: 0,
    skierExists: false,
    cameraModelLoaded: false
};

function updateExposedState() {
    window.__3D_STATE__.gameState = gameState;
    window.__3D_STATE__.score = Math.floor(score) || 0;
    window.__3D_STATE__.lives = lives || 0;
    window.__3D_STATE__.difficultyLevel = difficultyLevel || 1;
    window.__3D_STATE__.skierX = isNaN(skierX) ? 0 : skierX;
    window.__3D_STATE__.speed = isNaN(speed) ? 0.1 : speed;
    window.__3D_STATE__.camerasCollected = camerasCollected || 0;
    window.__3D_STATE__.obstacleCount = obstacles.length + 0;
    window.__3D_STATE__.elapsedTime = isNaN(elapsedTime) ? 0 : Math.floor(elapsedTime);
    window.__3D_STATE__.skierExists = !!skier && scene.children.includes(skier);
    window.__3D_STATE__.cameraModelLoaded = cameraModelLoaded;
}

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 30, 80);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 8, 12);
camera.lookAt(0, 0, -5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(-5, 15, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 80;
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 40;
dirLight.shadow.camera.bottom = -40;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0x8888cc, 0.5);
scene.add(ambientLight);

// Ground / Slope
const slopeSegments = [];
const slopeLength = 120;
const slopeWidth = 25;

function createSlope() {
    const geometry = new THREE.PlaneGeometry(slopeWidth, slopeLength, 20, 60);
    const material = new THREE.MeshStandardMaterial({
        color: 0xf0f5ff,
        roughness: 0.8,
        metalness: 0.0
    });

    // Add some vertex displacement for terrain feel
    const positions = geometry.attributes.position;
    for (let i = 0; i < positions.count; i++) {
        const x = positions.getX(i);
        const y = positions.getY(i);
        const z = positions.getZ(i);
        positions.setZ(i, z + Math.sin(x * 0.5) * 0.2 + Math.cos(y * 0.3) * 0.15);
    }
    geometry.computeVertexNormals();

    const slope = new THREE.Mesh(geometry, material);
    slope.rotation.x = -Math.PI / 2 - 0.08; // Slight tilt for downhill feel
    slope.position.y = -0.5;
    slope.position.z = -slopeLength / 2 + 10;
    slope.receiveShadow = true;
    scene.add(slope);
    slopeSegments.push(slope);

    // Second slope segment for seamless scrolling
    const slope2 = slope.clone();
    slope2.position.z = -slopeLength / 2 + 10 - slopeLength;
    scene.add(slope2);
    slopeSegments.push(slope2);
}
createSlope();

// Side boundaries (snow banks)
function createSnowBanks() {
    const bankGeo = new THREE.BoxGeometry(3, 2, slopeLength * 2);
    const bankMat = new THREE.MeshStandardMaterial({ color: 0xe8eeff, roughness: 0.9 });

    const leftBank = new THREE.Mesh(bankGeo, bankMat);
    leftBank.position.set(-slopeWidth / 2 + 1, 0, -slopeLength / 2);
    leftBank.receiveShadow = true;
    scene.add(leftBank);

    const rightBank = new THREE.Mesh(bankGeo, bankMat);
    rightBank.position.set(slopeWidth / 2 - 1, 0, -slopeLength / 2);
    rightBank.receiveShadow = true;
    scene.add(rightBank);
}
createSnowBanks();

// Skier
let skier;
function createSkier() {
    const group = new THREE.Group();

    // Body (capsule-like: cylinder + spheres)
    const bodyGeo = new THREE.CylinderGeometry(0.3, 0.35, 1.2, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xdd2222, roughness: 0.5 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1.0;
    body.castShadow = true;
    group.add(body);

    // Head
    const headGeo = new THREE.SphereGeometry(0.25, 8, 8);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.6 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 1.85;
    head.castShadow = true;
    group.add(head);

    // Hat
    const hatGeo = new THREE.ConeGeometry(0.28, 0.4, 8);
    const hatMat = new THREE.MeshStandardMaterial({ color: 0x2244aa });
    const hat = new THREE.Mesh(hatGeo, hatMat);
    hat.position.y = 2.15;
    group.add(hat);

    // Skis
    const skiGeo = new THREE.BoxGeometry(0.15, 0.05, 1.8);
    const skiMat = new THREE.MeshStandardMaterial({ color: 0x3344aa, roughness: 0.3, metalness: 0.5 });
    const leftSki = new THREE.Mesh(skiGeo, skiMat);
    leftSki.position.set(-0.2, 0.15, -0.1);
    group.add(leftSki);
    const rightSki = new THREE.Mesh(skiGeo, skiMat);
    rightSki.position.set(0.2, 0.15, -0.1);
    group.add(rightSki);

    // Poles
    const poleGeo = new THREE.CylinderGeometry(0.02, 0.02, 1.5, 4);
    const poleMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8 });
    const leftPole = new THREE.Mesh(poleGeo, poleMat);
    leftPole.position.set(-0.5, 0.9, 0);
    leftPole.rotation.z = 0.2;
    leftPole.rotation.x = -0.15;
    group.add(leftPole);
    const rightPole = new THREE.Mesh(poleGeo, poleMat);
    rightPole.position.set(0.5, 0.9, 0);
    rightPole.rotation.z = -0.2;
    rightPole.rotation.x = -0.15;
    group.add(rightPole);

    group.position.set(0, 0, 5);
    scene.add(group);
    return group;
}
skier = createSkier();

// Snow particles
function createSnowParticles() {
    const count = 500;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(count * 3);
    const velocities = [];

    for (let i = 0; i < count; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 40;
        positions[i * 3 + 1] = Math.random() * 20;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 60 - 10;
        velocities.push({
            x: (Math.random() - 0.5) * 0.02,
            y: -0.02 - Math.random() * 0.03,
            z: 0.01 + Math.random() * 0.02
        });
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const material = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.15,
        transparent: true,
        opacity: 0.8
    });

    const points = new THREE.Points(geometry, material);
    scene.add(points);
    return { points, velocities };
}
const snow = createSnowParticles();

// Load camera model
const gltfLoader = new GLTFLoader();
gltfLoader.load(
    './AntiqueCamera.glb',
    (gltf) => {
        cameraModelTemplate = gltf.scene;
        cameraModelTemplate.scale.set(0.5, 0.5, 0.5);
        cameraModelLoaded = true;
        console.log('AntiqueCamera.glb loaded successfully');
    },
    undefined,
    (error) => {
        console.warn('Could not load AntiqueCamera.glb, using fallback geometry', error);
        // Create fallback camera model
        const fallbackGroup = new THREE.Group();

        // Camera body
        const bodyGeo = new THREE.BoxGeometry(0.6, 0.5, 0.7);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.4, metalness: 0.3 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        fallbackGroup.add(body);

        // Lens
        const lensGeo = new THREE.CylinderGeometry(0.15, 0.2, 0.3, 12);
        const lensMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.2, metalness: 0.8 });
        const lens = new THREE.Mesh(lensGeo, lensMat);
        lens.rotation.x = Math.PI / 2;
        lens.position.z = 0.5;
        fallbackGroup.add(lens);

        // Glass
        const glassGeo = new THREE.CircleGeometry(0.14, 12);
        const glassMat = new THREE.MeshStandardMaterial({ color: 0x4488ff, roughness: 0.1, metalness: 0.5 });
        const glass = new THREE.Mesh(glassGeo, glassMat);
        glass.position.z = 0.66;
        fallbackGroup.add(glass);

        // Bellows
        const bellowsGeo = new THREE.BoxGeometry(0.5, 0.4, 0.2);
        const bellowsMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        const bellows = new THREE.Mesh(bellowsGeo, bellowsMat);
        bellows.position.z = 0.3;
        fallbackGroup.add(bellows);

        // Golden trim
        const trimGeo = new THREE.TorusGeometry(0.18, 0.02, 8, 16);
        const trimMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.9, roughness: 0.1 });
        const trim = new THREE.Mesh(trimGeo, trimMat);
        trim.position.z = 0.65;
        fallbackGroup.add(trim);

        fallbackGroup.scale.set(0.5, 0.5, 0.5);
        cameraModelTemplate = fallbackGroup;
        cameraModelLoaded = true;
    }
);

// Create tree obstacle
function createTree(x, z) {
    const group = new THREE.Group();

    // Trunk
    const trunkGeo = new THREE.CylinderGeometry(0.15, 0.2, 1.5, 6);
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 });
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.y = 0.75;
    trunk.castShadow = true;
    group.add(trunk);

    // Foliage layers
    const foliageMat = new THREE.MeshStandardMaterial({ color: 0x228B22, roughness: 0.8 });

    const foliage1Geo = new THREE.ConeGeometry(1.0, 1.5, 8);
    const foliage1 = new THREE.Mesh(foliage1Geo, foliageMat);
    foliage1.position.y = 2.0;
    foliage1.castShadow = true;
    group.add(foliage1);

    const foliage2Geo = new THREE.ConeGeometry(0.75, 1.2, 8);
    const foliage2 = new THREE.Mesh(foliage2Geo, foliageMat);
    foliage2.position.y = 3.0;
    foliage2.castShadow = true;
    group.add(foliage2);

    const foliage3Geo = new THREE.ConeGeometry(0.5, 0.9, 8);
    const foliage3 = new THREE.Mesh(foliage3Geo, foliageMat);
    foliage3.position.y = 3.8;
    foliage3.castShadow = true;
    group.add(foliage3);

    // Snow on top
    const snowCapGeo = new THREE.ConeGeometry(0.3, 0.3, 8);
    const snowCapMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const snowCap = new THREE.Mesh(snowCapGeo, snowCapMat);
    snowCap.position.y = 4.2;
    group.add(snowCap);

    group.position.set(x, 0, z);
    group.userData.type = 'tree';
    scene.add(group);
    return group;
}

// Create rock obstacle
function createRock(x, z) {
    const group = new THREE.Group();

    const rockGeo = new THREE.DodecahedronGeometry(0.7, 1);
    const rockMat = new THREE.MeshStandardMaterial({ color: 0x555566, roughness: 0.9, metalness: 0.1 });

    // Deform vertices slightly
    const positions = rockGeo.attributes.position;
    for (let i = 0; i < positions.count; i++) {
        const x2 = positions.getX(i);
        const y2 = positions.getY(i);
        const z2 = positions.getZ(i);
        const scale = 0.85 + Math.random() * 0.3;
        positions.setX(i, x2 * scale);
        positions.setY(i, Math.max(y2 * scale, -0.3));
        positions.setZ(i, z2 * scale);
    }
    rockGeo.computeVertexNormals();

    const rock = new THREE.Mesh(rockGeo, rockMat);
    rock.position.y = 0.4;
    rock.castShadow = true;
    rock.rotation.y = Math.random() * Math.PI;
    group.add(rock);

    // Snow on rock
    const snowGeo = new THREE.SphereGeometry(0.5, 8, 4, 0, Math.PI * 2, 0, Math.PI / 3);
    const snowMat = new THREE.MeshStandardMaterial({ color: 0xeeeeff });
    const snowPatch = new THREE.Mesh(snowGeo, snowMat);
    snowPatch.position.y = 0.8;
    group.add(snowPatch);

    group.position.set(x, 0, z);
    group.userData.type = 'rock';
    scene.add(group);
    return group;
}

// Create collectible camera
function createCollectibleCamera(x, z) {
    if (!cameraModelTemplate) return null;

    const cameraClone = cameraModelTemplate.clone();
    cameraClone.position.set(x, 1.5, z);
    cameraClone.userData.type = 'camera';
    cameraClone.userData.baseY = 1.5;
    cameraClone.userData.spawnTime = performance.now();

    // Add a glow ring
    const ringGeo = new THREE.TorusGeometry(0.8, 0.05, 8, 24);
    const ringMat = new THREE.MeshStandardMaterial({
        color: 0xFFD700,
        emissive: 0xFFD700,
        emissiveIntensity: 0.5,
        metalness: 0.9
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    ring.position.y = 0;
    cameraClone.add(ring);

    scene.add(cameraClone);
    return cameraClone;
}

// Spawn obstacle
function spawnObstacle() {
    const x = (Math.random() - 0.5) * 14;
    const z = skier.position.z - 60 - Math.random() * 20;

    if (Math.random() < 0.5) {
        obstacles.push(createTree(x, z));
    } else {
        obstacles.push(createRock(x, z));
    }
}

// Spawn camera collectible
function spawnCamera() {
    if (!cameraModelTemplate) return;
    const x = (Math.random() - 0.5) * 14;
    const z = skier.position.z - 50 - Math.random() * 15;
    const cam = createCollectibleCamera(x, z);
    if (cam) cameras.push(cam);
}

// Flash effect
function showFlash() {
    const flash = document.getElementById('flash');
    flash.style.display = 'block';
    setTimeout(() => { flash.style.display = 'none'; }, 150);
}

// Hit flash (red)
function showHitFlash() {
    const flash = document.getElementById('flash');
    flash.style.background = 'rgba(255, 0, 0, 0.4)';
    flash.style.display = 'block';
    setTimeout(() => {
        flash.style.display = 'none';
        flash.style.background = 'rgba(255, 215, 0, 0.4)';
    }, 200);
}

// UI updates
function updateHUD() {
    document.getElementById('scoreDisplay').textContent = `Score: ${Math.floor(score)}`;

    let hearts = '';
    for (let i = 0; i < lives; i++) hearts += '❤️';
    for (let i = lives; i < 3; i++) hearts += '🖤';
    document.getElementById('livesDisplay').textContent = `Lives: ${hearts}`;

    document.getElementById('levelDisplay').textContent = `Level: ${difficultyLevel}`;
}

// Difficulty settings
function getDifficultySettings() {
    const t = Math.min(difficultyLevel, 5);
    return {
        spawnInterval: 2000 - (t - 1) * 300, // 2000 -> 800
        speed: 0.1 + (t - 1) * 0.0375,       // 0.1 -> 0.25
        cameraSpawnInterval: 5000 - (t - 1) * 500
    };
}

// Game state management
function startGame() {
    gameState = 'playing';
    score = 0;
    lives = 3;
    difficultyLevel = 1;
    camerasCollected = 0;
    elapsedTime = 0;
    skierX = 0;
    speed = 0.1;
    gameStartTime = performance.now();
    pausedTimeAccumulated = 0;
    lastObstacleSpawn = 0;
    lastCameraSpawn = 0;
    lastDifficultyIncrease = 0;

    // Clear obstacles
    obstacles.forEach(o => scene.remove(o));
    obstacles.length = 0;
    cameras.forEach(c => scene.remove(c));
    cameras.length = 0;

    skier.position.set(0, 0, 5);

    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('gameoverScreen').style.display = 'none';
    document.getElementById('pauseOverlay').style.display = 'none';
    document.getElementById('overlay').style.pointerEvents = 'none';
    document.getElementById('pauseBtn').style.display = 'block';

    updateHUD();
}

function gameOver() {
    gameState = 'gameover';
    document.getElementById('gameoverScreen').style.display = 'flex';
    document.getElementById('finalScore').textContent = `Score: ${Math.floor(score)}`;
    document.getElementById('finalCameras').textContent = `📷 Cameras Collected: ${camerasCollected}`;
    document.getElementById('overlay').style.pointerEvents = 'all';
    document.getElementById('pauseBtn').style.display = 'none';
}

function togglePause() {
    if (gameState === 'playing') {
        gameState = 'paused';
        pauseStartTime = performance.now();
        document.getElementById('pauseOverlay').style.display = 'flex';
        document.getElementById('overlay').style.pointerEvents = 'all';
        document.getElementById('pauseBtn').textContent = '▶ Resume';
    } else if (gameState === 'paused') {
        gameState = 'playing';
        pausedTimeAccumulated += performance.now() - pauseStartTime;
        document.getElementById('pauseOverlay').style.display = 'none';
        document.getElementById('overlay').style.pointerEvents = 'none';
        document.getElementById('pauseBtn').textContent = '⏸ Pause';
    }
}

// Event listeners
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);
document.getElementById('pauseBtn').addEventListener('click', togglePause);

document.addEventListener('keydown', (e) => {
    keys[e.key.toLowerCase()] = true;
    if (e.key.toLowerCase() === 'p' && (gameState === 'playing' || gameState === 'paused')) {
        togglePause();
    }
});

document.addEventListener('keyup', (e) => {
    keys[e.key.toLowerCase()] = false;
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Update snow particles
function updateSnow() {
    const positions = snow.points.geometry.attributes.position;
    for (let i = 0; i < positions.count; i++) {
        let x = positions.getX(i);
        let y = positions.getY(i);
        let z = positions.getZ(i);

        x += snow.velocities[i].x;
        y += snow.velocities[i].y;
        z += snow.velocities[i].z;

        if (y < -1) {
            y = 15 + Math.random() * 5;
            x = skier.position.x + (Math.random() - 0.5) * 40;
            z = skier.position.z + (Math.random() - 0.5) * 60 - 20;
        }

        positions.setX(i, x);
        positions.setY(i, y);
        positions.setZ(i, z);
    }
    positions.needsUpdate = true;
}

// Main game loop
let lastTime = performance.now();

function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    const delta = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    updateExposedState();

    if (gameState === 'playing') {
        const settings = getDifficultySettings();
        speed = settings.speed;

        // Update elapsed time
        elapsedTime = (now - gameStartTime - pausedTimeAccumulated) / 1000;

        // Difficulty increase
        if (elapsedTime - lastDifficultyIncrease >= 15 && difficultyLevel < 5) {
            difficultyLevel++;
            lastDifficultyIncrease = elapsedTime;
        }

        // Skier movement
        const moveSpeed = 8 * delta;
        if (keys['arrowleft'] || keys['a']) {
            skierX -= moveSpeed;
        }
        if (keys['arrowright'] || keys['d']) {
            skierX += moveSpeed;
        }
        skierX = Math.max(-8, Math.min(8, skierX));
        skier.position.x = skierX;

        // Slight lean when turning
        const targetLean = 0;
        if (keys['arrowleft'] || keys['a']) skier.rotation.z = 0.15;
        else if (keys['arrowright'] || keys['d']) skier.rotation.z = -0.15;
        else skier.rotation.z *= 0.9;

        // Move skier downhill (negative Z)
        skier.position.z -= speed;

        // Score
        score += speed * 2;

        // Spawn obstacles
        if (now - lastObstacleSpawn > settings.spawnInterval) {
            spawnObstacle();
            // Sometimes spawn two
            if (difficultyLevel >= 3 && Math.random() < 0.3) {
                spawnObstacle();
            }
            lastObstacleSpawn = now;
        }

        // Spawn cameras
        if (now - lastCameraSpawn > settings.cameraSpawnInterval && cameraModelTemplate) {
            spawnCamera();
            lastCameraSpawn = now;
        }

        // Update obstacles
        for (let i = obstacles.length - 1; i >= 0; i--) {
            const obs = obstacles[i];

            // Check if passed
            if (obs.position.z > skier.position.z + 15) {
                scene.remove(obs);
                obstacles.splice(i, 1);
                continue;
            }

            // Collision detection
            const dx = skier.position.x - obs.position.x;
            const dz = skier.position.z - obs.position.z;
            const dist = Math.sqrt(dx * dx + dz * dz);

            if (dist < 1.2) {
                lives--;
                showHitFlash();
                scene.remove(obs);
                obstacles.splice(i, 1);

                if (lives <= 0) {
                    gameOver();
                    break;
                }
                updateHUD();
            }
        }

        // Update cameras
        for (let i = cameras.length - 1; i >= 0; i--) {
            const cam = cameras[i];

            // Rotate and bob
            cam.rotation.y += 1.5 * delta;
            const bobTime = (now - cam.userData.spawnTime) / 1000;
            cam.position.y = cam.userData.baseY + Math.sin(bobTime * 2) * 0.3;

            // Check if passed
            if (cam.position.z > skier.position.z + 15) {
                scene.remove(cam);
                cameras.splice(i, 1);
                continue;
            }

            // Collection detection
            const dx = skier.position.x - cam.position.x;
            const dz = skier.position.z - cam.position.z;
            const dist = Math.sqrt(dx * dx + dz * dz);

            if (dist < 1.5) {
                score += 50;
                camerasCollected++;
                showFlash();
                scene.remove(cam);
                cameras.splice(i, 1);
            }
        }

        // Update slope scrolling (move slopes to follow skier)
        slopeSegments.forEach((slope, idx) => {
            const baseZ = skier.position.z - slopeLength / 2 + 10;
            const offset = ((slope.position.z - baseZ) % (slopeLength * 2) + slopeLength * 2) % (slopeLength * 2);
            if (offset > slopeLength * 1.5) {
                slope.position.z -= slopeLength * 2;
            }
            slope.position.z = baseZ - idx * slopeLength;
        });

        // Update camera position (chase cam)
        const targetCamPos = new THREE.Vector3(
            skier.position.x * 0.5,
            skier.position.y + 8,
            skier.position.z + 12
        );
        camera.position.lerp(targetCamPos, 0.05);
        camera.lookAt(skier.position.x * 0.3, skier.position.y + 1, skier.position.z - 8);

        // Update directional light to follow
        dirLight.position.set(skier.position.x - 5, 15, skier.position.z + 5);
        dirLight.target.position.copy(skier.position);
        dirLight.target.updateMatrixWorld();

        updateHUD();
    }

    // Update snow even when paused for visual effect
    updateSnow();

    // Camera follows skier even in non-playing states
    if (gameState !== 'playing') {
        const targetCamPos = new THREE.Vector3(
            skier.position.x * 0.5,
            skier.position.y + 8,
            skier.position.z + 12
        );
        camera.position.lerp(targetCamPos, 0.05);
        camera.lookAt(skier.position.x * 0.3, skier.position.y + 1, skier.position.z - 8);
    }

    renderer.render(scene, camera);
}

animate();
</script>
