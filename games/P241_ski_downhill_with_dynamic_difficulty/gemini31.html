<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ski Downhill</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-text {
            color: white;
            font-weight: bold;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            position: absolute;
        }
        #score-display {
            top: 20px;
            left: 20px;
        }
        #right-hud {
            top: 20px;
            right: 20px;
            text-align: right;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            transition: opacity 0.3s;
        }
        .hidden {
            opacity: 0;
            pointer-events: none !important;
        }
        h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #87CEEB;
        }
        button {
            padding: 15px 30px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: #ff4757;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s, background 0.2s;
            pointer-events: auto;
        }
        button:hover {
            background: #ff6b81;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        #pauseBtn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            font-size: 18px;
            background: #2ed573;
        }
        #pauseBtn:hover {
            background: #7bed9f;
            transform: translateX(-50%) scale(1.05);
        }
        #flash-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
        }
    </style>
    <!-- Import Three.js and GLTFLoader -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div id="score-display" class="hud-text">Score: 0</div>
        <div id="right-hud" class="hud-text">
            <div id="lives-display">Lives: ❤️❤️❤️</div>
            <div id="level-display">Level: 1</div>
        </div>
        
        <button id="pauseBtn" class="hidden">Pause</button>

        <div id="start-screen" class="overlay">
            <h1>Ski Downhill</h1>
            <button id="startBtn">Start Game</button>
        </div>

        <div id="gameover-screen" class="overlay hidden">
            <h1>Game Over</h1>
            <div id="final-score" class="hud-text" style="position: relative; margin-bottom: 20px;">Score: 0</div>
            <button id="restartBtn">Restart</button>
        </div>
    </div>

    <div id="flash-overlay"></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            gameState: 'waiting', // 'waiting' | 'playing' | 'paused' | 'gameover'
            score: 0,
            lives: 3,
            difficultyLevel: 1,
            skierX: 0,
            speed: 0.1,
            camerasCollected: 0,
            obstacleCount: 0,
            elapsedTime: 0,
            skierExists: false,
            cameraModelLoaded: false
        };

        // --- Constants & Variables ---
        const LANE_LIMIT = 8;
        const BASE_SPEED = 0.1;
        const MAX_SPEED = 0.25;
        const BASE_SPAWN_INTERVAL = 2000;
        const MIN_SPAWN_INTERVAL = 800;
        const LEVEL_DURATION = 15; // seconds
        const MAX_LEVEL = 5;

        let scene, camera, renderer;
        let skier;
        let groundTexture;
        let obstacles = [];
        let collectibles = [];
        let cameraModelTemplate = null;
        
        let lastTime = 0;
        let playStartTime = 0;
        let lastObstacleSpawnTime = 0;
        let lastCameraSpawnTime = 0;
        let currentSpawnInterval = BASE_SPAWN_INTERVAL;
        let frameCount = 0;

        const keys = { left: false, right: false };

        // --- DOM Elements ---
        const scoreEl = document.getElementById('score-display');
        const livesEl = document.getElementById('lives-display');
        const levelEl = document.getElementById('level-display');
        const startScreen = document.getElementById('start-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const finalScoreEl = document.getElementById('final-score');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const flashOverlay = document.getElementById('flash-overlay');

        // --- Initialization ---
        function init() {
            const canvas = document.getElementById('gameCanvas');
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 30, 100);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(0, 5, 10);
            camera.lookAt(0, 0, -10);

            // Lights
            const ambientLight = new THREE.AmbientLight(0x8888cc, 0.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(-10, 20, 10);
            scene.add(dirLight);

            createEnvironment();
            createSkier();
            loadModels();

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            
            startBtn.addEventListener('click', startGame);
            restartBtn.addEventListener('click', restartGame);
            pauseBtn.addEventListener('click', togglePause);

            requestAnimationFrame(animate);
        }

        function createEnvironment() {
            // Procedural snow texture to show movement
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 512, 512);
            ctx.fillStyle = '#e0f0ff';
            for(let i=0; i<200; i++) {
                ctx.beginPath();
                ctx.arc(Math.random()*512, Math.random()*512, Math.random()*3+1, 0, Math.PI*2);
                ctx.fill();
            }
            
            groundTexture = new THREE.CanvasTexture(canvas);
            groundTexture.wrapS = THREE.RepeatWrapping;
            groundTexture.wrapT = THREE.RepeatWrapping;
            groundTexture.repeat.set(10, 100);

            const groundGeo = new THREE.PlaneGeometry(100, 1000);
            const groundMat = new THREE.MeshStandardMaterial({ 
                map: groundTexture,
                roughness: 0.8,
                metalness: 0.1
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.z = -400;
            scene.add(ground);
        }

        function createSkier() {
            const geo = new THREE.CapsuleGeometry(0.5, 1, 4, 8);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            skier = new THREE.Mesh(geo, mat);
            skier.position.set(0, 1, 0);
            scene.add(skier);
            window.__3D_STATE__.skierExists = true;
        }

        function loadModels() {
            const loader = new GLTFLoader();
            
            // Create a fallback model in case GLTF fails
            const fallbackGeo = new THREE.BoxGeometry(0.8, 0.6, 0.4);
            const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xffd700 });
            const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
            const lensGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.3);
            const lensMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const lens = new THREE.Mesh(lensGeo, lensMat);
            lens.rotation.x = Math.PI / 2;
            lens.position.z = -0.25;
            fallbackMesh.add(lens);
            
            loader.load(
                './AntiqueCamera.glb',
                (gltf) => {
                    cameraModelTemplate = gltf.scene;
                    cameraModelTemplate.scale.set(0.5, 0.5, 0.5);
                    window.__3D_STATE__.cameraModelLoaded = true;
                },
                undefined,
                (error) => {
                    console.warn('Could not load AntiqueCamera.glb, using fallback.', error);
                    cameraModelTemplate = fallbackMesh;
                    cameraModelTemplate.scale.set(0.5, 0.5, 0.5);
                    window.__3D_STATE__.cameraModelLoaded = false;
                }
            );
            
            // If loader takes too long or fails silently, ensure we have a fallback
            setTimeout(() => {
                if (!cameraModelTemplate) {
                    cameraModelTemplate = fallbackMesh;
                    cameraModelTemplate.scale.set(0.5, 0.5, 0.5);
                }
            }, 2000);
        }

        // --- Game Logic ---
        function startGame() {
            resetGameState();
            window.__3D_STATE__.gameState = 'playing';
            startScreen.classList.add('hidden');
            pauseBtn.classList.remove('hidden');
            playStartTime = performance.now();
            lastTime = performance.now();
        }

        function restartGame() {
            resetGameState();
            window.__3D_STATE__.gameState = 'playing';
            gameoverScreen.classList.add('hidden');
            pauseBtn.classList.remove('hidden');
            playStartTime = performance.now();
            lastTime = performance.now();
        }

        function togglePause() {
            const state = window.__3D_STATE__;
            if (state.gameState === 'playing') {
                state.gameState = 'paused';
                pauseBtn.innerText = 'Resume';
            } else if (state.gameState === 'paused') {
                state.gameState = 'playing';
                pauseBtn.innerText = 'Pause';
                lastTime = performance.now(); // Prevent huge delta
            }
        }

        function resetGameState() {
            const state = window.__3D_STATE__;
            state.score = 0;
            state.lives = 3;
            state.difficultyLevel = 1;
            state.speed = BASE_SPEED;
            state.camerasCollected = 0;
            state.elapsedTime = 0;
            
            skier.position.x = 0;
            state.skierX = 0;
            
            currentSpawnInterval = BASE_SPAWN_INTERVAL;
            frameCount = 0;

            // Clear objects
            obstacles.forEach(obj => scene.remove(obj));
            collectibles.forEach(obj => scene.remove(obj));
            obstacles = [];
            collectibles = [];
            state.obstacleCount = 0;

            updateHUD();
        }

        function gameOver() {
            window.__3D_STATE__.gameState = 'gameover';
            pauseBtn.classList.add('hidden');
            gameoverScreen.classList.remove('hidden');
            finalScoreEl.innerText = `Score: ${Math.floor(window.__3D_STATE__.score)}`;
        }

        function spawnObstacle() {
            const isTree = Math.random() > 0.5;
            let mesh;

            if (isTree) {
                mesh = new THREE.Group();
                const trunkGeo = new THREE.CylinderGeometry(0.2, 0.3, 1);
                const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
                const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                trunk.position.y = 0.5;
                
                const leavesGeo = new THREE.ConeGeometry(1, 2, 8);
                const leavesMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
                const leaves = new THREE.Mesh(leavesGeo, leavesMat);
                leaves.position.y = 2;
                
                mesh.add(trunk);
                mesh.add(leaves);
            } else {
                const geo = new THREE.DodecahedronGeometry(0.8);
                const mat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9 });
                mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = 0.4;
            }

            mesh.position.x = (Math.random() * LANE_LIMIT * 2) - LANE_LIMIT;
            mesh.position.z = -100;
            
            scene.add(mesh);
            obstacles.push(mesh);
        }

        function spawnCamera() {
            if (!cameraModelTemplate) return;
            
            const cam = cameraModelTemplate.clone();
            cam.position.x = (Math.random() * LANE_LIMIT * 2) - LANE_LIMIT;
            cam.position.y = 0.5;
            cam.position.z = -100;
            
            // Add a property to track initial Y for bobbing
            cam.userData.baseY = 0.5;
            cam.userData.randomOffset = Math.random() * Math.PI * 2;
            
            scene.add(cam);
            collectibles.push(cam);
        }

        function triggerFlash() {
            flashOverlay.style.opacity = '0.8';
            setTimeout(() => {
                flashOverlay.style.opacity = '0';
            }, 100);
        }

        // --- Input ---
        function onKeyDown(e) {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
        }

        function onKeyUp(e) {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Main Loop ---
        function animate(time) {
            requestAnimationFrame(animate);

            const state = window.__3D_STATE__;
            
            // Handle NaN prevention
            if (isNaN(state.score)) state.score = 0;
            if (isNaN(state.skierX)) state.skierX = 0;

            if (state.gameState === 'playing') {
                const delta = time - lastTime;
                lastTime = time;
                
                // Update time and difficulty
                state.elapsedTime += delta / 1000;
                const newLevel = Math.min(MAX_LEVEL, Math.floor(state.elapsedTime / LEVEL_DURATION) + 1);
                
                if (newLevel > state.difficultyLevel) {
                    state.difficultyLevel = newLevel;
                    // Interpolate speed and spawn interval
                    const levelRatio = (state.difficultyLevel - 1) / (MAX_LEVEL - 1);
                    state.speed = BASE_SPEED + levelRatio * (MAX_SPEED - BASE_SPEED);
                    currentSpawnInterval = BASE_SPAWN_INTERVAL - levelRatio * (BASE_SPAWN_INTERVAL - MIN_SPAWN_INTERVAL);
                }

                // Player Movement
                const moveSpeed = 0.2;
                if (keys.left) skier.position.x -= moveSpeed;
                if (keys.right) skier.position.x += moveSpeed;
                
                // Clamp position
                skier.position.x = Math.max(-LANE_LIMIT, Math.min(LANE_LIMIT, skier.position.x));
                state.skierX = skier.position.x;

                // Ground Scrolling
                groundTexture.offset.y -= state.speed * 0.1;

                // Spawning
                if (time - lastObstacleSpawnTime > currentSpawnInterval) {
                    spawnObstacle();
                    lastObstacleSpawnTime = time;
                }
                
                if (time - lastCameraSpawnTime > currentSpawnInterval * 2.5) {
                    spawnCamera();
                    lastCameraSpawnTime = time;
                }

                // Move and check Obstacles
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obs = obstacles[i];
                    obs.position.z += state.speed * 60 * (delta/16.66); // Normalize speed to frame rate roughly
                    
                    // Collision
                    const dist = skier.position.distanceTo(obs.position);
                    if (dist < 1.2) {
                        scene.remove(obs);
                        obstacles.splice(i, 1);
                        state.lives--;
                        
                        // Visual hit feedback
                        skier.material.color.setHex(0xffffff);
                        setTimeout(() => { if(skier) skier.material.color.setHex(0xff0000); }, 150);

                        if (state.lives <= 0) {
                            gameOver();
                        }
                        continue;
                    }

                    // Cleanup
                    if (obs.position.z > 10) {
                        scene.remove(obs);
                        obstacles.splice(i, 1);
                    }
                }

                // Move and check Collectibles
                for (let i = collectibles.length - 1; i >= 0; i--) {
                    const cam = collectibles[i];
                    cam.position.z += state.speed * 60 * (delta/16.66);
                    
                    // Animation
                    cam.rotation.y += 0.05;
                    cam.position.y = cam.userData.baseY + Math.sin(time * 0.005 + cam.userData.randomOffset) * 0.2;

                    // Collision
                    const dist = skier.position.distanceTo(cam.position);
                    if (dist < 1.5) {
                        scene.remove(cam);
                        collectibles.splice(i, 1);
                        state.score += 50;
                        state.camerasCollected++;
                        triggerFlash();
                        continue;
                    }

                    // Cleanup
                    if (cam.position.z > 10) {
                        scene.remove(cam);
                        collectibles.splice(i, 1);
                    }
                }

                // Scoring
                state.score += 1; // 1 point per frame
                state.obstacleCount = obstacles.length;

                updateHUD();
            } else if (state.gameState === 'waiting' || state.gameState === 'gameover') {
                lastTime = time; // Keep lastTime updated so delta doesn't spike on start
            }

            // Camera follow
            if (skier) {
                camera.position.x += (skier.position.x * 0.5 - camera.position.x) * 0.1;
                camera.lookAt(skier.position.x * 0.2, 0, -10);
            }

            renderer.render(scene, camera);
        }

        function updateHUD() {
            const state = window.__3D_STATE__;
            scoreEl.innerText = `Score: ${Math.floor(state.score)}`;
            
            let hearts = '';
            for(let i=0; i<Math.max(0, state.lives); i++) hearts += '❤️';
            livesEl.innerText = `Lives: ${hearts}`;
            
            levelEl.innerText = `Level: ${state.difficultyLevel}`;
        }

        // Start
        init();

    </script>
</body>
</html>
