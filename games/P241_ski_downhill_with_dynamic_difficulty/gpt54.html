<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Ski Downhill Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #87CEEB;
      font-family: Arial, sans-serif;
    }

    #gameContainer {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    #score {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 24px;
      font-weight: bold;
    }

    #rightHud {
      position: absolute;
      top: 16px;
      right: 16px;
      text-align: right;
      font-size: 24px;
      font-weight: bold;
    }

    #level {
      margin-top: 6px;
      font-size: 22px;
    }

    #pauseBtn {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: auto;
      padding: 10px 18px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.9);
      cursor: pointer;
    }

    .centerOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.35);
      padding: 24px 32px;
      border-radius: 16px;
      color: white;
      pointer-events: auto;
    }

    .panel h1 {
      margin: 0;
      font-size: 40px;
    }

    button {
      padding: 12px 22px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #ffffff;
      color: #222;
      font-weight: bold;
    }

    #startOverlay.hidden,
    #gameOverOverlay.hidden,
    #flash.hidden {
      display: none;
    }

    #flash {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.55);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    #flash.active {
      opacity: 1;
    }

    #infoText {
      font-size: 16px;
      opacity: 0.95;
      text-align: center;
      max-width: 400px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <div id="hud">
      <div id="score">Score: 0</div>
      <div id="rightHud">
        <div id="lives">Lives: ❤️❤️❤️</div>
        <div id="level">Level: 1</div>
      </div>
      <button id="pauseBtn">Pause</button>

      <div id="startOverlay" class="centerOverlay">
        <div class="panel">
          <h1>Ski Downhill</h1>
          <div id="infoText">
            Move with Arrow keys or A/D. Avoid trees and rocks, collect antique cameras, and survive the slope.
          </div>
          <button id="startBtn">Start Game</button>
        </div>
      </div>

      <div id="gameOverOverlay" class="centerOverlay hidden">
        <div class="panel">
          <h1>Game Over</h1>
          <div id="finalScore">Score: 0</div>
          <button id="restartBtn">Restart</button>
        </div>
      </div>

      <div id="flash" class="hidden"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const container = document.getElementById('gameContainer');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const levelEl = document.getElementById('level');
    const finalScoreEl = document.getElementById('finalScore');
    const startOverlay = document.getElementById('startOverlay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const flashEl = document.getElementById('flash');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0x8888cc, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(-10, 20, 10);
    scene.add(dirLight);

    const world = new THREE.Group();
    scene.add(world);

    const slopeSegments = [];
    const slopeMaterial = new THREE.MeshStandardMaterial({
      color: 0xf4fbff,
      roughness: 0.9,
      metalness: 0.0
    });

    const slopeLength = 40;
    const segmentCount = 8;
    const segmentSpacing = slopeLength;
    for (let i = 0; i < segmentCount; i++) {
      const geo = new THREE.PlaneGeometry(30, slopeLength, 1, 1);
      const mesh = new THREE.Mesh(geo, slopeMaterial);
      mesh.rotation.x = -Math.PI / 2.25;
      mesh.position.set(0, -1.5 - i * 0.05, i * segmentSpacing);
      scene.add(mesh);
      slopeSegments.push(mesh);
    }

    function createSkier() {
      const group = new THREE.Group();

      const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff3333 });
      const skiMat = new THREE.MeshStandardMaterial({ color: 0x222222 });

      const body = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.45, 1.1, 8, 16),
        bodyMat
      );
      body.position.y = 0.9;
      group.add(body);

      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.28, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0xffddcc })
      );
      head.position.y = 1.9;
      group.add(head);

      const ski1 = new THREE.Mesh(
        new THREE.BoxGeometry(0.18, 0.05, 2.0),
        skiMat
      );
      ski1.position.set(-0.22, 0.05, 0);
      group.add(ski1);

      const ski2 = new THREE.Mesh(
        new THREE.BoxGeometry(0.18, 0.05, 2.0),
        skiMat
      );
      ski2.position.set(0.22, 0.05, 0);
      group.add(ski2);

      group.position.set(0, 0, 0);
      return group;
    }

    const skier = createSkier();
    scene.add(skier);

    camera.position.set(0, 7, -10);
    camera.lookAt(0, 1, 4);

    const keys = {
      left: false,
      right: false
    };

    let cameraModelTemplate = null;
    let cameraModelLoaded = false;

    const loader = new GLTFLoader();
    loader.load(
      './AntiqueCamera.glb',
      (gltf) => {
        cameraModelTemplate = gltf.scene;
        cameraModelTemplate.scale.set(0.5, 0.5, 0.5);
        cameraModelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load AntiqueCamera.glb:', err);
        cameraModelLoaded = false;
      }
    );

    const obstacleObjects = [];
    const collectibleCameras = [];

    function createTree() {
      const group = new THREE.Group();

      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.2, 0.25, 1.2, 8),
        new THREE.MeshStandardMaterial({ color: 0x6b4423 })
      );
      trunk.position.y = 0.6;
      group.add(trunk);

      const leaves = new THREE.Mesh(
        new THREE.ConeGeometry(0.9, 2.2, 10),
        new THREE.MeshStandardMaterial({ color: 0x1f8b3a })
      );
      leaves.position.y = 2.0;
      group.add(leaves);

      group.userData.type = 'tree';
      return group;
    }

    function createRock() {
      const rock = new THREE.Mesh(
        new THREE.DodecahedronGeometry(0.8, 0),
        new THREE.MeshStandardMaterial({ color: 0x444444 })
      );
      rock.position.y = 0.7;
      rock.userData.type = 'rock';
      return rock;
    }

    function createFallbackCamera() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(0.9, 0.55, 0.45),
        new THREE.MeshStandardMaterial({ color: 0x2e2e2e, metalness: 0.3, roughness: 0.6 })
      );
      group.add(body);

      const lens = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.18, 0.28, 20),
        new THREE.MeshStandardMaterial({ color: 0x777777, metalness: 0.7, roughness: 0.3 })
      );
      lens.rotation.x = Math.PI / 2;
      lens.position.z = 0.32;
      group.add(lens);

      const top = new THREE.Mesh(
        new THREE.BoxGeometry(0.28, 0.12, 0.22),
        new THREE.MeshStandardMaterial({ color: 0x555555 })
      );
      top.position.set(0.18, 0.33, 0);
      group.add(top);

      group.scale.set(0.7, 0.7, 0.7);
      return group;
    }

    function spawnObstacle() {
      const obstacle = Math.random() < 0.5 ? createTree() : createRock();
      obstacle.position.set(randomRange(-8, 8), 0, 40);
      world.add(obstacle);
      obstacleObjects.push(obstacle);
    }

    function spawnCollectibleCamera() {
      let camObj;
      if (cameraModelTemplate) {
        camObj = cameraModelTemplate.clone(true);
      } else {
        camObj = createFallbackCamera();
      }
      camObj.position.set(randomRange(-8, 8), 1.1, 42);
      camObj.userData.baseY = camObj.position.y;
      camObj.userData.spinOffset = Math.random() * Math.PI * 2;
      world.add(camObj);
      collectibleCameras.push(camObj);
    }

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    const game = {
      gameState: 'waiting',
      score: 0,
      lives: 3,
      difficultyLevel: 1,
      skierX: 0,
      speed: 0.1,
      camerasCollected: 0,
      obstacleCount: 0,
      elapsedTime: 0,
      skierExists: true,
      cameraModelLoaded: false,

      startTime: 0,
      lastFrameTime: 0,
      lastObstacleSpawn: 0,
      lastCameraSpawn: 0,
      pausedAt: 0,
      totalPausedDuration: 0,
      lastHitTime: -9999
    };

    window.__3D_STATE__ = {};

    function clamp(value, min, max) {
      if (!Number.isFinite(value)) return min;
      return Math.max(min, Math.min(max, value));
    }

    function sanitizeNumber(n, fallback = 0) {
      return Number.isFinite(n) ? n : fallback;
    }

    function getCurrentSpeed(level) {
      const t = (level - 1) / 4;
      return 0.1 + (0.25 - 0.1) * t;
    }

    function getObstacleInterval(level) {
      const t = (level - 1) / 4;
      return 2000 + (800 - 2000) * t;
    }

    function getObstacleMoveMultiplier(level) {
      return 1 + (level - 1) * 0.22;
    }

    function updateHUD() {
      scoreEl.textContent = `Score: ${Math.floor(game.score)}`;
      livesEl.textContent = `Lives: ${'❤️'.repeat(Math.max(0, game.lives))}${'🖤'.repeat(Math.max(0, 3 - game.lives))}`;
      levelEl.textContent = `Level: ${game.difficultyLevel}`;
      finalScoreEl.textContent = `Score: ${Math.floor(game.score)}`;
      pauseBtn.textContent = game.gameState === 'paused' ? 'Resume' : 'Pause';
    }

    function triggerFlash() {
      flashEl.classList.remove('hidden');
      flashEl.classList.add('active');
      setTimeout(() => {
        flashEl.classList.remove('active');
        setTimeout(() => flashEl.classList.add('hidden'), 150);
      }, 100);
    }

    function setGameState(state) {
      game.gameState = state;
      if (state === 'waiting') {
        startOverlay.classList.remove('hidden');
        gameOverOverlay.classList.add('hidden');
      } else if (state === 'gameover') {
        startOverlay.classList.add('hidden');
        gameOverOverlay.classList.remove('hidden');
      } else {
        startOverlay.classList.add('hidden');
        gameOverOverlay.classList.add('hidden');
      }
      updateHUD();
    }

    function clearWorldObjects() {
      obstacleObjects.forEach(obj => world.remove(obj));
      collectibleCameras.forEach(obj => world.remove(obj));
      obstacleObjects.length = 0;
      collectibleCameras.length = 0;
    }

    function resetGame() {
      clearWorldObjects();

      game.score = 0;
      game.lives = 3;
      game.difficultyLevel = 1;
      game.skierX = 0;
      game.speed = 0.1;
      game.camerasCollected = 0;
      game.obstacleCount = 0;
      game.elapsedTime = 0;
      game.skierExists = !!skier;
      game.cameraModelLoaded = cameraModelLoaded;

      const now = performance.now();
      game.startTime = now;
      game.lastFrameTime = now;
      game.lastObstacleSpawn = now;
      game.lastCameraSpawn = now;
      game.pausedAt = 0;
      game.totalPausedDuration = 0;
      game.lastHitTime = -9999;

      skier.position.set(0, 0, 0);
      skier.rotation.set(0, 0, 0);

      for (let i = 0; i < slopeSegments.length; i++) {
        slopeSegments[i].position.set(0, -1.5 - i * 0.05, i * segmentSpacing);
      }

      updateHUD();
      updateStateObject();
    }

    function startGame() {
      resetGame();
      setGameState('playing');
    }

    function gameOver() {
      game.lives = 0;
      setGameState('gameover');
      updateHUD();
    }

    function togglePause() {
      if (game.gameState === 'playing') {
        game.gameState = 'paused';
        game.pausedAt = performance.now();
      } else if (game.gameState === 'paused') {
        const now = performance.now();
        if (game.pausedAt) {
          const pausedDuration = now - game.pausedAt;
          game.totalPausedDuration += pausedDuration;
          game.lastFrameTime = now;
          game.lastObstacleSpawn += pausedDuration;
          game.lastCameraSpawn += pausedDuration;
          game.lastHitTime += pausedDuration;
        }
        game.pausedAt = 0;
        game.gameState = 'playing';
      }
      updateHUD();
    }

    function updateDifficulty() {
      const level = Math.min(5, 1 + Math.floor(game.elapsedTime / 15));
      game.difficultyLevel = clamp(level, 1, 5);
      game.speed = sanitizeNumber(getCurrentSpeed(game.difficultyLevel), 0.1);
    }

    function updatePlayer(dtScale) {
      let move = 0;
      if (keys.left) move -= 1;
      if (keys.right) move += 1;

      const lateralSpeed = 0.28 * dtScale;
      game.skierX = clamp(game.skierX + move * lateralSpeed, -8, 8);
      game.skierX = sanitizeNumber(game.skierX, 0);
      skier.position.x = game.skierX;
      skier.rotation.z = THREE.MathUtils.lerp(skier.rotation.z, -move * 0.25, 0.15);
      skier.rotation.y = THREE.MathUtils.lerp(skier.rotation.y, move * 0.12, 0.15);
    }

    function updateSlope(dtScale) {
      const moveAmount = game.speed * dtScale * 10;
      for (const seg of slopeSegments) {
        seg.position.z -= moveAmount;
        if (seg.position.z < -slopeLength) {
          let maxZ = -Infinity;
          for (const s of slopeSegments) maxZ = Math.max(maxZ, s.position.z);
          seg.position.z = maxZ + segmentSpacing;
        }
      }
    }

    function maybeSpawnEntities(now) {
      const obstacleInterval = getObstacleInterval(game.difficultyLevel);
      if (now - game.lastObstacleSpawn >= obstacleInterval) {
        spawnObstacle();
        game.lastObstacleSpawn = now;
      }

      const cameraInterval = 2800;
      if (now - game.lastCameraSpawn >= cameraInterval) {
        spawnCollectibleCamera();
        game.lastCameraSpawn = now;
      }
    }

    function updateObstaclesAndCameras(dtScale, now) {
      const obstacleAdvance = game.speed * dtScale * 10 * getObstacleMoveMultiplier(game.difficultyLevel);
      const skierZ = skier.position.z;

      for (let i = obstacleObjects.length - 1; i >= 0; i--) {
        const obj = obstacleObjects[i];
        obj.position.z -= obstacleAdvance;

        const dx = obj.position.x - skier.position.x;
        const dz = obj.position.z - skierZ;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist < 1.2 && now - game.lastHitTime > 900 && game.gameState === 'playing') {
          game.lives = clamp(game.lives - 1, 0, 3);
          game.lastHitTime = now;
          world.remove(obj);
          obstacleObjects.splice(i, 1);
          if (game.lives <= 0) {
            gameOver();
            break;
          }
        } else if (obj.position.z < skierZ - 10) {
          world.remove(obj);
          obstacleObjects.splice(i, 1);
        }
      }

      for (let i = collectibleCameras.length - 1; i >= 0; i--) {
        const cam = collectibleCameras[i];
        cam.position.z -= obstacleAdvance * 0.95;
        cam.rotation.y += 0.03 * dtScale;
        cam.position.y = cam.userData.baseY + Math.sin(now * 0.003 + cam.userData.spinOffset) * 0.2;

        const dx = cam.position.x - skier.position.x;
        const dz = cam.position.z - skierZ;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist < 1.5 && game.gameState === 'playing') {
          game.score += 50;
          game.camerasCollected += 1;
          triggerFlash();
          world.remove(cam);
          collectibleCameras.splice(i, 1);
        } else if (cam.position.z < skierZ - 10) {
          world.remove(cam);
          collectibleCameras.splice(i, 1);
        }
      }

      game.obstacleCount = obstacleObjects.length;
    }

    function updateCameraChase() {
      const targetPos = new THREE.Vector3(skier.position.x, 1.2, skier.position.z + 4.5);
      const desiredCamPos = new THREE.Vector3(skier.position.x, 7, skier.position.z - 10);
      camera.position.lerp(desiredCamPos, 0.08);
      camera.lookAt(targetPos);
    }

    function updateStateObject() {
      game.score = Math.floor(sanitizeNumber(game.score, 0));
      game.lives = clamp(Math.floor(sanitizeNumber(game.lives, 0)), 0, 3);
      game.difficultyLevel = clamp(Math.floor(sanitizeNumber(game.difficultyLevel, 1)), 1, 5);
      game.skierX = clamp(sanitizeNumber(game.skierX, 0), -8, 8);
      game.speed = sanitizeNumber(game.speed, 0.1);
      game.camerasCollected = Math.max(0, Math.floor(sanitizeNumber(game.camerasCollected, 0)));
      game.obstacleCount = Math.max(0, Math.floor(sanitizeNumber(game.obstacleCount, 0)));
      game.elapsedTime = Math.max(0, sanitizeNumber(game.elapsedTime, 0));
      game.skierExists = !!skier && skier.parent !== null;
      game.cameraModelLoaded = !!cameraModelLoaded;

      window.__3D_STATE__ = {
        gameState: game.gameState,
        score: game.score,
        lives: game.lives,
        difficultyLevel: game.difficultyLevel,
        skierX: game.skierX,
        speed: game.speed,
        camerasCollected: game.camerasCollected,
        obstacleCount: game.obstacleCount,
        elapsedTime: game.elapsedTime,
        skierExists: game.skierExists,
        cameraModelLoaded: game.cameraModelLoaded
      };
    }

    function animate(now) {
      requestAnimationFrame(animate);

      if (!game.lastFrameTime) game.lastFrameTime = now;
      const deltaMs = now - game.lastFrameTime;
      game.lastFrameTime = now;

      const dtScale = clamp(deltaMs / 16.6667, 0.5, 2.5);

      if (game.gameState === 'playing') {
        game.elapsedTime = (now - game.startTime - game.totalPausedDuration) / 1000;
        game.elapsedTime = Math.max(0, sanitizeNumber(game.elapsedTime, 0));

        updateDifficulty();
        updatePlayer(dtScale);
        updateSlope(dtScale);
        maybeSpawnEntities(now);
        updateObstaclesAndCameras(dtScale, now);

        if (game.gameState === 'playing') {
          game.score += 1;
        }
      }

      updateCameraChase();
      updateHUD();
      updateStateObject();
      renderer.render(scene, camera);
    }

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'arrowleft' || key === 'a') keys.left = true;
      if (key === 'arrowright' || key === 'd') keys.right = true;
      if (key === 'p') togglePause();
    });

    window.addEventListener('keyup', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'arrowleft' || key === 'a') keys.left = false;
      if (key === 'arrowright' || key === 'd') keys.right = false;
    });

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);
    pauseBtn.addEventListener('click', () => {
      if (game.gameState === 'playing' || game.gameState === 'paused') {
        togglePause();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    resetGame();
    setGameState('waiting');
    updateStateObject();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
