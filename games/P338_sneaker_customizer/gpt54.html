<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sneaker Studio</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #title {
      position: absolute;
      top: 16px;
      left: 16px;
      color: white;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
      z-index: 10;
      user-select: none;
    }

    #controlPanel {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 14px;
      color: white;
      z-index: 10;
      min-width: 640px;
      backdrop-filter: blur(8px);
    }

    #specPanel {
      position: absolute;
      right: 16px;
      top: 70px;
      width: 220px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 14px;
      color: white;
      z-index: 10;
      line-height: 1.5;
      backdrop-filter: blur(8px);
      white-space: pre-line;
    }

    #priceDisplay {
      position: absolute;
      right: 16px;
      bottom: 16px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 10px 16px;
      color: white;
      font-size: 22px;
      font-weight: bold;
      z-index: 10;
      backdrop-filter: blur(8px);
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .label {
      font-size: 13px;
      opacity: 0.85;
      min-width: 80px;
    }

    button {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 13px;
    }

    button:hover {
      background: rgba(255,255,255,0.16);
    }

    .zoneBtn.active {
      border: 2px solid white;
      padding: 7px 11px;
    }

    .colorSwatch {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.8);
      padding: 0;
      min-width: 30px;
    }

    .hiddenUI {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="title">SNEAKER STUDIO</div>

  <div id="controlPanel">
    <div class="row">
      <div class="label">Zones</div>
      <button id="btn_upper" class="zoneBtn">upper</button>
      <button id="btn_tongue" class="zoneBtn">tongue</button>
      <button id="btn_laces" class="zoneBtn">laces</button>
      <button id="btn_swoosh" class="zoneBtn">swoosh</button>
      <button id="btn_heelTab" class="zoneBtn">heelTab</button>
      <button id="btn_midsole" class="zoneBtn">midsole</button>
    </div>
    <div class="row">
      <div class="label">Colors</div>
      <button class="colorSwatch" data-color="#cc0000" style="background:#cc0000" title="Red"></button>
      <button class="colorSwatch" data-color="#0055cc" style="background:#0055cc" title="Blue"></button>
      <button class="colorSwatch" data-color="#00aa44" style="background:#00aa44" title="Green"></button>
      <button class="colorSwatch" data-color="#000000" style="background:#000000" title="Black"></button>
      <button class="colorSwatch" data-color="#ffffff" style="background:#ffffff" title="White"></button>
      <button class="colorSwatch" data-color="#ff8800" style="background:#ff8800" title="Orange"></button>
      <button class="colorSwatch" data-color="#7700cc" style="background:#7700cc" title="Purple"></button>
      <button class="colorSwatch" data-color="#ff44aa" style="background:#ff44aa" title="Pink"></button>
    </div>
    <div class="row">
      <div class="label">Actions</div>
      <button id="btnRotate">Rotate</button>
      <button id="btnReset">Reset</button>
      <button id="btnScreenshot">Screenshot Mode</button>
    </div>
  </div>

  <div id="specPanel"></div>
  <div id="priceDisplay">$120</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
  <script>
    const defaults = {
      upper: '#cc0000',
      tongue: '#cc0000',
      laces: '#ffffff',
      swoosh: '#000000',
      heelTab: '#000000',
      midsole: '#ffffff'
    };

    window.__3D_STATE__ = {
      selectedZone: 'upper',
      colors: { ...defaults },
      autoRotate: false,
      cameraZ: 5,
      sneakerRotationY: 0,
      price: 120,
      colorChanges: 0,
      screenshotMode: false,
      zonesCustomized: 0,
      platformVisible: true,
      totalInteractions: 0,
      animationRunning: true
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');
    scene.fog = new THREE.Fog('#1a1a2e', 6, 12);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 8, 5);
    scene.add(dirLight);

    const pointLight = new THREE.PointLight(0xffffff, 0.5);
    pointLight.position.set(-3, 3, -3);
    scene.add(pointLight);

    const platformMat = new THREE.MeshStandardMaterial({
      color: 0x777777,
      metalness: 0.8,
      roughness: 0.3
    });
    const platform = new THREE.Mesh(
      new THREE.CylinderGeometry(2, 2, 0.1, 64),
      platformMat
    );
    platform.position.y = 0;
    scene.add(platform);

    const sneakerGroup = new THREE.Group();
    sneakerGroup.name = 'sneakerGroup';
    sneakerGroup.position.y = 0.1;
    scene.add(sneakerGroup);

    function makeMat(hex) {
      return new THREE.MeshStandardMaterial({
        color: hex,
        metalness: 0.25,
        roughness: 0.6,
        emissive: 0x000000,
        emissiveIntensity: 0
      });
    }

    const zoneMeshes = {};

    const sole = new THREE.Mesh(
      new THREE.BoxGeometry(1.8, 0.25, 0.7),
      makeMat('#333333')
    );
    sole.position.y = 0.225;
    sneakerGroup.add(sole);

    const midsole = new THREE.Mesh(
      new THREE.BoxGeometry(1.7, 0.15, 0.65),
      makeMat(defaults.midsole)
    );
    midsole.position.y = 0.40;
    midsole.userData.zone = 'midsole';
    sneakerGroup.add(midsole);
    zoneMeshes.midsole = [midsole];

    const upper = new THREE.Mesh(
      new THREE.BoxGeometry(1.5, 0.5, 0.6),
      makeMat(defaults.upper)
    );
    upper.position.y = 0.75;
    upper.userData.zone = 'upper';
    sneakerGroup.add(upper);
    zoneMeshes.upper = [upper];

    const tongue = new THREE.Mesh(
      new THREE.BoxGeometry(0.3, 0.45, 0.5),
      makeMat(defaults.tongue)
    );
    tongue.position.set(0.5, 0.95, 0);
    tongue.userData.zone = 'tongue';
    sneakerGroup.add(tongue);
    zoneMeshes.tongue = [tongue];

    zoneMeshes.laces = [];
    for (let i = 0; i < 3; i++) {
      const lace = new THREE.Mesh(
        new THREE.BoxGeometry(0.05, 0.05, 0.55),
        makeMat(defaults.laces)
      );
      lace.position.set(0.1 + i * 0.15, 0.9, 0);
      lace.userData.zone = 'laces';
      sneakerGroup.add(lace);
      zoneMeshes.laces.push(lace);
    }

    const swoosh = new THREE.Mesh(
      new THREE.BoxGeometry(0.8, 0.15, 0.05),
      makeMat(defaults.swoosh)
    );
    swoosh.position.set(0, 0.6, 0.32);
    swoosh.rotation.z = -0.2;
    swoosh.userData.zone = 'swoosh';
    sneakerGroup.add(swoosh);
    zoneMeshes.swoosh = [swoosh];

    const heelTab = new THREE.Mesh(
      new THREE.BoxGeometry(0.25, 0.3, 0.55),
      makeMat(defaults.heelTab)
    );
    heelTab.position.set(-0.85, 0.65, 0);
    heelTab.userData.zone = 'heelTab';
    sneakerGroup.add(heelTab);
    zoneMeshes.heelTab = [heelTab];

    const zoneOrder = ['upper', 'tongue', 'laces', 'swoosh', 'heelTab', 'midsole'];

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    let isDragging = false;
    let lastX = 0;
    let dragMoved = false;

    const titleEl = document.getElementById('title');
    const controlPanel = document.getElementById('controlPanel');
    const specPanel = document.getElementById('specPanel');
    const priceDisplay = document.getElementById('priceDisplay');
    const btnRotate = document.getElementById('btnRotate');
    const btnReset = document.getElementById('btnReset');
    const btnScreenshot = document.getElementById('btnScreenshot');

    function incrementInteraction() {
      window.__3D_STATE__.totalInteractions++;
    }

    function updateDerivedState() {
      const colors = window.__3D_STATE__.colors;
      let changes = 0;
      let customized = 0;
      for (const z of zoneOrder) {
        if (colors[z].toLowerCase() !== defaults[z].toLowerCase()) {
          changes++;
          customized++;
        }
      }
      window.__3D_STATE__.colorChanges = changes;
      window.__3D_STATE__.zonesCustomized = customized;
      window.__3D_STATE__.price = 120 + (changes * 5);
    }

    function updateSpecPanel() {
      const c = window.__3D_STATE__.colors;
      specPanel.textContent =
        `Current Configuration\n\n` +
        `upper: ${c.upper}\n` +
        `tongue: ${c.tongue}\n` +
        `laces: ${c.laces}\n` +
        `swoosh: ${c.swoosh}\n` +
        `heelTab: ${c.heelTab}\n` +
        `midsole: ${c.midsole}`;
      priceDisplay.textContent = `$${window.__3D_STATE__.price}`;
    }

    function updateZoneButtons() {
      zoneOrder.forEach(zone => {
        const btn = document.getElementById('btn_' + zone);
        btn.classList.toggle('active', window.__3D_STATE__.selectedZone === zone);
      });
    }

    function applyZoneColor(zone, hex) {
      const normalized = hex.toLowerCase();
      zoneMeshes[zone].forEach(mesh => {
        mesh.material.color.set(normalized);
      });
      window.__3D_STATE__.colors[zone] = normalized;
      updateDerivedState();
      updateSpecPanel();
    }

    function selectZone(zone) {
      window.__3D_STATE__.selectedZone = zone;
      updateZoneButtons();
    }

    function resetAll() {
      for (const zone of zoneOrder) {
        applyZoneColor(zone, defaults[zone]);
      }
      window.__3D_STATE__.autoRotate = false;
      window.__3D_STATE__.sneakerRotationY = 0;
      sneakerGroup.rotation.y = 0;
      btnRotate.textContent = 'Rotate';
      selectZone('upper');
      if (window.__3D_STATE__.screenshotMode) {
        toggleScreenshotMode(false);
      }
      updateDerivedState();
      updateSpecPanel();
    }

    function toggleRotate() {
      window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
      btnRotate.textContent = window.__3D_STATE__.autoRotate ? 'Rotate: ON' : 'Rotate';
    }

    function toggleScreenshotMode(forceValue = null) {
      const newVal = forceValue !== null ? forceValue : !window.__3D_STATE__.screenshotMode;
      window.__3D_STATE__.screenshotMode = newVal;
      window.__3D_STATE__.autoRotate = false;
      btnRotate.textContent = 'Rotate';

      controlPanel.classList.toggle('hiddenUI', newVal);
      specPanel.classList.toggle('hiddenUI', newVal);
      priceDisplay.classList.toggle('hiddenUI', newVal);
      titleEl.classList.toggle('hiddenUI', newVal);

      if (newVal) {
        scene.background = new THREE.Color('#ffffff');
        scene.fog = new THREE.Fog('#ffffff', 6, 12);
      } else {
        scene.background = new THREE.Color('#1a1a2e');
        scene.fog = new THREE.Fog('#1a1a2e', 6, 12);
      }
    }

    zoneOrder.forEach(zone => {
      document.getElementById('btn_' + zone).addEventListener('click', () => {
        incrementInteraction();
        selectZone(zone);
      });
    });

    document.querySelectorAll('.colorSwatch').forEach(btn => {
      btn.addEventListener('click', () => {
        incrementInteraction();
        applyZoneColor(window.__3D_STATE__.selectedZone, btn.dataset.color);
      });
    });

    btnRotate.addEventListener('click', () => {
      incrementInteraction();
      toggleRotate();
    });

    btnReset.addEventListener('click', () => {
      incrementInteraction();
      resetAll();
    });

    btnScreenshot.addEventListener('click', () => {
      incrementInteraction();
      toggleScreenshotMode();
    });

    renderer.domElement.addEventListener('pointerdown', (e) => {
      isDragging = true;
      dragMoved = false;
      lastX = e.clientX;
    });

    window.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - lastX;
      if (Math.abs(dx) > 0) dragMoved = true;
      lastX = e.clientX;

      if (!window.__3D_STATE__.autoRotate && !window.__3D_STATE__.screenshotMode) {
        sneakerGroup.rotation.y += dx * 0.01;
        window.__3D_STATE__.sneakerRotationY = sneakerGroup.rotation.y;
      }
    });

    window.addEventListener('pointerup', (e) => {
      if (!isDragging) return;
      isDragging = false;

      if (!dragMoved) {
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        const clickableMeshes = Object.values(zoneMeshes).flat();
        const hits = raycaster.intersectObjects(clickableMeshes, false);
        if (hits.length > 0 && hits[0].object.userData.zone) {
          incrementInteraction();
          selectZone(hits[0].object.userData.zone);
        }
      } else {
        incrementInteraction();
      }
    });

    window.addEventListener('wheel', (e) => {
      e.preventDefault();
      incrementInteraction();
      if (e.deltaY > 0) {
        camera.position.z = Math.min(8, camera.position.z + 0.5);
      } else {
        camera.position.z = Math.max(2.5, camera.position.z - 0.5);
      }
      window.__3D_STATE__.cameraZ = camera.position.z;
    }, { passive: false });

    window.addEventListener('keydown', (e) => {
      if (e.key >= '1' && e.key <= '6') {
        incrementInteraction();
        selectZone(zoneOrder[parseInt(e.key, 10) - 1]);
      }
      if (e.key.toLowerCase() === 'r') {
        incrementInteraction();
        toggleRotate();
      }
      if (e.code === 'Space') {
        e.preventDefault();
        incrementInteraction();
        resetAll();
      }
    });

    function updateHighlight(time) {
      const pulse = 0.2 + 0.35 * (0.5 + 0.5 * Math.sin(time * 0.005));
      for (const zone of zoneOrder) {
        zoneMeshes[zone].forEach(mesh => {
          if (zone === window.__3D_STATE__.selectedZone) {
            mesh.material.emissive.set('#ffffff');
            mesh.material.emissiveIntensity = pulse;
          } else {
            mesh.material.emissive.set('#000000');
            mesh.material.emissiveIntensity = 0;
          }
        });
      }
    }

    function animate(time) {
      requestAnimationFrame(animate);
      window.__3D_STATE__.animationRunning = true;

      if (window.__3D_STATE__.autoRotate && !window.__3D_STATE__.screenshotMode) {
        sneakerGroup.rotation.y += 0.01;
        window.__3D_STATE__.sneakerRotationY = sneakerGroup.rotation.y;
      }

      platform.visible = window.__3D_STATE__.platformVisible;
      updateHighlight(time);
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateDerivedState();
    updateZoneButtons();
    updateSpecPanel();
    animate();
  </script>
</body>
</html>
