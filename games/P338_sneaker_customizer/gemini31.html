<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sneaker Customizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #title {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
        }
        #priceDisplay {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #00aa44;
            font-size: 28px;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 10;
        }
        #controlPanel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 30, 0.85);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .row {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }
        .zone-btn {
            background: #333;
            color: white;
            border: 2px solid transparent;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            text-transform: capitalize;
            transition: all 0.2s;
        }
        .zone-btn:hover {
            background: #444;
        }
        .zone-btn.active {
            border-color: white;
            background: #555;
        }
        .colorSwatch {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #fff;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .colorSwatch:hover {
            transform: scale(1.1);
        }
        .action-btn {
            background: #0055cc;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .action-btn:hover {
            background: #0066ff;
        }
        #btnReset { background: #cc0000; }
        #btnReset:hover { background: #ff0000; }
        #btnScreenshot { background: #7700cc; }
        #btnScreenshot:hover { background: #9900ff; }
        
        #specPanel {
            position: absolute;
            top: 80px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #ddd;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            z-index: 10;
            min-width: 150px;
        }
        .spec-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .spec-zone { text-transform: capitalize; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="title">SNEAKER STUDIO</div>
    <div id="priceDisplay">$120</div>
    
    <div id="specPanel"></div>

    <div id="controlPanel">
        <div class="row" id="zoneSelectors">
            <button class="zone-btn active" id="btn_upper">Upper</button>
            <button class="zone-btn" id="btn_tongue">Tongue</button>
            <button class="zone-btn" id="btn_laces">Laces</button>
            <button class="zone-btn" id="btn_swoosh">Swoosh</button>
            <button class="zone-btn" id="btn_heelTab">Heel Tab</button>
            <button class="zone-btn" id="btn_midsole">Midsole</button>
        </div>
        <div class="row" id="colorPalette">
            <div class="colorSwatch" data-color="#cc0000" style="background-color: #cc0000;"></div>
            <div class="colorSwatch" data-color="#0055cc" style="background-color: #0055cc;"></div>
            <div class="colorSwatch" data-color="#00aa44" style="background-color: #00aa44;"></div>
            <div class="colorSwatch" data-color="#000000" style="background-color: #000000;"></div>
            <div class="colorSwatch" data-color="#ffffff" style="background-color: #ffffff;"></div>
            <div class="colorSwatch" data-color="#ff8800" style="background-color: #ff8800;"></div>
            <div class="colorSwatch" data-color="#7700cc" style="background-color: #7700cc;"></div>
            <div class="colorSwatch" data-color="#ff44aa" style="background-color: #ff44aa;"></div>
        </div>
        <div class="row">
            <button class="action-btn" id="btnRotate">Rotate: OFF</button>
            <button class="action-btn" id="btnReset">Reset</button>
            <button class="action-btn" id="btnScreenshot">Screenshot Mode</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';

        // --- State Management ---
        const defaultColors = {
            upper: '#cc0000',
            tongue: '#cc0000',
            laces: '#ffffff',
            swoosh: '#000000',
            heelTab: '#000000',
            midsole: '#ffffff'
        };

        window.__3D_STATE__ = {
            selectedZone: 'upper',
            colors: { ...defaultColors },
            autoRotate: false,
            cameraZ: 5,
            sneakerRotationY: 0,
            price: 120,
            colorChanges: 0,
            screenshotMode: false,
            zonesCustomized: 0,
            platformVisible: true,
            totalInteractions: 0,
            animationRunning: true
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');
        scene.fog = new THREE.Fog('#1a1a2e', 3, 10);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, window.__3D_STATE__.cameraZ);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 8, 5);
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xffffff, 0.5);
        pointLight.position.set(-3, 3, -3);
        scene.add(pointLight);

        // Platform
        const platformGeo = new THREE.CylinderGeometry(2, 2, 0.1, 32);
        const platformMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.2 });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = 0;
        scene.add(platform);

        // --- Sneaker Construction ---
        const sneakerGroup = new THREE.Group();
        sneakerGroup.name = 'sneakerGroup';
        sneakerGroup.position.y = 0.1;
        scene.add(sneakerGroup);

        const materials = {
            sole: new THREE.MeshStandardMaterial({ color: '#333333' }),
            midsole: new THREE.MeshStandardMaterial({ color: defaultColors.midsole }),
            upper: new THREE.MeshStandardMaterial({ color: defaultColors.upper }),
            tongue: new THREE.MeshStandardMaterial({ color: defaultColors.tongue }),
            laces: new THREE.MeshStandardMaterial({ color: defaultColors.laces }),
            swoosh: new THREE.MeshStandardMaterial({ color: defaultColors.swoosh }),
            heelTab: new THREE.MeshStandardMaterial({ color: defaultColors.heelTab })
        };

        function createPart(geometry, material, position, rotation, zoneName) {
            const mesh = new THREE.Mesh(geometry, material);
            if (position) mesh.position.set(...position);
            if (rotation) mesh.rotation.set(...rotation);
            if (zoneName) mesh.userData.zone = zoneName;
            sneakerGroup.add(mesh);
            return mesh;
        }

        // Sole (Not customizable per requirements, but part of model)
        createPart(new THREE.BoxGeometry(1.8, 0.25, 0.7), materials.sole, [0, 0.225, 0], null, 'sole');
        
        // Midsole
        createPart(new THREE.BoxGeometry(1.7, 0.15, 0.65), materials.midsole, [0, 0.40, 0], null, 'midsole');
        
        // Upper
        createPart(new THREE.BoxGeometry(1.5, 0.5, 0.6), materials.upper, [0, 0.75, 0], null, 'upper');
        
        // Tongue
        createPart(new THREE.BoxGeometry(0.3, 0.45, 0.5), materials.tongue, [0.5, 0.95, 0], null, 'tongue');
        
        // Laces (3 parts)
        const laceGeo = new THREE.BoxGeometry(0.05, 0.05, 0.55);
        createPart(laceGeo, materials.laces, [0.1, 0.9, 0], null, 'laces');
        createPart(laceGeo, materials.laces, [0.25, 0.9, 0], null, 'laces');
        createPart(laceGeo, materials.laces, [0.4, 0.9, 0], null, 'laces');
        
        // Swoosh
        createPart(new THREE.BoxGeometry(0.8, 0.15, 0.05), materials.swoosh, [0, 0.6, 0.32], [0, 0, -0.2], 'swoosh');
        createPart(new THREE.BoxGeometry(0.8, 0.15, 0.05), materials.swoosh, [0, 0.6, -0.32], [0, 0, 0.2], 'swoosh'); // Add other side for completeness
        
        // Heel tab
        createPart(new THREE.BoxGeometry(0.25, 0.3, 0.55), materials.heelTab, [-0.85, 0.65, 0], null, 'heelTab');

        // --- UI & Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        function updateState(updates) {
            Object.assign(window.__3D_STATE__, updates);
            window.__3D_STATE__.totalInteractions++;
            syncUI();
        }

        function syncUI() {
            const state = window.__3D_STATE__;
            
            // Buttons
            document.querySelectorAll('.zone-btn').forEach(btn => {
                btn.classList.toggle('active', btn.id === `btn_${state.selectedZone}`);
            });

            // Spec Panel
            const specPanel = document.getElementById('specPanel');
            specPanel.innerHTML = Object.entries(state.colors).map(([zone, color]) => 
                `<div class="spec-row"><span class="spec-zone">${zone}</span><span>${color.toUpperCase()}</span></div>`
            ).join('');

            // Price
            let customized = 0;
            for (const zone in defaultColors) {
                if (state.colors[zone] !== defaultColors[zone]) customized++;
            }
            state.zonesCustomized = customized;
            state.price = 120 + (customized * 5);
            document.getElementById('priceDisplay').innerText = `$${state.price}`;

            // Rotate Button
            document.getElementById('btnRotate').innerText = `Rotate: ${state.autoRotate ? 'ON' : 'OFF'}`;

            // Screenshot Mode
            if (state.screenshotMode) {
                document.getElementById('controlPanel').style.display = 'none';
                document.getElementById('specPanel').style.display = 'none';
                scene.background.setHex(0xffffff);
                scene.fog.color.setHex(0xffffff);
                platform.visible = false;
            } else {
                document.getElementById('controlPanel').style.display = 'flex';
                document.getElementById('specPanel').style.display = 'block';
                scene.background.setHex(0x1a1a2e);
                scene.fog.color.setHex(0x1a1a2e);
                platform.visible = true;
            }

            // Apply Colors to Materials
            for (const zone in state.colors) {
                if (materials[zone]) {
                    materials[zone].color.set(state.colors[zone]);
                }
            }
            
            // Camera
            camera.position.z = state.cameraZ;
            
            // Rotation
            sneakerGroup.rotation.y = state.sneakerRotationY;
        }

        // Event Listeners
        document.querySelectorAll('.zone-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const zone = e.target.id.replace('btn_', '');
                updateState({ selectedZone: zone });
            });
        });

        document.querySelectorAll('.colorSwatch').forEach(swatch => {
            swatch.addEventListener('click', (e) => {
                const color = e.target.dataset.color;
                const newColors = { ...window.__3D_STATE__.colors };
                if(newColors[window.__3D_STATE__.selectedZone] !== color) {
                    newColors[window.__3D_STATE__.selectedZone] = color;
                    updateState({ 
                        colors: newColors,
                        colorChanges: window.__3D_STATE__.colorChanges + 1
                    });
                }
            });
        });

        document.getElementById('btnRotate').addEventListener('click', () => {
            updateState({ autoRotate: !window.__3D_STATE__.autoRotate });
        });

        document.getElementById('btnReset').addEventListener('click', () => {
            updateState({
                colors: { ...defaultColors },
                sneakerRotationY: 0,
                cameraZ: 5
            });
        });

        document.getElementById('btnScreenshot').addEventListener('click', () => {
            updateState({ screenshotMode: !window.__3D_STATE__.screenshotMode, autoRotate: false });
        });

        // Mouse Interactions
        renderer.domElement.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.offsetX, y: e.offsetY };
        });

        renderer.domElement.addEventListener('mousemove', (e) => {
            if (isDragging && !window.__3D_STATE__.autoRotate && !window.__3D_STATE__.screenshotMode) {
                const deltaMove = { x: e.offsetX - previousMousePosition.x };
                updateState({ sneakerRotationY: window.__3D_STATE__.sneakerRotationY + deltaMove.x * 0.01 });
                previousMousePosition = { x: e.offsetX, y: e.offsetY };
            }
        });

        window.addEventListener('mouseup', () => { isDragging = false; });

        renderer.domElement.addEventListener('click', (e) => {
            if (isDragging && Math.abs(e.offsetX - previousMousePosition.x) > 2) return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(sneakerGroup.children);
            if (intersects.length > 0) {
                const zone = intersects[0].object.userData.zone;
                if (zone && zone !== 'sole') {
                    updateState({ selectedZone: zone });
                }
            }
        });

        window.addEventListener('wheel', (e) => {
            let z = window.__3D_STATE__.cameraZ;
            z += e.deltaY > 0 ? 0.5 : -0.5;
            z = Math.max(2.5, Math.min(8, z));
            updateState({ cameraZ: z });
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            const zones = ['upper', 'tongue', 'laces', 'swoosh', 'heelTab', 'midsole'];
            if (e.key >= '1' && e.key <= '6') {
                updateState({ selectedZone: zones[parseInt(e.key) - 1] });
            } else if (key === 'r') {
                updateState({ autoRotate: !window.__3D_STATE__.autoRotate });
            } else if (key === ' ') {
                updateState({ colors: { ...defaultColors }, sneakerRotationY: 0, cameraZ: 5 });
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        syncUI(); // Initial sync

        function animate() {
            if (window.__3D_STATE__.animationRunning) {
                requestAnimationFrame(animate);

                const state = window.__3D_STATE__;

                if (state.autoRotate && !state.screenshotMode) {
                    state.sneakerRotationY += 0.01;
                    sneakerGroup.rotation.y = state.sneakerRotationY;
                }

                // Pulsing Emissive Effect
                const time = Date.now() * 0.003;
                const pulse = (Math.sin(time) + 1) / 2 * 0.4;

                // Reset all emissive
                Object.values(materials).forEach(m => m.emissive && m.emissive.setHex(0x000000));

                // Apply to selected
                if (!state.screenshotMode && materials[state.selectedZone]) {
                    const mat = materials[state.selectedZone];
                    mat.emissive.set(mat.color).multiplyScalar(pulse);
                }

                renderer.render(scene, camera);
            }
        }

        animate();
    </script>
</body>
</html>
