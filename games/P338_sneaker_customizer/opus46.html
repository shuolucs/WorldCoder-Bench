<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sneaker Studio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
canvas { display: block; }

#title {
  position: fixed;
  top: 20px;
  left: 20px;
  color: white;
  font-size: 24px;
  font-weight: bold;
  z-index: 10;
  text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  letter-spacing: 3px;
}

#controlPanel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(10, 10, 30, 0.9);
  backdrop-filter: blur(10px);
  padding: 15px 20px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 10px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.panel-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.panel-label {
  color: rgba(255,255,255,0.5);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  min-width: 60px;
}

.zone-btn {
  background: rgba(255,255,255,0.08);
  color: #ccc;
  border: 2px solid transparent;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s;
  text-transform: capitalize;
}
.zone-btn:hover { background: rgba(255,255,255,0.15); color: white; }
.zone-btn.active { border-color: white; color: white; background: rgba(255,255,255,0.15); }

.colorSwatch {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  cursor: pointer;
  transition: all 0.2s;
}
.colorSwatch:hover { transform: scale(1.2); border-color: white; }

.action-btn {
  background: rgba(255,255,255,0.1);
  color: #ccc;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 6px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s;
}
.action-btn:hover { background: rgba(255,255,255,0.2); color: white; }
.action-btn.active { background: rgba(100,200,255,0.2); border-color: rgba(100,200,255,0.5); color: #8df; }

#specPanel {
  position: fixed;
  top: 70px;
  right: 20px;
  background: rgba(10, 10, 30, 0.85);
  backdrop-filter: blur(10px);
  padding: 15px 20px;
  border-radius: 10px;
  z-index: 10;
  color: white;
  font-size: 12px;
  min-width: 180px;
  border: 1px solid rgba(255,255,255,0.1);
}

#specPanel h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 10px;
}

.spec-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.spec-zone { text-transform: capitalize; color: rgba(255,255,255,0.7); }
.spec-color {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.spec-color-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  display: inline-block;
  border: 1px solid rgba(255,255,255,0.2);
}
.spec-color-hex { font-family: monospace; font-size: 11px; color: rgba(255,255,255,0.5); }

#priceDisplay {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(10, 10, 30, 0.85);
  backdrop-filter: blur(10px);
  padding: 10px 20px;
  border-radius: 10px;
  z-index: 10;
  color: white;
  font-size: 28px;
  font-weight: bold;
  border: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>
<body>

<div id="title">SNEAKER STUDIO</div>

<div id="priceDisplay">$120</div>

<div id="specPanel">
  <h3>Configuration</h3>
  <div id="specContent"></div>
</div>

<div id="controlPanel">
  <div class="panel-row">
    <span class="panel-label">Zone</span>
    <button class="zone-btn active" id="btn_upper" data-zone="upper">Upper</button>
    <button class="zone-btn" id="btn_tongue" data-zone="tongue">Tongue</button>
    <button class="zone-btn" id="btn_laces" data-zone="laces">Laces</button>
    <button class="zone-btn" id="btn_swoosh" data-zone="swoosh">Swoosh</button>
    <button class="zone-btn" id="btn_heelTab" data-zone="heelTab">Heel Tab</button>
    <button class="zone-btn" id="btn_midsole" data-zone="midsole">Midsole</button>
  </div>
  <div class="panel-row">
    <span class="panel-label">Color</span>
    <button class="colorSwatch" data-color="#cc0000" style="background:#cc0000"></button>
    <button class="colorSwatch" data-color="#0055cc" style="background:#0055cc"></button>
    <button class="colorSwatch" data-color="#00aa44" style="background:#00aa44"></button>
    <button class="colorSwatch" data-color="#000000" style="background:#000000"></button>
    <button class="colorSwatch" data-color="#ffffff" style="background:#ffffff"></button>
    <button class="colorSwatch" data-color="#ff8800" style="background:#ff8800"></button>
    <button class="colorSwatch" data-color="#7700cc" style="background:#7700cc"></button>
    <button class="colorSwatch" data-color="#ff44aa" style="background:#ff44aa"></button>
  </div>
  <div class="panel-row">
    <span class="panel-label">Actions</span>
    <button class="action-btn" id="btnRotate">Rotate</button>
    <button class="action-btn" id="btnReset">Reset</button>
    <button class="action-btn" id="btnScreenshot">Screenshot Mode</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {

const defaultColors = {
  upper: '#cc0000',
  tongue: '#cc0000',
  laces: '#ffffff',
  swoosh: '#000000',
  heelTab: '#000000',
  midsole: '#ffffff'
};

const zoneNames = ['upper', 'tongue', 'laces', 'swoosh', 'heelTab', 'midsole'];

window.__3D_STATE__ = {
  selectedZone: 'upper',
  colors: { ...defaultColors },
  autoRotate: false,
  cameraZ: 5,
  sneakerRotationY: 0,
  price: 120,
  colorChanges: 0,
  screenshotMode: false,
  zonesCustomized: 0,
  platformVisible: true,
  totalInteractions: 0,
  animationRunning: true
};

const state = window.__3D_STATE__;

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 8, 20);

// Camera
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0.5, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.insertBefore(renderer.domElement, document.body.firstChild);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 1024;
dirLight.shadow.mapSize.height = 1024;
scene.add(dirLight);

const pointLight = new THREE.PointLight(0xffffff, 0.5);
pointLight.position.set(-3, 3, -3);
scene.add(pointLight);

// Platform
const platformGeo = new THREE.CylinderGeometry(2, 2, 0.1, 64);
const platformMat = new THREE.MeshStandardMaterial({
  color: 0x333344,
  metalness: 0.8,
  roughness: 0.3
});
const platform = new THREE.Mesh(platformGeo, platformMat);
platform.position.y = 0;
platform.receiveShadow = true;
scene.add(platform);

// Sneaker Group
const sneakerGroup = new THREE.Group();
sneakerGroup.position.y = 0.1;

const meshes = {};
const zoneMeshMap = {};

function createMat(color) {
  return new THREE.MeshStandardMaterial({
    color: new THREE.Color(color),
    roughness: 0.5,
    metalness: 0.1
  });
}

// Sole
const soleGeo = new THREE.BoxGeometry(1.8, 0.25, 0.7);
const soleMat = createMat('#333333');
const sole = new THREE.Mesh(soleGeo, soleMat);
sole.position.y = 0.225;
sole.castShadow = true;
sneakerGroup.add(sole);

// Midsole
const midsoleGeo = new THREE.BoxGeometry(1.7, 0.15, 0.65);
const midsoleMat = createMat('#ffffff');
const midsole = new THREE.Mesh(midsoleGeo, midsoleMat);
midsole.position.y = 0.40;
midsole.castShadow = true;
sneakerGroup.add(midsole);
meshes.midsole = midsole;
zoneMeshMap.midsole = [midsole];
midsole.userData.zone = 'midsole';

// Upper
const upperGeo = new THREE.BoxGeometry(1.5, 0.5, 0.6);
const upperMat = createMat('#cc0000');
const upper = new THREE.Mesh(upperGeo, upperMat);
upper.position.y = 0.75;
upper.castShadow = true;
sneakerGroup.add(upper);
meshes.upper = upper;
zoneMeshMap.upper = [upper];
upper.userData.zone = 'upper';

// Tongue
const tongueGeo = new THREE.BoxGeometry(0.3, 0.45, 0.5);
const tongueMat = createMat('#cc0000');
const tongue = new THREE.Mesh(tongueGeo, tongueMat);
tongue.position.set(0.5, 0.95, 0);
tongue.castShadow = true;
sneakerGroup.add(tongue);
meshes.tongue = tongue;
zoneMeshMap.tongue = [tongue];
tongue.userData.zone = 'tongue';

// Laces
const laceMeshes = [];
for (let i = 0; i < 3; i++) {
  const laceGeo = new THREE.BoxGeometry(0.05, 0.05, 0.55);
  const laceMat = createMat('#ffffff');
  const lace = new THREE.Mesh(laceGeo, laceMat);
  lace.position.set(0.1 + i * 0.15, 0.9, 0);
  lace.castShadow = true;
  sneakerGroup.add(lace);
  laceMeshes.push(lace);
  lace.userData.zone = 'laces';
}
meshes.laces = laceMeshes[0];
zoneMeshMap.laces = laceMeshes;

// Swoosh
const swooshGeo = new THREE.BoxGeometry(0.8, 0.15, 0.05);
const swooshMat = createMat('#000000');
const swoosh = new THREE.Mesh(swooshGeo, swooshMat);
swoosh.position.set(0, 0.6, 0.32);
swoosh.rotation.z = -0.2;
swoosh.castShadow = true;
sneakerGroup.add(swoosh);
meshes.swoosh = swoosh;
zoneMeshMap.swoosh = [swoosh];
swoosh.userData.zone = 'swoosh';

// Heel tab
const heelGeo = new THREE.BoxGeometry(0.25, 0.3, 0.55);
const heelMat = createMat('#000000');
const heelTab = new THREE.Mesh(heelGeo, heelMat);
heelTab.position.set(-0.85, 0.65, 0);
heelTab.castShadow = true;
sneakerGroup.add(heelTab);
meshes.heelTab = heelTab;
zoneMeshMap.heelTab = [heelTab];
heelTab.userData.zone = 'heelTab';

scene.add(sneakerGroup);

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Get all sneaker meshes for raycasting
function getAllSneakerMeshes() {
  const all = [];
  for (const zone of zoneNames) {
    if (zoneMeshMap[zone]) {
      all.push(...zoneMeshMap[zone]);
    }
  }
  return all;
}

// Update spec panel
function updateSpecPanel() {
  const content = document.getElementById('specContent');
  let html = '';
  for (const zone of zoneNames) {
    const color = state.colors[zone];
    const label = zone === 'heelTab' ? 'Heel Tab' : zone.charAt(0).toUpperCase() + zone.slice(1);
    html += `<div class="spec-row">
      <span class="spec-zone">${label}</span>
      <span class="spec-color">
        <span class="spec-color-dot" style="background:${color}"></span>
        <span class="spec-color-hex">${color}</span>
      </span>
    </div>`;
  }
  content.innerHTML = html;
}

// Update price
function updatePrice() {
  let customized = 0;
  for (const zone of zoneNames) {
    if (state.colors[zone] !== defaultColors[zone]) {
      customized++;
    }
  }
  state.zonesCustomized = customized;
  state.price = 120 + customized * 5;
  document.getElementById('priceDisplay').textContent = '$' + state.price;
}

// Select zone
function selectZone(zone) {
  state.selectedZone = zone;
  state.totalInteractions++;

  document.querySelectorAll('.zone-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.zone === zone);
  });
}

// Apply color
function applyColor(color) {
  const zone = state.selectedZone;
  state.colors[zone] = color;
  state.colorChanges++;
  state.totalInteractions++;

  const meshList = zoneMeshMap[zone];
  if (meshList) {
    meshList.forEach(m => {
      m.material.color.set(color);
    });
  }

  updatePrice();
  updateSpecPanel();
}

// Reset all
function resetAll() {
  state.totalInteractions++;
  for (const zone of zoneNames) {
    state.colors[zone] = defaultColors[zone];
    const meshList = zoneMeshMap[zone];
    if (meshList) {
      meshList.forEach(m => {
        m.material.color.set(defaultColors[zone]);
      });
    }
  }
  state.colorChanges = 0;
  updatePrice();
  updateSpecPanel();
}

// Toggle rotation
function toggleRotate() {
  state.autoRotate = !state.autoRotate;
  state.totalInteractions++;
  document.getElementById('btnRotate').classList.toggle('active', state.autoRotate);
}

// Screenshot mode
function toggleScreenshot() {
  state.screenshotMode = !state.screenshotMode;
  state.totalInteractions++;

  const cp = document.getElementById('controlPanel');
  const sp = document.getElementById('specPanel');
  const title = document.getElementById('title');
  const price = document.getElementById('priceDisplay');
  const btn = document.getElementById('btnScreenshot');

  if (state.screenshotMode) {
    cp.style.display = 'none';
    sp.style.display = 'none';
    title.style.display = 'none';
    price.style.display = 'none';
    scene.background = new THREE.Color(0xffffff);
    scene.fog.color.set(0xffffff);
    state.autoRotate = false;
  } else {
    cp.style.display = '';
    sp.style.display = '';
    title.style.display = '';
    price.style.display = '';
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog.color.set(0x1a1a2e);
  }

  btn.classList.toggle('active', state.screenshotMode);
}

// Zone buttons
document.querySelectorAll('.zone-btn').forEach(btn => {
  btn.addEventListener('click', () => selectZone(btn.dataset.zone));
});

// Color swatches
document.querySelectorAll('.colorSwatch').forEach(swatch => {
  swatch.addEventListener('click', () => applyColor(swatch.dataset.color));
});

// Action buttons
document.getElementById('btnRotate').addEventListener('click', toggleRotate);
document.getElementById('btnReset').addEventListener('click', resetAll);
document.getElementById('btnScreenshot').addEventListener('click', toggleScreenshot);

// Mouse drag rotation
let isDragging = false;
let prevMouseX = 0;

renderer.domElement.addEventListener('mousedown', (e) => {
  if (state.screenshotMode) return;

  // Check for mesh click via raycasting
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const intersects = raycaster.intersectObjects(getAllSneakerMeshes());
  if (intersects.length > 0) {
    const hit = intersects[0].object;
    if (hit.userData.zone) {
      selectZone(hit.userData.zone);
    }
  }

  isDragging = true;
  prevMouseX = e.clientX;
});

renderer.domElement.addEventListener('mousemove', (e) => {
  if (!isDragging || state.autoRotate || state.screenshotMode) return;
  const dx = e.clientX - prevMouseX;
  sneakerGroup.rotation.y += dx * 0.01;
  state.sneakerRotationY = sneakerGroup.rotation.y;
  prevMouseX = e.clientX;
});

window.addEventListener('mouseup', () => {
  isDragging = false;
});

// Zoom
renderer.domElement.addEventListener('wheel', (e) => {
  if (state.screenshotMode) return;
  state.totalInteractions++;
  const delta = e.deltaY > 0 ? 0.5 : -0.5;
  state.cameraZ = Math.max(2.5, Math.min(8, state.cameraZ + delta));
  camera.position.z = state.cameraZ;
});

// Keyboard
window.addEventListener('keydown', (e) => {
  if (state.screenshotMode && e.key !== 's' && e.key !== 'S') {
    // Allow exiting screenshot mode
    if (e.key === 'Escape') {
      toggleScreenshot();
    }
    return;
  }

  const key = e.key;
  if (key >= '1' && key <= '6') {
    selectZone(zoneNames[parseInt(key) - 1]);
  } else if (key === 'r' || key === 'R') {
    toggleRotate();
  } else if (key === ' ') {
    e.preventDefault();
    resetAll();
  }
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initial spec panel
updateSpecPanel();

// Animation loop
let clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  state.animationRunning = true;

  const elapsed = clock.getElapsedTime();

  // Auto rotate
  if (state.autoRotate && !state.screenshotMode) {
    sneakerGroup.rotation.y += 0.01;
    state.sneakerRotationY = sneakerGroup.rotation.y;
  }

  // Pulsing emissive on selected zone
  const pulseIntensity = (Math.sin(elapsed * 4) + 1) * 0.15;
  for (const zone of zoneNames) {
    const meshList = zoneMeshMap[zone];
    if (meshList) {
      meshList.forEach(m => {
        if (zone === state.selectedZone) {
          m.material.emissive = new THREE.Color(0xffffff);
          m.material.emissiveIntensity = pulseIntensity;
        } else {
          m.material.emissive = new THREE.Color(0x000000);
          m.material.emissiveIntensity = 0;
        }
      });
    }
  }

  // Platform subtle rotation
  platform.rotation.y = elapsed * 0.1;

  camera.lookAt(0, 0.5, 0);
  renderer.render(scene, camera);
}

animate();

})();
</script>
</body>
</html>
