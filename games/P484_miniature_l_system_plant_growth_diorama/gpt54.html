<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L-System Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a0f0a;
      font-family: monospace;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }

    .panel, .controlsRow {
      background: rgba(20, 20, 20, 0.65);
      color: white;
      padding: 8px 10px;
      border-radius: 8px;
      width: fit-content;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    .controlsRow {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    button, label {
      font-family: monospace;
      font-size: 14px;
    }

    button {
      background: #2f241f;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #45342d;
    }

    input[type="checkbox"] {
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="controlsRow">
      <button id="growBtn">Grow</button>
      <button id="resetBtn">Reset</button>
      <button id="seasonBtn">Season</button>
      <label><input type="checkbox" id="firefliesToggle" checked /> Fireflies</label>
    </div>
    <div id="genDisplay" class="panel">Generation: 0</div>
    <div id="seasonDisplay" class="panel">Season: Spring</div>
    <div id="segmentDisplay" class="panel">Segments: 0</div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a0f0a');

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 3;
    controls.maxDistance = 20;
    controls.target.set(0, 1.5, 0);

    const ambientLight = new THREE.AmbientLight('#ffeedd', 0.3);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight('#ffeedd', 1.2);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    scene.add(dirLight);

    const hemi = new THREE.HemisphereLight('#443322', '#110b08', 0.15);
    scene.add(hemi);

    const growBtn = document.getElementById('growBtn');
    const resetBtn = document.getElementById('resetBtn');
    const seasonBtn = document.getElementById('seasonBtn');
    const firefliesToggle = document.getElementById('firefliesToggle');
    const genDisplay = document.getElementById('genDisplay');
    const seasonDisplay = document.getElementById('seasonDisplay');
    const segmentDisplay = document.getElementById('segmentDisplay');

    const SEASONS = [
      { name: 'Spring', leaf: '#2d8a4e', bud: '#ff6699', lightColor: '#ffeedd', lightIntensity: 1.2, hideLeaves: false, hideBuds: false },
      { name: 'Summer', leaf: '#1a6b35', bud: '#ffdd00', lightColor: '#ffeedd', lightIntensity: 1.5, hideLeaves: false, hideBuds: false },
      { name: 'Autumn', leaf: '#cc6622', bud: '#cc2200', lightColor: '#ffaa44', lightIntensity: 1.2, hideLeaves: false, hideBuds: false },
      { name: 'Winter', leaf: '#88aacc', bud: '#88aacc', lightColor: '#aabbff', lightIntensity: 0.6, hideLeaves: true, hideBuds: true }
    ];

    const state = {
      modelLoaded: false,
      generation: 0,
      maxGeneration: 4,
      season: 'Spring',
      seasonIndex: 0,
      segmentCount: 0,
      budCount: 0,
      firefliesVisible: true,
      firefliesCount: 20,
      plantHeight: 0,
      potPlaced: false,
      animating: false,
      lightIntensity: dirLight.intensity
    };
    window.__3D_STATE__ = state;

    let baseModel = null;
    let modelTopY = 0.5;
    let pot = null;

    const plantGroup = new THREE.Group();
    scene.add(plantGroup);

    const fireflyGroup = new THREE.Group();
    scene.add(fireflyGroup);

    const plantAnimationItems = [];
    const clock = new THREE.Clock();

    const lsystem = {
      axiom: 'F',
      rules: { 'F': 'FF+[+F-F-F]-[-F+F+F]' },
      angleDeg: 25,
      segmentLength: 0.3
    };

    function updateUI() {
      genDisplay.textContent = `Generation: ${state.generation}`;
      seasonDisplay.textContent = `Season: ${state.season}`;
      segmentDisplay.textContent = `Segments: ${state.segmentCount}`;
      state.lightIntensity = dirLight.intensity;
    }

    function clearPlant() {
      while (plantGroup.children.length) {
        const child = plantGroup.children.pop();
        disposeObject(child);
      }
      plantAnimationItems.length = 0;
    }

    function disposeObject(obj) {
      obj.traverse?.((c) => {
        if (c.geometry) c.geometry.dispose();
        if (c.material) {
          if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
          else c.material.dispose();
        }
      });
    }

    function generateLSystemString(generation) {
      let current = lsystem.axiom;
      for (let i = 0; i < generation; i++) {
        let next = '';
        for (const ch of current) {
          next += lsystem.rules[ch] || ch;
        }
        current = next;
      }
      return current;
    }

    function createPot() {
      if (pot) {
        scene.remove(pot);
        disposeObject(pot);
      }
      const geo = new THREE.CylinderGeometry(0.24, 0.3, 0.4, 24);
      const mat = new THREE.MeshStandardMaterial({ color: '#6b3e20', roughness: 0.9, metalness: 0.05 });
      pot = new THREE.Mesh(geo, mat);
      pot.castShadow = true;
      pot.receiveShadow = true;
      const potY = modelTopY + 0.2;
      pot.position.set(0, potY, 0);
      scene.add(pot);
      state.potPlaced = true;
    }

    function buildPlant(generation) {
      clearPlant();

      const season = SEASONS[state.seasonIndex];
      const trunkMat = new THREE.MeshStandardMaterial({ color: '#5c3a1e', roughness: 1.0 });
      const leafMat = new THREE.MeshStandardMaterial({
        color: season.leaf,
        roughness: 0.7,
        transparent: season.hideLeaves,
        opacity: season.hideLeaves ? 0 : 1
      });
      const budMat = new THREE.MeshStandardMaterial({
        color: season.bud,
        emissive: season.hideBuds ? '#000000' : season.bud,
        emissiveIntensity: season.hideBuds ? 0 : 0.2,
        transparent: season.hideBuds,
        opacity: season.hideBuds ? 0 : 1
      });

      const segLen = lsystem.segmentLength;
      const angle = THREE.MathUtils.degToRad(lsystem.angleDeg);
      const commandString = generateLSystemString(generation);

      const stack = [];
      const rootY = modelTopY + 0.4;
      let turtle = {
        pos: new THREE.Vector3(0, rootY, 0),
        quat: new THREE.Quaternion()
      };

      const up = new THREE.Vector3(0, 1, 0);
      let segmentIndex = 0;
      let maxY = rootY;
      const tipPositions = [];

      for (let i = 0; i < commandString.length; i++) {
        const ch = commandString[i];

        if (ch === 'F') {
          const start = turtle.pos.clone();
          const dir = up.clone().applyQuaternion(turtle.quat).normalize();
          const end = start.clone().add(dir.multiplyScalar(segLen));
          const mid = start.clone().lerp(end, 0.5);

          const depthFactor = stack.length;
          const radiusTop = THREE.MathUtils.clamp(0.05 - depthFactor * 0.005, 0.02, 0.05);
          const radiusBottom = THREE.MathUtils.clamp(radiusTop + 0.01, 0.025, 0.06);

          const geo = new THREE.CylinderGeometry(radiusTop, radiusBottom, segLen, 8);
          const isTipLike = i > commandString.length - 12 || depthFactor >= 3;
          const mat = isTipLike ? leafMat : trunkMat;

          const seg = new THREE.Mesh(geo, mat);
          seg.castShadow = true;
          seg.receiveShadow = true;
          seg.position.copy(mid);
          seg.quaternion.copy(new THREE.Quaternion().setFromUnitVectors(up, end.clone().sub(start).normalize()));
          seg.scale.y = 0.001;
          plantGroup.add(seg);

          plantAnimationItems.push({
            mesh: seg,
            startTime: segmentIndex * 0.03,
            duration: 0.35
          });

          segmentIndex++;
          turtle.pos.copy(end);
          maxY = Math.max(maxY, end.y);

          const nextChar = commandString[i + 1];
          if (!nextChar || nextChar === ']' ) {
            tipPositions.push(end.clone());
          }
        } else if (ch === '+') {
          const q = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), angle);
          turtle.quat.multiply(q);
        } else if (ch === '-') {
          const q = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), -angle);
          turtle.quat.multiply(q);
        } else if (ch === '[') {
          stack.push({
            pos: turtle.pos.clone(),
            quat: turtle.quat.clone()
          });
        } else if (ch === ']') {
          if (stack.length > 0) {
            const popped = stack.pop();
            turtle.pos.copy(popped.pos);
            turtle.quat.copy(popped.quat);
          }
        }
      }

      let budCount = 0;
      for (const tip of tipPositions) {
        const budGeo = new THREE.SphereGeometry(0.04, 10, 10);
        const bud = new THREE.Mesh(budGeo, budMat);
        bud.position.copy(tip);
        bud.castShadow = true;
        bud.receiveShadow = true;
        bud.scale.setScalar(0.001);
        plantGroup.add(bud);

        plantAnimationItems.push({
          mesh: bud,
          startTime: segmentIndex * 0.02 + budCount * 0.02,
          duration: 0.25,
          bud: true
        });
        budCount++;
        maxY = Math.max(maxY, tip.y);
      }

      state.segmentCount = segmentIndex;
      state.budCount = season.hideBuds ? 0 : budCount;
      state.plantHeight = Math.max(0, maxY - rootY);
      updateUI();
      startGrowthAnimation();
    }

    function startGrowthAnimation() {
      state.animating = true;
      const start = performance.now() / 1000;
      for (const item of plantAnimationItems) {
        item.globalStart = start + item.startTime;
      }
    }

    function updateGrowthAnimation(timeSec) {
      if (!state.animating) return;
      let allDone = true;

      for (const item of plantAnimationItems) {
        const t = (timeSec - item.globalStart) / item.duration;
        const clamped = THREE.MathUtils.clamp(t, 0, 1);
        const eased = clamped * clamped * (3 - 2 * clamped);

        if (item.bud) {
          item.mesh.scale.setScalar(Math.max(0.001, eased));
        } else {
          item.mesh.scale.set(1, Math.max(0.001, eased), 1);
        }

        if (clamped < 1) allDone = false;
      }

      if (allDone) state.animating = false;
    }

    function applySeason() {
      const season = SEASONS[state.seasonIndex];
      state.season = season.name;

      dirLight.color.set(season.lightColor);
      dirLight.intensity = season.lightIntensity;

      plantGroup.traverse((obj) => {
        if (!obj.isMesh) return;
        const mat = obj.material;
        if (!mat) return;

        if (obj.geometry instanceof THREE.SphereGeometry) {
          mat.color.set(season.bud);
          mat.emissive?.set(season.hideBuds ? '#000000' : season.bud);
          mat.emissiveIntensity = season.hideBuds ? 0 : 0.2;
          mat.transparent = season.hideBuds;
          mat.opacity = season.hideBuds ? 0 : 1;
          obj.visible = !season.hideBuds;
        } else {
          const isLeafLike = mat.color && mat.color.getHexString() !== new THREE.Color('#5c3a1e').getHexString();
          if (isLeafLike) {
            mat.color.set(season.leaf);
            mat.transparent = season.hideLeaves;
            mat.opacity = season.hideLeaves ? 0 : 1;
            obj.visible = !season.hideLeaves;
          } else {
            obj.visible = true;
          }
        }
      });

      state.budCount = season.hideBuds ? 0 : countVisibleBuds();
      updateUI();
    }

    function countVisibleBuds() {
      let count = 0;
      plantGroup.traverse((obj) => {
        if (obj.isMesh && obj.geometry instanceof THREE.SphereGeometry && obj.visible) count++;
      });
      return count;
    }

    function growPlant() {
      if (state.animating) return;
      if (state.generation < state.maxGeneration) {
        state.generation++;
        buildPlant(state.generation);
        applySeason();
      }
    }

    function resetPlant() {
      if (state.animating) return;
      state.generation = 0;
      buildPlant(0);
      applySeason();
    }

    function nextSeason() {
      state.seasonIndex = (state.seasonIndex + 1) % SEASONS.length;
      applySeason();
    }

    function createFireflies() {
      const geo = new THREE.SphereGeometry(0.03, 10, 10);
      for (let i = 0; i < state.firefliesCount; i++) {
        const mat = new THREE.MeshStandardMaterial({
          color: '#ffff88',
          emissive: '#ffff44',
          emissiveIntensity: 1.5,
          roughness: 0.2,
          metalness: 0
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.castShadow = false;
        mesh.receiveShadow = false;

        const data = {
          mesh,
          base: new THREE.Vector3(
            (Math.random() - 0.5) * 4,
            modelTopY + 1 + Math.random() * 2.5,
            (Math.random() - 0.5) * 4
          ),
          phase: Math.random() * Math.PI * 2,
          speed: 0.5 + Math.random() * 0.8,
          amp: 0.15 + Math.random() * 0.25
        };
        mesh.userData.firefly = data;
        fireflyGroup.add(mesh);
      }
      fireflyGroup.visible = true;
    }

    function updateFireflies(t) {
      fireflyGroup.children.forEach((mesh, i) => {
        const d = mesh.userData.firefly;
        mesh.position.set(
          d.base.x + Math.sin(t * d.speed + d.phase) * (0.5 + d.amp),
          d.base.y + Math.sin(t * (d.speed * 1.7) + d.phase * 0.7) * d.amp,
          d.base.z + Math.cos(t * (d.speed * 1.2) + d.phase) * (0.5 + d.amp)
        );
      });
    }

    function toggleFireflies() {
      state.firefliesVisible = firefliesToggle.checked;
      fireflyGroup.visible = state.firefliesVisible;
      updateUI();
    }

    const loader = new GLTFLoader();
    loader.load(
      'ABeautifulGame.glb',
      (gltf) => {
        baseModel = gltf.scene;
        baseModel.scale.setScalar(0.02);
        baseModel.position.set(0, 0, 0);

        baseModel.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        scene.add(baseModel);

        const box = new THREE.Box3().setFromObject(baseModel);
        modelTopY = box.max.y;
        if (!isFinite(modelTopY)) modelTopY = 0.5;

        createPot();
        buildPlant(0);
        applySeason();

        state.modelLoaded = true;
        updateUI();

        if (fireflyGroup.children.length === 0) createFireflies();
      },
      undefined,
      (err) => {
        console.warn('Failed to load ABeautifulGame.glb:', err);

        const fallback = new THREE.Mesh(
          new THREE.CylinderGeometry(2.4, 2.6, 0.6, 40),
          new THREE.MeshStandardMaterial({ color: '#3b2a22', roughness: 1 })
        );
        fallback.position.y = 0.3;
        fallback.receiveShadow = true;
        fallback.castShadow = true;
        scene.add(fallback);
        baseModel = fallback;

        const box = new THREE.Box3().setFromObject(fallback);
        modelTopY = box.max.y;

        createPot();
        buildPlant(0);
        applySeason();

        state.modelLoaded = false;
        updateUI();

        if (fireflyGroup.children.length === 0) createFireflies();
      }
    );

    growBtn.addEventListener('click', growPlant);
    resetBtn.addEventListener('click', resetPlant);
    seasonBtn.addEventListener('click', nextSeason);
    firefliesToggle.addEventListener('change', toggleFireflies);

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'g') growPlant();
      if (key === 'r') resetPlant();
      if (key === 's') nextSeason();
      if (key === 'f') {
        firefliesToggle.checked = !firefliesToggle.checked;
        toggleFireflies();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateUI();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();

      controls.update();
      updateGrowthAnimation(performance.now() / 1000);
      if (fireflyGroup.children.length) updateFireflies(elapsed);

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
