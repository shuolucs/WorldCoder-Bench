<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D L-System Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a0f0a;
            font-family: monospace;
        }
        #ui-container {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(26, 15, 10, 0.85);
            color: #ffffff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #332211;
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        #ui-container > * {
            pointer-events: auto;
            margin-bottom: 8px;
        }
        button {
            background: #4a3018;
            color: white;
            border: 1px solid #7a5028;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover {
            background: #5c3a1e;
        }
        button:active {
            background: #7a5028;
        }
        label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
        }
        input[type="checkbox"] {
            margin-right: 8px;
        }
        .info-panel {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #4a3018;
            font-size: 13px;
            line-height: 1.5;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="ui-container">
        <button id="growBtn">Grow (G)</button>
        <button id="resetBtn">Reset (R)</button>
        <button id="seasonBtn">Season (S)</button>
        <label>
            <input type="checkbox" id="firefliesToggle" checked> Fireflies (F)
        </label>
        <div class="info-panel">
            <div id="genDisplay">Generation: 0</div>
            <div id="seasonDisplay">Season: Spring</div>
            <div id="segmentDisplay">Segments: 0</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            generation: 0,
            maxGeneration: 4,
            season: 'Spring',
            seasonIndex: 0,
            segmentCount: 0,
            budCount: 0,
            firefliesVisible: true,
            firefliesCount: 20,
            plantHeight: 0,
            potPlaced: false,
            animating: false,
            lightIntensity: 1.2
        };

        const seasonData = [
            { name: 'Spring', leaf: 0x2d8a4e, bud: 0xff6699, light: 0xffeedd, intensity: 1.2, showLeaves: true, showBuds: true },
            { name: 'Summer', leaf: 0x1a6b35, bud: 0xffdd00, light: 0xffffff, intensity: 1.5, showLeaves: true, showBuds: true },
            { name: 'Autumn', leaf: 0xcc6622, bud: 0xcc2200, light: 0xffaa44, intensity: 1.2, showLeaves: true, showBuds: true },
            { name: 'Winter', leaf: 0x000000, bud: 0x000000, light: 0xaabbff, intensity: 0.6, showLeaves: false, showBuds: false }
        ];

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a0f0a);
        scene.fog = new THREE.FogExp2(0x1a0f0a, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 3;
        controls.maxDistance = 20;
        controls.target.set(0, 2, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffeedd, 0.3);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        // --- Groups ---
        const dioramaGroup = new THREE.Group();
        scene.add(dioramaGroup);
        
        const potGroup = new THREE.Group();
        dioramaGroup.add(potGroup);
        
        const plantGroup = new THREE.Group();
        potGroup.add(plantGroup);

        const firefliesGroup = new THREE.Group();
        scene.add(firefliesGroup);

        // --- Materials ---
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5c3a1e, roughness: 0.9, metalness: 0.1 });
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x2d8a4e, roughness: 0.6, metalness: 0.1 });
        const budMat = new THREE.MeshStandardMaterial({ color: 0xff6699, roughness: 0.4, metalness: 0.2 });
        const potMat = new THREE.MeshStandardMaterial({ color: 0x4a3018, roughness: 0.8, metalness: 0.1 });

        // --- Model Loading ---
        const loader = new GLTFLoader();
        loader.load(
            'ABeautifulGame.glb',
            (gltf) => {
                const model = gltf.scene;
                model.scale.set(0.02, 0.02, 0.02);
                model.position.set(0, 0, 0);
                
                let maxY = 0;
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                const box = new THREE.Box3().setFromObject(model);
                maxY = box.max.y;

                dioramaGroup.add(model);
                window.__3D_STATE__.modelLoaded = true;
                setupPotAndPlant(maxY);
            },
            undefined,
            (error) => {
                console.warn("Could not load 'ABeautifulGame.glb'. Proceeding with default base.", error);
                // Fallback base if model fails to load
                const baseGeo = new THREE.CylinderGeometry(3, 3.2, 0.5, 32);
                const baseMat = new THREE.MeshStandardMaterial({ color: 0x2a1f1a });
                const base = new THREE.Mesh(baseGeo, baseMat);
                base.position.y = 0.25;
                base.receiveShadow = true;
                base.castShadow = true;
                dioramaGroup.add(base);
                setupPotAndPlant(0.5);
            }
        );

        function setupPotAndPlant(baseY) {
            const potHeight = 0.4;
            const potGeo = new THREE.CylinderGeometry(0.3, 0.25, potHeight, 16);
            const pot = new THREE.Mesh(potGeo, potMat);
            pot.position.y = baseY + potHeight / 2;
            pot.castShadow = true;
            pot.receiveShadow = true;
            potGroup.add(pot);

            plantGroup.position.y = baseY + potHeight;
            window.__3D_STATE__.potPlaced = true;
            
            generatePlant();
        }

        // --- L-System Logic ---
        function getLSystemString(gen) {
            let str = 'F';
            for (let i = 0; i < gen; i++) {
                let next = '';
                for (let char of str) {
                    if (char === 'F') next += 'FF+[+F-F-F]-[-F+F+F]';
                    else next += char;
                }
                str = next;
            }
            return str;
        }

        class Turtle {
            constructor() {
                this.pos = new THREE.Vector3();
                this.quaternion = new THREE.Quaternion();
            }
            clone() {
                const t = new Turtle();
                t.pos.copy(this.pos);
                t.quaternion.copy(this.quaternion);
                return t;
            }
        }

        let plantMeshes = [];
        let budMeshes = [];
        let animationStartTime = 0;

        function generatePlant() {
            // Clear existing
            while(plantGroup.children.length > 0){ 
                const child = plantGroup.children[0];
                plantGroup.remove(child); 
            }
            plantMeshes = [];
            budMeshes = [];

            const str = getLSystemString(window.__3D_STATE__.generation);
            const angleRad = 25 * Math.PI / 180;
            const twistRad = 137.5 * Math.PI / 180; // Golden angle for 3D volume
            const length = 0.3;

            let turtle = new Turtle();
            let stack = [];
            let maxY = 0;
            let delayCounter = 0;

            // Pre-create geometries to save memory
            const geoCache = {};
            function getCylinderGeo(radius) {
                const key = radius.toFixed(3);
                if (!geoCache[key]) {
                    const geo = new THREE.CylinderGeometry(radius * 0.7, radius, length, 6);
                    geo.translate(0, length / 2, 0);
                    geoCache[key] = geo;
                }
                return geoCache[key];
            }

            const budGeo = new THREE.SphereGeometry(0.04, 8, 8);

            for (let i = 0; i < str.length; i++) {
                const char = str[i];

                if (char === 'F') {
                    const depth = stack.length;
                    const radius = Math.max(0.015, 0.05 - depth * 0.01);
                    const isLeaf = depth >= 2;
                    
                    const mesh = new THREE.Mesh(getCylinderGeo(radius), isLeaf ? leafMat : trunkMat);
                    mesh.position.copy(turtle.pos);
                    mesh.quaternion.copy(turtle.quaternion);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    
                    mesh.scale.set(1, 0, 1); // Start scaled down for animation
                    mesh.userData = { 
                        delay: delayCounter * 0.0015, 
                        isLeaf: isLeaf 
                    };
                    
                    plantGroup.add(mesh);
                    plantMeshes.push(mesh);
                    delayCounter++;

                    // Move turtle forward
                    const dir = new THREE.Vector3(0, 1, 0).applyQuaternion(turtle.quaternion);
                    turtle.pos.add(dir.multiplyScalar(length));
                    maxY = Math.max(maxY, turtle.pos.y);

                    // Add bud at tips
                    if (i === str.length - 1 || str[i+1] === ']' || str[i+1] === '+' || str[i+1] === '-') {
                        if (isLeaf) {
                            const bud = new THREE.Mesh(budGeo, budMat);
                            bud.position.copy(turtle.pos);
                            bud.scale.setScalar(0);
                            bud.userData = { delay: delayCounter * 0.0015 + 0.1 };
                            plantGroup.add(bud);
                            budMeshes.push(bud);
                        }
                    }

                } else if (char === '+') {
                    turtle.quaternion.multiply(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1), angleRad));
                    turtle.quaternion.multiply(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), twistRad));
                } else if (char === '-') {
                    turtle.quaternion.multiply(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1), -angleRad));
                    turtle.quaternion.multiply(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), -twistRad));
                } else if (char === '[') {
                    stack.push(turtle.clone());
                } else if (char === ']') {
                    turtle = stack.pop();
                }
            }

            window.__3D_STATE__.segmentCount = plantMeshes.length;
            window.__3D_STATE__.budCount = budMeshes.length;
            window.__3D_STATE__.plantHeight = maxY;
            window.__3D_STATE__.animating = true;
            animationStartTime = performance.now();
            
            applySeason();
            updateUI();
        }

        // --- Seasons ---
        function applySeason() {
            const data = seasonData[window.__3D_STATE__.seasonIndex];
            window.__3D_STATE__.season = data.name;
            window.__3D_STATE__.lightIntensity = data.intensity;

            // Animate light color transition
            dirLight.color.setHex(data.light);
            dirLight.intensity = data.intensity;

            leafMat.color.setHex(data.leaf);
            budMat.color.setHex(data.bud);

            plantMeshes.forEach(mesh => {
                if (mesh.userData.isLeaf) mesh.visible = data.showLeaves;
            });

            budMeshes.forEach(bud => {
                bud.visible = data.showBuds;
            });

            updateUI();
        }

        // --- Fireflies ---
        const ffGeo = new THREE.SphereGeometry(0.03, 8, 8);
        const ffMat = new THREE.MeshBasicMaterial({ color: 0xffff44 });
        for (let i = 0; i < window.__3D_STATE__.firefliesCount; i++) {
            const ff = new THREE.Mesh(ffGeo, ffMat);
            ff.userData = {
                baseX: (Math.random() - 0.5) * 8,
                baseY: Math.random() * 6 + 1,
                baseZ: (Math.random() - 0.5) * 8,
                speed: Math.random() * 0.5 + 0.5,
                offset: Math.random() * Math.PI * 2
            };
            firefliesGroup.add(ff);
        }

        // --- UI & Interactions ---
        const uiGen = document.getElementById('genDisplay');
        const uiSeason = document.getElementById('seasonDisplay');
        const uiSeg = document.getElementById('segmentDisplay');

        function updateUI() {
            uiGen.textContent = `Generation: ${window.__3D_STATE__.generation}`;
            uiSeason.textContent = `Season: ${window.__3D_STATE__.season}`;
            uiSeg.textContent = `Segments: ${window.__3D_STATE__.segmentCount}`;
        }

        function triggerGrow() {
            if (window.__3D_STATE__.generation < window.__3D_STATE__.maxGeneration && !window.__3D_STATE__.animating) {
                window.__3D_STATE__.generation++;
                generatePlant();
            }
        }

        function triggerReset() {
            if (!window.__3D_STATE__.animating) {
                window.__3D_STATE__.generation = 0;
                generatePlant();
            }
        }

        function triggerSeason() {
            window.__3D_STATE__.seasonIndex = (window.__3D_STATE__.seasonIndex + 1) % 4;
            applySeason();
        }

        function toggleFireflies() {
            const cb = document.getElementById('firefliesToggle');
            window.__3D_STATE__.firefliesVisible = cb.checked;
            firefliesGroup.visible = window.__3D_STATE__.firefliesVisible;
        }

        document.getElementById('growBtn').addEventListener('click', triggerGrow);
        document.getElementById('resetBtn').addEventListener('click', triggerReset);
        document.getElementById('seasonBtn').addEventListener('click', triggerSeason);
        document.getElementById('firefliesToggle').addEventListener('change', toggleFireflies);

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'g') triggerGrow();
            if (key === 'r') triggerReset();
            if (key === 's') triggerSeason();
            if (key === 'f') {
                const cb = document.getElementById('firefliesToggle');
                cb.checked = !cb.checked;
                toggleFireflies();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            const time = performance.now();
            const delta = clock.getDelta();
            const elapsedSec = clock.getElapsedTime();

            // Growth Animation
            if (window.__3D_STATE__.animating) {
                let allDone = true;
                const elapsedAnim = time - animationStartTime;
                const animDuration = 1000; // 1 second base duration

                plantMeshes.forEach(mesh => {
                    const delayMs = mesh.userData.delay * 1000;
                    if (elapsedAnim > delayMs) {
                        const progress = Math.min(1, (elapsedAnim - delayMs) / (animDuration * 0.4));
                        const easeOut = 1 - Math.pow(1 - progress, 3);
                        mesh.scale.y = easeOut;
                        if (progress < 1) allDone = false;
                    } else {
                        allDone = false;
                    }
                });

                budMeshes.forEach(bud => {
                    const delayMs = bud.userData.delay * 1000;
                    if (elapsedAnim > delayMs) {
                        const progress = Math.min(1, (elapsedAnim - delayMs) / (animDuration * 0.3));
                        const easeOut = 1 - Math.pow(1 - progress, 3);
                        bud.scale.setScalar(easeOut);
                        if (progress < 1) allDone = false;
                    } else {
                        allDone = false;
                    }
                });

                if (allDone) window.__3D_STATE__.animating = false;
            }

            // Fireflies Animation
            if (window.__3D_STATE__.firefliesVisible) {
                firefliesGroup.children.forEach((ff) => {
                    const t = elapsedSec * ff.userData.speed + ff.userData.offset;
                    ff.position.x = ff.userData.baseX + Math.sin(t * 1.5) * 0.8;
                    ff.position.y = ff.userData.baseY + Math.cos(t * 1.2) * 0.5;
                    ff.position.z = ff.userData.baseZ + Math.sin(t * 1.8) * 0.8;
                });
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
