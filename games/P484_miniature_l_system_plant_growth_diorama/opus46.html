<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L-System Diorama</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a0f0a; }
canvas { display: block; }
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 100;
    font-family: monospace;
    color: white;
    display: flex;
    flex-direction: column;
    gap: 6px;
}
#ui div, #ui button, #ui label {
    background: rgba(0,0,0,0.6);
    padding: 6px 12px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 13px;
    color: white;
}
#ui button {
    border: 1px solid rgba(255,255,255,0.3);
    cursor: pointer;
    transition: background 0.2s;
}
#ui button:hover {
    background: rgba(255,255,255,0.2);
}
#ui label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
}
#ui label input {
    cursor: pointer;
}
</style>
</head>
<body>

<div id="ui">
    <div id="genDisplay">Generation: 0</div>
    <div id="seasonDisplay">Season: Spring</div>
    <div id="segmentDisplay">Segments: 0</div>
    <button id="growBtn">🌱 Grow (G)</button>
    <button id="resetBtn">🔄 Reset (R)</button>
    <button id="seasonBtn">🍂 Season (S)</button>
    <label><input type="checkbox" id="firefliesToggle" checked> ✨ Fireflies (F)</label>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    modelLoaded: false,
    generation: 0,
    maxGeneration: 4,
    season: 'Spring',
    seasonIndex: 0,
    segmentCount: 0,
    budCount: 0,
    firefliesVisible: true,
    firefliesCount: 20,
    plantHeight: 0,
    potPlaced: false,
    animating: false,
    lightIntensity: 1.2
};

const state = window.__3D_STATE__;

// Season configs
const seasons = [
    { name: 'Spring', leafColor: '#2d8a4e', budColor: '#ff6699', lightColor: '#ffffff', lightIntensity: 1.2, ambientColor: '#ffeedd', showLeaves: true },
    { name: 'Summer', leafColor: '#1a6b35', budColor: '#ffdd00', lightColor: '#ffffff', lightIntensity: 1.5, ambientColor: '#ffeedd', showLeaves: true },
    { name: 'Autumn', leafColor: '#cc6622', budColor: '#cc2200', lightColor: '#ffaa44', lightIntensity: 1.2, ambientColor: '#ffeedd', showLeaves: true },
    { name: 'Winter', leafColor: '#2d8a4e', budColor: '#ff6699', lightColor: '#aabbff', lightIntensity: 0.6, ambientColor: '#ccddff', showLeaves: false }
];

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color('#1a0f0a');
scene.fog = new THREE.FogExp2('#1a0f0a', 0.03);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffeedd, 0.3);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

// Hemisphere light for fill
const hemiLight = new THREE.HemisphereLight(0xffeedd, 0x1a0f0a, 0.2);
scene.add(hemiLight);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 3;
controls.maxDistance = 20;
controls.target.set(0, 1, 0);

// L-System engine
class LSystem {
    constructor(axiom, rules, angle) {
        this.axiom = axiom;
        this.rules = rules;
        this.angle = angle * Math.PI / 180;
    }

    generate(generations) {
        let str = this.axiom;
        for (let i = 0; i < generations; i++) {
            let next = '';
            for (const ch of str) {
                next += this.rules[ch] || ch;
            }
            str = next;
        }
        return str;
    }
}

const lsystem = new LSystem('F', { 'F': 'FF+[+F-F-F]-[-F+F+F]' }, 25);

// Plant group
let plantGroup = new THREE.Group();
scene.add(plantGroup);

// Pot
let pot = null;
let potTopY = 0;
let modelTopY = 0;

function createPot() {
    if (pot) {
        scene.remove(pot);
    }
    pot = new THREE.Group();

    // Main pot body
    const potGeo = new THREE.CylinderGeometry(0.3, 0.22, 0.4, 16);
    const potMat = new THREE.MeshStandardMaterial({ color: '#8B4513', roughness: 0.8, metalness: 0.1 });
    const potMesh = new THREE.Mesh(potGeo, potMat);
    potMesh.castShadow = true;
    potMesh.receiveShadow = true;
    pot.add(potMesh);

    // Pot rim
    const rimGeo = new THREE.TorusGeometry(0.32, 0.03, 8, 16);
    const rimMat = new THREE.MeshStandardMaterial({ color: '#6B3410', roughness: 0.7 });
    const rimMesh = new THREE.Mesh(rimGeo, rimMat);
    rimMesh.rotation.x = Math.PI / 2;
    rimMesh.position.y = 0.2;
    rimMesh.castShadow = true;
    pot.add(rimMesh);

    // Soil
    const soilGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.05, 16);
    const soilMat = new THREE.MeshStandardMaterial({ color: '#2a1a0a', roughness: 1.0 });
    const soilMesh = new THREE.Mesh(soilGeo, soilMat);
    soilMesh.position.y = 0.18;
    pot.add(soilMesh);

    pot.position.set(0, modelTopY + 0.2, 0);
    potTopY = modelTopY + 0.4;
    scene.add(pot);
    state.potPlaced = true;
}

// Build plant from L-system string
function buildPlant(lstring, seasonConfig) {
    // Clear old plant
    while (plantGroup.children.length > 0) {
        const child = plantGroup.children[0];
        plantGroup.remove(child);
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
    }

    const stack = [];
    let currentPos = new THREE.Vector3(0, potTopY, 0);
    let currentDir = new THREE.Vector3(0, 1, 0);
    let currentRight = new THREE.Vector3(1, 0, 0);
    let depth = 0;
    let maxDepth = 0;

    // Count max depth for coloring
    let tempDepth = 0;
    for (const ch of lstring) {
        if (ch === '[') tempDepth++;
        if (ch === ']') tempDepth--;
        if (tempDepth > maxDepth) maxDepth = tempDepth;
    }

    const segmentLength = 0.3;
    const segments = [];
    const buds = [];
    let segIndex = 0;

    // Track if next F is a tip (followed by nothing useful or end)
    function isTip(str, idx) {
        // Look ahead: if no more F before a ] or end, it's a tip
        for (let i = idx + 1; i < str.length; i++) {
            if (str[i] === 'F') return false;
            if (str[i] === ']') return true;
        }
        return true;
    }

    for (let i = 0; i < lstring.length; i++) {
        const ch = lstring[i];

        if (ch === 'F') {
            const radius = THREE.MathUtils.lerp(0.05, 0.02, depth / Math.max(maxDepth, 1));
            const tip = isTip(lstring, i);
            const isLeaf = depth > 0 && tip;

            const geo = new THREE.CylinderGeometry(radius * 0.7, radius, segmentLength, 6);
            const color = isLeaf ? seasonConfig.leafColor : '#5c3a1e';
            const mat = new THREE.MeshStandardMaterial({
                color: color,
                roughness: isLeaf ? 0.6 : 0.8,
                metalness: 0.05,
                transparent: !seasonConfig.showLeaves && isLeaf,
                opacity: (!seasonConfig.showLeaves && isLeaf) ? 0 : 1
            });

            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;

            // Position and orient the segment
            const endPos = currentPos.clone().add(currentDir.clone().multiplyScalar(segmentLength));
            const midPos = currentPos.clone().add(currentDir.clone().multiplyScalar(segmentLength / 2));

            mesh.position.copy(midPos);

            // Orient cylinder along currentDir
            const up = new THREE.Vector3(0, 1, 0);
            const quat = new THREE.Quaternion();
            quat.setFromUnitVectors(up, currentDir.clone().normalize());
            mesh.quaternion.copy(quat);

            mesh.userData.isLeaf = isLeaf;
            mesh.userData.segIndex = segIndex;
            mesh.userData.originalScale = mesh.scale.clone();

            segments.push(mesh);
            plantGroup.add(mesh);

            // Add bud at tip
            if (tip) {
                const budGeo = new THREE.SphereGeometry(0.04, 8, 8);
                const budMat = new THREE.MeshStandardMaterial({
                    color: seasonConfig.budColor,
                    emissive: seasonConfig.budColor,
                    emissiveIntensity: 0.3,
                    roughness: 0.4,
                    transparent: !seasonConfig.showLeaves,
                    opacity: seasonConfig.showLeaves ? 1 : 0
                });
                const budMesh = new THREE.Mesh(budGeo, budMat);
                budMesh.position.copy(endPos);
                budMesh.castShadow = true;
                budMesh.userData.isBud = true;
                budMesh.userData.segIndex = segIndex;
                buds.push(budMesh);
                plantGroup.add(budMesh);
            }

            currentPos.copy(endPos);
            segIndex++;
        } else if (ch === '+') {
            // Rotate +angle around a perpendicular axis
            const axis = currentRight.clone().normalize();
            currentDir.applyAxisAngle(axis, lsystem.angle);
            // Also add some twist around forward axis
            const fwdAxis = new THREE.Vector3(0, 0, 1);
            currentDir.applyAxisAngle(fwdAxis, lsystem.angle * 0.3);
        } else if (ch === '-') {
            const axis = currentRight.clone().normalize();
            currentDir.applyAxisAngle(axis, -lsystem.angle);
            const fwdAxis = new THREE.Vector3(0, 0, 1);
            currentDir.applyAxisAngle(fwdAxis, -lsystem.angle * 0.3);
        } else if (ch === '[') {
            stack.push({
                pos: currentPos.clone(),
                dir: currentDir.clone(),
                right: currentRight.clone(),
                depth: depth
            });
            depth++;
        } else if (ch === ']') {
            if (stack.length > 0) {
                const s = stack.pop();
                currentPos.copy(s.pos);
                currentDir.copy(s.dir);
                currentRight.copy(s.right);
                depth = s.depth;
            }
        }
    }

    // Calculate plant height
    let maxY = 0;
    plantGroup.traverse(child => {
        if (child.isMesh) {
            const worldPos = new THREE.Vector3();
            child.getWorldPosition(worldPos);
            if (worldPos.y > maxY) maxY = worldPos.y;
        }
    });

    state.segmentCount = segments.length;
    state.budCount = buds.length;
    state.plantHeight = parseFloat((maxY - potTopY).toFixed(2));

    updateDisplays();

    return { segments, buds };
}

// Growth animation
function animateGrowth(segments, buds) {
    state.animating = true;
    const totalSegments = segments.length + buds.length;
    const duration = 1000; // 1 second
    const staggerDelay = totalSegments > 0 ? duration / totalSegments : 0;

    // Set all to scale 0
    segments.forEach(seg => {
        seg.scale.y = 0.01;
        seg.visible = true;
    });
    buds.forEach(bud => {
        bud.scale.set(0.01, 0.01, 0.01);
        bud.visible = true;
    });

    const startTime = performance.now();

    function animStep(now) {
        const elapsed = now - startTime;
        let allDone = true;

        segments.forEach((seg, idx) => {
            const segStart = idx * staggerDelay;
            const segElapsed = elapsed - segStart;
            if (segElapsed <= 0) {
                seg.scale.y = 0.01;
                allDone = false;
            } else if (segElapsed < 300) {
                const t = segElapsed / 300;
                const eased = 1 - Math.pow(1 - t, 3); // ease out cubic
                seg.scale.y = Math.max(0.01, eased);
                allDone = false;
            } else {
                seg.scale.y = 1;
            }
        });

        buds.forEach((bud, idx) => {
            const budStart = (segments.length + idx) * staggerDelay;
            const budElapsed = elapsed - budStart;
            if (budElapsed <= 0) {
                bud.scale.set(0.01, 0.01, 0.01);
                allDone = false;
            } else if (budElapsed < 300) {
                const t = budElapsed / 300;
                const eased = 1 - Math.pow(1 - t, 3);
                const s = Math.max(0.01, eased);
                bud.scale.set(s, s, s);
                allDone = false;
            } else {
                bud.scale.set(1, 1, 1);
            }
        });

        if (!allDone && elapsed < duration + 500) {
            requestAnimationFrame(animStep);
        } else {
            // Ensure all at full scale
            segments.forEach(seg => seg.scale.y = 1);
            buds.forEach(bud => bud.scale.set(1, 1, 1));
            state.animating = false;
        }
    }

    requestAnimationFrame(animStep);
}

// Regenerate plant
function regeneratePlant(animate = true) {
    const seasonConfig = seasons[state.seasonIndex];
    const lstring = lsystem.generate(state.generation);
    const { segments, buds } = buildPlant(lstring, seasonConfig);

    if (animate && segments.length > 0) {
        animateGrowth(segments, buds);
    }
}

// Fireflies
const fireflies = [];
const fireflyGroup = new THREE.Group();
scene.add(fireflyGroup);

function createFireflies() {
    for (let i = 0; i < 20; i++) {
        const geo = new THREE.SphereGeometry(0.03, 6, 6);
        const mat = new THREE.MeshStandardMaterial({
            color: '#ffff44',
            emissive: '#ffff44',
            emissiveIntensity: 2.0,
            transparent: true,
            opacity: 0.8
        });
        const mesh = new THREE.Mesh(geo, mat);

        // Random starting position around diorama
        const angle = Math.random() * Math.PI * 2;
        const radius = 1 + Math.random() * 3;
        const height = 0.5 + Math.random() * 4;
        mesh.position.set(
            Math.cos(angle) * radius,
            height,
            Math.sin(angle) * radius
        );

        // Add a point light for glow
        const light = new THREE.PointLight(0xffff44, 0.1, 2);
        mesh.add(light);

        mesh.userData = {
            baseAngle: angle,
            radius: radius,
            baseHeight: height,
            speed: 0.2 + Math.random() * 0.5,
            phaseX: Math.random() * Math.PI * 2,
            phaseY: Math.random() * Math.PI * 2,
            phaseZ: Math.random() * Math.PI * 2,
            ampX: 0.3 + Math.random() * 0.5,
            ampY: 0.2 + Math.random() * 0.3,
            ampZ: 0.3 + Math.random() * 0.5
        };

        fireflies.push(mesh);
        fireflyGroup.add(mesh);
    }
}

createFireflies();

function updateFireflies(time) {
    fireflies.forEach(ff => {
        const d = ff.userData;
        const t = time * d.speed;
        ff.position.x = Math.cos(d.baseAngle + t * 0.5) * d.radius + Math.sin(t + d.phaseX) * d.ampX;
        ff.position.y = d.baseHeight + Math.sin(t * 0.7 + d.phaseY) * d.ampY;
        ff.position.z = Math.sin(d.baseAngle + t * 0.5) * d.radius + Math.cos(t * 0.8 + d.phaseZ) * d.ampZ;

        // Pulsing glow
        const pulse = 0.5 + 0.5 * Math.sin(t * 3 + d.phaseX);
        ff.material.emissiveIntensity = 1.0 + pulse * 2.0;
        ff.material.opacity = 0.4 + pulse * 0.6;
    });
}

// UI updates
function updateDisplays() {
    document.getElementById('genDisplay').textContent = `Generation: ${state.generation}`;
    document.getElementById('seasonDisplay').textContent = `Season: ${state.season}`;
    document.getElementById('segmentDisplay').textContent = `Segments: ${state.segmentCount}`;
}

// Button handlers
function grow() {
    if (state.animating) return;
    if (state.generation < state.maxGeneration) {
        state.generation++;
        regeneratePlant(true);
    }
}

function reset() {
    if (state.animating) return;
    state.generation = 0;
    regeneratePlant(true);
}

function cycleSeason() {
    state.seasonIndex = (state.seasonIndex + 1) % 4;
    state.season = seasons[state.seasonIndex].name;
    const sc = seasons[state.seasonIndex];

    // Update lights
    dirLight.color.set(sc.lightColor);
    dirLight.intensity = sc.lightIntensity;
    state.lightIntensity = sc.lightIntensity;
    ambientLight.color.set(sc.ambientColor);

    // Regenerate plant with new colors
    regeneratePlant(false);
    updateDisplays();
}

function toggleFireflies() {
    state.firefliesVisible = !state.firefliesVisible;
    fireflyGroup.visible = state.firefliesVisible;
    document.getElementById('firefliesToggle').checked = state.firefliesVisible;
}

document.getElementById('growBtn').addEventListener('click', grow);
document.getElementById('resetBtn').addEventListener('click', reset);
document.getElementById('seasonBtn').addEventListener('click', cycleSeason);
document.getElementById('firefliesToggle').addEventListener('change', (e) => {
    state.firefliesVisible = e.target.checked;
    fireflyGroup.visible = state.firefliesVisible;
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    const key = e.key.toUpperCase();
    if (key === 'G') grow();
    else if (key === 'R') reset();
    else if (key === 'S') cycleSeason();
    else if (key === 'F') toggleFireflies();
});

// Load GLB model
const loader = new GLTFLoader();

// Create a fallback base in case model doesn't load
function createFallbackBase() {
    const baseGeo = new THREE.CylinderGeometry(2, 2.2, 0.3, 32);
    const baseMat = new THREE.MeshStandardMaterial({ color: '#4a3520', roughness: 0.9 });
    const baseMesh = new THREE.Mesh(baseGeo, baseMat);
    baseMesh.receiveShadow = true;
    baseMesh.castShadow = true;
    baseMesh.position.y = 0.15;
    scene.add(baseMesh);

    // Table top
    const tableGeo = new THREE.BoxGeometry(4, 0.1, 4);
    const tableMat = new THREE.MeshStandardMaterial({ color: '#3a2510', roughness: 0.85 });
    const tableMesh = new THREE.Mesh(tableGeo, tableMat);
    tableMesh.receiveShadow = true;
    tableMesh.position.y = 0;
    scene.add(tableMesh);

    modelTopY = 0.3;
    state.modelLoaded = true;
    createPot();
    regeneratePlant(false);
}

// Ground plane for shadows
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({ color: '#1a0f0a', roughness: 1.0 });
const groundMesh = new THREE.Mesh(groundGeo, groundMat);
groundMesh.rotation.x = -Math.PI / 2;
groundMesh.position.y = -0.01;
groundMesh.receiveShadow = true;
scene.add(groundMesh);

loader.load(
    'https://threejs.org/examples/models/gltf/ABeautifulGame.glb',
    (gltf) => {
        const model = gltf.scene;
        model.scale.set(0.02, 0.02, 0.02);
        model.position.set(0, 0, 0);

        // Enable shadows
        model.traverse(child => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });

        scene.add(model);

        // Calculate bounding box to find top
        const box = new THREE.Box3().setFromObject(model);
        modelTopY = box.max.y;

        state.modelLoaded = true;
        createPot();
        regeneratePlant(false);
    },
    undefined,
    (error) => {
        console.warn('Failed to load GLB model, using fallback base:', error);
        createFallbackBase();
    }
);

// If model doesn't load within 5 seconds, use fallback
setTimeout(() => {
    if (!state.modelLoaded) {
        console.warn('Model load timeout, using fallback');
        createFallbackBase();
    }
}, 5000);

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const time = clock.getElapsedTime();

    controls.update();

    // Update fireflies
    if (state.firefliesVisible) {
        updateFireflies(time);
    }

    // Gentle sway on plant
    if (plantGroup.children.length > 0 && !state.animating) {
        plantGroup.rotation.z = Math.sin(time * 0.5) * 0.01;
        plantGroup.rotation.x = Math.cos(time * 0.3) * 0.005;
    }

    renderer.render(scene, camera);
}

animate();

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

updateDisplays();
</script>
</body>
</html>
