<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pendulum Wave Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: auto;
            z-index: 10;
            min-width: 200px;
        }
        .ui-row {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .ui-row:last-child {
            margin-bottom: 0;
        }
        button {
            background: #444;
            color: white;
            border: 1px solid #666;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            flex: 1;
            margin: 0 5px;
        }
        button:hover {
            background: #555;
        }
        button:first-child {
            margin-left: 0;
        }
        button:last-child {
            margin-right: 0;
        }
        input[type=range] {
            width: 100px;
        }
        .info-text {
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-panel">
        <div class="ui-row">
            <button id="btn-play">Start</button>
            <button id="btn-reset">Reset</button>
        </div>
        <div class="ui-row">
            <label id="lbl-speed" for="slider-speed">Speed: 1.0x</label>
            <input type="range" id="slider-speed" min="0.5" max="3.0" step="0.1" value="1.0">
        </div>
        <div class="info-text" id="txt-time">Time: 0.00s</div>
        <div class="info-text" id="txt-phase">Phase: Aligned</div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            running: false,
            elapsedTime: 0,
            speedMultiplier: 1.0,
            pendulumCount: 15,
            angles: new Array(15).fill(0.4),
            lengths: [],
            maxAngle: 0.4,
            phaseAligned: true,
            resetCount: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.update();

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 15, 10);
        scene.add(directionalLight);

        // --- Environment ---
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -2;
        scene.add(ground);

        const barGeo = new THREE.BoxGeometry(18, 0.3, 0.3);
        const barMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const bar = new THREE.Mesh(barGeo, barMat);
        bar.position.y = 10;
        scene.add(bar);

        // --- Pendulums ---
        const pendulums = [];
        const periods = [];
        const g = 9.81;
        const maxAngle = window.__3D_STATE__.maxAngle;

        for (let i = 0; i < 15; i++) {
            // Physics calculations
            const period = 60 / (15 + i);
            const length = g * Math.pow(period / (2 * Math.PI), 2);
            
            periods.push(period);
            window.__3D_STATE__.lengths.push(length);

            // Position
            const x = -7 + i * (14 / 14); // Spaced from -7 to 7

            // Group acts as the pivot point
            const group = new THREE.Group();
            group.position.set(x, 10, 0);

            // String
            const stringGeo = new THREE.CylinderGeometry(0.02, 0.02, length);
            stringGeo.translate(0, -length / 2, 0); // Shift so top is at origin
            const stringMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const string = new THREE.Mesh(stringGeo, stringMat);

            // Bob
            const bobGeo = new THREE.SphereGeometry(0.3, 32, 32);
            const bobMat = new THREE.MeshStandardMaterial();
            // Rainbow gradient: Hue 0 (red) to 270 (violet)
            const hue = (i / 14) * (270 / 360);
            bobMat.color.setHSL(hue, 1.0, 0.5);
            const bob = new THREE.Mesh(bobGeo, bobMat);
            bob.position.y = -length;

            group.add(string);
            group.add(bob);
            
            // Initial rotation
            group.rotation.z = maxAngle;
            
            scene.add(group);
            pendulums.push(group);
        }

        // --- UI Elements & Interaction ---
        const btnPlay = document.getElementById('btn-play');
        const btnReset = document.getElementById('btn-reset');
        const sliderSpeed = document.getElementById('slider-speed');
        const lblSpeed = document.getElementById('lbl-speed');
        const txtTime = document.getElementById('txt-time');
        const txtPhase = document.getElementById('txt-phase');

        function togglePlay() {
            window.__3D_STATE__.running = !window.__3D_STATE__.running;
            btnPlay.innerText = window.__3D_STATE__.running ? 'Pause' : 'Start';
        }

        function resetSimulation() {
            window.__3D_STATE__.elapsedTime = 0;
            window.__3D_STATE__.resetCount++;
            
            // Force update positions immediately
            for (let i = 0; i < 15; i++) {
                pendulums[i].rotation.z = maxAngle;
                window.__3D_STATE__.angles[i] = maxAngle;
            }
            window.__3D_STATE__.phaseAligned = true;
            updateUI();
        }

        btnPlay.addEventListener('click', togglePlay);
        btnReset.addEventListener('click', resetSimulation);

        sliderSpeed.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            window.__3D_STATE__.speedMultiplier = val;
            lblSpeed.innerText = `Speed: ${val.toFixed(1)}x`;
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                togglePlay();
            } else if (e.key === 'r' || e.key === 'R') {
                resetSimulation();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function updateUI() {
            txtTime.innerText = `Time: ${window.__3D_STATE__.elapsedTime.toFixed(2)}s`;
            txtPhase.innerText = window.__3D_STATE__.phaseAligned ? 'Phase: Aligned' : 'Phase: Dispersed';
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (window.__3D_STATE__.running) {
                window.__3D_STATE__.elapsedTime += delta * window.__3D_STATE__.speedMultiplier;
                
                const t = window.__3D_STATE__.elapsedTime;
                let minAngle = Infinity;
                let maxAngleVal = -Infinity;

                for (let i = 0; i < 15; i++) {
                    // theta(t) = maxAngle * cos(2*PI*t / period_i)
                    const theta = maxAngle * Math.cos(2 * Math.PI * t / periods[i]);
                    
                    pendulums[i].rotation.z = theta;
                    window.__3D_STATE__.angles[i] = theta;

                    if (theta < minAngle) minAngle = theta;
                    if (theta > maxAngleVal) maxAngleVal = theta;
                }

                window.__3D_STATE__.phaseAligned = (maxAngleVal - minAngle) <= 0.15;
                updateUI();
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize UI state
        updateUI();
        animate();
    </script>
</body>
</html>
