<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Pendulum Wave Simulation</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    canvas {
        display: block;
    }
    #controlPanel {
        position: absolute;
        top: 15px;
        left: 15px;
        background: rgba(0, 0, 0, 0.75);
        color: white;
        padding: 18px 22px;
        border-radius: 10px;
        z-index: 100;
        min-width: 220px;
        backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    #controlPanel h3 {
        margin: 0 0 12px 0;
        font-size: 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        padding-bottom: 8px;
    }
    #controlPanel button {
        padding: 8px 18px;
        margin: 4px 6px 4px 0;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: background 0.2s;
    }
    #startBtn {
        background: #4CAF50;
        color: white;
    }
    #startBtn:hover {
        background: #45a049;
    }
    #startBtn.paused {
        background: #ff9800;
    }
    #startBtn.paused:hover {
        background: #e68a00;
    }
    #resetBtn {
        background: #f44336;
        color: white;
    }
    #resetBtn:hover {
        background: #da190b;
    }
    .slider-container {
        margin: 12px 0 8px 0;
    }
    #speedSlider {
        width: 100%;
        margin-top: 4px;
        accent-color: #4CAF50;
    }
    #speedLabel, #timeDisplay, #phaseDisplay {
        font-size: 14px;
        margin: 6px 0;
    }
    #phaseDisplay.aligned {
        color: #4CAF50;
    }
    #phaseDisplay.dispersed {
        color: #ff9800;
    }
    .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 4px 0;
    }
</style>
</head>
<body>

<div id="controlPanel">
    <h3>🎵 Pendulum Wave</h3>
    <div>
        <button id="startBtn">Start</button>
        <button id="resetBtn">Reset</button>
    </div>
    <div class="slider-container">
        <label id="speedLabel">Speed: 1.0x</label>
        <input type="range" id="speedSlider" min="0.5" max="3.0" step="0.1" value="1.0">
    </div>
    <div id="timeDisplay">Time: 0.00s</div>
    <div id="phaseDisplay" class="dispersed">Phase: Dispersed</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
(function() {
    // Constants
    const PENDULUM_COUNT = 15;
    const MAX_ANGLE = 0.4;
    const G = 9.81;
    const TOTAL_TIME = 60;
    const PHASE_THRESHOLD = 0.15;

    // Compute lengths and periods
    const periods = [];
    const lengths = [];
    for (let i = 0; i < PENDULUM_COUNT; i++) {
        const oscillations = 15 + i;
        const period = TOTAL_TIME / oscillations;
        periods.push(period);
        const length = G * Math.pow(period / (2 * Math.PI), 2);
        lengths.push(length);
    }

    // State
    const state = {
        running: false,
        elapsedTime: 0,
        speedMultiplier: 1.0,
        pendulumCount: PENDULUM_COUNT,
        angles: new Array(PENDULUM_COUNT).fill(MAX_ANGLE),
        lengths: [...lengths],
        maxAngle: MAX_ANGLE,
        phaseAligned: false,
        resetCount: 0
    };
    window.__3D_STATE__ = state;

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 30, 60);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 15, 10);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.width = 2048;
    directionalLight.shadow.mapSize.height = 2048;
    directionalLight.shadow.camera.near = 0.5;
    directionalLight.shadow.camera.far = 50;
    directionalLight.shadow.camera.left = -15;
    directionalLight.shadow.camera.right = 15;
    directionalLight.shadow.camera.top = 15;
    directionalLight.shadow.camera.bottom = -5;
    scene.add(directionalLight);

    // OrbitControls
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 4, 0);
    controls.update();

    // Support bar
    const barGeometry = new THREE.BoxGeometry(18, 0.3, 0.3);
    const barMaterial = new THREE.MeshPhongMaterial({ color: 0x333333 });
    const bar = new THREE.Mesh(barGeometry, barMaterial);
    bar.position.set(0, 10, 0);
    bar.castShadow = true;
    bar.receiveShadow = true;
    scene.add(bar);

    // Ground plane
    const groundGeometry = new THREE.PlaneGeometry(30, 30);
    const groundMaterial = new THREE.MeshPhongMaterial({ color: 0x555555, side: THREE.DoubleSide });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Grid helper on ground
    const gridHelper = new THREE.GridHelper(30, 30, 0x444444, 0x333333);
    gridHelper.position.y = -1.99;
    scene.add(gridHelper);

    // Pendulums
    const pendulums = [];
    const xPositions = [];
    for (let i = 0; i < PENDULUM_COUNT; i++) {
        const t = i / (PENDULUM_COUNT - 1);
        const x = -7 + 14 * t;
        xPositions.push(x);
    }

    for (let i = 0; i < PENDULUM_COUNT; i++) {
        const pivotX = xPositions[i];
        const pivotY = 10;
        const len = lengths[i];

        // Hue from 0 (red) to 270 (violet)
        const hue = (i / (PENDULUM_COUNT - 1)) * 270;
        const color = new THREE.Color();
        color.setHSL(hue / 360, 0.9, 0.55);

        // Group for pendulum
        const group = new THREE.Group();
        group.position.set(pivotX, pivotY, 0);

        // String (cylinder)
        const stringGeometry = new THREE.CylinderGeometry(0.02, 0.02, len, 8);
        const stringMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff });
        const string = new THREE.Mesh(stringGeometry, stringMaterial);
        string.position.set(0, -len / 2, 0);
        group.add(string);

        // Bob (sphere)
        const bobGeometry = new THREE.SphereGeometry(0.3, 32, 32);
        const bobMaterial = new THREE.MeshPhongMaterial({
            color: color,
            shininess: 80,
            specular: 0x444444
        });
        const bob = new THREE.Mesh(bobGeometry, bobMaterial);
        bob.position.set(0, -len, 0);
        bob.castShadow = true;
        group.add(bob);

        scene.add(group);

        pendulums.push({
            group: group,
            string: string,
            bob: bob,
            length: len,
            period: periods[i],
            pivotX: pivotX,
            pivotY: pivotY,
            stringGeometry: stringGeometry
        });
    }

    // UI Elements
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const speedSlider = document.getElementById('speedSlider');
    const speedLabel = document.getElementById('speedLabel');
    const timeDisplay = document.getElementById('timeDisplay');
    const phaseDisplay = document.getElementById('phaseDisplay');

    function updatePendulumVisuals() {
        for (let i = 0; i < PENDULUM_COUNT; i++) {
            const p = pendulums[i];
            const angle = state.angles[i];

            // Reset group rotation (swing in XZ plane relative to group, but we want XY plane)
            // The pendulum swings in the XY plane: angle is rotation around Z axis
            p.group.rotation.z = angle;
        }
    }

    function computeAngles(time) {
        for (let i = 0; i < PENDULUM_COUNT; i++) {
            const angle = MAX_ANGLE * Math.cos(2 * Math.PI * time / periods[i]);
            state.angles[i] = angle;
        }
    }

    function checkPhaseAlignment() {
        const angles = state.angles;
        let minAngle = Infinity;
        let maxAngle = -Infinity;
        for (let i = 0; i < PENDULUM_COUNT; i++) {
            if (angles[i] < minAngle) minAngle = angles[i];
            if (angles[i] > maxAngle) maxAngle = angles[i];
        }
        state.phaseAligned = (maxAngle - minAngle) <= PHASE_THRESHOLD;
    }

    function resetSimulation() {
        state.elapsedTime = 0;
        state.resetCount++;
        computeAngles(0);
        updatePendulumVisuals();
        updateUI();
    }

    function toggleRunning() {
        state.running = !state.running;
        startBtn.textContent = state.running ? 'Pause' : 'Start';
        if (state.running) {
            startBtn.classList.add('paused');
        } else {
            startBtn.classList.remove('paused');
        }
    }

    function updateUI() {
        timeDisplay.textContent = 'Time: ' + state.elapsedTime.toFixed(2) + 's';
        checkPhaseAlignment();
        if (state.phaseAligned) {
            phaseDisplay.textContent = 'Phase: Aligned';
            phaseDisplay.className = 'aligned';
        } else {
            phaseDisplay.textContent = 'Phase: Dispersed';
            phaseDisplay.className = 'dispersed';
        }
    }

    // Event listeners
    startBtn.addEventListener('click', toggleRunning);
    resetBtn.addEventListener('click', resetSimulation);

    speedSlider.addEventListener('input', function() {
        state.speedMultiplier = parseFloat(this.value);
        speedLabel.textContent = 'Speed: ' + state.speedMultiplier.toFixed(1) + 'x';
    });

    document.addEventListener('keydown', function(e) {
        if (e.code === 'Space') {
            e.preventDefault();
            toggleRunning();
        } else if (e.code === 'KeyR') {
            resetSimulation();
        }
    });

    window.addEventListener('resize', function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Initialize
    computeAngles(0);
    updatePendulumVisuals();
    updateUI();

    // Animation loop
    let lastTime = null;

    function animate(timestamp) {
        requestAnimationFrame(animate);

        if (lastTime === null) {
            lastTime = timestamp;
        }

        const deltaMs = timestamp - lastTime;
        lastTime = timestamp;

        if (state.running) {
            const deltaSec = (deltaMs / 1000) * state.speedMultiplier;
            state.elapsedTime += deltaSec;

            computeAngles(state.elapsedTime);
            updatePendulumVisuals();
        }

        updateUI();
        controls.update();
        renderer.render(scene, camera);
    }

    requestAnimationFrame(animate);
})();
</script>
</body>
</html>
