<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Pendulum Wave Simulation</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(20, 20, 20, 0.75);
      color: white;
      padding: 12px 14px;
      border-radius: 8px;
      min-width: 220px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    }

    #ui .row {
      margin-bottom: 10px;
    }

    #ui button {
      margin-right: 8px;
      padding: 7px 12px;
      border: none;
      border-radius: 4px;
      background: #2f2f2f;
      color: white;
      cursor: pointer;
    }

    #ui button:hover {
      background: #454545;
    }

    #ui input[type="range"] {
      width: 180px;
      vertical-align: middle;
    }

    #info {
      line-height: 1.5;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="row">
      <button id="startPauseBtn">Start</button>
      <button id="resetBtn">Reset</button>
    </div>
    <div class="row">
      <label id="speedLabel" for="speedSlider">Speed: 1.0x</label><br />
      <input id="speedSlider" type="range" min="0.5" max="3.0" step="0.1" value="1.0" />
    </div>
    <div id="info">
      <div id="timeDisplay">Time: 0.00s</div>
      <div id="phaseDisplay">Phase: Aligned</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 4, 0);
    controls.enableDamping = true;

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 15, 10);
    scene.add(directionalLight);

    // Ground
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshStandardMaterial({ color: 0x666666, side: THREE.DoubleSide })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -2;
    scene.add(ground);

    // Support bar
    const supportBar = new THREE.Mesh(
      new THREE.BoxGeometry(18, 0.3, 0.3),
      new THREE.MeshStandardMaterial({ color: 0x333333 })
    );
    supportBar.position.set(0, 10, 0);
    scene.add(supportBar);

    // Physics/setup constants
    const pendulumCount = 15;
    const g = 9.81;
    const maxAngle = 0.4;
    const supportY = 10;
    const xStart = -7;
    const xEnd = 7;

    const pendulums = [];
    const lengths = [];
    const periods = [];
    const angles = new Array(pendulumCount).fill(maxAngle);

    // Shared geometries/materials
    const bobGeometry = new THREE.SphereGeometry(0.3, 32, 32);
    const stringGeometry = new THREE.CylinderGeometry(0.02, 0.02, 1, 12, 1, false);
    const whiteStringMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });

    for (let i = 0; i < pendulumCount; i++) {
      const x = xStart + (i / (pendulumCount - 1)) * (xEnd - xStart);
      const period = 60 / (15 + i);
      const length = g * Math.pow(period / (2 * Math.PI), 2);

      periods.push(period);
      lengths.push(length);

      const hueDeg = (270 * i) / (pendulumCount - 1);
      const bobColor = new THREE.Color();
      bobColor.setHSL(hueDeg / 360, 1.0, 0.5);

      const pivot = new THREE.Group();
      pivot.position.set(x, supportY, 0);
      scene.add(pivot);

      const arm = new THREE.Group();
      pivot.add(arm);

      const string = new THREE.Mesh(stringGeometry, whiteStringMaterial);
      string.position.set(0, -length / 2, 0);
      string.scale.y = length;
      arm.add(string);

      const bob = new THREE.Mesh(
        bobGeometry,
        new THREE.MeshStandardMaterial({ color: bobColor })
      );
      bob.position.set(0, -length, 0);
      arm.add(bob);

      pendulums.push({
        pivot,
        arm,
        string,
        bob,
        x,
        length,
        period
      });
    }

    // UI
    const startPauseBtn = document.getElementById("startPauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const speedSlider = document.getElementById("speedSlider");
    const speedLabel = document.getElementById("speedLabel");
    const timeDisplay = document.getElementById("timeDisplay");
    const phaseDisplay = document.getElementById("phaseDisplay");

    // State
    let running = false;
    let elapsedTime = 0;
    let speedMultiplier = parseFloat(speedSlider.value);
    let phaseAligned = true;
    let resetCount = 0;

    window.__3D_STATE__ = {
      running,
      elapsedTime,
      speedMultiplier,
      pendulumCount,
      angles: [...angles],
      lengths: [...lengths],
      maxAngle,
      phaseAligned,
      resetCount
    };

    function updateState() {
      window.__3D_STATE__.running = running;
      window.__3D_STATE__.elapsedTime = elapsedTime;
      window.__3D_STATE__.speedMultiplier = speedMultiplier;
      window.__3D_STATE__.pendulumCount = pendulumCount;
      window.__3D_STATE__.angles = [...angles];
      window.__3D_STATE__.lengths = [...lengths];
      window.__3D_STATE__.maxAngle = maxAngle;
      window.__3D_STATE__.phaseAligned = phaseAligned;
      window.__3D_STATE__.resetCount = resetCount;
    }

    function computePhaseAligned() {
      let minA = Infinity;
      let maxA = -Infinity;
      for (let i = 0; i < angles.length; i++) {
        if (angles[i] < minA) minA = angles[i];
        if (angles[i] > maxA) maxA = angles[i];
      }
      return (maxA - minA) <= 0.15;
    }

    function updatePendulums() {
      for (let i = 0; i < pendulumCount; i++) {
        const theta = maxAngle * Math.cos((2 * Math.PI * elapsedTime) / periods[i]);
        angles[i] = theta;
        // Swing in XY plane => rotate around Z axis
        pendulums[i].arm.rotation.z = theta;
      }

      phaseAligned = computePhaseAligned();

      timeDisplay.textContent = `Time: ${elapsedTime.toFixed(2)}s`;
      phaseDisplay.textContent = `Phase: ${phaseAligned ? "Aligned" : "Dispersed"}`;
      updateState();
    }

    function resetSimulation() {
      elapsedTime = 0;
      resetCount += 1;
      for (let i = 0; i < pendulumCount; i++) {
        angles[i] = maxAngle;
        pendulums[i].arm.rotation.z = maxAngle;
      }
      phaseAligned = computePhaseAligned();
      timeDisplay.textContent = `Time: ${elapsedTime.toFixed(2)}s`;
      phaseDisplay.textContent = `Phase: ${phaseAligned ? "Aligned" : "Dispersed"}`;
      updateState();
    }

    function toggleRunning() {
      running = !running;
      startPauseBtn.textContent = running ? "Pause" : "Start";
      updateState();
    }

    startPauseBtn.addEventListener("click", toggleRunning);

    resetBtn.addEventListener("click", () => {
      resetSimulation();
    });

    speedSlider.addEventListener("input", () => {
      speedMultiplier = parseFloat(speedSlider.value);
      speedLabel.textContent = `Speed: ${speedMultiplier.toFixed(1)}x`;
      updateState();
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        toggleRunning();
      } else if (e.key === "r" || e.key === "R") {
        resetSimulation();
      }
    });

    // Initialize positions while paused
    resetSimulation();

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (running) {
        elapsedTime += delta * speedMultiplier;
      }

      updatePendulums();
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
