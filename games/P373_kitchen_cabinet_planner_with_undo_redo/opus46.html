<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Kitchen Cabinet Planner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: Arial, sans-serif; }
  canvas { display: block; }

  #toolbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    background: rgba(30, 30, 30, 0.92);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 100;
    flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  #toolbar button {
    padding: 8px 14px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: white;
    transition: opacity 0.2s, transform 0.1s;
  }

  #toolbar button:hover:not(:disabled) {
    opacity: 0.85;
    transform: translateY(-1px);
  }

  #toolbar button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  #btn-base { background: #8B4513; }
  #btn-wall { background: #654321; }
  #btn-tall { background: #A0522D; }
  #btn-counter { background: #555; }
  #btn-undo { background: #2196F3; }
  #btn-redo { background: #2196F3; }
  #btn-delete { background: #e53935; }
  #btn-clear { background: #ff6f00; }

  .separator {
    width: 1px;
    height: 30px;
    background: rgba(255,255,255,0.2);
    margin: 0 4px;
  }

  #info-panel {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: rgba(20, 20, 20, 0.88);
    color: #eee;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.7;
    z-index: 100;
    min-width: 240px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  #info-panel .label {
    color: #aaa;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  #info-panel .value {
    color: #fff;
    font-weight: 600;
  }

  #placement-hint {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(33, 150, 243, 0.9);
    color: white;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 100;
    display: none;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="toolbar">
  <button id="btn-base">Add Base</button>
  <button id="btn-wall">Add Wall</button>
  <button id="btn-tall">Add Tall</button>
  <button id="btn-counter">Add Counter</button>
  <div class="separator"></div>
  <button id="btn-undo" disabled>Undo</button>
  <button id="btn-redo" disabled>Redo</button>
  <div class="separator"></div>
  <button id="btn-delete">Delete Selected</button>
  <button id="btn-clear">Clear All</button>
</div>

<div id="placement-hint">Click on the floor near the back wall to place cabinet</div>

<div id="info-panel">
  <div><span class="label">Cabinets: </span><span class="value" id="info-count">0</span></div>
  <div><span class="label">Selected: </span><span class="value" id="info-selected">None</span></div>
  <div><span class="label">Undo Stack: </span><span class="value" id="info-undo">0</span></div>
  <div><span class="label">Redo Stack: </span><span class="value" id="info-redo">0</span></div>
  <div><span class="label">Last Action: </span><span class="value" id="info-action">none</span></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 7);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// Floor
const floorGeom = new THREE.PlaneGeometry(20, 20);
const floorCanvas = document.createElement('canvas');
floorCanvas.width = 512;
floorCanvas.height = 512;
const fctx = floorCanvas.getContext('2d');
fctx.fillStyle = '#d0d0d0';
fctx.fillRect(0, 0, 512, 512);
fctx.strokeStyle = '#bbb';
fctx.lineWidth = 2;
for (let i = 0; i <= 16; i++) {
  const p = (i / 16) * 512;
  fctx.beginPath(); fctx.moveTo(p, 0); fctx.lineTo(p, 512); fctx.stroke();
  fctx.beginPath(); fctx.moveTo(0, p); fctx.lineTo(512, p); fctx.stroke();
}
const floorTex = new THREE.CanvasTexture(floorCanvas);
floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
const floorMat = new THREE.MeshStandardMaterial({ map: floorTex });
const floor = new THREE.Mesh(floorGeom, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = 0;
floor.receiveShadow = true;
floor.name = 'floor';
scene.add(floor);

// Walls
const wallColor = 0xF5F0E1;
const wallMat = new THREE.MeshStandardMaterial({ color: wallColor, side: THREE.DoubleSide });

const backWall = new THREE.Mesh(new THREE.PlaneGeometry(20, 6), wallMat);
backWall.position.set(0, 3, -5);
backWall.receiveShadow = true;
backWall.name = 'wall';
scene.add(backWall);

const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(10, 6), wallMat);
leftWall.position.set(-10, 3, 0);
leftWall.rotation.y = Math.PI / 2;
leftWall.receiveShadow = true;
leftWall.name = 'wall';
scene.add(leftWall);

const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(10, 6), wallMat);
rightWall.position.set(10, 3, 0);
rightWall.rotation.y = -Math.PI / 2;
rightWall.receiveShadow = true;
rightWall.name = 'wall';
scene.add(rightWall);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 1.5, -2);
controls.update();

// --- Cabinet Definitions ---
const CABINET_DEFS = {
  base:    { w: 1, h: 1, d: 0.6, color: 0x8B4513, y: 0.5, z: -4.5 },
  wall:    { w: 1, h: 0.8, d: 0.4, color: 0x654321, y: 3.5, z: -4.5 },
  tall:    { w: 0.8, h: 2, d: 0.6, color: 0xA0522D, y: 1.0, z: -4.5 },
  counter: { w: 1.2, h: 0.1, d: 0.65, color: 0x333333, y: 1.05, z: -4.45 }
};

// --- State ---
let cabinets = []; // { mesh, type, gridX, data }
let selectedIndex = -1;
let undoStack = [];
let redoStack = [];
let placementMode = null;
let nextPlacementX = { base: -4, wall: -4, tall: -4, counter: -4 };

window.__3D_STATE__ = {
  cabinetCount: 0,
  selectedIndex: -1,
  undoStackSize: 0,
  redoStackSize: 0,
  lastAction: 'none',
  cabinetTypes: [],
  nefertitiLoaded: false,
  cameraPosition: { x: 0, y: 5, z: 10 },
  selectedType: ''
};

function updateState(action) {
  window.__3D_STATE__.cabinetCount = cabinets.length;
  window.__3D_STATE__.selectedIndex = selectedIndex;
  window.__3D_STATE__.undoStackSize = undoStack.length;
  window.__3D_STATE__.redoStackSize = redoStack.length;
  window.__3D_STATE__.lastAction = action || window.__3D_STATE__.lastAction;
  window.__3D_STATE__.cabinetTypes = cabinets.map(c => c.type);
  window.__3D_STATE__.cameraPosition = {
    x: camera.position.x,
    y: camera.position.y,
    z: camera.position.z
  };
  window.__3D_STATE__.selectedType = selectedIndex >= 0 && cabinets[selectedIndex]
    ? cabinets[selectedIndex].type : '';
  updateUI();
}

function updateUI() {
  document.getElementById('info-count').textContent = cabinets.length;
  document.getElementById('info-selected').textContent =
    selectedIndex >= 0 ? `${cabinets[selectedIndex].type} (#${selectedIndex})` : 'None';
  document.getElementById('info-undo').textContent = undoStack.length;
  document.getElementById('info-redo').textContent = redoStack.length;
  document.getElementById('info-action').textContent = window.__3D_STATE__.lastAction;

  document.getElementById('btn-undo').disabled = undoStack.length === 0;
  document.getElementById('btn-redo').disabled = redoStack.length === 0;
}

// --- Cabinet Creation ---
function createCabinetMesh(type) {
  const def = CABINET_DEFS[type];
  const geom = new THREE.BoxGeometry(def.w, def.h, def.d);
  const mat = new THREE.MeshStandardMaterial({ color: def.color });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;

  const edges = new THREE.EdgesGeometry(geom);
  const lineMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 1 });
  const lineSegments = new THREE.LineSegments(edges, lineMat);
  mesh.add(lineSegments);

  return mesh;
}

function snapToGrid(x) {
  return Math.round(Math.max(-8, Math.min(8, x)));
}

function placeCabinet(type, gridX, addToUndo = true) {
  const def = CABINET_DEFS[type];
  const mesh = createCabinetMesh(type);
  mesh.position.set(gridX, def.y, def.z);
  scene.add(mesh);

  const cabinetData = { mesh, type, gridX, data: { type, gridX } };
  cabinets.push(cabinetData);
  mesh.userData.cabinetIndex = cabinets.length - 1;

  if (addToUndo) {
    undoStack.push({ action: 'add', data: { type, gridX, index: cabinets.length - 1 } });
    redoStack = [];
  }

  updateState('add');
  return cabinetData;
}

function removeCabinetAtIndex(index, addToUndo = true) {
  if (index < 0 || index >= cabinets.length) return null;
  const cab = cabinets[index];
  scene.remove(cab.mesh);
  cab.mesh.geometry.dispose();
  cab.mesh.material.dispose();

  const removedData = { type: cab.type, gridX: cab.gridX, index };
  cabinets.splice(index, 1);

  // Update indices
  cabinets.forEach((c, i) => {
    c.mesh.userData.cabinetIndex = i;
  });

  if (selectedIndex === index) {
    selectedIndex = -1;
  } else if (selectedIndex > index) {
    selectedIndex--;
  }

  if (addToUndo) {
    undoStack.push({ action: 'delete', data: removedData });
    redoStack = [];
  }

  return removedData;
}

function selectCabinet(index) {
  // Deselect previous
  if (selectedIndex >= 0 && selectedIndex < cabinets.length) {
    const prev = cabinets[selectedIndex];
    prev.mesh.material.emissive.setHex(0x000000);
  }

  if (index >= 0 && index < cabinets.length) {
    selectedIndex = index;
    cabinets[index].mesh.material.emissive.setHex(0xFFFF00);
    cabinets[index].mesh.material.emissiveIntensity = 0.3;
  } else {
    selectedIndex = -1;
  }

  updateState(window.__3D_STATE__.lastAction);
}

// --- Undo/Redo ---
function undo() {
  if (undoStack.length === 0) return;
  const entry = undoStack.pop();

  if (entry.action === 'add') {
    // Find cabinet by matching type and gridX at the stored index or end
    let idx = -1;
    for (let i = cabinets.length - 1; i >= 0; i--) {
      if (cabinets[i].type === entry.data.type && cabinets[i].gridX === entry.data.gridX) {
        idx = i;
        break;
      }
    }
    if (idx >= 0) {
      const removed = removeCabinetAtIndex(idx, false);
      redoStack.push({ action: 'add', data: { type: entry.data.type, gridX: entry.data.gridX } });
    }
  } else if (entry.action === 'delete') {
    const cab = placeCabinet(entry.data.type, entry.data.gridX, false);
    redoStack.push({ action: 'delete', data: { type: entry.data.type, gridX: entry.data.gridX, index: cabinets.length - 1 } });
  } else if (entry.action === 'clear') {
    // Restore all
    const restored = [];
    entry.data.forEach(d => {
      placeCabinet(d.type, d.gridX, false);
      restored.push({ type: d.type, gridX: d.gridX });
    });
    redoStack.push({ action: 'clear', data: restored });
  }

  updateState('undo');
}

function redo() {
  if (redoStack.length === 0) return;
  const entry = redoStack.pop();

  if (entry.action === 'add') {
    placeCabinet(entry.data.type, entry.data.gridX, false);
    undoStack.push({ action: 'add', data: { type: entry.data.type, gridX: entry.data.gridX } });
  } else if (entry.action === 'delete') {
    let idx = -1;
    for (let i = cabinets.length - 1; i >= 0; i--) {
      if (cabinets[i].type === entry.data.type && cabinets[i].gridX === entry.data.gridX) {
        idx = i;
        break;
      }
    }
    if (idx >= 0) {
      const removed = removeCabinetAtIndex(idx, false);
      undoStack.push({ action: 'delete', data: { type: entry.data.type, gridX: entry.data.gridX } });
    }
  } else if (entry.action === 'clear') {
    // Clear all again
    const allData = cabinets.map(c => ({ type: c.type, gridX: c.gridX }));
    while (cabinets.length > 0) {
      removeCabinetAtIndex(cabinets.length - 1, false);
    }
    undoStack.push({ action: 'clear', data: allData });
  }

  updateState('redo');
}

function clearAll() {
  if (cabinets.length === 0) return;
  const allData = cabinets.map(c => ({ type: c.type, gridX: c.gridX }));

  while (cabinets.length > 0) {
    removeCabinetAtIndex(cabinets.length - 1, false);
  }

  undoStack.push({ action: 'clear', data: allData });
  redoStack = [];
  selectedIndex = -1;
  updateState('clear');
}

// --- Raycasting ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onCanvasClick(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Check cabinet clicks first
  const cabinetMeshes = cabinets.map(c => c.mesh);
  const cabinetHits = raycaster.intersectObjects(cabinetMeshes, false);

  if (cabinetHits.length > 0) {
    const hitMesh = cabinetHits[0].object;
    const idx = hitMesh.userData.cabinetIndex;
    if (idx !== undefined) {
      selectCabinet(idx);
      placementMode = null;
      document.getElementById('placement-hint').style.display = 'none';
      return;
    }
  }

  // Check floor/wall click for placement
  if (placementMode) {
    const planeHits = raycaster.intersectObjects([floor, backWall, leftWall, rightWall], false);
    if (planeHits.length > 0) {
      const point = planeHits[0].point;
      const gridX = snapToGrid(point.x);
      placeCabinet(placementMode, gridX);
      placementMode = null;
      document.getElementById('placement-hint').style.display = 'none';
    }
    return;
  }

  // Deselect
  selectCabinet(-1);
}

renderer.domElement.addEventListener('click', onCanvasClick);

// --- Button Handlers ---
document.getElementById('btn-base').addEventListener('click', () => {
  const x = nextPlacementX.base;
  nextPlacementX.base += 1.2;
  placeCabinet('base', snapToGrid(x));
});

document.getElementById('btn-wall').addEventListener('click', () => {
  const x = nextPlacementX.wall;
  nextPlacementX.wall += 1.2;
  placeCabinet('wall', snapToGrid(x));
});

document.getElementById('btn-tall').addEventListener('click', () => {
  const x = nextPlacementX.tall;
  nextPlacementX.tall += 1.2;
  placeCabinet('tall', snapToGrid(x));
});

document.getElementById('btn-counter').addEventListener('click', () => {
  const x = nextPlacementX.counter;
  nextPlacementX.counter += 1.2;
  placeCabinet('counter', snapToGrid(x));
});

document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-redo').addEventListener('click', redo);

document.getElementById('btn-delete').addEventListener('click', () => {
  if (selectedIndex >= 0) {
    removeCabinetAtIndex(selectedIndex);
    selectedIndex = -1;
    updateState('delete');
  }
});

document.getElementById('btn-clear').addEventListener('click', clearAll);

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'z') {
    e.preventDefault();
    undo();
  } else if (e.ctrlKey && e.key === 'y') {
    e.preventDefault();
    redo();
  } else if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedIndex >= 0) {
      removeCabinetAtIndex(selectedIndex);
      selectedIndex = -1;
      updateState('delete');
    }
  }
});

// --- Load Nefertiti ---
const loader = new GLTFLoader();
loader.load(
  'Nefertiti.glb',
  (gltf) => {
    const model = gltf.scene;
    // Calculate bounding box to scale properly
    const box = new THREE.Box3().setFromObject(model);
    const size = new THREE.Vector3();
    box.getSize(size);
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 0.5 / maxDim;
    model.scale.set(scale, scale, scale);

    // Recalculate after scaling
    const box2 = new THREE.Box3().setFromObject(model);
    const center = new THREE.Vector3();
    box2.getCenter(center);

    model.position.set(4 - center.x, 1.5 - box2.min.y, -3 - center.z);
    model.castShadow = true;
    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    scene.add(model);
    window.__3D_STATE__.nefertitiLoaded = true;
    updateState(window.__3D_STATE__.lastAction);
    console.log('Nefertiti model loaded successfully');
  },
  (progress) => {
    console.log('Loading Nefertiti:', (progress.loaded / (progress.total || 1) * 100).toFixed(1) + '%');
  },
  (error) => {
    console.warn('Could not load Nefertiti.glb:', error.message || error);
    // Place a placeholder bust instead
    const bustGroup = new THREE.Group();

    // Head (sphere)
    const headGeom = new THREE.SphereGeometry(0.12, 16, 16);
    const bustMat = new THREE.MeshStandardMaterial({ color: 0xD4A574, roughness: 0.6 });
    const head = new THREE.Mesh(headGeom, bustMat);
    head.position.y = 0.35;
    head.castShadow = true;
    bustGroup.add(head);

    // Crown
    const crownGeom = new THREE.CylinderGeometry(0.06, 0.1, 0.18, 8);
    const crown = new THREE.Mesh(crownGeom, new THREE.MeshStandardMaterial({ color: 0x1a237e, roughness: 0.4 }));
    crown.position.y = 0.5;
    crown.castShadow = true;
    bustGroup.add(crown);

    // Neck
    const neckGeom = new THREE.CylinderGeometry(0.06, 0.08, 0.12, 8);
    const neck = new THREE.Mesh(neckGeom, bustMat);
    neck.position.y = 0.2;
    neck.castShadow = true;
    bustGroup.add(neck);

    // Base/shoulders
    const baseGeom = new THREE.CylinderGeometry(0.15, 0.12, 0.15, 12);
    const base = new THREE.Mesh(baseGeom, bustMat);
    base.position.y = 0.08;
    base.castShadow = true;
    bustGroup.add(base);

    // Pedestal
    const pedGeom = new THREE.CylinderGeometry(0.1, 0.12, 0.08, 12);
    const ped = new THREE.Mesh(pedGeom, new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.3 }));
    ped.position.y = -0.02;
    ped.castShadow = true;
    bustGroup.add(ped);

    bustGroup.position.set(4, 1.5, -3);
    scene.add(bustGroup);

    window.__3D_STATE__.nefertitiLoaded = true;
    updateState(window.__3D_STATE__.lastAction);
  }
);

// --- Window Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation Loop ---
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  window.__3D_STATE__.cameraPosition = {
    x: parseFloat(camera.position.x.toFixed(2)),
    y: parseFloat(camera.position.y.toFixed(2)),
    z: parseFloat(camera.position.z.toFixed(2))
  };

  renderer.render(scene, camera);
}

updateState('none');
animate();
</script>
</body>
</html>
