<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 狐狸计时障碍跑酷</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #87ceeb;
    }
    canvas {
      display: block;
    }
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 220px;
      backdrop-filter: blur(4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      line-height: 1.8;
      font-size: 14px;
    }
    #hud .title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 6px;
      color: #ffe082;
    }
    #hud .label {
      color: #cfe8ff;
    }
    #message {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: white;
      background: rgba(0,0,0,0.45);
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 14px;
      text-align: center;
      white-space: pre-line;
    }
    #result {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: rgba(0,0,0,0.35);
    }
    #result .panel {
      background: rgba(18, 28, 39, 0.92);
      color: #fff;
      padding: 22px 28px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.16);
      text-align: center;
      min-width: 280px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }
    #result .big {
      font-size: 28px;
      font-weight: bold;
      margin: 8px 0 12px;
      color: #ffd54f;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="hud">
    <div class="title">狐狸跑酷 HUD</div>
    <div><span class="label">计时器：</span><span id="timer">00:00.00</span></div>
    <div><span class="label">已通过障碍：</span><span id="obstaclesCleared">0</span> / 10</div>
    <div><span class="label">碰撞次数：</span><span id="collisionCount">0</span></div>
    <div><span class="label">当前速度：</span><span id="speed">0.00</span></div>
    <div><span class="label">模型加载：</span><span id="loadStatus">加载中...</span></div>
  </div>

  <div id="message">↑ / W 前进，↓ / S 后退，空格跳跃
偶数位隧道会自动下蹲通过，奇数位栏杆需要跳过</div>

  <div id="result">
    <div class="panel">
      <div>通关完成！</div>
      <div class="big" id="finalTime">00:00.00</div>
      <div id="finalStats"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const hudTimer = document.getElementById('timer');
    const hudCleared = document.getElementById('obstaclesCleared');
    const hudCollision = document.getElementById('collisionCount');
    const hudSpeed = document.getElementById('speed');
    const hudLoad = document.getElementById('loadStatus');
    const resultEl = document.getElementById('result');
    const finalTimeEl = document.getElementById('finalTime');
    const finalStatsEl = document.getElementById('finalStats');

    window.__3D_STATE__ = {
      modelLoaded: false,
      timer: 0,
      obstaclesCleared: 0,
      collisions: 0,
      speed: 0,
      foxPosition: { x: 0, y: 0, z: 0 },
      isJumping: false,
      gameStarted: false,
      gameFinished: false
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 45, 140);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 300);
    camera.position.set(0, 4.5, -8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enabled = false;
    controls.target.set(0, 1, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.1);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(10, 20, -10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -40;
    dirLight.shadow.camera.right = 40;
    dirLight.shadow.camera.top = 40;
    dirLight.shadow.camera.bottom = -40;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 100;
    scene.add(dirLight);

    const world = new THREE.Group();
    scene.add(world);

    const trackLength = 100;
    const trackWidth = 8;
    const obstacleCount = 10;
    const startZ = 0;
    const endZ = trackLength;
    const laneX = 0;

    const groundMat = new THREE.MeshStandardMaterial({ color: 0x7a5a3a });
    const grassMat = new THREE.MeshStandardMaterial({ color: 0x4f8a3b });

    const track = new THREE.Mesh(new THREE.PlaneGeometry(trackWidth, trackLength), groundMat);
    track.rotation.x = -Math.PI / 2;
    track.position.set(0, 0, trackLength / 2);
    track.receiveShadow = true;
    scene.add(track);

    const leftGrass = new THREE.Mesh(new THREE.PlaneGeometry(20, trackLength), grassMat);
    leftGrass.rotation.x = -Math.PI / 2;
    leftGrass.position.set(-14, -0.01, trackLength / 2);
    leftGrass.receiveShadow = true;
    scene.add(leftGrass);

    const rightGrass = new THREE.Mesh(new THREE.PlaneGeometry(20, trackLength), grassMat);
    rightGrass.rotation.x = -Math.PI / 2;
    rightGrass.position.set(14, -0.01, trackLength / 2);
    rightGrass.receiveShadow = true;
    scene.add(rightGrass);

    function addSideDecor() {
      const trunkGeo = new THREE.CylinderGeometry(0.12, 0.18, 1, 8);
      const trunkMat = new THREE.MeshStandardMaterial({ color: 0x7b4a21 });
      const leafGeo = new THREE.SphereGeometry(0.55, 12, 12);
      const leafMat = new THREE.MeshStandardMaterial({ color: 0x2e7d32 });

      for (let z = 4; z <= 96; z += 6) {
        [-7.5, 7.5].forEach(x => {
          const tree = new THREE.Group();
          const trunk = new THREE.Mesh(trunkGeo, trunkMat);
          trunk.castShadow = true;
          trunk.position.y = 0.5;
          const leaf = new THREE.Mesh(leafGeo, leafMat);
          leaf.castShadow = true;
          leaf.position.y = 1.45;
          tree.add(trunk, leaf);
          tree.position.set(x + (Math.random() - 0.5) * 1.2, 0, z + (Math.random() - 0.5) * 1.5);
          scene.add(tree);
        });
      }

      const railMat = new THREE.MeshStandardMaterial({ color: 0xd7ccc8 });
      const postGeo = new THREE.BoxGeometry(0.08, 0.8, 0.08);
      const barGeo = new THREE.BoxGeometry(0.05, 0.05, 2.2);

      for (let z = 0; z <= 100; z += 2.2) {
        [-4.6, 4.6].forEach(x => {
          const post = new THREE.Mesh(postGeo, railMat);
          post.position.set(x, 0.4, z);
          post.castShadow = true;
          scene.add(post);
        });
        const leftBar = new THREE.Mesh(barGeo, railMat);
        leftBar.rotation.x = Math.PI / 2;
        leftBar.position.set(-4.6, 0.62, z + 1.1);
        scene.add(leftBar);

        const rightBar = leftBar.clone();
        rightBar.position.x = 4.6;
        scene.add(rightBar);
      }
    }
    addSideDecor();

    const obstacles = [];
    const obstacleSpacing = 8.5;
    const firstObstacleZ = 15;

    function createStripedMaterial(colors = [0xff3b30, 0xffffff]) {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 32;
      const ctx = canvas.getContext('2d');
      for (let i = 0; i < 8; i++) {
        ctx.fillStyle = '#' + new THREE.Color(colors[i % 2]).getHexString();
        ctx.fillRect(i * 16, 0, 16, 32);
      }
      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(1, 1);
      return new THREE.MeshStandardMaterial({ map: tex });
    }

    function createBarrier(index, z) {
      const group = new THREE.Group();
      const stripedMat = createStripedMaterial([0xff3b30, 0xffffff]);
      const sideMat = new THREE.MeshStandardMaterial({ color: 0xb71c1c });

      const leftPost = new THREE.Mesh(new THREE.BoxGeometry(0.18, 1.0, 0.18), sideMat);
      leftPost.position.set(-1.9, 0.5, 0);
      leftPost.castShadow = true;

      const rightPost = new THREE.Mesh(new THREE.BoxGeometry(0.18, 1.0, 0.18), sideMat);
      rightPost.position.set(1.9, 0.5, 0);
      rightPost.castShadow = true;

      const bar = new THREE.Mesh(new THREE.BoxGeometry(3.8, 0.18, 0.18), stripedMat);
      bar.position.set(0, 0.6, 0);
      bar.castShadow = true;

      group.add(leftPost, rightPost, bar);
      group.position.set(0, 0, z);
      scene.add(group);

      const bbox = new THREE.Box3().setFromCenterAndSize(
        new THREE.Vector3(0, 0.6, z),
        new THREE.Vector3(3.8, 0.45, 0.5)
      );

      obstacles.push({
        index,
        type: 'barrier',
        z,
        group,
        bbox,
        flashTimer: 0,
        collided: false,
        cleared: false,
        materials: [stripedMat, sideMat]
      });
    }

    function createTunnel(index, z) {
      const group = new THREE.Group();
      const blueMat = new THREE.MeshStandardMaterial({ color: 0x42a5f5 });
      const darkBlueMat = new THREE.MeshStandardMaterial({ color: 0x1565c0 });

      const leftPillar = new THREE.Mesh(new THREE.BoxGeometry(0.28, 1.4, 0.28), darkBlueMat);
      leftPillar.position.set(-1.7, 0.7, 0);
      leftPillar.castShadow = true;

      const rightPillar = new THREE.Mesh(new THREE.BoxGeometry(0.28, 1.4, 0.28), darkBlueMat);
      rightPillar.position.set(1.7, 0.7, 0);
      rightPillar.castShadow = true;

      const top = new THREE.Mesh(new THREE.BoxGeometry(3.68, 0.22, 1.4), blueMat);
      top.position.set(0, 1.15, 0);
      top.castShadow = true;

      const sideL = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.6, 1.4), blueMat);
      sideL.position.set(-1.52, 1.0, 0);
      sideL.castShadow = true;

      const sideR = sideL.clone();
      sideR.position.x = 1.52;

      group.add(leftPillar, rightPillar, top, sideL, sideR);
      group.position.set(0, 0, z);
      scene.add(group);

      const bbox = new THREE.Box3().setFromCenterAndSize(
        new THREE.Vector3(0, 0.95, z),
        new THREE.Vector3(3.7, 1.05, 1.5)
      );

      obstacles.push({
        index,
        type: 'tunnel',
        z,
        group,
        bbox,
        flashTimer: 0,
        collided: false,
        cleared: false,
        materials: [blueMat, darkBlueMat]
      });
    }

    for (let i = 1; i <= obstacleCount; i++) {
      const z = firstObstacleZ + (i - 1) * obstacleSpacing;
      if (i % 2 === 1) createBarrier(i, z);
      else createTunnel(i, z);
    }

    const loader = new GLTFLoader();
    let fox = null;
    let mixer = null;
    let actions = {};
    let activeAction = null;

    const foxRoot = new THREE.Group();
    foxRoot.position.set(laneX, 0, startZ);
    scene.add(foxRoot);

    const foxState = {
      baseScale: 0.015,
      velocityZ: 0,
      targetSpeed: 0,
      maxForwardSpeed: 8.5,
      maxBackwardSpeed: -4.5,
      acceleration: 24,
      damping: 16,
      jumpDuration: 0.6,
      jumpHeight: 1.5,
      jumpTime: 0,
      isJumping: false,
      isCrouching: false,
      currentScaleY: 1,
      targetScaleY: 1,
      bodyBox: new THREE.Box3(),
      bodySizeStanding: new THREE.Vector3(0.8, 1.2, 1.2),
      bodySizeCrouched: new THREE.Vector3(0.8, 0.6, 1.2),
      collisionCooldowns: new Map()
    };

    function playAction(name, fade = 0.2) {
      if (!actions[name]) return;
      if (activeAction === actions[name]) return;
      const next = actions[name];
      next.reset().fadeIn(fade).play();
      if (activeAction) activeAction.fadeOut(fade);
      activeAction = next;
    }

    loader.load(
      'assets/Fox.glb',
      (gltf) => {
        fox = gltf.scene;
        fox.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        fox.scale.setScalar(foxState.baseScale);
        fox.rotation.y = 0;
        fox.position.set(0, 0, 0);
        foxRoot.add(fox);

        mixer = new THREE.AnimationMixer(fox);
        gltf.animations.forEach((clip) => {
          actions[clip.name] = mixer.clipAction(clip);
        });

        if (actions['Survey']) {
          playAction('Survey', 0.1);
        } else {
          const first = Object.keys(actions)[0];
          if (first) playAction(first, 0.1);
        }

        window.__3D_STATE__.modelLoaded = true;
        hudLoad.textContent = '已加载';
      },
      undefined,
      () => {
        hudLoad.textContent = '加载失败';
      }
    );

    const keys = {
      forward: false,
      backward: false,
      jump: false
    };

    function setKey(code, pressed) {
      if (code === 'ArrowUp' || code === 'KeyW') keys.forward = pressed;
      if (code === 'ArrowDown' || code === 'KeyS') keys.backward = pressed;
      if (code === 'Space') keys.jump = pressed;
    }

    window.addEventListener('keydown', (e) => {
      if (['ArrowUp', 'ArrowDown', 'Space', 'KeyW', 'KeyS'].includes(e.code)) e.preventDefault();
      setKey(e.code, true);

      if (e.code === 'Space') {
        tryJump();
      }
    }, { passive: false });

    window.addEventListener('keyup', (e) => {
      setKey(e.code, false);
    });

    function tryJump() {
      if (!window.__3D_STATE__.modelLoaded) return;
      if (window.__3D_STATE__.gameFinished) return;
      if (foxState.isJumping) return;
      foxState.isJumping = true;
      foxState.jumpTime = 0;
      window.__3D_STATE__.isJumping = true;
      if (actions['Run']) playAction('Run', 0.08);
      else if (actions['Survey']) playAction('Survey', 0.08);
    }

    let startTime = 0;
    let finishTime = 0;
    let baseElapsed = 0;
    let penaltyTime = 0;

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      const ms = Math.floor((seconds - Math.floor(seconds)) * 100);
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}.${String(ms).padStart(2, '0')}`;
    }

    function updateHUD() {
      hudTimer.textContent = formatTime(window.__3D_STATE__.timer);
      hudCleared.textContent = String(window.__3D_STATE__.obstaclesCleared);
      hudCollision.textContent = String(window.__3D_STATE__.collisions);
      hudSpeed.textContent = window.__3D_STATE__.speed.toFixed(2);
      hudLoad.textContent = window.__3D_STATE__.modelLoaded ? '已加载' : '加载中...';
    }

    function updateState() {
      window.__3D_STATE__.foxPosition = {
        x: foxRoot.position.x,
        y: foxRoot.position.y,
        z: foxRoot.position.z
      };
      window.__3D_STATE__.speed = Math.abs(foxState.velocityZ);
      window.__3D_STATE__.isJumping = foxState.isJumping;
    }

    function flashObstacle(obstacle) {
      obstacle.flashTimer = 0.5;
      obstacle.materials.forEach(mat => {
        mat.userData.originalColor = mat.color ? mat.color.clone() : null;
        if (mat.color) mat.color.set(0xff0000);
      });
    }

    function restoreObstacle(obstacle) {
      obstacle.materials.forEach(mat => {
        if (mat.color && mat.userData.originalColor) {
          mat.color.copy(mat.userData.originalColor);
        }
      });
    }

    function registerCollision(obstacle) {
      const now = performance.now() * 0.001;
      const last = foxState.collisionCooldowns.get(obstacle.index) || -999;
      if (now - last < 0.8) return;

      foxState.collisionCooldowns.set(obstacle.index, now);
      window.__3D_STATE__.collisions += 1;
      penaltyTime += 2;
      flashObstacle(obstacle);
    }

    function updateFoxAnimation() {
      const moving = Math.abs(foxState.velocityZ) > 0.15;
      if (foxState.isJumping) {
        if (actions['Run']) playAction('Run', 0.1);
        else if (actions['Survey']) playAction('Survey', 0.1);
      } else if (moving) {
        if (actions['Run']) playAction('Run', 0.18);
        else if (actions['Walk']) playAction('Walk', 0.18);
      } else {
        if (actions['Survey']) playAction('Survey', 0.25);
        else if (actions['Walk']) playAction('Walk', 0.25);
      }

      if (activeAction) {
        const speedFactor = moving ? THREE.MathUtils.clamp(Math.abs(foxState.velocityZ) / foxState.maxForwardSpeed * 1.2, 0.7, 1.5) : 1.0;
        activeAction.timeScale = speedFactor;
      }
    }

    function updateFoxMovement(delta) {
      if (!window.__3D_STATE__.modelLoaded || window.__3D_STATE__.gameFinished) return;

      if (keys.forward) foxState.targetSpeed = foxState.maxForwardSpeed;
      else if (keys.backward) foxState.targetSpeed = foxState.maxBackwardSpeed;
      else foxState.targetSpeed = 0;

      const hasMovementInput = keys.forward || keys.backward;
      if (hasMovementInput && !window.__3D_STATE__.gameStarted) {
        window.__3D_STATE__.gameStarted = true;
        startTime = performance.now() * 0.001;
      }

      if (foxState.velocityZ < foxState.targetSpeed) {
        foxState.velocityZ = Math.min(foxState.velocityZ + foxState.acceleration * delta, foxState.targetSpeed);
      } else if (foxState.velocityZ > foxState.targetSpeed) {
        foxState.velocityZ = Math.max(foxState.velocityZ - foxState.acceleration * delta, foxState.targetSpeed);
      }

      if (!hasMovementInput && Math.abs(foxState.velocityZ) > 0) {
        const sign = Math.sign(foxState.velocityZ);
        const next = Math.abs(foxState.velocityZ) - foxState.damping * delta;
        foxState.velocityZ = next > 0 ? sign * next : 0;
      }

      foxRoot.position.z += foxState.velocityZ * delta;
      foxRoot.position.z = THREE.MathUtils.clamp(foxRoot.position.z, startZ, endZ + 5);

      if (foxState.velocityZ >= 0) foxRoot.rotation.y = 0;
      else foxRoot.rotation.y = Math.PI;

      let jumpOffset = 0;
      if (foxState.isJumping) {
        foxState.jumpTime += delta;
        const t = Math.min(foxState.jumpTime / foxState.jumpDuration, 1);
        jumpOffset = 4 * foxState.jumpHeight * t * (1 - t);
        if (t >= 1) {
          foxState.isJumping = false;
          foxState.jumpTime = 0;
        }
      }
      foxRoot.position.y = jumpOffset;

      let autoCrouch = false;
      for (const obstacle of obstacles) {
        if (obstacle.type === 'tunnel') {
          const dz = Math.abs(foxRoot.position.z - obstacle.z);
          if (dz < 1.55) {
            autoCrouch = true;
            break;
          }
        }
      }

      foxState.targetScaleY = autoCrouch ? 0.5 : 1.0;
      foxState.isCrouching = autoCrouch;
      foxState.currentScaleY = THREE.MathUtils.lerp(foxState.currentScaleY, foxState.targetScaleY, 10 * delta);

      if (fox) {
        fox.scale.set(
          foxState.baseScale,
          foxState.baseScale * foxState.currentScaleY,
          foxState.baseScale
        );
      }

      updateFoxAnimation();
    }

    function updateFoxBox() {
      const size = foxState.isCrouching ? foxState.bodySizeCrouched : foxState.bodySizeStanding;
      const center = new THREE.Vector3(
        foxRoot.position.x,
        foxRoot.position.y + size.y * 0.5,
        foxRoot.position.z
      );
      foxState.bodyBox.setFromCenterAndSize(center, size);
    }

    function updateObstacles(delta) {
      let cleared = 0;

      for (const obstacle of obstacles) {
        if (!obstacle.cleared && foxRoot.position.z > obstacle.z + 1.2) {
          obstacle.cleared = true;
        }
        if (obstacle.cleared) cleared++;

        if (obstacle.flashTimer > 0) {
          obstacle.flashTimer -= delta;
          if (obstacle.flashTimer <= 0) {
            restoreObstacle(obstacle);
          }
        }

        if (foxState.bodyBox.intersectsBox(obstacle.bbox)) {
          if (obstacle.type === 'barrier') {
            if (!foxState.isJumping || foxRoot.position.y < 0.75) {
              registerCollision(obstacle);
            }
          } else if (obstacle.type === 'tunnel') {
            if (!foxState.isCrouching && foxRoot.position.y < 0.55) {
              registerCollision(obstacle);
            }
          }
        }
      }

      window.__3D_STATE__.obstaclesCleared = cleared;

      if (!window.__3D_STATE__.gameFinished && cleared >= obstacleCount && foxRoot.position.z > obstacles[obstacles.length - 1].z + 1.2) {
        window.__3D_STATE__.gameFinished = true;
        finishTime = performance.now() * 0.001;
        baseElapsed = finishTime - startTime;
        window.__3D_STATE__.timer = baseElapsed + penaltyTime;
        finalTimeEl.textContent = formatTime(window.__3D_STATE__.timer);
        finalStatsEl.innerHTML = `碰撞次数：${window.__3D_STATE__.collisions}<br>罚时：${penaltyTime.toFixed(0)} 秒`;
        resultEl.style.display = 'flex';
        foxState.velocityZ = 0;
      }
    }

    function updateTimer() {
      if (window.__3D_STATE__.gameStarted && !window.__3D_STATE__.gameFinished) {
        baseElapsed = performance.now() * 0.001 - startTime;
      }
      if (!window.__3D_STATE__.gameStarted) {
        window.__3D_STATE__.timer = 0;
      } else if (window.__3D_STATE__.gameFinished) {
        window.__3D_STATE__.timer = baseElapsed + penaltyTime;
      } else {
        window.__3D_STATE__.timer = baseElapsed + penaltyTime;
      }
    }

    const cameraOffset = new THREE.Vector3(0, 3.0, -6.2);
    const lookAtOffset = new THREE.Vector3(0, 1.0, 2.5);
    const desiredCamPos = new THREE.Vector3();
    const desiredLookAt = new THREE.Vector3();

    function updateCamera(delta) {
      desiredCamPos.set(
        foxRoot.position.x + cameraOffset.x,
        foxRoot.position.y + cameraOffset.y,
        foxRoot.position.z + cameraOffset.z
      );
      camera.position.lerp(desiredCamPos, 1 - Math.exp(-6 * delta));

      desiredLookAt.set(
        foxRoot.position.x + lookAtOffset.x,
        foxRoot.position.y + lookAtOffset.y,
        foxRoot.position.z + lookAtOffset.z
      );
      controls.target.lerp(desiredLookAt, 1 - Math.exp(-8 * delta));
      camera.lookAt(controls.target);
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.033);

      if (mixer) mixer.update(delta);

      updateFoxMovement(delta);
      updateFoxBox();
      updateObstacles(delta);
      updateTimer();
      updateCamera(delta);
      updateState();
      updateHUD();

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
