<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Kitchen Cabinet Planner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: Arial, sans-serif; background: #000; }
  canvas { display: block; }

  #costPanel {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(0,0,0,0.8);
    color: #fff;
    padding: 15px 20px;
    border-radius: 10px;
    min-width: 220px;
    font-size: 14px;
    line-height: 1.8;
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(5px);
  }
  #costPanel h3 {
    margin-bottom: 8px;
    color: #DAA520;
    font-size: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 5px;
  }

  #timeControls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    padding: 12px 25px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 15px;
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(5px);
  }
  #timeSlider {
    width: 300px;
    cursor: pointer;
    accent-color: #DAA520;
  }
  #timeLabel {
    color: #fff;
    font-size: 14px;
    min-width: 90px;
  }
  #playBtn {
    background: #DAA520;
    color: #000;
    border: none;
    padding: 6px 16px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    font-size: 13px;
  }
  #playBtn:hover { background: #FFD700; }

  #instructions {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0,0,0,0.8);
    color: #ccc;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.7;
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(5px);
  }
  #instructions h4 { color: #DAA520; margin-bottom: 5px; }
</style>
</head>
<body>

<div id="costPanel">
  <h3>💰 Cost Calculator</h3>
  <div id="costContent">
    <div>Cabinet Count: <span id="cabinetCountDisplay">0</span></div>
    <div>Total Cost: $<span id="totalCostDisplay">0</span></div>
    <div>Avg Cost: $<span id="avgCostDisplay">0</span></div>
  </div>
</div>

<div id="instructions">
  <h4>🔧 Controls</h4>
  <div>Click cabinet to select</div>
  <div>1 = Lower | 2 = Upper | 3 = Tall</div>
  <div>Delete = Remove cabinet</div>
  <div>C = Cycle color</div>
</div>

<div id="timeControls">
  <span id="timeLabel">Time: 12:00</span>
  <input type="range" id="timeSlider" min="0" max="24" step="0.5" value="12">
  <button id="playBtn">Play</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const CABINET_COLORS = [0x8B4513, 0xFFFFFF, 0x2F4F4F, 0xD2691E];
const CABINET_COLOR_HEX = ['#8B4513', '#FFFFFF', '#2F4F4F', '#D2691E'];
const CABINET_COSTS = { lower: 200, upper: 150, tall: 350 };
const SLOT_POSITIONS_X = [-6, -3, 0, 3, 6];

let cabinetSlots = [
  { type: 'lower', colorIndex: 0 },
  { type: 'lower', colorIndex: 0 },
  { type: 'lower', colorIndex: 0 },
  { type: 'upper', colorIndex: 0 },
  { type: 'upper', colorIndex: 0 }
];

let selectedSlot = -1;
let isPlaying = false;
let glbLoaded = false;
let glbPosition = { x: 0, y: 1.5, z: -2 };
let removedCount = 0;
let cabinetMeshes = [null, null, null, null, null];

// Time keyframes: [hour, posX, posY, posZ, r, g, b, intensity]
const timeKeyframes = [
  { hour: 0,  pos: new THREE.Vector3(0, -5, 0),   color: new THREE.Color(0x191970), intensity: 0.05 },
  { hour: 6,  pos: new THREE.Vector3(-10, 2, 0),   color: new THREE.Color(0xFFA500), intensity: 0.5 },
  { hour: 12, pos: new THREE.Vector3(0, 10, 0),    color: new THREE.Color(0xFFFFFF), intensity: 1.0 },
  { hour: 18, pos: new THREE.Vector3(10, 2, 0),    color: new THREE.Color(0xFF4500), intensity: 0.5 },
  { hour: 24, pos: new THREE.Vector3(0, -5, 0),    color: new THREE.Color(0x191970), intensity: 0.05 }
];

window.__3D_STATE__ = {
  cabinetSlots: [],
  selectedSlot: -1,
  totalCost: 0,
  cabinetCount: 0,
  averageCost: 0,
  currentTime: 12,
  sunIntensity: 1.0,
  sunColor: '#FFFFFF',
  isPlaying: false,
  glbLoaded: false,
  glbPosition: { x: 0, y: 1.5, z: -2 },
  removedCount: 0
};

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 20, 50);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 2, 0);
controls.update();

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
sunLight.position.set(0, 10, 0);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048;
sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 30;
sunLight.shadow.camera.left = -15;
sunLight.shadow.camera.right = 15;
sunLight.shadow.camera.top = 15;
sunLight.shadow.camera.bottom = -5;
scene.add(sunLight);

// Hemisphere light for ambient fill
const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x8B7355, 0.2);
scene.add(hemiLight);

// --- Room ---
// Floor
const floorGeo = new THREE.PlaneGeometry(20, 20);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.8, metalness: 0.1 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Back wall
const backWallGeo = new THREE.PlaneGeometry(20, 8);
const wallMat = new THREE.MeshStandardMaterial({ color: 0xF5F5DC, roughness: 0.9, metalness: 0.0 });
const backWall = new THREE.Mesh(backWallGeo, wallMat);
backWall.position.set(0, 4, -3.5);
backWall.receiveShadow = true;
scene.add(backWall);

// Left wall
const sideWallGeo = new THREE.PlaneGeometry(20, 8);
const leftWall = new THREE.Mesh(sideWallGeo, wallMat.clone());
leftWall.position.set(-10, 4, 6.5);
leftWall.rotation.y = Math.PI / 2;
leftWall.receiveShadow = true;
scene.add(leftWall);

// Right wall
const rightWall = new THREE.Mesh(sideWallGeo, wallMat.clone());
rightWall.position.set(10, 4, 6.5);
rightWall.rotation.y = -Math.PI / 2;
rightWall.receiveShadow = true;
scene.add(rightWall);

// --- Countertop ---
const counterGeo = new THREE.BoxGeometry(14, 0.15, 1.5);
const counterMat = new THREE.MeshStandardMaterial({ color: 0x696969, roughness: 0.3, metalness: 0.5 });
const countertop = new THREE.Mesh(counterGeo, counterMat);
countertop.position.set(0, 2.55, -2.5);
countertop.castShadow = true;
countertop.receiveShadow = true;
scene.add(countertop);

// --- GLB Model ---
const loader = new GLTFLoader();
let glbModel = null;
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/TextureTransformMultiTest/glTF-Binary/TextureTransformMultiTest.glb',
  (gltf) => {
    glbModel = gltf.scene;
    glbModel.scale.set(0.8, 0.8, 0.8);
    glbModel.position.set(0, 1.5, -2);
    glbModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(glbModel);
    glbLoaded = true;
    glbPosition = { x: 0, y: 1.5, z: -2 };
  },
  undefined,
  (error) => {
    console.warn('GLB load error, creating placeholder:', error);
    const placeholderGeo = new THREE.BoxGeometry(0.6, 0.8, 0.6);
    const placeholderMat = new THREE.MeshStandardMaterial({ color: 0xCC3333, roughness: 0.4, metalness: 0.6 });
    glbModel = new THREE.Mesh(placeholderGeo, placeholderMat);
    glbModel.scale.set(0.8, 0.8, 0.8);
    glbModel.position.set(0, 1.5, -2);
    glbModel.castShadow = true;
    scene.add(glbModel);
    glbLoaded = true;
    glbPosition = { x: 0, y: 1.5, z: -2 };
  }
);

// --- Cabinet Creation ---
function getCabinetGeometry(type) {
  switch (type) {
    case 'upper': return new THREE.BoxGeometry(1.8, 2, 0.8);
    case 'lower': return new THREE.BoxGeometry(1.8, 2.5, 1);
    case 'tall':  return new THREE.BoxGeometry(1.8, 5, 1);
    default: return new THREE.BoxGeometry(1.8, 2.5, 1);
  }
}

function getCabinetY(type) {
  switch (type) {
    case 'upper': return 4;
    case 'lower': return 1.25;
    case 'tall':  return 2.5;
    default: return 1.25;
  }
}

function createCabinetMesh(type, colorIndex, slotIndex) {
  const geo = getCabinetGeometry(type);
  const mat = new THREE.MeshStandardMaterial({
    color: CABINET_COLORS[colorIndex],
    roughness: 0.6,
    metalness: 0.1
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(SLOT_POSITIONS_X[slotIndex], getCabinetY(type), -3);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData.slotIndex = slotIndex;

  // Add door line detail
  const edgesGeo = new THREE.EdgesGeometry(geo);
  const edgesMat = new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 });
  const edges = new THREE.LineSegments(edgesGeo, edgesMat);
  mesh.add(edges);

  // Add handle
  const handleGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.3, 8);
  const handleMat = new THREE.MeshStandardMaterial({ color: 0xC0C0C0, metalness: 0.8, roughness: 0.2 });
  const handle = new THREE.Mesh(handleGeo, handleMat);
  handle.rotation.x = Math.PI / 2;
  const dims = { upper: { w: 1.8, h: 2, d: 0.8 }, lower: { w: 1.8, h: 2.5, d: 1 }, tall: { w: 1.8, h: 5, d: 1 } };
  const d = dims[type];
  handle.position.set(0.3, 0, d.d / 2 + 0.02);
  mesh.add(handle);

  return mesh;
}

function buildCabinets() {
  for (let i = 0; i < 5; i++) {
    if (cabinetMeshes[i]) {
      scene.remove(cabinetMeshes[i]);
      cabinetMeshes[i] = null;
    }
    if (cabinetSlots[i]) {
      const slot = cabinetSlots[i];
      const mesh = createCabinetMesh(slot.type, slot.colorIndex, i);
      cabinetMeshes[i] = mesh;
      scene.add(mesh);
    }
  }
}

function rebuildSlot(index) {
  if (cabinetMeshes[index]) {
    scene.remove(cabinetMeshes[index]);
    cabinetMeshes[index] = null;
  }
  if (cabinetSlots[index]) {
    const slot = cabinetSlots[index];
    const mesh = createCabinetMesh(slot.type, slot.colorIndex, index);
    cabinetMeshes[index] = mesh;
    scene.add(mesh);
  }
}

function updateHighlight() {
  for (let i = 0; i < 5; i++) {
    if (cabinetMeshes[i] && cabinetSlots[i]) {
      if (i === selectedSlot) {
        cabinetMeshes[i].material.color.setHex(0xDAA520);
        cabinetMeshes[i].material.emissive.setHex(0x332200);
      } else {
        cabinetMeshes[i].material.color.setHex(CABINET_COLORS[cabinetSlots[i].colorIndex]);
        cabinetMeshes[i].material.emissive.setHex(0x000000);
      }
    }
  }
}

buildCabinets();

// --- Cost Calculation ---
function updateCost() {
  let total = 0;
  let count = 0;
  for (let i = 0; i < 5; i++) {
    if (cabinetSlots[i]) {
      total += CABINET_COSTS[cabinetSlots[i].type];
      count++;
    }
  }
  const avg = count > 0 ? Math.round(total / count) : 0;
  document.getElementById('cabinetCountDisplay').textContent = count;
  document.getElementById('totalCostDisplay').textContent = total;
  document.getElementById('avgCostDisplay').textContent = avg;
  return { total, count, avg };
}

updateCost();

// --- Raycaster for selection ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const clickable = cabinetMeshes.filter(m => m !== null);
  const intersects = raycaster.intersectObjects(clickable, true);

  if (intersects.length > 0) {
    let obj = intersects[0].object;
    // Walk up to find the cabinet mesh with slotIndex
    while (obj && obj.userData.slotIndex === undefined && obj.parent) {
      obj = obj.parent;
    }
    if (obj && obj.userData.slotIndex !== undefined) {
      const idx = obj.userData.slotIndex;
      if (selectedSlot === idx) {
        selectedSlot = -1;
      } else {
        selectedSlot = idx;
      }
    } else {
      selectedSlot = -1;
    }
  } else {
    selectedSlot = -1;
  }
  updateHighlight();
});

// --- Keyboard ---
document.addEventListener('keydown', (event) => {
  const key = event.key;

  if (key === 'Delete' || key === 'Backspace') {
    if (selectedSlot >= 0 && cabinetSlots[selectedSlot]) {
      cabinetSlots[selectedSlot] = null;
      if (cabinetMeshes[selectedSlot]) {
        scene.remove(cabinetMeshes[selectedSlot]);
        cabinetMeshes[selectedSlot] = null;
      }
      removedCount++;
      selectedSlot = -1;
      updateCost();
      updateHighlight();
    }
  } else if (key === '1') {
    if (selectedSlot >= 0) {
      const ci = cabinetSlots[selectedSlot] ? cabinetSlots[selectedSlot].colorIndex : 0;
      cabinetSlots[selectedSlot] = { type: 'lower', colorIndex: ci };
      rebuildSlot(selectedSlot);
      updateHighlight();
      updateCost();
    }
  } else if (key === '2') {
    if (selectedSlot >= 0) {
      const ci = cabinetSlots[selectedSlot] ? cabinetSlots[selectedSlot].colorIndex : 0;
      cabinetSlots[selectedSlot] = { type: 'upper', colorIndex: ci };
      rebuildSlot(selectedSlot);
      updateHighlight();
      updateCost();
    }
  } else if (key === '3') {
    if (selectedSlot >= 0) {
      const ci = cabinetSlots[selectedSlot] ? cabinetSlots[selectedSlot].colorIndex : 0;
      cabinetSlots[selectedSlot] = { type: 'tall', colorIndex: ci };
      rebuildSlot(selectedSlot);
      updateHighlight();
      updateCost();
    }
  } else if (key === 'c' || key === 'C') {
    if (selectedSlot >= 0 && cabinetSlots[selectedSlot]) {
      cabinetSlots[selectedSlot].colorIndex = (cabinetSlots[selectedSlot].colorIndex + 1) % 4;
      updateHighlight();
    }
  }
});

// --- Time of Day ---
const timeSlider = document.getElementById('timeSlider');
const timeLabel = document.getElementById('timeLabel');
const playBtn = document.getElementById('playBtn');

function formatTime(h) {
  const hours = Math.floor(h) % 24;
  const minutes = Math.round((h - Math.floor(h)) * 60);
  return `Time: ${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
}

function lerpValue(a, b, t) {
  return a + (b - a) * t;
}

function updateSunFromTime(hour) {
  hour = ((hour % 24) + 24) % 24;

  // Find surrounding keyframes
  let kfBefore = timeKeyframes[0];
  let kfAfter = timeKeyframes[1];
  for (let i = 0; i < timeKeyframes.length - 1; i++) {
    if (hour >= timeKeyframes[i].hour && hour <= timeKeyframes[i + 1].hour) {
      kfBefore = timeKeyframes[i];
      kfAfter = timeKeyframes[i + 1];
      break;
    }
  }

  const range = kfAfter.hour - kfBefore.hour;
  const t = range > 0 ? (hour - kfBefore.hour) / range : 0;

  // Interpolate position
  const pos = new THREE.Vector3().lerpVectors(kfBefore.pos, kfAfter.pos, t);
  sunLight.position.copy(pos);

  // Interpolate color
  const color = kfBefore.color.clone().lerp(kfAfter.color, t);
  sunLight.color.copy(color);

  // Interpolate intensity
  const intensity = lerpValue(kfBefore.intensity, kfAfter.intensity, t);
  sunLight.intensity = intensity;

  // Update scene background based on time
  const dayColor = new THREE.Color(0x87CEEB);
  const sunsetColor = new THREE.Color(0xFF6347);
  const nightColor = new THREE.Color(0x0a0a2e);

  let bgColor;
  if (hour >= 6 && hour <= 12) {
    const bt = (hour - 6) / 6;
    bgColor = nightColor.clone().lerp(dayColor, bt);
  } else if (hour > 12 && hour <= 18) {
    const bt = (hour - 12) / 6;
    bgColor = dayColor.clone().lerp(sunsetColor, bt);
  } else if (hour > 18 && hour <= 21) {
    const bt = (hour - 18) / 3;
    bgColor = sunsetColor.clone().lerp(nightColor, bt);
  } else {
    bgColor = nightColor.clone();
    if (hour < 6) {
      const bt = hour / 6;
      bgColor = nightColor.clone().lerp(new THREE.Color(0x1a1a3e), bt);
    }
  }
  scene.background = bgColor;
  if (scene.fog) scene.fog.color.copy(bgColor);

  return { intensity, color: '#' + color.getHexString() };
}

timeSlider.addEventListener('input', () => {
  const val = parseFloat(timeSlider.value);
  timeLabel.textContent = formatTime(val);
  updateSunFromTime(val);
});

let lastPlayTime = 0;
playBtn.addEventListener('click', () => {
  isPlaying = !isPlaying;
  playBtn.textContent = isPlaying ? 'Pause' : 'Play';
  if (isPlaying) lastPlayTime = performance.now();
});

// Initial sun update
updateSunFromTime(12);

// --- Slot indicator markers on floor ---
for (let i = 0; i < 5; i++) {
  const markerGeo = new THREE.PlaneGeometry(2, 0.1);
  const markerMat = new THREE.MeshBasicMaterial({ color: 0xDAA520, transparent: true, opacity: 0.3 });
  const marker = new THREE.Mesh(markerGeo, markerMat);
  marker.rotation.x = -Math.PI / 2;
  marker.position.set(SLOT_POSITIONS_X[i], 0.01, -3);
  scene.add(marker);
}

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();

  // Auto-advance time
  if (isPlaying) {
    const delta = (now - lastPlayTime) / 1000; // seconds
    let currentVal = parseFloat(timeSlider.value);
    currentVal += delta; // 1 hour per second
    if (currentVal > 24) currentVal -= 24;
    timeSlider.value = currentVal;
    timeLabel.textContent = formatTime(currentVal);
    updateSunFromTime(currentVal);
  }
  lastPlayTime = now;

  // Rotate GLB model slowly
  if (glbModel) {
    glbModel.rotation.y += 0.005;
  }

  controls.update();

  // Update state
  const costInfo = updateCost();
  const currentTime = parseFloat(timeSlider.value) || 0;
  const sunInfo = updateSunFromTime(currentTime);

  window.__3D_STATE__ = {
    cabinetSlots: cabinetSlots.map(s => s ? { type: s.type, colorIndex: s.colorIndex } : null),
    selectedSlot: selectedSlot !== undefined && selectedSlot !== null ? selectedSlot : -1,
    totalCost: costInfo.total || 0,
    cabinetCount: costInfo.count || 0,
    averageCost: costInfo.avg || 0,
    currentTime: isNaN(currentTime) ? 0 : currentTime,
    sunIntensity: isNaN(sunLight.intensity) ? 0 : sunLight.intensity,
    sunColor: sunInfo.color || '#FFFFFF',
    isPlaying: !!isPlaying,
    glbLoaded: !!glbLoaded,
    glbPosition: glbPosition,
    removedCount: removedCount || 0
  };

  renderer.render(scene, camera);
}

animate();

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
