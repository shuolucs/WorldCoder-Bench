<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Kitchen Cabinet Planner</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #costPanel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            pointer-events: none;
            min-width: 200px;
        }
        #costPanel h3 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 18px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
        }
        .cost-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
            color: #555;
        }
        .cost-row.total {
            font-weight: bold;
            color: #000;
            font-size: 16px;
            margin-top: 10px;
            border-top: 1px solid #ccc;
            padding-top: 5px;
        }
        #timeControlPanel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            width: 400px;
        }
        #timeSlider {
            flex-grow: 1;
            cursor: pointer;
        }
        #timeLabel {
            font-weight: bold;
            min-width: 90px;
            color: #333;
        }
        #playBtn {
            padding: 6px 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 70px;
        }
        #playBtn:hover {
            background: #45a049;
        }
        #playBtn.playing {
            background: #f44336;
        }
        #playBtn.playing:hover {
            background: #da190b;
        }
        #instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            pointer-events: none;
            line-height: 1.5;
        }
        kbd {
            background: #eee;
            color: #333;
            padding: 2px 5px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="instructions">
        <b>Controls:</b><br>
        Left Click: Select Cabinet/Slot<br>
        <kbd>1</kbd> Lower Cabinet<br>
        <kbd>2</kbd> Upper Cabinet<br>
        <kbd>3</kbd> Tall Cabinet<br>
        <kbd>C</kbd> Cycle Color<br>
        <kbd>Del</kbd> Remove Cabinet
    </div>

    <div id="costPanel">
        <h3>Estimate</h3>
        <div class="cost-row"><span>Cabinets:</span> <span id="ui-count">0</span></div>
        <div class="cost-row"><span>Avg Cost:</span> <span id="ui-avg">$0</span></div>
        <div class="cost-row total"><span>Total:</span> <span id="ui-total">$0</span></div>
    </div>

    <div id="timeControlPanel">
        <button id="playBtn">Play</button>
        <input type="range" id="timeSlider" min="0" max="24" step="0.5" value="12">
        <span id="timeLabel">Time: 12:00</span>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            cabinetSlots: [
                { type: 'lower', colorIndex: 0 },
                { type: 'lower', colorIndex: 0 },
                { type: 'lower', colorIndex: 0 },
                { type: 'upper', colorIndex: 0 },
                { type: 'upper', colorIndex: 0 }
            ],
            selectedSlot: -1,
            totalCost: 0,
            cabinetCount: 0,
            averageCost: 0,
            currentTime: 12,
            sunIntensity: 1.0,
            sunColor: '#ffffff',
            isPlaying: false,
            glbLoaded: false,
            glbPosition: { x: 0, y: 1.5, z: -2 },
            removedCount: 0
        };

        const CABINET_COLORS = [0x8B4513, 0xFFFFFF, 0x2F4F4F, 0xD2691E];
        const HIGHLIGHT_COLOR = 0xDAA520;
        const SLOT_X_POSITIONS = [-6, -3, 0, 3, 6];
        const COSTS = { lower: 200, upper: 150, tall: 350 };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue, will be affected by lighting visually

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below floor

        // --- Room Construction ---
        // Floor
        const floorGeo = new THREE.PlaneGeometry(20, 20);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Back Wall
        const backWallGeo = new THREE.PlaneGeometry(20, 8);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xF5F5DC, roughness: 0.9 });
        const backWall = new THREE.Mesh(backWallGeo, wallMat);
        backWall.position.set(0, 4, -10);
        backWall.receiveShadow = true;
        scene.add(backWall);

        // Side Walls
        const sideWallGeo = new THREE.PlaneGeometry(20, 8);
        const leftWall = new THREE.Mesh(sideWallGeo, wallMat);
        leftWall.rotation.y = Math.PI / 2;
        leftWall.position.set(-10, 4, 0);
        leftWall.receiveShadow = true;
        scene.add(leftWall);

        const rightWall = new THREE.Mesh(sideWallGeo, wallMat);
        rightWall.rotation.y = -Math.PI / 2;
        rightWall.position.set(10, 4, 0);
        rightWall.receiveShadow = true;
        scene.add(rightWall);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 50;
        sunLight.shadow.camera.left = -15;
        sunLight.shadow.camera.right = 15;
        sunLight.shadow.camera.top = 15;
        sunLight.shadow.camera.bottom = -15;
        scene.add(sunLight);

        // --- GLB Loading ---
        const loader = new GLTFLoader();
        const glbUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/TextureTransformMultiTest/glTF-Binary/TextureTransformMultiTest.glb';
        
        loader.load(glbUrl, (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.8, 0.8, 0.8);
            model.position.set(0, 1.5, -2);
            
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            scene.add(model);
            window.__3D_STATE__.glbLoaded = true;
            window.__3D_STATE__.glbPosition = { x: 0, y: 1.5, z: -2 };
        });

        // --- Cabinet System ---
        const cabinetsGroup = new THREE.Group();
        scene.add(cabinetsGroup);

        // Invisible hitboxes for slots to allow selecting empty slots
        const slotHitboxes = new THREE.Group();
        scene.add(slotHitboxes);
        const hitboxGeo = new THREE.BoxGeometry(2, 8, 1.5);
        const hitboxMat = new THREE.MeshBasicMaterial({ visible: false });

        for (let i = 0; i < 5; i++) {
            const hitbox = new THREE.Mesh(hitboxGeo, hitboxMat);
            hitbox.position.set(SLOT_X_POSITIONS[i], 4, -9.25);
            hitbox.userData = { isSlot: true, slotIndex: i };
            slotHitboxes.add(hitbox);
        }

        const geometries = {
            lower: new THREE.BoxGeometry(1.8, 2.5, 1),
            upper: new THREE.BoxGeometry(1.8, 2, 0.8),
            tall: new THREE.BoxGeometry(1.8, 5, 1)
        };

        const materials = CABINET_COLORS.map(color => new THREE.MeshStandardMaterial({ color: color, roughness: 0.6 }));
        const highlightMaterial = new THREE.MeshStandardMaterial({ color: HIGHLIGHT_COLOR, roughness: 0.4, emissive: 0x222200 });

        function buildCabinets() {
            // Clear existing
            while (cabinetsGroup.children.length > 0) {
                const child = cabinetsGroup.children[0];
                cabinetsGroup.remove(child);
            }

            let total = 0;
            let count = 0;

            window.__3D_STATE__.cabinetSlots.forEach((slot, index) => {
                if (!slot) return;

                const geo = geometries[slot.type];
                const mat = (index === window.__3D_STATE__.selectedSlot) ? highlightMaterial : materials[slot.colorIndex];
                const mesh = new THREE.Mesh(geo, mat);
                
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.userData = { isCabinet: true, slotIndex: index };

                const x = SLOT_X_POSITIONS[index];
                let y, z;

                if (slot.type === 'lower') {
                    y = 1.25; z = -9.5;
                } else if (slot.type === 'upper') {
                    y = 4; z = -9.6;
                } else if (slot.type === 'tall') {
                    y = 2.5; z = -9.5;
                }

                mesh.position.set(x, y, z);
                cabinetsGroup.add(mesh);

                total += COSTS[slot.type];
                count++;
            });

            // Update Cost State
            window.__3D_STATE__.totalCost = total;
            window.__3D_STATE__.cabinetCount = count;
            window.__3D_STATE__.averageCost = count > 0 ? total / count : 0;

            updateCostUI();
        }

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            // Ignore UI clicks
            if (event.target.tagName !== 'CANVAS') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Intersect cabinets and hitboxes
            const intersects = raycaster.intersectObjects([...cabinetsGroup.children, ...slotHitboxes.children]);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                window.__3D_STATE__.selectedSlot = object.userData.slotIndex;
            } else {
                window.__3D_STATE__.selectedSlot = -1;
            }
            buildCabinets();
        });

        window.addEventListener('keydown', (event) => {
            const slotIdx = window.__3D_STATE__.selectedSlot;
            if (slotIdx === -1) return;

            const key = event.key.toUpperCase();
            const slots = window.__3D_STATE__.cabinetSlots;

            if (event.key === 'Delete' || event.key === 'Backspace') {
                if (slots[slotIdx] !== null) {
                    slots[slotIdx] = null;
                    window.__3D_STATE__.removedCount++;
                    buildCabinets();
                }
            } else if (key === '1') {
                slots[slotIdx] = { type: 'lower', colorIndex: slots[slotIdx] ? slots[slotIdx].colorIndex : 0 };
                buildCabinets();
            } else if (key === '2') {
                slots[slotIdx] = { type: 'upper', colorIndex: slots[slotIdx] ? slots[slotIdx].colorIndex : 0 };
                buildCabinets();
            } else if (key === '3') {
                slots[slotIdx] = { type: 'tall', colorIndex: slots[slotIdx] ? slots[slotIdx].colorIndex : 0 };
                buildCabinets();
            } else if (key === 'C') {
                if (slots[slotIdx]) {
                    slots[slotIdx].colorIndex = (slots[slotIdx].colorIndex + 1) % CABINET_COLORS.length;
                    buildCabinets();
                }
            }
        });

        // --- Time of Day Logic ---
        const timeSlider = document.getElementById('timeSlider');
        const timeLabel = document.getElementById('timeLabel');
        const playBtn = document.getElementById('playBtn');

        const keyframes = [
            { t: 0, pos: new THREE.Vector3(0, -5, 0), color: new THREE.Color(0x191970), intensity: 0.05 },
            { t: 6, pos: new THREE.Vector3(-10, 2, 0), color: new THREE.Color(0xFFA500), intensity: 0.5 },
            { t: 12, pos: new THREE.Vector3(0, 10, 0), color: new THREE.Color(0xFFFFFF), intensity: 1.0 },
            { t: 18, pos: new THREE.Vector3(10, 2, 0), color: new THREE.Color(0xFF4500), intensity: 0.5 },
            { t: 24, pos: new THREE.Vector3(0, -5, 0), color: new THREE.Color(0x191970), intensity: 0.05 }
        ];

        function updateSun() {
            let t = window.__3D_STATE__.currentTime;
            
            // Format time label
            let hours = Math.floor(t);
            let mins = (t % 1 === 0) ? "00" : "30";
            timeLabel.textContent = `Time: ${hours.toString().padStart(2, '0')}:${mins}`;

            // Interpolate
            let start, end;
            for (let i = 0; i < keyframes.length - 1; i++) {
                if (t >= keyframes[i].t && t <= keyframes[i+1].t) {
                    start = keyframes[i];
                    end = keyframes[i+1];
                    break;
                }
            }

            if (!start || !end) return;

            let progress = (t - start.t) / (end.t - start.t);
            
            sunLight.position.lerpVectors(start.pos, end.pos, progress);
            sunLight.color.lerpColors(start.color, end.color, progress);
            sunLight.intensity = start.intensity + (end.intensity - start.intensity) * progress;

            // Update background color based on time
            const nightSky = new THREE.Color(0x050510);
            const daySky = new THREE.Color(0x87CEEB);
            const sunriseSky = new THREE.Color(0xFFB6C1);
            
            let skyColor = new THREE.Color();
            if (t < 6) skyColor.lerpColors(nightSky, sunriseSky, t/6);
            else if (t < 12) skyColor.lerpColors(sunriseSky, daySky, (t-6)/6);
            else if (t < 18) skyColor.lerpColors(daySky, sunriseSky, (t-12)/6);
            else skyColor.lerpColors(sunriseSky, nightSky, (t-18)/6);
            
            scene.background = skyColor;

            // Update State
            window.__3D_STATE__.sunIntensity = sunLight.intensity || 0;
            window.__3D_STATE__.sunColor = '#' + sunLight.color.getHexString();
        }

        timeSlider.addEventListener('input', (e) => {
            window.__3D_STATE__.currentTime = parseFloat(e.target.value);
            updateSun();
        });

        playBtn.addEventListener('click', () => {
            window.__3D_STATE__.isPlaying = !window.__3D_STATE__.isPlaying;
            if (window.__3D_STATE__.isPlaying) {
                playBtn.textContent = 'Pause';
                playBtn.classList.add('playing');
            } else {
                playBtn.textContent = 'Play';
                playBtn.classList.remove('playing');
            }
        });

        // --- UI Updates ---
        const uiCount = document.getElementById('ui-count');
        const uiAvg = document.getElementById('ui-avg');
        const uiTotal = document.getElementById('ui-total');

        function updateCostUI() {
            const state = window.__3D_STATE__;
            uiCount.textContent = state.cabinetCount;
            uiAvg.textContent = '$' + state.averageCost.toFixed(2);
            uiTotal.textContent = '$' + state.totalCost;
        }

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Initialization ---
        buildCabinets();
        updateSun();

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (window.__3D_STATE__.isPlaying) {
                // 1 hour per second
                window.__3D_STATE__.currentTime += delta * 1;
                if (window.__3D_STATE__.currentTime > 24) {
                    window.__3D_STATE__.currentTime -= 24;
                }
                timeSlider.value = window.__3D_STATE__.currentTime;
                updateSun();
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
