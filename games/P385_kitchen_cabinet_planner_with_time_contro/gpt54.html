<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Kitchen Cabinet Planner</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

    #ui {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 12px;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }

    #timeControl {
      pointer-events: auto;
      background: rgba(255,255,255,0.9);
      padding: 10px 14px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }

    #timeSlider {
      width: 320px;
    }

    #costPanel {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.92);
      color: #111;
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 220px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      line-height: 1.5;
    }

    #helpPanel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.92);
      color: #111;
      padding: 12px 14px;
      border-radius: 10px;
      max-width: 280px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      line-height: 1.45;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      border: 1px solid #888;
      border-radius: 6px;
      padding: 6px 12px;
      background: #f0f0f0;
    }

    button:hover {
      background: #e4e4e4;
    }
  </style>
</head>
<body>
  <div id="helpPanel">
    <strong>Controls</strong><br>
    Click cabinet to select.<br>
    Delete: remove selected cabinet<br>
    1 = lower, 2 = upper, 3 = tall<br>
    C = cycle selected cabinet color<br>
    Drag to orbit camera
  </div>

  <div id="costPanel">
    <strong>Cost Calculator</strong><br>
    Total Cost: $0<br>
    Cabinet Count: 0<br>
    Average Cost: $0
  </div>

  <div id="ui">
    <div id="timeControl">
      <button id="playBtn">Play</button>
      <label for="timeSlider"><span id="timeLabel">Time: 12:00</span></label>
      <input id="timeSlider" type="range" min="0" max="24" step="0.5" value="12">
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdde7f0);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 2, -2);
    controls.enableDamping = true;

    // Room
    const floorMat = new THREE.MeshStandardMaterial({ color: "#8B7355" });
    const wallMat = new THREE.MeshStandardMaterial({ color: "#F5F5DC" });

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      floorMat
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const backWall = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 8),
      wallMat
    );
    backWall.position.set(0, 4, -5);
    backWall.receiveShadow = true;
    scene.add(backWall);

    const leftWall = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 8),
      wallMat
    );
    leftWall.position.set(-10, 4, 0);
    leftWall.rotation.y = Math.PI / 2;
    leftWall.receiveShadow = true;
    scene.add(leftWall);

    const rightWall = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 8),
      wallMat
    );
    rightWall.position.set(10, 4, 0);
    rightWall.rotation.y = -Math.PI / 2;
    rightWall.receiveShadow = true;
    scene.add(rightWall);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
    sunLight.position.set(0, 10, 0);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    sunLight.shadow.camera.left = -15;
    sunLight.shadow.camera.right = 15;
    sunLight.shadow.camera.top = 15;
    sunLight.shadow.camera.bottom = -15;
    sunLight.shadow.camera.near = 0.5;
    sunLight.shadow.camera.far = 50;
    scene.add(sunLight);

    const sunTarget = new THREE.Object3D();
    sunTarget.position.set(0, 0, -2);
    scene.add(sunTarget);
    sunLight.target = sunTarget;

    // Decorative GLB
    let glbLoaded = false;
    let glbObject = null;
    const loader = new GLTFLoader();
    loader.load(
      "TextureTransformMultiTest.glb",
      (gltf) => {
        glbObject = gltf.scene;
        glbObject.scale.set(0.8, 0.8, 0.8);
        glbObject.position.set(0, 1.5, -2);
        glbObject.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
        scene.add(glbObject);
        glbLoaded = true;
      },
      undefined,
      (err) => {
        console.warn("GLB failed to load:", err);
      }
    );

    // Cabinet system
    const CABINET_TYPES = {
      lower: { size: [1.8, 2.5, 1], y: 1.25, cost: 200 },
      upper: { size: [1.8, 2, 0.8], y: 4, cost: 150 },
      tall:  { size: [1.8, 5, 1], y: 2.5, cost: 350 }
    };

    const COLORS = ["#8B4513", "#FFFFFF", "#2F4F4F", "#D2691E"];
    const DEFAULT_COLOR_INDEX = 0;
    const HIGHLIGHT_COLOR = "#DAA520";
    const slotPositions = [-6, -3, 0, 3, 6];

    const cabinetSlots = new Array(5).fill(null).map(() => null);
    const cabinetMeshes = new Array(5).fill(null);
    let selectedSlot = -1;
    let removedCount = 0;

    function createCabinetMesh(type, slotIndex, colorIndex = 0) {
      const spec = CABINET_TYPES[type];
      const geom = new THREE.BoxGeometry(...spec.size);
      const mat = new THREE.MeshStandardMaterial({ color: COLORS[colorIndex] });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.position.set(slotPositions[slotIndex], spec.y, -4.4);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData.slotIndex = slotIndex;
      mesh.userData.type = type;
      mesh.userData.colorIndex = colorIndex;
      return mesh;
    }

    function clearSlot(slotIndex) {
      if (cabinetMeshes[slotIndex]) {
        scene.remove(cabinetMeshes[slotIndex]);
        cabinetMeshes[slotIndex].geometry.dispose();
        cabinetMeshes[slotIndex].material.dispose();
        cabinetMeshes[slotIndex] = null;
      }
      cabinetSlots[slotIndex] = null;
    }

    function setCabinet(slotIndex, type, colorIndex = 0) {
      clearSlot(slotIndex);
      const mesh = createCabinetMesh(type, slotIndex, colorIndex);
      cabinetMeshes[slotIndex] = mesh;
      cabinetSlots[slotIndex] = { type, colorIndex };
      scene.add(mesh);
      refreshSelectionVisuals();
      updateCostPanel();
    }

    function removeCabinet(slotIndex) {
      if (slotIndex < 0 || slotIndex >= cabinetSlots.length) return;
      if (cabinetSlots[slotIndex] !== null) {
        clearSlot(slotIndex);
        removedCount++;
        if (selectedSlot === slotIndex) selectedSlot = -1;
        refreshSelectionVisuals();
        updateCostPanel();
      }
    }

    function refreshSelectionVisuals() {
      for (let i = 0; i < cabinetMeshes.length; i++) {
        const mesh = cabinetMeshes[i];
        if (!mesh) continue;
        const slotData = cabinetSlots[i];
        if (!slotData) continue;
        mesh.material.color.set(i === selectedSlot ? HIGHLIGHT_COLOR : COLORS[slotData.colorIndex]);
      }
    }

    // Initial layout
    setCabinet(0, "lower", 0);
    setCabinet(1, "lower", 0);
    setCabinet(2, "lower", 0);
    setCabinet(3, "upper", 0);
    setCabinet(4, "upper", 0);

    // Cost calculator
    const costPanel = document.getElementById("costPanel");

    function computeCosts() {
      let totalCost = 0;
      let cabinetCount = 0;

      for (const slot of cabinetSlots) {
        if (slot && CABINET_TYPES[slot.type]) {
          totalCost += CABINET_TYPES[slot.type].cost;
          cabinetCount++;
        }
      }

      const averageCost = cabinetCount > 0 ? totalCost / cabinetCount : 0;

      return {
        totalCost: Number.isFinite(totalCost) ? totalCost : 0,
        cabinetCount: Number.isFinite(cabinetCount) ? cabinetCount : 0,
        averageCost: Number.isFinite(averageCost) ? averageCost : 0
      };
    }

    function updateCostPanel() {
      const { totalCost, cabinetCount, averageCost } = computeCosts();
      costPanel.innerHTML = `
        <strong>Cost Calculator</strong><br>
        Total Cost: $${totalCost.toFixed(2)}<br>
        Cabinet Count: ${cabinetCount}<br>
        Average Cost: $${averageCost.toFixed(2)}
      `;
    }
    updateCostPanel();

    // Raycasting selection
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function onPointerDown(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const meshes = cabinetMeshes.filter(Boolean);
      const intersects = raycaster.intersectObjects(meshes, false);

      if (intersects.length > 0) {
        selectedSlot = intersects[0].object.userData.slotIndex;
      } else {
        selectedSlot = -1;
      }
      refreshSelectionVisuals();
    }

    window.addEventListener("pointerdown", onPointerDown);

    // Keyboard interaction
    window.addEventListener("keydown", (e) => {
      if (e.key === "Delete") {
        if (selectedSlot !== -1) removeCabinet(selectedSlot);
      }

      if (selectedSlot !== -1) {
        if (e.key === "1") {
          const colorIndex = cabinetSlots[selectedSlot]?.colorIndex ?? DEFAULT_COLOR_INDEX;
          setCabinet(selectedSlot, "lower", colorIndex);
        } else if (e.key === "2") {
          const colorIndex = cabinetSlots[selectedSlot]?.colorIndex ?? DEFAULT_COLOR_INDEX;
          setCabinet(selectedSlot, "upper", colorIndex);
        } else if (e.key === "3") {
          const colorIndex = cabinetSlots[selectedSlot]?.colorIndex ?? DEFAULT_COLOR_INDEX;
          setCabinet(selectedSlot, "tall", colorIndex);
        } else if (e.key.toLowerCase() === "c") {
          if (cabinetSlots[selectedSlot]) {
            cabinetSlots[selectedSlot].colorIndex = (cabinetSlots[selectedSlot].colorIndex + 1) % COLORS.length;
            cabinetMeshes[selectedSlot].userData.colorIndex = cabinetSlots[selectedSlot].colorIndex;
            refreshSelectionVisuals();
            updateCostPanel();
          }
        }
      }
    });

    // Time of day
    const timeSlider = document.getElementById("timeSlider");
    const timeLabel = document.getElementById("timeLabel");
    const playBtn = document.getElementById("playBtn");
    let currentTime = 12;
    let isPlaying = false;

    function hexToColor(hex) {
      return new THREE.Color(hex);
    }

    function lerpColor(hexA, hexB, t) {
      const ca = hexToColor(hexA);
      const cb = hexToColor(hexB);
      return ca.lerp(cb, t);
    }

    function formatTime(hour) {
      const h = Math.floor(hour) % 24;
      const m = Math.round((hour - Math.floor(hour)) * 60);
      const mm = m === 60 ? 0 : m;
      const hh = m === 60 ? (h + 1) % 24 : h;
      return `${String(hh).padStart(2, "0")}:${String(mm).padStart(2, "0")}`;
    }

    function applySunForTime(hour) {
      hour = ((Number(hour) % 24) + 24) % 24;

      const keys = [
        { hour: 0,  pos: new THREE.Vector3(-10, 0.8, 0), color: "#191970", intensity: 0.05 },
        { hour: 6,  pos: new THREE.Vector3(-10, 2, 0),  color: "#FFA500", intensity: 0.5 },
        { hour: 12, pos: new THREE.Vector3(0, 10, 0),   color: "#FFFFFF", intensity: 1.0 },
        { hour: 18, pos: new THREE.Vector3(10, 2, 0),   color: "#FF4500", intensity: 0.5 },
        { hour: 24, pos: new THREE.Vector3(-10, 0.8, 0), color: "#191970", intensity: 0.05 }
      ];

      let a = keys[0];
      let b = keys[1];

      for (let i = 0; i < keys.length - 1; i++) {
        if (hour >= keys[i].hour && hour <= keys[i + 1].hour) {
          a = keys[i];
          b = keys[i + 1];
          break;
        }
      }

      const span = b.hour - a.hour;
      const t = span === 0 ? 0 : (hour - a.hour) / span;

      const pos = a.pos.clone().lerp(b.pos, t);
      const color = lerpColor(a.color, b.color, t);
      const intensity = THREE.MathUtils.lerp(a.intensity, b.intensity, t);

      sunLight.position.copy(pos);
      sunLight.color.copy(color);
      sunLight.intensity = Number.isFinite(intensity) ? intensity : 0.05;

      timeLabel.textContent = `Time: ${formatTime(hour)}`;
    }

    timeSlider.addEventListener("input", () => {
      currentTime = Math.max(0, Math.min(24, parseFloat(timeSlider.value) || 0));
      applySunForTime(currentTime);
    });

    playBtn.addEventListener("click", () => {
      isPlaying = !isPlaying;
      playBtn.textContent = isPlaying ? "Pause" : "Play";
    });

    applySunForTime(currentTime);

    // Global state
    window.__3D_STATE__ = {
      cabinetSlots: [],
      selectedSlot: -1,
      totalCost: 0,
      cabinetCount: 0,
      averageCost: 0,
      currentTime: 12,
      sunIntensity: 1,
      sunColor: "#ffffff",
      isPlaying: false,
      glbLoaded: false,
      glbPosition: { x: 0, y: 1.5, z: -2 },
      removedCount: 0
    };

    function safeNum(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function updateGlobalState() {
      const costs = computeCosts();
      const sunColorHex = `#${sunLight.color.getHexString()}`;

      window.__3D_STATE__.cabinetSlots = cabinetSlots.map(slot =>
        slot
          ? {
              type: slot.type,
              colorIndex: safeNum(slot.colorIndex, 0)
            }
          : null
      );
      window.__3D_STATE__.selectedSlot = safeNum(selectedSlot, -1);
      window.__3D_STATE__.totalCost = safeNum(costs.totalCost, 0);
      window.__3D_STATE__.cabinetCount = safeNum(costs.cabinetCount, 0);
      window.__3D_STATE__.averageCost = safeNum(costs.averageCost, 0);
      window.__3D_STATE__.currentTime = safeNum(currentTime, 0);
      window.__3D_STATE__.sunIntensity = safeNum(sunLight.intensity, 0.05);
      window.__3D_STATE__.sunColor = sunColorHex || "#191970";
      window.__3D_STATE__.isPlaying = !!isPlaying;
      window.__3D_STATE__.glbLoaded = !!glbLoaded;
      window.__3D_STATE__.glbPosition = glbObject
        ? {
            x: safeNum(glbObject.position.x, 0),
            y: safeNum(glbObject.position.y, 1.5),
            z: safeNum(glbObject.position.z, -2)
          }
        : { x: 0, y: 1.5, z: -2 };
      window.__3D_STATE__.removedCount = safeNum(removedCount, 0);
    }

    // Resize
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Animation
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (isPlaying) {
        currentTime += delta * 1.0; // 1 hour per second
        if (currentTime > 24) currentTime -= 24;
        currentTime = safeNum(currentTime, 0);
        timeSlider.value = currentTime.toFixed(1);
        applySunForTime(currentTime);
      }

      controls.update();
      updateGlobalState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
