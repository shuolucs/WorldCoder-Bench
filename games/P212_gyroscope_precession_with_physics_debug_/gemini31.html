<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Gyroscope Precession Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111122;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
        }
        button {
            background-color: #2a2a3a;
            color: #ffffff;
            border: 1px solid #555577;
            padding: 8px 16px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #3a3a5a;
        }
        #debug-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: rgba(0, 0, 0, 0.75);
            border: 1px solid #444;
            padding: 15px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.6;
            pointer-events: none;
            z-index: 10;
            min-width: 220px;
        }
        .debug-row {
            display: flex;
            justify-content: space-between;
        }
        .debug-label {
            color: #aaa;
        }
        .debug-value {
            font-weight: bold;
            color: #fff;
        }
        #instructions {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            color: #ccc;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <button id="btn-wireframe">Toggle Wireframe</button>
    </div>

    <div id="debug-panel">
        <div class="debug-row"><span class="debug-label">Spin Rate:</span> <span class="debug-value"><span id="dbg-spin">5.0</span> rad/s</span></div>
        <div class="debug-row"><span class="debug-label">Precession:</span> <span class="debug-value"><span id="dbg-precession">0.300</span> rad/s</span></div>
        <div class="debug-row"><span class="debug-label">Tilt Angle:</span> <span class="debug-value"><span id="dbg-tilt">30.0</span>&deg;</span></div>
        <div class="debug-row"><span class="debug-label">Gravity:</span> <span class="debug-value" id="dbg-gravity">ON</span></div>
        <div class="debug-row"><span class="debug-label">Paused:</span> <span class="debug-value" id="dbg-paused">NO</span></div>
        <div class="debug-row"><span class="debug-label">Time:</span> <span class="debug-value"><span id="dbg-time">0.00</span> s</span></div>
        <div class="debug-row"><span class="debug-label">Nutation:</span> <span class="debug-value" id="dbg-nutation">NO</span></div>
    </div>

    <div id="instructions">
        Controls: [Space] Pause/Resume | [↑/↓] Adjust Spin | [G] Toggle Gravity | [D] Toggle Debug | [R] Reset
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            spinRate: 5.0,
            precessionRate: 0.3,
            tiltAngle: 30,
            gravityEnabled: true,
            paused: false,
            simTime: 0,
            nutationActive: false,
            debugVisible: true,
            wireframeMode: false,
            modelLoaded: false,
            precessionAngle: 0,
            rotorAngle: 0
        };

        const state = window.__3D_STATE__;
        const GRAVITY_CONSTANT = 0.05; // Constant to achieve 0.3 rad/s at 30deg tilt and 5.0 rad/s spin

        // Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(8, 6, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 2, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Materials
        const rodMaterial = new THREE.MeshStandardMaterial({ color: 0x888888 });
        const pivotMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const axisMaterial = new THREE.MeshStandardMaterial({ color: 0xffd700 });
        
        const toggleableMeshes = [];

        // Ground Plane
        const gridHelper = new THREE.GridHelper(20, 20, 0x555577, 0x222233);
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.5;
        scene.add(gridHelper);

        // Support Rod
        const rodGeometry = new THREE.CylinderGeometry(0.05, 0.05, 3, 16);
        const rod = new THREE.Mesh(rodGeometry, rodMaterial);
        rod.position.y = 1.5;
        scene.add(rod);
        toggleableMeshes.push(rod);

        // Pivot Sphere
        const pivotGeometry = new THREE.SphereGeometry(0.15, 32, 16);
        const pivotSphere = new THREE.Mesh(pivotGeometry, pivotMaterial);
        pivotSphere.position.y = 3;
        scene.add(pivotSphere);
        toggleableMeshes.push(pivotSphere);

        // Gyroscope Hierarchy
        const precessionGroup = new THREE.Group();
        precessionGroup.position.y = 3; // Pivot point
        scene.add(precessionGroup);

        const tiltGroup = new THREE.Group();
        precessionGroup.add(tiltGroup);

        // Tilted Axis
        const axisGeometry = new THREE.CylinderGeometry(0.04, 0.04, 4, 16);
        const axisMesh = new THREE.Mesh(axisGeometry, axisMaterial);
        axisMesh.position.y = 2; // Shift up so bottom is at pivot
        tiltGroup.add(axisMesh);
        toggleableMeshes.push(axisMesh);

        // Rotor Group (spins around axis)
        const rotorGroup = new THREE.Group();
        rotorGroup.position.y = 3.5; // Near the top of the axis
        tiltGroup.add(rotorGroup);

        // Load Model
        const loader = new GLTFLoader();
        loader.load(
            '._Lantern.glb',
            (gltf) => {
                const model = gltf.scene;
                model.scale.set(0.5, 0.5, 0.5);
                
                // Center the model vertically if needed, assuming origin is at bottom
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.y = -center.y;

                rotorGroup.add(model);
                state.modelLoaded = true;
                
                // Mark model meshes to exclude from wireframe toggle
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.userData.isModelMesh = true;
                    }
                });
            },
            undefined,
            (error) => {
                console.warn("Could not load '._Lantern.glb', using fallback geometry.", error);
                // Fallback geometry if model fails to load
                const fallbackGeo = new THREE.TorusGeometry(0.6, 0.15, 16, 48);
                const fallbackMat = new THREE.MeshStandardMaterial({ color: 0x00aaff });
                const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
                fallbackMesh.rotation.x = Math.PI / 2;
                rotorGroup.add(fallbackMesh);
                toggleableMeshes.push(fallbackMesh);
            }
        );

        // Initial Transforms
        tiltGroup.rotation.z = THREE.MathUtils.degToRad(state.tiltAngle);

        // Event Listeners
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'Space':
                    state.paused = !state.paused;
                    break;
                case 'ArrowUp':
                    state.spinRate = Math.min(20.0, state.spinRate + 1.0);
                    break;
                case 'ArrowDown':
                    state.spinRate = Math.max(0.0, state.spinRate - 1.0);
                    break;
                case 'KeyG':
                    state.gravityEnabled = !state.gravityEnabled;
                    break;
                case 'KeyD':
                    state.debugVisible = !state.debugVisible;
                    document.getElementById('debug-panel').style.display = state.debugVisible ? 'block' : 'none';
                    break;
                case 'KeyR':
                    state.spinRate = 5.0;
                    state.gravityEnabled = true;
                    state.paused = false;
                    state.simTime = 0;
                    state.precessionAngle = 0;
                    state.rotorAngle = 0;
                    break;
            }
        });

        document.getElementById('btn-wireframe').addEventListener('click', () => {
            state.wireframeMode = !state.wireframeMode;
            toggleableMeshes.forEach(mesh => {
                if (mesh.material) {
                    mesh.material.wireframe = state.wireframeMode;
                }
            });
        });

        // DOM Elements for Debug
        const elSpin = document.getElementById('dbg-spin');
        const elPrecession = document.getElementById('dbg-precession');
        const elTilt = document.getElementById('dbg-tilt');
        const elGravity = document.getElementById('dbg-gravity');
        const elPaused = document.getElementById('dbg-paused');
        const elTime = document.getElementById('dbg-time');
        const elNutation = document.getElementById('dbg-nutation');

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();

            if (!state.paused) {
                state.simTime += dt;

                // Nutation Logic
                let currentTilt = 30; // Base tilt
                if (state.spinRate < 1.0) {
                    state.nutationActive = true;
                    // Amplitude 5 degrees, Frequency 3 Hz
                    const nutationOffset = Math.sin(state.simTime * 3 * Math.PI * 2) * 5;
                    currentTilt += nutationOffset;
                } else {
                    state.nutationActive = false;
                }
                state.tiltAngle = currentTilt;

                // Precession Logic
                if (state.gravityEnabled) {
                    const safeSpin = Math.max(0.01, state.spinRate);
                    // precessionRate = gravity * tiltAngle / spinRate
                    state.precessionRate = (GRAVITY_CONSTANT * state.tiltAngle) / safeSpin;
                } else {
                    state.precessionRate = 0;
                }

                // Update Angles
                state.precessionAngle += state.precessionRate * dt;
                state.rotorAngle += state.spinRate * dt;

                // Apply Rotations
                precessionGroup.rotation.y = state.precessionAngle;
                tiltGroup.rotation.z = THREE.MathUtils.degToRad(state.tiltAngle);
                rotorGroup.rotation.y = state.rotorAngle;
            }

            // Update Debug UI
            if (state.debugVisible) {
                elSpin.textContent = state.spinRate.toFixed(1);
                elPrecession.textContent = state.precessionRate.toFixed(3);
                elTilt.textContent = state.tiltAngle.toFixed(1);
                elGravity.textContent = state.gravityEnabled ? 'ON' : 'OFF';
                elGravity.style.color = state.gravityEnabled ? '#00ff00' : '#ff4444';
                elPaused.textContent = state.paused ? 'YES' : 'NO';
                elPaused.style.color = state.paused ? '#ffaa00' : '#ffffff';
                elTime.textContent = state.simTime.toFixed(2);
                elNutation.textContent = state.nutationActive ? 'YES' : 'NO';
                elNutation.style.color = state.nutationActive ? '#ffaa00' : '#ffffff';
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
