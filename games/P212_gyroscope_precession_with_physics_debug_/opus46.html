<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Gyroscope Precession Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #111122; font-family: 'Courier New', monospace; }
  canvas { display: block; }

  #debug-panel {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(0, 0, 0, 0.75);
    color: #00ff88;
    padding: 15px 20px;
    border-radius: 8px;
    border: 1px solid rgba(0, 255, 136, 0.3);
    font-size: 13px;
    line-height: 1.8;
    z-index: 100;
    min-width: 260px;
    backdrop-filter: blur(5px);
  }

  #debug-panel h3 {
    color: #00ccff;
    margin-bottom: 8px;
    font-size: 14px;
    border-bottom: 1px solid rgba(0, 204, 255, 0.3);
    padding-bottom: 5px;
  }

  #debug-panel .label {
    color: #aabbcc;
  }

  #debug-panel .value {
    color: #00ff88;
    font-weight: bold;
  }

  #btn-wireframe {
    position: fixed;
    bottom: 20px;
    left: 20px;
    padding: 10px 20px;
    background: rgba(0, 150, 255, 0.2);
    color: #00aaff;
    border: 1px solid rgba(0, 150, 255, 0.5);
    border-radius: 5px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    z-index: 100;
    transition: all 0.2s;
  }

  #btn-wireframe:hover {
    background: rgba(0, 150, 255, 0.4);
    color: #ffffff;
  }

  #controls-help {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.6);
    color: #888;
    padding: 8px 16px;
    border-radius: 5px;
    font-size: 11px;
    z-index: 100;
    text-align: center;
  }

  #controls-help kbd {
    background: rgba(255,255,255,0.1);
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid #555;
    color: #aaa;
  }
</style>
</head>
<body>

<div id="debug-panel">
  <h3>🔧 Gyroscope Debug</h3>
  <div><span class="label">Spin Rate: </span><span class="value" id="dbg-spin">5.00</span> <span class="label">rad/s</span></div>
  <div><span class="label">Precession Rate: </span><span class="value" id="dbg-precession">0.30</span> <span class="label">rad/s</span></div>
  <div><span class="label">Tilt Angle: </span><span class="value" id="dbg-tilt">30.0</span><span class="label">°</span></div>
  <div><span class="label">Gravity: </span><span class="value" id="dbg-gravity">ON</span></div>
  <div><span class="label">Paused: </span><span class="value" id="dbg-paused">No</span></div>
  <div><span class="label">Sim Time: </span><span class="value" id="dbg-time">0.00</span><span class="label"> s</span></div>
  <div><span class="label">Nutation: </span><span class="value" id="dbg-nutation">No</span></div>
</div>

<button id="btn-wireframe">Toggle Wireframe</button>

<div id="controls-help">
  <kbd>Space</kbd> Pause &nbsp; <kbd>↑</kbd><kbd>↓</kbd> Spin Rate &nbsp; <kbd>G</kbd> Gravity &nbsp; <kbd>D</kbd> Debug &nbsp; <kbd>R</kbd> Reset
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ─── State ───
const state = {
  spinRate: 5.0,
  precessionRate: 0.3,
  tiltAngle: 30,
  gravityEnabled: true,
  paused: false,
  simTime: 0,
  nutationActive: false,
  debugVisible: true,
  wireframeMode: false,
  modelLoaded: false,
  precessionAngle: 0,
  rotorAngle: 0
};
window.__3D_STATE__ = state;

const INITIAL_TILT = 30;
const GRAVITY = 9.81;
const NUTATION_AMPLITUDE = 5 * (Math.PI / 180);
const NUTATION_FREQ = 3;

// ─── Scene Setup ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111122);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(8, 6, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1.5, 0);

// ─── Lights ───
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 8, 3);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);

// ─── Ground Plane ───
const gridHelper = new THREE.GridHelper(20, 20, 0x444466, 0x333355);
gridHelper.material.opacity = 0.5;
gridHelper.material.transparent = true;
scene.add(gridHelper);

const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x111122,
  transparent: true,
  opacity: 0.3,
  side: THREE.DoubleSide
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// ─── Track all scene meshes for wireframe toggle ───
const sceneMeshes = [];

// ─── Support Rod ───
const supportGeo = new THREE.CylinderGeometry(0.05, 0.05, 3, 16);
const supportMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.6, roughness: 0.3 });
const supportRod = new THREE.Mesh(supportGeo, supportMat);
supportRod.position.y = 1.5;
supportRod.castShadow = true;
scene.add(supportRod);
sceneMeshes.push(supportRod);

// ─── Pivot Point (red sphere) ───
const pivotSphereGeo = new THREE.SphereGeometry(0.15, 16, 16);
const pivotSphereMat = new THREE.MeshStandardMaterial({ color: 0xff3333, metalness: 0.4, roughness: 0.3 });
const pivotSphere = new THREE.Mesh(pivotSphereGeo, pivotSphereMat);
pivotSphere.position.y = 3.0;
pivotSphere.castShadow = true;
scene.add(pivotSphere);
sceneMeshes.push(pivotSphere);

// ─── Precession Group (rotates around Y at pivot) ───
const precessionGroup = new THREE.Group();
precessionGroup.position.y = 3.0;
scene.add(precessionGroup);

// ─── Tilt Group (tilted axis) ───
const tiltGroup = new THREE.Group();
precessionGroup.add(tiltGroup);

// ─── Gyroscope Axis (tilted, gold) ───
const axisGeo = new THREE.CylinderGeometry(0.04, 0.04, 4, 16);
const axisMat = new THREE.MeshStandardMaterial({ color: 0xffcc33, metalness: 0.7, roughness: 0.2 });
const gyroAxis = new THREE.Mesh(axisGeo, axisMat);
gyroAxis.position.y = 2.0; // center of the 4-unit axis, offset so bottom is at pivot
gyroAxis.castShadow = true;
tiltGroup.add(gyroAxis);
sceneMeshes.push(gyroAxis);

// Small decorative end caps
const capGeo = new THREE.SphereGeometry(0.08, 12, 12);
const capMat = new THREE.MeshStandardMaterial({ color: 0xffcc33, metalness: 0.7, roughness: 0.2 });
const topCap = new THREE.Mesh(capGeo, capMat);
topCap.position.y = 4.0;
tiltGroup.add(topCap);
sceneMeshes.push(topCap);

const bottomCap = new THREE.Mesh(capGeo.clone(), capMat.clone());
bottomCap.material.color.set(0x666666);
bottomCap.position.y = 0;
tiltGroup.add(bottomCap);
sceneMeshes.push(bottomCap);

// ─── Rotor spin group (spins around the tilted axis) ───
const rotorSpinGroup = new THREE.Group();
rotorSpinGroup.position.y = 3.2; // near top of the tilted axis
tiltGroup.add(rotorSpinGroup);

// ─── Fallback rotor (visible until model loads) ───
const fallbackRotorGeo = new THREE.TorusGeometry(0.6, 0.12, 16, 32);
const fallbackRotorMat = new THREE.MeshStandardMaterial({ color: 0xff8800, metalness: 0.5, roughness: 0.3 });
const fallbackRotor = new THREE.Mesh(fallbackRotorGeo, fallbackRotorMat);
fallbackRotor.rotation.x = Math.PI / 2;
fallbackRotor.castShadow = true;
rotorSpinGroup.add(fallbackRotor);
sceneMeshes.push(fallbackRotor);

// Add disc inside torus
const discGeo = new THREE.CylinderGeometry(0.55, 0.55, 0.04, 32);
const discMat = new THREE.MeshStandardMaterial({ color: 0xcc6600, metalness: 0.4, roughness: 0.4 });
const disc = new THREE.Mesh(discGeo, discMat);
disc.castShadow = true;
rotorSpinGroup.add(disc);
sceneMeshes.push(disc);

// Set initial tilt
const tiltRad = INITIAL_TILT * (Math.PI / 180);
tiltGroup.rotation.z = tiltRad;

// ─── Load GLB Model ───
let loadedModel = null;
const loader = new GLTFLoader();

loader.load(
  '._Lantern.glb',
  (gltf) => {
    loadedModel = gltf.scene;
    loadedModel.scale.set(0.5, 0.5, 0.5);
    loadedModel.castShadow = true;
    loadedModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    rotorSpinGroup.add(loadedModel);
    // Hide fallback
    fallbackRotor.visible = false;
    disc.visible = false;
    state.modelLoaded = true;
    console.log('Lantern model loaded successfully');
  },
  (progress) => {
    console.log('Loading model...', Math.round((progress.loaded / (progress.total || 1)) * 100) + '%');
  },
  (error) => {
    console.warn('Could not load ._Lantern.glb, using fallback rotor:', error.message || error);
    // Keep fallback visible
    state.modelLoaded = false;
  }
);

// ─── Particle trail for visual flair ───
const trailParticles = [];
const trailGeo = new THREE.SphereGeometry(0.03, 6, 6);
const trailMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.6 });

function spawnTrailParticle() {
  if (state.paused) return;
  const worldPos = new THREE.Vector3();
  topCap.getWorldPosition(worldPos);
  const p = new THREE.Mesh(trailGeo, trailMat.clone());
  p.position.copy(worldPos);
  p.userData.life = 1.0;
  scene.add(p);
  trailParticles.push(p);
}

function updateTrailParticles(dt) {
  for (let i = trailParticles.length - 1; i >= 0; i--) {
    const p = trailParticles[i];
    p.userData.life -= dt * 0.8;
    p.material.opacity = Math.max(0, p.userData.life * 0.6);
    p.scale.setScalar(p.userData.life);
    if (p.userData.life <= 0) {
      scene.remove(p);
      p.geometry.dispose();
      p.material.dispose();
      trailParticles.splice(i, 1);
    }
  }
}

// ─── Debug Panel ───
const debugPanel = document.getElementById('debug-panel');
const dbgSpin = document.getElementById('dbg-spin');
const dbgPrecession = document.getElementById('dbg-precession');
const dbgTilt = document.getElementById('dbg-tilt');
const dbgGravity = document.getElementById('dbg-gravity');
const dbgPaused = document.getElementById('dbg-paused');
const dbgTime = document.getElementById('dbg-time');
const dbgNutation = document.getElementById('dbg-nutation');

function updateDebugPanel() {
  dbgSpin.textContent = state.spinRate.toFixed(2);
  dbgPrecession.textContent = state.precessionRate.toFixed(3);
  dbgTilt.textContent = state.tiltAngle.toFixed(1);
  dbgGravity.textContent = state.gravityEnabled ? 'ON' : 'OFF';
  dbgGravity.style.color = state.gravityEnabled ? '#00ff88' : '#ff4444';
  dbgPaused.textContent = state.paused ? 'Yes' : 'No';
  dbgPaused.style.color = state.paused ? '#ffaa00' : '#00ff88';
  dbgTime.textContent = state.simTime.toFixed(2);
  dbgNutation.textContent = state.nutationActive ? 'Yes' : 'No';
  dbgNutation.style.color = state.nutationActive ? '#ffaa00' : '#00ff88';
}

// ─── Keyboard Controls ───
document.addEventListener('keydown', (e) => {
  switch (e.code) {
    case 'Space':
      e.preventDefault();
      state.paused = !state.paused;
      break;
    case 'ArrowUp':
      e.preventDefault();
      state.spinRate = Math.min(20.0, state.spinRate + 1.0);
      break;
    case 'ArrowDown':
      e.preventDefault();
      state.spinRate = Math.max(0.0, state.spinRate - 1.0);
      break;
    case 'KeyG':
      state.gravityEnabled = !state.gravityEnabled;
      break;
    case 'KeyD':
      state.debugVisible = !state.debugVisible;
      debugPanel.style.display = state.debugVisible ? 'block' : 'none';
      break;
    case 'KeyR':
      resetSimulation();
      break;
  }
});

// ─── Wireframe Toggle ───
document.getElementById('btn-wireframe').addEventListener('click', () => {
  state.wireframeMode = !state.wireframeMode;
  sceneMeshes.forEach(mesh => {
    if (mesh.material) {
      mesh.material.wireframe = state.wireframeMode;
    }
  });
  ground.material.wireframe = state.wireframeMode;
});

// ─── Reset ───
function resetSimulation() {
  state.spinRate = 5.0;
  state.gravityEnabled = true;
  state.paused = false;
  state.simTime = 0;
  state.precessionAngle = 0;
  state.rotorAngle = 0;
  state.nutationActive = false;
  state.tiltAngle = INITIAL_TILT;
  tiltGroup.rotation.z = INITIAL_TILT * (Math.PI / 180);
  precessionGroup.rotation.y = 0;
}

// ─── Animation Loop ───
const clock = new THREE.Clock();
let trailTimer = 0;

function animate() {
  requestAnimationFrame(animate);

  const dt = clock.getDelta();
  const clampedDt = Math.min(dt, 0.05); // prevent huge jumps

  if (!state.paused) {
    state.simTime += clampedDt;

    // Compute precession rate
    if (state.gravityEnabled && state.spinRate > 0.001) {
      const tiltRad = INITIAL_TILT * (Math.PI / 180);
      state.precessionRate = (GRAVITY * tiltRad) / (state.spinRate * 10); // scaled for visual
      // Clamp to reasonable range
      state.precessionRate = Math.min(state.precessionRate, 2.0);
    } else {
      state.precessionRate = 0;
    }

    // Precession
    state.precessionAngle += state.precessionRate * clampedDt;
    precessionGroup.rotation.y = state.precessionAngle;

    // Rotor spin
    state.rotorAngle += state.spinRate * clampedDt;
    rotorSpinGroup.rotation.y = state.rotorAngle;

    // Nutation
    state.nutationActive = state.spinRate < 1.0 && state.gravityEnabled;
    if (state.nutationActive) {
      const nutationOffset = NUTATION_AMPLITUDE * Math.sin(2 * Math.PI * NUTATION_FREQ * state.simTime);
      const baseTilt = INITIAL_TILT * (Math.PI / 180);
      tiltGroup.rotation.z = baseTilt + nutationOffset;
      state.tiltAngle = (baseTilt + nutationOffset) * (180 / Math.PI);
    } else {
      tiltGroup.rotation.z = INITIAL_TILT * (Math.PI / 180);
      state.tiltAngle = INITIAL_TILT;
    }

    // Trail particles
    trailTimer += clampedDt;
    if (trailTimer > 0.05) {
      trailTimer = 0;
      spawnTrailParticle();
    }
  }

  updateTrailParticles(clampedDt);

  // Update state object
  window.__3D_STATE__ = state;

  updateDebugPanel();
  controls.update();
  renderer.render(scene, camera);
}

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
