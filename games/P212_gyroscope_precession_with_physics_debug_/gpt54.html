<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Gyroscope Precession Simulation</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111122;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #debug-panel {
      position: absolute;
      top: 12px;
      right: 12px;
      min-width: 230px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    #debug-panel h3 {
      margin: 0 0 8px 0;
      font-size: 15px;
      font-weight: 600;
    }

    #debug-panel .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    #debug-panel .row span:last-child {
      color: #9fe3ff;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: rgba(255,255,255,0.16);
    }

    #hint {
      background: rgba(0,0,0,0.35);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.4;
      max-width: 280px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui">
      <button id="wireframe-btn">Toggle Wireframe</button>
      <div id="hint">
        <strong>Controls</strong><br>
        Space: Pause/Resume<br>
        ↑ / ↓: Spin Rate ±1<br>
        G: Toggle Gravity<br>
        D: Toggle Debug Panel<br>
        R: Reset
      </div>
    </div>

    <div id="debug-panel">
      <h3>Gyroscope Debug</h3>
      <div class="row"><span>Spin Rate</span><span id="dbg-spin">0</span></div>
      <div class="row"><span>Precession Rate</span><span id="dbg-precession">0</span></div>
      <div class="row"><span>Tilt Angle</span><span id="dbg-tilt">0</span></div>
      <div class="row"><span>Gravity</span><span id="dbg-gravity">on</span></div>
      <div class="row"><span>Paused</span><span id="dbg-paused">no</span></div>
      <div class="row"><span>Simulation Time</span><span id="dbg-time">0</span></div>
      <div class="row"><span>Nutation Active</span><span id="dbg-nutation">no</span></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.152.2/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.152.2/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.152.2/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const debugPanel = document.getElementById('debug-panel');
    const wireframeBtn = document.getElementById('wireframe-btn');

    const dbgSpin = document.getElementById('dbg-spin');
    const dbgPrec = document.getElementById('dbg-precession');
    const dbgTilt = document.getElementById('dbg-tilt');
    const dbgGravity = document.getElementById('dbg-gravity');
    const dbgPaused = document.getElementById('dbg-paused');
    const dbgTime = document.getElementById('dbg-time');
    const dbgNutation = document.getElementById('dbg-nutation');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#111122');

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(8, 6, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.5, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(6, 8, 4);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(20, 20, 0x66aaff, 0x446688);
    grid.material.transparent = true;
    grid.material.opacity = 0.35;
    scene.add(grid);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshBasicMaterial({
        color: 0x223344,
        transparent: true,
        opacity: 0.08,
        side: THREE.DoubleSide
      })
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    const nonModelMeshes = [];

    function trackMesh(mesh) {
      nonModelMeshes.push(mesh);
      return mesh;
    }

    const supportRod = trackMesh(new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.05, 3, 20),
      new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.4, roughness: 0.5 })
    ));
    supportRod.position.y = 1.5;
    scene.add(supportRod);

    const pivotMarker = trackMesh(new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 24, 24),
      new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0x330000 })
    ));
    pivotMarker.position.set(0, 3, 0);
    scene.add(pivotMarker);

    const gyroRoot = new THREE.Group();
    gyroRoot.position.set(0, 3, 0);
    scene.add(gyroRoot);

    const axisTiltGroup = new THREE.Group();
    gyroRoot.add(axisTiltGroup);

    const axisMat = new THREE.MeshStandardMaterial({
      color: 0xd4af37,
      metalness: 0.7,
      roughness: 0.35
    });

    const axisMesh = trackMesh(new THREE.Mesh(
      new THREE.CylinderGeometry(0.04, 0.04, 4, 20),
      axisMat
    ));
    axisMesh.position.y = 2.0;
    axisTiltGroup.add(axisMesh);

    const rotorSpinGroup = new THREE.Group();
    rotorSpinGroup.position.y = 3.5;
    axisTiltGroup.add(rotorSpinGroup);

    const topCap = trackMesh(new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0xe6c45a, metalness: 0.8, roughness: 0.3 })
    ));
    topCap.position.y = 4.0;
    axisTiltGroup.add(topCap);

    const loader = new GLTFLoader();
    let lanternRoot = null;

    loader.load(
      '._Lantern.glb',
      (gltf) => {
        lanternRoot = gltf.scene;
        lanternRoot.scale.setScalar(0.5);
        lanternRoot.position.set(0, 0.0, 0);
        lanternRoot.rotation.x = Math.PI / 2;

        lanternRoot.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = false;
            obj.receiveShadow = false;
            if (obj.material) {
              obj.material.side = THREE.DoubleSide;
            }
          }
        });

        rotorSpinGroup.add(lanternRoot);
        state.modelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load model:', err);
      }
    );

    const DEG = Math.PI / 180;
    const INITIAL_TILT = 30 * DEG;
    const NUTATION_AMPLITUDE = 5 * DEG;
    const NUTATION_FREQ = 3.0;
    const DEFAULT_SPIN = 5.0;
    const DEFAULT_PRECESSION = 0.3;
    const GRAVITY_CONSTANT = DEFAULT_PRECESSION * DEFAULT_SPIN / INITIAL_TILT;

    const state = {
      spinRate: DEFAULT_SPIN,
      precessionRate: DEFAULT_PRECESSION,
      tiltAngle: 30,
      gravityEnabled: true,
      paused: false,
      simTime: 0,
      nutationActive: false,
      debugVisible: true,
      wireframeMode: false,
      modelLoaded: false,
      precessionAngle: 0,
      rotorAngle: 0
    };

    window.__3D_STATE__ = state;

    function setWireframe(enabled) {
      nonModelMeshes.forEach((mesh) => {
        if (mesh.material) {
          mesh.material.wireframe = enabled;
        }
      });
      state.wireframeMode = enabled;
    }

    wireframeBtn.addEventListener('click', () => {
      setWireframe(!state.wireframeMode);
    });

    function resetSimulation() {
      state.spinRate = DEFAULT_SPIN;
      state.gravityEnabled = true;
      state.paused = false;
      state.simTime = 0;
      state.nutationActive = false;
      state.precessionAngle = 0;
      state.rotorAngle = 0;
      state.precessionRate = DEFAULT_PRECESSION;
    }

    function updateDebug() {
      dbgSpin.textContent = state.spinRate.toFixed(2) + ' rad/s';
      dbgPrec.textContent = state.precessionRate.toFixed(3) + ' rad/s';
      dbgTilt.textContent = state.tiltAngle.toFixed(2) + '°';
      dbgGravity.textContent = state.gravityEnabled ? 'on' : 'off';
      dbgPaused.textContent = state.paused ? 'yes' : 'no';
      dbgTime.textContent = state.simTime.toFixed(2) + ' s';
      dbgNutation.textContent = state.nutationActive ? 'yes' : 'no';
      debugPanel.style.display = state.debugVisible ? 'block' : 'none';
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        state.paused = !state.paused;
      } else if (e.code === 'ArrowUp') {
        e.preventDefault();
        state.spinRate = Math.min(20.0, state.spinRate + 1.0);
      } else if (e.code === 'ArrowDown') {
        e.preventDefault();
        state.spinRate = Math.max(0.0, state.spinRate - 1.0);
      } else if (e.code === 'KeyG') {
        state.gravityEnabled = !state.gravityEnabled;
      } else if (e.code === 'KeyD') {
        state.debugVisible = !state.debugVisible;
      } else if (e.code === 'KeyR') {
        resetSimulation();
      }
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      let dt = clock.getDelta();
      dt = Math.min(dt, 0.05);

      if (!state.paused) {
        state.simTime += dt;

        if (state.gravityEnabled && state.spinRate > 0.0001) {
          state.precessionRate = GRAVITY_CONSTANT * INITIAL_TILT / state.spinRate;
        } else {
          state.precessionRate = 0;
        }

        if (state.gravityEnabled && state.spinRate > 0 && Math.abs(state.precessionRate - DEFAULT_PRECESSION) < 0.02) {
          state.precessionRate = DEFAULT_PRECESSION;
        }

        if (state.gravityEnabled) {
          state.precessionAngle += state.precessionRate * dt;
        }

        state.rotorAngle += state.spinRate * dt;
      }

      state.nutationActive = state.spinRate < 1.0;

      let currentTilt = INITIAL_TILT;
      if (state.nutationActive) {
        currentTilt += NUTATION_AMPLITUDE * Math.sin(2 * Math.PI * NUTATION_FREQ * state.simTime);
      }

      state.tiltAngle = THREE.MathUtils.radToDeg(currentTilt);

      gyroRoot.rotation.y = state.precessionAngle;
      axisTiltGroup.rotation.z = -currentTilt;
      rotorSpinGroup.rotation.y = state.rotorAngle;

      window.__3D_STATE__.spinRate = state.spinRate;
      window.__3D_STATE__.precessionRate = state.precessionRate;
      window.__3D_STATE__.tiltAngle = state.tiltAngle;
      window.__3D_STATE__.gravityEnabled = state.gravityEnabled;
      window.__3D_STATE__.paused = state.paused;
      window.__3D_STATE__.simTime = state.simTime;
      window.__3D_STATE__.nutationActive = state.nutationActive;
      window.__3D_STATE__.debugVisible = state.debugVisible;
      window.__3D_STATE__.wireframeMode = state.wireframeMode;
      window.__3D_STATE__.modelLoaded = state.modelLoaded;
      window.__3D_STATE__.precessionAngle = state.precessionAngle;
      window.__3D_STATE__.rotorAngle = state.rotorAngle;

      updateDebug();
      controls.update();
      renderer.render(scene, camera);
    }

    resetSimulation();
    updateDebug();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
