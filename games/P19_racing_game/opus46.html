<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Racing Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }
#hud {
  position: absolute; top: 20px; left: 20px;
  color: #fff; font-size: 18px;
  background: rgba(0,0,0,0.6); padding: 15px 20px;
  border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
  line-height: 1.8; min-width: 220px;
  backdrop-filter: blur(5px);
}
#hud .label { color: #aaa; font-size: 14px; }
#hud .value { color: #0f0; font-weight: bold; font-size: 22px; }
#speed-display { font-size: 36px !important; color: #0ff !important; }
#resetBtn {
  position: absolute; bottom: 30px; right: 30px;
  padding: 12px 30px; font-size: 18px; font-weight: bold;
  background: linear-gradient(135deg, #e74c3c, #c0392b);
  color: #fff; border: none; border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 15px rgba(231,76,60,0.4);
}
#resetBtn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(231,76,60,0.6); }
#controls-info {
  position: absolute; bottom: 30px; left: 20px;
  color: #aaa; font-size: 14px;
  background: rgba(0,0,0,0.5); padding: 10px 15px;
  border-radius: 8px; line-height: 1.6;
}
#controls-info kbd {
  background: rgba(255,255,255,0.15); padding: 2px 8px;
  border-radius: 4px; border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
}
#lap-flash {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  color: #ff0; font-size: 48px; font-weight: bold;
  text-shadow: 0 0 20px rgba(255,255,0,0.8);
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>

<div id="hud">
  <div><span class="label">SPEED</span><br><span class="value" id="speed-display"><span id="speed">0</span> km/h</span></div>
  <hr style="border-color:rgba(255,255,255,0.1);margin:8px 0;">
  <div><span class="label">LAP</span> <span class="value" id="lapCount">0</span></div>
  <div><span class="label">TIME</span> <span class="value" id="raceTime">0:00.000</span></div>
  <div><span class="label">BEST LAP</span> <span class="value" id="bestLap">--:--.---</span></div>
</div>

<div id="lap-flash"></div>

<div id="controls-info">
  <kbd>W</kbd> Accelerate &nbsp; <kbd>S</kbd> Brake<br>
  <kbd>A</kbd> Steer Left &nbsp; <kbd>D</kbd> Steer Right
</div>

<button id="resetBtn">RESET</button>

<script type="module">
import * as THREE from 'three';

// ─── Automated testing keys ───
window.__keys__ = { KeyW: false, KeyS: false, KeyA: false, KeyD: false };

// ─── State exposure ───
window.__3D_STATE__ = {
  speed: 0,
  position: { x: 0, y: 0, z: 0 },
  rotation: 0,
  steeringAngle: 0,
  lapCount: 0,
  raceTime: 0,
  bestLapTime: null,
  startPosition: { x: 0, y: 0, z: 0 }
};

// ─── Keyboard state ───
const localKeys = { KeyW: false, KeyS: false, KeyA: false, KeyD: false };
document.addEventListener('keydown', (e) => { if (localKeys.hasOwnProperty(e.code)) localKeys[e.code] = true; });
document.addEventListener('keyup', (e) => { if (localKeys.hasOwnProperty(e.code)) localKeys[e.code] = false; });

function isPressed(code) {
  return localKeys[code] || window.__keys__[code];
}

// ─── Scene setup ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 100, 400);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Lights ───
const ambientLight = new THREE.AmbientLight(0x404060, 0.8);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(50, 80, 30);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -150;
dirLight.shadow.camera.right = 150;
dirLight.shadow.camera.top = 150;
dirLight.shadow.camera.bottom = -150;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x8888ff, 0x444422, 0.5);
scene.add(hemiLight);

// ─── Track parameters ───
const trackRadiusX = 100;
const trackRadiusZ = 60;
const trackWidth = 14;
const trackSegments = 200;

// Generate elliptical track points
function getTrackPoint(t) {
  const angle = t * Math.PI * 2;
  return new THREE.Vector3(
    Math.cos(angle) * trackRadiusX,
    0,
    Math.sin(angle) * trackRadiusZ
  );
}

function getTrackTangent(t) {
  const angle = t * Math.PI * 2;
  const tangent = new THREE.Vector3(
    -Math.sin(angle) * trackRadiusX,
    0,
    Math.cos(angle) * trackRadiusZ
  );
  return tangent.normalize();
}

// ─── Build track surface ───
function buildTrack() {
  const trackPoints = [];
  for (let i = 0; i <= trackSegments; i++) {
    trackPoints.push(getTrackPoint(i / trackSegments));
  }

  // Track surface
  const trackGeo = new THREE.BufferGeometry();
  const vertices = [];
  const uvs = [];
  const indices = [];

  for (let i = 0; i <= trackSegments; i++) {
    const t = i / trackSegments;
    const point = getTrackPoint(t);
    const tangent = getTrackTangent(t);
    const normal = new THREE.Vector3(-tangent.z, 0, tangent.x);

    const left = point.clone().add(normal.clone().multiplyScalar(trackWidth / 2));
    const right = point.clone().add(normal.clone().multiplyScalar(-trackWidth / 2));

    vertices.push(left.x, 0.01, left.z);
    vertices.push(right.x, 0.01, right.z);
    uvs.push(t * 20, 0);
    uvs.push(t * 20, 1);

    if (i < trackSegments) {
      const base = i * 2;
      indices.push(base, base + 1, base + 2);
      indices.push(base + 1, base + 3, base + 2);
    }
  }

  trackGeo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  trackGeo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  trackGeo.setIndex(indices);
  trackGeo.computeVertexNormals();

  // Create track texture
  const trackCanvas = document.createElement('canvas');
  trackCanvas.width = 256;
  trackCanvas.height = 64;
  const ctx = trackCanvas.getContext('2d');
  ctx.fillStyle = '#333';
  ctx.fillRect(0, 0, 256, 64);
  // Lane markings
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.setLineDash([10, 10]);
  ctx.beginPath();
  ctx.moveTo(0, 32);
  ctx.lineTo(256, 32);
  ctx.stroke();
  // Edge lines
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(0, 2);
  ctx.lineTo(256, 2);
  ctx.moveTo(0, 62);
  ctx.lineTo(256, 62);
  ctx.stroke();

  const trackTexture = new THREE.CanvasTexture(trackCanvas);
  trackTexture.wrapS = THREE.RepeatWrapping;
  trackTexture.wrapT = THREE.RepeatWrapping;

  const trackMat = new THREE.MeshStandardMaterial({
    map: trackTexture,
    roughness: 0.8,
    metalness: 0.1
  });

  const trackMesh = new THREE.Mesh(trackGeo, trackMat);
  trackMesh.receiveShadow = true;
  scene.add(trackMesh);

  // ─── Barriers ───
  const barrierHeight = 1.5;
  const barrierThickness = 0.5;

  function createBarrier(side) {
    const barrierGeo = new THREE.BufferGeometry();
    const bVerts = [];
    const bIndices = [];

    const offset = (trackWidth / 2 + barrierThickness / 2) * side;

    for (let i = 0; i <= trackSegments; i++) {
      const t = i / trackSegments;
      const point = getTrackPoint(t);
      const tangent = getTrackTangent(t);
      const normal = new THREE.Vector3(-tangent.z, 0, tangent.x);

      const pos = point.clone().add(normal.clone().multiplyScalar(offset));

      // Bottom
      bVerts.push(pos.x - normal.x * barrierThickness / 2, 0, pos.z - normal.z * barrierThickness / 2);
      bVerts.push(pos.x + normal.x * barrierThickness / 2, 0, pos.z + normal.z * barrierThickness / 2);
      // Top
      bVerts.push(pos.x - normal.x * barrierThickness / 2, barrierHeight, pos.z - normal.z * barrierThickness / 2);
      bVerts.push(pos.x + normal.x * barrierThickness / 2, barrierHeight, pos.z + normal.z * barrierThickness / 2);

      if (i < trackSegments) {
        const base = i * 4;
        // Outer face
        bIndices.push(base, base + 4, base + 6, base, base + 6, base + 2);
        // Inner face
        bIndices.push(base + 1, base + 3, base + 7, base + 1, base + 7, base + 5);
        // Top face
        bIndices.push(base + 2, base + 6, base + 7, base + 2, base + 7, base + 3);
      }
    }

    barrierGeo.setAttribute('position', new THREE.Float32BufferAttribute(bVerts, 3));
    barrierGeo.setIndex(bIndices);
    barrierGeo.computeVertexNormals();

    // Alternating red/white barrier look
    const barrierCanvas = document.createElement('canvas');
    barrierCanvas.width = 64;
    barrierCanvas.height = 64;
    const bctx = barrierCanvas.getContext('2d');
    bctx.fillStyle = '#cc0000';
    bctx.fillRect(0, 0, 32, 64);
    bctx.fillStyle = '#ffffff';
    bctx.fillRect(32, 0, 32, 64);
    const barrierTex = new THREE.CanvasTexture(barrierCanvas);
    barrierTex.wrapS = THREE.RepeatWrapping;
    barrierTex.wrapT = THREE.RepeatWrapping;

    const barrierMat = new THREE.MeshStandardMaterial({
      color: side > 0 ? 0xcc2222 : 0x2222cc,
      roughness: 0.6,
      metalness: 0.3
    });

    const barrierMesh = new THREE.Mesh(barrierGeo, barrierMat);
    barrierMesh.castShadow = true;
    barrierMesh.receiveShadow = true;
    scene.add(barrierMesh);
  }

  createBarrier(1);
  createBarrier(-1);
}

buildTrack();

// Store barrier collision data
const barrierCollisionData = [];
for (let i = 0; i < trackSegments; i++) {
  const t = i / trackSegments;
  const point = getTrackPoint(t);
  const tangent = getTrackTangent(t);
  const normal = new THREE.Vector3(-tangent.z, 0, tangent.x);
  barrierCollisionData.push({ point, tangent, normal });
}

// ─── Ground ───
const groundGeo = new THREE.PlaneGeometry(500, 500);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a4d1a, roughness: 1.0 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// ─── Start/Finish line ───
const startT = 0;
const startPoint = getTrackPoint(startT);
const startTangent = getTrackTangent(startT);
const startNormal = new THREE.Vector3(-startTangent.z, 0, startTangent.x);

const startLineGeo = new THREE.PlaneGeometry(trackWidth, 2);
const startLineCanvas = document.createElement('canvas');
startLineCanvas.width = 128;
startLineCanvas.height = 32;
const slCtx = startLineCanvas.getContext('2d');
for (let x = 0; x < 16; x++) {
  for (let y = 0; y < 4; y++) {
    slCtx.fillStyle = (x + y) % 2 === 0 ? '#fff' : '#000';
    slCtx.fillRect(x * 8, y * 8, 8, 8);
  }
}
const startLineTex = new THREE.CanvasTexture(startLineCanvas);
const startLineMat = new THREE.MeshStandardMaterial({ map: startLineTex, roughness: 0.5 });
const startLine = new THREE.Mesh(startLineGeo, startLineMat);
startLine.rotation.x = -Math.PI / 2;
startLine.position.copy(startPoint);
startLine.position.y = 0.02;
// Rotate to align with track
const startAngle = Math.atan2(startTangent.x, startTangent.z);
startLine.rotation.z = -startAngle + Math.PI / 2;
scene.add(startLine);

// Start arch
const archGeo = new THREE.BoxGeometry(0.5, 5, 0.5);
const archMat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.5 });
const archLeft = new THREE.Mesh(archGeo, archMat);
archLeft.position.copy(startPoint).add(startNormal.clone().multiplyScalar(trackWidth / 2));
archLeft.position.y = 2.5;
scene.add(archLeft);
const archRight = new THREE.Mesh(archGeo, archMat);
archRight.position.copy(startPoint).add(startNormal.clone().multiplyScalar(-trackWidth / 2));
archRight.position.y = 2.5;
scene.add(archRight);
const archTop = new THREE.Mesh(new THREE.BoxGeometry(trackWidth + 1, 0.5, 0.5), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
archTop.position.copy(startPoint);
archTop.position.y = 5;
scene.add(archTop);

// ─── Scenery ───
function addTree(x, z) {
  const trunkGeo = new THREE.CylinderGeometry(0.3, 0.4, 3, 8);
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.set(x, 1.5, z);
  trunk.castShadow = true;
  scene.add(trunk);

  const leavesGeo = new THREE.SphereGeometry(2, 8, 6);
  const leavesMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
  const leaves = new THREE.Mesh(leavesGeo, leavesMat);
  leaves.position.set(x, 4, z);
  leaves.castShadow = true;
  scene.add(leaves);
}

// Place trees around the track
for (let i = 0; i < 60; i++) {
  const t = i / 60;
  const point = getTrackPoint(t);
  const tangent = getTrackTangent(t);
  const normal = new THREE.Vector3(-tangent.z, 0, tangent.x);

  const outerDist = trackWidth / 2 + 8 + Math.random() * 20;
  if (Math.random() > 0.3) {
    addTree(point.x + normal.x * outerDist, point.z + normal.z * outerDist);
  }
  if (Math.random() > 0.3) {
    addTree(point.x - normal.x * outerDist, point.z - normal.z * outerDist);
  }
}

// ─── Build Car ───
const car = new THREE.Group();

// Car body
const bodyGeo = new THREE.BoxGeometry(2, 0.6, 4);
const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff3300, metalness: 0.6, roughness: 0.3 });
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.position.y = 0.5;
body.castShadow = true;
car.add(body);

// Cabin
const cabinGeo = new THREE.BoxGeometry(1.6, 0.5, 2);
const cabinMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 });
const cabin = new THREE.Mesh(cabinGeo, cabinMat);
cabin.position.set(0, 1.0, -0.3);
cabin.castShadow = true;
car.add(cabin);

// Spoiler
const spoilerGeo = new THREE.BoxGeometry(2, 0.1, 0.5);
const spoilerMat = new THREE.MeshStandardMaterial({ color: 0xff3300, metalness: 0.6 });
const spoiler = new THREE.Mesh(spoilerGeo, spoilerMat);
spoiler.position.set(0, 1.2, -1.8);
car.add(spoiler);
const spoilerStandGeo = new THREE.BoxGeometry(0.1, 0.4, 0.1);
const spoilerStandL = new THREE.Mesh(spoilerStandGeo, spoilerMat);
spoilerStandL.position.set(-0.7, 1.0, -1.8);
car.add(spoilerStandL);
const spoilerStandR = new THREE.Mesh(spoilerStandGeo, spoilerMat);
spoilerStandR.position.set(0.7, 1.0, -1.8);
car.add(spoilerStandR);

// Headlights
const headlightGeo = new THREE.SphereGeometry(0.15, 8, 8);
const headlightMat = new THREE.MeshStandardMaterial({ color: 0xffffaa, emissive: 0xffffaa, emissiveIntensity: 1 });
const hlL = new THREE.Mesh(headlightGeo, headlightMat);
hlL.position.set(-0.6, 0.5, 2);
car.add(hlL);
const hlR = new THREE.Mesh(headlightGeo, headlightMat);
hlR.position.set(0.6, 0.5, 2);
car.add(hlR);

// Taillights
const taillightMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.5 });
const tlL = new THREE.Mesh(headlightGeo, taillightMat);
tlL.position.set(-0.6, 0.5, -2);
car.add(tlL);
const tlR = new THREE.Mesh(headlightGeo, taillightMat);
tlR.position.set(0.6, 0.5, -2);
car.add(tlR);

// Wheels
const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.3, 16);
const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
const wheelPositions = [
  { x: -1.1, y: 0.35, z: 1.2 },
  { x: 1.1, y: 0.35, z: 1.2 },
  { x: -1.1, y: 0.35, z: -1.2 },
  { x: 1.1, y: 0.35, z: -1.2 }
];

const wheels = [];
wheelPositions.forEach(pos => {
  const wheel = new THREE.Mesh(wheelGeo, wheelMat);
  wheel.rotation.z = Math.PI / 2;
  wheel.position.set(pos.x, pos.y, pos.z);
  wheel.castShadow = true;
  car.add(wheel);
  wheels.push(wheel);
});

// Hub caps
const hubGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.32, 6);
const hubMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8 });
wheelPositions.forEach(pos => {
  const hub = new THREE.Mesh(hubGeo, hubMat);
  hub.rotation.z = Math.PI / 2;
  hub.position.set(pos.x, pos.y, pos.z);
  car.add(hub);
});

scene.add(car);

// ─── Car physics state ───
const wheelbase = 2.4; // distance between front and rear axles
const maxSpeed = 50;
const acceleration = 15;
const brakeDecel = 30;
const naturalDrag = 2;
const maxSteeringAngle = 30 * Math.PI / 180; // ~0.5236 rad
const steeringSpeed = 2.5; // rad/s for steering input
const steeringReturnSpeed = 4.0; // rad/s for centering

// Starting position: on the track at t=0, facing along the tangent
const startPos = getTrackPoint(0).clone();
startPos.y = 0;
const startHeading = Math.atan2(startTangent.x, startTangent.z);

let carSpeed = 0;
let carHeading = startHeading;
let steeringAngle = 0;
let carPosition = startPos.clone();

car.position.copy(carPosition);
car.rotation.y = carHeading;

// ─── Lap tracking ───
let lapCount = 0;
let raceTime = 0;
let lapStartTime = 0;
let bestLapTime = Infinity;
let lastCrossSign = 0; // for detecting crossing the start line
let raceStarted = false;

// Store start position for state exposure
const startPositionRef = startPos.clone();
window.__3D_STATE__.startPosition = { x: startPositionRef.x, y: startPositionRef.y, z: startPositionRef.z };

// ─── Collision detection with barriers ───
function getClosestTrackInfo(pos) {
  let minDist = Infinity;
  let bestIdx = 0;
  for (let i = 0; i < barrierCollisionData.length; i++) {
    const d = pos.distanceTo(barrierCollisionData[i].point);
    if (d < minDist) {
      minDist = d;
      bestIdx = i;
    }
  }
  return barrierCollisionData[bestIdx];
}

function checkBarrierCollision(pos) {
  const info = getClosestTrackInfo(pos);
  const toPos = new THREE.Vector3().subVectors(pos, info.point);
  const lateralDist = toPos.dot(info.normal);
  const halfTrack = trackWidth / 2;

  if (Math.abs(lateralDist) > halfTrack - 0.8) {
    return {
      collided: true,
      normal: info.normal.clone().multiplyScalar(Math.sign(lateralDist)),
      pushBack: Math.abs(lateralDist) - (halfTrack - 0.8)
    };
  }
  return { collided: false };
}

// ─── Start line crossing detection ───
function checkStartLineCrossing(oldPos, newPos) {
  // Project positions onto the start line direction (tangent)
  const toOld = new THREE.Vector3().subVectors(oldPos, startPoint);
  const toNew = new THREE.Vector3().subVectors(newPos, startPoint);

  const oldDot = toOld.dot(startTangent);
  const newDot = toNew.dot(startTangent);

  // Check if we're near the start line laterally
  const lateralDist = Math.abs(toNew.dot(startNormal));
  if (lateralDist > trackWidth / 2) return false;

  // Crossing detection: sign change of dot product with tangent
  if (oldDot < 0 && newDot >= 0 && carSpeed > 1) {
    return true;
  }
  return false;
}

// ─── HUD update ───
function updateHUD() {
  document.getElementById('speed').textContent = Math.round(carSpeed * 3.6); // convert to km/h-ish display
  document.getElementById('lapCount').textContent = lapCount;
  document.getElementById('raceTime').textContent = formatTime(raceTime);
  document.getElementById('bestLap').textContent = bestLapTime === Infinity ? '--:--.---' : formatTime(bestLapTime);
}

function formatTime(t) {
  const mins = Math.floor(t / 60);
  const secs = t % 60;
  return `${mins}:${secs < 10 ? '0' : ''}${secs.toFixed(3)}`;
}

function flashLap(text) {
  const el = document.getElementById('lap-flash');
  el.textContent = text;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 1500);
}

// ─── Reset ───
function resetGame() {
  carSpeed = 0;
  carHeading = startHeading;
  steeringAngle = 0;
  carPosition.copy(startPos);
  car.position.copy(carPosition);
  car.rotation.y = carHeading;
  lapCount = 0;
  raceTime = 0;
  lapStartTime = 0;
  bestLapTime = Infinity;
  raceStarted = false;
  lastCrossSign = 0;
  updateHUD();
}

document.getElementById('resetBtn').addEventListener('click', resetGame);

// ─── Animation loop ───
const clock = new THREE.Clock();
let previousPosition = carPosition.clone();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.05); // cap delta time

  // ─── Input ───
  const wPressed = isPressed('KeyW');
  const sPressed = isPressed('KeyS');
  const aPressed = isPressed('KeyA');
  const dPressed = isPressed('KeyD');

  // ─── Steering ───
  if (aPressed) {
    steeringAngle += steeringSpeed * dt;
  } else if (dPressed) {
    steeringAngle -= steeringSpeed * dt;
  } else {
    // Return to center
    if (steeringAngle > 0) {
      steeringAngle = Math.max(0, steeringAngle - steeringReturnSpeed * dt);
    } else if (steeringAngle < 0) {
      steeringAngle = Math.min(0, steeringAngle + steeringReturnSpeed * dt);
    }
  }
  steeringAngle = THREE.MathUtils.clamp(steeringAngle, -maxSteeringAngle, maxSteeringAngle);

  // ─── Speed ───
  if (wPressed) {
    carSpeed += acceleration * dt;
  } else if (sPressed) {
    carSpeed -= brakeDecel * dt;
  } else {
    // Natural drag
    if (carSpeed > 0) {
      carSpeed = Math.max(0, carSpeed - naturalDrag * dt);
    } else if (carSpeed < 0) {
      carSpeed = Math.min(0, carSpeed + naturalDrag * dt);
    }
  }
  carSpeed = THREE.MathUtils.clamp(carSpeed, -maxSpeed * 0.3, maxSpeed);

  // ─── Bicycle model: update heading ───
  if (Math.abs(steeringAngle) > 0.001 && Math.abs(carSpeed) > 0.01) {
    const turnRadius = wheelbase / Math.tan(steeringAngle);
    const angularVelocity = carSpeed / turnRadius;
    carHeading += angularVelocity * dt;
  }

  // ─── Update position ───
  previousPosition.copy(carPosition);

  const dx = Math.sin(carHeading) * carSpeed * dt;
  const dz = Math.cos(carHeading) * carSpeed * dt;
  carPosition.x += dx;
  carPosition.z += dz;

  // ─── Barrier collision ───
  const collision = checkBarrierCollision(carPosition);
  if (collision.collided) {
    // Push back
    carPosition.add(collision.normal.clone().multiplyScalar(-collision.pushBack));

    // Reflect velocity
    const headingVec = new THREE.Vector3(Math.sin(carHeading), 0, Math.cos(carHeading));
    const dot = headingVec.dot(collision.normal);
    const reflected = headingVec.sub(collision.normal.multiplyScalar(2 * dot)).normalize();
    carHeading = Math.atan2(reflected.x, reflected.z);

    carSpeed *= -0.5;
    if (Math.abs(carSpeed) < 0.5) carSpeed = 0;
  }

  // ─── Update car transform ───
  car.position.copy(carPosition);
  car.position.y = 0;
  car.rotation.y = carHeading;

  // Wheel rotation (spinning)
  const wheelRotSpeed = carSpeed / 0.35; // angular speed based on wheel radius
  wheels.forEach(w => {
    w.rotation.x += wheelRotSpeed * dt;
  });

  // ─── Race timing ───
  if (carSpeed > 0.1) {
    raceStarted = true;
  }

  if (raceStarted) {
    raceTime += dt;
  }

  // ─── Lap detection ───
  if (raceStarted && checkStartLineCrossing(previousPosition, carPosition)) {
    if (lapCount > 0) {
      const lapTime = raceTime - lapStartTime;
      if (lapTime < bestLapTime && lapTime > 1) {
        bestLapTime = lapTime;
        flashLap(`🏆 Best Lap: ${formatTime(lapTime)}`);
      } else {
        flashLap(`Lap ${lapCount}: ${formatTime(lapTime)}`);
      }
    } else {
      flashLap('GO!');
    }
    lapCount++;
    lapStartTime = raceTime;
  }

  // ─── Camera follow ───
  const cameraOffset = new THREE.Vector3(0, 6, -14);
  const rotatedOffset = cameraOffset.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), carHeading);
  const targetCamPos = carPosition.clone().add(rotatedOffset);

  camera.position.lerp(targetCamPos, 0.05);
  const lookTarget = carPosition.clone().add(new THREE.Vector3(Math.sin(carHeading) * 5, 1, Math.cos(carHeading) * 5));
  camera.lookAt(lookTarget);

  // ─── Update HUD ───
  updateHUD();

  // ─── Update state ───
  window.__3D_STATE__.speed = carSpeed;
  window.__3D_STATE__.position = { x: carPosition.x, y: carPosition.y, z: carPosition.z };
  window.__3D_STATE__.rotation = carHeading;
  window.__3D_STATE__.steeringAngle = steeringAngle;
  window.__3D_STATE__.lapCount = lapCount;
  window.__3D_STATE__.raceTime = raceTime;
  window.__3D_STATE__.bestLapTime = bestLapTime === Infinity ? null : bestLapTime;

  renderer.render(scene, camera);
}

// Initialize camera position
camera.position.set(startPos.x - 14 * Math.sin(startHeading), 6, startPos.z - 14 * Math.cos(startHeading));
camera.lookAt(startPos);

animate();
</script>
