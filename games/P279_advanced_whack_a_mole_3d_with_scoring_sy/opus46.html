<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Whack-a-Mole</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #fff;
    font-size: 18px;
    background: rgba(0,0,0,0.6);
    padding: 12px 18px;
    border-radius: 10px;
    line-height: 1.8;
    z-index: 10;
    min-width: 180px;
}

#hud .label { color: #aaa; font-size: 14px; }
#scoreDisplay { color: #ffd700; font-weight: bold; font-size: 24px; }
#timerDisplay { color: #ff6b6b; font-weight: bold; font-size: 24px; }
#comboDisplay { color: #00ff88; font-weight: bold; font-size: 20px; }

#startBtn {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 40px;
    font-size: 22px;
    font-weight: bold;
    background: linear-gradient(135deg, #ff6b35, #f7c948);
    color: #fff;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    z-index: 20;
    box-shadow: 0 4px 15px rgba(255,107,53,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
}
#startBtn:hover {
    transform: translateX(-50%) scale(1.05);
    box-shadow: 0 6px 20px rgba(255,107,53,0.7);
}

#gameOverOverlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    z-index: 15;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}
#gameOverOverlay.show {
    display: flex;
}
#gameOverOverlay h1 {
    color: #ff6b6b;
    font-size: 60px;
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(255,107,107,0.5);
}
#gameOverOverlay .final-score {
    color: #ffd700;
    font-size: 36px;
    margin-bottom: 10px;
}
#gameOverOverlay .stats {
    color: #ccc;
    font-size: 20px;
    margin-bottom: 30px;
    text-align: center;
    line-height: 1.6;
}

#hitEffect {
    position: absolute;
    pointer-events: none;
    color: #ffd700;
    font-size: 28px;
    font-weight: bold;
    z-index: 12;
    display: none;
    text-shadow: 0 0 10px rgba(255,215,0,0.8);
}
</style>
</head>
<body>

<div id="hud">
    <div><span class="label">SCORE</span><br><span id="scoreDisplay">0</span></div>
    <div style="margin-top:6px;"><span class="label">TIME</span><br><span id="timerDisplay">30</span></div>
    <div style="margin-top:6px;"><span class="label">COMBO</span><br><span id="comboDisplay">x1</span></div>
</div>

<button id="startBtn">Start Game</button>

<div id="gameOverOverlay">
    <h1>GAME OVER</h1>
    <div class="final-score" id="finalScore">Score: 0</div>
    <div class="stats" id="finalStats"></div>
</div>

<div id="hitEffect">+10</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    gameState: 'waiting',
    score: 0,
    whackCount: 0,
    missCount: 0,
    timer: 30,
    comboMultiplier: 1,
    activeMoles: 0,
    totalRounds: 0,
    difficultyLevel: 1,
    modelLoaded: false
};

const state = window.__3D_STATE__;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 15, 30);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x4a8c3f, 0.3);
scene.add(hemiLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(14, 14);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x4a8c3f, roughness: 0.8, metalness: 0.1 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Decorative border
const borderGeo = new THREE.BoxGeometry(15, 0.3, 15);
const borderMat = new THREE.MeshStandardMaterial({ color: 0x5c3a1e, roughness: 0.9 });
const border = new THREE.Mesh(borderGeo, borderMat);
border.position.y = -0.15;
scene.add(border);

// Hole positions
const holePositions = [
    [-3, 0, -3], [0, 0, -3], [3, 0, -3],
    [-3, 0, 0],  [0, 0, 0],  [3, 0, 0],
    [-3, 0, 3],  [0, 0, 3],  [3, 0, 3]
];

// Create holes
const holes = [];
holePositions.forEach((pos, i) => {
    // Dark hole base
    const holeGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.1, 32);
    const holeMat = new THREE.MeshStandardMaterial({ color: 0x2a1a0a, roughness: 1.0 });
    const holeMesh = new THREE.Mesh(holeGeo, holeMat);
    holeMesh.position.set(pos[0], 0.05, pos[2]);
    holeMesh.receiveShadow = true;
    scene.add(holeMesh);

    // Hole rim
    const rimGeo = new THREE.TorusGeometry(0.65, 0.08, 8, 32);
    const rimMat = new THREE.MeshStandardMaterial({ color: 0x5c3a1e, roughness: 0.7 });
    const rim = new THREE.Mesh(rimGeo, rimMat);
    rim.rotation.x = -Math.PI / 2;
    rim.position.set(pos[0], 0.1, pos[2]);
    scene.add(rim);

    // Inner dark circle for depth illusion
    const innerGeo = new THREE.CircleGeometry(0.55, 32);
    const innerMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a });
    const inner = new THREE.Mesh(innerGeo, innerMat);
    inner.rotation.x = -Math.PI / 2;
    inner.position.set(pos[0], 0.06, pos[2]);
    scene.add(inner);

    holes.push({
        position: new THREE.Vector3(pos[0], 0, pos[2]),
        mesh: holeMesh,
        mole: null,
        isUp: false,
        isWhacked: false,
        animating: false,
        upTime: 0,
        targetY: -1.5,
        currentY: -1.5
    });
});

// Load GLTF model
const loader = new GLTFLoader();
let baseModel = null;

loader.load(
    'MosquitoInAmber.glb',
    (gltf) => {
        baseModel = gltf.scene;

        // Calculate bounding box to normalize scale
        const box = new THREE.Box3().setFromObject(baseModel);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 1.0 / maxDim;
        baseModel.scale.set(scale, scale, scale);

        // Center the model
        const center = new THREE.Vector3();
        box.getCenter(center);
        baseModel.position.sub(center.multiplyScalar(scale));

        // Create moles for each hole
        holes.forEach((hole, i) => {
            const mole = baseModel.clone();
            mole.position.set(hole.position.x, -1.5, hole.position.z);
            mole.castShadow = true;
            mole.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.material = child.material.clone();
                    child.userData.originalColor = child.material.color.clone();
                }
            });
            scene.add(mole);
            hole.mole = mole;
            hole.currentY = -1.5;
        });

        state.modelLoaded = true;
        console.log('Model loaded successfully');
    },
    (progress) => {
        console.log('Loading:', (progress.loaded / progress.total * 100).toFixed(1) + '%');
    },
    (error) => {
        console.error('Error loading model:', error);
        // Fallback: create simple sphere moles
        createFallbackMoles();
    }
);

function createFallbackMoles() {
    holes.forEach((hole) => {
        const group = new THREE.Group();

        // Body (amber sphere)
        const bodyGeo = new THREE.SphereGeometry(0.4, 16, 16);
        const bodyMat = new THREE.MeshStandardMaterial({
            color: 0xd4a017,
            roughness: 0.3,
            metalness: 0.1,
            transparent: true,
            opacity: 0.85
        });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.userData.originalColor = bodyMat.color.clone();
        group.add(body);

        // Eyes
        const eyeGeo = new THREE.SphereGeometry(0.08, 8, 8);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
        leftEye.position.set(-0.15, 0.1, 0.35);
        leftEye.userData.originalColor = eyeMat.color.clone();
        group.add(leftEye);

        const rightEye = new THREE.Mesh(eyeGeo, eyeMat.clone());
        rightEye.position.set(0.15, 0.1, 0.35);
        rightEye.userData.originalColor = eyeMat.color.clone();
        group.add(rightEye);

        group.position.set(hole.position.x, -1.5, hole.position.z);
        group.castShadow = true;
        scene.add(group);
        hole.mole = group;
        hole.currentY = -1.5;
    });
    state.modelLoaded = true;
}

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// UI elements
const startBtn = document.getElementById('startBtn');
const scoreDisplay = document.getElementById('scoreDisplay');
const timerDisplay = document.getElementById('timerDisplay');
const comboDisplay = document.getElementById('comboDisplay');
const gameOverOverlay = document.getElementById('gameOverOverlay');
const finalScore = document.getElementById('finalScore');
const finalStats = document.getElementById('finalStats');
const hitEffect = document.getElementById('hitEffect');

// Game variables
let gameTimer = null;
let spawnTimer = null;
let playStartTime = 0;
let consecutiveWhacks = 0;

function startGame() {
    state.gameState = 'playing';
    state.score = 0;
    state.whackCount = 0;
    state.missCount = 0;
    state.timer = 30;
    state.comboMultiplier = 1;
    state.activeMoles = 0;
    state.difficultyLevel = 1;
    consecutiveWhacks = 0;
    playStartTime = performance.now();

    startBtn.style.display = 'none';
    gameOverOverlay.classList.remove('show');

    updateHUD();

    // Reset all moles
    holes.forEach(hole => {
        hole.isUp = false;
        hole.isWhacked = false;
        hole.animating = false;
        hole.targetY = -1.5;
        if (hole.mole) hole.mole.position.y = -1.5;
        hole.currentY = -1.5;
    });

    // Timer countdown
    gameTimer = setInterval(() => {
        state.timer--;
        if (state.timer <= 0) {
            state.timer = 0;
            endGame();
        }
        updateHUD();
    }, 1000);

    // Start spawning
    scheduleSpawn();
}

function scheduleSpawn() {
    if (state.gameState !== 'playing') return;

    const elapsed = (performance.now() - playStartTime) / 1000;
    let interval;
    if (elapsed > 15) {
        state.difficultyLevel = 2;
        interval = 900;
    } else {
        state.difficultyLevel = 1;
        interval = 1200;
    }

    spawnTimer = setTimeout(() => {
        if (state.gameState === 'playing') {
            spawnMoles();
            scheduleSpawn();
        }
    }, interval);
}

function spawnMoles() {
    const elapsed = (performance.now() - playStartTime) / 1000;
    const count = Math.floor(Math.random() * 3) + 1; // 1-3

    const available = holes.filter(h => !h.isUp && !h.animating);
    const shuffled = available.sort(() => Math.random() - 0.5);
    const toSpawn = shuffled.slice(0, Math.min(count, shuffled.length));

    toSpawn.forEach(hole => {
        hole.isUp = true;
        hole.isWhacked = false;
        hole.targetY = 0.5;
        hole.animating = true;

        const stayDuration = state.difficultyLevel === 2 ? 700 : 1000;

        hole.upTime = performance.now();
        hole.stayDuration = stayDuration;
    });
}

function endGame() {
    state.gameState = 'gameover';
    state.totalRounds++;

    clearInterval(gameTimer);
    clearTimeout(spawnTimer);

    // Hide all moles
    holes.forEach(hole => {
        hole.isUp = false;
        hole.isWhacked = false;
        hole.targetY = -1.5;
    });

    finalScore.textContent = `Score: ${state.score}`;
    finalStats.innerHTML = `Whacked: ${state.whackCount}<br>Missed: ${state.missCount}<br>Best Combo: x${state.comboMultiplier}<br>Games Played: ${state.totalRounds}`;
    gameOverOverlay.classList.add('show');

    startBtn.textContent = 'Play Again';
    startBtn.style.display = 'block';
}

function updateHUD() {
    scoreDisplay.textContent = state.score;
    timerDisplay.textContent = state.timer;
    comboDisplay.textContent = `x${state.comboMultiplier}`;

    if (state.comboMultiplier >= 3) {
        comboDisplay.style.color = '#ff4444';
        comboDisplay.style.fontSize = '24px';
    } else if (state.comboMultiplier >= 2) {
        comboDisplay.style.color = '#ffaa00';
        comboDisplay.style.fontSize = '22px';
    } else {
        comboDisplay.style.color = '#00ff88';
        comboDisplay.style.fontSize = '20px';
    }
}

function showHitEffect(screenX, screenY, points) {
    hitEffect.textContent = `+${points}`;
    hitEffect.style.left = screenX + 'px';
    hitEffect.style.top = screenY + 'px';
    hitEffect.style.display = 'block';
    hitEffect.style.opacity = '1';
    hitEffect.style.transform = 'translateY(0)';

    let start = performance.now();
    function animateHit(now) {
        const elapsed = now - start;
        if (elapsed > 800) {
            hitEffect.style.display = 'none';
            return;
        }
        hitEffect.style.opacity = 1 - elapsed / 800;
        hitEffect.style.transform = `translateY(${-elapsed * 0.08}px)`;
        requestAnimationFrame(animateHit);
    }
    requestAnimationFrame(animateHit);
}

function flashMoleRed(hole) {
    if (!hole.mole) return;
    hole.mole.traverse((child) => {
        if (child.isMesh && child.material) {
            child.material.color.set(0xff0000);
        }
    });
    setTimeout(() => {
        if (!hole.mole) return;
        hole.mole.traverse((child) => {
            if (child.isMesh && child.material && child.userData.originalColor) {
                child.material.color.copy(child.userData.originalColor);
            }
        });
    }, 200);
}

// Click handler
function onMouseClick(event) {
    if (state.gameState !== 'playing') return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    // Check all visible moles
    const moleObjects = [];
    holes.forEach((hole, i) => {
        if (hole.isUp && !hole.isWhacked && hole.mole && hole.currentY > 0) {
            hole.mole.traverse((child) => {
                if (child.isMesh) {
                    child.userData.holeIndex = i;
                    moleObjects.push(child);
                }
            });
        }
    });

    const intersects = raycaster.intersectObjects(moleObjects, false);

    if (intersects.length > 0) {
        const hitIndex = intersects[0].object.userData.holeIndex;
        const hole = holes[hitIndex];

        if (hole.isUp && !hole.isWhacked) {
            hole.isWhacked = true;

            // Combo
            consecutiveWhacks++;
            state.comboMultiplier = Math.min(consecutiveWhacks, 5);

            const points = 10 * state.comboMultiplier;
            state.score += points;
            state.whackCount++;

            // Flash red
            flashMoleRed(hole);

            // Animate down
            hole.targetY = -1.5;

            // Show hit effect
            showHitEffect(event.clientX, event.clientY, points);

            updateHUD();
        }
    }
}

window.addEventListener('click', onMouseClick);

// Start button
startBtn.addEventListener('click', () => {
    if (state.modelLoaded || true) { // Allow start even if model not loaded
        startGame();
    }
});

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    const now = performance.now();

    // Update mole positions
    let activeCount = 0;
    holes.forEach(hole => {
        if (!hole.mole) return;

        // Check if mole should go down (stayed up too long)
        if (hole.isUp && !hole.isWhacked && hole.upTime) {
            const elapsed = now - hole.upTime;
            const popUpDuration = 300;
            const totalUpTime = popUpDuration + hole.stayDuration;

            if (elapsed > totalUpTime) {
                // Missed!
                hole.isUp = false;
                hole.targetY = -1.5;
                state.missCount++;
                consecutiveWhacks = 0;
                state.comboMultiplier = 1;
                updateHUD();
            }
        }

        // Lerp position
        const lerpSpeed = 8;
        hole.currentY += (hole.targetY - hole.currentY) * Math.min(lerpSpeed * delta, 1);

        // Snap if close enough
        if (Math.abs(hole.currentY - hole.targetY) < 0.01) {
            hole.currentY = hole.targetY;
            if (hole.targetY === -1.5) {
                hole.animating = false;
                hole.isUp = false;
            }
        }

        hole.mole.position.y = hole.currentY;

        // Slight wobble when up
        if (hole.isUp && !hole.isWhacked && hole.currentY > 0) {
            hole.mole.rotation.y = Math.sin(now * 0.003 + holes.indexOf(hole)) * 0.2;
            activeCount++;
        }
    });

    state.activeMoles = activeCount;

    // Render
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
