<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Whack-a-Mole</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Sky blue background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #fff;
        }
        .hud-item { margin-bottom: 10px; }
        #comboDisplay { color: #FFD700; }
        
        #startBtn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            background-color: #ff5722;
            border: 3px solid white;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 6px 0 #e64a19, 0 10px 10px rgba(0,0,0,0.5);
            transition: all 0.1s;
            z-index: 10;
        }
        #startBtn:active {
            top: 26px;
            box-shadow: 0 0 0 #e64a19, 0 4px 4px rgba(0,0,0,0.5);
        }
        
        #gameOverOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 5;
        }
        #gameOverOverlay h1 {
            font-size: 64px;
            margin: 0 0 20px 0;
            color: #ff5722;
            text-shadow: 0 0 10px #ff5722;
        }
        #gameOverOverlay p {
            font-size: 32px;
            margin: 10px 0;
        }
        #loading {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 18px;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="hud">
        <div class="hud-item">Score: <span id="scoreDisplay">0</span></div>
        <div class="hud-item">Time: <span id="timerDisplay">30</span>s</div>
        <div class="hud-item">Combo: x<span id="comboDisplay">1</span></div>
    </div>

    <button id="startBtn">Start Game</button>

    <div id="gameOverOverlay">
        <h1>GAME OVER</h1>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>Whacked: <span id="finalWhacks">0</span> | Missed: <span id="finalMisses">0</span></p>
    </div>

    <div id="loading">Loading 3D Model...</div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            gameState: 'waiting', // 'waiting' | 'playing' | 'gameover'
            score: 0,
            whackCount: 0,
            missCount: 0,
            timer: 30,
            comboMultiplier: 1,
            activeMoles: 0,
            totalRounds: 0,
            difficultyLevel: 1,
            modelLoaded: false
        };

        // --- DOM ELEMENTS ---
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const comboDisplay = document.getElementById('comboDisplay');
        const startBtn = document.getElementById('startBtn');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScore = document.getElementById('finalScore');
        const finalWhacks = document.getElementById('finalWhacks');
        const finalMisses = document.getElementById('finalMisses');
        const loadingText = document.getElementById('loading');

        // --- SCENE SETUP ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(14, 14);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x4a8c3f, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Holes
        const holePositions = [
            {x: -3, z: -3}, {x: 0, z: -3}, {x: 3, z: -3},
            {x: -3, z: 0},  {x: 0, z: 0},  {x: 3, z: 0},
            {x: -3, z: 3},  {x: 0, z: 3},  {x: 3, z: 3}
        ];
        
        const holeGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.1, 32);
        const holeMat = new THREE.MeshStandardMaterial({ color: 0x2a1810, roughness: 0.9 });
        
        holePositions.forEach(pos => {
            const hole = new THREE.Mesh(holeGeo, holeMat);
            hole.position.set(pos.x, 0.01, pos.z); // Slightly above ground to prevent z-fighting
            hole.receiveShadow = true;
            scene.add(hole);
        });

        // --- MODEL LOADING & MOLE SETUP ---
        const moles = [];
        const loader = new GLTFLoader();
        
        // Fallback generator in case CDN fails
        function createFallbackModel() {
            const group = new THREE.Group();
            // Amber
            const amberGeo = new THREE.CapsuleGeometry(0.4, 0.6, 4, 16);
            const amberMat = new THREE.MeshStandardMaterial({ 
                color: 0xffaa00, 
                transparent: true, 
                opacity: 0.8,
                roughness: 0.2,
                metalness: 0.1
            });
            const amber = new THREE.Mesh(amberGeo, amberMat);
            amber.position.y = 0.7;
            amber.castShadow = true;
            group.add(amber);
            
            // Mosquito (simple representation)
            const bugGeo = new THREE.SphereGeometry(0.15, 8, 8);
            const bugMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const bug = new THREE.Mesh(bugGeo, bugMat);
            bug.position.y = 0.7;
            group.add(bug);
            
            return group;
        }

        function setupMoles(baseModel) {
            for (let i = 0; i < 9; i++) {
                const model = baseModel.clone();
                model.position.set(holePositions[i].x, -1.5, holePositions[i].z);
                scene.add(model);
                
                moles.push({
                    mesh: model,
                    state: 'hidden', // 'hidden', 'rising', 'up', 'falling'
                    timeInState: 0,
                    startY: -1.5,
                    isHit: false
                });
            }
            window.__3D_STATE__.modelLoaded = true;
            loadingText.style.display = 'none';
        }

        // Attempt to load GLTF, use fallback if it fails
        loader.load(
            'MosquitoInAmber.glb',
            (gltf) => {
                const model = gltf.scene;
                
                // Normalize scale to roughly 1 unit
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 1.0 / maxDim;
                model.scale.setScalar(scale);
                
                // Center pivot at bottom
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center.multiplyScalar(scale));
                
                const wrapper = new THREE.Group();
                wrapper.add(model);
                
                const newBox = new THREE.Box3().setFromObject(wrapper);
                model.position.y -= newBox.min.y; // Align bottom to y=0 of wrapper
                
                // Enable shadows
                wrapper.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                setupMoles(wrapper);
            },
            undefined,
            (error) => {
                console.warn('Failed to load MosquitoInAmber.glb, using fallback model.', error);
                setupMoles(createFallbackModel());
            }
        );

        // --- GAME LOGIC ---
        const clock = new THREE.Clock();
        let spawnTimer = 0;
        
        // Constants
        const Y_HIDDEN = -1.5;
        const Y_UP = 0.5;
        const TIME_RISE = 0.3;
        const TIME_FALL = 0.3;

        function startGame() {
            if (!window.__3D_STATE__.modelLoaded) return;
            
            window.__3D_STATE__.gameState = 'playing';
            window.__3D_STATE__.score = 0;
            window.__3D_STATE__.whackCount = 0;
            window.__3D_STATE__.missCount = 0;
            window.__3D_STATE__.timer = 30;
            window.__3D_STATE__.comboMultiplier = 1;
            window.__3D_STATE__.difficultyLevel = 1;
            
            startBtn.style.display = 'none';
            gameOverOverlay.style.display = 'none';
            
            // Reset all moles
            moles.forEach(m => {
                m.state = 'hidden';
                m.mesh.position.y = Y_HIDDEN;
                m.isHit = false;
            });
            
            spawnTimer = 0;
            updateHUD();
        }

        function endGame() {
            window.__3D_STATE__.gameState = 'gameover';
            window.__3D_STATE__.totalRounds++;
            
            // Force all moles down
            moles.forEach(m => {
                if (m.state !== 'hidden') {
                    m.state = 'falling';
                    m.startY = m.mesh.position.y;
                    m.timeInState = 0;
                }
            });

            gameOverOverlay.style.display = 'flex';
            finalScore.innerText = window.__3D_STATE__.score;
            finalWhacks.innerText = window.__3D_STATE__.whackCount;
            finalMisses.innerText = window.__3D_STATE__.missCount;
            
            startBtn.innerText = 'Play Again';
            startBtn.style.display = 'block';
            startBtn.style.top = 'auto';
            startBtn.style.bottom = '40px';
        }

        function updateHUD() {
            scoreDisplay.innerText = window.__3D_STATE__.score;
            timerDisplay.innerText = Math.ceil(window.__3D_STATE__.timer);
            comboDisplay.innerText = window.__3D_STATE__.comboMultiplier;
        }

        function flashRed(meshGroup) {
            const originalMats = new Map();
            const redMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x550000 });
            
            meshGroup.traverse(child => {
                if (child.isMesh) {
                    originalMats.set(child, child.material);
                    child.material = redMat;
                }
            });
            
            setTimeout(() => {
                meshGroup.traverse(child => {
                    if (child.isMesh && originalMats.has(child)) {
                        child.material = originalMats.get(child);
                    }
                });
            }, 200);
        }

        // --- INTERACTION (RAYCASTING) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('mousedown', (event) => {
            if (window.__3D_STATE__.gameState !== 'playing') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Collect all meshes inside the mole groups
            const interactableMeshes = [];
            moles.forEach(m => {
                m.mesh.traverse(child => {
                    if (child.isMesh) interactableMeshes.push(child);
                });
            });

            const intersects = raycaster.intersectObjects(interactableMeshes, false);

            if (intersects.length > 0) {
                const hitMesh = intersects[0].object;
                
                // Find which mole object this mesh belongs to
                const hitMole = moles.find(m => {
                    let found = false;
                    m.mesh.traverse(child => { if (child === hitMesh) found = true; });
                    return found;
                });

                if (hitMole && hitMole.mesh.position.y > 0 && !hitMole.isHit) {
                    // Whack successful
                    hitMole.isHit = true;
                    hitMole.state = 'falling';
                    hitMole.startY = hitMole.mesh.position.y;
                    hitMole.timeInState = 0;

                    window.__3D_STATE__.whackCount++;
                    window.__3D_STATE__.score += 10 * window.__3D_STATE__.comboMultiplier;
                    window.__3D_STATE__.comboMultiplier = Math.min(5, window.__3D_STATE__.comboMultiplier + 1);
                    
                    flashRed(hitMole.mesh);
                    updateHUD();
                }
            }
        });

        startBtn.addEventListener('click', startGame);

        // --- RESIZE HANDLER ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            const dt = Math.min(clock.getDelta(), 0.1); // Cap dt to prevent huge jumps

            if (window.__3D_STATE__.gameState === 'playing') {
                // Timer & Difficulty
                window.__3D_STATE__.timer -= dt;
                
                if (window.__3D_STATE__.timer <= 15) {
                    window.__3D_STATE__.difficultyLevel = 2;
                }
                
                if (window.__3D_STATE__.timer <= 0) {
                    window.__3D_STATE__.timer = 0;
                    endGame();
                }

                const stayTime = window.__3D_STATE__.difficultyLevel === 1 ? 1.0 : 0.7;
                const spawnInterval = window.__3D_STATE__.difficultyLevel === 1 ? 1.2 : 0.9;

                // Spawning Logic
                spawnTimer += dt;
                if (spawnTimer >= spawnInterval) {
                    spawnTimer = 0;
                    const hiddenMoles = moles.filter(m => m.state === 'hidden');
                    if (hiddenMoles.length > 0) {
                        const numToSpawn = Math.floor(Math.random() * 3) + 1; // 1 to 3
                        for (let i = 0; i < Math.min(numToSpawn, hiddenMoles.length); i++) {
                            // Pick random hidden mole
                            const idx = Math.floor(Math.random() * hiddenMoles.length);
                            const mole = hiddenMoles.splice(idx, 1)[0];
                            mole.state = 'rising';
                            mole.timeInState = 0;
                            mole.startY = Y_HIDDEN;
                            mole.isHit = false;
                        }
                    }
                }

                // Update Moles
                let activeCount = 0;
                moles.forEach(mole => {
                    mole.timeInState += dt;

                    if (mole.state === 'rising') {
                        activeCount++;
                        const progress = Math.min(mole.timeInState / TIME_RISE, 1.0);
                        mole.mesh.position.y = THREE.MathUtils.lerp(mole.startY, Y_UP, progress);
                        if (progress >= 1.0) {
                            mole.state = 'up';
                            mole.timeInState = 0;
                        }
                    } 
                    else if (mole.state === 'up') {
                        activeCount++;
                        if (mole.timeInState >= stayTime) {
                            // Missed
                            mole.state = 'falling';
                            mole.startY = Y_UP;
                            mole.timeInState = 0;
                            window.__3D_STATE__.missCount++;
                            window.__3D_STATE__.comboMultiplier = 1; // Reset combo
                            updateHUD();
                        }
                    } 
                    else if (mole.state === 'falling') {
                        if(mole.mesh.position.y > 0) activeCount++;
                        const progress = Math.min(mole.timeInState / TIME_FALL, 1.0);
                        mole.mesh.position.y = THREE.MathUtils.lerp(mole.startY, Y_HIDDEN, progress);
                        if (progress >= 1.0) {
                            mole.state = 'hidden';
                            mole.timeInState = 0;
                            mole.isHit = false;
                        }
                    }
                });

                window.__3D_STATE__.activeMoles = activeCount;
                updateHUD();
            } else if (window.__3D_STATE__.gameState === 'gameover') {
                // Finish falling animations during game over
                moles.forEach(mole => {
                    if (mole.state === 'falling') {
                        mole.timeInState += dt;
                        const progress = Math.min(mole.timeInState / TIME_FALL, 1.0);
                        mole.mesh.position.y = THREE.MathUtils.lerp(mole.startY, Y_HIDDEN, progress);
                        if (progress >= 1.0) {
                            mole.state = 'hidden';
                        }
                    }
                });
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
