<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Abstract Particle Art</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
canvas { display: block; }
#hudPanel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 8px;
    padding: 16px 20px;
    color: #fff;
    font-size: 14px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    z-index: 10;
    min-width: 200px;
}
#hudPanel div { margin-bottom: 2px; }
#hudPanel span { color: #0ff; }
#resetBtn {
    display: block;
    margin-top: 12px;
    padding: 8px 24px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 4px;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    width: 100%;
}
#resetBtn:hover {
    background: rgba(255, 255, 255, 0.25);
    border-color: rgba(255, 255, 255, 0.6);
}
#instructions {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 8px;
    padding: 10px 20px;
    color: rgba(255, 255, 255, 0.6);
    font-size: 12px;
    z-index: 10;
    text-align: center;
    backdrop-filter: blur(10px);
}
</style>
</head>
<body>

<div id="hudPanel">
    <div id="themeDisplay">Theme: <span>1</span></div>
    <div id="particleCount">Particles: <span>1600</span></div>
    <div id="animState">Status: <span>Playing</span></div>
    <div id="explosionState">Explosion: <span>Idle</span></div>
    <button id="resetBtn">Reset</button>
</div>

<div id="instructions">
    Click: Explode &nbsp;|&nbsp; R: Toggle rotation &nbsp;|&nbsp; C: Cycle colors &nbsp;|&nbsp; S: Toggle spiral &nbsp;|&nbsp; P: Pause
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0x333333);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 1.5);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

// ============ COLOR THEMES ============
const colorThemes = [
    { orbital: 0x00ffff, spiral: 0xff00ff, burst: 0xffd700 },
    { orbital: 0xff0000, spiral: 0x00ff00, burst: 0x0000ff },
    { orbital: 0xffffff, spiral: 0xff8800, burst: 0x8800ff }
];

// ============ STATE ============
let state = {
    modelLoaded: false,
    modelPositionY: 0,
    orbitalRotation: 0,
    orbitalDirection: 1,
    spiralRotation: 0,
    spiralVisible: true,
    colorThemeIndex: 1,
    explosionState: 'idle',
    explosionElapsed: 0,
    isPaused: false,
    lightX: 5,
    lightY: 5,
    totalParticles: 1600,
    orbitalParticleCount: 500,
    spiralParticleCount: 800,
    burstParticleCount: 300,
    resetCount: 0
};

window.__3D_STATE__ = state;

// ============ MODEL LOADING ============
let cameraModel = null;
const loader = new GLTFLoader();

function loadModel() {
    loader.load(
        'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/AntiqueCamera/glTF-Binary/AntiqueCamera.glb',
        (gltf) => {
            cameraModel = gltf.scene;
            
            // Center and scale
            const box = new THREE.Box3().setFromObject(cameraModel);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 2.0 / maxDim;
            
            cameraModel.position.sub(center.multiplyScalar(scale));
            cameraModel.scale.setScalar(scale);
            
            // Recenter after scaling
            const box2 = new THREE.Box3().setFromObject(cameraModel);
            const center2 = box2.getCenter(new THREE.Vector3());
            cameraModel.position.x -= center2.x;
            cameraModel.position.y -= center2.y;
            cameraModel.position.z -= center2.z;
            
            scene.add(cameraModel);
            state.modelLoaded = true;
        },
        undefined,
        (error) => {
            console.warn('Could not load AntiqueCamera.glb, creating placeholder:', error);
            // Create a placeholder camera-like object
            const group = new THREE.Group();
            
            const bodyGeo = new THREE.BoxGeometry(1.2, 0.8, 0.8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4a3728, metalness: 0.3, roughness: 0.7 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            group.add(body);
            
            const lensGeo = new THREE.CylinderGeometry(0.25, 0.35, 0.6, 16);
            const lensMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 });
            const lens = new THREE.Mesh(lensGeo, lensMat);
            lens.rotation.x = Math.PI / 2;
            lens.position.z = 0.7;
            group.add(lens);
            
            const glassGeo = new THREE.CircleGeometry(0.23, 16);
            const glassMat = new THREE.MeshStandardMaterial({ color: 0x4488ff, metalness: 0.9, roughness: 0.1 });
            const glass = new THREE.Mesh(glassGeo, glassMat);
            glass.position.z = 1.0;
            group.add(glass);
            
            const legGeo = new THREE.CylinderGeometry(0.03, 0.03, 1.5, 8);
            const legMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.5 });
            for (let i = 0; i < 3; i++) {
                const leg = new THREE.Mesh(legGeo, legMat);
                const angle = (i / 3) * Math.PI * 2;
                leg.position.set(Math.cos(angle) * 0.4, -1.1, Math.sin(angle) * 0.4);
                leg.rotation.z = Math.cos(angle) * 0.15;
                leg.rotation.x = Math.sin(angle) * 0.15;
                group.add(leg);
            }
            
            cameraModel = group;
            scene.add(cameraModel);
            state.modelLoaded = true;
        }
    );
}

loadModel();

// ============ PARTICLE SYSTEM: ORBITAL RING ============
function createOrbitalRing() {
    const count = 500;
    const positions = new Float32Array(count * 3);
    const radius = 3;
    
    for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;
        const tubeAngle = Math.random() * Math.PI * 2;
        const tubeRadius = 0.3 * Math.random();
        
        positions[i * 3] = (radius + tubeRadius * Math.cos(tubeAngle)) * Math.cos(angle);
        positions[i * 3 + 1] = tubeRadius * Math.sin(tubeAngle);
        positions[i * 3 + 2] = (radius + tubeRadius * Math.cos(tubeAngle)) * Math.sin(angle);
    }
    
    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    
    const material = new THREE.PointsMaterial({
        color: 0x00ffff,
        size: 0.08,
        transparent: true,
        opacity: 0.9,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });
    
    const points = new THREE.Points(geometry, material);
    return points;
}

// ============ PARTICLE SYSTEM: SPIRAL CLOUD ============
function createSpiralCloud() {
    const count = 800;
    const positions = new Float32Array(count * 3);
    
    for (let i = 0; i < count; i++) {
        const t = i / count;
        const angle = t * Math.PI * 8; // 4 full spirals
        const radius = 0.5 + t * 3;
        const height = t * 4 - 2;
        const jitter = 0.2;
        
        positions[i * 3] = radius * Math.cos(angle) + (Math.random() - 0.5) * jitter;
        positions[i * 3 + 1] = height + (Math.random() - 0.5) * jitter;
        positions[i * 3 + 2] = radius * Math.sin(angle) + (Math.random() - 0.5) * jitter;
    }
    
    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    
    const material = new THREE.PointsMaterial({
        color: 0xff00ff,
        size: 0.06,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });
    
    const points = new THREE.Points(geometry, material);
    return points;
}

// ============ PARTICLE SYSTEM: EXPLOSION BURST ============
function createExplosionBurst() {
    const count = 300;
    const positions = new Float32Array(count * 3);
    const velocities = new Float32Array(count * 3);
    
    for (let i = 0; i < count; i++) {
        positions[i * 3] = 0;
        positions[i * 3 + 1] = 0;
        positions[i * 3 + 2] = 0;
        
        // Random direction on sphere
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const speed = 2.0;
        
        velocities[i * 3] = speed * Math.sin(phi) * Math.cos(theta);
        velocities[i * 3 + 1] = speed * Math.sin(phi) * Math.sin(theta);
        velocities[i * 3 + 2] = speed * Math.cos(phi);
    }
    
    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    
    const material = new THREE.PointsMaterial({
        color: 0xffd700,
        size: 0.1,
        transparent: true,
        opacity: 1.0,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });
    
    const points = new THREE.Points(geometry, material);
    points.userData.velocities = velocities;
    points.userData.originalVelocities = new Float32Array(velocities);
    return points;
}

// Create particle systems
const orbitalRing = createOrbitalRing();
scene.add(orbitalRing);

const spiralCloud = createSpiralCloud();
scene.add(spiralCloud);

const explosionBurst = createExplosionBurst();
scene.add(explosionBurst);

// ============ EXPLOSION MANAGEMENT ============
let explosionActive = false;
let explosionStartTime = 0;
let currentVelocities = null;

function triggerExplosion() {
    explosionActive = true;
    explosionStartTime = performance.now() / 1000;
    state.explosionState = 'exploding';
    state.explosionElapsed = 0;
    
    // Reset positions to origin
    const positions = explosionBurst.geometry.attributes.position.array;
    const origVel = explosionBurst.userData.originalVelocities;
    const vel = explosionBurst.userData.velocities;
    
    for (let i = 0; i < 300; i++) {
        positions[i * 3] = 0;
        positions[i * 3 + 1] = 0;
        positions[i * 3 + 2] = 0;
        
        // Re-randomize velocities
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const speed = 2.0 + Math.random() * 1.0;
        
        vel[i * 3] = speed * Math.sin(phi) * Math.cos(theta);
        vel[i * 3 + 1] = speed * Math.sin(phi) * Math.sin(theta);
        vel[i * 3 + 2] = speed * Math.cos(phi);
    }
    
    explosionBurst.material.opacity = 1.0;
    explosionBurst.geometry.attributes.position.needsUpdate = true;
}

function resetExplosion() {
    explosionActive = false;
    state.explosionState = 'idle';
    state.explosionElapsed = 0;
    
    const positions = explosionBurst.geometry.attributes.position.array;
    for (let i = 0; i < 300 * 3; i++) {
        positions[i] = 0;
    }
    explosionBurst.material.opacity = 1.0;
    explosionBurst.geometry.attributes.position.needsUpdate = true;
}

// ============ USER INTERACTIONS ============

// Mouse move - light follows mouse
renderer.domElement.addEventListener('mousemove', (event) => {
    const rect = renderer.domElement.getBoundingClientRect();
    const ndcX = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    const ndcY = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    
    // Map to world space on XY plane at z=5
    const vector = new THREE.Vector3(ndcX, ndcY, 0.5);
    vector.unproject(camera);
    const dir = vector.sub(camera.position).normalize();
    const distance = (5 - camera.position.z) / dir.z;
    const worldPos = camera.position.clone().add(dir.multiplyScalar(distance));
    
    pointLight.position.set(worldPos.x, worldPos.y, 5);
    state.lightX = worldPos.x;
    state.lightY = worldPos.y;
});

// Click - trigger explosion
renderer.domElement.addEventListener('click', () => {
    triggerExplosion();
});

// Keyboard
document.addEventListener('keydown', (event) => {
    const key = event.key.toLowerCase();
    
    if (key === 'r') {
        state.orbitalDirection *= -1;
    } else if (key === 'c') {
        state.colorThemeIndex = (state.colorThemeIndex % 3) + 1;
        applyColorTheme();
    } else if (key === 's') {
        state.spiralVisible = !state.spiralVisible;
        spiralCloud.visible = state.spiralVisible;
    } else if (key === 'p') {
        state.isPaused = !state.isPaused;
    }
});

// Reset button
document.getElementById('resetBtn').addEventListener('click', () => {
    state.resetCount++;
    resetAll();
});

function applyColorTheme() {
    const theme = colorThemes[state.colorThemeIndex - 1];
    orbitalRing.material.color.setHex(theme.orbital);
    spiralCloud.material.color.setHex(theme.spiral);
    explosionBurst.material.color.setHex(theme.burst);
}

function resetAll() {
    // Reset rotations
    state.orbitalRotation = 0;
    state.orbitalDirection = 1;
    state.spiralRotation = 0;
    orbitalRing.rotation.y = 0;
    spiralCloud.rotation.y = 0;
    
    // Reset visibility
    state.spiralVisible = true;
    spiralCloud.visible = true;
    
    // Reset color theme
    state.colorThemeIndex = 1;
    applyColorTheme();
    
    // Reset explosion
    resetExplosion();
    
    // Reset pause
    state.isPaused = false;
    
    // Reset light
    pointLight.position.set(5, 5, 5);
    state.lightX = 5;
    state.lightY = 5;
    
    // Reset model position
    if (cameraModel) {
        cameraModel.position.y = 0;
    }
    state.modelPositionY = 0;
    
    // Reset camera
    camera.position.set(0, 3, 8);
    controls.target.set(0, 0, 0);
    controls.update();
}

// ============ HUD UPDATE ============
function updateHUD() {
    document.querySelector('#themeDisplay span').textContent = state.colorThemeIndex;
    document.querySelector('#particleCount span').textContent = state.totalParticles;
    document.querySelector('#animState span').textContent = state.isPaused ? 'Paused' : 'Playing';
    
    let expText = 'Idle';
    if (state.explosionState === 'exploding') expText = 'Exploding';
    else if (state.explosionState === 'fading') expText = 'Fading';
    document.querySelector('#explosionState span').textContent = expText;
}

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
    requestAnimationFrame(animate);
    
    const currentTime = performance.now() / 1000;
    const delta = clock.getDelta();
    
    controls.update();
    
    if (!state.isPaused) {
        // Model bobbing
        if (cameraModel) {
            const bobY = 0.2 * Math.sin((currentTime * Math.PI * 2) / 2);
            cameraModel.position.y = bobY;
            state.modelPositionY = bobY;
        }
        
        // Orbital ring rotation
        state.orbitalRotation += 0.5 * state.orbitalDirection * delta;
        orbitalRing.rotation.y = state.orbitalRotation;
        
        // Spiral cloud rotation (opposite direction)
        state.spiralRotation -= 0.3 * delta;
        spiralCloud.rotation.y = state.spiralRotation;
        
        // Explosion update
        if (explosionActive) {
            const elapsed = currentTime - explosionStartTime;
            state.explosionElapsed = elapsed;
            
            if (elapsed < 5) {
                const positions = explosionBurst.geometry.attributes.position.array;
                const vel = explosionBurst.userData.velocities;
                
                if (elapsed < 3) {
                    state.explosionState = 'exploding';
                    // Move particles outward
                    for (let i = 0; i < 300; i++) {
                        positions[i * 3] += vel[i * 3] * delta;
                        positions[i * 3 + 1] += vel[i * 3 + 1] * delta;
                        positions[i * 3 + 2] += vel[i * 3 + 2] * delta;
                        
                        // Decelerate
                        vel[i * 3] *= 0.98;
                        vel[i * 3 + 1] *= 0.98;
                        vel[i * 3 + 2] *= 0.98;
                    }
                    explosionBurst.material.opacity = 1.0;
                } else {
                    state.explosionState = 'fading';
                    // Continue moving but fade
                    for (let i = 0; i < 300; i++) {
                        positions[i * 3] += vel[i * 3] * delta;
                        positions[i * 3 + 1] += vel[i * 3 + 1] * delta;
                        positions[i * 3 + 2] += vel[i * 3 + 2] * delta;
                        
                        vel[i * 3] *= 0.98;
                        vel[i * 3 + 1] *= 0.98;
                        vel[i * 3 + 2] *= 0.98;
                    }
                    // Fade opacity from 1 to 0 over the 3-5 second range
                    const fadeProgress = (elapsed - 3) / 2;
                    explosionBurst.material.opacity = Math.max(0, 1 - fadeProgress);
                }
                
                explosionBurst.geometry.attributes.position.needsUpdate = true;
            } else {
                // Reset after 5 seconds
                resetExplosion();
            }
        }
    }
    
    // Update HUD
    updateHUD();
    
    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start
animate();
</script>
</body>
</html>
