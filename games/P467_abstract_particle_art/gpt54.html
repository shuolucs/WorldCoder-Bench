<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abstract Particle Camera Scene</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #hudPanel {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      backdrop-filter: blur(6px);
      z-index: 10;
      min-width: 170px;
      user-select: none;
    }

    #hudPanel div {
      margin: 4px 0;
      font-size: 14px;
    }

    #resetBtn {
      position: absolute;
      top: 150px;
      left: 12px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.14);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 8px;
      cursor: pointer;
      z-index: 10;
      font-size: 14px;
    }

    #resetBtn:hover {
      background: rgba(255,255,255,0.22);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hudPanel">
      <div id="themeDisplay">Theme: 1</div>
      <div id="particleCount">Particles: 1600</div>
      <div id="animState">Playing</div>
      <div id="explosionState">Idle</div>
    </div>
    <button id="resetBtn">Reset</button>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const themeDisplay = document.getElementById('themeDisplay');
    const particleCountDisplay = document.getElementById('particleCount');
    const animStateDisplay = document.getElementById('animState');
    const explosionStateDisplay = document.getElementById('explosionState');
    const resetBtn = document.getElementById('resetBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0x333333);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 1.5);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    const clock = new THREE.Clock();

    const TOTAL_PARTICLES = 1600;
    const ORBITAL_COUNT = 500;
    const SPIRAL_COUNT = 800;
    const BURST_COUNT = 300;

    const colorThemes = [
      [0x00ffff, 0xff00ff, 0xffd700],
      [0xff0000, 0x00ff00, 0x0000ff],
      [0xffffff, 0xff8800, 0x8000ff]
    ];

    const state = {
      modelLoaded: false,
      modelPositionY: 0,
      orbitalRotation: 0,
      orbitalDirection: 1,
      spiralRotation: 0,
      spiralVisible: true,
      colorThemeIndex: 1,
      explosionState: 'idle',
      explosionElapsed: 0,
      isPaused: false,
      lightX: pointLight.position.x,
      lightY: pointLight.position.y,
      totalParticles: TOTAL_PARTICLES,
      orbitalParticleCount: ORBITAL_COUNT,
      spiralParticleCount: SPIRAL_COUNT,
      burstParticleCount: BURST_COUNT,
      resetCount: 0
    };

    window.__3D_STATE__ = state;

    let cameraModel = null;
    let modelBaseY = 0;

    const modelGroup = new THREE.Group();
    scene.add(modelGroup);

    const loader = new GLTFLoader();
    loader.load(
      'AntiqueCamera.glb',
      (gltf) => {
        cameraModel = gltf.scene;

        const box = new THREE.Box3().setFromObject(cameraModel);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        cameraModel.position.sub(center);

        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const scale = 2 / maxDim;
        cameraModel.scale.setScalar(scale);

        const scaledBox = new THREE.Box3().setFromObject(cameraModel);
        const scaledCenter = new THREE.Vector3();
        scaledBox.getCenter(scaledCenter);
        cameraModel.position.sub(scaledCenter);

        modelGroup.add(cameraModel);
        state.modelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load AntiqueCamera.glb:', err);
      }
    );

    function createPointsMaterial(color, size, opacity = 1) {
      return new THREE.PointsMaterial({
        color,
        size,
        transparent: true,
        opacity,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
      });
    }

    // OrbitalRing
    const orbitalPositions = new Float32Array(ORBITAL_COUNT * 3);
    for (let i = 0; i < ORBITAL_COUNT; i++) {
      const angle = (i / ORBITAL_COUNT) * Math.PI * 2;
      const radius = 3 + (Math.random() - 0.5) * 0.3;
      const y = (Math.random() - 0.5) * 0.25;
      orbitalPositions[i * 3 + 0] = Math.cos(angle) * radius;
      orbitalPositions[i * 3 + 1] = y;
      orbitalPositions[i * 3 + 2] = Math.sin(angle) * radius;
    }
    const orbitalGeometry = new THREE.BufferGeometry();
    orbitalGeometry.setAttribute('position', new THREE.BufferAttribute(orbitalPositions, 3));
    const orbitalMaterial = createPointsMaterial(colorThemes[0][0], 0.08, 1);
    const orbitalRing = new THREE.Points(orbitalGeometry, orbitalMaterial);
    scene.add(orbitalRing);

    // SpiralCloud
    const spiralPositions = new Float32Array(SPIRAL_COUNT * 3);
    for (let i = 0; i < SPIRAL_COUNT; i++) {
      const t = i / SPIRAL_COUNT;
      const angle = t * Math.PI * 14;
      const radius = 0.4 + t * 2.0 + (Math.random() - 0.5) * 0.15;
      const y = -1.5 + t * 5 + (Math.random() - 0.5) * 0.2;
      spiralPositions[i * 3 + 0] = Math.cos(angle) * radius;
      spiralPositions[i * 3 + 1] = y;
      spiralPositions[i * 3 + 2] = Math.sin(angle) * radius;
    }
    const spiralGeometry = new THREE.BufferGeometry();
    spiralGeometry.setAttribute('position', new THREE.BufferAttribute(spiralPositions, 3));
    const spiralMaterial = createPointsMaterial(colorThemes[0][1], 0.06, 1);
    const spiralCloud = new THREE.Points(spiralGeometry, spiralMaterial);
    scene.add(spiralCloud);

    // ExplosionBurst
    const burstPositions = new Float32Array(BURST_COUNT * 3);
    const burstInitialPositions = new Float32Array(BURST_COUNT * 3);
    const burstVelocities = [];
    for (let i = 0; i < BURST_COUNT; i++) {
      burstPositions[i * 3 + 0] = 0;
      burstPositions[i * 3 + 1] = 0;
      burstPositions[i * 3 + 2] = 0;
      burstInitialPositions[i * 3 + 0] = 0;
      burstInitialPositions[i * 3 + 1] = 0;
      burstInitialPositions[i * 3 + 2] = 0;
      burstVelocities.push(new THREE.Vector3());
    }
    const burstGeometry = new THREE.BufferGeometry();
    burstGeometry.setAttribute('position', new THREE.BufferAttribute(burstPositions, 3));
    const burstMaterial = createPointsMaterial(colorThemes[0][2], 0.1, 1);
    const explosionBurst = new THREE.Points(burstGeometry, burstMaterial);
    scene.add(explosionBurst);

    function randomUnitVector() {
      const v = new THREE.Vector3(
        Math.random() * 2 - 1,
        Math.random() * 2 - 1,
        Math.random() * 2 - 1
      );
      return v.normalize();
    }

    function triggerExplosion() {
      state.explosionState = 'exploding';
      state.explosionElapsed = 0;
      burstMaterial.opacity = 1;

      const pos = burstGeometry.attributes.position.array;
      for (let i = 0; i < BURST_COUNT; i++) {
        pos[i * 3 + 0] = 0;
        pos[i * 3 + 1] = 0;
        pos[i * 3 + 2] = 0;

        const dir = randomUnitVector();
        burstVelocities[i].copy(dir).multiplyScalar(2.0);
      }
      burstGeometry.attributes.position.needsUpdate = true;
    }

    function resetExplosion() {
      const pos = burstGeometry.attributes.position.array;
      for (let i = 0; i < BURST_COUNT; i++) {
        pos[i * 3 + 0] = 0;
        pos[i * 3 + 1] = 0;
        pos[i * 3 + 2] = 0;
        burstVelocities[i].set(0, 0, 0);
      }
      burstGeometry.attributes.position.needsUpdate = true;
      burstMaterial.opacity = 1;
      state.explosionState = 'idle';
      state.explosionElapsed = 0;
    }

    function applyTheme(index1Based) {
      const idx = index1Based - 1;
      orbitalMaterial.color.setHex(colorThemes[idx][0]);
      spiralMaterial.color.setHex(colorThemes[idx][1]);
      burstMaterial.color.setHex(colorThemes[idx][2]);
      state.colorThemeIndex = index1Based;
      themeDisplay.textContent = `Theme: ${index1Based}`;
    }

    function updateHUD() {
      particleCountDisplay.textContent = `Particles: ${TOTAL_PARTICLES}`;
      animStateDisplay.textContent = state.isPaused ? 'Paused' : 'Playing';

      let explosionLabel = 'Idle';
      if (state.explosionState === 'exploding') explosionLabel = 'Exploding';
      if (state.explosionState === 'fading') explosionLabel = 'Fading';
      explosionStateDisplay.textContent = explosionLabel;
      themeDisplay.textContent = `Theme: ${state.colorThemeIndex}`;
    }

    function resetAll() {
      state.resetCount += 1;
      state.orbitalRotation = 0;
      state.orbitalDirection = 1;
      state.spiralRotation = 0;
      state.spiralVisible = true;
      state.isPaused = false;

      orbitalRing.rotation.y = 0;
      spiralCloud.rotation.y = 0;
      spiralCloud.visible = true;

      if (cameraModel) {
        modelGroup.position.y = modelBaseY;
      }

      applyTheme(1);
      resetExplosion();
      updateHUD();
    }

    renderer.domElement.addEventListener('mousemove', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      const ndc = new THREE.Vector3(x, y, 0.5);
      ndc.unproject(camera);

      const dir = ndc.sub(camera.position).normalize();
      const t = (5 - camera.position.z) / dir.z;
      const worldPos = camera.position.clone().add(dir.multiplyScalar(t));

      pointLight.position.x = worldPos.x;
      pointLight.position.y = worldPos.y;

      state.lightX = pointLight.position.x;
      state.lightY = pointLight.position.y;
    });

    renderer.domElement.addEventListener('click', () => {
      triggerExplosion();
    });

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === 'r') {
        state.orbitalDirection *= -1;
      } else if (key === 'c') {
        const next = (state.colorThemeIndex % 3) + 1;
        applyTheme(next);
      } else if (key === 's') {
        state.spiralVisible = !state.spiralVisible;
        spiralCloud.visible = state.spiralVisible;
      } else if (key === 'p') {
        state.isPaused = !state.isPaused;
      }
      updateHUD();
    });

    resetBtn.addEventListener('click', resetAll);

    particleCountDisplay.textContent = `Particles: ${TOTAL_PARTICLES}`;
    updateHUD();

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);
      const elapsed = clock.elapsedTime;

      if (!state.isPaused) {
        state.orbitalRotation += state.orbitalDirection * 0.5 * dt;
        state.spiralRotation -= 0.3 * dt;

        orbitalRing.rotation.y = state.orbitalRotation;
        spiralCloud.rotation.y = state.spiralRotation;

        modelGroup.position.y = modelBaseY + Math.sin(elapsed * Math.PI) * 0.2;
        state.modelPositionY = modelGroup.position.y;

        if (state.explosionState === 'exploding' || state.explosionState === 'fading') {
          state.explosionElapsed += dt;

          const pos = burstGeometry.attributes.position.array;
          for (let i = 0; i < BURST_COUNT; i++) {
            pos[i * 3 + 0] += burstVelocities[i].x * dt;
            pos[i * 3 + 1] += burstVelocities[i].y * dt;
            pos[i * 3 + 2] += burstVelocities[i].z * dt;
            burstVelocities[i].multiplyScalar(0.98);
          }
          burstGeometry.attributes.position.needsUpdate = true;

          if (state.explosionElapsed >= 3 && state.explosionElapsed < 5) {
            state.explosionState = 'fading';
            burstMaterial.opacity = Math.max(0, 1 - (state.explosionElapsed - 3) / 2);
          } else if (state.explosionElapsed >= 5) {
            resetExplosion();
          }
        }
      } else {
        if (cameraModel) {
          state.modelPositionY = modelGroup.position.y;
        }
      }

      state.orbitalRotation = orbitalRing.rotation.y;
      state.spiralRotation = spiralCloud.rotation.y;
      state.spiralVisible = spiralCloud.visible;
      state.lightX = pointLight.position.x;
      state.lightY = pointLight.position.y;

      updateHUD();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    resetAll();
    animate();
  </script>
</body>
</html>
