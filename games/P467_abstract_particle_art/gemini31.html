<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract Particle Art Scene</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
            color: #fff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hudPanel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #444;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            min-width: 200px;
        }
        .hud-line {
            margin: 5px 0;
            font-size: 14px;
        }
        #resetBtn {
            margin-top: 15px;
            padding: 8px 16px;
            background: #333;
            color: #fff;
            border: 1px solid #666;
            border-radius: 4px;
            cursor: pointer;
            pointer-events: auto;
            font-family: monospace;
            transition: background 0.2s;
        }
        #resetBtn:hover {
            background: #555;
        }
        #controlsHelp {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
            color: #aaa;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hudPanel">
        <div class="hud-line" id="themeDisplay">Theme: 1</div>
        <div class="hud-line" id="particleCount">Particles: 1600</div>
        <div class="hud-line" id="animState">Playing</div>
        <div class="hud-line" id="explosionState">Idle</div>
        <button id="resetBtn">Reset</button>
    </div>
    
    <div id="controlsHelp">
        Click: Trigger Explosion | Mouse: Move Light<br>
        R: Reverse Orbit | C: Cycle Theme<br>
        S: Toggle Spiral | P: Pause/Resume
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            modelPositionY: 0,
            orbitalRotation: 0,
            orbitalDirection: 1,
            spiralRotation: 0,
            spiralVisible: true,
            colorThemeIndex: 1,
            explosionState: 'idle',
            explosionElapsed: 0,
            isPaused: false,
            lightX: 5,
            lightY: 5,
            totalParticles: 1600,
            orbitalParticleCount: 500,
            spiralParticleCount: 800,
            burstParticleCount: 300,
            resetCount: 0
        };

        const state = window.__3D_STATE__;

        // --- Themes ---
        const themes = [
            { orbital: 0x00ffff, spiral: 0xff00ff, burst: 0xffd700 }, // Cyan, Magenta, Gold
            { orbital: 0xff0000, spiral: 0x00ff00, burst: 0x0000ff }, // Red, Green, Blue
            { orbital: 0xffffff, spiral: 0xffa500, burst: 0x800080 }  // White, Orange, Purple
        ];

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.5, 50);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // --- Model Loading ---
        const modelGroup = new THREE.Group();
        scene.add(modelGroup);
        let loadedModel = null;

        const loader = new GLTFLoader();
        // Using a reliable public URL for the AntiqueCamera model
        const modelUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/AntiqueCamera/glTF-Binary/AntiqueCamera.glb';
        
        loader.load(modelUrl, (gltf) => {
            loadedModel = gltf.scene;
            
            // Center and scale
            const box = new THREE.Box3().setFromObject(loadedModel);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 2.0 / maxDim;
            
            loadedModel.scale.setScalar(scale);
            loadedModel.position.sub(center.multiplyScalar(scale));
            
            modelGroup.add(loadedModel);
            state.modelLoaded = true;
        }, undefined, (error) => {
            console.error('Error loading model:', error);
            // Fallback geometry if loading fails
            const geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            const mat = new THREE.MeshStandardMaterial({ color: 0x888888 });
            loadedModel = new THREE.Mesh(geo, mat);
            modelGroup.add(loadedModel);
            state.modelLoaded = true;
        });

        // --- Particle Systems ---
        
        // 1. OrbitalRing
        const orbitalGeo = new THREE.BufferGeometry();
        const orbitalPos = new Float32Array(state.orbitalParticleCount * 3);
        for (let i = 0; i < state.orbitalParticleCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const radius = 3 + (Math.random() - 0.5) * 0.5;
            orbitalPos[i * 3] = Math.cos(theta) * radius;
            orbitalPos[i * 3 + 1] = (Math.random() - 0.5) * 0.5;
            orbitalPos[i * 3 + 2] = Math.sin(theta) * radius;
        }
        orbitalGeo.setAttribute('position', new THREE.BufferAttribute(orbitalPos, 3));
        const orbitalMat = new THREE.PointsMaterial({
            color: themes[0].orbital,
            size: 0.08,
            transparent: true,
            opacity: 0.8
        });
        const orbitalRing = new THREE.Points(orbitalGeo, orbitalMat);
        scene.add(orbitalRing);

        // 2. SpiralCloud
        const spiralGeo = new THREE.BufferGeometry();
        const spiralPos = new Float32Array(state.spiralParticleCount * 3);
        for (let i = 0; i < state.spiralParticleCount; i++) {
            const t = i / state.spiralParticleCount;
            const theta = t * Math.PI * 20; // Multiple turns
            const radius = t * 3 + 0.5;
            const y = (t * 6) - 3; // Spread vertically
            
            // Add some noise
            const noiseX = (Math.random() - 0.5) * 0.3;
            const noiseY = (Math.random() - 0.5) * 0.3;
            const noiseZ = (Math.random() - 0.5) * 0.3;

            spiralPos[i * 3] = Math.cos(theta) * radius + noiseX;
            spiralPos[i * 3 + 1] = y + noiseY;
            spiralPos[i * 3 + 2] = Math.sin(theta) * radius + noiseZ;
        }
        spiralGeo.setAttribute('position', new THREE.BufferAttribute(spiralPos, 3));
        const spiralMat = new THREE.PointsMaterial({
            color: themes[0].spiral,
            size: 0.06,
            transparent: true,
            opacity: 0.7
        });
        const spiralCloud = new THREE.Points(spiralGeo, spiralMat);
        scene.add(spiralCloud);

        // 3. ExplosionBurst
        const burstGeo = new THREE.BufferGeometry();
        const burstPos = new Float32Array(state.burstParticleCount * 3);
        const burstVel = new Float32Array(state.burstParticleCount * 3);
        const burstInitialPos = new Float32Array(state.burstParticleCount * 3); // Store to reset

        for (let i = 0; i < state.burstParticleCount; i++) {
            burstPos[i * 3] = 0;
            burstPos[i * 3 + 1] = 0;
            burstPos[i * 3 + 2] = 0;
            
            burstInitialPos[i * 3] = 0;
            burstInitialPos[i * 3 + 1] = 0;
            burstInitialPos[i * 3 + 2] = 0;

            // Random spherical direction
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            const speed = 2.0; // Base speed

            burstVel[i * 3] = Math.sin(phi) * Math.cos(theta) * speed;
            burstVel[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * speed;
            burstVel[i * 3 + 2] = Math.cos(phi) * speed;
        }
        burstGeo.setAttribute('position', new THREE.BufferAttribute(burstPos, 3));
        burstGeo.setAttribute('velocity', new THREE.BufferAttribute(burstVel, 3));
        
        const burstMat = new THREE.PointsMaterial({
            color: themes[0].burst,
            size: 0.1,
            transparent: true,
            opacity: 0.0 // Dormant initially
        });
        const explosionBurst = new THREE.Points(burstGeo, burstMat);
        scene.add(explosionBurst);

        // --- Interaction Logic ---

        // Mouse Move -> Light Position
        const mouse = new THREE.Vector2();
        const raycaster = new THREE.Raycaster();
        const planeZ5 = new THREE.Plane(new THREE.Vector3(0, 0, 1), -5); // Plane at z=5

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const target = new THREE.Vector3();
            raycaster.ray.intersectPlane(planeZ5, target);
            
            if (target) {
                pointLight.position.copy(target);
                state.lightX = target.x;
                state.lightY = target.y;
            }
        });

        // Click -> Trigger Explosion
        const triggerExplosion = () => {
            state.explosionState = 'exploding';
            state.explosionElapsed = 0;
            burstMat.opacity = 1.0;
            
            const positions = burstGeo.attributes.position.array;
            const velocities = burstGeo.attributes.velocity.array;
            
            for (let i = 0; i < state.burstParticleCount; i++) {
                // Reset position
                positions[i * 3] = 0;
                positions[i * 3 + 1] = 0;
                positions[i * 3 + 2] = 0;
                
                // Reset velocity
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const speed = 2.0 + Math.random() * 0.5;
                velocities[i * 3] = Math.sin(phi) * Math.cos(theta) * speed;
                velocities[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * speed;
                velocities[i * 3 + 2] = Math.cos(phi) * speed;
            }
            burstGeo.attributes.position.needsUpdate = true;
            burstGeo.attributes.velocity.needsUpdate = true;
            updateHUD();
        };

        window.addEventListener('click', (e) => {
            if(e.target.id === 'resetBtn') return; // Ignore clicks on reset button
            triggerExplosion();
        });

        // Keyboard Controls
        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            if (key === 'r') {
                state.orbitalDirection *= -1;
            } else if (key === 'c') {
                state.colorThemeIndex = (state.colorThemeIndex % 3) + 1;
                const theme = themes[state.colorThemeIndex - 1];
                orbitalMat.color.setHex(theme.orbital);
                spiralMat.color.setHex(theme.spiral);
                burstMat.color.setHex(theme.burst);
                updateHUD();
            } else if (key === 's') {
                state.spiralVisible = !state.spiralVisible;
                spiralCloud.visible = state.spiralVisible;
            } else if (key === 'p') {
                state.isPaused = !state.isPaused;
                updateHUD();
            }
        });

        // Reset Button
        const resetAll = () => {
            state.resetCount++;
            state.orbitalRotation = 0;
            state.orbitalDirection = 1;
            state.spiralRotation = 0;
            state.spiralVisible = true;
            spiralCloud.visible = true;
            state.colorThemeIndex = 1;
            state.explosionState = 'idle';
            state.explosionElapsed = 0;
            state.isPaused = false;
            
            // Reset Colors
            const theme = themes[0];
            orbitalMat.color.setHex(theme.orbital);
            spiralMat.color.setHex(theme.spiral);
            burstMat.color.setHex(theme.burst);
            
            // Reset Rotations
            orbitalRing.rotation.y = 0;
            spiralCloud.rotation.y = 0;
            
            // Reset Explosion
            burstMat.opacity = 0;
            const positions = burstGeo.attributes.position.array;
            for (let i = 0; i < state.burstParticleCount * 3; i++) positions[i] = 0;
            burstGeo.attributes.position.needsUpdate = true;

            // Reset Time
            clock.start();
            totalTime = 0;

            updateHUD();
        };

        document.getElementById('resetBtn').addEventListener('click', resetAll);

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- HUD Update ---
        const elTheme = document.getElementById('themeDisplay');
        const elAnim = document.getElementById('animState');
        const elExplosion = document.getElementById('explosionState');

        function updateHUD() {
            elTheme.innerText = `Theme: ${state.colorThemeIndex}`;
            elAnim.innerText = state.isPaused ? 'Paused' : 'Playing';
            elExplosion.innerText = state.explosionState.charAt(0).toUpperCase() + state.explosionState.slice(1);
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let totalTime = 0;

        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();

            if (!state.isPaused) {
                totalTime += dt;

                // Model Bobbing
                if (state.modelLoaded) {
                    // Period 2s -> freq 0.5 -> sin(PI * t)
                    state.modelPositionY = Math.sin(totalTime * Math.PI) * 0.2;
                    modelGroup.position.y = state.modelPositionY;
                }

                // Orbital Ring Rotation
                state.orbitalRotation += 0.5 * state.orbitalDirection * dt;
                orbitalRing.rotation.y = state.orbitalRotation;

                // Spiral Cloud Rotation
                state.spiralRotation += -0.3 * dt;
                spiralCloud.rotation.y = state.spiralRotation;

                // Explosion Logic
                if (state.explosionState !== 'idle') {
                    state.explosionElapsed += dt;
                    
                    const positions = burstGeo.attributes.position.array;
                    const velocities = burstGeo.attributes.velocity.array;

                    if (state.explosionElapsed < 5.0) {
                        // Update positions
                        for (let i = 0; i < state.burstParticleCount; i++) {
                            positions[i * 3] += velocities[i * 3] * dt;
                            positions[i * 3 + 1] += velocities[i * 3 + 1] * dt;
                            positions[i * 3 + 2] += velocities[i * 3 + 2] * dt;
                            
                            // Decelerate
                            velocities[i * 3] *= 0.98;
                            velocities[i * 3 + 1] *= 0.98;
                            velocities[i * 3 + 2] *= 0.98;
                        }
                        burstGeo.attributes.position.needsUpdate = true;

                        // Fading phase
                        if (state.explosionElapsed >= 3.0) {
                            if (state.explosionState !== 'fading') {
                                state.explosionState = 'fading';
                                updateHUD();
                            }
                            const fadeRatio = 1.0 - ((state.explosionElapsed - 3.0) / 2.0);
                            burstMat.opacity = Math.max(0, fadeRatio);
                        }
                    } else {
                        // Reset to idle
                        state.explosionState = 'idle';
                        state.explosionElapsed = 0;
                        burstMat.opacity = 0;
                        for (let i = 0; i < state.burstParticleCount * 3; i++) positions[i] = 0;
                        burstGeo.attributes.position.needsUpdate = true;
                        updateHUD();
                    }
                }
            }

            renderer.render(scene, camera);
        }

        // Start
        updateHUD();
        animate();

    </script>
</body>
</html>
