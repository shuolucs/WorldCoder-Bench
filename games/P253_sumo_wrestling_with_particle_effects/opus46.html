<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sumo Wrestling - Flamingo Edition</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Arial', sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
}

.health-bar-container {
    width: 220px;
    background: rgba(0,0,0,0.6);
    border-radius: 10px;
    padding: 10px;
    border: 2px solid rgba(255,255,255,0.3);
}

.health-bar-label {
    color: white;
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 5px;
    text-shadow: 1px 1px 2px black;
}

.health-bar-outer {
    width: 200px;
    height: 24px;
    background: rgba(0,0,0,0.5);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.2);
}

.health-bar-inner {
    height: 100%;
    border-radius: 12px;
    transition: width 0.2s ease;
}

#p1-health-bar { background: linear-gradient(to right, #cc0000, #ff3333); width: 100%; }
#p2-health-bar { background: linear-gradient(to right, #0000cc, #3333ff); width: 100%; }

.health-text {
    color: white;
    font-size: 12px;
    margin-top: 3px;
    text-shadow: 1px 1px 2px black;
}

#round-display {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #FFD700;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    pointer-events: none;
}

#start-btn, #next-round-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 20px 50px;
    font-size: 24px;
    font-weight: bold;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    z-index: 100;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.3s ease;
}

#start-btn {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #1a1a2e;
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
}

#start-btn:hover {
    transform: translate(-50%, -50%) scale(1.1);
    box-shadow: 0 0 50px rgba(255, 215, 0, 0.8);
}

#next-round-btn {
    background: linear-gradient(135deg, #00ff88, #00cc66);
    color: #1a1a2e;
    display: none;
    top: 60%;
    box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
}

#next-round-btn:hover {
    transform: translate(-50%, -50%) scale(1.1);
    box-shadow: 0 0 50px rgba(0, 255, 136, 0.8);
}

#win-message {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #FFD700;
    font-size: 48px;
    font-weight: bold;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
    display: none;
    z-index: 99;
    text-align: center;
    pointer-events: none;
}

#countdown {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #FFD700;
    font-size: 72px;
    font-weight: bold;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
    display: none;
    z-index: 98;
    pointer-events: none;
}

#attack-indicator {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 16px;
    text-shadow: 1px 1px 2px black;
    pointer-events: none;
    opacity: 0.8;
}
</style>
</head>
<body>

<div id="hud">
    <div class="health-bar-container">
        <div class="health-bar-label">🔴 PLAYER (WASD + SPACE)</div>
        <div class="health-bar-outer">
            <div class="health-bar-inner" id="p1-health-bar"></div>
        </div>
        <div class="health-text" id="p1-health-text">HP: 100/100</div>
    </div>
    <div class="health-bar-container" style="text-align: right;">
        <div class="health-bar-label">🔵 AI OPPONENT</div>
        <div class="health-bar-outer">
            <div class="health-bar-inner" id="p2-health-bar"></div>
        </div>
        <div class="health-text" id="p2-health-text">HP: 100/100</div>
    </div>
</div>

<div id="round-display">Round 1</div>
<div id="win-message"></div>
<div id="countdown"></div>
<div id="attack-indicator">SPACE to Attack | WASD to Move</div>

<button id="start-btn">⚔️ Start Game ⚔️</button>
<button id="next-round-btn">Next Round →</button>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    gameStarted: false,
    roundNumber: 1,
    p1Health: 100,
    p2Health: 100,
    p1Position: { x: 0, y: 0.3, z: 3 },
    p2Position: { x: 0, y: 0.3, z: -3 },
    p1Attacking: false,
    p2Attacking: false,
    activeParticles: 0,
    matchOver: false,
    winner: 'none',
    ringRadius: 5.0,
    distanceBetweenFighters: 6.0
};

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 12);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// Extra rim light
const rimLight = new THREE.PointLight(0xFFD700, 0.5, 30);
rimLight.position.set(0, 5, 0);
scene.add(rimLight);

// Floor
const floorGeo = new THREE.PlaneGeometry(50, 50);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Dohyo (sumo ring)
const dohyoGeo = new THREE.CylinderGeometry(5, 5, 0.3, 64);
const dohyoMat = new THREE.MeshStandardMaterial({ color: 0xDEB887, roughness: 0.7 });
const dohyo = new THREE.Mesh(dohyoGeo, dohyoMat);
dohyo.position.y = 0.15;
dohyo.receiveShadow = true;
dohyo.castShadow = true;
scene.add(dohyo);

// White ring boundary
const torusGeo = new THREE.TorusGeometry(4.8, 0.08, 16, 64);
const torusMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
const torusRing = new THREE.Mesh(torusGeo, torusMat);
torusRing.rotation.x = -Math.PI / 2;
torusRing.position.y = 0.31;
scene.add(torusRing);

// Inner circle decoration
const innerTorusGeo = new THREE.TorusGeometry(3.0, 0.05, 16, 64);
const innerTorusMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.5 });
const innerTorus = new THREE.Mesh(innerTorusGeo, innerTorusMat);
innerTorus.rotation.x = -Math.PI / 2;
innerTorus.position.y = 0.31;
scene.add(innerTorus);

// Fighter data
const fighters = {
    p1: {
        model: null,
        mixer: null,
        position: new THREE.Vector3(0, 0.3, 3),
        velocity: new THREE.Vector3(0, 0, 0),
        mass: 1,
        health: 100,
        pushForce: 0,
        attacking: false,
        lastAttackTime: 0,
        color: 0xff3333
    },
    p2: {
        model: null,
        mixer: null,
        position: new THREE.Vector3(0, 0.3, -3),
        velocity: new THREE.Vector3(0, 0, 0),
        mass: 1,
        health: 100,
        pushForce: 0,
        attacking: false,
        lastAttackTime: 0,
        color: 0x3333ff
    }
};

// Particles
const particles = [];

function createParticle(position, color, velocity, size, lifetime) {
    const geo = new THREE.SphereGeometry(size, 8, 8);
    const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 1.0 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(position);
    scene.add(mesh);
    return {
        mesh,
        velocity: velocity.clone(),
        lifetime,
        maxLifetime: lifetime,
        alive: true
    };
}

function spawnHitParticles(position) {
    for (let i = 0; i < 20; i++) {
        const vel = new THREE.Vector3(
            (Math.random() - 0.5) * 6,
            Math.random() * 4 + 1,
            (Math.random() - 0.5) * 6
        );
        const colors = [0xFFAA00, 0xFFDD00, 0xFF6600, 0xFFFF00];
        const color = colors[Math.floor(Math.random() * colors.length)];
        particles.push(createParticle(position.clone(), color, vel, 0.05, 0.8));
    }
}

function spawnEliminationParticles(position, color) {
    for (let i = 0; i < 50; i++) {
        const vel = new THREE.Vector3(
            (Math.random() - 0.5) * 10,
            Math.random() * 8 + 2,
            (Math.random() - 0.5) * 10
        );
        particles.push(createParticle(position.clone(), color, vel, 0.1, 1.5));
    }
}

function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        if (!p.alive) continue;

        p.lifetime -= dt;
        if (p.lifetime <= 0) {
            p.alive = false;
            scene.remove(p.mesh);
            p.mesh.geometry.dispose();
            p.mesh.material.dispose();
            particles.splice(i, 1);
            continue;
        }

        p.velocity.y -= 9.8 * dt;
        p.mesh.position.x += p.velocity.x * dt;
        p.mesh.position.y += p.velocity.y * dt;
        p.mesh.position.z += p.velocity.z * dt;

        if (p.mesh.position.y < 0) {
            p.mesh.position.y = 0;
            p.velocity.y *= -0.3;
        }

        p.mesh.material.opacity = p.lifetime / p.maxLifetime;
    }
}

// Load models
const loader = new GLTFLoader();
const modelURL = 'https://threejs.org/examples/models/gltf/Flamingo.glb';

let modelsLoaded = 0;

function loadFighter(key, color, posX, posZ) {
    loader.load(modelURL, (gltf) => {
        const model = gltf.scene;
        model.scale.set(0.02, 0.02, 0.02);
        model.position.set(posX, 0.3, posZ);

        model.traverse((child) => {
            if (child.isMesh) {
                child.material = child.material.clone();
                child.material.color.set(color);
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });

        scene.add(model);
        fighters[key].model = model;
        fighters[key].position.set(posX, 0.3, posZ);

        // Animation
        if (gltf.animations && gltf.animations.length > 0) {
            const mixer = new THREE.AnimationMixer(model);
            const action = mixer.clipAction(gltf.animations[0]);
            action.play();
            fighters[key].mixer = mixer;
        }

        modelsLoaded++;
        if (modelsLoaded >= 2) {
            document.getElementById('start-btn').style.display = 'block';
        }
    }, undefined, (error) => {
        console.error('Error loading model for', key, error);
        // Create fallback box
        const geo = new THREE.BoxGeometry(0.6, 1.0, 0.4);
        const mat = new THREE.MeshStandardMaterial({ color: color });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(posX, 0.8, posZ);
        mesh.castShadow = true;
        scene.add(mesh);
        fighters[key].model = mesh;
        fighters[key].position.set(posX, 0.3, posZ);
        modelsLoaded++;
        if (modelsLoaded >= 2) {
            document.getElementById('start-btn').style.display = 'block';
        }
    });
}

loadFighter('p1', 0xff3333, 0, 3);
loadFighter('p2', 0x3333ff, 0, -3);

// Input
const keys = {};
window.addEventListener('keydown', (e) => { keys[e.code] = true; });
window.addEventListener('keyup', (e) => { keys[e.code] = false; });

// Game state
let gameStarted = false;
let matchOver = false;
let winner = 'none';
let roundNumber = 1;

// UI
const startBtn = document.getElementById('start-btn');
const nextRoundBtn = document.getElementById('next-round-btn');
const winMessage = document.getElementById('win-message');
const roundDisplay = document.getElementById('round-display');

startBtn.addEventListener('click', () => {
    startBtn.style.display = 'none';
    gameStarted = true;
    window.__3D_STATE__.gameStarted = true;
});

nextRoundBtn.addEventListener('click', () => {
    nextRoundBtn.style.display = 'none';
    winMessage.style.display = 'none';
    resetRound();
});

function resetRound() {
    roundNumber++;
    window.__3D_STATE__.roundNumber = roundNumber;
    roundDisplay.textContent = `Round ${roundNumber}`;

    fighters.p1.health = 100;
    fighters.p2.health = 100;
    fighters.p1.position.set(0, 0.3, 3);
    fighters.p2.position.set(0, 0.3, -3);
    fighters.p1.velocity.set(0, 0, 0);
    fighters.p2.velocity.set(0, 0, 0);
    fighters.p1.attacking = false;
    fighters.p2.attacking = false;

    if (fighters.p1.model) {
        fighters.p1.model.position.copy(fighters.p1.position);
        fighters.p1.model.rotation.y = 0;
    }
    if (fighters.p2.model) {
        fighters.p2.model.position.copy(fighters.p2.position);
        fighters.p2.model.rotation.y = Math.PI;
    }

    matchOver = false;
    winner = 'none';
    gameStarted = true;
    window.__3D_STATE__.gameStarted = true;
    window.__3D_STATE__.matchOver = false;
    window.__3D_STATE__.winner = 'none';
}

function endMatch(w) {
    matchOver = true;
    winner = w;
    gameStarted = false;

    const loser = w === 'player' ? fighters.p2 : fighters.p1;
    spawnEliminationParticles(loser.position.clone(), loser.color);

    if (w === 'player') {
        winMessage.textContent = '🏆 Player Wins! 🏆';
        winMessage.style.color = '#ff3333';
    } else {
        winMessage.textContent = '🤖 AI Wins! 🤖';
        winMessage.style.color = '#3333ff';
    }
    winMessage.style.display = 'block';
    nextRoundBtn.style.display = 'block';
    nextRoundBtn.style.pointerEvents = 'auto';
}

function performAttack(attacker, defender, attackerKey) {
    const now = performance.now();
    if (attacker.attacking) return;
    if (now - attacker.lastAttackTime < 500) return;

    const dx = defender.position.x - attacker.position.x;
    const dz = defender.position.z - attacker.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);

    if (dist < 2.5) {
        attacker.attacking = true;
        attacker.lastAttackTime = now;

        // Damage
        defender.health = Math.max(0, defender.health - 10);

        // Push direction
        const pushDirX = dx / dist;
        const pushDirZ = dz / dist;
        defender.velocity.x += pushDirX * 1.5;
        defender.velocity.z += pushDirZ * 1.5;

        // Hit particles at midpoint
        const hitPos = new THREE.Vector3(
            (attacker.position.x + defender.position.x) / 2,
            0.5,
            (attacker.position.z + defender.position.z) / 2
        );
        spawnHitParticles(hitPos);

        // Flash effect on attacker model
        if (attacker.model) {
            attacker.model.traverse((child) => {
                if (child.isMesh) {
                    const origColor = child.material.color.clone();
                    child.material.color.set(0xffffff);
                    setTimeout(() => {
                        child.material.color.copy(origColor);
                    }, 100);
                }
            });
        }

        setTimeout(() => {
            attacker.attacking = false;
        }, 500);
    }
}

// Clock
const clock = new THREE.Clock();

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    const dt = Math.min(clock.getDelta(), 0.05);

    // Update mixers
    if (fighters.p1.mixer) fighters.p1.mixer.update(dt);
    if (fighters.p2.mixer) fighters.p2.mixer.update(dt);

    if (gameStarted && !matchOver) {
        // Player movement
        const moveSpeed = 0.08;
        if (keys['KeyW'] || keys['ArrowUp']) fighters.p1.velocity.z -= moveSpeed;
        if (keys['KeyS'] || keys['ArrowDown']) fighters.p1.velocity.z += moveSpeed;
        if (keys['KeyA'] || keys['ArrowLeft']) fighters.p1.velocity.x -= moveSpeed;
        if (keys['KeyD'] || keys['ArrowRight']) fighters.p1.velocity.x += moveSpeed;

        // Player attack
        if (keys['Space']) {
            performAttack(fighters.p1, fighters.p2, 'p1');
        }

        // AI behavior
        const aiDx = fighters.p1.position.x - fighters.p2.position.x;
        const aiDz = fighters.p1.position.z - fighters.p2.position.z;
        const aiDist = Math.sqrt(aiDx * aiDx + aiDz * aiDz);

        if (aiDist > 0.1) {
            const aiSpeed = 0.04;
            fighters.p2.velocity.x += (aiDx / aiDist) * aiSpeed;
            fighters.p2.velocity.z += (aiDz / aiDist) * aiSpeed;
        }

        // AI attack
        if (aiDist < 2.5) {
            performAttack(fighters.p2, fighters.p1, 'p2');
        }

        // Apply friction and velocity
        fighters.p1.velocity.multiplyScalar(0.92);
        fighters.p2.velocity.multiplyScalar(0.92);

        fighters.p1.position.x += fighters.p1.velocity.x;
        fighters.p1.position.z += fighters.p1.velocity.z;
        fighters.p2.position.x += fighters.p2.velocity.x;
        fighters.p2.position.z += fighters.p2.velocity.z;

        // Update model positions
        if (fighters.p1.model) {
            fighters.p1.model.position.x = fighters.p1.position.x;
            fighters.p1.model.position.z = fighters.p1.position.z;
            fighters.p1.model.position.y = fighters.p1.position.y;

            // Face opponent
            const angle1 = Math.atan2(
                fighters.p2.position.x - fighters.p1.position.x,
                fighters.p2.position.z - fighters.p1.position.z
            );
            fighters.p1.model.rotation.y = angle1;
        }

        if (fighters.p2.model) {
            fighters.p2.model.position.x = fighters.p2.position.x;
            fighters.p2.model.position.z = fighters.p2.position.z;
            fighters.p2.model.position.y = fighters.p2.position.y;

            const angle2 = Math.atan2(
                fighters.p1.position.x - fighters.p2.position.x,
                fighters.p1.position.z - fighters.p2.position.z
            );
            fighters.p2.model.rotation.y = angle2;
        }

        // Ring-out detection
        const p1Dist = Math.sqrt(fighters.p1.position.x ** 2 + fighters.p1.position.z ** 2);
        const p2Dist = Math.sqrt(fighters.p2.position.x ** 2 + fighters.p2.position.z ** 2);

        if (p1Dist > 5.0) {
            fighters.p1.health = 0;
        }
        if (p2Dist > 5.0) {
            fighters.p2.health = 0;
        }

        // Check win conditions
        if (fighters.p1.health <= 0 && !matchOver) {
            endMatch('ai');
        } else if (fighters.p2.health <= 0 && !matchOver) {
            endMatch('player');
        }
    }

    // Update particles
    updateParticles(dt);

    // Update HUD
    const p1Pct = Math.max(0, fighters.p1.health);
    const p2Pct = Math.max(0, fighters.p2.health);
    document.getElementById('p1-health-bar').style.width = p1Pct + '%';
    document.getElementById('p2-health-bar').style.width = p2Pct + '%';
    document.getElementById('p1-health-text').textContent = `HP: ${Math.round(p1Pct)}/100`;
    document.getElementById('p2-health-text').textContent = `HP: ${Math.round(p2Pct)}/100`;

    // Distance between fighters
    const fDx = fighters.p1.position.x - fighters.p2.position.x;
    const fDz = fighters.p1.position.z - fighters.p2.position.z;
    const fDist = Math.sqrt(fDx * fDx + fDz * fDz);

    // Update state
    const state = window.__3D_STATE__;
    state.gameStarted = gameStarted;
    state.roundNumber = roundNumber;
    state.p1Health = fighters.p1.health;
    state.p2Health = fighters.p2.health;
    state.p1Position = { x: fighters.p1.position.x, y: fighters.p1.position.y, z: fighters.p1.position.z };
    state.p2Position = { x: fighters.p2.position.x, y: fighters.p2.position.y, z: fighters.p2.position.z };
    state.p1Attacking = fighters.p1.attacking;
    state.p2Attacking = fighters.p2.attacking;
    state.activeParticles = particles.length;
    state.matchOver = matchOver;
    state.winner = winner;
    state.distanceBetweenFighters = fDist;

    renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
