<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Sumo Flamingo</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .health-container {
      position: absolute;
      top: 20px;
      width: 200px;
      height: 24px;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 6px;
      overflow: hidden;
    }

    #p1HealthContainer { left: 20px; }
    #p2HealthContainer { right: 20px; }

    .health-fill {
      height: 100%;
      width: 100%;
      transition: width 0.12s linear;
    }

    #p1HealthFill { background: #ff3333; }
    #p2HealthFill { background: #3333ff; }

    #roundText {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0,0,0,0.6);
    }

    .center-panel {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      pointer-events: auto;
    }

    button {
      padding: 14px 24px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #ffffff;
      color: #111;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    button:hover {
      background: #eaeaea;
    }

    #message {
      color: white;
      font-size: 40px;
      font-weight: bold;
      text-shadow: 0 0 14px rgba(0,0,0,0.7);
      display: none;
      pointer-events: none;
    }

    #nextRoundBtn {
      display: none;
    }

    #hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      text-shadow: 0 0 8px rgba(0,0,0,0.5);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="p1HealthContainer" class="health-container">
      <div id="p1HealthFill" class="health-fill"></div>
    </div>
    <div id="p2HealthContainer" class="health-container">
      <div id="p2HealthFill" class="health-fill"></div>
    </div>
    <div id="roundText">Round 1</div>

    <div class="center-panel">
      <div id="message"></div>
      <button id="startBtn">Start Game</button>
      <button id="nextRoundBtn">Next Round</button>
    </div>

    <div id="hint">WASD to move, SPACE to push attack</div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    scene.add(dirLight);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(50, 50),
      new THREE.MeshStandardMaterial({ color: '#2f2f35' })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const dohyo = new THREE.Mesh(
      new THREE.CylinderGeometry(5, 5, 0.3, 64),
      new THREE.MeshStandardMaterial({ color: '#DEB887' })
    );
    dohyo.position.y = 0.15;
    dohyo.receiveShadow = true;
    dohyo.castShadow = true;
    scene.add(dohyo);

    const boundaryRing = new THREE.Mesh(
      new THREE.TorusGeometry(4.8, 0.08, 16, 100),
      new THREE.MeshStandardMaterial({ color: '#ffffff' })
    );
    boundaryRing.rotation.x = Math.PI / 2;
    boundaryRing.position.y = 0.32;
    boundaryRing.receiveShadow = true;
    boundaryRing.castShadow = true;
    scene.add(boundaryRing);

    const clock = new THREE.Clock();
    const mixerList = [];
    const keys = {};

    const loader = new GLTFLoader();
    const modelURL = 'https://threejs.org/examples/models/gltf/Flamingo.glb';

    const p1HealthFill = document.getElementById('p1HealthFill');
    const p2HealthFill = document.getElementById('p2HealthFill');
    const roundText = document.getElementById('roundText');
    const startBtn = document.getElementById('startBtn');
    const nextRoundBtn = document.getElementById('nextRoundBtn');
    const message = document.getElementById('message');

    const RING_RADIUS = 5.0;
    const PLAYER_SPEED = 0.08;
    const AI_SPEED = 0.04;
    const ATTACK_RANGE = 2.5;
    const ATTACK_COOLDOWN = 500;
    const FRICTION = 0.92;

    const particleGeoSmall = new THREE.SphereGeometry(0.05, 8, 8);
    const particleGeoBig = new THREE.SphereGeometry(0.1, 10, 10);
    const particles = [];

    function createFighterData(name, colorHex, startPos) {
      return {
        name,
        colorHex,
        group: null,
        mixer: null,
        actions: [],
        velocity: new THREE.Vector3(),
        mass: 1,
        health: 100,
        pushForce: 0,
        lastAttackTime: -Infinity,
        attacking: false,
        eliminated: false,
        startPos: startPos.clone()
      };
    }

    const p1 = createFighterData('player', '#ff3333', new THREE.Vector3(0, 0.3, 3));
    const p2 = createFighterData('ai', '#3333ff', new THREE.Vector3(0, 0.3, -3));

    function tintModel(root, colorHex) {
      root.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          child.material = child.material.clone();
          if (child.material.color) child.material.color.set(colorHex);
          if ('emissive' in child.material && child.material.emissive) {
            child.material.emissive.set(colorHex);
            child.material.emissiveIntensity = 0.15;
          }
        }
      });
    }

    function loadFighter(fighter) {
      return new Promise((resolve, reject) => {
        loader.load(
          modelURL,
          (gltf) => {
            const root = gltf.scene;
            root.scale.set(0.02, 0.02, 0.02);
            root.position.copy(fighter.startPos);
            tintModel(root, fighter.colorHex);

            const box = new THREE.Box3().setFromObject(root);
            const size = new THREE.Vector3();
            box.getSize(size);
            if (size.y > 0) {
              root.position.y = 0.3;
            }

            scene.add(root);
            fighter.group = root;

            if (gltf.animations && gltf.animations.length > 0) {
              const mixer = new THREE.AnimationMixer(root);
              fighter.mixer = mixer;
              mixerList.push(mixer);
              gltf.animations.forEach((clip, i) => {
                const action = mixer.clipAction(clip);
                action.play();
                fighter.actions.push(action);
              });
            }

            resolve();
          },
          undefined,
          reject
        );
      });
    }

    function spawnParticles(position, count, color, size = 'small') {
      for (let i = 0; i < count; i++) {
        const material = new THREE.MeshStandardMaterial({
          color,
          transparent: true,
          opacity: 1,
          emissive: new THREE.Color(color),
          emissiveIntensity: 0.35
        });

        const mesh = new THREE.Mesh(size === 'small' ? particleGeoSmall : particleGeoBig, material);
        mesh.position.copy(position);
        mesh.castShadow = false;
        mesh.receiveShadow = false;
        scene.add(mesh);

        const speedBase = size === 'small' ? 0.08 : 0.16;
        const vel = new THREE.Vector3(
          (Math.random() - 0.5) * speedBase * 2,
          Math.random() * speedBase * 1.8 + 0.02,
          (Math.random() - 0.5) * speedBase * 2
        );

        particles.push({
          mesh,
          velocity: vel,
          life: size === 'small' ? 0.8 : 1.1,
          maxLife: size === 'small' ? 0.8 : 1.1
        });
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= dt;
        p.mesh.position.addScaledVector(p.velocity, dt * 60);
        p.velocity.y -= 0.002 * dt * 60;
        p.velocity.multiplyScalar(0.985);

        if (p.mesh.material) {
          p.mesh.material.opacity = Math.max(0, p.life / p.maxLife);
        }

        if (p.life <= 0) {
          scene.remove(p.mesh);
          if (p.mesh.material) p.mesh.material.dispose();
          particles.splice(i, 1);
        }
      }
    }

    function getXZDistance(a, b) {
      const dx = a.x - b.x;
      const dz = a.z - b.z;
      return Math.sqrt(dx * dx + dz * dz);
    }

    function getCollisionPoint(attacker, defender) {
      return new THREE.Vector3(
        (attacker.group.position.x + defender.group.position.x) / 2,
        0.8,
        (attacker.group.position.z + defender.group.position.z) / 2
      );
    }

    function attemptAttack(attacker, defender) {
      if (!gameState.gameStarted || gameState.matchOver) return;
      if (!attacker.group || !defender.group) return;

      const now = performance.now();
      if (now - attacker.lastAttackTime < ATTACK_COOLDOWN) return;

      attacker.lastAttackTime = now;
      attacker.attacking = true;
      setTimeout(() => attacker.attacking = false, ATTACK_COOLDOWN);

      const dist = getXZDistance(attacker.group.position, defender.group.position);
      if (dist > ATTACK_RANGE) return;

      const dir = new THREE.Vector3()
        .subVectors(defender.group.position, attacker.group.position)
        .setY(0);

      if (dir.lengthSq() === 0) dir.set(0, 0, 1);
      dir.normalize();

      defender.velocity.add(dir.clone().multiplyScalar(0.22 * 1.5 * 60 / 60));
      defender.group.position.add(dir.clone().multiplyScalar(1.5));
      defender.health = Math.max(0, defender.health - 10);
      attacker.pushForce = 1;

      spawnParticles(getCollisionPoint(attacker, defender), 20, '#ffbb33', 'small');

      if (defender.health <= 0 && !defender.eliminated) {
        eliminateFighter(defender, attacker.name === 'player' ? 'player' : 'ai');
      }
    }

    function eliminateFighter(loser, winnerName) {
      if (loser.eliminated) return;
      loser.eliminated = true;
      loser.health = 0;

      if (loser.group) {
        spawnParticles(
          loser.group.position.clone().add(new THREE.Vector3(0, 0.8, 0)),
          50,
          loser.colorHex,
          'big'
        );
      }

      gameState.matchOver = true;
      gameState.winner = winnerName;

      if (winnerName === 'player') {
        message.textContent = 'Player Wins!';
      } else {
        message.textContent = 'AI Wins!';
      }

      message.style.display = 'block';
      nextRoundBtn.style.display = 'inline-block';
    }

    function resetRound() {
      gameState.roundNumber += 1;
      roundText.textContent = `Round ${gameState.roundNumber}`;

      [p1, p2].forEach((fighter) => {
        fighter.health = 100;
        fighter.velocity.set(0, 0, 0);
        fighter.pushForce = 0;
        fighter.attacking = false;
        fighter.eliminated = false;
        fighter.lastAttackTime = -Infinity;
      });

      if (p1.group) {
        p1.group.position.copy(p1.startPos);
        p1.group.rotation.set(0, 0, 0);
      }
      if (p2.group) {
        p2.group.position.copy(p2.startPos);
        p2.group.rotation.set(0, Math.PI, 0);
      }

      gameState.matchOver = false;
      gameState.winner = 'none';
      gameState.gameStarted = true;

      message.style.display = 'none';
      nextRoundBtn.style.display = 'none';
      startBtn.style.display = 'none';
      updateHUD();
    }

    function startGame() {
      gameState.gameStarted = true;
      gameState.matchOver = false;
      gameState.winner = 'none';
      startBtn.style.display = 'none';
      message.style.display = 'none';
      nextRoundBtn.style.display = 'none';
    }

    function updateHUD() {
      p1HealthFill.style.width = `${Math.max(0, p1.health)}%`;
      p2HealthFill.style.width = `${Math.max(0, p2.health)}%`;
      roundText.textContent = `Round ${gameState.roundNumber}`;
    }

    function handlePlayerInput() {
      if (!p1.group) return;

      const move = new THREE.Vector3();
      if (keys['KeyW']) move.z -= PLAYER_SPEED;
      if (keys['KeyS']) move.z += PLAYER_SPEED;
      if (keys['KeyA']) move.x -= PLAYER_SPEED;
      if (keys['KeyD']) move.x += PLAYER_SPEED;

      p1.velocity.add(move);

      if (move.lengthSq() > 0) {
        const lookTarget = p1.group.position.clone().add(move);
        p1.group.lookAt(lookTarget.x, p1.group.position.y, lookTarget.z);
      }
    }

    function updateAI() {
      if (!p2.group || !p1.group) return;

      const toPlayer = new THREE.Vector3().subVectors(p1.group.position, p2.group.position).setY(0);
      const dist = toPlayer.length();

      if (dist > 0.001) {
        toPlayer.normalize();
        p2.velocity.add(toPlayer.clone().multiplyScalar(AI_SPEED));
        const lookTarget = p2.group.position.clone().add(toPlayer);
        p2.group.lookAt(lookTarget.x, p2.group.position.y, lookTarget.z);
      }

      if (dist <= ATTACK_RANGE) {
        attemptAttack(p2, p1);
      }
    }

    function updatePhysics() {
      [p1, p2].forEach((fighter) => {
        if (!fighter.group) return;

        fighter.group.position.add(fighter.velocity);
        fighter.group.position.y = 0.3;
        fighter.velocity.multiplyScalar(FRICTION);
      });
    }

    function checkRingOut() {
      [p1, p2].forEach((fighter) => {
        if (!fighter.group || fighter.eliminated || gameState.matchOver) return;
        const dist = Math.sqrt(
          fighter.group.position.x * fighter.group.position.x +
          fighter.group.position.z * fighter.group.position.z
        );

        if (dist > RING_RADIUS) {
          fighter.health = 0;
          const winnerName = fighter.name === 'player' ? 'ai' : 'player';
          eliminateFighter(fighter, winnerName);
        }
      });
    }

    function updateState() {
      const p1Pos = p1.group ? p1.group.position : new THREE.Vector3();
      const p2Pos = p2.group ? p2.group.position : new THREE.Vector3();
      const dist = getXZDistance(p1Pos, p2Pos);

      window.__3D_STATE__ = {
        gameStarted: gameState.gameStarted,
        roundNumber: gameState.roundNumber,
        p1Health: p1.health,
        p2Health: p2.health,
        p1Position: { x: p1Pos.x, y: p1Pos.y, z: p1Pos.z },
        p2Position: { x: p2Pos.x, y: p2Pos.y, z: p2Pos.z },
        p1Attacking: p1.attacking,
        p2Attacking: p2.attacking,
        activeParticles: particles.length,
        matchOver: gameState.matchOver,
        winner: gameState.winner,
        ringRadius: 5.0,
        distanceBetweenFighters: dist
      };
    }

    const gameState = {
      gameStarted: false,
      roundNumber: 1,
      matchOver: false,
      winner: 'none'
    };

    window.__3D_STATE__ = {
      gameStarted: false,
      roundNumber: 1,
      p1Health: 100,
      p2Health: 100,
      p1Position: { x: 0, y: 0.3, z: 3 },
      p2Position: { x: 0, y: 0.3, z: -3 },
      p1Attacking: false,
      p2Attacking: false,
      activeParticles: 0,
      matchOver: false,
      winner: 'none',
      ringRadius: 5.0,
      distanceBetweenFighters: 6
    };

    window.addEventListener('keydown', (e) => {
      keys[e.code] = true;

      if (e.code === 'Space') {
        e.preventDefault();
        if (gameState.gameStarted && !gameState.matchOver) {
          attemptAttack(p1, p2);
        }
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    startBtn.addEventListener('click', startGame);
    nextRoundBtn.addEventListener('click', resetRound);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    Promise.all([loadFighter(p1), loadFighter(p2)])
      .then(() => {
        if (p1.group) p1.group.lookAt(0, 0.3, 0);
        if (p2.group) p2.group.lookAt(0, 0.3, 0);
        animate();
      })
      .catch((err) => {
        console.error('Failed to load flamingo.glb:', err);
        message.textContent = 'Failed to load model.';
        message.style.display = 'block';
      });

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.033);

      mixerList.forEach((m) => m.update(dt));

      if (gameState.gameStarted && !gameState.matchOver) {
        handlePlayerInput();
        updateAI();
        updatePhysics();
        checkRingOut();
      }

      updateParticles(dt);
      updateHUD();
      updateState();

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
