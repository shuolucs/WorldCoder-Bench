<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Sumo Wrestling</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            align-items: flex-start;
        }
        .health-container {
            width: 200px;
            height: 20px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
        }
        #p1-health {
            width: 100%;
            height: 100%;
            background-color: #ff3333;
            transition: width 0.2s ease-out;
        }
        #p2-health {
            width: 100%;
            height: 100%;
            background-color: #3333ff;
            transition: width 0.2s ease-out;
            float: right;
        }
        #round-counter {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .center-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
        }
        button {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background-color: #f39c12;
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s, background-color 0.2s;
        }
        button:hover {
            background-color: #e67e22;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        button:disabled {
            background-color: #7f8c8d;
            cursor: not-allowed;
            transform: none;
        }
        #win-message {
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            margin-bottom: 20px;
            display: none;
        }
        #next-round-btn {
            display: none;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-layer">
        <div class="top-bar">
            <div class="health-container"><div id="p1-health"></div></div>
            <div id="round-counter">Round 1</div>
            <div class="health-container"><div id="p2-health"></div></div>
        </div>
        <div class="center-screen">
            <div id="win-message"></div>
            <button id="start-btn" disabled>Loading Models...</button>
            <button id="next-round-btn">Next Round</button>
        </div>
        <div class="controls-hint">P1 Controls: WASD to move, SPACE to push</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State ---
        window.__3D_STATE__ = {
            gameStarted: false,
            roundNumber: 1,
            p1Health: 100,
            p2Health: 100,
            p1Position: { x: 0, y: 0.3, z: 3 },
            p2Position: { x: 0, y: 0.3, z: -3 },
            p1Attacking: false,
            p2Attacking: false,
            activeParticles: 0,
            matchOver: false,
            winner: 'none',
            ringRadius: 5.0,
            distanceBetweenFighters: 6
        };

        let gameStarted = false;
        let matchOver = false;
        let roundNumber = 1;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // Environment
        const floorGeo = new THREE.PlaneGeometry(50, 50);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const dohyoGeo = new THREE.CylinderGeometry(5, 5, 0.3, 64);
        const dohyoMat = new THREE.MeshStandardMaterial({ color: 0xDEB887 });
        const dohyo = new THREE.Mesh(dohyoGeo, dohyoMat);
        dohyo.position.y = 0.15;
        dohyo.receiveShadow = true;
        dohyo.castShadow = true;
        scene.add(dohyo);

        const ringGeo = new THREE.TorusGeometry(4.8, 0.08, 16, 64);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2;
        ring.position.y = 0.3;
        ring.receiveShadow = true;
        ring.castShadow = true;
        scene.add(ring);

        // --- Particles ---
        const particles = [];
        const hitParticleGeo = new THREE.SphereGeometry(0.05, 8, 8);
        const deathParticleGeo = new THREE.SphereGeometry(0.1, 8, 8);

        function spawnParticles(pos, count, geo, colorHex, lifeTime) {
            const mat = new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 1 });
            for (let i = 0; i < count; i++) {
                const mesh = new THREE.Mesh(geo, mat.clone());
                mesh.position.copy(pos);
                
                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.2,
                    Math.random() * 0.2,
                    (Math.random() - 0.5) * 0.2
                );
                
                scene.add(mesh);
                particles.push({ mesh, velocity, life: lifeTime, maxLife: lifeTime });
            }
        }

        function spawnHitParticles(pos) {
            spawnParticles(pos, 20, hitParticleGeo, 0xffaa00, 0.8);
        }

        function spawnDeathParticles(pos, colorHex) {
            spawnParticles(pos, 50, deathParticleGeo, colorHex, 1.5);
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.mesh.position.add(p.velocity);
                p.life -= dt;
                p.mesh.material.opacity = p.life / p.maxLife;
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    p.mesh.material.dispose();
                    particles.splice(i, 1);
                }
            }
        }

        // --- Fighters ---
        class Fighter {
            constructor(gltf, colorHex, startPos) {
                this.mesh = gltf.scene.clone();
                this.mesh.scale.set(0.02, 0.02, 0.02);
                this.mesh.position.copy(startPos);
                
                this.mesh.traverse((child) => {
                    if (child.isMesh) {
                        child.material = child.material.clone();
                        child.material.color.setHex(colorHex);
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                this.mixer = new THREE.AnimationMixer(this.mesh);
                if (gltf.animations && gltf.animations.length > 0) {
                    const action = this.mixer.clipAction(gltf.animations[0]);
                    action.play();
                }

                this.velocity = new THREE.Vector3();
                this.health = 100;
                this.lastAttackTime = 0;
                this.colorHex = colorHex;
                this.startPos = startPos.clone();
                
                scene.add(this.mesh);
            }

            reset() {
                this.mesh.position.copy(this.startPos);
                this.velocity.set(0, 0, 0);
                this.health = 100;
                this.lastAttackTime = 0;
                this.mesh.visible = true;
            }
        }

        let p1, p2;
        const loader = new GLTFLoader();
        // Using a reliable CDN for the standard three.js flamingo model
        loader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/models/gltf/Flamingo.glb', (gltf) => {
            p1 = new Fighter(gltf, 0xff3333, new THREE.Vector3(0, 0.3, 3));
            p2 = new Fighter(gltf, 0x3333ff, new THREE.Vector3(0, 0.3, -3));
            
            p1.mesh.lookAt(p2.mesh.position);
            p2.mesh.lookAt(p1.mesh.position);

            const startBtn = document.getElementById('start-btn');
            startBtn.textContent = 'Start Game';
            startBtn.disabled = false;
        });

        // --- Input ---
        const keys = { w: false, a: false, s: false, d: false, ' ': false };
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });

        // --- UI & Flow ---
        const uiP1Health = document.getElementById('p1-health');
        const uiP2Health = document.getElementById('p2-health');
        const uiRound = document.getElementById('round-counter');
        const startBtn = document.getElementById('start-btn');
        const nextRoundBtn = document.getElementById('next-round-btn');
        const winMessage = document.getElementById('win-message');

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            gameStarted = true;
        });

        nextRoundBtn.addEventListener('click', () => {
            p1.reset();
            p2.reset();
            p1.mesh.lookAt(p2.mesh.position);
            p2.mesh.lookAt(p1.mesh.position);
            
            roundNumber++;
            uiRound.textContent = `Round ${roundNumber}`;
            
            winMessage.style.display = 'none';
            nextRoundBtn.style.display = 'none';
            
            matchOver = false;
            window.__3D_STATE__.winner = 'none';
        });

        function triggerWin(winnerStr, loserFighter) {
            matchOver = true;
            window.__3D_STATE__.winner = winnerStr;
            
            if (loserFighter) {
                loserFighter.health = 0;
                loserFighter.mesh.visible = false;
                spawnDeathParticles(loserFighter.mesh.position, loserFighter.colorHex);
            }

            winMessage.textContent = winnerStr === 'player' ? 'Player Wins!' : 'AI Wins!';
            winMessage.style.color = winnerStr === 'player' ? '#ff3333' : '#3333ff';
            winMessage.style.display = 'block';
            nextRoundBtn.style.display = 'inline-block';
        }

        // --- Main Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const now = performance.now();

            if (p1 && p2) {
                p1.mixer.update(dt);
                p2.mixer.update(dt);

                if (gameStarted && !matchOver) {
                    // P1 Movement (Acceleration)
                    const p1Speed = 0.008;
                    if (keys.w) p1.velocity.z -= p1Speed;
                    if (keys.s) p1.velocity.z += p1Speed;
                    if (keys.a) p1.velocity.x -= p1Speed;
                    if (keys.d) p1.velocity.x += p1Speed;

                    // P2 AI Movement
                    const dist = p1.mesh.position.distanceTo(p2.mesh.position);
                    if (dist > 1.5) {
                        const dirToP1 = p1.mesh.position.clone().sub(p2.mesh.position).normalize();
                        p2.velocity.x += dirToP1.x * 0.004;
                        p2.velocity.z += dirToP1.z * 0.004;
                    }

                    // Friction
                    p1.velocity.multiplyScalar(0.92);
                    p2.velocity.multiplyScalar(0.92);

                    // Apply Velocity
                    p1.mesh.position.add(p1.velocity);
                    p2.mesh.position.add(p2.velocity);

                    // Keep on ground
                    p1.mesh.position.y = 0.3;
                    p2.mesh.position.y = 0.3;

                    // Look at each other
                    if (p1.velocity.lengthSq() > 0.0001 || p2.velocity.lengthSq() > 0.0001) {
                        p1.mesh.lookAt(p2.mesh.position.x, 0.3, p2.mesh.position.z);
                        p2.mesh.lookAt(p1.mesh.position.x, 0.3, p1.mesh.position.z);
                    }

                    // Attacks
                    // P1 Attack
                    if (keys[' '] && now - p1.lastAttackTime > 500) {
                        p1.lastAttackTime = now;
                        if (dist < 2.5) {
                            p2.health -= 10;
                            const knockbackDir = p2.mesh.position.clone().sub(p1.mesh.position).normalize();
                            p2.velocity.add(knockbackDir.multiplyScalar(0.12));
                            spawnHitParticles(p2.mesh.position);
                        }
                    }

                    // P2 AI Attack
                    if (dist < 2.5 && now - p2.lastAttackTime > 500) {
                        p2.lastAttackTime = now;
                        p1.health -= 10;
                        const knockbackDir = p1.mesh.position.clone().sub(p2.mesh.position).normalize();
                        p1.velocity.add(knockbackDir.multiplyScalar(0.12));
                        spawnHitParticles(p1.mesh.position);
                    }

                    // Ring Out & Health Checks
                    const p1DistFromCenter = Math.sqrt(p1.mesh.position.x**2 + p1.mesh.position.z**2);
                    const p2DistFromCenter = Math.sqrt(p2.mesh.position.x**2 + p2.mesh.position.z**2);

                    if (p1DistFromCenter > 5.0 || p1.health <= 0) {
                        triggerWin('ai', p1);
                    } else if (p2DistFromCenter > 5.0 || p2.health <= 0) {
                        triggerWin('player', p2);
                    }
                }

                // Update UI
                uiP1Health.style.width = `${Math.max(0, p1.health)}%`;
                uiP2Health.style.width = `${Math.max(0, p2.health)}%`;

                // Update State Object
                window.__3D_STATE__.gameStarted = gameStarted;
                window.__3D_STATE__.roundNumber = roundNumber;
                window.__3D_STATE__.p1Health = p1.health;
                window.__3D_STATE__.p2Health = p2.health;
                window.__3D_STATE__.p1Position = { x: p1.mesh.position.x, y: p1.mesh.position.y, z: p1.mesh.position.z };
                window.__3D_STATE__.p2Position = { x: p2.mesh.position.x, y: p2.mesh.position.y, z: p2.mesh.position.z };
                window.__3D_STATE__.p1Attacking = (now - p1.lastAttackTime < 500);
                window.__3D_STATE__.p2Attacking = (now - p2.lastAttackTime < 500);
                window.__3D_STATE__.activeParticles = particles.length;
                window.__3D_STATE__.matchOver = matchOver;
                window.__3D_STATE__.distanceBetweenFighters = p1.mesh.position.distanceTo(p2.mesh.position);
            }

            updateParticles(dt);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
