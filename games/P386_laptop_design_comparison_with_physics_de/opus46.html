<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laptop Design Comparison Tool</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#debug-overlay {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(0, 0, 0, 0.85);
    color: #00ff88;
    padding: 15px;
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    min-width: 320px;
    border: 1px solid #00ff8844;
    z-index: 100;
    backdrop-filter: blur(10px);
}

#debug-overlay h3 {
    color: #00ffcc;
    margin-bottom: 8px;
    font-size: 14px;
    border-bottom: 1px solid #00ff8844;
    padding-bottom: 5px;
}

.debug-section {
    margin-bottom: 8px;
    padding: 5px;
    border-left: 2px solid;
    padding-left: 8px;
}

.debug-section.design-a { border-color: #e74c3c; }
.debug-section.design-b { border-color: #2ecc71; }
.debug-section.design-c { border-color: #3498db; }

.debug-label { color: #888; }
.debug-value { color: #00ff88; font-weight: bold; }
.debug-total { color: #ffaa00; font-weight: bold; margin-top: 5px; padding-top: 5px; border-top: 1px solid #333; }

#hud-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 80px;
    background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.7));
    display: flex;
    align-items: center;
    padding: 0 30px;
    z-index: 100;
    border-top: 1px solid rgba(255,255,255,0.1);
}

.hud-design-name {
    font-size: 24px;
    font-weight: bold;
    color: #fff;
    min-width: 200px;
}

.hud-specs {
    color: #aaa;
    font-size: 13px;
    flex: 1;
    padding: 0 30px;
    line-height: 1.6;
}

.hud-score-container {
    min-width: 250px;
}

.hud-score-label {
    color: #888;
    font-size: 11px;
    margin-bottom: 4px;
}

.hud-score-bar {
    height: 12px;
    background: rgba(255,255,255,0.1);
    border-radius: 6px;
    overflow: hidden;
}

.hud-score-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.5s ease, background 0.5s ease;
}

.controls-hint {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    z-index: 100;
    text-align: center;
}
</style>
</head>
<body>

<div id="debug-overlay">
    <h3>⚙ Physics Debug Overlay</h3>
    <div class="debug-section design-a" id="debug-a"></div>
    <div class="debug-section design-b" id="debug-b"></div>
    <div class="debug-section design-c" id="debug-c"></div>
    <div class="debug-total" id="debug-total"></div>
</div>

<div id="hud-bar">
    <div class="hud-design-name" id="hud-name">No Selection</div>
    <div class="hud-specs" id="hud-specs">Click a pedestal or press 1/2/3 to select a design</div>
    <div class="hud-score-container">
        <div class="hud-score-label">COMPARISON SCORE</div>
        <div class="hud-score-bar">
            <div class="hud-score-fill" id="hud-score-fill" style="width: 0%; background: #555;"></div>
        </div>
    </div>
</div>

<div class="controls-hint">
    [1/2/3] Select Design &nbsp;|&nbsp; [Click] Impulse Lid &nbsp;|&nbsp; [Space] Impulse All &nbsp;|&nbsp; [R] Reset &nbsp;|&nbsp; [D] Debug &nbsp;|&nbsp; [O] Orbit
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// State
window.__3D_STATE__ = {
    modelLoaded: false,
    selectedDesign: 0,
    lidAngles: [110, 110, 110],
    lidVelocities: [0, 0, 0],
    springForces: [0, 0, 0],
    systemEnergy: 0,
    debugOverlayVisible: true,
    orbitEnabled: false,
    pedestalHeights: [0.15, 0.15, 0.15],
    fps: 0,
    simStep: 0,
    resetCount: 0,
    massImpulseCount: 0
};

// Scene
const scene = new THREE.Scene();

// Gradient background
const canvas2d = document.createElement('canvas');
canvas2d.width = 2;
canvas2d.height = 512;
const ctx = canvas2d.getContext('2d');
const gradient = ctx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#1a1a2e');
gradient.addColorStop(1, '#16213e');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(canvas2d);
scene.background = bgTexture;

// Camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 8);
camera.lookAt(0, 0.5, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Orbit Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.enabled = false;
controls.target.set(0, 0.5, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const warmLight = new THREE.DirectionalLight(0xffeaa7, 0.8);
warmLight.position.set(5, 8, 5);
warmLight.castShadow = true;
warmLight.shadow.mapSize.set(2048, 2048);
warmLight.shadow.camera.near = 0.5;
warmLight.shadow.camera.far = 30;
warmLight.shadow.camera.left = -10;
warmLight.shadow.camera.right = 10;
warmLight.shadow.camera.top = 10;
warmLight.shadow.camera.bottom = -10;
scene.add(warmLight);

const coolLight = new THREE.DirectionalLight(0x74b9ff, 0.6);
coolLight.position.set(-5, 6, -3);
scene.add(coolLight);

// Ground plane
const groundGeom = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x222244,
    metalness: 0.9,
    roughness: 0.1
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Load GLB model
const loader = new GLTFLoader();
loader.load('._stork.glb',
    (gltf) => {
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2 / maxDim;
        model.scale.setScalar(scale);
        const newBox = new THREE.Box3().setFromObject(model);
        const center = newBox.getCenter(new THREE.Vector3());
        model.position.sub(center);
        model.position.y += 1.5;
        model.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        scene.add(model);
        window.__3D_STATE__.modelLoaded = true;
        console.log('Model loaded successfully');
    },
    undefined,
    (error) => {
        console.warn('Could not load ._stork.glb, creating placeholder mascot');
        // Create a placeholder mascot
        const mascotGroup = new THREE.Group();
        
        // Body
        const bodyGeom = new THREE.ConeGeometry(0.4, 1.2, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff8800, metalness: 0.3, roughness: 0.6 });
        const body = new THREE.Mesh(bodyGeom, bodyMat);
        body.position.y = 0.6;
        body.castShadow = true;
        mascotGroup.add(body);
        
        // Head
        const headGeom = new THREE.SphereGeometry(0.3, 16, 16);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffaa33, metalness: 0.3, roughness: 0.6 });
        const head = new THREE.Mesh(headGeom, headMat);
        head.position.y = 1.4;
        head.castShadow = true;
        mascotGroup.add(head);
        
        // Eyes
        const eyeGeom = new THREE.SphereGeometry(0.06, 8, 8);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const eyeL = new THREE.Mesh(eyeGeom, eyeMat);
        eyeL.position.set(-0.1, 1.45, 0.25);
        mascotGroup.add(eyeL);
        const eyeR = new THREE.Mesh(eyeGeom, eyeMat);
        eyeR.position.set(0.1, 1.45, 0.25);
        mascotGroup.add(eyeR);
        
        // Beak
        const beakGeom = new THREE.ConeGeometry(0.08, 0.3, 4);
        const beakMat = new THREE.MeshStandardMaterial({ color: 0xff4444 });
        const beak = new THREE.Mesh(beakGeom, beakMat);
        beak.position.set(0, 1.35, 0.35);
        beak.rotation.x = Math.PI / 2;
        mascotGroup.add(beak);
        
        mascotGroup.position.set(0, 1.5, 0);
        scene.add(mascotGroup);
        
        // Float animation stored on group
        mascotGroup.userData.isMascot = true;
        window._mascot = mascotGroup;
        window.__3D_STATE__.modelLoaded = true;
    }
);

// Design data
const designs = [
    { name: 'Design A', color: 0xe74c3c, screenGlow: 0xff6b6b, x: -3.5, score: 78, specs: 'Ultra-thin bezel • 14" OLED • 1.2kg • 12hr battery' },
    { name: 'Design B', color: 0x2ecc71, screenGlow: 0x51cf66, x: 0, score: 92, specs: 'Modular design • 15.6" Mini-LED • 1.8kg • 16hr battery' },
    { name: 'Design C', color: 0x3498db, screenGlow: 0x339af0, x: 3.5, score: 85, specs: 'Convertible 2-in-1 • 13.3" AMOLED • 1.0kg • 10hr battery' }
];

// Physics state
const REST_ANGLE = 110 * Math.PI / 180;
const SPRING_K = 15;
const DAMPING_C = 2.5;

const physicsState = designs.map(() => ({
    angle: REST_ANGLE,
    angularVelocity: 0
}));

// Pedestal and laptop groups
const pedestals = [];
const laptopGroups = [];
const lidPivots = [];
const targetPedestalY = [0.15, 0.15, 0.15];
const currentPedestalY = [0.15, 0.15, 0.15];

designs.forEach((design, i) => {
    // Pedestal
    const pedestalGeom = new THREE.BoxGeometry(2, 0.3, 1.5);
    const pedestalMat = new THREE.MeshStandardMaterial({
        color: design.color,
        metalness: 0.4,
        roughness: 0.3,
        emissive: design.color,
        emissiveIntensity: 0.1
    });
    const pedestal = new THREE.Mesh(pedestalGeom, pedestalMat);
    pedestal.position.set(design.x, 0.15, 0);
    pedestal.castShadow = true;
    pedestal.receiveShadow = true;
    pedestal.userData.designIndex = i;
    scene.add(pedestal);
    pedestals.push(pedestal);

    // Laptop group
    const laptopGroup = new THREE.Group();
    laptopGroup.position.set(design.x, 0.3, 0);

    // Base
    const baseGeom = new THREE.BoxGeometry(1.6, 0.08, 1.0);
    const baseMat = new THREE.MeshStandardMaterial({
        color: 0x333333,
        metalness: 0.7,
        roughness: 0.2
    });
    const base = new THREE.Mesh(baseGeom, baseMat);
    base.position.y = 0.04;
    base.castShadow = true;
    laptopGroup.add(base);

    // Keyboard detail on base
    const kbGeom = new THREE.PlaneGeometry(1.3, 0.7);
    const kbMat = new THREE.MeshStandardMaterial({
        color: 0x222222,
        metalness: 0.5,
        roughness: 0.8
    });
    const kb = new THREE.Mesh(kbGeom, kbMat);
    kb.rotation.x = -Math.PI / 2;
    kb.position.y = 0.081;
    kb.position.z = 0.05;
    laptopGroup.add(kb);

    // Trackpad
    const tpGeom = new THREE.PlaneGeometry(0.4, 0.3);
    const tpMat = new THREE.MeshStandardMaterial({
        color: 0x2a2a2a,
        metalness: 0.6,
        roughness: 0.3
    });
    const tp = new THREE.Mesh(tpGeom, tpMat);
    tp.rotation.x = -Math.PI / 2;
    tp.position.y = 0.082;
    tp.position.z = 0.35;
    laptopGroup.add(tp);

    // Lid pivot (at back edge of base)
    const lidPivot = new THREE.Group();
    lidPivot.position.set(0, 0.08, -0.5);

    // Screen
    const screenGeom = new THREE.BoxGeometry(1.5, 0.04, 1.0);
    const screenMat = new THREE.MeshStandardMaterial({
        color: 0x2a2a2a,
        metalness: 0.6,
        roughness: 0.2
    });
    const screen = new THREE.Mesh(screenGeom, screenMat);
    screen.position.set(0, 0, 0.5);
    screen.castShadow = true;
    lidPivot.add(screen);

    // Screen display face
    const displayGeom = new THREE.PlaneGeometry(1.3, 0.85);
    const displayMat = new THREE.MeshStandardMaterial({
        color: 0x111111,
        emissive: design.screenGlow,
        emissiveIntensity: 0.5,
        metalness: 0.1,
        roughness: 0.3
    });
    const display = new THREE.Mesh(displayGeom, displayMat);
    display.position.set(0, 0.021, 0.5);
    display.rotation.x = 0;
    lidPivot.add(display);

    // Set initial angle
    lidPivot.rotation.x = -(Math.PI - REST_ANGLE);

    laptopGroup.add(lidPivot);
    scene.add(laptopGroup);
    laptopGroups.push(laptopGroup);
    lidPivots.push(lidPivot);
});

// Raycaster for clicking
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function selectDesign(index) {
    const prev = window.__3D_STATE__.selectedDesign;
    window.__3D_STATE__.selectedDesign = index;

    // Reset all pedestals
    designs.forEach((d, i) => {
        targetPedestalY[i] = 0.15;
        pedestals[i].material.emissiveIntensity = 0.1;
    });

    if (index > 0) {
        const idx = index - 1;
        targetPedestalY[idx] = 0.45;
        pedestals[idx].material.emissiveIntensity = 0.5;

        // Update HUD
        document.getElementById('hud-name').textContent = designs[idx].name;
        document.getElementById('hud-name').style.color = '#' + designs[idx].color.toString(16).padStart(6, '0');
        document.getElementById('hud-specs').textContent = designs[idx].specs;
        const fill = document.getElementById('hud-score-fill');
        fill.style.width = designs[idx].score + '%';
        fill.style.background = '#' + designs[idx].color.toString(16).padStart(6, '0');
    } else {
        document.getElementById('hud-name').textContent = 'No Selection';
        document.getElementById('hud-name').style.color = '#fff';
        document.getElementById('hud-specs').textContent = 'Click a pedestal or press 1/2/3 to select a design';
        document.getElementById('hud-score-fill').style.width = '0%';
    }
}

function applyImpulse(index) {
    physicsState[index].angularVelocity += -5;
}

// Mouse click
renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(pedestals);

    if (intersects.length > 0) {
        const idx = intersects[0].object.userData.designIndex;
        selectDesign(idx + 1);
        applyImpulse(idx);
    }
});

// Keyboard
document.addEventListener('keydown', (event) => {
    switch (event.key) {
        case '1': selectDesign(1); break;
        case '2': selectDesign(2); break;
        case '3': selectDesign(3); break;
        case 'd':
        case 'D':
            window.__3D_STATE__.debugOverlayVisible = !window.__3D_STATE__.debugOverlayVisible;
            document.getElementById('debug-overlay').style.display =
                window.__3D_STATE__.debugOverlayVisible ? 'block' : 'none';
            break;
        case 'r':
        case 'R':
            physicsState.forEach(s => {
                s.angle = REST_ANGLE;
                s.angularVelocity = 0;
            });
            window.__3D_STATE__.resetCount++;
            break;
        case ' ':
            event.preventDefault();
            physicsState.forEach((s, i) => applyImpulse(i));
            window.__3D_STATE__.massImpulseCount++;
            break;
        case 'o':
        case 'O':
            window.__3D_STATE__.orbitEnabled = !window.__3D_STATE__.orbitEnabled;
            controls.enabled = window.__3D_STATE__.orbitEnabled;
            break;
    }
});

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation
let lastTime = performance.now();
let frameCount = 0;
let fpsTime = 0;
let currentFps = 60;
const FIXED_DT = 1 / 120;

function updateDebugOverlay() {
    const state = window.__3D_STATE__;
    const labels = ['A', 'B', 'C'];
    const ids = ['debug-a', 'debug-b', 'debug-c'];

    for (let i = 0; i < 3; i++) {
        const el = document.getElementById(ids[i]);
        const angle = state.lidAngles[i].toFixed(1);
        const vel = state.lidVelocities[i].toFixed(3);
        const force = state.springForces[i].toFixed(3);
        const ke = 0.5 * physicsState[i].angularVelocity * physicsState[i].angularVelocity;
        const pe = 0.5 * SPRING_K * Math.pow(physicsState[i].angle - REST_ANGLE, 2);
        const energy = (ke + pe).toFixed(4);

        el.innerHTML = `<b>Design ${labels[i]}</b><br>` +
            `<span class="debug-label">Angle:</span> <span class="debug-value">${angle}°</span> &nbsp;` +
            `<span class="debug-label">ω:</span> <span class="debug-value">${vel} rad/s</span><br>` +
            `<span class="debug-label">Spring τ:</span> <span class="debug-value">${force} N·m</span> &nbsp;` +
            `<span class="debug-label">E:</span> <span class="debug-value">${energy} J</span>`;
    }

    const totalEl = document.getElementById('debug-total');
    totalEl.innerHTML = `<span class="debug-label">Total Energy:</span> <span class="debug-value">${state.systemEnergy.toFixed(4)} J</span><br>` +
        `<span class="debug-label">FPS:</span> <span class="debug-value">${state.fps}</span> &nbsp;` +
        `<span class="debug-label">Steps:</span> <span class="debug-value">${state.simStep}</span><br>` +
        `<span class="debug-label">Resets:</span> <span class="debug-value">${state.resetCount}</span> &nbsp;` +
        `<span class="debug-label">Mass Impulses:</span> <span class="debug-value">${state.massImpulseCount}</span>`;
}

function animate(now) {
    requestAnimationFrame(animate);

    const dt = Math.min((now - lastTime) / 1000, 0.1);
    lastTime = now;

    // FPS
    frameCount++;
    fpsTime += dt;
    if (fpsTime >= 0.5) {
        currentFps = Math.round(frameCount / fpsTime);
        frameCount = 0;
        fpsTime = 0;
    }

    // Physics (fixed timestep)
    let steps = Math.floor(dt / FIXED_DT);
    steps = Math.min(steps, 10);
    if (steps < 1) steps = 1;

    for (let s = 0; s < steps; s++) {
        for (let i = 0; i < 3; i++) {
            const ps = physicsState[i];
            const displacement = ps.angle - REST_ANGLE;
            const springForce = -SPRING_K * displacement;
            const dampingForce = -DAMPING_C * ps.angularVelocity;
            const totalForce = springForce + dampingForce;

            ps.angularVelocity += totalForce * FIXED_DT;
            ps.angle += ps.angularVelocity * FIXED_DT;

            // Clamp angle between 0 and 180 degrees
            const minAngle = 5 * Math.PI / 180;
            const maxAngle = 175 * Math.PI / 180;
            if (ps.angle < minAngle) {
                ps.angle = minAngle;
                ps.angularVelocity = Math.abs(ps.angularVelocity) * 0.3;
            }
            if (ps.angle > maxAngle) {
                ps.angle = maxAngle;
                ps.angularVelocity = -Math.abs(ps.angularVelocity) * 0.3;
            }
        }
        window.__3D_STATE__.simStep++;
    }

    // Update lid rotations
    let totalEnergy = 0;
    for (let i = 0; i < 3; i++) {
        const ps = physicsState[i];
        lidPivots[i].rotation.x = -(Math.PI - ps.angle);

        const displacement = ps.angle - REST_ANGLE;
        const springForce = -SPRING_K * displacement;

        window.__3D_STATE__.lidAngles[i] = ps.angle * 180 / Math.PI;
        window.__3D_STATE__.lidVelocities[i] = ps.angularVelocity;
        window.__3D_STATE__.springForces[i] = springForce;

        const ke = 0.5 * ps.angularVelocity * ps.angularVelocity;
        const pe = 0.5 * SPRING_K * displacement * displacement;
        totalEnergy += ke + pe;
    }

    // Smooth pedestal movement
    for (let i = 0; i < 3; i++) {
        currentPedestalY[i] += (targetPedestalY[i] - currentPedestalY[i]) * Math.min(dt * 5, 1);
        pedestals[i].position.y = currentPedestalY[i];
        laptopGroups[i].position.y = currentPedestalY[i] + 0.15;
        window.__3D_STATE__.pedestalHeights[i] = currentPedestalY[i];
    }

    // Mascot float animation
    if (window._mascot) {
        window._mascot.position.y = 1.5 + Math.sin(now * 0.002) * 0.15;
        window._mascot.rotation.y += dt * 0.5;
    }

    // Update state
    window.__3D_STATE__.systemEnergy = totalEnergy;
    window.__3D_STATE__.fps = currentFps;

    // Update debug overlay
    if (window.__3D_STATE__.debugOverlayVisible) {
        updateDebugOverlay();
    }

    // Controls update
    if (controls.enabled) {
        controls.update();
    }

    renderer.render(scene, camera);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
