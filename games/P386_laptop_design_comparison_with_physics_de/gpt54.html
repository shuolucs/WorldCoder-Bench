<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Laptop Design Comparison Tool</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 100%);
      font-family: Inter, Arial, sans-serif;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #debug-overlay {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 320px;
      max-width: calc(100vw - 24px);
      background: rgba(10, 14, 24, 0.88);
      border: 1px solid rgba(120, 180, 255, 0.25);
      border-radius: 10px;
      padding: 12px 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      font-size: 12px;
      line-height: 1.4;
      z-index: 10;
      white-space: pre-line;
    }

    #hud-bar {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: min(900px, calc(100vw - 24px));
      background: rgba(8, 12, 20, 0.9);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 12px 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.3);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .hud-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .hud-specs {
      font-size: 13px;
      opacity: 0.88;
      margin-bottom: 10px;
    }

    .score-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .score-label {
      font-size: 12px;
      opacity: 0.85;
      min-width: 74px;
    }

    .score-bar-bg {
      flex: 1;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      transition: width 0.25s ease, background 0.25s ease;
    }

    .score-value {
      font-size: 12px;
      opacity: 0.95;
      min-width: 42px;
      text-align: right;
    }

    .kbd {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 5px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="debug-overlay"></div>
    <div id="hud-bar">
      <div class="hud-title" id="hud-title">No Design Selected</div>
      <div class="hud-specs" id="hud-specs">
        Click a pedestal or press <span class="kbd">1</span>/<span class="kbd">2</span>/<span class="kbd">3</span> to select a laptop design.
      </div>
      <div class="score-wrap">
        <div class="score-label">Score</div>
        <div class="score-bar-bg">
          <div class="score-bar-fill" id="score-fill"></div>
        </div>
        <div class="score-value" id="score-value">0</div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { RoundedBoxGeometry } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/geometries/RoundedBoxGeometry.js';

    const app = document.getElementById('app');
    const debugOverlay = document.getElementById('debug-overlay');
    const hudTitle = document.getElementById('hud-title');
    const hudSpecs = document.getElementById('hud-specs');
    const scoreFill = document.getElementById('score-fill');
    const scoreValue = document.getElementById('score-value');

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enabled = false;
    controls.target.set(0, 1.2, 0);
    controls.update();

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const warmLight = new THREE.DirectionalLight(0xffeaa7, 0.8);
    warmLight.position.set(5, 8, 5);
    warmLight.castShadow = true;
    scene.add(warmLight);

    const coolLight = new THREE.DirectionalLight(0x74b9ff, 0.6);
    coolLight.position.set(-5, 6, -3);
    scene.add(coolLight);

    const groundGeo = new THREE.PlaneGeometry(20, 20);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x222244,
      metalness: 0.9,
      roughness: 0.1
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const clock = new THREE.Clock();

    const REST_ANGLE_DEG = 110;
    const REST_ANGLE = THREE.MathUtils.degToRad(REST_ANGLE_DEG);
    const SPRING_K = 15;
    const DAMPING_C = 2.5;
    const LID_INERTIA = 1.0;

    const pedestalColors = [0xe74c3c, 0x2ecc71, 0x3498db];
    const screenGlowColors = [0xff6b6b, 0x51cf66, 0x339af0];
    const xPositions = [-3.5, 0, 3.5];

    const designData = [
      null,
      {
        name: 'Design A',
        specs: 'Slim aluminum chassis • vivid warm display • balanced productivity profile',
        score: 78,
        color: '#e74c3c'
      },
      {
        name: 'Design B',
        specs: 'Eco-efficient thermal layout • strong battery outlook • versatile daily performer',
        score: 86,
        color: '#2ecc71'
      },
      {
        name: 'Design C',
        specs: 'Performance-forward internals • cool visual tuning • creator-focused concept',
        score: 91,
        color: '#3498db'
      }
    ];

    const laptops = [];
    const pedestals = [];
    const selectableObjects = [];
    const tweens = [];

    function createLaptop(index) {
      const group = new THREE.Group();

      const baseGeo = new RoundedBoxGeometry(1.6, 0.08, 1.0, 4, 0.04);
      const baseMat = new THREE.MeshStandardMaterial({
        color: 0x2d3436,
        metalness: 0.65,
        roughness: 0.25
      });
      const base = new THREE.Mesh(baseGeo, baseMat);
      base.castShadow = true;
      base.receiveShadow = true;
      base.position.y = 0.22;
      group.add(base);

      const hinge = new THREE.Group();
      hinge.position.set(0, 0.24, -0.48);
      group.add(hinge);

      const screenGeo = new RoundedBoxGeometry(1.5, 0.04, 1.0, 4, 0.025);
      const screenMat = new THREE.MeshStandardMaterial({
        color: 0x111827,
        emissive: new THREE.Color(screenGlowColors[index]),
        emissiveIntensity: 0.8,
        metalness: 0.35,
        roughness: 0.3
      });
      const screen = new THREE.Mesh(screenGeo, screenMat);
      screen.castShadow = true;
      screen.receiveShadow = true;
      screen.position.set(0, 0.5, 0.02);
      hinge.add(screen);

      const panelGeo = new THREE.PlaneGeometry(1.32, 0.86);
      const panelMat = new THREE.MeshStandardMaterial({
        color: 0x0b1020,
        emissive: new THREE.Color(screenGlowColors[index]),
        emissiveIntensity: 1.2,
        side: THREE.DoubleSide
      });
      const panel = new THREE.Mesh(panelGeo, panelMat);
      panel.position.set(0, 0.5, 0.025);
      hinge.add(panel);

      hinge.rotation.x = -REST_ANGLE;

      return {
        group,
        base,
        hinge,
        screen,
        panel,
        angle: REST_ANGLE,
        velocity: 0,
        springForce: 0
      };
    }

    function createPedestal(index, x) {
      const pedestalMat = new THREE.MeshStandardMaterial({
        color: pedestalColors[index],
        emissive: new THREE.Color(pedestalColors[index]),
        emissiveIntensity: 0.18,
        metalness: 0.35,
        roughness: 0.4
      });
      const pedestal = new THREE.Mesh(
        new THREE.BoxGeometry(2, 0.3, 1.5),
        pedestalMat
      );
      pedestal.position.set(x, 0.15, 0);
      pedestal.castShadow = true;
      pedestal.receiveShadow = true;
      pedestal.userData.designIndex = index + 1;
      scene.add(pedestal);

      const laptop = createLaptop(index);
      laptop.group.position.set(x, 0, 0);
      scene.add(laptop.group);

      pedestals.push({
        mesh: pedestal,
        baseY: 0.15,
        targetY: 0.15,
        currentY: 0.15
      });
      laptops.push(laptop);
      selectableObjects.push(pedestal);
    }

    xPositions.forEach((x, i) => createPedestal(i, x));

    const mascotAnchor = new THREE.Group();
    mascotAnchor.position.set(0, 1.5, 0);
    scene.add(mascotAnchor);

    const loader = new GLTFLoader();

    let storkLoaded = false;
    loader.load(
      '._stork.glb',
      (gltf) => {
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const scale = 2 / maxDim;
        model.scale.setScalar(scale);

        const box2 = new THREE.Box3().setFromObject(model);
        const center = new THREE.Vector3();
        box2.getCenter(center);
        model.position.sub(center);

        mascotAnchor.add(model);
        storkLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load ._stork.glb:', err);
      }
    );

    let selectedDesign = 0;
    let debugVisible = true;
    let orbitEnabled = false;
    let simStep = 0;
    let resetCount = 0;
    let massImpulseCount = 0;
    let fps = 0;

    function applyImpulseToDesign(designIndex, impulse = -5) {
      const laptop = laptops[designIndex - 1];
      if (!laptop) return;
      laptop.velocity += impulse;
    }

    function selectDesign(designIndex) {
      selectedDesign = designIndex;

      pedestals.forEach((p, i) => {
        const active = (i + 1) === designIndex;
        p.targetY = active ? 0.45 : 0.15;
        p.mesh.material.emissiveIntensity = active ? 0.75 : 0.18;
      });

      if (designIndex >= 1 && designIndex <= 3) {
        const d = designData[designIndex];
        hudTitle.textContent = d.name;
        hudSpecs.textContent = d.specs;
        scoreFill.style.width = `${d.score}%`;
        scoreFill.style.background = `linear-gradient(90deg, ${d.color}, #ffffff22), ${d.color}`;
        scoreValue.textContent = String(d.score);
      } else {
        hudTitle.textContent = 'No Design Selected';
        hudSpecs.innerHTML = `Click a pedestal or press <span class="kbd">1</span>/<span class="kbd">2</span>/<span class="kbd">3</span> to select a laptop design.`;
        scoreFill.style.width = '0%';
        scoreValue.textContent = '0';
      }
    }

    function resetLids() {
      laptops.forEach((laptop) => {
        laptop.angle = REST_ANGLE;
        laptop.velocity = 0;
        laptop.springForce = 0;
        laptop.hinge.rotation.x = -laptop.angle;
      });
      resetCount++;
    }

    function applyMassImpulse() {
      laptops.forEach((_, i) => applyImpulseToDesign(i + 1, -5));
      massImpulseCount++;
    }

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === 'd') {
        debugVisible = !debugVisible;
        debugOverlay.style.display = debugVisible ? 'block' : 'none';
      } else if (key === '1') {
        selectDesign(1);
      } else if (key === '2') {
        selectDesign(2);
      } else if (key === '3') {
        selectDesign(3);
      } else if (key === 'r') {
        resetLids();
      } else if (e.code === 'Space') {
        e.preventDefault();
        applyMassImpulse();
      } else if (key === 'o') {
        orbitEnabled = !orbitEnabled;
        controls.enabled = orbitEnabled;
      }
    });

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(selectableObjects, false);
      if (hits.length > 0) {
        const designIndex = hits[0].object.userData.designIndex;
        selectDesign(designIndex);
        applyImpulseToDesign(designIndex, -5);
      }
    }

    renderer.domElement.addEventListener('pointerdown', onPointerDown);

    function updatePhysics(dt) {
      laptops.forEach((laptop) => {
        const displacement = laptop.angle - REST_ANGLE;
        const springTorque = -SPRING_K * displacement;
        const dampingTorque = -DAMPING_C * laptop.velocity;
        const totalTorque = springTorque + dampingTorque;
        const angularAccel = totalTorque / LID_INERTIA;

        laptop.velocity += angularAccel * dt;
        laptop.angle += laptop.velocity * dt;

        const minAngle = THREE.MathUtils.degToRad(15);
        const maxAngle = THREE.MathUtils.degToRad(165);
        if (laptop.angle < minAngle) {
          laptop.angle = minAngle;
          laptop.velocity *= -0.15;
        } else if (laptop.angle > maxAngle) {
          laptop.angle = maxAngle;
          laptop.velocity *= -0.15;
        }

        laptop.springForce = springTorque;
        laptop.hinge.rotation.x = -laptop.angle;
      });
      simStep++;
    }

    function updatePedestalTweens(dt) {
      pedestals.forEach((p, i) => {
        p.currentY = THREE.MathUtils.damp(p.currentY, p.targetY, 8, dt);
        p.mesh.position.y = p.currentY;
        laptops[i].group.position.y = p.currentY - 0.15;
      });
    }

    let fpsAccum = 0;
    let fpsFrames = 0;
    let fpsTimer = 0;

    function computeEnergy() {
      let total = 0;
      const perLaptop = laptops.map((laptop) => {
        const kinetic = 0.5 * LID_INERTIA * laptop.velocity * laptop.velocity;
        const potential = 0.5 * SPRING_K * Math.pow(laptop.angle - REST_ANGLE, 2);
        const energy = kinetic + potential;
        total += energy;
        return energy;
      });
      return { total, perLaptop };
    }

    function updateDebug(dt) {
      fpsAccum += dt;
      fpsFrames++;
      fpsTimer += dt;
      if (fpsTimer >= 0.25) {
        fps = fpsFrames / fpsAccum;
        fpsFrames = 0;
        fpsAccum = 0;
        fpsTimer = 0;
      }

      const energies = computeEnergy();

      debugOverlay.textContent =
`Physics Debug Overlay

Laptop A
  Lid Angle: ${(THREE.MathUtils.radToDeg(laptops[0].angle)).toFixed(2)}°
  Angular Velocity: ${laptops[0].velocity.toFixed(3)} rad/s
  Spring Force: ${laptops[0].springForce.toFixed(3)} N·m
  Energy: ${energies.perLaptop[0].toFixed(3)} J

Laptop B
  Lid Angle: ${(THREE.MathUtils.radToDeg(laptops[1].angle)).toFixed(2)}°
  Angular Velocity: ${laptops[1].velocity.toFixed(3)} rad/s
  Spring Force: ${laptops[1].springForce.toFixed(3)} N·m
  Energy: ${energies.perLaptop[1].toFixed(3)} J

Laptop C
  Lid Angle: ${(THREE.MathUtils.radToDeg(laptops[2].angle)).toFixed(2)}°
  Angular Velocity: ${laptops[2].velocity.toFixed(3)} rad/s
  Spring Force: ${laptops[2].springForce.toFixed(3)} N·m
  Energy: ${energies.perLaptop[2].toFixed(3)} J

Total System Energy: ${energies.total.toFixed(3)} J
FPS: ${fps.toFixed(1)}
Simulation Steps: ${simStep}
Orbit: ${orbitEnabled ? 'Enabled' : 'Disabled'}
Debug: ${debugVisible ? 'Visible' : 'Hidden'}`;

      window.__3D_STATE__ = {
        modelLoaded: storkLoaded,
        selectedDesign,
        lidAngles: laptops.map(l => THREE.MathUtils.radToDeg(l.angle)),
        lidVelocities: laptops.map(l => l.velocity),
        springForces: laptops.map(l => l.springForce),
        systemEnergy: energies.total,
        debugOverlayVisible: debugVisible,
        orbitEnabled,
        pedestalHeights: pedestals.map(p => p.currentY),
        fps,
        simStep,
        resetCount,
        massImpulseCount
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 1 / 30);

      updatePhysics(dt);
      updatePedestalTweens(dt);

      if (controls.enabled) controls.update();

      updateDebug(dt);
      renderer.render(scene, camera);
    }

    selectDesign(0);
    resetLids();
    debugOverlay.style.display = 'block';
    window.__3D_STATE__ = {
      modelLoaded: false,
      selectedDesign: 0,
      lidAngles: [REST_ANGLE_DEG, REST_ANGLE_DEG, REST_ANGLE_DEG],
      lidVelocities: [0, 0, 0],
      springForces: [0, 0, 0],
      systemEnergy: 0,
      debugOverlayVisible: true,
      orbitEnabled: false,
      pedestalHeights: [0.15, 0.15, 0.15],
      fps: 0,
      simStep: 0,
      resetCount,
      massImpulseCount
    };

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
