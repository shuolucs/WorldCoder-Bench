<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Design Comparison</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #debug-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #444;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            min-width: 200px;
        }
        #hud-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 40, 0.9);
            border: 1px solid #555;
            padding: 20px;
            border-radius: 12px;
            z-index: 10;
            text-align: center;
            min-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            transition: opacity 0.3s;
        }
        #hud-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        #hud-specs {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 15px;
        }
        .score-container {
            width: 100%;
            background: #333;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }
        #hud-score-bar {
            height: 100%;
            width: 0%;
            background: #fff;
            transition: width 0.5s ease-out, background-color 0.5s;
        }
        .controls-hint {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="controls-hint">
        <b>Controls:</b><br>
        Click Pedestal: Select & Impulse<br>
        1, 2, 3: Select Design A, B, C<br>
        Space: Mass Impulse<br>
        R: Reset Lids<br>
        O: Toggle Orbit Camera<br>
        D: Toggle Debug Overlay
    </div>

    <div id="debug-overlay"></div>
    
    <div id="hud-bar">
        <div id="hud-title">Select a Design</div>
        <div id="hud-specs">--</div>
        <div class="score-container">
            <div id="hud-score-bar"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // State Management
        window.__3D_STATE__ = {
            modelLoaded: false,
            selectedDesign: 0,
            lidAngles: [110, 110, 110],
            lidVelocities: [0, 0, 0],
            springForces: [0, 0, 0],
            systemEnergy: 0,
            debugOverlayVisible: true,
            orbitEnabled: false,
            pedestalHeights: [0.15, 0.15, 0.15],
            fps: 0,
            simStep: 0,
            resetCount: 0,
            massImpulseCount: 0
        };

        // Scene Setup
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enabled = false;
        controls.enableDamping = true;

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        
        const warmLight = new THREE.DirectionalLight(0xffeaa7, 0.8);
        warmLight.position.set(5, 8, 5);
        scene.add(warmLight);

        const coolLight = new THREE.DirectionalLight(0x74b9ff, 0.6);
        coolLight.position.set(-5, 6, -3);
        scene.add(coolLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x222244, 
            metalness: 0.9, 
            roughness: 0.1 
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Load Mascot Model
        const loader = new GLTFLoader();
        loader.load('._stork.glb', (gltf) => {
            const model = gltf.scene;
            
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 2 / maxDim;
            model.scale.setScalar(scale);
            
            box.setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            model.position.y += 1.5;
            
            scene.add(model);
            window.__3D_STATE__.modelLoaded = true;
        }, undefined, (error) => {
            console.warn("Could not load ._stork.glb. Ensure the file exists relative to this HTML.", error);
        });

        // Product Platforms & Laptops
        const designs = [
            { id: 1, name: "Design A", color: 0xe74c3c, screen: 0xff6b6b, x: -3.5, specs: "Ultra-thin chassis, 14\" OLED Display", score: 85 },
            { id: 2, name: "Design B", color: 0x2ecc71, screen: 0x51cf66, x: 0, specs: "Performance build, 16\" Mini-LED, Advanced Cooling", score: 95 },
            { id: 3, name: "Design C", color: 0x3498db, screen: 0x339af0, x: 3.5, specs: "Convertible 2-in-1, 13\" Touchscreen, Stylus Support", score: 78 }
        ];

        const laptops = [];
        const restAngleRad = 110 * Math.PI / 180;

        designs.forEach((data, index) => {
            // Pedestal
            const pedGeo = new THREE.BoxGeometry(2, 0.3, 1.5);
            const pedMat = new THREE.MeshStandardMaterial({ 
                color: data.color,
                emissive: data.color,
                emissiveIntensity: 0
            });
            const pedestal = new THREE.Mesh(pedGeo, pedMat);
            pedestal.position.set(data.x, 0.15, 0);
            pedestal.userData = { id: data.id, index: index };
            scene.add(pedestal);

            // Laptop Base
            const baseGeo = new THREE.BoxGeometry(1.6, 0.08, 1.0);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.6 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.set(0, 0.15 + 0.04, 0);
            pedestal.add(base);

            // Hinge Group
            const hinge = new THREE.Group();
            hinge.position.set(0, 0.04, -0.5);
            base.add(hinge);

            // Screen
            const screenGeo = new THREE.BoxGeometry(1.5, 0.04, 1.0);
            const screenMat = new THREE.MeshStandardMaterial({ 
                color: 0x111111, 
                emissive: data.screen, 
                emissiveIntensity: 0.8 
            });
            const screen = new THREE.Mesh(screenGeo, screenMat);
            screen.position.set(0, 0.02, 0.5);
            hinge.add(screen);

            hinge.rotation.x = -restAngleRad;

            laptops.push({
                id: data.id,
                data: data,
                pedestal: pedestal,
                hinge: hinge,
                angle: restAngleRad,
                velocity: 0,
                targetY: 0.15
            });
        });

        // Interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function selectDesign(id) {
            window.__3D_STATE__.selectedDesign = id;
            const hud = document.getElementById('hud-bar');
            
            if (id === 0) {
                hud.style.display = 'none';
            } else {
                hud.style.display = 'block';
            }

            laptops.forEach(lap => {
                if (lap.id === id) {
                    lap.targetY = 0.45;
                    lap.pedestal.material.emissiveIntensity = 0.4;
                    
                    document.getElementById('hud-title').innerText = lap.data.name;
                    document.getElementById('hud-title').style.color = '#' + lap.data.screen.toString(16).padStart(6, '0');
                    document.getElementById('hud-specs').innerText = lap.data.specs;
                    
                    const scoreBar = document.getElementById('hud-score-bar');
                    scoreBar.style.width = lap.data.score + '%';
                    scoreBar.style.backgroundColor = '#' + lap.data.screen.toString(16).padStart(6, '0');
                } else {
                    lap.targetY = 0.15;
                    lap.pedestal.material.emissiveIntensity = 0;
                }
            });
        }

        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(laptops.map(l => l.pedestal));

            if (intersects.length > 0) {
                const ped = intersects[0].object;
                const id = ped.userData.id;
                selectDesign(id);
                
                const lap = laptops.find(l => l.id === id);
                lap.velocity += -5; // Closing impulse
            }
        });

        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            if (key === '1') selectDesign(1);
            if (key === '2') selectDesign(2);
            if (key === '3') selectDesign(3);
            
            if (key === 'r') {
                laptops.forEach(l => { l.angle = restAngleRad; l.velocity = 0; });
                window.__3D_STATE__.resetCount++;
            }
            
            if (key === ' ') {
                laptops.forEach(l => l.velocity += -5);
                window.__3D_STATE__.massImpulseCount++;
            }
            
            if (key === 'o') {
                controls.enabled = !controls.enabled;
                window.__3D_STATE__.orbitEnabled = controls.enabled;
            }
            
            if (key === 'd') {
                const debug = document.getElementById('debug-overlay');
                debug.style.display = debug.style.display === 'none' ? 'block' : 'none';
                window.__3D_STATE__.debugOverlayVisible = debug.style.display !== 'none';
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Physics & Animation Loop
        const clock = new THREE.Clock();
        const k = 15; // Spring constant
        const c = 2.5; // Damping
        
        let frames = 0;
        let lastFpsTime = performance.now();

        function updateDebugUI() {
            if (!window.__3D_STATE__.debugOverlayVisible) return;
            const s = window.__3D_STATE__;
            let html = `<b>Physics Debug</b><br>`;
            html += `FPS: ${s.fps} | Step: ${s.simStep}<br>`;
            html += `Total Energy: ${s.systemEnergy.toFixed(3)} J<br>`;
            html += `Orbit: ${s.orbitEnabled ? 'ON' : 'OFF'}<br><hr style="border-color:#444">`;
            
            ['A', 'B', 'C'].forEach((name, i) => {
                html += `<span style="color:${['#ff6b6b','#51cf66','#339af0'][i]}"><b>Design ${name}</b></span><br>`;
                html += `Angle: ${s.lidAngles[i].toFixed(1)}°<br>`;
                html += `Vel: ${s.lidVelocities[i].toFixed(2)} rad/s<br>`;
                html += `Force: ${s.springForces[i].toFixed(2)} N·m<br>`;
                if(i<2) html += `<br>`;
            });
            document.getElementById('debug-overlay').innerHTML = html;
        }

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1);
            let totalEnergy = 0;

            laptops.forEach((lap, i) => {
                // Physics
                const springTorque = -k * (lap.angle - restAngleRad);
                const dampingTorque = -c * lap.velocity;
                const totalTorque = springTorque + dampingTorque;
                
                lap.velocity += totalTorque * dt;
                lap.angle += lap.velocity * dt;

                // Collision with base (0 rad)
                if (lap.angle < 0) {
                    lap.angle = 0;
                    lap.velocity *= -0.3; // Bounce
                }
                // Max open angle
                if (lap.angle > Math.PI) {
                    lap.angle = Math.PI;
                    lap.velocity *= -0.3;
                }

                lap.hinge.rotation.x = -lap.angle;

                // Energy calculation (I=1)
                const pe = 0.5 * k * Math.pow(lap.angle - restAngleRad, 2);
                const ke = 0.5 * Math.pow(lap.velocity, 2);
                totalEnergy += (pe + ke);

                // Tween pedestal height
                lap.pedestal.position.y += (lap.targetY - lap.pedestal.position.y) * 10 * dt;

                // Update State
                window.__3D_STATE__.lidAngles[i] = lap.angle * 180 / Math.PI;
                window.__3D_STATE__.lidVelocities[i] = lap.velocity;
                window.__3D_STATE__.springForces[i] = totalTorque;
                window.__3D_STATE__.pedestalHeights[i] = lap.pedestal.position.y;
            });

            window.__3D_STATE__.systemEnergy = totalEnergy;
            window.__3D_STATE__.simStep++;

            // FPS Calculation
            frames++;
            const now = performance.now();
            if (now >= lastFpsTime + 1000) {
                window.__3D_STATE__.fps = Math.round((frames * 1000) / (now - lastFpsTime));
                frames = 0;
                lastFpsTime = now;
            }

            updateDebugUI();

            if (controls.enabled) controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
