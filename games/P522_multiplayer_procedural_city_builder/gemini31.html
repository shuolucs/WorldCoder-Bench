<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Procedural City Builder</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .panel {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            pointer-events: auto;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        #top-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px;
        }
        #turn-info {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .p1-text { color: #ff6666; }
        .p2-text { color: #6666ff; }
        #score-info {
            font-size: 1.1rem;
            text-align: right;
        }
        #bottom-bar {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding: 15px;
            gap: 10px;
        }
        .build-btn {
            background: #333;
            color: white;
            border: 2px solid transparent;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .build-btn:hover { background: #444; }
        .build-btn.selected { border-color: white; transform: scale(1.05); }
        .color-indicator { width: 20px; height: 20px; border-radius: 4px; }
        
        #side-panel {
            position: absolute;
            top: 80px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button.action-btn {
            background: #4a4a4a;
            color: white;
            border: 1px solid #666;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        button.action-btn:hover { background: #5a5a5a; }
        
        #message-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 50, 50, 0.9);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.5rem;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .key-hint { font-size: 0.8rem; color: #aaa; }
    </style>
    <!-- Import Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="top-bar">
            <div class="panel" id="turn-panel">
                <div id="turn-info"><span id="player-name" class="p1-text">Player 1</span> Turn | Turn: <span id="turn-count">1</span></div>
                <div style="font-size: 0.9rem; margin-top: 5px; color: #ccc;">Population: <span id="pop-count">0</span></div>
            </div>
            <div class="panel" id="score-panel">
                <div id="score-info">
                    <span class="p1-text">P1 Score: <span id="p1-score">0</span></span> | 
                    <span class="p2-text">P2 Score: <span id="p2-score">0</span></span>
                </div>
            </div>
        </div>
        
        <div id="side-panel">
            <button class="panel action-btn" id="btn-undo">Undo (Z)</button>
            <button class="panel action-btn" id="btn-reset">Reset City</button>
        </div>

        <div id="bottom-bar">
            <button class="build-btn" data-type="residential">
                <div class="color-indicator" style="background: #0000ff;"></div>
                Residential <span class="key-hint">(R)</span>
            </button>
            <button class="build-btn" data-type="commercial">
                <div class="color-indicator" style="background: #ffff00;"></div>
                Commercial <span class="key-hint">(C)</span>
            </button>
            <button class="build-btn" data-type="industrial">
                <div class="color-indicator" style="background: #888888;"></div>
                Industrial <span class="key-hint">(I)</span>
            </button>
            <button class="build-btn" data-type="park">
                <div class="color-indicator" style="background: #00ff00;"></div>
                Park <span class="key-hint">(P)</span>
            </button>
            <button class="build-btn" data-type="road">
                <div class="color-indicator" style="background: #333333;"></div>
                Road <span class="key-hint">(O)</span>
            </button>
        </div>
    </div>

    <div id="message-overlay">Cell Occupied!</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            currentPlayer: 1,
            turnNumber: 1,
            selectedType: null,
            player1Score: 0,
            player2Score: 0,
            totalBuildings: 0,
            population: 0,
            gridOccupancy: Array(20).fill(null).map(() => Array(20).fill('empty')),
            hoveredCell: null,
            lastPlacement: null,
            buildingCounts: { residential: 0, commercial: 0, industrial: 0, park: 0, road: 0 },
            canUndo: false
        };

        const state = window.__3D_STATE__;
        const gridMeshes = Array(20).fill(null).map(() => Array(20).fill(null));

        // --- Constants ---
        const GRID_SIZE = 20;
        const CELL_SIZE = 2;
        const OFFSET = (GRID_SIZE * CELL_SIZE) / 2; // 20
        
        const BUILDING_TYPES = {
            residential: { color: 0x0000ff, key: 'r' },
            commercial: { color: 0xffff00, key: 'c' },
            industrial: { color: 0x888888, key: 'i' },
            park: { color: 0x00ff00, key: 'p' },
            road: { color: 0x333333, key: 'o' }
        };

        const PLAYER_COLORS = {
            1: 0xff0000,
            2: 0x0000ff
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(30, 40, 30);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 30, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -25;
        dirLight.shadow.camera.right = 25;
        dirLight.shadow.camera.top = 25;
        dirLight.shadow.camera.bottom = -25;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Ground & Grid ---
        const groundGeo = new THREE.PlaneGeometry(40, 40);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x556B2F });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(40, 20, 0x000000, 0x000000);
        gridHelper.position.y = 0.01;
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        const buildingsGroup = new THREE.Group();
        scene.add(buildingsGroup);

        // --- Hover Cursor ---
        const hoverGeo = new THREE.TorusGeometry(0.8, 0.1, 8, 24);
        const hoverMat = new THREE.MeshBasicMaterial({ color: PLAYER_COLORS[1] });
        const hoverCursor = new THREE.Mesh(hoverGeo, hoverMat);
        hoverCursor.rotation.x = -Math.PI / 2;
        hoverCursor.position.y = 0.05;
        hoverCursor.visible = false;
        scene.add(hoverCursor);

        // --- Raycasting ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function getGridCoords(intersectPoint) {
            const x = intersectPoint.x;
            const z = intersectPoint.z;
            const col = Math.floor((x + OFFSET) / CELL_SIZE);
            const row = Math.floor((z + OFFSET) / CELL_SIZE);
            if (row >= 0 && row < GRID_SIZE && col >= 0 && col < GRID_SIZE) {
                return { row, col };
            }
            return null;
        }

        function getWorldCoords(row, col) {
            const x = col * CELL_SIZE - OFFSET + CELL_SIZE / 2;
            const z = row * CELL_SIZE - OFFSET + CELL_SIZE / 2;
            return { x, z };
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(ground);

            if (intersects.length > 0) {
                const coords = getGridCoords(intersects[0].point);
                if (coords) {
                    state.hoveredCell = coords;
                    const worldPos = getWorldCoords(coords.row, coords.col);
                    hoverCursor.position.x = worldPos.x;
                    hoverCursor.position.z = worldPos.z;
                    hoverCursor.visible = true;
                } else {
                    state.hoveredCell = null;
                    hoverCursor.visible = false;
                }
            } else {
                state.hoveredCell = null;
                hoverCursor.visible = false;
            }
        });

        // --- Building Logic ---
        function getMixedColor(baseHex, playerHex) {
            const base = new THREE.Color(baseHex);
            const player = new THREE.Color(playerHex);
            return base.lerp(player, 0.2);
        }

        function createBuildingMesh(row, col, type, player) {
            const seed = row * 20 + col;
            const baseColor = BUILDING_TYPES[type].color;
            const playerColor = PLAYER_COLORS[player];
            const finalColor = getMixedColor(baseColor, playerColor);
            const mat = new THREE.MeshLambertMaterial({ color: finalColor });
            
            let mesh, height = 0, popGained = 0;

            if (type === 'residential') {
                height = 2 + (((seed * 7) % 10) / 10) * 4;
                const geo = new THREE.BoxGeometry(1.6, height, 1.6);
                mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = height / 2;
                popGained = 10 + Math.floor(height * 5);
            } else if (type === 'commercial') {
                height = 3 + (((seed * 13) % 10) / 10) * 5;
                const geo = new THREE.BoxGeometry(1.8, height, 1.8);
                mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = height / 2;
            } else if (type === 'industrial') {
                height = 2 + (((seed * 11) % 10) / 10) * 3;
                const geo = new THREE.CylinderGeometry(0.8, 0.8, height, 16);
                mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = height / 2;
            } else if (type === 'park') {
                mesh = new THREE.Group();
                
                const planeGeo = new THREE.PlaneGeometry(1.8, 1.8);
                const planeMat = new THREE.MeshLambertMaterial({ color: finalColor });
                const plane = new THREE.Mesh(planeGeo, planeMat);
                plane.rotation.x = -Math.PI / 2;
                plane.position.y = 0.02;
                plane.receiveShadow = true;
                mesh.add(plane);

                const sphereGeo = new THREE.SphereGeometry(0.7, 16, 16);
                const sphereMat = new THREE.MeshLambertMaterial({ color: finalColor });
                const sphere = new THREE.Mesh(sphereGeo, sphereMat);
                sphere.position.y = 0.7;
                sphere.castShadow = true;
                mesh.add(sphere);
            } else if (type === 'road') {
                height = 0.05;
                const geo = new THREE.BoxGeometry(2, height, 2);
                mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = height / 2;
            }

            if (type !== 'park') {
                mesh.castShadow = true;
                mesh.receiveShadow = true;
            }

            const worldPos = getWorldCoords(row, col);
            mesh.position.x = worldPos.x;
            mesh.position.z = worldPos.z;

            return { mesh, popGained };
        }

        function getNeighbors(row, col) {
            const neighbors = [];
            if (row > 0) neighbors.push(state.gridOccupancy[row - 1][col]);
            if (row < GRID_SIZE - 1) neighbors.push(state.gridOccupancy[row + 1][col]);
            if (col > 0) neighbors.push(state.gridOccupancy[row][col - 1]);
            if (col < GRID_SIZE - 1) neighbors.push(state.gridOccupancy[row][col + 1]);
            return neighbors;
        }

        function calculateScore(row, col, type) {
            let score = 10; // Base score
            const neighbors = getNeighbors(row, col);

            if (type === 'residential') {
                const parks = neighbors.filter(n => n === 'park').length;
                score += parks * 5;
            } else if (type === 'commercial') {
                const roads = neighbors.filter(n => n === 'road').length;
                score += roads * 3;
            } else if (type === 'industrial') {
                const hasRes = neighbors.includes('residential');
                if (!hasRes) score += 4;
            }
            return score;
        }

        function showMessage(msg) {
            const overlay = document.getElementById('message-overlay');
            overlay.textContent = msg;
            overlay.style.opacity = 1;
            setTimeout(() => { overlay.style.opacity = 0; }, 1500);
        }

        // --- Interaction ---
        window.addEventListener('click', () => {
            if (!state.hoveredCell || !state.selectedType) return;
            
            const { row, col } = state.hoveredCell;

            if (state.gridOccupancy[row][col] !== 'empty') {
                showMessage('Cell Occupied!');
                return;
            }

            // Place building
            const { mesh, popGained } = createBuildingMesh(row, col, state.selectedType, state.currentPlayer);
            buildingsGroup.add(mesh);
            gridMeshes[row][col] = mesh;
            
            state.gridOccupancy[row][col] = state.selectedType;
            state.buildingCounts[state.selectedType]++;
            state.totalBuildings++;
            state.population += popGained;

            const scoreGained = calculateScore(row, col, state.selectedType);
            if (state.currentPlayer === 1) state.player1Score += scoreGained;
            else state.player2Score += scoreGained;

            // Save for undo
            state.lastPlacement = {
                row, col, 
                type: state.selectedType, 
                player: state.currentPlayer,
                scoreGained,
                popGained,
                mesh
            };
            state.canUndo = true;

            // Switch turn
            state.currentPlayer = state.currentPlayer === 1 ? 2 : 1;
            if (state.currentPlayer === 1) state.turnNumber++;

            updateUI();
        });

        function undo() {
            if (!state.canUndo || !state.lastPlacement) return;

            const lp = state.lastPlacement;
            
            // Remove mesh
            buildingsGroup.remove(lp.mesh);
            gridMeshes[lp.row][lp.col] = null;
            
            // Revert state
            state.gridOccupancy[lp.row][lp.col] = 'empty';
            state.buildingCounts[lp.type]--;
            state.totalBuildings--;
            state.population -= lp.popGained;

            if (lp.player === 1) state.player1Score -= lp.scoreGained;
            else state.player2Score -= lp.scoreGained;

            // Revert turn
            state.currentPlayer = lp.player;
            if (state.currentPlayer === 2) state.turnNumber--;

            state.canUndo = false;
            state.lastPlacement = null;

            updateUI();
        }

        function resetCity() {
            // Clear meshes
            while(buildingsGroup.children.length > 0){ 
                buildingsGroup.remove(buildingsGroup.children[0]); 
            }
            
            // Reset state
            state.currentPlayer = 1;
            state.turnNumber = 1;
            state.player1Score = 0;
            state.player2Score = 0;
            state.totalBuildings = 0;
            state.population = 0;
            state.canUndo = false;
            state.lastPlacement = null;
            
            for(let r=0; r<GRID_SIZE; r++) {
                for(let c=0; c<GRID_SIZE; c++) {
                    state.gridOccupancy[r][c] = 'empty';
                    gridMeshes[r][c] = null;
                }
            }
            Object.keys(state.buildingCounts).forEach(k => state.buildingCounts[k] = 0);

            updateUI();
        }

        // --- UI & Input Handling ---
        const buttons = document.querySelectorAll('.build-btn');
        
        function selectType(type) {
            state.selectedType = type;
            buttons.forEach(btn => {
                if (btn.dataset.type === type) btn.classList.add('selected');
                else btn.classList.remove('selected');
            });
            updateUI();
        }

        buttons.forEach(btn => {
            btn.addEventListener('click', () => selectType(btn.dataset.type));
        });

        document.getElementById('btn-undo').addEventListener('click', undo);
        document.getElementById('btn-reset').addEventListener('click', resetCity);

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            for (const [type, data] of Object.entries(BUILDING_TYPES)) {
                if (key === data.key) selectType(type);
            }
            if (key === 'z') undo();
        });

        function updateUI() {
            // Update Top Bar
            const pName = document.getElementById('player-name');
            pName.textContent = `Player ${state.currentPlayer}`;
            pName.className = state.currentPlayer === 1 ? 'p1-text' : 'p2-text';
            
            document.getElementById('turn-count').textContent = state.turnNumber;
            document.getElementById('p1-score').textContent = state.player1Score;
            document.getElementById('p2-score').textContent = state.player2Score;
            document.getElementById('pop-count').textContent = state.population;

            // Update Hover Cursor Color
            hoverMat.color.setHex(PLAYER_COLORS[state.currentPlayer]);

            // Update Undo Button
            document.getElementById('btn-undo').style.opacity = state.canUndo ? 1 : 0.5;
            document.getElementById('btn-undo').style.cursor = state.canUndo ? 'pointer' : 'not-allowed';
        }

        // Initial UI setup
        updateUI();

        // --- Render Loop ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

    </script>
</body>
</html>
