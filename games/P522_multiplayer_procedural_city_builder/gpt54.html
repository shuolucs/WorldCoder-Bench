<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Procedural City Builder</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #87CEEB;
    }

    #hudTopLeft, #hudTopRight, #hudBottom, #message {
      position: absolute;
      z-index: 10;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.7);
      user-select: none;
    }

    #hudTopLeft {
      top: 12px;
      left: 12px;
      font-size: 22px;
      font-weight: bold;
      padding: 8px 12px;
      background: rgba(0,0,0,0.25);
      border-radius: 8px;
    }

    #hudTopRight {
      top: 12px;
      right: 12px;
      font-size: 18px;
      text-align: right;
      padding: 8px 12px;
      background: rgba(0,0,0,0.25);
      border-radius: 8px;
    }

    #hudBottom {
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 90vw;
      padding: 10px 12px;
      background: rgba(0,0,0,0.28);
      border-radius: 12px;
    }

    .btn {
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      color: #111;
      transition: transform 0.08s, border-color 0.15s, box-shadow 0.15s;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn.selected {
      border-color: white;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.35);
    }

    #message {
      top: 72px;
      left: 12px;
      font-size: 18px;
      font-weight: bold;
      color: #ffdede;
      background: rgba(120,0,0,0.45);
      padding: 8px 12px;
      border-radius: 8px;
      display: none;
    }

    .residential { background: #4f8cff; color: white; }
    .commercial { background: #f0d13a; color: #222; }
    .industrial { background: #9a9a9a; color: white; }
    .park { background: #4caf50; color: white; }
    .road { background: #555; color: white; }
    .reset { background: #ff6b6b; color: white; }
  </style>
</head>
<body>
  <div id="hudTopLeft"></div>
  <div id="hudTopRight"></div>
  <div id="message"></div>

  <div id="hudBottom">
    <button class="btn residential" data-type="residential">Residential (R)</button>
    <button class="btn commercial" data-type="commercial">Commercial (C)</button>
    <button class="btn industrial" data-type="industrial">Industrial (I)</button>
    <button class="btn park" data-type="park">Park (P)</button>
    <button class="btn road" data-type="road">Road (O)</button>
    <button class="btn reset" id="resetBtn">Reset City</button>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(30, 40, 30);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(20, 30, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -40;
    dirLight.shadow.camera.right = 40;
    dirLight.shadow.camera.top = 40;
    dirLight.shadow.camera.bottom = -40;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 100;
    scene.add(dirLight);

    // Ground
    const groundGroup = new THREE.Group();
    scene.add(groundGroup);

    const groundPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 40),
      new THREE.MeshStandardMaterial({ color: 0x7b8b5a, roughness: 1 })
    );
    groundPlane.rotation.x = -Math.PI / 2;
    groundPlane.receiveShadow = true;
    groundPlane.name = "ground";
    groundGroup.add(groundPlane);

    const gridHelper = new THREE.GridHelper(40, 20, 0x333333, 0x333333);
    gridHelper.position.y = 0.01;
    groundGroup.add(gridHelper);

    // Constants
    const GRID_SIZE = 20;
    const CELL_SIZE = 2;
    const GRID_ORIGIN_X = -20;
    const GRID_ORIGIN_Z = -20;

    const PLAYER_COLORS = {
      1: new THREE.Color(0xff4444),
      2: new THREE.Color(0x4488ff)
    };

    const TYPE_BASE_COLORS = {
      residential: new THREE.Color(0x4f8cff),
      commercial: new THREE.Color(0xf0d13a),
      industrial: new THREE.Color(0x9a9a9a),
      park: new THREE.Color(0x4caf50),
      road: new THREE.Color(0x555555)
    };

    const hudTopLeft = document.getElementById("hudTopLeft");
    const hudTopRight = document.getElementById("hudTopRight");
    const messageEl = document.getElementById("message");
    const resetBtn = document.getElementById("resetBtn");
    const typeButtons = [...document.querySelectorAll("[data-type]")];

    // State
    let gridOccupancy = createEmptyGrid();
    let buildingRecords = createRecordGrid();
    let buildingGroup = new THREE.Group();
    scene.add(buildingGroup);

    let currentPlayer = 1;
    let turnNumber = 1;
    let selectedType = "residential";
    let player1Score = 0;
    let player2Score = 0;
    let hoveredCell = null;
    let totalBuildings = 0;
    let population = 0;
    let canUndo = false;
    let lastPlacement = null;
    let messageTimeout = null;

    const buildingCounts = {
      residential: 0,
      commercial: 0,
      industrial: 0,
      park: 0,
      road: 0
    };

    function createEmptyGrid() {
      return Array.from({ length: GRID_SIZE }, () => Array.from({ length: GRID_SIZE }, () => "empty"));
    }

    function createRecordGrid() {
      return Array.from({ length: GRID_SIZE }, () => Array.from({ length: GRID_SIZE }, () => null));
    }

    function cloneGrid(grid) {
      return grid.map(row => row.slice());
    }

    function getCellCenter(row, col) {
      return {
        x: GRID_ORIGIN_X + col * CELL_SIZE + CELL_SIZE / 2,
        z: GRID_ORIGIN_Z + row * CELL_SIZE + CELL_SIZE / 2
      };
    }

    function seedIndex(row, col) {
      return row * 20 + col;
    }

    function residentialHeight(row, col) {
      return 2 + (((seedIndex(row, col) * 7) % 10) / 10) * 4;
    }

    function commercialHeight(row, col) {
      return 3 + (((seedIndex(row, col) * 13) % 10) / 10) * 5;
    }

    function industrialHeight(row, col) {
      return 2 + (((seedIndex(row, col) * 11) % 10) / 10) * 3;
    }

    function tintColor(baseColor, playerColor) {
      return baseColor.clone().lerp(playerColor, 0.2);
    }

    function inBounds(row, col) {
      return row >= 0 && row < GRID_SIZE && col >= 0 && col < GRID_SIZE;
    }

    function getAdjacent4(row, col) {
      return [
        { row: row - 1, col },
        { row: row + 1, col },
        { row, col: col - 1 },
        { row, col: col + 1 }
      ].filter(c => inBounds(c.row, c.col));
    }

    function computePlacementScore(type, row, col) {
      let score = 10;
      const adjacent = getAdjacent4(row, col);

      if (type === "residential") {
        for (const cell of adjacent) {
          if (gridOccupancy[cell.row][cell.col] === "park") score += 5;
        }
      } else if (type === "commercial") {
        for (const cell of adjacent) {
          if (gridOccupancy[cell.row][cell.col] === "road") score += 3;
        }
      } else if (type === "industrial") {
        const hasAdjacentResidential = adjacent.some(cell => gridOccupancy[cell.row][cell.col] === "residential");
        if (!hasAdjacentResidential) score += 4;
      }

      return score;
    }

    function computeResidentialPopulation(height) {
      return 10 + Math.floor(height * 5);
    }

    // Preview torus
    const previewTorus = new THREE.Mesh(
      new THREE.TorusGeometry(0.75, 0.08, 12, 32),
      new THREE.MeshBasicMaterial({ color: PLAYER_COLORS[currentPlayer] })
    );
    previewTorus.rotation.x = Math.PI / 2;
    previewTorus.position.y = 0.12;
    scene.add(previewTorus);

    function updatePreviewColor() {
      previewTorus.material.color.copy(PLAYER_COLORS[currentPlayer]);
    }

    function setPreviewVisible(flag) {
      previewTorus.visible = flag;
    }

    // Raycasting
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function worldToCell(point) {
      const localX = point.x - GRID_ORIGIN_X;
      const localZ = point.z - GRID_ORIGIN_Z;
      const col = Math.floor(localX / CELL_SIZE);
      const row = Math.floor(localZ / CELL_SIZE);
      if (!inBounds(row, col)) return null;
      return { row, col };
    }

    function updateHoveredCellFromMouse(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(groundPlane);

      if (intersects.length > 0) {
        const cell = worldToCell(intersects[0].point);
        hoveredCell = cell;
        if (cell) {
          const center = getCellCenter(cell.row, cell.col);
          previewTorus.position.set(center.x, 0.12, center.z);
          setPreviewVisible(true);
        } else {
          setPreviewVisible(false);
        }
      } else {
        hoveredCell = null;
        setPreviewVisible(false);
      }

      update3DState();
    }

    // Building creation
    function createBuilding(type, row, col, player) {
      const center = getCellCenter(row, col);
      const color = tintColor(TYPE_BASE_COLORS[type], PLAYER_COLORS[player]);
      let mesh;
      let group = new THREE.Group();
      let height = 0;
      let pop = 0;

      if (type === "residential") {
        height = residentialHeight(row, col);
        mesh = new THREE.Mesh(
          new THREE.BoxGeometry(1.6, height, 1.6),
          new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.1 })
        );
        mesh.position.set(center.x, height / 2, center.z);
        pop = computeResidentialPopulation(height);
        group.add(mesh);
      } else if (type === "commercial") {
        height = commercialHeight(row, col);
        mesh = new THREE.Mesh(
          new THREE.BoxGeometry(1.8, height, 1.8),
          new THREE.MeshStandardMaterial({ color, roughness: 0.5, metalness: 0.15 })
        );
        mesh.position.set(center.x, height / 2, center.z);
        group.add(mesh);
      } else if (type === "industrial") {
        height = industrialHeight(row, col);
        mesh = new THREE.Mesh(
          new THREE.CylinderGeometry(0.8, 0.8, height, 24),
          new THREE.MeshStandardMaterial({ color, roughness: 0.7, metalness: 0.1 })
        );
        mesh.position.set(center.x, height / 2, center.z);
        group.add(mesh);
      } else if (type === "park") {
        const lawn = new THREE.Mesh(
          new THREE.PlaneGeometry(1.8, 1.8),
          new THREE.MeshStandardMaterial({ color: tintColor(new THREE.Color(0x2e8b3c), PLAYER_COLORS[player]), side: THREE.DoubleSide })
        );
        lawn.rotation.x = -Math.PI / 2;
        lawn.position.set(center.x, 0.03, center.z);

        const sphere = new THREE.Mesh(
          new THREE.SphereGeometry(0.7, 24, 24),
          new THREE.MeshStandardMaterial({ color, roughness: 0.8 })
        );
        sphere.position.set(center.x, 0.7, center.z);

        group.add(lawn, sphere);
      } else if (type === "road") {
        mesh = new THREE.Mesh(
          new THREE.BoxGeometry(2, 0.05, 2),
          new THREE.MeshStandardMaterial({ color, roughness: 0.9 })
        );
        mesh.position.set(center.x, 0.025, center.z);
        group.add(mesh);
      }

      group.traverse(obj => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
        }
      });

      return { object: group, height, population: pop };
    }

    function showMessage(text) {
      messageEl.textContent = text;
      messageEl.style.display = "block";
      clearTimeout(messageTimeout);
      messageTimeout = setTimeout(() => {
        messageEl.style.display = "none";
      }, 1500);
    }

    function updateHUD() {
      const playerColor = currentPlayer === 1 ? "#ff6666" : "#66a3ff";
      hudTopLeft.innerHTML = `<span style="color:${playerColor}">Player ${currentPlayer} Turn</span> | Turn: ${turnNumber}`;
      hudTopRight.innerHTML = `P1 Score: ${player1Score} | P2 Score: ${player2Score}<br>Population: ${population}`;
      typeButtons.forEach(btn => {
        btn.classList.toggle("selected", btn.dataset.type === selectedType);
      });
    }

    function update3DState() {
      window.__3D_STATE__ = {
        currentPlayer,
        turnNumber,
        selectedType,
        player1Score,
        player2Score,
        totalBuildings,
        population,
        gridOccupancy: cloneGrid(gridOccupancy),
        hoveredCell: hoveredCell ? { ...hoveredCell } : null,
        lastPlacement: lastPlacement ? {
          row: lastPlacement.row,
          col: lastPlacement.col,
          type: lastPlacement.type,
          player: lastPlacement.player
        } : null,
        buildingCounts: { ...buildingCounts },
        canUndo
      };
    }

    function placeBuilding(row, col, type) {
      if (!selectedType) return;
      if (gridOccupancy[row][col] !== "empty") {
        showMessage("Cell Occupied!");
        return;
      }

      const player = currentPlayer;
      const scoreGain = computePlacementScore(type, row, col);
      const created = createBuilding(type, row, col, player);

      buildingGroup.add(created.object);
      gridOccupancy[row][col] = type;
      buildingRecords[row][col] = {
        object: created.object,
        type,
        player,
        row,
        col,
        scoreGain,
        populationGain: created.population,
        height: created.height
      };

      totalBuildings++;
      buildingCounts[type]++;
      population += created.population;

      if (player === 1) player1Score += scoreGain;
      else player2Score += scoreGain;

      lastPlacement = {
        row,
        col,
        type,
        player,
        scoreGain,
        populationGain: created.population
      };
      canUndo = true;

      currentPlayer = currentPlayer === 1 ? 2 : 1;
      turnNumber++;

      updatePreviewColor();
      updateHUD();
      update3DState();
    }

    function undoLastPlacement() {
      if (!canUndo || !lastPlacement) return;

      const { row, col, player, type, scoreGain, populationGain } = lastPlacement;
      const record = buildingRecords[row][col];
      if (!record) return;

      buildingGroup.remove(record.object);
      record.object.traverse(obj => {
        if (obj.geometry) obj.geometry.dispose?.();
        if (obj.material) {
          if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose?.());
          else obj.material.dispose?.();
        }
      });

      gridOccupancy[row][col] = "empty";
      buildingRecords[row][col] = null;
      totalBuildings--;
      buildingCounts[type]--;
      population -= populationGain;

      if (player === 1) player1Score -= scoreGain;
      else player2Score -= scoreGain;

      currentPlayer = player;
      turnNumber = Math.max(1, turnNumber - 1);
      canUndo = false;
      lastPlacement = null;

      updatePreviewColor();
      updateHUD();
      update3DState();
    }

    function resetCity() {
      while (buildingGroup.children.length > 0) {
        const child = buildingGroup.children[0];
        buildingGroup.remove(child);
        child.traverse(obj => {
          if (obj.geometry) obj.geometry.dispose?.();
          if (obj.material) {
            if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose?.());
            else obj.material.dispose?.();
          }
        });
      }

      gridOccupancy = createEmptyGrid();
      buildingRecords = createRecordGrid();

      currentPlayer = 1;
      turnNumber = 1;
      selectedType = "residential";
      player1Score = 0;
      player2Score = 0;
      totalBuildings = 0;
      population = 0;
      canUndo = false;
      lastPlacement = null;

      for (const key in buildingCounts) buildingCounts[key] = 0;

      updatePreviewColor();
      updateHUD();
      update3DState();
    }

    // Input
    window.addEventListener("mousemove", updateHoveredCellFromMouse);

    window.addEventListener("click", (event) => {
      if (event.button !== 0) return;
      if (!hoveredCell || !selectedType) return;
      placeBuilding(hoveredCell.row, hoveredCell.col, selectedType);
    });

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (key === "r") selectedType = "residential";
      else if (key === "c") selectedType = "commercial";
      else if (key === "i") selectedType = "industrial";
      else if (key === "p") selectedType = "park";
      else if (key === "o") selectedType = "road";
      else if (key === "z") undoLastPlacement();

      updateHUD();
      update3DState();
    });

    typeButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        selectedType = btn.dataset.type;
        updateHUD();
        update3DState();
      });
    });

    resetBtn.addEventListener("click", resetCity);

    // Initial
    updateHUD();
    updatePreviewColor();
    update3DState();

    // Render loop
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // Resize
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
