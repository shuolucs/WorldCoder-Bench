<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 赛马竞速</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            background-color: #000;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .panel {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: auto;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
        }
        #leaderboard-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 150px;
        }
        #leaderboard {
            list-style: none;
            padding: 0;
            margin: 10px 0 0 0;
        }
        #leaderboard li {
            margin-bottom: 5px;
            font-weight: bold;
        }
        .center-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
        }
        button {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #45a049;
        }
        #winMessage {
            font-size: 36px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 2px 2px 4px #000;
            margin-bottom: 20px;
            display: none;
        }
        .hidden {
            display: none !important;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="ui-layer">
        <div id="hud" class="panel">
            <div>状态: <span id="raceState">waiting</span></div>
            <div>时间: <span id="elapsedTime">0.0</span> s</div>
            <div>获胜者: <span id="winner">-1</span></div>
        </div>

        <div id="leaderboard-panel" class="panel">
            <div style="text-align: center; font-weight: bold; border-bottom: 1px solid #fff; padding-bottom: 5px;">排行榜</div>
            <ul id="leaderboard">
                <!-- 动态生成 -->
            </ul>
        </div>

        <div class="center-screen">
            <div id="winMessage">第 X 号马获胜！</div>
            <button id="startBtn" class="hidden">开始比赛</button>
            <button id="restartBtn" class="hidden">重新比赛</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';

        // 全局状态
        window.__3D_STATE__ = {
            modelLoaded: false,
            raceState: 'waiting',
            horsePositions: [0, 0, 0, 0],
            horseSpeeds: [0, 0, 0, 0],
            leaderboard: [1, 2, 3, 4],
            elapsedTime: 0,
            winner: -1
        };

        // 场景变量
        let scene, camera, renderer, controls;
        let clock = new THREE.Clock();
        let horses = [];
        
        // 配置
        const HORSE_CONFIG = [
            { id: 1, x: -4.5, color: 0xff3333, name: '红马' },
            { id: 2, x: -1.5, color: 0x3333ff, name: '蓝马' },
            { id: 3, x: 1.5, color: 0x33cc33, name: '绿马' },
            { id: 4, x: 4.5, color: 0xffcc00, name: '黄马' }
        ];
        const TRACK_LENGTH = 50;

        // DOM 元素
        const elRaceState = document.getElementById('raceState');
        const elElapsedTime = document.getElementById('elapsedTime');
        const elWinner = document.getElementById('winner');
        const elLeaderboard = document.getElementById('leaderboard');
        const btnStart = document.getElementById('startBtn');
        const btnRestart = document.getElementById('restartBtn');
        const elWinMessage = document.getElementById('winMessage');

        init();
        buildScene();
        loadModels();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 40, 100);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(25, 15, -10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 0, TRACK_LENGTH / 2);
            controls.update();

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(20, 40, 20);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 30;
            dirLight.shadow.camera.bottom = -30;
            dirLight.shadow.camera.left = -30;
            dirLight.shadow.camera.right = 30;
            dirLight.shadow.camera.near = 0.1;
            dirLight.shadow.camera.far = 100;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            window.addEventListener('resize', onWindowResize);

            btnStart.addEventListener('click', startRace);
            btnRestart.addEventListener('click', resetRace);
        }

        function buildScene() {
            // 地面
            const groundGeo = new THREE.PlaneGeometry(100, 150);
            const groundMat = new THREE.MeshLambertMaterial({ color: 0x2d8a2d });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.z = TRACK_LENGTH / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // 赛道线 (5条线，分隔4条赛道)
            const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.5, transparent: true });
            for (let i = 0; i <= 4; i++) {
                const x = -6 + i * 3;
                const points = [];
                points.push(new THREE.Vector3(x, 0.02, -5));
                points.push(new THREE.Vector3(x, 0.02, TRACK_LENGTH + 5));
                const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(lineGeo, lineMat);
                scene.add(line);
            }

            // 起跑线 (白)
            const startLineGeo = new THREE.PlaneGeometry(12, 1);
            const startLineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const startLine = new THREE.Mesh(startLineGeo, startLineMat);
            startLine.rotation.x = -Math.PI / 2;
            startLine.position.set(0, 0.03, 0);
            scene.add(startLine);

            // 终点线 (红)
            const finishLineGeo = new THREE.PlaneGeometry(12, 1);
            const finishLineMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const finishLine = new THREE.Mesh(finishLineGeo, finishLineMat);
            finishLine.rotation.x = -Math.PI / 2;
            finishLine.position.set(0, 0.03, TRACK_LENGTH);
            scene.add(finishLine);
        }

        function loadModels() {
            const loader = new GLTFLoader();
            loader.load('assets/horse.glb', (gltf) => {
                const originalScene = gltf.scene;
                
                // 查找 gallop 动画
                let clip = gltf.animations.find(a => a.name.toLowerCase().includes('gallop'));
                if (!clip && gltf.animations.length > 0) {
                    clip = gltf.animations[0];
                }

                HORSE_CONFIG.forEach((config) => {
                    const clonedScene = SkeletonUtils.clone(originalScene);
                    clonedScene.position.set(config.x, 0, 0);
                    
                    // 假设模型默认朝向可能需要调整，这里假设模型默认朝向+Z
                    // 如果模型朝向不对，可以取消注释并调整
                    // clonedScene.rotation.y = Math.PI / 2; 

                    // 染色并开启阴影
                    clonedScene.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            if (child.material) {
                                child.material = child.material.clone();
                                child.material.color.setHex(config.color);
                            }
                        }
                    });

                    scene.add(clonedScene);

                    const mixer = new THREE.AnimationMixer(clonedScene);
                    let action = null;
                    if (clip) {
                        action = mixer.clipAction(clip);
                        action.play();
                        action.timeScale = 0; // 初始暂停
                    }

                    horses.push({
                        id: config.id,
                        mesh: clonedScene,
                        mixer: mixer,
                        action: action,
                        baseSpeed: 0,
                        currentSpeed: 0,
                        colorHex: config.color,
                        name: config.name
                    });
                });

                window.__3D_STATE__.modelLoaded = true;
                btnStart.classList.remove('hidden');
                updateLeaderboardUI();
            }, undefined, (error) => {
                console.error('模型加载失败:', error);
                // 即使失败也暴露状态，避免外部死等
                window.__3D_STATE__.modelLoaded = true;
            });
        }

        function startRace() {
            btnStart.classList.add('hidden');
            window.__3D_STATE__.raceState = 'racing';
            window.__3D_STATE__.elapsedTime = 0;
            window.__3D_STATE__.winner = -1;

            horses.forEach(horse => {
                horse.baseSpeed = 3 + Math.random() * 4; // 3 - 7 m/s
                if (horse.action) {
                    horse.action.timeScale = horse.baseSpeed / 5; // 假设5m/s为标准动画速度
                }
            });
        }

        function resetRace() {
            btnRestart.classList.add('hidden');
            elWinMessage.style.display = 'none';
            
            window.__3D_STATE__.raceState = 'waiting';
            window.__3D_STATE__.elapsedTime = 0;
            window.__3D_STATE__.winner = -1;

            horses.forEach(horse => {
                horse.mesh.position.z = 0;
                horse.currentSpeed = 0;
                if (horse.action) {
                    horse.action.timeScale = 0;
                    horse.action.reset();
                    horse.action.play();
                }
            });

            btnStart.classList.remove('hidden');
            updateLeaderboardUI();
        }

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const state = window.__3D_STATE__;

            if (state.raceState === 'racing') {
                state.elapsedTime += delta;
                let someoneFinished = false;

                horses.forEach(horse => {
                    // 速度波动 ±0.5
                    horse.currentSpeed = horse.baseSpeed + Math.sin(state.elapsedTime * 2 + horse.id) * 0.5;
                    
                    // 移动
                    horse.mesh.position.z += horse.currentSpeed * delta;
                    
                    // 动画速度同步
                    if (horse.action) {
                        horse.action.timeScale = horse.currentSpeed / 5;
                    }

                    // 检查终点
                    if (horse.mesh.position.z >= TRACK_LENGTH) {
                        horse.mesh.position.z = TRACK_LENGTH;
                        if (state.winner === -1) {
                            state.winner = horse.id;
                        }
                        someoneFinished = true;
                    }
                });

                if (someoneFinished) {
                    state.raceState = 'finished';
                    horses.forEach(h => {
                        if (h.action) h.action.timeScale = 0;
                    });
                    
                    elWinMessage.innerText = `第 ${state.winner} 号马获胜！`;
                    elWinMessage.style.display = 'block';
                    btnRestart.classList.remove('hidden');
                }
            }

            // 更新动画
            horses.forEach(horse => {
                if (horse.mixer) horse.mixer.update(delta);
            });

            // 更新状态数据
            if (horses.length === 4) {
                for (let i = 0; i < 4; i++) {
                    state.horsePositions[i] = horses[i].mesh.position.z;
                    state.horseSpeeds[i] = state.raceState === 'racing' ? horses[i].currentSpeed : 0;
                }

                // 排序计算排行榜
                const sortedHorses = [...horses].sort((a, b) => b.mesh.position.z - a.mesh.position.z);
                state.leaderboard = sortedHorses.map(h => h.id);
            }

            updateUI();
            controls.update();
            renderer.render(scene, camera);
        }

        function updateUI() {
            const state = window.__3D_STATE__;
            elRaceState.innerText = state.raceState;
            elElapsedTime.innerText = state.elapsedTime.toFixed(1);
            elWinner.innerText = state.winner;

            updateLeaderboardUI();
        }

        function updateLeaderboardUI() {
            if (horses.length === 0) return;
            const state = window.__3D_STATE__;
            elLeaderboard.innerHTML = '';
            
            state.leaderboard.forEach((horseId, index) => {
                const horse = horses.find(h => h.id === horseId);
                const li = document.createElement('li');
                li.style.color = '#' + horse.colorHex.toString(16).padStart(6, '0');
                li.innerText = `${index + 1}. ${horse.name} (#${horse.id})`;
                elLeaderboard.appendChild(li);
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
