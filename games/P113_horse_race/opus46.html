<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赛马竞速小游戏</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Arial', sans-serif; }
  canvas { display: block; }

  #startBtn, #restartBtn {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 20px 50px;
    font-size: 28px;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    z-index: 100;
    transition: all 0.3s;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
  }

  #startBtn {
    background: linear-gradient(135deg, #ff6b35, #f7c948);
    color: white;
    box-shadow: 0 6px 20px rgba(255, 107, 53, 0.5);
  }

  #startBtn:hover {
    transform: translate(-50%, -50%) scale(1.05);
    box-shadow: 0 8px 25px rgba(255, 107, 53, 0.7);
  }

  #restartBtn {
    background: linear-gradient(135deg, #4ecdc4, #44bd32);
    color: white;
    box-shadow: 0 6px 20px rgba(78, 205, 196, 0.5);
    display: none;
  }

  #restartBtn:hover {
    transform: translate(-50%, -50%) scale(1.05);
    box-shadow: 0 8px 25px rgba(78, 205, 196, 0.7);
  }

  #hud {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 16px;
    line-height: 1.8;
    z-index: 50;
    backdrop-filter: blur(5px);
    min-width: 200px;
  }

  #hud .label {
    color: #aaa;
    font-size: 13px;
  }

  #hud .value {
    font-weight: bold;
    font-size: 18px;
  }

  #leaderboard {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 16px;
    z-index: 50;
    backdrop-filter: blur(5px);
    min-width: 180px;
  }

  #leaderboard h3 {
    margin-bottom: 10px;
    text-align: center;
    font-size: 18px;
    border-bottom: 1px solid rgba(255,255,255,0.3);
    padding-bottom: 8px;
  }

  .rank-item {
    display: flex;
    align-items: center;
    margin: 6px 0;
    padding: 4px 8px;
    border-radius: 5px;
  }

  .rank-item.first { background: rgba(255, 215, 0, 0.3); }

  .rank-number {
    font-weight: bold;
    margin-right: 10px;
    font-size: 18px;
    width: 25px;
  }

  .rank-color {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    margin-right: 8px;
    border: 2px solid white;
  }

  #winnerOverlay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    background: rgba(0, 0, 0, 0.85);
    color: white;
    padding: 30px 50px;
    border-radius: 15px;
    font-size: 32px;
    font-weight: bold;
    text-align: center;
    z-index: 90;
    display: none;
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255, 215, 0, 0.5);
  }

  #winnerOverlay .trophy { font-size: 50px; margin-bottom: 10px; }

  #loadingOverlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 200;
    color: white;
    font-size: 24px;
  }

  .spinner {
    border: 4px solid rgba(255,255,255,0.3);
    border-top: 4px solid white;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin-right: 15px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <span>加载马匹模型中...</span>
</div>

<button id="startBtn" style="display:none;">🏇 开始比赛</button>
<button id="restartBtn">🔄 重新比赛</button>

<div id="hud">
  <div><span class="label">比赛状态：</span><span class="value" id="raceState">waiting</span></div>
  <div><span class="label">已用时间：</span><span class="value" id="elapsedTime">0.0</span><span class="label"> 秒</span></div>
  <div><span class="label">获胜者：</span><span class="value" id="winner">-1</span></div>
</div>

<div id="leaderboard">
  <h3>🏆 实时排名</h3>
  <div id="rankList"></div>
</div>

<div id="winnerOverlay">
  <div class="trophy">🏆</div>
  <div id="winnerText"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';

// Global state
window.__3D_STATE__ = {
  modelLoaded: false,
  raceState: 'waiting',
  horsePositions: [0, 0, 0, 0],
  horseSpeeds: [0, 0, 0, 0],
  leaderboard: [1, 2, 3, 4],
  elapsedTime: 0,
  winner: -1
};

const TRACK_LENGTH = 50;
const HORSE_COUNT = 4;
const HORSE_X = [-4.5, -1.5, 1.5, 4.5];
const HORSE_COLORS = [0xff3333, 0x3333ff, 0x33cc33, 0xffcc00];
const HORSE_COLOR_NAMES = ['#ff3333', '#3333ff', '#33cc33', '#ffcc00'];
const HORSE_NAMES = ['红马', '蓝马', '绿马', '黄马'];

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 60, 120);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(-20, 15, 25);
camera.lookAt(0, 0, 25);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 25);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.1;
controls.update();

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -30;
dirLight.shadow.camera.right = 30;
dirLight.shadow.camera.top = 60;
dirLight.shadow.camera.bottom = -10;
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 80;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x556B2F, 0.4);
scene.add(hemiLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(40, 80);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x4a8c3f, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.set(0, -0.01, 25);
ground.receiveShadow = true;
scene.add(ground);

// Track surface (dirt)
const trackGeo = new THREE.PlaneGeometry(12, 54);
const trackMat = new THREE.MeshStandardMaterial({ color: 0xc4a265, roughness: 0.95 });
const track = new THREE.Mesh(trackGeo, trackMat);
track.rotation.x = -Math.PI / 2;
track.position.set(0, 0.01, 25);
track.receiveShadow = true;
scene.add(track);

// Lane lines
function createLine(x1, z1, x2, z2, color, width = 0.05) {
  const points = [new THREE.Vector3(x1, 0.02, z1), new THREE.Vector3(x2, 0.02, z2)];
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color });
  return new THREE.Line(geo, mat);
}

// Lane dividers
for (let i = 0; i <= HORSE_COUNT; i++) {
  const x = -6 + i * 3;
  const dashCount = 50;
  for (let d = 0; d < dashCount; d++) {
    const z0 = d * (TRACK_LENGTH / dashCount);
    const z1 = z0 + (TRACK_LENGTH / dashCount) * 0.6;
    const lineGeo = new THREE.PlaneGeometry(0.05, (TRACK_LENGTH / dashCount) * 0.6);
    const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, opacity: 0.5, transparent: true });
    const lineMesh = new THREE.Mesh(lineGeo, lineMat);
    lineMesh.rotation.x = -Math.PI / 2;
    lineMesh.position.set(x, 0.025, (z0 + z1) / 2);
    scene.add(lineMesh);
  }
}

// Start line (white)
const startLineGeo = new THREE.PlaneGeometry(12, 0.15);
const startLineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
const startLine = new THREE.Mesh(startLineGeo, startLineMat);
startLine.rotation.x = -Math.PI / 2;
startLine.position.set(0, 0.03, 0);
scene.add(startLine);

// Finish line (red/white checkered)
const finishLineGeo = new THREE.PlaneGeometry(12, 0.3);
const finishLineMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
const finishLine = new THREE.Mesh(finishLineGeo, finishLineMat);
finishLine.rotation.x = -Math.PI / 2;
finishLine.position.set(0, 0.03, TRACK_LENGTH);
scene.add(finishLine);

// Checkered pattern for finish
for (let i = 0; i < 24; i++) {
  if (i % 2 === 0) {
    const sq = new THREE.Mesh(
      new THREE.PlaneGeometry(0.5, 0.3),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    sq.rotation.x = -Math.PI / 2;
    sq.position.set(-6 + i * 0.5 + 0.25, 0.035, TRACK_LENGTH);
    scene.add(sq);
  }
}

// Fence posts along track
function createFence(xOffset, side) {
  for (let z = 0; z <= TRACK_LENGTH; z += 3) {
    const postGeo = new THREE.CylinderGeometry(0.05, 0.05, 1, 6);
    const postMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const post = new THREE.Mesh(postGeo, postMat);
    post.position.set(xOffset, 0.5, z);
    post.castShadow = true;
    scene.add(post);

    if (z < TRACK_LENGTH) {
      const railGeo = new THREE.CylinderGeometry(0.02, 0.02, 3, 4);
      const railMat = new THREE.MeshStandardMaterial({ color: 0xDEB887 });
      const rail = new THREE.Mesh(railGeo, railMat);
      rail.rotation.z = Math.PI / 2;
      rail.rotation.y = Math.PI / 2;
      rail.position.set(xOffset, 0.7, z + 1.5);
      scene.add(rail);

      const rail2 = rail.clone();
      rail2.position.y = 0.35;
      scene.add(rail2);
    }
  }
}
createFence(-7, 'left');
createFence(7, 'right');

// Distance markers
for (let z = 10; z <= 40; z += 10) {
  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.roundRect(0, 0, 128, 64, 8);
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.font = 'bold 32px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(z + 'm', 64, 32);

  const texture = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({ map: texture });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(2, 1, 1);
  sprite.position.set(-8, 2, z);
  scene.add(sprite);
}

// Horses data
const horses = [];
const mixers = [];
let animations = [];
let raceState = 'waiting';
let elapsedTime = 0;
let raceStartTime = 0;
let winnerIndex = -1;

// Load horse model
const loader = new GLTFLoader();
loader.load('assets/horse.glb', (gltf) => {
  animations = gltf.animations;
  const originalModel = gltf.scene;

  // Find the gallop animation or use first available
  let gallopClip = null;
  for (const clip of animations) {
    if (clip.name.toLowerCase().includes('gallop')) {
      gallopClip = clip;
      break;
    }
  }
  if (!gallopClip && animations.length > 0) {
    gallopClip = animations[0];
  }

  for (let i = 0; i < HORSE_COUNT; i++) {
    const horseModel = SkeletonUtils.clone(originalModel);

    // Scale and position
    horseModel.position.set(HORSE_X[i], 0, 0);

    // Compute bounding box to determine scale
    const box = new THREE.Box3().setFromObject(horseModel);
    const size = new THREE.Vector3();
    box.getSize(size);
    const desiredHeight = 1.8;
    const scale = desiredHeight / size.y;
    horseModel.scale.setScalar(scale);

    // Make horse face +z direction
    horseModel.rotation.y = Math.PI;

    // Color the horse
    horseModel.traverse((child) => {
      if (child.isMesh) {
        child.material = child.material.clone();
        child.material.color.set(HORSE_COLORS[i]);
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    scene.add(horseModel);

    // Animation mixer
    const mixer = new THREE.AnimationMixer(horseModel);
    let action = null;
    if (gallopClip) {
      action = mixer.clipAction(gallopClip);
      action.play();
      action.paused = true;
    }

    horses.push({
      model: horseModel,
      mixer: mixer,
      action: action,
      speed: 0,
      baseSpeed: 0,
      position: 0
    });
    mixers.push(mixer);
  }

  window.__3D_STATE__.modelLoaded = true;
  document.getElementById('loadingOverlay').style.display = 'none';
  document.getElementById('startBtn').style.display = 'block';

}, undefined, (error) => {
  console.error('Error loading horse model:', error);
  document.getElementById('loadingOverlay').innerHTML = '<span style="color:red;">模型加载失败，请确保 assets/horse.glb 存在</span>';
});

// UI elements
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');
const raceStateEl = document.getElementById('raceState');
const elapsedTimeEl = document.getElementById('elapsedTime');
const winnerEl = document.getElementById('winner');
const rankListEl = document.getElementById('rankList');
const winnerOverlay = document.getElementById('winnerOverlay');
const winnerText = document.getElementById('winnerText');

startBtn.addEventListener('click', startRace);
restartBtn.addEventListener('click', restartRace);

function startRace() {
  startBtn.style.display = 'none';
  winnerOverlay.style.display = 'none';
  raceState = 'racing';
  raceStartTime = performance.now() / 1000;
  elapsedTime = 0;
  winnerIndex = -1;

  for (let i = 0; i < HORSE_COUNT; i++) {
    const baseSpeed = 3 + Math.random() * 4; // 3-7 m/s
    horses[i].baseSpeed = baseSpeed;
    horses[i].speed = baseSpeed;
    horses[i].position = 0;

    if (horses[i].action) {
      horses[i].action.paused = false;
      horses[i].action.play();
    }
  }

  updateState();
}

function restartRace() {
  restartBtn.style.display = 'none';
  winnerOverlay.style.display = 'none';
  raceState = 'waiting';
  elapsedTime = 0;
  winnerIndex = -1;

  for (let i = 0; i < HORSE_COUNT; i++) {
    horses[i].position = 0;
    horses[i].speed = 0;
    horses[i].baseSpeed = 0;
    horses[i].model.position.z = 0;

    if (horses[i].action) {
      horses[i].action.paused = true;
      horses[i].action.time = 0;
    }
  }

  startBtn.style.display = 'block';
  updateState();
}

function updateLeaderboard() {
  const indices = [0, 1, 2, 3];
  indices.sort((a, b) => horses[b].position - horses[a].position);

  const leaderboardArr = indices.map(i => i + 1);
  window.__3D_STATE__.leaderboard = leaderboardArr;

  let html = '';
  indices.forEach((idx, rank) => {
    const isFirst = rank === 0;
    html += `<div class="rank-item ${isFirst ? 'first' : ''}">
      <span class="rank-number">${rank + 1}.</span>
      <span class="rank-color" style="background:${HORSE_COLOR_NAMES[idx]}"></span>
      <span>${idx + 1}号 ${HORSE_NAMES[idx]}</span>
    </div>`;
  });
  rankListEl.innerHTML = html;
}

function updateState() {
  window.__3D_STATE__.raceState = raceState;
  window.__3D_STATE__.elapsedTime = parseFloat(elapsedTime.toFixed(1));
  window.__3D_STATE__.winner = winnerIndex >= 0 ? winnerIndex + 1 : -1;
  window.__3D_STATE__.horsePositions = horses.map(h => parseFloat(h.position.toFixed(2)));
  window.__3D_STATE__.horseSpeeds = horses.map(h => parseFloat(h.speed.toFixed(2)));

  raceStateEl.textContent = raceState;
  elapsedTimeEl.textContent = elapsedTime.toFixed(1);
  winnerEl.textContent = winnerIndex >= 0 ? winnerIndex + 1 : -1;

  // Color the race state
  if (raceState === 'waiting') raceStateEl.style.color = '#ffcc00';
  else if (raceState === 'racing') raceStateEl.style.color = '#33ff33';
  else raceStateEl.style.color = '#ff3333';
}

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const time = clock.getElapsedTime();

  if (raceState === 'racing') {
    elapsedTime = performance.now() / 1000 - raceStartTime;

    let someoneWon = false;

    for (let i = 0; i < HORSE_COUNT; i++) {
      // Speed with sinusoidal fluctuation
      const fluctuation = 0.5 * Math.sin(time * (1.5 + i * 0.3) + i * 1.7);
      horses[i].speed = horses[i].baseSpeed + fluctuation;

      // Move horse
      horses[i].position += horses[i].speed * delta;

      // Clamp to track length
      if (horses[i].position >= TRACK_LENGTH) {
        horses[i].position = TRACK_LENGTH;
        if (!someoneWon && winnerIndex < 0) {
          winnerIndex = i;
          someoneWon = true;
        }
      }

      // Update model position
      horses[i].model.position.z = horses[i].position;

      // Update animation speed proportional to movement speed
      if (horses[i].action) {
        const speedRatio = horses[i].speed / 5; // normalize around 5 m/s
        horses[i].action.timeScale = Math.max(0.5, speedRatio);
      }
    }

    // Update mixers
    for (const mixer of mixers) {
      mixer.update(delta);
    }

    // Check for winner
    if (winnerIndex >= 0) {
      raceState = 'finished';

      // Stop all horses
      for (let i = 0; i < HORSE_COUNT; i++) {
        if (horses[i].action) {
          horses[i].action.paused = true;
        }
      }

      // Show winner
      const colorName = HORSE_NAMES[winnerIndex];
      winnerText.innerHTML = `第 ${winnerIndex + 1} 号马获胜！<br><span style="color:${HORSE_COLOR_NAMES[winnerIndex]};font-size:24px">${colorName}</span><br><span style="font-size:18px">用时: ${elapsedTime.toFixed(1)} 秒</span>`;
      winnerOverlay.style.display = 'block';
      restartBtn.style.display = 'block';
    }

    updateLeaderboard();
  } else if (raceState === 'waiting') {
    // Idle - still update mixers for any idle animation
    for (const mixer of mixers) {
      mixer.update(delta);
    }
  } else {
    // Finished - update mixers but actions are paused
    for (const mixer of mixers) {
      mixer.update(delta);
    }
  }

  updateState();
  updateLeaderboard();

  controls.update();
  renderer.render(scene, camera);
}

animate();

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
