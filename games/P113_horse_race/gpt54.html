<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 赛马竞速小游戏</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #87CEEB;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    .panel {
      position: absolute;
      color: #fff;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border-radius: 10px;
      backdrop-filter: blur(4px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      z-index: 10;
      user-select: none;
    }

    #hud {
      top: 16px;
      left: 16px;
      min-width: 220px;
      line-height: 1.8;
      font-size: 14px;
    }

    #leaderboard {
      top: 16px;
      right: 16px;
      min-width: 220px;
      line-height: 1.8;
      font-size: 14px;
    }

    #centerUI {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 20;
    }

    #centerContent {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      pointer-events: auto;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #ff7a18, #ff3d3d);
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px) scale(1.02);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    #restartBtn {
      display: none;
      background: linear-gradient(135deg, #36d1dc, #5b86e5);
    }

    #message {
      color: #fff;
      font-size: 30px;
      font-weight: 800;
      text-shadow: 0 4px 12px rgba(0,0,0,0.45);
      min-height: 42px;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud" class="panel">
      <div>比赛状态：<span id="raceState">waiting</span></div>
      <div>已用时间：<span id="elapsedTime">0.0</span> s</div>
      <div>获胜者：<span id="winner">-1</span></div>
    </div>

    <div id="leaderboard" class="panel">
      <div style="font-weight: bold; margin-bottom: 6px;">实时排行榜</div>
      <div id="leaderboardContent">等待模型加载...</div>
    </div>

    <div id="centerUI">
      <div id="centerContent">
        <div id="message"></div>
        <button id="startBtn">开始比赛</button>
        <button id="restartBtn">重新比赛</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { SkeletonUtils } from 'three/addons/utils/SkeletonUtils.js';

    const app = document.getElementById('app');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const messageEl = document.getElementById('message');

    const raceStateEl = document.getElementById('raceState');
    const elapsedTimeEl = document.getElementById('elapsedTime');
    const winnerEl = document.getElementById('winner');
    const leaderboardContentEl = document.getElementById('leaderboardContent');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(28, 26, 24);
    camera.lookAt(0, 0, 25);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 25);
    controls.enableDamping = true;
    controls.minDistance = 20;
    controls.maxDistance = 120;
    controls.maxPolarAngle = Math.PI * 0.48;

    const ambientLight = new THREE.HemisphereLight(0xffffff, 0x7aa35f, 1.1);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(20, 30, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -40;
    dirLight.shadow.camera.right = 40;
    dirLight.shadow.camera.top = 40;
    dirLight.shadow.camera.bottom = -40;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 100;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 80),
      new THREE.MeshLambertMaterial({ color: 0x3e9b43 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.set(0, -0.01, 25);
    ground.receiveShadow = true;
    scene.add(ground);

    const laneWidth = 2.5;
    const totalWidth = laneWidth * 4;
    const trackLength = 50;
    const laneCenters = [-4.5, -1.5, 1.5, 4.5];
    const horseColors = [0xff3333, 0x3333ff, 0x33cc33, 0xffcc00];
    const colorNames = ['红色', '蓝色', '绿色', '黄色'];

    function addTrackMark(x, z, w, h, color) {
      const mesh = new THREE.Mesh(
        new THREE.PlaneGeometry(w, h),
        new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide })
      );
      mesh.rotation.x = -Math.PI / 2;
      mesh.position.set(x, 0.02, z);
      scene.add(mesh);
      return mesh;
    }

    const trackBase = new THREE.Mesh(
      new THREE.PlaneGeometry(totalWidth, trackLength),
      new THREE.MeshLambertMaterial({ color: 0x7a5a32 })
    );
    trackBase.rotation.x = -Math.PI / 2;
    trackBase.position.set(0, 0.01, trackLength / 2);
    trackBase.receiveShadow = true;
    scene.add(trackBase);

    for (let i = 1; i < 4; i++) {
      const x = -totalWidth / 2 + laneWidth * i;
      addTrackMark(x, trackLength / 2, 0.08, trackLength, 0xffffff);
    }

    addTrackMark(0, 0, totalWidth, 0.35, 0xffffff);
    addTrackMark(0, trackLength, totalWidth, 0.35, 0xff2222);

    for (let z = 5; z < trackLength; z += 5) {
      addTrackMark(-totalWidth / 2 - 0.6, z, 0.35, 0.9, 0xffffff);
      addTrackMark(totalWidth / 2 + 0.6, z, 0.35, 0.9, 0xffffff);
    }

    const horses = [];
    const mixers = [];
    let gallopClip = null;
    let clock = new THREE.Clock();

    let modelLoaded = false;
    let raceState = 'waiting';
    let elapsedTime = 0;
    let winner = -1;
    let raceStartTime = 0;

    const baseSpeeds = [0, 0, 0, 0];
    const currentSpeeds = [0, 0, 0, 0];

    function createState() {
      const horsePositions = laneCenters.map((_, i) => horses[i] ? Number(horses[i].position.z.toFixed(3)) : 0);
      const leaderboard = [...Array(4).keys()]
        .map(i => i + 1)
        .sort((a, b) => horsePositions[b - 1] - horsePositions[a - 1]);

      window.__3D_STATE__ = {
        modelLoaded,
        raceState,
        horsePositions,
        horseSpeeds: currentSpeeds.map(v => Number(v.toFixed(3))),
        leaderboard,
        elapsedTime: Number(elapsedTime.toFixed(3)),
        winner
      };
    }

    function updateHUD() {
      raceStateEl.textContent = raceState;
      elapsedTimeEl.textContent = elapsedTime.toFixed(1);
      winnerEl.textContent = winner;
    }

    function updateLeaderboard() {
      if (!modelLoaded) {
        leaderboardContentEl.innerHTML = '等待模型加载...';
        return;
      }

      const positions = horses.map(h => h.position.z);
      const ranking = [...Array(4).keys()]
        .sort((a, b) => positions[b] - positions[a]);

      leaderboardContentEl.innerHTML = ranking.map((idx, rank) => {
        const color = '#' + new THREE.Color(horseColors[idx]).getHexString();
        return `
          <div>
            ${rank + 1}. 
            <span class="dot" style="background:${color};"></span>
            第 ${idx + 1} 号马（${colorNames[idx]}） - ${positions[idx].toFixed(1)} m
          </div>
        `;
      }).join('');
    }

    function setHorseColor(root, color) {
      root.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          if (Array.isArray(child.material)) {
            child.material = child.material.map((mat) => {
              const cloned = mat.clone();
              if (cloned.color) cloned.color.set(color);
              return cloned;
            });
          } else if (child.material) {
            child.material = child.material.clone();
            if (child.material.color) child.material.color.set(color);
          }
        }
      });
    }

    function stopAllAnimations() {
      mixers.forEach(mixer => mixer.timeScale = 0);
    }

    function resumeAnimations() {
      mixers.forEach((mixer, i) => {
        mixer.timeScale = Math.max(0.6, currentSpeeds[i] / 4.5);
      });
    }

    function resetRace() {
      raceState = 'waiting';
      elapsedTime = 0;
      winner = -1;
      raceStartTime = 0;
      messageEl.textContent = '';
      startBtn.style.display = modelLoaded ? 'inline-block' : 'none';
      restartBtn.style.display = 'none';

      horses.forEach((horse, i) => {
        horse.position.set(laneCenters[i], 0, 0);
        horse.rotation.y = 0;
        baseSpeeds[i] = 0;
        currentSpeeds[i] = 0;
      });

      mixers.forEach(mixer => {
        mixer.stopAllAction();
        if (gallopClip) {
          const action = mixer.clipAction(gallopClip);
          action.reset();
          action.play();
          mixer.setTime(0);
        }
        mixer.timeScale = 0;
      });

      updateHUD();
      updateLeaderboard();
      createState();
    }

    function startRace() {
      if (!modelLoaded || raceState === 'racing') return;

      raceState = 'racing';
      elapsedTime = 0;
      winner = -1;
      raceStartTime = performance.now() * 0.001;
      messageEl.textContent = '';
      startBtn.style.display = 'none';
      restartBtn.style.display = 'none';

      for (let i = 0; i < 4; i++) {
        baseSpeeds[i] = THREE.MathUtils.randFloat(3, 7);
        currentSpeeds[i] = baseSpeeds[i];
      }

      resumeAnimations();
      updateHUD();
      updateLeaderboard();
      createState();
    }

    function finishRace(winnerIndex) {
      raceState = 'finished';
      winner = winnerIndex + 1;
      messageEl.textContent = `第 ${winner} 号马获胜！`;
      restartBtn.style.display = 'inline-block';

      currentSpeeds.fill(0);
      stopAllAnimations();

      updateHUD();
      updateLeaderboard();
      createState();
    }

    startBtn.addEventListener('click', startRace);
    restartBtn.addEventListener('click', resetRace);

    const loader = new GLTFLoader();
    loader.load(
      'assets/horse.glb',
      (gltf) => {
        const sourceHorse = gltf.scene;

        gallopClip = gltf.animations.find(clip => /gallop/i.test(clip.name)) || gltf.animations[0] || null;

        for (let i = 0; i < 4; i++) {
          const horse = SkeletonUtils.clone(sourceHorse);
          horse.position.set(laneCenters[i], 0, 0);
          horse.rotation.y = 0;
          horse.scale.setScalar(1.2);

          setHorseColor(horse, horseColors[i]);
          scene.add(horse);
          horses.push(horse);

          const mixer = new THREE.AnimationMixer(horse);
          mixers.push(mixer);

          if (gallopClip) {
            const action = mixer.clipAction(gallopClip);
            action.reset();
            action.play();
            mixer.timeScale = 0;
          }
        }

        modelLoaded = true;
        startBtn.style.display = 'inline-block';
        messageEl.textContent = '模型加载完成，点击开始比赛';
        updateHUD();
        updateLeaderboard();
        createState();
      },
      undefined,
      (error) => {
        console.error('马模型加载失败:', error);
        messageEl.textContent = '模型加载失败，请确认 assets/horse.glb 存在';
        leaderboardContentEl.innerHTML = '模型加载失败';
        createState();
      }
    );

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.05);

      if (raceState === 'racing') {
        elapsedTime = performance.now() * 0.001 - raceStartTime;

        let finishedIndex = -1;

        for (let i = 0; i < horses.length; i++) {
          const wave = Math.sin(elapsedTime * (1.4 + i * 0.23) + i * 1.7) * 0.5;
          const speed = THREE.MathUtils.clamp(baseSpeeds[i] + wave, 0, 10);
          currentSpeeds[i] = speed;

          horses[i].position.z += speed * delta;
          if (horses[i].position.z > trackLength) horses[i].position.z = trackLength;

          if (mixers[i]) {
            mixers[i].timeScale = Math.max(0.6, speed / 4.5);
          }

          if (horses[i].position.z >= trackLength && finishedIndex === -1) {
            finishedIndex = i;
          }
        }

        if (finishedIndex !== -1) {
          finishRace(finishedIndex);
        }
      }

      mixers.forEach(mixer => mixer.update(delta));
      controls.update();
      updateHUD();
      updateLeaderboard();
      createState();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    createState();
    updateHUD();
    updateLeaderboard();
    animate();
  </script>
</body>
</html>
