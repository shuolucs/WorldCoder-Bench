<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Periodic Table</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
canvas { display: block; }

#controls {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  z-index: 10;
}

#controls button {
  padding: 6px 12px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-weight: bold;
  color: #fff;
  transition: all 0.2s;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

#controls button:hover { transform: scale(1.05); filter: brightness(1.2); }
#controls button.active { outline: 2px solid #fff; outline-offset: 2px; }

#view-controls {
  position: absolute;
  top: 55px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 10;
}

#view-controls button {
  padding: 6px 16px;
  border: 2px solid #555;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-weight: bold;
  color: #fff;
  background: #333;
  transition: all 0.2s;
}

#view-controls button:hover { border-color: #aaa; }
#view-controls button.active { border-color: #4d96ff; background: #4d96ff33; }

#info-panel {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 220px;
  background: rgba(20, 20, 40, 0.95);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 20px;
  color: #fff;
  display: none;
  z-index: 10;
  backdrop-filter: blur(10px);
}

#info-panel .element-symbol {
  font-size: 48px;
  font-weight: bold;
  text-align: center;
  margin-bottom: 5px;
}

#info-panel .element-name {
  font-size: 20px;
  text-align: center;
  margin-bottom: 15px;
  color: #ccc;
}

#info-panel .detail {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  font-size: 13px;
}

#info-panel .detail .label { color: #888; }
#info-panel .detail .value { color: #fff; font-weight: bold; }

#info-panel .category-badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: bold;
  margin-top: 10px;
  text-align: center;
  width: 100%;
}

#element-count {
  position: absolute;
  top: 10px;
  left: 10px;
  color: #888;
  font-size: 13px;
  z-index: 10;
}

#current-view {
  position: absolute;
  top: 28px;
  left: 10px;
  color: #888;
  font-size: 13px;
  z-index: 10;
}

#active-filter {
  position: absolute;
  top: 46px;
  left: 10px;
  color: #888;
  font-size: 13px;
  z-index: 10;
}

#instructions {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  color: #555;
  font-size: 11px;
  z-index: 10;
  text-align: center;
}
</style>
</head>
<body>

<div id="controls">
  <button onclick="filterCategory('all')" style="background:#555;" data-cat="all">Show All</button>
  <button onclick="filterCategory('Alkali metal')" style="background:#ff6b6b;" data-cat="Alkali metal">Alkali Metals</button>
  <button onclick="filterCategory('Alkaline earth metal')" style="background:#ffa36b;" data-cat="Alkaline earth metal">Alkaline Earth</button>
  <button onclick="filterCategory('Transition metal')" style="background:#ffd93d; color:#333;" data-cat="Transition metal">Transition Metals</button>
  <button onclick="filterCategory('Post-transition metal')" style="background:#6bcb77;" data-cat="Post-transition metal">Post-transition</button>
  <button onclick="filterCategory('Metalloid')" style="background:#4d96ff;" data-cat="Metalloid">Metalloids</button>
  <button onclick="filterCategory('Nonmetal')" style="background:#9b59b6;" data-cat="Nonmetal">Nonmetals</button>
  <button onclick="filterCategory('Noble gas')" style="background:#e91e8c;" data-cat="Noble gas">Noble Gases</button>
</div>

<div id="view-controls">
  <button onclick="setView('flat')" class="active" id="btn-flat">Flat View</button>
  <button onclick="setView('spiral')" id="btn-spiral">Spiral View</button>
</div>

<div id="info-panel"></div>
<div id="element-count">Elements: 36</div>
<div id="current-view">View: Flat</div>
<div id="active-filter">Filter: All</div>
<div id="instructions">Hover over elements • Click to select • Arrow keys to cycle • R to reset camera</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// Element data for first 36 elements
const elementsData = [
  { number: 1, symbol: 'H', name: 'Hydrogen', atomicMass: 1.008, category: 'Nonmetal', row: 1, col: 1 },
  { number: 2, symbol: 'He', name: 'Helium', atomicMass: 4.003, category: 'Noble gas', row: 1, col: 18 },
  { number: 3, symbol: 'Li', name: 'Lithium', atomicMass: 6.941, category: 'Alkali metal', row: 2, col: 1 },
  { number: 4, symbol: 'Be', name: 'Beryllium', atomicMass: 9.012, category: 'Alkaline earth metal', row: 2, col: 2 },
  { number: 5, symbol: 'B', name: 'Boron', atomicMass: 10.81, category: 'Metalloid', row: 2, col: 13 },
  { number: 6, symbol: 'C', name: 'Carbon', atomicMass: 12.011, category: 'Nonmetal', row: 2, col: 14 },
  { number: 7, symbol: 'N', name: 'Nitrogen', atomicMass: 14.007, category: 'Nonmetal', row: 2, col: 15 },
  { number: 8, symbol: 'O', name: 'Oxygen', atomicMass: 15.999, category: 'Nonmetal', row: 2, col: 16 },
  { number: 9, symbol: 'F', name: 'Fluorine', atomicMass: 18.998, category: 'Nonmetal', row: 2, col: 17 },
  { number: 10, symbol: 'Ne', name: 'Neon', atomicMass: 20.180, category: 'Noble gas', row: 2, col: 18 },
  { number: 11, symbol: 'Na', name: 'Sodium', atomicMass: 22.990, category: 'Alkali metal', row: 3, col: 1 },
  { number: 12, symbol: 'Mg', name: 'Magnesium', atomicMass: 24.305, category: 'Alkaline earth metal', row: 3, col: 2 },
  { number: 13, symbol: 'Al', name: 'Aluminium', atomicMass: 26.982, category: 'Post-transition metal', row: 3, col: 13 },
  { number: 14, symbol: 'Si', name: 'Silicon', atomicMass: 28.086, category: 'Metalloid', row: 3, col: 14 },
  { number: 15, symbol: 'P', name: 'Phosphorus', atomicMass: 30.974, category: 'Nonmetal', row: 3, col: 15 },
  { number: 16, symbol: 'S', name: 'Sulfur', atomicMass: 32.065, category: 'Nonmetal', row: 3, col: 16 },
  { number: 17, symbol: 'Cl', name: 'Chlorine', atomicMass: 35.453, category: 'Nonmetal', row: 3, col: 17 },
  { number: 18, symbol: 'Ar', name: 'Argon', atomicMass: 39.948, category: 'Noble gas', row: 3, col: 18 },
  { number: 19, symbol: 'K', name: 'Potassium', atomicMass: 39.098, category: 'Alkali metal', row: 4, col: 1 },
  { number: 20, symbol: 'Ca', name: 'Calcium', atomicMass: 40.078, category: 'Alkaline earth metal', row: 4, col: 2 },
  { number: 21, symbol: 'Sc', name: 'Scandium', atomicMass: 44.956, category: 'Transition metal', row: 4, col: 3 },
  { number: 22, symbol: 'Ti', name: 'Titanium', atomicMass: 47.867, category: 'Transition metal', row: 4, col: 4 },
  { number: 23, symbol: 'V', name: 'Vanadium', atomicMass: 50.942, category: 'Transition metal', row: 4, col: 5 },
  { number: 24, symbol: 'Cr', name: 'Chromium', atomicMass: 51.996, category: 'Transition metal', row: 4, col: 6 },
  { number: 25, symbol: 'Mn', name: 'Manganese', atomicMass: 54.938, category: 'Transition metal', row: 4, col: 7 },
  { number: 26, symbol: 'Fe', name: 'Iron', atomicMass: 55.845, category: 'Transition metal', row: 4, col: 8 },
  { number: 27, symbol: 'Co', name: 'Cobalt', atomicMass: 58.933, category: 'Transition metal', row: 4, col: 9 },
  { number: 28, symbol: 'Ni', name: 'Nickel', atomicMass: 58.693, category: 'Transition metal', row: 4, col: 10 },
  { number: 29, symbol: 'Cu', name: 'Copper', atomicMass: 63.546, category: 'Transition metal', row: 4, col: 11 },
  { number: 30, symbol: 'Zn', name: 'Zinc', atomicMass: 65.380, category: 'Transition metal', row: 4, col: 12 },
  { number: 31, symbol: 'Ga', name: 'Gallium', atomicMass: 69.723, category: 'Post-transition metal', row: 4, col: 13 },
  { number: 32, symbol: 'Ge', name: 'Germanium', atomicMass: 72.630, category: 'Metalloid', row: 4, col: 14 },
  { number: 33, symbol: 'As', name: 'Arsenic', atomicMass: 74.922, category: 'Metalloid', row: 4, col: 15 },
  { number: 34, symbol: 'Se', name: 'Selenium', atomicMass: 78.960, category: 'Nonmetal', row: 4, col: 16 },
  { number: 35, symbol: 'Br', name: 'Bromine', atomicMass: 79.904, category: 'Nonmetal', row: 4, col: 17 },
  { number: 36, symbol: 'Kr', name: 'Krypton', atomicMass: 83.798, category: 'Noble gas', row: 4, col: 18 },
];

const categoryColors = {
  'Alkali metal': '#ff6b6b',
  'Alkaline earth metal': '#ffa36b',
  'Transition metal': '#ffd93d',
  'Post-transition metal': '#6bcb77',
  'Metalloid': '#4d96ff',
  'Nonmetal': '#9b59b6',
  'Noble gas': '#e91e8c',
};

// State
window.__3D_STATE__ = {
  elementCount: 36,
  selectedElement: null,
  hoveredElement: null,
  viewMode: 'flat',
  activeFilter: 'all',
  filterVisibleCount: 36,
  cameraPosition: { x: 0, y: 5, z: 25 },
  elementsLoaded: false,
  animating: false,
  selectedElementZ: 0,
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 25);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(10, 15, 10);
scene.add(directionalLight);

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Element meshes
const elementMeshes = [];
let selectedMesh = null;
let hoveredMesh = null;
let selectedIndex = -1;

function createTextTexture(symbol, number, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = color;
  ctx.fillRect(0, 0, 128, 128);

  // Border
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 3;
  ctx.strokeRect(2, 2, 124, 124);

  // Atomic number
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'left';
  ctx.fillText(number.toString(), 8, 22);

  // Symbol
  ctx.fillStyle = '#000';
  ctx.font = 'bold 48px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(symbol, 64, 70);

  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  return texture;
}

function getFlatPosition(el) {
  return new THREE.Vector3(
    (el.col - 9) * 1.1,
    (4 - el.row) * 1.1,
    0
  );
}

function getSpiralPosition(i) {
  return new THREE.Vector3(
    4 * Math.cos(i * 0.5),
    i * 0.4 - 7,
    4 * Math.sin(i * 0.5)
  );
}

// Create elements
elementsData.forEach((el, i) => {
  const color = el.symbol === 'H' ? '#ffffff' : (categoryColors[el.category] || '#888888');
  const colorHex = new THREE.Color(color);

  const texture = createTextTexture(el.symbol, el.number, color);

  const geometry = new THREE.BoxGeometry(0.9, 0.9, 0.3);

  // Create materials for each face
  const sideMaterial = new THREE.MeshPhongMaterial({
    color: colorHex,
    emissive: new THREE.Color(0x000000),
    transparent: true,
    opacity: 1,
  });

  const frontMaterial = new THREE.MeshPhongMaterial({
    map: texture,
    emissive: new THREE.Color(0x000000),
    transparent: true,
    opacity: 1,
  });

  const materials = [
    sideMaterial.clone(), // right
    sideMaterial.clone(), // left
    sideMaterial.clone(), // top
    sideMaterial.clone(), // bottom
    frontMaterial,        // front
    sideMaterial.clone(), // back
  ];

  const mesh = new THREE.Mesh(geometry, materials);

  const pos = getFlatPosition(el);
  mesh.position.copy(pos);

  mesh.userData = {
    elementData: el,
    index: i,
    baseColor: colorHex.clone(),
    flatPosition: pos.clone(),
    spiralPosition: getSpiralPosition(i),
    targetPosition: pos.clone(),
    targetScale: new THREE.Vector3(1, 1, 1),
    currentOpacity: 1,
    targetOpacity: 1,
    isSelected: false,
  };

  scene.add(mesh);
  elementMeshes.push(mesh);
});

window.__3D_STATE__.elementsLoaded = true;

// Interaction
function onMouseMove(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
}

function onMouseClick(event) {
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(elementMeshes);

  if (intersects.length > 0) {
    const mesh = intersects[0].object;
    selectElement(mesh.userData.index);
  }
}

function selectElement(index) {
  // Deselect previous
  if (selectedMesh) {
    selectedMesh.userData.isSelected = false;
    const basePos = window.__3D_STATE__.viewMode === 'flat'
      ? selectedMesh.userData.flatPosition.clone()
      : selectedMesh.userData.spiralPosition.clone();
    selectedMesh.userData.targetPosition.copy(basePos);
  }

  const mesh = elementMeshes[index];
  selectedMesh = mesh;
  selectedIndex = index;
  mesh.userData.isSelected = true;

  const basePos = window.__3D_STATE__.viewMode === 'flat'
    ? mesh.userData.flatPosition.clone()
    : mesh.userData.spiralPosition.clone();
  mesh.userData.targetPosition.copy(basePos);
  mesh.userData.targetPosition.z += 2;

  const el = mesh.userData.elementData;
  window.__3D_STATE__.selectedElement = {
    number: el.number,
    symbol: el.symbol,
    name: el.name,
    atomicMass: el.atomicMass,
    category: el.category,
  };
  window.__3D_STATE__.selectedElementZ = mesh.userData.targetPosition.z;

  showInfoPanel(el);
}

function showInfoPanel(el) {
  const panel = document.getElementById('info-panel');
  const color = el.symbol === 'H' ? '#ffffff' : (categoryColors[el.category] || '#888');

  panel.innerHTML = `
    <div class="element-symbol" style="color:${color}">${el.symbol}</div>
    <div class="element-name">${el.name}</div>
    <div class="detail"><span class="label">Atomic Number</span><span class="value">${el.number}</span></div>
    <div class="detail"><span class="label">Atomic Mass</span><span class="value">${el.atomicMass}</span></div>
    <div class="detail"><span class="label">Category</span><span class="value">${el.category}</span></div>
    <div class="category-badge" style="background:${color}; color:#000;">${el.category}</div>
  `;
  panel.style.display = 'block';
}

function hideInfoPanel() {
  document.getElementById('info-panel').style.display = 'none';
}

// Filter
function filterCategory(category) {
  window.__3D_STATE__.activeFilter = category === 'all' ? 'all' : category;
  document.getElementById('active-filter').textContent = `Filter: ${category === 'all' ? 'All' : category}`;

  // Update button active states
  document.querySelectorAll('#controls button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === category);
  });

  let visibleCount = 0;
  elementMeshes.forEach(mesh => {
    const el = mesh.userData.elementData;
    if (category === 'all' || el.category === category) {
      mesh.userData.targetOpacity = 1;
      visibleCount++;
    } else {
      mesh.userData.targetOpacity = 0.2;
    }
  });

  window.__3D_STATE__.filterVisibleCount = visibleCount;
}
window.filterCategory = filterCategory;

// View modes
function setView(mode) {
  if (window.__3D_STATE__.animating) return;

  window.__3D_STATE__.viewMode = mode;
  window.__3D_STATE__.animating = true;
  document.getElementById('current-view').textContent = `View: ${mode === 'flat' ? 'Flat' : 'Spiral'}`;

  document.getElementById('btn-flat').classList.toggle('active', mode === 'flat');
  document.getElementById('btn-spiral').classList.toggle('active', mode === 'spiral');

  elementMeshes.forEach((mesh, i) => {
    const targetPos = mode === 'flat' ? mesh.userData.flatPosition.clone() : mesh.userData.spiralPosition.clone();
    if (mesh.userData.isSelected) {
      targetPos.z += 2;
    }
    mesh.userData.targetPosition.copy(targetPos);
  });

  // Animation timer
  const startTime = Date.now();
  const duration = 1000;

  function checkAnimComplete() {
    if (Date.now() - startTime >= duration) {
      window.__3D_STATE__.animating = false;
    } else {
      requestAnimationFrame(checkAnimComplete);
    }
  }
  requestAnimationFrame(checkAnimComplete);
}
window.setView = setView;

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') {
    camera.position.set(0, 5, 25);
    camera.lookAt(0, 0, 0);
    controls.reset();
    controls.target.set(0, 0, 0);
  } else if (e.key === 'ArrowRight') {
    const nextIndex = selectedIndex < 0 ? 0 : (selectedIndex + 1) % 36;
    selectElement(nextIndex);
  } else if (e.key === 'ArrowLeft') {
    const prevIndex = selectedIndex < 0 ? 35 : (selectedIndex - 1 + 36) % 36;
    selectElement(prevIndex);
  }
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.addEventListener('mousemove', onMouseMove);
document.addEventListener('click', onMouseClick);

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  // Raycasting for hover
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(elementMeshes);

  // Reset previous hover
  if (hoveredMesh && (!intersects.length || intersects[0].object !== hoveredMesh)) {
    if (!hoveredMesh.userData.isSelected) {
      hoveredMesh.userData.targetScale.set(1, 1, 1);
    }
    hoveredMesh.material.forEach(mat => {
      mat.emissive.setHex(0x000000);
    });
    hoveredMesh = null;
    window.__3D_STATE__.hoveredElement = null;
  }

  if (intersects.length > 0) {
    const mesh = intersects[0].object;
    if (mesh !== hoveredMesh) {
      hoveredMesh = mesh;
      window.__3D_STATE__.hoveredElement = mesh.userData.elementData.symbol;
      hoveredMesh.userData.targetScale.set(1.3, 1.3, 1.3);
      hoveredMesh.material.forEach(mat => {
        mat.emissive.copy(mesh.userData.baseColor).multiplyScalar(0.3);
      });
    }
  }

  // Animate positions, scales, opacity
  elementMeshes.forEach(mesh => {
    // Position lerp
    mesh.position.lerp(mesh.userData.targetPosition, 0.08);

    // Scale lerp
    mesh.scale.lerp(mesh.userData.targetScale, 0.1);

    // Opacity lerp
    const targetOp = mesh.userData.targetOpacity;
    mesh.userData.currentOpacity += (targetOp - mesh.userData.currentOpacity) * 0.1;
    mesh.material.forEach(mat => {
      mat.opacity = mesh.userData.currentOpacity;
    });
  });

  // Update state
  window.__3D_STATE__.cameraPosition = {
    x: parseFloat(camera.position.x.toFixed(3)),
    y: parseFloat(camera.position.y.toFixed(3)),
    z: parseFloat(camera.position.z.toFixed(3)),
  };

  if (selectedMesh) {
    window.__3D_STATE__.selectedElementZ = parseFloat(selectedMesh.position.z.toFixed(3));
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
