<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Periodic Table</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .ui-layer {
            position: absolute;
            pointer-events: none;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        .panel {
            background: rgba(15, 15, 25, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }
        #top-left-hud {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 14px;
        }
        #top-center-hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .button-group {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        button.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: white;
        }
        #info-panel {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            width: 250px;
            display: none;
            transition: opacity 0.3s;
        }
        .info-symbol {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .info-row span:first-child {
            color: #aaa;
        }
        .keyboard-hints {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #888;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="ui-layer">
        <div id="top-left-hud" class="panel">
            <div id="element-count">Elements: 36</div>
            <div id="current-view">View: Flat</div>
            <div id="active-filter">Filter: All</div>
        </div>

        <div id="top-center-hud">
            <div class="button-group" id="filter-buttons">
                <button data-filter="all" class="active">Show All</button>
                <button data-filter="Alkali metals" style="border-bottom: 3px solid #ff6b6b;">Alkali</button>
                <button data-filter="Alkaline earth metals" style="border-bottom: 3px solid #ffa36b;">Alkaline Earth</button>
                <button data-filter="Transition metals" style="border-bottom: 3px solid #ffd93d;">Transition</button>
                <button data-filter="Post-transition metals" style="border-bottom: 3px solid #6bcb77;">Post-Transition</button>
                <button data-filter="Metalloids" style="border-bottom: 3px solid #4d96ff;">Metalloids</button>
                <button data-filter="Nonmetals" style="border-bottom: 3px solid #9b59b6;">Nonmetals</button>
                <button data-filter="Noble gases" style="border-bottom: 3px solid #e91e8c;">Noble Gases</button>
            </div>
            <div class="button-group">
                <button id="btn-flat" class="active">Flat View</button>
                <button id="btn-spiral">Spiral View</button>
            </div>
        </div>

        <div id="info-panel" class="panel">
            <div class="info-symbol" id="info-sym"></div>
            <div class="info-row"><span>Name</span><span id="info-name"></span></div>
            <div class="info-row"><span>Atomic Number</span><span id="info-num"></span></div>
            <div class="info-row"><span>Atomic Mass</span><span id="info-mass"></span></div>
            <div class="info-row"><span>Category</span><span id="info-cat"></span></div>
        </div>

        <div class="keyboard-hints">
            [Left/Right Arrows] Cycle Elements | [R] Reset Camera | [Click] Select | [Hover] Highlight
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            elementCount: 36,
            selectedElement: null,
            hoveredElement: null,
            viewMode: 'flat',
            activeFilter: 'all',
            filterVisibleCount: 36,
            cameraPosition: { x: 0, y: 5, z: 25 },
            elementsLoaded: false,
            animating: false,
            selectedElementZ: 0
        };

        // --- Data ---
        const elementsData = [
            { num: 1, sym: 'H', name: 'Hydrogen', mass: 1.008, cat: 'Hydrogen', r: 1, c: 1 },
            { num: 2, sym: 'He', name: 'Helium', mass: 4.0026, cat: 'Noble gases', r: 1, c: 18 },
            { num: 3, sym: 'Li', name: 'Lithium', mass: 6.94, cat: 'Alkali metals', r: 2, c: 1 },
            { num: 4, sym: 'Be', name: 'Beryllium', mass: 9.0122, cat: 'Alkaline earth metals', r: 2, c: 2 },
            { num: 5, sym: 'B', name: 'Boron', mass: 10.81, cat: 'Metalloids', r: 2, c: 13 },
            { num: 6, sym: 'C', name: 'Carbon', mass: 12.011, cat: 'Nonmetals', r: 2, c: 14 },
            { num: 7, sym: 'N', name: 'Nitrogen', mass: 14.007, cat: 'Nonmetals', r: 2, c: 15 },
            { num: 8, sym: 'O', name: 'Oxygen', mass: 15.999, cat: 'Nonmetals', r: 2, c: 16 },
            { num: 9, sym: 'F', name: 'Fluorine', mass: 18.998, cat: 'Nonmetals', r: 2, c: 17 },
            { num: 10, sym: 'Ne', name: 'Neon', mass: 20.180, cat: 'Noble gases', r: 2, c: 18 },
            { num: 11, sym: 'Na', name: 'Sodium', mass: 22.990, cat: 'Alkali metals', r: 3, c: 1 },
            { num: 12, sym: 'Mg', name: 'Magnesium', mass: 24.305, cat: 'Alkaline earth metals', r: 3, c: 2 },
            { num: 13, sym: 'Al', name: 'Aluminium', mass: 26.982, cat: 'Post-transition metals', r: 3, c: 13 },
            { num: 14, sym: 'Si', name: 'Silicon', mass: 28.085, cat: 'Metalloids', r: 3, c: 14 },
            { num: 15, sym: 'P', name: 'Phosphorus', mass: 30.974, cat: 'Nonmetals', r: 3, c: 15 },
            { num: 16, sym: 'S', name: 'Sulfur', mass: 32.06, cat: 'Nonmetals', r: 3, c: 16 },
            { num: 17, sym: 'Cl', name: 'Chlorine', mass: 35.45, cat: 'Nonmetals', r: 3, c: 17 },
            { num: 18, sym: 'Ar', name: 'Argon', mass: 39.95, cat: 'Noble gases', r: 3, c: 18 },
            { num: 19, sym: 'K', name: 'Potassium', mass: 39.098, cat: 'Alkali metals', r: 4, c: 1 },
            { num: 20, sym: 'Ca', name: 'Calcium', mass: 40.078, cat: 'Alkaline earth metals', r: 4, c: 2 },
            { num: 21, sym: 'Sc', name: 'Scandium', mass: 44.956, cat: 'Transition metals', r: 4, c: 3 },
            { num: 22, sym: 'Ti', name: 'Titanium', mass: 47.867, cat: 'Transition metals', r: 4, c: 4 },
            { num: 23, sym: 'V', name: 'Vanadium', mass: 50.942, cat: 'Transition metals', r: 4, c: 5 },
            { num: 24, sym: 'Cr', name: 'Chromium', mass: 51.996, cat: 'Transition metals', r: 4, c: 6 },
            { num: 25, sym: 'Mn', name: 'Manganese', mass: 54.938, cat: 'Transition metals', r: 4, c: 7 },
            { num: 26, sym: 'Fe', name: 'Iron', mass: 55.845, cat: 'Transition metals', r: 4, c: 8 },
            { num: 27, sym: 'Co', name: 'Cobalt', mass: 58.933, cat: 'Transition metals', r: 4, c: 9 },
            { num: 28, sym: 'Ni', name: 'Nickel', mass: 58.693, cat: 'Transition metals', r: 4, c: 10 },
            { num: 29, sym: 'Cu', name: 'Copper', mass: 63.546, cat: 'Transition metals', r: 4, c: 11 },
            { num: 30, sym: 'Zn', name: 'Zinc', mass: 65.38, cat: 'Transition metals', r: 4, c: 12 },
            { num: 31, sym: 'Ga', name: 'Gallium', mass: 69.723, cat: 'Post-transition metals', r: 4, c: 13 },
            { num: 32, sym: 'Ge', name: 'Germanium', mass: 72.630, cat: 'Metalloids', r: 4, c: 14 },
            { num: 33, sym: 'As', name: 'Arsenic', mass: 74.922, cat: 'Metalloids', r: 4, c: 15 },
            { num: 34, sym: 'Se', name: 'Selenium', mass: 78.971, cat: 'Nonmetals', r: 4, c: 16 },
            { num: 35, sym: 'Br', name: 'Bromine', mass: 79.904, cat: 'Nonmetals', r: 4, c: 17 },
            { num: 36, sym: 'Kr', name: 'Krypton', mass: 83.798, cat: 'Noble gases', r: 4, c: 18 }
        ];

        const categoryColors = {
            'Alkali metals': 0xff6b6b,
            'Alkaline earth metals': 0xffa36b,
            'Transition metals': 0xffd93d,
            'Post-transition metals': 0x6bcb77,
            'Metalloids': 0x4d96ff,
            'Nonmetals': 0x9b59b6,
            'Noble gases': 0xe91e8c,
            'Hydrogen': 0xffffff
        };

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 25);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 15, 10);
        scene.add(dirLight);

        // --- Element Creation ---
        const meshes = [];
        const boxGeometry = new THREE.BoxGeometry(0.9, 0.9, 0.3);

        function createTexture(text, colorHex) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#' + colorHex.toString(16).padStart(6, '0');
            ctx.fillRect(0, 0, 256, 256);
            
            // Inner border
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 10;
            ctx.strokeRect(5, 5, 246, 246);

            ctx.fillStyle = (colorHex === 0xffffff || colorHex === 0xffd93d) ? '#111' : '#fff';
            ctx.font = 'bold 110px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 128, 138);

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        elementsData.forEach((data, index) => {
            const color = categoryColors[data.cat];
            const texture = createTexture(data.sym, color);
            
            const matFront = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.4, metalness: 0.1 });
            const matSide = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4, metalness: 0.1 });
            
            const materials = [matSide, matSide, matSide, matSide, matFront, matSide];
            const mesh = new THREE.Mesh(boxGeometry, materials);

            const flatPos = new THREE.Vector3((data.c - 9) * 1.1, (4 - data.r) * 1.1, 0);
            const spiralPos = new THREE.Vector3(4 * Math.cos(index * 0.5), index * 0.4 - 7, 4 * Math.sin(index * 0.5));

            mesh.position.copy(flatPos);
            
            mesh.userData = {
                ...data,
                index: index,
                flatPos: flatPos,
                spiralPos: spiralPos,
                targetPos: flatPos.clone(),
                baseColor: color
            };

            scene.add(mesh);
            meshes.push(mesh);
        });

        window.__3D_STATE__.elementsLoaded = true;

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function updateUI() {
            document.getElementById('current-view').innerText = `View: ${window.__3D_STATE__.viewMode === 'flat' ? 'Flat' : 'Spiral'}`;
            document.getElementById('active-filter').innerText = `Filter: ${window.__3D_STATE__.activeFilter === 'all' ? 'All' : window.__3D_STATE__.activeFilter}`;
            
            const infoPanel = document.getElementById('info-panel');
            const sel = window.__3D_STATE__.selectedElement;
            if (sel) {
                infoPanel.style.display = 'block';
                setTimeout(() => infoPanel.style.opacity = 1, 10);
                document.getElementById('info-sym').innerText = sel.symbol;
                document.getElementById('info-sym').style.color = '#' + categoryColors[sel.category].toString(16).padStart(6, '0');
                document.getElementById('info-name').innerText = sel.name;
                document.getElementById('info-num').innerText = sel.number;
                document.getElementById('info-mass').innerText = sel.atomicMass;
                document.getElementById('info-cat').innerText = sel.category;
            } else {
                infoPanel.style.opacity = 0;
                setTimeout(() => { if(!window.__3D_STATE__.selectedElement) infoPanel.style.display = 'none'; }, 300);
            }
        }

        function selectElement(data) {
            window.__3D_STATE__.selectedElement = {
                number: data.num,
                symbol: data.sym,
                name: data.name,
                atomicMass: data.mass,
                category: data.cat
            };
            updateUI();
        }

        function applyFilter(category) {
            window.__3D_STATE__.activeFilter = category;
            let count = 0;
            meshes.forEach(mesh => {
                const match = category === 'all' || mesh.userData.cat === category;
                if (match) count++;
                mesh.material.forEach(m => {
                    m.transparent = true;
                    m.opacity = match ? 1.0 : 0.2;
                });
            });
            window.__3D_STATE__.filterVisibleCount = count;
            
            document.querySelectorAll('#filter-buttons button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === category);
            });
            updateUI();
        }

        function setViewMode(mode) {
            window.__3D_STATE__.viewMode = mode;
            meshes.forEach(mesh => {
                mesh.userData.targetPos = mode === 'flat' ? mesh.userData.flatPos.clone() : mesh.userData.spiralPos.clone();
            });
            document.getElementById('btn-flat').classList.toggle('active', mode === 'flat');
            document.getElementById('btn-spiral').classList.toggle('active', mode === 'spiral');
            updateUI();
        }

        // --- Event Listeners ---
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('click', () => {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(meshes);
            if (intersects.length > 0) {
                selectElement(intersects[0].object.userData);
            } else {
                window.__3D_STATE__.selectedElement = null;
                updateUI();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') {
                camera.position.set(0, 5, 25);
                controls.target.set(0, 0, 0);
            } else if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
                let idx = 0;
                if (window.__3D_STATE__.selectedElement) {
                    idx = meshes.findIndex(m => m.userData.num === window.__3D_STATE__.selectedElement.number);
                    if (e.key === 'ArrowRight') idx = (idx + 1) % meshes.length;
                    if (e.key === 'ArrowLeft') idx = (idx - 1 + meshes.length) % meshes.length;
                }
                selectElement(meshes[idx].userData);
            }
        });

        document.querySelectorAll('#filter-buttons button').forEach(btn => {
            btn.addEventListener('click', (e) => applyFilter(e.target.dataset.filter));
        });

        document.getElementById('btn-flat').addEventListener('click', () => setViewMode('flat'));
        document.getElementById('btn-spiral').addEventListener('click', () => setViewMode('spiral'));

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(meshes);
            
            let currentHover = null;
            if (intersects.length > 0) {
                currentHover = intersects[0].object.userData.sym;
            }
            window.__3D_STATE__.hoveredElement = currentHover;

            let isAnimating = false;

            meshes.forEach(mesh => {
                // Hover effect
                const isHovered = currentHover === mesh.userData.sym;
                const targetScale = isHovered ? 1.3 : 1.0;
                mesh.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.15);

                if (isHovered) {
                    mesh.material.forEach(m => m.emissive.setHex(0x333333));
                } else {
                    mesh.material.forEach(m => m.emissive.setHex(0x000000));
                }

                // Position & Selection effect
                const isSelected = window.__3D_STATE__.selectedElement && window.__3D_STATE__.selectedElement.number === mesh.userData.num;
                const finalTarget = mesh.userData.targetPos.clone();
                
                // Apply selection offset along local Z relative to camera or just world Z
                // For simplicity and to match requirements, just z += 2
                if (isSelected) {
                    if(window.__3D_STATE__.viewMode === 'flat') {
                        finalTarget.z += 2;
                    } else {
                        // In spiral, move outward from center
                        const dir = finalTarget.clone().setY(0).normalize();
                        finalTarget.add(dir.multiplyScalar(2));
                    }
                }

                if (mesh.position.distanceTo(finalTarget) > 0.01) {
                    // Use a factor that roughly completes in ~1s at 60fps
                    mesh.position.lerp(finalTarget, 0.05); 
                    isAnimating = true;
                }

                if (isSelected) {
                    window.__3D_STATE__.selectedElementZ = mesh.position.z;
                }
            });

            window.__3D_STATE__.animating = isAnimating;
            window.__3D_STATE__.cameraPosition = { x: camera.position.x, y: camera.position.y, z: camera.position.z };

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
