<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Periodic Table - Three.js</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: white;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 10;
      pointer-events: none;
    }

    #top-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      pointer-events: auto;
      margin-bottom: 10px;
    }

    button {
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: 0.2s;
    }

    button:hover {
      background: rgba(255,255,255,0.22);
    }

    #hud {
      position: absolute;
      top: 70px;
      left: 10px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .hud-box {
      background: rgba(0,0,0,0.45);
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 14px;
      min-width: 140px;
    }

    #info-panel {
      position: absolute;
      top: 110px;
      right: 20px;
      width: 260px;
      min-height: 180px;
      background: rgba(10, 10, 20, 0.9);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 16px;
      z-index: 10;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    #info-panel h2 {
      margin: 0 0 10px 0;
      font-size: 24px;
    }

    #info-panel .symbol {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 12px;
    }

    #info-panel p {
      margin: 8px 0;
      font-size: 14px;
      line-height: 1.4;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="top-controls"></div>
  </div>

  <div id="hud">
    <div id="element-count" class="hud-box">Elements: 36</div>
    <div id="current-view" class="hud-box">View: Flat</div>
    <div id="active-filter" class="hud-box">Filter: All</div>
  </div>

  <div id="info-panel"></div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#1a1a2e");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 25);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 15, 10);
    scene.add(directionalLight);

    const categoryColors = {
      hydrogen: "#ffffff",
      "alkali metal": "#ff6b6b",
      "alkaline earth metal": "#ffa36b",
      "transition metal": "#ffd93d",
      "post-transition metal": "#6bcb77",
      metalloid: "#4d96ff",
      nonmetal: "#9b59b6",
      "noble gas": "#e91e8c"
    };

    const elements = [
      { number: 1, symbol: "H",  name: "Hydrogen", atomicMass: "1.008", category: "hydrogen", row: 1, col: 1 },
      { number: 2, symbol: "He", name: "Helium", atomicMass: "4.0026", category: "noble gas", row: 1, col: 18 },

      { number: 3, symbol: "Li", name: "Lithium", atomicMass: "6.94", category: "alkali metal", row: 2, col: 1 },
      { number: 4, symbol: "Be", name: "Beryllium", atomicMass: "9.0122", category: "alkaline earth metal", row: 2, col: 2 },
      { number: 5, symbol: "B",  name: "Boron", atomicMass: "10.81", category: "metalloid", row: 2, col: 13 },
      { number: 6, symbol: "C",  name: "Carbon", atomicMass: "12.011", category: "nonmetal", row: 2, col: 14 },
      { number: 7, symbol: "N",  name: "Nitrogen", atomicMass: "14.007", category: "nonmetal", row: 2, col: 15 },
      { number: 8, symbol: "O",  name: "Oxygen", atomicMass: "15.999", category: "nonmetal", row: 2, col: 16 },
      { number: 9, symbol: "F",  name: "Fluorine", atomicMass: "18.998", category: "nonmetal", row: 2, col: 17 },
      { number: 10, symbol: "Ne", name: "Neon", atomicMass: "20.180", category: "noble gas", row: 2, col: 18 },

      { number: 11, symbol: "Na", name: "Sodium", atomicMass: "22.990", category: "alkali metal", row: 3, col: 1 },
      { number: 12, symbol: "Mg", name: "Magnesium", atomicMass: "24.305", category: "alkaline earth metal", row: 3, col: 2 },
      { number: 13, symbol: "Al", name: "Aluminium", atomicMass: "26.982", category: "post-transition metal", row: 3, col: 13 },
      { number: 14, symbol: "Si", name: "Silicon", atomicMass: "28.085", category: "metalloid", row: 3, col: 14 },
      { number: 15, symbol: "P",  name: "Phosphorus", atomicMass: "30.974", category: "nonmetal", row: 3, col: 15 },
      { number: 16, symbol: "S",  name: "Sulfur", atomicMass: "32.06", category: "nonmetal", row: 3, col: 16 },
      { number: 17, symbol: "Cl", name: "Chlorine", atomicMass: "35.45", category: "nonmetal", row: 3, col: 17 },
      { number: 18, symbol: "Ar", name: "Argon", atomicMass: "39.948", category: "noble gas", row: 3, col: 18 },

      { number: 19, symbol: "K",  name: "Potassium", atomicMass: "39.098", category: "alkali metal", row: 4, col: 1 },
      { number: 20, symbol: "Ca", name: "Calcium", atomicMass: "40.078", category: "alkaline earth metal", row: 4, col: 2 },
      { number: 21, symbol: "Sc", name: "Scandium", atomicMass: "44.956", category: "transition metal", row: 4, col: 3 },
      { number: 22, symbol: "Ti", name: "Titanium", atomicMass: "47.867", category: "transition metal", row: 4, col: 4 },
      { number: 23, symbol: "V",  name: "Vanadium", atomicMass: "50.942", category: "transition metal", row: 4, col: 5 },
      { number: 24, symbol: "Cr", name: "Chromium", atomicMass: "51.996", category: "transition metal", row: 4, col: 6 },
      { number: 25, symbol: "Mn", name: "Manganese", atomicMass: "54.938", category: "transition metal", row: 4, col: 7 },
      { number: 26, symbol: "Fe", name: "Iron", atomicMass: "55.845", category: "transition metal", row: 4, col: 8 },
      { number: 27, symbol: "Co", name: "Cobalt", atomicMass: "58.933", category: "transition metal", row: 4, col: 9 },
      { number: 28, symbol: "Ni", name: "Nickel", atomicMass: "58.693", category: "transition metal", row: 4, col: 10 },
      { number: 29, symbol: "Cu", name: "Copper", atomicMass: "63.546", category: "transition metal", row: 4, col: 11 },
      { number: 30, symbol: "Zn", name: "Zinc", atomicMass: "65.38", category: "transition metal", row: 4, col: 12 },
      { number: 31, symbol: "Ga", name: "Gallium", atomicMass: "69.723", category: "post-transition metal", row: 4, col: 13 },
      { number: 32, symbol: "Ge", name: "Germanium", atomicMass: "72.630", category: "metalloid", row: 4, col: 14 },
      { number: 33, symbol: "As", name: "Arsenic", atomicMass: "74.922", category: "metalloid", row: 4, col: 15 },
      { number: 34, symbol: "Se", name: "Selenium", atomicMass: "78.971", category: "nonmetal", row: 4, col: 16 },
      { number: 35, symbol: "Br", name: "Bromine", atomicMass: "79.904", category: "nonmetal", row: 4, col: 17 },
      { number: 36, symbol: "Kr", name: "Krypton", atomicMass: "83.798", category: "noble gas", row: 4, col: 18 }
    ];

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const elementGroup = new THREE.Group();
    scene.add(elementGroup);

    const elementMeshes = [];
    let hoveredMesh = null;
    let selectedMesh = null;

    let viewMode = "flat";
    let activeFilter = "all";
    let animating = false;
    let transitionStart = 0;
    const transitionDuration = 1000;

    const infoPanel = document.getElementById("info-panel");
    const currentViewDiv = document.getElementById("current-view");
    const activeFilterDiv = document.getElementById("active-filter");
    const elementCountDiv = document.getElementById("element-count");
    const topControls = document.getElementById("top-controls");

    const initialCameraPosition = new THREE.Vector3(0, 5, 25);
    const initialTarget = new THREE.Vector3(0, 0, 0);

    function createTextSprite(text) {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 128;
      const ctx = canvas.getContext("2d");

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(255,255,255,1)";
      ctx.font = "bold 64px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;

      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true
      });

      const sprite = new THREE.Sprite(material);
      sprite.scale.set(0.7, 0.35, 1);
      sprite.position.set(0, 0, 0.18);
      return sprite;
    }

    function flatPosition(el) {
      return new THREE.Vector3(
        (el.col - 9) * 1.1,
        (4 - el.row) * 1.1,
        0
      );
    }

    function spiralPosition(index) {
      return new THREE.Vector3(
        4 * Math.cos(index * 0.5),
        index * 0.4 - 7,
        4 * Math.sin(index * 0.5)
      );
    }

    function createElementMesh(el, index) {
      const geometry = new THREE.BoxGeometry(0.9, 0.9, 0.3);
      const material = new THREE.MeshPhongMaterial({
        color: categoryColors[el.category],
        emissive: new THREE.Color(categoryColors[el.category]).multiplyScalar(0.15),
        transparent: true,
        opacity: 1
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.userData = {
        element: el,
        index,
        baseScale: 1,
        targetScale: 1,
        selectedOffsetZ: 0,
        currentSelectedOffsetZ: 0,
        flatPos: flatPosition(el),
        spiralPos: spiralPosition(index),
        startPos: flatPosition(el).clone(),
        targetPos: flatPosition(el).clone()
      };

      mesh.position.copy(mesh.userData.flatPos);

      const label = createTextSprite(el.symbol);
      mesh.add(label);

      elementGroup.add(mesh);
      elementMeshes.push(mesh);
    }

    elements.forEach(createElementMesh);

    function updateInfoPanel(el) {
      if (!el) {
        infoPanel.style.display = "none";
        infoPanel.innerHTML = "";
        return;
      }

      infoPanel.style.display = "block";
      infoPanel.innerHTML = `
        <h2>${el.name}</h2>
        <div class="symbol">${el.symbol}</div>
        <p><strong>Atomic Number:</strong> ${el.number}</p>
        <p><strong>Atomic Mass:</strong> ${el.atomicMass}</p>
        <p><strong>Category:</strong> ${capitalize(el.category)}</p>
      `;
    }

    function capitalize(str) {
      return str.replace(/\b\w/g, c => c.toUpperCase());
    }

    function selectElement(mesh) {
      if (selectedMesh && selectedMesh !== mesh) {
        selectedMesh.userData.selectedOffsetZ = 0;
      }

      selectedMesh = mesh;
      if (selectedMesh) {
        selectedMesh.userData.selectedOffsetZ = 2;
        updateInfoPanel(selectedMesh.userData.element);
      } else {
        updateInfoPanel(null);
      }
      updateState();
    }

    function updateHover(mesh) {
      if (hoveredMesh && hoveredMesh !== mesh) {
        hoveredMesh.userData.targetScale = 1;
        hoveredMesh.material.emissiveIntensity = 1;
      }

      hoveredMesh = mesh;

      if (hoveredMesh) {
        hoveredMesh.userData.targetScale = 1.3;
        hoveredMesh.material.emissiveIntensity = 2.5;
      }

      updateState();
    }

    function clearHover() {
      if (hoveredMesh) {
        hoveredMesh.userData.targetScale = 1;
        hoveredMesh.material.emissiveIntensity = 1;
      }
      hoveredMesh = null;
      updateState();
    }

    function applyFilter(category) {
      activeFilter = category;

      let visibleCount = 0;
      elementMeshes.forEach(mesh => {
        const match = category === "all" || mesh.userData.element.category === category;
        mesh.material.opacity = match ? 1 : 0.2;
        if (match) visibleCount++;
      });

      activeFilterDiv.textContent = `Filter: ${category === "all" ? "All" : capitalize(category)}`;
      window.__3D_STATE__.activeFilter = category;
      window.__3D_STATE__.filterVisibleCount = visibleCount;
    }

    function setView(mode) {
      if (viewMode === mode) return;

      viewMode = mode;
      currentViewDiv.textContent = `View: ${mode === "flat" ? "Flat" : "Spiral"}`;

      elementMeshes.forEach(mesh => {
        mesh.userData.startPos = mesh.position.clone();
        mesh.userData.targetPos = (mode === "flat"
          ? mesh.userData.flatPos.clone()
          : mesh.userData.spiralPos.clone());
      });

      transitionStart = performance.now();
      animating = true;
      updateState();
    }

    function buildButtons() {
      const filterCategories = [
        "hydrogen",
        "alkali metal",
        "alkaline earth metal",
        "transition metal",
        "post-transition metal",
        "metalloid",
        "nonmetal",
        "noble gas"
      ];

      filterCategories.forEach(cat => {
        const btn = document.createElement("button");
        btn.textContent = capitalize(cat);
        btn.addEventListener("click", () => applyFilter(cat));
        topControls.appendChild(btn);
      });

      const showAllBtn = document.createElement("button");
      showAllBtn.textContent = "Show All";
      showAllBtn.addEventListener("click", () => applyFilter("all"));
      topControls.appendChild(showAllBtn);

      const flatBtn = document.createElement("button");
      flatBtn.textContent = "Flat View";
      flatBtn.addEventListener("click", () => setView("flat"));
      topControls.appendChild(flatBtn);

      const spiralBtn = document.createElement("button");
      spiralBtn.textContent = "Spiral View";
      spiralBtn.addEventListener("click", () => setView("spiral"));
      topControls.appendChild(spiralBtn);
    }

    buildButtons();

    function getIntersects(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      return raycaster.intersectObjects(elementMeshes, false);
    }

    renderer.domElement.addEventListener("mousemove", (event) => {
      const intersects = getIntersects(event);
      if (intersects.length > 0) {
        updateHover(intersects[0].object);
      } else {
        clearHover();
      }
    });

    renderer.domElement.addEventListener("click", (event) => {
      const intersects = getIntersects(event);
      if (intersects.length > 0) {
        selectElement(intersects[0].object);
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key.toLowerCase() === "r") {
        camera.position.copy(initialCameraPosition);
        controls.target.copy(initialTarget);
        controls.update();
      }

      if (event.key === "ArrowRight") {
        if (!selectedMesh) {
          selectElement(elementMeshes[0]);
        } else {
          const idx = selectedMesh.userData.index;
          selectElement(elementMeshes[(idx + 1) % elementMeshes.length]);
        }
      }

      if (event.key === "ArrowLeft") {
        if (!selectedMesh) {
          selectElement(elementMeshes[elementMeshes.length - 1]);
        } else {
          const idx = selectedMesh.userData.index;
          selectElement(elementMeshes[(idx - 1 + elementMeshes.length) % elementMeshes.length]);
        }
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function updateState() {
      window.__3D_STATE__ = {
        elementCount: 36,
        selectedElement: selectedMesh
          ? {
              number: selectedMesh.userData.element.number,
              symbol: selectedMesh.userData.element.symbol,
              name: selectedMesh.userData.element.name,
              atomicMass: selectedMesh.userData.element.atomicMass,
              category: selectedMesh.userData.element.category
            }
          : null,
        hoveredElement: hoveredMesh ? hoveredMesh.userData.element.symbol : null,
        viewMode,
        activeFilter,
        filterVisibleCount: elementMeshes.filter(m => m.material.opacity > 0.2).length || (activeFilter === "all" ? 36 : elementMeshes.filter(m => m.userData.element.category === activeFilter).length),
        cameraPosition: {
          x: camera.position.x,
          y: camera.position.y,
          z: camera.position.z
        },
        elementsLoaded: elementMeshes.length === 36,
        animating,
        selectedElementZ: selectedMesh ? selectedMesh.position.z : 0
      };
    }

    applyFilter("all");
    elementCountDiv.textContent = "Elements: 36";
    currentViewDiv.textContent = "View: Flat";
    activeFilterDiv.textContent = "Filter: All";
    updateState();

    function animate(now) {
      requestAnimationFrame(animate);

      if (animating) {
        const t = Math.min((now - transitionStart) / transitionDuration, 1);
        const eased = t * t * (3 - 2 * t);

        elementMeshes.forEach(mesh => {
          mesh.position.lerpVectors(mesh.userData.startPos, mesh.userData.targetPos, eased);
        });

        if (t >= 1) {
          animating = false;
        }
      }

      elementMeshes.forEach(mesh => {
        const targetScale = mesh === hoveredMesh ? 1.3 : 1;
        mesh.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.15);

        const basePos = animating
          ? mesh.position.clone()
          : mesh.userData.targetPos.clone();

        mesh.userData.currentSelectedOffsetZ += (mesh.userData.selectedOffsetZ - mesh.userData.currentSelectedOffsetZ) * 0.12;
        mesh.position.z = basePos.z + mesh.userData.currentSelectedOffsetZ;

        if (mesh !== hoveredMesh) {
          mesh.material.emissiveIntensity += (1 - mesh.material.emissiveIntensity) * 0.12;
        }
      });

      controls.update();
      updateState();
      renderer.render(scene, camera);
    }

    animate(performance.now());
  </script>
</body>
</html>
