<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Wheel Scene</title>
<style>
  body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #fff;
    background: rgba(0,0,0,0.6);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.6;
    pointer-events: none;
    z-index: 10;
  }
  #controls {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #controls button {
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    background: #2196F3;
    color: white;
    font-weight: bold;
  }
  #controls button:hover { background: #1976D2; }
</style>
</head>
<body>

<div id="hud">
  Wheel Speed: 0.00 rad/s<br>
  Rotations: 0.00<br>
  Active Particles: 0<br>
  Gravity: normal<br>
  Flow: ON
</div>

<div id="controls">
  <button id="toggleFlowBtn">Toggle Flow</button>
  <button id="resetBtn">Reset</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- State ---
const state = {
  wheelAngularVelocity: 0,
  wheelRotation: 0,
  totalRotations: 0,
  activeParticles: 0,
  flowActive: true,
  gravity: -9.8,
  helmetVisible: true,
  helmetLoaded: false,
  collisionCount: 0,
  forceBurstApplied: false
};
window.__3D_STATE__ = state;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 20, 50);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2, 0);
controls.update();

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// --- Ground ---
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// --- Water Wheel ---
const waterWheel = new THREE.Object3D();
waterWheel.name = 'waterWheel';
waterWheel.position.set(0, 3, 0);

// Axle
const axleGeo = new THREE.CylinderGeometry(0.3, 0.3, 1.5, 16);
const axleMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.7 });
const axle = new THREE.Mesh(axleGeo, axleMat);
axle.rotation.x = Math.PI / 2;
axle.castShadow = true;
waterWheel.add(axle);

// Rim rings
const rimGeo = new THREE.TorusGeometry(2.5, 0.1, 8, 32);
const rimMat = new THREE.MeshStandardMaterial({ color: 0x6B3A2A, roughness: 0.6 });
const rim1 = new THREE.Mesh(rimGeo, rimMat);
rim1.position.z = 0.5;
rim1.castShadow = true;
waterWheel.add(rim1);
const rim2 = new THREE.Mesh(rimGeo, rimMat);
rim2.position.z = -0.5;
rim2.castShadow = true;
waterWheel.add(rim2);

// Spokes
for (let i = 0; i < 8; i++) {
  const angle = (i / 8) * Math.PI * 2;
  const spokeGeo = new THREE.CylinderGeometry(0.05, 0.05, 2.2, 6);
  const spokeMat = new THREE.MeshStandardMaterial({ color: 0x7B4B3A });
  const spoke = new THREE.Mesh(spokeGeo, spokeMat);
  spoke.position.set(Math.cos(angle) * 1.25, Math.sin(angle) * 1.25, 0);
  spoke.rotation.z = angle + Math.PI / 2;
  spoke.castShadow = true;
  waterWheel.add(spoke);
}

// Paddles
const paddles = [];
const paddleGeo = new THREE.BoxGeometry(0.8, 0.3, 1.2);
const paddleMat = new THREE.MeshStandardMaterial({ color: 0x5C3317, roughness: 0.8 });

for (let i = 0; i < 8; i++) {
  const angle = (i / 8) * Math.PI * 2;
  const paddle = new THREE.Mesh(paddleGeo, paddleMat);
  paddle.position.set(Math.cos(angle) * 2.5, Math.sin(angle) * 2.5, 0);
  paddle.rotation.z = angle;
  paddle.castShadow = true;
  paddle.receiveShadow = true;
  waterWheel.add(paddle);
  paddles.push({ mesh: paddle, localAngle: angle });
}

scene.add(waterWheel);

// --- Support Posts ---
const postGeo = new THREE.BoxGeometry(0.3, 4, 0.3);
const postMat = new THREE.MeshStandardMaterial({ color: 0x654321, roughness: 0.8 });

const post1 = new THREE.Mesh(postGeo, postMat);
post1.position.set(0, 2, 1.2);
post1.castShadow = true;
scene.add(post1);

const post2 = new THREE.Mesh(postGeo, postMat);
post2.position.set(0, 2, -1.2);
post2.castShadow = true;
scene.add(post2);

// Cross beam
const beamGeo = new THREE.BoxGeometry(0.2, 0.2, 2.8);
const beam = new THREE.Mesh(beamGeo, postMat);
beam.position.set(0, 4.1, 0);
beam.castShadow = true;
scene.add(beam);

// --- Water Channel/Trough (U-shaped) ---
const channelMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.7 });

// Bottom of channel
const chBottomGeo = new THREE.BoxGeometry(6, 0.15, 1.4);
const chBottom = new THREE.Mesh(chBottomGeo, channelMat);
chBottom.position.set(-3.5, 5.5, 0);
chBottom.rotation.z = -0.15;
chBottom.castShadow = true;
chBottom.receiveShadow = true;
scene.add(chBottom);

// Left wall
const chWallGeo = new THREE.BoxGeometry(6, 0.5, 0.15);
const chWallL = new THREE.Mesh(chWallGeo, channelMat);
chWallL.position.set(-3.5, 5.7, 0.65);
chWallL.rotation.z = -0.15;
chWallL.castShadow = true;
scene.add(chWallL);

// Right wall
const chWallR = new THREE.Mesh(chWallGeo, channelMat);
chWallR.position.set(-3.5, 5.7, -0.65);
chWallR.rotation.z = -0.15;
chWallR.castShadow = true;
scene.add(chWallR);

// --- Stream bed on ground ---
const streamGeo = new THREE.PlaneGeometry(8, 2);
const streamMat = new THREE.MeshStandardMaterial({ color: 0x1a5276, roughness: 0.3, transparent: true, opacity: 0.5 });
const stream = new THREE.Mesh(streamGeo, streamMat);
stream.rotation.x = -Math.PI / 2;
stream.position.set(2, 0.02, 0);
scene.add(stream);

// --- Load GLTF Model ---
let helmetModel = null;
const loader = new GLTFLoader();
loader.load(
  '._DamagedHelmet.glb',
  (gltf) => {
    helmetModel = gltf.scene;
    helmetModel.position.set(5, 0.5, 2);
    helmetModel.scale.set(1.5, 1.5, 1.5);
    helmetModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(helmetModel);
    state.helmetLoaded = true;
  },
  undefined,
  (error) => {
    console.warn('Could not load GLTF model, creating placeholder rock:', error);
    // Create a placeholder rock
    const rockGroup = new THREE.Group();
    const rockGeo = new THREE.DodecahedronGeometry(1.2, 1);
    const positions = rockGeo.attributes.position;
    for (let i = 0; i < positions.count; i++) {
      positions.setX(i, positions.getX(i) + (Math.random() - 0.5) * 0.3);
      positions.setY(i, positions.getY(i) + (Math.random() - 0.5) * 0.3);
      positions.setZ(i, positions.getZ(i) + (Math.random() - 0.5) * 0.3);
    }
    rockGeo.computeVertexNormals();
    const rockMat = new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.9, flatShading: true });
    const rock = new THREE.Mesh(rockGeo, rockMat);
    rock.castShadow = true;
    rock.receiveShadow = true;
    rockGroup.add(rock);

    const rock2Geo = new THREE.DodecahedronGeometry(0.7, 1);
    const pos2 = rock2Geo.attributes.position;
    for (let i = 0; i < pos2.count; i++) {
      pos2.setX(i, pos2.getX(i) + (Math.random() - 0.5) * 0.2);
      pos2.setY(i, pos2.getY(i) + (Math.random() - 0.5) * 0.2);
      pos2.setZ(i, pos2.getZ(i) + (Math.random() - 0.5) * 0.2);
    }
    rock2Geo.computeVertexNormals();
    const rock2 = new THREE.Mesh(rock2Geo, rockMat);
    rock2.position.set(0.8, -0.3, 0.5);
    rock2.castShadow = true;
    rockGroup.add(rock2);

    rockGroup.position.set(5, 0.5, 2);
    rockGroup.scale.set(1.5, 1.5, 1.5);
    scene.add(rockGroup);
    helmetModel = rockGroup;
    state.helmetLoaded = true;
  }
);

// --- Particle System ---
const MAX_PARTICLES = 300;
const particleGeo = new THREE.SphereGeometry(0.08, 6, 6);
const particleMat = new THREE.MeshStandardMaterial({
  color: 0x3399ff,
  transparent: true,
  opacity: 0.7,
  roughness: 0.2,
  metalness: 0.1
});

const particles = [];
const particlePool = [];

// Pre-create particle pool
for (let i = 0; i < MAX_PARTICLES; i++) {
  const mesh = new THREE.Mesh(particleGeo, particleMat);
  mesh.visible = false;
  mesh.castShadow = false;
  scene.add(mesh);
  particlePool.push({
    mesh: mesh,
    velocity: new THREE.Vector3(),
    active: false,
    hasCollided: false
  });
}

function spawnParticle() {
  for (let i = 0; i < particlePool.length; i++) {
    const p = particlePool[i];
    if (!p.active) {
      p.active = true;
      p.mesh.visible = true;
      p.mesh.position.set(-6, 7, (Math.random() - 0.5) * 1.0);
      p.velocity.set(3, 0, 0);
      p.hasCollided = false;
      return;
    }
  }
}

function recycleParticle(p) {
  p.active = false;
  p.mesh.visible = false;
  p.hasCollided = false;
}

// --- Raycaster for clicking ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  if (helmetModel) {
    const intersects = raycaster.intersectObject(helmetModel, true);
    if (intersects.length > 0) {
      state.helmetVisible = !state.helmetVisible;
      helmetModel.visible = state.helmetVisible;
    }
  }
});

// --- UI ---
document.getElementById('toggleFlowBtn').addEventListener('click', () => {
  state.flowActive = !state.flowActive;
});

document.getElementById('resetBtn').addEventListener('click', () => {
  state.wheelAngularVelocity = 0;
  state.wheelRotation = 0;
  state.totalRotations = 0;
  state.collisionCount = 0;
  state.forceBurstApplied = false;
  waterWheel.rotation.z = 0;

  for (const p of particlePool) {
    recycleParticle(p);
  }
});

document.addEventListener('keydown', (event) => {
  if (event.key === 'g' || event.key === 'G') {
    state.gravity = state.gravity === -9.8 ? -4.9 : -9.8;
  }
  if (event.key === 'f' || event.key === 'F') {
    state.wheelAngularVelocity = 0.15;
    state.forceBurstApplied = true;
  }
});

// --- HUD ---
const hud = document.getElementById('hud');

function updateHUD() {
  const speed = (state.wheelAngularVelocity * 60).toFixed(2);
  const rotations = state.totalRotations.toFixed(2);
  const activeCount = state.activeParticles;
  const gravLabel = state.gravity === -9.8 ? 'normal' : 'low';
  const flowLabel = state.flowActive ? 'ON' : 'OFF';

  hud.innerHTML =
    `Wheel Speed: ${speed} rad/s<br>` +
    `Rotations: ${rotations}<br>` +
    `Active Particles: ${activeCount}<br>` +
    `Gravity: ${gravLabel}<br>` +
    `Flow: ${flowLabel}`;
}

// --- Animation Loop ---
let lastTime = performance.now();
const tempVec = new THREE.Vector3();
const paddleWorldPos = new THREE.Vector3();

function animate(currentTime) {
  requestAnimationFrame(animate);

  let dt = (currentTime - lastTime) / 1000;
  lastTime = currentTime;
  dt = Math.min(dt, 1 / 60);

  // Spawn particles
  if (state.flowActive) {
    for (let i = 0; i < 2; i++) {
      spawnParticle();
    }
  }

  // Update particles
  let activeCount = 0;
  for (const p of particlePool) {
    if (!p.active) continue;
    activeCount++;

    // Apply gravity
    p.velocity.y += state.gravity * dt;

    // Update position
    p.mesh.position.x += p.velocity.x * dt;
    p.mesh.position.y += p.velocity.y * dt;
    p.mesh.position.z += p.velocity.z * dt;

    // Check collision with paddles
    if (!p.hasCollided) {
      for (const paddle of paddles) {
        paddle.mesh.getWorldPosition(paddleWorldPos);
        const dist = p.mesh.position.distanceTo(paddleWorldPos);
        if (dist < 0.5) {
          // Transfer momentum to wheel
          state.wheelAngularVelocity += 0.002;
          state.collisionCount++;

          // Bounce particle downward
          p.velocity.y = -Math.abs(p.velocity.y) * 0.3 - 1;
          p.velocity.x *= 0.3;
          p.hasCollided = true;
          break;
        }
      }
    }

    // Recycle if below threshold
    if (p.mesh.position.y < -2) {
      recycleParticle(p);
      activeCount--;
    }
  }

  state.activeParticles = activeCount;

  // Update wheel physics
  state.wheelAngularVelocity *= 0.998;
  state.wheelRotation += state.wheelAngularVelocity;
  state.totalRotations = state.wheelRotation / (2 * Math.PI);
  waterWheel.rotation.z = state.wheelRotation;

  // Update HUD
  updateHUD();

  controls.update();
  renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start
requestAnimationFrame(animate);
</script>
</body>
</html>
