<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Water Wheel</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      background: rgba(0, 0, 0, 0.55);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
      min-width: 220px;
    }

    #controls {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
      display: flex;
      gap: 8px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      background: #2b6cb0;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #3b82d6;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Wheel Speed: 0.00 rad/s</div>
    <div>Rotations: 0.00</div>
    <div>Active Particles: 0</div>
    <div>Gravity: normal</div>
    <div>Flow: ON</div>
  </div>

  <div id="controls">
    <button id="toggleFlowBtn">Toggle Flow</button>
    <button id="resetBtn">Reset</button>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87b7e0);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.set(2048, 2048);
    directionalLight.shadow.camera.left = -20;
    directionalLight.shadow.camera.right = 20;
    directionalLight.shadow.camera.top = 20;
    directionalLight.shadow.camera.bottom = -20;
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshStandardMaterial({ color: 0x1e4d2b })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const stream = new THREE.Mesh(
      new THREE.BoxGeometry(12, 0.05, 2),
      new THREE.MeshStandardMaterial({
        color: 0x2255aa,
        transparent: true,
        opacity: 0.55
      })
    );
    stream.position.set(-2.0, 0.03, 0);
    stream.receiveShadow = true;
    scene.add(stream);

    const waterWheel = new THREE.Object3D();
    waterWheel.name = "waterWheel";
    waterWheel.position.set(0, 3, 0);
    scene.add(waterWheel);

    const axle = new THREE.Mesh(
      new THREE.CylinderGeometry(0.3, 0.3, 1.5, 24),
      new THREE.MeshStandardMaterial({ color: 0x7a5c3e, metalness: 0.1, roughness: 0.8 })
    );
    axle.rotation.z = Math.PI / 2;
    axle.castShadow = true;
    axle.receiveShadow = true;
    waterWheel.add(axle);

    const rimMaterial = new THREE.MeshStandardMaterial({ color: 0x6b4f2a, roughness: 0.9 });
    const paddleMaterial = new THREE.MeshStandardMaterial({ color: 0x8a6a40, roughness: 0.85 });

    const paddleGeometry = new THREE.BoxGeometry(0.8, 0.3, 1.2);
    const spokeGeometry = new THREE.BoxGeometry(2.5, 0.08, 0.08);

    const paddles = [];
    const paddleWorldPositions = [];
    const paddleRadius = 2.5;

    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;

      const spoke = new THREE.Mesh(spokeGeometry, rimMaterial);
      spoke.position.set(
        Math.cos(angle) * paddleRadius * 0.5,
        Math.sin(angle) * paddleRadius * 0.5,
        0
      );
      spoke.rotation.z = angle;
      spoke.castShadow = true;
      waterWheel.add(spoke);

      const paddle = new THREE.Mesh(paddleGeometry, paddleMaterial);
      paddle.position.set(
        Math.cos(angle) * paddleRadius,
        Math.sin(angle) * paddleRadius,
        0
      );
      paddle.rotation.z = angle;
      paddle.castShadow = true;
      paddle.receiveShadow = true;
      paddle.userData.baseAngle = angle;
      paddles.push(paddle);
      waterWheel.add(paddle);

      paddleWorldPositions.push(new THREE.Vector3());
    }

    const supportMaterial = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9 });
    const postGeometry = new THREE.BoxGeometry(0.25, 6, 0.25);

    const leftPost = new THREE.Mesh(postGeometry, supportMaterial);
    leftPost.position.set(-0.9, 3, -0.8);
    leftPost.castShadow = true;
    leftPost.receiveShadow = true;
    scene.add(leftPost);

    const rightPost = new THREE.Mesh(postGeometry, supportMaterial);
    rightPost.position.set(0.9, 3, -0.8);
    rightPost.castShadow = true;
    rightPost.receiveShadow = true;
    scene.add(rightPost);

    const crossBeam = new THREE.Mesh(
      new THREE.BoxGeometry(2.2, 0.2, 0.25),
      supportMaterial
    );
    crossBeam.position.set(0, 5.8, -0.8);
    crossBeam.castShadow = true;
    crossBeam.receiveShadow = true;
    scene.add(crossBeam);

    const channelMaterial = new THREE.MeshStandardMaterial({ color: 0x6d6d6d, roughness: 0.95 });

    const channelBottom = new THREE.Mesh(
      new THREE.BoxGeometry(6, 0.2, 1.2),
      channelMaterial
    );
    channelBottom.position.set(-3.2, 6.0, 0);
    channelBottom.rotation.z = -0.28;
    channelBottom.castShadow = true;
    channelBottom.receiveShadow = true;
    scene.add(channelBottom);

    const channelWallL = new THREE.Mesh(
      new THREE.BoxGeometry(6, 0.5, 0.15),
      channelMaterial
    );
    channelWallL.position.set(-3.2, 6.25, -0.52);
    channelWallL.rotation.z = -0.28;
    channelWallL.castShadow = true;
    channelWallL.receiveShadow = true;
    scene.add(channelWallL);

    const channelWallR = new THREE.Mesh(
      new THREE.BoxGeometry(6, 0.5, 0.15),
      channelMaterial
    );
    channelWallR.position.set(-3.2, 6.25, 0.52);
    channelWallR.rotation.z = -0.28;
    channelWallR.castShadow = true;
    channelWallR.receiveShadow = true;
    scene.add(channelWallR);

    let helmetModel = null;
    let helmetLoaded = false;

    const loader = new GLTFLoader();
    loader.load(
      "._DamagedHelmet.glb",
      (gltf) => {
        helmetModel = gltf.scene;
        helmetModel.position.set(5, 0.5, 2);
        helmetModel.scale.set(1.5, 1.5, 1.5);
        helmetModel.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
        scene.add(helmetModel);
        helmetLoaded = true;
      },
      undefined,
      (err) => {
        console.warn("Failed to load ._DamagedHelmet.glb", err);
      }
    );

    const particleGeometry = new THREE.SphereGeometry(0.08, 10, 10);
    const particleMaterial = new THREE.MeshStandardMaterial({
      color: 0x3399ff,
      transparent: true,
      opacity: 0.7
    });

    const particles = [];
    const maxParticles = 300;
    const spawnPerFrame = 2;
    const spawnBase = new THREE.Vector3(-6, 7, 0);

    function randomSpawnPosition() {
      return new THREE.Vector3(
        spawnBase.x,
        spawnBase.y,
        THREE.MathUtils.randFloat(-0.5, 0.5)
      );
    }

    function createParticle() {
      const mesh = new THREE.Mesh(particleGeometry, particleMaterial);
      mesh.castShadow = false;
      mesh.receiveShadow = false;
      mesh.visible = false;
      scene.add(mesh);

      return {
        mesh,
        position: new THREE.Vector3(),
        velocity: new THREE.Vector3(),
        active: false,
        justCollided: false
      };
    }

    for (let i = 0; i < maxParticles; i++) {
      particles.push(createParticle());
    }

    let flowActive = true;
    let gravity = -9.8;
    let wheelAngularVelocity = 0;
    let wheelRotation = 0;
    let collisionCount = 0;
    let forceBurstApplied = false;

    const hud = document.getElementById("hud");
    const toggleFlowBtn = document.getElementById("toggleFlowBtn");
    const resetBtn = document.getElementById("resetBtn");

    window.__3D_STATE__ = {
      wheelAngularVelocity: 0,
      wheelRotation: 0,
      totalRotations: 0,
      activeParticles: 0,
      flowActive: true,
      gravity: -9.8,
      helmetVisible: false,
      helmetLoaded: false,
      collisionCount: 0,
      forceBurstApplied: false
    };

    function recycleParticle(p) {
      const pos = randomSpawnPosition();
      p.position.copy(pos);
      p.velocity.set(3, 0, 0);
      p.mesh.position.copy(p.position);
      p.mesh.visible = true;
      p.active = true;
      p.justCollided = false;
    }

    function deactivateParticle(p) {
      p.active = false;
      p.mesh.visible = false;
      p.justCollided = false;
    }

    function spawnParticles() {
      let spawned = 0;
      for (let i = 0; i < particles.length && spawned < spawnPerFrame; i++) {
        const p = particles[i];
        if (!p.active) {
          recycleParticle(p);
          spawned++;
        }
      }
    }

    function resetSimulation() {
      wheelAngularVelocity = 0;
      wheelRotation = 0;
      waterWheel.rotation.z = 0;
      collisionCount = 0;
      forceBurstApplied = false;

      for (const p of particles) {
        deactivateParticle(p);
      }
    }

    toggleFlowBtn.addEventListener("click", () => {
      flowActive = !flowActive;
    });

    resetBtn.addEventListener("click", () => {
      resetSimulation();
    });

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (key === "g") {
        gravity = gravity === -9.8 ? -4.9 : -9.8;
      } else if (key === "f") {
        wheelAngularVelocity = 0.15;
        forceBurstApplied = true;
      }
    });

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    window.addEventListener("click", (event) => {
      if (!helmetLoaded || !helmetModel) return;

      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(helmetModel, true);
      if (intersects.length > 0) {
        helmetModel.visible = !helmetModel.visible;
      }
    });

    function updateHUD() {
      const activeCount = particles.reduce((sum, p) => sum + (p.active ? 1 : 0), 0);
      const gravityLabel = gravity === -9.8 ? "normal" : "low";
      const totalRotations = wheelRotation / (2 * Math.PI);

      hud.innerHTML = `
        <div>Wheel Speed: ${(wheelAngularVelocity * 60).toFixed(2)} rad/s</div>
        <div>Rotations: ${totalRotations.toFixed(2)}</div>
        <div>Active Particles: ${activeCount}</div>
        <div>Gravity: ${gravityLabel}</div>
        <div>Flow: ${flowActive ? "ON" : "OFF"}</div>
      `;

      window.__3D_STATE__.wheelAngularVelocity = wheelAngularVelocity;
      window.__3D_STATE__.wheelRotation = wheelRotation;
      window.__3D_STATE__.totalRotations = totalRotations;
      window.__3D_STATE__.activeParticles = activeCount;
      window.__3D_STATE__.flowActive = flowActive;
      window.__3D_STATE__.gravity = gravity;
      window.__3D_STATE__.helmetVisible = helmetModel ? helmetModel.visible : false;
      window.__3D_STATE__.helmetLoaded = helmetLoaded;
      window.__3D_STATE__.collisionCount = collisionCount;
      window.__3D_STATE__.forceBurstApplied = forceBurstApplied;
    }

    function updatePaddleWorldPositions() {
      for (let i = 0; i < paddles.length; i++) {
        paddles[i].getWorldPosition(paddleWorldPositions[i]);
      }
    }

    function handleParticleCollisions(p) {
      for (let i = 0; i < paddleWorldPositions.length; i++) {
        const paddlePos = paddleWorldPositions[i];
        const dx = p.position.x - paddlePos.x;
        const dy = p.position.y - paddlePos.y;
        const dz = p.position.z - paddlePos.z;

        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
        if (dist < 0.5 && !p.justCollided) {
          wheelAngularVelocity += 0.002;
          collisionCount++;

          p.velocity.y = -Math.abs(p.velocity.y) - 1.5;
          p.velocity.x *= 0.8;
          p.justCollided = true;
          return;
        }
      }

      if (p.justCollided) {
        let nearest = Infinity;
        for (let i = 0; i < paddleWorldPositions.length; i++) {
          const d = p.position.distanceTo(paddleWorldPositions[i]);
          nearest = Math.min(nearest, d);
        }
        if (nearest > 0.7) p.justCollided = false;
      }
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 1 / 60);

      if (flowActive) {
        spawnParticles();
      }

      updatePaddleWorldPositions();

      for (const p of particles) {
        if (!p.active) continue;

        p.velocity.y += gravity * dt;
        p.position.x += p.velocity.x * dt;
        p.position.y += p.velocity.y * dt;
        p.position.z += p.velocity.z * dt;

        handleParticleCollisions(p);

        if (p.position.y < -2) {
          recycleParticle(p);
        }

        p.mesh.position.copy(p.position);
      }

      wheelAngularVelocity *= 0.998;
      wheelRotation += wheelAngularVelocity;
      waterWheel.rotation.z = wheelRotation;

      updateHUD();
      renderer.render(scene, camera);
    }

    resetSimulation();
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
