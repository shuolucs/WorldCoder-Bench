<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Water Wheel Scene</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Sky blue fallback */
            font-family: monospace;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 15px;
            border-radius: 5px;
            pointer-events: none;
            user-select: none;
            min-width: 200px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 8px;
        }
        button {
            padding: 8px 16px;
            font-family: monospace;
            font-size: 14px;
            cursor: pointer;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
        }
        button:hover {
            background: #555;
        }
        .instructions {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            text-align: right;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div id="hud-speed">Wheel Speed: 0.00 rad/s</div>
        <div id="hud-rotations">Rotations: 0.00</div>
        <div id="hud-particles">Active Particles: 0</div>
        <div id="hud-gravity">Gravity: normal</div>
        <div id="hud-flow">Flow: ON</div>
    </div>

    <div class="instructions">
        Controls:<br>
        [G] Toggle Gravity<br>
        [F] Force Burst<br>
        Click Helmet to Toggle Visibility
    </div>

    <div id="controls">
        <button id="toggleFlowBtn">Toggle Flow</button>
        <button id="resetBtn">Reset</button>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            wheelAngularVelocity: 0,
            wheelRotation: 0,
            totalRotations: 0,
            activeParticles: 0,
            flowActive: true,
            gravity: -9.8,
            helmetVisible: true,
            helmetLoaded: false,
            collisionCount: 0,
            forceBurstApplied: false
        };
        const state = window.__3D_STATE__;

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 10, 40);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // --- GROUND ---
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d4c1e });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- WATER WHEEL ---
        const waterWheel = new THREE.Group();
        waterWheel.position.set(0, 3, 0);
        scene.add(waterWheel);

        const woodMat = new THREE.MeshStandardMaterial({ color: 0x5c4033 });
        
        // Axle
        const axleGeo = new THREE.CylinderGeometry(0.3, 0.3, 1.5, 16);
        const axle = new THREE.Mesh(axleGeo, woodMat);
        axle.rotation.x = Math.PI / 2;
        axle.castShadow = true;
        axle.receiveShadow = true;
        waterWheel.add(axle);

        // Paddles
        const paddleGeo = new THREE.BoxGeometry(0.8, 0.3, 1.2);
        const paddles = [];
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const paddle = new THREE.Mesh(paddleGeo, woodMat);
            paddle.position.set(Math.cos(angle) * 2.5, Math.sin(angle) * 2.5, 0);
            paddle.rotation.z = angle;
            paddle.castShadow = true;
            paddle.receiveShadow = true;
            waterWheel.add(paddle);
            paddles.push(paddle);
        }

        // Supports
        const supportGeo = new THREE.BoxGeometry(0.4, 4, 0.4);
        const supportMat = new THREE.MeshStandardMaterial({ color: 0x3e2723 });
        const support1 = new THREE.Mesh(supportGeo, supportMat);
        support1.position.set(0, 2, 1);
        support1.castShadow = true;
        support1.receiveShadow = true;
        scene.add(support1);
        
        const support2 = new THREE.Mesh(supportGeo, supportMat);
        support2.position.set(0, 2, -1);
        support2.castShadow = true;
        support2.receiveShadow = true;
        scene.add(support2);

        // --- CHANNEL / TROUGH ---
        const channelGroup = new THREE.Group();
        channelGroup.position.set(-4, 6, 0);
        channelGroup.rotation.z = -0.1; // slight downward angle
        scene.add(channelGroup);

        const channelBaseGeo = new THREE.BoxGeometry(5, 0.2, 1.5);
        const channelSideGeo = new THREE.BoxGeometry(5, 0.6, 0.2);
        const channelMat = new THREE.MeshStandardMaterial({ color: 0x795548 });

        const cBase = new THREE.Mesh(channelBaseGeo, channelMat);
        cBase.castShadow = true;
        cBase.receiveShadow = true;
        channelGroup.add(cBase);

        const cSide1 = new THREE.Mesh(channelSideGeo, channelMat);
        cSide1.position.set(0, 0.4, 0.65);
        cSide1.castShadow = true;
        channelGroup.add(cSide1);

        const cSide2 = new THREE.Mesh(channelSideGeo, channelMat);
        cSide2.position.set(0, 0.4, -0.65);
        cSide2.castShadow = true;
        channelGroup.add(cSide2);

        // --- GLTF MODEL (HELMET/ROCK) ---
        let helmetModel = null;
        const loader = new GLTFLoader();
        loader.load('._DamagedHelmet.glb', (gltf) => {
            helmetModel = gltf.scene;
            helmetModel.position.set(5, 0.5, 2);
            helmetModel.scale.set(1.5, 1.5, 1.5);
            
            helmetModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            scene.add(helmetModel);
            state.helmetLoaded = true;
        }, undefined, (error) => {
            console.warn("Could not load ._DamagedHelmet.glb. Ensure the file exists in the same directory.", error);
        });

        // --- PARTICLE SYSTEM ---
        const MAX_PARTICLES = 300;
        const particles = [];
        const particleGeo = new THREE.SphereGeometry(0.08, 8, 8);
        const particleMat = new THREE.MeshStandardMaterial({ 
            color: 0x3399ff, 
            transparent: true, 
            opacity: 0.7,
            roughness: 0.1,
            metalness: 0.1
        });

        for (let i = 0; i < MAX_PARTICLES; i++) {
            const mesh = new THREE.Mesh(particleGeo, particleMat);
            mesh.visible = false;
            mesh.castShadow = true;
            scene.add(mesh);
            particles.push({
                mesh: mesh,
                velocity: new THREE.Vector3(),
                active: false
            });
        }

        // --- INTERACTIONS ---
        document.getElementById('toggleFlowBtn').addEventListener('click', () => {
            state.flowActive = !state.flowActive;
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            state.wheelAngularVelocity = 0;
            state.wheelRotation = 0;
            state.totalRotations = 0;
            state.collisionCount = 0;
            state.forceBurstApplied = false;
            waterWheel.rotation.z = 0;
            
            particles.forEach(p => {
                p.active = false;
                p.mesh.visible = false;
            });
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'g') {
                state.gravity = state.gravity === -9.8 ? -4.9 : -9.8;
            }
            if (e.key.toLowerCase() === 'f') {
                state.wheelAngularVelocity = 0.15;
                state.forceBurstApplied = true;
            }
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        window.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            if (helmetModel) {
                const intersects = raycaster.intersectObject(helmetModel, true);
                if (intersects.length > 0) {
                    state.helmetVisible = !state.helmetVisible;
                    helmetModel.visible = state.helmetVisible;
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- HUD ELEMENTS ---
        const hudSpeed = document.getElementById('hud-speed');
        const hudRotations = document.getElementById('hud-rotations');
        const hudParticles = document.getElementById('hud-particles');
        const hudGravity = document.getElementById('hud-gravity');
        const hudFlow = document.getElementById('hud-flow');

        // --- ANIMATION LOOP ---
        let lastTime = performance.now();
        const paddleWorldPos = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            
            const now = performance.now();
            let dt = (now - lastTime) / 1000;
            if (dt > 1/60) dt = 1/60; // Cap dt
            lastTime = now;

            // Spawn Particles
            if (state.flowActive) {
                let spawned = 0;
                for (let i = 0; i < MAX_PARTICLES; i++) {
                    const p = particles[i];
                    if (!p.active) {
                        p.active = true;
                        p.mesh.visible = true;
                        p.mesh.position.set(-6, 7, (Math.random() - 0.5));
                        p.velocity.set(3, 0, 0);
                        spawned++;
                        if (spawned >= 2) break; // 2 per frame
                    }
                }
            }

            // Update Particles & Physics
            let activeCount = 0;
            for (let i = 0; i < MAX_PARTICLES; i++) {
                const p = particles[i];
                if (p.active) {
                    activeCount++;
                    
                    // Projectile motion
                    p.velocity.y += state.gravity * dt;
                    p.mesh.position.addScaledVector(p.velocity, dt);

                    // Collision with paddles
                    let collided = false;
                    for (let j = 0; j < paddles.length; j++) {
                        paddles[j].getWorldPosition(paddleWorldPos);
                        // Simple distance check to paddle center
                        if (p.mesh.position.distanceTo(paddleWorldPos) < 0.5) {
                            state.wheelAngularVelocity += 0.002;
                            state.collisionCount++;
                            
                            // Bounce
                            p.velocity.y = -Math.abs(p.velocity.y) * 0.3;
                            p.velocity.x *= 0.5;
                            p.mesh.position.y -= 0.1; // Prevent sticking
                            
                            collided = true;
                            break;
                        }
                    }

                    // Recycle
                    if (p.mesh.position.y < -2) {
                        p.active = false;
                        p.mesh.visible = false;
                    }
                }
            }
            state.activeParticles = activeCount;

            // Wheel Physics
            state.wheelAngularVelocity *= 0.998; // Friction
            state.wheelRotation += state.wheelAngularVelocity;
            state.totalRotations = state.wheelRotation / (Math.PI * 2);
            
            // Apply rotation (negative Z for clockwise rotation when viewed from front)
            waterWheel.rotation.z = -state.wheelRotation;

            // Update HUD
            hudSpeed.textContent = `Wheel Speed: ${(state.wheelAngularVelocity * 60).toFixed(2)} rad/s`;
            hudRotations.textContent = `Rotations: ${state.totalRotations.toFixed(2)}`;
            hudParticles.textContent = `Active Particles: ${state.activeParticles}`;
            hudGravity.textContent = `Gravity: ${state.gravity === -9.8 ? 'normal' : 'low'}`;
            hudFlow.textContent = `Flow: ${state.flowActive ? 'ON' : 'OFF'}`;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
