<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Rhythm Game Diorama</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    color: white;
    font-size: 2em;
    text-shadow: 0 0 20px rgba(255,255,255,0.5);
}

#overlay h1 { font-size: 1.5em; margin-bottom: 20px; }

#startButton, #resetButton, #speedUpButton, #speedDownButton {
    padding: 12px 30px;
    font-size: 0.6em;
    border: 2px solid white;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    border-radius: 8px;
    margin: 5px;
    transition: all 0.3s;
}

#startButton:hover, #resetButton:hover, #speedUpButton:hover, #speedDownButton:hover {
    background: rgba(255,255,255,0.3);
}

.button-row { display: flex; gap: 10px; margin-top: 10px; }

#hud {
    position: fixed;
    top: 10px; left: 10px;
    z-index: 50;
    color: white;
    font-size: 16px;
    pointer-events: none;
}

#hud div { margin: 4px 0; text-shadow: 0 0 5px rgba(0,0,0,0.8); }

#scoreDisplay { font-size: 28px; font-weight: bold; color: #ffd700; }
#comboDisplay { font-size: 22px; color: #ff6b6b; }
#multiplierDisplay { font-size: 18px; color: #4ecdc4; }
#accuracyDisplay { font-size: 16px; color: #a8e6cf; }

#judgmentDisplay {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: bold;
    color: white;
    z-index: 50;
    pointer-events: none;
    text-shadow: 0 0 20px rgba(255,255,255,0.8);
    opacity: 0;
    transition: opacity 0.1s;
}

#progressBarContainer {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
    z-index: 50;
    overflow: hidden;
}

#progressBar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff6b6b, #ffd700, #4ecdc4);
    border-radius: 4px;
    transition: width 0.1s;
}

#controlsHint {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    z-index: 50;
    pointer-events: none;
}

#speedDisplay {
    position: fixed;
    top: 10px;
    right: 10px;
    color: white;
    font-size: 16px;
    z-index: 50;
    pointer-events: none;
}

#resultsOverlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    color: white;
}

#resultsOverlay h1 { font-size: 3em; margin-bottom: 10px; }
#resultsOverlay .grade { font-size: 6em; font-weight: bold; margin: 10px 0; }
#resultsOverlay .stats { font-size: 1.3em; line-height: 2; text-align: center; }
#resultsOverlay .grade.S { color: #ffd700; text-shadow: 0 0 30px #ffd700; }
#resultsOverlay .grade.A { color: #4ecdc4; text-shadow: 0 0 30px #4ecdc4; }
#resultsOverlay .grade.B { color: #a8e6cf; text-shadow: 0 0 20px #a8e6cf; }
#resultsOverlay .grade.C { color: #ff6b6b; text-shadow: 0 0 20px #ff6b6b; }
#resultsOverlay .grade.D { color: #888; text-shadow: 0 0 10px #888; }

.key-indicators {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    z-index: 50;
    pointer-events: none;
}

.key-ind {
    width: 50px;
    height: 50px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
    color: rgba(255,255,255,0.5);
    transition: all 0.1s;
}

.key-ind.active {
    background: rgba(255,255,255,0.3);
    color: white;
    border-color: white;
    box-shadow: 0 0 15px rgba(255,255,255,0.5);
}

#pauseOverlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.5);
    z-index: 150;
    color: white;
    font-size: 3em;
    text-shadow: 0 0 20px rgba(255,255,255,0.5);
}
</style>
</head>
<body>

<div id="overlay">
    <h1>🎵 3D Rhythm Game 🎵</h1>
    <p style="font-size:0.5em; margin-bottom:20px; opacity:0.7;">Keys: D F J K | Space: Pause</p>
    <button id="startButton">START</button>
    <div class="button-row">
        <button id="speedDownButton">Speed -</button>
        <button id="speedUpButton">Speed +</button>
        <button id="resetButton">Reset</button>
    </div>
</div>

<div id="hud">
    <div id="scoreDisplay">0</div>
    <div id="comboDisplay">Combo: 0</div>
    <div id="multiplierDisplay">x1</div>
    <div id="accuracyDisplay">100.0%</div>
</div>

<div id="judgmentDisplay"></div>

<div id="speedDisplay">Speed: 5</div>

<div id="progressBarContainer">
    <div id="progressBar"></div>
</div>

<div id="controlsHint">D F J K — Space to Pause</div>

<div class="key-indicators">
    <div class="key-ind" id="key-d" style="border-color: rgba(255,100,100,0.5);">D</div>
    <div class="key-ind" id="key-f" style="border-color: rgba(100,100,255,0.5);">F</div>
    <div class="key-ind" id="key-j" style="border-color: rgba(100,255,100,0.5);">J</div>
    <div class="key-ind" id="key-k" style="border-color: rgba(255,255,100,0.5);">K</div>
</div>

<div id="pauseOverlay">PAUSED</div>

<div id="resultsOverlay">
    <h1>Results</h1>
    <div class="grade" id="gradeDisplay">S</div>
    <div class="stats" id="statsDisplay"></div>
    <div class="button-row" style="margin-top:20px;">
        <button id="resetButton2" style="padding:12px 30px;font-size:1em;border:2px solid white;background:rgba(255,255,255,0.1);color:white;cursor:pointer;border-radius:8px;">Play Again</button>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
const state = {
    gameState: 'idle',
    score: 0,
    combo: 0,
    maxCombo: 0,
    multiplier: 1,
    noteSpeed: 5,
    totalNotes: 20,
    notesHit: 0,
    notesMissed: 0,
    perfects: 0,
    greats: 0,
    goods: 0,
    accuracy: 100,
    activeNotes: 0,
    helmetLoaded: false,
    helmetRotationY: 0,
    songProgress: 0,
    lastJudgment: 'none',
    isPaused: false,
    grade: 'none',
    particlesActive: 0,
    notesProcessed: 0
};
window.__3D_STATE__ = state;

// ============ SONG PATTERN ============
const songPattern = [
    {time: 0.5, lane: 0}, {time: 1.0, lane: 1}, {time: 1.5, lane: 2}, {time: 2.0, lane: 3},
    {time: 2.5, lane: 0}, {time: 3.0, lane: 1}, {time: 3.0, lane: 3}, {time: 3.5, lane: 2},
    {time: 4.0, lane: 0}, {time: 4.0, lane: 2}, {time: 4.5, lane: 1}, {time: 5.0, lane: 3},
    {time: 5.5, lane: 0}, {time: 5.5, lane: 1}, {time: 6.0, lane: 2}, {time: 6.0, lane: 3},
    {time: 6.5, lane: 1}, {time: 7.0, lane: 0}, {time: 7.5, lane: 2}, {time: 8.0, lane: 3}
];

const laneColors = [0xff4444, 0x4444ff, 0x44ff44, 0xffff44];
const laneColorNames = ['#ff4444', '#4444ff', '#44ff44', '#ffff44'];
const laneXPositions = [-1.8, -0.6, 0.6, 1.8];
const laneKeys = ['d', 'f', 'j', 'k'];

// ============ THREE.JS SETUP ============
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3e, roughness: 0.8, metalness: 0.2 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Side walls for diorama feel
const wallMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.9 });
const wallGeo = new THREE.BoxGeometry(0.3, 3, 20);
const leftWall = new THREE.Mesh(wallGeo, wallMat);
leftWall.position.set(-10, 1.5, 0);
scene.add(leftWall);
const rightWall = new THREE.Mesh(wallGeo, wallMat);
rightWall.position.set(10, 1.5, 0);
scene.add(rightWall);

// ============ LANE STRIPS ============
const laneStrips = [];
const laneMaterials = [];
for (let i = 0; i < 4; i++) {
    const stripGeo = new THREE.PlaneGeometry(1.2, 20);
    const stripMat = new THREE.MeshStandardMaterial({
        color: laneColors[i],
        transparent: true,
        opacity: 0.15,
        emissive: laneColors[i],
        emissiveIntensity: 0.1,
        roughness: 0.5
    });
    laneMaterials.push(stripMat);
    const strip = new THREE.Mesh(stripGeo, stripMat);
    strip.rotation.x = -Math.PI / 2;
    strip.position.set(laneXPositions[i], 0.05, 5);
    scene.add(strip);
    laneStrips.push(strip);
}

// Lane brightness tracking
const laneBrightness = [0, 0, 0, 0];

// ============ HIT ZONE ============
const hitZoneGeo = new THREE.BoxGeometry(5.4, 0.15, 0.3);
const hitZoneMat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    emissive: 0xffffff,
    emissiveIntensity: 0.8,
    transparent: true,
    opacity: 0.6,
    roughness: 0.2
});
const hitZone = new THREE.Mesh(hitZoneGeo, hitZoneMat);
hitZone.position.set(0, 0.1, 2);
scene.add(hitZone);

// Hit zone glow
const hitZoneGlowGeo = new THREE.BoxGeometry(5.6, 0.05, 0.6);
const hitZoneGlowMat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    emissive: 0xffffff,
    emissiveIntensity: 0.3,
    transparent: true,
    opacity: 0.2
});
const hitZoneGlow = new THREE.Mesh(hitZoneGlowGeo, hitZoneGlowMat);
hitZoneGlow.position.set(0, 0.08, 2);
scene.add(hitZoneGlow);

// ============ HELMET ============
let helmet = null;
const loader = new GLTFLoader();

// Try loading the helmet - use DamagedHelmet from various sources
const helmetURLs = [
    '._DamagedHelmet.glb',
    'DamagedHelmet.glb',
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb'
];

function tryLoadHelmet(index) {
    if (index >= helmetURLs.length) {
        // Create a fallback decorative object
        createFallbackHelmet();
        return;
    }
    loader.load(helmetURLs[index],
        (gltf) => {
            helmet = gltf.scene;
            helmet.position.set(0, 1.5, -6);
            helmet.scale.set(1.5, 1.5, 1.5);
            helmet.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(helmet);
            state.helmetLoaded = true;
        },
        undefined,
        () => tryLoadHelmet(index + 1)
    );
}

function createFallbackHelmet() {
    // Create a decorative sphere/torus knot as fallback
    const group = new THREE.Group();
    
    const knotGeo = new THREE.TorusKnotGeometry(0.8, 0.3, 100, 16);
    const knotMat = new THREE.MeshStandardMaterial({
        color: 0x8844aa,
        emissive: 0x4422aa,
        emissiveIntensity: 0.3,
        metalness: 0.8,
        roughness: 0.2
    });
    const knot = new THREE.Mesh(knotGeo, knotMat);
    knot.castShadow = true;
    group.add(knot);

    // Add a pedestal
    const pedGeo = new THREE.CylinderGeometry(1.2, 1.5, 0.5, 32);
    const pedMat = new THREE.MeshStandardMaterial({ color: 0x333355, metalness: 0.5, roughness: 0.3 });
    const pedestal = new THREE.Mesh(pedGeo, pedMat);
    pedestal.position.y = -1.2;
    pedestal.castShadow = true;
    group.add(pedestal);

    group.position.set(0, 1.5, -6);
    group.scale.set(1.5, 1.5, 1.5);
    scene.add(group);
    helmet = group;
    state.helmetLoaded = true;
}

tryLoadHelmet(0);

// ============ DECORATIVE ELEMENTS ============
// Small lights along the track
for (let z = -4; z <= 14; z += 2) {
    for (let side of [-3.5, 3.5]) {
        const lightGeo = new THREE.SphereGeometry(0.08, 8, 8);
        const lightMat = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            emissive: 0xaaaaff,
            emissiveIntensity: 0.5
        });
        const lightMesh = new THREE.Mesh(lightGeo, lightMat);
        lightMesh.position.set(side, 0.1, z);
        scene.add(lightMesh);
    }
}

// Stage platform
const stageGeo = new THREE.CylinderGeometry(2.5, 3, 0.3, 32);
const stageMat = new THREE.MeshStandardMaterial({ color: 0x3a3a5e, metalness: 0.3, roughness: 0.5 });
const stage = new THREE.Mesh(stageGeo, stageMat);
stage.position.set(0, 0.15, -6);
stage.receiveShadow = true;
scene.add(stage);

// ============ NOTE MANAGEMENT ============
let activeNotes = [];
let particleSystems = [];
let gameTime = 0;
let nextNoteIndex = 0;
let judgmentTimeout = null;

const noteGeometry = new THREE.BoxGeometry(1.0, 0.3, 0.8);

function createNoteMesh(lane) {
    const mat = new THREE.MeshStandardMaterial({
        color: laneColors[lane],
        emissive: laneColors[lane],
        emissiveIntensity: 0.4,
        metalness: 0.3,
        roughness: 0.4
    });
    const mesh = new THREE.Mesh(noteGeometry, mat);
    mesh.castShadow = true;
    return mesh;
}

function spawnNote(lane, time) {
    const mesh = createNoteMesh(lane);
    mesh.position.set(laneXPositions[lane], 0.3, 15);
    scene.add(mesh);
    activeNotes.push({
        mesh,
        lane,
        spawnTime: time,
        hit: false,
        missed: false
    });
}

function removeNote(noteObj) {
    scene.remove(noteObj.mesh);
    noteObj.mesh.geometry.dispose && noteObj.mesh.geometry.dispose();
    noteObj.mesh.material.dispose && noteObj.mesh.material.dispose();
}

// ============ PARTICLES ============
function createParticleBurst(position, color) {
    const count = 8 + Math.floor(Math.random() * 5);
    const particles = [];
    const group = new THREE.Group();
    
    for (let i = 0; i < count; i++) {
        const size = 0.05 + Math.random() * 0.08;
        const geo = new THREE.SphereGeometry(size, 6, 6);
        const mat = new THREE.MeshStandardMaterial({
            color: color,
            emissive: color,
            emissiveIntensity: 1.0,
            transparent: true,
            opacity: 1.0
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(position);
        
        const angle = Math.random() * Math.PI * 2;
        const upAngle = Math.random() * Math.PI * 0.5;
        const speed = 2 + Math.random() * 4;
        
        particles.push({
            mesh,
            velocity: new THREE.Vector3(
                Math.cos(angle) * Math.cos(upAngle) * speed,
                Math.sin(upAngle) * speed + 2,
                Math.sin(angle) * Math.cos(upAngle) * speed
            ),
            life: 0.3
        });
        group.add(mesh);
    }
    
    scene.add(group);
    particleSystems.push({ group, particles, elapsed: 0, maxLife: 0.3 });
}

function updateParticles(dt) {
    for (let i = particleSystems.length - 1; i >= 0; i--) {
        const ps = particleSystems[i];
        ps.elapsed += dt;
        
        if (ps.elapsed >= ps.maxLife) {
            ps.particles.forEach(p => {
                p.mesh.geometry.dispose();
                p.mesh.material.dispose();
            });
            scene.remove(ps.group);
            particleSystems.splice(i, 1);
            continue;
        }
        
        const t = ps.elapsed / ps.maxLife;
        ps.particles.forEach(p => {
            p.mesh.position.x += p.velocity.x * dt;
            p.mesh.position.y += p.velocity.y * dt;
            p.mesh.position.z += p.velocity.z * dt;
            p.velocity.y -= 9.8 * dt;
            p.mesh.material.opacity = 1.0 - t;
            const s = 1.0 - t * 0.5;
            p.mesh.scale.set(s, s, s);
        });
    }
    state.particlesActive = particleSystems.length;
}

// ============ SCORING ============
function getJudgmentColor(judgment) {
    switch(judgment) {
        case 'Perfect': return 0xffd700;
        case 'Great': return 0xc0c0c0;
        case 'Good': return 0xcd7f32;
        default: return 0xff0000;
    }
}

function updateMultiplier() {
    if (state.combo >= 30) state.multiplier = 4;
    else if (state.combo >= 20) state.multiplier = 3;
    else if (state.combo >= 10) state.multiplier = 2;
    else state.multiplier = 1;
}

function updateAccuracy() {
    const processed = state.notesHit + state.notesMissed;
    if (processed === 0) {
        state.accuracy = 100;
    } else {
        state.accuracy = Math.round((state.notesHit / processed) * 1000) / 10;
    }
}

function showJudgment(text, color) {
    const el = document.getElementById('judgmentDisplay');
    el.textContent = text;
    el.style.color = color;
    el.style.opacity = '1';
    el.style.transform = 'translate(-50%, -50%) scale(1.2)';
    
    if (judgmentTimeout) clearTimeout(judgmentTimeout);
    
    setTimeout(() => {
        el.style.transform = 'translate(-50%, -50%) scale(1)';
    }, 50);
    
    judgmentTimeout = setTimeout(() => {
        el.style.opacity = '0';
    }, 400);
}

function hitNote(lane) {
    if (state.gameState !== 'playing') return;
    
    // Brighten lane
    laneBrightness[lane] = 1.0;
    
    // Find closest hittable note in lane
    let bestNote = null;
    let bestDist = Infinity;
    
    for (const note of activeNotes) {
        if (note.lane !== lane || note.hit || note.missed) continue;
        const z = note.mesh.position.z;
        if (z >= 1.0 && z <= 3.0) {
            const dist = Math.abs(z - 2.0);
            if (dist < bestDist) {
                bestDist = dist;
                bestNote = note;
            }
        }
    }
    
    if (!bestNote) return;
    
    const dz = Math.abs(bestNote.mesh.position.z - 2.0);
    let judgment, points;
    
    if (dz < 0.4) {
        judgment = 'Perfect';
        points = 100;
        state.perfects++;
    } else if (dz < 0.8) {
        judgment = 'Great';
        points = 75;
        state.greats++;
    } else if (dz < 1.0) {
        judgment = 'Good';
        points = 50;
        state.goods++;
    } else {
        return; // shouldn't happen due to hittable check
    }
    
    bestNote.hit = true;
    state.notesHit++;
    state.notesProcessed = state.notesHit + state.notesMissed;
    state.combo++;
    if (state.combo > state.maxCombo) state.maxCombo = state.combo;
    updateMultiplier();
    state.score += points * state.multiplier;
    state.lastJudgment = judgment;
    updateAccuracy();
    
    // Visual feedback
    const particleColor = getJudgmentColor(judgment);
    createParticleBurst(bestNote.mesh.position.clone(), particleColor);
    
    const colorMap = { 'Perfect': '#ffd700', 'Great': '#c0c0c0', 'Good': '#cd7f32' };
    showJudgment(judgment, colorMap[judgment]);
    
    removeNote(bestNote);
}

function missNote(noteObj) {
    noteObj.missed = true;
    state.notesMissed++;
    state.notesProcessed = state.notesHit + state.notesMissed;
    state.combo = 0;
    updateMultiplier();
    state.lastJudgment = 'Miss';
    updateAccuracy();
    showJudgment('Miss', '#ff4444');
    removeNote(noteObj);
}

// ============ GAME CONTROL ============
function startGame() {
    resetGameState();
    state.gameState = 'playing';
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('resultsOverlay').style.display = 'none';
    gameTime = 0;
    nextNoteIndex = 0;
}

function resetGameState() {
    // Remove all active notes
    activeNotes.forEach(n => removeNote(n));
    activeNotes = [];
    
    // Remove particles
    particleSystems.forEach(ps => {
        ps.particles.forEach(p => {
            p.mesh.geometry.dispose();
            p.mesh.material.dispose();
        });
        scene.remove(ps.group);
    });
    particleSystems = [];
    
    state.gameState = 'idle';
    state.score = 0;
    state.combo = 0;
    state.maxCombo = 0;
    state.multiplier = 1;
    state.notesHit = 0;
    state.notesMissed = 0;
    state.perfects = 0;
    state.greats = 0;
    state.goods = 0;
    state.accuracy = 100;
    state.activeNotes = 0;
    state.songProgress = 0;
    state.lastJudgment = 'none';
    state.isPaused = false;
    state.grade = 'none';
    state.particlesActive = 0;
    state.notesProcessed = 0;
    
    gameTime = 0;
    nextNoteIndex = 0;
    
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('resultsOverlay').style.display = 'none';
    document.getElementById('pauseOverlay').style.display = 'none';
}

function togglePause() {
    if (state.gameState === 'playing') {
        state.gameState = 'paused';
        state.isPaused = true;
        document.getElementById('pauseOverlay').style.display = 'flex';
    } else if (state.gameState === 'paused') {
        state.gameState = 'playing';
        state.isPaused = false;
        document.getElementById('pauseOverlay').style.display = 'none';
    }
}

function showResults() {
    state.gameState = 'finished';
    
    const acc = state.accuracy;
    let grade;
    if (acc >= 95) grade = 'S';
    else if (acc >= 85) grade = 'A';
    else if (acc >= 75) grade = 'B';
    else if (acc >= 60) grade = 'C';
    else grade = 'D';
    
    state.grade = grade;
    
    const gradeEl = document.getElementById('gradeDisplay');
    gradeEl.textContent = grade;
    gradeEl.className = 'grade ' + grade;
    
    document.getElementById('statsDisplay').innerHTML = `
        Score: ${state.score}<br>
        Max Combo: ${state.maxCombo}<br>
        Accuracy: ${state.accuracy}%<br>
        Perfect: ${state.perfects} | Great: ${state.greats} | Good: ${state.goods}<br>
        Missed: ${state.notesMissed}
    `;
    
    document.getElementById('resultsOverlay').style.display = 'flex';
}

// ============ UI UPDATES ============
function updateUI() {
    document.getElementById('scoreDisplay').textContent = state.score;
    document.getElementById('comboDisplay').textContent = `Combo: ${state.combo}`;
    document.getElementById('multiplierDisplay').textContent = `x${state.multiplier}`;
    document.getElementById('accuracyDisplay').textContent = `${state.accuracy}%`;
    document.getElementById('progressBar').style.width = `${state.songProgress}%`;
    document.getElementById('speedDisplay').textContent = `Speed: ${state.noteSpeed}`;
}

// ============ EVENT LISTENERS ============
document.getElementById('startButton').addEventListener('click', startGame);
document.getElementById('resetButton').addEventListener('click', resetGameState);
document.getElementById('resetButton2').addEventListener('click', resetGameState);

document.getElementById('speedUpButton').addEventListener('click', () => {
    state.noteSpeed = Math.min(10, state.noteSpeed + 1);
});

document.getElementById('speedDownButton').addEventListener('click', () => {
    state.noteSpeed = Math.max(2, state.noteSpeed - 1);
});

const keyIndicators = {
    'd': document.getElementById('key-d'),
    'f': document.getElementById('key-f'),
    'j': document.getElementById('key-j'),
    'k': document.getElementById('key-k')
};

document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    
    if (key === ' ') {
        e.preventDefault();
        togglePause();
        return;
    }
    
    const laneIndex = laneKeys.indexOf(key);
    if (laneIndex !== -1) {
        e.preventDefault();
        if (keyIndicators[key]) keyIndicators[key].classList.add('active');
        hitNote(laneIndex);
        laneBrightness[laneIndex] = 1.0;
    }
});

document.addEventListener('keyup', (e) => {
    const key = e.key.toLowerCase();
    if (keyIndicators[key]) keyIndicators[key].classList.remove('active');
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();
let lastTime = 0;

// Calculate the last note time for song duration
const songDuration = songPattern[songPattern.length - 1].time + 3; // extra time after last note

function animate() {
    requestAnimationFrame(animate);
    
    const dt = Math.min(clock.getDelta(), 0.05);
    const elapsed = clock.getElapsedTime();
    
    // Helmet animation
    if (helmet) {
        helmet.rotation.y += 0.3 * dt;
        state.helmetRotationY = helmet.rotation.y;
        helmet.position.y = 1.5 + Math.sin(elapsed * Math.PI) * 0.2;
    }
    
    // Hit zone pulse (BPM 120 = 2 beats/sec)
    const bps = 120 / 60;
    const pulse = 0.8 + 0.4 * (0.5 + 0.5 * Math.sin(elapsed * bps * Math.PI * 2));
    hitZone.scale.y = pulse;
    hitZoneMat.emissiveIntensity = 0.4 + 0.4 * (0.5 + 0.5 * Math.sin(elapsed * bps * Math.PI * 2));
    
    // Lane brightness decay
    for (let i = 0; i < 4; i++) {
        if (laneBrightness[i] > 0) {
            laneBrightness[i] = Math.max(0, laneBrightness[i] - dt * 5);
        }
        laneMaterials[i].opacity = 0.15 + laneBrightness[i] * 0.35;
        laneMaterials[i].emissiveIntensity = 0.1 + laneBrightness[i] * 0.6;
    }
    
    if (state.gameState === 'playing') {
        gameTime += dt;
        
        // Spawn notes
        while (nextNoteIndex < songPattern.length) {
            const noteData = songPattern[nextNoteIndex];
            // Calculate when to spawn: note should arrive at z=2 at noteData.time
            // Distance from spawn (z=15) to hit zone (z=2) = 13 units
            // Travel time = 13 / noteSpeed
            const travelTime = 13 / state.noteSpeed;
            const spawnTime = noteData.time - travelTime;
            
            if (gameTime >= spawnTime) {
                spawnNote(noteData.lane, noteData.time);
                nextNoteIndex++;
            } else {
                break;
            }
        }
        
        // Update notes
        for (let i = activeNotes.length - 1; i >= 0; i--) {
            const note = activeNotes[i];
            if (note.hit || note.missed) {
                activeNotes.splice(i, 1);
                continue;
            }
            
            note.mesh.position.z -= state.noteSpeed * dt;
            
            // Bobbing
            note.mesh.position.y = 0.3 + Math.sin(elapsed * 4 + note.mesh.position.z) * 0.05;
            
            // Miss check
            if (note.mesh.position.z < -2) {
                missNote(note);
                activeNotes.splice(i, 1);
            }
        }
        
        // Song progress
        const maxTime = songPattern[songPattern.length - 1].time;
        state.songProgress = Math.min(100, (gameTime / (maxTime + 2)) * 100);
        
        // Check if game is done
        if (nextNoteIndex >= songPattern.length && activeNotes.length === 0 && gameTime > maxTime + 2) {
            showResults();
        }
    }
    
    // Update particles
    updateParticles(dt);
    
    // Update state
    state.activeNotes = activeNotes.length;
    
    // Update UI
    updateUI();
    
    renderer.render(scene, camera);
}

animate();
</script>
