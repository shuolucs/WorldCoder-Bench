<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Rhythm Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            transition: opacity 0.3s;
        }
        .hidden {
            display: none !important;
        }
        h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #fff;
        }
        button {
            padding: 15px 30px;
            font-size: 1.5rem;
            background: #444;
            color: white;
            border: 2px solid #fff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 10px;
        }
        button:hover {
            background: #666;
            transform: scale(1.05);
        }
        #hud {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .hud-panel {
            position: absolute;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #stats-panel { top: 20px; left: 20px; }
        #controls-panel { top: 20px; right: 20px; pointer-events: auto; }
        #judgment-panel {
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            background: transparent;
            border: none;
            text-align: center;
        }
        #judgmentDisplay {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 15px currentColor;
            opacity: 0;
            transition: opacity 0.1s;
        }
        .stat-line {
            font-size: 1.2rem;
            margin: 5px 0;
        }
        .stat-value {
            font-weight: bold;
            color: #ffd700;
        }
        #progress-container {
            position: absolute;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            overflow: hidden;
        }
        #progressBar {
            width: 0%;
            height: 100%;
            background: #00ffcc;
            box-shadow: 0 0 10px #00ffcc;
            transition: width 0.1s linear;
        }
        .key-hints {
            position: absolute;
            bottom: 60px; left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
        }
        .key-hint {
            width: 40px; height: 40px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
        }
        #results-stats {
            font-size: 1.5rem;
            line-height: 2;
            text-align: center;
            margin-bottom: 20px;
        }
        #gradeDisplay {
            font-size: 6rem;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 0 0 20px currentColor;
        }
        .grade-S { color: #ffd700; }
        .grade-A { color: #ff3366; }
        .grade-B { color: #33ccff; }
        .grade-C { color: #33ff33; }
        .grade-D { color: #aaaaaa; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <div id="hud">
            <div id="stats-panel" class="hud-panel">
                <div class="stat-line">Score: <span id="scoreDisplay" class="stat-value">0</span></div>
                <div class="stat-line">Combo: <span id="comboDisplay" class="stat-value">0</span></div>
                <div class="stat-line">Multiplier: <span id="multiplierDisplay" class="stat-value">1x</span></div>
                <div class="stat-line">Accuracy: <span id="accuracyDisplay" class="stat-value">0%</span></div>
            </div>
            
            <div id="controls-panel" class="hud-panel">
                <div class="stat-line">Speed: <span id="speedDisplay" class="stat-value">5</span></div>
                <button id="speedDownButton" style="padding: 5px 10px; font-size: 1rem; margin: 5px 0;">-</button>
                <button id="speedUpButton" style="padding: 5px 10px; font-size: 1rem; margin: 5px 0;">+</button>
                <div style="font-size: 0.9rem; margin-top: 10px; color: #aaa;">Space: Pause/Resume</div>
            </div>

            <div id="judgment-panel" class="hud-panel">
                <div id="judgmentDisplay">Perfect</div>
            </div>

            <div class="key-hints">
                <div class="key-hint" style="color: #ff4444; border-color: #ff4444;">D</div>
                <div class="key-hint" style="color: #4444ff; border-color: #4444ff;">F</div>
                <div class="key-hint" style="color: #44ff44; border-color: #44ff44;">J</div>
                <div class="key-hint" style="color: #ffff44; border-color: #ffff44;">K</div>
            </div>

            <div id="progress-container">
                <div id="progressBar"></div>
            </div>
        </div>

        <div id="startOverlay" class="overlay">
            <h1>RHYTHM DIORAMA</h1>
            <p style="font-size: 1.2rem; margin-bottom: 30px;">Keys: D, F, J, K to hit notes. Space to pause.</p>
            <button id="startButton">Press START to play</button>
        </div>

        <div id="resultsOverlay" class="overlay hidden">
            <h1>SONG CLEARED</h1>
            <div id="gradeDisplay" class="grade-S">S</div>
            <div id="results-stats">
                Score: <span id="resScore" class="stat-value">0</span><br>
                Max Combo: <span id="resCombo" class="stat-value">0</span><br>
                Accuracy: <span id="resAcc" class="stat-value">0%</span>
            </div>
            <button id="resetButton">Play Again</button>
        </div>
        
        <div id="pauseOverlay" class="overlay hidden" style="background: rgba(0,0,0,0.8);">
            <h1>PAUSED</h1>
            <p>Press Space to Resume</p>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            gameState: 'idle', // idle, playing, paused, finished
            score: 0,
            combo: 0,
            maxCombo: 0,
            multiplier: 1,
            noteSpeed: 5,
            totalNotes: 20,
            notesHit: 0,
            notesMissed: 0,
            perfects: 0,
            greats: 0,
            goods: 0,
            accuracy: 0,
            activeNotes: 0,
            helmetLoaded: false,
            helmetRotationY: 0,
            songProgress: 0,
            lastJudgment: 'none',
            isPaused: false,
            grade: 'none',
            particlesActive: 0,
            notesProcessed: 0
        };

        const state = window.__3D_STATE__;

        // --- Constants & Data ---
        const LANE_X = [-1.8, -0.6, 0.6, 1.8];
        const LANE_COLORS = [0xff4444, 0x4444ff, 0x44ff44, 0xffff44];
        const KEYS = ['d', 'f', 'j', 'k'];
        const BPM = 120;
        const BEAT_DURATION = 60 / BPM;
        
        const songPattern = [
            {time: 0.5, lane: 0}, {time: 1.0, lane: 1}, {time: 1.5, lane: 2}, {time: 2.0, lane: 3},
            {time: 2.5, lane: 0}, {time: 3.0, lane: 1}, {time: 3.0, lane: 3}, {time: 3.5, lane: 2},
            {time: 4.0, lane: 0}, {time: 4.0, lane: 2}, {time: 4.5, lane: 1}, {time: 5.0, lane: 3},
            {time: 5.5, lane: 0}, {time: 5.5, lane: 1}, {time: 6.0, lane: 2}, {time: 6.0, lane: 3},
            {time: 6.5, lane: 1}, {time: 7.0, lane: 0}, {time: 7.5, lane: 2}, {time: 8.0, lane: 3}
        ];
        const maxSongTime = 10.0; // End game at 10s

        // --- Three.js Setup ---
        const canvas = document.getElementById('game-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x111111, 0.03);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3e, roughness: 0.8, metalness: 0.2 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Lanes
        const laneMeshes = [];
        const laneOpacities = [0.2, 0.2, 0.2, 0.2];
        for (let i = 0; i < 4; i++) {
            const laneGeo = new THREE.PlaneGeometry(1.2, 20);
            const laneMat = new THREE.MeshBasicMaterial({ 
                color: LANE_COLORS[i], 
                transparent: true, 
                opacity: 0.2,
                depthWrite: false
            });
            const lane = new THREE.Mesh(laneGeo, laneMat);
            lane.rotation.x = -Math.PI / 2;
            lane.position.set(LANE_X[i], 0.05, 5); // Center between 15 and -5 is 5
            scene.add(lane);
            laneMeshes.push(lane);
        }

        // Hit Zone
        const hitZoneGeo = new THREE.BoxGeometry(5.2, 0.1, 0.5);
        const hitZoneMat = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            emissive: 0xffffff,
            emissiveIntensity: 0.5,
            transparent: true,
            opacity: 0.8
        });
        const hitZone = new THREE.Mesh(hitZoneGeo, hitZoneMat);
        hitZone.position.set(0, 0.1, 2);
        scene.add(hitZone);

        // Model Loading
        let helmetModel = null;
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb', (gltf) => {
            helmetModel = gltf.scene;
            helmetModel.position.set(0, 1.5, -6);
            helmetModel.scale.set(1.5, 1.5, 1.5);
            
            helmetModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            scene.add(helmetModel);
            state.helmetLoaded = true;
        });

        // Notes
        const noteGeo = new THREE.BoxGeometry(1.0, 0.3, 0.8);
        const noteObjects = [];
        
        function initNotes() {
            // Clear existing
            noteObjects.forEach(n => scene.remove(n.mesh));
            noteObjects.length = 0;

            songPattern.forEach((data, index) => {
                const mat = new THREE.MeshStandardMaterial({
                    color: LANE_COLORS[data.lane],
                    emissive: LANE_COLORS[data.lane],
                    emissiveIntensity: 0.4,
                    roughness: 0.2,
                    metalness: 0.8
                });
                const mesh = new THREE.Mesh(noteGeo, mat);
                mesh.castShadow = true;
                mesh.visible = false;
                scene.add(mesh);
                
                noteObjects.push({
                    id: index,
                    time: data.time,
                    lane: data.lane,
                    mesh: mesh,
                    hit: false,
                    missed: false
                });
            });
        }
        initNotes();

        // Particles
        const particleSystems = [];
        const sphereGeo = new THREE.SphereGeometry(0.1, 8, 8);

        function spawnParticles(pos, colorHex) {
            const group = new THREE.Group();
            group.position.copy(pos);
            const mat = new THREE.MeshBasicMaterial({ color: colorHex, transparent: true });
            const particles = [];
            
            const count = 8 + Math.floor(Math.random() * 5);
            for(let i=0; i<count; i++) {
                const mesh = new THREE.Mesh(sphereGeo, mat);
                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 8,
                    (Math.random() - 0.5) * 8 + 2,
                    (Math.random() - 0.5) * 8
                );
                particles.push({ mesh, velocity });
                group.add(mesh);
            }
            scene.add(group);
            particleSystems.push({ group, particles, age: 0, maxAge: 0.3 });
            state.particlesActive = particleSystems.length;
        }

        // --- Game Logic ---
        let gameTime = 0;
        const clock = new THREE.Clock();

        function updateMultiplier() {
            if (state.combo >= 30) state.multiplier = 4;
            else if (state.combo >= 20) state.multiplier = 3;
            else if (state.combo >= 10) state.multiplier = 2;
            else state.multiplier = 1;
        }

        function updateAccuracy() {
            if (state.notesProcessed === 0) state.accuracy = 0;
            else {
                const hits = state.perfects + state.greats + state.goods;
                state.accuracy = (hits / state.notesProcessed) * 100;
            }
        }

        function showJudgment(text, color) {
            const el = document.getElementById('judgmentDisplay');
            el.textContent = text;
            el.style.color = color;
            el.style.opacity = 1;
            
            // Reset animation
            el.style.transform = 'scale(1.5)';
            setTimeout(() => {
                el.style.transform = 'scale(1)';
                el.style.opacity = 0;
            }, 300);
        }

        function handleMiss() {
            state.combo = 0;
            updateMultiplier();
            state.notesMissed++;
            state.notesProcessed++;
            state.lastJudgment = 'Miss';
            updateAccuracy();
            showJudgment('Miss', '#ff4444');
            updateUI();
        }

        function handleInput(laneIdx) {
            if (state.gameState !== 'playing' || state.isPaused) return;
            
            // Visual feedback
            laneOpacities[laneIdx] = 0.8;

            // Find closest hittable note
            let closest = null;
            let minDz = Infinity;

            for (let note of noteObjects) {
                if (!note.hit && !note.missed && note.lane === laneIdx) {
                    const z = note.mesh.position.z;
                    if (z >= 1.0 && z <= 3.0) {
                        const dz = Math.abs(z - 2.0);
                        if (dz < minDz) {
                            minDz = dz;
                            closest = note;
                        }
                    }
                }
            }

            if (closest) {
                closest.hit = true;
                closest.mesh.visible = false;
                state.notesProcessed++;

                let tier = 'Miss';
                let pts = 0;
                let colorHex = 0xffffff;
                let colorStr = '#ffffff';

                if (minDz < 0.4) {
                    tier = 'Perfect'; pts = 100; colorHex = 0xffd700; colorStr = '#ffd700'; state.perfects++;
                } else if (minDz < 0.8) {
                    tier = 'Great'; pts = 75; colorHex = 0xc0c0c0; colorStr = '#c0c0c0'; state.greats++;
                } else if (minDz < 1.0) {
                    tier = 'Good'; pts = 50; colorHex = 0xcd7f32; colorStr = '#cd7f32'; state.goods++;
                }

                if (pts > 0) {
                    state.combo++;
                    if (state.combo > state.maxCombo) state.maxCombo = state.combo;
                    updateMultiplier();
                    state.score += pts * state.multiplier;
                    state.notesHit++;
                    state.lastJudgment = tier;
                    updateAccuracy();
                    spawnParticles(closest.mesh.position, colorHex);
                    showJudgment(tier, colorStr);
                } else {
                    handleMiss();
                }
                updateUI();
            }
        }

        // Input Listeners
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            const laneIdx = KEYS.indexOf(key);
            if (laneIdx !== -1) {
                handleInput(laneIdx);
            }

            if (key === ' ') {
                if (state.gameState === 'playing') {
                    state.isPaused = !state.isPaused;
                    document.getElementById('pauseOverlay').classList.toggle('hidden', !state.isPaused);
                }
            }
        });

        // UI Buttons
        document.getElementById('startButton').addEventListener('click', () => {
            document.getElementById('startOverlay').classList.add('hidden');
            startGame();
        });

        document.getElementById('resetButton').addEventListener('click', () => {
            document.getElementById('resultsOverlay').classList.add('hidden');
            startGame();
        });

        document.getElementById('speedUpButton').addEventListener('click', () => {
            if (state.noteSpeed < 10) {
                state.noteSpeed++;
                document.getElementById('speedDisplay').textContent = state.noteSpeed;
            }
        });

        document.getElementById('speedDownButton').addEventListener('click', () => {
            if (state.noteSpeed > 2) {
                state.noteSpeed--;
                document.getElementById('speedDisplay').textContent = state.noteSpeed;
            }
        });

        function startGame() {
            gameTime = 0;
            state.gameState = 'playing';
            state.isPaused = false;
            state.score = 0;
            state.combo = 0;
            state.maxCombo = 0;
            state.multiplier = 1;
            state.notesHit = 0;
            state.notesMissed = 0;
            state.perfects = 0;
            state.greats = 0;
            state.goods = 0;
            state.accuracy = 0;
            state.notesProcessed = 0;
            state.songProgress = 0;
            state.lastJudgment = 'none';
            state.grade = 'none';
            
            initNotes();
            updateUI();
            document.getElementById('judgmentDisplay').style.opacity = 0;
            clock.start();
        }

        function calculateGrade() {
            const acc = state.accuracy;
            if (acc >= 95) state.grade = 'S';
            else if (acc >= 85) state.grade = 'A';
            else if (acc >= 75) state.grade = 'B';
            else if (acc >= 60) state.grade = 'C';
            else state.grade = 'D';
        }

        function endGame() {
            state.gameState = 'finished';
            calculateGrade();
            
            document.getElementById('resScore').textContent = state.score;
            document.getElementById('resCombo').textContent = state.maxCombo;
            document.getElementById('resAcc').textContent = state.accuracy.toFixed(1) + '%';
            
            const gradeEl = document.getElementById('gradeDisplay');
            gradeEl.textContent = state.grade;
            gradeEl.className = 'grade-' + state.grade;
            
            document.getElementById('resultsOverlay').classList.remove('hidden');
        }

        function updateUI() {
            document.getElementById('scoreDisplay').textContent = state.score;
            document.getElementById('comboDisplay').textContent = state.combo;
            document.getElementById('multiplierDisplay').textContent = state.multiplier + 'x';
            document.getElementById('accuracyDisplay').textContent = state.accuracy.toFixed(1) + '%';
            document.getElementById('progressBar').style.width = state.songProgress + '%';
        }

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            if (state.gameState === 'playing' && !state.isPaused) {
                gameTime += delta;
                
                // Update Progress
                state.songProgress = Math.min(100, (gameTime / maxSongTime) * 100);
                document.getElementById('progressBar').style.width = state.songProgress + '%';

                // Update Notes
                state.activeNotes = 0;
                for (let note of noteObjects) {
                    if (note.hit || note.missed) continue;

                    // Calculate Z based on time to ensure it hits z=2 exactly at note.time
                    const z = 2.0 + (note.time - gameTime) * state.noteSpeed;

                    if (z <= 15 && z >= -5) {
                        if (!note.mesh.visible) note.mesh.visible = true;
                        note.mesh.position.z = z;
                        note.mesh.position.x = LANE_X[note.lane];
                        // Bobbing animation
                        note.mesh.position.y = 0.15 + Math.sin(gameTime * 10 + note.id) * 0.05;
                        state.activeNotes++;
                    } else {
                        note.mesh.visible = false;
                    }

                    // Miss detection
                    if (z < -2.0 && !note.missed && !note.hit) {
                        note.missed = true;
                        note.mesh.visible = false;
                        handleMiss();
                    }
                }

                // Check End Game
                if (gameTime >= maxSongTime || state.notesProcessed === state.totalNotes) {
                    // Wait a tiny bit for particles to finish
                    if(gameTime >= maxSongTime) {
                        endGame();
                    }
                }
            }

            // Animations (run even if paused for visual flair, except particles maybe)
            if (!state.isPaused) {
                // Helmet Animation
                if (helmetModel) {
                    helmetModel.rotation.y += 0.3 * delta;
                    helmetModel.position.y = 1.5 + Math.sin(time * Math.PI) * 0.2;
                    state.helmetRotationY = helmetModel.rotation.y;
                }

                // Hit Zone Pulse (sync with BPM)
                const pulse = 1.0 + Math.sin(time * (BPM / 60) * Math.PI) * 0.2;
                hitZone.scale.y = pulse;

                // Lane Brightening Decay
                for (let i = 0; i < 4; i++) {
                    laneOpacities[i] = Math.max(0.2, laneOpacities[i] - delta * 3);
                    laneMeshes[i].material.opacity = laneOpacities[i];
                }

                // Particles
                for (let i = particleSystems.length - 1; i >= 0; i--) {
                    const ps = particleSystems[i];
                    ps.age += delta;
                    const progress = ps.age / ps.maxAge;
                    
                    if (progress >= 1.0) {
                        scene.remove(ps.group);
                        ps.particles.forEach(p => {
                            p.mesh.geometry.dispose();
                            p.mesh.material.dispose();
                        });
                        particleSystems.splice(i, 1);
                    } else {
                        ps.particles.forEach(p => {
                            p.mesh.position.addScaledVector(p.velocity, delta);
                            p.mesh.material.opacity = 1.0 - progress;
                            p.mesh.scale.setScalar(1.0 - progress * 0.5);
                        });
                    }
                }
                state.particlesActive = particleSystems.length;
            }

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start Loop
        animate();

    </script>
</body>
</html>
