<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Marble Maze Tilt Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 14px;
            line-height: 1.5;
        }
        #hud span {
            font-weight: bold;
            color: #4488FF;
        }
        #resetBtn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #4488FF;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            pointer-events: auto;
            transition: background 0.2s;
        }
        #resetBtn:hover {
            background: #2266DD;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            display: none;
            text-align: center;
        }
        .won { color: #FFD700; }
        .lost { color: #FF4444; }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div>Time: <span id="timerDisplay">0.00</span>s</div>
        <div>State: <span id="stateDisplay">playing</span></div>
        <div>Tilt X: <span id="tiltXDisplay">0</span>°</div>
        <div>Tilt Z: <span id="tiltZDisplay">0</span>°</div>
    </div>
    <button id="resetBtn">Reset (R)</button>
    <div id="message"></div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // --- Global State ---
    window.__3D_STATE__ = {
        marbleX: 0, marbleY: 0, marbleZ: 0,
        marbleVX: 0, marbleVZ: 0,
        tiltX: 0, tiltZ: 0,
        gameState: 'playing', // 'playing', 'won', 'lost'
        elapsedTime: 0,
        resetCount: 0,
        horseLoaded: false,
        holeCount: 3,
        wallCount: 6,
        boardWidth: 12,
        boardDepth: 12,
        marbleRadius: 0.3,
        maxTilt: Math.PI / 12
    };

    // --- Constants & Variables ---
    const DT = 1 / 60;
    const GRAVITY = 9.8;
    const FRICTION = 0.98;
    const RESTITUTION = 0.3;
    const TILT_SPEED = 0.02;
    const MAX_TILT = Math.PI / 12;

    let marbleVx = 0, marbleVz = 0;
    let marbleX = -4, marbleZ = -4;
    let marbleY = 0.45; // 0.15 (half board) + 0.3 (radius)
    
    let firstInput = false;
    let horseMesh = null;

    const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

    // --- DOM Elements ---
    const container = document.getElementById('game-container');
    const timerDisplay = document.getElementById('timerDisplay');
    const stateDisplay = document.getElementById('stateDisplay');
    const tiltXDisplay = document.getElementById('tiltXDisplay');
    const tiltZDisplay = document.getElementById('tiltZDisplay');
    const messageEl = document.getElementById('message');
    const resetBtn = document.getElementById('resetBtn');

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    
    const camera = new THREE.PerspectiveCamera(45, 800 / 600, 0.1, 100);
    camera.position.set(0, 12, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(800, 600);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    scene.add(dirLight);

    // --- Game Objects ---
    const boardGroup = new THREE.Group();
    scene.add(boardGroup);

    // Board Base
    const boardGeo = new THREE.BoxGeometry(12, 0.3, 12);
    const boardMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.7 });
    const board = new THREE.Mesh(boardGeo, boardMat);
    board.receiveShadow = true;
    boardGroup.add(board);

    // Walls
    const wallsData = [
        // Outer boundaries
        { x: 0, z: -5.9, w: 12, d: 0.2 },
        { x: 0, z: 5.9, w: 12, d: 0.2 },
        { x: -5.9, z: 0, w: 0.2, d: 12 },
        { x: 5.9, z: 0, w: 0.2, d: 12 },
        // Internal Maze Walls (6 minimum)
        { x: -2, z: -3, w: 7.8, d: 0.2 },
        { x: 2, z: -1, w: 0.2, d: 6 },
        { x: -2, z: 1, w: 0.2, d: 4 },
        { x: 0, z: 3, w: 4, d: 0.2 },
        { x: 4, z: 1, w: 3.8, d: 0.2 },
        { x: -4, z: 3, w: 3.8, d: 0.2 }
    ];

    const wallMat = new THREE.MeshStandardMaterial({ color: 0x5C4033, roughness: 0.8 });
    wallsData.forEach(data => {
        const geo = new THREE.BoxGeometry(data.w, 0.5, data.d);
        const mesh = new THREE.Mesh(geo, wallMat);
        mesh.position.set(data.x, 0.4, data.z); // 0.15 (board half) + 0.25 (wall half)
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        boardGroup.add(mesh);
    });

    // Holes (Traps)
    const holesData = [
        { x: -2, z: -2 },
        { x: 2, z: 0 },
        { x: 0, z: 2 }
    ];
    const holeGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.31, 32);
    const holeMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
    holesData.forEach(pos => {
        const mesh = new THREE.Mesh(holeGeo, holeMat);
        mesh.position.set(pos.x, 0, pos.z);
        boardGroup.add(mesh);
    });

    // Start Marker
    const startGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.32, 32);
    const startMat = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
    const startMesh = new THREE.Mesh(startGeo, startMat);
    startMesh.position.set(-4, 0, -4);
    boardGroup.add(startMesh);

    // Goal Marker
    const goalGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.32, 32);
    const goalMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.5, roughness: 0.2 });
    const goalMesh = new THREE.Mesh(goalGeo, goalMat);
    goalMesh.position.set(4, 0, 4);
    boardGroup.add(goalMesh);

    // Horse Trophy
    const loader = new GLTFLoader();
    loader.load('https://threejs.org/examples/models/gltf/Horse.glb', (gltf) => {
        horseMesh = gltf.scene;
        horseMesh.scale.set(0.005, 0.005, 0.005);
        horseMesh.position.set(4, 0.15, 4); // On top of board
        
        // Enable shadows for horse
        horseMesh.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
                // Give it a golden material
                child.material = new THREE.MeshStandardMaterial({
                    color: 0xFFD700,
                    metalness: 0.8,
                    roughness: 0.2
                });
            }
        });
        
        boardGroup.add(horseMesh);
        window.__3D_STATE__.horseLoaded = true;
    });

    // Marble
    const marbleGeo = new THREE.SphereGeometry(0.3, 32, 32);
    const marbleMat = new THREE.MeshStandardMaterial({ 
        color: 0x4488FF, 
        metalness: 0.8, 
        roughness: 0.2 
    });
    const marble = new THREE.Mesh(marbleGeo, marbleMat);
    marble.castShadow = true;
    boardGroup.add(marble);

    // --- Input Handling ---
    window.addEventListener('keydown', (e) => {
        if (keys.hasOwnProperty(e.code)) {
            keys[e.code] = true;
            if (!firstInput && window.__3D_STATE__.gameState === 'playing') {
                firstInput = true;
            }
        }
        if (e.code === 'KeyR') resetGame();
    });

    window.addEventListener('keyup', (e) => {
        if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
    });

    resetBtn.addEventListener('click', resetGame);

    function resetGame() {
        marbleX = -4;
        marbleZ = -4;
        marbleY = 0.45;
        marbleVx = 0;
        marbleVz = 0;
        boardGroup.rotation.set(0, 0, 0);
        
        window.__3D_STATE__.gameState = 'playing';
        window.__3D_STATE__.elapsedTime = 0;
        window.__3D_STATE__.resetCount++;
        firstInput = false;
        
        messageEl.style.display = 'none';
        messageEl.className = '';
        stateDisplay.style.color = '#4488FF';
    }

    // --- Physics & Collision ---
    function resolveCollisions() {
        const radius = 0.3;
        
        for (let w of wallsData) {
            const halfW = w.w / 2;
            const halfD = w.d / 2;
            const minX = w.x - halfW;
            const maxX = w.x + halfW;
            const minZ = w.z - halfD;
            const maxZ = w.z + halfD;

            // Find closest point on AABB to circle center
            const closestX = Math.max(minX, Math.min(marbleX, maxX));
            const closestZ = Math.max(minZ, Math.min(marbleZ, maxZ));

            const dx = marbleX - closestX;
            const dz = marbleZ - closestZ;
            const distanceSq = dx * dx + dz * dz;

            if (distanceSq < radius * radius && distanceSq > 0) {
                const distance = Math.sqrt(distanceSq);
                const pen = radius - distance;
                const nx = dx / distance;
                const nz = dz / distance;

                // Push out
                marbleX += nx * pen;
                marbleZ += nz * pen;

                // Reflect velocity
                const dot = marbleVx * nx + marbleVz * nz;
                if (dot < 0) {
                    marbleVx -= (1 + RESTITUTION) * dot * nx;
                    marbleVz -= (1 + RESTITUTION) * dot * nz;
                }
            } else if (distanceSq === 0) {
                // Edge case: exactly inside
                marbleX += radius;
            }
        }
    }

    // --- Main Loop ---
    function animate() {
        requestAnimationFrame(animate);

        const state = window.__3D_STATE__;

        // 1. Handle Input & Tilt
        if (state.gameState === 'playing') {
            if (keys.ArrowUp) boardGroup.rotation.x -= TILT_SPEED;
            if (keys.ArrowDown) boardGroup.rotation.x += TILT_SPEED;
            if (keys.ArrowLeft) boardGroup.rotation.z += TILT_SPEED;
            if (keys.ArrowRight) boardGroup.rotation.z -= TILT_SPEED;

            // Clamp tilt
            boardGroup.rotation.x = Math.max(-MAX_TILT, Math.min(MAX_TILT, boardGroup.rotation.x));
            boardGroup.rotation.z = Math.max(-MAX_TILT, Math.min(MAX_TILT, boardGroup.rotation.z));

            // 2. Physics Update
            // Acceleration based on gravity component along the tilted plane
            const ax = -GRAVITY * Math.sin(boardGroup.rotation.z);
            const az = GRAVITY * Math.sin(boardGroup.rotation.x);

            marbleVx += ax * DT;
            marbleVz += az * DT;

            marbleVx *= FRICTION;
            marbleVz *= FRICTION;

            marbleX += marbleVx * DT;
            marbleZ += marbleVz * DT;

            // 3. Collisions
            resolveCollisions();

            // 4. Game Logic (Holes & Goal)
            // Check Holes
            for (let hole of holesData) {
                const dx = marbleX - hole.x;
                const dz = marbleZ - hole.z;
                if (Math.sqrt(dx*dx + dz*dz) < 0.5) {
                    state.gameState = 'lost';
                    messageEl.textContent = 'You fell in a hole!';
                    messageEl.className = 'lost';
                    messageEl.style.display = 'block';
                    stateDisplay.style.color = '#FF4444';
                    // Center marble over hole for falling animation
                    marbleX = hole.x;
                    marbleZ = hole.z;
                    marbleVx = 0;
                    marbleVz = 0;
                    break;
                }
            }

            // Check Goal
            if (state.gameState === 'playing') {
                const dx = marbleX - 4;
                const dz = marbleZ - 4;
                if (Math.sqrt(dx*dx + dz*dz) < 0.8) {
                    state.gameState = 'won';
                    messageEl.textContent = 'You Win!';
                    messageEl.className = 'won';
                    messageEl.style.display = 'block';
                    stateDisplay.style.color = '#FFD700';
                }
            }

            // Update Timer
            if (firstInput) {
                state.elapsedTime += DT;
            }
        } else if (state.gameState === 'lost') {
            // Falling animation
            if (marbleY > -1) {
                marbleY -= 2 * DT;
            }
        }

        // Update Marble Mesh
        marble.position.set(marbleX, marbleY, marbleZ);

        // Rotate Horse
        if (horseMesh) {
            horseMesh.rotation.y += 0.5 * DT;
        }

        // Update HUD
        timerDisplay.textContent = state.elapsedTime.toFixed(2);
        stateDisplay.textContent = state.gameState;
        tiltXDisplay.textContent = (boardGroup.rotation.x * 180 / Math.PI).toFixed(1);
        tiltZDisplay.textContent = (boardGroup.rotation.z * 180 / Math.PI).toFixed(1);

        // Update Global State Object
        const worldPos = new THREE.Vector3();
        marble.getWorldPosition(worldPos);
        
        state.marbleX = worldPos.x;
        state.marbleY = worldPos.y;
        state.marbleZ = worldPos.z;
        state.marbleVX = marbleVx;
        state.marbleVZ = marbleVz;
        state.tiltX = boardGroup.rotation.x;
        state.tiltZ = boardGroup.rotation.z;

        renderer.render(scene, camera);
    }

    // Start loop
    animate();

</script>
</body>
</html>
