<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Marble Maze Tilt Game</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #202020;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0, 0, 0, 0.65);
      padding: 12px;
      border-radius: 8px;
      z-index: 10;
      line-height: 1.5;
      min-width: 240px;
    }

    #message {
      position: absolute;
      top: 10px;
      right: 10px;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 12px 16px;
      border-radius: 8px;
      z-index: 10;
      font-size: 20px;
      font-weight: bold;
    }

    #resetBtn {
      position: absolute;
      top: 190px;
      left: 10px;
      z-index: 10;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 6px;
      border: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Timer: <span id="timerDisplay">0.00</span></div>
    <div>State: <span id="stateDisplay">playing</span></div>
    <div>Tilt X: <span id="tiltXDisplay">0.00</span></div>
    <div>Tilt Z: <span id="tiltZDisplay">0.00</span></div>
    <div>Marble Pos: <span id="marblePosDisplay">(-4.00, 0.45, -4.00)</span></div>
    <div>Resets: <span id="resetDisplay">0</span></div>
  </div>

  <div id="message"></div>
  <button id="resetBtn">Reset</button>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x202830);

    const camera = new THREE.PerspectiveCamera(60, 800 / 600, 0.1, 1000);
    camera.position.set(0, 12, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(800, 600);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(1024, 1024);
    scene.add(dirLight);

    const boardWidth = 12;
    const boardDepth = 12;
    const boardHeight = 0.3;
    const wallHeight = 0.5;
    const wallThickness = 0.2;
    const marbleRadius = 0.3;
    const maxTilt = Math.PI / 12;
    const dt = 1 / 60;
    const gravity = 9.8;
    const friction = 0.98;
    const restitution = 0.3;

    const boardGroup = new THREE.Group();
    scene.add(boardGroup);

    const boardMat = new THREE.MeshStandardMaterial({ color: '#8B7355' });
    const boardGeo = new THREE.BoxGeometry(boardWidth, boardHeight, boardDepth);
    const board = new THREE.Mesh(boardGeo, boardMat);
    board.receiveShadow = true;
    board.castShadow = true;
    boardGroup.add(board);

    const boardTopY = boardHeight / 2;

    function createWall(x, y, z, w, h, d, color = 0x5b4636) {
      const wall = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshStandardMaterial({ color })
      );
      wall.position.set(x, y, z);
      wall.castShadow = true;
      wall.receiveShadow = true;
      boardGroup.add(wall);
      return {
        mesh: wall,
        minX: x - w / 2,
        maxX: x + w / 2,
        minZ: z - d / 2,
        maxZ: z + d / 2,
        width: w,
        depth: d
      };
    }

    const walls = [];
    const internalWalls = [];

    const wallY = boardTopY + wallHeight / 2;

    walls.push(createWall(0, wallY, -boardDepth / 2 + wallThickness / 2, boardWidth, wallHeight, wallThickness));
    walls.push(createWall(0, wallY, boardDepth / 2 - wallThickness / 2, boardWidth, wallHeight, wallThickness));
    walls.push(createWall(-boardWidth / 2 + wallThickness / 2, wallY, 0, wallThickness, wallHeight, boardDepth));
    walls.push(createWall(boardWidth / 2 - wallThickness / 2, wallY, 0, wallThickness, wallHeight, boardDepth));

    function addInternalWall(x, z, w, d) {
      const wall = createWall(x, wallY, z, w, wallHeight, d, 0x6a523d);
      walls.push(wall);
      internalWalls.push(wall);
    }

    addInternalWall(-2.5, -4.0, 0.2, 4.0);
    addInternalWall(-1.0, -1.5, 3.0, 0.2);
    addInternalWall(1.2, -3.0, 0.2, 4.0);
    addInternalWall(3.0, -0.8, 3.0, 0.2);
    addInternalWall(-2.0, 1.0, 0.2, 4.0);
    addInternalWall(0.5, 2.5, 4.0, 0.2);
    addInternalWall(2.8, 3.6, 0.2, 2.8);

    const holePositions = [
      new THREE.Vector3(-2, 0.16, -2),
      new THREE.Vector3(2, 0.16, 0),
      new THREE.Vector3(0, 0.16, 2)
    ];

    const holeRadius = 0.4;
    const holeMeshes = [];

    for (const pos of holePositions) {
      const hole = new THREE.Mesh(
        new THREE.CylinderGeometry(holeRadius, holeRadius, 0.05, 32),
        new THREE.MeshStandardMaterial({ color: '#111111' })
      );
      hole.position.copy(pos);
      boardGroup.add(hole);
      holeMeshes.push(hole);
    }

    function createCircleMarker(color, x, z, radius = 0.5) {
      const marker = new THREE.Mesh(
        new THREE.CylinderGeometry(radius, radius, 0.03, 32),
        new THREE.MeshStandardMaterial({ color })
      );
      marker.position.set(x, boardTopY + 0.02, z);
      boardGroup.add(marker);
      return marker;
    }

    createCircleMarker('#22cc44', -4, -4);
    createCircleMarker('#d4af37', 4, 4);

    let horse = null;
    let horseLoaded = false;

    const loader = new GLTFLoader();
    loader.load(
      'horse.glb',
      (gltf) => {
        horse = gltf.scene;
        horse.position.set(4, boardTopY + 0.35, 4);
        horse.scale.set(0.005, 0.005, 0.005);
        horse.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        boardGroup.add(horse);
        horseLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load horse.glb', err);
      }
    );

    const marble = new THREE.Mesh(
      new THREE.SphereGeometry(marbleRadius, 32, 32),
      new THREE.MeshStandardMaterial({
        color: '#4488FF',
        metalness: 0.8,
        roughness: 0.2
      })
    );
    marble.castShadow = true;
    marble.receiveShadow = true;
    boardGroup.add(marble);

    const startPos = new THREE.Vector3(-4, boardTopY + marbleRadius, -4);
    const goalPos = new THREE.Vector3(4, boardTopY + marbleRadius, 4);

    let marblePos = new THREE.Vector3(startPos.x, startPos.y, startPos.z);
    let marbleVel = new THREE.Vector2(0, 0);

    let tiltX = 0;
    let tiltZ = 0;

    let gameState = 'playing';
    let elapsedTime = 0;
    let resetCount = 0;
    let timerStarted = false;

    const keys = {
      ArrowUp: false,
      ArrowDown: false,
      ArrowLeft: false,
      ArrowRight: false
    };

    const timerDisplay = document.getElementById('timerDisplay');
    const stateDisplay = document.getElementById('stateDisplay');
    const tiltXDisplay = document.getElementById('tiltXDisplay');
    const tiltZDisplay = document.getElementById('tiltZDisplay');
    const marblePosDisplay = document.getElementById('marblePosDisplay');
    const resetDisplay = document.getElementById('resetDisplay');
    const message = document.getElementById('message');
    const resetBtn = document.getElementById('resetBtn');

    function resetGame() {
      marblePos.set(startPos.x, startPos.y, startPos.z);
      marbleVel.set(0, 0);
      tiltX = 0;
      tiltZ = 0;
      boardGroup.rotation.x = 0;
      boardGroup.rotation.z = 0;
      marble.position.copy(marblePos);
      gameState = 'playing';
      elapsedTime = 0;
      timerStarted = false;
      resetCount++;
      message.textContent = '';
    }

    resetBtn.addEventListener('click', resetGame);

    window.addEventListener('keydown', (e) => {
      if (e.key in keys) {
        keys[e.key] = true;
        if (!timerStarted && gameState === 'playing') timerStarted = true;
      }
      if (e.key === 'r' || e.key === 'R') {
        resetGame();
      }
    });

    window.addEventListener('keyup', (e) => {
      if (e.key in keys) {
        keys[e.key] = false;
      }
    });

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function circleAABBCollision(cx, cz, radius, wall) {
      const nearestX = clamp(cx, wall.minX, wall.maxX);
      const nearestZ = clamp(cz, wall.minZ, wall.maxZ);
      const dx = cx - nearestX;
      const dz = cz - nearestZ;
      return dx * dx + dz * dz < radius * radius;
    }

    function resolveWallCollision(wall) {
      const nearestX = clamp(marblePos.x, wall.minX, wall.maxX);
      const nearestZ = clamp(marblePos.z, wall.minZ, wall.maxZ);
      let dx = marblePos.x - nearestX;
      let dz = marblePos.z - nearestZ;
      const distSq = dx * dx + dz * dz;

      if (distSq < marbleRadius * marbleRadius) {
        const dist = Math.sqrt(distSq);

        if (dist > 0.0001) {
          const overlap = marbleRadius - dist;
          dx /= dist;
          dz /= dist;
          marblePos.x += dx * overlap;
          marblePos.z += dz * overlap;

          const absDx = Math.abs(dx);
          const absDz = Math.abs(dz);

          if (absDx > absDz) {
            marbleVel.x = -marbleVel.x * restitution;
          } else {
            marbleVel.y = -marbleVel.y * restitution;
          }
        } else {
          const wallCenterX = (wall.minX + wall.maxX) * 0.5;
          const wallCenterZ = (wall.minZ + wall.maxZ) * 0.5;
          const diffX = marblePos.x - wallCenterX;
          const diffZ = marblePos.z - wallCenterZ;

          if (Math.abs(diffX) > Math.abs(diffZ)) {
            marblePos.x += Math.sign(diffX || 1) * marbleRadius;
            marbleVel.x = -marbleVel.x * restitution;
          } else {
            marblePos.z += Math.sign(diffZ || 1) * marbleRadius;
            marbleVel.y = -marbleVel.y * restitution;
          }
        }
      }
    }

    function updatePhysics() {
      if (gameState !== 'playing') return;

      if (keys.ArrowUp) tiltX -= 0.02;
      if (keys.ArrowDown) tiltX += 0.02;
      if (keys.ArrowLeft) tiltZ += 0.02;
      if (keys.ArrowRight) tiltZ -= 0.02;

      tiltX = clamp(tiltX, -maxTilt, maxTilt);
      tiltZ = clamp(tiltZ, -maxTilt, maxTilt);

      boardGroup.rotation.x = tiltX;
      boardGroup.rotation.z = tiltZ;

      const ax = gravity * Math.sin(tiltZ);
      const az = -gravity * Math.sin(tiltX);

      marbleVel.x += ax * dt;
      marbleVel.y += az * dt;

      marbleVel.multiplyScalar(friction);

      marblePos.x += marbleVel.x * dt;
      marblePos.z += marbleVel.y * dt;

      const halfW = boardWidth / 2 - wallThickness - marbleRadius;
      const halfD = boardDepth / 2 - wallThickness - marbleRadius;

      if (marblePos.x < -halfW) {
        marblePos.x = -halfW;
        marbleVel.x = -marbleVel.x * restitution;
      }
      if (marblePos.x > halfW) {
        marblePos.x = halfW;
        marbleVel.x = -marbleVel.x * restitution;
      }
      if (marblePos.z < -halfD) {
        marblePos.z = -halfD;
        marbleVel.y = -marbleVel.y * restitution;
      }
      if (marblePos.z > halfD) {
        marblePos.z = halfD;
        marbleVel.y = -marbleVel.y * restitution;
      }

      for (const wall of walls) {
        if (circleAABBCollision(marblePos.x, marblePos.z, marbleRadius, wall)) {
          resolveWallCollision(wall);
        }
      }

      marble.position.set(marblePos.x, boardTopY + marbleRadius, marblePos.z);

      for (const holePos of holePositions) {
        const dist = marble.position.distanceTo(new THREE.Vector3(holePos.x, marble.position.y, holePos.z));
        if (dist <= 0.5) {
          gameState = 'lost';
          message.textContent = 'You fell in a hole!';
          marbleVel.set(0, 0);
          return;
        }
      }

      const goalDist = marble.position.distanceTo(goalPos);
      if (goalDist <= 0.8) {
        gameState = 'won';
        message.textContent = 'You Win!';
        marbleVel.set(0, 0);
      }
    }

    function updateHUD() {
      timerDisplay.textContent = elapsedTime.toFixed(2);
      stateDisplay.textContent = gameState;
      tiltXDisplay.textContent = (THREE.MathUtils.radToDeg(tiltX)).toFixed(2);
      tiltZDisplay.textContent = (THREE.MathUtils.radToDeg(tiltZ)).toFixed(2);
      marblePosDisplay.textContent =
        `(${marble.position.x.toFixed(2)}, ${marble.position.y.toFixed(2)}, ${marble.position.z.toFixed(2)})`;
      resetDisplay.textContent = resetCount;
    }

    function updateStateExposure() {
      window.__3D_STATE__ = {
        marbleX: marble.position.x,
        marbleY: marble.position.y,
        marbleZ: marble.position.z,
        marbleVX: marbleVel.x,
        marbleVZ: marbleVel.y,
        tiltX,
        tiltZ,
        gameState,
        elapsedTime,
        resetCount,
        horseLoaded,
        holeCount: holePositions.length,
        wallCount: internalWalls.length,
        boardWidth,
        boardDepth,
        marbleRadius,
        maxTilt
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      if (timerStarted && gameState === 'playing') {
        elapsedTime += dt;
      }

      updatePhysics();

      if (horse) {
        horse.rotation.y += 0.5 * dt;
      }

      updateHUD();
      updateStateExposure();
      renderer.render(scene, camera);
    }

    marble.position.copy(startPos);
    updateStateExposure();
    updateHUD();
    animate();
  </script>
</body>
</html>
