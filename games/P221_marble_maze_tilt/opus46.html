<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Marble Maze Tilt Game</title>
<style>
  body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #fff;
    background: rgba(0,0,0,0.7);
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 220px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  #hud .label { color: #aaa; }
  #hud .value { color: #4488FF; font-weight: bold; }
  #stateDisplay { font-size: 16px; }
  #stateDisplay.won { color: #FFD700 !important; }
  #stateDisplay.lost { color: #FF4444 !important; }
  #resetBtn {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 30px;
    font-size: 16px;
    background: linear-gradient(135deg, #4488FF, #2266DD);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 1px;
    box-shadow: 0 4px 15px rgba(68,136,255,0.4);
    transition: all 0.3s;
  }
  #resetBtn:hover { background: linear-gradient(135deg, #5599FF, #3377EE); transform: translateX(-50%) scale(1.05); }
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: bold;
    color: #FFD700;
    text-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,215,0,0.4);
    display: none;
    text-align: center;
    pointer-events: none;
  }
  #controls-hint {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    text-align: center;
  }
</style>
</head>
<body>

<div id="hud">
  <div><span class="label">State: </span><span id="stateDisplay" class="value">Playing</span></div>
  <div><span class="label">Time: </span><span id="timerDisplay" class="value">0.0s</span></div>
  <div><span class="label">Tilt X: </span><span id="tiltXDisplay" class="value">0.0°</span></div>
  <div><span class="label">Tilt Z: </span><span id="tiltZDisplay" class="value">0.0°</span></div>
  <div><span class="label">Marble: </span><span id="marblePosDisplay" class="value">(0, 0)</span></div>
  <div><span class="label">Resets: </span><span id="resetCountDisplay" class="value">0</span></div>
</div>

<div id="message"></div>
<div id="controls-hint">Arrow Keys to tilt • R to reset</div>
<button id="resetBtn">RESET</button>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 20, 40);

const camera = new THREE.PerspectiveCamera(50, 800 / 600, 0.1, 100);
camera.position.set(0, 12, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(800, 600);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

// Additional fill light
const fillLight = new THREE.DirectionalLight(0x4488FF, 0.2);
fillLight.position.set(-5, 5, -5);
scene.add(fillLight);

// --- Board Group (tiltable) ---
const boardGroup = new THREE.Group();
scene.add(boardGroup);

// Board
const boardGeo = new THREE.BoxGeometry(12, 0.3, 12);
const boardMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.7, metalness: 0.1 });
const board = new THREE.Mesh(boardGeo, boardMat);
board.receiveShadow = true;
board.castShadow = true;
boardGroup.add(board);

// --- Walls ---
const wallMat = new THREE.MeshStandardMaterial({ color: 0x6B5335, roughness: 0.8, metalness: 0.05 });
const wallHeight = 0.5;
const wallThickness = 0.2;
const walls = [];
const internalWalls = [];

function createWall(x, z, width, depth) {
  const geo = new THREE.BoxGeometry(width, wallHeight, depth);
  const wall = new THREE.Mesh(geo, wallMat);
  wall.position.set(x, 0.15 + wallHeight / 2, z);
  wall.castShadow = true;
  wall.receiveShadow = true;
  boardGroup.add(wall);
  walls.push({
    mesh: wall,
    minX: x - width / 2,
    maxX: x + width / 2,
    minZ: z - depth / 2,
    maxZ: z + depth / 2
  });
  return wall;
}

// Outer boundary walls
createWall(0, -6 + wallThickness / 2, 12, wallThickness); // top
createWall(0, 6 - wallThickness / 2, 12, wallThickness);  // bottom
createWall(-6 + wallThickness / 2, 0, wallThickness, 12); // left
createWall(6 - wallThickness / 2, 0, wallThickness, 12);  // right

const internalWallStartIndex = walls.length;

// Internal walls creating a maze path from (-4,-4) to (4,4)
// Wall 1: horizontal wall near top-left
createWall(-1, -4, 6, wallThickness);
// Wall 2: vertical wall in center-left area
createWall(-2, -1.5, wallThickness, 5);
// Wall 3: horizontal wall in middle
createWall(1.5, -1, 5, wallThickness);
// Wall 4: vertical wall center-right
createWall(3, 1, wallThickness, 4);
// Wall 5: horizontal wall lower area
createWall(0, 2.5, 6, wallThickness);
// Wall 6: vertical wall lower-left
createWall(-3, 3.5, wallThickness, 3);
// Wall 7: horizontal wall near goal
createWall(2, 4.5, 4, wallThickness);
// Wall 8: small vertical wall
createWall(1, -2.5, wallThickness, 3);

const internalWallCount = walls.length - internalWallStartIndex;

// --- Holes (traps) ---
const holePositions = [
  { x: -2, z: -2 },
  { x: 2, z: 0 },
  { x: 0, z: 2 }
];

holePositions.forEach(pos => {
  const holeGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.05, 32);
  const holeMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 1, metalness: 0 });
  const hole = new THREE.Mesh(holeGeo, holeMat);
  hole.position.set(pos.x, 0.16, pos.z);
  boardGroup.add(hole);

  // Add ring around hole
  const ringGeo = new THREE.RingGeometry(0.35, 0.45, 32);
  const ringMat = new THREE.MeshStandardMaterial({ color: 0x333333, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.set(pos.x, 0.17, pos.z);
  boardGroup.add(ring);
});

// --- Start marker ---
const startGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.02, 32);
const startMat = new THREE.MeshStandardMaterial({ color: 0x44FF44, emissive: 0x22AA22, emissiveIntensity: 0.3 });
const startMarker = new THREE.Mesh(startGeo, startMat);
startMarker.position.set(-4, 0.16, -4);
boardGroup.add(startMarker);

// --- Goal marker ---
const goalGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.02, 32);
const goalMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, emissive: 0xFFAA00, emissiveIntensity: 0.5 });
const goalMarker = new THREE.Mesh(goalGeo, goalMat);
goalMarker.position.set(4, 0.16, 4);
boardGroup.add(goalMarker);

// Goal glow ring
const goalRingGeo = new THREE.TorusGeometry(0.7, 0.05, 16, 32);
const goalRingMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, emissive: 0xFFD700, emissiveIntensity: 1 });
const goalRing = new THREE.Mesh(goalRingGeo, goalRingMat);
goalRing.rotation.x = -Math.PI / 2;
goalRing.position.set(4, 0.2, 4);
boardGroup.add(goalRing);

// --- Horse Trophy ---
let horseModel = null;
let horseLoaded = false;

// Create a placeholder trophy (golden horse-like shape)
const trophyGroup = new THREE.Group();
trophyGroup.position.set(4, 0.3, 4);
boardGroup.add(trophyGroup);

// Trophy base
const baseGeo = new THREE.CylinderGeometry(0.3, 0.35, 0.2, 16);
const trophyMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.9, roughness: 0.1 });
const trophyBase = new THREE.Mesh(baseGeo, trophyMat);
trophyBase.position.y = 0.1;
trophyGroup.add(trophyBase);

// Trophy body (horse-like)
const bodyGeo = new THREE.CapsuleGeometry(0.15, 0.3, 8, 16);
const trophyBody = new THREE.Mesh(bodyGeo, trophyMat);
trophyBody.position.y = 0.5;
trophyGroup.add(trophyBody);

// Trophy head
const headGeo = new THREE.SphereGeometry(0.12, 16, 16);
const trophyHead = new THREE.Mesh(headGeo, trophyMat);
trophyHead.position.set(0, 0.75, 0.1);
trophyGroup.add(trophyHead);

// Trophy neck
const neckGeo = new THREE.CylinderGeometry(0.06, 0.08, 0.2, 8);
const trophyNeck = new THREE.Mesh(neckGeo, trophyMat);
trophyNeck.position.set(0, 0.65, 0.05);
trophyNeck.rotation.x = -0.3;
trophyGroup.add(trophyNeck);

// Legs
for (let i = 0; i < 4; i++) {
  const legGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.25, 8);
  const leg = new THREE.Mesh(legGeo, trophyMat);
  const xOff = (i % 2 === 0 ? -1 : 1) * 0.08;
  const zOff = (i < 2 ? -1 : 1) * 0.1;
  leg.position.set(xOff, 0.25, zOff);
  trophyGroup.add(leg);
}

// Try loading horse.glb
const loader = new GLTFLoader();
loader.load('horse.glb', (gltf) => {
  horseModel = gltf.scene;
  horseModel.scale.set(0.005, 0.005, 0.005);
  horseModel.position.set(4, 0.5, 4);
  horseModel.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      child.material = trophyMat.clone();
    }
  });
  boardGroup.add(horseModel);
  horseLoaded = true;
  // Hide placeholder
  trophyGroup.visible = false;
}, undefined, (err) => {
  console.log('horse.glb not found, using placeholder trophy');
  horseLoaded = false;
});

// --- Marble ---
const marbleRadius = 0.3;
const marbleGeo = new THREE.SphereGeometry(marbleRadius, 32, 32);
const marbleMat = new THREE.MeshStandardMaterial({
  color: 0x4488FF,
  metalness: 0.8,
  roughness: 0.2,
  envMapIntensity: 1
});
const marble = new THREE.Mesh(marbleGeo, marbleMat);
marble.castShadow = true;
marble.position.set(-4, 0.45, -4);
boardGroup.add(marble);

// Marble trail effect
const trailParticles = [];

// --- Floor under board ---
const floorGeo = new THREE.PlaneGeometry(30, 30);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 1 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -2;
floor.receiveShadow = true;
scene.add(floor);

// --- Game State ---
let tiltX = 0;
let tiltZ = 0;
const maxTilt = Math.PI / 12;
let marbleVX = 0;
let marbleVZ = 0;
let marblePosX = -4;
let marblePosZ = -4;
let gameState = 'playing';
let elapsedTime = 0;
let timerStarted = false;
let timerStartTime = 0;
let resetCount = 0;
const gravity = 9.8;
const friction = 0.98;
const dt = 1 / 60;
const restitution = 0.3;

const keys = {};

// --- Input ---
document.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  if (e.key === 'r' || e.key === 'R') {
    resetGame();
  }
  if (!timerStarted && gameState === 'playing' && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
    timerStarted = true;
    timerStartTime = performance.now();
  }
  e.preventDefault();
});

document.addEventListener('keyup', (e) => {
  keys[e.key] = false;
});

document.getElementById('resetBtn').addEventListener('click', resetGame);

function resetGame() {
  tiltX = 0;
  tiltZ = 0;
  marbleVX = 0;
  marbleVZ = 0;
  marblePosX = -4;
  marblePosZ = -4;
  marble.position.set(-4, 0.45, -4);
  marble.visible = true;
  gameState = 'playing';
  timerStarted = false;
  elapsedTime = 0;
  resetCount++;
  document.getElementById('message').style.display = 'none';
  document.getElementById('message').textContent = '';
}

// --- Collision Detection ---
function checkWallCollisions() {
  const r = marbleRadius;

  for (const wall of walls) {
    const wMinX = wall.minX - r;
    const wMaxX = wall.maxX + r;
    const wMinZ = wall.minZ - r;
    const wMaxZ = wall.maxZ + r;

    if (marblePosX > wMinX && marblePosX < wMaxX && marblePosZ > wMinZ && marblePosZ < wMaxZ) {
      // Find closest edge
      const dLeft = marblePosX - wMinX;
      const dRight = wMaxX - marblePosX;
      const dTop = marblePosZ - wMinZ;
      const dBottom = wMaxZ - marblePosZ;

      const minD = Math.min(dLeft, dRight, dTop, dBottom);

      if (minD === dLeft) {
        marblePosX = wMinX;
        marbleVX = -marbleVX * restitution;
      } else if (minD === dRight) {
        marblePosX = wMaxX;
        marbleVX = -marbleVX * restitution;
      } else if (minD === dTop) {
        marblePosZ = wMinZ;
        marbleVZ = -marbleVZ * restitution;
      } else {
        marblePosZ = wMaxZ;
        marbleVZ = -marbleVZ * restitution;
      }
    }
  }
}

// --- HUD Elements ---
const timerDisplay = document.getElementById('timerDisplay');
const stateDisplay = document.getElementById('stateDisplay');
const tiltXDisplay = document.getElementById('tiltXDisplay');
const tiltZDisplay = document.getElementById('tiltZDisplay');
const marblePosDisplay = document.getElementById('marblePosDisplay');
const resetCountDisplay = document.getElementById('resetCountDisplay');
const messageDiv = document.getElementById('message');

// --- State ---
window.__3D_STATE__ = {
  marbleX: -4, marbleY: 0.45, marbleZ: -4,
  marbleVX: 0, marbleVZ: 0,
  tiltX: 0, tiltZ: 0,
  gameState: 'playing',
  elapsedTime: 0,
  resetCount: 0,
  horseLoaded: false,
  holeCount: 3,
  wallCount: internalWallCount,
  boardWidth: 12,
  boardDepth: 12,
  marbleRadius: 0.3,
  maxTilt: maxTilt
};

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();

  if (gameState === 'playing') {
    // Tilt controls
    if (keys['ArrowUp']) tiltX = Math.max(tiltX - 0.02, -maxTilt);
    if (keys['ArrowDown']) tiltX = Math.min(tiltX + 0.02, maxTilt);
    if (keys['ArrowLeft']) tiltZ = Math.min(tiltZ + 0.02, maxTilt);
    if (keys['ArrowRight']) tiltZ = Math.max(tiltZ - 0.02, -maxTilt);

    // Physics
    const ax = gravity * Math.sin(tiltZ);
    const az = gravity * Math.sin(tiltX);

    marbleVX += ax * dt;
    marbleVZ += az * dt;

    marbleVX *= friction;
    marbleVZ *= friction;

    marblePosX += marbleVX * dt;
    marblePosZ += marbleVZ * dt;

    // Wall collisions
    checkWallCollisions();

    // Board boundary (redundant with outer walls but safety)
    const boardHalf = 6 - marbleRadius - wallThickness;
    if (marblePosX < -boardHalf) { marblePosX = -boardHalf; marbleVX = -marbleVX * restitution; }
    if (marblePosX > boardHalf) { marblePosX = boardHalf; marbleVX = -marbleVX * restitution; }
    if (marblePosZ < -boardHalf) { marblePosZ = -boardHalf; marbleVZ = -marbleVZ * restitution; }
    if (marblePosZ > boardHalf) { marblePosZ = boardHalf; marbleVZ = -marbleVZ * restitution; }

    // Update marble position
    marble.position.x = marblePosX;
    marble.position.z = marblePosZ;
    marble.position.y = 0.15 + marbleRadius;

    // Marble rotation based on movement
    const speed = Math.sqrt(marbleVX * marbleVX + marbleVZ * marbleVZ);
    if (speed > 0.01) {
      const rotAxis = new THREE.Vector3(-marbleVZ, 0, marbleVX).normalize();
      const rotAngle = speed * dt / marbleRadius;
      marble.rotateOnWorldAxis(rotAxis, rotAngle);
    }

    // Check holes
    for (const hole of holePositions) {
      const dx = marblePosX - hole.x;
      const dz = marblePosZ - hole.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      if (dist < 0.5) {
        gameState = 'lost';
        messageDiv.textContent = 'You fell in a hole!';
        messageDiv.style.display = 'block';
        messageDiv.style.color = '#FF4444';
        messageDiv.style.textShadow = '0 0 20px rgba(255,68,68,0.8), 0 0 40px rgba(255,68,68,0.4)';
        marble.visible = false;
        break;
      }
    }

    // Check goal
    const gx = marblePosX - 4;
    const gz = marblePosZ - 4;
    const goalDist = Math.sqrt(gx * gx + gz * gz);
    if (goalDist < 0.8) {
      gameState = 'won';
      messageDiv.textContent = '🏆 You Win! 🏆';
      messageDiv.style.display = 'block';
      messageDiv.style.color = '#FFD700';
      messageDiv.style.textShadow = '0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,215,0,0.4)';
    }

    // Timer
    if (timerStarted) {
      elapsedTime = (performance.now() - timerStartTime) / 1000;
    }
  }

  // Apply tilt to board
  boardGroup.rotation.x = tiltX;
  boardGroup.rotation.z = tiltZ;

  // Rotate trophy
  if (horseModel) {
    horseModel.rotation.y += 0.5 * delta;
  }
  trophyGroup.rotation.y += 0.5 * delta;

  // Goal ring pulse
  const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.003);
  goalRingMat.emissiveIntensity = 0.5 + pulse;

  // Update HUD
  timerDisplay.textContent = elapsedTime.toFixed(1) + 's';
  stateDisplay.textContent = gameState === 'playing' ? 'Playing' : gameState === 'won' ? 'You Win!' : 'Lost!';
  stateDisplay.className = gameState === 'won' ? 'value won' : gameState === 'lost' ? 'value lost' : 'value';
  tiltXDisplay.textContent = (tiltX * 180 / Math.PI).toFixed(1) + '°';
  tiltZDisplay.textContent = (tiltZ * 180 / Math.PI).toFixed(1) + '°';
  marblePosDisplay.textContent = `(${marblePosX.toFixed(1)}, ${marblePosZ.toFixed(1)})`;
  resetCountDisplay.textContent = resetCount;

  // Update global state
  const worldPos = new THREE.Vector3();
  marble.getWorldPosition(worldPos);
  window.__3D_STATE__.marbleX = worldPos.x;
  window.__3D_STATE__.marbleY = worldPos.y;
  window.__3D_STATE__.marbleZ = worldPos.z;
  window.__3D_STATE__.marbleVX = marbleVX;
  window.__3D_STATE__.marbleVZ = marbleVZ;
  window.__3D_STATE__.tiltX = tiltX;
  window.__3D_STATE__.tiltZ = tiltZ;
  window.__3D_STATE__.gameState = gameState;
  window.__3D_STATE__.elapsedTime = elapsedTime;
  window.__3D_STATE__.resetCount = resetCount;
  window.__3D_STATE__.horseLoaded = horseLoaded;
  window.__3D_STATE__.holeCount = holePositions.length;
  window.__3D_STATE__.wallCount = internalWallCount;
  window.__3D_STATE__.boardWidth = 12;
  window.__3D_STATE__.boardDepth = 12;
  window.__3D_STATE__.marbleRadius = marbleRadius;
  window.__3D_STATE__.maxTilt = maxTilt;

  renderer.render(scene, camera);
}

animate();

// Handle resize
window.addEventListener('resize', () => {
  // Keep fixed size as specified
});
</script>
</body>
</html>
