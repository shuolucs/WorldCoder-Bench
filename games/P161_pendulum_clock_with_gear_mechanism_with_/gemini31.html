<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pendulum Clock</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: monospace;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #333;
            pointer-events: none;
        }
        #hud div {
            margin: 5px 0;
            font-size: 16px;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            border: 1px solid #444;
        }
        .control-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        button {
            background: #4a4e69;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: #9a8c98;
        }
        input[type=range] {
            cursor: pointer;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div id="timeDisplay">Simulated Time: 00:00</div>
        <div id="angleDisplay">Pendulum Angle: 0.00°</div>
    </div>
    <div id="controls">
        <div class="control-row">
            <label id="speedLabel" for="speedSlider">Time Scale: 1.0x</label>
            <input type="range" id="speedSlider" min="0" max="10" step="0.5" value="1">
        </div>
        <div class="control-row">
            <button id="pauseBtn">Pause</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';

        // --- State Management ---
        window.__3D_STATE__ = {
            pendulumAngle: 0,
            pendulumAngleDeg: 0,
            timeScale: 1,
            isPaused: false,
            elapsedSimTime: 0,
            minuteHandAngle: 0,
            hourHandAngle: 0,
            escapeWheelAngle: 0,
            gearCount: 3,
            isReset: false
        };

        let triggerReset = false;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // --- Clock Construction ---
        
        // 1. Clock Face
        const faceGeo = new THREE.CylinderGeometry(2, 2, 0.2, 64);
        faceGeo.rotateX(Math.PI / 2);
        const faceMat = new THREE.MeshStandardMaterial({ color: 0xf5e6ca, roughness: 0.7 });
        const clockFace = new THREE.Mesh(faceGeo, faceMat);
        clockFace.position.set(0, 2.5, 0);
        scene.add(clockFace);

        // Hour Markers
        const markerGeo = new THREE.BoxGeometry(0.08, 0.3, 0.05);
        const markerMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        for (let i = 0; i < 12; i++) {
            const angle = (i / 12) * Math.PI * 2;
            const marker = new THREE.Mesh(markerGeo, markerMat);
            const radius = 1.75;
            marker.position.set(Math.sin(angle) * radius, Math.cos(angle) * radius, 0.1);
            marker.rotation.z = -angle;
            clockFace.add(marker);
        }

        // 2 & 3. Hands
        const hourHandGeo = new THREE.BoxGeometry(0.08, 1.0, 0.05);
        hourHandGeo.translate(0, 0.5, 0);
        const hourHandMat = new THREE.MeshStandardMaterial({ color: 0x2c2c2c });
        const hourHand = new THREE.Mesh(hourHandGeo, hourHandMat);
        hourHand.position.set(0, 2.5, 0.15);
        scene.add(hourHand);

        const minuteHandGeo = new THREE.BoxGeometry(0.06, 1.4, 0.05);
        minuteHandGeo.translate(0, 0.7, 0);
        const minuteHandMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
        const minuteHand = new THREE.Mesh(minuteHandGeo, minuteHandMat);
        minuteHand.position.set(0, 2.5, 0.18);
        scene.add(minuteHand);

        // Center Pin
        const pinGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.1, 16);
        pinGeo.rotateX(Math.PI / 2);
        const pinMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const pin = new THREE.Mesh(pinGeo, pinMat);
        pin.position.set(0, 2.5, 0.2);
        scene.add(pin);

        // 4. Pendulum
        const pendulumGroup = new THREE.Group();
        pendulumGroup.position.set(0, 0.5, 0.3);
        scene.add(pendulumGroup);

        const rodGeo = new THREE.CylinderGeometry(0.03, 0.03, 2.5, 16);
        rodGeo.translate(0, -1.25, 0);
        const rodMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.2 });
        const rod = new THREE.Mesh(rodGeo, rodMat);
        pendulumGroup.add(rod);

        const bobGeo = new THREE.SphereGeometry(0.2, 32, 32);
        bobGeo.translate(0, -2.5, 0);
        const bobMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.9, roughness: 0.1 });
        const bob = new THREE.Mesh(bobGeo, bobMat);
        pendulumGroup.add(bob);

        // 5. Gear Mechanism
        function createGear(radius, teethCount, color) {
            const group = new THREE.Group();
            
            const bodyGeo = new THREE.CylinderGeometry(radius * 0.85, radius * 0.85, 0.05, 32);
            bodyGeo.rotateX(Math.PI / 2);
            const mat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.7, roughness: 0.3 });
            const body = new THREE.Mesh(bodyGeo, mat);
            group.add(body);

            const toothGeo = new THREE.BoxGeometry(radius * 0.25, radius * 0.3, 0.05);
            for (let i = 0; i < teethCount; i++) {
                const angle = (i / teethCount) * Math.PI * 2;
                const tooth = new THREE.Mesh(toothGeo, mat);
                tooth.position.set(Math.cos(angle) * radius * 0.9, Math.sin(angle) * radius * 0.9, 0);
                tooth.rotation.z = angle;
                group.add(tooth);
            }
            
            // Center hole
            const holeGeo = new THREE.CylinderGeometry(radius * 0.2, radius * 0.2, 0.06, 16);
            holeGeo.rotateX(Math.PI/2);
            const holeMat = new THREE.MeshBasicMaterial({color: 0x1a1a2e});
            const hole = new THREE.Mesh(holeGeo, holeMat);
            group.add(hole);

            return group;
        }

        const escapeWheel = createGear(0.4, 12, 0xb87333);
        escapeWheel.position.set(0, 1.0, 0.2);
        scene.add(escapeWheel);

        const minuteGear = createGear(0.3, 8, 0xcd7f32);
        minuteGear.position.set(-0.8, 1.5, 0.2);
        scene.add(minuteGear);

        const hourGear = createGear(0.5, 16, 0xa0522d);
        hourGear.position.set(0.8, 1.5, 0.2);
        scene.add(hourGear);

        // --- UI Controls ---
        const speedSlider = document.getElementById('speedSlider');
        const speedLabel = document.getElementById('speedLabel');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const timeDisplay = document.getElementById('timeDisplay');
        const angleDisplay = document.getElementById('angleDisplay');

        speedSlider.addEventListener('input', (e) => {
            window.__3D_STATE__.timeScale = parseFloat(e.target.value);
            speedLabel.textContent = `Time Scale: ${window.__3D_STATE__.timeScale.toFixed(1)}x`;
        });

        pauseBtn.addEventListener('click', () => {
            window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
            pauseBtn.textContent = window.__3D_STATE__.isPaused ? 'Play' : 'Pause';
        });

        resetBtn.addEventListener('click', () => {
            window.__3D_STATE__.elapsedSimTime = 0;
            triggerReset = true;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        const maxAngle = Math.PI / 12; // 15 degrees
        const omega = 2 * Math.PI; // 1 second period

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (!window.__3D_STATE__.isPaused) {
                window.__3D_STATE__.elapsedSimTime += delta * window.__3D_STATE__.timeScale;
            }

            const simTime = window.__3D_STATE__.elapsedSimTime;

            // Pendulum Physics
            const currentAngle = maxAngle * Math.cos(omega * simTime);
            pendulumGroup.rotation.z = currentAngle;

            // Hands
            // Minute hand: 1 rev per 60s
            const minAngle = - (simTime % 60) / 60 * 2 * Math.PI;
            minuteHand.rotation.z = minAngle;

            // Hour hand: 1 rev per 720s
            const hrAngle = - (simTime % 720) / 720 * 2 * Math.PI;
            hourHand.rotation.z = hrAngle;

            // Gears
            // Escape wheel: 1 tooth (PI/6) per full swing (1s)
            const escAngle = -simTime * (Math.PI / 6);
            escapeWheel.rotation.z = escAngle;

            // Hour gear rotates with hour hand speed
            const hGearAngle = -simTime / 720 * 2 * Math.PI;
            hourGear.rotation.z = hGearAngle;

            // Minute gear rotates 12x faster than hour gear, opposite direction
            const mGearAngle = simTime / 60 * 2 * Math.PI;
            minuteGear.rotation.z = mGearAngle;

            // Update HUD
            timeDisplay.textContent = `Simulated Time: ${formatTime(simTime)}`;
            const angleDeg = (currentAngle * 180 / Math.PI).toFixed(2);
            angleDisplay.textContent = `Pendulum Angle: ${angleDeg}°`;

            // Update State Object
            window.__3D_STATE__.pendulumAngle = currentAngle;
            window.__3D_STATE__.pendulumAngleDeg = parseFloat(angleDeg);
            window.__3D_STATE__.minuteHandAngle = minAngle;
            window.__3D_STATE__.hourHandAngle = hrAngle;
            window.__3D_STATE__.escapeWheelAngle = escAngle;
            
            if (triggerReset) {
                window.__3D_STATE__.isReset = true;
                triggerReset = false;
            } else {
                window.__3D_STATE__.isReset = false;
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
