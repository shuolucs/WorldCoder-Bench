<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Pendulum Clock</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: white;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      user-select: none;
    }

    #timeDisplay, #angleDisplay {
      margin: 4px 0;
      font-size: 18px;
      font-weight: 600;
    }

    #controls {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.08);
      padding: 10px 14px;
      border-radius: 12px;
      z-index: 10;
      user-select: none;
    }

    #controls label {
      font-size: 16px;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 180px;
    }

    button {
      border: none;
      background: #4e5d94;
      color: white;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #6476b8;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="timeDisplay">Simulated Time: 00:00</div>
    <div id="angleDisplay">Pendulum Angle: 0.00°</div>
  </div>

  <div id="controls">
    <label id="speedLabel" for="speedSlider">Time Scale: 1x</label>
    <input id="speedSlider" type="range" min="0" max="10" step="0.5" value="1" />
    <button id="pauseBtn">Pause</button>
    <button id="resetBtn">Reset</button>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 2, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const clockGroup = new THREE.Group();
    scene.add(clockGroup);

    const faceMat = new THREE.MeshStandardMaterial({ color: '#f5e6ca' });
    const faceGeom = new THREE.CylinderGeometry(2, 2, 0.2, 64);
    const clockFace = new THREE.Mesh(faceGeom, faceMat);
    clockFace.rotation.x = Math.PI / 2;
    clockFace.position.set(0, 2.5, 0);
    clockGroup.add(clockFace);

    const markerMat = new THREE.MeshStandardMaterial({ color: '#2c2c2c' });
    const markerGeom = new THREE.BoxGeometry(0.08, 0.3, 0.05);
    const markerRadius = 1.7;

    for (let i = 0; i < 12; i++) {
      const marker = new THREE.Mesh(markerGeom, markerMat);
      const angle = (i / 12) * Math.PI * 2;
      marker.position.set(
        Math.sin(angle) * markerRadius,
        2.5 + Math.cos(angle) * markerRadius,
        0.12
      );
      marker.rotation.z = -angle;
      clockGroup.add(marker);
    }

    const centerCap = new THREE.Mesh(
      new THREE.CylinderGeometry(0.08, 0.08, 0.08, 24),
      new THREE.MeshStandardMaterial({ color: '#333333' })
    );
    centerCap.rotation.x = Math.PI / 2;
    centerCap.position.set(0, 2.5, 0.16);
    clockGroup.add(centerCap);

    function createHand(width, length, depth, color, zOffset) {
      const pivot = new THREE.Group();
      pivot.position.set(0, 2.5, zOffset);

      const hand = new THREE.Mesh(
        new THREE.BoxGeometry(width, length, depth),
        new THREE.MeshStandardMaterial({ color })
      );
      hand.position.y = length / 2;
      pivot.add(hand);

      scene.add(pivot);
      return pivot;
    }

    const hourHandPivot = createHand(0.08, 1.0, 0.05, '#2c2c2c', 0.19);
    const minuteHandPivot = createHand(0.06, 1.4, 0.05, '#1a1a1a', 0.21);

    const pendulumPivot = new THREE.Group();
    pendulumPivot.position.set(0, 0.5, 0.3);
    scene.add(pendulumPivot);

    const rod = new THREE.Mesh(
      new THREE.CylinderGeometry(0.03, 0.03, 2.5, 16),
      new THREE.MeshStandardMaterial({ color: '#888888' })
    );
    rod.position.y = -1.25;
    pendulumPivot.add(rod);

    const bob = new THREE.Mesh(
      new THREE.SphereGeometry(0.2, 32, 32),
      new THREE.MeshStandardMaterial({ color: '#FFD700', metalness: 0.6, roughness: 0.35 })
    );
    bob.position.y = -2.5;
    pendulumPivot.add(bob);

    function createGear(radius, teethCount, color, position) {
      const gearGroup = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(radius * 0.78, radius * 0.78, 0.14, 48),
        new THREE.MeshStandardMaterial({ color, metalness: 0.5, roughness: 0.4 })
      );
      body.rotation.x = Math.PI / 2;
      gearGroup.add(body);

      const hub = new THREE.Mesh(
        new THREE.CylinderGeometry(radius * 0.18, radius * 0.18, 0.18, 24),
        new THREE.MeshStandardMaterial({ color: '#5a3a22', metalness: 0.4, roughness: 0.5 })
      );
      hub.rotation.x = Math.PI / 2;
      hub.position.z = 0.01;
      gearGroup.add(hub);

      const toothGeom = new THREE.BoxGeometry(radius * 0.16, radius * 0.18, 0.16);
      for (let i = 0; i < teethCount; i++) {
        const tooth = new THREE.Mesh(
          toothGeom,
          new THREE.MeshStandardMaterial({ color, metalness: 0.55, roughness: 0.35 })
        );
        const a = (i / teethCount) * Math.PI * 2;
        tooth.position.set(
          Math.cos(a) * radius,
          Math.sin(a) * radius,
          0
        );
        tooth.rotation.z = a;
        gearGroup.add(tooth);
      }

      gearGroup.position.copy(position);
      scene.add(gearGroup);
      return gearGroup;
    }

    const escapeWheel = createGear(0.4, 12, '#b87333', new THREE.Vector3(0, 1.0, 0.2));
    const minuteGear = createGear(0.3, 8, '#cd7f32', new THREE.Vector3(-0.8, 1.5, 0.2));
    const hourGear = createGear(0.5, 16, '#a0522d', new THREE.Vector3(0.8, 1.5, 0.2));

    const gearMeshes = [escapeWheel, minuteGear, hourGear];

    const speedSlider = document.getElementById('speedSlider');
    const speedLabel = document.getElementById('speedLabel');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const timeDisplay = document.getElementById('timeDisplay');
    const angleDisplay = document.getElementById('angleDisplay');

    let timeScale = parseFloat(speedSlider.value);
    let isPaused = false;
    let elapsedSimTime = 0;
    let isReset = false;

    const maxAngle = Math.PI / 12;
    const omega = 2 * Math.PI;

    let pendulumAngle = maxAngle;
    let pendulumAngleDeg = THREE.MathUtils.radToDeg(pendulumAngle);
    let minuteHandAngle = 0;
    let hourHandAngle = 0;
    let escapeWheelAngle = 0;

    function applyTransforms() {
      pendulumPivot.rotation.z = pendulumAngle;

      minuteHandPivot.rotation.z = -minuteHandAngle;
      hourHandPivot.rotation.z = -hourHandAngle;

      escapeWheel.rotation.z = escapeWheelAngle;
      minuteGear.rotation.z = -elapsedSimTime * (2 * Math.PI / 60);
      hourGear.rotation.z = elapsedSimTime * (2 * Math.PI / 720);
    }

    function updateHUD() {
      const totalSeconds = Math.floor(elapsedSimTime);
      const mm = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
      const ss = String(totalSeconds % 60).padStart(2, '0');
      timeDisplay.textContent = `Simulated Time: ${mm}:${ss}`;
      angleDisplay.textContent = `Pendulum Angle: ${pendulumAngleDeg.toFixed(2)}°`;
      speedLabel.textContent = `Time Scale: ${timeScale}x`;
    }

    function updateState() {
      window.__3D_STATE__ = {
        pendulumAngle,
        pendulumAngleDeg,
        timeScale,
        isPaused,
        elapsedSimTime,
        minuteHandAngle,
        hourHandAngle,
        escapeWheelAngle,
        gearCount: gearMeshes.length,
        isReset
      };
    }

    function resetSimulation() {
      elapsedSimTime = 0;
      pendulumAngle = maxAngle;
      pendulumAngleDeg = THREE.MathUtils.radToDeg(pendulumAngle);
      minuteHandAngle = 0;
      hourHandAngle = 0;
      escapeWheelAngle = 0;
      isReset = true;
      applyTransforms();
      updateHUD();
      updateState();
    }

    speedSlider.addEventListener('input', () => {
      timeScale = parseFloat(speedSlider.value);
    });

    pauseBtn.addEventListener('click', () => {
      isPaused = !isPaused;
      pauseBtn.textContent = isPaused ? 'Play' : 'Pause';
    });

    resetBtn.addEventListener('click', () => {
      resetSimulation();
    });

    const clock = new THREE.Clock();

    resetSimulation();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (!isPaused) {
        elapsedSimTime += delta * timeScale;

        pendulumAngle = maxAngle * Math.cos(omega * elapsedSimTime);
        pendulumAngleDeg = THREE.MathUtils.radToDeg(pendulumAngle);

        minuteHandAngle = elapsedSimTime * (2 * Math.PI / 60);
        hourHandAngle = elapsedSimTime * (2 * Math.PI / 720);

        const fullSwings = Math.floor(elapsedSimTime);
        escapeWheelAngle = fullSwings * (Math.PI / 6);
      }

      applyTransforms();
      updateHUD();
      updateState();

      renderer.render(scene, camera);

      if (isReset) isReset = false;
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
