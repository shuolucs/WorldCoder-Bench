<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Pendulum Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  
  #hud {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: #f5e6ca;
    z-index: 10;
  }
  #timeDisplay {
    font-size: 28px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,215,0,0.5);
    margin-bottom: 5px;
  }
  #angleDisplay {
    font-size: 16px;
    opacity: 0.8;
  }
  
  #controls {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 20px;
    background: rgba(0,0,0,0.6);
    padding: 15px 30px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    z-index: 10;
  }
  #controls label {
    color: #f5e6ca;
    font-size: 14px;
    white-space: nowrap;
  }
  #speedSlider {
    width: 180px;
    accent-color: #FFD700;
  }
  #controls button {
    padding: 8px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: all 0.2s;
  }
  #pauseBtn {
    background: #FFD700;
    color: #1a1a2e;
  }
  #pauseBtn:hover { background: #ffec80; }
  #resetBtn {
    background: #b87333;
    color: #fff;
  }
  #resetBtn:hover { background: #cd7f32; }
</style>
</head>
<body>

<div id="hud">
  <div id="timeDisplay">Simulated Time: 00:00</div>
  <div id="angleDisplay">Pendulum Angle: 0.00°</div>
</div>

<div id="controls">
  <label id="speedLabel">Time Scale: 1x</label>
  <input type="range" id="speedSlider" min="0" max="10" step="0.5" value="1">
  <button id="pauseBtn">Pause</button>
  <button id="resetBtn">Reset</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  // State
  window.__3D_STATE__ = {
    pendulumAngle: 0,
    pendulumAngleDeg: 0,
    timeScale: 1,
    isPaused: false,
    elapsedSimTime: 0,
    minuteHandAngle: 0,
    hourHandAngle: 0,
    escapeWheelAngle: 0,
    gearCount: 3,
    isReset: false
  };

  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 2, 8);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(5, 10, 5);
  dirLight.castShadow = true;
  scene.add(dirLight);

  // Helper function to create gear geometry
  function createGearGeometry(innerRadius, outerRadius, teethCount, depth) {
    const shape = new THREE.Shape();
    const toothHeight = outerRadius - innerRadius;
    const anglePerTooth = (Math.PI * 2) / teethCount;
    const toothWidth = anglePerTooth * 0.35;
    const gapWidth = anglePerTooth * 0.15;

    for (let i = 0; i < teethCount; i++) {
      const baseAngle = i * anglePerTooth;
      
      // Inner arc start
      const a0 = baseAngle + gapWidth;
      const a1 = baseAngle + gapWidth + toothWidth * 0.2;
      const a2 = baseAngle + gapWidth + toothWidth * 0.3;
      const a3 = baseAngle + gapWidth + toothWidth * 0.7;
      const a4 = baseAngle + gapWidth + toothWidth * 0.8;
      const a5 = baseAngle + anglePerTooth - gapWidth;

      if (i === 0) {
        shape.moveTo(Math.cos(a0) * innerRadius, Math.sin(a0) * innerRadius);
      } else {
        shape.lineTo(Math.cos(a0) * innerRadius, Math.sin(a0) * innerRadius);
      }
      
      shape.lineTo(Math.cos(a1) * innerRadius, Math.sin(a1) * innerRadius);
      shape.lineTo(Math.cos(a2) * outerRadius, Math.sin(a2) * outerRadius);
      shape.lineTo(Math.cos(a3) * outerRadius, Math.sin(a3) * outerRadius);
      shape.lineTo(Math.cos(a4) * innerRadius, Math.sin(a4) * innerRadius);
      shape.lineTo(Math.cos(a5) * innerRadius, Math.sin(a5) * innerRadius);
    }
    shape.closePath();

    // Add center hole
    const holePath = new THREE.Path();
    const holeRadius = innerRadius * 0.25;
    holePath.absarc(0, 0, holeRadius, 0, Math.PI * 2, true);
    shape.holes.push(holePath);

    const extrudeSettings = { depth: depth, bevelEnabled: false };
    return new THREE.ExtrudeGeometry(shape, extrudeSettings);
  }

  // ---- CLOCK FACE ----
  const clockFaceGeo = new THREE.CylinderGeometry(2, 2, 0.2, 64);
  const clockFaceMat = new THREE.MeshPhongMaterial({ color: 0xf5e6ca });
  const clockFace = new THREE.Mesh(clockFaceGeo, clockFaceMat);
  clockFace.rotation.x = Math.PI / 2;
  clockFace.position.set(0, 2.5, 0);
  scene.add(clockFace);

  // Clock face rim
  const rimGeo = new THREE.TorusGeometry(2, 0.08, 16, 64);
  const rimMat = new THREE.MeshPhongMaterial({ color: 0xb87333, shininess: 100 });
  const rim = new THREE.Mesh(rimGeo, rimMat);
  rim.position.set(0, 2.5, 0.1);
  scene.add(rim);

  // Hour markers
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
    const markerGeo = new THREE.BoxGeometry(0.08, 0.3, 0.05);
    const markerMat = new THREE.MeshPhongMaterial({ color: 0x2c2c2c });
    const marker = new THREE.Mesh(markerGeo, markerMat);
    
    const radius = 1.7;
    const x = Math.cos(angle) * radius;
    const y = Math.sin(angle) * radius;
    
    marker.position.set(x, y + 2.5, 0.13);
    marker.rotation.z = angle + Math.PI / 2;
    scene.add(marker);
  }

  // Center cap
  const centerCapGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.1, 16);
  const centerCapMat = new THREE.MeshPhongMaterial({ color: 0xFFD700, shininess: 100 });
  const centerCap = new THREE.Mesh(centerCapGeo, centerCapMat);
  centerCap.rotation.x = Math.PI / 2;
  centerCap.position.set(0, 2.5, 0.2);
  scene.add(centerCap);

  // ---- HOUR HAND ----
  const hourHandGroup = new THREE.Group();
  hourHandGroup.position.set(0, 2.5, 0.15);
  const hourHandGeo = new THREE.BoxGeometry(0.08, 1.0, 0.05);
  const hourHandMat = new THREE.MeshPhongMaterial({ color: 0x2c2c2c });
  const hourHand = new THREE.Mesh(hourHandGeo, hourHandMat);
  hourHand.position.y = 0.5; // pivot at base
  hourHandGroup.add(hourHand);
  scene.add(hourHandGroup);

  // ---- MINUTE HAND ----
  const minuteHandGroup = new THREE.Group();
  minuteHandGroup.position.set(0, 2.5, 0.18);
  const minuteHandGeo = new THREE.BoxGeometry(0.06, 1.4, 0.05);
  const minuteHandMat = new THREE.MeshPhongMaterial({ color: 0x1a1a1a });
  const minuteHand = new THREE.Mesh(minuteHandGeo, minuteHandMat);
  minuteHand.position.y = 0.7; // pivot at base
  minuteHandGroup.add(minuteHand);
  scene.add(minuteHandGroup);

  // ---- PENDULUM ----
  const pendulumGroup = new THREE.Group();
  pendulumGroup.position.set(0, 0.5, 0.3);

  const rodGeo = new THREE.CylinderGeometry(0.03, 0.03, 2.5, 8);
  const rodMat = new THREE.MeshPhongMaterial({ color: 0x888888, shininess: 80 });
  const rod = new THREE.Mesh(rodGeo, rodMat);
  rod.position.y = -1.25;
  pendulumGroup.add(rod);

  const bobGeo = new THREE.SphereGeometry(0.2, 32, 32);
  const bobMat = new THREE.MeshPhongMaterial({ color: 0xFFD700, shininess: 150 });
  const bob = new THREE.Mesh(bobGeo, bobMat);
  bob.position.y = -2.5;
  pendulumGroup.add(bob);

  scene.add(pendulumGroup);

  // ---- GEARS ----
  // Escape Wheel - 12 teeth
  const escapeWheelGeo = createGearGeometry(0.3, 0.4, 12, 0.06);
  const escapeWheelMat = new THREE.MeshPhongMaterial({ color: 0xb87333, shininess: 80 });
  const escapeWheel = new THREE.Mesh(escapeWheelGeo, escapeWheelMat);
  escapeWheel.position.set(0, 1.0, 0.2);
  scene.add(escapeWheel);

  // Minute Gear - 8 teeth
  const minuteGearGeo = createGearGeometry(0.2, 0.3, 8, 0.06);
  const minuteGearMat = new THREE.MeshPhongMaterial({ color: 0xcd7f32, shininess: 80 });
  const minuteGear = new THREE.Mesh(minuteGearGeo, minuteGearMat);
  minuteGear.position.set(-0.8, 1.5, 0.2);
  scene.add(minuteGear);

  // Hour Gear - 16 teeth
  const hourGearGeo = createGearGeometry(0.35, 0.5, 16, 0.06);
  const hourGearMat = new THREE.MeshPhongMaterial({ color: 0xa0522d, shininess: 80 });
  const hourGear = new THREE.Mesh(hourGearGeo, hourGearMat);
  hourGear.position.set(0.8, 1.5, 0.2);
  scene.add(hourGear);

  // Gear axles
  function createAxle(x, y, z) {
    const axleGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.15, 8);
    const axleMat = new THREE.MeshPhongMaterial({ color: 0x666666, shininess: 100 });
    const axle = new THREE.Mesh(axleGeo, axleMat);
    axle.rotation.x = Math.PI / 2;
    axle.position.set(x, y, z + 0.05);
    scene.add(axle);
  }
  createAxle(0, 1.0, 0.2);
  createAxle(-0.8, 1.5, 0.2);
  createAxle(0.8, 1.5, 0.2);

  // ---- CLOCK HOUSING (decorative) ----
  // Back plate
  const backPlateGeo = new THREE.BoxGeometry(3, 5, 0.1);
  const backPlateMat = new THREE.MeshPhongMaterial({ color: 0x3d2b1f });
  const backPlate = new THREE.Mesh(backPlateGeo, backPlateMat);
  backPlate.position.set(0, 1.0, -0.15);
  scene.add(backPlate);

  // Side columns
  for (let side = -1; side <= 1; side += 2) {
    const colGeo = new THREE.BoxGeometry(0.15, 5, 0.3);
    const colMat = new THREE.MeshPhongMaterial({ color: 0x4a3728 });
    const col = new THREE.Mesh(colGeo, colMat);
    col.position.set(side * 1.55, 1.0, 0);
    scene.add(col);
  }

  // Floor
  const floorGeo = new THREE.PlaneGeometry(20, 20);
  const floorMat = new THREE.MeshPhongMaterial({ color: 0x111122 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -2.2;
  scene.add(floor);

  // ---- SIMULATION STATE ----
  let timeScale = 1;
  let isPaused = false;
  let elapsedSimTime = 0;
  let simTime = 0; // for pendulum oscillation
  let escapeWheelAngle = 0;
  let lastPendulumSign = 1;
  let isReset = false;

  const maxAngle = Math.PI / 12; // 15 degrees
  const omega = 2 * Math.PI; // 1 second period

  // ---- CONTROLS ----
  const speedSlider = document.getElementById('speedSlider');
  const speedLabel = document.getElementById('speedLabel');
  const pauseBtn = document.getElementById('pauseBtn');
  const resetBtn = document.getElementById('resetBtn');
  const timeDisplay = document.getElementById('timeDisplay');
  const angleDisplay = document.getElementById('angleDisplay');

  speedSlider.addEventListener('input', () => {
    timeScale = parseFloat(speedSlider.value);
    speedLabel.textContent = `Time Scale: ${timeScale}x`;
  });

  pauseBtn.addEventListener('click', () => {
    isPaused = !isPaused;
    pauseBtn.textContent = isPaused ? 'Play' : 'Pause';
  });

  resetBtn.addEventListener('click', () => {
    elapsedSimTime = 0;
    simTime = 0;
    escapeWheelAngle = 0;
    lastPendulumSign = 1;
    isReset = true;
  });

  // ---- ANIMATION ----
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    if (!isPaused) {
      const dt = delta * timeScale;
      elapsedSimTime += dt;
      simTime += dt;
    }

    // Pendulum motion
    const pendulumAngle = maxAngle * Math.cos(omega * simTime);
    pendulumGroup.rotation.z = pendulumAngle;

    // Detect zero crossings for escape wheel advancement
    const currentSign = Math.sign(Math.cos(omega * simTime));
    if (currentSign !== lastPendulumSign && currentSign !== 0 && !isPaused) {
      escapeWheelAngle += Math.PI / 12; // one tooth per half swing
    }
    lastPendulumSign = currentSign || lastPendulumSign;

    // Escape wheel rotation (smooth interpolation toward target)
    escapeWheel.rotation.z = escapeWheelAngle;

    // Minute gear rotates linked to escape wheel, faster
    minuteGear.rotation.z = -escapeWheelAngle * 2.5;

    // Hour gear rotates 12x slower than minute gear
    hourGear.rotation.z = escapeWheelAngle * 2.5 / 12;

    // Hand rotations based on elapsed simulated time
    // Minute hand: 1 revolution per 60 simulated seconds
    const minuteHandAngle = -(elapsedSimTime / 60) * Math.PI * 2;
    minuteHandGroup.rotation.z = minuteHandAngle;

    // Hour hand: 1 revolution per 720 simulated seconds (12 minutes)
    const hourHandAngle = -(elapsedSimTime / 720) * Math.PI * 2;
    hourHandGroup.rotation.z = hourHandAngle;

    // Update HUD
    const totalSeconds = Math.floor(elapsedSimTime);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    const mm = String(minutes).padStart(2, '0');
    const ss = String(seconds).padStart(2, '0');
    timeDisplay.textContent = `Simulated Time: ${mm}:${ss}`;

    const angleDeg = (pendulumAngle * 180 / Math.PI);
    angleDisplay.textContent = `Pendulum Angle: ${angleDeg.toFixed(2)}°`;

    // Update state
    window.__3D_STATE__.pendulumAngle = pendulumAngle;
    window.__3D_STATE__.pendulumAngleDeg = angleDeg;
    window.__3D_STATE__.timeScale = timeScale;
    window.__3D_STATE__.isPaused = isPaused;
    window.__3D_STATE__.elapsedSimTime = elapsedSimTime;
    window.__3D_STATE__.minuteHandAngle = minuteHandAngle;
    window.__3D_STATE__.hourHandAngle = hourHandAngle;
    window.__3D_STATE__.escapeWheelAngle = escapeWheelAngle;
    window.__3D_STATE__.gearCount = 3;
    window.__3D_STATE__.isReset = isReset;
    
    if (isReset) {
      isReset = false;
    }

    renderer.render(scene, camera);
  }

  animate();

  // Handle resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
</script>
</body>
</html>
