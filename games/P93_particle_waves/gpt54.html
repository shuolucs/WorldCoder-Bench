<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 10000 粒子波浪动画</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #0b1020;
      color: #fff;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      width: 320px;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(10, 14, 28, 0.78);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.12);
    }

    #ui h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .group {
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .group:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .row {
      display: grid;
      grid-template-columns: 80px 1fr 52px;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
      font-size: 13px;
    }

    input[type="range"] {
      width: 100%;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      line-height: 1.45;
    }

    .badge {
      display: inline-block;
      margin-top: 6px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      font-size: 12px;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app"></div>

  <div id="ui">
    <h2>粒子波浪控制</h2>

    <div class="group">
      <div class="row">
        <label for="wave1Amp">Wave1 振幅</label>
        <input id="wave1Amp" type="range" min="0" max="2" step="0.01" value="0.7">
        <span id="wave1AmpVal">0.70</span>
      </div>
      <div class="row">
        <label for="wave1Freq">Wave1 频率</label>
        <input id="wave1Freq" type="range" min="0.1" max="3" step="0.01" value="0.35">
        <span id="wave1FreqVal">0.35</span>
      </div>
    </div>

    <div class="group">
      <div class="row">
        <label for="wave2Amp">Wave2 振幅</label>
        <input id="wave2Amp" type="range" min="0" max="2" step="0.01" value="0.6">
        <span id="wave2AmpVal">0.60</span>
      </div>
      <div class="row">
        <label for="wave2Freq">Wave2 频率</label>
        <input id="wave2Freq" type="range" min="0.1" max="3" step="0.01" value="0.5">
        <span id="wave2FreqVal">0.50</span>
      </div>
    </div>

    <div class="group">
      <div class="row">
        <label for="wave3Amp">Wave3 振幅</label>
        <input id="wave3Amp" type="range" min="0" max="2" step="0.01" value="0.45">
        <span id="wave3AmpVal">0.45</span>
      </div>
      <div class="row">
        <label for="wave3Freq">Wave3 频率</label>
        <input id="wave3Freq" type="range" min="0.1" max="3" step="0.01" value="0.8">
        <span id="wave3FreqVal">0.80</span>
      </div>
    </div>

    <div class="group">
      <div class="row">
        <label for="speed">速度</label>
        <input id="speed" type="range" min="0" max="3" step="0.01" value="1.0">
        <span id="speedVal">1.00</span>
      </div>
      <div class="hint">
        振幅范围：0–2，频率范围：0.1–3，速度范围：0–3。<br>
        鼠标移动到粒子平面上，可对局部区域产生凸起/下陷扰动。<br>
        左键旋转，右键平移，滚轮缩放。
      </div>
      <div class="badge">粒子数：100 × 100 = 10,000</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('app');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x08111f);
    scene.fog = new THREE.Fog(0x08111f, 80, 180);

    const camera = new THREE.PerspectiveCamera(
      55,
      window.innerWidth / window.innerHeight,
      0.1,
      500
    );
    camera.position.set(0, 24, 36);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 0.9);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(15, 25, 10);
    scene.add(dirLight);

    const gridSize = 100;
    const particleCount = gridSize * gridSize;
    const spacing = 0.35;
    const half = ((gridSize - 1) * spacing) / 2;

    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const baseXZ = new Float32Array(particleCount * 2);

    let ptr = 0;
    let ptr2 = 0;
    for (let iz = 0; iz < gridSize; iz++) {
      for (let ix = 0; ix < gridSize; ix++) {
        const x = ix * spacing - half;
        const z = iz * spacing - half;

        positions[ptr] = x;
        positions[ptr + 1] = 0;
        positions[ptr + 2] = z;

        baseXZ[ptr2] = x;
        baseXZ[ptr2 + 1] = z;

        colors[ptr] = 1;
        colors[ptr + 1] = 1;
        colors[ptr + 2] = 1;

        ptr += 3;
        ptr2 += 2;
      }
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 0.18,
      vertexColors: true,
      transparent: true,
      opacity: 0.95,
      sizeAttenuation: true
    });

    const points = new THREE.Points(geometry, material);
    scene.add(points);

    const plane = new THREE.Mesh(
      new THREE.PlaneGeometry(gridSize * spacing, gridSize * spacing),
      new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide })
    );
    plane.rotation.x = -Math.PI / 2;
    scene.add(plane);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const pointerWorld = new THREE.Vector3();
    let hasPointer = false;

    const params = {
      wave1Amp: document.getElementById('wave1Amp'),
      wave1Freq: document.getElementById('wave1Freq'),
      wave2Amp: document.getElementById('wave2Amp'),
      wave2Freq: document.getElementById('wave2Freq'),
      wave3Amp: document.getElementById('wave3Amp'),
      wave3Freq: document.getElementById('wave3Freq'),
      speed: document.getElementById('speed')
    };

    const labels = {
      wave1Amp: document.getElementById('wave1AmpVal'),
      wave1Freq: document.getElementById('wave1FreqVal'),
      wave2Amp: document.getElementById('wave2AmpVal'),
      wave2Freq: document.getElementById('wave2FreqVal'),
      wave3Amp: document.getElementById('wave3AmpVal'),
      wave3Freq: document.getElementById('wave3FreqVal'),
      speed: document.getElementById('speedVal')
    };

    function updateLabels() {
      for (const key in params) {
        labels[key].textContent = Number(params[key].value).toFixed(2);
      }
    }
    updateLabels();

    Object.values(params).forEach(el => {
      el.addEventListener('input', updateLabels);
    });

    const lowColor = new THREE.Color(0x1e5bff);
    const midColor = new THREE.Color(0xffffff);
    const highColor = new THREE.Color(0xff3b30);

    const tempColor = new THREE.Color();
    const clock = new THREE.Clock();

    const p1 = 0.0;
    const p2 = Math.PI * 0.65;
    const p3 = Math.PI * 1.2;

    function mapHeightToColor(h, minH, maxH) {
      const range = Math.max(0.0001, maxH - minH);
      const n = (h - minH) / range;

      if (n < 0.5) {
        tempColor.copy(lowColor).lerp(midColor, n / 0.5);
      } else {
        tempColor.copy(midColor).lerp(highColor, (n - 0.5) / 0.5);
      }
      return tempColor;
    }

    function updatePointerFromEvent(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(plane);

      if (intersects.length > 0) {
        pointerWorld.copy(intersects[0].point);
        hasPointer = true;
      } else {
        hasPointer = false;
      }
    }

    renderer.domElement.addEventListener('pointermove', updatePointerFromEvent);
    renderer.domElement.addEventListener('pointerleave', () => {
      hasPointer = false;
    });

    window.__3D_STATE__ = {
      particleCount,
      wave1: { amp: Number(params.wave1Amp.value), freq: Number(params.wave1Freq.value) },
      wave2: { amp: Number(params.wave2Amp.value), freq: Number(params.wave2Freq.value) },
      wave3: { amp: Number(params.wave3Amp.value), freq: Number(params.wave3Freq.value) },
      speed: Number(params.speed.value),
      maxHeight: 0,
      minHeight: 0
    };

    function animate() {
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();
      const speed = Number(params.speed.value);

      const a1 = Number(params.wave1Amp.value);
      const f1 = Number(params.wave1Freq.value);

      const a2 = Number(params.wave2Amp.value);
      const f2 = Number(params.wave2Freq.value);

      const a3 = Number(params.wave3Amp.value);
      const f3 = Number(params.wave3Freq.value);

      const timePhase = t * speed;

      let minH = Infinity;
      let maxH = -Infinity;

      const radius = 4.2;
      const radiusSq = radius * radius;
      const pointerStrength = 1.25 * Math.sin(t * 2.0);

      for (let i = 0; i < particleCount; i++) {
        const x = baseXZ[i * 2];
        const z = baseXZ[i * 2 + 1];

        let h =
          a1 * Math.sin(f1 * x + p1 + timePhase) +
          a2 * Math.sin(f2 * z + p2 + timePhase) +
          a3 * Math.sin(f3 * (x + z) + p3 + timePhase);

        if (hasPointer) {
          const dx = x - pointerWorld.x;
          const dz = z - pointerWorld.z;
          const distSq = dx * dx + dz * dz;
          if (distSq < radiusSq) {
            const dist = Math.sqrt(distSq);
            const falloff = 1.0 - dist / radius;
            h += pointerStrength * falloff * falloff;
          }
        }

        positions[i * 3 + 1] = h;

        if (h < minH) minH = h;
        if (h > maxH) maxH = h;
      }

      for (let i = 0; i < particleCount; i++) {
        const h = positions[i * 3 + 1];
        const c = mapHeightToColor(h, minH, maxH);
        colors[i * 3] = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;
      }

      geometry.attributes.position.needsUpdate = true;
      geometry.attributes.color.needsUpdate = true;

      window.__3D_STATE__ = {
        particleCount,
        wave1: { amp: a1, freq: f1 },
        wave2: { amp: a2, freq: f2 },
        wave3: { amp: a3, freq: f3 },
        speed,
        maxHeight: maxH,
        minHeight: minH
      };

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
