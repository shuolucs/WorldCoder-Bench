<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 10000 Particles Wave</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #ui-container {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(20, 20, 20, 0.85);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            user-select: none;
        }
        h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }
        .control-group {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 280px;
        }
        label {
            font-size: 13px;
            width: 100px;
        }
        input[type="range"] {
            width: 130px;
            cursor: pointer;
        }
        .val-display {
            width: 30px;
            text-align: right;
            font-size: 12px;
            color: #888;
        }
        .divider {
            height: 1px;
            background: #444;
            margin: 15px 0;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>

    <div id="ui-container">
        <h3>Wave Controls</h3>
        
        <div class="control-group">
            <label>Wave 1 Amp</label>
            <input type="range" id="wave1Amp" min="0" max="5" step="0.1" value="1.5">
            <span class="val-display" id="val-wave1Amp">1.5</span>
        </div>
        <div class="control-group">
            <label>Wave 1 Freq</label>
            <input type="range" id="wave1Freq" min="0.1" max="1" step="0.01" value="0.3">
            <span class="val-display" id="val-wave1Freq">0.3</span>
        </div>
        
        <div class="divider"></div>
        
        <div class="control-group">
            <label>Wave 2 Amp</label>
            <input type="range" id="wave2Amp" min="0" max="5" step="0.1" value="1.0">
            <span class="val-display" id="val-wave2Amp">1.0</span>
        </div>
        <div class="control-group">
            <label>Wave 2 Freq</label>
            <input type="range" id="wave2Freq" min="0.1" max="1" step="0.01" value="0.4">
            <span class="val-display" id="val-wave2Freq">0.4</span>
        </div>

        <div class="divider"></div>

        <div class="control-group">
            <label>Wave 3 Amp</label>
            <input type="range" id="wave3Amp" min="0" max="5" step="0.1" value="0.8">
            <span class="val-display" id="val-wave3Amp">0.8</span>
        </div>
        <div class="control-group">
            <label>Wave 3 Freq</label>
            <input type="range" id="wave3Freq" min="0.1" max="1" step="0.01" value="0.2">
            <span class="val-display" id="val-wave3Freq">0.2</span>
        </div>

        <div class="divider"></div>

        <div class="control-group">
            <label>Speed</label>
            <input type="range" id="speed" min="0" max="5" step="0.1" value="1.5">
            <span class="val-display" id="val-speed">1.5</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Setup Scene, Camera, Renderer ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 25, 45);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // --- Particles Setup ---
        const gridSize = 100;
        const particleCount = gridSize * gridSize;
        const spacing = 0.6;
        const offset = (gridSize * spacing) / 2;

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        // Initialize grid positions
        for (let i = 0; i < gridSize; i++) {
            for (let j = 0; j < gridSize; j++) {
                const index = (i * gridSize + j) * 3;
                positions[index] = i * spacing - offset;     // x
                positions[index + 1] = 0;                    // y
                positions[index + 2] = j * spacing - offset; // z
            }
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // Create a circular texture for points
        const canvas = document.createElement('canvas');
        canvas.width = 32;
        canvas.height = 32;
        const ctx = canvas.getContext('2d');
        ctx.beginPath();
        ctx.arc(16, 16, 14, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        const texture = new THREE.CanvasTexture(canvas);

        const material = new THREE.PointsMaterial({
            size: 0.35,
            vertexColors: true,
            map: texture,
            transparent: true,
            alphaTest: 0.1,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // --- Mouse Interaction Setup ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(-2, -2); // Start offscreen
        const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        const intersectionPoint = new THREE.Vector3();
        let isMouseOver = false;

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            isMouseOver = true;
        });
        window.addEventListener('mouseout', () => {
            isMouseOver = false;
        });

        // --- UI Sync ---
        const uiElements = ['wave1Amp', 'wave1Freq', 'wave2Amp', 'wave2Freq', 'wave3Amp', 'wave3Freq', 'speed'];
        const params = {};
        
        uiElements.forEach(id => {
            const el = document.getElementById(id);
            const valEl = document.getElementById(`val-${id}`);
            params[id] = parseFloat(el.value);
            el.addEventListener('input', (e) => {
                params[id] = parseFloat(e.target.value);
                valEl.textContent = params[id].toFixed(id.includes('Freq') ? 2 : 1);
            });
        });

        // --- Animation Loop ---
        let time = 0;
        const colorLow = new THREE.Color(0x0044ff); // Blue
        const colorMid = new THREE.Color(0xffffff); // White
        const colorHigh = new THREE.Color(0xff0044); // Red
        const tempColor = new THREE.Color();

        function animate() {
            requestAnimationFrame(animate);

            time += 0.016 * params.speed;

            // Update Raycaster
            let hitValid = false;
            if (isMouseOver) {
                raycaster.setFromCamera(mouse, camera);
                if (raycaster.ray.intersectPlane(plane, intersectionPoint)) {
                    hitValid = true;
                }
            }

            const posAttr = geometry.attributes.position;
            const colAttr = geometry.attributes.color;
            const posArray = posAttr.array;
            const colArray = colAttr.array;

            let minHeight = Infinity;
            let maxHeight = -Infinity;

            // Pass 1: Calculate Heights and find Min/Max
            for (let i = 0; i < particleCount; i++) {
                const idx = i * 3;
                const x = posArray[idx];
                const z = posArray[idx + 2];

                // Wave Math: h = A1*sin(f1*x + p1 + t*v) + A2*sin(f2*z + p2 + t*v) + A3*sin(f3*(x+z) + p3 + t*v)
                let y = params.wave1Amp * Math.sin(params.wave1Freq * x + 0 + time) +
                        params.wave2Amp * Math.sin(params.wave2Freq * z + 2.0 + time) +
                        params.wave3Amp * Math.sin(params.wave3Freq * (x + z) + 4.0 + time);

                // Mouse Disturbance (Depression)
                if (hitValid) {
                    const dx = x - intersectionPoint.x;
                    const dz = z - intersectionPoint.z;
                    const distSq = dx * dx + dz * dz;
                    const radiusSq = 64; // Radius = 8
                    if (distSq < radiusSq) {
                        // Gaussian falloff
                        const influence = Math.exp(-distSq / (radiusSq * 0.3));
                        y -= influence * 4.0; 
                    }
                }

                posArray[idx + 1] = y;

                if (y < minHeight) minHeight = y;
                if (y > maxHeight) maxHeight = y;
            }

            // Pass 2: Map Colors based on dynamic Min/Max
            const heightRange = maxHeight - minHeight || 1; // Prevent division by zero

            for (let i = 0; i < particleCount; i++) {
                const idx = i * 3;
                const y = posArray[idx + 1];
                
                // Normalize height to 0.0 - 1.0
                const normalizedHeight = (y - minHeight) / heightRange;

                // Color mapping: Low(Blue) -> Mid(White) -> High(Red)
                if (normalizedHeight < 0.5) {
                    const t = normalizedHeight * 2.0; // 0 to 1
                    tempColor.lerpColors(colorLow, colorMid, t);
                } else {
                    const t = (normalizedHeight - 0.5) * 2.0; // 0 to 1
                    tempColor.lerpColors(colorMid, colorHigh, t);
                }

                colArray[idx] = tempColor.r;
                colArray[idx + 1] = tempColor.g;
                colArray[idx + 2] = tempColor.b;
            }

            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;

            // --- State Exposure ---
            window.__3D_STATE__ = {
                particleCount: particleCount,
                wave1: { amp: params.wave1Amp, freq: params.wave1Freq },
                wave2: { amp: params.wave2Amp, freq: params.wave2Freq },
                wave3: { amp: params.wave3Amp, freq: params.wave3Freq },
                speed: params.speed,
                maxHeight: maxHeight,
                minHeight: minHeight
            };

            controls.update();
            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        animate();
    </script>
</body>
</html>
