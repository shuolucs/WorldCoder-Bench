<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10,000 Particle Wave Animation</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #controls {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(10, 10, 30, 0.88);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 20px;
    color: #e0e0f0;
    width: 280px;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }

  #controls h2 {
    font-size: 16px;
    margin-bottom: 16px;
    text-align: center;
    color: #fff;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .control-group {
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }

  .control-group:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }

  .group-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .wave1-color { color: #ff6b6b; }
  .wave2-color { color: #4ecdc4; }
  .wave3-color { color: #ffe66d; }
  .speed-color { color: #a29bfe; }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .control-row {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    gap: 8px;
  }

  .control-row label {
    font-size: 11px;
    color: #aaa;
    width: 40px;
    flex-shrink: 0;
  }

  .control-row input[type="range"] {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 2px;
    outline: none;
  }

  .control-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
  }

  .control-row .value {
    font-size: 11px;
    color: #ccc;
    width: 32px;
    text-align: right;
    flex-shrink: 0;
    font-family: monospace;
  }

  #info {
    position: fixed;
    bottom: 16px;
    left: 16px;
    background: rgba(10, 10, 30, 0.75);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    padding: 12px 16px;
    color: #888;
    font-size: 11px;
    z-index: 100;
    font-family: monospace;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="controls">
  <h2>🌊 Wave Controls</h2>

  <div class="control-group">
    <div class="group-title wave1-color"><span class="dot" style="background:#ff6b6b"></span> Wave 1 (X-axis)</div>
    <div class="control-row">
      <label>Amp</label>
      <input type="range" id="wave1Amp" min="0" max="2" step="0.01" value="1.0">
      <span class="value" id="wave1AmpVal">1.00</span>
    </div>
    <div class="control-row">
      <label>Freq</label>
      <input type="range" id="wave1Freq" min="0.1" max="3" step="0.01" value="0.8">
      <span class="value" id="wave1FreqVal">0.80</span>
    </div>
  </div>

  <div class="control-group">
    <div class="group-title wave2-color"><span class="dot" style="background:#4ecdc4"></span> Wave 2 (Z-axis)</div>
    <div class="control-row">
      <label>Amp</label>
      <input type="range" id="wave2Amp" min="0" max="2" step="0.01" value="0.8">
      <span class="value" id="wave2AmpVal">0.80</span>
    </div>
    <div class="control-row">
      <label>Freq</label>
      <input type="range" id="wave2Freq" min="0.1" max="3" step="0.01" value="1.2">
      <span class="value" id="wave2FreqVal">1.20</span>
    </div>
  </div>

  <div class="control-group">
    <div class="group-title wave3-color"><span class="dot" style="background:#ffe66d"></span> Wave 3 (Diagonal)</div>
    <div class="control-row">
      <label>Amp</label>
      <input type="range" id="wave3Amp" min="0" max="2" step="0.01" value="0.5">
      <span class="value" id="wave3AmpVal">0.50</span>
    </div>
    <div class="control-row">
      <label>Freq</label>
      <input type="range" id="wave3Freq" min="0.1" max="3" step="0.01" value="0.6">
      <span class="value" id="wave3FreqVal">0.60</span>
    </div>
  </div>

  <div class="control-group">
    <div class="group-title speed-color"><span class="dot" style="background:#a29bfe"></span> Animation Speed</div>
    <div class="control-row">
      <label>Speed</label>
      <input type="range" id="speed" min="0" max="3" step="0.01" value="1.0">
      <span class="value" id="speedVal">1.00</span>
    </div>
  </div>
</div>

<div id="info">
  Particles: 10,000 | Hover to disturb surface<br>
  <span id="heightInfo">Height range: ...</span>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Scene Setup ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.008);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(55, 40, 55);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);
controls.minDistance = 20;
controls.maxDistance = 200;

// ─── Particle Grid ───
const GRID = 100;
const COUNT = GRID * GRID; // 10000
const HALF = (GRID - 1) / 2;

const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(COUNT * 3);
const colors = new Float32Array(COUNT * 3);
const basePositions = new Float32Array(COUNT * 2); // store x, z

for (let i = 0; i < GRID; i++) {
  for (let j = 0; j < GRID; j++) {
    const idx = i * GRID + j;
    const x = (i - HALF) * 0.6;
    const z = (j - HALF) * 0.6;
    positions[idx * 3] = x;
    positions[idx * 3 + 1] = 0;
    positions[idx * 3 + 2] = z;
    basePositions[idx * 2] = x;
    basePositions[idx * 2 + 1] = z;
    colors[idx * 3] = 1;
    colors[idx * 3 + 1] = 1;
    colors[idx * 3 + 2] = 1;
  }
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

// Custom shader material for nice round particles with glow
const particleMaterial = new THREE.ShaderMaterial({
  vertexShader: `
    attribute vec3 color;
    varying vec3 vColor;
    varying float vAlpha;
    uniform float uPointSize;
    void main() {
      vColor = color;
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = uPointSize * (80.0 / -mvPosition.z);
      gl_PointSize = clamp(gl_PointSize, 1.0, 12.0);
      vAlpha = smoothstep(200.0, 20.0, -mvPosition.z);
      gl_Position = projectionMatrix * mvPosition;
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    varying float vAlpha;
    void main() {
      float d = length(gl_PointCoord - vec2(0.5));
      if (d > 0.5) discard;
      float alpha = smoothstep(0.5, 0.1, d) * (0.6 + 0.4 * vAlpha);
      gl_FragColor = vec4(vColor, alpha);
    }
  `,
  uniforms: {
    uPointSize: { value: 3.0 }
  },
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});

const particles = new THREE.Points(geometry, particleMaterial);
scene.add(particles);

// ─── Subtle grid helper ───
const gridHelper = new THREE.GridHelper(60, 30, 0x1a1a3a, 0x111128);
gridHelper.position.y = -4;
scene.add(gridHelper);

// ─── Mouse Interaction ───
const mouse = new THREE.Vector2(9999, 9999);
const raycaster = new THREE.Raycaster();
const intersectPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const mouseWorld = new THREE.Vector3(9999, 0, 9999);
let mouseActive = false;

renderer.domElement.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  mouseActive = true;

  raycaster.setFromCamera(mouse, camera);
  const target = new THREE.Vector3();
  raycaster.ray.intersectPlane(intersectPlane, target);
  if (target) {
    mouseWorld.copy(target);
  }
});

renderer.domElement.addEventListener('mouseleave', () => {
  mouseActive = false;
  mouseWorld.set(9999, 0, 9999);
});

// ─── Slider Bindings ───
const sliders = {
  wave1Amp: document.getElementById('wave1Amp'),
  wave1Freq: document.getElementById('wave1Freq'),
  wave2Amp: document.getElementById('wave2Amp'),
  wave2Freq: document.getElementById('wave2Freq'),
  wave3Amp: document.getElementById('wave3Amp'),
  wave3Freq: document.getElementById('wave3Freq'),
  speed: document.getElementById('speed'),
};

const valDisplays = {
  wave1Amp: document.getElementById('wave1AmpVal'),
  wave1Freq: document.getElementById('wave1FreqVal'),
  wave2Amp: document.getElementById('wave2AmpVal'),
  wave2Freq: document.getElementById('wave2FreqVal'),
  wave3Amp: document.getElementById('wave3AmpVal'),
  wave3Freq: document.getElementById('wave3FreqVal'),
  speed: document.getElementById('speedVal'),
};

function getParams() {
  return {
    w1a: parseFloat(sliders.wave1Amp.value),
    w1f: parseFloat(sliders.wave1Freq.value),
    w2a: parseFloat(sliders.wave2Amp.value),
    w2f: parseFloat(sliders.wave2Freq.value),
    w3a: parseFloat(sliders.wave3Amp.value),
    w3f: parseFloat(sliders.wave3Freq.value),
    spd: parseFloat(sliders.speed.value),
  };
}

// Update value displays
Object.keys(sliders).forEach(key => {
  sliders[key].addEventListener('input', () => {
    valDisplays[key].textContent = parseFloat(sliders[key].value).toFixed(2);
  });
});

// ─── Color Helpers ───
const colorLow = new THREE.Color(0x1a6bff);   // blue
const colorMid = new THREE.Color(0xeeeeff);   // white
const colorHigh = new THREE.Color(0xff3344);   // red

function heightToColor(h, minH, maxH, target) {
  const range = maxH - minH;
  if (range < 0.001) {
    target.copy(colorMid);
    return;
  }
  const t = (h - minH) / range; // 0..1
  if (t < 0.5) {
    target.copy(colorLow).lerp(colorMid, t * 2);
  } else {
    target.copy(colorMid).lerp(colorHigh, (t - 0.5) * 2);
  }
}

// ─── State ───
window.__3D_STATE__ = {
  particleCount: COUNT,
  wave1: { amp: 1.0, freq: 0.8 },
  wave2: { amp: 0.8, freq: 1.2 },
  wave3: { amp: 0.5, freq: 0.6 },
  speed: 1.0,
  maxHeight: 0,
  minHeight: 0,
};

// ─── Animation ───
let time = 0;
const clock = new THREE.Clock();
const tempColor = new THREE.Color();
const heightInfoEl = document.getElementById('heightInfo');

const MOUSE_RADIUS = 8.0;
const MOUSE_STRENGTH = -3.0;

// Phase offsets for visual interest
const P1 = 0.0;
const P2 = 1.5;
const P3 = 0.8;

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const p = getParams();
  time += delta * p.spd;

  const posAttr = geometry.getAttribute('position');
  const colAttr = geometry.getAttribute('color');
  const pos = posAttr.array;
  const col = colAttr.array;

  let minH = Infinity;
  let maxH = -Infinity;

  // First pass: compute heights
  const heights = new Float32Array(COUNT);
  for (let i = 0; i < COUNT; i++) {
    const x = basePositions[i * 2];
    const z = basePositions[i * 2 + 1];

    let h = p.w1a * Math.sin(p.w1f * x + P1 + time * 1.3)
          + p.w2a * Math.sin(p.w2f * z + P2 + time * 0.9)
          + p.w3a * Math.sin(p.w3f * (x + z) + P3 + time * 1.1);

    // Mouse disturbance
    if (mouseActive) {
      const dx = x - mouseWorld.x;
      const dz = z - mouseWorld.z;
      const dist2 = dx * dx + dz * dz;
      const r2 = MOUSE_RADIUS * MOUSE_RADIUS;
      if (dist2 < r2) {
        const falloff = 1.0 - dist2 / r2;
        h += MOUSE_STRENGTH * falloff * falloff;
      }
    }

    heights[i] = h;
    if (h < minH) minH = h;
    if (h > maxH) maxH = h;
  }

  // Second pass: set positions and colors
  for (let i = 0; i < COUNT; i++) {
    const h = heights[i];
    pos[i * 3 + 1] = h;

    heightToColor(h, minH, maxH, tempColor);
    col[i * 3] = tempColor.r;
    col[i * 3 + 1] = tempColor.g;
    col[i * 3 + 2] = tempColor.b;
  }

  posAttr.needsUpdate = true;
  colAttr.needsUpdate = true;

  // Update state
  window.__3D_STATE__.wave1 = { amp: p.w1a, freq: p.w1f };
  window.__3D_STATE__.wave2 = { amp: p.w2a, freq: p.w2f };
  window.__3D_STATE__.wave3 = { amp: p.w3a, freq: p.w3f };
  window.__3D_STATE__.speed = p.spd;
  window.__3D_STATE__.maxHeight = maxH;
  window.__3D_STATE__.minHeight = minH;
  window.__3D_STATE__.particleCount = COUNT;

  heightInfoEl.textContent = `Height: ${minH.toFixed(2)} → ${maxH.toFixed(2)}`;

  controls.update();
  renderer.render(scene, camera);
}

animate();

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
