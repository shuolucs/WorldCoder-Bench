<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Snow Globe</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: monospace;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #ddeeff;
            padding: 12px;
            font-size: 13px;
            border-radius: 8px;
            z-index: 1000;
            pointer-events: none;
            line-height: 1.5;
        }
        #controls {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #ddeeff;
            padding: 12px;
            font-size: 13px;
            border-radius: 8px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 250px;
        }
        .control-group label {
            flex: 1;
        }
        .control-group input {
            flex: 1;
        }
        .instructions {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #ddeeff;
            padding: 12px;
            font-size: 13px;
            border-radius: 8px;
            z-index: 1000;
            pointer-events: none;
            text-align: right;
            line-height: 1.5;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="hud">
        <div>Particles: <span id="hud-particles">0</span></div>
        <div>Airborne: <span id="hud-airborne">0</span></div>
        <div>Settled: <span id="hud-settled">0</span></div>
        <div>Gravity: <span id="hud-gravity">0.5</span></div>
        <div>Shake Intensity: <span id="hud-shake-val">2.0</span></div>
        <div>Shakes: <span id="hud-shakes">0</span></div>
        <div>Lights: <span id="hud-lights">On</span></div>
        <div>Model Loaded: <span id="hud-model">No</span></div>
        <div>Status: <span id="hud-paused">Playing</span></div>
    </div>

    <div id="controls">
        <div class="control-group">
            <label for="slider-particles">Particle Count</label>
            <input type="range" id="slider-particles" min="200" max="1500" step="50" value="600">
        </div>
        <div class="control-group">
            <label for="slider-gravity">Gravity</label>
            <input type="range" id="slider-gravity" min="0.1" max="2.0" step="0.1" value="0.5">
        </div>
        <div class="control-group">
            <label for="slider-shake">Shake Intensity</label>
            <input type="range" id="slider-shake" min="0.5" max="5.0" step="0.1" value="2.0">
        </div>
    </div>

    <div class="instructions">
        Click Globe or Press 'S' to Shake<br>
        Press 'R' to Reset Particles<br>
        Press 'Space' to Pause/Play<br>
        Press 'L' to Toggle Lights
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            particleCount: 600,
            airborneCount: 0,
            settledCount: 0,
            gravity: 0.5,
            shakeIntensity: 2.0,
            shakeCount: 0,
            lightsOn: true,
            modelLoaded: false,
            isPaused: false,
            frameCount: 0,
            simValid: true,
            timeSinceShake: 0
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.5, 0);
        controls.enableDamping = true;
        controls.maxDistance = 15;
        controls.minDistance = 2;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x445566, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(3, 6, 3);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 15;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        scene.add(dirLight);

        // --- Environment ---
        const planeGeo = new THREE.PlaneGeometry(20, 20);
        const planeMat = new THREE.MeshStandardMaterial({ color: 0x222233 });
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = -0.5;
        plane.receiveShadow = true;
        scene.add(plane);

        // --- Globe Group ---
        const globeGroup = new THREE.Group();
        scene.add(globeGroup);

        // --- Globe Base ---
        const baseGeo = new THREE.CylinderGeometry(2.1, 2.3, 0.6, 32);
        const baseMat = new THREE.MeshStandardMaterial({ 
            color: 0x8B4513, 
            metalness: 0.3, 
            roughness: 0.7 
        });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.position.set(0, 0.3, 0);
        base.castShadow = true;
        base.receiveShadow = true;
        globeGroup.add(base);

        const rimGeo = new THREE.TorusGeometry(2.05, 0.06, 32, 64);
        const rimMat = new THREE.MeshStandardMaterial({ 
            color: 0xFFD700, 
            metalness: 0.9,
            roughness: 0.2
        });
        const rim = new THREE.Mesh(rimGeo, rimMat);
        rim.position.set(0, 0.6, 0);
        rim.rotation.x = Math.PI / 2;
        rim.castShadow = true;
        globeGroup.add(rim);

        // --- Snowy Ground ---
        const groundGeo = new THREE.CylinderGeometry(1.8, 1.8, 0.02, 32);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0xeeeeff, roughness: 0.9 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.position.set(0, 0.6, 0);
        ground.receiveShadow = true;
        globeGroup.add(ground);

        // --- Glass Sphere ---
        const sphereGeo = new THREE.SphereGeometry(2.0, 64, 64);
        const sphereMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.12,
            roughness: 0.05,
            metalness: 0.0,
            transmission: 0.9,
            thickness: 0.5,
            ior: 1.5,
            side: THREE.DoubleSide,
            depthWrite: false
        });
        const glassSphere = new THREE.Mesh(sphereGeo, sphereMat);
        glassSphere.position.set(0, 2.0, 0);
        globeGroup.add(glassSphere);

        // --- Internal Scene (Lantern) ---
        const loader = new GLTFLoader();
        loader.load('Lantern.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.01, 0.01, 0.01);
            model.position.set(0, 0.8, 0);
            
            // Enable shadows for model
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            globeGroup.add(model);
            window.__3D_STATE__.modelLoaded = true;
            updateHUD();
        }, undefined, (error) => {
            console.warn("Could not load Lantern.glb. Proceeding without it.", error);
        });

        // --- Colored Lights ---
        const holidayLights = [];
        const lightConfigs = [
            { pos: [-0.8, 1.5, 0.8], color: 0xff0000 },
            { pos: [0.8, 1.5, 0.8], color: 0x00ff00 },
            { pos: [0.8, 1.5, -0.8], color: 0x0000ff },
            { pos: [-0.8, 1.5, -0.8], color: 0xffff00 }
        ];

        lightConfigs.forEach(config => {
            const light = new THREE.PointLight(config.color, 0.3, 3.0);
            light.position.set(...config.pos);
            globeGroup.add(light);
            holidayLights.push(light);
        });

        // --- Snow Particles ---
        let particleSystem;
        let particlePositions;
        let particleVelocities;
        const particleDrag = 3.0;
        const globeCenter = new THREE.Vector3(0, 2.0, 0);
        const globeRadius = 1.9;
        const floorY = 0.65;

        // Generate a soft circular texture for particles
        function createParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.5, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        }

        const particleTexture = createParticleTexture();

        function initParticles(count) {
            if (particleSystem) {
                globeGroup.remove(particleSystem);
                particleSystem.geometry.dispose();
                particleSystem.material.dispose();
            }

            const geometry = new THREE.BufferGeometry();
            particlePositions = new Float32Array(count * 3);
            particleVelocities = new Float32Array(count * 3);
            const sizes = new Float32Array(count);

            for (let i = 0; i < count; i++) {
                // Random position within sphere
                let r = globeRadius * Math.cbrt(Math.random());
                let theta = Math.random() * 2 * Math.PI;
                let phi = Math.acos(2 * Math.random() - 1);

                let x = globeCenter.x + r * Math.sin(phi) * Math.cos(theta);
                let y = globeCenter.y + r * Math.sin(phi) * Math.sin(theta);
                let z = globeCenter.z + r * Math.cos(phi);

                // If below floor, move up
                if (y < floorY) y = floorY + Math.random() * 0.5;

                particlePositions[i * 3] = x;
                particlePositions[i * 3 + 1] = y;
                particlePositions[i * 3 + 2] = z;

                // Initial velocity 0 (settled)
                particleVelocities[i * 3] = 0;
                particleVelocities[i * 3 + 1] = 0;
                particleVelocities[i * 3 + 2] = 0;

                // Random size
                sizes[i] = Math.random() * 0.03 + 0.02;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const material = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.04,
                transparent: true,
                opacity: 0.85,
                map: particleTexture,
                alphaTest: 0.01,
                depthWrite: false,
                sizeAttenuation: true
            });

            // Custom shader to use size attribute
            material.onBeforeCompile = (shader) => {
                shader.vertexShader = shader.vertexShader.replace(
                    'void main() {',
                    'attribute float size;\nvoid main() {'
                );
                shader.vertexShader = shader.vertexShader.replace(
                    'gl_PointSize = size;',
                    'gl_PointSize = size * ( 300.0 / -mvPosition.z );' // size attenuation
                );
            };

            particleSystem = new THREE.Points(geometry, material);
            globeGroup.add(particleSystem);
            window.__3D_STATE__.particleCount = count;
        }

        initParticles(window.__3D_STATE__.particleCount);

        // --- Shake Mechanic ---
        let visualShakeTimer = 0;
        let lastShakeTime = performance.now();

        function triggerShake() {
            const intensity = window.__3D_STATE__.shakeIntensity;
            const count = window.__3D_STATE__.particleCount;
            
            for (let i = 0; i < count; i++) {
                particleVelocities[i * 3] += (Math.random() - 0.5) * 2 * intensity;
                particleVelocities[i * 3 + 1] += (Math.random() - 0.5) * 2 * intensity + intensity * 0.5; // Bias upwards
                particleVelocities[i * 3 + 2] += (Math.random() - 0.5) * 2 * intensity;
            }

            visualShakeTimer = 1.0; // 1 second visual shake
            lastShakeTime = performance.now();
            window.__3D_STATE__.shakeCount++;
            window.__3D_STATE__.timeSinceShake = 0;
            updateHUD();
        }

        function resetParticles() {
            const count = window.__3D_STATE__.particleCount;
            for (let i = 0; i < count; i++) {
                // Place on ground
                let r = 1.7 * Math.sqrt(Math.random());
                let theta = Math.random() * 2 * Math.PI;
                
                particlePositions[i * 3] = r * Math.cos(theta);
                particlePositions[i * 3 + 1] = floorY;
                particlePositions[i * 3 + 2] = r * Math.sin(theta);

                particleVelocities[i * 3] = 0;
                particleVelocities[i * 3 + 1] = 0;
                particleVelocities[i * 3 + 2] = 0;
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;
        }

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(glassSphere);
            
            if (intersects.length > 0) {
                triggerShake();
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 's') triggerShake();
            if (e.key.toLowerCase() === 'r') resetParticles();
            if (e.key.toLowerCase() === 'l') {
                window.__3D_STATE__.lightsOn = !window.__3D_STATE__.lightsOn;
                holidayLights.forEach(l => l.visible = window.__3D_STATE__.lightsOn);
                updateHUD();
            }
            if (e.code === 'Space') {
                window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
                updateHUD();
            }
        });

        // --- UI Controls ---
        document.getElementById('slider-particles').addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            initParticles(val);
            updateHUD();
        });

        document.getElementById('slider-gravity').addEventListener('input', (e) => {
            window.__3D_STATE__.gravity = parseFloat(e.target.value);
            updateHUD();
        });

        document.getElementById('slider-shake').addEventListener('input', (e) => {
            window.__3D_STATE__.shakeIntensity = parseFloat(e.target.value);
            updateHUD();
        });

        // --- HUD Update ---
        const hudElements = {
            particles: document.getElementById('hud-particles'),
            airborne: document.getElementById('hud-airborne'),
            settled: document.getElementById('hud-settled'),
            gravity: document.getElementById('hud-gravity'),
            shakeVal: document.getElementById('hud-shake-val'),
            shakes: document.getElementById('hud-shakes'),
            lights: document.getElementById('hud-lights'),
            model: document.getElementById('hud-model'),
            paused: document.getElementById('hud-paused')
        };

        function updateHUD() {
            const state = window.__3D_STATE__;
            hudElements.particles.textContent = state.particleCount;
            hudElements.airborne.textContent = state.airborneCount;
            hudElements.settled.textContent = state.settledCount;
            hudElements.gravity.textContent = state.gravity.toFixed(1);
            hudElements.shakeVal.textContent = state.shakeIntensity.toFixed(1);
            hudElements.shakes.textContent = state.shakeCount;
            hudElements.lights.textContent = state.lightsOn ? 'On' : 'Off';
            hudElements.model.textContent = state.modelLoaded ? 'Yes' : 'No';
            hudElements.paused.textContent = state.isPaused ? 'Paused' : 'Playing';
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        const hsl = { h: 0, s: 0, l: 0 };

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1); // Cap dt to prevent explosions
            const state = window.__3D_STATE__;
            state.frameCount++;

            controls.update();

            // Update Lights
            if (state.lightsOn && !state.isPaused) {
                holidayLights.forEach(light => {
                    light.color.getHSL(hsl);
                    light.color.setHSL((hsl.h + 0.002) % 1.0, hsl.s, hsl.l);
                });
            }

            // Visual Shake
            if (visualShakeTimer > 0) {
                visualShakeTimer -= dt;
                if (visualShakeTimer < 0) visualShakeTimer = 0;
                const amp = 0.05 * (visualShakeTimer / 1.0);
                globeGroup.position.x = Math.sin(visualShakeTimer * 50) * amp;
                globeGroup.position.y = Math.cos(visualShakeTimer * 43) * amp;
            } else {
                globeGroup.position.set(0, 0, 0);
            }

            // Physics
            if (!state.isPaused) {
                state.timeSinceShake = (performance.now() - lastShakeTime) / 1000;
                let airborne = 0;
                let settled = 0;
                let isValid = true;

                const count = state.particleCount;
                const g = state.gravity;

                for (let i = 0; i < count; i++) {
                    let i3 = i * 3;
                    
                    let px = particlePositions[i3];
                    let py = particlePositions[i3 + 1];
                    let pz = particlePositions[i3 + 2];

                    let vx = particleVelocities[i3];
                    let vy = particleVelocities[i3 + 1];
                    let vz = particleVelocities[i3 + 2];

                    // Apply Forces
                    vy -= g * dt; // Gravity
                    
                    // Drag
                    vx -= particleDrag * vx * dt;
                    vy -= particleDrag * vy * dt;
                    vz -= particleDrag * vz * dt;

                    // Brownian motion
                    vx += (Math.random() - 0.5) * 0.01;
                    vz += (Math.random() - 0.5) * 0.01;

                    // Integrate
                    px += vx * dt;
                    py += vy * dt;
                    pz += vz * dt;

                    // Collisions
                    // 1. Floor
                    if (py <= floorY) {
                        py = floorY;
                        vy = 0;
                        vx *= 0.8; // Friction
                        vz *= 0.8;
                    }

                    // 2. Globe Boundary
                    const dx = px - globeCenter.x;
                    const dy = py - globeCenter.y;
                    const dz = pz - globeCenter.z;
                    const distSq = dx*dx + dy*dy + dz*dz;

                    if (distSq > globeRadius * globeRadius) {
                        const dist = Math.sqrt(distSq);
                        const nx = dx / dist;
                        const ny = dy / dist;
                        const nz = dz / dist;

                        // Push back
                        px = globeCenter.x + nx * globeRadius;
                        py = globeCenter.y + ny * globeRadius;
                        pz = globeCenter.z + nz * globeRadius;

                        // Bounce (reverse radial velocity)
                        const dot = vx*nx + vy*ny + vz*nz;
                        if (dot > 0) {
                            vx -= nx * dot * 1.2; // 0.2 bounce factor
                            vy -= ny * dot * 1.2;
                            vz -= nz * dot * 1.2;
                        }
                    }

                    // Write back
                    particlePositions[i3] = px;
                    particlePositions[i3 + 1] = py;
                    particlePositions[i3 + 2] = pz;
                    
                    particleVelocities[i3] = vx;
                    particleVelocities[i3 + 1] = vy;
                    particleVelocities[i3 + 2] = vz;

                    // Stats
                    if (Math.abs(vy) > 0.01 || py > floorY + 0.05) {
                        airborne++;
                    } else {
                        settled++;
                    }

                    if (isNaN(px) || isNaN(py) || isNaN(pz)) isValid = false;
                }

                particleSystem.geometry.attributes.position.needsUpdate = true;
                
                state.airborneCount = airborne;
                state.settledCount = settled;
                state.simValid = isValid;

                // Throttle HUD updates slightly for performance
                if (state.frameCount % 5 === 0) {
                    updateHUD();
                }
            }

            renderer.render(scene, camera);
        }

        // Initial HUD update and start loop
        updateHUD();
        animate();

    </script>
</body>
</html>
