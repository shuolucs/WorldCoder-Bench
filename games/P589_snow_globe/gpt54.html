<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Snow Globe</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: system-ui, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.6);
      color: #ddeeff;
      padding: 12px;
      font: 13px monospace;
      border-radius: 8px;
      z-index: 1000;
      min-width: 250px;
      line-height: 1.45;
    }

    #controls {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.15);
    }

    #controls label {
      display: block;
      margin: 8px 0 4px;
    }

    #controls input[type="range"] {
      width: 220px;
    }

    .small {
      opacity: 0.85;
      font-size: 12px;
      margin-top: 8px;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="hud">
    <div>Particles: <span id="hud-particles">600</span></div>
    <div>Airborne: <span id="hud-airborne">0</span></div>
    <div>Settled: <span id="hud-settled">0</span></div>
    <div>Gravity: <span id="hud-gravity">0.5</span></div>
    <div>Shake intensity: <span id="hud-shake-val">2.0</span></div>
    <div>Shakes: <span id="hud-shakes">0</span></div>
    <div>Lights: <span id="hud-lights">On</span></div>
    <div>Model loaded: <span id="hud-model">No</span></div>
    <div>Paused: <span id="hud-paused">Playing</span></div>

    <div id="controls">
      <label for="slider-particles">Particle Count</label>
      <input id="slider-particles" type="range" min="200" max="1500" step="50" value="600" />

      <label for="slider-gravity">Gravity</label>
      <input id="slider-gravity" type="range" min="0.1" max="2.0" step="0.1" value="0.5" />

      <label for="slider-shake">Shake Intensity</label>
      <input id="slider-shake" type="range" min="0.5" max="5.0" step="0.1" value="2.0" />

      <div class="small">
        Click globe / Press <b>S</b>: Shake<br>
        Press <b>R</b>: Reset snow<br>
        Press <b>Space</b>: Pause/Play<br>
        Press <b>L</b>: Toggle lights
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 5);
    camera.lookAt(0, 1.5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.5, 0);

    const ambient = new THREE.AmbientLight(0x445566, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
    dirLight.position.set(3, 6, 3);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(1024, 1024);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 20;
    dirLight.shadow.camera.left = -8;
    dirLight.shadow.camera.right = 8;
    dirLight.shadow.camera.top = 8;
    dirLight.shadow.camera.bottom = -8;
    scene.add(dirLight);

    const table = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.95, metalness: 0.05 })
    );
    table.rotation.x = -Math.PI / 2;
    table.position.y = -0.5;
    table.receiveShadow = true;
    scene.add(table);

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    const GLOBE_CENTER = new THREE.Vector3(0, 2.0, 0);
    const GLOBE_RADIUS = 2.0;
    const SNOW_RADIUS = 1.9;
    const GROUND_Y = 0.65;

    const globeSphere = new THREE.Mesh(
      new THREE.SphereGeometry(2.0, 64, 64),
      new THREE.MeshPhysicalMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.12,
        roughness: 0.05,
        metalness: 0.0,
        transmission: 0.9,
        thickness: 0.5,
        ior: 1.5,
        side: THREE.DoubleSide
      })
    );
    globeSphere.position.copy(GLOBE_CENTER);
    globeSphere.castShadow = false;
    globeSphere.receiveShadow = false;
    globeGroup.add(globeSphere);

    const base = new THREE.Mesh(
      new THREE.CylinderGeometry(2.1, 2.3, 0.6, 32),
      new THREE.MeshStandardMaterial({
        color: 0x8B4513,
        metalness: 0.3,
        roughness: 0.7
      })
    );
    base.position.set(0, 0.3, 0);
    base.castShadow = true;
    base.receiveShadow = true;
    globeGroup.add(base);

    const goldRim = new THREE.Mesh(
      new THREE.TorusGeometry(2.05, 0.06, 16, 32),
      new THREE.MeshStandardMaterial({
        color: 0xFFD700,
        metalness: 0.9,
        roughness: 0.25
      })
    );
    goldRim.position.set(0, 0.6, 0);
    goldRim.rotation.x = Math.PI / 2;
    goldRim.castShadow = true;
    globeGroup.add(goldRim);

    const snowyGround = new THREE.Mesh(
      new THREE.CylinderGeometry(1.8, 1.8, 0.04, 48),
      new THREE.MeshStandardMaterial({
        color: 0xeeeeff,
        roughness: 0.9,
        metalness: 0.0
      })
    );
    snowyGround.position.set(0, 0.6, 0);
    snowyGround.castShadow = false;
    snowyGround.receiveShadow = true;
    globeGroup.add(snowyGround);

    let modelLoaded = false;
    const loader = new GLTFLoader();
    loader.load(
      'Lantern.glb',
      (gltf) => {
        const model = gltf.scene;
        model.scale.setScalar(0.01);

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);

        const box2 = new THREE.Box3().setFromObject(model);
        const minY = box2.min.y;
        model.position.y += (0.8 - minY);

        model.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        globeGroup.add(model);
        modelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load Lantern.glb', err);
      }
    );

    const holidayLights = [];
    const holidayLightData = [
      { pos: [-0.8, 1.5, 0.8], color: 0xff0000 },
      { pos: [ 0.8, 1.5, 0.8], color: 0x00ff00 },
      { pos: [ 0.8, 1.5,-0.8], color: 0x0000ff },
      { pos: [-0.8, 1.5,-0.8], color: 0xffff00 }
    ];

    holidayLightData.forEach((d) => {
      const light = new THREE.PointLight(d.color, 0.3, 3.0);
      light.position.set(...d.pos);
      globeGroup.add(light);
      holidayLights.push(light);
    });

    let lightsOn = true;

    const textureLoader = new THREE.TextureLoader();
    const snowTexture = textureLoader.load('cloud10.png');

    let particleCount = 600;
    let gravity = 0.5;
    let shakeIntensity = 2.0;
    let shakeCount = 0;
    let isPaused = false;
    let frameCount = 0;
    let timeSinceLastShake = 999;
    let shakeVisualTime = 10;

    let snowGeometry = null;
    let snowMaterial = null;
    let snowPoints = null;
    let particlePositions = null;
    let particleSizes = null;
    let velocities = [];

    const tempVec = new THREE.Vector3();
    const radial = new THREE.Vector3();

    function randRange(a, b) {
      return a + Math.random() * (b - a);
    }

    function randomPointInsideSphere(center, radius) {
      let x, y, z;
      do {
        x = randRange(-radius, radius);
        y = randRange(-radius, radius);
        z = randRange(-radius, radius);
      } while (x * x + y * y + z * z > radius * radius);
      return new THREE.Vector3(center.x + x, center.y + y, center.z + z);
    }

    function approxGaussian(stddev = 1) {
      return ((Math.random() + Math.random() + Math.random() + Math.random() - 2) / 2) * stddev * 2;
    }

    function randomSettledPosition() {
      const r = Math.sqrt(Math.random()) * 1.75;
      const theta = Math.random() * Math.PI * 2;
      return new THREE.Vector3(
        Math.cos(theta) * r,
        randRange(0.61, 0.68),
        Math.sin(theta) * r
      );
    }

    function rebuildParticles(count) {
      particleCount = count;

      if (snowPoints) {
        globeGroup.remove(snowPoints);
        snowGeometry.dispose();
        snowMaterial.dispose();
      }

      snowGeometry = new THREE.BufferGeometry();
      particlePositions = new Float32Array(particleCount * 3);
      particleSizes = new Float32Array(particleCount);
      velocities = new Array(particleCount);

      for (let i = 0; i < particleCount; i++) {
        const p = randomSettledPosition();
        particlePositions[i * 3 + 0] = p.x;
        particlePositions[i * 3 + 1] = p.y;
        particlePositions[i * 3 + 2] = p.z;

        particleSizes[i] = randRange(0.02, 0.05);
        velocities[i] = { vx: 0, vy: 0, vz: 0 };
      }

      snowGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
      snowGeometry.setAttribute('aSize', new THREE.BufferAttribute(particleSizes, 1));

      snowMaterial = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.04,
        transparent: true,
        opacity: 0.85,
        sizeAttenuation: true,
        alphaMap: snowTexture,
        depthWrite: false
      });

      snowPoints = new THREE.Points(snowGeometry, snowMaterial);
      globeGroup.add(snowPoints);
    }

    rebuildParticles(particleCount);

    function triggerShake() {
      for (let i = 0; i < particleCount; i++) {
        velocities[i].vx = randRange(-shakeIntensity, shakeIntensity);
        velocities[i].vy = randRange(-shakeIntensity, shakeIntensity);
        velocities[i].vz = randRange(-shakeIntensity, shakeIntensity);
      }
      shakeCount++;
      timeSinceLastShake = 0;
      shakeVisualTime = 0;
    }

    function resetParticlesToSettled() {
      for (let i = 0; i < particleCount; i++) {
        const p = randomSettledPosition();
        particlePositions[i * 3 + 0] = p.x;
        particlePositions[i * 3 + 1] = p.y;
        particlePositions[i * 3 + 2] = p.z;
        velocities[i].vx = 0;
        velocities[i].vy = 0;
        velocities[i].vz = 0;
      }
      snowGeometry.attributes.position.needsUpdate = true;
      timeSinceLastShake = 999;
    }

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function onPointerDown(event) {
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);

      const hits = raycaster.intersectObject(globeSphere, true);
      if (hits.length > 0) {
        triggerShake();
      }
    }

    window.addEventListener('pointerdown', onPointerDown);

    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyS') {
        triggerShake();
      } else if (e.code === 'KeyR') {
        resetParticlesToSettled();
      } else if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
      } else if (e.code === 'KeyL') {
        lightsOn = !lightsOn;
        holidayLights.forEach(light => {
          light.visible = lightsOn;
        });
      }
    });

    const sliderParticles = document.getElementById('slider-particles');
    const sliderGravity = document.getElementById('slider-gravity');
    const sliderShake = document.getElementById('slider-shake');

    sliderParticles.addEventListener('input', () => {
      rebuildParticles(parseInt(sliderParticles.value, 10));
    });

    sliderGravity.addEventListener('input', () => {
      gravity = parseFloat(sliderGravity.value);
    });

    sliderShake.addEventListener('input', () => {
      shakeIntensity = parseFloat(sliderShake.value);
    });

    const hudParticles = document.getElementById('hud-particles');
    const hudAirborne = document.getElementById('hud-airborne');
    const hudSettled = document.getElementById('hud-settled');
    const hudGravity = document.getElementById('hud-gravity');
    const hudShakeVal = document.getElementById('hud-shake-val');
    const hudShakes = document.getElementById('hud-shakes');
    const hudLights = document.getElementById('hud-lights');
    const hudModel = document.getElementById('hud-model');
    const hudPaused = document.getElementById('hud-paused');

    window.__3D_STATE__ = {
      particleCount: particleCount,
      airborneCount: 0,
      settledCount: 0,
      gravity: Number(gravity.toFixed(1)),
      shakeIntensity: Number(shakeIntensity.toFixed(1)),
      shakeCount: shakeCount,
      lightsOn: lightsOn,
      modelLoaded: modelLoaded,
      isPaused: isPaused,
      frameCount: frameCount,
      simValid: true,
      timeSinceShake: Number(timeSinceLastShake.toFixed(1))
    };

    const clock = new THREE.Clock();

    function updateSnow(dt) {
      const drag = 3.0;
      let airborneCount = 0;
      let settledCount = 0;
      let simValid = true;

      for (let i = 0; i < particleCount; i++) {
        const idx = i * 3;
        let x = particlePositions[idx + 0];
        let y = particlePositions[idx + 1];
        let z = particlePositions[idx + 2];

        const v = velocities[i];

        v.vx += approxGaussian(0.005);
        v.vz += approxGaussian(0.005);

        v.vy += -gravity * dt;

        v.vx += -drag * v.vx * dt;
        v.vy += -drag * v.vy * dt;
        v.vz += -drag * v.vz * dt;

        x += v.vx * dt;
        y += v.vy * dt;
        z += v.vz * dt;

        tempVec.set(x, y, z);
        radial.copy(tempVec).sub(GLOBE_CENTER);
        const dist = radial.length();

        if (dist > SNOW_RADIUS) {
          radial.normalize();
          tempVec.copy(GLOBE_CENTER).add(radial.multiplyScalar(SNOW_RADIUS - 0.002));
          x = tempVec.x;
          y = tempVec.y;
          z = tempVec.z;

          const nx = radial.x;
          const ny = radial.y;
          const nz = radial.z;
          const vdotn = v.vx * nx + v.vy * ny + v.vz * nz;
          if (vdotn > 0) {
            v.vx -= 1.2 * vdotn * nx;
            v.vy -= 1.2 * vdotn * ny;
            v.vz -= 1.2 * vdotn * nz;
          } else {
            v.vx -= 0.2 * vdotn * nx;
            v.vy -= 0.2 * vdotn * ny;
            v.vz -= 0.2 * vdotn * nz;
          }
        }

        if (y <= GROUND_Y) {
          y = Math.min(y, GROUND_Y);
          if (v.vy < 0) v.vy = 0;
          v.vx *= Math.max(0, 1 - 12 * dt);
          v.vz *= Math.max(0, 1 - 12 * dt);

          if (Math.abs(v.vx) < 0.01) v.vx = 0;
          if (Math.abs(v.vz) < 0.01) v.vz = 0;
        }

        particlePositions[idx + 0] = x;
        particlePositions[idx + 1] = y;
        particlePositions[idx + 2] = z;

        if (Math.abs(v.vy) > 0.01) airborneCount++;
        if (y < 0.7) settledCount++;

        if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(z)) {
          simValid = false;
        }
      }

      snowGeometry.attributes.position.needsUpdate = true;
      return { airborneCount, settledCount, simValid };
    }

    function updateHolidayLights() {
      if (!lightsOn) return;
      for (const light of holidayLights) {
        const hsl = {};
        light.color.getHSL(hsl);
        light.color.setHSL((hsl.h + 0.002) % 1, hsl.s || 1, hsl.l || 0.5);
      }
    }

    function updateShakeVisual(elapsed) {
      if (shakeVisualTime < 1.0) {
        shakeVisualTime += elapsed;
        const t = shakeVisualTime;
        const decay = Math.max(0, 1 - t / 1.0);
        const amp = 0.05 * decay;
        globeGroup.position.x = Math.sin(t * 40) * amp;
        globeGroup.position.y = Math.sin(t * 34) * amp * 0.5;
      } else {
        globeGroup.position.x = 0;
        globeGroup.position.y = 0;
      }
    }

    function updateHUD(state) {
      hudParticles.textContent = state.particleCount;
      hudAirborne.textContent = state.airborneCount;
      hudSettled.textContent = state.settledCount;
      hudGravity.textContent = state.gravity.toFixed(1);
      hudShakeVal.textContent = state.shakeIntensity.toFixed(1);
      hudShakes.textContent = state.shakeCount;
      hudLights.textContent = state.lightsOn ? 'On' : 'Off';
      hudModel.textContent = state.modelLoaded ? 'Yes' : 'No';
      hudPaused.textContent = state.isPaused ? 'Paused' : 'Playing';
    }

    function animate() {
      requestAnimationFrame(animate);
      const dtRaw = clock.getDelta();
      const dt = Math.min(dtRaw, 0.033);

      controls.update();

      let airborneCount = 0;
      let settledCount = 0;
      let simValid = true;

      if (!isPaused) {
        frameCount++;
        timeSinceLastShake += dt;
        const snowStats = updateSnow(dt);
        airborneCount = snowStats.airborneCount;
        settledCount = snowStats.settledCount;
        simValid = snowStats.simValid;
        updateHolidayLights();
        updateShakeVisual(dt);
      } else {
        for (let i = 0; i < particleCount; i++) {
          const idx = i * 3;
          const y = particlePositions[idx + 1];
          if (Math.abs(velocities[i].vy) > 0.01) airborneCount++;
          if (y < 0.7) settledCount++;
          if (
            !Number.isFinite(particlePositions[idx + 0]) ||
            !Number.isFinite(particlePositions[idx + 1]) ||
            !Number.isFinite(particlePositions[idx + 2])
          ) simValid = false;
        }
      }

      window.__3D_STATE__ = {
        particleCount: particleCount,
        airborneCount: airborneCount,
        settledCount: settledCount,
        gravity: Number(gravity.toFixed(1)),
        shakeIntensity: Number(shakeIntensity.toFixed(1)),
        shakeCount: shakeCount,
        lightsOn: lightsOn,
        modelLoaded: modelLoaded,
        isPaused: isPaused,
        frameCount: frameCount,
        simValid: simValid,
        timeSinceShake: Number(timeSinceLastShake.toFixed(1))
      };

      updateHUD(window.__3D_STATE__);
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
