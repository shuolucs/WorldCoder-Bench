<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Snow Globe</title>
<style>
  body { margin: 0; overflow: hidden; background: #1a1a2e; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 10px; left: 10px;
    background: rgba(0,0,0,0.6); color: #ddeeff;
    padding: 12px; font: 13px monospace; border-radius: 8px; z-index: 1000;
    line-height: 1.6;
  }
  #controls {
    position: fixed; bottom: 10px; left: 10px;
    background: rgba(0,0,0,0.6); color: #ddeeff;
    padding: 12px; font: 13px monospace; border-radius: 8px; z-index: 1000;
  }
  #controls label { display: block; margin: 4px 0; }
  #controls input[type=range] { width: 180px; vertical-align: middle; }
  #instructions {
    position: fixed; bottom: 10px; right: 10px;
    background: rgba(0,0,0,0.6); color: #ddeeff;
    padding: 12px; font: 12px monospace; border-radius: 8px; z-index: 1000;
    line-height: 1.6;
  }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>

<div id="hud">
  <div>Particles: <span id="hud-particles">600</span></div>
  <div>Airborne: <span id="hud-airborne">0</span></div>
  <div>Settled: <span id="hud-settled">600</span></div>
  <div>Gravity: <span id="hud-gravity">0.5</span></div>
  <div>Shake Intensity: <span id="hud-shake-val">2.0</span></div>
  <div>Shakes: <span id="hud-shakes">0</span></div>
  <div>Lights: <span id="hud-lights">On</span></div>
  <div>Model Loaded: <span id="hud-model">No</span></div>
  <div>Status: <span id="hud-paused">Playing</span></div>
</div>

<div id="controls">
  <label>Particles: <input type="range" id="slider-particles" min="200" max="1500" step="50" value="600"> <span id="val-particles">600</span></label>
  <label>Gravity: <input type="range" id="slider-gravity" min="0.1" max="2.0" step="0.1" value="0.5"> <span id="val-gravity">0.5</span></label>
  <label>Shake: <input type="range" id="slider-shake" min="0.5" max="5.0" step="0.1" value="2.0"> <span id="val-shake">2.0</span></label>
</div>

<div id="instructions">
  Click globe or 'S': Shake<br>
  'R': Reset particles<br>
  Space: Pause/Play<br>
  'L': Toggle lights
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const state = {
  particleCount: 600,
  airborneCount: 0,
  settledCount: 600,
  gravity: 0.5,
  shakeIntensity: 2.0,
  shakeCount: 0,
  lightsOn: true,
  modelLoaded: false,
  isPaused: false,
  frameCount: 0,
  simValid: true,
  timeSinceShake: 999.0
};
window.__3D_STATE__ = state;

// --- Params ---
let particleCount = 600;
let gravity = 0.5;
let shakeIntensity = 2.0;
const drag = 3.0;
const globeCenter = new THREE.Vector3(0, 2.0, 0);
const globeRadius = 2.0;
const innerRadius = 1.9;
const groundY = 0.65;

// --- Renderer ---
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// --- Scene ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

// --- Camera ---
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 5);
camera.lookAt(0, 1.5, 0);

// --- Controls ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.update();

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0x445566, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight.position.set(3, 6, 3);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 20;
dirLight.shadow.camera.left = -5;
dirLight.shadow.camera.right = 5;
dirLight.shadow.camera.top = 5;
dirLight.shadow.camera.bottom = -5;
scene.add(dirLight);

// --- Table ---
const tableGeo = new THREE.PlaneGeometry(20, 20);
const tableMat = new THREE.MeshStandardMaterial({ color: 0x222233 });
const table = new THREE.Mesh(tableGeo, tableMat);
table.rotation.x = -Math.PI / 2;
table.position.y = -0.5;
table.receiveShadow = true;
scene.add(table);

// --- Globe Group ---
const globeGroup = new THREE.Group();
scene.add(globeGroup);

// --- Glass Sphere ---
const sphereGeo = new THREE.SphereGeometry(2.0, 64, 64);
const sphereMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  transparent: true,
  opacity: 0.12,
  roughness: 0.05,
  metalness: 0.0,
  transmission: 0.9,
  thickness: 0.5,
  ior: 1.5,
  side: THREE.DoubleSide,
  depthWrite: false
});
const glassSphere = new THREE.Mesh(sphereGeo, sphereMat);
glassSphere.position.copy(globeCenter);
globeGroup.add(glassSphere);

// --- Globe Base ---
const baseGeo = new THREE.CylinderGeometry(2.1, 2.3, 0.6, 32);
const baseMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, metalness: 0.3, roughness: 0.7 });
const base = new THREE.Mesh(baseGeo, baseMat);
base.position.set(0, 0.3, 0);
base.castShadow = true;
base.receiveShadow = true;
globeGroup.add(base);

// --- Gold Rim ---
const rimGeo = new THREE.TorusGeometry(2.05, 0.06, 16, 32);
const rimMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.9, roughness: 0.2 });
const rim = new THREE.Mesh(rimGeo, rimMat);
rim.position.set(0, 0.6, 0);
rim.rotation.x = Math.PI / 2;
globeGroup.add(rim);

// --- Snowy Ground Disc ---
const groundGeo = new THREE.CircleGeometry(1.8, 32);
const groundMat = new THREE.MeshStandardMaterial({ color: 0xeeeeff });
const groundDisc = new THREE.Mesh(groundGeo, groundMat);
groundDisc.rotation.x = -Math.PI / 2;
groundDisc.position.set(0, 0.61, 0);
groundDisc.receiveShadow = true;
globeGroup.add(groundDisc);

// --- Holiday Lights ---
const holidayLights = [];
const lightPositions = [
  new THREE.Vector3(-0.8, 1.5, 0.8),
  new THREE.Vector3(0.8, 1.5, 0.8),
  new THREE.Vector3(0.8, 1.5, -0.8),
  new THREE.Vector3(-0.8, 1.5, -0.8)
];
const initialColors = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00];
const lightHues = [];

for (let i = 0; i < 4; i++) {
  const pl = new THREE.PointLight(initialColors[i], 0.3, 3.0);
  pl.position.copy(lightPositions[i]);
  globeGroup.add(pl);
  holidayLights.push(pl);
  const c = new THREE.Color(initialColors[i]);
  const hsl = {};
  c.getHSL(hsl);
  lightHues.push(hsl.h);
}

// --- Load Model ---
const loader = new GLTFLoader();
loader.load('Lantern.glb',
  (gltf) => {
    const model = gltf.scene;
    model.scale.set(0.01, 0.01, 0.01);
    // Center the model
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    model.position.sub(center);
    model.position.y += 0.8;
    model.position.x = 0;
    model.position.z = 0;
    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    globeGroup.add(model);
    state.modelLoaded = true;
    document.getElementById('hud-model').textContent = 'Yes';
  },
  undefined,
  (err) => {
    console.warn('Could not load Lantern.glb:', err);
    // Fallback: create a simple lantern-like shape
    const lanternGroup = new THREE.Group();
    const bodyGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.6, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc6600, metalness: 0.5, roughness: 0.4 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    lanternGroup.add(body);
    const topGeo = new THREE.ConeGeometry(0.35, 0.3, 8);
    const topMesh = new THREE.Mesh(topGeo, bodyMat);
    topMesh.position.y = 0.45;
    lanternGroup.add(topMesh);
    const glowGeo = new THREE.SphereGeometry(0.2, 16, 16);
    const glowMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xffaa00, emissiveIntensity: 2 });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    lanternGroup.add(glow);
    lanternGroup.position.set(0, 0.95, 0);
    globeGroup.add(lanternGroup);
    state.modelLoaded = true;
    document.getElementById('hud-model').textContent = 'Yes (fallback)';
  }
);

// --- Snow Particle Texture ---
function createSnowTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 64;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
  gradient.addColorStop(0, 'rgba(255,255,255,1)');
  gradient.addColorStop(0.3, 'rgba(255,255,255,0.8)');
  gradient.addColorStop(0.7, 'rgba(255,255,255,0.3)');
  gradient.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 64, 64);
  const tex = new THREE.CanvasTexture(canvas);
  return tex;
}
const snowTexture = createSnowTexture();

// --- Snow Particles ---
let velocities = [];
let snowPoints;
let positionsArray;
let sizesArray;

function randomInGlobe(settled) {
  if (settled) {
    // Place on ground
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * 1.7;
    return {
      x: Math.cos(angle) * r,
      y: groundY + Math.random() * 0.03,
      z: Math.sin(angle) * r
    };
  }
  // Random inside sphere
  while (true) {
    const x = (Math.random() - 0.5) * 2 * innerRadius;
    const y = (Math.random() - 0.5) * 2 * innerRadius + globeCenter.y;
    const z = (Math.random() - 0.5) * 2 * innerRadius;
    const dx = x - globeCenter.x;
    const dy = y - globeCenter.y;
    const dz = z - globeCenter.z;
    if (Math.sqrt(dx*dx + dy*dy + dz*dz) < innerRadius && y > groundY) {
      return { x, y, z };
    }
  }
}

function buildSnowParticles(count, settled = true) {
  if (snowPoints) {
    globeGroup.remove(snowPoints);
    snowPoints.geometry.dispose();
  }
  particleCount = count;
  const geometry = new THREE.BufferGeometry();
  positionsArray = new Float32Array(count * 3);
  sizesArray = new Float32Array(count);
  velocities = [];

  for (let i = 0; i < count; i++) {
    const p = randomInGlobe(settled);
    positionsArray[i * 3] = p.x;
    positionsArray[i * 3 + 1] = p.y;
    positionsArray[i * 3 + 2] = p.z;
    sizesArray[i] = 0.02 + Math.random() * 0.03;
    velocities.push({ vx: 0, vy: 0, vz: 0 });
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positionsArray, 3));
  geometry.setAttribute('size', new THREE.BufferAttribute(sizesArray, 1));

  const material = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.04,
    transparent: true,
    opacity: 0.85,
    sizeAttenuation: true,
    map: snowTexture,
    alphaMap: snowTexture,
    alphaTest: 0.01,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });

  snowPoints = new THREE.Points(geometry, material);
  globeGroup.add(snowPoints);
}

buildSnowParticles(particleCount, true);

// --- Shake State ---
let shakeTime = -10;
let shakeCount = 0;
let lastShakeTimestamp = -999;

function triggerShake() {
  for (let i = 0; i < particleCount; i++) {
    velocities[i].vx = (Math.random() - 0.5) * 2 * shakeIntensity;
    velocities[i].vy = (Math.random() - 0.5) * 2 * shakeIntensity;
    velocities[i].vz = (Math.random() - 0.5) * 2 * shakeIntensity;
  }
  shakeTime = performance.now() / 1000;
  shakeCount++;
  lastShakeTimestamp = performance.now() / 1000;
}

function resetParticles() {
  for (let i = 0; i < particleCount; i++) {
    const p = randomInGlobe(true);
    positionsArray[i * 3] = p.x;
    positionsArray[i * 3 + 1] = p.y;
    positionsArray[i * 3 + 2] = p.z;
    velocities[i].vx = 0;
    velocities[i].vy = 0;
    velocities[i].vz = 0;
  }
  snowPoints.geometry.attributes.position.needsUpdate = true;
}

// --- Raycaster for click ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(glassSphere);
  if (intersects.length > 0) {
    triggerShake();
  }
});

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
  if (e.key === 's' || e.key === 'S') {
    triggerShake();
  } else if (e.key === 'r' || e.key === 'R') {
    resetParticles();
  } else if (e.key === ' ') {
    e.preventDefault();
    state.isPaused = !state.isPaused;
  } else if (e.key === 'l' || e.key === 'L') {
    state.lightsOn = !state.lightsOn;
    holidayLights.forEach(l => l.visible = state.lightsOn);
  }
});

// --- Sliders ---
const sliderParticles = document.getElementById('slider-particles');
const sliderGravity = document.getElementById('slider-gravity');
const sliderShake = document.getElementById('slider-shake');

sliderParticles.addEventListener('input', () => {
  const val = parseInt(sliderParticles.value);
  document.getElementById('val-particles').textContent = val;
  buildSnowParticles(val, true);
});

sliderGravity.addEventListener('input', () => {
  gravity = parseFloat(sliderGravity.value);
  document.getElementById('val-gravity').textContent = gravity.toFixed(1);
});

sliderShake.addEventListener('input', () => {
  shakeIntensity = parseFloat(sliderShake.value);
  document.getElementById('val-shake').textContent = shakeIntensity.toFixed(1);
});

// --- Gaussian random ---
function gaussRandom() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
}

// --- Animation ---
const clock = new THREE.Clock();
let frameCount = 0;
const globeOriginalPos = new THREE.Vector3(0, 0, 0);

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.05);
  const now = performance.now() / 1000;

  controls.update();

  if (!state.isPaused) {
    frameCount++;

    // --- Update holiday light colors ---
    if (state.lightsOn) {
      for (let i = 0; i < 4; i++) {
        lightHues[i] = (lightHues[i] + 0.002) % 1.0;
        holidayLights[i].color.setHSL(lightHues[i], 1.0, 0.5);
      }
    }

    // --- Globe shake visual ---
    const timeSinceShakeVisual = now - shakeTime;
    if (timeSinceShakeVisual < 1.0) {
      const decay = Math.exp(-timeSinceShakeVisual * 5);
      globeGroup.position.x = Math.sin(timeSinceShakeVisual * 30) * 0.05 * decay;
      globeGroup.position.y = Math.sin(timeSinceShakeVisual * 25) * 0.03 * decay;
    } else {
      globeGroup.position.x = 0;
      globeGroup.position.y = 0;
    }

    // --- Update particles ---
    let airborne = 0;
    let settled = 0;
    let simValid = true;

    for (let i = 0; i < particleCount; i++) {
      const idx = i * 3;
      let px = positionsArray[idx];
      let py = positionsArray[idx + 1];
      let pz = positionsArray[idx + 2];
      let v = velocities[i];

      // Check if settled
      if (py <= groundY + 0.05 && Math.abs(v.vy) < 0.01 && Math.abs(v.vx) < 0.05 && Math.abs(v.vz) < 0.05) {
        // Settled particle - decay velocity
        v.vx *= 0.9;
        v.vy = Math.max(v.vy, 0);
        v.vz *= 0.9;
        if (Math.abs(v.vx) < 0.001) v.vx = 0;
        if (Math.abs(v.vz) < 0.001) v.vz = 0;
        settled++;
      } else {
        // Gravity
        v.vy -= gravity * dt;

        // Drag
        v.vx -= drag * v.vx * dt;
        v.vy -= drag * v.vy * dt;
        v.vz -= drag * v.vz * dt;

        // Brownian drift
        v.vx += gaussRandom() * 0.005;
        v.vz += gaussRandom() * 0.005;

        airborne++;
      }

      // Integrate
      px += v.vx * dt;
      py += v.vy * dt;
      pz += v.vz * dt;

      // Globe boundary collision
      const dx = px - globeCenter.x;
      const dy = py - globeCenter.y;
      const dz = pz - globeCenter.z;
      const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
      if (dist > innerRadius) {
        const nx = dx / dist;
        const ny = dy / dist;
        const nz = dz / dist;
        // Push back
        px = globeCenter.x + nx * innerRadius * 0.99;
        py = globeCenter.y + ny * innerRadius * 0.99;
        pz = globeCenter.z + nz * innerRadius * 0.99;
        // Reflect radial velocity
        const vDotN = v.vx * nx + v.vy * ny + v.vz * nz;
        if (vDotN > 0) {
          v.vx -= 1.2 * vDotN * nx;
          v.vy -= 1.2 * vDotN * ny;
          v.vz -= 1.2 * vDotN * nz;
          v.vx *= 0.2;
          v.vy *= 0.2;
          v.vz *= 0.2;
        }
      }

      // Floor settling
      if (py < groundY) {
        py = groundY;
        v.vy = 0;
        v.vx *= 0.8;
        v.vz *= 0.8;
      }

      // NaN check
      if (isNaN(px) || isNaN(py) || isNaN(pz)) {
        simValid = false;
        const p = randomInGlobe(true);
        px = p.x; py = p.y; pz = p.z;
        v.vx = 0; v.vy = 0; v.vz = 0;
      }

      positionsArray[idx] = px;
      positionsArray[idx + 1] = py;
      positionsArray[idx + 2] = pz;
    }

    snowPoints.geometry.attributes.position.needsUpdate = true;

    // --- Update state ---
    state.particleCount = particleCount;
    state.airborneCount = airborne;
    state.settledCount = settled;
    state.gravity = parseFloat(gravity.toFixed(1));
    state.shakeIntensity = parseFloat(shakeIntensity.toFixed(1));
    state.shakeCount = shakeCount;
    state.lightsOn = holidayLights[0].visible;
    state.frameCount = frameCount;
    state.simValid = simValid;
    state.timeSinceShake = parseFloat((now - lastShakeTimestamp).toFixed(1));
    if (state.timeSinceShake < 0 || lastShakeTimestamp < 0) state.timeSinceShake = 999.0;

    // --- Update HUD ---
    document.getElementById('hud-particles').textContent = particleCount;
    document.getElementById('hud-airborne').textContent = airborne;
    document.getElementById('hud-settled').textContent = settled;
    document.getElementById('hud-gravity').textContent = gravity.toFixed(1);
    document.getElementById('hud-shake-val').textContent = shakeIntensity.toFixed(1);
    document.getElementById('hud-shakes').textContent = shakeCount;
    document.getElementById('hud-lights').textContent = state.lightsOn ? 'On' : 'Off';
    document.getElementById('hud-paused').textContent = 'Playing';
  } else {
    document.getElementById('hud-paused').textContent = 'Paused';
    state.isPaused = true;
  }

  renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
