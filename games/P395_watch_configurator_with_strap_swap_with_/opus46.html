<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Watch Configurator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #ui-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(10px);
    padding: 15px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    z-index: 100;
  }

  .ui-section {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ui-label {
    color: #aaa;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-right: 4px;
  }

  .btn {
    padding: 8px 14px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.4);
  }

  .btn.active {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.6);
    box-shadow: 0 0 8px rgba(255,255,255,0.2);
  }

  .color-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.4);
  }

  .btn-time {
    padding: 8px 12px;
    min-width: 40px;
    justify-content: center;
    font-weight: bold;
  }

  #time-display {
    color: #fff;
    font-size: 24px;
    font-weight: bold;
    font-family: 'Courier New', monospace;
    letter-spacing: 2px;
    padding: 4px 12px;
    background: rgba(255,255,255,0.05);
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    min-width: 80px;
    text-align: center;
  }

  .divider {
    width: 1px;
    height: 30px;
    background: rgba(255,255,255,0.15);
  }

  #loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: opacity 0.5s;
  }

  #loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loader {
    color: #fff;
    font-size: 18px;
    text-align: center;
  }

  .loader .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="loader">
    <div class="spinner"></div>
    Loading Watch Model...
  </div>
</div>

<div id="ui-panel">
  <div class="ui-section">
    <span class="ui-label">Strap</span>
    <button class="btn active" id="btn-brown">
      <span class="color-dot" style="background:#8B4513;"></span> Brown
    </button>
    <button class="btn" id="btn-black">
      <span class="color-dot" style="background:#1a1a1a;"></span> Black
    </button>
    <button class="btn" id="btn-blue">
      <span class="color-dot" style="background:#1565C0;"></span> Blue
    </button>
    <button class="btn" id="btn-red">
      <span class="color-dot" style="background:#C62828;"></span> Red
    </button>
  </div>

  <div class="divider"></div>

  <div class="ui-section">
    <span class="ui-label">Time</span>
    <button class="btn btn-time" id="btn-hour-minus">H-</button>
    <button class="btn btn-time" id="btn-hour-plus">H+</button>
    <div id="time-display">10:10</div>
    <button class="btn btn-time" id="btn-min-minus">M-</button>
    <button class="btn btn-time" id="btn-min-plus">M+</button>
  </div>

  <div class="divider"></div>

  <div class="ui-section">
    <button class="btn" id="btn-spin">Spin: OFF</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
const strapColors = {
  'leather_brown': 0x8B4513,
  'leather_black': 0x1a1a1a,
  'silicone_blue': 0x1565C0,
  'silicone_red': 0xC62828
};

let currentStrap = 'leather_brown';
let hours = 10;
let minutes = 10;
let spinEnabled = false;
let modelLoaded = false;

// 3D State
window.__3D_STATE__ = {
  modelLoaded: false,
  currentStrap: 'leather_brown',
  strapColorHex: 0x8B4513,
  hours: 10,
  minutes: 10,
  timeDisplay: '10:10',
  spinEnabled: false,
  watchRotationY: 0,
  hourHandAngle: 0,
  minuteHandAngle: 0,
  strapCount: 2,
  cameraDistance: 0
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 3);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(3, 5, 3);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 0.1;
dirLight.shadow.camera.far = 20;
dirLight.shadow.camera.left = -3;
dirLight.shadow.camera.right = 3;
dirLight.shadow.camera.top = 3;
dirLight.shadow.camera.bottom = -3;
scene.add(dirLight);

// Additional fill light
const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
fillLight.position.set(-3, 2, -3);
scene.add(fillLight);

// Pedestal
const pedestalGeom = new THREE.CylinderGeometry(1.2, 1.2, 0.05, 64);
const pedestalMat = new THREE.MeshStandardMaterial({ color: 0x333344, metalness: 0.3, roughness: 0.7 });
const pedestal = new THREE.Mesh(pedestalGeom, pedestalMat);
pedestal.position.y = -0.025;
pedestal.receiveShadow = true;
scene.add(pedestal);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minPolarAngle = 0.3;
controls.maxPolarAngle = 1.4;
controls.target.set(0, 0.5, 0);
controls.update();

// Watch group
const watchGroup = new THREE.Group();
scene.add(watchGroup);

// Strap material
const strapMaterial = new THREE.MeshStandardMaterial({
  color: strapColors[currentStrap],
  roughness: 0.6,
  metalness: 0.1
});

// Create straps
const strapGeom = new THREE.BoxGeometry(0.2, 0.02, 0.6);
const upperStrap = new THREE.Mesh(strapGeom, strapMaterial);
upperStrap.position.set(0, 0, 0.55);
upperStrap.castShadow = true;
watchGroup.add(upperStrap);

const lowerStrap = new THREE.Mesh(strapGeom, strapMaterial);
lowerStrap.position.set(0, 0, -0.55);
lowerStrap.castShadow = true;
watchGroup.add(lowerStrap);

// Clock hands
// Hour hand
const hourHandGeom = new THREE.BoxGeometry(0.03, 0.01, 0.2);
hourHandGeom.translate(0, 0, 0.1); // pivot at base
const hourHandMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, metalness: 0.5, roughness: 0.3 });
const hourHand = new THREE.Mesh(hourHandGeom, hourHandMat);
hourHand.position.set(0, 0.15, 0);
watchGroup.add(hourHand);

// Minute hand
const minuteHandGeom = new THREE.BoxGeometry(0.02, 0.01, 0.3);
minuteHandGeom.translate(0, 0, 0.15); // pivot at base
const minuteHandMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, metalness: 0.5, roughness: 0.3 });
const minuteHand = new THREE.Mesh(minuteHandGeom, minuteHandMat);
minuteHand.position.set(0, 0.16, 0);
watchGroup.add(minuteHand);

// Center dot for clock
const centerDotGeom = new THREE.CylinderGeometry(0.02, 0.02, 0.02, 16);
const centerDotMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, metalness: 0.8 });
const centerDot = new THREE.Mesh(centerDotGeom, centerDotMat);
centerDot.position.set(0, 0.17, 0);
watchGroup.add(centerDot);

// Update clock hands
function updateClockHands() {
  const minuteAngle = -(minutes / 60) * Math.PI * 2;
  const hourAngle = -((hours % 12) + minutes / 60) / 12 * Math.PI * 2;

  hourHand.rotation.y = hourAngle;
  minuteHand.rotation.y = minuteAngle;
}

updateClockHands();

// Update time display
function updateTimeDisplay() {
  const hStr = String(hours).padStart(2, '0');
  const mStr = String(minutes).padStart(2, '0');
  document.getElementById('time-display').textContent = `${hStr}:${mStr}`;
}

updateTimeDisplay();

// Load GLB model
const loader = new GLTFLoader();
loader.load(
  'Michelle.glb',
  (gltf) => {
    const model = gltf.scene;

    // Calculate bounding box
    const box = new THREE.Box3().setFromObject(model);
    const size = new THREE.Vector3();
    const center = new THREE.Vector3();
    box.getSize(size);
    box.getCenter(center);

    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 1.5 / maxDim;
    model.scale.setScalar(scale);

    // Recalculate after scaling
    box.setFromObject(model);
    box.getCenter(center);

    model.position.x = -center.x;
    model.position.y = -box.min.y;
    model.position.z = -center.z;

    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    watchGroup.add(model);
    modelLoaded = true;
    window.__3D_STATE__.modelLoaded = true;

    document.getElementById('loading-overlay').classList.add('hidden');
  },
  (progress) => {
    // Loading progress
  },
  (error) => {
    console.warn('Could not load Michelle.glb:', error);
    // Create a placeholder watch
    const watchCaseGeom = new THREE.CylinderGeometry(0.4, 0.4, 0.1, 32);
    const watchCaseMat = new THREE.MeshStandardMaterial({ color: 0xC0C0C0, metalness: 0.8, roughness: 0.2 });
    const watchCase = new THREE.Mesh(watchCaseGeom, watchCaseMat);
    watchCase.position.y = 0.1;
    watchCase.castShadow = true;
    watchGroup.add(watchCase);

    // Watch face
    const faceGeom = new THREE.CylinderGeometry(0.35, 0.35, 0.02, 32);
    const faceMat = new THREE.MeshStandardMaterial({ color: 0x111122, metalness: 0.3, roughness: 0.5 });
    const face = new THREE.Mesh(faceGeom, faceMat);
    face.position.y = 0.16;
    watchGroup.add(face);

    // Hour markers
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2;
      const markerGeom = new THREE.BoxGeometry(0.02, 0.005, 0.05);
      const markerMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, metalness: 0.5 });
      const marker = new THREE.Mesh(markerGeom, markerMat);
      marker.position.set(Math.sin(angle) * 0.28, 0.17, Math.cos(angle) * 0.28);
      marker.rotation.y = -angle;
      watchGroup.add(marker);
    }

    // Lugs
    const lugGeom = new THREE.BoxGeometry(0.08, 0.06, 0.15);
    const lugMat = new THREE.MeshStandardMaterial({ color: 0xC0C0C0, metalness: 0.8, roughness: 0.2 });
    for (let side of [-1, 1]) {
      const lug1 = new THREE.Mesh(lugGeom, lugMat);
      lug1.position.set(side * 0.08, 0.1, 0.4);
      lug1.castShadow = true;
      watchGroup.add(lug1);
      const lug2 = new THREE.Mesh(lugGeom, lugMat);
      lug2.position.set(side * 0.08, 0.1, -0.4);
      lug2.castShadow = true;
      watchGroup.add(lug2);
    }

    // Crown
    const crownGeom = new THREE.CylinderGeometry(0.04, 0.04, 0.08, 16);
    const crown = new THREE.Mesh(crownGeom, lugMat);
    crown.rotation.z = Math.PI / 2;
    crown.position.set(0.45, 0.1, 0);
    crown.castShadow = true;
    watchGroup.add(crown);

    modelLoaded = true;
    window.__3D_STATE__.modelLoaded = true;
    document.getElementById('loading-overlay').classList.add('hidden');
  }
);

// Strap color buttons
const strapButtons = {
  'btn-brown': 'leather_brown',
  'btn-black': 'leather_black',
  'btn-blue': 'silicone_blue',
  'btn-red': 'silicone_red'
};

Object.entries(strapButtons).forEach(([btnId, strapName]) => {
  document.getElementById(btnId).addEventListener('click', () => {
    currentStrap = strapName;
    strapMaterial.color.setHex(strapColors[strapName]);

    // Update active state
    document.querySelectorAll('#ui-panel .btn').forEach(b => {
      if (Object.keys(strapButtons).includes(b.id)) {
        b.classList.remove('active');
      }
    });
    document.getElementById(btnId).classList.add('active');
  });
});

// Time controls
document.getElementById('btn-hour-plus').addEventListener('click', () => {
  hours = (hours + 1) % 24;
  updateClockHands();
  updateTimeDisplay();
});

document.getElementById('btn-hour-minus').addEventListener('click', () => {
  hours = (hours - 1 + 24) % 24;
  updateClockHands();
  updateTimeDisplay();
});

document.getElementById('btn-min-plus').addEventListener('click', () => {
  minutes += 5;
  if (minutes >= 60) {
    minutes = 0;
    hours = (hours + 1) % 24;
  }
  updateClockHands();
  updateTimeDisplay();
});

document.getElementById('btn-min-minus').addEventListener('click', () => {
  minutes -= 5;
  if (minutes < 0) {
    minutes = 55;
    hours = (hours - 1 + 24) % 24;
  }
  updateClockHands();
  updateTimeDisplay();
});

// Spin toggle
document.getElementById('btn-spin').addEventListener('click', () => {
  spinEnabled = !spinEnabled;
  const btn = document.getElementById('btn-spin');
  btn.textContent = spinEnabled ? 'Spin: ON' : 'Spin: OFF';
  if (spinEnabled) {
    btn.classList.add('active');
  } else {
    btn.classList.remove('active');
  }
});

// Resize handler
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();

  if (spinEnabled) {
    watchGroup.rotation.y += 0.5 * delta;
  }

  controls.update();

  // Update state
  const hStr = String(hours).padStart(2, '0');
  const mStr = String(minutes).padStart(2, '0');

  const minuteAngle = -(minutes / 60) * Math.PI * 2;
  const hourAngle = -((hours % 12) + minutes / 60) / 12 * Math.PI * 2;

  window.__3D_STATE__ = {
    modelLoaded: modelLoaded,
    currentStrap: currentStrap,
    strapColorHex: strapColors[currentStrap],
    hours: hours,
    minutes: minutes,
    timeDisplay: `${hStr}:${mStr}`,
    spinEnabled: spinEnabled,
    watchRotationY: watchGroup.rotation.y,
    hourHandAngle: hourAngle,
    minuteHandAngle: minuteAngle,
    strapCount: 2,
    cameraDistance: camera.position.distanceTo(new THREE.Vector3(0, 0, 0))
  };

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
