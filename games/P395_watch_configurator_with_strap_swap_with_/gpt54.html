<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Watch Configurator</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #ui-panel {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      padding: 14px 18px;
      border-radius: 16px;
      color: white;
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      align-items: center;
      justify-content: center;
      z-index: 10;
      max-width: 95vw;
      backdrop-filter: blur(6px);
    }

    .ui-group {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .ui-label {
      font-size: 14px;
      opacity: 0.9;
      margin-right: 4px;
    }

    button {
      background: #2b2b3d;
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    button:hover {
      background: #3a3a54;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .color-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.4);
      display: inline-block;
    }

    #time-display {
      min-width: 64px;
      text-align: center;
      font-weight: bold;
      font-size: 16px;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui-panel">
      <div class="ui-group">
        <span class="ui-label">Strap:</span>
        <button id="btn-brown" class="color-btn"><span class="swatch" style="background:#8B4513"></span>Brown</button>
        <button id="btn-black" class="color-btn"><span class="swatch" style="background:#1a1a1a"></span>Black</button>
        <button id="btn-blue" class="color-btn"><span class="swatch" style="background:#1565C0"></span>Blue</button>
        <button id="btn-red" class="color-btn"><span class="swatch" style="background:#C62828"></span>Red</button>
      </div>

      <div class="ui-group">
        <span class="ui-label">Time:</span>
        <button id="btn-hour-plus">Hour+</button>
        <button id="btn-hour-minus">Hour-</button>
        <button id="btn-min-plus">Min+</button>
        <button id="btn-min-minus">Min-</button>
        <div id="time-display">10:10</div>
      </div>

      <div class="ui-group">
        <button id="btn-spin">Spin: OFF</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.5, 3);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.3, 0);
    controls.minPolarAngle = 0.3;
    controls.maxPolarAngle = 1.4;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(3, 5, 3);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.set(2048, 2048);
    scene.add(directionalLight);

    const pedestal = new THREE.Mesh(
      new THREE.CylinderGeometry(1.2, 1.2, 0.05, 64),
      new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.9, metalness: 0.1 })
    );
    pedestal.position.y = -0.025;
    pedestal.receiveShadow = true;
    scene.add(pedestal);

    const watchGroup = new THREE.Group();
    watchGroup.position.set(0, 0.3, 0);
    scene.add(watchGroup);

    const strapOptions = {
      leather_brown: 0x8B4513,
      leather_black: 0x1a1a1a,
      silicone_blue: 0x1565C0,
      silicone_red: 0xC62828
    };

    let currentStrap = 'leather_brown';
    const strapMaterial = new THREE.MeshStandardMaterial({
      color: strapOptions[currentStrap],
      roughness: 0.8,
      metalness: 0.1
    });

    const upperStrap = new THREE.Mesh(
      new THREE.BoxGeometry(0.2, 0.02, 0.6),
      strapMaterial
    );
    upperStrap.position.set(0, 0, 0.55);
    upperStrap.castShadow = true;
    watchGroup.add(upperStrap);

    const lowerStrap = new THREE.Mesh(
      new THREE.BoxGeometry(0.2, 0.02, 0.6),
      strapMaterial
    );
    lowerStrap.position.set(0, 0, -0.55);
    lowerStrap.castShadow = true;
    watchGroup.add(lowerStrap);

    const strapMeshes = [upperStrap, lowerStrap];

    const handMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });

    function createHand(length, thickness) {
      const geom = new THREE.BoxGeometry(thickness, thickness, length);
      geom.translate(0, 0, length * 0.5);
      const pivot = new THREE.Group();
      const mesh = new THREE.Mesh(geom, handMaterial);
      pivot.add(mesh);
      return pivot;
    }

    const hourHandPivot = createHand(0.2, 0.018);
    const minuteHandPivot = createHand(0.3, 0.012);

    hourHandPivot.position.set(0, 0.03, 0);
    minuteHandPivot.position.set(0, 0.031, 0);

    watchGroup.add(hourHandPivot);
    watchGroup.add(minuteHandPivot);

    let hours = 10;
    let minutes = 10;
    let spinEnabled = false;
    let modelLoaded = false;
    let loadedModel = null;

    const timeDisplay = document.getElementById('time-display');
    const spinButton = document.getElementById('btn-spin');

    function formatTime(h, m) {
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    }

    function updateTimeDisplay() {
      timeDisplay.textContent = formatTime(hours, minutes);
    }

    function updateHands() {
      const minuteAngle = -(minutes / 60) * Math.PI * 2;
      const hourAngle = -(((hours % 12) + minutes / 60) / 12) * Math.PI * 2;

      minuteHandPivot.rotation.y = minuteAngle;
      hourHandPivot.rotation.y = hourAngle;
    }

    function incrementHour() {
      hours = (hours + 1) % 24;
      updateTimeDisplay();
      updateHands();
    }

    function decrementHour() {
      hours = (hours - 1 + 24) % 24;
      updateTimeDisplay();
      updateHands();
    }

    function incrementMinute() {
      minutes += 5;
      if (minutes >= 60) {
        minutes = 0;
        hours = (hours + 1) % 24;
      }
      updateTimeDisplay();
      updateHands();
    }

    function decrementMinute() {
      minutes -= 5;
      if (minutes < 0) {
        minutes = 55;
        hours = (hours - 1 + 24) % 24;
      }
      updateTimeDisplay();
      updateHands();
    }

    function setStrap(name) {
      currentStrap = name;
      strapMaterial.color.setHex(strapOptions[name]);
    }

    document.getElementById('btn-brown').addEventListener('click', () => setStrap('leather_brown'));
    document.getElementById('btn-black').addEventListener('click', () => setStrap('leather_black'));
    document.getElementById('btn-blue').addEventListener('click', () => setStrap('silicone_blue'));
    document.getElementById('btn-red').addEventListener('click', () => setStrap('silicone_red'));

    document.getElementById('btn-hour-plus').addEventListener('click', incrementHour);
    document.getElementById('btn-hour-minus').addEventListener('click', decrementHour);
    document.getElementById('btn-min-plus').addEventListener('click', incrementMinute);
    document.getElementById('btn-min-minus').addEventListener('click', decrementMinute);

    spinButton.addEventListener('click', () => {
      spinEnabled = !spinEnabled;
      spinButton.textContent = `Spin: ${spinEnabled ? 'ON' : 'OFF'}`;
    });

    updateTimeDisplay();
    updateHands();

    const loader = new GLTFLoader();
    loader.load(
      'Michelle.glb',
      (gltf) => {
        loadedModel = gltf.scene;

        loadedModel.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });

        const box = new THREE.Box3().setFromObject(loadedModel);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const targetMaxDim = 1.5;
        const scale = targetMaxDim / maxDim;
        loadedModel.scale.setScalar(scale);

        const scaledBox = new THREE.Box3().setFromObject(loadedModel);
        const scaledCenter = new THREE.Vector3();
        const scaledSize = new THREE.Vector3();
        scaledBox.getCenter(scaledCenter);
        scaledBox.getSize(scaledSize);

        loadedModel.position.sub(scaledCenter);
        loadedModel.position.y += scaledSize.y * 0.5;

        watchGroup.add(loadedModel);
        modelLoaded = true;
      },
      undefined,
      (error) => {
        console.error('Failed to load Michelle.glb:', error);
      }
    );

    window.__3D_STATE__ = {
      modelLoaded: false,
      currentStrap: currentStrap,
      strapColorHex: strapOptions[currentStrap],
      hours: hours,
      minutes: minutes,
      timeDisplay: formatTime(hours, minutes),
      spinEnabled: spinEnabled,
      watchRotationY: 0,
      hourHandAngle: hourHandPivot.rotation.y,
      minuteHandAngle: minuteHandPivot.rotation.y,
      strapCount: strapMeshes.length,
      cameraDistance: camera.position.length()
    };

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (spinEnabled) {
        watchGroup.rotation.y += 0.5 * delta;
      }

      controls.update();

      window.__3D_STATE__.modelLoaded = modelLoaded;
      window.__3D_STATE__.currentStrap = currentStrap;
      window.__3D_STATE__.strapColorHex = strapMaterial.color.getHex();
      window.__3D_STATE__.hours = hours;
      window.__3D_STATE__.minutes = minutes;
      window.__3D_STATE__.timeDisplay = formatTime(hours, minutes);
      window.__3D_STATE__.spinEnabled = spinEnabled;
      window.__3D_STATE__.watchRotationY = watchGroup.rotation.y;
      window.__3D_STATE__.hourHandAngle = hourHandPivot.rotation.y;
      window.__3D_STATE__.minuteHandAngle = minuteHandPivot.rotation.y;
      window.__3D_STATE__.strapCount = strapMeshes.length;
      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
