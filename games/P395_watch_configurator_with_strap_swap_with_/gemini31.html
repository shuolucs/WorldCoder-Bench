<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Watch Configurator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            min-width: 350px;
        }
        .ui-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .color-swatch {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        #time-display {
            font-size: 24px;
            font-weight: bold;
            font-family: monospace;
            margin: 0 15px;
            min-width: 80px;
            text-align: center;
        }
        .time-btn {
            font-weight: bold;
            width: 40px;
            justify-content: center;
        }
        #btn-spin {
            width: 100%;
            justify-content: center;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-panel">
        <div class="ui-row">
            <button id="btn-brown"><span class="color-swatch" style="background: #8B4513;"></span>Brown</button>
            <button id="btn-black"><span class="color-swatch" style="background: #1a1a1a;"></span>Black</button>
            <button id="btn-blue"><span class="color-swatch" style="background: #1565C0;"></span>Blue</button>
            <button id="btn-red"><span class="color-swatch" style="background: #C62828;"></span>Red</button>
        </div>
        <div class="ui-row">
            <button id="btn-hour-minus" class="time-btn">H-</button>
            <button id="btn-hour-plus" class="time-btn">H+</button>
            <div id="time-display">10:10</div>
            <button id="btn-min-minus" class="time-btn">M-</button>
            <button id="btn-min-plus" class="time-btn">M+</button>
        </div>
        <div class="ui-row">
            <button id="btn-spin">Spin: OFF</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            currentStrap: 'leather_brown',
            strapColorHex: 0x8B4513,
            hours: 10,
            minutes: 10,
            timeDisplay: '10:10',
            spinEnabled: false,
            watchRotationY: 0,
            hourHandAngle: 0,
            minuteHandAngle: 0,
            strapCount: 2,
            cameraDistance: 3
        };

        const STRAP_COLORS = {
            'leather_brown': 0x8B4513,
            'leather_black': 0x1a1a1a,
            'silicone_blue': 0x1565C0,
            'silicone_red': 0xC62828
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 3);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(3, 5, 3);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 15;
        scene.add(dirLight);

        // --- Pedestal ---
        const pedestalGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.05, 64);
        const pedestalMat = new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.8 });
        const pedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
        pedestal.position.y = -0.025; // Top surface at y=0
        pedestal.receiveShadow = true;
        scene.add(pedestal);

        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minPolarAngle = 0.3;
        controls.maxPolarAngle = 1.4;
        controls.minDistance = 1.5;
        controls.maxDistance = 6;

        // --- Watch Group ---
        const watchGroup = new THREE.Group();
        scene.add(watchGroup);

        // --- Strap System ---
        const strapMaterial = new THREE.MeshStandardMaterial({ 
            color: window.__3D_STATE__.strapColorHex,
            roughness: 0.6,
            metalness: 0.1
        });

        const strapGeo = new THREE.BoxGeometry(0.2, 0.02, 0.6);
        
        const upperStrap = new THREE.Mesh(strapGeo, strapMaterial);
        upperStrap.position.set(0, 0, -0.55); // -Z is usually "up" on the face if looking from +Z
        upperStrap.castShadow = true;
        upperStrap.receiveShadow = true;
        watchGroup.add(upperStrap);

        const lowerStrap = new THREE.Mesh(strapGeo, strapMaterial);
        lowerStrap.position.set(0, 0, 0.55);
        lowerStrap.castShadow = true;
        lowerStrap.receiveShadow = true;
        watchGroup.add(lowerStrap);

        // --- Clock Hands ---
        const handMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
        
        // Hour hand
        const hourGeo = new THREE.BoxGeometry(0.02, 0.01, 0.2);
        hourGeo.translate(0, 0, -0.1); // Pivot at origin, pointing -Z
        const hourHand = new THREE.Mesh(hourGeo, handMaterial);
        hourHand.position.y = 0.1;
        watchGroup.add(hourHand);

        // Minute hand
        const minGeo = new THREE.BoxGeometry(0.01, 0.01, 0.3);
        minGeo.translate(0, 0, -0.15); // Pivot at origin, pointing -Z
        const minHand = new THREE.Mesh(minGeo, handMaterial);
        minHand.position.y = 0.11; // Slightly above hour hand
        watchGroup.add(minHand);

        // --- Load Model ---
        const loader = new GLTFLoader();
        loader.load(
            'Michelle.glb',
            (gltf) => {
                const model = gltf.scene;
                
                // Auto-scale
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 1.5 / maxDim;
                model.scale.setScalar(scale);
                
                // Center
                box.setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                
                // Enable shadows
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                // Add a wrapper to keep the model centered while allowing watchGroup to rotate
                const modelWrapper = new THREE.Group();
                modelWrapper.add(model);
                watchGroup.add(modelWrapper);

                window.__3D_STATE__.modelLoaded = true;
            },
            undefined,
            (error) => {
                console.warn('Model Michelle.glb could not be loaded. Proceeding with procedural parts only.', error);
                // We still set loaded to true so the rest of the app functions
                window.__3D_STATE__.modelLoaded = true; 
            }
        );

        // --- Logic Functions ---
        function updateTimeDisplay() {
            const h = String(window.__3D_STATE__.hours).padStart(2, '0');
            const m = String(window.__3D_STATE__.minutes).padStart(2, '0');
            window.__3D_STATE__.timeDisplay = `${h}:${m}`;
            document.getElementById('time-display').innerText = window.__3D_STATE__.timeDisplay;
            updateHands();
        }

        function updateHands() {
            const h = window.__3D_STATE__.hours;
            const m = window.__3D_STATE__.minutes;
            
            // Calculate angles (clockwise around +Y means negative angle)
            const minAngle = (m / 60) * Math.PI * 2;
            const hourAngle = ((h % 12) + m / 60) / 12 * Math.PI * 2;
            
            minHand.rotation.y = -minAngle;
            hourHand.rotation.y = -hourAngle;

            window.__3D_STATE__.minuteHandAngle = minHand.rotation.y;
            window.__3D_STATE__.hourHandAngle = hourHand.rotation.y;
        }

        function setStrapColor(name, hex) {
            window.__3D_STATE__.currentStrap = name;
            window.__3D_STATE__.strapColorHex = hex;
            strapMaterial.color.setHex(hex);
        }

        // --- Event Listeners ---
        document.getElementById('btn-brown').addEventListener('click', () => setStrapColor('leather_brown', STRAP_COLORS['leather_brown']));
        document.getElementById('btn-black').addEventListener('click', () => setStrapColor('leather_black', STRAP_COLORS['leather_black']));
        document.getElementById('btn-blue').addEventListener('click', () => setStrapColor('silicone_blue', STRAP_COLORS['silicone_blue']));
        document.getElementById('btn-red').addEventListener('click', () => setStrapColor('silicone_red', STRAP_COLORS['silicone_red']));

        document.getElementById('btn-hour-plus').addEventListener('click', () => {
            window.__3D_STATE__.hours = (window.__3D_STATE__.hours + 1) % 24;
            updateTimeDisplay();
        });
        
        document.getElementById('btn-hour-minus').addEventListener('click', () => {
            window.__3D_STATE__.hours = (window.__3D_STATE__.hours - 1 + 24) % 24;
            updateTimeDisplay();
        });

        document.getElementById('btn-min-plus').addEventListener('click', () => {
            window.__3D_STATE__.minutes += 5;
            if (window.__3D_STATE__.minutes >= 60) {
                window.__3D_STATE__.minutes -= 60;
                window.__3D_STATE__.hours = (window.__3D_STATE__.hours + 1) % 24;
            }
            updateTimeDisplay();
        });

        document.getElementById('btn-min-minus').addEventListener('click', () => {
            window.__3D_STATE__.minutes -= 5;
            if (window.__3D_STATE__.minutes < 0) {
                window.__3D_STATE__.minutes += 60;
                window.__3D_STATE__.hours = (window.__3D_STATE__.hours - 1 + 24) % 24;
            }
            updateTimeDisplay();
        });

        const btnSpin = document.getElementById('btn-spin');
        btnSpin.addEventListener('click', () => {
            window.__3D_STATE__.spinEnabled = !window.__3D_STATE__.spinEnabled;
            btnSpin.innerText = window.__3D_STATE__.spinEnabled ? 'Spin: ON' : 'Spin: OFF';
            if(window.__3D_STATE__.spinEnabled) {
                btnSpin.style.background = 'rgba(255, 255, 255, 0.3)';
            } else {
                btnSpin.style.background = 'rgba(255, 255, 255, 0.15)';
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize
        updateTimeDisplay();

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();

            controls.update();

            if (window.__3D_STATE__.spinEnabled) {
                watchGroup.rotation.y += 0.5 * delta;
            }

            // Update State
            window.__3D_STATE__.watchRotationY = watchGroup.rotation.y;
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
