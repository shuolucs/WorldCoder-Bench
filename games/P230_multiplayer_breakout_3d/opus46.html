<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Multiplayer Breakout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
}
#p1Score {
    position: absolute;
    bottom: 20px; left: 20px;
    color: #4488ff;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(68,136,255,0.5);
}
#p2Score {
    position: absolute;
    top: 20px; right: 20px;
    color: #ff4444;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,68,68,0.5);
}
#bricksLeft {
    position: absolute;
    top: 20px; left: 50%; transform: translateX(-50%);
    color: #ffffff;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
}
#startBtn {
    position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    padding: 20px 50px;
    font-size: 28px;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(135deg, #4488ff, #ff4444);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    pointer-events: all;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: transform 0.2s;
}
#startBtn:hover { transform: translate(-50%, -50%) scale(1.05); }
#resetBtn {
    position: absolute;
    bottom: 20px; left: 50%; transform: translateX(-50%);
    padding: 10px 30px;
    font-size: 16px;
    font-weight: bold;
    color: #fff;
    background: #555;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    pointer-events: all;
    transition: background 0.2s;
}
#resetBtn:hover { background: #777; }
#gameOverText {
    position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #fff;
    font-size: 42px;
    font-weight: bold;
    text-shadow: 0 0 20px rgba(255,255,255,0.8);
    display: none;
    pointer-events: none;
    text-align: center;
}
#controls {
    position: absolute;
    bottom: 60px; left: 50%; transform: translateX(-50%);
    color: #aaa;
    font-size: 13px;
    text-align: center;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="hud">
    <div id="p1Score">P1 Score: 0</div>
    <div id="p2Score">P2 Score: 0</div>
    <div id="bricksLeft">Bricks Left: 24</div>
    <button id="startBtn">Start Game</button>
    <button id="resetBtn">Reset</button>
    <div id="gameOverText"></div>
    <div id="controls">P1: A/D &nbsp;|&nbsp; P2: ←/→</div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111122);
scene.fog = new THREE.Fog(0x111122, 30, 60);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 25, 30);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(10, 20, 10);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
directionalLight.shadow.camera.near = 0.5;
directionalLight.shadow.camera.far = 60;
directionalLight.shadow.camera.left = -20;
directionalLight.shadow.camera.right = 20;
directionalLight.shadow.camera.top = 25;
directionalLight.shadow.camera.bottom = -25;
scene.add(directionalLight);

// Ground plane
const groundGeom = new THREE.BoxGeometry(30, 0.2, 40);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8, metalness: 0.2 });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.position.set(0, 0, 0);
ground.receiveShadow = true;
scene.add(ground);

// Side walls
const wallGeom = new THREE.BoxGeometry(0.3, 2, 40);
const wallMat = new THREE.MeshStandardMaterial({ color: 0x2244aa, transparent: true, opacity: 0.4, roughness: 0.3, metalness: 0.5 });

const leftWall = new THREE.Mesh(wallGeom, wallMat.clone());
leftWall.position.set(-15, 1, 0);
scene.add(leftWall);

const rightWall = new THREE.Mesh(wallGeom, wallMat.clone());
rightWall.position.set(15, 1, 0);
scene.add(rightWall);

// Grid lines on ground for visual effect
const gridHelper = new THREE.GridHelper(40, 40, 0x333344, 0x222233);
gridHelper.position.y = 0.11;
scene.add(gridHelper);

// ============ PADDLES ============
const paddleGeom = new THREE.BoxGeometry(3, 0.5, 0.8);

const p1PaddleMat = new THREE.MeshStandardMaterial({ color: 0x4488ff, emissive: 0x112244, roughness: 0.3, metalness: 0.7 });
const p1Paddle = new THREE.Mesh(paddleGeom, p1PaddleMat);
p1Paddle.position.set(0, 0.35, -18);
p1Paddle.castShadow = true;
scene.add(p1Paddle);

const p2PaddleMat = new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0x441122, roughness: 0.3, metalness: 0.7 });
const p2Paddle = new THREE.Mesh(paddleGeom, p2PaddleMat);
p2Paddle.position.set(0, 0.35, 18);
p2Paddle.castShadow = true;
scene.add(p2Paddle);

// ============ BALLS ============
const ballGeom = new THREE.SphereGeometry(0.3, 16, 16);

const ball1Mat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x444444, roughness: 0.1, metalness: 0.8 });
const ball1 = new THREE.Mesh(ballGeom, ball1Mat);
ball1.position.set(0, 0.5, -16);
ball1.castShadow = true;
scene.add(ball1);

const ball2Mat = new THREE.MeshStandardMaterial({ color: 0xffff44, emissive: 0x444400, roughness: 0.1, metalness: 0.8 });
const ball2 = new THREE.Mesh(ballGeom, ball2Mat);
ball2.position.set(0, 0.5, 16);
ball2.castShadow = true;
scene.add(ball2);

// Ball trails
const trail1Points = [];
const trail2Points = [];
const maxTrailLength = 20;

// ============ BRICKS ============
const brickRows = 4;
const brickCols = 6;
const brickWidth = 1.8;
const brickHeight = 0.5;
const brickDepth = 0.8;
const brickGap = 0.2;
const rowColors = [0x44ff44, 0xffff44, 0xff8844, 0xff4444];
const rowEmissive = [0x114411, 0x444411, 0x441111, 0x441111];

let bricks = [];

function createBricks() {
    // Remove existing bricks
    bricks.forEach(b => {
        scene.remove(b.mesh);
        b.mesh.geometry.dispose();
        b.mesh.material.dispose();
    });
    bricks = [];

    const totalWidth = brickCols * (brickWidth + brickGap) - brickGap;
    const totalDepth = brickRows * (brickDepth + brickGap) - brickGap;
    const startX = -totalWidth / 2 + brickWidth / 2;
    const startZ = -totalDepth / 2 + brickDepth / 2;

    for (let row = 0; row < brickRows; row++) {
        for (let col = 0; col < brickCols; col++) {
            const geom = new THREE.BoxGeometry(brickWidth, brickHeight, brickDepth);
            const mat = new THREE.MeshStandardMaterial({
                color: rowColors[row],
                emissive: rowEmissive[row],
                roughness: 0.4,
                metalness: 0.6
            });
            const mesh = new THREE.Mesh(geom, mat);
            const x = startX + col * (brickWidth + brickGap);
            const z = startZ + row * (brickDepth + brickGap);
            mesh.position.set(x, 0.35, z);
            mesh.castShadow = true;
            scene.add(mesh);
            bricks.push({
                mesh: mesh,
                alive: true,
                x: x,
                z: z,
                halfW: brickWidth / 2,
                halfD: brickDepth / 2
            });
        }
    }
}

createBricks();

// ============ TRUCK MODEL ============
let truckModel = null;
const loader = new GLTFLoader();

loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/CesiumMilkTruck/glTF-Binary/CesiumMilkTruck.glb',
    (gltf) => {
        truckModel = gltf.scene;
        truckModel.scale.set(0.5, 0.5, 0.5);
        truckModel.position.set(0, 3, 0);
        truckModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
            }
        });
        scene.add(truckModel);
        window.__3D_STATE__.truckModel = truckModel;
        window.__3D_STATE__.truckModelLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('Could not load truck model:', error);
        // Create a placeholder trophy
        const trophyGeom = new THREE.CylinderGeometry(0.5, 0.8, 1.5, 8);
        const trophyMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, metalness: 0.9, roughness: 0.1 });
        truckModel = new THREE.Mesh(trophyGeom, trophyMat);
        truckModel.position.set(0, 3, 0);
        scene.add(truckModel);
        window.__3D_STATE__.truckModel = truckModel;
        window.__3D_STATE__.truckModelLoaded = true;
    }
);

// ============ GAME STATE ============
const BALL_SPEED = 0.19;
const PADDLE_SPEED = 0.4;

let ball1Vel = { x: 0.12, z: 0.15 };
let ball2Vel = { x: -0.12, z: -0.15 };

window.__3D_STATE__ = {
    gameStarted: false,
    p1Score: 0,
    p2Score: 0,
    bricksRemaining: 24,
    ball1Velocity: { x: ball1Vel.x, z: ball1Vel.z },
    ball2Velocity: { x: ball2Vel.x, z: ball2Vel.z },
    ball1Position: { x: 0, z: -16 },
    ball2Position: { x: 0, z: 16 },
    p1PaddleX: 0,
    p2PaddleX: 0,
    truckRotationSpeed: 0.5,
    bricksDestroyed: 0,
    gameOver: false,
    winner: null,
    truckModelLoaded: false,
    truckModel: null
};

const state = window.__3D_STATE__;

// ============ INPUT ============
const keys = {};
window.addEventListener('keydown', (e) => { keys[e.key] = true; keys[e.code] = true; });
window.addEventListener('keyup', (e) => { keys[e.key] = false; keys[e.code] = false; });

// ============ HUD ============
const p1ScoreEl = document.getElementById('p1Score');
const p2ScoreEl = document.getElementById('p2Score');
const bricksLeftEl = document.getElementById('bricksLeft');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const gameOverText = document.getElementById('gameOverText');

function updateHUD() {
    p1ScoreEl.textContent = `P1 Score: ${state.p1Score}`;
    p2ScoreEl.textContent = `P2 Score: ${state.p2Score}`;
    bricksLeftEl.textContent = `Bricks Left: ${state.bricksRemaining}`;
}

// ============ FLASH EFFECT ============
let flashTimer = 0;
const originalGroundColor = new THREE.Color(0x222222);
const flashColor = new THREE.Color(0xffffff);

function triggerFlash() {
    flashTimer = 100;
    groundMat.emissive.copy(flashColor);
    groundMat.emissiveIntensity = 0.5;
}

// ============ PARTICLE SYSTEM ============
const particles = [];

function spawnParticles(x, y, z, color) {
    for (let i = 0; i < 8; i++) {
        const geom = new THREE.SphereGeometry(0.08, 4, 4);
        const mat = new THREE.MeshBasicMaterial({ color: color });
        const mesh = new THREE.Mesh(geom, mat);
        mesh.position.set(x, y, z);
        scene.add(mesh);
        particles.push({
            mesh: mesh,
            vx: (Math.random() - 0.5) * 0.3,
            vy: Math.random() * 0.2 + 0.1,
            vz: (Math.random() - 0.5) * 0.3,
            life: 60
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.mesh.position.x += p.vx;
        p.mesh.position.y += p.vy;
        p.mesh.position.z += p.vz;
        p.vy -= 0.005;
        p.life--;
        p.mesh.material.opacity = p.life / 60;
        p.mesh.material.transparent = true;
        if (p.life <= 0) {
            scene.remove(p.mesh);
            p.mesh.geometry.dispose();
            p.mesh.material.dispose();
            particles.splice(i, 1);
        }
    }
}

// ============ NORMALIZE VELOCITY ============
function normalizeVel(vel, speed) {
    const mag = Math.sqrt(vel.x * vel.x + vel.z * vel.z);
    if (mag === 0 || isNaN(mag)) {
        vel.x = 0.12;
        vel.z = speed > 0 ? 0.15 : -0.15;
        return;
    }
    vel.x = (vel.x / mag) * speed;
    vel.z = (vel.z / mag) * speed;
}

// ============ BALL-BRICK COLLISION ============
function checkBrickCollision(ballMesh, ballVel, player) {
    const bx = ballMesh.position.x;
    const bz = ballMesh.position.z;
    const br = 0.3;

    for (let i = 0; i < bricks.length; i++) {
        const brick = bricks[i];
        if (!brick.alive) continue;

        const dx = bx - brick.x;
        const dz = bz - brick.z;

        if (Math.abs(dx) < brick.halfW + br && Math.abs(dz) < brick.halfD + br) {
            // Determine which side was hit
            const overlapX = brick.halfW + br - Math.abs(dx);
            const overlapZ = brick.halfD + br - Math.abs(dz);

            if (overlapX < overlapZ) {
                ballVel.x = -ballVel.x;
            } else {
                ballVel.z = -ballVel.z;
            }

            // Destroy brick
            brick.alive = false;
            scene.remove(brick.mesh);
            brick.mesh.geometry.dispose();
            brick.mesh.material.dispose();

            // Spawn particles
            spawnParticles(brick.x, 0.35, brick.z, brick.mesh.material.color || 0xffffff);

            // Update score
            if (player === 1) {
                state.p1Score += 10;
            } else {
                state.p2Score += 10;
            }

            state.bricksDestroyed++;
            state.bricksRemaining--;
            state.truckRotationSpeed = Math.min(3.0, 0.5 + state.bricksDestroyed * 0.1);

            triggerFlash();
            updateHUD();

            // Check game over
            if (state.bricksRemaining <= 0) {
                state.gameOver = true;
                if (state.p1Score > state.p2Score) {
                    state.winner = 'P1';
                } else if (state.p2Score > state.p1Score) {
                    state.winner = 'P2';
                } else {
                    state.winner = 'TIE';
                }
                const winText = state.winner === 'TIE' ? "GAME OVER - IT'S A TIE!" : `GAME OVER - ${state.winner} WINS!`;
                gameOverText.textContent = winText;
                gameOverText.style.display = 'block';
            }

            return true;
        }
    }
    return false;
}

// ============ BALL-PADDLE COLLISION ============
function checkPaddleCollision(ballMesh, ballVel, paddle, isTop) {
    const bx = ballMesh.position.x;
    const bz = ballMesh.position.z;
    const br = 0.3;
    const px = paddle.position.x;
    const pz = paddle.position.z;
    const phw = 1.5; // half width
    const phd = 0.4; // half depth

    if (Math.abs(bx - px) < phw + br && Math.abs(bz - pz) < phd + br) {
        // Reflect Z
        if (isTop) {
            ballVel.z = -Math.abs(ballVel.z); // go negative (toward center)
            ballMesh.position.z = pz - phd - br - 0.01;
        } else {
            ballVel.z = Math.abs(ballVel.z); // go positive (toward center)
            ballMesh.position.z = pz + phd + br + 0.01;
        }

        // Add X offset based on hit position
        const hitOffset = (bx - px) / phw;
        ballVel.x += hitOffset * 0.05;

        // Normalize to maintain speed
        normalizeVel(ballVel, BALL_SPEED);
        return true;
    }
    return false;
}

// ============ RESET BALL ============
function resetBall1(towardP1) {
    ball1.position.set(0, 0.5, -16);
    if (towardP1) {
        ball1Vel = { x: 0.12, z: -0.15 };
    } else {
        ball1Vel = { x: 0.12, z: 0.15 };
    }
}

function resetBall2(towardP2) {
    ball2.position.set(0, 0.5, 16);
    if (towardP2) {
        ball2Vel = { x: -0.12, z: 0.15 };
    } else {
        ball2Vel = { x: -0.12, z: -0.15 };
    }
}

// ============ FULL RESET ============
function resetGame() {
    state.gameStarted = false;
    state.p1Score = 0;
    state.p2Score = 0;
    state.bricksRemaining = 24;
    state.bricksDestroyed = 0;
    state.truckRotationSpeed = 0.5;
    state.gameOver = false;
    state.winner = null;

    ball1.position.set(0, 0.5, -16);
    ball2.position.set(0, 0.5, 16);
    ball1Vel = { x: 0.12, z: 0.15 };
    ball2Vel = { x: -0.12, z: -0.15 };

    p1Paddle.position.x = 0;
    p2Paddle.position.x = 0;
    state.p1PaddleX = 0;
    state.p2PaddleX = 0;

    createBricks();

    gameOverText.style.display = 'none';
    startBtn.style.display = 'block';

    // Clear particles
    particles.forEach(p => {
        scene.remove(p.mesh);
        p.mesh.geometry.dispose();
        p.mesh.material.dispose();
    });
    particles.length = 0;

    updateHUD();
}

// ============ BUTTONS ============
startBtn.addEventListener('click', () => {
    state.gameStarted = true;
    startBtn.style.display = 'none';
});

resetBtn.addEventListener('click', resetGame);

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    // Rotate truck
    if (truckModel) {
        truckModel.rotation.y += state.truckRotationSpeed * delta;
        // Slight bobbing
        truckModel.position.y = 3 + Math.sin(Date.now() * 0.002) * 0.2;
    }

    // Flash effect
    if (flashTimer > 0) {
        flashTimer -= delta * 1000;
        if (flashTimer <= 0) {
            groundMat.emissive.set(0x000000);
            groundMat.emissiveIntensity = 0;
        }
    }

    // Update particles
    updateParticles();

    if (!state.gameStarted || state.gameOver) {
        // Update state even when paused
        state.ball1Position.x = ball1.position.x;
        state.ball1Position.z = ball1.position.z;
        state.ball2Position.x = ball2.position.x;
        state.ball2Position.z = ball2.position.z;
        state.ball1Velocity.x = ball1Vel.x;
        state.ball1Velocity.z = ball1Vel.z;
        state.ball2Velocity.x = ball2Vel.x;
        state.ball2Velocity.z = ball2Vel.z;

        renderer.render(scene, camera);
        return;
    }

    // ---- PADDLE MOVEMENT ----
    if (keys['a'] || keys['A']) {
        p1Paddle.position.x -= PADDLE_SPEED;
    }
    if (keys['d'] || keys['D']) {
        p1Paddle.position.x += PADDLE_SPEED;
    }
    p1Paddle.position.x = Math.max(-13.5, Math.min(13.5, p1Paddle.position.x));
    state.p1PaddleX = p1Paddle.position.x;

    if (keys['ArrowLeft']) {
        p2Paddle.position.x -= PADDLE_SPEED;
    }
    if (keys['ArrowRight']) {
        p2Paddle.position.x += PADDLE_SPEED;
    }
    p2Paddle.position.x = Math.max(-13.5, Math.min(13.5, p2Paddle.position.x));
    state.p2PaddleX = p2Paddle.position.x;

    // ---- BALL 1 MOVEMENT ----
    ball1.position.x += ball1Vel.x;
    ball1.position.z += ball1Vel.z;
    ball1.position.y = 0.5;

    // Wall bounce ball 1
    if (ball1.position.x <= -14.7) {
        ball1.position.x = -14.7;
        ball1Vel.x = Math.abs(ball1Vel.x);
    }
    if (ball1.position.x >= 14.7) {
        ball1.position.x = 14.7;
        ball1Vel.x = -Math.abs(ball1Vel.x);
    }

    // Paddle collision ball 1
    checkPaddleCollision(ball1, ball1Vel, p1Paddle, false);
    checkPaddleCollision(ball1, ball1Vel, p2Paddle, true);

    // Brick collision ball 1 - determine which player based on ball direction
    const ball1Player = ball1Vel.z > 0 ? 1 : 2; // moving toward P2 = P1 hit it last
    checkBrickCollision(ball1, ball1Vel, ball1Player);

    // Out of bounds ball 1
    if (ball1.position.z < -20) {
        // P2 scores
        state.p2Score += 0; // No score for out of bounds, just reset
        resetBall1(true); // toward P1 who lost
    }
    if (ball1.position.z > 20) {
        // P1 scores
        state.p1Score += 0;
        resetBall1(false); // toward center
    }

    // ---- BALL 2 MOVEMENT ----
    ball2.position.x += ball2Vel.x;
    ball2.position.z += ball2Vel.z;
    ball2.position.y = 0.5;

    // Wall bounce ball 2
    if (ball2.position.x <= -14.7) {
        ball2.position.x = -14.7;
        ball2Vel.x = Math.abs(ball2Vel.x);
    }
    if (ball2.position.x >= 14.7) {
        ball2.position.x = 14.7;
        ball2Vel.x = -Math.abs(ball2Vel.x);
    }

    // Paddle collision ball 2
    checkPaddleCollision(ball2, ball2Vel, p1Paddle, false);
    checkPaddleCollision(ball2, ball2Vel, p2Paddle, true);

    // Brick collision ball 2
    const ball2Player = ball2Vel.z < 0 ? 2 : 1;
    checkBrickCollision(ball2, ball2Vel, ball2Player);

    // Out of bounds ball 2
    if (ball2.position.z < -20) {
        resetBall2(false);
    }
    if (ball2.position.z > 20) {
        resetBall2(true);
    }

    // Sanitize velocities
    if (isNaN(ball1Vel.x) || isNaN(ball1Vel.z)) {
        ball1Vel = { x: 0.12, z: 0.15 };
    }
    if (isNaN(ball2Vel.x) || isNaN(ball2Vel.z)) {
        ball2Vel = { x: -0.12, z: -0.15 };
    }

    // Update state
    state.ball1Position.x = ball1.position.x;
    state.ball1Position.z = ball1.position.z;
    state.ball2Position.x = ball2.position.x;
    state.ball2Position.z = ball2.position.z;
    state.ball1Velocity.x = ball1Vel.x;
    state.ball1Velocity.z = ball1Vel.z;
    state.ball2Velocity.x = ball2Vel.x;
    state.ball2Velocity.z = ball2Vel.z;

    // Ball glow effect
    ball1Mat.emissiveIntensity = 0.5 + Math.sin(Date.now() * 0.005) * 0.3;
    ball2Mat.emissiveIntensity = 0.5 + Math.sin(Date.now() * 0.005 + 1) * 0.3;

    renderer.render(scene, camera);
}

updateHUD();
animate();
</script>
