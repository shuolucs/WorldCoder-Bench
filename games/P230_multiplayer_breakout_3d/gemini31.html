<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Multiplayer Breakout</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .score {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            padding: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #p1Score {
            bottom: 20px;
            left: 20px;
            color: #4488ff;
        }
        #p2Score {
            top: 20px;
            right: 20px;
            color: #ff4444;
        }
        #bricksLeft {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .btn {
            position: absolute;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: rgba(50, 50, 50, 0.8);
            border: 2px solid white;
            border-radius: 8px;
            cursor: pointer;
            pointer-events: auto;
            transition: background 0.2s;
        }
        .btn:hover {
            background: rgba(100, 100, 100, 0.9);
        }
        #startBtn {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        #resetBtn {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
        #gameOverText {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffff00;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
            display: none;
            text-align: center;
            width: 100%;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="hud">
        <div id="p1Score">P1 Score: 0</div>
        <div id="p2Score">P2 Score: 0</div>
        <div id="bricksLeft">Bricks Left: 24</div>
        <div id="gameOverText">GAME OVER</div>
        <button id="startBtn" class="btn">Start Game</button>
        <button id="resetBtn" class="btn">Reset</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Game State ---
        window.__3D_STATE__ = {
            gameStarted: false,
            p1Score: 0,
            p2Score: 0,
            bricksRemaining: 24,
            ball1Velocity: { x: 0, z: 0 },
            ball2Velocity: { x: 0, z: 0 },
            ball1Position: { x: 0, z: 0 },
            ball2Position: { x: 0, z: 0 },
            p1PaddleX: 0,
            p2PaddleX: 0,
            truckRotationSpeed: 0.5,
            bricksDestroyed: 0,
            gameOver: false,
            winner: null,
            truckModelLoaded: false,
            truckModel: null
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 25, 30);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Arena
        const groundGeo = new THREE.BoxGeometry(30, 0.2, 40);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.position.y = 0;
        scene.add(ground);

        const wallGeo = new THREE.BoxGeometry(0.5, 2, 40);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x0000ff, transparent: true, opacity: 0.5 });
        
        const leftWall = new THREE.Mesh(wallGeo, wallMat);
        leftWall.position.set(-15.25, 1, 0);
        scene.add(leftWall);

        const rightWall = new THREE.Mesh(wallGeo, wallMat);
        rightWall.position.set(15.25, 1, 0);
        scene.add(rightWall);

        // --- Entities ---
        // Paddles
        const paddleGeo = new THREE.BoxGeometry(3, 0.5, 0.8);
        const p1Mat = new THREE.MeshStandardMaterial({ color: 0x0000ff });
        const p2Mat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        
        const paddle1 = new THREE.Mesh(paddleGeo, p1Mat);
        paddle1.position.set(0, 0.5, -18);
        scene.add(paddle1);

        const paddle2 = new THREE.Mesh(paddleGeo, p2Mat);
        paddle2.position.set(0, 0.5, 18);
        scene.add(paddle2);

        // Balls
        const ballGeo = new THREE.SphereGeometry(0.3, 32, 32);
        const b1Mat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const b2Mat = new THREE.MeshStandardMaterial({ color: 0xffff00 });

        const ball1 = new THREE.Mesh(ballGeo, b1Mat);
        scene.add(ball1);

        const ball2 = new THREE.Mesh(ballGeo, b2Mat);
        scene.add(ball2);

        // Bricks
        const bricks = [];
        const brickGeo = new THREE.BoxGeometry(1.8, 0.5, 0.8);
        const rowColors = [0x00ff00, 0xffff00, 0xffa500, 0xff0000];
        const brickGroup = new THREE.Group();
        scene.add(brickGroup);

        function createBricks() {
            // Clear existing
            while(brickGroup.children.length > 0){ 
                brickGroup.remove(brickGroup.children[0]); 
            }
            bricks.length = 0;

            const startX = -5.0;
            const startZ = -1.5;
            
            for (let row = 0; row < 4; row++) {
                const mat = new THREE.MeshStandardMaterial({ color: rowColors[row] });
                for (let col = 0; col < 6; col++) {
                    const brick = new THREE.Mesh(brickGeo, mat);
                    brick.position.set(startX + col * 2.0, 0.5, startZ + row * 1.0);
                    brickGroup.add(brick);
                    bricks.push(brick);
                }
            }
        }

        // --- 3D Asset ---
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/CesiumMilkTruck/glTF-Binary/CesiumMilkTruck.glb',
            function (gltf) {
                const truck = gltf.scene;
                truck.scale.set(0.5, 0.5, 0.5);
                truck.position.set(0, 3, 0);
                scene.add(truck);
                state.truckModel = truck;
                state.truckModelLoaded = true;
            }
        );

        // --- Input ---
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.key] = true);
        window.addEventListener('keyup', (e) => keys[e.key] = false);

        // --- UI Logic ---
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const p1ScoreEl = document.getElementById('p1Score');
        const p2ScoreEl = document.getElementById('p2Score');
        const bricksLeftEl = document.getElementById('bricksLeft');
        const gameOverTextEl = document.getElementById('gameOverText');

        function initGame() {
            state.p1Score = 0;
            state.p2Score = 0;
            state.bricksRemaining = 24;
            state.bricksDestroyed = 0;
            state.truckRotationSpeed = 0.5;
            state.gameOver = false;
            state.winner = null;

            paddle1.position.set(0, 0.5, -18);
            paddle2.position.set(0, 0.5, 18);

            ball1.position.set(0, 0.5, -16);
            ball1.userData = { vel: { x: 0.12, z: 0.15 }, lastTouchedBy: 1 };
            
            ball2.position.set(0, 0.5, 16);
            ball2.userData = { vel: { x: -0.12, z: -0.15 }, lastTouchedBy: 2 };

            createBricks();
            updateHUD();
            gameOverTextEl.style.display = 'none';
        }

        startBtn.addEventListener('click', () => {
            state.gameStarted = true;
            startBtn.style.display = 'none';
        });

        resetBtn.addEventListener('click', () => {
            state.gameStarted = false;
            startBtn.style.display = 'block';
            initGame();
        });

        function updateHUD() {
            p1ScoreEl.innerText = `P1 Score: ${state.p1Score}`;
            p2ScoreEl.innerText = `P2 Score: ${state.p2Score}`;
            bricksLeftEl.innerText = `Bricks Left: ${state.bricksRemaining}`;
        }

        function flashGround() {
            groundMat.emissive.setHex(0xffffff);
            setTimeout(() => {
                groundMat.emissive.setHex(0x000000);
            }, 100);
        }

        // --- Physics & Logic ---
        const TARGET_SPEED = 0.19;

        function normalizeVelocity(vel) {
            const speed = Math.sqrt(vel.x * vel.x + vel.z * vel.z);
            if (speed > 0 && !isNaN(speed)) {
                vel.x = (vel.x / speed) * TARGET_SPEED;
                vel.z = (vel.z / speed) * TARGET_SPEED;
            } else {
                vel.x = TARGET_SPEED;
                vel.z = 0;
            }
        }

        function resetBall(ball, loser) {
            ball.position.set(0, 0.5, 0);
            ball.userData.vel.x = (Math.random() - 0.5) * 0.2;
            ball.userData.vel.z = loser === 1 ? -0.15 : 0.15;
            ball.userData.lastTouchedBy = loser === 1 ? 2 : 1;
            normalizeVelocity(ball.userData.vel);
        }

        function checkPaddleCollision(ball, paddle, playerNum) {
            const r = 0.3;
            const px = paddle.position.x;
            const pz = paddle.position.z;
            const hw = 1.5;
            const hd = 0.4;

            const closestX = Math.max(px - hw, Math.min(ball.position.x, px + hw));
            const closestZ = Math.max(pz - hd, Math.min(ball.position.z, pz + hd));

            const dx = ball.position.x - closestX;
            const dz = ball.position.z - closestZ;

            if (dx * dx + dz * dz < r * r) {
                ball.userData.vel.z *= -1;
                const hitFactor = (ball.position.x - px) / hw;
                ball.userData.vel.x += hitFactor * 0.1;
                normalizeVelocity(ball.userData.vel);
                
                // Push out
                if (ball.position.z > pz) ball.position.z = pz + hd + r + 0.01;
                else ball.position.z = pz - hd - r - 0.01;

                ball.userData.lastTouchedBy = playerNum;
            }
        }

        function checkBrickCollision(ball) {
            const r = 0.3;
            const hw = 0.9;
            const hd = 0.4;

            for (let i = 0; i < bricks.length; i++) {
                const brick = bricks[i];
                const bx = brick.position.x;
                const bz = brick.position.z;

                const closestX = Math.max(bx - hw, Math.min(ball.position.x, bx + hw));
                const closestZ = Math.max(bz - hd, Math.min(ball.position.z, bz + hd));

                const dx = ball.position.x - closestX;
                const dz = ball.position.z - closestZ;

                if (dx * dx + dz * dz < r * r) {
                    // Bounce
                    if (Math.abs(dx) > Math.abs(dz)) ball.userData.vel.x *= -1;
                    else ball.userData.vel.z *= -1;
                    normalizeVelocity(ball.userData.vel);

                    // Destroy
                    brickGroup.remove(brick);
                    bricks.splice(i, 1);
                    
                    state.bricksRemaining--;
                    state.bricksDestroyed++;
                    state.truckRotationSpeed = Math.min(3.0, 0.5 + state.bricksDestroyed * 0.1);
                    
                    if (ball.userData.lastTouchedBy === 1) state.p1Score += 10;
                    else if (ball.userData.lastTouchedBy === 2) state.p2Score += 10;

                    flashGround();
                    updateHUD();
                    return; // One brick per frame per ball
                }
            }
        }

        // --- Main Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Truck Rotation
            if (state.truckModel) {
                state.truckModel.rotation.y += state.truckRotationSpeed * delta;
            }

            if (state.gameStarted && !state.gameOver) {
                // Paddle Movement
                if (keys['a'] || keys['A']) paddle1.position.x -= 0.4;
                if (keys['d'] || keys['D']) paddle1.position.x += 0.4;
                paddle1.position.x = Math.max(-13.5, Math.min(13.5, paddle1.position.x));

                if (keys['ArrowLeft']) paddle2.position.x -= 0.4;
                if (keys['ArrowRight']) paddle2.position.x += 0.4;
                paddle2.position.x = Math.max(-13.5, Math.min(13.5, paddle2.position.x));

                // Ball Physics
                const balls = [ball1, ball2];
                balls.forEach(ball => {
                    ball.position.x += ball.userData.vel.x;
                    ball.position.z += ball.userData.vel.z;
                    ball.position.y = 0.5; // Enforce Y

                    // Wall Bounce
                    if (ball.position.x - 0.3 < -15) {
                        ball.position.x = -15 + 0.3;
                        ball.userData.vel.x *= -1;
                    } else if (ball.position.x + 0.3 > 15) {
                        ball.position.x = 15 - 0.3;
                        ball.userData.vel.x *= -1;
                    }

                    // Paddle Bounce
                    checkPaddleCollision(ball, paddle1, 1);
                    checkPaddleCollision(ball, paddle2, 2);

                    // Brick Bounce
                    checkBrickCollision(ball);

                    // Scoring / Out of bounds
                    if (ball.position.z < -20) {
                        state.p2Score++;
                        resetBall(ball, 1);
                        updateHUD();
                    } else if (ball.position.z > 20) {
                        state.p1Score++;
                        resetBall(ball, 2);
                        updateHUD();
                    }
                });

                // Game Over Check
                if (state.bricksRemaining === 0) {
                    state.gameOver = true;
                    if (state.p1Score > state.p2Score) state.winner = 'P1';
                    else if (state.p2Score > state.p1Score) state.winner = 'P2';
                    else state.winner = 'TIE';

                    gameOverTextEl.innerText = `GAME OVER - ${state.winner === 'TIE' ? "IT'S A TIE" : state.winner + ' WINS'}!`;
                    gameOverTextEl.style.display = 'block';
                }
            }

            // Update State Object
            state.ball1Velocity.x = ball1.userData.vel.x;
            state.ball1Velocity.z = ball1.userData.vel.z;
            state.ball2Velocity.x = ball2.userData.vel.x;
            state.ball2Velocity.z = ball2.userData.vel.z;
            state.ball1Position.x = ball1.position.x;
            state.ball1Position.z = ball1.position.z;
            state.ball2Position.x = ball2.position.x;
            state.ball2Position.z = ball2.position.z;
            state.p1PaddleX = paddle1.position.x;
            state.p2PaddleX = paddle2.position.x;

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initGame();
        animate();
    </script>
</body>
</html>
