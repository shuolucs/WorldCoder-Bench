<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js City LOD Scene</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: auto;
            z-index: 10;
        }
        .control-group {
            margin-bottom: 10px;
        }
        label {
            display: inline-block;
            width: 80px;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="ui-panel">
        <div class="control-group">
            <label for="dayNightToggle">Day/Night:</label>
            <input type="checkbox" id="dayNightToggle" checked>
        </div>
        <div class="control-group">
            <label for="fogSlider">Fog Far:</label>
            <input type="range" id="fogSlider" min="100" max="1000" value="500" step="10">
        </div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Initialization ---
        window.__3D_STATE__ = {
            buildingCount: 50,
            lodLevel: 0, // 0: High, 1: Mid, 2: Low (Dominant level across all buildings)
            cameraDistance: 0,
            fogDistance: 500,
            isDayTime: true,
            visibleBuildings: 50
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
        camera.position.set(200, 150, 200);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.01; // Prevent going below ground

        // --- Lighting & Fog ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(200, 300, 100);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 300;
        dirLight.shadow.camera.bottom = -300;
        dirLight.shadow.camera.left = -300;
        dirLight.shadow.camera.right = 300;
        dirLight.shadow.camera.near = 0.1;
        dirLight.shadow.camera.far = 1000;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        scene.fog = new THREE.Fog(0x87ceeb, 100, 500);
        scene.background = new THREE.Color(0x87ceeb);

        // --- Ground & Street Grid ---
        const groundGeo = new THREE.PlaneGeometry(2000, 2000);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(2000, 100, 0x555555, 0x333333);
        gridHelper.position.y = 0.1;
        scene.add(gridHelper);

        // --- Materials for LOD ---
        const matHighWall = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.4 });
        const matHighRoof = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9 });
        const matMid = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.6 });
        const matLow = new THREE.MeshBasicMaterial({ color: 0x666666 }); // No lighting calculation

        // --- Building Generation (50 Buildings) ---
        const lods = [];
        const buildingCount = 50;
        
        // Grid layout: 10 x 5
        let count = 0;
        for (let i = 0; i < 10; i++) {
            for (let j = 0; j < 5; j++) {
                if (count >= buildingCount) break;

                const lod = new THREE.LOD();
                
                const w = 20 + Math.random() * 10;
                const d = 20 + Math.random() * 10;
                const h = 40 + Math.random() * 80;

                // Level 0: High Detail (Main box + Roof structure)
                const highGroup = new THREE.Group();
                const highMain = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), matHighWall);
                highMain.position.y = h / 2;
                highMain.castShadow = true;
                highMain.receiveShadow = true;
                
                const roofW = w * 0.6;
                const roofD = d * 0.6;
                const roofH = 10;
                const highRoof = new THREE.Mesh(new THREE.BoxGeometry(roofW, roofH, roofD), matHighRoof);
                highRoof.position.y = h + roofH / 2;
                highRoof.castShadow = true;
                
                highGroup.add(highMain);
                highGroup.add(highRoof);

                // Level 1: Mid Detail (Simple box, receives/casts shadow)
                const midMesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), matMid);
                midMesh.position.y = h / 2;
                midMesh.castShadow = true;
                midMesh.receiveShadow = true;

                // Level 2: Low Detail (Simple box, basic material, no shadows)
                const lowMesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), matLow);
                lowMesh.position.y = h / 2;

                // Add levels to LOD (Geometry, Distance)
                lod.addLevel(highGroup, 0);
                lod.addLevel(midMesh, 150);
                lod.addLevel(lowMesh, 350);

                // Position in grid
                const x = (i - 4.5) * 60;
                const z = (j - 2.0) * 60;
                lod.position.set(x, 0, z);
                
                // Store bounding sphere radius for frustum culling estimation
                lod.userData.radius = Math.sqrt((w/2)**2 + h**2 + (d/2)**2);

                scene.add(lod);
                lods.push(lod);
                count++;
            }
        }

        // --- UI Controls Logic ---
        const dayNightToggle = document.getElementById('dayNightToggle');
        const fogSlider = document.getElementById('fogSlider');

        function updateEnvironment() {
            const isDay = dayNightToggle.checked;
            if (isDay) {
                scene.background.setHex(0x87ceeb);
                scene.fog.color.setHex(0x87ceeb);
                ambientLight.intensity = 0.6;
                dirLight.intensity = 1.0;
                dirLight.color.setHex(0xffffff);
                matHighWall.emissive.setHex(0x000000);
                matMid.emissive.setHex(0x000000);
            } else {
                scene.background.setHex(0x0a0a1a);
                scene.fog.color.setHex(0x0a0a1a);
                ambientLight.intensity = 0.1;
                dirLight.intensity = 0.3;
                dirLight.color.setHex(0x7777cc);
                // Simulate glowing windows at night via emissive color
                matHighWall.emissive.setHex(0x333311);
                matMid.emissive.setHex(0x222200);
            }
            window.__3D_STATE__.isDayTime = isDay;
        }

        function updateFog() {
            const far = parseFloat(fogSlider.value);
            scene.fog.far = far;
            scene.fog.near = far * 0.2;
            window.__3D_STATE__.fogDistance = far;
        }

        dayNightToggle.addEventListener('change', updateEnvironment);
        fogSlider.addEventListener('input', updateFog);

        // --- State Update Logic ---
        const frustum = new THREE.Frustum();
        const projScreenMatrix = new THREE.Matrix4();

        function updateState() {
            window.__3D_STATE__.cameraDistance = camera.position.length();

            camera.updateMatrixWorld();
            projScreenMatrix.multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse);
            frustum.setFromProjectionMatrix(projScreenMatrix);

            let lodCounts = [0, 0, 0];
            let visibleCount = 0;

            for (let i = 0; i < lods.length; i++) {
                const lod = lods[i];
                
                // Force LOD update based on camera to ensure accurate state before render
                lod.update(camera);
                
                const level = lod.getCurrentLevel();
                lodCounts[level]++;

                // Frustum culling check
                const sphere = new THREE.Sphere(lod.position, lod.userData.radius);
                if (frustum.intersectsSphere(sphere)) {
                    visibleCount++;
                }
            }

            window.__3D_STATE__.visibleBuildings = visibleCount;
            
            // Determine dominant LOD level (mode)
            let maxCount = -1;
            let dominantLevel = 0;
            for (let i = 0; i < 3; i++) {
                if (lodCounts[i] > maxCount) {
                    maxCount = lodCounts[i];
                    dominantLevel = i;
                }
            }
            window.__3D_STATE__.lodLevel = dominantLevel;
        }

        // --- Testing Helper ---
        window.__ICG_setCameraDistance__ = function(d) {
            const dir = camera.position.clone().normalize();
            if (dir.lengthSq() === 0) dir.set(1, 1, 1).normalize();
            camera.position.copy(dir.multiplyScalar(d));
            controls.update();
            updateState();
        };

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            updateState();
            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize
        updateEnvironment();
        updateFog();
        animate();
    </script>
</body>
</html>
