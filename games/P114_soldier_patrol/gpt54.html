<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 士兵巡逻与地雷策略小游戏</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #101418;
      font-family: Arial, Helvetica, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #hud {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 12px;
      border-radius: 8px;
      line-height: 1.7;
      font-size: 14px;
      min-width: 180px;
      user-select: none;
      backdrop-filter: blur(4px);
    }
    #hud .title {
      font-weight: bold;
      margin-bottom: 4px;
      color: #9fe6a0;
    }
    #msg {
      position: absolute;
      left: 50%;
      top: 18px;
      transform: translateX(-50%);
      z-index: 11;
      color: #fff;
      background: rgba(200, 50, 50, 0.9);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    #msg.show {
      opacity: 1;
    }
    #tip {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      color: #ddd;
      background: rgba(0, 0, 0, 0.4);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      max-width: 260px;
    }
    #victoryBanner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
      background: radial-gradient(circle, rgba(255,215,0,0.12), rgba(0,0,0,0.18));
    }
    #victoryBanner.show {
      opacity: 1;
    }
    #victoryBanner .text {
      font-size: 48px;
      font-weight: 900;
      color: #ffd54a;
      text-shadow: 0 0 12px rgba(255, 213, 74, 0.5), 0 0 30px rgba(255, 213, 74, 0.25);
      letter-spacing: 2px;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div class="title">士兵巡逻与地雷</div>
      <div>存活士兵数：<span id="soldiersAlive">0</span></div>
      <div>已放置地雷数：<span id="minesPlaced">0</span></div>
      <div>爆炸次数：<span id="explosions">0</span></div>
      <div>游戏状态：<span id="gameState">playing</span></div>
    </div>
    <div id="msg"></div>
    <div id="tip">
      左键点击地面格子放置地雷。<br />
      每格最多一个地雷，最多同时存在 10 个。<br />
      鼠标拖拽旋转，滚轮缩放。
    </div>
    <div id="victoryBanner"><div class="text">胜利！</div></div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { SkeletonUtils } from 'three/addons/utils/SkeletonUtils.js';

    const app = document.getElementById('app');
    const hudSoldiersAlive = document.getElementById('soldiersAlive');
    const hudMinesPlaced = document.getElementById('minesPlaced');
    const hudExplosions = document.getElementById('explosions');
    const hudGameState = document.getElementById('gameState');
    const msgEl = document.getElementById('msg');
    const victoryBanner = document.getElementById('victoryBanner');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1c2228);
    scene.fog = new THREE.Fog(0x1c2228, 18, 36);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(8, 14, 18);
    camera.lookAt(6, 0, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(6, 0, 6);
    controls.enableDamping = true;
    controls.minDistance = 8;
    controls.maxDistance = 30;
    controls.maxPolarAngle = Math.PI / 2.05;

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(10, 18, 8);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 50;
    scene.add(dirLight);

    const boardGroup = new THREE.Group();
    scene.add(boardGroup);

    const boardSize = 12;
    const boardPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(boardSize, boardSize),
      new THREE.MeshStandardMaterial({
        color: 0xcfd3d7,
        roughness: 0.95,
        metalness: 0.0
      })
    );
    boardPlane.rotation.x = -Math.PI / 2;
    boardPlane.position.set(boardSize / 2, 0, boardSize / 2);
    boardPlane.receiveShadow = true;
    boardPlane.userData.isGround = true;
    boardGroup.add(boardPlane);

    const gridHelper = new THREE.GridHelper(boardSize, boardSize, 0x50565e, 0x6a7179);
    gridHelper.position.set(boardSize / 2, 0.001, boardSize / 2);
    boardGroup.add(gridHelper);

    const border = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(boardSize, 0.02, boardSize)),
      new THREE.LineBasicMaterial({ color: 0x3a4048 })
    );
    border.position.set(boardSize / 2, 0.01, boardSize / 2);
    boardGroup.add(border);

    const decoration = new THREE.Mesh(
      new THREE.CylinderGeometry(0.2, 0.2, 0.06, 24),
      new THREE.MeshStandardMaterial({ color: 0x2d3138, roughness: 0.9 })
    );
    for (const p of [[0,0],[12,0],[0,12],[12,12]]) {
      const d = decoration.clone();
      d.position.set(p[0], 0.03, p[1]);
      scene.add(d);
    }

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const mines = [];
    const mineMap = new Map();
    const explosions = [];
    const soldiers = [];

    const soldierSpeed = 2.0;
    const maxMines = 10;
    let explosionCount = 0;
    let gameState = 'playing';
    let modelLoaded = false;

    const patrolRoutes = [
      [
        new THREE.Vector3(1, 0, 1),
        new THREE.Vector3(1, 0, 6),
        new THREE.Vector3(6, 0, 6),
        new THREE.Vector3(6, 0, 1)
      ],
      [
        new THREE.Vector3(10, 0, 2),
        new THREE.Vector3(10, 0, 10),
        new THREE.Vector3(3, 0, 10)
      ],
      [
        new THREE.Vector3(5, 0, 5),
        new THREE.Vector3(5, 0, 11),
        new THREE.Vector3(11, 0, 11),
        new THREE.Vector3(11, 0, 5)
      ]
    ];

    function showMessage(text, duration = 1200) {
      msgEl.textContent = text;
      msgEl.classList.add('show');
      clearTimeout(showMessage._timer);
      showMessage._timer = setTimeout(() => {
        msgEl.classList.remove('show');
      }, duration);
    }

    function gridKey(col, row) {
      return `${col},${row}`;
    }

    function cellCenter(col, row) {
      return new THREE.Vector3(col + 0.5, 0, row + 0.5);
    }

    function snapWorldToCell(point) {
      const col = Math.floor(point.x);
      const row = Math.floor(point.z);
      if (col < 0 || col >= boardSize || row < 0 || row >= boardSize) return null;
      return { col, row, center: cellCenter(col, row) };
    }

    function createMine(position, col, row) {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.SphereGeometry(0.2, 20, 20),
        new THREE.MeshStandardMaterial({
          color: 0xd62f2f,
          emissive: 0x4a0000,
          roughness: 0.55,
          metalness: 0.1
        })
      );
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);

      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(0.16, 0.03, 10, 22),
        new THREE.MeshStandardMaterial({
          color: 0x8a0f0f,
          emissive: 0x2a0000
        })
      );
      ring.rotation.x = Math.PI / 2;
      group.add(ring);

      group.position.set(position.x, 0.2, position.z);
      scene.add(group);

      const mine = {
        col,
        row,
        key: gridKey(col, row),
        position: new THREE.Vector3(position.x, 0.2, position.z),
        mesh: group
      };

      mines.push(mine);
      mineMap.set(mine.key, mine);
      return mine;
    }

    function removeMine(mine) {
      const idx = mines.indexOf(mine);
      if (idx !== -1) mines.splice(idx, 1);
      mineMap.delete(mine.key);
      if (mine.mesh) {
        scene.remove(mine.mesh);
        mine.mesh.traverse(obj => {
          if (obj.geometry) obj.geometry.dispose?.();
          if (obj.material) {
            if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose?.());
            else obj.material.dispose?.();
          }
        });
      }
    }

    function createExplosion(position) {
      const particleCount = 30 + Math.floor(Math.random() * 21);
      const group = new THREE.Group();
      const particles = [];

      for (let i = 0; i < particleCount; i++) {
        const radius = 0.05 + Math.random() * 0.06;
        const particle = new THREE.Mesh(
          new THREE.SphereGeometry(radius, 8, 8),
          new THREE.MeshStandardMaterial({
            color: new THREE.Color().setHSL(0.06 + Math.random() * 0.05, 1.0, 0.45 + Math.random() * 0.15),
            emissive: new THREE.Color(0xff5500),
            emissiveIntensity: 1.2,
            transparent: true,
            opacity: 1
          })
        );
        particle.position.set(0, 0.1, 0);
        const dir = new THREE.Vector3(
          (Math.random() * 2 - 1),
          Math.random() * 1.2 + 0.2,
          (Math.random() * 2 - 1)
        ).normalize();
        const speed = 1.5 + Math.random() * 3.5;
        particles.push({
          mesh: particle,
          velocity: dir.multiplyScalar(speed),
          startScale: 1 + Math.random()
        });
        group.add(particle);
      }

      group.position.copy(position);
      scene.add(group);

      explosions.push({
        group,
        particles,
        age: 0,
        duration: 1.0
      });

      explosionCount++;
    }

    function updateExplosions(delta) {
      for (let i = explosions.length - 1; i >= 0; i--) {
        const exp = explosions[i];
        exp.age += delta;
        const t = Math.min(exp.age / exp.duration, 1);
        const alpha = 1 - t;

        for (const p of exp.particles) {
          p.mesh.position.addScaledVector(p.velocity, delta);
          p.velocity.y -= 6 * delta;
          const s = Math.max(0.05, (1 - t) * p.startScale);
          p.mesh.scale.setScalar(s);
          p.mesh.material.opacity = alpha;
          p.mesh.material.emissiveIntensity = 1.2 * alpha;
        }

        if (t >= 1) {
          scene.remove(exp.group);
          exp.group.traverse(obj => {
            if (obj.geometry) obj.geometry.dispose?.();
            if (obj.material) {
              if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose?.());
              else obj.material.dispose?.();
            }
          });
          explosions.splice(i, 1);
        }
      }
    }

    function findClipByKeywords(clips, keywords) {
      const lowerKeywords = keywords.map(k => k.toLowerCase());
      for (const clip of clips) {
        const name = (clip.name || '').toLowerCase();
        if (lowerKeywords.some(k => name.includes(k))) return clip;
      }
      return null;
    }

    function playAction(soldier, actionName, fade = 0.2, loopOnce = false, clamp = false) {
      if (!soldier.actions[actionName]) return;
      if (soldier.currentAction === actionName) return;

      const next = soldier.actions[actionName];
      const prev = soldier.currentAction ? soldier.actions[soldier.currentAction] : null;

      if (prev) prev.fadeOut(fade);
      next.reset();
      next.enabled = true;
      next.setEffectiveTimeScale(1);
      next.setEffectiveWeight(1);
      next.clampWhenFinished = clamp;
      if (loopOnce) {
        next.setLoop(THREE.LoopOnce, 1);
      } else {
        next.setLoop(THREE.LoopRepeat, Infinity);
      }
      next.fadeIn(fade).play();
      soldier.currentAction = actionName;
    }

    function eliminateSoldier(soldier, explosionPos) {
      if (!soldier.alive || soldier.dying) return;
      soldier.dying = true;
      soldier.alive = false;
      soldier.deathTimer = 1.5;

      if (soldier.actions.death) {
        playAction(soldier, 'death', 0.12, true, true);
      } else {
        playAction(soldier, 'idle', 0.1, false, false);
        soldier.fallWithoutDeath = true;
      }

      soldier.targetExplosionPos = explosionPos.clone();
    }

    function updateSoldier(soldier, delta) {
      if (!soldier.mixer) return;
      soldier.mixer.update(delta);

      if (soldier.fallWithoutDeath) {
        soldier.model.rotation.x = THREE.MathUtils.lerp(soldier.model.rotation.x, -Math.PI / 2, 0.12);
      }

      if (soldier.dying) {
        soldier.deathTimer -= delta;
        if (soldier.deathTimer <= 0) {
          scene.remove(soldier.group);
          soldier.removed = true;
        }
        return;
      }

      if (!soldier.alive) return;

      if (soldier.pauseTimer > 0) {
        soldier.pauseTimer -= delta;
        playAction(soldier, 'idle');
        if (soldier.pauseTimer <= 0) {
          soldier.currentWaypoint = (soldier.currentWaypoint + 1) % soldier.route.length;
        }
        return;
      }

      const target = soldier.route[soldier.currentWaypoint];
      const pos = soldier.group.position;
      const toTarget = new THREE.Vector3().subVectors(target, pos);
      toTarget.y = 0;
      const distance = toTarget.length();

      if (distance < 0.05) {
        pos.set(target.x, 0, target.z);
        soldier.pauseTimer = 0.5;
        playAction(soldier, 'idle');
        return;
      }

      const dir = toTarget.normalize();
      const move = Math.min(distance, soldierSpeed * delta);
      pos.addScaledVector(dir, move);

      const angle = Math.atan2(dir.x, dir.z);
      soldier.group.rotation.y = THREE.MathUtils.lerp(soldier.group.rotation.y, angle, 0.2);
      playAction(soldier, 'walk');
    }

    function updateMinePulse(time) {
      for (const mine of mines) {
        if (!mine.mesh) continue;
        const s = 1 + Math.sin(time * 4 + mine.col * 0.4 + mine.row * 0.25) * 0.06;
        mine.mesh.scale.setScalar(s);
      }
    }

    function checkExplosions() {
      const toTrigger = [];

      for (const soldier of soldiers) {
        if (!soldier.alive || soldier.dying || soldier.removed) continue;
        const soldierPos = soldier.group.position;

        for (const mine of mines) {
          const dx = soldierPos.x - mine.position.x;
          const dz = soldierPos.z - mine.position.z;
          const dist = Math.sqrt(dx * dx + dz * dz);
          if (dist < 1.5) {
            toTrigger.push({ soldier, mine });
            break;
          }
        }
      }

      for (const item of toTrigger) {
        if (!item.soldier.alive || item.soldier.dying || item.soldier.removed) continue;
        if (!mineMap.has(item.mine.key)) continue;
        createExplosion(item.mine.position.clone());
        removeMine(item.mine);
        eliminateSoldier(item.soldier, item.mine.position);
      }
    }

    function updateHUD() {
      const aliveCount = soldiers.filter(s => s.alive && !s.removed).length;
      hudSoldiersAlive.textContent = String(aliveCount);
      hudMinesPlaced.textContent = String(mines.length);
      hudExplosions.textContent = String(explosionCount);
      hudGameState.textContent = gameState;

      if (aliveCount === 0 && modelLoaded && gameState !== 'victory') {
        gameState = 'victory';
        hudGameState.textContent = gameState;
        victoryBanner.classList.add('show');
      }
    }

    function updateExposedState() {
      window.__3D_STATE__ = {
        modelLoaded,
        soldiersAlive: soldiers.filter(s => s.alive && !s.removed).length,
        minesPlaced: mines.length,
        explosions: explosionCount,
        gameState,
        soldierPositions: soldiers
          .filter(s => s.alive && !s.removed)
          .map(s => ({ x: Number(s.group.position.x.toFixed(3)), z: Number(s.group.position.z.toFixed(3)) })),
        minePositions: mines
          .map(m => ({ x: Number(m.position.x.toFixed(3)), z: Number(m.position.z.toFixed(3)) }))
      };
    }

    window.__3D_STATE__ = {
      modelLoaded: false,
      soldiersAlive: 0,
      minesPlaced: 0,
      explosions: 0,
      gameState: 'playing',
      soldierPositions: [],
      minePositions: []
    };

    renderer.domElement.addEventListener('pointerdown', (event) => {
      if (event.button !== 0) return;

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(boardPlane, false);
      if (!intersects.length) return;

      const hit = intersects[0].point;
      const cell = snapWorldToCell(hit);
      if (!cell) return;

      if (mineMap.has(gridKey(cell.col, cell.row))) {
        showMessage('该格子已有地雷');
        return;
      }

      if (mines.length >= maxMines) {
        showMessage('地雷已满');
        return;
      }

      createMine(cell.center, cell.col, cell.row);
      updateHUD();
      updateExposedState();
    });

    function prepareSoldierMaterials(root) {
      root.traverse(obj => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
          if (obj.material) {
            if (Array.isArray(obj.material)) {
              obj.material.forEach(m => {
                m.envMapIntensity = 0.4;
              });
            } else {
              obj.material.envMapIntensity = 0.4;
            }
          }
        }
      });
    }

    function createSoldierInstance(baseScene, clips, route, index) {
      const cloned = SkeletonUtils.clone(baseScene);
      prepareSoldierMaterials(cloned);

      const group = new THREE.Group();
      group.add(cloned);
      scene.add(group);

      const mixer = new THREE.AnimationMixer(cloned);

      const walkClip = findClipByKeywords(clips, ['walk']);
      const idleClip = findClipByKeywords(clips, ['idle']);
      const deathClip = findClipByKeywords(clips, ['death', 'die', 'dead', 'fall']);
      const runClip = findClipByKeywords(clips, ['run']);

      const actions = {};
      if (walkClip) actions.walk = mixer.clipAction(walkClip);
      if (idleClip) actions.idle = mixer.clipAction(idleClip);
      if (deathClip) actions.death = mixer.clipAction(deathClip);
      if (!actions.walk && runClip) actions.walk = mixer.clipAction(runClip);
      if (!actions.idle && walkClip) actions.idle = mixer.clipAction(walkClip);

      const scale = 0.75;
      cloned.scale.setScalar(scale);

      const start = route[0];
      group.position.set(start.x, 0, start.z);

      if (route.length > 1) {
        const next = route[1];
        const dir = new THREE.Vector3().subVectors(next, start).normalize();
        group.rotation.y = Math.atan2(dir.x, dir.z);
      }

      const soldier = {
        id: index + 1,
        group,
        model: cloned,
        mixer,
        actions,
        route,
        currentWaypoint: 1 % route.length,
        currentAction: null,
        pauseTimer: 0.5,
        alive: true,
        dying: false,
        removed: false,
        deathTimer: 0,
        fallWithoutDeath: false
      };

      playAction(soldier, 'idle', 0.01);
      soldiers.push(soldier);
    }

    const loader = new GLTFLoader();
    loader.load(
      'assets/soldier.glb',
      (gltf) => {
        const baseScene = gltf.scene;
        const clips = gltf.animations || [];

        for (let i = 0; i < 3; i++) {
          createSoldierInstance(baseScene, clips, patrolRoutes[i], i);
        }

        modelLoaded = true;
        updateHUD();
        updateExposedState();
      },
      undefined,
      (error) => {
        console.error('士兵模型加载失败:', error);
        showMessage('士兵模型加载失败');
      }
    );

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.05);
      const time = clock.elapsedTime;

      controls.update();
      updateMinePulse(time);

      for (let i = soldiers.length - 1; i >= 0; i--) {
        const soldier = soldiers[i];
        if (soldier.removed) {
          soldiers.splice(i, 1);
          continue;
        }
        updateSoldier(soldier, delta);
      }

      checkExplosions();
      updateExplosions(delta);
      updateHUD();
      updateExposedState();

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
