<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soldier Patrol & Mine Strategy Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #fff;
    background: rgba(0,0,0,0.7);
    padding: 15px 20px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.8;
    pointer-events: none;
    z-index: 10;
    border: 1px solid rgba(255,255,255,0.2);
  }
  #hud .label { color: #aaa; }
  #hud .value { color: #0f0; font-weight: bold; }
  #hud .title { font-size: 16px; font-weight: bold; color: #ff0; margin-bottom: 5px; }
  #victoryOverlay {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ff0;
    font-size: 64px;
    font-weight: bold;
    text-shadow: 0 0 20px #f80, 0 0 40px #f00;
    pointer-events: none;
    z-index: 20;
    animation: pulse 1s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    from { transform: translate(-50%, -50%) scale(1); }
    to { transform: translate(-50%, -50%) scale(1.1); }
  }
  #message {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    background: rgba(255,0,0,0.7);
    padding: 8px 16px;
    border-radius: 5px;
    font-size: 14px;
    display: none;
    z-index: 10;
    pointer-events: none;
  }
  #instructions {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    color: #ccc;
    background: rgba(0,0,0,0.5);
    padding: 8px 16px;
    border-radius: 5px;
    font-size: 12px;
    z-index: 10;
    pointer-events: none;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="hud">
  <div class="title">🎮 Mine Strategy</div>
  <div><span class="label">Soldiers Alive: </span><span class="value" id="soldiersAlive">3</span></div>
  <div><span class="label">Mines Placed: </span><span class="value" id="minesPlaced">0</span></div>
  <div><span class="label">Explosions: </span><span class="value" id="explosions">0</span></div>
  <div><span class="label">Game State: </span><span class="value" id="gameState">playing</span></div>
</div>

<div id="victoryOverlay">🏆 Victory!</div>
<div id="message"></div>
<div id="instructions">Click on the grid to place mines (max 10). Eliminate all soldiers to win!</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 20, 40);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(6, 12, 18);
camera.lookAt(6, 0, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(6, 0, 6);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minDistance = 5;
controls.maxDistance = 30;
controls.update();

// ============ LIGHTING ============
const ambientLight = new THREE.AmbientLight(0x404060, 1.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
dirLight.position.set(8, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 40;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x8888ff, 0x444422, 0.6);
scene.add(hemiLight);

// ============ GRID MAP ============
// Ground plane
const groundGeo = new THREE.PlaneGeometry(12, 12);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x556655, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.set(6, 0, 6);
ground.receiveShadow = true;
ground.name = 'ground';
scene.add(ground);

// Grid lines
const gridGroup = new THREE.Group();
const lineMat = new THREE.LineBasicMaterial({ color: 0x334433 });
for (let i = 0; i <= 12; i++) {
  // Horizontal lines
  const hGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0.005, i),
    new THREE.Vector3(12, 0.005, i)
  ]);
  gridGroup.add(new THREE.Line(hGeo, lineMat));
  // Vertical lines
  const vGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(i, 0.005, 0),
    new THREE.Vector3(i, 0.005, 12)
  ]);
  gridGroup.add(new THREE.Line(vGeo, lineMat));
}
scene.add(gridGroup);

// Cell highlight markers (subtle)
for (let r = 0; r < 12; r++) {
  for (let c = 0; c < 12; c++) {
    if ((r + c) % 2 === 0) {
      const cellGeo = new THREE.PlaneGeometry(0.95, 0.95);
      const cellMat = new THREE.MeshStandardMaterial({ color: 0x5a7a5a, roughness: 0.9 });
      const cell = new THREE.Mesh(cellGeo, cellMat);
      cell.rotation.x = -Math.PI / 2;
      cell.position.set(c + 0.5, 0.002, r + 0.5);
      cell.receiveShadow = true;
      scene.add(cell);
    }
  }
}

// ============ GAME STATE ============
let soldiers = [];
let mines = [];
let explosionParticles = [];
let explosionCount = 0;
let gameState = 'playing';
let modelLoaded = false;

const patrolRoutes = [
  [new THREE.Vector3(1, 0, 1), new THREE.Vector3(1, 0, 6), new THREE.Vector3(6, 0, 6), new THREE.Vector3(6, 0, 1)],
  [new THREE.Vector3(10, 0, 2), new THREE.Vector3(10, 0, 10), new THREE.Vector3(3, 0, 10)],
  [new THREE.Vector3(5, 0, 5), new THREE.Vector3(5, 0, 11), new THREE.Vector3(11, 0, 11), new THREE.Vector3(11, 0, 5)]
];

// ============ EXPOSE STATE ============
window.__3D_STATE__ = {
  modelLoaded: false,
  soldiersAlive: 3,
  minesPlaced: 0,
  explosions: 0,
  gameState: 'playing',
  soldierPositions: [],
  minePositions: []
};

function updateState() {
  const alive = soldiers.filter(s => s.alive);
  window.__3D_STATE__ = {
    modelLoaded,
    soldiersAlive: alive.length,
    minesPlaced: mines.length,
    explosions: explosionCount,
    gameState,
    soldierPositions: alive.map(s => ({ x: s.model.position.x, z: s.model.position.z })),
    minePositions: mines.map(m => ({ x: m.mesh.position.x, z: m.mesh.position.z }))
  };

  document.getElementById('soldiersAlive').textContent = alive.length;
  document.getElementById('minesPlaced').textContent = mines.length;
  document.getElementById('explosions').textContent = explosionCount;
  document.getElementById('gameState').textContent = gameState;
}

// ============ LOAD SOLDIER MODEL ============
const loader = new GLTFLoader();
const clock = new THREE.Clock();

loader.load('assets/soldier.glb', (gltf) => {
  const originalModel = gltf.scene;
  const animations = gltf.animations;

  // Find animation clips
  let walkClip = null, idleClip = null, deathClip = null, runClip = null;
  for (const clip of animations) {
    const name = clip.name.toLowerCase();
    if (name.includes('walk')) walkClip = clip;
    else if (name.includes('idle')) idleClip = clip;
    else if (name.includes('death') || name.includes('die')) deathClip = clip;
    else if (name.includes('run')) runClip = clip;
  }

  // If no walk found, try run, or use first animation
  if (!walkClip && runClip) walkClip = runClip;
  if (!walkClip && animations.length > 0) walkClip = animations[0];
  if (!idleClip && animations.length > 1) idleClip = animations[1];
  if (!idleClip) idleClip = walkClip;

  for (let i = 0; i < 3; i++) {
    const clonedModel = SkeletonUtils.clone(originalModel);
    clonedModel.scale.set(0.6, 0.6, 0.6);

    clonedModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    const route = patrolRoutes[i];
    clonedModel.position.copy(route[0]);

    scene.add(clonedModel);

    const mixer = new THREE.AnimationMixer(clonedModel);

    const walkAction = walkClip ? mixer.clipAction(walkClip) : null;
    const idleAction = idleClip ? mixer.clipAction(idleClip) : null;
    const deathAction = deathClip ? mixer.clipAction(deathClip) : null;

    const soldier = {
      model: clonedModel,
      mixer,
      walkAction,
      idleAction,
      deathAction,
      route,
      currentWaypoint: 0,
      alive: true,
      dying: false,
      dyingTimer: 0,
      speed: 2,
      state: 'walking', // 'walking' | 'waiting' | 'dying'
      waitTimer: 0
    };

    // Start walking
    if (walkAction) {
      walkAction.play();
    }

    // Face towards next waypoint
    const nextWP = route[1] || route[0];
    const dir = new THREE.Vector3().subVectors(nextWP, route[0]).normalize();
    if (dir.lengthSq() > 0) {
      clonedModel.lookAt(clonedModel.position.x + dir.x, clonedModel.position.y, clonedModel.position.z + dir.z);
    }

    soldiers.push(soldier);
  }

  modelLoaded = true;
  updateState();
}, undefined, (error) => {
  console.error('Error loading soldier model:', error);
  // Create fallback soldiers as simple meshes
  createFallbackSoldiers();
});

function createFallbackSoldiers() {
  for (let i = 0; i < 3; i++) {
    const group = new THREE.Group();

    // Body
    const bodyGeo = new THREE.CylinderGeometry(0.15, 0.2, 0.8, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.6;
    body.castShadow = true;
    group.add(body);

    // Head
    const headGeo = new THREE.SphereGeometry(0.15, 8, 8);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xdeb887 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 1.15;
    head.castShadow = true;
    group.add(head);

    // Helmet
    const helmetGeo = new THREE.SphereGeometry(0.18, 8, 4, 0, Math.PI * 2, 0, Math.PI / 2);
    const helmetMat = new THREE.MeshStandardMaterial({ color: 0x3a3a2a });
    const helmet = new THREE.Mesh(helmetGeo, helmetMat);
    helmet.position.y = 1.2;
    helmet.castShadow = true;
    group.add(helmet);

    // Legs
    for (let side = -1; side <= 1; side += 2) {
      const legGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.4, 6);
      const legMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });
      const leg = new THREE.Mesh(legGeo, legMat);
      leg.position.set(side * 0.1, 0.2, 0);
      leg.castShadow = true;
      group.add(leg);
    }

    const route = patrolRoutes[i];
    group.position.copy(route[0]);

    scene.add(group);

    const soldier = {
      model: group,
      mixer: null,
      walkAction: null,
      idleAction: null,
      deathAction: null,
      route,
      currentWaypoint: 0,
      alive: true,
      dying: false,
      dyingTimer: 0,
      speed: 2,
      state: 'walking',
      waitTimer: 0
    };

    const nextWP = route[1] || route[0];
    const dir = new THREE.Vector3().subVectors(nextWP, route[0]).normalize();
    if (dir.lengthSq() > 0) {
      group.lookAt(group.position.x + dir.x, group.position.y, group.position.z + dir.z);
    }

    soldiers.push(soldier);
  }
  modelLoaded = true;
  updateState();
}

// ============ MINE PLACEMENT ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function showMessage(text, duration = 2000) {
  const msgEl = document.getElementById('message');
  msgEl.textContent = text;
  msgEl.style.display = 'block';
  setTimeout(() => { msgEl.style.display = 'none'; }, duration);
}

renderer.domElement.addEventListener('click', (event) => {
  if (gameState !== 'playing') return;

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const intersects = raycaster.intersectObject(ground);
  if (intersects.length === 0) return;

  const point = intersects[0].point;

  // Calculate grid cell
  const col = Math.floor(point.x);
  const row = Math.floor(point.z);

  if (col < 0 || col >= 12 || row < 0 || row >= 12) return;

  const cellCenterX = col + 0.5;
  const cellCenterZ = row + 0.5;

  // Check if mine already exists at this cell
  const existingMine = mines.find(m => {
    return Math.abs(m.mesh.position.x - cellCenterX) < 0.1 && Math.abs(m.mesh.position.z - cellCenterZ) < 0.1;
  });

  if (existingMine) {
    showMessage('A mine already exists here!');
    return;
  }

  if (mines.length >= 10) {
    showMessage('Mine limit reached! (Max 10)');
    return;
  }

  // Create mine
  const mineGroup = new THREE.Group();

  // Main body
  const mineGeo = new THREE.SphereGeometry(0.2, 12, 8);
  const mineMat = new THREE.MeshStandardMaterial({ color: 0xcc2222, metalness: 0.6, roughness: 0.3 });
  const mineMesh = new THREE.Mesh(mineGeo, mineMat);
  mineMesh.castShadow = true;
  mineGroup.add(mineMesh);

  // Spikes
  const spikeGeo = new THREE.ConeGeometry(0.04, 0.1, 4);
  const spikeMat = new THREE.MeshStandardMaterial({ color: 0x880000, metalness: 0.8 });
  const spikePositions = [
    [0, 0.2, 0], [0, -0.2, 0],
    [0.2, 0, 0], [-0.2, 0, 0],
    [0, 0, 0.2], [0, 0, -0.2]
  ];
  spikePositions.forEach(pos => {
    const spike = new THREE.Mesh(spikeGeo, spikeMat);
    spike.position.set(pos[0], pos[1], pos[2]);
    spike.lookAt(pos[0] * 2, pos[1] * 2, pos[2] * 2);
    mineGroup.add(spike);
  });

  // Glow indicator
  const glowGeo = new THREE.RingGeometry(0.25, 0.35, 16);
  const glowMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.rotation.x = -Math.PI / 2;
  glow.position.y = -0.19;
  mineGroup.add(glow);

  mineGroup.position.set(cellCenterX, 0.2, cellCenterZ);
  scene.add(mineGroup);

  mines.push({
    mesh: mineGroup,
    glow,
    col,
    row,
    time: 0
  });

  updateState();
});

// ============ EXPLOSION EFFECT ============
function createExplosion(position) {
  const particleCount = 40;
  const particles = [];

  for (let i = 0; i < particleCount; i++) {
    const size = 0.05 + Math.random() * 0.1;
    const geo = new THREE.SphereGeometry(size, 6, 6);
    const color = new THREE.Color().setHSL(0.05 + Math.random() * 0.08, 1, 0.4 + Math.random() * 0.3);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
    const mesh = new THREE.Mesh(geo, mat);

    mesh.position.copy(position);

    const velocity = new THREE.Vector3(
      (Math.random() - 0.5) * 6,
      Math.random() * 5 + 2,
      (Math.random() - 0.5) * 6
    );

    scene.add(mesh);
    particles.push({ mesh, velocity, life: 1.0, decay: 0.8 + Math.random() * 0.5 });
  }

  // Flash light
  const flashLight = new THREE.PointLight(0xff6600, 10, 8);
  flashLight.position.copy(position);
  flashLight.position.y += 0.5;
  scene.add(flashLight);

  // Shockwave ring
  const ringGeo = new THREE.RingGeometry(0.1, 0.3, 24);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.copy(position);
  ring.position.y = 0.05;
  scene.add(ring);

  explosionParticles.push({
    particles,
    flashLight,
    ring,
    time: 0,
    duration: 1.2
  });
}

// ============ SOLDIER UPDATE ============
function updateSoldier(soldier, delta) {
  if (!soldier.alive) return;

  if (soldier.dying) {
    soldier.dyingTimer += delta;
    if (soldier.dyingTimer >= 1.5) {
      scene.remove(soldier.model);
      soldier.alive = false;
      checkVictory();
    } else if (!soldier.deathAction) {
      // Fallback: rotate to fall down
      const t = Math.min(soldier.dyingTimer / 0.5, 1);
      soldier.model.rotation.x = t * Math.PI / 2;
      soldier.model.position.y = -t * 0.3;
    }
    if (soldier.mixer) soldier.mixer.update(delta);
    return;
  }

  if (soldier.state === 'waiting') {
    soldier.waitTimer -= delta;
    if (soldier.waitTimer <= 0) {
      soldier.state = 'walking';
      // Switch to walk animation
      if (soldier.idleAction) soldier.idleAction.fadeOut(0.2);
      if (soldier.walkAction) {
        soldier.walkAction.reset().fadeIn(0.2).play();
      }
    }
    if (soldier.mixer) soldier.mixer.update(delta);
    return;
  }

  // Walking state
  const route = soldier.route;
  const nextIndex = (soldier.currentWaypoint + 1) % route.length;
  const target = route[nextIndex];

  const direction = new THREE.Vector3().subVectors(target, soldier.model.position);
  direction.y = 0;
  const distance = direction.length();

  if (distance < 0.1) {
    // Reached waypoint
    soldier.model.position.set(target.x, 0, target.z);
    soldier.currentWaypoint = nextIndex;
    soldier.state = 'waiting';
    soldier.waitTimer = 0.5;

    // Switch to idle animation
    if (soldier.walkAction) soldier.walkAction.fadeOut(0.2);
    if (soldier.idleAction) {
      soldier.idleAction.reset().fadeIn(0.2).play();
    }
  } else {
    direction.normalize();
    const moveDistance = Math.min(soldier.speed * delta, distance);
    soldier.model.position.add(direction.multiplyScalar(moveDistance));

    // Face movement direction
    const lookTarget = new THREE.Vector3(
      soldier.model.position.x + direction.x,
      soldier.model.position.y,
      soldier.model.position.z + direction.z
    );
    soldier.model.lookAt(lookTarget);
  }

  if (soldier.mixer) soldier.mixer.update(delta);
}

// ============ EXPLOSION CHECK ============
function checkExplosions() {
  for (let si = soldiers.length - 1; si >= 0; si--) {
    const soldier = soldiers[si];
    if (!soldier.alive || soldier.dying) continue;

    for (let mi = mines.length - 1; mi >= 0; mi--) {
      const mine = mines[mi];
      const dist = soldier.model.position.distanceTo(mine.mesh.position);

      if (dist < 1.5) {
        // Trigger explosion
        createExplosion(mine.mesh.position.clone());
        scene.remove(mine.mesh);
        mines.splice(mi, 1);
        explosionCount++;

        // Kill soldier
        soldier.dying = true;
        soldier.dyingTimer = 0;

        if (soldier.walkAction) soldier.walkAction.stop();
        if (soldier.idleAction) soldier.idleAction.stop();

        if (soldier.deathAction) {
          soldier.deathAction.reset();
          soldier.deathAction.setLoop(THREE.LoopOnce, 1);
          soldier.deathAction.clampWhenFinished = true;
          soldier.deathAction.play();
        }

        updateState();
        break;
      }
    }
  }
}

// ============ VICTORY CHECK ============
function checkVictory() {
  const alive = soldiers.filter(s => s.alive);
  if (alive.length === 0) {
    gameState = 'victory';
    document.getElementById('victoryOverlay').style.display = 'block';
    updateState();
  }
}

// ============ UPDATE EXPLOSIONS ============
function updateExplosions(delta) {
  for (let i = explosionParticles.length - 1; i >= 0; i--) {
    const exp = explosionParticles[i];
    exp.time += delta;

    const progress = exp.time / exp.duration;

    // Update particles
    for (const p of exp.particles) {
      p.velocity.y -= 9.8 * delta;
      p.mesh.position.add(p.velocity.clone().multiplyScalar(delta));
      p.life -= p.decay * delta;

      if (p.life > 0) {
        p.mesh.material.opacity = Math.max(0, p.life);
        const s = Math.max(0.01, p.life);
        p.mesh.scale.set(s, s, s);
      }
    }

    // Update flash light
    exp.flashLight.intensity = Math.max(0, 10 * (1 - progress * 2));

    // Update shockwave ring
    const ringScale = 1 + progress * 8;
    exp.ring.scale.set(ringScale, ringScale, 1);
    exp.ring.material.opacity = Math.max(0, 0.8 * (1 - progress));

    if (exp.time >= exp.duration) {
      // Clean up
      for (const p of exp.particles) {
        scene.remove(p.mesh);
        p.mesh.geometry.dispose();
        p.mesh.material.dispose();
      }
      scene.remove(exp.flashLight);
      scene.remove(exp.ring);
      exp.ring.geometry.dispose();
      exp.ring.material.dispose();
      explosionParticles.splice(i, 1);
    }
  }
}

// ============ ANIMATE MINES ============
function updateMines(delta) {
  for (const mine of mines) {
    mine.time += delta;
    // Pulsing glow
    mine.glow.material.opacity = 0.2 + 0.3 * Math.sin(mine.time * 3);
    // Slight bobbing
    mine.mesh.position.y = 0.2 + Math.sin(mine.time * 2) * 0.03;
    mine.mesh.rotation.y += delta * 0.5;
  }
}

// ============ ANIMATION LOOP ============
function animate() {
  requestAnimationFrame(animate);

  const delta = Math.min(clock.getDelta(), 0.05);

  controls.update();

  // Update soldiers
  for (const soldier of soldiers) {
    updateSoldier(soldier, delta);
  }

  // Check explosions
  if (gameState === 'playing') {
    checkExplosions();
  }

  // Update explosion effects
  updateExplosions(delta);

  // Update mines
  updateMines(delta);

  // Update state
  updateState();

  renderer.render(scene, camera);
}

animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
