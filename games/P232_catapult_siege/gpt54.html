<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Catapult Siege Game</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #87CEEB;
    }

    #uiBar {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 20;
      background: rgba(255,255,255,0.85);
      padding: 10px 12px;
      border-radius: 8px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    #hud {
      position: absolute;
      top: 70px;
      left: 10px;
      z-index: 20;
      background: rgba(0,0,0,0.55);
      color: white;
      padding: 10px 12px;
      border-radius: 8px;
      line-height: 1.6;
      min-width: 180px;
    }

    #gameOverMsg, #victoryMsg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
      font-size: 42px;
      font-weight: bold;
      padding: 18px 28px;
      border-radius: 12px;
      display: none;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    #gameOverMsg {
      background: rgba(180, 0, 0, 0.85);
      color: white;
    }

    #victoryMsg {
      background: rgba(0, 120, 0, 0.85);
      color: white;
    }

    label, button {
      font-size: 14px;
    }

    input[type="range"] {
      width: 180px;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="uiBar">
    <label for="powerSlider">Power</label>
    <input id="powerSlider" type="range" min="5" max="25" value="15" step="1" />
    <span id="powerValue">15</span>
    <button id="resetBtn">Reset</button>
    <span>Controls: ↑/↓ angle, Space launch</span>
  </div>

  <div id="hud">
    <div id="scoreDisplay">Score: 0</div>
    <div id="ammoDisplay">Ammo: 5</div>
    <div id="angleDisplay">Angle: 45°</div>
    <div id="blocksDisplay">Blocks Remaining: 12 / 12</div>
  </div>

  <div id="gameOverMsg">Game Over</div>
  <div id="victoryMsg">Victory!</div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    let scene, camera, renderer, controls, clock;
    let ambientLight, directionalLight;
    let catapult, armPivot, armMesh, bucketMesh;
    let castleBlocks = [];
    let activeBlocks = [];
    let projectile = null;
    let projectileMixer = null;
    let projectileActions = [];
    let projectileLoaded = false;
    let projectileActive = false;
    let projectileVelocity = new THREE.Vector3(0, 0, 0);
    let launchPendingArmAnim = false;
    let armAnimating = false;
    let armAnimTime = 0;
    let armReturnTime = 0;
    let respawnTimeout = null;
    let launchOrigin = new THREE.Vector3();
    const gravity = -9.8;
    const TOTAL_BLOCKS = 12;

    const slider = document.getElementById("powerSlider");
    const powerValue = document.getElementById("powerValue");
    const resetBtn = document.getElementById("resetBtn");
    const scoreDisplay = document.getElementById("scoreDisplay");
    const ammoDisplay = document.getElementById("ammoDisplay");
    const angleDisplay = document.getElementById("angleDisplay");
    const blocksDisplay = document.getElementById("blocksDisplay");
    const gameOverMsg = document.getElementById("gameOverMsg");
    const victoryMsg = document.getElementById("victoryMsg");

    const state = {
      score: 0,
      ammo: 5,
      angle: 45,
      power: 15,
      blocksRemaining: 12,
      projectileActive: false,
      projectilePosition: { x: -10, y: 3.5, z: 0 },
      launchCount: 0,
      gameOver: false,
      victory: false,
      catapultArmAngle: 45,
      projectileVelocity: { x: 0, y: 0, z: 0 },
      animationPlaying: false
    };

    window.__3D_STATE__ = state;

    init();
    animate();

    function init() {
      clock = new THREE.Clock();

      scene = new THREE.Scene();
      scene.background = new THREE.Color("#87CEEB");

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
      camera.position.set(0, 8, 20);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 3, 0);
      controls.enableDamping = true;

      ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);

      directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
      directionalLight.position.set(10, 15, 10);
      directionalLight.castShadow = true;
      directionalLight.shadow.mapSize.set(2048, 2048);
      directionalLight.shadow.camera.left = -40;
      directionalLight.shadow.camera.right = 40;
      directionalLight.shadow.camera.top = 40;
      directionalLight.shadow.camera.bottom = -40;
      directionalLight.shadow.camera.near = 0.5;
      directionalLight.shadow.camera.far = 100;
      scene.add(directionalLight);

      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(100, 100),
        new THREE.MeshStandardMaterial({ color: "#3a7d2c" })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = 0;
      ground.receiveShadow = true;
      scene.add(ground);

      buildCatapult();
      buildCastleWall();
      loadProjectileModel();
      setupEvents();
      updateHUD();
      updateState();
    }

    function buildCatapult() {
      catapult = new THREE.Group();
      catapult.position.set(-10, 0, 0);

      const brownMat = new THREE.MeshStandardMaterial({ color: "#8B4513" });

      const base = new THREE.Mesh(
        new THREE.BoxGeometry(2, 0.5, 1),
        brownMat
      );
      base.position.set(0, 0.25, 0);
      base.castShadow = true;
      base.receiveShadow = true;
      catapult.add(base);

      const supportLeft = new THREE.Mesh(
        new THREE.BoxGeometry(0.15, 1.5, 0.15),
        brownMat
      );
      supportLeft.position.set(-0.2, 1.0, -0.2);
      supportLeft.castShadow = true;
      catapult.add(supportLeft);

      const supportRight = supportLeft.clone();
      supportRight.position.z = 0.2;
      catapult.add(supportRight);

      armPivot = new THREE.Group();
      armPivot.position.set(0, 0.5, 0);
      catapult.add(armPivot);

      armMesh = new THREE.Mesh(
        new THREE.BoxGeometry(0.2, 4, 0.2),
        brownMat
      );
      armMesh.position.set(0, 2, 0);
      armMesh.castShadow = true;
      armMesh.receiveShadow = true;
      armPivot.add(armMesh);

      bucketMesh = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 0.3, 0.5),
        new THREE.MeshStandardMaterial({ color: "#654321" })
      );
      bucketMesh.position.set(0, 4.15, 0);
      bucketMesh.castShadow = true;
      bucketMesh.receiveShadow = true;
      armPivot.add(bucketMesh);

      scene.add(catapult);
      applyArmAngle();
    }

    function buildCastleWall() {
      clearCastleWall();

      const grayMat = new THREE.MeshStandardMaterial({ color: "#808080" });
      const cols = 4;
      const rows = 3;
      const spacing = 1.25;
      const startY = 0.6;
      const centerZOffset = -((cols - 1) * spacing) / 2;

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const block = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 1.2, 1.2),
            grayMat.clone()
          );
          block.position.set(
            10,
            startY + row * 1.2,
            centerZOffset + col * spacing
          );
          block.castShadow = true;
          block.receiveShadow = true;
          block.userData.destroyed = false;
          scene.add(block);
          castleBlocks.push(block);
          activeBlocks.push(block);
        }
      }

      state.blocksRemaining = activeBlocks.length;
      updateHUD();
      updateState();
    }

    function clearCastleWall() {
      for (const block of castleBlocks) {
        scene.remove(block);
        if (block.geometry) block.geometry.dispose();
        if (block.material) block.material.dispose();
      }
      castleBlocks = [];
      activeBlocks = [];
    }

    function loadProjectileModel() {
      const loader = new GLTFLoader();
      loader.load(
        "BoxAnimated.glb",
        (gltf) => {
          projectile = gltf.scene;
          projectile.scale.set(0.5, 0.5, 0.5);
          projectile.traverse((obj) => {
            if (obj.isMesh) {
              obj.castShadow = true;
              obj.receiveShadow = true;
            }
          });

          projectileMixer = new THREE.AnimationMixer(projectile);
          projectileActions = [];
          if (gltf.animations && gltf.animations.length > 0) {
            for (const clip of gltf.animations) {
              const action = projectileMixer.clipAction(clip);
              action.loop = THREE.LoopRepeat;
              action.clampWhenFinished = false;
              projectileActions.push(action);
            }
          }

          projectileLoaded = true;
          respawnProjectile();
        },
        undefined,
        () => {
          // Fallback projectile if GLB fails
          projectile = new THREE.Mesh(
            new THREE.BoxGeometry(0.6, 0.6, 0.6),
            new THREE.MeshStandardMaterial({ color: 0xffaa00 })
          );
          projectile.castShadow = true;
          projectile.receiveShadow = true;
          projectileLoaded = true;
          respawnProjectile();
        }
      );
    }

    function getBucketWorldPosition() {
      const pos = new THREE.Vector3();
      bucketMesh.getWorldPosition(pos);
      return pos;
    }

    function respawnProjectile() {
      if (!projectileLoaded) return;
      if (state.gameOver || state.victory) return;

      if (!scene.children.includes(projectile)) {
        scene.add(projectile);
      }

      projectileActive = false;
      state.projectileActive = false;
      projectileVelocity.set(0, 0, 0);
      stopProjectileAnimation();

      const bucketPos = getBucketWorldPosition();
      projectile.position.copy(bucketPos);
      projectile.rotation.set(0, 0, 0);

      updateState();
    }

    function launchProjectile() {
      if (!projectileLoaded) return;
      if (projectileActive) return;
      if (state.ammo <= 0) return;
      if (state.gameOver || state.victory) return;

      state.ammo = Math.max(0, state.ammo - 1);
      state.launchCount += 1;

      const bucketPos = getBucketWorldPosition();
      projectile.position.copy(bucketPos);
      launchOrigin.copy(bucketPos);

      const angleRad = THREE.MathUtils.degToRad(safeNumber(state.angle, 45));
      const power = safeNumber(state.power, 15);

      projectileVelocity.set(
        Math.cos(angleRad) * power,
        Math.sin(angleRad) * power,
        0
      );

      projectileActive = true;
      state.projectileActive = true;
      launchPendingArmAnim = true;
      armAnimating = true;
      armAnimTime = 0;
      armReturnTime = 0;

      playProjectileAnimation();
      updateHUD();
      updateState();
    }

    function updateProjectile(dt) {
      if (!projectileActive || !projectile) return;

      projectileVelocity.y += gravity * dt;
      projectile.position.x += projectileVelocity.x * dt;
      projectile.position.y += projectileVelocity.y * dt;
      projectile.position.z += projectileVelocity.z * dt;

      if (projectile.position.y < 0) {
        projectile.position.y = 0;
        projectileActive = false;
        state.projectileActive = false;
        projectileVelocity.set(0, 0, 0);
        stopProjectileAnimation();
        updateState();
        checkEndConditions();

        if (!state.gameOver && !state.victory) {
          if (respawnTimeout) clearTimeout(respawnTimeout);
          respawnTimeout = setTimeout(() => {
            respawnProjectile();
          }, 2000);
        }
        return;
      }

      checkBlockCollisions();
      updateState();
    }

    function checkBlockCollisions() {
      const projPos = projectile.position;

      for (let i = activeBlocks.length - 1; i >= 0; i--) {
        const block = activeBlocks[i];
        if (!block || block.userData.destroyed) continue;

        const dist = projPos.distanceTo(block.position);
        if (dist <= 1.5) {
          block.visible = false;
          block.userData.destroyed = true;
          activeBlocks.splice(i, 1);
          state.score += 10;
          state.blocksRemaining = activeBlocks.length;
          updateHUD();
          updateState();
        }
      }

      checkEndConditions();
    }

    function checkEndConditions() {
      state.victory = state.blocksRemaining <= 0;
      state.gameOver = !state.victory && state.ammo <= 0 && !projectileActive;

      victoryMsg.style.display = state.victory ? "block" : "none";
      gameOverMsg.style.display = state.gameOver ? "block" : "none";

      updateState();
    }

    function playProjectileAnimation() {
      if (projectileMixer && projectileActions.length > 0) {
        projectileActions.forEach(action => {
          action.reset();
          action.play();
        });
        state.animationPlaying = true;
      } else {
        state.animationPlaying = false;
      }
      updateState();
    }

    function stopProjectileAnimation() {
      if (projectileActions.length > 0) {
        projectileActions.forEach(action => action.stop());
      }
      state.animationPlaying = false;
      updateState();
    }

    function applyArmAngle() {
      const angle = safeClamp(state.angle, 20, 80, 45);
      state.angle = angle;
      state.catapultArmAngle = angle;

      // Angle from vertical: rotate around Z so positive angle leans backward (left).
      const rotZ = THREE.MathUtils.degToRad(angle);
      armPivot.rotation.z = rotZ;

      updateHUD();
      updateState();

      if (!projectileActive && projectile) {
        const bucketPos = getBucketWorldPosition();
        projectile.position.copy(bucketPos);
        updateState();
      }
    }

    function animateArm(dt) {
      if (!armAnimating) return;

      const baseAngle = safeClamp(state.angle, 20, 80, 45);

      if (launchPendingArmAnim) {
        armAnimTime += dt;
        const t = Math.min(armAnimTime / 0.18, 1);
        const currentDeg = THREE.MathUtils.lerp(baseAngle, -20, t);
        armPivot.rotation.z = THREE.MathUtils.degToRad(currentDeg);
        state.catapultArmAngle = safeNumber(currentDeg, baseAngle);

        if (t >= 1) {
          launchPendingArmAnim = false;
        }
      } else {
        armReturnTime += dt;
        const t = Math.min(armReturnTime / 0.28, 1);
        const currentDeg = THREE.MathUtils.lerp(-20, baseAngle, t);
        armPivot.rotation.z = THREE.MathUtils.degToRad(currentDeg);
        state.catapultArmAngle = safeNumber(currentDeg, baseAngle);

        if (t >= 1) {
          armAnimating = false;
          applyArmAngle();
        }
      }

      updateState();
    }

    function setupEvents() {
      slider.addEventListener("input", () => {
        const value = safeClamp(parseFloat(slider.value), 5, 25, 15);
        state.power = value;
        powerValue.textContent = String(value);
        updateHUD();
        updateState();
      });

      resetBtn.addEventListener("click", resetGame);

      window.addEventListener("keydown", (e) => {
        if (e.code === "ArrowUp") {
          e.preventDefault();
          if (!projectileActive && !state.gameOver && !state.victory) {
            state.angle = safeClamp(state.angle + 5, 20, 80, 45);
            applyArmAngle();
          }
        } else if (e.code === "ArrowDown") {
          e.preventDefault();
          if (!projectileActive && !state.gameOver && !state.victory) {
            state.angle = safeClamp(state.angle - 5, 20, 80, 45);
            applyArmAngle();
          }
        } else if (e.code === "Space") {
          e.preventDefault();
          launchProjectile();
        }
      });

      window.addEventListener("resize", onWindowResize);
    }

    function resetGame() {
      if (respawnTimeout) {
        clearTimeout(respawnTimeout);
        respawnTimeout = null;
      }

      state.score = 0;
      state.ammo = 5;
      state.angle = 45;
      state.power = safeClamp(parseFloat(slider.value), 5, 25, 15);
      state.blocksRemaining = TOTAL_BLOCKS;
      state.projectileActive = false;
      state.projectilePosition = { x: -10, y: 3.5, z: 0 };
      state.launchCount = 0;
      state.gameOver = false;
      state.victory = false;
      state.catapultArmAngle = 45;
      state.projectileVelocity = { x: 0, y: 0, z: 0 };
      state.animationPlaying = false;

      projectileActive = false;
      projectileVelocity.set(0, 0, 0);
      armAnimating = false;
      launchPendingArmAnim = false;
      armAnimTime = 0;
      armReturnTime = 0;

      gameOverMsg.style.display = "none";
      victoryMsg.style.display = "none";

      buildCastleWall();
      applyArmAngle();
      if (projectile) {
        stopProjectileAnimation();
        respawnProjectile();
      }

      updateHUD();
      updateState();
    }

    function updateHUD() {
      scoreDisplay.textContent = `Score: ${safeNumber(state.score, 0)}`;
      ammoDisplay.textContent = `Ammo: ${safeNumber(state.ammo, 0)}`;
      angleDisplay.textContent = `Angle: ${safeNumber(state.angle, 45)}°`;
      blocksDisplay.textContent = `Blocks Remaining: ${safeNumber(state.blocksRemaining, TOTAL_BLOCKS)} / ${TOTAL_BLOCKS}`;
      powerValue.textContent = String(safeNumber(state.power, 15));
    }

    function updateState() {
      const projPos = projectile
        ? projectile.position
        : { x: -10, y: 3.5, z: 0 };

      state.score = safeNumber(state.score, 0);
      state.ammo = safeNumber(state.ammo, 5);
      state.angle = safeClamp(state.angle, 20, 80, 45);
      state.power = safeClamp(state.power, 5, 25, 15);
      state.blocksRemaining = safeNumber(state.blocksRemaining, TOTAL_BLOCKS);
      state.projectileActive = !!projectileActive;
      state.projectilePosition = {
        x: safeNumber(projPos.x, -10),
        y: safeNumber(projPos.y, 3.5),
        z: safeNumber(projPos.z, 0)
      };
      state.launchCount = safeNumber(state.launchCount, 0);
      state.gameOver = !!state.gameOver;
      state.victory = !!state.victory;
      state.catapultArmAngle = safeNumber(state.catapultArmAngle, state.angle);
      state.projectileVelocity = {
        x: safeNumber(projectileVelocity.x, 0),
        y: safeNumber(projectileVelocity.y, 0),
        z: safeNumber(projectileVelocity.z, 0)
      };
      state.animationPlaying = !!state.animationPlaying;

      window.__3D_STATE__ = state;
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.033);

      controls.update();
      animateArm(dt);
      updateProjectile(dt);

      if (projectileMixer) {
        projectileMixer.update(dt);
      }

      renderer.render(scene, camera);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function safeNumber(value, fallback) {
      return Number.isFinite(value) ? value : fallback;
    }

    function safeClamp(value, min, max, fallback) {
      const v = safeNumber(value, fallback);
      return Math.min(max, Math.max(min, v));
    }
  </script>
</body>
</html>
