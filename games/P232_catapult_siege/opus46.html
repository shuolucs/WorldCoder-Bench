<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Catapult Siege Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: Arial, sans-serif; background: #000; }
  canvas { display: block; }
  
  #controls {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 15px;
    background: rgba(0,0,0,0.6);
    padding: 8px 20px;
    border-radius: 8px;
    z-index: 10;
    color: white;
  }
  
  #controls label {
    font-size: 14px;
    font-weight: bold;
  }
  
  #powerSlider {
    width: 150px;
    cursor: pointer;
  }
  
  #resetBtn {
    padding: 6px 16px;
    background: #e74c3c;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
  }
  
  #resetBtn:hover { background: #c0392b; }
  
  #hud {
    position: absolute;
    top: 60px;
    left: 10px;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.8;
    z-index: 10;
  }
  
  #hud div { margin: 2px 0; }
  
  #gameOverMsg, #victoryMsg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: bold;
    padding: 20px 40px;
    border-radius: 12px;
    z-index: 20;
    display: none;
    text-align: center;
  }
  
  #gameOverMsg {
    background: rgba(231, 76, 60, 0.9);
    color: white;
  }
  
  #victoryMsg {
    background: rgba(46, 204, 113, 0.9);
    color: white;
  }
  
  #instructions {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: #ccc;
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 12px;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="controls">
  <label for="powerSlider">Power:</label>
  <input type="range" id="powerSlider" min="5" max="25" value="15">
  <span id="powerValue">15</span>
  <button id="resetBtn">Reset</button>
</div>

<div id="hud">
  <div>Score: <span id="scoreDisplay">0</span></div>
  <div>Ammo: <span id="ammoDisplay">5</span></div>
  <div>Angle: <span id="angleDisplay">45</span>°</div>
  <div>Blocks: <span id="blocksDisplay">12</span> / 12</div>
</div>

<div id="gameOverMsg">Game Over!</div>
<div id="victoryMsg">Victory!</div>

<div id="instructions">↑/↓: Adjust Angle | Space: Launch | Mouse: Orbit Camera</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
const state = {
  score: 0,
  ammo: 5,
  angle: 45,
  power: 15,
  blocksRemaining: 12,
  projectileActive: false,
  projectilePosition: { x: 0, y: 0, z: 0 },
  launchCount: 0,
  gameOver: false,
  victory: false,
  catapultArmAngle: 45,
  projectileVelocity: { x: 0, y: 0, z: 0 },
  animationPlaying: false
};
window.__3D_STATE__ = state;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 8, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(10, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 60;
dirLight.shadow.camera.left = -25;
dirLight.shadow.camera.right = 25;
dirLight.shadow.camera.top = 25;
dirLight.shadow.camera.bottom = -25;
scene.add(dirLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a7d2c });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 3, 0);
controls.update();

// ============ CATAPULT ============
const catapultGroup = new THREE.Group();
catapultGroup.position.set(-10, 0, 0);
scene.add(catapultGroup);

// Base
const baseMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
const baseGeo = new THREE.BoxGeometry(2, 0.5, 1);
const baseMesh = new THREE.Mesh(baseGeo, baseMat);
baseMesh.position.y = 0.25;
baseMesh.castShadow = true;
baseMesh.receiveShadow = true;
catapultGroup.add(baseMesh);

// Support posts
const postGeo = new THREE.BoxGeometry(0.2, 1.2, 0.2);
const postL = new THREE.Mesh(postGeo, baseMat);
postL.position.set(0, 1.1, 0.3);
postL.castShadow = true;
catapultGroup.add(postL);
const postR = new THREE.Mesh(postGeo, baseMat);
postR.position.set(0, 1.1, -0.3);
postR.castShadow = true;
catapultGroup.add(postR);

// Arm pivot
const armPivot = new THREE.Group();
armPivot.position.set(0, 1.5, 0);
catapultGroup.add(armPivot);

// Arm
const armGeo = new THREE.BoxGeometry(0.2, 4, 0.2);
const armMesh = new THREE.Mesh(armGeo, baseMat);
armMesh.position.y = 2;
armMesh.castShadow = true;
armPivot.add(armMesh);

// Bucket
const bucketGeo = new THREE.BoxGeometry(0.5, 0.15, 0.5);
const bucketMat = new THREE.MeshStandardMaterial({ color: 0x654321 });
const bucketMesh = new THREE.Mesh(bucketGeo, bucketMat);
bucketMesh.position.y = 4;
bucketMesh.castShadow = true;
armPivot.add(bucketMesh);

function degToRad(d) { return d * Math.PI / 180; }
function radToDeg(r) { return r * 180 / Math.PI; }

function setArmAngle(angleDeg) {
  // angleDeg: angle from vertical. 0 = straight up, 90 = horizontal back
  // The arm tilts backward (positive X direction) for loading
  const rad = degToRad(angleDeg);
  armPivot.rotation.z = rad;
  state.catapultArmAngle = angleDeg;
}

setArmAngle(state.angle);

// ============ PROJECTILE (BoxAnimated.glb) ============
let projectileMesh = null;
let projectileMixer = null;
let projectileAnimations = [];
let projectileLoaded = false;
let projectileTemplate = null;

const loader = new GLTFLoader();

function createFallbackProjectile() {
  const geo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
  const mat = new THREE.MeshStandardMaterial({ color: 0xff4444 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  return mesh;
}

function getBucketWorldPos() {
  const pos = new THREE.Vector3();
  bucketMesh.getWorldPosition(pos);
  return pos;
}

function placeProjectileInBucket() {
  if (projectileMesh) {
    scene.remove(projectileMesh);
    projectileMesh = null;
    projectileMixer = null;
  }

  if (projectileTemplate) {
    projectileMesh = projectileTemplate.clone();
    projectileMesh.scale.set(0.5, 0.5, 0.5);
    
    // Re-setup animations for clone
    if (projectileAnimations.length > 0) {
      projectileMixer = new THREE.AnimationMixer(projectileMesh);
    }
  } else {
    projectileMesh = createFallbackProjectile();
  }

  const bucketPos = getBucketWorldPos();
  projectileMesh.position.copy(bucketPos);
  projectileMesh.position.y += 0.3;
  scene.add(projectileMesh);

  state.projectilePosition = { x: projectileMesh.position.x, y: projectileMesh.position.y, z: projectileMesh.position.z };
  state.projectileVelocity = { x: 0, y: 0, z: 0 };
  state.animationPlaying = false;
}

// Try loading the GLTF model
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/BoxAnimated/glTF-Binary/BoxAnimated.glb',
  (gltf) => {
    projectileTemplate = gltf.scene;
    projectileAnimations = gltf.animations;
    projectileLoaded = true;
    placeProjectileInBucket();
  },
  undefined,
  (error) => {
    console.warn('Failed to load BoxAnimated.glb, using fallback:', error);
    projectileLoaded = true;
    placeProjectileInBucket();
  }
);

// Place fallback immediately
if (!projectileMesh) {
  placeProjectileInBucket();
}

// ============ CASTLE WALL ============
let castleBlocks = [];
const blockSize = 1.2;
const wallX = 10;

function buildCastleWall() {
  // Remove existing blocks
  castleBlocks.forEach(b => scene.remove(b));
  castleBlocks = [];

  const blockMat = new THREE.MeshStandardMaterial({ color: 0x808080 });

  for (let col = 0; col < 4; col++) {
    for (let row = 0; row < 3; row++) {
      const geo = new THREE.BoxGeometry(blockSize, blockSize, blockSize);
      const block = new THREE.Mesh(geo, blockMat.clone());
      
      const z = (col - 1.5) * blockSize;
      const y = 0.6 + row * blockSize;
      
      block.position.set(wallX, y, z);
      block.castShadow = true;
      block.receiveShadow = true;
      block.userData.active = true;
      scene.add(block);
      castleBlocks.push(block);
    }
  }

  state.blocksRemaining = 12;
}

buildCastleWall();

// Add some castle decorations (crenellations on top)
function addCastleDecorations() {
  const mat = new THREE.MeshStandardMaterial({ color: 0x707070 });
  for (let i = 0; i < 5; i++) {
    const geo = new THREE.BoxGeometry(0.4, 0.6, 0.4);
    const merlon = new THREE.Mesh(geo, mat);
    merlon.position.set(wallX, 0.6 + 3 * blockSize + 0.3, (i - 2) * blockSize);
    merlon.castShadow = true;
    scene.add(merlon);
  }
}
addCastleDecorations();

// ============ PROJECTILE PHYSICS ============
let projectileVel = new THREE.Vector3(0, 0, 0);
const GRAVITY = -9.8;
let isLaunching = false;
let launchAnimProgress = 0;
let launchStartAngle = 45;
let launchTargetAngle = -20; // forward swing

function launchProjectile() {
  if (state.projectileActive || state.ammo <= 0 || state.gameOver || state.victory) return;
  if (isLaunching) return;

  state.ammo--;
  state.launchCount++;
  isLaunching = true;
  launchAnimProgress = 0;
  launchStartAngle = state.angle;

  updateHUD();
}

function completeLaunch() {
  isLaunching = false;
  state.projectileActive = true;

  // Calculate launch velocity based on angle and power
  const launchAngleRad = degToRad(state.angle);
  const power = state.power;

  // Launch direction: the arm swings forward, so projectile goes in +X direction
  // The launch angle from horizontal
  const horizontalAngle = 90 - state.angle; // convert from vertical to horizontal reference
  const hAngleRad = degToRad(horizontalAngle);

  projectileVel.set(
    Math.cos(hAngleRad) * power,
    Math.sin(hAngleRad) * power,
    0
  );

  state.projectileVelocity = { x: projectileVel.x, y: projectileVel.y, z: projectileVel.z };

  // Start animation on the projectile
  if (projectileMixer && projectileAnimations.length > 0) {
    projectileAnimations.forEach(clip => {
      const action = projectileMixer.clipAction(clip);
      action.reset();
      action.play();
    });
    state.animationPlaying = true;
  }
}

function updateProjectile(dt) {
  if (!state.projectileActive || !projectileMesh) return;

  // Apply gravity
  projectileVel.y += GRAVITY * dt;

  // Update position
  projectileMesh.position.x += projectileVel.x * dt;
  projectileMesh.position.y += projectileVel.y * dt;
  projectileMesh.position.z += projectileVel.z * dt;

  // Rotate projectile for visual effect
  projectileMesh.rotation.x += dt * 3;
  projectileMesh.rotation.z += dt * 2;

  state.projectilePosition = {
    x: projectileMesh.position.x,
    y: projectileMesh.position.y,
    z: projectileMesh.position.z
  };
  state.projectileVelocity = { x: projectileVel.x, y: projectileVel.y, z: projectileVel.z };

  // Collision with castle blocks
  castleBlocks.forEach(block => {
    if (!block.userData.active) return;
    const dist = projectileMesh.position.distanceTo(block.position);
    if (dist < 1.5) {
      block.userData.active = false;
      block.visible = false;
      state.score += 10;
      state.blocksRemaining--;

      // Create debris particles
      createDebris(block.position.clone());

      updateHUD();

      if (state.blocksRemaining <= 0) {
        state.victory = true;
        document.getElementById('victoryMsg').style.display = 'block';
      }
    }
  });

  // Hit ground
  if (projectileMesh.position.y < 0) {
    projectileMesh.position.y = 0;
    state.projectileActive = false;
    state.projectilePosition = {
      x: projectileMesh.position.x,
      y: projectileMesh.position.y,
      z: projectileMesh.position.z
    };
    state.projectileVelocity = { x: 0, y: 0, z: 0 };
    state.animationPlaying = false;

    // Check game over
    if (state.ammo <= 0 && !state.victory) {
      state.gameOver = true;
      document.getElementById('gameOverMsg').style.display = 'block';
    }

    // Respawn after 2 seconds
    if (!state.gameOver && !state.victory) {
      setTimeout(() => {
        setArmAngle(state.angle);
        placeProjectileInBucket();
      }, 2000);
    }
  }

  // Out of bounds check
  if (projectileMesh.position.x > 30 || projectileMesh.position.x < -30) {
    state.projectileActive = false;
    state.projectileVelocity = { x: 0, y: 0, z: 0 };
    state.animationPlaying = false;

    if (state.ammo <= 0 && !state.victory) {
      state.gameOver = true;
      document.getElementById('gameOverMsg').style.display = 'block';
    }

    if (!state.gameOver && !state.victory) {
      setTimeout(() => {
        setArmAngle(state.angle);
        placeProjectileInBucket();
      }, 2000);
    }
  }
}

// ============ DEBRIS PARTICLES ============
const debrisParticles = [];

function createDebris(position) {
  for (let i = 0; i < 8; i++) {
    const size = 0.1 + Math.random() * 0.2;
    const geo = new THREE.BoxGeometry(size, size, size);
    const mat = new THREE.MeshStandardMaterial({ color: 0x808080 });
    const particle = new THREE.Mesh(geo, mat);
    particle.position.copy(position);
    particle.castShadow = true;
    
    particle.userData.vel = new THREE.Vector3(
      (Math.random() - 0.5) * 5,
      Math.random() * 5 + 2,
      (Math.random() - 0.5) * 5
    );
    particle.userData.life = 2.0;
    
    scene.add(particle);
    debrisParticles.push(particle);
  }
}

function updateDebris(dt) {
  for (let i = debrisParticles.length - 1; i >= 0; i--) {
    const p = debrisParticles[i];
    p.userData.vel.y += GRAVITY * dt;
    p.position.x += p.userData.vel.x * dt;
    p.position.y += p.userData.vel.y * dt;
    p.position.z += p.userData.vel.z * dt;
    p.rotation.x += dt * 5;
    p.rotation.z += dt * 3;
    p.userData.life -= dt;

    if (p.position.y < 0) p.position.y = 0;

    if (p.userData.life <= 0) {
      scene.remove(p);
      debrisParticles.splice(i, 1);
    }
  }
}

// ============ HUD UPDATE ============
function updateHUD() {
  document.getElementById('scoreDisplay').textContent = state.score;
  document.getElementById('ammoDisplay').textContent = state.ammo;
  document.getElementById('angleDisplay').textContent = state.angle;
  document.getElementById('blocksDisplay').textContent = state.blocksRemaining;
}

// ============ INPUT HANDLING ============
document.addEventListener('keydown', (e) => {
  if (e.code === 'ArrowUp') {
    e.preventDefault();
    if (state.angle < 80) {
      state.angle = Math.min(80, state.angle + 5);
      if (!state.projectileActive && !isLaunching) {
        setArmAngle(state.angle);
        // Update projectile position in bucket
        if (projectileMesh && !state.projectileActive) {
          const bucketPos = getBucketWorldPos();
          projectileMesh.position.copy(bucketPos);
          projectileMesh.position.y += 0.3;
          state.projectilePosition = { x: projectileMesh.position.x, y: projectileMesh.position.y, z: projectileMesh.position.z };
        }
      }
      updateHUD();
    }
  } else if (e.code === 'ArrowDown') {
    e.preventDefault();
    if (state.angle > 20) {
      state.angle = Math.max(20, state.angle - 5);
      if (!state.projectileActive && !isLaunching) {
        setArmAngle(state.angle);
        if (projectileMesh && !state.projectileActive) {
          const bucketPos = getBucketWorldPos();
          projectileMesh.position.copy(bucketPos);
          projectileMesh.position.y += 0.3;
          state.projectilePosition = { x: projectileMesh.position.x, y: projectileMesh.position.y, z: projectileMesh.position.z };
        }
      }
      updateHUD();
    }
  } else if (e.code === 'Space') {
    e.preventDefault();
    launchProjectile();
  }
});

// Power slider
const powerSlider = document.getElementById('powerSlider');
const powerValue = document.getElementById('powerValue');
powerSlider.addEventListener('input', () => {
  state.power = parseInt(powerSlider.value);
  powerValue.textContent = state.power;
});

// Reset button
document.getElementById('resetBtn').addEventListener('click', () => {
  state.score = 0;
  state.ammo = 5;
  state.angle = 45;
  state.power = parseInt(powerSlider.value);
  state.launchCount = 0;
  state.gameOver = false;
  state.victory = false;
  state.projectileActive = false;
  state.projectileVelocity = { x: 0, y: 0, z: 0 };
  state.animationPlaying = false;
  isLaunching = false;

  document.getElementById('gameOverMsg').style.display = 'none';
  document.getElementById('victoryMsg').style.display = 'none';

  buildCastleWall();
  setArmAngle(state.angle);
  placeProjectileInBucket();
  updateHUD();
});

// ============ WINDOW RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.05); // cap delta time

  // Launch animation
  if (isLaunching) {
    launchAnimProgress += dt * 4; // speed of arm swing
    if (launchAnimProgress >= 1) {
      launchAnimProgress = 1;
      completeLaunch();
    }

    // Animate arm from current angle to forward position
    const currentAngle = THREE.MathUtils.lerp(launchStartAngle, -20, launchAnimProgress);
    setArmAngle(currentAngle);

    // Keep projectile in bucket during animation
    if (projectileMesh && !state.projectileActive) {
      const bucketPos = getBucketWorldPos();
      projectileMesh.position.copy(bucketPos);
      projectileMesh.position.y += 0.3;
      state.projectilePosition = { x: projectileMesh.position.x, y: projectileMesh.position.y, z: projectileMesh.position.z };
    }

    // After launch, swing arm back
    if (launchAnimProgress >= 1 && !isLaunching) {
      // Will be handled by respawn
    }
  }

  // Update projectile physics
  updateProjectile(dt);

  // Update debris
  updateDebris(dt);

  // Update animation mixer
  if (projectileMixer && state.animationPlaying) {
    projectileMixer.update(dt);
  }

  // Update orbit controls
  controls.update();

  // Ensure NaN-free state
  ensureNaNFree();

  renderer.render(scene, camera);
}

function ensureNaNFree() {
  if (isNaN(state.score)) state.score = 0;
  if (isNaN(state.ammo)) state.ammo = 0;
  if (isNaN(state.angle)) state.angle = 45;
  if (isNaN(state.power)) state.power = 15;
  if (isNaN(state.blocksRemaining)) state.blocksRemaining = 0;
  if (isNaN(state.launchCount)) state.launchCount = 0;
  if (isNaN(state.catapultArmAngle)) state.catapultArmAngle = 45;
  if (isNaN(state.projectilePosition.x)) state.projectilePosition.x = 0;
  if (isNaN(state.projectilePosition.y)) state.projectilePosition.y = 0;
  if (isNaN(state.projectilePosition.z)) state.projectilePosition.z = 0;
  if (isNaN(state.projectileVelocity.x)) state.projectileVelocity.x = 0;
  if (isNaN(state.projectileVelocity.y)) state.projectileVelocity.y = 0;
  if (isNaN(state.projectileVelocity.z)) state.projectileVelocity.z = 0;
}

// Initial HUD update
updateHUD();

// Start animation loop
animate();
</script>
</body>
</html>
