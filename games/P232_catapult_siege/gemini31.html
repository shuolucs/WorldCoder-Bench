<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Catapult Siege</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            line-height: 1.5;
            pointer-events: auto;
        }
        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            color: white;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .message-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px #000;
            display: none;
            pointer-events: none;
        }
        #victoryMsg { color: #4CAF50; }
        #gameOverMsg { color: #F44336; }
        button {
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover { background-color: #45a049; }
        input[type=range] { cursor: pointer; }
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="hud">
            Score: <span id="scoreDisplay">0</span><br>
            Ammo: <span id="ammoDisplay">5</span><br>
            Angle: <span id="angleDisplay">45</span>°<br>
            Blocks: <span id="blocksDisplay">12</span>/12
        </div>
        
        <div id="controls">
            <label for="powerSlider">Power: <span id="powerValue">15</span></label>
            <input type="range" id="powerSlider" min="5" max="25" value="15">
            <button id="resetBtn">Reset Game</button>
        </div>

        <div class="instructions">
            Orbit: Mouse Drag | Angle: Up/Down Arrows | Launch: Spacebar
        </div>

        <div id="gameOverMsg" class="message-overlay">Game Over</div>
        <div id="victoryMsg" class="message-overlay">Victory!</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Game State ---
        let score = 0;
        let ammo = 5;
        let launchAngle = 45;
        let power = 15;
        let blocksRemaining = 12;
        let isLaunched = false;
        let launchCount = 0;
        let gameOver = false;
        let victory = false;
        
        let velocity = new THREE.Vector3(0, 0, 0);
        const gravity = -9.8;
        let armState = 'idle'; // idle, firing, returning
        
        // --- DOM Elements ---
        const scoreDisplay = document.getElementById('scoreDisplay');
        const ammoDisplay = document.getElementById('ammoDisplay');
        const angleDisplay = document.getElementById('angleDisplay');
        const blocksDisplay = document.getElementById('blocksDisplay');
        const powerSlider = document.getElementById('powerSlider');
        const powerValue = document.getElementById('powerValue');
        const resetBtn = document.getElementById('resetBtn');
        const gameOverMsg = document.getElementById('gameOverMsg');
        const victoryMsg = document.getElementById('victoryMsg');

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#87CEEB'); // Sky blue

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Ground ---
        const groundGeom = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshLambertMaterial({ color: '#3a7d2c' });
        const ground = new THREE.Mesh(groundGeom, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Catapult ---
        const catapultGroup = new THREE.Group();
        catapultGroup.position.set(-10, 0, 0);
        scene.add(catapultGroup);

        const woodMat = new THREE.MeshLambertMaterial({ color: '#8B4513' });

        // Base
        const baseGeom = new THREE.BoxGeometry(2, 0.5, 1);
        const base = new THREE.Mesh(baseGeom, woodMat);
        base.position.y = 0.25;
        base.castShadow = true;
        base.receiveShadow = true;
        catapultGroup.add(base);

        // Arm Pivot
        const armPivot = new THREE.Group();
        armPivot.position.y = 0.5;
        catapultGroup.add(armPivot);

        // Arm
        const armGeom = new THREE.BoxGeometry(0.2, 4, 0.2);
        const arm = new THREE.Mesh(armGeom, woodMat);
        arm.position.y = 2; // Shift up so pivot is at bottom
        arm.castShadow = true;
        armPivot.add(arm);

        // Bucket
        const bucketGeom = new THREE.BoxGeometry(0.6, 0.4, 0.6);
        const bucket = new THREE.Mesh(bucketGeom, woodMat);
        bucket.position.y = 2; // Relative to arm center
        bucket.castShadow = true;
        arm.add(bucket);

        // Initial arm rotation
        armPivot.rotation.z = -launchAngle * Math.PI / 180;

        // --- Projectile ---
        const projectileGroup = new THREE.Group();
        scene.add(projectileGroup);
        
        // Dummy projectile while loading
        const dummyGeom = new THREE.BoxGeometry(0.5, 0.5, 0.5);
        const dummyMat = new THREE.MeshLambertMaterial({ color: 0xff0000 });
        const dummyMesh = new THREE.Mesh(dummyGeom, dummyMat);
        dummyMesh.castShadow = true;
        projectileGroup.add(dummyMesh);

        let mixer;
        let animAction;
        let gltfModel;

        const loader = new GLTFLoader();
        loader.load('https://unpkg.com/three@0.160.0/examples/models/gltf/BoxAnimated.glb', (gltf) => {
            gltfModel = gltf.scene;
            gltfModel.scale.set(0.5, 0.5, 0.5);
            
            // Enable shadows for loaded model
            gltfModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            projectileGroup.remove(dummyMesh);
            projectileGroup.add(gltfModel);

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(gltfModel);
                animAction = mixer.clipAction(gltf.animations[0]);
            }
        });

        // --- Castle Wall ---
        const blocks = [];
        const blockGeom = new THREE.BoxGeometry(1.2, 1.2, 1.2);
        const blockMat = new THREE.MeshLambertMaterial({ color: '#808080' });

        function buildWall() {
            // Clear existing
            blocks.forEach(b => scene.remove(b.mesh));
            blocks.length = 0;

            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 4; col++) {
                    const block = new THREE.Mesh(blockGeom, blockMat);
                    // x=10, y starts at 0.6 (half height), z centered around 0
                    block.position.set(10, 0.6 + row * 1.2, (col - 1.5) * 1.2);
                    block.castShadow = true;
                    block.receiveShadow = true;
                    scene.add(block);
                    blocks.push({ mesh: block, active: true });
                }
            }
            blocksRemaining = 12;
        }
        buildWall();

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowUp') {
                launchAngle = Math.min(80, launchAngle + 5);
                updateUI();
            } else if (e.code === 'ArrowDown') {
                launchAngle = Math.max(20, launchAngle - 5);
                updateUI();
            } else if (e.code === 'Space') {
                launchProjectile();
            }
        });

        powerSlider.addEventListener('input', (e) => {
            power = parseFloat(e.target.value);
            powerValue.innerText = power;
        });

        resetBtn.addEventListener('click', resetGame);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Game Logic ---
        function updateUI() {
            scoreDisplay.innerText = score;
            ammoDisplay.innerText = ammo;
            angleDisplay.innerText = launchAngle;
            blocksDisplay.innerText = blocksRemaining;
            
            if (!isLaunched && armState === 'idle') {
                armPivot.rotation.z = -launchAngle * Math.PI / 180;
            }
        }

        function launchProjectile() {
            if (isLaunched || ammo <= 0 || gameOver || victory || armState !== 'idle') return;

            ammo--;
            launchCount++;
            isLaunched = true;
            armState = 'firing';
            updateUI();

            // Calculate velocity
            const rad = launchAngle * Math.PI / 180;
            velocity.set(
                Math.cos(rad) * power,
                Math.sin(rad) * power,
                0
            );

            // Ensure projectile is at bucket world position before detaching logic
            const bucketWorldPos = new THREE.Vector3();
            bucket.getWorldPosition(bucketWorldPos);
            projectileGroup.position.copy(bucketWorldPos);

            if (animAction) {
                animAction.reset();
                animAction.play();
            }
        }

        function resetProjectile() {
            isLaunched = false;
            velocity.set(0,0,0);
            if (animAction) animAction.stop();
            
            if (ammo <= 0 && blocksRemaining > 0) {
                gameOver = true;
                gameOverMsg.style.display = 'block';
            }
        }

        function resetGame() {
            score = 0;
            ammo = 5;
            launchAngle = 45;
            powerSlider.value = 15;
            power = 15;
            powerValue.innerText = power;
            isLaunched = false;
            gameOver = false;
            victory = false;
            launchCount = 0;
            armState = 'idle';
            
            gameOverMsg.style.display = 'none';
            victoryMsg.style.display = 'none';
            
            if (animAction) animAction.stop();
            buildWall();
            updateUI();
        }

        // --- Update Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();

            controls.update();

            if (mixer) mixer.update(delta);

            // Arm Animation State Machine
            if (armState === 'firing') {
                armPivot.rotation.z += 10 * delta; // Swing fast
                if (armPivot.rotation.z >= 0.1) { // Reached forward position
                    armPivot.rotation.z = 0.1;
                    armState = 'returning';
                }
            } else if (armState === 'returning') {
                const targetRot = -launchAngle * Math.PI / 180;
                armPivot.rotation.z -= 2 * delta; // Return slowly
                if (armPivot.rotation.z <= targetRot) {
                    armPivot.rotation.z = targetRot;
                    armState = 'idle';
                }
            } else if (!isLaunched) {
                // Keep arm at UI angle when idle
                armPivot.rotation.z = -launchAngle * Math.PI / 180;
            }

            // Projectile Logic
            if (isLaunched) {
                // Physics
                velocity.y += gravity * delta;
                projectileGroup.position.addScaledVector(velocity, delta);

                // Collision with blocks
                blocks.forEach(b => {
                    if (b.active) {
                        const dist = projectileGroup.position.distanceTo(b.mesh.position);
                        if (dist < 1.5) {
                            b.active = false;
                            b.mesh.visible = false;
                            score += 10;
                            blocksRemaining--;
                            updateUI();

                            if (blocksRemaining === 0) {
                                victory = true;
                                victoryMsg.style.display = 'block';
                            }
                        }
                    }
                });

                // Ground collision
                if (projectileGroup.position.y < 0) {
                    projectileGroup.position.y = 0;
                    velocity.set(0,0,0);
                    
                    // Wait 2 seconds then respawn
                    if(isLaunched) {
                        isLaunched = false; // Prevent multiple triggers
                        setTimeout(resetProjectile, 2000);
                    }
                }
            } else {
                // Follow bucket when not launched
                const bucketWorldPos = new THREE.Vector3();
                bucket.getWorldPosition(bucketWorldPos);
                projectileGroup.position.copy(bucketWorldPos);
            }

            // --- State Management Export ---
            window.__3D_STATE__ = {
                score: score || 0,
                ammo: ammo || 0,
                angle: launchAngle || 0,
                power: power || 0,
                blocksRemaining: blocksRemaining || 0,
                projectileActive: isLaunched || false,
                projectilePosition: { 
                    x: projectileGroup.position.x || 0, 
                    y: projectileGroup.position.y || 0, 
                    z: projectileGroup.position.z || 0 
                },
                launchCount: launchCount || 0,
                gameOver: gameOver || false,
                victory: victory || false,
                catapultArmAngle: (armPivot.rotation.z * 180 / Math.PI) || 0,
                projectileVelocity: { 
                    x: velocity.x || 0, 
                    y: velocity.y || 0, 
                    z: velocity.z || 0 
                },
                animationPlaying: (animAction && animAction.isRunning()) || false
            };

            renderer.render(scene, camera);
        }

        // Initialize UI and start loop
        updateUI();
        animate();

    </script>
</body>
</html>
